    ```


    在创建服务器端之前，让我们先尝试连接 `https://gooogle.com`（注意三个“o”），它可能不是有效的。


    ```

    ch8$ go run tlsunsafeclientget.go https://gooogle.com

    Fatal error  Get "https://gooogle.com": x509: certificate is valid for www.google.com,
    not gooogle.com

    exit status 1

    ```


    ## 服务器端


    构建客户端的另一面是处理 HTTP 请求的 Web 服务器。最简单——也是最早期——的服务器只是返回文件的副本。然而，在当前的服务器中，任何 URL 现在都可以触发任意的计算。


    ### 文件服务器


    我们从基本的文件服务器开始。Go 提供了一个*多路复用器*，这是一个读取并解释请求的对象。它将请求分发给 `handlers`（处理器），这些处理器在自己的线程中运行。因此，读取
    HTTP 请求、解码请求以及在其各自的线程中分支到合适函数的大部分工作都由 Go 替我们完成了。


    对于文件服务器，Go 还提供了一个 `FileServer` 对象，它知道如何从本地文件系统提供文件。它需要一个“根”目录（即本地系统中文件树的顶层）以及一个用于匹配
    URL 的模式。最简单的模式是 `/`，它匹配任何 URL 的顶层。这将匹配所有 URL。


    有了这些对象，一个从本地文件系统提供文件的 HTTP 服务器就变得异常简单了。这就是 `fileserver.go`：


    ```

    ch8$ vi fileserver.go

    /* File Server

    */

    package main

    import (

    "log"

    "net/http"

    )

    func main() {

    // deliver files from the directory /tmp/www

    fileServer := http.FileServer(http.Dir("/tmp/www"))

    // register the handler and deliver requests to it

    err := http.ListenAndServe(":8000", fileServer)

    if err != nil {

    log.Fatalln(err)

    }

    // That''s it!

    }

    ```


    这个服务器甚至能为请求不存在的文件资源时提供 `"404 not found"` 消息！如果请求的文件是一个目录，它会返回一个由 `<pre> ... </pre>`
    标签包裹的列表，并且不附带其他 HTML 头部或标记。如果使用 Wireshark 或一个简单的 telnet 客户端，目录会作为 `text/html`
    发送，HTML 文件作为 `text/html`，Perl 文件作为 `text/x-perl`，Java 文件作为 `text/x-java`，以此类推。`FileServer`
    使用了一些类型识别功能，并将其包含在 HTTP 请求中，但它无法提供像 Apache 这类服务器对标记的那种控制能力。


    服务器和 curl 客户端的运行情况如下：


    ```

    ch8$ go run FileServer.go

    ch8$ curl localhost:8000

    404 page not found

    ch8$ mkdir -p /tmp/www/

    ch8$ echo hi > /tmp/www/hi.txt

    ch8$ curl localhost:8000/


    hi.txt


    ch8$ curl localhost:8000/hi.txt

    hi

    ```

