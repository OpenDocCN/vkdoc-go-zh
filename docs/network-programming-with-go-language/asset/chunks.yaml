    # ISO 8859 与 Go


    `ISO 8859` 系列是一套用于欧洲不同地区及其他一些区域的 8 位字符集。它们都在低位部分共用了 `ASCII` 字符集，但在高位部分有所不同。根据谷歌的数据，`ISO
    8859` 编码约占其收录网页的 20%，但现在这一比例已经下降。


    第四个编码 `ISO 8859-4`（或称 `Latin-4`）的前 256 个字符与 `Unicode` 相同。`Latin-4` 字符的编码值在 `UTF-16`
    和默认的 `ISO 8859-4` 编码中是一致的。但这实际上帮助不大，因为 `UTF-16` 是 16 位编码，而 `ISO 8859-4` 是 8 位编码。`UTF-8`
    是 8 位编码，但它使用最高位来指示额外的字节，因此 `UTF-8` 和 `ISO 8859-4` 只重叠了 `ASCII` 子集。所以 `UTF-8` 也帮不上什么忙。这对于所有
    `8859-n`/`Latin-n` 到 `Unicode` 的编码转换都是如此。


    但是 `ISO 8859` 系列并没有复杂的问题。每个字符集中的每个字符都对应一个唯一的 `Unicode` 字符。例如，在 `ISO 8859-4` 中，字符“带反尾符的拉丁大写字母
    I”的 `ISO 8859-4` 码点为 `0xc7`（十六进制），对应的 `Unicode` 码点为 `U+012E`。在 `ISO 8859` 字符集和相应的
    `Unicode` 字符之间进行双向转换，本质上只是一个查表操作。


    从 `ISO 8859` 码点到 `Unicode` 码点的映射可以用一个包含 256 个整数的数组来实现。但其中许多映射的值与其索引相同。因此我们只使用一个映射来存储那些不同的码点，不在映射中的码点则直接取索引值。下面是一个实现此功能的示例程序。


    ```

    ch6$ vi isotounicode.go

    package main

    import (

    "fmt"

    "unicode/utf8"

    )

    func str2int(str string) []int {

    r := []rune(str)

    b := make([]int, utf8.RuneCountInString(str))

    for i, v := range r {

    b[i] = int(v)

    }

    return b

    }

    //unicode 到 8859-4

    var unicodeToISOMap = map[int]uint8{

    // 示例 匹配 ascii 0x0021: 0x21, // !

    0x012e: 0xc7, // Į

    0x010c: 0xc8, // Č

    0x0112: 0xaa, // Ē

    0x0118: 0xca, // Ę

    // 示例 匹配 0x00c9: 0xc9, // É

    // 等等更多

    }

    /* 将 UTF-8 字符串转换为 ISO 8859 编码的字节数组

    */

    func unicodeStrToISO(str string) []byte {

    // 获取 unicode 码点

    codePoints := str2int(str) //[]int(str)

    // 创建一个相同长度的字节数组

    bytes := make([]byte, len(codePoints))

    for n, v := range codePoints {

    // 检查该码点是否在异常映射表中

    iso, ok := unicodeToISOMap[v]

    if !ok {

    // 直接使用该值

    iso = uint8(v)

    }

    bytes[n] = iso

    }

    return bytes

    }

    // unicodeToISOMap 的逆映射

    var isoToUnicodeMap = map[uint8]int{

    0xc7: 0x012e,

    0xc8: 0x010c,

    0xaa: 0x0112,

    0xca: 0x0118,

    // 等等更多

    }

    func isoBytesToUnicode(bytes []byte) string {

    codePoints := make([]int, len(bytes))

    for n, v := range bytes {

    unicode, ok := isoToUnicodeMap[v]

    if !ok {

    unicode = int(v)

    }

    codePoints[n] = unicode

    }

    return fmt.Sprintf("%q == %U", codePoints, codePoints)

    }

    func main() {

    x := "ĮĘa!"

    fmt.Printf("UTF-8: %s\n", x)

    fmt.Println("unicode to 8859-4")

    b := unicodeStrToISO(x)

    fmt.Printf("8859-4(hex): %x\n\n", b)

    fmt.Println("8859-4 to Unicode")

    fmt.Printf("Unicode: %v\n", isoBytesToUnicode(b))

    }

    ```


    这些函数可用于将 `UTF-8` 字符串作为 `ISO 8859-4` 字节进行读写。通过更改映射表，你可以覆盖其他 `ISO 8859` 编码。`Latin-1`（或
    `ISO 8859-1`）是一个特例——其异常映射表为空，因为 `Latin-1` 的码点在 `Unicode` 中是相同的。你也可以将相同的技术用于其他基于表映射的字符集，例如
    `Windows 1252`。


    在上面的代码中，我们使用了一个示例输入 `ĮĘ` `a!`，其中前两个字符在我们的异常映射表中，后两个则不在（因为它们在 `Unicode` 和 `8859-n`
    中的值相同）。我们使用了 `RuneCountInString` 来帮助计算正确的符文数量。`Go` 中的字符串是字节数组；我们需要正确解码并使用我们的映射。


    ```

    ch6$ go run isotounicode.go

    UTF-8: ĮĘa!

    unicode to 8859-4

    8859-4(hex): c7ca6121

    8859-4 to Unicode

    Unicode: [''Į'' ''Ę'' ''a'' ''!''] == [U+012E U+0118 U+0061 U+0021]

    ```


    ## 其他字符集与 Go


    字符集编码非常非常多。根据谷歌的数据，这些编码在网页文档中的使用量通常很小，希望能随着时间的推移进一步减少。但如果你的软件希望覆盖所有市场，那么你可能需要处理它们。


    在最简单的情况下，一个查找表就足够了。但这并不总是奏效。字符编码 `ISO 2022` 通过使用有限状态机来换入换出代码页，从而最小化了字符集的大小。这种做法被一些日语编码所借鉴，使得事情变得非常复杂。


    `Go` 目前仅在“子仓库”包树中为这些其他字符集提供包支持。例如，包 `golang.org/x/text/encoding/japanese` 处理 `EUC-JP`
    和 `Shift JIS`。


    ## 结论


    本章的代码内容不多。相反，它介绍了一个非常复杂领域中的一些概念。这取决于你：如果你想假设每个人都使用美式英语，那么世界很简单。但如果你希望你的应用程序能被世界其他地方的人使用，你就需要关注这些复杂性。


    脚注 1


    # 7. 安全


    尽管互联网最初被设计为能够抵御敌对代理攻击的系统，但它后来发展成了一个相对可信赖实体间的合作环境。唉，那样的日子早已一去不复返了。垃圾邮件、拒绝服务（DoS）攻击、网络钓鱼尝试等事件表明，任何使用互联网的人都要自行承担风险。


    应用程序必须构建成能够在对抗性环境下正确运行。“正确”不再仅仅意味着程序的功能方面正确，还意味着要确保所传输数据的隐私性和完整性、仅限合法用户访问以及其他安全问题。


    这当然会使你的程序更加复杂。让应用程序安全涉及一些*困难*且*微妙*的计算问题。试图自行解决（例如编写自己的加密库）通常注定会失败。相反，你需要使用安全专家设计的库。


    如果这让事情变得更难，为什么还要费心呢？几乎每天都有关于信用卡信息泄露、政府官员运行的私人服务器被黑客攻击，以及系统因拒绝服务攻击而瘫痪的报道。许多此类攻击都是通过网络应用程序中的编码错误实现的，例如缓冲区溢出、跨站脚本攻击和
    `SQL` 注入。但大量错误可以追溯到糟糕的网络处理：明文传输密码、请求了安全凭证却不进行检查，以及盲目信任你所处的环境。例如，一位同事最近购买了一个家用物联网（IoT）设备。他使用
    `Wireshark` 查看它在网络上的行为，发现该设备发送的 `RTMP` 消息中携带了认证令牌 `admin.admin`。这是一个简单的攻击向量，甚至无需破解密码！一家知名公司生产的无人机使用的加密存在已知缺陷，可以被其他无人机“劫持”。一种日益常见的窃取数据的方法是充当“恶意”无线接入点，假装是当地咖啡馆的合法接入点，但监控所有通过的数据，包括你的银行账户信息。这些都是“唾手可得”的目标。数据泄露的范围可以通过“世界上最大的数据泄露”网站（[`http://www.informationisbeautiful.net/visualizations/worlds-biggest-data-breaches-hacks/`](http://www.informationisbeautiful.net/visualizations/worlds-biggest-data-breaches-hacks/)）来了解。


    本章介绍了 `Go` 提供的基本加密工具，你可以将它们构建到你的应用程序中。如果你不这样做，而你的公司损失了一百万美元——或者更糟的是，你的客户损失了一百万美元——那么责任就会落到你头上。

    '
- fmt: "# ISO Security Architecture\n\nThe ISO OSI (Open Systems Interconnect) seven-layer\
    \ model of distributed systems is well known and is repeated in Figure [7-1](#436770_2_En_7_Chapter.xhtml#Fig1).\n\
    \n![](images/436770_2_En_7_Chapter/436770_2_En_7_Fig1_HTML.png)\n\nFigure 7-1\n\
    \nThe OSI seven-layer model of distributed systems\n\nWhat is less well known\
    \ is that ISO built a whole series of documents upon this architecture. For our\
    \ purposes here, the most important is the ISO Security Architecture model, ISO\
    \ 7498-2. This requires purchase, but the ITU has produced a document technically\
    \ aligned with this, which is available from ITU at [`https://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items`](http://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items).\n\
    \n## Functions and Levels\n\nThe principal functions required of a security system\
    \ are as follows:\n\n- Authentication: Proof of identity.\n- Data integrity: Data\
    \ is not tampered with.\n- Confidentiality: Data is not exposed to others.\n-\
    \ Notarization/signature: Registration of data with a trusted third party for\
    \ later assurance.\n- Access control: Protection against unauthorized access of\
    \ resources.\n- Availability: Accessibility on demand from authorized entity.\n\
    \nThese are required at the following levels of the OSI stack:\n\n- Peer entity\
    \ authentication (3, 4, 7)\n- Data origin authentication (3, 4, 7)\n- Access control\
    \ service (3, 4, 7)\n- Connection confidentiality (1, 2, 3, 4, 6, 7)\n- Connectionless\
    \ confidentiality (1, 2, 3, 4, 6, 7)\n- Selective field confidentiality (6, 7)\n\
    - Traffic flow confidentiality (1, 3, 7)\n- Connection integrity with recovery\
    \ (4, 7)\n- Connection integrity without recovery (3, 4, 7)\n- Connection integrity\
    \ selective field (7)\n- Connectionless integrity selective field (7)\n- Nonrepudiation\
    \ at origin (7)\n- Nonrepudiation of delivery (7)\n\n## Mechanisms\n\nThe mechanisms\
    \ to achieve this level of security are as follows:\n\n- Peer entity authentication\n\
    \    - Encryption\n    - Digital signature\n    - Authentication exchange\n- Data\
    \ origin authentication\n    - Encryption\n    - Digital signature\n- Access control\
    \ service\n    - Access control lists\n    - Passwords\n    - Capabilities lists\n\
    \    - Labels\n- Connection confidentiality\n    - Encryption\n    - Routing control\n\
    - Connectionless confidentiality\n    - Encryption\n    - Routing control\n- Selective\
    \ field confidentiality\n    - Encryption\n- Traffic flow confidentiality\n  \
    \  - Encryption\n    - Traffic padding\n    - Routing control\n- Connection integrity\
    \ with recovery\n    - Encryption\n    - Data integrity\n- Connection integrity\
    \ without recovery\n    - Encryption\n    - Data integrity\n- Connection integrity\
    \ selective field\n    - Encryption\n    - Data integrity\n- Connectionless integrity\n\
    \    - Encryption\n    - Digital signature\n    - Data integrity\n- Connectionless\
    \ integrity selective field\n    - Encryption\n    - Digital signature\n    -\
    \ Data integrity\n- Nonrepudiation at origin\n    - Digital signature\n    - Data\
    \ integrity\n    - Notarization\n- Nonrepudiation of delivery\n    - Digital signature\n\
    \    - Data integrity\n    - Notarization\n\n# Data Integrity\n\nEnsuring data\
    \ integrity means supplying a means of testing that the data has not been tampered\
    \ with. Usually, this is done by forming a simple number out of the bytes in the\
    \ data. This process is called hashing, and the resulting number is called a hash\
    \ or hash value.\n\nA naive hashing algorithm is just to sum up all the bytes\
    \ in the data. However, this still allows almost any amount of changing the data\
    \ around and still preserving the hash values. For example, an attacker could\
    \ just swap two bytes. This preserves the hash value but could end up with you\
    \ owing someone $65,536 instead of $256.\n\nHashing algorithms used for security\
    \ purposes have to be “strong” so that it is very difficult for an attacker to\
    \ find a different sequence of bytes with the same hash value. This makes it hard\
    \ to modify the data to the attacker’s purposes. Security researchers are constantly\
    \ testing hash algorithms to see if they can break them – that is, find a simple\
    \ way of coming up with byte sequences to match a hash value. They have devised\
    \ a series of cryptographic hashing algorithms that are believed to be strong.\n\
    \nGo has support for several hashing algorithms, including MD4, MD5, RIPEMD-160,\
    \ SHA1, SHA224, SHA256, SHA384, and SHA512. They all follow the same pattern as\
    \ far as the Go programmer is concerned: a function `New` (or similar) in the\
    \ appropriate package returns a `Hash` object from the `hash` package. Using the\
    \ `go list` command, we can see this and related packages:\n\n```\n$ mkdir ch7\n\
    $ cd ch7\nch7$ go list crypto/...\ncrypto\ncrypto/aes\ncrypto/cipher\ncrypto/des\n\
    crypto/dsa\ncrypto/ecdsa\ncrypto/ed25519\ncrypto/ed25519/internal/edwards25519\n\
    crypto/ed25519/internal/edwards25519/field\ncrypto/elliptic\ncrypto/elliptic/internal/fiat\n\
    crypto/hmac\ncrypto/internal/randutil\ncrypto/internal/subtle\ncrypto/md5\ncrypto/rand\n\
    crypto/rc4\ncrypto/rsa\ncrypto/sha1\ncrypto/sha256\ncrypto/sha512\ncrypto/subtle\n\
    crypto/tls\ncrypto/x509\ncrypto/x509/internal/macos\ncrypto/x509/pkix\n```\n\n\
    A hash has an `io.Writer`, and you write the data to be hashed to this writer.\
    \ You can query the number of bytes in the hash value by `Size` and the hash value\
    \ by `Sum`.\n\nA typical use case is MD5 hashing (warning insecure). This uses\
    \ the `md5` package. The hash value is a 16-byte array. This is typically printed\
    \ out in ASCII form as four hexadecimal numbers, each made of four bytes. A simple\
    \ program is `md5hash.go`:\n\n```\nch7$ vi md5hash.go\n/* MD5Hash\n*/\npackage\
    \ main\nimport (\n\"crypto/md5\"\n\"fmt\"\n)\nfunc main() {\nhash := md5.New()\n\
    bytes := []byte(\"hello\\n\")\nhash.Write(bytes) // add data to running hash\n\
    hashValue := hash.Sum(nil) // retrieve the hashed data\nhashSize := hash.Size()\
    \ // how many bytes Sum returns\n// for every 4 bytes of hashValue\n// we stuff\
    \ into an byte of val by shifting\n// val[first_byte] = hashValue[n] after shifting\
    \ 24\n// second and third byte position after 16 and 8...\n// val[fourth_byte]\
    \ = hashValue[n+3]\n// in the end, we have unint32 value that we print\nfor n\
    \ := 0; n < hashSize; n += 4 {\nvar val uint32\nval = uint32(hashValue[n])<<24\
    \ +\nuint32(hashValue[n+1])<<16 +\nuint32(hashValue[n+2])<<8 +\nuint32(hashValue[n+3])\n\
    fmt.Printf(\"%x \", val)\n}\nfmt.Println()\n}\nch7$ go run md5hash.go\nb1946ac9\
    \ 2492d234 7c6235b4 d2611184\n```\n\nIf you make a small variation, say, o becomes\
    \ 0, you will see a new hash.\n\n```\nch$ go run md5hash.go // after changing\
    \ hello to hell0\ncd6fcbf3 8d05a093 9006387 f0446665\n```\n\nWhile `md5` provides\
    \ some protection (i.e., file integrity), it doesn’t say who created or provided\
    \ the file. HMAC provides not only integrity (e.g., via `md5`) but also authentication.\
    \ A consumer must have the same key and input in order to reconstruct the HMAC.\n\
    \nThe aforementioned focuses on mechanics; `md5` is not considered best in class\
    \ for hashing functions. In general, you should select an improved function such\
    \ as `sha256` instead of `md5`.\n\n```\n// add \"crypto/sha256\" to import\nhash\
    \ := hmac.New(sha256.New, []byte(“secret”))\n```\n\nChanging our prior code to\
    \ use `sha256` (with a hard-coded secret) generates the following output (e.g.,\
    \ using “hello” for the input):\n\n```\n171b5670 f7b4037f b90bef77 3b022130 e48100fd\
    \ d40ea023 730097da 9a68f4ff\n```\n\nConsiderations beyond hashing algorithm selection\
    \ include quality of key (e.g., size and randomness). HMAC is not encryption,\
    \ even though a key is used. Meaning it lives in parallel to the original (i.e.,\
    \ unencrypted data).\n\n`md5` provides integrity, but collisions mean another\
    \ file (preimage) can produce the same hash; hence, authenticity of message is\
    \ lacking. HMAC provides authenticity with addition of the key; however, maintaining\
    \ the key authenticity is the source of additional issues."
