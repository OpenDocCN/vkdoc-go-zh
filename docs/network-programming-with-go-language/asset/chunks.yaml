  trans: "\n# 失效点\n\n分布式应用程序运行在复杂环境中，这使得它们比单台计算机上的独立应用程序更容易发生故障。失效点包括以下内容：\n\n- **客户端错误**\n\
    \  - 应用程序的客户端可能崩溃（内存不足、除以零）。\n  - 客户端系统可能出现硬件问题（绊到电源线）。\n  - 客户端的网卡可能失效。\n\n-\
    \ **网络错误**\n  - 网络争用可能导致超时（服务器响应缓慢，包括路由器）。\n  - 可能存在网络地址冲突（路由到错误的主机，即使能找到主机）。\n\
    \  - 路由器等网络组件可能失效。\n  - 传输错误可能导致消息丢失。\n  - DNS 配置错误。\n\n- **客户端-服务器错误**\n  - 客户端和服务器版本可能不兼容（API\
    \ 变更——HTTP 路径、默认端口配置等）。\n\n- **服务器错误**\n  - 服务器系统可能出现硬件问题（包括网卡）。\n  - 服务器软件可能崩溃（内存不足、除以零）。\n\
    \  - 服务器的数据库可能损坏（去重过程中途失败）。\n\n应用程序的设计必须考虑到这些可能的失效。如果系统其他部分发生故障，一个组件执行的任何操作都必须能够恢复。需要采用事务和持续错误检查等技术来避免错误。值得注意的是，虽然独立应用程序对可能发生的错误有很大的控制权，但分布式系统并非如此。例如，服务器无法控制网络或客户端错误，只能准备好处理这些错误。在许多情况下，错误的原因可能无法得知：是客户端崩溃了还是网络中断了？通常，最复杂的开发工作往往是为了拥有一个稳定且可预测的分布式系统。\n\
    \n# 验收因素\n\n分布式系统的验收因素与独立系统类似。它们包括以下内容：\n\n- **可靠性**（系统不会崩溃或损坏）\n- **性能**（内部执行操作的速度）\n\
    - **响应性**（你感觉操作的速度有多快）\n- **可扩展性**（我们能否通过增加更多实例来提高容量？）\n- **容量**（我们能持续向软件请求多少工作）\n\
    - **安全性**（操作经过身份验证）\n\n目前，用户常常对分布式系统容忍比独立系统更差的表现。“哦，网络很慢”似乎成了一个可接受的借口。嗯，这其实并不合理，开发人员不应形成这样的思维定势：认为自己能控制的因素可以产生可忽略的影响。\n\
    \n另一个比较点是，分布式系统通常设计为以更智能的方式进行扩展，而不是简单地将独立程序运行多次并想办法在它们之间拆分输入。\n\n# 关于分布式计算的思考\n\
    \n以下是构建分布式系统（无论是软件、硬件还是两者兼有）时的考虑因素。\n\n## 透明性\n\n透明性的概念意味着细节对我们隐藏。为这些概念实现解决方案并非易事，但仍是一个合理的设计目标。分布式系统的“圣杯”是提供以下特性：\n\
    \n- 访问透明性\n- 位置透明性\n- 迁移透明性\n- 复制透明性\n- 并发透明性\n- 可扩展性透明性\n- 性能透明性\n- 故障透明性\n\n\
    ### 访问透明性\n\n用户不应该知道（或需要知道）对系统全部或部分的访问是本地的还是远程的。\n\n### 位置透明性\n\n服务的位置应该无关紧要。\n\
    \n### 迁移透明性\n\n如果系统的一部分迁移到另一个位置，对用户来说应该毫无区别。\n\n### 复制透明性\n\n系统运行一个副本还是多个副本应该无关紧要。\n\
    \n### 并发透明性\n\n系统并发运行的部分之间不应存在干扰。例如，如果我正在访问数据库，那么你不应该知道这件事。\n\n### 可扩展性透明性\n\n\
    系统上有一个用户还是一百万个用户应该无关紧要。\n\n### 性能透明性\n\n性能不应受到任何系统或网络特性的影响。\n\n### 故障透明性\n\n系统不应该失败。如果部分系统失效，系统应在用户不知晓故障发生的情况下恢复。\n\
    \n大多数这些透明性因素更多的是在违背中看到，而非遵守。也有一些显著案例几乎达到了这些要求。例如，当你连接到谷歌时，你不知道（也不关心）服务器在哪里。使用亚马逊云服务的系统能够根据需求进行扩展或缩减。网飞公司拥有近乎残忍的测试策略，定期且故意破坏其系统的大部分组件，以确保整个系统仍然正常工作。\n\
    \n## 分布式计算的八个谬误\n\n太阳微系统公司是一家在分布式系统领域做了大量早期工作的公司，甚至有一句口号：“网络就是计算机。” 根据他们多年的经验，太阳公司的许多科学家提出了以下常见的谬误列表：\n\
    \n1. 网络是可靠的。\n2. 延迟为零。\n3. 带宽是无限的。\n4. 网络是安全的。\n5. 拓扑结构不会改变。\n6. 只有一个管理员。\n7.\
    \ 传输成本为零。\n8. 网络是同质的。\n\n### *谬误：* 网络是可靠的\n\n贝利斯和金斯伯里合著的一篇名为《网络是可靠的》的论文（参见 [`https://queue.acm.org/detail.cfm?id=2655736`](https://queue.acm.org/detail.cfm?id=2655736)）审视了这一谬误。它发现了许多实例，例如微软报告其数据中心每天发生\
    \ 5.2 次设备故障和 40.8 次链路故障。\n\n中国政府使用“DNS 投毒”作为其审查其认为不良网站的技术之一。中国也运行着一个 DNS 根服务器。2010\
    \ 年，该服务器配置错误，导致许多其他国家的 DNS 服务器被投毒。这使得许多非中国网站在中国境内外都无法访问（参见 [`http://www.pcworld.com/article/192658/article.html`](http://www.pcworld.com/article/192658/article.html)）。\n\
    \n还有许多其他可能的情况，例如 DDoS（分布式拒绝服务）攻击导致网站无法访问。在博克斯山学院，一名承包商曾用反铲挖土机挖断了连接我们 DHCP 服务器与网络其余部分的光纤电缆，结果我们当天剩下的时间就回家了。\n\
    \n网络*并不可靠*。这意味着任何联网程序都必须准备好应对故障。这导致了 Java 的 `RMI` 及大多数后续框架的设计选择，应用程序设计允许每次网络调用可能失败。\n"
- fmt: '### Fallacy: Latency Is Zero


    Latency is the delay between sending a signal and getting a reply. In a single-process
    system, latency can depend on the amount of computation performed in a function
    call before it can return, but on the network, it is usually caused by simply
    having to traverse transports and be processed by all sorts of nodes such as routers
    on the way.


    The `ping` command is a good way of showing latency. A ping to Google’s Australia
    server takes about 20 milliseconds from Melbourne. A ping to Baidu''s Chinese
    servers takes about 200 msecs.^([¹](#fn1))


    By contrast, Williams (see [`http://www.eetimes.com/document.asp?doc_id=1200916`](http://www.eetimes.com/document.asp?doc_id=1200916))
    discusses the latency of the Linux scheduler and comes up with a mean latency
    of 88 *micro*seconds. The latency of network calls is thousands of times greater.
    Additional popular paper includes “numbers to know,” by P. Norvig, showing where
    latency happens and how components affect it (see [`https://norvig.com/21-days.html#answers`](https://norvig.com/21-days.html#answers)).


    Latency can greatly affect distributed computing design and functionality. An
    example is computing scheduling decisions; if data is too slow to gather, incorrect
    decisions can happen.


    ### Fallacy: Bandwidth Is Infinite


    Everyone who goes to make a cup of tea or coffee while a download takes place
    knows this is a fallacy. I run my own web server and on ADSL2 get an upload speed
    of 800 Kbps. I am unfortunate enough to have HFC to my home, and the disastrous
    Australian National Broadband Network will upgrade this to 1000 Kbps perhaps `–`
    in three years’ time, by 2020.


    In the meantime, I use a local wireless connection to give me 75 Mbps up and down,
    and it still isn’t fast enough!


    In the revised edition, in 2021, Ron is getting 400 Mbps down and 12 Mbps up via
    a cable modem in San Francisco. In the future, we will update with Starlink (or
    the dominant satellite provider); as of 2022, it is supposedly providing 200 Mbps
    down and 20 Mbps up.


    ### Fallacy: The Network Is Secure


    There is a strong push by technology companies for strong crypto to be used for
    all network communications and an equally strong push by governments all over
    the world for weaker systems or for backdoors “only for particular governments.”
    This seems to apply equally well to *demoncratic* (my accidental misspelling may
    be accurate!) as well as totalitarian governments.


    In addition, of course, there are the general “baddies,” stealing and selling
    credit card numbers and passwords by the millions.


    ### Fallacy: Topology Doesn’t Change


    Well it does. Generally, this may affect latency and bandwidth. But the more hard-coding
    of routes or of IP addresses, the more prone to failure network applications will
    become. Not uncommon today, moving to the cloud or even cloud native is causing
    many changes in how network applications integrate.


    ### Fallacy: There Is One Administrator


    So what? No problem when everything is working fine. It’s when it goes wrong that
    problems start `–` who to blame, who to fix it?


    A major research topic for years was *grid computing*, which distributed computing
    tasks across typically many university and research organizations to solve huge
    scientific problems. This had to resolve many complex issues due to not only multiple
    administrators but also different access and security problems, different maintenance
    schedules, and so on. The advent of cloud computing has *solved* many of these
    issues, reducing the number of administrators and systems, so cloud computing
    is more resilient than many grid systems.


    ### Fallacy: Transport Cost Is Zero


    Once I''ve bought my PC, the transport cost from CPU to monitor is zero (well,
    minor electricity!). But we all pay our IP providers money each month because
    they have to build server rooms, lay cables, and so on. It''s just a cost that
    has to be factored in (e.g., paying monthly or forced to watch advertisements).


    ### Fallacy: The Network Is Homogeneous


    The network isn''t homogenous, and neither are the endpoints `–` for example,
    your and my PCs, iPads, Android devices, and mobile phones `–` let alone with
    the IoT bringing a myriad of connected devices into the picture. There are continual
    attempts by vendors for product lockin and continually restrictive work environments
    trying to simplify their control systems, which succeed to some extent. But when
    they fail, systems dependent on homogeneity fail too.


    As we build our applications and learn the techniques, it pays to remember the
    layering models we discussed earlier. It will help us categorize purposes and
    activities. Clients and servers may not be the same hardware or software, but
    we can model them, which helps us understand and make sense of it all.


    ## Conclusion


    This chapter has tried to emphasize that distributed computing has its own unique
    features compared to other styles of computing. Ignoring these features can only
    lead to failure of the resultant systems. There are continual attempts to simplify
    the architectural model, with the latest being “microservices” and “serverless”
    computing, but in the end, the complexities still remain.


    These have to be addressed using any programming language, and subsequent chapters
    consider how Go manages them.


    Footnotes [1](#436770_2_En_1_Chapter.xhtml#Fn1_source)'
