    \        - 序列化 `Person` 并将其发送给服务器\n        - 创建一个新的 `Person` 并等待服务器响应\n    - 回到服务器端：\n\
    \        - 接收数据并进行反序列化，填充一个新的 `Person` 实例。\n        - 打印该实例。\n        - 再次序列化该\
    \ `Person` 并将其发送回客户端。\n\n这个过程重复十次，直到客户端循环结束，而服务器则继续通过外层循环等待新的连接。\n\n解析 JSON 时还有更多需要考虑的事情。Go\
    \ 甚至提供了额外的 API，包括一个用于对 JSON 流进行分词处理的 API。我们将在后续章节中更详细地介绍 JSON。\n\n## Gob 包\n\n\
    Gob 是 Go 语言特有的一种序列化技术。它专门用于编码 Go 数据类型，目前尚未得到其他语言的广泛支持。除了通道（channels）、函数（functions）和接口（interfaces）之外，它支持所有\
    \ Go 数据类型。它支持所有类型和大小的整数、字符串和布尔值、结构体、数组和切片。目前，它在处理环形结构（例如环）时存在一些问题，但这些问题未来会逐步改进。其目的是让纯\
    \ Go 编写的客户端和服务器能够无需依赖第三方包即可协同工作。\n\nGob 将类型信息编码到其序列化形式中。这比例如 X.509 序列化中的类型信息要详尽得多，但比\
    \ XML 文档中包含的类型信息高效得多。每个数据项的类型信息只包含一次，但例如会包含结构体字段的名称。\n\n这种包含类型信息的方式使得 Gob 的编组（marshalling）和解组（unmarshalling）对于编组器和解组器之间的变化或差异具有相当强的鲁棒性。例如，此结构体：\n\
    \n```go\nstruct T {\na int\nb int\n}\n```\n\n可以被编组，然后解组到另一个字段顺序不同的结构体中：\n\n```go\n\
    struct T {\nb int\na int\n}\n```\n\n它还能处理缺失字段（这些值会被忽略）或额外字段（这些字段会保持不变）。它能够处理指针类型，因此前一个结构体可以解组为这个结构体：\n\
    \n```go\nstruct T {\n*a int\n**b int\n}\n```\n\n在一定程度上，它可以处理类型转换，例如 `int` 字段可以扩展/拓宽为\
    \ `int64`，但不能处理不兼容的类型，例如 `int` 到 `uint`。\n\n要使用 Gob 编组一个数据值，首先需要创建一个 `Encoder`。它接受一个\
    \ `io.Writer` 作为参数，编组将被写入到这个可写流中。编码器有一个名为 `Encode` 的方法，用于将值编组到流中。该方法可以对多个数据项重复调用。不过，每个数据类型的类型信息只会被写入一次。\n\
    \n使用 `Decoder` 来解组序列化的数据流。它接受一个 `io.Reader`，每次读取都会返回一个解组后的数据值。\n\n一个将 Gob 序列化数据存储到文件\
    \ `person.gob` 中的程序是 `savegob.go`：\n\n```go\nch4$ vi savegob.go\n/* SaveGob\n\
    */\npackage main\nimport (\n\"encoding/gob\"\n\"os\"\n\"log\"\n)\ntype Person\
    \ struct {\nName  Name\nEmail []Email\n}\ntype Name struct {\nFamily   string\n\
    Personal string\n}\ntype Email struct {\nKind    string\nAddress string\n}\nfunc\
    \ main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal: \"Jan\"\
    },\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"},\n\
    Email{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nsaveGob(\"\
    person.gob\", person)\n}\nfunc saveGob(fileName string, key interface{}) {\noutFile,\
    \ err := os.Create(fileName)\ncheckError(err)\nencoder := gob.NewEncoder(outFile)\n\
    err = encoder.Encode(key)\ncheckError(err)\noutFile.Close()\n}\nfunc checkError(err\
    \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
    ```\n\n运行我们的 `savegob.go` 代码后，我们可以在磁盘上的 `person.gob` 文件中看到序列化后的 `Person` 版本。\n\
    \n```\nch4$ go run savegob.go\nch4$ cat -t person.gob\n)?M-^A^C^A^A^FPerson^A?M-^B^@^A^B^A^DName^A?M-^D^@^A^EEmail^A?M-^H^@^@^@*?M-^C^C^A^A^DName^A?M-^D^@^A^B^A^FFamily^A^L^@^A^HPersonal^A^L^@^@^@^[?M-^G^B^A^A^L[]main.Email^A?M-^H^@^A?M-^F^@^@(?M-^E^C^A^A^EEmail^A?M-^F^@^A^B^A^DKind^A^L^@^A^GAddress^A^L^@^@^@R?M-^B^A^A^HNewmarch^A^CJan^@^A^B^A^Dhome^A^Qjan@newmarch.name^@^A^Dwork^A^Yj.newmarch@boxhill.edu.au^@^@%\n\
    ```\n\n在上述示例中，我们使用 `cat` 命令行工具来显示 Gob 序列化输出。有一些更好的工具存在，包括用于“转储”和检查的 `xxd`，但不太为人所知。\n\
    \n要将其加载回内存，请使用 `loadgob.go`。\n"
