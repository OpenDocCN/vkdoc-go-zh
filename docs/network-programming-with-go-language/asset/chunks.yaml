  raw: '## Configuring HTTP Requests


    Go also supplies a lower-level interface for user agents to communicate with HTTP
    servers. As you might expect, not only does it give you more control over the
    client requests, but it also requires you to spend more effort in building the
    requests. However, there is only a small increase in complexity.


    The data type used to build requests is the type `Request`; have a look at the
    documentation.


    ```

    type Request struct {

    Method string

    URL *url.URL

    Proto      string // "HTTP/1.0"

    ProtoMajor int    // 1

    ProtoMinor int    // 0

    Header Header

    Body io.ReadCloser

    GetBody func() (io.ReadCloser, error)

    ContentLength int64

    TransferEncoding []string

    Close bool

    Host string

    Form url.Values

    PostForm url.Values

    MultipartForm *multipart.Form

    Trailer Header

    RemoteAddr string

    RequestURI string

    TLS *tls.ConnectionState

    Cancel <-chan struct{}

    Response *Response

    }

    ```


    Here are the related methods:


    ```

    func (r *Request) AddCookie(c *Cookie)

    func (r *Request) BasicAuth() (username, password string, ok bool)

    func (r *Request) Clone(ctx context.Context) *Request

    func (r *Request) Context() context.Context

    func (r *Request) Cookie(name string) (*Cookie, error)

    func (r *Request) Cookies() []*Cookie

    func (r *Request) FormFile(key string) (multipart.File, *multipart.FileHeader,
    error)

    func (r *Request) FormValue(key string) string

    func (r *Request) MultipartReader() (*multipart.Reader, error)

    func (r *Request) ParseForm() error

    func (r *Request) ParseMultipartForm(maxMemory int64) error

    func (r *Request) PostFormValue(key string) string

    func (r *Request) ProtoAtLeast(major, minor int) bool

    func (r *Request) Referer() string

    func (r *Request) SetBasicAuth(username, password string)

    func (r *Request) UserAgent() string

    func (r *Request) WithContext(ctx context.Context) *Request

    func (r *Request) Write(w io.Writer) error

    func (r *Request) WriteProxy(w io.Writer) error

    ```


    Some methods of Request are used during client setup; others are used by the server
    to retrieve information.


    There is a lot of information that can be stored in a request. You do not need
    to fill in all the fields, only those of interest. The simplest way to create
    a request with default values is using this, for example:


    ```

    request, err := http.NewRequest("GET", url.String(), nil)

    ```


    Once a request has been created, you can modify the fields. For example, to specify
    that you want to receive only UTF-8, add an `Accept-Charset` field to a request
    as follows:


    ```

    request.Header.Add("Accept-Charset", "UTF-8;q=1, ISO-8859-1;q=0")

    ```


    (Note that the default set ISO-8859-1 always gets a value of 1 unless mentioned
    explicitly in the list, as we do. The HTTP 1.1 specification dates back to 1999!)


    A client setting a `charset` request is simple. But there is some confusion about
    what happens with the server’s return value of a charset. The returned resource
    *should* have a `Content-Type` that will specify the media type of the content
    such as `text/html`. If appropriate, the media type should state the charset,
    such as `text/html; charset=UTF-8`. If there is no charset specification, then
    according to the HTTP specification, it should be treated as the default ISO-8859-1
    charset. But the HTML4 specification states that since many servers don’t conform
    to this, you can’t make any assumptions.


    If there is a charset specified in the server’s `Content-Type`, then assume it
    is correct. If there is none specified, since more than 50% of pages are in UTF-8
    and some are in ASCII, it is safe to assume UTF-8. Fewer than 10% of pages may
    be wrong :-(.


    ## The Client Object


    To send a request to a server and get a reply, the convenience object `Client`
    is the easiest way. This object can manage multiple requests and will look after
    issues such as whether the server keeps the TCP connection alive and so on.


    This is illustrated in the following program: `clientget.go`.


    The program shows how to add HTTP headers, as we add the header `Accept-Charset`
    to only accept UTF-8\. There is a little hiccup here, caused by a bug in Go, which
    has only been fixed in Go 1.8\. The `Client.Do` function will automatically do
    a redirect if it gets a 301, 302, 303, or 307 response. Prior to Go 1.8, it didn’t
    copy across the HTTP headers in this redirect.


    If you try against a site such as [`http://www.google.com`](http://www.google.com),
    then it will redirect to a site such as [`http://www.google.com.au`](http://www.google.com.au)
    but will lose the `Accept-Charset` header and return ISO-8859-1 (as it should
    do according to the 1999 HTTP 1.1 specification). With that proviso `–` that the
    program may not give correct results on versions prior to Go 1.8 `–` the program
    is as follows:


    ```

    ch8$ vi clientget.go

    /* ClientGet

    */

    package main

    import (

    "io"

    "fmt"

    "log"

    "net/http"

    "net/http/httputil"

    "net/url"

    "os"

    "strings"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "http://host:port/page")

    }

    url, err := url.Parse(os.Args[1])

    checkError(err)

    client := &http.Client{}

    request, err := http.NewRequest("HEAD", url.String(), nil)

    // only accept UTF-8

    request.Header.Add("Accept-Charset", "utf-8;q=1,ISO-8859-1;q=0")

    checkError(err)

    response, err := client.Do(request)

    checkError(err)

    if response.StatusCode != http.StatusOK {

    log.Fatalln(response.Status)

    }

    fmt.Println("The response header is")

    b, _ := httputil.DumpResponse(response, false)

    fmt.Print(string(b))

    chSet := getCharset(response)

    if chSet != "utf-8" {

    log.Fatalln("Cannot handle", chSet)

    }

    var buf [512]byte

    reader := response.Body

    fmt.Println("got body")

    for {

    n, err := reader.Read(buf[0:])

    if err != nil {

    if err == io.EOF {

    fmt.Print(string(buf[0:n]))

    break

    }

    checkError(err)

    }

    fmt.Print(string(buf[0:n]))

    }

    }

    func getCharset(response *http.Response) string {

    contentType := response.Header.Get("Content-Type")

    if contentType == "" {

    // guess

    return "utf-8"

    }

    idx := strings.Index(contentType, "charset=")

    if idx == -1 {

    // guess

    return "utf-8"

    }

    // we found charset now remove it

    chSet := strings.Trim(contentType[idx+8:], " ")

    return strings.ToLower(chSet)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The program is run as follows, for example:


    ```

    ch8$ go run clientget.go https://go.dev

    The response header is

    HTTP/2.0 200 OK

    Connection: close

    Content-Security-Policy: connect-src ''self'' www.google-analytics.com stats.g.doubleclick.net
    ; default-src ''self'' ; font-src ''self'' fonts.googleapis.com fonts.gstatic.com
    data: ; frame-ancestors ''self'' ; frame-src ''self'' www.google.com feedback.googleusercontent.com
    www.googletagmanager.com scone-pa.clients6.google.com www.youtube.com player.vimeo.com
    ; img-src ''self'' www.google.com www.google-analytics.com ssl.gstatic.com www.gstatic.com
    gstatic.com data: * ; object-src ''none'' ; script-src ''self'' ''sha256-n6OdwTrm52KqKm6aHYgD0TFUdMgww4a0GQlIAVrMzck=''
    ''sha256-4ryYrf7Y5daLOBv0CpYtyBIcJPZkRD2eBPdfqsN3r1M='' ''sha256-sVKX08+SqOmnWhiySYk3xC7RDUgKyAkmbXV2GWts4fo=''
    www.google.com apis.google.com www.gstatic.com gstatic.com support.google.com
    www.googletagmanager.com www.google-analytics.com ssl.google-analytics.com tagmanager.google.com
    ; style-src ''self'' ''unsafe-inline'' fonts.googleapis.com feedback.googleusercontent.com
    www.gstatic.com gstatic.com tagmanager.google.com ;

    Content-Type: text/html; charset=utf-8

    Date: Thu, 31 Mar 2022 23:45:09 GMT

    Server: Google Frontend

    Strict-Transport-Security: max-age=31536000; includeSubDomains; preload

    Vary: Accept-Encoding

