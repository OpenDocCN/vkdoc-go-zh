    ## Standard Library ServeMux Examples


    Here, we demo potentially the simplest web service Go provides (at least in `net/http`
    package) and one that demonstrates the middleware pattern a little more clearly.


    ```

    $ mkdir ch16

    $ ch16

    ch16$ vi simple.go

    package main

    import (

    "net/http"

    "fmt"

    )

    func main() {

    err := http.ListenAndServe(":8080",nil)

    fmt.Println(err)

    }

    ```


    Running the server `go run simple.go`, access via any method/path to `localhost:8080`
    returns a 404.


    ```

    ch16$ curl -v --head localhost:8080

    *   Trying ::1:8080...

    * Connected to localhost (::1) port 8080 (#0)

    > HEAD / HTTP/1.1

    > Host: localhost:8080

    > User-Agent: curl/7.77.0

    > Accept: */*

    >

    * Mark bundle as not supporting multiuse

    < HTTP/1.1 404 Not Found

    HTTP/1.1 404 Not Found

    < Content-Type: text/plain; charset=utf-8

    Content-Type: text/plain; charset=utf-8

    < X-Content-Type-Options: nosniff

    X-Content-Type-Options: nosniff

    < Date: Mon, 31 Jan 2022 00:43:57 GMT

    Date: Mon, 31 Jan 2022 00:43:57 GMT

    < Content-Length: 19

    Content-Length: 19

    <

    * Connection #0 to host localhost left intact

    ```


    What this implies is there is a default handler, returning a 404. Next, we try
    a GET request.


    ```

    ch16$ curl -X GET localhost:8080/didthiswork

    404 page not found

    ```


    It turns out, under the hood, we already have a chain of handlers. The `Server`
    is calling the `ServeMux.ServeHTTP`, which then calls `NotFoundHandler`. `ServeMux`
    supports the `Handler` interface via the `ServeHTTP` method. As an eagle eye observer,
    you may have noticed that in the preceding `Handler` documentation, `NotFoundHandler`
    is listed.


    ```

    ch16$ go doc net/http NotFoundHandler

    package http // import "net/http"

    func NotFoundHandler() Handler

    NotFoundHandler returns a simple request handler that replies to each

    request with a "404 page not found" reply.

    ```


    If you are adventurous, you can peek at the code to start to see how these are
    wired up.


    ```

    ch16$ vi /usr/local/go/src/net/http/server.go

    ...

    // NotFound replies to the request with an HTTP 404 not found error.

    func NotFound(w ResponseWriter, r *Request) { Error(w, "404 page not found", StatusNotFound)
    }

    // NotFoundHandler returns a simple request handler

    // that replies to each request with a ``404 page not found'''' reply.

    func NotFoundHandler() Handler { return HandlerFunc(NotFound) }

    ...

    ```


    As you can see, the `NotFound` function is casted to a `HandlerFunc` (which proxies
    the `ServeHTTP` call to `NotFound` in our case). `HandlerFunc` is known as a function
    adapter in Go.


    ## Customizing Muxes


    Our last example focusing on the standard library will show us how to manage multiple
    `ServeMux` instances. The goal in this example is to show how “registering” a
    new `ServeMux` can handle a subset of routes. Here, we have the “default” (`DefaultServeMux`)
    handling the route `/outermux`, while our new “inner” `ServeMux` will handle the
    deeper nested routes (e.g., `/outermux/innermux`).


    ```

    ch16$ vi complex.go

    package main

    import (

    "net/http"

    )

    func main() {

    http.Handle("/outermux", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)
    {

    w.Write([]byte("/outermux"))

    }))

    inner := http.NewServeMux()

    inner.Handle("/innermux/", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)
    {

    w.Write([]byte("../innermux"))

    }))

    http.Handle("/outermux/innermux/", http.StripPrefix("/outermux", inner))

    http.ListenAndServe(":8080", nil)

    }

    ```


    As we exercise our tests in the following, take note of the requested path and
    the log generated. Per the preceding `ServeMux` documentation, take extra note
    on how you end the paths, with a trailing slash `/` or not.


    ```

    ch16$ curl localhost:8080/outermux

    /outermux

    ch16$ curl localhost:8080/outermux/

    404 page not found

    ch16$ curl localhost:8080/outermux/innermux

    Moved Permanently.

    ch16$ curl -iL localhost:8080/outermux/innermux

    HTTP/1.1 301 Moved Permanently

    Content-Type: text/html; charset=utf-8

    Location: /outermux/innermux/

    Date: Mon, 31 Jan 2022 01:16:24 GMT

    Content-Length: 54

    HTTP/1.1 200 OK

    Date: Mon, 31 Jan 2022 01:16:24 GMT

    Content-Length: 11

    Content-Type: text/plain; charset=utf-8

    ../innermux

    ch16$ curl -iL localhost:8080/outermux/innermux/

    HTTP/1.1 200 OK

    Date: Mon, 31 Jan 2022 01:16:28 GMT

    Content-Length: 11

    Content-Type: text/plain; charset=utf-8

    ../innermux

    ```


    You may wonder what the final line is doing (`http.ListenAndServe(":8080", nil)`).


    Specifically, what is `nil` doing? This is where we can override the default `ServeMux`.
    When you pass in `nil`, the “first” mux remains the precreated instance called
    `DefaultServeMux` used by type `Serve`. You can confirm these relations by reviewing
    the code here `GOROOT/src/net/http/server.go`.'
