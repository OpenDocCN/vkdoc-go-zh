- fmt: '# HTTPS Connections by Clients


    For secure, encrypted connections, HTTP uses TLS, which is described in Chapter
    [7](#436770_2_En_7_Chapter.xhtml). The protocol of HTTP+TLS is called HTTPS and
    uses `https://` URLs instead of `http://` URLs.


    Servers are required to return valid X.509 certificates before a client will accept
    data from them. If the certificate is valid, then Go handles everything under
    the hood, and the clients given previously run okay with https URLs. That is,
    programs such as the earlier `clientget.go` run unchanged – you just give them
    an HTTPS URL.


    Many sites have invalid certificates. They may have expired, they may be self-signed
    instead of by a recognized certificate authority, or they may just have errors
    (such as having an incorrect server name). Browsers such as Firefox put a big
    warning notice with a “Get me out of here!” button, but you can carry on at your
    risk, which many people do.


    Go presently bails out when it encounters certificate errors. However, you can
    configure a client to ignore certificate errors. This is, of course, not advisable
    – sites with misconfigured certificates may have other problems.


    In Chapter [7](#436770_2_En_7_Chapter.xhtml), we generated self-signed X.509 certificates.
    Later in this chapter, we will give an HTTPS server using X.509 certificates,
    and if the self-signed certificates are used, then `clientget.go` will generate
    this error:


    ```

    x509: certificate signed by unknown authority

    ```


    A client that removes these errors and continues does so by turning on the Transport
    configuration flag `InsecureSkipVerify`. The unsafe program is `tlsunsafeclientget.go`:


    ```

    ch8$ vi tlsunsafeclientget.go

    /* TLSUnsafeClientGet

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "log"

    "net/http"

    "net/url"

    "os"

    "strings"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "https://host:port/page")

    }

    url, err := url.Parse(os.Args[1])

    checkError(err)

    if url.Scheme != "https" {

    log.Fatalln("Not https scheme ", url.Scheme)

    }

    transport := &http.Transport{}

    transport.TLSClientConfig = &tls.Config{InsecureSkipVerify: false}

    client := &http.Client{Transport: transport}

    request, err := http.NewRequest("GET", url.String(), nil)

    // only accept UTF-8

    checkError(err)

    response, err := client.Do(request)

    checkError(err)

    if response.StatusCode != http.StatusOK {

    log.Fatalln(response.Status)

    }

    fmt.Println("get a response")

    chSet := getCharset(response)

    fmt.Printf("got charset %s\n", chSet)

    if chSet != "UTF-8" {

    log.Fatalln("Cannot handle", chSet)

    }

    var buf [512]byte

    reader := response.Body

    fmt.Println("got body")

    for {

    n, err := reader.Read(buf[0:])

    checkError(err)

    fmt.Print(string(buf[0:n]))

    }

    }

    func getCharset(response *http.Response) string {

    contentType := response.Header.Get("Content-Type")

    if contentType == "" {

    // guess

    return "UTF-8"

    }

    idx := strings.Index(contentType, "charset:")

    if idx == -1 {

    // guess

    return "UTF-8"

    }

    return strings.Trim(contentType[idx:], " ")

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Until we create the server side, let’s try against `https://gooogle.com` (notice
    three “o”s), probably not valid.


    ```

    ch8$ go run tlsunsafeclientget.go https://gooogle.com

    Fatal error  Get "https://gooogle.com": x509: certificate is valid for www.google.com,
    not gooogle.com

    exit status 1

    ```


    ## Servers


    The other side to building a client is a web server handling HTTP requests. The
    simplest – and earliest – servers just returned copies of files. However, any
    URL can now trigger an arbitrary computation in current servers.


    ### File Server


    We start with a basic file server. Go supplies a *multiplexer*, that is, an object
    that will read and interpret requests. It hands out requests to `handlers`, which
    run in their own thread. Thus, much of the work of reading HTTP requests, decoding
    them, and branching to suitable functions in their own thread is done for us.


    For a file server, Go also gives a `FileServer` object, which knows how to deliver
    files from the local file system. It takes a “root” directory, which is the top
    of a file tree in the local system, and a pattern to match URLs against. The simplest
    pattern is `/`, which is the top of any URL. This will match all URLs.


    An HTTP server delivering files from the local file system is almost embarrassingly
    trivial given these objects. It is `fileserver.go`:


    ```

    ch8$ vi fileserver.go

    /* File Server

    */

    package main

    import (

    "log"

    "net/http"

    )

    func main() {

    // deliver files from the directory /tmp/www

    fileServer := http.FileServer(http.Dir("/tmp/www"))

    // register the handler and deliver requests to it

    err := http.ListenAndServe(":8000", fileServer)

    if err != nil {

    log.Fatalln(err)

    }

    // That''s it!

    }

    ```


    This server even delivers `"404 not found"` messages for requests for file resources
    that don’t exist! If the file requested is a directory, it returns a list wrapped
    in `<pre> ... </pre>` tags with no other HTML headers or markup. If Wireshark
    or a simple telnet client is used, directories are sent as `text/html`, HTML files
    as `text/html`, Perl files as `text/x-perl`, Java files as `text/x-java`, and
    so on. The `FileServer` employs some type recognition and includes that in the
    HTTP request, but it does not give the control over markup that a server such
    as Apache does.


    The server and a curl client run as follows:


    ```

    ch8$ go run FileServer.go

    ch8$ curl localhost:8000

    404 page not found

    ch8$ mkdir -p /tmp/www/

    ch8$ echo hi > /tmp/www/hi.txt

    ch8$ curl localhost:8000/


    hi.txt


    ch8$ curl localhost:8000/hi.txt

    hi

    ```'
