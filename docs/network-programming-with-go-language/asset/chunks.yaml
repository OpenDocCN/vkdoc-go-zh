    \t}\n}\n```\n\n服务器运行方式如下：\n\n`ch15$ go run personserverxml.go xmlcodec.go`\n\n\
    客户端运行方式如下：\n\n`ch15$ go run personclientxml.go xmlcodec.go ws://localhost:12345`\n\
    \n*服务器*端的输出即*客户端*发送的内容：\n\n```\nName: Jan\nAn email: ja@newmarch.name\nAn email:\
    \ jan.newmarch@gmail.com\n```\n\n和之前一样，请查阅相关的编解码器对象文档（`go doc encoding/xml`）。\n\
    \n下一步合理的改进是增强安全性；接下来我们将 WebSocket 升级为使用 TLS。\n\n### 基于 TLS 的 WebSocket\n\nWebSocket\
    \ 可以构建在安全的 TLS 套接字之上。我们在第 8 章讨论了如何使用第 7 章中的证书来使用 TLS 套接字。这种方法在 WebSocket 中保持不变。也就是说，我们使用\
    \ `http.ListenAndServeTLS` 代替 `http.ListenAndServe`。\n\n以下是一个使用 TLS 的回声服务器 `echoservertls.go`：\n\
    \n`ch15$ vi echoservertls.go`\n\n```\n/* EchoServerTLS\n*/\npackage main\nimport\
    \ (\n\t\"log\"\n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\n\t\"net/http\"\n\
    )\nfunc Echo(ws *websocket.Conn) {\n\tfmt.Println(\"Echoing\")\n\tfor n := 0;\
    \ n < 10; n++ {\n\t\tmsg := \"Hello  \" + string(n+48)\n\t\tfmt.Println(\"Sending\
    \ to client: \" + msg)\n\t\terr := websocket.Message.Send(ws, msg)\n\t\tif err\
    \ != nil {\n\t\t\tfmt.Println(\"Can't send\")\n\t\t\tbreak\n\t\t}\n\t\tvar reply\
    \ string\n\t\terr = websocket.Message.Receive(ws, &reply)\n\t\tif err != nil {\n\
    \t\t\tfmt.Println(\"Can't receive\")\n\t\t\tbreak\n\t\t}\n\t\tfmt.Println(\"Received\
    \ back from client: \" + reply)\n\t}\n}\nfunc main() {\n\thttp.Handle(\"/\", websocket.Handler(Echo))\n\
    \terr := http.ListenAndServeTLS(\":12345\",\n\t\t\"jan.newmarch.name.pem\",\n\t\
    \t\"private.pem\", nil)\n\tcheckError(err)\n}\nfunc checkError(err error) {\n\t\
    if err != nil {\n\t\tlog.Fatalln(\"Fatal error \", err.Error())\n\t}\n}\n```\n\
    \n在运行服务器之前，我们需要从第 7/8 章创建并使用的证书和密钥。\n\n```\nch15$ cp ../ch7/jan.newmarch.name.pem\
    \ . ; cp ../ch7/private.pem .\nch15$ go run echoservertls.go\n```\n\n客户端与之前的回声客户端相同。唯一变化的是\
    \ URL，它使用 `wss` 方案代替了 `ws` 方案：\n\n```\nch15$ go run echoclient wss://localhost:12345/\n\
    Fatal error  websocket.Dial wss://localhost:12345: x509: certificate signed by\
    \ unknown authority\nexit status 1\n```\n\n如果服务器提供的 TLS 证书是有效的，这就能正常工作。但我使用的证书无效：它是自签名的，这通常是你即将进入危险区域的信号。如果仍然要继续，你需要采用与第\
    \ 8 章相同的“移除安全检查”方法，即启用 TLS `InsecureSkipVerify` 标志。程序 `echoclienttls.go` 就是通过设置一个使用该标志的配置，然后调用\
    \ `DialConfig` 代替 `Dial` 来实现的。\n\n`ch15$ vi echoclienttls.go`\n\n```\n/* EchoClientTLS\n\
    */\npackage main\nimport (\n\t\"crypto/tls\"\n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\
    \n\t\"io\"\n\t\"log\"\n\t\"os\"\n)\nfunc main() {\n\tif len(os.Args) != 2 {\n\t\
    \tlog.Fatalln(\"Usage: \", os.Args[0], \"wss://host:port\")\n\t}\n\tconfig, err\
    \ := websocket.NewConfig(os.Args[1],\n\t\t\"http://localhost\")\n\tcheckError(err)\n\
    \ttlsConfig := &tls.Config{InsecureSkipVerify: true}\n\tconfig.TlsConfig = tlsConfig\n\
    \tconn, err := websocket.DialConfig(config)\n\tcheckError(err)\n\tvar msg string\n\
    \tfor {\n\t\terr := websocket.Message.Receive(conn, &msg)\n\t\tif err != nil {\n\
    \t\t\tif err == io.EOF {\n\t\t\t\t// 服务器优雅关闭\n\t\t\t\tbreak\n\t\t\t}\n\t\t\tfmt.Println(\"\
    Couldn't receive msg \" +\n\t\t\t\terr.Error())\n\t\t\tbreak\n\t\t}\n\t\tfmt.Println(\"\
    Received from server: \" + msg)\n\t\t// 返回消息\n\t\terr = websocket.Message.Send(conn,\
    \ msg)\n\t\tif err != nil {\n\t\t\tfmt.Println(\"Couldn't return msg\")\n\t\t\t\
    break\n\t\t}\n\t}\n}\nfunc checkError(err error) {\n\tif err != nil {\n\t\tlog.Fatalln(\"\
    Fatal error \", err.Error())\n\t}\n}\n```\n\n运行客户端如下（假设 `echoservertls.go` 正在运行）：\n\
    \n```\nch15$ go run echoclienttls.go wss://localhost:12345\nReceived from server:\
    \ Hello  0\n...\nReceived from server: Hello  9\n```\n\n回到服务器端，我们看到以下输出：\n\n```\n\
    Echoing\nSending to client: Hello  0\nReceived back from client: Hello  0\n...\n\
    Sending to client: Hello  9\nReceived back from client: Hello  9\n```\n"
- fmt: '### WebSockets in an HTML Page


    The original driver for WebSockets was to allow full duplex interaction between
    an HTTP user agent such as a browser and a server. The typical use case is expected
    to involve a JavaScript program in a browser interacting with a server. In this
    section, we build a web/WebSockets server that delivers an HTML page that sets
    up a WebSocket and displays information from that server using WebSockets. We
    are looking at the situation illustrated in Figure [15-1](#436770_2_En_15_Chapter.xhtml#Fig1).


    ![](images/436770_2_En_15_Chapter/436770_2_En_15_Fig1_HTML.png)


    Figure 15-1


    Full duplex interaction situation


    The age of the Internet of Things (IoT) is upon us. Consequently, we can expect
    data from sensors and sensor networks to be used to drive actuators and to display
    information about an IoT network in browsers. There are innumerable books about
    using Raspberry Pis and Arduinos for building sensor networks, but we will drastically
    simplify the situation by showing the CPU temperatures on a “sensor,” updating
    in a web page every few seconds.


    The Linux `sensors` command from the Debian package `lm-sensors` writes to standard
    output the values of sensors it knows about. The command `sensors` on my desktop
    machine produces output such as the following:


    ```

    acpitz-virtual-0

    Adapter: Virtual device

    temp1:        +27.8°C  (crit = +105.0°C)

    temp2:        +29.8°C  (crit = +105.0°C)

    coretemp-isa-0000

    Adapter: ISA adapter

    Physical id 0:  +58.0°C  (high = +105.0°C, crit = +105.0°C)

    Core 0:         +57.0°C  (high = +105.0°C, crit = +105.0°C)

    Core 1:         +58.0°C  (high = +105.0°C, crit = +105.0°C)

    ```


    On refresh, typically, the temperature on `Core 0` and `Core 1` may change.


    On Windows, a command to do the same is this:


    ```

    wmic /namespace:\\root\wmi PATH MSAcpi_ThermalZoneTemperature get CurrentTemperature

    ```


    When this runs, it has output such as


    ```

    42.4° C

    ```


    On the Mac, use the command `osx-cpu-temp` from [`https://github.com/lavoiesl/osx-cpu-temp`](https://github.com/lavoiesl/osx-cpu-temp).
    If you don’t want to go through these steps, just substitute a more mundane program
    such as the `date`.


    We provide a Go program to deliver HTML documents from the `ROOT_DIR` directory
    and to then set up a WebSocket from the URL `GetTemp`. The WebSocket on the server
    side gets the output from `sensors` every two seconds and sends it to the client
    end of the socket. The web/WebSockets server runs on port `12345` for no particular
    reason. Substitute any other interesting system call for the `exec.Command` call.
    Here, we use the simple `sensors.sh` as our temperature program (random number
    between 1 and 100).


    ```

    ch15$ vi sensors.sh

    #!/bin/sh

    echo $(( ( RANDOM % 100 )  + 1 ))

    ```


    Be sure to make it executable: `chmod 700 sensors.sh`.


    The server is `temperatureserver.go`:


    ```

    ch15$ vi temperatureserver.go

    /* TemperatureServer

    */

    package main

    import (

    "fmt"

    "golang.org/x/net/websocket"

    "log"

    "net/http"

    "os/exec"

    "time"

    )

    var ROOT_DIR = "."

    func GetTemp(ws *websocket.Conn) {

    for {

    msg, err := exec.Command(ROOT_DIR + "/sensors.sh").CombinedOutput()

    checkError(err)

    fmt.Println("Sending to client: " + string(msg[:]))

    err = websocket.Message.Send(ws, string(msg[:]))

    if err != nil {

    fmt.Println("Can''t send")

    break

    }

    time.Sleep(time.Duration(2) * time.Second)

    var reply string

    err = websocket.Message.Receive(ws, &reply)

    if err != nil {

    fmt.Println("Can''t receive")

    break

    }

    fmt.Println("Received back from client: " + reply)

    }

    }

    func main() {

    fileServer := http.FileServer(http.Dir(ROOT_DIR))

    http.Handle("/GetTemp", websocket.Handler(GetTemp))

    http.Handle("/", fileServer)

    err := http.ListenAndServe(":12345", nil)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    It is run as follows:


    ```

    ch15$ go run temperatureserver.go

    ```


    The top-level HTML file to kick this off is `websocket.html`; be sure to copy
    this to the `ROOT_DIR`.


    ```


    function WebSocketTest()

    {

    if ("WebSocket" in window)

    {

    alert("WebSocket is supported by your Browser!");

    // Let us open a web socket

    var ws = new WebSocket("ws://localhost:12345/GetTemp");

    ws.onopen = function()

    {

    alert("WS is opened...");

    };

    ws.onmessage = function (evt)

    {

    var received_msg = evt.data;

    // uncomment next line if you want to get alerts on each message

    //alert("Message is received..." + received_msg);

    document.getElementById("temp").innerHTML = "" + received_msg + ""

    ws.send("Message received")

    };

    ws.onclose = function()

    {

    // websocket is closed.

    alert("Connection is closed...");

    };

    }

    else

    {

    // The browser doesn''t support WebSocket

    alert("WebSocket NOT supported by your Browser!");

    }

    }


    Run temperature sensor


    ```


    In a browser, visit `http://localhost:12345/websocket.html`; click “Run temperature
    sensor” to see the temperature relayed.


    The program uses JavaScript to open a WebSockets connection and to handle the
    `onopen`, `onmessage`, and `onclose` events. It reads and writes using `evt.data`
    and the `send` function. It presents the data in a preformatted element, exactly
    as the data before. It is refreshed every two seconds. The structure of the HTML
    document is based on HTML5 - WebSockets: [`https://www.tutorialspoint.com/html5/html5_websocket.htm`](https://www.tutorialspoint.com/html5/html5_websocket.htm).


    ## The `github.com/gorilla/websocket` Package


    The alternative package for WebSockets functionality is the `github.com/gorilla/websocket`
    package.


    ### Echo Server


    The echo server using this package is `echoservergorilla.go`. It makes the HTTP-to-WebSockets
    transition more explicit by introducing a call to a `websocket.Upgrader` object.
    It also more clearly distinguishes between sending text and binary messages.


    ```

    ch15$ vi echoservergorilla.go

    /* EchoServerGorilla

    */

    package main

    import (

    "fmt"

    "github.com/gorilla/websocket"

    "log"

    "net/http"

    )

    var upgrader = websocket.Upgrader{

    ReadBufferSize:  1024,

    WriteBufferSize: 1024,

    }

    func Handler(w http.ResponseWriter, r *http.Request) {

    fmt.Println("Handling /")

    conn, err := upgrader.Upgrade(w, r, nil)

    if err != nil {

    fmt.Println(err)

    return

    }

    for n := 0; n < 10; n++ {

    msg := "Hello  " + string(n+48)

    fmt.Println("Sending to client: " + msg)

    err = conn.WriteMessage(websocket.TextMessage,

    []byte(msg))

    _, reply, err := conn.ReadMessage()

    if err != nil {

    fmt.Println("Can''t receive")

    break

    }

    fmt.Println("Received back from client: " +

    string(reply[:]))

    }

    conn.Close()

    }

    func main() {

    http.HandleFunc("/", Handler)

    err := http.ListenAndServe("localhost:12345", nil)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The server is run as follows:


    ```

    ch15$ go mod init example.com/user/echoservergorilla # or skip and use existing
    module name

    ch15$ go mod tidy

    ch15$ go run echoservergorilla.go

    ```'
