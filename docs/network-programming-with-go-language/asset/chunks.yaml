    ### HTTP RPC 服务器


    任何 RPC 都需要一种传输机制来通过网络传递消息。Go 可以使用 HTTP 或 TCP。HTTP 机制的优点在于可以利用 HTTP 支持库。你需要向 HTTP
    层添加一个 RPC 处理器，通过 `HandleHTTP` 实现，然后启动一个 HTTP 服务器。完整代码在 `arithserver.go` 中：


    ```

    $ mkdir ch13

    $ cd ch13

    ch13$ vi arithserver.go

    /* ArithServer

    */

    package main

    import (

    "errors"

    "fmt"

    "net/http"

    "net/rpc"

    )

    type Values struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    type Arith int

    func (t *Arith) Multiply(args *Values, reply *int) error {

    *reply = args.A * args.B

    return nil

    }

    func (t *Arith) Divide(args *Values, quo *Quotient) error {

    if args.B == 0 {

    return errors.New("divide by zero")

    }

    quo.Quo = args.A / args.B

    quo.Rem = args.A % args.B

    return nil

    }

    func main() {

    arith := new(Arith)

    rpc.Register(arith)

    rpc.HandleHTTP()

    err := http.ListenAndServe(":1234", nil)

    if err != nil {

    fmt.Println(err.Error())

    }

    }

    ```


    并通过以下命令运行：


    ```

    ch13$ go run arithserver.go

    ```


    让服务器保持运行。接下来，我们来看 RPC 服务的用户，即 RPC 客户端。


    ### HTTP RPC 客户端


    客户端需要与 RPC 服务器建立 HTTP 连接。它需要准备一个结构体，包含要发送的值以及用于存储结果的变量地址。然后，它可以使用这些参数发起一个 `Call`：


    *   要执行的远程函数名称

    *   要发送的值

    *   用于存储结果的变量地址


    一个调用算术服务器两个函数的客户端是 `arithclient.go`：


    ```

    ch13$ vi arithclient.go

    /* ArithClient

    */

    package main

    import (

    "fmt"

    "log"

    "net/rpc"

    "os"

    )

    type Args struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    func main() {

    if len(os.Args) != 2 {

    fmt.Println("Usage: ", os.Args[0], "server")

    os.Exit(1)

    }

    serverAddress := os.Args[1]

    client, err := rpc.DialHTTP("tcp", serverAddress+":1234")

    if err != nil {

    log.Fatal("dialing:", err)

    }

    // Synchronous call

    args := Args{17, 8}

    var reply int

    err = client.Call("Arith.Multiply", args, &reply)

    if err != nil {

    log.Fatal("arith error:", err)

    }

    fmt.Printf("Arith: %d*%d=%d\n", args.A, args.B, reply)

    var quot Quotient

    err = client.Call("Arith.Divide", args, &quot)

    if err != nil {

    log.Fatal("arith error:", err)

    }

    fmt.Printf("Arith: %d/%d=%d remainder %d\n", args.A, args.B,

    quot.Quo, quot.Rem)

    }

    ```


    运行时，我们看到以下输出：


    ```

    ch13$ go run arithclient.go localhost

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    ### TCP RPC 服务器


    使用 TCP 套接字的服务器版本是 `tcparithserver.go`：


    ```

    ch13$ vi tcparithserver.go

