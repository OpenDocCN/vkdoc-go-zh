    \n数组可以静态创建：\n\n```\nvar x [128]int\n```\n\n或以指针形式动态创建：\n\n```\nxp := new([128]int)\n\
    ```\n\n切片可以与其底层数组一同创建：\n\n```\nx := make([]int, 50, 100)\n```\n\n或者\n\n```\nx\
