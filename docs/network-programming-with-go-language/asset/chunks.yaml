    该测试本身专注于设置各种客户端连接相关选项，然后使用客户端，并期望一切正常。从我们的角度来看，我们感兴趣的是他们编写测试本身的方式。我们处在协议栈的 L3/L4
    层。从高层次来看，其流程如下：


    *   准备并验证一个已知的 IP 地址（例如 `127.0.0.1`）和端口（`:0`）

    *   创建一个基于 TCP 的监听器。

    *   启动服务器（后续详述）。

    *   获取服务器的 IP 和分配的端口。

    *   使用远程地址创建一个客户端。

    *   配置客户端。

    *   将数据从客户端写入服务器，然后读取结果。


    运行 `TestTCPConnSpecificMethods` 测试，我们看到以下输出：


    ```

    net$ go test -test.count=1 -v -test.run "TestTCPConnSpecificMethods$"

    === RUN   TestTCPConnSpecificMethods

    --- PASS: TestTCPConnSpecificMethods (0.00s)

    PASS

    Socket statistical information:

    (inet4, stream, default): opened=2 connected=1 listened=1 accepted=1 closed=3
    openfailed=0 connectfailed=1 listenfailed=0 acceptfailed=1 closefailed=0

    ok      net 0.210s

    ```


    测试中间部分看起来比我们之前看到的要复杂。


    ```

    ch := make(chan error, 1)

    handler := func(ls *localServer, ln Listener) { ls.transponder(ls.Listener, ch)
    }

    ls := (&streamListener{Listener: ln}).newLocalServer()

    defer ls.teardown()

    if err := ls.buildup(handler); err != nil {

    t.Fatal(err)

    }

    ```


    上述代码定义在另一个文件中：`mockserver_test.go`。调用 `buildup` 会在一个 Go 协程中运行 handler 代码。从高层次来看，`Accept`
    是在 `transponder` 中运行的，那么为什么不用一个“非模拟”的设置呢？进一步审查后，你会发现 `someTimeout` 被应用于大多数与超时相关的设置（例如
    `SetDeadline`）。有趣的是，由于该代码存在于以 `_test.go` 结尾的文件中，我们无法通过 `go doc` 查看它。


    更多详情请查阅 `$(go env GOROOT)/src/net/mockserver_test.go`。


    ## 结论


    本章旨在引导你思考在测试网络相关代码时所涉及的技术和层次。要成为专业的网络测试开发者，还需要掌握更多概念和工具。例如，模糊测试（fuzzing）或泛型（generics）如何帮助确保代码安全并精简代码？当集成测试变得更加复杂时，例如我们将多个网络服务串联起来，甚至中途协议发生变化时，我们应该考虑什么？

