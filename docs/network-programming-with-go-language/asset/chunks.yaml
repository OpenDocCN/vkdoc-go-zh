    ### 使用生成的代码


    JSON 示例中使用的编码与本示例中的编码本质上没有区别。下面是一个简单的程序，用于编组和反编组一个`Person`对象。我们创建一个名为`protocolbuffer.go`的应用。该应用将位于一个模块中，该模块又包含了生成的
    protobuf 包。


    ```

    ch4$ cd myapp

    ch4/myapp$

    ```


    创建以下文件：`protocolbuffer.go`。


    ```

    ch4/myapp$ vi protocolbuffer.go

    /* ProtocolBuffer

    */

    package main

    import (

    "myapp/protos"

    "google.golang.org/protobuf/proto"

    "fmt"

    )

    func main() {

    name := protos.Person_Name{

    Family:   "newmarch",

    Personal: "jan",

    }

    email1 := protos.Person_Email{

    Kind:    "home",

    Address: "jan@newmarch.name",

    }

    email2 := protos.Person_Email{

    Kind:    "work",

    Address: "j.newmarch@boxhill.edu.au",

    }

    emails := []*protos.Person_Email{&email1, &email2}

    p := protos.Person{

    Name:  &name,

    Email: emails,

    }

    fmt.Println(p)

    data, _ := proto.Marshal(&p)

    newP := protos.Person{}

    proto.Unmarshal(data, &newP)

    fmt.Printf("%v\n", newP)

    if p.Name.Personal == newP.Name.Personal && p.Email[0].Address == newP.Email[0].Address
    {

    fmt.Println("same")

    }

    }

    ```


    将生成的代码放在`./myapp/protos/personv3.pb.go`中，并配合上述主应用`protocolbuffer.go`，我们可以使用 Go
    模块来获取剩余的依赖。在`myapp`目录下，创建以下`go.mod`文件：


    ```

    ch4/myapp$ go mod init myapp

    ch4/myapp$ go mod edit -replace myapp=./protos

    ch4/myapp$ go mod tidy

    ```


    输出应该是编组前后的一个`Person`，并且运行以下命令后应该相同：


    ```

    ch4/myapp$ go run protocolbuffer.go

    {{{} [] [] } 0 [] family:"newmarch"  personal:"jan" [kind:"home"  address:"jan@newmarch.name"
    kind:"work"  address:"j.newmarch@boxhill.edu.au"]}

    {{{} [] [] 0xc00012a000} 0 [] family:"newmarch"  personal:"jan" [kind:"home"  address:"jan@newmarch.name"
    kind:"work"  address:"j.newmarch@boxhill.edu.au"]}

    same

    ```


    虽然看起来不太美观，但内容是一致的。最后的比较是一个警告：不能简单地对两个结构体进行比较。这里，我们只是比较了几个字段。还可以进行美化打印，例如通过`protojson`：[`https://pkg.go.dev/google.golang.org/protobuf/encoding/protojson`](https://pkg.go.dev/google.golang.org/protobuf/encoding/protojson)。


    我们还没有对编组后的对象做太多处理。不过，它可以保存到文件中，或者通过网络发送，并由任何支持的语言进行反编组：C++、C#、Java、Python 以及 Go。


    ## 结论


    本章讨论了序列化数据类型的一般特性，并展示了几种常见的编码方式。还有很多其他编码方式，包括 XML（已包含在 Go 库中）、CBOR（Go 的一种二进制格式）、YAML（与
    XML 类似），以及许多特定于语言的编码方式，如 Java 对象序列化和 Python 的 Pickle。那些不在 Go 标准包中的编码方式，通常可以在 GitHub
    上找到。


