- fmt: '# Defining Functions


    The templates use the string representation of an object to insert values using
    the `fmt` package to convert the object to a string. Sometimes, this isn’t what
    is needed. For example, to avoid spammers getting hold of email addresses, it
    is quite common to see the symbol `@` replaced by the word “at,” as in “jan at
    newmarch.name”. If we want to use a template to display email addresses in that
    form, we have to build a custom function to do this transformation.


    Each template function has a name that is used in the templates themselves and
    an associated Go function. These are linked by this type:


    ```

    type FuncMap map[string]interface{}

    ```


    For example, if we want our template function to be `emailExpand`, which is linked
    to the Go function `EmailExpander`, we add this to the functions in a template
    as follows:


    ```

    t = t.Funcs(template.FuncMap{"emailExpand": EmailExpander})

    ```


    The signature for `EmailExpander` is typically this:


    ```

    func EmailExpander(args ...interface{}) string

    ```


    For the use we are interested in, there should be only one argument to the function,
    which will be a string. Existing functions in the Go template library have some
    initial code to handle nonconforming cases, so we just copy that. Then it is just
    simple string manipulation to change the format of the email address. A program
    is `printemails.go`:


    ```go

    ch9$ vi printemails.go

    /* PrintEmails

    */

    package main

    import (

    "log"

    "os"

    "strings"

    "text/template"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    const templ = `The name is {{.Name}}.

    {{range .Emails}}

    An email is "{{. | emailExpand}}"

    {{end}}`

    func main() {

    person := Person{

    Name: "jan",

    Emails: []string{"jan@newmarch.name",

    "jan.newmarch@gmail.com"},

    }

    t, err := template.New("Person template").Funcs(

    template.FuncMap{

    "emailExpand": func(emailAddress string) string {

    return strings.Replace(emailAddress, "@", " at ", -1)

    },

    },

    ).Parse(templ)

    err = t.Execute(os.Stdout, person)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The output is as follows:


    ```

    ch9$ go run printemails.go

    The name is jan.

    An email is "jan at newmarch.name"

    An email is "jan.newmarch at gmail.com"

    ```


    # Variables


    The template package allows you to define and use variables. As motivation for
    this, consider how we might print each person’s email address *prefixed* by their
    name. The type we use is again this one:


    ```

    type Person struct {

    Name      string

    Emails    []string

    }

    ```


    To access the email strings, we use a `range` statement such as this:


    ```

    {{range .Emails}}

    {{.}}

    {{end}}

    ```


    But at that point, we cannot access the `Name` field, as `.` is now traversing
    the array elements and `Name` is outside of this scope. The solution is to save
    the value of the `Name` field in a variable that can be accessed anywhere in its
    scope. We also apply the same idea with loop variables. Variables in templates
    are prefixed by `$`. So we write this:


    ```

    {{$name := .Name}}

    {{range $idx, $email := .Emails}}

    Name is {{$name}}, email is {{$email}}

    {{end}}

    ```


    The program is `printnameemails.go`:


    ```go

    ch9$ vi printnameemails.go

    /**

    * PrintNameEmails

    */

    package main

    import (

    "log"

    "os"

    "text/template"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    const templ = `{{$name := .Name}}

    {{ $numEmails := .Emails | len -}}

    {{range $idx, $email := .Emails -}}

    Name is {{$name}}, email {{$email}} is {{ $idx | increment }} of {{ $numEmails
    }}

    {{end}}

    `

    func main() {

    person := Person{

    Name: "jan",

    Emails: []string{"jan@newmarch.name",

    "jan.newmarch@gmail.com"},

    }

    t, err := template.New("Person template").Funcs(

    template.FuncMap{

    "increment": func(val int) int {

    return val + 1

    },

    },

    ).Parse(templ)

    checkError(err)

    err = t.Execute(os.Stdout, person)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Here is the output:


    ```

    ch9$ go run printnameemails.go

    Name is jan, email jan@newmarch.name is 1 of 2

    Name is jan, email jan.newmarch@gmail.com is 2 of 2

    ```'
  raw: '## Defining Functions


    The templates use the string representation of an object to insert values using
    the `fmt` package to convert the object to a string. Sometimes, this isn’t what
    is needed. For example, to avoid spammers getting hold of email addresses, it
    is quite common to see the symbol `@` replaced by the word “at,” as in “jan at
    newmarch.name”. If we want to use a template to display email addresses in that
    form, we have to build a custom function to do this transformation.


    Each template function has a name that is used in the templates themselves and
    an associated Go function. These are linked by this type:


    ```

    type FuncMap map[string]interface{}

    ```


    For example, if we want our template function to be `emailExpand`, which is linked
    to the Go function `EmailExpander`, we add this to the functions in a template
    as follows:


    ```

    t = t.Funcs(template.FuncMap{"emailExpand": EmailExpander})

    ```


    The signature for `EmailExpander` is typically this:


    ```

    func EmailExpander(args ...interface{}) string

    ```


    For the use we are interested in, there should be only one argument to the function,
    which will be a string. Existing functions in the Go template library have some
    initial code to handle nonconforming cases, so we just copy that. Then it is just
    simple string manipulation to change the format of the email address. A program
    is `printemails.go`:


    ```

    ch9$ vi printemails.go

    /* PrintEmails

    */

    package main

    import (

    "log"

    "os"

    "strings"

    "text/template"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    const templ = `The name is {{.Name}}.

    {{range .Emails}}

    An email is "{{. | emailExpand}}"

    {{end}}`

    func main() {

    person := Person{

    Name: "jan",

    Emails: []string{"jan@newmarch.name",

    "jan.newmarch@gmail.com"},

    }

    t, err := template.New("Person template").Funcs(

    template.FuncMap{

    "emailExpand": func(emailAddress string) string {

    return strings.Replace(emailAddress, "@", " at ", -1)

    },

    },

    ).Parse(templ)

    err = t.Execute(os.Stdout, person)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The output is as follows:


    ```

    ch9$ go run printemails.go

    The name is jan.

    An email is "jan at newmarch.name"

