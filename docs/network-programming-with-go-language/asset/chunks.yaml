    This is because the server currently only generates as big-endian.


    ```

    琁樀✀愀椀 愀爀爀쌀▯琀쌀▯

    ```


    ## Unicode Gotchas


    This book is not about i18n issues. In particular, we don’t want to delve into
    the arcane areas of Unicode. But you should know that Unicode is not a simple
    encoding and there are many complexities. For example, some earlier character
    sets used nonspacing characters, particularly for accents. This was brought into
    Unicode, so you can produce accented characters in two ways: as a single Unicode
    character or as a pair of nonspacing accent plus non-accented character. For example,
    `U+04D6`, “Cyrillic capital letter ie with breve,” is a single character. It is
    equivalent to `U+0415`, “Cyrillic capital letter ie” combined with the breve accent
    `U+0306` “combining breve.” This makes string comparison difficult on occasions.
    This could potentially be the cause of some very obscure errors.


    There is a package called `golang.org/x/text/unicode/norm` in the Go experimental
    tree that can normalize Unicode strings. It can be installed into your Go package
    tree:


    ```

    go get golang.org/x/text/unicode/norm

    ```


    Note that it is a package in the “subrepositories” Go Project tree and may not
    be stable.


    There are actually four standard Unicode forms. The most common is NFC. A string
    can be converted to NFC form by `norm.NFC.String(str)`. The following program
    called `norm.go` forms strings in two ways, as a single character and as a composed
    character, and prints the strings, their bytes, and then the normalized form and
    its bytes. Create the following file, `utfnorm.go`:


    ```

    ch6$ vi utfnorm.go

    /* UTFNorm

    */

    package main

    import (

    "fmt"

    "golang.org/x/text/unicode/norm"

    )

    func main() {

    str1 := "\u04d6"

    str2 := "\u0415\u0306"

    norm_str2 := norm.NFC.String(str2)

    bytes1 := []byte(str1)

    bytes2 := []byte(str2)

    norm_bytes2 := []byte(norm_str2)

    fmt.Println("Single char ", str1, " bytes ", bytes1)

    fmt.Println("Composed char ", str2, " bytes ", bytes2)

    fmt.Println("Normalized char", norm_str2, " bytes ",

    norm_bytes2)

    }

    ch6$ go mod init example.com/user/utfnorm

    ch6$ go mod tidy

    ch6$ go run utfnorm.go

    Single char  Ӗ  bytes  [211 150]

    Composed char  Ӗ  bytes  [208 149 204 134]

    Normalized char Ӗ  bytes  [211 150]

    ```'
