- fmt: '### i18n


    There are complications arising from the increasing internationalization (i18n)
    of the Internet. Hostnames may be given in an internationalized form known as
    IDN (Internationalized Domain Name). In order to preserve compatibility with legacy
    implementations that do not understand Unicode (such as older email servers),
    non-ASCII domain names are mapped into an ASCII representation known as *punycode*.
    For example, the domain name `日本語.jp` has the punycode value `xn—wgv71a119e.jp`.
    For example, we can use `telnet` to view the translation.


    ```

    $ mkdir ch8

    $ ch ch8

    ch8$ telnet 日本語.jp 80

    Trying 2001:218:3001:7::110...

    Connected to xn--wgv71a119e.jp.

    Escape character is ''^]''.

    ^]

    telnet> quit

    Connection closed.

    ```


    The translation from a non-ASCII domain to a punycode value is not performed automatically
    by the Go `net` libraries, but there is an extension package called `golang.org/x/net/idna`
    that will convert between Unicode and its punycode value. There is an ongoing
    discussion at “Figure Out IDNA Punycode Story” ([`https://github.com/golang/go/issues/13835`](https://github.com/golang/go/issues/13835))
    about this topic.


    We can try the IDNs package against the aforementioned domain, `日本語.jp`; create
    the file `punycode.go`.


    ```

    ch8$ vi punycode.go

    package main

    import (

    "fmt"

    "golang.org/x/net/idna"

    "net/url"

    )

    func main() {

    s := "https://日本語.jp:8443"

    r1, _ := idna.ToASCII(s)

    r2, _ := idna.ToUnicode(r1)

    fmt.Println(r1)

    fmt.Println(r2)

    fmt.Println(url.QueryEscape(s))

    }

    ch8$ go mod init example.com/user/punycode

    ch8$ go mod tidy

    ch8$ go run punycode.go

    xn--https://-5y4qg6h355l.jp:8443

    https://日本語.jp:8443

    https%3A%2F%2F%E6%97%A5%E6%9C%AC%E8%AA%9E.jp%3A8443

    ```


    Internationalized domain names open up the possibility of what are called *homograph*
    attacks. Many Unicode characters have a similar appearance, such as the Russian
    o (U+043E), the Greek o (U+03BF), and the English o (U+006F). A domain name using
    a homograph such as `google.com` (with two Russian o’s) could cause havoc. A variety
    of defenses are known, such as always displaying the punycode (here `xn—ggle-55da.com`,
    using the Punycode converter).


    The path in a URI/URL is more complex to handle, as it refers to a path relative
    to an HTTP server that may be running in a particular localized environment. The
    encoding may not be UTF-8, or even Unicode. The IRI (Internationalized Resource
    Identifier) manages this by first converting any localized string to UTF-8 and
    then percent-escaping any non-ASCII bytes. The W3C page entitled “An Introduction
    to Multilingual Web Addresses” ([`https://www.w3.org/International/articles/idn-and-iri/`](https://www.w3.org/International/articles/idn-and-iri/))
    has more information. Converting from other encodings to UTF-8 was covered in
    Chapter [6](#436770_2_En_6_Chapter.xhtml), while Go has the functions in `net/url`
    of `QueryEscape/QueryUnescape` and in Go 1.8 of `PathEscape/PathUnescape` to do
    the percent conversions.


    ### HTTP Characteristics


    HTTP is a stateless, connectionless, reliable protocol. In the simplest form,
    each request from a user agent is handled reliably, and then the connection is
    broken.


    In the earliest version of HTTP, each request involved a separate TCP connection,
    so if many resources were required (such as images embedded in an HTML page),
    then many TCP connections had to be set up and torn down in a short space of time.


    HTTP 1.1 added many optimizations in HTTP, which added complexity to the simple
    structure but created a more efficient and reliable protocol. HTTP/2 has adopted
    a binary form for further efficient gains. HTTP/3 goes one step further by replacing
    the typical TCP socket with UDP along with other related improvements (e.g., built-in
    security via TLS).


    ### Versions


    There are four versions of HTTP:


    *   Version 0.9 (1991): Totally obsolete

    *   Version 1.0 (1996): Almost obsolete

    *   Version 1.1 (1999): The most popular version at present

    *   Version 2 (2015): The latest version

    *   Version 3 (~2022): In final steps of formal approval, already in production
    use


    Each version must understand the requests and responses of earlier versions.


    ### HTTP/0.9


    HTTP/0.9 was the original HTTP defined in 1991 by Tim Berners-Lee. You can find
    the specification here: [`https://www.w3.org/Protocols/HTTP/AsImplemented.html`](https://www.w3.org/Protocols/HTTP/AsImplemented.html).


    Request format:


    ```

    Request = Simple-Request

    Simple-Request = "GET" SP Request-URI CRLF

    ```


    #### Response Format


    A response is of the following form:


    ```

    Response = Simple-Response

    Simple-Response = [Entity-Body]

    ```


    The aforementioned only provides a glimpse into HTTP/0.9 (e.g., SP means “space”).
    Since it is no longer used, we won’t spend more time on it.


    ### HTTP/1.0


    This version added much more information to the requests and responses. Rather
    than “growing” the 0.9 format, it was just left alongside the new version. At
    this point, the W3C and IETF organizations were much more involved. The HTTP/1.0
    specification can be found here: [`https://datatracker.ietf.org/doc/html/rfc1945`](https://datatracker.ietf.org/doc/html/rfc1945).


    Of note, Prof. Roy Fielding during this period became known for his development
    of REST. His dissertation containing much of REST can be found here: [`https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm`](https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm).


    #### Request Format


    The format of requests from client to server is:


    ```

    Request = Simple-Request | Full-Request

    Simple-Request = "GET" SP Request-URI CRLF

    Full-Request = Request-Line

    *(General-Header

    | Request-Header

    | Entity-Header)

    CRLF

    [Entity-Body]

    ```


    A `Simple-Request` is an HTTP/0.9 request and must be replied to by a `Simple-Response`.


    A `Request-Line` has this format:


    ```

    Request-Line = Method SP Request-URI SP HTTP-Version CRLF

    ```


    where:


    ```

    Method = "GET" | "HEAD" | POST |

    extension-method

    ```


    Here’s an example:


    ```

    GET http://jan.newmarch.name/index.html HTTP/1.0

    ```


    #### Response Format


    A response is of the following form:


    ```

    Response = Simple-Response | Full-Response

    Simple-Response = [Entity-Body]

    Full-Response = Status-Line

    *(General-Header

    | Response-Header

    | Entity-Header)

    CRLF

    [Entity-Body]

    ```


    The `Status-Line` gives information about the fate of the request:


    ```

    Status-Line = HTTP-Version SP Status-Code SP Reason-Phrase CRLF

    ```


    Here’s an example:


    ```

    HTTP/1.0 200 OK

    ```


    The status codes in the status line are as follows:


    ```

    Status-Code =     "200" ; OK

    | "201" ; Created

    | "202" ; Accepted

    | "204" ; No Content

    | "301" ; Moved permanently

    | "302" ; Moved temporarily

    | "304" ; Not modified

    | "400" ; Bad request

    | "401" ; Unauthorized

    | "403" ; Forbidden

    | "404" ; Not found

    | "500" ; Internal server error

    | "501" ; Not implemented

    | "502" ; Bad gateway

    | "503" | Service unavailable

    | extension-code

    ```


    Some codes were not defined at the time of the HTTP/1.0 standard. For example,
    203 “Non-Authoritative Information” and 303 “See Other” are defined in HTTP/1.1.


    The `General-Header` is typically the date, whereas the `Response-Header` is the
    location, the server, or an authentication field.


    The `Entity-Header` contains useful information about the `Entity-Body` to follow:


    ```

    Entity-Header = Allow

    | Content-Encoding

    | Content-Length

    | Content-Type

    | Expires

    | Last-Modified

    | extension-header

    ```


    For example (where the types of field are given after a `//`):


    ```

    HTTP/1.1 200 OK                             // status line

    Date: Fri, 29 Aug 2003 00:59:56 GMT         // general header

    Server: Apache/2.0.40 (Unix)                // response header

    Content-Length: 1595                        // entity header

    Content-Type: text/html; charset=ISO-8859-1 // entity header

    ```'
