    func handleClient(conn net.Conn) {

    defer conn.Close()

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    if err != nil {

    conn.Close()

    return

    }

    s := strings.Split(string(buf[0:n]), " ")

    log.Println(s)

    // decode request

    switch s[0] {

    case CD:

    chdir(conn, s[1])

    case DIR:

    dirList(conn)

    case PWD:

    pwd(conn)

    default:

    log.Println("Unknown command ", s)

    }

    }

