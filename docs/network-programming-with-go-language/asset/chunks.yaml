  trans: '

    ### 基本路由


    了解了如何将 IP 地址与子网掩码进行（二进制）与运算以得出网络 IP 后，它的用途是什么呢？其主要用途在于路由：路由器需要确定下一跳（即数据包发送的目的地）。由于计算机通常不止一跳之遥，我们需要借助一系列路由器来传输流量。每个路由器都维护着一个查找表，并据此决定将流量转发至何处。如果为每个目标
    IP 都映射一个特定的下一跳，效率会非常低下。因此，我们改为将多个 IP 路由至同一个特定的下一跳。换句话说，一个子网对应一个特定的下一跳。下面是一个将数据包路由到特定目的地的示例。


    ```

    ch3$ vi ipv4router.go

    /* IPv4Router

    */

    package main

    import (

    "fmt"

    "net"

    )

    func main() {

    routingTable := []struct {

    subnetmask net.IP

    network    net.IP

    nextHop    net.IP

    }{

    {net.IP{255, 255, 255, 240}, net.IP{192, 17, 7, 208}, net.IP{192, 12, 7, 15}},

    {net.IP{255, 255, 255, 240}, net.IP{192, 17, 7, 144}, net.IP{192, 12, 7, 67}},

    {net.IP{255, 255, 255, 0}, net.IP{192, 17, 7, 0}, net.IP{192, 12, 7, 251}},

    {net.IP{0, 0, 0, 0}, net.IP{0, 0, 0, 0}, net.IP{10, 10, 10, 10}},

    }

    incomingPacketsToRoute := []struct {

    sourceAddr      net.IP

    destinationAddr net.IP

    data            string

    }{

    {net.IP{1, 2, 3, 4}, net.IP{2, 3, 4, 5}, "who knows, send to 0.0.0.0"},

    {net.IP{1, 2, 3, 4}, net.IP{192, 17, 7, 20}, "better be 192.17.7.251"},

    }

    for _, packetToRoute := range incomingPacketsToRoute {

    for _, routingEntry := range routingTable {

    r := packetToRoute.destinationAddr.Mask(net.IPMask(routingEntry.subnetmask))

    if r.Equal(routingEntry.network) {

    fmt.Printf("For destination %s nexthop is %s\n", packetToRoute.destinationAddr,
    routingEntry.nextHop)

    break //check remaining ips

    }

    }

    }

    }

    ch3$ go run IPv4Router.go

    For destination 2.3.4.5 nexthop is 10.10.10.10

    For destination 192.17.7.20 nexthop is 192.12.7.251

    ```


    如上述输出所示，第一个数据包的目的地为 `2.3.4.5`，但路由表中未找到匹配项。路由表中的最后一条记录通常是默认路由。在我们的表中，其默认的下一跳是 `10.10.10.10`。第二个数据包的目的地
    `192.17.7.20` 与网络 IP `192.17.7.0` 匹配，其对应的下一跳是 `192.12.7.251`。


    ### IPAddr 类型


    `net` 包中的许多其它函数和方法会返回一个指向 `IPAddr` 的指针。这只是一个包含 IP 地址（以及 IPv6 地址可能需要的区域标识）的结构体。当存在多个网络接口的模糊
    IPv6 地址时，可能需要区域标识。您可以在此处了解区域（IPv6 范围地址）的相关信息：[`https://datatracker.ietf.org/doc/html/rfc4007`](https://datatracker.ietf.org/doc/html/rfc4007)。


    ```

    type IPAddr {

    IP IP

    Zone string

    }

    ```


    该类型的主要用途是对 IP 主机名执行 DNS 查找。


    ```

    func ResolveIPAddr(net, addr string) (*IPAddr, error)

    ```


    其中 `net` 的值可以是 `ip`、`ip4` 或 `ip6`。这在名为 `resolveip.go` 的程序中有所展示：


    ```

    ch3$ vi resolveip.go

    /* ResolveIP

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s hostname\n", os.Args[0])

    }

    name := os.Args[1]

    addr, err := net.ResolveIPAddr("ip", name)

    if err != nil {

    log.Fatalln("Resolution error", err.Error())

    }

    fmt.Println("Resolved address is ", addr.String())

    }

    ```


    运行此程序：


    ```

    ch3$ go run resolveip.go www.google.com

    ```


    会返回以下结果：


    ```

    Resolved address is 142.250.64.22

    ```


    如果将 `ResolveIPAddr()` 中 `net` 类型的第一个参数指定为 `ip6` 而非 `ip`，则会得到如下结果：


    ```

    Resolved address is  2404:6800:4006:801::2004

    ```


    根据 Google 从您地址所在位置呈现出的不同情况，您可能会得到不同的结果。


    根据 `ResolveIPAddr` 的文档，其参数在 `Dial` (`go doc net.Dial`) 中有详细说明。*网络*参数必须属于 IP 协议族，即
    `ip`、`ip4` 或 `ip6`。*网络*参数后可选地追加一个协议，例如 `icmp` 或其协议编号 `1`。


    ```

    addr, err := net.ResolveIPAddr("ip4:icmp", name)

    ```


    通过使用*网络*参数和可选的*协议*，我们可以验证*名称*是否可以用于该特定目的。例如，如果我们对 `ip4:icmp` 使用 IPv6 地址，则会失败。要了解更多信息，可以查阅内部文档
    `go doc -u net.protocols`。需要使用 `-u` 参数，因为 `var protocols` 是未导出的。


    前面的代码使用了名为 *name* 的变量。官方文档将该参数称为 *address*。我们使用 *name* 是为了说明传入的不仅仅可以是 IP 地址。通常，如果您的
    IP 端点（*name/address*）可以解析为多个 IP 地址，则不应使用 `ResolveIPAddr`。当存在多个结果时，以下函数会更有帮助。


    ### 主机规范名称和地址查找


    `ResolveIPAddr` 函数会对主机名执行 DNS 查找，并返回单个 IP 地址。其运作方式取决于操作系统及其配置。例如，Linux/UNIX 系统可能会使用
    `/etc/resolv.conf` 或 `/etc/hosts`，其搜索顺序在 `/etc/nsswitch.conf` 中设置。


    许多主机可能拥有多个名称（例如，[`www.myserver.com`](http://www.myserver.com) -> `myserver.com`）；这些
    CNAME 记录（规范名称）最终会解析为一个 A 记录（例如，`myserver.com` -> IP）。如果您想查找规范名称，请使用 `LookupCNAME`：


    ```

    func LookupCNAME(name string) (cname string, err error).

    ```


    某些主机可能有多个 IP 地址，这通常是由于安装了多个网络接口卡。它们也可能拥有多个主机名作为别名。`LookupHost` 函数会返回一个地址切片。


    ```

    func LookupHost(name string) (cname string, addrs []string, err error)

    ```


    以下名为 `lookuphost.go` 的程序演示了这两个函数：


    ```

    ch3$ vi lookuphost.go

    /* LookupHost

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s hostname\n", os.Args[0])

    }

    name := os.Args[1]

    cname, _ := net.LookupCNAME(name)

    fmt.Println(cname)

    addrs, err := net.LookupHost(cname)

    if err != nil {

    log.Fatalln("Error: ", err.Error())

    }

    for _, addr := range addrs {

    fmt.Println(addr)

    }

    }

    ```


    我们首先通过查找规范名称来标准化主机名。然后查看该结果名称是否对应一个或多个 IP 地址。请注意，此函数返回的是字符串，而非 IP 地址值。当您运行上述程序时：


    ```

    ch3$ go run lookuphost.go go.dev

    ```


    它会输出类似以下内容：


    ```

    2001:4860:4802:32::15

    2001:4860:4802:36::15

    2001:4860:4802:38::15

    2001:4860:4802:34::15

    216.239.32.21

    216.239.36.21

    216.239.38.21

    216.239.34.21

    ```


    如果您在 UNIX 平台上，可以通过 `dig` 命令来比较这些结果。


    ```

    ch3$ ch3 % dig go.dev A go.dev AAAA +short

    216.239.34.21

    216.239.38.21

    216.239.32.21

    216.239.36.21

    2001:4860:4802:38::15

    2001:4860:4802:34::15

    2001:4860:4802:36::15

    2001:4860:4802:32::15

    ```


    还有许多其他的 Lookup 函数可以学习。


    ```

    go doc net | grep Lookup

    like Dial or directly with functions like LookupHost and LookupAddr, varies

    func LookupAddr(addr string) (names []string, err error)

    func LookupCNAME(host string) (cname string, err error)

    func LookupHost(host string) (addrs []string, err error)

    func LookupIP(host string) ([]IP, error)

    func LookupMX(name string) ([]*MX, error)

    func LookupNS(name string) ([]*NS, error)

    func LookupPort(network, service string) (port int, err error)

    func LookupSRV(service, proto, name string) (cname string, addrs []*SRV, err error)

    func LookupTXT(name string) ([]string, error)

    ```


    其中一些与电子邮件有关，包括 MX 和 TXT；另一些用于通用资源标识，如 CNAME、Host 和 NS。

    '
- fmt: '# Services


    Services run on host machines. They are typically long lived and are designed
    to wait for requests and respond to them. There are many types of services, and
    there are many ways in which they can offer their services to clients. The Internet
    world bases many of these services on two methods of communication – TCP and UDP
    – although there are other communication protocols such as SCTP waiting in the
    wings to take over. Many other types of service, such as peer to peer, remote
    procedure calls, communicating agents, and many others, are built on top of TCP
    and UDP.


    ## Ports


    Services live on host machines. We can locate a host using an IP address. But
    on each computer, there may be many services, and a simple way is needed to distinguish
    between them. The method used by TCP, UDP, SCTP, and others is to use a port number.
    This is an unsigned integer between 1 and 65,535, and each service will associate
    itself with one or more of these port numbers.


    There are many “standard” ports. Telnet typically uses port 23 with the TCP protocol.
    DNS uses port 53, either with TCP or with UDP. FTP uses ports 21 and 20, one for
    commands and the other for data transfer. HTTP usually uses port 80, but it often
    uses ports 8000, 8080, and 8088, all with TCP. The X Window System often takes
    ports 6000–6007, both on TCP and UDP.


    On a UNIX system, the commonly used ports are listed in the file `/etc/services`.
    Go has a function to look up ports on all systems:


    ```

    func LookupPort(network, service string) (port int, err error)

    ```


    The `network` argument is a string such as `"tcp"` or `"udp"`, while the `service`
    is a string such as `"telnet"` or `"domain"` (for DNS).


    A program using this is `lookupport.go`:


    ```

    ch3$ vi lookupport.go

    /* LookupPort

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 3 {

    log.Fatalln("Usage: %s network-type service\n", os.Args[0])

    }

    networkType := os.Args[1]

    service := os.Args[2]

    port, err := net.LookupPort(networkType, service)

    if err != nil {

    log.Fatalln("Error: ", err.Error())

    }

    fmt.Println("Service port ", port)

    }

    ```


    For example:


    ```

    ch3$ go run lookupport.go tcp telnet

    Service port  23

    ch3$ go run lookupport.go udp quake

    Service port  26000

    ```


    There is more to port management than using a default service mapping (e.g., SSH
    to 22). One idea is called ephemeral ports; these ports range typically from 32768
    to 60999 (they can vary by OS). Ephemeral ports are used by services to move per-client
    traffic to a temporary (i.e., ephemeral) port; at the communication session conclusion,
    the port is released. As an additional concern, various software platforms also
    use ranges of ports for predefined purposes; for example, Kubernetes uses the
    range 32000 to 32768 by default for exposing services on its internal network.
    There is no central management for port usage, and collisions can occur. Verification
    and recovery logic is the best practice when dealing with ports.


    ### The TCPAddr Type


    The `TCPAddr` type is a structure containing an IP, a port, and a zone. The zone
    is required to distinguish between possible ambiguous IPv6 link-local and site-local
    addresses, as different network interface cards (NICs) may have the same IPv6
    address.


    ```

    type TCPAddr struct {

    IP   IP

    Port int

    Zone string

    }

    ```


    The function to create a `TCPAddr` is `ResolveTCPAddr`:


    ```

    func ResolveTCPAddr(net, addr string) (*TCPAddr, error)

    ```


    where `net` is one of `tcp`, `tcp4`, or `tcp6` and the `addr` is a string composed
    of a hostname or IP address, followed by the port number after a `:`, such as
    `www.google.com:80` or `127.0.0.1:ssh`. If the address is an IPv6 address, which
    already has colons in it, then the host part must be enclosed in square brackets,
    such as `[::1]:23`. Another special case is often used for servers, where the
    host address is zero, so the TCP address is really just the port name, as in `:80`
    for an HTTP server.


    Similar to `IPAddr`, resolving to `TCPAddr` (or `UDPAddr` – will see later) allows
    us to verify and normalize our network end points.


    ## TCP Sockets


    When you know how to reach a service via its network and port IDs, what then?
    If you are a client, you need an API that will allow you to connect to a service
    and then to send messages to that service and read replies back from the service.


    If you are a server, you need to be able to bind to a port and listen at it. When
    a message comes in, you need to be able to read it and write back to the client.


    The `net.TCPConn` is the Go type that allows full duplex communication between
    the client and the server. Two major methods of interest are as follows:


    ```

    func (c *TCPConn) Write(b []byte) (n int, err error)

    func (c *TCPConn) Read(b []byte) (n int, err error)

    ```


    A `TCPConn` is used by both a client and a server to read and write messages.


    Note that a `TCPConn` implements the `io.Reader` and `io.Writer` interfaces so
    that any method using a reader or writer can be applied to a `TCPConn`.'
