  trans: '

    # UDP 数据报


    在无连接协议中，每条消息都包含其来源和目的地的信息。不会建立使用长期套接字的"会话"。UDP 客户端和服务器利用数据报，这些数据报是包含源和目的地信息的独立消息。这些消息不维护任何状态，除非客户端或服务器自行维护。消息不保证送达，也可能会乱序到达。


    客户端最常见的情况是发送一条消息并希望收到回复。服务器最常见的情况是接收一条消息，然后向该客户端发送一个或多个回复。然而，在对等场景中，服务器可能只是将消息转发给其他对等方。


    Go 语言中 TCP 和 UDP 处理的主要区别在于如何处理来自多个客户端的数据包，没有 TCP 会话的缓冲来管理事务。所需的主要调用如下：


    ```

    func ResolveUDPAddr(network, address string) (*UDPAddr, error)

    func DialUDP(network string, laddr, raddr *UDPAddr) (*UDPConn, error)

    func ListenUDP(network string, laddr *UDPAddr) (*UDPConn, error)

    func (c *UDPConn) ReadFromUDP(b []byte) (n int, addr *UDPAddr, err error)

    func (c *UDPConn) WriteToUDP(b []byte, addr *UDPAddr) (int, error)

    ```


    UDP 时间服务的客户端不需要做太多更改；只需将 `udpdaytimeclient.go` 程序中的 `...TCP...` 调用改为 `...UDP...`
    调用：


    ```

    ch3$ vi udpdaytimeclient.go

    /* UDPDaytimeClient

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s host:port", os.Args[0])

    }

    service := os.Args[1]

    udpAddr, err := net.ResolveUDPAddr("udp", service)

    checkError(err)

    conn, err := net.DialUDP("udp", nil, udpAddr)

    checkError(err)

    _, err = conn.Write([]byte("anything"))

    checkError(err)

    var buf [512]byte

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:n]))

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    服务器在 `udpdaytimeserver.go` 程序中需要做更多更改：


    ```

    ch3$ vi udpdaytimeserver.go

    /* UDPDaytimeServer

    */

    package main

    import (

    "log"

    "net"

    "time"

    )

    func main() {

    service := ":1200"

    udpAddr, err := net.ResolveUDPAddr("udp", service)

    checkError(err)

    conn, err := net.ListenUDP("udp", udpAddr)

    checkError(err)

    for {

    handleClient(conn)

    }

    }

    func handleClient(conn *net.UDPConn) {

    var buf [512]byte

    _, addr, err := conn.ReadFromUDP(buf[0:])

    checkError(err)

    daytime := time.Now().String()

    conn.WriteToUDP([]byte(daytime), addr)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    服务器运行如下：


    ```

    ch3$ go run udpdaytimeserver.go

    ```


    同一主机上的客户端运行如下：


    ```

    ch3$ go run udpdaytimeclient.go :1200

    ```


    客户端输出类似于：


    ```

    2022-01-03 18:57:00.616532 -0500 EST m=+8.044046910

    ```


    ## 服务器监听多个套接字


    服务器可能不仅要监听一个端口，还要监听多个端口上的多个客户端。在这种情况下，它必须在这些端口之间使用某种轮询机制。


    在 C 语言中，`select()` 调用让内核来完成这项工作。该调用接受多个文件描述符。进程被挂起。当其中某个描述符上的 I/O 准备就绪时，进程会被唤醒并继续执行。这比忙轮询更经济。在
    Go 中，你可以通过为每个端口使用不同的 `go` 例程来实现相同的效果。当底层的 `select()` 发现该线程的 I/O 已准备就绪时，该线程将变为可运行状态。


    ## Conn、PacketConn 和 Listener 类型


    到目前为止，我们通过使用例如 `DialTCP` 和 `DialUDP`（分别返回 `TCPConn` 和 `UDPConn`）来区分 TCP 和 UDP
    的 API。`Conn` 类型是一个接口，`TCPConn` 和 `UDPConn` 都实现了这个接口。在很大程度上，你可以使用这个接口而不是这两种具体类型。


    你可以使用一个单一的函数，而不是为 TCP 和 UDP 分别使用不同的拨号函数：


    ```

    func Dial(network, address string) (Conn, error)

    func DialIP(network string, laddr, raddr *IPAddr) (*IPConn, error)

    ```


    `network` 可以是 `tcp`、`tcp4`（仅 IPv4）、`tcp6`（仅 IPv6）、`udp`、`udp4`（仅 IPv4）、`udp6`（仅
    IPv6）、`ip`、`ip4`（仅 IPv4）和 `ip6`（仅 IPv6）中的任意一个，以及一些特定于 UNIX 的，例如用于 UNIX 套接字的 `unix`。它将返回
    `Conn` 接口的适当实现。请注意，此函数接受一个字符串而不是地址作为 (`r)addr` 参数，这样使用它的程序可以避免先确定地址类型。


    使用此函数可以对程序进行微小更改。例如，前面从网页获取 `HEAD` 信息的程序可以重写为 `ipgetheadinfo.go`：


    ```

    ch3$ vi ipgetheadinfo.go

    /* IPGetHeadInfo

    */

    package main

    import (

    "bytes"

    "fmt"

    "io"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s host:port", os.Args[0])

    }

    service := os.Args[1]

    conn, err := net.Dial("tcp", service)

    checkError(err)

    _, err = conn.Write([]byte("HEAD / HTTP/1.0\r\n\r\n"))

    checkError(err)

    result, err := readFully(conn)

    checkError(err)

    fmt.Println(string(result))

    }

    func readFully(conn net.Conn) ([]byte, error) {

    defer conn.Close()

    result := bytes.NewBuffer(nil)

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    result.Write(buf[0:n])

    if err != nil {

    if err == io.EOF {

    break

    }

    return nil, err

    }

    }

    return result.Bytes(), nil

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    可以在我的机器上运行如下：


    ```

    ch3$ go run ipgetheadinfo.go yahoo.com:80 # 不能使用 go.dev，因为它在 443 端口上使用 TLS

    ```


    它会打印关于运行在端口 80 上的服务器的以下信息：


    ```

    HTTP/1.0 200 OK

    Date: Tue, 04 Jan 2022 00:02:13 GMT

    Server: ATS

    Cache-Control: no-store, no-cache, max-age=0, private

    Content-Type: text/html

    Content-Language: en

    Expires: -1

    X-Frame-Options: SAMEORIGIN

    Content-Length: 12

    ```


    编写服务器也可以使用此函数类似地简化：


    ```

    func Listen(network, address string) (Listener, error)

    ```


    这将返回一个实现 `Listener` 接口的对象。此接口有一个方法 `Accept`：


    ```

    type Listener interface {

    // Accept 等待并返回监听器上的下一个连接。

    Accept() (Conn, error)

    // Close 关闭监听器。

    // 任何被阻塞的 Accept 操作都将被解除阻塞并返回错误。

    Close() error

    // Addr 返回监听器的网络地址。

    Addr() Addr

    }

    ```


    这将允许构建一个服务器。使用它，之前给出的多线程 `Echo` 服务器变成了 `threadedipechoserver.go`：


    ```

    ch3$ vi threadedipechoserver.go

    /* ThreadedIPEchoServer

    */

    package main

    import (

    "log"

    "net"

    )

    func main() {

    service := ":1200"

    listener, err := net.Listen("tcp", service)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    defer conn.Close()

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    checkError(err)

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    如果你想编写一个 UDP 服务器，可以使用名为 `PacketConn` 的接口以及一个返回其实例的方法：


    ```

    func ListenPacket(network, address string) (PacketConn, error)

    ```


    此接口的主要方法是 `ReadFrom` 和 `WriteTo`，用于处理数据包的读取和写入。


    Go 的 `net` 包推荐使用这些接口类型而不是具体类型。但是，使用它们会丢失特定的方法，例如 `TCPConn` 的 `SetKeepAlive` 和
    `UDPConn` 的 `SetReadBuffer`，除非你进行类型转换。由你来选择。

    '
- fmt: "# Raw Sockets and the `IPConn` Type\n\nThis section covers advanced material\
    \ that most programmers are unlikely to need. It deals with *raw sockets*, which\
    \ allow programmers to build their own IP protocols or use protocols other than\
    \ TCP or UDP.\n\nTCP and UDP are not the only protocols built above the IP layer.\
    \ The website ([`http://www.iana.org/assignments/protocol-numbers`](http://www.iana.org/assignments/protocol-numbers))\
    \ lists about 140 of them (this list is often available on UNIX systems in the\
    \ file `/etc/protocols`). TCP and UDP are only numbers 6 and 17, respectively,\
    \ on this list.\n\nGo allows you to build so-called raw sockets, to enable you\
    \ to communicate using one of these other protocols, or even to build your own.\
    \ But it gives minimal support: it will connect hosts and write and read packets\
    \ between the hosts. In a later chapter, we look at designing and implementing\
    \ your own protocols above TCP; this section considers the same type of problem,\
    \ but at the IP layer.\n\nTo keep things simple, we use almost the simplest possible\
    \ example: how to send an IPv4 ping message to a host. Ping uses the `echo` command\
    \ from the ICMP protocol. This is a byte-oriented protocol, in which the client\
    \ sends a stream of bytes to another host and the host replies. The format of\
    \ the ICMP packet payload is as follows:\n\n- The first byte is 8, standing for\
    \ the echo message.\n- The second byte is zero.\n- The third and fourth bytes\
    \ are a checksum on the entire message.\n- The fifth and sixth bytes are an arbitrary\
    \ identifier.\n- The seventh and eight bytes are an arbitrary sequence number.\n\
    - The rest of the packet is user data.\n\nThe packet can be sent using the `Conn.Write`\
    \ method, which prepares the packet with this payload. The replies received include\
    \ the IPv4 header, which takes 20 bytes. (See, e.g., the Wikipedia article on\
    \ the Internet Control Message Protocol, ICMP.)\n\nThe following program called\
    \ `ping.go` will prepare an IP connection, send a ping request to a host, and\
    \ get a reply. You may need root access in order to run it successfully:\n\n```\n\
    ch3$ vi ping.go\n/* Ping\n*/\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net\"\
    \n\"os\"\n)\n// change this to your own IP address or leave set to 0.0.0.0\nconst\
    \ myIPAddress = \"0.0.0.0\"\nconst ipv4HeaderSize = 20\nfunc main() {\nif len(os.Args)\
    \ != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"host\")\n}\nlocalAddr, err :=\
    \ net.ResolveIPAddr(\"ip4\", myIPAddress)\ncheckError(err)\nremoteAddr, err :=\
    \ net.ResolveIPAddr(\"ip4\", os.Args[1])\ncheckError(err)\nconn, err := net.DialIP(\"\
    ip4:icmp\", localAddr, remoteAddr)\ncheckError(err)\nvar msg [512]byte\nmsg[0]\
    \ = 8  // echo\nmsg[1] = 0  // code 0\nmsg[2] = 0  // checksum, fix later\nmsg[3]\
    \ = 0  // checksum, fix later\nmsg[4] = 0  // identifier[0]\nmsg[5] = 13 // identifier[1]\
    \ (arbitrary)\nmsg[6] = 0  // sequence[0]\nmsg[7] = 37 // sequence[1] (arbitrary)\n\
    len := 8\n// now fix checksum bytes\ncheck := checkSum(msg[0:len])\nmsg[2] = byte(check\
    \ >> 8)\nmsg[3] = byte(check & 255)\n// send the message\n_, err = conn.Write(msg[0:len])\n\
    checkError(err)\nfmt.Print(\"Message sent:    \")\nfor n := 0; n > 16) + (sum\
    \ & 0xffff)\nsum += (sum >> 16)\nvar answer uint16 = uint16(^sum)\nreturn answer\n\
    }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error: %s\"\
    , err.Error())\n}\n}\n```\n\nIt is run using the destination address as an argument.\
    \ The received message should differ from the sent message in only the first type\
    \ byte and the third and fourth checksum bytes, as follows:\n\n```\nch3$ sudo\
    \ env \"PATH=$PATH\" go run ping.go google.com\nMessage sent:     8 0 247 205\
    \ 0 13 0 37\nMessage received: 0 0 255 205 0 13 0 37\n```\n\nNotice we are using\
    \ “sudo” (on Linux) since being root is required to use ICMP, as set in `DialIP`.\n\
    \n## Conclusion\n\nThis chapter considered programming at the IP, TCP, and UDP\
    \ levels. This is often necessary if you want to implement your own protocol or\
    \ build a client or server for an existing protocol.\n\n# 4. Data Serialization\n\
    \nA client and a server need to exchange information via messages. TCP and UDP\
    \ provide the transport mechanisms to do this. The two processes also need to\
    \ have a protocol in place so that message exchange can take place meaningfully.\n\
    \nMessages are sent across the network as a sequence of bytes, which has no structure\
    \ except as a linear stream of bytes. We address the various possibilities for\
    \ messages and the protocols that define them in the next chapter. In this chapter,\
    \ we concentrate on a component of messages – the data that is transferred.\n\n\
    A program will typically build complex data structures to hold the current program\
    \ state. In conversing with a remote client or service, the program will be attempting\
    \ to transfer such data structures across the network – that is, outside of the\
    \ application’s own address space.\n\n## Structured Data\n\nProgramming languages\
    \ use structured data such as the following:\n\n- Records/structures: A collection\
    \ of fields of possibly different data types where the type is fixed, also known\
    \ as a composition.\n- Variant records: A record that contains a value potentially\
    \ of differing types.\n- Array: Fixed size or varying, also known as an aggregation.\n\
    - String: Fixed size or varying.\n- Tables: Arrays of records; in data storage\
    \ terms, a record is a row.\n- Nonlinear structures such as:\n  - Circular linked\
    \ lists\n  - Binary trees\n  - Objects with references to other objects\n\nFor\
    \ our purpose, a composition is a data structure where nested elements do not\
    \ exist without the parent. In aggregation, the stored/nested elements can potentially\
    \ exist on their own.\n\nNone of the IP, TCP, or UDP packets know the meaning\
    \ of any of these data types. All that they (packets) can contain is a sequence\
    \ of bytes. Thus, an application has to *serialize* any data into a stream of\
    \ bytes in order to write it and *deserialize* the stream of bytes back into suitable\
    \ data structures on reading it. These two operations are known as *marshalling*\
    \ and *unmarshalling,* respectively. (³)\n\nFor example, consider sending the\
    \ following variable length table of two columns of variable length strings:\n\
    \n| fred | programmer |\n| liping | analyst |\n| sureerat | manager |\n\nThis\
    \ could be done in various ways. For example, suppose that it is known that the\
    \ data will be an unknown number of rows in a two-column table. Then a marshalled\
    \ form could be\n\n```\n3                // 3 rows, 2 columns (assumed from above\
    \ table)\n4 fred           // 4 char string, col 1\n10 programmer    // 10 char\
    \ string, col 2\n6 liping         // 6 char string, col 1\n7 analyst        //\
    \ 7 char string, col 2\n8 sureerat       // 8 char string, col 1\n7 manager  \
    \      // 7 char string, col 2\n```\n\nVariable length things can alternatively\
    \ have their length indicated by terminating them with an “illegal” value, such\
    \ as `\\0` for strings. The previous table could also be written with the number\
    \ of rows again, but each string terminated by `\\0` (the newlines are for readability,\
    \ not part of the serialization):\n\n```\nfred\\0\nprogrammer\\0\nliping\\0\n\
    analyst\\0\nsureerat\\0\nmanager\\0\n```\n\nAlternatively, it may be known that\
    \ the data is a three-row fixed table of two columns of strings of length 8 and\
    \ 10, respectively. Then a serialization of the table could be (again, the newlines\
    \ are not part of the serialization)\n\n```\nfred\\0\\0\\0\\0\nprogrammer\nliping\\\
    0\\0\nanalyst\\0\\0\\0\nsureerat\nmanager\\0\\0\\0\n```\n\n*Any of these formats\
    \ (and others) is okay, but the message exchange protocol must specify which one\
    \ is used or allow it to be determined at runtime.*"
