  trans: '

    ### HTML 页面中的 WebSocket


    WebSocket 最初的驱动力是允许浏览器等 HTTP 用户代理与服务器之间进行全双工交互。典型用例通常是浏览器中的 JavaScript 程序与服务器进行交互。在本节中，我们将构建一个
    Web/WebSocket 服务器，该服务器将提供一个 HTML 页面，该页面会建立一个 WebSocket，并使用 WebSocket 显示来自该服务器的信息。我们正在研究如图
    15-1 所示的场景。


    ![](img/436770_2_En_15_Fig1_HTML.png)


    图 15-1


    全双工交互场景


    物联网（IoT）时代已经来临。因此，我们可以预期来自传感器和传感器网络的数据将用于驱动执行器，并在浏览器中显示关于物联网网络的信息。有无数关于使用树莓派和
    Arduino 构建传感器网络的书籍，但我们将通过在一个“传感器”上显示 CPU 温度，并在网页中每隔几秒更新一次，来大幅简化此场景。


    来自 Debian 软件包 `lm-sensors` 的 Linux `sensors` 命令会将其所知的传感器值写入标准输出。在我的台式机上，`sensors`
    命令的输出如下所示：


    ```

    acpitz-virtual-0

    Adapter: Virtual device

    temp1:        +27.8°C  (crit = +105.0°C)

    temp2:        +29.8°C  (crit = +105.0°C)

    coretemp-isa-0000

    Adapter: ISA adapter

    Physical id 0:  +58.0°C  (high = +105.0°C, crit = +105.0°C)

    Core 0:         +57.0°C  (high = +105.0°C, crit = +105.0°C)

    Core 1:         +58.0°C  (high = +105.0°C, crit = +105.0°C)

    ```


    刷新时，`Core 0` 和 `Core 1` 的温度通常可能会发生变化。


    在 Windows 上，执行相同操作的命令如下：


    ```

    wmic /namespace:\\root\wmi PATH MSAcpi_ThermalZoneTemperature get CurrentTemperature

    ```


    运行时，其输出类似：


    ```

    42.4° C

    ```


    在 Mac 上，使用来自 [`https://github.com/lavoiesl/osx-cpu-temp`](https://github.com/lavoiesl/osx-cpu-temp)
    的命令 `osx-cpu-temp`。如果你不想经历这些步骤，只需替换为一个更简单的程序，例如 `date`。


    我们提供了一个 Go 程序，用于从 `ROOT_DIR` 目录提供 HTML 文档，然后从 URL `GetTemp` 建立一个 WebSocket。服务器端的
    WebSocket 每两秒获取 `sensors` 的输出，并将其发送到套接字的客户端。出于某种原因，这个 Web/WebSocket 服务器运行在端口 `12345`
    上。将 `exec.Command` 调用替换为任何其他有趣的系统调用。这里，我们使用简单的 `sensors.sh` 作为我们的温度程序（1 到 100
    之间的随机数）。


    ```

    ch15$ vi sensors.sh

    #!/bin/sh

    echo $(( ( RANDOM % 100 )  + 1 ))

    ```


    确保使其可执行：`chmod 700 sensors.sh`。


    服务器是 `temperatureserver.go`：


    ```

    ch15$ vi temperatureserver.go

    /* TemperatureServer

    */

    package main

    import (

    "fmt"

    "golang.org/x/net/websocket"

    "log"

    "net/http"

    "os/exec"

    "time"

    )

    var ROOT_DIR = "."

    func GetTemp(ws *websocket.Conn) {

    for {

    msg, err := exec.Command(ROOT_DIR + "/sensors.sh").CombinedOutput()

    checkError(err)

    fmt.Println("Sending to client: " + string(msg[:]))

    err = websocket.Message.Send(ws, string(msg[:]))

    if err != nil {

    fmt.Println("Can''t send")

    break

    }

    time.Sleep(time.Duration(2) * time.Second)

    var reply string

    err = websocket.Message.Receive(ws, &reply)

    if err != nil {

    fmt.Println("Can''t receive")

    break

    }

    fmt.Println("Received back from client: " + reply)

    }

    }

    func main() {

    fileServer := http.FileServer(http.Dir(ROOT_DIR))

    http.Handle("/GetTemp", websocket.Handler(GetTemp))

    http.Handle("/", fileServer)

    err := http.ListenAndServe(":12345", nil)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    按如下方式运行：


    ```

    ch15$ go run temperatureserver.go

    ```


    用于启动此功能的顶级 HTML 文件是 `websocket.html`；请确保将此文件复制到 `ROOT_DIR`。


