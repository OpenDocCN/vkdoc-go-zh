    ```

    ch4$ go run asn1basic.go

    Before marshalling:  2022-01-03 21:02:50.268961 -0500 EST m=+0.000121092

    After marshal/unmarshal:  2022-01-03 21:02:50 -0500 EST

    Before marshalling:  hello ¼

    After marshal/unmarshal:  hello ¼

    ```


    Review `go doc time.Time`; the first couple of paragraphs mention considerations
    when using time.Time and pointers.


    In general, you will probably want to marshal and unmarshal structures. Apart
    from the special case of time, Go will happily deal with structures, but not with
    pointers to structures. Operations such as `new` create pointers, so you have
    to dereference them before marshalling/unmarshalling them. Go normally dereferences
    pointers for you when needed, but not in this case, so you have to dereference
    them explicitly. These both work for a type `T, create asn1pointers.go`:


    ```

    ch4$ vi asn1pointers.go

    package main

    import (

    "encoding/asn1"

    "fmt"

    )

    type T struct {

    S string

    I int

    }

    func main() {

    // using variables

    t1 := T{"ok", 1}

    mdata1, _ := asn1.Marshal(t1)

    var newT1 T

    asn1.Unmarshal(mdata1, &newT1)

    fmt.Printf("Before marshal: %v, after unmarshal: %v\n", t1, newT1)

    // using pointers

    var t2 = new(T)

    t2.S = "still ok"

    t2.I = 2

    mdata2, _ := asn1.Marshal(*t2)

    var newT2 = new(T)

    asn1.Unmarshal(mdata2, newT2)

    fmt.Printf("Before marshal: %v, after unmarshal: %v\n", t2, newT2)

    }

    ch4$ go run asn1pointers.go

    Before marshal: {ok 1}, after unmarshal: {ok 1}

    Before marshal: &{still ok 2}, after unmarshal: &{still ok 2}

    ```


    Any suitable mix of pointers and variables will work as well.


    The fields of a structure must all be exportable, that is, field names must begin
    with an uppercase letter. Go uses the reflect package to marshal/unmarshal structures,
    so it must be able to examine all fields. This type cannot be marshalled:


    ```

    type T struct {

    Field1 int

    field2 int // not exportable

    }

    ```


    Both `Marshal` and `Unmarshal` produce related errors for the prior condition.
    We next create an example showing this condition; first, create driver.go.


    ```

