    HEAD\", url.String(), nil)\n    // 仅接受 UTF-8\n    request.Header.Add(\"Accept-Charset\"\
    , \"utf-8;q=1,ISO-8859-1;q=0\")\n    checkError(err)\n\n    response, err := client.Do(request)\n\
    \    checkError(err)\n\n    if response.StatusCode != http.StatusOK {\n      \
    \  log.Fatalln(response.Status)\n    }\n\n    fmt.Println(\"响应头部信息为\")\n    b,\
