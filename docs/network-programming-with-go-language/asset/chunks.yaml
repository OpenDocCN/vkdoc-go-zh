    ### The JSON Object


    It is expected that many WebSockets clients and servers will exchange data in
    JSON format. For Go programs, this means that a Go object will be marshalled into
    the JSON format, as described in Chapter [4](#436770_2_En_4_Chapter.xhtml), and
    then sent as UTF-8 strings, while the receiver will read this string and unmarshal
    it back into a Go object.


