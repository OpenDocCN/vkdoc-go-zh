  raw: '### The Codec Type


    The `Message` and `JSON` objects are both instances of the type `Codec`. This
    type is defined as follows:


    ```

    type Codec struct {

    Marshal   func(v interface{}) (data []byte, payloadType byte, err error)

    Unmarshal func(data []byte, payloadType byte, v interface{}) (err error)

    }

    ```


    The `Codec` type implements the `Send` and `Receive` methods used earlier. See
    more on this type with


    ```

    ch15$ go doc golang.org/x/net/websocket.Codec

    ```


    It is likely that WebSockets will also be used to exchange XML data. We can build
    an XML `Codec` object by wrapping the XML `marshal` and `unmarshal` methods discussed
    in Chapter [12](#436770_2_En_12_Chapter.xhtml) to give a suitable `Codec` object.


    We can create an `XMLCodec` package in this way, called xmlcodec`.go`:


    ```

    ch15$ vi xmlcodec.go

    /* XMLCodec

    */

    package main

    import (

    "encoding/xml"

    "golang.org/x/net/websocket"

    )

    func xmlMarshal(v interface{}) (msg []byte, payloadType byte, err error) {

    msg, err = xml.Marshal(v)

    return msg, websocket.TextFrame, nil

    }

    func xmlUnmarshal(msg []byte, payloadType byte, v interface{}) (err error) {

    err = xml.Unmarshal(msg, v)

    return err

    }

    var XMLCodec = websocket.Codec{xmlMarshal, xmlUnmarshal}

    ```


    We can then serialize Go objects such as a `Person` into an XML document and send
    them from a client to a server. The server to receive the document and print it
    to standard output is as follows, personserverxml.go:


    ```

    ch15$ vi personserverxml.go

    /* PersonServerXML

    */

    package main

    import (

    "fmt"

    "golang.org/x/net/websocket"

    "log"

    "net/http"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    func ReceivePerson(ws *websocket.Conn) {

    var person Person

    err := XMLCodec.Receive(ws, &person)

    if err != nil {

    fmt.Println("Can''t receive")

    } else {

    fmt.Println("Name: " + person.Name)

    for _, e := range person.Emails {

    fmt.Println("An email: " + e)

    }

    }

    }

    func main() {

    http.Handle("/", websocket.Handler(ReceivePerson))

    err := http.ListenAndServe(":12345", nil)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The client sending the `Person` object in XML form is `personclientxml.go`:


    ```

    ch15$ vi personclientxml.go

    /* PersonClientXML

    */

    package main

    import (

    "fmt"

    "golang.org/x/net/websocket"

    "log"

    "os"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "ws://host:port")

    }

    service := os.Args[1]

    conn, err := websocket.Dial(service, "", "http://localhost")

    checkError(err)

    person := Person{Name: "Jan",

    Emails: []string{"ja@newmarch.name",

    "jan.newmarch@gmail.com"},

    }

    err = XMLCodec.Send(conn, person)

    if err != nil {

    fmt.Println("Couldn''t send msg " + err.Error())

    }

    os.Exit(0)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The server is run as follows:


    ```

    ch15$ go run personserverxml.go xmlcodec.go

    ```


    The client is run as follows:


    ```

    ch15$ go run personclientxml.go xmlcodec.go ws://localhost:12345

    ```


    The output on the *server* side is what is sent by the *client*:


    ```

    Name: Jan

    An email: ja@newmarch.name

    An email: jan.newmarch@gmail.com

    ```


    As before, review the related codec object documentation (go doc encoding/xml).


    A reasonable next step is improve our security; we next upgrade our WebSocket
    to use TLS.


    ### WebSockets over TLS


    A WebSocket can be built above a secure TLS socket. We discussed in Chapter [8](#436770_2_En_8_Chapter.xhtml)
    how to use a TLS socket using the certificates from Chapter [7](#436770_2_En_7_Chapter.xhtml).
    That is used unchanged for WebSockets. That is, we use `http.ListenAndServeTLS`
    instead of `http.ListenAndServe`.


    Here is the echo server using TLS, echoservertls.go.


    ```

    ch15$ vi echoservertls.go

    /* EchoServerTLS

    */

    package main

    import (

    "log"

    "fmt"

    "golang.org/x/net/websocket"

    "net/http"

    )

    func Echo(ws *websocket.Conn) {

    fmt.Println("Echoing")

    for n := 0; n < 10; n++ {

    msg := "Hello  " + string(n+48)

    fmt.Println("Sending to client: " + msg)

    err := websocket.Message.Send(ws, msg)

    if err != nil {

    fmt.Println("Can''t send")

    break

    }

    var reply string

    err = websocket.Message.Receive(ws, &reply)

    if err != nil {

    fmt.Println("Can''t receive")

    break

    }

    fmt.Println("Received back from client: " + reply)

    }

    }

    func main() {

    http.Handle("/", websocket.Handler(Echo))

    err := http.ListenAndServeTLS(":12345",

    "jan.newmarch.name.pem",

    "private.pem", nil)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Before running the server, we need our certificate and key, created and used from
    Chapter [7](#436770_2_En_7_Chapter.xhtml)/8.


    ```

    ch15$ cp ../ch7/jan.newmarch.name.pem . ; cp ../ch7/private.pem .

    ch15$ go run echoservertls.go

    ```


    The client is the same echo client as before. All that changes is the URL, which
    uses the `wss` scheme instead of the `ws` scheme:


    ```

    ch15$ go run echoclient wss://localhost:12345/

    Fatal error  websocket.Dial wss://localhost:12345: x509: certificate signed by
    unknown authority

    exit status 1

    ```


    That will work fine if the TLS certificate offered by the server is valid. The
    certificate I am using is not: it is self-signed, and that is often a signal that
    you are entering a danger zone. If you want to keep going anyway, you need to
    employ the same “remove the safety check” that we did in Chapter [8](#436770_2_En_8_Chapter.xhtml)
    by turning on the TLS `InsecureSkipVerify` flag. That is done by the program `echoclienttls.go`,
    which sets up a configuration using this flag and then calls `DialConfig` in place
    of `Dial`.


    ```

    ch15$ vi echoclienttls.go

    /* EchoClientTLS

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "golang.org/x/net/websocket"

    "io"

    "log"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "wss://host:port")

    }

    config, err := websocket.NewConfig(os.Args[1],

    "http://localhost")

    checkError(err)

    tlsConfig := &tls.Config{InsecureSkipVerify: true}

    config.TlsConfig = tlsConfig

    conn, err := websocket.DialConfig(config)

    checkError(err)

    var msg string

    for {

    err := websocket.Message.Receive(conn, &msg)

    if err != nil {

    if err == io.EOF {

    // graceful shutdown by server

    break

    }

    fmt.Println("Couldn''t receive msg " +

    err.Error())

    break

    }

    fmt.Println("Received from server: " + msg)

    // return the msg

    err = websocket.Message.Send(conn, msg)

    if err != nil {

    fmt.Println("Couldn''t return msg")

    break

    }

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Run the client as follows (assuming echoservertls.go is running):


    ```

    ch15$ go run echoclienttls.go wss://localhost:12345

    Received from server: Hello  0

    ...

    Received from server: Hello  9

    ```


    Back on the server, we see the following:


    ```

    Echoing

    Sending to client: Hello  0

    Received back from client: Hello  0

    ...

    Sending to client: Hello  9

    Received back from client: Hello  9

    ```'
