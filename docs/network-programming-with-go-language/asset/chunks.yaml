- fmt: '### HTTP RPC Server


    Any RPC needs a transport mechanism to get messages across the network. Go can
    use HTTP or TCP. The advantage of the HTTP mechanism is that it can leverage the
    HTTP support library. You need to add an RPC handler to the HTTP layer, which
    is done using `HandleHTTP`, and then start an HTTP server. The complete code is
    `arithserver.go`:


    ```

    $ mkdir ch13

    $ cd ch13

    ch13$ vi arithserver.go

    /* ArithServer

    */

    package main

    import (

    "errors"

    "fmt"

    "net/http"

    "net/rpc"

    )

    type Values struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    type Arith int

    func (t *Arith) Multiply(args *Values, reply *int) error {

    *reply = args.A * args.B

    return nil

    }

    func (t *Arith) Divide(args *Values, quo *Quotient) error {

    if args.B == 0 {

    return errors.New("divide by zero")

    }

    quo.Quo = args.A / args.B

    quo.Rem = args.A % args.B

    return nil

    }

    func main() {

    arith := new(Arith)

    rpc.Register(arith)

    rpc.HandleHTTP()

    err := http.ListenAndServe(":1234", nil)

    if err != nil {

    fmt.Println(err.Error())

    }

    }

    ```


    and it is run by


    ```

    ch13$ go run arithserver.go

    ```


    Let the server run. Next, we look at the user of the RPC service, the RPC client.


    ### HTTP RPC Client


    The client needs to set up an HTTP connection to the RPC server. It needs to prepare
    a structure with the values to be sent and the address of a variable in which
    to store the results. Then it can make a `Call` with these arguments:


    *   The name of the remote function to execute

    *   The values to be sent

    *   The address of a variable in which to store the result


    A client that calls both functions of the arithmetic server is `arithclient.go`:


    ```

    ch13$ vi arithclient.go

    /* ArithClient

    */

    package main

    import (

    "fmt"

    "log"

    "net/rpc"

    "os"

    )

    type Args struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    func main() {

    if len(os.Args) != 2 {

    fmt.Println("Usage: ", os.Args[0], "server")

    os.Exit(1)

    }

    serverAddress := os.Args[1]

    client, err := rpc.DialHTTP("tcp", serverAddress+":1234")

    if err != nil {

    log.Fatal("dialing:", err)

    }

    // Synchronous call

    args := Args{17, 8}

    var reply int

    err = client.Call("Arith.Multiply", args, &reply)

    if err != nil {

    log.Fatal("arith error:", err)

    }

    fmt.Printf("Arith: %d*%d=%d\n", args.A, args.B, reply)

    var quot Quotient

    err = client.Call("Arith.Divide", args, &quot)

    if err != nil {

    log.Fatal("arith error:", err)

    }

    fmt.Printf("Arith: %d/%d=%d remainder %d\n", args.A, args.B,

    quot.Quo, quot.Rem)

    }

    ```


    When it runs, we see the following output:


    ```

    ch13$ go run arithclient.go localhost

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    ### TCP RPC Server


    A version of the server that uses TCP sockets is `tcparithserver.go`:


    ```

    ch13$ vi tcparithserver.go

    /* TCPArithServer

    */

    package main

    import (

    "errors"

    "log"

    "net"

    "net/rpc"

    )

    type Args struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    type Arith int

    func (t *Arith) Multiply(args *Args, reply *int) error {

    *reply = args.A * args.B

    return nil

    }

    func (t *Arith) Divide(args *Args, quo *Quotient) error {

    if args.B == 0 {

    return errors.New("divide by zero")

    }

    quo.Quo = args.A / args.B

    quo.Rem = args.A % args.B

    return nil

    }

    func main() {

    arith := new(Arith)

    rpc.Register(arith)

    tcpAddr, err := net.ResolveTCPAddr("tcp", ":1234")

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    /* This works:

    rpc.Accept(listener)

    */

    /* and so does this:

    */

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    rpc.ServeConn(conn)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Note that the call to `Accept` is blocking and just handles client connections.
    If the server wants to do other work as well, it should call this in a `go` routine.


    Launch the server as follows:


    ```

    ch13$ go run tcparithserver.go

    ```


    As before, we now look at the related client.


    ### TCP RPC Client


    A client that uses the TCP server and calls both functions of the arithmetic server
    is `tcparithclient.go`:


    ```

    ch13$ vi tcparithclient.go

    /* TCPArithClient

    */

    package main

    import (

    "fmt"

    "log"

    "net/rpc"

    "os"

    )

    type Args struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "server:port")

    }

    service := os.Args[1]

    client, err := rpc.Dial("tcp", service)

    if err != nil {

    log.Fatalln("dialing:", err)

    }

    // Synchronous call

    args := Args{17, 8}

    var reply int

    err = client.Call("Arith.Multiply", args, &reply)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d*%d=%d\n", args.A, args.B, reply)

    var quot Quotient

    err = client.Call("Arith.Divide", args, &quot)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d/%d=%d remainder %d\n", args.A, args.B,

    quot.Quo, quot.Rem)

    }

    ```


    When it’s run, we see the following:


    ```

    ch13$ go run tcparithclient.go localhost:1234

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    When choosing to use `rpc.HandleHTTP` vs. `rpc.ServeConn`, it’s more about control
    and speed. The TCP server gives us more control as it sits below HTTP. If that
    is unimportant, then the former `arithserver.go` may be the way.


    ### Matching Values


    You may have noticed that the types of the value arguments are not the same on
    the HTTP client and HTTP server. In the server, we used `Values`, while in the
    client, we used `Args`. That doesn’t matter, as we are following the rules of
    Gob serialization, and the names and types of the two structures’ fields match.
    Better programming practice would say that the names should be the same, of course!


    However, this does point out a possible trap in using Go RPC. If we change the
    structure in the server to be this:


    ```

    type Values struct {

    C, B int

    }

    ```


    then Gob has no problems. On the client side, the unmarshalling will ignore the
    value of `C` given by the server and use the default zero value for `A`. This
    could cause problems if, say, a divide by `A` (zero) was done.


    Using Go RPC will require a rigid enforcement of the stability of field names
    and types by the programmer. We note that there is no version control mechanism
    to do this and no mechanism in Gob to signal any possible mismatches. There is
    also no required external representation to act as a reference. If you are just
    adding fields, then it may be okay, but it will still need control. Perhaps adding
    a `version` field to the data structure would help.


    ## JSON


    This section adds nothing new to the earlier concepts. It just uses a different
    “wire” format for the data, JSON instead of Gob. As such, clients or servers could
    be written in other languages that understand sockets and JSON.


    ### JSON RPC Server


    A version of the server that uses JSON encoding is `jsonarithserver.go`:


    ```

    ch13$ vi jsonarithserver.go

