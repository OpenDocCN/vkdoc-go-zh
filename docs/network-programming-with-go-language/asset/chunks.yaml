    ### JSON RPC 客户端


    调用算术服务器两个函数的客户端是 `jsonarithclient.go`：


    ```

    $ vi jsonarithclient.go

    /* JSONArithCLient

    */

    package main

    import (

    "fmt"

    "log"

    "net/rpc/jsonrpc"

    "os"

    )

    type Args struct {

    A, B int

    }

    type Quotient struct {

    Quo, Rem int

    }

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "server:port")

    }

    service := os.Args[1]

    client, err := jsonrpc.Dial("tcp", service)

    if err != nil {

    log.Fatalln("dialing:", err)

    }

    // Synchronous call

    args := Args{17, 8}

    var reply int

    err = client.Call("Arith.Multiply", args, &reply)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d*%d=%d\n", args.A, args.B, reply)

    var quot Quotient

    err = client.Call("Arith.Divide", args, &quot)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d/%d=%d remainder %d\n", args.A, args.B,

    quot.Quo, quot.Rem)

    }

    ```


    它的运行方式如下：


    ```

    $ go run jsonarithclient.go localhost:1234

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    虽然不太明显（除了 `jsonrpc.Dial` 之外），请求和响应是通过 `encoding/json` 包进行编码和解码的。可以查阅相关文档，例如 `go
    doc -u jsonrpc.WriteRequest` 或源代码本身，位置在：`/usr/local/go/src/net/rpc/jsonrpc/client.go`。


    ## 结论


    RPC 是一种流行的分布式应用程序方式。本文基于 `Gob` 或 `JSON` 序列化技术，并使用 `HTTP` 和 `TCP` 作为传输层，展示了实现 RPC
    的几种方法。


    # 14. REST


    在前面的章节中，我们了解了 `HTTP`，并给出了一个 Web 系统的示例。然而，我们并未赋予该系统任何特定的结构，只是秉持着对问题足够简单的原则。有一种由
    `HTTP 1.1` 的主要作者之一（Roy Fielding）开发的架构风格，称为 `REST`（表述性状态转移）。在本章中，我们将探讨 `REST` 风格，以及它对于构建
    Web 应用程序意味着什么。为此，我们必须回到基础概念。


    `REST` 有许多必须遵循的组件，才能恰当地应用 `REST` 这个术语。不幸的是，它已经成为一个流行词，许多应用程序只包含了 `REST` 的“片段”，而非完整实现。我们将讨论
    Richardson 成熟度模型，该模型描述了 API 在通往 RESTful 之路上走得多远。


    在上一章中，我们讨论了 RPC（远程过程调用）。这是一种与 `REST` 完全不同的风格。我们还将比较这两种风格，探讨何时适合使用每种风格。


    ## URI 与资源


    资源是我们在网络或互联网上想要与之交互的“事物”。我喜欢把它们想象成对象，但并不要求其实现必须基于对象——它们只是应该“看起来像”一个事物，可能包含组件。


    每个资源都有一个或多个地址，称为 URI（统一资源标识符）。


    注意


    其国际化形式是 IRI——国际化资源标识符。


    这些地址具有以下通用形式：


    ```

    scheme:[//[user:password@]host[:port]][/]path[?query][#fragment]

    ```


    典型的例子是 URL（统一资源定位符），其中 scheme 是 `http` 或 `https`，host 通过其 IP 地址或 DNS 名称指代一台计算机，如下所示：


    ```

    https://jan.newmarch.name/IoT/index.html

    ```


    还有一些非 HTTP 的 URL 方案，例如 `telnet`、`news` 和 `IPP`（互联网打印协议）。这些方案也包含位置组件。此外，还有其他类型，例如
    URN（统一资源名称），它们通常是其他标识系统的包装器，并且不包含位置信息。例如，IETF 为通过 ISBN 标识的图书制定了一个标准的 URN 方案，比如本书的
    ISBN：


    ```

    urn:ISBN:978-1-4842-2692-6

    ```


    这些 URN 往往并未广泛使用，但仍然存在。IANA 统一资源名称（URN）命名空间列表可在 `https://www.iana.org/assignments/urn-namespaces/urn-namespaces.xhtml`
    找到。原始的方案（如 ISBN）仍然在使用中。


    资源的正式定义可能难以精确界定。例如，`http://www.google.com` 在某种意义上代表 Google（它是 URL 的方案和主机部分），但该主机肯定不是某台固定的计算机。同样，本书的
    ISBN 代表了本书的某些信息，但肯定不是指任何现存的副本（在撰写本章时，虽然 ISBN 已存在，但副本尚不存在）。


    尽管如此，我们仍将资源视为基本概念，而 URI 是这些资源的标识符。IETF 在统一资源标识符（URI）：通用语法（`https://www.ietf.org/rfc/rfc3986.txt`）中同样定义得比较模糊：“术语‘资源’在一般意义上用于指代任何可能被
    URI 标识的东西。”


    一个资源可能拥有多个 URI。作为一个人，我有许多不同的标识符：我的税号指向我的一个方面，即我的财务事务；我的医保卡号指向我作为医疗服务的接受者；我的名字（相当独特）常用于指代我的不同方面。我的
    URL `https://jan.newmarch.name` 指向我选择在网站上公开的那些方面。而 Google、LinkedIn、Facebook、Twitter
    等可能也有某种 URI 来标记它们选择保存的我的那些方面。


    各方都认同的是，资源是*名词*，而不是*动词*或*形容词*。对于银行账户，类似 `http://mybank/myaccount/withdraw` 的 URL
    不被视为资源，因为它包含了动词 `withdraw`。同样，`http://amazon.com/buy/book-id` 不会标记一个资源，因为它包含了动词
    `buy`（亚马逊没有这样的 URL）。


    这是 `REST` 在 `HTTP` 上的第一个关键点：识别信息系统中的资源，并为其分配 URL。这方面有一些惯例，最常见的是，如果存在层级结构，则应在 URL
    路径中反映出来。然而，这并不是必须的，因为信息也应该通过其他方式给出。


    `REST` 设计 URI 的方法仍然有点像一门艺术。合法（且完全合规）的 URI 未必就是“好的”`REST` URI，许多所谓 RESTful API
    的示例中，其 URI 也并非完全符合 RESTful 风格。2PartsMagic 在 RESTful URI 设计（`http://blog.2partsmagic.com/restful-uri-design/`）中提供了关于设计恰当
    URI 的良好建议。


    `REST` 设计 URI 的方法仍然有点像一门艺术。合法（且完全合规）的 URI 未必就是“好的”`REST` URI，许多所谓 RESTful API
    的示例中，其 URI 也并非完全符合 RESTful 风格。Golang 开发者博客简要概述了 `REST` 的一些概念：`https://go.dev/doc/tutorial/web-service-gin`。除了示例之外，OpenAPI
    是一个标准，可以帮助我们围绕“http apis”进行设计和工具化工作：`https://spec.openapis.org/oas/latest.html`。

