    \ IPv4 或 IPv6 地址的宽度不匹配，会导致 `CIDRMask` 返回 `nil`。然后将 `nil` 掩码值传递给 `addr.Mask` 会相应地返回\
    \ `nil`。我们可以讨论前面的例子是否过于简单而无法处理错误（可能吧）；但同样重要的是，要注意库返回了什么（即使它没有解释原因，例如，为什么返回 `nil`\
    \ 而不是错误字符串）。\n\n```\nch3$ go run mask.go 103.232.159.187 24 44 # 44 != 32 nor\
    \ 128\nAddress is  103.232.159.187\nMask length is  0\nLeading ones count is \
    \ 0\nMask is (hex)  \nNetwork is  \n```\n\nIPv4 网络掩码通常以四字节点分表示法给出，例如 `/24` 网络的\
    \ `255.255.255.0`。有一个函数可以从这样一个四字节的 IPv4 地址创建掩码：\n\n```\nfunc IPv4Mask(a, b, c,\
    \ d byte) IPMask\n```\n\n此外，IP 还有一个方法可以返回（仅限）IPv4 的默认掩码：\n\n```\nfunc (ip IP)\
    \ DefaultMask() IPMask\n```\n\n注意，掩码的字符串形式是一个十六进制数，例如 `/24` 掩码的 `ffffff00`。\n\n\
    以下名为 `ipv4mask.go` 的程序说明了这些内容：\n\n```\nch3$ vi ipv4mask.go\n/* IPv4Mask\n*/\n\
    package main\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"net\"\n\t\"os\"\n)\nfunc main()\
    \ {\n\tif len(os.Args) != 2 {\n\t\tlog.Fatalln(\"Usage: %s dotted-ip-addr\\n\"\
    , os.Args[0])\n\t}\n\tdotAddr := os.Args[1]\n\taddr := net.ParseIP(dotAddr)\n\t\
    if addr == nil {\n\t\tlog.Fatalln(\"nil Invalid address\")\n\t}\n\tmask := addr.DefaultMask()\n\
    \tnetwork := addr.Mask(mask)\n\tones, bits := mask.Size()\n\tfmt.Println(\"Address\
    \ is \", addr.String(),\n\t\t\"\\nDefault mask length is \", bits,\n\t\t\"\\nLeading\
    \ ones count is \", ones,\n\t\t\"\\nMask is (hex) \", mask.String(),\n\t\t\"\\\
    nNetwork is \", network.String())\n\tderivedMask := net.IPv4Mask(255, 255, 0,\
    \ 0) // working on mask\n\tfmt.Printf(\"Network using %s: %s\\n\", derivedMask,\
    \ addr.Mask(derivedMask))\n}\n```\n\n例如，在家庭网络中运行以下命令\n\n```\nch3$ go run ipv4mask.go\
    \ 192.168.1.3\n```\n\n会得到以下结果：\n\n```\nAddress is  192.168.1.3\nDefault mask length\
    \ is  32\nLeading ones count is  24\nMask is (hex)  ffffff00\nNetwork is  192.168.1.0\n\
    Network using ffff0000: 192.168.0.0\n```"
- fmt: '### Basic Routing


    Now that we see how you can take an IP address and add (binary) to a subnet mask
    to reveal the network IP, what do we use it for? The primary purpose is in routing,
    where a router needs to figure out the next hop (where to send this packet). Since
    computers are usually more than one hop away, we use a series of routers to move
    traffic around. Each router has a lookup table and decides where to forward traffic.
    It would be very ineffective to map every destination IP to a specific next hop,
    so instead, we route many IPs to a specific next hop. In other words, a subnet
    goes to a specific next hop. Here is an example for routing packets to particular
    destinations.


    ```

    ch3$ vi ipv4router.go

    /* IPv4Router

    */

    package main

    import (

    "fmt"

    "net"

    )

    func main() {

    routingTable := []struct {

    subnetmask net.IP

    network    net.IP

    nextHop    net.IP

    }{

    {net.IP{255, 255, 255, 240}, net.IP{192, 17, 7, 208}, net.IP{192, 12, 7, 15}},

    {net.IP{255, 255, 255, 240}, net.IP{192, 17, 7, 144}, net.IP{192, 12, 7, 67}},

    {net.IP{255, 255, 255, 0}, net.IP{192, 17, 7, 0}, net.IP{192, 12, 7, 251}},

    {net.IP{0, 0, 0, 0}, net.IP{0, 0, 0, 0}, net.IP{10, 10, 10, 10}},

    }

    incomingPacketsToRoute := []struct {

    sourceAddr      net.IP

    destinationAddr net.IP

    data            string

    }{

    {net.IP{1, 2, 3, 4}, net.IP{2, 3, 4, 5}, "who knows, send to 0.0.0.0"},

    {net.IP{1, 2, 3, 4}, net.IP{192, 17, 7, 20}, "better be 192.17.7.251"},

    }

    for _, packetToRoute := range incomingPacketsToRoute {

    for _, routingEntry := range routingTable {

    r := packetToRoute.destinationAddr.Mask(net.IPMask(routingEntry.subnetmask))

    if r.Equal(routingEntry.network) {

    fmt.Printf("For destination %s nexthop is %s\n", packetToRoute.destinationAddr,
    routingEntry.nextHop)

    break //check remaining ips

    }

    }

    }

    }

    ch3$ go run IPv4Router.go

    For destination 2.3.4.5 nexthop is 10.10.10.10

    For destination 192.17.7.20 nexthop is 192.12.7.251

    ```


    As we see in the prior output, the first packet had a destination of `2.3.4.5`,
    and our routing table didn’t find a match. The last entry in routing tends to
    be the catch-all route. Our table defaults to the next hop of `10.10.10.10`. The
    second packet destination for `192.17.7.20` matched the network IP of `192.17.7.0`,
    which has the next hop of `192.12.7.251`.


    ### The IPAddr Type


    Many of the other functions and methods in the `net` package return a pointer
    to an `IPAddr`. This is simply a structure containing an IP (and a zone which
    may be needed for IPv6 addresses). The zone may be needed for ambiguous IPv6 addresses
    with multiple network interfaces. You can learn about zones (IPv6 scoped addresses)
    here: [`https://datatracker.ietf.org/doc/html/rfc4007`](https://datatracker.ietf.org/doc/html/rfc4007).


    ```

    type IPAddr {

    IP IP

    Zone string

    }

    ```


    The primary use of this type is to perform DNS lookups on IP hostnames.


    ```

    func ResolveIPAddr(net, addr string) (*IPAddr, error)

    ```


    where `net` is one of `ip`, `ip4`, or `ip6`. This is shown in the program called
    `resolveip.go`:


    ```

    ch3$ vi resolveip.go

    /* ResolveIP

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s hostname\n", os.Args[0])

    }

    name := os.Args[1]

    addr, err := net.ResolveIPAddr("ip", name)

    if err != nil {

    log.Fatalln("Resolution error", err.Error())

    }

    fmt.Println("Resolved address is ", addr.String())

    }

    ```


    Running this


    ```

    ch3$ go run resolveip.go www.google.com

    ```


    returns the following:


    ```

    Resolved address is 142.250.64.22

    ```


    If the first parameter to `ResolveIPAddr()` for the `net` type is given as `ip6`
    instead of `ip`, I get this result:


    ```

    Resolved address is  2404:6800:4006:801::2004

    ```


    You may get different results, depending on where Google appears to live from
    your address’s perspective.


    Per the documentation of `ResolveIPAddr`, arguments are documented under `Dial`
    (`go doc net.Dial`). The *network* parameter must belong to the IP family, either
    `ip`, `ip4`, or `ip6`. Optionally appended to the *network* parameter is a protocol
    such as `icmp` or its protocol number, `1`.


    ```

    addr, err := net.ResolveIPAddr("ip4:icmp", name)

    ```


    The usage of the *network* parameter and optional *protocol* allows us to verify
    that the *name* can be used for that given purpose. For example, if we use an
    IPv6 address with `ip4:icmp`, it will fail. A starting point to learn more is
    following the internal documentation, `go doc -u net.protocols`. `-u` is needed
    because the `var protocols` are not exported.


    The preceding code uses the variable called *name*. The official documentation
    calls the parameter *address*. We use *name* to show it’s not just an IP address
    that can be passed in. In general, you should not use `ResolveIPAddr` if your
    IP end point (*name/address*) can resolve to more than one IP address. The following
    functions will be more helpful when there is more than a single result.


    ### Host Canonical Name and Addresses Lookup


    The `ResolveIPAddr` function will perform a DNS lookup on a hostname and return
    a single IP address. How it does this depends on the operating system and its
    configuration. For example, a Linux/UNIX system may use `/etc/resolv.conf` or
    `/etc/hosts` with the order of the search set in `/etc/nsswitch.conf`.


    Many hosts can have more than one name (e.g., [`www.myserver.com`](http://www.myserver.com)
    -> `myserver.com`); these CNAME records (canonical name) eventually resolve to
    an A record (e.g., `myserver.com` -> IP). If you want to find the canonical name,
    use `LookupCNAME`:


    ```

    func LookupCNAME(name string) (cname string, err error).

    ```


    Some hosts may have multiple IP addresses, usually from multiple network interface
    cards. They may also have multiple hostnames, acting as aliases. The `LookupHost`
    function will return a slice of addresses.


    ```

    func LookupHost(name string) (cname string, addrs []string, err error)

    ```


    Both are shown in the following program called `lookuphost.go`:


    ```

    ch3$ vi lookuphost.go

    /* LookupHost

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s hostname\n", os.Args[0])

    }

    name := os.Args[1]

    cname, _ := net.LookupCNAME(name)

    fmt.Println(cname)

    addrs, err := net.LookupHost(cname)

    if err != nil {

    log.Fatalln("Error: ", err.Error())

    }

    for _, addr := range addrs {

    fmt.Println(addr)

    }

    }

    ```


    We first normalize the hostname by looking for the canonical name. Then we see
    if that resulting name has one or more IPs. Note that this function returns strings,
    not IP address values. When you run the preceding program:


    ```

    ch3$ go run lookuphost.go go.dev

    ```


    it prints something similar to this:


    ```

    2001:4860:4802:32::15

    2001:4860:4802:36::15

    2001:4860:4802:38::15

    2001:4860:4802:34::15

    216.239.32.21

    216.239.36.21

    216.239.38.21

    216.239.34.21

    ```


    If you are on a UNIX platform, you can compare these results via the `dig` command.


    ```

    ch3$ ch3 % dig go.dev A go.dev AAAA +short

    216.239.34.21

    216.239.38.21

    216.239.32.21

    216.239.36.21

    2001:4860:4802:38::15

    2001:4860:4802:34::15

    2001:4860:4802:36::15

    2001:4860:4802:32::15

    ```


    There are many additional Lookup functions to learn.


    ```

    go doc net | grep Lookup

    like Dial or directly with functions like LookupHost and LookupAddr, varies

    func LookupAddr(addr string) (names []string, err error)

    func LookupCNAME(host string) (cname string, err error)

    func LookupHost(host string) (addrs []string, err error)

    func LookupIP(host string) ([]IP, error)

    func LookupMX(name string) ([]*MX, error)

    func LookupNS(name string) ([]*NS, error)

    func LookupPort(network, service string) (port int, err error)

    func LookupSRV(service, proto, name string) (cname string, addrs []*SRV, err error)

    func LookupTXT(name string) ([]string, error)

    ```


    Some are related to email, including MX and TXT, others for general resource identification
    such as CNAME, Host, and NS.'
