- fmt: "# Simple and Broken\n\nWe begin with a simple set of tests, where both tests\
    \ are sending a request and then confirming we get a response. The only difference\
    \ is one test has a client that times out and the other does not. In both tests,\
    \ the server fakes work by sleeping for five seconds in both tests. We will run\
    \ each test individually, then as a suite, reviewing the results.\n\n```\n$ mkdir\
    \ ch17\n$ cd ch17\nch17$ vi basic_http_test.go\npackage ch17\n\nimport (\n\t\"\
    net/http\"\n\t\"testing\"\n\t\"time\"\n)\n\nfunc TestHTTPRoundTrip(t *testing.T)\
    \ {\n\tpath := \"/\"\n\tc := make(chan struct{})\n\t//server\n\tgo func() {\n\t\
    \thttp.HandleFunc(path, func(w http.ResponseWriter, req *http.Request) {\n\t\t\
    \ttime.Sleep(5 * time.Second) // holding connection\n\t\t})\n\t\thttp.ListenAndServe(\"\
    :8080\", nil)\n\t}()\n\t//client\n\tgo func() {\n\t\tresp, err := http.Get(\"\
    http://localhost:8080\" + path)\n\t\tif err != nil {\n\t\t\tt.Error(err)\n\t\t\
    } else {\n\t\t\tif resp == nil || resp.StatusCode != http.StatusOK {\n\t\t\t\t\
    t.Error(resp)\n\t\t\t}\n\t\t}\n\t\tdefer func() {\n\t\t\tc <- struct{}{}\n\t\t\
    }()\n\t}()\n\t<-c\n}\n\nfunc TestHTTPRoundTripTimeout(t *testing.T) {\n\tpath\
    \ := \"/\"\n\tc := make(chan struct{})\n\t//server\n\tgo func() {\n\t\thttp.HandleFunc(path,\
    \ func(w http.ResponseWriter, req *http.Request) {\n\t\t\ttime.Sleep(5 * time.Second)\
    \ // holding connection\n\t\t})\n\t\thttp.ListenAndServe(\":8080\", nil)\n\t}()\n\
    \t//client\n\tgo func() {\n\t\tvar client = &http.Client{\n\t\t\tTimeout: time.Second\
    \ * 2,\n\t\t}\n\t\tresp, err := client.Get(\"http://localhost:8080\" + path)\n\
    \t\tif err != nil {\n\t\t\tt.Error(err)\n\t\t} else {\n\t\t\tif resp == nil ||\
    \ resp.StatusCode != http.StatusOK {\n\t\t\t\tt.Error(resp)\n\t\t\t}\n\t\t}\n\t\
    \tdefer func() {\n\t\t\tc <- struct{}{}\n\t\t}()\n\t}()\n\t<-c\n}\n```\n\nWe begin\
    \ by running the first test:\n\n```\nch17$ go test -test.run \"TestHTTPRoundTrip$\"\
    \ basic_http_test.go\n=== RUN   TestHTTPRoundTrip\n--- PASS: TestHTTPRoundTrip\
    \ (5.00s)\nPASS\nok      command-line-arguments  5.132s\n```\n\nand now the second\
    \ test:\n\n```\nch17$ go test -test.run \"TestHTTPRoundTripTimeout$\" basic_http_test.go\n\
    --- FAIL: TestHTTPRoundTripTimeout (2.00s)\nbasic_http_test.go:56: Get \"http://localhost:8080/\"\
    : context deadline exceeded (Client.Timeout exceeded while awaiting headers)\n\
    FAIL\nFAIL    command-line-arguments  2.131s\nFAIL\n```\n\nUpon reading the tests,\
    \ it may seem obvious that the second test was going to fail. The client is set\
    \ to expire after two seconds where the server is taking five seconds to process.\
    \ An untrained eye might miss the reason for these related tests. The default\
    \ HTTP client has an unlimited timeout. In our case, the server in the first test\
    \ could take double the time and the test would still pass. This is not specific\
    \ to Go, but it is specific to this implementation of the Go HTTP client. What\
    \ happens if we simply run both tests.\n\n```\nch17$ go test basic_http_test.go\n\
    panic: http: multiple registrations for /\ngoroutine 31 [running]:\nnet/http.(*ServeMux).Handle(0x1529fa0,\
    \ {0x137fe80, 0x1}, {0x1381c00?, 0x132fee0})\n\t/usr/local/go/src/net/http/server.go:2478\
    \ +0x226\nnet/http.(*ServeMux).HandleFunc(...)\n\t/usr/local/go/src/net/http/server.go:2515\n\
    net/http.HandleFunc(...)\n\t/usr/local/go/src/net/http/server.go:2527\ncommand-line-arguments.TestHTTPRoundTripTimeout.func1()\n\
