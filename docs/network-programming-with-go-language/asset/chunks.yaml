    expires=Tue, 01-Feb-2022 21:56:38 GMT; path=/; domain=.google.com; HttpOnly

    ```


    我们首先给出程序（`getheadinfo.go`），它用于为 TCP 地址建立连接、发送请求字符串，然后读取并打印响应。该程序名为 `getheadinfo.go`：


