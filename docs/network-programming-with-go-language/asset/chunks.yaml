    The character code is still an abstraction. It isn’t yet what we will see in text
    files, or in TCP packets. However, it is getting close, as it supplies the mapping
    from human-oriented concepts into numerical ones.


    ### Character Encoding


    To communicate or store a character, you need to encode it in some way. To transmit
    a string, you need to encode all characters in the string. There are many possible
    encodings for any code set.


    For example, 7-bit ASCII code points can be encoded as themselves into 8-bit bytes
    (an octet). So ASCII “A” (with code point 65) is encoded as the 8-bit octet 01000001\.
    However, a different encoding would be to use the top bit for parity checking.
    For example, with odd parity, ASCII “A” would be the octet 11000001\. Some protocols
    such as Sun’s XDR use 32-bit word-length encoding. ASCII “A” would be encoded
    as 00000000 00000000 0000000 01000001.


    The character encoding is where we function at the programming level. Our programs
    deal with encoded characters. It obviously makes a difference whether we are dealing
    with 8-bit characters with or without parity checking, or with 32-bit characters.


    The encoding extends to strings of characters. A word-length even parity encoding
    of “ABC” might be 10000000 (parity bit in high byte) 0100000011 (C) 01000010 (B)
    01000001 (A in low byte). The comments about the importance of an encoding apply
    equally strongly to strings, where the rules may be different.'
  trans: '

    # 6. 管理字符集与编码


    很久以前，世界上只有 EBCDIC 和 ASCII 两种编码。事实上，情况从未如此简单，而且随着时间的推移变得愈发复杂。虽然曙光已现，但据估计，我们可能还需要
    50 年才能完全生活在这片光明之中！


    早期的计算机是在美国、英国和澳大利亚等英语国家开发的。因此，人们对于所使用的语言和字符集做出了相应的假设。基本上，当时使用的是拉丁字母，外加数字、标点符号以及少数其他符号。这些字符随后通过
    ASCII 或 EBCDIC 编码成字节。


    基于此，字符处理机制应运而生：文本文件和输入输出由字节序列组成，每个字节代表一个字符。字符串比较可以通过匹配对应的字节来完成；大小写转换可以通过映射单个字节来实现，诸如此类。


    世界上大约有 6500 种口语（其中 850 种在巴布亚新几内亚！）。少数语言使用“英语”字符，但大多数语言并非如此。法语等罗曼语族语言会在各种字符上添加变音符号，因此你可以写出“j’ai
    arrêté”（带有两个不同变音符号的元音）。类似地，日耳曼语族语言有额外的字符，例如“ß”。即便是英式英语，也有标准 ASCII 字符集之外的字符：英镑符号“£”以及最近的欧元符号“€”。


    但这个世界并不仅限于拉丁字母的变体。泰国有自己的字母表，单词看起来像这样：“ภาษาไทย”。还有许多其他的字母表，而日本甚至有两种：平假名和片假名。


    还有诸如汉语这样的表意文字语言，你可以写出“百度一下, 你就知道”。


    从技术角度来看，如果全世界都只用 ASCII 就好了。然而，趋势恰恰相反，越来越多的用户要求软件使用他们熟悉的语言。如果你构建一个可在不同国家运行的应用程序，那么用户就会要求它使用他们自己的语言。在分布式系统中，系统的不同组件可能会被期望使用不同语言和字符的用户所使用。


    *国际化*（`i18n`）指的是你编写应用程序的方式，使其能够处理多种语言和文化。*本地化*（`l10n`）是将你的国际化应用程序针对特定文化群体进行定制的过程。


    `i18n` 和 `l10n` 本身都是非常宏大的主题。例如，它们涵盖了诸如颜色等问题：白色在西方文化中代表“纯洁”，但对中国人来说意味着“死亡”，对埃及人而言则是“欢乐”。在本章中，我们只关注字符处理方面的问题。


    ## 定义


    在讨论文本处理系统的具体部分时，务必措辞准确。以下是一组已被证明有用的定义。


    ### 字符


    *字符*是“一种信息单位，大致对应于自然语言中的字素（书写符号），例如一个字母、数字或标点符号”（维基百科）。字符是“书面语言中具有语义值的最小组成部分”（Unicode）。这包括像“a”和“À”这样的字母（或任何其他语言的字母），像“2”这样的数字，像“，”这样的标点符号，以及各种符号，例如英镑货币符号“£”。


    字符是对实际符号的一种抽象概念：字符“a”之于任何书写的“a”，就如同柏拉图的理念圆之于任何实际的圆。字符的概念也包括控制字符，它们并不对应于自然语言的符号，而是对应于用于处理语言文本的其他信息位。


    字符没有任何特定的外观，尽管我们借助外观来识别字符。然而，即使是外观也可能需要在特定的语境中去理解：在数学中，如果你看到符号 π（pi），它是一个表示圆周长与半径之比的字符；而如果你在读希腊语文本，它是该字母表的第十六个字母：“πρoσ”是希腊语中表示“与”的单词，与
    3.14159 毫无关系。


    ### 字符库/字符集


    字符库是一组不同的字符，例如拉丁字母表。它不假定任何特定的顺序。在英语中，尽管我们说“a”在字母表中比“z”靠前，但我们不会说“a”小于“z”。那种将“McPhee”排在“MacRea”之前的“电话簿”排序方式表明，“字母顺序”对于字符本身并非关键。


    字符库指定了字符的名称，并且通常会提供字符外观的示例。例如，字母“a”可能看起来像“a”、“*a*”或“**a**”。但它并不强制字符必须看起来像那样——它们仅仅是示例。字符库可能做出诸如大小写之分这样的区分，从而使“a”和“A”不同。但它也可能将它们视为相同，只是示例外观不同而已（就像一些编程语言区分大小写，如
    Go，而有些则不区分，如 Basic）。另一方面，一个字符库可能包含具有相同示例外观的不同字符：一个希腊数学家的字符库会包含两个不同但外观都是 π 的字符。这也被称为非编码字符集。


    ### 字符代码


    字符代码是从字符到整数的映射。字符集的这种映射也称为编码字符集或代码集。这种映射中每个字符的值通常被称为码点。ASCII 是一个代码集。“a”的码点是 97，“A”的码点是
    65（十进制）。


    字符代码仍然是一种抽象概念。它还不是我们在文本文件或 TCP 数据包中看到的内容。然而，它已经很接近了，因为它提供了从面向人类的概念到数值的映射。


    ### 字符编码


    要通信或存储一个字符，你需要以某种方式对其进行编码。要传输一个字符串，你需要对字符串中的所有字符进行编码。对于任何代码集，都有许多可能的编码方式。


    例如，7 位 ASCII 码点可以以其自身形式编码为 8 位字节（一个八位组）。因此，ASCII 的“A”（码点为 65）被编码为 8 位八位组 `01000001`。然而，另一种不同的编码方式是使用最高位进行奇偶校验。例如，采用奇校验时，ASCII
    的“A”将编码为八位组 `11000001`。一些协议，如 Sun 的 XDR，使用 32 位字长编码。ASCII 的“A”将被编码为 `00000000
    00000000 0000000 01000001`。


    字符编码是我们编程层面所处理的内容。我们的程序处理的是编码后的字符。显然，我们处理的是带或不带奇偶校验的 8 位字符，还是 32 位字符，这会产生重大差异。


    编码也适用于字符串。对“ABC”采用字长偶校验编码的结果可能是 `10000000`（高位字节中的校验位） `0100000011` (C) `01000010`
    (B) `01000001` (低位字节中的 A)。关于编码重要性的评论同样适用于字符串，因为字符串的规则可能有所不同。

