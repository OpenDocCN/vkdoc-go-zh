- fmt: '# Distributed Computing Models


    At the highest level, we could consider the equivalence or the nonequivalence
    of components of a distributed system. The most common occurrence is an asymmetric
    one: a client sends requests to a server, and the server responds. This is a *client-server*
    system.


    If both components are equivalent, both able to initiate and to respond to messages,
    then we have a *peer-to-peer* system. Note that this is a logical classification:
    one peer may be a 16,000-core supercomputer; the other might be a mobile phone.
    But if both can act similarly, then they are peers.


    These are illustrated in Figure [1-6](#436770_2_En_1_Chapter.xhtml#Fig6).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig6_HTML.png)


    Figure 1-6


    Client-server vs. peer-to-peer systems


    An example of a client-server is a browser talking to a web server. An example
    of a peer-to-peer system could be database system where data is replicated and
    available on both peers.


    Combinations of these systems result in what is known as multitier architectures,
    where three-tier architecture is one of the most common (i.e., presentation ->
    application -> data or browser -> web server -> database).


    ## Client-Server System


    Another view of a client-server system is shown in Figure [1-7](#436770_2_En_1_Chapter.xhtml#Fig7).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig7_HTML.png)


    Figure 1-7


    The client-server system


    This view may be held by a developer who needs to know the components of a system.
    It is also the view that may be held by a user: a user of a browser knows it is
    running on their system but is communicating with servers elsewhere.


    The prior diagram looks similar to the OSI model we discussed earlier. Layers
    in Figure [1-7](#436770_2_En_1_Chapter.xhtml#Fig7) are also optional; for example,
    we can have both the client and server process on a single piece of hardware.
    Being located on the same machine means we can potentially remove some layers
    of the OSI model including layer 1 (Physical), layer 2 (Data Link), and layer
    3 (Network). We say potentially because these layers still may be desired for
    various reasons including tooling homogeneity or security.


    ## Client-Server Application


    Some applications may be seamlessly distributed, with the user unaware that it
    is distributed. Users will see their view of the system, as shown in Figure [1-8](#436770_2_En_1_Chapter.xhtml#Fig8).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig8_HTML.png)


    Figure 1-8


    The user’s view of the system


    In order to function, both components must be installed, how seamless this complexity
    will vary by application (and its usage).


    ## Server Distribution


    A client-server system need not be simple. The basic model is a single client,
    single server system, as shown in Figure [1-9](#436770_2_En_1_Chapter.xhtml#Fig9).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig9_HTML.png)


    Figure 1-9


    The single-client, single-server system


    However, you can also have multiple clients, single server, as illustrated in
    Figure [1-10](#436770_2_En_1_Chapter.xhtml#Fig10).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig10_HTML.png)


    Figure 1-10


    The multiple-clients, single-server system


    In this system, the master receives requests, and instead of handling them one
    at a time itself, it passes them to other servers to handle. This is a common
    model when concurrent clients are possible.


    There are also single client, multiple servers, as shown in Figure [1-11](#436770_2_En_1_Chapter.xhtml#Fig11).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig11_HTML.png)


    Figure 1-11


    The single-client, multiple-servers system


    This type of system occurs frequently when a server needs to act as a client to
    other servers, such as a business logic server getting information from a database
    server. And of course, there could be multiple clients with multiple servers.


    Again, these components may or may not be on the same physical hardware.


    ## Communication Flows


    The previous diagrams have shown the connection views between high-level components
    of a system. Data will flow between these components, and it can do so in multiple
    ways, discussed in the following sections.


    ### Synchronous Communication


    In a synchronous communication, one party will send a message and block, waiting
    for a reply. This is often the simplest model to implement and just relies on
    blocking I/O. However, there may need to be a timeout mechanism in case some error
    means that no reply will ever be sent.


    ### Asynchronous Communication


    In asynchronous communication, one party sends a message and, instead of waiting
    for a reply, carries on with other work. When a reply eventually comes, it is
    handled. This may be in another thread or by interrupting the current thread.
    Such applications are harder to build but are much more flexible to use.


    When thinking of these protocol layers and related implementations, it’s not always
    obvious how you describe communication flow. For example, TCP, is it synchronous
    or asynchronous? When designing network applications, communication flow is used
    to describe the applications logic (Are you waiting for a response or are you
    not waiting for a response?). When we provide the Transport layer (TCP) data,
    we don’t wait for it to send and respond, our application keeps moving. In that
    light, we say TCP is asynchronous.


    ### Streaming Communication


    In streaming communication, one party sends a continuous stream of messages. Online
    video is a good example. The streaming may need to be handled in real time, may
    or may not tolerate losses, and can be one-way or allow reverse communication
    as in control messages. This is why TCP is often used over UDP, even if that ordering
    comes at a cost.


    ### Publish/Subscribe


    In pub/sub systems, parties subscribe to topics, and others post to them. This
    can be on a small or massive scale, as demonstrated by services like Twitter and
    software like Kafka. Designing a multitier system to include pub/sub allows producer
    and consumers to be decoupled. Decoupling allows us to become more fault tolerant
    and generally improves the ability to grow the system (e.g., more producers and
    consumers). Storage of messages on a third party (i.e., remote queue) provides
    this ability. How the queue performs and grows is its own area of study and distributed
    computing (and storage).


    ## Component Distribution


    A simple but effective way of decomposing many applications is to consider them
    as made up of three parts:


    - Presentation component

    - Application logic

    - Data access


    The *presentation component* is responsible for interactions with the user, both
    displaying data and gathering input. It may be a modern GUI interface with buttons,
    lists, menus, etc., or an older command-line style interface, asking questions
    and getting answers. It could also encompass wider interaction styles, such as
    the interaction with physical devices such as a cash register and ATM. It could
    also cover the interaction with a nonhuman user, as in a machine-to-machine system.
    The details are not important at this level.


    The *application logic* is responsible for interpreting the users’ responses,
    for applying business rules, for preparing queries, and for managing responses
    from the third component.


    The *data access* component is responsible for storing and retrieving data. This
    will often be through a database, but not necessarily.


    ### Gartner Classification


    Based on this threefold decomposition of applications, Gartner considered how
    the components might be distributed in a client-server system. They came up with
    five models, shown in Figure [1-12](#436770_2_En_1_Chapter.xhtml#Fig12). These
    models conceptualize various purposes on the client or server. While high level,
    they still enumerate numerous possibilities regarding placement of functionality.


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig12_HTML.png)


    Figure 1-12


    Gartner’s five models'
