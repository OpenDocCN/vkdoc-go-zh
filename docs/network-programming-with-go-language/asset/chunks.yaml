  trans: "\n# 15. WebSocket\n\n浏览器等网络用户代理与 Apache 等网络服务器之间的标准交互模型是：用户代理发出 HTTP 请求，服务器对每个请求做出单一回复。对于浏览器而言，请求通过点击链接、在地址栏输入\
    \ URL、点击前进或后退按钮等方式发起。响应被视为一个新页面，并加载到浏览器窗口中。\n\n这种传统模型存在诸多缺陷。首先，每个请求都会打开并关闭一个新的\
    \ TCP 连接。HTTP 1.1 通过允许持久连接解决了这个问题，使得连接可以在短时间内保持打开状态，从而允许对同一服务器发起多个请求（例如，请求图片）。\n\
    \n虽然 HTTP 1.1 持久连接缓解了加载包含大量图片的页面速度慢的问题，但并未改进交互模型。即使采用了表单，模型仍然是通过提交表单并将响应显示为新页面。JavaScript\
    \ 有助于在提交前对表单数据进行错误检查，但并未改变这一模型。\n\nAJAX（异步 JavaScript 和 XML）在用户交互模型上取得了重大进展。它允许浏览器发起请求，并仅使用响应通过\
    \ HTML 文档对象模型（DOM）就地更新显示内容。但同样，交互模型本身并未改变，AJAX 仅仅影响了浏览器管理返回页面的方式。Go 语言没有为 AJAX\
    \ 提供显式的额外支持，因为无需如此：HTTP 服务器看到的只是一个可能携带 XML 或 JSON 数据的普通 HTTP POST 请求，这可以通过已讨论的技术来处理。\n\
    \n所有这些仍然是浏览器（或用户代理）到服务器的通信。所缺少的是服务器到浏览器的通信，即浏览器已经建立了到服务器的 TCP 连接，并从服务器读取消息。这可以由\
    \ WebSocket 来填补：浏览器（或任何用户代理）保持一个到 WebSocket 服务器的长期 TCP 连接。该 TCP 连接允许任何一侧发送任意数据包，因此任何应用层协议都可以在\
    \ WebSocket 上使用。\n\n启动 WebSocket 的方式是用户代理发送一个特殊的 HTTP 请求，该请求表明“切换至 WebSocket”。HTTP\
    \ 请求底层的 TCP 连接保持打开状态，但用户代理和服务器都转而使用 WebSocket 协议，而不是获取 HTTP 响应并关闭套接字。\n\n请注意，仍然是浏览器或用户代理发起\
    \ WebSocket 连接。浏览器自身并不运行 TCP 服务器。尽管 IETF RFC 6455 规范（参见 [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)）较为复杂，但该协议的设计使其相对易于使用。客户端打开一个\
    \ HTTP 连接，然后用其自身的 WS 协议替换 HTTP 协议，并重用同一个 TCP 连接或新建一个连接。\n\nGo 语言在其子仓库中提供了一些对 WebSocket\
    \ 的支持，但实际上推荐使用第三方包。本章将探讨这两个包。\n\n## WebSocket 服务器\n\n一个 WebSocket 服务器最初是一个 HTTP\
    \ 服务器，接受 TCP 连接并处理这些 TCP 连接上的 HTTP 请求。当一个请求进来，要求将该连接切换为 WebSocket 连接时，协议处理器会从\
    \ HTTP 处理器变为 WebSocket 处理器。因此，只有那条 TCP 连接的角色发生了改变；该服务器对于其他请求仍然是一个 HTTP 服务器，而那条连接底层的\
    \ TCP 套接字则被用作 WebSocket。\n\n在第 8 章（HTTP）中讨论的一个简单服务器，注册了诸如文件处理器或函数处理器等各种处理器。为了处理\
    \ WebSocket 请求，我们只需注册一个不同类型的处理器——即 WebSocket 处理器。服务器使用哪个处理器取决于 URL 模式。例如，可能为 `/`\
    \ 注册一个文件处理器，为 `/cgi-bin/...` 注册一个函数处理器，而为 `/ws` 注册一个 WebSocket 处理器。\n\n一个仅期望用于\
    \ WebSocket 的 HTTP 服务器可以按如下方式运行：\n\n```\nfunc main() {\n    http.Handle(\"/\"\
    , websocket.Handler(WSHandler))\n    err := http.ListenAndServe(\":12345\", nil)\n\
    \    checkError(err)\n}\n```\n\n一个更复杂的服务器可以通过简单地添加更多处理器来同时处理 HTTP 和 WebSocket\
    \ 请求。\n\n在实现方面，我们有多种选择，包括手动管理原始 HTTP 连接（TCP 劫持），以及使用 `x` 包的 WebSocket 实现，甚至使用知名的第三方包。\n\
    \n## `golang.org/x/net/websocket` 包\n\nGo 语言有一个名为 `golang.org/x/net/websocket`\
    \ 的子仓库包。\n\n该包的文档说明如下：\n\n*此包目前缺少另一个更活跃维护的 WebSocket 包所具有的一些功能：* [`pkg.go.dev/github.com/gorilla/websocket`](https://pkg.go.dev/github.com/gorilla/websocket)。*遗憾的是，即使是\
    \ Gorilla WebSocket 包也正在寻找一位活跃的首席维护者。尽管如此，它仍然是领先的实现。*\n\n这表明，使用替代包可能是更好的选择。然而，为了与本书其余部分保持一致（即使用\
    \ Go 团队的包），我们在此处探讨此包。后续章节将探讨替代包。\n"
- fmt: '### The Message Object


    HTTP is a stream protocol. WebSockets are frame based. You prepare a block of
    data (of any size) and send it as a set of frames. Frames can contain strings
    in UTF-8 encoding or a sequence of bytes.


    The simplest way of using WebSockets is just to prepare a block of data and ask
    the Go WebSockets library to package it as a set of frame data, send it across
    the wire, and receive it as the same block. The `websocket` package contains a
    convenience object called `Message` to do just that. The `Message` object has
    two methods – `Send` and `Receive` – that take a WebSocket as the first parameter.
    The second parameter is either the address of a variable to store data in or the
    data to be sent. Code to send string data looks like this:


    ```

    msgToSend := "Hello"

    err := websocket.Message.Send(ws, msgToSend)

    var msgToReceive string

    err := websocket.Message.Receive(conn, &msgToReceive)

    ```


    Code to send byte data looks like this:


    ```

    dataToSend := []byte{0, 1, 2}

    err := websocket.Message.Send(ws, dataToSend)

    var dataToReceive []byte

    err := websocket.Message.Receive(conn, &dataToReceive)

    ```


    An echo server to send and receive string data is given next. Note that in WebSockets,
    either side can initiate sending of messages, and in this server, we send messages
    from the server to a client when it connects (send/receive) instead of the more
    normal receive/send server. The server is `echoserver.go`:


    ```

    $ mkdir ch15

    $ cd ch15

    $ vi echoserver.go

    /* EchoServer

    */

    package main

    import (

    "fmt"

    "golang.org/x/net/websocket"

    "log"

    "net/http"

    )

