    运行方式如下：


    ```

    ch14$ go run client.go http://localhost:8000/

    ...（所有闪卡相关内容）...

    ```


    ## 使用 REST 还是 RPC


    REST 与 RPC 的主要区别在于交互方式。在 RPC 中，你是在调用函数，传递对象或基本类型作为参数，并返回对象或基本类型。函数是*动词*：对*那个*做*这个*。而
    REST 则是与对象交互，要求它们展示自身状态或以某种方式改变状态。


    这种差异体现在上一章讨论的 Go RPC 机制和本章的 REST 机制上。在基于 HTTP 的 Go RPC 中，服务器注册的是*函数*；而在 REST 中，服务器注册的是*URL*的处理器。


    哪个更好？都不好。哪个更快？都不快。哪种更适合受控环境？可能是 RPC。哪种更适合开放环境？可能是 REST。


    你会看到基于速度和资源分配的争论。基于二进制系统的 RPC 可能比基于文本的 HTTP 系统更快。但 SOAP 是一种基于 HTTP 的文本 RPC 系统，可能比
    REST 更慢。HTTP2 使用二进制格式，在传输 BSON 等二进制数据时，速度可能与其他二进制系统相当。更令人困惑的是，Apache Thrift RPC
    允许选择数据格式（二进制、紧凑二进制、JSON 和文本）和传输方式（套接字、文件和共享内存）。一个系统展示了所有选项！


    更重要的因素可能是运营环境的受控程度。RPC 系统是紧密耦合的，一个组件故障可能导致整个系统崩溃。当存在单一管理权威、有限的硬件和软件配置以及清晰的故障修复渠道时，RPC
    系统可以工作得很好。


    另一方面，Web 是未受控的。没有单一权威——即使是 DNS 这样的“通用”服务也是高度分布式的。存在大量不同的硬件、操作系统和软件；几乎没有执行任何策略的可能性；如果出了问题，往往找不到可以指明修复的人。在这种情况下，松散耦合的系统可能更好。


    基于 HTTP 的 REST 非常适合这种情况。HATEOAS 允许服务器动态重新配置，按需更改 URL（甚至指向不同的服务器！）。HTTP 设计为在可能的情况下缓存结果。防火墙通常被配置为允许
    HTTP 流量并阻止大多数其他协议。REST 在这里是一个不错的选择。


    需要注意的是，REST 并非唯一可能的基于 HTTP 的系统。前面已经提到了 SOAP。还有许多商业上非常成功的系统是“几乎” REST 的——Richardson
    成熟度模型的第 1 级和第 2 级。它们无法享受 REST/HTTP 组合的全部好处，但仍然可以工作。


    毫无疑问，未来会出现其他模型。在物联网领域，CoAP 在低功耗无线系统中很流行。它也是基于 REST 的，但与 HTTP-REST 的方式略有不同。


    ## 结论


    REST 是 Web 的架构模型。它可以以多种不同方式应用，特别是作为 HTTP 和 CoAP（例如低功耗、有损网络协议）。本章阐述了 REST 在 HTTP
    中的应用方式。

    '
- fmt: '# 15. WebSockets


    The standard model of interaction between a web user agent such as a browser and
    a web server such as Apache is that the user agent makes HTTP requests and the
    server makes a single reply to each one. In the case of a browser, the request
    is made by clicking on a link, entering a URL into the address bar, clicking on
    the forward or back buttons, etc. The response is treated as a new page and is
    loaded into a browser window.


    This traditional model has many drawbacks. The first is that each request opens
    and closes a new TCP connection. HTTP 1.1 solved this by allowing persistent connections
    so that a connection could be held open for a short period to allow for multiple
    requests (e.g., for images) to be made on the same server.


    While HTTP 1.1 persistent connections alleviate the problem of slow loading of
    a page with many graphics, it does not improve the interaction model. Even with
    forms, the model is still that of submitting the form and displaying the response
    as a new page. JavaScript helps in allowing error checking to be performed on
    form data before submission but does not change the model.


    AJAX (Asynchronous JavaScript and XML) made a significant advance to the user
    interaction model. This allows a browser to make a request and just use the response
    to update the display in place using the HTML Document Object Model (DOM). But
    again, the interaction model is the same. AJAX just affects how the browser manages
    the returned pages. There is no explicit extra support in Go for AJAX, as none
    is needed: the HTTP server just sees an ordinary HTTP POST request with possibly
    some XML or JSON data, and this can be dealt with using techniques already discussed.


    All of these are still browser (or user agent)-to-server communication. What is
    missing is server-to-browser communications where a browser has set up a TCP connection
    to a server and reads messages from the server. This can be filled by WebSockets:
    the browser (or any user agent) keeps open a long-lived TCP connection to a WebSockets
    server. The TCP connection allows either side to send arbitrary packets, so any
    application protocol can be used on a WebSocket.


    How a WebSocket is started is by the user agent sending a special HTTP request
    that says “switch to WebSockets.” The TCP connection underlying the HTTP request
    is kept open, but both user agent and server switch to using the WebSockets protocol
    instead of getting an HTTP response and closing the socket.


    Note that it is still the browser or user agent that initiates the WebSockets
    connection. The browser does not run a TCP server of its own. While the specification
    as IETF RFC 6455 is complex (see [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)),
    the protocol is designed to be fairly easy to use. The client opens an HTTP connection
    and then replaces the HTTP protocol with its own WS protocol, reusing the same
    TCP or a new connection.


    Go has some support for WebSockets in a subrepository but actually recommends
    a third-party package. This chapter considers both packages.


    ## WebSockets Server


    A WebSockets server starts off by being an HTTP server, accepting TCP connections
    and handling the HTTP requests on the TCP connection. When a request comes in
    that switches that connection to being a WebSockets connection, the protocol handler
    is changed from an HTTP handler to a WebSocket handler. So it is only that TCP
    connection that gets its role changed; the server continues to be an HTTP server
    for other requests, while the TCP socket underlying that one connection is used
    as a WebSocket.


    One of the simple servers discussed in Chapter [8](#436770_2_En_8_Chapter.xhtml),
    HTTP, registered various handlers such as a file handler or a function handler.
    To handle WebSockets requests, we simply register a different type of handler
    – a WebSockets handler. Which handler the server uses is based on the URL pattern.
    For example, a file handler might be registered for `/`, a function handler for
    `/cgi-bin/...`, and a WebSockets handler for `/ws`.


    An HTTP server that is only expecting to be used for WebSockets might run as follows:


    ```

    func main() {

    http.Handle("/", websocket.Handler(WSHandler))

    err := http.ListenAndServe(":12345", nil)

    checkError(err)

    }

    ```


    A more complex server might handle both HTTP and WebSockets requests simply by
    adding more handlers.


    We have a variety of options when it comes to implementation, including manually
    managing the original HTTP connection (TCP hijacking) and the use of the `x` package
    WebSocket implementation or even well-known third-party packages.


    ## The `golang.org/x/net/websocket` Package


    Go has the subrepository package called `golang.org/x/net/websocket`.


    The package documentation states the following:


    *This package currently lacks some features found in an alternative and more actively
    maintained WebSockets package: [https://pkg.go.dev/github.com/gorilla/websocket](https://pkg.go.dev/github.com/gorilla/websocket).
    Unfortunately, even the Gorilla WebSocket package is looking for an active lead
    maintainer. Still, it remains a leading implementation.*


    This suggests that you might be better off using the alternative package. Nevertheless,
    we consider this package here in keeping with the rest of this book of using the
    packages from the Go team. A later section looks at the alternative package.'
