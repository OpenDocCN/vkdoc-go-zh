  trans: "\n# 方法\n\nGo 语言并不像 Java 这类语言拥有类（classes）。然而，*类型*可以关联*方法*，其行为类似于更标准的面向对象语言中的方法。\n\
    \n我们将大量使用为各种网络类型定义的方法。从下一章的第一个程序开始就会用到。例如，`IPMask` 类型被定义为一个字节数组：\n\n```\ntype\
    \ IPMask []byte\n```\n\n该类型定义了许多函数，例如：\n\n```\nfunc (m IPMask) Size() (ones, bits\
    \ int)\n```\n\n一个 `IPMask` 类型的变量可以像下面这样应用 `Size()` 方法：\n\n```\nvar m IPMask\n\
    ...\nones, bits := m.Size()\n```\n\n学习如何使用网络相关类型的方法，是本书的主要目的。\n\n本书中我们不会过多地自定义方法，这是因为为了演示\
    \ Go 的库，我们不需要太多自己的复杂类型。一个典型的用法是美化打印之前定义的类型，比如 `Person` 类型：\n\n```\nfunc (p Person)\
    \ String() string {\n    s := p.Name.Personal + \" \" + p.Name.Family\n    for\
    \ _, v := range p.Email {\n        s += \"\\n\" + v.Kind + \": \" + v.Address\n\
    \    }\n    return s\n}\n```\n\n更具体地说，触发上述方法的方式如下：\n\n```\np := Person{}\ndetails\
    \ := p.String() // String 是一个方法\nlen(details) // len 是一个函数\n```\n\n在第 10 章中有更广泛的应用，其中使用了多种类型及其上的方法。这是因为当构建更真实的系统时，我们*确实*需要自己的类型。\n\
    \nGo 还支持一等函数和高阶函数。一等函数意味着我们可以将函数（或方法）的引用存储在变量中。高阶函数意味着函数（或方法）可以接受或返回一个函数。以下是一等函数的示例：\n\
    \n```\nm := p.String\nm() // 触发 p.String() 方法\n```\n\n以下是高阶函数的示例：\n\n```\npackage\
    \ main\nimport (\n    \"fmt\"\n)\nfunc f1(f func(string) int, data string) {\n\
    \    fmt.Println(f(data))\n}\nfunc main() {\n    f1(func(s string) int { return\
    \ len(s) }, \"testing\")\n}\n$ go run prog.go\n```\n\n# 多线程\n\nGo 语言提供了一种简单的机制，通过\
    \ `go` 命令启动额外的线程。本书中，我们只需要用到这些。这里不需要执行诸如同步多个线程之类的复杂任务。\n\n# 包\n\nGo 程序由链接的包构建而成。任何代码块所使用的包，都必须通过代码文件顶部的\
    \ `import` 语句导入。我们自己的程序被声明为属于 `main` 包。\n\n除了第 10 章外，本书中几乎所有的程序都在 `main` 包中。\n\
    \n大多数包都是从标准库导入的。也有一些是从子仓库导入的，例如 `golang.org/x/net/ipv4`。\n\n结构体字段的*可见性*由字段名的首字母大小写控制。如果首字母大写，则在声明它的包外部可见；如果小写，则不可见。在前面的例子中，所有结构体的所有字段都是可见的。\n\
    \n# 模块\n\nGo 模块追踪包及其版本。模块允许追踪直接和间接依赖关系。\n\n虽然模块是在 Go 中分组和共享代码（包）的正确方式，但用户仍然经常仅使用包的方式。\n\
    \n当单个包无法满足需求时，我们将使用模块。即使使用了模块，我们的意图也是让示例专注于网络代码。在这个例子中，生成了一个名为 `go.mod` 的文件，Go\
    \ 工具使用它来管理我们的依赖关系：\n\n```\n//示例\n$ mkdir myapp; cd myapp\n$ go mod init example.com\n\
    $ // 创建程序\n$ go mod tidy\n$ go run prog.go\n```\n\n你可以在这里了解更多关于模块的信息：[`https://go.dev/blog/using-go-modules`](https://go.dev/blog/using-go-modules)。\n\
    \n在 Go 1.18 中，包含了一个帮助管理跨模块本地开发的新特性；该特性称为工作区。本书中没有用到这个特性，但你可以在这里了解更多信息：[`https://go.dev/doc/tutorial/workspaces`](https://go.dev/doc/tutorial/workspaces)。\n\
    \n# 类型转换\n\n在本书中，我们首先需要关注的类型转换是字符串与字节数组之间的相互转换。要将字符串转换为字节数组，可以这样做：\n\n```\nvar\
    \ b []byte\nb = []byte(\"string\")\n```\n\n要将整个数组/切片转换为字符串，请使用：\n\n```\nvar s\
    \ string\ns = string(b[:])\n```\n\n我们需要重点关注的第二种类型转换称为函数适配器，其最常见的形式如下：\n\n```\n\
    ...\nhttp.Handle(\"/\", http.HandlerFunc(func (w ResponseWriter, r *Request) {fmt.Fprintf(w,\"\
    hi\")}))\n...\n$ go doc --src http.HandlerFunc\npackage http // import \"net/http\"\
    \n// HandlerFunc 类型是一个适配器，允许将普通函数用作 HTTP 处理程序。\n// 如果 f 是一个具有适当签名的函数，则 HandlerFunc(f)\
    \ 是一个\n// 会调用 f 的 Handler。\ntype HandlerFunc func(ResponseWriter, *Request)\n\
    func (f HandlerFunc) ServeHTTP(w ResponseWriter, r *Request)\n```\n\n通过使用这种类型，对\
    \ `HandlerFunc.ServeHTTP` 的调用将触发我们传入的函数。\n\n# 语句\n\n一个函数或方法由一组语句组成。这些语句包括赋值、`if`\
    \ 和 `switch` 语句、`for` 和 `while` 循环以及其他几种。\n\n除了语法之外，这些语句与其他编程语言中的含义基本相同。几乎所有类型的语句都将在后面的章节中使用。\n\
    \n# GOPATH\n\n有两种组织项目工作区的方式：将所有项目放在一个共享工作区，或者为每个项目设置独立的工作区。\n\nGo 工具通过环境变量 `GOPATH`\
    \ 支持这两种方式。该变量可以设置为一个目录列表（在 Linux/UNIX 中是用 `:` 分隔的列表，在 Windows 中是用 `;` 分隔的列表，在\
    \ Plan9 中是一个列表）。如果未设置，则默认为用户主目录下的 `go` 目录。\n\n对于 `GOPATH` 中的每个目录，都会有三个子目录——`src`、`pkg`\
    \ 和 `bin`。`src` 目录通常每个包名包含一个目录，其下是该包的源文件。例如，在第 10 章中，我们有一个完整的 web 服务器，它使用了我们定义的包：`dictionary`\
    \ 和 `flashcards`。`src/flashcards` 目录包含文件 `FlashCards.go`。\n\n即使在使用模块时，`GOPATH`\
    \ 也用作下载依赖项的中心位置。将 `GOPATH` 设置为其他位置是有原因的，但这些原因大多在模块和工作区出现之前。\n\n# 运行 Go 程序\n\n\
    一个 Go 程序必须有一个定义 `main` 包的文件。本书中的大多数程序都定义在单个文件中，例如第 3 章中的程序 `IP.go`。运行它的最简单方法是从包含该文件的目录执行：\n\
    \n```\ngo run IP.go\n```\n\n或者，你可以先构建一个可执行文件，然后运行它：\n\n```\ngo build IP.go\n./IP\
    \ \n```\n\n# 标准库\n\nGo 拥有广泛的标准库集合。虽然不如 C、Java 或 C++ 那么大，但那些语言已经存在了相当*长*的时间。Go\
    \ 包的文档在 [`https://pkg.go.dev/std`](https://pkg.go.dev/std)。我们将在本书中广泛使用这些库，特别是\
    \ `net`、`crypto` 和 `encoding` 包。\n\n此外，在同一个页面上还有一个子仓库包组。这些包不太稳定，但有时包含有用的包，我们会偶尔使用。\n\
    \n除了这些，还有大量用户贡献的包。本书正文内容涉及的是原理，因此不会使用这些包，但在实践中，你可能会发现它们中的许多非常有用。一些会在最后一章中讨论。\n"
- fmt: "# Error Values\n\nWe discussed in the last chapter that a major difference\
    \ between distributed and local programming is the greatly increased likelihood\
    \ of errors occurring during execution. A local function call may fail because\
    \ of simple programming errors such as divide by zero; more subtle errors may\
    \ occur such as out-of-memory errors, but their possible occurrences are generally\
    \ predictable.\n\nOn the other hand, almost any function that utilizes the network\
    \ can fail for reasons beyond the application’s control. Networking programs are\
    \ consequently riddled with error checks. This is tedious, but necessary. Just\
    \ like operating system kernel code is always error checking – errors need to\
    \ be managed.\n\nIn this book, we generally exit a program with errors with appropriate\
    \ messages on the client side, and for servers, attempt to recover by dropping\
    \ the offending connection and carrying on.\n\nLanguages like C generally signal\
    \ errors by returning “illegal” values such as negative integers and null pointers\
    \ or by raising a signal. Languages like Java raise exceptions, which can lead\
    \ to messy code and are often slow. The standard Go functions give an error in\
    \ an extra parameter return from a function call.\n\nFor example, in the next\
    \ chapter, we discuss the function in the `net` package:\n\n```go\nfunc ResolveIPAddr(net,\
    \ addr string) (*IPAddr, error)\n```\n\nThe typical code to manage this is:\n\n\
    ```go\naddr, err := net.ResolveIPAddr(\"ip\", name)\nif err != nil {\n    ...\n\
    }\n```\n\n## Conclusion\n\nThis book assumes a knowledge of the Go programming\
    \ language. This chapter just highlighted those parts that will be needed for\
    \ later chapters.\n\n# 3. Socket-Level Programming\n\nA socket is an abstract\
    \ representation of a network endpoint. Depending on the operating system, we\
    \ can construct sockets based on the following features: domain, type, and protocol.\
    \ A “domain“ typically represents either a remote network connection (e.g., via\
    \ IPv4 or IPv6) or a local connection (e.g., via filesystem). Various optimizations\
    \ can be acquired when we don’t have to concern ourselves crossing many networks.\
    \ A “type” selects a connection-oriented or connectionless pairing of sockets.\
    \ Sockets provide the necessary abstraction to set up point-to-point communication.\n\
    \nThere are many kinds of networks in the world. These range from the very old\
    \ networks, such as serial links, to wide area networks made from copper and fiber,\
    \ to wireless networks of various kinds, both for computers and for telecommunications\
    \ devices such as phones. These networks obviously differ at the physical link\
    \ layer, but in many cases, they also differ at higher layers of the OSI stack.\n\
    \nOver the years, there has been a convergence to the “Internet stack” of IP and\
    \ TCP/UDP. For example, Bluetooth defines physical layers and protocol layers,\
    \ but on top of that, it has an IP stack, so the same Internet programming techniques\
    \ can be employed on many Bluetooth devices. Similarly, developing Internet of\
    \ Things (IoT) wireless technologies such as LoRaWAN and 6LoWPAN includes an IP\
    \ stack.\n\nWhile IP provides the networking layer 3 of the OSI stack, TCP and\
    \ UDP deal with layer 4. These are not the final word, even in the Internet world:\
    \ SCTP (Stream Control Transmission Protocol) has come from the telecommunications\
    \ world to challenge both TCP and UDP, while to provide Internet services in interplanetary\
    \ space requires new, under-development protocols such as DTN (Delay-Tolerant\
    \ Networking). Nevertheless, IP, TCP, and UDP hold sway as principal networking\
    \ technologies now and at least for a considerable time into the future. Go has\
    \ full support for this style of programming.\n\nThis chapter shows how to do\
    \ TCP and UDP programming using Go and how to use a raw socket for other protocols.\n\
    \n## The TCP/IP Stack\n\nThe OSI model (ISO/IEC 7498) was devised using a committee\
    \ process wherein the standard was set up and then implemented. Some parts of\
    \ the OSI standard are obscure, some parts cannot easily be implemented, and some\
    \ parts have not been implemented.\n\nThe TCP/IP protocol was devised through\
    \ a long-running DARPA project. This worked by implementation followed by RFCs\
    \ (Request for Comments). TCP/IP is the principal UNIX networking protocol. TCP/IP\
    \ stands for Transmission Control Protocol/Internet Protocol (RFC 793/RFC 791).\n\
    \nThe TCP/IP stack is shorter than the OSI one, as shown in Figure 3-1.\n\n![Figure\
    \ 3-1 TCP/IP stack vs. the OSI](images/436770_2_En_3_Chapter/436770_2_En_3_Fig1_HTML.png)\n\
    \nTCP is a connection-oriented protocol, whereas UDP (User Datagram Protocol)\
    \ is a connectionless protocol.\n\nWe next discuss the layers above the point-to-point\
    \ communication (Physical/Data Link) layers.\n\n### IP Datagrams\n\nThe IP layer\
    \ provides a connectionless and unreliable delivery system. It considers each\
    \ datagram independently of the others. Any association between datagrams must\
    \ be supplied by the higher layers. The datagram itself is a well-defined format;\
    \ at a high level, it includes a header and a payload. Fields of importance include\
    \ address information and higher layer protocol choice.\n\nThe IP layer supplies\
    \ a checksum of its own header. The IP protocol defaults any error correction\
    \ to other layers. The header includes the source and destination addresses. The\
    \ IP layer handles routing through an Internet. It is also responsible for breaking\
    \ up large datagrams into smaller ones for transmission and reassembling them\
    \ at the other end. Combining the prior statements, each router verifies IP packet\
    \ correctness via its checksum. Additionally, a router will modify the IP packet\
    \ header (e.g., modified TTL) triggering it to recalculate and replace the header.\n\
    \nAbove the networking layer, we have the following transport layer options.\n\
    \n### UDP\n\nUDP is also connectionless and unreliable. What it adds to IP is\
    \ a checksum for the contents of the datagram and *port numbers*. These are used\
    \ to give a client-server model, which you’ll see later. Think of ports as apartment\
    \ numbers, and an IP address is an apartment street number.\n\n### TCP\n\nTCP\
    \ supplies logic to give a reliable connection-oriented protocol above IP. It\
    \ provides a *virtual circuit* that two processes can use to communicate. It also\
    \ uses port numbers to identify services on a host. With TCP, the two sockets\
    \ used in the client-server connection over TCP represent a virtual circuit. While\
    \ it feels like a dedicated physical connection, many virtual circuits can run\
    \ over the same physical connection(s).\n\nWe briefly touched the networking (IP)\
    \ and transport (UDP/TCP) layers, there is much more to learn. For example, IP\
    \ fragmentation and TCP segmentation allow each layer to control the size of each\
    \ packet it passes to the next layer. It may sound similar, but in this example,\
    \ TCP segments include sequence information to keep packets in order (reliability),\
    \ and IP fragmentation is focused on optimizing passing data to the layers below\
    \ it (which have their own maximum size).\n\nIt is the IP address that is key\
    \ for the usage of sockets."
  raw: '## Error Values


    We discussed in the last chapter that a major difference between distributed and
    local programming is the greatly increased likelihood of errors occurring during
    execution. A local function call may fail because of simple programming errors
    such as divide by zero; more subtle errors may occur such as out-of-memory errors,
    but their possible occurrences are generally predictable.


    On the other hand, almost any function that utilizes the network can fail for
    reasons beyond the application’s control. Networking programs are consequently
    riddled with error checks. This is tedious, but necessary. Just like operating
    system kernel code is always error checking `–` errors need to be managed.


    In this book, we generally exit a program with errors with appropriate messages
    on the client side, and for servers, attempt to recover by dropping the offending
    connection and carrying on.


    Languages like C generally signal errors by returning “illegal” values such as
    negative integers and null pointers or by raising a signal. Languages like Java
    raise exceptions, which can lead to messy code and are often slow. The standard
    Go functions give an error in an extra parameter return from a function call.


    For example, in the next chapter, we discuss the function in the `net` package:


    ```

    func ResolveIPAddr(net, addr string) (*IPAddr, error)

    ```


    The typical code to manage this is


    ```

    addr, err := net.ResolveIPAddr("ip", name)

    if err != nil {

    ...

    }

    ```


    ## Conclusion


    This book assumes a knowledge of the Go programming language. This chapter just
    highlighted those parts that will be needed for later chapters.


    # 3. Socket-Level Programming


    A socket is an abstract representation of a network endpoint. Depending on the
    operating system, we can construct sockets based on the following features: domain,
    type, and protocol. A “domain“ typically represents either a remote network connection
    (e.g., via IPv4 or IPv6) or a local connection (e.g., via filesystem). Various
    optimizations can be acquired when we don’t have to concern ourselves crossing
    many networks. A “type” selects a connection-oriented or connectionless pairing
    of sockets. Sockets provide the necessary abstraction to set up point-to-point
    communication.


    There are many kinds of networks in the world. These range from the very old networks,
    such as serial links, to wide area networks made from copper and fiber, to wireless
    networks of various kinds, both for computers and for telecommunications devices
    such as phones. These networks obviously differ at the physical link layer, but
    in many cases, they also differ at higher layers of the OSI stack.


    Over the years, there has been a convergence to the “Internet stack” of IP and
    TCP/UDP. For example, Bluetooth defines physical layers and protocol layers, but
    on top of that, it has an IP stack, so the same Internet programming techniques
    can be employed on many Bluetooth devices. Similarly, developing Internet of Things
    (IoT) wireless technologies such as LoRaWAN and 6LoWPAN includes an IP stack.


    While IP provides the networking layer 3 of the OSI stack, TCP and UDP deal with
    layer 4\. These are not the final word, even in the Internet world: SCTP (Stream
    Control Transmission Protocol) has come from the telecommunications world to challenge
    both TCP and UDP, while to provide Internet services in interplanetary space requires
    new, under-development protocols such as DTN (Delay-Tolerant Networking). Nevertheless,
    IP, TCP, and UDP hold sway as principal networking technologies now and at least
    for a considerable time into the future. Go has full support for this style of
    programming.


    This chapter shows how to do TCP and UDP programming using Go and how to use a
    raw socket for other protocols.


    ## The TCP/IP Stack


    The OSI model (ISO/IEC 7498) was devised using a committee process wherein the
    standard was set up and then implemented. Some parts of the OSI standard are obscure,
    some parts cannot easily be implemented, and some parts have not been implemented.


    The TCP/IP protocol was devised through a long-running DARPA project. This worked
    by implementation followed by RFCs (Request for Comments). TCP/IP is the principal
    UNIX networking protocol. TCP/IP stands for Transmission Control Protocol/Internet
    Protocol (RFC 793/RFC 791).


    The TCP/IP stack is shorter than the OSI one, as shown in Figure [3-1](#436770_2_En_3_Chapter.xhtml#Fig1).


    ![](images/436770_2_En_3_Chapter/436770_2_En_3_Fig1_HTML.png)


    Figure 3-1


    TCP/IP stack vs. the OSI


    TCP is a connection-oriented protocol, whereas UDP (User Datagram Protocol) is
    a connectionless protocol.


    We next discuss the layers above the point-to-point communication (Physical/Data
    Link) layers.


    ### IP Datagrams


    The IP layer provides a connectionless and unreliable delivery system. It considers
    each datagram independently of the others. Any association between datagrams must
    be supplied by the higher layers. The datagram itself is a well-defined format;
    at a high level, it includes a header and a payload. Fields of importance include
    address information and higher layer protocol choice.


    The IP layer supplies a checksum of its own header. The IP protocol defaults any
    error correction to other layers. The header includes the source and destination
    addresses. The IP layer handles routing through an Internet. It is also responsible
    for breaking up large datagrams into smaller ones for transmission and reassembling
    them at the other end. Combining the prior statements, each router verifies IP
    packet correctness via its checksum. Additionally, a router will modify the IP
    packet header (e.g., modified TTL) triggering it to recalculate and replace the
    header.


    Above the networking layer, we have the following transport layer options.


    ### UDP


    UDP is also connectionless and unreliable. What it adds to IP is a checksum for
    the contents of the datagram and *port numbers.* These are used to give a client-server
    model, which you’ll see later. Think of ports as apartment numbers, and an IP
    address is an apartment street number.


    ### TCP


    TCP supplies logic to give a reliable connection-oriented protocol above IP. It
    provides a *virtual circuit* that two processes can use to communicate. It also
    uses port numbers to identify services on a host. With TCP, the two sockets used
    in the client-server connection over TCP represent a virtual circuit. While it
    feels like a dedicated physical connection, many virtual circuits can run over
    the same physical connection(s).


    We briefly touched the networking (IP) and transport (UDP/TCP) layers, there is
    much more to learn. For example, IP fragmentation and TCP segmentation allow each
    layer to control the size of each packet it passes to the next layer. It may sound
    similar, but in this example, TCP segments include sequence information to keep
    packets in order (reliability), and IP fragmentation is focused on optimizing
    passing data to the layers below it (which have their own maximum size).


    It is the IP address that is key for the usage of sockets.'
  trans: "\n# 错误值\n\n上一章讨论过，分布式编程与本地编程的一个主要区别在于执行过程中出现错误的概率显著增加。本地函数调用可能因简单的编程错误（如除以零）而失败；也可能出现更微妙的错误（如内存不足），但它们的发生概率通常是可预见的。\n\
    \n另一方面，几乎所有利用网络的函数都可能因应用程序无法控制的原因而失败。因此，网络程序布满了错误检查。这虽然繁琐，但却是必要的。就像操作系统内核代码总是进行错误检查一样——错误需要被管理。\n\
    \n在本书中，对于客户端，我们通常会在出现错误时打印相应信息并退出程序；对于服务器，我们会尝试通过断开有问题的连接并继续运行来恢复。\n\n像 C 语言这样的语言通常通过返回“非法”值（如负整数和空指针）或引发信号来指示错误。像\
    \ Java 这样的语言会抛出异常，这可能导致代码混乱且通常较慢。标准的 Go 函数则通过函数调用返回的额外参数来提供错误信息。\n\n例如，在下一章中，我们会讨论`net`包中的函数：\n\
    \n```go\nfunc ResolveIPAddr(net, addr string) (*IPAddr, error)\n```\n\n处理该函数的典型代码如下：\n\
    \n```go\naddr, err := net.ResolveIPAddr(\"ip\", name)\nif err != nil {\n    ...\n\
    }\n```\n\n## 结论\n\n本书假定读者已具备 Go 编程语言的知识。本章仅重点介绍后续章节所需的部分内容。\n\n# 3. 套接字级编程\n\n\
    套接字是网络端点的一种抽象表示。根据操作系统的不同，我们可以基于以下特性构建套接字：域、类型和协议。“域”通常代表远程网络连接（例如，通过 IPv4 或 IPv6）或本地连接（例如，通过文件系统）。当我们无需考虑跨越多网络传输时，可以获得多种优化。“类型”用于选择面向连接或无连接的套接字配对。套接字为建立点对点通信提供了必要的抽象。\n\
    \n世界上存在多种网络。从非常古老的网络（如串行链路），到由铜线和光纤构成的广域网，再到各种类型的无线网络（用于计算机和电话等电信设备）。这些网络在物理链路层显然不同，但在许多情况下，它们在\
    \ OSI 模型的高层也不同。\n\n多年来，网络技术已逐渐收敛到由 IP 和 TCP/UDP 构成的“互联网协议栈”。例如，蓝牙定义了物理层和协议层，但在此之上，它还有一个\
    \ IP 协议栈，因此许多互联网编程技术同样适用于蓝牙设备。类似地，开发物联网（IoT）无线技术（如 LoRaWAN 和 6LoWPAN）也包含了 IP 协议栈。\n\
    \n虽然 IP 提供了 OSI 模型的网络层（第 3 层），但 TCP 和 UDP 处理的是传输层（第 4 层）。即使在互联网世界中，它们也并非最终方案：SCTP（流控制传输协议）来自电信领域，旨在挑战\
    \ TCP 和 UDP；而要在行星际空间提供互联网服务，则需要新的、正在开发中的协议，如 DTN（延迟容忍网络）。尽管如此，IP、TCP 和 UDP 现在以及未来相当长一段时间内仍将是主要的网络技术。Go\
    \ 对此类编程风格提供了全面支持。\n\n本章将展示如何使用 Go 进行 TCP 和 UDP 编程，以及如何使用原始套接字处理其他协议。\n\n## TCP/IP\
    \ 协议栈\n\nOSI 模型（ISO/IEC 7498）是通过委员会流程制定的，即先设立标准，然后实施。OSI 标准的某些部分晦涩难懂，某些部分不易实现，还有部分尚未实现。\n\
    \nTCP/IP 协议则是由 DARPA（美国国防部高级研究计划局）长期项目开发的。其工作方式是先有实现，随后发布 RFC（请求评议）。TCP/IP 是主要的\
    \ UNIX 网络协议。TCP/IP 代表传输控制协议/互联网协议（RFC 793/RFC 791）。\n\n如图 3-1 所示，TCP/IP 协议栈比 OSI\
    \ 协议栈更简洁。\n\n![图 3-1 TCP/IP 协议栈与 OSI 协议栈对比](img/436770_2_En_3_Fig1_HTML.png)\n\
    \nTCP 是一种面向连接的协议，而 UDP（用户数据报协议）是一种无连接协议。\n\n接下来，我们讨论点对点通信层（物理层/数据链路层）之上的各层。\n\n\
    ### IP 数据报\n\nIP 层提供了一种无连接且不可靠的交付系统。它将每个数据报视为独立于其他数据报。数据报之间的任何关联必须由更高层提供。数据报本身具有明确定义的格式；从高层次看，它包含一个头部和一个有效载荷。重要的字段包括地址信息和上层协议选择。\n\
    \nIP 层为其自身头部提供校验和。IP 协议默认将任何错误纠正交由其他层处理。头部包含源地址和目标地址。IP 层负责通过互联网进行路由。它还负责将大型数据报拆分成较小的数据报进行传输，并在另一端重新组装。结合前述内容，每个路由器都通过其校验和验证\
    \ IP 数据包的正确性。此外，路由器会修改 IP 数据包头部（例如，修改 TTL），从而触发其重新计算并替换头部。\n\n在网络层之上，我们有以下传输层选项。\n\
    \n### UDP\n\nUDP 同样是无连接且不可靠的。它相对于 IP 增加了数据报内容的校验和以及*端口号*。这些端口号用于实现客户端-服务器模型，稍后你会看到。可以把端口想象成公寓号码，而\
    \ IP 地址则是公寓的街道门牌号。\n\n### TCP\n\nTCP 提供了逻辑，在 IP 之上构建可靠的面向连接协议。它提供了一个*虚拟电路*，两个进程可以通过它进行通信。它还使用端口号来标识主机上的服务。在\
    \ TCP 中，客户端-服务器连接中使用的两个套接字代表一个虚拟电路。虽然感觉像是专用的物理连接，但许多虚拟电路可以运行在同一个（或多个）物理连接上。\n\n\
    我们简要介绍了网络层（IP）和传输层（UDP/TCP），但还有很多需要学习的内容。例如，IP 分片和 TCP 分段允许每一层控制传递给下一层的每个数据包的大小。这听起来可能相似，但在本例中，TCP\
    \ 分段包含序列信息以保持数据包顺序（可靠性），而 IP 分片则侧重于优化将数据传递给其下层（这些下层有自己的最大尺寸）。\n\nIP 地址是使用套接字的关键。\n"
- fmt: '# Internet Addresses


    In order to use a service, you must be able to find it. The Internet uses an address
    scheme for devices such as computers so that they can be located. This addressing
    scheme was originally devised when there were only a handful of connected computers
    and very generously allowed up to 2^32 addresses using a 32-bit unsigned integer.
    These are the so-called IPv4 addresses. In recent years, the number of connected
    (or at least directly addressable) devices has threatened to exceed this number,
    and there is a progressive transition to IPv6. The transition is patchy and shown,
    for example, in the graph by Google (`https://www.google.com/intl/en/ipv6/statistics.html`
    – ~37% as of January 2022). Sadly – from Jan’s viewpoint – few of the Australian
    IP providers support IPv6 (~30% as of 2022). In the United States (for Ron), it’s
    a little higher at ~50%. These numbers are based on observed incoming traffic
    and related records.


    ## IPv4 Addresses


    The address is a 32-bit integer that gives the IP address. This addresses down
    to a network interface card on a single device. The address is usually written
    as four bytes in decimal with a dot between them, as in `127.0.0.1` or `66.102.11.104`.
    This dotted-decimal format captures multiple pieces of information in a human-friendly
    way.


    The IP address of any device is generally composed of two parts: the address of
    the network in which the device resides and the address of the device within that
    network. Once upon a time, the split between network address and internal address
    was simple and was based on the bytes (between dots) used in the IP address.


    - In a class A network, the first byte identifies the network, while the last
    three identify the device. There are only 128 class A networks, owned by the very
    early players in the Internet space such as IBM, General Electric Company, and
    MIT.^([²](#fn2)) Example: `3.x.y.z`.


    - Class B networks use the first two bytes to identify the network and the last
    two to identify devices within the subnet. This allows up to 2^16 (65,536) devices
    on a subnet. Example: `142.90.y.z`.


    - Class C networks use the first three bytes to identify the network and the last
    one to identify devices within that network. This allows up to 2^8 (actually 254,
    not 256, as the bottom and top addresses are reserved) devices. Example: `192.168.123.z`.


    There are classes defined beyond class C (D and E). We stop here as it becomes
    more of historical study than useful knowledge when discussing networking today.


    This scheme doesn’t work well if you want, say, 400 computers on a network. 254
    is too small (class C), while 65,536 (-2) is too large (class B). In binary arithmetic
    terms, you want about 512 (-2). This can be achieved by using a 23-bit network
    address and 9 bits for the device addresses. Similarly, if you want up to 1024
    (-2) devices, you use a 22-bit network address and a 10-bit device address. A
    newer scheme was created to replace class-based addressing, known as Classless
    Inter-Domain Routing (a.k.a. CIDR), allowing for the scenario we are describing.


    Given an IP address of a device and knowing how many bits `N` are used for the
    network address gives a relatively straightforward process for extracting the
    network address and the device address within that network. Form a “network mask”
    (also called a subnet mask), which is a 32-bit binary number with all ones in
    the first `N` places and all zeroes in the remaining ones. For example, if 16
    bits are used for the network address, the mask is `11111111111111110000000000000000`.
    It’s a little inconvenient using binary, so decimal bytes are usually used. The
    netmask for 16-bit network addresses is `255.255.0.0`; for 24-bit network addresses,
    it is `255.255.255.0`; for 23-bit addresses, it would be `255.255.254.0`; and
    for 22-bit addresses, it would be `255.255.252.0`. This network mask is a generalization
    for the class-based addressing. Shorthand for a 24-bit network is `/24`; for a
    22-bit address, it is `/22`.


    So to find the network address of a device, bit-wise `AND` its IP address with
    the network mask, while the device address within the subnet is found with bit-wise
    `AND` of the one’s complement of the mask with the IP address. For example, the
    binary value of the IP address `192.168.1.3` is `11000000101010000000000100000011`
    (using the IP Address Subnet Mask Calculator). If a 16-bit netmask is used, the
    network is `1100000010101000 0000000000000000` (or `192.168.0.0`), while the device
    address is `0000000000000000 0000000100000011` (or `0.0.1.3`).


    A network mask is provided when a network provider gives you a network. For example,
    a local ISP provides your office a `w.x.y.z/29` (six host addresses). An ISP gets
    a block (large number of hosts) from a RIR (Regional Internet Registry)/IANA (Internet
    Assigned Numbers Authority). In general, each reduction of the network subnet
    number results in doubling the number of hosts (power of 2).


    ## IPv6 Addresses


    The Internet has grown vastly beyond original expectations. The initially generous
    32-bit addressing scheme is on the verge of running out. There are unpleasant
    workarounds such as NAT (Network Address Translation) addressing, but eventually
    we will have to switch to a wider address space. IPv6 uses 128-bit addresses.
    Even bytes become cumbersome to express such addresses, so hexadecimal digits
    are used, grouped into four digits and separated by a colon. A typical address
    might be `FE80:CD00:0000:0CDE:1257:0000:211E:729C`.


    These addresses are not easy to remember! DNS will become even more important.
    There are tricks to reducing some addresses, such as leading zeroes and repeated
    digits. For example, “localhost” is `0:0:0:0:0:0:0:1`, which can be shortened
    to `::1`.


    Each address is divided into three components. The first is the network address
    used for Internet routing and is the first 64 bits of the address. The next part
    is 16 bits for the netmask. This is used to divide the network into subnets. It
    can give anything from one subnet only (all zeroes) to 65,535 subnets (all 1s).
    The last part is the device component, of 48 bits. The preceding address would
    be `FE80:CD00:0000:0CDE` for the network, `1257` for the subnet, and `0000:211E:729C`
    for the device.


    Some points of comparison between IPv6 and IPv4:


    - IPv6 has no checksum header (it assumes other layers perform verification).


    - Many fields in header are optional in IPv6.


    - While larger in general, overall packet header structure is quicker to parse
    (simplifying router processing).


    - IPv6 reduces fragmentation compared to IPv4 due to larger datagram sizing and
    reduced router reconstructing (moving to edge nodes).'
