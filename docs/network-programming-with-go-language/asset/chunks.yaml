- fmt: '# Architectural Layers


    This chapter covers the major architectural features of distributed systems. A
    distributed system is a collection of components interacting over a network. You
    can’t build a system without some idea of what you want to build. And you can’t
    build it if you don''t know the environment in which it will work. `GUI` programs
    are different than batch processing programs; games programs are different than
    business programs; and distributed programs are different than stand-alone programs.
    They each have their approaches, their common patterns, the problems that typically
    arise, and the solutions that are often used.


    This chapter covers the high-level architectural aspects of distributed systems.
    There are many ways of looking at such systems, and many of these are dealt with.
    We begin with a layering model to help us understand component boundaries, discuss
    network implementation details, and consider how our components message each other,
    wrapping up with error conditions and how to think about them.


    ## Protocol Layers


    Distributed systems are *hard*. There are multiple computers involved, which have
    to be connected in some way. Programs have to be written to run on each computer
    in the system, and they all have to cooperate to get a distributed task done.


    The common way to deal with complexity is to break it down into smaller and simpler
    parts. These parts have their own structure, but they also have defined means
    of communicating with other related parts. In distributed systems, the parts are
    called *protocol layers,* and they have clearly defined functions. They form a
    stack, with each layer communicating with the layer above and the layer below.
    The communication between layers is defined by protocols.


    Network communications require protocols to cover high-level application communication
    all the way down to wire communication and the complexity handled by encapsulation
    in protocol layers.


    ### ISO OSI Protocol


    Although it was never properly implemented, the OSI (Open Systems Interconnect)
    protocols have been a major influence in ways of talking about and influencing
    distributed systems design. It is commonly given as shown in Figure 1-1.


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig1_HTML.png)


    **Figure 1-1** The Open Systems Interconnect protocol


    ### OSI Layers


    The function of each layer from bottom to top is as follows:


    - The Physical layer conveys the bit stream using electrical, optical, or radio
    technologies.

    - The Data Link layer puts the information packets into network frames for transmission
    across the Physical layer and back into information packets.

    - The Network layer provides switching and routing technologies.

    - The Transport layer provides transparent transfer of data between end systems
    and is responsible for end-to-end error recovery and flow control.

    - The Session layer establishes, manages, and terminates connections between applications.

    - The Presentation layer provides independence from differences in data representation
    (e.g., encryption).

    - The Application layer supports application and end-user processes.


    A layer in the OSI model often maps to a modern protocol; for example, the `IP`
    from `TCP/IP` maps to the Network layer, also known as layer 3 (Physical is layer
    1). The Application layer, layer 7, maps to `HTTP`. Some protocols like `HTTPS`
    seem to blend layers, 5 (Session) and 6 (Presentation). No model is perfect; alternatives
    exist to the OSI model that maps closer to a given reality, such as the `TCP/IP`
    protocol model.


    ### TCP/IP Protocol


    While the OSI model was being argued, debated, partly implemented, and fought
    over, the DARPA Internet research project was busy building the `TCP/IP` protocols.
    These have been immensely successful and have led to *The Internet* (with capitals).
    This is a much simpler stack, as shown in Figure 1-2.


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig2_HTML.png)


    **Figure 1-2** The TCP/IP protocols


    ### Some Alternative Protocols


    Although it almost seems like it, the `TCP/IP` protocols are not the only ones
    in existence and in the long run may not even be the most successful. Wikipedia’s
    list of network protocols (see `https://en.wikipedia.org/wiki/List_of_network_protocols_(OSI_model)`)
    has a huge number more, at each of the OSI ISO layers. Many of these are obsolete
    or of little use, but due to advances in technology in all sorts of areas – such
    as the Internet in Space and the Internet of Things – there will always be room
    for new protocols.


    The primary focus in this book is on OSI layers 3 and 4 (`TCP/IP`, including `UDP`),
    but you should be aware that there are other ones.


    ## Networking


    A *network* is a communications system for connecting end systems called hosts.
    The mechanisms of connection might be copper wire, Ethernet, fiber optic, or wireless,
    but that won’t concern us here. A local area network (LAN) connects computers
    that are close together, typically belonging to a home, small organization, or
    part of a larger organization.


    A wide area network (WAN) connects computers across a larger physical area, such
    as between cities. There are other types as well, such as MANs (metropolitan area
    networks), PANs (personal area networks), and even BANs (body area networks).


    An internet is a connection of two or more distinct networks, typically LANs or
    WANs. An intranet is an Internet with all networks belonging to a single organization.


    There are significant differences between an internet and an intranet. Typically,
    an intranet will be under a single administrative control, which will impose a
    single set of coherent policies. An internet, on the other hand, will not be under
    the control of a single body, and the controls exercised over different parts
    may not even be compatible.


    A trivial example of such differences is that an intranet will often be restricted
    to computers by a small number of vendors running a standardized version of a
    particular operating system. On the other hand, an internet will often have a
    smorgasbord of different computers and operating systems.


    The techniques of this book are applicable to internets. They are also valid with
    intranets, but there you will also find specialized, nonportable systems.


    And then there is the “mother” of all internets: The Internet. This is just a
    very, very large internet that connects us to Google, my computer to your computer,
    and so on.


    ## Gateways


    A *gateway* is a generic term for an entity used to connect two or more networks.
    A repeater operates at the Physical level and copies information from one subnet
    to another. A bridge operates at the Data Link layer level and copies frames between
    networks. A router operates at the Network level and not only moves information
    between networks but also decides on the route.


    ## Host-Level Networking


    On a single host, we have additional concerns when designing, debugging, or deploying
    network-based software. Some of these items include the following:


    - DNS (domain name system, i.e., human-friendly naming)

    - Firewalls (e.g., blocking inbound or outbound traffic)

    - Routing (e.g., figuring out which network to place a packet)

    - Host Identity management (e.g., IP address)

    - Performance controls (e.g., traffic shaping or retries)

    - Connection issues (e.g., missing network adapter, intramachine process communication)


    Through examples, we will see how a host misconfiguration might manifest in our
    software.'
  raw: '# 1. Architectural Layers


    This chapter covers the major architectural features of distributed systems. A
    distributed system is a collection of components interacting over a network. You
    can’t build a system without some idea of what you want to build. And you can’t
    build it if you don''t know the environment in which it will work. GUI programs
    are different than batch processing programs; games programs are different than
    business programs; and distributed programs are different than stand-alone programs.
    They each have their approaches, their common patterns, the problems that typically
    arise, and the solutions that are often used.


    This chapter covers the high-level architectural aspects of distributed systems.
    There are many ways of looking at such systems, and many of these are dealt with.
    We begin with a layering model to help us understand component boundaries, discuss
    network implementation details, and consider how our components message each other,
    wrapping up with error conditions and how to think about them.


    ## Protocol Layers


    Distributed systems are *hard*. There are multiple computers involved, which have
    to be connected in some way. Programs have to be written to run on each computer
    in the system, and they all have to cooperate to get a distributed task done.


    The common way to deal with complexity is to break it down into smaller and simpler
    parts. These parts have their own structure, but they also have defined means
    of communicating with other related parts. In distributed systems, the parts are
    called *protocol layers,* and they have clearly defined functions. They form a
    stack, with each layer communicating with the layer above and the layer below.
    The communication between layers is defined by protocols.


    Network communications require protocols to cover high-level application communication
    all the way down to wire communication and the complexity handled by encapsulation
    in protocol layers.


    ### ISO OSI Protocol


    Although it was never properly implemented, the OSI (Open Systems Interconnect)
    protocols have been a major influence in ways of talking about and influencing
    distributed systems design. It is commonly given as shown in Figure [1-1](#436770_2_En_1_Chapter.xhtml#Fig1).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig1_HTML.png)


    Figure 1-1


    The Open Systems Interconnect protocol


    ### OSI Layers


    The function of each layer from bottom to top is as follows:


    *   The Physical layer conveys the bit stream using electrical, optical, or radio
    technologies.


    *   The Data Link layer puts the information packets into network frames for transmission
    across the Physical layer and back into information packets.


    *   The Network layer provides switching and routing technologies.


    *   The Transport layer provides transparent transfer of data between end systems
    and is responsible for end-to-end error recovery and flow control.


    *   The Session layer establishes, manages, and terminates connections between
    applications.


    *   The Presentation layer provides independence from differences in data representation
    (e.g., encryption).


    *   The Application layer supports application and end-user processes.


    A layer in the OSI model often maps to a modern protocol; for example, the IP
    from TCP/IP maps to the Network layer, also known as layer 3 (Physical is layer
    1). The Application layer, layer 7, maps to HTTP. Some protocols like HTTPS seem
    to blend layers, 5 (Session) and 6 (Presentation). No model is perfect; alternatives
    exist to the OSI model that maps closer to a given reality, such as the TCP/IP
    protocol model.


    ### TCP/IP Protocol


    While the OSI model was being argued, debated, partly implemented, and fought
    over, the DARPA Internet research project was busy building the TCP/IP protocols.
    These have been immensely successful and have led to *The Internet* (with capitals).
    This is a much simpler stack, as shown in Figure [1-2](#436770_2_En_1_Chapter.xhtml#Fig2).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig2_HTML.png)


    Figure 1-2


    The TCP/IP protocols


    ### Some Alternative Protocols


    Although it almost seems like it, the TCP/IP protocols are not the only ones in
    existence and in the long run may not even be the most successful. Wikipedia’s
    list of network protocols (see [`https://en.wikipedia.org/wiki/List_of_network_protocols_(OSI_model)`](https://en.wikipedia.org/wiki/List_of_network_protocols_(OSI_model)))
    has a huge number more, at each of the OSI ISO layers. Many of these are obsolete
    or of little use, but due to advances in technology in all sorts of areas `–`
    such as the Internet in Space and the Internet of Things `–` there will always
    be room for new protocols.


    The primary focus in this book is on OSI layers 3 and 4 (TCP/IP, including UDP),
    but you should be aware that there are other ones.


    ## Networking


    A *network* is a communications system for connecting end systems called hosts.
    The mechanisms of connection might be copper wire, Ethernet, fiber optic, or wireless,
    but that won’t concern us here. A local area network (LAN) connects computers
    that are close together, typically belonging to a home, small organization, or
    part of a larger organization.


    A wide area network (WAN) connects computers across a larger physical area, such
    as between cities. There are other types as well, such as MANs (metropolitan area
    networks), PANs (personal area networks), and even BANs (body area networks).


    An internet is a connection of two or more distinct networks, typically LANs or
    WANs. An intranet is an Internet with all networks belonging to a single organization.


    There are significant differences between an internet and an intranet. Typically,
    an intranet will be under a single administrative control, which will impose a
    single set of coherent policies. An internet, on the other hand, will not be under
    the control of a single body, and the controls exercised over different parts
    may not even be compatible.


    A trivial example of such differences is that an intranet will often be restricted
    to computers by a small number of vendors running a standardized version of a
    particular operating system. On the other hand, an internet will often have a
    smorgasbord of different computers and operating systems.


    The techniques of this book are applicable to internets. They are also valid with
    intranets, but there you will also find specialized, nonportable systems.


    And then there is the “mother” of all internets: The Internet. This is just a
    very, very large internet that connects us to Google, my computer to your computer,
    and so on.


    ## Gateways


    A *gateway* is a generic term for an entity used to connect two or more networks.
    A repeater operates at the Physical level and copies information from one subnet
    to another. A bridge operates at the Data Link layer level and copies frames between
    networks. A router operates at the Network level and not only moves information
    between networks but also decides on the route.


    ## Host-Level Networking


    On a single host, we have additional concerns when designing, debugging, or deploying
    network-based software. Some of these items include the following:


    *   DNS (domain name system, i.e., human-friendly naming)


    *   Firewalls (e.g., blocking inbound or outbound traffic)


    *   Routing (e.g., figuring out which network to place a packet)


    *   Host Identity management (e.g., IP address)


    *   Performance controls (e.g., traffic shaping or retries)


    *   Connection issues (e.g., missing network adapter, intramachine process communication)


    Through examples, we will see how a host misconfiguration might manifest in our
    software.'
  trans: '

    # 架构层次


    本章涵盖了分布式系统的主要架构特性。分布式系统是由通过网络交互的组件组成的集合。你无法在毫无构想的情况下构建一个系统。如果你不了解系统运行的环境，你也无法构建它。`GUI`
    程序与批处理程序不同；游戏程序与商业程序不同；分布式程序与单机程序也不同。它们各有其方法、常见模式、典型问题以及常用解决方案。


    本章将介绍分布式系统的高层架构方面。审视这类系统有多种视角，其中许多都会涉及。我们从分层模型入手，以帮助理解组件边界，讨论网络实现细节，并思考组件之间如何传递消息，最后总结错误条件及其思考方式。


    ## 协议层


    分布式系统*很复杂*。它涉及多台计算机，这些计算机必须以某种方式连接起来。必须编写程序在系统中的每台计算机上运行，并且它们必须相互协作以完成分布式任务。


    处理复杂性的常见方法是将其分解为更小、更简单的部分。这些部分有其自身的结构，同时也具备与其他相关部分通信的明确定义方式。在分布式系统中，这些部分被称为*协议层*，它们具有清晰定义的功能。它们形成一个栈，每一层与上层和下层进行通信。层与层之间的通信由协议定义。


    网络通信需要协议来涵盖从高层应用通信到底层线缆通信的全过程，而复杂性则通过协议层中的封装来处理。


    ### ISO OSI 协议


    尽管从未完全实现，但 OSI（开放系统互连）协议在讨论和影响分布式系统设计的方式上产生了重大影响。其常见形式如图 1-1 所示。


    ![](img/436770_2_En_1_Fig1_HTML.png)


    **图 1-1** 开放系统互连协议


    ### OSI 层


    从底层到顶层，每一层的功能如下：


    - **物理层**使用电气、光学或无线电技术传输比特流。

    - **数据链路层**将信息包封装成网络帧，以便通过物理层传输，并再还原为信息包。

    - **网络层**提供交换和路由技术。

    - **传输层**提供端系统间的透明数据传输，并负责端到端的错误恢复和流量控制。

    - **会话层**负责建立、管理和终止应用程序之间的连接。

    - **表示层**提供对数据表示差异（例如加密）的独立性。

    - **应用层**支持应用程序和终端用户进程。


    OSI 模型中的一层通常映射到现代协议；例如，`TCP/IP` 中的 `IP` 映射到网络层，也称为第 3 层（物理层为第 1 层）。应用层（第 7 层）映射到
    `HTTP`。有些协议（如 `HTTPS`）似乎融合了第 5 层（会话层）和第 6 层（表示层）。没有模型是完美的；OSI 模型之外存在其他更贴近现实情况的替代模型，例如
    `TCP/IP` 协议模型。


    ### TCP/IP 协议


    在 OSI 模型被争论、讨论、部分实现和争执不休的同时，DARPA 互联网研究项目正忙于构建 `TCP/IP` 协议。这些协议取得了巨大成功，并催生了**互联网**（首字母大写）。这是一个更简单的协议栈，如图
    1-2 所示。


    ![](img/436770_2_En_1_Fig2_HTML.png)


    **图 1-2** TCP/IP 协议


    ### 其他替代协议


    尽管看起来并非如此，但 `TCP/IP` 协议并非唯一存在的协议，长远来看甚至可能不是最成功的。维基百科的网络协议列表（见 `https://en.wikipedia.org/wiki/List_of_network_protocols_(OSI_model)`)
    在 OSI ISO 的每一层都列出了大量其他协议。其中许多已过时或用途不大，但由于各个领域技术的进步——例如太空互联网和物联网——总会有新协议的空间。


    本书主要关注 OSI 第 3 层和第 4 层（`TCP/IP`，包括 `UDP`），但您应了解还有其他协议存在。


    ## 网络


    *网络*是一种用于连接称为主机的终端系统的通信系统。连接机制可能涉及铜线、以太网、光纤或无线技术，但这并非我们此处关注的焦点。局域网（LAN）连接距离较近的计算机，通常属于家庭、小型组织或大型组织的一部分。


    广域网（WAN）跨越更大的物理区域连接计算机，例如城市之间。还有其他类型，如城域网（MAN）、个人局域网（PAN），甚至体域网（BAN）。


    互联网是连接两个或多个不同网络（通常是局域网或广域网）的网络。内联网是一个所有网络都属于单一组织的互联网。


    互联网和内联网之间存在显著差异。通常，内联网处于单一管理控制之下，将实施一套统一的策略。相反，互联网不受单一机构控制，对不同部分实施的控制甚至可能互不兼容。


    此类差异的一个简单例子是：内联网通常仅限于由少数供应商提供的、运行特定操作系统标准化版本的计算机。而互联网则通常包含各式各样的计算机和操作系统。


    本书的技术适用于互联网。它们也适用于内联网，但后者中您也会发现专用的、不可移植的系统。


    此外，还有所有互联网之“母”：因特网。它只是一个非常非常庞大的互联网，将我们连接到谷歌，将我的计算机连接到你的计算机，以此类推。


    ## 网关


    *网关*是用于连接两个或多个网络的实体的通用术语。中继器在物理层工作，将信息从一个子网复制到另一个子网。网桥在数据链路层工作，在网络之间复制帧。路由器在网络层工作，不仅在网络之间移动信息，还决定路由路径。


    ## 主机级网络


    在单个主机上，设计、调试或部署基于网络的软件时，我们还需要考虑其他事项。其中一些包括：


    - DNS（域名系统，即人类友好的命名）

    - 防火墙（例如，阻止入站或出站流量）

    - 路由（例如，确定将数据包发送到哪个网络）

    - 主机身份管理（例如，IP 地址）

    - 性能控制（例如，流量整形或重试）

    - 连接问题（例如，缺失网络适配器、机器内进程通信）


    通过示例，我们将了解主机配置错误可能如何体现在我们的软件中。

    '
- fmt: '# Packet Encapsulation


    The communication between layers in either the OSI or the TCP/IP stacks is done
    by sending packets of data from one layer to the next and then eventually across
    the network. Each layer has administrative information that it has to keep about
    its own layer. It does this by adding header information to the packet it receives
    from the layer above, as the packet passes down. On the receiving side, these
    headers are removed as the packet moves up.


    For example, the TFTP (Trivial File Transfer Protocol) moves files from one computer
    to another. It uses the UDP protocol on top of the IP protocol, which may be sent
    over ethernet. This looks like the diagram shown in Figure [1-3](#436770_2_En_1_Chapter.xhtml#Fig3).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig3_HTML.png)


    Figure 1-3


    The TFTP (Trivial File Transfer Protocol)


    # Connection Models


    In order for two computers to communicate, they must set up a path whereby they
    can send at least one message in a session. There are two major models for this:


    - Connection oriented

    - Connectionless


    ## Connection Oriented


    A single connection is established for the session. Two-way communications flow
    along the connection. When the session is over, the connection is broken. The
    analogy is to a phone conversation. An example is TCP.


    ## Connectionless


    In a connectionless system, messages are sent independent of each other. Ordinary
    mail is the analogy. Connectionless messages may arrive out of order. Messages
    do not have an impact on each other. An example is the IP protocol. UDP is a connectionless
    protocol above IP and is often used as an alternative to TCP, as it is much lighter
    weight. Connectionless is also known as unconnected or stateless.


    Connection-oriented transports may be established on top of connectionless ones
    `–` TCP over IP. Connectionless transports may be established on top of connection-oriented
    ones `–` HTTP over TCP. Messages over a connection-oriented transport protocol
    have some kind of relation, for example, a sequence number used to keep order.
    Having state allows for functionality and optimizations; it also has an associated
    cost of storage and computing.


    There can be variations on these. For example, a session might enforce messages
    arriving but might not guarantee that they arrive in the order sent. However,
    these two are the most common.


    Connection models are not the only way a protocol can vary. One often desired
    feature is reliability; this is where the protocol has logic to fix some types
    of errors; for example, TCP resends a missing packet. It’s pretty common to assume
    connection-oriented protocols are reliable; this is not always the case (e.g.,
    MPLS). Additional features of a network protocol could include message boundary
    management, delivery ordering, error checking, flow control, etc. These features
    can exist in one protocol layer and not another, partly why there are so many
    network protocol stacks.


    Sometimes, these features are reworked throughout the protocol stack. An example
    of this kind of feature rework is with HTTP/3. In HTTP/2, reliability is provided
    using TCP at layer 4. In HTTP/3, TCP is being replaced with UDP, which is not
    reliable. Instead, reliability will be provided with another protocol known as
    QUIC. While QUIC is considered a Transport layer, like TCP or UDP, it works on
    top of UDP. As you can see, the layer model is not an exact science.


    # Communications Models


    In a distributed system, there will be many components (i.e., processes) running
    that have to communicate with each other. There are two primary models for this,
    message passing and remote procedure calls. In the context of networking, these
    models allow interprocess (and/or thread) communication with intent to invoke
    behavior on the remote process.


    ## Message Passing


    Some languages are built on the principle of message passing. Concurrent languages
    (and tools) often use such a mechanism, and the most well-known example is probably
    the UNIX pipeline. The UNIX pipeline is a pipeline of bytes, but this is not an
    inherent limitation: Microsoft’s PowerShell can send objects along its pipelines,
    and concurrent languages such as Parlog can send arbitrary logic data structures
    in messages between concurrent processes. Recent languages such as Go have mechanisms
    for message passing (between threads).


    Message passing is a primitive mechanism for distributed systems. Set up a connection
    and pump some data down it. At the other end, figure out what the message was
    and respond to it, possibly sending messages back. This is illustrated in Figure
    [1-4](#436770_2_En_1_Chapter.xhtml#Fig4).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig4_HTML.png)


    Figure 1-4


    The message passing communications model


    Event-driven systems act in a similar manner. At a low level, the programming
    language `node.js` runs an event loop waiting for I/O events, dispatching handlers
    for these events and responding. At a higher level, most user interface systems
    use an event loop waiting for user input, while in the networking world, Ajax
    uses the `XMLHttpRequest` to send and receive requests.


    ## Remote Procedure Call


    In any system, there is a transfer of information and flow control from one part
    of the system to another. In procedural languages, this may consist of the procedure
    call, where information is placed on a call stack and then control flow is transferred
    to another part of the program.


    Even with procedure calls, there are variations. The code may be statically linked
    so that control transfers from one part of the program’s executable code to another
    part. Due to the increasing use of library routines, it has become commonplace
    to have such code in shared objects (`.so`) or dynamic link libraries (`.dll`),
    where control transfers to an independent piece of code.


    Libraries run in the same machine as the calling code. It is a simple (conceptual)
    step to transfer control to a procedure running in a different machine (i.e.,
    remote library). The mechanics of this are not so simple! However, this model
    of control has given rise to the remote procedure call (RPC), which is discussed
    in much detail in a later chapter. This is illustrated in Figure [1-5](#436770_2_En_1_Chapter.xhtml#Fig5).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig5_HTML.png)


    Figure 1-5


    The remote procedure call communications model


    There are many examples of this: some based on particular programming languages
    such as the Go `rpc` package (discussed in Chapter [13](#436770_2_En_13_Chapter.xhtml))
    or RPC systems covering multiple languages such as SOAP and Google’s gRPC.


    It may not be clear how message passing and RPC differ. At one level, they both
    are involved with invoking behavior "somewhere else." Generally speaking, RPC
    tends to be less abstract (i.e., looks and feels like regular procedure calls)
    compared to message passing where we could be calling remote queueing system.
    Under the hood though, RPC will be passing messages.'
