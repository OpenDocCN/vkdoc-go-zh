    }\nfunc listWords(rw http.ResponseWriter, cardname string) {\n...\n}\nfunc httpErrorHandler(rw\
    \ http.ResponseWriter, err error) {\nhttp.Error(rw, err.Error(), http.StatusInternalServerError)\n\
    }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \"\
    , err.Error())\n}\n}\n```\n\nWe now turn to the discussion of the individual functions."
  raw: "# 10. A Complete Web Server\n\nThis chapter is principally an illustration\
    \ of the HTTP chapter, building a complete website hosted via standard Go. It\
    \ also shows how to use templates in order to use expressions in text files to\
    \ insert variable values and to generate repeated sections. It deals with serialized\
    \ data and Unicode character sets. The programs in this chapter are sufficiently\
    \ long and complex, so they are not always given in their entirety but can be\
    \ downloaded from the book’s GitHub website, which is [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).\n\
    \nJan is learning Chinese. Rather, after many years of trying, he is still *attempting*\
    \ to learn Chinese. Of course, rather than buckling down and getting on with it,\
    \ he has tried all sorts of technical aids. He tried textbooks, videos, and many\
    \ other teaching aids. Eventually he realized that the reason for his poor progress\
    \ was that there *wasn’t a good computer program for Chinese flashcards*, and\
    \ so in the interests of learning, he needed to build one.\n\nHe found a program\
    \ in Python to do some of the task. But sad to say, it wasn’t well written, and\
    \ after a few attempts at turning it upside down and inside out, he came to the\
    \ conclusion that it was better to start from scratch. Of course, a web solution\
    \ would be far better than a stand-alone one because then all the other people\
    \ in his Chinese class could share it, as well as any other learners out there.\
    \ And of course, the server would be written in Go.\n\nHe used the vocabulary\
    \ from the lessons in the book *Intensive Spoken Chinese* by Zhang Pengpeng (Sinolingua,\
    \ 2007, ISBN 978-7-80052577-3), but the program is applicable to any vocabulary\
    \ sets.\n\n## Browser Site Diagram\n\nThe resultant program as viewed in the browser\
    \ has three types of pages, illustrated in Figure [10-1](#436770_2_En_10_Chapter.xhtml#Fig1).\n\
    \n![](images/436770_2_En_10_Chapter/436770_2_En_10_Fig1_HTML.png)\n\nFigure 10-1\n\
    \nBrowser pages\n\nThe home page shows a list of flashcard sets (see Figure [10-2](#436770_2_En_10_Chapter.xhtml#Fig2)).\
    \ It consists of a list of flashcard sets currently available, how you want a\
    \ set displayed (random card order, Chinese or English shown first, or random),\
    \ and whether to display a set of cards or just the words in a set.\n\n![](images/436770_2_En_10_Chapter/436770_2_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2\n\nThe home page of the website\n\nThe flashcard set shows a flashcard,\
    \ one at a time. One looks like Figure [10-3](#436770_2_En_10_Chapter.xhtml#Fig3).\n\
    \n![](images/436770_2_En_10_Chapter/436770_2_En_10_Fig3_HTML.jpg)\n\nFigure 10-3\n\
    \nTypical flashcard showing all the components\n\nThe set of words for a flashcard\
    \ set looks like Figure [10-4](#436770_2_En_10_Chapter.xhtml#Fig4).\n\n![](images/436770_2_En_10_Chapter/436770_2_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4\n\nThe list of words in a flashcard set\n\n## Browser Files\n\n\
    The browser side has HTML, CSS, and JavaScript files along with our Go code that\
    \ is hosting them. Logical paths and related files are as follows:\n\n*   Home\
    \ page paths include (/ and /`flashcards.html`):\n    *   `css/listflashcardsstylesheet.css`\n\
    \n*   Flashcard set path (`showflashcards.html`):\n    *   `css/cardstylesheet.css`\n\
    \n    *   `jscript/jquery.js`\n\n    *   `jscript/slideviewer.js`\n\n*   Flashcard\
    \ set words path (`listwords.html`):\n\n*   `css/listflashcardsstylesheet.css`\n\
    \n*   `jscript/sortable.js`\n\nThe overall project looks as follows:\n\n```\n\
    $ mkdir ch10\n$ cd ch10\nch10$ tree .\n.\n├── cedict_ts.u8\n├── css\n│   ├── cardstylesheet.css\n\
    │   └── listflashcardsstylesheet.css\n├── dictionary.go\n├── flashcards.go\n├──\
    \ flashcardsets\n│   ├── common_words\n│   ├── lesson_04_surname_first_name\n\
    │   ├── lesson_05_country_nationality\n│   └── lesson_06_city_native_place\n├──\
    \ html\n│   ├── listflashcards.html\n│   ├── listwords.html\n│   └── showflashcards.html\n\
    ├── jscript\n│   ├── jquery.js\n│   ├── slideviewer.js\n│   └── sorttable.js\n\
    ├── pinyinformatter.go\n└── server.go\n4 directories, 17 files\n```\n\n## Basic\
    \ Server\n\nThe server is an HTTP server as discussed in the previous chapter.\
    \ It has a number of functions to handle different URLs. The functions are outlined\
    \ here:\n\n| Path | Function | HTML Delivered |\n| --- | --- | --- |\n| / | listFlashCards\
    \ | html/listflashcards.html |\n| /flashcards.html | listFlashCards | html/listflashcards.html\
    \ |\n| /flashcardSets | manageFlashCards | html/showflashcards.html |\n| /flashcardSets\
    \ | manageFlashCards | html/listwords.html |\n| /jscript/* | fileServer | Files\
    \ from directory /jscript |\n| /html/*/css/* | fileserverfileserver | Files from\
    \ directory /htmlFiles from directory /css |\n\nThe server is `server.go` under\
    \ ch10 of [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).\n\
    \n```\nch10$ cat server.go\n/* Server\n*/\npackage main\nimport (\n\"fmt\"\n\"\
    html/template\"\n\"log\"\n\"net/http\"\n\"os\"\n)\nconst (\nDefaultSet       \
    \    = \"common_words\"\nDefaultAmount        = \"Random\"\nActionShow       \
    \    = \"Show cards in set\"\nActionList           = \"List words in set\"\nActionUnknown\
    \        = \"Unknown action\"\nURLFlashCardSetsPath = \"flashcardSets\"\nFlashCardPage\
    \        = \"flashcards.html\"\nListFlashCardPage    = \"list\" + FlashCardPage\n\
    ShowFlashCardPage    = \"show\" + FlashCardPage\nListWordsPage        = \"listwords.html\"\
    \nCardOrderSequential  = \"Sequential\"\nCardOrderRandom      = \"Random\"\n)\n\
    var showHalf = map[string]string{\n\"Random\":  \"RANDOM_HALF\",\n\"English\"\
    : \"ENGLISH_HALF\",\n\"Chinese\": \"CHINESE_HALF\",\n}\nfunc main() {\nif len(os.Args)\
    \ != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \":port\")\n}\nport := os.Args[1]\n\
    http.HandleFunc(\"/\", listFlashCards)\nfileServer := http.StripPrefix(\"/jscript/\"\
    , http.FileServer(http.Dir(\"jscript\")))\nhttp.Handle(\"/jscript/\", fileServer)\n\
    fileServer = http.StripPrefix(\"/html/\", http.FileServer(http.Dir(\"html\")))\n\
    http.Handle(\"/html/\", fileServer)\nfileServer = http.StripPrefix(\"/css/\",\
    \ http.FileServer(http.Dir(\"css\")))\nhttp.Handle(\"/css/\", fileServer)\nhttp.HandleFunc(\"\
    /\"+FlashCardPage, listFlashCards)\nhttp.HandleFunc(\"/\"+URLFlashCardSetsPath,\
    \ manageFlashCards)\n// deliver requests to the handlers\nerr := http.ListenAndServe(port,\
    \ nil)\ncheckError(err)\n}\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request)\
    \ {\n...\n}\n/*\n* Called from listflashcards.html on form submission\n*/\nfunc\
    \ manageFlashCards(rw http.ResponseWriter, req *http.Request) {\n...\n}\nfunc\
    \ showFlashCards(rw http.ResponseWriter, cardname, order, half string) {\n...\n\
    }\nfunc listWords(rw http.ResponseWriter, cardname string) {\n...\n}\nfunc httpErrorHandler(rw\
    \ http.ResponseWriter, err error) {\nhttp.Error(rw, err.Error(), http.StatusInternalServerError)\n\
    }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \"\
    , err.Error())\n}\n}\n```\n\nWe now turn to the discussion of the individual functions."
  trans: "\n# 10. 完整的 Web 服务器\n\n本章主要作为 HTTP 章节的实践应用，将使用标准 Go 语言构建一个完整的网站。同时介绍如何使用模板在文本文件中嵌入表达式以插入变量值，并生成重复内容区域。内容涉及序列化数据和\
    \ Unicode 字符集。本章中的程序篇幅较长且结构复杂，因此不会完整列出所有代码，但可从本书的 GitHub 网站[`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)下载。\n\
    \nJan 正在学习中文。更准确地说，经过多年尝试，他仍然在*尝试*学习中文。当然，他没有静下心来好好学，而是尝试了各种技术辅助工具。他试过课本、视频和许多其他教学材料。最终他意识到进步缓慢的原因是*没有一款好用的中文闪卡程序*，因此出于学习需要，他决定自己开发一个。\n\
    \n他找到一个 Python 程序完成了部分功能。但遗憾的是，该程序编写质量不佳，经过几次彻底改造尝试后，他得出结论：从头开始编写更好。当然，网络解决方案远比独立程序优越，因为这样中文班的其他同学以及所有学习者都能共享使用。而服务器将用\
    \ Go 语言编写。\n\n他采用了张朋朋所著《汉语口语速成》（Sinolingua 出版社，2007 年，ISBN 978-7-80052577-3）中的词汇，但该程序适用于任何词汇集。\n\
    \n## 浏览器界面示意图\n\n在浏览器中查看的最终程序包含三种页面，如图 10-1 所示。\n\n`![](img/436770_2_En_10_Fig1_HTML.png)`\n\
    \n图 10-1\n\n浏览器页面\n\n主页显示闪卡集列表（见图 10-2）。包含当前可用的闪卡集列表、展示方式（随机卡牌顺序、优先显示中文或英文、或随机显示）、以及选择展示整套卡片还是仅显示单词列表。\n\
    \n`![](img/436770_2_En_10_Fig2_HTML.jpg)`\n\n图 10-2\n\n网站主页\n\n闪卡集每次显示一张卡片，样式如图\
    \ 10-3 所示。\n\n`![](img/436770_2_En_10_Fig3_HTML.jpg)`\n\n图 10-3\n\n显示所有组件的典型闪卡\n\
    \n闪卡集中的单词列表如图 10-4 所示。\n\n`![](img/436770_2_En_10_Fig4_HTML.jpg)`\n\n图 10-4\n\n\
    闪卡集中的单词列表\n\n## 浏览器端文件\n\n浏览器端包含 HTML、CSS 和 JavaScript 文件，以及托管它们的 Go 代码。逻辑路径及相关文件如下：\n\
    \n* 主页路径（`/` 和 `/flashcards.html`）：\n  * `css/listflashcardsstylesheet.css`\n\
    * 闪卡集路径（`showflashcards.html`）：\n  * `css/cardstylesheet.css`\n  * `jscript/jquery.js`\n\
    \  * `jscript/slideviewer.js`\n* 闪卡集单词路径（`listwords.html`）：\n  * `css/listflashcardsstylesheet.css`\n\
    \  * `jscript/sortable.js`\n\n整体项目结构如下：\n\n```\n$ mkdir ch10\n$ cd ch10\nch10$\
    \ tree .\n.\n├── cedict_ts.u8\n├── css\n│   ├── cardstylesheet.css\n│   └── listflashcardsstylesheet.css\n\
    ├── dictionary.go\n├── flashcards.go\n├── flashcardsets\n│   ├── common_words\n\
    │   ├── lesson_04_surname_first_name\n│   ├── lesson_05_country_nationality\n\
    │   └── lesson_06_city_native_place\n├── html\n│   ├── listflashcards.html\n│\
    \   ├── listwords.html\n│   └── showflashcards.html\n├── jscript\n│   ├── jquery.js\n\
    │   ├── slideviewer.js\n│   └── sorttable.js\n├── pinyinformatter.go\n└── server.go\n\
    4 directories, 17 files\n```\n\n## 基础服务器\n\n服务器是上一章讨论的 HTTP 服务器。它包含多个处理不同 URL\
    \ 的函数。函数概述如下：\n\n| 路径 | 函数 | 传递的 HTML |\n| --- | --- | --- |\n| `/` | `listFlashCards`\
    \ | `html/listflashcards.html` |\n| `/flashcards.html` | `listFlashCards` | `html/listflashcards.html`\
    \ |\n| `/flashcardSets` | `manageFlashCards` | `html/showflashcards.html` |\n\
    | `/flashcardSets` | `manageFlashCards` | `html/listwords.html` |\n| `/jscript/*`\
    \ | `fileServer` | 来自 `/jscript` 目录的文件 |\n| `/html/*/css/*` | `fileServer` | 来自\
    \ `/html` 目录 / `/css` 目录的文件 |\n\n服务器文件为 `server.go`，位于 [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)\
    \ 的 `ch10` 目录下。\n\n```\nch10$ cat server.go\n/* Server\n*/\npackage main\nimport\
    \ (\n\"fmt\"\n\"html/template\"\n\"log\"\n\"net/http\"\n\"os\"\n)\nconst (\nDefaultSet\
    \           = \"common_words\"\nDefaultAmount        = \"Random\"\nActionShow\
    \           = \"Show cards in set\"\nActionList           = \"List words in set\"\
    \nActionUnknown        = \"Unknown action\"\nURLFlashCardSetsPath = \"flashcardSets\"\
    \nFlashCardPage        = \"flashcards.html\"\nListFlashCardPage    = \"list\"\
    \ + FlashCardPage\nShowFlashCardPage    = \"show\" + FlashCardPage\nListWordsPage\
    \        = \"listwords.html\"\nCardOrderSequential  = \"Sequential\"\nCardOrderRandom\
    \      = \"Random\"\n)\nvar showHalf = map[string]string{\n\"Random\":  \"RANDOM_HALF\"\
    ,\n\"English\": \"ENGLISH_HALF\",\n\"Chinese\": \"CHINESE_HALF\",\n}\nfunc main()\
    \ {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \":port\")\n\
    }\nport := os.Args[1]\nhttp.HandleFunc(\"/\", listFlashCards)\nfileServer := http.StripPrefix(\"\
    /jscript/\", http.FileServer(http.Dir(\"jscript\")))\nhttp.Handle(\"/jscript/\"\
    , fileServer)\nfileServer = http.StripPrefix(\"/html/\", http.FileServer(http.Dir(\"\
    html\")))\nhttp.Handle(\"/html/\", fileServer)\nfileServer = http.StripPrefix(\"\
    /css/\", http.FileServer(http.Dir(\"css\")))\nhttp.Handle(\"/css/\", fileServer)\n\
    http.HandleFunc(\"/\"+FlashCardPage, listFlashCards)\nhttp.HandleFunc(\"/\"+URLFlashCardSetsPath,\
    \ manageFlashCards)\n// deliver requests to the handlers\nerr := http.ListenAndServe(port,\
    \ nil)\ncheckError(err)\n}\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request)\
    \ {\n...\n}\n/*\n* Called from listflashcards.html on form submission\n*/\nfunc\
    \ manageFlashCards(rw http.ResponseWriter, req *http.Request) {\n...\n}\nfunc\
    \ showFlashCards(rw http.ResponseWriter, cardname, order, half string) {\n...\n\
    }\nfunc listWords(rw http.ResponseWriter, cardname string) {\n...\n}\nfunc httpErrorHandler(rw\
    \ http.ResponseWriter, err error) {\nhttp.Error(rw, err.Error(), http.StatusInternalServerError)\n\
    }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \"\
    , err.Error())\n}\n}\n```\n\n接下来我们将讨论各个函数的具体实现。\n"
- fmt: "# The listFlashCards Function\n\nThe `listFlashCards` function is called to\
    \ create HTML for the top-level page. The list of flashcard names is extensible\
    \ and is the set of file entries in the directory `flashcardSets`. This list is\
    \ used to create the table in the top-level page and is best done using the template\
    \ package:\n\n```\nFlashcard Sets\n\n{{range $i, $e := .}}\n\n{{$e}}\n\n{{end}}\n\
    ```\n\nwhere the range is over the list of names. The file `html/listflashcards.html`\
    \ contains this template as well as the HTML for the side lists of card order,\
    \ half card display, and the form buttons at the bottom. Omitting the side lists\
    \ and the submit buttons, the HTML is as follows:\n\n```\nch10$ cat html/listflashcards.html\n\
    \nFlashcards\n\nFlashcards\n\nFlashcard Sets\n\n{{range $i, $e := .}}\n\n{{$e}}\n\
    \n{{end}}\n\nCard order\n\nRandom \n\nSequential \n\nHalf card display\n\nRandom\
    \ \n\nEnglish \n\nChinese \n\nShow cards in set\n\nList words in set\n```\n\n\
    From `server.go`, the function `listFlashCards`, which applies the template to\
    \ this, is as follows:\n\n```\nfunc listFlashCards(rw http.ResponseWriter, req\
    \ *http.Request) {\nflashCardsNames := ListFlashCardsNames()\nt, err := template.ParseFiles(\"\
    html/\" + ListFlashCardPage)\nif err != nil {\nhttpErrorHandler(rw, err)\nreturn\n\
    }\nt.Execute(rw, flashCardsNames)\n}\n```\n\nFrom `flashcards.go`, the function\
    \ `ListFlashCardsNames()` just iterates through the flashcards directory, returning\
    \ an array of strings (the file names of each flashcard set):\n\n```\nfunc ListFlashCardsNames()\
    \ []string {\nflashcardsDir, err := os.Open(\"flashcardsets\")\nif err != nil\
    \ {\nreturn nil\n}\nfiles, err := flashcardsDir.Readdir(-1)\nfileNames := make([]string,\
    \ len(files))\nfor n, f := range files {\nfileNames[n] = f.Name()\n}\nsort.Strings(fileNames)\n\
    return fileNames\n}\n```\n\n# The manageFlashCards Function\n\nFrom `server.go`,\
    \ the `manageFlashCards` function is called to manage the form submission on pressing\
    \ the “Show Cards in Set” button or the “List Words in Set” button. It extracts\
    \ values from the form request and then chooses between `showFlashCards` and `listWords`:\n\
    \n```\n/*\n* Called from listflashcards.html on form submission\n*/\nfunc manageFlashCards(rw\
    \ http.ResponseWriter, req *http.Request) {\nset := req.FormValue(\"flashcardSets\"\
    )\norder := req.FormValue(\"order\")\naction := req.FormValue(\"submit\")\nhalf\
    \ := req.FormValue(\"half\")\n//if unset\n//http://localhost:8000/flashcardSets?flashcardSets=common_words&order=Random&half=Random&submit=Show+cards+in+set\n\
    if len(set) == 0 {\nset = DefaultSet\norder = DefaultAmount\naction = ActionShow\n\
    half = DefaultAmount\n}\ncardname := URLFlashCardSetsPath + \"/\" + set\nfmt.Printf(\"\
    Set %s, order %s, action %s, half %s, cardname %s\\n\", set, order, action, half,\
    \ cardname)\nswitch action {\ncase ActionShow:\nshowFlashCards(rw, cardname, order,\
    \ half)\ncase ActionList:\nlistWords(rw, cardname)\ndefault:\nfmt.Println(ActionUnknown)\n\
    }\n}\n```\n\n# The Chinese Dictionary\n\nThe previous code was fairly generic:\
    \ it delivers static files using a `FileServer`, creates HTML tables using templates\
    \ based on a listing of files in a directory, and processes information from an\
    \ HTML form. To proceed further by looking at what is displayed in each card,\
    \ we have to get into the application-specific detail, and that means looking\
    \ at the source of words (a dictionary), how to represent it and the cards, and\
    \ how to send flashcard data to the browser. First, the dictionary.\n\nChinese\
    \ is a complex language – aren’t they all :-(. The written form is hieroglyphic,\
    \ that is, “pictograms,” instead of using an alphabet. But this written form has\
    \ evolved over time and even recently split into two forms: “traditional” Chinese\
    \ as used in Taiwan and Hong Kong and “simplified” Chinese as used in mainland\
    \ China. While most of the characters are the same, about 1,000 are different.\
    \ Thus, a Chinese dictionary will often have two written forms of the same character.\n\
    \nMost Westerners like me can’t understand these characters. So there is a “Latinized”\
    \ form called Pinyin, which writes the characters in a phonetic alphabet based\
    \ on the Latin alphabet. It isn’t quite the Latin alphabet because Chinese is\
    \ a tonal language, and the Pinyin form has to show the tones (much like accents\
    \ in French and other European languages). So a typical dictionary has to show\
    \ four things: the traditional form, the simplified form, the Pinyin, and the\
    \ English. In addition (just like in English), a word may have multiple meanings.\
    \ For example, there is a free Chinese/English dictionary at [`http://www.mandarintools.com/worddict.html`](http://www.mandarintools.com/worddict.html),\
    \ and even better, you can download it as a UTF-8 file. In it, the word 好 has\
    \ this entry:\n\n| **Traditional** | **Simplified** | **Pinyin** | **English**\
    \ | **Meanings** |\n| --- | --- | --- | --- | --- |\n| 好 | 好 | hǎo | good | /good/well/proper/good\
    \ to/easy to/very/so/(suffix indicating completion or readiness)/ |\n\nThere is\
    \ a little complication in this dictionary. Most keyboards are not good at representing\
    \ accents such as the caron in ǎ. So while the Chinese characters are written\
    \ in Unicode, the Pinyin characters are not. Although there are Unicode characters\
    \ for letters such as ǎ, many dictionaries including this one use the Latin `a`\
    \ and place the tone at the end of the word. Here, it is the third tone, so `hǎo`\
    \ is written as `hao3`. This makes it easier for those who only have US keyboards\
    \ and no Unicode editor to still communicate in Pinyin. A copy of the dictionary\
    \ as used by the web server is `cedict_ts.u8`.\n\nThis data format mismatch is\
    \ not a big deal. Just that somewhere along the line, between the original text\
    \ dictionary and the display in the browser, a data massage has to be performed.\
    \ Go templates allow this to be done by defining a custom template, so I chose\
    \ that route. Alternative approaches include doing this as the dictionary is read\
    \ in, or in the JavaScript to display the final characters.\n\n## The Dictionary\
    \ Type\n\nFrom `dictionary.go`, we use a `DictionaryEntry` to hold the basic information\
    \ about one word:\n\n```\ntype DictionaryEntry struct {\nTraditional  string\n\
    Simplified   string\nPinyin       string\nTranslations []string\n}\n```\n\nThe\
    \ preceding word would be represented by the following:\n\n```\nDictionaryEntry\
    \ {Traditional: 好,\nSimplified: 好,\nPinyin: `hao3`\nTranslations: []string{`good`,\
    \ `well`,`proper`,\n`good to`, `easy to`, `very`, `so`,\n`(suffix indicating completion\
    \ or readiness)`}\n}\n```\n\nThe dictionary itself is just an array of these entries:\n\
    \n```\ntype Dictionary struct {\nEntries []*DictionaryEntry\n}\n```"
