- fmt: "# Version Control\n\nA protocol used in a client-server system will evolve\
    \ over time, changing as the system expands. This raises compatibility problems:\
    \ A version 2 client will make requests that a version 1 server doesn’t understand,\
    \ whereas a version 2 server will send replies that a version 1 client won’t understand.\n\
    \nEach side should ideally be able to understand messages from its own version\
    \ and all earlier ones. It should be able to write replies to old-style queries\
    \ in old-style response formats. See Figure [5-1](#436770_2_En_5_Chapter.xhtml#Fig1).\n\
    \n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig1_HTML.png)\n\nFigure 5-1\
    \ — Compatibility vs. version control\n\nThe ability to talk earlier version formats\
    \ may be lost if the protocol changes too much. In this case, you need to be able\
    \ to ensure that no copies of the earlier version still exist, which is generally\
    \ impossible.\n\nPreferences can change with experience regarding versioning.\
    \ For example, Protocol buffers dropped the `required` syntax from the v3 release\
    \ to favor simplicity.^([⁸](#fn8))\n\nPart of the protocol setup often involves\
    \ version information. Versioning a protocol (or API) is a mechanism that lets\
    \ clients and servers agree on a set of endpoints, requests, and responses (or\
    \ messages). Overt versioning maybe clear but often can limit interaction between\
    \ components as the protocol changes. Alternatives exist including versionless\
    \ APIs (sometimes called open APIs), where the goal is to maintain backward and\
    \ forward compatibility. Protocols such as HTTP have evolved in their use (and\
    \ not so much in their design) in these regards. Recently, GraphQL and similar\
    \ tools show promise in the versionless space. One final point, versionless, doesn’t\
    \ mean there is no versioning at all; it just implies there is more compatibility\
    \ over the various releases of a protocol.\n\n## The Web\n\nThe Web is a good\
    \ example of a system that has been through multiple different versions. The underlying\
    \ HTTP protocol manages version control in an excellent manner, even though it\
    \ has been through multiple versions. Most servers/browsers support the HTTP/3\
    \ version but also support the earlier versions. Version HTTP/2 appears to account\
    \ for just over 60% of web traffic in 2021, HTTP/3 (QUIC) is around 5%, and HTTP/1.1\
    \ accounts for almost all the rest. We can see one type of change over the HTTP\
    \ versions pertaining to the `GET` requests:\n\n| Request | Version |\n| --- |\
    \ --- |\n| `GET /` | `Pre 1.0` |\n| `GET / HTTP/1.0` | `HTTP 1.0` |\n| `GET /\
    \ HTTP/1.1` | `HTTP 1.1` |\n| `GET / HTTP/1.1 Connection: Upgrade, HTTP2-Settings\
    \ Upgrade: h2c` | `HTTP 2` |\n| `QUIC version 1Alt-Svc: h3=\":50123\"` | `HTTP\
    \ 3` |\n\nHTTP/2 is a binary format and is not compatible with earlier versions.\
    \ Nevertheless, there is a negotiation mechanism of sending an HTTP/1.1 request\
    \ with upgrade fields to HTTP/2. If the client accepts it, the upgrade can be\
    \ made. If the client doesn’t understand the upgrade parameters, the connection\
    \ continues with HTTP/1.1.\n\nHTTP/3 is also a binary format, one that replaces\
    \ the TCP transport with UDP. Additional improvements include secure by default.\
    \ While not 100% finished, HTTP/3 is in the final stages of becoming the new HTTP\
    \ standard.^([⁹](#fn9))\n\nWhile originally designed for HTML, HTTP can carry\
    \ any content. If we just look at HTML, this has been through a large number of\
    \ versions with, at times, little attempt to ensure compatibility between versions:\n\
    \n- HTML5, which has abandoned any version signaling between dot revisions.\n\
    - HTML versions 1–4 (all different), with versions in the “browser wars” particularly\
    \ problematic.\n- Nonstandard tags recognized by different browsers.\n- Non-HTML\
    \ documents often require content handlers that may not be present. Does your\
    \ browser have a handler for Flash?\n- Inconsistent treatment of document content\
    \ (e.g., some stylesheet content will crash some browsers).\n- Different support\
    \ for JavaScript (and different versions of JavaScript).\n- Different runtime\
    \ engines for Java.\n- Many pages do not conform to any HTML versions (e.g., with\
    \ syntax errors).\n\nHTML5 (and indeed many earlier versions) is an excellent\
    \ example of how *not* to do version control. The latest revision at the time\
    \ of writing is Revision 5. “In this version, new features are introduced to help\
    \ web application authors, new elements are introduced based on research into\
    \ prevailing authoring practices,….” Not only are some new features added, but\
    \ some older ones (which should not be in much use anymore) have also been removed\
    \ and no longer work. There is no means for an HTML5 document to signal which\
    \ revision it uses. For more on this topic, check out the “HTML – Living Standard”\
    \ (`https://html.spec.whatwg.org/`).\n\n# Message Format\n\nIn the last chapter,\
    \ we discussed some possibilities for representing data to be sent across the\
    \ wire. Now we look one level up, to the messages that may contain such data.\n\
    \n- The client and server will exchange messages with different meanings:\n  \
    \  - Login request.\n    - Login reply.\n    - Get record request.\n    - Record\
    \ data reply.\n- The client will prepare a request, which must be understood by\
    \ the server.\n- The server will prepare a reply, which must be understood by\
    \ the client.\n\nCommonly, the first part of the message will be a message type.\n\
    \n- Client to server:\n    ```\n    LOGIN\n    GET  grade\n    ```\n\n- Server\
    \ to client:\n    ```\n    LOGIN succeeded\n    GRADE\n    ```\n\nThe message\
    \ types can be strings or integers. For example, HTTP uses integers such as 404\
    \ to mean “not found” (although these integers are written as strings). The messages\
    \ from client to server and vice versa are disjoint. The `LOGIN` message from\
    \ the client to the server is a different message than the `LOGIN` message from\
    \ the server to the client, and they will probably play complementary roles in\
    \ the protocol.\n\n## Data Format\n\nThere are two main format choices for messages:\
    \ byte encoded or character encoded.\n\n### Byte Format\n\nIn the byte format:\n\
    \n- The first part of the message is typically a byte to distinguish between message\
    \ types.\n- The message handler examines this first byte to distinguish the message\
    \ type and then performs a switch to select the appropriate handler for that type.\n\
    - Further bytes in the message contain message content according to a predefined\
    \ format (as discussed in the previous chapter).\n\nThe advantages are compactness\
    \ and hence speed. The disadvantages are caused by the opaqueness of the data:\
    \ it may be harder to spot errors, harder to debug, and require special purpose\
    \ decoding functions. There are many examples of byte-encoded formats, including\
    \ major protocols such as DNS and NFS, up to recent ones such as Skype. Of course,\
    \ if your protocol is not publicly specified, then a byte format can also make\
    \ it harder for others to reverse-engineer it!\n\nPseudocode for a byte-format\
    \ server is as follows:\n\n```\nhandleClient(conn) {\nwhile (true) {\nbyte b =\
    \ conn.readByte()\nswitch (b) {\ncase MSG_1: ...\ncase MSG_2: ...\n...\n}\n}\n\
    }\n```\n\nGo `net` package has basic support for managing byte streams. The interface\
    \ `net.Conn` includes the following methods among others:\n\n```\nRead(b []byte)\
    \ (n int, err error)\nWrite(b []byte) (n int, err error)\n```\n\nThese methods\
    \ are implemented by `net.TCPConn` and `net.UDPConn`."
  raw: "## Version Control\n\nA protocol used in a client-server system will evolve\
    \ over time, changing as the system expands. This raises compatibility problems:\
    \ A version 2 client will make requests that a version 1 server doesn’t understand,\
    \ whereas a version 2 server will send replies that a version 1 client won’t understand.\n\
    \nEach side should ideally be able to understand messages from its own version\
    \ and all earlier ones. It should be able to write replies to old-style queries\
    \ in old-style response formats. See Figure [5-1](#436770_2_En_5_Chapter.xhtml#Fig1).\n\
    \n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig1_HTML.png)\n\nFigure 5-1\n\
    \nCompatibility vs. version control\n\nThe ability to talk earlier version formats\
    \ may be lost if the protocol changes too much. In this case, you need to be able\
    \ to ensure that no copies of the earlier version still exist, which is generally\
    \ impossible.\n\nPreferences can change with experience regarding versioning.\
    \ For example, Protocol buffers dropped the *required* syntax from the v3 release\
    \ to favor simplicity.^([⁸](#fn8))\n\nPart of the protocol setup often involves\
    \ version information. Versioning a protocol (or API) is a mechanism that lets\
    \ clients and servers agree on a set of endpoints, requests, and responses (or\
    \ messages). Overt versioning maybe clear but often can limit interaction between\
    \ components as the protocol changes. Alternatives exist including versionless\
    \ APIs (sometimes called open APIs), where the goal is to maintain backward and\
    \ forward compatibility. Protocols such as HTTP have evolved in their use (and\
    \ not so much in their design) in these regards. Recently, GraphQL and similar\
    \ tools show promise in the versionless space. One final point, versionless, doesn’t\
    \ mean there is no versioning at all; it just implies there is more compatibility\
    \ over the various releases of a protocol.\n\n### The Web\n\nThe Web is a good\
    \ example of a system that has been through multiple different versions. The underlying\
    \ HTTP protocol manages version control in an excellent manner, even though it\
    \ has been through multiple versions. Most servers/browsers support the HTTP/3\
    \ version but also support the earlier versions. Version HTTP/2 appears to account\
    \ for just over 60% of web traffic in 2021, HTTP/3 (QUIC) is around 5%, and HTTP/1.1\
    \ accounts for almost all the rest. We can see one type of change over the HTTP\
    \ versions pertaining to the `GET` requests:\n\n| Request | Version |\n| --- |\
    \ --- |\n| `GET /` | `Pre 1.0` |\n| `GET / HTTP/1.0` | `HTTP 1.0` |\n| `GET /\
    \ HTTP/1.1` | `HTTP 1.1` |\n| `GET / HTTP/1.1 Connection: Upgrade, HTTP2-Settings\
    \ Upgrade: h2c` | `HTTP 2` |\n| `QUIC version 1Alt-Svc: h3=\":50123\"` | `HTTP\
    \ 3` |\n\nHTTP/2 is a binary format and is not compatible with earlier versions.\
    \ Nevertheless, there is a negotiation mechanism of sending an HTTP/1.1 request\
    \ with upgrade fields to HTTP/2\\. If the client accepts it, the upgrade can be\
    \ made. If the client doesn’t understand the upgrade parameters, the connection\
    \ continues with HTTP/1.1.\n\nHTTP/3 is also a binary format, one that replaces\
    \ the TCP transport with UDP. Additional improvements include secure by default.\
    \ While not 100% finished, HTTP/3 is in the final stages of becoming the new HTTP\
    \ standard.^([⁹](#fn9))\n\nWhile originally designed for HTML, HTTP can carry\
    \ any content. If we just look at HTML, this has been through a large number of\
    \ versions with, at times, little attempt to ensure compatibility between versions:\n\
    \n*   HTML5, which has abandoned any version signaling between dot revisions.\n\
    \n*   HTML versions 1`–`4 (all different), with versions in the “browser wars”\
    \ particularly problematic.\n\n*   Nonstandard tags recognized by different browsers.\n\
    \n*   Non-HTML documents often require content handlers that may not be present.\
    \ Does your browser have a handler for Flash?\n\n*   Inconsistent treatment of\
    \ document content (e.g., some stylesheet content will crash some browsers).\n\
    \n*   Different support for JavaScript (and different versions of JavaScript).\n\
    \n*   Different runtime engines for Java.\n\n*   Many pages do not conform to\
    \ *any* HTML versions (e.g., with syntax errors).\n\nHTML5 (and indeed many earlier\
    \ versions) is an excellent example of how *not* to do version control. The latest\
    \ revision at the time of writing is Revision 5\\. “In this version, new features\
    \ are introduced to help web application authors, new elements are introduced\
    \ based on research into prevailing authoring practices,….” Not only are some\
    \ new features added, but some older ones (which should not be in much use anymore)\
    \ have also been removed and no longer work. There is no means for an HTML5 document\
    \ to signal which revision it uses. For more on this topic, check out the “HTML\
    \ – Living Standard” ([`https://html.spec.whatwg.org/`](https://html.spec.whatwg.org/)).\n\
    \n## Message Format\n\nIn the last chapter, we discussed some possibilities for\
    \ representing data to be sent across the wire. Now we look one level up, to the\
    \ messages that may contain such data.\n\n*   The client and server will exchange\
    \ messages with different meanings:\n    *   Login request.\n\n    *   Login reply.\n\
    \n    *   Get record request.\n\n    *   Record data reply.\n\n*   The client\
    \ will prepare a request, which must be understood by the server.\n\n*   The server\
    \ will prepare a reply, which must be understood by the client.\n\nCommonly, the\
    \ first part of the message will be a message type.\n\n*   Client to server:\n\
    \n    ```\n    LOGIN  \n    GET  grade\n    ```\n\n*   Server to client:\n\n \
    \   ```\n    LOGIN succeeded\n    GRADE  \n    ```\n\nThe message types can be\
    \ strings or integers. For example, HTTP uses integers such as 404 to mean “not\
    \ found” (although these integers are written as strings). The messages from client\
    \ to server and vice versa are disjoint. The `LOGIN` message from the client to\
    \ the server is a different message than the `LOGIN` message from the server to\
    \ the client, and they will probably play complementary roles in the protocol.\n\
    \n## Data Format\n\nThere are two main format choices for messages: byte encoded\
    \ or character encoded.\n\n### Byte Format\n\nIn the byte format:\n\n*   The first\
    \ part of the message is typically a byte to distinguish between message types.\n\
    \n*   The message handler examines this first byte to distinguish the message\
    \ type and then performs a switch to select the appropriate handler for that type.\n\
    \n*   Further bytes in the message contain message content according to a predefined\
    \ format (as discussed in the previous chapter).\n\nThe advantages are compactness\
    \ and hence speed. The disadvantages are caused by the opaqueness of the data:\
    \ it may be harder to spot errors, harder to debug, and require special purpose\
    \ decoding functions. There are many examples of byte-encoded formats, including\
    \ major protocols such as DNS and NFS, up to recent ones such as Skype. Of course,\
    \ if your protocol is not publicly specified, then a byte format can also make\
    \ it harder for others to reverse-engineer it!\n\nPseudocode for a byte-format\
    \ server is as follows:\n\n```\nhandleClient(conn) {\nwhile (true) {\nbyte b =\
    \ conn.readByte()\nswitch (b) {\ncase MSG_1: ...\ncase MSG_2: ...\n...\n}\n}\n\
    }\n```\n\nGo net package has basic support for managing byte streams. The interface\
    \ `net.Conn` includes the following methods among others:\n\n```\nRead(b []byte)\
    \ (n int, err error)\nWrite(b []byte) (n int, err error)\n```\n\nThese methods\
    \ are implemented by `net.TCPConn` and `net.UDPConn`."
  trans: "\n# 版本控制\n\n客户端-服务器系统中使用的协议会随着系统扩展而不断演变。这会引发兼容性问题：版本 2 的客户端会发出版本 1 服务器无法理解的请求，而版本\
    \ 2 的服务器发送的响应，版本 1 的客户端也无法理解。\n\n理想情况下，每一方都应该能够理解自身版本及所有更早版本的消息。它应该能够以旧式响应格式回复旧式查询。见图\
    \ 5-1。\n\n![](img/436770_2_En_5_Fig1_HTML.png)\n\n图 5-1 — 兼容性与版本控制\n\n如果协议改动过大，与旧版格式通信的能力可能会丧失。在这种情况下，你需要确保不存在任何旧版本的副本，但这通常是不可能的。\n\
    \n随着版本控制经验的积累，偏好可能会改变。例如，Protocol Buffers 在 v3 版本中移除了 `required` 语法以追求简洁。^(⁸)\n\
    \n协议的设置通常包含版本信息。对协议（或 API）进行版本控制是一种机制，它能让客户端和服务器就一组端点、请求和响应（或消息）达成一致。显式的版本控制可能很清晰，但通常会随着协议的更改限制组件间的交互。存在一些替代方案，包括无版本\
    \ API（有时称为开放 API），其目标是保持前后向兼容性。像 HTTP 这样的协议在这些方面已通过其使用方式（而非设计本身）得到了演进。最近，GraphQL\
    \ 及类似工具在无版本领域展现出了前景。最后一点，无版本并不意味着完全没有版本控制；它只是意味着在协议的不同版本间具有更高的兼容性。\n\n## 万维网\n\
    \n万维网是一个历经多个不同版本的系统的好例子。底层的 HTTP 协议尽管经历了多个版本，却以极佳的方式管理着版本控制。大多数服务器/浏览器都支持 HTTP/3\
    \ 版本，同时也支持更早的版本。在 2021 年，HTTP/2 版本的网络流量占比略高于 60%，HTTP/3（QUIC）约占 5%，其余几乎全是 HTTP/1.1\
    \ 的流量。我们可以看到 HTTP 版本中与 `GET` 请求相关的某种变化类型：\n\n| 请求 | 版本 |\n| --- | --- |\n| `GET\
    \ /` | `Pre 1.0` |\n| `GET / HTTP/1.0` | `HTTP 1.0` |\n| `GET / HTTP/1.1` | `HTTP\
    \ 1.1` |\n| `GET / HTTP/1.1 Connection: Upgrade, HTTP2-Settings Upgrade: h2c`\
    \ | `HTTP 2` |\n| `QUIC version 1Alt-Svc: h3=\":50123\"` | `HTTP 3` |\n\nHTTP/2\
    \ 是一种二进制格式，与早期版本不兼容。尽管如此，它存在一种协商机制，即发送带有升级字段的 HTTP/1.1 请求以升级到 HTTP/2。如果客户端接受，即可完成升级。如果客户端不理解升级参数，连接将继续使用\
    \ HTTP/1.1。\n\nHTTP/3 也是一种二进制格式，它用 UDP 替代了 TCP 传输。其他改进包括默认安全。虽然尚未 100%完成，但 HTTP/3\
    \ 已处于成为新 HTTP 标准的最后阶段。^(⁹)\n\n虽然最初是为 HTML 设计的，但 HTTP 可以承载任何内容。如果我们只看 HTML，它已经历了大量版本，有时几乎不尝试确保版本间的兼容性：\n\
    \n- HTML5，它已经在版本修订之间放弃任何版本信令。\n- HTML 版本 1-4（各自不同），其中“浏览器战争”期间的版本问题尤为突出。\n- 不同浏览器识别的非标准标签。\n\
    - 非 HTML 文档通常需要可能不存在的内容处理器。你的浏览器有处理 Flash 的程序吗？\n- 对文档内容的处理不一致（例如，某些样式表内容会导致某些浏览器崩溃）。\n\
    - 对 JavaScript 的支持不同（以及不同版本的 JavaScript）。\n- 不同的 Java 运行时引擎。\n- 许多页面不符合任何 HTML\
    \ 版本（例如，存在语法错误）。\n\nHTML5（实际上还有许多早期版本）是一个极好的例子，说明了*不*应该如何进行版本控制。在撰写本文时，最新修订版是修订版\
    \ 5。“在此版本中，引入了新特性以帮助 Web 应用程序作者，基于对主流创作实践的研究引入了新元素……”。不仅添加了一些新特性，一些较旧的特性（应该已不多用了）也被移除且不再有效。没有方法让\
    \ HTML5 文档表明它使用的是哪个修订版。有关此主题的更多信息，请查看“HTML – Living Standard”（`https://html.spec.whatwg.org/`）。\n\
    \n# 消息格式\n\n在上一章中，我们讨论了一些表示要在线路上发送的数据的可能性。现在我们将目光向上移动一层，关注可能包含此类数据的消息。\n\n- 客户端和服务器将交换具有不同含义的消息：\n\
    \    - 登录请求。\n    - 登录回复。\n    - 获取记录请求。\n    - 记录数据回复。\n- 客户端将准备一个请求，该请求必须能被服务器理解。\n\
    - 服务器将准备一个回复，该回复必须能被客户端理解。\n\n通常，消息的第一部分会是消息类型。\n\n- 客户端到服务器：\n    ```\n    LOGIN\n\
    \    GET  grade\n    ```\n\n- 服务器到客户端：\n    ```\n    LOGIN succeeded\n    GRADE\n\
    \    ```\n\n消息类型可以是字符串或整数。例如，HTTP 使用像 404 这样的整数来表示“未找到”（尽管这些整数是以字符串形式写入的）。从客户端到服务器以及从服务器到客户端的消息是不相交的。从客户端到服务器的\
    \ `LOGIN` 消息与从服务器到客户端的 `LOGIN` 消息是不同的消息，它们可能在协议中扮演互补的角色。\n\n## 数据格式\n\n消息有两种主要的格式选择：字节编码或字符编码。\n\
    \n### 字节格式\n\n在字节格式中：\n\n- 消息的第一部分通常是一个字节，用于区分消息类型。\n- 消息处理器检查这个首字节以区分消息类型，然后执行一个\
    \ switch 语句来选择该类型的适当处理器。\n- 消息中的后续字节根据预定义的格式（如前一章所述）包含消息内容。\n\n其优点是紧凑，因此速度快。缺点是由数据的不透明性引起的：可能更难发现错误，更难调试，并且需要专门的解码函数。字节编码格式的例子有很多，包括像\
    \ DNS 和 NFS 这样的主要协议，以及像 Skype 这样的近期协议。当然，如果你的协议没有公开说明，那么字节格式也会使他人更难对其进行逆向工程！\n\
    \n以下是字节格式服务器的伪代码：\n\n```\nhandleClient(conn) {\nwhile (true) {\nbyte b = conn.readByte()\n\
    switch (b) {\ncase MSG_1: ...\ncase MSG_2: ...\n...\n}\n}\n}\n```\n\nGo 语言的 `net`\
    \ 包提供了对管理字节流的基本支持。接口 `net.Conn` 包含以下方法（以及其他方法）：\n\n```\nRead(b []byte) (n int,\
    \ err error)\nWrite(b []byte) (n int, err error)\n```\n\n这些方法由 `net.TCPConn` 和\
    \ `net.UDPConn` 实现。\n"
- fmt: "### Character Format\n\nIn this mode, everything is sent as characters if\
    \ possible. For example, an integer `234` would be sent as, say, the three characters\
    \ `2`, `3`, and `4` instead of as the one byte `234`. Data that is inherently\
    \ binary may be Base64 encoded to change it into a 7-bit format and then sent\
    \ as ASCII characters, as discussed in the previous chapter.\n\nIn character format:\n\
    \n* A message is a sequence of one or more lines. The start of the first line\
    \ of the message is typically a word that represents the message type.\n* String-handling\
    \ functions may be used to decode the message type and data.\n* The rest of the\
    \ first line and successive lines contain the data.\n* Line-oriented functions\
    \ and line-oriented conventions are used to manage this.\n\nThe pseudocode is\
    \ as follows:\n\n```\nhandleClient() {\n  line = conn.readLine()\n  if (line.startsWith(...)\
    \ {\n    ...\n  } else if (line.startsWith(...) {\n    ...\n  }\n}\n```\n\nCharacter\
    \ formats are easier to set up and easier to debug. For example, you can use `telnet`\
    \ to connect to a server on any port and send client requests to that server.\
    \ There isn’t a simple tool like `telnet` to send server responses to a client,\
    \ but you can use tools like `tcpdump` or `wireshark` to snoop on TCP traffic\
    \ and see immediately what clients are sending to, and receiving from, the servers.\n\
    \nThere is not the same level of support in Go for managing character streams.\
    \ There are significant issues with character sets and character encodings, and\
    \ we will explore these issues in a later chapter. If we just pretend everything\
    \ is ASCII, like it was once upon a time, then character formats are quite straightforward\
    \ to deal with. The principal complication at this level is the varying status\
    \ of \"newline\" across different operating systems. UNIX uses the single character\
    \ `\\n`. Windows and others (more correctly) use the pair `\\r\\n`. On the Internet,\
    \ the pair `\\r\\n` is most common. UNIX systems just need to take care that they\
    \ don’t assume `\\n`.\n\n## A Simple Example\n\nThis example deals with a directory\
    \ browsing protocol, which is basically a stripped-down version of FTP, but without\
    \ even the file transfer part. We only consider listing a directory name, listing\
    \ the contents of a directory, and changing the current directory – all on the\
    \ server side, of course. This is a complete worked example of creating all components\
    \ of a client-server application. It is a simple program that includes messages\
    \ in both directions, as well as a design of messaging protocol.\n\n### A Stand-Alone\
    \ Application\n\nLook at a simple non-client-server program that allows you to\
    \ list files in a directory and change and print the name of the directory on\
    \ the server. We omit copying files, as that adds to the length of the program\
    \ without introducing important concepts. For simplicity, all file names will\
    \ be assumed to be in 7-bit ASCII. If we just looked at a stand-alone application\
    \ first, it would look like Figure [5-2](#436770_2_En_5_Chapter.xhtml#Fig2).\n\
    \n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig2_HTML.png)\n\nFigure 5-2\n\
    \nThe stand-alone application\n\nThe pseudocode would be as follows:\n\n```\n\
    read line from user\nwhile not eof do\n  if line == dir\n    list directory //\
    \ local function call\n  else\n    if line == cd \n      change directory // local\
    \ function call\n    else\n      if line == pwd\n        print directory // local\
    \ function call\n      else\n        if line == quit\n          quit\n       \
    \ else\n          complain\n  read line from user\n```\n\nA nondistributed application\
    \ would simply link the UI and file access code by local function calls.\n\n###\
    \ The Client-Server Application\n\nIn a client-server situation, the client would\
    \ be at the user end, talking to a server somewhere else. Aspects of this program\
    \ belong solely at the presentation end, such as getting the commands from the\
    \ user. Some are messages from the client to the server; some are solely at the\
    \ server end. See Figure [5-3](#436770_2_En_5_Chapter.xhtml#Fig3).\n\n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig3_HTML.png)\n\
    \nFigure 5-3\n\nThe client-server situation\n\n### The Client Side\n\nFor a simple\
    \ directory browser, assume that all directories and files are at the server end\
    \ and we are transferring file information only from the server to the client.\
    \ The client side (including presentation aspects) will become:\n\n```\nread line\
    \ from user\nwhile not eof do\n  if line == dir\n    list directory // network\
    \ call to server\n  else\n    if line == cd \n      change directory // network\
    \ call to server\n    else\n      if line == pwd\n        print directory // network\
    \ call to server\n      else\n        if line == quit\n          quit\n      \
    \  else\n          complain\n  read line from user\n```\n\nwhere the calls `list\
    \ directory`, `change directory`, and `print directory` now all involve network\
    \ calls to the server. The details are not shown yet and will be discussed later.\n\
    \n### Alternative Presentation Aspects\n\nA GUI program would allow directory\
    \ contents to be displayed as lists, for files to be selected and actions such\
    \ as change directory to be performed on them. The client would be controlled\
    \ by actions associated with various events that take place on graphical objects.\
    \ The pseudocode might look like this:\n\n```\nchange dir button:\n  if there\
    \ is a selected file\n    change directory // remote call to server\n    if successful\n\
    \      update directory label\n      list directory // remote call to server\n\
    \      update directory list\n```\n\nThe functions called from the different UIs\
    \ should be the same – changing the presentation should not change the networking\
    \ code.\n\n### The Server Side\n\nThe server side is independent of whatever presentation\
    \ is used by the client. It is the same for all clients:\n\n```\nwhile read command\
    \ from client\n  if command == dir\n    send list directory // local call on server\n\
    \  else\n    if command == cd \n      change directory // local call on server\n\
    \    else\n      if command == pwd\n        send print directory // local call\
    \ on server\n      else\n```\n\n### Protocol: Informal\n\n| Client Request | Server\
    \ Response |\n| --- | --- |\n| `dir` | Send list of files |\n| `cd <directory>`\
    \ | Change `dir`. Send an error if failed. Send `ok` if succeed. |\n| `pwd` |\
    \ Send current directory |\n| `quit` | Quit |\n\n### Text Protocol\n\nThis is\
    \ a simple protocol. The most complicated data structure that we need to send\
    \ is an array of strings for a directory listing. In this case, we don't need\
    \ the heavy-duty serialization techniques of the last chapter. In this case, we\
    \ can use a simple text format.\n\nBut even if we make the protocol simple, we\
    \ still have to specify it in detail. We choose the following message format:\n\
    \n* All messages are in 7-bit US-ASCII.\n* The messages are case-sensitive.\n\
    * Each message consists of a sequence of lines.\n* The first word on the first\
    \ line of each message describes the message type. All other words are message\
    \ data.\n* All words are separated by exactly one space character.\n* Each line\
    \ is terminated by CR-LF.\n\nSome of the choices made previously are weaker in\
    \ real-life protocols. For example:\n\n* Message types could be case-insensitive.\
    \ This just requires mapping message type strings down to lowercase before decoding.\n\
    * An arbitrary amount of whitespace could be left between words. This just adds\
    \ a little more complication, compressing whitespace.\n* Continuation characters\
    \ such as `\\` can be used to break long lines over several lines. This starts\
    \ to make processing more complex.\n* Just a `\\n` could be used as line terminator,\
    \ `\\r\\n` can too. This makes recognizing the end of line a bit harder.\n\nAll\
    \ of these variations exist in real protocols. Cumulatively, they make string\
    \ processing more complex than in this case.\n\n| Client Request | Server Response\
    \ |\n| --- | --- |\n| `send \"DIR\"` | Send list of files, one per line, terminated\
    \ by a blank line |\n| `send \"CD <directory>\"` | Change `dir`. Send `\"ERROR\"\
    ` if failed. Send `\"OK\"` if succeeded. |\n| `send \"PWD\"` | Send current working\
    \ directory |\n\nWe should also specify the transport:\n\n* All messages are sent\
    \ over a TCP connection established from the client to the server."
  raw: "### Character Format\n\nIn this mode, everything is sent as characters if\
    \ possible. For example, an integer 234 would be sent as, say, the three characters\
    \ `2`, `3`, and `4` instead of as the one byte 234\\. Data that is inherently\
    \ binary may be Base64 encoded to change it into a 7-bit format and then sent\
    \ as ASCII characters, as discussed in the previous chapter.\n\nIn character format:\n\
    \n*   A message is a sequence of one or more lines. The start of the first line\
    \ of the message is typically a word that represents the message type.\n\n*  \
    \ String-handling functions may be used to decode the message type and data.\n\
    \n*   The rest of the first line and successive lines contain the data.\n\n* \
    \  Line-oriented functions and line-oriented conventions are used to manage this.\n\
    \nThe pseudocode is as follows:\n\n```\nhandleClient() {\nline = conn.readLine()\n\
    if (line.startsWith(...) {\n...\n} else if (line.startsWith(...) {\n...\n}\n}\n\
    ```\n\nCharacter formats are easier to set up and easier to debug. For example,\
    \ you can use `telnet` to connect to a server on any port and send client requests\
    \ to that server. There isn’t a simple tool like `telnet` to send server responses\
    \ to a client, but you can use tools like `tcpdump` or `wireshark` to snoop on\
    \ TCP traffic and see immediately what clients are sending to, and receiving from,\
    \ the servers.\n\nThere is not the same level of support in Go for managing character\
    \ streams. There are significant issues with character sets and character encodings,\
    \ and we will explore these issues in a later chapter.\n\nIf we just pretend everything\
    \ is ASCII, like it was once upon a time, then character formats are quite straightforward\
    \ to deal with. The principal complication at this level is the varying status\
    \ of “newline” across different operating systems. UNIX uses the single character\
    \ `\\n`. Windows and others (more correctly) use the pair `\\r\\n`. On the Internet,\
    \ the pair `\\r\\n` is most common. UNIX systems just need to take care that they\
    \ don’t assume `\\n`.\n\n## A Simple Example\n\nThis example deals with a directory\
    \ browsing protocol, which is basically a stripped-down version of FTP, but without\
    \ even the file transfer part. We only consider listing a directory name, listing\
    \ the contents of a directory, and changing the current directory `–` all on the\
    \ server side, of course. This is a complete worked example of creating all components\
    \ of a client-server application. It is a simple program that includes messages\
    \ in both directions, as well as a design of messaging protocol.\n\n### A Stand-Alone\
    \ Application\n\nLook at a simple non-client-server program that allows you to\
    \ list files in a directory and change and print the name of the directory on\
    \ the server. We omit copying files, as that adds to the length of the program\
    \ without introducing important concepts. For simplicity, all file names will\
    \ be assumed to be in 7-bit ASCII. If we just looked at a stand-alone application\
    \ first, it would look like Figure [5-2](#436770_2_En_5_Chapter.xhtml#Fig2).\n\
    \n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig2_HTML.png)\n\nFigure 5-2\n\
    \nThe stand-alone application\n\nThe pseudocode would be as follows:\n\n```\n\
    read line from user\nwhile not eof do\nif line == dir\nlist directory // local\
    \ function call\nelse\nif line == cd \nchange directory // local function call\n\
    else\nif line == pwd\nprint directory // local function call\nelse\nif line ==\
    \ quit\nquit\nelse\ncomplain\nread line from user\n```\n\nA nondistributed application\
    \ would simply link the UI and file access code by local function calls.\n\n###\
    \ The Client-Server Application\n\nIn a client-server situation, the client would\
    \ be at the user end, talking to a server somewhere else. Aspects of this program\
    \ belong solely at the presentation end, such as getting the commands from the\
    \ user. Some are messages from the client to the server; some are solely at the\
    \ server end. See Figure [5-3](#436770_2_En_5_Chapter.xhtml#Fig3).\n\n![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig3_HTML.png)\n\
    \nFigure 5-3\n\nThe client-server situation\n\n### The Client Side\n\nFor a simple\
    \ directory browser, assume that all directories and files are at the server end\
    \ and we are transferring file information only from the server to the client.\
    \ The client side (including presentation aspects) will become\n\n```\nread line\
    \ from user\nwhile not eof do\nif line == dir\nlist directory // network call\
    \ to server\nelse\nif line == cd \nchange directory // network call to server\n\
    else\nif line == pwd\nprint directory // network call to server\nelse\nif line\
    \ == quit\nquit\nelse\ncomplain\nread line from user\n```\n\nwhere the calls `list\
    \ directory`, `change directory`, and `print directory` now all involve network\
    \ calls to the server. The details are not shown yet and will be discussed later.\n\
    \n### Alternative Presentation Aspects\n\nA GUI program would allow directory\
    \ contents to be displayed as lists, for files to be selected and actions such\
    \ as change directory to be performed on them. The client would be controlled\
    \ by actions associated with various events that take place on graphical objects.\
    \ The pseudocode might look like this:\n\n```\nchange dir button:\nif there is\
    \ a selected file\nchange directory // remote call to server\nif successful\n\
    update directory label\nlist directory // remote call to server\nupdate directory\
    \ list\n```\n\nThe functions called from the different UIs should be the same\
    \ `–` changing the presentation should not change the networking code.\n\n###\
    \ The Server Side\n\nThe server side is independent of whatever presentation is\
    \ used by the client. It is the same for all clients:\n\n```\nwhile read command\
    \ from client\nif command == dir\nsend list directory // local call on server\n\
    else\nif command == cd \nchange directory // local call on server\nelse\nif command\
    \ == pwd\nsend print directory // local call on server\nelse\n```\n\n### Protocol:\
    \ Informal\n\n| Client Request | Server Response |\n| --- | --- |\n| `dir` | Send\
    \ list of files |\n| `cd <directory>` | Change `dir`Send an error if failedSend\
    \ `ok` if succeed |\n| `pwd` | Send current directory |\n| `quit` | Quit |\n\n\
    ### Text Protocol\n\nThis is a simple protocol. The most complicated data structure\
    \ that we need to send is an array of strings for a directory listing. In this\
    \ case, we don’t need the heavy-duty serialization techniques of the last chapter.\
    \ In this case, we can use a simple text format.\n\nBut even if we make the protocol\
    \ simple, we still have to specify it in detail. We choose the following message\
    \ format:\n\n*   All messages are in 7-bit US-ASCII.\n\n*   The messages are case-sensitive.\n\
    \n*   Each message consists of a sequence of lines.\n\n*   The first word on the\
    \ first line of each message describes the message type. All other words are message\
    \ data.\n\n*   All words are separated by exactly one space character.\n\n*  \
    \ Each line is terminated by CR-LF.\n\nSome of the choices made previously are\
    \ weaker in real-life protocols. For example:\n\n*   Message types could be case-insensitive.\
    \ This just requires mapping message type strings down to lowercase before decoding.\n\
    \n*   An arbitrary amount of whitespace could be left between words. This just\
    \ adds a little more complication, compressing whitespace.\n\n*   Continuation\
    \ characters such as `\\` can be used to break long lines over several lines.\
    \ This starts to make processing more complex.\n\n*   Just a `\\n` could be used\
    \ as line terminator, `\\r\\n` can too. This makes recognizing the end of line\
    \ a bit harder.\n\nAll of these variations exist in real protocols. Cumulatively,\
    \ they make string processing more complex than in this case.\n\n| Client Request\
    \ | Server Response |\n| --- | --- |\n| `send \"DIR\"` | Send list of files, one\
    \ per line, terminated by a blank line |\n| `send \"CD <directory>\"` | Change\
    \ `dir`Send `\"ERROR\"` if failedSend `\"OK\"` if succeeded |\n| `send \"PWD\"\
    ` | Send current working directory |\n\nWe should also specify the transport:\n\
    \n*   All messages are sent over a TCP connection established from the client\
    \ to the server."
  trans: "\n### 字符格式\n\n在此模式下，所有数据尽可能以字符形式发送。例如，整数 `234` 将会被当作三个字符 `2`、`3` 和 `4` 来发送，而不是作为单个字节\
    \ `234` 发送。本质上为二进制格式的数据可能经过 Base64 编码，转换为 7 位格式，然后以 ASCII 字符形式发送，正如前一章所述。\n\n\
    在字符格式下：\n\n*   一条消息由一个或多个行组成。消息的第一行起始单词通常是代表消息类型的词。\n*   可以使用字符串处理函数来解码消息类型和数据。\n\
    *   第一行的剩余部分以及后续行包含数据。\n*   使用面向行的函数和面向行的惯例来管理这些内容。\n\n伪代码如下所示：\n\n```\nhandleClient()\
    \ {\n  line = conn.readLine()\n  if (line.startsWith(...) {\n    ...\n  } else\
    \ if (line.startsWith(...) {\n    ...\n  }\n}\n```\n\n字符格式更易于设置和调试。例如，您可以使用 `telnet`\
    \ 连接到任意端口上的服务器，并向该服务器发送客户端请求。虽然没有像 `telnet` 这样简单的工具用于向客户端发送服务器响应，但您可以使用 `tcpdump`\
    \ 或 `wireshark` 等工具来监听 TCP 流量，并立即查看客户端向服务器发送了什么，以及从服务器接收了什么。\n\n在 Go 语言中，对于管理字符流的支持水平不尽相同。字符集和字符编码存在重大问题，我们将在后续章节中探讨这些问题。如果我们假装所有内容都是\
    \ ASCII，就像从前那样，那么字符格式处理起来就相当简单了。在这个层面上，主要的复杂之处在于不同操作系统中“换行符”的差异。UNIX 使用单个字符 `\\\
    n`。Windows 和其他系统（更准确地说）使用 `\\r\\n` 这对字符。在互联网上，`\\r\\n` 这对字符最为常见。UNIX 系统只需注意不要假定为\
    \ `\\n` 即可。\n\n## 一个简单的示例\n\n这个示例涉及一个目录浏览协议，它基本上是 FTP 的精简版，甚至没有文件传输部分。我们只考虑列出目录名、列出目录内容以及更改当前目录——当然，所有操作都在服务器端进行。这是一个完整的工作示例，展示了如何创建客户端-服务器应用程序的所有组件。它是一个简单的程序，包含了双向消息以及消息协议的设计。\n\
    \n### 独立应用程序\n\n来看一个简单的非客户端-服务器程序，它允许你列出服务器上某个目录中的文件，并更改和打印当前目录的名称。我们省略了文件复制部分，因为这会增加程序长度，但不会引入重要的概念。为简单起见，假定所有文件名均为\
    \ 7 位 ASCII 格式。我们先来看一个独立的应用程序，它看起来像图 5-2 所示。\n\n![](img/436770_2_En_5_Fig2_HTML.png)\n\
    \n图 5-2\n\n独立应用程序\n\n伪代码如下所示：\n\n```\nread line from user\nwhile not eof do\n\
    \  if line == dir\n    list directory // 本地函数调用\n  else\n    if line == cd \n\
    \      change directory // 本地函数调用\n    else\n      if line == pwd\n        print\
    \ directory // 本地函数调用\n      else\n        if line == quit\n          quit\n \
    \       else\n          complain\n  read line from user\n```\n\n非分布式应用只需通过本地函数调用将用户界面和文件访问代码连接起来即可。\n\
    \n### 客户端-服务器应用程序\n\n在客户端-服务器场景中，客户端位于用户端，与位于其他地方的服务器进行通信。该程序的某些方面仅属于表示层，例如从用户处获取命令。有些是客户端发送给服务器的消息；有些则完全属于服务器端。参见图\
    \ 5-3。\n\n![](img/436770_2_En_5_Fig3_HTML.png)\n\n图 5-3\n\n客户端-服务器场景\n\n### 客户端\n\
    \n对于一个简单的目录浏览器，假设所有目录和文件都在服务器端，我们仅将文件信息从服务器传输到客户端。客户端（包括表示层方面）将变为：\n\n```\nread\
    \ line from user\nwhile not eof do\n  if line == dir\n    list directory // 对服务器的网络调用\n\
    \  else\n    if line == cd \n      change directory // 对服务器的网络调用\n  else\n   \
    \   if line == pwd\n        print directory // 对服务器的网络调用\n      else\n       \
    \ if line == quit\n          quit\n        else\n          complain\n  read line\
    \ from user\n```\n\n其中，`list directory`、`change directory` 和 `print directory`\
    \ 这些调用现在都涉及对服务器的网络调用。细节尚未展示，将在后面讨论。\n\n### 备选的表示层方面\n\nGUI 程序可以将目录内容显示为列表，供用户选择文件并对其执行更改目录等操作。客户端将由与图形对象上发生的各种事件相关联的动作来控制。伪代码可能如下所示：\n\
    \n```\nchange dir button:\n  if there is a selected file\n    change directory\
    \ // 对服务器的远程调用\n    if successful\n      update directory label\n      list directory\
    \ // 对服务器的远程调用\n      update directory list\n```\n\n从不同用户界面调用的函数应该是相同的——更改表示层不应改变网络代码。\n\
    \n### 服务器端\n\n服务器端独立于客户端使用的任何表示层。它对所有客户端都是相同的：\n\n```\nwhile read command from\
    \ client\n  if command == dir\n    send list directory // 服务器上的本地调用\n  else\n\
    \    if command == cd \n      change directory // 服务器上的本地调用\n    else\n      if\
    \ command == pwd\n        send print directory // 服务器上的本地调用\n      else\n```\n\
    \n### 协议：非正式版\n\n| 客户端请求 | 服务器响应 |\n| --- | --- |\n| `dir` | 发送文件列表 |\n| `cd <directory>`\
    \ | 更改 `dir`。若失败则发送错误信息。若成功则发送 `ok`。 |\n| `pwd` | 发送当前目录 |\n| `quit` | 退出 |\n\n\
    ### 文本协议\n\n这是一个简单的协议。我们需要发送的最复杂的数据结构是用于目录列表的字符串数组。在这种情况下，我们不需要上一章中的重量级序列化技术。在此情况下，我们可以使用简单的文本格式。\n\
    \n但即使我们将协议设计得简单，仍需详细指定它。我们选择以下消息格式：\n\n*   所有消息均为 7 位 US-ASCII 格式。\n*   消息区分大小写。\n\
    *   每条消息由一系列行组成。\n*   每条消息第一行的第一个单词描述消息类型。所有其他单词为消息数据。\n*   所有单词之间正好由一个空格字符分隔。\n\
    *   每行以 CR-LF 结尾。\n\n上述某些选择在实际协议中会有所弱化。例如：\n\n*   消息类型可以不区分大小写。这只需在解码前将消息类型字符串映射为小写即可。\n\
    *   单词之间可以保留任意数量的空白字符。这只会增加一点复杂性（需要压缩空白字符）。\n*   可以使用诸如 `\\` 这样的续行符将长行拆分为多行。这会使处理过程变得更复杂。\n\
    *   仅使用 `\\n` 或 `\\r\\n` 作为行终止符。这使得识别行尾变得更加困难。\n\n所有这些变体都存在于实际协议中。累积起来，它们使得字符串处理比本示例更复杂。\n\
    \n| 客户端请求 | 服务器响应 |\n| --- | --- |\n| `send \"DIR\"` | 发送文件列表，每行一个文件，以空行结束 |\n\
    | `send \"CD <directory>\"` | 更改 `dir`。若失败则发送 `\"ERROR\"`。若成功则发送 `\"OK\"`。 |\n\
    | `send \"PWD\"` | 发送当前工作目录 |\n\n我们还应该指定传输层：\n\n*   所有消息均通过客户端到服务器建立的 TCP 连接发送。\n"
- fmt: '# Server Code


    The server is `ftpserver.go`:


    ```go

    $ mkdir ch5

    $ cd ch5

    ch5$ vi ftpserver.go

    /* FTP Server

    */

    package main

    import (

    "log"

    "net"

    "os"

    "strings"

    )

    const (

    DIR = "DIR"

    CD  = "CD"

    PWD = "PWD"

    )

    func main() {

    service := "0.0.0.0:1202"

    tcpAddr, err := net.ResolveTCPAddr("tcp", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    defer conn.Close()

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    if err != nil {

    conn.Close()

    return

    }

    s := strings.Split(string(buf[0:n]), " ")

    log.Println(s)

    // decode request

    switch s[0] {

    case CD:

    chdir(conn, s[1])

    case DIR:

    dirList(conn)

    case PWD:

    pwd(conn)

    default:

    log.Println("Unknown command ", s)

    }

    }

    }

    func chdir(conn net.Conn, s string) {

    if os.Chdir(s) == nil {

    conn.Write([]byte("OK"))

    } else {

    conn.Write([]byte("ERROR"))

    }

    }

    func pwd(conn net.Conn) {

    s, err := os.Getwd()

    if err != nil {

    conn.Write([]byte(""))

    return

    }

    conn.Write([]byte(s))

    }

    func dirList(conn net.Conn) {

    // send a blank line on termination

    defer conn.Write([]byte("\r\n"))

    dir, err := os.Open(".")

    if err != nil {

    return

    }

    names, err := dir.Readdirnames(-1)

    if err != nil {

    return

    }

    for _, nm := range names {

    conn.Write([]byte(nm + "\r\n"))

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    # Client Code


    A command-line client is `ftpclient.go`:


    ```go

    ch5$ vi ftpclient.go

    /* FTPClient

    */

    package main

    import (

    "bufio"

    "bytes"

    "fmt"

    "log"

    "net"

    "os"

    "strings"

    )

    // strings used by the user interface

    const (

    uiDir  = "dir"

    uiCd   = "cd"

    uiPwd  = "pwd"

    uiQuit = "quit"

    )

    // strings used across the network

    const (

    DIR = "DIR"

    CD  = "CD"

    PWD = "PWD"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "host")

    }

    host := os.Args[1]

    conn, err := net.Dial("tcp", host+":1202")

    checkError(err)

    reader := bufio.NewReader(os.Stdin)

    for {

    line, err := reader.ReadString(''\n'')

    // lose trailing whitespace

    line = strings.TrimRight(line, " \t\r\n")

    if err != nil {

    break

    }

    // split into command + arg

    strs := strings.SplitN(line, " ", 2)

    // decode user request

    switch strs[0] {

    case uiDir:

    dirRequest(conn)

    case uiCd:

    if len(strs) != 2 {

    fmt.Println("cd ")

    continue

    }

    fmt.Println("CD \"", strs[1], "\"")

    cdRequest(conn, strs[1])

    case uiPwd:

    pwdRequest(conn)

    case uiQuit:

    conn.Close()

    os.Exit(0)

    default:

    fmt.Println("Unknown command")

    }

    }

    }

    func dirRequest(conn net.Conn) {

    conn.Write([]byte(DIR + " "))

    var buf [512]byte

    result := bytes.NewBuffer(nil)

    for {

    // read till we hit a blank line

    n, _ := conn.Read(buf[0:])

    result.Write(buf[0:n])

    length := result.Len()

    contents := result.Bytes()

    if string(contents[length-4:]) == "\r\n\r\n" {

    fmt.Println(string(contents[0 : length-4]))

    return

    }

    }

    }

    func cdRequest(conn net.Conn, dir string) {

    conn.Write([]byte(CD + " " + dir))

    var response [512]byte

    n, _ := conn.Read(response[0:])

    s := string(response[0:n])

    if s != "OK" {

    fmt.Println("Failed to change dir")

    }

    }

    func pwdRequest(conn net.Conn) {

    conn.Write([]byte(PWD))

    var response [512]byte

    n, _ := conn.Read(response[0:])

    s := string(response[0:n])

    fmt.Println("Current dir \"" + s + "\"")

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


