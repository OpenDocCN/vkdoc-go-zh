    # Textproto 包


    `textproto` 包包含旨在简化文本协议（如 HTTP 和 SNMP）管理的函数。


    这些格式对于跨多行的单个逻辑行有一些鲜为人知的规则，例如：”HTTP/1.1 头部字段值可以折叠到多行，只要续行以空格或水平制表符开头“（HTTP1.1 规范）。允许此类行的格式可以使用
    `textproto.Reader.ReadContinuedLine()` 函数读取，此外还有更简单的函数如 `textproto.Reader.ReadLine()`。


    这些协议还使用以三位数字代码开头的行来指示状态值，例如 HTTP 的 `404`。这些可以使用 `textproto.Reader.ReadCodeLine()`
    读取。它们还具有键名：键值的行，例如 `Content-Type: image/gif`。此类行可以通过 `textproto.Reader.ReadMIMEHeader()`
    读入到一个映射中。


    以下是一个示例，我们利用了一个名为 netcat（即 `nc`）的外部工具。该工具常用于编写 TCP、UDP 或 Unix 域套接字的脚本。在此示例中，我们创建了一个发送
    HTTP 请求消息的客户端。netcat 将监听该请求。一旦客户端执行，你将把结果输入到 netcat 终端中（模拟响应）。在客户端中，我们只期望一个以 `404`
