    \ tt.WantProxy {\nt.Errorf(\"Test Proxy %d, expecting:\\n%s\\nGot:\\n%s\\n\",\
    \ i, tt.WantProxy, sraw)\ncontinue\n}\n}\n}\n}\n...\n```\n\nThat is a fair bit\
