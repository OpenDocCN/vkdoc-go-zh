- fmt: '# 6. Managing Character Sets and Encodings


    Once upon a time, there were EBCDIC and ASCII. Actually, it was never that simple
    and has just become more complex over time. There is light on the horizon, but
    some estimates are that it may be 50 years before we all live in the daylight
    on this!


    Early computers were developed in the English-speaking countries of the United
    States, the UK, and Australia. As a result of this, assumptions were made about
    the language and character sets in use. Basically, the Latin alphabet was used,
    plus numerals, punctuation characters, and a few others. These were then encoded
    into bytes using ASCII or EBCDIC.


    The character-handling mechanisms were based on this: text files and I/O consisted
    of a sequence of bytes, with each byte representing a single character. String
    comparison could be done by matching corresponding bytes; conversions from upper-
    to lowercase could be done by mapping individual bytes and so on.


    There are about 6,500 spoken languages in the world (850 of them in Papua New
    Guinea!). A few languages use the “English” characters, but most do not. The Romanic
    languages such as French have adornments on various characters, so you can write
    “j’ai arrêté” with two differently accented vowels. Similarly, the Germanic languages
    have extra characters such as “ß”. Even UK English has characters not in the standard
    ASCII set: the pound symbol “£” and recently the euro “€”.


    But the world is not restricted to variations on the Latin alphabet. Thailand
    has its own alphabet, with words looking like this: “ภาษาไทย”. There are many
    other alphabets, and Japan even has two: Hiragana and Katakana.


    There are also the hierographic languages such as Chinese where you can write
    “百度一下, 你就知道”.


    It would be nice from a technical viewpoint if the world just used ASCII. However,
    the trend is in the opposite direction, with more and more users demanding that
    software use the language that they are familiar with. If you build an application
    that can be run in different countries, then users will demand that it uses their
    own language. In a distributed system, different components of the system may
    be used by users expecting different languages and characters.


    *Internationalization* (`i18n`) is how you write your applications so that they
    can handle the variety of languages and cultures. *Localization* (`l10n`) is the
    process of customizing your internationalized application to a particular cultural
    group.


    `i18n` and `l10n` are big topics in themselves. For example, they cover issues
    such as colors: while white means “purity” in Western cultures, it means “death”
    to the Chinese and “joy” to Egyptians. In this chapter, we just look at issues
    of character handling.


    ## Definitions


    It is important to be careful about exactly what part of a text-handling system
    you are talking about. Here is a set of definitions that have proven useful.


    ### Character


    A *character* is a “unit of information that roughly corresponds to a grapheme
    (written symbol) of a natural language, such as a letter, numeral, or punctuation
    mark” (Wikipedia). A character is “the smallest component of written language
    that has a semantic value” (Unicode). This includes letters such as “a” and “À”
    (or letters in any other language), digits such as “2”, punctuation characters
    such as “,” and various symbols such as the English pound currency symbol “£”.


    A character is some sort of abstraction of any actual symbol: the character “a”
    is to any written “a” as a Platonic circle is to any actual circle. The concept
    of character also includes control characters, which do not correspond to natural
    language symbols but to other bits of information used to process texts of the
    language.


    A character does not have any particular appearance, although we use the appearance
    to help recognize the character. However, even the appearance may have to be understood
    in a context: in mathematics, if you see the symbol π (pi), it is the character
    for the ratio of circumference to radius of a circle, while if you are reading
    Greek text, it is the sixteenth letter of the alphabet: “πρoσ” is the Greek word
    for “with” and has nothing to do with 3.14159.


    ### Character Repertoire/Character Set


    A character repertoire is a set of distinct characters, such as the Latin alphabet.
    No particular ordering is assumed. In English, although we say that “a” is earlier
    in the alphabet than “z”, we wouldn’t say that “a” is less than “z”. The “phone
    book" ordering that puts “McPhee” before “MacRea” shows that “alphabetic ordering”
    isn’t critical to the characters.


    A repertoire specifies the names of the characters and often a sample of how the
    characters might look. For example, the letter “a” might look like “a”, “*a*”,
    or “**a**”. But it doesn’t force them to look like that – they are just samples.
    The repertoire may make distinctions such as upper- and lowercase so that “a”
    and “A” are different. But it may regard them as the same, just with different
    sample appearances (just like some programming languages treat upper- and lowercase
    as different, Go, but some don’t, Basic). On the other hand, a repertoire might
    contain different characters with the same sample appearance: the repertoire for
    a Greek mathematician would have two different characters with appearance π. This
    is also called a noncoded character set.


    ### Character Code


    A character code is a mapping from characters to integers. The mapping for a character
    set is also called a coded character set or code set. The value of each character
    in this mapping is often called a code point. ASCII is a code set. The code point
    for “a” is 97, and for “A”, it is 65 (decimal).


    The character code is still an abstraction. It isn’t yet what we will see in text
    files, or in TCP packets. However, it is getting close, as it supplies the mapping
    from human-oriented concepts into numerical ones.


    ### Character Encoding


    To communicate or store a character, you need to encode it in some way. To transmit
    a string, you need to encode all characters in the string. There are many possible
    encodings for any code set.


    For example, 7-bit ASCII code points can be encoded as themselves into 8-bit bytes
    (an octet). So ASCII “A” (with code point 65) is encoded as the 8-bit octet `01000001`.
    However, a different encoding would be to use the top bit for parity checking.
    For example, with odd parity, ASCII “A” would be the octet `11000001`. Some protocols
    such as Sun’s XDR use 32-bit word-length encoding. ASCII “A” would be encoded
    as `00000000 00000000 0000000 01000001`.


    The character encoding is where we function at the programming level. Our programs
    deal with encoded characters. It obviously makes a difference whether we are dealing
    with 8-bit characters with or without parity checking, or with 32-bit characters.


    The encoding extends to strings of characters. A word-length even parity encoding
    of “ABC” might be `10000000` (parity bit in high byte) `0100000011` (C) `01000010`
    (B) `01000001` (A in low byte). The comments about the importance of an encoding
    apply equally strongly to strings, where the rules may be different.'
