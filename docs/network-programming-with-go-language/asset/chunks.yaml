    return result.Bytes(), nil\n}\nfunc checkError(err error) {\nif err != nil {\n\
    log.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\nIn one terminal, we run\
    \ the server:\n\n```\nch4$ go run jsonechoserver.go\n\n```\n\nIn a second terminal,\
    \ we run the client:\n\n```\nch4$ go run jsonechoclient.go localhost:1200\n{{Newmarch\
