    \ => chunked coding; body; empty trailer\n1: {\n...\n```\n\nAs with many tests\
    \ in Go, we see a very long testing table. We have a Request instance (Req) along\
    \ with a very similar stringified result (WantWrite and WantProxy). Before we\
    \ dive in, let’s review one of the tests.\n\n```\n// from requestwrite_test.go\n\
    ...\nfunc TestRequestWrite(t *testing.T) {\nfor i := range reqWriteTests {\ntt\
    \ := &reqWriteTests[i]\nsetBody := func() {\nif tt.Body == nil {\nreturn\n}\n\
    switch b := tt.Body.(type) {\ncase []byte:\ntt.Req.Body = io.NopCloser(bytes.NewReader(b))\n\
    case func() io.ReadCloser:\ntt.Req.Body = b()\n}\n}\nsetBody()\nif tt.Req.Header\
    \ == nil {\ntt.Req.Header = make(Header)\n}\nvar braw bytes.Buffer\nerr := tt.Req.Write(&braw)\n\
    if g, e := fmt.Sprintf(\"%v\", err), fmt.Sprintf(\"%v\", tt.WantError); g != e\
