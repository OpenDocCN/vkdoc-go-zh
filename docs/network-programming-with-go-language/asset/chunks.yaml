    \ 100，长度为 50。\n\n数组或切片的元素通过其索引访问：\n\n```\nx[1]\n```\n\n索引范围是从 0 到 `len(x)-1`。\n\
    \n可以通过使用数组或切片的起始索引（包含）和结束索引（不包含）来获取数组或切片的切片：\n\n-   引用底层数组\n-   切片视图在数组中的长度\n\
