    },\"Email\":[{\"Kind\":\"home\",\"Address\":\"jan@newmarch.name\"},{\"Kind\":\"\
    work\",\"Address\":\"j.newmarch@boxhill.edu.au\"}]}\n```\n\nHere, we used the\
    \ \"cat\" utility to view.\n\nTo load it back into memory, use `loadjson.go`:\n\
    \n```\nch4$ vi loadjson.go\n/* LoadJSON\n*/\npackage main\nimport (\n\"encoding/json\"\
    \n\"fmt\"\n\"log\"\n\"os\"\n)\ntype Person struct {\nName  Name\nEmail []Email\n\
    }\ntype Name struct {\nFamily   string\nPersonal string\n}\ntype Email struct\
    \ {\nKind    string\nAddress string\n}\nfunc main() {\nvar person Person\nloadJSON(\"\
    person.json\", &person)\nfmt.Printf(\"%v\\n\", person)\n}\nfunc loadJSON(fileName\
    \ string, key interface{}) {\ndata, err := os.ReadFile(fileName)\ncheckError(err)\n\
    err = json.Unmarshal(data, key)\ncheckError(err)\n}\nfunc checkError(err error)\
    \ {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n\
    Running our loader, the serialized form is\n\n```\nch4$ go run loadjson.go\n{{Newmarch\
    \ Jan} [{home jan@newmarch.name} {work j.newmarch@boxhill.edu.au}]}\n```\n\nThe\
    \ output is the rendering of a Go struct, not pure JSON. The json package provides\
    \ a related function to pretty print. If you wish to pretty print, copy `savejson.go`\
    \ to `prettyjson.go` and modify `saveJSON` as follows:\n\n```\nch4$ vi prettyjson.go\n\
    ...\nfunc main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal:\
    \ \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nsaveJSON(\"\
    pretty_person.json\", person)\n}\nfunc saveJSON(fileName string, key interface{})\
    \ {\ndata, err := json.MarshalIndent(key, \"  \", \"    \")\ncheckError(err)\n\
    err = os.WriteFile(fileName, data, 0600)\ncheckError(err)\n}\n...\n```\n\nIf we\
    \ run the preceding code, our output is much prettier.\n\n```\nch4$ go run prettyjson.go\n\
    ch4$ cat pretty_person.json\n{\n\"Name\": {\n\"Family\": \"Newmarch\",\n\"Personal\"\
    : \"Jan\"\n},\n\"Email\": [\n{\n\"Kind\": \"home\",\n\"Address\": \"jan@newmarch.name\"\
    \n},\n{\n\"Kind\": \"work\",\n\"Address\": \"j.newmarch@boxhill.edu.au\"\n}\n\
    ]\n}\n```\n\nIf you update `loadjson.go` to read this file (`pretty_json.json`),\
    \ you will see it is still valid JSON."
  raw: "## JSON\n\nJSON^([⁵](#fn5)) stands for JavaScript Object Notation. It was\
    \ designed to be a lightweight means of passing data between JavaScript systems\
    \ (i.e., browser/web server). It uses a text-based format and is sufficiently\
    \ general that it has become used as a general-purpose serialization method for\
    \ many programming languages.\n\nJSON serializes objects, arrays, and basic values.\
    \ The basic values include string, number, boolean values, and the null value.\
    \ Arrays are a comma-separated list of values that can represent arrays, vectors,\
    \ lists, or sequences of various programming languages. They are delimited by\
    \ square brackets `[ ... ]`. Objects are represented by a list of “field: value”\
    \ pairs enclosed in curly braces `{ ... }`.\n\nFor example, the table of employees\
    \ given earlier could be written as an array of employee objects:\n\n```\n[\n\
    {\"Name\": \"fred\", \"Occupation\": \"programmer\"},\n{\"Name\": \"liping\",\
    \ \"Occupation\": \"analyst\"},\n{\"Name\": \"sureerat\", \"Occupation\": \"manager\"\
    }\n]\n```\n\nThere is no special support for complex data types such as dates,\
    \ no distinction between number types, no recursive types, etc. JSON is a very\
    \ simple format but nevertheless can be quite useful. Its text-based format makes\
    \ it easy to use and debug, even though it has the overheads of string handling.\
    \ Go’s implementation is based on [`https://www.rfc-editor.org/rfc/rfc7159.html`](https://www.rfc-editor.org/rfc/rfc7159.html).\n\
    \nFrom the Go `encoding/json` package documentation, marshalling uses the following\
    \ type-dependent default encodings:\n\n*   Boolean values encode as JSON Booleans.\n\
    \n*   Floating point, integer, and Number values encode as JSON numbers.\n\n*\
    \   String values encode as JSON strings coerced to valid UTF-8, where each invalid\
    \ UTF-8 sequence is replaced by the encoding of the Unicode replacement character\
    \ U+FFFD (potentially rendered as ![](images/436770_2_En_4_Chapter/436770_2_En_4_Figa_HTML.gif)).\n\
    \    *   Disable HTML tag encoding via `SetEscapeHTML(false)`.\n\n*   Array and\
    \ slice values encode as JSON arrays, except that `[]byte` encodes as a base64-encoded\
    \ string.\n\n*   Struct values encode as JSON objects. Each struct field becomes\
    \ a member of the object. By default, the object’s key name is the struct field\
    \ name converted to lowercase.\n    *   If the struct field has a tag, that tag\
    \ will be used as the name instead.\n\n*   Map values encode as JSON objects.\
    \ The map’s key type must be string; the object keys are used directly as map\
    \ keys.\n\n*   Pointer values encode as the value pointed to. (Note: This allows\
    \ trees but not graphs!). A nil pointer encodes as the null JSON object.\n\n*\
    \   Interface values encode as the value contained in the interface. A nil interface\
    \ value encodes as the null JSON object.\n\n*   Channel, complex, and function\
    \ values cannot be encoded in JSON. Attempting to encode such a value causes `Marshal`\
    \ to return `json.UnsupportedTypeError`.\n\n*   JSON cannot represent cyclic data\
    \ structures, and `Marshal` does not handle them. Passing cyclic structures to\
    \ `Marshal` will result in an infinite recursion.\n\nA program to store JSON serialized\
    \ data into the file `person.json` is `savejson.go`:\n\n```\nch4$ vi savejson.go\n\
    /* SaveJSON\n*/\npackage main\nimport (\n\"encoding/json\"\n\"log\"\n\"os\"\n\
    )\ntype Person struct {\nName  Name\nEmail []Email\n}\ntype Name struct {\nFamily\
    \   string\nPersonal string\n}\ntype Email struct {\nKind    string\nAddress string\n\
    }\nfunc main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal:\
    \ \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nsaveJSON(\"\
    person.json\", person)\n}\nfunc saveJSON(fileName string, key interface{}) {\n\
    data, err := json.Marshal(key)\ncheckError(err)\nerr = os.WriteFile(fileName,\
    \ data, 0600)\ncheckError(err)\n}\nfunc checkError(err error) {\nif err != nil\
    \ {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\nAfter running the\
    \ preceding program, we can view the serialized results.\n\n```\nch4$ go run savejson.go\n\
    ch4$ cat person.json\n{\"Name\":{\"Family\":\"Newmarch\",\"Personal\":\"Jan\"\
    },\"Email\":[{\"Kind\":\"home\",\"Address\":\"jan@newmarch.name\"},{\"Kind\":\"\
    work\",\"Address\":\"j.newmarch@boxhill.edu.au\"}]}\n```\n\nHere, we used the\
    \ “cat” utility to view.\n\nTo load it back into memory, use `loadjson.go`:\n\n\
    ```\nch4$ vi loadjson.go\n/* LoadJSON\n*/\npackage main\nimport (\n\"encoding/json\"\
    \n\"fmt\"\n\"log\"\n\"os\"\n)\ntype Person struct {\nName  Name\nEmail []Email\n\
    }\ntype Name struct {\nFamily   string\nPersonal string\n}\ntype Email struct\
    \ {\nKind    string\nAddress string\n}\nfunc main() {\nvar person Person\nloadJSON(\"\
    person.json\", &person)\nfmt.Printf(\"%v\\n\", person)\n}\nfunc loadJSON(fileName\
    \ string, key interface{}) {\ndata, err := os.ReadFile(fileName)\ncheckError(err)\n\
    err = json.Unmarshal(data, key)\ncheckError(err)\n}\nfunc checkError(err error)\
    \ {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n\
    Running our loader, the serialized form is\n\n```\nch4$ go run loadjson.go\n{{Newmarch\
    \ Jan} [{home jan@newmarch.name} {work j.newmarch@boxhill.edu.au}]}\n```\n\nThe\
    \ output is the rendering of a Go struct, not pure JSON. The json package provides\
    \ a related function to pretty print. If you wish to pretty print, copy savejson.go\
    \ to prettyjson.go and modify saveJSON as follows:\n\n```\nch4$ vi prettyjson.go\n\
    ...\nfunc main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal:\
    \ \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nsaveJSON(\"\
    pretty_person.json\", person)\n}\nfunc saveJSON(fileName string, key interface{})\
    \ {\ndata, err := json.MarshalIndent(key, \"  \", \"    \")\ncheckError(err)\n\
    err = os.WriteFile(fileName, data, 0600)\ncheckError(err)\n}\n...\n```\n\nIf we\
    \ run the preceding code, our output is much prettier.\n\n```\nch4$ go run prettyjson.go\n\
    ch4$ cat pretty_person.json\n{\n\"Name\": {\n\"Family\": \"Newmarch\",\n\"Personal\"\
    : \"Jan\"\n},\n\"Email\": [\n{\n\"Kind\": \"home\",\n\"Address\": \"jan@newmarch.name\"\
    \n},\n{\n\"Kind\": \"work\",\n\"Address\": \"j.newmarch@boxhill.edu.au\"\n}\n\
    ]\n}\n```\n\nIf you update `loadjson.go` to read this file (pretty_json.json),\
    \ you will see it is still valid JSON."
  trans: "\n# JSON\n\nJSON^(⁵) 全称为 JavaScript 对象表示法。它被设计为 JavaScript 系统（即浏览器/网络服务器）之间传递数据的轻量级方式。JSON\
    \ 采用基于文本的格式，且具有足够的通用性，现已成为多种编程语言通用的序列化方法。\n\nJSON 可序列化对象、数组以及基本值。基本值包括字符串、数字、布尔值和空值。数组是值的逗号分隔列表，可以表示多种编程语言中的数组、向量、列表或序列，由方括号\
    \ `[ ... ]` 界定。对象则由花括号 `{ ... }` 内的一组“字段:值”对表示。\n\n例如，前面给出的员工表格可以写成员工对象数组：\n\n\
    ```\n[\n{\"Name\": \"fred\", \"Occupation\": \"programmer\"},\n{\"Name\": \"liping\"\
    , \"Occupation\": \"analyst\"},\n{\"Name\": \"sureerat\", \"Occupation\": \"manager\"\
    }\n]\n```\n\nJSON 对日期等复杂数据类型没有专门支持，不对数字类型进行区分，也没有递归类型等。JSON 是一种非常简单的格式，但仍然相当实用。其基于文本的格式使其易于使用和调试，尽管存在字符串处理的额外开销。Go\
    \ 语言的实现基于 [`https://www.rfc-editor.org/rfc/rfc7159.html`](https://www.rfc-editor.org/rfc/rfc7159.html)。\n\
    \n根据 Go 语言 `encoding/json` 包的文档，编组（Marshalling）使用以下类型依赖的默认编码：\n\n- 布尔值编码为 JSON\
    \ 布尔值。\n- 浮点数、整数和数字值编码为 JSON 数字。\n- 字符串值编码为 JSON 字符串，并强制转换为有效的 UTF-8 编码，其中每个无效的\
    \ UTF-8 序列都会被替换为 Unicode 替换字符 U+FFFD 的编码（可能显示为 ![](img/436770_2_En_4_Figa_HTML.gif)）。\n\
    \    - 通过 `SetEscapeHTML(false)` 禁用 HTML 标签编码。\n- 数组和切片值编码为 JSON 数组，但 `[]byte`\
    \ 编码为 base64 编码的字符串。\n- 结构体值编码为 JSON 对象。每个结构体字段成为对象的一个成员。默认情况下，对象的键名是转换为小写的结构体字段名。\n\
    \    - 如果结构体字段有标签，则该标签将用作键名。\n- 映射值编码为 JSON 对象。映射的键类型必须是字符串；对象键直接用作映射键。\n- 指针值编码为指向的值。（注意：这允许树状结构，但不允许图状结构！）。空指针编码为\
    \ null JSON 对象。\n- 接口值编码为接口中包含的值。空接口值编码为 null JSON 对象。\n- 通道、复数类型和函数值无法编码为 JSON。尝试编码此类值会导致\
    \ `Marshal` 返回 `json.UnsupportedTypeError`。\n- JSON 无法表示循环数据结构，`Marshal` 也不处理它们。将循环结构传递给\
    \ `Marshal` 将导致无限递归。\n\n一个用于将 JSON 序列化数据存储到文件 `person.json` 的程序是 `savejson.go`：\n\
    \n```\nch4$ vi savejson.go\n/* SaveJSON\n*/\npackage main\nimport (\n\"encoding/json\"\
    \n\"log\"\n\"os\"\n)\ntype Person struct {\nName  Name\nEmail []Email\n}\ntype\
    \ Name struct {\nFamily   string\nPersonal string\n}\ntype Email struct {\nKind\
    \    string\nAddress string\n}\nfunc main() {\nperson := Person{\nName: Name{Family:\
    \ \"Newmarch\", Personal: \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address:\
    \ \"jan@newmarch.name\"},\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"\
    },\n},\n}\nsaveJSON(\"person.json\", person)\n}\nfunc saveJSON(fileName string,\
    \ key interface{}) {\ndata, err := json.Marshal(key)\ncheckError(err)\nerr = os.WriteFile(fileName,\
    \ data, 0600)\ncheckError(err)\n}\nfunc checkError(err error) {\nif err != nil\
    \ {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n运行上述程序后，我们可以查看序列化结果。\n\
    \n```\nch4$ go run savejson.go\nch4$ cat person.json\n{\"Name\":{\"Family\":\"\
    Newmarch\",\"Personal\":\"Jan\"},\"Email\":[{\"Kind\":\"home\",\"Address\":\"\
    jan@newmarch.name\"},{\"Kind\":\"work\",\"Address\":\"j.newmarch@boxhill.edu.au\"\
    }]}\n```\n\n这里，我们使用了 `cat` 工具来查看。\n\n要将其加载回内存，请使用 `loadjson.go`：\n\n```\nch4$\
    \ vi loadjson.go\n/* LoadJSON\n*/\npackage main\nimport (\n\"encoding/json\"\n\
    \"fmt\"\n\"log\"\n\"os\"\n)\ntype Person struct {\nName  Name\nEmail []Email\n\
    }\ntype Name struct {\nFamily   string\nPersonal string\n}\ntype Email struct\
    \ {\nKind    string\nAddress string\n}\nfunc main() {\nvar person Person\nloadJSON(\"\
    person.json\", &person)\nfmt.Printf(\"%v\\n\", person)\n}\nfunc loadJSON(fileName\
    \ string, key interface{}) {\ndata, err := os.ReadFile(fileName)\ncheckError(err)\n\
    err = json.Unmarshal(data, key)\ncheckError(err)\n}\nfunc checkError(err error)\
    \ {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n\
    运行我们的加载器，序列化形式为\n\n```\nch4$ go run loadjson.go\n{{Newmarch Jan} [{home jan@newmarch.name}\
    \ {work j.newmarch@boxhill.edu.au}]}\n```\n\n输出是 Go 结构体的呈现形式，而非纯 JSON。json 包提供了用于美化打印的相关函数。如果你希望美化打印，请将\
    \ `savejson.go` 复制为 `prettyjson.go` 并修改 `saveJSON`，具体如下：\n\n```\nch4$ vi prettyjson.go\n\
    ...\nfunc main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal:\
    \ \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nsaveJSON(\"\
    pretty_person.json\", person)\n}\nfunc saveJSON(fileName string, key interface{})\
    \ {\ndata, err := json.MarshalIndent(key, \"  \", \"    \")\ncheckError(err)\n\
    err = os.WriteFile(fileName, data, 0600)\ncheckError(err)\n}\n...\n```\n\n如果我们运行上述代码，输出会美观得多。\n\
    \n```\nch4$ go run prettyjson.go\nch4$ cat pretty_person.json\n{\n\"Name\": {\n\
    \"Family\": \"Newmarch\",\n\"Personal\": \"Jan\"\n},\n\"Email\": [\n{\n\"Kind\"\
    : \"home\",\n\"Address\": \"jan@newmarch.name\"\n},\n{\n\"Kind\": \"work\",\n\"\
    Address\": \"j.newmarch@boxhill.edu.au\"\n}\n]\n}\n```\n\n如果你更新 `loadjson.go`\
    \ 来读取此文件（`pretty_json.json`），你会发现它仍然是有效的 JSON 格式。\n"
- fmt: "### A Client and A Server\n\nWe now send JSON for a round trip. A client to\
    \ send a person's data and read it back ten times is `jsonechoclient.go`:\n\n\
    ```go\nch4$ vi jsonechoclient.go\n/* JSON EchoClient\n*/\npackage main\nimport\
    \ (\n\"bytes\"\n\"encoding/json\"\n\"fmt\"\n\"io\"\n\"log\"\n\"net\"\n\"os\"\n\
    )\ntype Person struct {\nName  Name\nEmail []Email\n}\ntype Name struct {\nFamily\
    \   string\nPersonal string\n}\ntype Email struct {\nKind    string\nAddress string\n\
    }\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"host:port\")\n}\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal:\
    \ \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"},\n},\n}\nservice\
    \ := os.Args[1]\nconn, err := net.Dial(\"tcp\", service)\ncheckError(err)\ndefer\
    \ conn.Close()\nfor n := 0; n < 10; n++ {\ndata, _ := json.Marshal(person)\nconn.Write(data)\n\
    var newPerson Person\nbuf, _ := readFully(conn)\nerr = json.Unmarshal(buf, &newPerson)\n\
    fmt.Println(newPerson)\n}\n}\nfunc readFully(conn net.Conn) ([]byte, error) {\n\
    result := bytes.NewBuffer(nil)\nvar buf [512]byte\nfor {\nn, err := conn.Read(buf[0:])\n\
    result.Write(buf[0:n])\nif err != nil {\nif err == io.EOF {\nbreak\n}\nreturn\
    \ nil, err\n}\nif n < 512 {\nbreak\n}\n}\nreturn result.Bytes(), nil\n}\nfunc\
    \ checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n```\n\nThe corresponding server is `jsonechoserver.go`:\n\n```go\nch4$ vi\
    \ jsonechoserver.go\n/* JSON EchoServer\n*/\npackage main\nimport (\n\"bytes\"\
    \n\"encoding/json\"\n\"fmt\"\n\"io\"\n\"net\"\n\"log\"\n)\ntype Person struct\
    \ {\nName  Name\nEmail []Email\n}\ntype Name struct {\nFamily   string\nPersonal\
    \ string\n}\ntype Email struct {\nKind    string\nAddress string\n}\nfunc main()\
    \ {\nservice := \"0.0.0.0:1200\"\ntcpAddr, err := net.ResolveTCPAddr(\"tcp\",\
    \ service)\ncheckError(err)\nlistener, err := net.ListenTCP(\"tcp\", tcpAddr)\n\
    checkError(err)\nfor {\nconn, err := listener.Accept()\nif err != nil {\ncontinue\n\
    }\nfor n := 0; n < 10; n++ {\nvar person Person\nbuf, _ := readFully(conn)\nerr\
    \ = json.Unmarshal(buf, &person)\nfmt.Println(person)\ndata, _ := json.Marshal(person)\n\
    conn.Write(data)\n}\nconn.Close() // we're finished\n}\n}\nfunc readFully(conn\
    \ net.Conn) ([]byte, error) {\nresult := bytes.NewBuffer(nil)\nvar buf [512]byte\n\
    for {\nn, err := conn.Read(buf[0:])\nresult.Write(buf[0:n])\nif err != nil {\n\
    if err == io.EOF {\nbreak\n}\nreturn nil, err\n}\nif n < 512 {\nbreak\n}\n}\n\
    return result.Bytes(), nil\n}\nfunc checkError(err error) {\nif err != nil {\n\
    log.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\nIn one terminal, we run\
    \ the server:\n\n```\nch4$ go run jsonechoserver.go\n```\n\nIn a second terminal,\
    \ we run the client:\n\n```\nch4$ go run jsonechoclient.go localhost:1200\n{{Newmarch\
    \ Jan} [{home jan@newmarch.name} {work j.newmarch@boxhill.edu.au}]}\n... (8 more\
    \ duplicated lines) ...\n{{Newmarch Jan} [{home jan@newmarch.name} {work j.newmarch@boxhill.edu.au}]}\n\
    ```\n\nHere is what is happening:\n\n- On the server, the inner loop creates a\
    \ new `Person`, waiting for a serialized instance.\n- On the client, a single\
    \ instance of `Person` is created:\n    - Enter a loop that does the following:\n\
    \        - Serializes and sends `Person` to server\n        - Creates a new `Person`\
    \ and waits for server\n    - Back on server:\n        - The data is consumed\
    \ and deserialized, populating a new `Person` instance.\n        - Printed.\n\
    \        - The `Person` is again serialized and sent back.\n\nThis process repeats\
    \ ten times until the client loop finishes, while the server remains waiting with\
    \ outer loop.\n\nThere is more to consider when parsing JSON. Go even provides\
    \ additional APIs including one to tokenize a JSON stream. We cover JSON in more\
    \ detail in later sections.\n\n## The Gob Package\n\nGob is a serialization technique\
    \ specific to Go. It is designed to encode Go data types specifically and does\
    \ not at present have substantial support for or by any other languages. It supports\
    \ all Go data types except for channels, functions, and interfaces. It supports\
    \ integers of all types and sizes, strings and Booleans, structs, arrays, and\
    \ slices. At present, it has some problems with circular structures such as rings,\
    \ but that will improve over time. The purpose was to allow pure Go client and\
    \ servers to work together without the need of a third-party package.\n\nGob encodes\
    \ type information into its serialized forms. This is far more extensive than\
    \ the type information in, say, an X.509 serialization but far more efficient\
    \ than the type information contained in an XML document. Type information is\
    \ only included once for each piece of data but includes, for example, the names\
    \ of struct fields.\n\nThis inclusion of type information makes Gob marshalling\
    \ and unmarshalling fairly robust to changes or differences between the marshaller\
    \ and unmarshaller. For example, this struct:\n\n```go\nstruct T {\na int\nb int\n\
    }\n```\n\nCan be marshalled and then unmarshalled into a different struct, where\
    \ the order of fields has changed:\n\n```go\nstruct T {\nb int\na int\n}\n```\n\
    \nIt can also cope with missing fields (the values are ignored) or extra fields\
    \ (the fields are left unchanged). It can cope with pointer types so that the\
    \ previous struct could be unmarshalled into this one:\n\n```go\nstruct T {\n\
    *a int\n**b int\n}\n```\n\nTo some extent, it can cope with type coercions so\
    \ that an `int` field can be broadened/widened into an `int64`, but not incompatible\
    \ types such as `int` to `uint`.\n\nTo use Gob to marshal a data value, you first\
    \ need to create an `Encoder`. This takes an `io.Writer` as a parameter, and marshalling\
    \ will be done to this writable stream. The encoder has a method called `Encode`,\
    \ which marshals the value to the stream. This method can be called multiple times\
    \ on multiple pieces of data. Type information for each data type is only written\
    \ once, though.\n\nYou use a `Decoder` to unmarshal the serialized data stream.\
    \ This takes an `io.Reader`, and each read returns an unmarshalled data value.\n\
