- fmt: '#### Example: Distributed Database


    Gartner model - distributed data (see Figure [1-13](#436770_2_En_1_Chapter.xhtml#Fig13))


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig13_HTML.png)


    Figure 1-13


    Gartner model – distributed data


    Modern mobile phones make good examples of this. Due to limited memory, they may
    store a small part of a database locally so that they can usually respond quickly.
    However, if data is required that is not held locally, then a request may be made
    to a remote database for that additional data.


    `Google Maps` is another good example. All of the maps reside on `Google`’s servers.
    When one is requested by a user, the “nearby” maps are also downloaded into a
    small database in the browser. When the user moves the map a little bit, the extra
    bits required are already in the local store for quick response.


    #### Example: Network File Service


    Gartner model - remote data (see Figure [1-14](#436770_2_En_1_Chapter.xhtml#Fig14))


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig14_HTML.png)


    Figure 1-14


    Gartner model – remote data


    This classification allows remote clients access to a shared file system. There
    are many examples of such systems: `NFS`, `DCE`, etc.


    #### Example: Web


    Gartner classification - distributed transaction (see Figure [1-15](#436770_2_En_1_Chapter.xhtml#Fig15))


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig15_HTML.png)


    Figure 1-15


    Gartner model – distributed transaction


    On the Web the client may have logic in `JavaScript` (in the past `Java Applets`
    or even `Adobe Flash`) while the server has logic in `CGI` scripts or similar
    (`Ruby on Rails`, etc). This is a distributed hypertext system, with many additional
    mechanisms.


    #### Example: Terminal Emulation


    Gartner classification - remote presentation (see Figure [1-16](#436770_2_En_1_Chapter.xhtml#Fig16))


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig16_HTML.png)


    Figure 1-16


    Gartner model – remote presentation


    Terminal emulation allows a remote system to act as a normal terminal on a local
    system. `Telnet` is the most common example of this.


    #### Example: Secure Shell


    Gartner classification - distributed presentation (see Figure [1-17](#436770_2_En_1_Chapter.xhtml#Fig17))


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig17_HTML.png)


    Figure 1-17


    Gartner model – distributed presentation


    The secure shell on `UNIX` allows you to connect to a remote system, run a command
    there, and display the presentation locally. The presentation is prepared on the
    remote machine and displayed locally. Under `Windows`, remote desktop behaves
    similarly.


    ### Three-Tier Models


    Of course, if you have two tiers, then you can have three, four, or more. Some
    of the three-tier possibilities are shown in Figure [1-18](#436770_2_En_1_Chapter.xhtml#Fig18).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig18_HTML.png)


    Figure 1-18


    Three-tier models


    The modern Web is a good example of the rightmost of these. The back end is made
    up of a database, often running stored procedures to hold some of the database
    logic. The middle tier is an `HTTP` server such as `Apache` running `PHP` scripts
    (or `Ruby on Rails`, or `JSP` pages, `Go` `net/http` package, etc.). This will
    manage some of the logic and will have data such as `HTML` pages stored locally.
    The front end is a browser to display the pages, under the control of some `JavaScript`.
    In `HTML5`, the front end may also have a local database.


    ### Fat vs. Thin


    A common labeling of components is “fat” or “thin.” Fat components take up a lot
    of memory and do complex processing. Thin components, on the other hand, do little
    of either. There don''t seem to be any “normal” size components, only fat or thin!


    Fatness or thinness is a relative concept. Browsers are often labeled as thin
    because all they do is display web pages. However, `Firefox` on my `Linux` box
    takes nearly half a gigabyte of memory, which I don''t regard as small at all!


    ## Middleware Model


    Middleware is the “glue” connecting components of a distributed system. These
    components are things in addition to what the operating system offers. The middleware
    model is shown in Figure [1-19](#436770_2_En_1_Chapter.xhtml#Fig19).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig19_HTML.png)


    Figure 1-19


    The middleware model


    Components of middleware include the following:


    *   The middleware layer is an application-independent software using the network
    services.

    *   Ability to normalize access and/or actions across differing applications.

    *   Configuration (e.g., security profiles).


    `TCP/IP` is an example of a service normally provided by the operating system.


    ### Middleware Examples


    Examples of middleware include the following:


    *   Primitive services such as file transfer or email

    *   Basic services such as `RPC` (e.g., `Apache Thrift` or `gRPC`)

    *   Object services such as `RMI` and `Jini`

    *   Integrated services such as `DCE` (`Distributed Computing Environment` – `DNS`,
    time, and more)

    *   Distributed object services such as `CORBA` and `OLE`/`ActiveX` (i.e., discovery)

    *   The World Wide Web

    *   Enterprise Service Buses


    We use middleware libraries to minimize the need to develop custom solutions,
    like any shared library but with a focus on network-based services.


    ### Middleware Functions


    The functions of middleware can include these:


    *   Initiation of processes at different computers

    *   Session management

    *   Directory services to allow clients to locate servers

    *   Remote data access (e.g., encoding/decoding)

    *   Concurrency control to allow servers to handle multiple clients

    *   Security and integrity

    *   Monitoring

    *   Termination of processes, both local and remote


    The term “middleware” is also used when building custom web servers. For example,
    if you want to log each request and/or response to a local file, you can add functions
    (known as middleware) into a stack of operations. When your function happens to
    leverage a network service as we mention before, we simple call it middleware.


    ## Continuum of Processing


    The Gartner model is based on a breakdown of an application into the components
    of presentation, application logic, and data handling. A finer-grained breakdown
    is illustrated in Figure [1-20](#436770_2_En_1_Chapter.xhtml#Fig20).


    ![](images/436770_2_En_1_Chapter/436770_2_En_1_Fig20_HTML.png)


    Figure 1-20


    Breakdown of an application into its components of presentation'
