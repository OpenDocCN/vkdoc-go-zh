    \ contains this template as well as the HTML for the side lists of card order,\
    \ half card display, and the form buttons at the bottom. Omitting the side lists\
    \ and the submit buttons, the HTML is as follows:\n\n```\nch10$ cat html/listflashcards.html\n\
    \nFlashcards\n\nFlashcards\n\nFlashcard Sets\n\n{{range $i, $e := .}}\n\n{{$e}}\n\
    \n{{end}}\n\nCard order\n\nRandom \n\nSequential \n\nHalf card display\n\nRandom\
    \ \n\nEnglish \n\nChinese \n\nShow cards in set\n\nList words in set\n\n```\n\n\
    From server.go, the function `listFlashCards`, which applies the template to this,\
    \ is as follows:\n\n```\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request)\
    \ {\nflashCardsNames := ListFlashCardsNames()\nt, err := template.ParseFiles(\"\
    html/\" + ListFlashCardPage)\nif err != nil {\nhttpErrorHandler(rw, err)\nreturn\n\
    }\nt.Execute(rw, flashCardsNames)\n}\n```\n\nFrom `flashcards.go,` the function\
    \ `ListFlashCardsNames()` just iterates through the flashcards directory, returning\
    \ an array of strings (the file names of each flashcard set):\n\n```\nfunc ListFlashCardsNames()\
    \ []string {\nflashcardsDir, err := os.Open(\"flashcardsets\")\nif err != nil\
    \ {\nreturn nil\n}\nfiles, err := flashcardsDir.Readdir(-1)\nfileNames := make([]string,\
    \ len(files))\nfor n, f := range files {\nfileNames[n] = f.Name()\n}\nsort.Strings(fileNames)\n\
    return fileNames\n}\n```\n\n## The manageFlashCards Function\n\nFrom `server.go`,\
    \ the `manageFlashCards` function is called to manage the form submission on pressing\
    \ the “Show Cards in Set” button or the “List Words in Set” button. It extracts\
    \ values from the form request and then chooses between `showFlashCards` and `listWords`:\n\
    \n```\n/*\n* Called from listflashcards.html on form submission\n*/\nfunc manageFlashCards(rw\
    \ http.ResponseWriter, req *http.Request) {\nset := req.FormValue(\"flashcardSets\"\
    )\norder := req.FormValue(\"order\")\naction := req.FormValue(\"submit\")\nhalf\
    \ := req.FormValue(\"half\")\n//if unset\n//http://localhost:8000/flashcardSets?flashcardSets=common_words&order=Random&half=Random&submit=Show+cards+in+set\n\
    if len(set) == 0 {\nset = DefaultSet\norder = DefaultAmount\naction = ActionShow\n\
    half = DefaultAmount\n}\ncardname := URLFlashCardSetsPath + \"/\" + set\nfmt.Printf(\"\
    Set %s, order %s, action %s, half %s, cardname %s\\n\", set, order, action, half,\
    \ cardname)\nswitch action {\ncase ActionShow:\nshowFlashCards(rw, cardname, order,\
    \ half)\ncase ActionList:\nlistWords(rw, cardname)\ndefault:\nfmt.Println(ActionUnknown)\n\
    }\n}\n```\n\n## The Chinese Dictionary\n\nThe previous code was fairly generic:\
    \ it delivers static files using a FileServer, creates HTML tables using templates\
    \ based on a listing of files in a directory, and processes information from an\
    \ HTML form. To proceed further by looking at what is displayed in each card,\
    \ we have to get into the application-specific detail, and that means looking\
    \ at the source of words (a dictionary), how to represent it and the cards, and\
    \ how to send flashcard data to the browser. First, the dictionary.\n\nChinese\
    \ is a complex language – aren’t they all :-(. The written form is hieroglyphic,\
    \ that is, “pictograms,” instead of using an alphabet. But this written form has\
    \ evolved over time and even recently split into two forms: “traditional” Chinese\
    \ as used in Taiwan and Hong Kong and “simplified” Chinese as used in mainland\
    \ China. While most of the characters are the same, about 1,000 are different.\
    \ Thus, a Chinese dictionary will often have two written forms of the same character.\n\
    \nMost Westerners like me can’t understand these characters. So there is a “Latinized”\
    \ form called Pinyin, which writes the characters in a phonetic alphabet based\
    \ on the Latin alphabet. It isn’t quite the Latin alphabet because Chinese is\
    \ a tonal language, and the Pinyin form has to show the tones (much like accents\
    \ in French and other European languages). So a typical dictionary has to show\
    \ four things: the traditional form, the simplified form, the Pinyin, and the\
    \ English. In addition (just like in English), a word may have multiple meanings.\
    \ For example, there is a free Chinese/English dictionary at [`http://www.mandarintools.com/worddict.html`](http://www.mandarintools.com/worddict.html),\
    \ and even better, you can download it as a UTF-8 file. In it, the word 好 has\
    \ this entry:\n\n| **Traditional** | **Simplified** | **Pinyin** | **English**\
    \ | **Meanings** |\n| --- | --- | --- | --- | --- |\n| 好 | 好 | hǎo | good | /good/well/proper/good\
    \ to/easy to/very/so/(suffix indicating completion or readiness)/ |\n\nThere is\
    \ a little complication in this dictionary. Most keyboards are not good at representing\
    \ accents such as the caron in ǎ. So while the Chinese characters are written\
    \ in Unicode, the Pinyin characters are not. Although there are Unicode characters\
    \ for letters such as ǎ, many dictionaries including this one use the Latin a\
    \ and place the tone at the end of the word. Here, it is the third tone, so hǎo\
    \ is written as hao3\\. This makes it easier for those who only have US keyboards\
    \ and no Unicode editor to still communicate in Pinyin. A copy of the dictionary\
    \ as used by the web server is `cedict_ts.u8`.\n\nThis data format mismatch is\
    \ not a big deal. Just that somewhere along the line, between the original text\
    \ dictionary and the display in the browser, a data massage has to be performed.\
    \ Go templates allow this to be done by defining a custom template, so I chose\
    \ that route. Alternative approaches include doing this as the dictionary is read\
    \ in, or in the JavaScript to display the final characters.\n\n### The Dictionary\
    \ Type\n\nFrom dictionary.go, we use a Dictionary`Entry` to hold the basic information\
    \ about one word:\n\n```\ntype DictionaryEntry struct {\nTraditional  string\n\
    Simplified   string\nPinyin       string\nTranslations []string\n}\n```\n\nThe\
    \ preceding word would be represented by the following:\n\n```\nDictionaryEntry\
    \ {Traditional: 好,\nSimplified: 好,\nPinyin: `hao3`\nTranslations: []string{`good`,\
    \ `well`,`proper`,\n`good to`, `easy to`, `very`, `so`,\n`(suffix indicating completion\
    \ or readiness)`}\n}\n```\n\nThe dictionary itself is just an array of these entries:\n\
    \n```\ntype Dictionary struct {\nEntries []*DictionaryEntry\n}\n```"
  trans: "\n# listFlashCards 函数\n\n`listFlashCards` 函数用于生成顶层页面的 HTML。闪卡名称列表是可扩展的，由\
    \ `flashcardSets` 目录下的文件条目集合构成。该列表用于创建顶层页面中的表格，最好使用模板包来实现：\n\n```\nFlashcard Sets\n\
    \n{{range $i, $e := .}}\n\n{{$e}}\n\n{{end}}\n```\n\n其中 range 循环遍历名称列表。文件 `html/listflashcards.html`\
    \ 包含了该模板，以及卡片顺序侧边列表、半卡显示和底部表单按钮的 HTML。省略侧边列表和提交按钮后，HTML 如下所示：\n\n```\nch10$ cat\
    \ html/listflashcards.html\n\nFlashcards\n\nFlashcards\n\nFlashcard Sets\n\n{{range\
    \ $i, $e := .}}\n\n{{$e}}\n\n{{end}}\n\nCard order\n\nRandom \n\nSequential \n\
    \nHalf card display\n\nRandom \n\nEnglish \n\nChinese \n\nShow cards in set\n\n\
    List words in set\n```\n\n在 `server.go` 中，`listFlashCards` 函数将模板应用于此，代码如下：\n\n\
    ```\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request) {\nflashCardsNames\
    \ := ListFlashCardsNames()\nt, err := template.ParseFiles(\"html/\" + ListFlashCardPage)\n\
    if err != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\nt.Execute(rw, flashCardsNames)\n\
    }\n```\n\n在 `flashcards.go` 中，`ListFlashCardsNames()` 函数遍历闪卡目录，返回一个字符串数组（每个闪卡集的文件名）：\n\
    \n```\nfunc ListFlashCardsNames() []string {\nflashcardsDir, err := os.Open(\"\
    flashcardsets\")\nif err != nil {\nreturn nil\n}\nfiles, err := flashcardsDir.Readdir(-1)\n\
    fileNames := make([]string, len(files))\nfor n, f := range files {\nfileNames[n]\
    \ = f.Name()\n}\nsort.Strings(fileNames)\nreturn fileNames\n}\n```\n\n# manageFlashCards\
    \ 函数\n\n在 `server.go` 中，按下“Show Cards in Set”按钮或“List Words in Set”按钮时，会调用 `manageFlashCards`\
    \ 函数来管理表单提交。它从表单请求中提取值，然后在 `showFlashCards` 和 `listWords` 之间做出选择：\n\n```\n/*\n\
    * 在表单提交时从 listflashcards.html 调用\n*/\nfunc manageFlashCards(rw http.ResponseWriter,\
    \ req *http.Request) {\nset := req.FormValue(\"flashcardSets\")\norder := req.FormValue(\"\
    order\")\naction := req.FormValue(\"submit\")\nhalf := req.FormValue(\"half\"\
    )\n//如果未设置\n//http://localhost:8000/flashcardSets?flashcardSets=common_words&order=Random&half=Random&submit=Show+cards+in+set\n\
    if len(set) == 0 {\nset = DefaultSet\norder = DefaultAmount\naction = ActionShow\n\
    half = DefaultAmount\n}\ncardname := URLFlashCardSetsPath + \"/\" + set\nfmt.Printf(\"\
    Set %s, order %s, action %s, half %s, cardname %s\\n\", set, order, action, half,\
    \ cardname)\nswitch action {\ncase ActionShow:\nshowFlashCards(rw, cardname, order,\
    \ half)\ncase ActionList:\nlistWords(rw, cardname)\ndefault:\nfmt.Println(ActionUnknown)\n\
    }\n}\n```\n\n# 中文词典\n\n之前的代码相当通用：使用 `FileServer` 提供静态文件，基于目录中的文件列表通过模板生成 HTML\
    \ 表格，并处理 HTML 表单中的信息。要进一步探究每张卡片显示的内容，我们需要深入研究应用特定的细节，这意味着要查看单词的来源（词典）、如何表示单词和卡片，以及如何将闪卡数据发送到浏览器。首先，来看词典。\n\
    \n中文是一门复杂的语言——难道不都是吗 :-( 。书面形式是表意的，即“象形文字”，而不是使用字母表。但这种书面形式随着时间的推移而演变，甚至在最近分成了两种形式：台湾和香港使用的“繁体”中文，以及中国大陆使用的“简体”中文。虽然大多数汉字是相同的，但大约有\
    \ 1000 个汉字不同。因此，一本中文词典通常会有同一个汉字的两种书写形式。\n\n大多数像我这样的西方人看不懂这些汉字。因此有一种称为拼音的“拉丁化”形式，它使用基于拉丁字母的注音字母来书写汉字。它不完全等同于拉丁字母，因为中文是一种声调语言，拼音形式必须标出声调（类似于法语和其他欧洲语言中的重音符号）。因此，一本典型的词典需要显示四项内容：繁体字、简体字、拼音和英文。此外（就像英语一样），一个词可能有多种含义。例如，[`http://www.mandarintools.com/worddict.html`](http://www.mandarintools.com/worddict.html)\
    \ 上有一个免费的中/英词典，更好的是，你可以将其下载为 UTF-8 文件。其中，词“好”有这样的条目：\n\n| **繁体** | **简体** | **拼音**\
    \ | **英文** | **含义** |\n| --- | --- | --- | --- | --- |\n| 好 | 好 | hǎo | good |\
    \ /好/良好/适当/易于/非常/如此/(表示完成或准备好的后缀)/ |\n\n这本词典有一个小问题。大多数键盘不擅长表示变音符号，比如 ǎ 中的抑扬符。因此，虽然汉字是用\
    \ Unicode 编写的，但拼音字符却不是。尽管存在诸如 ǎ 等字母的 Unicode 字符，但许多词典（包括本词典）都使用拉丁字母 `a`，并将声调放在词尾。这里，它是第三声，所以\
    \ `hǎo` 被写为 `hao3`。这使得只有美式键盘且没有 Unicode 编辑器的人也能更容易地用拼音交流。Web 服务器使用的词典副本是 `cedict_ts.u8`。\n\
    \n这种数据格式的不匹配并不是大问题。只是在原始文本词典和浏览器显示之间的某个环节，需要进行数据转换。Go 模板允许通过定义自定义模板来完成这一点，所以我选择了这条路。其他方法包括在读取词典时进行处理，或在\
    \ JavaScript 中显示最终字符。\n\n## 词典类型\n\n在 `dictionary.go` 中，我们使用 `DictionaryEntry`\
    \ 来存储一个词的基本信息：\n\n```\ntype DictionaryEntry struct {\nTraditional  string\nSimplified\
    \   string\nPinyin       string\nTranslations []string\n}\n```\n\n前面的词“好”将由以下内容表示：\n\
    \n```\nDictionaryEntry {Traditional: 好,\nSimplified: 好,\nPinyin: `hao3`\nTranslations:\
    \ []string{`good`, `well`,`proper`,\n`good to`, `easy to`, `very`, `so`,\n`(suffix\
    \ indicating completion or readiness)`}\n}\n```\n\n词典本身只是这些条目的一个数组：\n\n```\ntype\
    \ Dictionary struct {\nEntries []*DictionaryEntry\n}\n```\n"
- fmt: "## Flashcard Sets\n\nA single flashcard is meant to represent a Chinese word\
    \ and the English translation of that word. We have already seen that a single\
    \ Chinese word can have many possible English meanings. But this dictionary also\
    \ sometimes has multiple occurrences of a Chinese word. For example, 好 occurs\
    \ at least twice, once with the meaning we have already seen, but also with another\
    \ meaning, \"to be fond of.\" It turned out to be overkill, but to allow for this,\
    \ each flashcard is given a full dictionary of words. Typically, there is only\
    \ one entry in the dictionary! The rest of a flashcard is just the simplified\
    \ and English words to act as possible keys, from `flashcards.go`:\n\n```\ntype\
    \ FlashCard struct {\n    Simplified string\n    English    string\n    Dictionary\
    \ *Dictionary\n}\n```\n\nThe *set* of flashcards is an array of these, plus the\
    \ name of the set and information that will be sent to the browser for presentation\
    \ of the set: random or fixed order, showing the top or bottom of each card first,\
    \ or random, from `flashcards.go`:\n\n```\ntype FlashCards struct {\n    Name\
    \      string\n    CardOrder string\n    ShowHalf  string\n    Cards     []*FlashCard\n\
    }\n```\n\nWe have shown one function for this type already, `ListFlashCardsNames()`.\
    \ There is one other function of interest for this type to load a JSON file for\
    \ a flashcard set. This uses the techniques mentioned in Chapter [4](#436770_2_En_4_Chapter.xhtml)*,*\
    \ in `flashcards.go`:\n\n```\nfunc LoadJSON(r io.Reader, key any) {\n    decoder\
    \ := json.NewDecoder(r)\n    err := decoder.Decode(key)\n    checkError(err)\n\
    }\n```\n\nA typical flashcard set is of common words. When the JSON file is pretty\
    \ printed (e.g., jq), part of it looks like this:\n\n```\n{\n    \"ShowHalf\"\
    :\"\",\n    \"Cards\":[\n        {\n            \"Simplified\":\"\\u4f60\\u597d\"\
    ,\n            \"Dictionary\":{\n                \"Entries\":[\n             \
    \       {\n                        \"Traditional\":\"\\u4f60\\u597d\",\n     \
    \                   \"Pinyin\":\"ni3 hao3\",\n                        \"Translations\"\
    :[\n                            \"hello\",\n                            \"hi\"\
    ,\n                            \"how are you?\"\n                        ],\n\
    \                        \"Simplified\":\"\\u4f60\\u597d\"\n                 \
    \   }\n                ]\n            },\n            \"English\":\"hello\"\n\
    \        },\n        {\n            \"Simplified\":\"\\u5582\",\n            \"\
    Dictionary\":{\n                \"Entries\":[\n                    {\n       \
    \                 \"Traditional\":\"\\u5582\",\n                        \"Pinyin\"\
    :\"wei4\",\n                        \"Translations\":[\n                     \
    \       \"hello (interj., esp. on telephone)\",\n                            \"\
    hey\",\n                            \"to feed (sb or some animal)\"\n        \
    \                ],\n                        \"Simplified\":\"\\u5582\"\n    \
    \                }\n                ]\n            },\n            \"English\"\
    :\"hello (interj., esp. on telephone)\"\n        },\n    ],\n    \"CardOrder\"\
    :\"\",\n    \"Name\":\"Common Words\"\n}\n```\n\n## Fixing Accents\n\nThere is\
    \ one last major task before we can complete the code for the server. The accents\
    \ as given in the dictionaries place the accent at the end of the Pinyin word,\
    \ as in `hao3` for hǎo. The translation to Unicode can be performed by a custom\
    \ template, as discussed in Chapter [9](#436770_2_En_9_Chapter.xhtml).\n\nThe\
    \ code for the Pinyin formatter is given here. Don't bother reading it unless\
    \ you are *really* interested in knowing the rules for Pinyin formatting. The\
    \ program is `pinyinformatter.go`:\n\n```\nch10$ cat pinyinformatter.go\npackage\
    \ main\nimport (\n    \"fmt\"\n    \"strings\"\n)\nfunc PinyinFormatter(args ...interface{})\
    \ string {\n    ok := false\n    var s string\n    if len(args) == 1 {\n     \
    \   s, ok = args[0].(string)\n    }\n    if !ok {\n        s = fmt.Sprint(args...)\n\
    \    }\n    fmt.Println(\"Formatting func \" + s)\n    // the string may consist\
    \ of several pinyin words\n    // each one needs to be changed separately and\
    \ then\n    // added back together\n    words := strings.Fields(s)\n    for n,\
    \ word := range words {\n        // convert \"u:\" to \"ü\" if present\n     \
    \   uColon := strings.Index(word, \"u:\")\n        if uColon != -1 {\n       \
    \     parts := strings.SplitN(word, \"u:\", 2)\n            word = parts[0] +\
    \ \"ü\" + parts[1]\n        }\n        println(word)\n        // get last character,\
    \ will be the tone if present\n        chars := []rune(word)\n        tone :=\
    \ chars[len(chars)-1]\n        if tone == '5' {\n            // there is no accent\
    \ for tone 5\n            words[n] = string(chars[0 : len(chars)-1])\n       \
    \     println(\"lost accent on\", words[n])\n            continue\n        }\n\
    \        if tone  '4' {\n            // not a tone value\n            continue\n\
    \        }\n        words[n] = addAccent(word, int(tone))\n    }\n    s = strings.Join(words,\
    \ ` `)\n    return s\n}\nvar (\n    // maps 'a1' to '\\u0101' etc\n    aAccent\
    \ = map[int]rune{\n        '1': '\\u0101',\n        '2': '\\u00e1',\n        '3':\
    \ '\\u01ce',\n        '4': '\\u00e0'}\n    eAccent = map[int]rune{\n        '1':\
    \ '\\u0113',\n        '2': '\\u00e9',\n        '3': '\\u011b',\n        '4': '\\\
    u00e8'}\n    iAccent = map[int]rune{\n        '1': '\\u012b',\n        '2': '\\\
    u00ed',\n        '3': '\\u01d0',\n        '4': '\\u00ec'}\n    oAccent = map[int]rune{\n\
    \        '1': '\\u014d',\n        '2': '\\u00f3',\n        '3': '\\u01d2',\n \
    \       '4': '\\u00f2'}\n    uAccent = map[int]rune{\n        '1': '\\u016b',\n\
    \        '2': '\\u00fa',\n        '3': '\\u01d4',\n        '4': '\\u00f9'}\n \
    \   üAccent = map[int]rune{\n        '1': 'ǖ',\n        '2': 'ǘ',\n        '3':\
    \ 'ǚ',\n        '4': 'ǜ'}\n)\nfunc addAccent(word string, tone int) string {\n\
    \    /*\n    * Based on \"Where do the tone marks go?\"\n    * at http://www.pinyin.info/rules/where.html\n\
    \    */\n    n := strings.Index(word, \"a\")\n    if n != -1 {\n        aAcc :=\
    \ aAccent[tone]\n        // replace 'a' with its tone version\n        word =\
    \ word[0:n] + string(aAcc) + word[(n+1):len(word)-1]\n    } else {\n        n\
    \ := strings.Index(word, \"e\")\n        if n != -1 {\n            eAcc := eAccent[tone]\n\
    \            word = word[0:n] + string(eAcc) +\n                word[(n+1):len(word)-1]\n\
    \        } else {\n            n = strings.Index(word, \"ou\")\n            if\
    \ n != -1 {\n                oAcc := oAccent[tone]\n                word = word[0:n]\
    \ + string(oAcc) + \"u\" +\n                    word[(n+2):len(word)-1]\n    \
    \        } else {\n                chars := []rune(word)\n                length\
    \ := len(chars)\n                // put tone onthe last vowel\n            L:\n\
    \                for n, _ := range chars {\n                    m := length -\
    \ n - 1\n                    switch chars[m] {\n                    case 'i':\n\
    \                        chars[m] = iAccent[tone]\n                        break\
    \ L\n                    case 'o':\n                        chars[m] = oAccent[tone]\n\
    \                        break L\n                    case 'u':\n            \
    \            chars[m] = uAccent[tone]\n                        break L\n     \
    \               case 'ü':\n                        chars[m] = üAccent[tone]\n\
    \                        break L\n                    default:\n             \
    \       }\n                }\n                word = string(chars[0 : len(chars)-1])\n\
    \            }\n        }\n    }\n    return word\n}\n```\n\n## The ListWords\
    \ Function\n\nWe can now return to the outstanding functions of the server. One\
    \ was to list the words in a flashcard set. This populates an HTML table using\
    \ a template for a flashcard set. The HTML for this uses the template package\
    \ to walk over a `FlashCards` struct and insert the fields from that struct:\n\
    \n```\nch10$ cat html/listwords.html\n\nWords for {{.Name}}\n\nWords for {{.Name}}\n\
    \n English \n Pinyin \n Traditional \n Simplified \n\n{{range .Cards}}\n\n{{.English}}\n\
    \n{{with .Dictionary}}\n{{range .Entries}}\n\n{{.Pinyin|pinyin}}\n\n{{.Traditional}}\n\
    \n{{.Simplified}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\n Return to Flash Cards list\n\
    \n```\n\nThe Go function in `server.go` to do this uses the `PinyinFormatter`\
    \ discussed in the last section:\n\n```\nfunc listWords(rw http.ResponseWriter,\
    \ cardname string) {\n    fmt.Println(\"Loading card name\", cardname)\n    cards\
    \ := new(FlashCards)\n    LoadJSON(cardname, cards)\n    fmt.Println(\"loaded\
    \ cards\", len(cards.Cards))\n    fmt.Println(\"Card name\", cards.Name)\n   \
    \ t := template.New(\"listwords.html\")\n    t = t.Funcs(template.FuncMap{\"pinyin\"\
    : PinyinFormatter})\n    t, err := t.ParseFiles(\"html/listwords.html\")\n   \
    \ if err != nil {\n        fmt.Println(\"Parse error \" + err.Error())\n     \
    \   http.Error(rw, err.Error(), http.StatusInternalServerError)\n        return\n\
    \    }\n    err = t.Execute(rw, cards)\n    if err != nil {\n        fmt.Println(\"\
    Execute error \" + err.Error())\n        http.Error(rw, err.Error(), http.StatusInternalServerError)\n\
    \        return\n    }\n}\n```\n\nThis sends the populated table to the browser,\
    \ as shown in Figure [10-4](#436770_2_En_10_Chapter.xhtml#Fig4)."
  raw: "## Flashcard Sets\n\nA single flashcard is meant to represent a Chinese word\
    \ and the English translation of that word. We have already seen that a single\
    \ Chinese word can have many possible English meanings. But this dictionary also\
    \ sometimes has multiple occurrences of a Chinese word. For example, 好 occurs\
    \ at least twice, once with the meaning we have already seen, but also with another\
    \ meaning, “to be fond of.” It turned out to be overkill, but to allow for this,\
    \ each flashcard is given a full dictionary of words. Typically, there is only\
    \ one entry in the dictionary! The rest of a flashcard is just the simplified\
    \ and English words to act as possible keys, from flashcards.go:\n\n```\ntype\
    \ FlashCard struct {\nSimplified string\nEnglish    string\nDictionary *Dictionary\n\
    }\n```\n\nThe *set* of flashcards is an array of these, plus the name of the set\
    \ and information that will be sent to the browser for presentation of the set:\
    \ random or fixed order, showing the top or bottom of each card first, or random,\
    \ from flashcards.go.\n\n```\ntype FlashCards struct {\nName      string\nCardOrder\
    \ string\nShowHalf  string\nCards     []*FlashCard\n}\n```\n\nWe have shown one\
    \ function for this type already, `ListFlashCardsNames()`. There is one other\
    \ function of interest for this type to load a JSON file for a flashcard set.\
    \ This uses the techniques mentioned in Chapter [4](#436770_2_En_4_Chapter.xhtml)*,*\
    \ in *flashcards.go*.\n\n```\nfunc LoadJSON(r io.Reader, key any) {\ndecoder :=\
    \ json.NewDecoder(r)\nerr := decoder.Decode(key)\ncheckError(err)\n}\n```\n\n\
    A typical flashcard set is of common words. When the JSON file is pretty printed\
    \ (e.g., jq), part of it looks like this:\n\n```\n{\n\"ShowHalf\":\"\",\n\"Cards\"\
    :[\n{\n\"Simplified\":\"\\u4f60\\u597d\",\n\"Dictionary\":{\n\"Entries\":[\n{\n\
    \"Traditional\":\"\\u4f60\\u597d\",\n\"Pinyin\":\"ni3 hao3\",\n\"Translations\"\
    :[\n\"hello\",\n\"hi\",\n\"how are you?\"\n],\n\"Simplified\":\"\\u4f60\\u597d\"\
    \n}\n]\n},\n\"English\":\"hello\"\n},\n{\n\"Simplified\":\"\\u5582\",\n\"Dictionary\"\
    :{\n\"Entries\":[\n{\n\"Traditional\":\"\\u5582\",\n\"Pinyin\":\"wei4\",\n\"Translations\"\
    :[\n\"hello (interj., esp. on telephone)\",\n\"hey\",\n\"to feed (sb or some animal)\"\
    \n],\n\"Simplified\":\"\\u5582\"\n}\n]\n},\n\"English\":\"hello (interj., esp.\
    \ on telephone)\"\n},\n],\n\"CardOrder\":\"\",\n\"Name\":\"Common Words\"\n}\n\
    ```\n\n## Fixing Accents\n\nThere is one last major task before we can complete\
    \ the code for the server. The accents as given in the dictionaries place the\
    \ accent at the end of the Pinyin word, as in hao3 for hǎo. The translation to\
    \ Unicode can be performed by a custom template, as discussed in Chapter [9](#436770_2_En_9_Chapter.xhtml).\n\
    \nThe code for the Pinyin formatter is given here. Don’t bother reading it unless\
    \ you are *really* interested in knowing the rules for Pinyin formatting. The\
    \ program is `pinyinformatter.go`:\n\n```\nch10$ cat pinyinformatter.go\npackage\
    \ main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc PinyinFormatter(args ...interface{})\
    \ string {\nok := false\nvar s string\nif len(args) == 1 {\ns, ok = args[0].(string)\n\
    }\nif !ok {\ns = fmt.Sprint(args...)\n}\nfmt.Println(\"Formatting func \" + s)\n\
    // the string may consist of several pinyin words\n// each one needs to be changed\
    \ separately and then\n// added back together\nwords := strings.Fields(s)\nfor\
    \ n, word := range words {\n// convert \"u:\" to \"ü\" if present\nuColon := strings.Index(word,\
    \ \"u:\")\nif uColon != -1 {\nparts := strings.SplitN(word, \"u:\", 2)\nword =\
    \ parts[0] + \"ü\" + parts[1]\n}\nprintln(word)\n// get last character, will be\
    \ the tone if present\nchars := []rune(word)\ntone := chars[len(chars)-1]\nif\
    \ tone == '5' {\n// there is no accent for tone 5\nwords[n] = string(chars[0 :\
    \ len(chars)-1])\nprintln(\"lost accent on\", words[n])\ncontinue\n}\nif tone\
    \  '4' {\n// not a tone value\ncontinue\n}\nwords[n] = addAccent(word, int(tone))\n\
    }\ns = strings.Join(words, ` `)\nreturn s\n}\nvar (\n// maps 'a1' to '\\u0101'\
    \ etc\naAccent = map[int]rune{\n'1': '\\u0101',\n'2': '\\u00e1',\n'3': '\\u01ce',\n\
    '4': '\\u00e0'}\neAccent = map[int]rune{\n'1': '\\u0113',\n'2': '\\u00e9',\n'3':\
    \ '\\u011b',\n'4': '\\u00e8'}\niAccent = map[int]rune{\n'1': '\\u012b',\n'2':\
    \ '\\u00ed',\n'3': '\\u01d0',\n'4': '\\u00ec'}\noAccent = map[int]rune{\n'1':\
    \ '\\u014d',\n'2': '\\u00f3',\n'3': '\\u01d2',\n'4': '\\u00f2'}\nuAccent = map[int]rune{\n\
    '1': '\\u016b',\n'2': '\\u00fa',\n'3': '\\u01d4',\n'4': '\\u00f9'}\nüAccent =\
    \ map[int]rune{\n'1': 'ǖ',\n'2': 'ǘ',\n'3': 'ǚ',\n'4': 'ǜ'}\n)\nfunc addAccent(word\
    \ string, tone int) string {\n/*\n* Based on \"Where do the tone marks go?\"\n\
    * at http://www.pinyin.info/rules/where.html\n*/\nn := strings.Index(word, \"\
    a\")\nif n != -1 {\naAcc := aAccent[tone]\n// replace 'a' with its tone version\n\
    word = word[0:n] + string(aAcc) + word[(n+1):len(word)-1]\n} else {\nn := strings.Index(word,\
    \ \"e\")\nif n != -1 {\neAcc := eAccent[tone]\nword = word[0:n] + string(eAcc)\
    \ +\nword[(n+1):len(word)-1]\n} else {\nn = strings.Index(word, \"ou\")\nif n\
    \ != -1 {\noAcc := oAccent[tone]\nword = word[0:n] + string(oAcc) + \"u\" +\n\
    word[(n+2):len(word)-1]\n} else {\nchars := []rune(word)\nlength := len(chars)\n\
    // put tone onthe last vowel\nL:\nfor n, _ := range chars {\nm := length - n -\
    \ 1\nswitch chars[m] {\ncase 'i':\nchars[m] = iAccent[tone]\nbreak L\ncase 'o':\n\
    chars[m] = oAccent[tone]\nbreak L\ncase 'u':\nchars[m] = uAccent[tone]\nbreak\
    \ L\ncase 'ü':\nchars[m] = üAccent[tone]\nbreak L\ndefault:\n}\n}\nword = string(chars[0\
    \ : len(chars)-1])\n}\n}\n}\nreturn word\n}\n```\n\n## The ListWords Function\n\
    \nWe can now return to the outstanding functions of the server. One was to list\
    \ the words in a flashcard set. This populates an HTML table using a template\
    \ for a flashcard set. The HTML for this uses the template package to walk over\
    \ a `FlashCards` struct and insert the fields from that struct:\n\n```\nch10$\
    \ cat html/listwords.html\n\nWords for {{.Name}}\n\nWords for {{.Name}}\n\n English\
    \ \n Pinyin \n Traditional \n Simplified \n\n{{range .Cards}}\n\n{{.English}}\n\
    \n{{with .Dictionary}}\n{{range .Entries}}\n\n{{.Pinyin|pinyin}}\n\n{{.Traditional}}\n\
    \n{{.Simplified}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\n Return to Flash Cards list\n\
    \n```\n\nThe Go function in `server.go` to do this uses the `PinyinFormatter`\
    \ discussed in the last section:\n\n```\nfunc listWords(rw http.ResponseWriter,\
    \ cardname string) {\nfmt.Println(\"Loading card name\", cardname)\ncards := new(FlashCards)\n\
    LoadJSON(cardname, cards)\nfmt.Println(\"loaded cards\", len(cards.Cards))\nfmt.Println(\"\
    Card name\", cards.Name)\nt := template.New(\"listwords.html\")\nt = t.Funcs(template.FuncMap{\"\
    pinyin\": PinyinFormatter})\nt, err := t.ParseFiles(\"html/listwords.html\")\n\
    if err != nil {\nfmt.Println(\"Parse error \" + err.Error())\nhttp.Error(rw, err.Error(),\
    \ http.StatusInternalServerError)\nreturn\n}\nerr = t.Execute(rw, cards)\nif err\
    \ != nil {\nfmt.Println(\"Execute error \" + err.Error())\nhttp.Error(rw, err.Error(),\
    \ http.StatusInternalServerError)\nreturn\n}\n}\n```\n\nThis sends the populated\
    \ table to the browser, as shown in Figure [10-4](#436770_2_En_10_Chapter.xhtml#Fig4)."
  trans: "\n## 闪卡组\n\n一张闪卡用于表示一个中文词语及其英文翻译。我们已经看到，一个中文词语可能有多种英文含义。但这部词典有时也会多次出现同一个中文词语。例如，“好”至少出现两次，一次是我们已经见过的含义，另一次则是“喜爱”的意思。虽然这显得有些多余，但为了应对这种情况，每张闪卡都附带了一整本词典。通常情况下，词典中只有一个词条！闪卡的其余部分只是简体字和英文单词，作为可能的检索键，代码来自\
    \ `flashcards.go`：\n\n```\ntype FlashCard struct {\n    Simplified string\n  \
    \  English    string\n    Dictionary *Dictionary\n}\n```\n\n闪卡组（*set*）是这些闪卡的数组，外加组名以及将发送到浏览器用于展示的信息：随机或固定顺序，先显示每张卡的正面或背面，或者随机顺序，代码来自\
    \ `flashcards.go`：\n\n```\ntype FlashCards struct {\n    Name      string\n  \
    \  CardOrder string\n    ShowHalf  string\n    Cards     []*FlashCard\n}\n```\n\
    \n我们已经展示过该类型的一个函数——`ListFlashCardsNames()`。该类型还有一个加载闪卡组 JSON 文件的函数。它使用了第 4*章中提到的技术，代码在\
    \ `flashcards.go` 中：\n\n```\nfunc LoadJSON(r io.Reader, key any) {\n    decoder\
    \ := json.NewDecoder(r)\n    err := decoder.Decode(key)\n    checkError(err)\n\
    }\n```\n\n一个典型的闪卡组包含常用词语。当 JSON 文件被美化打印（例如使用 jq）时，部分内容如下所示：\n\n```\n{\n    \"\
    ShowHalf\":\"\",\n    \"Cards\":[\n        {\n            \"Simplified\":\"\\\
    u4f60\\u597d\",\n            \"Dictionary\":{\n                \"Entries\":[\n\
    \                    {\n                        \"Traditional\":\"\\u4f60\\u597d\"\
    ,\n                        \"Pinyin\":\"ni3 hao3\",\n                        \"\
    Translations\":[\n                            \"hello\",\n                   \
    \         \"hi\",\n                            \"how are you?\"\n            \
    \            ],\n                        \"Simplified\":\"\\u4f60\\u597d\"\n \
    \                   }\n                ]\n            },\n            \"English\"\
    :\"hello\"\n        },\n        {\n            \"Simplified\":\"\\u5582\",\n \
    \           \"Dictionary\":{\n                \"Entries\":[\n                \
    \    {\n                        \"Traditional\":\"\\u5582\",\n               \
    \         \"Pinyin\":\"wei4\",\n                        \"Translations\":[\n \
    \                           \"hello (interj., esp. on telephone)\",\n        \
    \                    \"hey\",\n                            \"to feed (sb or some\
    \ animal)\"\n                        ],\n                        \"Simplified\"\
    :\"\\u5582\"\n                    }\n                ]\n            },\n     \
    \       \"English\":\"hello (interj., esp. on telephone)\"\n        },\n    ],\n\
    \    \"CardOrder\":\"\",\n    \"Name\":\"Common Words\"\n}\n```\n\n## 修复音调\n\n\
    在完成服务器代码之前，还有最后一项主要任务。词典中给出的音调标记位于拼音单词的末尾，例如 `hao3` 对应 hǎo。可以使用自定义模板将其转换为 Unicode，如第\
    \ 9 章所述。\n\n以下是拼音格式化器的代码。除非你*真的*对了解拼音格式化规则感兴趣，否则不必费心阅读。程序是 `pinyinformatter.go`：\n\
    \n```\nch10$ cat pinyinformatter.go\npackage main\nimport (\n    \"fmt\"\n   \
    \ \"strings\"\n)\nfunc PinyinFormatter(args ...interface{}) string {\n    ok :=\
    \ false\n    var s string\n    if len(args) == 1 {\n        s, ok = args[0].(string)\n\
    \    }\n    if !ok {\n        s = fmt.Sprint(args...)\n    }\n    fmt.Println(\"\
    Formatting func \" + s)\n    // the string may consist of several pinyin words\n\
    \    // each one needs to be changed separately and then\n    // added back together\n\
    \    words := strings.Fields(s)\n    for n, word := range words {\n        //\
    \ convert \"u:\" to \"ü\" if present\n        uColon := strings.Index(word, \"\
    u:\")\n        if uColon != -1 {\n            parts := strings.SplitN(word, \"\
    u:\", 2)\n            word = parts[0] + \"ü\" + parts[1]\n        }\n        println(word)\n\
    \        // get last character, will be the tone if present\n        chars :=\
    \ []rune(word)\n        tone := chars[len(chars)-1]\n        if tone == '5' {\n\
    \            // there is no accent for tone 5\n            words[n] = string(chars[0\
    \ : len(chars)-1])\n            println(\"lost accent on\", words[n])\n      \
    \      continue\n        }\n        if tone  '4' {\n            // not a tone\
    \ value\n            continue\n        }\n        words[n] = addAccent(word, int(tone))\n\
    \    }\n    s = strings.Join(words, ` `)\n    return s\n}\nvar (\n    // maps\
    \ 'a1' to '\\u0101' etc\n    aAccent = map[int]rune{\n        '1': '\\u0101',\n\
    \        '2': '\\u00e1',\n        '3': '\\u01ce',\n        '4': '\\u00e0'}\n \
    \   eAccent = map[int]rune{\n        '1': '\\u0113',\n        '2': '\\u00e9',\n\
    \        '3': '\\u011b',\n        '4': '\\u00e8'}\n    iAccent = map[int]rune{\n\
    \        '1': '\\u012b',\n        '2': '\\u00ed',\n        '3': '\\u01d0',\n \
    \       '4': '\\u00ec'}\n    oAccent = map[int]rune{\n        '1': '\\u014d',\n\
    \        '2': '\\u00f3',\n        '3': '\\u01d2',\n        '4': '\\u00f2'}\n \
    \   uAccent = map[int]rune{\n        '1': '\\u016b',\n        '2': '\\u00fa',\n\
    \        '3': '\\u01d4',\n        '4': '\\u00f9'}\n    üAccent = map[int]rune{\n\
    \        '1': 'ǖ',\n        '2': 'ǘ',\n        '3': 'ǚ',\n        '4': 'ǜ'}\n\
    )\nfunc addAccent(word string, tone int) string {\n    /*\n    * Based on \"Where\
    \ do the tone marks go?\"\n    * at http://www.pinyin.info/rules/where.html\n\
    \    */\n    n := strings.Index(word, \"a\")\n    if n != -1 {\n        aAcc :=\
    \ aAccent[tone]\n        // replace 'a' with its tone version\n        word =\
    \ word[0:n] + string(aAcc) + word[(n+1):len(word)-1]\n    } else {\n        n\
    \ := strings.Index(word, \"e\")\n        if n != -1 {\n            eAcc := eAccent[tone]\n\
    \            word = word[0:n] + string(eAcc) +\n                word[(n+1):len(word)-1]\n\
    \        } else {\n            n = strings.Index(word, \"ou\")\n            if\
    \ n != -1 {\n                oAcc := oAccent[tone]\n                word = word[0:n]\
    \ + string(oAcc) + \"u\" +\n                    word[(n+2):len(word)-1]\n    \
    \        } else {\n                chars := []rune(word)\n                length\
    \ := len(chars)\n                // put tone onthe last vowel\n            L:\n\
    \                for n, _ := range chars {\n                    m := length -\
    \ n - 1\n                    switch chars[m] {\n                    case 'i':\n\
    \                        chars[m] = iAccent[tone]\n                        break\
    \ L\n                    case 'o':\n                        chars[m] = oAccent[tone]\n\
    \                        break L\n                    case 'u':\n            \
    \            chars[m] = uAccent[tone]\n                        break L\n     \
    \               case 'ü':\n                        chars[m] = üAccent[tone]\n\
    \                        break L\n                    default:\n             \
    \       }\n                }\n                word = string(chars[0 : len(chars)-1])\n\
    \            }\n        }\n    }\n    return word\n}\n```\n\n## ListWords 函数\n\
    \n现在我们可以返回到服务器中剩余的函数了。一个是列出闪卡组中的单词。它使用闪卡组的模板填充一个 HTML 表格。该 HTML 使用模板包遍历 `FlashCards`\
    \ 结构体并插入其中的字段：\n\n```\nch10$ cat html/listwords.html\n\nWords for {{.Name}}\n\n\
    Words for {{.Name}}\n\n English \n Pinyin \n Traditional \n Simplified \n\n{{range\
    \ .Cards}}\n\n{{.English}}\n\n{{with .Dictionary}}\n{{range .Entries}}\n\n{{.Pinyin|pinyin}}\n\
    \n{{.Traditional}}\n\n{{.Simplified}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\n Return\
    \ to Flash Cards list\n\n```\n\n`server.go` 中实现此功能的 Go 函数使用了上一节讨论的 `PinyinFormatter`：\n\
    \n```\nfunc listWords(rw http.ResponseWriter, cardname string) {\n    fmt.Println(\"\
    Loading card name\", cardname)\n    cards := new(FlashCards)\n    LoadJSON(cardname,\
    \ cards)\n    fmt.Println(\"loaded cards\", len(cards.Cards))\n    fmt.Println(\"\
    Card name\", cards.Name)\n    t := template.New(\"listwords.html\")\n    t = t.Funcs(template.FuncMap{\"\
    pinyin\": PinyinFormatter})\n    t, err := t.ParseFiles(\"html/listwords.html\"\
    )\n    if err != nil {\n        fmt.Println(\"Parse error \" + err.Error())\n\
    \        http.Error(rw, err.Error(), http.StatusInternalServerError)\n       \
    \ return\n    }\n    err = t.Execute(rw, cards)\n    if err != nil {\n       \
    \ fmt.Println(\"Execute error \" + err.Error())\n        http.Error(rw, err.Error(),\
    \ http.StatusInternalServerError)\n        return\n    }\n}\n```\n\n这将填充好的表格发送到浏览器，如图\
    \ 10-4 所示。\n"
- fmt: "# The `showFlashCards` Function\n\nThe final function to complete the server\
    \ is `showFlashCards`. This changes the default values of `CardOrder` and `ShowHalf`\
    \ in the flashcard set based on the form submitted from the browser. It then applies\
    \ the `PinyinFormatter` and sends the resulting document to the browser. I captured\
    \ the output of a command-line session using the UNIX command `script` and then\
    \ ran the command:\n\n```\nGET /flashcardSets?flashcardSets=Common+Words&order=Random&half=Chinese&submit=Show+cards+in+set\
    \ HTTP/1.0\n```\n\nPart of the result is as follows:\n\n```\nch10$ cat ./html/showflashcards.html\n\
    \nFlashcards for {{.Name}}\n\ncardOrder = {{- .CardOrder }};\nshowHalfCard = {{-\
    \ .ShowHalf }};\n\n -->\n\nFlashcards for {{.Name}}\n\n{{range .Cards}}\n\nEnglish:\
    \ {{.English}}\n\n{{with .Dictionary}}\n{{range .Entries}}\n\nPinyin: {{.Pinyin|pinyin}}\n\
    \nTraditional: {{.Traditional}}\n\nSimplified: {{.Simplified}}\n\nTranslations:\n\
    {{range .Translations}}\n{{.}} \n{{end}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\nPress\
    \ &lt;Space&gt; or Tap to continue\n\n Return to Flash Cards list\n\n```\n\nThe\
    \ actual function is shown in the following. We see the card set, presentation\
    \ order, and rendering, very similar to prior functions.\n\n```\nfunc showFlashCards(rw\
    \ http.ResponseWriter, cardname, order, half string) {\ncards := new(FlashCards)\n\
    content, err := os.Open(cardname)\ncheckError(err)\nLoadJSON(content, &cards)\n\
    switch order {\ncase CardOrderSequential:\ncards.CardOrder = \"SEQUENTIAL\"\n\
    default:\ncards.CardOrder = \"RANDOM\"\n}\nif v, ok := showHalf[half]; ok {\n\
    cards.ShowHalf = v\n} else {\ncards.ShowHalf = showHalf[\"Chinese\"]\n}\nfmt.Printf(\"\
    Loading card %s, half %s, loaded # of %d, card name %s\\n\", cardname, half, len(cards.Cards),\
    \ cards.Name)\nt, err := template.New(ShowFlashCardPage).Funcs(template.FuncMap{\"\
    pinyin\": PinyinFormatter}).ParseFiles(\"html/\" + ShowFlashCardPage)\nif err\
    \ != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\nerr = t.Execute(rw, cards)\n\
    if err != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\n}\n```\n\nAside rendering,\
    \ we have basic error handling: `checkError` for exceptional errors (enough to\
    \ shut down) and `httpErrorHandler` used when we wish to indicate an HTTP 500\
    \ status.\n\n## Presentation on the Browser\n\nThe final part of this system is\
    \ how this HTML is shown in the browser. Figure [10-3](#436770_2_En_10_Chapter.xhtml#Fig3)\
    \ shows a screen of four parts displaying the English, the simplified Chinese,\
    \ the alternative translations, and the traditional/simplified pair. How this\
    \ is done is by the JavaScript program downloaded to the server (this takes place\
    \ using the `FileServer` Go object). The JavaScript `slideviewer.js` file is actually\
    \ pretty long and is omitted from the text. It is included in the program files\
    \ at [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).\n\
    \n## Running the Server\n\nThe server can then be run on port `8000` (or other\
    \ port) using a command such as this:\n\n```\nch10$ go run *.go :8000\n```\n\n\
    or\n\n```\nch10$ go run server.go pinyinformatter.go flashCards.go dictionary.go\
    \ :8000\n```\n\n## Conclusion\n\nThis chapter has considered a relatively simple\
    \ but complete web server using static and dynamic web pages with form handling\
    \ and using templates for simplifying coding.\n\n# 11. HTML\n\nThe Web was originally\
    \ created to serve HTML documents. Now it is used to serve all sorts of documents\
    \ as well as data of different kinds. Nevertheless, HTML is still the main document\
    \ type delivered over the Web.\n\nHTML has been through a large number of versions,\
    \ with the current version being HTML5. There have also been many \"vendor\" versions\
    \ of HTML, introducing tags that never made it into the standards.\n\nHTML is\
    \ simple enough to be edited by hand. Consequently, many HTML documents are \"\
    ill formed,\" which means they don't follow the syntax of the language. HTML parsers\
    \ generally are not very strict and will accept many \"illegal\" documents.\n\n\
    The HTML package itself only has two functions: `EscapeString` and `UnescapeString`.\
    \ These properly handle characters such as `<`, converting them to `&lt;` and\
    \ back again.\n\nA principal use of this might be to escape the markup in an HTML\
    \ document so that if it is displayed in a browser, it will show all the markup\
    \ (much like `Ctrl+U` in Chrome on Linux or `Option+Cmd+U` on Mac Chrome).\n\n\
    I'm more likely to use this to show the text of a program as a web page. Most\
    \ programming languages have the `<` symbol, and many have `&`. These mess up\
    \ an HTML viewer unless escaped properly. I like to show program text directly\
    \ out of the file system rather than copying and pasting it into a document, to\
    \ avoid getting out of sync.\n\nThe following program `escapestring.go` is a web\
    \ server that shows its URL in preformatted code, having escaped the troublesome\
    \ characters:\n\n```\n$ mkdir ch11\n$ cd ch11\nch11$ vi escapestring.go\n/*\n\
    * This program serves a file in preformatted, code layout\n* Useful for showing\
    \ program text, properly escaping special\n* characters like '' and '&'\n*/\n\
    package main\nimport (\n\"fmt\"\n\"html\"\n\"log\"\n\"net/http\"\n\"os\"\n)\n\
    func main() {\nhttp.HandleFunc(\"/\", escapeString)\nerr := http.ListenAndServe(\"\
    :8080\", nil)\ncheckError(err)\n}\nfunc escapeString(rw http.ResponseWriter, req\
    \ *http.Request) {\nfmt.Println(req.URL.Path)\nbytes, err := os.ReadFile(\".\"\
    \ + req.URL.Path)\nif err != nil {\nrw.WriteHeader(http.StatusNotFound)\nreturn\n\
    }\nescapedStr := html.EscapeString(string(bytes))\nhtmlText := \"\" +\nescapedStr\
    \ +\n\" \"\nrw.Write([]byte(htmlText))\n}\nfunc checkError(err error) {\nif err\
    \ != nil {\nlog.Fatalln(\"Error \", err.Error())\n}\n}\n```\n\nWhen it runs, serving\
    \ files from the directory including the `escapestring.go` program, a browser\
    \ will display it correctly using the URL `localhost:8080/escapestring.go`.\n\n\
    Run the server with this command:\n\n```\nch11$ go run escapestring.go\n```\n\n\
    Run a client with this command, as an example (or in a browser):\n\n```\nch11$\
    \ curl localhost:8080/escapestring.go\n/*\n* This program serves a file in preformatted,\
    \ code layout\n...\n}\n\n```\n\nIn both cases, the result is our original code\
    \ (wrapped in a pre/code block)! If you typo the name, you will receive an HTTP\
    \ 404."
  raw: "## The showFlashCards Function\n\nThe final function to complete the server\
    \ is `showFlashCards`. This changes the default values of `CardOrder` and `ShowHalf`\
    \ in the flashcard set based on the form submitted from the browser. It then applies\
    \ the `PinyinFormatter` and sends the resulting document to the browser. I captured\
    \ the output of a command-line session using the UNIX command `script` and then\
    \ ran the command:\n\n```\nGET /flashcardSets?flashcardSets=Common+Words&order=Random&half=Chinese&submit=Show+cards+in+set\
    \ HTTP/1.0\n```\n\nPart of the result is as follows:\n\n```\nch10$ cat ./html/showflashcards.html\n\
    \nFlashcards for {{.Name}}\n\ncardOrder = {{- .CardOrder }};\nshowHalfCard = {{-\
    \ .ShowHalf }};\n\n -->\n\nFlashcards for {{.Name}}\n\n{{range .Cards}}\n\nEnglish:\
    \ {{.English}}\n\n{{with .Dictionary}}\n{{range .Entries}}\n\nPinyin: {{.Pinyin|pinyin}}\n\
    \nTraditional: {{.Traditional}}\n\nSimplified: {{.Simplified}}\n\nTranslations:\n\
    {{range .Translations}}\n{{.}} \n{{end}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\nPress\
    \ &lt;Space&gt; or Tap to continue\n\n Return to Flash Cards list\n\n```\n\nThe\
    \ actual function is shown in the following. We see the card set, presentation\
    \ order, and rendering, very similar to prior functions.\n\n```\nfunc showFlashCards(rw\
    \ http.ResponseWriter, cardname, order, half string) {\ncards := new(FlashCards)\n\
    content, err := os.Open(cardname)\ncheckError(err)\nLoadJSON(content, &cards)\n\
    switch order {\ncase CardOrderSequential:\ncards.CardOrder = \"SEQUENTIAL\"\n\
    default:\ncards.CardOrder = \"RANDOM\"\n}\nif v, ok := showHalf[half]; ok {\n\
    cards.ShowHalf = v\n} else {\ncards.ShowHalf = showHalf[\"Chinese\"]\n}\nfmt.Printf(\"\
    Loading card %s, half %s, loaded # of %d, card name %s\\n\", cardname, half, len(cards.Cards),\
    \ cards.Name)\nt, err := template.New(ShowFlashCardPage).Funcs(template.FuncMap{\"\
    pinyin\": PinyinFormatter}).ParseFiles(\"html/\" + ShowFlashCardPage)\nif err\
    \ != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\nerr = t.Execute(rw, cards)\n\
    if err != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\n}\n```\n\nAside rendering,\
    \ we have basic error handling: “checkError” for exceptional errors (enough to\
    \ shut down) and httpErrorHandler used when we wish to indicate an HTTP 500 status.\n\
    \n## Presentation on the Browser\n\nThe final part of this system is how this\
    \ HTML is shown in the browser. Figure [10-3](#436770_2_En_10_Chapter.xhtml#Fig3)\
    \ shows a screen of four parts displaying the English, the simplified Chinese,\
    \ the alternative translations, and the traditional/simplified pair. How this\
    \ is done is by the JavaScript program downloaded to the server (this takes place\
    \ using the `FileServer` Go object). The JavaScript `slideviewer.js` file is actually\
    \ pretty long and is omitted from the text. It is included in the program files\
    \ at [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).\n\
    \n## Running the Server\n\nThe server can then be run on port `8000` (or other\
    \ port) using a command such as this:\n\n```\nch10$ go run *.go :8000\n```\n\n\
    or\n\n```\nch10$ go run server.go pinyinformatter.go flashCards.go dictionary.go\
    \ :8000\n```\n\n## Conclusion\n\nThis chapter has considered a relatively simple\
    \ but complete web server using static and dynamic web pages with form handling\
    \ and using templates for simplifying coding.\n\n# 11. HTML\n\nThe Web was originally\
    \ created to serve HTML documents. Now it is used to serve all sorts of documents\
    \ as well as data of different kinds. Nevertheless, HTML is still the main document\
    \ type delivered over the Web.\n\nHTML has been through a large number of versions,\
    \ with the current version being HTML5\\. There have also been many “vendor” versions\
    \ of HTML, introducing tags that never made it into the standards.\n\nHTML is\
    \ simple enough to be edited by hand. Consequently, many HTML documents are “ill\
    \ formed,” which means they don’t follow the syntax of the language. HTML parsers\
    \ generally are not very strict and will accept many “illegal” documents.\n\n\
    The HTML package itself only has two functions: `EscapeString` and `UnescapeString`.\
    \ These properly handle characters such as `<`, converting them to `<` and back\
    \ again.\n\nA principal use of this might be to escape the markup in an HTML document\
    \ so that if it is displayed in a browser, it will show all the markup (much like\
    \ Ctrl+U in Chrome on Linux or Option+Cmd+U on Mac Chrome).\n\nI’m more likely\
    \ to use this to show the text of a program as a web page. Most programming languages\
    \ have the `<` symbol, and many have `&`. These mess up an HTML viewer unless\
    \ escaped properly. I like to show program text directly out of the file system\
    \ rather than copying and pasting it into a document, to avoid getting out of\
    \ sync.\n\nThe following program `escapestring.go` is a web server that shows\
    \ its URL in preformatted code, having escaped the troublesome characters:\n\n\
    ```\n$ mkdir ch11\n$ cd ch11\nch11$ vi escapestring.go\n/*\n* This program serves\
    \ a file in preformatted, code layout\n* Useful for showing program text, properly\
    \ escaping special\n* characters like '' and '&'\n*/\npackage main\nimport (\n\
    \"fmt\"\n\"html\"\n\"log\"\n\"net/http\"\n\"os\"\n)\nfunc main() {\nhttp.HandleFunc(\"\
    /\", escapeString)\nerr := http.ListenAndServe(\":8080\", nil)\ncheckError(err)\n\
    }\nfunc escapeString(rw http.ResponseWriter, req *http.Request) {\nfmt.Println(req.URL.Path)\n\
    bytes, err := os.ReadFile(\".\" + req.URL.Path)\nif err != nil {\nrw.WriteHeader(http.StatusNotFound)\n\
    return\n}\nescapedStr := html.EscapeString(string(bytes))\nhtmlText := \"\" +\n\
    escapedStr +\n\" \"\nrw.Write([]byte(htmlText))\n}\nfunc checkError(err error)\
    \ {\nif err != nil {\nlog.Fatalln(\"Error \", err.Error())\n}\n}\n```\n\nWhen\
    \ it runs, serving files from the directory including the `escapestring.go` program,\
    \ a browser will display it correctly using the URL `localhost:8080/escapestring.go`.\n\
    \nRun the server with this command:\n\n```\nch11$ go run escapestring.go\n```\n\
    \nRun a client with this command, as an example (or in a browser):\n\n```\nch11$\
    \ curl localhost:8080/escapestring.go\n/*\n* This program serves a file in preformatted,\
    \ code layout\n...\n}\n\n```\n\nIn both cases, the result is our original code\
    \ (wrapped in a pre/code block)! If you typo the name, you will receive an HTTP\
    \ 404."
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您提供的格式和要求，将给定的英文文本翻译成中文。\n\n\n# `showFlashCards`\
    \ 函数\n\n完成服务器的最后一个函数是 `showFlashCards`。此函数根据浏览器提交的表单，更改卡片组中 `CardOrder` 和 `ShowHalf`\
    \ 的默认值。然后，它应用 `PinyinFormatter` 并将生成的文档发送到浏览器。我捕获了使用 UNIX 命令 `script` 进行的命令行会话的输出，然后运行了以下命令：\n\
    \n```\nGET /flashcardSets?flashcardSets=Common+Words&order=Random&half=Chinese&submit=Show+cards+in+set\
    \ HTTP/1.0\n```\n\n结果的一部分如下所示：\n\n```\nch10$ cat ./html/showflashcards.html\n\n\
    Flashcards for {{.Name}}\n\ncardOrder = {{- .CardOrder }};\nshowHalfCard = {{-\
    \ .ShowHalf }};\n\n -->\n\nFlashcards for {{.Name}}\n\n{{range .Cards}}\n\nEnglish:\
    \ {{.English}}\n\n{{with .Dictionary}}\n{{range .Entries}}\n\nPinyin: {{.Pinyin|pinyin}}\n\
    \nTraditional: {{.Traditional}}\n\nSimplified: {{.Simplified}}\n\nTranslations:\n\
    {{range .Translations}}\n{{.}} \n{{end}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\nPress\
    \ &lt;Space&gt; or Tap to continue\n\n Return to Flash Cards list\n\n```\n\n实际的函数如下所示。我们可以看到卡片组、展示顺序和渲染，这与之前的函数非常相似。\n\
    \n```\nfunc showFlashCards(rw http.ResponseWriter, cardname, order, half string)\
    \ {\ncards := new(FlashCards)\ncontent, err := os.Open(cardname)\ncheckError(err)\n\
    LoadJSON(content, &cards)\nswitch order {\ncase CardOrderSequential:\ncards.CardOrder\
    \ = \"SEQUENTIAL\"\ndefault:\ncards.CardOrder = \"RANDOM\"\n}\nif v, ok := showHalf[half];\
    \ ok {\ncards.ShowHalf = v\n} else {\ncards.ShowHalf = showHalf[\"Chinese\"]\n\
    }\nfmt.Printf(\"Loading card %s, half %s, loaded # of %d, card name %s\\n\", cardname,\
    \ half, len(cards.Cards), cards.Name)\nt, err := template.New(ShowFlashCardPage).Funcs(template.FuncMap{\"\
    pinyin\": PinyinFormatter}).ParseFiles(\"html/\" + ShowFlashCardPage)\nif err\
    \ != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\nerr = t.Execute(rw, cards)\n\
    if err != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\n}\n```\n\n除了渲染之外，我们还有基本的错误处理：`checkError`\
    \ 用于处理严重错误（足以导致关闭），而 `httpErrorHandler` 则在我们希望指示 HTTP 500 状态时使用。\n\n## 浏览器中的呈现\n\
    \n本系统的最后一部分是此 HTML 在浏览器中的显示方式。图 10-3 展示了一个由四部分组成的屏幕，分别显示英语、简体中文、备用翻译以及繁简对照。这是通过下载到服务器的\
    \ JavaScript 程序（使用 `FileServer` Go 对象完成）实现的。`slideviewer.js` JavaScript 文件实际上相当长，因此在文中省略。它包含在位于\
    \ [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)\
    \ 的程序文件中。\n\n## 运行服务器\n\n然后，可以使用如下命令在端口 `8000`（或其他端口）上运行服务器：\n\n```\nch10$ go\
    \ run *.go :8000\n```\n\n或\n\n```\nch10$ go run server.go pinyinformatter.go flashCards.go\
    \ dictionary.go :8000\n```\n\n## 总结\n\n本章介绍了一个相对简单但完整的 Web 服务器，它使用了静态和动态网页，并包含表单处理，同时利用模板来简化编码。\n\
    \n# 11. HTML\n\n万维网最初是为了提供 HTML 文档而创建的。现在，它被用来提供各种文档以及不同类型的数据。尽管如此，HTML 仍然是网络上传输的主要文档类型。\n\
    \nHTML 经历了大量版本迭代，当前版本是 HTML5。还有许多“供应商”版本的 HTML，它们引入了一些从未成为标准的标签。\n\nHTML 足够简单，可以手动编辑。因此，许多\
    \ HTML 文档是“格式错误的”，这意味着它们不符合该语言的语法。HTML 解析器通常不是很严格，会接受许多“非法的”文档。\n\n`html` 包本身只有两个函数：`EscapeString`\
    \ 和 `UnescapeString`。它们能正确处理诸如 `<` 之类的字符，将其转换为 `&lt;` 再转换回来。\n\n此函数的一个主要用途可能是对\
    \ HTML 文档中的标记进行转义，这样当它在浏览器中显示时，会展示所有标记（很像 Linux 版 Chrome 中的 `Ctrl+U` 或 Mac 版 Chrome\
    \ 中的 `Option+Cmd+U`）。\n\n我更倾向于使用它来将程序的文本显示为网页。大多数编程语言都有 `<` 符号，许多语言还有 `&`。如果不进行适当的转义，这些字符会扰乱\
    \ HTML 查看器。我喜欢直接从文件系统中显示程序文本，而不是复制粘贴到文档中，以避免不同步。\n\n下面的 `escapestring.go` 程序是一个\
    \ Web 服务器，它以预格式化代码的形式显示其 URL，并对棘手的字符进行了转义：\n\n```\n$ mkdir ch11\n$ cd ch11\nch11$\
    \ vi escapestring.go\n/*\n* This program serves a file in preformatted, code layout\n\
    * Useful for showing program text, properly escaping special\n* characters like\
    \ '' and '&'\n*/\npackage main\nimport (\n\"fmt\"\n\"html\"\n\"log\"\n\"net/http\"\
    \n\"os\"\n)\nfunc main() {\nhttp.HandleFunc(\"/\", escapeString)\nerr := http.ListenAndServe(\"\
    :8080\", nil)\ncheckError(err)\n}\nfunc escapeString(rw http.ResponseWriter, req\
    \ *http.Request) {\nfmt.Println(req.URL.Path)\nbytes, err := os.ReadFile(\".\"\
    \ + req.URL.Path)\nif err != nil {\nrw.WriteHeader(http.StatusNotFound)\nreturn\n\
    }\nescapedStr := html.EscapeString(string(bytes))\nhtmlText := \"\" +\nescapedStr\
    \ +\n\" \"\nrw.Write([]byte(htmlText))\n}\nfunc checkError(err error) {\nif err\
    \ != nil {\nlog.Fatalln(\"Error \", err.Error())\n}\n}\n```\n\n当它运行时，从包含 `escapestring.go`\
    \ 程序的目录提供文件服务，浏览器将使用 URL `localhost:8080/escapestring.go` 正确显示该文件。\n\n使用以下命令运行服务器：\n\
    \n```\nch11$ go run escapestring.go\n```\n\n例如，使用以下命令（或在浏览器中）运行客户端：\n\n```\nch11$\
    \ curl localhost:8080/escapestring.go\n/*\n* This program serves a file in preformatted,\
    \ code layout\n...\n}\n\n```\n\n在这两种情况下，结果都是我们原始的代码（包裹在一个 pre/code 块中）！如果您输错了名称，将会收到\
    \ HTTP 404 错误。\n"
- fmt: "### The `html/template` Package\n\nThere are many attacks that can be made\
    \ on web servers, the most notable being SQL injection, where a user-agent enters\
    \ data into a web form deliberately designed to be passed into a database and\
    \ wreaks havoc there. Go does not have any particular support to avoid this, since\
    \ there are many variances among databases as to the SQL injection techniques\
    \ that can succeed. The SQL Injection Prevention Cheat Sheet (see [`https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html`](https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html))\
    \ summarizes the defenses against such attacks. The principal one is to avoid\
    \ such attacks by using SQL *prepared statements,* which can be done using the\
    \ `Prepare` function in the `database/sql` package.\n\nMore subtle attacks are\
    \ based on XSS – cross-site scripting. This is where an attacker is not trying\
    \ to attack the website itself but stores malicious code on the server to attack\
    \ any of the clients of that website.\n\nThese attacks are based on inserting\
    \ data into the database strings that, when delivered to a browser, for example,\
    \ will attack the browser and, through it, attack the client of the website. (There\
    \ are several variants of this, discussed at “OWASP: Types of XSS” – [`https://owasp.org/www-community/Types_of_Cross-Site_Scripting`](https://owasp.org/www-community/Types_of_Cross-Site_Scripting).)\n\
    \nFor example, JavaScript may be inserted where a blog comment was requested to\
    \ redirect a browser to an attacker’s site:\n\n```\nwindow.location='http://attacker/'\n\
    ```\n\nThe Go `html/template` package is designed on top of the `text/template`\
    \ package. The assumption is made that whereas the template will be trusted, the\
    \ data that it deals with may not. What `html/template` adds is suitable escaping\
    \ of the data to try to eliminate the possibility of XSS. It is based on the document\
    \ called “Using Type Inference to Make Web Templates Robust Against XSS” by Mike\
    \ Samuel and Prateek Saxena. Read that paper at [`https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition`](https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition)\
    \ for the theory behind the package and the package documentation itself.\n\n\
    In short, prepare templates as per the `text/template` package and use the `html/template`\
    \ package if the resultant text is delivered to an HTML agent.\n\n### Tokenizing\
    \ HTML\n\nThe package `golang.org/x/net/html` in the Go subrepositories contains\
    \ a tokenizer for HTML. This allows you to build a parse tree of HTML tokens.\
    \ It is compliant with HTML5.\n\nHere is an example program using this package\
    \ in `readhtml.go`.\n\n```\nch11$ vi readhtml.go\n/* Read HTML\n*/\npackage main\n\
    import (\n\"fmt\"\n\"golang.org/x/net/html\"\n\"io\"\n\"log\"\n\"os\"\n\"strings\"\
    \n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"file\")\n}\nfile := os.Args[1]\nbytes, err := os.ReadFile(file)\ncheckError(err)\n\
    r := strings.NewReader(string(bytes))\nz := html.NewTokenizer(r)\ndepth := 0\n\
    for {\ntt := z.Next()\nfor n := 0; n < depth; n++ {\nfmt.Print(\" \")\n}\nswitch\
    \ tt {\ncase html.ErrorToken:\nif z.Err() == io.EOF {\nfmt.Println(\"EOF\")\n\
    } else {\nfmt.Println(\"Error \", z.Err().Error())\n}\nos.Exit(0)\ncase html.TextToken:\n\
    fmt.Println(\"Text: \\\"\" + z.Token().String() + \"\\\"\")\ncase html.StartTagToken,\
    \ html.EndTagToken:\nfmt.Println(\"Tag: \\\"\" + z.Token().String() + \"\\\"\"\
    )\nif tt == html.StartTagToken {\ndepth++\n} else {\ndepth--\n}\n}\n}\n}\nfunc\
    \ checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n```\n\nWhen we run `readhtml.go` on a simple HTML document such as this,\
    \ `sample.html`:\n\n```\nch11$ vi sample.html\n\n Test HTML \n\n Header one \n\
    \nTest para\n\n```\n\nAfter setting up the dependencies, it produces the following\
    \ output:\n\n```\n$ go mod init example.com/user/readhtml\n$ go mod tidy\n$ go\
    \ run readhtml.go sample.html\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\
    \nTag: \"\"\nText: \" Test HTML \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText:\
    \ \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \" Header one \"\nTag: \"\"\
    \nText: \"\n\"\nTag: \"\"\nText: \"\nTest para\n\"\nTag: \"\"\nText: \"\n\"\n\
    Tag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nEOF\n```\n\n(All the whitespace\
    \ it produces is correct.)\n\n### XHTML/HTML\n\nThere is also limited support\
    \ for XHTML/HTML in the XML package, discussed in the next chapter.\n\n### JSON\n\
    \nThere is good support for JSON, as discussed in Chapter 4.\n\n### Conclusion\n\
    \nThere isn’t much to this package. The subpackage `html/template` was discussed\
    \ in Chapter 9 on templates.\n\n## 12. XML\n\nXML is a significant markup language\
    \ mainly intended as a means of representing structured data using a text format.\
    \ In the language we used in Chapter 4, it can be considered as a means of serializing\
    \ data structures as a text document. It is used to describe documents such as\
    \ DocBook and XHTML. It is used in specialized markup languages such as MathML\
    \ and CML (Chemical Markup Language). It is used to encode data as SOAP messages\
    \ for Web Services, and the Web Service can be specified using WSDL (Web Services\
    \ Description Language).\n\nAt the simplest level, XML allows you to define your\
    \ own tags for use in text documents. Tags can be nested and can be interspersed\
    \ with text. Each tag can also contain attributes with values. For example, the\
    \ file `person.xml` may contain:\n\n```\n$ mkdir ch12\n$ cd ch12\nch12$ vi person.xml\n\
    \n Newmarch \n Jan \n\njan@newmarch.name\n\nj.newmarch@boxhill.edu.au\n\n```\n\
    \nThe structure of any XML document can be described in a number of ways:\n\n\
    *   A document type definition (DTD) is good for describing structure.\n*   XML\
    \ schema are good for describing the data types used by an XML document.\n*  \
    \ RELAX NG is proposed as an alternative to both.\n\nThere is argument over the\
    \ relative value of each way of defining the structure of an XML document. We\
    \ won’t buy into that, as Go does not support any of them. Go cannot check for\
    \ validity of any document against a schema, but only for well-formedness. Even\
    \ well-formedness is an important characteristic of XML documents and is often\
    \ a problem with HTML documents in practice. That makes XML suitable for representation\
    \ of even very complex data, while HTML is not.\n\nFour topics are discussed in\
    \ this chapter: marshalling and unmarshalling Go data into XML, parsing an XML\
    \ stream, and XHTML."
