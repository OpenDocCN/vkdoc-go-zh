- fmt: '### Handler Functions


    In this last program, the handler was given in the second argument to `ListenAndServe`.
    Any number of handlers can be registered first by calls to `Handle` or `HandleFunc`,
    with these signatures:


    ```

    func Handle(pattern string, handler Handler)

    func HandleFunc(pattern string, handler func(ResponseWriter, *Request))

    ```


    The second argument to `ListenAndServe` could be `nil`, and then calls are dispatched
    to all registered handlers. Each handler should have a different URL pattern.
    For example, the file handler might have URL pattern `/`, while a function handler
    might have URL pattern `/cgi-bin` (we used `/tmp/www`). A more specific pattern
    takes precedence over a more general pattern.


    Common CGI programs are `test-cgi` (written in the shell) and `printenv` (written
    in Perl), which print the values of the environment variables. A handler can be
    written to work in a similar manner as `printenv.go`.


    ```

    ch8$ vi printenv.go

    /* Print Env

    */

    package main

    import (

    "fmt"

    "net/http"

    "os"

    )

    func main() {

    // file handler for most files

    fileServer := http.FileServer(http.Dir("/tmp/www"))

    http.Handle("/", fileServer)

    // function handler for /cgi-bin/printenv

    http.HandleFunc("/cgi-bin/printenv", printEnv)

    // deliver requests to the handlers

    err := http.ListenAndServe(":8000", nil)

    checkError(err)

    // That''s it!

    }

    func printEnv(writer http.ResponseWriter, req *http.Request) {

    env := os.Environ()

    writer.Write([]byte("Environment"))

    for _, v := range env {

    writer.Write([]byte(v + "\n"))

    }

    writer.Write([]byte(""))

    }

    func checkError(err error) {

    if err != nil {

    fmt.Println("Fatal error ", err.Error())

    os.Exit(1)

    }

    }

    ```


    Run the server as follows:


    ```

    ch8$ go run printenv.go

    ```


    Now we run a curl client as follows:


    ```

    ch8$ curl localhost:8000/cgi-bin/printenv

    EnvironmentTERM_PROGRAM=Apple_Terminal

    SHELL=/bin/zsh

    TERM=xterm-256color

    TMPDIR=/var/folders/c5/l52zshy12q1bsfhp_sbdtg5r0000gn/T/

    TERM_PROGRAM_VERSION=444

    TERM_SESSION_ID=803B4A5C-F403-40E8-97CC-0EC807C35D77

    USER=ronaldpetty

    SSH_AUTH_SOCK=/private/tmp/com.apple.launchd.vj8cVxhj0c/Listeners

    ```


    Using the `cgi-bin` directory in this program is a bit cheeky: it doesn’t call
    an external program like CGI scripts do. It just calls the Go function `printEnv`.
    Go does have the ability to call external programs using `os.ForkExec` but does
    not yet have support for dynamically linkable modules like Apache’s `mod_perl`.
    You most likely want to wrap the results as proper HTML in this case.


    ### Bypassing the Default Multiplexer


    HTTP requests received by a Go server are usually handled by a multiplexer, which
    examines the path in the HTTP request and calls the appropriate file handler,
    etc. You can define your own handlers. These can be registered with the default
    multiplexer by calling `http.HandleFunc`, which takes a pattern and a function.
    The functions such as `ListenAndServe` then take a `nil` handler function. This
    was done in the last example.


    However, if you want to take over the multiplexer role, then you can give a non-`nil`
    function as the handler function to `ListenAndServe`. This function will then
    be responsible for managing the requests and responses.


    The following example is trivial but illustrates the use of this. The multiplexer
    function simply returns a `"204 No content"` for *all* requests to `serverhandler.go`:


    ```

    ch8$ vi serverhandler.go

    /* ServerHandler

    */

    package main

    import (

    "net/http"

    )

    func main() {

    myHandler := http.HandlerFunc(func(rw http.ResponseWriter,

    request *http.Request) {

    // Just return no content - arbitrary headers can be set, arbitrary body

    rw.WriteHeader(http.StatusNoContent)

    })

    http.ListenAndServe(":8080", myHandler)

    }

    ```


    The server may be tested by running `telnet` against it to give output such as
    this:


    ```

    ch8$ curl -v localhost:8080

    *   Trying 127.0.0.1:8080...

    * Connected to localhost (127.0.0.1) port 8080 (#0)

    > GET / HTTP/1.1

    > Host: localhost:8080

    > User-Agent: curl/7.79.1

    > Accept: */*

    >

    * Mark bundle as not supporting multiuse

    < HTTP/1.1 204 No Content

    < Date: Fri, 01 Apr 2022 03:21:41 GMT

    <

    * Connection #0 to host localhost left intact

    ```


    ## HTTPS


    For secure, encrypted connections, HTTP uses TLS, which is described in Chapter
    [7](#436770_2_En_7_Chapter.xhtml). The protocol of HTTP+TLS is called HTTPS and
    uses `https://` URLs instead of `http://` URLs.


    For a server to use HTTPS, it needs an X.509 certificate and a private key file
    for that certificate. Go at present requires that these be PEM-encoded as used
    in Chapter [7](#436770_2_En_7_Chapter.xhtml). Then the HTTP function `ListenAndServe`
    is replaced with the HTTPS (HTTP+TLS) function `ListenAndServeTLS`.


    The file server program given earlier can be written as an HTTPS server as `httpsfileserver.go`:


    ```

    ch8$ vi httpsfileserver.go

    /* HTTPSFileServer

    */

    package main

    import (

    "net/http"

    "log"

    )

    func main() {

    // deliver files from the directory /tmp/www

    fileServer := http.FileServer(http.Dir("/tmp/www"))

    // register the handler and deliver requests to it

    err := http.ListenAndServeTLS(":8000", "jan.newmarch.name.pem",

    "private.pem", fileServer)

    if err != nil {

    log.Fatalln(err)

    }

    }

    ```


    This server is accessed by `https://localhost:8000/index.html`, for example. If
    the certificate is a self-signed certificate, an unsafe client will be needed
    to access the server contents. For example:


    ```

    ch8$ go run httpsfileserver.go

    ch8$ curl -i https://localhost:8000

    curl: (60) SSL certificate problem: self signed certificate

    More details here: https://curl.se/docs/sslcerts.html

    curl failed to verify the legitimacy of the server and therefore could not

    establish a secure connection to it. To learn more about this situation and

    how to fix it, please visit the web page mentioned above.

    ```


    We can instruct the curl client to be insecure via the `-k` flag.


    ```

    ch8$ curl -ik https://localhost:8000

    HTTP/2 200

    content-type: text/html; charset=utf-8

    last-modified: Mon, 27 Dec 2021 04:30:01 GMT

    content-length: 41

    date: Mon, 27 Dec 2021 04:46:56 GMT


    hi.txt


    ```


    We can also do that with our Go client code (`tlsunsafeclientget.go`).


    With `InsecureSkipVerify` set to `true`:


    ```

    ch8$ go run tlsunsafeclientget.go https://localhost:8000

    get a response

    got charset UTF-8

    got body

    ```


    With `InsecureSkipVerify` set to `false`:


    ```

    ch8$ go run tlsunsafeclientget.go https://localhost:8000

    Fatal error  Get "https://localhost:8000": x509: certificate signed by unknown
    authority

    exit status 1

    ```


    If you want a server that supports both HTTP and HTTPs, run each listener in its
    own `go` routine.


    ## Conclusion


    Go has extensive support for HTTP. This is not surprising, since Go was partly
    invented to fill a need by Google for their own servers. This chapter discussed
    the various levels of support given by Go for HTTP and HTTPS. In the chapter about
    Gorilla, we will talk in more detail about Go multiplex requests (path -> code).


    # 9. Templates


    Most server-side languages have a mechanism for taking predominantly static pages
    and inserting a dynamically generated component, such as a list of items. Typical
    examples are scripts in Java Server Pages, PHP scripting, and many others. Go
    has adopted a relatively simple scripting language in the `template` package.


    The package is designed to take text as input and output different text, based
    on transforming the original text using the values of an object. Unlike JSP or
    similar, it is not restricted to HTML files, but it is likely to find greatest
    use there. We first describe the `text/template` package and later the `html/template`
    package.


    The original source is called a *template* and will consist of text that is transmitted
    unchanged and embedded commands that can act on and change text. The commands
    are delimited by `{{ ... }}`, similar to the JSP commands `<%= ... =%>` and PHP’s
    `<?php ... ?>`. In Go’s template module, commands are also known as actions.'
