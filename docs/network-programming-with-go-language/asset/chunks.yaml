    ch8$ curl -ik https://localhost:8000

    HTTP/2 200

    content-type: text/html; charset=utf-8

    last-modified: Mon, 27 Dec 2021 04:30:01 GMT

    content-length: 41

    date: Mon, 27 Dec 2021 04:46:56 GMT


    hi.txt


    ```


    我们也可以通过 Go 客户端代码来实现这一点（`tlsunsafeclientget.go`）。


    当 `InsecureSkipVerify` 设置为 `true` 时：


    ```

    ch8$ go run tlsunsafeclientget.go https://localhost:8000

    get a response

    got charset UTF-8

    got body

    ```


    当 `InsecureSkipVerify` 设置为 `false` 时：


    ```

    ch8$ go run tlsunsafeclientget.go https://localhost:8000

    Fatal error  Get "https://localhost:8000": x509: certificate signed by unknown
    authority

    exit status 1

    ```


    如果你想要一个同时支持 HTTP 和 HTTPS 的服务器，可以在各自的 `go` 例程中运行每个监听器。


    ## 结论


    Go 对 HTTP 提供了广泛的支持。这并不奇怪，因为 Go 的部分初衷就是为了满足 Google 自身服务器的需求。本章讨论了 Go 为 HTTP 和 HTTPS
    提供的不同级别的支持。在关于 Gorilla 的章节中，我们将更详细地讨论 Go 的多路复用请求（路径 -> 代码）。


    # 9. 模板


    大多数服务器端语言都有一种机制，可以获取主要是静态的页面并插入动态生成的组件，例如项目列表。典型的例子包括 Java Server Pages 中的脚本、PHP
    脚本等。Go 在 `template` 包中采用了一种相对简单的脚本语言。


    该包旨在将文本作为输入，并根据使用对象的值转换原始文本，输出不同的文本。与 JSP 或类似技术不同，它不局限于 HTML 文件，但很可能在该领域得到最大应用。我们首先描述
    `text/template` 包，然后再介绍 `html/template` 包。


    原始源代码称为*模板*，它由直接传递的文本和可以作用于文本并改变文本的内嵌命令组成。命令由 `{{ ... }}` 分隔，类似于 JSP 命令 `<%= ...
    =%>` 和 PHP 的 `<?php ... ?>`。在 Go 的模板模块中，命令也称为动作。

