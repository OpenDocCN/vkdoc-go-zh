  trans: "\n# 内容协商\n\n任何网络用户代理都可以尝试与任何网络服务器通信。浏览器与 HTML 服务器通信是我们在网络上常见的典型情况，但许多人也会熟悉使用其他用户代理（例如`curl`、`wget`甚至`telnet`）！浏览器和其他工具会利用\
    \ HTTP 响应中的`Content-Type`来确定如何处理提供的内容。\n\n对于 Web 应用程序而言，用户代理必须能够理解服务器正在交付什么，因为它试图参与一个可能没有用户协助的交互过程。RPC\
