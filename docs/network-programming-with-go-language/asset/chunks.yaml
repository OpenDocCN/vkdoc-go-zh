    ```


    Next, we show some (in)flexibility of ASN coding. ASN.1 only deals with the data’s
    types. It does not consider the data’s names (i.e., the structure field names).
    So the following type T1 can be marshalled/unmarshalled into type `T2` as the
    corresponding fields are the same types.


    Not only must the types of each field match, but the number must match as well.
    Here, we demo both types of errors:


    *   * asn1.SyntaxError `–` missing fields


    *   * asn1.StructuralError `–` incorrect type


