- fmt: "### Slices and Arrays\n\n`Arrays` are sequences of elements of a single type.\
    \ `Slices` are segments of an underlying array. `Slices` are often more convenient\
    \ to deal with in Go. `Slices` allow a developer to create many views of an array\
    \ in theory saving memory.\n\nAn array can be created statically:\n\n```\nvar\
    \ x [128]int\n```\n\nor dynamically as a pointer:\n\n```\nxp := new([128]int)\n\
    ```\n\nA slice may be created along with its underlying array:\n\n```\nx := make([]int,\
    \ 50, 100)\n```\n\nor\n\n```\nx := new([100]int)[0:50]\n```\n\nThese last two\
    \ are both of type `[]int` (as shown by `reflect.TypeOf(x)`), capacity of 100,\
    \ length of 50.\n\nElements of an array or slice are accessed by their index:\n\
    \n```\nx[1]\n```\n\nThe indices are from 0 to `len(x)-1`.\n\nA slice may be taken\
    \ of an array or slice by using the lower (inclusive) and upper (exclusive) indices\
    \ of the array or slice:\n\n- Reference to the underlying array\n- Length of your\
    \ slices view into the array\n- Capacity field that controls how much more we\
    \ can see of the underlying array\n\n```\na := [5]int{-1, -2, -3, -4, -5}\ns :=\
    \ a[1:4]  // s is now [-2, -3, -4]\nSlices are struct like object that has three\
    \ key pieces of information contained in them.\n```\n\nIn the preceding example,\
    \ `s` is a slice, while `a` is an array. Arrays have fixed type and size, and\
    \ those aspects cannot change. So `a` is of type `[5]int`, and `s` is `[]int`.\
    \ While we see the type with slice `s`, we do not see the length. To retrieve\
    \ the length or capacity, we have the following built-in functions.\n\n```\n$\
    \ go doc builtin.len\npackage builtin // import \"builtin\"\nfunc len(v Type)\
    \ int\nThe len built-in function returns the length of v, according to its type:\n\
    Array: the number of elements in v.\nPointer to array: the number of elements\
    \ in *v (even if v is nil).\nSlice, or map: the number of elements in v; if v\
    \ is nil, len(v) is zero.\nString: the number of bytes in v.\nChannel: the number\
    \ of elements queued (unread) in the channel buffer;\nif v is nil, len(v) is zero.\n\
    For some arguments, such as a string literal or a simple array expression,\nthe\
    \ result can be a constant. See the Go language specification's \"Length\nand\
    \ capacity\" section for details.\n$ go doc builtin.cap\npackage builtin // import\
    \ \"builtin\"\nfunc cap(v Type) int\nThe cap built-in function returns the capacity\
    \ of v, according to its type:\nArray: the number of elements in v (same as len(v)).\n\
    Pointer to array: the number of elements in *v (same as len(v)).\nSlice: the maximum\
    \ length the slice can reach when resliced;\nif v is nil, cap(v) is zero.\nChannel:\
    \ the channel buffer capacity, in units of elements;\nif v is nil, cap(v) is zero.\n\
    For some arguments, such as a simple array expression, the result can be a\nconstant.\
    \ See the Go language specification's \"Length and capacity\" section\nfor details.\n\
    ```\n\nWe can now see the length and capacity of each. Other types are mentioned,\
    \ but we are focusing on array and slice here.\n\n```\nfmt.Println(len(a), cap(a))\
    \ // 5 5\nfmt.Println(len(s), cap(s)) // 3 4\n```\n\nA goal of slices is we can\
    \ have many different views into the same array data. For example, `a[2:]` creates\
    \ a slice where the length is 3 and the capacity is also 3. When the length and\
    \ the capacity are equal, it means the slice cannot grow without modifying the\
    \ underlying data structure. For example, if we `append()` to a slice, it inserts\
    \ to the underlying array in the relative position. If `cap() – len() == 0`, then\
    \ the underlying array would need to be increased in size. This increase does\
    \ happen in such a case but can be unexpected. There is more to learn about this\
    \ process and how slices share the array (or not if append is too large). More\
    \ details about the relation of slices/arrays including memory details can be\
    \ found here: [`https://go.dev/blog/slices-intro`](https://go.dev/blog/slices-intro).\n\
    \n### Maps\n\nA *map* is an unordered group of elements of one type, indexed by\
    \ a key of another type. We do not use maps much in this book, although one place\
    \ is in Chapter [10](https://go.dev/blog/slices-intro), where the values of fields\
    \ of an HTTP request may be accessed through a map using the field name as key.\n\
    \n```\nmyval := 10\nx := map[string]int{\"mykey\": myval}\n```\n\nThe preceding\
    \ assignment has a few items worth discussing.\n\n- `map[string]int` is declaring\
    \ our maps type.\n- `{\"mykey\": myval}` is using literal syntax to initialize\
    \ our typed map.\n- Ultimately assigning to `x`.\n\nPer the prior section, we\
    \ can retrieve the number of keys via the `len` built-in function.\n\n```\nlen(x)\
    \ // 1\n```\n\nLooping over a map (e.g., print out keys and values) in key sorted\
    \ order is possible since 1.12.\n\nDeleting a map key can be accomplished via\
    \ another built-in function called `delete`.\n\n```\ndelete(x, \"mykey\")\n```\n\
    \nA map of length 0 is not the same thing as a nil map.\n\n### Pointers\n\nPointers\
    \ behave similarly to pointers in other languages. The `*` operator dereferences\
    \ a pointer, while the `&` operator takes the address of a variable. Go simplifies\
    \ the use of pointers so that most of the time you don’t have to worry about them.\
    \ The most we do in this book is check if a pointer value is `nil`, which will\
    \ usually signify an error, or conversely, if a possible error value is not `nil`,\
    \ as described in the next section.\n\n```\n// returns new pointer to an address\
    \ that holds an int zero value\nx := new(int)\n// sets integer value at pointed\
    \ address location\n*x = 10\n// pointing to, address of the pointer, value where\
    \ we are pointing to\nfmt.Println(x, &x, *x)\n// 0xc000094010 0xc000096018 10\n\
    //every variable has an address, the value\ny := 12\nfmt.Println(&y, y)\n// 0xc000094018\
    \ 12\n```\n\nSomething to note, when declaring function parameters, pointers and\
    \ arrays are not the same thing. If you intend to pass an array, normally, you\
    \ want to pass the address; this is because Go is pass by value.\n\n### Functions\n\
    \nFunctions are defined using a notation unique to Go. Why the familiar C syntax\
    \ (or any other for that matter) is not used is explained in the Go’s Declaration\
    \ Syntax blog (see [`https://go.dev/blog/declaration-syntax`](https://go.dev/blog/declaration-syntax)).\
    \ We leave it to the textbooks to explain the details of the syntax.\n\nEvery\
    \ Go program must have a `main` function declared as follows:\n\n```\nfunc main()\
    \ { ... }\n```\n\nWe will frequently use a function `checkError` defined as follows:\n\
    \n```\nfunc checkError(err error) {\n    if err != nil {\n        fmt.Fprintf(os.Stderr,\
    \ \"Fatal error: %s\", err.Error())\n        os.Exit(1)\n    }\n}\n```\n\nIt takes\
    \ one parameter and has no return value. It starts with a lowercase letter, so\
    \ it is local to the package in which it is declared.\n\nFunctions that return\
    \ values will often return an error status as well as a substantive value, as\
    \ in this function from Chapter [3](https://go.dev/blog/slices-intro):\n\n```\n\
    func readFully(conn net.Conn) ([]byte, error) { ... }\n```\n\nIt takes `net.Conn`\
    \ as a parameter and returns an array of bytes and an error status (`nil` if no\
    \ error occurred).\n\nIn this book, no more complex definitions than this are\
    \ used.\n\n### Structures\n\nStructures are similar to those in other languages.\
    \ In Chapter [4](https://go.dev/blog/slices-intro), we consider serialization\
    \ of data and use the example of the following structs:\n\n```\ntype Name struct\
    \ {\n    Family   string\n    Personal string\n}\ntype Email struct {\n    Kind\
    \    string\n    Address string\n}\ntype Person struct {\n    Name  Name\n   \
    \ Email []Email\n}\n```\n\nA compound struct can be declared as follows:\n\n```\n\
    person := Person{\n    Name: Name{Family: \"Newmarch\", Personal: \"Jan\"},\n\
    \    Email: []Email{Email{Kind: \"home\", Address: \"jan@newmarch.name\"},\n \
    \       Email{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"}}}\n```"
  raw: '### Slices and Arrays


    Arrays are sequences of elements of a single type. Slices are segments of an underlying
    array. Slices are often more convenient to deal with in Go. Slices allow a developer
    to create many views of an array in theory saving memory.


    An array can be created statically:


    ```

    var x [128]int

    ```


    or dynamically as a pointer:


    ```

    xp := new([128]int)

    ```


    A slice may be created along with its underlying array:


    ```

    x := make([]int, 50, 100)

    ```


    or


    ```

    x := new([100]int)[0:50]

    ```


    These last two are both of type `[]int` (as shown by `reflect.TypeOf(x)`), capacity
    of 100, length of 50.


    Elements of an array or slice are accessed by their index:


    ```

    x[1]

    ```


    The indices are from 0 to `len(x)-1`.


    A slice may be taken of an array or slice by using the lower (inclusive) and upper
    (exclusive) indices of the array or slice:


    *   Reference to the underlying array


    *   Length of your slices view into the array


    *   Capacity field that controls how much more we can see of the underlying array


    ```

    a := [5]int{-1, -2, -3, -4, -5}

    s := a[1:4]  // s is now [-2, -3, -4]

    Slices are struct like object that has three key pieces of information contained
    in them.

    ```


    In the preceding example, s is a slice, while a is an array. Arrays have fixed
    type and size, and those aspects cannot change. So a is of type [5]int, and s
    is []int. While we see the type with slice s, we do not see the length. To retrieve
    the length or capacity, we have the following built-in functions.


    ```

    $ go doc builtin.len

    package builtin // import "builtin"

    func len(v Type) int

    The len built-in function returns the length of v, according to its type:

    Array: the number of elements in v.

    Pointer to array: the number of elements in *v (even if v is nil).

    Slice, or map: the number of elements in v; if v is nil, len(v) is zero.

    String: the number of bytes in v.

    Channel: the number of elements queued (unread) in the channel buffer;

    if v is nil, len(v) is zero.

    For some arguments, such as a string literal or a simple array expression,

    the result can be a constant. See the Go language specification''s "Length

    and capacity" section for details.

    $ go doc builtin.cap

    package builtin // import "builtin"

    func cap(v Type) int

    The cap built-in function returns the capacity of v, according to its type:

    Array: the number of elements in v (same as len(v)).

    Pointer to array: the number of elements in *v (same as len(v)).

    Slice: the maximum length the slice can reach when resliced;

    if v is nil, cap(v) is zero.

    Channel: the channel buffer capacity, in units of elements;

    if v is nil, cap(v) is zero.

    For some arguments, such as a simple array expression, the result can be a

    constant. See the Go language specification''s "Length and capacity" section

    for details.

    ```


    We can now see the length and capacity of each. Other types are mentioned, but
    we are focusing on array and slice here.


    ```

    fmt.Println(len(a), cap(a)) // 5 5

    fmt.Println(len(s), cap(s)) // 3 4

    ```


    A goal of slices is we can have many different views into the same array data.
    For example, a[2:] creates a slice where the length is 3 and the capacity is also
    3\. When the length and the capacity are equal, it means the slice cannot grow
    without modifying the underlying data structure. For example, if we append() to
    a slice, it inserts to the underlying array in the relative position. If cap()
    – len() == 0, then the underlying array would need to be increased in size. This
    increase does happen in such a case but can be unexpected. There is more to learn
    about this process and how slices share the array (or not if append is too large).
    More details about the relation of slices/arrays including memory details can
    be found here: [`https://go.dev/blog/slices-intro`](https://go.dev/blog/slices-intro).


    ### Maps


    A *map* is an unordered group of elements of one type, indexed by a key of another
    type. We do not use maps much in this book, although one place is in Chapter [10](#436770_2_En_10_Chapter.xhtml),
    where the values of fields of an HTTP request may be accessed through a map using
    the field name as key.


    ```

    myval := 10

    x := map[string]int{"mykey": myval}

    ```


    The preceding assignment has a few items worth discussing.


    *   map[string]int is declaring our maps type.


    *   {“mykey”: myval} is using literal syntax to initialize our typed map.


    *   Ultimately assigning to x.


    Per the prior section, we can retrieve the number of keys via the len built-in
    function.


    ```

    len(x) // 1

    ```


    Looping over a map (e.g., print out keys and values) in key sorted order is possible
    since 1.12.


    Deleting a map key can be accomplished via another built-in function called delete.


    ```

    delete(x, "mykey")

    ```


    A map of length 0 is not the same thing as a nil map.


    ### Pointers


    Pointers behave similarly to pointers in other languages. The `*` operator dereferences
    a pointer, while the `&` operator takes the address of a variable. Go simplifies
    the use of pointers so that most of the time you don’t have to worry about them.
    The most we do in this book is check if a pointer value is `nil`, which will usually
    signify an error, or conversely, if a possible error value is not `nil`, as described
    in the next section.


    ```

    // returns new pointer to an address that holds an int zero value

    x := new(int)

    // sets integer value at pointed address location

    *x = 10

    // pointing to, address of the pointer, value where we are pointing to

    fmt.Println(x, &x, *x)

    // 0xc000094010 0xc000096018 10

    //every variable has an address, the value

    y := 12

    fmt.Println(&y, y)

    // 0xc000094018 12

    ```


    Something to note, when declaring function parameters, pointers and arrays are
    not the same thing. If you intend to pass an array, normally, you want to pass
    the address; this is because Go is pass by value.


    ### Functions


    Functions are defined using a notation unique to Go. Why the familiar C syntax
    (or any other for that matter) is not used is explained in the Go’s Declaration
    Syntax blog (see [`https://go.dev/blog/declaration-syntax`](https://go.dev/blog/declaration-syntax)).
    We leave it to the textbooks to explain the details of the syntax.


    Every Go program must have a `main` function declared as follows:


    ```

    func main() { ... }

    ```


    We will frequently use a function `checkError` defined as follows:


    ```

    func checkError(err error) {

    if err != nil {

    fmt.Fprintf(os.Stderr, "Fatal error: %s", err.Error())

    os.Exit(1)

    }

    }

    ```


    It takes one parameter and has no return value. It starts with a lowercase letter,
    so it is local to the package in which it is declared.


    Functions that return values will often return an error status as well as a substantive
    value, as in this function from Chapter [3](#436770_2_En_3_Chapter.xhtml):


    ```

    func readFully(conn net.Conn) ([]byte, error) { ... }

    ```


    It takes `net.Conn` as a parameter and returns an array of bytes and an error
    status (`nil` if no error occurred).


    In this book, no more complex definitions than this are used.


    ### Structures


    Structures are similar to those in other languages. In Chapter [4](#436770_2_En_4_Chapter.xhtml),
    we consider serialization of data and use the example of the following structs:


    ```

    type Name struct {

    Family   string

    Personal string

    }

    type Email struct {

    Kind    string

    Address string

    }

    type Person struct {

    Name  Name

    Email []Email

    }

    ```


    A compound struct can be declared as follows:


    ```

    person := Person{

    Name: Name{Family: "Newmarch", Personal: "Jan"},

    Email: []Email{Email{Kind: "home", Address: "jan@newmarch.name"},

    Email{Kind: "work", Address: "j.newmarch@boxhill.edu.au"}}}

    ```'
