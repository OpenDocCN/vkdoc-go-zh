    # 客户端的 HTTPS 连接


    为了安全加密的连接，HTTP 使用了第 7 章中描述的 TLS 协议。HTTP+TLS 协议被称为 HTTPS，它使用 `https://` 的 URL 而非
    `http://` 的 URL。


    服务器必须在客户端接受其数据之前返回有效的 X.509 证书。如果证书有效，那么 Go 会在底层处理一切，前面给出的客户端在 HTTPS 的 URL 下也能正常运行。也就是说，像之前的
    `clientget.go` 这样的程序无需修改即可运行——你只需给它一个 HTTPS 的 URL 即可。


    许多站点拥有无效的证书。它们可能已过期，可能是自签名而非由公认的证书颁发机构签名，或者可能存在错误（例如服务器名称不正确）。像 Firefox 这样的浏览器会显示一个带有“赶紧离开这里！”按钮的巨大警告，但你可以自行承担风险继续访问，很多人也正是这样做的。


    当遇到证书错误时，Go 目前会直接中止。不过，你可以配置客户端忽略证书错误。当然，不建议这样做——证书配置错误的站点可能存在其他问题。


    在第 7 章中，我们生成了自签名的 X.509 证书。在本章稍后部分，我们将提供一个使用 X.509 证书的 HTTPS 服务器，如果使用了自签名证书，那么
    `clientget.go` 将会产生以下错误：


    ```

    x509: certificate signed by unknown authority

    ```


    通过启用传输（Transport）配置标志 `InsecureSkipVerify`，可以创建一个忽略这些错误并继续执行的客户端。这个不安全的程序是 `tlsunsafeclientget.go`：


    ```

    ch8$ vi tlsunsafeclientget.go

    /* TLSUnsafeClientGet

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "log"

    "net/http"

    "net/url"

    "os"

    "strings"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "https://host:port/page")

    }

    url, err := url.Parse(os.Args[1])

    checkError(err)

    if url.Scheme != "https" {

    log.Fatalln("Not https scheme ", url.Scheme)

    }

    transport := &http.Transport{}

    transport.TLSClientConfig = &tls.Config{InsecureSkipVerify: false}

    client := &http.Client{Transport: transport}

    request, err := http.NewRequest("GET", url.String(), nil)

    // only accept UTF-8

    checkError(err)

    response, err := client.Do(request)

    checkError(err)

    if response.StatusCode != http.StatusOK {

    log.Fatalln(response.Status)

    }

    fmt.Println("get a response")

    chSet := getCharset(response)

    fmt.Printf("got charset %s\n", chSet)

    if chSet != "UTF-8" {

    log.Fatalln("Cannot handle", chSet)

    }

    var buf [512]byte

    reader := response.Body

    fmt.Println("got body")

    for {

    n, err := reader.Read(buf[0:])

    checkError(err)

    fmt.Print(string(buf[0:n]))

    }

    }

    func getCharset(response *http.Response) string {

    contentType := response.Header.Get("Content-Type")

    if contentType == "" {

    // guess

    return "UTF-8"

    }

    idx := strings.Index(contentType, "charset:")

    if idx == -1 {

    // guess

    return "UTF-8"

    }

    return strings.Trim(contentType[idx:], " ")

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

