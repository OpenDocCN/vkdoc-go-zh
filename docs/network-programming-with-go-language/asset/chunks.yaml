- fmt: '# ISO 8859 and Go


    The `ISO 8859` series are 8-bit character sets for different parts of Europe and
    some other areas. They all have the `ASCII` set common in the low part but differ
    in the top part. According to Google, `ISO 8859` codes accounted for about 20%
    of the web pages it saw, but that has now dropped.


    The fourth code, `ISO 8859-4` or `Latin-4`, has the first 256 characters in common
    with `Unicode`. The encoded value of the `Latin-4` characters is the same in `UTF-16`
    and in the default `ISO 8859-4` encoding. But this doesn’t really help much, as
    `UTF-16` is a 16-bit encoding and `ISO 8859-4` is an 8-bit encoding. `UTF-8` is
    an 8-bit encoding, but it uses the top bit to signal extra bytes, so only the
    `ASCII` subset overlaps for `UTF-8` and `ISO 8859-4`. So `UTF-8` doesn’t help
    much either. This is true for all `8859-n`/`Latin-n` to `Unicode` encodings.


    But the `ISO 8859` series don’t have any complex issues. Each character in each
    set corresponds to a unique `Unicode` character. For example, in `ISO 8859-4`,
    the character “Latin capital letter I with ogonek” has `ISO 8859-4` code point
    `0xc7` (in hexadecimal) and corresponding `Unicode` code point of `U+012E`. Transforming
    either way between an `ISO 8859` set and the corresponding `Unicode` characters
    is essentially just a table lookup.


    A map from `ISO 8859` code points to the `Unicode` code points could be done as
    an array of 256 integers. But many of these will have the same value as the index.
    So we just use a map of the different ones, and those not in the map take the
    index value. Here is an example program that does that.


    ```

    ch6$ vi isotounicode.go

    package main

    import (

    "fmt"

    "unicode/utf8"

    )

    func str2int(str string) []int {

    r := []rune(str)

    b := make([]int, utf8.RuneCountInString(str))

    for i, v := range r {

    b[i] = int(v)

    }

    return b

    }

    //unicode to 8859-4

    var unicodeToISOMap = map[int]uint8{

    // example match ascii 0x0021: 0x21, // !

    0x012e: 0xc7, // Į

    0x010c: 0xc8, // Č

    0x0112: 0xaa, // Ē

    0x0118: 0xca, // Ę

    // example match 0x00c9: 0xc9, // É

    // plus more

    }

    /* Turn a UTF-8 string into an ISO 8859 encoded byte array

    */

    func unicodeStrToISO(str string) []byte {

    // get the unicode code points

    codePoints := str2int(str) //[]int(str)

    // create a byte array of the same length

    bytes := make([]byte, len(codePoints))

    for n, v := range codePoints {

    // see if the point is in the exception map

    iso, ok := unicodeToISOMap[v]

    if !ok {

    // just use the value

    iso = uint8(v)

    }

    bytes[n] = iso

    }

    return bytes

    }

    // inverse of unicodeToISOMap

    var isoToUnicodeMap = map[uint8]int{

    0xc7: 0x012e,

    0xc8: 0x010c,

    0xaa: 0x0112,

    0xca: 0x0118,

    // and more

    }

    func isoBytesToUnicode(bytes []byte) string {

    codePoints := make([]int, len(bytes))

    for n, v := range bytes {

    unicode, ok := isoToUnicodeMap[v]

    if !ok {

    unicode = int(v)

    }

    codePoints[n] = unicode

    }

    return fmt.Sprintf("%q == %U", codePoints, codePoints)

    }

    func main() {

    x := "ĮĘa!"

    fmt.Printf("UTF-8: %s\n", x)

    fmt.Println("unicode to 8859-4")

    b := unicodeStrToISO(x)

    fmt.Printf("8859-4(hex): %x\n\n", b)

    fmt.Println("8859-4 to Unicode")

    fmt.Printf("Unicode: %v\n", isoBytesToUnicode(b))

    }

    ```


    These functions can be used to read and write `UTF-8` strings as `ISO 8859-4`
    bytes. By changing the mapping table, you can cover the other `ISO 8859` codes.
    `Latin-1`, or `ISO 8859-1`, is a special case – the exception map is empty as
    the code points for `Latin-1` are the same in `Unicode`. You could also use the
    same technique for other character sets based on a table mapping, such as `Windows
    1252`.


    In the preceding code, we use a sample input, `ĮĘ` `a!`, where the first two characters
    are in our exception map and the last two are not (as they are the same values
    in `Unicode` and `8859-n`). We did use `RuneCountInString` to help count the correct
    rune count. Strings in `Go` are byte arrays; we need to decode properly and use
    our mappings.


    ```

    ch6$ go run isotounicode.go

    UTF-8: ĮĘa!

    unicode to 8859-4

    8859-4(hex): c7ca6121

    8859-4 to Unicode

    Unicode: [''Į'' ''Ę'' ''a'' ''!''] == [U+012E U+0118 U+0061 U+0021]

    ```


    ## Other Character Sets and Go


    There are very, very many character set encodings. According to Google, these
    generally only have a small use in web documents, which will hopefully decrease
    even further with time. But if your software wants to capture all markets, then
    you may need to handle them.


    In the simplest cases, a lookup table will suffice. But that doesn’t always work.
    The character coding `ISO 2022` minimized character set sizes by using a finite
    state machine to swap code pages in and out. This was borrowed by some of the
    Japanese encodings and makes things very complex.


    `Go` presently only gives package support for any of these other character sets
    in the “subrepositories” package tree. For example, the package `golang.org/x/text/encoding/japanese`
    handles `EUC-JP` and `Shift JIS`.


    ## Conclusion


    There hasn’t been much code in this chapter. Instead, there have been some of
    the concepts of a very complex area. It’s up to you: if you want to assume everyone
    speaks US English, then the world is simple. But if you want your applications
    to be usable by the rest of the world, you need to pay attention to these complexities.


    Footnotes [1](#436770_2_En_6_Chapter.xhtml#Fn1_source)


    # 7. Security


    Although the Internet was originally designed as a system to withstand attacks
    by hostile agents, it developed into a cooperative environment of relatively trusted
    entities. Alas, those days are long gone. Spam mail, denial of service (DoS) attacks,
    phishing attempts, and so on are indicative that anyone using the Internet does
    so at their own risk.


    Applications have to be built to work correctly in hostile situations. “Correctly”
    no longer means just getting the functional aspects of the program correct but
    also means ensuring privacy and integrity of data transferred, access only to
    legitimate users, and other security issues.


    This of course makes your programs much more complex. There are *difficult* and
    *subtle* computing problems involved in making applications secure. Attempts to
    do it yourself (such as making up your own encryption libraries) are usually doomed
    to failure. Instead, you need to use the libraries designed by security professionals.


    Why should you bother if it makes things harder? Almost every day there are reports
    of leaked credit card details and of private servers being run by government officials
    and being hacked and reports of systems being brought down by denial of service
    attacks. Many of these attacks are possible by coding errors in network-facing
    applications, such as buffer overflows, cross-site scripting, and `SQL` injection.
    But a large number of errors can be traced to poor network handling: passwords
    passed in plain text, security credentials requested and then not checked, and
    just trusting the environment you are in. For example, a colleague recently purchased
    a home IoT (Internet of Things) device. He used `Wireshark` to see what it was
    doing on his network and discovered it was sending `RTMP` messages with authentication
    token `admin.admin`. An easy attack vector, without even having to crack passwords!
    Drones made by one well-known company use encryption with known flaws and can
    be “stolen” by other drones. An increasingly common method of stealing data is
    to act as a “rogue” wireless access point, pretending to be a legitimate access
    point in a local coffee shop, but monitoring everything that passes through, including
    your bank account details. These are “low hanging fruit.” The scope of data breaches
    is shown by “World''s Biggest Data Breaches” at [`http://www.informationisbeautiful.net/visualizations/worlds-biggest-data-breaches-hacks/`](http://www.informationisbeautiful.net/visualizations/worlds-biggest-data-breaches-hacks/).


    This chapter addresses the basic cryptographic tools given by `Go` that you can
    build into your applications. If you don’t and your company loses a million dollars
    – or worse, your customers lose a million dollars – then the blame comes back
    to you.'
