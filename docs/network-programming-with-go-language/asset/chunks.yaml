    if err != nil {

    if err == io.EOF {

    // graceful shutdown by server

    fmt.Println(`EOF from server`)

    break

    }

    if websocket.IsCloseError(err,

    websocket.CloseAbnormalClosure) {

    fmt.Println(`Close from server`)

    break

    }

    fmt.Println("Couldn''t receive msg " +

    err.Error())

    break

    }

    fmt.Println("Received from server: " +

    string(reply[:]))

    // return the msg

    err = conn.WriteMessage(websocket.TextMessage, reply)

    if err != nil {

    fmt.Println("Couldn''t return msg")

    break

    }

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The client is run as follows:


    ```

    ch15$ go run echoclientgorilla.go ws://localhost:12345

    Received from server: Hello  0

    ...

    Received from server: Hello  9

    Close from server

    ```


    Back on the server, we see


    ```

    Handling /

    Sending to client: Hello  0

    Received back from client: Hello  0

    Sending to client: Hello  1

    ...

    Sending to client: Hello  9

    Received back from client: Hello  9

    ```


    ## Conclusion


    The WebSockets standard is an IETF RFC, so no major changes are anticipated. This
    will allow HTTP user agents and servers to set up bidirectional socket connections
    and should make certain interaction styles much easier. Go has support from these
    and additional WebSocket packages, such as [`https://pkg.go.dev/nhooyr.io/websocket`](https://pkg.go.dev/nhooyr.io/websocket).


    # 16. Gorilla


    The Go standard library and related “x” packages offer a lot of functionality
    that we can leverage to build a website. Go trends toward simpler coding styles
    if possible; simple doesn’t always mean easy though. Until you have enough experience
    in the domain (web development) and the implementation stack (Go/Web), it might
    be easier and/or better to use a toolkit that provides additional ease-of-use
    features. Gorilla is one such toolkit. We have already touched upon Gorilla with
    WebSockets; now we take a more focused look at its major offerings and in the
    end see what it did for us vs. a pure Go implementation.


    Per the Gorilla website ([`https://www.gorillatoolkit.org/`](https://www.gorillatoolkit.org/)),
    these are the current packages. We will learn how to use some of them and explore
    how they integrate and extend the standard library.


    *   mux: Is a powerful URL router and dispatcher that is fully compatible with
    the default http.ServeMux


    *   reverse: Produces reversible regular expressions for regexp-based muxes


    *   rpc: Implements RPC over HTTP with codec for JSON-RPC


    *   schema: Converts form values to a struct


    *   securecookie: Encodes and decodes authenticated and optionally encrypted cookie
    values


    *   sessions: Saves cookie and filesystem sessions and allows custom session back
    ends


    *   websocket: Implements the WebSocket protocol defined in RFC 6455


    *   csrf: Provides Cross-Site Request Forgery (CSRF) prevention middleware


    *   handlers: Is a collection of useful handlers for Go’s net/http package


    You may notice this is a top tool choice due to its well-thought-out architecture.
    Next, we discuss around the middleware pattern, which will guide how we integrate
    Gorilla.


    ## Middleware Pattern


    Middleware is described as “software glue” per [`https://en.wikipedia.org/wiki/Middleware`](https://en.wikipedia.org/wiki/Middleware).
    Middleware for a web service allows us to wrap functionality around our application-specific
    code. These wrappers, in turn, can be chained. We do this to add functionality
    like logging and/or authentication instead of polluting our business logic. For
    example, there is no need to “log” an HTTP request in our client handling logic;
    it can (and should) be done outside of it (in another wrapper).


    The basic middleware pattern looks like this:


    ```

    router -> middleware -> application

    ```


    We begin with a brief example and review of some of the built-in web functionality
    of Go. This will help us to understand how Gorilla integrates with our code (and
    Go stdlib) and what it offers beyond the standard library.


    Go provides an HTTP client and server implementation via the net/http package.
    The package provides a “type Server” that works with a lower-level connection
    object and deserializes an HTTP request or serializes an HTTP response. That request
    is then handed to a type ServeMux. A ServeMux in turn does the routing for us
    (i.e., multiplexing). A default ServeMux is provided called DefaultServeMux. An
    interface called net.Handler is provided, this handler provides the methods used
    in dealing with the HTTP requests. As mentioned before, we can have more than
    one handler and chain these handlers together. It turns out that the ServeMux
    is also a Handler, meaning we can chain them as well.


    We can now imagine a little deeper how Go itself is using the middleware pattern.


    ```

    connection  Server  ServeMux  handler(s)  application functions

    ```


    Let’s review the primary documentation going backward from Handler.


    ```

    $ go doc http.Handler

    package http // import "net/http"

    type Handler interface {

    ServeHTTP(ResponseWriter, *Request)

    }

    A Handler responds to an HTTP request.

    ServeHTTP should write reply headers and data to the ResponseWriter and then

    return. Returning signals that the request is finished; it is not valid to

    use the ResponseWriter or read from the Request.Body after or concurrently

    with the completion of the ServeHTTP call.

    Depending on the HTTP client software, HTTP protocol version, and any

    intermediaries between the client and the Go server, it may not be possible

    to read from the Request.Body after writing to the ResponseWriter. Cautious

    handlers should read the Request.Body first, and then reply.

    Except for reading the body, handlers should not modify the provided

    Request.

    If ServeHTTP panics, the server (the caller of ServeHTTP) assumes that the

    effect of the panic was isolated to the active request. It recovers the

    panic, logs a stack trace to the server error log, and either closes the

    network connection or sends an HTTP/2 RST_STREAM, depending on the HTTP

    protocol. To abort a handler so the client sees an interrupted response but

    the server doesn''t log an error, panic with the value ErrAbortHandler.

    func AllowQuerySemicolons(h Handler) Handler

    func FileServer(root FileSystem) Handler

    func MaxBytesHandler(h Handler, n int64) Handler

    func NotFoundHandler() Handler

    func RedirectHandler(url string, code int) Handler

    func StripPrefix(prefix string, h Handler) Handler

    func TimeoutHandler(h Handler, dt time.Duration, msg string) Handler

    ```


    For now, the critical parts revolve around Handler.ServeHTTP. This is where the
    request is passed into and ultimately responded to. Next, review the details of
    ServeMux and the relation to Handler.'
