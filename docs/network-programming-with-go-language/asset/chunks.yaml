    This process repeats ten times until the client loop finishes, while the server\
    \ remains waiting with outer loop.\n\nThere is more to consider when parsing JSON.\
    \ Go even provides additional APIs including one to tokenize a JSON stream. We\
    \ cover JSON in more detail in later sections.\n\n## The Gob Package\n\nGob is\
    \ a serialization technique specific to Go. It is designed to encode Go data types\
    \ specifically and does not at present have substantial support for or by any\
    \ other languages. It supports all Go data types except for channels, functions,\
    \ and interfaces. It supports integers of all types and sizes, strings and Booleans,\
    \ structs, arrays, and slices. At present, it has some problems with circular\
    \ structures such as rings, but that will improve over time. The purpose was to\
    \ allow pure Go client and servers to work together without the need of a third-party\
    \ package.\n\nGob encodes type information into its serialized forms. This is\
    \ far more extensive than the type information in, say, an X.509 serialization\
    \ but far more efficient than the type information contained in an XML document.\
    \ Type information is only included once for each piece of data but includes,\
    \ for example, the names of struct fields.\n\nThis inclusion of type information\
    \ makes Gob marshalling and unmarshalling fairly robust to changes or differences\
    \ between the marshaller and unmarshaller. For example, this struct\n\n```\nstruct\
    \ T {\na int\nb int\n}\n```\n\nCan be marshalled and then unmarshalled into a\
    \ different struct, where the order of fields has changed:\n\n```\nstruct T {\n\
    b int\na int\n}\n```\n\nIt can also cope with missing fields (the values are ignored)\
    \ or extra fields (the fields are left unchanged). It can cope with pointer types\
    \ so that the previous struct could be unmarshalled into this one:\n\n```\nstruct\
    \ T {\n*a int\n**b int\n}\n```\n\nTo some extent, it can cope with type coercions\
    \ so that an `int` field can be broadened/widened into an `int64`, but not incompatible\
    \ types such as `int` to `uint`.\n\nTo use Gob to marshal a data value, you first\
    \ need to create an `Encoder`. This takes an io.`Writer` as a parameter, and marshalling\
    \ will be done to this writable stream. The encoder has a method called `Encode`,\
    \ which marshals the value to the stream. This method can be called multiple times\
    \ on multiple pieces of data. Type information for each data type is only written\
    \ once, though.\n\nYou use a `Decoder` to unmarshal the serialized data stream.\
    \ This takes an io.`Reader`, and each read returns an unmarshalled data value.\n\
    \nA program to store Gob serialized data into the file `person.gob` is `savegob.go`:\n\
    \n```\nch4$ vi savegob.go\n/* SaveGob\n*/\npackage main\nimport (\n\"encoding/gob\"\
    \n\"os\"\n\"log\"\n)\ntype Person struct {\nName  Name\nEmail []Email\n}\ntype\
    \ Name struct {\nFamily   string\nPersonal string\n}\ntype Email struct {\nKind\
    \    string\nAddress string\n}\nfunc main() {\nperson := Person{\nName: Name{Family:\
    \ \"Newmarch\", Personal: \"Jan\"},\nEmail: []Email{\nEmail{Kind: \"home\", Address:\
    \ \"jan@newmarch.name\"},\nEmail{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"\
    },\n},\n}\nsaveGob(\"person.gob\", person)\n}\nfunc saveGob(fileName string, key\
    \ interface{}) {\noutFile, err := os.Create(fileName)\ncheckError(err)\nencoder\
