- fmt: "### HTTP 1.1\n\n`HTTP 1.1` fixes many problems with `HTTP 1.0` but is more\
    \ complex because of it. This version is done by extending or refining the options\
    \ available to `HTTP 1.0`. For example:\n\n- There are more commands such as `TRACE`\
    \ and `CONNECT`.\n- `HTTP 1.1` tightened up the rules for the request URLs to\
    \ allow proxy handling. If the request is directed through a proxy, the URL should\
    \ be an absolute URL, as in\n\n```\nGET http://www.w3.org/index.html HTTP/1.1\n\
    ```\n\nOtherwise, an absolute path should be used and should include a `Host`\
    \ header field, as in\n\n- There are more attributes such as `If-Modified-Since`,\
    \ also for use by proxies.\n\n```\nGET /index.html HTTP/1.1\nHost: www.w3.org\n\
    ```\n\nThe changes include:\n\n- Hostname identification (which allows virtual\
    \ hosts)\n- Content negotiation (multiple languages)\n- Persistent connections\
    \ (which reduce TCP overheads; this is very complex)\n- Chunked transfers\n- Byte\
    \ ranges (request parts of documents)\n- Proxy support\n\nThanks to the popularity\
    \ of the Web, HTTP continues to be improved. `HTTP/1.1` initial development started\
    \ in 1997 continuing until 2014. You can find more about `HTTP/1.1`, including\
    \ the original specification and the later more detailed documents redocumenting\
    \ it.\n\n- Single document (original format):\n  - Original (1997) – [`https://datatracker.ietf.org/doc/html/rfc2068`](https://datatracker.ietf.org/doc/html/rfc2068)\n\
    \  - Update (1999) – [`https://datatracker.ietf.org/doc/html/rfc2616`](https://datatracker.ietf.org/doc/html/rfc2616)\n\
    - Detailed series (all in 2014):\n  - Message Syntax and Routing – [`https://datatracker.ietf.org/doc/html/rfc7230`](https://datatracker.ietf.org/doc/html/rfc7230)\n\
    \  - Semantics and Context – [`https://datatracker.ietf.org/doc/html/rfc7231`](https://datatracker.ietf.org/doc/html/rfc7231)\n\
    \  - Conditional Requests – [`https://datatracker.ietf.org/doc/html/rfc7232`](https://datatracker.ietf.org/doc/html/rfc7232)\n\
    \  - Range Requests – [`https://datatracker.ietf.org/doc/html/rfc7233`](https://datatracker.ietf.org/doc/html/rfc7233)\n\
    \  - Caching – [`https://datatracker.ietf.org/doc/html/rfc7234`](https://datatracker.ietf.org/doc/html/rfc7234)\n\
    \  - Authentication – [`https://datatracker.ietf.org/doc/html/rfc7235`](https://datatracker.ietf.org/doc/html/rfc7235)\n\
    \n### HTTP Major Upgrades\n\nThe `HTTP/0.9` protocol took one page. The `HTTP/1.0`\
    \ protocol was described in about 20 pages and included the `HTTP/0.9` protocol.\
    \ The `HTTP/1.1` protocol takes 120 pages and is a substantial extension to `HTTP/1.0`,\
    \ whereas `HTTP/2` takes about 96 pages. The `HTTP/2` specification just adds\
    \ to the `HTTP/1.1` specification. Nearing completion, the `HTTP/3` specification\
    \ is around 75 pages, adding more features and improvements around transport.\n\
    \n### HTTP/2\n\nAll the earlier versions of HTTP are text based. The most significant\
    \ departure for `HTTP/2` is that it is a binary format. In order to ensure backward\
    \ compatibility, this can’t be managed by sending a binary message to an older\
    \ server to see what it does. Instead, an `HTTP 1.1` message is sent with extra\
    \ attributes, essentially asking if the server wants to switch to `HTTP/2`. If\
    \ it doesn’t understand the extra fields, it replies with a normal `HTTP 1.1`\
    \ response, and the session continues with `HTTP 1.1`. Otherwise, the server can\
    \ respond that it is willing to change, and the session can continue with `HTTP/2`.\n\
    \n### HTTP/3\n\n`HTTP/3` further improves upon ideas begun in `HTTP/2` including:\n\
    \n- Stream multiplexing\n- Per-stream flow control\n- Low-latency connection establishment\n\
    \nA new transport mechanism was created to allow HTTP transport to perform even\
    \ better.\n\nTo simply compare the various major protocols:\n\n- `HTTP/1.1` is\
    \ used over a variety of transport and session layers.\n- `HTTP/2` is used primarily\
    \ with TLS over TCP.\n- `HTTP/3` uses the same semantics over a new transport\
    \ protocol called QUIC.\n\n`HTTP/2` improved upon HTTP over TCP flaws yet didn’t\
    \ fully integrate with TCP (e.g., no comanagement of congestion controls across\
    \ connections). `HTTP/3` combines much of the `HTTP/2` controls with TLS into\
    \ a new protocol called QUIC. QUIC in a sense merges layers 4 and 5 yet runs on\
    \ top of UDP (layer 4). Using UDP, allows `HTTP/3` to ride on top of existing\
    \ networks (some concern remains with TCP traffic often optimized and UDP less\
    \ so on intermediate routers).\n\nEven with the preceding improvements, a web\
    \ engineer often is still working in the realm of `HTTP/1.1`. Creators of browsers\
    \ and servers (e.g., proxies) will need to learn even more, including `HTTP/2`\
    \ and `HTTP/3`.\n\nYou can learn about QUIC transport here: [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport).\n\
    \nYou can learn about HTTP and QUIC here: [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-http`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-http).\n\
    \n## Simple User Agents\n\nUser agents such as browsers make requests and get\
    \ responses. Go provides a set of request and response types in the `net/http`\
    \ package. First, we take a look at `net/http.Response`.\n\n### The Response Type\n\
    \nThe response type is as follows:\n\n```\ntype Response struct {\n    Status\
    \     string // e.g. \"200 OK\"\n    StatusCode int    // e.g. 200\n    Proto\
    \      string // e.g. \"HTTP/1.0\"\n    ProtoMajor int    // e.g. 1\n    ProtoMinor\
    \ int    // e.g. 0\n    Header Header\n    Body io.ReadCloser\n    ContentLength\
    \ int64\n    TransferEncoding []string\n    Close bool\n    Uncompressed bool\n\
    \    Trailer Header\n    Request *Request\n    TLS *tls.ConnectionState\n}\n```\n\
    \nWith the following helper methods:\n\n```\nfunc (r *Response) Cookies() []*Cookie\n\
    func (r *Response) Location() (*url.URL, error)\nfunc (r *Response) ProtoAtLeast(major,\
    \ minor int) bool\nfunc (r *Response) Write(w io.Writer) error\n```\n\nSome methods\
    \ are for convenience such as `Cookies` and `Location`; others are to assist with\
    \ connection management like `ProtoAtLeast` and `Write`.\n\nSee the documentation\
    \ for exact details (e.g., `go doc -short net/http.Response.Body`).\n\nWe started\
    \ with `Response` because Go provides helper functions to make requests; later,\
    \ we investigate the `Request` type."
