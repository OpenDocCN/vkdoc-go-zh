    本作品受版权保护。出版商保留所有权利，无论涉及材料的全部或部分，特别是翻译、重印、重用插图、朗诵、广播、以缩微胶片或任何其他物理方式复制，以及信息存储与检索的传输与电子改编、计算机软件，或采用目前已知或未来开发的任何类似或不同方法。在本出版物中使用通用描述性名称、注册商标、商标、服务标记等，即使未作明确声明，也不意味着此类名称不受相关保护性法律和法规的约束，因此可自由用于一般用途。出版商、作者和编辑均假定本书中的信息和建议在出版之日是真实且准确的。出版商、作者或编辑不对本书所含材料或可能存在的任何错误或遗漏提供明示或暗示的担保。出版商在已出版地图和机构归属方面的管辖权主张上保持中立。


    本 Apress 印记由注册公司 APress Media, LLC（Springer Nature 旗下）出版。注册公司地址为：1 New York Plaza,
    New York, NY 10004, U.S.A.


    *谨以此书献给我的家人。*


    ## 第二版前言


    尽管在互联网时代，岁月已悄然流逝，但 Go 语言仍然是程序员的首选语言之一。Go 语言征服了容器技术领域，并持续在云原生开发中备受青睐。Go 力求保持自身特色、向后兼容，同时不断添加像泛型这样的新语言特性。诸如模糊测试等工具的改进，使得开发出更安全的应用程序成为可能。


    Go 语言发生了改变，这本书也随之更新。第一版使用的是 Go 1.8，我们现在已更新到 Go 1.18。代码已更新以反映这一新变化。本书中的示例主要旨在展示
    Go 网络编程的特定功能，而不会引入不必要的复杂性，例如管理散落在全书中的多个项目或包；相关的代码仓库可在此处找到：[`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)。


    本书的第一版假定读者熟悉 Go 语言，这一版仍保持此设定。我们稍微扩展了本书中愿意讨论的内容，纳入了更多第三方模块、工具和技术。Jan 坚持将重点放在 Go
    语言本身，而不被整个生态系统分心，这一点是正确的。


    如果你渴望学习如何使用 Go 实现网络编程的概念，我希望这本书能对你有用。


    作为对比，以下是 Jan 为本书第一版所写的原版前言，反映了 2017 年时的 Go 语言状况。


    ## 第一版前言


    学习一门新的编程语言总是充满乐趣，尤其是当它最终成为一门主流语言时。在 2009 年 Go 语言发布之前，我曾在莫纳什大学教授一门硕士级别的网络编程课程。学习一门新语言时，设定一个目标总是好的；但这一次，我没有再编写一个葡萄酒管理程序，而是决定将我的讲义内容围绕
    Go 语言展开，而不是我（当时）惯用的教学工具 Java。


    这个实验效果很好：除了 Go 尚未能匹敌的 Java 库的丰富性之外，所有的编程示例都转移得非常出色，并且在许多情况下比原来的 Java 程序更加优雅。


    这本书就是这一实验的成果。随着 Go 的演进以及如 HTTP/2 等新技术的出现，我一直对本书进行更新。但如果它读起来像一本教科书，嗯，那正是因为它本身就是。网络编程涉及大量的理论和实践概念，本书涵盖了其中一部分，以及使用
    Go 构建系统的实践方法。


    就语言流行度而言，Go 显然在上升。它在 TIOBE 指数中已经升至第 16 位，在 PYPL（编程语言流行度指数）中排名第 18 位，在 RedMonk
    编程语言排名中位列第 15 位。它通常被评为增长最快的语言之一。


    无论是核心语言及其库的开发者，还是独立项目的开发者，其社区都在不断壮大。我试图将本书的范围限定在标准库以及 Go 树的“子仓库”内。虽然这排除了许多无疑能使许多编程任务变得更简单的优秀项目，但将本书限制在官方
    Go 库范围内提供了一个清晰的边界。


    本书假定读者具备基本的 Go 知识。重点在于使用 Go 构建网络应用，而不是语言本身的基础知识。网络应用不同于命令行应用，也不同于具有图形用户界面的应用，等等。因此，第一章讨论了网络程序的架构方面。第二章概述了本书中使用的
    Go 特性。第三章关于套接字的内容涵盖了所有 TCP/IP 系统基础的 Go 版本实现。第四章、第五章和第六章在网络编程书籍中较为不同寻常。它们涵盖了将要使用的数据表示形式、网络交互如何进行，以及对于文本，使用哪些语言格式等主题。接着在第七章，我们探讨日益重要的安全主题。在第八章，我们研究了最常用的应用层协议之一——HTTP。接下来的四章是关于
    HTTP 相关主题以及 HTTP 之上常见的承载数据格式——HTML 和 XML。在第十三章，我们探讨了网络编程的另一种方法——远程过程调用。第十四章和第十五章则进一步讨论了使用
    HTTP 的网络编程方面。


    ## 致谢


    我想对 Jan Newmarch 为本书的合作所做出的贡献表示感谢。这个项目带给我巨大的成就感，也让我实现了心愿清单上期盼已久的一项。我还要感谢 Eldon
    Alameda，他总能以深思熟虑的方式让我意识到自己的不足，并给予我中肯的建议。


    此外，我要感谢 Apress 的合作伙伴们，包括给予机会的 Steve Anglin 和提供指导帮助我完成此书的 Mark Powers。感谢我在 RX-M
    的同事们，包括 Randy Abernethy、Christopher Hanson、Andrew Bassett 和 Anita Wu。我们多年来的工作使我能够参与像本书这样的项目。


    最后，我要感谢我的妻子 Julie 和女儿 Charlotte。当我埋头于电脑前时，Julie 管理家庭的能力无人能及，我对此深表感激。Charlotte
    的活力、能力和创造力激励着我每天都变得更好。


    > —Ronald Petty


    ## 关于作者 关于技术审校者

