    # Unicode


    无论是 ASCII 还是 ISO 8859，都无法覆盖基于象形文字的语言。据估计，中文大约有 20,000 个独立字符，其中约 5,000 个为常用字。这些字符需要一个以上的字节来表示，通常使用两个字节。过去曾出现过许多这样的双字节字符集：中文的
    `Big5`、`EUC-TW`、`GB2312` 和 `GBK/GBX`；日文的 `JIS X 0208` 等等。这些编码通常互不兼容。


    `Unicode` 是一个包罗万象的标准字符集，旨在覆盖所有主流字符集。它包含了欧洲、亚洲、印度以及更多其他字符集。目前版本已更新至 14.0，拥有 144,697
    个已分配字符。其码点总数为 1,114,112（分布在 17 个平面，每个平面 65,536 个码点）。这超过了 2¹⁶，对字符编码产生了重要影响。


    前 256 个码点对应 `ISO 8859-1`，而前 128 个则是 `US ASCII`。因此，它与这些主流字符集向后兼容，因为 `ISO 8859-1`
    和 `ASCII` 的码点在 `Unicode` 中完全相同。其他字符集则并非如此：例如，虽然大多数 `Big5` 字符也存在于 `Unicode` 中，但它们的码点并不相同。网站
    [`http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt`](http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt)
    提供了一个（大型）映射表的示例，该表将 `Big5` 映射到 `Unicode`。


    要在计算机系统中表示 `Unicode` 字符，必须使用一种编码方式。`UCS` 编码是一种使用 `Unicode` 字符码点值的双字节编码。然而，由于 `Unicode`
    中的字符数量过多，无法全部容纳在 2 个字节中，因此该编码已过时且不再使用。取而代之的是以下几种编码：


    - `UTF-32` 是一种 4 字节编码，但并不常用，`HTML5` 明确警告不要使用它。

    - `UTF-16` 将最常见的字符编码为 2 个字节，对于“溢出”部分再增加 2 个字节，其中 `ASCII` 和 `ISO 8859-1` 保持其通常的值。

    - `UTF-8` 每个字符使用 1 到 4 个字节，其中 `ASCII` 保持其通常的值（但 `ISO 8859-1` 不是）。

    - 根据 `Unicode` 规范，`UTF-8`、`UTF-16` 和 `UTF-32` 三者之间完全可互操作。

    - `UTF-7` 有时会被使用，但不常见。


    在选择特定的 `UTF` 编码时需考虑的一些因素^(¹⁰)包括：


    - 如果需要固定宽度和单一码元访问，请使用 `UTF-32`。

    - 如果关注空间问题，请使用 `UTF-16`。

    - `UTF-8` 天然适用于序列化。


    ## UTF-8、Go 与 Rune


    `UTF-8` 是最常用的编码方式。Google 估计，在 2008 年，其扫描的页面中有 50% 使用 `UTF-8` 编码，且这一比例还在增长。`ASCII`
    字符集在 `UTF-8` 中具有相同的编码值，因此 `UTF-8` 读取器既可以读取仅由 `ASCII` 字符组成的文本，也可以读取完整的 `Unicode`
    字符集文本。


    Go 在其字符串中使用 `UTF-8` 编码的字符。每个字符的类型是 `rune`。这是 `int32` 的别名。一个 `Unicode` 字符在 `UTF-8`
    编码中最多可达 4 个字节，因此需要 4 个字节来表示所有字符。就字符而言，字符串是一个 rune 数组，每个 rune 占用 1、2 或 4 个字节。


    字符串也是一个字节数组，但你必须小心：只有对于 `ASCII` 子集，一个字节才等于一个字符。所有其他字符占用 2、3 或 4 个字节。这意味着字符串的字符长度（以
    rune 计）通常与其字节数组的长度不同。只有当字符串仅由 `ASCII` 字符组成时，两者才相等。


    以下程序片段说明了这一点。如果你对一个 `UTF-8` 字符串测试其长度，你会得到底层字节数组的长度。但如果你将字符串转换为 rune 数组 `[]rune`，那么你会得到一个
    `Unicode` 码点数组，这通常就是字符的数量：


    ```

    $ mkdir ch6

    $ cd ch6

    $ vi runeprint.go

    package main

    import "fmt"

    func main() {

    str := "百度一下, 你就知道"

    fmt.Println("String length: ", len([]rune(str)))

    fmt.Println("Byte length: ", len(str))

    }

    ch6$ go run runeprint.go

    String length:  10

    Byte length:  26

    ```


    关于字符串和 rune 的更详细解释，请参阅 Go 官方博客（[`https://go.dev/blog/strings`](https://go.dev/blog/strings)）。


    ### UTF-8 客户端与服务器


    可能令人惊讶的是，无论是在客户端还是服务器端处理 `UTF-8` 文本，你都不需要做任何特殊处理。在 Go 中，`UTF-8` 字符串的底层数据类型是字节数组，正如我们刚才所见，Go
    会负责将字符串按需编码为 1、2、3 或 4 个字节。字符串的长度就是字节数组的长度，因此你只需写入字节数组即可写入任何 `UTF-8` 字符串。


    类似地，要读取一个字符串，你只需读取到一个字节数组中，然后使用 `string([]byte)` 将数组转换为字符串。如果 Go 无法正确地将字节解码为 `Unicode`
    字符，它会给出 Unicode 替换字符 `\uFFFD`。生成的字节数组的长度是字符串合法部分的长度。


    因此，前面章节中给出的客户端和服务器可以完美地处理 `UTF-8` 编码的文本。


    ### ASCII 客户端与服务器


    `ASCII` 字符在 `ASCII` 和 `UTF-8` 中具有相同的编码。因此，普通的 `UTF-8` 字符处理同样适用于 `ASCII` 字符，无需特殊处理。


    ## UTF-16 与 Go


    `UTF-16` 处理的是由 16 位无符号短整数组成的数组。`utf16` 包就是为管理此类数组而设计的。要将一个普通的 Go 字符串（即 `UTF-8`
    字符串）转换为 `UTF-16`，你首先通过强制转换将其转换为 `[]rune` 来提取码点，然后使用 `utf16.Encode` 生成一个 `uint16`
    类型的数组。


    类似地，要将一个无符号短整数 `UTF-16` 值数组解码为 Go 字符串，你需要使用 `utf16.Decode` 将其转换为类型为 `[]rune` 的码点，然后再转换为字符串。以下代码片段说明了这一点：


    ```

    ch6$ vi utf16encodedecode.go

    package main

    import (

    "unicode/utf16"

    "fmt"

    )

    func main() {

    str := "百度一下, 你就知道"

    fmt.Println("Before encoding:", str)

    runes := utf16.Encode([]rune(str))

    ints := utf16.Decode(runes)

    str = string(ints)

    fmt.Println("After encoding:", str)

    }

    ch6$ go run utf16encodedecode.go

    Before encoding: 百度一下, 你就知道

    After encoding: 百度一下, 你就知道

    ```


    客户端或服务器需要适当地应用这些类型转换来读写 16 位短整数，如下所示。


    ### 小端序与大端序


    不幸的是，`UTF-16` 背后隐藏着一个小恶魔。它基本上是一种将字符编码为 16 位短整数的编码方式。关键问题如下：对于每个短整数，如何将其写成两个字节？是高字节在前，还是低字节在前？只要接收方使用与发送方相同的约定，这两种方式都是可行的。


    `Unicode` 通过一个特殊的字符来解决这个问题，即 *BOM*（字节序标记）。这是一个零宽度的非打印字符，因此你永远不会在文本中看到它。但其值（例如
    `0xfffe`）被特意选择，以便你可以判断字节顺序：


    - 在大端序系统中，它是 `FF FE`。

    - 在小端序系统中，它是 `FE FF`。


    文本有时会将 `BOM` 作为文本的第一个字符。读取者随后可以检查这两个字节，以确定使用了哪种字节序。

    '
