- fmt: '# Representations


    A representation of a resource is something that captures some information about
    a resource in some form. For example, a representation of me from my Tax Office
    URI might be my tax returns in Australia. A representation of me from my local
    pizza cafe would be a record of pizza purchases. A representation of me from my
    website would be an HTML document.


    This is one of the keys to REST: URIs identify resources, and requests for that
    resource return a representation of that resource. The resource itself remains
    on the server and is not sent to the client at all. In fact, the resource might
    not even exist at all in any concrete form. For example, a representation might
    be generated from the results of an SQL query that’s triggered by making a request
    to that URI.


    REST does not particularly talk about possibilities for negotiating the representation
    of a resource. HTTP 1.1 has an extensive section on how to do this, considering
    *server*, *client*, and *transparent* negotiation. The `Accept` headers can be
    used by a client to specify, for example:


    ```

    Accept: application/xml; q=1.0, application/json; q=0.5

    Accept-Language: fr

    Accept-Charset: utf8

    ```


    This states that it would prefer the `application/xml` format but will accept
    `application/json`. The server can either accept one of these or reply with the
    formats it will accept.


    # REST Verbs


    You can make certain requests to a URI. If you are making an HTTP request to a
    URL, HTTP defines the requests that can be made: `GET`, `PUT`, `POST`, `DELETE`,
    `HEAD`, `OPTIONS`, `TRACE`, and `CONNECT`, as well as extensions such as `PATCH`.
    There is only a limited number of these! This is very different than what we have
    come to expect from O/O programming. For example, the Java JLabel has about 250
    methods, such as `getText` and `setHorizontalAlignment`. To some degree, we could
    map these OO to/from REST/HTTP; an instance of a JLabel is a resource, and we
    can “get” it via `getText`. While that is easy in some minor cases, it’s not so
    clear how to map all 250 methods, or should we.


    REST is now commonly interpreted as taking just four verbs from HTTP: `GET`, `PUT`,
    `POST`, and `DELETE`. `GET` roughly corresponds to the getter-methods of OO languages,
    while `PUT` roughly corresponds to the setter methods of OOP languages. If a JLabel
    were a REST resource (which it isn’t), how would one single `GET` verb make up
    for the hundred or so getter methods of JLabel?


    The answer lies in the `PATH` component of URIs. A label has the properties of
    text, alignment, and so on. These are really subresources of the label and could
    be written as sub-URIs of the label. So if the label had a URI of [`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label),
    then the subresources could have (example) URIs:


    ```

    http://jan.newmarch.name/my_label/text

    http://jan.newmarch.name/my_label/horizontalAlignment

    ```


    If you want to manipulate just the text of the label, you can use the URI of the
    text resource, not getter/setter methods on the label itself.


    ## The GET Verb


    To retrieve a representation of a resource, you `GET` the resource. This will
    return some representation of the resource. There may be innumerable possibilities
    to this choice. For example, a request for this book’s index might return a representation
    of the index in French, using the UTF-8 character set, as an XML document, or
    many other possibilities. The client and the server can negotiate these possibilities.


    The `GET` verb is required to be *idempotent*. That is, repeated requests should
    return the same results (to within representation type). For example, multiple
    requests for the temperature of a sensor should return the same result (unless
    of course the temperature has changed).


    Idempotency by default allows for caching. This is useful for reducing traffic
    on the Web and may save battery power for sensors. Caching cannot always be guaranteed:
    a resource that returns the number of times it has been accessed will give a different
    result each time it is accessed. This is an unusual behavior and would be signaled
    using the HTTP `Cache-Control` header.


    ## The PUT Verb


    If you want to change the state of a resource, you can `PUT` new values. There
    are two principal limitations to `PUT`:


    *   You can only change the state of a resource whose URI you know.

    *   The representation you send must cover all components of the resource.


    For example, if you only want to change the text in a label, you send the `PUT`
    message to the URL [`http://jan.newmarch.name/my_label/text`](http://jan.newmarch.name/my_label/text),
    *not* to [`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label).
    Sending to the label would require all of the hundred or so fields to be sent.


    `PUT` is idempotent but is not *safe*. That is, it changes the state of the resource,
    but repeated calls change it to the same state.


    `PUT` and `DELETE` are not part of HTML, and most browsers do not support them
    directly. They can be called in browsers with Ajax support. There are several
    discussions as to why they are not included. See, for example, “Why are there
    no PUT and DELETE methods on HTML forms?” at [`http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms`](http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms).


    ## The DELETE Verb


    This deletes the resource. It is idempotent but not safe.


    Safe methods (e.g., `GET`) are ones that have no unexpected side effects. Unsafe
    methods (e.g., `PUT`) can be potentially unsafe. Not having the ability to undo
    a change is something that is unsafe. Ideally, `GET` returns a version of a resource,
    and that’s all. `PUT` will overlay a resource, and if you didn’t retrieve the
    prior version, it may be gone for good.


    Idempotent methods are ones that produce the same side effect for the same request
    no matter how many times you run it. `DELETE` will remove a resource, and if you
    call it the second time, the “outcome” is the same; the resource is either deleted
    (if it is created again) or remains nonexisting.


    For more on the concepts of “idempotent” and “safe,” see [`https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html).'
  raw: '## Representations


    A representation of a resource is something that captures some information about
    a resource in some form. For example, a representation of me from my Tax Office
    URI might be my tax returns in Australia. A representation of me from my local
    pizza cafe would be a record of pizza purchases. A representation of me from my
    website would be an HTML document.


    This is one of the keys to REST: URIs identify resources, and requests for that
    resource return a representation of that resource. The resource itself remains
    on the server and is not sent to the client at all. In fact, the resource might
    not even exist at all in any concrete form. For example, a representation might
    be generated from the results of an SQL query that’s triggered by making a request
    to that URI.


    REST does not particularly talk about possibilities for negotiating the representation
    of a resource. HTTP 1.1 has an extensive section on how to do this, considering
    *server*, *client*, and *transparent* negotiation. The `Accept` headers can be
    used by a client to specify, for example:


    ```

    Accept: application/xml; q=1.0, application/json; q=0.5

    Accept-Language: fr

    Accept-Charset: utf8

    ```


    This states that it would prefer the `application/xml` format but will accept
    `application/json`. The server can either accept one of these or reply with the
    formats it will accept.


    ## REST Verbs


    You can make certain requests to a URI. If you are making an HTTP request to a
    URL, HTTP defines the requests that can be made: `GET`, `PUT`, `POST`, `DELETE`,
    `HEAD`, `OPTIONS`, `TRACE`, and `CONNECT`, as well as extensions such as `PATCH`.
    There is only a limited number of these! This is very different than what we have
    come to expect from O/O programming. For example, the Java JLabel has about 250
    methods, such as `getText` and `setHorizontalAlignment`. To some degree, we could
    map these OO to/from REST/HTTP; an instance of a JLabel is a resource, and we
    can “get” it via “getText”. While that is easy in some minor cases, it’s not so
    clear how to map all 250 methods, or should we.


    REST is now commonly interpreted as taking just four verbs from HTTP: `GET`, `PUT`,
    `POST`, and `DELETE. GET` roughly corresponds to the getter-methods of OO languages,
    while `PUT` roughly corresponds to the setter methods of OOP languages. If a JLabel
    were a REST resource (which it isn’t), how would one single `GET` verb make up
    for the hundred or so getter methods of JLabel?


    The answer lies in the `PATH` component of URIs. A label has the properties of
    text, alignment, and so on. These are really subresources of the label and could
    be written as sub-URIs of the label. So if the label had a URI of [`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label),
    then the subresources could have (example) URIs:


    ```

    http://jan.newmarch.name/my_label/text

    http://jan.newmarch.name/my_label/horizontalAlignment

    ```


    If you want to manipulate just the text of the label, you can use the URI of the
    text resource, not getter/setter methods on the label itself.


    ### The GET Verb


    To retrieve a representation of a resource, you `GET` the resource. This will
    return some representation of the resource. There may be innumerable possibilities
    to this choice. For example, a request for this book’s index might return a representation
    of the index in French, using the UTF-8 character set, as an XML document, or
    many other possibilities. The client and the server can negotiate these possibilities.


    The `GET` verb is required to be *idempotent*. That is, repeated requests should
    return the same results (to within representation type). For example, multiple
    requests for the temperature of a sensor should return the same result (unless
    of course the temperature has changed).


    Idempotency by default allows for caching. This is useful for reducing traffic
    on the Web and may save battery power for sensors. Caching cannot always be guaranteed:
    a resource that returns the number of times it has been accessed will give a different
    result each time it is accessed. This is an unusual behavior and would be signaled
    using the HTTP `Cache-Control` header.


    ### The PUT Verb


    If you want to change the state of a resource, you can `PUT` new values. There
    are two principal limitations to `PUT`:


    *   You can only change the state of a resource whose URI you know.


    *   The representation you send must cover all components of the resource.


    For example, if you only want to change the text in a label, you send the `PUT`
    message to the URL [`http://jan.newmarch.name/my_label/text`](http://jan.newmarch.name/my_label/text),
    *not* to [`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label).
    Sending to the label would require all of the hundred or so fields to be sent.


    `PUT` is idempotent but is not *safe*. That is, it changes the state of the resource,
    but repeated calls change it to the same state.


    `PUT` and `DELETE` are not part of HTML, and most browsers do not support them
    directly. They can be called in browsers with Ajax support. There are several
    discussions as to why they are not included. See, for example, “Why are there
    no PUT and DELETE methods on HTML forms?” at [`http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms`](http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms).


    ### The DELETE Verb


    This deletes the resource. It is idempotent but not safe.


    Safe methods (e.g., GET) are ones that have no unexpected side effects. Unsafe
    methods (e.g., PUT) can be potentially unsafe. Not having the ability to undo
    a change is something that is unsafe. Ideally, GET returns a version of a resource,
    and that’s all. PUT will overlay a resource, and if you didn’t retrieve the prior
    version, it may be gone for good.


    Idempotent methods are ones that produce the same side effect for the same request
    no matter how many times you run it. DELETE will remove a resource, and if you
    call it the second time, the “outcome” is the same; the resource is either deleted
    (if it is created again) or remains nonexisting.


    For more on the concepts of “idempotent” and “safe,” see [`https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html).'
  trans: '

    # 表述（Representations）


    资源的表述是指以某种形式捕捉资源相关信息的东西。例如，从税务局 URI 获取的我的表述可能是我的澳大利亚纳税申报单；从本地披萨店获取的我的表述则可能是一份披萨购买记录；而从我自己的网站获取的我的表述则是一个
    HTML 文档。


    这就是 REST 的关键之一：URI 标识资源，对资源的请求返回该资源的表述。资源本身保留在服务器上，根本不会被发送到客户端。事实上，资源甚至可能根本不存在任何具体的形态。例如，一个表述可能是通过访问某个
    URI 触发的 SQL 查询结果生成的。


    REST 并没有专门讨论协商资源表述的可能性。HTTP 1.1 有一个专门章节详细说明了如何实现这一点，涉及*服务器*、*客户端*和*透明*协商。客户端可以使用`Accept`头来指定偏好，例如：


    ```

    Accept: application/xml; q=1.0, application/json; q=0.5

    Accept-Language: fr

    Accept-Charset: utf8

    ```


    这表明客户端优先选择`application/xml`格式，但也接受`application/json`。服务器可以接受其中一种格式，或者回复它愿意接受的格式。


    # REST 动词（REST Verbs）


    你可以对 URI 发出特定的请求。如果你在向某个 URL 发送 HTTP 请求，HTTP 定义了可以发出的请求类型：`GET`、`PUT`、`POST`、`DELETE`、`HEAD`、`OPTIONS`、`TRACE`和`CONNECT`，以及像`PATCH`这样的扩展。这些动词的数量非常有限！这与我们对面向对象（O/O）编程的预期截然不同。例如，Java
    的 JLabel 有大约 250 个方法，比如`getText`和`setHorizontalAlignment`。在某种程度上，我们可以将这些 OO 方法与
    REST/HTTP 进行映射；一个 JLabel 实例就是一个资源，我们可以通过`getText`来“获取”它。虽然这在某些简单情况下很容易做到，但如何映射全部
    250 个方法，或者是否应该映射，就不那么明确了。


    现在，REST 通常被理解为仅使用 HTTP 中的四个动词：`GET`、`PUT`、`POST`和`DELETE`。`GET`大致对应于 OO 语言中的 getter
    方法，而`PUT`则大致对应于 OOP 语言中的 setter 方法。如果一个 JLabel 是一个 REST 资源（事实并非如此），那么单一的`GET`动词如何能替代
    JLabel 中上百个 getter 方法呢？


    答案在于 URI 的`PATH`组件。一个标签包含文本、对齐方式等属性。这些实际上是标签的子资源，可以写成标签的子 URI。因此，如果标签的 URI 是[`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label)，那么子资源可以有（举例）以下
    URI：


    ```

    http://jan.newmarch.name/my_label/text

    http://jan.newmarch.name/my_label/horizontalAlignment

    ```


    如果你只想操作标签的文本，你可以使用文本资源的 URI，而不是在标签本身上使用 getter/setter 方法。


    ## GET 动词


    要获取资源的表述，你可以对资源执行`GET`操作。这将返回资源的某种表述。对于这种选择，可能性是无穷无尽的。例如，请求本书的索引可能会返回一个使用 UTF-8
    字符集、以 XML 文档形式呈现的法语索引表述，或者许多其他可能性。客户端和服务器可以协商这些可能性。


    `GET`动词必须是*幂等*的。也就是说，重复请求应返回相同的结果（在表述类型范围内）。例如，多次请求传感器的温度应返回相同的结果（除非温度当然已经改变）。


    默认情况下，幂等性允许缓存。这有助于减少网络流量，并可能为传感器节省电池电量。缓存并非总能得到保证：一个返回其被访问次数的资源，每次被访问时都会给出不同的结果。这是一种不常见的行为，会通过
    HTTP 的`Cache-Control`头部来标识。


    ## PUT 动词


    如果你想改变资源的状态，你可以使用`PUT`来提交新的值。`PUT`有两个主要限制：


    *   你只能更改你知道其 URI 的资源的状态。

    *   你发送的表述必须涵盖资源的所有组成部分。


    例如，如果你只想更改标签中的文本，你应将`PUT`消息发送到 URL [`http://jan.newmarch.name/my_label/text`](http://jan.newmarch.name/my_label/text)，*而不是*发送到[`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label)。发送给标签则需要发送所有上百个字段。


    `PUT`是幂等的，但不是*安全的*。也就是说，它会改变资源的状态，但重复调用会将其改为相同的状态。


    `PUT`和`DELETE`不是 HTML 的一部分，大多数浏览器不直接支持它们。它们可以在支持 Ajax 的浏览器中被调用。关于为何不包含它们，有几个讨论。例如，请参阅
    [`http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms`](http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms)
    上的 “为什么 HTML 表单中没有 PUT 和 DELETE 方法？”。


    ## DELETE 动词


    这会删除资源。它是幂等的，但不安全。


    安全方法（例如`GET`）是指没有意外副作用的方法。不安全方法（例如`PUT`）可能具有潜在风险。无法撤销更改就是一件不安全的事情。理想情况下，`GET`返回资源的某个版本，仅此而已。`PUT`会覆盖资源，如果你没有检索先前的版本，它可能会永远消失。


    幂等方法是指无论执行多少次，对同一请求产生相同副作用的方法。`DELETE`会移除一个资源，如果你第二次调用它，“结果”是相同的；该资源要么被删除（如果它被再次创建），要么保持不存在状态。


    有关“幂等”和“安全”概念的更多信息，请参阅 [`https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)。

    '
- fmt: '### The POST Verb


    `POST` is the do-everything-else verb to deal with situations not covered by the
    other verbs. There is agreement about two uses of `POST`:


    - If you want to create a new resource and you don’t know its URI, then `POST`
    a representation of the resource to a URI that knows how to create the resource.
    The returned representation should contain the URI of the new resource. *This
    is important*. To interact with a new resource, you must know its URI, and the
    return from `POST` tells you that.

    - If a resource has many attributes and you only want to change one or a few of
    them, then `POST` a representation with the changed values only.


    There is intense argument about the respective roles of `PUT` and `POST` in edge
    cases. If you want to create a new resource and *do* know the URI it will have,
    then you could use either `PUT` or `POST`. Which one you choose seems to depend
    on other factors.


    SOAP was designed as an RPC system on top of HTTP. It uses `POST` for *everything*.
    HTML continues to use `POST` in forms when it should have the option of using
    `PUT`. For these reasons, I do not use `POST` unless I absolutely have to. I suppose
    others have their own principled reasons for using `POST` instead of `PUT`, but
    I have no idea what they might be :-).


    Due to its open-ended scope, `POST` could be used for almost anything. Many of
    these uses could be against the REST model, as is amply illustrated by SOAP. But
    some of these uses could be legitimate. `POST` is usually non-idempotent and not
    safe, although particular cases could be either. The following Stack Overflow
    post contains a thoughtful discussion on `PUT` vs. `PATCH` vs. `POST`: [`https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios`](https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios).


    ### No Maintained State (That Is, Stateless)


    Let’s establish this up front: cookies are out. Cookies are often used to track
    the state of a user through an interaction with a server, with a typical example
    being a shopping cart. A structure is created on the server side, and a cookie
    is returned to be used to signal that this is the shopping cart to be used.


    REST made the decision not to maintain any client state on the server. This simplifies
    interactions and also sidesteps the tricky issues of how to restore consistency
    after the client or server has crashed. If the server doesn’t need to maintain
    any state, then it leads to a more robust server model. Often, security-related
    items are set in a cookie. A REST endpoint should return representations of those
    resources. An authentication-related cookie often transcends those resources,
    hence not RESTful. More on this topic can be found here: [`https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2`](https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2).


    If you can’t use cookies, what do you do? It’s actually trivial: a cart is created
    on the server. Under REST, that can only happen in response to a `POST` request,
    which returns a new URI for the new resource. So that is what you use `–` the
    new URI. You can `GET`, `PUT`, `POST`, and `DELETE` to this URI, to do all things
    you want to do directly on the resource without having to do workarounds with
    cookies.


    ### HATEOAS


    HATEOAS stands for “Hypermedia as the Engine of Application State.” It is generally
    recognized as an awful acronym, but it has stuck. The basic principle is that
    navigating from one URI to another, which is related in some way, should not be
    done by any out-of-band mechanism but that the new link must be embedded in some
    way as a hyperlink within the representation of the first URI. This is a key feature
    of REST, often not done.


    REST does not state the format of the links. They could be given using the HTML
    link tag, by URLs embedded in a PDF document, or by links given in an XML document.
    Formats that do not have simple representations for URLs are not considered as
    hypermedia languages and are not contained in REST.


    Also, REST also does not explicitly state the meanings of the links nor how to
    extract the appropriate links. Fielding states in his blog “REST APIs must be
    hypertext-driven” at [`http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven`](http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven):


    - A REST API should be entered with no prior knowledge beyond the initial URI
    (bookmark) and set of standardized media types that are appropriate for the intended
    audience (i.e., expected to be understood by any client that might use the API).
    From that point on, all application state transitions must be driven by client
    selection of server-provided choices that are present in the received representations
    or implied by the user’s manipulation of those representations.


    IANA maintains a registry of relation types (IANA: Link Relations at [`http://www.iana.org/assignments/link-relations/link-relations.xhtml`](http://www.iana.org/assignments/link-relations/link-relations.xhtml))
    that can be used. The Web Linking RFC 5988 describes the web linking registry
    ([`https://datatracker.ietf.org/doc/html/rfc5988`](https://datatracker.ietf.org/doc/html/rfc5988)).
    The HTML5 specification has a small number of defined relations and points to
    Microformats `rel` values at [`http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions`](http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions)
    for a larger list. These documents, while helpful, are not immediately actionable.
    We will look at an example in a moment.


    Mechanisms such as cookies, or external API specifications such as WSDL for SOAP,
    are effectively excluded by REST. They are not hyperlinks contained in the representation
    of a resource. HATEOAS will decouple the client from the server by allowing dynamic
    discovery beyond a well-known URI; allowing us to independently evolve the API.
    This is unlike RPCs where the IDL drives the interface.'
