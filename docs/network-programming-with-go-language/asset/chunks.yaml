- fmt: '# Representing Links


    Links are standardized in HTML documents. The `Link` tag defines an HTML element
    that can only appear in an HTML header section. For example, a book with chapters,
    etc., might look like this if the links were given as HTML `link` elements:


    ```

    ...

    ```


    Link relations in HTML are of two types: those that are needed for the current
    document such as CSS files and those that point to related resources, as before.
    The first type is generally downloaded invisibly to the user. The second type
    is generally not shown by browsers, but user agents following HATEOAS principles
    will use them.


    XML has a variety of link specifications. These include XLink and Atom. Atom seems
    to be more popular.


    Links based on XLink would appear as follows:


    ```

    ...

    ...

    ```


    Links based on Atom would appear as follows:


    ```

    ...

    ...

    ```


    For JSON, the format is not normalized. The REST cookbook (`http://restcookbook.com/Mediatypes/json/`)
    notes the lack of standardization and points to the W3C specification JSON-LD
    1.0: "A JSON-based Serialization for Linked Data" and to the HAL (Hypertext Application
    Language). Bodies such as the Open Connectivity Foundation seem to use their own
    home-grown format, but that is for CoAP, another REST-based system.


    JSON-LD uses the term `@id` to signal a URL, as in


    ```

    {

    "name": Jan Newmarch:,

    "homepage": {"@id": "https://jan.newmarch.name/"}

    }

    ```


    It is worth noting in this regard that the W3C also has a specification of an
    HTTP Link header at `https://www.w3.org/wiki/LinkHeader`, which may be returned
    by a server to a client. This is used by JSON-LD, for example, to point to a specification
    of the JSON document contained in the body of an HTTP response. Also of interest,
    some implementations treat the HTML Link or HTTP Header in the same way.


    This can affect the serialization method in passing link information from servers
    to user agents. The user agent and server must agree on the format to be used.
    For HTML (or XHTML), this is standardized. For XML, a reference can be made in
    the document to the linking system. For JSON-LD, this can be signaled in the `Accept
    HTTP` header as `application/ld+json`.


    # Transactions with REST


    How does REST handle transactions and indeed any other types of processes? They
    were not discussed in the original thesis by Fielding.


    The Wikipedia entry for HATEOAS gives a poor example of managing transactions.
    It starts from an HTTP request like this.


    ```

    GET /accounts/12345 HTTP/1.1

    Host: bank.example.org

    Accept: application/json

    ...

    ```


    Which returns a JSON document as a representation of the account as follows.


    ```

    HTTP/1.1 200 OK

    {

    "account": {

    "account_number": 12345,

    "balance": {

    "currency": "usd",

    "value": 100.00

    },

    "links": {

    "deposits": "/accounts/12345/deposits",

    "withdrawals": "/accounts/12345/withdrawals",

    "transfers": "/accounts/12345/transfers",

    "close-requests": "/accounts/12345/close-requests"

    }

    }

    }

    ```


    If we asked for xml, we would see the following.


    ```

    Content-Type: application/xml

    Content-Length: ...


    100.00


    ```


    This gives the URIs of the related resources deposit, withdraw, transfer, and
    close. However, the resources are *verbs,* not *nouns,* and that is not good at
    all. How do they interact with the HTTP verbs? Do you `GET` a withdraw? `POST`
    it? `PUT` it? What happens if you `DELETE` a withdraw – is that supposed to roll
    back a transaction or what? In REST, we try to avoid using verbs as a resource;
    however, in RPC, it is not disallowed to have verbs as an endpoint/procedure call.


    The better way, as discussed in, for example, the Stack Overflow post “Transactions
    in REST?” (see `http://stackoverflow.com/questions/147207/transactions-in-rest`)
    is to `POST` to the account asking for a new transaction to be created:


    ```

    POST /account/12345/transaction HTTP/1.1

    ```


    This will return the URL of a new transaction:


    ```

    http://bank.example.org/account/12345/txn123

    ```


    Interactions are now carried out with this transaction URL, such as by `PUT`ing
    a new value that performs and commits the transaction. Here, we use XML.


    ```

    PUT /account/12345/txn123


    /account/56789


    ```


    A more detailed discussion of transactions and REST is given by Mihindukulasooriya
    et al. in “Seven Challenges for RESTful Transaction Models” (see `http://ws-rest.org/2014/sites/default/files/wsrest2014_submission_4.pdf`).
    Similar models are proposed for managing processes that aren’t just single step.
    From the preceding PDF, we can get an idea of the types of things to consider
    when designing our RESTful APIs to provide transaction abilities.


    ## Table 14-2 Analysis of existing RESTful transaction models


    | Property | Transaction models |

    | --- | --- |

    | | 1 | 2 | 3 | 4 | 5 | 6 | 7 |

    | Transaction properties |

    | Atomicity | T | T | T¹ | T | T | T | T |

    | Isolation | T | T² | F | T | F | F | T |

    | REST constraints |

    | Uniform interfaces | T | F | T | T | T | T | T |

    | Statelessness | T | T³ | F | T³ | F | T | T |

    | HATEOAS | F | F | F | T | F | T | F |

    | HTTP-related properties |

    | Semantics not violated | T | T | T | T | F | T | T |

    | Common verbs supported | T | T | F | F | T | T | T |

    | Low overhead | T | T | T | F | F | T | T |

    | Miscellaneous properties |

    | Optionality | T | ? | ? | T | ? | ? | F |

    | Discoverable | ? | ? | ? | T | ? | ? | T |

    | Distributed transactions | X | X | T | ? | T | T | ? |

    | Theoretical proofs | ? | ? | ? | T | T | T | ? |

    | Implementation available | T | ? | ? | T | ? | T | T |

    | Performance evaluation | ? | ? | ? | ? | ? | T | ? |

    | Legend - T True / F False / ? Unknown or not defined in the model |

    | 1 – Given the actions can be compensated 2 – Possible lost update problem 3
    – See Section 3.3 |


    ## Table 14-1 RESTful transaction models


    | Key | Year | Transaction Model |

    | --- | --- | --- |

    | 1 | ~2000 | Batched transactions with overloaded POST |

    | 2 | 2007 | Transaction as resources |

    | 3 | 2009 | Optimistic technique for transactions using REST |

    | 4 | 2009 | A consistent and recoverable RESTful transaction model |

    | 5 | 2010 | Timestamp-based two-phase commit protocol for RESTful services |

    | 6 | 2011 | Try-Cancel/Confirm Pattern |

    | 7 | 2012 | Atomic REST batched transactions |'
