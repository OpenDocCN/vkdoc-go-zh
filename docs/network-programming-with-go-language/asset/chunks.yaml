  trans: '

    ## `gorilla/mux`


    我们通过学习 `mux` 包来开始了解 Gorilla。`mux` 包旨在与标准库中现有的 `Serve` 类型协同工作。


    ```

    ch16$ vi gmux.go

    package main

    import (

    "net/http"

    "github.com/gorilla/mux"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    r.HandleFunc("/articles", buildHandler("ArticlesHandler"))

    http.ListenAndServe(":8080", r)

    }

    ```


    根据我们已知的知识，通过覆盖 `ListenAndServe` 的最后一个参数，我们实际上是用自己的路由器（在 mux 的语境中称为 `Router`）覆盖了默认的
    `ServeMux`。


    ```

    ch16$ go mod init ch16.example.com

    ch16$ go mod tidy

    ch16$ go run gmux.go

    ```


    接下来的测试有望证明一切并未发生太大变化。


    ```

    ch16$ curl localhost:8080/articles

    ArticlesHandler

    ch16$ curl localhost:8080/

    HomeHandler

    ```


    如果我们审视 `Router` 的代码，特别是其 `ServerHTTP` 方法，我们就能确认路由映射现在由 Gorilla 的 `mux` 负责处理。


    ```

    ~/ch16$ go doc --src mux Router.ServeHTTP

    package mux // import "github.com/gorilla/mux"

    // ServeHTTP 分发在匹配路由中注册的处理器。

    //

    // 当匹配成功时，可以通过调用 mux.Vars(request) 来获取路由变量。

    func (r *Router) ServeHTTP(w http.ResponseWriter, req *http.Request) {

    if !r.skipClean {

    path := req.URL.Path

    if r.useEncodedPath {

    path = req.URL.EscapedPath()

    }

    // 清理路径为标准形式并进行重定向。

    if p := cleanPath(path); p != path {

    // 增加了 3 行代码 (Philip Schlump) - 修复了丢失查询字符串和 #whatever 的问题。

    // 这与 Go 1.2 r.c.4 中针对相同问题的修复一致。Go Issue:

    // http://code.google.com/p/go/issues/detail?id=5252

    url := *req.URL

    url.Path = p

    p = url.String()

    w.Header().Set("Location", p)

    w.WriteHeader(http.StatusMovedPermanently)

    return

    }

    }

    var match RouteMatch

    var handler http.Handler

    if r.Match(req, &match) {

    handler = match.Handler

    req = requestWithVars(req, match.Vars)

    req = requestWithRoute(req, match.Route)

    }

    if handler == nil && match.MatchErr == ErrMethodMismatch {

    handler = methodNotAllowedHandler()

    }

    if handler == nil {

    handler = http.NotFoundHandler()

    }

    handler.ServeHTTP(w, req)

    }

    ```


    ## 为什么要关注


    到目前为止，我们似乎并没有为已经提供的 `DefaultServeMux` 增添任何价值。然而，表象是会骗人的。根据 `ServeMux` 的文档，我们似乎只能轻松解析“路径”来做出路由决策。我们能否基于其他条件（除了路径）来匹配请求，比如查询参数或
    HTTP 头部信息？没有 Gorilla 我们也能够访问这些内容；但我们缺少一种结构化的使用方式。


    请求可以根据以下条件进行匹配：


    - URL 主机名 (`example.com`)

    - 路径 (`/about`)

    - 路径前缀 (`/animals/cats`)

    - 模式（已提交表单值）

    - HTTP 头部信息 (`Content-Type: text/html; charset=UTF-8`)

    - 查询参数 (`?key=value&dog=cat`)

    - HTTP 方法 (`GET /search?q=test HTTP/2`)

    - 自定义匹配器（自定义函数）


    Gorilla 的一个优秀特性是能够使用链式调用来关联多个匹配元素。下面是一个示例，通过使用各种匹配器来修改我们之前的例子。


    ```

    ~/ch16$ vi gmux.go

    package main

    import (

    "github.com/gorilla/mux"

    "net/http"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    r.HandleFunc("/articles", buildHandler("ArticlesHandler")).Host("example.com").Methods("GET").Schemes("http")

    http.ListenAndServe(":8080", r)

    }

    ```


    运行服务器。


    ```

    ~/ch16$ go run gmux.go

    ```


    现在我们来测试我们新增和已有的路由；注意 `/articles` 现在受到特定域名、方法和模式的限制。


    ```

    ~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX GET http://example.com:8080/articles

    HTTP/1.1 200 OK

    Date: Mon, 07 Mar 2022 18:40:46 GMT

    Content-Length: 15

    Content-Type: text/plain; charset=utf-8

    ~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX POST http://example.com:8080/articles

    HTTP/1.1 405 Method Not Allowed

    Date: Mon, 07 Mar 2022 18:40:54 GMT

    Content-Length: 0

    ~/ch16$ curl 127.0.0.1:8080/articles

    404 page not found

    ~/ch16$

    ```


    以下是官方文档中的一些示例：


    - `r.PathPrefix("/products/")`

    - `r.Methods("GET", "POST")`

    - `r.Schemes("https")`

    - `r.Headers("X-Requested-With", "XMLHttpRequest")`

    - `r.Queries("key", "value")`

    - `r.MatcherFunc(func(r *http.Request, rm *RouteMatch) bool { return r.ProtoMajor
    == 0 })`


    再次强调，使用标准库也能实现所有这些功能（很多开发者认为你应该这么做），但手头有一个现成的工具包会让选择变得更容易。Gorilla `mux` 的功能远不止于此。我们的目标是突出它与标准库的关系以及它是如何进行扩展（提供额外功能）的。你可以在这里了解更多：[`https://github.com/gorilla/mux`](https://github.com/gorilla/mux)。

    '
- fmt: '# Gorilla Handlers


    Gorilla provides a set of handlers in the `"handlers"` package. Sticking with
    the theme, ease of use, it includes the following handlers for us to use in our
    middleware chain.


    Here are the official descriptions:


    * `LoggingHandler`: For logging HTTP requests in the Apache Common Log Format

    * `CombinedLoggingHandler`: For logging HTTP requests in the Apache Combined Log
    Format commonly used by both Apache and Nginx

    * `CompressHandler`: For gzipping responses

    * `ContentTypeHandler`: For validating requests against a list of accepted content
    types

    * `MethodHandler`: For matching HTTP methods against handlers in a `map[string]http.Handler`

    * `ProxyHeaders`: For populating `r.RemoteAddr` and `r.URL.Scheme` based on the
    `X-Forwarded-For`, `X-Real-IP`, `X-Forwarded-Proto`, and RFC7239 `Forwarded` headers
    when running a Go server behind an HTTP reverse proxy

    * `CanonicalHost`: For redirecting to the preferred host when handling multiple
    domains (i.e., multiple CNAME aliases)

    * `RecoveryHandler`: For recovering from unexpected panics


    Let''s take a look at a couple of these, starting with the `LoggingHandlers`.


    ```

    ~/ch16$ go get github.com/gorilla/handlers

    ~/ch16$ go doc handlers.LoggingHandler

    package handlers // import "github.com/gorilla/handlers"

    func LoggingHandler(out io.Writer, h http.Handler) http.Handler

    LoggingHandler return a http.Handler that wraps h and logs requests to out

    in Apache Common Log Format (CLF).

    See http://httpd.apache.org/docs/2.2/logs.html#common for a description of

    this format.

    LoggingHandler always sets the ident field of the log to -

    Example:

    r := mux.NewRouter()

    r.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte("This is a catch-all route"))

    })

    loggedRouter := handlers.LoggingHandler(os.Stdout, r)

    http.ListenAndServe(":1123", loggedRouter)

    ```


    Let''s copy our original example adding this middleware.


    ```

    ~/ch16$ cat logging.go

    package main

    import (

    "github.com/gorilla/mux"

    "github.com/gorilla/handlers"

    "os"

    "net/http"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    r.HandleFunc("/articles", buildHandler("ArticlesHandler")).Host("example.com").Methods("GET").Schemes("http")

    loggedRouter := handlers.LoggingHandler(os.Stdout, r)

    http.ListenAndServe(":8080", loggedRouter)

    }

    ```


    Notice the chaining in the preceding code. Instead of passing the router object
    to `ListenAndServe`, we pass it to `LoggingHandler`, which chains it. We then
    use its result, a `ServeMux` satisfying object to `ListenAndServe`.


    If you run the server and access from another terminal, you will see a request
    and response information logged.


    ```

    ~/ch16$ go run logging.go

    ~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX GET http://example.com:8080/articles

    HTTP/1.1 200 OK

    Date: Sun, 03 Apr 2022 04:38:07 GMT

    Content-Length: 15

    Content-Type: text/plain; charset=utf-8

    ```


    Back on the server, we see


    ```

    127.0.0.1 - - [07/Mar/2022:19:04:20 +0000] "GET /articles HTTP/1.1" 200 15

    ```


    This format is defined here: [`http://httpd.apache.org/docs/2.2/logs.html#common`](http://httpd.apache.org/docs/2.2/logs.html#common).
    You will notice we have another handler called `CombinedLoggingHandler`; this
    format is defined here: [`http://httpd.apache.org/docs/2.2/logs.html#combined`](http://httpd.apache.org/docs/2.2/logs.html#combined).
    Here is a brief comparison of the formats.


    * Common `– "%h %l %u %t \"%r\" %>s %b"`

    * Combined `– "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-agent}i\""`


    We now try an example of the `ContentTypeHandler` handler.


    ```

    ~/ch16$ go doc handlers.ContentTypeHandler

    package handlers // import "github.com/gorilla/handlers"

    func ContentTypeHandler(h http.Handler, contentTypes ...string) http.Handler

    ContentTypeHandler wraps and returns a http.Handler, validating the request

    content type is compatible with the contentTypes list. It writes a HTTP 415

    error if that fails.

    Only PUT, POST, and PATCH requests are considered.

    ```


    Take note, it only works for a subset of HTTP methods (ones that create/update);
    others are passed through silently.


    ```

    ~/ch16$ cat contenttype.go

    package main

    import (

    "github.com/gorilla/handlers"

    "github.com/gorilla/mux"

    "net/http"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    l := handlers.ContentTypeHandler(http.HandlerFunc(func(w http.ResponseWriter,
    r *http.Request) {

    w.Write([]byte("json articles only"))

    }), "application/json")

    r.Handle("/articles", l)

    http.ListenAndServe(":8080", r)

    }

    ```


    We can see for the `"/articles"` route, we want to make sure any data being uploaded
    has a json content type.


    ```

    ~/ch16$ go run contenttype.go

    ```


    Here, we exercise the expected catching (validate `"application/json"` on POST)
    and where we ignore it.


    ```

    ~/ch16$ curl -IX POST -H ''Content-Type: application/json'' 127.0.0.1:8080/articles

    HTTP/1.1 200 OK

    Date: Mon, 07 Mar 2022 19:28:04 GMT

    Content-Length: 18

    Content-Type: text/plain; charset=utf-8

    ~/ch16$ curl -IX POST -H ''Content-Type: application/xml'' 127.0.0.1:8080/articles

    HTTP/1.1 415 Unsupported Media Type

    Content-Type: text/plain; charset=utf-8

    X-Content-Type-Options: nosniff

    Date: Mon, 07 Mar 2022 19:28:11 GMT

    Content-Length: 81

    ~/ch16$ curl -IX GET -H ''Content-Type: application/xml'' 127.0.0.1:8080/articles

    HTTP/1.1 200 OK

    Date: Mon, 07 Mar 2022 19:28:20 GMT

    Content-Length: 18

    Content-Type: text/plain; charset=utf-8

    ```


    The handlers can be used per route, or all routes. Other handlers are available;
    review the documentation to see them: `go doc gorilla/handlers | grep ^func`.


    # Additional Gorilla Examples


    What remains is a sampling of Gorilla packages demoing their primary mechanics.
    For our purpose, we try to focus on how it compares or contrasts to the standard
    library offerings.'
