    // from protoconn_test.go

    ...

    func TestTCPConnSpecificMethods(t *testing.T) {

    la, err := ResolveTCPAddr("tcp4", "127.0.0.1:0")

    if err != nil {

    t.Fatal(err)

    }

    ln, err := ListenTCP("tcp4", la)

    if err != nil {

    t.Fatal(err)

    }

    ch := make(chan error, 1)

    handler := func(ls *localServer, ln Listener) { ls.transponder(ls.Listener, ch)
    }

    ls := (&streamListener{Listener: ln}).newLocalServer()

    defer ls.teardown()

    if err := ls.buildup(handler); err != nil {

    t.Fatal(err)

    }

    ra, err := ResolveTCPAddr("tcp4", ls.Listener.Addr().String())

    if err != nil {

    t.Fatal(err)

    }

    c, err := DialTCP("tcp4", nil, ra)

    if err != nil {

    t.Fatal(err)

    }

    defer c.Close()

    c.SetKeepAlive(false)

    c.SetKeepAlivePeriod(3 * time.Second)

    c.SetLinger(0)

    c.SetNoDelay(false)

    c.LocalAddr()

    c.RemoteAddr()

    c.SetDeadline(time.Now().Add(someTimeout))

    c.SetReadDeadline(time.Now().Add(someTimeout))

    c.SetWriteDeadline(time.Now().Add(someTimeout))

    if _, err := c.Write([]byte("TCPCONN TEST")); err != nil {

    t.Fatal(err)

    }

    rb := make([]byte, 128)

    if _, err := c.Read(rb); err != nil {

    t.Fatal(err)

    }

    for err := range ch {

    t.Error(err)

    }

    }

    ...

    ```


    The test itself is focused on setting a variety of client connection-related options,
    then uses the client, and in turn hopes nothing goes wrong. From our point of
    view, we are interested in how they wrote the test itself. We are down in the
    L3/L4 layers of the stack. At a high level, here is what is happening:


    *   Preparing and validating a known IP Address (i.e., `127.0.0.1`) and port (`:0`)

    *   Create a TCP-based Listener.

    *   Launch the server (more to follow).

    *   Retrieve the IP and assigned port of the server.

    *   Create a client using the remote address.

    *   Configure client.

    *   Write data from client to server and then read the result.


    Running the `TestTCPConnSpecificMethods` test, we see the following:


    ```

    net$ go test -test.count=1 -v -test.run "TestTCPConnSpecificMethods$"

    === RUN   TestTCPConnSpecificMethods

    --- PASS: TestTCPConnSpecificMethods (0.00s)

    PASS

    Socket statistical information:

    (inet4, stream, default): opened=2 connected=1 listened=1 accepted=1 closed=3
    openfailed=0 connectfailed=1 listenfailed=0 acceptfailed=1 closefailed=0

    ok      net 0.210s

    ```


    The middle of the test looks more complicated than what we have seen before.


    ```

    ch := make(chan error, 1)

    handler := func(ls *localServer, ln Listener) { ls.transponder(ls.Listener, ch)
    }

    ls := (&streamListener{Listener: ln}).newLocalServer()

    defer ls.teardown()

    if err := ls.buildup(handler); err != nil {

    t.Fatal(err)

    }

    ```


    The preceding code is defined elsewhere: `mockserver_test.go`. The call to `buildup`
    runs the handler code in a Go routine. At a high level, `Accept` is run in the
    `transponder`, so why not just a “nonmock” setup? Upon further review, you see
    `someTimeout` being applied to most timeout-related settings (i.e., `SetDeadline`).
    Interesting enough, since the code lives in a file ending with `_test.go`, we
    cannot review it via `go doc`.


    Review `$(go env GOROOT)/src/net/mockserver_test.go` for more details.


    ## Conclusion


    This chapter was intended to get you thinking about the techniques and layers
    involved when testing network related code. Additional concepts and tooling are
    needed to become expert network test developers. For example, how can fuzzing
    or generics help secure and streamline our code. What should we consider when
    integration tests get more complicated, for example where we chain several network
    services together, even when the protocol changes along the way.'
