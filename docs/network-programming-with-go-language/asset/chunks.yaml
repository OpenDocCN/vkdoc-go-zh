    \ builtin // import \"builtin\"\nfunc len(v Type) int\n内置函数 len 返回 v 的长度，根据其类型：\n\
    数组：v 中元素的数量。\n指向数组的指针：*v 中元素的数量（即使 v 为 nil）。\n切片或映射：v 中元素的数量；如果 v 为 nil，则 len(v)\
