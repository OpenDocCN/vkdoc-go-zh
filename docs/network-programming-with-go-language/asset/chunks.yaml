- fmt: "# The Richardson Maturity Model\n\nMany systems claim to be RESTful. Most\
    \ are not. We even came across one that claimed that SOAP was RESTful, a clear\
    \ case of a warped mental state. Martin Fowler discusses the Richardson Maturity\
    \ Model, which classifies systems according to their conformance to REST. (See\
    \ [`https://martinfowler.com/articles/richardsonMaturityModel.html`](https://martinfowler.com/articles/richardsonMaturityModel.html).)\n\
    \n## Level 0\n\nThe starting point for the model is using HTTP as a transport\
    \ system for remote interactions, but without using any of the mechanisms of the\
    \ Web. Essentially what you are doing here is using HTTP as a tunneling mechanism\
    \ for your own remote interaction mechanism, usually based on Remote Procedure\
    \ Invocation.\n\n## Level 1: Resources\n\nThe first step toward the Glory of Rest\
    \ in the RMM is to introduce resources. So now rather than making all our requests\
    \ to a singular service endpoint, we now start talking to individual resources.\n\
    \n## Level 2: HTTP Verbs\n\nI’ve used HTTP POST verbs for all my interactions\
    \ here in levels 0 and 1, but some people use GETs instead or in addition. At\
    \ these levels, it doesn’t make much difference, they are both being used as tunneling\
    \ mechanisms allowing you to tunnel your interactions through HTTP. Level 2 moves\
    \ away from this, using the HTTP verbs as closely as possible to how they are\
    \ used in HTTP itself.\n\n## Level 3: Hypermedia Controls\n\nThe final level introduces\
    \ something that you often hear referred to under the ugly acronym of HATEOAS\
    \ (Hypertext As The Engine Of Application State). It addresses the question of\
    \ how to get from a list of open slots to knowing what to do to book an appointment.\n\
    \n# Flashcards Revisited\n\nIn Chapter 10, we considered a web system consisting\
    \ of a server and HTML pages rendered in a browser, using JavaScript and CSS to\
    \ control the browser-side interaction. There was no attempt to do anything particularly\
    \ structured, rather just as a traditional web system.\n\n## Recap\n\nThe web\
    \ system of Chapter 10 was used to demonstrate language learning using so-called\
    \ flashcards. The user is presented with a set of cards one at a time, showing\
    \ a word in one language, and then hopes to remember the translation, which is\
    \ shown by “turning over” the card. The system presented a list of different card\
    \ sets and then showed the cards one at a time in the selected set.\n\nWe now\
    \ approach the same situation as an HTTP client-server system built using the\
    \ REST approach. We will make a number of changes:\n\n- URLs will be given appropriate\
    \ to the situation. These will include the “root” URL `/` as well as URLs for\
    \ each flashcard set and, in addition, a URL for each flashcard.\n- All user interaction\
    \ code (HTML, JavaScript, and CSS) is omitted. The server will be talking to an\
    \ arbitrary user agent, and many will not understand the UI code.\n- The server\
    \ will not maintain or manage any client state. In the web example, form data\
    \ was sent from the browser to the server, which promptly returned it in a slightly\
    \ different form. A client that wants to maintain state should do so itself.\n\
    - The server will be set up to manage a number of different serialization formats\
    \ and will deliver as appropriate after client-server negotiation.\n- Heavy use\
    \ will be made of HTTP mechanisms, particularly for error handling and content\
    \ negotiation.\n\n## URLs\n\nThe URLs for this system and the actions that can\
    \ be performed are as follows:\n\n| URL | Action | Effect |\n| --- | --- | ---\
    \ |\n| `/` | `GET` | Gets a list of flashcard sets |\n| `/` | `POST` | Creates\
    \ a new flashcard set |\n| `/flashcardSets/<set>` | `GET` | Gets a list of cards\
    \ in the set |\n| `/flashcardSets/<set>` | `POST` | Creates a new card for the\
    \ set |\n| `/flashcardSets/<set>` | `DELETE` | Deletes the flashcard set if empty\
    \ |\n| `/flashcardSets/<set>/<card>` | `GET` | Gets the contents of the card |\n\
    | `/flashcardSets/<set>/<card>` | `DELETE` | Deletes the card from the set |\n\
    \nThis differs a little from the system described in Chapter 10. The main structural\
    \ difference is that each card is given its own URL as a member of a flashcard\
    \ set.\n\nExample URLs that will be handled by the server include these:\n\n|\
    \ Root URL | URL for Flashcard Set | URL for One Flashcard |\n| --- | --- | ---\
    \ |\n| `/` | `/flashcardSet/CommonWords` | `/flashcardSet/CommonWords/`你好 |\n\n\
    ## ServeMux (The Demultiplexer)\n\nREST is based on a small number of actions\
    \ applied to URLs. A system that attempts to use REST principles must be URL based.\n\
    \nA server mux will examine URLs requested by clients and call handlers based\
    \ on the URL pattern. The standard Go demuxer `net/http.ServeMux` uses a particular\
    \ pattern-matching mechanism: if a URL ends in `/`, it denotes a subtree of URLs\
    \ rooted at that URL. If it ends without a `/`, it represents that URL only. A\
    \ URL is matched against the handler with the longest pattern match. A URL can\
    \ even include a domain as a qualifier.\n\nWe need a handler for the root URL\
    \ `/`. That will also match any URL such as `/passwords` unless another handler\
    \ catches it. In this system, no other handler will, so in the handler for `/`,\
    \ we need to return errors for such attempts.\n\nA tricky part occurs because\
    \ we used a hierarchical structure to our URLs. One particular flashcard set will\
    \ be `/flashcardSets/CommonWords`. This will actually be a directory of the cards\
    \ for that particular set. We have to register *two* handlers: one for the URL\
    \ `/flashcardSets/CommonWords`, which is the flashcard set resource, and one for\
    \ `/flashcardSets/CommonWords/` (note the trailing `/`), which is the subtree\
    \ containing the individual cards and their URLs.\n\nThe code in the main function\
    \ to register these is as follows:\n\n```go\nhttp.HandleFunc(`/`, handleFlashCardSets)\n\
    files, err := ioutil.ReadDir(`flashcardsets`)\ncheckError(err)\nfor _, file :=\
    \ range files {\n    fmt.Println(file.Name())\n    cardset_url := `/flashcardSets/`\
    \ + url.QueryEscape(file.Name())\n    http.HandleFunc(cardset_url, handleOneFlashCardSet)\n\
    \    http.HandleFunc(cardset_url + `/`, handleOneFlashCard)\n}\n```\n\nNote that\
    \ we have the function `QueryEscape`. This is to escape any special characters\
    \ that might occur in URLs. For example, a `$` in a file name should be encoded\
    \ as `%44`. We *do* need to use such a function: our URLs will include Chinese\
    \ characters, which need to be escape-encoded to be represented in URLs. This\
    \ is done by `QueryEscape`, with one exception: a space in a path should be encoded\
    \ as `%20` but in form data should be encoded as `+`. The `PathEscape` function\
    \ does this correctly. We will remove spaces from URLs to avoid this issue."
  raw: '## The Richardson Maturity Model


    Many systems claim to be RESTful. Most are not. We even came across one that claimed
    that SOAP was RESTful, a clear case of a warped mental state. Martin Fowler discusses
    the Richardson Maturity Model, which classifies systems according to their conformance
    to REST. (See [`https://martinfowler.com/articles/richardsonMaturityModel.html`](https://martinfowler.com/articles/richardsonMaturityModel.html).)


    *Level 0*


    *   *The starting point for the model is using HTTP as a transport system for
    remote interactions, but without using any of the mechanisms of the Web. Essentially
    what you are doing here is using HTTP as a tunneling mechanism for your own remote
    interaction mechanism, usually based on Remote Procedure Invocation.*


    *Level 1: Resources*


    *   *The first step toward the Glory of Rest in the RMM is to introduce resources.
    So now rather than making all our requests to a singular service endpoint, we
    now start talking to individual resources.*


    *Level 2: HTTP Verbs*


    *   *I’ve used HTTP POST verbs for all my interactions here in levels 0 and 1,
    but some people use GETs instead or in addition. At these levels, it doesn’t make
    much difference, they are both being used as tunneling mechanisms allowing you
    to tunnel your interactions through HTTP. Level 2 moves away from this, using
    the HTTP verbs as closely as possible to how they are used in HTTP itself.*


    *Level 3: Hypermedia Controls*


    *   *The final level introduces something that you often hear referred to under
    the ugly acronym of HATEOAS (Hypertext As The Engine Of Application State). It
    addresses the question of how to get from a list of open slots to knowing what
    to do to book an appointment.*


    ## Flashcards Revisited


    In Chapter [10](#436770_2_En_10_Chapter.xhtml), we considered a web system consisting
    of a server and HTML pages rendered in a browser, using JavaScript and CSS to
    control the browser-side interaction. There was no attempt to do anything particularly
    structured, rather just as a traditional web system.


    Recap


    The web system of Chapter [10](#436770_2_En_10_Chapter.xhtml) was used to demonstrate
    language learning using so-called flashcards. The user is presented with a set
    of cards one at a time, showing a word in one language, and then hopes to remember
    the translation, which is shown by “turning over” the card. The system presented
    a list of different card sets and then showed the cards one at a time in the selected
    set.


    We now approach the same situation as an HTTP client-server system built using
    the REST approach. We will make a number of changes:


    *   URLs will be given appropriate to the situation. These will include the “root”
    URL `/` as well as URLs for each flashcard set and, in addition, a URL for each
    flashcard.


    *   All user interaction code (HTML, JavaScript, and CSS) is omitted. The server
    will be talking to an arbitrary user agent, and many will not understand the UI
    code.


    *   The server will not maintain or manage any client state. In the web example,
    form data was sent from the browser to the server, which promptly returned it
    in a slightly different form. A client that wants to maintain state should do
    so itself.


    *   The server will be set up to manage a number of different serialization formats
    and will deliver as appropriate after client-server negotiation.


    *   Heavy use will be made of HTTP mechanisms, particularly for error handling
    and content negotiation.


    ### URLs


    The URLs for this system and the actions that can be performed are as follows:


    | **URL** | **Action** | **Effect** |

    | --- | --- | --- |

    | `/` | `GET` | Gets a list of flashcard sets |

    | `POST` | Creates a new flashcard set |

    | `/flashcardSets/<set>` | `GET` | Gets a list of cards in the set |

    | `POST` | Creates a new card for the set |

    | `DELETE` | Deletes the flashcard set if empty |

    | `/flashcardSets/<set>/<card>` | `GET` | Gets the contents of the card |

    | `DELETE` | Deletes the card from the set |


    This differs a little from the system described in Chapter 10\. The main structural
    difference is that each card is given its own URL as a member of a flashcard set.


    Example URLs that will be handled by the server include these:


    | **Root URL** | **URL for Flashcard Set** | **URL for One Flashcard** |

    | --- | --- | --- |

    | `/` | `/flashcardSet/CommonWords` | `/flashcardSet/CommonWords/`你好 |


    ## ServeMux (The Demultiplexer)


    REST is based on a small number of actions applied to URLs. A system that attempts
    to use REST principles must be URL based.


    A server mux will examine URLs requested by clients and call handlers based on
    the URL pattern. The standard Go demuxer `net/http.``ServeMux` uses a particular
    pattern-matching mechanism: if a URL ends in `/`, it denotes a subtree of URLs
    rooted at that URL. If it ends without a `/`, it represents that URL only. A URL
    is matched against the handler with the longest pattern match. A URL can even
    include a domain as a qualifier.


    We need a handler for the root URL `/`. That will also match any URL such as `/passwords`
    unless another handler catches it. In this system, no other handler will, so in
    the handler for `/`, we need to return errors for such attempts.


    A tricky part occurs because we used a hierarchical structure to our URLs. One
    particular flashcard set will be `/flashcardSets/CommonWords`. This will actually
    be a directory of the cards for that particular set. We have to register *two*
    handlers: one for the URL `/flashcardSets/CommonWords`, which is the flashcard
    set resource, and one for `/flashcardSets/CommonWords/` (note the trailing `/`),
    which is the subtree containing the individual cards and their URLs.


    The code in the main function to register these is as follows:


    ```

    http.HandleFunc(`/`, handleFlashCardSets)

    files, err := ioutil.ReadDir(`flashcardsets`)

    checkError(err)

    for _, file := range files {

    fmt.Println(file.Name())

    cardset_url := `/flashcardSets/` + url.QueryEscape(file.Name())

    http.HandleFunc(cardset_url, handleOneFlashCardSet)

    http.HandleFunc(cardset_url + `/`, handleOneFlashCard)

    }

    ```


    Note that we have the function `QueryEscape`. This is to escape any special characters
    that might occur in URLs. For example, a `$` in a file name should be encoded
    as `%44;`. We *do* need to use such a function: our URLs will include Chinese
    characters, which need to be escape-encoded to be represented in URLs. This is
    done by `QueryEscape`, with one exception: a space in a path should be encoded
    as `%20` but in form data should be encoded as `+`. The `PathEscape` function
    does this correctly. We will remove spaces from URLs to avoid this issue.'
  trans: "\n# 理查森成熟度模型\n\n许多系统声称是 RESTful 的，但大多数并非如此。我们甚至遇到过声称 SOAP 是 RESTful 的系统，这显然是心智扭曲的典型案例。马丁·福勒讨论了理查森成熟度模型，该模型根据系统对\
    \ REST 的符合程度对其进行分类。（参见 [`https://martinfowler.com/articles/richardsonMaturityModel.html`](https://martinfowler.com/articles/richardsonMaturityModel.html)。）\n\
    \n## 第 0 级\n\n该模型的起点是使用 HTTP 作为远程交互的传输系统，但完全不使用 Web 的任何机制。本质上，你是在利用 HTTP 作为自己远程交互机制（通常基于远程过程调用）的隧道机制。\n\
    \n## 第 1 级：资源\n\n在 RMM 中迈向 REST 荣耀的第一步是引入资源。因此，现在我们不再将所有请求发送到单一的服务端点，而是开始与各个独立的资源进行通信。\n\
    \n## 第 2 级：HTTP 动词\n\n在 0 级和 1 级中，我所有的交互都使用了 HTTP POST 动词，但有些人会改用或补充使用 GET。在这些级别上，这没有太大区别，两者都被用作隧道机制，让你可以通过\
    \ HTTP 隧道传输交互。第 2 级则脱离了这种模式，尽可能按照 HTTP 自身的使用方式来使用 HTTP 动词。\n\n## 第 3 级：超媒体控制\n\
    \n最后一级引入了你经常听到的那个丑陋缩写 HATEOAS（超媒体作为应用状态引擎）。它解决了如何从可预约时间段列表，进而知道如何操作来预约的问题。\n\n\
    # 再谈闪卡系统\n\n在第 10 章中，我们考虑了一个 Web 系统，它由服务器和在浏览器中渲染的 HTML 页面组成，并使用 JavaScript 和\
    \ CSS 来控制浏览器端的交互。当时并未尝试进行任何特别结构化的设计，只是将其视为一个传统的 Web 系统。\n\n## 回顾\n\n第 10 章的 Web\
    \ 系统用于演示使用所谓的闪卡进行语言学习。系统每次向用户展示一张卡片，卡片上显示一种语言的单词，用户希望记住其翻译，而翻译内容则通过“翻转”卡片来显示。该系统会呈现一组不同的卡片集，然后在选中的卡片集中逐一显示卡片。\n\
    \n现在我们采用 REST 方法，将同样的场景构建为一个 HTTP 客户端-服务器系统。我们将进行以下若干改动：\n\n-   根据场景设置合适的 URL。这些\
    \ URL 包括“根”URL `/`，以及每个闪卡集的 URL，此外还有每张闪卡的 URL。\n-   所有用户交互代码（HTML、JavaScript 和\
    \ CSS）都将被省略。服务器将与任意的用户代理通信，而许多用户代理无法理解这些 UI 代码。\n-   服务器不会维护或管理任何客户端状态。在 Web 示例中，表单数据从浏览器发送到服务器，服务器会以稍有不同的形式立即将其返回。需要维护状态的客户端应自行处理。\n\
    -   服务器将被设置成能够管理多种不同的序列化格式，并在客户端-服务器协商后提供合适的格式。\n-   将大量使用 HTTP 机制，特别是在错误处理和内容协商方面。\n\
    \n## URL\n\n本系统的 URL 以及可以执行的操作如下：\n\n| URL | 动作 | 效果 |\n| --- | --- | --- |\n\
    | `/` | `GET` | 获取闪卡集列表 |\n| `/` | `POST` | 创建新的闪卡集 |\n| `/flashcardSets/<set>`\
    \ | `GET` | 获取该闪卡集中的卡片列表 |\n| `/flashcardSets/<set>` | `POST` | 为该闪卡集创建新卡片 |\n\
    | `/flashcardSets/<set>` | `DELETE` | 如果闪卡集为空，则删除该闪卡集 |\n| `/flashcardSets/<set>/<card>`\
    \ | `GET` | 获取卡片内容 |\n| `/flashcardSets/<set>/<card>` | `DELETE` | 从该闪卡集中删除卡片\
    \ |\n\n这与第 10 章中描述的系统略有不同。主要的结构性差异在于，每张卡片都作为闪卡集的成员拥有自己的 URL。\n\n服务器将处理的示例 URL\
    \ 包括以下内容：\n\n| 根 URL | 闪卡集 URL | 单张闪卡 URL |\n| --- | --- | --- |\n| `/` | `/flashcardSet/CommonWords`\
    \ | `/flashcardSet/CommonWords/`你好 |\n\n## ServeMux（多路复用器）\n\nREST 基于对 URL 执行的少量动作。尝试使用\
    \ REST 原则的系统必须基于 URL。\n\n服务器多路复用器会检查客户端请求的 URL，并根据 URL 模式调用处理程序。标准的 Go 多路复用器 `net/http.ServeMux`\
    \ 使用特定的模式匹配机制：如果 URL 以 `/` 结尾，则表示以该 URL 为根的 URL 子树。如果 URL 不以 `/` 结尾，则仅表示该 URL\
    \ 本身。URL 会与具有最长模式匹配的处理程序进行匹配。URL 甚至可以包含域名作为限定符。\n\n我们需要为根 URL `/` 设置一个处理程序。该处理程序也会匹配任何类似\
    \ `/passwords` 的 URL，除非有其他处理程序捕获它。在本系统中，没有其他处理程序会这样做，因此，在 `/` 的处理程序中，我们需要对这种请求返回错误。\n\
    \n一个棘手的部分出现了，因为我们为 URL 使用了层次结构。某个特定的闪卡集将是 `/flashcardSets/CommonWords`。这实际上将是该特定闪卡集中卡片的目录。我们必须注册*两个*处理程序：一个用于\
    \ URL `/flashcardSets/CommonWords`（这是闪卡集资源），另一个用于 `/flashcardSets/CommonWords/`（注意末尾的\
    \ `/`），这是包含各个卡片及其 URL 的子树。\n\n在 main 函数中用于注册这些处理程序的代码如下：\n\n```go\nhttp.HandleFunc(`/`,\
    \ handleFlashCardSets)\nfiles, err := ioutil.ReadDir(`flashcardsets`)\ncheckError(err)\n\
    for _, file := range files {\n    fmt.Println(file.Name())\n    cardset_url :=\
    \ `/flashcardSets/` + url.QueryEscape(file.Name())\n    http.HandleFunc(cardset_url,\
    \ handleOneFlashCardSet)\n    http.HandleFunc(cardset_url + `/`, handleOneFlashCard)\n\
    }\n```\n\n请注意我们使用了 `QueryEscape` 函数。这是为了对 URL 中可能出现的任何特殊字符进行转义。例如，文件名中的 `$` 应编码为\
    \ `%44`。我们*确实*需要使用这样一个函数：我们的 URL 将包含中文字符，这些字符需要经过转义编码才能在 URL 中表示。这由 `QueryEscape`\
    \ 完成，但有一个例外：路径中的空格应编码为 `%20`，而在表单数据中则应编码为 `+`。`PathEscape` 函数可以正确完成此操作。为了避免此问题，我们将从\
