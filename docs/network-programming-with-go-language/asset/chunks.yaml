  trans: '

    ### TCP 客户端


    一旦客户端为某个服务建立了 TCP 地址，它就会“拨号”连接该服务。如果成功，拨号函数会返回一个用于通信的 `TCPConn`。客户端和服务器通过这个连接交换消息。通常，客户端使用
    `TCPConn` 向服务器写入请求，并从 `TCPConn` 读取响应。这个过程会持续到其中一方（或双方）关闭连接。客户端通过以下函数建立 TCP 连接：


    ```

    func DialTCP(net string, laddr, raddr *TCPAddr) (*TCPConn, error)

    ```


    其中 `laddr` 是本地地址（客户端侧），通常设置为 `nil`；`raddr` 是服务的远程地址（服务器侧）。`net` 字符串可以是 `"tcp4"`、`"tcp6"`
    或 `"tcp"`，具体取决于您希望建立 TCPv4 连接、TCPv6 连接，或者不在意协议版本。


    一个简单的例子是客户端与 Web（HTTP）服务器通信。我们将在后续章节中更详细地讨论 HTTP 客户端和服务器，因此现在先保持简单。


    客户端可以发送的其中一种消息是 `HEAD` 消息。它向服务器查询关于服务器本身以及服务器上某个文档的信息。服务器会返回信息，但不会返回文档本身。查询 HTTP
    服务器的请求可能如下所示：


    ```

    "HEAD / HTTP/1.0\r\n\r\n"

    ```


    这个请求用于询问关于根文档和服务器的信息。一个典型的响应可能如下：


    ```

    HTTP/1.0 200 OK

    Content-Type: text/html; charset=ISO-8859-1

    P3P: CP="This is not a P3P policy! See g.co/p3phelp for more info."

    Date: Mon, 02 Aug 2021 21:56:38 GMT

    Server: gws

    X-XSS-Protection: 0

    X-Frame-Options: SAMEORIGIN

    Expires: Mon, 02 Aug 2021 21:56:38 GMT

    Cache-Control: private

    Set-Cookie: 1P_JAR=2021-08-02-21; expires=Wed, 01-Sep-2021 21:56:38 GMT; path=/;
