  trans: '

    # 2\. Go 语言概述


    编程语言层出不穷。有些高度专精，另一些则相当通用，而第三类语言旨在填补广泛但某种程度上细分的领域。Go 语言诞生于 2007 年，并于 2009 年公开发布。它被设计为一种系统编程语言，用于增强（或替代）C++
    以及其他静态编译语言，以构建生产环境下的网络和多处理系统。


    Go 加入了一系列现代语言的行列，包括 Rust、Swift、Julia 等。Go 的独特之处在于其简洁的语法、基于“结构”类型化对多个程序单元进行快速编译的能力，当然，还有从
    C、C++ 和 Java 等大规模程序开发中汲取的经验教训。


    在 2022 年第一季度的语言流行度排行榜中，例如 TIOBE 指数（参见 [`http://www.tiobe.com/tiobe-index/`](http://www.tiobe.com/tiobe-index/)），将
    Go 排在第 13 位。PYPL 指数（参见 [`http://pypl.github.io/PYPL.html`](http://pypl.github.io/PYPL.html)）也将其列为第
    13 位。与之并列的是 Java、Python、C、C++、JavaScript 等已有 20 多年历史的语言。


    本书假设你是一位经验丰富的程序员，对 Go 语言有一定程度或深入的了解。这些知识可能来源于入门书籍，例如 Caleb Doxsey 的 *Introducing
    Go*（O''Reilly 出版）或 Karl Seguin 的 *The Little Go Book*，或者通过阅读更正式的文档，例如 [`https://go.dev/ref/spec`](https://go.dev/ref/spec)
    上的 Go 语言规范。


    如果你是一位经验丰富的程序员，可以跳过本章。如果不是，本章将指出本书中使用的 Go 相关要点，但你仍需从其他途径获取必要的基础知识。Go 网站 [`https://go.dev`](https://go.dev)
    上有多个教程，例如：


    *   入门指南 – [`https://go.dev/learn/`](https://go.dev/learn/)

    *   Go 编程语言教程 – [`https://go.dev/doc/tutorial/getting-started`](https://go.dev/doc/tutorial/getting-started)

    *   在线互动教程 – [`https://go.dev/tour/list`](https://go.dev/tour/list)

    *   Effective Go – [`https://go.dev/doc/effective_go`](https://go.dev/doc/effective_go)


    安装 Go 的最佳方式是从 Go 编程语言官网进行。本书中的示例将在 Go 1.18 版本下运行。本书第一版使用的是 1.8 版本。核心语言和库基本保持不变，但包管理和工具链在持续改进。本书的主要目标是在你的程序中实现网络概念，而非追求“完美”的
    Go 代码。我们将力求与时俱进，确保你不仅具备创建代码的能力，也能审查他人的代码。


    实际上，你无需安装 Go 即可测试程序。Go 有一个可从主页面访问的“Playground”，可用于运行代码（[`https://go.dev/play/`](https://go.dev/play/)）。还有一些
    REPL（读取-求值-打印循环）环境，但这些是第三方提供的。不过，你通常无法运行与网络相关的代码。这是出于安全考虑；Playground 限制了你的操作范围。但它对于学习非网络代码以及分享代码仍然很有价值。


    本书主要使用 Go 标准库（[`https://pkg.go.dev/std`](https://pkg.go.dev/std)）中的库和包。Go 团队还构建了另一组包作为“子仓库”，但这些包通常得不到与标准库同等级别的支持。本书会偶尔使用它们。这些包需要使用
    `go get` 命令进行安装。它们的包名中包含“x”，例如 `golang.org/x/net/ipv4`。


    在本修订版中，我们将扩展 Go 语言被广泛使用的相关网络生态系统；示例包括常见的 Go 网络中间件和微服务工具（例如 gRPC）。


    ## 类型


    Go 预定义了布尔型、数值型和字符串型类型。数值类型包括 `uint32`、`int32`、`float32` 以及其他不同大小的数值类型，还有字节（`uint8`）和符文（rune）。由于国际化问题在分布式程序中可能很重要，因此在第
    6 章中会详细论述符文（`int32` 的别名）和字符串。


    还有一些更复杂的类型，将在下面讨论。

