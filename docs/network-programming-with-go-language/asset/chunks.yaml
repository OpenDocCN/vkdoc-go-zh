    ## 条件语句


    继续使用 `Person` 示例，假设你只想打印出邮件列表，而不深入查看。你可以通过模板来实现：


    ```

    Name is {{.Name}}

    Emails are {{.Emails}}

    ```


    这将输出以下内容：


    ```

    Name is jan

    Emails are [jan@newmarch.name jan.newmarch@gmail.com]

    ```


    因为这是 `fmt` 包显示列表的方式。


    在许多情况下，如果这正是你想要的，那可能没问题。让我们考虑一种*几乎*正确但又不完全正确的情况。有一个用于序列化对象的 JSON 包，我们在第 4 章中介绍过。它会生成以下内容：


    ```

    {"Name": "jan",

    "Emails": ["jan@newmarch.name", "jan.newmarch@gmail.com"]

    }

    ```


    JSON 包是你在实践中使用的，但让我们看看是否可以使用模板生成 JSON 输出。我们仅通过已有的模板就能做一些类似的事情。作为 JSON 序列化器，这*几乎*是正确的：


    ```

    {"Name": "{{.Name}}",

    "Emails": {{.Emails}}

    }

    ```


    它将生成：


    ```

    {"Name": "jan",

    "Emails": [jan@newmarch.name jan.newmarch@gmail.com]

    }

    ```


    这有两个问题：地址没有加引号，并且列表元素应该用 `,` 分隔。


    这样如何——查看数组元素，给它们加上引号，并添加逗号？


    ```

    {"Name": {{.Name}},

    "Emails": [

    {{range .Emails}}

    "{{.}}",

    {{end}}

    ]

    }

    ```


    这将生成：


    ```

    {"Name": "jan",

    "Emails": ["jan@newmarch.name", "jan.newmarch@gmail.com",]

    }

    ```


    （外加一些空白符）。


    同样，它几乎正确，但如果你仔细看，会发现最后一个列表元素后面多了一个尾随的 `,`。根据 JSON 语法（参见 [`http://www.json.org/`](http://www.json.org/)），这个尾随的
    `,` 是不允许的。不同的实现处理方式可能有所不同。


    我们想要的是打印每个元素，除了最后一个元素外，每个元素后面都跟一个 `,`。这实际上有点难办，所以更好的方法是打印每个元素，除了*第一个*元素外，每个元素*前面*都加一个
    `,`（这个技巧来自 Stack Overflow 上的 "brianb" – [`http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object`](http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object)）。这更容易，因为第一个元素的索引是零，而许多编程语言（包括
    Go 模板语言）将零视为布尔值 `false`。


    条件语句的一种形式是 `{{if pipeline}} T1 {{else}} T0 {{end}}`。我们需要 `pipeline` 是邮件数组的索引。幸运的是，`range`
    语句的变体提供了这个功能。有两种引入变量的形式：


    ```

    {{range $elmt := array}}

    {{range $index, $elmt := array}}

    ```


    因此，我们遍历数组，如果索引是 `false`（0），则只打印元素。否则，我们在元素前面加上 `,` 再打印。模板如下：


    ```

    {"Name": "{{.Name}}",

    "Emails": [

    {{range $index, $elmt := .Emails}}

    {{if $index}}

    , "{{$elmt}}"

    {{else}}

    "{{$elmt}}"

    {{end}}

    {{end}}

    ]

    }

    ```


    完整的程序是 `printjsonemails.go`：


    ```

    ch9$ vi printjsonemails.go

