    ## 将二进制数据编码为字符串


    曾几何时，传输 8 位数据是个问题。它经常在嘈杂的串行线路上传输，很容易损坏。另一方面，7 位数据可以更可靠地传输，因为第 8 位可以用作校验位。例如，在“偶校验”方案中，校验位会被设置为
    1 或 0，以使一个字节中 1 的个数为偶数。这允许检测每个字节中单个位的错误。


    ASCII 是一个 7 位字符集。已经开发出许多比简单奇偶校验更复杂的方案，这些方案涉及将 8 位二进制数据转换成 7 位 ASCII 格式。本质上，8 位数据以某种方式被拉伸到
    7 位字节中。


    在 HTTP 响应和请求中传输的二进制数据通常被转换成 ASCII 格式。这使得使用简单的文本阅读器检查 HTTP 消息变得容易，而无需担心奇怪的 8 位字节可能对你的显示造成什么影响！


    一种常见的格式是 Base64（`go doc base64`）。Go 通过 `encoding/base64` 包支持多种二进制到文本的格式，包括 Base64。该包基于
    RFC“The Base16, Base32, and Base64 Data Encodings”。^(⁷)


    有两个主要函数用于 Base64 编码和解码：


    ```

    ch4$ go doc encoding/base64 NewEncoder

    package base64 // import "encoding/base64"

    func NewEncoder(enc *Encoding, w io.Writer) io.WriteCloser

    NewEncoder 返回一个新的 base64 流编码器。写入返回的写入器的数据将使用 enc 进行编码，然后写入 w。Base64 编码以 4 字节块进行操作；写入完成后，调用者必须关闭返回的编码器以刷新任何部分写入的块。

    ch4$ go doc encoding/base64 NewDecoder

    package base64 // import "encoding/base64"

    func NewDecoder(enc *Encoding, r io.Reader) io.Reader

    NewDecoder 构造一个新的 base64 流解码器。

    ```


