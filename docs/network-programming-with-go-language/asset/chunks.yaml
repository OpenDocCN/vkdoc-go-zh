    # 5. Application-Level Protocols


    A client and a server need to exchange information via messages. TCP and UDP provide
    the transport mechanisms to do this. The two processes also need to have a protocol
    in place so that message exchange can take place meaningfully. A protocol defines
    what type of conversation can take place between two components of a distributed
    application by specifying messages and data types, encoding formats, and so on.
    This chapter looks at some of the issues involved in this process and gives a
    complete example of a simple client-server application.


    ## Protocol Design


    There are many possibilities and issues to be decided on when designing a protocol.
    Some of the issues include the following:


    *   Is it to be broadcast or point to point? Broadcast can be UDP, local multicast,
    or the more experimental MBONE. Point to point could be either TCP or UDP. In
    general, at the IP level, often, we consider the following topologies; unicast,
    multicast, broadcast, and anycast.


    *   Is it to be stateful or stateless? Is it reasonable for one side to maintain
    state about the other side? It is often simpler for one side to maintain state
    about the other, but what happens if something crashes?


    *   Is the transport protocol reliable or unreliable? Reliable is often slower,
    but then you don''t have to worry so much about lost messages. For example, decisions
    around reliability have influenced HTTP''s evolution.


    *   Are replies needed? If a reply is needed, how do you handle a lost reply?
    Timeouts may be used. RPC functions that return void are an example of this.


    *   What data format do you want? Several possibilities were discussed in the
    last chapter.


    *   Is your communication bursty or steady stream? Ethernet and the Internet are
    best at bursty traffic. Steady stream is needed for video streams and particularly
    for voice. If required, how do you manage Quality of Service (QoS)?


    *   Are there multiple streams with synchronization required? Does the data need
    to be synchronized with anything, such as video and voice?


    *   Are you building a stand-alone application or a library to be used by others?
    The standards of documentation required might vary.


    ## Why Should You Worry?


    Jeff Bezos, the CEO of Amazon, reportedly made the following statements in 2002:


    *   All teams will henceforth expose their data and functionality through service
    interfaces.


    *   Teams must communicate with each other through these interfaces.


    *   There will be no other form of interprocess communication allowed: no direct
    linking, no direct reads of another team''s data store, no shared-memory model,
    no backdoors whatsoever. The only communication allowed is via service interface
    calls over the network.


    *   It doesn''t matter what technology they use. HTTP, Corba, Pubsub, custom protocols
    – it doesn''t matter. Bezos doesn''t care.


    *   All service interfaces, without exception, must be designed from the ground
    up to be externalizable. That is to say, the team must plan and design to be able
    to expose the interface to developers on the outside world. No exceptions.


    *   Anyone who doesn''t do this will be fired.


    (Source: Repost of Steve Yegge''s posting at [`https://gist.github.com/chitchcock/1281611`](https://gist.github.com/chitchcock/1281611))


    What Bezos was doing was orienting one of the world''s most successful Internet
    companies around service architectures, and interfaces must be clear enough that
    *all* communication must be through those interfaces alone – without confusion
    or errors.'
