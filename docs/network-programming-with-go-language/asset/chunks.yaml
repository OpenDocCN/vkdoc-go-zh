    expires=Tue, 05-Jul-2022 23:37:35 GMT; path=/; domain=.google.com; HttpOnly

    ```


    首先需要注意的是，程序中几乎进行了过度的错误检查。这对于网络编程（以及 Go 语言）来说是很正常的：网络程序出错的几率远高于独立运行的程序。客户端、服务器或中间的任何路由器和交换机都可能发生硬件故障；通信可能被防火墙阻断；网络负载可能导致超时；客户端与服务器通信时，服务器可能崩溃。程序执行了以下检查：


    *   指定的地址可能存在语法错误。例如，端口未指定。


    *   尝试连接远程服务可能失败。例如，请求的服务可能未运行，或者网络上不存在该主机。例如，主机名拼写错误。


    *   即使连接已建立，如果连接突然中断或网络超时，向服务写入数据也可能失败。


    *   类似地，读取操作也可能像上述情况一样失败。


    从服务器读取数据需要一点说明。在这个例子中，我们本质上是在读取服务器的单个响应。该响应会在连接的文件结束符处终止。然而，它可能由多个 TCP 数据包组成，因此我们需要持续读取直到文件结束。`io/ioutil`
    函数 `ReadAll` 会处理这些问题并返回完整的响应。（感谢 `golang-nuts` 邮件列表上的 Roger Peppe。）


    这里还涉及一些语言层面的问题。首先，大多数函数返回一个双值，其中可能的错误作为第二个返回值。如果没有错误发生，则返回 `nil`。在 C 语言中，通过返回特殊值（如
    `NULL`、-1 或 0，如果可能的话）来实现相同的行为。在 Java 中，相同的错误检查通过抛出和捕获异常来实现，这可能会使代码看起来非常混乱。

