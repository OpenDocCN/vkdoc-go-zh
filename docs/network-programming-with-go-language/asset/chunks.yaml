    \ QUIC.\n\nHTTP/2 improved upon HTTP over TCP flaws yet didn’t fully integrate\
    \ with TCP (e.g., no comanagement of congestion controls across connections).\
    \ HTTP/3 combines much of the HTTP/2 controls with TLS into a new protocol called\
    \ QUIC. QUIC in a sense merges layers 4 and 5 yet runs on top of UDP (layer 4).\
    \ Using UDP, allows HTTP/3 to ride on top of existing networks (some concern remains\
    \ with TCP traffic often optimized and UDP less so on intermediate routers).\n\
    \nEven with the preceding improvements, a web engineer often is still working\
    \ in the realm of HTTP/1.1\\. Creators of browsers and servers (e.g., proxies)\
    \ will need to learn even more, including HTTP/2 and HTTP/3.\n\nYou can learn\
    \ about QUIC transport here: [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport).\n\
    \nYou can learn about HTTP and QUIC here: [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-http`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-http).\n\
    \n## Simple User Agents\n\nUser agents such as browsers make requests and get\
    \ responses. Go provides a set of request and response types in the net/http package.\
    \ First, we take a look at net/http.Response.\n\n### The Response Type\n\nThe\
    \ response type is as follows:\n\n```\ntype Response struct {\nStatus     string\
    \ // e.g. \"200 OK\"\nStatusCode int    // e.g. 200\nProto      string // e.g.\
    \ \"HTTP/1.0\"\nProtoMajor int    // e.g. 1\nProtoMinor int    // e.g. 0\nHeader\
    \ Header\nBody io.ReadCloser\nContentLength int64\nTransferEncoding []string\n\
    Close bool\nUncompressed bool\nTrailer Header\nRequest *Request\nTLS *tls.ConnectionState\n\
    }\n```\n\nwith the following helper methods:\n\n```\nfunc (r *Response) Cookies()\
    \ []*Cookie\nfunc (r *Response) Location() (*url.URL, error)\nfunc (r *Response)\
    \ ProtoAtLeast(major, minor int) bool\nfunc (r *Response) Write(w io.Writer) error\n\
    ```\n\nSome methods are for convenience such as Cookies and Location; others are\
    \ to assist with connection management like ProtoAtLeast and Write.\n\nSee the\
    \ documentation for exact details (e.g., go doc -short net/http.Response.Body).\n\
    \nWe started with Response because Go provides helper functions to make requests;\
    \ later, we investigate the Request type."
  trans: "\n### HTTP 1.1\n\n`HTTP 1.1` 修复了 `HTTP 1.0` 的诸多问题，但也因此变得更加复杂。该版本通过扩展或完善\
    \ `HTTP 1.0` 的可用选项来实现。例如：\n\n- 增加了更多命令，如 `TRACE` 和 `CONNECT`。\n- `HTTP 1.1` 收紧了请求\
    \ URL 的规则以支持代理处理。如果请求通过代理转发，URL 应为绝对 URL，如下所示：\n\n```\nGET http://www.w3.org/index.html\
    \ HTTP/1.1\n```\n\n否则，应使用绝对路径，并且必须包含 `Host` 头部字段，如下所示：\n\n- 增加了更多属性，如 `If-Modified-Since`，同样供代理使用。\n\
    \n```\nGET /index.html HTTP/1.1\nHost: www.w3.org\n```\n\n具体变更包括：\n\n- 主机名识别（支持虚拟主机）\n\
    - 内容协商（支持多语言）\n- 持久连接（减少 TCP 开销，但非常复杂）\n- 分块传输\n- 字节范围（请求文档的部分内容）\n- 代理支持\n\n\
    得益于万维网的普及，HTTP 持续得到改进。`HTTP/1.1` 的初始开发始于 1997 年，一直持续到 2014 年。你可以在此找到关于 `HTTP/1.1`\
    \ 的更多信息，包括原始规范以及之后对协议进行重新记录的更详细文档。\n\n- 单文档（原始格式）：\n  - 原始版 (1997) – [`https://datatracker.ietf.org/doc/html/rfc2068`](https://datatracker.ietf.org/doc/html/rfc2068)\n\
    \  - 更新版 (1999) – [`https://datatracker.ietf.org/doc/html/rfc2616`](https://datatracker.ietf.org/doc/html/rfc2616)\n\
    - 详细系列（均为 2014 年版）：\n  - 消息语法与路由 – [`https://datatracker.ietf.org/doc/html/rfc7230`](https://datatracker.ietf.org/doc/html/rfc7230)\n\
    \  - 语义与上下文 – [`https://datatracker.ietf.org/doc/html/rfc7231`](https://datatracker.ietf.org/doc/html/rfc7231)\n\
    \  - 条件请求 – [`https://datatracker.ietf.org/doc/html/rfc7232`](https://datatracker.ietf.org/doc/html/rfc7232)\n\
    \  - 范围请求 – [`https://datatracker.ietf.org/doc/html/rfc7233`](https://datatracker.ietf.org/doc/html/rfc7233)\n\
    \  - 缓存 – [`https://datatracker.ietf.org/doc/html/rfc7234`](https://datatracker.ietf.org/doc/html/rfc7234)\n\
    \  - 认证 – [`https://datatracker.ietf.org/doc/html/rfc7235`](https://datatracker.ietf.org/doc/html/rfc7235)\n\
    \n### HTTP 主要版本升级\n\n`HTTP/0.9` 协议仅有一页篇幅。`HTTP/1.0` 协议的描述约有 20 页，并包含了 `HTTP/0.9`\
    \ 协议。`HTTP/1.1` 协议长达 120 页，是对 `HTTP/1.0` 的实质性扩展，而 `HTTP/2` 大约为 96 页。`HTTP/2` 规范仅对\
    \ `HTTP/1.1` 规范进行了补充。即将完成的 `HTTP/3` 规范大约为 75 页，在传输方面增加了更多功能和改进。\n\n### HTTP/2\n\
    \n所有早期版本的 HTTP 都是基于文本的。`HTTP/2` 最重大的不同之处在于它是一种二进制格式。为确保向后兼容性，不能通过向旧服务器发送二进制消息来判断其反应。取而代之的是，发送一条带有额外属性的\
    \ `HTTP 1.1` 消息，询问服务器是否愿意切换至 `HTTP/2`。如果服务器不理解这些额外字段，它会以正常的 `HTTP 1.1` 回复响应，会话便继续使用\
    \ `HTTP 1.1`。否则，服务器可以回复表明其愿意切换，之后会话便可继续使用 `HTTP/2`。\n\n### HTTP/3\n\n`HTTP/3`\
    \ 进一步改进了 `HTTP/2` 中开创的理念，包括：\n\n- 流多路复用\n- 逐流流量控制\n- 低延迟连接建立\n\n为了使得 HTTP 传输性能更佳，一种新的传输机制被创建出来。\n\
    \n简要对各主要协议进行比较：\n\n- `HTTP/1.1` 可在多种传输层和会话层上使用。\n- `HTTP/2` 主要用于基于 TCP 的 TLS（传输层安全性协议）之上。\n\
    - `HTTP/3` 基于一种名为 QUIC 的新传输协议，使用相同的语义。\n\n`HTTP/2` 改进了 HTTP over TCP 的缺陷，但并未与\
    \ TCP 完全集成（例如，跨连接的拥塞控制未能统一管理）。`HTTP/3` 将 `HTTP/2` 的大部分控制功能与 TLS 合并为一个名为 QUIC 的新协议。从某种意义上说，QUIC\
    \ 合并了第 4 层和第 5 层，但运行在 UDP（第 4 层）之上。使用 UDP 使得 `HTTP/3` 能够基于现有网络运行（不过仍然存在一些担忧，例如\
    \ TCP 流量通常经过优化，而中间路由器对 UDP 的优化较少）。\n\n即使有前述改进，网络工程师通常仍需在 `HTTP/1.1` 的领域内工作。浏览器和服务器（例如代理）的创建者将需要学习更多内容，包括\
    \ `HTTP/2` 和 `HTTP/3`。\n\n您可以在此了解有关 QUIC 传输的信息： [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport)。\n\
    \n您可以在此了解有关 HTTP 和 QUIC 的信息： [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-http`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-http)。\n\
    \n## 简单用户代理\n\n用户代理（如浏览器）发出请求并获取响应。Go 在 `net/http` 包中提供了一组用于请求和响应的类型。首先，我们来了解\
    \ `net/http.Response`。\n\n### 响应类型\n\n响应类型如下所示：\n\n```\ntype Response struct {\n\
    \    Status     string // 例如 \"200 OK\"\n    StatusCode int    // 例如 200\n   \
    \ Proto      string // 例如 \"HTTP/1.0\"\n    ProtoMajor int    // 例如 1\n    ProtoMinor\
    \ int    // 例如 0\n    Header Header\n    Body io.ReadCloser\n    ContentLength\
    \ int64\n    TransferEncoding []string\n    Close bool\n    Uncompressed bool\n\
    \    Trailer Header\n    Request *Request\n    TLS *tls.ConnectionState\n}\n```\n\
    \n以及以下辅助方法：\n\n```\nfunc (r *Response) Cookies() []*Cookie\nfunc (r *Response)\
    \ Location() (*url.URL, error)\nfunc (r *Response) ProtoAtLeast(major, minor int)\
    \ bool\nfunc (r *Response) Write(w io.Writer) error\n```\n\n其中一些方法是为了方便使用，例如 `Cookies`\
    \ 和 `Location`；另一些则用于辅助连接管理，例如 `ProtoAtLeast` 和 `Write`。\n\n有关确切细节，请参阅文档（例如，`go\
    \ doc -short net/http.Response.Body`）。\n\n我们从 `Response` 类型开始介绍，是因为 Go 提供了辅助函数来发起请求；稍后，我们将研究\
    \ `Request` 类型。\n"
- fmt: "### The HEAD Method\n\nWe examine this data structure through examples. Each\
    \ HTTP request type has its own Go function in the `net/http` package. The simplest\
    \ request is from a user agent called `HEAD`, which asks for information about\
    \ a resource and its HTTP server. This function can be used to make the query:\n\
    \n```\nfunc Head(url string) (r *Response, err error)\n```\n\nThe status of the\
    \ response is in the response field `Status`, while the field `Header` is a map\
    \ of the header fields in the HTTP response. A program called `head.go` to make\
    \ this request and display the results is as follows:\n\n```\nch8$ vi head.go\n\
    /* Head\n*/\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net/http\"\n\"os\"\n\
    )\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"host:port\")\n}\nurl := os.Args[1]\nresponse, err := http.Head(url)\nif err\
    \ != nil {\nlog.Fatalln(err)\n}\nfmt.Println(response.Status)\nfor k, v := range\
    \ response.Header {\nfmt.Println(k+\":\", v)\n}\n}\n```\n\nWhen run against `go.dev`,\
    \ we see\n\n```\nch8$ go run head.go https://go.dev\n200 OK\nContent-Security-Policy:\
    \ [connect-src 'self' www.google-analytics.com stats.g.doubleclick.net ; default-src\
    \ 'self' ; font-src 'self' fonts.googleapis.com fonts.gstatic.com data: ; frame-ancestors\
    \ 'self' ; frame-src 'self' www.google.com feedback.googleusercontent.com www.googletagmanager.com\
    \ scone-pa.clients6.google.com www.youtube.com player.vimeo.com ; img-src 'self'\
    \ www.google.com www.google-analytics.com ssl.gstatic.com www.gstatic.com gstatic.com\
    \ data: * ; object-src 'none' ; script-src 'self' 'sha256-n6OdwTrm52KqKm6aHYgD0TFUdMgww4a0GQlIAVrMzck='\
    \ 'sha256-4ryYrf7Y5daLOBv0CpYtyBIcJPZkRD2eBPdfqsN3r1M=' 'sha256-sVKX08+SqOmnWhiySYk3xC7RDUgKyAkmbXV2GWts4fo='\
    \ www.google.com apis.google.com www.gstatic.com gstatic.com support.google.com\
    \ www.googletagmanager.com www.google-analytics.com ssl.google-analytics.com tagmanager.google.com\
    \ ; style-src 'self' 'unsafe-inline' fonts.googleapis.com feedback.googleusercontent.com\
    \ www.gstatic.com gstatic.com tagmanager.google.com ;]\nStrict-Transport-Security:\
    \ [max-age=31536000; includeSubDomains; preload]\nX-Cloud-Trace-Context: [7ba1cc2dfaeebe50e11befbb48523327]\n\
    Date: [Thu, 31 Mar 2022 23:19:03 GMT]\nServer: [Google Frontend]\nContent-Type:\
    \ [text/html; charset=utf-8]\nVary: [Accept-Encoding]\n```\n\nThe response comes\
    \ from a server out of our control, and it may pass through other servers on the\
    \ way. The fields displayed may be different, and certainly, the values of the\
    \ fields will differ. Here is a brief description of some of the response headers:\n\
    \n- **Vary**: Tells an origin server which fields to use aside from `\"method\"\
    `, `Host`, and request target when selecting a representation of a resource\n\
    \  - Vary is part of HTTP/1.1 – [`https://datatracker.ietf.org/doc/html/rfc7231#section-7.1.4`](https://datatracker.ietf.org/doc/html/rfc7231#section-7.1.4)\n\
    - **Strict-Transport-Security**: Used by the server to tell a browser (client)\
    \ to use HTTPS instead of HTTP\n  - Also known as HSTS, an added policy to HTTP\
    \ – [`https://www.rfc-editor.org/rfc/rfc6797`](https://www.rfc-editor.org/rfc/rfc6797)\n\
    - **X-Cloud-Trace-Context**: Is a tracing header used by Google Cloud Platform\n\
    - **Date**: When the origin server generated the response\n- **Server**: Used\
    \ to identify the response generating software\n  - Server is part of HTTP/1.1\
    \ – [`https://datatracker.ietf.org/doc/html/rfc2616#section-14.38`](https://datatracker.ietf.org/doc/html/rfc2616#section-14.38)\n\
    - **Alt-Svc**: Stands for Alternative Services, allows origin’s resources to be\
    \ authoritatively available at a separate location and even different protocol\n\
    \  - The proposal can be found here: [`https://datatracker.ietf.org/doc/html/rfc7838`](https://datatracker.ietf.org/doc/html/rfc7838)\n\
    \  - The proposal explains that `Alt-Svc` was added to clarify the location of\
    \ a resource vs. the identification of the resource. Here, we see it used to explain\
    \ we can modify our request to `h3` (HTTP/3) and even QUIC!\n    - `\"ma\"` stands\
    \ for max-age for availability of resource at this location/protocol.\n    - `\"\
    v\"` is used to indicate the version of protocol used, part of earlier QUIC-HTTP\
    \ drafts still used by some.\n- **Content-Type**: Used to parse response body\n\
    \nWhile this book is not focused on any particular aspect of networking and its\
    \ main focus is Go’s network abilities; we find it instructive to explain related\
    \ items such as the aforementioned headers.\n\nThese convenience functions such\
    \ as `Head` have unspoken complexity behind them. Take a peek at `Head`'s documentation.\n\
    \n```\nch8$ go doc net/http.Head\npackage http // import \"net/http\"\nfunc Head(url\
    \ string) (resp *Response, err error)\nHead issues a HEAD to the specified URL.\
    \ If the response is one of the\nfollowing redirect codes, Head follows the redirect,\
    \ up to a maximum of 10\nredirects:\n301 (Moved Permanently)\n302 (Found)\n303\
    \ (See Other)\n307 (Temporary Redirect)\n308 (Permanent Redirect)\nHead is a wrapper\
    \ around DefaultClient.Head\nTo make a request with a specified context.Context,\
    \ use\nNewRequestWithContext and DefaultClient.Do.\n```\n\nThe following are a\
    \ couple of critical items to consider:\n\n- `30z` causes a redirect (a.k.a. another\
    \ request).\n- A default client exists:\n\n```\nch8$ go doc net/http.DefaultClient\n\
    package http // import \"net/http\"\nvar DefaultClient = &Client{}\nDefaultClient\
    \ is the default Client and is used by Get, Head, and Post.\n```\n\nWe will learn\
    \ more about this client including its related `Do` method."
