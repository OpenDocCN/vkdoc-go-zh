    ### i18n


    互联网日益国际化（i18n）引发了一些复杂问题。主机名可以采用称为 IDN（国际化域名）的国际化形式给出。为了与不支持 Unicode 的旧有实现（如旧版邮件服务器）保持兼容，非
    ASCII 域名会被映射为称为 *punycode* 的 ASCII 表示形式。例如，域名 `日本語.jp` 的 punycode 值为 `xn—wgv71a119e.jp`。例如，我们可以使用
    `telnet` 来查看转换。


    ```

    $ mkdir ch8

    $ ch ch8

    ch8$ telnet 日本語.jp 80

    Trying 2001:218:3001:7::110...

    Connected to xn--wgv71a119e.jp.

    Escape character is ''^]''.

    ^]

    telnet> quit

    Connection closed.

    ```


    非 ASCII 域名到 punycode 值的转换并非由 Go 的 `net` 库自动执行，但有一个名为 `golang.org/x/net/idna` 的扩展包，可用于在
    Unicode 及其 punycode 值之间进行转换。关于此主题，在“Figure Out IDNA Punycode Story”([`https://github.com/golang/go/issues/13835`](https://github.com/golang/go/issues/13835))
    中正在进行讨论。


    我们可以针对前述域名 `日本語.jp` 尝试使用 IDNs 包；创建文件 `punycode.go`。


    ```

    ch8$ vi punycode.go

    package main

    import (

    "fmt"

    "golang.org/x/net/idna"

    "net/url"

    )

    func main() {

    s := "https://日本語.jp:8443"

    r1, _ := idna.ToASCII(s)

    r2, _ := idna.ToUnicode(r1)

    fmt.Println(r1)

    fmt.Println(r2)

    fmt.Println(url.QueryEscape(s))

    }

    ch8$ go mod init example.com/user/punycode

    ch8$ go mod tidy

    ch8$ go run punycode.go

    xn--https://-5y4qg6h355l.jp:8443

    https://日本語.jp:8443

    https%3A%2F%2F%E6%97%A5%E6%9C%AC%E8%AA%9E.jp%3A8443

    ```


    国际化域名带来了所谓的*同形字*攻击的可能性。许多 Unicode 字符外观相似，例如俄语中的 o (U+043E)、希腊语中的 o (U+03BF) 和英语中的
    o (U+006F)。使用诸如 `google.com`（包含两个俄语 o）这类同形字的域名可能会造成混乱。已知有多种防御措施，例如始终显示 punycode（此处为
    `xn—ggle-55da.com`，使用 Punycode 转换器）。


    URI/URL 中的路径处理起来更为复杂，因为它指向相对于某个 HTTP 服务器的路径，而该服务器可能运行在特定的本地化环境中。编码可能不是 UTF-8，甚至不是
    Unicode。IRI（国际化资源标识符）通过首先将任何本地化字符串转换为 UTF-8，然后对任何非 ASCII 字节进行百分号转义来管理这一点。标题为“An
    Introduction to Multilingual Web Addresses”([`https://www.w3.org/International/articles/idn-and-iri/`](https://www.w3.org/International/articles/idn-and-iri/))
    的 W3C 页面提供了更多信息。从其他编码转换为 UTF-8 在第 6 章中已介绍，而 Go 在 `net/url` 中提供了 `QueryEscape/QueryUnescape`
    函数，并在 Go 1.8 中提供了 `PathEscape/PathUnescape` 函数来进行百分号转换。


    ### HTTP 特性


    HTTP 是一种无状态、无连接、可靠的协议。在最简单的形式中，来自用户代理的每个请求都被可靠地处理，然后连接被断开。


    在最早的 HTTP 版本中，每个请求都涉及一个独立的 TCP 连接，因此如果需要许多资源（例如 HTML 页面中嵌入的图片），则需要在短时间内建立和拆除许多
    TCP 连接。


    HTTP 1.1 在 HTTP 中添加了许多优化，这增加了简单结构的复杂性，但创建了一个更高效、更可靠的协议。HTTP/2 采用了二进制形式以进一步提高效率。HTTP/3
    更进一步，用 UDP 取代了典型的 TCP 套接字，并进行了其他相关改进（例如，通过 TLS 提供内置安全性）。


    ### 版本


    HTTP 有四个版本：


    *   版本 0.9 (1991)：完全过时

    *   版本 1.0 (1996)：几乎过时

    *   版本 1.1 (1999)：目前最流行的版本

    *   版本 2 (2015)：最新版本

    *   版本 3 (~2022)：处于正式批准的最终阶段，已投入生产使用


    每个版本都必须理解早期版本的请求和响应。


    ### HTTP/0.9


    HTTP/0.9 是 1991 年由蒂姆·伯纳斯-李定义的原始 HTTP。您可以在此处找到规范：[`https://www.w3.org/Protocols/HTTP/AsImplemented.html`](https://www.w3.org/Protocols/HTTP/AsImplemented.html)。


    请求格式：


    ```

    Request = Simple-Request

    Simple-Request = "GET" SP Request-URI CRLF

    ```


    #### 响应格式


    响应采用以下形式：


    ```

    Response = Simple-Response

    Simple-Response = [Entity-Body]

    ```


    上述内容只是对 HTTP/0.9 的一瞥（例如，SP 代表“空格”）。由于它已不再使用，我们不再花更多时间在上面。


    ### HTTP/1.0


    该版本向请求和响应中添加了更多信息。0.9 格式并未被“扩展”，而是与新版本并存。此时，W3C 和 IETF 组织的参与度更高了。HTTP/1.0 规范可在此处找到：[`https://datatracker.ietf.org/doc/html/rfc1945`](https://datatracker.ietf.org/doc/html/rfc1945)。


    值得注意的是，在此期间，Roy Fielding 教授因开发 REST 而闻名。他关于 REST 的论文大部分内容可在此处找到：[`https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm`](https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)。


    #### 请求格式


    从客户端到服务器的请求格式是：


    ```

    Request = Simple-Request | Full-Request

    Simple-Request = "GET" SP Request-URI CRLF

    Full-Request = Request-Line

    *(General-Header

    | Request-Header

    | Entity-Header)

    CRLF

    [Entity-Body]

    ```


    `Simple-Request` 是 HTTP/0.9 请求，并且必须由 `Simple-Response` 回复。


    `Request-Line` 的格式如下：


    ```

    Request-Line = Method SP Request-URI SP HTTP-Version CRLF

    ```


    其中：


    ```

    Method = "GET" | "HEAD" | POST |

    extension-method

    ```


    示例如下：


    ```

    GET http://jan.newmarch.name/index.html HTTP/1.0

    ```


    #### 响应格式


    响应采用以下形式：


    ```

    Response = Simple-Response | Full-Response

    Simple-Response = [Entity-Body]

    Full-Response = Status-Line

    *(General-Header

    | Response-Header

    | Entity-Header)

    CRLF

    [Entity-Body]

    ```


    `Status-Line` 提供了关于请求处理结果的信息：


    ```

    Status-Line = HTTP-Version SP Status-Code SP Reason-Phrase CRLF

    ```


    示例如下：


    ```

    HTTP/1.0 200 OK

    ```


    状态行中的状态码如下：


    ```

    Status-Code =     "200" ; OK

    | "201" ; Created

    | "202" ; Accepted

    | "204" ; No Content

    | "301" ; Moved permanently

    | "302" ; Moved temporarily

    | "304" ; Not modified

    | "400" ; Bad request

    | "401" ; Unauthorized

    | "403" ; Forbidden

    | "404" ; Not found

    | "500" ; Internal server error

    | "501" ; Not implemented

    | "502" ; Bad gateway

    | "503" | Service unavailable

    | extension-code

    ```


    有些状态码在 HTTP/1.0 标准发布时尚未定义。例如，203 “非权威信息” 和 303 “查看其他位置” 是在 HTTP/1.1 中定义的。


    `General-Header` 通常是日期，而 `Response-Header` 是位置、服务器或认证字段。


    `Entity-Header` 包含关于后续 `Entity-Body` 的有用信息：


    ```

    Entity-Header = Allow

    | Content-Encoding

    | Content-Length

    | Content-Type

    | Expires

    | Last-Modified

    | extension-header

    ```


    例如（其中字段类型在 `//` 后给出）：


    ```

    HTTP/1.1 200 OK                             // status line

    Date: Fri, 29 Aug 2003 00:59:56 GMT         // general header

    Server: Apache/2.0.40 (Unix)                // response header

    Content-Length: 1595                        // entity header

    Content-Type: text/html; charset=ISO-8859-1 // entity header

    ```

