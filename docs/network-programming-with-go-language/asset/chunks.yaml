    ch4$ vi newbase64coders.go

    package main

    import (

    "bytes"

    "encoding/base64"

    "fmt"

    "io"

    )

    var (

    enc   *base64.Encoding = base64.StdEncoding.WithPadding(''|'')

    input []byte           = []byte("∞a∞\x02ab")

    w     bytes.Buffer

    )

    func restoreViaDecoder() {

    var buf *bytes.Buffer = bytes.NewBuffer(w.Bytes())

    var ior io.Reader = base64.NewDecoder(enc, buf)

    l := len(input)

    // adjust for unknown padding

    if l > 3 && l%3 != 0 {

    l = l + 2

    }

    restored := make([]byte, l)

    ior.Read(restored)

    fmt.Printf("%11s: %s %v\n", "viaDecoder", string(restored), restored)

    }

    func restoreViaEncoding() {

    var dst []byte = make([]byte, len(input))

    enc.Decode(dst, w.Bytes())

    fmt.Printf("%11s: %s %v\n", "viaEncoding", string(dst), dst)

    }

    func main() {

    fmt.Printf("%11s: %s %v\n", "input", string(input), input)

    var wc io.WriteCloser = base64.NewEncoder(enc, &w)

    wc.Write(input)

    wc.Close()

    fmt.Printf("%11s: %s %v\n", "ecoded", string(w.Bytes()), w.Bytes())

    restoreViaDecoder()

    restoreViaEncoding()

    }

    ```


    The code uses the same encoder but decodes in two styles; again choose which based
    on your needs.


    ```

    ch4$ go run newbase64coders.go

    input: ∞a∞ab [226 136 158 97 226 136 158 2 97 98]

    encoded: 4oieYeKIngJhYg|| [52 111 105 101 89 101 75 73 110 103 74 104 89 103 124
    124]

    viaDecoder: ∞a∞ab [226 136 158 97 226 136 158 2 97 98 0 0]

    viaEncoding: ∞a∞ab [226 136 158 97 226 136 158 2 97 98]

    ```


    ## Protocol Buffers


    The serialization methods considered so far fall into various types:


    *   ASN.1 encodes the different types using binary tags in the data. In that sense,
    an ASN.1 encoded data structure is a self-describing structure.


    *   JSON similarly is a self-describing format using the rules of JavaScript data
    structures: lists, dictionaries, etc.


    *   Gob similarly encodes type information into its encoded form. This is far
    more detailed than the JSON format.


    A separate class of serialization techniques rely on an external specification
    of the data type to be encoded. There are several major ones, such as the encoding
    used by ONC RPC.


    ONC RPC is an old encoding, targeted toward the C language. A recent one is from
    Google, known as *protocol buffers*. This is not supported in the Go Standard
    Libraries but is supported by the Google Protocol Buffers developer group ([`https://developers.google.com/protocol-buffers/`](https://developers.google.com/protocol-buffers/))
    and is apparently very popular within Google. For that reason, we include a section
    on protocol buffers, although in the rest of the book, we typically deal with
    the Go Standard Libraries.


    Protocol buffers are a binary encoding of data intended to support the data types
    of a large variety of languages. They rely on an external specification of a data
    structure, which is used to encode data (in a source language) and also to decode
    the encoded data back into a target language. (Note: Protocol buffers transitioned
    to version 3 in July 2016\. It is not compatible with version 2\. Version 2 will
    be supported for a long time but will eventually be obsoleted. See Protocol Buffers
    v3.0.0 at ([`https://github.com/google/protobuf/releases/tag/v3.0.0`](https://github.com/google/protobuf/releases/tag/v3.0.0)).


    The data structure to be serialized is known as a *message.* The data types supported
    in each message include


    *   Numbers (integers or floats)


    *   Booleans


    *   Strings (in UTF-8)


    *   Raw bytes


    *   Maps


    *   Other messages, allowing complex data structures to be built


    The fields of a message are all optional (this is a change from `proto2` where
    fields were required or optional). A field can stand for a list or array by the
    keyword repeated or a map using the keyword map. Each field has a type, followed
    by a name, followed by a tag index value. The full language guide is called the
    “Protocol Buffers Language Guide” (see [`https://developers.google.com/protocol-buffers/docs/proto`](https://developers.google.com/protocol-buffers/docs/proto)).


    Messages are defined independent of the possible target language. A version of
    the `Person` type in the syntax of Protocol Buffers version 3 is `personv3.proto`.
    Note that the file includes specific tags (1, 2) on each type.


    ```

    ch4$ vi personv3.proto

    syntax = "proto3";

    option go_package = "/protos";

    package person;

    message Person {

    message Name {

    string family = 1;

    string personal = 2;

    }

    message Email {

    string kind = 1;

    string address = 2;

    }

    Name  name = 1;

    repeated Email email = 2;

    }

    ```


    ### Installing and Compiling Protocol Buffers


    Protocol buffers are compiled using a program called protoc. This is unlikely
    to be installed on your system.


    Install the latest version from the Protocol Buffers v3 page. For 64-bit Linux,
    for example, download protoc-3.19.4-linux-x86_64.zip (or later) from GitHub and
    unzip it to a suitable place (it includes the binary bin/protoc, which should
    be placed somewhere in your PATH). You can find the compiler here: [`https://github.com/protocolbuffers/protobuf/releases/latest`](https://github.com/protocolbuffers/protobuf/releases/latest).


    After, install the “protoc” binary. You also need the `“`back end`”` to generate
    Go files. To do this, fetch it from GitHub:


    ```

    ch4$ go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

    ```


    This will install protoc-gen-go into $GOPATH/bin, so make sure your path is set
    up to use it. Each language has a specific "back end" that works with protoc.
    Other tools can ease the installation like a package manager.


    You are nearly ready to compile a .proto file. The previous example of personv3.proto
    declares the package person. In your GOPATH, you should have a directory called
    src. Create a subdirectory called src/person.


    Then compile the personv3.proto as follows:


    ```

    ch4$ mkdir myapp

    ch4$ protoc --go_out=./myapp ./personv3.proto

    ```


    This should create the ./myapp/protos/personv3.pb.go file.


    ### The Generated personv3.pb.go File


    The compiled file will declare a number of types and methods on these types. The
    types are as follows:


    ```

    type Person struct {

    ...

    Name  *Person_Name    `protobuf:"bytes,1,opt,name=name,proto3" json:"name,omitempty"`

    Email []*Person_Email `protobuf:"bytes,2,rep,name=email,proto3" json:"email,omitempty"`

    }

    type Person_Name struct {

    ...

    Family   string `protobuf:"bytes,1,opt,name=family,proto3" json:"family,omitempty"`

    Personal string `protobuf:"bytes,2,opt,name=personal,proto3" json:"personal,omitempty"`

    }

    type Person_Email struct {

    ...

    Kind    string `protobuf:"bytes,1,opt,name=kind,proto3" json:"kind,omitempty"`

    Address string `protobuf:"bytes,2,opt,name=address,proto3" json:"address,omitempty"`

    }

    ```


    They are in the package called person. (Note: Simple types such as strings are
    encoded directly. In Protocol Buffers v2, a pointer was used. For compound types,
    a pointer is required, as in v2.)'
