- fmt: '# Unicode


    Neither ASCII nor ISO 8859 covers the languages based on hieroglyphs. Chinese
    is estimated to have about 20,000 separate characters, with about 5,000 in common
    use. These need more than a byte, and typically, two bytes have been used. There
    have been many of these two-byte character sets: `Big5`, `EUC-TW`, `GB2312`, and
    `GBK/GBX` for Chinese; `JIS X 0208` for Japanese; and so on. These encodings are
    generally not mutually compatible.


    `Unicode` is an embracing standard character set intended to cover all major character
    sets in use. It includes European, Asian, Indian, and many more. It is now up
    to version 14.0 and has 144,697 assigned characters. The number of code points
    is 1,114,112 (65,536 code points across 17 planes). That is more than 2^16. This
    has implications for character encodings.


    The first 256 code points correspond to `ISO 8859-1`, with `US ASCII` as the first
    128. There is thus a backward compatibility with these major character sets, as
    the code points for `ISO 8859-1` and `ASCII` are exactly the same in `Unicode`.
    The same is not true for other character sets: for example, while most of the
    `Big5` characters are also in `Unicode`, the code points are not the same. The
    website [`http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt`](http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt)
    contains one example of a (large) table mapping from `Big5` to `Unicode`.


    To represent `Unicode` characters in a computer system, an encoding must be used.
    The encoding `UCS` is a two-byte encoding using the code point values of the `Unicode`
    characters. However, since there are now too many characters in `Unicode` to fit
    them all into 2 bytes, this encoding is obsolete and no longer used. Instead,
    there are the following:


    - `UTF-32` is a 4-byte encoding but is not commonly used, and `HTML5` warns explicitly
    against using it.

    - `UTF-16` encodes the most common characters into 2 bytes with a further 2 bytes
    for the “overflow,” with `ASCII` and `ISO 8859-1` having the usual values.

    - `UTF-8` uses between 1 and 4 bytes per character, with `ASCII` having the usual
    values (but not `ISO 8859-1`).

    - Per the `Unicode` specification, `UTF-8`, `UTF-16`, and `UTF-32` are fully interoperable
    with each other.

    - `UTF-7` is used sometimes but is not common.


    Some considerations when selecting a particular `UTF` encoding^([^(10)](#fn10))
    include the following:


    - Desire fixed width and single code unit access; use `UTF-32`.

    - Space concerns, use `UTF-16`.

    - Serialization is inherent with `UTF-8`.


    ## UTF-8, Go, and Runes


    `UTF-8` is the most commonly used encoding. Google estimated that in 2008, 50%
    of the pages that it sees are encoded in `UTF-8` and that proportion is increasing.
    The `ASCII` set has the same encoding values in `UTF-8`, so a `UTF-8` reader can
    read text consisting of just `ASCII` characters as well as text from the full
    `Unicode` set.


    Go uses `UTF-8` encoded characters in its strings. Each character is of type `rune`.
    This is an alias for `int32`. A `Unicode` character can be up to 4 bytes in `UTF-8`
    encoding, so 4 bytes are needed to represent all characters. In terms of characters,
    a string is an array of runes using 1, 2, or 4 bytes per rune.


    A string is also an array of bytes, but you have to be careful: only for the `ASCII`
    subset is a byte equal to a character. All other characters occupy 2, 3, or 4
    bytes. This means that the length of a string in characters (runes) is generally
    not the same as the length of its byte array. They are equal only when the string
    consists of `ASCII` characters only.


    The following program fragment illustrates this. If you take a `UTF-8` string
    and test its length, you get the length of the underlying byte array. But if you
    cast the string to an array of runes `[]rune`, then you get an array of the `Unicode`
    code points, which is generally the number of characters:


    ```

    $ mkdir ch6

    $ cd ch6

    $ vi runeprint.go

    package main

    import "fmt"

    func main() {

    str := "百度一下, 你就知道"

    fmt.Println("String length: ", len([]rune(str)))

    fmt.Println("Byte length: ", len(str))

    }

    ch6$ go run runeprint.go

    String length:  10

    Byte length:  26

    ```


    A more detailed explanation of strings and runes is given by The Go Blog (see
    [`https://go.dev/blog/strings`](https://go.dev/blog/strings)).


    ### UTF-8 Client and Server


    Possibly surprisingly, you need to do nothing special to handle `UTF-8` text in
    either the client or the server. The underlying data type for a `UTF-8` string
    in Go is a byte array, and as we just saw, Go looks after encoding the string
    into 1, 2, 3, or 4 bytes as needed. The length of the string is the length of
    the byte array, so you write any `UTF-8` string by writing the byte array.


    Similarly, to read a string, you just read into a byte array and then cast the
    array to a string using `string([]byte)`. If Go cannot properly decode bytes into
    `Unicode` characters, then it gives the Unicode Replacement Character `\uFFFD`.
    The length of the resulting byte array is the length of the legal portion of the
    string.


    So the clients and servers given in earlier chapters work perfectly well with
    `UTF-8` encoded text.


    ### ASCII Client and Server


    The `ASCII` characters have the same encoding in `ASCII` and in `UTF-8`. So ordinary
    `UTF-8` character handling works fine for `ASCII` characters. No special handling
    needs to be done.


    ## UTF-16 and Go


    `UTF-16` deals with arrays of short 16-bit unsigned integers. The package `utf16`
    is designed to manage such arrays. To convert a normal Go string, which is a `UTF-8`
    string, into `UTF-16`, you first extract the code points by coercing it into a
    `[]rune` and then use `utf16.Encode` to produce an array of type `uint16`.


    Similarly, to decode an array of unsigned short `UTF-16` values into a Go string,
    you use `utf16.Decode` to convert it into code points as type `[]rune` and then
    to a string. The following code fragment illustrates this:


    ```

    ch6$ vi utf16encodedecode.go

    package main

    import (

    "unicode/utf16"

    "fmt"

    )

    func main() {

    str := "百度一下, 你就知道"

    fmt.Println("Before encoding:", str)

    runes := utf16.Encode([]rune(str))

    ints := utf16.Decode(runes)

    str = string(ints)

    fmt.Println("After encoding:", str)

    }

    ch6$ go run utf16encodedecode.go

    Before encoding: 百度一下, 你就知道

    After encoding: 百度一下, 你就知道

    ```


    These type conversions need to be applied by clients or servers as appropriate,
    to read and write 16-bit short integers, as shown next.


    ### Little-Endian and Big-Endian


    Unfortunately, there is a little devil lurking behind `UTF-16`. It is basically
    an encoding of characters into 16-bit short integers. The big question is the
    following: For each short, how is it written as two bytes? The top one first,
    or the top one second? Either way is fine, as long as the receiver uses the same
    convention as the sender.


    `Unicode` has addressed this with a special character known as the *BOM* (byte
    order marker). This is a zero-width nonprinting character, so you never see it
    in text. But its value (e.g., `0xfffe`) is chosen so that you can tell the byte
    order:


    - In a big-endian system, it is `FF FE`.

    - In a little-endian system, it is `FE FF`.


    Text will sometimes place the `BOM` as the first character in the text. The reader
    can then examine these two bytes to determine what endian-ness has been used.'
