- fmt: '# X.509 Certificates


    A Public Key Infrastructure (PKI) is a framework for a collection of public keys,
    along with additional information such as owner name and location and links between
    them giving some sort of approval mechanism.


    The principal PKI in use today is based on X.509 certificates. For example, web
    browsers use them to verify the identity of websites.


    An example program to generate a self-signed X.509 certificate for my website
    and store it in a `.cer` file is `genx509cert.go`:


    ```

    ch7$ vi genx509cert.go

    /* GenX509Cert

    */

    package main

    import (

    "crypto/rand"

    "crypto/rsa"

    "crypto/x509"

    "crypto/x509/pkix"

    "encoding/gob"

    "encoding/pem"

    "fmt"

    "math/big"

    "os"

    "time"

    )

    func main() {

    random := rand.Reader

    var key rsa.PrivateKey

    loadKey("private.key", &key)

    now := time.Now()

    then := now.Add(60 * 60 * 24 * 365 * 1000 * 1000 * 1000)

    // one year

    template := x509.Certificate{

    SerialNumber: big.NewInt(1),

    Subject: pkix.Name{

    CommonName:   "jan.newmarch.name",

    Organization: []string{"Jan Newmarch"},

    },

    NotBefore:    now,

    NotAfter:     then,

    SubjectKeyId: []byte{1, 2, 3, 4},

    KeyUsage: x509.KeyUsageCertSign |

    x509.KeyUsageKeyEncipherment | x509.KeyUsageDigitalSignature,

    BasicConstraintsValid: true,

    IsCA:                  true,

    DNSNames: []string{"jan.newmarch.name",

    "localhost"},

    }

    derBytes, err := x509.CreateCertificate(random, &template,

    &template, &key.PublicKey, &key)

    checkError(err)

    certCerFile, err := os.Create("jan.newmarch.name.cer")

    checkError(err)

    certCerFile.Write(derBytes)

    certCerFile.Close()

    certPEMFile, err := os.Create("jan.newmarch.name.pem")

    checkError(err)

    pem.Encode(certPEMFile, &pem.Block{Type: "CERTIFICATE", Bytes: derBytes})

    certPEMFile.Close()

    keyPEMFile, err := os.Create("private.pem")

    checkError(err)

    pem.Encode(keyPEMFile, &pem.Block{Type: "RSA PRIVATE KEY",

    Bytes: x509.MarshalPKCS1PrivateKey(&key)})

    keyPEMFile.Close()

    }

    func loadKey(fileName string, key interface{}) {

    inFile, err := os.Open(fileName)

    checkError(err)

    decoder := gob.NewDecoder(inFile)

    err = decoder.Decode(key)

    checkError(err)

    inFile.Close()

    }

    func checkError(err error) {

    if err != nil {

    fmt.Println("Fatal error ", err.Error())

    os.Exit(1)

    }

    }

    ```


    We next load the crypto assets we just generated and provide basic checks for
    correctness, create `loadx509cert.go`:


    ```

    ch7$ vi loadx509cert.go

    /* LoadX509Cert

    */

    package main

    import (

    "crypto/rsa"

    "crypto/x509"

    "encoding/gob"

    "fmt"

    "log"

    "os"

    )

    func main() {

    // load certificate so we can access embedded public key

    certCerFile, err := os.Open("jan.newmarch.name.cer")

    checkError(err)

    derBytes := make([]byte, 1000) // bigger than the file

    count, err := certCerFile.Read(derBytes)

    checkError(err)

    certCerFile.Close()

    // trim the bytes to actual length in call

    cert, err := x509.ParseCertificate(derBytes[0:count])

    checkError(err)

    fmt.Printf("Name %s\n", cert.Subject.CommonName)

    fmt.Printf("Not before %s\n", cert.NotBefore.String())

    fmt.Printf("Not after %s\n", cert.NotAfter.String())

    // load non-emdedded public key

    // should be the same as above embedded key

    pub, err := os.Open("public.key")

    checkError(err)

    dec := gob.NewDecoder(pub)

    publicKey := new(rsa.PrivateKey)

    err = dec.Decode(publicKey)

    checkError(err)

    pub.Close()

    // genx509cert.go created a public key and certificate

    // certificates also embed the public key

    // we are comparing the public key and the embedded public key fields

    // see go doc crypto/rsa.PublicKey for more

    if cert.PublicKey.(*rsa.PublicKey).N.Cmp(publicKey.N) == 0 {

    if publicKey.E == cert.PublicKey.(*rsa.PublicKey).E {

    fmt.Println("Same public key")

    return

    }

    }

    fmt.Println("Different public key")

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    Here, we can see the round trip creation and confirmation of the certificate.


    ```

    ch7$ go run genx509cert.go

    ```


    Note the creation of the certificate and pem files.


    ```

    ch7$ go run loadx509cert.go

    Name jan.newmarch.name

    Not before 2021-12-26 22:51:42 +0000 UTC

    Not after 2022-12-26 22:51:42 +0000 UTC

    Same public key

    ```


    ## TLS


    Encryption/decryption schemes are of limited use if you have to do all the heavy
    lifting yourself. The most popular mechanism on the Internet to give support for
    encrypted message passing is currently TLS (Transport Layer Security), which was
    formerly SSL (Secure Sockets Layer).


    In TLS, a client and a server negotiate identity using X.509 certificates. Once
    this is complete, a secret key is invented between them, and all encryption/decryption
    is done using this key. The negotiation is relatively slow, but once it''s complete,
    the faster secret key mechanism is used. The server is *required* to have a certificate;
    the client *may* have one if needed.


    ### A Basic Client


    We first illustrate connecting to a server that has a certificate signed by a
    "well-known" certificate authority (CA) such as RSA. The program to get HEAD information
    from a web server can be adapted to get HEAD information from a TLS web server.
    The program is `tlsgethead.go`. We are illustrating `TLS.Dial` here and will discuss
    HTTPS in a later chapter.


    ```

    ch7$ vi tlsgethead.go

    /* TLSGetHead

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "io/ioutil"

    "log"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "host:port")

    }

    service := os.Args[1]

    // Dial over secure channel

    conn, err := tls.Dial("tcp", service, nil)

    checkError(err)

    _, err = conn.Write([]byte("HEAD / HTTP/1.0\r\n\r\n"))

    checkError(err)

    result, err := ioutil.ReadAll(conn)

    checkError(err)

    fmt.Println(string(result))

    conn.Close()

    os.Exit(0)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    When we run the `tlsgethead.go` client against an appropriate site such as `google.com`
    we see the HTTP HEAD request results:


    ```

    ch7$ go run tlsgethead.go google.com:443

    HTTP/1.0 200 OK

    Content-Type: text/html; charset=ISO-8859-1

    P3P: CP="This is not a P3P policy! See g.co/p3phelp for more info."

    Date: Sun, 26 Dec 2021 23:10:40 GMT

    Server: gws

    X-XSS-Protection: 0

    X-Frame-Options: SAMEORIGIN

    Expires: Sun, 26 Dec 2021 23:10:40 GMT

    Cache-Control: private

    Set-Cookie: 1P_JAR=2021-12-26-23; expires=Tue, 25-Jan-2022 23:10:40 GMT; path=/;
    domain=.google.com; Secure

    Set-Cookie: NID=511=KAxTu1K-XmrjU5Pml-zP015rWWWWafskpa1bdm4Kcn96qPutrX_Ezc8-gSprT5Xo3fjkxwRdB0Am5E7LqAlQJn61VABmytAfahOauqempNg8egIAus5Ch7ypME8dnJ7VRh7Hd0F6XSViYsyHAWDcauelaxMCGRtW5RSU_Nef3UQ;
    expires=Mon, 27-Jun-2022 23:10:40 GMT; path=/; domain=.google.com; HttpOnly

    Alt-Svc: h3=":443"; ma=2592000,h3-29=":443"; ma=2592000,h3-Q050=":443"; ma=2592000,h3-Q046=":443";
    ma=2592000,h3-Q043=":443"; ma=2592000,quic=":443"; ma=2592000; v="46,43"

    ```


    Other sites may produce other responses, but this client is still happy to have
    set up the TLS session with a properly authenticating server.


    It''s interesting to run this against the site `gooogle.com` (note the extra "o"!):


    ```

    ch7$ go run tlsgethead.go gooogle.com:443

    ```


    This site actually belongs to Google, as they have probably bought it to reduce
    fraud risk. The program throws a fatal error, as the site certificate is not for
    *gooogle* with three "o"s:


    ```

    Fatal error  x509: certificate is valid for www.google.com, not gooogle.com

    exit status 1

    ```


    In the past, browsers would error on such types, now they redirect to the proper
    domain (sometimes).'
