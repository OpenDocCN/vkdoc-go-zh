- fmt: '### Server Using a Self-Signed Certificate


    If the server uses a self-signed certificate, as might be used internally in an
    organization or when experimenting, the Go package will generate an error: `"x509:
    certificate signed by unknown authority"`. Either the certificate must be installed
    into the client''s operating system (which will be O/S dependent), or the client
    must install the certificate as a root CA. We will show this second way.


    An echo server using TLS with *any* certificate is `tlsechoserver.go`:


    ```

    ch7$ vi tlsechoserver.go

    /* TLSEchoServer

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "log"

    "net"

    )

    func main() {

    cert, err := tls.LoadX509KeyPair("jan.newmarch.name.pem",

    "private.pem")

    checkError(err)

    config := tls.Config{Certificates: []tls.Certificate{cert}}

    service := "0.0.0.0:1200"

    listener, err := tls.Listen("tcp", service, &config)

    checkError(err)

    fmt.Println("Listening")

    for {

    conn, err := listener.Accept()

    if err != nil {

    fmt.Println(err.Error())

    continue

    }

    fmt.Println("Accepted")

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    defer conn.Close()

    var buf [512]byte

    for {

    fmt.Println("Trying to read")

    n, err := conn.Read(buf[0:])

    if err != nil {

    fmt.Println(err)

    return

    }

    fmt.Println(string(buf[0:]))

    _, err = conn.Write(buf[0:n])

    if err != nil {

    return

    }

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    A simple TLS client won''t work with this server if the certificate is self-signed,
    which it is here. We need to set a configuration as the third parameter to `TLS.Dial`,
    which has our certificate installed as a root certificate. Thanks to Josh Bleecher
    Snyder in “Getting x509: Certificate Signed by Unknown Authority” ([`https://groups.google.com/forum/#!topic/golang-nuts/v5ShM8R7Tdc`](https://groups.google.com/forum/#!topic/golang-nuts/v5ShM8R7Tdc))
    for showing how to do this. The server then works with the `tlsechoclient.go`
    client.


    ```

    ch7$ vi tlsechoclient.go

    package main

    import (

    "crypto/tls"

    "crypto/x509"

    "fmt"

    "os"

    )

    func main() {

    rootPEM, err := os.ReadFile("jan.newmarch.name.pem")

    // First, create the set of root certificates. For this example we only

    // have one. It''s also possible to omit this in order to use the

    // default root set of the current operating system.

    roots := x509.NewCertPool()

    if ok := roots.AppendCertsFromPEM(rootPEM); !ok {

    panic("failed to parse root certificate")

    }

    conn, err := tls.Dial("tcp", "localhost:1200", &tls.Config{

    RootCAs: roots,

    })

    if err != nil {

    panic("failed to connect: " + err.Error())

    }

    // Now write and read lots

    for n := 0; n < 10; n++ {

    fmt.Println("Writing...")

    conn.Write([]byte("Hello " + string(n+48)))

    var buf [512]byte

    n, _ := conn.Read(buf[0:])

    fmt.Println(string(buf[0:n]))

    }

    conn.Close()

    }

    ```


    Running the server in one terminal.


    ```

    ch7$ go run tlsechoserver.go

    ... listening ...

    ```


    In another terminal, run the client.


    ```

    ch7$ go run tlsechoclient.go localhost:1200

    Writing...

    Hello 0

    Writing...

    Hello 1

    ...

    Writing...

    Hello 9

    ```


    Back on the server, we see the following:


    ```

    Accepted

    Trying to read

    Hello 0

    Trying to read

    Hello 1

    ...

    EOF

    ```


    We can also change the client and prevent it from accepting a self-signed certificate.
    By changing to the following code, the outcome will differ.


    ```

    conn, err := tls.Dial("tcp", "localhost:1200", &tls.Config{

    //                RootCAs: roots,

    InsecureSkipVerify: false,

    })

    // assuming the server is running with valid root certificate

    ch7$ go run tlsechoclient.go localhost:1200

    panic: failed to connect: x509: "jan.newmarch.name" certificate is not trusted

    goroutine 1 [running]:

    main.main()

    /Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch7/tlsechoclient.go:25
    +0x2bb

    exit status 2

    ```


    On the server, we see the following error:


    ```

    Trying to read

    remote error: tls: bad certificate

    ```


    ## Conclusion


    Security is a huge area in itself, and this chapter barely touches on it. However,
    the major concepts have been covered. What has not been stressed is how much security
    needs to be built into the design phase: security as an afterthought is nearly
    always a failure.


    # 8. HTTP


    The World Wide Web is a major distributed system, with millions of users. A site
    may become a web host by running an HTTP server. While web clients are typically
    users with a browser, there are many other “user agents” such as web spiders,
    web application clients, and so on.


    The Web is built on top of the HTTP (Hypertext Transfer Protocol), which is typically
    layered on top of a socket (e.g., TCP). HTTP has been through four publicly available
    versions. Version 1.1 (the third version) is the most recognized (by developers).
    A behind-the-scene transition to HTTP/2 has captured over 60% of the current HTTP
    traffic. HTTP/3 is the latest update; a transition to this new version continues
    to increase due to performance benefits.


    This chapter is an overview of HTTP, followed by the Go APIs to manage HTTP connections.


    ## URLs and Resources


    URLs specify the location of a *resource*. A resource is often a static file,
    such as an HTML document, an image, or a sound file. But increasingly, it may
    be a dynamically generated object, perhaps based on information stored in a database.


    When a user agent requests a resource, what is returned is not the resource itself,
    but some *representation* of that resource. For example, if the resource is a
    static file, then what is sent to the user agent is a copy of the file.


    Multiple URLs may point to the same resource, and an HTTP server will return appropriate
    representations of the resource for each URL. For example, a company might make
    product information available both internally and externally using different URLs
    for the same product. The internal representation of the product might include
    information such as internal contact officers for the product, while the external
    representation might include the location of stores selling the product.


    This view of resources means that the HTTP protocol can be fairly simple and straightforward,
    while an HTTP server can be arbitrarily complex. HTTP has to deliver requests
    from user agents to servers and return a byte stream, while a server might have
    to do any amount of processing of the request.'
