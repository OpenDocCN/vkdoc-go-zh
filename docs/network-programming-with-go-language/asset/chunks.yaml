  trans: '

    ### 谬误：延迟为零


    延迟是指发送信号到收到回复之间的时间差。在单进程系统中，延迟可能取决于函数调用返回前执行的计算量；而在网络上，延迟通常仅仅是因为数据需要穿越传输链路，并沿途被路由器等各种节点处理所致。


    `ping`命令是展示延迟的好方法。从墨尔本向谷歌的澳大利亚服务器发送 ping 请求，大约需要 20 毫秒。向百度的中国服务器发送 ping 请求，则需要大约
    200 毫秒。^(¹)


    相比之下，Williams 的文章（参见[`http://www.eetimes.com/document.asp?doc_id=1200916`](http://www.eetimes.com/document.asp?doc_id=1200916)）讨论了
    Linux 调度器的延迟，得出的平均延迟为 88 *微*秒。网络调用的延迟要高出数千倍。另一篇著名的文章是 P. Norvig 的“须知数字”，其中展示了延迟发生在何处以及各组件如何影响延迟（参见[`https://norvig.com/21-days.html#answers`](https://norvig.com/21-days.html#answers)）。


    延迟会极大地影响分布式计算的设计和功能。例如，在计算调度决策时，如果数据收集速度过慢，就可能导致做出错误的决策。


    ### 谬误：带宽无限


    任何在下载文件时去泡杯茶或咖啡的人都知道这是个谬误。我运行着自己的网络服务器，在 ADSL2 网络下上传速度为 800 Kbps。很不幸，我家用的是 HFC
    网络，而灾难性的澳大利亚国家宽带网络要到 2020 年（三年后）才能将其升级到 1000 Kbps。


    与此同时，我使用本地无线连接获得了 75 Mbps 的上传和下载速度，但这仍然不够快！


    在 2021 年的修订版中，Ron 在旧金山通过电缆调制解调器获得了 400 Mbps 下载和 12 Mbps 上传速度。未来，我们会用 Starlink（或主流的卫星提供商）的数据进行更新；截至
    2022 年，星链据称能提供 200 Mbps 下载和 20 Mbps 上传速度。


    ### 谬误：网络是安全的


    科技公司强烈推动在所有网络通信中使用强加密，而世界各国政府也同等强烈地推动采用较弱系统或“仅供特定政府使用”的后门。这一点似乎对*民主*（我偶然拼写错误，但可能很准确！）政府和极权政府都同样适用。


    当然，除此之外，还有一般的“坏蛋”，他们窃取和贩卖数以百万计的信用卡号和密码。


    ### 谬误：拓扑结构不变


    事实并非如此。通常，这会影响延迟和带宽。但是，对路由或 IP 地址进行越多的硬编码，网络应用就越容易发生故障。如今，迁移到云端甚至云原生的情况并不少见，这正导致网络应用的集成方式发生许多变化。


    ### 谬误：只有一个管理员


    那又怎样？当一切运转正常时没问题。问题出在出故障时——该怪谁？谁来修复？


    多年来一个主要的研究课题是*网格计算*，它通常将计算任务分布到许多大学和研究机构，以解决庞大的科学问题。由于存在多个管理员、不同的访问和安全问题、不同的维护计划等等，这必须解决许多复杂的问题。云计算的出现*解决*了其中许多问题，减少了管理员和系统的数量，因此云计算比许多网格系统更具弹性。


    ### 谬误：传输成本为零


    一旦我买了电脑，从 CPU 到显示器的传输成本是零（好吧，少量的电费！）。但我们都每月向网络提供商付费，因为他们需要建造服务器机房、铺设线缆等等。这是一个必须考虑的成本（例如，每月付费或被迫观看广告）。


    ### 谬误：网络是同质的


    网络不是同质的，终端设备也不是——例如，你我的 PC、iPad、安卓设备和手机——更不用说物联网带来了无数联网设备。厂商不断地尝试进行产品锁定，而不断受限的工作环境也试图简化其控制系统，这些尝试在某种程度上是成功的。但当它们失败时，依赖同质性的系统也会失败。


    当我们构建应用程序并学习相关技术时，记住我们之前讨论的分层模型是值得的。它将帮助我们分类目的和活动。客户端和服务器可能不是相同的硬件或软件，但我们可以对它们进行建模，这有助于我们理解并理清一切。


    ## 结论


    本章试图强调，与其他计算风格相比，分布式计算有其独特的特性。忽视这些特性只会导致最终系统的失败。人们不断尝试简化架构模型，最近的是“微服务”和“无服务器”计算，但归根结底，复杂性依然存在。


    这些问题必须使用任何编程语言来解决，后续章节将探讨 Go 语言如何应对它们。


    脚注 1

    '
- fmt: '# 2\. Overview of the Go Language


    There is a continual stream of programming languages being invented. Some are
    highly specialized; others are quite generic, while a third group is designed
    to fill broad but to some extent niche areas. Go was created in 2007 and released
    publicly in 2009\. It was intended to be a systems programming language, augmenting
    (or replacing) C++ and other statically compiled languages for production network
    and multiprocessing systems.


    Go joins a group of modern languages including Rust, Swift, Julia, and several
    others. Go’s particular features are a simple syntax, fast compilation of multiple
    program units based on “structural” typing, and of course the benefit of lessons
    learned from large-scale programs in C, C++, and Java.


    The language popularity listings in Q1 2022 such as TIOBE (see [`http://www.tiobe.com/tiobe-index/`](http://www.tiobe.com/tiobe-index/))
    rank Go as currently the 13th most popular language. PYPL (see [`http://pypl.github.io/PYPL.html`](http://pypl.github.io/PYPL.html))
    places it also at number 13\. This is alongside the 20+-year-old languages of
    Java, Python, C, C++, JavaScript, and more.


    This book assumes you are an experienced programmer with some or extensive knowledge
    of Go at some level. This could be by an introductory text such as *Introducing
    Go* by Caleb Doxsey (O’Reilly) or *The Little Go Book* by Karl Seguin or by reading
    the more formal documentation such as The Go Programming Language Specification
    at [`https://go.dev/ref/spec`](https://go.dev/ref/spec).


    If you are an experienced programmer, you can skip this chapter. If not, this
    chapter points out the bits of Go that are used in this book, but you should go
    elsewhere to get the necessary background. There are several tutorials on the
    Go website at [`https://go.dev`](https://go.dev) such as the following:


    *   Getting started – [`https://go.dev/learn/`](https://go.dev/learn/)

    *   A tutorial for the Go programming language – [`https://go.dev/doc/tutorial/getting-started`](https://go.dev/doc/tutorial/getting-started)

    *   Online and interactive tutorial – [`https://go.dev/tour/list`](https://go.dev/tour/list)

    *   Effective Go – [`https://go.dev/doc/effective_go`](https://go.dev/doc/effective_go)


    Installing Go is best done from the Go programing language website. Examples in
    this book will run using Go 1.18\. The first edition of this book used 1.8. The
    core language and libraries have largely remained the same. The package management
    and tooling though continues to improve. The primary goal of this book is to implement
    networking concepts in your program and less about “perfect” Go. We will desire
    to keep up with the time and make sure you have the knowledge to not only create
    but also inspect other code.


    You don’t actually need to install Go to test the programs. Go has a “playground”
    accessible from the main page that can be used to run code ([`https://go.dev/play/`](https://go.dev/play/)).
    There are also several REPL (Read–Eval–Print Loop) environments, but these are
    third party. However, you will not be able to run network-related code typically.
    This is for safety reasons; the playground limits what you can do. It still is
    valuable for learning nonnetwork code and better still sharing code.


    The book predominantly uses libraries and packages from the Go Standard Library
    ([`https://pkg.go.dev/std`](https://pkg.go.dev/std)). The Go team also built a
    further set of packages as “subrepositories,” which often do not have the same
    support as the Standard Library. These are occasionally used. They will need to
    be installed using the `go get` command. These have package names including an
    “x,” such as `golang.org/x/net/ipv4`.


    In this revised edition, we will expand upon the related network ecosystem where
    Go is heavily used; examples include common Go networking middleware and microservice
    tooling (e.g., gRPC).


    ## Types


    There are predefined types of Boolean, numeric, and string types. The numeric
    types include `uint32`, `int32`, `float32`, and other sized numbers, as well as
    bytes (`uint8`) and runes. Runes (alias for `int32`) and strings are dealt with
    extensively in Chapter [6](#436770_2_En_6_Chapter.xhtml), as issues of internationalization
    can be significant in distributed programs.


    There are more complex types, discussed next.'
