    \ import \"builtin\"\nfunc cap(v Type) int\n内置函数 cap 返回 v 的容量，根据其类型：\n数组：v 中元素的数量（与\
    \ len(v) 相同）。\n指向数组的指针：*v 中元素的数量（与 len(v) 相同）。\n切片：当重新切片时，切片可以达到的最大长度；\n如果 v 为\
    \ nil，则 cap(v) 为 0。\n通道：通道缓冲区的容量，以元素为单位；\n如果 v 为 nil，则 cap(v) 为 0。\n对于某些参数，例如简单的数组表达式，结果可能是一个\n\
    常量。详情请参阅 Go 语言规范中的“长度和容量”部分\n以获取详细信息。\n```\n\n我们现在可以查看每个的长度和容量。还提到了其他类型，但我们这里专注于数组和切片。\n\
    \n```\nfmt.Println(len(a), cap(a)) // 5 5\nfmt.Println(len(s), cap(s)) // 3 4\n\
    ```\n\n切片的一个目标是我们可以对同一数组数据拥有许多不同的视图。例如，`a[2:]` 创建一个长度和容量均为 3 的切片。当长度和容量相等时，这意味着在不修改底层数据结构的情况下，切片无法增长。例如，如果我们对切片执行\
    \ `append()` 操作，它会插入到底层数组的相对位置。如果 `cap() – len() == 0`，那么底层数组的大小就需要增加。在这种情况下，这种增加确实会发生，但可能是出乎意料的。关于此过程以及切片如何共享数组（如果追加操作数据量过大则可能不共享）的更多细节，可以在此处找到：[`https://go.dev/blog/slices-intro`](https://go.dev/blog/slices-intro)。更多关于切片/数组关系（包括内存细节）的详细信息可以在这里找到：[`https://go.dev/blog/slices-intro`](https://go.dev/blog/slices-intro)。\n\
    \n### 映射\n\n*映射*是一种类型元素的无序集合，由另一种类型的键进行索引。本书中我们不常使用映射，但有一个地方是在第 [10](https://go.dev/blog/slices-intro)\
    \ 章中，其中 HTTP 请求字段的值可以通过使用字段名作为键，通过映射来访问。\n\n```\nmyval := 10\nx := map[string]int{\"\
    mykey\": myval}\n```\n\n上述赋值有一些值得讨论的点。\n\n-   `map[string]int` 声明了我们映射的类型。\n-\
    \   `{\"mykey\": myval}` 使用字面量语法来初始化我们指定类型的映射。\n-   最终赋值给 `x`。\n\n根据前一节，我们可以通过内置函数\
    \ `len` 来检索键的数量。\n\n```\nlen(x) // 1\n```\n\n自 1.12 版本起，可以按键排序的顺序遍历映射（例如，打印出键和值）。\n\
    \n删除映射的键可以通过另一个名为 `delete` 的内置函数来完成。\n\n```\ndelete(x, \"mykey\")\n```\n\n长度为\
    \ 0 的映射与 nil 映射不同。\n\n### 指针\n\n指针的行为与其他编程语言的指针类似。`*` 操作符解引用指针，而 `&` 操作符获取变量的地址。Go\
    \ 简化了指针的使用，使得大多数时候你无需担心它们。在本书中，我们最多只是检查指针值是否为 `nil`，这通常表示一个错误，或者相反地，检查可能出现的错误值是否不为\
    \ `nil`，如下一节所述。\n\n```\n// 返回指向存有 int 零值地址的新指针\nx := new(int)\n// 在指针指向的地址位置设置整数值\n\
    *x = 10\n// 指向、指针的地址、我们指向位置的值\nfmt.Println(x, &x, *x)\n// 0xc000094010 0xc000096018\
    \ 10\n//每个变量都有一个地址，即其值\ny := 12\nfmt.Println(&y, y)\n// 0xc000094018 12\n```\n\
    \n需要注意的一点是，在声明函数参数时，指针和数组不是一回事。如果你打算传递一个数组，通常你会想要传递其地址；这是因为 Go 是按值传递的。\n\n###\
    \ 函数\n\n函数使用 Go 语言特有的符号定义。为什么没有使用熟悉的 C 语法（或其他任何语法）在 Go 的声明语法博客（参见 [`https://go.dev/blog/declaration-syntax`](https://go.dev/blog/declaration-syntax)）中进行了解释。我们将语法的详细解释留给教科书。\n\
    \n每个 Go 程序都必须有一个声明如下的 `main` 函数：\n\n```\nfunc main() { ... }\n```\n\n我们将经常使用一个定义如下的函数\
    \ `checkError`：\n\n```\nfunc checkError(err error) {\n    if err != nil {\n  \
    \      fmt.Fprintf(os.Stderr, \"Fatal error: %s\", err.Error())\n        os.Exit(1)\n\
    \    }\n}\n```\n\n它接受一个参数并且没有返回值。它以一个小写字母开头，因此它对声明它的包来说是本地的。\n\n返回值的函数通常会返回一个错误状态以及一个实质性值，如下面这个来自第\
    \ [3](https://go.dev/blog/slices-intro) 章的函数：\n\n```\nfunc readFully(conn net.Conn)\
    \ ([]byte, error) { ... }\n```\n\n它接受 `net.Conn` 作为参数，并返回一个字节数组和一个错误状态（如果没有发生错误则为\
    \ `nil`）。\n\n在本书中，不会使用比这更复杂的定义。\n\n### 结构体\n\n结构体与其他编程语言中的类似。在第 [4](https://go.dev/blog/slices-intro)\
    \ 章中，我们考虑数据的序列化，并使用以下结构体的示例：\n\n```\ntype Name struct {\n    Family   string\n\
    \    Personal string\n}\ntype Email struct {\n    Kind    string\n    Address\
    \ string\n}\ntype Person struct {\n    Name  Name\n    Email []Email\n}\n```\n\
    \n一个复合结构体可以声明如下：\n\n```\nperson := Person{\n    Name: Name{Family: \"Newmarch\"\
    , Personal: \"Jan\"},\n    Email: []Email{Email{Kind: \"home\", Address: \"jan@newmarch.name\"\
    },\n        Email{Kind: \"work\", Address: \"j.newmarch@boxhill.edu.au\"}}}\n\
    ```\n"
- fmt: "# Methods\n\nGo does not have classes in the sense that languages like Java\
    \ do. However, *types* can have *methods* associated with them, and these act\
    \ similar to methods of more standard O/O languages.\n\nWe will make heavy use\
    \ of the methods defined for the various networking types. This will happen from\
    \ the very first programs of the next chapter. For example, the type `IPMask`\
    \ is defined as an array of bytes:\n\n```\ntype IPMask []byte\n```\n\nA number\
    \ of functions are defined on this type, such as:\n\n```\nfunc (m IPMask) Size()\
    \ (ones, bits int)\n```\n\nA variable of type `IPMask` can have the method `Size()`\
    \ applied, as follows:\n\n```\nvar m IPMask\n...\nones, bits := m.Size()\n```\n\
    \nLearning how to use the methods of the network-related types is the principal\
    \ aim of this book.\n\nWe won’t be defining our own methods much in this book.\
    \ That’s because to illustrate the Go libraries, we don’t need many of our own\
    \ complex types. A typical use will be pretty-printing a type like the `Person`\
    \ type defined previously:\n\n```\nfunc (p Person) String() string {\n    s :=\
    \ p.Name.Personal + \" \" + p.Name.Family\n    for _, v := range p.Email {\n \
    \       s += \"\\n\" + v.Kind + \": \" + v.Address\n    }\n    return s\n}\n```\n\
    \nMore specifically, triggering the preceding method would look as follows:\n\n\
    ```\np := Person{}\ndetails := p.String() // String is a method\nlen(details)\
    \ // len is a function\n```\n\nThere is more extensive use in Chapter [10](#436770_2_En_10_Chapter.xhtml),\
    \ where a number of types and methods on these types are used. This is because\
    \ we *do* need our own types when we are building more realistic systems.\n\n\
    Go also supports first class and higher-order functions. First class functions\
    \ imply we can store a reference to a function (or method) in a variable. Higher-order\
    \ functions imply that function (or method) can accept or return a function. Here\
    \ is an example of first-class functions:\n\n```\nm := p.String\nm() // triggers\
    \ the p.String() method\n```\n\nHere is an example of a higher-order function:\n\
    \n```\npackage main\nimport (\n    \"fmt\"\n)\nfunc f1(f func(string) int, data\
    \ string) {\n    fmt.Println(f(data))\n}\nfunc main() {\n    f1(func(s string)\
    \ int { return len(s) }, \"testing\")\n}\n$ go run prog.go\n```\n\n# Multithreading\n\
    \nGo has a simple mechanism for starting additional threads using the `go` command.\
    \ In this book, that is all we will need. Complex tasks such as synchronizing\
    \ multiple threads are not needed here.\n\n# Packages\n\nGo programs are built\
    \ from linked packages. The packages used by any block of code have to be imported\
    \ by an `import` statement at the head of the code file. Our own programs are\
    \ declared to be in package `main`.\n\nApart from Chapter [10](#436770_2_En_10_Chapter.xhtml)\
    \ again, nearly all of the programs in this book are in the `main` package.\n\n\
    Most packages are imported from the Standard Library. Some are imported from the\
    \ subrepositories such as `golang.org/x/net/ipv4`.\n\nThe *visibility* of a structure’s\
    \ fields is controlled by the case of the first character of the field’s name.\
    \ If it is uppercase, it is visible outside of the package it is declared in;\
    \ if it is lowercase, it is not. In the previous example, all the fields of all\
    \ the structures are visible.\n\n# Modules\n\nGo modules track packages and their\
    \ versions. Modules allow the tracking of direct and indirect dependencies.\n\n\
    While modules are the proper way to group and share code (packages) in Go, users\
    \ still often use a package-only approach.\n\nWe will use modules when a singular\
    \ package will not do. Even when modules are used, the intent is to keep the examples\
    \ focused on the networking code. In this example, a file called `go.mod` is generated,\
    \ which is used by Go tooling to manage our dependencies:\n\n```\n//example\n\
    $ mkdir myapp; cd myapp\n$ go mod init example.com\n$ // create program\n$ go\
    \ mod tidy\n$ go run prog.go\n```\n\nYou can learn more about modules here: [`https://go.dev/blog/using-go-modules`](https://go.dev/blog/using-go-modules).\n\
    \nIn Go 1.18, a new feature is included to help manage local development across\
    \ modules; this feature is called workspace. We do not leverage this feature in\
    \ this book, but you can find out more about it here: [`https://go.dev/doc/tutorial/workspaces`](https://go.dev/doc/tutorial/workspaces).\n\
    \n# Type Conversion\n\nThe first one we need to worry about in this book is conversion\
    \ of strings to byte arrays and vice versa. To convert a string to a byte array,\
    \ you do:\n\n```\nvar b []byte\nb = []byte(\"string\")\n```\n\nTo convert the\
    \ whole of an array/slice to a string, use this:\n\n```\nvar s string\ns = string(b[:])\n\
    ```\n\nThe second casting we need to note is called a function adapter, most often\
    \ in the following form:\n\n```\n...\nhttp.Handle(\"/\", http.HandlerFunc(func\
    \ (w ResponseWriter, r *Request) {fmt.Fprintf(w,\"hi\")}))\n...\n$ go doc --src\
    \ http.HandlerFunc\npackage http // import \"net/http\"\n// The HandlerFunc type\
    \ is an adapter to allow the use of\n// ordinary functions as HTTP handlers. If\
    \ f is a function\n// with the appropriate signature, HandlerFunc(f) is a\n//\
    \ Handler that calls f.\ntype HandlerFunc func(ResponseWriter, *Request)\nfunc\
    \ (f HandlerFunc) ServeHTTP(w ResponseWriter, r *Request)\n```\n\nBy using this\
    \ type, a call to `HandlerFunc.ServeHTTP` will now trigger our passed-in function.\n\
    \n# Statements\n\nA function or method will be composed of a set of statements.\
    \ These include assignments, `if` and `switch` statements, `for` and `while` loops,\
    \ and several others.\n\nApart from syntax, these have essentially the same meaning\
    \ as in other programming languages. Nearly all of the statements types will be\
    \ used in later chapters.\n\n# GOPATH\n\nThere are two ways of organizing workspaces\
    \ for projects: put every project in a shared workspace or have a separate workspace\
    \ for each project.\n\nEither way is supported in the `go` tool by the environment\
    \ variable `GOPATH`. This can be set to a list of directories (a `:` separated\
    \ list in Linux/UNIX, a `;` separated list on Windows, and a list on Plan9). It\
    \ defaults to the directory `go` in the user’s home directory if it’s unset.\n\
    \nFor each directory in `GOPATH`, there will be three subdirectories – `src`,\
    \ `pkg`, and `bin`. The directory `src` will typically contain one directory per\
    \ package name and under that will be the source files for that package. For example,\
    \ in Chapter [10](#436770_2_En_10_Chapter.xhtml), we have a complete web server\
    \ that uses packages we define: `dictionary` and `flashcards`. The `src/flashcards`\
    \ directory contains the file `FlashCards.go`.\n\n`GOPATH` is used as the central\
    \ location for downloading dependencies, even when using modules. There are reasons\
    \ to set `GOPATH` to alternative locations, but much of those reasons were prior\
    \ to Modules and Workspaces existing.\n\n# Running Go Programs\n\nA Go program\
    \ must have a file defining the package `main`. Most of the programs in this book\
    \ are defined in a single file, such as the program `IP.go` in Chapter [3](#436770_2_En_3_Chapter.xhtml).\
    \ The simplest way to run it is from the directory containing the file:\n\n```\n\
    go run IP.go \n```\n\nAlternatively, you can build an executable and then run\
    \ it:\n\n```\ngo build IP.go\n./IP \n```\n\n# Standard Libraries\n\nGo has an\
    \ extensive set of Standard Libraries. Not as large as C, Java, or C++, for example,\
    \ but those languages have been around for a *long* time. The Go packages are\
    \ documented at [`https://pkg.go.dev/std`](https://pkg.go.dev/std). We will use\
    \ these extensively in this book, particularly the `net`, `crypto`, and `encoding`\
    \ packages.\n\nIn addition, there is a subrepositories group of packages available\
    \ from the same page. These are less stable but sometimes have useful packages,\
    \ which we will use occasionally.\n\nIn addition to these, there is a large set\
    \ of user-contributed packages. They will not be used in the body of this book,\
    \ which deals with principles, but in practice, you may find many of them very\
    \ useful. Some are discussed in the concluding chapter."
