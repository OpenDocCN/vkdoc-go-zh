    （一个有趣的四列版本可在 Robbie''s Garbage 的“Four Column ASCII”找到，地址为 [`https://garbagecollected.org/2017/01/31/four-column-ascii/`](https://garbagecollected.org/2017/01/31/four-column-ascii/)。）


    ASCII 最常见的编码是使用 7 位字节来表示码点，因此，例如`"A"`的编码是`65`。


    这个字符集实际上是*US ASCII*。由于欧洲人对带重音字符的需求，一些标点符号被省略以形成一个最小集合`ISO 646`，同时还存在包含适当欧洲字符的“国家变体”。Jukka
    Korpela 的网站（[`https://jkorpela.fi/chars.html`](https://jkorpela.fi/chars.html)）为有兴趣的人提供了更多信息。不过，在本书的工作中你不需要这些变体。


    ## ISO 8859


    八位位组（Octets）现在是字节的标准大小。这为 ASCII 的扩展提供了 128 个额外的码点。`ISO 8859`系列是用于捕获各种欧洲语言子集字符库的多个不同代码集。`ISO
    8859-1`也称为`Latin-1`，涵盖了西欧的许多语言，而该系列中的其他标准覆盖了欧洲其他地区，甚至包括希伯来语、阿拉伯语和泰语。例如，`ISO 8859-5`包含了俄罗斯等国家的西里尔字符，而`ISO
    8859-8`则包含希伯来字母表。


    这些字符集的标准编码是使用其码点作为 8 位值。例如，`ISO 8859-1`中的字符`"Á"`的码点是`193`，并被编码为`193`。所有`ISO 8859`系列的低`128`个值都与`ASCII`相同，因此这些字符集中的`ASCII`字符都是相同的。


    HTML 规范曾经推荐使用`ISO 8859-1`字符集。HTML 3.2 是最后一个这样做的版本，之后，HTML 4.0 推荐使用`Unicode`。2008
    年，谷歌估计在其看到的页面中，大约 20% 仍在使用`ISO 8859`格式，而 20% 仍在使用`ASCII`（参见“Unicode nearing 50%
    of the web” at [`http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html`](http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html)）。更多背景信息也可参见
    [`http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/`](http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/)
    和 [`https://w3techs.com/technologies/history_overview/character_encoding`](https://w3techs.com/technologies/history_overview/character_encoding)。

