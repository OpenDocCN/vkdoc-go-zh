    \ URL 才能进入与其中一个闪卡集交互的阶段。\n\n服务器中每个 `FlashcardSet` 的结构体类型包含集合的名称及其 URL（作为字符串）：\n\
    \n```go\ntype FlashcardSet struct {\n\tName string\n\tLink string\n}\n```\n\n\
    服务器上的闪卡集合可以从闪卡集目录构建。`ioutil.ReadDir()` 将创建一个 `os.FileInfo` 数组。需要将其转换为文件名列表，如下所示：\n\
    \n```go\nfiles, err := ioutil.ReadDir(`flashcardsets`)\ncheckError(err)\nnumfiles\
    \ := len(files)\ncardSets := make([]FlashcardSet, numfiles, numfiles)\nfor n,\
    \ file := range files {\n\tfmt.Println(file.Name())\n\tcardSets[n].Name = file.Name()\n\
    \t// 应使用 PathEscape，但在 Go 1.6 中不可用\n\tcardSets[n].Link = `/flashcardSets/` + url.QueryEscape(file.Name())\n\
    }\n```\n\n这会创建一个文件名数组以及服务器上资源的相对链接，格式为 `/<name>`。对于 `CommonWords` 集合，相对链接 URL\
    \ 将为 `/flashcardSets/CommonWords`。协议（`http` 或 `https`）和主机（例如\"localhost\"）留给客户端自行处理。\n\
    \n不幸的是，文件名可能包含 URL 路径名中不合法的字符。`url.PathEscape` 函数可以正确转义所有这些字符。`url.QueryEscape`\
    \ 函数除了文件名中的空格会被替换为 `+` 而不是 `%20` 之外，其他都能正确处理。\n\n最后，服务器判断是优先使用 JSON 还是 XML，并通过模板生成正确输出给客户端。对于\
    \ XML，模板代码如下：\n\n```go\n...\nif q_xml >= q_json {\n    // 优先使用 XML\n    t, err\
    \ := template.ParseFiles(\"xml/ListFlashcardSets.xml\")\n    if err != nil {\n\
    \        fmt.Println(\"模板错误\")\n        http.Error(rw, err.Error(), http.StatusInternalServerError)\n\
    \        return\n    }\n    rw.Header().Set(\"Content-Type\", flashcard_xml)\n\
    \    t.Execute(rw, cardSets)\n} else {\n    // 优先使用 JSON\n...\n```\n\nXML 模板如下：\n\
    \n```xml\nch14 % cat xml/ListFlashcardSets.xml\n<flashcards>\n{{range .}}\n<flashcardSet>\n\
    <name>{{.Name}}</name>\n<link>{{.Link}}</link>\n</flashcardSet>\n{{end}}\n</flashcards>\n\
    ```\n\n对于仅包含 `CommonWords` 和 `Lesson04` 两个集合的列表，发送给客户端的内容如下：\n\n```xml\n<flashcards>\n\
    <flashcardSet>\n<name>Common Words</name>\n<link>/flashcardSets/CommonWords</link>\n\
    </flashcardSet>\n<flashcardSet>\n<name>Lesson04</name>\n<link>/flashcardSets/Lesson04</link>\n\
    </flashcardSet>\n</flashcards>\n```\n\n## POST /\n\n此处，客户端请求创建一个新的闪卡集。预期客户端将提供闪卡集的名称。我们使其看起来像表单提交数据：\n\
    \n```\nname=\n```\n\n这种情况比 `GET` 简单得多。以表单数据的形式从请求中获取值。然后检查请求的名称中是否包含危险字符，例如将闪卡集命名为\
    \ `/etc/passwd`。如果包含，则返回 403“禁止”（Forbidden）。如果名称看起来没问题，则使用该名称创建一个目录。如果创建失败（目录可能已存在），再次返回\
    \ 403。否则，返回 201“已创建”（Created）和新资源的相对 URL：\n\n```go\n...\n} else if req.Method\
    \ == \"POST\" {\n    name := req.FormValue(`name`)\n    if hasIllegalChars(name)\
    \ {\n        rw.WriteHeader(http.StatusForbidden)\n        return\n    }\n   \
    \ // 去掉所有空格，因为它们很烦人\n    name = strings.Replace(name, ` `, ``, -1)\n    err :=\
    \ os.Mkdir(`flashcardsets/`+name,\n        (os.ModeDir | os.ModePerm))\n    if\
    \ err != nil {\n        rw.WriteHeader(http.StatusForbidden)\n        return\n\
    \    }\n    rw.WriteHeader(http.StatusCreated)\n    base_url := req.URL.String()\n\
    \    new_url := base_url + `flashcardSets/` + name + `/`\n    rw.Write([]byte(new_url))\n\
    } else {\n    rw.WriteHeader(http.StatusMethodNotAllowed)\n}\n...\n```\n"
- fmt: '## Handling Other URLs


    We discussed the code for the server handling the `/` URL with `GET` and `POST`
    requests. There are two other types of URL for this application – handling the
    cards in a set and handling each individual card. In terms of the coding, though,
    this presents no new ideas.


    * Getting a list of cards in a set is another directory listing.

    * Posting a new card to a set means creating a file in the appropriate directory
    with content from the client.

    * Deleting a set means removing a directory. This is okay if the directory is
    empty; otherwise, it creates an error.

    * Getting a card means reading the card file and sending its contents.

    * Deleting a card means removing a file.


    There is nothing particularly new about any of these. We have not completed the
    code for some operations such as `DELETE`: these return the HTTP code 501 `''Not
    implemented''`. We also return the contents of individual cards as `text/plain`:
    they have a complex JSON/Go structure as used in Chapter [10](#436770_2_En_10_Chapter.xhtml),
    but that is not needed for the discussion of the REST aspects of this system.


    ## The Complete Server


    The complete server to handle requests to `/` and from there to other URLs follows.
    It requires the flashcard sets and individual cards in order to run, and these
    are in the `ch14` folder here [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).


    ```

    ch14$ vi server.go

    /* Server

    */

    package main

    import (

    "fmt"

    "html/template"

    "log"

    "net/http"

    "net/url"

    "os"

    "regexp"

    "strconv"

    "strings"

    )

    type FlashcardSet struct {

    Name string

    Link string

    }

    type Flashcard struct {

    Name string

    Link string

    }

    const flashcard_xml string = "application/x.flashcards+xml"

    const flashcard_json string = "application/x.flashcards+json"

    type ValueQuality struct {

    Value   string

    Quality float64

    }

    /* Based on https://siongui.github.io/2015/02/22/go-parse-accept-language/ */

    func parseValueQuality(s string) []ValueQuality {

    var vqs []ValueQuality

    strs := strings.Split(s, `,`)

    for _, str := range strs {

    trimmedStr := strings.Trim(str, ` `)

    valQ := strings.Split(trimmedStr, `;`)

    if len(valQ) == 1 {

    vq := ValueQuality{valQ[0], 1}

    vqs = append(vqs, vq)

    } else {

    qp := strings.Split(valQ[1], `=`)

    q, err := strconv.ParseFloat(qp[1], 64)

    if err != nil {

    q = 0

    }

    vq := ValueQuality{valQ[0], q}

    vqs = append(vqs, vq)

    }

    }

    return vqs

    }

    func qualityOfValue(value string, vqs []ValueQuality) float64 {

    for _, vq := range vqs {

    if value == vq.Value {

    return vq.Quality

    }

    }

    return 0

    }

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], ":port\n")

    }

    port := os.Args[1]

    http.HandleFunc(`/`, handleFlashCardSets)

    files, err := os.ReadDir(`flashcardsets`)

    checkError(err)

    for _, file := range files {

    fmt.Println(file.Name())

    cardset_url := `/flashcardSets/` + url.QueryEscape(file.Name())

    fmt.Println("Adding handlers for ", cardset_url)

    http.HandleFunc(cardset_url, handleOneFlashCardSet)

    http.HandleFunc(cardset_url+`/`, handleOneFlashCard)

    }

    // deliver requests to the handlers

    err = http.ListenAndServe(port, nil)

    checkError(err)

    }

    func hasIllegalChars(s string) bool {

    // check against chars to break out of current dir

    b, err := regexp.Match("[/$~]", []byte(s))

    if err != nil {

    fmt.Println(err)

    return true

    }

    if b {

    return true

    }

    return false

    }

    func handleOneFlashCard(rw http.ResponseWriter, req *http.Request) {

    // should be PathUnescape

    path, _ := url.QueryUnescape(req.URL.String())

    // lose intial ''/''

    path = path[1:]

    if req.Method == http.MethodGet {

    fmt.Println("Handling card: ", path)

    json_contents, err := os.ReadFile(path)

    if err != nil {

    rw.WriteHeader(http.StatusNotFound)

    rw.Write([]byte(`Resource not found`))

    return

    }

    // Be lazy here, just return the content as text/plain

    rw.Write(json_contents)

    return

    } else if req.Method == http.MethodDelete {

    rw.WriteHeader(http.StatusNotImplemented)

    } else {

    rw.WriteHeader(http.StatusMethodNotAllowed)

    }

    return

    }

    func handleFlashCardSets(rw http.ResponseWriter, req *http.Request) {

    if req.URL.String() != `/` {

    // this function only handles ''/''

    rw.WriteHeader(http.StatusNotFound)

    rw.Write([]byte("Resource not found\n"))

    return

    }

    if req.Method == "GET" {

    acceptTypes := parseValueQuality(req.Header.Get("Accept"))

    fmt.Println(acceptTypes)

    q_xml := qualityOfValue(flashcard_xml, acceptTypes)

    q_json := qualityOfValue(flashcard_json, acceptTypes)

    if q_xml == 0 && q_json == 0 {

    // can''t find XML or JSON in Accept header

    rw.Header().Set("Content-Type", "flashcards+xml, flashcards+json")

    rw.WriteHeader(http.StatusNotAcceptable)

    return

    }

    files, err := os.ReadDir(`flashcardsets`)

    checkError(err)

    numfiles := len(files)

    cardSets := make([]FlashcardSet, numfiles, numfiles)

    for n, file := range files {

    fmt.Println(file.Name())

    cardSets[n].Name = file.Name()

    // should be PathEscape, not in go 1.6

    cardSets[n].Link = `/flashcardSets/` + url.QueryEscape(file.Name())

    }

    parseFile := "xml/ListFlashcardSets.xml"

    flashcardType := flashcard_xml

    if q_xml = q_json {

    // XML preferred

    t, err := template.ParseFiles("xml/ListOneFlashcardSet.xml")

    if err != nil {

    fmt.Println("Template error")

    http.Error(rw, err.Error(), http.StatusInternalServerError)

    return

    }

    rw.Header().Set("Content-Type", flashcard_xml)

    t.Execute(os.Stdout, cards)

    t.Execute(rw, cards)

    } else {

    // JSON preferred

    t, err := template.ParseFiles("json/ListOneFlashcardSet.json")

    if err != nil {

    fmt.Println("Template error", err)

    http.Error(rw, err.Error(), http.StatusInternalServerError)

    return

    }

    rw.Header().Set("Content-Type", flashcard_json)

    t.Execute(rw, cards)

    }

    } else if req.Method == http.MethodPost {

    name := req.FormValue(`name`)

    if hasIllegalChars(name) {

    rw.WriteHeader(http.StatusForbidden)

    return

    }

    err := os.Mkdir(`flashcardsets/`+name,

    (os.ModeDir | os.ModePerm))

    if err != nil {

    rw.WriteHeader(http.StatusForbidden)

    return

    }

    rw.WriteHeader(http.StatusCreated)

    base_url := req.URL.String()

    new_url := base_url + `flashcardSets/` + name

    _, _ = rw.Write([]byte(new_url))

    } else if req.Method == http.MethodDelete {

    rw.WriteHeader(http.StatusNotImplemented)

    } else {

    rw.WriteHeader(http.StatusMethodNotAllowed)

    }

    return

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    It is run as follows:


    ```

    ch14$ go run server.go :8000

    ```


    ## Client


    The client is relatively straightforward, offering nothing really new. This client
    asks for the content only in XML format. A new part is that the content for the
    flashcard sets includes links as hypertext attributes within a `cardset` tag.
    This may be turned into a field of a struct by the tag label `xml:"href,attr"`
    in the `Card` struct.


    This client gets the list of flashcard sets and their URLs in the `getFlashcardSets()`
    function (step 1). This returns a `FlashcardSets` struct. This can be used to
    present a list to a user, say, for selection of a particular set. Once selected,
    the URL of that set can be used to interact with the resource.


    This client then creates a new flashcard set with name `NewSet` in the `createFlashcardSet()`
    function (step 2). The first time the client runs, it will create the set, and
    the URL for that set will be returned. The second time it is run, it will get
    an error from the server as a prohibited operation, since the set already exists.


    This client then takes the first set of flashcards from the URLs given by the
    server and asks for the set of cards it holds (step 3). It then picks the first
    card from the set and gets its content (step 4).


    The client is `client.go`:'
