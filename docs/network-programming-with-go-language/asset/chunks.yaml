    \ sha256 (with a hard-coded secret) generates the following output (e.g., using\
    \ “hello” for the input):\n\n```\n171b5670 f7b4037f b90bef77 3b022130 e48100fd\
    \ d40ea023 730097da 9a68f4ff\n```\n\nConsiderations beyond hashing algorithm selection\
    \ include quality of key (e.g., size and randomness). HMAC is not encryption,\
    \ even though a key is used. Meaning it lives in parallel to the original (i.e.,\
    \ unencrypted data).\n\nmd5 provides integrity, but collisions mean another file\
    \ (preimage) can produce the same hash; hence, authenticity of message is lacking.\
    \ HMAC provides authenticity with addition of the key; however, maintaining the\
    \ key authenticity is the source of additional issues."
  trans: "\n# ISO 安全架构\n\nISO OSI（开放系统互连）七层分布式系统模型广为人知，如图 7-1 所示。\n\n![](img/436770_2_En_7_Fig1_HTML.png)\n\
    \n图 7-1 分布式系统的 OSI 七层模型\n\n较少为人知的是，ISO 在此架构基础上构建了整套文档体系。就我们这里的目的而言，最重要的是 ISO 安全架构模型\
    \ ISO 7498-2。该标准需付费购买，但 ITU 发布了一份技术内容与其一致的文件，可从 ITU 网站获取：[`https://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items`](http://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items)。\n\
    \n## 功能与层级\n\n安全系统所需的主要功能如下：\n\n-   认证：身份证明。\n-   数据完整性：数据未被篡改。\n-   机密性：数据不向他人泄露。\n\
    -   公证/签名：向可信第三方注册数据以备后续验证。\n-   访问控制：防止对资源的未授权访问。\n-   可用性：授权实体可按需访问。\n\n这些功能在\
    \ OSI 协议栈的以下层级是必需的：\n\n-   对等实体认证（第 3、4、7 层）\n-   数据源认证（第 3、4、7 层）\n-   访问控制服务（第\
    \ 3、4、7 层）\n-   连接机密性（第 1、2、3、4、6、7 层）\n-   无连接机密性（第 1、2、3、4、6、7 层）\n-   选择字段机密性（第\
    \ 6、7 层）\n-   流量流机密性（第 1、3、7 层）\n-   带恢复的连接完整性（第 4、7 层）\n-   不带恢复的连接完整性（第 3、4、7\
    \ 层）\n-   连接完整性选择字段（第 7 层）\n-   无连接完整性选择字段（第 7 层）\n-   源发抗抵赖（第 7 层）\n-   交付抗抵赖（第\
    \ 7 层）\n\n## 机制\n\n实现上述安全级别的机制如下：\n\n-   对等实体认证\n    -   加密\n    -   数字签名\n  \
    \  -   认证交换\n-   数据源认证\n    -   加密\n    -   数字签名\n-   访问控制服务\n    -   访问控制列表\n\
    \    -   密码\n    -   能力列表\n    -   标签\n-   连接机密性\n    -   加密\n    -   路由控制\n-\
    \   无连接机密性\n    -   加密\n    -   路由控制\n-   选择字段机密性\n    -   加密\n-   流量流机密性\n  \
    \  -   加密\n    -   流量填充\n    -   路由控制\n-   带恢复的连接完整性\n    -   加密\n    -   数据完整性\n\
    -   不带恢复的连接完整性\n    -   加密\n    -   数据完整性\n-   连接完整性选择字段\n    -   加密\n    -  \
    \ 数据完整性\n-   无连接完整性\n    -   加密\n    -   数字签名\n    -   数据完整性\n-   无连接完整性选择字段\n\
    \    -   加密\n    -   数字签名\n    -   数据完整性\n-   源发抗抵赖\n    -   数字签名\n    -   数据完整性\n\
    \    -   公证\n-   交付抗抵赖\n    -   数字签名\n    -   数据完整性\n    -   公证\n\n# 数据完整性\n\n\
    确保数据完整性意味着提供一种检验数据是否被篡改的方法。通常，这是通过从数据字节中计算出一个简单数字来实现的。这个过程称为哈希，得到的结果称为哈希值或散列值。\n\
    \n一种简单的哈希算法就是将所有数据字节相加求和。然而，这种方法几乎允许任何方式的数据调整，同时仍能保持哈希值不变。例如，攻击者可以交换两个字节。这不会改变哈希值，但可能导致你欠别人\
    \ 65536 美元，而不是 256 美元。\n\n用于安全目的的哈希算法必须是“强”的，使得攻击者极难找到另一个具有相同哈希值的字节序列。这增加了攻击者按自己意图修改数据的难度。安全研究人员不断测试哈希算法，看能否破解它们——即找到一种简单方法来构造与哈希值匹配的字节序列。他们设计了一系列被认为很强且专用于密码学的哈希算法。\n\
    \nGo 语言支持多种哈希算法，包括 MD4、MD5、RIPEMD-160、SHA1、SHA224、SHA256、SHA384 和 SHA512。对于 Go\
    \ 程序员而言，它们都遵循相同的模式：相应包中的函数 `New`（或类似函数）返回一个来自 `hash` 包的 `Hash` 对象。使用 `go list`\
    \ 命令，我们可以查看此包及相关包：\n\n```\n$ mkdir ch7\n$ cd ch7\nch7$ go list crypto/...\ncrypto\n\
    crypto/aes\ncrypto/cipher\ncrypto/des\ncrypto/dsa\ncrypto/ecdsa\ncrypto/ed25519\n\
    crypto/ed25519/internal/edwards25519\ncrypto/ed25519/internal/edwards25519/field\n\
    crypto/elliptic\ncrypto/elliptic/internal/fiat\ncrypto/hmac\ncrypto/internal/randutil\n\
    crypto/internal/subtle\ncrypto/md5\ncrypto/rand\ncrypto/rc4\ncrypto/rsa\ncrypto/sha1\n\
    crypto/sha256\ncrypto/sha512\ncrypto/subtle\ncrypto/tls\ncrypto/x509\ncrypto/x509/internal/macos\n\
    crypto/x509/pkix\n```\n\n哈希对象实现了 `io.Writer` 接口，你可以将待哈希的数据写入该 writer。你可以通过 `Size`\
    \ 方法查询哈希值的字节数，通过 `Sum` 方法获取哈希值。\n\n一个典型用例是 MD5 哈希（注意：不安全）。这使用 `md5` 包。哈希值是一个 16\
    \ 字节数组。通常以四个十六进制数的 ASCII 形式打印出来，每个数由四个字节组成。一个简单的程序是 `md5hash.go`：\n\n```\nch7$\
    \ vi md5hash.go\n/* MD5Hash\n*/\npackage main\nimport (\n\"crypto/md5\"\n\"fmt\"\
    \n)\nfunc main() {\nhash := md5.New()\nbytes := []byte(\"hello\\n\")\nhash.Write(bytes)\
    \ // 将数据添加到运行中的哈希\nhashValue := hash.Sum(nil) // 检索哈希后的数据\nhashSize := hash.Size()\
    \ // Sum 返回的字节数\n// 对于 hashValue 中的每 4 个字节\n// 我们通过移位将它们填充到一个字节 val 中\n// val[first_byte]\
    \ = hashValue[n] 左移 24 位\n// 第二和第三个字节位置分别左移 16 和 8 位...\n// val[fourth_byte] =\
    \ hashValue[n+3]\n// 最后，我们得到一个打印的 uint32 值\nfor n := 0; n < hashSize; n += 4 {\n\
    var val uint32\nval = uint32(hashValue[n])<<24 +\nuint32(hashValue[n+1])<<16 +\n\
    uint32(hashValue[n+2])<<8 +\nuint32(hashValue[n+3])\nfmt.Printf(\"%x \", val)\n\
    }\nfmt.Println()\n}\nch7$ go run md5hash.go\nb1946ac9 2492d234 7c6235b4 d2611184\n\
    ```\n\n如果你做一个微小的改动，比如将 `hello` 中的 `o` 改为 `0`，你会看到一个新的哈希值。\n\n```\nch$ go run md5hash.go\
    \ // 将 hello 改为 hell0 后\ncd6fcbf3 8d05a093 9006387 f0446665\n```\n\n虽然 `md5` 提供了一定的保护（例如，文件完整性），但它无法说明是谁创建或提供了该文件。HMAC\
    \ 不仅提供完整性（例如，通过 `md5`），还提供认证。消费者必须拥有相同的密钥和输入才能重新构建 HMAC。\n\n上述内容侧重于机制；`md5` 并非哈希函数中的最佳选择。一般来说，你应该选用更优的函数，例如用\
    \ `sha256` 替代 `md5`。\n\n```\n// 将 \"crypto/sha256\" 添加到 import 中\nhash := hmac.New(sha256.New,\
    \ []byte(\"secret\"))\n```\n\n将我们之前的代码改为使用 `sha256`（使用硬编码的密钥）会生成以下输出（例如，输入使用 \"\
    hello\"）：\n\n```\n171b5670 f7b4037f b90bef77 3b022130 e48100fd d40ea023 730097da\
    \ 9a68f4ff\n```\n\n除了哈希算法的选择之外，其他考虑因素还包括密钥质量（例如，大小和随机性）。尽管使用了密钥，但 HMAC 并非加密。这意味着它独立于原始数据（即未加密数据）并存。\n\
    \n`md5` 提供完整性，但碰撞意味着另一个文件（原像）可以产生相同的哈希值；因此，消息的真实性不足。HMAC 通过添加密钥提供了真实性；然而，维护密钥的真实性会引发更多问题。"
- fmt: '# Symmetric Key Encryption


    There are two major mechanisms used for encrypting data. Symmetric key encryption
    uses a single key that is the same for both encryption and decryption. This key
    needs to be known to both the encrypting and the decrypting agents. How this key
    is transmitted between the agents is not discussed (e.g., `HMAC`).


    As with hashing, there are many encryption algorithms. Many are now known to have
    weaknesses, and in general, algorithms become weaker over time as computers get
    faster. Go has support for several symmetric key algorithms such as `AES` and
    `DES`.


    The algorithms are *block* algorithms. That is, they work on blocks of data. If
    your data is not aligned to the block size, you will have to pad it with extra
    blanks at the end.


    Each algorithm is represented by a `Cipher` object. This is created by `NewCipher`
    in the appropriate package and takes the symmetric key as parameter.


    Once you have a cipher, you can use it to encrypt and decrypt blocks of data.
    We use `AES-128`, which has a key size of 128 bits (16 bytes) and a block size
    of 128 bits. The size of the key determines which version of `AES` is used. A
    program to illustrate this is `aes.go`:


    ```

    ch7$ vi aes.go

    /* Aes

    */

    package main

    import (

    "bytes"

    "crypto/aes"

    "fmt"

    )

    func main() {

    key := []byte("my key, len 16 b")

    cipher, err := aes.NewCipher(key)

    if err != nil {

    fmt.Println(err.Error())

    }

    src := []byte("hello 16 b block")

    var enc [16]byte

    cipher.Encrypt(enc[0:], src)

    var decrypt [16]byte

    cipher.Decrypt(decrypt[0:], enc[0:])

    result := bytes.NewBuffer(nil)

    result.Write(decrypt[0:])

    fmt.Println(string(result.Bytes()))

    }

    ch7$ go run aes.go

    hello 16 b block

    ```


    This encrypts and decrypts the 16-byte block `"hello 16 b block"` using the shared
    16-byte key `"my key, len 16 b"`.


    While we are not detailing how hashing/authenticating works, there are considerations,
    such as our key must have a length of 16, 24, or 32 bytes, which in turn used
    to select related `AES-128`, `AES-192`, or `AES-256` algorithm. If you don’t use
    the correct key size, you will see a `crypto.KeySizeError`, and upon failure to
    not deal with that error, a panic will occur during coding operations (e.g., encoding).
    See `go doc crypto/aes.NewCipher` and go doc `crypto/aes.KeySizeError` for more.


    Here are some very popular software that uses hashing at their core. In this URL,
    we see a detailed history on the need to change from `sha-1` to `sha-256` in Git:


    [`https://git-scm.com/docs/hash-function-transition/#_choice_of_hash`](https://git-scm.com/docs/hash-function-transition/#_choice_of_hash)


    Bitcoin is also known for leveraging hashing along the blockchain. Here is an
    example code using hashing:


    [`https://github.com/bitcoin/bitcoin/blob/master/src/merkleblock.cpp`](https://github.com/bitcoin/bitcoin/blob/master/src/merkleblock.cpp)


    Furthermore, both are using a technique called Merkle trees, where a Git commit
    is the tree top and a group of transactions in Bitcoin is represented as the tree
    top as well. You can learn more about this interesting technique here: [`https://en.wikipedia.org/wiki/Merkle_tree`](https://en.wikipedia.org/wiki/Merkle_tree).


    ## Public Key Encryption


    The other major type of encryption is public key encryption. Public key encryption
    and decryption require *two* keys: one to encrypt and a second one to decrypt.
    The encryption key is usually made public in some way so that anyone can encrypt
    messages to you. The decryption key must stay private; otherwise, everyone would
    be able to decrypt those messages! Public key systems are asymmetric, with different
    keys for different uses.


    Some examples of software systems that leverage PK-related technology include
    `SSH` (where you hold a private key and both the client and the server have a
    public key) and Secure Websites (where a public key is embedded in the cert you
    download and the server has the private key). These asymmetric public keys are
    used to generate symmetric key pairs used during a brief session. Keys are just
    one part of Public Key Infrastructure (e.g., certificate management coupled with
    keys), which is a large interesting topic.


    There are many public key encryption systems supported by Go. A typical one is
    the `RSA` scheme.


    A program generating `RSA` private and public keys from a random number is `genrsakeys.go`:


    ```

    ch7$ vi genrsakeys.go

    /* GenRSAKeys

    */

    package main

    import (

    "crypto/rand"

    "crypto/rsa"

    "crypto/x509"

    "encoding/gob"

    "encoding/pem"

    "fmt"

    "log"

    "os"

    )

    func main() {

    reader := rand.Reader

    bitSize := 2048

    key, err := rsa.GenerateKey(reader, bitSize)

    checkError(err)

    fmt.Printf("Private key primes:\n[0]:%s\n[1]:%s\n", key.Primes[0].String(),

    key.Primes[1].String())

    fmt.Println("Private key exponent:\n", key.D.String())

    publicKey := key.PublicKey

    fmt.Println("Public key modulus:\n", publicKey.N.String())

    fmt.Println("Public key exponent:\n", publicKey.E)

    saveGobKey("private.key", key)

    saveGobKey("public.key", publicKey)

    savePEMKey("private.pem", key)

    }

    func saveGobKey(fileName string, key interface{}) {

    outFile, err := os.Create(fileName)

    checkError(err)

    encoder := gob.NewEncoder(outFile)

    err = encoder.Encode(key)

    checkError(err)

    outFile.Close()

    }

    func savePEMKey(fileName string, key *rsa.PrivateKey) {

    outFile, err := os.Create(fileName)

    checkError(err)

    var privateKey = &pem.Block{Type: "RSA PRIVATE KEY",

    Bytes: x509.MarshalPKCS1PrivateKey(key)}

    pem.Encode(outFile, privateKey)

    outFile.Close()

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The program saves the keys and related certificate (via `pem`) using `gob` serialization.
    They can be read back by the `loadrsakeys.go` program:


    ```

    ch7$ vi loadrsakeys.go

    /* LoadRSAKeys

    */

    package main

    import (

    "crypto/rsa"

    "encoding/gob"

    "fmt"

    "log"

    "os"

    )

    func main() {

    var key rsa.PrivateKey

    loadKey("private.key", &key)

    fmt.Printf("Private key primes:\n[0]:%s\n[1]:%s\n", key.Primes[0].String(),

    key.Primes[1].String())

    fmt.Println("Private key exponent:\n", key.D.String())

    var publicKey rsa.PublicKey

    loadKey("public.key", &publicKey)

    fmt.Println("Public key modulus:\n", publicKey.N.String())

    fmt.Println("Public key exponent:\n", publicKey.E)

    }

    func loadKey(fileName string, key interface{}) {

    inFile, err := os.Open(fileName)

    checkError(err)

    decoder := gob.NewDecoder(inFile)

    err = decoder.Decode(key)

    checkError(err)

    inFile.Close()

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    As we execute the create and load programs, we see the following:


    ```

    ch7$ go run genrsakeys.go

    Private key primes:

    [0]:1554 ... 3581

    [1]:1759 ... 6267

    Private key exponent:

    1034 ... 7793

    Public key modulus:

    2735 ... 2127

    Public key exponent:


    ch7$ go run loadrsakeys.go

    Private key primes:

    [0]:1554 ... 3581

    [1]:1759 ... 6267

    Private key exponent:

    1034 ... 7793

    Public key modulus:

    2735 ... 2127

    Public key exponent:


    ```


    The preceding output is abbreviated due to the length. The key thing to note is
    they generated output (keys) matching the loaded versions after the encoding process.
    We have not transmitted any encrypted data, just preparing for that eventuality.'
