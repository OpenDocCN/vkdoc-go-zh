    -   我们的代码是否正确且性能良好？\n\n如何解决上述问题？正如我们在前面章节中看到的，我们可以为每个测试创建一个新的 \"mux\"。另一种方法是在运行测试之前设置所有测试路由。但更根本的是，我们应该考虑我们到底在测试什么。例如，我们是在测试服务器是否监听？还是测试我们的\
    \ `Handler` 是否基于给定请求提供正确的响应？毕竟，如果我们考虑 OSI 模型的思维方式，HTTP 是我们的请求/响应协议所在层（L7），而 TCP/IP\
    \ 维持我们的连接（L4 及以下）。由于这些层可以解耦，我们也应该能够解耦我们的测试。即使考虑到这种分离，也不清楚各个部分将在哪里被测试（即单元测试还是集成测试）。思考一下处理器映射：你是对它进行单元测试，还是值得做集成测试？毕竟，除非使用了给定路径，否则处理器甚至不会被触发。\n\
    \n如你所见，我们如何思考网络组件会导致可能不同的测试安排。我们还应该记住，测试的执行顺序是不确定的。虽然看起来测试是从上到下运行的，但这只是实现的一个副作用，并非\
    \ `testing` 包中指定的行为。\n\n在我们进行重构时，首先会了解 Go 在测试辅助工具方面提供了什么。\n"
- fmt: '# `httptest` Package


    The `httptest` package provides functions and types to assist with HTTP focused
    testing.


    ```

    ch17$ go doc httptest

    package httptest // import "net/http/httptest"

    Package httptest provides utilities for HTTP testing.

    const DefaultRemoteAddr = "1.2.3.4"

    func NewRequest(method, target string, body io.Reader) *http.Request

    type ResponseRecorder struct{ ... }

    func NewRecorder() *ResponseRecorder

    type Server struct{ ... }

    func NewServer(handler http.Handler) *Server

    func NewTLSServer(handler http.Handler) *Server

    func NewUnstartedServer(handler http.Handler) *Server

    ```


    Let’s create a new test, one that is similar to our prior ones yet does not actually
    connect to a server. To save room, we will not list the existing tests.


    ```

    ch17$ vi basic_http_test.go

    package ch17

    import (

    "net/http"

    "net/http/httptest"

    "testing"

    "time"

    )

    func TestHTTPRoundTripNoConnection(t *testing.T) {

    path := "/"

    req := httptest.NewRequest("GET", path, nil)

    res := httptest.NewRecorder()

    f := func(w http.ResponseWriter, req *http.Request) {

    time.Sleep(5 * time.Second) // holding connection

    }

    f(res, req)

    if res == nil || res.Result().StatusCode != http.StatusOK {

    t.Error(res)

    }

    }

    func TestHTTPRoundTrip(t *testing.T) {

    ...

    func TestHTTPRoundTripTimeout(t *testing.T) {

    ...

    ```


    We have made a few changes but capture our request, response, and the related
    assertion. Things to notice: we have removed the server (i.e., `http.ListenAndServe`);
    the path to handler mapping remains, but it is explicit inside `httptest.NewRequest`
    vs. `http.HandleFunc`. Since we are using a new package (i.e., `httptest`), we
    had to modify the result check in order to more closely match an actual response.


    Our call to `httptest.NewRecorder` returns a new `httptest.ResponseRecorder` type,
    which in turn implements the `http.ResponseWriter` interface. This allows an `http.Response`
    to be indirectly populated. The result though is not fit for a deep comparison
    (i.e., `reflect.DeepEqual`).


    Beyond a handler, how can we test the client and a mocked back end? The `httptest`
    package provides the ability to also create a test server endpoint.


    ```

    ch17$ vi basic_http_test.go

    ... other tests and imports

    func TestHTTPTestRoundTripTimeout(t *testing.T) {

    ts := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, req *http.Request)
    {

    time.Sleep(5 * time.Second) // holding connection

    }))

    defer ts.Close()

    var c = &http.Client{

    Timeout: time.Second * 2,

    }

    req, _ := http.NewRequest("GET", ts.URL, nil)

    res, err := c.Do(req)

    if err != nil {

    t.Fatal(err)

    }

    err = res.Body.Close()

    if err != nil {

    t.Fatal(err)

    }

    }

    ```


    We can run this test as follows:


    ```

    ch17$ go test -test.run "TestHTTPTestRoundTripTimeout$" -v basic_http_test.go

    === RUN   TestHTTPTestRoundTripTimeout

    basic_http_test.go:68: Get "http://127.0.0.1:50866": context deadline exceeded
    (Client.Timeout exceeded while awaiting headers)

    --- FAIL: TestHTTPTestRoundTripTimeout (5.00s)

    FAIL

    FAIL    command-line-arguments  5.155s

    FAIL

    ```


    In these particular examples, you would not want the actual tests to fail. You
    would want to fix the pathing (to be unique) and the timeouts to only trigger
    an error if it was unexpected.


    ## Below HTTP


    The preceding tooling focused on HTTP. Is there a more general technique? Included
    in the `net` package is type `Pipe`.


    ```

    ch17$ go doc net.Pipe

    package net // import "net"

    func Pipe() (Conn, Conn)

    Pipe creates a synchronous, in-memory, full duplex network connection; both

    ends implement the Conn interface. Reads on one end are matched with writes

    on the other, copying data directly between the two; there is no internal

    buffering.

    ```


    As is mentioned, we are provided connection objects that act like a more general
    client and server.


    ```

    ... prior tests and imports

    func TestPipe(t *testing.T) {

    c := make(chan struct{})

    server, client := net.Pipe()

    go func() {

    time.Sleep(2 * time.Second)

    req := make([]byte, 15)

    server.SetDeadline(time.Now().Add(1 * time.Second))

    _, err := server.Read(req)

    t.Log(string(req))

    if err != nil {

    t.Error(err)

    }

    defer func() {

    server.Close()

    c <- struct{}{}

    }()

    }()

    client.SetDeadline(time.Now().Add(1 * time.Second))

    _, err := client.Write([]byte("my http request"))

    if err != nil {

    t.Error(err)

    }

    defer func() {

    client.Close()

    }()

    <-c

    }

    ```


    In the preceding example, we are trying to emulate some of the failure behavior
    we saw with HTTP-related timeouts.


    ```

    ch17$ go test -test.run "TestPipe$" -v basic_http_test.go

    === RUN   TestPipe

    basic_http_test.go:131: write pipe: i/o timeout

    basic_http_test.go:119:

    basic_http_test.go:121: read pipe: i/o timeout

    --- FAIL: TestPipe (3.00s)

    FAIL

    FAIL    command-line-arguments  3.137s

    FAIL

    ```


    Take note, we are operating at a lower layer than HTTP (i.e., L7). For the most
    part, this implies we will need to take care of our request and responses vs.
    leveraging existing higher-level types like `http.Request` or `http.Response`.'
  raw: '## httptest Package


    The httptest package provides functions and types to assist with HTTP focused
    testing.


    ```

    ch17$ go doc httptest

    package httptest // import "net/http/httptest"

    Package httptest provides utilities for HTTP testing.

    const DefaultRemoteAddr = "1.2.3.4"

    func NewRequest(method, target string, body io.Reader) *http.Request

    type ResponseRecorder struct{ ... }

    func NewRecorder() *ResponseRecorder

    type Server struct{ ... }

    func NewServer(handler http.Handler) *Server

    func NewTLSServer(handler http.Handler) *Server

    func NewUnstartedServer(handler http.Handler) *Server

    ```


    Let’s create a new test, one that is similar to our prior ones yet does not actually
    connect to a server. To save room, we will not list the existing tests.


    ```

    ch17$ vi basic_http_test.go

    package ch17

    import (

    "net/http"

    "net/http/httptest"

    "testing"

    "time"

    )

    func TestHTTPRoundTripNoConnection(t *testing.T) {

    path := "/"

    req := httptest.NewRequest("GET", path, nil)

    res := httptest.NewRecorder()

    f := func(w http.ResponseWriter, req *http.Request) {

    time.Sleep(5 * time.Second) // holding connection

    }

    f(res, req)

    if res == nil || res.Result().StatusCode != http.StatusOK {

    t.Error(res)

    }

    }

    func TestHTTPRoundTrip(t *testing.T) {

    ...

    func TestHTTPRoundTripTimeout(t *testing.T) {

    ...

    ```


    We have made a few changes but capture our request, response, and the related
    assertion. Things to notice: we have removed the server (i.e., http.ListenAndServe);
    the path to handler mapping remains, but it is explicit inside httptest.NewRequest
    vs. http.HandleFunc. Since we are using a new package (i.e., httptest), we had
    to modify the result check in order to more closely match an actual response.


    Our call to httptest.NewRecorder returns a new httptest.ResponseRecorder type,
    which in turn implements the http.ResponseWriter interface. This allows an http.Response
    to be indirectly populated. The result though is not fit for a deep comparison
    (i.e., reflect.DeepEqual).


    Beyond a handler, how can we test the client and a mocked back end? The httptest
    package provides the ability to also create a test server endpoint.


    ```

    ch17$ vi basic_http_test.go

    ... other tests and imports

    func TestHTTPTestRoundTripTimeout(t *testing.T) {

    ts := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, req *http.Request)
    {

    time.Sleep(5 * time.Second) // holding connection

    }))

    defer ts.Close()

    var c = &http.Client{

    Timeout: time.Second * 2,

    }

    req, _ := http.NewRequest("GET", ts.URL, nil)

    res, err := c.Do(req)

    if err != nil {

    t.Fatal(err)

    }

    err = res.Body.Close()

    if err != nil {

    t.Fatal(err)

    }

    }

    ```


    We can run this test as follows:


    ```

    ch17$ go test -test.run "TestHTTPTestRoundTripTimeout$" -v basic_http_test.go

    === RUN   TestHTTPTestRoundTripTimeout

    basic_http_test.go:68: Get "http://127.0.0.1:50866": context deadline exceeded
    (Client.Timeout exceeded while awaiting headers)

    --- FAIL: TestHTTPTestRoundTripTimeout (5.00s)

    FAIL

    FAIL    command-line-arguments  5.155s

    FAIL

    ```


    In these particular examples, you would not want the actual tests to fail. You
    would want to fix the pathing (to be unique) and the timeouts to only trigger
    an error if it was unexpected.


    ## Below HTTP


    The preceding tooling focused on HTTP. Is there a more general technique? Included
    in the net package is type Pipe.


    ```

    ch17$ go doc net.Pipe

    package net // import "net"

    func Pipe() (Conn, Conn)

    Pipe creates a synchronous, in-memory, full duplex network connection; both

    ends implement the Conn interface. Reads on one end are matched with writes

    on the other, copying data directly between the two; there is no internal

    buffering.

    ```


    As is mentioned, we are provided connection objects that act like a more general
    client and server.


    ```

    ... prior tests and imports

    func TestPipe(t *testing.T) {

    c := make(chan struct{})

    server, client := net.Pipe()

    go func() {

    time.Sleep(2 * time.Second)

    req := make([]byte, 15)

    server.SetDeadline(time.Now().Add(1 * time.Second))

    _, err := server.Read(req)

    t.Log(string(req))

    if err != nil {

    t.Error(err)

    }

    defer func() {

    server.Close()

    c <- struct{}{}

    }()

    }()

    client.SetDeadline(time.Now().Add(1 * time.Second))

    _, err := client.Write([]byte("my http request"))

    if err != nil {

    t.Error(err)

    }

    defer func() {

    client.Close()

    }()

    <-c

    }

    ```


    In the preceding example, we are trying to emulate some of the failure behavior
    we saw with HTTP-related timeouts.


    ```

    ch17$ go test -test.run "TestPipe$" -v basic_http_test.go

    === RUN   TestPipe

    basic_http_test.go:131: write pipe: i/o timeout

    basic_http_test.go:119:

    basic_http_test.go:121: read pipe: i/o timeout

    --- FAIL: TestPipe (3.00s)

    FAIL

    FAIL    command-line-arguments  3.137s

    FAIL

    ```


    Take note, we are operating at a lower layer than HTTP (i.e., L7). For the most
    part, this implies we will need to take care of our request and responses vs.
    leveraging existing higher-level types like http.Request or http.Response.'
