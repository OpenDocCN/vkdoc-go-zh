- fmt: '## `gorilla/mux`


    We begin our learning of Gorilla by looking at the `mux` package. The `mux` package
    is designed to work with the existing type `Serve` of the standard library.


    ```

    ch16$ vi gmux.go

    package main

    import (

    "net/http"

    "github.com/gorilla/mux"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    r.HandleFunc("/articles", buildHandler("ArticlesHandler"))

    http.ListenAndServe(":8080", r)

    }

    ```


    Based on what we know, by overwriting the last parameter of `ListenAndServe`,
    we are setting overwriting the default `ServeMux` with our own (call `Router`
    in mux speak).


    ```

    ch16$ go mod init ch16.example.com

    ch16$ go mod tidy

    ch16$ go run gmux.go

    ```


    The tests that follow hopefully show not much has changed.


    ```

    ch16$ curl localhost:8080/articles

    ArticlesHandler

    ch16$ curl localhost:8080/

    HomeHandler

    ```


    If we review the `Router` code, specifically its `ServerHTTP` method, we can confirm
    our route mapping is now handled by Gorilla `mux`.


    ```

    ~/ch16$ go doc --src mux Router.ServeHTTP

    package mux // import "github.com/gorilla/mux"

    // ServeHTTP dispatches the handler registered in the matched route.

    //

    // When there is a match, the route variables can be retrieved calling

    // mux.Vars(request).

    func (r *Router) ServeHTTP(w http.ResponseWriter, req *http.Request) {

    if !r.skipClean {

    path := req.URL.Path

    if r.useEncodedPath {

    path = req.URL.EscapedPath()

    }

    // Clean path to canonical form and redirect.

    if p := cleanPath(path); p != path {

    // Added 3 lines (Philip Schlump) - It was dropping the query string and #whatever
    from query.

    // This matches with fix in go 1.2 r.c. 4 for same problem.  Go Issue:

    // http://code.google.com/p/go/issues/detail?id=5252

    url := *req.URL

    url.Path = p

    p = url.String()

    w.Header().Set("Location", p)

    w.WriteHeader(http.StatusMovedPermanently)

    return

    }

    }

    var match RouteMatch

    var handler http.Handler

    if r.Match(req, &match) {

    handler = match.Handler

    req = requestWithVars(req, match.Vars)

    req = requestWithRoute(req, match.Route)

    }

    if handler == nil && match.MatchErr == ErrMethodMismatch {

    handler = methodNotAllowedHandler()

    }

    if handler == nil {

    handler = http.NotFoundHandler()

    }

    handler.ServeHTTP(w, req)

    }

    ```


    ## Why Should We Care


    So far, it doesn’t seem we have added any value to the already-provided `DefaultServeMux`.
    Looks are deceiving though. Based on `ServeMux` documentation, we only seem to
    be provided with ways to easily parse the "path" to make a routing decision. Can
    we match a request based on other criteria (aside path), such as query parameters
    or HTTP headers? We have access to such things without Gorilla; what we don’t
    have is a structured way of using them.


    Requests can be matched based on the following criteria:


    - URL host (`example.com`)

    - Path (`/about`)

    - Path prefix (`/animals/cats`)

    - Schema (posted form values)

    - HTTP headers (`Content-Type: text/html; charset=UTF-8`)

    - Query values (`?key=value&dog=cat`)

    - HTTP methods (`GET /search?q=test HTTP/2`)

    - Custom matchers (a custom function)


    One nice feature of Gorilla is the use of chaining to have several matching elements
    related. Here is an example of that, modifying our prior example using various
    matchers.


    ```

    ~/ch16$ vi gmux.go

    package main

    import (

    "github.com/gorilla/mux"

    "net/http"

    )

    func buildHandler(message string) func(http.ResponseWriter, *http.Request) {

    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {

    w.Write([]byte(message))

    })

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/", buildHandler("HomeHandler"))

    r.HandleFunc("/products", buildHandler("ProductsHandler"))

    r.HandleFunc("/articles", buildHandler("ArticlesHandler")).Host("example.com").Methods("GET").Schemes("http")

    http.ListenAndServe(":8080", r)

    }

    ```


    Run the server.


    ```

    ~/ch16$ go run gmux.go

    ```


    Now we exercise our new and existing routes; notice `/articles` is not limited
    to a particular domain, method, and scheme.


    ```

    ~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX GET http://example.com:8080/articles

    HTTP/1.1 200 OK

    Date: Mon, 07 Mar 2022 18:40:46 GMT

    Content-Length: 15

    Content-Type: text/plain; charset=utf-8

    ~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX POST http://example.com:8080/articles

    HTTP/1.1 405 Method Not Allowed

    Date: Mon, 07 Mar 2022 18:40:54 GMT

    Content-Length: 0

    ~/ch16$ curl 127.0.0.1:8080/articles

    404 page not found

    ~/ch16$

    ```


    Here are examples from the official documentation:


    - `r.PathPrefix("/products/")`

    - `r.Methods("GET", "POST")`

    - `r.Schemes("https")`

    - `r.Headers("X-Requested-With", "XMLHttpRequest")`

    - `r.Queries("key", "value")`

    - `r.MatcherFunc(func(r *http.Request, rm *RouteMatch) bool { return r.ProtoMajor
    == 0 })`


    Again, we can accomplish all of this with the standard library (which many developers
    think you should), yet having a toolkit at the ready makes it an easy choice.
    There is much more to Gorilla `mux`. Our goal is to highlight the relation to
    the standard library and how it extends (additional functionality). You can learn
    more here: [`https://github.com/gorilla/mux`](https://github.com/gorilla/mux).'
