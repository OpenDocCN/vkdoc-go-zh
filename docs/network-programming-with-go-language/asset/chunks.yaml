    conn.Write(data)\n}\nconn.Close() // we're finished\n}\n}\nfunc readFully(conn\
    \ net.Conn) ([]byte, error) {\nresult := bytes.NewBuffer(nil)\nvar buf [512]byte\n\
    for {\nn, err := conn.Read(buf[0:])\nresult.Write(buf[0:n])\nif err != nil {\n\
