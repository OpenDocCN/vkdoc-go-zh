- fmt: '# Proxy Handling


    It is very common now for HTTP requests to pass through specific HTTP proxies.
    This is in addition to the servers that form the TCP connection and act at the
    application layer. Companies use proxies to limit what their own staff can see,
    while many organizations use proxy services such as Cloudflare to act as caches,
    reducing the load on the organization’s own servers. Accessing websites through
    proxies requires additional handling by the client.


    ## Simple Proxy


    HTTP 1.1 laid out how HTTP should work through a proxy. A `GET` request should
    be made to a proxy. However, the URL requested should be the full URL of the destination.
    In addition, the HTTP header should contain a `Host` field, set to the proxy.
    As long as the proxy is configured to pass such requests through, then that is
    all that needs to be done.


    Go considers this to be part of the HTTP transport layer. To manage this, it has
    a class `Transport`. This contains a field that can be set to a *function* that
    returns a URL for a proxy. If we have a URL as a string for the proxy, the appropriate
    transport object is created and then given to a client object as follows:


    ```

    // prepare for transport

    proxyURL, err := url.Parse(proxyString)

    // RoundTripper implementation that supports HTTP proxies

    // see go doc net/http.RoundTripper

    transport := &http.Transport{Proxy: http.ProxyURL(proxyURL)}

    // used to send our HTTP quest

    client := &http.Client{Transport: transport}

    ```


    The client can then continue as before.


    The following program `proxyget.go` illustrates this.


    ```

    ch8$ vi proxyget.go

    /* ProxyGet

    */

    package main

    import (

    "fmt"

    "io"

    "log"

    "net/http"

    "net/url"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "http://host:port/page")

    }

    rawURL := os.Args[1]

    url, err := url.Parse(rawURL)

    checkError(err)

    response, err := http.Get(url.String())

    checkError(err)

    fmt.Println("Read ok")

    if response.StatusCode != http.StatusOK {

    log.Fatalln(response.StatusCode)

    }

    fmt.Println("Response ok")

    var buf [512]byte

    reader := response.Body

    for {

    n, err := reader.Read(buf[0:])

    if err != nil {

    if err == io.EOF {

    fmt.Print(string(buf[0:n]))

    reader.Close()

    break

    }

    checkError(err)

    }

    fmt.Print(string(buf[0:n]))

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    If you have a proxy at, say, `XYZ.com` on port 8080, you can test this as follows:


    ```

    ch8$ go run proxyget.go http://XYZ.com:8080 https://www.google.com

    ```


    If you don’t have a suitable proxy to test this, then download and install the
    Squid proxy ([`http://www.squid-cache.org/`](http://www.squid-cache.org/)) to
    your own computer. For example, on a Mac with Homebrew installed:


    ```

    ch8$ brew install squid       // install via Homebrew

    ch8$ brew service start squid // run Squid on port 3128

    ```


    You can now run the client against this locally running proxy.


    ```

    ch8$ HTTP_PROXY=localhost:3128 go run proxyget.go https://www.google.com

    Read ok

    Response ok

    <html itemscope=""...

    ```


    This program used our proxy passed (via `HTTP_PROXY`) as an environment variable
    to the program. There are many ways that proxies can be made known to applications.
    Most browsers have a configuration menu in which you can enter proxy information;
    such information is not available to a Go application. Some applications may get
    proxy information using the Web Proxy Autodiscovery Protocol (WPAD – [`https://en.wikipedia.org/wiki/Web_Proxy_Autodiscovery_Protocol`](https://en.wikipedia.org/wiki/Web_Proxy_Autodiscovery_Protocol))
    via a file often known as `proxy.pac` somewhere in your network. Go does not (yet)
    know how to parse these JavaScript files and so cannot use them. Particular operating
    systems may have system-specific means of specifying proxies. Go cannot access
    these. But it can find proxy information if it is set in operating system environment
    variables such as `HTTP_PROXY` or `http_proxy` using this function:


    ```

    func ProxyFromEnvironment(req *Request) (*url.URL, error)

    ```


    If your programs are running in such an environment, you can use this function
    instead of having to explicitly know the proxy parameters. See `go doc net/http
    ProxyFromEnvironment` for more.


    ## Authenticating Proxy


    Some proxies will require authentication by a username and password in order to
    pass requests. A common scheme is "basic authentication" in which the username
    and password are concatenated into a string `"user:password"` and then Base64
    encoded. This is then given to the proxy by the HTTP request header `"Proxy-Authorization"`
    with the flag that it is the basic authentication.


    The following program `proxyauthget.go` illustrates this, adding the `Proxy-Authentication`
    header to the previous proxy program:


    ```

    ch8$ vi proxyauthget.go

    /* ProxyAuthGet

    */

    package main

    import (

    "encoding/base64"

    "fmt"

    "io"

    "net/http"

    "net/http/httputil"

    "net/url"

    "os"

    )

    const auth = "jannewmarch:mypassword"

    func main() {

    if len(os.Args) != 3 {

    fmt.Println("Usage: ", os.Args[0], "http://proxy-host:port http://host:port/page")

    os.Exit(1)

    }

    proxy := os.Args[1]

    proxyURL, err := url.Parse(proxy)

    checkError(err)

    rawURL := os.Args[2]

    url, err := url.Parse(rawURL)

    checkError(err)

    // encode the auth

    basic := "Basic " +

    base64.StdEncoding.EncodeToString([]byte(auth))

    transport := &http.Transport{Proxy: http.ProxyURL(proxyURL)}

    client := &http.Client{Transport: transport}

    request, err := http.NewRequest("GET", url.String(), nil)

    request.Header.Add("Proxy-Authorization", basic)

    dump, _ := httputil.DumpRequest(request, false)

    fmt.Println(string(dump))

    // send the request

    response, err := client.Do(request)

    checkError(err)

    fmt.Println("Read ok")

    if response.Status != "200 OK" {

    fmt.Println(response.Status)

    os.Exit(2)

    }

    fmt.Println("Response ok")

    var buf [512]byte

    reader := response.Body

    for {

    n, err := reader.Read(buf[0:])

    if err != nil {

    os.Exit(0)

    }

    fmt.Print(string(buf[0:n]))

    }

    os.Exit(0)

    }

    func checkError(err error) {

    if err != nil {

    if err == io.EOF {

    return

    }

    fmt.Println("Fatal error ", err.Error())

    os.Exit(1)

    }

    }

    ```


    There doesn’t seem to be a publicly available test site for this type of program.
    I tested it at work where an authenticating proxy is used. Setting up such a proxy
    is beyond the scope of this book. There is a discussion on how to do this called
    "How to Set Up a Squid Proxy with Basic Username and Password Authentication"
    (see [`http://stackoverflow.com/questions/3297196/how-to-set-up-a-squid-proxy-with-basic-username-and-password-authentication`](http://stackoverflow.com/questions/3297196/how-to-set-up-a-squid-proxy-with-basic-username-and-password-authentication)).


    The code currently hard-codes the username and password. If you fail to use the
    correct login, you may get an error such as


    ```

    ch8$ go run proxyauthget.go http://localhost:3128/ http://www.google.com

    GET / HTTP/1.1

    Host: www.google.com

    Proxy-Authorization: Basic amphbm5ld21hcmNoOm15cGFzc3dvcmQ=

    Read ok

    407 Proxy Authentication Required

    exit status 2

    ```


    If it works, you will receive similar results as with the unauthenticated proxy.


    ```

    ch8$ go run proxyauthget.go http://localhost:3128/ http://www.google.com

    GET / HTTP/1.1

    Host: www.google.com

    Proxy-Authorization: Basic amFubmV3bWFyY2g6bXlwYXNzd29yZA==

    Read ok

    Response ok

    <html...

    ```'
