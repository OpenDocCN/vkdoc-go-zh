- fmt: "# JSON\n\nJSON^([⁵](#fn5)) stands for JavaScript Object Notation. It was designed\
    \ to be a lightweight means of passing data between JavaScript systems (i.e.,\
    \ browser/web server). It uses a text-based format and is sufficiently general\
    \ that it has become used as a general-purpose serialization method for many programming\
    \ languages.\n\nJSON serializes objects, arrays, and basic values. The basic values\
    \ include string, number, boolean values, and the null value. Arrays are a comma-separated\
    \ list of values that can represent arrays, vectors, lists, or sequences of various\
    \ programming languages. They are delimited by square brackets `[ ... ]`. Objects\
    \ are represented by a list of \"field: value\" pairs enclosed in curly braces\
    \ `{ ... }`.\n\nFor example, the table of employees given earlier could be written\
    \ as an array of employee objects:\n\n```\n[\n{\"Name\": \"fred\", \"Occupation\"\
    : \"programmer\"},\n{\"Name\": \"liping\", \"Occupation\": \"analyst\"},\n{\"\
    Name\": \"sureerat\", \"Occupation\": \"manager\"}\n]\n```\n\nThere is no special\
    \ support for complex data types such as dates, no distinction between number\
    \ types, no recursive types, etc. JSON is a very simple format but nevertheless\
    \ can be quite useful. Its text-based format makes it easy to use and debug, even\
    \ though it has the overheads of string handling. Go's implementation is based\
    \ on [`https://www.rfc-editor.org/rfc/rfc7159.html`](https://www.rfc-editor.org/rfc/rfc7159.html).\n\
    \nFrom the Go `encoding/json` package documentation, marshalling uses the following\
    \ type-dependent default encodings:\n\n- Boolean values encode as JSON Booleans.\n\
    - Floating point, integer, and Number values encode as JSON numbers.\n- String\
    \ values encode as JSON strings coerced to valid UTF-8, where each invalid UTF-8\
    \ sequence is replaced by the encoding of the Unicode replacement character U+FFFD\
    \ (potentially rendered as ![](images/436770_2_En_4_Chapter/436770_2_En_4_Figa_HTML.gif)).\n\
    \    - Disable HTML tag encoding via `SetEscapeHTML(false)`.\n- Array and slice\
    \ values encode as JSON arrays, except that `[]byte` encodes as a base64-encoded\
    \ string.\n- Struct values encode as JSON objects. Each struct field becomes a\
    \ member of the object. By default, the object's key name is the struct field\
    \ name converted to lowercase.\n    - If the struct field has a tag, that tag\
    \ will be used as the name instead.\n- Map values encode as JSON objects. The\
    \ map's key type must be string; the object keys are used directly as map keys.\n\
    - Pointer values encode as the value pointed to. (Note: This allows trees but\
    \ not graphs!). A nil pointer encodes as the null JSON object.\n- Interface values\
    \ encode as the value contained in the interface. A nil interface value encodes\
    \ as the null JSON object.\n- Channel, complex, and function values cannot be\
