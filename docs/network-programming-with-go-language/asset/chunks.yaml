- fmt: '# Content Negotiation


    Any web user agent can try to talk to any web server. The typical case of a browser
    talking to an HTML server is what we are used to on the Web, but many will be
    familiar with using other user agents such as `curl`, `wget`, and even `telnet`!
    The browser and other tools will use the `Content-Type` in HTTP replies to work
    out what to do with content supplied.


    With a Web application, the user agent must be able to understand what the server
    is delivering because it is trying to play a part in an interaction that probably
    doesn’t have a user to help. RPC systems often use an external specification that
    the client and server conform to. That is not the case here.


    The solution is that both parties must agree on a content format. This is done
    at the HTTP level. A client will state that it will accept a range of formats.
    If the server agrees, then they carry on. If not, the server will tell the client
    which formats it can accept, and the client can start afresh if possible.


    The negotiation uses MIME types. There are hundreds of standard ones: `text/html`,
    `application/pdf`, `application/xml`, etc. A browser can render any HTML document
    it receives. An HTTP-aware music player such as VLC can play any MP3 file it receives.
    But for the flashcard application, it can’t handle any general format, only messages
    that conform to an expected structure. These aren’t any standard MIME types that
    would be suitable for negotiating a specialized protocol for this flashcard application.
    So we make up our own. The client and the server have to know that they are dealing
    with a shared MIME type, or they can’t talk properly.


    There are rules from IANA for making up your own MIME types. I use the type `application/x.flashcards`.
    The server will be able to deliver JSON and XML, so the two acceptable MIME types
    are `application/x.flashcards+xml` and `application/x.flashcards+json`.


    HTTP content negotiation says that the user agent can suggest a list of acceptable
    formats, weighted between zero and one, as follows:


    ```

    Accept: application/x.flashcards+xml; q=0.8,

    application/x.flashcards+json; q=0.4

    ```


    The server can examine the request and decide if it can handle the format. We
    use the following code in the server to determine for any type if the user agent
    has requested it and with what weighting (zero means not requested):


    ```

    const flashcard_xml string = "application/x.flashcards+xml"

    const flashcard_json string = "application/x.flashcards+json"

    type ValueQuality struct {

    Value   string

    Quality float64

    }

    /* Based on https://siongui.github.io/2015/02/22/go-parse-accept-language/ */

    func parseValueQuality(s string) []ValueQuality {

    var vqs []ValueQuality

    strs := strings.Split(s, `,`)

    for _, str := range strs {

    trimmedStr := strings.Trim(str, ` `)

    valQ := strings.Split(trimmedStr, `;`)

    if len(valQ) == 1 {

    vq := ValueQuality{valQ[0], 1}

    vqs = append(vqs, vq)

    } else {

    qp := strings.Split(valQ[1], `=`)

    q, err := strconv.ParseFloat(qp[1], 64)

    if err != nil {

    q = 0

    }

    vq := ValueQuality{valQ[0], q}

    vqs = append(vqs, vq)

    }

    }

    return vqs

    }

    func qualityOfValue(value string, vqs []ValueQuality) float64 {

    for _, vq := range vqs {

    if value == vq.Value {

    return vq.Quality

    }

    }

    // not found

    return 0

    }

    ```


    If the server does not accept any of the types requested by the user agent, it
    returns an HTTP code of 406 `"Not acceptable"` and supplies a list of accepted
    formats. The code segment to do this in the server is as follows:


    ```

    func handleFlashCardSets(rw http.ResponseWriter, req *http.Request) {

    ...

    if req.Method == "GET" {

    acceptTypes := parseValueQuality(req.Header.Get("Accept"))

    q_xml := qualityOfValue(flashcard_xml, acceptTypes)

    q_json := qualityOfValue(flashcard_json, acceptTypes)

    if q_xml == 0 && q_json == 0 {

    // can''t find XML or JSON in Accept header

    rw.Header().Set("Content-Type", "flashcards+xml, flashcards+json")

    rw.WriteHeader(http.StatusNotAcceptable)

    return

    }

    ...

    ```


    This illustrates a common REST pattern for HTTP servers: given an HTTP request,
    examine it to see if the server can manage it. If not, return an HTTP error. If
    okay, attempt to handle it. If the attempt fails, return an HTTP error. On success,
    return an appropriate HTTP success code and the results.


    ## GET /


    The flashcard sets are all stored in the directory `flashcardsets`. The `GET /`
    request needs to list all those files and prepare them in a suitable format for
    the client. The format is a list of flashcard set names and *their URLs*. The
    URLs are required by HATEOAS: the list of names tells us what the sets are, but
    the client will need their URLs in order to move to the stage of interacting with
    one of them.


    The struct type for each `FlashcardSet` in the server contains the name of the
    set and its URL (as a string):


    ```

    type FlashcardSet struct {

    Name string

    Link string

    }

    ```


    The set of flashcard sets on the server can be built from the directory of flashcard
    sets. The `ioutil.ReadDir()` will create an array of `os.FileI`nfo. This needs
    to be converted to a list of file names as follows:


    ```

    files, err := ioutil.ReadDir(`flashcardsets`)

    checkError(err)

    numfiles := len(files)

    cardSets := make([]FlashcardSet, numfiles, numfiles)

    for n, file := range files {

    fmt.Println(file.Name())

    cardSets[n].Name = file.Name()

    // should be PathEscape, not in go 1.6

    cardSets[n].Link = `/flashcardSets/` + url.QueryEscape(file.Name())

    }

    ```


    This creates an array of file names and relative links to the resource on the
    server as `/<name>`. For the `CommonWords` set, the relative link URL would be
    `/flashcardSets/CommonWords`. The scheme (`http` or `https`) and the host (e.g.,
    "localhost") are left up to the client to work out.


    Unfortunately, the file name may contain characters not legal in URL path names.
    The function `url.PathEscape` escapes them all correctly. The function `url.QueryEscape`
    gets everything right except for spaces in the file name, which it replaces with
    `+` instead of `%20;`.


    Finally, the server figures out if JSON or XML is preferred and runs it through
    a template to generate the right output to the client. For XML, the template code
    is as follows:


    ```

    ...

    if q_xml >= q_json {

    // XML preferred

    t, err := template.ParseFiles("xml/ListFlashcardSets.xml")

    if err != nil {

    fmt.Println("Template error")

    http.Error(rw, err.Error(), http.StatusInternalServerError)

    return

    }

    rw.Header().Set("Content-Type", flashcard_xml)

    t.Execute(rw, cardSets)

    } else {

    // JSON preferred

    ...

    ```


    The XML template is as follows:


    ```

    ch14 % cat xml/ListFlashcardSets.xml


    {{range .}}


    {{.Name}}


    {{end}}


    ```


    For a listing of only two sets, `CommonWords` and `Lesson04`, the content sent
    to the client is as follows:


    ```


    Common Words


    Lesson04


    ```


    ## POST /


    Here, a client is asking for a new flashcard set to be created. The expectation
    is that the client will supply the name of the flashcard set. We make it look
    like form submission data:


    ```

    name=

    ```


    This is much simpler than `GET` in this case. Get the value out of the request
    as form data. Then check that the requested name doesn’t have nasties in it like
    calling the flashcard set `/etc/passwd`. If it does, return 403 `"Forbidden"`.
    If it appears to be okay, create a directory with that name. Return a 403 again
    if it fails (the directory may already exist). Otherwise, return 201 `"Created"`
    and the new relative URL:


    ```

    ...

    } else if req.Method == "POST" {

    name := req.FormValue(`name`)

    if hasIllegalChars(name) {

    rw.WriteHeader(http.StatusForbidden)

    return

    }

    // lose all spaces as they are a nuisance

    name = strings.Replace(name, ` `, ``, -1)

    err := os.Mkdir(`flashcardsets/`+name,

    (os.ModeDir | os.ModePerm))

    if err != nil {

    rw.WriteHeader(http.StatusForbidden)

    return

    }

    rw.WriteHeader(http.StatusCreated)

    base_url := req.URL.String()

    new_url := base_url + `flashcardSets/` + name + `/`

    rw.Write([]byte(new_url))

    } else {

    rw.WriteHeader(http.StatusMethodNotAllowed)

    }

    ...

    ```'
