  trans: '

    ## 处理其他 URL


    我们讨论过服务器处理带有 `GET` 和 `POST` 请求的 `/` URL 的代码。此应用还有另外两类 URL：处理集合中的卡片和处理单张卡片。不过，就编码而言，这并没有带来新的概念。


    *   获取集合中的卡片列表是另一种目录列表操作。

    *   向集合发布一张新卡片，意味着在对应目录下创建一个包含客户端内容的文件。

    *   删除一个集合意味着移除一个目录。如果目录为空，则操作正常；否则会引发错误。

    *   获取一张卡片意味着读取卡片文件并发送其内容。

    *   删除一张卡片意味着移除一个文件。


    所有这些操作都没有特别新颖之处。我们尚未完成某些操作（如 `DELETE`）的代码：这些操作会返回 HTTP 状态码 501 `''未实现''`。此外，我们将单张卡片的内容作为
    `text/plain` 返回：它们具有第 10 章中使用的复杂 JSON/Go 结构，但这对于讨论本系统的 REST 方面并非必需。


    ## 完整服务器


    以下是处理对 `/` 的请求以及从该路径到其他 URL 的完整服务器代码。运行它需要闪卡集合和单张卡片，这些文件位于 `ch14` 文件夹中，可从 [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)
    获取。


    ```

    ch14$ vi server.go

    /* Server

    */

    package main

    import (

    "fmt"

    "html/template"

    "log"

    "net/http"

    "net/url"

    "os"

    "regexp"

    "strconv"

    "strings"

    )

    type FlashcardSet struct {

    Name string

    Link string

    }

    type Flashcard struct {

    Name string

    Link string

    }

    const flashcard_xml string = "application/x.flashcards+xml"

    const flashcard_json string = "application/x.flashcards+json"

    type ValueQuality struct {

    Value   string

    Quality float64

    }

    /* 基于 https://siongui.github.io/2015/02/22/go-parse-accept-language/ */

    func parseValueQuality(s string) []ValueQuality {

    var vqs []ValueQuality

    strs := strings.Split(s, `,`)

    for _, str := range strs {

    trimmedStr := strings.Trim(str, ` `)

    valQ := strings.Split(trimmedStr, `;`)

    if len(valQ) == 1 {

    vq := ValueQuality{valQ[0], 1}

    vqs = append(vqs, vq)

    } else {

    qp := strings.Split(valQ[1], `=`)

    q, err := strconv.ParseFloat(qp[1], 64)

    if err != nil {

    q = 0

    }

    vq := ValueQuality{valQ[0], q}

    vqs = append(vqs, vq)

    }

    }

    return vqs

    }

    func qualityOfValue(value string, vqs []ValueQuality) float64 {

    for _, vq := range vqs {

    if value == vq.Value {

    return vq.Quality

    }

    }

    return 0

    }

