- fmt: "# Inserting Object Values\n\nA template is applied to a Go object. Fields\
    \ from that Go object can be inserted into the template, and you can \"dig\" into\
    \ the object to find subfields, etc. The current object is represented as the\
    \ *cursor*, so to insert the value of the current object as a string, you use\
    \ `{{.}}`. The package uses the `fmt` package by default to work out the string\
    \ used as inserted values.\n\nTo insert the value of a field of the current cursor\
    \ object, you use the field name prefixed by `.`. For example, if the current\
    \ cursor object is of type\n\n```go\ntype Person struct {\n    Name   string\n\
    \    Age    int\n    Emails []string\n    Jobs   []*Job\n}\n```\n\nyou insert\
    \ the values of `Name` and `Age` as follows:\n\n```\nThe name is {{.Name}}.\n\
    The age is {{.Age}}.\n```\n\nYou can loop over the elements of an array or other\
    \ lists using the `range` command. So to access the contents of the `Emails` array,\
    \ you use this:\n\n```\n{{range .Emails}}\nThe email is {{.}}\n{{end}}\n```\n\n\
    During the loop over emails, the cursor `.` is set to each email in turn. On conclusion\
    \ of the loop, the cursor reverts to the person. If `Job` is defined as follows:\n\
    \n```go\ntype Job struct {\n    Employer string\n    Role     string\n}\n```\n\
    \nand we want to access the fields of a `person`'s `jobs`, we can do it as before\
    \ with a `{{range .Jobs}}`. An alternative is to switch the current object to\
    \ the `Jobs` field. This is done using the `{{with ...}} ... {{end}}` construction,\
    \ where now `{{.}}` is the `Jobs` field, which is an array:\n\n```\n{{with .Jobs}}\n\
    {{range .}}\nAn employer is {{.Employer}}\nand the role is {{.Role}}\n{{end}}\n\
    {{end}}\n```\n\nYou can use this with any field, not just an array.\n\n## Using\
    \ Templates\n\nOnce you have a template, you can apply it to an object to generate\
    \ a new string using the object to fill in the template values. This is a two-step\
    \ process that involves parsing the template and then applying it to an object.\
    \ The result is output to a `Writer`, as in\n\n```go\nt := template.New(\"Person\
    \ template\")\nt, err := t.Parse(templ)\nif err == nil {\n    buff := bytes.NewBufferString(\"\
    \")\n    t.Execute(buff, person)\n}\n```\n\nAn example program to apply a template\
    \ to an object and print to standard output is `printperson.go`:\n\n```go\n$ mkdir\
    \ ch9\nch9$ cd ch9\nch9$ vi printperson.go\n/* PrintPerson\n*/\npackage main\n\
    import (\n    \"log\"\n    \"os\"\n    \"text/template\"\n)\ntype Person struct\
    \ {\n    Name   string\n    Age    int\n    Emails []string\n    Jobs   []Job\n\
    }\ntype Job struct {\n    Employer string\n    Role     string\n}\nconst templ\
    \ = `The name is {{.Name}}.\nThe age is {{.Age}}.\n{{range .Emails}}\nAn email\
    \ is {{.}}\n{{end}}\n{{with .Jobs}}\n{{range .}}\nAn employer is {{.Employer}}\n\
    and the role is {{.Role}}\n{{end}}\n{{end}}\n`\nfunc main() {\n    job1 := Job{Employer:\
    \ \"Box Hill Institute\", Role: \"Director, Commerce and ICT\"}\n    job2 := Job{Employer:\
    \ \"Canberra University\", Role: \"Adjunct Professor\"}\n    person := Person{\n\
    \        Name:   \"jan\",\n        Age:    66,\n        Emails: []string{\"jan@newmarch.name\"\
    ,\n            \"jan.newmarch@gmail.com\"},\n        Jobs:   []Job{job1, job2},\n\
    \    }\n    t := template.New(\"Person template\")\n    t, err := t.Parse(templ)\n\
    \    checkError(err)\n    err = t.Execute(os.Stdout, person)\n    checkError(err)\n\
    }\nfunc checkError(err error) {\n    if err != nil {\n        log.Fatalln(\"Fatal\
    \ error \", err.Error())\n    }\n}\n```\n\nThe output from this is as follows:\n\
    \n```\nch9$ go run printperson.go\nThe name is jan.\nThe age is 66.\nAn email\
    \ is jan@newmarch.name\nAn email is jan.newmarch@gmail.com\nAn employer is Box\
    \ Hill Institute\nand the role is Director, Commerce and ICT\nAn employer is Canberra\
    \ University\nand the role is Adjunct Professor\n```\n\nNote that there is plenty\
    \ of whitespace as newlines in this printout. This is due to the whitespace we\
    \ have in our template. If you want to reduce this whitespace, eliminate the newlines\
    \ in the template as follows:\n\n```\n{{range .Emails}} An email is {{.}} {{end}}\n\
    ```\n\nAn alternative is to use the command delimiters `{{-` and `-}}` to eliminate\
    \ all trailing whitespace from the immediately preceding text and all leading\
    \ whitespace from the immediately following text, respectively.\n\nIn the example,\
    \ we used a string in the program as the template. You can also load templates\
    \ from a file using the `template.ParseFiles()` function. For some reason that\
    \ I don't understand (and which wasn't required in earlier versions), the name\
    \ assigned to the template must be the same as the basename of the first file\
    \ in the list of files. Is this a bug?\n\n## Pipelines\n\nThe preceding transformations\
    \ insert pieces of text into a template. Those pieces of text are essentially\
    \ arbitrary, whatever the string values of the fields are. If we want them to\
    \ appear as part of an HTML document (or other specialized form), we will have\
    \ to escape particular sequences of characters. For example, to display arbitrary\
    \ text in an HTML document, we have to change `<` to `&lt;`. The Go templates\
    \ have a number of built-in functions, and one of these is `html()`. These functions\
    \ act in a similar manner to UNIX pipelines, reading from standard input and writing\
    \ to standard output.\n\nTo take the value of the current object `.` and apply\
    \ HTML escapes to it, you write a \"pipeline\" in the template:\n\n```\n{{. |\
    \ html}}\n```\n\nHere is another example, where we add a pipelined formatted message\
    \ stating how many jobs a person has.\n\n```go\nconst templ = `The name is {{.Name}}.\n\
    The age is {{.Age}}.\n{{range .Emails}}\nAn email is {{.}}\n{{end}}\n{{with .Jobs}}\n\
    {{range .}}\nAn employer is {{.Employer}}\nand the role is {{.Role}}\n{{end}}\n\
    {{ . | len | printf \"%d jobs total\" }}\n{{end}}\n`\n```\n\nRunning the modified\
    \ prior example, we now see a new line of output:\n\n```\ngo run printperson.go\n\
    ...\n2 jobs total\n```\n\nAnd do similarly for other functions. There are additional\
    \ considerations when pipelining including how arguments are passed in. You can\
    \ learn more about pipelining in your templates here: [`https://pkg.go.dev/text/template#hdr-Pipelines`](https://pkg.go.dev/text/template#hdr-Pipelines)."
  raw: '## Inserting Object Values


    A template is applied to a Go object. Fields from that Go object can be inserted
    into the template, and you can “dig” into the object to find subfields, etc. The
    current object is represented as the *cursor*, so to insert the value of the current
    object as a string, you use `{{.}}`. The package uses the `fmt` package by default
    to work out the string used as inserted values.


    To insert the value of a field of the current cursor object, you use the field
    name prefixed by `.`. For example, if the current cursor object is of type


    ```

    type Person struct {

    Name      string

    Age       int

    Emails    []string

    Jobs      []*Job

    }

    ```


    you insert the values of `Name` and `Age` as follows:


    ```

    The name is {{.Name}}.

    The age is {{.Age}}.

    ```


    You can loop over the elements of an array or other lists using the `range` command.
    So to access the contents of the `Emails` array, you use this:


    ```

    {{range .Emails}}

    The email is {{.}}

    {{end}}

    ```


    During the loop over emails, the cursor `.` is set to each email in turn. On conclusion
    of the loop, the cursor reverts to the person. If `Job` is defined as follows:


    ```

    type Job struct {

    Employer string

    Role     string

    }

    ```


    and we want to access the fields of a `person`''s `jobs`, we can do it as before
    with a `{{range .Jobs}}`. An alternative is to switch the current object to the
    `Jobs` field. This is done using the `{{with ...}} ... {{end}}` construction,
    where now `{{.}}` is the `Jobs` field, which is an array:


    ```

    {{with .Jobs}}

    {{range .}}

    An employer is {{.Employer}}

    and the role is {{.Role}}

    {{end}}

    {{end}}

    ```


    You can use this with any field, not just an array.


    ### Using Templates


    Once you have a template, you can apply it to an object to generate a new string
    using the object to fill in the template values. This is a two-step process that
    involves parsing the template and then applying it to an object. The result is
    output to a `Writer`, as in


    ```

    t := template.New("Person template")

    t, err := t.Parse(templ)

    if err == nil {

    buff := bytes.NewBufferString("")

    t.Execute(buff, person)

    }

    ```


    An example program to apply a template to an object and print to standard output
    is `printperson.go`:


    ```

    $ mkdir ch9

    ch9$ cd ch9

    ch9$ vi printperson.go

    /* PrintPerson

    */

    package main

    import (

    "log"

    "os"

    "text/template"

    )

    type Person struct {

    Name   string

    Age    int

    Emails []string

    Jobs   []Job

    }

    type Job struct {

    Employer string

    Role     string

    }

    const templ = `The name is {{.Name}}.

    The age is {{.Age}}.

    {{range .Emails}}

    An email is {{.}}

    {{end}}

    {{with .Jobs}}

    {{range .}}

    An employer is {{.Employer}}

    and the role is {{.Role}}

    {{end}}

    {{end}}

    `

    func main() {

    job1 := Job{Employer: "Box Hill Institute", Role: "Director, Commerce and ICT"}

    job2 := Job{Employer: "Canberra University", Role: "Adjunct Professor"}

    person := Person{

    Name: "jan",

    Age:  66,

    Emails: []string{"jan@newmarch.name",

    "jan.newmarch@gmail.com"},

    Jobs: []Job{job1, job2},

    }

    t := template.New("Person template")

    t, err := t.Parse(templ)

    checkError(err)

    err = t.Execute(os.Stdout, person)

    checkError(err)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The output from this is as follows:


    ```

    ch9$ go run printperson.go

    The name is jan.

    The age is 66.

    An email is jan@newmarch.name

    An email is jan.newmarch@gmail.com

    An employer is Box Hill Institute

    and the role is Director, Commerce and ICT

    An employer is Canberra University

    and the role is Adjunct Professor

    ```


    Note that there is plenty of whitespace as newlines in this printout. This is
    due to the whitespace we have in our template. If you want to reduce this whitespace,
    eliminate the newlines in the template as follows:


    ```

    {{range .Emails}} An email is {{.}} {{end}}

    ```


    An alternative is to use the command delimiters `"{{- " and " -}}"` to eliminate
    all trailing whitespace from the immediately preceding text and all leading whitespace
    from the immediately following text, respectively.


    In the example, we used a string in the program as the template. You can also
    load templates from a file using the `template.ParseFiles()` function. For some
    reason that I don’t understand (and which wasn’t required in earlier versions),
    the name assigned to the template must be the same as the basename of the first
    file in the list of files. Is this a bug?


    ## Pipelines


    The preceding transformations insert pieces of text into a template. Those pieces
    of text are essentially arbitrary, whatever the string values of the fields are.
    If we want them to appear as part of an HTML document (or other specialized form),
    we will have to escape particular sequences of characters. For example, to display
    arbitrary text in an HTML document, we have to change `<` to `<`. The Go templates
    have a number of built-in functions, and one of these is `html()`. These functions
    act in a similar manner to UNIX pipelines, reading from standard input and writing
    to standard output.


    To take the value of the current object `.` and apply HTML escapes to it, you
    write a “pipeline” in the template:


    ```

    {{. | html}}

    ```


    Here is another example, where we add a pipelined formatted message stating how
    many jobs a person has.


    ```

    const templ = `The name is {{.Name}}.

    The age is {{.Age}}.

    {{range .Emails}}

    An email is {{.}}

    {{end}}

    {{with .Jobs}}

    {{range .}}

    An employer is {{.Employer}}

    and the role is {{.Role}}

    {{end}}

    {{ . | len | printf "%d jobs total" }}

    {{end}}

    `

    ```


    Running the modified prior example, we now see a new line of output:


    ```

    go run printperson.go

    ...

    2 jobs total

    ```


    And do similarly for other functions. There are additional considerations when
    pipelining including how arguments are passed in. You can learn more about pipelining
    in your templates here: [`https://pkg.go.dev/text/template#hdr-Pipelines`](https://pkg.go.dev/text/template#hdr-Pipelines).'
