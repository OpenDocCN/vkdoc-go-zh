    \ test table (reqWriteTests).\n\n*   Set up a real Request object with headers\
    \ and body.\n\n*   Serialize the Request object (sraw) and compare with WantWrite\
    \ or WantProxy.\n\nSome additional items to note are\n\n*   io.NopCloser\n\nThe\
