    ```go

    $ go doc net/http ServeMux

    package http // import "net/http"

    type ServeMux struct {

    // 包含未导出的字段

    }


    ServeMux 是一个 HTTP 请求多路复用器。它会将每个传入请求的 URL 与已注册的模式列表进行匹配，并调用与 URL 最匹配的模式对应的处理程序。


    模式指定固定的、以根路径开头的路径，例如 "/favicon.ico"，或以根路径开头的子树，例如 "/images/"（注意尾部斜杠）。较长的模式优先于较短的模式，因此，如果同时为
    "/images/" 和 "/images/thumbnails/" 注册了处理程序，那么对于以 "/images/thumbnails/" 开头的路径将调用后者，而前者将接收
    "/images/" 子树中其他任何路径的请求。


    请注意，由于以斜杠结尾的模式表示一个根子树，因此模式 "/" 会匹配所有未被其他已注册模式匹配的路径，而不仅仅是 Path == "/" 的 URL。


    如果已注册了一个子树，并且接收到的请求指定了该子树的根路径但没有尾部斜杠，ServeMux 会将该请求重定向到子树根路径（添加尾部斜杠）。可以通过为没有尾部斜杠的路径单独注册来覆盖此行为。例如，注册
    "/images/" 会导致 ServeMux 将 "/images" 的请求重定向到 "/images/"，除非 "/images" 已被单独注册。


    模式可以可选地以主机名开头，从而将匹配限制为仅匹配该主机上的 URL。特定于主机的模式优先于通用模式，因此处理程序可以为两个模式 "/codesearch"
    和 "codesearch.google.com/" 注册，而不会同时接管对 "http://www.google.com/" 的请求。


    ServeMux 还负责清理 URL 请求路径和 Host 头，去除端口号，并将任何包含 "." 或 ".." 元素或重复斜杠的请求重定向到一个等效且更简洁的
    URL。


    func NewServeMux() *ServeMux

    func (mux *ServeMux) Handle(pattern string, handler Handler)

    func (mux *ServeMux) HandleFunc(pattern string, handler func(ResponseWriter, *Request))

    func (mux *ServeMux) Handler(r *Request) (h Handler, pattern string)

    func (mux *ServeMux) ServeHTTP(w ResponseWriter, r *Request)

    ```


    如你所见，`ServeMux` 匹配给定的模式并将其传递给配置的 `Handler`，然后该处理程序再调用我们的业务逻辑。继续向左看，我们来查阅简略的 `Server`
    文档。


    ```

    $ go doc net/http.Server

    package http // import "net/http"

    type Server struct {

    // Addr 可选择指定服务器监听的 TCP 地址，格式为 "host:port"。

    // 如果为空，则使用 ":http"（端口 80）。

    // 服务名称在 RFC 6335 中定义，并由 IANA 分配。

    // 有关地址格式的详细信息，请参阅 net.Dial。

    Addr string

    Handler Handler // 要调用的处理程序，如果为 nil，则使用 http.DefaultServeMux

    ...

    ```


    虽然有所截断，但我们可以在一开始就看到，一个 `Server` 持有一个 `Handler`，并且根据注释，似乎我们有一个名为 `DefaultServeMux`
    的 `ServeMux` 实例。


    了解了连接关系后，我们现在来看一些例子。


    ## 标准库 ServeMux 示例


    在这里，我们演示了 Go 可能提供的最简单的 Web 服务（至少在 `net/http` 包中），以及一个更清晰地展示中间件模式的示例。


    ```

    $ mkdir ch16

    $ ch16

    ch16$ vi simple.go

    package main

    import (

    "net/http"

    "fmt"

    )

    func main() {

    err := http.ListenAndServe(":8080",nil)

    fmt.Println(err)

    }

    ```


    运行服务器 `go run simple.go`，通过任何方法/路径访问 `localhost:8080` 都会返回 404。


    ```

    ch16$ curl -v --head localhost:8080

    *   Trying ::1:8080...

    * Connected to localhost (::1) port 8080 (#0)

    > HEAD / HTTP/1.1

    > Host: localhost:8080

    > User-Agent: curl/7.77.0

    > Accept: */*

    >

    * Mark bundle as not supporting multiuse

    < HTTP/1.1 404 Not Found

    HTTP/1.1 404 Not Found

    < Content-Type: text/plain; charset=utf-8

    Content-Type: text/plain; charset=utf-8

    < X-Content-Type-Options: nosniff

    X-Content-Type-Options: nosniff

    < Date: Mon, 31 Jan 2022 00:43:57 GMT

    Date: Mon, 31 Jan 2022 00:43:57 GMT

    < Content-Length: 19

    Content-Length: 19

    <

    * Connection #0 to host localhost left intact

    ```


    这表明存在一个默认处理程序，返回 404。接下来，我们尝试一个 GET 请求。


    ```

    ch16$ curl -X GET localhost:8080/didthiswork

    404 page not found

    ```


    事实证明，在底层，我们已经有一个处理程序链。`Server` 正在调用 `ServeMux.ServeHTTP`，而后者又会调用 `NotFoundHandler`。`ServeMux`
    通过 `ServeHTTP` 方法支持 `Handler` 接口。作为敏锐的观察者，你可能已经注意到，在前面的 `Handler` 文档中，列出了 `NotFoundHandler`。


    ```

    ch16$ go doc net/http NotFoundHandler

    package http // import "net/http"

    func NotFoundHandler() Handler

    NotFoundHandler 返回一个简单的请求处理程序，该程序对每个请求都会回复“404 page not found”的响应。

    ```


    如果你喜欢冒险，可以查看代码，开始了解它们是如何连接起来的。


    ```

    ch16$ vi /usr/local/go/src/net/http/server.go

    ...

    // NotFound 回复一个 HTTP 404 not found 错误给请求。

    func NotFound(w ResponseWriter, r *Request) { Error(w, "404 page not found", StatusNotFound)
    }

    // NotFoundHandler 返回一个简单的请求处理程序

    // 该程序对每个请求都会回复“404 page not found”的响应。

    func NotFoundHandler() Handler { return HandlerFunc(NotFound) }

    ...

    ```


    如你所见，`NotFound` 函数被转换为 `HandlerFunc`（在我们的示例中，它将 `ServeHTTP` 调用代理给 `NotFound`）。`HandlerFunc`
    在 Go 中被称为函数适配器。


    ## 自定义多路复用器


    我们最后一个专注于标准库的例子将展示如何管理多个 `ServeMux` 实例。此示例的目标是展示“注册”一个新的 `ServeMux` 如何处理路由的一个子集。在这里，“默认的”（`DefaultServeMux`）处理路由
    `/outermux`，而我们新的“内部”`ServeMux` 将处理更深层嵌套的路由（例如，`/outermux/innermux`）。


    ```

    ch16$ vi complex.go

    package main

    import (

    "net/http"

    )

    func main() {

    http.Handle("/outermux", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)
    {

    w.Write([]byte("/outermux"))

    }))

    inner := http.NewServeMux()

    inner.Handle("/innermux/", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)
    {

    w.Write([]byte("../innermux"))

    }))

    http.Handle("/outermux/innermux/", http.StripPrefix("/outermux", inner))

    http.ListenAndServe(":8080", nil)

    }

    ```


    在我们接下来执行测试时，请注意请求的路径和生成的日志。根据前面 `ServeMux` 的文档，要特别注意如何结束路径，是否带有尾部斜杠 `/`。


    ```

    ch16$ curl localhost:8080/outermux

    /outermux

    ch16$ curl localhost:8080/outermux/

    404 page not found

    ch16$ curl localhost:8080/outermux/innermux

    Moved Permanently.

    ch16$ curl -iL localhost:8080/outermux/innermux

    HTTP/1.1 301 Moved Permanently

    Content-Type: text/html; charset=utf-8

    Location: /outermux/innermux/

    Date: Mon, 31 Jan 2022 01:16:24 GMT

    Content-Length: 54

    HTTP/1.1 200 OK

    Date: Mon, 31 Jan 2022 01:16:24 GMT

    Content-Length: 11

    Content-Type: text/plain; charset=utf-8

    ../innermux

    ch16$ curl -iL localhost:8080/outermux/innermux/

    HTTP/1.1 200 OK

    Date: Mon, 31 Jan 2022 01:16:28 GMT

    Content-Length: 11

    Content-Type: text/plain; charset=utf-8

    ../innermux

    ```


    你可能想知道最后一行是做什么的 (`http.ListenAndServe(":8080", nil)`)。


    具体来说，`nil` 是做什么的？这就是我们可以覆盖默认 `ServeMux` 的地方。当你传入 `nil` 时，“第一个”多路复用器仍然是 `Serve`
    类型使用的预创建实例 `DefaultServeMux`。你可以通过查看 `GOROOT/src/net/http/server.go` 中的代码来确认这些关系。

