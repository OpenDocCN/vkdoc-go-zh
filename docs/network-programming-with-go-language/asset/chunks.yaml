    args := Args{17, 8}

    var reply int

    err = client.Call("Arith.Multiply", args, &reply)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d*%d=%d\n", args.A, args.B, reply)

    var quot Quotient

    err = client.Call("Arith.Divide", args, &quot)

    if err != nil {

    log.Fatalln("arith error:", err)

    }

    fmt.Printf("Arith: %d/%d=%d remainder %d\n", args.A, args.B,

    quot.Quo, quot.Rem)

    }

    ```


    It’s run as follows:


    ```

    $ go run jsonarithclient.go localhost:1234

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    While not obvious (aside from the `jsonrpc.Dial`), the request and response are
    encoded and decoded via the `encoding/json` package. Take a look at related docs
    such as `go doc -u jsonrpc.WriteRequest` or the source itself here: `/usr/local/go/src/net/rpc/jsonrpc/client.go`.


    ## Conclusion


    RPC is a popular means of distributing applications. Several ways of doing it
    have been presented here, based on the `Gob` or `JSON` serialization techniques
    and using `HTTP` and `TCP` for transport.


    # 14. REST


    In previous chapters, we looked at `HTTP` and gave an example of a web system.
    However, we didn’t give any particular structure to the system, just what was
    simple enough for the problem. There is an architectural style developed by one
    of the key authors of `HTTP 1.1` (Roy Fielding) called `REST` (REpresentational
    State Transfer). In this chapter, we look at the `REST` style and what it means
    for building web applications. We have to go back to fundamentals for this.


    `REST` has many components that have to be followed if the term `REST` can be
    properly applied. Unfortunately, it has become a buzzword, and many applications
    have “bits” of `REST` but not the full thing. We discuss the Richardson Maturity
    Model, which says how far along the path to RESTful-ness an API has gone.


    In the last chapter, we looked at RPCs (remote procedure calls). This is a completely
    different style than `REST`. We also compare the two styles, looking at when it
    is appropriate to use each style.


    ## URIs and Resources


    Resources are the “things” that we want to interact with on a network or the Internet.
    I like to think of them as objects, but there is no requirement that their implementation
    should be object based `–` they should just “look like” a thing, possibly with
    components.


    Each resource has one or more addresses known as URIs (uniform resource identifiers).


    Note


    The internationalized form is IRIs – internationalized resource identifiers.


    These have this generic form:


    ```

    scheme:[//[user:password@]host[:port]][/]path[?query][#fragment]

    ```


    Typical examples are URLs (uniform resource locator), where the scheme is `http`
    or `https`, and the host refers to a computer by its IP address or DNS name, as
    follows:


    ```

    https://jan.newmarch.name/IoT/index.html

    ```


    There are non-HTTP URL schemes such as `telnet`, `news`, and `IPP` (Internet Printing
    Protocol). These also contain a location component. There are also others, such
    as URNs (uniform resource names), which are often wrappers around other identification
    systems, and they do not contain location information. For example, the IETF has
    a standard URN scheme for books identified by their ISBN, such as the ISBN for
    this book:


    ```

    urn:ISBN:978-1-4842-2692-6

    ```


    These URNs tend not to be widely used but still exist. A list is given by IANA
    Uniform Resource Names (URN) Namespaces at `https://www.iana.org/assignments/urn-namespaces/urn-namespaces.xhtml`.
    The original schemes, such as ISBN, are still in wider use.


    A formal definition of a resource may be hard to pin down. For example, `http://www.google.com`
    represents Google in some sense (it is the scheme and the host part of a URL),
    but the host certainly isn’t some fixed computer somewhere. Similarly, the ISBN
    for this book represents something about this book, but certainly not any extant
    copies (at the time this chapter was written, no copies existed even though the
    ISBN did).


    Nevertheless, we take the concept of resource as primitive, and URIs are identifiers
    for these resources. The IETF at Uniform Resource Identifier (URI): Generic Syntax
    (`https://www.ietf.org/rfc/rfc3986.txt`) is similarly vague: “the term “resource”
    is used in a general sense for whatever might be identified by a URI.”


    A resource may have more than one URI. As a person, I have a number of different
    identifiers: my tax file number refers to one aspect of me, my financial affairs;
    my Medicare number refers to me as a recipient of health treatments; my name (fairly
    unique) is often used to refer to different aspects of me. My URL of `https://jan.newmarch.name`
    refers to those aspects of me that I chose to reveal on my website. And Google,
    LinkedIn, Facebook, Twitter, etc., also presumably have URIs of some kind that
    label those aspects of me that they have chosen to save.


    What is agreed upon is that resources are *nouns* and not *verbs* or *adjectives*.
    A URL for a bank account that says `http://mybank/myaccount/withdraw` is not counted
    as a resource as it contains the verb `withdraw`. Similarly, `http://amazon.com/buy/book-id`
    would not label a resource as it contains the verb `buy` (Amazon does not have
    such a URL).


    This is the first key to `REST` for `HTTP`: identify the resources in your information
    system and assign URLs to them. There are conventions in this, the most common
    one being that if there is a hierarchical structure, then that should be reflected
    in the URL path. However, that isn’t necessary as the information should be given
    in other ways as well.


    The `REST` approach to designing URIs is still a bit of an art form. Legal (and
    perfectly legitimate) URIs are not necessarily “good” `REST` URIs, and many examples
    of so-called RESTful APIs have URIs that are not very RESTful at all. 2PartsMagic
    in RESTful URI design (`http://blog.2partsmagic.com/restful-uri-design/`) offers
    good advice on designing appropriate URIs.


    The `REST` approach to designing URIs is still a bit of an art form. Legal (and
    perfectly legitimate) URIs are not necessarily “good” `REST` URIs, and many examples
    of so-called RESTful APIs have URIs that are not very RESTful at all. The Golang
    developers blog provides a brief overview of some of the concepts of `REST`: `https://go.dev/doc/tutorial/web-service-gin`.
    Beyond examples, OpenAPI is a standard to help us with design and tooling around
    “http apis”: `https://spec.openapis.org/oas/latest.html`.'
