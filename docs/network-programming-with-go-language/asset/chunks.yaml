- fmt: '# UDP Datagrams


    In a connectionless protocol, each message contains information about its origin
    and destination. There is no "session" established using a long-lived socket.
    UDP clients and servers make use of datagrams, which are individual messages containing
    source and destination information. There is no state maintained by these messages,
    unless the client or server does so. The messages are not guaranteed to arrive
    or may arrive out of order.


    The most common situation for a client is to send a message and hope that a reply
    arrives. The most common situation for a server is to receive a message and then
    send one or more replies back to that client. In a peer-to-peer situation, though,
    the server may just forward messages to other peers.


    The major difference between TCP and UDP handling for Go is how to deal with packets
    arriving from multiple clients, without the cushion of a TCP session to manage
    things. The major calls needed are as follows:


    ```

    func ResolveUDPAddr(network, address string) (*UDPAddr, error)

    func DialUDP(network string, laddr, raddr *UDPAddr) (*UDPConn, error)

    func ListenUDP(network string, laddr *UDPAddr) (*UDPConn, error)

    func (c *UDPConn) ReadFromUDP(b []byte) (n int, addr *UDPAddr, err error)

    func (c *UDPConn) WriteToUDP(b []byte, addr *UDPAddr) (int, error)

    ```


    The client for a UDP time service doesn''t need to make many changes; just change
    the `...TCP...` calls to `...UDP...` calls in the program `udpdaytimeclient.go`:


    ```

    ch3$ vi udpdaytimeclient.go

    /* UDPDaytimeClient

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s host:port", os.Args[0])

    }

    service := os.Args[1]

    udpAddr, err := net.ResolveUDPAddr("udp", service)

    checkError(err)

    conn, err := net.DialUDP("udp", nil, udpAddr)

    checkError(err)

    _, err = conn.Write([]byte("anything"))

    checkError(err)

    var buf [512]byte

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:n]))

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The server has to make a few more changes in the program `udpdaytimeserver.go`:


    ```

    ch3$ vi udpdaytimeserver.go

    /* UDPDaytimeServer

    */

    package main

    import (

    "log"

    "net"

    "time"

    )

    func main() {

    service := ":1200"

    udpAddr, err := net.ResolveUDPAddr("udp", service)

    checkError(err)

    conn, err := net.ListenUDP("udp", udpAddr)

    checkError(err)

    for {

    handleClient(conn)

    }

    }

    func handleClient(conn *net.UDPConn) {

    var buf [512]byte

    _, addr, err := conn.ReadFromUDP(buf[0:])

    checkError(err)

    daytime := time.Now().String()

    conn.WriteToUDP([]byte(daytime), addr)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    The server is run as follows:


    ```

    ch3$ go run udpdaytimeserver.go

    ```


    A client on the same host is run as follows:


    ```

    ch3$ go run udpdaytimeclient.go :1200

    ```


    The client output will be something like this:


    ```

    2022-01-03 18:57:00.616532 -0500 EST m=+8.044046910

    ```


    ## Server Listening on Multiple Sockets


    A server may be attempting to listen to multiple clients not just on one port,
    but on many. In this case, it has to use some sort of polling mechanism between
    the ports.


    In C, the `select()` call lets the kernel do this work. The call takes a number
    of file descriptors. The process is suspended. When I/O is ready on one of these,
    a wakeup is done, and the process can continue. This is cheaper than busy polling.
    In Go, you can accomplish the same by using a different `go` routine for each
    port. A thread will become runnable when the lower-level `select()` discovers
    that I/O is ready for this thread.


    ## The Conn, PacketConn, and Listener Types


    So far, we have differentiated between the API for TCP and the API for UDP using,
    for example, `DialTCP` and `DialUDP` returning `TCPConn` and `UDPConn`, respectively.
    The `Conn` type is an interface, and both `TCPConn` and `UDPConn` implement this
    interface. To a large extent, you can deal with this interface rather than the
    two types.


    Instead of separate dial functions for TCP and UDP, you can use a single function:


    ```

    func Dial(network, address string) (Conn, error)

    func DialIP(network string, laddr, raddr *IPAddr) (*IPConn, error)

    ```


    The `network` can be any of `tcp`, `tcp4` (IPv4-only), `tcp6` (IPv6-only), `udp`,
    `udp4` (IPv4-only), `udp6` (IPv6-only), `ip`, `ip4` (IPv4-only), and `ip6` (IPv6-only)
    and several UNIX-specific ones such as `unix` for UNIX sockets. It will return
    an appropriate implementation of the `Conn` interface. Note that this function
    takes a string rather than address as the (`r)addr` argument so that programs
    using this can avoid working out the address type first.


    Using this function makes minor changes to the programs. For example, the earlier
    program to get `HEAD` information from a web page can be rewritten as `ipgetheadinfo.go`:


    ```

    ch3$ vi ipgetheadinfo.go

    /* IPGetHeadInfo

    */

    package main

    import (

    "bytes"

    "fmt"

    "io"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s host:port", os.Args[0])

    }

    service := os.Args[1]

    conn, err := net.Dial("tcp", service)

    checkError(err)

    _, err = conn.Write([]byte("HEAD / HTTP/1.0\r\n\r\n"))

    checkError(err)

    result, err := readFully(conn)

    checkError(err)

    fmt.Println(string(result))

    }

    func readFully(conn net.Conn) ([]byte, error) {

    defer conn.Close()

    result := bytes.NewBuffer(nil)

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    result.Write(buf[0:n])

    if err != nil {

    if err == io.EOF {

    break

    }

    return nil, err

    }

    }

    return result.Bytes(), nil

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    This can be run on my own machine as follows:


    ```

    ch3$ go run ipgetheadinfo.go yahoo.com:80 # can''t use go.dev as its on 443 w/TLS

    ```


    It prints the following about the server running on port 80:


    ```

    HTTP/1.0 200 OK

    Date: Tue, 04 Jan 2022 00:02:13 GMT

    Server: ATS

    Cache-Control: no-store, no-cache, max-age=0, private

    Content-Type: text/html

    Content-Language: en

    Expires: -1

    X-Frame-Options: SAMEORIGIN

    Content-Length: 12

    ```


    Writing a server can be similarly simplified using this function:


    ```

    func Listen(network, address string) (Listener, error)

    ```


    This returns an object implementing the `Listener` interface. This interface has
    a method `Accept`:


    ```

    type Listener interface {

    // Accept waits for and returns the next connection to the listener.

    Accept() (Conn, error)

    // Close closes the listener.

    // Any blocked Accept operations will be unblocked and return errors.

    Close() error

    // Addr returns the listener''s network address.

    Addr() Addr

    }

    ```


    This will allow a server to be built. Using this, the multithreaded `Echo` server
    given earlier becomes `threadedipechoserver.go`:


    ```

    ch3$ vi threadedipechoserver.go

    /* ThreadedIPEchoServer

    */

    package main

    import (

    "log"

    "net"

    )

    func main() {

    service := ":1200"

    listener, err := net.Listen("tcp", service)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    defer conn.Close()

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    checkError(err)

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    If you want to write a UDP server, there is an interface called `PacketConn` and
    a method to return an implementation of this:


    ```

    func ListenPacket(network, address string) (PacketConn, error)

    ```


    This interface has the primary methods `ReadFrom` and `WriteTo` that handle packet
    reads and writes.


    The Go `net` package recommends using these interface types rather than the concrete
    ones. But by using them, you lose specific methods such as `SetKeepAlive` of `TCPConn`
    and `SetReadBuffer` of `UDPConn`, unless you do a type cast. It is your choice.'
  raw: '## UDP Datagrams


    In a connectionless protocol, each message contains information about its origin
    and destination. There is no “session” established using a long-lived socket.
    UDP clients and servers make use of datagrams, which are individual messages containing
    source and destination information. There is no state maintained by these messages,
    unless the client or server does so. The messages are not guaranteed to arrive
    or may arrive out of order.


    The most common situation for a client is to send a message and hope that a reply
    arrives. The most common situation for a server is to receive a message and then
    send one or more replies back to that client. In a peer-to-peer situation, though,
    the server may just forward messages to other peers.


    The major difference between TCP and UDP handling for Go is how to deal with packets
    arriving from multiple clients, without the cushion of a TCP session to manage
    things. The major calls needed are as follows:


    ```

    func ResolveUDPAddr(network, address string) (*UDPAddr, error)

    func DialUDP(network string, laddr, raddr *UDPAddr) (*UDPConn, error)

    func ListenUDP(network string, laddr *UDPAddr) (*UDPConn, error)

    func (c *UDPConn) ReadFromUDP(b []byte) (n int, addr *UDPAddr, err error

    func (c *UDPConn) WriteToUDP(b []byte, addr *UDPAddr) (int, error)

    ```


