    ### Textproto Package


    The `textproto` package contains functions designed to simplify the management
    of text protocols similar to HTTP and SNMP.


    These formats have some little-known rules with regard to a single logical line
    continued over multiple lines such as the following: “HTTP/1.1 header field values
    can be folded onto multiple lines if the continuation line begins with a space
    or horizontal tab” (HTTP1.1 specification). Formats allowing lines like these
    can be read using the textproto.Reader.`ReadContinuedLine()` function, in addition
    to simpler functions like textproto.Reader.`ReadLine()`.


    These protocols also signal status values with lines beginning with three-digit
    codes such as HTTP’s `404`. These can be read using textproto.Reader.`ReadCodeLine()`.
    They also have key: value lines such as `Content-Type: image/gif`. Such lines
    can be read into a map by textproto.Reader.`ReadMIMEHeader()`.


    Here is an example where we leverage an external tool called netcat (i.e., nc).
    This tool is often used when scripting TCP, UDP, or Unix-domain sockets. In this
    example, we create a client that sends an HTTP request message. Listening for
    the request will be netcat. Once the client executes, you will type the result
    into the netcat terminal (simulating a response). In the client, we only expect
    a response starting with a 404, else we will error out. Create the following client,
    textprotoclient.go.


    ```

    ch5$ vi textprotoclient.go

    /* textproto

    */

    package main

    import (

    "fmt"

    "log"

    "net/textproto"

    )

    func main() {

    conn, e := textproto.Dial("unix", "/tmp/fakewebserver")

    checkerror(e)

    defer conn.Close()

    fmt.Println("Sending request to retrieve /mypage")

    id, e := conn.Cmd("GET /mypage")

    checkerror(e)

    conn.StartResponse(id)

    defer conn.EndResponse(id)

    // fake sending back a 200 via nc or your own server

    code, stringResult, err := conn.ReadCodeLine(200)

    checkerror(err)

    fmt.Println(code, "\n", stringResult, "\n", err)

    }

    func checkerror(err error) {

    if err != nil {

    log.Fatalln("error: ", err)

    }

    }

    ```


