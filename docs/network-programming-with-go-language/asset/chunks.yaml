    hypertext-driven” at [`http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven`:](http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven)


    *   A REST API should be entered with no prior knowledge beyond the initial URI
    (bookmark) and set of standardized media types that are appropriate for the intended
    audience (i.e., expected to be understood by any client that might use the API).
    From that point on, all application state transitions must be driven by client
    selection of server-provided choices that are present in the received representations
    or implied by the user’s manipulation of those representations.


    IANA maintains a registry of relation types (IANA: Link Relations at [`http://www.iana.org/assignments/link-relations/link-relations.xhtml`](http://www.iana.org/assignments/link-relations/link-relations.xhtml))
    that can be used. The Web Linking RFC 5988 describes the web linking registry
    ([`https://datatracker.ietf.org/doc/html/rfc5988`](https://datatracker.ietf.org/doc/html/rfc5988)).
    The HTML5 specification has a small number of defined relations and points to
    Microformats `rel` values at [`http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions`](http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions)
    for a larger list. These documents, while helpful, are not immediately actionable.
    We will look at an example in a moment.


    Mechanisms such as cookies, or external API specifications such as WSDL for SOAP,
    are effectively excluded by REST. They are not hyperlinks contained in the representation
    of a resource. HATEOAS will decouple the client from the server by allowing dynamic
    discovery beyond a well-known URI; allowing us to independently evolve the API.
    This is unlike RPCs where the IDL drives the interface.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将遵循您的指示，将给定的英文文本翻译成中文，并严格按照注意事项保留所有格式和符号。



    ### POST 动词


    `POST` 是一个包揽其他动词未涵盖情况的万能用语。关于 `POST` 的两种用途存在共识：


    -   如果你想创建一个新资源但不知道它的 URI，那么可以将该资源的一种表示形式 `POST` 到一个知道如何创建该资源的 URI。返回的表示形式应包含新资源的
    URI。*这一点很重要*。要与新资源交互，你必须知道它的 URI，而 `POST` 的返回结果会告诉你这一点。

    -   如果一个资源有很多属性，而你只想更改其中一两个，那么可以 `POST` 一个仅包含更改后值的表示形式。


    关于 `PUT` 和 `POST` 在边缘情况下的各自角色，存在激烈的争论。如果你想创建一个新资源，并且*确实*知道它将拥有的 URI，那么你可以使用 `PUT`
    或 `POST`。选择哪一个似乎取决于其他因素。


    SOAP 被设计为基于 HTTP 的 RPC 系统。它对*一切*都使用 `POST`。HTML 在表单中继续使用 `POST`，而本应有使用 `PUT` 的选项。出于这些原因，除非万不得已，否则我不会使用
    `POST`。我想其他人有他们自己原则性的理由来使用 `POST` 而不是 `PUT`，但我完全不知道这些理由是什么 :-)。


    由于其开放式的范围，`POST` 几乎可以用于任何事情。许多用途可能违反了 REST 模型，正如 SOAP 所充分证明的那样。但其中一些用途可能是合法的。`POST`
    通常不是幂等的且不安全，尽管特定情况可能并非如此。以下 Stack Overflow 帖子中包含了关于 `PUT` vs. `PATCH` vs. `POST`
    的深入讨论：[`https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios`](https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios)。


    ### 不维护状态（即无状态）


    让我们先明确一点：Cookie 被排除在外。Cookie 通常用于跟踪用户与服务器交互过程中的状态，典型的例子是购物车。在服务器端创建一个结构，并返回一个
    cookie，用于标识这是要使用的购物车。


    REST 决定不在服务器上维护任何客户端状态。这简化了交互，也回避了在客户端或服务器崩溃后如何恢复一致性的棘手问题。如果服务器不需要维护任何状态，那么将产生更健壮的服务器模型。通常，与安全相关的项目会设置在
    cookie 中。REST 端点应返回这些资源的表示形式。与身份验证相关的 cookie 通常超越这些资源，因此不符合 REST 原则。有关此主题的更多信息，请参见：[`https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2`](https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2)。


    如果你不能使用 cookie，那该怎么办？其实很简单：在服务器上创建一个购物车。在 REST 下，这只能通过响应 `POST` 请求发生，该请求会为新资源返回一个新的
    URI。所以你就使用这个新的 URI。你可以对这个 URI 执行 `GET`、`PUT`、`POST` 和 `DELETE` 操作，直接在资源上完成所有你想做的事情，而无需使用
    cookie 进行变通。


    ### HATEOAS


    HATEOAS 代表“超媒体作为应用状态的引擎”。它被公认为是一个糟糕的首字母缩写词，但已被沿用下来。其基本原则是，从一个 URI 导航到另一个以某种方式关联的
    URI，不应通过任何带外机制来完成，而必须将新链接以某种超链接形式嵌入到第一个 URI 的表示形式中。这是 REST 的一个关键特性，但常常被忽略。


    REST 并未规定链接的格式。它们可以使用 HTML 链接标签、嵌入在 PDF 文档中的 URL 或 XML 文档中给出的链接来提供。没有 URL 简单表示形式的格式不被视为超媒体语言，也不包含在
    REST 中。


    此外，REST 也没有明确说明链接的含义以及如何提取适当的链接。Fielding 在他的博客“REST APIs must be hypertext-driven”中写道，该博客位于
    [`http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven`](http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven)：


    -   进入一个 REST API 时，除了初始 URI（书签）和一套适用于目标受众（即期望任何可能使用该 API 的客户端都能理解）的标准化媒体类型外，不应有任何先验知识。从那时起，所有的应用状态转换都必须由客户端选择服务器提供的选项来驱动，这些选项存在于接收到的表示形式中，或隐含在用户对这些表示形式的操作中。


    IANA 维护了一个可用的关系类型注册表（IANA：链接关系，位于 [`http://www.iana.org/assignments/link-relations/link-relations.xhtml`](http://www.iana.org/assignments/link-relations/link-relations.xhtml)）。Web
    链接 RFC 5988 描述了 web 链接注册表（[`https://datatracker.ietf.org/doc/html/rfc5988`](https://datatracker.ietf.org/doc/html/rfc5988)）。HTML5
    规范定义了一小部分关系，并指向 Microformats 的 `rel` 值（[`http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions`](http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions)）以获取更大的列表。这些文档虽然有用，但不能直接付诸实施。我们稍后将看一个示例。


    像 cookie 这样的机制，或者像用于 SOAP 的 WSDL 这样的外部 API 规范，都被 REST 有效地排除了。它们不是资源表示形式中包含的超链接。HATEOAS
    通过允许在已知 URI 之外进行动态发现，将客户端与服务器解耦；使我们能够独立地演进 API。这与 RPC 不同，在 RPC 中，IDL 驱动着接口。

