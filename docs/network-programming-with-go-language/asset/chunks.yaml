    `–` [`http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object`](http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object)).
    This is easier because the first element has index zero and many programming languages,
    including the Go template language, treat zero as a Boolean `false`.


    One form of the conditional statement is `{{if pipeline}} T1 {{else}} T0 {{end}}`.
    We need the `pipeline` to be the index into the array of emails. Fortunately,
    a variation on the `range` statement gives us this. There are two forms that introduce
    variables:


    ```

    {{range $elmt := array}}

    {{range $index, $elmt := array}}

    ```


    So we set up a loop through the array, and if the index is `false` (0), we just
    print the element. Otherwise, we print it preceded by a `,`. The template is as
    follows:


    ```

    {"Name": "{{.Name}}",

    "Emails": [

    {{range $index, $elmt := .Emails}}

    {{if $index}}

    , "{{$elmt}}"

    {{else}}

    "{{$elmt}}"

    {{end}}

    {{end}}

    ]

    }

    ```


    The full program is `printjsonemails.go`:


    ```

    ch9$ vi printjsonemails.go

    /**

    * PrintJSONEmails

    */

    package main

    import (

    "bytes"

    "encoding/json"

    "fmt"

    "log"

    "os"

    "text/template"

    )

    type Person struct {

    Name   string

    Emails []string

    }

    const templ = `{"Name": "{{- .Name -}}", "Emails": [

    {{- range $index, $elmt := .Emails -}}

    {{- if $index -}}

    , "{{- $elmt -}}"

    {{- else -}}

    "{{- $elmt -}}"

    {{- end -}}

    {{- end -}}

    ] }`

    func main() {

    person := Person{

    Name: "jan",

    Emails: []string{"jan@newmarch.name",

    "jan.newmarch@gmail.com"},

    }

    t := template.New("Person template")

    t, err := t.Parse(templ)

    checkError(err)

    err = t.Execute(os.Stdout, person)

    checkError(err)

    // check via validity json package

    var b bytes.Buffer

    err = t.Execute(&b, person)

    checkError(err)

    if json.Valid(b.Bytes()) {

    fmt.Println("\nvalid json")

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


    This gives the correct JSON output, it also runs json.Valid() checker function
    to validate for proper JSON.


    ```

    ch9$

    go run printjsonemails.go

    {"Name": "jan", "Emails": ["jan@newmarch.name", "jan.newmarch@gmail.com"] }

    valid json

    ```


    Before leaving this section, note that the problem of formatting a list with comma
    separators can be approached by defining suitable functions in Go that are made
    available as template functions. To reuse a well-known saying from another programming
    language, “There’s more than one way to do it!” The following program was sent
    to me by Roger Peppe as `sequence.go`:


    ```

    ch9$ vi sequence.go

    /* Sequence.go

    * Copyright Roger Peppe

    */

    package main

    import (

    "errors"

    "fmt"

    "os"

    "text/template"

    )

    var tmpl = `{{$comma := sequence "" ", "}}

    {{range $}}{{$comma.Next}}{{.}}{{end}}

    {{$comma := sequence "" ", "}}

    {{$colour := cycle "black" "white" "red"}}

    {{range $}}{{$comma.Next}}{{.}} in {{$colour.Next}}{{end}}

    `

    var fmap = template.FuncMap{

    "sequence": sequenceFunc,

    "cycle":    cycleFunc,

    }

    func main() {

    t, err := template.New("").Funcs(fmap).Parse(tmpl)

    if err != nil {

    fmt.Printf("parse error: %vn", err)

    return

    }

    err = t.Execute(os.Stdout, []string{"a", "b", "c",

    "d", "e", "f"})

    if err != nil {

    fmt.Printf("exec error: %vn", err)

    }

    }

    type generator struct {

    ss []string

    i  int

    f  func(s []string, i int) string

    }

    func (seq *generator) Next() string {

    s := seq.f(seq.ss, seq.i)

    seq.i++

    return s

    }

    func sequenceGen(ss []string, i int) string {

    if i >= len(ss) {

    return ss[len(ss)-1]

    }

    return ss[i]

    }

    func cycleGen(ss []string, i int) string {

    return ss[i%len(ss)]

    }

    func sequenceFunc(ss ...string) (*generator, error) {

    if len(ss) == 0 {

    return nil, errors.New("sequence must have at least one element")

    }

    return &generator{ss, 0, sequenceGen}, nil

    }

    func cycleFunc(ss ...string) (*generator, error) {

    if len(ss) == 0 {

    return nil, errors.New("cycle must have at least one element")

    }

    return &generator{ss, 0, cycleGen}, nil

    }

    ```


    Here is the output:


    ```

    ch9$ go run sequence.go

    a, b, c, d, e, f

    a in black, b in white, c in red, d in black, e in white, f in red

    ```


    ## The html/template Package


    The preceding programs all dealt with the `text/template` package. This applies
    transformations without regard to any context in which the text might be used.
    For example, if the text in `PrintPerson.go` changes to


    ```

    job1 := Job{Employer: "alert(''Could be nasty!'')", Role: "Director, Commerce
    and ICT"}

    ```


    the program will generate this text:


    ```

    An employer is alert(''Could be nasty!'')

    ```


    This will cause an unexpected effect if downloaded to a browser.


    The use of the `html` command in a pipeline can reduce this, as in `{{. | html}}`,
    and will produce the following:


    ```

    An employer is &lt;script&gt;alert(''Could be nasty!'')&lt;/script&gt

    ```


    Applying this filter to all expressions will become tedious. In addition, it may
    not catch potentially dangerous JavaScript, CSS, or URI expressions.


    The `html/template` package is designed to overcome these issues. By the simple
    step of replacing `text/template` with `html/template`, the appropriate transformations
    will be applied to the resultant text, sanitizing it so that it is suitable for
    web contexts.


    When using “go doc” for either template package, be sure to note which one you
    are looking at. “go doc template” is actually “go doc html/template” and “go doc
    text/template” for the non-HTML package.


    ## Conclusion


    The Go template package is useful for certain kinds of text transformations involving
    inserting values of objects. It does not have the power of regular expressions,
    for example, but it is faster and, in many cases, will be easier to use than regular
    expressions.'
