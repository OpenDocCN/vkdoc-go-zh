- fmt: "# Points of Failure\n\nDistributed applications run in a complex environment.\
    \ This makes them much more prone to failure than stand-alone applications on\
    \ a single computer. The points of failure include the following:\n\n- Client-side\
    \ errors\n  - The client side of the application could crash (out of memory, divide\
    \ by zero).\n  - The client system may have hardware problems (trip on powercord).\n\
    \  - The client’s network card could fail.\n\n- Network errors\n  - Network contention\
    \ could cause timeouts (server is slow to respond, including routers).\n  - There\
    \ may be network address conflicts (routing to wrong host if one even is found).\n\
    \  - Network elements such as routers could fail.\n  - Transmission errors may\
    \ lose messages.\n  - Misconfigured DNS.\n\n- Client-server errors\n  - The client\
    \ and server versions may be incompatible (API changes – HTTP path, default port\
    \ configuration, etc.).\n\n- Server errors\n  - The server system may have hardware\
    \ problems (including network card).\n  - The server software may crash (out of\
    \ memory, divide by zero).\n  - The server’s database may become corrupted (deduplication\
    \ process fails midway).\n\nApplications have to be designed with these possible\
    \ failures in mind. Any action performed by one component must be recoverable\
    \ if failure occurs in some other part of the system. Techniques such as transactions\
    \ and continuous error checking need to be employed to avoid errors. It should\
    \ be noted that while a stand-alone application may have a lot of control over\
    \ the errors that can occur, that is not the case with distributed systems. For\
    \ example, the server has no control over network or client errors and can only\
    \ be prepared to handle them. In many cases, the cause of an error may not be\
    \ available: Did the client crash or did the network go down? Very often, the\
    \ most complicated development work around has a stable and predictable distributed\
    \ system.\n\n# Acceptance Factors\n\nThe acceptance factors of a distributed system\
    \ are similar to those of a stand-alone system. They include the following:\n\n\
    - Reliability (it doesn’t crash or corrupt)\n- Performance (how fast an action\
    \ is performed internally)\n- Responsiveness (how fast an action seems to you)\n\
    - Scalability (Can we increase capacity with more instances?)\n- Capacity (how\
    \ much can we keep asking of the software)\n- Security (operations are authenticated)\n\
    \nCurrently, users often tolerate worse behavior than from a stand-alone system.\
    \ “Oh, the network is slow” seems to be an acceptable excuse. Well, it isn’t really,\
    \ and developers should not get into the mindset of assuming that factors under\
    \ their control can have ignorable effects.\n\nAnother point of comparison, distributed\
    \ systems are often designed to scale in a more intelligent way vs. simply running\
    \ a stand-alone program more than once and figuring out how to split the input\
    \ across them.\n\n# Thoughts on Distributed Computing\n\nWhat follows are considerations\
    \ when constructing distributed systems, whether its software, hardware, or both.\n\
    \n## Transparency\n\nThe notion of transparency means the details are hidden from\
    \ us. Implementing solutions to these concepts is not trivial, still a reasonable\
    \ design goal. The “holy grails” of distributed systems are to provide the following:\n\
    \n- Access transparency\n- Location transparency\n- Migration transparency\n-\
    \ Replication transparency\n- Concurrency transparency\n- Scalability transparency\n\
    - Performance transparency\n- Failure transparency\n\n### Access Transparency\n\
    \nThe user should not know (or need to know) if access to all or parts of the\
    \ system is local or remote.\n\n### Location Transparency\n\nThe location of a\
    \ service should not matter.\n\n### Migration Transparency\n\nIf part of the system\
    \ moves to another location, it should make no difference to a user.\n\n### Replication\
    \ Transparency\n\nIt should not matter if one or multiple copies of the system\
    \ are running.\n\n### Concurrency Transparency\n\nThere should be no interference\
    \ between parts of the system running concurrently. For example, if I am accessing\
    \ the database, then you should not know about it.\n\n### Scalability Transparency\n\
    \nIt shouldn’t matter if one or a million users are on the system.\n\n### Performance\
    \ Transparency\n\nPerformance should not be affected by any of the system or network\
    \ characteristics.\n\n### Failure Transparency\n\nThe system should not fail.\
    \ If parts of it fail, the system should recover without the user knowing the\
    \ failure occurred.\n\nMost of these transparency factors are observed more in\
    \ the breach than in the observance. There are notable cases where they are almost\
    \ met. For example, when you connect to Google, you don’t know (or care) where\
    \ the servers are. Systems using Amazon Web Services are able to scale up or down\
    \ in response to demand. Netflix has what almost seems cruel testing strategies,\
    \ regularly and deliberately breaking large sections of its system to ensure that\
    \ the whole still works.\n\n## Eight Fallacies of Distributed Computing\n\nSun\
    \ Microsystems was a company that performed much of the early work in distributed\
    \ systems and even had a mantra: “The network is the computer.” Based on their\
    \ experience over many years, a number of the scientists at Sun came up with the\
    \ following list of fallacies commonly assumed:\n\n1. The network is reliable.\n\
    2. Latency is zero.\n3. Bandwidth is infinite.\n4. The network is secure.\n5.\
    \ Topology doesn't change.\n6. There is one administrator.\n7. Transport cost\
    \ is zero.\n8. The network is homogeneous.\n\n### *Fallacy:* The Network Is Reliable\n\
    \nA paper by Bailis and Kingsbury entitled “The Network is Reliable” (see [`https://queue.acm.org/detail.cfm?id=2655736`](https://queue.acm.org/detail.cfm?id=2655736))\
    \ examines this fallacy. It finds many instances, such as Microsoft reporting\
    \ on their data centers giving 5.2 device failures per day and 40.8 link failures\
    \ per day.\n\nThe Chinese government uses “DNS poisoning” as one of its techniques\
    \ to censor what it considers to be undesirable websites. China also runs one\
    \ of the DNS root servers. In 2010, this server was misconfigured and poisoned\
    \ the DNS servers of many other countries. This made many non-Chinese websites\
    \ inaccessible outside of China as well as inside (see [`http://www.pcworld.com/article/192658/article.html`](http://www.pcworld.com/article/192658/article.html)).\n\
    \nThere are many other possible cases, such as DDoS (distributed denial of service)\
    \ attacks making websites unavailable. At Box Hill Institute, a contractor once\
    \ put a backhoe through the fiber cable connecting our DHCP server to the rest\
    \ of the network, and so we went home for the rest of the day.\n\nThe network\
    \ is *not* reliable. The implications are that any networked program must be prepared\
    \ to deal with failure. This led to the design choices of Java's `RMI` and most\
    \ later frameworks, with application design allowing for each network call possibly\
    \ failing."
