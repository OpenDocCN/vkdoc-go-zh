    is going on. This is normal for networking programs (and Golang): the opportunities
    for failure are substantially greater than for stand-alone programs. Hardware
    may fail on the client, the server, or on any of the routers and switches in the
    middle; communication may be blocked by a firewall; timeouts may occur due to
    network load; the server may crash while the client is talking to it. The following
    checks are performed:


    *   There may be syntax errors in the address specified. An example is an unspecified
    port.


    *   The attempt to connect to the remote service may fail. For example, the service
    requested might not be running, or there may be no such host connected to the
    network. An example is a typo in the hostname.


    *   Although a connection has been established, writes to the service might fail
    if the connection has died suddenly, or if the network times out.


    *   Similarly, the reads might fail as above.


    Reading from the server requires a comment. In this case, we read essentially
    a single response from the server. This will be terminated by end of file on the
    connection. However, it may consist of several TCP packets, so we need to keep
    reading until the end of file. The `io/ioutil` function `ReadAll` will look after
    these issues and return the complete response. (Thanks to Roger Peppe on the `golang-nuts`
    mailing list.)


    There are some language issues involved. First, most of the functions return a
    dual value, with the possible error as second value. If no error occurs, then
    this will be `nil`. In C, the same behavior is gained by special values such as
    `NULL`, or -1, or zero being returned `–` if that is possible. In Java, the same
    error checking is managed by throwing and catching exceptions, which can make
    the code look very messy.'
