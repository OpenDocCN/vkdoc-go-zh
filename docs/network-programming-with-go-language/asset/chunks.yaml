    ## TLS


    Encryption/decryption schemes are of limited use if you have to do all the heavy
    lifting yourself. The most popular mechanism on the Internet to give support for
    encrypted message passing is currently TLS (Transport Layer Security), which was
    formerly SSL (Secure Sockets Layer).


    In TLS, a client and a server negotiate identity using X.509 certificates. Once
    this is complete, a secret key is invented between them, and all encryption/decryption
    is done using this key. The negotiation is relatively slow, but once it’s complete,
    the faster secret key mechanism is used. The server is *required* to have a certificate;
    the client *may* have one if needed.


    ### A Basic Client


    We first illustrate connecting to a server that has a certificate signed by a
    “well-known” certificate authority (CA) such as RSA. The program to get HEAD information
    from a web server can be adapted to get HEAD information from a TLS web server.
    The program is tlsgethead`.go`. We are illustrating `TLS.Dial` here and will discuss
    HTTPS in a later chapter.


    ```

    ch7$ vi tlsgethead.go

    /* TLSGetHead

    */

    package main

    import (

    "crypto/tls"

    "fmt"

    "io/ioutil"

    "log"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: ", os.Args[0], "host:port")

    }

    service := os.Args[1]

    // Dial over secure channel

    conn, err := tls.Dial("tcp", service, nil)

    checkError(err)

    _, err = conn.Write([]byte("HEAD / HTTP/1.0\r\n\r\n"))

    checkError(err)

    result, err := ioutil.ReadAll(conn)

    checkError(err)

    fmt.Println(string(result))

    conn.Close()

    os.Exit(0)

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error ", err.Error())

    }

    }

    ```


