- fmt: '### Transport Encoding


    A character encoding will suffice for handling characters within a single application.
    However, once you start sending text *between* applications, then there is the
    further issue of how the bytes, shorts, or words are put on the wire. An encoding
    can be based on space- and hence bandwidth-saving techniques such as zipping the
    text. Or it could be reduced to a 7-bit format to allow a parity checking bit,
    such as `base64`.


    If we do know the character and transport encoding, then it is a matter of programming
    to manage characters and strings. If we don’t know the character or transport
    encoding, then it is a matter of guesswork as to what to do with any particular
    string. There is no convention for files to signal the character encoding.


    There *is,* however, a convention for signaling encoding in text transmitted across
    the Internet. It is simple: the header of a text message contains information
    about the encoding. For example, an HTTP header can contain lines such as the
    following:


    ```

    Content-Type: text/html; charset=ISO-8859-4

    Content-Encoding: gzip

    ```


    This says that the character set is `ISO 8859-4` (corresponding to certain countries
    in Europe) with the default encoding, but then `gzip`ed. The second part – the
    content encoding – is what we are referring to as “transfer encoding” (IETF RFC
    2130).


    But how do you read this information? Isn’t it encoded? Don’t we have a chicken
    and egg situation? Well, no. The convention is that such information is given
    in ASCII (to be precise, US ASCII) so that a program can read the headers and
    then adjust its encoding for the rest of the document.


    ## ASCII


    ASCII has the repertoire of the English characters plus digits, punctuation, and
    some control characters. The code points for ASCII are given by this familiar
    table:


    ```

    Oct   Dec   Hex   Char           Oct   Dec   Hex   Char


