    conn.Close()

    }

    }

    func writeShorts(conn net.Conn, shorts []uint16) {

    var bytes [2]byte

    // 将 BOM 作为前两个字节发送

    bytes[0] = BOM >> 8             // 从 BOM 中获取 ff

    bytes[1] = BOM & 255            // 从 BOM 中获取 fe

