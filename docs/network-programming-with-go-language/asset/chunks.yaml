    This request been sent with HTTP/2. The Go library has performed the version negotiation
    for you. Based on TLS handshake and other information, Go upgrades to HTTP/2.
    Again, these convenience functions and related client make it easy to start using
    HTTP with Go. If you want to keep with HTTP/1.1, you can try the following override:


    ```

    GODEBUG=http2client=0 go run get.go https://go.dev

    ```


    The related code is documented as follows:


    ```

    ch8$ go doc -u net/http onceSetNextProtoDefaults

    package http // import "net/http"

    func (srv *Server) onceSetNextProtoDefaults()

    onceSetNextProtoDefaults configures HTTP/2, if the user hasn''t configured

    otherwise. (by setting srv.TLSNextProto non-nil) It must only be called via

    srv.nextProtoOnce (use srv.setupHTTP2_*).

    func (t *Transport) onceSetNextProtoDefaults()

    onceSetNextProtoDefaults initializes TLSNextProto. It must be called via

    t.nextProtoOnce.Do.

    ```


    Later, we look at customizing the client behavior. There are important character
    set issues of the type discussed in the previous chapter. The server will deliver
    the content using some character set encoding and possibly some transfer encoding.
    Usually, this is a matter of negotiation between user agent and server, but the
    simple `GET` command that we used does not include the user agent component of
    the negotiation. So the server can send whatever character encoding it wants.


    At the time of first writing, I (Jan) was in China (and Google could be accessed).
    When I tried this program on `www.google.com`, Google’s server tried to be helpful
    by guessing my location and sending me the text in the Chinese character set Big5!
    How to tell the server what character encoding is okay for me is discussed later.'
