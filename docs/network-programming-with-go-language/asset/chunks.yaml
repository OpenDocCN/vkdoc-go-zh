- fmt: '# State Information


    Applications often use state information to simplify what is going on. For example:


    - Keeping file pointers to a current file location

    - Keeping the current mouse position

    - Keeping the current customer value


    In a distributed system, such state information may be kept in the client, in
    the server, or in both.


    The important point is to whether one process is keeping state information about
    *itself* or about the *other* process. One process may keep as much state information
    about itself as it wants, without causing any problems. If it needs to keep information
    about the state of the other process, then problems arise. The process’ actual
    knowledge of the state of the other may become incorrect. This can be caused by
    loss of messages (in `UDP`), by failure to update, or by software errors.


    An example is reading a file. In single process applications, the file-handling
    code runs as part of the application. It maintains a table of open files and the
    location in each of them. Each time a read or write is done, this file location
    is updated. In distributed systems, this simple model does not hold. See Figure
    [5-4](#436770_2_En_5_Chapter.xhtml#Fig4).


    ![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig4_HTML.png)


    Figure 5-4


    The `DCE` file system


    In the `DCE` file system shown in Figure [5-4](#436770_2_En_5_Chapter.xhtml#Fig4),
    the file server keeps track of a client’s open files and where the client’s file
    pointer is. If a message could get lost (but `DCE` uses `TCP`), these could get
    out of sync. If the client crashes, the server must eventually time out on the
    client’s file tables and remove them.


    ![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig5_HTML.png)


    Figure 5-5


    The `NFS` file system


    In `NFS`, the server does not maintain this state. The client does. Each file
    access from the client that reaches the server must open the file at the appropriate
    point, as given by the client, in order to perform the action. See Figure [5-5](#436770_2_En_5_Chapter.xhtml#Fig5).


    If the server maintains information about the client, it must be able to recover
    if the client crashes. If information is not saved, then on each transaction,
    the client must transfer sufficient information for the server to function.


    If the connection is unreliable, additional handling must be in place to ensure
    that the two do not get out of sync. The classic example is of bank account transactions
    where the messages get lost. A transaction server may need to be part of the client-server
    system.


    ## Application State Transition Diagram


    A state transition diagram keeps track of the current state of an application
    and the changes that move it to new states.


    The previous example basically only had one state: file transfer. If we add a
    login mechanism, that would add an extra state called *login*, and the application
    would need to change states between `login` and file transfer, as shown in Figure
    [5-6](#436770_2_En_5_Chapter.xhtml#Fig6).


    ![](images/436770_2_En_5_Chapter/436770_2_En_5_Fig6_HTML.png)


    Figure 5-6


    The state-transition diagram


    This state change can also be expressed as a table:


    | Current State | Transition | Next State |

    | --- | --- | --- |

    | `login` | `login failed` | `login` |

    | | `login succeeded` | `file transfer` |

    | `file transfer` | `dir` | `file transfer` |

    | | `get` | `file transfer` |

    | | `logout` | `login` |

    | | `quit` | `-` |


    ## Client-State Transition Diagrams


    The client state diagram must follow the application diagram. It has more detail
    though: it *writes* and then *reads*.


    | Current State | Write | Read | Next State |

    | --- | --- | --- | --- |

    | `login` | `LOGIN name password` | `FAILED` | `Login` |

    | | | `OK` | `file transfer` |

    | `file transfer` | `CD dir` | `OK` | `file transfer` |

    | | | `FAILED` | `file transfer` |

    | | `GET filename` | `#lines + contents` | `file transfer` |

    | | | `FAILED` | `file transfer` |

    | | `DIR` | `File names + blank line` | `file transfer` |

    | | | `blank line (Error)` | `file transfer` |

    | `quit` | `none` | | `Quit` |


    ## Server-State Transition Diagrams


    The server state diagram must also follow the application diagram. It also has
    more detail: it *reads* and then *writes*.


    | Current State | Read | Write | Next State |

    | --- | --- | --- | --- |

    | `login` | `LOGIN name password` | `FAILED` | `Login` |

    | | | `OK` | `file transfer` |

    | `file transfer` | `CD dir` | `SUCCEEDED` | `file transfer` |

    | | | `FAILED` | `file transfer` |

    | | `GET filename` | `#lines + contents` | `file transfer` |

    | | | `FAILED` | `file transfer` |

    | | `DIR` | `filenames + blank line` | `file transfer` |

    | | | `blank line (failed)` | `file transfer` |

    | `quit` | `none` | `Login` |


    ## Server Pseudocode


    Here is the server pseudocode:


    ```

    state = login

    while true

    read line

    switch (state)

    case login:

    get NAME from line

    get PASSWORD from line

    if NAME and PASSWORD verified

    write SUCCEEDED

    state = file_transfer

    else

    write FAILED

    state = login

    case file_transfer:

    if line.startsWith CD

    get DIR from line

    if chdir DIR okay

    write SUCCEEDED

    state = file_transfer

    else

    write FAILED

    state = file_transfer

    ...

    ```


    We don’t give the actual code for this server or client since it is pretty straightforward.


    ## Conclusion


    Building any application requires design decisions before you start writing code.
    With distributed applications, you have a wider range of decisions to make compared
    to stand-alone systems. This chapter considered some of those aspects and demonstrated
    what the resultant code might look like. We only touched on the elements of protocol
    design. There are many formal and informal models. The `IETF` (Internet Engineering
    Task Force) created a standard format for its protocol specifications in its `RFCs`
    (Requests for Comments), and sooner or later, every network engineer will need
    to work with `RFCs`.


