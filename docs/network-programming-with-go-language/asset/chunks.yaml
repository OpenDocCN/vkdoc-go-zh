    directory and the file mytype.go.


    ```

    ch4$ mkdir badtype

    ch4$ vi ./badtype/mytype.go

    /* ./badtype/mytype.go

    */

    package p

    type T struct {

    f int

    F int

    }

    ch4$ cd badtype

    badtype$ go mod init badtype

    badtype$ cd ..

    ```


