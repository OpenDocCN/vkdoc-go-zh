  trans: "\n# 原始套接字与 `IPConn` 类型\n\n本节涵盖大多数程序员不太需要的高级内容。它涉及*原始套接字*，允许程序员构建自己的 IP 协议或使用\
    \ TCP 或 UDP 之外的协议。\n\nTCP 和 UDP 并非仅有的构建于 IP 层之上的协议。网站 ([`http://www.iana.org/assignments/protocol-numbers`](http://www.iana.org/assignments/protocol-numbers))\
    \ 列出了其中大约 140 种协议（此列表在 UNIX 系统中通常位于文件 `/etc/protocols` 中）。在该列表中，TCP 和 UDP 分别只占据第\
    \ 6 和第 17 号。\n\nGo 允许你构建所谓的原始套接字，以便能够使用其他协议之一进行通信，甚至构建你自己的协议。但它提供的支持非常有限：它会连接主机，并在主机之间写入和读取数据包。在后面的章节中，我们将探讨如何在\
    \ TCP 之上设计和实现自己的协议；本节考虑的是同类问题，但位于 IP 层。\n\n为了简化问题，我们使用几乎最简单的示例：如何向主机发送 IPv4 ping\
    \ 消息。Ping 使用 ICMP 协议中的 `echo` 命令。这是一个面向字节的协议，客户端向另一台主机发送字节流，然后主机进行回复。ICMP 数据包有效载荷的格式如下：\n\
    \n-   第一个字节为 8，表示回显消息。\n-   第二个字节为零。\n-   第三和第四个字节是整个消息的校验和。\n-   第五和第六个字节是任意标识符。\n\
    -   第七和第八个字节是任意序列号。\n-   数据包的其余部分是用户数据。\n\n该数据包可以使用 `Conn.Write` 方法发送，该方法会准备包含此有效载荷的数据包。接收到的回复包含\
    \ 20 字节的 IPv4 头部。（例如，请参见关于互联网控制消息协议 ICMP 的维基百科文章。）\n\n以下名为 `ping.go` 的程序将准备一个\
    \ IP 连接，向主机发送 ping 请求，并获取回复。运行它可能需要 root 权限：\n\n```\nch3$ vi ping.go\n/* Ping\n\
    */\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net\"\n\"os\"\n)\n// 将其更改为你自己的\
    \ IP 地址，或保留为 0.0.0.0\nconst myIPAddress = \"0.0.0.0\"\nconst ipv4HeaderSize =\
    \ 20\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"host\")\n}\nlocalAddr, err := net.ResolveIPAddr(\"ip4\", myIPAddress)\ncheckError(err)\n\
    remoteAddr, err := net.ResolveIPAddr(\"ip4\", os.Args[1])\ncheckError(err)\nconn,\
    \ err := net.DialIP(\"ip4:icmp\", localAddr, remoteAddr)\ncheckError(err)\nvar\
    \ msg [512]byte\nmsg[0] = 8  // echo\nmsg[1] = 0  // code 0\nmsg[2] = 0  // checksum,\
    \ fix later\nmsg[3] = 0  // checksum, fix later\nmsg[4] = 0  // identifier[0]\n\
    msg[5] = 13 // identifier[1] (arbitrary)\nmsg[6] = 0  // sequence[0]\nmsg[7] =\
    \ 37 // sequence[1] (arbitrary)\nlen := 8\n// now fix checksum bytes\ncheck :=\
    \ checkSum(msg[0:len])\nmsg[2] = byte(check >> 8)\nmsg[3] = byte(check & 255)\n\
    // send the message\n_, err = conn.Write(msg[0:len])\ncheckError(err)\nfmt.Print(\"\
    Message sent:    \")\nfor n := 0; n > 16) + (sum & 0xffff)\nsum += (sum >> 16)\n\
    var answer uint16 = uint16(^sum)\nreturn answer\n}\nfunc checkError(err error)\
    \ {\nif err != nil {\nlog.Fatalln(\"Fatal error: %s\", err.Error())\n}\n}\n```\n\
    \n运行时将目标地址作为参数。接收到的消息与发送的消息相比，应该仅在第一个类型字节以及第三和第四个校验和字节上有所不同，如下所示：\n\n```\nch3$\
    \ sudo env \"PATH=$PATH\" go run ping.go google.com\nMessage sent:     8 0 247\
    \ 205 0 13 0 37\nMessage received: 0 0 255 205 0 13 0 37\n```\n\n注意我们使用了“sudo”（在\
    \ Linux 上），因为如 `DialIP` 中所设置，使用 ICMP 需要 root 权限。\n\n## 结论\n\n本章探讨了在 IP、TCP 和 UDP\
    \ 层面进行编程。如果你想要实现自己的协议，或为现有协议构建客户端或服务器，这通常是必需的。\n\n# 4. 数据序列化\n\n客户端和服务器需要通过消息交换信息。TCP\
    \ 和 UDP 提供了实现此目的的传输机制。这两个进程还需要有一套协议，以便消息交换能够有意义地进行。\n\n消息以字节序列的形式通过网络发送，除了是一个线性的字节流外，它没有结构。我们将在下一章探讨消息的各种可能性以及定义它们的协议。在本章中，我们将专注于消息的一个组成部分——被传输的数据。\n\
    \n程序通常会构建复杂的数据结构来保存当前的程序状态。在与远程客户端或服务通信时，程序会尝试将这些数据传输到网络——也就是说，传输到应用程序自身的地址空间之外。\n\
    \n## 结构化数据\n\n编程语言使用如下结构化数据：\n\n- 记录/结构：一个字段集合，字段可能具有不同数据类型，且类型固定，也称为组合。\n- 变体记录：一个包含可能不同类型值的记录。\n\
    - 数组：固定大小或可变，也称为聚合。\n- 字符串：固定长度或可变长度。\n- 表：记录数组；在数据存储术语中，一条记录就是一行。\n- 非线性结构，例如：\n\
    \  - 循环链表\n  - 二叉树\n  - 引用其他对象的对象\n\n就我们的目的而言，组合是一种嵌套元素不能脱离父元素而存在的数据结构。在聚合中，存储/嵌套的元素可能独立存在。\n\
    \nIP、TCP 或 UDP 数据包都不理解这些数据类型的含义。它们（数据包）所能包含的只是一个字节序列。因此，应用程序必须将任何数据*序列化*成字节流才能写入，并在读取时*反序列化*字节流，使其恢复为适当的数据结构。这两个操作分别称为*编组*和*解组*。(³)\n\
    \n例如，考虑发送以下包含两列可变长度字符串的可变长度表：\n\n| fred | programmer |\n| liping | analyst |\n\
    | sureerat | manager |\n\n这可以通过多种方式实现。例如，假设已知数据是一个两列表中的未知行数。那么一种编组形式可能是\n\n```\n\
    3                // 3 行，2 列（由上方表格假定）\n4 fred           // 4 字符字符串，列 1\n10 programmer\
    \    // 10 字符字符串，列 2\n6 liping         // 6 字符字符串，列 1\n7 analyst        // 7 字符字符串，列\
    \ 2\n8 sureerat       // 8 字符字符串，列 1\n7 manager        // 7 字符字符串，列 2\n```\n\n\
    可变长度的事物也可以通过用“非法”值（例如字符串的 `\\0`）终止来指示其长度。上表也可以写成行数，但每个字符串以 `\\0` 结束（换行符是为了可读性，不是序列化的一部分）：\n\
    \n```\nfred\\0\nprogrammer\\0\nliping\\0\nanalyst\\0\nsureerat\\0\nmanager\\0\n\
    ```\n\n或者，可能已知数据是一个三行固定表，包含两列，字符串长度分别为 8 和 10。那么该表的序列化可能是（同样，换行符不是序列化的一部分）\n\n\
    ```\nfred\\0\\0\\0\\0\nprogrammer\nliping\\0\\0\nanalyst\\0\\0\\0\nsureerat\n\
    manager\\0\\0\\0\n```\n\n*以上任何格式（以及其他格式）都是可以的，但消息交换协议必须指定使用哪一种格式，或者允许在运行时确定。*\n"
- fmt: '### Mutual Agreement


    The previous section gave an overview of the issue of data serialization. In practice,
    the details can be considerably more complex. For example, consider the first
    possibility, marshalling a table into the byte stream:


    ```

    4 fred

    10 programmer

    6 liping

    7 analyst

    8 sureerat

    7 manager

    ```


    Many questions arise. For example, how many rows are possible for the table `–`
    that is, how big an integer do we need to describe the row size? If it is 255
    or less, then a single byte will do, but if it is more, then a short, integer,
    or long may be needed. A similar problem occurs for the length of each string.
    With the characters themselves, to which character set do they belong? 7-bit ASCII?
    16-bit Unicode? The question of character sets is discussed at length in a later
    chapter.


    This serialization is *opaque* or *implicit*. If data is marshalled using this
    format, then there is nothing in the serialized data to say how it should be unmarshalled.
    The unmarshalling side has to know exactly how the data is serialized in order
    to unmarshal it correctly. For example, if the number of rows is marshalled as
    an 8-bit integer but unmarshalled as a 16-bit integer, then an incorrect result
    will occur as the receiver tries to unmarshal 3 and 4 as a 16-bit integer, and
    the receiving program will almost certainly fail later.


    An early well-known serialization method is `XDR` (external data representation)
    used by Sun’s `RPC`, later known as `ONC` (Open Network Computing). `XDR` is defined
    by `RFC 1832`, and it is instructive to see how precise this specification is.
    Even so, `XDR` is inherently type unsafe as serialized data contains no type information.
    The correctness of its use in `ONC` is ensured primarily by compilers generating
    code for both marshalling and unmarshalling.


    Go contains no explicit support for marshalling or unmarshalling opaque serialized
    data. The `RPC` package in Go does not use `XDR` but instead uses *Gob* serialization
    (also part of Go), described later in this chapter.


    ### Self-Describing Data


    Self-describing data carries type information along with the data. For example,
    the previous data might get encoded as follows:


    ```

    table

    uint8 3

    uint 2

    string

    uint8 4

    []byte fred

    string

    uint8 10

    []byte programmer

    string

    uint8 6

    []byte liping

    string

    uint8 7

    []byte analyst

    string

    uint8 8

    []byte sureerat

    string

    uint8 7

    []byte manager

    ```


    Of course, a real encoding would not normally be as cumbersome and verbose as
    in the example: Small integers would be used as type markers, and the whole data
    would be packed in as small a byte array as possible (XML provides a counterexample,
    though). However, the principle is that the marshaller will generate such type
    information in the serialized data. The unmarshaller will know the type-generation
    rules and will be able to use them to reconstruct the correct data structure.


    ### Encoding Packages


    As mentioned earlier, there is more than one way to encode/decode data. Go provides
    high level interfaces in the `encoding` package. Additionally, Go includes several
    specialized packages for well-known data formats including JSON and XML in subpackages.
    Take a moment to review the `encoding` package documentation; we will cross these
    and related interfaces throughout this chapter.


    ```

    $ mkdir ch4

    $ cd ch4

    ch4$ go doc -all encoding

    package encoding // import "encoding"

    Package encoding defines interfaces shared by other packages that convert

    data to and from byte-level and textual representations. Packages that check

    for these interfaces include encoding/gob, encoding/json, and encoding/xml.

    As a result, implementing an interface once can make a type useful in

    multiple encodings. Standard types that implement these interfaces include

    time.Time and net.IP. The interfaces come in pairs that produce and consume

    encoded data.

    TYPES

    type BinaryMarshaler interface {

    MarshalBinary() (data []byte, err error)

    }

    BinaryMarshaler is the interface implemented by an object that can marshal

    itself into a binary form.

    MarshalBinary encodes the receiver into a binary form and returns the

    result.

    type BinaryUnmarshaler interface {

    UnmarshalBinary(data []byte) error

    }

    BinaryUnmarshaler is the interface implemented by an object that can

    unmarshal a binary representation of itself.

    UnmarshalBinary must be able to decode the form generated by MarshalBinary.

    UnmarshalBinary must copy the data if it wishes to retain the data after

    returning.

    type TextMarshaler interface {

    MarshalText() (text []byte, err error)

    }

    TextMarshaler is the interface implemented by an object that can marshal

    itself into a textual form.

    MarshalText encodes the receiver into UTF-8-encoded text and returns the

    result.

    type TextUnmarshaler interface {

    UnmarshalText(text []byte) error

    }

    TextUnmarshaler is the interface implemented by an object that can unmarshal

    a textual representation of itself.

    UnmarshalText must be able to decode the form generated by MarshalText.

    UnmarshalText must copy the text if it wishes to retain the text after

    returning.

    ```


    As mentioned in the above documentation, we can confirm the usage of these interfaces
    by reviewing the mentioned samples.


    ```

    ch4$ go doc net.IP.MarshalText

    package net // import "net"

    func (ip IP) MarshalText() ([]byte, error)

    MarshalText implements the encoding.TextMarshaler interface. The encoding is

    the same as returned by String, with one exception: When len(ip) is zero, it

    returns an empty slice.

    ```


    You can do the same to read about the `UnmarshalText` implementation. Unlike `net.IP`,
    `time.Time` does use the binary marshaller interface. `go doc` provides an easy
    and powerful way to learn how Go’s network related interfaces are defined and
    consumed.


    You can list the available encoding packages as follows:


    ```

    ch4$ go list encoding/...

    encoding

    encoding/ascii85

    encoding/asn1

    encoding/base32

    encoding/base64

    encoding/binary

    encoding/csv

    encoding/gob

    encoding/hex

    encoding/json

    encoding/pem

    encoding/xml

    ```'
