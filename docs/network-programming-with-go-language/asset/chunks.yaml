    and recovery logic is the best practice when dealing with ports.


    ### The TCPAddr Type


    The `TCPAddr` type is a structure containing an IP, a port, and a zone. The zone
    is required to distinguish between possible ambiguous IPv6 link-local and site-local
    addresses, as different network interface cards (NICs) may have the same IPv6
    address.


    ```

    type TCPAddr struct {

    IP   IP

    Port int

    Zone string

    }

    ```


    The function to create a `TCPAddr` is `ResolveTCPAddr`:


    ```

    func ResolveTCPAddr(net, addr string) (*TCPAddr, error)

    ```


    where `net` is one of `tcp`, `tcp4`, or `tcp6` and the `addr` is a string composed
    of a hostname or IP address, followed by the port number after a `:`, such as
    [`www.google.com:80`](http://www.google.com) or `127.0.0.1:ssh`. If the address
    is an IPv6 address, which already has colons in it, then the host part must be
    enclosed in square brackets, such as `[::1]:23`. Another special case is often
    used for servers, where the host address is zero, so the TCP address is really
    just the port name, as in `:80` for an HTTP server.


    Similar to IPAddr, resolving to `TCPAddr` (or `UDPAddr –` will see later) allows
    us to verify and normalize our network end points.


    ## TCP Sockets


    When you know how to reach a service via its network and port IDs, what then?
    If you are a client, you need an API that will allow you to connect to a service
    and then to send messages to that service and read replies back from the service.


    If you are a server, you need to be able to bind to a port and listen at it. When
    a message comes in, you need to be able to read it and write back to the client.


    The `net.TCPConn` is the Go type that allows full duplex communication between
    the client and the server. Two major methods of interest are as follows:


    ```

    func (c *TCPConn) Write(b []byte) (n int, err error)

    func (c *TCPConn) Read(b []byte) (n int, err error)

    ```


    A `TCPConn` is used by both a client and a server to read and write messages.


    Note that a `TCPConn` implements the `io.Reader` and `io.Writer` interfaces so
    that any method using a reader or writer can be applied to a `TCPConn`.'
  trans: '

    # 服务


    服务运行在主机上。它们通常是长期存在的，并设计为等待请求并响应请求。服务有多种类型，它们可以通过多种方式向客户端提供服务。互联网世界中的许多服务都基于两种通信方法——TCP
    和 UDP，尽管还有其他通信协议（如 SCTP）正在等待接管。许多其他类型的服务，例如点对点、远程过程调用、通信代理等，都是构建在 TCP 和 UDP 之上的。


    ## 端口


    服务存在于主机上。我们可以使用 IP 地址定位一台主机。但在每台计算机上，可能存在许多服务，因此需要一种简单的方法来区分它们。TCP、UDP、SCTP 等使用的方法就是端口号。这是一个介于
    1 到 65535 之间的无符号整数，每个服务会关联一个或多个这样的端口号。


    有许多“标准”端口。Telnet 通常使用 TCP 协议的端口 23。DNS 使用端口 53，可以使用 TCP 或 UDP。FTP 使用端口 21 和 20，一个用于命令，另一个用于数据传输。HTTP
    通常使用端口 80，但也常使用端口 8000、8080 和 8088，且均使用 TCP。X Window 系统经常占用端口 6000-6007，同时使用 TCP
    和 UDP。


    在 UNIX 系统上，常用端口列在文件 `/etc/services` 中。Go 语言有一个函数可以在所有系统上查询端口：


    ```

    func LookupPort(network, service string) (port int, err error)

    ```


    其中 `network` 参数是一个字符串，例如 `"tcp"` 或 `"udp"`，而 `service` 是一个字符串，例如 `"telnet"` 或
    `"domain"`（用于 DNS）。


    使用此函数的程序是 `lookupport.go`：


    ```

    ch3$ vi lookupport.go

    /* LookupPort

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 3 {

    log.Fatalln("Usage: %s network-type service\n", os.Args[0])

    }

    networkType := os.Args[1]

    service := os.Args[2]

    port, err := net.LookupPort(networkType, service)

    if err != nil {

    log.Fatalln("Error: ", err.Error())

    }

    fmt.Println("Service port ", port)

    }

    ```


    例如：


    ```

    ch3$ go run lookupport.go tcp telnet

    Service port  23

    ch3$ go run lookupport.go udp quake

    Service port  26000

    ```


    端口管理不仅仅涉及使用默认服务映射（例如 SSH 对应 22）。一种概念称为临时端口；这些端口的范围通常从 32768 到 60999（可能因操作系统而异）。临时端口被服务用来将每个客户端的流量转移到临时（即临时的）端口；在通信会话结束时，端口被释放。另外需要注意，各种软件平台也会为预定义目的使用端口范围；例如，Kubernetes
    默认使用 32000 到 32768 的范围在其内部网络上暴露服务。端口使用没有集中管理，可能会发生冲突。处理端口时，最佳实践是进行验证和恢复逻辑。


    ### TCPAddr 类型


    `TCPAddr` 类型是一个包含 IP、端口和区域的结构体。区域用于区分可能存在歧义的 IPv6 链路本地地址和站点本地地址，因为不同的网络接口卡（NIC）可能具有相同的
    IPv6 地址。


    ```

    type TCPAddr struct {

    IP   IP

    Port int

    Zone string

    }

    ```


    用于创建 `TCPAddr` 的函数是 `ResolveTCPAddr`：


    ```

    func ResolveTCPAddr(net, addr string) (*TCPAddr, error)

    ```


    其中 `net` 是 `tcp`、`tcp4` 或 `tcp6` 之一，`addr` 是一个由主机名或 IP 地址后跟 `:` 和端口号组成的字符串，例如
    `www.google.com:80` 或 `127.0.0.1:ssh`。如果地址是已经包含冒号的 IPv6 地址，那么主机部分必须用方括号括起来，例如
    `[::1]:23`。另一个特例常用于服务器，其中主机地址为零，因此 TCP 地址实际上就是端口名，例如 HTTP 服务器的 `:80`。


    与 `IPAddr` 类似，解析为 `TCPAddr`（或稍后看到的 `UDPAddr`）允许我们验证和标准化我们的网络端点。


    ## TCP 套接字


    当你知道如何通过网络和端口 ID 访问服务时，接下来该怎么做？如果你是客户端，你需要一个 API，允许你连接到服务，然后向该服务发送消息并从服务读取回复。


    如果你是服务器，你需要能够绑定到一个端口并在其上监听。当消息到达时，你需要能够读取它并向客户端写回响应。


    `net.TCPConn` 是 Go 语言中允许客户端和服务器之间进行全双工通信的类型。两个主要的方法如下：


    ```

    func (c *TCPConn) Write(b []byte) (n int, err error)

    func (c *TCPConn) Read(b []byte) (n int, err error)

    ```


    `TCPConn` 同时被客户端和服务器用于读取和写入消息。


    请注意，`TCPConn` 实现了 `io.Reader` 和 `io.Writer` 接口，因此任何使用读取器或写入器的方法都可以应用于 `TCPConn`。

    '
- fmt: '### TCP Client


    Once a client has established a TCP address for a service, it "dials" the service.
    If successful, the dial returns a `TCPConn` for communication. The client and
    the server exchange messages on this. Typically, a client writes a request to
    the server using the `TCPConn` and reads a response from the `TCPConn`. This continues
    until either (or both) side closes the connection. A TCP connection is established
    by the client using this function:


    ```

    func DialTCP(net string, laddr, raddr *TCPAddr) (*TCPConn, error)

    ```


    where `laddr` is the local address (client side), which is usually set to `nil`,
    and `raddr` is the remote address of the service (server side). The `net` string
    is one of `"tcp4"`, `"tcp6"`, or `"tcp"`, depending on whether you want a TCPv4
    connection or a TCPv6 connection or don''t care.


    A simple example can be provided by a client to a web (HTTP) server. We will deal
    in substantially more detail with HTTP clients and servers in a later chapter,
