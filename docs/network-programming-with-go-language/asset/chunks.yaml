    ## `gorilla/securecookie`


    The securecookie documentation starts as follows:


    ```

    ~/ch16$ go doc securecookie

    package securecookie // import "github.com/gorilla/securecookie"

    Package securecookie encodes and decodes authenticated and optionally

    encrypted cookie values.

    Secure cookies can''t be forged, because their values are validated using

    HMAC. When encrypted, the content is also inaccessible to malicious eyes.

    ...

    ```


    While debate rages on about the use of cookies, we simply show the creation and
    round trip back to the server. We do not concern ourselves about local storage
    (client side).


    AES encryption is used under the hood; standard length block keys are supported
    (16, 24, 32 bytes). In our example, we set to `nil`; thus, we are not using encryption.


    ```

    ~/ch16$ cat securecookie.go

    package main

    import (

    "fmt"

    "github.com/gorilla/securecookie"

    "net/http"

    )

    var hashKey = []byte("very-secret")

    var s = securecookie.New(hashKey, nil)

    func SetCookieHandler(w http.ResponseWriter, r *http.Request) {

    value := map[string]string{

    "foo": "bar",

    }

    if encoded, err := s.Encode("cookie-name", value); err == nil {

    cookie := &http.Cookie{

    Name:  "cookie-name",

    Value: encoded,

    Path:  "/",

    }

    http.SetCookie(w, cookie)

    fmt.Println(cookie)

    }

    }

    func ReadCookieHandler(w http.ResponseWriter, r *http.Request) {

    if cookie, err := r.Cookie("cookie-name"); err == nil {

    value := make(map[string]string)

    fmt.Println(cookie.Value)

    if err = s.Decode("cookie-name", cookie.Value, &value); err == nil {

    fmt.Fprintf(w, "The value of foo is %q", value["foo"])

    }

    fmt.Println(cookie, err)

    }

    }

    func main() {

    http.HandleFunc("/set", SetCookieHandler)

    http.HandleFunc("/read", ReadCookieHandler)

    http.ListenAndServe(":8080", nil)

    }

    ```


    Launch the server.


    ```

    ~/ch16$ go mod tidy

    ~/ch16$ go run securecookie.go

    ```


    The `/set` endpoint will simply create our cookie.


    ```

    ~/ch16$ curl -I localhost:8080/set

    HTTP/1.1 200 OK

    Set-Cookie: cookie-name=MTY0NjY5MDU3MXxEdi1CQkFFQ180SUFBUXdCREFBQURQLUNBQUVEWm05dkEySmhjZz09fMds29irowo8h_9MByVigjT1qh0t7hnvAHprwtX9nc1h;
    Path=/

    Date: Mon, 07 Mar 2022 22:02:51 GMT

    ```


    To confirm it was received, we send back our encoded cookie (be sure to use yours
    previously).


    ```

    ~/ch16$ curl -b "cookie-name=MTY0NjY5MDU3MXxEdi1CQkFFQ180SUFBUXdCREFBQURQLUNBQUVEWm05dkEySmhjZz09fMds29irowo8h_9MByVigjT1qh0t7hnvAHprwtX9nc1h"
    localhost:8080/read && echo

    The value of foo is "bar"

    ```


    ## Conclusion


    The name “Gorilla” starts with `Go` and brings attention to endangered primates.
    As time goes on, Gorilla is not the only toolkit in the jungle, yet it remains
    in the conversation. We did not cover all the packages here, but hopefully this
    gives you some insight into how the standard library is extended.


    # 17. Testing


    In this chapter, we will look at ways and examples of testing network-related
    code. Using unit and integration testing techniques, we strive to capture the
    known and expected behavior. A unit test should ideally avoid all external factors.
    For example, a test that leverages the network is most accurately described as
    an integration test. The network (being external) to our code may exert undo influence
    such as delays or limiting payload size. It is not always easy to know how to
    design a test, much less how to separate and reduce outside influences. Having
    many unknown or controlled internal mechanisms can lead to flaky tests, ones that
    randomly seem to fail.


    This chapter is not about learning the basics of Go test tooling. Excellent resources
    for the basics exist, for example:


    - [`https://pkg.go.dev/testing`](https://pkg.go.dev/testing)

    - [`https://quii.gitbook.io/learn-go-with-tests/`](https://quii.gitbook.io/learn-go-with-tests/)

    - `go doc testing`


    Our goal is to learn some techniques that help us design and manage network-related
    tests.'
