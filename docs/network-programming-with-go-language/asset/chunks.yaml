    \ +0x5e\nFAIL\tcommand-line-arguments\t5.225s\nFAIL\n```\n\nThis error is exposing\
    \ a test antipattern, where the tests are not independent of each other. Like\
    \ the prior run, this also exposes some of the implementation details. The default\
    \ `ServeMux` has a default handler; per code at `server.go:2478`, we are not allowed\
    \ to remap the path.\n\nWe can see there a few things to consider including the\
    \ following:\n\n- What are we actually trying to test?\n- Are we adhering to good\
    \ testing practices (i.e., test independence)?\n- Are we correct and performant?\n\
    \nHow can we solve the preceding issue? As we saw in an earlier chapter, we could\
    \ make a new \"mux\" per test. Another approach could be to set up all the test\
    \ routes before the running of the tests. More fundamentally though, we should\
    \ consider what exactly are we testing. For example, are we testing that the server\
    \ listens? Or are we testing that our `Handler` provides the correct response\
    \ based on a provided request? After all, if we consider the OSI model of thinking,\
    \ HTTP is where our request/response protocol lives (L7), where TCP/IP maintains\
    \ our connection (L4 and below). Since the layers can be decoupled, we should\
    \ be able to decouple our tests. Even with this separation in mind, it's not immediately\
    \ clear where the pieces will be tested (i.e., unit or integration). Thinking\
    \ about the handler mappings, are those something you unit test, or is that something\
    \ worthy of an integration test? After all, the handler isn't even triggered unless\
    \ the given path was used.\n\nAs you can see, how we think about the network components\
    \ can lead to potentially different testing arrangements. We should also remember\
    \ that tests run out of order. While it seems tests run top to bottom, that is\
    \ an implementation side effect and not a specified behavior in the testing package.\n\
    \nAs we refactor, we will first look at what Go provides regarding testing helpers."
  raw: '## Simple and Broken


    We begin with a simple set of tests, where both tests are sending a request and
    then confirming we get a response. The only difference is one test has a client
    that times out and the other does not. In both tests, the server fakes work by
    sleeping for five seconds in both tests. We will run each test individually, then
    as a suite, reviewing the results.


    ```

    $ mkdir ch17

    $ cd ch17

    ch17$ vi basic_http_test.go

    package ch17

    import (

    "net/http"

    "testing"

    "time"

    )

    func TestHTTPRoundTrip(t *testing.T) {

    path := "/"

    c := make(chan struct{})

    //server

    go func() {

    http.HandleFunc(path, func(w http.ResponseWriter, req *http.Request) {

    time.Sleep(5 * time.Second) // holding connection

    })

    http.ListenAndServe(":8080", nil)

    }()

    //client

    go func() {

    resp, err := http.Get("http://localhost:8080" + path)

    if err != nil {

    t.Error(err)

    } else {

    if resp == nil || resp.StatusCode != http.StatusOK {

    t.Error(resp)

    }

    }

    defer func() {

    c <- struct{}{}

    }()

    }()

    <-c

    }

    func TestHTTPRoundTripTimeout(t *testing.T) {

    path := "/"

    c := make(chan struct{})

    //server

    go func() {

    http.HandleFunc(path, func(w http.ResponseWriter, req *http.Request) {

    time.Sleep(5 * time.Second) // holding connection

    })

    http.ListenAndServe(":8080", nil)

    }()

    //client

    go func() {

    var client = &http.Client{

    Timeout: time.Second * 2,

    }

    resp, err := client.Get("http://localhost:8080" + path)

    if err != nil {

    t.Error(err)

    } else {

    if resp == nil || resp.StatusCode != http.StatusOK {

    t.Error(resp)

    }

    }

    defer func() {

    c <- struct{}{}

    }()

    }()

    <-c

    }

    ```


    We begin by running the first test:


    ```

    ch17$ go test -test.run "TestHTTPRoundTrip$" basic_http_test.go

    === RUN   TestHTTPRoundTrip

    --- PASS: TestHTTPRoundTrip (5.00s)

    PASS

    ok      command-line-arguments  5.132s

    ```


    and now the second test:


    ```

    ch17$ go test -test.run "TestHTTPRoundTripTimeout$" basic_http_test.go

    --- FAIL: TestHTTPRoundTripTimeout (2.00s)

    basic_http_test.go:56: Get "http://localhost:8080/": context deadline exceeded
    (Client.Timeout exceeded while awaiting headers)

    FAIL

    FAIL    command-line-arguments  2.131s

    FAIL

    ```


    Upon reading the tests, it may seem obvious that the second test was going to
    fail. The client is set to expire after two seconds where the server is taking
    five seconds to process. An untrained eye might miss the reason for these related
    tests. The default HTTP client has an unlimited timeout. In our case, the server
    in the first test could take double the time and the test would still pass. This
    is not specific to Go, but it is specific to this implementation of the Go HTTP
    client. What happens if we simply run both tests.


    ```

    ch17$ go test basic_http_test.go

    panic: http: multiple registrations for /

    goroutine 31 [running]:

    net/http.(*ServeMux).Handle(0x1529fa0, {0x137fe80, 0x1}, {0x1381c00?, 0x132fee0})

    /usr/local/go/src/net/http/server.go:2478 +0x226

    net/http.(*ServeMux).HandleFunc(...)

    /usr/local/go/src/net/http/server.go:2515

    net/http.HandleFunc(...)

    /usr/local/go/src/net/http/server.go:2527

    command-line-arguments.TestHTTPRoundTripTimeout.func1()

    /Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch17/basic_http_test.go:43
    +0x37

    created by command-line-arguments.TestHTTPRoundTripTimeout

    /Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch17/basic_http_test.go:42
    +0x5e

    FAIL    command-line-arguments  5.225s

    FAIL

    ```


    This error is exposing a test antipattern, where the tests are not independent
    of each other. Like the prior run, this also exposes some of the implementation
    details. The default ServeMux has a default handler; per code at server.go:2478,
    we are not allowed to remap the path.


    We can see there a few things to consider including the following:


    *   What are we actually trying to test?


    *   Are we adhering to good testing practices (i.e., test independence)?


    *   Are we correct and performant?


    How can we solve the preceding issue? As we saw in an earlier chapter, we could
    make a new "mux" per test. Another approach could be to set up all the test routes
    before the running of the tests. More fundamentally though, we should consider
    what exactly are we testing. For example, are we testing that the server listens?
    Or are we testing that our Handler provides the correct response based on a provided
    request? After all, if we consider the OSI model of thinking, HTTP is where our
    request/response protocol lives (L7), where TCP/IP maintains our connection (L4
    and below). Since the layers can be decoupled, we should be able to decouple our
    tests. Even with this separation in mind, it’s not immediately clear where the
    pieces will be tested (i.e., unit or integration). Thinking about the handler
    mappings, are those something you unit test, or is that something worthy of an
    integration test? After all, the handler isn''t even triggered unless the given
    path was used.


    As you can see, how we think about the network components can lead to potentially
    different testing arrangements. We should also remember that tests run out of
    order. While it seems tests run top to bottom, that is an implementation side
    effect and not a specified behavior in the testing package.


    As we refactor, we will first look at what Go provides regarding testing helpers.'
