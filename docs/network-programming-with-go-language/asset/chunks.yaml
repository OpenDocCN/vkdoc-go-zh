    ```


    (An interesting four-column version is at Robbie’s Garbage, Four Column ASCII
    at [`https://garbagecollected.org/2017/01/31/four-column-ascii/`](https://garbagecollected.org/2017/01/31/four-column-ascii/).)


    The most common encoding for ASCII uses the code points as 7-bit bytes, so the
    encoding of `"A"`, for example, is `65`.


    This set is actually *US ASCII*. Due to European desires for accented characters,
    some punctuation characters are omitted to form a minimal set, `ISO 646`, while
    there are “national variants” with suitable European characters. The website ([`https://jkorpela.fi/chars.html`](https://jkorpela.fi/chars.html))
    by Jukka Korpela has more information for those interested. You don’t need these
    variants for the work in this book, though.


    ## ISO 8859


    Octets are now the standard size for bytes. This allows 128 extra code points
    for extensions to ASCII. A number of different code sets to capture the repertoires
    of various subsets of European languages are the `ISO 8859` series. `ISO 8859-1`
    is also known as `Latin-1` and covers many languages in western Europe, while
    others in this series cover the rest of Europe and even Hebrew, Arabic, and Thai.
    For example, `ISO 8859-5` includes the Cyrillic characters of countries such as
    Russia, while `ISO 8859-8` includes the Hebrew alphabet.


    The standard encoding for these character sets is to use their code point as an
    8-bit value. For example, the character `"Á"` in `ISO 8859-1` has the code point
    `193` and is encoded as `193`. All of the `ISO 8859` series have the bottom `128`
    values identical to `ASCII`, so the `ASCII` characters are the same in all of
    these sets.


    The HTML specifications used to recommend the `ISO 8859-1` character set. HTML
    3.2 was the last one to do so, and after that, HTML 4.0 recommended `Unicode`.
    In 2008, Google made an estimate that of the pages it sees, about 20% were still
    in `ISO 8859` format while 20% were still in `ASCII` (see “Unicode nearing 50%
    of the web” at [`http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html`](http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html)).
    See also [`http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/`](http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/)
    and [`https://w3techs.com/technologies/history_overview/character_encoding`](https://w3techs.com/technologies/history_overview/character_encoding)
    for more background information.'
