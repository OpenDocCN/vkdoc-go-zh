- fmt: '### Using the Generated Code


    There is essentially no difference between the coding used in the JSON example
    and this one. A simple program just to marshal and unmarshal a `Person` follows.
    We create an app called `protocolbuffer.go`. This app will be in a module, which
    in turn houses the generated protobuf package.


    ```

    ch4$ cd myapp

    ch4/myapp$

    ```


    Create the following file: `protocolbuffer.go`.


    ```

    ch4/myapp$ vi protocolbuffer.go

    /* ProtocolBuffer

    */

    package main

    import (

    "myapp/protos"

    "google.golang.org/protobuf/proto"

    "fmt"

    )

    func main() {

    name := protos.Person_Name{

    Family:   "newmarch",

    Personal: "jan",

    }

    email1 := protos.Person_Email{

    Kind:    "home",

    Address: "jan@newmarch.name",

    }

    email2 := protos.Person_Email{

    Kind:    "work",

    Address: "j.newmarch@boxhill.edu.au",

    }

    emails := []*protos.Person_Email{&email1, &email2}

    p := protos.Person{

    Name:  &name,

    Email: emails,

    }

    fmt.Println(p)

    data, _ := proto.Marshal(&p)

    newP := protos.Person{}

    proto.Unmarshal(data, &newP)

    fmt.Printf("%v\n", newP)

    if p.Name.Personal == newP.Name.Personal && p.Email[0].Address == newP.Email[0].Address
    {

    fmt.Println("same")

    }

    }

    ```


    With the generated code inside of `./myapp/protos/personv3.pb.go` and the above
    main application `protocolbuffer.go`, we can retrieve the remaining dependencies
    using Go modules. In the `myapp` directory, create the following `go.mod`:


    ```

    ch4/myapp$ go mod init myapp

    ch4/myapp$ go mod edit -replace myapp=./protos

    ch4/myapp$ go mod tidy

    ```


    The output should be a `Person` before and after marshalling and should be the
    same by running the following:


    ```

    ch4/myapp$ go run protocolbuffer.go

    {{{} [] [] } 0 [] family:"newmarch"  personal:"jan" [kind:"home"  address:"jan@newmarch.name"
    kind:"work"  address:"j.newmarch@boxhill.edu.au"]}

    {{{} [] [] 0xc00012a000} 0 [] family:"newmarch"  personal:"jan" [kind:"home"  address:"jan@newmarch.name"
    kind:"work"  address:"j.newmarch@boxhill.edu.au"]}

    same

    ```


    While not pretty to look at, the content is the same. The comparison at the end
    is a warning that you can''t simply compare two structs. Here, we simply compared
    a couple of fields. Pretty printing is available, for example, via `protojson`:
    [`https://pkg.go.dev/google.golang.org/protobuf/encoding/protojson`](https://pkg.go.dev/google.golang.org/protobuf/encoding/protojson).


    We haven''t done much with the marshalled object. However, it could be saved to
    a file or sent across the network and unmarshalled by any of the supported languages:
    C++, C#, Java, Python, as well as Go.


    ## Conclusion


    This chapter discussed the general properties of serializing data types and showed
    a number of common encodings. There are many more, including XML (included in
    the Go libraries), CBOR (a binary form of JSON), and YAML (similar to XML), as
    well as many language-specific ones such as Java Object Serialization and Python''s
    Pickle. Those not in the Go standard packages may often be found on GitHub.


