  trans: '

    # 互联网地址


    要使用某项服务，你必须能够找到它。互联网为计算机等设备使用了一套地址方案，以便能够定位它们。这套地址方案最初设计时，只有少量计算机连接，并且非常慷慨地允许使用
    32 位无符号整数，最多提供 2³² 个地址。这就是所谓的 IPv4 地址。近年来，连接（或至少可直接寻址）设备的数量已威胁要超过这个数字，因此正在逐步过渡到
    IPv6。这种过渡并不均衡，例如在谷歌的图表中有所体现（`https://www.google.com/intl/en/ipv6/statistics.html`——截至
    2022 年 1 月约为 37%）。遗憾的是——从 Jan 的角度来看——很少有澳大利亚的 IP 提供商支持 IPv6（截至 2022 年约为 30%）。在美国（对
    Ron 而言），这个比例略高，约为 50%。这些数字基于观察到的传入流量和相关记录。


    ## IPv4 地址


    地址是一个 32 位整数，用于表示 IP 地址。这个地址指向单个设备上的网络接口卡。该地址通常以十进制表示四个字节，并用点分隔，例如 `127.0.0.1`
    或 `66.102.11.104`。这种点分十进制格式以一种对用户友好的方式包含了多条信息。


    任何设备的 IP 地址通常由两部分组成：设备所在网络的地址，以及该网络内设备的地址。从前，网络地址和内部地址的划分很简单，基于 IP 地址中使用的（点之间的）字节。


    - 在 A 类网络中，第一个字节标识网络，后三个字节标识设备。只有 128 个 A 类网络，由互联网领域的早期参与者拥有，例如 IBM、通用电气公司和麻省理工学院。^(²)
    示例：`3.x.y.z`。


    - B 类网络使用前两个字节标识网络，后两个字节标识子网内的设备。这允许一个子网内最多有 2¹⁶（65,536）个设备。示例：`142.90.y.z`。


    - C 类网络使用前三个字节标识网络，最后一个字节标识该网络内的设备。这允许一个子网内最多有 2⁸（实际上是 254，而不是 256，因为最低和最高地址被保留）个设备。示例：`192.168.123.z`。


    在 C 类网络之外，还定义了其他类别（D 类和 E 类）。我们在此停止，因为当讨论当今网络时，这更多是历史研究而非实用知识。


    如果你需要一个网络上有 400 台计算机，这种方案就行不通了。254 太小（C 类），而 65,536（-2）又太大（B 类）。用二进制算术来说，你大约需要
    512（-2）。这可以通过使用 23 位网络地址和 9 位设备地址来实现。类似地，如果你需要多达 1024（-2）个设备，则使用 22 位网络地址和 10
    位设备地址。一种新的方案被创建出来以替代基于类别的寻址，称为无类别域间路由（又称 CIDR），它能够实现我们正在描述的场景。


    给定一个设备的 IP 地址，并且知道网络地址使用了多少位 `N`，就可以相对直接地提取出网络地址和该网络内的设备地址。形成一个“网络掩码”（也称为子网掩码），它是一个
    32 位的二进制数，前 `N` 位全是 1，其余位全是 0。例如，如果网络地址使用 16 位，则掩码为 `11111111111111110000000000000000`。使用二进制有些不方便，因此通常使用十进制字节。对于
    16 位网络地址，网络掩码是 `255.255.0.0`；对于 24 位网络地址，是 `255.255.255.0`；对于 23 位地址，是 `255.255.254.0`；对于
    22 位地址，则是 `255.255.252.0`。这个网络掩码是基于类别的寻址的通用形式。24 位网络的简写是 `/24`；22 位地址的简写是 `/22`。


    因此，要找到设备的网络地址，将其 IP 地址与网络掩码进行按位 **与** 运算，而要找到子网内的设备地址，则将 IP 地址与网络掩码的按位取反结果进行按位
    **与** 运算。例如，IP 地址 `192.168.1.3` 的二进制值是 `11000000101010000000000100000011`（使用 IP
    地址子网掩码计算器）。如果使用 16 位网络掩码，网络地址为 `1100000010101000 0000000000000000`（即 `192.168.0.0`），而设备地址为
    `0000000000000000 0000000100000011`（即 `0.0.1.3`）。


    当网络提供商为你提供一个网络时，会同时提供一个网络掩码。例如，本地 ISP 为你办公室提供一个 `w.x.y.z/29` 网络（6 个主机地址）。ISP 从
    RIR（区域互联网注册管理机构）/IANA（互联网号码分配机构）获得一个地址块（大量主机）。通常，子网号每减少一位，主机数量就会翻倍（2 的幂次方）。


    ## IPv6 地址


    互联网的发展远远超出了最初的预期。最初慷慨的 32 位寻址方案已濒临枯竭。存在一些令人不快的变通方法，例如 NAT（网络地址转换）寻址，但最终我们将不得不切换到更宽的地址空间。IPv6
    使用 128 位地址。即使是字节来表示这类地址也变得繁琐，因此使用十六进制数字，每四位一组，并用冒号分隔。一个典型的地址可能是 `FE80:CD00:0000:0CDE:1257:0000:211E:729C`。


    这些地址不容易记忆！DNS 将变得更加重要。有一些技巧可以简化某些地址，例如省略前导零和压缩重复的数字。例如，“localhost”是 `0:0:0:0:0:0:0:1`，可以简写为
    `::1`。


    每个地址分为三个部分。第一部分是用于互联网路由的网络地址，是地址的前 64 位。第二部分是 16 位的网络掩码。这用于将网络划分为子网。它可以提供从仅一个子网（全零）到
    65,535 个子网（全一）的任何数量。最后一部分是设备部分，占 48 位。前面的地址中，网络部分为 `FE80:CD00:0000:0CDE`，子网部分为
    `1257`，设备部分为 `0000:211E:729C`。


    IPv6 和 IPv4 对比的一些要点：


    - IPv6 没有校验和头部（它假设其他层执行验证）。


    - IPv6 中头部许多字段是可选的。


    - 虽然总体上更大，但整体数据包头部结构解析速度更快（简化了路由器处理）。


    - 由于数据报大小更大并且减少了路由器重组（移至边缘节点），IPv6 相比 IPv4 减少了分片。

    '
- fmt: '# IP Address Type


    Finally, we can start using some of the Go language network packages. The package
    `net` defines many types, functions, and methods of use in Go network programming.
    The type `IP` is defined as an array of bytes:


    ```go

    type IP []byte

    ```


    There are several functions to manipulate a variable of type `IP`, but you are
    likely to use only some of them in practice. For example, the function `ParseIP(String)`
    will take a dotted IPv4 address or a colon IPv6 address, while the `IP` method
    `String()` will return a string. Note that you may not get back what you started
    with: the string form of `0:0:0:0:0:0:0:1` is `::1`.


    A program that illustrates this process is `ip.go`:


    ```

    $ mkdir ch3

    $ cd ch3

    ch3$ vi ip.go

    /* IP

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    )

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("Usage: %s ip-addr\n", os.Args[0])

    }

    name := os.Args[1]

    addr := net.ParseIP(name)

    if addr == nil {

    fmt.Println("Invalid address")

    } else {

    fmt.Println("The address is ", addr.String())

    }

    }

    ```


    This can be run, for example, as follows:


    ```bash

    ch3$ go run ip.go 127.0.0.1

    ```


    Here is the response:


    ```

    The address is 127.0.0.1

    ```


    Or it could be run as:


    ```bash

    ch3$ go run IP.go 0:0:0:0:0:0:0:1

    ```


    With this response:


    ```

    The address is ::1

    ```


    If you are unfamiliar, the colon addresses are IPv6, including the `::1`, which
    is the IPv6 version of `127.0.0.1` (in IPv4).


    The backing store for the `IP` type is a byte array. As hinted in the preceding
    example, we can store both IPv4 and IPv6 addresses in the same type. Some purposes
    for `ParseIP` (and ultimate storage into `IP`) are for serialization purposes,
    ease of access of related octets (e.g., class A would be `myip[0]` – first byte),
    and general normalization of various input forms (e.g., `127.000.000.001 -> 127.0.0.1`).


    Of potential interest, `ParseIP` doesn''t necessarily normalize all forms; these
    nonstandard forms are called "Rare IP Address Formats." As example of a rare IP,
    some tools expand `127.1` to `127.0.0.1`; `net.ParseIP` does not. Like all programming
    environments, it''s hard to capture all the planned or unplanned standards or
    de facto standards. We can see an ongoing discussion about this very issue on
    the Golang project tracker ("net: should expand IP address 1.1 to 1.0.0.1 #36822",
    [`https://github.com/golang/go/issues/36822`](https://github.com/golang/go/issues/36822)).


    # Using Available Documentation and Examples


    As you proceed with the examples in this book, you use the built-in examples and
    documentation to dig deeper into the standard library. For example, show the alias
    type known as `IP` in the `net` package along with functions and methods that
    use it.


    ```

    ch3$ go doc net.IP

    package net // import "net"

    type IP []byte

    An IP is a single IP address, a slice of bytes. Functions in this package

    accept either 4-byte (IPv4) or 16-byte (IPv6) slices as input.

    Note that in this documentation, referring to an IP address as an IPv4

    address or an IPv6 address is a semantic property of the address, not just

    the length of the byte slice: a 16-byte slice can still be an IPv4 address.

    func IPv4(a, b, c, d byte) IP

    func ParseIP(s string) IP

    func (ip IP) DefaultMask() IPMask

    func (ip IP) Equal(x IP) bool

    func (ip IP) IsGlobalUnicast() bool

    func (ip IP) IsInterfaceLocalMulticast() bool

    func (ip IP) IsLinkLocalMulticast() bool

    func (ip IP) IsLinkLocalUnicast() bool

    func (ip IP) IsLoopback() bool

    func (ip IP) IsMulticast() bool

    func (ip IP) IsUnspecified() bool

    func (ip IP) MarshalText() ([]byte, error)

    func (ip IP) Mask(mask IPMask) IP

    func (ip IP) String() string

    func (ip IP) To16() IP

    func (ip IP) To4() IP

    func (ip *IP) UnmarshalText(text []byte) error

    ```


    Notice some functions return `IP`; others are methods that use it. Most of the
    methods appear to be property checks; for example, is the IP the loopback IP?


    Next, let''s drill down into `net.ParseIP`.


    ```

    ch3$ go doc net.ParseIP

    package net // import "net"

    func ParseIP(s string) IP

    ParseIP parses s as an IP address, returning the result. The string s can be

    in IPv4 dotted decimal ("192.0.2.1"), IPv6 ("2001:db8::68"), or IPv4-mapped

    IPv6 ("::ffff:192.0.2.1") form. If s is not a valid textual representation

    of an IP address, ParseIP returns nil.

    ```


    Eventually, you will want to find examples of usage of given function or type.
    Your Go distribution will normally include examples, either via a test function
    or internal usage. We can find tests related to `ParseIP` (in a Unix-based system)
    as follows:


    ```bash

    ch3$ go test -list ".*ParseIP.*" $(go env GOROOT)/src/net

    TestParseIP

    BenchmarkParseIP

    ExampleParseIP

    ok          net        0.106s

    ```


    Here is an example of running the related test and benchmark from before, focused
    on `net.ParseIP`:


    ```bash

    ch3$ go test -run ParseIP -bench ParseIP -count=1 $(go env GOROOT)/src/net

    goos: darwin

    goarch: amd64

    pkg: net

    cpu: Intel(R) Core(TM) i7-9750H CPU @ 2.60GHz

    BenchmarkParseIP-12              934454              1309 ns/op

    PASS

    ok          net        2.295s

    ```


    There are a couple of items to note regarding these prior commands. `go env GOROOT`
    will produce where the Go standard library is installed; the `$()` is for UNIX
    subshell execution (on Windows, you can just run `go env GOROOT` and copy/paste).
    Assuming standard package layout, we know the `net` package would be located in
    `$(go env GOROOT)/src/net`. The remaining commands are standard Go test commands:


    *   `-list` *regex* // finds test/bench/example that matches *regex*.

    *   `-run` *regex* // runs Test*regex*.

    *   `-bench` *regex* // runs Bench*regex*.

    *   `-count=1` // prevents tests from caching results.


    Running a test example is a start; reviewing the code will provide more in-depth
    knowledge. In the case of `ParseIP`, once we locate the test source, we can review
    it (your output may differ):


    ```

    ch3$ grep -l TestParseIP -nr $(go env GOROOT)/src/net

    /usr/local/go/src/net/ip_test.go

    /usr/local/go/src/net/netip/netip_pkg_test.go (netip package has a ''smaller''
    ip type)

    ```


    If you review the related test and its input inside `ip_test.go`, we can get a
    feel for the types of input `ParseIP` expects and its related output.'
