    运行时，我们看到以下内容：


    ```

    ch13$ go run tcparithclient.go localhost:1234

    Arith: 17*8=136

    Arith: 17/8=2 remainder 1

    ```


    在选择使用 `rpc.HandleHTTP` 还是 `rpc.ServeConn` 时，主要取决于对控制权和速度的考量。TCP 服务器位于 HTTP 之下，因此为我们提供了更多的控制权。如果这一点不重要，那么之前的
    `arithserver.go` 可能更合适。


    ### 值的匹配


    你可能已经注意到，HTTP 客户端和 HTTP 服务器中值参数的类型并不相同。在服务器中，我们使用了 `Values`，而在客户端中，我们使用了 `Args`。这无关紧要，因为我们遵循了
    Gob 序列化的规则，并且两个结构体字段的名称和类型是匹配的。当然，更好的编程实践是让名称保持一致！


    然而，这确实指出了使用 Go RPC 时的一个潜在陷阱。如果我们将服务器中的结构体改为这样：


    ```

    type Values struct {

    C, B int

    }

    ```


    那么 Gob 不会有问题。在客户端，解组时会忽略服务器提供的 `C` 值，并使用 `A` 的默认零值。如果，比如说，发生了除以 `A`（零值）的操作，这可能会导致问题。


    使用 Go RPC 需要程序员严格执行字段名和类型的稳定性。我们注意到，没有版本控制机制来执行这一点，也没有机制让 Gob 指示任何可能的不匹配。也没有必需的外部表示形式作为参考。如果只是添加字段，那么可能没有问题，但仍然需要控制。或许为数据结构添加一个
    `version` 字段会有所帮助。


    ## JSON


    本节在之前概念的基础上没有增加新内容。只是对数据使用了不同的“线缆”格式，即 JSON 而非 Gob。因此，客户端或服务器可以用其他理解套接字和 JSON
    的语言编写。


