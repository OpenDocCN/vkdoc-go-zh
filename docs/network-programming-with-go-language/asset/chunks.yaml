    ### 处理函数


    在上述最后一个程序中，处理函数作为第二个参数传递给了 `ListenAndServe`。可以通过先调用 `Handle` 或 `HandleFunc` 来注册任意数量的处理函数，其签名如下：


    ```

    func Handle(pattern string, handler Handler)

    func HandleFunc(pattern string, handler func(ResponseWriter, *Request))

    ```


    `ListenAndServe` 的第二个参数可以为 `nil`，此时请求会被分派给所有已注册的处理函数。每个处理函数应拥有不同的 URL 模式。例如，文件处理函数的
    URL 模式可能为 `/`，而函数处理函数的 URL 模式可能为 `/cgi-bin`（我们之前使用了 `/tmp/www`）。更具体的模式优先级高于更通用的模式。


    常见的 CGI 程序有 `test-cgi`（用 shell 编写）和 `printenv`（用 Perl 编写），它们会打印环境变量的值。可以编写一个类似于
    `printenv.go` 工作方式的处理函数。


    ```

    ch8$ vi printenv.go

    /* Print Env

    */

    package main

    import (

    "fmt"

    "net/http"

    "os"

    )

    func main() {

    // 大多数文件的文件处理函数

    fileServer := http.FileServer(http.Dir("/tmp/www"))

    http.Handle("/", fileServer)

    // /cgi-bin/printenv 的函数处理函数

    http.HandleFunc("/cgi-bin/printenv", printEnv)

    // 将请求分派给处理函数

    err := http.ListenAndServe(":8000", nil)

    checkError(err)

    // 就是这样!

    }

    func printEnv(writer http.ResponseWriter, req *http.Request) {

    env := os.Environ()

    writer.Write([]byte("Environment"))

    for _, v := range env {

    writer.Write([]byte(v + "\n"))

    }

    writer.Write([]byte(""))

    }

    func checkError(err error) {

    if err != nil {

    fmt.Println("Fatal error ", err.Error())

    os.Exit(1)

    }

    }

    ```


