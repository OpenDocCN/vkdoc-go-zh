  raw: 'Go places real restrictions on ASN.1\. For example, ASN.1 allows integers
    of any size (per ASN.1 – “Type INTEGER takes any of the infinite set of integer
    values”), while the Go implementation will only allow up to limit of big.Int (which
    is larger than int64 but not infinite). On the other hand, Go distinguishes between
    signed and unsigned types, while ASN.1 doesn''t. So, for example, transmitting
    a value of uint64 may fail if it is too large for int64.


    In a similar vein, ASN.1 allows several different character sets, while the Go
    package states that it supports PrintableString, IA5String (ASCII), NumericString,
    and utf8.


    We have seen that a value such as an integer can be easily marshalled and unmarshalled.
    Other basic types such as booleans and reals can be similarly dealt with. Strings
    composed entirely of ASCII characters or UTF8 characters can be marshalled and
    unmarshalled. This code works as long as the string is composed only of ASCII
    or UTF8 characters:


    ```

    func ascii() {

    s := "hello"

    mdata, _ := asn1.Marshal(s)

    var newstr string

    _,_ =asn1.Unmarshal(mdata, &newstr)

    fmt.Printf("Before marshal: %v, After unmarshal%v\n", s, newstr)

    }

    ```


    Update asn1.go to include the preceding function, and call it from main.


    ```

    ch4$ vi asn1.go

    ... prior code ...

    func ascii() {

    s := "hello"

    mdata, _ := asn1.Marshal(s)

    var newstr string

    _,_ =asn1.Unmarshal(mdata, &newstr)

    fmt.Printf("Before marshal: %v, After unmarshal: %v\n", s, newstr)

    }

    func main() {

    thirteen()

    ascii() // call new function

    }

    ch4$ go run asn1.go

    Before marshal: 13, After unmarshal: 13

    Before marshal: hello, After unmarshal: hello

    ```


    ASN.1 also includes some “useful types” not in this list, such as UTC time. Go
    supports this UTC time type. This means that you can pass time values in a way
    that is not possible for other data values. ASN.1 does not support pointers, but
    Go has special code to manage pointers to time values. The function `Now()` returns
    `time.Time`. The special code marshals this, and it can be unmarshalled into a
    pointer variable to a `time.Time` object. Add the following code to asn1.go and
    trigger from main:


    ```

    ch4$ vi asn1.go

    ... prior code ...

    func myTime() {

    t := time.Now()

    mdata, _ := asn1.Marshal(t)

    var newtime = new(time.Time)

    _, _ = asn1.Unmarshal(mdata, newtime)

    fmt.Printf("Before marshal: %v, After unmarshal: %v\n", t, newtime)

    }

    func main() {

    thirteen()

    ascii()

    myTime() // call new function

    }

    ch4$ go run asn1.go

    Before marshal: 13, After unmarshal: 13

    Before marshal: hello, After unmarshal: hello

    Before marshal: 2022-01-03 21:02:19.134959 -0500 EST m=+0.000178450, After unmarshal:
    2022-01-03 21:02:19 -0500 EST

    ```


    In general, value types are preferred over pointers. One reason to use pointers
    (i.e., *time.Time or new(time.Time)) is serialization may not ignore zero values
    when using tags (like the json package).


    Here, we show a time value restored to time pointer; Go looks after this special
    case. Additionally, we see a string with a Unicode sequence. The program asn1basic.go
    illustrates these:


    ```

    ch4$ vi asn1basic.go

    /* ASN.1 Basic

    */

    package main

    import (

    "encoding/asn1"

    "fmt"

    "time"

    )

    func main() {

    // time pointer to time value

    t := time.Now()

    fmt.Println("Before marshalling: ", t.String())

    mdata, _ := asn1.Marshal(t)

    var newtime = new(time.Time)

    asn1.Unmarshal(mdata, newtime)

    fmt.Println("After marshal/unmarshal: ", newtime.String())

    // vulgar fraction, string to string

    s := "hello \u00bc"

    fmt.Println("Before marshalling: ", s)

    mdata2, _ := asn1.Marshal(s)

    var newstr string

    asn1.Unmarshal(mdata2, &newstr)

    fmt.Println("After marshal/unmarshal: ", newstr)

    }

    ```


