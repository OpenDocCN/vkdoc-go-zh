    一个可以读取字节流、提取并检查 BOM，然后解码剩余流的客户端，如 `utf16client.go` 所示：


    ```

    ch6$ vi utf16client.go

    /* UTF16 客户端

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    "os"

    "unicode/utf16"

    )

    const BOM = ''\ufffe''

    func main() {

    if len(os.Args) != 2 {

    log.Fatalln("用法: ", os.Args[0], "host:port")

    }

    service := os.Args[1]

    conn, err := net.Dial("tcp", service)

    checkError(err)

    shorts := readShorts(conn)

    ints := utf16.Decode(shorts)

    str := string(ints)

    fmt.Println(str)

    }

    func readShorts(conn net.Conn) []uint16 {

    var buf [512]byte

    // 将所有内容读入缓冲区

    n, err := conn.Read(buf[0:2]) // 从 BOM 开始

    for {

    m, err := conn.Read(buf[n:]) // 读取剩余的字节对（原本为 uint16）

    if m == 0 || err != nil {

    break

    }

    n += m

    }

    checkError(err)

    var shorts []uint16

    shorts = make([]uint16, n/2)

    // 检查字节序

    // 第一种 - 大端序 0xfffe

    // 第二种 - 小端序 0xfeff

    // 其他 - 未知

    // 内部循环每次迭代读取一个字节

    // 根据字节序，将字节按正确顺序放置

    // *警告* 我们的服务器只支持大端序

    if buf[0] == 0xff && buf[1] == 0xfe {

    for i := 2; i < n; i += 2 {

    shorts[i/2] = uint16(buf[i])<<8 + uint16(buf[i+1])

    }

    } else if buf[0] == 0xfe && buf[1] == 0xff {

    for i := 2; i < n; i += 2 {

    shorts[i/2] = uint16(buf[i+1])<<8 + uint16(buf[i])

    }

    } else {

    // 未知的字节序

    fmt.Println("未知字节序")

    }

    return shorts

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("致命错误 ", err.Error())

    }

    }

    ```


    在不同的终端中运行服务器和客户端：


    ```

    ch6$ go run utf16server.go

    ch6$ go run utf16client.go localhost:1210

    Ŵj''ai arrÃªtÃ©

    ```


    我们看到客户端根据前两个字节确认数据是大端序还是小端序，并按需进行解码。


    如果你有冒险精神，可以将服务器的 BOM 改为小端序；你会看到客户端出现以下输出（它会正确按照小端序处理）。这是因为服务器目前只生成大端序数据。


    ```

    琁樀✀愀椀 愀爀爀쌀▯琀쌀▯

    ```


    ## Unicode 注意事项


    本书并非关于国际化 (i18n) 的专著。我们尤其不想深入探讨 Unicode 的深奥领域。但你应该了解，Unicode 并非简单的编码方式，其中存在许多复杂性。例如，一些早期字符集使用了非间距字符，尤其是用于重音符号。这一点被引入
    Unicode 后，你可以通过两种方式产生带重音的字符：作为单个 Unicode 字符，或者作为一对非间距重音符号加非重音字符。例如，`U+04D6`，即“西里尔大写字母
    IE 带短音符”，是一个单一字符。它等同于 `U+0415`“西里尔大写字母 IE”与短音符 `U+0306`“组合短音符”的组合。这有时会导致字符串比较困难，并可能成为一些极难发现的错误的根源。


    Go 实验性树中有一个名为 `golang.org/x/text/unicode/norm` 的包，可以对 Unicode 字符串进行规范化处理。它可以安装到你的
    Go 包树中：


    ```

    go get golang.org/x/text/unicode/norm

    ```


    请注意，它是“子仓库”Go 项目树中的包，可能不稳定。


    Unicode 实际上有四种标准形式。最常见的是 NFC。字符串可以通过 `norm.NFC.String(str)` 转换为 NFC 形式。下面的 `norm.go`
    程序以两种方式（单一字符形式和组合字符形式）构建字符串，并打印字符串本身、其字节，以及规范化后的形式和字节。请创建如下文件 `utfnorm.go`：


    ```

    ch6$ vi utfnorm.go

    /* UTFNorm

    */

    package main

    import (

    "fmt"

    "golang.org/x/text/unicode/norm"

    )

    func main() {

    str1 := "\u04d6"

    str2 := "\u0415\u0306"

    norm_str2 := norm.NFC.String(str2)

    bytes1 := []byte(str1)

    bytes2 := []byte(str2)

    norm_bytes2 := []byte(norm_str2)

    fmt.Println("单一字符 ", str1, " 字节 ", bytes1)

    fmt.Println("组合字符 ", str2, " 字节 ", bytes2)

    fmt.Println("规范化字符", norm_str2, " 字节 ",

    norm_bytes2)

    }

    ch6$ go mod init example.com/user/utfnorm

    ch6$ go mod tidy

    ch6$ go run utfnorm.go

    单一字符  Ӗ  字节  [211 150]

    组合字符  Ӗ  字节  [208 149 204 134]

    规范化字符 Ӗ 字节  [211 150]

    ```

