    See also [`http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/`](http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/)
    and [`https://w3techs.com/technologies/history_overview/character_encoding`](https://w3techs.com/technologies/history_overview/character_encoding)
    for more background information.'
  trans: '

    ### 传输编码


    字符编码足以处理单个应用程序内的字符。然而，一旦开始*在*应用程序之间发送文本，就会出现如何将字节、短整型或字（words）放到网络上的进一步问题。编码可能基于节省空间和带宽的技术，例如压缩文本。或者，它可能被缩减为
    7 位格式以容纳奇偶校验位，例如`base64`。


    如果我们知道字符和传输编码，那么管理字符和字符串就成了编程问题。如果我们不知道字符或传输编码，那么如何处理任何特定字符串就只能靠猜测了。文件没有约定用于指示字符编码的信号。


    然而，对于通过互联网传输的文本，*确实*存在一种指示编码的约定。它很简单：文本消息的头部包含有关编码的信息。例如，一个 HTTP 头部可以包含如下几行内容：


    ```

    Content-Type: text/html; charset=ISO-8859-4

    Content-Encoding: gzip

    ```


    这表示字符集是`ISO 8859-4`（对应于欧洲的某些国家），使用默认编码，但随后进行了`gzip`压缩。第二部分——内容编码——正是我们所说的“传输编码”（IETF
    RFC 2130）。


    但是，如何读取这些信息呢？它难道不是被编码了吗？我们岂不是遇到了先有鸡还是先有蛋的情况？嗯，不是这样的。约定是此类信息以 ASCII（准确地说，是 US ASCII）给出，这样程序就可以读取头部，然后为文档的其余部分调整其编码。


    ## ASCII


    ASCII 的字符库包括英文字符、数字、标点符号和一些控制字符。ASCII 的码点由下表给出：


    ```

