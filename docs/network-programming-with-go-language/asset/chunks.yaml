- fmt: '# A Daytime Server


    The simplest service that we can build is the daytime service. This is a standard
    Internet service, defined by RFC 867, with a default port of 13 on both TCP and
    UDP. Unfortunately, with the (justified) increase in paranoia over security, hardly
    any sites run a daytime server anymore. Never mind; we can build our own. (For
    those interested, if you install `inetd/systemd` on your system, you usually get
    a daytime server thrown in.)


    A server registers itself on a port and listens on that port. Then it blocks on
    an "accept" operation, waiting for clients to connect. When a client connects,
    the accept call returns, with a connection object. The daytime service is very
    simple and just writes the current time to the client, closes the connection,
    and resumes waiting for the next client.


    The relevant calls are as follows:


    ```

    func ListenTCP(network string, laddr *TCPAddr) (*TCPListener, error)

    func (l *TCPListener) Accept() (Conn, error)

    ```


    The argument `net` can be set to one of the strings: `"tcp"`, `"tcp4"`, or `"tcp6"`.
    The IP address should be set to zero if you want to listen on all network interfaces,
    or to the IP address of a single network interface if you only want to listen
    on that interface. If the port is set to zero, then the O/S will choose a port
    for you. Otherwise, you can choose your own. Note that on a UNIX system, you cannot
    listen on a port below 1024 unless you are the system supervisor, root, and ports
    below 128 are standardized by the IETF. The example program chooses port 1200
    for no particular reason. The TCP address is given as `:1200` – all interfaces,
    port 1200. The program is `daytimeserver.go`:


    ```

    ch3$ vi daytimeserver.go

    /* DaytimeServer

    */

    package main

    import (

    "log"

    "net"

    "time"

    )

    func main() {

    service := ":1200"

    tcpAddr, err := net.ResolveTCPAddr("tcp", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    daytime := time.Now().String()

    conn.Write([]byte(daytime)) // don''t care about return value

    conn.Close()                // we''re finished with this client

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    If you run this server, it will just wait there, not doing much. When a client
    connects to it, it will respond by sending the daytime string to it and then return
    to waiting for the next client.


    ```

    ch3$ go run daytimeserver.go

    ```


    Note the changed error handling in the server as compared to a client. The server
    should run forever so that if any error occurs with a client, the server just
    ignores that client and carries on. A client could otherwise try to mess up the
    connection with the server and bring it down!


    We haven''t built a client. That is easy, just changing the previous client to
    omit the initial write. Alternatively, just open a telnet connection to that host:


    ```

    ch3$ telnet localhost 1200

    ```


    This will produce output such as the following:


    ```

    Trying ::1...

    Connected to localhost.

    Escape character is ''^]''.

    2022-01-03 18:40:16.602125 -0500 EST m=+2.486360923Connection closed by foreign
    host.

    ```


    where `the date` is the output from the server.


    # Multithreaded Server


    `echo` is another simple IETF service. The `simpleechoserver.go` program just
    reads what the client types and sends it back:


    ```

    ch3$ vi simpleechoserver.go

    /* SimpleEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    handleClient(conn)

    conn.Close() // we''re finished

    }

    }

    func handleClient(conn net.Conn) {

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ch3$ go run simpleechoserver.go

    ```


    But if you open two more terminals and try to telnet both to the echo service
    like so, the second will fail:


    ```

    ch3$ telnet localhost 1201 # in one terminal

    // type hello

    ch3$ telnet localhost 1201 # in second terminal, blocked by the first telnet client

    ```


    While it works, there is a significant issue with this server: it is single threaded
    (just like our daytime service). While a client has a connection open to it, no
    other client can fully connect. Other clients are blocked and will probably time
    out. Fortunately, this is easily fixed by making the client handler a `go` routine.
    We have also moved closing the connection into the handler, as it now belongs
    there. The program is called `threadedechoserver.go`:


    ```

    ch3$ vi threadedechoserver.go

    /* ThreadedEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    // run as a goroutine

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    // close connection on exit

    defer conn.Close()

    var buf [512]byte

    for {

    // read up to 512 bytes

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    // write the n bytes read

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatal("Fatal error: %s", err.Error())

    }

    }

    ```


    This simple refactoring moves us to a much more interesting world. This book assumes
    knowledge of basic Go; it would still be remiss to not highlight areas to consider.
    After moving to a concurrent world, we should think of state management (if our
    applications require it), cross thread security, resource exhaustion, and more.
    No details are provided here, but something for your future consideration.


    If you run the same scenario as the prior single-threaded version (server, two
    telnet clients), you will see either client can talk on demand.


    # Controlling TCP Connections


    ## Timeout


    The server may want to time out a client if it does not respond quickly enough;
    that is, it does not write a request to the server in time. This should be a long
    period (several minutes) because the users may be taking their time. Conversely,
    the client may want to time out the server (after a much shorter time). Both do
    this as follows:


    ```

    func (c *IPConn) SetDeadline(t time.Time) error

    ```


    This is done before any reads or writes on the socket.


    ## Staying Alive


    A client may want to stay connected to a server even if it has nothing to send.
    It can use this:


    ```

    func (c *TCPConn) SetKeepAlive(keepalive bool) error

    ```


    There are several other connection control methods, which are documented in the
    `net` package.


    To learn more about deadlines and keepalive, review the existing tests, and run
    them:


    ```

    ch3$ go test -test.v -run "Timeout|KeepAlive" -count=1 $(go env GOROOT)/src/net

    === RUN   TestDialerKeepAlive

    --- PASS: TestDialerKeepAlive (0.00s)

    === RUN   TestRetryTimeout

    dnsclient_unix_test.go:985: 192.0.2.1:53 {{16532 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.787565
    -0500 EST m=+5.003120852

    dnsclient_unix_test.go:985: 192.0.2.2:53 {{25591 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.79893
    -0500 EST m=+5.014486668

    --- PASS: TestRetryTimeout (0.01s)

    === RUN   TestDNSTimeout

    --- PASS: TestDNSTimeout (0.00s)

    ...

    ch3$ go test -list "Timeout|KeepAlive" $(go env GOROOT)/src/net

    TestDialerKeepAlive

    TestRetryTimeout

    TestDNSTimeout

    ...

    ```'
  raw: '### A Daytime Server


    The simplest service that we can build is the daytime service. This is a standard
    Internet service, defined by RFC 867, with a default port of 13 on both TCP and
    UDP. Unfortunately, with the (justified) increase in paranoia over security, hardly
    any sites run a daytime server anymore. Never mind; we can build our own. (For
    those interested, if you install `inetd/systemd` on your system, you usually get
    a daytime server thrown in.)


    A server registers itself on a port and listens on that port. Then it blocks on
    an “accept” operation, waiting for clients to connect. When a client connects,
    the accept call returns, with a connection object. The daytime service is very
    simple and just writes the current time to the client, closes the connection,
    and resumes waiting for the next client.


    The relevant calls are as follows:


    ```

    func ListenTCP(network string, laddr *TCPAddr) (*TCPListener, error)

    func (l *TCPListener) Accept() (Conn, error)

    ```


    The argument `net` can be set to one of the strings: `"tcp"`, `"tcp4"`, or `"tcp6"`.
    The IP address should be set to zero if you want to listen on all network interfaces,
    or to the IP address of a single network interface if you only want to listen
    on that interface. If the port is set to zero, then the O/S will choose a port
    for you. Otherwise, you can choose your own. Note that on a UNIX system, you cannot
    listen on a port below 1024 unless you are the system supervisor, root, and ports
    below 128 are standardized by the IETF. The example program chooses port 1200
    for no particular reason. The TCP address is given as `:1200 –` all interfaces,
    port 1200\. The program is `daytimeserver.go`:


    ```

    ch3$ vi daytimeserver.go

    /* DaytimeServer

    */

    package main

    import (

    "log"

    "net"

    "time"

    )

    func main() {

    service := ":1200"

    tcpAddr, err := net.ResolveTCPAddr("tcp", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    daytime := time.Now().String()

    conn.Write([]byte(daytime)) // don''t care about return value

    conn.Close()                // we''re finished with this client

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    If you run this server, it will just wait there, not doing much. When a client
    connects to it, it will respond by sending the daytime string to it and then return
    to waiting for the next client.


    ```

    ch3$ go run daytimeserver.go

    ```


    Note the changed error handling in the server as compared to a client. The server
    should run forever so that if any error occurs with a client, the server just
    ignores that client and carries on. A client could otherwise try to mess up the
    connection with the server and bring it down!


    We haven’t built a client. That is easy, just changing the previous client to
    omit the initial write. Alternatively, just open a telnet connection to that host:


    ```

    ch3$ telnet localhost 1200

    ```


    This will produce output such as the following:


    ```

    Trying ::1...

    Connected to localhost.

    Escape character is ''^]''.

    2022-01-03 18:40:16.602125 -0500 EST m=+2.486360923Connection closed by foreign
    host.

    ```


    where `the date` is the output from the server.


    ### Multithreaded Server


    `echo` is another simple IETF service. The `simpleechoserver.go` program just
    reads what the client types and sends it back:


    ```

    ch3$ vi simpleechoserver.go

    /* SimpleEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    handleClient(conn)

    conn.Close() // we''re finished

    }

    }

    func handleClient(conn net.Conn) {

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ch3$ go run simpleechoserver.go

    ```


    But if you open two more terminals and try to telnet both to the echo service
    like so, the second will fail:


    ```

    ch3$ telnet localhost 1201 # in one terminal

    // type hello

    ch3$ telnet localhost 1201 # in second terminal, blocked by the first telnet client

    ```


    While it works, there is a significant issue with this server: it is single threaded
    (just like our daytime service). While a client has a connection open to it, no
    other client can fully connect. Other clients are blocked and will probably time
    out. Fortunately, this is easily fixed by making the client handler a `go`routine.
    We have also moved closing the connection into the handler, as it now belongs
    there. The program is called `threadedechoserver.go`:


    ```

    ch3$ vi threadedechoserver.go

    /* ThreadedEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    // run as a goroutine

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    // close connection on exit

    defer conn.Close()

    var buf [512]byte

    for {

    // read up to 512 bytes

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    // write the n bytes read

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatal("Fatal error: %s", err.Error())

    }

    }

    ```


    This simple refactoring moves us to a much more interesting world. This book assumes
    knowledge of basic Go; it would still be remiss to not highlight areas to consider.
    After moving to a concurrent world, we should think of state management (if our
    applications require it), cross thread security, resource exhaustion, and more.
    No details are provided here, but something for your future consideration.


    If you run the same scenario as the prior single-threaded version (server, two
    telnet clients), you will see either client can talk on demand.


    ## Controlling TCP Connections


    ### Timeout


    The server may want to time out a client if it does not respond quickly enough;
    that is, it does not write a request to the server in time. This should be a long
    period (several minutes) because the users may be taking their time. Conversely,
    the client may want to time out the server (after a much shorter time). Both do
    this as follows:


    ```

    func (c *IPConn) SetDeadline(t time.Time) error

    ```


    This is done before any reads or writes on the socket.


    ### Staying Alive


    A client may want to stay connected to a server even if it has nothing to send.
    It can use this:


    ```

    func (c *TCPConn) SetKeepAlive(keepalive bool) error

    ```


    There are several other connection control methods, which are documented in the
    `net` package.


    To learn more about deadlines and keepalive, review the existing tests, and run
    them:


    ```

    ch3$ go test -test.v -run "Timeout|KeepAlive" -count=1 $(go env GOROOT)/src/net

    === RUN   TestDialerKeepAlive

    --- PASS: TestDialerKeepAlive (0.00s)

    === RUN   TestRetryTimeout

    dnsclient_unix_test.go:985: 192.0.2.1:53 {{16532 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.787565
    -0500 EST m=+5.003120852

    dnsclient_unix_test.go:985: 192.0.2.2:53 {{25591 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.79893
    -0500 EST m=+5.014486668

    --- PASS: TestRetryTimeout (0.01s)

    === RUN   TestDNSTimeout

    --- PASS: TestDNSTimeout (0.00s)

    ...

    ch3$ go test -list "Timeout|KeepAlive" $(go env GOROOT)/src/net

    TestDialerKeepAlive

    TestRetryTimeout

    TestDNSTimeout

    ...

    ```'
  trans: '

    # 白天时间服务器


    我们能构建的最简单的服务就是白天时间服务。这是一项由 RFC 867 定义的标准互联网服务，在 TCP 和 UDP 上的默认端口均为 13。不幸的是，随着对安全性的（合理）担忧日益增加，如今很少有站点还运行着白天时间服务器了。没关系，我们可以自己构建一个。（感兴趣的话，如果你在系统上安装了
    `inetd/systemd`，通常都会附带一个白天时间服务器。）


    一个服务器在某个端口上注册自己，并监听该端口。然后它会阻塞在一个 "accept" 操作上，等待客户端连接。当一个客户端连接时，`accept` 调用会返回一个连接对象。白天时间服务非常简单，它只需将当前时间写入客户端，关闭连接，然后继续等待下一个客户端。


    相关的调用如下：


    ```

    func ListenTCP(network string, laddr *TCPAddr) (*TCPListener, error)

    func (l *TCPListener) Accept() (Conn, error)

    ```


    参数 `net` 可以设置为以下字符串之一：`"tcp"`、`"tcp4"` 或 `"tcp6"`。如果你希望监听所有网络接口，IP 地址应设置为零；如果只想监听某个特定网络接口，则设置为该接口的
    IP 地址。如果端口设置为零，操作系统会为你选择一个端口。否则，你可以自己选择端口。请注意，在 UNIX 系统上，除非你是系统管理员 root，否则不能监听
    1024 以下的端口，而且 128 以下的端口已由 IETF 标准化。示例程序选择了端口 1200，没有什么特殊原因。TCP 地址指定为 `:1200` –
    所有接口，端口 1200。程序名为 `daytimeserver.go`：


    ```

    ch3$ vi daytimeserver.go

    /* DaytimeServer

    */

    package main

    import (

    "log"

    "net"

    "time"

    )

    func main() {

    service := ":1200"

    tcpAddr, err := net.ResolveTCPAddr("tcp", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    daytime := time.Now().String()

    conn.Write([]byte(daytime)) // 不关心返回值

    conn.Close()                // 对这个客户端的处理已完成

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ```


    如果你运行这个服务器，它会一直等待，看起来没什么动静。当有客户端连接时，它会发送当前时间字符串作为响应，然后返回等待下一个客户端。


    ```

    ch3$ go run daytimeserver.go

    ```


    注意服务器与客户端在错误处理上的不同。服务器应该永远运行下去，因此如果某个客户端出现任何错误，服务器只需忽略该客户端并继续运行。否则，客户端可能会尝试破坏与服务器的连接，导致服务器宕机！


    我们还没有构建客户端。这很容易，只需修改之前的客户端，省略初始写入操作即可。或者，直接打开一个 telnet 连接到该主机：


    ```

    ch3$ telnet localhost 1200

    ```


    这将产生类似下面的输出：


    ```

    Trying ::1...

    Connected to localhost.

    Escape character is ''^]''.

    2022-01-03 18:40:16.602125 -0500 EST m=+2.486360923Connection closed by foreign
    host.

    ```


    其中 `日期` 就是服务器的输出。


    # 多线程服务器


    `echo` 是另一个简单的 IETF 服务。`simpleechoserver.go` 程序只是读取客户端输入的内容并将其返回：


    ```

    ch3$ vi simpleechoserver.go

    /* SimpleEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    handleClient(conn)

    conn.Close() // 处理完成

    }

    }

    func handleClient(conn net.Conn) {

    var buf [512]byte

    for {

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatalln("Fatal error: %s", err.Error())

    }

    }

    ch3$ go run simpleechoserver.go

    ```


    但如果你再打开两个终端，并尝试像这样用 telnet 连接到 echo 服务，第二个连接会失败：


    ```

    ch3$ telnet localhost 1201 # 在第一个终端中

    // 输入 hello

    ch3$ telnet localhost 1201 # 在第二个终端中，被第一个 telnet 客户端阻塞

    ```


    虽然它能工作，但这个服务器有一个严重问题：它是单线程的（就像我们的白天时间服务一样）。当一个客户端与它保持连接时，其他客户端无法完全连接。其他客户端会被阻塞，很可能超时。幸运的是，这可以通过将客户端处理程序改为
    `go` 例程轻松解决。我们还将关闭连接的操作移到了处理程序中，因为现在它属于那里。程序名为 `threadedechoserver.go`：


    ```

    ch3$ vi threadedechoserver.go

    /* ThreadedEchoServer

    */

    package main

    import (

    "fmt"

    "log"

    "net"

    )

    func main() {

    service := ":1201"

    tcpAddr, err := net.ResolveTCPAddr("tcp4", service)

    checkError(err)

    listener, err := net.ListenTCP("tcp", tcpAddr)

    checkError(err)

    for {

    conn, err := listener.Accept()

    if err != nil {

    continue

    }

    // 作为 goroutine 运行

    go handleClient(conn)

    }

    }

    func handleClient(conn net.Conn) {

    // 退出时关闭连接

    defer conn.Close()

    var buf [512]byte

    for {

    // 最多读取 512 字节

    n, err := conn.Read(buf[0:])

    checkError(err)

    fmt.Println(string(buf[0:]))

    // 写入读取到的 n 个字节

    _, err = conn.Write(buf[0:n])

    checkError(err)

    }

    }

    func checkError(err error) {

    if err != nil {

    log.Fatal("Fatal error: %s", err.Error())

    }

    }

    ```


    这个简单的重构将我们带入了一个更有趣的世界。本书假设你已具备 Go 语言基础知识；但如果不及需注意的方面，仍有失偏颇。进入并发世界后，我们需要考虑状态管理（如果应用程序需要）、跨线程安全、资源耗尽等问题。此处不提供详细信息，留待你今后思考。


    如果你运行与之前单线程版本相同的场景（一个服务器，两个 telnet 客户端），你会发现任何一个客户端都可以随时进行通信。


    # 控制 TCP 连接


    ## 超时


    如果客户端响应不够快，即没有及时向服务器写入请求，服务器可能需要让该客户端超时。这应该是一个较长的周期（几分钟），因为用户可能需要一些时间。相反，客户端可能希望（在更短的时间后）让服务器超时。两者都通过以下方式实现：


    ```

    func (c *IPConn) SetDeadline(t time.Time) error

    ```


    这需要在套接字上进行任何读取或写入之前执行。


    ## 保持连接


    即使没有数据要发送，客户端也可能希望保持与服务器的连接。它可以使用：


    ```

    func (c *TCPConn) SetKeepAlive(keepalive bool) error

    ```


    还有其他几种连接控制方法，这些方法在 `net` 包中有文档说明。


    要了解更多关于超时和保持连接的信息，请查阅现有的测试并运行它们：


    ```

    ch3$ go test -test.v -run "Timeout|KeepAlive" -count=1 $(go env GOROOT)/src/net

    === RUN   TestDialerKeepAlive

    --- PASS: TestDialerKeepAlive (0.00s)

    === RUN   TestRetryTimeout

    dnsclient_unix_test.go:985: 192.0.2.1:53 {{16532 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.787565
    -0500 EST m=+5.003120852

    dnsclient_unix_test.go:985: 192.0.2.2:53 {{25591 false 0 false false true false
    RCodeSuccess} [{www.golang.org. TypeTXT ClassINET}] [] [] []} 2022-01-03 18:49:09.79893
    -0500 EST m=+5.014486668

    --- PASS: TestRetryTimeout (0.01s)

    === RUN   TestDNSTimeout

    --- PASS: TestDNSTimeout (0.00s)

    ...

    ch3$ go test -list "Timeout|KeepAlive" $(go env GOROOT)/src/net

    TestDialerKeepAlive

    TestRetryTimeout

    TestDNSTimeout

    ...

    ```

