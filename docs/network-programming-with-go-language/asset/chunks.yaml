    ## Preface to the Second Edition


    While an age has passed in Internet years, Go remains a primary destination for
    programmers. Go conquered the container technology space. It continues to find
    affection in Cloud Native development. Go strives to remain true to itself, backward
    compatible, yet adding new language features like Generics. Tooling improvements
    such as Fuzzing allow for more secure application development.


    Go has changed, and so has this book. The first edition used Go 1.8; we are now
    on Go 1.18. The code has been updated to reflect this new reality. The examples
    have been largely developed to show a particular feature of Go networking without
    forcing complexity like managing several projects or packages scattered across
    the book; the associated repository can be found here [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e).


    The first version of this book assumed familiarity with Go, and that remains in
    this edition. We expand slightly what we are willing to discuss in this book with
    the inclusion of more third-party modules, tools, and techniques. Jan was correct
    to keep the focus on Go and not to be distracted with the ecosystem at large.


    If you desire to learn about implementing networking concepts with Go, I hope
    this book serves you well.


    As a point of comparison, what follows is Jan’s original preface, reflecting Go
    in 2017.


    ## Preface to the First Edition


    It’s always fun to learn a new programming language, especially when it turns
    out to be a major one. Prior to the release of Go in 2009, I was teaching a Master’s
    level subject in network programming at Monash University. It’s good to have a
    goal when learning a new language, but this time, instead of building yet another
    wine cellar program, I decided to orient my lecture notes around Go instead of
    my (then) standard delivery vehicle of Java.


    The experiment worked well: apart from the richness of the Java libraries that
    Go was yet to match, all the programming examples transferred remarkably well,
    and in many cases were more elegant than the original Java programs.


    This book is the result. I have updated it as Go has evolved and as new technologies
    such as HTTP/2 have arisen. But if it reads like a textbook, well, that is because
    it is one. There is a large body of theoretical and practical concepts involved
    in network programming and this book covers some of these as well as the practicalities
    of building systems in Go.


    In terms of language popularity, Go is clearly rising. It has climbed to 16th
    in the TIOBE index, is 18th in the PYPL (Popularity of Programming Language),
    and is 15th in the RedMonk Programming Language rankings. It is generally rated
    as one of the fastest growing languages.


    There is a growing community of developers both of the core language and libraries
    and of the independent projects. I have tried to limit the scope of this book
    to the standard libraries only and to the “sub-repositories” of the Go tree. While
    this eliminates many excellent projects that no doubt make many programming tasks
    easier, restricting the book to the official Go libraries provides a clear bound.


    This book assumes a basic knowledge of Go. The focus is on using Go to build network
    applications, not on the basics of the language. Network applications are different
    than command-line applications, are different than applications with a graphical
    user interface, and so on. So the first chapter discusses architectural aspects
    of network programs. The second chapter is an overview of the features of Go that
    we use in this book. The third chapter on sockets covers the Go version of the
    basics underlying all TCP/IP systems. Chapters [4](#436770_2_En_4_Chapter.xhtml),
    [5](#436770_2_En_5_Chapter.xhtml), and [6](#436770_2_En_6_Chapter.xhtml) are more
    unusual in network programming books. They cover the topics of what representations
    of data will be used, how a network interaction will proceed, and for text, which
    language formats are used. Then in Chapter [7](#436770_2_En_7_Chapter.xhtml),
    we look at the increasingly important topic of security. In Chapter [8](#436770_2_En_8_Chapter.xhtml),
    we look at one of the most common application layer protocols in use, HTTP. The
    next four chapters are about topics related to HTTP and common data formats carried
    above HTTP – HTML and XML. In Chapter [13](#436770_2_En_13_Chapter.xhtml), we
    look at an alternative approach to network programming, remote procedure calls.
    Chapters [14](#436770_2_En_14_Chapter.xhtml) and [15](#436770_2_En_15_Chapter.xhtml)
    consider further aspects of network programming using HTTP.


    ## Acknowledgments


    I want to share my appreciation for Jan Newmarch for collaborating on this book.
    This project has offered me a tremendous sense of achievement and allowed me to
    cross a much-anticipated item off my bucket list. I would also like to thank Eldon
    Alameda for his thoughtful approach at letting me know when I am off the mark
    and for providing me with solid advice.


    Additionally, I owe gratitude to my partners at Apress, both Steve Anglin for
    the opportunity and Mark Powers for the guidance to help see this through. Thank
    you to my colleagues at RX-M, including Randy Abernethy, Christopher Hanson, Andrew
    Bassett, and Anita Wu. Our work over the years has allowed for my participation
    in a project such as this book.


    Finally, I want to thank my wife Julie and daughter Charlotte. Julie’s capacity
    to manage the world while I hide out on a computer is unmatched and most appreciated.
    Charlotte’s energy, abilities, and creativity inspire me to become better every
    day.


    > —Ronald Petty


