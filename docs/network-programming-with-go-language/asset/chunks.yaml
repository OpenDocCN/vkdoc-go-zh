    ## Using REST or RPC


    The primary difference between REST and RPC is the interaction style. In RPC,
    you are calling functions, passing objects or primitive types as arguments, and
    getting objects or primitive types in return. The functions are *verbs*: do *this*
    to *that*. REST, on the other hand, is about interacting with objects, asking
    them to show their state or to change it in some way.


    The difference is shown by the Go RPC mechanism discussed in the last chapter
    and the REST mechanism of this chapter. In Go RPC over HTTP, the server registers
    *functions*, while in REST, the server registers handlers for *URLs*.


    Which is better? Neither. Which is faster? Neither. Which is better for a controlled
    environment? Possibly RPC. Which is better for an open environment? Possibly REST.


    You will see arguments based on speed and resource allocation. RPC based on binary
    systems will probably be faster than text-based HTTP systems. But SOAP is a text-based
    RPC system using HTTP and is probably slower than REST. HTTP2 uses a binary format
    and, when conveying binary data such as BSON, will probably be equivalent in speed
    to other binary systems. Just to confuse things further, the Apache Thrift RPC
    allows a choice of data formats (binary, compact binary, JSON, and text) and transports
    (sockets, files, and shared memory). One system demonstrates all options!


    A more important factor might be how tightly controlled the operational environment
    is. RPC systems are tightly coupled, and a failure in one component could bring
    an entire system down. When there are a single administrative authority, a limited
    set of hardware and software configurations, and a clear channel for fixing problems,
    then an RPC system can work well.


    On the other side, the Web is uncontrolled. There is no single authority `–` even
    such "universal" services such as DNS are highly distributed. There is a huge
    variety of hardware, operating systems, and software; there will be little prospect
    of enforcing any policies; and if something breaks, then there is often no one
    who can be pointed at to fix it. In such a case, a loosely coupled system may
    be better.


    REST over HTTP is a good match for this. HATEOAS allows servers to be reconfigured
    on the fly, changing URLs as needed (even pointing to different servers!). HTTP
    is designed to cache results when it can. Firewalls are usually configured to
    allow HTTP traffic and block most other. REST is a good choice here.


    It should be noted that REST is not the only HTTP-based system possible. SOAP
    has already been mentioned. There are many commercial and highly successful systems
    that are "almost" REST `–` Richardson levels 1 and 2\. They do not enjoy the full
    benefits of the REST/HTTP match but still work.


    No doubt in the future, other models will arise. In the IoT space, CoAP is popular
    for low-power wireless systems. It is also REST based, but in a slightly different
    way than HTTP-REST.


    ## Conclusion


    REST is the architectural model of the Web. It can be applied in many different
    ways, particularly as HTTP and CoAP (e.g., low power, lossy network protocol).
    This chapter illustrated REST as applied to HTTP.'
