    \ data into the database strings that, when delivered to a browser, for example,\
    \ will attack the browser and, through it, attack the client of the website. (There\
    \ are several variants of this, discussed at “OWASP: Types of XSS” `–` [`https://owasp.org/www-community/Types_of_Cross-Site_Scripting`](https://owasp.org/www-community/Types_of_Cross-Site_Scripting).)\n\
    \nFor example, JavaScript may be inserted where a blog comment was requested to\
    \ redirect a browser to an attacker’s site:\n\n```\nwindow.location='http://attacker/'\n\
    \n```\n\nThe Go `html/template` package is designed on top of the `text/template`\
    \ package. The assumption is made that whereas the template will be trusted, the\
    \ data that it deals with may not. What `html/template` adds is suitable escaping\
    \ of the data to try to eliminate the possibility of XSS. It is based on the document\
    \ called “Using Type Inference to Make Web Templates Robust Against XSS” by Mike\
    \ Samuel and Prateek Saxena. Read that paper at [`https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition`](https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition)\
    \ for the theory behind the package and the package documentation itself.\n\n\
    In short, prepare templates as per the `text/template` package and use the `html/template`\
    \ package if the resultant text is delivered to an HTML agent.\n\n## Tokenizing\
    \ HTML\n\nThe package `golang.org/x/net/html` in the Go subrepositories contains\
    \ a tokenizer for HTML. This allows you to build a parse tree of HTML tokens.\
    \ It is compliant with HTML5.\n\nHere is an example program using this package\
    \ in readhtml.go.\n\n```\nch11$ vi readhtml.go\n/* Read HTML\n*/\npackage main\n\
    import (\n\"fmt\"\n\"golang.org/x/net/html\"\n\"io\"\n\"log\"\n\"os\"\n\"strings\"\
    \n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"file\")\n}\nfile := os.Args[1]\nbytes, err := os.ReadFile(file)\ncheckError(err)\n\
    r := strings.NewReader(string(bytes))\nz := html.NewTokenizer(r)\ndepth := 0\n\
    for {\ntt := z.Next()\nfor n := 0; n < depth; n++ {\nfmt.Print(\" \")\n}\nswitch\
    \ tt {\ncase html.ErrorToken:\nif z.Err() == io.EOF {\nfmt.Println(\"EOF\")\n\
    } else {\nfmt.Println(\"Error \", z.Err().Error())\n}\nos.Exit(0)\ncase html.TextToken:\n\
    fmt.Println(\"Text: \\\"\" + z.Token().String() + \"\\\"\")\ncase html.StartTagToken,\
    \ html.EndTagToken:\nfmt.Println(\"Tag: \\\"\" + z.Token().String() + \"\\\"\"\
    )\nif tt == html.StartTagToken {\ndepth++\n} else {\ndepth--\n}\n}\n}\n}\nfunc\
    \ checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n```\n\nWhen we run readhtml.go on a simple HTML document such as this, sample.html:\n\
    \n```\nch11$ vi sample.html\n\n Test HTML \n\n Header one \n\nTest para\n\n```\n\
    \nAfter setting up the dependencies, it produces the following output:\n\n```\n\
    $ go mod init example.com/user/readhtml\n$ go mod tidy\n$ go run readhtml.go sample.html\n\
    Tag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \" Test HTML\
    \ \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\
    \nTag: \"\"\nText: \" Header one \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText:\
    \ \"\nTest para\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\
    \"\nText: \"\n\"\nEOF\n```\n\n(All the whitespace it produces is correct.)\n\n\
    ## XHTML/HTML\n\nThere is also limited support for XHTML/HTML in the XML package,\
    \ discussed in the next chapter.\n\n## JSON\n\nThere is good support for JSON,\
    \ as discussed in Chapter [4](#436770_2_En_4_Chapter.xhtml).\n\n## Conclusion\n\
    \nThere isn’t much to this package. The subpackage `html/template` was discussed\
    \ in Chapter [9](#436770_2_En_9_Chapter.xhtml) on templates.\n\n# 12. XML\n\n\
    XML is a significant markup language mainly intended as a means of representing\
    \ structured data using a text format. In the language we used in Chapter [4](#436770_2_En_4_Chapter.xhtml),\
    \ it can be considered as a means of serializing data structures as a text document.\
    \ It is used to describe documents such as DocBook and XHTML. It is used in specialized\
    \ markup languages such as MathML and CML (Chemical Markup Language). It is used\
    \ to encode data as SOAP messages for Web Services, and the Web Service can be\
    \ specified using WSDL (Web Services Description Language).\n\nAt the simplest\
    \ level, XML allows you to define your own tags for use in text documents. Tags\
    \ can be nested and can be interspersed with text. Each tag can also contain attributes\
    \ with values. For example, the file `person.xml` may contain\n\n```\n$ mkdir\
    \ ch12\n$ cd ch12\nch12$ vi person.xml\n\n Newmarch \n Jan \n\njan@newmarch.name\n\
    \nj.newmarch@boxhill.edu.au\n\n```\n\nThe structure of any XML document can be\
    \ described in a number of ways:\n\n*   A document type definition (DTD) is good\
    \ for describing structure.\n\n*   XML schema are good for describing the data\
    \ types used by an XML document.\n\n*   RELAX NG is proposed as an alternative\
    \ to both.\n\nThere is argument over the relative value of each way of defining\
    \ the structure of an XML document. We won’t buy into that, as Go does not support\
    \ any of them. Go cannot check for validity of any document against a schema,\
    \ but only for well-formedness. Even well-formedness is an important characteristic\
    \ of XML documents and is often a problem with HTML documents in practice. That\
    \ makes XML suitable for representation of even very complex data, while HTML\
    \ is not.\n\nFour topics are discussed in this chapter: marshalling and unmarshalling\
    \ Go data into XML, parsing an XML stream, and XHTML."
  trans: "\n### `html/template` 包\n\n网络服务器可能遭受多种攻击，最著名的是 SQL 注入攻击，即用户代理在网页表单中输入特意设计的数据，这些数据会传入数据库并造成严重破坏。Go\
    \ 语言并没有提供特别的机制来避免这种情况，因为不同数据库在 SQL 注入技术方面存在诸多差异，导致成功的攻击方式各不相同。SQL 注入防御速查表（参见 [`https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html`](https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html)）总结了针对此类攻击的防御措施。其中最主要的方法是使用\
    \ SQL *预编译语句*来避免此类攻击，这可以通过 `database/sql` 包中的 `Prepare` 函数实现。\n\n更隐蔽的攻击基于 XSS——跨站脚本攻击。攻击者不是试图攻击网站本身，而是在服务器上存储恶意代码来攻击该网站的任何客户端。\n\
    \n这些攻击基于向数据库字符串中插入数据，当这些数据（例如）被传送给浏览器时，将攻击浏览器，并通过浏览器攻击网站客户端。（关于此攻击的几种变体，请参见“OWASP:\
    \ XSS 的类型”—— [`https://owasp.org/www-community/Types_of_Cross-Site_Scripting`](https://owasp.org/www-community/Types_of_Cross-Site_Scripting)。）\n\
    \n例如，在请求发表博客评论的位置可能被插入 JavaScript 代码，将浏览器重定向到攻击者的网站：\n\n```\nwindow.location='http://attacker/'\n\
    ```\n\nGo 的 `html/template` 包是在 `text/template` 包的基础上构建的。该包假定模板本身是可信的，但模板处理的数据可能不可信。`html/template`\
    \ 包增加的功能是对数据进行适当的转义，以消除 XSS 的可能性。它基于 Mike Samuel 和 Prateek Saxena 撰写的论文“Using\
    \ Type Inference to Make Web Templates Robust Against XSS”。请访问 [`https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition`](https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition)\
    \ 阅读该论文，以了解该包背后的理论以及包文档本身。\n\n简而言之，按照 `text/template` 包的方式准备模板，如果生成的文本要交付给 HTML\
    \ 代理，则使用 `html/template` 包。\n\n### HTML 词法分析\n\nGo 子仓库中的 `golang.org/x/net/html`\
    \ 包包含一个 HTML 词法分析器。它允许你构建一个 HTML 词法单元的解析树。该包符合 HTML5 标准。\n\n下面是一个在 `readhtml.go`\
    \ 中使用该包的示例程序。\n\n```\nch11$ vi readhtml.go\n/* Read HTML\n*/\npackage main\nimport\
    \ (\n\"fmt\"\n\"golang.org/x/net/html\"\n\"io\"\n\"log\"\n\"os\"\n\"strings\"\n\
    )\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
    \ \"file\")\n}\nfile := os.Args[1]\nbytes, err := os.ReadFile(file)\ncheckError(err)\n\
    r := strings.NewReader(string(bytes))\nz := html.NewTokenizer(r)\ndepth := 0\n\
    for {\ntt := z.Next()\nfor n := 0; n < depth; n++ {\nfmt.Print(\" \")\n}\nswitch\
    \ tt {\ncase html.ErrorToken:\nif z.Err() == io.EOF {\nfmt.Println(\"EOF\")\n\
    } else {\nfmt.Println(\"Error \", z.Err().Error())\n}\nos.Exit(0)\ncase html.TextToken:\n\
    fmt.Println(\"Text: \\\"\" + z.Token().String() + \"\\\"\")\ncase html.StartTagToken,\
    \ html.EndTagToken:\nfmt.Println(\"Tag: \\\"\" + z.Token().String() + \"\\\"\"\
    )\nif tt == html.StartTagToken {\ndepth++\n} else {\ndepth--\n}\n}\n}\n}\nfunc\
    \ checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n```\n\n当我们对一个像 `sample.html` 这样简单的 HTML 文档运行 `readhtml.go` 时：\n\n```\nch11$\
    \ vi sample.html\n\n Test HTML \n\n Header one \n\nTest para\n\n```\n\n在设置好依赖项后，它会产生以下输出：\n\
    \n```\n$ go mod init example.com/user/readhtml\n$ go mod tidy\n$ go run readhtml.go\
    \ sample.html\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText:\
    \ \" Test HTML \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\
    \nText: \"\n\"\nTag: \"\"\nText: \" Header one \"\nTag: \"\"\nText: \"\n\"\nTag:\
    \ \"\"\nText: \"\nTest para\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\
    \"\nTag: \"\"\nText: \"\n\"\nEOF\n```\n\n（它产生的所有空白字符都是正确的。）\n\n### XHTML/HTML\n\
    \n在 XML 包中也对 XHTML/HTML 提供了有限的支持，这将在下一章讨论。\n\n### JSON\n\n正如第 4 章所述，Go 对 JSON\
    \ 提供了良好的支持。\n\n### 结论\n\n这个包本身内容不多。其子包 `html/template` 已在第 9 章关于模板的部分讨论过。\n\n\
    ## 12. XML\n\nXML 是一种重要的标记语言，主要旨在作为一种使用文本格式表示结构化数据的手段。用我们在第 4 章使用的术语来说，它可以被视为一种将数据结构序列化为文本文档的方式。它用于描述诸如\
    \ DocBook 和 XHTML 之类的文档。它用于专门的标记语言，如 MathML 和 CML（化学标记语言）。它用于将数据编码为 Web 服务的 SOAP\
    \ 消息，并且 Web 服务可以使用 WSDL（Web 服务描述语言）来指定。\n\n在最简单的层面上，XML 允许你在文本文档中定义自己的标签。标签可以嵌套，也可以与文本交错。每个标签还可以包含带有值的属性。例如，文件\
    \ `person.xml` 可能包含：\n\n```\n$ mkdir ch12\n$ cd ch12\nch12$ vi person.xml\n\n\
    \ Newmarch \n Jan \n\njan@newmarch.name\n\nj.newmarch@boxhill.edu.au\n\n```\n\n\
    任何 XML 文档的结构可以通过多种方式描述：\n\n*   文档类型定义 (DTD) 擅长描述结构。\n*   XML 模式擅长描述 XML 文档所使用的数据类型。\n\
    *   RELAX NG 被提出作为这两种方式的替代方案。\n\n对于每种定义 XML 文档结构方式的相对价值存在争论。我们不打算深入参与这场争论，因为 Go\
    \ 语言并不支持其中任何一种。Go 无法根据某种模式检查文档的有效性，而只能检查其格式是否良好。即使是格式良好性也是 XML 文档的一个重要特征，并且在实际中\
    \ HTML 文档经常在这方面出现问题。这使得 XML 即使对于非常复杂的数据也适合进行表示，而 HTML 则不行。\n\n本章讨论四个主题：将 Go 数据编组和解编组为\
    \ XML、解析 XML 流，以及 XHTML。\n"
- fmt: "## Unmarshalling XML\n\nGo provides a function called `Unmarshal` to unmarshal\
    \ XML into Go data structures. The unmarshalling is not perfect: Go and XML are\
    \ different languages.\n\nWe consider a simple example before looking at the details.\
    \ First, consider the XML document given earlier (`person.xml`):\n\n```xml\n<person>\n\
    <name>\n<family>Newmarch</family>\n<personal>Jan</personal>\n</name>\n<email type=\"\
    personal\">\njan@newmarch.name\n</email>\n<email type=\"work\">\nj.newmarch@boxhill.edu.au\n\
    </email>\n</person>\n```\n\nWe would like to map this onto the Go structures:\n\
    \n```go\ntype Person struct {\n    Name  Name\n    Email []Email\n}\ntype Name\
    \ struct {\n    Family   string\n    Personal string\n}\ntype Email struct {\n\
    \    Type    string\n    Address string\n}\n```\n\nThis requires several comments:\n\
    \n- Unmarshalling uses the Go reflection package. This requires that all fields\
    \ be exported; that is, start with a capital letter. Earlier versions of Go used\
    \ case-insensitive matching to match fields such as the XML string `\"name\"`\
    \ to the field `Name`. Now, though, *case-sensitive* matching is used. To perform\
    \ a match, the structure fields must be tagged to show the XML string that will\
    \ be matched against. This changes `Person` to the following:\n\n```go\ntype Person\
    \ struct {\n    Name  Name    `xml:\"name\"`\n    Email []Email `xml:\"email\"\
    `\n}\n```\n\n- While tagging of fields can attach XML strings to fields, it can't\
    \ do so with the names of the structures. An additional field is required, with\
    \ the field name `XMLName`. This only affects the top-level struct, `Person`:\n\
    \n```go\ntype Person struct {\n    XMLName Name    `xml:\"person\"`\n    Name\
    \    Name    `xml:\"name\"`\n    Email   []Email `xml:\"email\"`\n}\n```\n\n-\
    \ Repeated tags map to a slice in Go.\n\n- Attributes within tags will match to\
    \ fields in a structure only if the Go field has the tag `,attr`. This occurs\
    \ with the field `Type` of `Email`, where matching the attribute `type` of the\
    \ `email` tag requires `xml:\"type,attr\"`.\n\n- If an XML tag has no attributes\
    \ and only has character data, then it matches a `string` field by the same name\
    \ (case-sensitive, though). So the tag `xml:\"family\"` with character data `Newmarch`\
    \ maps to the string field `Family`.\n\n- But if the tag has attributes, then\
    \ it must map to a structure. Go assigns the character data to the field with\
    \ tag `,chardata`. This occurs with the `email` data and the field `Address` with\
    \ tag `,chardata`.\n\nA program to unmarshal the preceding document is `unmarshal.go`:\n\
    \n```go\n/*\nch12$ vi unmarshal.go\n/* Unmarshal\n*/\npackage main\nimport (\n\
    \"encoding/xml\"\n\"fmt\"\n\"log\"\n)\ntype Person struct {\nXMLName Name    `xml:\"\
    person\"`\nName    Name    `xml:\"name\"`\nEmail   []Email `xml:\"email\"`\n}\n\
    type Name struct {\nFamily   string `xml:\"family\"`\nPersonal string `xml:\"\
    personal\"`\n}\ntype Email struct {\nType    string `xml:\"type,attr\"`\nAddress\
    \ string `xml:\",chardata\"`\n}\nfunc main() {\nstr := `\n<person>\n<name>\n<family>Newmarch</family>\n\
    <personal>Jan</personal>\n</name>\n<email type=\"personal\">\njan@newmarch.name\n\
    </email>\n<email type=\"work\">\nj.newmarch@boxhill.edu.au\n</email>\n</person>\n\
    `\nvar person Person\nerr := xml.Unmarshal([]byte(str), &person)\ncheckError(err)\n\
    // now use the person structure e.g.\nfmt.Println(\"Family name: \\\"\" + person.Name.Family\
    \ + \"\\\"\")\nfor _, email := range person.Email {\nfmt.Println(email)\n}\n}\n\
    func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n/*\nch12$ go run unmarshal.go\nFamily name: \" Newmarch \"\n{personal\n\
    jan@newmarch.name\n}\n{work\nj.newmarch@boxhill.edu.au\n}\n*/\n```\n\n(Note that\
    \ the spaces are correct.) The strict rules are given in the package specification;\
    \ see `go doc -all encoding/xml`.\n\n## Marshalling XML\n\nGo also has support\
    \ for marshalling data structures into an XML document. The function is\n\n```go\n\
    func Marshal(v interface}{) ([]byte, error)\n```\n\nA program to marshal a simple\
    \ structure is `marshal.go`:\n\n```go\n/*\nch12$ vi marshal.go\n/* Marshal\n*/\n\
    package main\nimport (\n\"encoding/xml\"\n\"fmt\"\n)\ntype Person struct {\nXMLName\
    \ xml.Name `xml:\"person\"`\nName    Name     `xml:\"name\"`\nEmail   []Email\
    \  `xml:\"email\"`\n}\ntype Name struct {\nFamily   string `xml:\"family\"`\n\
    Personal string `xml:\"personal\"`\n}\ntype Email struct {\nKind    string \"\
    attr\"\nAddress string \"chardata\"\n}\nfunc main() {\nperson := Person{\nName:\
    \ Name{Family: \"Newmarch\", Personal: \"Jan\"},\nEmail: []Email{Email{Kind: \"\
    home\", Address: \"jan\"},\nEmail{Kind: \"work\", Address: \"jan\"}}}\nbuff, _\
    \ := xml.Marshal(person)\nfmt.Println(string(buff))\n}\n/*\nch12$ go run marshal.go\n\
    NewmarchJanhomejanworkjan\n*/\n```\n\nIt produces the text with no whitespace.\n\
    \n## Parsing XML\n\nGo has an XML parser that's created using `NewDecoder` from\
    \ the `encoding/xml` package. This takes an `io.Reader` as a parameter and returns\
    \ a pointer to `Decoder`. The main method of this type is `Token`, which returns\
    \ the next token in the input stream. The token is one of these types: `StartElement`,\
    \ `EndElement`, `CharData`, `Comment`, `ProcInst`, or `Directive`.\n\nThe XML\
    \ types are `StartElement`, `EndElement`, `CharData`, `Comment`, `ProcInst`, and\
    \ `Directive`. They are described next.\n\n### The StartElement Type\n\nThe type\
    \ `StartElement` is a structure with two field types:\n\n```go\ntype StartElement\
    \ struct {\n    Name Name\n    Attr []Attr\n}\n```\n\nwhere\n\n```go\ntype Attr\
    \ struct {\n    Name  Name\n    Value string\n}\n```\n\n### The EndElement Type\n\
    \nThis is also a structure as follows:\n\n```go\ntype EndElement struct {\n  \
    \  Name Name\n}\n```\n\n### The CharData Type\n\nThis type represents the text\
    \ content enclosed by a tag and is a simple type:\n\n```go\ntype CharData []byte\n\
    ```\n\n### The Comment Type\n\nSimilarly, for comments this type is similar to\
    \ `CharData`'s type:\n\n```go\ntype Comment []byte\n```\n\n### The ProcInst Type\n\
    \nA `ProcInst` represents an XML processing instruction of the form `<?target\
    \ inst?>`:\n\n```go\ntype ProcInst struct {\n    Target string\n    Inst   []byte\n\
    }\n```\n\n### The Directive Type\n\nA `Directive` represents an XML directive\
    \ of the form `<!text>`. The bytes do not include the `<!` and `>` markers.\n\n\
    ```go\ntype Directive []byte\n```\n\nA program to print out the tree structure\
    \ of an XML document is `parsexml.go`:\n\n```go\n/*\nch12$ vi parsexml.go\n/*\
    \ Parse XML\n*/\npackage main\nimport (\n\"encoding/xml\"\n\"fmt\"\n\"io/ioutil\"\
    \n\"log\"\n\"os\"\n\"strings\"\n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"\
    Usage: \", os.Args[0], \"file\")\n}\nfile := os.Args[1]\nbytes, err := ioutil.ReadFile(file)\n\
    checkError(err)\nr := strings.NewReader(string(bytes))\nparser := xml.NewDecoder(r)\n\
    depth := 0\nfor {\ntoken, err := parser.Token()\nif err != nil {\nbreak\n}\nswitch\
    \ elmt := token.(type) {\ncase xml.StartElement:\nname := elmt.Name.Local\nprintElmt(name+\"\
    :start\", depth)\ndepth++\ncase xml.EndElement:\ndepth--\nname := elmt.Name.Local\n\
    printElmt(name+\":end\", depth)\ncase xml.CharData:\nprintElmt(string([]byte(elmt)),\
    \ depth)\ncase xml.Comment:\nprintElmt(\"Comment\", depth)\ncase xml.ProcInst:\n\
    printElmt(\"ProcInst\", depth)\ncase xml.Directive:\nprintElmt(\"Directive\",\
    \ depth)\ndefault:\nfmt.Println(\"Unknown\")\n}\n}\n}\nfunc printElmt(s string,\
    \ depth int) {\nslimS := strings.TrimSpace(s)\nif len(slimS) == 0 {\nreturn\n\
    }\nfor n := 0; n < depth; n++ {\nfmt.Print(\"  \")\n}\nfmt.Println(slimS)\n}\n\
    func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n*/\n```\n\nNote that the parser includes all `CharData`, including the whitespace\
    \ between the tags.\n\nIf we run the `parsexml.go` program against the `person`\
    \ data structure given earlier, as follows:\n\n```\nch12$ go run parsexml.go person.xml\n\
    person:start\nname:start\nfamily:start\nNewmarch\nfamily:end\npersonal:start\n\
    Jan\npersonal:end\nname:end\nemail:start\njan@newmarch.name\nemail:end\nemail:start\n\
    j.newmarch@boxhill.edu.au\nemail:end\nperson:end\n```\n\nNote that as no DTD or\
    \ other XML specification has been used, the tokenizer correctly prints out all\
    \ the whitespace (a DTD may specify that the whitespace can be ignored, but without\
    \ it, that assumption cannot be made). To make things prettier, we removed extra\
    \ space via `Trim`.\n\nThere is a potential trap in using this parser. It reuses\
    \ space for strings, so once you see a token, you need to copy its value if you\
    \ want to refer to it later. Go has methods such as `func (c CharData) Copy()\
    \ CharData` to make a copy of data; see `go doc encoding.xml.Copy`."
  raw: "## Unmarshalling XML\n\nGo provides a function called `Unmarshal` to unmarshal\
    \ XML into Go data structures. The unmarshalling is not perfect: Go and XML are\
    \ different languages.\n\nWe consider a simple example before looking at the details.\
    \ First, consider the XML document given earlier (person.xml):\n\n```\n\n Newmarch\
    \ \n Jan \n\njan@newmarch.name\n\nj.newmarch@boxhill.edu.au\n\n```\n\nWe would\
    \ like to map this onto the Go structures:\n\n```\ntype Person struct {\nName\
    \ Name\nEmail []Email\n}\ntype Name struct {\nFamily string\nPersonal string\n\
    }\ntype Email struct {\nType string\nAddress string\n}\n```\n\nThis requires several\
    \ comments:\n\n*   Unmarshalling uses the Go reflection package. This requires\
    \ that all fields be exported; that is, start with a capital letter. Earlier versions\
    \ of Go used case-insensitive matching to match fields such as the XML string\
    \ “name” to the field `Name`. Now, though, *case-sensitive* matching is used.\
    \ To perform a match, the structure fields must be tagged to show the XML string\
    \ that will be matched against. This changes `Person` to the following:\n\n* \
    \  While tagging of fields can attach XML strings to fields, it can't do so with\
    \ the names of the structures. An additional field is required, with the field\
    \ name `XMLName`. This only affects the top-level struct, `Person`:\n\n```\ntype\
    \ Person struct {\nName Name `xml:\"name\"`\nEmail []Email `xml:\"email\"`\n}\n\
    ```\n\n*   Repeated tags map to a slice in Go.\n\n*   Attributes within tags will\
    \ match to fields in a structure only if the Go field has the tag `,attr`. This\
    \ occurs with the field `Type` of `Email`, where matching the attribute `type`\
    \ of the `email` tag requires `xml:\"type,attr\"`.\n\n*   If an XML tag has no\
    \ attributes and only has character data, then it matches a `string` field by\
    \ the same name (case-sensitive, though). So the tag `xml:\"family\"` with character\
    \ data `Newmarch` maps to the string field `Family`.\n\n*   But if the tag has\
    \ attributes, then it must map to a structure. Go assigns the character data to\
    \ the field with tag `,chardata`. This occurs with the `email` data and the field\
    \ `Address` with `tag ,chardata`.\n\n```\ntype Person struct {\nXMLName Name `xml:\"\
    person\"`\nName Name `xml:\"name\"`\nEmail []Email `xml:\"email\"`\n}\n```\n\n\
    A program to unmarshal the preceding document is `unmarshal.go`:\n\n```\nch12$\
    \ vi unmarshal.go\n/* Unmarshal\n*/\npackage main\nimport (\n\"encoding/xml\"\n\
    \"fmt\"\n\"log\"\n)\ntype Person struct {\nXMLName Name    `xml:\"person\"`\n\
    Name    Name    `xml:\"name\"`\nEmail   []Email `xml:\"email\"`\n}\ntype Name\
    \ struct {\nFamily   string `xml:\"family\"`\nPersonal string `xml:\"personal\"\
    `\n}\ntype Email struct {\nType    string `xml:\"type,attr\"`\nAddress string\
    \ `xml:\",chardata\"`\n}\nfunc main() {\nstr := `\n\n Newmarch \n Jan \n\njan@newmarch.name\n\
    \nj.newmarch@boxhill.edu.au\n\n`\nvar person Person\nerr := xml.Unmarshal([]byte(str),\
    \ &person)\ncheckError(err)\n// now use the person structure e.g.\nfmt.Println(\"\
    Family name: \\\"\" + person.Name.Family + \"\\\"\")\nfor _, email := range person.Email\
    \ {\nfmt.Println(email)\n}\n}\nfunc checkError(err error) {\nif err != nil {\n\
    log.Fatalln(\"Fatal error \", err.Error())\n}\n}\nch12$ go run unmarshal.go\n\
    Family name: \" Newmarch \"\n{personal\njan@newmarch.name\n}\n{work\nj.newmarch@boxhill.edu.au\n\
    }\n```\n\n(Note that the spaces are correct.) The strict rules are given in the\
    \ package specification; see `go doc -all encoding/xml`.\n\n## Marshalling XML\n\
    \nGo also has support for marshalling data structures into an XML document. The\
    \ function is\n\n```\nfunc Marshal(v interface}{) ([]byte, error)\n```\n\nA program\
    \ to marshal a simple structure is `marshal.go`:\n\n```\nch12$ vi marshal.go\n\
    /* Marshal\n*/\npackage main\nimport (\n\"encoding/xml\"\n\"fmt\"\n)\ntype Person\
    \ struct {\nXMLName xml.Name `xml:\"person\"`\nName    Name     `xml:\"name\"\
    `\nEmail   []Email  `xml:\"email\"`\n}\ntype Name struct {\nFamily   string `xml:\"\
    family\"`\nPersonal string `xml:\"personal\"`\n}\ntype Email struct {\nKind  \
    \  string \"attr\"\nAddress string \"chardata\"\n}\nfunc main() {\nperson := Person{\n\
    Name: Name{Family: \"Newmarch\", Personal: \"Jan\"},\nEmail: []Email{Email{Kind:\
    \ \"home\", Address: \"jan\"},\nEmail{Kind: \"work\", Address: \"jan\"}}}\nbuff,\
    \ _ := xml.Marshal(person)\nfmt.Println(string(buff))\n}\n```\n\nIt produces the\
    \ text with no whitespace.\n\n```\nch12$ go run marshal.go\nNewmarchJanhomejanworkjan\n\
    ```\n\n## Parsing XML\n\nGo has an XML parser that’s created using `NewDecoder`\
    \ from the `encoding/xml` package. This takes an `io.Reader` as a parameter and\
    \ returns a pointer to `Decoder`. The main method of this type is `Token`, which\
    \ returns the next token in the input stream. The token is one of these types:\
    \ `StartElement`, `EndElement`, `CharData`, `Comment`, `ProcInst`, or `Directive`.\n\
    \nThe XML types are `StartElement`, `EndElement`, `CharData`, `Comment`, `ProcInst`,\
    \ and `Directive`. They are described next.\n\n### The StartElement Type\n\nThe\
    \ type `StartElement` is a structure with two field types:\n\n```\ntype StartElement\
    \ struct {\nName Name\nAttr []Attr\n}\n```\n\nwhere\n\n```\ntype Attr struct {\n\
    Name  Name\nValue string\n}\n```\n\n### The EndElement Type\n\nThis is also a\
    \ structure as follows:\n\n```\ntype EndElement struct {\nName Name\n}\n```\n\n\
    ### The CharData Type\n\nThis type represents the text content enclosed by a tag\
    \ and is a simple type:\n\n```\ntype CharData []byte\n```\n\n### The Comment Type\n\
    \nSimilarly, for comments this type is similar to CharData’s type:\n\n```\ntype\
    \ Comment []byte\n```\n\n### The ProcInst Type\n\nA `ProcInst` represents an XML\
    \ processing instruction of the form `<?target inst?>`:\n\n```\ntype ProcInst\
    \ struct {\nTarget string\nInst   []byte\n}\n```\n\n### The Directive Type\n\n\
    A `Directive` represents an XML directive of the form `<!text>`. The bytes do\
    \ not include the `<!` and `>` markers.\n\n```\ntype Directive []byte\n```\n\n\
    A program to print out the tree structure of an XML document is `parsexml.go`:\n\
    \n```\nch12$ vi parsexml.go\n/* Parse XML\n*/\npackage main\nimport (\n\"encoding/xml\"\
    \n\"fmt\"\n\"io/ioutil\"\n\"log\"\n\"os\"\n\"strings\"\n)\nfunc main() {\nif len(os.Args)\
    \ != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"file\")\n}\nfile := os.Args[1]\n\
    bytes, err := ioutil.ReadFile(file)\ncheckError(err)\nr := strings.NewReader(string(bytes))\n\
    parser := xml.NewDecoder(r)\ndepth := 0\nfor {\ntoken, err := parser.Token()\n\
    if err != nil {\nbreak\n}\nswitch elmt := token.(type) {\ncase xml.StartElement:\n\
    name := elmt.Name.Local\nprintElmt(name+\":start\", depth)\ndepth++\ncase xml.EndElement:\n\
    depth--\nname := elmt.Name.Local\nprintElmt(name+\":end\", depth)\ncase xml.CharData:\n\
    printElmt(string([]byte(elmt)), depth)\ncase xml.Comment:\nprintElmt(\"Comment\"\
    , depth)\ncase xml.ProcInst:\nprintElmt(\"ProcInst\", depth)\ncase xml.Directive:\n\
    printElmt(\"Directive\", depth)\ndefault:\nfmt.Println(\"Unknown\")\n}\n}\n}\n\
    func printElmt(s string, depth int) {\nslimS := strings.TrimSpace(s)\nif len(slimS)\
    \ == 0 {\nreturn\n}\nfor n := 0; n < depth; n++ {\nfmt.Print(\"  \")\n}\nfmt.Println(slimS)\n\
    }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \"\
    , err.Error())\n}\n}\n```\n\nNote that the parser includes all `CharData`, including\
    \ the whitespace between the tags.\n\nIf we run the `parsexml.go` program against\
    \ the `person` data structure given earlier, as follows:\n\n```\nch12$ go run\
    \ parsexml.go person.xml\nperson:start\nname:start\nfamily:start\nNewmarch\nfamily:end\n\
    personal:start\nJan\npersonal:end\nname:end\nemail:start\njan@newmarch.name\n\
    email:end\nemail:start\nj.newmarch@boxhill.edu.au\nemail:end\nperson:end\n```\n\
    \nNote that as no DTD or other XML specification has been used, the tokenizer\
    \ correctly prints out all the whitespace (a DTD may specify that the whitespace\
    \ can be ignored, but without it, that assumption cannot be made). To make things\
    \ prettier, we removed extra space via Trim.\n\nThere is a potential trap in using\
    \ this parser. It reuses space for strings, so once you see a token, you need\
    \ to copy its value if you want to refer to it later. Go has methods such as func\
    \ (c CharData) Copy() CharData to make a copy of data; see go doc encoding.xml.Copy."
  trans: "\n## 解组 XML\n\nGo 提供了一个名为 `Unmarshal` 的函数，用于将 XML 解组到 Go 数据结构中。解组并非完美无缺：Go\
    \ 和 XML 是不同的语言。\n\n在深入细节之前，我们先看一个简单的例子。首先，考虑前面给出的 XML 文档（`person.xml`）：\n\n```xml\n\
    <person>\n<name>\n<family>Newmarch</family>\n<personal>Jan</personal>\n</name>\n\
    <email type=\"personal\">\njan@newmarch.name\n</email>\n<email type=\"work\">\n\
    j.newmarch@boxhill.edu.au\n</email>\n</person>\n```\n\n我们希望将其映射到 Go 结构体：\n\n```go\n\
    type Person struct {\n    Name  Name\n    Email []Email\n}\ntype Name struct {\n\
    \    Family   string\n    Personal string\n}\ntype Email struct {\n    Type  \
    \  string\n    Address string\n}\n```\n\n这需要几点说明：\n\n- 解组使用 Go 的反射包。这要求所有字段都必须是导出的，即以大写字母开头。早期版本的\
    \ Go 使用不区分大小写的匹配来匹配字段，例如将 XML 字符串 `\"name\"` 匹配到字段 `Name`。但现在使用的是*区分大小写*的匹配。为了执行匹配，结构体字段必须添加标签，以指明要匹配的\
    \ XML 字符串。这会将 `Person` 更改为以下形式：\n\n```go\ntype Person struct {\n    Name  Name\
    \    `xml:\"name\"`\n    Email []Email `xml:\"email\"`\n}\n```\n\n- 虽然字段标签可以将\
    \ XML 字符串附加到字段上，但它无法对结构体名称进行此操作。需要一个额外的字段，字段名为 `XMLName`。这只影响顶层结构体 `Person`：\n\
    \n```go\ntype Person struct {\n    XMLName Name    `xml:\"person\"`\n    Name\
    \    Name    `xml:\"name\"`\n    Email   []Email `xml:\"email\"`\n}\n```\n\n-\
    \ 重复的标签映射到 Go 中的切片。\n\n- 标签内的属性仅当 Go 字段具有标签 `,attr` 时才会匹配到结构体中的字段。`Email` 的 `Type`\
    \ 字段就是这种情况，匹配 `email` 标签的 `type` 属性需要 `xml:\"type,attr\"`。\n\n- 如果 XML 标签没有属性且仅包含字符数据，那么它将以相同的名称（但区分大小写）匹配一个\
    \ `string` 字段。因此，标签 `xml:\"family\"` 及其字符数据 `Newmarch` 映射到字符串字段 `Family`。\n\n\
    - 但如果标签有属性，则必须映射到一个结构体。Go 将字符数据分配给具有标签 `,chardata` 的字段。`email` 数据和具有标签 `,chardata`\
    \ 的字段 `Address` 就是这种情况。\n\n解组上述文档的程序是 `unmarshal.go`：\n\n```go\n/*\nch12$ vi unmarshal.go\n\
    /* Unmarshal\n*/\npackage main\nimport (\n\"encoding/xml\"\n\"fmt\"\n\"log\"\n\
    )\ntype Person struct {\nXMLName Name    `xml:\"person\"`\nName    Name    `xml:\"\
    name\"`\nEmail   []Email `xml:\"email\"`\n}\ntype Name struct {\nFamily   string\
    \ `xml:\"family\"`\nPersonal string `xml:\"personal\"`\n}\ntype Email struct {\n\
    Type    string `xml:\"type,attr\"`\nAddress string `xml:\",chardata\"`\n}\nfunc\
    \ main() {\nstr := `\n<person>\n<name>\n<family>Newmarch</family>\n<personal>Jan</personal>\n\
    </name>\n<email type=\"personal\">\njan@newmarch.name\n</email>\n<email type=\"\
    work\">\nj.newmarch@boxhill.edu.au\n</email>\n</person>\n`\nvar person Person\n\
    err := xml.Unmarshal([]byte(str), &person)\ncheckError(err)\n// now use the person\
    \ structure e.g.\nfmt.Println(\"Family name: \\\"\" + person.Name.Family + \"\\\
    \"\")\nfor _, email := range person.Email {\nfmt.Println(email)\n}\n}\nfunc checkError(err\
    \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
    /*\nch12$ go run unmarshal.go\nFamily name: \" Newmarch \"\n{personal\njan@newmarch.name\n\
    }\n{work\nj.newmarch@boxhill.edu.au\n}\n*/\n```\n\n（注意空格是正确的。）严格的规则在包规范中给出；请参阅\
    \ `go doc -all encoding/xml`。\n\n## 编组 XML\n\nGo 也支持将数据结构编组到 XML 文档中。该函数是：\n\n\
    ```go\nfunc Marshal(v interface}{) ([]byte, error)\n```\n\n一个编组简单结构的程序是 `marshal.go`：\n\
    \n```go\n/*\nch12$ vi marshal.go\n/* Marshal\n*/\npackage main\nimport (\n\"encoding/xml\"\
    \n\"fmt\"\n)\ntype Person struct {\nXMLName xml.Name `xml:\"person\"`\nName  \
    \  Name     `xml:\"name\"`\nEmail   []Email  `xml:\"email\"`\n}\ntype Name struct\
    \ {\nFamily   string `xml:\"family\"`\nPersonal string `xml:\"personal\"`\n}\n\
    type Email struct {\nKind    string \"attr\"\nAddress string \"chardata\"\n}\n\
    func main() {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal: \"\
    Jan\"},\nEmail: []Email{Email{Kind: \"home\", Address: \"jan\"},\nEmail{Kind:\
    \ \"work\", Address: \"jan\"}}}\nbuff, _ := xml.Marshal(person)\nfmt.Println(string(buff))\n\
    }\n/*\nch12$ go run marshal.go\nNewmarchJanhomejanworkjan\n*/\n```\n\n它会产生没有空白的文本。\n\
    \n## 解析 XML\n\nGo 有一个 XML 解析器，可以使用 `encoding/xml` 包中的 `NewDecoder` 创建。该函数接受一个\
    \ `io.Reader` 作为参数，并返回一个指向 `Decoder` 的指针。该类型的主要方法是 `Token`，它返回输入流中的下一个令牌。令牌是以下类型之一：`StartElement`、`EndElement`、`CharData`、`Comment`、`ProcInst`\
    \ 或 `Directive`。\n\nXML 类型是 `StartElement`、`EndElement`、`CharData`、`Comment`、`ProcInst`\
    \ 和 `Directive`。下面将对其进行描述。\n\n### StartElement 类型\n\n`StartElement` 类型是一个具有两个字段类型的结构体：\n\
    \n```go\ntype StartElement struct {\n    Name Name\n    Attr []Attr\n}\n```\n\n\
    其中：\n\n```go\ntype Attr struct {\n    Name  Name\n    Value string\n}\n```\n\n\
    ### EndElement 类型\n\n这也是一个结构体，如下所示：\n\n```go\ntype EndElement struct {\n    Name\
    \ Name\n}\n```\n\n### CharData 类型\n\n此类型表示标签括起来的文本内容，是一个简单类型：\n\n```go\ntype CharData\
    \ []byte\n```\n\n### Comment 类型\n\n类似地，对于注释，此类型与 `CharData` 的类型相似：\n\n```go\n\
    type Comment []byte\n```\n\n### ProcInst 类型\n\n`ProcInst` 表示形式为 `<?target inst?>`\
    \ 的 XML 处理指令：\n\n```go\ntype ProcInst struct {\n    Target string\n    Inst  \
    \ []byte\n}\n```\n\n### Directive 类型\n\n`Directive` 表示形式为 `<!text>` 的 XML 指令。字节不包括\
    \ `<!` 和 `>` 标记。\n\n```go\ntype Directive []byte\n```\n\n一个打印 XML 文档树结构的程序是 `parsexml.go`：\n\
    \n```go\n/*\nch12$ vi parsexml.go\n/* Parse XML\n*/\npackage main\nimport (\n\"\
    encoding/xml\"\n\"fmt\"\n\"io/ioutil\"\n\"log\"\n\"os\"\n\"strings\"\n)\nfunc\
    \ main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"file\"\
    )\n}\nfile := os.Args[1]\nbytes, err := ioutil.ReadFile(file)\ncheckError(err)\n\
    r := strings.NewReader(string(bytes))\nparser := xml.NewDecoder(r)\ndepth := 0\n\
    for {\ntoken, err := parser.Token()\nif err != nil {\nbreak\n}\nswitch elmt :=\
    \ token.(type) {\ncase xml.StartElement:\nname := elmt.Name.Local\nprintElmt(name+\"\
    :start\", depth)\ndepth++\ncase xml.EndElement:\ndepth--\nname := elmt.Name.Local\n\
    printElmt(name+\":end\", depth)\ncase xml.CharData:\nprintElmt(string([]byte(elmt)),\
    \ depth)\ncase xml.Comment:\nprintElmt(\"Comment\", depth)\ncase xml.ProcInst:\n\
    printElmt(\"ProcInst\", depth)\ncase xml.Directive:\nprintElmt(\"Directive\",\
    \ depth)\ndefault:\nfmt.Println(\"Unknown\")\n}\n}\n}\nfunc printElmt(s string,\
    \ depth int) {\nslimS := strings.TrimSpace(s)\nif len(slimS) == 0 {\nreturn\n\
    }\nfor n := 0; n < depth; n++ {\nfmt.Print(\"  \")\n}\nfmt.Println(slimS)\n}\n\
    func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
    }\n}\n*/\n```\n\n请注意，解析器会包含所有 `CharData`，包括标签之间的空白。\n\n如果我们对前面给出的 `person` 数据结构运行\
    \ `parsexml.go` 程序，如下所示：\n\n```\nch12$ go run parsexml.go person.xml\nperson:start\n\
    name:start\nfamily:start\nNewmarch\nfamily:end\npersonal:start\nJan\npersonal:end\n\
    name:end\nemail:start\njan@newmarch.name\nemail:end\nemail:start\nj.newmarch@boxhill.edu.au\n\
    email:end\nperson:end\n```\n\n请注意，由于没有使用 DTD 或其他 XML 规范，分词器正确地打印出了所有空白。（DTD 可能指定可以忽略空白，但如果没有\
    \ DTD，则不能做此假设。）为了使输出更美观，我们通过 `Trim` 移除了额外的空格。\n\n使用此解析器存在一个潜在的陷阱。它会重用字符串的空间，因此一旦你看到一个令牌，如果之后还想引用它，就需要复制其值。Go\
    \ 提供了诸如 `func (c CharData) Copy() CharData` 之类的方法来复制数据；请参阅 `go doc encoding.xml.Copy`。\n"
- fmt: '# XHTML


    HTML does not conform to XML syntax. It has unterminated tags such as `<br>`.
    XHTML is a cleanup of HTML to make it compliant with XML. Documents in XHTML can
    be managed using the techniques mentioned before for XML. XHTML does not appear
    to be as widely used as originally expected. My own suspicion is that an HTML
    parser is usually tolerant of errors and, when used in a browser, generally makes
    a reasonable job of rendering a document; XHTML parsers even in a browser tend
    to be more strict and often fail to render anything upon encountering even a single
    XML error. This is not a generally appropriate behavior for user-facing software.


    # HTML


    There is some support in the `xml` package to handle HTML documents even though
    they may not be XML compliant. The XML parser discussed earlier can handle many
    HTML documents if it is modified by turning off strict parse checking.


    ```

    parser := xml.NewDecoder(r)

    parser.Strict = false

    parser.AutoClose = xml.HTMLAutoClose

    parser.Entity = xml.HTMLEntity

    ```


    # Conclusion


    Go has basic support for dealing with XML strings. It does not as yet have mechanisms
    for dealing with XML specification languages such as XML Schema or Relax NG.


    # Remote Procedure Call


    Socket and HTTP programming both use a message-passing paradigm. A client sends
    a message to a server, which usually sends a message back. Both sides are responsible
    for creating messages in a format understood by both sides and reading the data
    out of those messages.


    However, most stand-alone applications do not use message-passing techniques much.
    Generally, the preferred mechanism is that of the *function* (or method or procedure)
    call. In this style, a program will call a function with a list of parameters
    and, on completion of the function call, will have a set of return values. These
    values may be the function value, or if addresses have been passed as parameters,
    then the contents of those addresses might have been changed.


    The remote procedure call is an attempt to bring this style of programming into
    the network world. Thus, a client will make what looks to it like a normal procedure
    call. The client side will package this into a network message and transfer it
    to the server. The server will unpack this and turn it back into a procedure call
    on the server side. The results of this call will be packaged up for return to
    the client.


    Diagrammatically, it looks like Figure [13-1](#436770_2_En_13_Chapter.xhtml#Fig1).


    ![](images/436770_2_En_13_Chapter/436770_2_En_13_Fig1_HTML.png)


    **Figure 13-1** The remote procedure call steps


    The steps are as follows:


    1.  The client calls the client procedure stubs. The stub packages the parameters
    into a network message. This is called *marshalling*.


    2.  Networking routines in the O/S kernel are called by the stub to send the message.


    3.  The kernel sends the message(s) to the remote system. This may be connection
    oriented or connectionless.


    4.  The server procedure stubs unmarshal the arguments from the network message.


    5.  The server procedure stubs execute server procedure implementations.


    6.  The procedures complete, returning execution to the server procedure stubs.


    7.  The server stubs marshal the return values into a network message.


    8.  The return messages are sent back.


    9.  The client procedure stubs read the messages using the network routines.


    10.  The message is unmarshalled, and the return values are set on the stack for
    the client program.


    There are two common styles for implementing RPC. The first is typified by Sun’s
    ONC/RPC and by CORBA. In this, a specification of the service is given in some
    abstract language such as CORBA IDL (interface definition language). This is then
    compiled into code for the client and for the server. The client then writes a
    normal program containing calls to a procedure/function/method, which is linked
    to the generated client-side code. The server-side code is actually a server itself,
    which is linked to the procedure implementation that you write.


    In this first way, the client-side code is almost identical in appearance to a
    normal procedure call. Generally, there is a little extra code to locate the server.
    In Sun’s ONC, the address of the server must be known; in CORBA, a naming service
    is called to find the address of the server; in Java RMI, the IDL is Java itself,
    and a naming service is used to find the address of the service.


    In the second style, you have to use a special client API. You hand the function
    name and its parameters to this library on the client side. On the server side,
    you have to explicitly write the server yourself, as well as the remote procedure
    implementation.


    This second approach is used by many RPC systems, such as Web Services. It is
    also the approach used by Go’s RPC.


    ## Go’s RPC


    Go''s RPC is so far unique to Go. It is different than the other RPC systems,
    so a Go client will only talk to a Go server. It uses the Gob serialization system
    discussed in Chapter [4](#436770_2_En_4_Chapter.xhtml), which defines the data
    types that can be used.


    RPC systems generally make some restrictions on the functions that can be called
    across the network. This is so that the RPC system can properly determine which
    value arguments are sent, which reference arguments receive answers, and how to
    signal errors.


    In Go, the restriction is that:


    *   The method''s type is exported (it begins with a capital letter).


    *   The method is exported.


    *   The method has two arguments, both exported (or built-in) types. The first
    is for data passed into the method; the second is for returned results.


    *   The method’s second argument is a pointer.


    *   It has a return value of type `error`.


    For example, here is a valid function:


    ```

    F(T1, &T2) error

    ```


    The restriction on arguments means that you typically have to define a structure
    type. Go’s RPC uses the `gob` package for marshalling and unmarshalling data,
    so the argument types have to follow the rules of Gob as discussed in an earlier
    chapter.


    We will follow the example given in the Go documentation, as it illustrates the
    important points. The server performs two trivial operations – they do not require
    the “grunt” of RPC but are simple to understand. The two operations are to multiply
    two integers and to find the quotient and remainder after dividing the first by
    the second.


    The two values to be manipulated are given in a structure:


    ```

    type Values struct {

    A, B int

    }

    ```


    The product is just an `int`, while the quotient/remainder is another structure:


    ```

    type Quotient struct {

    Quo, Rem int

    }

    ```


    We will have two functions, `multiply` and `divide`, to be callable on the RPC
    server. These functions need to be registered with the RPC system. The `Register`
    function takes a single parameter, which is an interface. So we need a type with
    these two functions:


    ```

    type Arith int

    func (t *Arith) Multiply(args *Args, reply *int) error {

    *reply = args.A * args.B

    return nil

    }

    func (t *Arith) Divide(args *Args, quo *Quotient) error {

    if args.B == 0 {

    return errors.New("divide by zero")

    }

    quo.Quo = args.A / args.B

    quo.Rem = args.A % args.B

    return nil

    }

    ```


    The underlying type of `Arith` is given as `int`. That doesn’t matter – any type
    will suffice.


    An object of this type can now be registered using `Register`, and then its methods
    can be called by the RPC system.'
  raw: '## XHTML


    HTML does not conform to XML syntax. It has unterminated tags such as `<br>`.
    XHTML is a cleanup of HTML to make it compliant with XML. Documents in XHTML can
    be managed using the techniques mentioned before for XML. XHTML does not appear
    to be as widely used as originally expected. My own suspicion is that an HTML
    parser is usually tolerant of errors and, when used in a browser, generally makes
    a reasonable job of rendering a document; XHTML parsers even in a browser tend
    to be more strict and often fail to render anything upon encountering even a single
    XML error. This is not a generally appropriate behavior for user-facing software.


    ## HTML


    There is some support in the XML package to handle HTML documents even though
    they may not be XML compliant. The XML parser discussed earlier can handle many
    HTML documents if it is modified by turning off strict parse checking.


    ```

    parser := xml.NewDecoder(r)

    parser.Strict = false

    parser.AutoClose = xml.HTMLAutoClose

    parser.Entity = xml.HTMLEntity

    ```


    ## Conclusion


    Go has basic support for dealing with XML strings. It does not as yet have mechanisms
    for dealing with XML specification languages such as XML Schema or Relax NG.


    # 13. Remote Procedure Call


    Socket and HTTP programming both use a message-passing paradigm. A client sends
    a message to a server, which usually sends a message back. Both sides are responsible
    for creating messages in a format understood by both sides and reading the data
    out of those messages.


    However, most stand-alone applications do not use message-passing techniques much.
    Generally, the preferred mechanism is that of the *function* (or method or procedure)
    call. In this style, a program will call a function with a list of parameters
    and, on completion of the function call, will have a set of return values. These
    values may be the function value, or if addresses have been passed as parameters,
    then the contents of those addresses might have been changed.


    The remote procedure call is an attempt to bring this style of programming into
    the network world. Thus, a client will make what looks to it like a normal procedure
    call. The client side will package this into a network message and transfer it
    to the server. The server will unpack this and turn it back into a procedure call
    on the server side. The results of this call will be packaged up for return to
    the client.


    Diagrammatically, it looks like Figure [13-1](#436770_2_En_13_Chapter.xhtml#Fig1).


    ![](images/436770_2_En_13_Chapter/436770_2_En_13_Fig1_HTML.png)


    Figure 13-1


    The remote procedure call steps


    The steps are as follows:


    1.  The client calls the client procedure stubs. The stub packages the parameters
    into a network message. This is called *marshalling*.


    2.  Networking routines in the O/S kernel are called by the stub to send the message.


    3.  The kernel sends the message(s) to the remote system. This may be connection
    oriented or connectionless.


    4.  The server procedure stubs unmarshal the arguments from the network message.


    5.  The server procedure stubs execute server procedure implementations.


    6.  The procedures complete, returning execution to the server procedure stubs.


    7.  The server stubs marshal the return values into a network message.


    8.  The return messages are sent back.


    9.  The client procedure stubs read the messages using the network routines.


    10.  The message is unmarshalled, and the return values are set on the stack for
    the client program.


    There are two common styles for implementing RPC. The first is typified by Sun’s
    ONC/RPC and by CORBA. In this, a specification of the service is given in some
    abstract language such as CORBA IDL (interface definition language). This is then
    compiled into code for the client and for the server. The client then writes a
    normal program containing calls to a procedure/function/method, which is linked
    to the generated client-side code. The server-side code is actually a server itself,
    which is linked to the procedure implementation that you write.


    In this first way, the client-side code is almost identical in appearance to a
    normal procedure call. Generally, there is a little extra code to locate the server.
    In Sun’s ONC, the address of the server must be known; in CORBA, a naming service
    is called to find the address of the server; in Java RMI, the IDL is Java itself,
    and a naming service is used to find the address of the service.


    In the second style, you have to use a special client API. You hand the function
    name and its parameters to this library on the client side. On the server side,
    you have to explicitly write the server yourself, as well as the remote procedure
    implementation.


    This second approach is used by many RPC systems, such as Web Services. It is
    also the approach used by Go’s RPC.


    ## Go’s RPC


    Go''s RPC is so far unique to Go. It is different than the other RPC systems,
    so a Go client will only talk to a Go server. It uses the Gob serialization system
    discussed in Chapter [4](#436770_2_En_4_Chapter.xhtml), which defines the data
    types that can be used.


    RPC systems generally make some restrictions on the functions that can be called
    across the network. This is so that the RPC system can properly determine which
    value arguments are sent, which reference arguments receive answers, and how to
    signal errors.


    In Go, the restriction is that


    *   The method''s type is exported (it begins with a capital letter).


    *   The method is exported.


    *   The method has two arguments, both exported (or built-in) types. The first
    is for data passed into the method; the second is for returned results.


    *   The method’s second argument is a pointer.


    *   It has a return value of type `error`.


    For example, here is a valid function:


    ```

    F(T1, &T2) error

    ```


    The restriction on arguments means that you typically have to define a structure
    type. Go’s RPC uses the `gob` package for marshalling and unmarshalling data,
    so the argument types have to follow the rules of Gob as discussed in an earlier
    chapter.


    We will follow the example given in the Go documentation, as it illustrates the
    important points. The server performs two trivial operations `–` they do not require
    the “grunt” of RPC but are simple to understand. The two operations are to multiply
    two integers and to find the quotient and remainder after dividing the first by
    the second.


    The two values to be manipulated are given in a structure:


    ```

    type Values struct {

    A, B int

    }

    ```


    The product is just an `int`, while the quotient/remainder is another structure:


    ```

    type Quotient struct {

    Quo, Rem int

    }

    ```


    We will have two functions, `multiply` and `divide`, to be callable on the RPC
    server. These functions need to be registered with the RPC system. The `Register`
    function takes a single parameter, which is an interface. So we need a type with
    these two functions:


    ```

    type Arith int

    func (t *Arith) Multiply(args *Args, reply *int) error {

    *reply = args.A * args.B

    return nil

    }

    func (t *Arith) Divide(args *Args, quo *Quotient) error {

    if args.B == 0 {

    return errors.New("divide by zero")

    }

    quo.Quo = args.A / args.B

    quo.Rem = args.A % args.B

    return nil

    }

    ```


    The underlying type of `Arith` is given as `int`. That doesn’t matter `–` any
    type will suffice.


    An object of this type can now be registered using `Register`, and then it’s methods
    can be called by the RPC system.'
