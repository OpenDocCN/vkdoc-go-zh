  \n...\n```\n\n这个请求是通过 HTTP/2 发送的。Go 库已经为你执行了版本协商。基于 TLS 握手和其他信息，Go 会升级到 HTTP/2。同样，这些便捷函数和相关的客户端使得在\
  \ Go 中开始使用 HTTP 变得很容易。如果你想继续使用 HTTP/1.1，可以尝试以下覆盖方法：\n\n```\nGODEBUG=http2client=0\
  \ go run get.go https://go.dev\n```\n\n相关代码的文档如下所示：\n\n```\nch8$ go doc -u net/http\
  \ onceSetNextProtoDefaults\npackage http // import \"net/http\"\nfunc (srv *Server)\
  \ onceSetNextProtoDefaults()\nonceSetNextProtoDefaults configures HTTP/2, if the\
  \ user hasn't configured\notherwise. (by setting srv.TLSNextProto non-nil) It must\
  \ only be called via\nsrv.nextProtoOnce (use srv.setupHTTP2_*).\nfunc (t *Transport)\
  \ onceSetNextProtoDefaults()\nonceSetNextProtoDefaults initializes TLSNextProto.\
  \ It must be called via\nt.nextProtoOnce.Do.\n```\n\n稍后，我们将研究自定义客户端行为。上一章讨论的类型存在重要的字符集问题。服务器将使用某种字符集编码，并且可能使用某种传输编码来传送内容。通常，这取决于用户代理和服务器之间的协商，但我们在\
  \ `GET` 命令中使用的简单方法不包含协商的用户代理部分。因此，服务器可以发送它想要的任何字符编码。\n\n在最初编写时，我（Jan）在中国（并且可以访问\
  \ Google）。当我在 `www.google.com` 上尝试这个程序时，Google 的服务器试图通过猜测我的位置，并用中文字符集 Big5 向我发送文本，这“很有帮助”！如何告诉服务器我可以接受哪种字符编码将在后面讨论。\n\
  \n\n```markdown\n## 配置 HTTP 请求\n\nGo 也提供了一个较低级别的接口，供用户代理与 HTTP 服务器通信。正如你所料，这不仅能让你对客户端请求拥有更多控制权，也要求你在构建请求时投入更多精力。不过，复杂性仅略有增加。\n\
  \n用于构建请求的数据类型是 `Request` 类型；请查阅相关文档。\n\n```\ntype Request struct {\n    Method string\n\
  \    URL *url.URL\n    Proto      string // \"HTTP/1.0\"\n    ProtoMajor int   \
  \ // 1\n    ProtoMinor int    // 0\n    Header Header\n    Body io.ReadCloser\n\
  \    GetBody func() (io.ReadCloser, error)\n    ContentLength int64\n    TransferEncoding\
  \ []string\n    Close bool\n    Host string\n    Form url.Values\n    PostForm url.Values\n\
  \    MultipartForm *multipart.Form\n    Trailer Header\n    RemoteAddr string\n\
  \    RequestURI string\n    TLS *tls.ConnectionState\n    Cancel <-chan struct{}\n\
  \    Response *Response\n}\n```\n\n以下是相关方法：\n\n```\nfunc (r *Request) AddCookie(c\
  \ *Cookie)\nfunc (r *Request) BasicAuth() (username, password string, ok bool)\n\
  func (r *Request) Clone(ctx context.Context) *Request\nfunc (r *Request) Context()\
  \ context.Context\nfunc (r *Request) Cookie(name string) (*Cookie, error)\nfunc\
  \ (r *Request) Cookies() []*Cookie\nfunc (r *Request) FormFile(key string) (multipart.File,\
  \ *multipart.FileHeader, error)\nfunc (r *Request) FormValue(key string) string\n\
  func (r *Request) MultipartReader() (*multipart.Reader, error)\nfunc (r *Request)\
  \ ParseForm() error\nfunc (r *Request) ParseMultipartForm(maxMemory int64) error\n\
  func (r *Request) PostFormValue(key string) string\nfunc (r *Request) ProtoAtLeast(major,\
  \ minor int) bool\nfunc (r *Request) Referer() string\nfunc (r *Request) SetBasicAuth(username,\
  \ password string)\nfunc (r *Request) UserAgent() string\nfunc (r *Request) WithContext(ctx\
  \ context.Context) *Request\nfunc (r *Request) Write(w io.Writer) error\nfunc (r\
  \ *Request) WriteProxy(w io.Writer) error\n```\n\n`Request` 的一些方法用于客户端设置；另一些则被服务器用来检索信息。\n\
  \n请求中可以存储大量信息。你无需填充所有字段，只需关注那些你感兴趣的字段。使用如下方式创建具有默认值的请求是最简单的方法，例如：\n\n```\nrequest,\
  \ err := http.NewRequest(\"GET\", url.String(), nil)\n```\n\n一旦创建了请求，你就可以修改这些字段。例如，要指定只接收\
  \ UTF-8 编码，可以像下面这样向请求添加一个 `Accept-Charset` 字段：\n\n```\nrequest.Header.Add(\"Accept-Charset\"\
  , \"UTF-8;q=1, ISO-8859-1;q=0\")\n```\n\n（注意，除非像我们这样在列表中明确指定，否则默认的 ISO-8859-1 始终获得值为\
  \ 1。别忘了 HTTP 1.1 规范可是 1999 年的产物！）\n\n设置客户端请求的 `charset` 很简单。但对于服务器返回的字符集值如何处理，则存在一些困惑。返回的资源*应该*包含一个\
  \ `Content-Type`，用以指定内容的媒体类型，例如 `text/html`。如果合适，媒体类型应该声明字符集，例如 `text/html; charset=UTF-8`。如果没有指定字符集，那么根据\
  \ HTTP 规范，应将其视为默认的 ISO-8859-1 字符集。但 HTML4 规范指出，由于许多服务器并不遵守此规定，你不能做出任何假设。\n\n如果服务器的\
  \ `Content-Type` 中指定了字符集，就假定它是正确的。如果未指定，考虑到超过 50% 的页面使用 UTF-8 编码，还有部分使用 ASCII，因此假定为\
  \ UTF-8 是安全的。只有不到 10% 的页面可能会出问题 :-(。\n\n### 客户端对象\n\n要向服务器发送请求并获取回复，使用便捷对象 `Client`\
  \ 是最简单的方式。该对象可以管理多个请求，并处理诸如服务器是否保持 TCP 连接存活等问题。\n\n下面的程序 `clientget.go` 对此进行了说明。\n\
  \n该程序展示了如何添加 HTTP 头部，正如我们添加 `Accept-Charset` 头部以仅接受 UTF-8 编码。这里有一个小问题，由 Go 的一个 bug\
  \ 引起，该 bug 仅在 Go 1.8 中修复。`Client.Do` 函数在收到 301、302、303 或 307 响应时会自动执行重定向。在 Go 1.8\
  \ 之前，它在重定向时不会复制 HTTP 头部。\n\n如果你尝试访问像 [`http://www.google.com`](http://www.google.com)\
  \ 这样的站点，它会重定向到像 [`http://www.google.com.au`](http://www.google.com.au) 这样的站点，但会丢失\
  \ `Accept-Charset` 头部，并返回 ISO-8859-1（按照 1999 年 HTTP 1.1 规范，这是正确的行为）。考虑到这个前提 —— 即该程序在\
  \ Go 1.8 之前的版本上可能无法给出正确结果 —— 程序如下：\n\n```\nch8$ vi clientget.go\n/* ClientGet\n\
  */\npackage main\n\nimport (\n    \"io\"\n    \"fmt\"\n    \"log\"\n    \"net/http\"\
  \n    \"net/http/httputil\"\n    \"net/url\"\n    \"os\"\n    \"strings\"\n)\n\n\
  func main() {\n    if len(os.Args) != 2 {\n        log.Fatalln(\"Usage: \", os.Args[0],\
  \ \"http://host:port/page\")\n    }\n    url, err := url.Parse(os.Args[1])\n   \
  \ checkError(err)\n\n    client := &http.Client{}\n\n    request, err := http.NewRequest(\"\
  HEAD\", url.String(), nil)\n    // 仅接受 UTF-8\n    request.Header.Add(\"Accept-Charset\"\
  , \"utf-8;q=1,ISO-8859-1;q=0\")\n    checkError(err)\n\n    response, err := client.Do(request)\n\
  \    checkError(err)\n\n    if response.StatusCode != http.StatusOK {\n        log.Fatalln(response.Status)\n\
  \    }\n\n    fmt.Println(\"响应头部信息为\")\n    b, _ := httputil.DumpResponse(response,\
  \ false)\n    fmt.Print(string(b))\n\n    chSet := getCharset(response)\n    if\
  \ chSet != \"utf-8\" {\n        log.Fatalln(\"无法处理\", chSet)\n    }\n\n    var buf\
  \ [512]byte\n    reader := response.Body\n    fmt.Println(\"获取到响应体\")\n    for {\n\
  \        n, err := reader.Read(buf[0:])\n        if err != nil {\n            if\
  \ err == io.EOF {\n                fmt.Print(string(buf[0:n]))\n               \
  \ break\n            }\n            checkError(err)\n        }\n        fmt.Print(string(buf[0:n]))\n\
  \    }\n}\n\nfunc getCharset(response *http.Response) string {\n    contentType\
  \ := response.Header.Get(\"Content-Type\")\n    if contentType == \"\" {\n     \
  \   // 猜测\n        return \"utf-8\"\n    }\n    idx := strings.Index(contentType,\
  \ \"charset=\")\n    if idx == -1 {\n        // 猜测\n        return \"utf-8\"\n \
  \   }\n    // 找到 charset 后将其移除\n    chSet := strings.Trim(contentType[idx+8:], \"\
  \ \")\n    return strings.ToLower(chSet)\n}\n\nfunc checkError(err error) {\n  \
  \  if err != nil {\n        log.Fatalln(\"致命错误 \", err.Error())\n    }\n}\n```\n\
  \n例如，按如下方式运行该程序：\n\n```\nch8$ go run clientget.go https://go.dev\n响应头部信息为\nHTTP/2.0\
  \ 200 OK\nConnection: close\nContent-Security-Policy: connect-src 'self' www.google-analytics.com\
  \ stats.g.doubleclick.net ; default-src 'self' ; font-src 'self' fonts.googleapis.com\
  \ fonts.gstatic.com data: ; frame-ancestors 'self' ; frame-src 'self' www.google.com\
  \ feedback.googleusercontent.com www.googletagmanager.com scone-pa.clients6.google.com\
  \ www.youtube.com player.vimeo.com ; img-src 'self' www.google.com www.google-analytics.com\
  \ ssl.gstatic.com www.gstatic.com gstatic.com data: * ; object-src 'none' ; script-src\
  \ 'self' 'sha256-n6OdwTrm52KqKm6aHYgD0TFUdMgww4a0GQlIAVrMzck=' 'sha256-4ryYrf7Y5daLOBv0CpYtyBIcJPZkRD2eBPdfqsN3r1M='\
  \ 'sha256-sVKX08+SqOmnWhiySYk3xC7RDUgKyAkmbXV2GWts4fo=' www.google.com apis.google.com\
  \ www.gstatic.com gstatic.com support.google.com www.googletagmanager.com www.google-analytics.com\
  \ ssl.google-analytics.com tagmanager.google.com ; style-src 'self' 'unsafe-inline'\
  \ fonts.googleapis.com feedback.googleusercontent.com www.gstatic.com gstatic.com\
  \ tagmanager.google.com ;\nContent-Type: text/html; charset=utf-8\nDate: Thu, 31\
  \ Mar 2022 23:45:09 GMT\nServer: Google Frontend\nStrict-Transport-Security: max-age=31536000;\
  \ includeSubDomains; preload\nVary: Accept-Encoding\nX-Cloud-Trace-Context: 9caa17c0647c300f6e52d795661bf512\n\
  获取到响应体\n```\n\n\n## 代理处理\n\n现今，HTTP 请求通过特定的 HTTP 代理进行转发已非常普遍。这是在构成 TCP 连接并在应用层运行的服务器之外的另一层。企业使用代理来限制员工可访问的内容，而许多组织则使用\
  \ Cloudflare 等代理服务作为缓存，减轻自身服务器的负载。通过代理访问网站需要客户端进行额外的处理。\n\n### 简单代理\n\nHTTP 1.1\
  \ 规定了 HTTP 应如何通过代理工作。应向代理发送 `GET` 请求，但所请求的 URL 应是目标服务器的完整 URL。此外，HTTP 头部应包含 `Host`\
  \ 字段，并将其设置为代理地址。只要代理配置为允许通过此类请求，即完成所有必要步骤。\n\nGo 将这一功能视为 HTTP 传输层的一部分。为此，它提供了一个\
  \ `Transport` 结构体。该结构体包含一个字段，可设置为一个*函数*，该函数返回代理的 URL。如果我们有一个代理的 URL 字符串，可以创建相应的传输对象，然后将其赋值给客户端对象，如下所示：\n\
  \n```\n// 准备传输\nproxyURL, err := url.Parse(proxyString)\n// 支持 HTTP 代理的 RoundTripper\
  \ 实现\n// 参见 go doc net/http.RoundTripper\ntransport := &http.Transport{Proxy: http.ProxyURL(proxyURL)}\n\
  // 用于发送 HTTP 请求\nclient := &http.Client{Transport: transport}\n```\n\n然后客户端便可以像之前一样继续操作。\n\
  \n以下程序 `proxyget.go` 演示了这一点。\n\n```\nch8$ vi proxyget.go\n/* ProxyGet\n*/\npackage\
  \ main\nimport (\n\"fmt\"\n\"io\"\n\"log\"\n\"net/http\"\n\"net/url\"\n\"os\"\n\
  )\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"\
  http://host:port/page\")\n}\nrawURL := os.Args[1]\nurl, err := url.Parse(rawURL)\n\
  checkError(err)\nresponse, err := http.Get(url.String())\ncheckError(err)\nfmt.Println(\"\
  Read ok\")\nif response.StatusCode != http.StatusOK {\nlog.Fatalln(response.StatusCode)\n\
  }\nfmt.Println(\"Response ok\")\nvar buf [512]byte\nreader := response.Body\nfor\
  \ {\nn, err := reader.Read(buf[0:])\nif err != nil {\nif err == io.EOF {\nfmt.Print(string(buf[0:n]))\n\
  reader.Close()\nbreak\n}\ncheckError(err)\n}\nfmt.Print(string(buf[0:n]))\n}\n}\n\
  func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
  }\n}\n```\n\n如果你有一个代理，比如位于 `XYZ.com` 的 8080 端口，可以按如下方式测试：\n\n```\nch8$ go run proxyget.go\
  \ http://XYZ.com:8080 https://www.google.com\n```\n\n如果没有合适的代理进行测试，可以下载并安装 Squid\
  \ 代理（[`http://www.squid-cache.org/`](http://www.squid-cache.org/)）到你的电脑上。例如，在安装了\
  \ Homebrew 的 Mac 上：\n\n```\nch8$ brew install squid       // 通过 Homebrew 安装\nch8$\
  \ brew service start squid // 在 3128 端口运行 Squid\n```\n\n现在，你可以针对本地运行的代理来运行客户端。\n\
  \n```\nch8$ HTTP_PROXY=localhost:3128 go run proxyget.go https://www.google.com\n\
  Read ok\nResponse ok\n<html itemscope=\"\"...\n```\n\n这个程序通过环境变量 `HTTP_PROXY` 将代理信息传递给程序。应用程序获知代理信息的方式有很多种。大多数浏览器都有配置菜单，可以输入代理信息；但\
  \ Go 应用程序无法获取这些信息。一些应用程序可能通过网络代理自动发现协议（WPAD – [`https://en.wikipedia.org/wiki/Web_Proxy_Autodiscovery_Protocol`](https://en.wikipedia.org/wiki/Web_Proxy_Autodiscovery_Protocol)），通过网络中某个位置的\
  \ `proxy.pac` 文件来获取代理信息。Go 目前（尚）无法解析这些 JavaScript 文件，因此无法使用它们。特定的操作系统可能有系统特定的方式来指定代理，Go\
  \ 也无法访问这些信息。但是，如果代理信息设置在操作系统环境变量中，例如 `HTTP_PROXY` 或 `http_proxy`，Go 可以通过以下函数找到它：\n\
  \n```\nfunc ProxyFromEnvironment(req *Request) (*url.URL, error)\n```\n\n如果你的程序运行在这种环境中，可以使用此函数，而无需显式知道代理参数。更多信息请参阅\
  \ `go doc net/http ProxyFromEnvironment`。\n\n### 认证代理\n\n某些代理会要求提供用户名和密码进行身份验证，才能通过请求。一种常见的方案是“基本认证”，即将用户名和密码拼接成字符串\
  \ `\"user:password\"`，然后进行 Base64 编码。随后，通过 HTTP 请求头 `\"Proxy-Authorization\"` 将其发送给代理，并指明是基本认证。\n\
  \n以下程序 `proxyauthget.go` 演示了这一点，在之前的代理程序中添加了 `Proxy-Authentication` 头部：\n\n```\n\
  ch8$ vi proxyauthget.go\n/* ProxyAuthGet\n*/\npackage main\nimport (\n\"encoding/base64\"\
  \n\"fmt\"\n\"io\"\n\"net/http\"\n\"net/http/httputil\"\n\"net/url\"\n\"os\"\n)\n\
  const auth = \"jannewmarch:mypassword\"\nfunc main() {\nif len(os.Args) != 3 {\n\
  fmt.Println(\"Usage: \", os.Args[0], \"http://proxy-host:port http://host:port/page\"\
  )\nos.Exit(1)\n}\nproxy := os.Args[1]\nproxyURL, err := url.Parse(proxy)\ncheckError(err)\n\
  rawURL := os.Args[2]\nurl, err := url.Parse(rawURL)\ncheckError(err)\n// 编码认证信息\n\
  basic := \"Basic \" +\nbase64.StdEncoding.EncodeToString([]byte(auth))\ntransport\
  \ := &http.Transport{Proxy: http.ProxyURL(proxyURL)}\nclient := &http.Client{Transport:\
  \ transport}\nrequest, err := http.NewRequest(\"GET\", url.String(), nil)\nrequest.Header.Add(\"\
  Proxy-Authorization\", basic)\ndump, _ := httputil.DumpRequest(request, false)\n\
  fmt.Println(string(dump))\n// 发送请求\nresponse, err := client.Do(request)\ncheckError(err)\n\
  fmt.Println(\"Read ok\")\nif response.Status != \"200 OK\" {\nfmt.Println(response.Status)\n\
  os.Exit(2)\n}\nfmt.Println(\"Response ok\")\nvar buf [512]byte\nreader := response.Body\n\
  for {\nn, err := reader.Read(buf[0:])\nif err != nil {\nos.Exit(0)\n}\nfmt.Print(string(buf[0:n]))\n\
  }\nos.Exit(0)\n}\nfunc checkError(err error) {\nif err != nil {\nif err == io.EOF\
  \ {\nreturn\n}\nfmt.Println(\"Fatal error \", err.Error())\nos.Exit(1)\n}\n}\n```\n\
  \n这类程序似乎没有公开的测试站点。我在一个使用认证代理的工作环境中进行了测试。设置此类代理超出了本书的范围。关于如何设置，有一篇名为“如何使用用户名和密码基本认证设置\
  \ Squid 代理”的讨论（参见 [`http://stackoverflow.com/questions/3297196/how-to-set-up-a-squid-proxy-with-basic-username-and-password-authentication`](http://stackoverflow.com/questions/3297196/how-to-set-up-a-squid-proxy-with-basic-username-and-password-authentication)）。\n\
  \n当前代码硬编码了用户名和密码。如果使用错误的登录信息，可能会收到类似以下的错误：\n\n```\nch8$ go run proxyauthget.go http://localhost:3128/\
  \ http://www.google.com\nGET / HTTP/1.1\nHost: www.google.com\nProxy-Authorization:\
  \ Basic amphbm5ld21hcmNoOm15cGFzc3dvcmQ=\nRead ok\n407 Proxy Authentication Required\n\
  exit status 2\n```\n\n如果正常工作，你将收到与无需认证的代理类似的结果。\n\n```\nch8$ go run proxyauthget.go\
  \ http://localhost:3128/ http://www.google.com\nGET / HTTP/1.1\nHost: www.google.com\n\
  Proxy-Authorization: Basic amFubmV3bWFyY2g6bXlwYXNzd29yZA==\nRead ok\nResponse ok\n\
  <html...\n```\n\n\n\n## 客户端的 HTTPS 连接\n\n为了安全加密的连接，HTTP 使用了第 7 章中描述的 TLS 协议。HTTP+TLS\
  \ 协议被称为 HTTPS，它使用 `https://` 的 URL 而非 `http://` 的 URL。\n\n服务器必须在客户端接受其数据之前返回有效的\
  \ X.509 证书。如果证书有效，那么 Go 会在底层处理一切，前面给出的客户端在 HTTPS 的 URL 下也能正常运行。也就是说，像之前的 `clientget.go`\
  \ 这样的程序无需修改即可运行——你只需给它一个 HTTPS 的 URL 即可。\n\n许多站点拥有无效的证书。它们可能已过期，可能是自签名而非由公认的证书颁发机构签名，或者可能存在错误（例如服务器名称不正确）。像\
  \ Firefox 这样的浏览器会显示一个带有“赶紧离开这里！”按钮的巨大警告，但你可以自行承担风险继续访问，很多人也正是这样做的。\n\n当遇到证书错误时，Go\
  \ 目前会直接中止。不过，你可以配置客户端忽略证书错误。当然，不建议这样做——证书配置错误的站点可能存在其他问题。\n\n在第 7 章中，我们生成了自签名的 X.509\
  \ 证书。在本章稍后部分，我们将提供一个使用 X.509 证书的 HTTPS 服务器，如果使用了自签名证书，那么 `clientget.go` 将会产生以下错误：\n\
  \n```\nx509: certificate signed by unknown authority\n```\n\n通过启用传输（Transport）配置标志\
  \ `InsecureSkipVerify`，可以创建一个忽略这些错误并继续执行的客户端。这个不安全的程序是 `tlsunsafeclientget.go`：\n\
  \n```\nch8$ vi tlsunsafeclientget.go\n/* TLSUnsafeClientGet\n*/\npackage main\n\
  import (\n\"crypto/tls\"\n\"fmt\"\n\"log\"\n\"net/http\"\n\"net/url\"\n\"os\"\n\"\
  strings\"\n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0],\
  \ \"https://host:port/page\")\n}\nurl, err := url.Parse(os.Args[1])\ncheckError(err)\n\
  if url.Scheme != \"https\" {\nlog.Fatalln(\"Not https scheme \", url.Scheme)\n}\n\
  transport := &http.Transport{}\ntransport.TLSClientConfig = &tls.Config{InsecureSkipVerify:\
  \ false}\nclient := &http.Client{Transport: transport}\nrequest, err := http.NewRequest(\"\
  GET\", url.String(), nil)\n// only accept UTF-8\ncheckError(err)\nresponse, err\
  \ := client.Do(request)\ncheckError(err)\nif response.StatusCode != http.StatusOK\
  \ {\nlog.Fatalln(response.Status)\n}\nfmt.Println(\"get a response\")\nchSet :=\
  \ getCharset(response)\nfmt.Printf(\"got charset %s\\n\", chSet)\nif chSet != \"\
  UTF-8\" {\nlog.Fatalln(\"Cannot handle\", chSet)\n}\nvar buf [512]byte\nreader :=\
  \ response.Body\nfmt.Println(\"got body\")\nfor {\nn, err := reader.Read(buf[0:])\n\
  checkError(err)\nfmt.Print(string(buf[0:n]))\n}\n}\nfunc getCharset(response *http.Response)\
  \ string {\ncontentType := response.Header.Get(\"Content-Type\")\nif contentType\
  \ == \"\" {\n// guess\nreturn \"UTF-8\"\n}\nidx := strings.Index(contentType, \"\
  charset:\")\nif idx == -1 {\n// guess\nreturn \"UTF-8\"\n}\nreturn strings.Trim(contentType[idx:],\
  \ \" \")\n}\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal\
  \ error \", err.Error())\n}\n}\n```\n\n在创建服务器端之前，让我们先尝试连接 `https://gooogle.com`（注意三个“o”），它可能不是有效的。\n\
  \n```\nch8$ go run tlsunsafeclientget.go https://gooogle.com\nFatal error  Get \"\
  https://gooogle.com\": x509: certificate is valid for www.google.com, not gooogle.com\n\
  exit status 1\n```\n\n### 服务器端\n\n构建客户端的另一面是处理 HTTP 请求的 Web 服务器。最简单——也是最早期——的服务器只是返回文件的副本。然而，在当前的服务器中，任何\
  \ URL 现在都可以触发任意的计算。\n\n#### 文件服务器\n\n我们从基本的文件服务器开始。Go 提供了一个*多路复用器*，这是一个读取并解释请求的对象。它将请求分发给\
  \ `handlers`（处理器），这些处理器在自己的线程中运行。因此，读取 HTTP 请求、解码请求以及在其各自的线程中分支到合适函数的大部分工作都由 Go\
  \ 替我们完成了。\n\n对于文件服务器，Go 还提供了一个 `FileServer` 对象，它知道如何从本地文件系统提供文件。它需要一个“根”目录（即本地系统中文件树的顶层）以及一个用于匹配\
  \ URL 的模式。最简单的模式是 `/`，它匹配任何 URL 的顶层。这将匹配所有 URL。\n\n有了这些对象，一个从本地文件系统提供文件的 HTTP 服务器就变得异常简单了。这就是\
  \ `fileserver.go`：\n\n```\nch8$ vi fileserver.go\n/* File Server\n*/\npackage main\n\
  import (\n\"log\"\n\"net/http\"\n)\nfunc main() {\n// deliver files from the directory\
  \ /tmp/www\nfileServer := http.FileServer(http.Dir(\"/tmp/www\"))\n// register the\
  \ handler and deliver requests to it\nerr := http.ListenAndServe(\":8000\", fileServer)\n\
  if err != nil {\nlog.Fatalln(err)\n}\n// That's it!\n}\n```\n\n这个服务器甚至能为请求不存在的文件资源时提供\
  \ `\"404 not found\"` 消息！如果请求的文件是一个目录，它会返回一个由 `<pre> ... </pre>` 标签包裹的列表，并且不附带其他\
  \ HTML 头部或标记。如果使用 Wireshark 或一个简单的 telnet 客户端，目录会作为 `text/html` 发送，HTML 文件作为 `text/html`，Perl\
  \ 文件作为 `text/x-perl`，Java 文件作为 `text/x-java`，以此类推。`FileServer` 使用了一些类型识别功能，并将其包含在\
  \ HTTP 请求中，但它无法提供像 Apache 这类服务器对标记的那种控制能力。\n\n服务器和 curl 客户端的运行情况如下：\n\n```\nch8$\
  \ go run FileServer.go\nch8$ curl localhost:8000\n404 page not found\nch8$ mkdir\
  \ -p /tmp/www/\nch8$ echo hi > /tmp/www/hi.txt\nch8$ curl localhost:8000/\n\nhi.txt\n\
  \nch8$ curl localhost:8000/hi.txt\nhi\n```\n\n\n\n#### 处理函数\n\n在上述最后一个程序中，处理函数作为第二个参数传递给了\
  \ `ListenAndServe`。可以通过先调用 `Handle` 或 `HandleFunc` 来注册任意数量的处理函数，其签名如下：\n\n```\n\
  func Handle(pattern string, handler Handler)\nfunc HandleFunc(pattern string, handler\
  \ func(ResponseWriter, *Request))\n```\n\n`ListenAndServe` 的第二个参数可以为 `nil`，此时请求会被分派给所有已注册的处理函数。每个处理函数应拥有不同的\
  \ URL 模式。例如，文件处理函数的 URL 模式可能为 `/`，而函数处理函数的 URL 模式可能为 `/cgi-bin`（我们之前使用了 `/tmp/www`）。更具体的模式优先级高于更通用的模式。\n\
  \n常见的 CGI 程序有 `test-cgi`（用 shell 编写）和 `printenv`（用 Perl 编写），它们会打印环境变量的值。可以编写一个类似于\
  \ `printenv.go` 工作方式的处理函数。\n\n```\nch8$ vi printenv.go\n/* Print Env\n*/\npackage\
  \ main\nimport (\n\"fmt\"\n\"net/http\"\n\"os\"\n)\nfunc main() {\n// 大多数文件的文件处理函数\n\
  fileServer := http.FileServer(http.Dir(\"/tmp/www\"))\nhttp.Handle(\"/\", fileServer)\n\
  // /cgi-bin/printenv 的函数处理函数\nhttp.HandleFunc(\"/cgi-bin/printenv\", printEnv)\n\
  // 将请求分派给处理函数\nerr := http.ListenAndServe(\":8000\", nil)\ncheckError(err)\n// 就是这样!\n\
  }\nfunc printEnv(writer http.ResponseWriter, req *http.Request) {\nenv := os.Environ()\n\
  writer.Write([]byte(\"Environment\"))\nfor _, v := range env {\nwriter.Write([]byte(v\
  \ + \"\\n\"))\n}\nwriter.Write([]byte(\"\"))\n}\nfunc checkError(err error) {\n\
  if err != nil {\nfmt.Println(\"Fatal error \", err.Error())\nos.Exit(1)\n}\n}\n\
  ```\n\n按如下方式运行服务器：\n\n```\nch8$ go run printenv.go\n```\n\n现在我们按如下方式运行一个 curl 客户端：\n\
  \n```\nch8$ curl localhost:8000/cgi-bin/printenv\nEnvironmentTERM_PROGRAM=Apple_Terminal\n\
  SHELL=/bin/zsh\nTERM=xterm-256color\nTMPDIR=/var/folders/c5/l52zshy12q1bsfhp_sbdtg5r0000gn/T/\n\
  TERM_PROGRAM_VERSION=444\nTERM_SESSION_ID=803B4A5C-F403-40E8-97CC-0EC807C35D77\n\
  USER=ronaldpetty\nSSH_AUTH_SOCK=/private/tmp/com.apple.launchd.vj8cVxhj0c/Listeners\n\
  ```\n\n在这个程序中使用 `cgi-bin` 目录有点取巧：它不像 CGI 脚本那样调用外部程序。它只是调用了 Go 函数 `printEnv`。Go 确实具备使用\
  \ `os.ForkExec` 调用外部程序的能力，但尚不支持像 Apache 的 `mod_perl` 那样的动态可链接模块。在这种情况下，你很可能希望将结果包装成合适的\
  \ HTML。\n\n#### 绕过默认多路复用器\n\nGo 服务器接收到的 HTTP 请求通常由一个多路复用器处理，它会检查 HTTP 请求中的路径并调用相应的文件处理函数等。你可以定义自己的处理函数。这些处理函数可以通过调用\
  \ `http.HandleFunc` 注册到默认多路复用器，该函数接受一个模式和一个函数。像 `ListenAndServe` 这样的函数随后会接受一个 `nil`\
  \ 处理函数。上一个示例就是这样做的。\n\n然而，如果你想接管多路复用器的角色，那么可以将一个非 `nil` 的函数作为处理函数传递给 `ListenAndServe`。这个函数将负责管理请求和响应。\n\
  \n以下示例虽然简单，但说明了其用法。该多路复用器函数会针对 *所有* 对 `serverhandler.go` 的请求返回一个 `'204 No content'`：\n\
  \n```\nch8$ vi serverhandler.go\n/* ServerHandler\n*/\npackage main\nimport (\n\"\
  net/http\"\n)\nfunc main() {\nmyHandler := http.HandlerFunc(func(rw http.ResponseWriter,\n\
  request *http.Request) {\n// 只返回无内容 - 可以设置任意请求头，任意响应体\nrw.WriteHeader(http.StatusNoContent)\n\
  })\nhttp.ListenAndServe(\":8080\", myHandler)\n}\n```\n\n可以通过运行 `telnet` 来测试服务器，输出如下所示：\n\
  \n```\nch8$ curl -v localhost:8080\n*   Trying 127.0.0.1:8080...\n* Connected to\
  \ localhost (127.0.0.1) port 8080 (#0)\n> GET / HTTP/1.1\n> Host: localhost:8080\n\
  > User-Agent: curl/7.79.1\n> Accept: */*\n>\n* Mark bundle as not supporting multiuse\n\
  < HTTP/1.1 204 No Content\n< Date: Fri, 01 Apr 2022 03:21:41 GMT\n<\n* Connection\
  \ #0 to host localhost left intact\n```\n\n## HTTPS\n\n对于安全的加密连接，HTTP 使用 TLS，这在第\
  \ 7 章中有所描述。HTTP+TLS 协议称为 HTTPS，并使用 `https://` URL 而非 `http://` URL。\n\n要使服务器使用 HTTPS，它需要一个\
  \ X.509 证书以及该证书的私钥文件。Go 目前要求这些文件采用第 7 章中使用的 PEM 编码。然后将 HTTP 函数 `ListenAndServe`\
  \ 替换为 HTTPS（HTTP+TLS）函数 `ListenAndServeTLS`。\n\n前面给出的文件服务器程序可以写成 HTTPS 服务器，即 `httpsfileserver.go`：\n\
  \n```\nch8$ vi httpsfileserver.go\n/* HTTPSFileServer\n*/\npackage main\nimport\
  \ (\n\"net/http\"\n\"log\"\n)\nfunc main() {\n// 从目录 /tmp/www 提供文件服务\nfileServer\
  \ := http.FileServer(http.Dir(\"/tmp/www\"))\n// 注册处理函数并将请求分派给它\nerr := http.ListenAndServeTLS(\"\
  :8000\", \"jan.newmarch.name.pem\",\n\"private.pem\", fileServer)\nif err != nil\
  \ {\nlog.Fatalln(err)\n}\n}\n```\n\n例如，可通过 `https://localhost:8000/index.html` 访问此服务器。如果证书是自签名证书，则需要一个不安全的客户端来访问服务器内容。例如：\n\
  \n```\nch8$ go run httpsfileserver.go\nch8$ curl -i https://localhost:8000\ncurl:\
  \ (60) SSL certificate problem: self signed certificate\nMore details here: https://curl.se/docs/sslcerts.html\n\
  curl failed to verify the legitimacy of the server and therefore could not\nestablish\
  \ a secure connection to it. To learn more about this situation and\nhow to fix\
  \ it, please visit the web page mentioned above.\n```\n\n我们可以通过 `-k` 标志指示 curl 客户端进行不安全连接。\n\
  \n```\nch8$ curl -ik https://localhost:8000\nHTTP/2 200\ncontent-type: text/html;\
  \ charset=utf-8\nlast-modified: Mon, 27 Dec 2021 04:30:01 GMT\ncontent-length: 41\n\
  date: Mon, 27 Dec 2021 04:46:56 GMT\n\nhi.txt\n\n```\n\n我们也可以通过 Go 客户端代码来实现这一点（`tlsunsafeclientget.go`）。\n\
  \n当 `InsecureSkipVerify` 设置为 `true` 时：\n\n```\nch8$ go run tlsunsafeclientget.go\
  \ https://localhost:8000\nget a response\ngot charset UTF-8\ngot body\n```\n\n当\
  \ `InsecureSkipVerify` 设置为 `false` 时：\n\n```\nch8$ go run tlsunsafeclientget.go\
  \ https://localhost:8000\nFatal error  Get \"https://localhost:8000\": x509: certificate\
  \ signed by unknown authority\nexit status 1\n```\n\n如果你想要一个同时支持 HTTP 和 HTTPS 的服务器，可以在各自的\
  \ `go` 例程中运行每个监听器。\n\n## 结论\n\nGo 对 HTTP 提供了广泛的支持。这并不奇怪，因为 Go 的部分初衷就是为了满足 Google\
  \ 自身服务器的需求。本章讨论了 Go 为 HTTP 和 HTTPS 提供的不同级别的支持。在关于 Gorilla 的章节中，我们将更详细地讨论 Go 的多路复用请求（路径\
  \ -> 代码）。\n\n# 9. 模板\n\n大多数服务器端语言都有一种机制，可以获取主要是静态的页面并插入动态生成的组件，例如项目列表。典型的例子包括 Java\
  \ Server Pages 中的脚本、PHP 脚本等。Go 在 `template` 包中采用了一种相对简单的脚本语言。\n\n该包旨在将文本作为输入，并根据使用对象的值转换原始文本，输出不同的文本。与\
  \ JSP 或类似技术不同，它不局限于 HTML 文件，但很可能在该领域得到最大应用。我们首先描述 `text/template` 包，然后再介绍 `html/template`\
  \ 包。\n\n原始源代码称为*模板*，它由直接传递的文本和可以作用于文本并改变文本的内嵌命令组成。命令由 `{{ ... }}` 分隔，类似于 JSP 命令\
  \ `<%= ... =%>` 和 PHP 的 `<?php ... ?>`。在 Go 的模板模块中，命令也称为动作。\n\n\n\n## 插入对象值\n\n\
  模板应用于 Go 对象。可以插入来自该 Go 对象的字段，并且可以“深入”对象以查找子字段等。当前对象用*光标*表示，因此要插入当前对象的值，请使用 `{{.}}`。默认情况下，该包使用\
  \ `fmt` 包来确定用作插入值的字符串。\n\n要插入当前光标对象字段的值，请使用以 `.` 为前缀的字段名。例如，如果当前光标对象的类型是\n\n```go\n\
  type Person struct {\n    Name   string\n    Age    int\n    Emails []string\n \
  \   Jobs   []*Job\n}\n```\n\n您可以像下面这样插入 `Name` 和 `Age` 的值：\n\n```\nThe name is {{.Name}}.\n\
  The age is {{.Age}}.\n```\n\n您可以使用 `range` 命令遍历数组或其他列表中的元素。因此，要访问 `Emails` 数组的内容，可以像这样：\n\
  \n```\n{{range .Emails}}\nThe email is {{.}}\n{{end}}\n```\n\n在遍历电子邮件的循环过程中，光标 `.`\
  \ 依次被设置为每一封电子邮件。循环结束后，光标恢复为 person 对象。如果 `Job` 定义如下：\n\n```go\ntype Job struct {\n\
  \    Employer string\n    Role     string\n}\n```\n\n并且我们想要访问某个 `person` 的 `jobs`\
  \ 的字段，我们可以像之前一样使用 `{{range .Jobs}}`。另一种方法是切换当前对象到 `Jobs` 字段。这可以通过 `{{with ...}}\
  \ ... {{end}}` 结构来实现，此时 `{{.}}` 是 `Jobs` 字段，它是一个数组：\n\n```\n{{with .Jobs}}\n{{range\
  \ .}}\nAn employer is {{.Employer}}\nand the role is {{.Role}}\n{{end}}\n{{end}}\n\
  ```\n\n您可以对任何字段使用此方法，而不仅仅限于数组。\n\n### 使用模板\n\n一旦您有了模板，就可以将其应用于对象，使用该对象填充模板值来生成新的字符串。这是一个两步过程：首先解析模板，然后将其应用于对象。结果输出到一个\
  \ `Writer`，如下所示：\n\n```go\nt := template.New(\"Person template\")\nt, err := t.Parse(templ)\n\
  if err == nil {\n    buff := bytes.NewBufferString(\"\")\n    t.Execute(buff, person)\n\
  }\n```\n\n一个将模板应用于对象并打印到标准输出的示例程序是 `printperson.go`：\n\n```go\n$ mkdir ch9\nch9$\
  \ cd ch9\nch9$ vi printperson.go\n/* PrintPerson\n*/\npackage main\nimport (\n \
  \   \"log\"\n    \"os\"\n    \"text/template\"\n)\ntype Person struct {\n    Name\
  \   string\n    Age    int\n    Emails []string\n    Jobs   []Job\n}\ntype Job struct\
  \ {\n    Employer string\n    Role     string\n}\nconst templ = `The name is {{.Name}}.\n\
  The age is {{.Age}}.\n{{range .Emails}}\nAn email is {{.}}\n{{end}}\n{{with .Jobs}}\n\
  {{range .}}\nAn employer is {{.Employer}}\nand the role is {{.Role}}\n{{end}}\n\
  {{end}}\n`\nfunc main() {\n    job1 := Job{Employer: \"Box Hill Institute\", Role:\
  \ \"Director, Commerce and ICT\"}\n    job2 := Job{Employer: \"Canberra University\"\
  , Role: \"Adjunct Professor\"}\n    person := Person{\n        Name:   \"jan\",\n\
  \        Age:    66,\n        Emails: []string{\"jan@newmarch.name\",\n        \
  \    \"jan.newmarch@gmail.com\"},\n        Jobs:   []Job{job1, job2},\n    }\n \
  \   t := template.New(\"Person template\")\n    t, err := t.Parse(templ)\n    checkError(err)\n\
  \    err = t.Execute(os.Stdout, person)\n    checkError(err)\n}\nfunc checkError(err\
  \ error) {\n    if err != nil {\n        log.Fatalln(\"Fatal error \", err.Error())\n\
  \    }\n}\n```\n\n输出结果如下：\n\n```\nch9$ go run printperson.go\nThe name is jan.\n\
  The age is 66.\nAn email is jan@newmarch.name\nAn email is jan.newmarch@gmail.com\n\
  An employer is Box Hill Institute\nand the role is Director, Commerce and ICT\n\
  An employer is Canberra University\nand the role is Adjunct Professor\n```\n\n请注意，此打印输出中存在大量空白（换行符）。这是由于我们在模板中使用的空白所致。如果您想减少这些空白，可以像下面这样消除模板中的换行符：\n\
  \n```\n{{range .Emails}} An email is {{.}} {{end}}\n```\n\n另一种方法是使用命令分隔符 `{{-` 和\
  \ `-}}`，分别消除紧接在前的文本的所有尾部空白和紧接在后的文本的所有前导空白。\n\n在示例中，我们在程序中使用了一个字符串作为模板。您也可以使用 `template.ParseFiles()`\
  \ 函数从文件加载模板。出于我无法理解的原因（并且在早期版本中不需要），分配给模板的名称必须与文件列表中第一个文件的基本名称相同。这是一个 bug 吗？\n\n\
  ### 管道\n\n上述转换将文本片段插入到模板中。这些文本片段本质上是任意的，取决于字段的字符串值。如果我们希望它们作为 HTML 文档（或其他专门形式）的一部分出现，则必须转义特定的字符序列。例如，要在\
  \ HTML 文档中显示任意文本，我们必须将 `<` 改为 `&lt;`。Go 模板有许多内置函数，其中之一是 `html()`。这些函数的作用类似于 UNIX\
  \ 管道，从标准输入读取并写入标准输出。\n\n要获取当前对象 `.` 的值并对其应用 HTML 转义，您可以在模板中编写一个“管道”：\n\n```\n{{.\
  \ | html}}\n```\n\n这是另一个例子，我们添加了一条格式化消息，说明一个人有多少份工作。\n\n```go\nconst templ = `The\
  \ name is {{.Name}}.\nThe age is {{.Age}}.\n{{range .Emails}}\nAn email is {{.}}\n\
  {{end}}\n{{with .Jobs}}\n{{range .}}\nAn employer is {{.Employer}}\nand the role\
  \ is {{.Role}}\n{{end}}\n{{ . | len | printf \"%d jobs total\" }}\n{{end}}\n`\n\
  ```\n\n运行修改后的先前示例，我们现在会看到一行新的输出：\n\n```\ngo run printperson.go\n...\n2 jobs total\n\
  ```\n\n其他函数也类似。管道传输时还有其他注意事项，包括参数如何传递。您可以通过以下链接了解有关在模板中使用管道的更多信息：[`https://pkg.go.dev/text/template#hdr-Pipelines`](https://pkg.go.dev/text/template#hdr-Pipelines)。\n\
  \n\n\n## 定义函数\n\n模板使用对象的字符串表示形式，通过 `fmt` 包将对象转换为字符串来插入值。但有时这并非所需。例如，为避免垃圾邮件发送者获取电子邮件地址，通常会将符号\
  \ `@` 替换为单词“at”，如“jan at newmarch.name”。如果我们想使用模板以这种形式显示电子邮件地址，就必须构建一个自定义函数来完成此转换。\n\
  \n每个模板函数都有一个在模板中使用的名称，以及一个关联的 Go 函数。它们通过以下类型进行关联：\n\n```\ntype FuncMap map[string]interface{}\n\
  ```\n\n例如，如果我们希望模板函数名为 `emailExpand`，并与 Go 函数 `EmailExpander` 关联，我们可以按照以下方式将其添加到模板的函数中：\n\
  \n```\nt = t.Funcs(template.FuncMap{\"emailExpand\": EmailExpander})\n```\n\n`EmailExpander`\
  \ 的签名通常是这样的：\n\n```\nfunc EmailExpander(args ...interface{}) string\n```\n\n在我们感兴趣的用例中，该函数应只有一个参数，且该参数为字符串。Go\
  \ 模板库中的现有函数有一些初始代码来处理不符合规范的情况，因此我们只需照搬即可。然后只需进行简单的字符串操作来更改电子邮件地址的格式。程序文件是 `printemails.go`：\n\
  \n```go\nch9$ vi printemails.go\n/* PrintEmails\n*/\npackage main\nimport (\n\"\
  log\"\n\"os\"\n\"strings\"\n\"text/template\"\n)\ntype Person struct {\nName   string\n\
  Emails []string\n}\nconst templ = `The name is {{.Name}}.\n{{range .Emails}}\nAn\
  \ email is \"{{. | emailExpand}}\"\n{{end}}`\nfunc main() {\nperson := Person{\n\
  Name: \"jan\",\nEmails: []string{\"jan@newmarch.name\",\n\"jan.newmarch@gmail.com\"\
  },\n}\nt, err := template.New(\"Person template\").Funcs(\ntemplate.FuncMap{\n\"\
  emailExpand\": func(emailAddress string) string {\nreturn strings.Replace(emailAddress,\
  \ \"@\", \" at \", -1)\n},\n},\n).Parse(templ)\nerr = t.Execute(os.Stdout, person)\n\
  checkError(err)\n}\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"\
  Fatal error \", err.Error())\n}\n}\n```\n\n输出结果如下：\n\n```\nch9$ go run printemails.go\n\
  The name is jan.\nAn email is \"jan at newmarch.name\"\nAn email is \"jan.newmarch\
  \ at gmail.com\"\n```\n\n## 变量\n\n模板包允许你定义和使用变量。为了说明其动机，请考虑如何打印每个人的电子邮件地址，并*在其前面加上*姓名。我们使用的类型仍然是这样：\n\
  \n```\ntype Person struct {\nName      string\nEmails    []string\n}\n```\n\n为了访问电子邮件字符串，我们使用如下的\
  \ `range` 语句：\n\n```\n{{range .Emails}}\n{{.}}\n{{end}}\n```\n\n但在此时，我们无法访问 `Name`\
  \ 字段，因为 `.` 当前正在遍历数组元素，而 `Name` 不在这个作用域内。解决方案是将 `Name` 字段的值保存在一个变量中，该变量可以在其作用域内的任何地方被访问。我们将同样的思路应用于循环变量。模板中的变量以\
  \ `$` 为前缀。因此我们这样写：\n\n```\n{{$name := .Name}}\n{{range $idx, $email := .Emails}}\n\
  Name is {{$name}}, email is {{$email}}\n{{end}}\n```\n\n程序文件是 `printnameemails.go`：\n\
  \n```go\nch9$ vi printnameemails.go\n/**\n* PrintNameEmails\n*/\npackage main\n\
  import (\n\"log\"\n\"os\"\n\"text/template\"\n)\ntype Person struct {\nName   string\n\
  Emails []string\n}\nconst templ = `{{$name := .Name}}\n{{ $numEmails := .Emails\
  \ | len -}}\n{{range $idx, $email := .Emails -}}\nName is {{$name}}, email {{$email}}\
  \ is {{ $idx | increment }} of {{ $numEmails }}\n{{end}}\n`\nfunc main() {\nperson\
  \ := Person{\nName: \"jan\",\nEmails: []string{\"jan@newmarch.name\",\n\"jan.newmarch@gmail.com\"\
  },\n}\nt, err := template.New(\"Person template\").Funcs(\ntemplate.FuncMap{\n\"\
  increment\": func(val int) int {\nreturn val + 1\n},\n},\n).Parse(templ)\ncheckError(err)\n\
  err = t.Execute(os.Stdout, person)\ncheckError(err)\n}\nfunc checkError(err error)\
  \ {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n\
  输出结果如下：\n\n```\nch9$ go run printnameemails.go\nName is jan, email jan@newmarch.name\
  \ is 1 of 2\nName is jan, email jan.newmarch@gmail.com is 2 of 2\n```\n\n\n\n###\
  \ 条件语句\n\n继续使用 `Person` 示例，假设你只想打印出邮件列表，而不深入查看。你可以通过模板来实现：\n\n```\nName is {{.Name}}\n\
  Emails are {{.Emails}}\n```\n\n这将输出以下内容：\n\n```\nName is jan\nEmails are [jan@newmarch.name\
  \ jan.newmarch@gmail.com]\n```\n\n因为这是 `fmt` 包显示列表的方式。\n\n在许多情况下，如果这正是你想要的，那可能没问题。让我们考虑一种*几乎*正确但又不完全正确的情况。有一个用于序列化对象的\
  \ JSON 包，我们在第 4 章中介绍过。它会生成以下内容：\n\n```\n{\"Name\": \"jan\",\n\"Emails\": [\"jan@newmarch.name\"\
  , \"jan.newmarch@gmail.com\"]\n}\n```\n\nJSON 包是你在实践中使用的，但让我们看看是否可以使用模板生成 JSON 输出。我们仅通过已有的模板就能做一些类似的事情。作为\
  \ JSON 序列化器，这*几乎*是正确的：\n\n```\n{\"Name\": \"{{.Name}}\",\n\"Emails\": {{.Emails}}\n\
  }\n```\n\n它将生成：\n\n```\n{\"Name\": \"jan\",\n\"Emails\": [jan@newmarch.name jan.newmarch@gmail.com]\n\
  }\n```\n\n这有两个问题：地址没有加引号，并且列表元素应该用 `,` 分隔。\n\n这样如何——查看数组元素，给它们加上引号，并添加逗号？\n\n```\n\
  {\"Name\": {{.Name}},\n\"Emails\": [\n{{range .Emails}}\n\"{{.}}\",\n{{end}}\n]\n\
  }\n```\n\n这将生成：\n\n```\n{\"Name\": \"jan\",\n\"Emails\": [\"jan@newmarch.name\"\
  , \"jan.newmarch@gmail.com\",]\n}\n```\n\n（外加一些空白符）。\n\n同样，它几乎正确，但如果你仔细看，会发现最后一个列表元素后面多了一个尾随的\
  \ `,`。根据 JSON 语法（参见 [`http://www.json.org/`](http://www.json.org/)），这个尾随的 `,` 是不允许的。不同的实现处理方式可能有所不同。\n\
  \n我们想要的是打印每个元素，除了最后一个元素外，每个元素后面都跟一个 `,`。这实际上有点难办，所以更好的方法是打印每个元素，除了*第一个*元素外，每个元素*前面*都加一个\
  \ `,`（这个技巧来自 Stack Overflow 上的 \"brianb\" – [`http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object`](http://stackoverflow.com/questions/201782/can-you-use-a-trailing-comma-in-a-json-object)）。这更容易，因为第一个元素的索引是零，而许多编程语言（包括\
  \ Go 模板语言）将零视为布尔值 `false`。\n\n条件语句的一种形式是 `{{if pipeline}} T1 {{else}} T0 {{end}}`。我们需要\
  \ `pipeline` 是邮件数组的索引。幸运的是，`range` 语句的变体提供了这个功能。有两种引入变量的形式：\n\n```\n{{range $elmt\
  \ := array}}\n{{range $index, $elmt := array}}\n```\n\n因此，我们遍历数组，如果索引是 `false`（0），则只打印元素。否则，我们在元素前面加上\
  \ `,` 再打印。模板如下：\n\n```\n{\"Name\": \"{{.Name}}\",\n\"Emails\": [\n{{range $index,\
  \ $elmt := .Emails}}\n{{if $index}}\n, \"{{$elmt}}\"\n{{else}}\n\"{{$elmt}}\"\n\
  {{end}}\n{{end}}\n]\n}\n```\n\n完整的程序是 `printjsonemails.go`：\n\n```\nch9$ vi printjsonemails.go\n\
  /**\n* PrintJSONEmails\n*/\npackage main\nimport (\n\"bytes\"\n\"encoding/json\"\
  \n\"fmt\"\n\"log\"\n\"os\"\n\"text/template\"\n)\ntype Person struct {\nName   string\n\
  Emails []string\n}\nconst templ = `{\"Name\": \"{{- .Name -}}\", \"Emails\": [\n\
  {{- range $index, $elmt := .Emails -}}\n{{- if $index -}}\n, \"{{- $elmt -}}\"\n\
  {{- else -}}\n\"{{- $elmt -}}\"\n{{- end -}}\n{{- end -}}\n] }`\nfunc main() {\n\
  person := Person{\nName: \"jan\",\nEmails: []string{\"jan@newmarch.name\",\n\"jan.newmarch@gmail.com\"\
  },\n}\nt := template.New(\"Person template\")\nt, err := t.Parse(templ)\ncheckError(err)\n\
  err = t.Execute(os.Stdout, person)\ncheckError(err)\n// check via validity json\
  \ package\nvar b bytes.Buffer\nerr = t.Execute(&b, person)\ncheckError(err)\nif\
  \ json.Valid(b.Bytes()) {\nfmt.Println(\"\\nvalid json\")\n}\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n这给出了正确的 JSON 输出，它还运行了 `json.Valid()` 检查函数来验证是否为有效的 JSON。\n\n```\nch9$\ngo\
  \ run printjsonemails.go\n{\"Name\": \"jan\", \"Emails\": [\"jan@newmarch.name\"\
  , \"jan.newmarch@gmail.com\"] }\nvalid json\n```\n\n在结束本节之前，请注意，格式化带逗号分隔符的列表的问题，可以通过在\
  \ Go 中定义合适的函数来解决，这些函数作为模板函数可用。借用另一种编程语言的一句名言：“条条大路通罗马！”以下程序由 Roger Peppe 发送给我，名为\
  \ `sequence.go`：\n\n```\nch9$ vi sequence.go\n/* Sequence.go\n* Copyright Roger\
  \ Peppe\n*/\npackage main\nimport (\n\"errors\"\n\"fmt\"\n\"os\"\n\"text/template\"\
  \n)\nvar tmpl = `{{$comma := sequence \"\" \", \"}}\n{{range $}}{{$comma.Next}}{{.}}{{end}}\n\
  {{$comma := sequence \"\" \", \"}}\n{{$colour := cycle \"black\" \"white\" \"red\"\
  }}\n{{range $}}{{$comma.Next}}{{.}} in {{$colour.Next}}{{end}}\n`\nvar fmap = template.FuncMap{\n\
  \"sequence\": sequenceFunc,\n\"cycle\":    cycleFunc,\n}\nfunc main() {\nt, err\
  \ := template.New(\"\").Funcs(fmap).Parse(tmpl)\nif err != nil {\nfmt.Printf(\"\
  parse error: %vn\", err)\nreturn\n}\nerr = t.Execute(os.Stdout, []string{\"a\",\
  \ \"b\", \"c\",\n\"d\", \"e\", \"f\"})\nif err != nil {\nfmt.Printf(\"exec error:\
  \ %vn\", err)\n}\n}\ntype generator struct {\nss []string\ni  int\nf  func(s []string,\
  \ i int) string\n}\nfunc (seq *generator) Next() string {\ns := seq.f(seq.ss, seq.i)\n\
  seq.i++\nreturn s\n}\nfunc sequenceGen(ss []string, i int) string {\nif i >= len(ss)\
  \ {\nreturn ss[len(ss)-1]\n}\nreturn ss[i]\n}\nfunc cycleGen(ss []string, i int)\
  \ string {\nreturn ss[i%len(ss)]\n}\nfunc sequenceFunc(ss ...string) (*generator,\
  \ error) {\nif len(ss) == 0 {\nreturn nil, errors.New(\"sequence must have at least\
  \ one element\")\n}\nreturn &generator{ss, 0, sequenceGen}, nil\n}\nfunc cycleFunc(ss\
  \ ...string) (*generator, error) {\nif len(ss) == 0 {\nreturn nil, errors.New(\"\
  cycle must have at least one element\")\n}\nreturn &generator{ss, 0, cycleGen},\
  \ nil\n}\n```\n\n输出如下：\n\n```\nch9$ go run sequence.go\na, b, c, d, e, f\na in black,\
  \ b in white, c in red, d in black, e in white, f in red\n```\n\n## html/template\
  \ 包\n\n前面的程序都处理的是 `text/template` 包。它执行转换，而不考虑文本可能使用的任何上下文。例如，如果 `PrintPerson.go`\
  \ 中的文本变为\n\n```\njob1 := Job{Employer: \"alert('Could be nasty!')\", Role: \"Director,\
  \ Commerce and ICT\"}\n```\n\n程序将生成以下文本：\n\n```\nAn employer is alert('Could be\
  \ nasty!')\n```\n\n如果下载到浏览器，这将导致意外效果。\n\n在管道中使用 `html` 命令可以减少这种情况，例如 `{{. | html}}`，并将生成以下内容：\n\
  \n```\nAn employer is &lt;script&gt;alert('Could be nasty!')&lt;/script&gt\n```\n\
  \n将这种过滤器应用于所有表达式会变得繁琐。此外，它可能无法捕获潜在的、危险的 JavaScript、CSS 或 URI 表达式。\n\n`html/template`\
  \ 包旨在解决这些问题。只需将 `text/template` 替换为 `html/template` 这一简单步骤，就会对生成的文本应用适当的转换，对其进行净化，使其适用于\
  \ Web 上下文。\n\n当使用 `go doc` 查看任一模板包时，请务必注意您正在查看的是哪一个。`go doc template` 实际上是 `go doc\
  \ html/template`，而 `go doc text/template` 是用于非 HTML 包的。\n\n## 总结\n\nGo 模板包对于某些涉及插入对象值的文本转换非常有用。例如，它没有正则表达式的强大功能，但速度更快，并且在许多情况下，比正则表达式更容易使用。\n\
  \n\n\n# 10. 完整的 Web 服务器\n\n本章主要作为 HTTP 章节的实践应用，将使用标准 Go 语言构建一个完整的网站。同时介绍如何使用模板在文本文件中嵌入表达式以插入变量值，并生成重复内容区域。内容涉及序列化数据和\
  \ Unicode 字符集。本章中的程序篇幅较长且结构复杂，因此不会完整列出所有代码，但可从本书的 GitHub 网站[`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)下载。\n\
  \nJan 正在学习中文。更准确地说，经过多年尝试，他仍然在*尝试*学习中文。当然，他没有静下心来好好学，而是尝试了各种技术辅助工具。他试过课本、视频和许多其他教学材料。最终他意识到进步缓慢的原因是*没有一款好用的中文闪卡程序*，因此出于学习需要，他决定自己开发一个。\n\
  \n他找到一个 Python 程序完成了部分功能。但遗憾的是，该程序编写质量不佳，经过几次彻底改造尝试后，他得出结论：从头开始编写更好。当然，网络解决方案远比独立程序优越，因为这样中文班的其他同学以及所有学习者都能共享使用。而服务器将用\
  \ Go 语言编写。\n\n他采用了张朋朋所著《汉语口语速成》（Sinolingua 出版社，2007 年，ISBN 978-7-80052577-3）中的词汇，但该程序适用于任何词汇集。\n\
  \n## 浏览器界面示意图\n\n在浏览器中查看的最终程序包含三种页面，如图 10-1 所示。\n\n`![](img/436770_2_En_10_Fig1_HTML.png)`\n\
  \n图 10-1\n\n浏览器页面\n\n主页显示闪卡集列表（见图 10-2）。包含当前可用的闪卡集列表、展示方式（随机卡牌顺序、优先显示中文或英文、或随机显示）、以及选择展示整套卡片还是仅显示单词列表。\n\
  \n`![](img/436770_2_En_10_Fig2_HTML.jpg)`\n\n图 10-2\n\n网站主页\n\n闪卡集每次显示一张卡片，样式如图\
  \ 10-3 所示。\n\n`![](img/436770_2_En_10_Fig3_HTML.jpg)`\n\n图 10-3\n\n显示所有组件的典型闪卡\n\
  \n闪卡集中的单词列表如图 10-4 所示。\n\n`![](img/436770_2_En_10_Fig4_HTML.jpg)`\n\n图 10-4\n\n\
  闪卡集中的单词列表\n\n## 浏览器端文件\n\n浏览器端包含 HTML、CSS 和 JavaScript 文件，以及托管它们的 Go 代码。逻辑路径及相关文件如下：\n\
  \n* 主页路径（`/` 和 `/flashcards.html`）：\n  * `css/listflashcardsstylesheet.css`\n* 闪卡集路径（`showflashcards.html`）：\n\
  \  * `css/cardstylesheet.css`\n  * `jscript/jquery.js`\n  * `jscript/slideviewer.js`\n\
  * 闪卡集单词路径（`listwords.html`）：\n  * `css/listflashcardsstylesheet.css`\n  * `jscript/sortable.js`\n\
  \n整体项目结构如下：\n\n```\n$ mkdir ch10\n$ cd ch10\nch10$ tree .\n.\n├── cedict_ts.u8\n\
  ├── css\n│   ├── cardstylesheet.css\n│   └── listflashcardsstylesheet.css\n├── dictionary.go\n\
  ├── flashcards.go\n├── flashcardsets\n│   ├── common_words\n│   ├── lesson_04_surname_first_name\n\
  │   ├── lesson_05_country_nationality\n│   └── lesson_06_city_native_place\n├──\
  \ html\n│   ├── listflashcards.html\n│   ├── listwords.html\n│   └── showflashcards.html\n\
  ├── jscript\n│   ├── jquery.js\n│   ├── slideviewer.js\n│   └── sorttable.js\n├──\
  \ pinyinformatter.go\n└── server.go\n4 directories, 17 files\n```\n\n## 基础服务器\n\n\
  服务器是上一章讨论的 HTTP 服务器。它包含多个处理不同 URL 的函数。函数概述如下：\n\n| 路径 | 函数 | 传递的 HTML |\n| --- |\
  \ --- | --- |\n| `/` | `listFlashCards` | `html/listflashcards.html` |\n| `/flashcards.html`\
  \ | `listFlashCards` | `html/listflashcards.html` |\n| `/flashcardSets` | `manageFlashCards`\
  \ | `html/showflashcards.html` |\n| `/flashcardSets` | `manageFlashCards` | `html/listwords.html`\
  \ |\n| `/jscript/*` | `fileServer` | 来自 `/jscript` 目录的文件 |\n| `/html/*/css/*` |\
  \ `fileServer` | 来自 `/html` 目录 / `/css` 目录的文件 |\n\n服务器文件为 `server.go`，位于 [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)\
  \ 的 `ch10` 目录下。\n\n```\nch10$ cat server.go\n/* Server\n*/\npackage main\nimport\
  \ (\n\"fmt\"\n\"html/template\"\n\"log\"\n\"net/http\"\n\"os\"\n)\nconst (\nDefaultSet\
  \           = \"common_words\"\nDefaultAmount        = \"Random\"\nActionShow  \
  \         = \"Show cards in set\"\nActionList           = \"List words in set\"\n\
  ActionUnknown        = \"Unknown action\"\nURLFlashCardSetsPath = \"flashcardSets\"\
  \nFlashCardPage        = \"flashcards.html\"\nListFlashCardPage    = \"list\" +\
  \ FlashCardPage\nShowFlashCardPage    = \"show\" + FlashCardPage\nListWordsPage\
  \        = \"listwords.html\"\nCardOrderSequential  = \"Sequential\"\nCardOrderRandom\
  \      = \"Random\"\n)\nvar showHalf = map[string]string{\n\"Random\":  \"RANDOM_HALF\"\
  ,\n\"English\": \"ENGLISH_HALF\",\n\"Chinese\": \"CHINESE_HALF\",\n}\nfunc main()\
  \ {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \":port\")\n}\n\
  port := os.Args[1]\nhttp.HandleFunc(\"/\", listFlashCards)\nfileServer := http.StripPrefix(\"\
  /jscript/\", http.FileServer(http.Dir(\"jscript\")))\nhttp.Handle(\"/jscript/\"\
  , fileServer)\nfileServer = http.StripPrefix(\"/html/\", http.FileServer(http.Dir(\"\
  html\")))\nhttp.Handle(\"/html/\", fileServer)\nfileServer = http.StripPrefix(\"\
  /css/\", http.FileServer(http.Dir(\"css\")))\nhttp.Handle(\"/css/\", fileServer)\n\
  http.HandleFunc(\"/\"+FlashCardPage, listFlashCards)\nhttp.HandleFunc(\"/\"+URLFlashCardSetsPath,\
  \ manageFlashCards)\n// deliver requests to the handlers\nerr := http.ListenAndServe(port,\
  \ nil)\ncheckError(err)\n}\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request)\
  \ {\n...\n}\n/*\n* Called from listflashcards.html on form submission\n*/\nfunc\
  \ manageFlashCards(rw http.ResponseWriter, req *http.Request) {\n...\n}\nfunc showFlashCards(rw\
  \ http.ResponseWriter, cardname, order, half string) {\n...\n}\nfunc listWords(rw\
  \ http.ResponseWriter, cardname string) {\n...\n}\nfunc httpErrorHandler(rw http.ResponseWriter,\
  \ err error) {\nhttp.Error(rw, err.Error(), http.StatusInternalServerError)\n}\n\
  func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
  }\n}\n```\n\n接下来我们将讨论各个函数的具体实现。\n\n\n\n### listFlashCards 函数\n\n`listFlashCards`\
  \ 函数用于生成顶层页面的 HTML。闪卡名称列表是可扩展的，由 `flashcardSets` 目录下的文件条目集合构成。该列表用于创建顶层页面中的表格，最好使用模板包来实现：\n\
  \n```\nFlashcard Sets\n\n{{range $i, $e := .}}\n\n{{$e}}\n\n{{end}}\n```\n\n其中 range\
  \ 循环遍历名称列表。文件 `html/listflashcards.html` 包含了该模板，以及卡片顺序侧边列表、半卡显示和底部表单按钮的 HTML。省略侧边列表和提交按钮后，HTML\
  \ 如下所示：\n\n```\nch10$ cat html/listflashcards.html\n\nFlashcards\n\nFlashcards\n\
  \nFlashcard Sets\n\n{{range $i, $e := .}}\n\n{{$e}}\n\n{{end}}\n\nCard order\n\n\
  Random \n\nSequential \n\nHalf card display\n\nRandom \n\nEnglish \n\nChinese \n\
  \nShow cards in set\n\nList words in set\n```\n\n在 `server.go` 中，`listFlashCards`\
  \ 函数将模板应用于此，代码如下：\n\n```\nfunc listFlashCards(rw http.ResponseWriter, req *http.Request)\
  \ {\nflashCardsNames := ListFlashCardsNames()\nt, err := template.ParseFiles(\"\
  html/\" + ListFlashCardPage)\nif err != nil {\nhttpErrorHandler(rw, err)\nreturn\n\
  }\nt.Execute(rw, flashCardsNames)\n}\n```\n\n在 `flashcards.go` 中，`ListFlashCardsNames()`\
  \ 函数遍历闪卡目录，返回一个字符串数组（每个闪卡集的文件名）：\n\n```\nfunc ListFlashCardsNames() []string {\n\
  flashcardsDir, err := os.Open(\"flashcardsets\")\nif err != nil {\nreturn nil\n\
  }\nfiles, err := flashcardsDir.Readdir(-1)\nfileNames := make([]string, len(files))\n\
  for n, f := range files {\nfileNames[n] = f.Name()\n}\nsort.Strings(fileNames)\n\
  return fileNames\n}\n```\n\n### manageFlashCards 函数\n\n在 `server.go` 中，按下“Show Cards\
  \ in Set”按钮或“List Words in Set”按钮时，会调用 `manageFlashCards` 函数来管理表单提交。它从表单请求中提取值，然后在\
  \ `showFlashCards` 和 `listWords` 之间做出选择：\n\n```\n/*\n* 在表单提交时从 listflashcards.html\
  \ 调用\n*/\nfunc manageFlashCards(rw http.ResponseWriter, req *http.Request) {\nset\
  \ := req.FormValue(\"flashcardSets\")\norder := req.FormValue(\"order\")\naction\
  \ := req.FormValue(\"submit\")\nhalf := req.FormValue(\"half\")\n//如果未设置\n//http://localhost:8000/flashcardSets?flashcardSets=common_words&order=Random&half=Random&submit=Show+cards+in+set\n\
  if len(set) == 0 {\nset = DefaultSet\norder = DefaultAmount\naction = ActionShow\n\
  half = DefaultAmount\n}\ncardname := URLFlashCardSetsPath + \"/\" + set\nfmt.Printf(\"\
  Set %s, order %s, action %s, half %s, cardname %s\\n\", set, order, action, half,\
  \ cardname)\nswitch action {\ncase ActionShow:\nshowFlashCards(rw, cardname, order,\
  \ half)\ncase ActionList:\nlistWords(rw, cardname)\ndefault:\nfmt.Println(ActionUnknown)\n\
  }\n}\n```\n\n## 中文词典\n\n之前的代码相当通用：使用 `FileServer` 提供静态文件，基于目录中的文件列表通过模板生成 HTML 表格，并处理\
  \ HTML 表单中的信息。要进一步探究每张卡片显示的内容，我们需要深入研究应用特定的细节，这意味着要查看单词的来源（词典）、如何表示单词和卡片，以及如何将闪卡数据发送到浏览器。首先，来看词典。\n\
  \n中文是一门复杂的语言——难道不都是吗 :-( 。书面形式是表意的，即“象形文字”，而不是使用字母表。但这种书面形式随着时间的推移而演变，甚至在最近分成了两种形式：台湾和香港使用的“繁体”中文，以及中国大陆使用的“简体”中文。虽然大多数汉字是相同的，但大约有\
  \ 1000 个汉字不同。因此，一本中文词典通常会有同一个汉字的两种书写形式。\n\n大多数像我这样的西方人看不懂这些汉字。因此有一种称为拼音的“拉丁化”形式，它使用基于拉丁字母的注音字母来书写汉字。它不完全等同于拉丁字母，因为中文是一种声调语言，拼音形式必须标出声调（类似于法语和其他欧洲语言中的重音符号）。因此，一本典型的词典需要显示四项内容：繁体字、简体字、拼音和英文。此外（就像英语一样），一个词可能有多种含义。例如，[`http://www.mandarintools.com/worddict.html`](http://www.mandarintools.com/worddict.html)\
  \ 上有一个免费的中/英词典，更好的是，你可以将其下载为 UTF-8 文件。其中，词“好”有这样的条目：\n\n| **繁体** | **简体** | **拼音**\
  \ | **英文** | **含义** |\n| --- | --- | --- | --- | --- |\n| 好 | 好 | hǎo | good | /好/良好/适当/易于/非常/如此/(表示完成或准备好的后缀)/\
  \ |\n\n这本词典有一个小问题。大多数键盘不擅长表示变音符号，比如 ǎ 中的抑扬符。因此，虽然汉字是用 Unicode 编写的，但拼音字符却不是。尽管存在诸如\
  \ ǎ 等字母的 Unicode 字符，但许多词典（包括本词典）都使用拉丁字母 `a`，并将声调放在词尾。这里，它是第三声，所以 `hǎo` 被写为 `hao3`。这使得只有美式键盘且没有\
  \ Unicode 编辑器的人也能更容易地用拼音交流。Web 服务器使用的词典副本是 `cedict_ts.u8`。\n\n这种数据格式的不匹配并不是大问题。只是在原始文本词典和浏览器显示之间的某个环节，需要进行数据转换。Go\
  \ 模板允许通过定义自定义模板来完成这一点，所以我选择了这条路。其他方法包括在读取词典时进行处理，或在 JavaScript 中显示最终字符。\n\n### 词典类型\n\
  \n在 `dictionary.go` 中，我们使用 `DictionaryEntry` 来存储一个词的基本信息：\n\n```\ntype DictionaryEntry\
  \ struct {\nTraditional  string\nSimplified   string\nPinyin       string\nTranslations\
  \ []string\n}\n```\n\n前面的词“好”将由以下内容表示：\n\n```\nDictionaryEntry {Traditional: 好,\n\
  Simplified: 好,\nPinyin: `hao3`\nTranslations: []string{`good`, `well`,`proper`,\n\
  `good to`, `easy to`, `very`, `so`,\n`(suffix indicating completion or readiness)`}\n\
  }\n```\n\n词典本身只是这些条目的一个数组：\n\n```\ntype Dictionary struct {\nEntries []*DictionaryEntry\n\
  }\n```\n\n\n\n### 闪卡组\n\n一张闪卡用于表示一个中文词语及其英文翻译。我们已经看到，一个中文词语可能有多种英文含义。但这部词典有时也会多次出现同一个中文词语。例如，“好”至少出现两次，一次是我们已经见过的含义，另一次则是“喜爱”的意思。虽然这显得有些多余，但为了应对这种情况，每张闪卡都附带了一整本词典。通常情况下，词典中只有一个词条！闪卡的其余部分只是简体字和英文单词，作为可能的检索键，代码来自\
  \ `flashcards.go`：\n\n```\ntype FlashCard struct {\n    Simplified string\n    English\
  \    string\n    Dictionary *Dictionary\n}\n```\n\n闪卡组（*set*）是这些闪卡的数组，外加组名以及将发送到浏览器用于展示的信息：随机或固定顺序，先显示每张卡的正面或背面，或者随机顺序，代码来自\
  \ `flashcards.go`：\n\n```\ntype FlashCards struct {\n    Name      string\n    CardOrder\
  \ string\n    ShowHalf  string\n    Cards     []*FlashCard\n}\n```\n\n我们已经展示过该类型的一个函数——`ListFlashCardsNames()`。该类型还有一个加载闪卡组\
  \ JSON 文件的函数。它使用了第 4*章中提到的技术，代码在 `flashcards.go` 中：\n\n```\nfunc LoadJSON(r io.Reader,\
  \ key any) {\n    decoder := json.NewDecoder(r)\n    err := decoder.Decode(key)\n\
  \    checkError(err)\n}\n```\n\n一个典型的闪卡组包含常用词语。当 JSON 文件被美化打印（例如使用 jq）时，部分内容如下所示：\n\
  \n```\n{\n    \"ShowHalf\":\"\",\n    \"Cards\":[\n        {\n            \"Simplified\"\
  :\"\\u4f60\\u597d\",\n            \"Dictionary\":{\n                \"Entries\"\
  :[\n                    {\n                        \"Traditional\":\"\\u4f60\\u597d\"\
  ,\n                        \"Pinyin\":\"ni3 hao3\",\n                        \"\
  Translations\":[\n                            \"hello\",\n                     \
  \       \"hi\",\n                            \"how are you?\"\n                \
  \        ],\n                        \"Simplified\":\"\\u4f60\\u597d\"\n       \
  \             }\n                ]\n            },\n            \"English\":\"hello\"\
  \n        },\n        {\n            \"Simplified\":\"\\u5582\",\n            \"\
  Dictionary\":{\n                \"Entries\":[\n                    {\n         \
  \               \"Traditional\":\"\\u5582\",\n                        \"Pinyin\"\
  :\"wei4\",\n                        \"Translations\":[\n                       \
  \     \"hello (interj., esp. on telephone)\",\n                            \"hey\"\
  ,\n                            \"to feed (sb or some animal)\"\n               \
  \         ],\n                        \"Simplified\":\"\\u5582\"\n             \
  \       }\n                ]\n            },\n            \"English\":\"hello (interj.,\
  \ esp. on telephone)\"\n        },\n    ],\n    \"CardOrder\":\"\",\n    \"Name\"\
  :\"Common Words\"\n}\n```\n\n### 修复音调\n\n在完成服务器代码之前，还有最后一项主要任务。词典中给出的音调标记位于拼音单词的末尾，例如\
  \ `hao3` 对应 hǎo。可以使用自定义模板将其转换为 Unicode，如第 9 章所述。\n\n以下是拼音格式化器的代码。除非你*真的*对了解拼音格式化规则感兴趣，否则不必费心阅读。程序是\
  \ `pinyinformatter.go`：\n\n```\nch10$ cat pinyinformatter.go\npackage main\nimport\
  \ (\n    \"fmt\"\n    \"strings\"\n)\nfunc PinyinFormatter(args ...interface{})\
  \ string {\n    ok := false\n    var s string\n    if len(args) == 1 {\n       \
  \ s, ok = args[0].(string)\n    }\n    if !ok {\n        s = fmt.Sprint(args...)\n\
  \    }\n    fmt.Println(\"Formatting func \" + s)\n    // the string may consist\
  \ of several pinyin words\n    // each one needs to be changed separately and then\n\
  \    // added back together\n    words := strings.Fields(s)\n    for n, word :=\
  \ range words {\n        // convert \"u:\" to \"ü\" if present\n        uColon :=\
  \ strings.Index(word, \"u:\")\n        if uColon != -1 {\n            parts := strings.SplitN(word,\
  \ \"u:\", 2)\n            word = parts[0] + \"ü\" + parts[1]\n        }\n      \
  \  println(word)\n        // get last character, will be the tone if present\n \
  \       chars := []rune(word)\n        tone := chars[len(chars)-1]\n        if tone\
  \ == '5' {\n            // there is no accent for tone 5\n            words[n] =\
  \ string(chars[0 : len(chars)-1])\n            println(\"lost accent on\", words[n])\n\
  \            continue\n        }\n        if tone  '4' {\n            // not a tone\
  \ value\n            continue\n        }\n        words[n] = addAccent(word, int(tone))\n\
  \    }\n    s = strings.Join(words, ` `)\n    return s\n}\nvar (\n    // maps 'a1'\
  \ to '\\u0101' etc\n    aAccent = map[int]rune{\n        '1': '\\u0101',\n     \
  \   '2': '\\u00e1',\n        '3': '\\u01ce',\n        '4': '\\u00e0'}\n    eAccent\
  \ = map[int]rune{\n        '1': '\\u0113',\n        '2': '\\u00e9',\n        '3':\
  \ '\\u011b',\n        '4': '\\u00e8'}\n    iAccent = map[int]rune{\n        '1':\
  \ '\\u012b',\n        '2': '\\u00ed',\n        '3': '\\u01d0',\n        '4': '\\\
  u00ec'}\n    oAccent = map[int]rune{\n        '1': '\\u014d',\n        '2': '\\\
  u00f3',\n        '3': '\\u01d2',\n        '4': '\\u00f2'}\n    uAccent = map[int]rune{\n\
  \        '1': '\\u016b',\n        '2': '\\u00fa',\n        '3': '\\u01d4',\n   \
  \     '4': '\\u00f9'}\n    üAccent = map[int]rune{\n        '1': 'ǖ',\n        '2':\
  \ 'ǘ',\n        '3': 'ǚ',\n        '4': 'ǜ'}\n)\nfunc addAccent(word string, tone\
  \ int) string {\n    /*\n    * Based on \"Where do the tone marks go?\"\n    * at\
  \ http://www.pinyin.info/rules/where.html\n    */\n    n := strings.Index(word,\
  \ \"a\")\n    if n != -1 {\n        aAcc := aAccent[tone]\n        // replace 'a'\
  \ with its tone version\n        word = word[0:n] + string(aAcc) + word[(n+1):len(word)-1]\n\
  \    } else {\n        n := strings.Index(word, \"e\")\n        if n != -1 {\n \
  \           eAcc := eAccent[tone]\n            word = word[0:n] + string(eAcc) +\n\
  \                word[(n+1):len(word)-1]\n        } else {\n            n = strings.Index(word,\
  \ \"ou\")\n            if n != -1 {\n                oAcc := oAccent[tone]\n   \
  \             word = word[0:n] + string(oAcc) + \"u\" +\n                    word[(n+2):len(word)-1]\n\
  \            } else {\n                chars := []rune(word)\n                length\
  \ := len(chars)\n                // put tone onthe last vowel\n            L:\n\
  \                for n, _ := range chars {\n                    m := length - n\
  \ - 1\n                    switch chars[m] {\n                    case 'i':\n  \
  \                      chars[m] = iAccent[tone]\n                        break L\n\
  \                    case 'o':\n                        chars[m] = oAccent[tone]\n\
  \                        break L\n                    case 'u':\n              \
  \          chars[m] = uAccent[tone]\n                        break L\n         \
  \           case 'ü':\n                        chars[m] = üAccent[tone]\n      \
  \                  break L\n                    default:\n                    }\n\
  \                }\n                word = string(chars[0 : len(chars)-1])\n   \
  \         }\n        }\n    }\n    return word\n}\n```\n\n### ListWords 函数\n\n现在我们可以返回到服务器中剩余的函数了。一个是列出闪卡组中的单词。它使用闪卡组的模板填充一个\
  \ HTML 表格。该 HTML 使用模板包遍历 `FlashCards` 结构体并插入其中的字段：\n\n```\nch10$ cat html/listwords.html\n\
  \nWords for {{.Name}}\n\nWords for {{.Name}}\n\n English \n Pinyin \n Traditional\
  \ \n Simplified \n\n{{range .Cards}}\n\n{{.English}}\n\n{{with .Dictionary}}\n{{range\
  \ .Entries}}\n\n{{.Pinyin|pinyin}}\n\n{{.Traditional}}\n\n{{.Simplified}}\n\n{{end}}\n\
  {{end}}\n\n{{end}}\n\n Return to Flash Cards list\n\n```\n\n`server.go` 中实现此功能的\
  \ Go 函数使用了上一节讨论的 `PinyinFormatter`：\n\n```\nfunc listWords(rw http.ResponseWriter,\
  \ cardname string) {\n    fmt.Println(\"Loading card name\", cardname)\n    cards\
  \ := new(FlashCards)\n    LoadJSON(cardname, cards)\n    fmt.Println(\"loaded cards\"\
  , len(cards.Cards))\n    fmt.Println(\"Card name\", cards.Name)\n    t := template.New(\"\
  listwords.html\")\n    t = t.Funcs(template.FuncMap{\"pinyin\": PinyinFormatter})\n\
  \    t, err := t.ParseFiles(\"html/listwords.html\")\n    if err != nil {\n    \
  \    fmt.Println(\"Parse error \" + err.Error())\n        http.Error(rw, err.Error(),\
  \ http.StatusInternalServerError)\n        return\n    }\n    err = t.Execute(rw,\
  \ cards)\n    if err != nil {\n        fmt.Println(\"Execute error \" + err.Error())\n\
  \        http.Error(rw, err.Error(), http.StatusInternalServerError)\n        return\n\
  \    }\n}\n```\n\n这将填充好的表格发送到浏览器，如图 10-4 所示。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的格式和要求，将给定的英文文本翻译成中文。\n\
  \n\n## `showFlashCards` 函数\n\n完成服务器的最后一个函数是 `showFlashCards`。此函数根据浏览器提交的表单，更改卡片组中\
  \ `CardOrder` 和 `ShowHalf` 的默认值。然后，它应用 `PinyinFormatter` 并将生成的文档发送到浏览器。我捕获了使用 UNIX\
  \ 命令 `script` 进行的命令行会话的输出，然后运行了以下命令：\n\n```\nGET /flashcardSets?flashcardSets=Common+Words&order=Random&half=Chinese&submit=Show+cards+in+set\
  \ HTTP/1.0\n```\n\n结果的一部分如下所示：\n\n```\nch10$ cat ./html/showflashcards.html\n\n\
  Flashcards for {{.Name}}\n\ncardOrder = {{- .CardOrder }};\nshowHalfCard = {{- .ShowHalf\
  \ }};\n\n -->\n\nFlashcards for {{.Name}}\n\n{{range .Cards}}\n\nEnglish: {{.English}}\n\
  \n{{with .Dictionary}}\n{{range .Entries}}\n\nPinyin: {{.Pinyin|pinyin}}\n\nTraditional:\
  \ {{.Traditional}}\n\nSimplified: {{.Simplified}}\n\nTranslations:\n{{range .Translations}}\n\
  {{.}} \n{{end}}\n\n{{end}}\n{{end}}\n\n{{end}}\n\nPress &lt;Space&gt; or Tap to\
  \ continue\n\n Return to Flash Cards list\n\n```\n\n实际的函数如下所示。我们可以看到卡片组、展示顺序和渲染，这与之前的函数非常相似。\n\
  \n```\nfunc showFlashCards(rw http.ResponseWriter, cardname, order, half string)\
  \ {\ncards := new(FlashCards)\ncontent, err := os.Open(cardname)\ncheckError(err)\n\
  LoadJSON(content, &cards)\nswitch order {\ncase CardOrderSequential:\ncards.CardOrder\
  \ = \"SEQUENTIAL\"\ndefault:\ncards.CardOrder = \"RANDOM\"\n}\nif v, ok := showHalf[half];\
  \ ok {\ncards.ShowHalf = v\n} else {\ncards.ShowHalf = showHalf[\"Chinese\"]\n}\n\
  fmt.Printf(\"Loading card %s, half %s, loaded # of %d, card name %s\\n\", cardname,\
  \ half, len(cards.Cards), cards.Name)\nt, err := template.New(ShowFlashCardPage).Funcs(template.FuncMap{\"\
  pinyin\": PinyinFormatter}).ParseFiles(\"html/\" + ShowFlashCardPage)\nif err !=\
  \ nil {\nhttpErrorHandler(rw, err)\nreturn\n}\nerr = t.Execute(rw, cards)\nif err\
  \ != nil {\nhttpErrorHandler(rw, err)\nreturn\n}\n}\n```\n\n除了渲染之外，我们还有基本的错误处理：`checkError`\
  \ 用于处理严重错误（足以导致关闭），而 `httpErrorHandler` 则在我们希望指示 HTTP 500 状态时使用。\n\n### 浏览器中的呈现\n\
  \n本系统的最后一部分是此 HTML 在浏览器中的显示方式。图 10-3 展示了一个由四部分组成的屏幕，分别显示英语、简体中文、备用翻译以及繁简对照。这是通过下载到服务器的\
  \ JavaScript 程序（使用 `FileServer` Go 对象完成）实现的。`slideviewer.js` JavaScript 文件实际上相当长，因此在文中省略。它包含在位于\
  \ [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)\
  \ 的程序文件中。\n\n### 运行服务器\n\n然后，可以使用如下命令在端口 `8000`（或其他端口）上运行服务器：\n\n```\nch10$ go run\
  \ *.go :8000\n```\n\n或\n\n```\nch10$ go run server.go pinyinformatter.go flashCards.go\
  \ dictionary.go :8000\n```\n\n## 总结\n\n本章介绍了一个相对简单但完整的 Web 服务器，它使用了静态和动态网页，并包含表单处理，同时利用模板来简化编码。\n\
  \n# 11. HTML\n\n万维网最初是为了提供 HTML 文档而创建的。现在，它被用来提供各种文档以及不同类型的数据。尽管如此，HTML 仍然是网络上传输的主要文档类型。\n\
  \nHTML 经历了大量版本迭代，当前版本是 HTML5。还有许多“供应商”版本的 HTML，它们引入了一些从未成为标准的标签。\n\nHTML 足够简单，可以手动编辑。因此，许多\
  \ HTML 文档是“格式错误的”，这意味着它们不符合该语言的语法。HTML 解析器通常不是很严格，会接受许多“非法的”文档。\n\n`html` 包本身只有两个函数：`EscapeString`\
  \ 和 `UnescapeString`。它们能正确处理诸如 `<` 之类的字符，将其转换为 `&lt;` 再转换回来。\n\n此函数的一个主要用途可能是对 HTML\
  \ 文档中的标记进行转义，这样当它在浏览器中显示时，会展示所有标记（很像 Linux 版 Chrome 中的 `Ctrl+U` 或 Mac 版 Chrome 中的\
  \ `Option+Cmd+U`）。\n\n我更倾向于使用它来将程序的文本显示为网页。大多数编程语言都有 `<` 符号，许多语言还有 `&`。如果不进行适当的转义，这些字符会扰乱\
  \ HTML 查看器。我喜欢直接从文件系统中显示程序文本，而不是复制粘贴到文档中，以避免不同步。\n\n下面的 `escapestring.go` 程序是一个\
  \ Web 服务器，它以预格式化代码的形式显示其 URL，并对棘手的字符进行了转义：\n\n```\n$ mkdir ch11\n$ cd ch11\nch11$\
  \ vi escapestring.go\n/*\n* This program serves a file in preformatted, code layout\n\
  * Useful for showing program text, properly escaping special\n* characters like\
  \ '' and '&'\n*/\npackage main\nimport (\n\"fmt\"\n\"html\"\n\"log\"\n\"net/http\"\
  \n\"os\"\n)\nfunc main() {\nhttp.HandleFunc(\"/\", escapeString)\nerr := http.ListenAndServe(\"\
  :8080\", nil)\ncheckError(err)\n}\nfunc escapeString(rw http.ResponseWriter, req\
  \ *http.Request) {\nfmt.Println(req.URL.Path)\nbytes, err := os.ReadFile(\".\" +\
  \ req.URL.Path)\nif err != nil {\nrw.WriteHeader(http.StatusNotFound)\nreturn\n\
  }\nescapedStr := html.EscapeString(string(bytes))\nhtmlText := \"\" +\nescapedStr\
  \ +\n\" \"\nrw.Write([]byte(htmlText))\n}\nfunc checkError(err error) {\nif err\
  \ != nil {\nlog.Fatalln(\"Error \", err.Error())\n}\n}\n```\n\n当它运行时，从包含 `escapestring.go`\
  \ 程序的目录提供文件服务，浏览器将使用 URL `localhost:8080/escapestring.go` 正确显示该文件。\n\n使用以下命令运行服务器：\n\
  \n```\nch11$ go run escapestring.go\n```\n\n例如，使用以下命令（或在浏览器中）运行客户端：\n\n```\nch11$\
  \ curl localhost:8080/escapestring.go\n/*\n* This program serves a file in preformatted,\
  \ code layout\n...\n}\n\n```\n\n在这两种情况下，结果都是我们原始的代码（包裹在一个 pre/code 块中）！如果您输错了名称，将会收到\
  \ HTTP 404 错误。\n\n\n\n## `html/template` 包\n\n网络服务器可能遭受多种攻击，最著名的是 SQL 注入攻击，即用户代理在网页表单中输入特意设计的数据，这些数据会传入数据库并造成严重破坏。Go\
  \ 语言并没有提供特别的机制来避免这种情况，因为不同数据库在 SQL 注入技术方面存在诸多差异，导致成功的攻击方式各不相同。SQL 注入防御速查表（参见 [`https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html`](https://cheatsheetseries.owasp.org/cheatsheets/SQL_Injection_Prevention_Cheat_Sheet.html)）总结了针对此类攻击的防御措施。其中最主要的方法是使用\
  \ SQL *预编译语句*来避免此类攻击，这可以通过 `database/sql` 包中的 `Prepare` 函数实现。\n\n更隐蔽的攻击基于 XSS——跨站脚本攻击。攻击者不是试图攻击网站本身，而是在服务器上存储恶意代码来攻击该网站的任何客户端。\n\
  \n这些攻击基于向数据库字符串中插入数据，当这些数据（例如）被传送给浏览器时，将攻击浏览器，并通过浏览器攻击网站客户端。（关于此攻击的几种变体，请参见“OWASP:\
  \ XSS 的类型”—— [`https://owasp.org/www-community/Types_of_Cross-Site_Scripting`](https://owasp.org/www-community/Types_of_Cross-Site_Scripting)。）\n\
  \n例如，在请求发表博客评论的位置可能被插入 JavaScript 代码，将浏览器重定向到攻击者的网站：\n\n```\nwindow.location='http://attacker/'\n\
  ```\n\nGo 的 `html/template` 包是在 `text/template` 包的基础上构建的。该包假定模板本身是可信的，但模板处理的数据可能不可信。`html/template`\
  \ 包增加的功能是对数据进行适当的转义，以消除 XSS 的可能性。它基于 Mike Samuel 和 Prateek Saxena 撰写的论文“Using Type\
  \ Inference to Make Web Templates Robust Against XSS”。请访问 [`https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition`](https://rawgit.com/mikesamuel/sanitized-jquery-templates/trunk/safetemplate.html#problem_definition)\
  \ 阅读该论文，以了解该包背后的理论以及包文档本身。\n\n简而言之，按照 `text/template` 包的方式准备模板，如果生成的文本要交付给 HTML\
  \ 代理，则使用 `html/template` 包。\n\n## HTML 词法分析\n\nGo 子仓库中的 `golang.org/x/net/html`\
  \ 包包含一个 HTML 词法分析器。它允许你构建一个 HTML 词法单元的解析树。该包符合 HTML5 标准。\n\n下面是一个在 `readhtml.go`\
  \ 中使用该包的示例程序。\n\n```\nch11$ vi readhtml.go\n/* Read HTML\n*/\npackage main\nimport\
  \ (\n\"fmt\"\n\"golang.org/x/net/html\"\n\"io\"\n\"log\"\n\"os\"\n\"strings\"\n\
  )\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"\
  file\")\n}\nfile := os.Args[1]\nbytes, err := os.ReadFile(file)\ncheckError(err)\n\
  r := strings.NewReader(string(bytes))\nz := html.NewTokenizer(r)\ndepth := 0\nfor\
  \ {\ntt := z.Next()\nfor n := 0; n < depth; n++ {\nfmt.Print(\" \")\n}\nswitch tt\
  \ {\ncase html.ErrorToken:\nif z.Err() == io.EOF {\nfmt.Println(\"EOF\")\n} else\
  \ {\nfmt.Println(\"Error \", z.Err().Error())\n}\nos.Exit(0)\ncase html.TextToken:\n\
  fmt.Println(\"Text: \\\"\" + z.Token().String() + \"\\\"\")\ncase html.StartTagToken,\
  \ html.EndTagToken:\nfmt.Println(\"Tag: \\\"\" + z.Token().String() + \"\\\"\")\n\
  if tt == html.StartTagToken {\ndepth++\n} else {\ndepth--\n}\n}\n}\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n当我们对一个像 `sample.html` 这样简单的 HTML 文档运行 `readhtml.go` 时：\n\n```\nch11$ vi sample.html\n\
  \n Test HTML \n\n Header one \n\nTest para\n\n```\n\n在设置好依赖项后，它会产生以下输出：\n\n```\n\
  $ go mod init example.com/user/readhtml\n$ go mod tidy\n$ go run readhtml.go sample.html\n\
  Tag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \" Test HTML\
  \ \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\n\
  Tag: \"\"\nText: \" Header one \"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\
  Test para\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText: \"\n\"\nTag: \"\"\nText:\
  \ \"\n\"\nEOF\n```\n\n（它产生的所有空白字符都是正确的。）\n\n## XHTML/HTML\n\n在 XML 包中也对 XHTML/HTML\
  \ 提供了有限的支持，这将在下一章讨论。\n\n## JSON\n\n正如第 4 章所述，Go 对 JSON 提供了良好的支持。\n\n## 结论\n\n这个包本身内容不多。其子包\
  \ `html/template` 已在第 9 章关于模板的部分讨论过。\n\n# 12. XML\n\nXML 是一种重要的标记语言，主要旨在作为一种使用文本格式表示结构化数据的手段。用我们在第\
  \ 4 章使用的术语来说，它可以被视为一种将数据结构序列化为文本文档的方式。它用于描述诸如 DocBook 和 XHTML 之类的文档。它用于专门的标记语言，如\
  \ MathML 和 CML（化学标记语言）。它用于将数据编码为 Web 服务的 SOAP 消息，并且 Web 服务可以使用 WSDL（Web 服务描述语言）来指定。\n\
  \n在最简单的层面上，XML 允许你在文本文档中定义自己的标签。标签可以嵌套，也可以与文本交错。每个标签还可以包含带有值的属性。例如，文件 `person.xml`\
  \ 可能包含：\n\n```\n$ mkdir ch12\n$ cd ch12\nch12$ vi person.xml\n\n Newmarch \n Jan\
  \ \n\njan@newmarch.name\n\nj.newmarch@boxhill.edu.au\n\n```\n\n任何 XML 文档的结构可以通过多种方式描述：\n\
  \n*   文档类型定义 (DTD) 擅长描述结构。\n*   XML 模式擅长描述 XML 文档所使用的数据类型。\n*   RELAX NG 被提出作为这两种方式的替代方案。\n\
  \n对于每种定义 XML 文档结构方式的相对价值存在争论。我们不打算深入参与这场争论，因为 Go 语言并不支持其中任何一种。Go 无法根据某种模式检查文档的有效性，而只能检查其格式是否良好。即使是格式良好性也是\
  \ XML 文档的一个重要特征，并且在实际中 HTML 文档经常在这方面出现问题。这使得 XML 即使对于非常复杂的数据也适合进行表示，而 HTML 则不行。\n\
  \n本章讨论四个主题：将 Go 数据编组和解编组为 XML、解析 XML 流，以及 XHTML。\n\n\n\n## 解组 XML\n\nGo 提供了一个名为\
  \ `Unmarshal` 的函数，用于将 XML 解组到 Go 数据结构中。解组并非完美无缺：Go 和 XML 是不同的语言。\n\n在深入细节之前，我们先看一个简单的例子。首先，考虑前面给出的\
  \ XML 文档（`person.xml`）：\n\n```xml\n<person>\n<name>\n<family>Newmarch</family>\n\
  <personal>Jan</personal>\n</name>\n<email type=\"personal\">\njan@newmarch.name\n\
  </email>\n<email type=\"work\">\nj.newmarch@boxhill.edu.au\n</email>\n</person>\n\
  ```\n\n我们希望将其映射到 Go 结构体：\n\n```go\ntype Person struct {\n    Name  Name\n    Email\
  \ []Email\n}\ntype Name struct {\n    Family   string\n    Personal string\n}\n\
  type Email struct {\n    Type    string\n    Address string\n}\n```\n\n这需要几点说明：\n\
  \n- 解组使用 Go 的反射包。这要求所有字段都必须是导出的，即以大写字母开头。早期版本的 Go 使用不区分大小写的匹配来匹配字段，例如将 XML 字符串 `\"\
  name\"` 匹配到字段 `Name`。但现在使用的是*区分大小写*的匹配。为了执行匹配，结构体字段必须添加标签，以指明要匹配的 XML 字符串。这会将 `Person`\
  \ 更改为以下形式：\n\n```go\ntype Person struct {\n    Name  Name    `xml:\"name\"`\n  \
  \  Email []Email `xml:\"email\"`\n}\n```\n\n- 虽然字段标签可以将 XML 字符串附加到字段上，但它无法对结构体名称进行此操作。需要一个额外的字段，字段名为\
  \ `XMLName`。这只影响顶层结构体 `Person`：\n\n```go\ntype Person struct {\n    XMLName Name\
  \    `xml:\"person\"`\n    Name    Name    `xml:\"name\"`\n    Email   []Email `xml:\"\
  email\"`\n}\n```\n\n- 重复的标签映射到 Go 中的切片。\n\n- 标签内的属性仅当 Go 字段具有标签 `,attr` 时才会匹配到结构体中的字段。`Email`\
  \ 的 `Type` 字段就是这种情况，匹配 `email` 标签的 `type` 属性需要 `xml:\"type,attr\"`。\n\n- 如果 XML\
  \ 标签没有属性且仅包含字符数据，那么它将以相同的名称（但区分大小写）匹配一个 `string` 字段。因此，标签 `xml:\"family\"` 及其字符数据\
  \ `Newmarch` 映射到字符串字段 `Family`。\n\n- 但如果标签有属性，则必须映射到一个结构体。Go 将字符数据分配给具有标签 `,chardata`\
  \ 的字段。`email` 数据和具有标签 `,chardata` 的字段 `Address` 就是这种情况。\n\n解组上述文档的程序是 `unmarshal.go`：\n\
  \n```go\n/*\nch12$ vi unmarshal.go\n/* Unmarshal\n*/\npackage main\nimport (\n\"\
  encoding/xml\"\n\"fmt\"\n\"log\"\n)\ntype Person struct {\nXMLName Name    `xml:\"\
  person\"`\nName    Name    `xml:\"name\"`\nEmail   []Email `xml:\"email\"`\n}\n\
  type Name struct {\nFamily   string `xml:\"family\"`\nPersonal string `xml:\"personal\"\
  `\n}\ntype Email struct {\nType    string `xml:\"type,attr\"`\nAddress string `xml:\"\
  ,chardata\"`\n}\nfunc main() {\nstr := `\n<person>\n<name>\n<family>Newmarch</family>\n\
  <personal>Jan</personal>\n</name>\n<email type=\"personal\">\njan@newmarch.name\n\
  </email>\n<email type=\"work\">\nj.newmarch@boxhill.edu.au\n</email>\n</person>\n\
  `\nvar person Person\nerr := xml.Unmarshal([]byte(str), &person)\ncheckError(err)\n\
  // now use the person structure e.g.\nfmt.Println(\"Family name: \\\"\" + person.Name.Family\
  \ + \"\\\"\")\nfor _, email := range person.Email {\nfmt.Println(email)\n}\n}\n\
  func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
  }\n}\n/*\nch12$ go run unmarshal.go\nFamily name: \" Newmarch \"\n{personal\njan@newmarch.name\n\
  }\n{work\nj.newmarch@boxhill.edu.au\n}\n*/\n```\n\n（注意空格是正确的。）严格的规则在包规范中给出；请参阅 `go\
  \ doc -all encoding/xml`。\n\n## 编组 XML\n\nGo 也支持将数据结构编组到 XML 文档中。该函数是：\n\n```go\n\
  func Marshal(v interface}{) ([]byte, error)\n```\n\n一个编组简单结构的程序是 `marshal.go`：\n\
  \n```go\n/*\nch12$ vi marshal.go\n/* Marshal\n*/\npackage main\nimport (\n\"encoding/xml\"\
  \n\"fmt\"\n)\ntype Person struct {\nXMLName xml.Name `xml:\"person\"`\nName    Name\
  \     `xml:\"name\"`\nEmail   []Email  `xml:\"email\"`\n}\ntype Name struct {\n\
  Family   string `xml:\"family\"`\nPersonal string `xml:\"personal\"`\n}\ntype Email\
  \ struct {\nKind    string \"attr\"\nAddress string \"chardata\"\n}\nfunc main()\
  \ {\nperson := Person{\nName: Name{Family: \"Newmarch\", Personal: \"Jan\"},\nEmail:\
  \ []Email{Email{Kind: \"home\", Address: \"jan\"},\nEmail{Kind: \"work\", Address:\
  \ \"jan\"}}}\nbuff, _ := xml.Marshal(person)\nfmt.Println(string(buff))\n}\n/*\n\
  ch12$ go run marshal.go\nNewmarchJanhomejanworkjan\n*/\n```\n\n它会产生没有空白的文本。\n\n\
  ## 解析 XML\n\nGo 有一个 XML 解析器，可以使用 `encoding/xml` 包中的 `NewDecoder` 创建。该函数接受一个 `io.Reader`\
  \ 作为参数，并返回一个指向 `Decoder` 的指针。该类型的主要方法是 `Token`，它返回输入流中的下一个令牌。令牌是以下类型之一：`StartElement`、`EndElement`、`CharData`、`Comment`、`ProcInst`\
  \ 或 `Directive`。\n\nXML 类型是 `StartElement`、`EndElement`、`CharData`、`Comment`、`ProcInst`\
  \ 和 `Directive`。下面将对其进行描述。\n\n### StartElement 类型\n\n`StartElement` 类型是一个具有两个字段类型的结构体：\n\
  \n```go\ntype StartElement struct {\n    Name Name\n    Attr []Attr\n}\n```\n\n\
  其中：\n\n```go\ntype Attr struct {\n    Name  Name\n    Value string\n}\n```\n\n###\
  \ EndElement 类型\n\n这也是一个结构体，如下所示：\n\n```go\ntype EndElement struct {\n    Name Name\n\
  }\n```\n\n### CharData 类型\n\n此类型表示标签括起来的文本内容，是一个简单类型：\n\n```go\ntype CharData []byte\n\
  ```\n\n### Comment 类型\n\n类似地，对于注释，此类型与 `CharData` 的类型相似：\n\n```go\ntype Comment\
  \ []byte\n```\n\n### ProcInst 类型\n\n`ProcInst` 表示形式为 `<?target inst?>` 的 XML 处理指令：\n\
  \n```go\ntype ProcInst struct {\n    Target string\n    Inst   []byte\n}\n```\n\n\
  ### Directive 类型\n\n`Directive` 表示形式为 `<!text>` 的 XML 指令。字节不包括 `<!` 和 `>` 标记。\n\n\
  ```go\ntype Directive []byte\n```\n\n一个打印 XML 文档树结构的程序是 `parsexml.go`：\n\n```go\n\
  /*\nch12$ vi parsexml.go\n/* Parse XML\n*/\npackage main\nimport (\n\"encoding/xml\"\
  \n\"fmt\"\n\"io/ioutil\"\n\"log\"\n\"os\"\n\"strings\"\n)\nfunc main() {\nif len(os.Args)\
  \ != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"file\")\n}\nfile := os.Args[1]\n\
  bytes, err := ioutil.ReadFile(file)\ncheckError(err)\nr := strings.NewReader(string(bytes))\n\
  parser := xml.NewDecoder(r)\ndepth := 0\nfor {\ntoken, err := parser.Token()\nif\
  \ err != nil {\nbreak\n}\nswitch elmt := token.(type) {\ncase xml.StartElement:\n\
  name := elmt.Name.Local\nprintElmt(name+\":start\", depth)\ndepth++\ncase xml.EndElement:\n\
  depth--\nname := elmt.Name.Local\nprintElmt(name+\":end\", depth)\ncase xml.CharData:\n\
  printElmt(string([]byte(elmt)), depth)\ncase xml.Comment:\nprintElmt(\"Comment\"\
  , depth)\ncase xml.ProcInst:\nprintElmt(\"ProcInst\", depth)\ncase xml.Directive:\n\
  printElmt(\"Directive\", depth)\ndefault:\nfmt.Println(\"Unknown\")\n}\n}\n}\nfunc\
  \ printElmt(s string, depth int) {\nslimS := strings.TrimSpace(s)\nif len(slimS)\
  \ == 0 {\nreturn\n}\nfor n := 0; n < depth; n++ {\nfmt.Print(\"  \")\n}\nfmt.Println(slimS)\n\
  }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \",\
  \ err.Error())\n}\n}\n*/\n```\n\n请注意，解析器会包含所有 `CharData`，包括标签之间的空白。\n\n如果我们对前面给出的\
  \ `person` 数据结构运行 `parsexml.go` 程序，如下所示：\n\n```\nch12$ go run parsexml.go person.xml\n\
  person:start\nname:start\nfamily:start\nNewmarch\nfamily:end\npersonal:start\nJan\n\
  personal:end\nname:end\nemail:start\njan@newmarch.name\nemail:end\nemail:start\n\
  j.newmarch@boxhill.edu.au\nemail:end\nperson:end\n```\n\n请注意，由于没有使用 DTD 或其他 XML\
  \ 规范，分词器正确地打印出了所有空白。（DTD 可能指定可以忽略空白，但如果没有 DTD，则不能做此假设。）为了使输出更美观，我们通过 `Trim` 移除了额外的空格。\n\
  \n使用此解析器存在一个潜在的陷阱。它会重用字符串的空间，因此一旦你看到一个令牌，如果之后还想引用它，就需要复制其值。Go 提供了诸如 `func (c CharData)\
  \ Copy() CharData` 之类的方法来复制数据；请参阅 `go doc encoding.xml.Copy`。\n\n\n\n## XHTML\n\n\
  HTML 并不符合 XML 语法规范。它存在未闭合的标签，例如 `<br>`。XHTML 是对 HTML 的清理，使其符合 XML 规范。因此，XHTML 文档可以使用之前提到的\
  \ XML 管理技术。XHTML 的普及程度似乎并未达到最初的预期。我个人猜测，这是因为 HTML 解析器通常容错性较好，在浏览器中通常能合理地渲染文档；而即使是浏览器中的\
  \ XHTML 解析器也往往更为严格，一旦遇到任何 XML 错误，通常就无法渲染任何内容。这对于面向用户的软件来说，并非合适的行为。\n\n## HTML\n\n\
  `xml` 包提供了一定程度支持，用于处理可能不符合 XML 规范的 HTML 文档。通过关闭严格的解析检查，之前讨论的 XML 解析器可以处理许多 HTML\
  \ 文档。\n\n```\nparser := xml.NewDecoder(r)\nparser.Strict = false\nparser.AutoClose\
  \ = xml.HTMLAutoClose\nparser.Entity = xml.HTMLEntity\n```\n\n## 结论\n\nGo 语言对处理\
  \ XML 字符串提供了基本支持。目前它还没有处理 XML 模式或 RELAX NG 等 XML 规范语言的机制。\n\n## 远程过程调用\n\nSocket\
  \ 和 HTTP 编程都使用消息传递范式。客户端向服务器发送消息，服务器通常再发送回一条消息。双方都负责以双方都能理解的格式创建消息，并从这些消息中读取数据。\n\
  \n然而，大多数独立的应用程序并不大量使用消息传递技术。通常，首选机制是*函数*（或方法、过程）调用。在这种风格中，程序将使用一组参数调用一个函数，并在函数调用完成后获得一组返回值。这些值可能是函数返回值，或者，如果地址作为参数传递，那么这些地址所指向的内容可能会被改变。\n\
  \n远程过程调用（RPC）是尝试将这种编程风格引入网络世界。因此，客户端将进行一个看起来像是普通过程调用的操作。客户端会将此调用打包成网络消息并发送给服务器。服务器将解包此消息，并在服务器端将其恢复为一个过程调用。此调用的结果将被打包以返回给客户端。\n\
  \n图解如下，如图 13-1 所示。\n\n![](img/436770_2_En_13_Fig1_HTML.png)\n\n**图 13-1** 远程过程调用步骤\n\
  \n步骤如下：\n\n1.  客户端调用客户端过程存根。存根将参数打包成网络消息。此过程称为*编组*。\n\n2.  存根调用操作系统内核中的网络例程来发送消息。\n\
  \n3.  内核将消息发送到远程系统。这可以是面向连接或无连接的。\n\n4.  服务器端过程存根从网络消息中解组参数。\n\n5.  服务器端过程存根执行服务器过程实现。\n\
  \n6.  过程执行完毕，将执行权返回给服务器端过程存根。\n\n7.  服务器端存根将返回值编组到网络消息中。\n\n8.  返回消息被发送回去。\n\n9.\
  \  客户端过程存根使用网络例程读取消息。\n\n10. 消息被解组，返回值被设置在栈上以提供给客户端程序。\n\n实现 RPC 有两种常见风格。第一种以 Sun\
  \ 的 ONC/RPC 和 CORBA 为代表。在这种风格中，服务的规范是用某种抽象语言（例如 CORBA IDL，即接口定义语言）给出的。然后，这被编译成客户端和服务器的代码。客户端随后编写一个普通的程序，其中包含对过程/函数/方法的调用，并与生成的客户端代码链接。服务器端代码本身就是一个服务器，它与您编写的过程实现相链接。\n\
  \n在这种第一种方式中，客户端代码在外观上与普通过程调用几乎相同。通常，会有少量额外的代码用于定位服务器。在 Sun 的 ONC 中，必须知道服务器的地址；在\
  \ CORBA 中，调用命名服务来查找服务器的地址；在 Java RMI 中，IDL 就是 Java 本身，并使用命名服务来查找服务的地址。\n\n在第二种风格中，您必须使用一个特殊的客户端\
  \ API。您在客户端将此函数名称及其参数交给这个库。在服务器端，您必须显式地自己编写服务器以及远程过程实现。\n\n许多 RPC 系统（如 Web 服务）都采用第二种方法。Go\
  \ 语言的 RPC 也采用这种方法。\n\n## Go 语言的 RPC\n\n迄今为止，Go 语言的 RPC 是 Go 独有的。它与其他 RPC 系统不同，因此一个\
  \ Go 客户端只能与一个 Go 服务器通信。它使用第 4 章讨论的 Gob 序列化系统，该系统定义了可以使用的数据类型。\n\nRPC 系统通常会对可以跨网络调用的函数做出一些限制。这样\
  \ RPC 系统才能正确确定发送哪些值参数，接收哪些引用参数的答案，以及如何发出错误信号。\n\n在 Go 语言中，限制如下：\n\n*   方法的类型是导出的（以大写字母开头）。\n\
  \n*   方法是导出的。\n\n*   该方法有两个参数，这两个参数都是导出（或内置）类型。第一个用于传入方法的数据；第二个用于返回结果。\n\n*   方法的第二个参数是一个指针。\n\
  \n*   它的返回值类型是 `error`。\n\n例如，以下是一个有效的函数：\n\n```\nF(T1, &T2) error\n```\n\n对参数的限制意味着您通常需要定义一个结构体类型。Go\
  \ 语言的 RPC 使用 `gob` 包进行数据的编组和解组，因此参数类型必须遵循前面章节讨论的 Gob 规则。\n\n我们将遵循 Go 文档中给出的示例，因为它说明了重点。服务器执行两个简单的操作——它们不需要\
  \ RPC 的“重活”，但易于理解。这两个操作是将两个整数相乘，以及求第一个整数除以第二个整数后的商和余数。\n\n要操作的两个值被定义在一个结构体中：\n\n\
  ```\ntype Values struct {\nA, B int\n}\n```\n\n乘积只是一个 `int` 类型，而商/余数是另一个结构体：\n\n\
  ```\ntype Quotient struct {\nQuo, Rem int\n}\n```\n\n我们将有两个函数，`multiply` 和 `divide`，可以在\
  \ RPC 服务器上被调用。这些函数需要向 RPC 系统注册。`Register` 函数接受一个参数，该参数是一个接口。因此我们需要一个包含这两个函数的类型：\n\
  \n```\ntype Arith int\nfunc (t *Arith) Multiply(args *Args, reply *int) error {\n\
  *reply = args.A * args.B\nreturn nil\n}\nfunc (t *Arith) Divide(args *Args, quo\
  \ *Quotient) error {\nif args.B == 0 {\nreturn errors.New(\"divide by zero\")\n\
  }\nquo.Quo = args.A / args.B\nquo.Rem = args.A % args.B\nreturn nil\n}\n```\n\n\
  `Arith` 的底层类型被指定为 `int`。这没关系——任何类型都可以。\n\n现在可以使用 `Register` 注册此类型的对象，然后 RPC 系统就可以调用其方法了。\n\
  \n\n\n### HTTP RPC 服务器\n\n任何 RPC 都需要一种传输机制来通过网络传递消息。Go 可以使用 HTTP 或 TCP。HTTP 机制的优点在于可以利用\
  \ HTTP 支持库。你需要向 HTTP 层添加一个 RPC 处理器，通过 `HandleHTTP` 实现，然后启动一个 HTTP 服务器。完整代码在 `arithserver.go`\
  \ 中：\n\n```\n$ mkdir ch13\n$ cd ch13\nch13$ vi arithserver.go\n/* ArithServer\n\
  */\npackage main\nimport (\n\"errors\"\n\"fmt\"\n\"net/http\"\n\"net/rpc\"\n)\n\
  type Values struct {\nA, B int\n}\ntype Quotient struct {\nQuo, Rem int\n}\ntype\
  \ Arith int\nfunc (t *Arith) Multiply(args *Values, reply *int) error {\n*reply\
  \ = args.A * args.B\nreturn nil\n}\nfunc (t *Arith) Divide(args *Values, quo *Quotient)\
  \ error {\nif args.B == 0 {\nreturn errors.New(\"divide by zero\")\n}\nquo.Quo =\
  \ args.A / args.B\nquo.Rem = args.A % args.B\nreturn nil\n}\nfunc main() {\narith\
  \ := new(Arith)\nrpc.Register(arith)\nrpc.HandleHTTP()\nerr := http.ListenAndServe(\"\
  :1234\", nil)\nif err != nil {\nfmt.Println(err.Error())\n}\n}\n```\n\n并通过以下命令运行：\n\
  \n```\nch13$ go run arithserver.go\n```\n\n让服务器保持运行。接下来，我们来看 RPC 服务的用户，即 RPC 客户端。\n\
  \n### HTTP RPC 客户端\n\n客户端需要与 RPC 服务器建立 HTTP 连接。它需要准备一个结构体，包含要发送的值以及用于存储结果的变量地址。然后，它可以使用这些参数发起一个\
  \ `Call`：\n\n*   要执行的远程函数名称\n*   要发送的值\n*   用于存储结果的变量地址\n\n一个调用算术服务器两个函数的客户端是 `arithclient.go`：\n\
  \n```\nch13$ vi arithclient.go\n/* ArithClient\n*/\npackage main\nimport (\n\"fmt\"\
  \n\"log\"\n\"net/rpc\"\n\"os\"\n)\ntype Args struct {\nA, B int\n}\ntype Quotient\
  \ struct {\nQuo, Rem int\n}\nfunc main() {\nif len(os.Args) != 2 {\nfmt.Println(\"\
  Usage: \", os.Args[0], \"server\")\nos.Exit(1)\n}\nserverAddress := os.Args[1]\n\
  client, err := rpc.DialHTTP(\"tcp\", serverAddress+\":1234\")\nif err != nil {\n\
  log.Fatal(\"dialing:\", err)\n}\n// Synchronous call\nargs := Args{17, 8}\nvar reply\
  \ int\nerr = client.Call(\"Arith.Multiply\", args, &reply)\nif err != nil {\nlog.Fatal(\"\
  arith error:\", err)\n}\nfmt.Printf(\"Arith: %d*%d=%d\\n\", args.A, args.B, reply)\n\
  var quot Quotient\nerr = client.Call(\"Arith.Divide\", args, &quot)\nif err != nil\
  \ {\nlog.Fatal(\"arith error:\", err)\n}\nfmt.Printf(\"Arith: %d/%d=%d remainder\
  \ %d\\n\", args.A, args.B,\nquot.Quo, quot.Rem)\n}\n```\n\n运行时，我们看到以下输出：\n\n```\n\
  ch13$ go run arithclient.go localhost\nArith: 17*8=136\nArith: 17/8=2 remainder\
  \ 1\n```\n\n### TCP RPC 服务器\n\n使用 TCP 套接字的服务器版本是 `tcparithserver.go`：\n\n```\nch13$\
  \ vi tcparithserver.go\n/* TCPArithServer\n*/\npackage main\nimport (\n\"errors\"\
  \n\"log\"\n\"net\"\n\"net/rpc\"\n)\ntype Args struct {\nA, B int\n}\ntype Quotient\
  \ struct {\nQuo, Rem int\n}\ntype Arith int\nfunc (t *Arith) Multiply(args *Args,\
  \ reply *int) error {\n*reply = args.A * args.B\nreturn nil\n}\nfunc (t *Arith)\
  \ Divide(args *Args, quo *Quotient) error {\nif args.B == 0 {\nreturn errors.New(\"\
  divide by zero\")\n}\nquo.Quo = args.A / args.B\nquo.Rem = args.A % args.B\nreturn\
  \ nil\n}\nfunc main() {\narith := new(Arith)\nrpc.Register(arith)\ntcpAddr, err\
  \ := net.ResolveTCPAddr(\"tcp\", \":1234\")\ncheckError(err)\nlistener, err := net.ListenTCP(\"\
  tcp\", tcpAddr)\ncheckError(err)\n/* This works:\nrpc.Accept(listener)\n*/\n/* and\
  \ so does this:\n*/\nfor {\nconn, err := listener.Accept()\nif err != nil {\ncontinue\n\
  }\nrpc.ServeConn(conn)\n}\n}\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"\
  Fatal error \", err.Error())\n}\n}\n```\n\n请注意，对 `Accept` 的调用是阻塞的，仅用于处理客户端连接。如果服务器还想执行其他工作，则应在\
  \ `go` 协程中调用此函数。\n\n按如下方式启动服务器：\n\n```\nch13$ go run tcparithserver.go\n```\n\n\
  和之前一样，现在我们来看相关的客户端。\n\n### TCP RPC 客户端\n\n一个使用 TCP 服务器并调用算术服务器两个函数的客户端是 `tcparithclient.go`：\n\
  \n```\nch13$ vi tcparithclient.go\n/* TCPArithClient\n*/\npackage main\nimport (\n\
  \"fmt\"\n\"log\"\n\"net/rpc\"\n\"os\"\n)\ntype Args struct {\nA, B int\n}\ntype\
  \ Quotient struct {\nQuo, Rem int\n}\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"\
  Usage: \", os.Args[0], \"server:port\")\n}\nservice := os.Args[1]\nclient, err :=\
  \ rpc.Dial(\"tcp\", service)\nif err != nil {\nlog.Fatalln(\"dialing:\", err)\n\
  }\n// Synchronous call\nargs := Args{17, 8}\nvar reply int\nerr = client.Call(\"\
  Arith.Multiply\", args, &reply)\nif err != nil {\nlog.Fatalln(\"arith error:\",\
  \ err)\n}\nfmt.Printf(\"Arith: %d*%d=%d\\n\", args.A, args.B, reply)\nvar quot Quotient\n\
  err = client.Call(\"Arith.Divide\", args, &quot)\nif err != nil {\nlog.Fatalln(\"\
  arith error:\", err)\n}\nfmt.Printf(\"Arith: %d/%d=%d remainder %d\\n\", args.A,\
  \ args.B,\nquot.Quo, quot.Rem)\n}\n```\n\n运行时，我们看到以下内容：\n\n```\nch13$ go run tcparithclient.go\
  \ localhost:1234\nArith: 17*8=136\nArith: 17/8=2 remainder 1\n```\n\n在选择使用 `rpc.HandleHTTP`\
  \ 还是 `rpc.ServeConn` 时，主要取决于对控制权和速度的考量。TCP 服务器位于 HTTP 之下，因此为我们提供了更多的控制权。如果这一点不重要，那么之前的\
  \ `arithserver.go` 可能更合适。\n\n### 值的匹配\n\n你可能已经注意到，HTTP 客户端和 HTTP 服务器中值参数的类型并不相同。在服务器中，我们使用了\
  \ `Values`，而在客户端中，我们使用了 `Args`。这无关紧要，因为我们遵循了 Gob 序列化的规则，并且两个结构体字段的名称和类型是匹配的。当然，更好的编程实践是让名称保持一致！\n\
  \n然而，这确实指出了使用 Go RPC 时的一个潜在陷阱。如果我们将服务器中的结构体改为这样：\n\n```\ntype Values struct {\n\
  C, B int\n}\n```\n\n那么 Gob 不会有问题。在客户端，解组时会忽略服务器提供的 `C` 值，并使用 `A` 的默认零值。如果，比如说，发生了除以\
  \ `A`（零值）的操作，这可能会导致问题。\n\n使用 Go RPC 需要程序员严格执行字段名和类型的稳定性。我们注意到，没有版本控制机制来执行这一点，也没有机制让\
  \ Gob 指示任何可能的不匹配。也没有必需的外部表示形式作为参考。如果只是添加字段，那么可能没有问题，但仍然需要控制。或许为数据结构添加一个 `version`\
  \ 字段会有所帮助。\n\n## JSON\n\n本节在之前概念的基础上没有增加新内容。只是对数据使用了不同的“线缆”格式，即 JSON 而非 Gob。因此，客户端或服务器可以用其他理解套接字和\
  \ JSON 的语言编写。\n\n### JSON RPC 服务器\n\n使用 JSON 编码的服务器版本是 `jsonarithserver.go`：\n\n\
  ```\nch13$ vi jsonarithserver.go\n/* JSONArithServer\n*/\npackage main\nimport (\n\
  \"errors\"\n\"log\"\n\"net\"\n\"net/rpc\"\n\"net/rpc/jsonrpc\"\n)\ntype Args struct\
  \ {\nA, B int\n}\ntype Quotient struct {\nQuo, Rem int\n}\ntype Arith int\nfunc\
  \ (t *Arith) Multiply(args *Args, reply *int) error {\n*reply = args.A * args.B\n\
  return nil\n}\nfunc (t *Arith) Divide(args *Args, quo *Quotient) error {\nif args.B\
  \ == 0 {\nreturn errors.New(\"divide by zero\")\n}\nquo.Quo = args.A / args.B\n\
  quo.Rem = args.A % args.B\nreturn nil\n}\nfunc main() {\narith := new(Arith)\nrpc.Register(arith)\n\
  tcpAddr, err := net.ResolveTCPAddr(\"tcp\", \":1234\")\ncheckError(err)\nlistener,\
  \ err := net.ListenTCP(\"tcp\", tcpAddr)\ncheckError(err)\n/* This works:\nrpc.Accept(listener)\n\
  */\n/* and so does this:\n*/\nfor {\nconn, err := listener.Accept()\nif err != nil\
  \ {\ncontinue\n}\njsonrpc.ServeConn(conn)\n}\n}\nfunc checkError(err error) {\n\
  if err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n按如下方式运行：\n\
  \n```\nch13$ go run jsonarithserver.go\n```\n\n接下来，我们来看相关的客户端。\n\n\n\n### JSON RPC\
  \ 客户端\n\n调用算术服务器两个函数的客户端是 `jsonarithclient.go`：\n\n```\n$ vi jsonarithclient.go\n\
  /* JSONArithCLient\n*/\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net/rpc/jsonrpc\"\
  \n\"os\"\n)\ntype Args struct {\nA, B int\n}\ntype Quotient struct {\nQuo, Rem int\n\
  }\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"\
  server:port\")\n}\nservice := os.Args[1]\nclient, err := jsonrpc.Dial(\"tcp\", service)\n\
  if err != nil {\nlog.Fatalln(\"dialing:\", err)\n}\n// Synchronous call\nargs :=\
  \ Args{17, 8}\nvar reply int\nerr = client.Call(\"Arith.Multiply\", args, &reply)\n\
  if err != nil {\nlog.Fatalln(\"arith error:\", err)\n}\nfmt.Printf(\"Arith: %d*%d=%d\\\
  n\", args.A, args.B, reply)\nvar quot Quotient\nerr = client.Call(\"Arith.Divide\"\
  , args, &quot)\nif err != nil {\nlog.Fatalln(\"arith error:\", err)\n}\nfmt.Printf(\"\
  Arith: %d/%d=%d remainder %d\\n\", args.A, args.B,\nquot.Quo, quot.Rem)\n}\n```\n\
  \n它的运行方式如下：\n\n```\n$ go run jsonarithclient.go localhost:1234\nArith: 17*8=136\n\
  Arith: 17/8=2 remainder 1\n```\n\n虽然不太明显（除了 `jsonrpc.Dial` 之外），请求和响应是通过 `encoding/json`\
  \ 包进行编码和解码的。可以查阅相关文档，例如 `go doc -u jsonrpc.WriteRequest` 或源代码本身，位置在：`/usr/local/go/src/net/rpc/jsonrpc/client.go`。\n\
  \n## 结论\n\nRPC 是一种流行的分布式应用程序方式。本文基于 `Gob` 或 `JSON` 序列化技术，并使用 `HTTP` 和 `TCP` 作为传输层，展示了实现\
  \ RPC 的几种方法。\n\n# 14. REST\n\n在前面的章节中，我们了解了 `HTTP`，并给出了一个 Web 系统的示例。然而，我们并未赋予该系统任何特定的结构，只是秉持着对问题足够简单的原则。有一种由\
  \ `HTTP 1.1` 的主要作者之一（Roy Fielding）开发的架构风格，称为 `REST`（表述性状态转移）。在本章中，我们将探讨 `REST` 风格，以及它对于构建\
  \ Web 应用程序意味着什么。为此，我们必须回到基础概念。\n\n`REST` 有许多必须遵循的组件，才能恰当地应用 `REST` 这个术语。不幸的是，它已经成为一个流行词，许多应用程序只包含了\
  \ `REST` 的“片段”，而非完整实现。我们将讨论 Richardson 成熟度模型，该模型描述了 API 在通往 RESTful 之路上走得多远。\n\n\
  在上一章中，我们讨论了 RPC（远程过程调用）。这是一种与 `REST` 完全不同的风格。我们还将比较这两种风格，探讨何时适合使用每种风格。\n\n## URI\
  \ 与资源\n\n资源是我们在网络或互联网上想要与之交互的“事物”。我喜欢把它们想象成对象，但并不要求其实现必须基于对象——它们只是应该“看起来像”一个事物，可能包含组件。\n\
  \n每个资源都有一个或多个地址，称为 URI（统一资源标识符）。\n\n注意\n\n其国际化形式是 IRI——国际化资源标识符。\n\n这些地址具有以下通用形式：\n\
  \n```\nscheme:[//[user:password@]host[:port]][/]path[?query][#fragment]\n```\n\n\
  典型的例子是 URL（统一资源定位符），其中 scheme 是 `http` 或 `https`，host 通过其 IP 地址或 DNS 名称指代一台计算机，如下所示：\n\
  \n```\nhttps://jan.newmarch.name/IoT/index.html\n```\n\n还有一些非 HTTP 的 URL 方案，例如 `telnet`、`news`\
  \ 和 `IPP`（互联网打印协议）。这些方案也包含位置组件。此外，还有其他类型，例如 URN（统一资源名称），它们通常是其他标识系统的包装器，并且不包含位置信息。例如，IETF\
  \ 为通过 ISBN 标识的图书制定了一个标准的 URN 方案，比如本书的 ISBN：\n\n```\nurn:ISBN:978-1-4842-2692-6\n\
  ```\n\n这些 URN 往往并未广泛使用，但仍然存在。IANA 统一资源名称（URN）命名空间列表可在 `https://www.iana.org/assignments/urn-namespaces/urn-namespaces.xhtml`\
  \ 找到。原始的方案（如 ISBN）仍然在使用中。\n\n资源的正式定义可能难以精确界定。例如，`http://www.google.com` 在某种意义上代表\
  \ Google（它是 URL 的方案和主机部分），但该主机肯定不是某台固定的计算机。同样，本书的 ISBN 代表了本书的某些信息，但肯定不是指任何现存的副本（在撰写本章时，虽然\
  \ ISBN 已存在，但副本尚不存在）。\n\n尽管如此，我们仍将资源视为基本概念，而 URI 是这些资源的标识符。IETF 在统一资源标识符（URI）：通用语法（`https://www.ietf.org/rfc/rfc3986.txt`）中同样定义得比较模糊：“术语‘资源’在一般意义上用于指代任何可能被\
  \ URI 标识的东西。”\n\n一个资源可能拥有多个 URI。作为一个人，我有许多不同的标识符：我的税号指向我的一个方面，即我的财务事务；我的医保卡号指向我作为医疗服务的接受者；我的名字（相当独特）常用于指代我的不同方面。我的\
  \ URL `https://jan.newmarch.name` 指向我选择在网站上公开的那些方面。而 Google、LinkedIn、Facebook、Twitter\
  \ 等可能也有某种 URI 来标记它们选择保存的我的那些方面。\n\n各方都认同的是，资源是*名词*，而不是*动词*或*形容词*。对于银行账户，类似 `http://mybank/myaccount/withdraw`\
  \ 的 URL 不被视为资源，因为它包含了动词 `withdraw`。同样，`http://amazon.com/buy/book-id` 不会标记一个资源，因为它包含了动词\
  \ `buy`（亚马逊没有这样的 URL）。\n\n这是 `REST` 在 `HTTP` 上的第一个关键点：识别信息系统中的资源，并为其分配 URL。这方面有一些惯例，最常见的是，如果存在层级结构，则应在\
  \ URL 路径中反映出来。然而，这并不是必须的，因为信息也应该通过其他方式给出。\n\n`REST` 设计 URI 的方法仍然有点像一门艺术。合法（且完全合规）的\
  \ URI 未必就是“好的”`REST` URI，许多所谓 RESTful API 的示例中，其 URI 也并非完全符合 RESTful 风格。2PartsMagic\
  \ 在 RESTful URI 设计（`http://blog.2partsmagic.com/restful-uri-design/`）中提供了关于设计恰当\
  \ URI 的良好建议。\n\n`REST` 设计 URI 的方法仍然有点像一门艺术。合法（且完全合规）的 URI 未必就是“好的”`REST` URI，许多所谓\
  \ RESTful API 的示例中，其 URI 也并非完全符合 RESTful 风格。Golang 开发者博客简要概述了 `REST` 的一些概念：`https://go.dev/doc/tutorial/web-service-gin`。除了示例之外，OpenAPI\
  \ 是一个标准，可以帮助我们围绕“http apis”进行设计和工具化工作：`https://spec.openapis.org/oas/latest.html`。\n\
  \n\n\n## 表述（Representations）\n\n资源的表述是指以某种形式捕捉资源相关信息的东西。例如，从税务局 URI 获取的我的表述可能是我的澳大利亚纳税申报单；从本地披萨店获取的我的表述则可能是一份披萨购买记录；而从我自己的网站获取的我的表述则是一个\
  \ HTML 文档。\n\n这就是 REST 的关键之一：URI 标识资源，对资源的请求返回该资源的表述。资源本身保留在服务器上，根本不会被发送到客户端。事实上，资源甚至可能根本不存在任何具体的形态。例如，一个表述可能是通过访问某个\
  \ URI 触发的 SQL 查询结果生成的。\n\nREST 并没有专门讨论协商资源表述的可能性。HTTP 1.1 有一个专门章节详细说明了如何实现这一点，涉及*服务器*、*客户端*和*透明*协商。客户端可以使用`Accept`头来指定偏好，例如：\n\
  \n```\nAccept: application/xml; q=1.0, application/json; q=0.5\nAccept-Language:\
  \ fr\nAccept-Charset: utf8\n```\n\n这表明客户端优先选择`application/xml`格式，但也接受`application/json`。服务器可以接受其中一种格式，或者回复它愿意接受的格式。\n\
  \n## REST 动词（REST Verbs）\n\n你可以对 URI 发出特定的请求。如果你在向某个 URL 发送 HTTP 请求，HTTP 定义了可以发出的请求类型：`GET`、`PUT`、`POST`、`DELETE`、`HEAD`、`OPTIONS`、`TRACE`和`CONNECT`，以及像`PATCH`这样的扩展。这些动词的数量非常有限！这与我们对面向对象（O/O）编程的预期截然不同。例如，Java\
  \ 的 JLabel 有大约 250 个方法，比如`getText`和`setHorizontalAlignment`。在某种程度上，我们可以将这些 OO 方法与\
  \ REST/HTTP 进行映射；一个 JLabel 实例就是一个资源，我们可以通过`getText`来“获取”它。虽然这在某些简单情况下很容易做到，但如何映射全部\
  \ 250 个方法，或者是否应该映射，就不那么明确了。\n\n现在，REST 通常被理解为仅使用 HTTP 中的四个动词：`GET`、`PUT`、`POST`和`DELETE`。`GET`大致对应于\
  \ OO 语言中的 getter 方法，而`PUT`则大致对应于 OOP 语言中的 setter 方法。如果一个 JLabel 是一个 REST 资源（事实并非如此），那么单一的`GET`动词如何能替代\
  \ JLabel 中上百个 getter 方法呢？\n\n答案在于 URI 的`PATH`组件。一个标签包含文本、对齐方式等属性。这些实际上是标签的子资源，可以写成标签的子\
  \ URI。因此，如果标签的 URI 是[`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label)，那么子资源可以有（举例）以下\
  \ URI：\n\n```\nhttp://jan.newmarch.name/my_label/text\nhttp://jan.newmarch.name/my_label/horizontalAlignment\n\
  ```\n\n如果你只想操作标签的文本，你可以使用文本资源的 URI，而不是在标签本身上使用 getter/setter 方法。\n\n### GET 动词\n\
  \n要获取资源的表述，你可以对资源执行`GET`操作。这将返回资源的某种表述。对于这种选择，可能性是无穷无尽的。例如，请求本书的索引可能会返回一个使用 UTF-8\
  \ 字符集、以 XML 文档形式呈现的法语索引表述，或者许多其他可能性。客户端和服务器可以协商这些可能性。\n\n`GET`动词必须是*幂等*的。也就是说，重复请求应返回相同的结果（在表述类型范围内）。例如，多次请求传感器的温度应返回相同的结果（除非温度当然已经改变）。\n\
  \n默认情况下，幂等性允许缓存。这有助于减少网络流量，并可能为传感器节省电池电量。缓存并非总能得到保证：一个返回其被访问次数的资源，每次被访问时都会给出不同的结果。这是一种不常见的行为，会通过\
  \ HTTP 的`Cache-Control`头部来标识。\n\n### PUT 动词\n\n如果你想改变资源的状态，你可以使用`PUT`来提交新的值。`PUT`有两个主要限制：\n\
  \n*   你只能更改你知道其 URI 的资源的状态。\n*   你发送的表述必须涵盖资源的所有组成部分。\n\n例如，如果你只想更改标签中的文本，你应将`PUT`消息发送到\
  \ URL [`http://jan.newmarch.name/my_label/text`](http://jan.newmarch.name/my_label/text)，*而不是*发送到[`http://jan.newmarch.name/my_label`](http://jan.newmarch.name/my_label)。发送给标签则需要发送所有上百个字段。\n\
  \n`PUT`是幂等的，但不是*安全的*。也就是说，它会改变资源的状态，但重复调用会将其改为相同的状态。\n\n`PUT`和`DELETE`不是 HTML 的一部分，大多数浏览器不直接支持它们。它们可以在支持\
  \ Ajax 的浏览器中被调用。关于为何不包含它们，有几个讨论。例如，请参阅 [`http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms`](http://softwareengineering.stackexchange.com/questions/114156/why-are-there-are-no-put-and-delete-methods-on-html-forms)\
  \ 上的 “为什么 HTML 表单中没有 PUT 和 DELETE 方法？”。\n\n### DELETE 动词\n\n这会删除资源。它是幂等的，但不安全。\n\
  \n安全方法（例如`GET`）是指没有意外副作用的方法。不安全方法（例如`PUT`）可能具有潜在风险。无法撤销更改就是一件不安全的事情。理想情况下，`GET`返回资源的某个版本，仅此而已。`PUT`会覆盖资源，如果你没有检索先前的版本，它可能会永远消失。\n\
  \n幂等方法是指无论执行多少次，对同一请求产生相同副作用的方法。`DELETE`会移除一个资源，如果你第二次调用它，“结果”是相同的；该资源要么被删除（如果它被再次创建），要么保持不存在状态。\n\
  \n有关“幂等”和“安全”概念的更多信息，请参阅 [`https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html`](https://www.w3.org/Protocols/rfc2616/rfc2616-sec9.html)。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的指示，将给定的英文文本翻译成中文，并严格按照注意事项保留所有格式和符号。\n\n\n### POST\
  \ 动词\n\n`POST` 是一个包揽其他动词未涵盖情况的万能用语。关于 `POST` 的两种用途存在共识：\n\n-   如果你想创建一个新资源但不知道它的\
  \ URI，那么可以将该资源的一种表示形式 `POST` 到一个知道如何创建该资源的 URI。返回的表示形式应包含新资源的 URI。*这一点很重要*。要与新资源交互，你必须知道它的\
  \ URI，而 `POST` 的返回结果会告诉你这一点。\n-   如果一个资源有很多属性，而你只想更改其中一两个，那么可以 `POST` 一个仅包含更改后值的表示形式。\n\
  \n关于 `PUT` 和 `POST` 在边缘情况下的各自角色，存在激烈的争论。如果你想创建一个新资源，并且*确实*知道它将拥有的 URI，那么你可以使用 `PUT`\
  \ 或 `POST`。选择哪一个似乎取决于其他因素。\n\nSOAP 被设计为基于 HTTP 的 RPC 系统。它对*一切*都使用 `POST`。HTML 在表单中继续使用\
  \ `POST`，而本应有使用 `PUT` 的选项。出于这些原因，除非万不得已，否则我不会使用 `POST`。我想其他人有他们自己原则性的理由来使用 `POST`\
  \ 而不是 `PUT`，但我完全不知道这些理由是什么 :-)。\n\n由于其开放式的范围，`POST` 几乎可以用于任何事情。许多用途可能违反了 REST 模型，正如\
  \ SOAP 所充分证明的那样。但其中一些用途可能是合法的。`POST` 通常不是幂等的且不安全，尽管特定情况可能并非如此。以下 Stack Overflow\
  \ 帖子中包含了关于 `PUT` vs. `PATCH` vs. `POST` 的深入讨论：[`https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios`](https://stackoverflow.com/questions/28459418/use-of-put-vs-patch-methods-in-rest-api-real-life-scenarios)。\n\
  \n### 不维护状态（即无状态）\n\n让我们先明确一点：Cookie 被排除在外。Cookie 通常用于跟踪用户与服务器交互过程中的状态，典型的例子是购物车。在服务器端创建一个结构，并返回一个\
  \ cookie，用于标识这是要使用的购物车。\n\nREST 决定不在服务器上维护任何客户端状态。这简化了交互，也回避了在客户端或服务器崩溃后如何恢复一致性的棘手问题。如果服务器不需要维护任何状态，那么将产生更健壮的服务器模型。通常，与安全相关的项目会设置在\
  \ cookie 中。REST 端点应返回这些资源的表示形式。与身份验证相关的 cookie 通常超越这些资源，因此不符合 REST 原则。有关此主题的更多信息，请参见：[`https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2`](https://www.ics.uci.edu/~fielding/pubs/dissertation/evaluation.htm#sec_6_3_4_2)。\n\
  \n如果你不能使用 cookie，那该怎么办？其实很简单：在服务器上创建一个购物车。在 REST 下，这只能通过响应 `POST` 请求发生，该请求会为新资源返回一个新的\
  \ URI。所以你就使用这个新的 URI。你可以对这个 URI 执行 `GET`、`PUT`、`POST` 和 `DELETE` 操作，直接在资源上完成所有你想做的事情，而无需使用\
  \ cookie 进行变通。\n\n### HATEOAS\n\nHATEOAS 代表“超媒体作为应用状态的引擎”。它被公认为是一个糟糕的首字母缩写词，但已被沿用下来。其基本原则是，从一个\
  \ URI 导航到另一个以某种方式关联的 URI，不应通过任何带外机制来完成，而必须将新链接以某种超链接形式嵌入到第一个 URI 的表示形式中。这是 REST\
  \ 的一个关键特性，但常常被忽略。\n\nREST 并未规定链接的格式。它们可以使用 HTML 链接标签、嵌入在 PDF 文档中的 URL 或 XML 文档中给出的链接来提供。没有\
  \ URL 简单表示形式的格式不被视为超媒体语言，也不包含在 REST 中。\n\n此外，REST 也没有明确说明链接的含义以及如何提取适当的链接。Fielding\
  \ 在他的博客“REST APIs must be hypertext-driven”中写道，该博客位于 [`http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven`](http://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven)：\n\
  \n-   进入一个 REST API 时，除了初始 URI（书签）和一套适用于目标受众（即期望任何可能使用该 API 的客户端都能理解）的标准化媒体类型外，不应有任何先验知识。从那时起，所有的应用状态转换都必须由客户端选择服务器提供的选项来驱动，这些选项存在于接收到的表示形式中，或隐含在用户对这些表示形式的操作中。\n\
  \nIANA 维护了一个可用的关系类型注册表（IANA：链接关系，位于 [`http://www.iana.org/assignments/link-relations/link-relations.xhtml`](http://www.iana.org/assignments/link-relations/link-relations.xhtml)）。Web\
  \ 链接 RFC 5988 描述了 web 链接注册表（[`https://datatracker.ietf.org/doc/html/rfc5988`](https://datatracker.ietf.org/doc/html/rfc5988)）。HTML5\
  \ 规范定义了一小部分关系，并指向 Microformats 的 `rel` 值（[`http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions`](http://microformats.org/wiki/existing-rel-values#HTML5_link_type_extensions)）以获取更大的列表。这些文档虽然有用，但不能直接付诸实施。我们稍后将看一个示例。\n\
  \n像 cookie 这样的机制，或者像用于 SOAP 的 WSDL 这样的外部 API 规范，都被 REST 有效地排除了。它们不是资源表示形式中包含的超链接。HATEOAS\
  \ 通过允许在已知 URI 之外进行动态发现，将客户端与服务器解耦；使我们能够独立地演进 API。这与 RPC 不同，在 RPC 中，IDL 驱动着接口。\n\n\
  \n\n## 表示链接\n\n链接在 HTML 文档中是标准化的。`Link`标签定义了一个 HTML 元素，该元素只能出现在 HTML 的头部部分。例如，一本包含章节等内容的书，如果其链接以\
  \ HTML `link`元素的形式给出，可能看起来像这样：\n\n```\n...\n```\n\nHTML 中的链接关系分为两种：一种是当前文档所需的链接（例如\
  \ CSS 文件），另一种是指向相关资源的链接（如前所述）。第一种类型的链接通常对用户不可见地下载。第二种类型通常不会由浏览器显示，但遵循 HATEOAS 原则的用户代理会使用它们。\n\
  \nXML 有各种链接规范，包括 XLink 和 Atom。Atom 似乎更受欢迎。\n\n基于 XLink 的链接如下所示：\n\n```\n...\n...\n\
  ```\n\n基于 Atom 的链接如下所示：\n\n```\n...\n...\n```\n\n对于 JSON，其格式并未标准化。REST 烹饪书（`http://restcookbook.com/Mediatypes/json/`）指出了标准化的缺失，并引用了\
  \ W3C 规范 JSON-LD 1.0：“一种基于 JSON 的链接数据序列化格式”，以及 HAL（超文本应用语言）。诸如开放连接基金会等组织似乎使用他们自己内部开发的格式，但这适用于\
  \ CoAP，另一个基于 REST 的系统。\n\nJSON-LD 使用术语`@id`来表示一个 URL，例如：\n\n```\n{\n\"name\": Jan\
  \ Newmarch:,\n\"homepage\": {\"@id\": \"https://jan.newmarch.name/\"}\n}\n```\n\n\
  值得一提的是，W3C 在`https://www.w3.org/wiki/LinkHeader`也有一套关于 HTTP Link 头的规范，服务器可能会将其返回给客户端。例如，JSON-LD\
  \ 利用此规范指向 HTTP 响应体中包含的 JSON 文档的规范。同样值得注意的是，一些实现以相同的方式处理 HTML Link 或 HTTP Header。\n\
  \n这会影响将链接信息从服务器传递到用户代理的序列化方法。用户代理和服务器必须就所使用的格式达成一致。对于 HTML（或 XHTML），这是标准化的。对于 XML，可以在文档中对链接系统进行引用。对于\
  \ JSON-LD，这可以在`Accept HTTP`头中通过`application/ld+json`来表示。\n\n## 使用 REST 进行事务处理\n\n\
  REST 如何处理事务以及实际上任何其他类型的过程？它们并未在 Fielding 的原始论文中讨论。\n\n维基百科上关于 HATEOAS 的词条给出了一个管理事务的糟糕示例。它从一个类似这样的\
  \ HTTP 请求开始：\n\n```\nGET /accounts/12345 HTTP/1.1\nHost: bank.example.org\nAccept:\
  \ application/json\n...\n```\n\n该请求返回一个 JSON 文档作为账户的表示，如下所示：\n\n```\nHTTP/1.1 200\
  \ OK\n{\n\"account\": {\n\"account_number\": 12345,\n\"balance\": {\n\"currency\"\
  : \"usd\",\n\"value\": 100.00\n},\n\"links\": {\n\"deposits\": \"/accounts/12345/deposits\"\
  ,\n\"withdrawals\": \"/accounts/12345/withdrawals\",\n\"transfers\": \"/accounts/12345/transfers\"\
  ,\n\"close-requests\": \"/accounts/12345/close-requests\"\n}\n}\n}\n```\n\n如果我们请求\
  \ xml 格式，将会看到以下内容：\n\n```\nContent-Type: application/xml\nContent-Length: ...\n\n\
  100.00\n\n```\n\n这给出了相关资源（存款、取款、转账和关闭）的 URI。然而，这些资源是*动词*，而不是*名词*，这非常不好。它们如何与 HTTP\
  \ 动词交互？你是用`GET`来取款吗？用`POST`？用`PUT`？如果你`DELETE`一个取款操作会发生什么——这是否意味着回滚一个事务？在 REST 中，我们尽量避免将动词用作资源；然而，在\
  \ RPC 中，并不禁止将动词用作端点/过程调用。\n\n更好的方式，如 Stack Overflow 帖子“REST 中的事务？”（参见`http://stackoverflow.com/questions/147207/transactions-in-rest`）中讨论的那样，是向账户发送`POST`请求，要求创建一个新事务：\n\
  \n```\nPOST /account/12345/transaction HTTP/1.1\n```\n\n这将返回一个新事务的 URL：\n\n```\n\
  http://bank.example.org/account/12345/txn123\n```\n\n现在，交互通过这个事务 URL 进行，例如通过`PUT`一个新值来执行并提交事务。这里我们使用\
  \ XML。\n\n```\nPUT /account/12345/txn123\n\n/account/56789\n\n```\n\nMihindukulasooriya\
  \ 等人在“RESTful 事务模型的七个挑战”（参见`http://ws-rest.org/2014/sites/default/files/wsrest2014_submission_4.pdf`）中给出了关于事务和\
  \ REST 更详细的讨论。类似的管理过程模型也被提出用于那些非单步的操作。通过前述 PDF，我们可以了解在设计提供事务能力的 RESTful API 时需要考虑的一些事项。\n\
  \n### 表 14-2 现有 RESTful 事务模型分析\n\n| 特性 | 事务模型 |\n| --- | --- |\n| | 1 | 2 | 3 |\
  \ 4 | 5 | 6 | 7 |\n| 事务属性 |\n| 原子性 | T | T | T¹ | T | T | T | T |\n| 隔离性 | T | T²\
  \ | F | T | F | F | T |\n| REST 约束 |\n| 统一接口 | T | F | T | T | T | T | T |\n| 无状态性\
  \ | T | T³ | F | T³ | F | T | T |\n| HATEOAS | F | F | F | T | F | T | F |\n| HTTP\
  \ 相关属性 |\n| 语义未违反 | T | T | T | T | F | T | T |\n| 支持常用动词 | T | T | F | F | T |\
  \ T | T |\n| 低开销 | T | T | T | F | F | T | T |\n| 其他属性 |\n| 可选性 | T | ? | ? | T\
  \ | ? | ? | F |\n| 可发现性 | ? | ? | ? | T | ? | ? | T |\n| 分布式事务 | X | X | T | ? |\
  \ T | T | ? |\n| 理论证明 | ? | ? | ? | T | T | T | ? |\n| 可用实现 | T | ? | ? | T | ?\
  \ | T | T |\n| 性能评估 | ? | ? | ? | ? | ? | T | ? |\n| 图例 - T 真 / F 假 / ? 未知或模型中未定义\
  \ |\n| 1 – 假定操作可被补偿 2 – 可能存在丢失更新问题 3 – 参见第 3.3 节 |\n\n### 表 14-1 RESTful 事务模型\n\n\
  | 编号 | 年份 | 事务模型 |\n| --- | --- | --- |\n| 1 | ~2000 | 使用过载 POST 的批处理事务 |\n| 2 |\
  \ 2007 | 将事务作为资源 |\n| 3 | 2009 | 使用 REST 的乐观事务技术 |\n| 4 | 2009 | 一致且可恢复的 RESTful\
  \ 事务模型 |\n| 5 | 2010 | 基于时间戳的 RESTful 服务两阶段提交协议 |\n| 6 | 2011 | 尝试-取消/确认模式 |\n|\
  \ 7 | 2012 | 原子 REST 批处理事务 |\n\n\n\n## 理查森成熟度模型\n\n许多系统声称是 RESTful 的，但大多数并非如此。我们甚至遇到过声称\
  \ SOAP 是 RESTful 的系统，这显然是心智扭曲的典型案例。马丁·福勒讨论了理查森成熟度模型，该模型根据系统对 REST 的符合程度对其进行分类。（参见\
  \ [`https://martinfowler.com/articles/richardsonMaturityModel.html`](https://martinfowler.com/articles/richardsonMaturityModel.html)。）\n\
  \n### 第 0 级\n\n该模型的起点是使用 HTTP 作为远程交互的传输系统，但完全不使用 Web 的任何机制。本质上，你是在利用 HTTP 作为自己远程交互机制（通常基于远程过程调用）的隧道机制。\n\
  \n### 第 1 级：资源\n\n在 RMM 中迈向 REST 荣耀的第一步是引入资源。因此，现在我们不再将所有请求发送到单一的服务端点，而是开始与各个独立的资源进行通信。\n\
  \n### 第 2 级：HTTP 动词\n\n在 0 级和 1 级中，我所有的交互都使用了 HTTP POST 动词，但有些人会改用或补充使用 GET。在这些级别上，这没有太大区别，两者都被用作隧道机制，让你可以通过\
  \ HTTP 隧道传输交互。第 2 级则脱离了这种模式，尽可能按照 HTTP 自身的使用方式来使用 HTTP 动词。\n\n### 第 3 级：超媒体控制\n\n\
  最后一级引入了你经常听到的那个丑陋缩写 HATEOAS（超媒体作为应用状态引擎）。它解决了如何从可预约时间段列表，进而知道如何操作来预约的问题。\n\n## 再谈闪卡系统\n\
  \n在第 10 章中，我们考虑了一个 Web 系统，它由服务器和在浏览器中渲染的 HTML 页面组成，并使用 JavaScript 和 CSS 来控制浏览器端的交互。当时并未尝试进行任何特别结构化的设计，只是将其视为一个传统的\
  \ Web 系统。\n\n### 回顾\n\n第 10 章的 Web 系统用于演示使用所谓的闪卡进行语言学习。系统每次向用户展示一张卡片，卡片上显示一种语言的单词，用户希望记住其翻译，而翻译内容则通过“翻转”卡片来显示。该系统会呈现一组不同的卡片集，然后在选中的卡片集中逐一显示卡片。\n\
  \n现在我们采用 REST 方法，将同样的场景构建为一个 HTTP 客户端-服务器系统。我们将进行以下若干改动：\n\n-   根据场景设置合适的 URL。这些\
  \ URL 包括“根”URL `/`，以及每个闪卡集的 URL，此外还有每张闪卡的 URL。\n-   所有用户交互代码（HTML、JavaScript 和 CSS）都将被省略。服务器将与任意的用户代理通信，而许多用户代理无法理解这些\
  \ UI 代码。\n-   服务器不会维护或管理任何客户端状态。在 Web 示例中，表单数据从浏览器发送到服务器，服务器会以稍有不同的形式立即将其返回。需要维护状态的客户端应自行处理。\n\
  -   服务器将被设置成能够管理多种不同的序列化格式，并在客户端-服务器协商后提供合适的格式。\n-   将大量使用 HTTP 机制，特别是在错误处理和内容协商方面。\n\
  \n### URL\n\n本系统的 URL 以及可以执行的操作如下：\n\n| URL | 动作 | 效果 |\n| --- | --- | --- |\n|\
  \ `/` | `GET` | 获取闪卡集列表 |\n| `/` | `POST` | 创建新的闪卡集 |\n| `/flashcardSets/<set>`\
  \ | `GET` | 获取该闪卡集中的卡片列表 |\n| `/flashcardSets/<set>` | `POST` | 为该闪卡集创建新卡片 |\n|\
  \ `/flashcardSets/<set>` | `DELETE` | 如果闪卡集为空，则删除该闪卡集 |\n| `/flashcardSets/<set>/<card>`\
  \ | `GET` | 获取卡片内容 |\n| `/flashcardSets/<set>/<card>` | `DELETE` | 从该闪卡集中删除卡片 |\n\
  \n这与第 10 章中描述的系统略有不同。主要的结构性差异在于，每张卡片都作为闪卡集的成员拥有自己的 URL。\n\n服务器将处理的示例 URL 包括以下内容：\n\
  \n| 根 URL | 闪卡集 URL | 单张闪卡 URL |\n| --- | --- | --- |\n| `/` | `/flashcardSet/CommonWords`\
  \ | `/flashcardSet/CommonWords/`你好 |\n\n### ServeMux（多路复用器）\n\nREST 基于对 URL 执行的少量动作。尝试使用\
  \ REST 原则的系统必须基于 URL。\n\n服务器多路复用器会检查客户端请求的 URL，并根据 URL 模式调用处理程序。标准的 Go 多路复用器 `net/http.ServeMux`\
  \ 使用特定的模式匹配机制：如果 URL 以 `/` 结尾，则表示以该 URL 为根的 URL 子树。如果 URL 不以 `/` 结尾，则仅表示该 URL 本身。URL\
  \ 会与具有最长模式匹配的处理程序进行匹配。URL 甚至可以包含域名作为限定符。\n\n我们需要为根 URL `/` 设置一个处理程序。该处理程序也会匹配任何类似\
  \ `/passwords` 的 URL，除非有其他处理程序捕获它。在本系统中，没有其他处理程序会这样做，因此，在 `/` 的处理程序中，我们需要对这种请求返回错误。\n\
  \n一个棘手的部分出现了，因为我们为 URL 使用了层次结构。某个特定的闪卡集将是 `/flashcardSets/CommonWords`。这实际上将是该特定闪卡集中卡片的目录。我们必须注册*两个*处理程序：一个用于\
  \ URL `/flashcardSets/CommonWords`（这是闪卡集资源），另一个用于 `/flashcardSets/CommonWords/`（注意末尾的\
  \ `/`），这是包含各个卡片及其 URL 的子树。\n\n在 main 函数中用于注册这些处理程序的代码如下：\n\n```go\nhttp.HandleFunc(`/`,\
  \ handleFlashCardSets)\nfiles, err := ioutil.ReadDir(`flashcardsets`)\ncheckError(err)\n\
  for _, file := range files {\n    fmt.Println(file.Name())\n    cardset_url := `/flashcardSets/`\
  \ + url.QueryEscape(file.Name())\n    http.HandleFunc(cardset_url, handleOneFlashCardSet)\n\
  \    http.HandleFunc(cardset_url + `/`, handleOneFlashCard)\n}\n```\n\n请注意我们使用了\
  \ `QueryEscape` 函数。这是为了对 URL 中可能出现的任何特殊字符进行转义。例如，文件名中的 `$` 应编码为 `%44`。我们*确实*需要使用这样一个函数：我们的\
  \ URL 将包含中文字符，这些字符需要经过转义编码才能在 URL 中表示。这由 `QueryEscape` 完成，但有一个例外：路径中的空格应编码为 `%20`，而在表单数据中则应编码为\
  \ `+`。`PathEscape` 函数可以正确完成此操作。为了避免此问题，我们将从 URL 中移除空格。\n\n\n\n## 内容协商\n\n任何网络用户代理都可以尝试与任何网络服务器通信。浏览器与\
  \ HTML 服务器通信是我们在网络上常见的典型情况，但许多人也会熟悉使用其他用户代理（例如`curl`、`wget`甚至`telnet`）！浏览器和其他工具会利用\
  \ HTTP 响应中的`Content-Type`来确定如何处理提供的内容。\n\n对于 Web 应用程序而言，用户代理必须能够理解服务器正在交付什么，因为它试图参与一个可能没有用户协助的交互过程。RPC\
  \ 系统通常使用客户端和服务器共同遵守的外部规范。但这里的情况并非如此。\n\n解决方案是双方必须就内容格式达成一致。这是在 HTTP 层面完成的。客户端会声明其可接受的格式范围。如果服务器同意，则继续通信。如果不同意，服务器会告知客户端它所能接受的格式，然后客户端在可能的情况下重新开始协商。\n\
  \n协商使用 MIME 类型。有数百种标准类型：`text/html`、`application/pdf`、`application/xml`等。浏览器可以渲染其接收到的任何\
  \ HTML 文档。像 VLC 这样支持 HTTP 的音乐播放器可以播放其接收到的任何 MP3 文件。但对于闪卡应用程序来说，它无法处理任何通用格式，只能处理符合预期结构的消息。没有任何标准的\
  \ MIME 类型适合为这个闪卡应用程序协商专门的协议。因此，我们自行创建。客户端和服务器必须知道它们正在处理共享的 MIME 类型，否则无法正常通信。\n\n\
  IANA 为创建自己的 MIME 类型制定了规则。我使用的类型是 `application/x.flashcards`。服务器将能够提供 JSON 和 XML\
  \ 格式，因此两种可接受的 MIME 类型是 `application/x.flashcards+xml` 和 `application/x.flashcards+json`。\n\
  \nHTTP 内容协商规定，用户代理可以建议一个可接受格式的列表，并赋予 0 到 1 之间的权重，如下所示：\n\n```\nAccept: application/x.flashcards+xml;\
  \ q=0.8,\napplication/x.flashcards+json; q=0.4\n```\n\n服务器可以检查请求，并决定自己是否能处理该格式。我们在服务器中使用以下代码来确定用户代理是否请求了某种类型，以及其权重是多少（0\
  \ 表示未请求）：\n\n```go\nconst flashcard_xml string = \"application/x.flashcards+xml\"\
  \nconst flashcard_json string = \"application/x.flashcards+json\"\ntype ValueQuality\
  \ struct {\n\tValue   string\n\tQuality float64\n}\n/* 基于 https://siongui.github.io/2015/02/22/go-parse-accept-language/\
  \ */\nfunc parseValueQuality(s string) []ValueQuality {\n\tvar vqs []ValueQuality\n\
  \tstrs := strings.Split(s, `,`)\n\tfor _, str := range strs {\n\t\ttrimmedStr :=\
  \ strings.Trim(str, ` `)\n\t\tvalQ := strings.Split(trimmedStr, `;`)\n\t\tif len(valQ)\
  \ == 1 {\n\t\t\tvq := ValueQuality{valQ[0], 1}\n\t\t\tvqs = append(vqs, vq)\n\t\t\
  } else {\n\t\t\tqp := strings.Split(valQ[1], `=`)\n\t\t\tq, err := strconv.ParseFloat(qp[1],\
  \ 64)\n\t\t\tif err != nil {\n\t\t\t\tq = 0\n\t\t\t}\n\t\t\tvq := ValueQuality{valQ[0],\
  \ q}\n\t\t\tvqs = append(vqs, vq)\n\t\t}\n\t}\n\treturn vqs\n}\nfunc qualityOfValue(value\
  \ string, vqs []ValueQuality) float64 {\n\tfor _, vq := range vqs {\n\t\tif value\
  \ == vq.Value {\n\t\t\treturn vq.Quality\n\t\t}\n\t}\n\t// 未找到\n\treturn 0\n}\n\
  ```\n\n如果服务器不接受用户代理请求的任何类型，则返回 HTTP 状态码 406“不可接受”（Not acceptable），并提供可接受格式的列表。服务器中执行此操作的代码段如下：\n\
  \n```go\nfunc handleFlashCardSets(rw http.ResponseWriter, req *http.Request) {\n\
  ...\nif req.Method == \"GET\" {\n    acceptTypes := parseValueQuality(req.Header.Get(\"\
  Accept\"))\n    q_xml := qualityOfValue(flashcard_xml, acceptTypes)\n    q_json\
  \ := qualityOfValue(flashcard_json, acceptTypes)\n    if q_xml == 0 && q_json ==\
  \ 0 {\n        // 在 Accept 头中找不到 XML 或 JSON\n        rw.Header().Set(\"Content-Type\"\
  , \"flashcards+xml, flashcards+json\")\n        rw.WriteHeader(http.StatusNotAcceptable)\n\
  \        return\n    }\n...\n```\n\n这展示了 HTTP 服务器一种常见的 REST 模式：接收到 HTTP 请求后，检查服务器能否处理该请求。如果不能，则返回\
  \ HTTP 错误；如果可以，尝试处理请求。如果处理失败，则返回 HTTP 错误；处理成功，则返回相应的 HTTP 成功码和结果。\n\n### GET /\n\
  \n所有闪卡集都存储在目录 `flashcardsets` 中。`GET /` 请求需要列出所有这些文件，并以适合客户端的格式准备好。该格式是一个闪卡集名称及其*URL\
  \ 地址*的列表。HATEOAS 需要这些 URL：名称列表告诉我们有哪些闪卡集，但客户端需要它们的 URL 才能进入与其中一个闪卡集交互的阶段。\n\n服务器中每个\
  \ `FlashcardSet` 的结构体类型包含集合的名称及其 URL（作为字符串）：\n\n```go\ntype FlashcardSet struct\
  \ {\n\tName string\n\tLink string\n}\n```\n\n服务器上的闪卡集合可以从闪卡集目录构建。`ioutil.ReadDir()`\
  \ 将创建一个 `os.FileInfo` 数组。需要将其转换为文件名列表，如下所示：\n\n```go\nfiles, err := ioutil.ReadDir(`flashcardsets`)\n\
  checkError(err)\nnumfiles := len(files)\ncardSets := make([]FlashcardSet, numfiles,\
  \ numfiles)\nfor n, file := range files {\n\tfmt.Println(file.Name())\n\tcardSets[n].Name\
  \ = file.Name()\n\t// 应使用 PathEscape，但在 Go 1.6 中不可用\n\tcardSets[n].Link = `/flashcardSets/`\
  \ + url.QueryEscape(file.Name())\n}\n```\n\n这会创建一个文件名数组以及服务器上资源的相对链接，格式为 `/<name>`。对于\
  \ `CommonWords` 集合，相对链接 URL 将为 `/flashcardSets/CommonWords`。协议（`http` 或 `https`）和主机（例如\"\
  localhost\"）留给客户端自行处理。\n\n不幸的是，文件名可能包含 URL 路径名中不合法的字符。`url.PathEscape` 函数可以正确转义所有这些字符。`url.QueryEscape`\
  \ 函数除了文件名中的空格会被替换为 `+` 而不是 `%20` 之外，其他都能正确处理。\n\n最后，服务器判断是优先使用 JSON 还是 XML，并通过模板生成正确输出给客户端。对于\
  \ XML，模板代码如下：\n\n```go\n...\nif q_xml >= q_json {\n    // 优先使用 XML\n    t, err :=\
  \ template.ParseFiles(\"xml/ListFlashcardSets.xml\")\n    if err != nil {\n    \
  \    fmt.Println(\"模板错误\")\n        http.Error(rw, err.Error(), http.StatusInternalServerError)\n\
  \        return\n    }\n    rw.Header().Set(\"Content-Type\", flashcard_xml)\n \
  \   t.Execute(rw, cardSets)\n} else {\n    // 优先使用 JSON\n...\n```\n\nXML 模板如下：\n\
  \n```xml\nch14 % cat xml/ListFlashcardSets.xml\n<flashcards>\n{{range .}}\n<flashcardSet>\n\
  <name>{{.Name}}</name>\n<link>{{.Link}}</link>\n</flashcardSet>\n{{end}}\n</flashcards>\n\
  ```\n\n对于仅包含 `CommonWords` 和 `Lesson04` 两个集合的列表，发送给客户端的内容如下：\n\n```xml\n<flashcards>\n\
  <flashcardSet>\n<name>Common Words</name>\n<link>/flashcardSets/CommonWords</link>\n\
  </flashcardSet>\n<flashcardSet>\n<name>Lesson04</name>\n<link>/flashcardSets/Lesson04</link>\n\
  </flashcardSet>\n</flashcards>\n```\n\n### POST /\n\n此处，客户端请求创建一个新的闪卡集。预期客户端将提供闪卡集的名称。我们使其看起来像表单提交数据：\n\
  \n```\nname=\n```\n\n这种情况比 `GET` 简单得多。以表单数据的形式从请求中获取值。然后检查请求的名称中是否包含危险字符，例如将闪卡集命名为\
  \ `/etc/passwd`。如果包含，则返回 403“禁止”（Forbidden）。如果名称看起来没问题，则使用该名称创建一个目录。如果创建失败（目录可能已存在），再次返回\
  \ 403。否则，返回 201“已创建”（Created）和新资源的相对 URL：\n\n```go\n...\n} else if req.Method ==\
  \ \"POST\" {\n    name := req.FormValue(`name`)\n    if hasIllegalChars(name) {\n\
  \        rw.WriteHeader(http.StatusForbidden)\n        return\n    }\n    // 去掉所有空格，因为它们很烦人\n\
  \    name = strings.Replace(name, ` `, ``, -1)\n    err := os.Mkdir(`flashcardsets/`+name,\n\
  \        (os.ModeDir | os.ModePerm))\n    if err != nil {\n        rw.WriteHeader(http.StatusForbidden)\n\
  \        return\n    }\n    rw.WriteHeader(http.StatusCreated)\n    base_url :=\
  \ req.URL.String()\n    new_url := base_url + `flashcardSets/` + name + `/`\n  \
  \  rw.Write([]byte(new_url))\n} else {\n    rw.WriteHeader(http.StatusMethodNotAllowed)\n\
  }\n...\n```\n\n\n\n### 处理其他 URL\n\n我们讨论过服务器处理带有 `GET` 和 `POST` 请求的 `/` URL 的代码。此应用还有另外两类\
  \ URL：处理集合中的卡片和处理单张卡片。不过，就编码而言，这并没有带来新的概念。\n\n*   获取集合中的卡片列表是另一种目录列表操作。\n*   向集合发布一张新卡片，意味着在对应目录下创建一个包含客户端内容的文件。\n\
  *   删除一个集合意味着移除一个目录。如果目录为空，则操作正常；否则会引发错误。\n*   获取一张卡片意味着读取卡片文件并发送其内容。\n*   删除一张卡片意味着移除一个文件。\n\
  \n所有这些操作都没有特别新颖之处。我们尚未完成某些操作（如 `DELETE`）的代码：这些操作会返回 HTTP 状态码 501 `'未实现'`。此外，我们将单张卡片的内容作为\
  \ `text/plain` 返回：它们具有第 10 章中使用的复杂 JSON/Go 结构，但这对于讨论本系统的 REST 方面并非必需。\n\n## 完整服务器\n\
  \n以下是处理对 `/` 的请求以及从该路径到其他 URL 的完整服务器代码。运行它需要闪卡集合和单张卡片，这些文件位于 `ch14` 文件夹中，可从 [`https://github.com/Apress/network-prog-with-go-2e`](https://github.com/Apress/network-prog-with-go-2e)\
  \ 获取。\n\n```\nch14$ vi server.go\n/* Server\n*/\npackage main\nimport (\n\"fmt\"\
  \n\"html/template\"\n\"log\"\n\"net/http\"\n\"net/url\"\n\"os\"\n\"regexp\"\n\"\
  strconv\"\n\"strings\"\n)\ntype FlashcardSet struct {\nName string\nLink string\n\
  }\ntype Flashcard struct {\nName string\nLink string\n}\nconst flashcard_xml string\
  \ = \"application/x.flashcards+xml\"\nconst flashcard_json string = \"application/x.flashcards+json\"\
  \ntype ValueQuality struct {\nValue   string\nQuality float64\n}\n/* 基于 https://siongui.github.io/2015/02/22/go-parse-accept-language/\
  \ */\nfunc parseValueQuality(s string) []ValueQuality {\nvar vqs []ValueQuality\n\
  strs := strings.Split(s, `,`)\nfor _, str := range strs {\ntrimmedStr := strings.Trim(str,\
  \ ` `)\nvalQ := strings.Split(trimmedStr, `;`)\nif len(valQ) == 1 {\nvq := ValueQuality{valQ[0],\
  \ 1}\nvqs = append(vqs, vq)\n} else {\nqp := strings.Split(valQ[1], `=`)\nq, err\
  \ := strconv.ParseFloat(qp[1], 64)\nif err != nil {\nq = 0\n}\nvq := ValueQuality{valQ[0],\
  \ q}\nvqs = append(vqs, vq)\n}\n}\nreturn vqs\n}\nfunc qualityOfValue(value string,\
  \ vqs []ValueQuality) float64 {\nfor _, vq := range vqs {\nif value == vq.Value\
  \ {\nreturn vq.Quality\n}\n}\nreturn 0\n}\nfunc main() {\nif len(os.Args) != 2 {\n\
  log.Fatalln(\"用法: \", os.Args[0], \":端口号\\n\")\n}\nport := os.Args[1]\nhttp.HandleFunc(`/`,\
  \ handleFlashCardSets)\nfiles, err := os.ReadDir(`flashcardsets`)\ncheckError(err)\n\
  for _, file := range files {\nfmt.Println(file.Name())\ncardset_url := `/flashcardSets/`\
  \ + url.QueryEscape(file.Name())\nfmt.Println(\"正在为 \", cardset_url, \" 添加处理器\"\
  )\nhttp.HandleFunc(cardset_url, handleOneFlashCardSet)\nhttp.HandleFunc(cardset_url+`/`,\
  \ handleOneFlashCard)\n}\n// 将请求交付给处理器\nerr = http.ListenAndServe(port, nil)\ncheckError(err)\n\
  }\nfunc hasIllegalChars(s string) bool {\n// 检查是否存在可能跳出当前目录的字符\nb, err := regexp.Match(\"\
  [/$~]\", []byte(s))\nif err != nil {\nfmt.Println(err)\nreturn true\n}\nif b {\n\
  return true\n}\nreturn false\n}\nfunc handleOneFlashCard(rw http.ResponseWriter,\
  \ req *http.Request) {\n// 应为 PathUnescape\npath, _ := url.QueryUnescape(req.URL.String())\n\
  // 去掉开头的 '/'\npath = path[1:]\nif req.Method == http.MethodGet {\nfmt.Println(\"\
  正在处理卡片: \", path)\njson_contents, err := os.ReadFile(path)\nif err != nil {\nrw.WriteHeader(http.StatusNotFound)\n\
  rw.Write([]byte(`资源未找到`))\nreturn\n}\n// 这里偷懒，直接返回 text/plain 格式的内容\nrw.Write(json_contents)\n\
  return\n} else if req.Method == http.MethodDelete {\nrw.WriteHeader(http.StatusNotImplemented)\n\
  } else {\nrw.WriteHeader(http.StatusMethodNotAllowed)\n}\nreturn\n}\nfunc handleFlashCardSets(rw\
  \ http.ResponseWriter, req *http.Request) {\nif req.URL.String() != `/` {\n// 此函数仅处理\
  \ '/'\nrw.WriteHeader(http.StatusNotFound)\nrw.Write([]byte(\"资源未找到\\n\"))\nreturn\n\
  }\nif req.Method == \"GET\" {\nacceptTypes := parseValueQuality(req.Header.Get(\"\
  Accept\"))\nfmt.Println(acceptTypes)\nq_xml := qualityOfValue(flashcard_xml, acceptTypes)\n\
  q_json := qualityOfValue(flashcard_json, acceptTypes)\nif q_xml == 0 && q_json ==\
  \ 0 {\n// 在 Accept 头部中未找到 XML 或 JSON\nrw.Header().Set(\"Content-Type\", \"flashcards+xml,\
  \ flashcards+json\")\nrw.WriteHeader(http.StatusNotAcceptable)\nreturn\n}\nfiles,\
  \ err := os.ReadDir(`flashcardsets`)\ncheckError(err)\nnumfiles := len(files)\n\
  cardSets := make([]FlashcardSet, numfiles, numfiles)\nfor n, file := range files\
  \ {\nfmt.Println(file.Name())\ncardSets[n].Name = file.Name()\n// 应为 PathEscape，但在\
  \ go 1.6 中不可用\ncardSets[n].Link = `/flashcardSets/` + url.QueryEscape(file.Name())\n\
  }\nparseFile := \"xml/ListFlashcardSets.xml\"\nflashcardType := flashcard_xml\n\
  if q_xml = q_json {\n// 优先选择 XML\nt, err := template.ParseFiles(\"xml/ListOneFlashcardSet.xml\"\
  )\nif err != nil {\nfmt.Println(\"模板错误\")\nhttp.Error(rw, err.Error(), http.StatusInternalServerError)\n\
  return\n}\nrw.Header().Set(\"Content-Type\", flashcard_xml)\nt.Execute(os.Stdout,\
  \ cards)\nt.Execute(rw, cards)\n} else {\n// 优先选择 JSON\nt, err := template.ParseFiles(\"\
  json/ListOneFlashcardSet.json\")\nif err != nil {\nfmt.Println(\"模板错误\", err)\n\
  http.Error(rw, err.Error(), http.StatusInternalServerError)\nreturn\n}\nrw.Header().Set(\"\
  Content-Type\", flashcard_json)\nt.Execute(rw, cards)\n}\n} else if req.Method ==\
  \ http.MethodPost {\nname := req.FormValue(`name`)\nif hasIllegalChars(name) {\n\
  rw.WriteHeader(http.StatusForbidden)\nreturn\n}\nerr := os.Mkdir(`flashcardsets/`+name,\n\
  (os.ModeDir | os.ModePerm))\nif err != nil {\nrw.WriteHeader(http.StatusForbidden)\n\
  return\n}\nrw.WriteHeader(http.StatusCreated)\nbase_url := req.URL.String()\nnew_url\
  \ := base_url + `flashcardSets/` + name\n_, _ = rw.Write([]byte(new_url))\n} else\
  \ if req.Method == http.MethodDelete {\nrw.WriteHeader(http.StatusNotImplemented)\n\
  } else {\nrw.WriteHeader(http.StatusMethodNotAllowed)\n}\nreturn\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"致命错误 \", err.Error())\n}\n}\n```\n\n\
  按如下方式运行：\n\n```\nch14$ go run server.go :8000\n```\n\n## 客户端\n\n客户端相对简单，没有提供真正新颖的内容。此客户端仅以\
  \ XML 格式请求内容。一个新的部分是，闪卡集合的内容在 `cardset` 标签内包含作为超文本属性的链接。在 `Card` 结构中，这可以通过标签标签 `xml:\"\
  href,attr\"` 转换为结构体的一个字段。\n\n此客户端在 `getFlashcardSets()` 函数中获取闪卡集合列表及其 URL（步骤 1）。该函数返回一个\
  \ `FlashcardSets` 结构体。例如，它可以用于向用户展示一个列表，供用户选择特定的集合。一旦选定，就可以使用该集合的 URL 与资源进行交互。\n\
  \n然后，此客户端在 `createFlashcardSet()` 函数中创建一个名为 `NewSet` 的闪卡集合（步骤 2）。客户端首次运行时，会创建该集合，并返回该集合的\
  \ URL。再次运行时，由于集合已存在，将从服务器收到一个操作被禁止的错误。\n\n接着，此客户端从服务器提供的 URL 中选取第一个闪卡集合，并请求该集合所包含的卡片（步骤\
  \ 3）。然后，它从该集合中选取第一张卡片并获取其内容（步骤 4）。\n\n客户端代码是 `client.go`：\n\n\n\n```go\nch14$ vi\
  \ client.go\n/* 客户端\n*/\npackage main\n\nimport (\n\"encoding/xml\"\n\"fmt\"\n\"\
  io\"\n\"log\"\n\"net/http\"\n\"net/http/httputil\"\n\"net/url\"\n\"os\"\n\"strings\"\
  \n)\n\nconst flashcard_xml string = \"application/x.flashcards+xml\"\nconst flashcard_json\
  \ string = \"application/x.flashcards+json\"\n\ntype FlashcardSets struct {\nXMLName\
  \ string    `xml:\"cardsets\"`\nCardSet []CardSet `xml:\"cardset\"`\n}\n\ntype CardSet\
  \ struct {\nXMLName string `xml:\"cardset\"`\nName    string `xml:\"name\"`\nLink\
  \    string `xml:\"href,attr\"`\nCards   []Card `xml:\"card\"`\n}\n\ntype Card struct\
  \ {\nName string `xml:\"name\"`\nLink string `xml:\"href,attr\"`\n}\n\nfunc getter(url\
  \ *url.URL, client *http.Client, acceptType string) *http.Response {\nrequest, err\
  \ := http.NewRequest(\"GET\", url.String(), nil)\ncheckError(err)\nif acceptType\
  \ != \"\" {\nrequest.Header.Add(\"Accept\", flashcard_xml)\n}\nresponse, err :=\
  \ client.Do(request)\ncheckError(err)\nif response.StatusCode != http.StatusOK {\n\
  log.Fatalln(err, response)\n}\nfmt.Println(\"响应头为：\")\nb, _ := httputil.DumpResponse(response,\
  \ false)\nfmt.Print(string(b))\nreturn response\n}\n\nfunc getOneFlashcard(url *url.URL,\
  \ client *http.Client) string {\n// 以字符串形式获取卡片，不做任何处理\nresponse := getter(url, client,\
  \ \"\")\nbody, err := io.ReadAll(response.Body)\ncheckError(err)\ncontent := string(body[:])\n\
  //fmt.Printf(\"主体为 %s\", content)\nreturn content\n}\n\nfunc getOneFlashcardSet(url\
  \ *url.URL, client *http.Client) CardSet {\n// 获取一组卡片\nresponse := getter(url, client,\
  \ flashcard_xml)\nbody, err := io.ReadAll(response.Body)\ncontent := string(body[:])\n\
  fmt.Printf(\"主体为 %s\", content)\nvar sets CardSet\ncontentType := getContentType(response)\n\
  if contentType == \"XML\" {\nerr = xml.Unmarshal(body, &sets)\ncheckError(err)\n\
  fmt.Println(\"XML：\", sets)\nreturn sets\n}\n/* else if contentType == \"JSON\"\
  \ {\nvar sets FlashcardSetsJson\nerr = json.Unmarshal(body, &sets)\ncheckError(err)\n\
  fmt.Println(\"JSON: \", sets)\n}\n*/\nreturn sets\n}\n\nfunc getFlashcardSets(url\
  \ *url.URL, client *http.Client) FlashcardSets {\n// 获取顶层 /\nresponse := getter(url,\
  \ client, flashcard_xml)\nbody, err := io.ReadAll(response.Body)\ncontent := string(body[:])\n\
  fmt.Printf(\"主体为 %s\", content)\nvar sets FlashcardSets\ncontentType := getContentType(response)\n\
  if contentType == \"XML\" {\nerr = xml.Unmarshal(body, &sets)\ncheckError(err)\n\
  fmt.Println(\"XML：\", sets)\nreturn sets\n}\nreturn sets\n}\n\nfunc createFlashcardSet(url1\
  \ *url.URL, client *http.Client, name string) string {\ndata := make(url.Values)\n\
  data[`name`] = []string{name}\nresponse, err := client.PostForm(url1.String(), data)\n\
  checkError(err)\nif response.StatusCode != http.StatusCreated {\nfmt.Println(`错误：`,\
  \ response.Status)\nreturn ``\n}\nbody, err := io.ReadAll(response.Body)\ncontent\
  \ := string(body[:])\nreturn content\n}\n\nfunc main() {\nif len(os.Args) != 2 {\n\
  log.Fatalln(\"用法：\", os.Args[0], \"http://host:port/page\")\n}\nurl, err := url.Parse(os.Args[1])\n\
  checkError(err)\nclient := &http.Client{}\n// 步骤 1：获取闪卡集合列表\nflashcardSets := getFlashcardSets(url,\
  \ client)\nfmt.Println(\"步骤 1：\", flashcardSets)\n// 步骤 2：尝试创建一个新的闪卡集合\nnew_url\
  \ := createFlashcardSet(url, client, `NewSet`)\nfmt.Println(\"步骤 2：新闪卡集合的 URL 为：\"\
  , new_url)\n// 步骤 3：使用第一个闪卡集合，\n//         获取其中的卡片列表\nset_url, _ := url.Parse(os.Args[1]\
  \ + flashcardSets.CardSet[0].Link)\nfmt.Println(\"正在请求闪卡集合 URL：\", set_url.String())\n\
  oneFlashcardSet := getOneFlashcardSet(set_url, client)\nfmt.Println(\"步骤 3：\", oneFlashcardSet)\n\
  // 步骤 4：获取一张闪卡的内容\n//         偷懒，仅以 text/plain 形式获取，不做任何处理\ncard_url, _ := url.Parse(os.Args[1]\
  \ + oneFlashcardSet.Cards[0].Link)\nfmt.Println(\"正在请求 URL：\", card_url.String())\n\
  oneFlashcard := getOneFlashcard(card_url, client)\nfmt.Println(\"步骤 4\", oneFlashcard)\n\
  }\n\nfunc getContentType(response *http.Response) string {\ncontentType := response.Header.Get(\"\
  Content-Type\")\nif strings.Contains(contentType, flashcard_xml) {\nreturn \"XML\"\
  \n}\nif strings.Contains(contentType, flashcard_json) {\nreturn \"JSON\"\n}\nreturn\
  \ \"\"\n}\n\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"致命错误 \"\
  , err.Error())\n}\n}\n```\n\n运行方式如下：\n\n```\nch14$ go run client.go http://localhost:8000/\n\
  ...（所有闪卡相关内容）...\n```\n\n## 使用 REST 还是 RPC\n\nREST 与 RPC 的主要区别在于交互方式。在 RPC 中，你是在调用函数，传递对象或基本类型作为参数，并返回对象或基本类型。函数是*动词*：对*那个*做*这个*。而\
  \ REST 则是与对象交互，要求它们展示自身状态或以某种方式改变状态。\n\n这种差异体现在上一章讨论的 Go RPC 机制和本章的 REST 机制上。在基于\
  \ HTTP 的 Go RPC 中，服务器注册的是*函数*；而在 REST 中，服务器注册的是*URL*的处理器。\n\n哪个更好？都不好。哪个更快？都不快。哪种更适合受控环境？可能是\
  \ RPC。哪种更适合开放环境？可能是 REST。\n\n你会看到基于速度和资源分配的争论。基于二进制系统的 RPC 可能比基于文本的 HTTP 系统更快。但\
  \ SOAP 是一种基于 HTTP 的文本 RPC 系统，可能比 REST 更慢。HTTP2 使用二进制格式，在传输 BSON 等二进制数据时，速度可能与其他二进制系统相当。更令人困惑的是，Apache\
  \ Thrift RPC 允许选择数据格式（二进制、紧凑二进制、JSON 和文本）和传输方式（套接字、文件和共享内存）。一个系统展示了所有选项！\n\n更重要的因素可能是运营环境的受控程度。RPC\
  \ 系统是紧密耦合的，一个组件故障可能导致整个系统崩溃。当存在单一管理权威、有限的硬件和软件配置以及清晰的故障修复渠道时，RPC 系统可以工作得很好。\n\n\
  另一方面，Web 是未受控的。没有单一权威——即使是 DNS 这样的“通用”服务也是高度分布式的。存在大量不同的硬件、操作系统和软件；几乎没有执行任何策略的可能性；如果出了问题，往往找不到可以指明修复的人。在这种情况下，松散耦合的系统可能更好。\n\
  \n基于 HTTP 的 REST 非常适合这种情况。HATEOAS 允许服务器动态重新配置，按需更改 URL（甚至指向不同的服务器！）。HTTP 设计为在可能的情况下缓存结果。防火墙通常被配置为允许\
  \ HTTP 流量并阻止大多数其他协议。REST 在这里是一个不错的选择。\n\n需要注意的是，REST 并非唯一可能的基于 HTTP 的系统。前面已经提到了\
  \ SOAP。还有许多商业上非常成功的系统是“几乎” REST 的——Richardson 成熟度模型的第 1 级和第 2 级。它们无法享受 REST/HTTP\
  \ 组合的全部好处，但仍然可以工作。\n\n毫无疑问，未来会出现其他模型。在物联网领域，CoAP 在低功耗无线系统中很流行。它也是基于 REST 的，但与 HTTP-REST\
  \ 的方式略有不同。\n\n## 结论\n\nREST 是 Web 的架构模型。它可以以多种不同方式应用，特别是作为 HTTP 和 CoAP（例如低功耗、有损网络协议）。本章阐述了\
  \ REST 在 HTTP 中的应用方式。\n\n\n\n# 15. WebSocket\n\n浏览器等网络用户代理与 Apache 等网络服务器之间的标准交互模型是：用户代理发出\
  \ HTTP 请求，服务器对每个请求做出单一回复。对于浏览器而言，请求通过点击链接、在地址栏输入 URL、点击前进或后退按钮等方式发起。响应被视为一个新页面，并加载到浏览器窗口中。\n\
  \n这种传统模型存在诸多缺陷。首先，每个请求都会打开并关闭一个新的 TCP 连接。HTTP 1.1 通过允许持久连接解决了这个问题，使得连接可以在短时间内保持打开状态，从而允许对同一服务器发起多个请求（例如，请求图片）。\n\
  \n虽然 HTTP 1.1 持久连接缓解了加载包含大量图片的页面速度慢的问题，但并未改进交互模型。即使采用了表单，模型仍然是通过提交表单并将响应显示为新页面。JavaScript\
  \ 有助于在提交前对表单数据进行错误检查，但并未改变这一模型。\n\nAJAX（异步 JavaScript 和 XML）在用户交互模型上取得了重大进展。它允许浏览器发起请求，并仅使用响应通过\
  \ HTML 文档对象模型（DOM）就地更新显示内容。但同样，交互模型本身并未改变，AJAX 仅仅影响了浏览器管理返回页面的方式。Go 语言没有为 AJAX 提供显式的额外支持，因为无需如此：HTTP\
  \ 服务器看到的只是一个可能携带 XML 或 JSON 数据的普通 HTTP POST 请求，这可以通过已讨论的技术来处理。\n\n所有这些仍然是浏览器（或用户代理）到服务器的通信。所缺少的是服务器到浏览器的通信，即浏览器已经建立了到服务器的\
  \ TCP 连接，并从服务器读取消息。这可以由 WebSocket 来填补：浏览器（或任何用户代理）保持一个到 WebSocket 服务器的长期 TCP 连接。该\
  \ TCP 连接允许任何一侧发送任意数据包，因此任何应用层协议都可以在 WebSocket 上使用。\n\n启动 WebSocket 的方式是用户代理发送一个特殊的\
  \ HTTP 请求，该请求表明“切换至 WebSocket”。HTTP 请求底层的 TCP 连接保持打开状态，但用户代理和服务器都转而使用 WebSocket\
  \ 协议，而不是获取 HTTP 响应并关闭套接字。\n\n请注意，仍然是浏览器或用户代理发起 WebSocket 连接。浏览器自身并不运行 TCP 服务器。尽管\
  \ IETF RFC 6455 规范（参见 [`https://tools.ietf.org/html/rfc6455`](https://tools.ietf.org/html/rfc6455)）较为复杂，但该协议的设计使其相对易于使用。客户端打开一个\
  \ HTTP 连接，然后用其自身的 WS 协议替换 HTTP 协议，并重用同一个 TCP 连接或新建一个连接。\n\nGo 语言在其子仓库中提供了一些对 WebSocket\
  \ 的支持，但实际上推荐使用第三方包。本章将探讨这两个包。\n\n## WebSocket 服务器\n\n一个 WebSocket 服务器最初是一个 HTTP\
  \ 服务器，接受 TCP 连接并处理这些 TCP 连接上的 HTTP 请求。当一个请求进来，要求将该连接切换为 WebSocket 连接时，协议处理器会从 HTTP\
  \ 处理器变为 WebSocket 处理器。因此，只有那条 TCP 连接的角色发生了改变；该服务器对于其他请求仍然是一个 HTTP 服务器，而那条连接底层的 TCP\
  \ 套接字则被用作 WebSocket。\n\n在第 8 章（HTTP）中讨论的一个简单服务器，注册了诸如文件处理器或函数处理器等各种处理器。为了处理 WebSocket\
  \ 请求，我们只需注册一个不同类型的处理器——即 WebSocket 处理器。服务器使用哪个处理器取决于 URL 模式。例如，可能为 `/` 注册一个文件处理器，为\
  \ `/cgi-bin/...` 注册一个函数处理器，而为 `/ws` 注册一个 WebSocket 处理器。\n\n一个仅期望用于 WebSocket 的 HTTP\
  \ 服务器可以按如下方式运行：\n\n```\nfunc main() {\n    http.Handle(\"/\", websocket.Handler(WSHandler))\n\
  \    err := http.ListenAndServe(\":12345\", nil)\n    checkError(err)\n}\n```\n\n\
  一个更复杂的服务器可以通过简单地添加更多处理器来同时处理 HTTP 和 WebSocket 请求。\n\n在实现方面，我们有多种选择，包括手动管理原始 HTTP\
  \ 连接（TCP 劫持），以及使用 `x` 包的 WebSocket 实现，甚至使用知名的第三方包。\n\n## `golang.org/x/net/websocket`\
  \ 包\n\nGo 语言有一个名为 `golang.org/x/net/websocket` 的子仓库包。\n\n该包的文档说明如下：\n\n*此包目前缺少另一个更活跃维护的\
  \ WebSocket 包所具有的一些功能：* [`pkg.go.dev/github.com/gorilla/websocket`](https://pkg.go.dev/github.com/gorilla/websocket)。*遗憾的是，即使是\
  \ Gorilla WebSocket 包也正在寻找一位活跃的首席维护者。尽管如此，它仍然是领先的实现。*\n\n这表明，使用替代包可能是更好的选择。然而，为了与本书其余部分保持一致（即使用\
  \ Go 团队的包），我们在此处探讨此包。后续章节将探讨替代包。\n\n\n\n### 消息对象\n\nHTTP 是一种流式协议，而 WebSocket 则是基于帧的。你需要准备一个数据块（大小不限），并将其作为一组帧来发送。帧可以包含采用\
  \ UTF-8 编码的字符串或字节序列。\n\n使用 WebSocket 最简单的方式就是准备一个数据块，让 Go WebSocket 库将其打包为一组帧数据，通过网络发送，并在接收端以相同的数据块形式接收。`websocket`\
  \ 包中包含一个名为 `Message` 的便捷对象，专门用于此目的。`Message` 对象有两个方法——`Send` 和 `Receive`，它们都将 WebSocket\
  \ 作为第一个参数。第二个参数可以是用于存储数据的变量的地址，也可以是要发送的数据。发送字符串数据的代码如下所示：\n\n```\nmsgToSend := \"\
  Hello\"\nerr := websocket.Message.Send(ws, msgToSend)\nvar msgToReceive string\n\
  err := websocket.Message.Receive(conn, &msgToReceive)\n```\n\n发送字节数据的代码如下所示：\n\n\
  ```\ndataToSend := []byte{0, 1, 2}\nerr := websocket.Message.Send(ws, dataToSend)\n\
  var dataToReceive []byte\nerr := websocket.Message.Receive(conn, &dataToReceive)\n\
  ```\n\n接下来给出一个用于发送和接收字符串数据的回显服务器。请注意，在 WebSocket 中，任何一方都可以发起消息发送，而在这个服务器中，当客户端连接时，我们是从服务器向客户端发送消息（发送/接收），而不是更常见的接收/发送服务器。该服务器文件为\
  \ `echoserver.go`：\n\n```\n$ mkdir ch15\n$ cd ch15\n$ vi echoserver.go\n/* EchoServer\n\
  */\npackage main\nimport (\n\"fmt\"\n\"golang.org/x/net/websocket\"\n\"log\"\n\"\
  net/http\"\n)\nfunc Echo(ws *websocket.Conn) {\nfmt.Println(\"Echoing\")\nfor n\
  \ := 0; n < 10; n++ {\nmsg := \"Hello  \" + string(n+48)\nfmt.Println(\"Sending\
  \ to client: \" + msg)\nerr := websocket.Message.Send(ws, msg)\nif err != nil {\n\
  fmt.Println(\"Can't send\")\nbreak\n}\nvar reply string\nerr = websocket.Message.Receive(ws,\
  \ &reply)\nif err != nil {\nfmt.Println(\"Can't receive\")\nbreak\n}\nfmt.Println(\"\
  Received back from client: \" + reply)\n}\n}\nfunc main() {\nhttp.Handle(\"/\",\
  \ websocket.Handler(Echo))\nerr := http.ListenAndServe(\":12345\", nil)\ncheckError(err)\n\
  }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \",\
  \ err.Error())\n}\n}\n```\n\n按如下方式运行：\n\n```\nch15$ go mod init example.com/user/echoserver\n\
  ch15$ go mod tidy\nch15$ go run echoserver.go\n```\n\n与该服务器通信的客户端文件是 `echoclient.go`：\n\
  \n```\nch15$ vi echoclient.go\n/* EchoClient\n*/\npackage main\nimport (\n\"fmt\"\
  \n\"golang.org/x/net/websocket\"\n\"io\"\n\"os\"\n\"log\"\n)\nfunc main() {\nif\
  \ len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"ws://host:port\")\n\
  }\nservice := os.Args[1]\nconn, err := websocket.Dial(service, \"\",\n\"http://localhost:12345\"\
  )\ncheckError(err)\nvar msg string\nfor {\nerr := websocket.Message.Receive(conn,\
  \ &msg)\nif err != nil {\nif err == io.EOF {\n// graceful shutdown by server\nbreak\n\
  }\nfmt.Println(\"Couldn't receive msg \" +\nerr.Error())\nbreak\n}\nfmt.Println(\"\
  Received from server: \" + msg)\n// return the msg\nerr = websocket.Message.Send(conn,\
  \ msg)\nif err != nil {\nfmt.Println(\"Couldn't return msg\")\nbreak\n}\n}\n}\n\
  func checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
  }\n}\n```\n\n按如下方式运行：\n\n```\nch15$ go run echoclient.go ws://localhost:12345\n\
  ```\n\n*客户端*侧的输出内容即为*服务器*所发送的内容：\n\n```\nReceived from server: Hello  0\n...\nReceived\
  \ from server: Hello  9\n```\n\n回到服务器端，我们能看到以下内容：\n\n```\nEchoing\nSending to client:\
  \ Hello  0\nReceived back from client: Hello  0\n...\nSending to client: Hello \
  \ 9\nReceived back from client: Hello  9\n```\n\n上述会话证明了我们能够通过 WebSocket 发送和接收数据。请注意上述服务器和客户端代码中的\
  \ `Message` 对象及其用法。根据文档描述：\n\n```\nch15$ go doc golang.org/x/net/websocket.Message\n\
  package websocket // import \"golang.org/x/net/websocket\"\nvar Message = Codec{marshal,\
  \ unmarshal}\nMessage is a codec to send/receive text/binary data in a frame on\
  \ WebSocket\nconnection. To send/receive text frame, use string type. To send/receive\n\
  binary frame, use []byte type.\nTrivial usage:\nimport \"websocket\"\n// receive\
  \ text frame\nvar message string\nwebsocket.Message.Receive(ws, &message)\n// send\
  \ text frame\nmessage = \"hello\"\nwebsocket.Message.Send(ws, message)\n// receive\
  \ binary frame\nvar data []byte\nwebsocket.Message.Receive(ws, &data)\n// send binary\
  \ frame\ndata = []byte{0, 1, 2}\nwebsocket.Message.Send(ws, data)\n```\n\n### JSON\
  \ 对象\n\n可以预见，许多 WebSocket 客户端和服务器将使用 JSON 格式交换数据。对于 Go 程序而言，这意味着 Go 对象将被序列化为 JSON\
  \ 格式（如第 4 章所述），然后作为 UTF-8 字符串发送，而接收方将读取此字符串并将其反序列化回 Go 对象。\n\n`websocket` 包中名为 `JSON`\
  \ 的便捷对象可以为你完成此操作。它拥有 `Send` 和 `Receive` 方法，用于发送和接收数据，与 `Message` 对象类似。\n\n我们考虑这样一个场景：客户端使用\
  \ WebSocket（它可以双向发送消息）向服务器发送一个 `Person` 对象。从客户端读取消息并将其打印到服务器标准输出的服务器文件是 `personserverjson.go`：\n\
  \n```\nch15$ vi personserverjson.go\n/* PersonServerJSON\n*/\npackage main\nimport\
  \ (\n\"fmt\"\n\"golang.org/x/net/websocket\"\n\"log\"\n\"net/http\"\n)\ntype Person\
  \ struct {\nName   string\nEmails []string\n}\nfunc ReceivePerson(ws *websocket.Conn)\
  \ {\nvar person Person\nerr := websocket.JSON.Receive(ws, &person)\nif err != nil\
  \ {\nfmt.Println(\"Can't receive\")\n} else {\nfmt.Println(\"Name: \" + person.Name)\n\
  for _, e := range person.Emails {\nfmt.Println(\"An email: \" + e)\n}\n}\n}\nfunc\
  \ main() {\nhttp.Handle(\"/\", websocket.Handler(ReceivePerson))\nerr := http.ListenAndServe(\"\
  :12345\", nil)\ncheckError(err)\n}\nfunc checkError(err error) {\nif err != nil\
  \ {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n以 JSON 格式发送 `Person`\
  \ 对象的客户端文件是 `personclientjson.go`：\n\n```\nch15$ vi personclientjson.go\n/* PersonClientJSON\n\
  */\npackage main\nimport (\n\"fmt\"\n\"golang.org/x/net/websocket\"\n\"log\"\n\"\
  os\"\n)\ntype Person struct {\nName   string\nEmails []string\n}\nfunc main() {\n\
  if len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"ws://host:port\"\
  )\n}\nservice := os.Args[1]\nconn, err := websocket.Dial(service, \"\",\n\"http://localhost\"\
  )\ncheckError(err)\nperson := Person{Name: \"Jan\",\nEmails: []string{\"ja@newmarch.name\"\
  ,\n\"jan.newmarch@gmail.com\"},\n}\nerr = websocket.JSON.Send(conn, person)\nif\
  \ err != nil {\nfmt.Println(\"Couldn't send msg \" + err.Error())\n}\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n按如下方式运行服务器：\n\n```\nch15$ go run personserverjson.go\n```\n\n按如下方式运行客户端：\n\
  \n```\nch15$ go run personclientjson.go ws://localhost:12345\n```\n\n*服务器*侧的输出内容即为*客户端*所发送的数据：\n\
  \n```\nName: Jan\nAn email: ja@newmarch.name\nAn email: jan.newmarch@gmail.com\n\
  ```\n\n与之前一样，查阅相关的 JSON 对象文档。\n\n```\nch15$ go doc golang.org/x/net/websocket.JSON\n\
  package websocket // import \"golang.org/x/net/websocket\"\nvar JSON = Codec{jsonMarshal,\
  \ jsonUnmarshal}\nJSON is a codec to send/receive JSON data in a frame from a WebSocket\n\
  connection.\nTrivial usage:\nimport \"websocket\"\ntype T struct {\nMsg string\n\
  Count int\n}\n// receive JSON type T\nvar data T\nwebsocket.JSON.Receive(ws, &data)\n\
  // send JSON type T\nwebsocket.JSON.Send(ws, data)\n```\n\n\n\n### 编解码器类型\n\n`Message`\
  \ 和 `JSON` 对象都是 `Codec` 类型的实例。该类型定义如下：\n\n```\ntype Codec struct {\n\tMarshal  \
  \ func(v interface{}) (data []byte, payloadType byte, err error)\n\tUnmarshal func(data\
  \ []byte, payloadType byte, v interface{}) (err error)\n}\n```\n\n`Codec` 类型实现了前面用到的\
  \ `Send` 和 `Receive` 方法。要了解更多关于该类型的信息，请运行：\n\n`ch15$ go doc golang.org/x/net/websocket.Codec`\n\
  \nWebSocket 很可能也会用于交换 XML 数据。我们可以通过封装第 12 章讨论的 XML `marshal` 和 `unmarshal` 方法来构建一个\
  \ XML `Codec` 对象，从而得到一个合适的 `Codec` 对象。\n\n我们可以创建一个名为 `xmlcodec.go` 的 `XMLCodec`\
  \ 包，具体如下：\n\n`ch15$ vi xmlcodec.go`\n\n```\n/* XMLCodec\n*/\npackage main\nimport\
  \ (\n\t\"encoding/xml\"\n\t\"golang.org/x/net/websocket\"\n)\nfunc xmlMarshal(v\
  \ interface{}) (msg []byte, payloadType byte, err error) {\n\tmsg, err = xml.Marshal(v)\n\
  \treturn msg, websocket.TextFrame, nil\n}\nfunc xmlUnmarshal(msg []byte, payloadType\
  \ byte, v interface{}) (err error) {\n\terr = xml.Unmarshal(msg, v)\n\treturn err\n\
  }\nvar XMLCodec = websocket.Codec{xmlMarshal, xmlUnmarshal}\n```\n\n然后，我们可以将诸如 `Person`\
  \ 这样的 Go 对象序列化为 XML 文档，并从客户端发送到服务器。接收该文档并将其打印到标准输出的服务器代码如下 (`personserverxml.go`)：\n\
  \n`ch15$ vi personserverxml.go`\n\n```\n/* PersonServerXML\n*/\npackage main\nimport\
  \ (\n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\n\t\"log\"\n\t\"net/http\"\n)\n\
  type Person struct {\n\tName   string\n\tEmails []string\n}\nfunc ReceivePerson(ws\
  \ *websocket.Conn) {\n\tvar person Person\n\terr := XMLCodec.Receive(ws, &person)\n\
  \tif err != nil {\n\t\tfmt.Println(\"Can't receive\")\n\t} else {\n\t\tfmt.Println(\"\
  Name: \" + person.Name)\n\t\tfor _, e := range person.Emails {\n\t\t\tfmt.Println(\"\
  An email: \" + e)\n\t\t}\n\t}\n}\nfunc main() {\n\thttp.Handle(\"/\", websocket.Handler(ReceivePerson))\n\
  \terr := http.ListenAndServe(\":12345\", nil)\n\tcheckError(err)\n}\nfunc checkError(err\
  \ error) {\n\tif err != nil {\n\t\tlog.Fatalln(\"Fatal error \", err.Error())\n\t\
  }\n}\n```\n\n以 XML 形式发送 `Person` 对象的客户端代码为 `personclientxml.go`：\n\n`ch15$ vi personclientxml.go`\n\
  \n```\n/* PersonClientXML\n*/\npackage main\nimport (\n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\
  \n\t\"log\"\n\t\"os\"\n)\ntype Person struct {\n\tName   string\n\tEmails []string\n\
  }\nfunc main() {\n\tif len(os.Args) != 2 {\n\t\tlog.Fatalln(\"Usage: \", os.Args[0],\
  \ \"ws://host:port\")\n\t}\n\tservice := os.Args[1]\n\tconn, err := websocket.Dial(service,\
  \ \"\", \"http://localhost\")\n\tcheckError(err)\n\tperson := Person{Name: \"Jan\"\
  ,\n\t\tEmails: []string{\"ja@newmarch.name\",\n\t\t\t\"jan.newmarch@gmail.com\"\
  },\n\t}\n\terr = XMLCodec.Send(conn, person)\n\tif err != nil {\n\t\tfmt.Println(\"\
  Couldn't send msg \" + err.Error())\n\t}\n\tos.Exit(0)\n}\nfunc checkError(err error)\
  \ {\n\tif err != nil {\n\t\tlog.Fatalln(\"Fatal error \", err.Error())\n\t}\n}\n\
  ```\n\n服务器运行方式如下：\n\n`ch15$ go run personserverxml.go xmlcodec.go`\n\n客户端运行方式如下：\n\
  \n`ch15$ go run personclientxml.go xmlcodec.go ws://localhost:12345`\n\n*服务器*端的输出即*客户端*发送的内容：\n\
  \n```\nName: Jan\nAn email: ja@newmarch.name\nAn email: jan.newmarch@gmail.com\n\
  ```\n\n和之前一样，请查阅相关的编解码器对象文档（`go doc encoding/xml`）。\n\n下一步合理的改进是增强安全性；接下来我们将 WebSocket\
  \ 升级为使用 TLS。\n\n### 基于 TLS 的 WebSocket\n\nWebSocket 可以构建在安全的 TLS 套接字之上。我们在第 8 章讨论了如何使用第\
  \ 7 章中的证书来使用 TLS 套接字。这种方法在 WebSocket 中保持不变。也就是说，我们使用 `http.ListenAndServeTLS` 代替\
  \ `http.ListenAndServe`。\n\n以下是一个使用 TLS 的回声服务器 `echoservertls.go`：\n\n`ch15$ vi\
  \ echoservertls.go`\n\n```\n/* EchoServerTLS\n*/\npackage main\nimport (\n\t\"log\"\
  \n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\n\t\"net/http\"\n)\nfunc Echo(ws *websocket.Conn)\
  \ {\n\tfmt.Println(\"Echoing\")\n\tfor n := 0; n < 10; n++ {\n\t\tmsg := \"Hello\
  \  \" + string(n+48)\n\t\tfmt.Println(\"Sending to client: \" + msg)\n\t\terr :=\
  \ websocket.Message.Send(ws, msg)\n\t\tif err != nil {\n\t\t\tfmt.Println(\"Can't\
  \ send\")\n\t\t\tbreak\n\t\t}\n\t\tvar reply string\n\t\terr = websocket.Message.Receive(ws,\
  \ &reply)\n\t\tif err != nil {\n\t\t\tfmt.Println(\"Can't receive\")\n\t\t\tbreak\n\
  \t\t}\n\t\tfmt.Println(\"Received back from client: \" + reply)\n\t}\n}\nfunc main()\
  \ {\n\thttp.Handle(\"/\", websocket.Handler(Echo))\n\terr := http.ListenAndServeTLS(\"\
  :12345\",\n\t\t\"jan.newmarch.name.pem\",\n\t\t\"private.pem\", nil)\n\tcheckError(err)\n\
  }\nfunc checkError(err error) {\n\tif err != nil {\n\t\tlog.Fatalln(\"Fatal error\
  \ \", err.Error())\n\t}\n}\n```\n\n在运行服务器之前，我们需要从第 7/8 章创建并使用的证书和密钥。\n\n```\nch15$\
  \ cp ../ch7/jan.newmarch.name.pem . ; cp ../ch7/private.pem .\nch15$ go run echoservertls.go\n\
  ```\n\n客户端与之前的回声客户端相同。唯一变化的是 URL，它使用 `wss` 方案代替了 `ws` 方案：\n\n```\nch15$ go run echoclient\
  \ wss://localhost:12345/\nFatal error  websocket.Dial wss://localhost:12345: x509:\
  \ certificate signed by unknown authority\nexit status 1\n```\n\n如果服务器提供的 TLS 证书是有效的，这就能正常工作。但我使用的证书无效：它是自签名的，这通常是你即将进入危险区域的信号。如果仍然要继续，你需要采用与第\
  \ 8 章相同的“移除安全检查”方法，即启用 TLS `InsecureSkipVerify` 标志。程序 `echoclienttls.go` 就是通过设置一个使用该标志的配置，然后调用\
  \ `DialConfig` 代替 `Dial` 来实现的。\n\n`ch15$ vi echoclienttls.go`\n\n```\n/* EchoClientTLS\n\
  */\npackage main\nimport (\n\t\"crypto/tls\"\n\t\"fmt\"\n\t\"golang.org/x/net/websocket\"\
  \n\t\"io\"\n\t\"log\"\n\t\"os\"\n)\nfunc main() {\n\tif len(os.Args) != 2 {\n\t\t\
  log.Fatalln(\"Usage: \", os.Args[0], \"wss://host:port\")\n\t}\n\tconfig, err :=\
  \ websocket.NewConfig(os.Args[1],\n\t\t\"http://localhost\")\n\tcheckError(err)\n\
  \ttlsConfig := &tls.Config{InsecureSkipVerify: true}\n\tconfig.TlsConfig = tlsConfig\n\
  \tconn, err := websocket.DialConfig(config)\n\tcheckError(err)\n\tvar msg string\n\
  \tfor {\n\t\terr := websocket.Message.Receive(conn, &msg)\n\t\tif err != nil {\n\
  \t\t\tif err == io.EOF {\n\t\t\t\t// 服务器优雅关闭\n\t\t\t\tbreak\n\t\t\t}\n\t\t\tfmt.Println(\"\
  Couldn't receive msg \" +\n\t\t\t\terr.Error())\n\t\t\tbreak\n\t\t}\n\t\tfmt.Println(\"\
  Received from server: \" + msg)\n\t\t// 返回消息\n\t\terr = websocket.Message.Send(conn,\
  \ msg)\n\t\tif err != nil {\n\t\t\tfmt.Println(\"Couldn't return msg\")\n\t\t\t\
  break\n\t\t}\n\t}\n}\nfunc checkError(err error) {\n\tif err != nil {\n\t\tlog.Fatalln(\"\
  Fatal error \", err.Error())\n\t}\n}\n```\n\n运行客户端如下（假设 `echoservertls.go` 正在运行）：\n\
  \n```\nch15$ go run echoclienttls.go wss://localhost:12345\nReceived from server:\
  \ Hello  0\n...\nReceived from server: Hello  9\n```\n\n回到服务器端，我们看到以下输出：\n\n```\n\
  Echoing\nSending to client: Hello  0\nReceived back from client: Hello  0\n...\n\
  Sending to client: Hello  9\nReceived back from client: Hello  9\n```\n\n\n\n###\
  \ HTML 页面中的 WebSocket\n\nWebSocket 最初的驱动力是允许浏览器等 HTTP 用户代理与服务器之间进行全双工交互。典型用例通常是浏览器中的\
  \ JavaScript 程序与服务器进行交互。在本节中，我们将构建一个 Web/WebSocket 服务器，该服务器将提供一个 HTML 页面，该页面会建立一个\
  \ WebSocket，并使用 WebSocket 显示来自该服务器的信息。我们正在研究如图 15-1 所示的场景。\n\n![](img/436770_2_En_15_Fig1_HTML.png)\n\
  \n图 15-1\n\n全双工交互场景\n\n物联网（IoT）时代已经来临。因此，我们可以预期来自传感器和传感器网络的数据将用于驱动执行器，并在浏览器中显示关于物联网网络的信息。有无数关于使用树莓派和\
  \ Arduino 构建传感器网络的书籍，但我们将通过在一个“传感器”上显示 CPU 温度，并在网页中每隔几秒更新一次，来大幅简化此场景。\n\n来自 Debian\
  \ 软件包 `lm-sensors` 的 Linux `sensors` 命令会将其所知的传感器值写入标准输出。在我的台式机上，`sensors` 命令的输出如下所示：\n\
  \n```\nacpitz-virtual-0\nAdapter: Virtual device\ntemp1:        +27.8°C  (crit =\
  \ +105.0°C)\ntemp2:        +29.8°C  (crit = +105.0°C)\ncoretemp-isa-0000\nAdapter:\
  \ ISA adapter\nPhysical id 0:  +58.0°C  (high = +105.0°C, crit = +105.0°C)\nCore\
  \ 0:         +57.0°C  (high = +105.0°C, crit = +105.0°C)\nCore 1:         +58.0°C\
  \  (high = +105.0°C, crit = +105.0°C)\n```\n\n刷新时，`Core 0` 和 `Core 1` 的温度通常可能会发生变化。\n\
  \n在 Windows 上，执行相同操作的命令如下：\n\n```\nwmic /namespace:\\\\root\\wmi PATH MSAcpi_ThermalZoneTemperature\
  \ get CurrentTemperature\n```\n\n运行时，其输出类似：\n\n```\n42.4° C\n```\n\n在 Mac 上，使用来自\
  \ [`https://github.com/lavoiesl/osx-cpu-temp`](https://github.com/lavoiesl/osx-cpu-temp)\
  \ 的命令 `osx-cpu-temp`。如果你不想经历这些步骤，只需替换为一个更简单的程序，例如 `date`。\n\n我们提供了一个 Go 程序，用于从 `ROOT_DIR`\
  \ 目录提供 HTML 文档，然后从 URL `GetTemp` 建立一个 WebSocket。服务器端的 WebSocket 每两秒获取 `sensors`\
  \ 的输出，并将其发送到套接字的客户端。出于某种原因，这个 Web/WebSocket 服务器运行在端口 `12345` 上。将 `exec.Command`\
  \ 调用替换为任何其他有趣的系统调用。这里，我们使用简单的 `sensors.sh` 作为我们的温度程序（1 到 100 之间的随机数）。\n\n```\nch15$\
  \ vi sensors.sh\n#!/bin/sh\necho $(( ( RANDOM % 100 )  + 1 ))\n```\n\n确保使其可执行：`chmod\
  \ 700 sensors.sh`。\n\n服务器是 `temperatureserver.go`：\n\n```\nch15$ vi temperatureserver.go\n\
  /* TemperatureServer\n*/\npackage main\nimport (\n\"fmt\"\n\"golang.org/x/net/websocket\"\
  \n\"log\"\n\"net/http\"\n\"os/exec\"\n\"time\"\n)\nvar ROOT_DIR = \".\"\nfunc GetTemp(ws\
  \ *websocket.Conn) {\nfor {\nmsg, err := exec.Command(ROOT_DIR + \"/sensors.sh\"\
  ).CombinedOutput()\ncheckError(err)\nfmt.Println(\"Sending to client: \" + string(msg[:]))\n\
  err = websocket.Message.Send(ws, string(msg[:]))\nif err != nil {\nfmt.Println(\"\
  Can't send\")\nbreak\n}\ntime.Sleep(time.Duration(2) * time.Second)\nvar reply string\n\
  err = websocket.Message.Receive(ws, &reply)\nif err != nil {\nfmt.Println(\"Can't\
  \ receive\")\nbreak\n}\nfmt.Println(\"Received back from client: \" + reply)\n}\n\
  }\nfunc main() {\nfileServer := http.FileServer(http.Dir(ROOT_DIR))\nhttp.Handle(\"\
  /GetTemp\", websocket.Handler(GetTemp))\nhttp.Handle(\"/\", fileServer)\nerr :=\
  \ http.ListenAndServe(\":12345\", nil)\ncheckError(err)\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n按如下方式运行：\n\n```\nch15$ go run temperatureserver.go\n```\n\n用于启动此功能的顶级 HTML\
  \ 文件是 `websocket.html`；请确保将此文件复制到 `ROOT_DIR`。\n\n```\n\nfunction WebSocketTest()\n\
  {\nif (\"WebSocket\" in window)\n{\nalert(\"WebSocket is supported by your Browser!\"\
  );\n// Let us open a web socket\nvar ws = new WebSocket(\"ws://localhost:12345/GetTemp\"\
  );\nws.onopen = function()\n{\nalert(\"WS is opened...\");\n};\nws.onmessage = function\
  \ (evt)\n{\nvar received_msg = evt.data;\n// uncomment next line if you want to\
  \ get alerts on each message\n//alert(\"Message is received...\" + received_msg);\n\
  document.getElementById(\"temp\").innerHTML = \"\" + received_msg + \"\"\nws.send(\"\
  Message received\")\n};\nws.onclose = function()\n{\n// websocket is closed.\nalert(\"\
  Connection is closed...\");\n};\n}\nelse\n{\n// The browser doesn't support WebSocket\n\
  alert(\"WebSocket NOT supported by your Browser!\");\n}\n}\n\nRun temperature sensor\n\
  \n```\n\n在浏览器中访问 `http://localhost:12345/websocket.html`；点击“Run temperature sensor”以查看温度中继。\n\
  \n该程序使用 JavaScript 打开一个 WebSocket 连接，并处理 `onopen`、`onmessage` 和 `onclose` 事件。它使用\
  \ `evt.data` 和 `send` 函数进行读写。它在一个预格式化元素中呈现数据，数据格式与之前完全相同。每两秒刷新一次。HTML 文档的结构基于 HTML5\
  \ - WebSocket：[`https://www.tutorialspoint.com/html5/html5_websocket.htm`](https://www.tutorialspoint.com/html5/html5_websocket.htm)。\n\
  \n## `github.com/gorilla/websocket` 包\n\n用于 WebSocket 功能的替代包是 `github.com/gorilla/websocket`\
  \ 包。\n\n### 回声服务器\n\n使用此包的回声服务器是 `echoservergorilla.go`。它通过引入对 `websocket.Upgrader`\
  \ 对象的调用，使 HTTP 到 WebSocket 的转换更加明确。它还更清楚地区分发送文本消息和二进制消息。\n\n```\nch15$ vi echoservergorilla.go\n\
  /* EchoServerGorilla\n*/\npackage main\nimport (\n\"fmt\"\n\"github.com/gorilla/websocket\"\
  \n\"log\"\n\"net/http\"\n)\nvar upgrader = websocket.Upgrader{\nReadBufferSize:\
  \  1024,\nWriteBufferSize: 1024,\n}\nfunc Handler(w http.ResponseWriter, r *http.Request)\
  \ {\nfmt.Println(\"Handling /\")\nconn, err := upgrader.Upgrade(w, r, nil)\nif err\
  \ != nil {\nfmt.Println(err)\nreturn\n}\nfor n := 0; n < 10; n++ {\nmsg := \"Hello\
  \  \" + string(n+48)\nfmt.Println(\"Sending to client: \" + msg)\nerr = conn.WriteMessage(websocket.TextMessage,\n\
  []byte(msg))\n_, reply, err := conn.ReadMessage()\nif err != nil {\nfmt.Println(\"\
  Can't receive\")\nbreak\n}\nfmt.Println(\"Received back from client: \" +\nstring(reply[:]))\n\
  }\nconn.Close()\n}\nfunc main() {\nhttp.HandleFunc(\"/\", Handler)\nerr := http.ListenAndServe(\"\
  localhost:12345\", nil)\ncheckError(err)\n}\nfunc checkError(err error) {\nif err\
  \ != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n按如下方式运行服务器：\n\
  \n```\nch15$ go mod init example.com/user/echoservergorilla # or skip and use existing\
  \ module name\nch15$ go mod tidy\nch15$ go run echoservergorilla.go\n```\n\n\n\n\
  ### Echo 客户端\n\n使用此包的 Echo 客户端是 `echoclientgorilla.go`：\n\n```go\n/* EchoClientGorilla\n\
  */\npackage main\n\nimport (\n    \"fmt\"\n    \"github.com/gorilla/websocket\"\n\
  \    \"io\"\n    \"log\"\n    \"net/http\"\n    \"os\"\n)\n\nfunc main() {\n   \
  \ if len(os.Args) != 2 {\n        log.Fatalln(\"Usage: \", os.Args[0], \"ws://host:port\"\
  )\n    }\n    service := os.Args[1]\n    header := make(http.Header)\n    header.Add(\"\
  Origin\", \"http://localhost:12345\")\n    conn, _, err := websocket.DefaultDialer.Dial(service,\
  \ header)\n    checkError(err)\n    for {\n        _, reply, err := conn.ReadMessage()\n\
  \        if err != nil {\n            if err == io.EOF {\n                // graceful\
  \ shutdown by server\n                fmt.Println(`EOF from server`)\n         \
  \       break\n            }\n            if websocket.IsCloseError(err, websocket.CloseAbnormalClosure)\
  \ {\n                fmt.Println(`Close from server`)\n                break\n \
  \           }\n            fmt.Println(\"Couldn't receive msg \" + err.Error())\n\
  \            break\n        }\n        fmt.Println(\"Received from server: \" +\
  \ string(reply[:]))\n        // return the msg\n        err = conn.WriteMessage(websocket.TextMessage,\
  \ reply)\n        if err != nil {\n            fmt.Println(\"Couldn't return msg\"\
  )\n            break\n        }\n    }\n}\n\nfunc checkError(err error) {\n    if\
  \ err != nil {\n        log.Fatalln(\"Fatal error \", err.Error())\n    }\n}\n```\n\
  \n客户端运行方式如下：\n\n```bash\nch15$ go run echoclientgorilla.go ws://localhost:12345\n\
  Received from server: Hello  0\n...\nReceived from server: Hello  9\nClose from\
  \ server\n```\n\n回到服务器端，我们可以看到：\n\n```\nHandling /\nSending to client: Hello  0\n\
  Received back from client: Hello  0\nSending to client: Hello  1\n...\nSending to\
  \ client: Hello  9\nReceived back from client: Hello  9\n```\n\n## 结论\n\nWebSocket\
  \ 标准是 IETF 的 RFC，因此预计不会有重大变化。这将允许 HTTP 用户代理和服务器建立双向套接字连接，并应使某些交互风格变得更加简单。Go 支持这些以及额外的\
  \ WebSocket 包，例如 [`https://pkg.go.dev/nhooyr.io/websocket`](https://pkg.go.dev/nhooyr.io/websocket)。\n\
  \n# 16. Gorilla\n\nGo 标准库以及相关的“x”包提供了大量功能，我们可以利用这些功能来构建网站。Go 倾向于尽可能采用更简单的编码风格；但简单并不总意味着容易。除非你在领域（Web\
  \ 开发）和实现栈（Go/Web）方面拥有足够的经验，否则使用一个提供额外易用性功能的工具包可能更容易和/或更好。Gorilla 就是这样一个工具包。我们已经通过\
  \ WebSocket 接触过 Gorilla；现在我们将更集中地审视其主要功能，并最终了解它相对于纯 Go 实现为我们带来了什么。\n\n根据 Gorilla\
  \ 网站 ([`https://www.gorillatoolkit.org/`](https://www.gorillatoolkit.org/)) 的描述，以下是当前包含的包。我们将学习如何使用其中一些包，并探索它们如何集成和扩展标准库。\n\
  \n*   `mux`：一个功能强大的 URL 路由器和调度器，与默认的 `http.ServeMux` 完全兼容\n*   `reverse`：为基于正则表达式的多路复用器生成可逆的正则表达式\n\
  *   `rpc`：通过 HTTP 实现 RPC，并使用编解码器支持 JSON-RPC\n*   `schema`：将表单值转换为结构体\n*   `securecookie`：对经过身份验证且可选择加密的\
  \ cookie 值进行编码和解码\n*   `sessions`：保存 cookie 和文件系统会话，并允许自定义会话后端\n*   `websocket`：实现\
  \ RFC 6455 中定义的 WebSocket 协议\n*   `csrf`：提供跨站请求伪造 (CSRF) 预防中间件\n*   `handlers`：为\
  \ Go 的 `net/http` 包收集的有用处理器集合\n\n你可能会注意到，由于其精心设计的架构，这是一个顶级的工具选择。接下来，我们将讨论中间件模式，这将指导我们如何集成\
  \ Gorilla。\n\n## 中间件模式\n\n根据 [`https://en.wikipedia.org/wiki/Middleware`](https://en.wikipedia.org/wiki/Middleware)\
  \ 的定义，中间件被描述为“软件胶水”。Web 服务的中间件允许我们将功能包装在我们的应用特定代码周围。这些包装器又可以形成链式结构。我们这样做是为了添加诸如日志记录和/或身份验证等功能，而不是污染我们的业务逻辑。例如，在我们的客户端处理逻辑中不需要“记录”HTTP\
  \ 请求；它可以（并且应该）在它外部（在另一个包装器中）完成。\n\n基本的中间件模式如下所示：\n\n```\n路由器 -> 中间件 -> 应用程序\n```\n\
  \n我们从一个简单的例子开始，并回顾 Go 的一些内置 Web 功能。这将帮助我们理解 Gorilla 如何与我们的代码（以及 Go 标准库）集成，以及它提供了哪些超越标准库的功能。\n\
  \nGo 通过 `net/http` 包提供了 HTTP 客户端和服务器的实现。该包提供了一个 `type Server`，它与底层连接对象协同工作，并反序列化\
  \ HTTP 请求或序列化 HTTP 响应。然后，该请求被交给一个 `type ServeMux`。`ServeMux` 反过来为我们执行路由（即多路复用）。提供了一个名为\
  \ `DefaultServeMux` 的默认 `ServeMux`。还提供了一个名为 `net.Handler` 的接口，该处理程序提供了处理 HTTP 请求时使用的方法。如前所述，我们可以拥有多个处理程序，并将这些处理程序链接在一起。事实证明，`ServeMux`\
  \ 也是一个 `Handler`，这意味着我们也可以将它们链接起来。\n\n现在我们可以更深入地想象 Go 本身是如何使用中间件模式的。\n\n```\n连接\
  \  服务器  ServeMux  处理程序  应用程序函数\n```\n\n让我们回顾一下从 `Handler` 向后的主要文档。\n\n```bash\n\
  $ go doc http.Handler\npackage http // import \"net/http\"\n\ntype Handler interface\
  \ {\n    ServeHTTP(ResponseWriter, *Request)\n}\n\nHandler 响应 HTTP 请求。\n\nServeHTTP\
  \ 应将回复标头和数据写入 ResponseWriter，然后返回。\n返回表示请求已完成；在 ServeHTTP 调用完成后或与其同时，\n使用 ResponseWriter\
  \ 或从 Request.Body 读取是无效的。\n\n根据 HTTP 客户端软件、HTTP 协议版本以及客户端与 Go 服务器之间的任何中介，\n在写入 ResponseWriter\
  \ 之后可能无法从 Request.Body 读取。\n谨慎的处理程序应先读取 Request.Body，然后再进行回复。\n\n除了读取 body 之外，处理程序不应修改提供的\
  \ Request。\n\n如果 ServeHTTP 发生 panic，服务器（ServeHTTP 的调用者）会假定 panic 的影响\n仅限于活动请求。它会恢复\
  \ panic，将堆栈跟踪记录到服务器错误日志，\n然后根据 HTTP 协议，要么关闭网络连接，要么发送 HTTP/2 RST_STREAM。\n要中止处理程序以使客户端看到中断的响应但服务器不记录错误，\n\
  请使用值 ErrAbortHandler 进行 panic。\n\nfunc AllowQuerySemicolons(h Handler) Handler\n\
  func FileServer(root FileSystem) Handler\nfunc MaxBytesHandler(h Handler, n int64)\
  \ Handler\nfunc NotFoundHandler() Handler\nfunc RedirectHandler(url string, code\
  \ int) Handler\nfunc StripPrefix(prefix string, h Handler) Handler\nfunc TimeoutHandler(h\
  \ Handler, dt time.Duration, msg string) Handler\n```\n\n目前，关键部分围绕 `Handler.ServeHTTP`。这是请求传入并最终得到响应的地方。接下来，查看\
  \ `ServeMux` 的详细信息以及与 `Handler` 的关系。\n\n\n\n```go\n$ go doc net/http ServeMux\n\
  package http // import \"net/http\"\ntype ServeMux struct {\n// 包含未导出的字段\n}\n\n\
  ServeMux 是一个 HTTP 请求多路复用器。它会将每个传入请求的 URL 与已注册的模式列表进行匹配，并调用与 URL 最匹配的模式对应的处理程序。\n\
  \n模式指定固定的、以根路径开头的路径，例如 \"/favicon.ico\"，或以根路径开头的子树，例如 \"/images/\"（注意尾部斜杠）。较长的模式优先于较短的模式，因此，如果同时为\
  \ \"/images/\" 和 \"/images/thumbnails/\" 注册了处理程序，那么对于以 \"/images/thumbnails/\" 开头的路径将调用后者，而前者将接收\
  \ \"/images/\" 子树中其他任何路径的请求。\n\n请注意，由于以斜杠结尾的模式表示一个根子树，因此模式 \"/\" 会匹配所有未被其他已注册模式匹配的路径，而不仅仅是\
  \ Path == \"/\" 的 URL。\n\n如果已注册了一个子树，并且接收到的请求指定了该子树的根路径但没有尾部斜杠，ServeMux 会将该请求重定向到子树根路径（添加尾部斜杠）。可以通过为没有尾部斜杠的路径单独注册来覆盖此行为。例如，注册\
  \ \"/images/\" 会导致 ServeMux 将 \"/images\" 的请求重定向到 \"/images/\"，除非 \"/images\" 已被单独注册。\n\
  \n模式可以可选地以主机名开头，从而将匹配限制为仅匹配该主机上的 URL。特定于主机的模式优先于通用模式，因此处理程序可以为两个模式 \"/codesearch\"\
  \ 和 \"codesearch.google.com/\" 注册，而不会同时接管对 \"http://www.google.com/\" 的请求。\n\nServeMux\
  \ 还负责清理 URL 请求路径和 Host 头，去除端口号，并将任何包含 \".\" 或 \"..\" 元素或重复斜杠的请求重定向到一个等效且更简洁的 URL。\n\
  \nfunc NewServeMux() *ServeMux\nfunc (mux *ServeMux) Handle(pattern string, handler\
  \ Handler)\nfunc (mux *ServeMux) HandleFunc(pattern string, handler func(ResponseWriter,\
  \ *Request))\nfunc (mux *ServeMux) Handler(r *Request) (h Handler, pattern string)\n\
  func (mux *ServeMux) ServeHTTP(w ResponseWriter, r *Request)\n```\n\n如你所见，`ServeMux`\
  \ 匹配给定的模式并将其传递给配置的 `Handler`，然后该处理程序再调用我们的业务逻辑。继续向左看，我们来查阅简略的 `Server` 文档。\n\n```\n\
  $ go doc net/http.Server\npackage http // import \"net/http\"\ntype Server struct\
  \ {\n// Addr 可选择指定服务器监听的 TCP 地址，格式为 \"host:port\"。\n// 如果为空，则使用 \":http\"（端口 80）。\n\
  // 服务名称在 RFC 6335 中定义，并由 IANA 分配。\n// 有关地址格式的详细信息，请参阅 net.Dial。\nAddr string\nHandler\
  \ Handler // 要调用的处理程序，如果为 nil，则使用 http.DefaultServeMux\n...\n```\n\n虽然有所截断，但我们可以在一开始就看到，一个\
  \ `Server` 持有一个 `Handler`，并且根据注释，似乎我们有一个名为 `DefaultServeMux` 的 `ServeMux` 实例。\n\n\
  了解了连接关系后，我们现在来看一些例子。\n\n## 标准库 ServeMux 示例\n\n在这里，我们演示了 Go 可能提供的最简单的 Web 服务（至少在\
  \ `net/http` 包中），以及一个更清晰地展示中间件模式的示例。\n\n```\n$ mkdir ch16\n$ ch16\nch16$ vi simple.go\n\
  package main\nimport (\n\"net/http\"\n\"fmt\"\n)\nfunc main() {\nerr := http.ListenAndServe(\"\
  :8080\",nil)\nfmt.Println(err)\n}\n```\n\n运行服务器 `go run simple.go`，通过任何方法/路径访问 `localhost:8080`\
  \ 都会返回 404。\n\n```\nch16$ curl -v --head localhost:8080\n*   Trying ::1:8080...\n\
  * Connected to localhost (::1) port 8080 (#0)\n> HEAD / HTTP/1.1\n> Host: localhost:8080\n\
  > User-Agent: curl/7.77.0\n> Accept: */*\n>\n* Mark bundle as not supporting multiuse\n\
  < HTTP/1.1 404 Not Found\nHTTP/1.1 404 Not Found\n< Content-Type: text/plain; charset=utf-8\n\
  Content-Type: text/plain; charset=utf-8\n< X-Content-Type-Options: nosniff\nX-Content-Type-Options:\
  \ nosniff\n< Date: Mon, 31 Jan 2022 00:43:57 GMT\nDate: Mon, 31 Jan 2022 00:43:57\
  \ GMT\n< Content-Length: 19\nContent-Length: 19\n<\n* Connection #0 to host localhost\
  \ left intact\n```\n\n这表明存在一个默认处理程序，返回 404。接下来，我们尝试一个 GET 请求。\n\n```\nch16$ curl\
  \ -X GET localhost:8080/didthiswork\n404 page not found\n```\n\n事实证明，在底层，我们已经有一个处理程序链。`Server`\
  \ 正在调用 `ServeMux.ServeHTTP`，而后者又会调用 `NotFoundHandler`。`ServeMux` 通过 `ServeHTTP`\
  \ 方法支持 `Handler` 接口。作为敏锐的观察者，你可能已经注意到，在前面的 `Handler` 文档中，列出了 `NotFoundHandler`。\n\
  \n```\nch16$ go doc net/http NotFoundHandler\npackage http // import \"net/http\"\
  \nfunc NotFoundHandler() Handler\nNotFoundHandler 返回一个简单的请求处理程序，该程序对每个请求都会回复“404\
  \ page not found”的响应。\n```\n\n如果你喜欢冒险，可以查看代码，开始了解它们是如何连接起来的。\n\n```\nch16$ vi /usr/local/go/src/net/http/server.go\n\
  ...\n// NotFound 回复一个 HTTP 404 not found 错误给请求。\nfunc NotFound(w ResponseWriter,\
  \ r *Request) { Error(w, \"404 page not found\", StatusNotFound) }\n// NotFoundHandler\
  \ 返回一个简单的请求处理程序\n// 该程序对每个请求都会回复“404 page not found”的响应。\nfunc NotFoundHandler()\
  \ Handler { return HandlerFunc(NotFound) }\n...\n```\n\n如你所见，`NotFound` 函数被转换为 `HandlerFunc`（在我们的示例中，它将\
  \ `ServeHTTP` 调用代理给 `NotFound`）。`HandlerFunc` 在 Go 中被称为函数适配器。\n\n## 自定义多路复用器\n\n\
  我们最后一个专注于标准库的例子将展示如何管理多个 `ServeMux` 实例。此示例的目标是展示“注册”一个新的 `ServeMux` 如何处理路由的一个子集。在这里，“默认的”（`DefaultServeMux`）处理路由\
  \ `/outermux`，而我们新的“内部”`ServeMux` 将处理更深层嵌套的路由（例如，`/outermux/innermux`）。\n\n```\n\
  ch16$ vi complex.go\npackage main\nimport (\n\"net/http\"\n)\nfunc main() {\nhttp.Handle(\"\
  /outermux\", http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\nw.Write([]byte(\"\
  /outermux\"))\n}))\ninner := http.NewServeMux()\ninner.Handle(\"/innermux/\", http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\nw.Write([]byte(\"../innermux\"))\n}))\n\
  http.Handle(\"/outermux/innermux/\", http.StripPrefix(\"/outermux\", inner))\nhttp.ListenAndServe(\"\
  :8080\", nil)\n}\n```\n\n在我们接下来执行测试时，请注意请求的路径和生成的日志。根据前面 `ServeMux` 的文档，要特别注意如何结束路径，是否带有尾部斜杠\
  \ `/`。\n\n```\nch16$ curl localhost:8080/outermux\n/outermux\nch16$ curl localhost:8080/outermux/\n\
  404 page not found\nch16$ curl localhost:8080/outermux/innermux\nMoved Permanently.\n\
  ch16$ curl -iL localhost:8080/outermux/innermux\nHTTP/1.1 301 Moved Permanently\n\
  Content-Type: text/html; charset=utf-8\nLocation: /outermux/innermux/\nDate: Mon,\
  \ 31 Jan 2022 01:16:24 GMT\nContent-Length: 54\nHTTP/1.1 200 OK\nDate: Mon, 31 Jan\
  \ 2022 01:16:24 GMT\nContent-Length: 11\nContent-Type: text/plain; charset=utf-8\n\
  ../innermux\nch16$ curl -iL localhost:8080/outermux/innermux/\nHTTP/1.1 200 OK\n\
  Date: Mon, 31 Jan 2022 01:16:28 GMT\nContent-Length: 11\nContent-Type: text/plain;\
  \ charset=utf-8\n../innermux\n```\n\n你可能想知道最后一行是做什么的 (`http.ListenAndServe(\":8080\"\
  , nil)`)。\n\n具体来说，`nil` 是做什么的？这就是我们可以覆盖默认 `ServeMux` 的地方。当你传入 `nil` 时，“第一个”多路复用器仍然是\
  \ `Serve` 类型使用的预创建实例 `DefaultServeMux`。你可以通过查看 `GOROOT/src/net/http/server.go` 中的代码来确认这些关系。\n\
  \n\n\n## `gorilla/mux`\n\n我们通过学习 `mux` 包来开始了解 Gorilla。`mux` 包旨在与标准库中现有的 `Serve`\
  \ 类型协同工作。\n\n```\nch16$ vi gmux.go\npackage main\nimport (\n\"net/http\"\n\"github.com/gorilla/mux\"\
  \n)\nfunc buildHandler(message string) func(http.ResponseWriter, *http.Request)\
  \ {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\nw.Write([]byte(message))\n\
  })\n}\nfunc main() {\nr := mux.NewRouter()\nr.HandleFunc(\"/\", buildHandler(\"\
  HomeHandler\"))\nr.HandleFunc(\"/products\", buildHandler(\"ProductsHandler\"))\n\
  r.HandleFunc(\"/articles\", buildHandler(\"ArticlesHandler\"))\nhttp.ListenAndServe(\"\
  :8080\", r)\n}\n```\n\n根据我们已知的知识，通过覆盖 `ListenAndServe` 的最后一个参数，我们实际上是用自己的路由器（在 mux\
  \ 的语境中称为 `Router`）覆盖了默认的 `ServeMux`。\n\n```\nch16$ go mod init ch16.example.com\n\
  ch16$ go mod tidy\nch16$ go run gmux.go\n```\n\n接下来的测试有望证明一切并未发生太大变化。\n\n```\nch16$\
  \ curl localhost:8080/articles\nArticlesHandler\nch16$ curl localhost:8080/\nHomeHandler\n\
  ```\n\n如果我们审视 `Router` 的代码，特别是其 `ServerHTTP` 方法，我们就能确认路由映射现在由 Gorilla 的 `mux` 负责处理。\n\
  \n```\n~/ch16$ go doc --src mux Router.ServeHTTP\npackage mux // import \"github.com/gorilla/mux\"\
  \n// ServeHTTP 分发在匹配路由中注册的处理器。\n//\n// 当匹配成功时，可以通过调用 mux.Vars(request) 来获取路由变量。\n\
  func (r *Router) ServeHTTP(w http.ResponseWriter, req *http.Request) {\nif !r.skipClean\
  \ {\npath := req.URL.Path\nif r.useEncodedPath {\npath = req.URL.EscapedPath()\n\
  }\n// 清理路径为标准形式并进行重定向。\nif p := cleanPath(path); p != path {\n// 增加了 3 行代码 (Philip\
  \ Schlump) - 修复了丢失查询字符串和 #whatever 的问题。\n// 这与 Go 1.2 r.c.4 中针对相同问题的修复一致。Go Issue:\n\
  // http://code.google.com/p/go/issues/detail?id=5252\nurl := *req.URL\nurl.Path\
  \ = p\np = url.String()\nw.Header().Set(\"Location\", p)\nw.WriteHeader(http.StatusMovedPermanently)\n\
  return\n}\n}\nvar match RouteMatch\nvar handler http.Handler\nif r.Match(req, &match)\
  \ {\nhandler = match.Handler\nreq = requestWithVars(req, match.Vars)\nreq = requestWithRoute(req,\
  \ match.Route)\n}\nif handler == nil && match.MatchErr == ErrMethodMismatch {\n\
  handler = methodNotAllowedHandler()\n}\nif handler == nil {\nhandler = http.NotFoundHandler()\n\
  }\nhandler.ServeHTTP(w, req)\n}\n```\n\n## 为什么要关注\n\n到目前为止，我们似乎并没有为已经提供的 `DefaultServeMux`\
  \ 增添任何价值。然而，表象是会骗人的。根据 `ServeMux` 的文档，我们似乎只能轻松解析“路径”来做出路由决策。我们能否基于其他条件（除了路径）来匹配请求，比如查询参数或\
  \ HTTP 头部信息？没有 Gorilla 我们也能够访问这些内容；但我们缺少一种结构化的使用方式。\n\n请求可以根据以下条件进行匹配：\n\n- URL\
  \ 主机名 (`example.com`)\n- 路径 (`/about`)\n- 路径前缀 (`/animals/cats`)\n- 模式（已提交表单值）\n\
  - HTTP 头部信息 (`Content-Type: text/html; charset=UTF-8`)\n- 查询参数 (`?key=value&dog=cat`)\n\
  - HTTP 方法 (`GET /search?q=test HTTP/2`)\n- 自定义匹配器（自定义函数）\n\nGorilla 的一个优秀特性是能够使用链式调用来关联多个匹配元素。下面是一个示例，通过使用各种匹配器来修改我们之前的例子。\n\
  \n```\n~/ch16$ vi gmux.go\npackage main\nimport (\n\"github.com/gorilla/mux\"\n\"\
  net/http\"\n)\nfunc buildHandler(message string) func(http.ResponseWriter, *http.Request)\
  \ {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\nw.Write([]byte(message))\n\
  })\n}\nfunc main() {\nr := mux.NewRouter()\nr.HandleFunc(\"/\", buildHandler(\"\
  HomeHandler\"))\nr.HandleFunc(\"/products\", buildHandler(\"ProductsHandler\"))\n\
  r.HandleFunc(\"/articles\", buildHandler(\"ArticlesHandler\")).Host(\"example.com\"\
  ).Methods(\"GET\").Schemes(\"http\")\nhttp.ListenAndServe(\":8080\", r)\n}\n```\n\
  \n运行服务器。\n\n```\n~/ch16$ go run gmux.go\n```\n\n现在我们来测试我们新增和已有的路由；注意 `/articles`\
  \ 现在受到特定域名、方法和模式的限制。\n\n```\n~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX\
  \ GET http://example.com:8080/articles\nHTTP/1.1 200 OK\nDate: Mon, 07 Mar 2022\
  \ 18:40:46 GMT\nContent-Length: 15\nContent-Type: text/plain; charset=utf-8\n~/ch16$\
  \ curl --resolve example.com:8080:127.0.0.1 -IX POST http://example.com:8080/articles\n\
  HTTP/1.1 405 Method Not Allowed\nDate: Mon, 07 Mar 2022 18:40:54 GMT\nContent-Length:\
  \ 0\n~/ch16$ curl 127.0.0.1:8080/articles\n404 page not found\n~/ch16$\n```\n\n\
  以下是官方文档中的一些示例：\n\n- `r.PathPrefix(\"/products/\")`\n- `r.Methods(\"GET\", \"POST\"\
  )`\n- `r.Schemes(\"https\")`\n- `r.Headers(\"X-Requested-With\", \"XMLHttpRequest\"\
  )`\n- `r.Queries(\"key\", \"value\")`\n- `r.MatcherFunc(func(r *http.Request, rm\
  \ *RouteMatch) bool { return r.ProtoMajor == 0 })`\n\n再次强调，使用标准库也能实现所有这些功能（很多开发者认为你应该这么做），但手头有一个现成的工具包会让选择变得更容易。Gorilla\
  \ `mux` 的功能远不止于此。我们的目标是突出它与标准库的关系以及它是如何进行扩展（提供额外功能）的。你可以在这里了解更多：[`https://github.com/gorilla/mux`](https://github.com/gorilla/mux)。\n\
  \n\n\n## Gorilla 处理器\n\nGorilla 在 `\"handlers\"` 包中提供了一组处理器。秉承简洁易用的主题，其中包含以下处理器供我们在中间件链中使用。\n\
  \n以下是官方说明：\n\n* `LoggingHandler`：用于以 Apache 通用日志格式记录 HTTP 请求\n* `CombinedLoggingHandler`：用于以\
  \ Apache 和 Nginx 常用的 Apache 组合日志格式记录 HTTP 请求\n* `CompressHandler`：用于对响应进行 gzip 压缩\n\
  * `ContentTypeHandler`：用于根据一系列可接受的内容类型验证请求\n* `MethodHandler`：用于将 HTTP 方法与 `map[string]http.Handler`\
  \ 中的处理器进行匹配\n* `ProxyHeaders`：用于在 Go 服务器运行于 HTTP 反向代理之后时，基于 `X-Forwarded-For`、`X-Real-IP`、`X-Forwarded-Proto`\
  \ 和 RFC7239 `Forwarded` 头部填充 `r.RemoteAddr` 和 `r.URL.Scheme`\n* `CanonicalHost`：用于在处理多个域名（即多个\
  \ CNAME 别名）时重定向到首选主机\n* `RecoveryHandler`：用于从意外的 panic 中恢复\n\n让我们从 `LoggingHandlers`\
  \ 开始，看其中几个例子。\n\n```\n~/ch16$ go get github.com/gorilla/handlers\n~/ch16$ go doc\
  \ handlers.LoggingHandler\npackage handlers // import \"github.com/gorilla/handlers\"\
  \nfunc LoggingHandler(out io.Writer, h http.Handler) http.Handler\nLoggingHandler\
  \ return a http.Handler that wraps h and logs requests to out\nin Apache Common\
  \ Log Format (CLF).\nSee http://httpd.apache.org/docs/2.2/logs.html#common for a\
  \ description of\nthis format.\nLoggingHandler always sets the ident field of the\
  \ log to -\nExample:\nr := mux.NewRouter()\nr.HandleFunc(\"/\", func(w http.ResponseWriter,\
  \ r *http.Request) {\nw.Write([]byte(\"This is a catch-all route\"))\n})\nloggedRouter\
  \ := handlers.LoggingHandler(os.Stdout, r)\nhttp.ListenAndServe(\":1123\", loggedRouter)\n\
  ```\n\n我们将复制原始示例并添加此中间件。\n\n```\n~/ch16$ cat logging.go\npackage main\nimport (\n\
  \"github.com/gorilla/mux\"\n\"github.com/gorilla/handlers\"\n\"os\"\n\"net/http\"\
  \n)\nfunc buildHandler(message string) func(http.ResponseWriter, *http.Request)\
  \ {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\nw.Write([]byte(message))\n\
  })\n}\nfunc main() {\nr := mux.NewRouter()\nr.HandleFunc(\"/\", buildHandler(\"\
  HomeHandler\"))\nr.HandleFunc(\"/products\", buildHandler(\"ProductsHandler\"))\n\
  r.HandleFunc(\"/articles\", buildHandler(\"ArticlesHandler\")).Host(\"example.com\"\
  ).Methods(\"GET\").Schemes(\"http\")\nloggedRouter := handlers.LoggingHandler(os.Stdout,\
  \ r)\nhttp.ListenAndServe(\":8080\", loggedRouter)\n}\n```\n\n注意上述代码中的链式调用。我们没有将路由器对象直接传递给\
  \ `ListenAndServe`，而是将其传递给 `LoggingHandler`，后者将其链接起来。然后我们将其结果（一个满足 `ServeMux` 接口的对象）传递给\
  \ `ListenAndServe`。\n\n如果你运行服务器并从另一个终端访问，你将看到记录的请求和响应信息。\n\n```\n~/ch16$ go run\
  \ logging.go\n~/ch16$ curl --resolve example.com:8080:127.0.0.1 -IX GET http://example.com:8080/articles\n\
  HTTP/1.1 200 OK\nDate: Sun, 03 Apr 2022 04:38:07 GMT\nContent-Length: 15\nContent-Type:\
  \ text/plain; charset=utf-8\n```\n\n在服务器端，我们看到：\n\n```\n127.0.0.1 - - [07/Mar/2022:19:04:20\
  \ +0000] \"GET /articles HTTP/1.1\" 200 15\n```\n\n此格式定义在：[`http://httpd.apache.org/docs/2.2/logs.html#common`](http://httpd.apache.org/docs/2.2/logs.html#common)。你会注意到我们还有另一个名为\
  \ `CombinedLoggingHandler` 的处理器；其格式定义在：[`http://httpd.apache.org/docs/2.2/logs.html#combined`](http://httpd.apache.org/docs/2.2/logs.html#combined)。以下是两种格式的简要对比。\n\
  \n* 通用格式 `– \"%h %l %u %t \\\"%r\\\" %>s %b\"`\n* 组合格式 `– \"%h %l %u %t \\\"%r\\\
  \" %>s %b \\\"%{Referer}i\\\" \\\"%{User-agent}i\\\"\"`\n\n现在我们尝试一个 `ContentTypeHandler`\
  \ 处理器的例子。\n\n```\n~/ch16$ go doc handlers.ContentTypeHandler\npackage handlers //\
  \ import \"github.com/gorilla/handlers\"\nfunc ContentTypeHandler(h http.Handler,\
  \ contentTypes ...string) http.Handler\nContentTypeHandler wraps and returns a http.Handler,\
  \ validating the request\ncontent type is compatible with the contentTypes list.\
  \ It writes a HTTP 415\nerror if that fails.\nOnly PUT, POST, and PATCH requests\
  \ are considered.\n```\n\n请注意，它仅适用于部分 HTTP 方法（那些用于创建/更新的方法）；其他方法会被静默传递。\n\n```\n\
  ~/ch16$ cat contenttype.go\npackage main\nimport (\n\"github.com/gorilla/handlers\"\
  \n\"github.com/gorilla/mux\"\n\"net/http\"\n)\nfunc buildHandler(message string)\
  \ func(http.ResponseWriter, *http.Request) {\nreturn http.HandlerFunc(func(w http.ResponseWriter,\
  \ r *http.Request) {\nw.Write([]byte(message))\n})\n}\nfunc main() {\nr := mux.NewRouter()\n\
  r.HandleFunc(\"/\", buildHandler(\"HomeHandler\"))\nr.HandleFunc(\"/products\",\
  \ buildHandler(\"ProductsHandler\"))\nl := handlers.ContentTypeHandler(http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\nw.Write([]byte(\"json articles only\"\
  ))\n}), \"application/json\")\nr.Handle(\"/articles\", l)\nhttp.ListenAndServe(\"\
  :8080\", r)\n}\n```\n\n可以看到，对于 `\"/articles\"` 路由，我们希望确保任何上传的数据都具有 json 内容类型。\n\n\
  ```\n~/ch16$ go run contenttype.go\n```\n\n接下来，我们演示预期的拦截（在 POST 请求中验证 `\"application/json\"\
  `）以及忽略该验证的情况。\n\n```\n~/ch16$ curl -IX POST -H 'Content-Type: application/json'\
  \ 127.0.0.1:8080/articles\nHTTP/1.1 200 OK\nDate: Mon, 07 Mar 2022 19:28:04 GMT\n\
  Content-Length: 18\nContent-Type: text/plain; charset=utf-8\n~/ch16$ curl -IX POST\
  \ -H 'Content-Type: application/xml' 127.0.0.1:8080/articles\nHTTP/1.1 415 Unsupported\
  \ Media Type\nContent-Type: text/plain; charset=utf-8\nX-Content-Type-Options: nosniff\n\
  Date: Mon, 07 Mar 2022 19:28:11 GMT\nContent-Length: 81\n~/ch16$ curl -IX GET -H\
  \ 'Content-Type: application/xml' 127.0.0.1:8080/articles\nHTTP/1.1 200 OK\nDate:\
  \ Mon, 07 Mar 2022 19:28:20 GMT\nContent-Length: 18\nContent-Type: text/plain; charset=utf-8\n\
  ```\n\n这些处理器可以按路由使用，也可以用于所有路由。还有其他可用的处理器；请查阅文档了解详情：`go doc gorilla/handlers | grep\
  \ ^func`。\n\n## 更多 Gorilla 示例\n\n剩余部分是一些 Gorilla 包的示例，演示了它们的主要机制。为了达到我们的目的，我们着重关注它们与标准库功能在比较上的异同。\n\
  \n\n\n### `gorilla/rpc`\n\nGorilla 的 `json` 包提供了与第 13 章中利用 JSON 的 `rpc` 类似的功能。我们注册服务，该服务进而接收\
  \ HTTP 请求。\n\n```\nch16$ vi rpc.go\npackage main\nimport (\n\"github.com/gorilla/rpc\"\
  \n\"github.com/gorilla/rpc/json\"\n\"net/http\"\n)\ntype HelloArgs struct {\nWho\
  \ string\n}\ntype HelloReply struct {\nMessage string\n}\ntype HelloService struct{}\n\
  func (h *HelloService) Say(r *http.Request, args *HelloArgs, reply *HelloReply)\
  \ error {\nreply.Message = \"Hello, \" + args.Who + \"!\"\nreturn nil\n}\nfunc main()\
  \ {\ns := rpc.NewServer()\ns.RegisterCodec(json.NewCodec(), \"application/json\"\
  )\ns.RegisterService(new(HelloService), \"\")\nhttp.Handle(\"/rpc\", s)\nhttp.ListenAndServe(\"\
  :8080\", nil)\n}\n```\n\n启动服务器。\n\n```\n~/ch16$ go mod tidy\n~/ch16$ go run rpc.go\n\
  ```\n\n从客户端，我们将基于 JSON 的负载发送到正确的端点。\n\n```\n~/ch16$ curl -X POST -H \"Content-Type:\
  \ application/json\" \\\n-d '{\"method\":\"HelloService.Say\",\"params\":[{\"Who\"\
  :\"Test\"}], \"id\":\"1\"}' \\\nhttp://localhost:8080/rpc\n{\"result\":{\"Message\"\
  :\"Hello, Test!\"},\"error\":null,\"id\":\"1\"}\n```\n\n`gorilla/rpc` 包源自 `net/rpc`\
  \ 包，但有如下显着差异。\n\n```\n~/ch16$ go doc gorilla/rpc\npackage rpc // import \"github.com/gorilla/rpc\"\
  \nPackage gorilla/rpc is a foundation for RPC over HTTP services, providing\naccess\
  \ to the exported methods of an object through HTTP requests.\nThis package derives\
  \ from the standard net/rpc package but uses a single\nHTTP request per call instead\
  \ of persistent connections. Other differences\ncompared to net/rpc:\n- Multiple\
  \ codecs can be registered in the same server.\n- A codec is chosen based on the\
  \ Content-Type header from the request.\n- Service methods also receive http.Request\
  \ as parameter.\n- This package can be used on Google App Engine.\n...\n```\n\n\
  虽然文档示例中没有提到，但第三方已经创建了用于 XML 等的“其他”编解码器，它们利用了 `gorilla/rpc` 包接口。\n\n### `gorilla/schema`\n\
  \nGorilla 的 schema 包使得将表单中的字段解组到我们的结构体中变得容易。在这里，我们创建了一个包含两个字段的 `Person` 结构体。最终，我们“提交”一个包含这些字段的表单并填充它们。\n\
  \n```\n~/ch16$ cat schema.go\npackage main\nimport (\n\"fmt\"\n\"github.com/gorilla/schema\"\
  \n\"net/http\"\n)\nvar decoder = schema.NewDecoder()\ntype Person struct {\nName\
  \  string\nPhone string\n}\nfunc main() {\nhttp.HandleFunc(\"/schema\", func(res\
  \ http.ResponseWriter, req *http.Request) {\nreq.ParseMultipartForm(0)\nvar person\
  \ Person\ndecoder.Decode(&person, req.PostForm)\nmessage := fmt.Sprintf(\"Hello\
  \ %v from area %v\", person.Name, person.Phone)\nres.Write([]byte(message))\n})\n\
  http.ListenAndServe(\":8080\", nil)\n}\n```\n\n启动服务器。\n\n```\n~/ch16$ go mod tidy\n\
  ~/ch16$ go run schema.go\n```\n\n注意 curl 如何为我们填入 Content-Type，即 `multipart/form-data`（浏览器中的\
  \ HTML 表单也会填入 Content-Type）。\n\n```\n~/ch16$ curl -sF \"Name=Ron\" -F \"Phone=312\"\
  \ -v localhost:8080/schema && echo\n*   Trying 127.0.0.1:8080...\n* TCP_NODELAY\
  \ set\n* Connected to localhost (127.0.0.1) port 8080 (#0)\n> POST /schema HTTP/1.1\n\
  > Host: localhost:8080\n> User-Agent: curl/7.68.0\n> Accept: */*\n> Content-Length:\
  \ 239\n> Content-Type: multipart/form-data; boundary=------------------------0458a5d725c3c300\n\
  >\n* We are completely uploaded and fine\n* Mark bundle as not supporting multiuse\n\
  < HTTP/1.1 200 OK\n< Date: Mon, 07 Mar 2022 21:57:45 GMT\n< Content-Length: 23\n\
  < Content-Type: text/plain; charset=utf-8\n<\n* Connection #0 to host localhost\
  \ left intact\nHello Ron from area 312\n```\n\n### `gorilla/securecookie`\n\nsecurecookie\
  \ 的文档开头如下：\n\n```\n~/ch16$ go doc securecookie\npackage securecookie // import \"\
  github.com/gorilla/securecookie\"\nPackage securecookie encodes and decodes authenticated\
  \ and optionally\nencrypted cookie values.\nSecure cookies can't be forged, because\
  \ their values are validated using\nHMAC. When encrypted, the content is also inaccessible\
  \ to malicious eyes.\n...\n```\n\n虽然关于 cookie 使用的争论仍在继续，我们只是展示了创建和往返到服务器的过程。我们不关心本地存储（客户端）。\n\
  \n底层使用的是 AES 加密；支持标准长度的块密钥（16、24、32 字节）。在我们的示例中，我们将其设置为 `nil`；因此，我们没有使用加密。\n\n```\n\
  ~/ch16$ cat securecookie.go\npackage main\nimport (\n\"fmt\"\n\"github.com/gorilla/securecookie\"\
  \n\"net/http\"\n)\nvar hashKey = []byte(\"very-secret\")\nvar s = securecookie.New(hashKey,\
  \ nil)\nfunc SetCookieHandler(w http.ResponseWriter, r *http.Request) {\nvalue :=\
  \ map[string]string{\n\"foo\": \"bar\",\n}\nif encoded, err := s.Encode(\"cookie-name\"\
  , value); err == nil {\ncookie := &http.Cookie{\nName:  \"cookie-name\",\nValue:\
  \ encoded,\nPath:  \"/\",\n}\nhttp.SetCookie(w, cookie)\nfmt.Println(cookie)\n}\n\
  }\nfunc ReadCookieHandler(w http.ResponseWriter, r *http.Request) {\nif cookie,\
  \ err := r.Cookie(\"cookie-name\"); err == nil {\nvalue := make(map[string]string)\n\
  fmt.Println(cookie.Value)\nif err = s.Decode(\"cookie-name\", cookie.Value, &value);\
  \ err == nil {\nfmt.Fprintf(w, \"The value of foo is %q\", value[\"foo\"])\n}\n\
  fmt.Println(cookie, err)\n}\n}\nfunc main() {\nhttp.HandleFunc(\"/set\", SetCookieHandler)\n\
  http.HandleFunc(\"/read\", ReadCookieHandler)\nhttp.ListenAndServe(\":8080\", nil)\n\
  }\n```\n\n启动服务器。\n\n```\n~/ch16$ go mod tidy\n~/ch16$ go run securecookie.go\n```\n\
  \n`/set` 端点将简单地创建我们的 cookie。\n\n```\n~/ch16$ curl -I localhost:8080/set\nHTTP/1.1\
  \ 200 OK\nSet-Cookie: cookie-name=MTY0NjY5MDU3MXxEdi1CQkFFQ180SUFBUXdCREFBQURQLUNBQUVEWm05dkEySmhjZz09fMds29irowo8h_9MByVigjT1qh0t7hnvAHprwtX9nc1h;\
  \ Path=/\nDate: Mon, 07 Mar 2022 22:02:51 GMT\n```\n\n要确认已收到，我们发送回编码后的 cookie（请务必使用您之前获得的那个）。\n\
  \n```\n~/ch16$ curl -b \"cookie-name=MTY0NjY5MDU3MXxEdi1CQkFFQ180SUFBUXdCREFBQURQLUNBQUVEWm05dkEySmhjZz09fMds29irowo8h_9MByVigjT1qh0t7hnvAHprwtX9nc1h\"\
  \ localhost:8080/read && echo\nThe value of foo is \"bar\"\n```\n\n## 结论\n\n“Gorilla”这个名字以\
  \ `Go` 开头，并引起人们对濒危灵长类动物的关注。随着时间的推移，Gorilla 不再是丛林里唯一的工具包，但它仍然在被讨论之中。我们在这里没有涵盖所有的包，但希望这能让您对标准库的扩展方式有所了解。\n\
  \n# 17. 测试\n\n在本章中，我们将探讨测试网络相关代码的方法和示例。使用单元测试和集成测试技术，我们努力捕获已知和预期的行为。理想情况下，单元测试应避免所有外部因素。例如，利用网络的测试最准确地描述为集成测试。对于我们代码而言，网络（外部因素）可能会施加不当影响，例如延迟或限制负载大小。知道如何设计测试并不总是那么容易，更不用说如何分离和减少外部影响了。拥有许多未知或受控的内部机制可能会导致测试不稳定，即那些似乎会随机失败的测试。\n\
  \n本章不是要学习 Go 测试工具的基础知识。存在关于基础知识的优秀资源，例如：\n\n- [`https://pkg.go.dev/testing`](https://pkg.go.dev/testing)\n\
  - [`https://quii.gitbook.io/learn-go-with-tests/`](https://quii.gitbook.io/learn-go-with-tests/)\n\
  - `go doc testing`\n\n我们的目标是学习一些有助于我们设计和管理与网络相关测试的技巧。\n\n\n\n## 简洁与缺陷\n\n我们从一组简单的测试开始：两个测试都发送请求并确认收到响应。唯一的区别是一个测试的客户端超时而另一个没有。两个测试中，服务器都通过休眠五秒来模拟工作。我们将单独运行每个测试，然后作为测试套件运行，并审查结果。\n\
  \n```\n$ mkdir ch17\n$ cd ch17\nch17$ vi basic_http_test.go\npackage ch17\n\nimport\
  \ (\n\t\"net/http\"\n\t\"testing\"\n\t\"time\"\n)\n\nfunc TestHTTPRoundTrip(t *testing.T)\
  \ {\n\tpath := \"/\"\n\tc := make(chan struct{})\n\t//服务器\n\tgo func() {\n\t\thttp.HandleFunc(path,\
  \ func(w http.ResponseWriter, req *http.Request) {\n\t\t\ttime.Sleep(5 * time.Second)\
  \ // 保持连接\n\t\t})\n\t\thttp.ListenAndServe(\":8080\", nil)\n\t}()\n\t//客户端\n\tgo\
  \ func() {\n\t\tresp, err := http.Get(\"http://localhost:8080\" + path)\n\t\tif\
  \ err != nil {\n\t\t\tt.Error(err)\n\t\t} else {\n\t\t\tif resp == nil || resp.StatusCode\
  \ != http.StatusOK {\n\t\t\t\tt.Error(resp)\n\t\t\t}\n\t\t}\n\t\tdefer func() {\n\
  \t\t\tc <- struct{}{}\n\t\t}()\n\t}()\n\t<-c\n}\n\nfunc TestHTTPRoundTripTimeout(t\
  \ *testing.T) {\n\tpath := \"/\"\n\tc := make(chan struct{})\n\t//服务器\n\tgo func()\
  \ {\n\t\thttp.HandleFunc(path, func(w http.ResponseWriter, req *http.Request) {\n\
  \t\t\ttime.Sleep(5 * time.Second) // 保持连接\n\t\t})\n\t\thttp.ListenAndServe(\":8080\"\
  , nil)\n\t}()\n\t//客户端\n\tgo func() {\n\t\tvar client = &http.Client{\n\t\t\tTimeout:\
  \ time.Second * 2,\n\t\t}\n\t\tresp, err := client.Get(\"http://localhost:8080\"\
  \ + path)\n\t\tif err != nil {\n\t\t\tt.Error(err)\n\t\t} else {\n\t\t\tif resp\
  \ == nil || resp.StatusCode != http.StatusOK {\n\t\t\t\tt.Error(resp)\n\t\t\t}\n\
  \t\t}\n\t\tdefer func() {\n\t\t\tc <- struct{}{}\n\t\t}()\n\t}()\n\t<-c\n}\n```\n\
  \n我们首先运行第一个测试：\n\n```\nch17$ go test -test.run \"TestHTTPRoundTrip$\" basic_http_test.go\n\
  === RUN   TestHTTPRoundTrip\n--- PASS: TestHTTPRoundTrip (5.00s)\nPASS\nok     \
  \ command-line-arguments  5.132s\n```\n\n然后运行第二个测试：\n\n```\nch17$ go test -test.run\
  \ \"TestHTTPRoundTripTimeout$\" basic_http_test.go\n--- FAIL: TestHTTPRoundTripTimeout\
  \ (2.00s)\nbasic_http_test.go:56: Get \"http://localhost:8080/\": context deadline\
  \ exceeded (Client.Timeout exceeded while awaiting headers)\nFAIL\nFAIL    command-line-arguments\
  \  2.131s\nFAIL\n```\n\n阅读这些测试后，可能显而易见第二个测试会失败。客户端设置为两秒后超时，而服务器需要五秒处理。缺乏经验的人可能会忽略这些相关测试失败的原因。默认的\
  \ HTTP 客户端具有无限超时时间。在我们的例子中，第一个测试中的服务器即使耗时加倍，测试仍然会通过。这并非 Go 语言特有，而是此 Go HTTP 客户端实现的特定行为。如果我们直接同时运行两个测试会发生什么？\n\
  \n```\nch17$ go test basic_http_test.go\npanic: http: multiple registrations for\
  \ /\ngoroutine 31 [running]:\nnet/http.(*ServeMux).Handle(0x1529fa0, {0x137fe80,\
  \ 0x1}, {0x1381c00?, 0x132fee0})\n\t/usr/local/go/src/net/http/server.go:2478 +0x226\n\
  net/http.(*ServeMux).HandleFunc(...)\n\t/usr/local/go/src/net/http/server.go:2515\n\
  net/http.HandleFunc(...)\n\t/usr/local/go/src/net/http/server.go:2527\ncommand-line-arguments.TestHTTPRoundTripTimeout.func1()\n\
  \t/Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch17/basic_http_test.go:43\
  \ +0x37\ncreated by command-line-arguments.TestHTTPRoundTripTimeout\n\t/Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch17/basic_http_test.go:42\
  \ +0x5e\nFAIL\tcommand-line-arguments\t5.225s\nFAIL\n```\n\n这个错误暴露了一个测试反模式（test\
  \ antipattern），即测试之间相互依赖。与之前的运行类似，这也暴露了一些实现细节。默认的 `ServeMux` 有一个默认处理器；根据 `server.go:2478`\
  \ 的代码，我们不允许重新映射路径。\n\n我们可以看到有几个需要考虑的事项，包括：\n\n-   我们实际想要测试什么？\n-   我们是否遵循了良好的测试实践（例如，测试独立性）？\n\
  -   我们的代码是否正确且性能良好？\n\n如何解决上述问题？正如我们在前面章节中看到的，我们可以为每个测试创建一个新的 \"mux\"。另一种方法是在运行测试之前设置所有测试路由。但更根本的是，我们应该考虑我们到底在测试什么。例如，我们是在测试服务器是否监听？还是测试我们的\
  \ `Handler` 是否基于给定请求提供正确的响应？毕竟，如果我们考虑 OSI 模型的思维方式，HTTP 是我们的请求/响应协议所在层（L7），而 TCP/IP\
  \ 维持我们的连接（L4 及以下）。由于这些层可以解耦，我们也应该能够解耦我们的测试。即使考虑到这种分离，也不清楚各个部分将在哪里被测试（即单元测试还是集成测试）。思考一下处理器映射：你是对它进行单元测试，还是值得做集成测试？毕竟，除非使用了给定路径，否则处理器甚至不会被触发。\n\
  \n如你所见，我们如何思考网络组件会导致可能不同的测试安排。我们还应该记住，测试的执行顺序是不确定的。虽然看起来测试是从上到下运行的，但这只是实现的一个副作用，并非\
  \ `testing` 包中指定的行为。\n\n在我们进行重构时，首先会了解 Go 在测试辅助工具方面提供了什么。\n\n\n\n## `httptest` 包\n\
  \n`httptest` 包提供了用于辅助 HTTP 测试的函数和类型。\n\n```\nch17$ go doc httptest\npackage httptest\
  \ // import \"net/http/httptest\"\nPackage httptest provides utilities for HTTP\
  \ testing.\nconst DefaultRemoteAddr = \"1.2.3.4\"\nfunc NewRequest(method, target\
  \ string, body io.Reader) *http.Request\ntype ResponseRecorder struct{ ... }\nfunc\
  \ NewRecorder() *ResponseRecorder\ntype Server struct{ ... }\nfunc NewServer(handler\
  \ http.Handler) *Server\nfunc NewTLSServer(handler http.Handler) *Server\nfunc NewUnstartedServer(handler\
  \ http.Handler) *Server\n```\n\n让我们创建一个新的测试，它类似于之前我们编写的测试，但实际上并不连接到服务器。为了节省篇幅，我们将不再列出已有的测试。\n\
  \n```\nch17$ vi basic_http_test.go\npackage ch17\nimport (\n\"net/http\"\n\"net/http/httptest\"\
  \n\"testing\"\n\"time\"\n)\nfunc TestHTTPRoundTripNoConnection(t *testing.T) {\n\
  path := \"/\"\nreq := httptest.NewRequest(\"GET\", path, nil)\nres := httptest.NewRecorder()\n\
  f := func(w http.ResponseWriter, req *http.Request) {\ntime.Sleep(5 * time.Second)\
  \ // holding connection\n}\nf(res, req)\nif res == nil || res.Result().StatusCode\
  \ != http.StatusOK {\nt.Error(res)\n}\n}\nfunc TestHTTPRoundTrip(t *testing.T) {\n\
  ...\nfunc TestHTTPRoundTripTimeout(t *testing.T) {\n...\n```\n\n我们做了一些修改，但捕获了我们的请求、响应以及相关的断言。需要注意几点：我们移除了服务器（即\
  \ `http.ListenAndServe`）；处理函数到路径的映射仍然存在，但它明确地体现在 `httptest.NewRequest` 中，而不是 `http.HandleFunc`\
  \ 里。由于我们使用了一个新的包（即 `httptest`），我们必须修改结果检查，以便更紧密地匹配实际的响应。\n\n我们调用 `httptest.NewRecorder`\
  \ 会返回一个新的 `httptest.ResponseRecorder` 类型，该类型进而实现了 `http.ResponseWriter` 接口。这使得 `http.Response`\
  \ 可以被间接填充。但结果并不适合进行深度比较（即 `reflect.DeepEqual`）。\n\n除了处理函数，我们如何测试客户端和模拟的后端呢？`httptest`\
  \ 包还提供了创建测试服务器端点的能力。\n\n```\nch17$ vi basic_http_test.go\n... other tests and imports\n\
  func TestHTTPTestRoundTripTimeout(t *testing.T) {\nts := httptest.NewServer(http.HandlerFunc(func(w\
  \ http.ResponseWriter, req *http.Request) {\ntime.Sleep(5 * time.Second) // holding\
  \ connection\n}))\ndefer ts.Close()\nvar c = &http.Client{\nTimeout: time.Second\
  \ * 2,\n}\nreq, _ := http.NewRequest(\"GET\", ts.URL, nil)\nres, err := c.Do(req)\n\
  if err != nil {\nt.Fatal(err)\n}\nerr = res.Body.Close()\nif err != nil {\nt.Fatal(err)\n\
  }\n}\n```\n\n我们可以像下面这样运行这个测试：\n\n```\nch17$ go test -test.run \"TestHTTPTestRoundTripTimeout$\"\
  \ -v basic_http_test.go\n=== RUN   TestHTTPTestRoundTripTimeout\nbasic_http_test.go:68:\
  \ Get \"http://127.0.0.1:50866\": context deadline exceeded (Client.Timeout exceeded\
  \ while awaiting headers)\n--- FAIL: TestHTTPTestRoundTripTimeout (5.00s)\nFAIL\n\
  FAIL    command-line-arguments  5.155s\nFAIL\n```\n\n在这些特定的例子中，你可能不希望实际的测试失败。你应该修复路径（使其唯一），并调整超时设置，使其仅在出现意外情况时才触发错误。\n\
  \n## HTTP 层以下\n\n前面的工具集中在 HTTP 上。有没有更通用的技术呢？在 `net` 包中包含了 `Pipe` 类型。\n\n```\nch17$\
  \ go doc net.Pipe\npackage net // import \"net\"\nfunc Pipe() (Conn, Conn)\nPipe\
  \ creates a synchronous, in-memory, full duplex network connection; both\nends implement\
  \ the Conn interface. Reads on one end are matched with writes\non the other, copying\
  \ data directly between the two; there is no internal\nbuffering.\n```\n\n如文档所述，我们获得了一些连接对象，它们的行为类似于更通用的客户端和服务器。\n\
  \n```\n... prior tests and imports\nfunc TestPipe(t *testing.T) {\nc := make(chan\
  \ struct{})\nserver, client := net.Pipe()\ngo func() {\ntime.Sleep(2 * time.Second)\n\
  req := make([]byte, 15)\nserver.SetDeadline(time.Now().Add(1 * time.Second))\n_,\
  \ err := server.Read(req)\nt.Log(string(req))\nif err != nil {\nt.Error(err)\n}\n\
  defer func() {\nserver.Close()\nc <- struct{}{}\n}()\n}()\nclient.SetDeadline(time.Now().Add(1\
  \ * time.Second))\n_, err := client.Write([]byte(\"my http request\"))\nif err !=\
  \ nil {\nt.Error(err)\n}\ndefer func() {\nclient.Close()\n}()\n<-c\n}\n```\n\n在前面的例子中，我们试图模拟一些我们在与\
  \ HTTP 相关的超时中看到的失败行为。\n\n```\nch17$ go test -test.run \"TestPipe$\" -v basic_http_test.go\n\
  === RUN   TestPipe\nbasic_http_test.go:131: write pipe: i/o timeout\nbasic_http_test.go:119:\n\
  basic_http_test.go:121: read pipe: i/o timeout\n--- FAIL: TestPipe (3.00s)\nFAIL\n\
  FAIL    command-line-arguments  3.137s\nFAIL\n```\n\n请注意，我们是在比 HTTP（即第 7 层）更低的层上进行操作。在大多数情况下，这意味着我们需要自己处理请求和响应，而不是利用像\
  \ `http.Request` 或 `http.Response` 这样的现有高级类型。\n\n\n\n## 善用标准库\n\n网络上充斥着各种示例，Go 标准库也不例外。在本节，我们将研究几个现有的测试案例，重点关注其风格和（必要的）复杂性。\n\
  \n```\nch17$ go test -test.count=1 -v -test.list \".*\" $(go env GOROOT)/src/net/...\
  \  | head\nTestSortByRFC6724\nTestRFC6724PolicyTableClassify\nTestRFC6724ClassifyScope\n\
  TestRFC6724CommonPrefixLength\nTestCgoLookupIP\nTestCgoLookupIPWithCancel\nTestCgoLookupPort\n\
  TestCgoLookupPortWithCancel\nTestCgoLookupPTR\nTestCgoLookupPTRWithCancel\n```\n\
  \n这里有数千个测试，大多数都没有文档说明。我们首先来看一下：\n\n```\n$(go env GOROOT)/src/net/http/requestwrite_test.go\n\
  ```\n\n让我们尝试运行相关的测试（以 `TestRequestWrite` 开头）。\n\n```\nch17$ cd $(go env GOROOT)/src/net/http\n\
  http$ go test -test.count=1 -v -test.run \"TestRequestWrite*\"\n=== RUN   TestRequestWrite\n\
  --- PASS: TestRequestWrite (0.00s)\n=== RUN   TestRequestWriteTransport\n=== PAUSE\
  \ TestRequestWriteTransport\n=== RUN   TestRequestWriteClosesBody\n--- PASS: TestRequestWriteClosesBody\
  \ (0.00s)\n=== RUN   TestRequestWriteError\n--- PASS: TestRequestWriteError (0.00s)\n\
  === RUN   TestRequestWriteBufferedWriter\n--- PASS: TestRequestWriteBufferedWriter\
  \ (0.00s)\n=== CONT  TestRequestWriteTransport\n--- PASS: TestRequestWriteTransport\
  \ (0.20s)\nPASS\nok      net/http    0.363s\n```\n\n我们可以运行这些已有的测试，甚至修改它们来进行测试尝试，这很棒（但请小心，记得备份）。\n\
  \n如果你打开 `requestwrite_test.go`（例如，`sudo vi $(go env GOROOT)/src/net/http/requestwrite_test.go`），请注意测试表的结构；这里我们列出第一个条目。\n\
  \n```\n// 来自 requestwrite_test.go\n...\ntype reqWriteTest struct {\nReq  Request\n\
  Body any // 可选的 []byte 或 func() io.ReadCloser，用于填充 Req.Body\n// 这三个字段中的任何一个都可以为空，以跳过该测试。\n\
  WantWrite string // Request.Write\nWantProxy string // Request.WriteProxy\nWantError\
  \ error // 期望从 Request.Write 返回的错误\n}\nvar reqWriteTests = []reqWriteTest{\n// HTTP/1.1\
  \ => 分块编码；无 body；无 trailer\n0: {\nReq: Request{\nMethod: \"GET\",\nURL: &url.URL{\n\
  Scheme: \"http\",\nHost:   \"www.techcrunch.com\",\nPath:   \"/\",\n},\nProto: \
  \     \"HTTP/1.1\",\nProtoMajor: 1,\nProtoMinor: 1,\nHeader: Header{\n\"Accept\"\
  :           {\"text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8\"\
  },\n\"Accept-Charset\":   {\"ISO-8859-1,utf-8;q=0.7,*;q=0.7\"},\n\"Accept-Encoding\"\
  :  {\"gzip,deflate\"},\n\"Accept-Language\":  {\"en-us,en;q=0.5\"},\n\"Keep-Alive\"\
  :       {\"300\"},\n\"Proxy-Connection\": {\"keep-alive\"},\n\"User-Agent\":   \
  \    {\"Fake\"},\n},\nBody:  nil,\nClose: false,\nHost:  \"www.techcrunch.com\"\
  ,\nForm:  map[string][]string{},\n},\nWantWrite: \"GET / HTTP/1.1\\r\\n\" +\n\"\
  Host: www.techcrunch.com\\r\\n\" +\n\"User-Agent: Fake\\r\\n\" +\n\"Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8\\\
  r\\n\" +\n\"Accept-Charset: ISO-8859-1,utf-8;q=0.7,*;q=0.7\\r\\n\" +\n\"Accept-Encoding:\
  \ gzip,deflate\\r\\n\" +\n\"Accept-Language: en-us,en;q=0.5\\r\\n\" +\n\"Keep-Alive:\
  \ 300\\r\\n\" +\n\"Proxy-Connection: keep-alive\\r\\n\\r\\n\",\nWantProxy: \"GET\
  \ http://www.techcrunch.com/ HTTP/1.1\\r\\n\" +\n\"Host: www.techcrunch.com\\r\\\
  n\" +\n\"User-Agent: Fake\\r\\n\" +\n\"Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8\\\
  r\\n\" +\n\"Accept-Charset: ISO-8859-1,utf-8;q=0.7,*;q=0.7\\r\\n\" +\n\"Accept-Encoding:\
  \ gzip,deflate\\r\\n\" +\n\"Accept-Language: en-us,en;q=0.5\\r\\n\" +\n\"Keep-Alive:\
  \ 300\\r\\n\" +\n\"Proxy-Connection: keep-alive\\r\\n\\r\\n\",\n},\n// HTTP/1.1\
  \ => 分块编码；有 body；空 trailer\n1: {\n...\n```\n\n和 Go 中的许多测试一样，我们看到一个非常长的测试表。我们有一个\
  \ `Request` 实例（`Req`）以及一个非常相似的字符串化结果（`WantWrite` 和 `WantProxy`）。在深入探讨之前，我们先回顾其中一个测试。\n\
  \n```\n// 来自 requestwrite_test.go\n...\nfunc TestRequestWrite(t *testing.T) {\n\
  for i := range reqWriteTests {\ntt := &reqWriteTests[i]\nsetBody := func() {\nif\
  \ tt.Body == nil {\nreturn\n}\nswitch b := tt.Body.(type) {\ncase []byte:\ntt.Req.Body\
  \ = io.NopCloser(bytes.NewReader(b))\ncase func() io.ReadCloser:\ntt.Req.Body =\
  \ b()\n}\n}\nsetBody()\nif tt.Req.Header == nil {\ntt.Req.Header = make(Header)\n\
  }\nvar braw bytes.Buffer\nerr := tt.Req.Write(&braw)\nif g, e := fmt.Sprintf(\"\
  %v\", err), fmt.Sprintf(\"%v\", tt.WantError); g != e {\nt.Errorf(\"writing #%d,\
  \ err = %q, want %q\", i, g, e)\ncontinue\n}\nif err != nil {\ncontinue\n}\nif tt.WantWrite\
  \ != \"\" {\nsraw := braw.String()\nif sraw != tt.WantWrite {\nt.Errorf(\"Test %d,\
  \ expecting:\\n%s\\nGot:\\n%s\\n\", i, tt.WantWrite, sraw)\ncontinue\n}\n}\nif tt.WantProxy\
  \ != \"\" {\nsetBody()\nvar praw bytes.Buffer\nerr = tt.Req.WriteProxy(&praw)\n\
  if err != nil {\nt.Errorf(\"WriteProxy #%d: %s\", i, err)\ncontinue\n}\nsraw :=\
  \ praw.String()\nif sraw != tt.WantProxy {\nt.Errorf(\"Test Proxy %d, expecting:\\\
  n%s\\nGot:\\n%s\\n\", i, tt.WantProxy, sraw)\ncontinue\n}\n}\n}\n}\n...\n```\n\n\
  这段代码不算少。它在做什么？以下是其活动列表：\n\n*   枚举测试表（`reqWriteTests`）。\n*   设置一个包含 header 和 body\
  \ 的真实 `Request` 对象。\n*   序列化 `Request` 对象（`sraw`）并与 `WantWrite` 或 `WantProxy` 进行比较。\n\
  \n还有一些其他需要注意的点：\n\n*   `io.NopCloser`\n\n`NopCloser` 是一个简化功能的函数示例，具体来说，它阻止了资源的关闭。\n\
  \n```\nhttp$ go doc -u -all io.nopCloser\npackage io // import \"io\"\nfunc NopCloser(r\
  \ Reader) ReadCloser\nNopCloser 返回一个 ReadCloser，其 Close 方法是一个空操作，包装了提供的 Reader r。\n\
  type nopCloser struct {\nReader\n}\nfunc (nopCloser) Close() error\n```\n\n*   `tt.Req.Write`\
  \ 和 `tt.Req.WriteProxy`\n\n如果我们查看这些方法的相关文档：\n\n```\nhttp$ go doc net/http.Request.Write\n\
  package http // import \"net/http\"\nfunc (r *Request) Write(w io.Writer) error\n\
  Write 以线路格式写入一个 HTTP/1.1 请求，即头部和主体。\n此方法会参考请求的以下字段：\nHost\nURL\nMethod（默认为 \"GET\"\
  ）\nHeader\nContentLength\nTransferEncoding\nBody\n如果 Body 存在，Content-Length <= 0\
  \ 且 TransferEncoding 未被设置为 \"identity\"，则 Write 会向 header 中添加 \"Transfer-Encoding:\
  \ chunked\"。\nBody 在发送后被关闭。\nhttp$ go doc net/http.Request.WriteProxy\npackage http\
  \ // import \"net/http\"\nfunc (r *Request) WriteProxy(w io.Writer) error\nWriteProxy\
  \ 与 Write 类似，但以 HTTP 代理期望的格式写入请求。\n具体来说，根据 RFC 7230 的第 5.3 节，WriteProxy 会使用绝对 URI（包含\
  \ scheme 和 host）写入请求的初始 Request-URI 行。\n在任何情况下，WriteProxy 都会写入一个 Host header，使用\
  \ r.Host 或 r.URL.Host。\n```\n\n我们看到这两个方法都接受一个 `Writer`，并且都根据各自的用途以略有不同的方式序列化 `Request`\
  \ 对象。我们在这里不检查它们的差异，但这为我们如何进行自己的测试提供了思路。\n\n接下来，我们回顾 `net` 包中的测试：`TestTCPConnSpecificMethods`。\n\
  \n\n\n```\n// 来自 protoconn_test.go\n...\nfunc TestTCPConnSpecificMethods(t *testing.T)\
  \ {\nla, err := ResolveTCPAddr(\"tcp4\", \"127.0.0.1:0\")\nif err != nil {\nt.Fatal(err)\n\
  }\nln, err := ListenTCP(\"tcp4\", la)\nif err != nil {\nt.Fatal(err)\n}\nch := make(chan\
  \ error, 1)\nhandler := func(ls *localServer, ln Listener) { ls.transponder(ls.Listener,\
  \ ch) }\nls := (&streamListener{Listener: ln}).newLocalServer()\ndefer ls.teardown()\n\
  if err := ls.buildup(handler); err != nil {\nt.Fatal(err)\n}\nra, err := ResolveTCPAddr(\"\
  tcp4\", ls.Listener.Addr().String())\nif err != nil {\nt.Fatal(err)\n}\nc, err :=\
  \ DialTCP(\"tcp4\", nil, ra)\nif err != nil {\nt.Fatal(err)\n}\ndefer c.Close()\n\
  c.SetKeepAlive(false)\nc.SetKeepAlivePeriod(3 * time.Second)\nc.SetLinger(0)\nc.SetNoDelay(false)\n\
  c.LocalAddr()\nc.RemoteAddr()\nc.SetDeadline(time.Now().Add(someTimeout))\nc.SetReadDeadline(time.Now().Add(someTimeout))\n\
  c.SetWriteDeadline(time.Now().Add(someTimeout))\nif _, err := c.Write([]byte(\"\
  TCPCONN TEST\")); err != nil {\nt.Fatal(err)\n}\nrb := make([]byte, 128)\nif _,\
  \ err := c.Read(rb); err != nil {\nt.Fatal(err)\n}\nfor err := range ch {\nt.Error(err)\n\
  }\n}\n...\n```\n\n该测试本身专注于设置各种客户端连接相关选项，然后使用客户端，并期望一切正常。从我们的角度来看，我们感兴趣的是他们编写测试本身的方式。我们处在协议栈的\
  \ L3/L4 层。从高层次来看，其流程如下：\n\n*   准备并验证一个已知的 IP 地址（例如 `127.0.0.1`）和端口（`:0`）\n*   创建一个基于\
  \ TCP 的监听器。\n*   启动服务器（后续详述）。\n*   获取服务器的 IP 和分配的端口。\n*   使用远程地址创建一个客户端。\n*   配置客户端。\n\
  *   将数据从客户端写入服务器，然后读取结果。\n\n运行 `TestTCPConnSpecificMethods` 测试，我们看到以下输出：\n\n```\n\
  net$ go test -test.count=1 -v -test.run \"TestTCPConnSpecificMethods$\"\n=== RUN\
  \   TestTCPConnSpecificMethods\n--- PASS: TestTCPConnSpecificMethods (0.00s)\nPASS\n\
  Socket statistical information:\n(inet4, stream, default): opened=2 connected=1\
  \ listened=1 accepted=1 closed=3 openfailed=0 connectfailed=1 listenfailed=0 acceptfailed=1\
  \ closefailed=0\nok      net 0.210s\n```\n\n测试中间部分看起来比我们之前看到的要复杂。\n\n```\nch :=\
  \ make(chan error, 1)\nhandler := func(ls *localServer, ln Listener) { ls.transponder(ls.Listener,\
  \ ch) }\nls := (&streamListener{Listener: ln}).newLocalServer()\ndefer ls.teardown()\n\
  if err := ls.buildup(handler); err != nil {\nt.Fatal(err)\n}\n```\n\n上述代码定义在另一个文件中：`mockserver_test.go`。调用\
  \ `buildup` 会在一个 Go 协程中运行 handler 代码。从高层次来看，`Accept` 是在 `transponder` 中运行的，那么为什么不用一个“非模拟”的设置呢？进一步审查后，你会发现\
  \ `someTimeout` 被应用于大多数与超时相关的设置（例如 `SetDeadline`）。有趣的是，由于该代码存在于以 `_test.go` 结尾的文件中，我们无法通过\
  \ `go doc` 查看它。\n\n更多详情请查阅 `$(go env GOROOT)/src/net/mockserver_test.go`。\n\n##\
  \ 结论\n\n本章旨在引导你思考在测试网络相关代码时所涉及的技术和层次。要成为专业的网络测试开发者，还需要掌握更多概念和工具。例如，模糊测试（fuzzing）或泛型（generics）如何帮助确保代码安全并精简代码？当集成测试变得更加复杂时，例如我们将多个网络服务串联起来，甚至中途协议发生变化时，我们应该考虑什么？\n\
