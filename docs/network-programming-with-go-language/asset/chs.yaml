- '# 架构层次


  本章涵盖了分布式系统的主要架构特性。分布式系统是由通过网络交互的组件组成的集合。你无法在毫无构想的情况下构建一个系统。如果你不了解系统运行的环境，你也无法构建它。`GUI`
  程序与批处理程序不同；游戏程序与商业程序不同；分布式程序与单机程序也不同。它们各有其方法、常见模式、典型问题以及常用解决方案。


  本章将介绍分布式系统的高层架构方面。审视这类系统有多种视角，其中许多都会涉及。我们从分层模型入手，以帮助理解组件边界，讨论网络实现细节，并思考组件之间如何传递消息，最后总结错误条件及其思考方式。


  ## 协议层


  分布式系统*很复杂*。它涉及多台计算机，这些计算机必须以某种方式连接起来。必须编写程序在系统中的每台计算机上运行，并且它们必须相互协作以完成分布式任务。


  处理复杂性的常见方法是将其分解为更小、更简单的部分。这些部分有其自身的结构，同时也具备与其他相关部分通信的明确定义方式。在分布式系统中，这些部分被称为*协议层*，它们具有清晰定义的功能。它们形成一个栈，每一层与上层和下层进行通信。层与层之间的通信由协议定义。


  网络通信需要协议来涵盖从高层应用通信到底层线缆通信的全过程，而复杂性则通过协议层中的封装来处理。


  ### ISO OSI 协议


  尽管从未完全实现，但 OSI（开放系统互连）协议在讨论和影响分布式系统设计的方式上产生了重大影响。其常见形式如图 1-1 所示。


  ![](img/436770_2_En_1_Fig1_HTML.png)


  **图 1-1** 开放系统互连协议


  ### OSI 层


  从底层到顶层，每一层的功能如下：


  - **物理层**使用电气、光学或无线电技术传输比特流。

  - **数据链路层**将信息包封装成网络帧，以便通过物理层传输，并再还原为信息包。

  - **网络层**提供交换和路由技术。

  - **传输层**提供端系统间的透明数据传输，并负责端到端的错误恢复和流量控制。

  - **会话层**负责建立、管理和终止应用程序之间的连接。

  - **表示层**提供对数据表示差异（例如加密）的独立性。

  - **应用层**支持应用程序和终端用户进程。


  OSI 模型中的一层通常映射到现代协议；例如，`TCP/IP` 中的 `IP` 映射到网络层，也称为第 3 层（物理层为第 1 层）。应用层（第 7 层）映射到
  `HTTP`。有些协议（如 `HTTPS`）似乎融合了第 5 层（会话层）和第 6 层（表示层）。没有模型是完美的；OSI 模型之外存在其他更贴近现实情况的替代模型，例如
  `TCP/IP` 协议模型。


  ### TCP/IP 协议


  在 OSI 模型被争论、讨论、部分实现和争执不休的同时，DARPA 互联网研究项目正忙于构建 `TCP/IP` 协议。这些协议取得了巨大成功，并催生了**互联网**（首字母大写）。这是一个更简单的协议栈，如图
  1-2 所示。


  ![](img/436770_2_En_1_Fig2_HTML.png)


  **图 1-2** TCP/IP 协议


  ### 其他替代协议


  尽管看起来并非如此，但 `TCP/IP` 协议并非唯一存在的协议，长远来看甚至可能不是最成功的。维基百科的网络协议列表（见 `https://en.wikipedia.org/wiki/List_of_network_protocols_(OSI_model)`)
  在 OSI ISO 的每一层都列出了大量其他协议。其中许多已过时或用途不大，但由于各个领域技术的进步——例如太空互联网和物联网——总会有新协议的空间。


  本书主要关注 OSI 第 3 层和第 4 层（`TCP/IP`，包括 `UDP`），但您应了解还有其他协议存在。


  ## 网络


  *网络*是一种用于连接称为主机的终端系统的通信系统。连接机制可能涉及铜线、以太网、光纤或无线技术，但这并非我们此处关注的焦点。局域网（LAN）连接距离较近的计算机，通常属于家庭、小型组织或大型组织的一部分。


  广域网（WAN）跨越更大的物理区域连接计算机，例如城市之间。还有其他类型，如城域网（MAN）、个人局域网（PAN），甚至体域网（BAN）。


  互联网是连接两个或多个不同网络（通常是局域网或广域网）的网络。内联网是一个所有网络都属于单一组织的互联网。


  互联网和内联网之间存在显著差异。通常，内联网处于单一管理控制之下，将实施一套统一的策略。相反，互联网不受单一机构控制，对不同部分实施的控制甚至可能互不兼容。


  此类差异的一个简单例子是：内联网通常仅限于由少数供应商提供的、运行特定操作系统标准化版本的计算机。而互联网则通常包含各式各样的计算机和操作系统。


  本书的技术适用于互联网。它们也适用于内联网，但后者中您也会发现专用的、不可移植的系统。


  此外，还有所有互联网之“母”：因特网。它只是一个非常非常庞大的互联网，将我们连接到谷歌，将我的计算机连接到你的计算机，以此类推。


  ## 网关


  *网关*是用于连接两个或多个网络的实体的通用术语。中继器在物理层工作，将信息从一个子网复制到另一个子网。网桥在数据链路层工作，在网络之间复制帧。路由器在网络层工作，不仅在网络之间移动信息，还决定路由路径。


  ## 主机级网络


  在单个主机上，设计、调试或部署基于网络的软件时，我们还需要考虑其他事项。其中一些包括：


  - DNS（域名系统，即人类友好的命名）

  - 防火墙（例如，阻止入站或出站流量）

  - 路由（例如，确定将数据包发送到哪个网络）

  - 主机身份管理（例如，IP 地址）

  - 性能控制（例如，流量整形或重试）

  - 连接问题（例如，缺失网络适配器、机器内进程通信）


  通过示例，我们将了解主机配置错误可能如何体现在我们的软件中。




  '
- '# 数据包封装


  在 OSI 或 TCP/IP 协议栈中，各层之间的通信是通过将数据包从一层发送到下一层，最终跨越网络完成的。每一层都需要维护其自身的管理信息。当数据包向下传递时，该层通过向上层接收到的数据包添加头部信息来实现这一点。在接收端，当数据包向上传递时，这些头部信息会被移除。


  例如，TFTP（简单文件传输协议）用于在计算机之间传输文件。它使用基于 IP 协议之上的 UDP 协议，而 IP 协议则可能通过以太网发送。这看起来如图 1-3
  所示。


  ![](img/436770_2_En_1_Fig3_HTML.png)


  图 1-3


  TFTP（简单文件传输协议）


  '
- '# 连接模型


  为了让两台计算机进行通信，它们必须建立一个路径，以便在一次会话中至少发送一条消息。为此，有两种主要模型：


  - 面向连接

  - 无连接


  ## 面向连接


  为会话建立单个连接。双向通信沿着该连接进行。当会话结束时，连接被断开。这类似于电话通话。TCP 就是一个例子。


  ## 无连接


  在无连接系统中，消息是相互独立发送的。普通邮件可以作为类比。无连接的消息可能无法按顺序到达。消息之间互不影响。IP 协议就是一个例子。UDP 是 IP 之上的一种无连接协议，通常作为
  TCP 的替代方案，因为它轻量得多。无连接也称为非连接或无状态。


  面向连接的传输可以建立在无连接传输之上——例如，TCP over IP。无连接的传输也可以建立在面向连接的传输之上——例如，HTTP over TCP。通过面向连接传输协议发送的消息之间存在某种关联，例如，用于保持顺序的序列号。保持状态可以实现功能和优化；但它也伴随着存储和计算的成本。


  这些模型可能存在变体。例如，一个会话可能强制消息到达，但不保证它们按发送顺序到达。然而，这两种是最常见的。


  连接模型并非协议变化的唯一方式。一个经常被期望的特性是可靠性；这意味着协议拥有逻辑来修复某些类型的错误；例如，TCP 会重传丢失的数据包。人们通常认为面向连接的协议是可靠的；但这并不总是成立（例如，MPLS）。网络协议的其他特性可能包括消息边界管理、传递顺序、错误检查、流量控制等。这些特性可以存在于一个协议层，而不存在于另一层，这也是网络协议栈种类繁多的部分原因。


  有时，这些特性会在整个协议栈中被重新设计。这种特性重构的一个例子是 HTTP/3。在 HTTP/2 中，可靠性是通过第 4 层的 TCP 提供的。在 HTTP/3
  中，TCP 被不可靠的 UDP 取代。可靠性将由另一种名为 QUIC 的协议提供。虽然 QUIC 被视为与 TCP 或 UDP 类似的传输层，但它运行在 UDP
  之上。如你所见，分层模型并非一门精确的科学。


  '
- '# 通信模型


  在一个分布式系统中，会有许多组件（即进程）运行，它们之间必须相互通信。为此，有两种主要模型：消息传递和远程过程调用。在网络环境中，这些模型允许进程间（和/或线程间）通信，旨在调用远程进程上的行为。


  ## 消息传递


  有些语言是建立在消息传递原则之上的。并发语言（和工具）经常使用这种机制，最著名的例子可能是 UNIX 管道。UNIX 管道是一个字节管道，但这并非其固有限制：微软的
  PowerShell 可以沿其管道发送对象，而像 Parlog 这样的并发语言可以在并发进程之间发送消息中的任意逻辑数据结构。较新的语言如 Go 也拥有（线程间）消息传递的机制。


  消息传递是分布式系统的一种原始机制。建立一个连接，然后沿连接向下推送一些数据。在另一端，解析消息内容并对其做出响应，可能会发送回消息。如图 1-4 所示。


  ![](img/436770_2_En_1_Fig4_HTML.png)


  图 1-4


  消息传递通信模型


  事件驱动系统以类似的方式运作。在底层，编程语言 `node.js` 运行一个事件循环，等待 I/O 事件，调度这些事件的处理程序并做出响应。在更高层次，大多数用户界面系统使用事件循环等待用户输入，而在网络世界中，Ajax
  使用 `XMLHttpRequest` 发送和接收请求。


  ## 远程过程调用


  在任何系统中，都存在从系统一个部分到另一个部分的信息传输和流程控制。在过程式语言中，这可能包括过程调用，其中信息被放置在调用栈上，然后流程控制转移到程序的另一部分。


  即使是在过程调用中，也存在各种变体。代码可能是静态链接的，因此控制权从程序可执行代码的一个部分转移到另一个部分。由于库例程的使用日益增多，将此类代码放在共享对象（`.so`）或动态链接库（`.dll`）中已变得司空见惯，此时控制权会转移到一个独立的代码片段。


  库与调用代码运行在同一台机器上。将控制权转移到运行在不同机器上的过程（即远程库）是一个（概念上）简单的步骤。但其具体机制并不简单！然而，这种控制模型催生了远程过程调用（RPC），后续章节将对此进行详细讨论。如图
  1-5 所示。


  ![](img/436770_2_En_1_Fig5_HTML.png)


  图 1-5


  远程过程调用通信模型


  这方面有很多例子：有些基于特定的编程语言，例如 Go 的 `rpc` 包（在第 13 章讨论），有些则是覆盖多种语言的 RPC 系统，例如 SOAP 和 Google
  的 gRPC。


  消息传递和 RPC 之间的区别可能并不明确。从一个层面来看，它们都涉及到在“别处”调用行为。一般来说，与消息传递（例如调用远程队列系统）相比，RPC 往往不那么抽象（即，看起来和感觉上像常规的过程调用）。但在底层，RPC
  还是通过传递消息来实现的。




  '
- '# 分布式计算模型


  在最高层面上，我们可以考虑分布式系统中各组件的等价性或非等价性。最常见的情况是非对称的：客户端向服务器发送请求，服务器进行响应。这就是*客户端-服务器*系统。


  如果两个组件是对等的，都能够发起和响应消息，那么我们就有了一个*对等网络*系统。请注意，这是一个逻辑上的分类：一个对等点可能是拥有 16,000 个核心的超级计算机；另一个可能是一部手机。但如果两者都能执行类似的操作，那么它们就是对等点。


  这些示意图如图 1-6 所示。


  ![](img/436770_2_En_1_Fig6_HTML.png)


  图 1-6


  客户端-服务器系统与对等网络系统


  客户端-服务器系统的一个例子是浏览器与 Web 服务器通信。对等网络系统的一个例子是数据库系统，其中数据在两者上都有副本且均可访问。


  这些系统的组合产生了所谓的多层架构，其中三层架构是最常见的一种（即，表示层 -> 应用层 -> 数据层，或浏览器 -> Web 服务器 -> 数据库）。


  ## 客户端-服务器系统


  图 1-7 展示了客户端-服务器系统的另一种视图。


  ![](img/436770_2_En_1_Fig7_HTML.png)


  图 1-7


  客户端-服务器系统


  这个视图可能来自一个需要了解系统组件的开发者。同时，它也可能是用户持有的视图：浏览器的用户知道浏览器正在自己的系统上运行，但同时与别处的服务器通信。


  之前的图表与我们之前讨论的 OSI 模型看起来很相似。图 1-7 中的各层也是可选的；例如，我们可以将客户端和服务器进程放在同一台硬件上。位于同一台机器上意味着我们可能可以移除
  OSI 模型中的某些层，包括第一层（物理层）、第二层（数据链路层）和第三层（网络层）。我们说“可能”是因为，出于各种原因（如工具同质性或安全性），这些层可能仍然是被需要的。


  ## 客户端-服务器应用


  某些应用可能是无缝分布式的，用户甚至意识不到它是分布式的。用户将看到他们视角下的系统，如图 1-8 所示。


  ![](img/436770_2_En_1_Fig8_HTML.png)


  图 1-8


  用户视角下的系统


  为了正常运行，两个组件都必须安装，这种无缝性的复杂程度会因应用（及其使用方式）而异。


  ## 服务器分布


  客户端-服务器系统不必是简单的。基础模型是单客户端、单服务器系统，如图 1-9 所示。


  ![](img/436770_2_En_1_Fig9_HTML.png)


  图 1-9


  单客户端、单服务器系统


  然而，也可以有多客户端、单服务器的情况，如图 1-10 所示。


  ![](img/436770_2_En_1_Fig10_HTML.png)


  图 1-10


  多客户端、单服务器系统


  在这个系统中，主服务器接收请求，但不是自己逐个处理，而是将它们传递给其他服务器处理。这是一种在可能存在并发客户端时常见的模型。


  也存在单客户端、多服务器的情况，如图 1-11 所示。


  ![](img/436770_2_En_1_Fig11_HTML.png)


  图 1-11


  单客户端、多服务器系统


  这种类型的系统经常出现在一个服务器需要作为其他服务器的客户端时，例如业务逻辑服务器从数据库服务器获取信息。当然，也可能存在多客户端与多服务器的情况。


  同样，这些组件可能在也可能不在同一物理硬件上。


  ## 通信流


  前面的图表展示了系统高级组件之间的连接视图。数据将在这些组件之间流动，并且可以通过多种方式流动，下文将对此进行讨论。


  ### 同步通信


  在同步通信中，一方将发送一条消息并阻塞，等待回复。这通常是最容易实现的模型，仅依赖于阻塞 I/O。然而，可能需要存在超时机制，以防出现某种错误导致永远不会发送回复。


  ### 异步通信


  在异步通信中，一方发送一条消息后，不等待回复，而是继续进行其他工作。当回复最终到达时，再对其进行处理。这可能在另一个线程中处理，或者通过中断当前线程来处理。这类应用程序构建起来更困难，但使用起来更灵活。


  在考虑这些协议层及相关实现时，我们如何描述通信流并不总是显而易见的。例如，TCP 是同步的还是异步的？在设计网络应用时，通信流用于描述应用的逻辑（你是等待响应还是不等待响应？）。当我们向传输层（TCP）提供数据时，我们并不等待它发送和响应，我们的应用会继续运行。从这个角度来看，我们认为
  TCP 是异步的。


  ### 流式通信


  在流式通信中，一方会发送连续的消息流。在线视频就是一个很好的例子。流式传输可能需要实时处理，可能容忍也可能不容忍丢失，可以是单向的，或者允许如控制消息那样的反向通信。这就是为何
  TCP 常优先于 UDP 使用，即使这种有序性需要付出代价。


  ### 发布/订阅


  在发布/订阅系统中，各方订阅主题，而其他方则向这些主题发布消息。这可以小规模，也可以大规模，如 Twitter 这样的服务和 Kafka 这样的软件所示范的那样。设计一个包含发布/订阅功能的多层系统可以实现生产者和消费者的解耦。解耦使我们更具容错性，并通常能提高系统扩展能力（例如，增加更多生产者和消费者）。将消息存储于第三方（即远程队列）提供了这种能力。队列如何运行和扩展本身就是一个涉及分布式计算（和存储）的研究领域。


  ## 组件分布


  一种简单但有效的分解许多应用的方法是将它们视为由三部分组成：


  - 表示组件

  - 应用逻辑

  - 数据访问


  *表示组件*负责与用户的交互，包括显示数据和收集输入。它可以是具有按钮、列表、菜单等元素的现代图形用户界面，或者是较旧的、通过提问获取答案的命令行风格界面。它也可能涵盖更广泛的交互方式，例如与收银机和
  ATM 等物理设备的交互。它还可以涵盖与非人类用户的交互，比如在机器对机器系统中。在这个层面上，细节并不重要。


  *应用逻辑*负责解释用户的响应、应用业务规则、准备查询，以及管理来自第三组件的响应。


  *数据访问*组件负责存储和检索数据。这通常通过数据库实现，但并非必须如此。


  ### 高德纳分类法


  基于这种应用的三部分分解，高德纳公司考虑了在客户端-服务器系统中这些组件如何进行分布。他们提出了五种模型，如图 1-12 所示。这些模型概念化了客户端或服务器上的各种用途。虽然处于高层，但它们仍然列举了关于功能放置的多种可能性。


  ![](img/436770_2_En_1_Fig12_HTML.png)


  图 1-12


  高德纳的五种模型




  #### 示例：分布式数据库


  Gartner 模型 - 分布式数据（见图 1-13）


  ![](img/436770_2_En_1_Fig13_HTML.png)


  图 1-13


  Gartner 模型 – 分布式数据


  现代手机就是一个很好的例子。由于内存有限，它们可能在本地存储数据库的一小部分，以便通常能够快速响应。然而，如果需要的数据不在本地存储中，则可能会向远程数据库发送请求以获取额外的数据。


  `Google Maps` 是另一个很好的例子。所有地图都存储在`Google`的服务器上。当用户请求某张地图时，“附近”的地图也会被下载到浏览器中的一个小型数据库中。当用户稍微移动地图时，所需的额外数据已经在本地存储中，从而实现快速响应。


  #### 示例：网络文件服务


  Gartner 模型 - 远程数据（见图 1-14）


  ![](img/436770_2_En_1_Fig14_HTML.png)


  图 1-14


  Gartner 模型 – 远程数据


  这种分类允许远程客户端访问共享文件系统。此类系统有很多例子：`NFS`、`DCE` 等。


  #### 示例：万维网


  Gartner 分类 - 分布式事务（见图 1-15）


  ![](img/436770_2_En_1_Fig15_HTML.png)


  图 1-15


  Gartner 模型 – 分布式事务


  在万维网上，客户端可能拥有`JavaScript`（过去是`Java Applets`甚至是`Adobe Flash`）中的逻辑，而服务器则拥有`CGI`脚本或类似技术（`Ruby
  on Rails`等）中的逻辑。这是一个分布式的超文本系统，具有许多额外的机制。


  #### 示例：终端仿真


  Gartner 分类 - 远程表示（见图 1-16）


  ![](img/436770_2_En_1_Fig16_HTML.png)


  图 1-16


  Gartner 模型 – 远程表示


  终端仿真允许远程系统充当本地系统上的普通终端。`Telnet` 是最常见的例子。


  #### 示例：安全外壳


  Gartner 分类 - 分布式表示（见图 1-17）


  ![](img/436770_2_En_1_Fig17_HTML.png)


  图 1-17


  Gartner 模型 – 分布式表示


  `UNIX`上的安全外壳允许你连接到远程系统，在那里运行命令，并在本地显示结果。表示是在远程机器上准备好的，并在本地显示。在`Windows`下，远程桌面的行为类似。


  ### 三层模型


  当然，既然有两层，那就可以有三层、四层或更多层。图 1-18 展示了一些三层模型的可能性。


  ![](img/436770_2_En_1_Fig18_HTML.png)


  图 1-18


  三层模型


  现代万维网是其中最右侧模型的一个很好的例子。后端由数据库组成，通常运行存储过程来保存部分数据库逻辑。中间层是一个`HTTP`服务器，例如运行`PHP`脚本（或`Ruby
  on Rails`、`JSP`页面、`Go` `net/http`包等）的`Apache`。这将管理部分逻辑，并在本地存储诸如`HTML`页面之类的数据。前端是用于显示页面的浏览器，在部分`JavaScript`的控制下运行。在`HTML5`中，前端也可能拥有本地数据库。


  ### 胖与瘦


  组件常用的标签是“胖”或“瘦”。胖组件占用大量内存并进行复杂处理。相反，瘦组件则两者都很少做。似乎不存在“正常”大小的组件，只有胖的或瘦的！


  胖或瘦是一个相对的概念。浏览器通常被认为是瘦的，因为它们只负责显示网页。然而，我`Linux`机器上的`Firefox`几乎占用半 GB 内存，我可不认为这算小！


  ## 中间件模型


  中间件是连接分布式系统组件的“粘合剂”。这些组件是操作系统所提供功能之外的附加组件。中间件模型如图 1-19 所示。


  ![](img/436770_2_En_1_Fig19_HTML.png)


  图 1-19


  中间件模型


  中间件的组成部分包括以下内容：


  *   中间件层是一个使用网络服务的、与应用程序无关的软件。

  *   能够跨不同应用程序规范化访问和/或操作。

  *   配置（例如，安全配置文件）。


  `TCP/IP` 是通常由操作系统提供的服务的一个例子。


  ### 中间件示例


  中间件的示例包括以下内容：


  *   原始服务，如文件传输或电子邮件

  *   基本服务，如`RPC`（例如`Apache Thrift`或`gRPC`）

  *   对象服务，如`RMI`和`Jini`

  *   集成服务，如`DCE`（`分布式计算环境` – `DNS`、时间等）

  *   分布式对象服务，如`CORBA`和`OLE`/`ActiveX`（即发现服务）

  *   万维网

  *   企业服务总线


  我们使用中间件库来最大限度地减少开发自定义解决方案的需求，就像任何共享库一样，但侧重于基于网络的服务。


  ### 中间件功能


  中间件的功能可以包括以下这些：


  *   在不同计算机上启动进程

  *   会话管理

  *   允许客户端定位服务器的目录服务

  *   远程数据访问（例如，编码/解码）

  *   允许服务器处理多个客户端的并发控制

  *   安全性和完整性

  *   监控

  *   终止进程，包括本地和远程进程


  在构建自定义 Web 服务器时，也会使用“中间件”这个术语。例如，如果你想记录每个请求和/或响应到本地文件，你可以将函数（称为中间件）添加到操作栈中。当你的函数恰好利用了如前所述的网络服务时，我们就简单地称之为中间件。


  ## 处理连续体


  Gartner 模型基于将应用程序分解为表示、应用逻辑和数据处理组件。图 1-20 展示了更细粒度的分解。


  ![](img/436770_2_En_1_Fig20_HTML.png)


  图 1-20


  将应用程序分解为其表示组件




