  （一个有趣的四列版本可在 Robbie''s Garbage 的“Four Column ASCII”找到，地址为 [`https://garbagecollected.org/2017/01/31/four-column-ascii/`](https://garbagecollected.org/2017/01/31/four-column-ascii/)。）


  ASCII 最常见的编码是使用 7 位字节来表示码点，因此，例如`"A"`的编码是`65`。


  这个字符集实际上是*US ASCII*。由于欧洲人对带重音字符的需求，一些标点符号被省略以形成一个最小集合`ISO 646`，同时还存在包含适当欧洲字符的“国家变体”。Jukka
  Korpela 的网站（[`https://jkorpela.fi/chars.html`](https://jkorpela.fi/chars.html)）为有兴趣的人提供了更多信息。不过，在本书的工作中你不需要这些变体。


  ## ISO 8859


  八位位组（Octets）现在是字节的标准大小。这为 ASCII 的扩展提供了 128 个额外的码点。`ISO 8859`系列是用于捕获各种欧洲语言子集字符库的多个不同代码集。`ISO
  8859-1`也称为`Latin-1`，涵盖了西欧的许多语言，而该系列中的其他标准覆盖了欧洲其他地区，甚至包括希伯来语、阿拉伯语和泰语。例如，`ISO 8859-5`包含了俄罗斯等国家的西里尔字符，而`ISO
  8859-8`则包含希伯来字母表。


  这些字符集的标准编码是使用其码点作为 8 位值。例如，`ISO 8859-1`中的字符`"Á"`的码点是`193`，并被编码为`193`。所有`ISO 8859`系列的低`128`个值都与`ASCII`相同，因此这些字符集中的`ASCII`字符都是相同的。


  HTML 规范曾经推荐使用`ISO 8859-1`字符集。HTML 3.2 是最后一个这样做的版本，之后，HTML 4.0 推荐使用`Unicode`。2008
  年，谷歌估计在其看到的页面中，大约 20% 仍在使用`ISO 8859`格式，而 20% 仍在使用`ASCII`（参见“Unicode nearing 50%
  of the web” at [`http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html`](http://googleblog.blogspot.com/2010/01/unicode-nearing-50-of-web.html)）。更多背景信息也可参见
  [`http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/`](http://pinyin.info/news/2015/utf-8-unicode-vs-other-encodings-over-time/)
  和 [`https://w3techs.com/technologies/history_overview/character_encoding`](https://w3techs.com/technologies/history_overview/character_encoding)。




  ## Unicode


  无论是 ASCII 还是 ISO 8859，都无法覆盖基于象形文字的语言。据估计，中文大约有 20,000 个独立字符，其中约 5,000 个为常用字。这些字符需要一个以上的字节来表示，通常使用两个字节。过去曾出现过许多这样的双字节字符集：中文的
  `Big5`、`EUC-TW`、`GB2312` 和 `GBK/GBX`；日文的 `JIS X 0208` 等等。这些编码通常互不兼容。


  `Unicode` 是一个包罗万象的标准字符集，旨在覆盖所有主流字符集。它包含了欧洲、亚洲、印度以及更多其他字符集。目前版本已更新至 14.0，拥有 144,697
  个已分配字符。其码点总数为 1,114,112（分布在 17 个平面，每个平面 65,536 个码点）。这超过了 2¹⁶，对字符编码产生了重要影响。


  前 256 个码点对应 `ISO 8859-1`，而前 128 个则是 `US ASCII`。因此，它与这些主流字符集向后兼容，因为 `ISO 8859-1`
  和 `ASCII` 的码点在 `Unicode` 中完全相同。其他字符集则并非如此：例如，虽然大多数 `Big5` 字符也存在于 `Unicode` 中，但它们的码点并不相同。网站
  [`http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt`](http://moztw.org/docs/big5/table/unicode1.1-obsolete.txt)
  提供了一个（大型）映射表的示例，该表将 `Big5` 映射到 `Unicode`。


  要在计算机系统中表示 `Unicode` 字符，必须使用一种编码方式。`UCS` 编码是一种使用 `Unicode` 字符码点值的双字节编码。然而，由于 `Unicode`
  中的字符数量过多，无法全部容纳在 2 个字节中，因此该编码已过时且不再使用。取而代之的是以下几种编码：


  - `UTF-32` 是一种 4 字节编码，但并不常用，`HTML5` 明确警告不要使用它。

  - `UTF-16` 将最常见的字符编码为 2 个字节，对于“溢出”部分再增加 2 个字节，其中 `ASCII` 和 `ISO 8859-1` 保持其通常的值。

  - `UTF-8` 每个字符使用 1 到 4 个字节，其中 `ASCII` 保持其通常的值（但 `ISO 8859-1` 不是）。

  - 根据 `Unicode` 规范，`UTF-8`、`UTF-16` 和 `UTF-32` 三者之间完全可互操作。

  - `UTF-7` 有时会被使用，但不常见。


  在选择特定的 `UTF` 编码时需考虑的一些因素^(¹⁰)包括：


  - 如果需要固定宽度和单一码元访问，请使用 `UTF-32`。

  - 如果关注空间问题，请使用 `UTF-16`。

  - `UTF-8` 天然适用于序列化。


  ### UTF-8、Go 与 Rune


  `UTF-8` 是最常用的编码方式。Google 估计，在 2008 年，其扫描的页面中有 50% 使用 `UTF-8` 编码，且这一比例还在增长。`ASCII`
  字符集在 `UTF-8` 中具有相同的编码值，因此 `UTF-8` 读取器既可以读取仅由 `ASCII` 字符组成的文本，也可以读取完整的 `Unicode`
  字符集文本。


  Go 在其字符串中使用 `UTF-8` 编码的字符。每个字符的类型是 `rune`。这是 `int32` 的别名。一个 `Unicode` 字符在 `UTF-8`
  编码中最多可达 4 个字节，因此需要 4 个字节来表示所有字符。就字符而言，字符串是一个 rune 数组，每个 rune 占用 1、2 或 4 个字节。


  字符串也是一个字节数组，但你必须小心：只有对于 `ASCII` 子集，一个字节才等于一个字符。所有其他字符占用 2、3 或 4 个字节。这意味着字符串的字符长度（以
  rune 计）通常与其字节数组的长度不同。只有当字符串仅由 `ASCII` 字符组成时，两者才相等。


  以下程序片段说明了这一点。如果你对一个 `UTF-8` 字符串测试其长度，你会得到底层字节数组的长度。但如果你将字符串转换为 rune 数组 `[]rune`，那么你会得到一个
  `Unicode` 码点数组，这通常就是字符的数量：


  ```

  $ mkdir ch6

  $ cd ch6

  $ vi runeprint.go

  package main

  import "fmt"

  func main() {

  str := "百度一下, 你就知道"

  fmt.Println("String length: ", len([]rune(str)))

  fmt.Println("Byte length: ", len(str))

  }

  ch6$ go run runeprint.go

  String length:  10

  Byte length:  26

  ```


  关于字符串和 rune 的更详细解释，请参阅 Go 官方博客（[`https://go.dev/blog/strings`](https://go.dev/blog/strings)）。


  #### UTF-8 客户端与服务器


  可能令人惊讶的是，无论是在客户端还是服务器端处理 `UTF-8` 文本，你都不需要做任何特殊处理。在 Go 中，`UTF-8` 字符串的底层数据类型是字节数组，正如我们刚才所见，Go
  会负责将字符串按需编码为 1、2、3 或 4 个字节。字符串的长度就是字节数组的长度，因此你只需写入字节数组即可写入任何 `UTF-8` 字符串。


  类似地，要读取一个字符串，你只需读取到一个字节数组中，然后使用 `string([]byte)` 将数组转换为字符串。如果 Go 无法正确地将字节解码为 `Unicode`
  字符，它会给出 Unicode 替换字符 `\uFFFD`。生成的字节数组的长度是字符串合法部分的长度。


  因此，前面章节中给出的客户端和服务器可以完美地处理 `UTF-8` 编码的文本。


  #### ASCII 客户端与服务器


  `ASCII` 字符在 `ASCII` 和 `UTF-8` 中具有相同的编码。因此，普通的 `UTF-8` 字符处理同样适用于 `ASCII` 字符，无需特殊处理。


  ### UTF-16 与 Go


  `UTF-16` 处理的是由 16 位无符号短整数组成的数组。`utf16` 包就是为管理此类数组而设计的。要将一个普通的 Go 字符串（即 `UTF-8` 字符串）转换为
  `UTF-16`，你首先通过强制转换将其转换为 `[]rune` 来提取码点，然后使用 `utf16.Encode` 生成一个 `uint16` 类型的数组。


  类似地，要将一个无符号短整数 `UTF-16` 值数组解码为 Go 字符串，你需要使用 `utf16.Decode` 将其转换为类型为 `[]rune` 的码点，然后再转换为字符串。以下代码片段说明了这一点：


  ```

  ch6$ vi utf16encodedecode.go

  package main

  import (

  "unicode/utf16"

  "fmt"

  )

  func main() {

  str := "百度一下, 你就知道"

  fmt.Println("Before encoding:", str)

  runes := utf16.Encode([]rune(str))

  ints := utf16.Decode(runes)

  str = string(ints)

  fmt.Println("After encoding:", str)

  }

  ch6$ go run utf16encodedecode.go

  Before encoding: 百度一下, 你就知道

  After encoding: 百度一下, 你就知道

  ```


  客户端或服务器需要适当地应用这些类型转换来读写 16 位短整数，如下所示。


  #### 小端序与大端序


  不幸的是，`UTF-16` 背后隐藏着一个小恶魔。它基本上是一种将字符编码为 16 位短整数的编码方式。关键问题如下：对于每个短整数，如何将其写成两个字节？是高字节在前，还是低字节在前？只要接收方使用与发送方相同的约定，这两种方式都是可行的。


  `Unicode` 通过一个特殊的字符来解决这个问题，即 *BOM*（字节序标记）。这是一个零宽度的非打印字符，因此你永远不会在文本中看到它。但其值（例如 `0xfffe`）被特意选择，以便你可以判断字节顺序：


  - 在大端序系统中，它是 `FF FE`。

  - 在小端序系统中，它是 `FE FF`。


  文本有时会将 `BOM` 作为文本的第一个字符。读取者随后可以检查这两个字节，以确定使用了哪种字节序。




  #### UTF-16 客户端与服务器


  通过使用 BOM 约定，您可以编写一个服务器，在发送前添加 BOM，并以 UTF-16 格式写入字符串，如 `utf16server.go` 所示：


  ```

  ch6$ vi utf16server.go

  /* UTF16 服务器

  */

  package main

  import (

  "log"

  "net"

  "unicode/utf16"

  )

  // 警告：我们的服务器目前只支持大端序

  const BOM = ''\ufffe''

  func main() {

  service := "0.0.0.0:1210"

  tcpAddr, err := net.ResolveTCPAddr("tcp", service)

  checkError(err)

  listener, err := net.ListenTCP("tcp", tcpAddr)

  checkError(err)

  for {

  conn, err := listener.Accept()

  if err != nil {

  continue

  }

  // 例如: Ŵ 是 0x0174, Ã 是 0x00c3

  str := "Ŵj''ai arrÃªtÃ©"

  shorts := utf16.Encode([]rune(str))

  writeShorts(conn, shorts)

  conn.Close()

  }

  }

  func writeShorts(conn net.Conn, shorts []uint16) {

  var bytes [2]byte

  // 将 BOM 作为前两个字节发送

  bytes[0] = BOM >> 8             // 从 BOM 中获取 ff

  bytes[1] = BOM & 255            // 从 BOM 中获取 fe

  _, err := conn.Write(bytes[0:]) // 发送 BOM

  checkError(err)

  for _, v := range shorts {

  // 将 uint16 拆分为两个字节，然后发送

  bytes[0] = byte(v >> 8)

  bytes[1] = byte(v & 255)

  _, err = conn.Write(bytes[0:])

  if err != nil {

  return

  }

  }

  }

  func checkError(err error) {

  if err != nil {

  log.Fatalln("致命错误 ", err.Error())

  }

  }

  ```


  一个可以读取字节流、提取并检查 BOM，然后解码剩余流的客户端，如 `utf16client.go` 所示：


  ```

  ch6$ vi utf16client.go

  /* UTF16 客户端

  */

  package main

  import (

  "fmt"

  "log"

  "net"

  "os"

  "unicode/utf16"

  )

  const BOM = ''\ufffe''

  func main() {

  if len(os.Args) != 2 {

  log.Fatalln("用法: ", os.Args[0], "host:port")

  }

  service := os.Args[1]

  conn, err := net.Dial("tcp", service)

  checkError(err)

  shorts := readShorts(conn)

  ints := utf16.Decode(shorts)

  str := string(ints)

  fmt.Println(str)

  }

  func readShorts(conn net.Conn) []uint16 {

  var buf [512]byte

  // 将所有内容读入缓冲区

  n, err := conn.Read(buf[0:2]) // 从 BOM 开始

  for {

  m, err := conn.Read(buf[n:]) // 读取剩余的字节对（原本为 uint16）

  if m == 0 || err != nil {

  break

  }

  n += m

  }

  checkError(err)

  var shorts []uint16

  shorts = make([]uint16, n/2)

  // 检查字节序

  // 第一种 - 大端序 0xfffe

  // 第二种 - 小端序 0xfeff

  // 其他 - 未知

  // 内部循环每次迭代读取一个字节

  // 根据字节序，将字节按正确顺序放置

  // *警告* 我们的服务器只支持大端序

  if buf[0] == 0xff && buf[1] == 0xfe {

  for i := 2; i < n; i += 2 {

  shorts[i/2] = uint16(buf[i])<<8 + uint16(buf[i+1])

  }

  } else if buf[0] == 0xfe && buf[1] == 0xff {

  for i := 2; i < n; i += 2 {

  shorts[i/2] = uint16(buf[i+1])<<8 + uint16(buf[i])

  }

  } else {

  // 未知的字节序

  fmt.Println("未知字节序")

  }

  return shorts

  }

  func checkError(err error) {

  if err != nil {

  log.Fatalln("致命错误 ", err.Error())

  }

  }

  ```


  在不同的终端中运行服务器和客户端：


  ```

  ch6$ go run utf16server.go

  ch6$ go run utf16client.go localhost:1210

  Ŵj''ai arrÃªtÃ©

  ```


  我们看到客户端根据前两个字节确认数据是大端序还是小端序，并按需进行解码。


  如果你有冒险精神，可以将服务器的 BOM 改为小端序；你会看到客户端出现以下输出（它会正确按照小端序处理）。这是因为服务器目前只生成大端序数据。


  ```

  琁樀✀愀椀 愀爀爀쌀▯琀쌀▯

  ```


  ## Unicode 注意事项


  本书并非关于国际化 (i18n) 的专著。我们尤其不想深入探讨 Unicode 的深奥领域。但你应该了解，Unicode 并非简单的编码方式，其中存在许多复杂性。例如，一些早期字符集使用了非间距字符，尤其是用于重音符号。这一点被引入
  Unicode 后，你可以通过两种方式产生带重音的字符：作为单个 Unicode 字符，或者作为一对非间距重音符号加非重音字符。例如，`U+04D6`，即“西里尔大写字母
  IE 带短音符”，是一个单一字符。它等同于 `U+0415`“西里尔大写字母 IE”与短音符 `U+0306`“组合短音符”的组合。这有时会导致字符串比较困难，并可能成为一些极难发现的错误的根源。


  Go 实验性树中有一个名为 `golang.org/x/text/unicode/norm` 的包，可以对 Unicode 字符串进行规范化处理。它可以安装到你的
  Go 包树中：


  ```

  go get golang.org/x/text/unicode/norm

  ```


  请注意，它是“子仓库”Go 项目树中的包，可能不稳定。


  Unicode 实际上有四种标准形式。最常见的是 NFC。字符串可以通过 `norm.NFC.String(str)` 转换为 NFC 形式。下面的 `norm.go`
  程序以两种方式（单一字符形式和组合字符形式）构建字符串，并打印字符串本身、其字节，以及规范化后的形式和字节。请创建如下文件 `utfnorm.go`：


  ```

  ch6$ vi utfnorm.go

  /* UTFNorm

  */

  package main

  import (

  "fmt"

  "golang.org/x/text/unicode/norm"

  )

  func main() {

  str1 := "\u04d6"

  str2 := "\u0415\u0306"

  norm_str2 := norm.NFC.String(str2)

  bytes1 := []byte(str1)

  bytes2 := []byte(str2)

  norm_bytes2 := []byte(norm_str2)

  fmt.Println("单一字符 ", str1, " 字节 ", bytes1)

  fmt.Println("组合字符 ", str2, " 字节 ", bytes2)

  fmt.Println("规范化字符", norm_str2, " 字节 ",

  norm_bytes2)

  }

  ch6$ go mod init example.com/user/utfnorm

  ch6$ go mod tidy

  ch6$ go run utfnorm.go

  单一字符  Ӗ  字节  [211 150]

  组合字符  Ӗ  字节  [208 149 204 134]

  规范化字符 Ӗ 字节  [211 150]

  ```




  ## ISO 8859 与 Go


  `ISO 8859` 系列是一套用于欧洲不同地区及其他一些区域的 8 位字符集。它们都在低位部分共用了 `ASCII` 字符集，但在高位部分有所不同。根据谷歌的数据，`ISO
  8859` 编码约占其收录网页的 20%，但现在这一比例已经下降。


  第四个编码 `ISO 8859-4`（或称 `Latin-4`）的前 256 个字符与 `Unicode` 相同。`Latin-4` 字符的编码值在 `UTF-16`
  和默认的 `ISO 8859-4` 编码中是一致的。但这实际上帮助不大，因为 `UTF-16` 是 16 位编码，而 `ISO 8859-4` 是 8 位编码。`UTF-8`
  是 8 位编码，但它使用最高位来指示额外的字节，因此 `UTF-8` 和 `ISO 8859-4` 只重叠了 `ASCII` 子集。所以 `UTF-8` 也帮不上什么忙。这对于所有
  `8859-n`/`Latin-n` 到 `Unicode` 的编码转换都是如此。


  但是 `ISO 8859` 系列并没有复杂的问题。每个字符集中的每个字符都对应一个唯一的 `Unicode` 字符。例如，在 `ISO 8859-4` 中，字符“带反尾符的拉丁大写字母
  I”的 `ISO 8859-4` 码点为 `0xc7`（十六进制），对应的 `Unicode` 码点为 `U+012E`。在 `ISO 8859` 字符集和相应的
  `Unicode` 字符之间进行双向转换，本质上只是一个查表操作。


  从 `ISO 8859` 码点到 `Unicode` 码点的映射可以用一个包含 256 个整数的数组来实现。但其中许多映射的值与其索引相同。因此我们只使用一个映射来存储那些不同的码点，不在映射中的码点则直接取索引值。下面是一个实现此功能的示例程序。


  ```

  ch6$ vi isotounicode.go

  package main

  import (

  "fmt"

  "unicode/utf8"

  )

  func str2int(str string) []int {

  r := []rune(str)

  b := make([]int, utf8.RuneCountInString(str))

  for i, v := range r {

  b[i] = int(v)

  }

  return b

  }

  //unicode 到 8859-4

  var unicodeToISOMap = map[int]uint8{

  // 示例 匹配 ascii 0x0021: 0x21, // !

  0x012e: 0xc7, // Į

  0x010c: 0xc8, // Č

  0x0112: 0xaa, // Ē

  0x0118: 0xca, // Ę

  // 示例 匹配 0x00c9: 0xc9, // É

  // 等等更多

  }

  /* 将 UTF-8 字符串转换为 ISO 8859 编码的字节数组

  */

  func unicodeStrToISO(str string) []byte {

  // 获取 unicode 码点

  codePoints := str2int(str) //[]int(str)

  // 创建一个相同长度的字节数组

  bytes := make([]byte, len(codePoints))

  for n, v := range codePoints {

  // 检查该码点是否在异常映射表中

  iso, ok := unicodeToISOMap[v]

  if !ok {

  // 直接使用该值

  iso = uint8(v)

  }

  bytes[n] = iso

  }

  return bytes

  }

  // unicodeToISOMap 的逆映射

  var isoToUnicodeMap = map[uint8]int{

  0xc7: 0x012e,

  0xc8: 0x010c,

  0xaa: 0x0112,

  0xca: 0x0118,

  // 等等更多

  }

  func isoBytesToUnicode(bytes []byte) string {

  codePoints := make([]int, len(bytes))

  for n, v := range bytes {

  unicode, ok := isoToUnicodeMap[v]

  if !ok {

  unicode = int(v)

  }

  codePoints[n] = unicode

  }

  return fmt.Sprintf("%q == %U", codePoints, codePoints)

  }

  func main() {

  x := "ĮĘa!"

  fmt.Printf("UTF-8: %s\n", x)

  fmt.Println("unicode to 8859-4")

  b := unicodeStrToISO(x)

  fmt.Printf("8859-4(hex): %x\n\n", b)

  fmt.Println("8859-4 to Unicode")

  fmt.Printf("Unicode: %v\n", isoBytesToUnicode(b))

  }

  ```


  这些函数可用于将 `UTF-8` 字符串作为 `ISO 8859-4` 字节进行读写。通过更改映射表，你可以覆盖其他 `ISO 8859` 编码。`Latin-1`（或
  `ISO 8859-1`）是一个特例——其异常映射表为空，因为 `Latin-1` 的码点在 `Unicode` 中是相同的。你也可以将相同的技术用于其他基于表映射的字符集，例如
  `Windows 1252`。


  在上面的代码中，我们使用了一个示例输入 `ĮĘ` `a!`，其中前两个字符在我们的异常映射表中，后两个则不在（因为它们在 `Unicode` 和 `8859-n`
  中的值相同）。我们使用了 `RuneCountInString` 来帮助计算正确的符文数量。`Go` 中的字符串是字节数组；我们需要正确解码并使用我们的映射。


  ```

  ch6$ go run isotounicode.go

  UTF-8: ĮĘa!

  unicode to 8859-4

  8859-4(hex): c7ca6121

  8859-4 to Unicode

  Unicode: [''Į'' ''Ę'' ''a'' ''!''] == [U+012E U+0118 U+0061 U+0021]

  ```


  ## 其他字符集与 Go


  字符集编码非常非常多。根据谷歌的数据，这些编码在网页文档中的使用量通常很小，希望能随着时间的推移进一步减少。但如果你的软件希望覆盖所有市场，那么你可能需要处理它们。


  在最简单的情况下，一个查找表就足够了。但这并不总是奏效。字符编码 `ISO 2022` 通过使用有限状态机来换入换出代码页，从而最小化了字符集的大小。这种做法被一些日语编码所借鉴，使得事情变得非常复杂。


  `Go` 目前仅在“子仓库”包树中为这些其他字符集提供包支持。例如，包 `golang.org/x/text/encoding/japanese` 处理 `EUC-JP`
  和 `Shift JIS`。


  ## 结论


  本章的代码内容不多。相反，它介绍了一个非常复杂领域中的一些概念。这取决于你：如果你想假设每个人都使用美式英语，那么世界很简单。但如果你希望你的应用程序能被世界其他地方的人使用，你就需要关注这些复杂性。


