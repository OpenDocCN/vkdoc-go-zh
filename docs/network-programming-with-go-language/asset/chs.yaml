  \ ISO 7498-2。该标准需付费购买，但 ITU 发布了一份技术内容与其一致的文件，可从 ITU 网站获取：[`https://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items`](http://www.itu.int/rec/dologin_pub.asp?lang=e&id=T-REC-X.800-199103-I!!PDF-E&type=items)。\n\
  \n## 功能与层级\n\n安全系统所需的主要功能如下：\n\n-   认证：身份证明。\n-   数据完整性：数据未被篡改。\n-   机密性：数据不向他人泄露。\n\
  -   公证/签名：向可信第三方注册数据以备后续验证。\n-   访问控制：防止对资源的未授权访问。\n-   可用性：授权实体可按需访问。\n\n这些功能在\
  \ OSI 协议栈的以下层级是必需的：\n\n-   对等实体认证（第 3、4、7 层）\n-   数据源认证（第 3、4、7 层）\n-   访问控制服务（第\
  \ 3、4、7 层）\n-   连接机密性（第 1、2、3、4、6、7 层）\n-   无连接机密性（第 1、2、3、4、6、7 层）\n-   选择字段机密性（第\
  \ 6、7 层）\n-   流量流机密性（第 1、3、7 层）\n-   带恢复的连接完整性（第 4、7 层）\n-   不带恢复的连接完整性（第 3、4、7\
  \ 层）\n-   连接完整性选择字段（第 7 层）\n-   无连接完整性选择字段（第 7 层）\n-   源发抗抵赖（第 7 层）\n-   交付抗抵赖（第\
  \ 7 层）\n\n## 机制\n\n实现上述安全级别的机制如下：\n\n-   对等实体认证\n    -   加密\n    -   数字签名\n    -\
  \   认证交换\n-   数据源认证\n    -   加密\n    -   数字签名\n-   访问控制服务\n    -   访问控制列表\n    -\
  \   密码\n    -   能力列表\n    -   标签\n-   连接机密性\n    -   加密\n    -   路由控制\n-   无连接机密性\n\
  \    -   加密\n    -   路由控制\n-   选择字段机密性\n    -   加密\n-   流量流机密性\n    -   加密\n   \
  \ -   流量填充\n    -   路由控制\n-   带恢复的连接完整性\n    -   加密\n    -   数据完整性\n-   不带恢复的连接完整性\n\
  \    -   加密\n    -   数据完整性\n-   连接完整性选择字段\n    -   加密\n    -   数据完整性\n-   无连接完整性\n\
  \    -   加密\n    -   数字签名\n    -   数据完整性\n-   无连接完整性选择字段\n    -   加密\n    -   数字签名\n\
  \    -   数据完整性\n-   源发抗抵赖\n    -   数字签名\n    -   数据完整性\n    -   公证\n-   交付抗抵赖\n\
  \    -   数字签名\n    -   数据完整性\n    -   公证\n\n## 数据完整性\n\n确保数据完整性意味着提供一种检验数据是否被篡改的方法。通常，这是通过从数据字节中计算出一个简单数字来实现的。这个过程称为哈希，得到的结果称为哈希值或散列值。\n\
  \n一种简单的哈希算法就是将所有数据字节相加求和。然而，这种方法几乎允许任何方式的数据调整，同时仍能保持哈希值不变。例如，攻击者可以交换两个字节。这不会改变哈希值，但可能导致你欠别人\
  \ 65536 美元，而不是 256 美元。\n\n用于安全目的的哈希算法必须是“强”的，使得攻击者极难找到另一个具有相同哈希值的字节序列。这增加了攻击者按自己意图修改数据的难度。安全研究人员不断测试哈希算法，看能否破解它们——即找到一种简单方法来构造与哈希值匹配的字节序列。他们设计了一系列被认为很强且专用于密码学的哈希算法。\n\
  \nGo 语言支持多种哈希算法，包括 MD4、MD5、RIPEMD-160、SHA1、SHA224、SHA256、SHA384 和 SHA512。对于 Go 程序员而言，它们都遵循相同的模式：相应包中的函数\
  \ `New`（或类似函数）返回一个来自 `hash` 包的 `Hash` 对象。使用 `go list` 命令，我们可以查看此包及相关包：\n\n```\n\
  $ mkdir ch7\n$ cd ch7\nch7$ go list crypto/...\ncrypto\ncrypto/aes\ncrypto/cipher\n\
  crypto/des\ncrypto/dsa\ncrypto/ecdsa\ncrypto/ed25519\ncrypto/ed25519/internal/edwards25519\n\
  crypto/ed25519/internal/edwards25519/field\ncrypto/elliptic\ncrypto/elliptic/internal/fiat\n\
  crypto/hmac\ncrypto/internal/randutil\ncrypto/internal/subtle\ncrypto/md5\ncrypto/rand\n\
  crypto/rc4\ncrypto/rsa\ncrypto/sha1\ncrypto/sha256\ncrypto/sha512\ncrypto/subtle\n\
  crypto/tls\ncrypto/x509\ncrypto/x509/internal/macos\ncrypto/x509/pkix\n```\n\n哈希对象实现了\
  \ `io.Writer` 接口，你可以将待哈希的数据写入该 writer。你可以通过 `Size` 方法查询哈希值的字节数，通过 `Sum` 方法获取哈希值。\n\
  \n一个典型用例是 MD5 哈希（注意：不安全）。这使用 `md5` 包。哈希值是一个 16 字节数组。通常以四个十六进制数的 ASCII 形式打印出来，每个数由四个字节组成。一个简单的程序是\
  \ `md5hash.go`：\n\n```\nch7$ vi md5hash.go\n/* MD5Hash\n*/\npackage main\nimport\
  \ (\n\"crypto/md5\"\n\"fmt\"\n)\nfunc main() {\nhash := md5.New()\nbytes := []byte(\"\
  hello\\n\")\nhash.Write(bytes) // 将数据添加到运行中的哈希\nhashValue := hash.Sum(nil) // 检索哈希后的数据\n\
  hashSize := hash.Size() // Sum 返回的字节数\n// 对于 hashValue 中的每 4 个字节\n// 我们通过移位将它们填充到一个字节\
  \ val 中\n// val[first_byte] = hashValue[n] 左移 24 位\n// 第二和第三个字节位置分别左移 16 和 8 位...\n\
  // val[fourth_byte] = hashValue[n+3]\n// 最后，我们得到一个打印的 uint32 值\nfor n := 0; n <\
  \ hashSize; n += 4 {\nvar val uint32\nval = uint32(hashValue[n])<<24 +\nuint32(hashValue[n+1])<<16\
  \ +\nuint32(hashValue[n+2])<<8 +\nuint32(hashValue[n+3])\nfmt.Printf(\"%x \", val)\n\
  }\nfmt.Println()\n}\nch7$ go run md5hash.go\nb1946ac9 2492d234 7c6235b4 d2611184\n\
  ```\n\n如果你做一个微小的改动，比如将 `hello` 中的 `o` 改为 `0`，你会看到一个新的哈希值。\n\n```\nch$ go run md5hash.go\
  \ // 将 hello 改为 hell0 后\ncd6fcbf3 8d05a093 9006387 f0446665\n```\n\n虽然 `md5` 提供了一定的保护（例如，文件完整性），但它无法说明是谁创建或提供了该文件。HMAC\
  \ 不仅提供完整性（例如，通过 `md5`），还提供认证。消费者必须拥有相同的密钥和输入才能重新构建 HMAC。\n\n上述内容侧重于机制；`md5` 并非哈希函数中的最佳选择。一般来说，你应该选用更优的函数，例如用\
  \ `sha256` 替代 `md5`。\n\n```\n// 将 \"crypto/sha256\" 添加到 import 中\nhash := hmac.New(sha256.New,\
  \ []byte(\"secret\"))\n```\n\n将我们之前的代码改为使用 `sha256`（使用硬编码的密钥）会生成以下输出（例如，输入使用 \"\
  hello\"）：\n\n```\n171b5670 f7b4037f b90bef77 3b022130 e48100fd d40ea023 730097da\
  \ 9a68f4ff\n```\n\n除了哈希算法的选择之外，其他考虑因素还包括密钥质量（例如，大小和随机性）。尽管使用了密钥，但 HMAC 并非加密。这意味着它独立于原始数据（即未加密数据）并存。\n\
  \n`md5` 提供完整性，但碰撞意味着另一个文件（原像）可以产生相同的哈希值；因此，消息的真实性不足。HMAC 通过添加密钥提供了真实性；然而，维护密钥的真实性会引发更多问题。\n\
  \n\n## 对称密钥加密\n\n加密数据主要有两种机制。对称密钥加密使用同一密钥进行加密和解密。加密和解密双方都需知晓该密钥。我们暂不讨论密钥如何在双方之间传输（例如，`HMAC`）。\n\
  \n与哈希算法一样，有许多加密算法。如今，许多算法已被发现存在缺陷，而且随着计算机性能提升，算法通常会随时间推移而变弱。Go 语言支持多种对称密钥算法，例如 `AES`\
  \ 和 `DES`。\n\n这些算法属于 *分组* 算法，即它们对数据块进行操作。如果你的数据长度与块大小不对齐，则需要在末尾进行填充。\n\n每个算法都由一个\
  \ `Cipher` 对象表示。该对象通过相应包中的 `NewCipher` 函数创建，并将对称密钥作为参数传入。\n\n获得密码后，你就可以用它来加密和解密数据块。我们采用\
  \ `AES-128`，其密钥长度为 128 位（16 字节），块大小也为 128 位。密钥长度决定了使用哪个版本的 `AES`。演示此过程的程序是 `aes.go`：\n\
  \n```\nch7$ vi aes.go\n/* Aes\n*/\npackage main\nimport (\n\"bytes\"\n\"crypto/aes\"\
  \n\"fmt\"\n)\nfunc main() {\nkey := []byte(\"my key, len 16 b\")\ncipher, err :=\
  \ aes.NewCipher(key)\nif err != nil {\nfmt.Println(err.Error())\n}\nsrc := []byte(\"\
  hello 16 b block\")\nvar enc [16]byte\ncipher.Encrypt(enc[0:], src)\nvar decrypt\
  \ [16]byte\ncipher.Decrypt(decrypt[0:], enc[0:])\nresult := bytes.NewBuffer(nil)\n\
  result.Write(decrypt[0:])\nfmt.Println(string(result.Bytes()))\n}\nch7$ go run aes.go\n\
  hello 16 b block\n```\n\n该程序使用共享的 16 字节密钥 `\"my key, len 16 b\"`，对 16 字节数据块 `\"\
  hello 16 b block\"` 进行加密和解密。\n\n虽然我们不详细讨论哈希/认证的工作原理，但有一些注意事项，例如我们的密钥长度必须为 16、24\
  \ 或 32 字节，这反过来又用于选择相应的 `AES-128`、`AES-192` 或 `AES-256` 算法。如果使用了错误的密钥长度，将会看到 `crypto.KeySizeError`，并且如果没有处理该错误，编码操作（例如解码）将导致程序崩溃。更多信息请参见\
  \ `go doc crypto/aes.NewCipher` 和 `go doc crypto/aes.KeySizeError`。\n\n下面是一些以哈希为核心的非常流行的软件。通过这个网址，我们可以看到一份关于\
  \ Git 中为何需要从 `sha-1` 迁移到 `sha-256` 的详细历史：\n\n[`https://git-scm.com/docs/hash-function-transition/#_choice_of_hash`](https://git-scm.com/docs/hash-function-transition/#_choice_of_hash)\n\
  \n比特币也以其在区块链中利用哈希技术而闻名。以下是使用哈希的示例代码：\n\n[`https://github.com/bitcoin/bitcoin/blob/master/src/merkleblock.cpp`](https://github.com/bitcoin/bitcoin/blob/master/src/merkleblock.cpp)\n\
  \n此外，两者都使用了一种称为默克尔树的技术。Git 提交是树的顶端，比特币中的一组交易也以其为顶端。你可以在此了解更多关于这一有趣技术的信息：[`https://en.wikipedia.org/wiki/Merkle_tree`](https://en.wikipedia.org/wiki/Merkle_tree)。\n\
  \n### 公钥加密\n\n另一种主要的加密类型是公钥加密。公钥加密和解密需要 *两* 个密钥：一个用于加密，另一个用于解密。加密密钥通常以某种方式公开，以便任何人都可以用它向你加密消息。解密密钥必须保密，否则所有人都能解密这些消息！公钥系统是非对称的，不同的用途使用不同的密钥。\n\
  \n一些利用公钥相关技术的软件系统包括 `SSH`（你持有私钥，客户端和服务器都拥有公钥）和安全网站（公钥嵌入在你下载的证书中，服务器持有私钥）。这些非对称公钥用于在一段短暂的会话中生成对称密钥对。密钥只是公钥基础设施（PKI，例如密钥与证书管理结合）的一部分，这是一个庞大而有趣的话题。\n\
  \nGo 语言支持多种公钥加密系统，`RSA` 方案是其中典型的一种。\n\n生成 `RSA` 私钥和公钥的程序是 `genrsakeys.go`：\n\n```\n\
  ch7$ vi genrsakeys.go\n/* GenRSAKeys\n*/\npackage main\nimport (\n\"crypto/rand\"\
  \n\"crypto/rsa\"\n\"crypto/x509\"\n\"encoding/gob\"\n\"encoding/pem\"\n\"fmt\"\n\
  \"log\"\n\"os\"\n)\nfunc main() {\nreader := rand.Reader\nbitSize := 2048\nkey,\
  \ err := rsa.GenerateKey(reader, bitSize)\ncheckError(err)\nfmt.Printf(\"Private\
  \ key primes:\\n[0]:%s\\n[1]:%s\\n\", key.Primes[0].String(),\nkey.Primes[1].String())\n\
  fmt.Println(\"Private key exponent:\\n\", key.D.String())\npublicKey := key.PublicKey\n\
  fmt.Println(\"Public key modulus:\\n\", publicKey.N.String())\nfmt.Println(\"Public\
  \ key exponent:\\n\", publicKey.E)\nsaveGobKey(\"private.key\", key)\nsaveGobKey(\"\
  public.key\", publicKey)\nsavePEMKey(\"private.pem\", key)\n}\nfunc saveGobKey(fileName\
  \ string, key interface{}) {\noutFile, err := os.Create(fileName)\ncheckError(err)\n\
  encoder := gob.NewEncoder(outFile)\nerr = encoder.Encode(key)\ncheckError(err)\n\
  outFile.Close()\n}\nfunc savePEMKey(fileName string, key *rsa.PrivateKey) {\noutFile,\
  \ err := os.Create(fileName)\ncheckError(err)\nvar privateKey = &pem.Block{Type:\
  \ \"RSA PRIVATE KEY\",\nBytes: x509.MarshalPKCS1PrivateKey(key)}\npem.Encode(outFile,\
  \ privateKey)\noutFile.Close()\n}\nfunc checkError(err error) {\nif err != nil {\n\
  log.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n该程序使用 `gob` 序列化保存密钥和相关的证书（通过\
  \ `pem`）。它们可以通过 `loadrsakeys.go` 程序读回：\n\n```\nch7$ vi loadrsakeys.go\n/* LoadRSAKeys\n\
  */\npackage main\nimport (\n\"crypto/rsa\"\n\"encoding/gob\"\n\"fmt\"\n\"log\"\n\
  \"os\"\n)\nfunc main() {\nvar key rsa.PrivateKey\nloadKey(\"private.key\", &key)\n\
  fmt.Printf(\"Private key primes:\\n[0]:%s\\n[1]:%s\\n\", key.Primes[0].String(),\n\
  key.Primes[1].String())\nfmt.Println(\"Private key exponent:\\n\", key.D.String())\n\
  var publicKey rsa.PublicKey\nloadKey(\"public.key\", &publicKey)\nfmt.Println(\"\
  Public key modulus:\\n\", publicKey.N.String())\nfmt.Println(\"Public key exponent:\\\
  n\", publicKey.E)\n}\nfunc loadKey(fileName string, key interface{}) {\ninFile,\
  \ err := os.Open(fileName)\ncheckError(err)\ndecoder := gob.NewDecoder(inFile)\n\
  err = decoder.Decode(key)\ncheckError(err)\ninFile.Close()\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n执行创建和加载程序后，输出结果如下：\n\n```\nch7$ go run genrsakeys.go\nPrivate key primes:\n\
  [0]:1554 ... 3581\n[1]:1759 ... 6267\nPrivate key exponent:\n1034 ... 7793\nPublic\
  \ key modulus:\n2735 ... 2127\nPublic key exponent:\n\nch7$ go run loadrsakeys.go\n\
  Private key primes:\n[0]:1554 ... 3581\n[1]:1759 ... 6267\nPrivate key exponent:\n\
  1034 ... 7793\nPublic key modulus:\n2735 ... 2127\nPublic key exponent:\n\n```\n\
  \n由于长度原因，上述输出已做缩写。需要注意的是，它们生成的输出（密钥）与编码过程后加载的版本相匹配。我们尚未传输任何加密数据，只是在为这种传输做准备。\n\n\
  \n\n## X.509 证书\n\n公钥基础设施（PKI）是一个用于管理公钥集合的框架，同时包含所有者名称、位置等附加信息，以及它们之间提供某种认证机制的关联关系。\n\
  \n目前使用的主要 PKI 基于 X.509 证书。例如，网络浏览器使用它们来验证网站的身份。\n\n以下是一个示例程序，用于为我的网站生成自签名 X.509\
  \ 证书，并将其存储在 `.cer` 文件中，程序名为 `genx509cert.go`：\n\n```\nch7$ vi genx509cert.go\n/*\
  \ GenX509Cert\n*/\npackage main\nimport (\n\"crypto/rand\"\n\"crypto/rsa\"\n\"crypto/x509\"\
  \n\"crypto/x509/pkix\"\n\"encoding/gob\"\n\"encoding/pem\"\n\"fmt\"\n\"math/big\"\
  \n\"os\"\n\"time\"\n)\nfunc main() {\nrandom := rand.Reader\nvar key rsa.PrivateKey\n\
  loadKey(\"private.key\", &key)\nnow := time.Now()\nthen := now.Add(60 * 60 * 24\
  \ * 365 * 1000 * 1000 * 1000)\n// one year\ntemplate := x509.Certificate{\nSerialNumber:\
  \ big.NewInt(1),\nSubject: pkix.Name{\nCommonName:   \"jan.newmarch.name\",\nOrganization:\
  \ []string{\"Jan Newmarch\"},\n},\nNotBefore:    now,\nNotAfter:     then,\nSubjectKeyId:\
  \ []byte{1, 2, 3, 4},\nKeyUsage: x509.KeyUsageCertSign |\nx509.KeyUsageKeyEncipherment\
  \ | x509.KeyUsageDigitalSignature,\nBasicConstraintsValid: true,\nIsCA:        \
  \          true,\nDNSNames: []string{\"jan.newmarch.name\",\n\"localhost\"},\n}\n\
  derBytes, err := x509.CreateCertificate(random, &template,\n&template, &key.PublicKey,\
  \ &key)\ncheckError(err)\ncertCerFile, err := os.Create(\"jan.newmarch.name.cer\"\
  )\ncheckError(err)\ncertCerFile.Write(derBytes)\ncertCerFile.Close()\ncertPEMFile,\
  \ err := os.Create(\"jan.newmarch.name.pem\")\ncheckError(err)\npem.Encode(certPEMFile,\
  \ &pem.Block{Type: \"CERTIFICATE\", Bytes: derBytes})\ncertPEMFile.Close()\nkeyPEMFile,\
  \ err := os.Create(\"private.pem\")\ncheckError(err)\npem.Encode(keyPEMFile, &pem.Block{Type:\
  \ \"RSA PRIVATE KEY\",\nBytes: x509.MarshalPKCS1PrivateKey(&key)})\nkeyPEMFile.Close()\n\
  }\nfunc loadKey(fileName string, key interface{}) {\ninFile, err := os.Open(fileName)\n\
  checkError(err)\ndecoder := gob.NewDecoder(inFile)\nerr = decoder.Decode(key)\n\
  checkError(err)\ninFile.Close()\n}\nfunc checkError(err error) {\nif err != nil\
  \ {\nfmt.Println(\"Fatal error \", err.Error())\nos.Exit(1)\n}\n}\n```\n\n接下来，我们加载刚刚生成的加密资产，并进行基本的正确性检查，创建\
  \ `loadx509cert.go`：\n\n```\nch7$ vi loadx509cert.go\n/* LoadX509Cert\n*/\npackage\
  \ main\nimport (\n\"crypto/rsa\"\n\"crypto/x509\"\n\"encoding/gob\"\n\"fmt\"\n\"\
  log\"\n\"os\"\n)\nfunc main() {\n// load certificate so we can access embedded public\
  \ key\ncertCerFile, err := os.Open(\"jan.newmarch.name.cer\")\ncheckError(err)\n\
  derBytes := make([]byte, 1000) // bigger than the file\ncount, err := certCerFile.Read(derBytes)\n\
  checkError(err)\ncertCerFile.Close()\n// trim the bytes to actual length in call\n\
  cert, err := x509.ParseCertificate(derBytes[0:count])\ncheckError(err)\nfmt.Printf(\"\
  Name %s\\n\", cert.Subject.CommonName)\nfmt.Printf(\"Not before %s\\n\", cert.NotBefore.String())\n\
  fmt.Printf(\"Not after %s\\n\", cert.NotAfter.String())\n// load non-emdedded public\
  \ key\n// should be the same as above embedded key\npub, err := os.Open(\"public.key\"\
  )\ncheckError(err)\ndec := gob.NewDecoder(pub)\npublicKey := new(rsa.PrivateKey)\n\
  err = dec.Decode(publicKey)\ncheckError(err)\npub.Close()\n// genx509cert.go created\
  \ a public key and certificate\n// certificates also embed the public key\n// we\
  \ are comparing the public key and the embedded public key fields\n// see go doc\
  \ crypto/rsa.PublicKey for more\nif cert.PublicKey.(*rsa.PublicKey).N.Cmp(publicKey.N)\
  \ == 0 {\nif publicKey.E == cert.PublicKey.(*rsa.PublicKey).E {\nfmt.Println(\"\
  Same public key\")\nreturn\n}\n}\nfmt.Println(\"Different public key\")\n}\nfunc\
  \ checkError(err error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n\
  }\n}\n```\n\n在这里，我们可以看到证书的创建和确认的完整往返过程。\n\n```\nch7$ go run genx509cert.go\n```\n\
  \n注意证书和 pem 文件的创建。\n\n```\nch7$ go run loadx509cert.go\nName jan.newmarch.name\n\
  Not before 2021-12-26 22:51:42 +0000 UTC\nNot after 2022-12-26 22:51:42 +0000 UTC\n\
  Same public key\n```\n\n### TLS\n\n如果需要自己处理所有繁重的工作，加密/解密方案的使用就有限。目前互联网上支持加密消息传递最流行的机制是\
  \ TLS（传输层安全性），其前身为 SSL（安全套接层）。\n\n在 TLS 中，客户端和服务器使用 X.509 证书协商身份。一旦完成，它们之间会生成一个密钥，所有加密/解密都使用该密钥完成。协商过程相对较慢，但完成后，将使用更快的密钥机制。服务器*必须*拥有证书；客户端在需要时*可以*拥有证书。\n\
  \n#### 基础客户端\n\n我们首先演示如何连接到一个拥有由“知名”证书颁发机构（CA）（如 RSA）签名的证书的服务器。之前用于从 Web 服务器获取 HEAD\
  \ 信息的程序，可以调整为从 TLS Web 服务器获取 HEAD 信息。该程序是 `tlsgethead.go`。这里我们演示了 `TLS.Dial`，将在后续章节讨论\
  \ HTTPS。\n\n```\nch7$ vi tlsgethead.go\n/* TLSGetHead\n*/\npackage main\nimport\
  \ (\n\"crypto/tls\"\n\"fmt\"\n\"io/ioutil\"\n\"log\"\n\"os\"\n)\nfunc main() {\n\
  if len(os.Args) != 2 {\nlog.Fatalln(\"Usage: \", os.Args[0], \"host:port\")\n}\n\
  service := os.Args[1]\n// Dial over secure channel\nconn, err := tls.Dial(\"tcp\"\
  , service, nil)\ncheckError(err)\n_, err = conn.Write([]byte(\"HEAD / HTTP/1.0\\\
  r\\n\\r\\n\"))\ncheckError(err)\nresult, err := ioutil.ReadAll(conn)\ncheckError(err)\n\
  fmt.Println(string(result))\nconn.Close()\nos.Exit(0)\n}\nfunc checkError(err error)\
  \ {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n```\n\n\
  当我们使用 `tlsgethead.go` 客户端连接到一个合适的网站（如 `google.com`）时，会看到 HTTP HEAD 请求结果：\n\n```\n\
  ch7$ go run tlsgethead.go google.com:443\nHTTP/1.0 200 OK\nContent-Type: text/html;\
  \ charset=ISO-8859-1\nP3P: CP=\"This is not a P3P policy! See g.co/p3phelp for more\
  \ info.\"\nDate: Sun, 26 Dec 2021 23:10:40 GMT\nServer: gws\nX-XSS-Protection: 0\n\
  X-Frame-Options: SAMEORIGIN\nExpires: Sun, 26 Dec 2021 23:10:40 GMT\nCache-Control:\
  \ private\nSet-Cookie: 1P_JAR=2021-12-26-23; expires=Tue, 25-Jan-2022 23:10:40 GMT;\
  \ path=/; domain=.google.com; Secure\nSet-Cookie: NID=511=KAxTu1K-XmrjU5Pml-zP015rWWWWafskpa1bdm4Kcn96qPutrX_Ezc8-gSprT5Xo3fjkxwRdB0Am5E7LqAlQJn61VABmytAfahOauqempNg8egIAus5Ch7ypME8dnJ7VRh7Hd0F6XSViYsyHAWDcauelaxMCGRtW5RSU_Nef3UQ;\
  \ expires=Mon, 27-Jun-2022 23:10:40 GMT; path=/; domain=.google.com; HttpOnly\n\
  Alt-Svc: h3=\":443\"; ma=2592000,h3-29=\":443\"; ma=2592000,h3-Q050=\":443\"; ma=2592000,h3-Q046=\"\
  :443\"; ma=2592000,h3-Q043=\":443\"; ma=2592000,quic=\":443\"; ma=2592000; v=\"\
  46,43\"\n```\n\n其他网站可能产生不同的响应，但这个客户端依然可以成功与一个具有正确认证的服务器建立 TLS 会话。\n\n有趣的是，当我们对 `gooogle.com`\
  \ 站点（注意多了一个“o”！）运行此客户端时：\n\n```\nch7$ go run tlsgethead.go gooogle.com:443\n```\n\
  \n该站点实际上属于 Google，因为 Google 很可能购买了它以减少欺诈风险。程序抛出了一个致命错误，因为站点证书不是针对有三个“o”的 *gooogle*\
  \ 的：\n\n```\nFatal error  x509: certificate is valid for www.google.com, not gooogle.com\n\
  exit status 1\n```\n\n过去，浏览器会对这种类型的错误进行报错，现在它们有时会重定向到正确的域名。\n\n\n\n#### 使用自签名证书的服务器\n\
  \n如果服务器使用了自签名证书（例如在组织内部使用或进行实验时），Go 包将生成一个错误：`\"x509: certificate signed by unknown\
  \ authority\"`。要么必须将证书安装到客户端的操作系统中（这取决于操作系统），要么客户端必须将该证书作为根 CA 安装。我们将展示第二种方法。\n\n\
  使用 TLS 和 *任何* 证书的回声服务器是 `tlsechoserver.go`：\n\n```\nch7$ vi tlsechoserver.go\n/*\
  \ TLSEchoServer\n*/\npackage main\nimport (\n\"crypto/tls\"\n\"fmt\"\n\"log\"\n\"\
  net\"\n)\nfunc main() {\ncert, err := tls.LoadX509KeyPair(\"jan.newmarch.name.pem\"\
  ,\n\"private.pem\")\ncheckError(err)\nconfig := tls.Config{Certificates: []tls.Certificate{cert}}\n\
  service := \"0.0.0.0:1200\"\nlistener, err := tls.Listen(\"tcp\", service, &config)\n\
  checkError(err)\nfmt.Println(\"Listening\")\nfor {\nconn, err := listener.Accept()\n\
  if err != nil {\nfmt.Println(err.Error())\ncontinue\n}\nfmt.Println(\"Accepted\"\
  )\ngo handleClient(conn)\n}\n}\nfunc handleClient(conn net.Conn) {\ndefer conn.Close()\n\
  var buf [512]byte\nfor {\nfmt.Println(\"Trying to read\")\nn, err := conn.Read(buf[0:])\n\
  if err != nil {\nfmt.Println(err)\nreturn\n}\nfmt.Println(string(buf[0:]))\n_, err\
  \ = conn.Write(buf[0:n])\nif err != nil {\nreturn\n}\n}\n}\nfunc checkError(err\
  \ error) {\nif err != nil {\nlog.Fatalln(\"Fatal error \", err.Error())\n}\n}\n\
  ```\n\n如果证书是自签名的（此处正是如此），一个简单的 TLS 客户端将无法与此服务器配合使用。我们需要将一个配置作为第三个参数传递给 `tls.Dial`，该配置将我们的证书安装为根证书。感谢\
  \ Josh Bleecher Snyder 在“Getting x509: Certificate Signed by Unknown Authority”([`https://groups.google.com/forum/#!topic/golang-nuts/v5ShM8R7Tdc`](https://groups.google.com/forum/#!topic/golang-nuts/v5ShM8R7Tdc))\
  \ 中展示了如何做到这一点。然后，服务器可以与 `tlsechoclient.go` 客户端配合使用。\n\n```\nch7$ vi tlsechoclient.go\n\
  package main\nimport (\n\"crypto/tls\"\n\"crypto/x509\"\n\"fmt\"\n\"os\"\n)\nfunc\
  \ main() {\nrootPEM, err := os.ReadFile(\"jan.newmarch.name.pem\")\n// First, create\
  \ the set of root certificates. For this example we only\n// have one. It's also\
  \ possible to omit this in order to use the\n// default root set of the current\
  \ operating system.\nroots := x509.NewCertPool()\nif ok := roots.AppendCertsFromPEM(rootPEM);\
  \ !ok {\npanic(\"failed to parse root certificate\")\n}\nconn, err := tls.Dial(\"\
  tcp\", \"localhost:1200\", &tls.Config{\nRootCAs: roots,\n})\nif err != nil {\n\
  panic(\"failed to connect: \" + err.Error())\n}\n// Now write and read lots\nfor\
  \ n := 0; n < 10; n++ {\nfmt.Println(\"Writing...\")\nconn.Write([]byte(\"Hello\
  \ \" + string(n+48)))\nvar buf [512]byte\nn, _ := conn.Read(buf[0:])\nfmt.Println(string(buf[0:n]))\n\
  }\nconn.Close()\n}\n```\n\n在一个终端中运行服务器。\n\n```\nch7$ go run tlsechoserver.go\n...\
  \ listening ...\n```\n\n在另一个终端中，运行客户端。\n\n```\nch7$ go run tlsechoclient.go localhost:1200\n\
  Writing...\nHello 0\nWriting...\nHello 1\n...\nWriting...\nHello 9\n```\n\n回到服务器端，我们看到以下内容：\n\
  \n```\nAccepted\nTrying to read\nHello 0\nTrying to read\nHello 1\n...\nEOF\n```\n\
  \n我们也可以修改客户端，使其不接受自签名证书。通过将代码修改如下，结果将会不同。\n\n```\nconn, err := tls.Dial(\"tcp\"\
  , \"localhost:1200\", &tls.Config{\n//                RootCAs: roots,\nInsecureSkipVerify:\
  \ false,\n})\n// assuming the server is running with valid root certificate\nch7$\
  \ go run tlsechoclient.go localhost:1200\npanic: failed to connect: x509: \"jan.newmarch.name\"\
  \ certificate is not trusted\ngoroutine 1 [running]:\nmain.main()\n/Users/ronaldpetty/github.com/apress/network-prog-with-go-2e/ch7/tlsechoclient.go:25\
  \ +0x2bb\nexit status 2\n```\n\n在服务器端，我们看到以下错误：\n\n```\nTrying to read\nremote error:\
  \ tls: bad certificate\n```\n\n## 总结\n\n安全性本身就是一个巨大的领域，本章只是浅尝辄止。然而，主要概念已经涵盖。尚未强调的是，安全性需要在设计阶段就融入其中：事后才考虑安全措施几乎总是失败的。\n\
  \n"
- "# 8. HTTP\n\n万维网是一个拥有数百万用户的大型分布式系统。一个站点可以通过运行 HTTP 服务器成为网络主机。虽然 Web 客户端通常是使用浏览器的用户，但还有许多其他“用户代理”，例如网络爬虫、Web\
  \ 应用程序客户端等。\n\nWeb 构建在 HTTP（超文本传输协议）之上，该协议通常分层在套接字（例如 TCP）之上。HTTP 已经经历了四个公开可用的版本。版本\
  \ 1.1（第三个版本）是开发者最熟悉的版本。向 HTTP/2 的幕后过渡已经占据了当前 HTTP 流量的 60% 以上。HTTP/3 是最新的更新；由于性能优势，向这个新版本的过渡正在持续增加。\n\
  \n本章是对 HTTP 的概述，随后介绍用于管理 HTTP 连接的 Go API。\n\n## URL 和资源\n\nURL 指定了*资源*的位置。资源通常是一个静态文件，例如\
  \ HTML 文档、图像或声音文件。但越来越多地，它可能是一个动态生成的对象，也许是基于数据库中存储的信息。\n\n当用户代理请求一个资源时，返回的不是资源本身，而是该资源的某种*表示*。例如，如果资源是一个静态文件，那么发送给用户代理的是该文件的一个副本。\n\
  \n多个 URL 可能指向同一个资源，HTTP 服务器将为每个 URL 返回该资源的适当表示。例如，一家公司可能使用同一产品的不同 URL 在内部和外部提供产品信息。产品的内部表示可能包含诸如产品内部联系人员等信息，而外部表示可能包括销售该产品的商店位置。\n\
  \n这种对资源的看法意味着 HTTP 协议可以相当简单直接，而 HTTP 服务器则可能任意复杂。HTTP 必须将请求从用户代理传递到服务器并返回一个字节流，而服务器则可能需要执行任意数量的请求处理工作。\n\
  \n\n\n### i18n\n\n互联网日益国际化（i18n）引发了一些复杂问题。主机名可以采用称为 IDN（国际化域名）的国际化形式给出。为了与不支持 Unicode\
  \ 的旧有实现（如旧版邮件服务器）保持兼容，非 ASCII 域名会被映射为称为 *punycode* 的 ASCII 表示形式。例如，域名 `日本語.jp` 的\
  \ punycode 值为 `xn—wgv71a119e.jp`。例如，我们可以使用 `telnet` 来查看转换。\n\n```\n$ mkdir ch8\n\
  $ ch ch8\nch8$ telnet 日本語.jp 80\nTrying 2001:218:3001:7::110...\nConnected to xn--wgv71a119e.jp.\n\
  Escape character is '^]'.\n^]\ntelnet> quit\nConnection closed.\n```\n\n非 ASCII\
  \ 域名到 punycode 值的转换并非由 Go 的 `net` 库自动执行，但有一个名为 `golang.org/x/net/idna` 的扩展包，可用于在\
  \ Unicode 及其 punycode 值之间进行转换。关于此主题，在“Figure Out IDNA Punycode Story”([`https://github.com/golang/go/issues/13835`](https://github.com/golang/go/issues/13835))\
  \ 中正在进行讨论。\n\n我们可以针对前述域名 `日本語.jp` 尝试使用 IDNs 包；创建文件 `punycode.go`。\n\n```\nch8$ vi\
  \ punycode.go\npackage main\nimport (\n\"fmt\"\n\"golang.org/x/net/idna\"\n\"net/url\"\
  \n)\nfunc main() {\ns := \"https://日本語.jp:8443\"\nr1, _ := idna.ToASCII(s)\nr2,\
  \ _ := idna.ToUnicode(r1)\nfmt.Println(r1)\nfmt.Println(r2)\nfmt.Println(url.QueryEscape(s))\n\
  }\nch8$ go mod init example.com/user/punycode\nch8$ go mod tidy\nch8$ go run punycode.go\n\
  xn--https://-5y4qg6h355l.jp:8443\nhttps://日本語.jp:8443\nhttps%3A%2F%2F%E6%97%A5%E6%9C%AC%E8%AA%9E.jp%3A8443\n\
  ```\n\n国际化域名带来了所谓的*同形字*攻击的可能性。许多 Unicode 字符外观相似，例如俄语中的 o (U+043E)、希腊语中的 o (U+03BF)\
  \ 和英语中的 o (U+006F)。使用诸如 `google.com`（包含两个俄语 o）这类同形字的域名可能会造成混乱。已知有多种防御措施，例如始终显示 punycode（此处为\
  \ `xn—ggle-55da.com`，使用 Punycode 转换器）。\n\nURI/URL 中的路径处理起来更为复杂，因为它指向相对于某个 HTTP 服务器的路径，而该服务器可能运行在特定的本地化环境中。编码可能不是\
  \ UTF-8，甚至不是 Unicode。IRI（国际化资源标识符）通过首先将任何本地化字符串转换为 UTF-8，然后对任何非 ASCII 字节进行百分号转义来管理这一点。标题为“An\
  \ Introduction to Multilingual Web Addresses”([`https://www.w3.org/International/articles/idn-and-iri/`](https://www.w3.org/International/articles/idn-and-iri/))\
  \ 的 W3C 页面提供了更多信息。从其他编码转换为 UTF-8 在第 6 章中已介绍，而 Go 在 `net/url` 中提供了 `QueryEscape/QueryUnescape`\
  \ 函数，并在 Go 1.8 中提供了 `PathEscape/PathUnescape` 函数来进行百分号转换。\n\n### HTTP 特性\n\nHTTP\
  \ 是一种无状态、无连接、可靠的协议。在最简单的形式中，来自用户代理的每个请求都被可靠地处理，然后连接被断开。\n\n在最早的 HTTP 版本中，每个请求都涉及一个独立的\
  \ TCP 连接，因此如果需要许多资源（例如 HTML 页面中嵌入的图片），则需要在短时间内建立和拆除许多 TCP 连接。\n\nHTTP 1.1 在 HTTP\
  \ 中添加了许多优化，这增加了简单结构的复杂性，但创建了一个更高效、更可靠的协议。HTTP/2 采用了二进制形式以进一步提高效率。HTTP/3 更进一步，用 UDP\
  \ 取代了典型的 TCP 套接字，并进行了其他相关改进（例如，通过 TLS 提供内置安全性）。\n\n### 版本\n\nHTTP 有四个版本：\n\n*  \
  \ 版本 0.9 (1991)：完全过时\n*   版本 1.0 (1996)：几乎过时\n*   版本 1.1 (1999)：目前最流行的版本\n*   版本\
  \ 2 (2015)：最新版本\n*   版本 3 (~2022)：处于正式批准的最终阶段，已投入生产使用\n\n每个版本都必须理解早期版本的请求和响应。\n\n\
  #### HTTP/0.9\n\nHTTP/0.9 是 1991 年由蒂姆·伯纳斯-李定义的原始 HTTP。您可以在此处找到规范：[`https://www.w3.org/Protocols/HTTP/AsImplemented.html`](https://www.w3.org/Protocols/HTTP/AsImplemented.html)。\n\
  \n请求格式：\n\n```\nRequest = Simple-Request\nSimple-Request = \"GET\" SP Request-URI\
  \ CRLF\n```\n\n##### 响应格式\n\n响应采用以下形式：\n\n```\nResponse = Simple-Response\nSimple-Response\
  \ = [Entity-Body]\n```\n\n上述内容只是对 HTTP/0.9 的一瞥（例如，SP 代表“空格”）。由于它已不再使用，我们不再花更多时间在上面。\n\
  \n#### HTTP/1.0\n\n该版本向请求和响应中添加了更多信息。0.9 格式并未被“扩展”，而是与新版本并存。此时，W3C 和 IETF 组织的参与度更高了。HTTP/1.0\
  \ 规范可在此处找到：[`https://datatracker.ietf.org/doc/html/rfc1945`](https://datatracker.ietf.org/doc/html/rfc1945)。\n\
  \n值得注意的是，在此期间，Roy Fielding 教授因开发 REST 而闻名。他关于 REST 的论文大部分内容可在此处找到：[`https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm`](https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm)。\n\
  \n##### 请求格式\n\n从客户端到服务器的请求格式是：\n\n```\nRequest = Simple-Request | Full-Request\n\
  Simple-Request = \"GET\" SP Request-URI CRLF\nFull-Request = Request-Line\n*(General-Header\n\
  | Request-Header\n| Entity-Header)\nCRLF\n[Entity-Body]\n```\n\n`Simple-Request`\
  \ 是 HTTP/0.9 请求，并且必须由 `Simple-Response` 回复。\n\n`Request-Line` 的格式如下：\n\n```\nRequest-Line\
  \ = Method SP Request-URI SP HTTP-Version CRLF\n```\n\n其中：\n\n```\nMethod = \"GET\"\
  \ | \"HEAD\" | POST |\nextension-method\n```\n\n示例如下：\n\n```\nGET http://jan.newmarch.name/index.html\
  \ HTTP/1.0\n```\n\n##### 响应格式\n\n响应采用以下形式：\n\n```\nResponse = Simple-Response |\
  \ Full-Response\nSimple-Response = [Entity-Body]\nFull-Response = Status-Line\n\
  *(General-Header\n| Response-Header\n| Entity-Header)\nCRLF\n[Entity-Body]\n```\n\
  \n`Status-Line` 提供了关于请求处理结果的信息：\n\n```\nStatus-Line = HTTP-Version SP Status-Code\
  \ SP Reason-Phrase CRLF\n```\n\n示例如下：\n\n```\nHTTP/1.0 200 OK\n```\n\n状态行中的状态码如下：\n\
  \n```\nStatus-Code =     \"200\" ; OK\n| \"201\" ; Created\n| \"202\" ; Accepted\n\
  | \"204\" ; No Content\n| \"301\" ; Moved permanently\n| \"302\" ; Moved temporarily\n\
  | \"304\" ; Not modified\n| \"400\" ; Bad request\n| \"401\" ; Unauthorized\n| \"\
  403\" ; Forbidden\n| \"404\" ; Not found\n| \"500\" ; Internal server error\n| \"\
  501\" ; Not implemented\n| \"502\" ; Bad gateway\n| \"503\" | Service unavailable\n\
  | extension-code\n```\n\n有些状态码在 HTTP/1.0 标准发布时尚未定义。例如，203 “非权威信息” 和 303 “查看其他位置”\
  \ 是在 HTTP/1.1 中定义的。\n\n`General-Header` 通常是日期，而 `Response-Header` 是位置、服务器或认证字段。\n\
  \n`Entity-Header` 包含关于后续 `Entity-Body` 的有用信息：\n\n```\nEntity-Header = Allow\n| Content-Encoding\n\
  | Content-Length\n| Content-Type\n| Expires\n| Last-Modified\n| extension-header\n\
  ```\n\n例如（其中字段类型在 `//` 后给出）：\n\n```\nHTTP/1.1 200 OK                           \
  \  // status line\nDate: Fri, 29 Aug 2003 00:59:56 GMT         // general header\n\
  Server: Apache/2.0.40 (Unix)                // response header\nContent-Length:\
  \ 1595                        // entity header\nContent-Type: text/html; charset=ISO-8859-1\
  \ // entity header\n```\n\n\n\n#### HTTP 1.1\n\n`HTTP 1.1` 修复了 `HTTP 1.0` 的诸多问题，但也因此变得更加复杂。该版本通过扩展或完善\
  \ `HTTP 1.0` 的可用选项来实现。例如：\n\n- 增加了更多命令，如 `TRACE` 和 `CONNECT`。\n- `HTTP 1.1` 收紧了请求\
  \ URL 的规则以支持代理处理。如果请求通过代理转发，URL 应为绝对 URL，如下所示：\n\n```\nGET http://www.w3.org/index.html\
  \ HTTP/1.1\n```\n\n否则，应使用绝对路径，并且必须包含 `Host` 头部字段，如下所示：\n\n- 增加了更多属性，如 `If-Modified-Since`，同样供代理使用。\n\
  \n```\nGET /index.html HTTP/1.1\nHost: www.w3.org\n```\n\n具体变更包括：\n\n- 主机名识别（支持虚拟主机）\n\
  - 内容协商（支持多语言）\n- 持久连接（减少 TCP 开销，但非常复杂）\n- 分块传输\n- 字节范围（请求文档的部分内容）\n- 代理支持\n\n得益于万维网的普及，HTTP\
  \ 持续得到改进。`HTTP/1.1` 的初始开发始于 1997 年，一直持续到 2014 年。你可以在此找到关于 `HTTP/1.1` 的更多信息，包括原始规范以及之后对协议进行重新记录的更详细文档。\n\
  \n- 单文档（原始格式）：\n  - 原始版 (1997) – [`https://datatracker.ietf.org/doc/html/rfc2068`](https://datatracker.ietf.org/doc/html/rfc2068)\n\
  \  - 更新版 (1999) – [`https://datatracker.ietf.org/doc/html/rfc2616`](https://datatracker.ietf.org/doc/html/rfc2616)\n\
  - 详细系列（均为 2014 年版）：\n  - 消息语法与路由 – [`https://datatracker.ietf.org/doc/html/rfc7230`](https://datatracker.ietf.org/doc/html/rfc7230)\n\
  \  - 语义与上下文 – [`https://datatracker.ietf.org/doc/html/rfc7231`](https://datatracker.ietf.org/doc/html/rfc7231)\n\
  \  - 条件请求 – [`https://datatracker.ietf.org/doc/html/rfc7232`](https://datatracker.ietf.org/doc/html/rfc7232)\n\
  \  - 范围请求 – [`https://datatracker.ietf.org/doc/html/rfc7233`](https://datatracker.ietf.org/doc/html/rfc7233)\n\
  \  - 缓存 – [`https://datatracker.ietf.org/doc/html/rfc7234`](https://datatracker.ietf.org/doc/html/rfc7234)\n\
  \  - 认证 – [`https://datatracker.ietf.org/doc/html/rfc7235`](https://datatracker.ietf.org/doc/html/rfc7235)\n\
  \n#### HTTP 主要版本升级\n\n`HTTP/0.9` 协议仅有一页篇幅。`HTTP/1.0` 协议的描述约有 20 页，并包含了 `HTTP/0.9`\
  \ 协议。`HTTP/1.1` 协议长达 120 页，是对 `HTTP/1.0` 的实质性扩展，而 `HTTP/2` 大约为 96 页。`HTTP/2` 规范仅对\
  \ `HTTP/1.1` 规范进行了补充。即将完成的 `HTTP/3` 规范大约为 75 页，在传输方面增加了更多功能和改进。\n\n#### HTTP/2\n\
  \n所有早期版本的 HTTP 都是基于文本的。`HTTP/2` 最重大的不同之处在于它是一种二进制格式。为确保向后兼容性，不能通过向旧服务器发送二进制消息来判断其反应。取而代之的是，发送一条带有额外属性的\
  \ `HTTP 1.1` 消息，询问服务器是否愿意切换至 `HTTP/2`。如果服务器不理解这些额外字段，它会以正常的 `HTTP 1.1` 回复响应，会话便继续使用\
  \ `HTTP 1.1`。否则，服务器可以回复表明其愿意切换，之后会话便可继续使用 `HTTP/2`。\n\n#### HTTP/3\n\n`HTTP/3` 进一步改进了\
  \ `HTTP/2` 中开创的理念，包括：\n\n- 流多路复用\n- 逐流流量控制\n- 低延迟连接建立\n\n为了使得 HTTP 传输性能更佳，一种新的传输机制被创建出来。\n\
  \n简要对各主要协议进行比较：\n\n- `HTTP/1.1` 可在多种传输层和会话层上使用。\n- `HTTP/2` 主要用于基于 TCP 的 TLS（传输层安全性协议）之上。\n\
  - `HTTP/3` 基于一种名为 QUIC 的新传输协议，使用相同的语义。\n\n`HTTP/2` 改进了 HTTP over TCP 的缺陷，但并未与 TCP\
  \ 完全集成（例如，跨连接的拥塞控制未能统一管理）。`HTTP/3` 将 `HTTP/2` 的大部分控制功能与 TLS 合并为一个名为 QUIC 的新协议。从某种意义上说，QUIC\
  \ 合并了第 4 层和第 5 层，但运行在 UDP（第 4 层）之上。使用 UDP 使得 `HTTP/3` 能够基于现有网络运行（不过仍然存在一些担忧，例如 TCP\
  \ 流量通常经过优化，而中间路由器对 UDP 的优化较少）。\n\n即使有前述改进，网络工程师通常仍需在 `HTTP/1.1` 的领域内工作。浏览器和服务器（例如代理）的创建者将需要学习更多内容，包括\
  \ `HTTP/2` 和 `HTTP/3`。\n\n您可以在此了解有关 QUIC 传输的信息： [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-transport)。\n\
  \n您可以在此了解有关 HTTP 和 QUIC 的信息： [`https://datatracker.ietf.org/doc/html/draft-ietf-quic-http`](https://datatracker.ietf.org/doc/html/draft-ietf-quic-http)。\n\
  \n## 简单用户代理\n\n用户代理（如浏览器）发出请求并获取响应。Go 在 `net/http` 包中提供了一组用于请求和响应的类型。首先，我们来了解 `net/http.Response`。\n\
  \n### 响应类型\n\n响应类型如下所示：\n\n```\ntype Response struct {\n    Status     string //\
  \ 例如 \"200 OK\"\n    StatusCode int    // 例如 200\n    Proto      string // 例如 \"\
  HTTP/1.0\"\n    ProtoMajor int    // 例如 1\n    ProtoMinor int    // 例如 0\n    Header\
  \ Header\n    Body io.ReadCloser\n    ContentLength int64\n    TransferEncoding\
  \ []string\n    Close bool\n    Uncompressed bool\n    Trailer Header\n    Request\
  \ *Request\n    TLS *tls.ConnectionState\n}\n```\n\n以及以下辅助方法：\n\n```\nfunc (r *Response)\
  \ Cookies() []*Cookie\nfunc (r *Response) Location() (*url.URL, error)\nfunc (r\
  \ *Response) ProtoAtLeast(major, minor int) bool\nfunc (r *Response) Write(w io.Writer)\
  \ error\n```\n\n其中一些方法是为了方便使用，例如 `Cookies` 和 `Location`；另一些则用于辅助连接管理，例如 `ProtoAtLeast`\
  \ 和 `Write`。\n\n有关确切细节，请参阅文档（例如，`go doc -short net/http.Response.Body`）。\n\n我们从\
  \ `Response` 类型开始介绍，是因为 Go 提供了辅助函数来发起请求；稍后，我们将研究 `Request` 类型。\n\n\n\n### HEAD 方法\n\
  \n我们通过示例来研究这种数据结构。在 `net/http` 包中，每种 HTTP 请求类型都有其对应的 Go 函数。最简单的请求来自名为 `HEAD` 的用户代理，它用于请求关于某个资源及其\
  \ HTTP 服务器的信息。可以使用此函数发起查询：\n\n```\nfunc Head(url string) (r *Response, err error)\n\
  ```\n\n响应的状态位于响应字段 `Status` 中，而 `Header` 字段是 HTTP 响应中头部字段的映射。一个名为 `head.go` 的程序，用于发起此请求并显示结果，内容如下：\n\
  \n```\nch8$ vi head.go\n/* Head\n*/\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"\
  net/http\"\n\"os\"\n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"Usage:\
  \ \", os.Args[0], \"host:port\")\n}\nurl := os.Args[1]\nresponse, err := http.Head(url)\n\
  if err != nil {\nlog.Fatalln(err)\n}\nfmt.Println(response.Status)\nfor k, v :=\
  \ range response.Header {\nfmt.Println(k+\":\", v)\n}\n}\n```\n\n当对 `go.dev` 运行时，我们看到：\n\
  \n```\nch8$ go run head.go https://go.dev\n200 OK\nContent-Security-Policy: [connect-src\
  \ 'self' www.google-analytics.com stats.g.doubleclick.net ; default-src 'self' ;\
  \ font-src 'self' fonts.googleapis.com fonts.gstatic.com data: ; frame-ancestors\
  \ 'self' ; frame-src 'self' www.google.com feedback.googleusercontent.com www.googletagmanager.com\
  \ scone-pa.clients6.google.com www.youtube.com player.vimeo.com ; img-src 'self'\
  \ www.google.com www.google-analytics.com ssl.gstatic.com www.gstatic.com gstatic.com\
  \ data: * ; object-src 'none' ; script-src 'self' 'sha256-n6OdwTrm52KqKm6aHYgD0TFUdMgww4a0GQlIAVrMzck='\
  \ 'sha256-4ryYrf7Y5daLOBv0CpYtyBIcJPZkRD2eBPdfqsN3r1M=' 'sha256-sVKX08+SqOmnWhiySYk3xC7RDUgKyAkmbXV2GWts4fo='\
  \ www.google.com apis.google.com www.gstatic.com gstatic.com support.google.com\
  \ www.googletagmanager.com www.google-analytics.com ssl.google-analytics.com tagmanager.google.com\
  \ ; style-src 'self' 'unsafe-inline' fonts.googleapis.com feedback.googleusercontent.com\
  \ www.gstatic.com gstatic.com tagmanager.google.com ;]\nStrict-Transport-Security:\
  \ [max-age=31536000; includeSubDomains; preload]\nX-Cloud-Trace-Context: [7ba1cc2dfaeebe50e11befbb48523327]\n\
  Date: [Thu, 31 Mar 2022 23:19:03 GMT]\nServer: [Google Frontend]\nContent-Type:\
  \ [text/html; charset=utf-8]\nVary: [Accept-Encoding]\n```\n\n此响应来自我们无法控制的服务器，并且可能在途中经过其他服务器。显示的字段可能不同，当然，字段的值也会不同。以下是一些响应头部的简要说明：\n\
  \n- **Vary**：告知源服务器在选取资源表示时，除了 `\"method\"`、`Host` 和请求目标之外，还要使用哪些字段\n  - Vary 是\
  \ HTTP/1.1 的一部分 – [`https://datatracker.ietf.org/doc/html/rfc7231#section-7.1.4`](https://datatracker.ietf.org/doc/html/rfc7231#section-7.1.4)\n\
  - **Strict-Transport-Security**：服务器用来告知浏览器（客户端）使用 HTTPS 而非 HTTP\n  - 也称为 HSTS，是\
  \ HTTP 的一个附加策略 – [`https://www.rfc-editor.org/rfc/rfc6797`](https://www.rfc-editor.org/rfc/rfc6797)\n\
  - **X-Cloud-Trace-Context**：是 Google Cloud Platform 使用的追踪头部\n- **Date**：源服务器生成响应的时间\n\
  - **Server**：用于标识生成响应的软件\n  - Server 是 HTTP/1.1 的一部分 – [`https://datatracker.ietf.org/doc/html/rfc2616#section-14.38`](https://datatracker.ietf.org/doc/html/rfc2616#section-14.38)\n\
  - **Alt-Svc**：代表替代服务，允许源服务器的资源在另一个位置甚至不同的协议上权威可用\n  - 该提案可在此处找到：[`https://datatracker.ietf.org/doc/html/rfc7838`](https://datatracker.ietf.org/doc/html/rfc7838)\n\
  \  - 该提案解释了添加 `Alt-Svc` 是为了阐明资源的位置与资源标识之间的区别。在这里，我们看到它被用来解释我们可以将请求修改为 `h3` (HTTP/3)\
  \ 甚至 QUIC！\n    - `\"ma\"` 表示此位置/协议上资源可用的最大期限（max-age）。\n    - `\"v\"` 用于指示使用的协议版本，是某些仍在使用的早期\
  \ QUIC-HTTP 草案的一部分。\n- **Content-Type**：用于解析响应体\n\n虽然本书不侧重于网络的任何特定方面，主要关注 Go 的网络能力；但我们认为解释相关项目（例如上述头部）是有启发性的。\n\
  \n像 `Head` 这样的便捷函数背后有着未言明的复杂性。让我们看一下 `Head` 的文档。\n\n```\nch8$ go doc net/http.Head\n\
  package http // import \"net/http\"\nfunc Head(url string) (resp *Response, err\
  \ error)\nHead 向指定的 URL 发起一个 HEAD 请求。如果响应是以下重定向状态码之一，Head 会跟随重定向，最多重定向 10 次：\n301\
  \ (Moved Permanently)\n302 (Found)\n303 (See Other)\n307 (Temporary Redirect)\n\
  308 (Permanent Redirect)\nHead 是 DefaultClient.Head 的一个包装器\n要使用指定的 context.Context\
  \ 发起请求，请使用\nNewRequestWithContext 和 DefaultClient.Do。\n```\n\n以下是需要考虑的几个关键点：\n\n\
  - `30z` 状态码会导致重定向（即另一个请求）。\n- 存在一个默认客户端：\n\n```\nch8$ go doc net/http.DefaultClient\n\
  package http // import \"net/http\"\nvar DefaultClient = &Client{}\nDefaultClient\
  \ 是默认的 Client，被 Get、Head 和 Post 使用。\n```\n\n我们将在后续章节中学习更多关于此客户端及其相关的 `Do` 方法的内容。\n\
  \n\n\n### GET 方法\n\n通常，我们希望获取资源的表示形式，而不仅仅是获取关于它的信息。`GET` 请求可以做到这一点，可以通过以下方式完成：\n\
  \n```\nfunc Get(url string) (r *Response, finalURL string, err error)\n```\n\n响应的内容位于响应字段\
  \ `Body` 中，其类型为 `io.ReadCloser`。我们可以使用程序 `get.go` 将内容打印到屏幕上：\n\n```\nch8$ vi get.go\n\
  /* Get\n*/\npackage main\nimport (\n\"fmt\"\n\"io\"\n\"log\"\n\"net/http\"\n\"net/http/httputil\"\
  \n\"os\"\n\"strings\"\n)\nfunc main() {\nif len(os.Args) != 2 {\nlog.Fatalln(\"\
  Usage: \", os.Args[0], \"host:port\")\n}\nurl := os.Args[1]\nresponse, err := http.Get(url)\n\
  checkError(err)\nif response.StatusCode != http.StatusOK {\nlog.Fatalln(response.StatusCode)\n\
  }\nfmt.Println(\"The response header is\")\nb, _ := httputil.DumpResponse(response,\
  \ false)\nfmt.Print(string(b))\ncontentTypes := response.Header[\"Content-Type\"\
  ]\nif !acceptableCharset(contentTypes) {\nlog.Fatalln(\"Cannot handle\", contentTypes)\n\
  }\nfmt.Println(\"The response body is\")\nvar buf [512]byte\nreader := response.Body\n\
  for {\nn, err := reader.Read(buf[0:])\nif err != nil {\nif err == io.EOF {\nfmt.Print(string(buf[0:n]))\n\
  reader.Close()\nbreak\n}\ncheckError(err)\n}\nfmt.Print(string(buf[0:n]))\n}\n}\n\
  func acceptableCharset(contentTypes []string) bool {\n// each type is like [text/html;\
  \ charset=utf-8]\n// we want the UTF-8 only\nfor _, cType := range contentTypes\
  \ {\nif strings.Index(cType, \"utf-8\") != -1 {\nreturn true\n}\n}\nreturn false\n\
  }\nfunc checkError(err error) {\nif err != nil {\nlog.Fatalln(err)\n}\n}\n```\n\n\
  当 `get.go` 客户端对 Go 官网运行时，我们看到以下内容。\n\n```\nch8$ go run get.go https://go.dev\nThe\
  \ response header is\nHTTP/2.0 200 OK\nCache-Control: private\nContent-Security-Policy:\
  \ connect-src 'self' www.google-analytics.com stats.g.doubleclick.net ; default-src\
