  \n这是一个在其他版本的`Groove`上会很出色的功能，但暂时仅限于`Xbox One`。\n\n## 总结\n\n在本章中，你了解了如何将音乐存储在云端，以便通过微软的`Groove\
  \ Music`应用和`OneDrive`服务，在手机、平板、笔记本电脑甚至`Xbox One`上随时随地轻松访问。本章还介绍了第三方服务，例如`Google\
  \ Play Music`和`Dropbox`。在下一章中，你将把注意力转向在`Windows 10`上如何处理视频。\n\n\n\n### 3.  观看视频、电影和电视节目\n\
  \n到目前为止，本书主要侧重于如何播放音乐，但根据我们主持每周播客的经验，许多听众的问题都围绕着播放视频及其各种令人困惑的来源、格式和容器。人们通常不明白为什么他们从互联网下载的文件无法播放。\n\
  \n> **信息**\n> 来源包括 Netflix 等视频流服务、YouTube 等视频托管服务，以及本地或网络存储设备中的媒体。\n> 格式是视频为存储而进行编码的方式。这些通常被称为编解码器（编解码器的简称）。编解码器的例子有\
  \ MPEG、WMV 和 MP4，但还有很多其他类型。\n> 容器是造成许多困惑的原因。它们本质上是一种将一个或多个媒体文件打包以便播放的方式。\n\n例如，你可以将\
  \ DVD 视为一个容器，而且实际上 DVD 可以转换为 ISO 文件以便在 PC 上播放，但一个 DVD 可能包含多种不同类型的媒体，包括音频和视频。\n\n\
  其他媒体容器也是如此，包括流行的 MKV 容器。一个问题是，包括 Windows 10 在内的软件可能声称能播放 MKV 文件，但只有当这些容器包含它们能理解的格式的媒体时，它们才会播放。\n\
  \nWindows 10 在解决这种困惑方面已经做出了很大努力，并且我们发现它在播放一些更冷门的文件类型方面表现更好。我们发现我们下载的大多数文件都能正常播放。一个例外是\
  \ DVD 的播放功能已被移除。然而，微软现已发布了一款 Windows DVD 播放器应用（可通过 [`https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w`](https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w)\
  \ 付费获取）。第三方应用程序如 VLC（我们将在本章后面介绍）也可以帮助解决这个问题。\n\nWindows 10 还真正有助于控制观看视频流可能产生的费用，尤其是在使用按流量计费的连接（例如移动电话网络）时。\n\
  \n在本章中，你将了解使用 Windows 10 从你自己的收藏、Windows 商店、Netflix 和 YouTube 观看视频的所有不同方式。\n\n你还将了解包括\
  \ VLC 在内的其他视频应用如何帮助你观看所有不同格式的视频。\n\n最后，你将了解如何使用 Windows 10 的数据感知应用来监控和控制你在流式传输视频时使用的数据量。\n\
  \n### 电影和电视应用\n\n在本节中，我们将介绍微软在 Windows 10 中的自有视频应用。你将看到如何使用它来播放你自己的视频，以及从 Windows\
  \ 商店下载的电影和电视节目。\n\n> **信息**\n> 微软将 Windows 10 中的视频应用名称从 Windows 8 中的 Xbox 视频更改为电影和电视（或电影和电视，取决于你的区域设置）。例如，在我们所在的英国，它被称为电影和电视，因此我们将以此称呼。只需记住在你的区域它可能被命名为电影和电视。\n\
  \n### 观看已购买的电影和电视节目\n\n你从 Windows 商店购买的电影和电视节目会出现在电影和电视应用的“电影”和“电视”部分（见图 3-1）。因此，如果你进入“电影”部分，你将看到你的电影收藏；如果进入“电视”部分，你将看到你的电视节目。即使你尚未将这些节目下载到你的设备上，电影和电视节目也会显示出来。\n\
  \n![A978-1-4842-1473-2_3_Fig1_HTML.jpg](img/A978-1-4842-1473-2_3_Fig1_HTML.jpg)\n\
  \n**图 3-1.** 电影和电视应用中的“电视”部分\n\n> **注意**\n> 电影和电视应用中“电影”部分的名称也会因区域而异。因此，如果你所在的区域该应用被称为“电影和电视”，那么该部分将被命名为“电影”。\n\
  \n你可以筛选你的收藏，以显示所有视频、仅存储在设备上的视频或仅存储在云端的视频。选择“筛选”选项会弹出一个弹出菜单，你可以在其中选择偏好的选项。\n\n“所有视频”选项顾名思义，显示你所有的视频。“可离线使用”选项仅显示你已下载到设备上的视频。“流媒体”选项仅显示你已购买或租借但不在本地设备上的视频。\n\
  \n你还可以选择按添加日期或按字母顺序（A 到 Z）对收藏进行排序。\n\n点击/轻触某个项目，你将进入电影或电视节目页面（见图 3-2），在那里你可以获取有关该电影或节目的信息。如果你尚未下载该电影或节目，你可以选择播放它或下载它。如果你已经部分播放过该视频，“播放”选项将变为“继续播放”。\n\
  \n![A978-1-4842-1473-2_3_Fig2_HTML.jpg](img/A978-1-4842-1473-2_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** 电影信息\n\n如果你播放视频，它将从微软流式传输，视频不会下载到你的设备上。\n\n> **注意**\n> 这有时会让用户感到困惑，他们认为从商店购买的任何视频都将始终可以从其设备播放。除非你下载了视频，否则只有在你拥有互联网连接时才能观看。\n\
  \n下载文件会将电影或节目的副本复制到你的设备上，以便随时观看。如果你想在没有网络连接或连接速度较慢时观看电影或节目，这会很方便。例如，如果你要进行长途飞行并想在平板电脑上观看电影，你应该先下载它，这样你就可以在没有网络连接的情况下观看。\n\
  \n当你开始下载电影或电视节目时，你可以通过选择应用中的“下载”部分，然后点击/轻触左上角的“菜单”控件查看下载队列来检查下载进度。你可以从此屏幕暂停、继续或取消下载。\n\
  \n\n\n### 设置\n\n该应用提供若干有用的设置，可通过点击应用左侧的 `Settings` 按钮找到。通过 `Download Quality` 选项，您可以设置新下载内容的默认画质。默认情况下，该选项设置为“每次都问”，这意味着每次下载文件时，它都会询问您想要高清还是标清画质。您可以在选项列表中选择标清或高清来覆盖默认设置（见图\
  \ 3-3 和 3-4）。\n\n![A978-1-4842-1473-2_3_Fig4_HTML.jpg](img/A978-1-4842-1473-2_3_Fig4_HTML.jpg)\n\
  \n图 3-4. 手机上的影视应用设置\n\n![A978-1-4842-1473-2_3_Fig3_HTML.jpg](img/A978-1-4842-1473-2_3_Fig3_HTML.jpg)\n\
  \n图 3-3. 电脑上的影视应用设置界面\n\n点击“显示我已下载的设备”按钮，会列出已注册为可从您的帐户下载视频的设备。您可以通过前往要移除的设备，在设置中点击“移除此设备”来将其从列表中删除。\n\
  \n电脑版应用（图 3-3）的另一个选项是“选择我们查找视频的位置”。在这里，您可以告诉影视应用您将视频存储在电脑上的位置。默认情况下，应用会查找 `This\
  \ PC\\Videos` 文件夹，您可以通过选择 `+` 按钮来添加其他文件夹。这会打开一个文件夹对话框，您可以在其中浏览文件系统并选择一个文件夹。\n\n\
  **注意**：请记住，当我们提到电脑版时，指的是用于台式电脑以及 8 英寸及以上尺寸的一体机、笔记本电脑和平板电脑的 Windows 10 版本。小于 8 英寸的平板电脑和任何\
  \ Windows 手机均使用 Windows 10 移动版。\n\n例如，如果您的电脑上有一个存有视频的第二个硬盘驱动器（在此示例中为 `D:\\videos`），您可以执行以下操作：\n\
  \n-   选择 `+` 按钮。\n-   从文件夹框中选择 `This PC`。\n-   选择 `D:` 驱动器。\n-   选择 `Video` 文件夹。\n\
  -   点击/轻触“将此文件夹添加到视频”。该文件夹的内容将添加到应用中。\n\n您可以通过点击“选择我们查找视频的位置”对话框中的小 X 将文件夹从应用中移除。\n\
  \n**信息**：如果您从应用中移除一个文件夹，存储在该文件夹中的视频将不再显示在影视应用中。但是，这些视频不会从系统中删除，并且可以随时重新添加回来。\n\n\
  本节中的最后一个选项是“恢复我的视频购买记录”。此选项会将您之前从 Windows 商店购买的任何视频添加到应用的影视部分；它不会下载文件，但您可以将这些视频用于流式播放或下载。\n\
  \n**注意**：只有使用与您当前登录的同一 Windows 帐户进行的购买才会被恢复。不过，这些购买记录可能是在任何其他 Windows 10 设备上进行的，甚至可能是在\
  \ Windows 8 或 Xbox 设备上使用 Xbox Video 应用购买的。\n\n### 购买和租赁电影\n\n在 Windows 8 中，Xbox\
  \ Video 应用包含一个直接在应用内购买或租赁电影的选项。在 Windows 10 中，此功能已移至独立的 Windows 商店应用。\n\n如果您几年前在\
  \ Xbox 360 上使用过 Xbox Video，您可能还记得使用 Microsoft Points 作为视频的支付方式。微软已不再使用这些点数，但您需要将支付卡关联到您的\
  \ Microsoft 帐户。然后，该卡可用于从 Windows 商店购买任何内容，包括应用、音乐和视频。\n\n**信息**：不必担心；如果您的帐户中还有 Microsoft\
  \ Points 余额，当微软终止点数服务时，它们会自动转换为本地货币。\n\n当您选择一部视频（无论是电影还是电视节目）时，通常会出现购买或租赁的选项（见图\
  \ 3-5）。您可能还可以选择标清或高清画质。这些选择取决于节目或电影版权所有者对其的许可方式。\n\n![A978-1-4842-1473-2_3_Fig5_HTML.jpg](img/A978-1-4842-1473-2_3_Fig5_HTML.jpg)\n\
  \n图 3-5. Windows 商店，购买或租赁电影\n\n如果您选择租赁视频，系统会告知您视频可供播放的时长以及您必须开始观看的截止时间。如果您想保留这部电影，您应该选择购买。\n\
  \n我们已经介绍了如何使用微软自己的应用播放和购买电影及电视节目，现在让我们来看看一些第三方观看视频的方式，首先从 Netflix 开始。\n\n### 在 Windows\
  \ 10 上使用 Netflix\n\nNetflix 是一项电影和电视流媒体服务，通过按月订阅费提供广泛的内容。Netflix 提供了适用于 Windows\
  \ 10 的专用应用，可从 Windows 商店获取，并可在电脑和手机上运行。\n\n下载应用后，您需要使用您的 Netflix 帐户登录。如果您没有 Netflix\
  \ 帐户，可以访问 Netflix.com 查看订阅选项。\n\n拥有帐户后，您需要输入用户名和密码进行登录。Netflix 会显示一系列内容，您可以左右滚动浏览\
  \ Netflix 内容（见图 3-6）。\n\n![A978-1-4842-1473-2_3_Fig6_HTML.jpg](img/A978-1-4842-1473-2_3_Fig6_HTML.jpg)\n\
  \n图 3-6. Windows 10 电脑上的 Netflix\n\n当您选择一部电影（见图 3-7）或电视节目时，应用会显示该电影或节目的封面图、内容简介以及演员信息。对于电视节目，它还可能显示其他可供观看的剧集和季的信息。\n\
  \n![A978-1-4842-1473-2_3_Fig7_HTML.jpg](img/A978-1-4842-1473-2_3_Fig7_HTML.jpg)\n\
  \n图 3-7. Netflix 上的电影信息\n\n**信息**：对于没有封面图的电视节目和一些电影，将改用节目中的一个场景图代替。\n\n要开始播放，请点击/轻触封面图上的播放图标，应用便会开始播放。您还可以选择将电影或电视节目添加到您的个人列表。点击/轻触\
  \ `Add to My List` 按钮可将该标题添加到您的列表中，您可以从应用首页查看该列表。您可以用此功能来构建一个未来想看的电影和电视节目清单。\n\n\
  **信息**：列表的一个好处是它们会在您的所有 Netflix 应用中同步，因此您可以在手机上将一个电影添加到列表，然后它就会出现在您的电脑和 Xbox 上。\n\
  \n您还可以通过选择搜索框并输入搜索词来搜索电影标题、电视节目或演员。然后您可以浏览搜索结果并选择您想要的标题。\n\nNetflix 的另一个不错的功能是您可以为使用您帐户的每个家庭成员创建个人资料，这样您可以为自己和您的孩子分别创建不同的资料。这样一来，Netflix\
  \ 可以根据每个人的观看记录来推荐内容。\n\n当您在 Netflix 上开始观看内容时，它会记住您在电影或电视节目中的播放进度，因此如果您决定停止观看一部电影并稍后再看，它会从您上次停下的地方继续播放。此功能在包括手机、智能电视和媒体播放器设备在内的所有设备上也都能同步，因此您可以在电脑上开始观看，在手机上继续，最后在\
  \ Xbox One 上观看完毕。\n\n**苹果或安卓手机用户**：Netflix 也会在您停止时记住您的进度，并在各设备间共享此信息，这意味着您可以例如在手机上开始观看，然后在您的\
  \ Windows 10 设备或其他设备（如 PlayStation 3 或 4 或智能电视）上继续播放。\n\n\n\n### 观看 YouTube 视频\n\
  \n另一个绝佳的视频来源是 YouTube，你可以在上面观看各种视频，包括萌猫视频、音乐视频、教学视频甚至完整电影。\n\n要在 Windows 10 上观看\
  \ YouTube 视频，只需打开 Microsoft Edge 浏览器，然后在地址栏中输入 `YouTube.com`。\n\n> **信息**  \n> Microsoft\
  \ Edge 是 Windows 10 上取代 Internet Explorer 的新默认浏览器。如果你习惯寻找字母 `e` 图标来找到浏览器，不必担心，因为\
  \ Edge 使用的图标与之类似。\n\n你可以在搜索框中输入搜索词，YouTube 会显示匹配的结果列表。\n\n> **注意**  \n> Windows\
  \ 10 上的 YouTube 网站，其运行方式与其它 Windows 版本乃至其它操作系统上的完全相同。如果你以前用过，那么在 Windows 10 上也会感到很熟悉。\n\
  \n现在，你已经了解了如何使用内置的“电影和电视”应用播放视频，以及如何从 Netflix 和 YouTube 这两个最流行的在线服务播放视频。但是，如果你想观看自己的视频呢？嗯，你可以使用“电影和电视”应用，但如果你想要对播放有更多控制，或者“电影和电视”应用不支持你的特定格式，那该怎么办？在下一节中，我们将介绍一些可能有帮助的第三方应用。\n\
  \n## 其它视频应用\n\n你已经看到，Windows 10 内置的播放选项相当不错，但根据我们多年解答听众关于冷门格式问题的经验来看，总会有一些视频文件是\
  \ Windows 本身无法播放的。\n\n幸运的是，第三方开发者通常会迅速填补这些空白。你可以在 Windows 应用商店中找到大量视频播放应用。虽然其中许多应用要么功能有限、要么绑定特定的媒体服务器、或者质量不佳，但有一个名为\
  \ VLC 的应用，我们觉得非常有用。接下来我们将会介绍它。\n\n### VLC\n\n应用商店中还有许多适用于 Windows 10 的其他视频应用，但有一个应用因其最实用、功能最多而脱颖而出，它就是\
  \ VLC。VLC 是一个开源项目，其应用有适用于 iOS、Android、Mac、Linux 和 Windows 的版本。\n\nWindows 10 版本可从\
  \ Windows 商店免费获取，并适用于 Windows PC 和移动设备。VLC 的主要优势之一是它能够播放多种文件格式和视频类型，其中一些是 Windows\
  \ 默认的“电影和电视”应用无法播放的。\n\n要开始使用此应用，请转到 Windows 商店，在搜索框中输入 `VLC`。搜索结果会显示该应用（图标是一个交通锥）；选中它，然后选择“安装”，即可将应用安装到你的设备上。\n\
  \n安装完成后，你可以从“所有应用”列表中找到 VLC 并加载它。\n\n加载 VLC 时，它会自动在你的设备中搜索视频和音乐，这样你就可以通过 `home`（主页）、`videos`（视频）、`music`（音乐）和\
  \ `file explorer`（文件资源管理器）标签页浏览你的媒体库（参见图 3-8）。\n\n![A978-1-4842-1473-2_3_Fig8_HTML.jpg](img/A978-1-4842-1473-2_3_Fig8_HTML.jpg)\n\
  \n**图 3-8.** Windows 10 上的 VLC\n\n在 PC 上，音乐文件夹的默认位置是 `This PC\\Music`，视频内容的默认位置是\
  \ `This PC\\Videos`。如果你想向媒体库中添加文件夹，请选择屏幕顶部菜单栏上的向下箭头按钮，然后选择“设置”按钮。\n\n要添加文件夹到音乐库，请在“设置”窗格的“音乐库”部分选择“添加新文件夹”按钮（见图\
  \ 3-9）。浏览到所需文件夹，然后点击“添加”按钮。VLC 就会将该文件夹的内容添加到你的音乐收藏中。\n\n![A978-1-4842-1473-2_3_Fig9_HTML.jpg](img/A978-1-4842-1473-2_3_Fig9_HTML.jpg)\n\
  \n**图 3-9.** 在 VLC 中添加新文件夹\n\n要添加包含视频的文件夹到你的媒体库，请在“设置”窗格的“视频”部分选择“添加新文件夹”按钮。浏览到所需文件夹，然后选择“添加”按钮。VLC\
  \ 就会将该文件夹的内容添加到你的视频收藏中。\n\nVLC 应用分为四个部分：`home`（主页）、`videos`（视频）、`music`（音乐）和 `file\
  \ explorer`（文件资源管理器）（参见前面的图 3-8）。\n\n#### 使用 VLC 播放音乐\n\n`home`（主页）标签页会根据你观看或收听内容的频率以及是否将文件标记为收藏，将你的音乐和视频收藏合并到一个视图中。\n\
  \n`music`（音乐）标签页提供按艺术家、专辑、歌曲或播放列表排序（通过左上角的下拉列表查看）展示收藏的选项。\n\n当您设置为艺术家（Artists）模式查看时（图\
  \ 3-10），您会看到设备上来自这些艺术家的音乐。您可以选择一位艺术家，以显示其所有的专辑和音乐。当你选择一位艺术家时，会出现一个“全部播放”（Play All）按钮，可以播放该艺术家的所有音乐。还有一个“固定”（Pin）按钮，可以将该艺术家固定到\
  \ Windows 开始屏幕，以便稍后快速访问。工具栏上还有一个日历图标，用于搜索该艺术家的即将到来的演出。\n\n![A978-1-4842-1473-2_3_Fig10_HTML.jpg](img/A978-1-4842-1473-2_3_Fig10_HTML.jpg)\n\
  \n**图 3-10.** 艺术家模式下的 VLC\n\n此外，当你选择一位艺术家时，会显示该艺术家的专辑。选择某个专辑会进入专辑视图，其中列出了专辑中的歌曲。你可以点击/轻触一首歌开始播放。\n\
  \n如果你想收听整张专辑，可以选择“播放专辑”（Play album）按钮。此视图中的其它选项有：“固定”（Pin）按钮，用于将专辑固定到 Windows 开始屏幕；一个收藏按钮，你可以用来将专辑添加到收藏夹；还有一个“添加到播放列表”（Add\
  \ to playlist）按钮。当你选择“添加到播放列表”时，会弹出播放列表屏幕。在文本框中，你可以输入新的播放列表名称并点击“添加”。它还会显示你已有的播放列表，你可以选择将专辑添加到其中。\n\
  \n当你选择专辑（Albums）视图时，VLC 会按专辑列出你的音乐。点击/轻触一个专辑，会打开专辑信息屏幕（如前所示）。\n\n歌曲（Songs）视图按字母顺序列出你设备上的所有歌曲。通过点击/轻触选择一首歌即可开始播放。\n\
  \n播放列表（Playlist）视图显示你已创建的播放列表。点击/轻触一个播放列表，会打开播放列表菜单，其中有两个选项：“删除”（Delete）或“全部播放”（Play\
  \ all）。\n\n还有一个“新建播放列表”（New Playlist）按钮，允许你创建一个新的播放列表。\n\n当你使用 VLC 播放音乐时，会看到一个设计精良的“正在播放”屏幕（图\
  \ 3-11），你可以通过“上一首”、“暂停/播放”和“下一首”按钮来控制播放。你还可以打开或关闭“随机播放”（Shuffle）模式，该模式会随机顺序播放歌曲。另一个选项是“分享”（Share）按钮；通过它你可以通过\
  \ Windows 应用（如 Twitter、Facebook 和 OneNote）分享歌曲（应用会分享一个 `last.fm` 链接）。\n\n![A978-1-4842-1473-2_3_Fig11_HTML.jpg](img/A978-1-4842-1473-2_3_Fig11_HTML.jpg)\n\
  \n**图 3-11.** VLC 中的“正在播放”屏幕\n\n另外两个选项是收藏按钮和播放列表按钮。收藏按钮会将当前正在播放的歌曲添加到你的收藏夹，而播放列表按钮会显示你当前播放列表中有哪些歌曲。\n\
  \n\n\n#### 使用 VLC 播放视频\n\n在 VLC 中选择“视频”选项卡时，您将看到设备上存储的视频集。左侧有一个下拉菜单，您可以在其中选择`视频`、`节目`或`相机胶卷`。\n\
  \n`视频`显示您的电影集，`节目`显示您的电视节目，而`相机胶卷`显示由设备相机拍摄的视频。\n\n播放视频时（图 3-12），点击或轻触屏幕即可调出视频传输控制，您可以移动滑块跳转到正在播放视频的任意位置。\n\
  \n![A978-1-4842-1473-2_3_Fig12_HTML.jpg](img/A978-1-4842-1473-2_3_Fig12_HTML.jpg)\n\
  \n图 3-12. VLC 中的视频播放\n\n“当前播放”屏幕上的其他控制包括一个锁定按钮，用于停用当前播放按钮。下一个按钮提供切换音轨、开启字幕以及选择字幕文件的选项。“音轨”按钮使您能够从不同的音轨中进行选择。（某些电影和电视节目含有多条音轨，您可在此处进行选择。）\n\
  \n**信息**\n\n音轨除了提供不同语言版本外，其主要用途之一还在于导演评论。\n\n字幕按钮使您能够在视频中显示字幕（并非所有视频都带有字幕）。\n\n\
  如果您有与视频存放位置不同的字幕文件，可以使用`选择字幕`选项来浏览并选择字幕文件（通常是 `.srt` 文件）。\n\n同样在“当前播放”视图中，您可以更改视频的播放方式，标有三个点的按钮会弹出一个速度选项，您可以在此增加或降低视频的播放速度。\n\
  \n如需返回主视图，请选择屏幕右上角的`返回`按钮。\n\n#### 文件管理器\n\nVLC 中的另一个视图称为“文件”（见图 3-13）。这使您可以浏览设备上的音乐和视频。有一个下拉选项，您可以在其中选择音乐、视频或文件。\n\
  \n![A978-1-4842-1473-2_3_Fig13_HTML.jpg](img/A978-1-4842-1473-2_3_Fig13_HTML.jpg)\n\
  \n图 3-13. VLC 中的文件\n\n当选择“音乐”时，您可以浏览应用正在监听的音乐文件夹（有关受监控文件夹的信息，请参阅本节第一部分）。如果选择“视频”，它将显示您视频文件夹中的文件。然后您可以选择一个希望\
  \ VLC 播放的文件。\n\n如果您选择了一个额外的驱动器（例如 SD 卡或外置硬盘），则可以浏览外部来源中的媒体文件。\n\n#### 其他选项\n\nVLC\
  \ 在菜单栏中还提供了一些其他选项。选择标题栏中的菜单按钮以显示这些选项。\n\n有一个`文件`按钮，使您能够浏览本地电脑文件系统或手机文件系统中的任意位置的媒体文件。当您选择一个文件后，VLC\
  \ 将开始播放它。\n\n`流`按钮会打开一个输入框，您可以在其中键入或粘贴音乐或视频流的 URL。\n\n在撰写本文时，VLC 仍在开发中，因此未来可能会增加更多功能。它是一款值得添加到您的收藏中的应用。\n\
  \n### 商店中的其他应用\n\n虽然 Windows 商店中有大量其他视频应用，但其中许多仅仅是网页上电影或节目的链接，或者专门与某种服务器产品关联（例如，我们将在第\
  \ 6 章中介绍的 Emby）。大多数商店应用都提供试用版，我们始终建议您在购买前先试用。\n\n另一个值得注意的视频应用是 `PressPlay`，这是一款适用于\
  \ Windows 10 的视频播放器，可以播放可移动设备上的媒体。它可以播放 MKV 文件和 FLV（Flash 视频），并支持字幕。该应用可从 Windows\
  \ 商店免费获取。\n\n现在，您已经了解了如何播放自己的视频文件，以及如何使用微软自带的应用程序和流行的第三方服务（如 Netflix 和 YouTube）来流式播放电影。但是，您可能听说过有人带手机出国后产生巨额账单，或者仅仅因为超出家庭宽带限额而被收费。在下一节中，我们将解释\
  \ Windows 10 如何帮助您避免此类意外费用。\n\n## 使用流量感知应用\n\n如果您在按流量计费的移动设备上使用 Windows 10，Windows\
  \ 10 提供了一个应用来帮助您避免来自移动运营商的高额账单。这对于可能消耗大量带宽的视频应用尤其有用。\n\n移动版和桌面版在操作系统的“设置”部分都有一个名为`数据使用量`的选项。这个应用，也称为`流量感知`，会显示已消耗的数据量以及哪些应用在使用数据。\n\
  \n转到“设置”（可从“开始”菜单访问），在“网络和无线”（在电脑上为“网络和 Internet”）部分，您将看到“数据使用量”部分（见图 3-14）。\n\n\
  ![A978-1-4842-1473-2_3_Fig14_HTML.jpg](img/A978-1-4842-1473-2_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 流量感知概览\n\n在`概览`中（图 3-14），该应用会向您显示通过移动连接消耗了多少数据，以及通过 Wi-Fi 使用了多少数据。\n\n\
  要找出哪些应用使用了数据，请选择“使用详情”。\n\n在“应用使用情况”部分（图 3-15），该应用会显示每个应用使用的数据量，从使用数据最多的应用开始列在列表顶部。\n\
  \n![A978-1-4842-1473-2_3_Fig15_HTML.jpg](img/A978-1-4842-1473-2_3_Fig15_HTML.jpg)\n\
  \n图 3-15. 流量感知中的应用使用情况\n\n使用此应用，您可以查看是观看 Netflix 用完了您所有的数据，还是流式播放音乐占用了您所有的额度。\n\n\
  ## 总结\n\n现在，您已经了解了使用 Windows 10 从您自己的收藏、Windows 商店、Netflix 和 YouTube 观看视频的所有不同方式。\n\
  \n您还探索了其他视频应用（尤其是 VLC）如何帮助您观看各种不同格式的视频。最后，我们演示了如何使用 Windows 10 的`流量感知`应用来防止在流式播放视频时产生意外账单。\n\
  \n我们许多人家庭网络中可能既有 Windows 10 设备，也有较旧的设备；在下一章中，您将了解如何利用 Windows 7 和 8 设备以及 Windows\
  \ 10 上的媒体存储，在家中的各个位置进行流式播放。\n\n"
- '# 4. 从 Windows 设备流式播放您的媒体收藏


  我们在《数字生活方式》节目中经常被问到的一个问题是如何将音乐和视频发送到家中的其他电脑。例如，这可能涉及将音乐从您的主电脑发送到另一房间连接到音响的网络电脑，或者将视频从电脑发送到卧室的平板电脑。这通常被证明颇具挑战性。在本章中，您将了解较旧版本和
  Windows 10 如何应对这一挑战。


  借助 Windows 10，您可以访问家中其他 Windows 设备（即使它们运行的是较旧版本的 Windows）上存储的音乐和视频。在本章中，您将学习如何设置
  Windows 7、Windows 8.1 和 Windows 10，以便向您的 Windows 10 设备提供内容。


  有几种不同的选项可用于连接到 Windows 电脑；我们将介绍如何设置文件共享、使用 Windows 家庭组以及使用 Windows Media Player
  充当服务器。


  **信息**


  家庭组和网络共享在 Windows 7（及 Windows Home Server）、Windows 8.1 和 Windows 10 上的工作方式大致相同，因此这些说明适用于您所使用的任何平台。




  '
- '# 设置家庭组


  Windows 7、Windows 8.1 和 Windows 10 具备一个名为家庭组的简单网络功能。家庭组是一种基于密码的系统，你可以在网络中的一台电脑上创建家庭组密码，然后在其他电脑、笔记本电脑和平板电脑上加入该组。


  那么，要在 Windows 中开始使用家庭组，请打开`文件资源管理器`（在 Windows 7 和 Windows 8.1 中称为`Windows 资源管理器`），在左侧“收藏夹”和“OneDrive”下方，你会看到一个`家庭组`链接（图
  4-1）。点击它，如果你尚未在网络中创建家庭组，则可以创建一个。


  ![A978-1-4842-1473-2_4_Fig1_HTML.jpg](img/A978-1-4842-1473-2_4_Fig1_HTML.jpg)


  图 4-1. 设置家庭组


  提示


  如果你没有看到`家庭组`链接，可能是因为你当前的网络被设置为公用网络，Windows 会通过关闭某些共享功能来保护你的电脑。点击`网络`链接，你可能会看到一个黄色横幅，显示“网络发现和文件共享已关闭。网络计算机和设备不可见。请点击更改…”。


  如果你确定自己位于家庭网络中，则可以在专用网络上启用网络发现。为此，请点击黄色横幅并选择“启用网络发现和文件共享”。


  然后，一个对话框（图 4-2）会询问你是否要为所有公用网络启用网络发现和文件共享。这将在所有公用网络（例如咖啡馆的公共 Wi-Fi）上启用网络访问，这不是一个好主意，因此你应该选择`否`选项，该选项仅将你当前的网络切换为专用模式，之后你就能访问家庭组和其他网络共享了。


  ![A978-1-4842-1473-2_4_Fig2_HTML.jpg](img/A978-1-4842-1473-2_4_Fig2_HTML.jpg)


  图 4-2. 网络发现


  当你点击“创建家庭组”时，Windows 会启动一个向导，引导你完成创建组的过程。点击“创建家庭组”后，单击`下一步`启动向导。


  你看到的第一个选项是，你想要与该组中的其他电脑共享哪些文件夹和设备（图 4-3）。


  ![A978-1-4842-1473-2_4_Fig3_HTML.jpg](img/A978-1-4842-1473-2_4_Fig3_HTML.jpg)


  图 4-3. 选择要在家庭组中共享的内容


  默认情况下，会共享图片、视频、音乐、打印机和设备，但“文档”文件夹不会共享。你可以点击每个库的下拉选项来更改设置。由于你将使用家庭组进行媒体共享，因此需要共享视频和音乐；点击`下一步`进入下一个屏幕。


  设置的最后一个部分会为你提供一个家庭组密码（图 4-4）。这是你回到 Windows 10 电脑时需要使用的密码，因此请记下密码（或打印出来），然后点击`完成`。


  ![A978-1-4842-1473-2_4_Fig4_HTML.jpg](img/A978-1-4842-1473-2_4_Fig4_HTML.jpg)


  图 4-4. 创建家庭组时显示的密码


  如果你已经创建了家庭组，那么只要你知道密码，就可以开始使用了。当你回到 Windows 10 电脑时，会需要用到它。


  提示


  要查看已创建的家庭组密码，你可以前往`Windows 资源管理器`中的`家庭组`链接，右键点击并选择“查看家庭组密码”。


  如果你右键点击`家庭组`链接并选择`更改家庭组设置`，你还可以选择更改家庭组密码（图 4-5）。


  ![A978-1-4842-1473-2_4_Fig5_HTML.jpg](img/A978-1-4842-1473-2_4_Fig5_HTML.jpg)


  图 4-5. 家庭组设置


  在本章稍后的部分，你将了解如何访问家庭组文件夹中的文件。


  '
- '# 设置文件共享


  你还可以选择与其他电脑共享单个文件夹。在 Windows 中，你可以通过使用`文件资源管理器`导航到要共享的文件夹来执行此操作。


  信息


  虽然与家庭组成员共享文件夹更容易，但稍后你将在这部分看到如何与非家庭组成员的电脑共享。


  右键点击文件夹并选择“共享”。如果你已经设置了家庭组，你将看到“共享给家庭组 (查看)”和“共享给家庭组 (查看和编辑)”选项。


  如果你选择“共享给家庭组 (查看)”，Windows 会将该文件夹添加到使用你的家庭组的电脑可访问的文件夹中；你不必设置特殊的密码或用户名。家庭组中的其他电脑将能够读取该文件夹的内容，但无法进行任何更改。如果你希望他们有权进行更改，则应选择“共享给家庭组
  (查看和编辑)”。


  此菜单上的其他选项包括`停止共享`和`特定用户`。如果你选择`停止共享`，其他电脑将无法再访问该文件夹。


  注意


  `停止共享`仅在文件夹已共享时才会出现。


  如果你选择`特定用户`，则可以添加一个用户帐户家庭组来使用此选项。


  该对话框（图 4-6）显示当前有权访问该文件夹的用户帐户，你可以在用户名框中输入你想要共享对象的用户名/电子邮件帐户。


  ![A978-1-4842-1473-2_4_Fig6_HTML.jpg](img/A978-1-4842-1473-2_4_Fig6_HTML.jpg)


  图 4-6. 与特定用户共享文件


  注意


  请记住，这仅是与网络上的其他电脑共享，而非通过互联网共享。要做到后一点，你需要使用诸如 OneDrive 之类的工具。


  你添加的名称必须是电脑上的现有用户，你才能选中他们。因此，如果 Ian 想要与他电脑上的 Garry 共享一个文件夹，Garry 需要在 Ian 的电脑上拥有一个帐户。其他选项包括`所有人`和`家庭组`。`所有人`意味着网络上的任何其他电脑都能访问该文件夹，即使它们不是家庭组的一部分，这对于包含个人数据的文件夹来说并不理想，但对于媒体文件夹来说是可以的。当你选择某个人或`所有人`时，你还可以设置访问权限。`只读`让他们有权读取文件夹内容，而无法进行任何更改。`读取/写入`则让他们有权读取和更改文件夹内容。


  现在，你已经了解了如何在整个网络中共享文件与文件夹，但如果你想将媒体直接发送到另一台设备呢？在下一节中，你将了解如何实现这一操作。




  '
- '# 设置 Windows Media Player


  如果你只想在电脑之间共享音乐和视频，另一种方法是设置媒体服务器。你将在下一章了解两个用于此目的的最佳第三方系统。但对于简单的流媒体播放，你可以使用内置的 `Windows
  Media Player`。


  虽然 `Windows Media Player`（图 4-7）是一个相对古老的程序，而且对于听音乐来说，现代的 `Groove Music` 应用要好得多，但
  `Windows Media Player` 可用于向网络上的其他设备提供内容，以及收听家中其他设备上存储的音乐。


  ![A978-1-4842-1473-2_4_Fig7_HTML.jpg](img/A978-1-4842-1473-2_4_Fig7_HTML.jpg)


  图 4-7.


  Windows 10 中的 `Windows Media Player`


  首先，我们来看一下如何设置媒体共享。


  Windows 7、Windows 8.1 和 Windows 10 都内置了 `Windows Media Player`，可以通过点击搜索框并输入 `Windows
  Media Player` 来找到它。


  当你首次加载 `Windows Media Player` 时，它会询问是使用推荐设置还是自定义设置。现在，请选择“推荐”（如果你愿意，稍后可以自定义设置）。该程序会搜索你的“音乐”和“视频”库中的音乐和视频。如果你的媒体文件位于不属于“音乐”或“视频”库的文件夹中，那么将它们添加到
  `Windows Media Player` 中最简单的方法就是将该文件夹添加到相应的库中。


  **提示**


  将文件夹添加到库中很容易。使用 `文件资源管理器`，右键点击该文件夹，选择“包含到库中”，然后选择相应的内容类型（例如，音乐文件夹选择“音乐”，视频文件夹选择“视频”）。将内容添加到库后，`Windows
  Media Player` 会自动索引这些媒体，并在应用中显示出来。


  下一步是在 `Windows Media Player` 中开启媒体流。点击“流”菜单项。如果你已经设置了家庭组（前面讨论过），你的媒体库将与家庭组中的其他设备共享。如果你尚未加入家庭组，该选项将显示为“启用媒体流”（图
  4-8）。


  ![A978-1-4842-1473-2_4_Fig8_HTML.jpg](img/A978-1-4842-1473-2_4_Fig8_HTML.jpg)


  图 4-8.


  在 `Windows Media Player` 中启用媒体流


  当你启用媒体流时，`Windows Media Player` 会弹出一个确认对话框，你需要点击“启用媒体共享”。


  下一个屏幕让你控制哪些设备可以访问你的共享库。默认情况下，本地网络上的设备是被允许的。如果你想要明确允许选定的设备，可以取消选中“此电脑上的媒体程序和远程连接...”选项，然后选择你想要授予访问权限的机器。


  你还可以为你的库命名；点击“下一步”完成设置。


  完成此操作后，这台机器上 `Windows Media Player` 中的音乐将可供你运行 `Windows Media Player` 的其他设备使用。


  现在，你已经了解了如何使用家庭组、文件共享以及在 `Windows Media Player` 中进行媒体共享来共享文件。在下一节中，你将看到如何访问这些共享媒体。


  '
- '# 从 PC 访问存储在 Windows 7、8.1 和 10 上的内容


  在你的 Windows 7、Windows 8.1 和 Windows 10 机器上设置好媒体共享后，你就可以在 Windows 10 电脑、笔记本电脑、平板电脑和手机上访问这些内容了。如何操作取决于你共享媒体的方式。我们先从通过家庭组共享的媒体开始。


  ### 使用家庭组访问媒体


  在家庭网络上设置好家庭组后，你可以在 Windows 10 电脑上加入该网络，然后访问存储在其他电脑上的音乐和视频。


  要加入家庭组，请点击“开始”，然后选择 `文件资源管理器`。在 `文件资源管理器` 的左侧，你会看到一个“家庭组”链接。点击它，然后点击右侧的“立即加入”按钮。


  **提示**


  需要重申的是，当你点击“网络”链接时，可能会看到一个黄色横幅，提示“网络发现和文件共享已关闭。网络计算机和设备不可见。点击更改...”（图 4-9）。


  ![A978-1-4842-1473-2_4_Fig9_HTML.jpg](img/A978-1-4842-1473-2_4_Fig9_HTML.jpg)


  图 4-9.


  网络发现提示


  这意味着你的电脑连接到了一个它认为是公共网络的网络，因此为了保护你的设备，它会限制对网络上其他电脑的访问。由于这是你的家庭网络，你可以在专用网络上启用网络发现，所以点击黄色横幅，选择“启用网络发现和文件共享”。


  然后，一个对话框会询问你是否要为所有公共网络启用网络发现和文件共享。如果你选择此项，它将在所有公共网络（例如，咖啡馆的公共 Wi-Fi）上启用网络访问，这不是个好主意。因此，你应该选择“否”选项，这会将你的当前网络切换到专用模式，然后你就能访问家庭组和其他网络共享了。


  点击“立即加入”后，Windows 将启动家庭组向导，所以点击“下一步”开始操作。该向导会询问你想与家庭组共享哪些文件夹，就像之前设置家庭组时一样。默认情况下，图片、视频、音乐和打印机是共享的，而文档则不被共享。你可以通过从下拉列表中选择所需选项来更改此设置；点击“下一步”继续。


  然后，系统会提示你输入家庭组密码（图 4-10）。这是你在设置家庭组时创建的密码。输入密码并点击“下一步”；Windows 10 随后将加入该家庭组。


  ![A978-1-4842-1473-2_4_Fig10_HTML.jpg](img/A978-1-4842-1473-2_4_Fig10_HTML.jpg)


  图 4-10.


  输入家庭组密码


  一旦你加入了家庭组，你可以选择 `文件资源管理器` 中的“家庭组”链接，你会看到你网络上的用户名。点击一个用户名，然后 Windows 会列出网络上的其他电脑和共享文件夹。你可以点击一台电脑，它会显示该电脑上的共享文件夹。例如，你可以从另一台机器浏览共享的视频文件夹，当你看到一个视频或音乐文件时，双击它，Windows
  10 就会播放它。


  快速访问内容的更简单方法是将远程电脑的文件夹添加到“音乐”和“视频”应用中。


  对于视频，请执行以下操作：


  - 在 Windows 10 中打开 `电影和电视` 应用。

  - 通过应用菜单按钮，进入应用的“设置”部分。

  - 点击“选择我们查找视频的位置”选项。

  - 这将弹出文件夹对话框，你可以在此选择 `+` 按钮。

  - 浏览并选择你想要包含的远程文件夹。

  - 在文件夹对话框中，展开“网络”组，并点击包含内容的远程计算机（图 4-11）。将显示远程共享文件夹。


  ![A978-1-4842-1473-2_4_Fig11_HTML.jpg](img/A978-1-4842-1473-2_4_Fig11_HTML.jpg)


  图 4-11.


  选择要添加到 `电影和电视` 的文件夹


  - 点击视频文件夹（或你共享的包含视频的其他文件夹）。

  - 然后点击“将此文件夹添加到视频”。

  - 点击“完成”以结束该过程。


  对于音乐来说，这个过程几乎完全相同，只是将 `电影和电视` 换成 `Groove Music`。




  ### 使用 Windows 10 访问共享文件夹


  设置好网络共享后，你可以通过几种方式访问其中的内容。你可以通过**文件资源管理器**查看和播放内容，也可以将这些文件夹添加到 Groove 音乐和“电影和电视”应用中。

  要通过文件资源管理器访问内容，请从“开始”菜单中选择**文件资源管理器**，然后选择**网络**链接。Windows 将显示你家庭网络中的计算机和媒体设备。

  （如果未显示任何设备，则 Windows 认为你处于公共网络中；要更改此设置，请参阅“使用家庭组访问媒体”部分中的提示。）

  **信息**

  在下一章中，你将了解如何从非 PC 媒体设备访问音乐和视频，因此目前我们将重点讨论如何访问列出的计算机上的内容。

  双击你要访问内容的计算机，然后它将显示共享文件夹。如果未显示任何文件夹，则需要按照本章前面的说明进行共享。

  当你双击一个文件夹时，它将列出文件夹内容；如果有要播放的视频或音乐文件，只需双击它，Windows 10 将询问你要使用哪个应用来播放该文件。如果文件是视频文件，默认选项将是“电影和电视”（或“影片和电视”，具体取决于你的位置）应用，但对话框将显示其他可以播放该文件的应用（图
  4-12）。选择你想要使用的应用，然后它将播放该文件。（Windows 10 的“电影和电视”应用可能是你的最佳选择，但正如你在上一章中所见，VLC 也是一个不错的选择。）如果你不希望
  Windows 每次播放文件时都询问使用哪个应用，可以选择“始终使用此应用打开…”选项，Windows 将记住你的选择。

  ![A978-1-4842-1473-2_4_Fig12_HTML.jpg](img/A978-1-4842-1473-2_4_Fig12_HTML.jpg)

  图 4-12. 播放文件

  该文件将通过你的家庭网络进行播放。


  ### 将远程计算机文件夹添加到你的音乐和电影电视应用


  如果你经常播放网络中其他计算机上的内容，可以将远程文件夹添加到媒体应用中，这样就不必每次都导航到所需的文件夹了。

  要向“电影和电视”应用添加文件夹，请打开该应用并选择**设置**。然后选择“选择我们在何处查找视频”。选择 **+** 按钮，然后使用**资源管理器**窗口，通过**网络**链接导航到包含视频的文件夹。选择你想要的文件夹，然后点击“将此文件夹添加到视频”。然后你可以以相同的方式添加更多文件夹，并点击“完成”。

  然后，该应用将索引内容并将其添加到“视频”部分，你可以在其中浏览和播放内容。

  你可以在 Groove 音乐应用中进行同样的操作；转到**设置**，选择“选择我们在此电脑上查找音乐的位置”，然后添加你的其他计算机文件夹。

  **信息**

  如果你将文件夹添加到平板电脑或笔记本电脑，然后将设备带出家庭网络，你将无法访问共享内容。如果你希望这样做，请查看下一章。


  ## 总结


  在本章中，你学习了如何通过 Windows Media Player、文件共享和家庭组在家庭网络上共享媒体。你还了解了在 Windows 10 上使用这些媒体是多么容易。在下一章中，你将了解第三方软件，如果你希望对共享有更多控制权，或者希望流式传输到非
  PC 设备（如电视和网络媒体播放器），这些软件将有所帮助。


