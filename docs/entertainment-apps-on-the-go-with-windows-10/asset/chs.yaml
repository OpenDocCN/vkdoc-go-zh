- "# 通过 Xbox One 访问音乐\n\n将音乐存储在微软 OneDrive 上的最大好处是，你的音乐不仅在 Windows 10 个人电脑、平板电脑和手机上可用，在\
  \ Xbox One 上同样可用。一旦你将音乐存储在 OneDrive 中，只需前往你的 Xbox One 并打开 Groove 应用即可。\n\n如前所述，Groove\
  \ 音乐服务此前被称为 Xbox 音乐，在你的 Xbox 上可能仍沿用此名称。\n\nGroove（图 2-8）分为四个部分：主页、电台、精选和热门音乐。\n\n\
  ![A978-1-4842-1473-2_2_Fig8_HTML.jpg](img/A978-1-4842-1473-2_2_Fig8_HTML.jpg)\n\n\
  图 2-8.\n\n在“主页”部分，你会看到“播放列表”、“收藏”和“搜索”磁贴，以及最近播放的音乐。\n\n要浏览你的音乐，只需选择“收藏”磁贴；你将看到存储在\
  \ OneDrive 中的所有艺术家。\n\n在 Groove 应用的许多位置，你都能看到来自 Groove 音乐服务在线收藏的音乐，例如“艺术家”视图或“电台”视图。你需要订阅\
  \ Groove 音乐通行证（参见第 1 章）才能播放这些音乐。如果你没有订阅 Groove 音乐通行证，则拥有十次免费播放机会，因此你可以在订阅前先试用该服务。\n\
  \n你可以通过选择应用左上角的“播放”按钮立即开始播放音乐。这将按随机顺序开始播放你的所有音乐。如果你想听音乐但不确定自己当下想听什么类型，这非常方便。\n\n\
