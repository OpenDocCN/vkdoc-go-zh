    # 在 Windows 10 上使用 Google Music


    **注意**


    Google Music 目前无法在 Windows 10 Mobile 上使用。过去曾有第三方应用填补这一空白，但不幸的是，谷歌移除了这些应用所依赖的应用程序编程接口（`API`），目前尚无替代方案。


    如果你已经在 Android 手机或平板电脑上使用谷歌的音乐服务，好消息是你也可以在 Windows 10 上访问这些内容。谷歌并不支持 Windows 10，但直到最近，第三方开发者一直在弥补谷歌留下的空缺。不幸的是，如前所述，这些应用所依赖的接口已被谷歌移除。不过，仍然有一种方法可以在
    Windows 10 桌面上访问你的订阅服务。


    对于 Windows 10，你可以使用 `Edge` 浏览器访问 Google Play Music。谷歌提供了基于网页的 Google Play Music
    版本；只需在浏览器中打开 [`http://music.google.com`](http://music.google.com/)，并使用你的谷歌用户名和密码登录即可。


    **注意**


    使用 Google Play Music 网页版时，无法离线播放，因此你需要连接互联网才能使用。


    当你加载音乐页面时，会看到存储在 Google Play Music 中的音乐库。在第 2 章中，你将了解如何将音乐存储到谷歌云中，以便其在浏览器中显示（图
    1-17）。


    ![A978-1-4842-1473-2_1_Fig17_HTML.jpg](img/A978-1-4842-1473-2_1_Fig17_HTML.jpg)


    **图 1-17.** Google Play Music


    正如微软有音乐订阅服务一样，谷歌也有自己的音乐套餐。谷歌每月收费约 9.99 美元（9.99 英镑），即可访问谷歌的音乐库。一旦订阅了该服务，你就可以收听谷歌曲库中的任何音乐。如果你没有订阅音乐套餐，则只能访问自己上传的音乐（参见第
    2 章）或从 Google Play Music 购买的音乐。


    **信息**


    仅在美国，谷歌还提供一项免费的广告支持型流媒体服务，允许你免费收听谷歌音乐库中的任何歌曲。使用免费服务时，你无法下载歌曲进行离线播放，并且在播放过程中会不定期插入广告。


    无论你的音乐来自何处，都可以通过在搜索框中输入内容来搜索你的音乐库，搜索结果将显示在屏幕下半部分。如果将鼠标悬停在一张专辑上，你会在专辑封面上看到一个播放图标，点击即可播放该专辑。


    你可以通过点击/轻触来选择某个专辑或歌手，这将列出所有曲目。页面底部有一个播放图标，点击即可开始播放该专辑或该歌手的所有歌曲。你还可以从播放列表中选择单曲进行播放。


    播放音乐时，屏幕底部会显示歌曲封面，并提供上一曲、暂停、下一曲、随机播放和重复播放按钮。


    还有一个音量图标，你可以点击/轻触以控制播放音量。


    尽管 Google Play Music 是一个网页，但你仍然可以像使用应用一样将其固定到“开始”菜单。在 `Edge` 浏览器中，点击菜单按钮（三个点），然后点击“固定到‘开始’屏幕”。这将在“开始”菜单上创建一个磁贴，点击即可直接进入音乐页面。


    # 在平板电脑和笔记本电脑上使用 iTunes Music


    如果你使用 `iTunes` 来管理音乐收藏，将其与 Windows 10 集成非常简单。你无需在 `iTunes` 中进行任何更改；只需告诉 `Groove`
    应用你的 `iTunes` 音乐收藏存储位置即可。默认情况下，`iTunes` 将其音乐存储在 `此电脑\音乐` 文件夹中（图 1-18），而 `Groove`
    会监控此文件夹以获取新音乐。


    ![A978-1-4842-1473-2_1_Fig18_HTML.jpg](img/A978-1-4842-1473-2_1_Fig18_HTML.jpg)


    **图 1-18.** `iTunes` 中的音乐位置


    如果你更改了 `iTunes` 音乐文件夹的位置，可以按照本章第一节的详细说明，通过 `Groove` 应用告知 `Groove` 你所存放音乐的文件夹。


    **信息**


    在第 2 章中，你将看到如何更改 `iTunes` 的音乐文件夹，以便通过 `iTunes` 抓取或购买的音乐自动存储在 `OneDrive` 上。


    # 从 `iTunes` 等应用向 Windows 10 手机传输音乐


    你可以通过互联网或直接通过 USB 连接，将音乐从 Windows 10 电脑或平板电脑直接复制到 Windows 手机。


    如果使用 USB，你可以通过文件资源管理器复制文件。连接手机后，即可将内容从电脑复制到手机。通过 USB 连接手机，并确保手机已解锁。


    然后，你可以使用文件资源管理器浏览文件系统，找到想要复制的音乐。找到某个歌手、专辑或歌曲后，右键单击（或长按）并选择“复制”。


    接着，通过 `此电脑` 分区中的文件资源管理器，你会看到你的 Windows 手机；导航到 `音乐` 文件夹，然后选择“粘贴”。这会将选中的内容复制到手机。


    你还可以将两个窗口并排放置，通过简单的拖放操作在电脑和手机之间复制文件夹。


    # 使用 TuneIn Radio 收听网络电台


    互联网上有成千上万（甚至数百万）个广播电台，几乎涵盖了所有兴趣、主题和流派。你可以通过一款名为 `TuneIn Radio` 的应用（图 1-19）从手机、平板电脑或电脑访问这些电台。


    ![A978-1-4842-1473-2_1_Fig19_HTML.jpg](img/A978-1-4842-1473-2_1_Fig19_HTML.jpg)


    **图 1-19.** Windows 10 中的 `TuneIn Radio`


    从 Windows 应用商店安装该应用（只需搜索 `TuneIn`）。


    在该应用中，你可以按名称搜索广播电台，也可以按流派浏览，包括本地广播、音乐、体育、新闻、谈话、位置、语言或播客（图 1-20）。


    ![A978-1-4842-1473-2_1_Fig20_HTML.jpg](img/A978-1-4842-1473-2_1_Fig20_HTML.jpg)


    **图 1-20.** 在 `TuneIn Radio` 中按流派浏览


    要按名称查找电台，你需要调出应用内的搜索框。从应用菜单（左上角）中选择“搜索”以调出搜索框，你可以在其中输入所需电台的名称。在手机版上，你可以直接在应用内的搜索框中输入搜索内容。


    如果你不知道电台名称，可以从左侧列表中选择一个类别进行浏览。例如，如果你想找一个新闻台，从浏览列表中选择“新闻”，应用就会列出新闻广播电台。要开始播放电台，只需从搜索结果中选择它，应用便会调出该电台并开始播放。


    找到喜欢的电台后，你可以将其添加到收藏夹列表，以便日后轻松找到；只需选择“添加到收藏夹”。你也可以通过选择“固定”按钮，将某个广播电台固定到“开始”菜单，以便随时快速访问。该电台随即会被添加到“开始”菜单。


    **信息**


    `TuneIn Radio` 实际上并非通过 FM 或 AM 无线电接收信号。它通过互联网流式传输内容，因此你可以收听来自世界各地的广播电台。


    **注意** 请注意，如果你通过按流量计费的网络连接（如 `3G`）流式收听广播，可能会产生数据费用。有关如何衡量使用量，请参阅第 3 章。


    `TuneIn Radio` 主要致力于让传统广播电台在互联网上发声，但那些不太传统的内容获取方式，比如播客呢？在下一节中，你将了解什么是播客以及如何在 Windows
    10 中轻松收听它们。

