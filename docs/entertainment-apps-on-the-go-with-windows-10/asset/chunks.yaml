    \n### 作者简介\n\n### 技术审校者简介\n\n# 1. 移动音乐服务\n\n假如音乐是爱情的食粮，那么奏下去吧，莎士比亚《第十二夜》中的奥西诺公爵曾这样说。如今，我们对音乐的热爱依然如往昔般强烈。然而，我们常常难以在想要的地方播放音乐。Windows\
    \ 10，结合在 Android 和苹果设备上使用微软音乐应用的能力，旨在解决这一困境。现在，你可以随身携带音乐到任何地方。\n\n借助 Windows 10，你可以通过一系列服务在\
    \ PC、笔记本电脑、平板电脑或手机上享受音乐。\n\n在本章中，你将了解如何使用 Microsoft Groove 和第三方服务在 Android、iOS\
    \ 或 Windows 手机、平板电脑或笔记本电脑上下载、流式传输和购买音乐。你还将了解如何在移动中收听广播电台和播客。\n\n## 使用 Groove 聆听音乐\n\
    \n> **信息**  \n> 微软在 Windows 10 中将其音乐应用的名称从 Windows 8 时期的 Xbox Music 更改为 Groove。你可能会发现在某些旧版本平台上，它仍被称为\
    \ Xbox Music。\n\nGroove 是微软的音乐服务，它将多项功能整合到一个服务于 Windows 10、Xbox One、iPad 和 Android\
    \ 设备的服务中。\n\n通过这些服务，你可以聆听存储在 PC 或手机上的个人音乐，从云端流式传输音乐，并直接从设备购买音乐。\n\nGroove 分为四个功能领域：聆听设备上存储的音乐，从微软服务器上的个人收藏中流式传输音乐，从微软购买专辑和歌曲，以及使用微软的音乐订阅服务。\n"
- fmt: '### Groove on a PC or Laptop


    When you think of taking music on the move, you might be tempted to limit your
    thoughts to just phones or portable media players such as the iPod Touch. That
    would be wrong. Feedback from listeners to our weekly The Digital Lifestyle show
    reveals that a surprising amount of music playback on the go still occurs on Windows
    devices, such as the Surface line, and laptops. These will be running the desktop
    or PC version of Windows 10, and in this section you will look at what this offers
    for you to play your music.


    Once you open the app, you are presented with a view of your collection of music
    stored on your PC (Figure [1-1](#A978-1-4842-1473-2_1_Chapter.html#Fig1)).


    ![A978-1-4842-1473-2_1_Fig1_HTML.jpg](A978-1-4842-1473-2_1_Fig1_HTML.jpg)


    Figure 1-1. Groove on a Windows 10 PC. Highlighted at the top left is the menu
    button


    By default the app looks for music in the `This PC\music` folder of your PC, but
    you can change that if you like. You can change the location by going to Settings
    and selecting “Choose where we look for music.” When you click the link, a window
    pops up showing where the app currently looks for music (Figure [1-2](#A978-1-4842-1473-2_1_Chapter.html#Fig2)),
    and it gives you the option to add a new location to the app. Just select the
    Add (shown as a plus sign in a circle) button, and a dialog box will pop up where
    you can select a folder for the app to look in. Once you have done this, the music
    app will automatically add all the music stored in the selection folder and subfolders.
    Click `Done` to close the dialog box.


    ![A978-1-4842-1473-2_1_Fig2_HTML.jpg](A978-1-4842-1473-2_1_Fig2_HTML.jpg)


    Figure 1-2. Choosing, in Groove, where to select music from


    Don’t worry if you don’t have any music in your collection. Later in the chapter
    you will learn how to add music from iTunes and other sources. You can also add
    music from the Windows Store, as shown in Figure [1-3](#A978-1-4842-1473-2_1_Chapter.html#Fig3).


    ![A978-1-4842-1473-2_1_Fig3_HTML.jpg](A978-1-4842-1473-2_1_Fig3_HTML.jpg)


    Figure 1-3. You can also obtain music from the Windows Store


    In this section, you saw how to select what music you would like to add to your
    collection in Groove. In the next section, you will look at how to play that music.


    #### Playing Music


    The music app can display your collection in different views including by album,
    artist, song, or playlist. You can pick your preferred view by selecting the relevant
    icon on the left side of the app. If the menu is not visible, you can use the
    menu button at the top left of the window to toggle it open.


    **Information:** The menu button looks like three horizontal lines on top of each
    other. Some people think this looks like a hamburger, and thus this type of menu
    is often referred to as a hamburger menu (shown earlier in Figure [1-1](#A978-1-4842-1473-2_1_Chapter.html#Fig1)).


    In the `Artists` view, the artists are sorted alphabetically, and selecting a
    letter brings up the alphabet where you can then jump to another letter, making
    it easy to quickly find your artists if you have a large collection. When you
    select an artist, the app shows the albums and song in your collection from those
    artists. You can either select `Play`, which is a rightward-pointing triangle,
    to play the songs from the artist or select the plus sign to add the songs to
    a playlist (more on that in a minute).


    In the `Albums` view (Figures [1-4](#A978-1-4842-1473-2_1_Chapter.html#Fig4) and
    [1-5](#A978-1-4842-1473-2_1_Chapter.html#Fig5)), each album is represented by
    a thumbnail of the album cover. Clicking the cover shows the album details and
    track listing. Pressing the `Play` icon, a rightward-pointing triangle, will play
    whole album, or you can select an individual track by clicking it and pressing
    the `Play` button.


    ![A978-1-4842-1473-2_1_Fig5_HTML.jpg](A978-1-4842-1473-2_1_Fig5_HTML.jpg)


    Figure 1-5. Albums view looks different on a phone or small tablet


    ![A978-1-4842-1473-2_1_Fig4_HTML.jpg](A978-1-4842-1473-2_1_Fig4_HTML.jpg)


    Figure 1-4. Artist’s Albums view, desktop


    You can also add a song or the whole album to a playlist by clicking/tapping the
    plus icon.


    **Information:** A playlist is a collection of songs that you can play back later.
    For example, you could create a list of songs for working out to or songs you
    like driving to. They can be any combination of music you like. To create a new
    playlist, you click/tap the plus icon in the icon list on the right side.


    You can then enter a name for the playlist and click on `Save`. This creates a
    new playlist and then takes you back to your music collection.


    When you click/tap a song, you will see a plus sign, which presents you with a
    list of your playlists; you can select the playlist you want to add the song to.


    If you want to add a selection of songs, albums, or artists to a playlist or download
    a group of songs, there is an easy way to do it. Switch to the desired section
    by selecting either the `Albums`, `Artists`, or `Songs` view from the left menu.
    Then you can click/tap the `Select` button at the top.


    **Note:** The `Select` button in Windows 10 is often shown as four horizontal
    lines on top of each other with two check marks beside them. You can see this
    at the top right of Figure [1-5](#A978-1-4842-1473-2_1_Chapter.html#Fig5).


    Then click/tap the songs/albums you want to select (a check mark shows a selected
    file). When you select content, a menu bar will appear at the bottom of the screen.
    You can also select multiple tracks by holding down the `Ctrl` key and clicking
    the desired items (on a PC Only).


    On the menu bar you will see a `Play` button, which will play the selected songs.
    There is a plus icon, which enables you to add the selected songs to a playlist.
    There is also a `Download` button, which downloads the selected songs from the
    cloud to your local device (more on that later). You can also use the select button
    to delete a group of songs.


    At the top of most screens you will notice there is an option for filtering.


    With the `Filter` button, you can choose whether to show your entire music collection
    or narrow it to the music stored on your local device, streaming, or on `OneDrive`
    (see Figure [1-6](#A978-1-4842-1473-2_1_Chapter.html#Fig6)).


    ![A978-1-4842-1473-2_1_Fig6_HTML.jpg](A978-1-4842-1473-2_1_Fig6_HTML.jpg)


    Figure 1-6. Filtering'
