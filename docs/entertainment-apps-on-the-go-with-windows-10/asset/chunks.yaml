- fmt: '# The All Option and Music Management


    The `All` option does what you expect and shows your entire collection. The `“Available
    offline”` option shows music stored only on the PC (available to listen to without
    being on the Internet), which includes music stored on your device as well as
    songs you have previously streamed from the cloud and are cached on your device.


    The `Streaming` option shows music stored on `OneDrive` or available as part of
    your Groove subscription. The `“Only on this device”` option filters the list
    to show just music on the device you are using.


    The `On OneDrive` storage option is something you will learn about in [Chapter
    2](#A978-1-4842-1473-2_2_Chapter.html). It’s basically Microsoft’s free cloud
    storage where you can store your music collection on Microsoft’s servers and access
    the content from any of your devices or the Web.


    You can also choose how the app should sort and arrange your music. There is a
    `Sort By` link where you can select from the following options: `Date added`,
    `A to Z`, `Release year`, `Genre` (type of music), `Artist`, or `Album`.


    There is a `“Shuffle all”` button on the top left. Selecting `“Shuffle all”` starts
    playing music within the current view in a random order. This feature is great
    when you are not sure what kind of music you are in the mood for.


    When you play a song, the `Now Playing` bar (Figure [1-7](#A978-1-4842-1473-2_1_Chapter.html#Fig7))
    at the bottom of the app shows the progress of the current song and has `Previous
    Track`, `Play/Pause`, `Next Track`, `Volume`, `Shuffle`, and `Repeat` buttons,
    in that order.


    ![A978-1-4842-1473-2_1_Fig7_HTML.jpg](A978-1-4842-1473-2_1_Fig7_HTML.jpg)


    Figure 1-7.


    The `Now Playing` bar at the bottom of the screen


    > **Note:** Because there is little space on the `Now Playing` bar, the buttons
    to control playback use icons rather than words (see Figure [1-7](#A978-1-4842-1473-2_1_Chapter.html#Fig7)),
    but they are in the order mentioned.


    The `Shuffle` button plays your current song selection in random order; for instance,
    if you are playing an album, the shuffle mode will play the songs in a random
    order. The `Repeat` button tells the app to play the current song list again after
    it gets to the end of the current playlist (or album) rather than stop at the
    end.


    Another option is the `“Now playing”` view, accessible from the left menu. This
    displays the current song selection as a list along with album artwork. In this
    view there is also a button (see Figure [1-8](#A978-1-4842-1473-2_1_Chapter.html#Fig8))
    to show the `“Now playing”` view in full-screen. This shows a slide show of artist
    artwork that looks especially good on a tablet.


    ![A978-1-4842-1473-2_1_Fig8_HTML.jpg](A978-1-4842-1473-2_1_Fig8_HTML.jpg)


    Figure 1-8.


    `“Now playing”` view with `Switch to full screen` button highlighted


    > **Information:** The `“Now playing”` full-screen view is also good when used
    on large-screen cathode-ray tube (CRT) and plasma screens because it helps prevent
    burn-in.


    When a music track changes or you change the volume, the app displays a notification
    showing the volume and the current track.


    In this section, you learned how to play your music and the useful options displayed
    while playing that music. In the next section, you’ll look at a great way of accessing
    particular music quickly.


    ## Pinning Content to the Start Menu


    Another great feature of Groove is the ability to pin artists, playlists, and
    songs to the Windows 10 Start menu. This makes it easy to start playing your favorite
    tracks directly from the Start menu.


    To add an album, artist, or playlist to the Start menu, follow these steps:


    1.  Find what you want to add from the Groove app by clicking the album, artist,
    or playlist name.

    2.  Click the `More` button.

    3.  This will give you a pop-up menu where you will see the `“Pin to start”` option.
    Selecting this will add the album to the Start menu for easy access.


    You have now seen how to add music to your collection, play that music, and access
    it quickly. But what if you want to have access to music that is not currently
    in your collection? In the next few sections, you will learn how Groove in Windows
    10 makes it easy to obtain music.


    ## Purchasing Songs and Music Subscriptions


    As well as Groove playing music stored on your tablet, PC, or the cloud, it also
    has a library of songs you can purchase. You can purchase a single song or an
    album. If you want unlimited access to music, there is something called a `Groove
    Music Pass` subscription.


    ### Groove Music Pass


    The `Music Pass` subscription is a service that you pay for monthly. With a subscription
    you can listen to or download any of the songs and albums available in Groove
    collections. You can browse the Groove Music collection in the Windows Store (as
    shown earlier in Figure [1-3](#A978-1-4842-1473-2_1_Chapter.html#Fig3)) for songs,
    artists, and albums and play them on your phone or tablet.


    When you subscribe, you typically pay around $10 (£7) per month and can access
    the subscription from any of your devices. So, you can subscribe once and then
    listen to the music on your Android, iPhone, or Windows phone, tablet, and PC.
    If you buy a lot of music, then this is a service worth looking at. There is a
    30-day free trial available also; you can find out more at [`https://www.microsoft.com/en-us/groove-music`](https://www.microsoft.com/en-us/groove-music).


    > **Tip:** In some countries, Microsoft’s store will often have bundle offers
    including Office 365 and a Groove Music Pass subscription at a discount. These
    can be worth looking out for.


    ### Managing Your Devices


    If you have a Groove Music Pass subscription, you can stream music on any of your
    Windows 10 devices as well as iOS, Android, and Xbox.


    As you saw earlier in the chapter, you can also download music to play when you’re
    offline. However, there is a four-device limit with Groove, so you can download
    tracks only from four devices (including iOS, Android, and Windows devices).


    The first time you download a song from a device, the device registers it with
    Groove, and each time you download a song on a new device, the device registers
    with Groove. Once you have four devices registered, you can’t download from another
    device; you can still stream music but not download it.


    If you get rid of a phone or PC and want a new device to be registered in its
    place, you can remove a device from the list. You can do this by going to the
    Groove Devices page, which you can launch from `Settings` in the Groove app.


    The `Devices` page (Figure [1-9](#A978-1-4842-1473-2_1_Chapter.html#Fig9)) lists
    the PC, phones, and tablets registered with Groove and the date they were registered.


    ![A978-1-4842-1473-2_1_Fig9_HTML.jpg](A978-1-4842-1473-2_1_Fig9_HTML.jpg)


    Figure 1-9.


    Managing your devices for Groove


    You can click/tap the `Remove` button, and it will ask you to confirm your selection.
    When you do that, it will deregister the device, and you will still be able to
    stream music on it but not download music.


    > **Note:** You can remove only one device every 30 days.


    You have now seen how to sign up for a Groove subscription and how to manage what
    devices you can use that subscription on. In the next section, you will look at
    how that subscription can improve your Groove experience.'
  raw: 'The All option does what you expect and shows your entire collection. The
    “Available offline” option shows music stored only on the PC (available to listen
    to without being on the Internet), which includes music stored on your device
    as well as songs you have previously streamed from the cloud and are cached on
    your device.


    The Streaming option shows music stored on OneDrive or available as part of your
    Groove subscription. The “Only on this device” option filters the list to show
    just music on the device you are using.


    The On OneDrive storage option is something you will learn about in [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html).
    It’s basically Microsoft’s free cloud storage where you can store your music collection
    on Microsoft’s servers and access the content from any of your devices or the
    Web.


    You can also choose how the app should sort and arrange your music. There is a
    Sort By link where you can select from the following options: Date added, A to
    Z, Release year, Genre (type of music), Artist, or Album.


    There is a “Shuffle all” button on the top left. Selecting “Shuffle all” starts
    playing music within the current view in a random order. This feature is great
    when you are not sure what kind of music you are in the mood for.


    When you play a song, the Now Playing bar (Figure [1-7](#A978-1-4842-1473-2_1_Chapter.html#Fig7))
    at the bottom of the app shows the progress of the current song and has Previous
    Track, Play/Pause, Next Track, Volume, Shuffle, and Repeat buttons, in that order.


    ![A978-1-4842-1473-2_1_Fig7_HTML.jpg](A978-1-4842-1473-2_1_Fig7_HTML.jpg)


    Figure 1-7.


    The Now Playing bar at the bottom of the screen Note


    Because there is little space on the Now Playing bar, the buttons to control playback
    use icons rather than words (see Figure [1-7](#A978-1-4842-1473-2_1_Chapter.html#Fig7)),
    but they are in the order mentioned.


    The Shuffle button plays your current song selection in random order; for instance,
    if you are playing an album, the shuffle mode will play the songs in a random
    order. The Repeat button tells the app to play the current song list again after
    it gets to the end of the current playlist (or album) rather than stop at the
    end.


    Another option is the “Now playing” view, accessible from the left menu. This
    displays the current song selection as a list along with album artwork. In this
    view there is also a button (see Figure [1-8](#A978-1-4842-1473-2_1_Chapter.html#Fig8))
    to show the “Now playing” view in full-screen. This shows a slide show of artist
    artwork that looks especially good on a tablet.


    ![A978-1-4842-1473-2_1_Fig8_HTML.jpg](A978-1-4842-1473-2_1_Fig8_HTML.jpg)


    Figure 1-8.


    “Now playing” view with Switch to full screen button highlighted Information


    The “Now playing” full-screen view is also good when used on large-screen cathode-ray
    tube (CRT) and plasma screens because it helps prevent burn-in.


    When a music track changes or you change the volume, the app displays a notification
    showing the volume and the current track.


    In this section, you learned how to play your music and the useful options displayed
    while playing that music. In the next section, you’ll look at a great way of accessing
    particular music quickly.


    #### Pinning Content to the Start Menu


    Another great feature of Groove is the ability to pin artists, playlists, and
    songs to the Windows 10 Start menu. This makes it easy to start playing your favorite
    tracks directly from the Start menu.


    To add an album, artist, or playlist to the Start menu, follow these steps:


    Find what you want to add from the Groove app by clicking the album, artist, or
    playlist name.   Click the More button.   This will give you a pop-up menu where
    you will see the “Pin to start” option. Selecting this will add the album to the
    Start menu for easy access.  


    You have now seen how to add music to your collection, play that music, and access
    it quickly. But what if you want to have access to music that is not currently
    in your collection? In the next few sections, you will learn how Groove in Windows
    10 makes it easy to obtain music.


    #### Purchasing Songs and Music Subscriptions


    As well as Groove playing music stored on your tablet, PC, or the cloud, it also
    has a library of songs you can purchase. You can purchase a single song or an
    album. If you want unlimited access to music, there is something called a Groove
    Music Pass subscription.


    ##### Groove Music Pass


    The Music Pass subscription is a service that you pay for monthly. With a subscription
    you can listen to or download any of the songs and albums available in Groove
    collections. You can browse the Groove Music collection in the Windows Store (as
    shown earlier in Figure [1-3](#A978-1-4842-1473-2_1_Chapter.html#Fig3)) for songs,
    artists, and albums and play them on your phone or tablet.


    When you subscribe, you typically pay around $10 (£7) per month and can access
    the subscription from any of your devices. So, you can subscribe once and then
    listen to the music on your Android, iPhone, or Windows phone, tablet, and PC.
    If you buy a lot of music, then this is a service worth looking at. There is a
    30-day free trial available also; you can find out more at [`https://www.microsoft.com/en-us/groove-music`](https://www.microsoft.com/en-us/groove-music)
    .


    Tip


    In some countries, Microsoft’s store will often have bundle offers including Office
    365 and a Groove Music Pass subscription at a discount. These can be worth looking
    out for.


    ##### Managing Your Devices


    If you have a Groove Music Pass subscription, you can stream music on any of your
    Windows 10 devices as well as iOS, Android, and Xbox.


    As you saw earlier in the chapter, you can also download music to play when you’re
    offline. However, there is a four-device limit with Groove, so you can download
    tracks only from four devices (including iOS, Android, and Windows devices).


    The first time you download a song from a device, the device registers it with
    Groove, and each time you download a song on a new device, the device registers
    with Groove. Once you have four devices registered, you can’t download from another
    device; you can still stream music but not download it.


    If you get rid of a phone or PC and want a new device to be registered in its
    place, you can remove a device from the list. You can do this by going to the
    Groove Devices page, which you can launch from Settings in the Groove app.


    The Devices page (Figure [1-9](#A978-1-4842-1473-2_1_Chapter.html#Fig9)) lists
    the PC, phones, and tablets registered with Groove and the date they were registered.


    ![A978-1-4842-1473-2_1_Fig9_HTML.jpg](A978-1-4842-1473-2_1_Fig9_HTML.jpg)


    Figure 1-9.


    Managing your devices for Groove


    You can click/tap the Remove button, and it will ask you to confirm your selection.
    When you do that, it will deregister the device, and you will still be able to
    stream music on it but not download music.


    Note


    You can remove only one device every 30 days.


    You have now seen how to sign up for a Groove subscription and how to manage what
    devices you can use that subscription on. In the next section, you will look at
    how that subscription can improve your Groove experience.'
  trans: '

    # “全部”选项与音乐管理


    “全部”选项的功能正如其名，会显示你的整个音乐库。“可供离线使用”选项则仅显示存储在电脑上的音乐（无需联网即可收听），这包括你设备中存储的音乐，以及之前从云端流式传输并缓存在设备上的歌曲。


    “流式传输”选项会显示存储在 `OneDrive` 上或作为 Groove 订阅一部分的音乐。“仅在此设备上”选项则会对列表进行筛选，仅显示当前设备上的音乐。


    关于 `On OneDrive` 存储选项，你将在第 2 章中了解。它基本上是微软提供的免费云存储服务，你可以将音乐集存储在微软的服务器上，并通过你的任何设备或网页访问这些内容。


    你还可以选择应用如何对音乐进行排序和整理。界面中有一个“排序方式”链接，你可以从中选择以下选项：`添加日期`、`A 到 Z`、`发行年份`、`流派`（音乐类型）、`艺术家`或`专辑`。


    左上角有一个“随机播放所有”按钮。选择“随机播放所有”将以随机顺序播放当前视图中的音乐。当你不确定自己想听什么类型的音乐时，这项功能非常棒。


    当你播放一首歌曲时，应用底部的“正在播放”栏（图 1-7）会显示当前歌曲的进度，并且按顺序包含`上一曲`、`播放/暂停`、`下一曲`、`音量`、`随机播放`和`重复播放`按钮。


    ![A978-1-4842-1473-2_1_Fig7_HTML.jpg](img/A978-1-4842-1473-2_1_Fig7_HTML.jpg)


    图 1-7.


    屏幕底部的“正在播放”栏


    > **注意：** 由于“正在播放”栏空间有限，控制播放的按钮使用图标而非文字（参见图 1-7），但它们按照上述顺序排列。


    “随机播放”按钮会以随机顺序播放你当前选定的歌曲；例如，如果你在播放一张专辑，随机模式会以随机顺序播放其中的歌曲。“重复播放”按钮则指示应用在当前播放列表（或专辑）播放完毕后，重新开始播放当前歌曲列表，而不是在末尾停止。


    另一个选项是“正在播放”视图，可通过左侧菜单访问。此视图以列表形式显示当前选定的歌曲，并附带专辑封面。在此视图中，还有一个按钮（参见图 1-8）用于全屏显示“正在播放”视图。全屏视图会展示艺术家作品的幻灯片，在平板电脑上效果尤其出色。


    ![A978-1-4842-1473-2_1_Fig8_HTML.jpg](img/A978-1-4842-1473-2_1_Fig8_HTML.jpg)


    图 1-8.


    高亮显示“切换到全屏”按钮的“正在播放”视图


    > **信息：** “正在播放”全屏视图在用于大屏幕阴极射线管（CRT）和等离子屏幕时效果也很好，因为它有助于防止屏幕烧屏。


    当音乐曲目切换或你调节音量时，应用会显示一个通知，提示当前音量及当前曲目信息。


    在本节中，你学习了如何播放音乐以及播放时显示的有用选项。在下一节中，你将了解一种快速访问特定音乐的绝佳方法。


    ## 将内容固定到“开始”菜单


    Groove 的另一项出色功能是能够将艺术家、播放列表和歌曲固定到 Windows 10 的“开始”菜单。这使得你可以直接从“开始”菜单轻松开始播放你喜爱的曲目。


    要将专辑、艺术家或播放列表添加到“开始”菜单，请按以下步骤操作：


    1.  在 Groove 应用中，通过点击专辑、艺术家或播放列表的名称，找到你想要添加的内容。

    2.  点击“更多”按钮。

    3.  这会弹出一个菜单，你可以在其中看到“固定到‘开始’屏幕”选项。选择此项即可将专辑添加到“开始”菜单，方便日后快速访问。


    现在你已经了解了如何将音乐添加到你的库中、播放这些音乐以及快速访问它们。但是，如果你想访问当前库中没有的音乐，该怎么办呢？在接下来的几节中，你将了解 Windows
    10 中的 Groove 如何让你轻松地获取音乐。


    ## 购买歌曲与音乐订阅


    除了播放存储在平板电脑、电脑或云端的音乐外，Groove 还拥有一个可供你购买的歌曲库。你可以购买单首歌曲或一张专辑。如果你希望无限制地访问音乐，还有一种称为`Groove
    Music Pass`订阅的服务。


    ### Groove Music Pass


    `Music Pass`订阅是一项按月付费的服务。订阅后，你可以收听或下载 Groove 音乐库中提供的任何歌曲和专辑。你可以在 Windows 商店中浏览
    Groove 音乐集（如图 1-3 所示），寻找歌曲、艺术家和专辑，并在你的手机或平板电脑上播放。


    订阅时，你通常每月支付约 10 美元（7 英镑），并且可以在你的任何设备上使用该订阅。因此，你只需订阅一次，便可在你的 Android、iPhone 或 Windows
    手机、平板电脑和电脑上收听音乐。如果你购买大量音乐，这项服务值得考虑。此外，还有 30 天免费试用；你可以访问 [`https://www.microsoft.com/en-us/groove-music`](https://www.microsoft.com/en-us/groove-music)
    了解更多信息。


    > **提示：** 在某些国家/地区，微软商店通常会提供包含 Office 365 和 Groove Music Pass 订阅的捆绑优惠，价格有折扣。这些优惠值得留意。


    ### 管理你的设备


    如果你拥有 Groove Music Pass 订阅，你可以在任何 Windows 10 设备以及 iOS、Android 和 Xbox 上流式传输音乐。


    正如你在本章前面看到的，你也可以下载音乐以便离线播放。但是，Groove 存在四台设备的上限限制，因此你只能从四台设备（包括 iOS、Android 和 Windows
    设备）下载曲目。


    当你首次从某台设备下载歌曲时，该设备会向 Groove 注册；每次你在新设备上下载歌曲时，该设备也会向 Groove 注册。一旦你注册了四台设备，就无法再从其他设备下载；你仍然可以流式传输音乐，但不能下载。


    如果你淘汰了一台手机或电脑，希望用新设备替换它，你可以从设备列表中移除旧设备。你可以通过访问 Groove 设备页面来执行此操作，该页面可从 Groove
    应用的`设置`中启动。


    `设备`页面（图 1-9）列出了已向 Groove 注册的电脑、手机和平板电脑及其注册日期。


    ![A978-1-4842-1473-2_1_Fig9_HTML.jpg](img/A978-1-4842-1473-2_1_Fig9_HTML.jpg)


    图 1-9.


    管理你的 Groove 设备


    你可以单击/点击`移除`按钮，系统会要求你确认选择。确认后，设备将被注销，你仍然可以在这台设备上流式传输音乐，但无法下载音乐。


    > **注意：** 每 30 天只能移除一台设备。


    至此，你已经了解了如何注册 Groove 订阅以及如何管理可以使用该订阅的设备。在下一节中，你将了解该订阅如何提升你的 Groove 体验。

