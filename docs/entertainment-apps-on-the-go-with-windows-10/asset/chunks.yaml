  trans: '

    ### 在 PC 或笔记本电脑上使用 Groove


    当想到随身听音乐时，你可能只局限于手机或 iPod Touch 这样的便携式媒体播放器。这可就错了。我们每周播出的《数字生活方式》节目收到的听众反馈显示，仍有相当数量的移动音乐播放是在
    Windows 设备上进行的，比如 Surface 系列和笔记本电脑。这些设备运行的是 Windows 10 的桌面版或 PC 版，在本节中，你将了解在播放音乐方面，它为你提供了哪些功能。


    打开该应用后，你会看到存储在 PC 上的音乐收藏视图（图 1-1）。


    ![A978-1-4842-1473-2_1_Fig1_HTML.jpg](img/A978-1-4842-1473-2_1_Fig1_HTML.jpg)


    图 1-1. Windows 10 PC 上的 Groove。左上方高亮显示的是菜单按钮


    默认情况下，该应用会在你 PC 的 `This PC\music` 文件夹中查找音乐，但你可以根据需要更改该位置。你可以通过进入“设置”并选择“选择我们查找音乐的位置”来更改位置。点击该链接后，会弹出一个窗口，显示应用当前查找音乐的位置（图
    1-2），并让你可以选择向应用添加新位置。只需选择“添加”（显示为圆圈中的加号）按钮，就会弹出一个对话框，你可以在其中选择一个供应用查找的文件夹。完成此操作后，音乐应用会自动将所选文件夹及其子文件夹中的所有音乐添加进来。点击
    `Done` 关闭对话框。


    ![A978-1-4842-1473-2_1_Fig2_HTML.jpg](img/A978-1-4842-1473-2_1_Fig2_HTML.jpg)


    图 1-2. 在 Groove 中选择从哪里选取音乐


    如果你的收藏中没有任何音乐，也不必担心。本章稍后你将学习如何从 iTunes 和其他来源添加音乐。你也可以从 Windows 商店添加音乐，如图 1-3 所示。


    ![A978-1-4842-1473-2_1_Fig3_HTML.jpg](img/A978-1-4842-1473-2_1_Fig3_HTML.jpg)


    图 1-3. 你也可以从 Windows 商店获取音乐


    在本节中，你了解了如何选择你想要添加到 Groove 收藏中的音乐。在下一节中，你将了解如何播放这些音乐。


    #### 播放音乐


    音乐应用可以以不同的视图显示你的收藏，包括按专辑、艺术家、歌曲或播放列表。你可以通过选择应用左侧的相关图标来选择你偏好的视图。如果菜单不可见，你可以使用窗口左上角的菜单按钮将其切换打开。


    **信息：** 菜单按钮看起来像三条水平线叠在一起。有些人觉得这看起来像一个汉堡包，因此这种类型的菜单通常被称为汉堡菜单（前面在图 1-1 中显示过）。


    在 `Artists` 视图中，艺术家按字母顺序排序，选择一个字母会弹出字母表，然后你可以跳转到另一个字母，如果收藏量很大，这样可以方便地快速找到你的艺术家。当你选择一位艺术家时，应用会显示该艺术家在你的收藏中的专辑和歌曲。你可以选择
    `Play`（一个指向右方的三角形）来播放该艺术家的歌曲，或者选择加号将歌曲添加到播放列表（稍后会详细介绍）。


    在 `Albums` 视图中（图 1-4 和 1-5），每张专辑都由一个专辑封面缩略图表示。点击封面会显示专辑详情和曲目列表。按下 `Play` 图标（一个指向右方的三角形）将播放整张专辑，或者你可以点击选择单首曲目，然后按下
    `Play` 按钮。


    ![A978-1-4842-1473-2_1_Fig5_HTML.jpg](img/A978-1-4842-1473-2_1_Fig5_HTML.jpg)


    图 1-5. 专辑视图在手机或小平板上看起来不同


    ![A978-1-4842-1473-2_1_Fig4_HTML.jpg](img/A978-1-4842-1473-2_1_Fig4_HTML.jpg)


    图 1-4. 艺术家的专辑视图，桌面版


    你也可以通过点击加号图标将某首歌曲或整张专辑添加到播放列表。


    **信息：** 播放列表是你稍后可以播放的歌曲集合。例如，你可以创建一个用于锻炼时听的歌曲列表，或者你喜欢开车时听的歌曲列表。它们可以是你喜欢的任何音乐组合。要创建新播放列表，你点击右侧图标列表中的加号图标。


    接着，你可以为播放列表输入一个名称，然后点击 `Save`。这将创建一个新播放列表，然后带你返回你的音乐收藏。


    当你点击某首歌曲时，你会看到一个加号，它会显示你的播放列表列表；你可以选择要将歌曲添加到的播放列表。


    如果你想将选定的歌曲、专辑或艺术家添加到播放列表或下载一组歌曲，有一个简单的方法。从左侧菜单中选择 `Albums`、`Artists` 或 `Songs`
    视图切换到所需的板块。然后，你可以点击上方的 `Select` 按钮。


    **注意：** Windows 10 中的 `Select` 按钮通常显示为四条水平线叠在一起，旁边有两个复选标记。你可以在图 1-5 的右上方看到它。


    然后，点击你想要选择的歌曲/专辑（复选标记表示已选中的文件）。当你选择内容时，屏幕底部会出现一个菜单栏。你也可以按住 `Ctrl` 键并点击所需项目（仅限在
    PC 上），来选择多个曲目。


    在菜单栏上，你会看到一个 `Play` 按钮，它将播放选中的歌曲。有一个加号图标，你可以将选中的歌曲添加到播放列表。还有一个 `Download` 按钮，用于将选中的歌曲从云端下载到你的本地设备（稍后会详细介绍）。你也可以使用选择按钮来删除一组歌曲。


    在大多数屏幕的顶部，你都会注意到有一个用于筛选的选项。


    使用 `Filter` 按钮，你可以选择显示你的整个音乐收藏，或将其缩小到存储在你本地设备上的音乐、流媒体音乐或 `OneDrive` 上的音乐（见图 1-6）。


    ![A978-1-4842-1473-2_1_Fig6_HTML.jpg](img/A978-1-4842-1473-2_1_Fig6_HTML.jpg)


    图 1-6. 筛选

