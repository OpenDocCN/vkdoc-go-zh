- fmt: '### Settings


    In the Settings section (Figure [1-14](#A978-1-4842-1473-2_1_Chapter.html#Fig14))
    of the app there are some useful configuration options.


    ![A978-1-4842-1473-2_1_Fig14_HTML.jpg](A978-1-4842-1473-2_1_Fig14_HTML.jpg)


    **Figure 1-14.** Settings in Android (at the time of writing this still has the
    Xbox Music branding but this is due to a change to Groove).


    The `Groove Music Pass` button takes you to the Groove Music Pass management page;
    see the details earlier in this chapter for information on managing your music
    subscription.


    There is an option to use mobile data for streaming. With this option selected,
    the app will use your phone’s data connection to stream music. Turn this off if
    you want to prevent the app from using mobile data (3G/4G).


    > **Note:** Wi-Fi streaming is not affected by this option.


    There is an option to use mobile data for downloading. With this option on, the
    app will be able to use your mobile data connection to download songs for offline
    playback. Turn this off to prevent the app from using your data connection.


    > **Note:** Wi-Fi downloading is not affected by this setting.


    The other option on this page is to sync your music collection. This applies changes
    you have made to your collection from other devices as well as sending changes
    you have made on your Android device back to the cloud. The app automatically
    syncs your collection when you load it; therefore, you don’t have to manually
    sync it unless you have made changes and want it to sync immediately.


    Using Groove on Android is pretty simple, but what about on the iPhone? In the
    next section, you will see this is just as easy.


    ### Groove on an iPhone or iPad


    The iPhone version of Groove works very much like the Windows 10 Mobile and Android
    versions of the app. To get started, go to the App Store on your phone and search
    for Groove Music. Once installed, load the app, and it will ask you for your Microsoft
    account login. This is the account you used with Windows to upload your collection
    to OneDrive or used when you subscribed to Groove.


    Once you have logged into the app, you are presented with your music collection.
    There are four buttons at the top of the app for viewing your collection: Artists,
    Albums, Songs, and Genres.


    When you view your music by artist or album (Figure [1-15](#A978-1-4842-1473-2_1_Chapter.html#Fig15)),
    you will see a Play icon overlaid on the artist or album image. Tap this, and
    the app will start playing songs from the artist or album.


    ![A978-1-4842-1473-2_1_Fig15_HTML.jpg](A978-1-4842-1473-2_1_Fig15_HTML.jpg)


    **Figure 1-15.** Albums view on iOS.


    If you tap an artist, the app shows albums in your collection in the My Albums
    section, and if you have a Groove Music Pass subscription, you will see an All
    Albums section with albums from the artist that are not in your collection. To
    play an album, tap the album image. To view the tracks on the album, tap the album
    title, and you will see all the songs on the album; tap a song to play it.


    You can also search for a song, artist, or album using the app. To perform a search,
    tap the menu button, and in the search box type in what you are looking for. The
    app will list matching results starting with artists and then albums and below
    that songs.


    When viewing an artist, there is also a bio that gives you background information
    about the artist.


    ### Offline Playback


    As with the Android and Windows version of the app, you can download music files
    so that you can play them offline without an Internet connection.


    In the Collections view, scroll up to the top of the list, and you will see a
    drop-down menu that by default says “All music.” This option means that all your
    music collection is shown. To show only music you have downloaded, change it to
    “Available offline.” To show only the music stored in the cloud, change it to
    “Available online only.”


    To download music onto your iPhone, tap and hold a song, artist, or album and
    select the “Make available offline” option from the menu. This will download the
    selected item to the iPhone ready for offline playback.


    > **Note:** Downloaded music can be played only with the Groove app; you can’t
    use third-party Android apps to play music from Groove.


    ### Radio


    As with the Windows version of Groove, if you have a Groove Music Pass subscription,
    you can create a custom radio station based on an artist (Figure [1-16](#A978-1-4842-1473-2_1_Chapter.html#Fig16)).


    ![A978-1-4842-1473-2_1_Fig16_HTML.jpg](A978-1-4842-1473-2_1_Fig16_HTML.jpg)


    **Figure 1-16.** Radio option on iOS.


    To get started, tap the menu button on the top left of the app and select the
    Radio option. Next enter an artist name or select from the recommended artists.
    The app will create a custom playlist based on the artist you selected and store
    it in the Recent section for accessing later.


    ### Settings


    You can find the app settings by tapping the menu button. In the Settings section
    there is a button to enable cellular data. This means with the option selected,
    you can stream and download music over your phone’s data connection. If you want
    to avoid using your data allowance, turn this option off.


    The other option on this page is to sync your music collection. This applies changes
    you have made to your collection from other devices as well as sending changes
    you have on your iPhone device back to the cloud. The app automatically syncs
    your collection when you load it; therefore, you don’t have to manually sync it
    unless you have made changes and want it to sync immediately.


    You have looked at how you can use Groove to access your collection of music and
    also obtain music with a subscription. You also saw how to play that music on
    Windows desktops, tablets, laptops, and phones, as well as Android and iPhones.
    What if you have already heavily invested in another source of music, such as
    Google’s service? In the next few sections, you will look at playing music from
    other services in Windows 10, starting with Google Music.'
