- fmt: '### 3.  Watching Videos, Movies, and TV Shows


    So far in this book, we have mainly concentrated on how to play music, but we
    know from our experience gathered from hosting our weekly podcast that many audience
    questions revolve around the world of playing video and its many confusing sources,
    formats, and containers. People often just do not get why a file they have downloaded
    from the Internet does not play.


    > **Information**

    > Sources are video streaming services such as Netflix, video hosting services
    such as YouTube, and media stored locally or on a network storage device.

    > Formats are the way the video is encoded for storage. These are often known
    as codecs (short for coder-decoder). Examples of codecs are MPEG, WMV, and MP4,
    but there are lots more.

    > Containers are the cause of a lot of confusion. These are basically a way of
    packaging up one or more media files for playback.


    You could consider, for example, a DVD a container, and indeed a DVD can be converted
    to an ISO file for playback on a PC, but a DVD can contain many different media
    types including audio and video.


    This is the same with other media containers including the popular MKV container.
    One issue is that software, including Windows 10, may claim to play back MKV files,
    but they will play back these containers only if they contain media in formats
    they understand.


    Windows 10 has gone a long way to help this confusion, and we have found it much
    better at playing some of the more obscure file types. We have found most files
    we have downloaded just work. One exception is the playback of DVDs, which has
    been removed. However, Microsoft has now released a Windows DVD player app (available
    at [`https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w`](https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w)
    for a fee). Third-party applications such as VLC, which we cover later in this
    chapter, can also help with this.


    Windows 10 has also really helped control the potential cost of watching video
    streams, particularly when on metered connections such as a mobile phone network.


    In this chapter, you will look at all the different ways you can use Windows 10
    to watch videos from your own collection, from the Windows Store, from Netflix,
    and from YouTube.


    You will also look at how other video apps including VLC can help you watch all
    your different video formats.


    Finally, you will look how you can use Windows 10’s Data Sense app to monitor
    and control how much data you are using while streaming video.


    ### Movies and TV App


    In this section, we cover Microsoft’s own video app in Windows 10. You will see
    how you can use it to play back your own videos and also movies and TV shows you
    download from the Windows Store.


    > **Information**

    > Microsoft changed the name of its video app in Windows 10 from Xbox Video, as
    it was known in Windows 8, to Film and TV (or Movies and TV, depending on your
    regional settings). For example, in the United Kingdom, where we are based, it
    is called Film and TV, so we will refer to it as that. Just remember it could
    be named Movies and TV in your region.


    ### Watching Purchased Movies and TV Shows


    Movie and TV shows you purchase from the Windows Store will show up in the Film
    and TV sections (see Figure 3-1) of the Film and TV app. So if you go to the Films
    section, you will see your movie collection, and if you go to the TV section,
    you will see your TV shows. Movies and TV shows will show up even if you haven’t
    downloaded them to your device.


    ![A978-1-4842-1473-2_3_Fig1_HTML.jpg](A978-1-4842-1473-2_3_Fig1_HTML.jpg)


    **Figure 3-1.** The TV section in the Film and TV app


    > **Note**

    > The name of the Film sections in the Film and TV app also changes by region.
    So if in your region the app is called Movies and TV, then the section will be
    called Movies.


    You can filter your collection to show all videos, just videos stored on the device,
    or just videos stored in the cloud. Select the Filter option to bring up a pop-up
    menu where you can select your preferred option.


    The “All videos” option does what it says and shows all your videos. The “Available
    offline” option shows only what you have downloaded to your device. The Streaming
    option shows only the videos you have purchased or rented that are not on the
    local device.


    You also have the option of sorting your collection by date added or from A to
    Z.


    Click/tap an item, and you will be taken to the movie or TV (see Figure 3-2) page
    where you get information about the movie or show. If you haven’t already downloaded
    the movie or show, you have the option of playing it or downloading it. If you
    have already partially played the video, the Play option will change to Resume.


    ![A978-1-4842-1473-2_3_Fig2_HTML.jpg](A978-1-4842-1473-2_3_Fig2_HTML.jpg)


    **Figure 3-2.** Movie information


    If you play the video, it will stream it from Microsoft, and the video isn’t downloaded
    to your device.


    > **Note**

    > This sometimes confuses user in that they think any video purchased from the
    store will always be available to play back from their device. Unless you download
    the video, it will be available only if you have an Internet connection.


    Downloading the file brings a copy of the movie or show to your device ready for
    watching. This can be handy if you want to watch the movie or show when you don’t
    have a network connection or you have slow connection. For example, if you are
    going on a long flight and want to watch a movie on your tablet, you should download
    it so you can watch it without a network connection.


    When you start downloading a movie or TV show, you can check on its progress by
    selecting the Downloads section of the app and clicking/tapping the Menu control
    on the top left to view the download queue. You can pause and resume or cancel
    downloads from this screen.'
  raw: '# 3. Watching Videos, Movies, and TV Shows


    So far in this book, we have mainly concentrated on how to play music, but we
    know from our experience gathered from hosting our weekly podcast that many audience
    questions revolve around the world of playing video and its many confusing sources,
    formats, and containers. People often just do not get why a file they have downloaded
    from the Internet does not play.


    Information


    Sources are video streaming services such as Netflix, video hosting services such
    as YouTube, and media stored locally or on a network storage device.


    Formats are the way the video is encoded for storage. These are often known as
    codecs (short for coder-decoder). Examples of codecs are MPEG, WMV, and MP4, but
    there are lots more.


    Containers are the cause of a lot of confusion. These are basically a way of packaging
    up one or more media files for playback.


    You could consider, for example, a DVD a container, and indeed a DVD can be converted
    to an ISO file for playback on a PC, but a DVD can contain many different media
    types including audio and video.


    This is the same with other media containers including the popular MKV container.
    One issue is that software, including Windows 10, may claim to play back MKV files,
    but they will play back these containers only if they contain media in formats
    they understand.


    Windows 10 has gone a long way to help this confusion, and we have found it much
    better at playing some of the more obscure file types. We have found most files
    we have downloaded just work. One exception is the playback of DVDs, which has
    been removed. However, Microsoft has now released a Windows DVD player app (available
    at [`https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w`](https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w)
    for a fee). Third-party applications such as VLC, which we cover later in this
    chapter, can also help with this.


    Windows 10 has also really helped control the potential cost of watching video
    streams, particularly when on metered connections such as a mobile phone network.


    In this chapter, you will look at all the different ways you can use Windows 10
    to watch videos from your own collection, from the Windows Store, from Netflix,
    and from YouTube.


    You will also look at how other video apps including VLC can help you watch all
    your different video formats.


    Finally, you will look how you can use Windows 10’s Data Sense app to monitor
    and control how much data you are using while streaming video.


    ## Movies and TV App


    In this section, we cover Microsoft’s own video app in Windows 10\. You will see
    how you can use it to play back your own videos and also movies and TV shows you
    download from the Windows Store.


    Information


    Microsoft changed the name of its video app in Windows 10 from Xbox Video, as
    it was known in Windows 8, to Film and TV (or Movies and TV, depending on your
    regional settings). For example, in the United Kingdom, where we are based, it
    is called Film and TV, so we will refer to it as that. Just remember it could
    be named Movies and TV in your region.


    ### Watching Purchased Movies and TV Shows


    Movie and TV shows you purchase from the Windows Store will show up in the Film
    and TV sections (see Figure [3-1](#A978-1-4842-1473-2_3_Chapter.html#Fig1)) of
    the Film and TV app. So if you go to the Films section, you will see your movie
    collection, and if you go to the TV section, you will see your TV shows. Movies
    and TV shows will show up even if you haven’t downloaded them to your device.


    ![A978-1-4842-1473-2_3_Fig1_HTML.jpg](A978-1-4842-1473-2_3_Fig1_HTML.jpg)


    Figure 3-1.


    The TV section in the Film and TV app Note


    The name of the Film sections in the Film and TV app also changes by region. So
    if in your region the app is called Movies and TV, then the section will be called
    Movies.


    You can filter your collection to show all videos, just videos stored on the device,
    or just videos stored in the cloud. Select the Filter option to bring up a pop-up
    menu where you can select your preferred option.


    The “All videos” option does what it says and shows all your videos. The “Available
    offline” option shows only what you have downloaded to your device. The Streaming
    option shows only the videos you have purchased or rented that are not on the
    local device.


    You also have the option of sorting your collection by date added or from A to
    Z.


    Click/tap an item, and you will be taken to the movie or TV (see Figure [3-2](#A978-1-4842-1473-2_3_Chapter.html#Fig2))
    page where you get information about the movie or show. If you haven’t already
    downloaded the movie or show, you have the option of playing it or downloading
    it. If you have already partially played the video, the Play option will change
    to Resume.


    ![A978-1-4842-1473-2_3_Fig2_HTML.jpg](A978-1-4842-1473-2_3_Fig2_HTML.jpg)


    Figure 3-2.


    Movie information


    If you play the video, it will stream it from Microsoft, and the video isn’t downloaded
    to your device.


    Note


    This sometimes confuses user in that they think any video purchased from the store
    will always be available to play back from their device. Unless you download the
    video, it will be available only if you have an Internet connection.


    Downloading the file brings a copy of the movie or show to your device ready for
    watching. This can be handy if you want to watch the movie or show when you don’t
    have a network connection or you have slow connection. For example, if you are
    going on a long flight and want to watch a movie on your tablet, you should download
    it so you can watch it without a network connection.


    When you start downloading a movie or TV show, you can check on its progress by
    selecting the Downloads section of the app and clicking/tapping the Menu control
    on the top left to view the download queue. You can pause and resume or cancel
    downloads from this screen.'
  trans: '

    ### 3.  观看视频、电影和电视节目


    到目前为止，本书主要侧重于如何播放音乐，但根据我们主持每周播客的经验，许多听众的问题都围绕着播放视频及其各种令人困惑的来源、格式和容器。人们通常不明白为什么他们从互联网下载的文件无法播放。


    > **信息**

    > 来源包括 Netflix 等视频流服务、YouTube 等视频托管服务，以及本地或网络存储设备中的媒体。

    > 格式是视频为存储而进行编码的方式。这些通常被称为编解码器（编解码器的简称）。编解码器的例子有 MPEG、WMV 和 MP4，但还有很多其他类型。

    > 容器是造成许多困惑的原因。它们本质上是一种将一个或多个媒体文件打包以便播放的方式。


    例如，你可以将 DVD 视为一个容器，而且实际上 DVD 可以转换为 ISO 文件以便在 PC 上播放，但一个 DVD 可能包含多种不同类型的媒体，包括音频和视频。


    其他媒体容器也是如此，包括流行的 MKV 容器。一个问题是，包括 Windows 10 在内的软件可能声称能播放 MKV 文件，但只有当这些容器包含它们能理解的格式的媒体时，它们才会播放。


    Windows 10 在解决这种困惑方面已经做出了很大努力，并且我们发现它在播放一些更冷门的文件类型方面表现更好。我们发现我们下载的大多数文件都能正常播放。一个例外是
    DVD 的播放功能已被移除。然而，微软现已发布了一款 Windows DVD 播放器应用（可通过 [`https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w`](https://www.microsoft.com/en-us/store/apps/windows-dvd-player/9nblggh2j19w)
    付费获取）。第三方应用程序如 VLC（我们将在本章后面介绍）也可以帮助解决这个问题。


    Windows 10 还真正有助于控制观看视频流可能产生的费用，尤其是在使用按流量计费的连接（例如移动电话网络）时。


    在本章中，你将了解使用 Windows 10 从你自己的收藏、Windows 商店、Netflix 和 YouTube 观看视频的所有不同方式。


    你还将了解包括 VLC 在内的其他视频应用如何帮助你观看所有不同格式的视频。


    最后，你将了解如何使用 Windows 10 的数据感知应用来监控和控制你在流式传输视频时使用的数据量。


    ### 电影和电视应用


    在本节中，我们将介绍微软在 Windows 10 中的自有视频应用。你将看到如何使用它来播放你自己的视频，以及从 Windows 商店下载的电影和电视节目。


    > **信息**

    > 微软将 Windows 10 中的视频应用名称从 Windows 8 中的 Xbox 视频更改为电影和电视（或电影和电视，取决于你的区域设置）。例如，在我们所在的英国，它被称为电影和电视，因此我们将以此称呼。只需记住在你的区域它可能被命名为电影和电视。


    ### 观看已购买的电影和电视节目


    你从 Windows 商店购买的电影和电视节目会出现在电影和电视应用的“电影”和“电视”部分（见图 3-1）。因此，如果你进入“电影”部分，你将看到你的电影收藏；如果进入“电视”部分，你将看到你的电视节目。即使你尚未将这些节目下载到你的设备上，电影和电视节目也会显示出来。


    ![A978-1-4842-1473-2_3_Fig1_HTML.jpg](img/A978-1-4842-1473-2_3_Fig1_HTML.jpg)


    **图 3-1.** 电影和电视应用中的“电视”部分


    > **注意**

    > 电影和电视应用中“电影”部分的名称也会因区域而异。因此，如果你所在的区域该应用被称为“电影和电视”，那么该部分将被命名为“电影”。


    你可以筛选你的收藏，以显示所有视频、仅存储在设备上的视频或仅存储在云端的视频。选择“筛选”选项会弹出一个弹出菜单，你可以在其中选择偏好的选项。


    “所有视频”选项顾名思义，显示你所有的视频。“可离线使用”选项仅显示你已下载到设备上的视频。“流媒体”选项仅显示你已购买或租借但不在本地设备上的视频。


    你还可以选择按添加日期或按字母顺序（A 到 Z）对收藏进行排序。


    点击/轻触某个项目，你将进入电影或电视节目页面（见图 3-2），在那里你可以获取有关该电影或节目的信息。如果你尚未下载该电影或节目，你可以选择播放它或下载它。如果你已经部分播放过该视频，“播放”选项将变为“继续播放”。


    ![A978-1-4842-1473-2_3_Fig2_HTML.jpg](img/A978-1-4842-1473-2_3_Fig2_HTML.jpg)


    **图 3-2.** 电影信息


    如果你播放视频，它将从微软流式传输，视频不会下载到你的设备上。


    > **注意**

    > 这有时会让用户感到困惑，他们认为从商店购买的任何视频都将始终可以从其设备播放。除非你下载了视频，否则只有在你拥有互联网连接时才能观看。


    下载文件会将电影或节目的副本复制到你的设备上，以便随时观看。如果你想在没有网络连接或连接速度较慢时观看电影或节目，这会很方便。例如，如果你要进行长途飞行并想在平板电脑上观看电影，你应该先下载它，这样你就可以在没有网络连接的情况下观看。


    当你开始下载电影或电视节目时，你可以通过选择应用中的“下载”部分，然后点击/轻触左上角的“菜单”控件查看下载队列来检查下载进度。你可以从此屏幕暂停、继续或取消下载。

