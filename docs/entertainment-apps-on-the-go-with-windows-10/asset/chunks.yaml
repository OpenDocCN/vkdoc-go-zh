- fmt: '# Using Dropbox to Store Your Music Collection


    Another option for storing your music in the cloud is with a service called Dropbox.


    Dropbox is a cloud storage service that offers free and paid plans. At the time
    of writing, Dropbox has a free plan that gives you 2GB of space; you can purchase
    additional space if required.


    Dropbox works by synchronizing folders between the cloud and your devices (and
    PCs). It isn’t integrated with Groove Music like OneDrive is, but you can still
    use it to make sure your music is on all your Windows 10 PCs.


    To get started with Dropbox, you will need an account. If you don’t already have
    one, go to `Dropbox.com` and create one.


    Dropbox also has clients for all the major mobile platforms including the Apple
    Mac, although it’s outside the scope of this book to show how to use them.


    You then need to download the Dropbox add-in for Windows. To obtain this, go to
    `Dropbox.com` and log in. Click your username, click the Install link, and click
    the Download button to start the download.


    After the download has completed, run the installer. You will be asked to sign
    in to the program; after you sign in, Dropbox will start synchronizing your PC.


    By default Dropbox syncs all your Dropbox content to a new folder based on your
    username, for example `Ian\Dropbox` (Figure [2-7](#A978-1-4842-1473-2_2_Chapter.html#Fig7)).
    In this folder you can then create a `Music` folder and copy your music to it,
    and Dropbox will start uploading it.


    ![A978-1-4842-1473-2_2_Fig7_HTML.jpg](A978-1-4842-1473-2_2_Fig7_HTML.jpg)


    Figure 2-7.


    If you want to have Groove play music that is stored in the Dropbox `Music` folder,
    you should right-click the `Music` folder in Dropbox via File Explorer, select
    Include in Library, and then select Music.


    If you don’t want Dropbox to sync your entire Dropbox content with your PC, you
    can switch to selective syncing by following these steps:


    - Right-click the Dropbox icon in the taskbar.

    - Click the Setting icon.

    - Select Preferences.

    - On the Account tab, click Selective Sync (Figure [2-7](#A978-1-4842-1473-2_2_Chapter.html#Fig7)).

    - Select the folders you want to sync with this PC and then click OK to finish.


    You have now looked at storing music on three of the major cloud services and
    how easy it is to access these on your PC and other devices. There is one other
    Windows 10 device you haven’t learned about: Xbox One. As part of the Windows
    10 release, Xbox One is going to be updated to run a version of the operating
    system. Xbox One is designed as an entertainment device, but how do you listen
    to your music on it? In the next section, you will see how. If you have stored
    your collection on OneDrive, it is pretty easy.


    # Accessing Music with Xbox One


    The great thing about storing your music on Microsoft’s OneDrive is that your
    music is available not only on your Windows 10 PCs, tablets, and phones but also
    on Xbox One. Once you have your music stored in OneDrive, you can just go to your
    Xbox One and open the Groove app.


    As mentioned, the Groove Music Service was previously known as Xbox Music, and
    it may still be called this on your Xbox.


    Groove (Figure [2-8](#A978-1-4842-1473-2_2_Chapter.html#Fig8)) is split into four
    sections: Home, Radio, Featured, and Top music.


    ![A978-1-4842-1473-2_2_Fig8_HTML.jpg](A978-1-4842-1473-2_2_Fig8_HTML.jpg)


    Figure 2-8.


    In the Home section, you will see Playlists, Collection, and Search tiles along
    with recently played music.


    To browse your music, just select the Collection tile; you will see all the artists
    you have stored in OneDrive.


    In many places in the Groove app, you will be able to see music from the Groove
    Music Services’ online collection, such as the Artists view or the Radio stations
    view. You will need to have a Groove Music Pass subscription (see [Chapter 1](#A978-1-4842-1473-2_1_Chapter.html))
    to be able to play the music. If you don’t have a Groove Music Pass subscription,
    you get ten free plays, so you can try the service before you subscribe.


    You can instantly start playing music by selecting the Play button at the top
    left of the app. This will start playing all your music in a random order. This
    is handy if you want to listen to your music but don’t exactly know what kind
    of music you are in the mood for.


    In the Collection view you can search (Figure [2-9](#A978-1-4842-1473-2_2_Chapter.html#Fig9))
    for a song, album, or artist by selecting the search button. With the onscreen
    keyboard, you can type whatever you want to search for, and the app will suggest
    matching items that you can select from the list, or you can type your search
    in full and select Search.


    ![A978-1-4842-1473-2_2_Fig9_HTML.jpg](A978-1-4842-1473-2_2_Fig9_HTML.jpg)


    Figure 2-9.


    The results (Figure [2-10](#A978-1-4842-1473-2_2_Chapter.html#Fig10)) of the search
    will be displayed on the screen, and you can navigate through the list using the
    left and right controls on the Xbox controller. When you find the item you want,
    select it using the A button on the controller.


    ![A978-1-4842-1473-2_2_Fig10_HTML.jpg](A978-1-4842-1473-2_2_Fig10_HTML.jpg)


    Figure 2-10.


    If the item you select is an album (Figure [2-11](#A978-1-4842-1473-2_2_Chapter.html#Fig11)),
    you have the option of selecting Play Album, which as you would expect plays the
    album.


    ![A978-1-4842-1473-2_2_Fig11_HTML.jpg](A978-1-4842-1473-2_2_Fig11_HTML.jpg)


    Figure 2-11.


    The Add Album button gives you the option to add the album to the current Now
    playing bar, a new playlist, or an existing playlist.


    The Start Radio button creates a custom radio station based on the artist of the
    album. The custom station contains songs from the artist along with songs from
    albums that are similar to the original artist. This is a great way of discovering
    new music.


    For the Start Radio function to work, you will need a Groove Music Pass subscription.
    See [Chapter 1](#A978-1-4842-1473-2_1_Chapter.html) for more information on subscriptions.


    The Explore Artist button gives you the option to play music from the artist,
    start a radio station based on the artist, add songs to a playlist or the Now
    playing bar, and pin the album to the home screen.


    `Pin to Home` adds the album to the Home screen on Xbox One so you can quickly
    start playing songs by the artist. You can also browse the artist’s music in your
    collection from this screen. Plus, you have the option to delete the album from
    your collection in this screen.'
  raw: '## Using Dropbox to Store Your Music Collection


    Another option for storing your music in the cloud is with a service called Dropbox.


    Information


    Dropbox is a cloud storage service that offers free and paid plans. At the time
    of writing, Dropbox has a free plan that gives you 2GB of space; you can purchase
    additional space if required.


    Dropbox works by synchronizing folders between the cloud and your devices (and
    PCs). It isn’t integrated with Groove Music like OneDrive is, but you can still
    use it to make sure your music is on all your Windows 10 PCs.


    To get started with Dropbox, you will need an account. If you don’t already have
    one, go to Dropbox.com and create one.


    Information


    Dropbox also has clients for all the major mobile platforms including the Apple
    Mac, although it’s outside the scope of this book to show how to use them.


    You then need to download the Dropbox add-in for Windows. To obtain this, go to
    Dropbox.com and log in. Click your username, click the Install link, and click
    the Download button to start the download.


    After the download has completed, run the installer. You will be asked to sign
    in to the program; after you sign in, Dropbox will start synchronizing your PC.


    By default Dropbox syncs all your Dropbox content to a new folder based on your
    username, for example `Ian\Dropbox` (Figure [2-7](#A978-1-4842-1473-2_2_Chapter.html#Fig7)).
    In this folder you can then create a `Music` folder and copy your music to it,
    and Dropbox will start uploading it.


