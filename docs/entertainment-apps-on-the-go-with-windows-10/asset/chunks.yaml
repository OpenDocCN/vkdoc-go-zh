  raw: '## Afterword


    In the introduction to this book, we mentioned how over ten years of producing
    our weekly Digital Lifestyle Show we have seen many ways of storing and playing
    your media, be that music, video, or photos, come and go. We hope we have demonstrated
    in this book that Windows 10 has the potential to be one of the best ways to handle
    that media.


    We’ve shown how the built-in apps are capable of handling your own media collection
    but have also added a wealth of features such as storing your collection in the
    cloud to play anywhere. The new Windows Store offers a one-stop shop for purchasing
    media, and the Groove Music subscription is a good competitor for services such
    as Spotify, although it is a shame there is not a free tier.


    We’ve shown how Windows 10 plays nicely with alternative music services such as
    Apple, Google, and Amazon and even how Microsoft has made its own services available
    on Android and iOS.


    We’ve looked at the way Windows 10 can stream media around your house and even
    beyond using the built-in (and familiar if you have used previous Windows versions)
    Windows Media Player and third-party services.


    All in all, we are really excited about Windows 10; it is already one of the most
    compelling media solutions, and with the prospect of ongoing updates and the ability
    for developers to write apps across all Windows platforms, including Xbox, it
    can only get better.


