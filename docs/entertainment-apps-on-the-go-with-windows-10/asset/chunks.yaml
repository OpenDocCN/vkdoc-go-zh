- fmt: '# Using OneDrive to Store Your Music


    OneDrive is Microsoft’s cloud storage solution that you can use to store any files,
    including documents, photos, and media files. You can then access your content
    via the Web and via the OneDrive apps Microsoft provides for iOS, Android, and
    Windows. Microsoft gives you 15GB of storage for free when you create a Microsoft
    account, and you can purchase more storage at `OneDrive.com`. If you have an Office
    365 subscription, you automatically get 1TB of OneDrive storage.


    The great thing about OneDrive and Groove Music is that the two services work
    together so that the music you store in OneDrive is available on your other devices.


    It is really simple to copy your music to the cloud with OneDrive; all you have
    to do is store your music in the `Music` folder on OneDrive on your PC. OneDrive
    is included in Windows 10, so you don’t have to download any extra software to
    get it working.


    When you first set up OneDrive on a Windows 10 PC, you get the option of syncing
    your entire OneDrive storage or selecting individual folder synchronization. If
    you have selected your entire collection, then you are ready to start, but if
    you haven’t or haven’t set up OneDrive yet, you need to tell OneDrive to synchronize
    your `Music` folder.


    To do this, right-click the OneDrive icon (Figure [2-1](#A978-1-4842-1473-2_2_Chapter.html#Fig1))
    in the taskbar, select Settings, and click the Choose Folders tab, as shown in
    Figure [2-1](#A978-1-4842-1473-2_2_Chapter.html#Fig1).


    ![A978-1-4842-1473-2_2_Fig1_HTML.jpg](A978-1-4842-1473-2_2_Fig1_HTML.jpg)


    Figure 2-1. Choosing folders in OneDrive; also showing the OneDrive icon


    Click the `Choose Folders` button, and you will see your OneDrive folder list.
    Select the `Music` folder (Figure [2-2](#A978-1-4842-1473-2_2_Chapter.html#Fig2)),
    click to confirm the selection, and click then OK to close the dialog box.


    ![A978-1-4842-1473-2_2_Fig2_HTML.jpg](A978-1-4842-1473-2_2_Fig2_HTML.jpg)


    Figure 2-2. Selecting the Music folder in OneDrive


    OneDrive will then sync your `Music` folder to your PC. If you already have music
    in the folder, it will be copied to the PC.


    Once you have a `Music` folder in OneDrive, any music you place in this folder
    will be available to the Groove Music apps on other devices. So, by placing your
    music in the OneDrive folder, it will be stored not only on your local PC but
    also in the cloud for access on a phone, tablet, or other PC (Figure [2-3](#A978-1-4842-1473-2_2_Chapter.html#Fig3)).


    ![A978-1-4842-1473-2_2_Fig3_HTML.gif](A978-1-4842-1473-2_2_Fig3_HTML.gif)


    Figure 2-3. How OneDrive links your devices


    As you saw in [Chapter 1](#A978-1-4842-1473-2_1_Chapter.html), Microsoft’s Groove
    Music is already set up to play music stored on OneDrive, so once music has uploaded
    to the cloud, it will be available in the Groove Music app.


    You saw how easy it is to use Microsoft’s OneDrive cloud solution, but what if
    you prefer to use other vendors’ solutions? In the next few sections, you will
    take a look at some alternatives starting with using Google’s cloud solution with
    Windows 10.


    ## Storing Music with Google Play


    Google offers a free music storage service with which you can upload music from
    your PC to Google’s cloud and then access the music from other devices including
    the browser and iOS and Android apps.


    You can store up to 50,000 songs for free. To get started, you need to download
    Google’s Music Manager. Go to the Google Play menu, click on the `Upload Music`
    button and then click on the `Download Music Manager` button.


    Clicking the button will download the Music Manager setup program (Figure [2-4](#A978-1-4842-1473-2_2_Chapter.html#Fig4))
    to your PC; once it has downloaded, run the setup program. The setup program will
    download and run the setup wizard, where you will need to sign in with your Google
    username and password (if you don’t have a Google account, go to the Google Music
    web site and create one).


    ![A978-1-4842-1473-2_2_Fig4_HTML.jpg](A978-1-4842-1473-2_2_Fig4_HTML.jpg)


    Figure 2-4. Installing Google Play Music Manager


    If you already have music stored in Google Play, after signing into the Music
    Manager, the installation asks whether you want to upload songs to Google Play
    or download songs from Google Play. Otherwise, it will go straight to offering
    you the option to upload music. Later in this chapter you will look at the Download
    option. For now you will concentrate on uploading.


    ### Uploading Music with Google Music Manager


    Click the Upload option; the installation asks where on your PC the program should
    look for your music, as shown in Figure [2-5](#A978-1-4842-1473-2_2_Chapter.html#Fig5).


    ![A978-1-4842-1473-2_2_Fig5_HTML.jpg](A978-1-4842-1473-2_2_Fig5_HTML.jpg)


    Figure 2-5. Selecting upload locations in Google Play Music Manager


    The options are as follows:


    -   iTunes: Use this if you are using iTunes to manage your music on your PC.

    -   Windows Media Player: Use this if you are using Windows Media Player as your
    main music program.

    -   My Music folder: Use this option if you have your music in the `Music` folder
    in Windows 10; this is the default location in Windows.

    -   Other folders: With this option you can manually locate your music on your
    PC. So if you have them in a special folder you have created, you can tell Google
    Music Manager to upload music from that folder. You can have multiple folders
    monitored by the app.


    When you finish the installation, it will ask you whether you want to automatically
    upload new music to Google Music. If you do this, Google Music Manager will monitor
    the folders you selected, and if you add new music, it will copy the music to
    Google Music automatically.


    After completing the setup, a Google Music Manager program will run in the taskbar
    area in Windows.


    **Tip:** If you need to adjust any of the settings after installing, you will
    find the program in the “All apps” list in Windows 10.


    ### Downloading Music with the Google Music Manager


    Google Play Music gives you the option of downloading your entire music collection
    to your PC in one go. To do this, you use the same app as you do to upload music.


    You can then click/tap the `Download Music Manager` button. Run the setup program,
    and after signing into the program with your Google Play Music account, the program
    asks if you want to upload or download music.


    Select the Download option. Then it asks which folder you would like to download
    music to. You will then get the choice of downloading your library of music already
    uploaded to Google Play Music or downloading only the music you have purchased
    from Google (Figure [2-6](#A978-1-4842-1473-2_2_Chapter.html#Fig6)). The “Download
    my library” option downloads all the songs you have uploaded to Google Play Music,
    and the “Download all my free and purchased music” option only downloads only
    the songs you have obtained from the Google Play music store.


    ![A978-1-4842-1473-2_2_Fig6_HTML.jpg](A978-1-4842-1473-2_2_Fig6_HTML.jpg)


    Figure 2-6. Download options in Google Music Manager


    **Tip:** The Download option is a great way to set up a new PC with your music
    for offline playback.'
