    \n本作品受版权保护。出版方保留所有权利，涉及全部或部分材料，具体包括翻译权、重印权、插图复用权、朗诵权、广播权、缩微胶片或其他物理形式复制权、传输或信息存储与检索权、电子改编权、计算机软件权，以及目前已知或今后开发的类似或不同方法的使用权。法律保留的例外情况包括：与评论或学术分析相关的简短摘录，或专门为输入并执行于计算机系统而提供的材料，仅供作品购买者专用。本出版物或其部分的复制仅允许在出版方所在地现行版权法条款下进行，且使用许可须始终从斯普林格（Springer）获取。使用权可通过版权清算中心的\
    \ RightsLink 获取。违反相关版权法将面临起诉。\n\n书中可能出现商标名称、标识和图像。我们在使用商标名称、标识或图像时，仅出于编辑目的并维护商标所有者权益，无意侵犯商标权，因此不会在每个出现处附加商标符号。本出版物中使用的商品名称、商标、服务标志及类似术语，即使未明确标明，也不应被视为对其是否受所有权保护的意见表达。\n\
    \n尽管本书中的建议和信息在出版时被认为是真实准确的，但作者、编辑及出版方均不对可能出现的任何错误或疏漏承担法律责任。出版方不对本书所含内容做出任何明示或暗示的保证。\n\
    \n本书全球发行由纽约斯普林格科学与商业媒体公司（Springer Science+Business Media New York）负责，地址：233 Spring\
    \ Street, 6th Floor, New York, NY 10013。电话：1-800-SPRINGER，传真：(201) 348-4505，电子邮件：`orders-ny@springer-sbm.com`，或访问\
    \ `www.springer.com`。Apress Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是斯普林格科学与商业媒体金融公司（SSBM\
    \ Finance Inc）。SSBM Finance Inc 是一家特拉华州公司。\n\n感谢金姆（Kim）和露丝（Ruth）在我们撰写本书期间给予的支持与理解，感谢阿普雷斯出版社的杰出同仁们给予的帮助，以及所有启发我们的读者和听众。\n\
    \n## 引言\n\n在主持《数字生活秀》周刊的十多年里，我们见证了存储和播放媒体（无论是音乐、视频还是照片）的多种方法的兴衰更替。\n\n最初，大多数听众如果存储媒体的话，通常是存放在\
    \ Windows 台式机上，并通常在同一台电脑上使用。他们可能拥有某种 MP3 播放器，而 iPod 也开始崭露头角，但这显然不像现在这样是一个多元化的市场。\n\
    \n我们见证了苹果 iOS 和谷歌 Android 平台的崛起、可下载媒体的诞生，以及近年来 Netflix 等流媒体服务的蓬勃发展。\n\n尽管在早期，我们曾梦想拥有一个集成的系统，可以在台式机、手机甚至游戏平台上收听和观看媒体，但这个梦想已化为泡影，取而代之的是一个媒体通常与你最常使用的技术家族（无论是微软、苹果还是谷歌）绑定的世界。\n\
    \n即便在微软的平台内部，要找到一个统一的解决方案来共享媒体也变得越来越困难。\n\n正因如此，我们对 Windows 10 带来的机遇感到无比兴奋。它承诺提供一个通用的\
    \ Windows 平台，使应用程序能够在其支持的任何平台上的任何 Windows 10 变体上运行。Windows 10 支持众多平台，从台式机、笔记本电脑到平板电脑和手机，甚至包括\
    \ Xbox One 和树莓派 2。\n\n微软还巧妙地将其 Windows 10 中的一些核心媒体应用开放至其他平台，包括苹果和谷歌。\n\n你的媒体来源及其存储方式仍将取决于你骨子里是微软、苹果还是谷歌的忠实用户，但\
    \ Windows 10 带来了在任何地方都能消费这些媒体的希望。\n\n本书将帮助你实现这一愿景。"
