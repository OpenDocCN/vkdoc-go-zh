    Once you have an account, you sign in with your username and password. Netflix
    will display a selection of content, and you can scroll from left to right to
    browse Netflix content (see Figure [3-6](#A978-1-4842-1473-2_3_Chapter.html#Fig6)).


    ![A978-1-4842-1473-2_3_Fig6_HTML.jpg](A978-1-4842-1473-2_3_Fig6_HTML.jpg)


    Figure 3-6.


    Netflix on a Windows 10 PC


    When you select a movie (see Figure [3-7](#A978-1-4842-1473-2_3_Chapter.html#Fig7))
    or TV show, the app shows you the movie or show artwork, a synopsis of the content,
    and information about the cast. For TV shows, it may also show you information
    about what other episodes and seasons are available.


    ![A978-1-4842-1473-2_3_Fig7_HTML.jpg](A978-1-4842-1473-2_3_Fig7_HTML.jpg)


    Figure 3-7.


    Movie information from Netflix Information


    For TV shows and some movies that do not have artwork, then a scene from the show
    will be used instead.


    To start the playback, click/tap the Play icon on the artwork image, and the app
    will start playing. The other option you have is to add the movie or TV show to
    your personal list. Clicking/tapping the Add to My List button adds the title
    to your list, which you can view from the front page of the app. You can use this
    to build up a list of movies and TV shows you want to watch in the future.


    Information


    One nice thing about lists is that they persist across all your Netflix apps,
    so you can add a movie to your list on your phone, and it will be available on
    your PC and Xbox.


    You can also search for a movie title, TV show, or actor by selecting the search
    box and typing in your search terms. You can then browse through the search results
    and pick your title.


    Another nice feature of Netflix is that you can create profiles for each family
    member who uses your account, so you could create a profile for yourself and a
    separate one for a child. That way, Netflix can recommend content to each person
    based on what they watch.


    When you start watching content on Netflix, it remembers where you are in the
    movie or TV show, so if you decide to stop watching a movie and watch it later,
    it will continue from where you left off. This also works across devices including
    phones, smart TVs, and media player devices, so you could start watching on your
    PC, continue on your phone, and then finish watching it on an Xbox One.


    Apple or Android Phone Users


    Netflix will also remember where you are when you stop and share this information
    across devices, meaning you can start watching on your phone, for example, and
    continue playback on your Windows 10 device or another device such as a PlayStation
    3 or 4 or a smart TV.'
