- fmt: '### Accessing Shared Folders with Windows 10


    Once you have set up network shares, you can access the content from them in a
    couple of ways. You can view and play them via File Explorer, or you can add the
    folders to the Groove Music and Films & TV apps.

    To access the content via File Explorer, select File Explorer from the Start menu
    and then select the Network link. Windows will show the computers and media devices
    on your home network.

    (If you don’t see any devices, Windows thinks you are on a public network; to
    change this, see the tip in the “Accessing Media Using a Homegroup” section.)

    **Information**

    In the next chapter, you will look at how to access music and videos from non-PC
    media devices, so for now you will just look at accessing the content on the computers
    listed.

    Double-click the computer you want to access the content from, and then it will
    list shared folders. If you don’t see any folders, you will need to share them
    as detailed in the instructions earlier in this chapter.

    When you double-click a folder, it will list folder contents, and if there is
    a video or music file you want to play, just double-click it, and Windows 10 will
    then ask you which app you want to use to play the file. If the file is a video
    file, the default option will be the Film & TV (or Movies & TV depending on your
    location) app, but the dialog box will show other apps that can play the file
    (Figure [4-12](#A978-1-4842-1473-2_4_Chapter.html#Fig12)). Select the app you
    want to use, and then it will play the file. (The Windows 10 Film & TV app is
    probably your best option, but as you saw in the previous chapter, VLC is also
    a good alternative.) If you don’t want Windows to ask which app to use each time
    you play the file, you can select the “Always use the app to open…” option and
    Windows will remember your choice.

    ![A978-1-4842-1473-2_4_Fig12_HTML.jpg](A978-1-4842-1473-2_4_Fig12_HTML.jpg)

    Figure 4-12. Playing a file

    The file will play them over your home network.


    ### Adding Remote Computer Folders to Your Music and Film & TV Apps


    If you frequently play content from other computers on your network, you can add
    the remote folders to the media apps, and then you don’t have to navigate to the
    required folder each time.

    To add a folder to the Film & TV app, open the app and select Settings. Then select
    “Choose where we look for videos.” Select the + button and then, using the Explorer
    window, navigate to the folder containing the videos via the Network link. Select
    the folder you want and then click “Add this folder to videos.” Then you can add
    more folders in the same way and click Done.

    The app will then index the content and add it to the Videos section where you
    will be able to browse and play the content.

    You can do the same with the Groove music app; go to Settings, select “Choose
    where we look for music on this PC,” and add your other computer folders.

    **Information**

    If you add the folders to a tablet or laptop and then take your devices outside
    of your home network, you will not be able to access the shared content. If this
    is something you would like to do, take a look at the next chapter.


    ## Summary


    In this chapter, you learned how to share your media on your home network via
    Windows Media Player, file sharing, and homegroups. You also saw how easy it is
    to consume such media on Windows 10. In the next chapter, you will look at third-party
    software that will help if you want a bit more control over your sharing or want
    to stream to non-PC devices such as TVs and network media players.


    # 5. Streaming Media Around the Home


    With Windows 10 you can stream music and videos from media servers on your network
    using a standard called Digital Living Network Alliance (DLNA). DLNA is a certified
    standard for media servers, media players, and applications to work together.
    With DLNA you have a media server and something called a media renderer. The server
    could be a PC running Windows Media Player, a network-attached storage (NAS) box
    in your home, or media server software installed on a PC.


    In the previous chapter, you learned how you can set up Windows Media Player to
    work as a media server, and in this chapter you will look at how you can stream
    from Windows Media Player and other media servers on your home network.


    You will also learn how you can send media on your PC to DLNA-compatible devices
    on your home network using Windows 10, including how some third-party software
    can help you stream from your Windows 10 phone.


    ## Streaming from a DLNA Server to a Windows PC


    When you have media servers set up on your network, you can stream media stored
    on them from a Windows 10 PC. In the previous chapter, you set up Windows Media
    Player to work as a DLNA server, and you can also use Windows Media Player to
    access content on other PCs on your network using DLNA.


    **Information**

    DLNA is a standard allowing media devices from different (or the same) manufacturers
    to share content over the network they are attached to. This standard is controlled
    by the Digital Living Network Alliance. Quite a few devices support DLNA, including
    many smart TVs and modern audio systems.


    When you run Windows Media Player on a PC running on the same network as other
    PCs, you will see listed libraries that have been shared from the other PCs (Figure
    [5-1](#A978-1-4842-1473-2_5_Chapter.html#Fig1)).

    ![A978-1-4842-1473-2_5_Fig1_HTML.jpg](A978-1-4842-1473-2_5_Fig1_HTML.jpg)

    Figure 5-1. Windows Media Player accessing DLNA servers


    **Note**

    PCs will be shown if they have shared their libraries in Windows Media Player
    (as discussed in the previous chapter) or are using third-party DLNA software
    such as Emby, which is discussed in the next chapter.


    As well as seeing PCs with Windows Media Player (also known as WMP) running in
    shared mode, you will see other DLNA servers on your network, which could include
    NAS devices, Sonos devices, and other media servers.


    **Information**

    DLNA is based on another standard: Universal Plug and Play Audio Visual (UPnP
    AV). Some manufacturers produce UPnP devices that will fully comply with the DLNA
    standard but do not want to call them DLNA because there is a licensing cost involved.
    This means that while not guaranteed, many UPnP Av devices will work perfectly
    happily with Windows 10’s DLNA features.


    If you don’t see any shared libraries, then either the other PCs are not configured
    correctly or the network you are connected to is currently in Public mode, which
    means it will not browse and connect to other devices. See the previous chapter
    for how to change your network to Private mode.


    Once Windows Media Player is displaying remote devices, click the device you want
    to connect to, and then Windows Media Player will give you the option (Figure
    [5-2](#A978-1-4842-1473-2_5_Chapter.html#Fig2)) of selecting Music, Videos, Pictures,
    and optionally Recorded TV or Playlists from the other PC.

    ![A978-1-4842-1473-2_5_Fig2_HTML.jpg](A978-1-4842-1473-2_5_Fig2_HTML.jpg)

    Figure 5-2. Content folders from a networked WMP library'
