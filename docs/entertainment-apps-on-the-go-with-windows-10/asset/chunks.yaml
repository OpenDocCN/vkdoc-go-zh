  trans: '

    ### 设置


    在应用的“设置”部分（图 1-14）中，有一些实用的配置选项。


    ![A978-1-4842-1473-2_1_Fig14_HTML.jpg](img/A978-1-4842-1473-2_1_Fig14_HTML.jpg)


    **图 1-14.** Android 中的设置（在撰写本文时，此处仍显示 Xbox Music 品牌，这是因为已变更为 Groove）。


    `Groove Music Pass` 按钮会带你进入 Groove Music Pass 管理页面；有关管理音乐订阅的详细信息，请参阅本章前面的内容。


    有一个选项允许使用移动数据进行流式传输。选中此选项后，应用将使用你手机的数据连接来流式传输音乐。如果你想阻止应用使用移动数据（3G/4G），请关闭此选项。


    > **注意：** Wi-Fi 流式传输不受此选项影响。


    有一个选项允许使用移动数据进行下载。开启此选项后，应用将能够使用你的移动数据连接下载歌曲以供离线播放。关闭此选项可阻止应用使用你的数据连接。


    > **注意：** Wi-Fi 下载不受此设置影响。


    此页面上的另一个选项是同步你的音乐收藏。这会将你在其他设备上对收藏所做的更改应用过来，同时也会将你在 Android 设备上所做的更改发送回云端。应用在加载时会自动同步你的收藏；因此，除非你进行了更改并希望立即同步，否则无需手动同步。


    在 Android 上使用 Groove 非常简单，但在 iPhone 上呢？在下一节中，你将看到同样简单。


    ### 在 iPhone 或 iPad 上使用 Groove


    Groove 的 iPhone 版本与 Windows 10 Mobile 和 Android 版本的应用非常相似。首先，前往你手机上的 App Store，搜索
    Groove Music。安装后，加载应用，它会要求你登录 Microsoft 帐户。这是你之前在 Windows 上用于将收藏上传到 OneDrive 的帐户，或是你订阅
    Groove 时使用的帐户。


    登录应用后，你会看到你的音乐收藏。应用顶部有四个用于查看收藏的按钮：艺术家、专辑、歌曲和流派。


    当你按艺术家或专辑（图 1-15）查看音乐时，你会看到在艺术家或专辑图片上覆盖有一个播放图标。点击该图标，应用将开始播放该艺术家或专辑中的歌曲。


    ![A978-1-4842-1473-2_1_Fig15_HTML.jpg](img/A978-1-4842-1473-2_1_Fig15_HTML.jpg)


    **图 1-15.** iOS 上的专辑视图。


    如果你点击某位艺术家，应用会在“我的专辑”部分显示你收藏中的专辑；如果你拥有 Groove Music Pass 订阅，你还会看到一个“所有专辑”部分，其中包含该艺术家未收录在你收藏中的专辑。要播放专辑，请点击专辑图片。要查看专辑中的曲目，请点击专辑标题，你将看到该专辑中的所有歌曲；点击一首歌曲即可播放。


    你还可以使用应用搜索歌曲、艺术家或专辑。要执行搜索，请点击菜单按钮，然后在搜索框中输入你要查找的内容。应用将列出匹配的结果，首先显示艺术家，然后是专辑，最后是歌曲。


    在查看艺术家时，还会显示一段简介，为你提供关于该艺术家的背景信息。


    ### 离线播放


    与 Android 和 Windows 版本的应用一样，你可以下载音乐文件，以便在没有网络连接的情况下离线播放。


    在收藏视图中，向上滚动到列表顶部，你会看到一个下拉菜单，默认显示“所有音乐”。此选项表示显示你所有的音乐收藏。要仅显示已下载的音乐，请将其更改为“可供离线使用”。要仅显示存储在云端的音乐，请将其更改为“仅在线可用”。


    要将音乐下载到你的 iPhone，请长按一首歌曲、一位艺术家或一张专辑，然后从菜单中选择“设为可供离线使用”选项。这会将所选项目下载到 iPhone，为离线播放做好准备。


    > **注意：** 下载的音乐只能使用 Groove 应用播放；你不能使用第三方 Android 应用播放来自 Groove 的音乐。


    ### 广播


    与 Groove 的 Windows 版本一样，如果你有 Groove Music Pass 订阅，你可以基于某位艺术家创建自定义广播电台（图 1-16）。


    ![A978-1-4842-1473-2_1_Fig16_HTML.jpg](img/A978-1-4842-1473-2_1_Fig16_HTML.jpg)


    **图 1-16.** iOS 上的广播选项。


    首先，点击应用左上角的菜单按钮，选择“广播”选项。然后输入艺术家姓名，或从推荐的艺术家中选择。应用将根据你选择的艺术家创建一个自定义播放列表，并将其存储在“最近”部分，以便日后访问。


    ### 设置


    你可以通过点击菜单按钮找到应用设置。在“设置”部分，有一个启用蜂窝数据的按钮。这意味着选中该选项后，你可以通过手机的数据连接进行流式传输和下载音乐。如果你想避免使用数据流量，请关闭此选项。


    此页面上的另一个选项是同步你的音乐收藏。这会将你在其他设备上对收藏所做的更改应用过来，同时也会将你在 iPhone 设备上所做的更改发送回云端。应用在加载时会自动同步你的收藏；因此，除非你进行了更改并希望立即同步，否则无需手动同步。


    你已经了解了如何使用 Groove 访问你的音乐收藏，以及通过订阅获取音乐。你还看到了如何在 Windows 桌面、平板电脑、笔记本电脑和手机，以及 Android
    和 iPhone 上播放这些音乐。如果你已经在其他音乐源（如 Google 的服务）上投入了大量精力，该怎么办？在接下来的几节中，你将了解如何在 Windows
    10 中播放来自其他服务的音乐，首先从 Google 音乐开始。

    '
- fmt: '# Google Music on Windows 10


    **Note**


    Google Music is currently unavailable in Windows 10 Mobile. There used to be third-party
    apps to fill this gap, but unfortunately Google removed the application programming
    interface (`API`) that these apps relied on, and currently there are no replacement
    options.


    If you are already using Google’s music service on your Android phone or tablet,
    the good news is that you can also access the content from Windows 10. Google
    does not support Windows 10 but until recently third-party developers had filled
    the gap left by Google. Unfortunately, as mentioned, the interface these applications
    relied on has been removed by Google. Fortunately, there is still a way to access
    your subscription on the Windows 10 desktop.


    For Windows 10 you use the `Edge` web browser to access Google Play Music. Google
    has a web-based version of Google Play Music; just go to [`http://music.google.com`](http://music.google.com/)
    from the browser and sign in with your Google username and password.


    **Note**


    With the web version of Google Play Music, there is no offline playback, so you
    will need to have Internet access for it to work.


    When you load the music page, you are presented with your music library stored
    in Google Play Music. In [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html), you
    will see how you can store your music in Google’s cloud so that it shows up in
    your browser (Figure [1-17](#A978-1-4842-1473-2_1_Chapter.html#Fig17)).


    ![A978-1-4842-1473-2_1_Fig17_HTML.jpg](A978-1-4842-1473-2_1_Fig17_HTML.jpg)


    **Figure 1-17.** Google Play Music


    Just as Microsoft has a music subscription service, Google has a music plan. Google
    charges around $9.99 (£9.99) per month for access to Google’s library of music.
    Once you have subscribed to its service, you can listen to any music in Google’s
    collection. If you do not subscribe to the music plan, you just get access to
    music you have uploaded yourself (see [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html))
    or have purchased from Google Play Music.


    **Information**


    Exclusively in the United States, Google also has a free advertising-supported
    streaming service that allows you to listen to any of the songs in Google’s music
    library without having to pay anything. With the free service you are not allowed
    to download songs for offline playback and there are ads played at varying intervals
    during playback.


    Regardless of where you obtain your music from, you can search your collection
    by typing into the search box, and the search results are displayed in the lower
    part of the screen. If you hover the mouse over an album, you will see a Play
    icon overlaid on the artwork, and clicking this will play the album.


    You can select an album or artist by clicking/tapping it, which will list the
    tracks. At the bottom of the page there is a Play icon that will start the playback
    of the album or songs from the artist. You play a single song by selecting it
    from the playlist.


    When you are playing music, the bottom of the screen shows you song artwork, and
    there are Previous Track, Pause, Next Track, Shuffle, and Repeat buttons.


    There is also a volume icon that you can click/tap to control the playback volume.


    Despite Google Play Music being a web page, you can still have it pinned to the
    Start menu like you do with apps. In the `Edge` browser, click the menu button
    (three dots) and then click Pin To Start. This creates a tile on the Start menu
    that selecting will take you straight to the music page.


    # iTunes Music with Tablets and Laptops


    If you use `iTunes` to manage your music collection, it is simple to integrate
    it with Windows 10. You don’t have to change anything in `iTunes`; all you have
    to do is tell the `Groove` app where your `iTunes` music collection is stored.
    By default `iTunes` stores its music in the `This PC\Music` folder (Figure [1-18](#A978-1-4842-1473-2_1_Chapter.html#Fig18)),
    and `Groove` already monitors this folder for new music.


    ![A978-1-4842-1473-2_1_Fig18_HTML.jpg](A978-1-4842-1473-2_1_Fig18_HTML.jpg)


    **Figure 1-18.** Music location in `iTunes`


    If you have changed the location of the `iTunes` music folder, you can tell the
    `Groove` app which folder you have located the music in via the `Groove` app,
    as detailed in the first section of this chapter.


    **Information**


    In [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html), you will see how you can change
    the music folder of `iTunes` so that ripped music and music purchased through
    `iTunes`, will be automatically stored on `OneDrive`.


    # Transferring to Windows 10 Phones from `iTunes` and More


    You can copy music directly from a Windows 10 PC or tablet to a Windows phone
    either using the Internet or directly via a USB connection.


    If you use USB, you can copy files using File Explorer. Once you have the phone
    connected, you can copy content from your PC to your phone. Connect your phone
    via USB and make sure your phone is unlocked.


    Then you can browse your file system with File Explorer and find the music you
    want to copy. Once you have found an artist, album, or song, right-click (or tap
    and hold) and select Copy.


    Then via File Explorer in the `This PC` section, you will see your Windows phone;
    navigate to the `Music` folder and then select Paste. This will copy your selection
    to the phone.


    You can also place the two windows side by side and copy folders between your
    PC and phone by simply dragging and dropping.


    # Internet Radio with TuneIn Radio


    There are thousands (if not millions) of radio stations available on the Internet
    covering almost every interest, topic, and genre. You can access these stations
    from your phone, tablet, or PC with an app called `TuneIn Radio` (Figure [1-19](#A978-1-4842-1473-2_1_Chapter.html#Fig19)).


    ![A978-1-4842-1473-2_1_Fig19_HTML.jpg](A978-1-4842-1473-2_1_Fig19_HTML.jpg)


    **Figure 1-19.** `TuneIn Radio` in Windows 10


    Install the app from the Windows Store (just search for `TuneIn`).


    From the app you can search for a radio station by name, or you can browse by
    genre including local radio, music, sports, news, talk, location, language, or
    podcasts (Figure [1-20](#A978-1-4842-1473-2_1_Chapter.html#Fig20)).


    ![A978-1-4842-1473-2_1_Fig20_HTML.jpg](A978-1-4842-1473-2_1_Fig20_HTML.jpg)


    **Figure 1-20.** Browse by genre in `TuneIn Radio`


    To find a station by name, you need to bring up the search box in the app. From
    the app menu (top left), select Search to bring up the search box where you can
    type in the name of the required station. On the phone version, you can type your
    search straight into the search box in the app.


    If you don’t know the name of the station, you can select a category to browse
    from the left list. For example, if you want a new station, select “news” from
    the browse list, and then the app will list news radio stations. To start playing
    the station, just select it from the search results, which brings up the station
    and starts playing it.


    Once you have found your station, you can add it to your favorites list so you
    can easily find it again later; just select Add To Favorites. You can also pin
    a radio station to the Start menu for quick access at any time by selecting the
    Pin button. The station will then be added to the Start menu.


    **Information**


    `TuneIn Radio` doesn’t actually use FM or AM radio to receive the signal. It streams
    the content over the Internet so you can listen to broadcasters from anywhere
    around the world.


    **Caution** Be aware that if you are streaming radio over a metered data connection
    such as `3G`, you could run up data charges. See [Chapter 3](#A978-1-4842-1473-2_3_Chapter.html)
    on how to measure your usage.


    `TuneIn Radio` is mainly about giving traditional broadcast stations a voice on
    the Internet, but what about less traditional ways of getting content heard such
    as podcasts? In the next section, you will see what they are and how you can easily
    listen to them in Windows 10.'
