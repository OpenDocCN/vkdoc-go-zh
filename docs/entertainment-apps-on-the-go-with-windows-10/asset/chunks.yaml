- fmt: '# Setting Up Windows Media Player


    If you just want to share music and videos between PCs, another option is to set
    up a media server. You will look at two of the best third-party systems for doing
    this in the next chapter, but for simple streaming, you can use the built-in `Windows
    Media Player`.


    While the `Windows Media Player` (Figure [4-7](#A978-1-4842-1473-2_4_Chapter.html#Fig7))
    is a relatively old program and for listening to music the modern `Groove Music`
    app is much better, `Windows Media Player` can be used to serve content to other
    devices on your network and for listening to music stored on other devices in
    your home.


    ![A978-1-4842-1473-2_4_Fig7_HTML.jpg](A978-1-4842-1473-2_4_Fig7_HTML.jpg)


    Figure 4-7.


    `Windows Media Player` in Windows 10


    First let’s look at setting up media sharing.


    Windows 7, Windows 8.1, and Windows 10 have `Windows Media Player` built in and
    can found by clicking in the search box and typing `Windows Media Player`.


    When you load `Windows Media Player` for the first time, it will ask whether to
    use recommended or custom settings. For now, select Recommended (you can customize
    the settings later if you want). The program searches for music and videos in
    your Music and Videos libraries. If your media is located in a folder that isn’t
    part of your Music or Videos libraries, then the easiest way to get them into
    `Windows Media Player` is to add the folder to the relevant library.


    **Tip**


    Adding a folder to a library is easy. Using `File Explorer`, right-click the folder
    and select “Include in library.” Then pick the relevant content type (so Music
    for a folder containing music and Video for a folder containing videos). Once
    you add the content to a library, `Windows Media Player` will automatically index
    the media and display it in the app.


    The next step is to turn on media streaming in `Windows Media Player`. Click the
    Stream menu item, and if you have already set up a homegroup (discussed earlier),
    your media library will be shared with other devices in the homegroup. If you
    haven’t joined a homegroup, the option will say “Turn on media streaming” (Figure
    [4-8](#A978-1-4842-1473-2_4_Chapter.html#Fig8)).


    ![A978-1-4842-1473-2_4_Fig8_HTML.jpg](A978-1-4842-1473-2_4_Fig8_HTML.jpg)


    Figure 4-8.


    Turning media streaming on in `Windows Media Player`


    When you turn on media streaming, `Windows Media Player` brings up a confirmation
    dialog box where you need to click “Turn on media sharing.”


    The next screen gives you the control over which devices have access to your shared
    library. By default devices on your local network are allowed. If you want to
    specifically allow selected devices, you can unselect the “Media programs on this
    PC and remote connections…” option and select the machine you want to give access
    to.


    You can also name your library; click Next to finish the setup.


    Once you have done this, music in `Windows Media Player` on this machine will
    be available to your other devices running `Windows Media Player`.


    You have now looked at how to share your files by using a homegroup, a file share,
    and media sharing in `Windows Media Player`. In the next section, you will see
    how you can access that shared media.


    # Accessing Content Stored on Windows 7, 8.1, and 10 from a PC


    Once you have set up media sharing on your Windows 7, Windows 8.1, and Windows
    10 machines, you can access the content on your Windows 10 PCs, laptops, tablets,
    and phones. How you do that is different depending on how you shared the media.
    You will start by looking at media shared via a homegroup.


    ## Accessing Media Using a Homegroup


    Once you have set up a homegroup on your home network, you can join the network
    on a Windows 10 PCs and then access music and videos stored on other PCs.


    To join a homegroup, click Start and then select `File Explorer`. On the left
    side of `File Explorer`, you will see a Homegroup link. Click it and then select
    the “Join now” button on the right side.


    **Tip**


    It bears repeating that when you click the Network link, you might see a yellow
    banner saying “Network discovery and file sharing are turned off. Network computers
    and devices are not visible. Click to change…” (Figure [4-9](#A978-1-4842-1473-2_4_Chapter.html#Fig9)).


    ![A978-1-4842-1473-2_4_Fig9_HTML.jpg](A978-1-4842-1473-2_4_Fig9_HTML.jpg)


    Figure 4-9.


    Network discovery prompt


    This means your PC is on a network it thinks is public, so to protect your device,
    it restricts access to other computers on your network. As this is your home network,
    you can enable network discovery on a private network, so tap the yellow banner
    and select “Turn on network discovery and file sharing.”


    A dialog box then asks if you want to turn on network discovery and file sharing
    for all public networks. If you select this, it will enable network access on
    all public networks (e.g., a café’s public Wi-Fi), which isn’t a good idea, so
    you should select the No option, which switches your current network to private
    mode, and then you will be able to access homegroup and other network shares.


    Once you have clicked Join Now, Windows will start the Homegroup Wizard, so click
    Next to get started. The wizard will ask which folders you want to share with
    the homegroup, just as setting up the homegroup did earlier. The default is that
    Pictures, Videos, Music, and Printers are shared, with Documents not being shared.
    You can change this by selecting the Required option from the drop-down lists;
    click Next to continue.


    You will then be prompted to enter your homegroup password (Figure [4-10](#A978-1-4842-1473-2_4_Chapter.html#Fig10)).
    This is the password you created while setting up your homegroup. Enter the password
    and click Next; Windows 10 will then join the homegroup.


    ![A978-1-4842-1473-2_4_Fig10_HTML.jpg](A978-1-4842-1473-2_4_Fig10_HTML.jpg)


    Figure 4-10.


    Homegroup password entry


    Once you have joined the homegroup, you can select the homegroup link in `File
    Explorer`, and you will see the usernames on your network. Click a username, and
    then Windows will list other computers and shared folders on the network. You
    can click a computer, and it will show the shared folders on that PC. You could,
    for example, browse the shared video folder from another machine, and when you
    see a video or music file, double-click it, and Windows 10 will play it.


    An easier way of quickly accessing the content is to add the remote PCs folders
    to the Music and Videos apps.


    For video, you do the following:


    - Open the `Films & TV` app in Windows 10.

    - Via the Apps menu button, go to the Settings section of the app.

    - Click the “Choose where we look for videos” option.

    - This brings up the folder dialog box where you can select the `+` button.

    - Browse for the remote folder you want to include.

    - In the folder dialog, expand the Network group and click the remote computer
    that has the content on it (Figure [4-11](#A978-1-4842-1473-2_4_Chapter.html#Fig11)).
    The remote shared folders will be displayed.


    ![A978-1-4842-1473-2_4_Fig11_HTML.jpg](A978-1-4842-1473-2_4_Fig11_HTML.jpg)


    Figure 4-11.


    Selecting folders to add to `Film & TV`


    - Click the video folder (or another folder you have shared containing video).

    - Then click “Add this folder to Videos.”

    - Click Done to complete the processes.


    The process is almost identical for music, but instead of `Film & TV`, you choose
    `Groove Music`.'
