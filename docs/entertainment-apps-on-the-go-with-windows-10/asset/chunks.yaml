- fmt: '### Settings


    The app has a several useful settings, which you can find by clicking the `Settings`
    button on the left side of the app. With the `Download Quality` option, you can
    set the default quality of new downloads. By default the option is set to “Ask
    every time,” which means each time you download a file it will ask you whether
    you want it in HD or SD. You can override the default by selecting either SD or
    HD from the option list (see Figures [3-3](#A978-1-4842-1473-2_3_Chapter.html#Fig3)
    and [3-4](#A978-1-4842-1473-2_3_Chapter.html#Fig4)).


    ![A978-1-4842-1473-2_3_Fig4_HTML.jpg](A978-1-4842-1473-2_3_Fig4_HTML.jpg)


    Figure 3-4. Film and TV app settings on a phone


    ![A978-1-4842-1473-2_3_Fig3_HTML.jpg](A978-1-4842-1473-2_3_Fig3_HTML.jpg)


    Figure 3-3. Film and TV app Settings screen on PC


    Clicking the “Show my downloaded devices” button lists which devices have been
    registered as being able to download videos from your account. You can remove
    a device from the list by going to the device you want to remove and in Settings
    clicking “Remove this device.”


    Another option on the PC version of the app (Figure [3-3](#A978-1-4842-1473-2_3_Chapter.html#Fig3))
    is “Choose where we look for videos.” This is where you can tell the Film and
    TV app where you store videos on your PC. By default the app looks at your `This
    PC\Videos` folder, and you can add an additional folder by selecting the `+` button.
    This opens a folder dialog box where you can navigate through the file system
    and select a folder.


    **Note**: Remember, when we refer to the PC version, this is the Windows 10 version
    that is used on desktop PCs but also on all-in-ones, laptops, and tablets that
    are 8 inches or larger. Tablets of less than 8 inches and any Windows phones use
    the Mobile version of Windows 10.


    For example, if you have a second hard drive on your PC with videos stored on
    it (in this example `D:\videos`), you would do the following:


    - Select the `+` button.

    - From the folder box, select `This PC`.

    - Select the `D:` drive.

    - Select the `Video` folder.

    - Click/tap “Add this folder to videos.” The contents of the folder will be added
    to the app.


    You can remove a folder from the app by clicking the small X in the “Choose where
    we look for videos” dialog box.


    **Information**: If you remove a folder from the app, the videos stored in the
    folder will no longer show up in the Film and TV app. However, the videos do not
    get deleted from the system and can be added back in at any time.


    The final option in this section is “Restore my video purchases.” This option
    adds any videos you have previously purchased from the Windows Store to the Film
    and TV sections of the app; it doesn’t download the files, but they are available
    for streaming or downloading.


    **Note**: Only purchases made with the same Windows account as you are logged
    in with will be restored. However, those purchases could have been made on any
    other Windows 10 device or even previously using the Xbox Video app on Windows
    8 or an Xbox device.


    ### Purchasing and Renting Movies


    On Windows 8, the Xbox Video app included an option to purchase or rent movies
    directly inside the app. In Windows 10, this has moved to the separate Windows
    Store app.


    If you used Xbox Video on an Xbox 360 a few years ago, you may remember Microsoft
    Points as the method of payment for videos. Microsoft no longer uses these, but
    instead you will need to associate a payment card with your Microsoft account.
    This can then be used to purchase any content from the Windows Store, including
    apps, music, and video.


    **Information**: Do not worry; If you had Microsoft Points left over on your account,
    they were automatically converted to local currency when Microsoft withdrew the
    Points service.


    When you select a video, be it a movie or a TV show, you will normally be offered
    the choice of either purchasing it or renting it (see Figure [3-5](#A978-1-4842-1473-2_3_Chapter.html#Fig5)).
    You may also be offered the choice of SD or HD quality. These choices depend on
    how the show or movie has been licensed by its copyright owner.


    ![A978-1-4842-1473-2_3_Fig5_HTML.jpg](A978-1-4842-1473-2_3_Fig5_HTML.jpg)


    Figure 3-5. Windows Store, buying or renting a movie


    If you choose to rent the video, you will be told how long the video is available
    for playback and when you must start watching it by. If you want to keep the movie,
    you should choose to purchase it.


    Having covered how you can use Microsoft’s own app to play back and purchase movies
    and TV shows, let’s now take a look at some third-party ways of viewing videos,
    starting with Netflix.


    ### Using Netflix on Windows 10


    Netflix is a movie and TV streaming service that offers a wide range of content
    for a monthly subscription fee. Netflix offers a dedicated app for Windows 10
    that is available from the Windows Store that works on both PCs and phones.


    After downloading the app, you will need to sign in with your Netflix account.
    If you don’t have a Netflix account, you can go to Netflix.com and look at the
    subscription options.


    Once you have an account, you sign in with your username and password. Netflix
    will display a selection of content, and you can scroll from left to right to
    browse Netflix content (see Figure [3-6](#A978-1-4842-1473-2_3_Chapter.html#Fig6)).


    ![A978-1-4842-1473-2_3_Fig6_HTML.jpg](A978-1-4842-1473-2_3_Fig6_HTML.jpg)


    Figure 3-6. Netflix on a Windows 10 PC


    When you select a movie (see Figure [3-7](#A978-1-4842-1473-2_3_Chapter.html#Fig7))
    or TV show, the app shows you the movie or show artwork, a synopsis of the content,
    and information about the cast. For TV shows, it may also show you information
    about what other episodes and seasons are available.


    ![A978-1-4842-1473-2_3_Fig7_HTML.jpg](A978-1-4842-1473-2_3_Fig7_HTML.jpg)


    Figure 3-7. Movie information from Netflix


    **Information**: For TV shows and some movies that do not have artwork, then a
    scene from the show will be used instead.


    To start the playback, click/tap the Play icon on the artwork image, and the app
    will start playing. The other option you have is to add the movie or TV show to
    your personal list. Clicking/tapping the `Add to My List` button adds the title
    to your list, which you can view from the front page of the app. You can use this
    to build up a list of movies and TV shows you want to watch in the future.


    **Information**: One nice thing about lists is that they persist across all your
    Netflix apps, so you can add a movie to your list on your phone, and it will be
    available on your PC and Xbox.


    You can also search for a movie title, TV show, or actor by selecting the search
    box and typing in your search terms. You can then browse through the search results
    and pick your title.


    Another nice feature of Netflix is that you can create profiles for each family
    member who uses your account, so you could create a profile for yourself and a
    separate one for a child. That way, Netflix can recommend content to each person
    based on what they watch.


    When you start watching content on Netflix, it remembers where you are in the
    movie or TV show, so if you decide to stop watching a movie and watch it later,
    it will continue from where you left off. This also works across devices including
    phones, smart TVs, and media player devices, so you could start watching on your
    PC, continue on your phone, and then finish watching it on an Xbox One.


    **Apple or Android Phone Users**: Netflix will also remember where you are when
    you stop and share this information across devices, meaning you can start watching
    on your phone, for example, and continue playback on your Windows 10 device or
    another device such as a PlayStation 3 or 4 or a smart TV.'
