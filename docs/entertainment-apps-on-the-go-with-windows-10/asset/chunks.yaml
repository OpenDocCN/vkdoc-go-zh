- fmt: "# 6. Setting Up Media Servers to Stream Your Content\n\nSo far in this book\
    \ you have looked at media streaming around your home network and from the cloud,\
    \ but what if you have your own music and video collection and want to be able\
    \ to access it from anywhere around the world? In this chapter, you will look\
    \ at two solutions that enable streaming your own music and video collection around\
    \ your home and over the Internet. You will learn how to set up a media server,\
    \ and then you can access the content on your Windows 10 devices over your home\
    \ network or the Internet.\n\nThe systems you will learn how to set up are the\
    \ two most popular among listeners to our weekly podcast; they are called Plex\
    \ and Emby. There are a number of other alternatives. We are particularly aware\
    \ of a lot of support for a product called Kodi, which is also well worth a look\
    \ but doesn’t have a specific Windows 10 app, which both Emby and Plex do. Later\
    \ in the chapter we will give you some pointers to these other media systems that\
    \ are available.\n\nBoth of the services we are covering are third-party systems\
    \ and are not part of Windows 10, but the servers are free, and the client apps\
    \ normally cost only a small amount.\n\n## Plex Media Server\n\nPlex is a media\
    \ server that is designed to be a simple solution for storing and organizing all\
    \ your personal media collection and for serving it to Plex clients on your various\
    \ devices. You install Plex Media Server on a PC, where your music and videos\
    \ collection is located, and then you can access your collection from various\
    \ devices including Windows PCs, Windows phones, and iOS and Android devices.\
    \ Plex is a powerful and flexible media solution, and in this section you will\
    \ set up a basic server and connect to it via Windows 10.\n\nThe first step to\
    \ getting started with Plex is to go to `Plex.tv` from your web browser and create\
    \ a user account. You will need an account so that your Plex Media Server and\
    \ Plex app on Windows 10 can talk to each other.\n\n**Information**  \nYou can\
    \ also use your Plex account to purchase features from Plex. You do not need to\
    \ pay for any features because the free version is very powerful, but the paid\
    \ options do add further features. You can find out more about the options at\
    \ [`www.Plex.tv`](http://www.plex.tv/).\n\nOnce you have created a Plex user account,\
    \ you will need to download and install the Plex Media Server software.\n\n**Note**\
    \  \nIn this chapter, you will look at installing it on a Windows 10 PC, but you\
    \ can install it on Windows Vista, Windows 7, and Windows 8.1. There are also\
    \ Plex Media Server installations for Mac, Linux, and FreeBSD.\n\nThe Plex Media\
    \ Server software needs to be installed on your PC that has your media located\
    \ on it, so from that PC’s web browser, go to [`http://Plex.TV/downloads`](http://plex.tv/downloads)\
    \ and download the Windows version.\n\nOnce the download has completed, run the\
    \ program, and it will launch the Plex Media Server Setup.\n\nClick Install to\
    \ start the setup. Windows User Account Control will ask you to confirm that the\
    \ setup can make changes to your system; click Yes to continue with the install.\n\
    \nWhen the installer has completed, click Launch to start configuring Plex.\n\n\
    **Note**  \nThe user interface for Plex is browser based, so Plex will launch\
    \ the default web browser on the PC and bring up the configuration page.\n\nFirst\
    \ you must agree to the terms of service (probably a good idea to read them as\
    \ well!). When you have read them, click the Agree button at the bottom of the\
    \ terms box.\n\nNow you need to tell the server the Plex account you created earlier\
    \ and then configure you media locations. So, click the Settings icon on the left\
    \ side and select Settings from the menu (Figure [6-1](#A978-1-4842-1473-2_6_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-1473-2_6_Fig1_HTML.jpg](A978-1-4842-1473-2_6_Fig1_HTML.jpg)\n\n\
    Figure 6-1. Selecting Settings in Plex in the browser\n\nThe Plex setup is split\
    \ into different sections, and the first section, called General, is where you\
    \ enter your Plex username and password. Associating a Plex account with your\
    \ server will enable Plex apps to talk your Plex server over your home network\
    \ and over the Internet.\n\nEnter your Plex username and password in the relevant\
    \ fields, and click Sign In. In the General section, you can also name your server\
    \ so that you can easily identify the server when you are connected from a remote\
    \ app. Enter a name in the friendly name box and then click Update.\n\nIn the\
    \ Remote Access section, you should see a green check box indicating that your\
    \ server will be accessible from Plex apps over the Internet. If you see a red\
    \ cross, it means that remote access is not possible. To help you resolve this,\
    \ there are troubleshooting links in the Remote Access section.\n\n**Information**\
    \  \nIt is a good idea to check the Plex documentation for more information and\
    \ help on setting up Plex.\n\n### Adding Music and Videos to a Plex Server\n\n\
    Once the server is up and running, you will want to add your music and videos\
    \ collection to it so that you can play them via the Plex apps.\n\nTo configure\
    \ Plex, right-click the Plex app in the notifications area on your PC and select\
    \ Media Manager. This will open Plex in your default web browser where you will\
    \ need to log in with your Plex username and password.\n\nOnce you have signed\
    \ in, you will see your Plex server name on the left side; click the `+` icon\
    \ next to your server’s name and pick the type of media you will be adding to\
    \ Plex (Figure [6-2](#A978-1-4842-1473-2_6_Chapter.html#Fig2)).\n\n![A978-1-4842-1473-2_6_Fig2_HTML.jpg](A978-1-4842-1473-2_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2. Adding media in Plex in the browser\n\nFirst you will add movies\
    \ to the server.\n\nClick the Movies icon (Figure [6-2](#A978-1-4842-1473-2_6_Chapter.html#Fig2))\
    \ and then click Next. Click the “Browse for media folder” button and select the\
    \ folder containing your movies. Click Add to include this folder. You can then\
    \ repeat the process to add additional folders containing movies. When you have\
    \ selected all the required folders, click Add Library.\n\nNow you will add your\
    \ music collection to Plex. Click the `+` icon, select Music, and then click Next.\
    \ As you did with movies, you click the “Browse for media folder” button, select\
    \ the folder containing your music, and then click Next. The final screen in this\
    \ section is an option to import from iTunes; if you select this, Plex will import\
    \ your iTunes music playlists, as well as ratings and play counts, into Plex.\n\
    \nClick Add Library to complete this setup.\n\n**Note**  \nYou can also add TV\
    \ shows, photos, and home videos to Plex using the method described earlier. Click\
    \ the `+` button and then select the library type you want to add, telling Plex\
    \ where the content is located.\n\nAfter adding your content, Plex will scan the\
    \ folders you selected and add them to the system ready for streaming. When you\
    \ have competed the library setup, you are ready to go with your Plex server.\n\
    \n**Tip**  \nOne of the great things about Plex is that you can access your Plex\
    \ server remotely via a web browser or via the Plex apps. Plex has apps for iOS,\
    \ Android, Xbox One, Roku, Windows 8.1, Windows 10, and Windows Phone.\n\n###\
    \ Streaming from Plex Media Servers to a PC via the Browser\n\nThe simplest way\
    \ to access your Plex Media Server is via a web browser. Open the Microsoft Edge\
    \ web browser, go to [`http://Plex.tv`](http://plex.tv/), and click the Sign In\
    \ button. Enter your Plex username and password and click SIGN IN.\n\nOnce you\
    \ have logged in, click the Launch button, which will bring up your Plex server\
    \ in the browser."
  raw: '# 6. Setting Up Media Servers to Stream Your Content


    So far in this book you have looked at media streaming around your home network
    and from the cloud, but what if you have your own music and video collection and
    want to be able to access it from anywhere around the world? In this chapter,
    you will look at two solutions that enable streaming your own music and video
    collection around your home and over the Internet. You will learn how to set up
    a media server, and then you can access the content on your Windows 10 devices
    over your home network or the Internet.


    The systems you will learn how to set up are the two most popular among listeners
    to our weekly podcast; they are called Plex and Emby. There are a number of other
    alternatives. We are particularly aware of a lot of support for a product called
    Kodi, which is also well worth a look but doesn’t have a specific Windows 10 app,
    which both Emby and Plex do. Later in the chapter we will give you some pointers
    to these other media systems that are available.


    Both of the services we are covering are third-party systems and are not part
    of Windows 10, but the servers are free, and the client apps normally cost only
    a small amount.


    ## Plex Media Server


    Plex is a media server that is designed to be a simple solution for storing and
    organizing all your personal media collection and for serving it to Plex clients
    on your various devices. You install Plex Media Server on a PC, where your music
    and videos collection is located, and then you can access your collection from
    various devices including Windows PCs, Windows phones, and iOS and Android devices.
    Plex is a powerful and flexible media solution, and in this section you will set
    up a basic server and connect to it via Windows 10.


    The first step to getting started with Plex is to go to Plex.tv from your web
    browser and create a user account. You will need an account so that your Plex
    Media Server and Plex app on Windows 10 can talk to each other.


    Information


    You can also use your Plex account to purchase features from Plex. You do not
    need to pay for any features because the free version is very powerful, but the
    paid options do add further features. You can find out more about the options
    at [`www.Plex.tv`](http://www.plex.tv/) .


    Once you have created a Plex user account, you will need to download and install
    the Plex Media Server software.


    Note


    In this chapter, you will look at installing it on a Windows 10 PC, but you can
    install it on Windows Vista, Windows 7, and Windows 8.1\. There are also Plex
    Media Server installations for Mac, Linux, and FreeBSD.


    The Plex Media Server software needs to be installed on your PC that has your
    media located on it, so from that PC’s web browser, go to [`http://Plex.TV/downloads`](http://plex.tv/downloads)
    and download the Windows version.


    Once the download has completed, run the program, and it will launch the Plex
    Media Server Setup.


    Click Install to start the setup. Windows User Account Control will ask you to
    confirm that the setup can make changes to your system; click Yes to continue
    with the install.


    When the installer has completed, click Launch to start configuring Plex.


    Note


    The user interface for Plex is browser based, so Plex will launch the default
    web browser on the PC and bring up the configuration page.


    First you must agree to the terms of service (probably a good idea to read them
    as well!). When you have read them, click the Agree button at the bottom of the
    terms box.


    Now you need to tell the server the Plex account you created earlier and then
    configure you media locations. So, click the Settings icon on the left side and
    select Settings from the menu (Figure [6-1](#A978-1-4842-1473-2_6_Chapter.html#Fig1)).


    ![A978-1-4842-1473-2_6_Fig1_HTML.jpg](A978-1-4842-1473-2_6_Fig1_HTML.jpg)


    Figure 6-1.


    Selecting Settings in Plex in the browser


    The Plex setup is split into different sections, and the first section, called
    General, is where you enter your Plex username and password. Associating a Plex
    account with your server will enable Plex apps to talk your Plex server over your
    home network and over the Internet.


    Enter your Plex username and password in the relevant fields, and click Sign In.
    In the General section, you can also name your server so that you can easily identify
    the server when you are connected from a remote app. Enter a name in the friendly
    name box and then click Update.


    In the Remote Access section, you should see a green check box indicating that
    your server will be accessible from Plex apps over the Internet. If you see a
    red cross, it means that remote access is not possible. To help you resolve this,
    there are troubleshooting links in the Remote Access section.


    Information


    It is a good idea to check the Plex documentation for more information and help
    on setting up Plex.


    ### Adding Music and Videos to a Plex Server


    Once the server is up and running, you will want to add your music and videos
    collection to it so that you can play them via the Plex apps.


    To configure Plex, right-click the Plex app in the notifications area on your
    PC and select Media Manager. This will open Plex in your default web browser where
    you will need to log in with your Plex username and password.


    Once you have signed in, you will see your Plex server name on the left side;
    click the + icon next to your server’s name and pick the type of media you will
    be adding to Plex (Figure [6-2](#A978-1-4842-1473-2_6_Chapter.html#Fig2)).


    ![A978-1-4842-1473-2_6_Fig2_HTML.jpg](A978-1-4842-1473-2_6_Fig2_HTML.jpg)


    Figure 6-2.


    Adding media in Plex in the browser


    First you will add movies to the server.


    Click the Movies icon (Figure [6-2](#A978-1-4842-1473-2_6_Chapter.html#Fig2))
    and then click Next.   Click the “Browse for media folder” button and select the
    folder containing your movies.   Click Add to include this folder.   You can then
    repeat the process to add additional folders containing movies.   When you have
    selected all the required folders, click Add Library.  


    Now you will add your music collection to Plex. Click the + icon, select Music,
    and then click Next. As you did with movies, you click the “Browse for media folder”
    button, select the folder containing your music, and then click Next. The final
    screen in this section is an option to import from iTunes; if you select this,
    Plex will import your iTunes music playlists, as well as ratings and play counts,
    into Plex.


    Click Add Library to complete this setup.


    Note


    You can also add TV shows, photos, and home videos to Plex using the method described
    earlier. Click the + button and then select the library type you want to add,
    telling Plex where the content is located.


    After adding your content, Plex will scan the folders you selected and add them
    to the system ready for streaming. When you have competed the library setup, you
    are ready to go with your Plex server.


    Tip


    One of the great things about Plex is that you can access your Plex server remotely
    via a web browser or via the Plex apps. Plex has apps for iOS, Android, Xbox One,
    Roku, Windows 8.1, Windows 10, and Windows Phone.


    ### Streaming from Plex Media Servers to a PC via the Browser


    The simplest way to access your Plex Media Server is via a web browser. Open the
    Microsoft Edge web browser, go to [`http://Plex.tv`](http://plex.tv/) , and click
    the Sign In button. Enter your Plex username and password and click SIGN IN.


    Once you have logged in, click the Launch button, which will bring up your Plex
    server in the browser.'
  trans: "\n# 6. 搭建媒体服务器以串流你的内容\n\n到目前为止，本书已经介绍了如何在家庭网络内以及从云端进行媒体串流，但如果你拥有自己的音乐和视频收藏，并希望能够在世界任何地方访问它们，那该怎么办？在本章中，你将了解两种解决方案，它们可以让你在家庭网络内以及通过互联网串流自己的音乐和视频收藏。你将学习如何搭建一台媒体服务器，然后就可以通过家庭网络或互联网在\
    \ Windows 10 设备上访问这些内容。\n\n你将学习搭建的两个系统是我们每周播客听众中最受欢迎的两种，它们分别是 Plex 和 Emby。此外还有许多其他选择。我们特别注意到有很多人对一款名为\
    \ Kodi 的产品提供支持，这款产品也非常值得一看，但它没有专门的 Windows 10 应用，而 Emby 和 Plex 都有。在本章后面，我们将为你提供一些关于这些其他可用媒体系统的指引。\n\
    \n我们介绍的这两项服务都是第三方系统，并非 Windows 10 的一部分，但服务器是免费的，客户端应用通常也只收取少量费用。\n\n## Plex 媒体服务器\n\
    \nPlex 是一款媒体服务器，旨在成为一个简单的解决方案，用于存储和组织你所有的个人媒体收藏，并将其提供给你各种设备上的 Plex 客户端。你可以将 Plex\
    \ 媒体服务器安装在存放音乐和视频收藏的电脑上，然后就可以从各种设备（包括 Windows PC、Windows 手机以及 iOS 和 Android 设备）访问你的收藏。Plex\
    \ 是一个强大且灵活的媒体解决方案，在本节中，你将搭建一个基础服务器，并通过 Windows 10 连接它。\n\n开始使用 Plex 的第一步是在网页浏览器中访问`Plex.tv`并创建一个用户账户。你需要一个账户，以便你的\
    \ Plex 媒体服务器和 Windows 10 上的 Plex 应用能够相互通信。\n\n**信息**  \n你也可以使用你的 Plex 账户从 Plex\
    \ 购买功能。你无需为任何功能付费，因为免费版本已经非常强大，但付费选项确实会添加更多功能。你可以访问[`www.Plex.tv`](http://www.plex.tv/)了解更多关于这些选项的信息。\n\
    \n创建好 Plex 用户账户后，你需要下载并安装 Plex 媒体服务器软件。\n\n**注意**  \n在本章中，你会看到将其安装在 Windows 10\
    \ 电脑上，但你也可以将其安装在 Windows Vista、Windows 7 和 Windows 8.1 上。此外，还有适用于 Mac、Linux 和\
    \ FreeBSD 的 Plex 媒体服务器安装包。\n\nPlex 媒体服务器软件需要安装在存放你媒体的电脑上，因此，从该电脑的网页浏览器访问[`http://Plex.TV/downloads`](http://plex.tv/downloads)，并下载\
    \ Windows 版本。\n\n下载完成后，运行该程序，它将启动 Plex 媒体服务器安装程序。\n\n点击 Install 开始安装。Windows 用户账户控制将要求你确认安装程序可以对你的系统进行更改；点击\
    \ Yes 继续安装。\n\n安装程序完成后，点击 Launch 开始配置 Plex。\n\n**注意**  \nPlex 的用户界面是基于浏览器的，因此\
    \ Plex 将在该电脑上启动默认的网页浏览器并打开配置页面。\n\n首先，你必须同意服务条款（阅读它们可能也是个好主意！）。阅读完毕后，点击条款框底部的\
    \ Agree 按钮。\n\n现在，你需要告知服务器你之前创建的 Plex 账户，然后配置你的媒体位置。因此，点击左侧的设置图标，并从菜单中选择 Settings（图\
    \ 6-1）。\n\n![A978-1-4842-1473-2_6_Fig1_HTML.jpg](img/A978-1-4842-1473-2_6_Fig1_HTML.jpg)\n\
    \n图 6-1. 在浏览器中选择 Plex 中的 Settings\n\nPlex 的设置分为不同部分，第一部分名为 General，你需要在此输入你的 Plex\
    \ 用户名和密码。将 Plex 账户与你的服务器关联将使 Plex 应用能够通过家庭网络和互联网与你的 Plex 服务器通信。\n\n在相应字段中输入你的\
    \ Plex 用户名和密码，然后点击 Sign In。在 General 部分，你还可以为你的服务器命名，这样当你从远程应用连接时，可以轻松识别该服务器。在友好名称框中输入一个名称，然后点击\
    \ Update。\n\n在 Remote Access 部分，你应该会看到一个绿色勾选框，表示你的服务器可以从互联网上的 Plex 应用访问到。如果你看到红色的叉，则意味着远程访问不可用。为了帮助你解决此问题，Remote\
    \ Access 部分提供了故障排除链接。\n\n**信息**  \n建议查阅 Plex 文档以获取更多关于设置 Plex 的信息和帮助。\n\n### 向\
    \ Plex 服务器添加音乐和视频\n\n一旦服务器启动并运行，你将希望向其添加你的音乐和视频收藏，以便通过 Plex 应用播放它们。\n\n要配置 Plex，请在电脑通知区域右键点击\
    \ Plex 应用，然后选择 Media Manager。这将在你的默认网页浏览器中打开 Plex，你需要在此使用你的 Plex 用户名和密码登录。\n\n\
    登录后，你会看到左侧显示你的 Plex 服务器名称；点击服务器名称旁边的`+`图标，然后选择你将添加到 Plex 的媒体类型（图 6-2）。\n\n![A978-1-4842-1473-2_6_Fig2_HTML.jpg](img/A978-1-4842-1473-2_6_Fig2_HTML.jpg)\n\
    \n图 6-2. 在浏览器中向 Plex 添加媒体\n\n首先，你将向服务器添加电影。\n\n点击 Movies 图标（图 6-2），然后点击 Next。点击“Browse\
    \ for media folder”按钮，并选择包含你电影的文件夹。点击 Add 以包含此文件夹。然后你可以重复此过程以添加包含电影的其他文件夹。当你选择了所有需要的文件夹后，点击\
    \ Add Library。\n\n现在，你将向 Plex 添加你的音乐收藏。点击`+`图标，选择 Music，然后点击 Next。正如你对电影所做的，点击“Browse\
    \ for media folder”按钮，选择包含你音乐的文件夹，然后点击 Next。此部分的最后一个屏幕是导入 iTunes 的选项；如果你选择此项，Plex\
    \ 会将你的 iTunes 音乐播放列表以及评分和播放次数导入到 Plex 中。\n\n点击 Add Library 完成此设置。\n\n**注意**  \n\
    你也可以使用前面描述的方法向 Plex 添加电视节目、照片和家庭视频。点击`+`按钮，然后选择你想要添加的库类型，并告诉 Plex 内容所在的位置。\n\n\
    添加内容后，Plex 将扫描你选择的文件夹，并将其添加到系统中以供串流。当你完成库设置后，你的 Plex 服务器就可以开始使用了。\n\n**提示**  \n\
    Plex 的妙处之一在于，你可以通过网页浏览器或 Plex 应用远程访问你的 Plex 服务器。Plex 拥有适用于 iOS、Android、Xbox One、Roku、Windows\
    \ 8.1、Windows 10 和 Windows Phone 的应用。\n\n### 通过浏览器从 Plex 媒体服务器串流到 PC\n\n访问你的 Plex\
    \ 媒体服务器最简单的方法是通过网页浏览器。打开 Microsoft Edge 网页浏览器，访问[`http://Plex.tv`](http://plex.tv/)，然后点击\
    \ Sign In 按钮。输入你的 Plex 用户名和密码，然后点击 SIGN IN。\n\n登录后，点击 Launch 按钮，这将在浏览器中打开你的 Plex\
    \ 服务器。\n"
- fmt: '### Playing Music


    To view your music collection, click the `Music` button in the left column, and
    Plex will display your music collection in a grid (Figure [6-3](#A978-1-4842-1473-2_6_Chapter.html#Fig3)).


    ![A978-1-4842-1473-2_6_Fig3_HTML.jpg](A978-1-4842-1473-2_6_Fig3_HTML.jpg)


    Figure 6-3. Music view in Plex in the browser


    The default view is `Artist`, and you can change the way Plex displays your music
    by switching between the `Album`, `Artist`, and `Tracks` views. To change the
    view, click the drop-down list with an artist currently selected and select the
    required view. Plex will put a check mark by the currently selected view and change
    the selection.


    If you hover over an artist, you will see a `Play` button; click it to start playing
    music from the artist. If you click an artist, it will display the albums in your
    collection by the artist. Clicking the artist’s image will start playing songs
    from the artist. Click an album cover to display the tracks included in the album
    (Figure [6-4](#A978-1-4842-1473-2_6_Chapter.html#Fig4)). To play the whole album,
    click the album image, or you can click a single track to start it playing via
    the web browser.


    ![A978-1-4842-1473-2_6_Fig4_HTML.jpg](A978-1-4842-1473-2_6_Fig4_HTML.jpg)


    Figure 6-4. Album track view in Plex in the browser


    At the bottom of the browser, you have a "Now playing" bar with `Pause`, `Stop`,
    next track, and previous track buttons as well as volume controls.


    ### Playing Movies and TV Shows


    From the Plex home screen, click the `Movies` button to display your movie collection
    (Figure [6-5](#A978-1-4842-1473-2_6_Chapter.html#Fig5)). Click the movie to bring
    up the movie information page with the title, running time, cast information,
    and whether you have already watch the movie via your Plex setup. To start playing
    the movie, click the movie image, and it will start playing via the browser.


    ![A978-1-4842-1473-2_6_Fig5_HTML.jpg](A978-1-4842-1473-2_6_Fig5_HTML.jpg)


    Figure 6-5. Movie view in Plex in the browser


    **Note:** If you have previously started watching the movie, Plex will ask if
    you want to resume playback from where you have left off or start from the beginning
    (Figure [6-6](#A978-1-4842-1473-2_6_Chapter.html#Fig6)).


    ![A978-1-4842-1473-2_6_Fig6_HTML.jpg](A978-1-4842-1473-2_6_Fig6_HTML.jpg)


    Figure 6-6. Resuming playback in Plex in the browser


    When a movie is playing, clicking the screen brings up the "Now playing" controls
    where you can pause the playback, change the volume, and jump to a specific position
    in the video (Figure [6-7](#A978-1-4842-1473-2_6_Chapter.html#Fig7)).


    ![A978-1-4842-1473-2_6_Fig7_HTML.jpg](A978-1-4842-1473-2_6_Fig7_HTML.jpg)


    Figure 6-7. Playback controls in Plex


    At the top right of the screen there are buttons to select which audio stream
    of the movie you want to play, a video quality button, and a close button. With
    the video quality button, you can change the bit rate of the video playback. Lower
    bit rates reduce the quality but take less network bandwidth; a high bandwidth
    will be higher quality but take up more bandwidth. On a home network, bandwidth
    probably won’t be an issue, but over the Internet you may want to reduce the quality
    depending on your line speed. Click the close button to return to the movie information
    page.


    The `TV Shows` section (Figure [6-8](#A978-1-4842-1473-2_6_Chapter.html#Fig8))
    is similar to the `Movies` view except that Plex groups individual episodes of
    TV shows into seasons. Click a TV show to bring up information about the show
    and the seasons available in your collection.


    ![A978-1-4842-1473-2_6_Fig8_HTML.jpg](A978-1-4842-1473-2_6_Fig8_HTML.jpg)


    Figure 6-8. TV shows in Plex


    Click a season, and Plex will display the individual episodes in that season.
    A yellow dot next to the episode title (Figure [6-9](#A978-1-4842-1473-2_6_Chapter.html#Fig9))
    indicates that you have not watched that episode yet. Once you have watched an
    episode, the yellow dot will not be displayed.


    ![A978-1-4842-1473-2_6_Fig9_HTML.jpg](A978-1-4842-1473-2_6_Fig9_HTML.jpg)


    Figure 6-9. Yellow dot indicating unplayed in Plex


    To play an episode, click it to display episode information. Then click the show
    image to start playing it. Clicking the screen during video playback will bring
    up the same controls as when playing a movie where you can pause playback and
    control the volume.


    ### Streaming from a Plex Media Server with the Plex App on a PC


    As well as having the web browser option, Plex has a dedicated Windows app available
    from the Windows Store. While the Plex Media Server is free and using it via the
    web browser doesn’t cost anything, the Plex app for Windows requires unlocking
    via an in-app purchase to be able to use it.


    **Note:** Without the in-app purchase, the Plex app will play only one minute
    of music or video, which is OK if you want to give the app a try before paying.


    Once you have unlocked the app, you log into the app with your Plex account. This
    is the account you used when installing the Plex server.


    **Tip:** Plex is a universal Windows app. Once you have unlocked it on a PC, you
    don’t have to pay again for the Windows 10 phone version, and vice versa.


    The Plex user interface is divided into three sections: `On Deck`, `Library`,
    and `Channels`. At the top right of the app there is a server selection drop-down
    list. This will show the current PC you are using and will list your Plex servers.
    To stream content from your server, select its name from the list. If you want
    to use Plex to play back content stored on the PC you are currently using, select
    that PC’s name.


    Also on the start page is a search box; you will look at that later in this chapter.


    #### Playing Movies


    To play back movies stored on your Plex server, click the `Movies` button. The
    app will then list your movie collection in alphabetical order (Figure [6-10](#A978-1-4842-1473-2_6_Chapter.html#Fig10)).
    If you want to filter and sort your movie collection, click the filter icon and
    select your required selection criteria. You can also select a sort order from
    the sort list.


    ![A978-1-4842-1473-2_6_Fig10_HTML.jpg](A978-1-4842-1473-2_6_Fig10_HTML.jpg)


    Figure 6-10. Movie view in the Plex app


    To play a movie, click the movie’s image, and Plex will take you to the movie
    information page. Here it will display the movie information and a summary. To
    start playing the movie, click the `Play` button, and the movie will start streaming
    from the server.


    **Information:** The great thing about Plex is that it remembers how much of the
    movie you have watched, and then if you come back to Plex, either on your PC,
    phone, browser, or Xbox, you can continue watching where you left off (Figure
    [6-11](#A978-1-4842-1473-2_6_Chapter.html#Fig11)).


    ![A978-1-4842-1473-2_6_Fig11_HTML.jpg](A978-1-4842-1473-2_6_Fig11_HTML.jpg)


    Figure 6-11. Resuming playback in the Plex app


    When a video is playing, clicking the screen will bring up the "Now playing" (Figure
    [6-12](#A978-1-4842-1473-2_6_Chapter.html#Fig12)) controls where you can pause
    playback, jump to any part of the video using the video scrub bar, and control
    the movie volume via the volume button.


    ![A978-1-4842-1473-2_6_Fig12_HTML.jpg](A978-1-4842-1473-2_6_Fig12_HTML.jpg)


    Figure 6-12. Playback controls in the Plex app


    There is also an option to play the current video on another device running Plex
    on your home network. When you click the `Connect To` button, the app will search
    for other Plex devices on your network. To start playback on the remote device,
    click the device name; the movie will start playing on the other PC, and the app
    will display remote controls so you can control playback of the movie.


    **Note:** The `Connect To` option works to send video to any Plex-enabled device,
    not just PCs; for example, you could stream to an Amazon Fire TV stick.


    To go back to the movie information page, click the `Back` button, and from there
    you can click `Back` again to go back to your movie list.'
