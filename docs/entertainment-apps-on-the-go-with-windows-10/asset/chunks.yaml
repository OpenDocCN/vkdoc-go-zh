    # 1. Music Services on the Go


    If music be the food of love, play on, so said Duke Orsino in Shakespeare’s Twelfth
    Night. Our love of music is still as strong today as it was back then. However,
    we often can struggle to play our music where we want. Windows 10, coupled with
    the ability to use Microsoft’s music apps on Android and Apple devices, looks
    to solve that quandary. You can now take your music anywhere.


    With Windows 10, you can enjoy music on your PC, laptop, tablet, or phone with
    a range of services.


    In this chapter, you will look at how to download, stream, and purchase music
    on your Android, iOS, or Windows phone, tablet, or laptop with Microsoft Groove
    and third-party services. You will also find out how you can listen to radio stations
    and podcasts on the move.


    ## Listening to Your Music with Groove


    Information


    Microsoft changed the name of its music app in Windows 10 from Xbox Music, as
    it was known in Windows 8, to Groove. You may find that on some platforms with
    older versions it is still referred to as Xbox Music.


    Groove is Microsoft’s music service that combines a number of features into one
    service that works with Windows 10, Xbox One, iPad, and Android devices.


    With the services you can listen to your own music stored on a PC or phone, stream
    music from the cloud, and purchase music directly from your device.


    Groove breaks down into four areas: listening to music stored on the device, streaming
    music from your personal collection on Microsoft’s servers, purchasing albums
    and songs from Microsoft, and using Microsoft’s music subscription service.'
