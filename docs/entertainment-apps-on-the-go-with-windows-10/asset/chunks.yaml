- fmt: '#### Exploring Music


    **Note:** The `Exploring Music` option is currently unavailable in `Windows 10
    Mobile`.


    **Information:** `Windows 10 Mobile` is the edition of `Windows 10` used on phones
    and small tablets. Microsoft defines a small tablet as one having a screen size
    of less than 8 inches diagonally.


    If you have a `Groove Music Pass`, there is another section in the `Groove` app,
    labeled `Explorer`. In this section you can explore (hence the name) the latest
    music from the `Groove Music` store. When you open this section, it presents a
    selection of new music, the current top songs, the top artist, and the top albums.


    You can select an album and start playing it exactly as you could if it was one
    of your own albums. You can add it to your playlists, start a radio station, and
    download tracks.


    **Information:** Radio stations in `Groove` and many of the other streaming services
    are not traditional broadcasters. Instead, they are a way of producing a random
    playlist drawn from all available music on the streaming service. These playlists
    are usually themed around an artist or genre. Examples might be artists like Dire
    Straits or music from the 1970s.


    If you select an artist, you can view albums by artist, and just as you can if
    you viewed an artist in your collection, you can play and download albums and
    songs by artist.


    #### Buying Music


    You’ve already learned about `Groove` subscriptions, but if you do not want to
    pay a monthly amount and do not have a `Groove Music Pass`, you can still browse
    the store and pay for the songs and albums you want to buy.


    From the `Windows Store` app (Figure [1-10](#A978-1-4842-1473-2_1_Chapter.html#Fig10)),
    you can click/tap the `Music` link and then browse Microsoft’s collection of music.


    ![A978-1-4842-1473-2_1_Fig10_HTML.jpg](A978-1-4842-1473-2_1_Fig10_HTML.jpg)


    Figure 1-10. The Windows Store


    When you see a single song or an album that you are interested in, click/tap the
    `Buy` icon, and you will be able to purchase the content. The cost will be charged
    to your Microsoft account in the same way buying an app would. If you have a `Music
    Pass` subscription, you will see a `Download` button instead of a `Buy` button.
    Selecting `Download` will download the selection to your PC.


    Once you have bought a song or album, it is automatically added to your collection
    and available to play on your other devices by streaming it over the Internet.
    You can also download your purchases to your other devices so you can listen to
    them without being connected to the internet.


    **Note:** If you have iOS devices, Android devices, or a Windows phone, you can
    still access your music collection from them. Later in this chapter you will see
    how to access your collection on Android devices, iPhones, and `Windows 10` phones.


    #### Groove Radio


    **Note:** You must have an active `Groove Music Pass` subscription for the radio
    option to be available.


    `Groove` has a music discovery service that will create a custom radio station
    based on an artist. To start a station, follow these steps:


    - Select an artist in the music app via the `Artists` view.

    - Click/tap the `Start Radio` button that appears.


    `Groove` will create a playlist based on the artist you have selected. You will
    get some songs from the select artist along with tracks from other artists `Groove`
    thinks are similar; you can view the playlist by going to the “Now playing” view
    in the `Groove` app. As you listen to songs, the app adds more songs to the playlist.


    When you create a radio station, it gets added to the `Radio` section of the app.
    If you go to the `Radio` section, you can view the radio stations you have created.
    If you select “Start a station,” you can type in the name of an artist or select
    from popular artists to create a new station.


    #### Searching for Music


    With `Groove`, you can search for songs, artists, or albums via the search box.
    Just type your search criteria into the box, and `Groove` will start showing search
    suggestions. Selecting one of the results will bring up the search results page.
    Here it will list matching artists, albums, and songs.


    If you have a `Groove Music Pass`, you will see two tabs (Figure [1-11](#A978-1-4842-1473-2_1_Chapter.html#Fig11)):
    `In collection` and `Full catalog`. The `In collection` tab shows matching content
    in your own music collection either on the device or in the cloud on `OneDrive`.


    ![A978-1-4842-1473-2_1_Fig11_HTML.jpg](A978-1-4842-1473-2_1_Fig11_HTML.jpg)


    Figure 1-11. Search results


    The `Full catalogue` tab shows content available in the `Groove` store. If you
    have a `Groove Music Pass` subscription, you can download or listen to any of
    the music shown in the results.


    If you don’t have a `Groove Music Pass`, the app will search your own music collection,
    and if nothing matches your search criteria, you will see a link that when selected
    opens the store app and searches the `Windows Store`.


    #### Settings


    On a PC, `Groove` has a number of settings that you can use to customize your
    experience. The `Settings` section of the app is split between `Music Pass` settings
    and `Your Music` settings.


    ##### Music Pass


    This is where you can manage the devices you are using with `Groove`. Selecting
    this option takes you to the web page you saw earlier in Figure [1-9](#A978-1-4842-1473-2_1_Chapter.html#Fig9)
    for managing devices.


    ##### Your Music


    This is where you can manage music files on the PC. The first option is “Choose
    where we look for music.” Selecting this option brings up the dialog box you saw
    earlier in the chapter in Figure [1-2](#A978-1-4842-1473-2_1_Chapter.html#Fig2)
    where you can tell the app where you store music on your device.


    The following are the other options:


    - **Automatically download songs you add from Groove:** With this option selected,
    the PC will automatically download songs you buy (or add via your `Groove Music
    Pass` subscription).

    - **Automatically retrieve and update missing album art and metadata:** With this
    option, the app will automatically download album artwork, artist information,
    and other metadata when you add music to your collection.

    - **When I add a song to OneDrive, remove any version that came from Groove Music
    Pass:** This option will remove duplicate tracks from your `Groove Music Pass`
    subscription.

    - **Ask me to sign in before completing purchases or managing my account:** This
    option means that the app will prompt with your password when you purchase new
    music.


    There is also the option “Delete your playlists, and any music you’ve added or
    download from the music catalogue.” Selecting this will make the app remove content
    you have purchased or added from `Groove` and the `Music Store`.


    The final option is a `Dark` or `Light` setting. The `Light` setting gives you
    black text on a white background, and the `Dark` setting gives you white text
    on a black background.


    In the past few sections, you’ve learned about using `Groove` on a `Windows 10`
    PC. What if you want to use it on your mobile devices? In the next section, you
    will start by looking at how to use it on a `Windows 10 Mobile` device.


    ### Using Groove on a Windows 10 Mobile Device


    **Information:** Prior to `Windows 10`, the Windows operating system on phones
    was known as `Windows Phone`. Microsoft has changed this to `Windows 10 Mobile`.
    A `Windows 10 Mobile` device can be a phone or a small (less than 8-inch) tablet.
    For convenience, this book will often refer to these devices as phones.


    With `Windows 10` on a phone or small tablet, `Groove` works very much in the
    same way as the PC version does with just a few changes. In this section, you
    will learn how to listen to your own music on a `Windows 10` mobile device and
    how to listen using a `Groove Music Pass` subscription.


    You will find the `Groove` app on your phone’s start screen; if you don’t, you
    can find it in the “All apps” list.'
