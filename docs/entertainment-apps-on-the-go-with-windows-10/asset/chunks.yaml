  trans: '

    ### 播放音乐


    如需查看您的音乐收藏，请点击左侧栏中的`音乐`按钮，Plex 会以网格形式展示您的音乐收藏（图 6-3）。


    ![A978-1-4842-1473-2_6_Fig3_HTML.jpg](img/A978-1-4842-1473-2_6_Fig3_HTML.jpg)


    图 6-3. 浏览器中 Plex 的音乐视图


    默认视图是`艺术家`，您可以通过在`专辑`、`艺术家`和`曲目`视图之间切换来改变 Plex 显示音乐的方式。要更改视图，请点击当前选中艺术家的下拉列表，然后选择所需的视图。Plex
    会在当前选中的视图旁打上勾，并切换显示内容。


    如果将鼠标悬停在一位艺术家上，您会看到一个`播放`按钮；点击它即可开始播放该艺术家的音乐。如果点击艺术家，则会显示该艺术家在您收藏中的专辑。点击艺术家的图片将开始播放该艺术家的歌曲。点击专辑封面即可显示专辑中包含的曲目（图
    6-4）。要播放整张专辑，请点击专辑图片，或者您也可以点击单首曲目，通过网页浏览器开始播放。


    ![A978-1-4842-1473-2_6_Fig4_HTML.jpg](img/A978-1-4842-1473-2_6_Fig4_HTML.jpg)


    图 6-4. 浏览器中 Plex 的专辑曲目视图


    在浏览器底部，您会看到一个"正在播放"栏，其中包含`暂停`、`停止`、下一首和上一首曲目按钮，以及音量控制。


    ### 播放电影和电视节目


    在 Plex 主屏幕上，点击`电影`按钮即可显示您的电影收藏（图 6-5）。点击电影可调出包含标题、时长、演员信息以及您是否已通过 Plex 设置观看过该电影的电影信息页面。要开始播放电影，请点击电影图片，它便会通过浏览器开始播放。


    ![A978-1-4842-1473-2_6_Fig5_HTML.jpg](img/A978-1-4842-1473-2_6_Fig5_HTML.jpg)


    图 6-5. 浏览器中 Plex 的电影视图


    **注意：** 如果您之前已开始观看该电影，Plex 会询问您是要从中断处继续播放还是从头开始播放（图 6-6）。


    ![A978-1-4842-1473-2_6_Fig6_HTML.jpg](img/A978-1-4842-1473-2_6_Fig6_HTML.jpg)


    图 6-6. 在浏览器中恢复 Plex 播放


    当电影播放时，点击屏幕会调出"正在播放"控件，您可以在其中暂停播放、调节音量以及跳转到视频中的特定位置（图 6-7）。


    ![A978-1-4842-1473-2_6_Fig7_HTML.jpg](img/A978-1-4842-1473-2_6_Fig7_HTML.jpg)


    图 6-7. Plex 中的播放控件


    在屏幕的右上方，有用于选择电影音频流的按钮、一个视频质量按钮以及一个关闭按钮。使用视频质量按钮，您可以更改视频播放的比特率。较低的比特率会降低画质，但占用更少的网络带宽；较高的比特率则画质更高，但会占用更多带宽。在家庭网络中，带宽可能不成问题，但在互联网上，您可能需要根据网络速度降低画质。点击关闭按钮可返回电影信息页面。


    `电视节目`部分（图 6-8）与`电影`视图类似，区别在于 Plex 会将电视剧的各集按季分组。点击一个电视节目可调出该节目的信息以及您收藏中可用的季。


    ![A978-1-4842-1473-2_6_Fig8_HTML.jpg](img/A978-1-4842-1473-2_6_Fig8_HTML.jpg)


    图 6-8. Plex 中的电视节目


    点击一季，Plex 将显示该季中的单集。剧集标题旁的黄色圆点（图 6-9）表示您尚未观看该集。一旦您观看过该集，黄色圆点将不再显示。


    ![A978-1-4842-1473-2_6_Fig9_HTML.jpg](img/A978-1-4842-1473-2_6_Fig9_HTML.jpg)


    图 6-9. Plex 中指示未播放的黄色圆点


    要播放某一集，请点击它以显示该集的信息。然后点击节目图片开始播放。视频播放期间点击屏幕，会调出与播放电影时相同的控件，您可以在其中暂停播放和控制音量。


    ### 在 PC 上通过 Plex 应用从 Plex 媒体服务器流式传输


    除了网页浏览器选项外，Plex 还提供了可从 Windows 商店获取的专用 Windows 应用。虽然 Plex 媒体服务器是免费的，并且通过网页浏览器使用它也不收费，但
    Windows 版 Plex 应用需要通过应用内购买解锁才能使用。


    **注意：** 未进行应用内购买的情况下，Plex 应用只会播放一分钟的音乐或视频，如果您想在付费前试用该应用，这没问题。


    解锁应用后，您可以使用 Plex 账户登录该应用。此账户即为您安装 Plex 服务器时使用的账户。


    **提示：** Plex 是一款通用 Windows 应用。一旦您在 PC 上解锁了它，就无需为 Windows 10 手机版再次付费，反之亦然。


    Plex 用户界面分为三个部分：`待播清单`、`媒体库`和`频道`。在应用的右上方有一个服务器选择下拉列表。该列表会显示您当前使用的 PC，并列出您的 Plex
    服务器。要从您的服务器流式传输内容，请从列表中选择其名称。如果您希望使用 Plex 播放存储在您当前使用的 PC 上的内容，请选择该 PC 的名称。


    起始页上还有一个搜索框；您将在本章稍后部分了解它。


    #### 播放电影


    要播放存储在 Plex 服务器上的电影，请点击`电影`按钮。应用随后会按字母顺序列出您的电影收藏（图 6-10）。如果您想筛选和排序电影收藏，可以点击筛选图标并选择所需的筛选条件。您还可以从排序列表中选择排序方式。


    ![A978-1-4842-1473-2_6_Fig10_HTML.jpg](img/A978-1-4842-1473-2_6_Fig10_HTML.jpg)


    图 6-10. Plex 应用中的电影视图


    要播放电影，请点击电影图片，Plex 会带您进入电影信息页面。这里会显示电影信息和摘要。要开始播放电影，请点击`播放`按钮，电影便会开始从服务器流式传输。


    **信息：** Plex 的妙处在于，它会记住您已观看了电影的多少内容，然后当您回到 Plex 时（无论是在您的 PC、手机、浏览器还是 Xbox 上），都可以从中断处继续观看（图
    6-11）。


    ![A978-1-4842-1473-2_6_Fig11_HTML.jpg](img/A978-1-4842-1473-2_6_Fig11_HTML.jpg)


    图 6-11. 在 Plex 应用中恢复播放


    当视频播放时，点击屏幕会调出"正在播放"控件（图 6-12），您可以在其中暂停播放、使用视频进度条跳转到视频的任何部分，以及通过音量按钮控制电影音量。


    ![A978-1-4842-1473-2_6_Fig12_HTML.jpg](img/A978-1-4842-1473-2_6_Fig12_HTML.jpg)


    图 6-12. Plex 应用中的播放控件


    还有一个选项可以将当前视频播放到您家庭网络中运行 Plex 的其他设备上。当您点击`连接到`按钮时，应用会搜索您网络上的其他 Plex 设备。要在远程设备上开始播放，请点击设备名称；电影将在其他
    PC 上开始播放，并且应用会显示远程控件，以便您控制电影的播放。


    **注意：** `连接到`选项可用于将视频发送到任何支持 Plex 的设备，而不仅仅是 PC；例如，您可以将其流式传输到 Amazon Fire TV 棒上。


    要返回到电影信息页面，请点击`返回`按钮，然后您可以再次点击`返回`回到您的电影列表。

