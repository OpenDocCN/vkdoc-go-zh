    to your Windows 10 devices.


    There are a few different options for connecting to Windows PCs; we will cover
    setting up file shares, using a Windows homegroup, and using Windows Media Player
    to act as a server.


    Information


    Homegroups and network sharing work more or less the same across Windows 7 (and
    Windows Home Server), Windows 8.1, and Windows 10, so these instruction will work
    on whichever platform you are on.'
  trans: '

    #### 使用 VLC 播放视频


    在 VLC 中选择“视频”选项卡时，您将看到设备上存储的视频集。左侧有一个下拉菜单，您可以在其中选择`视频`、`节目`或`相机胶卷`。


    `视频`显示您的电影集，`节目`显示您的电视节目，而`相机胶卷`显示由设备相机拍摄的视频。


    播放视频时（图 3-12），点击或轻触屏幕即可调出视频传输控制，您可以移动滑块跳转到正在播放视频的任意位置。


    ![A978-1-4842-1473-2_3_Fig12_HTML.jpg](img/A978-1-4842-1473-2_3_Fig12_HTML.jpg)


    图 3-12. VLC 中的视频播放


    “当前播放”屏幕上的其他控制包括一个锁定按钮，用于停用当前播放按钮。下一个按钮提供切换音轨、开启字幕以及选择字幕文件的选项。“音轨”按钮使您能够从不同的音轨中进行选择。（某些电影和电视节目含有多条音轨，您可在此处进行选择。）


    **信息**


    音轨除了提供不同语言版本外，其主要用途之一还在于导演评论。


    字幕按钮使您能够在视频中显示字幕（并非所有视频都带有字幕）。


    如果您有与视频存放位置不同的字幕文件，可以使用`选择字幕`选项来浏览并选择字幕文件（通常是 `.srt` 文件）。


    同样在“当前播放”视图中，您可以更改视频的播放方式，标有三个点的按钮会弹出一个速度选项，您可以在此增加或降低视频的播放速度。


    如需返回主视图，请选择屏幕右上角的`返回`按钮。


    #### 文件管理器


    VLC 中的另一个视图称为“文件”（见图 3-13）。这使您可以浏览设备上的音乐和视频。有一个下拉选项，您可以在其中选择音乐、视频或文件。


    ![A978-1-4842-1473-2_3_Fig13_HTML.jpg](img/A978-1-4842-1473-2_3_Fig13_HTML.jpg)


    图 3-13. VLC 中的文件


    当选择“音乐”时，您可以浏览应用正在监听的音乐文件夹（有关受监控文件夹的信息，请参阅本节第一部分）。如果选择“视频”，它将显示您视频文件夹中的文件。然后您可以选择一个希望
    VLC 播放的文件。


    如果您选择了一个额外的驱动器（例如 SD 卡或外置硬盘），则可以浏览外部来源中的媒体文件。


    #### 其他选项


    VLC 在菜单栏中还提供了一些其他选项。选择标题栏中的菜单按钮以显示这些选项。


    有一个`文件`按钮，使您能够浏览本地电脑文件系统或手机文件系统中的任意位置的媒体文件。当您选择一个文件后，VLC 将开始播放它。


    `流`按钮会打开一个输入框，您可以在其中键入或粘贴音乐或视频流的 URL。


    在撰写本文时，VLC 仍在开发中，因此未来可能会增加更多功能。它是一款值得添加到您的收藏中的应用。


    ### 商店中的其他应用


    虽然 Windows 商店中有大量其他视频应用，但其中许多仅仅是网页上电影或节目的链接，或者专门与某种服务器产品关联（例如，我们将在第 6 章中介绍的 Emby）。大多数商店应用都提供试用版，我们始终建议您在购买前先试用。


    另一个值得注意的视频应用是 `PressPlay`，这是一款适用于 Windows 10 的视频播放器，可以播放可移动设备上的媒体。它可以播放 MKV 文件和
    FLV（Flash 视频），并支持字幕。该应用可从 Windows 商店免费获取。


    现在，您已经了解了如何播放自己的视频文件，以及如何使用微软自带的应用程序和流行的第三方服务（如 Netflix 和 YouTube）来流式播放电影。但是，您可能听说过有人带手机出国后产生巨额账单，或者仅仅因为超出家庭宽带限额而被收费。在下一节中，我们将解释
    Windows 10 如何帮助您避免此类意外费用。


    ## 使用流量感知应用


    如果您在按流量计费的移动设备上使用 Windows 10，Windows 10 提供了一个应用来帮助您避免来自移动运营商的高额账单。这对于可能消耗大量带宽的视频应用尤其有用。


    移动版和桌面版在操作系统的“设置”部分都有一个名为`数据使用量`的选项。这个应用，也称为`流量感知`，会显示已消耗的数据量以及哪些应用在使用数据。


    转到“设置”（可从“开始”菜单访问），在“网络和无线”（在电脑上为“网络和 Internet”）部分，您将看到“数据使用量”部分（见图 3-14）。


    ![A978-1-4842-1473-2_3_Fig14_HTML.jpg](img/A978-1-4842-1473-2_3_Fig14_HTML.jpg)


    图 3-14. 流量感知概览


    在`概览`中（图 3-14），该应用会向您显示通过移动连接消耗了多少数据，以及通过 Wi-Fi 使用了多少数据。


    要找出哪些应用使用了数据，请选择“使用详情”。


    在“应用使用情况”部分（图 3-15），该应用会显示每个应用使用的数据量，从使用数据最多的应用开始列在列表顶部。


    ![A978-1-4842-1473-2_3_Fig15_HTML.jpg](img/A978-1-4842-1473-2_3_Fig15_HTML.jpg)


    图 3-15. 流量感知中的应用使用情况


    使用此应用，您可以查看是观看 Netflix 用完了您所有的数据，还是流式播放音乐占用了您所有的额度。


    ## 总结


    现在，您已经了解了使用 Windows 10 从您自己的收藏、Windows 商店、Netflix 和 YouTube 观看视频的所有不同方式。


    您还探索了其他视频应用（尤其是 VLC）如何帮助您观看各种不同格式的视频。最后，我们演示了如何使用 Windows 10 的`流量感知`应用来防止在流式播放视频时产生意外账单。


    我们许多人家庭网络中可能既有 Windows 10 设备，也有较旧的设备；在下一章中，您将了解如何利用 Windows 7 和 8 设备以及 Windows
    10 上的媒体存储，在家中的各个位置进行流式播放。


    # 4. 从 Windows 设备流式播放您的媒体收藏


    我们在《数字生活方式》节目中经常被问到的一个问题是如何将音乐和视频发送到家中的其他电脑。例如，这可能涉及将音乐从您的主电脑发送到另一房间连接到音响的网络电脑，或者将视频从电脑发送到卧室的平板电脑。这通常被证明颇具挑战性。在本章中，您将了解较旧版本和
    Windows 10 如何应对这一挑战。


    借助 Windows 10，您可以访问家中其他 Windows 设备（即使它们运行的是较旧版本的 Windows）上存储的音乐和视频。在本章中，您将学习如何设置
    Windows 7、Windows 8.1 和 Windows 10，以便向您的 Windows 10 设备提供内容。


    有几种不同的选项可用于连接到 Windows 电脑；我们将介绍如何设置文件共享、使用 Windows 家庭组以及使用 Windows Media Player
    充当服务器。


    **信息**


    家庭组和网络共享在 Windows 7（及 Windows Home Server）、Windows 8.1 和 Windows 10 上的工作方式大致相同，因此这些说明适用于您所使用的任何平台。

