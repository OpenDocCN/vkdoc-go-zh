  trans: '

    # 在 Windows 10 上使用 Emby 观看和收听


    一旦你启动了 `Emby Server`，就可以在设备上使用专门的 `Emby` 应用来观看内容。


    `Emby` 的一大优点是，如果你在设置服务器时使用了 `Emby` 账户，那么你可以使用同一账户登录 `Emby` 应用，然后该应用将能自动连接到你的 `Emby`
    服务器，无需进行任何额外设置。事实上，你可以通过互联网从家里的服务器上播放电影、电视节目和音乐。


    要在 PC、平板电脑或笔记本电脑上开始使用 `Emby`，请前往 Windows 应用商店，搜索 `Emby`，然后安装该应用。如果你只是想看看 `Emby`
    是否适合你，可以试用免费版本；该应用的完整售价约为 4.99 美元（3.89 英镑）。


    安装应用后，使用你在 `Emby Server` 安装期间使用的 `Emby` 账户登录应用（图 6-28）。


    ![A978-1-4842-1473-2_6_Fig28_HTML.jpg](img/A978-1-4842-1473-2_6_Fig28_HTML.jpg)


    *图 6-28. 登录 Emby*


    你可以选择不使用 `Emby` 账户，但那样你就必须手动配置 `Emby` 应用以连接到你的服务器。


    登录应用后，你可以输入服务器 IP 详情，或点击已检测到的服务器。


    一旦应用连接到服务器，它将显示你最近添加的电影；如果向右滚动，你会看到新的剧集，然后是新的专辑。


    在应用的左侧，你会看到用于访问电影、音乐和电视节目的按钮。


    `Emby` 应用有一个 `Home`（主页）按钮，可让你返回起始页面。要访问该按钮，如果你处于平板模式，可从屏幕顶部向下滑动；或者从应用左上角的菜单按钮中选择
    `App Commands`（应用命令）以显示 `Home`（主页）按钮。


    ## 播放电影


    要播放电影，请点击左侧列中的 `Movies`（电影）按钮，或者点击起始页面显示的电影之一（图 6-29）。


    ![A978-1-4842-1473-2_6_Fig29_HTML.jpg](img/A978-1-4842-1473-2_6_Fig29_HTML.jpg)


    *图 6-29. Emby 中的电影*


    进入电影视图后，会有一些按钮用于更改视图：


    - **Latest**（最新）：显示最近添加到服务器中的内容。

    - **Suggested**（推荐）：根据你观看过的内容显示电影推荐。

    - **All**（全部）：显示所有电影。

    - **Genre**（类型）：显示电影类型，例如喜剧和动作片。

    - **Favorites**（收藏）：显示你标记为收藏的电影。


    `Emby` 应用提供键盘/鼠标操作模式和平板模式。根据你使用的模式不同，屏幕布局可能会有所变化。


    当你选择一部电影后，你会看到电影信息屏幕，其中包含剧情简介（在平板模式下，向右滚动可查看详细信息），在主页面上你可以通过点击 `Play`（播放）按钮来播放电影。还有一些电影的附加选项，可以通过点击带有三个点的按钮找到。


    此菜单上的第一个选项是 `Play To`（播放至）。使用此选项，你可以将电影从你的 `Emby` 服务器流式传输到家中的 `Emby` 应用或 `DLNA`
    设备。


    你可能还记得上一章中提到的 `DLNA` 以及如何将内容发送到家中的设备。借助 `Emby`，你可以使用平板电脑或笔记本电脑将存储在 `Emby` 服务器上的电影流式传输到
    Xbox One。我们认为这是我们最喜欢 `Emby` 的功能之一。


    在 `Emby` 菜单上，有一个 `Mark Watched`（标记为已观看）按钮，它会告知 `Emby Server` 你已经观看过此视频，因此它不会再将其列为新内容。


    还有一个 `Favorite`（收藏）按钮，用于将项目标记为收藏，以便它出现在应用中的 `Favorites`（收藏）部分。


    `Sync`（同步）按钮使你可以将电影复制到本地计算机，以便在网络断开时离线观看。当你选择 `Sync`（同步）按钮时，会弹出一个菜单，让你设置离线文件的质量；质量越高，文件越大。你还可以通过
    `Sync To`（同步到）下拉列表选择要同步到的电脑。


    当你播放视频时，“现在播放”屏幕会为你提供一个 `Pause/Play`（暂停/播放）按钮。还有一个 `Audio options`（音频选项）按钮，如果电影有多个音轨，你可以在它们之间切换。此外，还有
    `Subtitles`（字幕）按钮（如果可用）可开启字幕，以及音量控制。


    你还可以使用屏幕底部的进度条控制跳转到视频的特定部分。


    要返回电影屏幕，然后返回电影列表，请两次点击屏幕顶部的 `Back`（返回）按钮。


    ## 播放电视节目


    在应用的起始页面，点击 `TV`（电视）按钮，应用将列出你的电视节目收藏。


    电影和电视的主要区别在于，应用会按季节列出电视节目的剧集。电视部分分为 **Latest**（最新）、**Suggested**（推荐）、**All**（全部）、**Genres**（类型）和
    **Favorites**（收藏）。


    - **Latest**（最新）：显示收藏中最近添加的电视节目。

    - **Suggested**（推荐）：根据你观看的内容显示电视推荐。

    - **All**（全部）：列出你所有的电视节目。

    - **Genres**（类型）：将你的收藏按类型分组，例如动作、犯罪和喜剧。

    - **Favorites**（收藏）：显示你标记为收藏的电视节目。


    当你选择一部电视节目后，应用会显示准备好播放的该节目各季节的第一集（在平板模式下，向右滚动）。当你点击一个季节时，它会显示单独的剧集，你可以点击查看剧集详情。点击
    `Play`（播放）开始播放剧集。


    还有一个带有三个点的菜单按钮，可打开 `Emby` 菜单，其中有一个 `Mark Watched`（标记为已观看）按钮，它会告知 `Emby Server`
    你已经观看过此视频，因此它不会再将其列为新内容。


    还有一个 `Favorite`（收藏）按钮，用于将项目标记为收藏，以便它出现在应用中的 `Favorites`（收藏）部分。


    `Sync`（同步）按钮使你可以将电影复制到本地计算机，以便在网络断开时离线观看。当你选择 `Sync`（同步）按钮时，会弹出一个菜单，让你设置离线文件的质量；质量越高，文件越大。你还可以通过
    `Sync To`（同步到）下拉列表选择要同步到的电脑。


    当你播放电视节目时，点击屏幕会调出“现在播放”控件，这些控件与播放电影时相同，你可以暂停播放、控制音量以及跳转到视频的任何部分。


    ## 播放音乐


    要使用 `Emby` 应用播放音乐，请前往应用的起始页面并点击 `Music`（音乐）按钮；应用将列出所有最近添加的音乐。在左侧，你可以选择按专辑、艺术家、类型、播放列表和音乐视频来查看你的音乐。


    要播放专辑，请点击 `Albums`（专辑）按钮，你将看到按字母顺序排列的收藏。点击你想播放的专辑，`Emby` 将列出构成该专辑的曲目；点击 `Play`（播放）按钮开始播放该专辑。


    专辑视图中的其他控件包括 `+` 按钮，可将专辑添加到播放列表。还有一个艺术家按钮，可显示关于艺术家的信息；与电影和电视节目部分一样，这里也有一个标记为三个点的
    `Emby` 菜单按钮。


    菜单上的选项包括 **Shuffle**（随机播放）、**Play To**（播放至）、**Favorite**（收藏）和 **Sync**（同步）。


    `Shuffle`（随机播放）按钮将随机顺序播放当前选定的歌曲。`Favorite`（收藏）按钮将专辑标记为收藏，以便你以后轻松找到它。`Sync`（同步）按钮使你可以通过将当前专辑的副本复制到设备上，在断开服务器连接时收听该专辑。


    当你点击 `Sync`（同步）按钮时，会弹出一个菜单，让你选择要复制到设备上的文件质量；别忘了，质量越高，文件越大。


    这里仅仅触及了该应用功能的皮毛；请访问 [`emby.media`](http://emby.media/) 了解更多信息。

    '
- fmt: '### Using Emby on Windows 10 Mobile


    As well as the `Emby` app for Windows 10 PCs, there is also an `Emby` app specifically
    designed for the phone.


    You can find the app by searching for `Emby` in the Windows Store on your phone.
    The app is free to test, but to use it fully, there is an in-app purchase to unlock
    all the features (the trial version will play only one video a day).


    When you first open the app, you can sign in with your `Emby` account. This will
    enable the app to connect automatically to your `Emby` server.


    Once you are connected, the app splits the content into sections for music, TV
    shows, and movies (Figure [6-30](#A978-1-4842-1473-2_6_Chapter.html#Fig30)).


    ![A978-1-4842-1473-2_6_Fig30_HTML.jpg](A978-1-4842-1473-2_6_Fig30_HTML.jpg)


    Figure 6-30.


    Emby on Windows 10 Mobile


    #### Playing Movies


    To play a movie, tap the `Movies` section (Figure [6-30](#A978-1-4842-1473-2_6_Chapter.html#Fig30))
    from the Home screen of the app. The app will then list the latest movies you
    have added to the server, and if you swipe right, it will list your movies in
    alphabetical order. Swipe right again, and it will list your movie box sets. Swipe
    right again to view movie genres and then right once more to return to the latest
    section.


    Tap a movie, and it will bring up the movie information page. If you swipe right,
    you will see an overview of the movie including movie ratings from IMDB. Swipe
    right again to view the cast information.


    On the “Movie info” page, you will see an `Add to Favorites` button and a `Play
    To` button.


    The `Play To` button enables you to stream the movie from your `Emby` server to
    another `Emby` client on your network or a `DLNA` device like an Xbox One or smart
    TV.


    When you tap the `Play To` button, it searches for `Emby` apps and `DLNA` devices
    on your network. Tap the device you want to play the movie on, and `Emby` will
    start playing on the remote device. Once streaming has started, the app changes
    to a remote control for the remote player. You can pause playback and control
    the volume of the remote device (if the device supports that feature).


    To play the movie on your phone, just tap the `Play` button on the movie image.


    #### Playing TV Shows


    The TV features of the app work very much like the movies section, but it collates
    episodes of TV shows into seasons. When you go to the TV section, the app will
    display the next TV show it has ready to play. Swipe right, and it will display
    your TV collections. Tap the show you want to watch, and the app will list the
    show’s seasons. Tap the season, and it will show you the season’s episodes. Watched
    episodes have a check mark on them to indicate that they have been watched.


    Tap an episode to display information about the episode. Just as with movies,
    you can play a video on a remote device using the `Play To` button when viewing
    an episode.


    Click the `Play` button to start watching the TV show. When an episode is playing,
    tap the screen to bring up the “Now playing” controls. You can pause or resume
    the playback, and you can jump to a specific part of the video using the scrub
    control.


    #### Playing Music


    With `Emby` you can stream your music from the server to your phone. To get started,
    tap the `Music` section on the `Emby` start page.


    It will then show you your music listed by artist; swipe right to change it to
    albums and right again to change it to songs.


    In the `Artists` view, the app lists artists in alphabetical order, and you can
    view their albums by tapping their name.


    The app will then list albums by the selected artists; tap the `Play` button on
    an album cover, and it will start playing.


    In the `Artists` view, swipe right to view individual songs by the artist; swipe
    right again to read the artist bio.


    As with movies and TV shows, you can send music to another `Emby` client or `DLNA`
    device on your home network using the `Play To` button at the bottom of the screen.
    Tap the button, and it will bring up a list of `DLNA` devices and `Emby` clients
    on your home network. Tap the device you want to play; the content will start
    playing on the remote device.


    > **Tip**

    >

    > There are other features we haven’t covered here that are well worth looking
    at. Go to [`http://emby.media`](http://emby.media/) for more details.


    ### Using Emby with a Web Browser


    As well as the `Emby` apps for Windows 10, you can use `Emby` with a web browser
    for free and without having to install anything on your PC.


    From a web browser, you enter the IP address of the PC running `Emby Server` followed
    by the port that `Emby Server` is running on. Rather than trying to work out what
    your IP address and the port your server is running on, you can find it via your
    `Emby` account.


    From a web browser, go to [`http://Emby.media`](http://emby.media/). Click `Sign
    In` and enter your `Emby` username and password. Click the `Sign In` button. Click
    your `Emby` PC.


    You will see a web-based version of the `Emby` client with which you can browse
    your media collection and play it via the browser.


    > **Tip**

    >

    > This is a simple way of accessing your media without having to set up anything
    on your PC.


    `Emby` has many features we haven’t talked about here and is well worth investigating.
    It can stream live TV, it can integrate with Windows Media Center (on Windows
    7 and 8) and other media platforms such as `Kodi`, and it has a very vibrant community
    around it. Go to [`http://emby.media`](http://emby.media/) for more information
    and join the community to get more involved.


    ## Resources for Configuring Media Servers on Other Platforms


    In this chapter, you looked at Plex Media Server and Emby Server, which are powerful
    media servers that also have client apps for many different platforms including
    Windows 10. In this section, you will take a brief look at two other media servers
    that do not have specific Windows 10 clients but will run on Windows 10 and a
    lot of other platforms. They are definitely worth a look. These are `Kodi` and
    `MediaPortal`.


    ### Kodi


    `Kodi` is an open source media server project that was previously known as Xbox
    Media Center. It started life as a media solution for the original Xbox and has
    become a popular system. `Kodi` can be installed on a wide range of platforms
    including Windows 10 and has media management features, network streaming, and
    community add-ins. To find out more, go to [`http://Kodi.tv`](http://kodi.tv/)
    where you will be able to read about its features, and you will find the download
    links.


    ### Media Portal


    `MediaPortal` is a media solution designed for a PC. Unlike Plex and Emby, which
    are client-server systems, `MediaPortal` is an all-in-one media system that you
    can connect to a big-screen TV or projector. It supports live TV, recorded TV,
    music, and movie playback, and it has a wide range of plug-ins available. Go to
    [`www.team-mediaportal.com`](http://www.team-mediaportal.com/) for more details
    and the download links.


    ## Summary


    As you have seen in this chapter, Windows has a wide range of powerful and flexible
    media solutions that you can use to serve all your media requirements around your
    home and over the Internet. Which solution is best for you will depend on your
    requirements, and there is nothing to stop you setting up multiple systems. Ian
    has Plex and Emby installed on the same server, and both co-exist happily.'
