- fmt: '# Watching and Listening with Emby on Windows 10


    Once you have `Emby Server` up, you can use one of the dedicated `Emby` apps on
    your device to watch the content.


    The great thing about `Emby` is that if you use an `Emby` account when you set
    up the server, you can log in to an `Emby` app with the same account, and then
    the app will automatically be able to connect your `Emby` server without you having
    to set up anything. In fact, you can play your movies, TV shows, and music over
    the Internet from your server at home.


    To get started with `Emby` on a PC, tablet, or laptop, go to the Windows Store,
    search for `Emby`, and then install the app. If you just want to see whether `Emby`
    will work for you, there is a trial version available; the full price of the app
    is around $4.99 (£3.89).


    Once you have the app installed, sign into the app with the `Emby` account that
    you used during the `Emby Server` installation (Figure [6-28](#A978-1-4842-1473-2_6_Chapter.html#Fig28)).


    ![A978-1-4842-1473-2_6_Fig28_HTML.jpg](A978-1-4842-1473-2_6_Fig28_HTML.jpg)


    *Figure 6-28. Signing in to Emby*


    You can skip using an `Emby` account, but you will have to configure your `Emby`
    app to connect to your server manually.


    After you have signed into the app, you can enter your server IP details or click
    the detected server.


    Once the app has connected to the server, it will show your recently added movies,
    and if you scroll to the right, you will see new episodes and then new albums.


    From the left side of the app, you will see buttons to access movies, music, and
    TV shows.


    The `Emby` app has a `Home` button, which will return you to the start page. To
    access the button, swipe down from the top of the screen if you are in tablet
    mode or from the app menu button at the top left of the app and select `App Commands`
    to display the `Home` button.


    ## Playing Movies


    To play a movie, click the `Movies` button in the left column or click on one
    of movies shown on the start page (Figure [6-29](#A978-1-4842-1473-2_6_Chapter.html#Fig29)).


    ![A978-1-4842-1473-2_6_Fig29_HTML.jpg](A978-1-4842-1473-2_6_Fig29_HTML.jpg)


    *Figure 6-29. Movies in Emby*


    When you go to the movies view, there are the buttons to change the view:


    - **Latest**: This shows what has been recently added to your server.

    - **Suggested**: This shows movie recommendations based on what you have viewed.

    - **All**: This shows all movies.

    - **Genre**: This shows movie genres such as comedy and action.

    - **Favorites**: This shows movies you have marked as favorites.


    The `Emby` app has a mode for keyboard/mouse operation and a mode for tablets.
    Depending on which mode you use, the layout of the screens may vary.


    When you select a movie, you’ll see the movie information screen with a plot synopsis
    (in tablet mode you scroll right to view the details), and from the main page
    you can play the movie by clicking `Play` button. There are some additional options
    for a movie that you can find by clicking the button with three dots.


    The first option on this menu is `Play To`. With this option you can stream a
    movie from your `Emby` server to an `Emby` app or `DLNA` device on your home network.


    You may remember `DLNA` from the previous chapter and how you can send content
    to devices on your home network. With `Emby` you can stream a movie stored on
    your `Emby` server to an Xbox One using your tablet or laptop. We think this is
    one of our favorite features of `Emby`.


    On the `Emby` menu you have a `Mark Watched` button, which tells `Emby Server`
    you have watched this video, so it doesn’t list it as new content.


    There is a `Favorite` button, which marks the item as a favorite so that it appears
    in the `Favorites` section of app.


    The `Sync` button enables you to copy the movie to your local machine so you can
    watch it offline without a network connection. When you select the `Sync` button,
    a slide-out menu gives you the option to set the quality of the offline file;
    the higher the quality, the larger the file. You can also select the PC you want
    to sync to via the `Sync To` drop-down list.


    When you are playing a video, the “Now playing” screen gives you a `Pause/Play`
    button. There is an `Audio options` button, so if the movie has multiple audio
    tracks, you can switch between them. There is also `Subtitles` button that turns
    on subtitles (if available) and a volume control.


    You can also jump to a specific part of the video using the scrub control at the
    bottom of the screen.


    To go back to the movie screen and then back to the movie list, click the `Back`
    button at the top of the screen twice.


    ## Playing TV Shows


    From the start page of the app, hit the `TV` button, and the app will list your
    TV collection.


    The main difference between movies and TV is that the app brings lists episodes
    of TV shows by season. The TV section is split into **Latest**, **Suggested**,
    **All**, **Genres**, and **Favorites**.


    - **Latest**: Shows recently added TV shows in your collection.

    - **Suggested**: Shows TV recommendations based on what you watch.

    - **All**: Lists all your TV shows.

    - **Genres**: Groups your collection into genres such as action, crime, and comedy.

    - **Favorites**: Shows TV shows you have marked as favorites.


    When you select a TV show, the app shows the first episode ready to play the seasons
    of the show (if in tablet mode, scroll right). When you click a season, it will
    show you the individual episodes that you tap to view episode details. Click `Play`
    to start playing the episode.


    There is also a menu button with three dots that brings up the `Emby` menu where
    you have a `Mark Watched` button, which tells `Emby Server` you have watched this
    video so it doesn’t list it as new content.


    There is a `Favorite` button, which marks the item as a favorite so that it appears
    in the `Favorites` section of app.


    The `Sync` button enables you to copy the movie to your local machine so you can
    watch it offline without a network connection. When you select the `Sync` button,
    a slide-out menu gives you the option to set the quality of the offline file;
    the higher the quality, the larger the file. You can also select the PC you want
    to sync to via the `Sync To` drop-down list.


    When you are playing a TV show, clicking the screen brings up the “Now playing”
    controls that are the same as when playing a movie where you can pause the playback,
    control the volume, and jump to any part of the video.


    ## Playing Music


    To play music with `Emby` app, go the start page of the app and hit the `Music`
    button; the app will list all recently added music. From the left side, you can
    choose to view your music by album, artist, genre, playlists, and music videos.


    To play an album, click the `Albums` button, and you will see your collection
    listed alphabetically. Click the album you want to play, and `Emby` will list
    the tracks that make up the album; click the `Play` button to start playing the
    album.


    Other controls in album view include the `+` button, which adds the album to a
    playlist. There is an artist button that shows information about the artist, and
    just as there is with the Movies & TV Shows sections, there is an `Emby` menu
    button marked with three dots.


    The options on the menu are **Shuffle**, **Play To**, **Favorite**, and **Sync**.


    The `Shuffle` button will play the current song selections in a random order.
    The `Favorite` button marks the album as a favorite so you can easily locate it
    later. The `Sync` button enables you to listen to the current album while disconnected
    from your server by creating a copy of it onto your device.


    When you click the `Sync` button, a slide-out menu gives you the option of selecting
    the quality of the files it will copy to your device; don’t forget the higher
    the quality, the larger the file.


    Here you have only scratched the surface of what you can do with the app; go to
    [http://emby.media](http://emby.media/) for more information.'
