  trans: '

    # 使用 Dropbox 存储你的音乐收藏


    将音乐存储在云端的另一种选择是使用名为 Dropbox 的服务。


    Dropbox 是一款云存储服务，提供免费和付费方案。在撰写本文时，Dropbox 的免费方案提供 2GB 空间；如有需要，你可以购买额外空间。


    Dropbox 通过在云端与你的设备（及个人电脑）之间同步文件夹来工作。它不像 OneDrive 那样与 Groove 音乐集成，但你仍然可以用它来确保音乐在你的所有
    Windows 10 个人电脑上可用。


    要开始使用 Dropbox，你需要一个账户。如果你还没有账户，请前往 `Dropbox.com` 创建一个。


    Dropbox 也为所有主流移动平台（包括苹果 Mac）提供客户端，不过如何使用它们已超出本书的讨论范围。


    接着，你需要下载适用于 Windows 的 Dropbox 加载项。为此，请前往 `Dropbox.com` 并登录。点击你的用户名，点击“安装”链接，然后点击“下载”按钮开始下载。


    下载完成后，运行安装程序。系统会要求你登录到该程序；登录后，Dropbox 将开始同步你的个人电脑。


    默认情况下，Dropbox 会将你所有的内容同步到一个基于你用户名的新文件夹中，例如 `Ian\Dropbox`（图 2-7）。在此文件夹中，你可以创建一个
    `Music` 文件夹并将音乐复制进去，Dropbox 随后会开始上传。


    ![A978-1-4842-1473-2_2_Fig7_HTML.jpg](img/A978-1-4842-1473-2_2_Fig7_HTML.jpg)


    图 2-7.


    如果你希望 Groove 播放存储在 Dropbox `Music` 文件夹中的音乐，应通过文件资源管理器右键点击 Dropbox 中的 `Music` 文件夹，选择“包含到库中”，然后选择“音乐”。


    如果你不希望 Dropbox 将整个内容同步到你的个人电脑，可以按照以下步骤切换为选择性同步：


    -   右键点击任务栏中的 Dropbox 图标。

    -   点击“设置”图标。

    -   选择“偏好设置”。

    -   在“账户”选项卡中，点击“选择性同步”（图 2-7）。

    -   选择你想与此台电脑同步的文件夹，然后点击“确定”完成。


    至此，你已经了解了如何将音乐存储在三大主流云服务上，以及在个人电脑和其他设备上访问这些音乐是多么简单。还有一个 Windows 10 设备你尚未了解：Xbox
    One。作为 Windows 10 发布的一部分，Xbox One 将更新以运行该操作系统的一个版本。Xbox One 被设计为娱乐设备，但你如何在上面收听音乐呢？在下一节中，你将看到具体方法。如果你已将音乐收藏存储在
    OneDrive 上，那会相当简单。


    # 通过 Xbox One 访问音乐


    将音乐存储在微软 OneDrive 上的最大好处是，你的音乐不仅在 Windows 10 个人电脑、平板电脑和手机上可用，在 Xbox One 上同样可用。一旦你将音乐存储在
    OneDrive 中，只需前往你的 Xbox One 并打开 Groove 应用即可。


    如前所述，Groove 音乐服务此前被称为 Xbox 音乐，在你的 Xbox 上可能仍沿用此名称。


    Groove（图 2-8）分为四个部分：主页、电台、精选和热门音乐。


    ![A978-1-4842-1473-2_2_Fig8_HTML.jpg](img/A978-1-4842-1473-2_2_Fig8_HTML.jpg)


    图 2-8.


    在“主页”部分，你会看到“播放列表”、“收藏”和“搜索”磁贴，以及最近播放的音乐。


    要浏览你的音乐，只需选择“收藏”磁贴；你将看到存储在 OneDrive 中的所有艺术家。


    在 Groove 应用的许多位置，你都能看到来自 Groove 音乐服务在线收藏的音乐，例如“艺术家”视图或“电台”视图。你需要订阅 Groove 音乐通行证（参见第
    1 章）才能播放这些音乐。如果你没有订阅 Groove 音乐通行证，则拥有十次免费播放机会，因此你可以在订阅前先试用该服务。


    你可以通过选择应用左上角的“播放”按钮立即开始播放音乐。这将按随机顺序开始播放你的所有音乐。如果你想听音乐但不确定自己当下想听什么类型，这非常方便。


    在“收藏”视图中，你可以通过选择“搜索”按钮来搜索歌曲、专辑或艺术家（图 2-9）。使用屏幕键盘输入你要搜索的内容，应用会建议匹配的项目供你从列表中选择，或者你可以完整输入搜索词并选择“搜索”。


    ![A978-1-4842-1473-2_2_Fig9_HTML.jpg](img/A978-1-4842-1473-2_2_Fig9_HTML.jpg)


    图 2-9.


    搜索结果（图 2-10）将显示在屏幕上，你可以使用 Xbox 控制器上的左右控制键浏览列表。找到所需项目后，按下控制器上的 A 键进行选择。


    ![A978-1-4842-1473-2_2_Fig10_HTML.jpg](img/A978-1-4842-1473-2_2_Fig10_HTML.jpg)


    图 2-10.


    如果你选择的项目是一张专辑（图 2-11），则可以选择“播放专辑”，顾名思义，它会播放该专辑。


    ![A978-1-4842-1473-2_2_Fig11_HTML.jpg](img/A978-1-4842-1473-2_2_Fig11_HTML.jpg)


    图 2-11.


    “添加专辑”按钮允许你将专辑添加到当前的“正在播放”栏、新播放列表或现有播放列表中。


    “启动电台”按钮会根据专辑的艺术家创建一个自定义电台。该自定义电台包含该艺术家的歌曲，以及与原创艺术家风格相似的专辑中的歌曲。这是发现新音乐的好方法。


    要使用“启动电台”功能，你需要订阅 Groove 音乐通行证。关于订阅的更多信息，请参见第 1 章。


    “探索艺术家”按钮允许你播放该艺术家的音乐、基于该艺术家启动电台、将歌曲添加到播放列表或“正在播放”栏，以及将专辑固定到主屏幕。


    `固定到主页`会将专辑添加到 Xbox One 的主屏幕，以便你可以快速开始播放该艺术家的歌曲。你也可以在此屏幕浏览你收藏中该艺术家的音乐。此外，你还可以在此屏幕选择从收藏中删除该专辑。

    '
- fmt: '选项按钮的右侧是专辑中的各个曲目；选择一个曲目即可开始播放。


    返回搜索结果屏幕后，你可以使用以下选项筛选结果：`All Music`、`Artist`、`Albums`、`Songs`、`Playlist` 或 `Music
    Videos`。


    选择筛选类型后，搜索结果将仅显示与你筛选条件匹配的结果。例如，如果选择 `Playlists`，则仅显示与搜索文本匹配的播放列表。如果选择 `Albums`，则仅显示与搜索文本匹配的专辑。


    **注意**：你将在本章稍后部分了解音乐视频选项。


    搜索屏幕上的另一个选项是更改视图。你可以在自己的收藏和`Groove Music Service`的目录之间切换。你的收藏由你购买的音乐和你上传到`OneDrive`的音乐组成。`Music
    Collection`视图包含来自`Groove Music Service`库的音乐。要收听这些音乐，你需要拥有`Groove Music Pass`订阅。


    **提示**：即使没有`Groove Music Pass`订阅，你也可以免费收听十首歌曲。


    回到`Music Collection`视图，你可以更改音乐显示的顺序。你可以选择`Change View`按钮，然后从`Recently added`、`Music
    video`或`My albums`中进行选择。`Recently added`按音乐添加到`OneDrive`或购买的顺序显示。`My music videos`显示你收藏中`Groove
    Music`拥有原版艺术家视频的歌曲。`My Albums`按专辑分组显示你的收藏，而`My artists`按艺术家姓名分组显示你的收藏。


    在`Artists`视图中，选择一位艺术家会打开艺术家信息页面，并提供以下选项：`Play my songs`、`Start Radio`、`Add my
    songs`和`Pin to Home`。`Play my songs`开始播放该艺术家的歌曲，`Start Radio`基于该艺术家启动自定义电台，`Add
    my songs`将歌曲添加到播放列表，`Pin to Home`将该艺术家固定到`Xbox One`仪表盘的`Home`屏幕。


    你还可以向右滚动查看你收藏中该艺术家的歌曲，再次向右滚动查看`Groove Music`目录中该艺术家的歌曲、该艺术家的音乐视频，以及相似和受其影响的艺术家。


    **注意**：与应用中其他区域一样，如果显示的音乐不在你的收藏中，你需要拥有`Groove Music Pass`订阅才能收听。


    在`Albums`视图中，选择一个专辑会打开专辑页面（图[2-12](#A978-1-4842-1473-2_2_Chapter.html#Fig12)），你可以在其中播放专辑、将专辑添加到`Now
    Playing`栏，或将其添加到新的或现有的播放列表。


    ![A978-1-4842-1473-2_2_Fig12_HTML.jpg](A978-1-4842-1473-2_2_Fig12_HTML.jpg)


    图 2-12. Xbox One 上的专辑页面


    如果你的音乐收藏很大，并且想快速找到某首歌曲、某位艺术家或某个专辑，`Jump to a letter`按钮非常实用。只需选择`Jump to a letter`按钮，然后选择一个字母；它会立即跳转到该字母的第一个项目。


    如果你想跳转到以 D 开头的专辑（例如 *Dark Side of the Moon*），你应该选择`Change View`按钮，选择`Albums`视图，选择`Jump
    to a letter`，然后选择字母 D。它会跳转到你收藏中第一个以 D 开头的专辑；然后你可以使用`Xbox One`控制器浏览以找到所需的专辑。


    ### Now Playing


    当你在听音乐时，你处于`Now playing`视图。音乐播放时会显示艺术家的艺术作品。当曲目开始播放以及曲目结束时，它会显示歌曲名称和艺术家姓名。


    如果在播放音乐时移动`Xbox One`控制器上的左摇杆，将会调出音乐传输控制，你可以在此执行暂停播放、跳至下一曲目、返回上一曲目等操作。有一个按钮可以打开或关闭`Shuffle`模式（随机顺序播放）。


    在此菜单中，你还可以打开或关闭`Repeat`模式。


    **信息**：在`Repeat`模式关闭的情况下，`Groove`会确保已播放的歌曲在您选择新的播放列表、专辑或歌曲之前不会再次播放。


    此菜单中的另一个选项是调出`Show Song list`。此列表是当前歌曲选择列表，你可以从中查看将要播放哪些曲目。你还可以浏览列表，如果选择一首歌曲，它将停止当前曲目并播放你刚刚选择的曲目。


    你可以将歌曲添加到新的播放列表或现有的播放列表。此菜单上的其他选项（通过`More Actions`按钮）包括：探索当前正在播放的艺术家、保存播放列表、基于艺术家启动电台、以及从播放列表中删除歌曲。


    回到主音乐菜单以及收藏视图，你有以下选项：`Radio`、`Featured`和`Top music`。


    `Radio`部分（图[2-13](#A978-1-4842-1473-2_2_Chapter.html#Fig13)）显示最近创建的电台以及基于你的音乐库建议的电台。当你选择一个电台时，应用会基于该艺术家及相关艺术家创建一个播放列表。


    ![A978-1-4842-1473-2_2_Fig13_HTML.jpg](A978-1-4842-1473-2_2_Fig13_HTML.jpg)


    图 2-13. Xbox One 上的`Radio`视图和搜索


    另一个选项是创建新电台。选择该选项后，应用会要求输入艺术家姓名。输入姓名后，应用会基于你输入的内容创建一个电台。


    `Featured`部分（图[2-14](#A978-1-4842-1473-2_2_Chapter.html#Fig14)）显示了一组精选音乐，如果你拥有`Groove
    Music Pass`订阅，则可以收听。这里有新专辑、新视频和搜索按钮。


    ![A978-1-4842-1473-2_2_Fig14_HTML.jpg](A978-1-4842-1473-2_2_Fig14_HTML.jpg)


    图 2-14. Xbox One 上的`Featured`视图


    `Top music`部分（图[2-15](#A978-1-4842-1473-2_2_Chapter.html#Fig15)）包含了`Xbox Store`中最热门音乐的精选。有一个按钮用于显示热门歌曲，还有一个按钮用于显示收藏中的热门视频。你还可以通过搜索按钮搜索热门音乐。与`Featured`部分一样，你需要拥有`Groove
    Music Pass`订阅才能收听这些音乐。


    ![A978-1-4842-1473-2_2_Fig15_HTML.jpg](A978-1-4842-1473-2_2_Fig15_HTML.jpg)


    图 2-15. Xbox One 上的`Top music`视图


    ### Groove Videos


    `My Music videos`是`Xbox One`上`Groove Music`的一个出色功能；它通过将你收藏中的歌曲与`Groove Music`目录中的音乐视频进行匹配来工作。每当你在播放音乐时，如果`Groove
    Music`有匹配的视频，它会播放该视频，而不是像应用通常播放音乐时那样显示艺术家图片。在`Groove Music`的各个位置，你会在歌曲上看到一个小视频图标，表示该歌曲配有视频。


    这是一个在其他版本的`Groove`上会很出色的功能，但暂时仅限于`Xbox One`。


    ## Summary


    在本章中，你了解了如何将音乐存储在云端，以便通过微软的`Groove Music`应用和`OneDrive`服务，在手机、平板、笔记本电脑甚至`Xbox One`上随时随地轻松访问。本章还介绍了第三方服务，例如`Google
    Play Music`和`Dropbox`。在下一章中，你将把注意力转向在`Windows 10`上如何处理视频。'
  raw: 'To the right of the option buttons you will see the individual tracks on the
    album; select a track to start playing it.


    Back on the search results screen you can filter the results with the following
    options: All Music, Artist, Albums, Songs, Playlist, or Music Videos.


    When you select a filter type, the search results will be filtered to show only
    the results that match your filter. For example, if you select Playlists, it will
    show only the playlists that match your search text. If you select Albums, it
    will only show the albums that match your search.


    Note


    You will look at the music videos option later in this chapter.


    The other option on the search screen is to change the view. You can switch between
    your collection and the Groove Music Service’s catalog. Your collection consists
    of the music you have purchased and the music you have uploaded to OneDrive. The
    Music Collection view consists of the music from the Groove Music Service’s library.
    To listen to this, you will need to have a Groove Music Pass subscription.


    Tip


    Even if you don’t have a Groove Music Pass subscription, you can listen to ten
    songs for free.


    Back in the Music Collection view, you can change the order your music is displayed
    in. You can select the Change View button and pick from Recently added, Music
    video, or My albums. Recently added shows your music by the order it was added
    to OneDrive or purchased. My music videos shows songs in your collection for which
    Groove Music has the original artist’s video for. My Albums displays your collection
    group by album, and My artists displays your collection grouped by artist name.


    When you are in the Artists view, selecting an artist brings up the artist information
    page and the following options: Play my songs, Start Radio, Add my songs, and
    Pin to Home. “Play my songs” starts music playback of the artist’s songs, Start
    Radio starts a custom radio station based on the artists, “Add my songs” adds
    the songs to a playlist, and Pin to Home pins the artist to the Home screen on
    the Xbox One dashboard.


    You can also scroll to the right to see songs by the artist in your collection,
    scroll right again to see songs by the artist in the Groove Music catalog, music
    videos by the artist, and similar and influencing artists.


    Note


    As with other areas in the app, if the music displayed is not in your collection,
    you will need a Groove Music Pass subscription to listen to it.


    When you are in the Albums view, selecting an album brings up the album page (Figure
    [2-12](#A978-1-4842-1473-2_2_Chapter.html#Fig12)), where you can play the album,
    add the album to the Now Playing bar, or add it to a new or existing playlist.


    ![A978-1-4842-1473-2_2_Fig12_HTML.jpg](A978-1-4842-1473-2_2_Fig12_HTML.jpg)


    Figure 2-12.


    Album page in Xbox One


    The “Jump to a letter” button is really handy if you have a large music collection
    and want to get closer to a song, artist, or album. Just select the “Jump to a
    letter” button and then select a letter; it will immediately jump to the first
    item of the letter.


    If you want jump to an album that begins with D, let’s say Dark Side of the Moon,
    you should select the Change View button, select the Albums view, select “Jump
    to a letter,” and select the D letter. It will then go to the first album in your
    collection that starts with a D; you can then use the Xbox One controller to browse
    for the required album.


    ### Now Playing


    When you are listening to music, you are in the “Now playing” view. This displays
    the artist’s artwork when the music is playing. When a track starts playing and
    also at the end of a track, it shows you the song name and artist name.


    If you move the left thumbstick on the Xbox One controller while playing music,
    it will bring up the music transport controls where you can do things like pause
    playback, skip to the next track, and go back to the previous track. There is
    a button that toggles Shuffle mode (random order playback) on and off.


    From the menu you can also turn Repeat mode on and off.


    Information


    With Repeat mode off, Groove will ensure that a played song does not play again
    until you select a new playlist, album, or song.


    Another option in this menu is to bring up the Show Song list. This list is the
    current song selection list, and from the list you can see what tracks are going
    to be played. You can also navigate through the list, and if you select a song,
    it will stop the current track and play the one you have just selected.


    You can add songs to a new playlist or to an existing playlist. The other options
    on this menu (via the More Actions button) are options to explore the currently
    playing artist, to save the playlist, to start a radio station based on the artist,
    and to remove a song from a playlist.


    Back at the main music menu as well as the collection view, you have the following
    options: Radio, Featured, and Top music.


    The Radio section (Figure [2-13](#A978-1-4842-1473-2_2_Chapter.html#Fig13)) shows
    recently created radio stations and suggested stations based on your music library.
    When you select a radio station, the app creates a playlist based on the artist
    and related artists.


    ![A978-1-4842-1473-2_2_Fig13_HTML.jpg](A978-1-4842-1473-2_2_Fig13_HTML.jpg)


    Figure 2-13.


    Radio view and search on Xbox One


    The other option you have is to create a new station. When you select the option,
    the app will ask for an artist name. Type in the name, and the app will create
    a station based on when you enter.


    The Featured section (Figure [2-14](#A978-1-4842-1473-2_2_Chapter.html#Fig14))
    shows a selection of specially curated music that you can listen to if you have
    a Groove Music Pass subscription. There are buttons for new albums, new videos,
    and a search.


    ![A978-1-4842-1473-2_2_Fig14_HTML.jpg](A978-1-4842-1473-2_2_Fig14_HTML.jpg)


    Figure 2-14.


    Featured view on Xbox One


    The “Top music” section (Figure [2-15](#A978-1-4842-1473-2_2_Chapter.html#Fig15))
    has a selection of the most popular music in the Xbox Store. There is a button
    to show the top songs and a button to show the top videos from the collection.
    You can also search through the top music via the search button. As with the featured
    section, you will need a Groove Music Pass subscription to listen to this music.


    ![A978-1-4842-1473-2_2_Fig15_HTML.jpg](A978-1-4842-1473-2_2_Fig15_HTML.jpg)


    Figure 2-15.


    “Top music” view on Xbox One


    ### Groove Videos


    My Music videos is a great feature of Groove Music on Xbox One; it works by matching
    up songs in your collection with music videos Groove Music has in its catalog.
    Whenever you are playing your music, if Groove Music has a matching video, it
    will play the video instead of showing artist images as the app normally does
    when playing back music. At various locations in Groove Music, you will see a
    small video icon on a song. This means there is a video to go with the song.


    This is a feature that would be great on other versions of Groove, but for the
    moment it is only on Xbox One.


    ## Summary


    In this chapter, you looked at how to store your music on the cloud so you can
    easily access it from anywhere on your phone, tablet, laptop, and even Xbox One,
    with Microsoft’s Groove Music app and OneDrive service. The chapter also covered
    third-party services, such as Google Play Music and Dropbox. In the next chapter,
    you will turn your attention to what you can do with video on Windows 10.'
