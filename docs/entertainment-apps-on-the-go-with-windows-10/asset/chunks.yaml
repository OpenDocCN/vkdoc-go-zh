    a monthly amount and do not have a Groove Music Pass, you can still browse the
    store and pay for the songs and albums you want to buy.


    From the Windows Store app (Figure [1-10](#A978-1-4842-1473-2_1_Chapter.html#Fig10)),
    you can click/tap the Music link and then browse Microsoft’s collection of music.


    ![A978-1-4842-1473-2_1_Fig10_HTML.jpg](A978-1-4842-1473-2_1_Fig10_HTML.jpg)


    Figure 1-10.


    The Windows Store


    When you see a single song or an album that you are interested in, click/tap the
    Buy icon, and you will be able to purchase the content. The cost will be charged
    to your Microsoft account in the same way buying an app would. If you have a Music
    Pass subscription, you will see a Download button instead of a Buy button. Selecting
    Download will download the selection to your PC.


    Once you have bought a song or album, it is automatically added to your collection
    and available to play on your other devices by streaming it over the Internet.
    You can also download your purchases to your other devices so you can listen to
    them without being connected to the internet.


    Note


    If you have iOS devices, Android devices, or a Windows phone, you can still access
    your music collection from them. Later in this chapter you will see how to access
    your collection on Android devices, iPhones, and Windows 10 phones.


    #### Groove Radio


    Note


    You must have an active Groove Music Pass subscription for the radio option to
    be available.


    Groove has a music discovery service that will create a custom radio station based
    on an artist. To start a station, follow these steps:


    Select an artist in the music app via the Artists view.   Click/tap the Start
    Radio button that appears.  


    Groove will create a playlist based on the artist you have selected. You will
    get some songs from the select artist along with tracks from other artists Groove
    thinks are similar; you can view the playlist by going to the “Now playing” view
    in the Groove app. As you listen to songs, the app adds more songs to the playlist.


    When you create a radio station, it gets added to the Radio section of the app.
    If you go to the Radio section, you can view the radio stations you have created.
    If you select “Start a station,” you can type in the name of an artist or select
    from popular artists to create a new station.


    #### Searching for Music


    With Groove, you can search for songs, artist, or albums via the search box. Just
    type your search criteria into the box, and Groove will start showing search suggestions.
    Selecting one of the results will bring up the search results page. Here it will
    list matching artists, albums, and songs.


    If you have a Groove Music Pass, you will see two tabs (Figure [1-11](#A978-1-4842-1473-2_1_Chapter.html#Fig11)):
    In collection and Full catalog. The “In collection” tab shows matching content
    in your own music collection either on the device or in the cloud on OneDrive.


    ![A978-1-4842-1473-2_1_Fig11_HTML.jpg](A978-1-4842-1473-2_1_Fig11_HTML.jpg)


    Figure 1-11.


    Search results


    The “Full catalogue” tab shows content available in the Groove store. If you have
    a Groove Music Pass subscription, you can download or listen to any of the music
    shown in the results.


    If you don’t have a Groove Music Pass, the app will search your own music collection,
    and if nothing matches your search criteria, you will see a link that when selected
    opens the store app and searches the Windows Store.


    #### Settings


    On a PC Groove has a number of settings that you can use to customize your experience.
    The Settings section of the app is split between Music Pass settings and Your
    Music settings.


    ##### Music Pass


    This is where you can manage the devices you are using with Groove. Selecting
    this option takes you to the web page you saw earlier in Figure [1-9](#A978-1-4842-1473-2_1_Chapter.html#Fig9)
    for managing devices.


    ##### Your Music


    This is where you can manage music files on the PC. The first option is “Choose
    where we look for music.” Selecting this option brings up the dialog box you saw
    earlier in the chapter in Figure [1-2](#A978-1-4842-1473-2_1_Chapter.html#Fig2)
    where you can tell the app where you store music on your device.


    The following are the other options:


    *   Automatically download songs you add from Groove: With this option selected,
    the PC will automatically download songs you buy (or add via your Groove Music
    Pass subscription).

    *   Automatically retrieve and update missing album art and metadata: With this
    option, the app will automatically download album artwork, artist information,
    and other metadata when you add music to your collection.

    *   When I add a song to OneDrive, remove any version that came from Groove Music
    Pass: This option will remove duplicate tracks from your Groove Music Pass subscription.

    *   Ask me to sign in before completing purchases or managing my account: This
    option means that the app will prompt with your password when you purchase new
    music.


    There is also the option “Delete your playlists, and any music you’ve added or
    download from the music catalogue.” Selecting this will make the app remove content
    you have purchased or added from Groove and the Music Store.


    The final option is a Dark or Light setting. The Light setting gives you black
    text on a white background, and the Dark setting gives you white text on a black
    background.


    In the past few sections, you’ve learned about using Groove on a Windows 10 PC.
    What if you want to use it on your mobile devices? In the next section, you will
    start by looking at how to use it on a Window 10 Mobile device.


    ### Using Groove on a Windows 10 Mobile Device


    Information


    Prior to Windows 10, the Windows operating system on phones was known as Windows
    Phone. Microsoft has changed this to Windows 10 Mobile. A Windows 10 Mobile device
    can be a phone or a small (less than 8-inch) tablet. For convenience, this book
    will often refer to these devices as phones.


    With Windows 10 on a phone or small tablet, Groove works very much in the same
    way as the PC version does with just a few changes. In this section, you will
    learn how to listen to your own music on a Windows 10 mobile device and how to
    listen using a Groove Music Pass subscription.


    You will find the Groove app on your phone’s start screen; if you don’t, you can
    find it in the “All apps” list.'
  trans: '

    #### 探索音乐


    **注：** `探索音乐`选项目前在`Windows 10 Mobile`中不可用。


    **信息：** `Windows 10 Mobile`是用于手机和小型平板电脑的`Windows 10`版本。微软将屏幕对角线长度小于 8 英寸的平板电脑定义为小型平板电脑。


    如果你拥有`Groove Music Pass`，`Groove`应用中会有一个名为`探索`的版块。在此版块中，你可以探索（因此得名）`Groove Music`商店中的最新音乐。打开此版块时，它会呈现一系列新音乐、当前热门歌曲、热门艺术家以及热门专辑。


    你可以选择一张专辑并开始播放，就像播放你自己的专辑一样。你可以将其添加到播放列表、创建电台以及下载曲目。


    **信息：** `Groove`及许多其他流媒体服务中的电台并非传统的广播电台。相反，它们是一种从流媒体服务中所有可用音乐中随机生成播放列表的方式。这些播放列表通常围绕一位艺术家或一种音乐流派设定主题。例如，可能包括恐怖海峡（Dire
    Straits）这样的艺术家，或者 20 世纪 70 年代的音乐。


    如果你选择一位艺术家，可以查看该艺术家的专辑，就像在收藏中查看艺术家一样，你可以播放和下载该艺术家的专辑和歌曲。


    #### 购买音乐


    你已经了解了`Groove`订阅，但如果你不想按月付费且没有`Groove Music Pass`，你仍然可以浏览商店并购买你想要的歌曲和专辑。


    在`Windows 商店`应用（图 1-10）中，你可以点击/轻触`音乐`链接，然后浏览微软的音乐收藏。


    ![A978-1-4842-1473-2_1_Fig10_HTML.jpg](img/A978-1-4842-1473-2_1_Fig10_HTML.jpg)


    图 1-10. Windows 商店


    当你看到感兴趣的某首歌曲或某张专辑时，点击/轻触`购买`图标，即可购买该内容。费用将计入你的 Microsoft 帐户，与购买应用的方式相同。如果你有`Music
    Pass`订阅，你会看到`下载`按钮而不是`购买`按钮。选择`下载`会将所选内容下载到你的电脑上。


    一旦你购买了歌曲或专辑，它会自动添加到你的收藏中，并可通过互联网流式传输到你的其他设备上播放。你也可以将购买的内容下载到其他设备上，以便在没有连接互联网时收听。


    **注：** 如果你有 iOS 设备、Android 设备或 Windows 手机，你仍然可以从这些设备访问你的音乐收藏。本章后面将介绍如何在 Android
    设备、iPhone 以及`Windows 10`手机上访问你的收藏。


    #### Groove 电台


    **注：** 你必须拥有有效的`Groove Music Pass`订阅，才能使用电台功能。


    `Groove`提供了一项音乐发现服务，可以根据一位艺术家创建自定义电台。要启动电台，请按照以下步骤操作：


    - 通过`艺术家`视图在音乐应用中选择一位艺术家。

    - 点击/轻触出现的`启动电台`按钮。


    `Groove`会基于你选择的艺术家创建一个播放列表。你将听到所选艺术家的一些歌曲，以及`Groove`认为风格相似的其他艺术家的曲目；你可以通过进入`Groove`应用中的“正在播放”视图来查看播放列表。在你听歌时，应用会向播放列表中添加更多歌曲。


    当你创建一个电台后，它会添加到应用的`电台`版块中。如果你进入`电台`版块，可以查看你已创建的电台。如果你选择“启动一个电台”，可以输入一位艺术家的名字，或从热门艺术家中选择，以创建一个新电台。


    #### 搜索音乐


    使用`Groove`，你可以通过搜索框搜索歌曲、艺术家或专辑。只需在搜索框中输入搜索条件，`Groove`便会开始显示搜索建议。选择其中一个结果将打开搜索结果页面。在此页面上，会列出匹配的艺术家、专辑和歌曲。


    如果你拥有`Groove Music Pass`，你会看到两个选项卡（图 1-11）：`收藏中`和`完整目录`。`收藏中`选项卡显示你个人音乐收藏中匹配的内容，这些内容可能存储在设备上或`OneDrive`的云端。


    ![A978-1-4842-1473-2_1_Fig11_HTML.jpg](img/A978-1-4842-1473-2_1_Fig11_HTML.jpg)


    图 1-11. 搜索结果


    `完整目录`选项卡显示`Groove`商店中可用的内容。如果你拥有`Groove Music Pass`订阅，你可以下载或收听结果中显示的任何音乐。


    如果你没有`Groove Music Pass`，应用将搜索你自己的音乐收藏；如果没有找到匹配你搜索条件的内容，你会看到一个链接，点击该链接将打开商店应用并搜索`Windows
    商店`。


    #### 设置


    在电脑上，`Groove`提供了一些设置选项，你可以用来自定义使用体验。应用的`设置`版块分为`Music Pass 设置`和`你的音乐设置`。


    ##### Music Pass


    在这里，你可以管理你与`Groove`一起使用的设备。选择此选项将带你进入之前在图 1-9 中看到的用于管理设备的网页。


    ##### 你的音乐


    在这里，你可以管理电脑上的音乐文件。第一个选项是“选择我们查找音乐的位置”。选择此选项将弹出一个对话框，你可以在本章前面的图 1-2 中看到该对话框，在此你可以告诉应用你的设备上存储音乐的位置。


    以下是其他选项：


    - **自动下载你从 Groove 添加的歌曲：** 选中此选项后，电脑将自动下载你购买（或通过你的`Groove Music Pass`订阅添加）的歌曲。

    - **自动检索和更新缺失的专辑封面及元数据：** 启用此选项后，当你向收藏中添加音乐时，应用将自动下载专辑封面、艺术家信息及其他元数据。

    - **当我把歌曲添加到 OneDrive 时，删除来自 Groove Music Pass 的任何版本：** 此选项将删除你`Groove Music Pass`订阅中的重复曲目。

    - **在完成购买或管理我的帐户前要求我登录：** 此选项意味着当你购买新音乐时，应用会提示你输入密码。


    还有一个选项是“删除你的播放列表以及你从音乐目录中添加或下载的任何音乐”。选择此选项将使应用删除你从`Groove`和`音乐商店`购买或添加的内容。


    最后一个选项是`深色`或`浅色`主题设置。`浅色`主题提供白底黑字，`深色`主题提供黑底白字。


    在前面的几节中，你已经了解了如何在`Windows 10`电脑上使用`Groove`。如果你想在移动设备上使用它呢？在下一节中，你将首先了解如何在`Windows
    10 Mobile`设备上使用它。


    ### 在 Windows 10 Mobile 设备上使用 Groove


    **信息：** 在`Windows 10`之前，手机上的 Windows 操作系统被称为`Windows Phone`。微软已将其更名为`Windows 10
    Mobile`。`Windows 10 Mobile`设备可以是手机，也可以是小型（小于 8 英寸）平板电脑。为方便起见，本书通常将这些设备称为手机。


    在手机或小型平板电脑上使用`Windows 10`时，`Groove`的工作方式与电脑版非常相似，仅有一些细微差别。在本节中，你将学习如何在`Windows
    10`移动设备上收听自己的音乐，以及如何使用`Groove Music Pass`订阅收听音乐。


    你可以在手机的开始屏幕上找到`Groove`应用；如果找不到，可以在“所有应用”列表中找到它。

