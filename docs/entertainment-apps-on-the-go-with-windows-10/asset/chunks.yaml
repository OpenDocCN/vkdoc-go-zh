  trans: '

    ### 使用 Windows 10 访问共享文件夹


    设置好网络共享后，你可以通过几种方式访问其中的内容。你可以通过**文件资源管理器**查看和播放内容，也可以将这些文件夹添加到 Groove 音乐和“电影和电视”应用中。

    要通过文件资源管理器访问内容，请从“开始”菜单中选择**文件资源管理器**，然后选择**网络**链接。Windows 将显示你家庭网络中的计算机和媒体设备。

    （如果未显示任何设备，则 Windows 认为你处于公共网络中；要更改此设置，请参阅“使用家庭组访问媒体”部分中的提示。）

    **信息**

    在下一章中，你将了解如何从非 PC 媒体设备访问音乐和视频，因此目前我们将重点讨论如何访问列出的计算机上的内容。

    双击你要访问内容的计算机，然后它将显示共享文件夹。如果未显示任何文件夹，则需要按照本章前面的说明进行共享。

    当你双击一个文件夹时，它将列出文件夹内容；如果有要播放的视频或音乐文件，只需双击它，Windows 10 将询问你要使用哪个应用来播放该文件。如果文件是视频文件，默认选项将是“电影和电视”（或“影片和电视”，具体取决于你的位置）应用，但对话框将显示其他可以播放该文件的应用（图
    4-12）。选择你想要使用的应用，然后它将播放该文件。（Windows 10 的“电影和电视”应用可能是你的最佳选择，但正如你在上一章中所见，VLC 也是一个不错的选择。）如果你不希望
    Windows 每次播放文件时都询问使用哪个应用，可以选择“始终使用此应用打开…”选项，Windows 将记住你的选择。

    ![A978-1-4842-1473-2_4_Fig12_HTML.jpg](img/A978-1-4842-1473-2_4_Fig12_HTML.jpg)

    图 4-12. 播放文件

    该文件将通过你的家庭网络进行播放。


    ### 将远程计算机文件夹添加到你的音乐和电影电视应用


    如果你经常播放网络中其他计算机上的内容，可以将远程文件夹添加到媒体应用中，这样就不必每次都导航到所需的文件夹了。

    要向“电影和电视”应用添加文件夹，请打开该应用并选择**设置**。然后选择“选择我们在何处查找视频”。选择 **+** 按钮，然后使用**资源管理器**窗口，通过**网络**链接导航到包含视频的文件夹。选择你想要的文件夹，然后点击“将此文件夹添加到视频”。然后你可以以相同的方式添加更多文件夹，并点击“完成”。

    然后，该应用将索引内容并将其添加到“视频”部分，你可以在其中浏览和播放内容。

    你可以在 Groove 音乐应用中进行同样的操作；转到**设置**，选择“选择我们在此电脑上查找音乐的位置”，然后添加你的其他计算机文件夹。

    **信息**

    如果你将文件夹添加到平板电脑或笔记本电脑，然后将设备带出家庭网络，你将无法访问共享内容。如果你希望这样做，请查看下一章。


    ## 总结


    在本章中，你学习了如何通过 Windows Media Player、文件共享和家庭组在家庭网络上共享媒体。你还了解了在 Windows 10 上使用这些媒体是多么容易。在下一章中，你将了解第三方软件，如果你希望对共享有更多控制权，或者希望流式传输到非
    PC 设备（如电视和网络媒体播放器），这些软件将有所帮助。


    # 5. 在家中流式传输媒体


    使用 Windows 10，你可以通过名为数字生活网络联盟（DLNA）的标准，从网络上的媒体服务器流式传输音乐和视频。DLNA 是一种经过认证的标准，用于使媒体服务器、媒体播放器和应用程序协同工作。通过
    DLNA，你拥有一个媒体服务器和一个称为媒体渲染器的设备。服务器可以是运行 Windows Media Player 的 PC、家中的网络附加存储（NAS）设备，或安装在
    PC 上的媒体服务器软件。


    在上一章中，你学习了如何将 Windows Media Player 设置为媒体服务器，在本章中，你将了解如何从 Windows Media Player
    和家庭网络上的其他媒体服务器进行流式传输。


    你还将学习如何使用 Windows 10 将 PC 上的媒体发送到家庭网络上兼容 DLNA 的设备，包括一些第三方软件如何帮助你从 Windows 10 手机进行流式传输。


    ## 从 DLNA 服务器流式传输到 Windows PC


    当你的网络上设置了媒体服务器时，你可以从 Windows 10 PC 流式传输存储在其上的媒体。在上一章中，你已将 Windows Media Player
    设置为 DLNA 服务器，你也可以使用 Windows Media Player 通过 DLNA 访问网络上其他 PC 上的内容。


    **信息**

    DLNA 是一种标准，允许来自不同（或相同）制造商的媒体设备通过网络共享内容。该标准由数字生活网络联盟控制。许多设备支持 DLNA，包括许多智能电视和现代音频系统。


    当你在与其它 PC 运行在同一网络上的 PC 上运行 Windows Media Player 时，你将看到其他 PC 共享出的库列表（图 5-1）。

    ![A978-1-4842-1473-2_5_Fig1_HTML.jpg](img/A978-1-4842-1473-2_5_Fig1_HTML.jpg)

    图 5-1. Windows Media Player 访问 DLNA 服务器


    **注意**

    如果 PC 已在 Windows Media Player 中共享其库（如上一章所述），或正在使用第三方 DLNA 软件（如 Emby，将在下一章讨论），则会显示这些
    PC。


    除了看到以共享模式运行 Windows Media Player（也称为 WMP）的 PC 外，你还将看到网络上的其他 DLNA 服务器，可能包括 NAS
    设备、Sonos 设备和其他媒体服务器。


    **信息**

    DLNA 基于另一标准：通用即插即用音视频（UPnP AV）。一些制造商生产的 UPnP 设备完全符合 DLNA 标准，但由于涉及许可费用，而不愿称之为 DLNA。这意味着，虽然不能保证，但许多
    UPnP AV 设备可以完美地与 Windows 10 的 DLNA 功能配合使用。


    如果未看到任何共享库，则可能是其他 PC 未正确配置，或者你当前连接的网络处于“公共”模式，这意味着它将无法浏览和连接到其他设备。请参阅上一章了解如何将网络更改为“专用”模式。


    当 Windows Media Player 显示远程设备后，单击你要连接的设备，然后 Windows Media Player 将为你提供选项（图 5-2），从其他
    PC 中选择音乐、视频、图片，以及可选的“录制的电视”或“播放列表”。

    ![A978-1-4842-1473-2_5_Fig2_HTML.jpg](img/A978-1-4842-1473-2_5_Fig2_HTML.jpg)

    图 5-2. 来自网络 WMP 库的内容文件夹

    '
- fmt: "### Streaming Music\n\nTo listen to music, just double-click (or double-tap\
    \ a touchscreen) the `Music` icon. `Media Player` will connect to the remote server\
    \ and display icons for browsing the music. The views are dependent on the server\
    \ setup; if you are connecting to a PC running `Windows Media Player`, you will\
    \ typically see some of these options: `Artist`, `Album`, `All Music`, `Genre`,\
    \ `Year`, `Rating`, `Contributing Artist`, `Composer`, `Parental rating`, `Online\
    \ Stores`, and `Folders` (Figure [5-3](#A978-1-4842-1473-2_5_Chapter.html#Fig3)).\n\
    \n![A978-1-4842-1473-2_5_Fig3_HTML.jpg](A978-1-4842-1473-2_5_Fig3_HTML.jpg)\n\n\
    Figure 5-3. Music folders from a networked WMP library\n\nAll these options show\
    \ you different views of the same content, so whichever view you select, you will\
    \ get access to the same music.\n\nClick the `Album` icon to view all the music\
    \ stored on the remote PC by album in alphabetical order. To listen to an album,\
    \ double-click it, and `Windows Media Player` will list all the tracks; double-click\
    \ the first track, and `Windows Media Player` will play the songs.\n\nWhile playing\
    \ music at the bottom of the screen (see Figure [5-2](#A978-1-4842-1473-2_5_Chapter.html#Fig2)),\
    \ you have the \"Now Playing\" controls. These include buttons to pause the playback\
    \ and control the volume. Also, on the \"Now Playing\" bar, you have a `Shuffle`\
    \ button, which if selected will play the current music selection in a random\
    \ order. The other button is a `Repeat` button; if it’s selected, the app will\
    \ start playing the current song selection again after the current selection has\
    \ played.\n\nAt any time you can go back to the previous view using the `Back`\
    \ button on the top left of the app.\n\nIf you right-click an album, artist, or\
    \ song, you have these options: `Play All`, `Play`, `Play Next`, `Cast to Device`,\
    \ `Add to`, and `Properties`.\n\n`Play All` plays all the songs in the current\
    \ list, so if it’s an album, it will play all the tracks in the album; if it’s\
    \ an artist, it will play all the songs from the selected artist.\n\nThe `Play`\
    \ option just plays the selected song. `Play Next` plays the selected song after\
    \ the current one has finished.\n\n`Cast to Device` is something you will look\
    \ later in this chapter and is a way of playing the song on another device in\
    \ your network, such as `Xbox One`.\n\nThe `Add To` option gives you the option\
    \ of adding the song to a playlist (see [Chapter 1](#A978-1-4842-1473-2_1_Chapter.html)\
    \ for more information on playlists).\n\nThe final option is `Properties`, which\
    \ gives you some information about the song.\n\n### Streaming Video\n\nPlaying\
    \ videos is similar to playing music. From `Windows Media Player`’s list of remote\
    \ servers, click the device containing the video you want to watch and then double-click\
    \ the `Videos` button. As with music, there are various views for video content,\
    \ and it is dependent on the way the server is configured. Generally, there will\
    \ be an `All Videos` view, which shows you all the videos on the remote machine;\
    \ there could also be views such as `Actor`, `Genre`, `Rating`, and `Folders`.\n\
    \nDouble-click a view, and `Windows Media Player` will list the videos stored\
    \ on the remote PC.\n\n> **Note:** If there is a lot of content on the server,\
    \ the list may take some time to show up.\n\nTo play a video, just double-click\
    \ it, and the video will start playing. As with music playback, when you play\
    \ a video, you will see the \"Now Playing\" controls at the bottom of the screen.\
    \ There is a `Pause/Play` button, and there are `Previous` and `Next` buttons,\
    \ volume controls, `Shuffle`, and `Repeat` buttons.\n\nAlso in the video mode\
    \ is a full-screen button, which you can select to play the video full-screen.\
    \ To exit the app, click the red `X` at the top right of the app; to exit full-screen\
    \ and return to the media browser, click the `Back` button at the top right of\
    \ the screen.\n\nWhen you are browsing videos in `Windows Media Player`, right-clicking\
    \ a video will display a pop-up menu. You get options to do the following:\n\n\
    *   `Play All` plays all the videos in the section.\n*   `Play` plays the currently\
    \ selected video.\n*   `Play Next` plays the selected video after the current\
    \ video has finished.\n*   `Cast to Device` enables you to play a video on another\
    \ device on your network.\n*   `Add To` adds the file to a playlist.\n\n## Streaming\
    \ to a Windows 10 Phone\n\nTo stream media from a DLNA server on your home network\
    \ to your phone running Windows 10, you will need to use a third-party app. There\
    \ is a good selection of DLNA apps in the `Windows Store`, and in this section,\
    \ you will see how to use a free app available from the `Windows Store` on your\
    \ phone called `Smart Player`.\n\nThe `Smart Player` app is split into three sections:\
    \ `Sources`, `Players`, and `Playlists`. You can swipe left or right to change\
    \ sections.\n\nIn the `Sources` (Figure [5-4](#A978-1-4842-1473-2_5_Chapter.html#Fig4))\
    \ section, you will see a list of media sources including web sites such as `Google`\
    \ and `YouTube` as well as DLNA media servers on your home network. Tap the server\
    \ that contains your media, and you will see `Video`, `Music`, and `Photos` folders.\n\
    \n![A978-1-4842-1473-2_5_Fig4_HTML.jpg](A978-1-4842-1473-2_5_Fig4_HTML.jpg)\n\n\
    Figure 5-4. Smart Player sources\n\nTo play videos, follow these steps:\n\n1.\
    \  Select the `Videos` folder, and the app will list video folders on the server.\n\
    \    > **Note:** The list is dependent on the way the media server has been set\
    \ up, so each server’s folder list may vary.\n2.  Tap a folder, and the app will\
    \ list videos in the folder.\n3.  Tap a file, and the app will list available\
    \ media players on your network (Figure [5-5](#A978-1-4842-1473-2_5_Chapter.html#Fig5)).\n\
    \n![A978-1-4842-1473-2_5_Fig5_HTML.jpg](A978-1-4842-1473-2_5_Fig5_HTML.jpg)\n\n\
    Figure 5-5. Device selection in Smart Player\n\n4.  Normally your phone will be\
    \ at the top of the list (Figure [5-5](#A978-1-4842-1473-2_5_Chapter.html#Fig5)),\
    \ so tap it, and then the video will start streaming to your phone.\n\n`Smart\
    \ Player` uses the Windows 10 `Movies & TV` app to play the video, so you get\
    \ the same options as you do when playing video files stored on your phone. To\
    \ go back to the app, tap the `Back` button.\n\nPlaying music works the same way\
    \ as videos; you start in the `Sources` section of the app and select the server\
    \ containing your music. Then select the `Music` folder, and the app will list\
    \ the folders containing music (Figure [5-6](#A978-1-4842-1473-2_5_Chapter.html#Fig6))\
    \ on the remote server. The folder list will depend on the setup of the server,\
    \ but you typically get `Albums`, `Artists`, `Folders`, and `All Music` folders.\
    \ If you select the `Albums` folder, the app will list all the albums on the remote\
    \ server; if you select `Artists`, it will list all the artists on the server.\n\
    \n![A978-1-4842-1473-2_5_Fig6_HTML.jpg](A978-1-4842-1473-2_5_Fig6_HTML.jpg)\n\n\
    Figure 5-6. Folders in Smart Player Playlists\n\nWhen you tap a folder containing\
    \ music, it will list the songs in the folder. Tap a file, and it will ask which\
    \ player you want to listen to the music on.\n\nHere you can select the top option,\
    \ which will be your phone, or you could select another media player on your home\
    \ network.\n\nIf you tap and hold on a folder that contains music, you have the\
    \ options of playing all the music in the folder and adding the music to a playlist.\n\
    \nWhen you are playing music, the app has `Previous` and `Next` track buttons,\
    \ `Play/Pause` buttons, and volume controls.\n\nPress the `Home` button to go\
    \ back to the `Sources` section of the app.\n\n> **Tip:** There are other DLNA\
    \ apps for Windows 10 mobile available in the `Windows Store`; try searching for\
    \ `DLNA` in the store.\n\n## Using Cast To to stream to DLNA Devices\n\nWindows\
    \ 10 has DLNA (media streaming) built into it, so from a PC, you can select a\
    \ music or video file and send it to another DLNA device on your home network.\
    \ DLNA-compatible devices include `Xbox One`, `Sonos` music players, Windows PCs,\
    \ and smart TVs.\n\nThere are two ways of streaming with Windows 10; you can use\
    \ `Cast To` in `Windows Media Player`, or you can also use it directly from `File\
    \ Explorer`."
  raw: '### Streaming Music


    To listen to music, just double-click (or double-tap a touchscreen) the Music
    icon. Media Player will connect to the remote server and display icons for browsing
    the music. The views are dependent on the server setup; if you are connecting
    to a PC running Windows Media Player, you will typically see some of these options:
    Artist, Album, All Music, Genre, Year, Rating, Contributing Artist, Composer,
    Parental rating, Online Stores, and Folders (Figure [5-3](#A978-1-4842-1473-2_5_Chapter.html#Fig3)).


    ![A978-1-4842-1473-2_5_Fig3_HTML.jpg](A978-1-4842-1473-2_5_Fig3_HTML.jpg)


    Figure 5-3.


    Music folders from a networked WMP library


    All these options show you different views of the same content, so whichever view
    you select, you will get access to the same music.


    Click the Album icon to view all the music stored on the remote PC by album in
    alphabetical order. To listen to an album, double-click it, and Windows Media
    Player will list all the tracks; double-click the first track, and Windows Media
    Player will play the songs.


    While playing music at the bottom of the screen (see Figure [5-2](#A978-1-4842-1473-2_5_Chapter.html#Fig2)),
    you have the “Now Playing” controls. These include buttons to pause the playback
    and control the volume. Also, on the “Now Playing” bar, you have a Shuffle button,
    which if selected will play the current music selection in a random order. The
    other button is a Repeat button; if it’s selected, the app will start playing
    the current song selection again after the current selection has played.


    At any time you can go back to the previous view using the Back button on the
    top left of the app.


    If you right-click an album, artist, or song, you have these options: Play All,
    Play, Play Next, Cast to Device, Add to, and Properties.


    Play All plays all the songs in the current list, so if it’s an album, it will
    play all the tracks in the album; if it’s an artist, it will play all the songs
    from the selected artist.


    The Play option just plays the selected song. Play Next plays the selected song
    after the current one has finished.


    Cast to Device is something you will look later in this chapter and is a way of
    playing the song on another device in your network, such as Xbox One.


    The Add To option gives you the option of adding the song to a playlist (see [Chapter
    1](#A978-1-4842-1473-2_1_Chapter.html) for more information on playlists).


    The final option is Properties, which gives you some information about the song.


    ### Streaming Video


    Playing videos is similar to playing music. From Windows Media Player’s list of
    remote servers, click the device containing the video you want to watch and then
    double-click the Videos button. As with music, there are various views for video
    content, and it is dependent on the way the server is configured. Generally, there
    will be an All Videos view, which shows you all the videos on the remote machine;
    there could also be views such as Actor, Genre, Rating, and Folders.


    Double-click a view, and Windows Media Player will list the videos stored on the
    remote PC.


    Note


    If there is a lot of content on the server, the list may take some time to show
    up.


    To play a video, just double-click it, and the video will start playing. As with
    music playback, when you play a video, you will see the “Now Playing” controls
    at the bottom of the screen. There is a Pause/Play button, and there are Previous
    and Next buttons, volume controls, Shuffle, and Repeat buttons.


    Also in the video mode is a full-screen button, which you can select to play the
    video full-screen. To exit the app, click the red X at the top right of the app;
    to exit full-screen and return to the media browser, click the Back button at
    the top right of the screen.


    When you are browsing videos in Windows Media Player, right-clicking a video will
    display a pop-up menu. You get options to do the following:


    *   Play All plays all the videos in the section.

    *   Play plays the currently selected video.

    *   Play Next plays the selected video after the current video has finished.


    Cast to Device enables you to play a video on another device on your network,
    and Add To adds the file to a playlist.


    ## Streaming to a Windows 10 Phone


    To stream media from a DLNA server on your home network to your phone running
    Windows 10, you will need to use a third-party app. There is a good selection
    of DLNA apps in the Windows Store, and in this section, you will see how to use
    a free app available from the Windows Store on your phone called Smart Player.


    The Smart Player app is split into three sections: Sources, Players, and Playlists.
    You can swipe left or right to change sections.


    In the Sources (Figure [5-4](#A978-1-4842-1473-2_5_Chapter.html#Fig4)) section,
    you will see a list of media sources including web sites such as Google and YouTube
    as well as DLNA media servers on your home network. Tap the server that contains
    your media, and you will see Video, Music, and Photos folders.


    ![A978-1-4842-1473-2_5_Fig4_HTML.jpg](A978-1-4842-1473-2_5_Fig4_HTML.jpg)


    Figure 5-4.


    Smart Player sources


    To play videos, follow these steps:


    Select the Videos folder, and the app will list video folders on the server. Note
    The list is dependent on the way the media server has been set up, so each server’s
    folder list may vary.   Tap a folder, and the app will list videos in the folder.
      Tap a file, and the app will list available media players on your network (Figure
    [5-5](#A978-1-4842-1473-2_5_Chapter.html#Fig5)).


    ![A978-1-4842-1473-2_5_Fig5_HTML.jpg](A978-1-4842-1473-2_5_Fig5_HTML.jpg)


    Figure 5-5.


    Device selection in Smart Player   Normally your phone will be at the top of the
    list (Figure [5-5](#A978-1-4842-1473-2_5_Chapter.html#Fig5)), so tap it, and then
    the video will start streaming to your phone.  


    Smart Player uses the Windows 10 Movies & TV app to play the video, so you get
    the same options as you do when playing video files stored on your phone. To go
    back to the app, tap the Back button.


    Playing music works the same way as videos; you start in the Sources section of
    the app and select the server containing your music. Then select the Music folder,
    and the app will list the folders containing music (Figure [5-6](#A978-1-4842-1473-2_5_Chapter.html#Fig6))
    on the remote server. The folder list will depend on the setup of the server,
    but you typically get Albums, Artists, Folders, and All Music folders. If you
    select the Albums folder, the app will list all the albums on the remote server;
    if you select Artists, it will list all the artists on the server.


    ![A978-1-4842-1473-2_5_Fig6_HTML.jpg](A978-1-4842-1473-2_5_Fig6_HTML.jpg)


    Figure 5-6.


    Folders in Smart Player Playlists


    When you tap a folder containing music, it will list the songs in the folder.
    Tap a file, and it will ask which player you want to listen to the music on.


    Here you can select the top option, which will be your phone, or you could select
    another media player on your home network.


    If you tap and hold on a folder that contains music, you have the options of playing
    all the music in the folder and adding the music to a playlist.


    When you are playing music, the app has Previous and Next track buttons, Play/Pause
    buttons, and volume controls.


    Press the Home button to go back to the Sources section of the app.


    Tip


    There are other DLNA apps for Windows 10 mobile available in the Windows Store;
    try searching for DLNA in the store.


    ## Using Cast To to stream to DLNA Devices


    Windows 10 has DLNA (media streaming) built into it, so from a PC, you can select
    a music or video file and send it to another DLNA device on your home network.
    DLNA-compatible devices include Xbox One, Sonos music players, Windows PCs, and
    smart TVs.


    There are two ways of streaming with Windows 10; you can use Cast To in Windows
    Media Player, or you can also use it directly from File Explorer.'
  trans: "\n### 流媒体音乐\n\n要收听音乐，只需双击（或在触摸屏上双击）`Music` 图标。`Media Player` 将连接到远程服务器，并显示用于浏览音乐的图标。视图取决于服务器的配置；如果你连接到运行\
    \ `Windows Media Player` 的电脑，通常会看到以下部分选项：`Artist`（艺术家）、`Album`（专辑）、`All Music`（所有音乐）、`Genre`（流派）、`Year`（年份）、`Rating`（评级）、`Contributing\
    \ Artist`（参与艺术家）、`Composer`（作曲家）、`Parental rating`（家长评级）、`Online Stores`（在线商店）和\
    \ `Folders`（文件夹）（图 5-3）。\n\n![A978-1-4842-1473-2_5_Fig3_HTML.jpg](img/A978-1-4842-1473-2_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 来自网络化 WMP 库的音乐文件夹\n\n所有这些选项展示了相同内容的不同视图，因此无论你选择哪个视图，都可以访问相同的音乐。\n\n点击\
    \ `Album`（专辑）图标，即可按字母顺序查看远程电脑上存储的所有音乐专辑。要收听专辑，请双击它，`Windows Media Player` 将列出所有曲目；双击第一首曲目，`Windows\
    \ Media Player` 将开始播放歌曲。\n\n在屏幕底部播放音乐时（见图 5-2），你会看到“正在播放”控件。这些控件包括暂停播放和调节音量的按钮。此外，在“正在播放”栏上，还有一个\
    \ `Shuffle`（随机播放）按钮，选中后将以随机顺序播放当前音乐选择。另一个按钮是 `Repeat`（重复播放）按钮；如果选中它，应用程序将在当前选择播放完毕后重新开始播放。\n\
    \n你可以随时使用应用程序左上角的 `Back`（返回）按钮返回上一个视图。\n\n如果你右键单击专辑、艺术家或歌曲，将看到以下选项：`Play All`（全部播放）、`Play`（播放）、`Play\
    \ Next`（下一首播放）、`Cast to Device`（投射到设备）、`Add to`（添加到）和 `Properties`（属性）。\n\n`Play\
    \ All`（全部播放）会播放当前列表中的所有歌曲，因此如果选择的是专辑，它将播放该专辑中的所有曲目；如果选择的是艺术家，它将播放该艺术家所有的歌曲。\n\n\
    `Play`（播放）选项仅播放选定的歌曲。`Play Next`（下一首播放）会在当前歌曲播放完毕后播放选定的歌曲。\n\n`Cast to Device`（投射到设备）是你将在本章后面了解的内容，它是一种在网络上其他设备（例如\
    \ `Xbox One`）上播放歌曲的方式。\n\n`Add To`（添加到）选项用于将歌曲添加到播放列表（有关播放列表的更多信息，请参见第 1 章）。\n\
    \n最后一个选项是 `Properties`（属性），它提供有关歌曲的一些信息。\n\n### 流媒体视频\n\n播放视频与播放音乐类似。从 `Windows\
    \ Media Player` 的远程服务器列表中，点击包含你要观看的视频的设备，然后双击 `Videos`（视频）按钮。与音乐一样，视频内容也有多种视图，这取决于服务器的配置方式。通常，会有一个\
    \ `All Videos`（所有视频）视图，显示远程机器上的所有视频；也可能有 `Actor`（演员）、`Genre`（流派）、`Rating`（评级）和\
    \ `Folders`（文件夹）等视图。\n\n双击一个视图，`Windows Media Player` 将列出存储在远程电脑上的视频。\n\n> **注意：**\
    \ 如果服务器上有大量内容，列表可能需要一些时间才能显示出来。\n\n要播放视频，只需双击它，视频将开始播放。与音乐播放一样，播放视频时，你会在屏幕底部看到“正在播放”控件。其中有\
    \ `Pause/Play`（暂停/播放）按钮，以及 `Previous`（上一个）和 `Next`（下一个）按钮、音量控制、`Shuffle`（随机播放）和\
    \ `Repeat`（重复）按钮。\n\n在视频模式下还有一个全屏按钮，你可以选择它以全屏播放视频。要退出应用程序，请点击应用程序右上角的红色 `X`；要退出全屏并返回媒体浏览器，请点击屏幕右上方的\
    \ `Back`（返回）按钮。\n\n在 `Windows Media Player` 中浏览视频时，右键单击视频将弹出一个菜单。你可以使用以下选项：\n\n\
    *   `Play All`（全部播放）播放该部分中的所有视频。\n*   `Play`（播放）播放当前选定的视频。\n*   `Play Next`（下一首播放）在当前视频播放完毕后播放选定的视频。\n\
    *   `Cast to Device`（投射到设备）使你能够在网络上的另一个设备上播放视频。\n*   `Add To`（添加到）将文件添加到播放列表。\n\
    \n## 流式传输到 Windows 10 手机\n\n要从家庭网络上的 DLNA 服务器将媒体流式传输到运行 Windows 10 的手机，你需要使用第三方应用程序。`Windows\
    \ Store` 中有很多优秀的 DLNA 应用程序，在本节中，你将了解如何使用手机上 `Windows Store` 提供的一个名为 `Smart Player`\
    \ 的免费应用程序。\n\n`Smart Player` 应用程序分为三个部分：`Sources`（源）、`Players`（播放器）和 `Playlists`（播放列表）。你可以向左或向右滑动来切换部分。\n\
    \n在 `Sources`（源）（图 5-4）部分，你会看到一个媒体源列表，包括 `Google` 和 `YouTube` 等网站，以及家庭网络上的 DLNA\
    \ 媒体服务器。点击包含你的媒体的服务器，你将看到 `Video`（视频）、`Music`（音乐）和 `Photos`（照片）文件夹。\n\n![A978-1-4842-1473-2_5_Fig4_HTML.jpg](img/A978-1-4842-1473-2_5_Fig4_HTML.jpg)\n\
    \n图 5-4. Smart Player 源\n\n要播放视频，请按照以下步骤操作：\n\n1.  选择 `Videos`（视频）文件夹，应用程序将列出服务器上的视频文件夹。\n\
    \    > **注意：** 列表取决于媒体服务器的设置方式，因此每个服务器的文件夹列表可能有所不同。\n2.  点击一个文件夹，应用程序将列出该文件夹中的视频。\n\
    3.  点击一个文件，应用程序将列出网络上可用的媒体播放器（图 5-5）。\n\n![A978-1-4842-1473-2_5_Fig5_HTML.jpg](img/A978-1-4842-1473-2_5_Fig5_HTML.jpg)\n\
    \n图 5-5. 在 Smart Player 中选择设备\n\n4.  通常你的手机会出现在列表顶部（图 5-5），所以点击它，然后视频将开始流式传输到你的手机。\n\
    \n`Smart Player` 使用 Windows 10 的 `Movies & TV`（电影和电视）应用程序来播放视频，因此你可以获得与播放存储在手机上的视频文件时相同的选项。要返回应用程序，请点击\
    \ `Back`（返回）按钮。\n\n播放音乐的方式与视频相同；你从应用程序的 `Sources`（源）部分开始，选择包含你的音乐的服务器。然后选择 `Music`（音乐）文件夹，应用程序将列出远程服务器上包含音乐的文件夹（图\
    \ 5-6）。文件夹列表取决于服务器的设置，但通常会得到 `Albums`（专辑）、`Artists`（艺术家）、`Folders`（文件夹）和 `All\
    \ Music`（所有音乐）文件夹。如果你选择 `Albums`（专辑）文件夹，应用程序将列出远程服务器上的所有专辑；如果你选择 `Artists`（艺术家），它将列出服务器上的所有艺术家。\n\
    \n![A978-1-4842-1473-2_5_Fig6_HTML.jpg](img/A978-1-4842-1473-2_5_Fig6_HTML.jpg)\n\
    \n图 5-6. Smart Player 播放列表中的文件夹\n\n当你点击一个包含音乐的文件夹时，它会列出该文件夹中的歌曲。点击一个文件，它会询问你想在哪个播放器上收听音乐。\n\
    \n在这里，你可以选择顶部的选项（通常是你的手机），或者选择家庭网络上的其他媒体播放器。\n\n如果你长按一个包含音乐的文件夹，可以选择播放该文件夹中的所有音乐，或将音乐添加到播放列表。\n\
    \n播放音乐时，应用程序具有 `Previous`（上一首）和 `Next`（下一首）曲目按钮、`Play/Pause`（播放/暂停）按钮以及音量控制。\n\
    \n按 `Home`（主页）按钮返回应用程序的 `Sources`（源）部分。\n\n> **提示：** `Windows Store` 中还有其他适用于\
    \ Windows 10 移动版的 DLNA 应用程序；请在商店中搜索 `DLNA`。\n\n## 使用 Cast To 流式传输到 DLNA 设备\n\n\
    Windows 10 内置了 DLNA（媒体流式传输）功能，因此你可以从电脑上选择音乐或视频文件，并将其发送到家庭网络上的其他 DLNA 设备。兼容 DLNA\
    \ 的设备包括 `Xbox One`、`Sonos` 音乐播放器、Windows 电脑和智能电视。\n\n使用 Windows 10 进行流式传输有两种方式：你可以在\
    \ `Windows Media Player` 中使用 `Cast To`（投射到），也可以直接从 `File Explorer`（文件资源管理器）中使用它。\n"
- fmt: '### In File Explorer


    With File Explorer, you can browse your PC’s file system or network drives. Right-click
    (or tap and hold on a tablet) a music or video file, and you will see a `Cast
    to Device` option in the context menu. You can also right-click a folder containing
    music and select `Cast to Device`, which will play all the media in the folder
    on the remote device.


    When you select `Cast to Device`, a pop-up list is populated with DLNA-compatible
    players on your network (Figure [5-7](#A978-1-4842-1473-2_5_Chapter.html#Fig7)).
    This can include smart TVs, media players, and game consoles.


    ![A978-1-4842-1473-2_5_Fig7_HTML.jpg](A978-1-4842-1473-2_5_Fig7_HTML.jpg)


    Figure 5-7. Cast To in File Explorer


    Select the device you want to play the media on, and Windows will stream the music
    or video file to the selected device. It will then display the media playback
    controls where you can stop or pause the playback and control the volume of the
    remote device. Also in the media window it will show you the current playlist
    on the remote player.


    ### In Windows Media Player


    You can stream music and video to a remote device with Windows Media Player. Using
    Windows Media Player, browse through your media collection. When you find the
    album, song, artist, playlist, or video you want to play on the remote system,
    right-click it and select `Cast to Device`. Just like using the option via File
    Explorer, a menu will show available media players on your network. Select the
    device you want to stream to, and it will start playing the content on the selected
    device. Just as when you stream from File Explorer, the media transport controls
    will be displayed and you can stop, pause, and control the volume of the playback.


    ### Windows Media Player as a Media Receiver


    As well as streaming music and video to DLNA devices on your home network, you
    can configure Windows Media Player to act as a remote player so that you can stream
    music and video files to a PC on your home network.


    To enable Windows Media Player to work as a media receiver, load the app, click
    the `Stream` menu item, and select `Allow remote control of my Player`. This will
    bring up a streaming dialog box (Figure [5-8](#A978-1-4842-1473-2_5_Chapter.html#Fig8)).
    Select `Allow remote control of my Player`, and Windows Media Player will ask
    you to confirm you want to allow remote control. Select the button that says `Allow
    remote control on this network`, which will configure Media Player. You will then
    be able to stream media to the app.


    ![A978-1-4842-1473-2_5_Fig8_HTML.jpg](A978-1-4842-1473-2_5_Fig8_HTML.jpg)


    Figure 5-8. Remote control of Windows Media Player


    You can test streaming by going to another PC on your network and using Windows
    Media Player to cast to your Windows 10 PC as described earlier in this chapter.


    ### Streaming from a Windows 10 Phone


    On the phone version of Windows 10, there are a couple of ways of sending video
    from the phone to another device on your network.


    To stream videos to a DLNA-enabled device, you can use the `Movies & TV` app that
    comes with Windows 10 Mobile. You will take a look at that in the next section.
    In this section, you will use another app called `Lumia Play To`, which is a free
    download from the Windows Store.


    Microsoft’s `Lumia Play To` app (Figure [5-9](#A978-1-4842-1473-2_5_Chapter.html#Fig9))
    can send music and video from the phone to a DLNA-enabled device like Xbox One
    or a smart TV.


    ![A978-1-4842-1473-2_5_Fig9_HTML.jpg](A978-1-4842-1473-2_5_Fig9_HTML.jpg)


    Figure 5-9. Lumia Play To app Caution


    The `Lumia Play To` app will not play content purchased from the Windows Store.
    If you want to stream videos purchased from the store, you need to do it from
    the `Movies & TV` app; see the next section of this chapter.


    Go to the Windows Store, search for `Lumia Play To`, and then download the app
    to your phone.


    Run the app, and you will be presented with three options: photos, videos, and
    music (Figure [5-9](#A978-1-4842-1473-2_5_Chapter.html#Fig9)).


    To stream video, tap the `Videos` button. The app will list videos stored on your
    phone. Tap the video, and it will bring up a list of devices on your home network
    that it can stream to (Figure [5-10](#A978-1-4842-1473-2_5_Chapter.html#Fig10)).


    ![A978-1-4842-1473-2_5_Fig10_HTML.jpg](A978-1-4842-1473-2_5_Fig10_HTML.jpg)


    Figure 5-10. Devices you can stream to in Lumia Play To


    Once you have selected a device, the video will start playing on the remote device.
    The phone will show you the current playback position of the video, and you can
    pause the playback from the transport controls on the bottom of the screen.


    To change the device you are currently connected to, tap the icon with three dots,
    and a pop-up menu will be displayed. Tap `Connect`, and you can pick a different
    device to stream to (Figure [5-11](#A978-1-4842-1473-2_5_Chapter.html#Fig11)).


    ![A978-1-4842-1473-2_5_Fig11_HTML.jpg](A978-1-4842-1473-2_5_Fig11_HTML.jpg)


    Figure 5-11. Streaming options in Lumia Play To


    You can also stream music with the app; just tap the `music` button on the first
    screen of the app. The app will display your music collection by artist. Swipe
    left to display it by album, and swipe left again to view it by song. If you swipe
    again, you will be back at the Artist view.


    Tapping an album or artist will show the songs. Tap the `Play` icon, and the app
    will ask which device you want to stream to. Click the device, and it will start
    playing the song. You can pause the playback of a song using the transport controls
    on the screen.


    ### Cast To Using Movies & TV App


    Another Windows 10 app capable of steaming videos is the `Movies & TV` app covered
    in [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html). With the `Movies & TV` app,
    you can browse your video collection (see [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html)
    for how to find your videos), and then you start playing the video.


    **Information**: The name of the `Movies & TV` app changes depending on the country
    of the user. In some English-speaking countries, it is known as `Film & TV`.


    Once the video is playing, it will bring up the `Now Playing` controls. From this
    screen, you will see a `Cast to Device` icon located at the bottom left of the
    app (Figures [5-12](#A978-1-4842-1473-2_5_Chapter.html#Fig12) and [5-13](#A978-1-4842-1473-2_5_Chapter.html#Fig13)).


    - Click or tap this icon, and you will see a list of media streamers or Miracast
    devices on your network that can receive the video.

    - Click the device you want to stream to, and the app will connect to the device
    and start video playback on it.


    ![A978-1-4842-1473-2_5_Fig13_HTML.jpg](A978-1-4842-1473-2_5_Fig13_HTML.jpg)


    Figure 5-13. Cast to Device icon


    ![A978-1-4842-1473-2_5_Fig12_HTML.jpg](A978-1-4842-1473-2_5_Fig12_HTML.jpg)


    Figure 5-12. Now Playing screen in Movies & TV app Information


    **Information**: Miracast is a technology that allows the streaming of video over
    a direct Wi-Fi connection. To use it as an option, your PC/phone must be Miracast
    compatible, and you must have a Miracast-compatible receiver.


    You can pause playback and skip to any part of the video using the `Now Playing`
    controls at the bottom of the screen. To go back to the `Movies & TV` app, click
    the `Back` button in the app (if you are in tablet mode, swipe down on the title
    bar at the top of the screen and then tap the `Back` button).


    ## Summary


    In this chapter, you looked at how to stream your media on your home network to
    DLNA devices and other PCs using Windows Media Player and also started to look
    at how third-party software can help with streaming, in particular from a Windows
    phone. In the next chapter, you will look further at third-party software that
    will help if you want a bit more control over your sharing or want to stream to
    non-PC devices such as TVs and network media players.'
