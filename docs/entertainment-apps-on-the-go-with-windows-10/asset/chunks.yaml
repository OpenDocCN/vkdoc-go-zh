  trans: '

    ### 在 Windows 10 移动版上使用 Emby


    除了适用于 Windows 10 电脑的 `Emby` 应用外，还有一个专门为手机设计的 `Emby` 应用。


    您可以在手机的 Windows 商店中搜索 `Emby` 找到该应用。该应用可免费试用，但要完全使用，需要应用内购买以解锁所有功能（试用版每天只能播放一个视频）。


    首次打开应用时，您可以使用 `Emby` 帐户登录。这将使应用能够自动连接到您的 `Emby` 服务器。


    连接成功后，应用会将内容分为音乐、电视节目和电影等部分（图 6-30）。


    ![A978-1-4842-1473-2_6_Fig30_HTML.jpg](img/A978-1-4842-1473-2_6_Fig30_HTML.jpg)


    图 6-30.


    Windows 10 移动版上的 Emby


    #### 播放电影


    要播放电影，请从应用的主屏幕点按 `Movies`（电影）部分（图 6-30）。应用将列出您最近添加到服务器的最新电影。如果您向右滑动，它将按字母顺序列出您的电影。再次向右滑动，将列出您的电影套装合集。再向右滑动一次可查看电影类型，然后再次向右滑动可返回最新的部分。


    点按一部电影，将弹出电影信息页面。如果您向右滑动，将看到电影的概述，包括来自 IMDB 的电影评级。再次向右滑动可查看演员信息。


    在“电影信息”页面上，您将看到一个 `Add to Favorites`（添加到收藏）按钮和一个 `Play To`（播放至）按钮。


    `Play To`（播放至）按钮使您能够将电影从 `Emby` 服务器流式传输到网络上的另一个 `Emby` 客户端或 `DLNA` 设备（如 Xbox One
    或智能电视）。


    当您点按 `Play To`（播放至）按钮时，它会搜索您网络上的 `Emby` 应用和 `DLNA` 设备。点按您想要播放电影的设备，`Emby` 将开始在远程设备上播放。一旦开始流式传输，应用将变为远程播放器的遥控器。您可以暂停播放并控制远程设备的音量（如果设备支持该功能）。


    要在您的手机上播放电影，只需点按电影图片上的 `Play`（播放）按钮即可。


    #### 播放电视节目


    应用的电视功能与电影部分非常相似，但它会将电视剧集按季整理。当您进入电视部分时，应用将显示准备好播放的下一个电视节目。向右滑动将显示您的电视合集。点按您想看的节目，应用将列出该节目的各季。点按某一季，它将显示该季的剧集。已观看的剧集上会有一个复选标记，表示它们已被看过。


    点按一集以显示该集的相关信息。与电影一样，在查看剧集时，您可以使用 `Play To`（播放至）按钮在远程设备上播放视频。


    点击 `Play`（播放）按钮开始观看电视节目。当剧集正在播放时，点按屏幕以调出“正在播放”控件。您可以暂停或恢复播放，并且可以使用进度条控制跳转到视频的特定部分。


    #### 播放音乐


    使用 `Emby`，您可以将音乐从服务器串流到您的手机。首先，点按 `Emby` 起始页面上的 `Music`（音乐）部分。


    它将按艺术家列出您的音乐；向右滑动可将其更改为按专辑查看，再向右滑动一次可更改为按歌曲查看。


    在 `Artists`（艺术家）视图中，应用按字母顺序列出艺术家，您可以通过点按艺术家的名字来查看他们的专辑。


    然后，应用将列出所选艺术家的专辑；点按专辑封面上的 `Play`（播放）按钮，它将开始播放。


    在 `Artists`（艺术家）视图中，向右滑动可查看该艺术家的单首歌曲；再次向右滑动可阅读艺术家的简介。


    与电影和电视节目一样，您可以使用屏幕底部的 `Play To`（播放至）按钮将音乐发送到家庭网络上的另一个 `Emby` 客户端或 `DLNA` 设备。点按该按钮，它将调出家庭网络上的
    `DLNA` 设备和 `Emby` 客户端列表。点按您想要播放的设备；内容将开始在远程设备上播放。


    > **提示**

    >

    > 这里还有一些我们未能涵盖的、非常值得一看的其他功能。请访问 [`http://emby.media`](http://emby.media/) 获取更多详细信息。


    ### 使用网页浏览器使用 Emby


    除了适用于 Windows 10 的 `Emby` 应用外，您还可以免费使用网页浏览器使用 `Emby`，无需在电脑上安装任何东西。


    在网页浏览器中，您需要输入运行 `Emby Server` 的电脑的 IP 地址，后跟 `Emby Server` 正在运行的端口。与其试图找出您的 IP
    地址和服务器运行的端口，不如通过您的 `Emby` 帐户找到它。


    从网页浏览器，访问 [`http://Emby.media`](http://emby.media/)。点击 `Sign In`（登录）并输入您的 `Emby`
    用户名和密码。点击 `Sign In`（登录）按钮。点击您的 `Emby` 电脑。


    您将看到基于网页的 `Emby` 客户端版本，您可以使用它浏览您的媒体收藏并通过浏览器播放。


    > **提示**

    >

    > 这是一种无需在您的电脑上进行任何设置即可访问您的媒体的简便方法。


    `Emby` 拥有我们在此没有提到的许多功能，非常值得研究。它可以流式传输直播电视，可以与 Windows Media Center（在 Windows 7
    和 8 上）及其他媒体平台（如 `Kodi`）集成，并且拥有一个非常活跃的社区。请访问 [`http://emby.media`](http://emby.media/)
    获取更多信息并加入社区以更深入地参与。


    ## 其他平台上配置媒体服务器的资源


    在本章中，您了解了 Plex Media Server 和 Emby Server，它们是功能强大的媒体服务器，也拥有适用于包括 Windows 10 在内的许多不同平台的客户端应用。在本节中，我们将简要介绍另外两种媒体服务器，它们没有专门的
    Windows 10 客户端，但可以在 Windows 10 和许多其他平台上运行。它们绝对值得一看。它们是 `Kodi` 和 `MediaPortal`。


    ### Kodi


    `Kodi` 是一个开源媒体服务器项目，以前称为 Xbox Media Center。它最初是为初代 Xbox 设计的媒体解决方案，现已发展成为一个流行的系统。`Kodi`
    可以安装在包括 Windows 10 在内的广泛平台上，并具备媒体管理功能、网络串流和社区插件。要了解更多信息，请访问 [`http://Kodi.tv`](http://kodi.tv/)，您可以在那里阅读其功能说明，并找到下载链接。


    ### Media Portal


    `MediaPortal` 是为个人电脑设计的媒体解决方案。与 Plex 和 Emby 这类客户端-服务器系统不同，`MediaPortal` 是一个一体化的媒体系统，您可以将其连接到大屏幕电视或投影仪。它支持直播电视、录制的电视节目、音乐和电影播放，并且拥有大量的可用插件。请访问
    [`www.team-mediaportal.com`](http://www.team-mediaportal.com/) 获取更多详细信息和下载链接。


    ## 总结


    正如您在本章中所见，Windows 拥有广泛、强大且灵活的媒体解决方案，您可以用它们来满足您家中和互联网上的所有媒体需求。哪种解决方案最适合您，将取决于您的具体需求，并且没有任何东西可以阻止您设置多个系统。Ian
    在同一台服务器上安装了 Plex 和 Emby，两者和谐共存。

