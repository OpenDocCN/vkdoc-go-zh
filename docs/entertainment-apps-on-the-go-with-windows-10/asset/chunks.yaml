- fmt: '# How to Subscribe to Podcasts


    Podcasts are Internet-based radio shows that you download and listen to on your
    phone, tablet, or PC. One example of this is The Digital Lifestyle show we record
    weekly.


    The great thing about podcasts is that you subscribe to a show, and then when
    a producer creates a new episode, the podcast app you use will automatically download
    the episode to your device ready for you to listen to (or watch if it’s a video
    podcast) without you have to do anything.


    With Windows 10 there are built-in tools for listening to podcasts as well as
    plenty of third-party apps you can use.


    First let’s take a look at the built-in podcast app for the phone called Podcasts.


    ## On a Windows Phone


    Microsoft maintains a library of podcasts that you can search.


    To get started, you type the name of the podcast you are looking for in the search
    box, and then the app will list matching shows. For example, type `digital lifestyle
    show` in the search box, and the app will list the podcasts called The Digital
    Lifestyle Show.


    You can tap the show name to display information about the show; you then tap
    the plus icon to subscribe the podcast, which means your device will automatically
    download future episodes of the show.


    If the podcast you want is not showing in the search results, you can still subscribe
    by using the show’s RSS feed (RSS stands for Really Simple Syndication, and each
    podcast has a unique RSS feed link, for example `http://thedigitallifestyle.com/podcast.xml`).


    This a special web page that podcast apps use to download shows. Generally each
    podcast producer will have a link to their RSS feed on their web site. To use
    the link with the phone podcast app, follow these steps:


    - Tap and hold the podcast link.

    - Select `Copy Link`, which will then copy the URL to the clipboard.

    - Switch to the `Podcasts` app and tap in the search box.

    - Select the `Paste` button. This will paste the podcast feed into the search
    box.

    - Tap the search button, which will bring up the podcast information page. You
    can then click the `subscribe` button, play the podcast, or view the individual
    episodes.


    **Information**


    Once you have subscribed to a podcast, the app will automatically download the
    shows in the background ready for playing.


    To avoid using up your mobile data allowance in the `Podcasts` app settings, you
    can set the app to download podcasts only over Wi-Fi.


    Now you know it is pretty easy to subscribe to podcasts on a Windows phone, but
    what about on a PC that currently does not have a podcast app? In the next section
    you’ll see a trick for that.


    ## On a Windows PC


    Currently the Microsoft podcast app is available only on Windows Mobile, but do
    not despair. On a PC you can subscribe to podcasts using Apple’s `iTunes` app
    by clicking the `iTunes` link on the podcast provider’s web site (Figure [1-21](#A978-1-4842-1473-2_1_Chapter.html#Fig21)).


    ![A978-1-4842-1473-2_1_Fig21_HTML.jpg](A978-1-4842-1473-2_1_Fig21_HTML.jpg)


    Figure 1-21. Adding a podcast


    When you click the link (Figure [1-22](#A978-1-4842-1473-2_1_Chapter.html#Fig22)),
    it will open `iTunes` where you will then get the podcast information page and
    an option to subscribe to the show. Once you have subscribed, each show will download
    automatically.


    ![A978-1-4842-1473-2_1_Fig22_HTML.jpg](A978-1-4842-1473-2_1_Fig22_HTML.jpg)


    Figure 1-22. Link to adding a podcast in iTunes


    **Information**


    Although currently the official Microsoft podcast app is included only with Windows
    Mobile, there is also a good selection of podcast apps in the Windows Store. Although
    we do not recommend any in particular, we encourage you to do a search and see
    what you find.


    ## Summary


    In this chapter, you looked at how to download, stream, and purchase music on
    a PC; on Windows, Apple, and Android phones; on tablets, and on laptops with Microsoft’s
    Groove music service. You also learned about third-party services, such as Google
    Music, iTunes, and TuneIn Radio, and you learned how to subscribe to podcasts.
    In the next chapter, you’ll start looking at how to get your content onto these
    services.


    # 2. Storing Your Music in the Cloud


    **Information**


    Just prior to the release of Windows 10, Microsoft rebranded its Xbox Music service
    as Groove. You may still see references to it by its old name.


    In the previous chapter, you learned how to play music in Windows 10. In this
    chapter, you will learn how you can store your music so that you can access it
    from just about anywhere. Also in this chapter, for a slight diversion, you will
    look at how you can consume your music on Xbox One.


    Over the years playing your music on the move has been one of the biggest challenges
    facing enthusiasts. When portable music first started being available in electronic
    forms, you stored your music on your PC or Mac and then physically connected the
    device, perhaps an iPod or phone, that you wanted to transfer that music to.


    This was always a slightly cumbersome and time-consuming process. It also relied
    on you knowing you wanted to play certain music on the go. People have always
    wanted to be able to access all their music at any time without having to plan
    for the event.


    One of the really great features of Windows 10 on a PC is that any music you have
    stored on the device can be synced to the cloud for accessing from other Windows
    PCs and phones. In fact, as you saw in Chapter 1, Microsoft also has Groove Music
    apps for iOS and Android. So, you can have your music collection on your PC and
    instantly have it accessible from Windows, Android, and iOS phones and tablets.


    You have a few different options for storing your music in the cloud. Let’s start
    by looking at Microsoft’s free solution.


    **Information**


    Storing music in the cloud can sound mystical, but all it really means is storing
    your data on a service that is accessible anywhere via the Internet. That service,
    be it owned by Microsoft, Google, or even Amazon, may have servers located all
    over the world, and your data may be stored on any one of them (although for privacy
    and efficiency reasons the server is likely to be physically close to your home
    location).


    The point is you do not need to know where it is stored, only that it is accessible
    to you anywhere you are via the Internet.'
