- fmt: '# Setting Up Homegroups


    Windows 7, Windows 8.1, and Windows 10 have a simple networking feature called
    a homegroup. A homegroup is a password-based system where you create a homegroup
    password on one PC on your network and then you join the group on your other PCs,
    laptops, and tablets.


    So, to get started with homegroups on Windows, open `File Explorer` (called `Windows
    Explorer` on Windows 7 and Windows 8.1), and on the left side below Favorites
    and OneDrive you will see a `Homegroup` link (Figure [4-1](#A978-1-4842-1473-2_4_Chapter.html#Fig1)).
    Click it, and if you haven’t already created a homegroup on your network, you
    will have the option to create one.


    ![A978-1-4842-1473-2_4_Fig1_HTML.jpg](A978-1-4842-1473-2_4_Fig1_HTML.jpg)


    Figure 4-1. Setting up a homegroup


    Tip


    If you don’t see a `Homegroup` link, it could be because your current network
    is set as a public network, so Windows protects your PC by closing down some of
    the sharing features. Click the `Network` link, and you will probably see a yellow
    banner saying “Network discovery and file sharing are turned off. Network computers
    and devices are not visible. Click to change….”


    If you are sure you are on your home network, then you can enable network discovery
    on a private network. To do this, tap the yellow banner and select “Turn on network
    discovery and file sharing.”


    A dialog box (Figure [4-2](#A978-1-4842-1473-2_4_Chapter.html#Fig2)) then asks
    if you want to turn on network discovery and file sharing for all public networks.
    This will enable network access on all public networks (e.g., a café’s public
    Wi-Fi) and is not a good idea, so you should select the `No` option, which only
    switches your current network to private mode, and then you will be able to access
    homegroups and other network shares.


    ![A978-1-4842-1473-2_4_Fig2_HTML.jpg](A978-1-4842-1473-2_4_Fig2_HTML.jpg)


    Figure 4-2. Network discovery


    When you click “Create a homegroup,” Windows launches a wizard that walks you
    through the process of creating the group. After clicking “Create homegroup,”
    click `Next` to start the wizard.


    The first option you get is which folders and devices you want to share with the
    other PCs in the group (Figure [4-3](#A978-1-4842-1473-2_4_Chapter.html#Fig3).)


    ![A978-1-4842-1473-2_4_Fig3_HTML.jpg](A978-1-4842-1473-2_4_Fig3_HTML.jpg)


    Figure 4-3. Selecting what should be shared in a homegroup


    The default is that Pictures, Videos, Music, Printers, and Devices are shared,
    but the Documents folder is not shared. You can click the drop-down options for
    each library to change the settings. Because you will be using a homegroup for
    media sharing, Videos and Music will need to be shared; click `Next` to go to
    the next screen.


    The final part of the setup gives you a homegroup password (Figure [4-4](#A978-1-4842-1473-2_4_Chapter.html#Fig4)).
    This is the password you will need when you get back to your Windows 10 machine,
    so make a note of it (or print it) and click `Finish`.


    ![A978-1-4842-1473-2_4_Fig4_HTML.jpg](A978-1-4842-1473-2_4_Fig4_HTML.jpg)


    Figure 4-4. Password display when creating a homegroup


    If you have already created a homegroup, then you are good to go as long as you
    know the password. You will need that when you get back to your Windows 10 machine.


    Tip


    To find out the password of an already created homegroup, you can go to the `Homegroup`
    link in `Windows Explorer`, right-click, and select “View the homegroup password.”


    If you right-click the `Homegroup` link and select `Change HomeGroup Settings`,
    you also have the option of changing the homegroup password (Figure [4-5](#A978-1-4842-1473-2_4_Chapter.html#Fig5)).


    ![A978-1-4842-1473-2_4_Fig5_HTML.jpg](A978-1-4842-1473-2_4_Fig5_HTML.jpg)


    Figure 4-5. Homegroup settings


    Later in the chapter you will see how to access files in the homegroup folders.


    # Setting Up File Shares


    Another option you have is to share individual folders with other PCs. You can
    do this in Windows by using `File Explorer` to navigate to the folder you want
    to share.


    Information


    Although it is easier to share a folder with members of a homegroup, you will
    see later in this section how to share with a PC that is not a homegroup member.


    Right-click the folder and select “Share with.” If you have already set up a homegroup,
    you will see the options “Share with homegroup (View)” and “Share with homegroup
    (View and Edit).”


    If you select “Share with homegroup (View),” Windows will add this folder to the
    folders accessible from PCs using your homegroup; you don’t have to set up special
    passwords or usernames. Other PCs in the homegroup will be able to read the content
    of the folder but not make any changes. If you want them to have access to make
    changes, you should select “Share with homegroup (View and Edit).”


    The other options on this menu are `Stop Sharing` and `Specific People`. If you
    select `Stop Sharing`, the folder will no longer be accessible from other PCs.


    Note


    `Stop Sharing` appears only if the folder is already shared.


    If you select `Specific People`, you can add a user account homegroup to use this
    option.


    The dialog box (Figure [4-6](#A978-1-4842-1473-2_4_Chapter.html#Fig6)) shows user
    accounts that currently have access to the folder, and in the username box you
    can enter a username/e-mail account of the person that you want to share it with.


    ![A978-1-4842-1473-2_4_Fig6_HTML.jpg](A978-1-4842-1473-2_4_Fig6_HTML.jpg)


    Figure 4-6. Sharing a file with specific people


    Note


    Remember, this is sharing only with other computers on the network and not over
    the Internet. To do that, you need to use something like OneDrive.


    The name you add has to be an existing user on the PC for you to be able to select
    them. So, if Ian wants to share a folder with Garry on his PC, Garry would need
    to have an account on Ian’s PC. The other options are `Everyone` and `Homegroup`.
    `Everyone` means that any other PC on the network will be able to access the folder
    even if they are not part of homegroup, which is not ideal for folders with personal
    data but would be OK for media folders. When you pick a person or `Everyone`,
    you also can set up the access rights. `Read-Only` gives them access to read from
    the folder and not make any changes. `Read/Write` gives them access to read and
    make changes to the folder.


    You have now looked at how you can share files and folders across your network,
    but what if you want to send your media directly to another device? In the next
    section, you will look at how to do just that.'
