- fmt: '### Playing Music


    From the main libraries view, tap the `Music` button with the server name you
    want to listen to music from, which will take you to the music section. The app
    lists music by artists in alphabetical order. You can swipe left or right to switch
    between `artist`, `albums`, `recently added`, and `folders`.


    **Tip**


    To change the sort order, tap the `Sort` button, which will give you a list of
    sort options. Tap your required sort option.


    When you tap an artist, the app lists albums by the selected artist. If you swipe
    right, Plex displays information about the artist.


    Tap an album, and Plex will list the tracks (Figure [6-22](#A978-1-4842-1473-2_6_Chapter.html#Fig22)).
    Tap a track to start playing the music.


    ![A978-1-4842-1473-2_6_Fig22_HTML.jpg](A978-1-4842-1473-2_6_Fig22_HTML.jpg)


    *Figure 6-22. Track view in Plex on Windows 10 Mobile*


    On the “Now playing” screen, you have `Play/Pause`, `Previous track`, and `Next
    track` buttons, along with `Shuffle` and `Repeat` buttons. There is also a `track
    list` button, which shows your current playlist.


    As with the movie section of the app with Plex, you can stream music to another
    Plex device on your network. Tap the `Connect To` button and select your Plex
    device. The `Connect To` button will be highlighted, and then you can tap `Play`
    to start the music playing on the remote device.


    ### Offline Playback


    Plex has a great feature that we really love, which is the ability to take your
    media offline for playing without a network connection. Plex calls it syncing
    (Figure [6-23](#A978-1-4842-1473-2_6_Chapter.html#Fig23)), and it works for music,
    pictures, TV shows, and movies.


    ![A978-1-4842-1473-2_6_Fig23_HTML.jpg](A978-1-4842-1473-2_6_Fig23_HTML.jpg)


    *Figure 6-23. Syncing in Plex*


    To take content offline, browse the app for either a movie, a TV show, or a music
    album. When you are viewing the content, tap the `Sync` button, and the app asks
    you to create a new Sync Item. You can set the name, the bit rate, and the number
    of items it will sync.


    The bit rate is the quality of the file it will download from your server. The
    higher the bit rate, the better the quality, but be aware that higher bit rates
    take up more space on your device. Click the `Save` button to finish, and Plex
    will download the content to your device.


    **Information**


    You can check on the status of Plex downloads by going to the `status` option
    from the Plex start screen (tap the `…` button to view the status link).


    In the `Sync Status` screen, you can see what content you have downloaded and
    the current status of the download.


    Plex is a powerful and flexible media system with a server that will run on a
    range of platforms and clients that run on iOS, Android, Windows, and Xbox One.
    It has many more features than we are able to cover here. There is also a large
    online community of Plex users; you can find out more about Plex on the web site
    at `Plex.tv`.


    ## Getting Started with Emby Server


    `Emby Server` is a media server (formally known as `Media Browser`) designed for
    you to be able to store and manage your media in one location and then access
    it from Windows PCs, tablets, and phones, as well Android, iOS, Roku, Chromecast,
    and other devices. It also has strong DLNA support (see [Chapter 5](#A978-1-4842-1473-2_5_Chapter.html)
    for more information about DLNA). If you plan to use DLNA devices in your home
    network, then Emby is a useful server solution.


    Emby has a vast range of features, too many to cover here, so we will focus on
    getting started with `Emby Server` and then connecting to your server from a Windows
    10 PC and phone.


    ### Installing the Emby Server


    To get started with Emby, you need to download the server from [`http://Emby.media/download`](http://emby.media/download).


    Emby supports Windows, Linux, NAS devices, Mac, and FreeBSD. In this chapter,
    you will focus on installing it on a Windows PC, so from the download page, click
    the `Windows` button and download the latest stable release.


    **Note**


    As well as the stable release, there is the option to download a beta version
    (Figure [6-24](#A978-1-4842-1473-2_6_Chapter.html#Fig24)). The beta version is
    a development version that may have new features but may also include bugs. Unless
    there is something you want to test, we recommend using the stable version.


    ![A978-1-4842-1473-2_6_Fig24_HTML.jpg](A978-1-4842-1473-2_6_Fig24_HTML.jpg)


    *Figure 6-24. Download choices on the Emby web site*


    When the setup file has finished downloading, run `setup.exe`. During the setup,
    depending on what you already have installed on your PC, you may get asked to
    install the `Visual C++ Runtime` library (Figure [6-25](#A978-1-4842-1473-2_6_Chapter.html#Fig25)).


    ![A978-1-4842-1473-2_6_Fig25_HTML.jpg](A978-1-4842-1473-2_6_Fig25_HTML.jpg)


    *Figure 6-25. Emby requires the Visual C++ runtime*


    This is an essential part of the setup, and you will need to install it to set
    up Emby.


    During the setup, you will be prompted for confirmation that Emby can be installed,
    and the Emby setup will download the latest version to your PC.


    After the `Emby Server` setup has completed, depending on your network configuration,
    you may see a `Windows Firewall` dialog box (Figure [6-26](#A978-1-4842-1473-2_6_Chapter.html#Fig26)).
    This is your PC asking permission for `Emby Server` to communicate with other
    devices on your network. If you are going to be using Emby apps, DLNA, and other
    networking features, you will need to allow access, so click the `Allow access`
    button.


    ![A978-1-4842-1473-2_6_Fig26_HTML.jpg](A978-1-4842-1473-2_6_Fig26_HTML.jpg)


    *Figure 6-26. Allowing Emby through the firewall*


    Once it’s installed, you need to configure `Emby Server`, so from the start screen,
    click `Emby Server` (it will probably be in the `Recently added` section). This
    will launch the `Microsoft Edge` browser and open the Emby configuration page.


    The first option you have is to select your preferred display language; select
    your language from the drop-down list and click `Next`.


    With Emby you have user profiles so that each user in your home can have their
    own settings, playback stats, and parental controls (you can read more about this
    at [`http://Emby.Media`](http://emby.media/)). For now you will set up one user,
    so type your name into the first name box.


    The next option is to link your server to an Emby account; you will need to do
    this if you are going to be accessing your Emby server over the Internet. So if
    you don’t have an Emby account, go to [`http://Emby.media`](http://emby.media/)
    and create one now.


    Once you have entered your username, click `Next`. Emby will send a confirmation
    e-mail to your registered e-mail address.


    The next part of the setup is to tell Emby where you media files are located on
    your server (Figure [6-27](#A978-1-4842-1473-2_6_Chapter.html#Fig27)).


    ![A978-1-4842-1473-2_6_Fig27_HTML.jpg](A978-1-4842-1473-2_6_Fig27_HTML.jpg)


    *Figure 6-27. Adding media in Emby*


    Click the `Add media folder` button.

    Select the `Movies` from the `Content type` drop-down list.

    Click `OK`.

    Click the plus button next to `Media Locations`.

    Use the file navigator to select the folder where your movie collection is stored
    on the PC.

    Click `OK`.

    Repeat this process for music, TV shows, and pictures.

    When you have added all your folders, click `Next`.

    On the next screen, you can leave the default options of downloading artwork from
    the Internet and click `Next`.

    Click `Next` again and then select `I accept the terms of service` and click `Next`
    again. Then click `Finish` to finish off the server.


    Your `Emby Server` setup is now complete, and you can move on to the Emby apps.'
