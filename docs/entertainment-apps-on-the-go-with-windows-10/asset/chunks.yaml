- fmt: '### Playing Music


    When you open the music app, it displays your music collection by album (Figure
    [1-12](#A978-1-4842-1473-2_1_Chapter.html#Fig12)). You can change the view so
    that the app displays your music by artist, song, or playlist.


    ![A978-1-4842-1473-2_1_Fig12_HTML.jpg](A978-1-4842-1473-2_1_Fig12_HTML.jpg)


    Figure 1-12. Windows Mobile Albums view


    To change to a different view, tap the menu icon on the top left of the app. When
    you tap the menu icon, it slides out a list where you will see these buttons:
    `Recent Plays`, `Albums`, `Artist`, `Songs`, `Playlist`, `Radio`, and `Explorer`.
    You will look at `Radio` and `Explorer` later in this section; for now, tap the
    `Albums` view, and it will list your collection alphabetically.


    To play an album, tap the `Play` button located on the album cover image. The
    app will start playing the first song from the album.


    If you tap the album, it will take you to the album page. To play the whole album,
    tap the `Play All` button. To play a single track, tap the song name.


    The other options in this view are `Add To` and `More`. The `Add To` button adds
    the album to a playlist or the `Now Playing` bar, which is the current song selection
    list. Adding to this will add the songs to the end of `Now Playing` bar.


    To add to a playlist, tap the playlist you want to add to (for information on
    playlists, see the “Playing Music” section earlier in this chapter).


    The `More` button displays these additional menu options: `Delete`, `See Artist`,
    and `Download`.


    - The `Delete` option deletes this album from your collection.

    - `See Artist` takes you to the artist page (the same as selecting an artist from
    the `Artists` view).

    - The `Download` option shows only if the album you have selected is stored on
    the cloud. Selecting this option downloads the album to your phone for offline
    playback. You will look at offline playback and cloud-stored files later in this
    chapter.


    When you start playing an album or song, it will take you to the “Now playing”
    view. In this view, there are buttons to go back to a previous track, pause playback,
    and skip to the next track. There is a `Repeat` button, which when selected will
    play the current song or playlist again after it has finished playing. The `Shuffle`
    button makes the app play back your content in a random order. The final button
    on this list is a `More` button, which gives you the option of adding the current
    song to a playlist.


    On the “Now playing” view you will also see a small arrow pointing down. Tapping
    this button brings up the current playlist.


    ### Filtering and Sorting


    When you select `Artists`, `Albums`, or `Songs` from the view menu button, you
    will see a `Refine` option at the top of the screen. This option enables you to
    filter and sort your collection to make it easier to find your music.


    The `Refine` option is split into two sections: `Filter` and `Sort`.


    The `Filter` section is split between `All`, `Available Offline`, and `Streaming`.
    When you have `All` selected, it will show all your music collection whether on
    the phone, stored in `OneDrive`, or as part of your `Groove Music Pass` subscription.


    Note: `OneDrive` is Microsoft’s cloud storage solution and something you will
    look at in [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html). Read more about `Groove
    Music Pass` subscriptions earlier in this chapter.


    To show music stored only on your phone and available to play without an Internet
    connection, you select the `Available offline` option. If you want to see music
    only from `OneDrive` or your `Groove Music Pass` subscription, select `Streaming`.


    In the `Sort` section, you can have the music sorted alphabetically, and if you
    are in the `Albums` view, you also get an `Artist` option.


    Note: In any of the `Albums`, `Artists`, and `Songs` views, there is a `Shuffle
    all` button that will play your music in a random order.


    Up to now you have been looking at `Groove` on Windows 10 devices, be they PC,
    tablet, laptop, or phone. What if you have an Android phone or an iPhone? Fortunately,
    Microsoft has recently become rather surprisingly good at putting its applications
    on these competing platforms. This includes the Groove app, and in the next section
    you will look at using this app on Android and iOS devices.


    ### Groove with Android Devices and iPhones


    One of the great things about Microsoft’s Groove music service is that as well
    as working on Windows PCs, phones, and tablets, it works on Android devices and
    iPhones. The iOS and Android versions of the app are not designed to be music
    players for music stored on the phone or tablet but players for music stored in
    `OneDrive` or from a `Groove Music Pass` subscription. See [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html)
    to learn about storing your music collection in `OneDrive`.


    #### Android Devices


    To use Groove on Android, head to the Google Play Store and search for `Groove
    Music`. Once installed, run the app, and it will ask you for your Microsoft account
    login. This is the account you have used with Windows to upload your collection
    to `OneDrive` or you used when you subscribed to a Groove.


    Once you have logged into the app, you are presented with your music collection.
    Your collection can be viewed by artist, album, song, and genre. To view your
    collection by artist, click the `Artists` tab (Figure [1-13](#A978-1-4842-1473-2_1_Chapter.html#Fig13)).


    ![A978-1-4842-1473-2_1_Fig13_HTML.jpg](A978-1-4842-1473-2_1_Fig13_HTML.jpg)


    Figure 1-13. Artists view on Android


    When you select an artist, the app shows albums in your collection in the `My
    Albums` section, and if you have a `Groove Music Pass` subscription, you will
    see an `All Albums` section with albums from the artist that are not in your collection.


    To play an album, tap the album image. To view the tracks on the album, tap the
    album title, and you will see all the songs on the album. Tap a song to pay it.


    There is also a `Bio` section. When viewing an artist, this gives you background
    information about the artist.


    With the app you can also search for a song, artist, or album. To perform a search,
    tap the menu button, and in the search box type in what you are looking for. The
    app will list matching results starting with artists and then albums and below
    that songs.


    ##### Offline Playback


    With the music app, you can download songs so that you can play them offline without
    an Internet connection.


    In the `Collections` view, scroll up to the top of the list, and you will see
    a drop-down menu that by default says `All music`. This option means that all
    the music in your collection is shown. To see only the music you have downloaded,
    change it to `Available offline`. To see only music stored in the cloud, change
    it to `Available online only`.


    To download music to your Android device, tap and hold a song, artist, or album
    and select `Make available offline`. This will download the selection to the device
    ready for offline playback.


    Note: Downloaded music can be played only with the Groove app. You can’t use third-party
    Android apps to play music from Groove.


    ##### Radio


    As with the Windows PC version of the Groove, if you have a `Groove Music Pass`
    subscription, you can create a custom radio station based on an artist. To get
    started, tap the menu button on the top left of the app and select the `Radio`
    option. Next you enter an artist name or select from the recommended artists.
    The app will create a custom playlist based on the artist you selected, and it
    will store it in the `Recent` section for accessing later.'
