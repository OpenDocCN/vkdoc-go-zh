- fmt: "### Watching YouTube Videos\n\nAnother great source of video content is YouTube,\
    \ where you can watch videos including dancing cat videos, music videos, instruction\
    \ videos, and full movies.\n\nTo watch a YouTube video on Windows 10, just load\
    \ the Microsoft Edge web browser and in the address bar go to `YouTube.com`.\n\
    \n> **Information**  \n> Microsoft Edge is the new default browser on Windows\
    \ 10, replacing Internet Explorer. Do not worry if you are used to looking for\
    \ the letter `e` icon to find your browser because Edge uses a similar icon.\n\
    \nYou can type your search term in the search box, and YouTube will show you a\
    \ list of matching results.\n\n> **Note**  \n> The YouTube web site on Windows\
    \ 10 works in the same way as it does on other versions of Windows and indeed\
    \ other operating systems. If you have used it before, it will seem familiar on\
    \ Windows 10.\n\nYou have now looked at how you can play videos using the built-in\
    \ Film and TV app and also how you can play videos from two of the most popular\
    \ online services, Netflix and YouTube, but what if you want to watch your own\
    \ videos? Well, you can use the Film and TV app, but what if you like a little\
    \ more control over playback or perhaps the Film and TV app does not support your\
    \ particular format? In the next section, you will look at some third-party apps\
    \ that may help.\n\n## Other Video Apps\n\nYou have seen that the built-in playback\
    \ options in Windows 10 are pretty good, but from our experience borne out by\
    \ years of experience answering listeners’ questions on obscure formats, there\
    \ will always be video files that Windows will not play natively.\n\nFortunately,\
    \ third-party developers usually leap in to fill these gaps, and you can find\
    \ a large number of video playback apps on the Windows Store. While many of these\
    \ are either limited, tied to a particular media server, or just not very good,\
    \ there is one application, VLC, which we have found really useful. We’ll cover\
    \ it next.\n\n### VLC\n\nThere are lots of other video apps for Windows 10 available\
    \ in the app store, but there is one that really stands out as being the most\
    \ useful and versatile; it’s called VLC. VLC is an open source project that has\
    \ versions of its app for iOS, Android, Mac, Linux, and Windows.\n\nThe Windows\
    \ 10 version is free from the Windows Store and is available for Windows PCs and\
    \ mobile devices. One of the main benefits of VLC is that it will play a wide\
    \ range of file formats and video types, some of which the default Windows Film\
    \ and TV app will not play.\n\nTo get started with the app, go to the Windows\
    \ Store and enter `VLC` in the search box. The search results will show the app\
    \ (which has a traffic cone as an icon); select it and then select Install to\
    \ get the app installed on your device.\n\nOnce it’s installed, you can find VLC\
    \ from the “All apps” list and load it.\n\nWhen you load VLC, it automatically\
    \ searches your device for videos and music so that you can browse your collection\
    \ via the `home`, `videos`, `music`, and `file explorer` tabs (see Figure [3-8](#A978-1-4842-1473-2_3_Chapter.html#Fig8)).\n\
    \n![A978-1-4842-1473-2_3_Fig8_HTML.jpg](A978-1-4842-1473-2_3_Fig8_HTML.jpg)\n\n\
    **Figure 3-8.** VLC on Windows 10\n\nOn a PC the default location for the music\
    \ folder is `This PC\\Music` and for the video content is `This PC\\Videos`. If\
    \ you want to add folders to your collection, select the down arrow button on\
    \ the menu bar at the top of the screen and then select the Settings button.\n\
    \nTo add a folder to the music library, select the “Add a new folder” button in\
    \ the Music Library section of the Settings pane (See Figure [3-9](#A978-1-4842-1473-2_3_Chapter.html#Fig9).)\
    \ Browse to the required folder and click the Add button. VLC will then add the\
    \ content of the folder to your music collection.\n\n![A978-1-4842-1473-2_3_Fig9_HTML.jpg](A978-1-4842-1473-2_3_Fig9_HTML.jpg)\n\
    \n**Figure 3-9.** Adding a new folder in VLC\n\nTo add a folder containing videos\
    \ to your collection, select the “Add a new folder” button in the “video” section\
    \ of the Settings pane. Browse to the required folder and select the Add button.\
    \ VLC will then add the contents of the folder to your video collection.\n\nThe\
    \ VLC app is split into four sections: `home`, `videos`, `music`, and `file explorer`\
    \ (see the earlier Figure [3-8](#A978-1-4842-1473-2_3_Chapter.html#Fig8)).\n\n\
    #### Playing Music with VLC\n\nThe `home` tab combines your music and video collection\
    \ into one view based on how often you have watched or listened to the content\
    \ and whether you have marked a file as a favorite.\n\nThe `music` tab has the\
    \ option of showing your collection in order of artists, albums, songs, or playlists\
    \ (from the drop-down list on the top left).\n\nWhen you have the view set in\
    \ Artists mode (Figure [3-10](#A978-1-4842-1473-2_3_Chapter.html#Fig10)), you\
    \ see music from the artists on your device. You can select an artist to show\
    \ all their albums and music. When you select an artist, you get a Play All button,\
    \ which will play all your music from the selected artist. There is a Pin button,\
    \ which pins the artist to the Windows start screen for quick access later. Also\
    \ on the toolbar is a calendar icon that searches for upcoming shows by the artist.\n\
    \n![A978-1-4842-1473-2_3_Fig10_HTML.jpg](A978-1-4842-1473-2_3_Fig10_HTML.jpg)\n\
    \n**Figure 3-10.** VLC in Artists mode\n\nAlso, when you select an artist, it\
    \ shows albums from the artist. Selecting the album brings up the album view where\
    \ it lists its songs. You can click/tap a song to start playing it.\n\nIf you\
    \ want to listen to the whole album, you can select the “Play album” button. Other\
    \ options in this video are a Pin button, which pins the album to the Windows\
    \ start screen. There is a favorite button that you can use to add the album to\
    \ your favorites, and there is an “Add to playlist” button. When you select “Add\
    \ to playlist,” it brings up the playlist screen. In the text box you can enter\
    \ a new playlist name and click Add. It also shows you existing playlists, which\
    \ you can select to add the album to.\n\nWhen you select the Albums view, VLC\
    \ lists your music separated by album. Click/tap an album to bring up the album\
    \ information screen (as shown earlier).\n\nThe Songs view lists all the songs\
    \ you have on your device in alphabetical order. Select a song by clicking/tapping\
    \ it to start playing it.\n\nPlaylist view shows the playlists you have created.\
    \ Click/tap one to bring up the Playlist menu, which has two options: Delete or\
    \ Play all.\n\nThere is also a New Playlist button, which enables you to create\
    \ a new playlist.\n\nWhen you play music with VLC, you get a well-designed “now\
    \ playing” screen (Figure [3-11](#A978-1-4842-1473-2_3_Chapter.html#Fig11)) where\
    \ you can control the playback with Previous, Pause/Play, and Next buttons. You\
    \ can also turn on or off Shuffle mode, which plays your songs in a random order.\
    \ Another option is the Share button; with this you can share song via Windows\
    \ apps like Twitter, Facebook, and OneNote (the app shares a `last.fm` link).\n\
    \n![A978-1-4842-1473-2_3_Fig11_HTML.jpg](A978-1-4842-1473-2_3_Fig11_HTML.jpg)\n\
    \n**Figure 3-11.** The “now playing” screen in VLC\n\nThe other two options are\
    \ a favorite button and a playlist button. The favorite button adds the currently\
    \ playing song to your favorites, and the playlist button shows you which songs\
    \ are currently in your playlist."
  raw: '### Watching YouTube Videos


    Another great source of video content is YouTube, where you can watch videos including
    dancing cat videos, music videos, instruction videos, and full movies.


    To watch a YouTube video on Windows 10, just load the Microsoft Edge web browser
    and in the address bar go to YouTube.com.


    Information


    Microsoft Edge is the new default browser on Windows 10, replacing Internet Explorer.
    Do not worry if you are used to looking for the letter e icon to find your browser
    because Edge uses a similar icon.


    You can type your search term in the search box, and YouTube will show you a list
    of matching results.


    Note


    The YouTube web site on Windows 10 works in the same way as it does on other versions
    of Windows and indeed other operating systems. If you have used it before, it
    will seem familiar on Windows 10.


    You have now looked at how you can play videos using the built-in Film and TV
    app and also how you can play videos from two of the most popular online services,
    Netflix and YouTube, but what if you want to watch your own videos? Well, you
    can use the Film and TV app, but what if you like a little more control over playback
    or perhaps the Film and TV app does not support your particular format? In the
    next section, you will look at some third-party apps that may help.


    ## Other Video Apps


    You have seen that the built-in playback options in Windows 10 are pretty good,
    but from our experience borne out by years of experience answering listeners’
    questions on obscure formats, there will always be video files that Windows will
    not play natively.


    Fortunately, third-party developers usually leap in to fill these gaps, and you
    can find a large number of video playback apps on the Windows Store. While many
    of these are either limited, tied to a particular media server, or just not very
    good, there is one application, VLC, which we have found really useful. We’ll
    cover it next.


    ### VLC


    There are lots of other video apps for Windows 10 available in the app store,
    but there is one that really stands out as being the most useful and versatile;
    it’s called VLC. VLC is an open source project that has versions of its app for
    iOS, Android, Mac, Linux, and Windows.


    The Windows 10 version is free from the Windows Store and is available for Windows
    PCs and mobile devices. One of the main benefits of VLC is that it will play a
    wide range of file formats and video types, some of which the default Windows
    Film and TV app will not play.


    To get started with the app, go to the Windows Store and enter VLC in the search
    box. The search results will show the app (which has a traffic cone as an icon);
    select it and then select Install to get the app installed on your device.


    Once it’s installed, you can find VLC from the “All apps” list and load it.


    When you load VLC, it automatically searches your device for videos and music
    so that you can browse your collection via the home, videos, music, and file explorer
    tabs (see Figure [3-8](#A978-1-4842-1473-2_3_Chapter.html#Fig8)).


    ![A978-1-4842-1473-2_3_Fig8_HTML.jpg](A978-1-4842-1473-2_3_Fig8_HTML.jpg)


    Figure 3-8.


    VLC on Windows 10


    On a PC the default location for the music folder is `This PC\Music` and for the
    video content is `This PC\Videos`. If you want to add folders to your collection,
    select the down arrow button on the menu bar at the top of the screen and then
    select the Settings button.


    To add a folder to the music library, select the “Add a new folder” button in
    the Music Library section of the Settings pane (See Figure [3-9](#A978-1-4842-1473-2_3_Chapter.html#Fig9).)
    Browse to the required folder and click the Add button. VLC will then add the
    content of the folder to your music collection.


    ![A978-1-4842-1473-2_3_Fig9_HTML.jpg](A978-1-4842-1473-2_3_Fig9_HTML.jpg)


    Figure 3-9.


    Adding a new folder in VLC


    To add a folder containing videos to your collection, select the “Add a new folder”
    button in the “video” section of the Settings pane. Browse to the required folder
    and select the Add button. VLC will then add the contents of the folder to your
    video collection.


    The VLC app is split into four sections: home, videos, music, and file explorer
    (see the earlier Figure [3-8](#A978-1-4842-1473-2_3_Chapter.html#Fig8)).


    #### Playing Music with VLC


    The “home” tab combines your music and video collection into one view based on
    how often you have watched or listened to the content and whether you have marked
    a file as a favorite.


    The “music: tab has the option of showing your collection in order of artists,
    albums, songs, or playlists (from the drop-down list on the top left).


    When you have the view set in Artists mode (Figure [3-10](#A978-1-4842-1473-2_3_Chapter.html#Fig10)),
    you see music from the artists on your device. You can select an artist to show
    all their albums and music. When you select an artist, you get a Play All button,
    which will play all your music from the selected artist. There is a Pin button,
    which pins the artist to the Windows start screen for quick access later. Also
    on the toolbar is a calendar icon that searches for upcoming shows by the artist.


    ![A978-1-4842-1473-2_3_Fig10_HTML.jpg](A978-1-4842-1473-2_3_Fig10_HTML.jpg)


    Figure 3-10.


    VLC in Artists mode


    Also, when you select an artist, it shows albums from the artist. Selecting the
    album brings up the album view where it lists its songs. You can click/tap a song
    to start playing it.


    If you want to listen to the whole album, you can select the “Play album” button.
    Other options in this video are a Pin button, which pins the album to the Windows
    start screen. There is a favorite button that you can use to add the album to
    your favorites, and there is an “Add to playlist” button. When you select “Add
    to playlist,” it brings up the playlist screen. In the text box you can enter
    a new playlist name and click Add. It also shows you existing playlists, which
    you can select to add the album to.


    When you select the Albums view, VLC lists your music separated by album. Click/tap
    an album to bring up the album information screen (as shown earlier).


    The Songs view lists all the songs you have on your device in alphabetical order.
    Select a song by clicking/tapping it to start playing it.


    Playlist view shows the playlists you have created. Click/tap one to bring up
    the Playlist menu, which has two options: Delete or Play all.


    There is also a New Playlist button, which enables you to create a new playlist.


    When you play music with VLC, you get a well-designed “now playing” screen (Figure
    [3-11](#A978-1-4842-1473-2_3_Chapter.html#Fig11)) where you can control the playback
    with Previous, Pause/Play, and Next buttons. You can also turn on or off Shuffle
    mode, which plays your songs in a random order. Another option is the Share button;
    with this you can share song via Windows apps like Twitter, Facebook, and OneNote
    (the app shares a `last.fm` link).


    ![A978-1-4842-1473-2_3_Fig11_HTML.jpg](A978-1-4842-1473-2_3_Fig11_HTML.jpg)


    Figure 3-11.


    The “now playing” screen in VLC


    The other two options are a favorite button and a playlist button. The favorite
    button adds the currently playing song to your favorites, and the playlist button
    shows you which songs are currently in your playlist.'
  trans: "\n### 观看 YouTube 视频\n\n另一个绝佳的视频来源是 YouTube，你可以在上面观看各种视频，包括萌猫视频、音乐视频、教学视频甚至完整电影。\n\
    \n要在 Windows 10 上观看 YouTube 视频，只需打开 Microsoft Edge 浏览器，然后在地址栏中输入 `YouTube.com`。\n\
    \n> **信息**  \n> Microsoft Edge 是 Windows 10 上取代 Internet Explorer 的新默认浏览器。如果你习惯寻找字母\
    \ `e` 图标来找到浏览器，不必担心，因为 Edge 使用的图标与之类似。\n\n你可以在搜索框中输入搜索词，YouTube 会显示匹配的结果列表。\n\n\
    > **注意**  \n> Windows 10 上的 YouTube 网站，其运行方式与其它 Windows 版本乃至其它操作系统上的完全相同。如果你以前用过，那么在\
    \ Windows 10 上也会感到很熟悉。\n\n现在，你已经了解了如何使用内置的“电影和电视”应用播放视频，以及如何从 Netflix 和 YouTube\
    \ 这两个最流行的在线服务播放视频。但是，如果你想观看自己的视频呢？嗯，你可以使用“电影和电视”应用，但如果你想要对播放有更多控制，或者“电影和电视”应用不支持你的特定格式，那该怎么办？在下一节中，我们将介绍一些可能有帮助的第三方应用。\n\
    \n## 其它视频应用\n\n你已经看到，Windows 10 内置的播放选项相当不错，但根据我们多年解答听众关于冷门格式问题的经验来看，总会有一些视频文件是\
    \ Windows 本身无法播放的。\n\n幸运的是，第三方开发者通常会迅速填补这些空白。你可以在 Windows 应用商店中找到大量视频播放应用。虽然其中许多应用要么功能有限、要么绑定特定的媒体服务器、或者质量不佳，但有一个名为\
    \ VLC 的应用，我们觉得非常有用。接下来我们将会介绍它。\n\n### VLC\n\n应用商店中还有许多适用于 Windows 10 的其他视频应用，但有一个应用因其最实用、功能最多而脱颖而出，它就是\
    \ VLC。VLC 是一个开源项目，其应用有适用于 iOS、Android、Mac、Linux 和 Windows 的版本。\n\nWindows 10 版本可从\
    \ Windows 商店免费获取，并适用于 Windows PC 和移动设备。VLC 的主要优势之一是它能够播放多种文件格式和视频类型，其中一些是 Windows\
    \ 默认的“电影和电视”应用无法播放的。\n\n要开始使用此应用，请转到 Windows 商店，在搜索框中输入 `VLC`。搜索结果会显示该应用（图标是一个交通锥）；选中它，然后选择“安装”，即可将应用安装到你的设备上。\n\
    \n安装完成后，你可以从“所有应用”列表中找到 VLC 并加载它。\n\n加载 VLC 时，它会自动在你的设备中搜索视频和音乐，这样你就可以通过 `home`（主页）、`videos`（视频）、`music`（音乐）和\
    \ `file explorer`（文件资源管理器）标签页浏览你的媒体库（参见图 3-8）。\n\n![A978-1-4842-1473-2_3_Fig8_HTML.jpg](img/A978-1-4842-1473-2_3_Fig8_HTML.jpg)\n\
    \n**图 3-8.** Windows 10 上的 VLC\n\n在 PC 上，音乐文件夹的默认位置是 `This PC\\Music`，视频内容的默认位置是\
    \ `This PC\\Videos`。如果你想向媒体库中添加文件夹，请选择屏幕顶部菜单栏上的向下箭头按钮，然后选择“设置”按钮。\n\n要添加文件夹到音乐库，请在“设置”窗格的“音乐库”部分选择“添加新文件夹”按钮（见图\
    \ 3-9）。浏览到所需文件夹，然后点击“添加”按钮。VLC 就会将该文件夹的内容添加到你的音乐收藏中。\n\n![A978-1-4842-1473-2_3_Fig9_HTML.jpg](img/A978-1-4842-1473-2_3_Fig9_HTML.jpg)\n\
    \n**图 3-9.** 在 VLC 中添加新文件夹\n\n要添加包含视频的文件夹到你的媒体库，请在“设置”窗格的“视频”部分选择“添加新文件夹”按钮。浏览到所需文件夹，然后选择“添加”按钮。VLC\
    \ 就会将该文件夹的内容添加到你的视频收藏中。\n\nVLC 应用分为四个部分：`home`（主页）、`videos`（视频）、`music`（音乐）和 `file\
    \ explorer`（文件资源管理器）（参见前面的图 3-8）。\n\n#### 使用 VLC 播放音乐\n\n`home`（主页）标签页会根据你观看或收听内容的频率以及是否将文件标记为收藏，将你的音乐和视频收藏合并到一个视图中。\n\
    \n`music`（音乐）标签页提供按艺术家、专辑、歌曲或播放列表排序（通过左上角的下拉列表查看）展示收藏的选项。\n\n当您设置为艺术家（Artists）模式查看时（图\
    \ 3-10），您会看到设备上来自这些艺术家的音乐。您可以选择一位艺术家，以显示其所有的专辑和音乐。当你选择一位艺术家时，会出现一个“全部播放”（Play\
    \ All）按钮，可以播放该艺术家的所有音乐。还有一个“固定”（Pin）按钮，可以将该艺术家固定到 Windows 开始屏幕，以便稍后快速访问。工具栏上还有一个日历图标，用于搜索该艺术家的即将到来的演出。\n\
    \n![A978-1-4842-1473-2_3_Fig10_HTML.jpg](img/A978-1-4842-1473-2_3_Fig10_HTML.jpg)\n\
    \n**图 3-10.** 艺术家模式下的 VLC\n\n此外，当你选择一位艺术家时，会显示该艺术家的专辑。选择某个专辑会进入专辑视图，其中列出了专辑中的歌曲。你可以点击/轻触一首歌开始播放。\n\
    \n如果你想收听整张专辑，可以选择“播放专辑”（Play album）按钮。此视图中的其它选项有：“固定”（Pin）按钮，用于将专辑固定到 Windows\
    \ 开始屏幕；一个收藏按钮，你可以用来将专辑添加到收藏夹；还有一个“添加到播放列表”（Add to playlist）按钮。当你选择“添加到播放列表”时，会弹出播放列表屏幕。在文本框中，你可以输入新的播放列表名称并点击“添加”。它还会显示你已有的播放列表，你可以选择将专辑添加到其中。\n\
    \n当你选择专辑（Albums）视图时，VLC 会按专辑列出你的音乐。点击/轻触一个专辑，会打开专辑信息屏幕（如前所示）。\n\n歌曲（Songs）视图按字母顺序列出你设备上的所有歌曲。通过点击/轻触选择一首歌即可开始播放。\n\
    \n播放列表（Playlist）视图显示你已创建的播放列表。点击/轻触一个播放列表，会打开播放列表菜单，其中有两个选项：“删除”（Delete）或“全部播放”（Play\
    \ all）。\n\n还有一个“新建播放列表”（New Playlist）按钮，允许你创建一个新的播放列表。\n\n当你使用 VLC 播放音乐时，会看到一个设计精良的“正在播放”屏幕（图\
    \ 3-11），你可以通过“上一首”、“暂停/播放”和“下一首”按钮来控制播放。你还可以打开或关闭“随机播放”（Shuffle）模式，该模式会随机顺序播放歌曲。另一个选项是“分享”（Share）按钮；通过它你可以通过\
    \ Windows 应用（如 Twitter、Facebook 和 OneNote）分享歌曲（应用会分享一个 `last.fm` 链接）。\n\n![A978-1-4842-1473-2_3_Fig11_HTML.jpg](img/A978-1-4842-1473-2_3_Fig11_HTML.jpg)\n\
    \n**图 3-11.** VLC 中的“正在播放”屏幕\n\n另外两个选项是收藏按钮和播放列表按钮。收藏按钮会将当前正在播放的歌曲添加到你的收藏夹，而播放列表按钮会显示你当前播放列表中有哪些歌曲。\n"
- fmt: '#### Playing Videos with VLC


    When you select the “videos” tab in VLC, you will see the video collection stored
    on your device. On the left side there is a drop-down where you can select `Videos`,
    `Shows`, or `Camera roll`.


    `Videos` shows your collection of movies, `Shows` displays your TV shows, and
    `Camera roll` shows videos taken by your device’s camera.


    When you play a video (Figure [3-12](#A978-1-4842-1473-2_3_Chapter.html#Fig12)),
    clicking/tapping the screen brings up the video transport controls where you can
    move the slider to jump to any point in the video playing.


    ![A978-1-4842-1473-2_3_Fig12_HTML.jpg](A978-1-4842-1473-2_3_Fig12_HTML.jpg)


    Figure 3-12. Video playback in VLC


    The other controls on the “now playing” screen are a lock button that stops any
    of the now playing buttons from being pressed. The next button gives you options
    to switch audio tracks, turn on subtitles, and select subtitle files. The “Audio
    tracks” button enables you to select from different audio tracks. (Some movie
    and TV shows have multiple sound tracks, and this is where you can select from
    the tracks.)


    **Information**


    One of the main uses of audio tracks outside of allowing for different languages
    is for director commentaries.


    The subtitles button enables you to display subtitles in the video (not all videos
    have subtitles).


    If you have a subtitle file located in a different place to the video, you can
    use the `Select Subtitle` option to browse for the subtitle file (normally `.srt`
    files).


    Also in the “now playing” view you can change the playback of the video, and the
    button labeled with three dots brings up a speed option where you can increase
    or decrease the speed of the video.


    To get back to the main view, select the `Back` button on the top right of the
    display.


    #### File Explorer


    The other view in VLC is called “files” (see Figure [3-13](#A978-1-4842-1473-2_3_Chapter.html#Fig13)).
    This enables you to browse the device for music and videos. There is a drop-down
    option where you can select either music, videos, or files.


    ![A978-1-4842-1473-2_3_Fig13_HTML.jpg](A978-1-4842-1473-2_3_Fig13_HTML.jpg)


    Figure 3-13. Files in VLC


    When “music” is selected, you can browse the music folders that the app is watching
    (see the first part of this section for information on watched folders). If “videos”
    is selected, it will show you files in your video folders. You can then select
    a file you want VLC to play.


    If you select an extra drive (e.g., SD card or external hard drive), you can browse
    the external source for media files.


    #### Extra Options


    There are some other options that you get with VLC that are available in the menu
    bar. Select menu button in the title bar to display the options.


    There is a `File` button that enables you to browse for media files anywhere on
    the local PC file or phone’s file system. When you select a file, VLC will start
    playing it.


    The `Stream` button opens a box where you can type in or paste a URL for a music
    or video stream.


    At the time of writing, VLC is still in development, so there will probably be
    more features added over time. It is an app worth adding to your collection.


    ### Other Apps in the Store


    While there are a plethora of other video apps in the Windows Store, many of these
    are purely links to movies or shows on the Web or are specifically linked to some
    form of server product (for example, Emby, which we cover in [Chapter 6](#A978-1-4842-1473-2_6_Chapter.html)).
    Most store apps have a trial version, and we always advise trying them before
    you buy.


    One other notable video app is `PressPlay`, which is a video player for Windows
    10 that will play media on removable devices. It will play MKV files and FLV (Flash
    videos) and has subtitle support. The app is free from the Windows Store.


    You’ve now seen how you can play your own video files and how to stream movies
    using both Microsoft’s own app and popular third-party services such as Netflix
    and YouTube. However, you have probably heard stories of people taking their phone
    abroad and running up huge bills or even just being billed for exceeding their
    home broadband allowance. In the next section, we’ll explain how Windows 10 can
    help you avoid such unexpected charges.


    ## Using the Data Sense App


    If you are using Windows 10 on a mobile device with a metered Internet connection,
    Windows 10 has an app to help you avoid surprise bills from your mobile provider.
    This is particularly useful with video applications, which can use a lot of bandwidth.


    Both the mobile and desktop versions have a section in the Settings part of the
    OS called `Data usage`. This app, which is also known as `Data Sense`, displays
    the amount of data consumed and which apps are using it.


    Go to Settings (accessible from the Start menu), and in `Network and Wireless`
    (or `Network and Internet` on a PC) section, you will see a “Data usage” section
    (see Figure [3-14](#A978-1-4842-1473-2_3_Chapter.html#Fig14)).


    ![A978-1-4842-1473-2_3_Fig14_HTML.jpg](A978-1-4842-1473-2_3_Fig14_HTML.jpg)


    Figure 3-14. Overview in Data Sense


    In `Overview` (Figure [3-14](#A978-1-4842-1473-2_3_Chapter.html#Fig14)), the app
    shows you how much data you have consumed via the mobile connection and how much
    has been used over Wi-Fi.


    To find out which apps have been using the data, select “Usage details.”


    In the “App usage” section (Figure [3-15](#A978-1-4842-1473-2_3_Chapter.html#Fig15)),
    the app displays the amount of data used by each app, starting with the app that
    uses the most data at the top of the list.


    ![A978-1-4842-1473-2_3_Fig15_HTML.jpg](A978-1-4842-1473-2_3_Fig15_HTML.jpg)


    Figure 3-15. App usage in Data Sense


    Using this app, you can see whether your Netflix watching is using up all your
    data or whether streaming music is taking up all your allowance.


    ## Summary


    You have now looked at all the different ways you can use Windows 10 to watch
    videos from your own collection, from the Windows Store, from Netflix, and from
    YouTube.


    You also explored how other video apps, particularly VLC, can help you watch all
    your different video formats. Finally, we showed how you can use Windows 10’s
    `Data Sense` app to prevent a surprise bill when streaming video.


    Many of us may have older devices in our home networks as well as Windows 10;
    in the next chapter, you will look how you can use the media store on Windows
    7 and 8 devices as well as Windows 10 to stream all around your house.


    # 4. Streaming Your Media Collection from Windows Devices


    One of the questions we often get asked on The Digital Lifestyle show is how to
    send music and video to other computers in the home. This might, for example,
    be sending music from your main PC to a networked PC in another room connected
    to your stereo, or might be sending video from a PC to a tablet in a bedroom.
    This has often proved more than a little challenging. In this chapter, you will
    see how those older versions and Windows 10 meet this challenge.


    With Windows 10 you can access music and videos stored on other Windows devices
    in your home even if they are running an older version of Windows. In this chapter,
    you will learn how to set up Windows 7, Windows 8.1, and Windows 10 to serve content
    to your Windows 10 devices.


    There are a few different options for connecting to Windows PCs; we will cover
    setting up file shares, using a Windows homegroup, and using Windows Media Player
    to act as a server.


    **Information**


    Homegroups and network sharing work more or less the same across Windows 7 (and
    Windows Home Server), Windows 8.1, and Windows 10, so these instruction will work
    on whichever platform you are on.'
