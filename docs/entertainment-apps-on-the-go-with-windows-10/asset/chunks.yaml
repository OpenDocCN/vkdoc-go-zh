    Read more about Groove Music Pass subscriptions earlier in this chapter.


    To show music stored only on your phone and available to play without an Internet
    connection, you select the “Available offline” option. If you want to see music
    only from OneDrive or your Groove Music Pass subscription, select Streaming.


    In the Sort section, you can have the music sorted alphabetically, and if you
    are in the Albums view, you also get an Artist option.


    Note


    In any of the Albums, Artists, and Songs views, there is “Shuffle all” button
    that will play your music in a random order.


    Up to now you have been looking at Groove on Windows 10 devices be they PC, tablet,
    laptop, or phone. What if you have an Android phone or an iPhone? Fortunately,
    Microsoft has recently become rather surprisingly good at putting its applications
    on these competing platforms. This includes the Groove app, and in the next section
    you will look at using this app on Android and iOS devices.


    ### Groove with Android Devices and iPhones


    One of the great things about Microsoft’s Groove music service is that as well
    as working on Windows PCs, phones, and tablets, it works on Android devices and
    iPhones. The iOS and Android versions of the app are not designed to be music
    players for music stored on the phone or tablet but players for music stored in
    OneDrive or from a Groove Music Pass subscription. See [Chapter 2](#A978-1-4842-1473-2_2_Chapter.html)
    to learn about storing your music collection in OneDrive.


    #### Android Devices


    To use Groove on Android, head to the Google Play Store and search for Groove
    Music. Once installed, run the app, and it will ask you for your Microsoft account
    login. This is the account you have used with Windows to upload your collection
    to OneDrive or you used when you subscribed to a Groove.


    Once you have logged into the app, you are presented with your music collection.
    Your collection can be viewed by artist, album, song, and genre. To view your
    collection by artist, click the Artists tab (Figure [1-13](#A978-1-4842-1473-2_1_Chapter.html#Fig13)).


    ![A978-1-4842-1473-2_1_Fig13_HTML.jpg](A978-1-4842-1473-2_1_Fig13_HTML.jpg)


    Figure 1-13.


    Artists view on Android


    When you select an artist, the app shows albums in your collection in the My Albums
    section, and if you have a Groove Music Pass subscription, you will see an All
    Albums section with albums from the artist that are not in your collection.


    To play an album, tap the album image. To view the tracks on the album, tap the
    album title, and you will see all the songs on the album. Tap a song to pay it.


    There is also a Bio section. When viewing an artist, this gives you background
    information about the artist.


    With the app you can also search for a song, artist, or album. To perform a search,
    tap the menu button, and in the search box type in what you are looking for. The
    app will list matching results starting with artists and then albums and below
    that songs.


    ##### Offline Playback


    With the music app, you can download songs so that you can play them offline without
    an Internet connection.


    In the Collections view, scroll up to the top of the list, and you will see a
    drop-down menu that by default says “All music.” This option means that all the
    music in your collection is shown. To see only the music you have downloaded,
    change it to “Available offline.” To see only music stored in the cloud, change
    it to “Available online only.”


    To download music to your Android device, tap and hold a song, artist, or album
    and select “Make available offline.” This will download the selection to the device
    ready for offline playback.


    Note


    Downloaded music can be played only with the Groove app. You can’t use third-party
    Android apps to play music from Groove.


    ##### Radio


    As with the Windows PC version of the Groove, if you have a Groove Music Pass
    subscription, you can create a custom radio station based on an artist. To get
    started, tap the menu button on the top left of the app and select the Radio option.
    Next you enter an artist name or select from the recommended artists. The app
    will create a custom playlist based on the artist you selected, and it will store
    it in the Recent section for accessing later.'
  trans: '

    ### 播放音乐


    打开音乐应用后，它会按专辑显示你的音乐收藏（图 1-12）。你可以更改视图，让应用按艺术家、歌曲或播放列表显示音乐。


    ![A978-1-4842-1473-2_1_Fig12_HTML.jpg](img/A978-1-4842-1473-2_1_Fig12_HTML.jpg)


    图 1-12。Windows Mobile 专辑视图


    若要切换到不同视图，请点击应用左上角的菜单图标。点击菜单图标后，会滑出一个列表，你会在其中看到以下按钮：`Recent Plays`（最近播放）、`Albums`（专辑）、`Artist`（艺术家）、`Songs`（歌曲）、`Playlist`（播放列表）、`Radio`（广播）和`Explorer`（资源管理器）。你将在本节稍后部分了解`Radio`（广播）和`Explorer`（资源管理器）；现在，点击`Albums`（专辑）视图，它将按字母顺序列出你的收藏。


    要播放专辑，请点击位于专辑封面图像上的`Play`（播放）按钮。应用将开始播放专辑中的第一首歌曲。


    如果你点击专辑，它将带你进入专辑页面。要播放整张专辑，请点击`Play All`（全部播放）按钮。要播放单首曲目，请点击歌曲名称。


    此视图中的其他选项是`Add To`（添加到）和`More`（更多）。`Add To`（添加到）按钮可将专辑添加到播放列表或`Now Playing`（正在播放）栏（即当前歌曲选择列表）中。添加到此处会将歌曲添加到`Now
    Playing`（正在播放）栏的末尾。


    要添加到播放列表，请点击要添加到的播放列表（有关播放列表的信息，请参阅本章前面的“播放音乐”部分）。


    `More`（更多）按钮会显示以下附加菜单选项：`Delete`（删除）、`See Artist`（查看艺术家）和`Download`（下载）。


    - `Delete`（删除）选项可从你的收藏中删除此专辑。

    - `See Artist`（查看艺术家）将带你进入艺术家页面（与从`Artists`（艺术家）视图中选择艺术家相同）。

    - `Download`（下载）选项仅在所选专辑存储在云端时显示。选择此选项可将专辑下载到手机以供离线播放。你将在本章后面了解离线播放和云端存储的文件。


    当你开始播放专辑或歌曲时，它将带你进入“Now playing”（正在播放）视图。在此视图中，有返回上一曲目、暂停播放和跳到下一曲目的按钮。还有一个`Repeat`（重复）按钮，选中后将在当前歌曲或播放列表播放完毕后重新播放。`Shuffle`（随机播放）按钮可使应用随机顺序播放你的内容。此列表中的最后一个按钮是`More`（更多）按钮，它为你提供将当前歌曲添加到播放列表的选项。


    在“Now playing”（正在播放）视图中，你还会看到一个向下的小箭头。点击此按钮可调出当前播放列表。


    ### 筛选与排序


    当你从视图菜单按钮中选择`Artists`（艺术家）、`Albums`（专辑）或`Songs`（歌曲）时，你会在屏幕顶部看到一个`Refine`（优化）选项。此选项让你能够筛选和排序收藏，从而更轻松地找到音乐。


    `Refine`（优化）选项分为两部分：`Filter`（筛选）和`Sort`（排序）。


    `Filter`（筛选）部分分为`All`（全部）、`Available Offline`（可离线使用）和`Streaming`（流媒体）。当你选择`All`（全部）时，它会显示你所有的音乐收藏，无论是在手机上、存储在`OneDrive`中，还是作为`Groove
    Music Pass`（Groove 音乐通行证）订阅的一部分。


    注意：`OneDrive`是微软的云存储解决方案，你将在第 2 章中了解它。请在本章前面部分阅读关于`Groove Music Pass`（Groove 音乐通行证）订阅的更多信息。


    要仅显示存储在手机上且无需网络连接即可播放的音乐，请选择`Available offline`（可离线使用）选项。如果你只想查看来自`OneDrive`或你的`Groove
    Music Pass`（Groove 音乐通行证）订阅的音乐，请选择`Streaming`（流媒体）。


    在`Sort`（排序）部分，你可以让音乐按字母顺序排序，如果你处于`Albums`（专辑）视图中，还会看到一个`Artist`（艺术家）选项。


    注意：在`Albums`（专辑）、`Artists`（艺术家）和`Songs`（歌曲）视图中的任何一个里，都有一个`Shuffle all`（全部随机播放）按钮，可以随机顺序播放你的音乐。


    到目前为止，你一直在 Windows 10 设备（无论是 PC、平板电脑、笔记本电脑还是手机）上了解`Groove`。如果你有 Android 手机或 iPhone
    怎么办？幸运的是，微软最近在将这些应用推向竞争平台方面做得相当出色。这包括 Groove 应用，在下一节中，你将了解如何在 Android 和 iOS 设备上使用此应用。


    ### 在 Android 设备和 iPhone 上使用 Groove


    微软 Groove 音乐服务的优点之一是，除了能在 Windows PC、手机和平板电脑上运行外，它还能在 Android 设备和 iPhone 上运行。该应用的
    iOS 和 Android 版本并非设计为手机或平板电脑上存储的音乐的播放器，而是用于播放存储在`OneDrive`或来自`Groove Music Pass`（Groove
    音乐通行证）订阅的音乐。请参阅第 2 章了解如何将音乐收藏存储在`OneDrive`中。


    #### Android 设备


    要在 Android 上使用 Groove，请前往 Google Play 商店并搜索`Groove Music`。安装完成后，运行该应用，它会要求你登录
    Microsoft 帐户。这是你用来在 Windows 上将收藏上传到`OneDrive`，或订阅 Groove 时使用的帐户。


    登录到应用后，你会看到自己的音乐收藏。你可以按艺术家、专辑、歌曲和流派查看收藏。要按艺术家查看收藏，请点击`Artists`（艺术家）选项卡（图 1-13）。


    ![A978-1-4842-1473-2_1_Fig13_HTML.jpg](img/A978-1-4842-1473-2_1_Fig13_HTML.jpg)


    图 1-13。Android 上的艺术家视图


    当你选择一位艺术家时，应用会在`My Albums`（我的专辑）部分显示你收藏中的专辑，如果你有`Groove Music Pass`（Groove 音乐通行证）订阅，你还会看到一个`All
    Albums`（所有专辑）部分，其中包含该艺术家不在你收藏中的专辑。


    要播放专辑，请点击专辑图像。要查看专辑中的曲目，请点击专辑标题，你会看到专辑中的所有歌曲。点击一首歌曲即可播放。


    还有一个`Bio`（简介）部分。当查看艺术家时，这里会提供关于该艺术家的背景信息。


    使用该应用，你还可以搜索歌曲、艺术家或专辑。要执行搜索，请点击菜单按钮，然后在搜索框中输入你要查找的内容。应用将列出匹配的结果，以艺术家开头，然后是专辑，再下面是歌曲。


    ##### 离线播放


    使用音乐应用，你可以下载歌曲，以便在没有网络连接的情况下离线播放。


    在`Collections`（收藏）视图中，向上滚动到列表顶部，你会看到一个下拉菜单，默认显示`All music`（所有音乐）。此选项表示显示你收藏中的所有音乐。要仅查看已下载的音乐，请将其更改为`Available
    offline`（可离线使用）。要仅查看存储在云端的音乐，请将其更改为`Available online only`（仅在线可用）。


    要将音乐下载到你的 Android 设备，请长按一首歌曲、一位艺术家或一张专辑，然后选择`Make available offline`（设为可离线使用）。这将把所选内容下载到设备上，以备离线播放。


    注意：下载的音乐只能通过 Groove 应用播放。你不能使用第三方 Android 应用来播放来自 Groove 的音乐。


    ##### 广播


    与 Windows PC 版 Groove 一样，如果你拥有`Groove Music Pass`（Groove 音乐通行证）订阅，你可以基于一位艺术家创建自定义广播电台。首先，点击应用左上角的菜单按钮，然后选择`Radio`（广播）选项。接下来，输入一位艺术家的名称或从推荐的艺术家中选择。应用将根据你选择的艺术家创建一个自定义播放列表，并将其存储在`Recent`（最近）部分中，以便稍后访问。

