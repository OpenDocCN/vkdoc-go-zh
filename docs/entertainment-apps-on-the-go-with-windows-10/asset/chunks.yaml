- fmt: '### Playing TV Shows


    To play TV shows, click the **TV Shows** icon on the start page. This will list
    your TV collection just as the Movies view, but with TV shows, it groups together
    TV shows (Figure [6-13](#A978-1-4842-1473-2_6_Chapter.html#Fig13)).


    ![A978-1-4842-1473-2_6_Fig13_HTML.jpg](A978-1-4842-1473-2_6_Fig13_HTML.jpg)


    Figure 6-13. TV shows in the Plex app


    Clicking on a TV show will then display the TV sessions (Figure [6-14](#A978-1-4842-1473-2_6_Chapter.html#Fig14))


    ![A978-1-4842-1473-2_6_Fig14_HTML.jpg](A978-1-4842-1473-2_6_Fig14_HTML.jpg)


    Figure 6-14. TV season view in the Plex app


    You can then select a season to list individual episodes. To play an episode,
    click it. Plex will display information about the episode, and you can click the
    **Play** button to start it playing.


    On some episodes, there will be an orange circle (Figure [6-15](#A978-1-4842-1473-2_6_Chapter.html#Fig15)).
    This indicates that you haven’t watched this video yet. As with playing a movie,
    you can control the playback from the "Now playing" controls and stream the TV
    show to another Plex app on your network using the **Connect To** button.


    ![A978-1-4842-1473-2_6_Fig15_HTML.jpg](A978-1-4842-1473-2_6_Fig15_HTML.jpg)


    Figure 6-15. Orange not-yet-played indicator in the Plex app


    ### Playing Music


    You can also play music via the Plex app by clicking the **Music** icon on the
    start page of the app. Your music collection will be listed alphabetically, and
    as with the movies collection, you can filter and sort your collection. To filter
    your collection, click the **filter** button, and then select your filter criteria;
    you can also select the sort order by clicking the required option.


    You can also change the Music view (Figure [6-16](#A978-1-4842-1473-2_6_Chapter.html#Fig16)).
    By default Plex lists the content by artist, but you can change this by clicking
    the **view** button and then selecting your required view. So, to show your collection
    by album, click the **View** button and select **Album**.


    ![A978-1-4842-1473-2_6_Fig16_HTML.jpg](A978-1-4842-1473-2_6_Fig16_HTML.jpg)


    Figure 6-16. Music view in the Plex App


    To play an album, click the album cover and then click the first track (Figure
    [6-17](#A978-1-4842-1473-2_6_Chapter.html#Fig17)). When you are playing music,
    it will bring up the "Now playing" screen, and from this screen, you can select
    another song in the album; you can pause playback, go back to a previous track,
    and jump to the next track. There is also a **Shuffle** button that will play
    your current song selection in a random order and a **Repeat** button that plays
    the current song selection again after it has finished playing.


    ![A978-1-4842-1473-2_6_Fig17_HTML.jpg](A978-1-4842-1473-2_6_Fig17_HTML.jpg)


    Figure 6-17. Album view in the Plex App


    Another feature is the **Queue** button. When you see the button, it means you
    can add the currently selected item to one of the following options:


    - **Play Now**: This plays the current item now.

    - **Shuffle**: This clears the current "Now playing" list and plays the selected
    items in a random order.

    - **Play Next**: This plays the selection after the currently playing song has
    finished.

    - **Add To Up Next**: This adds the selection to the end of the current playlist.

    - **Add to Playlist**: This adds the current selection to a playlist.


    ### Using Plex’s On Deck Feature


    On the start screen of the Plex app, you will see an **On Deck** section (Figure
    [6-18](#A978-1-4842-1473-2_6_Chapter.html#Fig18)). This consists of movies and
    TV shows you are currently watching. There is a progress bar on each of the items
    showing how much of the video you have watched. Click the **Play** icon on the
    image, and it will start playing the video. If you click the video image, it will
    take you to the movie or TV information page.


    ![A978-1-4842-1473-2_6_Fig18_HTML.jpg](A978-1-4842-1473-2_6_Fig18_HTML.jpg)


    Figure 6-18. Plex On Deck Tip


    The Plex app has a lot more features than just those relevant to this book; you
    can go to Plex.TV for a lot more information.


    ## Streaming with the Plex App on a Windows 10 Phone


    If you want to access your media stored on a Plex Media Server on the go, you
    can use the Windows 10 Plex Windows app for phones. With the Plex on a phone,
    you can access movies, TV shows, and music just as you can from the PC version.


    To get started, download the Plex app from the Windows Store. As with the PC version,
    it’s free to install the Plex app from the store, but you can play only one minute
    of music or video. You unlock the app via an in-app purchase, which at the time
    of writing is $4.99 (£3.89).


    > **Tip:** Because Plex is a universal app, once you have unlocked it on a Phone,
    you don’t have to pay again for the Windows 10 PC version, and vice versa.


    Once you have unlocked the app, you log into the app with your Plex account. This
    is the account you used when installing the Plex server.


    When you load the app (Figure [6-19](#A978-1-4842-1473-2_6_Chapter.html#Fig19)),
    you have buttons for the following:


    - Library

    - Channels

    - Recently added

    - Playlists

    - Shared


    ![A978-1-4842-1473-2_6_Fig19_HTML.jpg](A978-1-4842-1473-2_6_Fig19_HTML.jpg)


    Figure 6-19. Plex on Windows 10 Mobile


    To start playing your content, tap the **library** button, and the app will then
    give the icons for movies, music, and photos from each of your Plex servers, from
    Plex apps on your network, and from your phone.


    ### Playing Movies


    To play a movie, tap the **Movies** button, the app will then list all your movies
    on the selected server in alphabetical order, and you can scroll up and down to
    view the content. When you have found the movie you want to watch, just tap it,
    and it will bring up the movie information page. Tap the **Play** button to start
    the playback.


    On the "Now playing" screen, there is a **Play/Pause** button, **Back** and **Next**
    buttons, and a **Connect To** button. To stream the movie to another Plex app
    on your network, tap the **Connect To** button and then select the name of the
    device on your network you want to watch the movie on. The **Connect To** button
    will be highlighted; tap **Play** to start the playback on the remote device.


    To go back to the content list, tap the **Back** button. To go back to the movie
    information page, tap **Back** again and then tap **Back** again to get to the
    movie list.


    In the movie list, you can switch to the **On Deck** and **Recently Added** views
    by swiping right. The **On Deck** view shows movies you are currently watching,
    and you can then tap on a movie and continue viewing it. The **Recently Added**
    view shows items recently added to your collection; tapping the content will bring
    up the movie information page.


    > **Tip:** In any of the movies views, you can select the order the movies are
    listed. To change the order, tap the **Sort** button and select your required
    order.


    ### Playing TV Shows


    You can find the TV section from the main libraries view. When you tap the **TV
    Shows** button, the app takes you to a list of TV shows stored on your server.
    The difference between the movies view and the TV view is that the TV view collates
    seasons and episodes of the show. So, when you tap a TV Show, you will see the
    separate seasons of the show (Figure [6-20](#A978-1-4842-1473-2_6_Chapter.html#Fig20)).
    Tapping a season lists the individual episodes of the show that you tap to start
    playing. The "Now playing" screen works just like the movie version with **Pause**
    and **Connect To** options.


    ![A978-1-4842-1473-2_6_Fig20_HTML.jpg](A978-1-4842-1473-2_6_Fig20_HTML.jpg)


    Figure 6-20. TV season view in Plex on Windows 10 Mobile


    The TV view (Figure [6-21](#A978-1-4842-1473-2_6_Chapter.html#Fig21)) also has
    **On Desk** and **Recently Added** views; as the Movies view does, you can swipe
    right or left to switch views.


    ![A978-1-4842-1473-2_6_Fig21_HTML.jpg](A978-1-4842-1473-2_6_Fig21_HTML.jpg)


    Figure 6-21. TV view in Plex on Windows 10 Mobile'
