    \ or omissions that may be made. The publisher makes no warranty, express or implied,\
    \ with respect to the material contained herein.\n\nDistributed to the book trade\
    \ worldwide by Springer Science+Business Media New York, 233 Spring Street, 6th\
    \ Floor, New York, NY 10013. Phone 1-800-SPRINGER, fax (201) 348-4505, e-mail\
    \ `orders-ny@springer-sbm.com`, or visit `www.springer.com`. Apress Media, LLC\
    \ is a California LLC and the sole member (owner) is Springer Science + Business\
    \ Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a Delaware corporation.\n\
    \nWith thanks to Kim and Ruth for their support and understanding as we wrote\
    \ this book, to the great people at Apress who helped us, and to all our readers\
    \ and listeners who inspired us.\n\n## Introduction\n\nIn more than 10 years of\
    \ hosting our weekly Digital Lifestyle Show, we have seen many methods of storing\
    \ and playing media (be that music, video, or photos) come and go.\n\nAt the start,\
    \ most of our listeners stored their media, if they did so at all, on a Windows\
    \ desktop PC and usually consumed it on the same PC. They might have had some\
    \ sort of MP3 player, and iPods were beginning to make an impact, but it certainly\
    \ wasn’t the diverse marketplace it is now.\n\nWe have seen the growth of both\
    \ Apple’s iOS and Google’s Android platforms, the birth of downloadable media,\
    \ and in recent years the surge of streaming services such as Netflix.\n\nWhile\
    \ in those early days we had a dream of one integrated system where we could listen\
    \ to and view our media on our desktop, phone, and even games platform, this has\
    \ dissolved into a world where media is usually tied to the technology family\
    \ you most use, be it Microsoft, Apple, or Google.\n\nEven within Microsoft’s\
    \ platforms it has become increasingly difficult to find one solution to share\
    \ your media.\n\nThis is why we are really excited by the opportunities Windows\
    \ 10 brings. It has the promise of a universal Windows platform. This is a way\
    \ of allowing apps to run on any variant of Windows 10 on any platform it supports.\
    \ Windows 10 supports a lot of platforms from desktops and laptops to tablets\
    \ and phones to even Xbox One and Raspberry Pi 2.\n\nMicrosoft has also cleverly\
    \ made some of its core media apps from Windows 10 available on other platforms\
    \ including Apple and Google.\n\nWhere your media comes from and how it is stored\
    \ will still depend whether at heart you are a Microsoft, Apple, or Google devotee,\
    \ but Windows 10 holds out the hope of being able to consume that media everywhere.\n\
    \nThis book will help show you how to fulfill that ambition."
