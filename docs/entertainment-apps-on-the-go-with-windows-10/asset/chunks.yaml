    ### 设置


    该应用提供若干有用的设置，可通过点击应用左侧的 `Settings` 按钮找到。通过 `Download Quality` 选项，您可以设置新下载内容的默认画质。默认情况下，该选项设置为“每次都问”，这意味着每次下载文件时，它都会询问您想要高清还是标清画质。您可以在选项列表中选择标清或高清来覆盖默认设置（见图
    3-3 和 3-4）。


    ![A978-1-4842-1473-2_3_Fig4_HTML.jpg](img/A978-1-4842-1473-2_3_Fig4_HTML.jpg)


    图 3-4. 手机上的影视应用设置


    ![A978-1-4842-1473-2_3_Fig3_HTML.jpg](img/A978-1-4842-1473-2_3_Fig3_HTML.jpg)


    图 3-3. 电脑上的影视应用设置界面


    点击“显示我已下载的设备”按钮，会列出已注册为可从您的帐户下载视频的设备。您可以通过前往要移除的设备，在设置中点击“移除此设备”来将其从列表中删除。


    电脑版应用（图 3-3）的另一个选项是“选择我们查找视频的位置”。在这里，您可以告诉影视应用您将视频存储在电脑上的位置。默认情况下，应用会查找 `This
    PC\Videos` 文件夹，您可以通过选择 `+` 按钮来添加其他文件夹。这会打开一个文件夹对话框，您可以在其中浏览文件系统并选择一个文件夹。


    **注意**：请记住，当我们提到电脑版时，指的是用于台式电脑以及 8 英寸及以上尺寸的一体机、笔记本电脑和平板电脑的 Windows 10 版本。小于 8
    英寸的平板电脑和任何 Windows 手机均使用 Windows 10 移动版。


    例如，如果您的电脑上有一个存有视频的第二个硬盘驱动器（在此示例中为 `D:\videos`），您可以执行以下操作：


    -   选择 `+` 按钮。

    -   从文件夹框中选择 `This PC`。

    -   选择 `D:` 驱动器。

    -   选择 `Video` 文件夹。

    -   点击/轻触“将此文件夹添加到视频”。该文件夹的内容将添加到应用中。


    您可以通过点击“选择我们查找视频的位置”对话框中的小 X 将文件夹从应用中移除。


    **信息**：如果您从应用中移除一个文件夹，存储在该文件夹中的视频将不再显示在影视应用中。但是，这些视频不会从系统中删除，并且可以随时重新添加回来。


    本节中的最后一个选项是“恢复我的视频购买记录”。此选项会将您之前从 Windows 商店购买的任何视频添加到应用的影视部分；它不会下载文件，但您可以将这些视频用于流式播放或下载。


    **注意**：只有使用与您当前登录的同一 Windows 帐户进行的购买才会被恢复。不过，这些购买记录可能是在任何其他 Windows 10 设备上进行的，甚至可能是在
    Windows 8 或 Xbox 设备上使用 Xbox Video 应用购买的。


    ### 购买和租赁电影


    在 Windows 8 中，Xbox Video 应用包含一个直接在应用内购买或租赁电影的选项。在 Windows 10 中，此功能已移至独立的 Windows
    商店应用。


    如果您几年前在 Xbox 360 上使用过 Xbox Video，您可能还记得使用 Microsoft Points 作为视频的支付方式。微软已不再使用这些点数，但您需要将支付卡关联到您的
    Microsoft 帐户。然后，该卡可用于从 Windows 商店购买任何内容，包括应用、音乐和视频。


    **信息**：不必担心；如果您的帐户中还有 Microsoft Points 余额，当微软终止点数服务时，它们会自动转换为本地货币。


    当您选择一部视频（无论是电影还是电视节目）时，通常会出现购买或租赁的选项（见图 3-5）。您可能还可以选择标清或高清画质。这些选择取决于节目或电影版权所有者对其的许可方式。


    ![A978-1-4842-1473-2_3_Fig5_HTML.jpg](img/A978-1-4842-1473-2_3_Fig5_HTML.jpg)


    图 3-5. Windows 商店，购买或租赁电影


    如果您选择租赁视频，系统会告知您视频可供播放的时长以及您必须开始观看的截止时间。如果您想保留这部电影，您应该选择购买。


    我们已经介绍了如何使用微软自己的应用播放和购买电影及电视节目，现在让我们来看看一些第三方观看视频的方式，首先从 Netflix 开始。


    ### 在 Windows 10 上使用 Netflix


    Netflix 是一项电影和电视流媒体服务，通过按月订阅费提供广泛的内容。Netflix 提供了适用于 Windows 10 的专用应用，可从 Windows
    商店获取，并可在电脑和手机上运行。


    下载应用后，您需要使用您的 Netflix 帐户登录。如果您没有 Netflix 帐户，可以访问 Netflix.com 查看订阅选项。


    拥有帐户后，您需要输入用户名和密码进行登录。Netflix 会显示一系列内容，您可以左右滚动浏览 Netflix 内容（见图 3-6）。


    ![A978-1-4842-1473-2_3_Fig6_HTML.jpg](img/A978-1-4842-1473-2_3_Fig6_HTML.jpg)


    图 3-6. Windows 10 电脑上的 Netflix


    当您选择一部电影（见图 3-7）或电视节目时，应用会显示该电影或节目的封面图、内容简介以及演员信息。对于电视节目，它还可能显示其他可供观看的剧集和季的信息。


    ![A978-1-4842-1473-2_3_Fig7_HTML.jpg](img/A978-1-4842-1473-2_3_Fig7_HTML.jpg)


    图 3-7. Netflix 上的电影信息


    **信息**：对于没有封面图的电视节目和一些电影，将改用节目中的一个场景图代替。


    要开始播放，请点击/轻触封面图上的播放图标，应用便会开始播放。您还可以选择将电影或电视节目添加到您的个人列表。点击/轻触 `Add to My List`
    按钮可将该标题添加到您的列表中，您可以从应用首页查看该列表。您可以用此功能来构建一个未来想看的电影和电视节目清单。


    **信息**：列表的一个好处是它们会在您的所有 Netflix 应用中同步，因此您可以在手机上将一个电影添加到列表，然后它就会出现在您的电脑和 Xbox 上。


    您还可以通过选择搜索框并输入搜索词来搜索电影标题、电视节目或演员。然后您可以浏览搜索结果并选择您想要的标题。


    Netflix 的另一个不错的功能是您可以为使用您帐户的每个家庭成员创建个人资料，这样您可以为自己和您的孩子分别创建不同的资料。这样一来，Netflix 可以根据每个人的观看记录来推荐内容。


    当您在 Netflix 上开始观看内容时，它会记住您在电影或电视节目中的播放进度，因此如果您决定停止观看一部电影并稍后再看，它会从您上次停下的地方继续播放。此功能在包括手机、智能电视和媒体播放器设备在内的所有设备上也都能同步，因此您可以在电脑上开始观看，在手机上继续，最后在
    Xbox One 上观看完毕。


    **苹果或安卓手机用户**：Netflix 也会在您停止时记住您的进度，并在各设备间共享此信息，这意味着您可以例如在手机上开始观看，然后在您的 Windows
    10 设备或其他设备（如 PlayStation 3 或 4 或智能电视）上继续播放。

