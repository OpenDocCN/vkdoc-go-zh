  \ * time.Millisecond)\n...\n}\n}\n```\n\n首先运行 `chapter9/udp/loadtesting/concurrent`\
  \ 目录下的代码。一旦 UDP 服务器启动，按如下方式运行 `fortio` 工具：\n\n```\n./fortio load -n 200 udp://0.0.0.0:3333/\n\
  ```\n\n该工具会对本地运行在 3000 端口的服务器进行 200 次调用。你将看到类似如下的结果：\n\n```\n...\n00:00:44 I udprunner.go:223>\
