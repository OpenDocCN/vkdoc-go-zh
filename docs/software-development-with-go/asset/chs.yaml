  让我们探索一下代码，了解它具体做了什么。应用程序启动时，它会打开 `/proc/net/sockstat` 目录。成功打开后，代码会读取并解析它，将其转换为适合在控制台显示的格式。


  ```

  const (

  ...

  netstat = "/proc/net/sockstat"

  )

  ...

  func main() {

  fs, err := os.Open(netstat)

  ...

  m := make(map[string]int64)

