  \ 04:10:13 PM] Central API credentials dumped to './config/online_api_credentials.yaml'\n\
  ...\n```\n\n使用 `cscli` 命令行工具，你必须注册到中央服务器。`online_api_credentials.yaml` 文件会被填充注册详情，内容如下：\n\
  \n```\nurl: https://api.crowdsec.net/\nlogin: \npassword: \n```\n\n现在，你可以用中央服务器的数据填充你的数据库了。使用以下命令：\n\
  \n```\n./crowdsec -c ./dev.yaml\n```\n\n你会看到类似下面的输出：\n\n```\n...\nINFO[27-07-2022\
