  \ 所示。\n\n![决策表的截图，显示了根据 IP 地址的分类、特定 IP 被禁止的日期以及检测到 IP 地址的场景。](img/527551_1_En_14_Fig2_HTML.png)\n\
  \n**图 14-2** decisions 表中的数据\n\n该表包含了一些有趣的信息：\n\n- 被禁止的 IP 地址\n- 特定 IP 被禁止的截止日期\n\
  - 检测到 IP 地址的场景\n\n你已经简要了解了如何设置 CrowdSec，并看到了它使用的数据。在下一节中，你将了解 CrowdSec 中一些有趣的部分。你将研究\
  \ CrowdSec 内部某些功能的实现方式，然后查看一个更简单的代码示例，了解如何实现这些功能。\n\n\n\n### 从 CrowdSec 中学习\n\n\
  CrowdSec 作为一个项目相当复杂，它包含了许多值得学习的、非常有趣的内容。在本节中，你将了解 CrowdSec 内部使用的一些有用主题。这些主题同样适用于使用\
  \ Go 语言设计自己的软件。\n\n#### 系统信号处理\n\n作为一个系统，CrowdSec 提供了广泛的功能列表，这些功能被分解为多个不同的模块。将功能分解为模块的原因是为了便于开发、维护和测试。在构建系统时，要记住的关键事项之一是确保所有不同的模块都能够优雅地终止，并且所有资源（如内存、网络连接和磁盘空间）都能被释放。为了确保系统的不同部分能正确关闭，你需要某种协调通信机制，以便了解各个模块何时需要为关闭过程做准备。\n\
  \n想象一个场景：你正在设计一个应用程序，它因某些资源限制而被操作系统终止。应用程序必须意识到这一点，并具备在自身永久关闭之前，独立关闭所有不同模块的能力。你将通过\
  \ `chapter14/signalhandler` 文件夹中的代码示例，了解如何实现这一点。\n\n打开你的终端，并按如下方式运行该示例：\n\n```\n\
  go run main.go\n```\n\n应用程序将持续运行，在终端上打印循环消息，直到你按下 Ctrl+C 将其停止。然后它将打印出以下内容：\n\n```\n\
  2022/07/24 22:31:32 loop1000Times -  0\n2022/07/24 22:31:32 loop100Times -  0\n\
  2022/07/24 22:31:32 loop100Times -  1\n...\n2022/07/24 22:31:32 loop1000Times -\
  \  14\n2022/07/24 22:31:33 loop1000Times -  15\n2022/07/24 22:31:33 loop100Times\
  \ -  15\n^C2022/07/24 22:31:33 SIGTERM received\n2022/07/24 22:31:33 loop1000Times\
  \ - quit\n2022/07/24 22:31:33 loop100Times - quit\n2022/07/24 22:31:33 Complete!\n\
  ```\n\n由于检测到了 Ctrl+C 组合键，应用程序成功实现了优雅关闭。在查看代码之前，图 14-3 展示了应用程序的设计。当你浏览示例代码时，请将图 14-3\
  \ 作为指导。\n\n![](img/527551_1_En_14_Fig3_HTML.jpg)\n\nCrowdSec 系统的流程图从 `main.go` 开始，然后注册信号通道，之后分叉为循环\
  \ 100 次和 1000 次的函数，最后等待函数完成。\n\n**图 14-3** CrowdSec 系统信号处理\n\n以下代码片段展示了如何使用 Go 内置的\
  \ `os/signal` 包来注册系统中断事件（步骤 1）。调用了 `signal.Notify(..)` 函数，传入了将要注册监听的信号。在示例代码中，注册了\
  \ `SIGHUP`、`SIGTERM` 和 `SIGINT`。\n\n```\nfunc main() {\nsignalChan := make(chan\
  \ os.Signal, 1)\nsignal.Notify(signalChan,\nsyscall.SIGHUP,\nsyscall.SIGTERM,\n\
  syscall.SIGINT)\n...\ngo func() {\nfor {\ns := <-signalChan\nswitch s {\ncase syscall.SIGHUP,\
  \ syscall.SIGINT, syscall.SIGTERM:\n...\n}\n}\n}()\n...\n}\n```\n\n以下是对这些信号含义的解释：\n\
  \n- `SIGHUP`：当用于执行应用程序的终端断开、关闭或损坏时，操作系统发送此信号。\n- `SIGTERM`：这是一个通用信号，操作系统用它来指示终止进程或应用程序。\n\
  - `SIGINT`：这也被称为程序中断信号，当检测到 Ctrl+C 组合键时会产生此信号。\n\n代码监听所有这些信号，以确保如果检测到其中任何一个，它都会履行其职责，正确地关闭自己。\n\
  \n`signalChan` 变量是一个接受 `os.Signal` 类型的通道，并在调用 `signal.Notify()` 时作为参数传入。该 goroutine\
  \ 负责在 `for{}` 循环中处理从库接收到的信号（步骤 2）。接收到信号（步骤 6）意味着发生了中断，因此代码必须采取必要步骤来启动关闭流程（步骤 7）。\n\
  \n现在，代码已准备好接收系统事件，并且知道在接收到事件时应该做什么，让我们来看看其他模块或 goroutine 是如何获知这一情况的。示例代码生成了两个 goroutine，如下所示：\n\
  \n```\nfunc main() {\n...\nwg.Add(2)\ngo loop100Times(stop, &wg)\ngo loop1000Times(stop,\
  \ &wg)\nwg.Wait()\nlog.Println(\"Complete!\")\n}\n```\n\n`loop100Times` 和 `loop1000Times`\
  \ 作为 goroutine 被调用（步骤 3），并传递了两个参数：`stop` 和 `wg`。`stop` 变量是一个通道变量，goroutine 函数通过它来了解何时需要停止处理。以下代码片段展示了关闭\
  \ `stop` 通道的代码：\n\n```\nfunc main() {\n...\ngo func() {\nfor {\n...\nswitch s {\n\
  case syscall.SIGHUP, syscall.SIGINT, syscall.SIGTERM:\n...\nclose(stop)\n...\n}\n\
  }\n}()\n...\n}\n```\n\n`close(stop)` 函数关闭了通道，任何正在检查此通道的应用程序部分都会检测到通道上有活动发生，并据此采取行动。检查\
  \ `stop` 通道的代码可以在以下代码片段中看到：\n\n```\nfunc loop100Times(stop <-chan string, wg *sync.WaitGroup)\
  \ {\n...\nfor {\nselect {\ncase <-stop:\nlog.Println(\"loop100Times - quit\")\n\
  return\ndefault:\n...\n}\n}\n}\n```\n\n`loop100Times` 函数在一个 `for{}` 循环内运行，在 `select{}`\
  \ 语句中检查通道条件。为了便于理解，基本上 `for{ select {} }` 代码块可以翻译为：\n\n持续执行 `for` 循环，并在每次循环时检查以下情况：\n\
  \n- `stop` 通道是否有值可读？如果有，则必须停止处理。\n- 否则，只需向控制台打印信息并递增计数器。\n\n相同的逻辑也用于 `loop1000Times`\
  \ 函数，因此其工作原理完全相同。一旦 `stop` 通道关闭，这两个函数都将停止处理，并将计数器值打印到终端。通过通知代码的不同部分系统正在关闭，应用程序实现了优雅关闭自身的状态。\n\
  \n最后要查看的是等待状态（步骤 4）。现在，不同的 goroutine 知道何时关闭，但应用程序只有在 *所有* goroutine 完成其进程后，才能完全关闭自身。这是通过使用\
  \ `sync.WaitGroup` 实现的。以下代码片段展示了 `WaitGroup` 的用法：\n\n```\npackage main\nimport (\n\
  ...\n)\nfunc main() {\n...\nvar wg sync.WaitGroup\n...\nwg.Add(2)\ngo loop100Times(stop,\
  \ &wg)\ngo loop1000Times(stop, &wg)\nwg.Wait()\nlog.Println(\"Complete!\")\n}\n\
  func loop100Times(stop <-chan string, wg *sync.WaitGroup) {\n...\ndefer wg.Done()\n\
  for {\n...\n}\n}\nfunc loop1000Times(stop <-chan string, wg *sync.WaitGroup) {\n\
  ...\ndefer wg.Done()\nfor {\n...\n}\n}\n```\n\n\n\n#### 处理服务依赖关系\n\n像 CrowdSec 这样的复杂应用包含多个同时运行或按计划运行的服务。为了让服务正常运行，需要进行服务协调，以处理服务之间的依赖关系。\n\
  \n图 14-4 展示了 CrowdSec 内部如何使用通道（channel）进行服务协调。\n\n![](img/527551_1_En_14_Fig4_HTML.jpg)\n\
  \n服务协调器的流程图从 `main.go` 开始，然后进入 `startRunSvc`，之后分为两类：`serve`、`servePrometheus`、`serveAPIServer`，并等待信号。\n\
  \n**图 14-4**  \n服务协调\n\n在图 14-4 中，当 CrowdSec 启动时，`apiReady` 通道是服务协调的核心部分。该图显示，`apiServer.Run`\
  \ 函数向 `apiReady` 通道发送一个信号，这允许另一个服务 `servePrometheus` 运行监听端口 6060 的服务器。\n\n以下代码片段展示了\
  \ `StartRunSvc` 函数将 `servePrometheus` 作为一个 goroutine 运行，并传入 `apiReady` 通道，同时在调用\
  \ `Serve` 函数时也传入了同一个通道：\n\n```\npackage main\n\nimport (\n\t\"os\"\n\t...\n)\n\n\
  func StartRunSvc() error {\n\t...\n\tapiReady := make(chan bool, 1)\n\tagentReady\
  \ := make(chan bool, 1)\n\t// 尽早启用性能分析\n\tif cConfig.Prometheus != nil {\n\t\t...\n\
  \t\tgo servePrometheus(cConfig.Prometheus, dbClient, apiReady, agentReady)\n\t}\n\
  \treturn Serve(cConfig, apiReady, agentReady)\n}\n```\n\n只有当 `servePrometheus` 函数能够从\
  \ `apiReady` 通道（`<- apiReady`）读取到值时，它才会启动服务器监听端口 6060，如下列代码片段所示：\n\n```\nfunc servePrometheus(config\
  \ *csconfig.PrometheusCfg, dbClient *database.Client, apiReady chan bool, agentReady\
  \ chan bool) {\n\t...\n\t<-apiReady\n\t...\n\tif err := http.ListenAndServe(fmt.Sprintf(\"\
  %s:%d\", config.ListenAddr, config.ListenPort), nil); err != nil {\n\t\tlog.Warningf(\"\
  prometheus: %s\", err)\n\t}\n}\n```\n\n`apiReady` 通道仅在 CrowdSec API 服务器成功运行后才被设置，如下列代码片段所示。`serveAPIServer`\
  \ 函数在调用 `apiServer.Run(..)` 函数时会产生另一个 goroutine，在该 goroutine 中，当 API 服务器启动时，会向 `apiReady`\
  \ 通道发送一个值。\n\n```\nfunc serveAPIServer(apiServer *apiserver.APIServer, apiReady\
  \ chan bool) {\n\tapiTomb.Go(func() error {\n\t\t...\n\t\tgo func() {\n\t\t\t...\n\
  \t\t\tif err := apiServer.Run(apiReady); err != nil {\n\t\t\t\tlog.Fatalf(err.Error())\n\
  \t\t\t}\n\t\t}()\n\t\t...\n\t})\n}\n\nfunc (s *APIServer) Run(apiReady chan bool)\
  \ error {\n\t...\n\ts.httpServerTomb.Go(func() error {\n\t\tgo func() {\n\t\t\t\
  apiReady <- true\n\t\t\t...\n\t\t}()\n\t\t...\n\t})\n\treturn nil\n}\n```\n\n让我们来看看\
  \ `chapter14/services` 文件夹中一个更简单的服务协调示例。该示例代码演示了如何在两个不同的服务 `serviceA` 和 `serviceB`\
  \ 之间使用服务协调。打开终端，确保你在正确的 `chapter14/services` 目录下，并按如下方式运行代码：\n\n```\ngo run main.go\n\
  ```\n\n你将得到类似如下的输出：\n\n```\n2022/07/26 20:40:20 ....正在启动 serviceB\n2022/07/26 20:40:21\
  \ ....serviceB 完成\n2022/07/26 20:40:21 ..正在启动 serviceA\n2022/07/26 20:40:23 ..serviceA\
  \ 完成\n```\n\n由于代码在 goroutine 中运行，你控制台上打印的输出顺序可能会有所不同；但服务将会正确运行。以下代码展示了将服务作为 goroutine\
  \ 运行的代码：\n\n```\nfunc main() {\n\tserviceBDone := make(chan bool, 1)\n\talldone\
  \ := make(chan bool, 1)\n\tgo serviceB(serviceBDone)\n\tgo serviceA(serviceBDone,\
  \ alldone)\n\t<-alldone\n}\n```\n\n示例应用创建了两个通道。让我们看看每个通道的功能：\n\n- `serviceBDone`：此通道用于通知\
  \ `serviceB` 已完成其工作。\n- `alldone`：此通道用于通知 `serviceA` 已完成其工作，以便应用程序可以退出。\n\n以下代码片段展示了\
  \ `serviceA` 和 `serviceB` 函数：\n\n```\nfunc serviceB(serviceBDone chan bool) {\n\t\
  ...\n\tserviceBDone <- true\n\tlog.Println(\"....serviceB 完成\")\n}\n\n// 第二个服务\n\
  func serviceA(serviceBDone chan bool, finish chan bool) {\n\t<-serviceBDone\n\t\
  ...\n\tlog.Println(\"..serviceA 完成\")\n\tfinish <- true\n}\n```\n\n\n\n#### GeoIP\
  \ 数据库\n\nCrowdSec 使用一个包含 IP 地址地理信息的 GeoIP 数据库。此数据库是在设置“使用 CrowdSec”部分讨论的测试环境时下载的。\n\
  \n在本节中，你将深入了解此数据库，并学习如何读取其中的数据。该数据库的用例之一是能够为你基础设施中的每个传入 IP 打上标签，这对于监控和了解进入基础设施的流量非常有用。GeoIP\
  \ 数据库来自以下网站：[`https://dev.maxmind.com/geoip/geolite2-free-geolocation-data?lang=en#databases`](https://dev.maxmind.com/geoip/geolite2-free-geolocation-data%253Flang%253Den%2523databases)。请仔细阅读该网站以了解许可条款。\n\
  \n示例代码位于 `chapter14/geoip/city` 文件夹中，但在运行之前，你需要指定代码将要使用的 GeoIP 数据库的位置。如果你已经按照“使用\
  \ CrowdSec”部分进行操作，那么你会在 `data` 文件夹中找到一个名为 `GeoLite2-City.mmdb` 的数据库文件。复制该文件的位置以便在代码片段中使用，如下所示。我的文件位置显示在代码片段中。\n\
  \n```\npackage main\n...\nfunc main() {\ndb, err := maxminddb.Open(\"/home/nanik/GolandProjects/cloudprogramminggo/chapter14/geoip/city/GeoLite2-City.mmdb\"\
  )\n...\n}\n```\n\n指定文件位置后，打开终端并按如下方式运行示例：\n\n```\ngo run main.go\n```\n\n你将看到类似以下的输出：\n\
  \n```\nIP : 2.0.0.0/17, Long : 2.338700, Lat : 48.858200, Country : FR, Continent:\
  \ EU\nIP : 2.0.128.0/19, Long : -0.947200, Lat : 47.171600, Country : FR, Continent:\
  \ EU\n...\nIP : 2.0.192.0/18, Long : 2.338700, Lat : 48.858200, Country : FR, Continent:\
  \ EU\nIP : 2.1.0.0/19, Long : 2.338700, Lat : 48.858200, Country : FR, Continent:\
  \ EU\nIP : 2.1.32.0/19, Long : 2.302200, Lat : 44.858601, Country : FR, Continent:\
  \ EU\n...\n```\n\n代码读取数据库以获取 `2.0.0.0` IP 范围内的所有 IP 地址，并打印出在该范围内找到的所有 IP 地址以及相关的国家和大陆信息。让我们仔细阅读代码并了解它如何使用数据库。\n\
  \n数据存储在一个高效打包的单个文件中，因此要读取该数据库，你必须使用另一个库。请使用 [`github.com/oschwald/maxminddb-golang`](http://github.com/oschwald/maxminddb-golang)\
  \ 库。该库的文档可以在 [`https://pkg.go.dev/github.com/oschwald/maxminddb-golang`](https://pkg.go.dev/github.com/oschwald/maxminddb-golang)\
  \ 找到。\n\n该库提供了一个函数，用于将数据转换为结构体。在示例代码中，你创建了自己的结构体来表示将要读取的数据。\n\n```\npackage main\n\
  ...\ntype GeoCityRecord struct {\nContinent struct {\nCode      string         \
  \        `json:\"code\"`\nGeonameId int                    `json:\"geoname_id\"\
  `\nNames     map[string]interface{} `json:\"names\"`\n} `json:\"continent\"`\nCountry\
  \ struct {\nGeonameId int                    `json:\"geoname_id\"`\nIsoCode   string\
  \                 `json:\"iso_code\"`\nNames     map[string]interface{} `json:\"\
  names\"`\n} `json:\"country\"`\nLocation struct {\nAccuracyRadius int     `json:\"\
  accuracy_radius\"`\nLatitude       float32 `json:\"latitude\"`\nLongitude      float32\
  \ `json:\"longitude\"`\nTimeZone       string  `json:\"time_zone\"`\n} `json:\"\
  location\"`\nRegisteredCountry struct {\nGeoNameID int                    `json:\"\
  geoname_id\"`\nIsoCode   string                 `json:\"iso_code\"`\nNames     map[string]interface{}\
  \ `json:\"names\"`\n} `json:\"registered_country\"`\n}\nfunc main() {\n...\n}\n\
  ```\n\n当调用库读取数据时，`GeoCityRecord` 结构体会被填充，如下所示：\n\n```\npackage main\nimport (\n\
  ...\n)\n...\nfunc main() {\n...\n_, network, err := net.ParseCIDR(\"2.0.0.0/8\"\
  )\n...\nfor networks.Next() {\nvar rec interface{}\nr := GeoCityRecord{}\nip, err\
  \ := networks.Network(&rec)\n...\n}\n```\n\n`networks.Next()` 循环遍历找到的记录，并通过调用 `networks.Network(..)`\
  \ 函数从数据库中读取所有地理信息，该函数会填充 `rec` 变量。\n\n`rec` 变量是一个接口，因此代码使用 `json.Marshal(..)` 将内容编组为适当的结构体，由\
  \ `r` 变量定义，如下所示：\n\n```\npackage main\n...\nfunc main() {\n...\nfor networks.Next()\
  \ {\nvar rec interface{}\nr := GeoCityRecord{}\nip, err := networks.Network(&rec)\n\
  ...\nj, _ := json.Marshal(rec)\nerr = json.Unmarshal([]byte(j), &r)\n...\nfmt.Printf(\"\
  IP : %s, Long : %f, Lat : %f, Country : %s, Continent: %s\\n\", ip.String(), r.Location.Longitude,\
  \ r.Location.Latitude,\nr.Country.IsoCode, r.Continent.Code)\n}\n}\n```\n\n一旦 JSON\
  \ 被反编组回 `r` 变量，代码就会将信息打印到控制台。\n\n### 本章小结\n\n在本章中，你不仅了解了 CrowdSec 使用的数据众包收集方式以及社区如何从中受益，还学习了如何在你的应用程序中使用它。\n\
  \n你学习了如何使用通道在操作系统发送系统信号时通知应用程序。你还了解了在启动期间使用通道处理服务依赖关系。最后，你学习了如何读取 GeoIP 数据库，当你想在基础设施中使用该信息进行日志记录或监控\
  \ IP 流量时，这将非常有用。\n\n"
- '# 第六部分 终端用户界面


  ## 15. ANSI 与用户界面


  在本章中，你将学习编写带有用户界面（UI）的命令行应用程序。你将了解如何添加文本样式，例如斜体或粗体文本、不同颜色的文本、使用旋转器（spinner）的 UI
  等等。这种用户界面是通过使用 ANSI 转义码实现的，这些代码包含在终端中执行某些操作的指令。


  你还将了解一个开源库，该库简化了用户界面的编写，它负责处理编写各种 ANSI 转义码以实现炫酷 UI 效果的所有繁重工作。在本章中，你将了解以下内容：


  *   用于用户界面的 ANSI 转义码

  *   用于编写不同类型用户界面的开源库

  *   文本样式，例如斜体和粗体


  ### 源代码


  本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
  仓库获取。




  ### ANSI 转义码


  提供用户界面的终端应用程序通常使用 ANSI 转义码构建。维基百科页面 [`https://en.wikipedia.org/wiki/ANSI_escape_code`](https://en.wikipedia.org/wiki/ANSI_escape_code)
  提供了对 ANSI 码的全面解释：ANSI 转义序列是一种带内信号标准，用于控制视频文本终端和终端模拟器上的光标位置、颜色、字体样式和其他选项。


  借助 ANSI 码，涌现了大量提供丰富终端用户界面的应用程序。


  让我们用一个简单的 Bash 脚本进行实验，使用 ANSI 码打印不同背景色和前景色的文本，如下例脚本所示：


  ```

  for x in {0..8}; do for i in {30..37}; do

  for a in {40..47}; do echo -ne "\e$i;$a""m\\\e[$i;$a""m\e[37;40m "; done

  echo

  done; done

  echo ""

  ```


