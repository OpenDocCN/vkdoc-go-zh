  ### rootfs


  在本节中，你将探索 `rootfs` 以及它在容器中的应用方式。首先，我们来理解 `rootfs` 到底是什么。`rootfs` 代表根文件系统（root filesystem），简单来说，它是包含启动操作系统所需的所有基本必要文件的文件系统。没有正确的
  `rootfs`，操作系统将无法启动，任何应用也无法运行。


  `rootfs` 是必需的，因为它使得操作系统能够挂载其他文件系统，这包括配置、必要的启动进程和数据，以及位于其他磁盘分区中的文件系统。以下展示了 `rootfs`
  中最基本的目录：


  ```

  /bin

  /sbin

  /etc

  /root

  /lib

  /lib/modules

  /dev

  /tmp

  /boot

  /mnt

  /proc

  /usr

  /var,

  /home

  ```


  在容器内部运行应用需要 `rootfs`，这使得应用能够像在正常系统中一样运行。让我们看看一个最小化的 `rootfs` 实际上是什么样子。前往 [`www.alpinelinux.org/downloads/`](http://www.alpinelinux.org/downloads/)
  下载 Alpine 的 `rootfs`。Alpine 是一个非常著名的 Linux 发行版，由于镜像体积小，它在创建容器时被广泛使用。


  从“Mini Root Filesystem”部分下载 rootfs 文件，如图 4-4 所示。如果你使用的是 x86 处理器，请下载 x86_64 文件。


