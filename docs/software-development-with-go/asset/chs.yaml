  \n#### crowdsec.db\n\nCrowdSec 将数据存储在一个名为 `crowdsec.db` 的 SQLite 数据库中。该数据库包含多个表，如图\
  \ 14-1 所示。\n\n![CrowdSec 数据库的截图，包含主要部分、表、警报、弹回器、决策、事件、机器、元数据、SQLite 主表、SQLite 序列和服务器对象。](img/527551_1_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1** CrowdSec 数据库\n\n测试环境在创建数据库时不会填充任何数据，因此你需要设置环境使其与中央服务器同步。为此，你需要首先使用\
