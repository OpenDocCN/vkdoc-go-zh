  代码指定了它想要的过滤器。接下来需要做的是指定 `gopacket` 将用于解析 TCP 原始数据的解析器，这是通过 `httpStreamFactory` 结构体类型完成的，该类型定义了
  `New(..)` 和 `run()` 函数。每当有数据可供应用程序消费时，`gopacket` 会在内部调用这两个函数。


  ```

  type httpStreamFactory struct{}

  func (h *httpStreamFactory) New(net, transport gopacket.Flow) tcpassembly.Stream
  {

  hstream := &httpStream{

  net:       net,

  transport: transport,

  r:         tcpreader.NewReaderStream(),

  }

  ...

  }

  func (h *httpStream) run() {

  buf := bufio.NewReader(&h.r)

  for {

  ...

  }

  }

  ```


  `run()` 函数的主要任务是将原始字节组装并解析成更易读的格式进行打印，如下所示：


  ```

  func (h *httpStream) run() {

  buf := bufio.NewReader(&h.r)

  for {

  req, err := http.ReadRequest(buf)

  if err == io.EOF {

  ...

  }

  ...

  else {

  log.Println("-- Extracted Http Data --")

  for k, v := range req.Header {

  log.Println(k, v[0])

  }

  log.Println(fmt.Sprintf("Proto : %s, Host : %s, Method : %s, URI : %s ", req.Proto,
  req.Host, req.Method, req.RequestURI))

  log.Println("-------------------------")

  ...

  }

  }

  }

  ```


