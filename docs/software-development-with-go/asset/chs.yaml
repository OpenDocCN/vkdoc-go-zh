  #### 使用 BPF 进行捕获


  `gopacket` 提供了过滤应用感兴趣的网络流量的能力，这是通过使用 BPF 实现的。BPF 代表伯克利数据包过滤器，它允许应用程序附加一个过滤器来允许或拒绝通过套接字的特定类型数据。更多详细信息可查阅
  [www.kernel.org/doc/html/latest/networking/filter.xhtml](http://www.kernel.org/doc/html/latest/networking/filter.xhtml)。


  示例代码位于 `chapter11/gopacket/http` 文件夹中。它仅捕获并打印目标端口为 80 的 TCP 流量。按如下方式编译代码：


  ```

  go build -o httponly .

  ```


  使用 root 权限运行代码。将 `<network_device>` 替换为您的本地网络设备。


  ```

  sudo ./httponly -i <network_device>

  ```


