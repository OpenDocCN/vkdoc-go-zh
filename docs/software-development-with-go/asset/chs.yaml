- "# 7. Gosec 与 AST\n\n在本章中，你将学习 AST（抽象语法树），了解它的概念及其重要性。你将通过本章中的不同示例来学习 AST，从而理解 Go\
  \ 源代码到 AST 的转换过程。你还将了解一个名为 gosec 的开源代码安全分析工具。该工具利用 AST 进行代码静态分析，你将看到这个工具是如何执行此过程的。\n\
  \n### 源代码\n\n本章的源代码可在 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
  \ 仓库中获取。\n\n\n\n### 抽象语法树\n\n抽象语法树（亦称语法树）是一种以树形结构表示编程语言源代码的方式。当你用 Go 编写代码并编译时，编译器会首先在内部将源代码转换成一种表示代码的数据结构。这个数据结构会被编译器用作中间表示形式，并在生成机器码之前经历多个处理阶段。图\
  \ 7-1 从高层次展示了编译器在编译代码时经历的不同步骤。\n\n![](img/527551_1_En_7_Fig1_HTML.jpg)\n\n流程图展示了源代码的处理阶段，包括扫描、解析、生成\
  \ AST 以及生成机器码。\n\n图 7-1\n\n编译源代码的阶段\n\n让我们快速对比一下 AST 与原始代码的异同。图 7-2 展示了原始 Go 代码与它在编译过程中转换为\
  \ AST 后的对比。\n\n![](img/527551_1_En_7_Fig2_HTML.jpg)\n\n原始代码（包含包 main、主函数及打印语句）借助抽象语法树转换为最终代码的截图对比。\n\
  \n图 7-2\n\n原始代码 vs. AST\n\n对于普通人来说，AST 看起来就像一堆文本，但对编译器来说它非常有用，因为这种数据结构允许编译器遍历代码的不同部分以检查错误、警告及其他许多问题。\n\
  \nGo 提供了一个内置模块，使应用程序能够轻松地将源代码转换为 AST。这个模块被诸如 `golanci-lint`（`github.com/golangci/golangci-lint`）这类工具用于读取和检查\
  \ Go 源代码。\n\nAST 的数据结构是什么样的？图 7-3 简要展示了 AST 的结构。\n\n![](img/527551_1_En_7_Fig3_HTML.jpg)\n\
  \n`Ast.Node` 的分类图，分为三大类：`ast.Declaration`、`ImportSpec` 和 `Identification`。其中 `ast.Declaration`\
  \ 进一步细分为 `GenDecl` 和 `FunDecl`。\n\n图 7-3\n\nAST 结构\n\n表 7-1 简要说明了这些不同的结构。\n\n表 7-1\n\
  \n不同结构\n\n| `Ast.Node`   | 这是其他结构必须实现的主要接口                     |\n|--------------|----------------------------------------------------|\n\
  | `ast.FuncDecl`  | 表示类似函数声明的结构，例如 `func myfunc(){ }`    |\n| `ast.GenDecl`   |\
  \ 表示通用声明的结构，例如 `var x = \"a string\"`      |\n| `ast.ImportSpec` | 表示导入声明的结构，例如\
  \ `import \"go/token\"`       |\n\n有许多实际应用场景受益于使用 AST：\n\n- **代码生成器**：这类应用程序需要使用\
  \ AST 来生成源代码。\n- **静态代码分析器**：像 `gosec`（本章将讨论）这样的工具广泛使用 AST 来读取源代码并识别安全问题。\n- **代码覆盖率**：这类工具需要\
  \ AST 来衡量应用程序的测试覆盖率，并利用 AST 执行其操作。\n\n#### 模块\n\n本章你将使用的模块是 `go/parser` 和 `go/ast`。它们的官方文档分别位于\
  \ [`https://pkg.go.dev/go/parser`](https://pkg.go.dev/go/parser) 和 [`https://pkg.go.dev/go/ast`](https://pkg.go.dev/go/ast)。每个模块提供不同的功能，具体如下：\n\
  \n- `go/parser`：该模块提供对 Go 源文件的解析能力。输入内容可以来自字符串或文件名，解析结果是一个源文件的 AST 结构。\n- `go/ast`：解析源文件后的返回值类型是\
  \ `go/ast`，该模块允许应用程序遍历源文件中不同的 AST 结构。这个模块提供了应用程序将使用的 AST 数据结构。\n\n在下一节中，通过查看不同的示例，你将更清楚地了解\
  \ AST 的工作原理。\n\n#### 示例代码\n\n在本节中，你将使用不同的 Go AST 模块探索多个示例。这些示例将让你深入了解如何使用不同的 AST\
  \ 模块，以及可以用 AST 结果做什么。\n\n##### 检查（Inspecting）\n\n运行 `chapter7/samplecode/inspecting`\
  \ 文件夹内的代码，命令如下：\n\n```\ngo run main.go\n```\n\n你将得到以下输出：\n\n```\n2:9:\tid: p\n3:7:\t\
  id: c\n3:11:\tbl: 1.0\n4:5:\tid: X\n4:9:\tid: f\n4:11:\tbl: 3.14\n4:17:\tbl: 2\n\
  4:21:\tid: c\n```\n\n这段代码为调用 AST 函数时提供的代码创建了一个 AST 数据结构，并过滤出其中声明的常量和变量。让我们逐段分析示例代码，理解各部分的作用。\n\
  \n代码声明了一个名为 `src` 的变量，其中包含源代码。这是一个简单的 Go 代码，包含 `const` 和 `var` 声明。成功解析源代码后会返回 `ast.File`\
  \ 类型。`ast.File` 包含了代码的 AST 数据结构，代码将利用它进行遍历。\n\n```\npackage main\nimport (\n...\n\
  )\nfunc main() {\nsrc := `\npackage p\nconst c = 1.0\nvar X = f(3.14)*2 + c\n`\n\
  fset := token.NewFileSet()\nf, err := parser.ParseFile(fset, \"\", src, 0)\n...\n\
  }\n```\n\n`ast.File` 在 `go/ast` 模块中定义，声明如下：\n\n```\ntype File struct {\nDoc    \
  \    *CommentGroup\nPackage    token.Pos\nName       *Ident\nDecls      []Decl\n\
  Scope      *Scope\nImports    []*ImportSpec\nUnresolved []*Ident\nComments   []*CommentGroup\n\
  }\n```\n\n代码随后使用 `ast.Inspect(..)` 函数遍历 AST 数据结构，并调用声明的函数。作为参数传递给 `ast.Inspect(..)`\
  \ 的简单函数会检查接收到的 `ast.Node` 类型，只过滤出 `ast.BasicLit` 和 `ast.Ident`。这里的 `ast.Node` 与我们在图\
  \ 7-2 中讨论的相同。\n\n```\npackage main\nimport (\n...\n)\nfunc main() {\n...\nast.Inspect(f,\
  \ func(n ast.Node) bool {\nvar s string\nswitch x := n.(type) {\ncase *ast.BasicLit:\n\
  s = \"bl: \" + x.Value\ncase *ast.Ident:\ns = \"id: \" + x.Name\n}\nif s != \"\"\
  \ {\nfmt.Printf(\"%s:\\t%s\\n\", fset.Position(n.Pos()), s)\n}\nreturn true\n})\n\
  }\n```\n\n`ast.Inspect(..)` 是 `go/ast` 模块提供的主要函数，用于在 Go 中遍历 AST 树。表 7-2 解释了 `ast.BasicLit`\
  \ 和 `ast.Ident`。\n\n表 7-2\n\n`ast.BasicLit` 和 `ast.Ident`\n\n| `ast.BasicLit` |\
  \ 表示基本类型的节点，即已声明的变量或常量的值 |\n|---------------|---------------------------------------------|\n\
  | `ast.Ident`   | 表示标识符。这在 Go 语言规范（[`https://go.dev/ref/spec#Identifiers`](https://go.dev/ref/spec%2523Identifiers)）中有明确定义。\
  \ |\n\n\n\n##### 解析文件\n\n本节中的示例代码创建了一个 `main.go` 的 AST 数据结构，该结构会打印出导入的不同模块名称、代码中声明的函数名称以及\
  \ return 语句所在的行号。代码位于 `chapter7/samplecode/parsing` 目录下。在终端中按如下方式运行示例：\n\n```\n\
  go run main.go\n```\n\n您将看到以下输出：\n\n```\n2022/07/02 16:28:05 Imports:\n2022/07/02\
  \ 16:28:05   \"fmt\"\n2022/07/02 16:28:05   \"go/ast\"\n2022/07/02 16:28:05   \"\
  go/parser\"\n2022/07/02 16:28:05   \"go/token\"\n2022/07/02 16:28:05   \"log\"\n\
  2022/07/02 16:28:05 Functions:\n2022/07/02 16:28:05   main\n2022/07/02 16:28:05\
  \ return statement found in line 36:\n2022/07/02 16:28:05 return statement found\
  \ in line 39:\n```\n\n该示例使用了相同的 `parser.ParseFile(..)` 和 `ast.Inspect(..)` 函数，如下所示：\n\
  \n```\npackage main\nimport (\n...\n)\nfunc main() {\n...\nf, err := parser.ParseFile(fset,\
  \ \"./main.go\", nil, 0)\n...\nast.Inspect(f, func(n ast.Node) bool {\nret, ok :=\
  \ n.(*ast.ReturnStmt)\nif ok {\n...\n}\nreturn true\n})\n}\n```\n\n`ast.Inspect(..)`\
  \ 内部的函数仅打印类型为 `ast.ReturnStmt`（代表 return 语句）的节点；其他内容则被忽略。它用于打印导入信息的其他函数如下所示：\n\n\
  ```\npackage main\nimport (\n...\n)\nfunc main() {\n...\nf, err := parser.ParseFile(fset,\
  \ \"./main.go\", nil, 0)\n...\nlog.Println(\"Imports:\")\nfor _, i := range f.Imports\
  \ {\nlog.Println(\" \", i.Path.Value)\n}\n...\n}\n```\n\n`ParseFile` 的返回值是 `ast.File`，该结构中的一个字段是\
  \ `Imports`，其中包含了源代码中声明的所有导入项。代码通过循环遍历 `Imports` 字段，并将导入的名称打印到控制台。代码还会打印声明的函数名称，这是通过以下代码实现的：\n\
  \n```\nfunc main() {\n...\nfor _, f := range f.Decls {\nfn, ok := f.(*ast.FuncDecl)\n\
  ...\nlog.Println(\" \", fn.Name.Name)\n}\n}\n```\n\n`Decls` 字段包含了源代码中的所有声明，并过滤出仅包含函数声明的\
  \ `ast.FuncDecl` 类型。\n\n您已经了解了不同的 AST 示例代码，现在应该更好地理解如何使用它以及可以从中获取哪些信息。在下一节中，您将了解\
  \ AST 如何在一个开源安全项目中使用。\n\n### gosec\n\ngosec 项目是一个开源工具 (`https://github.com/securego/gosec`)，提供安全静态代码分析。该工具为\
  \ Go 语言提供了一组安全代码最佳实践，它会扫描您的源代码，检查是否有任何违反这些规则的代码。\n\n如果您使用的是 Go 1.16 及以上版本，请使用以下命令安装它：\n\
  \n```\ngo install github.com/securego/gosec/v2/cmd/gosec@latest\n```\n\n安装完成后，打开您的终端，将目录切换到\
  \ `chapter7/samplecode`，然后执行以下命令：\n\n```\ngosec  ./...\n```\n\n该工具将递归扫描您的示例代码，并将消息打印到控制台。\n\
  \n```\n[gosec] 2022/07/02 17:00:11 Including rules: default\n...\nResults:\n...\n\
  - G104 (CWE-703): Errors unhandled. (Confidence: HIGH, Severity: LOW)\n22:\n> 23:\
  \         ast.Print(fset, f)\n24: }\nSummary:\nGosec  : dev\nFiles  : 3\nLines \
  \ : 105\nNosec  : 0\nIssues : 1\n```\n\n该工具会递归扫描目录中的所有 `.go` 文件，并在完成解析和扫描过程后打印最终结果。在我的目录中，它发现了一个问题，标记为\
  \ G104。该工具能够通过使用 `go/ast` 模块执行代码分析，方法与这些示例类似。\n\n#### gosec 内部机制\n\n图 7-4 从高层次展示了\
  \ gosec 的工作原理。\n\n![](img/527551_1_En_7_Fig4_HTML.jpg)\n\n一个表示高层级流程的流程图：加载配置、加载规则、新分析器、包解析、处理包、报告、以及循环遍历包。\n\
  \n**图 7-4** Gosec 高层级流程图\n\n该工具会加载内部已定义的规则（步骤 1）。这些规则定义了一些函数，用于检查正在处理的代码。下一节将对此进行详细讨论。\n\
  \n规则加载完成后，它会继续处理作为参数给定的目录，并递归获取所有找到的 `.go` 文件（步骤 4）。这是通过以下代码（`helpers.go`）执行的：\n\
  \n```\nfunc PackagePaths(root string, excludes []*regexp.Regexp) ([]string, error)\
  \ {\n...\nerr := filepath.Walk(root, func(path string, f os.FileInfo, err error)\
  \ error {\nif filepath.Ext(path) == \".go\" {\npath = filepath.Dir(path)\nif isExcluded(filepath.ToSlash(path),\
  \ excludes) {\nreturn nil\n}\npaths[path] = true\n}\nreturn nil\n})\n...\nresult\
  \ := []string{}\nfor path := range paths {\nresult = append(result, path)\n}\nreturn\
  \ result, nil\n}\n```\n\n`PackagePaths(..)` 函数使用 Go 内部模块 `path/filepath` 遍历目录，以收集所有包含\
  \ `.go` 源代码的不同目录。在成功收集所有目录名称后，它会调用 `Process(..)` 函数（`analyzer.go`），如下所示：\n\n```\n\
  func (gosec *Analyzer) Process(buildTags []string, packagePaths ...string) error\
  \ {\n...\nfor _, pkgPath := range packagePaths {\npkgs, err := gosec.load(pkgPath,\
  \ config)\nif err != nil {\ngosec.AppendError(pkgPath, err)\n}\nfor _, pkg := range\
  \ pkgs {\nif pkg.Name != \"\" {\nerr := gosec.ParseErrors(pkg)\nif err != nil {\n\
  return fmt.Errorf(\"parsing errors in pkg %q: %w\", pkg.Name, err)\n}\ngosec.Check(pkg)\n\
  }\n}\n}\nsortErrors(gosec.errors)\nreturn nil\n}\n```\n\n此函数调用 `gosec.load(..)`\
  \ 函数，使用另一个名为 `golang.org/x/tools` 的 Go 模块，来收集目录中找到的所有不同 `.go` 源代码。\n\n```\nfunc\
  \ (gosec *Analyzer) load(pkgPath string, conf *packages.Config) ([]*packages.Package,\
  \ error) {\nabspath, err := GetPkgAbsPath(pkgPath)\n...  conf.BuildFlags = nil\n\
  pkgs, err := packages.Load(conf, packageFiles...)\nif err != nil {\nreturn []*packages.Package{},\
  \ fmt.Errorf(\"loading files from package %q: %w\", pkgPath, err)\n}\nreturn pkgs,\
  \ nil\n}\n```\n\n收集完所有文件名后的最后一步是，遍历这些文件并调用 `ast.Walk`。\n\n```\nfunc (gosec *Analyzer)\
  \ Check(pkg *packages.Package) {\n...\nfor _, file := range pkg.Syntax {\nfp :=\
  \ pkg.Fset.File(file.Pos())\n...\ncheckedFile := fp.Name()\n...\ngosec.context.PassedValues\
  \ = make(map[string]interface{})\nast.Walk(gosec, file)\n...\n}\n}\n```\n\n`ast.Walk`\
  \ 被调用时带有两个参数：`gosec` 和 `file`。`gosec` 是接收者，将被 AST 模块调用，而 `file` 参数则将文件信息传递给 AST。\n\
  \n`gosec` 接收者实现了 `Visit(..)` 函数，当获取到节点时，AST 模块会调用该函数。该工具的 `Visit(..)` 函数如下所示：\n\n\
  ```\nfunc (gosec *Analyzer) Visit(n ast.Node) ast.Visitor {\n...\nfor _, rule :=\
  \ range gosec.ruleset.RegisteredFor(n) {\n...\nissue, err := rule.Match(n, gosec.context)\n\
  if err != nil {\n...\n}\nif issue != nil {\n...\n}\n}\nreturn gosec\n}\n```\n\n\
  `Visit(..)` 函数通过调用 `Match(..)` 函数并传入 `ast.Node`，来调用在步骤 2 中加载的规则。规则源代码会检查该 `ast.Node`\
  \ 是否满足特定规则的某些条件。\n\n最后一步，步骤 7，是打印出从不同已执行规则中获得的报告。\n\n\n\n#### 规则\n\n该工具定义的规则本质上是用于验证\
  \ `ast.Node` 以检查其是否满足特定条件的 Go 代码。生成规则的函数如下所示（位于 `rulelist.go` 文件中）：\n\n```\nfunc\
  \ Generate(trackSuppressions bool, filters ...RuleFilter) RuleList {\n    rules\
  \ := []RuleDefinition{\n        {\"G101\", \"查找硬编码凭据\", NewHardcodedCredentials},\n\
  \        ...\n        {\"G601\", \"RangeStmt 中的隐式内存别名\", NewImplicitAliasing},\n\
  \    }\n    ...\n    return RuleList{ruleMap, ruleSuppressedMap}\n}\n```\n\n每条规则由特定代码、描述和函数名称定义。查看\
  \ `G101`，你可以看到函数名称为 `NewHardCodedCredentials`，其定义如下：\n\n```\npackage rules\n\nimport\
  \ (\n    ...\n)\n\nfunc (r *credentials) Match(n ast.Node, ctx *gosec.Context) (*gosec.Issue,\
  \ error) {\n    switch node := n.(type) {\n    case *ast.AssignStmt:\n        return\
  \ r.matchAssign(node, ctx)\n        ...\n    }\n}\n\nfunc NewHardcodedCredentials(id\
  \ string, conf gosec.Config) (gosec.Rule, []ast.Node) {\n    ...\n    return &credentials{\n\
  \        pattern:          regexp.MustCompile(pattern),\n        entropyThreshold:\
  \ entropyThreshold,\n        ...\n        MetaData: gosec.MetaData{\n          \
  \  ID:         id,\n            What:       \"潜在硬编码凭据\",\n            Confidence:\
  \ gosec.Low,\n            Severity:   gosec.High,\n        },\n    }, []ast.Node{(*ast.AssignStmt)(nil),\
  \ (*ast.ValueSpec)(nil), (*ast.BinaryExpr)(nil)}\n}\n```\n\n`NewHardcodedCredentials`\
  \ 函数初始化了处理节点所需的所有不同参数。该规则包含一个 `Match(..)` 函数，当 `gosec` 处理它所处理的每个文件的 AST 数据结构时，会调用此函数。\n\
  \n### 本章小结\n\n在本章中，你了解了什么是抽象语法树及其形态。Go 提供了简化应用程序处理 AST 数据结构的模块。这为编写诸如开源项目 `gosec`\
  \ 这类静态代码分析工具提供了可能性。\n\n本章提供的示例代码展示了如何使用 AST 完成简单任务，例如计算全局变量的数量以及从导入声明中打印包名。你还通过深入分析\
  \ `gosec` 工具的源代码的不同部分，了解了它如何利用 AST 提供安全代码分析。\n\n"
- "# 8. 评分卡\n\n在本章中，你将了解一个名为 Scorecard 的开源安全工具。Scorecard 为你感兴趣的项目提供安全指标。这些指标将让你了解与项目相关的、你需要关注的安全问题。\n\
  \n你将学习如何使用你的 GitHub 帐户创建 GitHub 令牌。该工具需要此令牌来提取公共 GitHub 仓库信息。你将逐步完成安装和使用该工具的步骤。为了更好地理解该工具，你将了解其工作的高级流程，以及它如何使用\
  \ GitHub API。\n\n本章的关键要点之一是如何使用 GitHub API 以及可以从托管在 GitHub 上的仓库中提取哪些信息。你将学习如何利用开源库，使用\
  \ GraphQL 从 GitHub 查询仓库数据。\n\n### 源代码\n\n本章的源代码可以从以下仓库获取：[`github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\n\
  \n### 什么是 Scorecard？\n\nScorecard 是一个开源项目，分析你项目的依赖关系并对其给出评级的工具。该工具执行多项检查，你可以根据需要进行配置。这些检查与软件安全相关，并被赋予\
  \ 0 到 10 的评分。该工具能显示项目中的依赖是否安全，并提供其他安全检查，例如你的 GitHub 配置、许可证检查以及许多其他有用的检查。\n\n项目维护者每天运行该工具，扫描数千个\
  \ GitHub 仓库并为其打分。评分结果可在 BigQuery 中公开获取，如图 8-1 所示。\n\n![Google Cloud 用户界面截图，展示了 scorecard\
