  当所有容器都设置好被监控后，cAdvisor 将能够获知它们的任何变化。这项工作由上述代码片段中的 goroutine 完成。在下一节中，你将了解 cAdvisor
  如何使用 `inotify`——这是 Linux 操作系统提供的一种机制，用于让应用程序在监控的目录中检测到任何活动时收到通知。


  ### 监控文件系统


  cAdvisor 使用了 Linux 内核提供的 `inotify` API ([`https://linux.die.net/man/7/inotify`](https://linux.die.net/man/7/inotify))。该
  API 允许应用程序监控文件系统事件，例如是否有文件被删除或创建。图 18-13 展示了 cAdvisor 如何使用 `inotify` 事件。


  ![](img/527551_1_En_18_Fig13_HTML.jpg)


  一个流程图在最终层级标记了 4 个事件：inotify 内核、库、Goroutine，以及新目录和子目录的监控。


  图 18-13


  cAdvisor 中的 `inotify` 流程图


  在上一节中，你了解到 cAdvisor 会监控并监听 `/sys/fs/cgroup` 及其子目录的事件。这就是 cAdvisor 如何知道 Docker 容器是从内存中创建还是删除的。让我们看看它如何利用
  `inotify` 实现这一目的。


  代码使用了 `inotify` 库来监听来自内核的事件。cAdvisor 代码使用一个 goroutine 来处理 `inotify` 事件。这个 goroutine
  是在调用 `watchForNewContainers` 时的初始化过程中创建的。`watchForNewContainers` 调用了 `container/raw/watcher.go`
  中的 `Start` 函数，如下所示：


  ```

  func (w *rawContainerWatcher) Start(events chan watcher.ContainerEvent) error {

  watched := make([]string, 0)

  for _, cgroupPath := range w.cgroupPaths {

  _, err := w.watchDirectory(events, cgroupPath, "/")

  ...

  watched = append(watched, cgroupPath)

  }

  go func() {

  for {

  select {

  case event := <-w.watcher.Event():

  err := w.processEvent(event, events)

  if err != nil {

  ...

  }

  case err := <-w.watcher.Error():

  ...

  case <-w.stopWatcher:

  err := w.watcher.Close()

  ...

  }

  }

  }()

  return nil

  }

  ```


  `w.processEvent(..)` 函数负责处理接收到的 `inotify` 事件，并将其转换为内部事件，如下所示：


  ```

  func (w *rawContainerWatcher) processEvent(event *inotify.Event, events chan watcher.ContainerEvent)
  error {

  // 将 inotify 事件类型转换为容器创建或删除事件。

  var eventType watcher.ContainerEventType

  switch {

  case (event.Mask & inotify.InCreate) > 0:

  eventType = watcher.ContainerAdd

  case (event.Mask & inotify.InDelete) > 0:

  eventType = watcher.ContainerDelete

  ...

  }

  ...

  switch eventType {

  case watcher.ContainerAdd:

  alreadyWatched, err := w.watchDirectory(events, event.Name, containerName)

  ...

  case watcher.ContainerDelete:

  // 容器已删除，停止对其监控。

  lastWatched, err := w.watcher.RemoveWatch(containerName, event.Name)

  ...

  default:

  return fmt.Errorf("未知的事件类型 %v", eventType)

  }

  // 传递事件。

  events <- watcher.ContainerEvent{

  EventType:   eventType,

  Name:        containerName,

  WatchSource: watcher.Raw,

  }

  return nil

  }

  ```


  该函数将接收到的事件转换为代码能够理解的内部事件：`watcher.ContainerAdd` 和 `watcher.ContainerDelete`。这些事件会在内部广播，供代码的其他部分处理。




