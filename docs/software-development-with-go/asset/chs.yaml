  执行脚本后，你可以使用以下命令移除 `br0` 的路由信息。将值 1 替换为运行上述命令打印路由信息时获得的链编号。


  ```bash

  iptables  -v --delete FORWARD  1

  ```


  你刚刚学习了如何使用 Linux 工具设置两个网络命名空间，并允许它们之间的流量流动。在下一节中，你将看到如何在 Go 程序中设置网络命名空间，这与 Docker
  等工具所做的类似。


  ### 带有网络的容器


  在本节中，你将了解一个提供类似 Docker 功能的小型项目。该项目将类似于我们在第 4 章中讨论的工具，但这个工具会创建网络命名空间，以使容器具有网络能力。该项目可以从
