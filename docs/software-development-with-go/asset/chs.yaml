  以下代码声明了包含 ANSI 码的不同常量，用于以不同样式格式化文本：


  ```

  package main

  import "fmt"

  const (

  Underline    = "\x1b[4m"

  UnderlineOff = "\x1b[24m"

  Italics      = "\x1b[3m"

  ItalicsOff   = "\x1b[23m"

  )

  ...

  ```


