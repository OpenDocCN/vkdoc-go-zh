- "# 6. Docker 安全\n\n本章将介绍 seccomp 配置文件，这是 Docker 提供的安全功能之一，它使用了 Linux 内核内置的 seccomp\
  \ 功能。独立的 Go 应用程序也可以在不使用 Docker 的情况下实现 seccomp 安全，您将学习如何使用 seccomp 库来实现这一点。\n\n您还将了解\
  \ Docker 如何通过编写一个监听 Docker 通信的代理来使用套接字进行通信。了解这一点非常有用，因为它能让您更好地了解如何在基础架构中保护 Docker\
  \ 的安全。\n\n### 源代码\n\n本章的源代码可从以下仓库获取：[`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\n\
  \n\n\n### seccomp 配置文件\n\n`seccomp` 是安全计算模式（secure computing mode）的简称。它是 Linux 操作系统内部提供的一项功能。作为操作系统，Linux\
  \ 原生支持此功能，意味着可以直接使用它。它到底是什么？它是一种安全特性，允许应用程序仅进行特定的系统调用，并且可以针对每个应用程序进行配置。作为开发者，您可以指定想要实施何种限制，例如，应用程序\
  \ A 只能进行读写文本文件的系统调用，但不能进行任何其他系统调用；而应用程序 B 只能进行网络系统调用，但不能读写文件。您将了解如何在应用程序中实现这一点，以及如何在将应用程序作为\
  \ Docker 容器运行时设置限制。\n\n这种限制为您的基础设施提供了更高的安全性，因为您不希望应用程序在没有任何限制的情况下运行在基础设施上。当与 Docker\
  \ 容器一起使用时，`seccomp` 为主机操作系统提供了更多的安全层，因为它可以通过配置，允许当前运行在容器内的应用程序访问特定的系统调用。\n\n为了使用\
  \ `seccomp`，首先必须检查您的操作系统是否支持它。打开终端并运行以下命令：\n\n```\ngrep CONFIG_SECCOMP= /boot/config-$(uname\
  \ -r)\n```\n\n如果您的操作系统支持 `seccomp`，您将得到如下输出：\n\n```\nCONFIG_SECCOMP=y\n```\n\n如果您的\
  \ Linux 操作系统不支持 `seccomp`，您可以使用操作系统的包管理器来安装它。例如，在 Ubuntu 中，您可以使用以下命令安装它：\n\n```\n\
  sudo apt install seccomp\n```\n\n在下一节中，您将看到如何在示例应用程序中使用 `seccomp` 的示例。\n\n#### libseccomp\n\
  \n为了在应用程序内部使用 `seccomp` 安全功能，您必须安装该库。这里，这个库叫做 `libseccomp`（[`https://github.com/seccomp/libseccomp`](https://github.com/seccomp/libseccomp)）。并非所有发行版都默认安装了\
  \ `libseccomp`，因此您需要使用操作系统的包管理器来安装它。在 Ubuntu 中，您可以使用以下命令安装它：\n\n```\nsudo apt  install\
  \ libseccomp-dev\n```\n\n现在，默认的 `seccomp` 库已安装完毕，您可以开始在应用程序中使用它。按如下方式运行位于 `chapter6/seccomp/libseccomp`\
  \ 目录中的示例应用程序：\n\n```\ngo run main.go\n```\n\n您将得到如下输出：\n\n```\n2022/07/05 22:11:34\
  \ Starting app\n2022/07/05 22:11:34 Directory /tmp/NjAZmQrt created successfully\n\
  2022/07/05 22:11:34 Trying to get current working directory\n2022/07/05 22:11:34\
  \ Current working directory is: \n```\n\n下面展示了通过创建临时目录并使用系统调用读取当前目录的代码：\n\n```\n\
  package main\n...\nfunc main() {\n...\ndirPath := \"/tmp/\" + randomString(8)\n\
  if err := syscall.Mkdir(dirPath, 0600); err != nil {\n...\n}\n...\nwd, err := syscall.Getwd()\n\
  if err != nil {\n...\n}\n...\n}\n```\n\n这段代码有什么特别之处？代码本身在做的事情并无特别之处。特别之处在于您在示例代码内部配置\
  \ `seccomp` 的方式。代码使用了一个名为 `libseccomp-golang` 的 Go 库，该库可以在 [`github.com/seccomp/libseccomp-golang`](http://github.com/seccomp/libseccomp-golang)\
  \ 找到。\n\n`libseccomp-golang` 库是原生的 `seccomp` 库（即您在上一节中安装的库）的一个 Go 绑定库。您可以将该库视为 C\
  \ 语言 `seccomp` 库的一个包装器，以便在 Go 程序内部使用。该库在应用程序内部用于进行自我配置，指定允许它进行哪些系统调用。\n\n那么，为什么要这样做呢？想象一下，您在一个多团队环境中工作，并且希望确保所编写的代码只能执行内部配置好的系统调用。这将消除引入那些进行配置中不允许的系统调用的代码的可能性。如果引入这样的代码，将会导致错误并使应用程序崩溃。\n\
  \n查看示例代码片段，您可以看到以下允许的系统调用，在 `whitelist` 变量中声明为一个字符串数组：\n\n```\nvar (\nwhitelist\
  \   = []string{\"getcwd\", \"exit_group\", \"rt_sigreturn\", \"mkdirat\", \"write\"\
  })\n```\n\n列出的系统调用是应用程序所需的所有系统调用。稍后您将看到，如果代码进行了一个未配置的系统调用会发生什么。函数 `configureSeccomp()`\
  \ 负责将定义好的系统调用注册到库中。\n\n```\nfunc configureSeccomp() error {\n...\nfilter, err =\
  \ seccomp.NewFilter(seccomp.ActErrno)\n...\nfor _, name := range whitelist {\nsyscallID,\
  \ err := seccomp.GetSyscallFromName(name)\nif err != nil {\nreturn err\n}\nerr =\
  \ filter.AddRule(syscallID, seccomp.ActAllow)\nif err != nil {\nreturn err\n}\n\
  }\n...\n}\n```\n\n该函数首先通过调用 `seccomp.NewFilter(..)` 创建一个新的过滤器，并将动作（`seccomp.ActErrno`）作为参数传入。该参数指定了当应用程序调用不允许的系统调用时要采取的动作。在这个例子中，您希望它返回一个错误编号。\n\
  \n创建新过滤器后，它将遍历白名单中的系统调用，首先通过调用 `seccomp.GetSyscallFromName(..)` 获取正确的系统调用 ID，然后使用\
  \ `filter.AddRule(..)` 函数将该 ID 注册到库中。参数 `seccomp.ActAllow` 指定该 ID 是应用程序允许进行的系统调用。`configureSeccomp()`\
  \ 函数完成后，应用程序就被配置为只允许白名单中的调用。\n\n应用程序进行的系统调用很简单。使用以下代码片段创建一个目录：\n\n```\nfunc main()\
  \ {\n...\nif err := syscall.Mkdir(dirPath, 0600); err != nil {\nreturn\n}\n...\n\
  }\n```\n\n使用以下系统调用获取当前工作目录：\n\n```\nfunc main() {\n...\nwd, err := syscall.Getwd()\n\
  if err != nil {\n...\n}\n...\n}\n```\n\n现在出现的问题是，如果应用程序进行了一个未配置的系统调用，会发生什么？让我们稍微修改一下代码。将\
  \ `whitelist` 变量修改如下：\n\n```\nvar (\nwhitelist = []string{\n\"exit_group\", \"rt_sigreturn\"\
  , \"mkdirat\", \"write\",\n}\n...\n)\n```\n\n这从列表中移除了 `getcwd`。现在运行该应用程序。您将得到如下错误：\n\
  \n```\n...\n2022/07/05 22:53:06 Failed getting current working directory: invalid\
  \ argument -\n```\n\n代码无法进行获取当前工作目录的系统调用，并返回一个错误。您可以看到，从列表中移除注册的系统调用会阻止应用程序正常运行。在下一节中，您将了解如何为使用\
  \ Docker 作为容器运行的应用程序使用 `seccomp`。\n\n\n\n#### Docker seccomp\n\nDocker 为容器中运行的应用程序提供了\
