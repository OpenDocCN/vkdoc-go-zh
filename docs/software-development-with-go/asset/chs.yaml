  \n![Google Cloud 用户界面截图，展示了 my first project 等项目下的各种文件，并包含固定项目、探索公共数据集、数据源和搜索等工具。](img/527551_1_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2**  \n添加 `openssf` 项目\n\n在下一节中，你将学习如何设置 GitHub 令牌密钥，以便用它来扫描你选择的 GitHub\
  \ 仓库。\n\n\n\n#### 设置 Scorecard\n\n`Scorecard` 需要一个 GitHub 令牌密钥来扫描仓库。其原因是 GitHub\
