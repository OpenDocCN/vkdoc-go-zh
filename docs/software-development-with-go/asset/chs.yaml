  flag.Usage()

  os.Exit(1)

  }

  ....

  for _, arg := range flag.Args() {

  var statx unix.Statx_t

  if err := unix.Statx(unix.AT_FDCWD, arg, flags, mask, &statx); err != nil {

  ....

  dev := unix.Mkdev(statx.Dev_major, statx.Dev_minor)

  ....

  }

  清单 1-3

  使用 statx 的代码

  ```


  如代码片段所示，该应用使用了一个 `unix.Statx` 系统调用，并传递了文件名和其他相关参数。该系统调用作为 [`golang.org/x/sys/unix`](http://golang.org/x/sys/unix)
  包的一部分提供，其声明如下：


  ```

  func Statx(dirfd int, path string, flags int, mask int,

  stat *Statx_t) (err error)

  ```


  `Statx` 函数系统调用的声明和文档可以在以下链接中找到：[`https://pkg.go.dev/golang.org/x/sys/unix`](https://pkg.go.dev/golang.org/x/sys/unix)。通读文档，发现关于参数的信息并不多。作为替代方案，你可以查看为
  Linux 定义的同名系统调用，其文档位于 [`https://man7.org/linux/man-pages/man2/statx.2.xhtml`](https://man7.org/linux/man-pages/man2/statx.2.xhtml)。图
  1-4 显示了该函数调用接受的不同参数及其含义的信息。


  ![](img/527551_1_En_1_Fig4_HTML.jpg)


  函数名调用 `statx` 的截图，并显示了通过文件描述符传递的绝对路径名和相对目录路径名。


  图 1-4


  Linux `statx`


  成功调用 `unix.Statx` 函数返回后，应用会处理 `statx` 变量内的信息以提取数据。该变量是 `Statx_t` 类型，在 `sys/unix`
  包中定义如下。该结构体包含了应用可访问的大量文件相关数据。应用利用这些信息打印出诸如文件大小、文件类型、用户 ID 和组 ID 等信息。


  ```

  type Statx_t struct {

  Mask            uint32

  Blksize         uint32

  Attributes      uint64

  Nlink           uint32

  Uid             uint32

  Gid             uint32

  Mode            uint16

  _               [1]uint16

  Ino             uint64

  Blocks          uint64

  Attributes_mask uint64

  Atime           StatxTimestamp

  ...

  Dev_major       uint32

  Dev_minor       uint32

  ...

  }

  ```


  ### 小结


  在本章中，你学习了什么是系统调用，以及如何使用 `sys/unix` 包编写一个简单的应用来与操作系统交互。通过研究一个开源项目，你深入了解了系统调用，并学习了它如何利用系统调用来提供特定文件的统计信息。


  在接下来的章节中，你将进一步探索系统调用，并了解使用 Go 语言与操作系统进行交互的各种方式。


