  在第 2 章中，你了解了 Linux 中的 `/sys` 文件系统，并编写了一个简单的应用程序来从中提取信息。在本章中，你将了解另一个名为 `/proc` 的系统目录。`/proc`
  目录也被称为 `procfs`，它包含有关当前正在运行的进程的有用信息。内核将其用作所有相关进程的信息中心。


