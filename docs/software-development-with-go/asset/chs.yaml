  现在你已经对各个值的含义有了很好的了解，让我们看看如何使用 Go 提取这些信息。示例代码位于 `chapter3/sockstat` 目录中。打开终端，使用以下命令运行代码：


  ```

  go run main.go

  ```


  图 3-1 显示了输出结果。


