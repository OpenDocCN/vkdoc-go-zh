  line, err := readLine(reader)

  if bytes.HasPrefix(line, []byte(sockets)) ||

  bytes.HasPrefix(line, []byte(tcp)) ||

  bytes.HasPrefix(line, []byte((udp))) {

  idx := bytes.Index(line, []byte((colon)))

  ...

  }

  ...

  }

  ...

  }

