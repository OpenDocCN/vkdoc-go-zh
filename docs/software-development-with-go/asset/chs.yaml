  #### 转储示例


  在本节中，你将看到一个名为 `GoPlay` 的开源项目，该项目托管于 [`https://github.com/n4ss/GoPlay`](https://github.com/n4ss/GoPlay)。你也可以在
  `chapter2/GoPlay` 目录中找到它。这是一个简单的应用程序，用于转储 Go ELF 可执行文件的内容。你将了解该应用程序如何使用 Go 库来读取
  ELF 文件。


  使用以下命令编译 `GoPlay` 应用程序，以创建可执行文件：


  ```

  go build main.go

  ```


  现在编译 `GoPlay` 并如下运行：


  ```

  ./goplay -action=dump -filename=./goplay

  ```


  你指示 `GoPlay` 转储 `goplay` 可执行文件的内容，这将产生类似如下的输出：


  ```

  Tracing program : "[path]goplay".

  Action : "dump".

  DynStrings:

  Symbols:

  go.go

  runtime.text

  cmpbody

  countbody

  memeqbody

  indexbody

  indexbytebody

  gogo

  callRet

  gosave_systemstack_switch

  setg_gcc

  aeshashbody

  debugCall32

  debugCall64

  ....

  runtime.(*cpuProfile).addNonGo

  ....

  _cgo_init

  runtime.mainPC

  go.itab.syscall.Errno,error

  runtime.defaultGOROOT.str

  runtime.buildVersion.str

  type.*

  runtime.textsectionmap

  ....

  ```


  让我们开始分析代码的工作原理，以及它使用了哪些系统调用来从可执行文件中获取信息。


  ```

  func main() {

  ....

  file, err := os.Stat(*filename)

  ....

  f, err := os.Open(*filename)

  ....

  switch *action {

  ....

  case "dump": os.Exit(dump_elf(*filename))

  }

  } else {

  goto Usage

  }

  ....

  }

  ```


  在启动时，应用程序使用 `os.Stat` 系统调用来检查作为参数指定的可执行文件是否存在，如果存在，则使用 `os.Open` 将其打开。打开后，它将使用 `dump_elf(..)`
  函数转储文件内容。以下是该函数的代码片段：


  ```

  func dump_elf(filename string) int {

  file, err := elf.Open(filename)

  if err != nil {

  fmt.Printf("Couldn''t open file : \"%s\" as an ELF.\n")

  return 2

  }

  dump_dynstr(file)

  dump_symbols(file)

  return 0

  }

  ```


  该函数使用了另一个名为 `elf.Open` 的系统调用，该调用位于 `debug/elf` 包中。这类似于 `os.Open` 函数，但具有额外的功能，即打开的文件被准备为作为
  ELF 文件读取。从调用 `elf.Open` 返回后，返回的 `file` 变量将填充有关 ELF 文件内部结构的信息。


  文件打开后，它会调用 `dump_symbols` 来转储文件内容。`dump_symbols` 函数转储文件中所有符号信息，这些信息通过调用 `file.Symbols()`
  函数提供。该应用程序仅打印 `Name` 字段。


  ```

  func dump_symbols(file *elf.File) {

  fmt.Printf("Symbols:\n")

  symbols, _ := file.Symbols()

  for _, e := range symbols {

  if !strings.EqualFold(e.Name, "") {

  fmt.Printf("\t%s\n", e.Name)

  }

  }

  }

  ```


  以下是 `Symbol` 结构体的定义。正如你所看到的，它包含有用的信息。


  ```

  type Symbol struct {

  Name        string

  Info, Other byte

  Section     SectionIndex

  Value, Size uint64

  // Version and Library are present only for the dynamic symbol

  // table.

  Version string

  Library string

  }

  ```


  另一个被调用来转储 ELF 信息的函数是 `dump_dynstr`：


  ```

  func dump_dynstr(file *elf.File) {

  fmt.Printf("DynStrings:\n")

  dynstrs, _ := file.DynString(elf.DT_NEEDED)

  ...

  dynstrs, _ = file.DynString(elf.DT_SONAME)

  ...

  dynstrs, _ = file.DynString(elf.DT_RPATH)

  ...

  dynstrs, _ = file.DynString(elf.DT_RUNPATH)

  ...

  }

  ```


  该函数用于获取 ELF 文件的特定部分，这些部分作为参数传递给 `file.DynString` 函数。例如，当调用


  ```

  dynstrs, _ = file.DynString(elf.DT_SONAME)

  ```


  时，代码将获取该文件的共享库名称信息。


  ### /sys 文件系统


  在本节中，你将看到另一种读取系统级信息的方式。你将不会使用函数来读取系统信息；相反，你将使用操作系统为用户应用程序提供的系统目录。


  你要读取的目录是 `/sys` 目录，这是一个包含设备驱动程序、设备信息和其他内核功能的虚拟文件系统。图 2-4 展示了 Linux 机器上 `/sys` 目录的内容。


  ![](img/527551_1_En_2_Fig4_HTML.jpg)


  一个系统目录的代码截图，用根值表示月份名称。列出的不同文件有 block, bus, class, dev, devices, firmware, fs, hypervisor,
  kernel, 和 module。


  图 2-4


  `/sys` 目录内部


  #### 读取 AppArmor


  Linux 在 `/sys` 目录中提供的一些信息与 AppArmor（Application Armor 的缩写）有关。什么是 AppArmor？它是一个内核安全模块，使系统管理员能够使用配置文件限制应用程序的能力。这使得系统管理员有权选择特定应用程序可以访问哪些资源。例如，系统管理员可以定义应用程序
  A 具有网络访问权限或原始套接字访问权限，而应用程序 B 没有访问网络功能的权限。


  让我们看一个从`/sys`文件系统读取 AppArmor 信息的示例应用程序，具体是检查 AppArmor 是否已启用以及是否已强制执行。以下是可以在 `chapter2/apparmor`
  目录中找到的示例代码：


  ```

  import (

  "fmt"

  ...

  )

  const (

  appArmorEnabledPath = "/sys/module/apparmor/parameters/enabled"

  appArmorModePath    = "/sys/module/apparmor/parameters/mode"

  )

  func appArmorMode() (mode string) {

  content, err := ioutil.ReadFile(appArmorModePath)

  ...

  return strings.TrimSpace(string(content))

  }

  func appArmorEnabled() (support bool) {

  content, err := ioutil.ReadFile(appArmorEnabledPath)

  ...

  return strings.TrimSpace(string(content)) == "Y"

  }

  func main() {

  fmt.Println("AppArmor mode : ", appArmorMode())

  fmt.Println("AppArmor is enabled : ", appArmorEnabled())

  }

  ```


  由于代码正在访问系统文件系统，因此必须使用根用户身份运行它。编译代码并按如下方式运行：


  ```

  sudo ./apparmor

  ```


  该代码使用标准库 `ioUtil.ReadFile` 从目录中读取信息，这就像读取文件一样，因此比你在前面章节中看到的函数调用更简单。


  ### 总结


  在本章中，你学习了如何使用系统调用与操作系统进行交互。你学习了如何使用提供许多函数调用与操作系统交互的 `syscall` 标准库，并编写了一个示例应用程序来打印磁盘空间信息。你学习了如何使用`debug/elf`标准库来读取
  Go ELF 文件信息。最后，你了解了如何通过`/sys`文件系统提取你想要读取的信息，以了解操作系统是否支持 AppArmor。


