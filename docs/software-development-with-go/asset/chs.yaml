  \ `tests` 目录，并执行以下命令：\n\n```\n./cscli capi register -c ./dev.yaml\n```\n\n你会看到类似下面的输出：\n\
  \n```\nWARN[27-07-2022 04:10:11 PM] can't load CAPI credentials from './config/online_api_credentials.yaml'\
