- "# 9. 简单网络\n\n在本章中，你将学习如何使用 Go 编写网络代码。你将理解如何为 TCP 和 UDP 协议编写客户端和服务器代码。你还将学习如何编写一个能够使用\
  \ goroutine 并发处理请求的网络服务器。到本章结束时，你将掌握以下内容：\n\n- 为 TCP 和 UDP 编写网络客户端\n- 为 TCP 和 UDP\
  \ 编写网络服务器\n- 使用 goroutine 处理请求\n- 对网络服务器进行负载测试\n\n### 源代码\n\n本章的源代码可从 `https://github.com/Apress/Software-Development-Go`\
  \ 仓库获取。\n\n### TCP 网络\n\n在本节中，你将探索如何使用 Go 标准网络库创建 TCP 应用程序。你将编写的代码包括 TCP 客户端和服务器。\n\
  \n#### TCP 客户端\n\n让我们从编写一个 TCP 客户端开始，该客户端连接到一个特定的 HTTP 服务器，在本例中是 `google.com`，并打印出服务器的响应。代码位于\
  \ `chapter9/tcp/simple` 目录下。按如下方式运行它：\n\n```\ngo run main.go\n```\n\n代码运行时，它将尝试连接到\
  \ `google.com` 服务器，并将返回的网页打印到控制台，如下所示输出：\n\n```\nHTTP/1.0 200 OK\nDate: Sun, 05\
  \ Dec 2021 10:27:46 GMT\nExpires: -1\nCache-Control: private, max-age=0\nContent-Type:\
  \ text/html; charset=ISO-8859-1\nP3P: CP=\"This is not a P3P policy! See g.co/p3phelp\
  \ for more info.\"\nServer: gws\nX-XSS-Protection: 0\nX-Frame-Options: SAMEORIGIN\n\
  Set-Cookie: 1P_JAR=2021-12-05-10; expires=Tue, 04-Jan-2022 10:27:46 GMT; path=/;\
  \ domain=.google.com; Secure\nSet-Cookie:\n...\nAccept-Ranges: none\nVary: Accept-Encoding\n\
  \n...\n```\n\n该应用使用了标准库中的 `net` 包，并使用如下代码指定的 TCP 连接：\n\n```\nconn, err := net.Dial(\"\
  tcp\", t)\nif err != nil {\n    panic(err)\n}\n```\n\n以下是连接到服务器的代码：\n\n```\npackage\
  \ main\n...\nconst (\n    host = \"google.com\"\n    port = \"80\"\n)\nfunc main()\
  \ {\n    t := net.JoinHostPort(host, port)\n    conn, err := net.Dial(\"tcp\", t)\n\
  \    if err != nil {\n        panic(err)\n    }\n...\n}\n```\n\n代码使用 `net.Dial(..)`\
  \ 函数通过 TCP 连接到 `google.com` 的 80 端口。成功连接后，它向服务器发送 HTTP 协议，告知服务器正在请求首页，如下所示：\n\n\
  ```\nfunc main() {\n...\n    req := \"GET / \\r\\nHost: google.com\\r\\nConnection:\
  \ close\\r\\n\\r\\n\"\n    conn.Write([]byte(req))\n...\n}\n```\n\n收到响应后，它将输出打印到控制台，如下面这段代码所示：\n\
  \n```\n...\nfunc main() {\n...\n    connReader := bufio.NewReader(conn)\n    scanner\
  \ := bufio.NewScanner(connReader)\n    for scanner.Scan() {\n        fmt.Printf(\"\
  %s\\n\", scanner.Text())\n    }\n    if err := scanner.Err(); err != nil {\n   \
  \     fmt.Println(\"Scanner error\", err)\n    }\n}\n```\n\n现在你已经理解了如何编写 TCP 客户端，下一节你将学习如何编写\
  \ TCP 服务器。\n\n#### TCP 服务器\n\n在本节中，你将编写一个 TCP 服务器，它监听本地机器上的 3333 端口。该服务器将打印出收到的内容，并发送一个响应。代码位于\
  \ `tcp/server` 目录下，可以按如下方式运行：\n\n```\ngo run main.go\n```\n\n你将得到如下输出：\n\n```\n\
  2022/03/05 22:51:19 Listening on port 3333\n```\n\n使用 `nc`（网络连接）工具连接到该服务器，如下所示：\n\
  \n```\nnc localhost 3333\n```\n\n连接后，输入任何文本并按回车键。你将得到一个响应。以下是一个示例。我输入了 *This is\
  \ a test*，它返回了一个响应：*Message received of length : 15.*\n\n```\nThis is a test\nMessage\
  \ received of length : 15\n```\n\n让我们看一下代码。首先，你将看到代码如何等待并监听 3333 端口，如下面这段代码所示：\n\
  \n```\nfunc main() {\n    t := net.JoinHostPort(\"localhost\", \"3333\")\n    l,\
  \ err := net.Listen(\"tcp\", t)\n    ...\n    for {\n        conn, err := l.Accept()\n\
  \        if err != nil {\n            log.Println(\"Error accepting: \", err.Error())\n\
  \            os.Exit(1)\n        }\n        go handleRequest(conn)\n    }\n}\n```\n\
  \n代码使用了 `Listener` 对象的 `Accept` 函数，该对象在调用 `net.Listen(..)` 函数时返回。`Accept` 函数会一直等待，直到收到连接。\n\
  \n当客户端成功连接后，代码会继续调用一个单独的 goroutine 中的 `handleRequest` 函数。在单独的 goroutine 中处理请求，使得应用能够并发处理请求。\n\
  \n请求的处理和响应的发送在 `handleRequest` 函数内部完成，如下面这段代码所示：\n\n```\nfunc handleRequest(conn\
  \ net.Conn) {\n    ...\n    len, err := conn.Read(buf)\n    ...\n    conn.Write([]byte(fmt.Sprintf(\"\
  Message received of length : %d\", len)))\n    conn.Close()\n}\n```\n\n代码使用连接的 `Read(..)`\
  \ 函数读取客户端发送的数据，并使用同一连接的 `Write(..)` 函数写回响应。\n\n由于代码使用了 goroutine，TCP 服务器能够处理多个客户端请求而不会出现阻塞问题。\n\
  \n### UDP 网络\n\n在本节中，你将学习如何使用 UDP 协议编写网络应用程序。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n#### UDP 客户端\n\n在本节中，您将编写一个简单的 UDP 应用程序，该程序与一个“每日名言”（qotd）服务器通信，该服务器会返回一条字符串名言，并将其打印到控制台。以下链接提供了有关\
  \ qotd 协议和可用公共服务器的更多信息：[`www.gkbrk.com/wiki/qotd_protocol/`](http://www.gkbrk.com/wiki/qotd_protocol/)。示例代码连接到在端口\
  \ 17 上监听的服务器 [`djxms.net`](http://djxms.net)。\n\n代码位于 `chapter9/udp/simple` 目录中，可以按如下方式运行：\n\
  \n```\ngo run main.go\n```\n\n每次运行该应用程序，您都会获得不同的名言。在我的例子中，其中一条如下：\n\n> “人类可以攀登到最高的顶峰，但无法在那里长久居住。”\n\
