  \n端口扫描是一种执行操作以确定网络中哪些端口处于打开状态的方法。端口就像是应用程序选择监听的数字。例如，HTTP 服务器监听端口 80，而 FTP 服务器监听端口\
  \ 21。不同操作系统中遵循的标准端口号列表可以在 [`www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](http://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml)\
