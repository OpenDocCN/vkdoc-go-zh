  \ Docker 容器内指定子容器 postgres 链接的屏幕截图。\n\n图 18-2\n\ncAdvisor 容器用户界面\n\n在下一节中，你将进一步探索\
  \ cAdvisor 的用户界面以及与此项目相关的概念。\n\n\n\n### Web 用户界面\n\n请确保你的 `cAdvisor` 已在本地运行，并打开浏览器，通过\
  \ URL `http://localhost:8080` 访问它。接下来，我们来理解一下网页上展示的一些数据。\n\n**注意：** 你本地机器上看到的信息可能与本书记载的不同。这取决于你所使用的操作系统或\
