  ### cgroups


  `cgroups` 是控制组（control groups）的缩写，是 Linux 内核提供的一项功能。我们在上一节中讨论的命名空间与`cgroups`相辅相成。让我们来看看`cgroups`包含什么。`cgroups`赋予用户限制特定进程所能分配的资源（如
  CPU 和内存网络）的能力。宿主机的资源是有限的，如果你希望在独立的命名空间中运行多个进程，就需要在不同的命名空间之间分配资源。


  `cgroups`位于`/sys/fs/cgroup`目录下。我们要在主`cgroup`目录下创建一个子目录，并查看其内部内容。运行以下命令，使用 root 权限创建一个目录：


  ```

  sudo mkdir /sys/fs/cgroup/example

  ```


  使用以下命令列出新创建目录内的内容：


  ```

  sudo ls /sys/fs/cgroup/example -la

  ```


  你将看到类似如下的输出：


