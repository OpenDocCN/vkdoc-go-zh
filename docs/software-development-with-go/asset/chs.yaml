  \ logger)\n...\n}\nfunc CreateOssFuzzRepoClient(ctx context.Context, logger *log.Logger)\
  \ (clients.RepoClient, error) {\nossFuzzRepo, err := MakeGithubRepo(\"google/oss-fuzz\"\
  )\n...\nreturn ossFuzzRepoClient, nil\n}\n```\n\n成功连接到 GitHub 仓库后，代码通过将连接分配给不同的\
  \ GitHub 处理器来继续执行。这些处理器使用该连接从仓库中获取用于执行安全检查的不同信息（步骤 3）。处理器分配的代码如下（`clients/githubrepo/client.go`）：\n\
  \n```\nfunc (client *Client) InitRepo(inputRepo clients.Repo, commitSHA string)\
  \ error {\n...\n// 合理性检查。\nrepo, _, err := client.repoClient.Repositories.Get(client.ctx,\
  \ ghRepo.owner, ghRepo.repo)\nif err != nil {\nreturn sce.WithMessage(sce.ErrRepoUnreachable,\
  \ err.Error())\n}\nclient.repo = repo\nclient.repourl = &repoURL{\nowner:      \
  \   repo.Owner.GetLogin(),\n...\ncommitSHA:     commitSHA,\n}\nclient.tarball.init(client.ctx,\
  \ client.repo, commitSHA)\n// 设置 GraphQL。\nclient.graphClient.init(client.ctx, client.repourl)\n\
  client.contributors.init(client.ctx, client.repourl)\n...\nclient.webhook.init(client.ctx,\
  \ client.repourl)\nclient.languages.init(client.ctx, client.repourl)\nreturn nil\n\
  }\n```\n\n图 8-11 概述了使用不同 GitHub 连接的 GitHub 处理器子集。\n\n![](img/527551_1_En_8_Fig11_HTML.jpg)\n\
  \nGitHub 连接流程图包含三个处理器：release、branches、workflow，它们分别与 GitHub 客户端 1 和 4 并行连接。\n\n\
  **图 8-11** 使用 GitHub 连接的 GitHub 处理器\n\n一旦处理器成功使用 GitHub 连接完成初始化，工具的主体部分就会启动（步骤 4）。该工具生成一个\
  \ goroutine，利用通过 GitHub 连接下载的信息逐一执行安全检查。执行 goroutine 的代码如下（`pkg/scorecard.go`）：\n\
  \n```\nfunc RunScorecards(ctx context.Context,\n...\n) (ScorecardResult, error)\
  \ {\n...\nresultsCh := make(chan checker.CheckResult)\ngo runEnabledChecks(ctx,\
  \ repo, &ret.RawResults, checksToRun, repoClient, ossFuzzRepoClient,\nciiClient,\
  \ vulnsClient, resultsCh)\n...\nreturn ret, nil\n}\n```\n\n图 8-12 展示了在 GitHub 仓库上执行的不同安全检查子集。\n\
  \n![](img/527551_1_En_8_Fig12_HTML.jpg)\n\n安全检查流程图包括：二进制工件、分支保护、检查贡献者、危险工作流。\n\n\
  **图 8-12** 安全检查\n\n接下来展示的是 `runEnabledChecks(...)` 代码片段。该函数执行每个已配置的检查（步骤 6）。完成后，结果通过\
  \ `resultsCh` 通道传回（步骤 7）。\n\n```\nfunc runEnabledChecks(...\nresultsCh chan checker.CheckResult,\n\
  ) {\n...\nwg := sync.WaitGroup{}\nfor checkName, checkFn := range checksToRun {\n\
  checkName := checkName\ncheckFn := checkFn\nwg.Add(1)\ngo func() {\ndefer wg.Done()\n\
  runner := checker.NewRunner(\ncheckName,\nrepo.URI(),\n&request,\n)\nresultsCh <-\
  \ runner.Run(ctx, checkFn)\n}()\n}\nwg.Wait()\nclose(resultsCh)\n}\n```\n\n工具的最终步骤是收集、格式化并对结果进行评分（步骤\
  \ 8）。输出取决于配置，可配置为在控制台（默认）显示或输出到文件。代码片段如下所示（`scorecard/cmd/root.go`）：\n\n```\nfunc\
  \ rootCmd(o *options.Options) {\n...\nrepoResult, err := pkg.RunScorecards(\nctx,\n\
  ...\n)\nif err != nil {\nlog.Panic(err)\n}\nrepoResult.Metadata = append(repoResult.Metadata,\
  \ o.Metadata...)\nsort.Slice(repoResult.Checks, func(i, j int) bool {\nreturn repoResult.Checks[i].Name\
  \ < repoResult.Checks[j].Name\n})\n...\nresultsErr := pkg.FormatResults(\no,\n&repoResult,\n\
  checkDocs,\npol,\n)\n...\n}\n```\n\n从这个工具中可以学到的是 GitHub API 的用法。该工具广泛使用 GitHub API，通过下载仓库信息并利用预定义的安全检查来执行检查。现在，你将了解如何使用\
  \ GitHub API 进行 GitHub 探索。\n\n### GitHub\n\n任何从事软件开发的人都了解 GitHub，并以这样或那样的方式使用过它。你可以在\
  \ GitHub 上找到大多数类型的开源软件，而且它是免费托管的。它已成为任何涉足软件开发人员的不二之选。\n\nGitHub 提供允许外部工具与服务交互的 API。该\
  \ API 为开发者访问 GitHub 服务以构建能为组织提供价值的工具释放了无限潜力。这使得第三方解决方案（免费和付费）得以普及，并向公众开放。本章中的 Scorecard\
  \ 项目正是得益于 GitHub API 而得以实现的工具之一。\n\n\n\n#### GitHub API\n\nGitHub 提供两种 API：REST\
  \ 和 GraphQL (`https://docs.github.com/en/graphql`)。有多个不同的项目实现了这两种 API，稍后你会看到它们。\n\
  \n基于 REST 的 API 的访问方式与普通 HTTP 调用类似。例如，你可以在自己的浏览器中输入以下地址：\n\n```\nhttps://api.github.com/users/test\n\
  ```\n\n你将在浏览器中看到如下的 JSON 响应：\n\n```\n{\n\"login\": \"test\",\n\"id\": 383316,\n\"\
  node_id\": \"MDQ6VXNlcjM4MzMxNg==\",\n\"avatar_url\": \"https://avatars.githubusercontent.com/u/383316?v=4\"\
  ,\n\"gravatar_id\": \"\",\n\"url\": \"https://api.github.com/users/test\",\n\"html_url\"\
  : \"https://github.com/test\",\n...\n\"created_at\": \"2010-09-01T10:39:12Z\",\n\
  \"updated_at\": \"2020-04-24T20:58:44Z\"\n}\n```\n\n你看到的是 GitHub 中注册的名为 `test` 的用户信息。你可以尝试使用你自己的\
  \ GitHub 用户名，然后就会看到你自己的详细信息。现在，让我们获取某个特定组织的仓库列表。在浏览器地址栏中输入以下内容：\n\n```\nhttps://api.github.com/orgs/golang/repos\n\
  ```\n\n该地址会返回存放在某个特定组织名下、且公开托管在 GitHub 上的仓库列表。在示例中，你想要获取存放在 Golang 组织下的仓库列表。你将得到如下响应：\n\
  \n```\n[\n{\n\"id\": 1914329,\n\"node_id\": \"MDEwOlJlcG9zaXRvcnkxOTE0MzI5\",\n\"\
  name\": \"gddo\",\n\"full_name\": \"golang/gddo\",\n\"private\": false,\n\"owner\"\
  : {\n\"login\": \"golang\",\n\"id\": 4314092,\n...\n},\n\"html_url\": \"https://github.com/golang/gddo\"\
  ,\n\"description\": \"Go Doc Dot Org\",\n\"fork\": false,\n...\n\"license\": {\n\
  ...\n},\n...\n\"permissions\": {\n...\n}\n},\n{ ... }\n]\n```\n\n响应是 JSON 格式。你看到的信息与你访问\
  \ `https://github.com/golang` 上的 Golang 项目页面时所看到的信息相同。`https://docs.github.com/en/rest`\
  \ 上的 GitHub 文档提供了所有可访问的 REST 端点的完整列表。\n\n在 Go 应用程序中使用该 API，需要将不同的端点转换为你可以在应用程序中使用的函数，这是一个耗时的过程。因此，你可以使用来自\
  \ `https://github.com/google/go-github` 的 Go 开源库。让我们运行一个使用此库的示例，该示例可以在 `chapter8/simple`\
  \ 文件夹中找到。打开终端并按如下方式运行：\n\n```\ngo run main.go\n```\n\n你将得到以下输出：\n\n```\n2022/07/16\
  \ 18:43:43 {\n\"id\": 23096959,\n\"node_id\": \"MDEwOlJlcG9zaXRvcnkyMzA5Njk1OQ==\"\
  ,\n\"owner\": {\n\"login\": \"golang\",\n\"id\": 4314092,\n...\n},\n\"name\": \"\
  go\",\n\"full_name\": \"golang/go\",\n\"description\": \"The Go programming language\"\
  ,\n\"homepage\": \"https://go.dev\",\n...\n\"organization\": {\n\"login\": \"golang\"\
  ,\n\"id\": 4314092,\n...\n},\n\"topics\": [\n\"go\",\n...\n],\n...\n\"license\"\
  : {\n...\n},\n...\n}\n```\n\n该示例使用该库获取特定仓库 `http://github.com/golang/go` 的信息，如下面的代码片段所示：\n\
  \n```\npackage main\nimport (\n...\n\"github.com/google/go-github/v38/github\"\n\
  )\nfunc main() {\nclient := github.NewClient(&http.Client{})\nctx := context.Background()\n\
  repo, _, err := client.Repositories.Get(ctx, \"golang\", \"go\")\n...\nlog.Println(string(r))\n\
  }\n```\n\n应用程序首先通过调用 `github.NewClient(..)` 并传入 `http.Client` 来初始化该库，`http.Client`\
  \ 用于向 GitHub 发起 HTTP 调用。库包 `github.com/google/go-github/v38/github` 提供了所需的所有不同函数。在示例中，你使用了\
  \ `Repositories.Get(..)` 来获取特定仓库（`golang`）项目（`go`）的信息。\n\n查看库的源代码（`github.com/google/go-github/v38/github/repos.go`），你会发现它执行的是与\
  \ `https://docs.github.com/en/rest/repos/repos#get-a-repository` 文档中定义的类似的调用。\n\n\
  ```\nfunc (s *RepositoriesService) Get(ctx context.Context, owner, repo string)\
  \ (*Repository, *Response, error) {\nu := fmt.Sprintf(\"repos/%v/%v\", owner, repo)\n\
  req, err := s.client.NewRequest(\"GET\", u, nil)\nif err != nil {\nreturn nil, nil,\
  \ err\n}\n...\nreturn repository, resp, nil\n}\n```\n\n在浏览器中使用 `https://api.github.com/repos/golang/go`\
  \ 会得到相同的响应。\n\nGitHub 提供的另一个 API 称为 GraphQL API (`https://docs.github.com/en/graphql`)，它与\
  \ REST API 截然不同。它基于 GraphQL (`https://graphql.org/`)，其网站对此描述如下：\n\nGraphQL 是一种用于\
  \ API 的查询语言，也是一个利用你现有数据来满足这些查询的运行时。GraphQL 提供了 API 中数据的完整且易于理解的描述，赋予客户端精确请求所需内容（且仅此而已）的能力，让\
  \ API 随着时间推移更容易演进，并支持强大的开发者工具。\n\n通常，当使用 REST API 获取不同类型的数据时，你需要从不同的端点获取。在收集完所有数据后，还需要将它们构建成一个结构体。GraphQL\
  \ 使其变得简单：你只需定义你想要获取的仓库数据，它就会将你请求的数据集合作为一个单一的集合返回。\n\n当你查看提供的示例应用程序时，这一点会变得更加清晰。打开终端并运行\
  \ `chapter8/graphql` 中的示例。按如下方式运行：\n\n```\nGITHUB_TOKEN= go run main.go\n```\n\n\
  你需要使用之前在“设置 Scorecard”部分创建的 GitHub 令牌。如果运行成功，你将得到以下结果（输出会有所不同，因为数据是实时从 GitHub 获取的，在你运行此示例时数据可能已经发生了变化）：\n\
  \n\n```text\n2022/07/16 19:39:00 分叉总数 : 15116\n2022/07/16 19:39:00 标签总数 : 10\n2022/07/16\
  \ 19:39:00 ----------------------------------\n2022/07/16 19:39:00 Issue 标题 - cmd/cgo:\
  \ 在 gcc 4.4.1 下失败\n2022/07/16 19:39:00 Issue 标题 - net: LookupHost 返回异常值并导致网络测试崩溃\n\
  2022/07/16 19:39:00 Issue 标题 - quietgcc 的问题\n2022/07/16 19:39:00 Issue 标题 - 在 OS\
  \ X 10.5 386 环境下运行“net”测试时出现段错误\n2022/07/16 19:39:00 Issue 标题 - HTTP 客户端与服务器测试失败。DNS_ServerName\
  \ 和 URL_Target 字符串拼接成无意义内容。\n2022/07/16 19:39:00 Issue 标题 - all.bash 段错误\n2022/07/16\
  \ 19:39:00 Issue 标题 - 运行测试时崩溃，无匹配测试。\n2022/07/16 19:39:00 Issue 标题 - go-mode.el\
  \ 在编辑空文件时崩溃\n2022/07/16 19:39:00 Issue 标题 - 我已经为**我的**编程语言使用了这个名称\n2022/07/16 19:39:00\
  \ Issue 标题 - 运行 all.bash 时抛出错误：index out of range\n2022/07/16 19:39:00 ----------------------------------\n\
  2022/07/16 19:39:00 提交作者 (dmitshur), url (https://github.com/dmitshur)\n2022/07/16\
  \ 19:39:00 提交作者 (eaigner), url (https://github.com/eaigner)\n2022/07/16 19:39:00\
  \ 提交作者 (nordicdyno), url (https://github.com/nordicdyno)\n2022/07/16 19:39:00 提交作者\
  \ (minux), url (https://github.com/minux)\n2022/07/16 19:39:00 提交作者 (needkane),\
  \ url (https://github.com/needkane)\n2022/07/16 19:39:00 提交作者 (nigeltao), url (https://github.com/nigeltao)\n\
  2022/07/16 19:39:00 提交作者 (nigeltao), url (https://github.com/nigeltao)\n2022/07/16\
  \ 19:39:00 提交作者 (h4ck3rm1k3), url (https://github.com/h4ck3rm1k3)\n2022/07/16 19:39:00\
  \ 提交作者 (trombonehero), url (https://github.com/trombonehero)\n2022/07/16 19:39:00\
  \ 提交作者 (adg), url (https://github.com/adg)\n```\n\n输出显示了从 `http://github.com/golang/go`\
  \ 仓库通过 GitHub 获取的信息，包括前 10 个 Issue、前 10 条评论以及前 10 个标签。这类信息非常有用，你将在阅读代码时看到它，而通过使用\
  \ GraphQL API 可以轻松执行此操作。\n\nGraphQL API 的主要部分是示例传递给 GitHub 端点的查询，如下所示：\n\n```graphql\n\
  query ($name: String!, $owner: String!) {\nrepository(owner: $owner, name: $name)\
  \ {\ncreatedAt\nforkCount\nlabels(first: 5) {\nedges {\nnode {\nname\n}\n}\n}\n\
  issues(first: 5) {\nedges {\nnode {\ntitle\n}\n}\n}\ncommitComments(first: 10) {\n\
  totalCount\nedges {\nnode {\nauthor {\nurl\nlogin\n}\n}\n}\n}\n}\n}\n```\n\n该查询向\
  \ GitHub 描述了你感兴趣的仓库信息。它首先定义查询将传入两个参数（`$name` 和 `$owner`），并且你需要的信息的顶层是一个仓库。在仓库内部，你指定了需要以下内容：\n\
  \n*   `createdAt`\n*   `forkCount`\n*   `labels`（前 10 个标签）\n*   `issues`（前 10 个\
  \ Issues）\n*   `commitComments`（前 10 条评论）\n\nGitHub 提供了一个用于创建和测试 GraphQL 的 GraphQL\
  \ 工具，你将在下一节中看到它。GraphQL 不能直接在代码中使用，因此你需要将其转换为 Go 结构体，如下所示：\n\n```go\ntype graphqlData\
  \ struct {\nRepository struct {\nCreatedAt githubv4.DateTime\nForkCount githubv4.Int\n\
  Labels    struct {\nEdges []struct {\nNode struct {\nName githubv4.String\n}\n}\n\
  } `graphql:\"labels(first: $labelcount)\"`\nIssues struct {\nEdges []struct {\n\
  Node struct {\nTitle githubv4.String\n}\n}\n} `graphql:\"issues(first: $issuescount)\"\
  `\nCommitComments struct {\nTotalCount githubv4.Int\nEdges      []struct {\nNode\
  \ struct {\nAuthor struct {\nURL   githubv4.String\nLogin githubv4.String\n}\n}\n\
  }\n} `graphql:\"commitComments(first: $commitcount)\"`\n} `graphql:\"repository(owner:\
  \ $owner, name: $name) \"`\nRateLimit struct {\nCost *int\n}\n}\n```\n\n结构体定义使用了库中定义的数据类型（例如\
  \ `githubv4.String`、`githubv4.Int` 等）。\n\n一旦定义了 GraphQL 结构体，就可以使用 GraphQL 库了。在本例中，使用托管在\
  \ `https://github.com/shurcooL/githubv4` 的开源库，如下所示：\n\n```go\nfunc main() {\n...\n\
  data := new(graphqlData)\nvars := map[string]interface{}{\n\"owner\":       githubv4.String(\"\
  golang\"),\n\"name\":        githubv4.String(\"go\"),\n\"labelcount\":  githubv4.Int(10),\n\
  \"issuescount\": githubv4.Int(10),\n\"commitcount\": githubv4.Int(10),\n}\nif err\
  \ := graphClient.Query(context.Background(), data, vars); err != nil {\nlog.Fatalf(err.Error())\n\
  }\nlog.Println(\"Total number of fork : \", data.Repository.ForkCount)\n...\n}\n\
  ```\n\n代码初始化了 `graphqlData` 结构体，该结构体将由库填充从 GitHub 接收到的信息。然后，它使用 `graphClient.Query(..)`\
  \ 函数调用 GitHub，并传入新创建的结构体和定义的变量。`vars` 中定义的变量包含将作为 GraphQL 参数传递给 GitHub 的值。\n\n一旦\
  \ `.Query(..)` 函数成功返回，你就可以使用填充在 `data` 变量中的返回数据，并将其打印到控制台。\n\n在下一节中，你将了解如何使用 GitHub\
  \ Explorer 处理 GraphQL。\n\n### GitHub Explorer\n\nGitHub Explorer 是 GitHub 提供的一种基于\
  \ Web 的工具，允许开发者查询 GitHub 仓库以获取信息。该工具可从 `https://docs.github.com/en/graphql/overview/explorer`\
  \ 获取。使用该工具前，你必须使用你的 GitHub 帐户登录。一旦获得访问权限，你将看到 Explorer，如图 8-13 所示。\n\n![GitHub Explorer\
  \ 用户界面截图](img/527551_1_En_8_Fig13_HTML.jpg)\n\n**图 8-13** GitHub Explorer\n\n登录后，尝试以下\
  \ GraphQL 并点击运行按钮。\n\n```graphql\n{\nrepository(owner: \"golang\", name: \"go\"\
  ) {\ncreatedAt\ndiskUsage\nname\n}\n}\n```\n\n它向 GitHub 查询仓库 `http://github.com/golang/go`，以提取创建日期、总磁盘使用量和项目名称。你将得到如下响应：\n\
  \n```json\n{\n\"data\": {\n\"repository\": {\n\"createdAt\": \"2014-08-19T04:33:40Z\"\
  ,\n\"diskUsage\": 310019,\n\"name\": \"go\"\n}\n}\n}\n```\n\nExplorer 会提供关于可以向查询添加哪些数据的快速提示。当你在查询中创建新行并按下\
  \ `Alt + Enter` 时，会显示这些提示。它将显示一个可滚动的工具提示，如图 8-14 所示。\n\n![智能工具提示截图](img/527551_1_En_8_Fig14_HTML.jpg)\n\
  \n**图 8-14** 智能工具提示\n\n有关可以使用 GraphQL 提取的不同数据的更多信息，请参阅位于 `https://docs.github.com/en/graphql/reference/queries`\
  \ 的查询文档。\n\n\n### 总结\n\n在本章中，你了解了一个名为 Scorecard 的开源项目，它为托管在 GitHub 上的项目提供安全指标。该项目以\
  \ 0-10 的评分标准衡量项目的安全性，该评分标准同样适用于本地存储的项目。该工具的主要优势在于，被扫描项目的相关数据可公开获取。这些数据对开发者极为有用，因为它能提供有关他们计划使用的项目安全指标的洞察和信息。\n\
  \n你还了解了该工具的工作原理，并学习了如何使用 GitHub API 提取仓库信息以执行预定义的安全检查。\n\n你详细了解了 GitHub API 的不同可用形式，即\
  \ REST 和 GraphQL。你查看了示例代码，以理解如何使用这些 API 从 GitHub 仓库中提取信息。最后，你探索了 GitHub Explorer，以理解如何构建用于在\
  \ GitHub 上执行查询操作的 GraphQL 查询。\n\n"
