  一张 Scorecard 输出结果的截图。一个包含十分制分数、名称、原因以及文档或补救措施的表格。\n\n图 8-9  \nScorecard 输出结果\n\n\
  您已成功运行该工具扫描一个 GitHub 仓库，并获得了最高为 8.0 分的输出结果。分数越高表示该仓库在工具预定义的检查项方面都做得很好。\n\n在下一节中，您将进一步探索该工具，了解其工作原理，并浏览该工具不同部分的代码。\n\
  \n\n\n#### 高层流程\n\n在本节中，你将深入理解该工具的工作原理，并查看其不同部分的代码。通过深入分析代码，你将发现可用于设计自有应用的新内容。首先，宏观了解一下该工具的处理流程，如图\
  \ 8-10 所示。\n\n![](img/527551_1_En_8_Fig10_HTML.jpg)\n\n高层数据流程图包括：开始、检查连接、下载扫描信息、goroutine、收集结果、发送结果、排序并打印结果。\n\
  \n**图 8-10** 高层流程\n\n阅读应用不同部分及其代码时，请将此图作为参考。工具启动时首先检查能否使用提供的令牌访问 GitHub。它通过访问 [`github.com/google/oss-fuzz`](http://github.com/google/oss-fuzz)\
  \ 仓库（步骤 2）来硬编码测试 GitHub 连接。如下代码片段所示（`checker/client.go`）：\n\n```\nfunc GetClients(...)\
