  \ `net.ResolveUDPAddr(..)` 连接到服务器并返回一个 `UDPAddr` 结构体。\n\n```\nudpAddr, err := net.ResolveUDPAddr(\"\
  udp\", s)\nif err != nil {\nprintln(\"Error Resolving UDP Address:\", err.Error())\n\
  os.Exit(1)\n}\n```\n\n该库会执行一次查找，以确保提供的域名有效，这是通过 DNS 查询完成的。如果遇到错误，`err` 变量将返回非空值。\n\
  \n深入研究标准库中的 `net.ResolveUDPAddr` 函数（如图 9-1 所示），您可以看到对该域名的 DNS 查询会返回多个 IP 地址，但只有第一个\
  \ IP 地址会被填入返回的 `UDPAddr` 结构体中。\n\n![](img/527551_1_En_9_Fig1_HTML.jpg)\n\n两张截图。上方是解释通过\
  \ IP 地址连接到服务器的代码片段。下方是来自解析 UDP 地址的多个 IP 地址。\n\n**图 9-1** 来自 `ResolveUDPAddr` 的多个\
  \ IP 地址\n\n一旦 `udpAddr` 成功填充，它将在调用 `net.DialUDP` 时使用。该函数调用会使用 `udpAddr` 中提供的 IP\
  \ 地址打开一个到服务器的套接字连接：\n\n```\nconn, err := net.DialUDP(\"udp\", nil, udpAddr)\n```\n\
  \n在本节中，您学习了如何使用标准库连接一个 UDP 服务器。在下一节中，您将进一步学习如何编写一个 UDP 服务器。\n\n#### UDP 服务器\n\n\
  在本节中，您将深入探索并使用标准库编写一个 UDP 服务器。该服务器在端口 3000 上监听，并打印出客户端发送的内容。代码位于 `chapter9/udp/server`\
  \ 目录中，可以按如下方式运行：\n\n```\ngo run main.go\n```\n\n该示例会在控制台打印出以下内容：\n\n```\n2022/03/05\
  \ 23:51:32 Listening [::]:3000\n```\n\n在一个终端窗口中，使用 `nc` 命令连接到端口 3000：\n\n```\nnc\
  \ -u localhost 3000\n```\n\n`nc` 工具运行后，输入任何文本，您都会看到它被打印在服务器的终端上。以下是在我的机器上的示例：\n\n\
  ```\n2022/03/05 23:51:32 Listening [::]:3000\n2022/03/05 23:51:36 Received: nanik\
  \ from [::1]:41518\n2022/03/05 23:51:44 Received: this is a long letter from [::1]:41518\n\
  ```\n\n让我们探讨代码是如何工作的。以下代码片段使用 `net.ListenUDP` 函数设置 UDP 服务器：\n\n```\n...\nfunc main()\
  \ {\nconn, err := net.ListenUDP(\"udp\", &net.UDPAddr{\nPort: 3000,\nIP:   net.ParseIP(\"\
  0.0.0.0\"),\n})\n...\n}\n```\n\n函数调用返回一个 `UDPConn` 结构体，用于从客户端读取数据和向客户端写入数据。代码成功创建\
  \ UDP 服务器连接后，便开始监听并从中读取数据，如下所示：\n\n```\n...\nfunc main() {\n...\nfor {\nmessage\
  \ := make([]byte, 512)\nl, u, err := conn.ReadFromUDP(message[:])\n...\nlog.Printf(\"\
  Received: %s from %s\\n\", data, u)\n}\n}\n```\n\n代码使用 UDP 连接的 `ReadFromUDP(..)`\
  \ 函数来读取客户端发送的数据，并将其打印到控制台。\n\n#### 并发服务器\n\n在上一节中，您编写了一个 UDP 服务器，但其中缺少的一个功能是处理多个\
  \ UDP 客户端请求的能力。编写一个能够处理多个请求的 UDP 服务器与普通的 TCP 不同。构建这种应用结构的方法是启动多个 goroutine 来监听同一个连接，并让每个\
  \ goroutine 负责处理请求。代码位于 `udp/concurrent` 目录中。让我们看看它与之前的 UDP 服务器实现相比有何不同。\n\n以下代码片段展示了启动多个\
  \ goroutine 来监听 UDP 连接的代码：\n\n```\n...\nfunc main() {\naddr := net.UDPAddr{\nPort:\
  \ 3333,\n}\nconnection, err := net.ListenUDP(\"udp\", &addr)\n...\nfor i := 0; i\
  \ < runtime.NumCPU(); i++ {\n...\ngo listen(id, connection, quit)\n...\n}\n...\n\
  }\n```\n\ngoroutine 的运行次数取决于 `runtime.NumCPU()` 返回的结果。这些 goroutine 使用 `listen` 函数，如下面的代码片段所示：\n\
  \n```\nfunc listen(i int, connection *net.UDPConn, quit chan struct{}) {\nbuffer\
  \ := make([]byte, 1024)\nfor {\n_, remote, err := connection.ReadFromUDP(buffer)\n\
  if err != nil {\nbreak\n}\n...\n}\n...\n}\n```\n\n现在，`listen` 函数以多个 goroutine 的形式运行，它通过调用\
  \ `ReadFromUDP` 函数等待传入的 UDP 请求。当检测到传入的 UDP 请求时，其中一个正在运行的 goroutine 会处理它。\n\n\n\n\
  #### 负载测试\n\n在本节中，你将了解如何使用负载测试来测试在前几节中编写的网络服务器。你将使用一款名为 `fortio` 的开源负载测试工具，该工具可从\
