  \n### 总结\n\n在本章中，你学习了如何使用 TCP 和 UDP 创建网络应用程序。你学习了如何为这两种协议编写客户端和服务器。你还学习了如何编写能够使用\
  \ goroutine 并发处理多个请求的应用程序。\n\n理解这一点很重要，因为这是编写能够处理海量流量的网络应用程序的基础。本章是下一章的垫脚石，在下一章中，你将学习在\
  \ Linux 中编写网络应用程序的不同风格。\n\n"
- "# 系统网络\n\n在上一章中，你使用标准库编写了 TCP 和 UDP 应用程序。在本章中，你将运用这些知识来构建系统网络工具。编写这些工具的目的是为了更深入地理解利用\
  \ Go 标准库的能力来实现这一点是多么容易。这突显了标准库提供了丰富的功能，使开发者能够构建各种网络相关应用。\n\n在本章中，你将深入理解以下内容：\n\n\
  - 使用标准库编写网络工具\n- `net/dns` 包\n- DNS 如何打包和解包消息\n\n### 源代码\n\n本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
  \ 仓库获取。\n\n### Ping 工具\n\n在本节中，你将编写一个提供类似 ping 功能的应用程序。代码位于 `chapter10/ping` 文件夹中。\n\
  \n该应用程序使用了 Go 标准库提供的 `icmp` 包，其文档可在 [`https://pkg.go.dev/golang.org/x/net/icmp`](https://pkg.go.dev/golang.org/x/net/icmp)\
  \ 找到。如文档所述，该包提供了操作基于 RFC 792 和 RFC 4443 的 ICMPv4/6 的函数。\n\n按如下方式编译应用程序：\n\n```\n\
  go build -o pinggoogle .\n```\n\n使用 root 权限运行应用程序，如下所示：\n\n```\nsudo ./pinggoogle\n\
  ```\n\n你将看到以下输出：\n\n```\n2022/01/21 00:07:09 Ping golang.org (142.250.66.241): 21.30063ms\n\
  ```\n\n为了提供类似 ping 的功能，代码使用了互联网控制消息协议（ICMP），该协议是所有网络协议栈都使用的 IP 协议栈的一部分，这意味着任何使用\
  \ IP 协议栈的计算机都可以响应 ICMP 请求，除非被禁用。IP 网络协议栈无论运行在何处，都具有响应 ICMP 请求的能力。ICMP 是 IP 协议栈的一部分，通常用于错误报告和网络诊断。\n\
  \n\n\n#### 代码详解\n\n接下来您将深入阅读示例代码，了解其整体运作原理。应用程序首先调用 `Ping()` 函数对单个域名执行 ping 操作。在本示例中，将针对\
  \ `golang.org` 域名进行 ping。\n\n```\nfunc main() {\n\taddr := \"golang.org\"\n\tdst,\
  \ dur, err := Ping(addr)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tlog.Printf(\"\
  Ping %s (%s): %s\\n\", addr, dst, dur)\n}\n```\n\n该函数执行一系列操作，我们逐段查看代码。以下代码片段调用了\
  \ `icmp.ListenPacket()`，该函数属于 `golang.org/x/net` 标准库包。此函数会打开一个本地套接字，用于与远程主机进行 ICMP\
  \ 通信。\n\n```\nfunc Ping(addr string) (*net.IPAddr, time.Duration, error) {\n\t//\
  \ 监听 ICMP 回复\n\tc, err := icmp.ListenPacket(\"ip4:icmp\", ListenAddr)\n\tif err\
  \ != nil {\n\t\treturn nil, 0, err\n\t}\n\tdefer c.Close()\n\t...\n}\n```\n\n打开的套接字仅用于\
  \ ICMP 通信，这意味着该套接字只能理解 ICMP 网络数据包。当本地套接字成功打开后，代码必须解析目标域名的 IP 地址。以下代码使用 `net.ResolveIPAddr()`\
  \ 函数调用将域名解析为对应的 IP 地址：\n\n```\ndst, err := net.ResolveIPAddr(\"ip4\", addr)\nif\
  \ err != nil {\n\tpanic(err)\n\treturn nil, 0, err\n}\n```\n\n现在您已打开用于 ICMP 的本地套接字连接并解析了目标域名的\
  \ IP 地址，下一步是初始化 ICMP 数据包并将其发送至目标，如下列代码片段所示：\n\n```\n// 准备新的 ICMP 消息\nm := icmp.Message{\n\
  \tType: ipv4.ICMPTypeEcho,\n\tCode: 0,\n\tBody: &icmp.Echo{\n\t\tID:   os.Getpid()\
  \ & 0xffff,\n\t\tSeq:  1,\n\t\tData: []byte(\"\"),\n\t},\n}\n```\n\n`icmp.Message`\
  \ 结构体定义了将作为 ICMP 数据包发送至目标的信息，该结构体定义在 `golang.org/x/net` 包中，内容如下：\n\n```\n// Message\
  \ 表示一条 ICMP 消息。\ntype Message struct {\n\tType     Type        // 类型，ipv4.ICMPType\
  \ 或 ipv6.ICMPType\n\tCode     int         // 代码\n\tChecksum int         // 校验和\n\
  \tBody     MessageBody // 消息体\n}\n```\n\nICMP 数据包可以包含不同类型的 ICMP 参数，这可以通过 `Type`\
  \ 字段指定。此处使用了 `ipv4.ICMPTypeEcho` 类型。以下是 Go 语言中提供的可用类型：\n\n```\nconst (\n\tICMPTypeEchoReply\
  \              ICMPType = 0  // 回显回复\n\tICMPTypeDestinationUnreachable ICMPType\
  \ = 3  // 目标不可达\n\tICMPTypeRedirect               ICMPType = 5  // 重定向\n\tICMPTypeEcho\
  \                   ICMPType = 8  // 回显\n\tICMPTypeRouterAdvertisement    ICMPType\
  \ = 9  // 路由器通告\n\tICMPTypeRouterSolicitation     ICMPType = 10 // 路由器请求\n\tICMPTypeTimeExceeded\
  \           ICMPType = 11 // 超时\n\tICMPTypeParameterProblem       ICMPType = 12\
  \ // 参数问题\n\tICMPTypeTimestamp              ICMPType = 13 // 时间戳\n\tICMPTypeTimestampReply\
  \         ICMPType = 14 // 时间戳回复\n\tICMPTypePhoturis               ICMPType = 40\
  \ // Photuris\n\tICMPTypeExtendedEchoRequest    ICMPType = 42 // 扩展回显请求\n\tICMPTypeExtendedEchoReply\
  \      ICMPType = 43 // 扩展回显回复\n)\n```\n\n定义类型后，下一个需要包含信息的字段是 `Body` 字段。此处使用 `icmp.Echo`，它将包含回显请求：\n\
  \n```\ntype Echo struct {\n\tID   int    // 标识符\n\tSeq  int    // 序列号\n\tData []byte\
  \ // 数据\n}\n```\n\n数据通过 `Marshal(..)` 函数转换为字节格式，然后通过 `WriteTo(b, dst)` 函数发送至目标。\n\
  \n```\n...\n// 序列化数据\nb, err := m.Marshal(nil)\nif err != nil {\n\treturn dst, 0,\
  \ err\n}\n...\n// 发送 ICMP 数据包\nn, err := c.WriteTo(b, dst)\n```\n\n最后一步是读取并解析从服务器获得的响应消息，如下所示：\n\
  \n```\n// 分配 1500 字节缓冲区用于读取响应\nreply := make([]byte, 1500)\n// 设置 1 分钟的超时时间\nerr\
  \ = c.SetReadDeadline(time.Now().Add(1 * time.Minute))\n...\n// 从连接中读取数据\nn, peer,\
  \ err := c.ReadFrom(reply)\n...\n// 使用 ParseMessage 解析接收到的字节数据\nrm, err := icmp.ParseMessage(ICMPv4,\
  \ reply[:n])\nif err != nil {\n\treturn dst, 0, err\n}\n// 检查 ICMP 结果的类型\nswitch\
  \ rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\treturn dst, duration, nil\n...\n}\n\
  ```\n\n读取数据包通过调用 `ReadFrom(..)` 函数完成，结果存储在 `reply` 变量中。`reply` 变量包含一个字节序列，即 ICMP\
  \ 响应。为了便于读取和操作数据，使用 `ParseMessage(..)` 函数并指定 ICMP 格式类型 `ICMPv4`。返回值是 `Message` 结构体类型。\n\
  \n解析代码后，检查接收到的响应类型，如下所示：\n\n```\nswitch rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\
  \treturn dst, duration, nil\ndefault:\n\treturn dst, 0, fmt.Errorf(\"从 %v 收到 %+v；期望回显回复\"\
  , peer, rm)\n}\n```\n\n在本节中，您学习了在使用标准库提供的 ICMP 时，如何打开并使用本地套接字连接来发送和接收数据。您还学习了如何像\
  \ ping 工具那样解析和打印响应。\n\n### DNS 服务器\n\n利用上一章编写 UDP 服务器的知识，您将编写一个 DNS 服务器。本节的目的是编写一个功能完整的\
  \ DNS 服务器，而是演示如何使用 UDP 来实现它。该 DNS 服务器是一个 DNS 转发器，它利用其他公开的 DNS 服务器来执行 DNS 查询功能，或者您可以将其视为一个\
  \ DNS 服务器代理。\n\n#### 运行 DNS 服务器\n\n代码位于 `chapter10/dnsserver` 文件夹中。编译代码如下：\n\n```\n\
  go build -o dns cmd/main.go\n```\n\n通过执行 `dns` 可执行文件来运行它：\n\n```\n./dns\n```\n\n\
  应用成功启动后会显示以下消息：\n\n```\n2022/03/14 22:17:15 启动 DNS 服务器，端口 8090\n```\n\n现在 DNS 服务器已准备好在端口\
  \ 8090 上服务 DNS 请求。\n\n要测试 DNS 服务器，请按如下方式使用 `dig`：\n\n```\ndig @localhost  -p 8090\
  \ golang.org\n```\n\n您会从 `dig` 得到类似如下的 DNS 输出：\n\n```\n; > DiG 9.11.5-P4-5.1ubuntu2.1-Ubuntu\
  \ > @localhost -p 8090 golang.org\n; (找到 2 个服务器)\n;; 全局选项: +cmd\n;; 获得回答:\n;; ->>HEADER<<-\
  \ opcode: QUERY, status: NOERROR, id: 26897\n;; flags: qr rd ra; QUERY: 1, ANSWER:\
  \ 1, AUTHORITY: 0, ADDITIONAL: 1\n;; OPT PSEUDOSECTION:\n; EDNS: version: 0, flags:;\
  \ udp: 512\n;; QUESTION SECTION:\n;golang.org.                    IN      A\n;;\
  \ ANSWER SECTION:\ngolang.org.             294     IN      A       142.250.71.81\n\
  ;; 查询时间: 6 毫秒\n;; SERVER: ::1#8090(::1)\n;; WHEN: Mon Mar 14 22:20:31 AEDT 2022\n\
  ;; MSG SIZE  rcvd: 55\n```\n\n您也可以按如下方式使用 `nslookup`：\n\n```\nnslookup -port=8090\
  \ golang.org localhost\n```\n\n现在您已成功运行并使用 DNS 服务器，下一节将介绍如何编写代码。\n\n\n\n#### DNS\
  \ 转发器\n\n在本节中，你将使用基于 UDP 的 DNS 转发器，将查询转发至外部 DNS 服务器，并利用响应结果向客户端回复。在你的代码中，将使用谷歌的公共\
  \ DNS 服务器 `8.8.8.8` 来执行查询。\n\n代码首先要做的就是在本地创建一个 UDP 服务器，监听 `8090` 端口，如下所示：\n\n```go\n\
  func main() {\ndnsConfig := DNSConfig{\n...\nport:         8090,\n}\nconn, err :=\
  \ net.ListenUDP(\"udp\", &net.UDPAddr{Port: dnsConfig.port})\n...\n}\n```\n\n成功打开\
  \ `8090` 端口后，下一步是打开与外部 DNS 服务器的连接，并启动服务器。\n\n```go\nfunc main() {\ndnsConfig :=\
  \ DNSConfig{\ndnsForwarder: \"8.8.8.8:53\",\n...\n}\n...\ndnsFwdConn, err := net.Dial(\"\
  udp\", dnsConfig.dnsForwarder)\n...\ndnsServer := dns.NewServer(conn, dns.NewUDPResolver(dnsFwdConn))\n\
  ...\ndnsServer.Start()\n}\n```\n\n本地 UDP 服务器等待传入的 DNS 请求。一旦接收到传入的 UDP 请求，就会由 `handleRequest()`\
  \ 进行处理。你在上一节中已经看到，读取 UDP 请求的方式是调用 `ReadFromUDP(..)` 函数，如下所示：\n\n```go\nfunc (s *Server)\
  \ handleRequest() error {\nmsg, clientAddr, err := s.readRequest()\n...\n}\nfunc\
  \ (s *Server) readRequest() (dnsmessage.Message, *net.UDPAddr, error) {\nbuf :=\
  \ make([]byte, 1024)\n_, addr, err := s.conn.ReadFromUDP(buf)\n...\n}\n```\n\n`readRequest()`\
  \ 函数在收到传入请求后，会使用内置的 `golang.org/x/n/dns` 包解包数据，如下所示：\n\n```go\nfunc (s *Server)\
  \ readRequest() (dnsmessage.Message, *net.UDPAddr, error) {\n...\nvar msg dnsmessage.Message\n\
  err = msg.Unpack(buf)\n...\n}\n```\n\n解包后的数据现在存储在一个 `dnsmessage.Message` 结构体中，其声明如下：\n\
  \n```go\ntype Message struct {\nHeader\nQuestions   []Question\nAnswers     []Resource\n\
  Authorities []Resource\nAdditionals []Resource\n}\n```\n\n代码成功解包了传入请求中的数据。下一步是将相同的请求发送至\
  \ DNS 转发器，并处理响应，以便将其转发回客户端。`ResolveDNS(..)` 函数将新创建的 `dnsmessage.Message` 结构体发送至\
  \ DNS 转发器，并处理接收到的响应。\n\n```go\nfunc (r *DNSResolver) ResolveDNS(msg dnsmessage.Message)\
  \ (dnsmessage.Message, error) {\npackedMsg, err := msg.Pack()\n...\n_, err = r.fwdConn.Write(packedMsg)\n\
  ...\nresBuf := make([]byte, 1024)\n_, err = r.fwdConn.Read(resBuf)\n...\nvar resMsg\
  \ dnsmessage.Message\nerr = resMsg.Unpack(resBuf)\n...\n}\n```\n\n收到 DNS 转发器的响应后，`handleRequest(..)`\
  \ 函数会根据 `ResolveDNS(..)` 的返回值，发送 DNS 正常响应或错误消息。\n\n```go\nfunc (s *Server) handleRequest()\
  \ error {\n...\nrMsg, err := s.resolver.ResolveDNS(msg)\nif err != nil {\ns.sendResponseWithError(clientAddr,\
  \ msg, err)\n...\n}\n...\nreturn s.sendResponse(clientAddr, rMsg)\n}\n```\n\n`sendResponse(..)`\
  \ 函数仅将接收自 DNS 转发器的消息打包，然后将其发送回客户端。\n\n```go\nfunc (s *Server) sendResponseWithError(clientAddr\
  \ *net.UDPAddr, msg dnsmessage.Message, err error) {\n...\nerr = s.sendResponse(clientAddr,\
  \ msg)\n...\n}\nfunc (s *Server) sendResponse(addr *net.UDPAddr, message dnsmessage.Message)\
  \ error {\npacked, err := message.Pack()\n...\n_, err = s.conn.WriteToUDP(packed,\
  \ addr)\n}\n```\n\n#### 打包与解包\n\n在上一节中，你了解了请求是如何通过解包响应，然后再打包并作为 DNS 响应发送回客户端来处理的。在本节中，你将了解\
  \ DNS 数据的结构。\n\n传入的请求以字节形式到达，这些字节会被解包或转换为 `Message` 结构体。\n\n```go\ntype Message\
  \ struct {\nHeader\nQuestions   []Question\nAnswers     []Resource\nAuthorities\
  \ []Resource\nAdditionals []Resource\n}\n```\n\n`Header` 字段包含以下结构，该结构对应 DNS 协议的头部：\n\
  \n```go\ntype Header struct {\nID                 uint16\nResponse           bool\n\
  OpCode             OpCode\nAuthoritative      bool\nTruncated          bool\nRecursionDesired\
  \   bool\nRecursionAvailable bool\nRCode              RCode\n}\n```\n\n`Resource`\
  \ 结构体在 `Answers`、`Authorities` 和 `Additionals` 字段中使用，如下所示：\n\n```go\ntype Resource\
  \ struct {\nHeader ResourceHeader\nBody   ResourceBody\n}\n```\n\n`Questions` 字段包含客户端所请求的\
  \ DNS 信息，而 `Answers` 字段则包含对这些问题的响应。图 10-1 展示了当使用 `dig` 命令（如下所示）对 `google.com` 进行查询时，`dnsmessage.Message`\
  \ 结构体在解包传入请求数据后所包含的内容：\n\n![一张系统网络 DNS 数据代码的截图，包含消息、头部、ID、响应、操作码、截断、问题、名称、类型、类别、答案、头部和主体。](img/527551_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 包含 DNS 查询数据的 `dnsmessage.Message`\n\n```\ndig @localhost -p 8090 google.com\n\
  ```\n\n图 10-2 展示了当字节被解包时，从 DNS 转发器接收到的响应。如你所见，`Answers` 字段中填充了查询的答案。\n\n![一张系统网络\
  \ DNS 数据代码的截图，包含消息、头部、ID、响应、操作码、截断、问题、名称、类型、类别、答案、头部和主体。](img/527551_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 包含 DNS 响应数据的 `dnsmessage.Message`\n\n### 总结\n\n在本章中，你学习了更多关于使用 UDP\
  \ 的细节。IP 协议栈的特性之一是能够使用 ICMP 协议检查服务器的可用性。你还学习了如何使用 UDP 编写一个 DNS 转发器服务器，该服务器使用 `net/dns`\
  \ 包标准库来处理 DNS 请求和响应。现在，你对标准库的特性有了比其提供的功能更深入的理解；同时，这也展示了这些库在帮助我们开发有用的网络工具方面的多功能性。\n\
  \n"
- '# 11. Google gopacket


  在上一章中，你学习了如何使用 Go 标准库构建网络工具。在本章中，你将进一步研究谷歌提供的名为 `gopacket` 的开源网络库。该库的源代码可以在 [`github.com/google/gopacket`](https://github.com/google/gopacket)
  找到，库的文档可以在 [`pkg.go.dev/github.com/google/gopacket`](https://pkg.go.dev/github.com/google/gopacket)
  找到。你在本章中将要查看的源代码分支是 *master* 分支。


  `gopacket` 提供了标准库中无法找到的低层网络数据包操作能力。它为开发者提供了一个简单的 API，用来操作从网络接口获取的不同网络层的信息。在本章中，你将学习：


  - `gopacket` 的工作原理

  - 如何使用 `gopacket` 编写网络流量嗅探器

  - 关于网络捕获文件


  ### 源代码


  本章的源代码可从 [`github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
  仓库获取。




  ### gopacket


  在本节中，你将探索 `gopacket` 并了解该库的主要部分，以理解其工作原理。该库提供了编写需要捕获和分析网络流量的应用程序的能力。它负责与内核通信以获取所有网络数据，解析数据并将其提供给应用程序使用。`gopacket`
  使用了一个长期以来一直是 Linux 工具箱一部分的包捕获 Linux 库，名为 `libpcap`。更多信息可在 [`www.tcpdump.org/index.xhtml`](http://www.tcpdump.org/index.xhtml)
  找到。


  `libpcap` 库提供了从网卡抓取网络数据包的功能，这些数据包随后被解析并转换为相关协议，以便应用程序轻松使用。`gopacket` 提供了两种主要的可供应用程序使用的数据结构类型，即
  `Packet` 和 `Layer`，接下来将详细探讨它们。


  #### Layer


  在本节中，你将了解 `Layer` 接口。该接口是库中的主要接口，用于保存与原始网络数据相关的数据。该接口定义如下：


  ```

  type Layer interface {

  // LayerType 是该层的 gopacket 类型。

  LayerType() LayerType

  // LayerContents 返回构成该层的字节集合。

  LayerContents() []byte

  // LayerPayload 返回该层内包含的字节集合，不包括该层本身。

  LayerPayload() []byte

  }

  ```


  `LayerContents` 包含表示特定层的字节。例如，如果这是一个以太网层，那么它将包含构成以太网帧的字节，而 `LayerPayload` 将包含表示以太网协议的字节。


  `LayerType` 定义如下，它包含了该层所代表的类型（例如：以太网、ARP、TCP 等）：


  ```

  type LayerType int64

  ```


  `layertypes.go` 源文件包含了库中支持的不同网络层，如下面的代码片段所示：


  ```

  import (

  ...

  )

  var (

  LayerTypeARP                          = gopacket.RegisterLayerType(10, gopacket.LayerTypeMetadata{Name:
  "ARP", Decoder: gopacket.DecodeFunc(decodeARP)})

  LayerTypeCiscoDiscovery               = gopacket.RegisterLayerType(11, gopacket.LayerTypeMetadata{Name:
  "CiscoDiscovery", Decoder: gopacket.DecodeFunc(decodeCiscoDiscovery)})

  LayerTypeEthernetCTP                  = gopacket.RegisterLayerType(12, gopacket.LayerTypeMetadata{Name:
  "EthernetCTP", Decoder: gopacket.DecodeFunc(decodeEthernetCTP)})

  ...

  LayerTypeIPv4                         = gopacket.RegisterLayerType(20, gopacket.LayerTypeMetadata{Name:
  "IPv4", Decoder:

  ...

  )

  ```


  使用 `Layer` 接口的不同协议可以在 `layers` 目录中找到，如图 11-1 所示。


  ![](img/527551_1_En_11_Fig1_HTML.jpg)


  一张截图展示了 layer 目录中使用 layer 接口的不同协议。


  **图 11-1** Layer 结构体实现


  `layers` 目录中的源代码包含了每种协议的实现，以及如何从从内核获取的原始字节中读取它们。


  ##### TCP Layer


  让我们看看一个 TCP 协议实现的例子，该实现可以在 `layers/tcp.go` 文件中找到。包含 TCP 协议信息的 TCP 结构体声明如下：


  ```

  type TCP struct {

  BaseLayer

  SrcPort, DstPort                           TCPPort

  Seq                                        uint32

  Ack                                        uint32

  DataOffset                                 uint8

  FIN, SYN, RST, PSH, ACK, URG, ECE, CWR, NS bool

  Window                                     uint16

  Checksum                                   uint16

  Urgent                                     uint16

  sPort, dPort                               []byte

  Options                                    []TCPOption

  Padding                                    []byte

  opts                                       [4]TCPOption

  tcpipchecksum

  }

  ```


  以下代码展示了 `DecodeFromBytes` 函数，它读取原始字节并将其转换为 TCP 结构体：


  ```

  func (tcp *TCP) DecodeFromBytes(data []byte, df gopacket.DecodeFeedback) error {

  ...

  tcp.SrcPort = TCPPort(binary.BigEndian.Uint16(data[0:2]))

  tcp.sPort = data[0:2]

  tcp.DstPort = TCPPort(binary.BigEndian.Uint16(data[2:4]))

  tcp.dPort = data[2:4]

  tcp.Seq = binary.BigEndian.Uint32(data[4:8])

  tcp.Ack = binary.BigEndian.Uint32(data[8:12])

  ...

  ...

  }

  ```


  逐个查看每个协议源文件，你将看到该库支持的不同协议的实现。


  #### Packet


  `Packet` 是你的应用程序将要处理的主要类型。从底层 `libpcap` 库读取的数据将以此处更易于开发者理解的形式呈现。让我们看看定义在 `packet.go`
  文件中的 `Packet` 结构体：


  ```

  type Packet interface {

  String() string

  Dump() string

  Layers() []Layer

  Layer(LayerType) Layer

  LayerClass(LayerClass) Layer

  LinkLayer() LinkLayer

  NetworkLayer() NetworkLayer

  TransportLayer() TransportLayer

  ApplicationLayer() ApplicationLayer

  ErrorLayer() ErrorLayer

  Data() []byte

  Metadata() *PacketMetadata

  }

  ```


  该结构体包含多个不同的函数，这些函数返回你上一节中看到的不同类型的 `Layer`。为了更好地理解，让我们看看由 `ApplicationLayer()` 函数返回的
  `ApplicationLayer` 类型，该类型定义在同一个文件 `packet.go` 中。


  ```

  type ApplicationLayer interface {

  Layer

  Payload() []byte

  }

  ```


  `ApplicationLayer` 是一个接口，它包含了 `Layer` 类型和 `Payload()` 函数，该函数将返回与该特定层相关的网络捕获中的原始字节。下一节你将看到一个关于如何使用
  `Packet` 中不同函数的示例。


  ### 使用 gopacket


  在本节中，你将看到如何使用 `gopacket` 的示例。这些示例将为你提供使用该库的思路，并展示该库在读取网络协议方面的能力。


  #### pcap


  让我们花点时间理解 pcap。它代表包捕获（packet capture）。Linux 拥有允许开发者或系统管理员进行网络故障排除的工具，其中一种工具就是包捕获工具。包捕获工具允许
  Linux root 用户捕获机器上的网络流量。


  流量数据可以保存到文件中，稍后读取进行分析。这种能力对于在云环境或本地环境中执行审计以及安全和网络故障排除非常有用。在本章中，你将捕获并分析 pcap 文件。


  ##### 安装 libpcap


  代码依赖于一个名为 libpcap 的 Linux 库（[`www.tcpdump.org/manpages/pcap.3pcap.xhtml`](http://www.tcpdump.org/manpages/pcap.3pcap.xhtml)）。这个库是帮助执行网络捕获的主要库。请确保你的本地
  Linux 机器上已安装该库。使用以下命令安装该库：


  ```

  sudo apt-get install libpcap-dev

  ```


  安装成功后，你需要重启机器。



  好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译为中文。



