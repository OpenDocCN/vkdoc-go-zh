  \ err := nmap.NewScanner(nmap.WithBinaryPath(portScanConf.ScannerBinPath))\n...\n\
  return listenIPPorts, nil\n}\n```\n\n该代码使用了来自 `github.com/Ullaakut/nmap` 的开源 `nmap`\
  \ 库来执行扫描操作。在深入了解该库如何执行 `nmap` 之前，我们先了解一下什么是 `nmap`。工具 `nmap` 是一个用于网络探索和安全审计的命令行工具。它用于收集网络的实时信息，检测网络环境中哪些端口是开放的，检查网络中哪些\
  \ IP 地址处于激活状态等等。\n\n请确保你的本地机器上安装了 `nmap` 工具。如果你使用的是基于 Debian 的 Linux 发行版，请使用以下命令进行安装：\n\
  \n```\nsudo apt install nmap\n```\n\n运行 `nmap` 以检查是否能够成功运行。\n\n```\nnmap\n```\n\n\
  你会看到类似下面的输出：\n\n```\nNmap 7.80 ( https://nmap.org )\nUsage: nmap [Scan Type(s)]\
  \ [Options] {target specification}\nTARGET SPECIFICATION:\n...\nHOST DISCOVERY:\n\
  ...\nSCAN TECHNIQUES:\n...\nEXAMPLES:\nnmap -v -A scanme.nmap.org\nnmap -v -sn 192.168.0.0/16\
  \ 10.0.0.0/8\nnmap -v -iR 10000 -Pn -p 80\n```\n\n让我们看一下 `chapter13/nmap` 目录中提供的示例代码，并按如下方式运行：\n\
  \n```\ngo run main.go\n```\n\n该应用程序会运行并扫描你本地机器的开放端口。在我的机器上，输出如下：\n\n```\nHost \"\
  127.0.0.1\":\nPort 22/tcp open ssh\nPort 631/tcp open ipp\nPort 5432/tcp open postgresql\n\
  Nmap done: 1 hosts up scanned in 0.020000 seconds\n```\n\n该代码检测到了三个开放端口，分别与 `ssh`、`ipp`\
  \ 和 `postgresql` 应用程序相关。根据你本地机器上开放的端口，你可能会得到不同的结果。\n\n使用 `nmap` 库的代码片段如下：\n\n```\n\
  package main\nimport (\n...\n\"github.com/Ullaakut/nmap/v2\"\n)\nfunc main() {\n\
  ...\nscanner, err := nmap.NewScanner(\nnmap.WithTargets(\"localhost\"),\nnmap.WithContext(ctx),\n\
  )\n...\n}\n```\n\n该示例代码通过调用 `nmap.NewScanner(..)` 来初始化库。在该函数内部，初始化代码会检查 `nmap` 工具是否已安装，如下面的代码片段所示：\n\
  \n```\nfunc NewScanner(options ...Option) (*Scanner, error) {\n...\nif scanner.binaryPath\
  \ == \"\" {\nvar err error\nscanner.binaryPath, err = exec.LookPath(\"nmap\")\n\
  if err != nil {\nreturn nil, ErrNmapNotInstalled\n}\n}\n...\nreturn scanner, nil\n\
  }\n```\n\n该函数使用 Go 的 `os/exec` 包来检查 `nmap` 工具的存在性。一旦库成功初始化，它会调用 `Run()` 函数来执行扫描操作。\n\
  \n```\npackage main\nimport (\n...\n\"github.com/Ullaakut/nmap/v2\"\n)\nfunc main()\
  \ {\n...\nresult, warnings, err := scanner.Run()\n...\n}\n```\n\n库的 `Run()` 函数执行以下任务：\n\
  \n*   使用提供的参数执行 `nmap` 工具\n*   执行 Go 协程等待来自 `nmap` 工具的结果，该结果将被解析并转换为结构体，然后返回给调用者\n\
  \n\n\n变量`result`的类型是`Run`结构体，在库中声明如下：\n\n```\ntype Run struct {\nXMLName xml.Name\
  \ `xml:\"nmaprun\"`\nArgs             string         `xml:\"args,attr\" json:\"\
  args\"`\nProfileName      string         `xml:\"profile_name,attr\" json:\"profile_name\"\
  `\nScanner          string         `xml:\"scanner,attr\" json:\"scanner\"`\nStartStr\
  \         string         `xml:\"startstr,attr\" json:\"start_str\"`\nVersion   \
  \       string         `xml:\"version,attr\" json:\"version\"`\nXMLOutputVersion\
  \ string         `xml:\"xmloutputversion,attr\" json:\"xml_output_version\"`\nDebugging\
  \        Debugging      `xml:\"debugging\" json:\"debugging\"`\nStats          \
  \  Stats          `xml:\"runstats\" json:\"run_stats\"`\nScanInfo         ScanInfo\
  \       `xml:\"scaninfo\" json:\"scan_info\"`\nStart            Timestamp      `xml:\"\
  start,attr\" json:\"start\"`\nVerbose          Verbose        `xml:\"verbose\" json:\"\
  verbose\"`\nHosts            []Host         `xml:\"host\" json:\"hosts\"`\nPostScripts\
  \      []Script       `xml:\"postscript>script\" json:\"post_scripts\"`\nPreScripts\
  \       []Script       `xml:\"prescript>script\" json:\"pre_scripts\"`\nTargets\
  \          []Target       `xml:\"target\" json:\"targets\"`\nTaskBegin        []Task\
  \         `xml:\"taskbegin\" json:\"task_begin\"`\nTaskProgress     []TaskProgress\
  \ `xml:\"taskprogress\" json:\"task_progress\"`\nTaskEnd          []Task       \
  \  `xml:\"taskend\" json:\"task_end\"`\nNmapErrors []string\nrawXML     []byte\n\
  }\n```\n\n来自`nmap`的原始输出（XML 格式）如下所示：\n\n```\n\n...\n\n```\n\n#### Exec\n\n在 Vuls\
  \ 中频繁使用的下一个功能是执行外部工具以作为扫描过程的一部分执行某些操作。以下是一些 Vuls 用于获取网络 IP 信息、获取内核信息、更新包管理器索引以及许多其他功能的命令。\n\
  \n| `apk update` | 从仓库下载更新的包索引 |\n| `/sbin/ip -o addr` | 列出网络设备、路由和其他网络相关信息 |\n\
  | `uname -r` | 打印系统信息 |\n| `stat /proc/1/exe` | 获取 PID 1 的信息 |\n| `systemctl status`\
  \ | 列出注册到 system 的信息 |\n\n不同操作系统使用的命令不同，但使用`os/exec`包运行它们的方式是相同的。\n\n查看位于`chapter13/exec`文件夹中的示例应用，并按如下方式在终端中运行它：\n\
  \n```\ngo run main.go\n```\n\n你将获得如下输出：\n\n```\n2022/06/26 21:18:28 --------------\n\
  2022/06/26 21:18:28 Running ip link\n2022/06/26 21:18:28 --------------\n2022/06/26\
  \ 21:18:28 1: lo:  mtu 65536 qdisc noqueue state UNKNOWN mode DEFAULT group default\
  \ qlen 1000\nlink/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n...\n2022/06/26\
  \ 21:18:28\n2022/06/26 21:18:28 ---------------\n2022/06/26 21:18:28 Running noexist\n\
  2022/06/26 21:18:28 ---------------\n2022/06/26 21:18:28 %v exit status 127\n2022/06/26\
  \ 21:18:28 Running uname -r\n2022/06/26 21:18:28 ----------------\n2022/06/26 21:18:28\
  \ 5.17.5-76051705-generic\n```\n\n该示例应用使用`os/exec`包来执行命令并将输出打印到控制台。以下代码片段展示了使用`os/exec`包的函数：\n\
  \n```\npackage main\nimport (\n..\nex \"os/exec\"\n)\nfunc main() {\n...\nRun(\"\
  ip link\")\n...\nRun(\"noexist\")\n...\nRun(\"uname -r\")\n}\nfunc Run(arg string)\
  \ {\nvar cmd *ex.Cmd\ncmd = ex.Command(\"/bin/sh\", \"-c\", arg)\n...\n}\n```\n\n\
  `Run(..)`函数接收一个字符串参数，该参数在调用`Command(..)`函数时被添加到参数中。该示例将传递给`Run(..)`函数的参数作为`/bin/sh`命令工具的一部分来运行。例如，当调用`Run(\"\
  ip link\")`时，它会按如下方式运行：\n\n```\n/bin/sh -c ip link\n```\n\n该应用指定将输出存储到变量中，以便打印到控制台：\n\
  \n```\nfunc Run(arg string) {\n...\ncmd.Stdout = &stdoutBuf\ncmd.Stderr = &stderrBuf\n\
  log.Println(stdoutBuf.String())\nlog.Println(stderrBuf.String())\n}\n```\n\n####\
  \ SQLite\n\n在本节中，你将学习如何使用 SQLite 数据库。特别地，你将学习如何使用`sqlite3`库来读写数据库。\n\nSQLite 是一个轻量级、自包含的\
  \ SQL 数据库，允许应用程序读取和存储信息。应用程序使用标准的 SQL 语法执行不同类型的数据操作，例如插入、更新和删除数据。SQLite 的轻量级和可移植性使其成为不需要集中式数据库的项目中有吸引力的选择。像\
  \ Android 这样的手机使用 SQLite 数据库，应用程序可以将其用于移动应用。\n\n在内部，Vuls 大量使用 SQLite 来存储从不同来源下载的数据。你将查看使用\
  \ SQLite 的示例应用程序。本节示例代码位于`chapter13/sqlite`目录中。让我们按如下方式从终端运行示例应用程序：\n\n```\ngo run\
  \ main.go\n```\n\n你将获得如下输出：\n\n```\n2022/06/27 19:40:04 Initialize database -  local.db\n\
  2022/06/27 19:40:04 Creating table in -   local.db\n2022/06/27 19:40:04 Inserting\
  \ data into -  local.db\nReading Table:\n2022/06/27 19:40:04 Total rows read - \
  \ [{0 CAD} {1 AUD} {2 AUD} {3 GBP} {4 CAD} {5 EUR} {6 USD} {7 USD} {8 CAD} {9 USD}\
  \ {10 GBP} {11 CAD} {12 AUD} {13 GBP} {14 EUR} {15 GBP} {16 CAD} {17 USD} {18 AUD}\
  \ {19 CAD} {20 USD} {21 CAD} {22 EUR} {23 EUR} {24 AUD}]\n```\n\n示例代码创建了一个名为`local.db`的新数据库，并创建了一个名为`currencies`的新表。它还向其中插入了一些数据，并将新插入的数据打印到控制台。\n\
  \n以下代码片段展示了初始化数据库的代码：\n\n```\npackage main\nimport (\n...\n_ \"github.com/mattn/go-sqlite3\"\
  \n...\n)\n...\nfunc main() {\n...\ndbHandle = InitDB(dbname)\n...\n}\n// InitDB\
  \ initialize database\nfunc InitDB(filepath string) *sql.DB {\ndb, err := sql.Open(\"\
  sqlite3\", filepath)\nif err != nil {\npanic(err)\n}\nreturn db\n}\n```\n\n`InitDB`函数使用`sql.Open`创建新数据库，并传入`sqlite3`作为参数。`sqlite3`参数被`database/sql`模块用作查找适当驱动程序的引用。如果成功，它将返回存储在`db`变量中的`sql.DB`结构体。\n\
  \n`sql.DB`结构体在`database/sql`模块中声明如下：\n\n```\ntype DB struct {\n...\nconnector driver.Connector\n\
  ...\nclosed            bool\n...\nstop func()\n}\n```\n\n数据库成功创建后，代码会创建一个名为`currencies`的表，由以下`InitTable(..)`函数执行：\n\
  \n```\n...\nfunc InitTable(db *sql.DB) {\nq := `\nCREATE TABLE IF NOT EXISTS currencies(\n\
  Id TEXT NOT NULL PRIMARY KEY,\nName TEXT,\nInsertedDatetime DATETIME\n);`\n_, err\
  \ := db.Exec(q)\nif err != nil {\nlog.Fatal(err)\n}\n}\n```\n\n该函数使用`db.Exec(..)`函数执行`CREATE\
  \ TABLE..`SQL 命令。函数`db.Exec(..)`用于对数据库执行查询而不返回任何行。返回值类型为`Result`，在`InitTable(..)`函数中未使用。`Result`结构体在`database/sql`模块中声明如下：\n\
  \n```\ntype Result interface {\nLastInsertId() (int64, error)\nRowsAffected() (int64,\
  \ error)\n}\n```\n\n成功创建表后，代码继续插入数据。此操作分为两部分。第一部分是准备要插入的数据，如下代码片段所示：\n\n```\nfunc\
  \ main() {\n...\nrecords := []Record{}\nfor i := 0; i < 25; i++ {\nr := (rand.Intn(len(curNames)-0)\
  \ + 0)\nd := strconv.Itoa(i)\nrec := Record{Id: d, Name: curNames[r]}\nrecords =\
  \ append(records, rec)\n}\n...\n}\n```\n\n代码创建了一个`Record`结构体数组并填充它，然后将填充后的数组作为参数传递给`InsertData(..)`函数：\n\
  \n\n\n`func InsertData(db *sql.DB, records []Record) { q := \\` INSERT OR REPLACE\
  \ INTO currencies( Id, Name, InsertedDatetime ) values(?, ?, CURRENT_TIMESTAMP)\\\
  ` stmt, err := db.Prepare(q) ... defer stmt.Close() for _, r := range records {\
  \ _, err := stmt.Exec(r.Id, r.Name) ... } }`\n\n该函数使用了`INSERT INTO`语句，该语句被用于`Prepare()`函数内部。`Prepare()`函数用于创建预处理语句，这些语句可以在之后独立执行。SQL\
  \ 语句中的值使用参数占位符（占位符由`?`符号标记），这些占位符在使用`Exec()`函数执行时作为参数的一部分被传入。值从`Record`结构体的`Id`和`Name`字段获取。\n\
  \n现在数据已插入表中，代码通过从表中读取数据并将其打印到控制台来完成执行，如下所示：\n\n`func ReadData(db *sql.DB) []Record\
  \ { q := \\` SELECT Id, Name FROM currencies ORDER BY datetime(InsertedDatetime)\
  \ DESC\\` rows, err := db.Query(q) ... var records []Record for rows.Next() { item\
  \ := Record{} err := rows.Scan(&item.Id, &item.Name) ... records = append(records,\
  \ item) } return records }`\n\n`ReadData()`函数使用`SELECT` SQL 语句从表中读取字段，结果按`InsertedDateTime`字段降序排序。代码使用了`Query()`函数，返回`Rows`结构体并对其循环遍历。在循环内部，代码使用`Scan()`函数从每一行复制字段，并将数据读取到参数中传入的变量中。在本代码示例中，字段被读取到`item.Id`和`item.Name`中。\n\
  \n传递给`Scan()`的参数数量必须与从表中读取的字段数量一致。使用`Query()`函数时返回的`Rows`结构体定义在`database/sql`模块中。\n\
  \n```\ntype Rows struct {\n    dc          *driverConn\n    releaseConn func(error)\n\
  \    ...\n    closemu sync.RWMutex\n    closed  bool\n    lasterr error\n    ...\n\
  }\n```\n\n### 总结\n\n在本章中，你了解了一个名为 Vuls 的开源安全项目，它提供了漏洞扫描能力。你通过查看代码并在本地机器上执行扫描操作来学习\
  \ Vuls。\n\nVuls 提供了许多功能。在学习 Vuls 工作原理的过程中，你了解了端口扫描、从 Go 语言执行外部命令行应用程序，以及编写使用 SQLite\
  \ 执行数据库操作的代码。\n\n"
- "# 14. CrowdSec\n\n在本章中，你将了解一个名为 CrowdSec（`https://github.com/crowdsecurity/crowdsec`）的开源安全工具。研究这个工具之所以有趣，有几个原因：\n\
  \n-   它利用众包数据收集全球范围内的 IP 信息，并与社区共享。\n-   它提供了值得查看和学习的代码设计。\n-   GeoIP 数据库本身也很有趣。\n\
  \n本章分为安装部分和学习部分。在安装部分，你将了解如何安装 CrowdSec，以理解其工作原理。在学习部分，你将深入探讨 CrowdSec 如何实现某些功能，并通过查看示例代码从中学习。\n\
  \n### 源代码\n\n本章的源代码可从 `https://github.com/Apress/Software-Development-Go` 仓库获取。\n\
  \n### CrowdSec 项目\n\n文档（`https://doc.crowdsec.net/docs/intro`）很好地解释了它：\n\nCrowdSec\
  \ 是一个开源、轻量级的软件，它允许你检测具有恶意行为的对等节点，并在不同层级（基础设施层、系统层、应用层）阻止它们访问你的系统。\n\nCrowdSec 作为一个开源安全工具，提供了相当多的功能，非常适合在云环境中使用。这个工具最吸引人的地方在于社区收集的数据。这种众包数据使得\
  \ CrowdSec 能够判断某个特定 IP 地址是否应该被禁止，或者是否应该被允许进入你的基础设施。\n\n你将从这个项目中学到许多架构和代码设计，这些内容将在“从\
  \ CrowdSec 中学习”一节中进一步探讨。\n\n\n\n#### 使用 CrowdSec\n\n我不会介绍 CrowdSec 的完整安装过程，而是介绍一个最小化安装步骤，帮助你理解学习“从\
  \ CrowdSec 中学习”这一节所需要的内容。本次安装的目标是让你能够看到中央服务器复制到本地数据库的社区数据。\n\n创建一个空目录来执行以下步骤。在我的本地安装中，我在\
  \ `/home/nanik/GolandPojects/crowdsec` 下创建了一个新目录。请按照以下步骤操作：\n\n- 从 GitHub 下载发布版本。本节使用\
  \ Linux 版的 v1.4.1，通过以下命令下载：\n  \n  ```\n  wget https://github.com/crowdsecurity/crowdsec/releases/download/v1.4.1/crowdsec-release.tgz\n\
  \  ```\n\n- 下载完成后，使用 `gunzip` 和 `tar` 解压，如下所示：\n  \n  ```\n  gunzip ./crowdsec-release.tgz\
