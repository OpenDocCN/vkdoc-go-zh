  你将得到类似于图 16-4 的输出。


  ![](img/527551_1_En_16_Fig4_HTML.jpg)


  *解释输出的截图。输出为：五项工作分别在 817、727、658、219 和 190 毫秒内完成。*


  **图 16-4** — `tui-daemon-combo` 示例输出


  这个 TUI 框架的有趣之处在于它提供了多种用户界面：进度条、旋转器、列表等等。图 16-5 展示了应用程序为了使用该库所必须提供的不同函数。


  ![](img/527551_1_En_16_Fig5_HTML.jpg)


  *解释三个应用程序函数的截图，这些函数包括 `Init`、`Update` 和 `View`。这三个函数并行连接到 Bubble Tea 函数。*


  **图 16-5** — 用于 `bubbletea` 交互的应用程序函数


  在接下来的几个小节中，你将使用 `tui-daemon-combo` 示例代码来弄清库内部的代码流程。


  使用 `bubbletea` 非常简单，如下所示：


  ```

  func main() {

  ...

  p := tea.NewProgram(newModel(), opts...)

  if err := p.Start(); err != nil {

  fmt.Println("启动 Bubble Tea 程序时出错:", err)

  os.Exit(1)

  }

  }

  ```


  代码调用 `tea.NewProgram()`，并传入需要设置的 `Model` 接口和选项。该库定义的 `Model` 接口如下：


  ```

  type Model interface {

  Init() Cmd

  Update(Msg) (Model, Cmd)

  View() string

  }

  ```


  `newModel()` 函数返回了 `Model` 接口的实现，定义如下：


  ```

  func (m model) Init() tea.Cmd {

  ...

  }

  func (m model) Update(msg tea.Msg) (tea.Model, tea.Cmd) {

  ...

  }

  func (m model) View() string {

  ...

  }

  ```


  现在，你已经定义了在构建和更新 UI 时将由库调用的不同函数。接下来，你将了解库是如何使用每个函数的。




  #### Init


  `Init()` 函数是 `bubbletea` 在调用 `Start()` 函数后调用的第一个函数。你之前看到，`Init()` 必须返回一个 `Cmd` 类型，该类型被声明为此处展示的函数类型：


  ```

  type Cmd func() Msg

  ```


  `Init()` 函数使用批处理（batches）来返回不同类型的函数类型：`spinner.Tick` 和 `runPretendProcess`。这是通过使用
  `tea.Batch()` 函数实现的，如下所示：


  ```

  func (m model) Init() tea.Cmd {

  ...

  return tea.Batch(

  spinner.Tick,

  runPretendProcess,

  )

  }

  ```


  在内部，`tea.Batch()` 返回一个匿名函数，该函数将不同的 `Cmd` 函数类型包装到一个 `Cmd` 数组中，如以下代码片段所示：


  ```

  type batchMsg []Cmd

  func Batch(cmds ...Cmd) Cmd {

  ...

  return func() Msg {

  return batchMsg(validCmds)

  }

  }

  ```


  在 `bubbletea` 完成调用应用程序的 `Init()` 函数后，它会启动整个进程。在内部，它使用通道（channels）来读取不同的传入消息，以执行不同的用户界面操作。因此，在你的示例代码中，它会处理
  `batchMsg` 数组并开始调用 `Cmd` 函数类型。


  `Cmd` 函数类型的实现返回 `Msg`，后者是库中定义的一个接口。


  ```

  type Msg interface{}

  ```


  在示例代码中，你使用了 `spinner.Tick` 和 `runPretendProcess`，它们的定义如下：


  ```

  type processFinishedMsg time.Duration

  func Tick() tea.Msg {

  return TickMsg{Time: time.Now()}

  }

  func runPretendProcess() tea.Msg {

  ...

  return processFinishedMsg(pause)

  }

  ```


  图 16-6 展示了该库如何使用多个 goroutine 在后台执行多项任务，包括处理那些函数类型返回的 `Msg`，这些 `Msg` 将在 `Update()`
  函数中使用，下一节将对此进行介绍。


  ![](img/527551_1_En_16_Fig6_HTML.jpg)


  示例代码的框架从主函数开始并启动。Start 函数返回 model，然后将其分为三个部分，分别命名为 S I G N T、initCmD 和 Msg。


  图 16-6


  内部执行流程的初始化


  #### Update


  调用 `Update` 函数来更新用户界面的状态。在示例应用中，其定义如下：


  ```

  func (m model) Update(msg tea.Msg) (tea.Model, tea.Cmd) {

  switch msg := msg.(type) {

  case tea.KeyMsg:

  ...

  return m, tea.Quit

  case spinner.TickMsg:

  ...

  m.spinner, cmd = m.spinner.Update(msg)

  ...

  case processFinishedMsg:

  ...

  m.results = append(m.results[1:], res)

  ...

  default:

  return m, nil

  }

  }

  ```


  `Update` 函数接收不同类型的 `tea.Msg`，因为它被定义为一个接口，所以代码需要进行类型检查，并处理它想要处理的类型。例如，当函数接收到 `spinner.TickMsg`
  时，它会通过调用 `spinner.Update()` 函数来更新 spinner；当接收到 `tea.KeyMsg` 时，它会退出应用程序。


  该函数只需要处理它感兴趣的消息，并执行所需的任何用户界面状态管理。函数中必须避免执行其他重量级的操作。


  #### View


  最后一个函数 `View()` 由库调用以更新用户界面。应用程序可以自由地以任何合适的方式更新用户界面。这种灵活性允许应用程序渲染出满足其需求的用户界面。


  这并不意味着应用程序需要知道如何绘制用户界面。这由每个用户界面可用的函数来处理。以下是 `View()` 函数：


  ```

  func (m model) View() string {

  s := "\n" +

  m.spinner.View() + " Doing some work...\n\n"

  for _, res := range m.results {

  ...

  }

  ...

  if m.quitting {

  s += "\n"

  }

  return indent.String(s, 1)

  }

  ```


  应用程序通过从不同的变量中提取不同的值，来组合所有需要向用户显示的用户界面。例如，它提取 `results` 数组的值来显示给用户。当 `Update` 函数接收到
  `processFinishedMsg` 消息类型时，`results` 数组就会被填充。


  该函数返回一个包含用户界面的字符串，该字符串将由库渲染到终端上。


  图 16-7 从高层次展示了该库生成的不同 goroutine，这些 goroutine 负责用户界面的不同部分，例如使用键盘、鼠标的用户输入、终端大小调整等等。


  其架构类似于发布/订阅模型，中央 goroutine 处理所有不同的消息，并在内部调用相关函数来执行操作。


  ![](img/527551_1_En_16_Fig7_HTML.png)


  一个进程消息框架包含六个要素，包括用户输入、处理 Cmds、终端大小调整、tea dot msg 函数、更新函数和视图函数。


  图 16-7


  消息的集中处理


  ### 总结


  在本章中，你了解了两种不同的基于终端的用户界面框架，它们为开发者提供了构建命令行用户界面的 API。你看到了如何使用这些框架构建简单命令行用户界面的示例应用。


  你研究了这些框架的内部结构，以理解它们的工作原理。了解这些能让你在使用此类框架时，更好地洞察如何排查问题。并且，理解这些框架的复杂性有助于你构建自己的异步应用程序。


  '
- '# 第七部分 Linux 系统


  '
- "# 17. systemd\n\n在本章中，你将了解 `systemd` 是什么，以及如何编写 Go 应用程序与之交互。`systemd` 是 Linux 系统内部一个重要的软件组件，其内容庞大，无法在本章中完全覆盖。\n\
  \n你将研究一个可用的开源 `systemd` Go 库，并学习如何使用它来访问 `systemd`。在本章中，你将完成以下任务：\n\n-   了解 `systemd`\
  \ 提供什么功能\n-   使用 `systemctl` 和 `journalctl` 与 `systemd` 交互\n-   使用 `go-systemd`\
  \ 库编写代码\n-   将日志消息写入 `systemd` 日志\n-   查询 `systemd` 以获取已注册服务的列表\n\n### 源代码\n\n本章的源代码可从\
  \ [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
  \ 仓库获取。\n\n### systemd\n\n`systemd` 是一套用于 Linux 系统的应用程序套件，旨在启动并运行系统。它不仅负责启动核心 Linux\
  \ 系统运行，还会启动许多程序，例如网络栈、用户登录、日志记录服务器等。它使用套接字和 D-Bus 激活来启动服务、按需启动后台应用程序等等。\n\nD-Bus\
  \ 代表桌面总线（Desktop Bus）。这是一个用于进程间通信机制的规范，允许同一台机器上的不同进程相互通信。D-Bus 的实现包括服务器组件和一个客户端库。对于\
  \ `systemd`，其实现被称为 sd-bus。在稍后的章节中，你将学习如何使用 D-Bus 客户端库与服务器组件通信。\n\n套接字激活是 `systemd`\
  \ 中的一种机制，用于监听网络端口或 Unix 套接字。当有外部连接时，它将触发服务器应用程序的运行。这在某些情况下非常有用，比如某个资源密集型应用只需要在需要时才运行，而不是在\
  \ Linux 系统启动时就运行。\n\n\n\n### systemd 单元 (Units)\n\n`systemd` 使用的文件被称为单元 (units)。它是一种表示由\
  \ `systemd` 管理的资源的标准方式。系统相关的 `systemd` 单元文件可以在 `/lib/systemd/system` 目录下找到，其内容类似如下：\n\
  \n```\n...\n-rw-r--r--  1 root root   389 Nov 18  2021  apt-daily-upgrade.service\n\
  -rw-r--r--  1 root root   184 Nov 18  2021  apt-daily-upgrade.timer\nlrwxrwxrwx\
  \  1 root root    14 Apr 25 23:23  autovt@.service -> getty@.service\n-rw-r--r--\
  \  1 root root  1044 Jul  7  2021  avahi-daemon.service\n-rw-r--r--  1 root root\
  \   870 Jul  7  2021  avahi-daemon.socket\n-rw-r--r--  1 root root   927 Apr 25\
  \ 23:23  basic.target\n-rw-r--r--  1 root root  1159 Apr 18  2020  binfmt-support.service\n\
  -rw-r--r--  1 root root   380 Oct  6  2021  blk-availability.service\n-rw-r--r--\
  \  1 root root   449 Apr 25 23:23  blockdev@.target\n-rw-r--r--  1 root root   419\
  \ Feb  1 11:49  bluetooth.service\n...\n-rw-r--r--  1 root root   758 Apr 25 23:23\
  \  dev-hugepages.mount\n-rw-r--r--  1 root root   701 Apr 25 23:23  dev-mqueue.mount\n\
  ...\n-rw-r--r--  1 root root   251 Aug 31  2021  e2scrub_all.timer\n-rw-r--r-- \
  \ 1 root root   245 Aug 31  2021  e2scrub_fail@.service\n-rw-r--r--  1 root root\
  \   550 Aug 31  2021  e2scrub_reap.service\n...\n-rw-r--r--  1 root root   444 Apr\
  \ 25 23:23  remote-fs-pre.target\n-rw-r--r--  1 root root   530 Apr 25 23:23  remote-fs.target\n\
  ```\n\n单元文件的另一个位置是 `/etc/systemd/system` 目录。该目录下的单元文件优先级高于文件系统中找到的任何其他单元文件。以下展示了本地机器上\
  \ `/etc/system/system` 目录中的部分单元文件：\n\n```\n...\nlrwxrwxrwx  1 root root   40 Mar\
  \  4 04:53 dbus-org.freedesktop.ModemManager1.service -> /lib/systemd/system/ModemManager.service\n\
  lrwxrwxrwx  1 root root   53 Mar  4 04:51 dbus-org.freedesktop.nm-dispatcher.service\
  \ -> /lib/systemd/system/NetworkManager-dispatcher.service\nlrwxrwxrwx  1 root root\
  \   44 Aug  7  2021 dbus-org.freedesktop.resolve1.service -> /lib/systemd/system/systemd-resolved.service\n\
  lrwxrwxrwx  1 root root   36 Mar  4 04:53 dbus-org.freedesktop.thermald.service\
  \ -> /lib/systemd/system/thermald.service\nlrwxrwxrwx  1 root root   45 Aug  7 \
  \ 2021 dbus-org.freedesktop.timesync1.service -> /lib/systemd/system/systemd-timesyncd.service\n\
  ...\ndrwxr-xr-x  2 root root 4096 Mar  4 04:53 graphical.target.wants/\ndrwxr-xr-x\
  \  2 root root 4096 Mar  4 04:51 mdmonitor.service.wants/\ndrwxr-xr-x  2 root root\
  \ 4096 May 27 10:10 multi-user.target.wants/\n...\nlrwxrwxrwx  1 root root   31\
  \ Apr  6 17:55 sshd.service -> /lib/systemd/system/ssh.service\n...\n```\n\n以下是不同单元文件的非详尽列表：\n\
  \n*   `.service`: 描述一个服务或应用程序，以及如何启动或停止该服务。\n*   `.socket`: 描述用于基于套接字激活的网络或 Unix\
  \ 套接字。\n*   `.device`: 描述在 `sysfs/udev` 设备树中暴露的设备。\n*   `.timer`: 定义一个将由 `systemd`\
  \ 管理的定时器。\n\n你已经了解了 `systemd` 及其用途。在下一节中，你将学习如何使用提供的工具，通过 `systemctl` 查看 `systemd`\
  \ 提供的服务。\n\n### systemctl\n\n`systemctl` 是与本地机器上正在运行的 `systemd` 进行通信的主要工具。在终端中输入以下命令：\n\
  \n```\nsystemctl\n```\n\n在不加任何参数的情况下，它会列出所有当前已向 `systemd` 注册的服务，如图 17-1 所示。\n\n\
  ![](img/527551_1_En_17_Fig1_HTML.jpg)\n\n输出的屏幕截图列出了服务及其状态（已加载 (loaded)、活动 (active)、已退出\
  \ (exited)）。\n\n**图 17-1** systemd 中已注册的服务\n\n让我们看看本地机器上当前正在运行的服务。我们将查看 `systemd-journal.service`，它运行着一个\
  \ `systemd` 日志服务。打开终端并使用以下命令：\n\n```\nsystemctl status systemd-journald.service\n\
  ```\n\n你将看到类似如下的输出：\n\n```\nsystemd-journald.service - Journal Service\nLoaded:\
  \ loaded (/lib/systemd/system/systemd-journald.service; static)\nActive: active\
  \ (running) since Thu 2022-06-16 23:21:09 AEST; 1 week 0 days ago\nTriggeredBy:\
  \ • systemd-journald-dev-log.socket\n• systemd-journald-audit.socket\n• systemd-journald.socket\n\
  Docs: man:systemd-journald.service(8)\nman:journald.conf(5)\nMain PID: 370 (systemd-journal)\n\
  Status: \"Processing requests...\"\nTasks: 1 (limit: 9294)\nMemory: 54.2M\nCPU:\
  \ 3.263s\nCGroup: /system.slice/systemd-journald.service\n└─370 /lib/systemd/systemd-journald\n\
  Jun 16 23:21:09 nanik systemd-journald[370]: Journal started\n...\nJun 16 23:21:09\
  \ nanik systemd-journald[370]: System Journal\n```\n\n输出显示了有关该服务的信息，例如服务使用的内存量、进程\
  \ ID (PID)、`.service` 文件的位置，以及该服务是否处于活动 (active) 状态。\n\n要停止一个服务，请使用命令 `systemctl\
  \ stop`。例如，我们尝试停止 `cups.service`（一个用于在 Linux 中提供打印服务的服务）。在终端中使用以下命令检查其状态：\n\n```\n\
  systemctl status cups.service\n```\n\n你将看到类似如下的输出：\n\n```\n• cups.service - CUPS\
  \ Scheduler\nLoaded: loaded (/lib/systemd/system/cups.service; enabled; vendor preset:\
  \ enabled)\nActive: active (running) since Fri 2022-06-24 00:00:35 AEST; 22h ago\n\
  TriggeredBy: • cups.socket\n• cups.path\nDocs: man:cupsd(8)\nMain PID: 39757 (cupsd)\n\
  Status: \"Scheduler is running...\"\nTasks: 1 (limit: 9294)\nMemory: 2.8M\nCPU:\
  \ 51ms\nCGroup: /system.slice/cups.service\n└─39757 /usr/sbin/cupsd -l\nJun 24 00:00:35\
  \ nanik systemd[1]: Starting CUPS Scheduler...\nJun 24 00:00:35 nanik systemd[1]:\
  \ Started CUPS Scheduler.\n```\n\n要停止该服务，请在终端中使用以下命令：\n\n```\nsudo systemctl stop\
  \  cups.service\n```\n\n如果你再次使用相同的 `systemctl status cups.service` 命令检查状态，你将看到类似如下的输出：\n\
  \n```\n○ cups.service - CUPS Scheduler\nLoaded: loaded (/lib/systemd/system/cups.service;\
  \ enabled; vendor preset: enabled)\nActive: inactive (dead) since Fri 2022-06-24\
  \ 22:47:52 AEST; 1s ago\nTriggeredBy: ○ cups.socket\n○ cups.path\nDocs: man:cupsd(8)\n\
  Process: 39757 ExecStart=/usr/sbin/cupsd -l (code=exited, status=0/SUCCESS)\nMain\
  \ PID: 39757 (code=exited, status=0/SUCCESS)\nStatus: \"Scheduler is running...\"\
  \nCPU: 54ms\nJun 24 00:00:35 nanik systemd[1]: Starting CUPS Scheduler...\n...\n\
  Jun 24 22:47:52 nanik systemd[1]: Stopped CUPS Scheduler.\n```\n\n使用 `systemctl`\
  \ 可以让你查看 `systemd` 中已注册服务的状态。在下一节中，你将编写一个简单的服务器应用程序，并使用 `systemctl` 对其进行控制。\n\n\n\
  \n#### 你好，服务器系统守护进程（systemd）\n\n在本节中，你将了解到位于 `chapter17/httpservice` 目录下的示例代码。该应用是一个简单的\
  \ HTTP 服务器，监听在 8111 端口。让我们先在终端中使用以下命令正常启动应用：\n\n```\ngo run main.go\n```\n\n你将看到类似如下的输出：\n\
  \n```\n2022/06/24 22:55:40 Server running - port 8111\n```\n\n打开浏览器并访问 `http://localhost:8111`，你将看到类似下面的输出：\n\
  \n![](img/527551_1_En_17_Fig2_HTML.jpg)\n\n输出屏幕截图显示：你好，你正在从一个通过系统守护进程运行的应用中获取响应。\n\
  \n**图 17-2** HTTP 服务器输出\n\n应用现在正在运行。让我们创建可执行文件，用于将其作为 `systemd` 服务运行。使用以下命令编译应用。请确保你在\
  \ `chapter17/httpservice` 目录下。\n\n```\ngo build -o httpservice\n```\n\n现在你的应用已准备好作为一个\
  \ `systemd` 服务进行安装。请按照以下步骤进行安装。\n\n1.  将 `httpservice` 可执行文件复制到终端中的 `/usr/local/bin`\
  \ 目录下，如下所示：\n\n    ```\n    sudo cp ./httpservice /usr/local/bin\n    ```\n\n2.\
  \  将 `httpservice.service` 文件复制到终端中的 `/etc/systemd/system` 目录下，如下所示：\n\n    ```\n\
  \    sudo cp ./httpservice.service /etc/systemd/system\n    ```\n\n3.  使用以下命令查看你新创建的服务的状态：\n\
  \n    ```\n    sudo systemctl status httpservice.service\n    ```\n\n    你将看到如下输出：\n\
  \n    ```\n    ○ httpservice.service - HTTP Server Application\n    Loaded: loaded\
  \ (/etc/systemd/system/httpservice.service; disabled; vendor preset: enabled)\n\
  \    Active: inactive (dead)\n    ```\n\n    `systemd`已识别该服务，但它未启用或处于停止状态。\n\n4.\
  \  使用以下命令启动/启用该服务：\n\n    ```\n    sudo systemctl start httpservice.service\n  \
  \  ```\n\n    如果你再次运行相同的状态命令（步骤 3），你将得到以下输出：\n\n    ```\n    ● httpservice.service\
  \ - HTTP Server Application\n    Loaded: loaded (/etc/systemd/system/httpservice.service;\
  \ disabled; vendor preset: enabled)\n    Active: active (running) since Fri 2022-06-24\
  \ 23:09:34 AEST; 39s ago\n    Main PID: 44068 (httpservice)\n    Tasks: 5 (limit:\
  \ 9294)\n    Memory: 1.0M\n    CPU: 3ms\n    CGroup: /system.slice/httpservice.service\n\
  \    └─44068 /usr/local/bin/httpservice\n    Jun 24 23:09:34 nanik systemd[1]: Started\
  \ HTTP Server Application.\n    Jun 24 23:09:34 nanik httpservice[44068]: 2022/06/24\
  \ 23:09:34 Server running - port 8111\n    ```\n\n5.  为确保机器重启时服务自动启动，请使用以下命令：\n\n\
  \    ```\n    sudo systemctl enable httpservice.service\n    ```\n\n现在，你可以通过浏览器访问\
  \ `http://localhost:8111` 来使用该应用。\n\n你已成功部署了示例应用。它已配置为在机器启动时自动启动。在下一节中，你将了解如何使用\
  \ Go 库来编写一个系统应用。\n\n#### go-systemd 库\n\n本章前面你已经了解到，D-Bus 规范包含一个客户端库。该客户端库允许应用程序与`system`进行交互。你将了解的这个客户端库是专为\
  \ Go 应用程序设计的，名为`go-systemd`。该库可在 `http://github.com/coreos/go-systemd` 找到。\n\n该库提供以下功能：\n\
  \n*   使用套接字激活\n*   向`systemd`通知服务状态变化\n*   启动、停止和检查服务与单元\n*   注册机器或容器\n*   ……以及更多功能\n\
  \n对于本章，你将查看使用该库的代码示例，包括写入日志记录、列出本地机器上的可用服务以及查询机器信息。\n\n##### 查询服务\n\n本节的示例代码可在 `chapter17/listservices`\
  \ 目录下找到。示例代码从`systemd`中查询所有已注册的服务，其工作方式类似于 `systemctl list-units` 命令。\n\n打开终端，确保你在\
  \ `chapter17/listservices` 目录下。按如下方式构建应用：\n\n```\ngo build -o listservices\n```\n\
  \n编译完成后，以 root 身份运行可执行文件。\n\n```\nsudo ./listservices\n```\n\n你将看到在`systemd`中注册的服务的输出。\n\
  \n```\n...\nName : sys-module-fuse.device, LoadState : loaded, ActiveState : active,\
  \ Substate : plugged\nName : gdm.service, LoadState : loaded, ActiveState : active,\
  \ Substate : running\nName : sysinit.target, LoadState : loaded, ActiveState : active,\
  \ Substate : active\nName : graphical.target, LoadState : loaded, ActiveState :\
  \ active, Substate : active\nName : veritysetup.target, LoadState : loaded, ActiveState\
  \ : active, Substate : active\n...\nName : remote-fs-pre.target, LoadState : loaded,\
  \ ActiveState : inactive, Substate : dead\nName : apt-daily-upgrade.timer, LoadState\
  \ : loaded, ActiveState : active, Substate : waiting\nName : ssh.service, LoadState\
  \ : loaded, ActiveState : active, Substate : running\nName : system.slice, LoadState\
  \ : loaded, ActiveState : active, Substate : active\nName : systemd-ask-password-plymouth.path,\
  \ LoadState : loaded, ActiveState : active, Substate : waiting\nName : dev-ttyS15.device,\
  \ LoadState : loaded, ActiveState : active, Substate : plugged\n...\n```\n\n让我们逐步分析代码，了解应用如何使用该库。以下代码片段显示它正在使用\
  \ `NewSystemdConnectionContext` 函数连接到 `systemd` 服务器：\n\n```\nimport (\n...\n)\n\
  func main() {\n...\nc, err := d.NewSystemdConnectionContext(ctx)\n...\n}\n```\n\n\
  成功连接到 `systemd` 后，它会发送请求以获取单元列表并将其打印到控制台。\n\n```\nimport (\n...\n)\nfunc main()\
  \ {\n...\njs, err := c.ListUnitsContext(ctx)\n...\nfor _, j := range js {\nfmt.Println(fmt.Sprintf(\"\
  Name : %s, LoadState : %s, ActiveState : %s, Substate : %s\", j.Name, j.LoadState,\
  \ j.ActiveState, j.SubState))\n}\nc.Close()\n}\n```\n\n该库负责处理所有繁重的工作，包括连接到 `systemd`、发送请求，并将请求转换为适合传递给应用的格式。\n\
  \n\n\n### 日志\n\n另一个你将看到的示例是使用该库将日志消息写入提供日志服务的日志系统。要访问日志服务，你可以使用 `journalctl` 命令行工具。\n\
  \n```\njournalctl -r\n```\n\n在我本地机器上，输出如下所示（在你的机器上看起来会有所不同）：\n\n```\n...\n6 月 25\
  \ 日 00:06:43 nanik sshd[2567]: pam_unix(sshd:session): session opened for user nanik(uid=1000)\
  \ by (uid=0)\n...\n6 月 25 日 00:00:32 nanik kernel: audit: type=1400 audit(1656079232.440:30):\
  \ apparmor=\"DENIED\" operation=\"capable\" profile=\"/usr/sbin/cups-browsed\" pid=2527\
  \ comm=\"cups-browsed\" capability=23  c>\n6 月 25 日 00:00:32 nanik audit[2527]:\
  \ AVC apparmor=\"DENIED\" operation=\"capable\" profile=\"/usr/sbin/cups-browsed\"\
  \ pid=2527 comm=\"cups-browsed\" capability=23  capname=\"sys_nice\"\n6 月 25 日 00:00:32\
  \ nanik systemd[1]: Finished Rotate log files.\n...\n```\n\n参数 `-r` 会将最新的日志消息显示在顶部。现在你知道如何查看日志服务了。让我们运行示例应用程序，将日志消息写入其中。\n\
  \n打开终端，确保你在 `chapter17/journal` 目录内。使用以下命令运行示例：\n\n```\ngo run main.go\n```\n\n\
  打开另一个终端，运行同样的 `journalctl -r` 命令。你会在输出中看到来自示例应用程序的日志消息，如下所示：\n\n```\n6 月 25 日 00:06:48\
  \ nanik journal[2591]: This log message is from Go application\n6 月 25 日 00:06:44\
  \ nanik systemd[908]: Started Tracker metadata extractor.\n6 月 25 日 00:06:44 nanik\
  \ systemd[908]: Starting Tracker metadata extractor...\n6 月 25 日 00:06:44 nanik\
  \ systemd-logind[778]: Removed session 6.\n6 月 25 日 00:06:44 nanik systemd[1]: session-6.scope:\
  \ Deactivated successfully.\n...\n```\n\n写入日志的代码非常简单。\n\n```\npackage main\nimport\
  \ (\nj \"github.com/coreos/go-systemd/v22/journal\"\n)\nfunc main() {\nj.Print(j.PriErr,\
  \ \"This log message is from Go application\")\n}\n```\n\n`Print()` 函数以错误优先级打印消息\
  \ *This log message is from Go application*。当你使用 `journalctl` 查看时，这通常以红色显示。以下是该库提供的不同优先级列表：\n\
  \n```\nconst (\nPriEmerg Priority = iota\nPriAlert\nPriCrit\nPriErr\nPriWarning\n\
  PriNotice\nPriInfo\nPriDebug\n)\n```\n\n以下优先级被分配为红色：`PriErr`、`PriCrit`、`PriAlert`\
  \ 和 `PriEmerg`。`PriNotice` 和 `PriWarning` 会被高亮显示，而 `PriDebug` 是浅灰色。其中一个有趣的优先级是 `PriEmerg`，它会将日志消息广播到本地机器上所有打开的终端。\n\
  \n在下一节中，你将了解 `systemd` 的一个高级功能，即注册和运行一台机器或容器。\n\n### 机器\n\n`systemd` 提供的一个高级功能是在本地机器上运行虚拟机或容器。此功能默认不附带；为了使用此功能，需要额外安装服务和执行步骤。此功能通过安装名为\
  \ `systemd-container` 的软件包来提供。我们来了解下这个软件包的内容。\n\n`systemd-container` 软件包包含许多工具，特别是名为\
  \ `systemd-nspawn` 的工具。此工具类似于 `chroot`（我在第 4 章中讨论过），但提供了更高级的功能，例如虚拟化文件系统层次结构、进程树和各种\
  \ IPC 子系统。基本上，它允许你使用自己的 `rootfs` 运行一个轻量级容器。\n\n以下步骤将指导你安装该软件包并对其进行配置。\n\n1.  将 `systemd-machined.service`\
  \ 文件从 `chapter17/machine` 目录复制到 `/usr/lib/systemd/user`。\n\n1.  使用以下命令安装 `systemd-container`\
  \ 软件包：\n\n```\nsudo cp systemd-machined.service /usr/lib/systemd/user\n```\n\n1.\
  \  使用以下命令启动服务：\n\n```\nsudo apt install systemd-container\n```\n\n1.  使用以下命令检查状态：\n\
  \n```\nsudo systemctl start systemd-machined.service\n```\n\n```\nsudo systemctl\
  \ status  systemd-machined.service\n```\n\n你会看到类似以下的输出：\n\n```\n• systemd-machined.service\
  \ - 虚拟机与容器注册服务\nLoaded: loaded (/lib/systemd/system/systemd-machined.service; static)\n\
  Active: active (running) since 周六 2022-06-25 00:51:10 AEST; 21h ago\nDocs: man:systemd-machined.service(8)\n\
  man:org.freedesktop.machine1(5)\nMain PID: 2744 (systemd-machine)\nStatus: \"Processing\
  \ requests...\"\nTasks: 1 (limit: 9294)\nMemory: 1.2M\nCPU: 220ms\nCGroup: /system.slice/systemd-machined.service\n\
  └─2744 /lib/systemd/systemd-machined\n6 月 25 日 00:51:10 nanik systemd[1]: Starting\
  \ Virtual Machine and Container Registration Service...\n6 月 25 日 00:51:10 nanik\
  \ systemd[1]: Started Virtual Machine and Container Registration Service.\n```\n\
  \n使用 `machinectl` 命令行工具与你刚刚安装的新机器服务进行交互。使用该工具下载 Ubuntu 操作系统镜像，并将其作为容器在本地运行。\n\n\
  使用以下命令下载 Ubuntu 镜像：\n\n```\nmachinectl pull-tar https://cloud-images.ubuntu.com/trusty/current/trusty-server-cloudimg-amd64-root.tar.gz\
  \ trusty-server\n```\n\n如果此方法不适用于你的 Linux 系统，请使用以下命令：\n\n```\nwget https://cloud-images.ubuntu.com/trusty/current/trusty-server-cloudimg-amd64-root.tar.gz\n\
  machinectl import-tar trusty-server-cloudimg-amd64-root.tar.gz\n```\n\n让我们使用以下命令检查以确保镜像已成功下载：\n\
  \n```\nmachinectl list-images\n```\n\n你将得到类似如下的输出：\n\n```\n名称                  \
  \             类型     RO   使用情况  创建时间                    修改时间\ntrusty-server-cloudimg-amd64-root\
  \  目录    否    n/a     周六 2022-06-25 23:16:16 AEST n/a\n列出了 1 个镜像。\n```\n\n下载的镜像存储在\
  \ `/var/lib/machines` 文件夹中，如下所示：\n\n```\nnanik@nanik:~/Downloads/alpine-container$\
  \ sudo ls -la  /var/lib/machines\ntotal 24\ndrwx------  6 root root 4096 Jun 25\
  \ 23:16 .\ndrwxr-xr-x 69 root root 4096 May 25 16:19 ..\ndrwxr-xr-x 22 root root\
  \ 4096 Jun 25 23:16 trusty-server-cloudimg-amd64-root\n```\n\n查看 `trusty-server-cloudimg-amd64-root`\
  \ 目录内部，你会看到 `rootfs` 目录结构。\n\n```\ndrwx------  6 root root 4096 Jun 25 23:16 ..\n\
  drwxr-xr-x  2 root root 4096 Nov  8  2019 bin\ndrwxr-xr-x  3 root root 4096 Nov\
  \  8  2019 boot\ndrwxr-xr-x  4 root root 4096 Nov  8  2019 dev\n...\ndrwxr-xr-x\
  \  2 root root 4096 Nov  8  2019 sbin\ndrwxr-xr-x  2 root root 4096 Nov  8  2019\
  \ srv\ndrwxr-xr-x  2 root root 4096 Mar 13  2014 sys\n...\ndrwxr-xr-x 10 root root\
  \ 4096 Nov  8  2019 usr\ndrwxr-xr-x 12 root root 4096 Nov  8  2019 var\n```\n\n\n\
  \n最后，既然你已经下载并本地存储了镜像，就可以使用以下命令来运行它：\n\n```\nsudo systemd-nspawn -M trusty-server-cloudimg-amd64-root\n\
  ```\n\n你将看到类似如下的输出：\n\n```\nnanik@nanik:~/Downloads/alpine-container$ sudo systemd-nspawn-M\
  \ trusty-server-cloudimg-amd64-root\nSpawning container trusty-server-cloudimg-amd64-root\
  \ on /var/lib/machines/trusty-server-cloudimg-amd64-root.\nPress ^] three times\
  \ within 1s to kill container.\nroot@trusty-server-cloudimg-amd64-root:~#\n```\n\
  \n让我们看看位于 `chapter17/machine` 文件夹中的示例应用程序。此示例使用 `go-systemd` 库来查询本地存储的镜像。将目录更改为\
  \ `chapter17/machine` 并按如下方式运行示例：\n\n```\ngo run main.go\n```\n\n你将得到类似如下的输出：\n\n\
  ```\n2022/06/25 23:22:19 image - .host directory\n2022/06/25 23:22:19 image - trusty-server-cloudimg-amd64-root\
  \ directory\n```\n\n该示例使用了 `go-systemd` 库的 `machine1` 包，并通过调用 `New()` 函数来建立与 `systemd`\
  \ 系统的连接。连接成功后，它使用 `ListImages()` 函数检索可用的镜像并将其打印到控制台。\n\n```\npackage main\nimport\
  \ (\nm \"github.com/coreos/go-systemd/v22/machine1\"\n...\n)\nfunc main() {\nconn,\
  \ err := m.New()\n...\ns, err := conn.ListImages()\n...\nfor _, img := range s {\n\
  log.Println(\"image - \"+img.Name, img.ImageType)\n}\n}\n```\n\n### 小结\n\n在本章中，你了解了\
  \ `systemd` 及其在 Linux 操作系统中的功能。你探索了可用于与 `systemd` 交互的不同工具，并查看了展示如何使用 `go-systemd`\
  \ 库与 `systemd` 交互的 Go 代码示例。\n\n`go-systemd` 提供了与 `systemd` 交互的不同能力。你探索的高级特性之一是，与提供虚拟机和容器注册功能的\
  \ `systemd-machine` 服务进行交互。\n\n"
- "# 18. cAdvisor\n\n在本章中，你将了解一个名为 cAdvisor 的开源项目，它代表 Container Advisor（容器顾问）。完整的源代码可以在\
  \ [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor) 找到。本章使用的是该项目的\
  \ v0.39.3 版本。该项目用于收集正在运行的容器的资源使用情况和性能数据。cAdvisor 支持 Docker 容器，这也是本章将要重点介绍的内容。\n\n\
  选择此项目的原因是为了进一步探讨我们在前几章讨论过的主题，例如：\n\n*   使用系统调用来监控文件系统\n*   使用 cgroups\n*   使用 `/proc`\
  \ 和 `/sys` 收集机器信息\n\n### 源代码\n\n本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
  \ 仓库获取。\n\n### 运行 cAdvisor\n\n本节将指导你如何检出 cAdvisor 源代码并在本地运行它。让我们首先使用以下命令来检出代码：\n\
  \n```\nGO111MODULE=off go get github.com/google/cadvisor\n```\n\n该命令使用 `go get`\
  \ 从给定的 URL 下载源代码。环境变量 `GO111MODULE=off` 告诉 `go` 工具获取模块（`google/cadvisor`）并将其存储在\
  \ `GOPATH` 目录中。模块下载完成后，你可以进入 `GOPATH/src` 目录，会看到如下内容：\n\n```\ndrwxrwxr-x 32 nanik\
  \ nanik  4096 Jun 17 22:31 ./\ndrwxrwxr-x  9 nanik nanik  4096 Jun 15 22:19 ../\n\
  drwxrwxr-x  2 nanik nanik  4096 Jun 17 22:31 accelerators/\n-rw-rw-r--  1 nanik\
  \ nanik   256 Jun 15 22:19 AUTHORS\ndrwxrwxr-x  4 nanik nanik  4096 Jun 17 22:31\
  \ build/\ndrwxrwxr-x  3 nanik nanik  4096 Jun 15 22:19 cache/\n-rw-rw-r--  1 nanik\
  \ nanik 22048 Jun 15 22:19 CHANGELOG.md\ndrwxrwxr-x  4 nanik nanik  4096 Jun 17\
  \ 22:31 client/\ndrwxrwxr-x  3 nanik nanik  4096 Jun 17 22:32 cmd/\ndrwxrwxr-x \
  \ 3 nanik nanik  4096 Jun 17 22:31 collector/\n...\n```\n\n进入 `cmd` 目录并运行以下命令来构建项目：\n\
  \n```\ngo build -o cadvisor\n```\n\n你将得到一个名为 `cadvisor` 的可执行文件。让我们使用以下命令运行该项目，以打印它可以接受的不同参数：\n\
  \n```\n./cadvisor –help\n```\n\n你将得到类似如下的输出：\n\n```\n-add_dir_header\nIf true, adds\
  \ the file directory to the header of the log messages\n...\n-boot_id_file string\n\
  Comma-separated list of files to check for boot-id. Use the first one that exists.\
  \ (default \"/proc/sys/kernel/random/boot_id\")\n...\n-v value\nnumber for the log\
  \ level verbosity\n...\n```\n\n我不会遍历 cAdvisor 拥有的所有不同参数。你将仅使用它分配的默认值。cAdvisor 需要\
  \ root 权限才能运行，因此请按如下方式操作：\n\n```\nsudo ./cadvisor -v 9\n```\n\n默认情况下，它使用 8080 端口运行应用程序，因此如果你有另一个使用\
  \ 8080 端口的应用程序在运行，它将无法启动。对于 cAdvisor，请使用 `-p` 标志指定一个不同的端口号。\n\n```\nsudo ./cadvisor\
  \ -port \n```\n\n当 cAdvisor 运行时，它会收集与机器和容器相关的各种信息，这只有在它具有 root 权限时才能完成。\n\n一旦 cAdvisor\
  \ 启动并运行，你将看到终端中打印出大量日志信息。\n\n```\nI0617 23:06:13.122455 2311171 storagedriver.go:55]\
  \ Caching stats in memory for 2m0s\nW0617 23:06:13.122498 2311171 manager.go:159]\
  \ Cannot detect current cgroup on cgroup v2\nI0617 23:06:13.122591 2311171 plugin.go:40]\
  \ CRI-O not connected: Get \"http://%2Fvar%2Frun%2Fcrio%2Fcrio.sock/info\": dial\
  \ unix /var/run/crio/crio.sock: connect: no such file or directory\n...\nI0617 23:06:13.139451\
  \ 2311171 nvidia.go:61] NVIDIA setup failed: no NVIDIA devices found\n...\nI0617\
  \ 23:06:13.192306 2311171 manager.go:991] Added container: \"/\" (aliases: [], namespace:\
  \ \"\")\nI0617 23:06:13.192340 2311171 handler.go:325] Added event &{/ 2022-06-14\
  \ 09:44:58.365378218 +1000 AEST containerCreation {}}\nI0617 23:06:13.192356 2311171\
  \ manager.go:301] Starting recovery of all containers\nI0617 23:06:13.192424 2311171\
  \ container.go:527] Start housekeeping for container \"/\"\n...\nI0617 23:06:13.197502\
  \ 2311171 handler.go:325] Added event &{/user.slice/user-1000.slice/user@1000.service/app.slice/dbus.socket\
  \ 2022-06-14 09:43:53.204034932 +1000 AEST containerCreation {}}\nI0617 23:06:13.197513\
  \ 2311171 factory.go:220] Factory \"docker\" was unable to handle container \"/user.slice/user-1000.slice/user@1000.service/app.slice/app-org.gnome.Terminal.slice/vte-spawn-642db2f1-1648-487e-8c09-58ec92a50865.scope\"\
  \n```\n\n打开你的浏览器，输入 `http://localhost:8080` 来访问用户界面。你将看到类似图 18-1 的内容。\n\n![](img/527551_1_En_18_Fig1_HTML.jpg)\n\
  \n一张列出了开源容器顾问中涉及的 11 个子容器的屏幕截图。\n\n图 18-1\n\ncAdvisor 用户界面\n\n要查看本地运行的容器，请单击主页上的\
  \ *Docker Containers* 链接。你将看到一个不同的容器用户界面，如图 18-2 所示。我的本地机器上运行着一个 Postgres 容器，因此你看到的是一个\
