  ### 客户端库


  在仓库的 chapter18 文件夹内，有一些关于如何使用 cAdvisor 客户端库与 cAdvisor 通信的示例。这些示例展示了如何使用客户端库获取容器信息、来自
  cAdvisor 的事件流等。


  ### 总结


  在本章中，你学习了如何安装和运行 cAdvisor 来监控本地机器和 Docker 容器的指标。该工具提供了大量信息，用以展示机器上运行的不同容器的性能。本章讨论了
  cAdvisor 如何利用你在之前章节中学到的知识，收集容器和本地机器的指标信息。


  cAdvisor 提供的功能远不止本章所讨论的这些。例如，它内置支持将指标导出到 Prometheus，它提供了一个 API，可用于与其他第三方或内部工具集成以监控容器性能，等等。




