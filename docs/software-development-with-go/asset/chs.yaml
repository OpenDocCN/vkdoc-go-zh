  ...

  _, err := s.Getcwd(c)

  ...

  }

  ```


  代码基本相同，只是将 [`golang.org/x/sys/unix`](http://golang.org/x/sys/unix) 包替换为了 `syscall`
  包，而函数调用保持不变。


