  \ 12:12:18 Failed creating directory: operation not permitted\n```\n\n你已经成功运行了容器，并为应用程序应用了受限的系统调用。\n\
  \n在下一节中，你将了解如何构建一个 Docker 代理来监听 Docker 通信，从而理解 Docker 在接收命令并做出响应时的实际工作原理。\n\n###\
  \ Docker 代理\n\nDocker 包含两个主要组件：客户端工具（通常你在终端运行时称之为 `docker`）和服务器（它以服务器/守护进程的形式运行并监听传入命令）。Docker\
  \ 客户端使用套接字（socket）与服务器通信，套接字是一个在不同进程之间传递数据的端点。Docker 使用一种称为非网络套接字（non-networked\
  \ socket）的通信方式，它主要用于本地机器通信，称为 Unix 域套接字（或 IPC 套接字）。\n\nDocker 默认使用 Unix 套接字 `/var/run/docker.sock`\
  \ 进行客户端与服务器之间的通信，如图 6-1 所示。\n\n![](img/527551_1_En_6_Fig1_HTML.jpg)\n\n一个 Docker\
  \ 通信的流程图，包括 Docker 客户端、Docker 守护进程和本地镜像仓库。\n\n**图 6-1** Docker 通信 `/var/run/docker.sock`\n\
  \n在本节中，你将查看如何拦截 Docker 客户端与服务器通信的示例代码。你将逐步分析代码，以理解其实际功能及执行方式。代码位于 `chapter6/docker-proxy`\
  \ 目录中。在你的终端上按如下方式运行：\n\n```\ngo run main.go\n```\n\n成功运行时，你将获得以下输出：\n\n```\n2022/07/09\
  \ 11:59:04 Listening on /tmp/docker.sock for Docker commands\n```\n\n代理现已准备就绪，正在监听\
  \ `/tmp/docker.sock`，等待要使用 Docker 的消息，以便消息经过代理，并设置 `DOCKER_HOST` 环境变量。`DOCKER_HOST`\
  \ 变量由 Docker 命令行工具使用，用于指定发送命令的 Unix 套接字。\n\n例如，要使用代理打印出正在运行的容器列表，请在终端上使用以下命令：\n\n\
  ```\nDOCKER_HOST=unix:///tmp/docker.sock docker ps\n```\n\n在运行代理的终端上，你将看到 JSON 格式的\
  \ Docker 输出。在我的本地机器上，输出如下所示：\n\n```\n2022/07/09 16:33:02 [Request] : HEAD /_ping\
  \ HTTP/1.1\nHost: docker\nUser-Agent: Docker-Client/20.10.9 (linux)\n2022/07/09\
  \ 16:33:02 [Request] : GET /v1.41/containers/json HTTP/1.1\nHost: docker\nUser-Agent:\
  \ Docker-Client/20.10.9 (linux)\n2022/07/09 16:33:02 [Response] : [\n{\n\"Id\":\
  \ \"56f68f7cafb7e5f8b1b1f6263ac6b26f4d47b7a06536842212d577ddf1910a11\",\n\"Names\"\
  : [\n\"/redis\"\n],\n\"Image\": \"redis\",\n\"ImageID\": \"sha256:bba24acba395b778d9522a1adf5f0d6bba3e6094b2d298e71ab08828b880a01b\"\
  ,\n\"Command\": \"docker-entrypoint.sh redis-server\",\n\"Created\": 1657331859,\n\
  ...\n},\n{\n\"Id\": \"2ab2942c2591dcd8eba883a1d57f1183a1d99bafb60be8f17edf8794e9295e53\"\
  ,\n\"Names\": [\n\"/postgres\"\n],\n\"Image\": \"postgres\",\n\"ImageID\": \"sha256:1ee973e26c6564a04b427993f47091cd3ae4d5156fbd46d331b17a8e7ab45d39\"\
  ,\n\"Command\": \"docker-entrypoint.sh postgres\",\n\"Created\": 1657331853,\n...\n\
  }\n]\n```\n\n代理将 Docker 客户端的请求和 Docker 服务器的响应打印到控制台。Docker 命令行仍然正常输出，结果如下所示：\n\n\
  ```\nCONTAINER ID   IMAGE      COMMAND                  CREATED       STATUS   \
  \    PORTS                                       NAMES\n56f68f7cafb7   redis   \
  \   \"docker-entrypoint.s...\"   4 hours ago   Up 4 hours   0.0.0.0:6379->6379/tcp,\
  \ :::6379->6379/tcp   redis\n2ab2942c2591   postgres   \"docker-entrypoint.s...\"\
  \   4 hours ago   Up 4 hours   0.0.0.0:5432->5432/tcp, :::5432->5432/tcp   postgres\n\
  ```\n\n如你所见，Docker 客户端收到的响应是 JSON 格式，并包含大量信息。现在，让我们深入代码，了解内部的工作原理。\n\n图 6-2 展示了从客户端到代理再到\
  \ Docker 服务器的命令流程。Docker 客户端的通信在到达 Docker 守护进程之前会先经过代理。\n\n![](img/527551_1_En_6_Fig2_HTML.jpg)\n\
  \n一个 Docker 通信的流程图，包括 Docker 客户端、Docker 代理、Docker 守护进程和本地镜像仓库。\n\n**图 6-2**\n\n\n\
  \n#### 使用代理进行 Docker 通信\n\n以下代码片段展示了监听 `/tmp/docker.sock` 套接字的代码：\n\n```\nfunc main()\
  \ {\nin := flag.String(\"in\", proxySocket, \"代理 Docker 套接字\")\n...\nsock, err :=\
  \ net.Listen(\"unix\", *in)\nif err != nil {\nlog.Fatalf(\"错误 : %v\", err)\n}\n\
  ...\n}\n```\n\n代码使用了 `net.Listen(..)` 函数，并传入了参数 `unix`。`unix` 参数向函数指明所需的套接字是一个非网络类型的\
  \ Unix 套接字，这在 `net` 库内部会进行特殊处理。\n\n一旦套接字成功初始化，代码将创建一个套接字处理器，负责处理传入的请求和传出的响应。这一操作由\
  \ `handler` 结构体的 `ServeHTTP` 函数执行。以下代码片段展示了处理器的声明，并通过调用 `http.Serve` 通知库该处理器将由套接字\
  \ `sock` 使用。创建处理器时，传入 `dsocket` 以赋值给 `socket` 变量。\n\n```\nfunc main() {\n...\ndhandler\
  \ := &handler{dsocket}\n...\nerr = http.Serve(sock, dhandler)\n...\n}\n```\n\n当套接字准备好接受连接后，`ServeHTTP`\
  \ 函数负责处理所有通信的请求和响应。该函数首先创建一条与 Docker 套接字独立的连接。\n\n```\nfunc (h *handler) ServeHTTP(response\
  \ http.ResponseWriter, request *http.Request) {\nconn, err := net.DialUnix(unix,\
  \ nil, &net.UnixAddr{h.socket, unix})\nif err != nil {\nwriteError(response, errCode,\
  \ err)\nreturn\n}\n...\n}\n```\n\n`net.DialUnix(..)` 函数使用 `h.socket` 的值作为套接字名称来创建一个\
  \ Unix 套接字；在本示例代码中，该值为 `var/run/docker.sock`。此函数返回的连接对象将被代码用作桥梁，以在请求和响应之间进行双向传递。\n\
  \n代码会将传入的请求*转发*到 Docker 套接字，如下所示：\n\n```\nfunc (h *handler) ServeHTTP(response http.ResponseWriter,\
  \ request *http.Request) {\n...\nerr = request.Write(conn)\n...\n}\n```\n\n`request.Write(..)`\
  \ 函数将传入的请求转发到 `conn` 变量指向的原始 Docker 套接字。请求发送后，代码需要获取一个 `http/Response` 结构体，以便读取\
  \ Docker 套接字返回的响应。以下代码片段展示了这一过程：\n\n```\nfunc (h *handler) ServeHTTP(response http.ResponseWriter,\
  \ request *http.Request) {\n...\nresp, err := http.ReadResponse(bufio.NewReader(conn),\
  \ request)\nif err != nil {\nwriteError(response, errCode, err)\nreturn\n}\n...\n\
  }\n```\n\n现在，`resp` 变量包含了来自原始 Docker 套接字的响应。它会提取相关信息，并将其转发回存储在 `response` 对象中的调用方响应，如下列代码片段所示：\n\
  \n```\nfunc (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)\
  \ {\n...\nresponse.WriteHeader(resp.StatusCode)\nreader := bufio.NewReader(resp.Body)\n\
  for {\nline, _, err := reader.ReadLine()\n...\n// 将响应写回调用方\nresponse.Write(line)\n\
  ...\n}\n}\n```\n\n在下一节中，你将了解如何配置你的 Dockerfile 以最大限度地减少容器的攻击面。\n\n### 容器攻击面\n\n为云环境构建应用程序需要将应用程序构建为容器镜像，这需要创建\
  \ Dockerfile。本节将展示如何在使用 Go 应用程序创建 Docker 镜像时将风险降至最低。\n\n构建 Docker 镜像时要记住的主要事项是应用程序最终将在其上运行的镜像。经验法则是使用最精简的基础镜像来托管你的应用程序。在\
  \ Docker 生态中，最精简的基础镜像是 *scratch*。有关 scratch 镜像的更多详细信息，请访问 [`https://hub.docker.com/_/scratch`](https://hub.docker.com/_/scratch)。\n\
  \n使用 scratch 镜像的示例 Dockerfile 可以在 `chapter6/dockersecurity` 目录中找到。打开终端并切换到 `chapter6/dockersecurity`\
  \ 目录，然后按如下方式构建镜像：\n\n```\ndocker build -t sample:latest  .\n```\n\n构建成功后，你的终端将显示如下输出：\n\
  \n```\nStep 1/14 : FROM golang:1.18 as build\n---> 65b2f1fa535f\nStep 2/14 : COPY\
  \ ./main.go .\n---> 5164c620eaff\n...\nStep 10/14 : FROM scratch\n--->\n...\nSuccessfully\
  \ built 1a977f4b1cec\nSuccessfully tagged sample:latest\n```\n\n使用以下命令运行新创建的 Docker\
  \ 镜像：\n\n```\ndocker run sample:latest\n```\n\n你将看到类似以下的输出：\n\n```\n2022/07/09 10:06:42\
  \ Hello, from inside Docker image\n2022/07/09 10:06:42 Build using Go version  go1.18.2\n\
  ```\n\n示例 Dockerfile 使用了 scratch 镜像，如下所示：\n\n```\nFROM golang:1.18 as build\n...\n\
  RUN go build -trimpath -v -a -o sample -ldflags=\"-w -s\"\nRUN useradd -u 12345\
  \ normaluser\nFROM scratch\n...\nENTRYPOINT [\"/sample\"]\n```\n\n通过使用 scratch 镜像，你最大限度地减少了容器的攻击面，因为此镜像不像其他\
  \ Docker 镜像（例如：Ubuntu、Debian 等）那样安装了大量应用程序。\n\n### 本章小结\n\n在本章中，你学习了 Docker 安全方面的知识。首先介绍的是\
  \ seccomp 及其重要性。你通过示例代码学习了如何使用 seccomp 来限制 Go 应用程序。你还学习了如何设置 libseccomp，这使得你可以限制应用程序可以进行的系统调用。\n\
  \n接下来，你学习了如何在你的应用程序中使用 libseccomp-golang 库，以及如何在代码内部应用系统调用限制。在代码内部应用限制是好的做法，但一旦代码在生产环境中运行，不断修改这些代码会变得困难，因此你学习了在运行\
  \ Docker 容器时使用 seccomp 配置文件。\n\n最后，你学习了 Docker 代理，以拦截并理解 Docker 客户端和服务器之间的通信。你还深入研究了代理代码，了解代理如何转发请求和响应。最后，你简要了解了通过编写\
  \ Dockerfile 使用 scratch 基础镜像来减少容器攻击面的最佳方法。\n\n"
- '# 第三部分：应用程序安全


