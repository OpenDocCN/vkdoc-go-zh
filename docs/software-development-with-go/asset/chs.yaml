- '# 12. Epoll 库


  构建处理大量网络处理的应用程序需要一种在分布式或云环境中处理连接的特殊方式。得益于 2.5.44 版本中引入的可扩展 I/O 事件通知机制，运行在 Linux
  上的应用程序能够做到这一点。在本章中，您将了解 `epoll`。根据 [`linux.die.net/man/7/epoll`](https://linux.die.net/man/7/epoll)
  的文档：


  epoll API 执行与 [poll](https://man7.org/linux/man-pages/man2/poll.2.xhtml) 类似的任务：监视多个文件描述符，以查看它们中的任何一个是否可以进行
  I/O 操作。


