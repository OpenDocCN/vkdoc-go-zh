    \n```\n\n打开你的浏览器，输入 `http://localhost:8080` 来访问用户界面。你将看到类似图 18-1 的内容。\n\n![](img/527551_1_En_18_Fig1_HTML.jpg)\n\
    \n一张列出了开源容器顾问中涉及的 11 个子容器的屏幕截图。\n\n图 18-1\n\ncAdvisor 用户界面\n\n要查看本地运行的容器，请单击主页上的\
