    table.Render()

    }

    ```


    这个示例代码比你在前面章节中看到的代码更简单。它使用 `procfs.Processes(..)` 函数调用来获取所有当前进程。


    ### 了解 procfs 库的内部机制


    让我们更深入地研究一下这个库，看看它到底做了什么。我们将深入探讨下面的 `procfs.Processes(..)` 函数调用。库内部的 `Processes`
    函数如下所示：


    ```

    func Processes(lazy bool) (map[int]*Process, error) {

    ...

    files, err := ioutil.ReadDir("/proc")

    if err != nil {

    return nil, err

    }

    ...

    fetch := func(pid int) {

    proc, err := NewProcess(pid, lazy)

    if err != nil {

    ...

    done  0; {

    proc := <-done

    todo--

    if proc != nil {

    processes[proc.Pid] = proc

    }

    }

    return processes, nil

    }

    ```


    从高层次来看，图 3-3 展示了该函数的实际工作流程。


    ![](img/527551_1_En_3_Fig3_HTML.jpg)


    一个流程图，其中 `main.go` 的 `Processes` 函数被划分为三个子函数，分别名为 `fetch` 和 `PID`，并通过同步和异步并行 `done`
    通道连接。


    **图 3-3.** `Processes(..)` 函数流程图


    该函数从 `/proc` 目录读取进程信息，并通过在单独的 Go 协程中读取每个进程信息来遍历该目录，每个协程调用 `fetch(pid)` 函数。该函数提取并解析分配给它的进程
    ID 的信息。一旦收集完毕，它会将信息传递到 `Processes(..)` 函数正在等待的通道中；在本例中，该通道被称为 `done` 通道。


    所有繁重的打开和遍历 `/proc` 目录（包括解析结果）的工作都由库处理。应用程序只需关注它接收到的输出即可。


    ## 总结


    在本章中，你了解了 `/proc` 文件系统，并学习了应用程序可以访问的系统信息。你查看了从 `/proc` 目录中读取与设备网络和内存相关信息的示例代码。你还了解到，在提取系统信息时，需要编写的大部分代码都涉及读取和解析信息。你还了解了一个开源库，该库可以提供读取
    `/proc` 目录的功能，它执行所有繁重的工作，让你可以专注于编写更简单的代码来读取你所需的所有系统信息。


    # 第二部分 容器


    # 4. 简单容器


    在本章中，你将学习使用 Go 来探索容器世界。你将了解不同的容器相关项目，以便更好地理解容器及其使用的一些技术。容器有许多不同的方面，例如安全性、故障排除和扩展容器注册表。本章将使你了解以下主题：


    -   Linux 命名空间

    -   理解 cgroups 和 rootfs

    -   容器如何使用 rootfs


    你将探索不同的开源项目，以了解容器是如何工作的，以及像 Docker 这样的工具实际上是如何工作的。

