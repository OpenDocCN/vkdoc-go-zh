    \ build/\ndrwxrwxr-x  3 nanik nanik  4096 Jun 15 22:19 cache/\n-rw-rw-r--  1 nanik\
    \ nanik 22048 Jun 15 22:19 CHANGELOG.md\ndrwxrwxr-x  4 nanik nanik  4096 Jun 17\
    \ 22:31 client/\ndrwxrwxr-x  3 nanik nanik  4096 Jun 17 22:32 cmd/\ndrwxrwxr-x\
    \  3 nanik nanik  4096 Jun 17 22:31 collector/\n...\n```\n\n进入 `cmd` 目录并运行以下命令来构建项目：\n\
    \n```\ngo build -o cadvisor\n```\n\n你将得到一个名为 `cadvisor` 的可执行文件。让我们使用以下命令运行该项目，以打印它可以接受的不同参数：\n\
    \n```\n./cadvisor –help\n```\n\n你将得到类似如下的输出：\n\n```\n-add_dir_header\nIf true,\
    \ adds the file directory to the header of the log messages\n...\n-boot_id_file\
    \ string\nComma-separated list of files to check for boot-id. Use the first one\
    \ that exists. (default \"/proc/sys/kernel/random/boot_id\")\n...\n-v value\n\
    number for the log level verbosity\n...\n```\n\n我不会遍历 cAdvisor 拥有的所有不同参数。你将仅使用它分配的默认值。cAdvisor\
    \ 需要 root 权限才能运行，因此请按如下方式操作：\n\n```\nsudo ./cadvisor -v 9\n```\n\n默认情况下，它使用 8080\
    \ 端口运行应用程序，因此如果你有另一个使用 8080 端口的应用程序在运行，它将无法启动。对于 cAdvisor，请使用 `-p` 标志指定一个不同的端口号。\n\
    \n```\nsudo ./cadvisor -port \n```\n\n当 cAdvisor 运行时，它会收集与机器和容器相关的各种信息，这只有在它具有\
    \ root 权限时才能完成。\n\n一旦 cAdvisor 启动并运行，你将看到终端中打印出大量日志信息。\n\n```\nI0617 23:06:13.122455\
