- fmt: "### Handling Service Dependencies\n\nComplex applications like CrowdSec have\
    \ multiple services that run at the same time or at scheduled times. In order\
    \ for services to run properly, there needs to be service coordination that takes\
    \ care of the dependencies between services.\n\nFigure [14-4](#527551_1_En_14_Chapter.xhtml#Fig4)\
    \ shows how the service coordination is done inside CrowdSec using the channel.\n\
    \n![](images/527551_1_En_14_Chapter/527551_1_En_14_Fig4_HTML.jpg)\n\nA flowchart\
    \ of the service coordinator starts from the `main.go` then `startRunSvc` after\
    \ that classified into two categories named `serve`, `servePrometheus`, `serveAPIServer`,\
    \ and wait for the signal.\n\n**Figure 14-4**  \nService coordination\n\nIn Figure\
    \ [14-4](#527551_1_En_14_Chapter.xhtml#Fig4), the `apiReady` channel is the central\
    \ part of the service coordination when CrowdSec starts up. The diagram shows\
    \ that the `apiServer.Run` function sends a signal to the `apiReady` channel,\
    \ which allows the other service, `servePrometheus`, to run the server listening\
    \ on port 6060.\n\nThe following code snippet shows the `StartRunSvc` function\
    \ running `servePrometheus` as a goroutine and passing in the `apiReady` channel,\
    \ and it also passes the same channel when the `Serve` function is called:\n\n\
    ```\npackage main\n\nimport (\n\t\"os\"\n\t...\n)\n\nfunc StartRunSvc() error\
    \ {\n\t...\n\tapiReady := make(chan bool, 1)\n\tagentReady := make(chan bool,\
    \ 1)\n\t// Enable profiling early\n\tif cConfig.Prometheus != nil {\n\t\t...\n\
    \t\tgo servePrometheus(cConfig.Prometheus, dbClient, apiReady, agentReady)\n\t\
    }\n\treturn Serve(cConfig, apiReady, agentReady)\n}\n```\n\nThe `servePrometheus`\
    \ function starts running the server to listen on port 6060 only when it is able\
    \ to read the value from the `apiReady` channel (`<- apiReady`), as shown in the\
    \ following snippet:\n\n```\nfunc servePrometheus(config *csconfig.PrometheusCfg,\
    \ dbClient *database.Client, apiReady chan bool, agentReady chan bool) {\n\t...\n\
    \t<-apiReady\n\t...\n\tif err := http.ListenAndServe(fmt.Sprintf(\"%s:%d\", config.ListenAddr,\
    \ config.ListenPort), nil); err != nil {\n\t\tlog.Warningf(\"prometheus: %s\"\
    , err)\n\t}\n}\n```\n\nThe `apiReady` channel is set only when the CrowdSec API\
    \ server has been run successfully, as shown in the following code snippet. The\
    \ `serveAPIServer` function spawns off another goroutine when calling the `apiServer.Run(..)`\
    \ function, where it sends a value to the `apiReady` channel where the API server\
    \ starts up.\n\n```\nfunc serveAPIServer(apiServer *apiserver.APIServer, apiReady\
    \ chan bool) {\n\tapiTomb.Go(func() error {\n\t\t...\n\t\tgo func() {\n\t\t\t\
    ...\n\t\t\tif err := apiServer.Run(apiReady); err != nil {\n\t\t\t\tlog.Fatalf(err.Error())\n\
    \t\t\t}\n\t\t}()\n\t\t...\n\t})\n}\n\nfunc (s *APIServer) Run(apiReady chan bool)\
    \ error {\n\t...\n\ts.httpServerTomb.Go(func() error {\n\t\tgo func() {\n\t\t\t\
    apiReady <- true\n\t\t\t...\n\t\t}()\n\t\t...\n\t})\n\treturn nil\n}\n```\n\n\
    Let’s take a look at a simpler version of the service coordination, which is in\
    \ the `chapter14/services` folder. The sample code demonstrates how to use service\
    \ coordination between two different services, `serviceA` and `serviceB`. Open\
