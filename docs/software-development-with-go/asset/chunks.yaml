  raw: '### Rules


    The tool defines rules that are basically Go code that validates the `ast.Node`
    to check if it fulfills certain conditions. The function that generates the rules
    is seen here (inside `rulelist.go`):


    ```

    func Generate(trackSuppressions bool, filters ...RuleFilter) RuleList {

    rules := []RuleDefinition{

    {"G101", "Look for hardcoded credentials", NewHardcodedCredentials},

    ...

    {"G601", "Implicit memory aliasing in RangeStmt", NewImplicitAliasing},

    }

    ...

    return RuleList{ruleMap, ruleSuppressedMap}

    }

    ```


    The rule is defined by specific code, description and the function name. Looking
    at G101, you can see that the function name is `NewHardCodedCredentials,` which
    is defined as follows:


    ```

    package rules

    import (

    ...

    )

    ...

    func (r *credentials) Match(n ast.Node, ctx *gosec.Context) (*gosec.Issue, error)
    {

    switch node := n.(type) {

    case *ast.AssignStmt:

    return r.matchAssign(node, ctx)

    ...

    }

    ...

    }

    func NewHardcodedCredentials(id string, conf gosec.Config) (gosec.Rule, []ast.Node)
    {

    ...

    return &credentials{

    pattern:          regexp.MustCompile(pattern),

    entropyThreshold: entropyThreshold,

    ...

    MetaData: gosec.MetaData{

    ID:         id,

    What:       "Potential hardcoded credentials",

    Confidence: gosec.Low,

    Severity:   gosec.High,

    },

    }, []ast.Node{(*ast.AssignStmt)(nil), (*ast.ValueSpec)(nil), (*ast.BinaryExpr)(nil)}

    }

    ```


    The `NewHardcodedCredentials` function initializes all the different parameters
    that it needs to process the node. The rule has a `Match(..)` function that is
    called by gosec when it processes the AST data structure for each file that it
    processes.


    ## Summary


    In this chapter, you looked at what an abstract syntax tree is and what it looks
    like. Go provides modules that make it easy for applications to work with the
    AST data structure. This opens up the possibility of writing tools like static
    code analysers like the open source project gosec.


    The sample code provided for this chapter shows how to use AST for simple things
    like calculating the number of global variables and printing out the package name
    from the import declaration. You also looked in depth at the gosec tool to understand
    how it uses AST to provide secure code analysis by going through the different
    parts of the source code.


    # 8. Scorecard


    In this chapter, you will look at an open source security tool called Scorecard.
    Scorecard provides security metrics for projects you are interested in. The metrics
    will give you visibility on the security concerns that you need to be aware of
    regarding the projects.


    You will learn how to create GitHub tokens using your GitHub account. The tokens
    are needed by the tool to extract public GitHub repository information. You will
    walk through the steps of installing and using the tool. To understand the tool
    better, you will look at the high-level flow of how the tool works and also at
    how it uses the GitHub API.


    One of the key takeaways of this chapter is how to use the GitHub API and the
    information that can be extracted from repositories hosted on GitHub. You will
    learn how to use GraphQL to query repository data from GitHub using an open source
    library.


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ## What Is Scorecard?


    Scorecard is an open source project that analyzes your project’s dependencies
    and gives ratings about them. The tool performs several checks that can be configured
    depending on your needs. The checks are associated with software security and
    are assigned a score of 0 to 10\. The tool shows whether dependencies in your
    project are safe and also provides other security checks such as your GitHub configuration,
    license checking, and many other useful checks.


    The project maintainer runs the tool every day, scanning through thousands of
    GitHub repositories and scoring them. The score results are publicly available
    in BigQuery, as shown in Figure [8-1](#527551_1_En_8_Chapter.xhtml#Fig1).


    ![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig1_HTML.png)


    A screenshot of the user interface of google cloud depicts various files under
    2 projects such as scorecard and query results with various tools including run,
    save, share, copy, schedule, and more.


    Figure 8-1


    Scorecard public dataset in BigQuery


    To access the public dataset, you need to have a Google (Gmail) account. Open
    your browser and type in the following address: [`http://console.cloud.google.com/bigquery`](http://console.cloud.google.com/bigquery).
    Once the Google Cloud page loads, click Add Data ➤ Pin a Project ➤ Enter project
    name, as shown in Figure [8-2](#527551_1_En_8_Chapter.xhtml#Fig2), for the project
    name *openssf* and you will see dataset displayed on the left side of your screen.


    ![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig2_HTML.jpg)


    A screenshot of the user interface of google cloud depicts various files under
    a project such as my first project with various tools including pin project, exploring
    public datasets, data sources, and search.


    Figure 8-2


    Add the openssf project


    In the next section, you will look at setting up the GitHub token key so that
    you can use it to scan the GitHub repository of your choice.'
  trans: "\n### 规则\n\n该工具定义的规则本质上是用于验证 `ast.Node` 以检查其是否满足特定条件的 Go 代码。生成规则的函数如下所示（位于\
    \ `rulelist.go` 文件中）：\n\n```\nfunc Generate(trackSuppressions bool, filters ...RuleFilter)\
    \ RuleList {\n    rules := []RuleDefinition{\n        {\"G101\", \"查找硬编码凭据\",\
    \ NewHardcodedCredentials},\n        ...\n        {\"G601\", \"RangeStmt 中的隐式内存别名\"\
    , NewImplicitAliasing},\n    }\n    ...\n    return RuleList{ruleMap, ruleSuppressedMap}\n\
    }\n```\n\n每条规则由特定代码、描述和函数名称定义。查看 `G101`，你可以看到函数名称为 `NewHardCodedCredentials`，其定义如下：\n\
    \n```\npackage rules\n\nimport (\n    ...\n)\n\nfunc (r *credentials) Match(n\
    \ ast.Node, ctx *gosec.Context) (*gosec.Issue, error) {\n    switch node := n.(type)\
    \ {\n    case *ast.AssignStmt:\n        return r.matchAssign(node, ctx)\n    \
    \    ...\n    }\n}\n\nfunc NewHardcodedCredentials(id string, conf gosec.Config)\
    \ (gosec.Rule, []ast.Node) {\n    ...\n    return &credentials{\n        pattern:\
    \          regexp.MustCompile(pattern),\n        entropyThreshold: entropyThreshold,\n\
    \        ...\n        MetaData: gosec.MetaData{\n            ID:         id,\n\
    \            What:       \"潜在硬编码凭据\",\n            Confidence: gosec.Low,\n  \
    \          Severity:   gosec.High,\n        },\n    }, []ast.Node{(*ast.AssignStmt)(nil),\
    \ (*ast.ValueSpec)(nil), (*ast.BinaryExpr)(nil)}\n}\n```\n\n`NewHardcodedCredentials`\
    \ 函数初始化了处理节点所需的所有不同参数。该规则包含一个 `Match(..)` 函数，当 `gosec` 处理它所处理的每个文件的 AST 数据结构时，会调用此函数。\n\
    \n## 本章小结\n\n在本章中，你了解了什么是抽象语法树及其形态。Go 提供了简化应用程序处理 AST 数据结构的模块。这为编写诸如开源项目 `gosec`\
    \ 这类静态代码分析工具提供了可能性。\n\n本章提供的示例代码展示了如何使用 AST 完成简单任务，例如计算全局变量的数量以及从导入声明中打印包名。你还通过深入分析\
    \ `gosec` 工具的源代码的不同部分，了解了它如何利用 AST 提供安全代码分析。\n\n# 8. 评分卡\n\n在本章中，你将了解一个名为 Scorecard\
    \ 的开源安全工具。Scorecard 为你感兴趣的项目提供安全指标。这些指标将让你了解与项目相关的、你需要关注的安全问题。\n\n你将学习如何使用你的 GitHub\
    \ 帐户创建 GitHub 令牌。该工具需要此令牌来提取公共 GitHub 仓库信息。你将逐步完成安装和使用该工具的步骤。为了更好地理解该工具，你将了解其工作的高级流程，以及它如何使用\
    \ GitHub API。\n\n本章的关键要点之一是如何使用 GitHub API 以及可以从托管在 GitHub 上的仓库中提取哪些信息。你将学习如何利用开源库，使用\
    \ GraphQL 从 GitHub 查询仓库数据。\n\n### 源代码\n\n本章的源代码可以从以下仓库获取：[`github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\n\
    \n## 什么是 Scorecard？\n\nScorecard 是一个开源项目，分析你项目的依赖关系并对其给出评级的工具。该工具执行多项检查，你可以根据需要进行配置。这些检查与软件安全相关，并被赋予\
    \ 0 到 10 的评分。该工具能显示项目中的依赖是否安全，并提供其他安全检查，例如你的 GitHub 配置、许可证检查以及许多其他有用的检查。\n\n项目维护者每天运行该工具，扫描数千个\
    \ GitHub 仓库并为其打分。评分结果可在 BigQuery 中公开获取，如图 8-1 所示。\n\n![Google Cloud 用户界面截图，展示了\
    \ scorecard 和 query results 两个项目下的各种文件，并包含运行、保存、共享、复制、调度等工具。](img/527551_1_En_8_Fig1_HTML.png)\n\
    \n**图 8-1**  \nBigQuery 中的 Scorecard 公共数据集\n\n要访问此公共数据集，你需要拥有一个 Google (Gmail)\
    \ 帐户。打开你的浏览器并输入以下地址：[`console.cloud.google.com/bigquery`](http://console.cloud.google.com/bigquery)。Google\
    \ Cloud 页面加载后，点击 **添加数据** ➤ **固定项目** ➤ **输入项目名称**，如图 8-2 所示，项目名称为 `openssf`，你将在屏幕左侧看到显示的数据集。\n\
    \n![Google Cloud 用户界面截图，展示了 my first project 等项目下的各种文件，并包含固定项目、探索公共数据集、数据源和搜索等工具。](img/527551_1_En_8_Fig2_HTML.jpg)\n\
    \n**图 8-2**  \n添加 `openssf` 项目\n\n在下一节中，你将学习如何设置 GitHub 令牌密钥，以便用它来扫描你选择的 GitHub\
    \ 仓库。\n"
- fmt: "### Setting Up Scorecard\n\n`Scorecard` requires a GitHub token key to scan\
    \ the repository. The reason behind this is the rate limit imposed by GitHub for\
    \ unauthenticated requests. Let’s walk through the following steps to create a\
    \ token key in GitHub.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig3_HTML.jpg)\n\
    \nA screenshot represents how to access the settings menu. The drop-down list\
    \ under the profile has options for your profile, repositories, code spaces, organizations,\
    \ and projects.\n\nFigure 8-3  \nAccessing the Settings menu\n\n1. Go to your\
    \ GitHub repository (in my case, `https://github.com/nanikjava`) and click the\
    \ top right icon, as shown in Figure 8-3, to access the profile page by clicking\
    \ the *Settings* menu.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig4_HTML.jpg)\n\
    \nA screenshot lists the menu on the profile page. They are packages, GitHub copilot,\
    \ pages, saved replies, code security and analysis, applications, developer settings,\
    \ and security and sponsorship log.\n\nFigure 8-4  \nMenu on Profile page\n\n\
    2. Once you are on the Profile page, shown in Figure 8-4, click *Developer settings*.\n\
    \n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig5_HTML.jpg)\n\nA screenshot\
    \ with the text reads GitHub apps, OAuth apps, and personal access tokens. The\
    \ GitHub apps option is highlighted.\n\nFigure 8-5  \nApps page\n\n3. You will\
    \ be brought into the apps page, as shown in Figure 8-5. Click the *Personal access\
    \ tokens* link.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig6_HTML.jpg)\n\
    \nA screenshot of personal access tokens with 3 options including generating the\
    \ new tokens, deleting, and revoking all with an expiry date of Thursday August\
    \ 2022.\n\nFigure 8-6  \nTokens page\n\n4. Once you are inside the tokens page,\
    \ shown in Figure 8-6, click *Generate new token*.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig7_HTML.jpg)\n\
    \nA screenshot of the new personal access token page includes note names, expiration\
    \ days, and selection of scope access with personal tokens.\n\nFigure 8-7  \n\
    Generate a new token page\n\n5. You will see the new personal token page, shown\
    \ in Figure 8-7. Fill in the *Note* textbox with information about what the token\
    \ is used for and set the expiration to whatever you want. Finally, in the *Select\
    \ scopes* section, select the *repo* tickbox; this will automatically select the\
    \ rest of the repo permissions that fall under it. Once done, scroll down and\
    \ click the *Generate token* button.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig8_HTML.jpg)\n\
    \nA screenshot of the personal access tokens with three options including generating\
    \ the new tokens, deleting, and revoking all with an expiry date.\n\nFigure 8-8\
    \  \nToken successfully generated\n\n6. Once the token has been generated, you\
    \ will see a screen like Figure 8-8 showing the new token. Copy the token and\
    \ paste it somewhere on your editor so you can use it for the next section.\n\n\
    In the next section, you will use the token you generated to build and run `Scorecard`.\n\
    \n### Running Scorecard\n\nDownload the tool from the project GitHub repository.\
    \ For this chapter, you’ll use `v4.4.0`; the binary can be downloaded from `https://github.com/ossf/scorecard/releases/tag/v4.4.0`.\
    \ Once you download the archive file, unzip it to a directory on your local machine.\n\
    \nExecute `Scorecard` to check it’s working.\n\n```\n/directory/scorecard help\n\
    ```\n\nYou will see the following output in your console:\n\n```\nA program that\
    \ shows security scorecard for an open source software.\nUsage:\n./scorecard --repo=\
    \ [--checks=check1,...] [--show-details]\nor ./scorecard --{npm,pypi,rubgems}=\
    \ [--checks=check1,...] [--show-details] [flags]\n./scorecard [command]\n...\n\
    Flags:\n...\nUse \"./scorecard [command] --help\" for more information about a\
    \ command.\n```\n\nNow that `Scorecard` is working on your machine, let's use\
    \ the token you generated in the previous section to scan a repository. For this\
    \ example, you will scan the `github.com/ossf/scorecard` repository. Open terminal\
    \ and execute the following command:\n\n```\nGITHUB_AUTH_TOKEN= /directory_of_scorecard/scorecard\
    \ --repo=github.com/ossf/scorecard\n```\n\nReplace `<github_token>` with your\
    \ GitHub token. The tool will take a bit of time to run because it is scanning\
    \ and doing checks on the GitHub repository. Once complete, you will see output\
    \ something like Figure 8-9.\n\n![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig9_HTML.jpg)\n\
    \nA screenshot of the scorecard output. A table that includes scores out of 10,\
    \ names, reasons, and documentation or remediation.\n\nFigure 8-9  \nScorecard\
    \ output\n\nYou have successfully run the tool to scan a GitHub repository and\
    \ received an output with a high score of 8.0. A higher score indicates that the\
    \ repository is doing all the right things as per the predefined checks in the\
    \ tool.\n\nIn the next section, you will further explore the tool to understand\
    \ how it works and go through code for different parts of the tool."
