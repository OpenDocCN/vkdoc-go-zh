- fmt: 'The container is now ready to accept a connection on port `4000`. Open another
    terminal window from your host machine and run the following command:


    ```

    nc 4000

    ```


    Type in anything on your terminal window and the container will output your type.
    You will see something like Figure [5-3](#527551_1_En_5_Chapter.xhtml#Fig3).


    ![](images/527551_1_En_5_Chapter/527551_1_En_5_Fig3_HTML.jpg)


    A screenshot has a program including loopback and IP address. The output of the
    program is `nanik`, followed by an IP address, and a text, this is a test message.


    **Figure 5-3** Communication between container and host


    Let’s take a look at the code to understand how the application is able to do
    all this inside Go. The application performs a two-step execution process. The
    first step is setting up the bridge and virtual networks, and the second step
    is setting up the network namespaces, setting up the different configurations
    of the virtual networks, and executing the container inside the namespace.


    Let’s take a look at the first step of creating the bridge and virtual networks,
    as shown here:


    ```

    func setupGockerBridge() error {

    linkAttrs := netlink.NewLinkAttrs()

    linkAttrs.Name = "gocker0"

    gockerBridge := &netlink.Bridge{LinkAttrs: linkAttrs}

    if err := netlink.LinkAdd(gockerBridge); err != nil {

    return err

    }

    addr, _ := netlink.ParseAddr("172.29.0.1/16")

    netlink.AddrAdd(gockerBridge, addr)

    netlink.LinkSetUp(gockerBridge)

    return nil

    }

    ```


    The function sets up a new bridge by creating a new `netlink.Bridge`, which contain
    network bridge information that is populated with the name `gocker0` and is assigned
    the IP address `172.29.0.1`.


    Once it successfully sets up the bridge, it will set up the virtual ethernet that
    is called inside the `initContainer(..)` function, as shown here:


    ```

    func initContainer(mem int, swap int, pids int, cpus float64, src string, args
    []string) {

    ...

    if err := setupVirtualEthOnHost(containerID); err != nil {

    log.Fatalf("Unable to setup Veth0 on host: %v", err)

    }

    ...

    }

    ```


    The `setupVirtualEthOnHost(..)` function is shown here:


    ```

    func setupVirtualEthOnHost(containerID string) error {

    veth0 := "veth0_" + containerID[:6]

    veth1 := "veth1_" + containerID[:6]

    linkAttrs := netlink.NewLinkAttrs()

    linkAttrs.Name = veth0

    veth0Struct := &netlink.Veth{

    LinkAttrs:        linkAttrs,

    PeerName:         veth1,

    PeerHardwareAddr: createMACAddress(),

    }

    if err := netlink.LinkAdd(veth0Struct); err != nil {

    return err

    }

    netlink.LinkSetUp(veth0Struct)

    gockerBridge, _ := netlink.LinkByName("gocker0")

    netlink.LinkSetMaster(veth0Struct, gockerBridge)

    return nil

    }

    ```


    The function creates two virtual networks labeled `veth0_xxx` and `veth1_xxx`.
    The `xxx` represents the generated container id, so in my case it looks like `veth0_7ea0e6`.
    The new virtual network will be given a generated MAC address by calling `createMACAddress()`
    and will be linked to the newly created `gocker0` bridge.


    Now that the bridge and virtual networks have been set up, the application will
    set up the network namespace, configure the container’s virtual network, and run
    the container, which is performed by `initContainer(..)`:


    ```

    func initContainer(mem int, swap int, pids int, cpus float64, src string, args
    []string) {

    ...

    prepareAndExecuteContainer(mem, swap, pids, cpus, containerID, imageShaHex, args)

    ...

    }

    ```


    The `prepareAndExecuteContainer(..)` function takes care of a few things, as shown
    in the following snippet:


    ```

    func prepareAndExecuteContainer(mem int, swap int, pids int, cpus float64,

    containerID string, imageShaHex string, cmdArgs []string) {

    cmd := &exec.Cmd{

    Path:   "/proc/self/exe",

    Args:   []string{"/proc/self/exe", "setup-netns", containerID},

    ...

    }

    cmd.Run()

    cmd = &exec.Cmd{

    Path:   "/proc/self/exe",

    Args:   []string{"/proc/self/exe", "setup-veth", containerID},

    ...

    }

    cmd.Run()

    ...

    opts = append(opts, "--img="+imageShaHex)

    args := append([]string{containerID}, cmdArgs...)

    args = append(opts, args...)

    args = append([]string{"child-mode"}, args...)

    cmd = exec.Command("/proc/self/exe", args...)

    ...

    cmd.SysProcAttr = &unix.SysProcAttr{

    Cloneflags: unix.CLONE_NEWPID |

    unix.CLONE_NEWNS |

    unix.CLONE_NEWUTS |

    unix.CLONE_NEWIPC,

    }

    doOrDie(cmd.Run())

    }

    ```


    The function runs itself again (via the `/proc/self/exe` way), passing the parameters
    `setup-ns` and `setup-veth`. These two functions perform the network namespace
    (`setupNewNetworkNamespace`) and virtual ethernet setup (`setupContainerNetworkInterfaceStep1`
    and `setupContainerNetworkInterfaceStep2`).


    ```

    func setupNewNetworkNamespace(containerID string) {

    _ = createDirsIfDontExist([]string{getGockerNetNsPath()})

    ...

    if err := unix.Setns(fd, unix.CLONE_NEWNET); err != nil {

    log.Fatalf("Setns system call failed: %v\n", err)

    }

    }

    func setupContainerNetworkInterfaceStep1(containerID string) {

    ...

    veth1 := "veth1_" + containerID[:6]

    veth1Link, err := netlink.LinkByName(veth1)

    ...

    if err := netlink.LinkSetNsFd(veth1Link, fd); err != nil {

    log.Fatalf("Unable to set network namespace for veth1: %v\n", err)

    }

    }

    func setupContainerNetworkInterfaceStep2(containerID string) {

    ...

    if err := unix.Setns(fd, unix.CLONE_NEWNET); err != nil {

    log.Fatalf("Setns system call failed: %v\n", err)

    }

    veth1 := "veth1_" + containerID[:6]

    veth1Link, err := netlink.LinkByName(veth1)

    if err != nil {

    log.Fatalf("Unable to fetch veth1: %v\n", err)

    }

    ...

    route := netlink.Route{

    Scope:     netlink.SCOPE_UNIVERSE,

    LinkIndex: veth1Link.Attrs().Index,

    Gw:        net.ParseIP("172.29.0.1"),

    Dst:       nil,

    }

    ...

    }

    ```


    Once all the network setup is done, it calls itself again, passing in `child-mode`
    as the parameter, which is performed by the following code snippet:


    ```

    ...

    case "child-mode":

    fs := flag.FlagSet{}

    fs.ParseErrorsWhitelist.UnknownFlags = true

    ...

    execContainerCommand(*mem, *swap, *pids, *cpus, fs.Args()[0], *image, fs.Args()[1:])

    ...

    ```


    Once all setup is done, the final step is to set up the container by calling `execContainerCommand(..)`
    to allow the user to execute the command inside the container.


    In this section, you learned the different steps involved in setting up virtual
    networks for a container. The sample application used in this section performs
    operations such as downloading images, setting up rootfs, setting up network namespaces,
    and configuring all the different virtual networks required for a container.


    ### Summary


    In this chapter, you learned about virtual networks that are used inside containers.
    You went through the steps of configuring network namespaces along with virtual
    networks manually using a Linux tool called `ip`. You looked at configuring `iptables`
    to allow communication to happen between the different network namespaces.


    After understanding how to configure a network namespace with virtual networks,
    you looked at a Go example of how to configure virtual networks in a container.
    You went through the different functions that perform different tasks that are
    required to configure the virtual networks for a container.


    # 6. Docker Security


    This chapter, you will look at seccomp profiles, one of the security features
    provided by Docker, which use the seccomp feature built into the Linux kernel.
    Standalone Go applications can also implement seccomp security without using Docker,
    and you will look at how to do this using the seccomp library.


    You will also look at how Docker communicates using sockets by writing a proxy
    that listens to Docker communication. This is super useful to know because it
    gives you a better idea of how to secure Docker in your infrastructure.


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.'
