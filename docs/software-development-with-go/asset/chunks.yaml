- fmt: '# ANSI Escape Code


    Terminal-based applications that provide a user interface are normally built using
    ANSI escape codes. The Wikipedia page at [`https://en.wikipedia.org/wiki/ANSI_escape_code`](https://en.wikipedia.org/wiki/ANSI_escape_code)
    provides a comprehensive explanation of the ANSI code: ANSI escape sequences are
    a standard for in-band signaling to control cursor location, color, font styling,
    and other options on video text terminals and terminal emulators.


    With the help of ANSI code, there are a proliferation of terminal-based applications
    that provide a rich terminal-based user interface.


    Let’s experiment with a simple Bash script to print different background and foreground
    colors with text using ANSI code, as shown in the following example script:


    ```

    for x in {0..8}; do for i in {30..37}; do

    for a in {40..47}; do echo -ne "\e[$i;$a""m\\\e[$i;$a""m\e[37;40m "; done

    echo

    done; done

    echo ""

    ```


    Figure [15-1](#527551_1_En_15_Chapter.xhtml#Fig1) shows the output that you will
    see on your screen.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig1_HTML.jpg)


    A screenshot of bash output.


    Figure 15-1


    Bash output


    The following script prints out numbers in 256 different foreground colors using
    ANSI code. Figure [15-2](#527551_1_En_15_Chapter.xhtml#Fig2) shows the output.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig2_HTML.jpg)


    A screenshot of the 256-color output. The numbers are arranged from 1 to 249.


    Figure 15-2


    256 color output


    ```

    for i in {0..255}; do printf ''\e[38;5;%dm%3d '' $i $i; (((i+3) % 18)) || printf
    ''\e[0m\n''; done

    ```


    Both Bash scripts use ANSI code to select color. For Figure [15-2](#527551_1_En_15_Chapter.xhtml#Fig2),
    the ANSI code is the following:


    ```

    \e[38;5;228m

    ```


    Table [15-1](#527551_1_En_15_Chapter.xhtml#Tab1) explains what the code means.


    Table 15-1


    Code Description


    | Code | Description |

    | --- | --- |

    | `\e` | Escape character |

    | `38;5` | ANSI code specifying foreground color |

    | `228` | Color code for bright yellow |


    In this section, you learned about ANSI codes and how to use them to print text
    with different colors by writing Bash scripts. This lays the foundation for the
    next section where you are going to use ANSI code to write different kinds of
    terminal-based user interfaces inside Go.


    ## ANSI-Based UI


    In the previous section, you looked at ANSI codes and how to use them in Bash.
    In this section, you are going to use the ANSI codes inside a Go application.
    You will use ANSI code to set text color, style the text such as italic, and more.


    ### Color Table


    Open your terminal and run the code inside the `chapter15/ansi` folder.


    ```

    go run main.go

    ```


    Figure [15-3](#527551_1_En_15_Chapter.xhtml#Fig3) shows the output.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig3_HTML.jpg)


    A screenshot of the different color text output. The text `Aa` is the combination
    of foreground and background. The foreground numbers are from 30 to 97, while
    the background numbers are from 40 to 107.


    Figure 15-3


    Different color text output


    The code prints the text `Aa` combined with the foreground and background color.
    The color values are set using escape code, which is obtained from the `fg` and
    `bg` variables, as shown in the following snippet:


    ```

    ...

    for _, fg := range fgColors {

    fmt.Printf("%2s ", fg)

    ...

    if len(fg) > 0 {

    ...

    fmt.Printf("\x1b[%sm Aa \x1b[0m", bg)

    }

    }

    }

    ```


    Then different foreground and background numbers are specified in the `fgColors`
    and `bgColors` arrays, as follows:


    ```

    var fgColors = []string{

    "", "30", "31", "32", "33", "34", "35", "36", "37",

    "90", "91", "92", "93", "94", "95", "96", "97",

    }

    var bgColors = []string{

    "", "40", "41", "42", "43", "44", "45", "46", "47",

    "100", "101", "102", "103", "104", "105", "106", "107",

    }

    ```


    The string printed to the screen looks like the following:


    ```

    [31;40m Aa [0m

    ```


    Here is the breakdown of what the code means:


    *   `[31;40m`: ANSI escape code for black background with red color text

    *   `Aa`: The `Aa` text

    *   `[0m`: Reset


    Figure [15-4](#527551_1_En_15_Chapter.xhtml#Fig4) shows a table extracted from
    [`https://en.wikipedia.org/wiki/ANSI_escape_code`](https://en.wikipedia.org/wiki/ANSI_escape_code)
    showing the different foreground and background value combinations and the color
    each represents.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig4_HTML.jpg)


    A screenshot with columns as FG, BG, Name, VGA, Windows XP Console, Windows power,
    visual studio code, windows 10, and terminal explains the foreground and background
    mapping.


    Figure 15-4


    Foreground and background mapping


    In the next section, you will look at examples of how to use ANSI code to format
    text on a screen.


    ### Styling Text


    ANSI code is also available to style text such as italic, superscript, and more.
    Let’s take a look at the sample code inside the `chapter15/textstyle` folder,
    which will print output like Figure [15-5](#527551_1_En_15_Chapter.xhtml#Fig5).


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig5_HTML.jpg)


    The text reads Italics text at the top and Underline text at the bottom.


    Figure 15-5


    Text styling using ANSI


    The following code declares different constants containing ANSI code to format
    text with different styles:


    ```

    package main

    import "fmt"

    const (

    Underline    = "\x1b[4m"

    UnderlineOff = "\x1b[24m"

    Italics      = "\x1b[3m"

    ItalicsOff   = "\x1b[23m"

    )

    ...

    ```


    In this section, you used different ANSI codes to format text in the console with
    different colors and formats. Going through the sample code, it is obvious that
    writing a command-line application that uses ANSI codes is quite laborious because
    you need to specify the different ANSI codes that are required in the application.


    In the next section, you will look at some open source projects that take care
    of the different aspects of command-line user interface development to make writing
    code easier.


    ## Open Source Library


    In this section, you will look at two different open source libraries that are
    useful when writing command-line user interfaces. You will look at examples of
    how to use the libraries and look at how the internals of the libraries work.'
