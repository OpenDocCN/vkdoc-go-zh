- fmt: '# Docker Communication Using a Proxy


    The following snippet shows the code that listens to the socket `/tmp/docker.sock`:


    ```

    func main() {

    in := flag.String("in", proxySocket, "Proxy docker socket")

    ...

    sock, err := net.Listen("unix", *in)

    if err != nil {

    log.Fatalf("Error : %v", err)

    }

    ...

    }

    ```


    The code uses the `net.Listen(..)` function passing in the parameter `unix`. The
    `unix` parameter indicates to the function that the requested socket is a non-networked
    Unix socket, which is handled differently internally in the `net` library.


    Once the socket has been initialized successfully, the code will create a socket
    handler that will take care of processing the incoming request and outgoing response.
    This is performed by the function `ServeHTTP`, which is the function of the `handler`
    struct. The following snippet shows the declaration of the handler and calling
    `http.Serve` to inform the library of the handler that the socket `sock` will
    be using. The handler is created, passing in `dsocket` to be populated into the
    `socket` variable.


    ```

    func main() {

    ...

    dhandler := &handler{dsocket}

    ...

    err = http.Serve(sock, dhandler)

    ...

    }

    ```


    With the socket ready to accept connections, the function `ServeHTTP` takes care
    of processing the request and response for all traffic. The first thing the function
    does is create a separate connection to the Docker socket.


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    conn, err := net.DialUnix(unix, nil, &net.UnixAddr{h.socket, unix})

    if err != nil {

    writeError(response, errCode, err)

    return

    }

    ...

    }

    ```


    The `net.DialUnix(..)` function creates a Unix socket using the `h.socket` value
    as the socket name; in this sample code, the value is `var/run/docker.sock`. The
    connection object returned by this function will be used as a bridge by the code
    to pass back and forth the request and response.


    The code will *forward* the incoming request to the Docker socket, as shown in
    the following snippet:


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    err = request.Write(conn)

    ...

    }

    ```


    The `request.Write(..)` function forwards the incoming request to the original
    Docker socket that is pointed by the `conn` variable. Once the request is sent,
    the code needs to get a `http/Response` struct in order to read the response reply
    from the Docker socket. This is done in the following code snippet:


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    resp, err := http.ReadResponse(bufio.NewReader(conn), request)

    if err != nil {

    writeError(response, errCode, err)

    return

    }

    ...

    }

    ```


    The `resp` variable now contains the response from the original Docker socket
    and it will extract the relevant information and forward it back to the caller
    response stored inside the `response` object, as shown in the following code snippet:


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    response.WriteHeader(resp.StatusCode)

    reader := bufio.NewReader(resp.Body)

    for {

    line, _, err := reader.ReadLine()

    ...

    // write the response back to the caller

    response.Write(line)

    ...

    }

    }

    ```


    In the next section, you will look at how to configure your Dockerfile to minimize
    the container attack surface.


    ## Container Attack Surface


    Building applications for cloud environments requires building the application
    as a container image, which requires creating Dockerfiles. This section will show
    how to minimize risk when creating Docker images for Go applications.


    The main thing to remember when building a Docker image is the final image that
    the application will be running on. The rule of thumb is to use the bare minimum
    base image to host your application. In the Docker world, the bare minimum base
    image is *scratch*. More detailed information about the scratch image can be found
    at [`https://hub.docker.com/_/scratch`](https://hub.docker.com/_/scratch).


    The sample Dockerfile that uses the scratch image can be found inside the `chapter6/dockersecurity`
    directory. Open terminal and change to the `chapter6/dockersecurity` directory
    and build the image as follows:


    ```

    docker build -t sample:latest  .

    ```


    Once it’s successfully built, you will get output in your terminal as shown:


    ```

    Step 1/14 : FROM golang:1.18 as build

    ---> 65b2f1fa535f

    Step 2/14 : COPY ./main.go .

    ---> 5164c620eaff

    ...

    Step 10/14 : FROM scratch

    --->

    ...

    Successfully built 1a977f4b1cec

    Successfully tagged sample:latest

    ```


    Run the newly created Docker image using the following command:


    ```

    docker run sample:latest

    ```


    You will get output that looks like the following:


    ```

    2022/07/09 10:06:42 Hello, from inside Docker image

    2022/07/09 10:06:42 Build using Go version  go1.18.2

    ```


    The sample Dockerfile uses the scratch image, as shown in the following snippet:


    ```

    FROM golang:1.18 as build

    ...

    RUN go build -trimpath -v -a -o sample -ldflags="-w -s"

    RUN useradd -u 12345 normaluser

    FROM scratch

    ...

    ENTRYPOINT ["/sample"]

    ```


    In using the scratch image, you have minimized the attack surface of your container
    because this image does not have a lot of applications installed like other Docker
    images (example: Ubuntu, Debian, etc.).


    ## Summary


    In this chapter, you learned about Docker security. The first thing you looked
    at is seccomp and why it is useful. You looked at the sample code and how to restrict
    a Go application using sec. You looked at setting up libseccomp, which allows
    you to apply restrictions to your application as to what system calls it can make.


    The next thing you looked at using the libseccomp-golang library in your application
    and how to apply system call restrictions inside your code. Applying restriction
    inside code is good, but it will be hard to keep changing this code once it is
    running in production, so you looked at using seccomp profiles when running Docker
    containers.


    Lastly, you looked at a Docker proxy to intercept and understand the communication
    between a Docker client and server. You also dove into the proxy code to understand
    how the proxy works in forwarding requests and responses. Finally, you looked
    briefly at the best way to reduce container attack surface by writing a Dockerfile
    to use the scratch base image.


    # Part III: Application Security


    # 7. Gosec and AST


    In this chapter, you will look at AST (abstract syntax tree) and learn what it
    is about and why it is useful. You will learn AST by looking at the different
    examples in this chapter to understand the conversion of Go source code to AST.
    You will also learn about an open source security code analysis tool called gosec.
    This tool uses AST to perform code static analysis and you will see how this is
    performed by the tool.


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.'
