- fmt: '### Dump Example


    In this section, you will take a look at an open source project named `GoPlay`,
    which is hosted at [`https://github.com/n4ss/GoPlay`](https://github.com/n4ss/GoPlay).
    It can also be found inside the `chapter2/GoPlay` directory. This is a simple
    app that dumps the contents of a Go ELF executable file. You will look at how
    the application uses the Go library to read the ELF file.


    Compile the `GoPlay` application to create an executable using the following command:


    ```

    go build main.go

    ```


    Now compile `GoPlay` and run it as follows:


    ```

    ./goplay -action=dump -filename=./goplay

    ```


    You are instructing `GoPlay` to dump the contents of the `goplay` executable,
    which will give you output something like the following:


    ```

    Tracing program : "[path]goplay".

    Action : "dump".

    DynStrings:

    Symbols:

    go.go

    runtime.text

    cmpbody

    countbody

    memeqbody

    indexbody

    indexbytebody

    gogo

    callRet

    gosave_systemstack_switch

    setg_gcc

    aeshashbody

    debugCall32

    debugCall64

    ....

    runtime.(*cpuProfile).addNonGo

    ....

    _cgo_init

    runtime.mainPC

    go.itab.syscall.Errno,error

    runtime.defaultGOROOT.str

    runtime.buildVersion.str

    type.*

    runtime.textsectionmap

    ....

    ```


    Let’s start analyzing how the code works and what system calls it is using to
    get what information out from the executable file.


    ```

    func main() {

    ....

    file, err := os.Stat(*filename)

    ....

    f, err := os.Open(*filename)

    ....

    switch *action {

    ....

    case "dump": os.Exit(dump_elf(*filename))

    }

    } else {

    goto Usage

    }

    ....

    }

    ```


    On startup, the application uses the `os.Stat` system call to check whether the
    executable file specified as the parameter exists and opens it using `os.Open`
    if it does exist. Once open, it will use the function `dump_elf(..)` to dump the
    file contents. The following is a snippet of the function:


    ```

    func dump_elf(filename string) int {

    file, err := elf.Open(filename)

    if err != nil {

    fmt.Printf("Couldn''t open file : \"%s\" as an ELF.\n")

    return 2

    }

    dump_dynstr(file)

    dump_symbols(file)

    return 0

    }

    ```


    The function uses another system call named `elf.Open`, which is available inside
    the `debug/elf` package. This is similar to the `os.Open` function but with the
    additional functionality that the opened file is prepared to be read as an ELF
    file. On returning from calling `elf.Open`, the returned `file` variable will
    be populated with information about the internals of the ELF file.


    Once the file is open, it calls `dump_symbols` to dump the file contents. The
    `dump_symbols` function dumps all symbols information from the file, which is
    made available by calling the `file.Symbols()` function. The application just
    prints the `Name` field.


    ```

    func dump_symbols(file *elf.File) {

    fmt.Printf("Symbols:\n")

    symbols, _ := file.Symbols()

    for _, e := range symbols {

    if !strings.EqualFold(e.Name, "") {

    fmt.Printf("\t%s\n", e.Name)

    }

    }

    }

    ```


    The following is the struct definition of the `Symbol` struct. As you can see,
    it contains useful information.


    ```

    type Symbol struct {

    Name        string

    Info, Other byte

    Section     SectionIndex

    Value, Size uint64

    // Version and Library are present only for the dynamic symbol

    // table.

    Version string

    Library string

    }

    ```


    The other function called to dump ELF information is `dump_dynstr`:


    ```

    func dump_dynstr(file *elf.File) {

    fmt.Printf("DynStrings:\n")

    dynstrs, _ := file.DynString(elf.DT_NEEDED)

    ...

    dynstrs, _ = file.DynString(elf.DT_SONAME)

    ...

    dynstrs, _ = file.DynString(elf.DT_RPATH)

    ...

    dynstrs, _ = file.DynString(elf.DT_RUNPATH)

    ...

    }

    ```


    This function is used to obtain certain parts of the ELF file, which are passed
    as parameters when calling the `file.DynString` function. For example, when calling


    ```

    dynstrs, _ = file.DynString(elf.DT_SONAME)

    ```


    the code will get information about the shared library name of the file.


    ## /sys Filesystem


    In this section, you will look at a different way of reading system-level information.
    You will not use a function to read system information; rather, you will use system
    directories that are made available by the operating system for user applications.


    The directory that you want to read is the `/sys` directory, which is a virtual
    filesystem containing device drivers, device information, and other kernel features.
    Figure [2-4](#527551_1_En_2_Chapter.xhtml#Fig4) shows what the `/sys` directory
    contains on a Linux machine.


    ![](images/527551_1_En_2_Chapter/527551_1_En_2_Fig4_HTML.jpg)


    A screenshot of the code of a system directory representing the month name with
    root values. Different files listed are block, bus, class, dev, devices, firmware,
    fs, hypervisor, kernel, and module.


    Figure 2-4


    Inside the `/sys` directory


    ### Reading AppArmor


    Some of the information that is provided by Linux inside the `/sys` directory
    is related to AppArmor (short for Application Armor). What is AppArmor? It is
    a kernel security module that gives system administrators the ability to restrict
    application capabilities with a profile. This gives system administrators the
    power to select which resources a particular application can have access to. For
    example, a system administrator can define Application A to have network access
    or raw socket access, while Application B does not have access to network capabilities.


    Let’s look at an example application to read AppArmor information from the `/sys`
    filesystem, specifically whether AppArmor is enabled and whether it is enforced.
    The following is the sample code that can be found inside the `chapter2/apparmor`
    directory:


    ```

    import (

    "fmt"

    ...

    )

    const (

    appArmorEnabledPath = "/sys/module/apparmor/parameters/enabled"

    appArmorModePath    = "/sys/module/apparmor/parameters/mode"

    )

    func appArmorMode() (mode string) {

    content, err := ioutil.ReadFile(appArmorModePath)

    ...

    return strings.TrimSpace(string(content))

    }

    func appArmorEnabled() (support bool) {

    content, err := ioutil.ReadFile(appArmorEnabledPath)

    ...

    return strings.TrimSpace(string(content)) == "Y"

    }

    func main() {

    fmt.Println("AppArmor mode : ", appArmorMode())

    fmt.Println("AppArmor is enabled : ", appArmorEnabled())

    }

    ```


    Since the code is accessing a system filesystem, you must run it using root. Compile
    the code and run it as follows:


    ```

    sudo ./apparmor

    ```


    The code reads the information from the directory using the standard library `ioUtil.ReadFile`,
    which is just like reading a file, so it’s simpler than using the function calls
    that you looked at in the previous sections.


    ## Summary


    In this chapter, you looked at using system calls to interface with the operating
    system. You looked at using the `syscall` standard library that provides a lot
    of function calls to interface with the operating system and wrote a sample application
    to print out disk space information. You looked at how the `debug/elf` standard
    library is used to read Go ELF file information. Lastly, you looked at the `/sys`
    filesystem to extract information that you want to read to understand whether
    the operating system supports AppArmor.


    # 3. Accessing proc File System


    In Chapter [2](#527551_1_En_2_Chapter.xhtml), you looked at the `/sys` filesystem
    in Linux and wrote a simple app to extract information from it. In this chapter,
    you are going to take a look at another system directory called `/proc`. The `/proc`
    directory is also known as `procfs`, and it contains useful information about
    processes that are currently running. The kernel uses it as an information center
    for all related processes.


    In this chapter, you will learn how to do the following:


    * Look at the different information available inside `procfs`

    * Write an application to read `procfs`

    * Use an open source library to interface with `procfs`


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.'
