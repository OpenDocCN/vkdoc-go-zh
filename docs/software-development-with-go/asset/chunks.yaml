    \ map[string][]string) ([]string, error) {\n...\nbaseCmd := formatNmapOptionsToString(portScanConf)\n\
    listenIPPorts := []string{}\nfor ip, ports := range scanDestIPPorts {\n...\nscanner,\
    \ err := nmap.NewScanner(nmap.WithBinaryPath(portScanConf.ScannerBinPath))\n...\n\
    return listenIPPorts, nil\n}\n```\n\nThe code uses the open source `nmap` library\
    \ from `github.com/Ullaakut/nmap` to perform the scanning operation. Before getting\
    \ into the details on how `nmap` is performed in the library, let’s get an understanding\
    \ of what `nmap` is first. The tool `nmap` is a command-line tool that is used\
    \ for network exploration and security auditing. It is used for gathering real-time\
    \ information about the network, detecting which ports are open in a network environment,\
    \ checking which IP addresses are activated in the network, and more.\n\nMake\
    \ sure you have the `nmap` tool installed on your local machine. If you are using\
    \ a Debian-based Linux distro, use the following command to install it:\n\n```\n\
    sudo apt install nmap\n```\n\nRun `nmap` to check if you can run it successfully.\n\
    \n```\nnmap\n```\n\nYou get output that looks like the following:\n\n```\nNmap\
    \ 7.80 ( https://nmap.org )\nUsage: nmap [Scan Type(s)] [Options] {target specification}\n\
    TARGET SPECIFICATION:\n...\nHOST DISCOVERY:\n...\nSCAN TECHNIQUES:\n...\nEXAMPLES:\n\
    nmap -v -A scanme.nmap.org\nnmap -v -sn 192.168.0.0/16 10.0.0.0/8\nnmap -v -iR\
    \ 10000 -Pn -p 80\n```\n\nLet’s take a look at the sample code that is provided\
    \ inside the `chapter13/nmap` directory and run it as follows:\n\n```\ngo run\
    \ main.go\n```\n\nThe application runs and scans your local machine for an open\
    \ port. On my machine, the output looks like the following:\n\n```\nHost \"127.0.0.1\"\
    :\nPort 22/tcp open ssh\nPort 631/tcp open ipp\nPort 5432/tcp open postgresql\n\
    Nmap done: 1 hosts up scanned in 0.020000 seconds\n```\n\nThe code detects three\
    \ open ports, which are related to the `ssh`, `ipp`, and `postgresql` applications.\
    \ You will get different results depending on what ports are open on your local\
    \ machine.\n\nThe code snippet that uses the `nmap` library is as follows:\n\n\
    ```\npackage main\nimport (\n...\n\"github.com/Ullaakut/nmap/v2\"\n)\nfunc main()\
    \ {\n...\nscanner, err := nmap.NewScanner(\nnmap.WithTargets(\"localhost\"),\n\
    nmap.WithContext(ctx),\n)\n...\n}\n```\n\nThe sample code initializes the library\
    \ by calling `nmap.NewScanner(..)`. Inside the function, the initialization code\
    \ checks to ensure that the `nmap` tool is installed, as shown in the following\
    \ code snippet:\n\n```\nfunc NewScanner(options ...Option) (*Scanner, error) {\n\
    ...\nif scanner.binaryPath == \"\" {\nvar err error\nscanner.binaryPath, err =\
    \ exec.LookPath(\"nmap\")\nif err != nil {\nreturn nil, ErrNmapNotInstalled\n\
    }\n}\n...\nreturn scanner, nil\n}\n```\n\nThe function uses the Go `os/exec` package\
    \ to check for the existence of the `nmap` tool. Once the library has been initialized\
    \ successfully, it calls the `Run()` function to perform the scan operation.\n\
    \n```\npackage main\nimport (\n...\n\"github.com/Ullaakut/nmap/v2\"\n)\nfunc main()\
    \ {\n...\nresult, warnings, err := scanner.Run()\n...\n}\n```\n\nThe library `Run()`\
    \ function performs the following tasks:\n\n*   Executes the `nmap` tool with\
    \ the provided parameters\n*   Executes the Go routine to wait for the result\
    \ from the `nmap` tool that will be parsed and converted into a struct that will\
    \ be returned to the caller"
