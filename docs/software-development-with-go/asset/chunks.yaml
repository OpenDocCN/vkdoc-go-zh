    \n# 18. cAdvisor\n\nIn this chapter, you will look at an open source project called\
    \ cAdvisor, which stands for Container Advisor. The complete source code can be\
    \ found at [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor).\
    \ This chapter uses version v0.39.3 of the project. The project is used to collect\
    \ resource usage and performance data on running containers. cAdvisor supports\
    \ Docker containers, and this is specifically what you are going to look at in\
    \ this chapter.\n\nThe reason for choosing this project is to explore further\
    \ the topics we discussed in previous chapters, such as\n\n* Using system calls\
    \ to monitor filesystem\n\n* Using cgroups\n\n* Collecting machine information\
    \ using `/proc` and `/sys`\n\n## Source Code\n\nThe source code for this chapter\
    \ is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
    \ repository.\n\n## Running cAdvisor\n\nThis section walks through how to check\
    \ out cAdvisor source code to run it locally. Let’s start by checking out the\
    \ code using the following command:\n\n```\nGO111MODULE=off go get github.com/google/cadvisor\n\
    ```\n\nThe command uses the `go get` command to download the source code from\
    \ the given URL. The environment `GO111MODULE=off` tells the `go` tool to get\
    \ the module (`google/cadvisor`) and store it in the `GOPATH` directory. Once\
