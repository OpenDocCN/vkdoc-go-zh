    rt_sigreturn\", \"mkdirat\", \"write\",\n}\n...\n)\n```\n\n这从列表中移除了 `getcwd`。现在运行该应用程序。您将得到如下错误：\n\
    \n```\n...\n2022/07/05 22:53:06 Failed getting current working directory: invalid\
    \ argument -\n```\n\n代码无法进行获取当前工作目录的系统调用，并返回一个错误。您可以看到，从列表中移除注册的系统调用会阻止应用程序正常运行。在下一节中，您将了解如何为使用\
    \ Docker 作为容器运行的应用程序使用 `seccomp`。\n"
- fmt: '## Docker seccomp


    Docker provides seccomp security for applications running in a container without
    having to add security inside the code. This is done by specifying the seccomp
    file when running the container. Open the file `chapter6/dockerseccomp/seccomp.json`
    to see what it looks like:


    ```

    {

    "defaultAction": "SCMP_ACT_ERRNO",

    "architectures": [

    "SCMP_ARCH_X86_64"

    ],

    "syscalls": [

    {

    "names": [

    "arch_prctl",

    ...

    "getcwd"

    ],

    "action": "SCMP_ACT_ALLOW"

    }

    ]

    }

    ```


    The `syscalls` section outlines the different system calls that are permitted
    inside the container. Let’s build a docker container using the `Dockerfile` inside
    the `chapter6/dockerseccomp` directory. Open your terminal and change the directory
    to `chapter6/dockerseccomp` and run the following command:


    ```

    docker build -t docker-seccomp:latest -f Dockerfile .

    ```


    This will build the sample `main.go` inside that directory and package it into
    a container. Executing `docker images` shows the following image from your local
    repository:


    ```

    REPOSITORY                 TAG           IMAGE ID      CREATED          SIZE

    ...

    docker-seccomp             latest        4cebeb0b7fce   47 hours ago     21.3MB

    ...

    gcr.io/distroless/base-debian10   latest a5880de4abab   52 years ago    19.2MB

    ```


    You now have container called `docker-seccomp`. Test the container by running
    it as follows:


    ```

    docker run  docker-seccomp:latest

    ```


    You will get the same output as when you run the sample in a terminal:


    ```

    2022/07/07 12:04:12 Starting app

    2022/07/07 12:04:12 Directory /tmp/QPRNrGAA created successfully

    2022/07/07 12:04:12 Trying to get current working directory

    2022/07/07 12:04:12 Current working directory is: /

    ```


    The container works as expected, which is great. Now let’s add some restrictions
    into the container for the app using seccomp. To run a container with a seccomp
    restriction, use the following command. In this example, the seccomp file is `chapter6/dockerseccomp/seccomp.json`.
    Open terminal and run the following command:


    ```

    docker run --security-opt="no-new-privileges" --security-opt seccomp=/dockerseccomp/seccomp.json
    docker-seccomp:latest

    ```


    This will execute the container and you will get the same output as previously.
    The reason why you are able to run the container without any problem even after
    adding seccomp is because the `seccomp.json` contains all the necessary permitted
    syscalls for the container.


    Let’s remove some syscalls from `seccomp.json`. You have another file called `problem_seccomp.json`
    that has removed `mkdirat` and `getcwd` from the allowable syscall list. Run the
    following from your terminal:


    ```

    docker run --security-opt="no-new-privileges" --security-opt seccomp=/dockerseccomp/problem_seccomp.json
    docker-seccomp:latest

    ```


    The container will not run successfully, and you will get the following output:


    ```

    2022/07/07 12:12:18 Starting app

    2022/07/07 12:12:18 Failed creating directory: operation not permitted

    ```


    You have successfully run the container, applying restricted syscalls for the
    application.


    In the next section, you will look at building a Docker proxy to listen to the
    Docker communication to understand how Docker actually works in terms of receiving
    a command and responding to it.


    ## Docker Proxy


    Docker comprises two main components: the client tool, which is normally called
    `docker` when you run from your terminal, and the server where it runs as a server/daemon
    and listens for incoming commands. The Docker client communicates with the server
    using what is known as socket, which is an endpoint that passes data between different
    processes. Docker uses what is known as a non-networked socket, which is mostly
    used for local machine communication and is called a Unix domain socket (or IPC
    socket).


    Docker by default uses Unix socket `/var/run/docker.sock` to communicate between
    client and server, as shown in Figure 6-1.


    ![](images/527551_1_En_6_Chapter/527551_1_En_6_Fig1_HTML.jpg)


    A flow diagram of a docker communication includes a docker client, docker daemon,
    and local registry.


    **Figure 6-1** Docker communication `/var/run/docker.sock`


    In this section, you will look at sample code of how to intercept the communication
    between Docker client and server. You will step through the code to understand
    what it is actually doing and how it is performed. The code is inside the `chapter6/docker-proxy`
    directory. Run it on your terminal as follows:


    ```

    go run main.go

    ```


    You will get the following output when it runs successfully:


    ```

    2022/07/09 11:59:04 Listening on /tmp/docker.sock for Docker commands

    ```


    The proxy is now ready and listening on `/tmp/docker.sock` for messages to use
    Docker so that it goes through the proxy and sets the `DOCKER_HOST` environment
    variable. The `DOCKER_HOST` variable is used by the Docker command line tool to
    know which Unix socket to use to send the commands.


    For example, to use the proxy to print out the list of running containers, use
    the following command on your terminal:


    ```

    DOCKER_HOST=unix:///tmp/docker.sock docker ps

    ```


    On the terminal that is running the proxy, you will see the Docker output in JSON
    format. On my local machine, the output look as follows:


    ```

    2022/07/09 16:33:02 [Request] : HEAD /_ping HTTP/1.1

    Host: docker

    User-Agent: Docker-Client/20.10.9 (linux)

    2022/07/09 16:33:02 [Request] : GET /v1.41/containers/json HTTP/1.1

    Host: docker

    User-Agent: Docker-Client/20.10.9 (linux)

    2022/07/09 16:33:02 [Response] : [

    {

    "Id": "56f68f7cafb7e5f8b1b1f6263ac6b26f4d47b7a06536842212d577ddf1910a11",

    "Names": [

    "/redis"

    ],

    "Image": "redis",

    "ImageID": "sha256:bba24acba395b778d9522a1adf5f0d6bba3e6094b2d298e71ab08828b880a01b",

    "Command": "docker-entrypoint.sh redis-server",

    "Created": 1657331859,

    ...

    },

    {

    "Id": "2ab2942c2591dcd8eba883a1d57f1183a1d99bafb60be8f17edf8794e9295e53",

    "Names": [

    "/postgres"

    ],

    "Image": "postgres",

    "ImageID": "sha256:1ee973e26c6564a04b427993f47091cd3ae4d5156fbd46d331b17a8e7ab45d39",

    "Command": "docker-entrypoint.sh postgres",

    "Created": 1657331853,

    ...

    }

    ]

    ```


    The proxy prints out the request from the Docker client and the response from
    the Docker server into the console. The Docker command line still prints out as
    normal and the output look as follows:


    ```

    CONTAINER ID   IMAGE      COMMAND                  CREATED       STATUS       PORTS                                       NAMES

    56f68f7cafb7   redis      "docker-entrypoint.s..."   4 hours ago   Up 4 hours   0.0.0.0:6379->6379/tcp,
    :::6379->6379/tcp   redis

    2ab2942c2591   postgres   "docker-entrypoint.s..."   4 hours ago   Up 4 hours   0.0.0.0:5432->5432/tcp,
    :::5432->5432/tcp   postgres

    ```


    As you can see, the response that the Docker client receives is in the JSON format
    and it contains a lot of information. Now let’s dig into the code to understand
    how things work internally.


    Figure 6-2 shows the command flow from client to proxy to Docker server. The communication
    from the Docker client passes through the proxy before reaching the Docker daemon.


    ![](images/527551_1_En_6_Chapter/527551_1_En_6_Fig2_HTML.jpg)


    A flow diagram of a docker communication includes a docker client, docker proxy,
    docker daemon, and local registry.


    **Figure 6-2**'
