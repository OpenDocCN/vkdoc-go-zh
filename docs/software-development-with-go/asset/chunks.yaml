    ## Using the procfs Library


    You now understood what kind of information available inside the `/proc` directory
    and you’ve also seen how to write code and parse the information. In this section,
    you are going to take a look at an open source library that provides access to
    different information available in the `/proc` directory. The project can be found
    at [`https://github.com/jandre/procfs`](https://github.com/jandre/procfs).


    ### Code Sample


    Open your terminal and change to the `chapter3/jandreprocfs` directory and run
    the code using the following command:


    ```

    go run main.go

    ```


    You will see output that looks like Figure [3-2](#527551_1_En_3_Chapter.xhtml#Fig2).


    ![](images/527551_1_En_3_Chapter/527551_1_En_3_Fig2_HTML.jpg)


    A screenshot of the output of the code on a dark screen with the address slash
    home slash Nanik.


    **Figure 3-2.** Output running `procfs` sample code


    The following code snippet uses the `jandre/procfs` library to read the information:


    ```

    package main

    import (

    "github.com/jandre/procfs"

    ...

    )

    func main() {

    processes, _ := procfs.Processes(false)

    table := tablewriter.NewWriter(os.Stdout)

    for _, p := range processes {

    table.Append([]string{strconv.Itoa(p.Pid), p.Exe, p.Cwd})

    }

    table.Render()

    }

    ```


    The sample code is simpler than the previous code that you looked at in the previous
    sections. It uses the `procfs.Processes(..)` function call to obtain all the current
    processes.


    ### Inside the procfs Library


    Let’s take a look a bit deeper into the library to investigate what exactly it
    is doing. You are going to dive into the following `procfs.Processes(..)` function
    call. The `Processes` function call inside the library looks like the following:


    ```

    func Processes(lazy bool) (map[int]*Process, error) {

    ...

    files, err := ioutil.ReadDir("/proc")

    if err != nil {

    return nil, err

    }

    ...

    fetch := func(pid int) {

    proc, err := NewProcess(pid, lazy)

    if err != nil {

    ...

    done  0; {

    proc := <-done

    todo--

    if proc != nil {

    processes[proc.Pid] = proc

    }

    }

    return processes, nil

    }

    ```


    At a high level, Figure [3-3](#527551_1_En_3_Chapter.xhtml#Fig3) shows what the
    function is actually doing.


    ![](images/527551_1_En_3_Chapter/527551_1_En_3_Fig3_HTML.jpg)


    A flow diagram of the main dot go passes processes function is divided into 3
    functions named fetch P I D and connected with the help of synchronous and asynchronous
    parallel to done processes.


    **Figure 3-3.** `Processes(..)` function flow


    The function reads processes information from the `/proc` directory, and it traverses
    through it by reading each process information in a separate Go routine that calls
    the `fetch(pid)` function. The function extracts and parses information of the
    process id that it is assigned. Once collected, it passes into the channel that
    the `Processes(..)` function is waiting on; in this case, it is called the `done`
    channel.


    All the heavy lifting of opening and traversing through the `/proc` directory
    including parsing the results is taken care of by the library. The application
    can just focus on the output that it receives.


    ## Summary


    In this chapter, you looked at the `/proc` file system and learned about the system
    information that applications have access to. You looked at sample code to read
    information from inside the `/proc` directory that is related to the network and
    memory on the device. You also learned that the bulk of the code that needs to
    be written when extracting system information is in terms of reading and parsing
    the information. You also looked at an open source library that can provide functionality
    in reading the `/proc` directory that performs all the heavy lifting, leaving
    you to focus on writing simpler code to read all the system information that you
    need.


