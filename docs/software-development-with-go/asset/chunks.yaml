    # Part I System Programming


    # Chapter 1: System Calls


    Linux provides a lot of features and provides applications access to everything
    that the operating system has access to. When discussing system calls, most people
    will turn their attention to using C because it is the most common language to
    use when interfacing with the operating system.


    In this chapter, you will explore what system calls are and how you can program
    in Go to make system calls. By the end of this chapter, you will have learned
    the following:


    *   What a system call looks like in C

    *   Understanding the `sys/unix` Go package

    *   Exploring a project using system calls


    If you are using Go for the first time, refer to the online documentation at [`https://go.dev/doc/install`](https://go.dev/doc/install).
    The online documentation will walk you through the steps to install Go on your
    local computer. Go through the Go tutorial that the Go documentation provides
    at [`https://go.dev/doc/`](https://go.dev/doc/).


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ## What Is a System Call?


    A system call is the interface provided by the underlying operating system that
    your application is currently running on. Using this interface, your application
    can communicate with the operating system to perform an operation. In general,
    the operating system provides numerous services that applications can take advantage
    of.


    Figure [1-1](#527551_1_En_1_Chapter.xhtml#Fig1) shows at a high level how an application
    uses system calls to request some service operation to the operating system. The
    user app will make a call to the provided system library, which in this case is
    the Go library, and it will call the operating system service through the provided
    interface. Data transfer flows in both directions for the different components.


    ![](images/527551_1_En_1_Chapter/527551_1_En_1_Fig1_HTML.jpg)


    A block diagram of the Linux operating system includes the user app being connected
    to the system library in the user space that gives service in the kernel space.


    **Figure 1-1** High-level view of a system call


    Operating systems provide a large number of system calls that applications can
    use. Figure [1-2](#527551_1_En_1_Chapter.xhtml#Fig2) shows a snapshot list of
    system calls. For a complete available Linux system call list, you can visit [`https://man7.org/linux/man-pages/man2/syscalls.2.xhtml`](https://man7.org/linux/man-pages/man2/syscalls.2.xhtml).


    ![](images/527551_1_En_1_Chapter/527551_1_En_1_Fig2_HTML.jpg)


    A screenshot lists the system calls available at kernel 5.11 in 3 columns as system
    call, kernel, and its notes. There are a total of 13 kernel versions.


    **Figure 1-2** Snapshot of a Linux system call'
