    \ and run the code as follows:\n\n```\ngo run main.go\n```\n\nYou will get output\
    \ like the following:\n\n```\n2022/07/26 20:40:20 ....Starting serviceB\n2022/07/26\
    \ 20:40:21 ....Done with serviceB\n2022/07/26 20:40:21 ..Starting serviceA\n2022/07/26\
    \ 20:40:23 ..Done with serviceA\n```\n\nSince the code is running inside a goroutine,\
    \ the output sequence printed on your console will vary; however, the service\
    \ will be run correctly. The following code shows the code that runs the service\
    \ as a goroutine:\n\n```\nfunc main() {\n\tserviceBDone := make(chan bool, 1)\n\
    \talldone := make(chan bool, 1)\n\tgo serviceB(serviceBDone)\n\tgo serviceA(serviceBDone,\
