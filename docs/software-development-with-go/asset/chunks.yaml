    ### SQLite


    In this section, you will learn how to use SQLite databases. In particular, you
    will learn how to use the sqlite3 library to read and write databases.


    SQLite is a lightweight and self-contained SQL database that allows applications
    to read and store information. Applications use normal SQL syntax to perform different
    kinds of data manipulation such as inserting, updating, and deleting data. The
    lightweight and portable nature of SQLite makes it an attractive proposition to
    use in a project that doesn''t require a centralized database. Mobile phones such
    as Android use SQLite databases that applications can use for their mobile apps.


    Internally, Vuls uses SQLite extensively for storing data that it downloads from
    different sources. You will look at sample applications using SQLite. Sample code
    for this section can be found inside the `chapter13/sqlite` directory. Let’s run
