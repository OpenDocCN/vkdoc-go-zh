- fmt: '## `uiprogress`


    In this section, you will look at the `uiprogress` library, which is hosted at
    [`https://github.com/gosuri/uiprogress`](https://github.com/gosuri/uiprogress).
    The library provides a progress bar user interface, as shown in Figure [16-1](#527551_1_En_16_Chapter.xhtml#Fig1).
    The application uses the library to create a progress bar as a feedback mechanism
    to show that an operation is currently in progress.


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig1_HTML.jpg)


    *A screenshot of the output screen. The text reads app deployment started app
    1 and app 2. app 1 starts from 4s and goes to 86 percent and app 2 starts from
    4s and goes to 100 percent.*


    **Figure 16-1** — `uiprogress` progress bar


    Check the project out from GitHub to your local environment and run the sample
    application that is provided inside the `example/simple` directory.


    ```

    go run main.go

    ```


    The output is shown in Figure [16-2](#527551_1_En_16_Chapter.xhtml#Fig2).


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig2_HTML.jpg)


    *A screenshot of the output screen. The text reads 1s 84 percent.*


    **Figure 16-2** — Progress bar output from `simple.go`


    The sample code is quite simple.


    ```

    func main() {

    uiprogress.Start()            // start rendering

    bar := uiprogress.AddBar(100) // Add a new bar

    // optionally, append and prepend completion and elapsed time

    bar.AppendCompleted()

    bar.PrependElapsed()

    for bar.Incr() {

    time.Sleep(time.Millisecond * 20)

    }

    }

    ```


    ### Code Flow


    You will use this sample application as the basis to do a walk-through of the
    library. Figure [16-3](#527551_1_En_16_Chapter.xhtml#Fig3) shows how the application
    interacts with the library and shows what is actually happening behind the scenes
    inside the library.


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig3_HTML.jpg)


    *A flow diagram of a code starts from `simple.go` and divided into 5 factors named
    to start, add a bar, append completed, prepend elapsed, and Inc to bars, print,
    and listen with the help of append and loop.*


    **Figure 16-3** — Code flow from `simple.go` to the library


    Let’s walk through the diagram to understand what’s happening. The first thing
    the app does is call the `Start()` function. This is to initialize the internals
    of the library. The function spins off a goroutine and calls the `Listen()` function,
    which reside inside the `progress.go` file shown here:


    ```

    func (p *Progress) Listen() {

    for {

    p.mtx.Lock()

    interval := p.RefreshInterval

    p.mtx.Unlock()

    select {

    case <-time.After(interval):

    p.print()

    case <-p.tdone:

    p.print()

    close(p.tdone)

    return

    }

    }

    }

    ```


    The function is in a `for{}` loop and calls the `print()` function at an interval
    that has been set at the default of 10 milliseconds.


    Upon completing the `Start()` function, the sample app calls the `AddBar()` function
    to create a new progress bar that will be shown to the user. The library can process
    multiple progress bar at the same time, so any new bar created will be stored
    in the `Bars` slice, as shown:


    ```

    func (p *Progress) AddBar(total int) *Bar {

    ...

    bar := NewBar(total)

    bar.Width = p.Width

    p.Bars = append(p.Bars, bar)

    ...

    }

    ```


    ### Updating Progress


    Upon expiry of the 10 milliseconds interval, the library updates each of the registered
    progress bars using the `print()` function running in the background. The code
    snippet of running the `print()` function is as follows:


    ```

    func (p *Progress) print() {

    ...

    for _, bar := range p.Bars {

    fmt.Fprintln(p.lw, bar.String())

    }

    ...

    }

    ```


    The `print()` function loops through the `Bars` slice and calls the `String()`
    function, which in turn calls the `Bytes()` function. The `Bytes()` function performs
    calculations to get the correct value for the progress bar and prints this with
    a suffix and prefix.


    ```

    func (b *Bar) Bytes() []byte {

    completedWidth := int(float64(b.Width) * (b.CompletedPercent() / 100.00))

    for i := 0; i  0 && completedWidth < b.Width {

    pb[completedWidth-1] = b.Head

    }

    ...

    return pb

    }

    ```


    The function calls `AppendCompleted()` and `PrependElapsed()` are used to define
    the following:


    *   `AppendCompleted()` adds a function that will print out the percentage completed
    when the progress bar has completed its operation.


    *   `PrependElapsed()` prefixes the progress bar with the time it has taken to
    complete so far.


    ```

    func (b *Bar) AppendCompleted() *Bar {

    b.AppendFunc(func(b *Bar) string {

    return b.CompletedPercentString()

    })

    return b

    }

    ```


    ```

    func (b *Bar) PrependElapsed() *Bar {

    b.PrependFunc(func(b *Bar) string {

    return strutil.PadLeft(b.TimeElapsedString(), 5, '' '')

    })

    return b

    }

    ```


    Lastly, the application needs to specify the increment or decrement of the progress
    bar value. In the sample code case, it increments as follows:


    ```

    func main() {

    ...

    for bar.Incr() {

    time.Sleep(time.Millisecond * 20)

    }

    }

    ```


    The code will look as long as the `bar.Incr()` returns `true` and will sleep for
    20 milliseconds before incrementing again.


    From your code perspective, the library takes care of updating and managing the
    progress bar, allowing your application to focus on its main task. All the application
    needs to do is just inform the library about the new value of the bar by calling
    the `Incr()` or `Decr()` function.


    In the next section, you will look at a more comprehensive library that provides
    a better user interface for an application.


    ## `bubbletea`


    In the previous section, you saw the `uiprogress` progress bar library and looked
    at how it works internally. In this section, you will take a look at another user
    interface framework called `bubbletea`. The code can be checked out from [`https://github.com/charmbracelet/bubbletea`](https://github.com/charmbracelet/bubbletea).


    Run the sample application inside the `examples/tui-daemon-combo` folder as follows:


    ```

    go run main.go

    ```


    You will get output that looks like Figure [16-4](#527551_1_En_16_Chapter.xhtml#Fig4).


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig4_HTML.jpg)


    *A screenshot explains the output. The output is five works finished at 817, 727,
    658, 219, and 190-meter seconds.*


    **Figure 16-4** — `tui-daemon-combo` sample output


    The interesting thing about this TUI framework is it provides a variety of user
    interfaces: progress bars, spinners, lists, and more. Figure [16-5](#527551_1_En_16_Chapter.xhtml#Fig5)
    shows the different functions the application must provide in order to use the
    library.


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig5_HTML.jpg)


    *A screenshot explains the three application functions such as `Init`, `Update`,
    and `View`. All three are connected parallel to the Bubble Tea function.*


    **Figure 16-5** — Application functions for `bubbletea` interaction


    In the next few sections, you will use the `tui-daemon-combo` sample code to work
    out how the code flows inside the library.


    Using `bubbletea` is quite straightforward, as shown here:


    ```

    func main() {

    ...

    p := tea.NewProgram(newModel(), opts...)

    if err := p.Start(); err != nil {

    fmt.Println("Error starting Bubble Tea program:", err)

    os.Exit(1)

    }

    }

    ```


    The code calls `tea.NewProgram()`, passing in the `Model` interface and options
    that need to be set. The `Model` interface defined by the library is as follows:


    ```

    type Model interface {

    Init() Cmd

    Update(Msg) (Model, Cmd)

    View() string

    }

    ```


    The `newModel()` function returns the implementation of the `Model` interface,
    which is defined as follows:


    ```

    func (m model) Init() tea.Cmd {

    ...

    }

    func (m model) Update(msg tea.Msg) (tea.Model, tea.Cmd) {

    ...

    }

    func (m model) View() string {

    ...

    }

    ```


    Now you have defined the different functions that will be called by the library
    when constructing and updating the UI. Next, you will look at how each of these
    functions are used by the library.'
