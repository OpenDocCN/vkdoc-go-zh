- fmt: '# Gontainer Project


    So far you have looked at how to create the different things that are required
    to run an application in isolation: namespaces, cgroups and configuring rootfs.
    In this section, you will look at a sample app that will put everything together
    and run an application inside its own namespace. In other words, you are going
    to run the application as a container. The code can be checked out from [`https://github.com/nanikjava/gontainer`](https://github.com/nanikjava/gontainer).


    Make sure you download and extract the rootfs as explained in section "rootFS."
    Once the rootfs has been extracted to your local machine, change the directory
    to the `gotainer` directory and compile the project using the following command:


    ```

    go build

    ```


    Once compiled, you will get an executable called `gotainer`. Run the application
    using the following command:


    ```

    sudo ./gontainer --chrt "[rootfs directory]]" run sh

    ```


    The command will run the `sh` command, which is the native bash command for the
    Alpine distro in a container. Replace `[rootfs directory]` with the directory
    containing the uncompressed Alpine roofs. For example, in my machine, it is `/home/nanik/play/rootfs`.
    The full command for my local machine is:


    ```

    sudo ./gontainer --chrt "/home/nanik/play/rootfs" run sh

    ```


    You will get the prompt `/usr #` and you''ll able to execute any normal Linux
    commands. Figure 4-5 shows some of the commands executed inside gotainer.


    ![](images/527551_1_En_4_Chapter/527551_1_En_4_Fig5_HTML.jpg)


    **Figure 4-5.** Gotainer in action


    Let''s take a look at the code to understand how the whole thing works. There
    is only one file called `gontainer.go`. As you saw earlier, the way you run the
    app is by supplying the argument `run sh`, which is processed by the `main()`
    function shown here:


    ```

    func main() {

    // outline cleanup tasks

    wg.Add(1)

    ...

    // actual program

    switch args[0] {

    case "run":

    go run()

    ...

    }

    ```


    The function `run()` that takes care of running the application specified with
    the parameter `run` is shown here:


    ```

    func run() {

    defer cleanup()

    infof("run as [%d] : running %v", os.Getpid(), args[1:])

    lst := append(append(flagInputs, "child"), args[1:]...)

    infof("running proc/self/exe %v", lst)

    if timeout > 0 {

    ctx, cancel := context.WithTimeout(context.Background(), timeout)

    defer cancel()

    runcmd = exec.CommandContext(ctx, "/proc/self/exe", lst...)

    } else {

    runcmd = exec.Command("/proc/self/exe", lst...)

    }

    runcmd.Stdin = os.Stdin

    runcmd.Stdout = os.Stdout

    runcmd.Stderr = os.Stderr

    runcmd.SysProcAttr = &syscall.SysProcAttr{

    Cloneflags:   syscall.CLONE_NEWUTS | syscall.CLONE_NEWPID | syscall.CLONE_NEWNS,

    Unshareflags: syscall.CLONE_NEWNS,

    }

    runcmd.Run()

    }

    ```


    You can see that the code is using `/proc/self/exe`, so what is this? The Linux
    manual at [`https://man7.org/linux/man-pages/man5/proc.5.xhtml`](https://man7.org/linux/man-pages/man5/proc.5.xhtml)
    says:


    ```

    /proc/self

    When a process accesses this magic symbolic link, it resolves to the process''s
    own /proc/[pid] directory.

    /proc/[pid]/exe

    Under Linux 2.2 and later, this file is a symbolic link containing the actual
    pathname of the executed command. This symbolic link can be dereferenced normally;
    attempting to open it will open the executable.

    ```


    The explanation clearly states that using `/proc/self/exe` means you are spawning
    the currently running app, so this means that the `run()` function is running
    itself as a separate process, passing in the parameter in `lst`.


    The function uses `exec.Command` to run `/proc/self/exe`, passing the variable
    as `lst`, which contains the following command:


    ```

    --chdr /usr --chrt /home/nanik/play/roofs/ --timeout 0s child sh

    ```


    Let''s explore what the arguments passed to the application are telling the application
    to do. The `init()` function declares the following flags that it can receive
    as arguments:


    ```

    func init() {

    pflag.StringVar(&chroot, "chrt", "", "Where to chroot to. Should contain a linux
    filesystem. Alpine is recommended. GONTAINER_FS environment is default if not
    set")

    pflag.StringVar(&chdir, "chdr", "/usr", "Initial chdir executed when running container")

    pflag.DurationVar(&timeout, "timeout", 0, "Timeout before ending program. If 0
    then never ends")

    ...

    infof("flaginputs: %v", flagInputs)

    }

    ```


    Table 4-1 explains the mapping of the argument passed via `lst`.


    **Table 4-1.** Mapping Arguments


    | Format | Explanation |

    | --- | --- |

    | `--chdr /usr` | Initial `chdir` executed when running container |

    | `--chrt /home/nanik/play/roofs/` | Where to `chroot` to |

    | `--timeout 0s` | Timeout before ending program. If 0, then it never ends. |

    | `sh` | The app to run once the rootfs is up and running |


    The only parameter not shown in the table is the `child` parameter, which is not
    processed. The `child` parameter will be processed by the `main()` function by
    executing the function `child()` in goroutine, as shown in the following code
    snippet:


    ```

    func main() {

    // outline cleanup tasks

    ...

    // actual program

    switch args[0] {

    ...

    case "child":

    go child()

    ...

    }

    ```


    The `child()` function does all the heavy lifting of running the new process in
    a container-like environment. The following shows the code of the `child()` function:


    ```

    func child() {

    defer cleanup()

    infof("child as [%d]: chrt: %s,  chdir:%s", os.Getpid(), chroot, chdir)

    infof("running %v", args[1:])

    must(syscall.Sethostname([]byte("container")))

    must(syscall.Chroot(chroot), "error in ''chroot ", chroot+"''")

    syscall.Mkdir(chdir, 0600)

    // initial chdir is necessary so dir pointer is in chroot dir when proc mount
    is called

    must(syscall.Chdir("/"), "error in ''chdir /''")

    must(syscall.Mount("proc", "proc", "proc", 0, ""), "error in proc mount")

    must(syscall.Chdir(chdir), "error in ''chdir ", chdir+"''")

    if timeout > 0 {

    ctx, cancel := context.WithTimeout(context.Background(), timeout+time.Millisecond*50)

    defer cancel()

    cntcmd = exec.CommandContext(ctx, args[1], args[2:]...)

    } else {

    cntcmd = exec.Command(args[1], args[2:]...)

    }

    cntcmd.Stdin = os.Stdin

    ...

    must(cntcmd.Run(), fmt.Sprintf("run %v return error", args[1:]))

    syscall.Unmount("/proc", 0)

    }

    ```


    Table 4-2 explains what each section of code is doing. Ignore the `must` function
    call as this is an internal function call that checks the return value of each
    system call.


    **Table 4-2.** Code Explanations


    | Code | Description |

    | --- | --- |

    | `must(syscall.Sethostname([]byte("container")))` | Specifies the hostname of
    the container |

    | `must(syscall.Chdir("/"), "error in ''chdir /''")` | Performs `chroot` using
    the specific rootfs (in this example, it''s `/home/nanik/play/rootfs`) |

    | `must(syscall.Chdir(chdir), "error in ''chdir ", chdir+"''")` | Changes directory
    to the specified location |

    | `must(cntcmd.Run(), fmt.Sprintf("run %v return error", args[1:]))` | Runs the
    specified argument (in this example, it''s `sh`) |


    The following code snippet specifies to the operating system to use the standard
    in/out and error for the application that is executed:


    ```

    ...

    cntcmd.Stdin = os.Stdin

    cntcmd.Stdout = os.Stdout

    cntcmd.Stderr = os.Stderr

    ...

    ```


    Once `cntcmd.Run()` is completed and the prompt shows up, it means that you are
    running inside the container, isolated from the host operating system.


    ## Summary


    In this chapter, you explored the different parts required to run an application
    inside a container: namespaces, cgroups, and rootfs. You experimented with the
    different available Linux tools to create namespaces and configured resources
    for particular namespaces.


    You also explored rootfs, which is a key component to run the operating system,
    thus allowing applications to run. Finally, you looked at a sample project that
    shows how to use the different components together inside Go by using the Alpine
    rootfs.'
