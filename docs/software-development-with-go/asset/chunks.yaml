- fmt: "### Capturing With BPF\n\n`gopacket` provides the ability to filter network\
    \ traffic that applications are interested in, and this is possible by using BPF.\
    \ BPF stands for Berkeley Packet Filter and it allows an application to attach\
    \ a filter to allow or disallow certain types of data through a socket. More detail\
    \ information can be found at [www.kernel.org/doc/html/latest/networking/filter.xhtml](http://www.kernel.org/doc/html/latest/networking/filter.xhtml).\n\
    \nThe sample code can be found inside the `chapter11/gopacket/http` folder. It\
    \ captures and prints only TCP traffic with a port destination of 80. Compile\
    \ the code as follows:\n\n```\ngo build -o httponly .\n```\n\nRun the code with\
    \ root. Replace `<network_device>` with your local network device.\n\n```\nsudo\
    \ ./httponly -i \n```\n\nAfter a successful run, you will see output that looks\
    \ like the following. You can see that it only prints TCP traffic connecting to\
    \ an external server on port 80.\n\n```\n2022/03/14 17:10:39 Starting capture\
    \ on interface \"enp0s31f6\"\n2022/03/14 17:10:39 reading in packets\n2022/03/14\
    \ 17:10:39 -- Extracted Http Data --\n2022/03/14 17:10:39 Accept text/*\n2022/03/14\
    \ 17:10:39 If-Modified-Since Thu, 20 May 2021 01:37:53 GMT\n2022/03/14 17:10:39\
    \ User-Agent Debian APT-HTTP/1.3 (1.9.4)\n2022/03/14 17:10:39 Cache-Control max-age=0\n\
    2022/03/14 17:10:39 Proto : HTTP/1.1, Host : ppa.launchpad.net, Method : GET,\
    \ URI : ...\n2022/03/14 17:10:39 -------------------------\n2022/03/14 17:10:39\
    \ Received request from stream 192.168.1.6->x.x.x.x 59494->80 : &{GET ...} with\
    \ 0 bytes in request body\n2022/03/14 17:10:40 -- Extracted Http Data --\n2022/03/14\
    \ 17:10:40 Cache-Control max-age=0\n2022/03/14 17:10:40 Accept text/*\n2022/03/14\
    \ 17:10:40 If-Modified-Since Tue, 24 Mar 2020 13:38:15 GMT\n2022/03/14 17:10:40\
    \ User-Agent Debian APT-HTTP/1.3 (1.9.4)\n2022/03/14 17:10:40 Proto : HTTP/1.1,\
    \ Host : ppa.launchpad.net, Method : GET, URI : ...\n2022/03/14 17:10:40 -------------------------\n\
    ...\n```\n\nLet’s take a look at how the code uses BPF to filter the network capture.\
    \ The following snippet shows what you learned in the previous section: how to\
    \ perform packet capture using the `gopacket OpenLive function`:\n\n```\nif *fname\
    \ != \"\" {\n...\n} else {\nlog.Printf(\"Starting capture on interface %q\", *iface)\n\
    handle, err = pcap.OpenLive(*iface, int32(*snaplen), true, pcap.BlockForever)\n\
    }\n...\n```\n\nNext, the code calls the `SetBPFFilter` function to specify the\
    \ network filter that you want to apply.\n\n```\nvar filter = flag.String(\"f\"\
    , \"tcp and dst port 80\", \"BPF filter for pcap\")\n...\nfunc main() {\n...\n\
    if err := handle.SetBPFFilter(*filter); err != nil {\nlog.Fatal(err)\n}\n...\n\
    }\n```\n\nThe `filter` variable contains a simple English-like filter rule, `tcp\
    \ and dst port 80`, which means it is only interested in TCP traffic that is accessing\
    \ port 80. Here is a link to more information about the different filters you\
    \ can write: [www.ibm.com/docs/en/qsip/7.4?topic=queries-berkeley-packet-filters](http://www.ibm.com/docs/en/qsip/7.4%253Ftopic%253Dqueries-berkeley-packet-filters).\n\
    \nThe code specifies the filter that it wants. The next thing it needs to do is\
    \ specify the parser that `gopacket` will use to parse the TCP raw data, and this\
    \ is done by the `httpStreamFactory` struct type, which defines the `New(..)`\
    \ and `run()` function. These two functions are called internally by `gopacket`\
    \ every time there is data available for the application to consume.\n\n```\n\
    type httpStreamFactory struct{}\nfunc (h *httpStreamFactory) New(net, transport\
    \ gopacket.Flow) tcpassembly.Stream {\nhstream := &httpStream{\nnet:       net,\n\
    transport: transport,\nr:         tcpreader.NewReaderStream(),\n}\n...\n}\nfunc\
    \ (h *httpStream) run() {\nbuf := bufio.NewReader(&h.r)\nfor {\n...\n}\n}\n```\n\
    \nThe main job of the `run()` function is to assemble and parsed the raw bytes\
    \ into a more readable format to print out, as shown:\n\n```\nfunc (h *httpStream)\
    \ run() {\nbuf := bufio.NewReader(&h.r)\nfor {\nreq, err := http.ReadRequest(buf)\n\
    if err == io.EOF {\n...\n}\n...\nelse {\nlog.Println(\"-- Extracted Http Data\
    \ --\")\nfor k, v := range req.Header {\nlog.Println(k, v[0])\n}\nlog.Println(fmt.Sprintf(\"\
    Proto : %s, Host : %s, Method : %s, URI : %s \", req.Proto, req.Host, req.Method,\
    \ req.RequestURI))\nlog.Println(\"-------------------------\")\n...\n}\n}\n}\n\
    ```\n\n## Summary\n\nIn this chapter, you learned about capturing raw networks\
    \ using the open source `gopacket` project. The library provides a lot of functionality\
    \ made available through its simple public API. You learned how to write applications\
    \ using the library and use the information provided in the different structures.\n\
    \nYou looked at BPF (Berkeley Packet Filter) and learned to use it inside your\
    \ code to filter network captures using `gopacket`. Using BPF allows an application\
    \ to process only the network capture that it is interested in rather than spending\
    \ time processing all incoming traffic. This makes it easier to develop apps targeted\
    \ for specific traffic.\n\n# 12. Epoll Library\n\nBuilding an application that\
    \ processes a huge amount of network processing requires a special way of handling\
    \ connections in a distributed or cloud environment. Applications running on Linux\
    \ are able to do this thanks to the scalable I/O event notification mechanism\
    \ that was introduced in version 2.5.44. In this chapter, you will look at `epoll`.\
    \ According to the documentation at [https://linux.die.net/man/7/epoll](https://linux.die.net/man/7/epoll),\n\
    \nThe epoll API performs a similar task to [poll](https://man7.org/linux/man-pages/man2/poll.2.xhtml):\
    \ monitoring multiple file descriptors to see if I/O is possible on any of them.\n\
    \nYou will start by looking at what `epoll` is and then move on to writing a simple\
    \ application and finish off looking at the Go `epoll` library and how it works\
    \ and also how to use it in an application.\n\nOn completion of this chapter,\
    \ you will understand the following:\n\n*   How `epoll` works in Linux\n*   How\
    \ to write a Go application to use the `epoll` API\n*   How the `epoll` library\
    \ works\n*   How to write a Go application using the `epoll` library\n\n## Source\
    \ Code\n\nThe source code for this chapter is available from the [https://github.com/Apress/Software-Development-Go](https://github.com/Apress/Software-Development-Go)\
    \ repository."
