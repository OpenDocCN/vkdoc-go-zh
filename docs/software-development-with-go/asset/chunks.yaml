    \n图 8-3  \n访问设置菜单\n\n1. 转到您的 GitHub 仓库（以我的为例，是 `https://github.com/nanikjava`），然后点击右上角的图标，如图\
    \ 8-3 所示，接着点击*设置*菜单进入个人资料页面。\n\n![](img/527551_1_En_8_Fig4_HTML.jpg)\n\n一张展示个人资料页面菜单的截图。这些菜单项包括：软件包、GitHub\
    \ Copilot、页面、已存回复、代码安全与分析、应用程序、开发者设置以及安全与赞助日志。\n\n图 8-4  \n个人资料页面上的菜单\n\n2. 进入图\
    \ 8-4 所示的个人资料页面后，点击*开发者设置*。\n\n![](img/527551_1_En_8_Fig5_HTML.jpg)\n\n一张带有文字“GitHub\
    \ 应用程序、OAuth 应用程序和个人访问令牌”的截图。其中“GitHub 应用程序”选项被高亮显示。\n\n图 8-5  \n应用程序页面\n\n3.\
    \ 您将被带到应用程序页面，如图 8-5 所示。点击*个人访问令牌*链接。\n\n![](img/527551_1_En_8_Fig6_HTML.jpg)\n\
    \n一张个人访问令牌页面的截图，包含三个选项：生成新令牌、删除和撤销所有令牌，并显示过期日期为 2022 年 8 月星期四。\n\n图 8-6  \n令牌页面\n\
    \n4. 进入图 8-6 所示的令牌页面后，点击*生成新令牌*。\n\n![](img/527551_1_En_8_Fig7_HTML.jpg)\n\n一张新的个人访问令牌页面截图，包含备注名称、过期天数以及用于选择个人令牌作用域访问权限的选项。\n\
    \n图 8-7  \n生成新令牌页面\n\n5. 您将看到图 8-7 所示的新个人令牌页面。在*备注*文本框中填写关于该令牌用途的信息，并根据您的需要设置过期时间。最后，在*选择作用域*部分，勾选\
    \ *repo* 复选框；这将自动选择其下的所有其他仓库权限。完成后，向下滚动并点击*生成令牌*按钮。\n\n![](img/527551_1_En_8_Fig8_HTML.jpg)\n\
    \n一张个人访问令牌页面的截图，包含三个选项：生成新令牌、删除和撤销所有令牌，并显示过期日期。\n\n图 8-8  \n令牌成功生成\n\n6. 令牌生成后，您将看到如图\
    \ 8-8 所示的屏幕，上面显示了新令牌。复制该令牌并粘贴到您的编辑器某处，以便在下一节中使用。\n\n在下一节中，您将使用生成的令牌来构建和运行 `Scorecard`。\n\
    \n### 运行 Scorecard\n\n从该项目 GitHub 仓库下载该工具。对于本章，您将使用 `v4.4.0` 版本；其二进制文件可从 `https://github.com/ossf/scorecard/releases/tag/v4.4.0`\
    \ 下载。下载存档文件后，将其解压到您本地机器上的一个目录中。\n\n执行 `Scorecard` 来检查它是否正常工作。\n\n```\n/directory/scorecard\
    \ help\n```\n\n您将在控制台中看到以下输出：\n\n```\nA program that shows security scorecard\
    \ for an open source software.\nUsage:\n./scorecard --repo= [--checks=check1,...]\
    \ [--show-details]\nor ./scorecard --{npm,pypi,rubgems}= [--checks=check1,...]\
    \ [--show-details] [flags]\n./scorecard [command]\n...\nFlags:\n...\nUse \"./scorecard\
    \ [command] --help\" for more information about a command.\n```\n\n现在 `Scorecard`\
    \ 已在您的机器上运行，让我们使用上一节生成的令牌来扫描一个仓库。在本例中，您将扫描 `github.com/ossf/scorecard` 仓库。打开终端并执行以下命令：\n\
    \n```\nGITHUB_AUTH_TOKEN= /directory_of_scorecard/scorecard --repo=github.com/ossf/scorecard\n\
    ```\n\n将 `<github_token>` 替换为您的 GitHub 令牌。该工具运行需要一点时间，因为它正在扫描 GitHub 仓库并执行检查。完成后，您将看到类似图\
    \ 8-9 的输出。\n\n![](img/527551_1_En_8_Fig9_HTML.jpg)\n\n一张 Scorecard 输出结果的截图。一个包含十分制分数、名称、原因以及文档或补救措施的表格。\n\
    \n图 8-9  \nScorecard 输出结果\n\n您已成功运行该工具扫描一个 GitHub 仓库，并获得了最高为 8.0 分的输出结果。分数越高表示该仓库在工具预定义的检查项方面都做得很好。\n\
    \n在下一节中，您将进一步探索该工具，了解其工作原理，并浏览该工具不同部分的代码。\n"
- fmt: '### High-Level Flow


    In this section, you will go in depth to understand what the tool is doing and
    look at code from the different parts of the tool. In digging through the code,
    you will uncover new things that can be used when designing your own application.
    First, let’s take a high-level look at the process of the tool, as shown in Figure
    [8-10](#527551_1_En_8_Chapter.xhtml#Fig10).


    ![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig10_HTML.jpg)


    A flow chart of high-level data includes start, check connections, download scanned
    information, goroutine, collect results, send results, and sort and print results.


    **Figure 8-10** High-level flow


    Use this diagram as a reference when you read the different parts of the application
    along with the code. The first thing that the tool does when it starts up is check
    whether it is able to use the provided token to access GitHub. It is hard-coded
    to test GitHub connectivity by accessing the [`github.com/google/oss-fuzz`](http://github.com/google/oss-fuzz)
    repository (step 2). This is shown in the following code snippet (`checker/client.go`):


    ```

    func GetClients(...) (

    ...

    ) {

    ...

    ossFuzzRepoClient, errOssFuzz := ghrepo.CreateOssFuzzRepoClient(ctx, logger)

    ...

    }

    func CreateOssFuzzRepoClient(ctx context.Context, logger *log.Logger) (clients.RepoClient,
    error) {

    ossFuzzRepo, err := MakeGithubRepo("google/oss-fuzz")

    ...

    return ossFuzzRepoClient, nil

    }

    ```


    The code continues after successfully connecting to the GitHub repository by assigning
    the connection to different GitHub handlers. These handlers use the connection
    to get different information from the repository (step 3) that will be used to
    perform security checks. The code for the handler assignment is as follows (`clients/githubrepo/client.go`):


    ```

    func (client *Client) InitRepo(inputRepo clients.Repo, commitSHA string) error
    {

    ...

    // Sanity check.

    repo, _, err := client.repoClient.Repositories.Get(client.ctx, ghRepo.owner, ghRepo.repo)

    if err != nil {

    return sce.WithMessage(sce.ErrRepoUnreachable, err.Error())

    }

    client.repo = repo

    client.repourl = &repoURL{

    owner:         repo.Owner.GetLogin(),

    ...

    commitSHA:     commitSHA,

    }

    client.tarball.init(client.ctx, client.repo, commitSHA)

    // Setup GraphQL.

    client.graphClient.init(client.ctx, client.repourl)

    client.contributors.init(client.ctx, client.repourl)

    ...

    client.webhook.init(client.ctx, client.repourl)

    client.languages.init(client.ctx, client.repourl)

    return nil

    }

    ```


    Figure [8-11](#527551_1_En_8_Chapter.xhtml#Fig11) outlines the subset of GitHub
    handlers that use the different GitHub connections.


    ![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig11_HTML.jpg)


    A flowchart of GitHub connections has three handlers such as release, branches,
    workflow connects parallel with GitHub 1 and 4 clients.


    **Figure 8-11** GitHub handlers using GitHub connections


    Once the handlers are initialized successfully with the GitHub connections, the
    main part of the tool kicks in (step 4). The tool spawns a goroutine that executes
    the security checks one by one using the information that is downloaded using
    the GitHub connection. The code that executes the goroutine is as follows (`pkg/scorecard.go`):


    ```

    func RunScorecards(ctx context.Context,

    ...

    ) (ScorecardResult, error) {

    ...

    resultsCh := make(chan checker.CheckResult)

    go runEnabledChecks(ctx, repo, &ret.RawResults, checksToRun, repoClient, ossFuzzRepoClient,

    ciiClient, vulnsClient, resultsCh)

    ...

    return ret, nil

    }

    ```


    Figure [8-12](#527551_1_En_8_Chapter.xhtml#Fig12) shows a subset of different
    security checks that are performed on the GitHub repository.


    ![](images/527551_1_En_8_Chapter/527551_1_En_8_Fig12_HTML.jpg)


    A flowchart of security checks includes binary artifacts, branch protection, check
    contributors, and dangerous workflow.


    **Figure 8-12** Security checks


    The `runEnabledChecks(...)` code snippet is shown next. The function executes
    each check that has been configured (step 6). On completion, the results are passed
    back via the `resultsCh` channel (step 7).


    ```

    func runEnabledChecks(...

    resultsCh chan checker.CheckResult,

    ) {

    ...

    wg := sync.WaitGroup{}

    for checkName, checkFn := range checksToRun {

    checkName := checkName

    checkFn := checkFn

    wg.Add(1)

    go func() {

    defer wg.Done()

    runner := checker.NewRunner(

    checkName,

    repo.URI(),

    &request,

    )

    resultsCh <- runner.Run(ctx, checkFn)

    }()

    }

    wg.Wait()

    close(resultsCh)

    }

    ```


    The final step of the tool is collecting, formatting, and scoring the results
    (step 8). The output depends on the configuration as it can be configured to be
    displayed on the console (default) or to a file. The code snippet is shown here
    (`scorecard/cmd/root.go`):


    ```

    func rootCmd(o *options.Options) {

    ...

    repoResult, err := pkg.RunScorecards(

    ctx,

    ...

    )

    if err != nil {

    log.Panic(err)

    }

    repoResult.Metadata = append(repoResult.Metadata, o.Metadata...)

    sort.Slice(repoResult.Checks, func(i, j int) bool {

    return repoResult.Checks[i].Name < repoResult.Checks[j].Name

    })

    ...

    resultsErr := pkg.FormatResults(

    o,

    &repoResult,

    checkDocs,

    pol,

    )

    ...

    }

    ```


    One thing that you learn from the tool is the usage of the GitHub API. The tool
    is used extensively by the GitHub API to perform checks by downloading information
    about the repository and checking that information using the predefined security
    checks. You are now going to take a look at how to use the GitHub API to do some
    GitHub exploration.


    ## GitHub


    Anyone who works with software knows about GitHub and has used it one way or another.
    You can find most kinds of open source software in GitHub and it is hosted freely.
    It has become the go-to destination for anyone who dabbles in software.


    GitHub provides an API that allows external tools to interact with the services.
    The API opens up unlimited potential for developers to access the GitHub service
    to build tools that can provide value for their organization. This allows the
    proliferation of third-party solutions (free and paid) to be made available to
    the general public. The Scorecard project in this chapter is one of the tools
    made possible because of the GitHub API.'
