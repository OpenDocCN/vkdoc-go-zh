    ,\n\"default\": {},\n\"servers\": {\n\"192-168-1-3\": {\n...\n}\n},\n\"cveDict\"\
    : {\n...\n},\n\"ovalDict\": {\n...\n},\n...\n},\n\"report\": {\n\"logJSON\": false,\n\
    ...\n}\n}\n}\n```\n\n在下一节中，你将探索 Vuls 提供的一些功能。\n\n## 从 Vuls 中学习\n\nVuls 中有许多功能值得学习，并可以在开发系统或安全应用程序时应用。你将了解\
    \ Vuls 使用的三个主要功能：端口扫描、使用 SQLite 数据库以及从 Go 应用程序执行命令行。这些功能将在以下部分详细讨论。\n\n### 端口扫描\n\
    \n端口扫描是一种执行操作以确定网络中哪些端口处于打开状态的方法。端口就像是应用程序选择监听的数字。例如，HTTP 服务器监听端口 80，而 FTP 服务器监听端口\
    \ 21。不同操作系统中遵循的标准端口号列表可以在 [`www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](http://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml)\
    \ 上查看。\n\n查看 Vuls 源代码（`scanner/base.go`），你可以看到执行网络扫描的以下函数：\n\n```\npackage scanner\n\
    import (\n...\nnmap \"github.com/Ullaakut/nmap/v2\"\n)\nfunc (l *base) execExternalPortScan(scanDestIPPorts\
    \ map[string][]string) ([]string, error) {\n...\nbaseCmd := formatNmapOptionsToString(portScanConf)\n\
    listenIPPorts := []string{}\nfor ip, ports := range scanDestIPPorts {\n...\nscanner,\
    \ err := nmap.NewScanner(nmap.WithBinaryPath(portScanConf.ScannerBinPath))\n...\n\
    return listenIPPorts, nil\n}\n```\n\n该代码使用了来自 `github.com/Ullaakut/nmap` 的开源 `nmap`\
    \ 库来执行扫描操作。在深入了解该库如何执行 `nmap` 之前，我们先了解一下什么是 `nmap`。工具 `nmap` 是一个用于网络探索和安全审计的命令行工具。它用于收集网络的实时信息，检测网络环境中哪些端口是开放的，检查网络中哪些\
    \ IP 地址处于激活状态等等。\n\n请确保你的本地机器上安装了 `nmap` 工具。如果你使用的是基于 Debian 的 Linux 发行版，请使用以下命令进行安装：\n\
    \n```\nsudo apt install nmap\n```\n\n运行 `nmap` 以检查是否能够成功运行。\n\n```\nnmap\n```\n\
    \n你会看到类似下面的输出：\n\n```\nNmap 7.80 ( https://nmap.org )\nUsage: nmap [Scan Type(s)]\
    \ [Options] {target specification}\nTARGET SPECIFICATION:\n...\nHOST DISCOVERY:\n\
    ...\nSCAN TECHNIQUES:\n...\nEXAMPLES:\nnmap -v -A scanme.nmap.org\nnmap -v -sn\
    \ 192.168.0.0/16 10.0.0.0/8\nnmap -v -iR 10000 -Pn -p 80\n```\n\n让我们看一下 `chapter13/nmap`\
    \ 目录中提供的示例代码，并按如下方式运行：\n\n```\ngo run main.go\n```\n\n该应用程序会运行并扫描你本地机器的开放端口。在我的机器上，输出如下：\n\
    \n```\nHost \"127.0.0.1\":\nPort 22/tcp open ssh\nPort 631/tcp open ipp\nPort\
    \ 5432/tcp open postgresql\nNmap done: 1 hosts up scanned in 0.020000 seconds\n\
    ```\n\n该代码检测到了三个开放端口，分别与 `ssh`、`ipp` 和 `postgresql` 应用程序相关。根据你本地机器上开放的端口，你可能会得到不同的结果。\n\
    \n使用 `nmap` 库的代码片段如下：\n\n```\npackage main\nimport (\n...\n\"github.com/Ullaakut/nmap/v2\"\
