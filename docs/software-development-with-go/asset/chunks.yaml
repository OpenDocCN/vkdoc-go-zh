    ### Epoll 等待


    注册的最后一步是调用 `syscall.EpollWait` 来等待来自内核的传入事件，该调用被封装在一个 `for {}` 循环中，如下代码片段所示。传递给系统作为超时参数的
    `-1` 表示应用程序将无限期等待，直到内核准备好传递事件。


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    }

    ```


    当应用程序接收到事件时，它会遍历接收到的事件数量开始处理，如下所示：


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    // 遍历事件

    for ev := 0; ev < n; ev++ {

    ...

    }

    }

    ```


    接收到的事件包含了系统生成的事件类型及其对应的文件描述符。代码利用这些信息来检查是否有新的客户端连接。这是通过检查接收到的文件描述符是否与监听器的文件描述符相同来完成的；如果相同，则会使用监听器的
    FD 调用 `syscall.Accept` 来接受连接。


    一旦它为客户端连接获取了新的 FD，代码也会使用 `EpollCtl` 并带有 `EPOLL_CTL_ADD` 标志将其注册到 `epoll` 中。完成后，监听器的
    FD 和客户端连接的 FD 都注册在 `epoll` 中，应用程序就可以对两者进行多路复用 I/O 操作。


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    // 遍历事件

    for ev := 0; ev < n; ev++ {

    // 如果与监听器相同，则接受连接

    if int(events[ev].Fd) == fd {

    connFd, _, err := syscall.Accept(fd)

    ...

    // 新连接应为非阻塞

    syscall.SetNonblock(fd, true)

    event.Events = syscall.EPOLLIN

    event.Fd = int32(connFd)

    // 将新的客户端连接 fd 注册到兴趣列表

    if err := syscall.EpollCtl(epfd, syscall.EPOLL_CTL_ADD, connFd, &event); err !=
    nil {

    log.Print("EpollCtl err : ", connFd, err)

    os.Exit(1)

    }

    } else {

    ...

    }

    }

    }

    ```


    最后一步，当代码检测到从事件接收到的 FD 与监听器的 FD 不同时，它会派生一个 goroutine 来处理该连接，该 goroutine 会将从客户端接收到的数据原样返回。


    ### Epoll 库


    你已经了解了 `epoll` 是什么，并创建了一个使用它的应用程序。编写一个使用 `epoll` 的应用程序需要编写大量重复的代码，用于处理接受连接、读取请求、注册文件描述符等。


    使用开源库有助于编写更好的应用程序，因为该库处理了 `epoll` 所需的繁重工作。在本节中，你将研究 `netpoll` ([`http://github.com/cloudwego/netpoll`](http://github.com/cloudwego/netpoll))。你将使用该库创建一个应用程序，并了解该库如何在内部处理
    `epoll`。


    代码可以在 `chapter12/epolling/netpoll` 文件夹中找到。它是一个回显服务器，将接收到的请求作为响应发送给用户。


    ```go

    import (

    ...

    "github.com/cloudwego/netpoll"

    )

    func main() {

    listener, err := netpoll.CreateListener("tcp", "127.0.0.1:8000")

    if err != nil {

    panic("Failure to create listener")

    }

    var opts = []netpoll.Option{

    netpoll.WithIdleTimeout(1 * time.Second),

    netpoll.WithIdleTimeout(10 * time.Minute),

    }

    eventLoop, err := netpoll.NewEventLoop(echoHandler, opts...)

    if err != nil {

    panic("Failure to create netpoll")

    }

    err = eventLoop.Serve(listener)

    if err != nil {

    panic("Failure to run netpoll")

    }

    }

    ...

    ```


    这段代码展示了使用库中的 `CreateListener` 创建一个套接字监听器来监听 8000 端口。成功打开监听器后，代码继续配置 `netpoll`，包括指定超时和指定处理传入请求的
    `echoHandler` 函数。代码通过调用 `netpoll` 的 `Serve` 函数开始监听传入的请求。


    `echoHandler` 函数使用传入参数 `netpoll.Connection` 处理来自客户端套接字连接的读写操作。该函数使用 `connection.Reader()`
    进行读取，并使用 `connection.Write()` 进行写入。


    ```go

    func echoHandler(ctx context.Context, connection netpoll.Connection) error {

    reader := connection.Reader()

    bts, err := reader.Next(reader.Len())

    if err != nil {

    log.Println("error reading data")

    return err

    }

    log.Println(fmt.Sprintf("Data: %s", string(bts)))

    connection.Write([]byte("-> " + string(bts)))

    return connection.Writer().Flush()

    }

    ```


    你可以看到，使用 `netpoll` 库编写的代码比上一节中看到的代码更容易阅读。大量繁重的工作由库执行；在编写高性能网络代码时，它还能提供更多功能和稳定性。让我们看看
    `netpoll` 在幕后是如何工作的。图 12-3 从高层次展示了 `netpoll` 的不同组件。


    ![](img/527551_1_En_12_Fig3_HTML.jpg)


    网络轮询服务器和新连接的流程图展示了 Epoll 负载均衡器，包括 Linux 内核下的 epoll 块，最后连接到 goroutine 池。


    **图 12-3** netpoll 高级架构


    该库会创建多个 `epoll`，并将 CPU 数量用作它将创建的 `epoll` 总数。在内部，它使用负载均衡策略来决定文件描述符将注册到哪个 `epoll`。


    当库接收到新连接或 `netpoll` 服务器首次运行时，它会将文件描述符注册到 `epoll`，并使用随机或轮询负载均衡机制来决定使用哪个 epoll，如图
    12-4 所示。可以在应用程序中使用以下函数调用来修改负载均衡器类型：


    ![](img/527551_1_En_12_Fig4_HTML.jpg)


    Epoll 负载均衡器的框图包括两个小框，分别代表轮询和随机。


    **图 12-4** netpoll 负载均衡器


    ```go

    netpoll.SetLoadBalance(netpoll.Random)

    netpoll.SetLoadBalance(netpoll.RoundRobin)

    ```


    该库通过使用 goroutine 来处理大流量。这是通过内部使用 goroutine 池化机制来实现的。开发人员只需专注于确保他们的应用程序和基础设施能够正确扩展。


    ### 总结


    在本章中，你了解了使用 `epoll` 编写应用程序的不同方法。利用之前从第 2 章学到的关于系统调用的知识，你使用标准库构建了一个基于 `epoll` 的应用程序。你了解到设计和编写
    `epoll` 网络应用程序与普通的网络应用程序不同。你深入研究了 `epoll` 库，并学会了如何使用它来编写网络应用程序。同时，你也了解了该库的内部工作原理。


