    # Part VII Linux System


    # 17. systemd


    In this chapter, you will look at `systemd`, what it is, and how to write Go applications
    to interact with it. `systemd` is an important piece of software inside the Linux
    system, and it is too big to be covered entirely in this chapter.


    You will look at an open source `systemd` Go library that is available and how
    to use it to access `systemd`. In this chapter, you will do the following:


    - Learn what `systemd` provides

    - Interact with `systemd` using `systemctl` and `journalctl`

    - Use the `go-systemd` library to write code

    - Write log messages to a `systemd` journal

    - Query `systemd` to get a list of registered services


    ### Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ### systemd


    `systemd` is a suite of applications that are used in Linux systems to get them
    up and running. It provides more than just starting the core Linux systems run;
    it also starts a number of programs such as network stack, user logins, the logging
    server, and more. It uses socket and D-Bus activation to start up services, on-demand
    starting of background applications, and more.


    D-Bus stands for Desktop Bus. It is a specification that is used for an inter-process
    communication mechanism, allowing different processes to communicate with one
    another on the same machine. Implementation of D-Bus consists of server components
    and a client library. For `systemd`, the implementation is known as sd-bus, and
    in a later section, you will look at using the D-Bus client library to communicate
    with the server component.


    Socket activation is a mechanism in `systemd` to listen to a network port or Unix
    socket. When connected from an external source, it will trigger the running of
    a server application. This is useful in situations when a resource-hungry application
    needs to run only when it is needed and not during the time when the Linux system
    is started up.'
