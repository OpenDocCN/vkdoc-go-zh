    \ functions:\n\n```\nfunc serviceB(serviceBDone chan bool) {\n\t...\n\tserviceBDone\
    \ <- true\n\tlog.Println(\"....Done with serviceB\")\n}\n\n// 2nd service\nfunc\
    \ serviceA(serviceBDone chan bool, finish chan bool) {\n\t<-serviceBDone\n\t...\n\
