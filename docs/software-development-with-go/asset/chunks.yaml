- fmt: '# Information from `/sys` and `/proc`


    In Chapters [2](#527551_1_En_2_Chapter.xhtml) and [3](#527551_1_En_3_Chapter.xhtml),
    you learned about the `/sys` and `/proc` filesystems and what kind of system-related
    information can be found. cAdvisor uses the same way to collect machine information
    that is reported as part of the metric information.


    `Manager` takes care of collecting and updating machine information, as shown
    in the following code snippet:


    ```go

    func New(memoryCache *memory.InMemoryCache, sysfs sysfs.SysFs, houskeepingConfig
    HouskeepingConfig, includedMetricsSet container.MetricSet, collectorHTTPClient
    *http.Client, rawContainerCgroupPathPrefixWhiteList []string, perfEventsFile string)
    (Manager, error) {

    ...

    machineInfo, err := machine.Info(sysfs, fsInfo, inHostNamespace)

    ...

    }

    ```


    The primary code that does the collection of machine information can be seen in
    the following snippet (`machine/info.go`):


    ```go

    func Info(sysFs sysfs.SysFs, fsInfo fs.FsInfo, inHostNamespace bool) (*info.MachineInfo,
    error) {

    ...

    clockSpeed, err := GetClockSpeed(cpuinfo)

    ...

    memoryCapacity, err := GetMachineMemoryCapacity()

    ...

    filesystems, err := fsInfo.GetGlobalFsInfo()

    ...

    netDevices, err := sysinfo.GetNetworkDevices(sysFs)

    ...

    topology, numCores, err := GetTopology(sysFs)

    ...

    return machineInfo, nil

    }

    ```


    Here’s the `GetMachineMemoryCapacity()` function and how it collects memory information
    using the `/proc` directory:


    ```go

    func GetMachineMemoryCapacity() (uint64, error) {

    out, err := ioutil.ReadFile("/proc/meminfo")

    if err != nil {

    return 0, err

    }

    memoryCapacity, err := parseCapacity(out, memoryCapacityRegexp)

    if err != nil {

    return 0, err

    }

    return memoryCapacity, err

    }

    ```


    The function reads the `/proc/meminfo` directory and parses the information received
    by calling the `parseCapacity()` function. The raw information extracted from
    `/proc/meminfo` looks like the following:


    ```

    MemTotal:       16078860 kB

    MemFree:          698260 kB

    ...

    Hugepagesize:       2048 kB

    Hugetlb:               0 kB

    DirectMap4k:      901628 kB

    DirectMap2M:    15566848 kB

    DirectMap1G:           0 kB

    ```


    Let’s look at another function called `GetGlobalFsInfo()` (`fs/fs.go`). This function
    calls another function called `GetFsInfoForPath(..) (fs/fs.go)`, which is shown
    in the following snippet:


    ```go

    func (i *RealFsInfo) GetFsInfoForPath(mountSet map[string]struct{}) ([]Fs, error)
    {

    ...

    diskStatsMap, err := getDiskStatsMap("/proc/diskstats")

    ...

    return filesystems, nil

    }

    ```


    It calls `getDiskStatsMap(..)`, passing in `/proc/diskstats` as the parameter.
    The function `getDiskStatsMap(..)` reads and parses the information from that
    directory. The raw information from that directory looks like the following:


    ```

    ...

    259       0 nvme0n1 17925716 1726716 2140111562 27153144 9657604 6144332 374398866
    10096182 1 7081436 37829936 0 0 0 0 666569 580610

    ...

    253       2 dm-2 728297 0 5837468 252644 2635588 0 21084640 7281316 0 334744 7533960
    0 0 0 0 0 0

    ```


    Now let’s look at how cAdvisor reads information using the `/sys` directory. The
    function `GetNetworkDevices(..) (utils/sysinfo/sysinfo.go)` shown in the code
    snippets calls another function to get the information from `/sys/class/net`:


    ```go

    func GetNetworkDevices(sysfs sysfs.SysFs) ([]info.NetInfo, error) {

    devs, err := sysfs.GetNetworkDevices()

    ...

    return netDevices, nil

    }

    ```


    The `sysfs.GetNetworkDevices() (utils/sysfs/sysfs.go)` snippet looks like the
    following:


    ```go

    const (

    ...

    netDir       = "/sys/class/net"

    ...

    )

    func (fs *realSysFs) GetNetworkDevices() ([]os.FileInfo, error) {

    files, err := ioutil.ReadDir(netDir)

    ...

    var dirs []os.FileInfo

    for _, f := range files {

    ...

    }

    return dirs, nil

    }

    ```


    The function extracts and parses the information, which looks like the following
    in raw format:


    ```

    lrwxrwxrwx  1 root root 0 Jun 19 14:09 docker0 -> ../../devices/virtual/net/docker0

    ...

    ../../devices/virtual/net/veth710aac6

    lrwxrwxrwx  1 root root 0 Jun 19 12:30 veth98e6a97 -> ../../devices/virtual/net/veth98e6a97

    lrwxrwxrwx  1 root root 0 Jun 19 14:09 wlp0s20f3 -> ../../devices/pci0000:00/0000:00:14.3/net/wlp0s20f3

    ```


    # Client Library


    In the repository inside the chapter18 folder, there are examples of how to use
    the cAdvisor client library to communicate with cAdvisor. The examples show how
    to use the client library to get container information, event streaming from cAdvisor,
    and so on.


    # Summary


    In this chapter, you learned about installing and running cAdvisor to monitor
    metrics of your local machine and Docker containers. The tool provides a lot of
    information that shows the performance of the different containers that are running
    on a machine. This chapter discussed how cAdvisor collects metric information
    for containers and local machines using the knowledge you learned in previous
    chapters.


    cAdvisor provides much more functionality than what was discussed in this chapter.
    For example, it has built-in support for exporting metrics to a Prometheus, it
    provides an API that can be used to integrate with other third-party or in-house
    tools to monitor container performance, and more.'
