    ### GeoIP 数据库


    CrowdSec 使用一个包含 IP 地址地理信息的 GeoIP 数据库。此数据库是在设置“使用 CrowdSec”部分讨论的测试环境时下载的。


    在本节中，你将深入了解此数据库，并学习如何读取其中的数据。该数据库的用例之一是能够为你基础设施中的每个传入 IP 打上标签，这对于监控和了解进入基础设施的流量非常有用。GeoIP
    数据库来自以下网站：[`https://dev.maxmind.com/geoip/geolite2-free-geolocation-data?lang=en#databases`](https://dev.maxmind.com/geoip/geolite2-free-geolocation-data%253Flang%253Den%2523databases)。请仔细阅读该网站以了解许可条款。


    示例代码位于 `chapter14/geoip/city` 文件夹中，但在运行之前，你需要指定代码将要使用的 GeoIP 数据库的位置。如果你已经按照“使用
    CrowdSec”部分进行操作，那么你会在 `data` 文件夹中找到一个名为 `GeoLite2-City.mmdb` 的数据库文件。复制该文件的位置以便在代码片段中使用，如下所示。我的文件位置显示在代码片段中。


    ```

    package main

    ...

    func main() {

    db, err := maxminddb.Open("/home/nanik/GolandProjects/cloudprogramminggo/chapter14/geoip/city/GeoLite2-City.mmdb")

    ...

    }

    ```


    指定文件位置后，打开终端并按如下方式运行示例：


    ```

    go run main.go

    ```


    你将看到类似以下的输出：


    ```

    IP : 2.0.0.0/17, Long : 2.338700, Lat : 48.858200, Country : FR, Continent: EU

    IP : 2.0.128.0/19, Long : -0.947200, Lat : 47.171600, Country : FR, Continent:
    EU

    ...

    IP : 2.0.192.0/18, Long : 2.338700, Lat : 48.858200, Country : FR, Continent:
    EU

    IP : 2.1.0.0/19, Long : 2.338700, Lat : 48.858200, Country : FR, Continent: EU

    IP : 2.1.32.0/19, Long : 2.302200, Lat : 44.858601, Country : FR, Continent: EU

    ...

    ```


    代码读取数据库以获取 `2.0.0.0` IP 范围内的所有 IP 地址，并打印出在该范围内找到的所有 IP 地址以及相关的国家和大陆信息。让我们仔细阅读代码并了解它如何使用数据库。


    数据存储在一个高效打包的单个文件中，因此要读取该数据库，你必须使用另一个库。请使用 [`github.com/oschwald/maxminddb-golang`](http://github.com/oschwald/maxminddb-golang)
    库。该库的文档可以在 [`https://pkg.go.dev/github.com/oschwald/maxminddb-golang`](https://pkg.go.dev/github.com/oschwald/maxminddb-golang)
    找到。


    该库提供了一个函数，用于将数据转换为结构体。在示例代码中，你创建了自己的结构体来表示将要读取的数据。


    ```

    package main

    ...

    type GeoCityRecord struct {

    Continent struct {

    Code      string                 `json:"code"`

    GeonameId int                    `json:"geoname_id"`

    Names     map[string]interface{} `json:"names"`

    } `json:"continent"`

    Country struct {

    GeonameId int                    `json:"geoname_id"`

    IsoCode   string                 `json:"iso_code"`

    Names     map[string]interface{} `json:"names"`

    } `json:"country"`

    Location struct {

    AccuracyRadius int     `json:"accuracy_radius"`

    Latitude       float32 `json:"latitude"`

    Longitude      float32 `json:"longitude"`

    TimeZone       string  `json:"time_zone"`

    } `json:"location"`

    RegisteredCountry struct {

    GeoNameID int                    `json:"geoname_id"`

    IsoCode   string                 `json:"iso_code"`

    Names     map[string]interface{} `json:"names"`

    } `json:"registered_country"`

    }

    func main() {

    ...

    }

    ```


    当调用库读取数据时，`GeoCityRecord` 结构体会被填充，如下所示：


    ```

    package main

    import (

    ...

    )

    ...

    func main() {

    ...

    _, network, err := net.ParseCIDR("2.0.0.0/8")

    ...

    for networks.Next() {

    var rec interface{}

    r := GeoCityRecord{}

    ip, err := networks.Network(&rec)

    ...

    }

    ```


    `networks.Next()` 循环遍历找到的记录，并通过调用 `networks.Network(..)` 函数从数据库中读取所有地理信息，该函数会填充
    `rec` 变量。


    `rec` 变量是一个接口，因此代码使用 `json.Marshal(..)` 将内容编组为适当的结构体，由 `r` 变量定义，如下所示：


    ```

    package main

    ...

    func main() {

    ...

    for networks.Next() {

    var rec interface{}

    r := GeoCityRecord{}

    ip, err := networks.Network(&rec)

    ...

    j, _ := json.Marshal(rec)

    err = json.Unmarshal([]byte(j), &r)

    ...

    fmt.Printf("IP : %s, Long : %f, Lat : %f, Country : %s, Continent: %s\n", ip.String(),
    r.Location.Longitude, r.Location.Latitude,

    r.Country.IsoCode, r.Continent.Code)

    }

    }

    ```


    一旦 JSON 被反编组回 `r` 变量，代码就会将信息打印到控制台。


    ## 本章小结


    在本章中，你不仅了解了 CrowdSec 使用的数据众包收集方式以及社区如何从中受益，还学习了如何在你的应用程序中使用它。


    你学习了如何使用通道在操作系统发送系统信号时通知应用程序。你还了解了在启动期间使用通道处理服务依赖关系。最后，你学习了如何读取 GeoIP 数据库，当你想在基础设施中使用该信息进行日志记录或监控
    IP 流量时，这将非常有用。


    # 第六部分 终端用户界面


    ## 15. ANSI 与用户界面


    在本章中，你将学习编写带有用户界面（UI）的命令行应用程序。你将了解如何添加文本样式，例如斜体或粗体文本、不同颜色的文本、使用旋转器（spinner）的 UI
    等等。这种用户界面是通过使用 ANSI 转义码实现的，这些代码包含在终端中执行某些操作的指令。


    你还将了解一个开源库，该库简化了用户界面的编写，它负责处理编写各种 ANSI 转义码以实现炫酷 UI 效果的所有繁重工作。在本章中，你将了解以下内容：


    *   用于用户界面的 ANSI 转义码

    *   用于编写不同类型用户界面的开源库

    *   文本样式，例如斜体和粗体


    ### 源代码


    本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。

