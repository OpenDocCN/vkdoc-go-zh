  raw: '## Abstract Syntax Tree


    Abstract syntax tree (also known as syntax tree) is a tree representation of the
    structure of the source code written in a programming language. When you write
    code in Go and you compiled the code, the compiler will first convert the source
    code internally into a data structure representing the code. This data structure
    will be used by the compiler as an intermediate representation and it will go
    through several stages before it produces machine code. Figure [7-1](#527551_1_En_7_Chapter.xhtml#Fig1)
    shows at a high level the different steps that compiler does when compiling code.


    ![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig1_HTML.jpg)


    A flow diagram represents stages of source code including scanning, parsing, generating
    AST, and generating machine code.


    Figure 7-1


    Stages of compiling source code


    Let’s take a quick peek at what AST looks like in comparison to the original code.
    Figure [7-2](#527551_1_En_7_Chapter.xhtml#Fig2) shows the comparison between the
    original Go code and when it is converted into AST during the compilation process.


    ![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig2_HTML.jpg)


    A screenshot of the conversion of the original code representing package main
    including the main function and print convert with the help of an Abstract syntax
    tree to the final code.


    Figure 7-2


    Original code vs. AST


    To the normal eye, the AST looks like a bunch of text, but for the compiler it
    is very helpful because the data structure allows it to go through different parts
    of the code to check for errors, warnings, and many other things.


    Go provides a built-in module that makes it easy for applications to convert source
    code into AST, and this module is used by tools like golanci-lint ([`github.com/golangci/golangci-lint`](http://github.com/golangci/golangci-lint))
    for reading and linting Go source code.


    What does the AST data structure look like? Figure [7-3](#527551_1_En_7_Chapter.xhtml#Fig3)
    shows a brief view of the AST structure.


    ![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig3_HTML.jpg)


    A classification chart of Ast dot node into 3 categories including ast dot declaration,
    import spec, and identification. ast dot declaration is further classified into
    Gen Decl and Fun Decl.


    Figure 7-3


    AST structure


    Table [7-1](#527551_1_En_7_Chapter.xhtml#Tab1) briefly explains the different
    structures.


    Table 7-1


    Different Structures


    | `Ast.Node` | This is the main interface that others must implement |

    | `ast.FuncDecl` | The structure representing the declaration-like function, such
    as`func myfunc(){``}` |

    | `ast.GenDecl` | The structure representing a generic declaration, such as`var
    x = "a string"` |

    | `ast.ImportSpec` | The structure representing an import declaration, such as`import
    "go/token"` |


    There are many real world use cases that benefit from using AST:


    *   **Code generators**: This kind of application requires the use of AST to generate
    source code.


    *   **Static code analyzer**: Tools such as gosec, which will be discussed in
    this chapter, use AST extensively to read source code and identify security issues.


    *   **Code coverage**: This kind of tool requires AST to measure an application’s
    test coverage and uses AST to perform its operation.


    ### Modules


    The modules that you will be using in this chapter are `go/parser` and `go/ast`.
    The godocs can be found respectively at [`https://pkg.go.dev/go/parser`](https://pkg.go.dev/go/parser)
    and [`https://pkg.go.dev/go/ast`](https://pkg.go.dev/go/ast). Each module provide
    different functions, as explained here:


    *   `go/parser`: This module provides parsing capability to Go source files. The
    provided input can be from a string or from a filename. The result of the parsing
    is an AST structure of the source file.


    *   `go/ast`: The returned value after parsing a source file is of type `go/ast`,
    and this module allows applications to traverse through the different AST structures
    of the source files. This module provides the AST data structure that the application
    will work with.


    In the next section, it will be clearer how the AST works when you look at different
    examples.


    ### Sample Code


    You will explore different samples in this section using the different Go AST
    modules. The examples will give you a good idea of how to use the different AST
    modules and what can be done with the AST results.


    #### Inspecting


    Run the code inside the `chapter7/samplecode/inspecting` folder as follows:


    ```

    go run main.go

    ```


    You will get the following output:


    ```

    2:9:    id: p

    3:7:    id: c

    3:11:   bl: 1.0

    4:5:    id: X

    4:9:    id: f

    4:11:   bl: 3.14

    4:17:   bl: 2

    4:21:   id: c

    ```


    The code creates an AST data structure for the code that is provided when calling
    the AST function and filters out the declared constant and variables. Let’s go
    through the sample code to understand what each part of the code does.


    The code declares a variable named `src` that contains the source code. It’s simple
    Go code containing `const` and `var` declarations. Successfully parsing the source
    code will return a type of `ast.File`. The `ast.File` contains the AST data structure
    of the code that the code will use to traverse through.


    ```

    package main

    import (

    ...

    )

    func main() {

    src := `

    package p

    const c = 1.0

    var X = f(3.14)*2 + c

    `

    fset := token.NewFileSet()

    f, err := parser.ParseFile(fset, "", src, 0)

    ...

    }

    ```


    The `ast.File` is declared inside `go/ast` module that is declared as follows:


    ```

    type File struct {

    Doc        *CommentGroup

    Package    token.Pos

    Name       *Ident

    Decls      []Decl

    Scope      *Scope

    Imports    []*ImportSpec

    Unresolved []*Ident

    Comments   []*CommentGroup

    }

    ```


    The code then uses the `ast.Inspect(..)` function that traverses through the AST
    data structure and calls the function that is declared. The simple function passed
    as a parameter to `ast.Inspect(..)` checks what kind of `ast.Node` it receives,
    filtering out only `ast.BasicLint` and `ast.Ident`*.* The `ast.Node` refers here
    is the same as we discussed in Figure [7-2](#527551_1_En_7_Chapter.xhtml#Fig2).


    ```

    package main

    import (

    ...

    )

    func main() {

    ...

    ast.Inspect(f, func(n ast.Node) bool {

    var s string

    switch x := n.(type) {

    case *ast.BasicLit:

    s = "bl: " + x.Value

    case *ast.Ident:

    s = "id: " + x.Name

    }

    if s != "" {

    fmt.Printf("%s:\t%s\n", fset.Position(n.Pos()), s)

    }

    return true

    })

    }

    ```


    The `ast.Inspect(..)` is the main function provided by the `go/ast` module that
    is used in traversing through the AST tree in Go. Table [7-2](#527551_1_En_7_Chapter.xhtml#Tab2)
    explains the `ast.BasicLint` and `ast.Ident``.`


    Table 7-2


    ast.BasicLint and ast.Ident


    | `ast.BasicLint` | Represents nodes of the basic type, which is the value of
    the variable or constant declared |

    | `ast.Ident` | Represents an identifier. This is defined clearly in the Go language
    specification ([`https://go.dev/ref/spec#Identifiers`](https://go.dev/ref/spec%2523Identifiers))
    |'
  trans: "\n# 抽象语法树\n\n抽象语法树（亦称语法树）是一种以树形结构表示编程语言源代码的方式。当你用 Go 编写代码并编译时，编译器会首先在内部将源代码转换成一种表示代码的数据结构。这个数据结构会被编译器用作中间表示形式，并在生成机器码之前经历多个处理阶段。图\
    \ 7-1 从高层次展示了编译器在编译代码时经历的不同步骤。\n\n![](img/527551_1_En_7_Fig1_HTML.jpg)\n\n流程图展示了源代码的处理阶段，包括扫描、解析、生成\
    \ AST 以及生成机器码。\n\n图 7-1\n\n编译源代码的阶段\n\n让我们快速对比一下 AST 与原始代码的异同。图 7-2 展示了原始 Go 代码与它在编译过程中转换为\
    \ AST 后的对比。\n\n![](img/527551_1_En_7_Fig2_HTML.jpg)\n\n原始代码（包含包 main、主函数及打印语句）借助抽象语法树转换为最终代码的截图对比。\n\
    \n图 7-2\n\n原始代码 vs. AST\n\n对于普通人来说，AST 看起来就像一堆文本，但对编译器来说它非常有用，因为这种数据结构允许编译器遍历代码的不同部分以检查错误、警告及其他许多问题。\n\
    \nGo 提供了一个内置模块，使应用程序能够轻松地将源代码转换为 AST。这个模块被诸如 `golanci-lint`（`github.com/golangci/golangci-lint`）这类工具用于读取和检查\
    \ Go 源代码。\n\nAST 的数据结构是什么样的？图 7-3 简要展示了 AST 的结构。\n\n![](img/527551_1_En_7_Fig3_HTML.jpg)\n\
    \n`Ast.Node` 的分类图，分为三大类：`ast.Declaration`、`ImportSpec` 和 `Identification`。其中 `ast.Declaration`\
    \ 进一步细分为 `GenDecl` 和 `FunDecl`。\n\n图 7-3\n\nAST 结构\n\n表 7-1 简要说明了这些不同的结构。\n\n\
    表 7-1\n\n不同结构\n\n| `Ast.Node`   | 这是其他结构必须实现的主要接口                     |\n|--------------|----------------------------------------------------|\n\
    | `ast.FuncDecl`  | 表示类似函数声明的结构，例如 `func myfunc(){ }`    |\n| `ast.GenDecl`  \
    \ | 表示通用声明的结构，例如 `var x = \"a string\"`      |\n| `ast.ImportSpec` | 表示导入声明的结构，例如\
    \ `import \"go/token\"`       |\n\n有许多实际应用场景受益于使用 AST：\n\n- **代码生成器**：这类应用程序需要使用\
    \ AST 来生成源代码。\n- **静态代码分析器**：像 `gosec`（本章将讨论）这样的工具广泛使用 AST 来读取源代码并识别安全问题。\n- **代码覆盖率**：这类工具需要\
    \ AST 来衡量应用程序的测试覆盖率，并利用 AST 执行其操作。\n\n## 模块\n\n本章你将使用的模块是 `go/parser` 和 `go/ast`。它们的官方文档分别位于\
    \ [`https://pkg.go.dev/go/parser`](https://pkg.go.dev/go/parser) 和 [`https://pkg.go.dev/go/ast`](https://pkg.go.dev/go/ast)。每个模块提供不同的功能，具体如下：\n\
    \n- `go/parser`：该模块提供对 Go 源文件的解析能力。输入内容可以来自字符串或文件名，解析结果是一个源文件的 AST 结构。\n- `go/ast`：解析源文件后的返回值类型是\
    \ `go/ast`，该模块允许应用程序遍历源文件中不同的 AST 结构。这个模块提供了应用程序将使用的 AST 数据结构。\n\n在下一节中，通过查看不同的示例，你将更清楚地了解\
    \ AST 的工作原理。\n\n## 示例代码\n\n在本节中，你将使用不同的 Go AST 模块探索多个示例。这些示例将让你深入了解如何使用不同的 AST\
    \ 模块，以及可以用 AST 结果做什么。\n\n### 检查（Inspecting）\n\n运行 `chapter7/samplecode/inspecting`\
    \ 文件夹内的代码，命令如下：\n\n```\ngo run main.go\n```\n\n你将得到以下输出：\n\n```\n2:9:\tid: p\n\
    3:7:\tid: c\n3:11:\tbl: 1.0\n4:5:\tid: X\n4:9:\tid: f\n4:11:\tbl: 3.14\n4:17:\t\
    bl: 2\n4:21:\tid: c\n```\n\n这段代码为调用 AST 函数时提供的代码创建了一个 AST 数据结构，并过滤出其中声明的常量和变量。让我们逐段分析示例代码，理解各部分的作用。\n\
    \n代码声明了一个名为 `src` 的变量，其中包含源代码。这是一个简单的 Go 代码，包含 `const` 和 `var` 声明。成功解析源代码后会返回\
    \ `ast.File` 类型。`ast.File` 包含了代码的 AST 数据结构，代码将利用它进行遍历。\n\n```\npackage main\n\
    import (\n...\n)\nfunc main() {\nsrc := `\npackage p\nconst c = 1.0\nvar X = f(3.14)*2\
    \ + c\n`\nfset := token.NewFileSet()\nf, err := parser.ParseFile(fset, \"\", src,\
    \ 0)\n...\n}\n```\n\n`ast.File` 在 `go/ast` 模块中定义，声明如下：\n\n```\ntype File struct\
    \ {\nDoc        *CommentGroup\nPackage    token.Pos\nName       *Ident\nDecls\
    \      []Decl\nScope      *Scope\nImports    []*ImportSpec\nUnresolved []*Ident\n\
    Comments   []*CommentGroup\n}\n```\n\n代码随后使用 `ast.Inspect(..)` 函数遍历 AST 数据结构，并调用声明的函数。作为参数传递给\
    \ `ast.Inspect(..)` 的简单函数会检查接收到的 `ast.Node` 类型，只过滤出 `ast.BasicLit` 和 `ast.Ident`。这里的\
    \ `ast.Node` 与我们在图 7-2 中讨论的相同。\n\n```\npackage main\nimport (\n...\n)\nfunc main()\
    \ {\n...\nast.Inspect(f, func(n ast.Node) bool {\nvar s string\nswitch x := n.(type)\
    \ {\ncase *ast.BasicLit:\ns = \"bl: \" + x.Value\ncase *ast.Ident:\ns = \"id:\
    \ \" + x.Name\n}\nif s != \"\" {\nfmt.Printf(\"%s:\\t%s\\n\", fset.Position(n.Pos()),\
    \ s)\n}\nreturn true\n})\n}\n```\n\n`ast.Inspect(..)` 是 `go/ast` 模块提供的主要函数，用于在\
    \ Go 中遍历 AST 树。表 7-2 解释了 `ast.BasicLit` 和 `ast.Ident`。\n\n表 7-2\n\n`ast.BasicLit`\
    \ 和 `ast.Ident`\n\n| `ast.BasicLit` | 表示基本类型的节点，即已声明的变量或常量的值 |\n|---------------|---------------------------------------------|\n\
    | `ast.Ident`   | 表示标识符。这在 Go 语言规范（[`https://go.dev/ref/spec#Identifiers`](https://go.dev/ref/spec%2523Identifiers)）中有明确定义。\
    \ |\n"
- fmt: '### Parsing a File


    The sample code in this section creates an AST data structure of the `main.go`
    that prints out the different module names that are imported, the function names
    declared in the code, and the line number for the return statement. The code can
    be found inside `chapter7/samplecode/parsing` directory. Run the sample in terminal
    as follows:


    ```

    go run main.go

    ```


    You will see the following output:


    ```

    2022/07/02 16:28:05 Imports:

    2022/07/02 16:28:05   "fmt"

    2022/07/02 16:28:05   "go/ast"

    2022/07/02 16:28:05   "go/parser"

    2022/07/02 16:28:05   "go/token"

    2022/07/02 16:28:05   "log"

    2022/07/02 16:28:05 Functions:

    2022/07/02 16:28:05   main

    2022/07/02 16:28:05 return statement found in line 36:

    2022/07/02 16:28:05 return statement found in line 39:

    ```


    The sample uses the same `parser.ParseFile(..)` and `ast.Inspect(..)` functions
    as shown here:


    ```

    package main

    import (

    ...

    )

    func main() {

    ...

    f, err := parser.ParseFile(fset, "./main.go", nil, 0)

    ...

    ast.Inspect(f, func(n ast.Node) bool {

    ret, ok := n.(*ast.ReturnStmt)

    if ok {

    ...

    }

    return true

    })

    }

    ```


    The function inside `ast.Inspect(..)` only prints nodes that are of type `ast.ReturnStmt`
    that represent return statements; anything else is ignored. The other functions
    that it uses to print out import information are shown here:


    ```

    package main

    import (

    ...

    )

    func main() {

    ...

    f, err := parser.ParseFile(fset, "./main.go", nil, 0)

    ...

    log.Println("Imports:")

    for _, i := range f.Imports {

    log.Println(" ", i.Path.Value)

    }

    ...

    }

    ```


    The returned value from `ParseFile` is `ast.File` and one of the fields in that
    structure is `Imports`, which contains all the imports declared in the source
    code. The code range loops through the `Imports` field and prints out the import
    name to the console. The code also prints out the declared function name, which
    is done by the following code:


    ```

    func main() {

    ...

    for _, f := range f.Decls {

    fn, ok := f.(*ast.FuncDecl)

    ...

    log.Println(" ", fn.Name.Name)

    }

    }

    ```


    The `Decls` field contains all the declarations found in the source code and it
    filters out only the `ast.FuncDecl` type containing the function declaration.


    You have looked at different AST example code and should now have a better understanding
    how to use it and what information you can get out of it. In the next section,
    you will look at how AST is used in an open source security project.


    ## gosec


    The gosec project is an open source tool (`https://github.com/securego/gosec`)
    that provides security static code analysis. The tool provides a set of secure
    code best practices for the Go language, and it scans your source code to check
    if there is any code that breaks those rules.


    Use the following command to install it if you are using Go 1.16 and above:


    ```

    go install github.com/securego/gosec/v2/cmd/gosec@latest

    ```


    Once installed, open your terminal and change the directory to `chapter7/samplecode`
    and execute the following command:


    ```

    gosec  ./...

    ```


    The tool will scan your sample code recursively and print out the message on the
    console.


    ```

    [gosec] 2022/07/02 17:00:11 Including rules: default

    ...

    Results:

    ...

    - G104 (CWE-703): Errors unhandled. (Confidence: HIGH, Severity: LOW)

    22:

    > 23:         ast.Print(fset, f)

    24: }

    Summary:

    Gosec  : dev

    Files  : 3

    Lines  : 105

    Nosec  : 0

    Issues : 1

    ```


    The tool scans through all the `.go` files inside the directory recursively and,
    after completing the parsing and scanning process, prints out the final result.
    In my directory, it found one issue, which is labeled as G104. The tool is able
    to perform the code analysis by using the `go/ast` module similar to these examples.


    ### Inside gosec


    Figure [7-4](#527551_1_En_7_Chapter.xhtml#Fig4) shows at a high level how gosec
    works.


    ![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig4_HTML.jpg)


    A flowchart of high-level process represents load configuration, load rules, new
    analyzers, package parse, process package, report, and loop through the package.


    **Figure 7-4** Gosec high-level process


    The tool loads up rules (step 1) that have been defined internally. These rules
    define functions that are called to check the code being processed. This is discussed
    in detail in the next section.


    Once the rules have been loaded, it proceeds to process the directory given as
    parameter and recursively gets all the `.go` files that are found (step 4). This
    is performed by the following code (`helpers.go`):


    ```

    func PackagePaths(root string, excludes []*regexp.Regexp) ([]string, error) {

    ...

