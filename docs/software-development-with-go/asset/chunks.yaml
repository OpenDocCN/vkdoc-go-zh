- fmt: '# C System Call


    In this section, you will briefly look at how system calls normally work inside
    a C program. This will give you an idea of how system calls are done in C compared
    to how they are done in Go.


    You will see a simple example of using a socket to connect to a server and read
    the response. The code can be found inside the `chapter1/c` directory. The code
    creates a socket and uses it to connect to a public website named [`httpbin.org`](http://httpbin.org)
    and print the response it receives to the screen. Listing [1-1](#527551_1_En_1_Chapter.xhtml#PC1)
    shows the sample code.


    ```c

    #include

    #include

    #include

    #include

    #include

    int main(int argc, char * argv[]) {

    int socket_desc;

    struct sockaddr_in server;

    char * message, server_reply[2000];

    struct hostent * host;

    const char * hostname = "httpbin.org";

    //Create socket

    socket_desc = socket(AF_INET, SOCK_STREAM, 0);

    if (socket_desc == -1) {

    printf("Could not create socket");

    }

    if ((server.sin_addr.s_addr = inet_addr(hostname)) == 0xffffffff) {

    if ((host = gethostbyname(hostname)) == NULL) {

    return -1;

    }

    memcpy( & server.sin_addr, host -> h_addr, host -> h_length);

    }

    server.sin_family = AF_INET;

    server.sin_port = htons(80);

    if (connect(socket_desc, (struct sockaddr * ) & server, sizeof(server)) < 0) {

    puts("connect error");

    return 1;

    }

    puts("Connected\n");

    //Send some data

    message = "GET / HTTP/1.0\n\n";

    if (send(socket_desc, message, strlen(message), 0) < 0) {

    puts("Send failed");

    return 1;

    }

    puts("Data Send\n");

    //Receive a reply from the server

    if (recv(socket_desc, server_reply, 2000, 0) < 0) {

    puts("recv failed");

    }

    puts("Reply received\n");

    puts(server_reply);

    return 0;

    }

    Listing 1-1

    Sample Code

    ```


    To test the code, make sure you have a C compiler installed in your machine. Follow
    the instructions outlined on the GCC website to install the compiler and tools
    ([`https://gcc.gnu.org/`](https://gcc.gnu.org/)). Use the following command to
    compile the code:


    ```bash

    cc sample.c -o sample

    ```


    The code will be compiled to an executable named `sample`, and it can be run by
    just typing `./sample` on the command line. After a successful run, it will print
    out the following:


    ```

    Connected

    Data Send

    Reply received

    HTTP/1.1 200 OK

    Date: Tue, 01 Mar 2022 10:21:13 GMT

    Content-Type: text/html; charset=utf-8

    Content-Length: 9593

    Connection: close

    Server: gunicorn/19.9.0

    Access-Control-Allow-Origin: *

    Access-Control-Allow-Credentials: true

    ```


    The code sample shows the system call that it uses to resolve the address of [`httpbin.org`](http://httpbin.org)
    to an IP address by using the `gethostbyname` function. It also uses the `connect`
    function to use the newly created socket to connect to the server.


    In the next section, you will start exploring Go by using the standard library
    to write code using system calls.


    ## sys/unix Package


    The `sys/unix` package is a package provided by the Go language that provides
    a system-level interface to interact with the operating system. Go can run on
    a variety of operating systems, which means that it provides different interfaces
    to applications for different operating systems. Complete package documentation
    can be found at [`https://pkg.go.dev/golang.org/x/sys/unix`](https://pkg.go.dev/golang.org/x/sys/unix).
    Figure [1-3](#527551_1_En_1_Chapter.xhtml#Fig3) shows different system calls in
    different operating systems, in this case between Darwin and Linux.


    ![](images/527551_1_En_1_Chapter/527551_1_En_1_Fig3_HTML.jpg)


    A screenshot compares a code between two users named syscall slash darwin and
    64-bit and syscall slash Linux and 64-bit in 48 rows.


    Figure 1-3


    System calls in Linux vs. Darwin


    Listing [1-2](#527551_1_En_1_Chapter.xhtml#PC4) shows how to use system calls
    using the `sys/unix` package.


    ```go

    package main

    import (

    u "golang.org/x/sys/unix"

    "log"

    )

    func main() {

    c := make([]byte, 512)

    log.Println("Getpid : ", u.Getpid())

    log.Println("Getpgrp : ", u.Getpgrp())

    log.Println("Getppid : ", u.Getppid())

    log.Println("Gettid : ", u.Gettid())

    _, err := u.Getcwd(c)

    if err != nil {

    log.Fatalln(err)

    }

    log.Println(string(c))

    }

    Listing 1-2

    Go System Call

    ```


    The code prints out information that it obtained by calling the following system
    calls:


    | `Getpid` | Obtains the process id of the current running sample app |

    | `Getpgrp` | Obtains the group process id of the current running app |

    | `Getppid` | Obtains the parent process id of the current running app |

    | `Gettid` | Obtains the caller’s thread it |


    Running the app on a Linux machine will result in output something like the following:


    ```

    2022/02/19 21:25:59 Getpid :  12057

    2022/02/19 21:25:59 Getpgrp :  12057

    2022/02/19 21:25:59 Getpgrp :  29162

    2022/02/19 21:25:59 Gettid :  12057

    2022/02/19 21:25:59 /home/nanik/

    ```


    The other system call that the application uses is to get the current working
    directory using the `Getcwd` function.'
