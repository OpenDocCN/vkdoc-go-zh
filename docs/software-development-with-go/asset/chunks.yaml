    func InsertData(db *sql.DB, records []Record) {

    q := `

    INSERT OR REPLACE INTO currencies(

    Id,

    Name,

    InsertedDatetime

    ) values(?, ?,  CURRENT_TIMESTAMP)`

    stmt, err := db.Prepare(q)

    ...

    defer stmt.Close()

    for _, r := range records {

    _, err := stmt.Exec(r.Id, r.Name)

    ...

    }

    }

    ```


    The function uses the `INSERT INTO` statement, which is used inside the `Prepare(..)`
    function. This function is used to create prepared statements that can be executed
    in isolation later. The SQL statement uses a parameter placeholder for the values
    (the placeholder is marked by the ? symbol), which are included as part of the
    parameter when executing using the `Exec(..)` function. The value is obtained
    from the `Id` and `Name` of the `Record` struct.


    Now that the data has been inserted into the table, the code completes the execution
    by reading the data from the table and printing it out to the console as follows:


    ```

    func ReadData(db *sql.DB) []Record {

    q := `

    SELECT Id, Name  FROM currencies

    ORDER BY datetime(InsertedDatetime) DESC`

    rows, err := db.Query(q)

    ...

    var records []Record

    for rows.Next() {

    item := Record{}

    err := rows.Scan(&item.Id, &item.Name)

    ...

    records = append(records, item)

    }

    return records

    }

    ```


    The function `ReadData(..)` uses the SELECT SQL statement to read the fields from
    the table with the result sorted by the `InsertedDateTime` field in ascending
    order. The code uses the `Query(..)` function, returning the `Rows` struct and
    looping through it. Inside the loop, the code uses the `Scan(..)` function to
    copy fields from each row and read into the values passed in the parameter. In
    the code example, the fields are read into `item.Id` and `item.Name.`


    The number of parameters passed to `Scan(..)` must match with the number of fields
    read from the table. The `Rows` struct that is returned when using the `Query(..)`
    function is defined inside the `database/sql` module.


    ```

    type Rows struct {

    dc          *driverConn

    releaseConn func(error)

    ...

    closemu sync.RWMutex

    closed  bool

    lasterr error

    ...

    }

    ```


    ## Summary


    In this chapter, you looked at an open source security project called Vuls, which
    provides vulnerability scanning capability. You learned about Vuls by checking
    out the code and performing a scan operation on your local machine.


    Vuls provides a lot of functionality. In learning how Vuls works, you learned
    about port scanning, executing external command-line applications from Go, and
    writing code that performs database operations using SQLite.


    # 14. CrowdSec


    In this chapter, you will look at an open source security tool called CrowdSec
    ([`https://github.com/crowdsecurity/crowdsec`](https://github.com/crowdsecurity/crowdsec)).
    There are few reasons why this tool is interesting to study:


    *   It uses crowd-sourced data to collect IP information across the globe, which
    is shared with the community.


    *   It offers code designs that are useful to look at and learn from


    *   The GeoIP database is interesting on its own.


    The chapter is broken down into the installation part and the learning part. In
    the installation part, you will look at installing CrowdSec to understand how
    it works. In the learning section, you will look deeply into how CrowdSec implements
    something that you can learn from by looking at sample code.


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ## CrowdSec Project


    The documentation at [`https://doc.crowdsec.net/docs/intro`](https://doc.crowdsec.net/docs/intro)
    explain it nicely:


    CrowdSec is an open-source and lightweight software that allows you to detect
    peers with malevolent behaviors and block them from accessing your systems at
    various levels (infrastructural, system, applicative).


    CrowdSec, as an open source security tool, provides quite a number of features
    that sit nicely in a cloud environment. The thing that is intriguing about the
    tool is the data that is collected by the community. This crowd-sourced data allows
    CrowdSec to determine whether a certain IP address has to be banned or should
    be allowed into your infrastructure.


    There are many architectures and code designs that you are going to learn from
    the project, which you will explore more in the “Learning From CrowdSec” section.'
