- fmt: '# Linux Namespace


    In this section, you will look at namespaces, which are key components in running
    containers on your local or cloud environment. Namespaces are features that are
    only available in the Linux kernel, so everything that you will read here is relevant
    to the Linux operating system.


    A namespace is a feature provided by the Linux kernel for applications to use,
    so what actually is it? It is used to create an isolated environment for processes
    that you want to run with their own resources.


    Figure [4-1](#527551_1_En_4_Chapter.xhtml#Fig1) shows a representation of each
    isolated namespace that is running applications with its own network. Each application
    that is running inside a namespace cannot access anything outside its own namespace.
    For example, App1 cannot access App2 resources. If for some reason App1 crashes,
    it will not bring down the other applications, nor it will bring down the Linux
    host. Think of a namespace as an island to run applications; it can provide anything
    you need for the applications to run on without disturbing the other surrounding
    islands.


    ![](images/527551_1_En_4_Chapter/527551_1_En_4_Fig1_HTML.jpg)


    A diagram of the Linux namespace has blocks with app and network numbered 1 to
    3.


    Figure 4-1


    Linux namespace


    You can create namespaces using tools that are already available in the Linux
    system. One of the tools you are going to experiment with is called `unshare`.
    It is a tool that allows users to create namespaces and run applications inside
    that namespace.


    Before you run `unshare`, let’s take a look my local host machine compared to
    when I run the app using `unshare`. We will compare the following:


    *   The applications that are running in the host machine compared to when we
    run them inside a namespace


    *   The available network interface in a host machine compared to when inside
    the namespace


    To list running applications on my local Linux machine, I use the command `ps`.


    ```

    ps au

    ```


    The following is a snippet of the list of applications that are currently running
    on my local machine:


    ```

    USER         PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND

    ...

    nanik       2551    0.0  0.0  231288    4  tty2     SNl+ May09  0:00 /usr/libexec/gnome-session-binary
    --systemd --session=pop

    nanik       6418    0.0  0.0  21644   712  pts/0    S<s  May09  0:00 bash

    nanik       8594    0.0  0.0  22820     8  pts/2    S<s  May09  0:00 bash

    nanik       9828    0.0  0.0  22516  4300  pts/3    S<s+ May09  0:03 bash

    ...

    nanik       295802  0.0  0.0  1716900 6408 pts/7    S<l+ May11  2:18 docker run
    -p 6379:6379 redis

    nanik       511876  0.0  0.0  21288    24  pts/6    S<s  May13   0:00 bash

    nanik       642244  0.0  0.0  21420     8  pts/8    S<s+ May14   0:00 bash

    ...

    root        1368986 0.0  0.0  25220   108  pts/3    T<   May19   0:00 sudo gedit
    /etc/hosts

    ```


    To look at the available network interface on local machine, use the command `ip`.


    ```

    ip link

    ```


    It shows the following interfaces:


    ```

    1: lo:  mtu 65536 qdisc noqueue state UNKNOWN mode DEFAULT group default qlen
    1000

    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00

    2: enp4s0:  mtu 1500 qdisc fq_codel state DOWN mode DEFAULT group default qlen
    1000

    link/ether 88:a4:c2:a4:85:ac brd ff:ff:ff:ff:ff:ff

    3: wlp0s20f3:  mtu 1500 qdisc noqueue state UP mode DORMANT group default qlen
    1000  link/ether xx:xx:xa:xx:xx:xx brd  xx:xx:xx:xx:xx:xx

    ...

    5: docker0:  mtu 1500 qdisc noqueue state UP mode DEFAULT group default

    link/ether xx:xx:xa:xx:xx:xx brd ff:ff:ff:ff:ff:ff

    ...

    447: thebridge:  mtu 1500 qdisc noop state DOWN mode DEFAULT group default

    link/ether xx:xx:xa:xx:xx:xx brd ff:ff:ff:ff:ff:ff

    ```


    As you can see, there are many processes running in the local host machine and
    there are many network interfaces.


    Run the following command to create a namespace and run bash inside the namespace
    as the application:


    ```

    unshare --user --pid --map-root-user --cgroup --mount-proc --net --uts --fork
    bash

    ```


    It will look like Figure [4-2](#527551_1_En_4_Chapter.xhtml#Fig2).


    ![](images/527551_1_En_4_Chapter/527551_1_En_4_Fig2_HTML.jpg)


    A screenshot of the output screen depicts two factors of running `unshare` named
    Nanik and root.


    Figure 4-2


    Running `unshare`


    Inside the new namespace, as seen in Figure [4-2](#527551_1_En_4_Chapter.xhtml#Fig2),
    it will only display two processes and one network interface (local interface).
    This shows that the namespace is isolating access to the host machine.


    You have looked at using `unshare` to create namespaces and run `bash` as an application
    isolated in its own namespace. Now that you have a basic understanding of namespaces,
    you will explore another piece of the puzzle called cgroups in the next section.'
