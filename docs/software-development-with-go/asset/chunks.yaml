- fmt: '# 5. Containers with Networking


    In Chapter 4, you learned about the different features of the Linux kernel used
    for containers. You also explored namespaces and how they help applications isolate
    from other processes. In this chapter, you will focus solely on the network namespace
    and understand how it works and how to configure it.


    The network namespace allows applications that run on their own namespaces to
    have a network interface that allows running processes to send and receive data
    to the host or to the Internet. In this chapter, you will learn how to do the
    following:


    - Create your own network namespace

    - Communicate with the host

    - Use network space in Go


    ## Source Code


    The source code for this chapter is available from the `https://github.com/Apress/Software-Development-Go`
    repository.


    ### Network Namespace


    In Chapter 4, you looked at namespaces, which are used to create a virtual isolation
    for an application, which is one of the key ingredients in running applications
    inside a container. The network namespace is another isolation feature that applications
    need because it allows them to communicate with the host or the Internet.


    Why is the network namespace important?


    Looking at Figure 5-1, you can see that there are two different applications running
    on a single host in different namespaces and each of the namespaces has their
    own network namespace.


    ![Figure 5-1](images/527551_1_En_5_Chapter/527551_1_En_5_Fig1_HTML.jpg)


    A framework of the Linux host includes 2 namespaces named red and blue. Both the
    host includes an app and network.


    *Figure 5-1* Network namespaces


    The applications are allowed to talk to each other, but they are not allowed to
    talk to the host and vice versa. This not only makes the applications more secure,
    but also it makes the application easier to maintain because it does not need
    to worry about services outside the host.


    Using a network namespace requires a few things to be configured properly in order
    for the application to use it. Figure 5-2 shows the different things that are
    needed.


    ![Figure 5-2](images/527551_1_En_5_Chapter/527551_1_En_5_Fig2_HTML.jpg)


    A framework of the Linux host shows a namespace labeled red and includes network
    `l0` and network `peer0` reversibly linked to `veth0` and further to `br0`.


    *Figure 5-2* Virtual networks


    Let''s take a look at them individually:


    | Network (`lo`) | In your computer, you normally access servers that are running
    locally using `localhost`. This inside the network namespace is also configured
    the same; it is known as `lo`. |

    | --- | --- |

    | Network (`peer0`) | This is known as a peer name, and it is configured for the
    namespace that will communicate with traffic outside the namespace. As shown in
    Figure 5-2, it communicates with `veth0`. |

    | `veth0` | This is called a virtual ethernet and it is configured in the host
    computer. The virtual ethernet, or in this case `veth0`, communicates between
    the host and the namespace. |

    | `br0` | This is a virtual switch. It''s also known as a bridge. Any network
    attached to the bridge can communicate with the others. In this case, there is
    only one virtual ethernet (`veth0`) but if there was another virtual ethernet,
    they could communicate with each other. |


    Now that you have a good understanding of the different things that need to be
    configured in a network namespace, in the next section you will explore using
    a Linux tool to play around with network namespaces.


    ### Setting Up with the ip Tool


    In this section, you will look at setting up two different network namespaces
    and each will be assigned its own IP address. The script will use the standard
    Linux tool called `ip`. If you don''t have the tool installed on your machine,
    use the following command to install it:


    ```

    sudo apt-get install -y iproute

    sudo apt-get install -y iproute2

    ```


    The script will set up the network namespaces to allow them to access each other
    but they cannot communicate with any external services. The script can be found
    inside the `chapter5/ns` directory. Change to this directory and execute it as
    follows (make sure you run it as root):


    ```

    sudo ./script.sh

    ```


    You will get output that looks like the following:


    ```

    ...

    64: virt0:  mtu 1500 qdisc pfifo_fast state DOWN mode DEFAULT group default qlen
    1000

    ...

    66: virt1:  mtu 1500 qdisc pfifo_fast state UNKNOWN mode DEFAULT group default
    qlen 1000

    ...

    PING 10.0.0.1 (10.0.0.1) 56(84) bytes of data.

    64 bytes from 10.0.0.1: icmp_seq=1 ttl=64 time=0.069 ms

    64 bytes from 10.0.0.1: icmp_seq=2 ttl=64 time=0.052 ms

    ...

    --- 10.0.0.1 ping statistics ---

    5 packets transmitted, 5 received, 0% packet loss, time 3999ms

    rtt min/avg/max/mdev = 0.044/0.053/0.069/0.009 ms

    PING 10.0.0.1 (10.0.0.1) 56(84) bytes of data.

    64 bytes from 10.0.0.1: icmp_seq=1 ttl=64 time=0.060 ms

    64 bytes from 10.0.0.1: icmp_seq=2 ttl=64 time=0.044 ms

    ...

    --- 10.0.0.1 ping statistics ---

    5 packets transmitted, 5 received, 0% packet loss, time 3999ms

    rtt min/avg/max/mdev = 0.044/0.053/0.060/0.006 ms

    PING 10.0.0.10 (10.0.0.10) 56(84) bytes of data.

    64 bytes from 10.0.0.10: icmp_seq=1 ttl=64 time=0.031 ms

    64 bytes from 10.0.0.10: icmp_seq=2 ttl=64 time=0.035 ms

    ...

    --- 10.0.0.10 ping statistics ---

    5 packets transmitted, 5 received, 0% packet loss, time 3999ms

    rtt min/avg/max/mdev = 0.031/0.037/0.047/0.005 ms

    PING 10.0.0.10 (10.0.0.10) 56(84) bytes of data.

    64 bytes from 10.0.0.10: icmp_seq=1 ttl=64 time=0.070 ms

    64 bytes from 10.0.0.10: icmp_seq=2 ttl=64 time=0.070 ms

    ...

    --- 10.0.0.10 ping statistics ---

    5 packets transmitted, 5 received, 0% packet loss, time 3999ms

    rtt min/avg/max/mdev = 0.043/0.058/0.070/0.013 ms

    PING 10.0.0.11 (10.0.0.11) 56(84) bytes of data.

    64 bytes from 10.0.0.11: icmp_seq=1 ttl=64 time=0.070 ms

    64 bytes from 10.0.0.11: icmp_seq=2 ttl=64 time=0.042 ms

    ...

    --- 10.0.0.11 ping statistics ---

    5 packets transmitted, 5 received, 0% packet loss, time 3999ms

    rtt min/avg/max/mdev = 0.042/0.057/0.070/0.010 ms

    PING 10.0.0.11 (10.0.0.11) 56(84) bytes of data.

    64 bytes from 10.0.0.11: icmp_seq=1 ttl=64 time=0.032 ms

    ...

    ```


    The script creates two different namespaces called `ns1` and `ns2`, assigning
    virtual networks to both of them, as explained in the previous section. The virtual
    networks are assigned IP addresses `10.0.0.10` and `10.0.0.11`, and both networks
    are connected to each other via a bridge that is assigned IP address `10.0.0.1`.


    Let''s go through the script to understand what it is doing. The following snippet
    creates two network namespaces labeled `ns1` and `ns2`:


    ```

    ip netns add ns1

    ip netns add ns2

    ```


    Once the namespace has been set up, it will set up a local network interface inside
    the namespace.


    ```

    ip netns exec ns1 ip link set lo up

    ip netns exec ns1 ip link

    ip netns exec ns2 ip link set lo up

    ip netns exec ns2 ip link

    ```


    Now, you need to create a network bridge and assign `10.0.0.1` as its IP address.


    ```

    ip link add br0 type bridge

    ip link set br0 up

    # setup bridge IP

    ip addr add 10.0.0.1/8 dev br0

    ```


    Once the bridge has been set up, the script will link the virtual networks to
    the network namespaces and also link them to the bridge. This will link all the
    different virtual networks together through the bridge. The script will assign
    the different IP address to the virtual networks.'
