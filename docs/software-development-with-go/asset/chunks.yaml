    ### DNS 转发器


    在本节中，你将使用基于 UDP 的 DNS 转发器，将查询转发至外部 DNS 服务器，并利用响应结果向客户端回复。在你的代码中，将使用谷歌的公共 DNS 服务器
    `8.8.8.8` 来执行查询。


    代码首先要做的就是在本地创建一个 UDP 服务器，监听 `8090` 端口，如下所示：


    ```go

    func main() {

    dnsConfig := DNSConfig{

    ...

    port:         8090,

    }

    conn, err := net.ListenUDP("udp", &net.UDPAddr{Port: dnsConfig.port})

    ...

    }

    ```


    成功打开 `8090` 端口后，下一步是打开与外部 DNS 服务器的连接，并启动服务器。


    ```go

    func main() {

    dnsConfig := DNSConfig{

    dnsForwarder: "8.8.8.8:53",

    ...

    }

    ...

    dnsFwdConn, err := net.Dial("udp", dnsConfig.dnsForwarder)

    ...

    dnsServer := dns.NewServer(conn, dns.NewUDPResolver(dnsFwdConn))

    ...

    dnsServer.Start()

    }

    ```


    本地 UDP 服务器等待传入的 DNS 请求。一旦接收到传入的 UDP 请求，就会由 `handleRequest()` 进行处理。你在上一节中已经看到，读取
    UDP 请求的方式是调用 `ReadFromUDP(..)` 函数，如下所示：


    ```go

    func (s *Server) handleRequest() error {

    msg, clientAddr, err := s.readRequest()

    ...

    }

    func (s *Server) readRequest() (dnsmessage.Message, *net.UDPAddr, error) {

    buf := make([]byte, 1024)

    _, addr, err := s.conn.ReadFromUDP(buf)

    ...

    }

    ```


    `readRequest()` 函数在收到传入请求后，会使用内置的 `golang.org/x/n/dns` 包解包数据，如下所示：


    ```go

    func (s *Server) readRequest() (dnsmessage.Message, *net.UDPAddr, error) {

    ...

    var msg dnsmessage.Message

    err = msg.Unpack(buf)

    ...

    }

    ```


    解包后的数据现在存储在一个 `dnsmessage.Message` 结构体中，其声明如下：


    ```go

    type Message struct {

    Header

    Questions   []Question

    Answers     []Resource

    Authorities []Resource

    Additionals []Resource

    }

    ```


    代码成功解包了传入请求中的数据。下一步是将相同的请求发送至 DNS 转发器，并处理响应，以便将其转发回客户端。`ResolveDNS(..)` 函数将新创建的
    `dnsmessage.Message` 结构体发送至 DNS 转发器，并处理接收到的响应。


    ```go

    func (r *DNSResolver) ResolveDNS(msg dnsmessage.Message) (dnsmessage.Message,
    error) {

    packedMsg, err := msg.Pack()

    ...

    _, err = r.fwdConn.Write(packedMsg)

    ...

    resBuf := make([]byte, 1024)

    _, err = r.fwdConn.Read(resBuf)

    ...

    var resMsg dnsmessage.Message

    err = resMsg.Unpack(resBuf)

    ...

    }

    ```


    收到 DNS 转发器的响应后，`handleRequest(..)` 函数会根据 `ResolveDNS(..)` 的返回值，发送 DNS 正常响应或错误消息。


    ```go

    func (s *Server) handleRequest() error {

    ...

    rMsg, err := s.resolver.ResolveDNS(msg)

    if err != nil {

    s.sendResponseWithError(clientAddr, msg, err)

    ...

    }

    ...

    return s.sendResponse(clientAddr, rMsg)

    }

    ```


    `sendResponse(..)` 函数仅将接收自 DNS 转发器的消息打包，然后将其发送回客户端。


    ```go

    func (s *Server) sendResponseWithError(clientAddr *net.UDPAddr, msg dnsmessage.Message,
    err error) {

    ...

    err = s.sendResponse(clientAddr, msg)

    ...

    }

    func (s *Server) sendResponse(addr *net.UDPAddr, message dnsmessage.Message) error
    {

    packed, err := message.Pack()

    ...

    _, err = s.conn.WriteToUDP(packed, addr)

    }

    ```


    ### 打包与解包


    在上一节中，你了解了请求是如何通过解包响应，然后再打包并作为 DNS 响应发送回客户端来处理的。在本节中，你将了解 DNS 数据的结构。


    传入的请求以字节形式到达，这些字节会被解包或转换为 `Message` 结构体。


    ```go

    type Message struct {

    Header

    Questions   []Question

    Answers     []Resource

    Authorities []Resource

    Additionals []Resource

    }

    ```


    `Header` 字段包含以下结构，该结构对应 DNS 协议的头部：


    ```go

    type Header struct {

    ID                 uint16

    Response           bool

    OpCode             OpCode

    Authoritative      bool

    Truncated          bool

    RecursionDesired   bool

    RecursionAvailable bool

    RCode              RCode

    }

    ```


    `Resource` 结构体在 `Answers`、`Authorities` 和 `Additionals` 字段中使用，如下所示：


    ```go

    type Resource struct {

    Header ResourceHeader

    Body   ResourceBody

    }

    ```


    `Questions` 字段包含客户端所请求的 DNS 信息，而 `Answers` 字段则包含对这些问题的响应。图 10-1 展示了当使用 `dig` 命令（如下所示）对
    `google.com` 进行查询时，`dnsmessage.Message` 结构体在解包传入请求数据后所包含的内容：


    ![一张系统网络 DNS 数据代码的截图，包含消息、头部、ID、响应、操作码、截断、问题、名称、类型、类别、答案、头部和主体。](img/527551_1_En_10_Fig1_HTML.jpg)


    **图 10-1** 包含 DNS 查询数据的 `dnsmessage.Message`


    ```

    dig @localhost -p 8090 google.com

    ```


    图 10-2 展示了当字节被解包时，从 DNS 转发器接收到的响应。如你所见，`Answers` 字段中填充了查询的答案。


    ![一张系统网络 DNS 数据代码的截图，包含消息、头部、ID、响应、操作码、截断、问题、名称、类型、类别、答案、头部和主体。](img/527551_1_En_10_Fig2_HTML.jpg)


    **图 10-2** 包含 DNS 响应数据的 `dnsmessage.Message`


    ## 总结


    在本章中，你学习了更多关于使用 UDP 的细节。IP 协议栈的特性之一是能够使用 ICMP 协议检查服务器的可用性。你还学习了如何使用 UDP 编写一个 DNS
    转发器服务器，该服务器使用 `net/dns` 包标准库来处理 DNS 请求和响应。现在，你对标准库的特性有了比其提供的功能更深入的理解；同时，这也展示了这些库在帮助我们开发有用的网络工具方面的多功能性。


    # 11. Google gopacket


    在上一章中，你学习了如何使用 Go 标准库构建网络工具。在本章中，你将进一步研究谷歌提供的名为 `gopacket` 的开源网络库。该库的源代码可以在 [`github.com/google/gopacket`](https://github.com/google/gopacket)
    找到，库的文档可以在 [`pkg.go.dev/github.com/google/gopacket`](https://pkg.go.dev/github.com/google/gopacket)
    找到。你在本章中将要查看的源代码分支是 *master* 分支。


    `gopacket` 提供了标准库中无法找到的低层网络数据包操作能力。它为开发者提供了一个简单的 API，用来操作从网络接口获取的不同网络层的信息。在本章中，你将学习：


    - `gopacket` 的工作原理

    - 如何使用 `gopacket` 编写网络流量嗅探器

    - 关于网络捕获文件


    ## 源代码


    本章的源代码可从 [`github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。

