  raw: '### Hello Server systemd


    In this section, you will look at the sample code that can be found inside the
    `chapter17/httpservice` directory. The application is a simple HTTP server listening
    on port 8111\. Let’s run the application normally first using the following command
    in your terminal:


    ```

    go run main.go

    ```


    You will see output like following:


    ```

    2022/06/24 22:55:40 Server running - port 8111

    ```


    Open your browser and access it using `http://localhost:8111`. You will see output
    that looks like the following:


    ![](images/527551_1_En_17_Chapter/527551_1_En_17_Fig2_HTML.jpg)


    A screenshot of the output screen reads Hello you are getting a response from
    an app running via systems.


    Figure 17-2


    HTTP server output


    The application is working now. Let''s create the executable file that you will
    use to run it as a `systemd` service. Compile the application using the following
    command. Make sure you are in the `chapter17/httpservice` directory.


    ```

    go build -o httpservice

    ```


    Your application is now ready to be installed as a `systemd` service. Follow the
    steps below to do the installation.


    1.  Copy the `httpservice` executable file into the `/usr/local/bin` directory
    in your terminal, as shown:


    1.  Copy the `httpservice.service` file into the `/etc/systemd/system` directory
    in your terminal, as shown:


    ```

    sudo cp ./httpservice /usr/local/bin

    ```


    1.  Take a look at the status of your newly created service using the following
    command:


    ```

    sudo cp ./httpservice.service /etc/systemd/system

    ```


    ```

    sudo systemctl status  httpservice.service

    ```


    You will see output as follows:


    ```

    ○ httpservice.service - HTTP Server Application

    Loaded: loaded (/etc/systemd/system/httpservice.service; disabled; vendor preset:
    enabled)

    Active: inactive (dead)

    ```


    The service is recognized by `systemd` but it is not enabled or dead.


    1.  Start/enable the service using the following command:


    1.  If you run the same status command (step 3), you will get the following output:


    ```

    sudo systemctl start  httpservice.service

    ```


    1.  To ensure that the service starts up when you reboot your machine, use the
    following command:


    ```

    ● httpservice.service - HTTP Server Application

    Loaded: loaded (/etc/systemd/system/httpservice.service; disabled; vendor preset:
    enabled)

    Active: active (running) since Fri 2022-06-24 23:09:34 AEST; 39s ago

    Main PID: 44068 (httpservice)

    Tasks: 5 (limit: 9294)

    Memory: 1.0M

    CPU: 3ms

    CGroup: /system.slice/httpservice.service

    └─44068 /usr/local/bin/httpservice

    Jun 24 23:09:34 nanik systemd[1]: Started HTTP Server Application.

    Jun 24 23:09:34 nanik httpservice[44068]: 2022/06/24 23:09:34 Server running -
    port 8111

    ```


    ```

    sudo systemctl enable  httpservice.service

    ```


    Now you can access the application by pointing your browser to http://localhost:8111.


    You have successfully deployed your sample app. It is configured to start up when
    you boot up your machine. In next section, you will look at using a Go library
    to write a system application.


    ### go-systemd Library


    You learned early in this chapter that the D-Bus specification contains a client
    library. The client library allows applications to interact with `system`. The
    client library that you are going to take a look at is for a Go application called
    `go-systemd`. The library can be found at `http:/`[`github.com/coreos/go-systemd`](http://github.com/coreos/go-systemd)`.`


    The library provides the following features:


    *   Using socket activation


    *   Notifying `systemd` of service status changes


    *   Starting, stopping, and inspecting services and units


    *   Registering machines or containers


    *   …and many more


    For this chapter, you will look at code samples using the library to write to
    journal logs, list services available on local machines, and query machines.


    #### Querying Services


    The sample code for this section can be found inside the `chapter17/listservices`
    directory. The sample code queryies from `systemd` all the services that are registered,
    similar to how `systemctl list-units` works.


    Open your terminal and make sure you are inside the `chapter17/listservices` directory.
    Build the application as follows:


    ```

    go build -o listservices

    ```


    Once compiled, run the executable as root.


    ```

    sudo ./listservices

    ```


    You will see output of the services registered in `systemd`.


    ```

    ...

    Name : sys-module-fuse.device, LoadState : loaded, ActiveState : active, Substate
    : plugged

    Name : gdm.service, LoadState : loaded, ActiveState : active, Substate : running

    Name : sysinit.target, LoadState : loaded, ActiveState : active, Substate : active

    Name : graphical.target, LoadState : loaded, ActiveState : active, Substate :
    active

    Name : veritysetup.target, LoadState : loaded, ActiveState : active, Substate
    : active

    ...

    Name : remote-fs-pre.target, LoadState : loaded, ActiveState : inactive, Substate
    : dead

    Name : apt-daily-upgrade.timer, LoadState : loaded, ActiveState : active, Substate
    : waiting

    Name : ssh.service, LoadState : loaded, ActiveState : active, Substate : running

    Name : system.slice, LoadState : loaded, ActiveState : active, Substate : active

    Name : systemd-ask-password-plymouth.path, LoadState : loaded, ActiveState : active,
    Substate : waiting

    Name : dev-ttyS15.device, LoadState : loaded, ActiveState : active, Substate :
    plugged

    ...

    ```


    Let’s walk through the code to understand how the app uses the library. The following
    snippet shows that it is using the `NewSystemdConnectionContext` function to connect
    to the `systemd` server:


    ```

    import (

    ...

    )

    func main() {

    ...

    c, err := d.NewSystemdConnectionContext(ctx)

    ...

    }

    ```


    Once it successfully connects to `systemd`, it sends a request to get the list
    of units and print it out to the console.


    ```

    import (

    ...

    )

    func main() {

    ...

    js, err := c.ListUnitsContext(ctx)

    ...

    for _, j := range js {

    fmt.Println(fmt.Sprintf("Name : %s, LoadState : %s, ActiveState : %s, Substate
    : %s", j.Name, j.LoadState, j.ActiveState, j.SubState))

    }

    c.Close()

    }

    ```


    The library takes care of all the heavy lifting of connecting to `systemd`, sending
    requests, and converting requests to a format that it passes to the application.'
  trans: "\n### 你好，服务器系统守护进程（systemd）\n\n在本节中，你将了解到位于 `chapter17/httpservice` 目录下的示例代码。该应用是一个简单的\
    \ HTTP 服务器，监听在 8111 端口。让我们先在终端中使用以下命令正常启动应用：\n\n```\ngo run main.go\n```\n\n你将看到类似如下的输出：\n\
    \n```\n2022/06/24 22:55:40 Server running - port 8111\n```\n\n打开浏览器并访问 `http://localhost:8111`，你将看到类似下面的输出：\n\
    \n![](img/527551_1_En_17_Fig2_HTML.jpg)\n\n输出屏幕截图显示：你好，你正在从一个通过系统守护进程运行的应用中获取响应。\n\
    \n**图 17-2** HTTP 服务器输出\n\n应用现在正在运行。让我们创建可执行文件，用于将其作为 `systemd` 服务运行。使用以下命令编译应用。请确保你在\
    \ `chapter17/httpservice` 目录下。\n\n```\ngo build -o httpservice\n```\n\n现在你的应用已准备好作为一个\
    \ `systemd` 服务进行安装。请按照以下步骤进行安装。\n\n1.  将 `httpservice` 可执行文件复制到终端中的 `/usr/local/bin`\
    \ 目录下，如下所示：\n\n    ```\n    sudo cp ./httpservice /usr/local/bin\n    ```\n\n\
    2.  将 `httpservice.service` 文件复制到终端中的 `/etc/systemd/system` 目录下，如下所示：\n\n    ```\n\
    \    sudo cp ./httpservice.service /etc/systemd/system\n    ```\n\n3.  使用以下命令查看你新创建的服务的状态：\n\
    \n    ```\n    sudo systemctl status httpservice.service\n    ```\n\n    你将看到如下输出：\n\
    \n    ```\n    ○ httpservice.service - HTTP Server Application\n    Loaded: loaded\
    \ (/etc/systemd/system/httpservice.service; disabled; vendor preset: enabled)\n\
    \    Active: inactive (dead)\n    ```\n\n    `systemd`已识别该服务，但它未启用或处于停止状态。\n\n\
    4.  使用以下命令启动/启用该服务：\n\n    ```\n    sudo systemctl start httpservice.service\n\
    \    ```\n\n    如果你再次运行相同的状态命令（步骤 3），你将得到以下输出：\n\n    ```\n    ● httpservice.service\
    \ - HTTP Server Application\n    Loaded: loaded (/etc/systemd/system/httpservice.service;\
    \ disabled; vendor preset: enabled)\n    Active: active (running) since Fri 2022-06-24\
    \ 23:09:34 AEST; 39s ago\n    Main PID: 44068 (httpservice)\n    Tasks: 5 (limit:\
    \ 9294)\n    Memory: 1.0M\n    CPU: 3ms\n    CGroup: /system.slice/httpservice.service\n\
    \    └─44068 /usr/local/bin/httpservice\n    Jun 24 23:09:34 nanik systemd[1]:\
    \ Started HTTP Server Application.\n    Jun 24 23:09:34 nanik httpservice[44068]:\
    \ 2022/06/24 23:09:34 Server running - port 8111\n    ```\n\n5.  为确保机器重启时服务自动启动，请使用以下命令：\n\
    \n    ```\n    sudo systemctl enable httpservice.service\n    ```\n\n现在，你可以通过浏览器访问\
    \ `http://localhost:8111` 来使用该应用。\n\n你已成功部署了示例应用。它已配置为在机器启动时自动启动。在下一节中，你将了解如何使用\
    \ Go 库来编写一个系统应用。\n\n### go-systemd 库\n\n本章前面你已经了解到，D-Bus 规范包含一个客户端库。该客户端库允许应用程序与`system`进行交互。你将了解的这个客户端库是专为\
    \ Go 应用程序设计的，名为`go-systemd`。该库可在 `http://github.com/coreos/go-systemd` 找到。\n\n\
    该库提供以下功能：\n\n*   使用套接字激活\n*   向`systemd`通知服务状态变化\n*   启动、停止和检查服务与单元\n*   注册机器或容器\n\
    *   ……以及更多功能\n\n对于本章，你将查看使用该库的代码示例，包括写入日志记录、列出本地机器上的可用服务以及查询机器信息。\n\n#### 查询服务\n\
    \n本节的示例代码可在 `chapter17/listservices` 目录下找到。示例代码从`systemd`中查询所有已注册的服务，其工作方式类似于\
    \ `systemctl list-units` 命令。\n\n打开终端，确保你在 `chapter17/listservices` 目录下。按如下方式构建应用：\n\
    \n```\ngo build -o listservices\n```\n\n编译完成后，以 root 身份运行可执行文件。\n\n```\nsudo ./listservices\n\
    ```\n\n你将看到在`systemd`中注册的服务的输出。\n\n```\n...\nName : sys-module-fuse.device, LoadState\
    \ : loaded, ActiveState : active, Substate : plugged\nName : gdm.service, LoadState\
    \ : loaded, ActiveState : active, Substate : running\nName : sysinit.target, LoadState\
    \ : loaded, ActiveState : active, Substate : active\nName : graphical.target,\
    \ LoadState : loaded, ActiveState : active, Substate : active\nName : veritysetup.target,\
    \ LoadState : loaded, ActiveState : active, Substate : active\n...\nName : remote-fs-pre.target,\
    \ LoadState : loaded, ActiveState : inactive, Substate : dead\nName : apt-daily-upgrade.timer,\
    \ LoadState : loaded, ActiveState : active, Substate : waiting\nName : ssh.service,\
    \ LoadState : loaded, ActiveState : active, Substate : running\nName : system.slice,\
    \ LoadState : loaded, ActiveState : active, Substate : active\nName : systemd-ask-password-plymouth.path,\
    \ LoadState : loaded, ActiveState : active, Substate : waiting\nName : dev-ttyS15.device,\
    \ LoadState : loaded, ActiveState : active, Substate : plugged\n...\n```\n\n让我们逐步分析代码，了解应用如何使用该库。以下代码片段显示它正在使用\
    \ `NewSystemdConnectionContext` 函数连接到 `systemd` 服务器：\n\n```\nimport (\n...\n)\n\
    func main() {\n...\nc, err := d.NewSystemdConnectionContext(ctx)\n...\n}\n```\n\
    \n成功连接到 `systemd` 后，它会发送请求以获取单元列表并将其打印到控制台。\n\n```\nimport (\n...\n)\nfunc main()\
    \ {\n...\njs, err := c.ListUnitsContext(ctx)\n...\nfor _, j := range js {\nfmt.Println(fmt.Sprintf(\"\
    Name : %s, LoadState : %s, ActiveState : %s, Substate : %s\", j.Name, j.LoadState,\
    \ j.ActiveState, j.SubState))\n}\nc.Close()\n}\n```\n\n该库负责处理所有繁重的工作，包括连接到 `systemd`、发送请求，并将请求转换为适合传递给应用的格式。\n"
- fmt: '### Journal


    Another example you will look at is using the library to write log messages to
    the journal that provides a logging service. To access the logging service, you
    can use the `journalctl` command line.


    ```

    journalctl -r

    ```


    The output looks like following on my local machine (it will look different in
    your machine):


    ```

    ...

    Jun 25 00:06:43 nanik sshd[2567]: pam_unix(sshd:session): session opened for user
    nanik(uid=1000) by (uid=0)

    ...

    Jun 25 00:00:32 nanik kernel: audit: type=1400 audit(1656079232.440:30): apparmor="DENIED"
    operation="capable" profile="/usr/sbin/cups-browsed" pid=2527 comm="cups-browsed"
    capability=23  c>

    Jun 25 00:00:32 nanik audit[2527]: AVC apparmor="DENIED" operation="capable" profile="/usr/sbin/cups-browsed"
    pid=2527 comm="cups-browsed" capability=23  capname="sys_nice"

    Jun 25 00:00:32 nanik systemd[1]: Finished Rotate log files.

    ...

    ```


    The parameter `-r` shows the latest log message on the top. Now you know how to
    look at the journal logging service. Let''s run your sample application to write
    log messages into it.


    Open terminal and make sure you are inside the `chapter17/journal` directory.
    Run the sample using the following command:


    ```

    go run main.go

    ```


    Open another terminal and run the same `journalctl -r` command. You will see the
    log message from the sample application in the output, as shown:


    ```

    Jun 25 00:06:48 nanik journal[2591]: This log message is from Go application

    Jun 25 00:06:44 nanik systemd[908]: Started Tracker metadata extractor.

    Jun 25 00:06:44 nanik systemd[908]: Starting Tracker metadata extractor...

    Jun 25 00:06:44 nanik systemd-logind[778]: Removed session 6.

    Jun 25 00:06:44 nanik systemd[1]: session-6.scope: Deactivated successfully.

    ...

    ```


    The code to write to the journal is very simple.


    ```

    package main

    import (

    j "github.com/coreos/go-systemd/v22/journal"

    )

    func main() {

    j.Print(j.PriErr, "This log message is from Go application")

    }

    ```


    The `Print()` function prints the message *This log message is from Go application*
    with the error priority. This is normally printed in red when you view it using
    `journalctl`. The following is a list of the different priorities available from
    the library:


    ```

    const (

    PriEmerg Priority = iota

    PriAlert

    PriCrit

    PriErr

    PriWarning

    PriNotice

    PriInfo

    PriDebug

    )

    ```


    The following priorities are assigned the red color: `PriErr`, `PriCrit`, `PriAlert`,
    and `PriEmerg`. `PriNotice` and `PriWarning` are highlighted, and `PriDebug` is
    in lighter grey. One of the interesting priorities is `PriEmerg`, which broadcasts
    the log message to all open terminals in the local machine.


