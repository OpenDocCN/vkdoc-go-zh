- fmt: '### Init


    The `Init()` function is the first function called by `bubbletea` after calling
    the `Start()` function. You saw that `Init()` must return a `Cmd` type, which
    is declared as the function type shown here:


    ```

    type Cmd func() Msg

    ```


    The `Init()` functions use batches to return different kinds of function types:
    `spinner.Tick` and `runPretendProcess`. This is done by using the `tea.Batch()`
    function, as shown here:


    ```

    func (m model) Init() tea.Cmd {

    ...

    return tea.Batch(

    spinner.Tick,

    runPretendProcess,

    )

    }

    ```


    Internally, `tea.Batch()` returns an anonymous function that wraps the different
    `Cmd` function types into an array of `Cmd`, as shown in this snippet:


    ```

    type batchMsg []Cmd

    func Batch(cmds ...Cmd) Cmd {

    ...

    return func() Msg {

    return batchMsg(validCmds)

    }

    }

    ```


    After `bubbletea` completes calling the application `Init()` function, it kickstarts
    the process. Internally, it uses channels to read different incoming messages
    to perform different user interface operations, so in your sample code case, it
    processes the `batchMsg` array and starts calling the `Cmd` function types.


    The `Cmd` function type implementation returns `Msg`, which is an interface as
    defined in the library.


    ```

    type Msg interface{}

    ```


    In the sample code, you uses `spinner.Tick` and `runPretendProcess`, which are
    defined as follows:


    ```

    type processFinishedMsg time.Duration

    func Tick() tea.Msg {

    return TickMsg{Time: time.Now()}

    }

    func runPretendProcess() tea.Msg {

    ...

    return processFinishedMsg(pause)

    }

    ```


    Figure [16-6](#527551_1_En_16_Chapter.xhtml#Fig6) shows that the library uses
    a number of goroutines to do several things in the background including processing
    the `Msg` that are returned by the function types that will be used in the `Update()`
    function, which you will look at in the next section.


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig6_HTML.jpg)


    A framework of the sample code starts from the main function and then starts.
    Start returns the model and then classified into three parts named S I G N T,
    initCmD, and Msg.


    Figure 16-6


    Initialization of the internal execution flow


    ### Update


    The `Update` function is called to update the state of the user interface. In
    the sample app, it is defined as follows:


    ```

    func (m model) Update(msg tea.Msg) (tea.Model, tea.Cmd) {

    switch msg := msg.(type) {

    case tea.KeyMsg:

    ...

    return m, tea.Quit

    case spinner.TickMsg:

    ...

    m.spinner, cmd = m.spinner.Update(msg)

    ...

    case processFinishedMsg:

    ...

    m.results = append(m.results[1:], res)

    ...

    default:

    return m, nil

    }

    }

    ```


    The `Update` function receives different kinds of `tea.Msg` because it is defined
    as an interface, so the code needs to do type checking and handle the type it
    wants to handle. For example, when the function receives `spinner.TickMsg`, it
    updates the spinner by calling the `spinner.Update()` function, and when it receives
    `tea.KeyMsg`, it quits the application.


    The function only needs to process messages that it is interested in and process
    any user interface state management that it needs to do. Other heavy operations
    must be avoided in the function.


    ### View


    The last function, `View()`, is called by the library to update the user interface.
    The application is given the freedom to update the user interface as it sees fit.
    This flexibility allows the application to render a user interface that suits
    its needs.


    This does not mean that the application needs to know how to draw the user interface.
    This is taken care of by the functions available for each user interface. Here
    is the `View()` function:


    ```

    func (m model) View() string {

    s := "\n" +

    m.spinner.View() + " Doing some work...\n\n"

    for _, res := range m.results {

    ...

    }

    ...

    if m.quitting {

    s += "\n"

    }

    return indent.String(s, 1)

    }

    ```


    The app combines all the user interfaces that it needs to display to the user
    by extracting the different values from the different variables. For example,
    it extract the `results` array values to show it to the user. The `results` array
    is populated in the `Update` function when it receives the `processFinishedMsg`
    message type.


    The function returns a string containing the user interface that will be rendered
    by the library to the terminal.


    Figure [16-7](#527551_1_En_16_Chapter.xhtml#Fig7) shows at a high level the different
    goroutines that are spun off by the library and that take care of the different
    parts of the user interfaces such as user input using the keyboard, mouse, terminal
    resizing, and more.


    The architecture is like a pub/sub model where the central goroutine process all
    the different messages and calls the relevant functions internally to perform
    the operations.


    ![](images/527551_1_En_16_Chapter/527551_1_En_16_Fig7_HTML.png)


    A framework of process messages has six factors such as user input, process Cmds,
    terminal resize, tea dot msg function, update function, and view function.


    Figure 16-7


    Centralized processing of messages


    ## Summary


    In this chapter, you look at two different terminal-based user interface frameworks
    that provide APIs for developers to build command-line user interfaces. You looked
    at sample applications of how to use the frameworks to build simple command-line
    user interfaces.


    You looked at the internals of the frameworks to understand how they work. Knowing
