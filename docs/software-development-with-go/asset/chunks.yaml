    ### Machines


    One advanced feature that `systemd` provides is the ability to run virtual machines
    or containers in local machines. This feature does not come by default; there
    is extra installation of services and steps performed in order to use this feature.
    This feature is made available by installing a package called `systemd-container`.
    Let’s understand what this package is all about.


    The `systemd-container` package contains a number of tools, particularly the tool
    called `systemd-nspawn`. This tool is similar to `chroot` (which I discussed in
    Chapter [4](#527551_1_En_4_Chapter.xhtml)) but provides more advanced features
    such as virtualizing the file system hierarchy, process tree, and various IPC
    subsystems. Basically, it allows you to run a lightweight container with its own
    `rootfs`.


    The following steps will walk you through in installing the package and configuring
    it.


