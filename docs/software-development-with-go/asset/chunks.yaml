- fmt: "# Code Walkthrough\n\nYou are going to dive into the sample code to understand\
    \ how the whole thing works. The application starts off by calling the `Ping()`\
    \ function to ping a single domain. In this example, it will ping for the `golang.org`\
    \ domain.\n\n```\nfunc main() {\n\taddr := \"golang.org\"\n\tdst, dur, err :=\
    \ Ping(addr)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tlog.Printf(\"Ping %s (%s):\
    \ %s\\n\", addr, dst, dur)\n}\n```\n\nThe function performs a number of operations.\
    \ Let's take a look at the code section by section. The following code snippet\
    \ calls `icmp.ListenPacket()`, which is part of the `golang.org/x/net` standard\
    \ library package. This opens a local socket that will be used for ICMP communication\
    \ with the remote host.\n\n```\nfunc Ping(addr string) (*net.IPAddr, time.Duration,\
    \ error) {\n\t// Listen for ICMP reply\n\tc, err := icmp.ListenPacket(\"ip4:icmp\"\
    , ListenAddr)\n\tif err != nil {\n\t\treturn nil, 0, err\n\t}\n\tdefer c.Close()\n\
    \t...\n}\n```\n\nThe opened socket is used only for ICMP communication, which\
    \ means the socket can only understand ICMP network packets. When the local socket\
    \ has been successfully opened, the code must resolve the IP address of the domain\
    \ that the application wants to ping. The following code uses the `net.ResolveIPAddr()`\
    \ function call to resolve the domain to its respective IP address:\n\n```\ndst,\
    \ err := net.ResolveIPAddr(\"ip4\", addr)\nif err != nil {\n\tpanic(err)\n\treturn\
    \ nil, 0, err\n}\n```\n\nNow that you have opened a local socket connection for\
    \ ICMP and resolved the IP address of the destination domain, the next step is\
    \ to initialize the ICMP packet and send it off to the destination, as shown in\
    \ the following code snippets:\n\n```\n// Prepare new ICMP message\nm := icmp.Message{\n\
    \tType: ipv4.ICMPTypeEcho,\n\tCode: 0,\n\tBody: &icmp.Echo{\n\t\tID:   os.Getpid()\
    \ & 0xffff,\n\t\tSeq:  1,\n\t\tData: []byte(\"\"),\n\t},\n}\n```\n\nThe `icmp.Message`\
    \ struct defines the information that will be sent as an ICMP packet to the destination,\
    \ which is defined inside the `golang.org/x/net` package and looks like the following:\n\
    \n```\n// A Message represents an ICMP message.\ntype Message struct {\n\tType\
    \     Type        // type, either ipv4.ICMPType or ipv6.ICMPType\n\tCode     int\
    \         // code\n\tChecksum int         // checksum\n\tBody     MessageBody\
    \ // body\n}\n```\n\nThe ICMP packet can contain different kinds of ICMP parameters,\
    \ and this can be specified using the `Type` field. Here, you use the `ipv4.ICMPTypeEcho`\
    \ type. The following are the available types provided in Go:\n\n```\nconst (\n\
    \tICMPTypeEchoReply              ICMPType = 0  // Echo Reply\n\tICMPTypeDestinationUnreachable\
    \ ICMPType = 3  // Destination Unreachable\n\tICMPTypeRedirect               ICMPType\
    \ = 5  // Redirect\n\tICMPTypeEcho                   ICMPType = 8  // Echo\n\t\
    ICMPTypeRouterAdvertisement    ICMPType = 9  // Router Advertisement\n\tICMPTypeRouterSolicitation\
    \     ICMPType = 10 // Router Solicitation\n\tICMPTypeTimeExceeded           ICMPType\
    \ = 11 // Time Exceeded\n\tICMPTypeParameterProblem       ICMPType = 12 // Parameter\
    \ Problem\n\tICMPTypeTimestamp              ICMPType = 13 // Timestamp\n\tICMPTypeTimestampReply\
    \         ICMPType = 14 // Timestamp Reply\n\tICMPTypePhoturis               ICMPType\
    \ = 40 // Photuris\n\tICMPTypeExtendedEchoRequest    ICMPType = 42 // Extended\
    \ Echo Request\n\tICMPTypeExtendedEchoReply      ICMPType = 43 // Extended Echo\
    \ Reply\n)\n```\n\nOnce the type has been defined, the next field that needs to\
    \ contain information is the `Body` field. Here you use `icmp.Echo`, which will\
    \ contain echo requests:\n\n```\ntype Echo struct {\n\tID   int    // identifier\n\
    \tSeq  int    // sequence number\n\tData []byte // data\n}\n```\n\nData is converted\
    \ to the byte format using the `Marshal(..)` function and is then sent out to\
    \ a destination by using the `WriteTo(b, dst)` function.\n\n```\n...\n// Marshal\
    \ the data\nb, err := m.Marshal(nil)\nif err != nil {\n\treturn dst, 0, err\n\
    }\n...\n// Send ICMP packet now\nn, err := c.WriteTo(b, dst)\n```\n\nThe last\
    \ step is to read and parse the response message obtained from the server, as\
    \ shown here:\n\n```\n// Allocate 1500 byte for reading response\nreply := make([]byte,\
    \ 1500)\n// Set deadline of 1 minute\nerr = c.SetReadDeadline(time.Now().Add(1\
    \ * time.Minute))\n...\n// Read from the connection\nn, peer, err := c.ReadFrom(reply)\n\
    ...\n// Use ParseMessage to parsed the bytes received\nrm, err := icmp.ParseMessage(ICMPv4,\
    \ reply[:n])\nif err != nil {\n\treturn dst, 0, err\n}\n// Check for the type\
    \ of ICMP result\nswitch rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\treturn dst,\
    \ duration, nil\n...\n}\n```\n\nReading the packet is performed when calling the\
    \ `ReadFrom(..)` function with the result stored inside the `reply` variable.\
    \ The `reply` variable contains a sequence of bytes, which is the ICMP response.\
    \ To make it easy to read and manipulate the data, you use the `ParseMessage(..)`\
    \ function specifying the ICMP format type of `ICMPv4`. The return value will\
    \ be of type `Message` struct.\n\nOnce you have parsed the code, you check the\
    \ response type that is received, as shown in the following snippet:\n\n```\n\
    switch rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\treturn dst, duration, nil\n\
    default:\n\treturn dst, 0, fmt.Errorf(\"got %+v from %v; want echo reply\", rm,\
    \ peer)\n}\n```\n\nIn this section, you learned to open and use local socket connections\
    \ to send and receive data when using ICMP provided in the standard library. You\
    \ also learned how to parse and print the response like how a ping utility normally\
    \ does.\n\n## DNS Server\n\nUsing the knowledge from the previous chapter on writing\
    \ a UDP server, you will write a DNS server. The aim of this section is not to\
    \ write a full-blown DNS server, but rather to show how to use UDP to write it.\
    \ The DNS server is a DNS forwarder that uses other publicly available DNS servers\
    \ to perform the DNS lookup functionality, or you can think of it as a DNS server\
    \ proxy.\n\n### Running a DNS Server\n\nThe code is located inside the `chapter10/dnsserver`\
    \ folder. Compile the code as follows:\n\n```\ngo build -o dns cmd/main.go\n```\n\
    \nRun it by executing the `dns` executable:\n\n```\n./dns\n```\n\nYou get the\
    \ following message when the app starts up successfully:\n\n```\n2022/03/14 22:17:15\
    \ Starting up DNS server on port 8090\n```\n\nThe DNS server is now ready to serve\
    \ DNS requests on port 8090.\n\nTo test the DNS server, use `dig` as follows:\n\
    \n```\ndig @localhost  -p 8090 golang.org\n```\n\nYou get DNS output from `dig`,\
    \ something like the following:\n\n```\n; > DiG 9.11.5-P4-5.1ubuntu2.1-Ubuntu\
    \ > @localhost -p 8090 golang.org\n; (2 servers found)\n;; global options: +cmd\n\
    ;; Got answer:\n;; ->>HEADER<<- opcode: QUERY, status: NOERROR, id: 26897\n;;\
    \ flags: qr rd ra; QUERY: 1, ANSWER: 1, AUTHORITY: 0, ADDITIONAL: 1\n;; OPT PSEUDOSECTION:\n\
    ; EDNS: version: 0, flags:; udp: 512\n;; QUESTION SECTION:\n;golang.org.     \
    \               IN      A\n;; ANSWER SECTION:\ngolang.org.             294   \
    \  IN      A       142.250.71.81\n;; Query time: 6 msec\n;; SERVER: ::1#8090(::1)\n\
    ;; WHEN: Mon Mar 14 22:20:31 AEDT 2022\n;; MSG SIZE  rcvd: 55\n```\n\nYou can\
    \ also use `nslookup`, as follows:\n\n```\nnslookup -port=8090 golang.org localhost\n\
    ```\n\nNow that you have successfully run and used the DNS server, in the next\
    \ section you will look at how to write the code."
  raw: '### Code Walkthrough


    You are going to dive into the sample code to understand how the whole thing works.
    The application starts off by calling the `Ping()` function to ping a single domain.
    In this example, it will ping for the [`golang.org`](http://golang.org) domain.


    ```

    func main() {

    addr := "golang.org"

    dst, dur, err := Ping(addr)

    if err != nil {

    panic(err)

    }

    log.Printf("Ping %s (%s): %s\n", addr, dst, dur)

    }

    ```


    The function performs a number of operations. Let''s take a look at the code section
    by section. The following code snippet calls `icmp.ListenPacket()`, which is part
    of the [`golang.org/x/net`](http://golang.org/x/net) standard library package.
    This opens a local socket that will be used for ICMP communication with the remote
    host.


    ```

    func Ping(addr string) (*net.IPAddr, time.Duration, error) {

    // Listen for ICMP reply

    c, err := icmp.ListenPacket("ip4:icmp", ListenAddr)

    if err != nil {

    return nil, 0, err

    }

    defer c.Close()

    ...

    }

    ```


    The opened socket is used only for ICMP communication, which means the socket
    can only understand ICMP network packets. When the local socket has been successfully
    opened, the code must resolve the IP address of the domain that the application
    wants to ping. The following code uses the `net.ResolveIPAddr()` function call
    to resolve the domain to its respective IP address:


    ```

    dst, err := net.ResolveIPAddr("ip4", addr)

    if err != nil {

    panic(err)

    return nil, 0, err

    }

    ```


    Now that you have opened a local socket connection for ICMP and resolved the IP
    address of the destination domain, the next step is to initialize the ICMP packet
    and send it off to the destination, as shown in the following code snippets:


    ```

    // Prepare new ICMP message

    m := icmp.Message{

    Type: ipv4.ICMPTypeEcho,

    Code: 0,

    Body: &icmp.Echo{

    ID:   os.Getpid() & 0xffff,

    Seq:  1,

    Data: []byte(""),

    },

    }

    ```


    The `icmp.Message` struct defines the information that will be sent as an ICMP
    packet to the destination, which is defined inside the [`golang.org/x/net`](http://golang.org/x/net)
    package and looks like the following:


    ```

    // A Message represents an ICMP message.

    type Message struct {

    Type     Type        // type, either ipv4.ICMPType or ipv6.ICMPType

    Code     int         // code

    Checksum int         // checksum

    Body     MessageBody // body

    }

    ```


    The ICMP packet can contain different kinds of ICMP parameters, and this can be
    specified using the `Type` field. Here, you use the `ipv4.ICMPTypeEcho` type.
    The following are the available types provided in Go:


    ```

    const (

    ICMPTypeEchoReply              ICMPType = 0  // Echo Reply

    ICMPTypeDestinationUnreachable ICMPType = 3  // Destination Unreachable

    ICMPTypeRedirect               ICMPType = 5  // Redirect

    ICMPTypeEcho                   ICMPType = 8  // Echo

    ICMPTypeRouterAdvertisement    ICMPType = 9  // Router Advertisement

    ICMPTypeRouterSolicitation     ICMPType = 10 // Router Solicitation

    ICMPTypeTimeExceeded           ICMPType = 11 // Time Exceeded

    ICMPTypeParameterProblem       ICMPType = 12 // Parameter Problem

    ICMPTypeTimestamp              ICMPType = 13 // Timestamp

    ICMPTypeTimestampReply         ICMPType = 14 // Timestamp Reply

    ICMPTypePhoturis               ICMPType = 40 // Photuris

    ICMPTypeExtendedEchoRequest    ICMPType = 42 // Extended Echo Request

    ICMPTypeExtendedEchoReply      ICMPType = 43 // Extended Echo Reply

    )

    ```


    Once the type has been defined, the next field that needs to contain information
    is the `Body` field. Here you use `icmp.Echo`, which will contain echo requests:


    ```

    type Echo struct {

    ID   int    // identifier

    Seq  int    // sequence number

    Data []byte // data

    }

    ```


    Data is converted to the byte format using the `Marshal(..)` function and is then
    sent out to a destination by using the `WriteTo(b,dst)` function.


    ```

    ...

    // Marshal the data

    b, err := m.Marshal(nil)

    if err != nil {

    return dst, 0, err

    }

    ...

    // Send ICMP packet now

    n, err := c.WriteTo(b, dst)

    ```


    The last step is to read and parse the response message obtained from the server,
    as shown here:


    ```

    // Allocate 1500 byte for reading response

    reply := make([]byte, 1500)

    // Set deadline of 1 minute

    err = c.SetReadDeadline(time.Now().Add(1 * time.Minute))

    ...

    // Read from the connection

    n, peer, err := c.ReadFrom(reply)

    ...

    // Use ParseMessage to parsed the bytes received

    rm, err := icmp.ParseMessage(ICMPv4, reply[:n])

    if err != nil {

    return dst, 0, err

    }

    // Check for the type of ICMP result

    switch rm.Type {

    case ipv4.ICMPTypeEchoReply:

    return dst, duration, nil

    ...

    }

    ```


    Reading the packet is performed when calling the `ReadFrom(..)` function with
    the result stored inside the `reply` variable. The `reply` variable contains a
    sequence of bytes, which is the ICMP response. To make it easy to read and manipulate
    the data, you use the `ParseMessage(..)` function specifying the ICMP format type
    of ICMPv4\. The return value will be of type `Message` struct.


    Once you have parsed the code, you check the response type that is received, as
    shown in the following snippet:


    ```

    switch rm.Type {

    case ipv4.ICMPTypeEchoReply:

    return dst, duration, nil

    default:

    return dst, 0, fmt.Errorf("got %+v from %v; want echo reply", rm, peer)

    }

    ```


    In this section, you learned to open and use local socket connections to send
    and receive data when using ICMP provided in the standard library. You also learned
    how to parse and print the response like how a ping utility normally does.


    ## DNS Server


    Using the knowledge from the previous chapter on writing a UDP server, you will
    write a DNS server. The aim of this section is not to write a full-blown DNS server,
    but rather to show how to use UDP to write it. The DNS server is a DNS forwarder
    that uses other publicly available DNS servers to perform the DNS lookup functionality,
    or you can think of it as a DNS server proxy.


    ### Running a DNS Server


    The code is located inside the `chapter10/dnsserver` folder. Compile the code
    as follows:


    ```

    go build -o dns cmd/main.go

    ```


    Run it by executing the `dns` executable:


    ```

    ./dns

    ```


    You get the following message when the app starts up successfully:


    ```

    2022/03/14 22:17:15 Starting up DNS server on port 8090

    ```


    The DNS server is now ready to serve DNS requests on port 8090.


    To test the DNS server, use `dig` as follows:


    ```

    dig @localhost  -p 8090 golang.org

    ```


    You get DNS output from `dig`, something like the following:


    ```

    ; > DiG 9.11.5-P4-5.1ubuntu2.1-Ubuntu > @localhost -p 8090 golang.org

    ; (2 servers found)

    ;; global options: +cmd

    ;; Got answer:

    ;; ->>HEADER<<- opcode: QUERY, status: NOERROR, id: 26897

    ;; flags: qr rd ra; QUERY: 1, ANSWER: 1, AUTHORITY: 0, ADDITIONAL: 1

    ;; OPT PSEUDOSECTION:

    ; EDNS: version: 0, flags:; udp: 512

    ;; QUESTION SECTION:

    ;golang.org.                    IN      A

    ;; ANSWER SECTION:

    golang.org.             294     IN      A       142.250.71.81

    ;; Query time: 6 msec

    ;; SERVER: ::1#8090(::1)

    ;; WHEN: Mon Mar 14 22:20:31 AEDT 2022

    ;; MSG SIZE  rcvd: 55

    ```


    You can also use `nslookup`, as follows:


    ```

    nslookup -port=8090 golang.org localhost

    ```


    Now that you have successfully run and used the DNS server, in the next section
    you will look at how to write the code.'
  trans: "\n# 代码详解\n\n接下来您将深入阅读示例代码，了解其整体运作原理。应用程序首先调用 `Ping()` 函数对单个域名执行 ping 操作。在本示例中，将针对\
    \ `golang.org` 域名进行 ping。\n\n```\nfunc main() {\n\taddr := \"golang.org\"\n\t\
    dst, dur, err := Ping(addr)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tlog.Printf(\"\
    Ping %s (%s): %s\\n\", addr, dst, dur)\n}\n```\n\n该函数执行一系列操作，我们逐段查看代码。以下代码片段调用了\
    \ `icmp.ListenPacket()`，该函数属于 `golang.org/x/net` 标准库包。此函数会打开一个本地套接字，用于与远程主机进行\
    \ ICMP 通信。\n\n```\nfunc Ping(addr string) (*net.IPAddr, time.Duration, error)\
    \ {\n\t// 监听 ICMP 回复\n\tc, err := icmp.ListenPacket(\"ip4:icmp\", ListenAddr)\n\
    \tif err != nil {\n\t\treturn nil, 0, err\n\t}\n\tdefer c.Close()\n\t...\n}\n\
    ```\n\n打开的套接字仅用于 ICMP 通信，这意味着该套接字只能理解 ICMP 网络数据包。当本地套接字成功打开后，代码必须解析目标域名的 IP 地址。以下代码使用\
    \ `net.ResolveIPAddr()` 函数调用将域名解析为对应的 IP 地址：\n\n```\ndst, err := net.ResolveIPAddr(\"\
    ip4\", addr)\nif err != nil {\n\tpanic(err)\n\treturn nil, 0, err\n}\n```\n\n\
    现在您已打开用于 ICMP 的本地套接字连接并解析了目标域名的 IP 地址，下一步是初始化 ICMP 数据包并将其发送至目标，如下列代码片段所示：\n\n\
    ```\n// 准备新的 ICMP 消息\nm := icmp.Message{\n\tType: ipv4.ICMPTypeEcho,\n\tCode:\
    \ 0,\n\tBody: &icmp.Echo{\n\t\tID:   os.Getpid() & 0xffff,\n\t\tSeq:  1,\n\t\t\
    Data: []byte(\"\"),\n\t},\n}\n```\n\n`icmp.Message` 结构体定义了将作为 ICMP 数据包发送至目标的信息，该结构体定义在\
    \ `golang.org/x/net` 包中，内容如下：\n\n```\n// Message 表示一条 ICMP 消息。\ntype Message struct\
    \ {\n\tType     Type        // 类型，ipv4.ICMPType 或 ipv6.ICMPType\n\tCode     int\
    \         // 代码\n\tChecksum int         // 校验和\n\tBody     MessageBody // 消息体\n\
    }\n```\n\nICMP 数据包可以包含不同类型的 ICMP 参数，这可以通过 `Type` 字段指定。此处使用了 `ipv4.ICMPTypeEcho`\
    \ 类型。以下是 Go 语言中提供的可用类型：\n\n```\nconst (\n\tICMPTypeEchoReply              ICMPType\
    \ = 0  // 回显回复\n\tICMPTypeDestinationUnreachable ICMPType = 3  // 目标不可达\n\tICMPTypeRedirect\
    \               ICMPType = 5  // 重定向\n\tICMPTypeEcho                   ICMPType\
    \ = 8  // 回显\n\tICMPTypeRouterAdvertisement    ICMPType = 9  // 路由器通告\n\tICMPTypeRouterSolicitation\
    \     ICMPType = 10 // 路由器请求\n\tICMPTypeTimeExceeded           ICMPType = 11 //\
    \ 超时\n\tICMPTypeParameterProblem       ICMPType = 12 // 参数问题\n\tICMPTypeTimestamp\
    \              ICMPType = 13 // 时间戳\n\tICMPTypeTimestampReply         ICMPType\
    \ = 14 // 时间戳回复\n\tICMPTypePhoturis               ICMPType = 40 // Photuris\n\t\
    ICMPTypeExtendedEchoRequest    ICMPType = 42 // 扩展回显请求\n\tICMPTypeExtendedEchoReply\
    \      ICMPType = 43 // 扩展回显回复\n)\n```\n\n定义类型后，下一个需要包含信息的字段是 `Body` 字段。此处使用 `icmp.Echo`，它将包含回显请求：\n\
    \n```\ntype Echo struct {\n\tID   int    // 标识符\n\tSeq  int    // 序列号\n\tData\
    \ []byte // 数据\n}\n```\n\n数据通过 `Marshal(..)` 函数转换为字节格式，然后通过 `WriteTo(b, dst)`\
    \ 函数发送至目标。\n\n```\n...\n// 序列化数据\nb, err := m.Marshal(nil)\nif err != nil {\n\t\
    return dst, 0, err\n}\n...\n// 发送 ICMP 数据包\nn, err := c.WriteTo(b, dst)\n```\n\
    \n最后一步是读取并解析从服务器获得的响应消息，如下所示：\n\n```\n// 分配 1500 字节缓冲区用于读取响应\nreply := make([]byte,\
    \ 1500)\n// 设置 1 分钟的超时时间\nerr = c.SetReadDeadline(time.Now().Add(1 * time.Minute))\n\
    ...\n// 从连接中读取数据\nn, peer, err := c.ReadFrom(reply)\n...\n// 使用 ParseMessage 解析接收到的字节数据\n\
    rm, err := icmp.ParseMessage(ICMPv4, reply[:n])\nif err != nil {\n\treturn dst,\
    \ 0, err\n}\n// 检查 ICMP 结果的类型\nswitch rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\
    \treturn dst, duration, nil\n...\n}\n```\n\n读取数据包通过调用 `ReadFrom(..)` 函数完成，结果存储在\
    \ `reply` 变量中。`reply` 变量包含一个字节序列，即 ICMP 响应。为了便于读取和操作数据，使用 `ParseMessage(..)` 函数并指定\
    \ ICMP 格式类型 `ICMPv4`。返回值是 `Message` 结构体类型。\n\n解析代码后，检查接收到的响应类型，如下所示：\n\n```\n\
    switch rm.Type {\ncase ipv4.ICMPTypeEchoReply:\n\treturn dst, duration, nil\n\
    default:\n\treturn dst, 0, fmt.Errorf(\"从 %v 收到 %+v；期望回显回复\", peer, rm)\n}\n```\n\
    \n在本节中，您学习了在使用标准库提供的 ICMP 时，如何打开并使用本地套接字连接来发送和接收数据。您还学习了如何像 ping 工具那样解析和打印响应。\n\
    \n## DNS 服务器\n\n利用上一章编写 UDP 服务器的知识，您将编写一个 DNS 服务器。本节的目的是编写一个功能完整的 DNS 服务器，而是演示如何使用\
    \ UDP 来实现它。该 DNS 服务器是一个 DNS 转发器，它利用其他公开的 DNS 服务器来执行 DNS 查询功能，或者您可以将其视为一个 DNS 服务器代理。\n\
    \n### 运行 DNS 服务器\n\n代码位于 `chapter10/dnsserver` 文件夹中。编译代码如下：\n\n```\ngo build -o\
    \ dns cmd/main.go\n```\n\n通过执行 `dns` 可执行文件来运行它：\n\n```\n./dns\n```\n\n应用成功启动后会显示以下消息：\n\
    \n```\n2022/03/14 22:17:15 启动 DNS 服务器，端口 8090\n```\n\n现在 DNS 服务器已准备好在端口 8090 上服务\
    \ DNS 请求。\n\n要测试 DNS 服务器，请按如下方式使用 `dig`：\n\n```\ndig @localhost  -p 8090 golang.org\n\
    ```\n\n您会从 `dig` 得到类似如下的 DNS 输出：\n\n```\n; > DiG 9.11.5-P4-5.1ubuntu2.1-Ubuntu\
    \ > @localhost -p 8090 golang.org\n; (找到 2 个服务器)\n;; 全局选项: +cmd\n;; 获得回答:\n;;\
    \ ->>HEADER<<- opcode: QUERY, status: NOERROR, id: 26897\n;; flags: qr rd ra;\
    \ QUERY: 1, ANSWER: 1, AUTHORITY: 0, ADDITIONAL: 1\n;; OPT PSEUDOSECTION:\n; EDNS:\
    \ version: 0, flags:; udp: 512\n;; QUESTION SECTION:\n;golang.org.           \
    \         IN      A\n;; ANSWER SECTION:\ngolang.org.             294     IN  \
    \    A       142.250.71.81\n;; 查询时间: 6 毫秒\n;; SERVER: ::1#8090(::1)\n;; WHEN:\
    \ Mon Mar 14 22:20:31 AEDT 2022\n;; MSG SIZE  rcvd: 55\n```\n\n您也可以按如下方式使用 `nslookup`：\n\
    \n```\nnslookup -port=8090 golang.org localhost\n```\n\n现在您已成功运行并使用 DNS 服务器，下一节将介绍如何编写代码。\n"
- fmt: '### DNS Forwarder


    In this section, you will use a DNS forwarder that is based on UDP to forward
    the query to an external DNS server and use the response to report back to the
    client. In your code, you’ll use Google’s public DNS server `8.8.8.8` to perform
    the query.


    The first thing the code will do is to create a local UDP server that listens
    on port `8090`, as shown here:


    ```go

    func main() {

    dnsConfig := DNSConfig{

    ...

    port:         8090,

    }

    conn, err := net.ListenUDP("udp", &net.UDPAddr{Port: dnsConfig.port})

    ...

    }

    ```


    Once it successfully opens port `8090`, the next thing it will do is to open a
    connection to the external DNS server and start the server.


    ```go

    func main() {

    dnsConfig := DNSConfig{

    dnsForwarder: "8.8.8.8:53",

    ...

    }

    ...

    dnsFwdConn, err := net.Dial("udp", dnsConfig.dnsForwarder)

    ...

    dnsServer := dns.NewServer(conn, dns.NewUDPResolver(dnsFwdConn))

    ...

    dnsServer.Start()

    }

    ```


    The local UDP server waits for incoming DNS requests. Once it receives an incoming
    UDP request, it is processed by `handleRequest()`. You saw in the previous section
    that the way to read a UDP request is to call the `ReadFromUDP(..)` function,
    as shown here:


    ```go

    func (s *Server) handleRequest() error {

    msg, clientAddr, err := s.readRequest()

    ...

    }

    func (s *Server) readRequest() (dnsmessage.Message, *net.UDPAddr, error) {

    buf := make([]byte, 1024)

    _, addr, err := s.conn.ReadFromUDP(buf)

    ...

    }

    ```


    The `readRequest()` function, on receiving the incoming request, proceeds to unpack
    the data using the built-in `golang.org/x/n/dns` package, as shown here:


    ```go

    func (s *Server) readRequest() (dnsmessage.Message, *net.UDPAddr, error) {

    ...

    var msg dnsmessage.Message

    err = msg.Unpack(buf)

    ...

    }

    ```


    The unpacked data is now stored in a `dnsmessage.Message` struct that has the
    following declaration:


    ```go

    type Message struct {

    Header

    Questions   []Question

    Answers     []Resource

    Authorities []Resource

    Additionals []Resource

    }

    ```


    The code successfully unpacks the data from the incoming request. The next step
    is to send the same request to the DNS forwarder and process the response to be
    forwarded back to the client. The `ResolveDNS(..)` function sends the newly created
    `dnsmessage.Message` struct to the DNS forwarder and processes the received response.


    ```go

    func (r *DNSResolver) ResolveDNS(msg dnsmessage.Message) (dnsmessage.Message,
    error) {

    packedMsg, err := msg.Pack()

    ...

    _, err = r.fwdConn.Write(packedMsg)

    ...

    resBuf := make([]byte, 1024)

    _, err = r.fwdConn.Read(resBuf)

    ...

    var resMsg dnsmessage.Message

    err = resMsg.Unpack(resBuf)

    ...

    }

    ```


    On receiving a response from the DNS forwarder, the `handleRequest(..)` function
    sends either a DNS normal response or an error message, depending on the returned
    value from `ResolveDNS(..)`.


    ```go

    func (s *Server) handleRequest() error {

    ...

    rMsg, err := s.resolver.ResolveDNS(msg)

    if err != nil {

    s.sendResponseWithError(clientAddr, msg, err)

    ...

    }

    ...

    return s.sendResponse(clientAddr, rMsg)

    }

    ```


    The `sendResponse(..)` function just packs the received message from the DNS forwarder
    and sends it back to the client.


    ```go

    func (s *Server) sendResponseWithError(clientAddr *net.UDPAddr, msg dnsmessage.Message,
    err error) {

    ...

    err = s.sendResponse(clientAddr, msg)

    ...

    }

    func (s *Server) sendResponse(addr *net.UDPAddr, message dnsmessage.Message) error
    {

    packed, err := message.Pack()

    ...

    _, err = s.conn.WriteToUDP(packed, addr)

    }

    ```


    ### Pack and Unpack


    In the previous section, you looked at how requests are processed by unpacking
    the response and then packing and sending it back as a DNS response to a client.
    In this section, you will look at the structure of the DNS data.


    An incoming request comes in a byte, which is unpacked or converted to a `Message`
    struct.


    ```go

    type Message struct {

    Header

    Questions   []Question

    Answers     []Resource

    Authorities []Resource

    Additionals []Resource

    }

    ```


    The `Header` field contains the following structure, which corresponds to the
    header to the DNS protocol:


    ```go

    type Header struct {

    ID                 uint16

    Response           bool

    OpCode             OpCode

    Authoritative      bool

    Truncated          bool

    RecursionDesired   bool

    RecursionAvailable bool

    RCode              RCode

    }

    ```


    The `Resource` struct is used in the `Answers`, `Authorities`, and `Additionals`
    fields as follows:


    ```go

    type Resource struct {

    Header ResourceHeader

    Body   ResourceBody

    }

    ```


    The `Questions` field contains information about the DNS information that the
    client is requesting, while the `Answers` field contains the response to the questions.
    Figure 10-1 shows what the `dnsmessage.Message` struct contains when it unpacks
    data from an incoming request to query `google.com` using `dig` with the following
    command:


    ![A screenshot of system networking DNS data code includes the message, header,
    Id, response, Opcode, truncated, questions, name, type, class, answers, header,
    and body.](images/527551_1_En_10_Chapter/527551_1_En_10_Fig1_HTML.jpg)


    **Figure 10-1** `dnsmessage.Message` with DNS query data


    ```

    dig @localhost -p 8090 google.com

    ```


    Figure 10-2 shows the response received from the DNS forwarder when the bytes
    are unpacked. As you can see, the `Answers` field is populated with the answer
    to the query.


    ![A screenshot of system networking DNS data code includes the message, header,
    Id, response, Opcode, truncated, questions, name, type, class, answers, header,
    and body.](images/527551_1_En_10_Chapter/527551_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2** `dnsmessage.Message` with DNS response data


    ## Summary


    In this chapter, you learn more details about using UDP. One of the features of
    the IP stack is to check the availability of a server using the ICMP protocol.
    You also learned about using UDP to write a DNS forwarder server that uses the
    `net/dns` package standard library to process DNS requests and responses. You
    now have a better understanding of the features of the standard library than the
    capability that is provided; at the same time, it shows how versatile the libraries
    are in allowing us to develop useful network tools.


    # 11. Google gopacket


    In the previous chapter, you learned about building networking tools using the
    Go standard library. In this chapter, you will go further and investigate an open
    source library network library from Google called `gopacket`. The library source
    code can be found at [https://github.com/google/gopacket](https://github.com/google/gopacket)
    and the library documentation can be found at [https://pkg.go.dev/github.com/google/gopacket](https://pkg.go.dev/github.com/google/gopacket).
    The source branch that you will be looking at in this chapter is the *master*
    branch.


    `gopacket` provides low-level network packet manipulation that cannot be found
    inside the standard library. It provides developers with a simple API to manipulate
    different network layers’ information obtained from the network interface. In
    this chapter, you will learn:


    - How `gopacket` works

    - How to use `gopacket` to write a network traffic sniffer

    - About network capture files


    ## Source Code


    The source code for this chapter is available from the [https://github.com/Apress/Software-Development-Go](https://github.com/Apress/Software-Development-Go)
    repository.'
