    \ `machine1` 包，并通过调用 `New()` 函数来建立与 `systemd` 系统的连接。连接成功后，它使用 `ListImages()` 函数检索可用的镜像并将其打印到控制台。\n\
    \n```\npackage main\nimport (\nm \"github.com/coreos/go-systemd/v22/machine1\"\
    \n...\n)\nfunc main() {\nconn, err := m.New()\n...\ns, err := conn.ListImages()\n\
    ...\nfor _, img := range s {\nlog.Println(\"image - \"+img.Name, img.ImageType)\n\
    }\n}\n```\n\n### 小结\n\n在本章中，你了解了 `systemd` 及其在 Linux 操作系统中的功能。你探索了可用于与 `systemd`\
    \ 交互的不同工具，并查看了展示如何使用 `go-systemd` 库与 `systemd` 交互的 Go 代码示例。\n\n`go-systemd` 提供了与\
    \ `systemd` 交互的不同能力。你探索的高级特性之一是，与提供虚拟机和容器注册功能的 `systemd-machine` 服务进行交互。\n\n#\
    \ 18. cAdvisor\n\n在本章中，你将了解一个名为 cAdvisor 的开源项目，它代表 Container Advisor（容器顾问）。完整的源代码可以在\
    \ [`https://github.com/google/cadvisor`](https://github.com/google/cadvisor) 找到。本章使用的是该项目的\
    \ v0.39.3 版本。该项目用于收集正在运行的容器的资源使用情况和性能数据。cAdvisor 支持 Docker 容器，这也是本章将要重点介绍的内容。\n\
    \n选择此项目的原因是为了进一步探讨我们在前几章讨论过的主题，例如：\n\n*   使用系统调用来监控文件系统\n*   使用 cgroups\n*   使用\
    \ `/proc` 和 `/sys` 收集机器信息\n\n## 源代码\n\n本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
    \ 仓库获取。\n\n## 运行 cAdvisor\n\n本节将指导你如何检出 cAdvisor 源代码并在本地运行它。让我们首先使用以下命令来检出代码：\n\
    \n```\nGO111MODULE=off go get github.com/google/cadvisor\n```\n\n该命令使用 `go get`\
    \ 从给定的 URL 下载源代码。环境变量 `GO111MODULE=off` 告诉 `go` 工具获取模块（`google/cadvisor`）并将其存储在\
    \ `GOPATH` 目录中。模块下载完成后，你可以进入 `GOPATH/src` 目录，会看到如下内容：\n\n```\ndrwxrwxr-x 32 nanik\
    \ nanik  4096 Jun 17 22:31 ./\ndrwxrwxr-x  9 nanik nanik  4096 Jun 15 22:19 ../\n\
    drwxrwxr-x  2 nanik nanik  4096 Jun 17 22:31 accelerators/\n-rw-rw-r--  1 nanik\
