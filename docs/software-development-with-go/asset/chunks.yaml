    ### 使用 syscall 的 Web 服务器


    我们再来看另一个使用 `syscall` 包的示例，它位于 `chapter2/webserversyscall` 目录下。该示例代码是一个 Web 服务器，它使用
    `syscall` 包来创建 socket 连接。


    打开终端，按如下方式运行示例：


    ```

    go run main.go

    ```


    你将看到以下输出：


    ```

    2022/07/17 19:27:49 Listening on  127.0.0.1 : 8888

    ```


    该 Web 服务器现已准备好在 8888 端口接受连接。打开你的浏览器，输入 `http://localhost:8888`。你将在浏览器中收到一条响应：`Server
    with syscall`


    以下代码片段展示了负责启动监听 8888 端口服务器的函数：


    ```

    func startServer(host string, port int) (int, error) {

    fd, err := syscall.Socket(syscall.AF_INET, syscall.SOCK_STREAM, 0)

    if err != nil {

    log.Fatal("error (listen) : ", err)

    }

    sa := &syscall.SockaddrInet4{Port: port}

    addrs, err := net.LookupHost(host)

    ...

    for _, addr := range addrs {

    ...

    }

    ...

    return fd, nil

    }

    ```


    该代码执行了以下流程：


    *   创建一个 socket

    *   将 socket 绑定到端口 8888

    *   监听传入的请求


    该代码使用 `syscall.Socket` 来创建 socket。一旦成功创建 socket，它将通过调用 `syscall.Bind` 将其绑定到指定的端口
    8888，如下面的代码片段所示：


    ```

    for _, addr := range addrs {

    ...

    if err = syscall.Bind(fd, srv); err != nil {

    log.Fatal("error (bind) : ", err)

    }

    }

    ```


    绑定过程成功完成后，代码开始监听传入的请求，如下所示：


    ```

    if err = syscall.Listen(fd, syscall.SOMAXCONN); err != nil {

    log.Fatal("error (listening) : ", err)

    } else {

    log.Println("Listening on ", host, ":", port)

    }

    ```


    调用了 `syscall.Listen`，并传入 `syscall.SOMAXCONN` 作为参数。这指示操作系统，该代码希望分配最大队列来处理可能发生的待处理连接。现在，服务器已准备好接受连接。


    代码的下一部分接受并处理传入的请求，如下面的代码片段所示：


    ```

    for {

    cSock, cAddr, err := syscall.Accept(fd)

    if err != nil {

    ...

    }

    go func(clientSocket int, clientAddress syscall.Sockaddr) {

    err := syscall.Sendmsg(clientSocket, []byte(message), []byte{}, clientAddress,
    0)

    ...

    syscall.Close(clientSocket)

    }(cSock, cAddr)

    }

    ```


    该代码使用 `syscall.Accept` 开始接受传入的请求，如 `for{}` 循环中所示。对于每个被接受的请求，代码通过在一个独立的 go 例程中处理它来处理该请求。这使得服务器能够处理传入的请求而不会被阻塞。


    ## ELF 包


    标准库提供了不同的包，可用于与操作系统的不同部分进行交互。在前面的章节中，你通过使用不同的标准库包，了解了如何在系统级别进行交互。在本节中，你将了解 `debug/elf`
    包。


    该包为应用程序提供了与 ELF 文件交互的接口。ELF 代表可执行与可链接格式（Executable Linkable Format），这意味着 ELF 文件可以是用于链接进程以创建可执行文件的可执行文件或目标文件。我不会深入介绍
    ELF 的细节；更多信息可以在 [`https://linux.die.net/man/5/elf`](https://linux.die.net/man/5/elf)
    找到。


    ### 高级 ELF 格式


    ELF 是一种用于可执行文件、目标代码、共享库和核心转储的通用标准文件格式；它是跨平台的。图 2-2 从高级别展示了 ELF 文件的结构。


    ![](img/527551_1_En_2_Fig2_HTML.jpg)


    一个 E L F 文件的框图，展示了头部、程序头部表、点文本文件、点只读数据、点数据以及节头部表。


