    \ item := Record{} err := rows.Scan(&item.Id, &item.Name) ... records = append(records,\
    \ item) } return records }`\n\nThe function `ReadData()` uses the `SELECT` SQL\
    \ statement to read the fields from the table with the result sorted by the `InsertedDateTime`\
    \ field in ascending order. The code uses the `Query()` function, returning the\
