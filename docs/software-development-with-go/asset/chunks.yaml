- fmt: '# cgroups


    `cgroups` stands for control groups, which is a feature provided by the Linux
    kernel. Namespaces, which we discussed in the previous section, go hand in hand
    with `cgroups`. Let’s take a look at what `cgroups` contains. `cgroups` gives
    users the ability to limit certain resources such as the CPU and memory network
    allocated for a particular process or processes. Host machines resources are finite,
    and if you want to run multiple processes in separate namespaces, you want to
    allocate resources across different namespaces.


    `cgroups` resides inside the `/sys/fs/cgroup` directory. Let’s create a subdirectory
    inside the main `cgroup` directory and take a peek inside it. Run the following
    command to create a directory using root:


    ```

    sudo mkdir /sys/fs/cgroup/example

    ```


    List the directories inside the newly created directory using the following command:


    ```

    sudo ls /sys/fs/cgroup/example -la

    ```


    You will see output that looks like the following:


    ```

    -r--r--r--  1 root root 0 May 24 23:06 cgroup.controllers

    -r--r--r--  1 root root 0 May 24 23:06 cgroup.events

    -rw-r--r--  1 root root 0 May 24 23:06 cgroup.freeze

    ...

    -rw-r--r--  1 root root 0 May 24 23:06 cgroup.type

    -rw-r--r--  1 root root 0 May 24 23:06 cpu.idle

    -rw-r--r--  1 root root 0 May 24 23:06 cpu.max

    -rw-r--r--  1 root root 0 May 24 23:06 cpu.max.burst

    -rw-r--r--  1 root root 0 May 24 23:06 cpu.pressure

    -rw-r--r--  1 root root 0 May 24 23:06 cpuset.cpus

    -r--r--r--  1 root root 0 May 24 23:06 cpuset.cpus.effective

    -rw-r--r--  1 root root 0 May 24 23:06 cpuset.cpus.partition

    -rw-r--r--  1 root root 0 May 24 23:06 cpuset.mems

    -r--r--r--  1 root root 0 May 24 23:06 cpuset.mems.effective

    ...

    -rw-r--r--  1 root root 0 May 24 23:06 io.max

    ...

    -rw-r--r--  1 root root 0 May 24 23:06 memory.low

    -rw-r--r--  1 root root 0 May 24 23:06 memory.max

    -rw-r--r--  1 root root 0 May 24 23:06 memory.min

    -r--r--r--  1 root root 0 May 24 23:06 memory.numa_stat

    -rw-r--r--  1 root root 0 May 24 23:06 memory.oom.group

    -rw-r--r--  1 root root 0 May 24 23:06 memory.pressure

    ...

    ```


    The directories that you see are actually the configurations that you can set
    values relevant to the resources that you want to allocate for a particular process.
    Let’s take a look at an example.


    You will run a tool called stress ([`https://linux.die.net/man/1/stress`](https://linux.die.net/man/1/stress)),
    which you need to install to your local machine. If you are using Ubuntu, you
    can use the command


    ```

    sudo apt install stress

    ```


    Open a terminal and run the stress tool as follows. The application will run for
    60 seconds using one core and consuming 100% of CPU usage.


    ```

    stress --cpu 1 --timeout 60

    ```


    Open another terminal and run the following command to obtain the process id of
    the stress application:


    ```

    top

    ```


    On my local machine, the process id is 2185657, as shown in Figure [4-3](#527551_1_En_4_Chapter.xhtml#Fig3).


    ![](images/527551_1_En_4_Chapter/527551_1_En_4_Fig3_HTML.jpg)


    A screenshot of the output screen depicts a table column named P I D, User, P
    R, N I, V I R T, RES, S H R, S, C P U in percentage, Memory in percentage, and
    time and command.


    Figure 4-3


    Output of `top`


    Now insert the value of the process id into the `cgroups` directory as follows:


    ```

    sudo echo "200000 1000000" > /sys/fs/cgroup/example/cpu.max

    sudo echo "2185657" > /sys/fs/cgroup/example/cgroup.procs

    ```


    The command allocates 20% of the CPU usage for all processes inside the `example`
    cgroups, and for this example, the stress application process id is marked as
    part of the `example` cgroups. If you have your terminal running `top` open, you
    will see that the stress application will now only consume 20% instead of 100%.


    This example shows that by applying `cgroups` to processes, you can restrict the
    amount of resource it is consuming based on how you want to allocate it.


    You looked at `cgroups` (control groups) in this section and learned how to allocate
    resources to processes. In the next section, you will learn about `rootfs`, which
    you must understand because it is a crucial component in understanding containers.


    # rootfs


    In this section, you will explore `rootfs` and how it is applied in containers.
    First, let’s understand what `rootfs` actually is. `rootfs` stands for root filesystem,
    which simply means it is the filesystem containing all the basic necessary files
    required to boot the operating system. Without the correct `rootfs`, the operating
    system will not boot up and no application can run.


    `rootfs` is required so that the operating system can allow other file systems
    to be mounted, which includes configuration, essential startup processes and data,
    and other filesystems that are located in other disk partitions. The following
    shows the minimal directories found in a `rootfs`:


    ```

    /bin

    /sbin

    /etc

    /root

    /lib

    /lib/modules

    /dev

    /tmp

    /boot

    /mnt

    /proc

    /usr

    /var,

    /home

    ```


    To run an application inside a container requires `rootfs`, which allows the application
    to run like how it runs in a normal system. Let’s take a look at what a minimal
    `rootfs` actually looks like. Head over to [`www.alpinelinux.org/downloads/`](http://www.alpinelinux.org/downloads/)
    to download the Alpine `rootfs`. Alpine is a very well-known Linux distribution
    that is used widely when creating containers because of its small image size.


    Download the rootfs file from the “Mini Root Filesystem” section as shown in Figure
