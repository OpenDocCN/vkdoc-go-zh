    ### Init


    `Init()` 函数是 `bubbletea` 在调用 `Start()` 函数后调用的第一个函数。你之前看到，`Init()` 必须返回一个 `Cmd`
    类型，该类型被声明为此处展示的函数类型：


    ```

    type Cmd func() Msg

    ```


    `Init()` 函数使用批处理（batches）来返回不同类型的函数类型：`spinner.Tick` 和 `runPretendProcess`。这是通过使用
    `tea.Batch()` 函数实现的，如下所示：


    ```

    func (m model) Init() tea.Cmd {

    ...

    return tea.Batch(

    spinner.Tick,

    runPretendProcess,

    )

    }

    ```


    在内部，`tea.Batch()` 返回一个匿名函数，该函数将不同的 `Cmd` 函数类型包装到一个 `Cmd` 数组中，如以下代码片段所示：


    ```

    type batchMsg []Cmd

    func Batch(cmds ...Cmd) Cmd {

    ...

    return func() Msg {

    return batchMsg(validCmds)

    }

    }

    ```


    在 `bubbletea` 完成调用应用程序的 `Init()` 函数后，它会启动整个进程。在内部，它使用通道（channels）来读取不同的传入消息，以执行不同的用户界面操作。因此，在你的示例代码中，它会处理
    `batchMsg` 数组并开始调用 `Cmd` 函数类型。


    `Cmd` 函数类型的实现返回 `Msg`，后者是库中定义的一个接口。


    ```

    type Msg interface{}

    ```


    在示例代码中，你使用了 `spinner.Tick` 和 `runPretendProcess`，它们的定义如下：


    ```

    type processFinishedMsg time.Duration

    func Tick() tea.Msg {

    return TickMsg{Time: time.Now()}

    }

    func runPretendProcess() tea.Msg {

    ...

    return processFinishedMsg(pause)

    }

    ```


    图 16-6 展示了该库如何使用多个 goroutine 在后台执行多项任务，包括处理那些函数类型返回的 `Msg`，这些 `Msg` 将在 `Update()`
    函数中使用，下一节将对此进行介绍。


    ![](img/527551_1_En_16_Fig6_HTML.jpg)


    示例代码的框架从主函数开始并启动。Start 函数返回 model，然后将其分为三个部分，分别命名为 S I G N T、initCmD 和 Msg。


    图 16-6


    内部执行流程的初始化


    ### Update


    调用 `Update` 函数来更新用户界面的状态。在示例应用中，其定义如下：


    ```

    func (m model) Update(msg tea.Msg) (tea.Model, tea.Cmd) {

    switch msg := msg.(type) {

    case tea.KeyMsg:

    ...

    return m, tea.Quit

    case spinner.TickMsg:

    ...

    m.spinner, cmd = m.spinner.Update(msg)

    ...

    case processFinishedMsg:

    ...

    m.results = append(m.results[1:], res)

    ...

    default:

    return m, nil

    }

    }

    ```


    `Update` 函数接收不同类型的 `tea.Msg`，因为它被定义为一个接口，所以代码需要进行类型检查，并处理它想要处理的类型。例如，当函数接收到 `spinner.TickMsg`
    时，它会通过调用 `spinner.Update()` 函数来更新 spinner；当接收到 `tea.KeyMsg` 时，它会退出应用程序。


    该函数只需要处理它感兴趣的消息，并执行所需的任何用户界面状态管理。函数中必须避免执行其他重量级的操作。


    ### View


    最后一个函数 `View()` 由库调用以更新用户界面。应用程序可以自由地以任何合适的方式更新用户界面。这种灵活性允许应用程序渲染出满足其需求的用户界面。


    这并不意味着应用程序需要知道如何绘制用户界面。这由每个用户界面可用的函数来处理。以下是 `View()` 函数：


    ```

    func (m model) View() string {

    s := "\n" +

    m.spinner.View() + " Doing some work...\n\n"

    for _, res := range m.results {

    ...

    }

    ...

    if m.quitting {

    s += "\n"

    }

    return indent.String(s, 1)

    }

    ```


    应用程序通过从不同的变量中提取不同的值，来组合所有需要向用户显示的用户界面。例如，它提取 `results` 数组的值来显示给用户。当 `Update` 函数接收到
    `processFinishedMsg` 消息类型时，`results` 数组就会被填充。


    该函数返回一个包含用户界面的字符串，该字符串将由库渲染到终端上。


    图 16-7 从高层次展示了该库生成的不同 goroutine，这些 goroutine 负责用户界面的不同部分，例如使用键盘、鼠标的用户输入、终端大小调整等等。


    其架构类似于发布/订阅模型，中央 goroutine 处理所有不同的消息，并在内部调用相关函数来执行操作。


    ![](img/527551_1_En_16_Fig7_HTML.png)


    一个进程消息框架包含六个要素，包括用户输入、处理 Cmds、终端大小调整、tea dot msg 函数、更新函数和视图函数。


    图 16-7


    消息的集中处理


    ## 总结


    在本章中，你了解了两种不同的基于终端的用户界面框架，它们为开发者提供了构建命令行用户界面的 API。你看到了如何使用这些框架构建简单命令行用户界面的示例应用。


    你研究了这些框架的内部结构，以理解它们的工作原理。了解这些能让你在使用此类框架时，更好地洞察如何排查问题。并且，理解这些框架的复杂性有助于你构建自己的异步应用程序。


    # 第七部分 Linux 系统


    # 17. systemd


    在本章中，你将了解 `systemd` 是什么，以及如何编写 Go 应用程序与之交互。`systemd` 是 Linux 系统内部一个重要的软件组件，其内容庞大，无法在本章中完全覆盖。


    你将研究一个可用的开源 `systemd` Go 库，并学习如何使用它来访问 `systemd`。在本章中，你将完成以下任务：


    -   了解 `systemd` 提供什么功能

    -   使用 `systemctl` 和 `journalctl` 与 `systemd` 交互

    -   使用 `go-systemd` 库编写代码

    -   将日志消息写入 `systemd` 日志

    -   查询 `systemd` 以获取已注册服务的列表


    ### 源代码


    本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。


    ### systemd


    `systemd` 是一套用于 Linux 系统的应用程序套件，旨在启动并运行系统。它不仅负责启动核心 Linux 系统运行，还会启动许多程序，例如网络栈、用户登录、日志记录服务器等。它使用套接字和
    D-Bus 激活来启动服务、按需启动后台应用程序等等。


    D-Bus 代表桌面总线（Desktop Bus）。这是一个用于进程间通信机制的规范，允许同一台机器上的不同进程相互通信。D-Bus 的实现包括服务器组件和一个客户端库。对于
    `systemd`，其实现被称为 sd-bus。在稍后的章节中，你将学习如何使用 D-Bus 客户端库与服务器组件通信。


    套接字激活是 `systemd` 中的一种机制，用于监听网络端口或 Unix 套接字。当有外部连接时，它将触发服务器应用程序的运行。这在某些情况下非常有用，比如某个资源密集型应用只需要在需要时才运行，而不是在
    Linux 系统启动时就运行。

    '
- fmt: '# systemd Units


    Files that are used for `systemd` are called units. It is a standard way to represent
    resources managed by `systemd`. System-related `systemd` unit files can be found
    inside `/lib/systemd/system`, which looks this:


    ```

    ...

    -rw-r--r--  1 root root   389 Nov 18  2021  apt-daily-upgrade.service

    -rw-r--r--  1 root root   184 Nov 18  2021  apt-daily-upgrade.timer

    lrwxrwxrwx  1 root root    14 Apr 25 23:23  autovt@.service -> getty@.service

    -rw-r--r--  1 root root  1044 Jul  7  2021  avahi-daemon.service

    -rw-r--r--  1 root root   870 Jul  7  2021  avahi-daemon.socket

    -rw-r--r--  1 root root   927 Apr 25 23:23  basic.target

    -rw-r--r--  1 root root  1159 Apr 18  2020  binfmt-support.service

    -rw-r--r--  1 root root   380 Oct  6  2021  blk-availability.service

    -rw-r--r--  1 root root   449 Apr 25 23:23  blockdev@.target

    -rw-r--r--  1 root root   419 Feb  1 11:49  bluetooth.service

    ...

    -rw-r--r--  1 root root   758 Apr 25 23:23  dev-hugepages.mount

    -rw-r--r--  1 root root   701 Apr 25 23:23  dev-mqueue.mount

    ...

    -rw-r--r--  1 root root   251 Aug 31  2021  e2scrub_all.timer

    -rw-r--r--  1 root root   245 Aug 31  2021  e2scrub_fail@.service

    -rw-r--r--  1 root root   550 Aug 31  2021  e2scrub_reap.service

    ...

    -rw-r--r--  1 root root   444 Apr 25 23:23  remote-fs-pre.target

    -rw-r--r--  1 root root   530 Apr 25 23:23  remote-fs.target

    ```


    The other location for unit files is inside the `/etc/systemd/system` directory.
    Unit files in this directory take precedence over any other unit files found on
    the filesystem, The following shows a snippet of the unit files in a local machine
    inside the `/etc/system/system` directory:


    ```

    ...

    lrwxrwxrwx  1 root root   40 Mar  4 04:53 dbus-org.freedesktop.ModemManager1.service
    -> /lib/systemd/system/ModemManager.service

    lrwxrwxrwx  1 root root   53 Mar  4 04:51 dbus-org.freedesktop.nm-dispatcher.service
    -> /lib/systemd/system/NetworkManager-dispatcher.service

    lrwxrwxrwx  1 root root   44 Aug  7  2021 dbus-org.freedesktop.resolve1.service
    -> /lib/systemd/system/systemd-resolved.service

    lrwxrwxrwx  1 root root   36 Mar  4 04:53 dbus-org.freedesktop.thermald.service
    -> /lib/systemd/system/thermald.service

    lrwxrwxrwx  1 root root   45 Aug  7  2021 dbus-org.freedesktop.timesync1.service
    -> /lib/systemd/system/systemd-timesyncd.service

    ...

    drwxr-xr-x  2 root root 4096 Mar  4 04:53 graphical.target.wants/

    drwxr-xr-x  2 root root 4096 Mar  4 04:51 mdmonitor.service.wants/

    drwxr-xr-x  2 root root 4096 May 27 10:10 multi-user.target.wants/

    ...

    lrwxrwxrwx  1 root root   31 Apr  6 17:55 sshd.service -> /lib/systemd/system/ssh.service

    ...

    ```


    The following is a non-exhaustive list of the different unit files:


    * `.service`: Describe a service or application and how to start or stop the service

    * `.socket`: Describes a network or Unix socket used for socket-based activation

    * `.device`: Describes a device exposed in the `sysfs/udev` device tree

    * `.timer`: Defines a timer that will be managed by `systemd`


    You looked at `systemd` and what it is used for. In the next section, you will
    look at using the provided tools to look at the services provided by `systemd`
    using `systemctl`.


    ## systemctl


    `systemctl` is the main tool used to communicate with `systemd` that is running
    in your local machine. Type in the following command in your terminal:


    ```

    systemctl

    ```


    Without any parameter, it will list all the services that are currently registered
    with the `system,` as shown in Figure [17-1](#527551_1_En_17_Chapter.xhtml#Fig1).


    ![](images/527551_1_En_17_Chapter/527551_1_En_17_Fig1_HTML.jpg)


    A screenshot of the output lists the services and their status as loaded, active,
    and exited.


    **Figure 17-1** Registered service in systemd


    Let’s take a peek at the services that are currently running on local machines.
    You will look at the `systemd-journal.service`, which is running a `systemd` logging
    service. Open your terminal and use the following command:


    ```

    systemctl status systemd-journald.service

    ```


    You will see output that looks like the following:


    ```

    systemd-journald.service - Journal Service

    Loaded: loaded (/lib/systemd/system/systemd-journald.service; static)

    Active: active (running) since Thu 2022-06-16 23:21:09 AEST; 1 week 0 days ago

    TriggeredBy: • systemd-journald-dev-log.socket

    • systemd-journald-audit.socket

    • systemd-journald.socket

    Docs: man:systemd-journald.service(8)

    man:journald.conf(5)

    Main PID: 370 (systemd-journal)

    Status: "Processing requests..."

    Tasks: 1 (limit: 9294)

    Memory: 54.2M

    CPU: 3.263s

    CGroup: /system.slice/systemd-journald.service

    └─370 /lib/systemd/systemd-journald

    Jun 16 23:21:09 nanik systemd-journald[370]: Journal started

    ...

    Jun 16 23:21:09 nanik systemd-journald[370]: System Journal

    ```


    The output shows information about the service such as the amount of memory the
    service is using, the process ID (PID), location of the `.service` file, and whether
    the service is active or not.


    To stop a service, use the command `systemctl stop`. As an example, let’s try
    to stop `cups.service` (a service used to provide printing services in Linux).
    Use the following command in your terminal to check the status:


    ```

    systemctl status cups.service

    ```


    You will see output like the following:


    ```

    • cups.service - CUPS Scheduler

    Loaded: loaded (/lib/systemd/system/cups.service; enabled; vendor preset: enabled)

    Active: active (running) since Fri 2022-06-24 00:00:35 AEST; 22h ago

    TriggeredBy: • cups.socket

    • cups.path

    Docs: man:cupsd(8)

    Main PID: 39757 (cupsd)

    Status: "Scheduler is running..."

    Tasks: 1 (limit: 9294)

    Memory: 2.8M

    CPU: 51ms

    CGroup: /system.slice/cups.service

    └─39757 /usr/sbin/cupsd -l

    Jun 24 00:00:35 nanik systemd[1]: Starting CUPS Scheduler...

    Jun 24 00:00:35 nanik systemd[1]: Started CUPS Scheduler.

    ```


    To stop the service, use the following command in your terminal:


    ```

    sudo systemctl stop  cups.service

    ```


    If you check the status again using the same `systemctl status cups.service` command,
    you will see output that looks like the following:


    ```

    ○ cups.service - CUPS Scheduler

    Loaded: loaded (/lib/systemd/system/cups.service; enabled; vendor preset: enabled)

    Active: inactive (dead) since Fri 2022-06-24 22:47:52 AEST; 1s ago

    TriggeredBy: ○ cups.socket

    ○ cups.path

    Docs: man:cupsd(8)

    Process: 39757 ExecStart=/usr/sbin/cupsd -l (code=exited, status=0/SUCCESS)

    Main PID: 39757 (code=exited, status=0/SUCCESS)

    Status: "Scheduler is running..."

    CPU: 54ms

    Jun 24 00:00:35 nanik systemd[1]: Starting CUPS Scheduler...

    ...

    Jun 24 22:47:52 nanik systemd[1]: Stopped CUPS Scheduler.

    ```


    Using `systemctl` allows you to take a look at the status of the registered service
    in `systemd`. In the next section, you will write a simple server application
    and control it using `systemctl`.'
