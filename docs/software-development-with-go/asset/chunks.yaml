- fmt: '### Analyzing pcap Manually


    The sample code not only prints out the capture network layers; it also stores
    them inside a file called `test.pcap`. The file is generated in the directory
    where you run the sample code; in this example, it is stored inside the `gopacket/sniffer`
    directory.


    This file contains the raw network capture that can be viewed by other tools.
    In this section, you will look at one of the ways to view the captured file using
    another open source project, which can be found at [`https://github.com/mynameiscfed/go-cp-analyzer`](https://github.com/mynameiscfed/go-cp-analyzer).
    Download and compile the file and run it as follows:


    ```

    ./go-cp-analyzer -r /filename.pcap

