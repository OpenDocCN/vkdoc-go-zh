- fmt: "# Initialization\n\nLike any other Go application, the entry point of cAdvisor\
    \ is `main.go`.\n\n```go\nfunc main() {\n    ...\n    memoryStorage, err := NewMemoryStorage()\n\
    \    if err != nil {\n        klog.Fatalf(\"Failed to initialize storage driver:\
    \ %s\", err)\n    }\n    ...\n    resourceManager, err := manager.New(memoryStorage,\
    \ sysFs, housekeepingConfig, includedMetrics, &collectorHttpClient, strings.Split(*rawCgroupPrefixWhiteList,\
    \ \",\"), *perfEvents)\n    ...\n    cadvisorhttp.RegisterPrometheusHandler(mux,\
    \ resourceManager, *prometheusEndpoint, containerLabelFunc, includedMetrics)\n\
    \    ...\n    rootMux := http.NewServeMux()\n    ...\n}\n```\n\nThe `main()` function\
    \ performs the following initialization process steps:\n\n* Setting up cache for\
    \ storing a container and its metrics\n* Setting up Manager, which performs all\
    \ the major processing to monitor containers\n* Setting up HTTP handlers to allow\
    \ the web user interface to get metric data for different containers\n* Start\
    \ collecting containers and metrics by starting up the Manager\n\nThe cache management\
    \ is taken care by `InMemoryCache`, which can be found inside `memory.go`.\n\n\
    ```go\ntype InMemoryCache struct {\n    lock              sync.RWMutex\n    containerCacheMap\
    \ map[string]*containerCache\n    maxAge            time.Duration\n    backend\
    \           []storage.StorageDriver\n}\nfunc (c *InMemoryCache) AddStats(cInfo\
    \ *info.ContainerInfo, stats *info.ContainerStats) error {\n    ...\n}\nfunc (c\
    \ *InMemoryCache) RecentStats(name string, start, end time.Time, maxStats int)\
    \ ([]*info.ContainerStats, error) {\n    ...\n}\nfunc (c *InMemoryCache) Close()\
    \ error {\n    ...\n}\nfunc (c *InMemoryCache) RemoveContainer(containerName string)\
    \ error {\n    ...\n}\n```\n\nThere are two different HTTP handlers that are initialized\
    \ by cAdvisor: API-based HTTP handlers that are used by the web user interface\
    \ and metric HTTP handlers that report metric information in raw format. The following\
    \ snippet shows the main handlers registration that register the different paths\
    \ that are made available (inside `cmd/internal/http/handlers.go`):\n\n```go\n\
    func RegisterHandlers(mux httpmux.Mux, containerManager manager.Manager, httpAuthFile,\
    \ httpAuthRealm, httpDigestFile, httpDigestRealm string, urlBasePrefix string)\
    \ error {\n    ...\n    if err := api.RegisterHandlers(mux, containerManager);\
    \ err != nil {\n        return fmt.Errorf(\"failed to register API handlers: %s\"\
    , err)\n    }\n    mux.Handle(\"/\", http.RedirectHandler(urlBasePrefix+pages.ContainersPage,\
    \ http.StatusTemporaryRedirect))\n    ...\n    return nil\n}\n```\n\nThe API-based\
    \ handlers are found inside `cmd/internal/api/handler.go`, as shown:\n\n```go\n\
    func RegisterHandlers(mux httpmux.Mux, m manager.Manager) error {\n    ...\n \
    \   mux.HandleFunc(apiResource, func(w http.ResponseWriter, r *http.Request) {\n\
    \        err := handleRequest(supportedApiVersions, m, w, r)\n        if err !=\
    \ nil {\n            http.Error(w, err.Error(), 500)\n        }\n    })\n    return\
    \ nil\n}\n```\n\nThe API handlers expose the `/api` path. To test this handler,\
    \ make sure you have cAdvisor running and open your browser and enter the URL\
    \ `http://localhost:8080/api/v1.0/containers`. You will see something like Figure\
    \ [18-11](#527551_1_En_18_Chapter.xhtml#Fig11).\n\n![](images/527551_1_En_18_Chapter/527551_1_En_18_Fig11_HTML.jpg)\n\
    \nA screenshot displays output as sub-containers with creation time links for\
    \ CPU, memory ranges, status, and schedstat are measured for a certain limit.\n\
    \n**Figure 18-11** Output of `/api/v1.0/containers`\n\n## Manager\n\nManager is\
    \ the main component of cAdvisor. It takes care of the initialization, maintenance,\
    \ and reporting of different metrics for the containers it manages. The interfaces\
    \ are declared as follows:\n\n```go\ntype Manager interface {\n    Start() error\n\
    \    Stop() error\n    GetContainerInfo(containerName string, query *info.ContainerInfoRequest)\
    \ (*info.ContainerInfo, error)\n    GetContainerInfoV2(containerName string, options\
    \ v2.RequestOptions) (map[string]v2.ContainerInfo, error)\n    SubcontainersInfo(containerName\
    \ string, query *info.ContainerInfoRequest) ([]*info.ContainerInfo, error)\n \
    \   AllDockerContainers(query *info.ContainerInfoRequest) (map[string]info.ContainerInfo,\
    \ error)\n    DockerContainer(dockerName string, query *info.ContainerInfoRequest)\
    \ (info.ContainerInfo, error)\n    GetContainerSpec(containerName string, options\
    \ v2.RequestOptions) (map[string]v2.ContainerSpec, error)\n    GetDerivedStats(containerName\
    \ string, options v2.RequestOptions) (map[string]v2.DerivedStats, error)\n   \
    \ GetRequestedContainersInfo(containerName string, options v2.RequestOptions)\
    \ (map[string]*info.ContainerInfo, error)\n    Exists(containerName string) bool\n\
    \    GetMachineInfo() (*info.MachineInfo, error)\n    GetVersionInfo() (*info.VersionInfo,\
    \ error)\n    GetFsInfoByFsUUID(uuid string) (v2.FsInfo, error)\n    GetDirFsInfo(dir\
    \ string) (v2.FsInfo, error)\n    GetFsInfo(label string) ([]v2.FsInfo, error)\n\
    \    GetProcessList(containerName string, options v2.RequestOptions) ([]v2.ProcessInfo,\
    \ error)\n    WatchForEvents(request *events.Request) (*events.EventChannel, error)\n\
    \    GetPastEvents(request *events.Request) ([]*info.Event, error)\n    CloseEventChannel(watchID\
    \ int)\n    DockerInfo() (info.DockerStatus, error)\n    DockerImages() ([]info.DockerImage,\
    \ error)\n    DebugInfo() map[string][]string\n}\n```\n\nThe interfaces and implementation\
    \ are found inside `manager.go`.\n\nManager uses plugins for different container\
    \ technologies. For example, the Docker plugin is responsible for communicating\
    \ with the Docker engine. The Docker plugin resides inside the `container/docker/plugin.go`\
    \ file. The following is the Docker plugin code:\n\n```go\npackage docker\n\n\
    import (\n    ...\n)\n\nconst dockerClientTimeout = 10 * time.Second\n...\nfunc\
    \ (p *plugin) InitializeFSContext(context *fs.Context) error {\n    SetTimeout(dockerClientTimeout)\n\
    \    // Try to connect to docker indefinitely on startup.\n    dockerStatus :=\
    \ retryDockerStatus()\n    ...\n}\n...\nfunc retryDockerStatus() info.DockerStatus\
    \ {\n    startupTimeout := dockerClientTimeout\n    maxTimeout := 4 * startupTimeout\n\
    \    for {\n        ...\n    }\n}\n```\n\nThe main job of Manager is to monitor\
    \ containers, but before it is able to do that, it needs to find out what containers\
    \ are available and how to monitor them. Let’s take a look at the first step,\
    \ which is finding out what containers will be monitored.\n\nIn the previous section,\
    \ it was mentioned that conceptually cAdvisor refers to containers not only for\
    \ Docker, but anything that it monitors is considered as containers. Let’s take\
    \ a look at how cAdvisor finds the containers that it monitors. The collection\
    \ of containers that it will monitor are collected when the `Start()` function\
    \ of Manager is called, as shown here:\n\n```go\nfunc (m *manager) Start() error\
    \ {\n    ...\n    err := raw.Register(m, m.fsInfo, m.includedMetrics, m.rawContainerCgroupPathPrefixWhiteList)\n\
    \    if err != nil {\n        klog.Errorf(\"Registration of the raw container\
    \ factory failed: %v\", err)\n    }\n    rawWatcher, err := raw.NewRawContainerWatcher()\n\
    \    if err != nil {\n        return err\n    }\n    m.containerWatchers = append(m.containerWatchers,\
    \ rawWatcher)\n    ...\n    // Create root and then recover all containers.\n\
    \    err = m.createContainer(\"/\", watcher.Raw)\n    if err != nil {\n      \
    \  return err\n    }\n    klog.V(2).Infof(\"Starting recovery of all containers\"\
    )\n    err = m.detectSubcontainers(\"/\")\n    if err != nil {\n        return\
    \ err\n    }\n    ...\n    return nil\n}\n```\n\nThe collection process is performed\
    \ by the `m.createContainer(..)` function and Figure [18-12](#527551_1_En_18_Chapter.xhtml#Fig12)\
    \ shows what is created.\n\n![](images/527551_1_En_18_Chapter/527551_1_En_18_Fig12_HTML.jpg)"
