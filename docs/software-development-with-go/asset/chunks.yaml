    \ 是一个开源、轻量级的软件，它允许你检测具有恶意行为的对等节点，并在不同层级（基础设施层、系统层、应用层）阻止它们访问你的系统。\n\nCrowdSec\
    \ 作为一个开源安全工具，提供了相当多的功能，非常适合在云环境中使用。这个工具最吸引人的地方在于社区收集的数据。这种众包数据使得 CrowdSec 能够判断某个特定\
    \ IP 地址是否应该被禁止，或者是否应该被允许进入你的基础设施。\n\n你将从这个项目中学到许多架构和代码设计，这些内容将在“从 CrowdSec 中学习”一节中进一步探讨。\n"
- fmt: "### Using CrowdSec\n\nI will not go through the complete installation process\
    \ of CrowdSec. Rather, I will cover the steps of a bare minimum installation that\
    \ will allow you to understand what you need for the section “Learning From CrowdSec.”\
    \ The objective of this installation is to get to a point to see the community\
    \ data that is collected by a central server replicated to a local database.\n\
    \nCreate an empty directory to do the following steps. In my local installation,\
    \ I created a new directory under `/home/nanik/GolandPojects/crowdsec`. Follow\
    \ these steps:\n\n- Download the release from GitHub. For this section, use v1.4.1\
    \ for Linux, downloading it using the following command:\n  \n  ```\n  wget https://github.com/crowdsecurity/crowdsec/releases/download/v1.4.1/crowdsec-release.tgz\n\
    \  ```\n\n- Once downloaded, use `gunzip` and `tar` to unzip as follows:\n  \n\
    \  ```\n  gunzip ./crowdsec-release.tgz && tar -xvf crowdsec-release.tar\n  ```\n\
    \n- A new directory named `crowdsec-v1.4.1` will be created, as shown:\n  \n \
    \ ```\n  └── crowdsec-v1.4.1\n      ├── cmd\n      ├── config\n      ├── plugins\n\
    \      ├── test_env.ps1\n      ├── test_env.sh\n      └── wizard.sh\n  ```\n\n\
    - Change your directory to `crowdsec-v1.4.1` and run the `test_env.sh` command.\n\
    \  \n  ```\n  ./test_env.sh\n  ```\n\nLet the script run. It will take a bit of\
    \ time because it’s downloading a few things. You will see output that looks like\
    \ the following:\n\n```\n[07/27/2022:03:50:14 PM][INFO] Creating test arboresence\
    \ in /home/nanik/GolandProjects/crowdsec/crowdsec-v1.4.1/tests\n[07/27/2022:03:50:14\
    \ PM][INFO] Arboresence created\n[07/27/2022:03:50:14 PM][INFO] Copying needed\
    \ files for tests environment\n[07/27/2022:03:50:15 PM][INFO] Files copied\n...\n\
    INFO[27-07-2022 03:50:15 PM] Machine 'test' successfully added to the local API\n\
    INFO[27-07-2022 03:50:15 PM] API credentials dumped to '/home/nanik/GolandProjects/crowdsec/crowdsec-v1.4.1/tests/config/local_api_credentials.yaml'\n\
    INFO[27-07-2022 03:50:15 PM] Wrote new 438269 bytes index to /home/nanik/GolandProjects/crowdsec/crowdsec-v1.4.1/tests/config/hub/.index.json\n\
    INFO[27-07-2022 03:50:16 PM] crowdsecurity/syslog-logs : OK\nINFO[27-07-2022 03:50:16\
    \ PM] Enabled parsers : crowdsecurity/syslog-logs\nINFO[27-07-2022 03:50:16 PM]\
    \ crowdsecurity/geoip-enrich : OK\nINFO[27-07-2022 03:50:16 PM] downloading data\
    \ 'https://crowdsec-statics-assets.s3-eu-west-1.amazonaws.com/GeoLite2-City.mmdb'\
    \ in '/home/nanik/GolandProjects/crowdsec/crowdsec-v1.4.1/tests/data/GeoLite2-City.mmdb'\n\
    INFO[27-07-2022 03:51:25 PM] downloading data 'https://crowdsec-statics-assets.s3-eu-west-1.amazonaws.com/GeoLite2-ASN.mmdb'\
    \ in '/home/nanik/GolandProjects/crowdsec/crowdsec-v1.4.1/tests/data/GeoLite2-ASN.mmdb'\n\
    INFO[27-07-2022 03:51:41 PM] Enabled parsers : crowdsecurity/geoip-enrich\nINFO[27-07-2022\
    \ 03:51:41 PM] crowdsecurity/dateparse-enrich : OK\nINFO[27-07-2022 03:51:41 PM]\
    \ Enabled parsers : crowdsecurity/dateparse-enrich\n...\n```\n\nThe script creates\
    \ a new directory called `tests` containing a complete test environment for CrowdSec.\
    \ The directory will look like the following:\n\n```\nnanik@nanik:~/GolandProjects/crowdsec/crowdsec-v1.4.1$\
    \ tree -L 2 ./tests/\n./tests/\n├── config\n│   ├── acquis.yaml\n│   ├── collections\n\
    │   ├── crowdsec-cli\n│   ├── hub\n...\n│   ├── scenarios\n│   └── simulation.yaml\n\
    ├── crowdsec\n├── cscli\n├── data\n│   ├── crowdsec.db\n│   ├── GeoLite2-ASN.mmdb\n\
    │   └── GeoLite2-City.mmdb\n├── dev.yaml\n├── logs\n└── plugins\n    ├── notification-email\n\
    ...\n    └── notification-splunk\n```\n\nThe directory contains a variety of files\
    \ including the CrowdSec command line tools `crowdsec` and `cscli` along with\
    \ a folder called `data` that you will look at in the next section in more detail.\
    \ The database with extension `.mmdb` is the database that you will look at in\
    \ detail in the “GeoIP Database” section.\n\n### crowdsec.db\n\nCrowdSec stores\
    \ data inside a SQLite database called `crowdsec.db`. The database contains a\
    \ number of tables, shown in Figure [14-1](#527551_1_En_14_Chapter.xhtml#Fig1).\n\
    \n![A screenshot of the crowd's database includes the main potion, tables, alerts,\
    \ bouncers, decisions, events, machines, meta, SQLite slash master, SQLite slash\
    \ sequence, and server objects.](images/527551_1_En_14_Chapter/527551_1_En_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1** CrowdSec database\n\nThe test environment does not populate\
    \ any data when the database is created, so you need to set up your environment\
    \ so that it will sync from a central server. To do this, you need to register\
    \ first with the CrowdSec server using the `cscli` tool, as outlined in the doc\
    \ at [`https://docs.crowdsec.net/docs/cscli/cscli_capi_register/`](https://docs.crowdsec.net/docs/cscli/cscli_capi_register/).\
    \ Open terminal and change to the `tests` directory, and execute the following\
    \ command:\n\n```\n./cscli capi register -c ./dev.yaml\n```\n\nYou will get output\
    \ like the following:\n\n```\nWARN[27-07-2022 04:10:11 PM] can't load CAPI credentials\
    \ from './config/online_api_credentials.yaml' (missing field)\nINFO[27-07-2022\
    \ 04:10:11 PM] push and pull to Central API disabled\nINFO[27-07-2022 04:10:13\
    \ PM] Successfully registered to Central API (CAPI)\nINFO[27-07-2022 04:10:13\
    \ PM] Central API credentials dumped to './config/online_api_credentials.yaml'\n\
    ...\n```\n\nUsing the `cscli` command tool, you must register to a central server.\
    \ `online_api_credentials.yaml` is populated with the registration details, which\
    \ look like the following:\n\n```\nurl: https://api.crowdsec.net/\nlogin: \npassword:\
    \ \n```\n\nYou are now ready to populate your database with the central server.\
