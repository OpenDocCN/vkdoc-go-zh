    \ 17 上监听的服务器 [`djxms.net`](http://djxms.net)。\n\n代码位于 `chapter9/udp/simple` 目录中，可以按如下方式运行：\n\
    \n```\ngo run main.go\n```\n\n每次运行该应用程序，您都会获得不同的名言。在我的例子中，其中一条如下：\n\n> “人类可以攀登到最高的顶峰，但无法在那里长久居住。”\n\
    > \n> 乔治·萧伯纳（George Bernard Shaw，1856-1950）\n\n让我们来看看应用程序的不同部分，并理解其功能。`qotd` 函数包含以下代码片段。它使用标准库中的\
    \ `net.ResolveUDPAddr(..)` 连接到服务器并返回一个 `UDPAddr` 结构体。\n\n```\nudpAddr, err :=\
    \ net.ResolveUDPAddr(\"udp\", s)\nif err != nil {\nprintln(\"Error Resolving UDP\
    \ Address:\", err.Error())\nos.Exit(1)\n}\n```\n\n该库会执行一次查找，以确保提供的域名有效，这是通过 DNS\
    \ 查询完成的。如果遇到错误，`err` 变量将返回非空值。\n\n深入研究标准库中的 `net.ResolveUDPAddr` 函数（如图 9-1 所示），您可以看到对该域名的\
    \ DNS 查询会返回多个 IP 地址，但只有第一个 IP 地址会被填入返回的 `UDPAddr` 结构体中。\n\n![](img/527551_1_En_9_Fig1_HTML.jpg)\n\
    \n两张截图。上方是解释通过 IP 地址连接到服务器的代码片段。下方是来自解析 UDP 地址的多个 IP 地址。\n\n**图 9-1** 来自 `ResolveUDPAddr`\
    \ 的多个 IP 地址\n\n一旦 `udpAddr` 成功填充，它将在调用 `net.DialUDP` 时使用。该函数调用会使用 `udpAddr` 中提供的\
    \ IP 地址打开一个到服务器的套接字连接：\n\n```\nconn, err := net.DialUDP(\"udp\", nil, udpAddr)\n\
    ```\n\n在本节中，您学习了如何使用标准库连接一个 UDP 服务器。在下一节中，您将进一步学习如何编写一个 UDP 服务器。\n\n### UDP 服务器\n\
    \n在本节中，您将深入探索并使用标准库编写一个 UDP 服务器。该服务器在端口 3000 上监听，并打印出客户端发送的内容。代码位于 `chapter9/udp/server`\
    \ 目录中，可以按如下方式运行：\n\n```\ngo run main.go\n```\n\n该示例会在控制台打印出以下内容：\n\n```\n2022/03/05\
    \ 23:51:32 Listening [::]:3000\n```\n\n在一个终端窗口中，使用 `nc` 命令连接到端口 3000：\n\n```\n\
    nc -u localhost 3000\n```\n\n`nc` 工具运行后，输入任何文本，您都会看到它被打印在服务器的终端上。以下是在我的机器上的示例：\n\
    \n```\n2022/03/05 23:51:32 Listening [::]:3000\n2022/03/05 23:51:36 Received:\
    \ nanik from [::1]:41518\n2022/03/05 23:51:44 Received: this is a long letter\
    \ from [::1]:41518\n```\n\n让我们探讨代码是如何工作的。以下代码片段使用 `net.ListenUDP` 函数设置 UDP 服务器：\n\
    \n```\n...\nfunc main() {\nconn, err := net.ListenUDP(\"udp\", &net.UDPAddr{\n\
    Port: 3000,\nIP:   net.ParseIP(\"0.0.0.0\"),\n})\n...\n}\n```\n\n函数调用返回一个 `UDPConn`\
    \ 结构体，用于从客户端读取数据和向客户端写入数据。代码成功创建 UDP 服务器连接后，便开始监听并从中读取数据，如下所示：\n\n```\n...\nfunc\
    \ main() {\n...\nfor {\nmessage := make([]byte, 512)\nl, u, err := conn.ReadFromUDP(message[:])\n\
    ...\nlog.Printf(\"Received: %s from %s\\n\", data, u)\n}\n}\n```\n\n代码使用 UDP 连接的\
    \ `ReadFromUDP(..)` 函数来读取客户端发送的数据，并将其打印到控制台。\n\n### 并发服务器\n\n在上一节中，您编写了一个 UDP\
    \ 服务器，但其中缺少的一个功能是处理多个 UDP 客户端请求的能力。编写一个能够处理多个请求的 UDP 服务器与普通的 TCP 不同。构建这种应用结构的方法是启动多个\
    \ goroutine 来监听同一个连接，并让每个 goroutine 负责处理请求。代码位于 `udp/concurrent` 目录中。让我们看看它与之前的\
    \ UDP 服务器实现相比有何不同。\n\n以下代码片段展示了启动多个 goroutine 来监听 UDP 连接的代码：\n\n```\n...\nfunc\
    \ main() {\naddr := net.UDPAddr{\nPort: 3333,\n}\nconnection, err := net.ListenUDP(\"\
    udp\", &addr)\n...\nfor i := 0; i < runtime.NumCPU(); i++ {\n...\ngo listen(id,\
    \ connection, quit)\n...\n}\n...\n}\n```\n\ngoroutine 的运行次数取决于 `runtime.NumCPU()`\
    \ 返回的结果。这些 goroutine 使用 `listen` 函数，如下面的代码片段所示：\n\n```\nfunc listen(i int, connection\
    \ *net.UDPConn, quit chan struct{}) {\nbuffer := make([]byte, 1024)\nfor {\n_,\
    \ remote, err := connection.ReadFromUDP(buffer)\nif err != nil {\nbreak\n}\n...\n\
    }\n...\n}\n```\n\n现在，`listen` 函数以多个 goroutine 的形式运行，它通过调用 `ReadFromUDP` 函数等待传入的\
    \ UDP 请求。当检测到传入的 UDP 请求时，其中一个正在运行的 goroutine 会处理它。\n"
- fmt: '# Load Testing


    In this section, you will look at using load testing to test the network server
    that you wrote in the previous sections. You will be using an open source load
    testing tool called `fortio`, which can be downloaded from [`https://github.com/fortio/fortio`](https://github.com/fortio/fortio);
    for this book, use version v1.21.1.


    Using the load testing tool, you will see the timing difference between code that
    is designed to handle requests without using goroutines vs. code that is designed
    to handle requests using goroutines. For this exercise, you will use the UDP server
    that is inside the `chapter9/udp/loadtesting` directory. You will compare between
    the UDP server that uses goroutines inside the `chapter9/udp/loadtesting/concurrent`
    directory and the UDP server that does not use goroutines inside `chapter9/udp/loadtesting/server`.


    The only difference between the code that you use for load testing with the code
    discussed in the previous section is the addition of the `time.Sleep(..)` function.
    This is added to simulate or mock a process that is doing something to the request
    before sending a response back. Here is the code:


    ```

    func listen(i int, connection *net.UDPConn, quit chan struct{}) {

    ...

    for {

    ...

    //pretend the code is doing some request processing for 10milliseconds

    time.Sleep(10 * time.Millisecond)

    ...

    }

    ...

    }

    func main() {

    ...

    for {

    ...

    //pretend the code is doing some request processing for 10milliseconds

    time.Sleep(10 * time.Millisecond)

    ...

    }

    }

    ```


    Let’s run the code inside the `chapter9/udp/loadtesting/concurrent` directory
    first. Once the UDP server starts up, run the `fortio` tool as follows:


    ```

    ./fortio load -n 200 udp://0.0.0.0:3333/

    ```


    The tool makes 200 calls to a server running locally on port 3000. You will see
    results something like the following:


    ```

    ...

    00:00:44 I udprunner.go:223> Starting udp test for udp://0.0.0.0:3333/ with 4
    threads at 8.0 qps

    Starting at 8 qps with 4 thread(s) [gomax 12] : exactly 200, 50 calls each (total
    200 + 0)

    ...

    Aggregated Function Time : count 200 avg 0.011425742 +/- 0.005649 min 0.010250676
    max 0.054895756 sum 2.2851485

    # range, mid point, percentile, count

    >= 0.0102507  0.011  0.045  0.05 <= 0.0548958 , 0.0524479 , 100.00, 2

    # target 50% 0.0106453

    # target 75% 0.0108446

    # target 90% 0.0109641

    # target 99% 0.05

    # target 99.9% 0.0544062

    Sockets used: 200 (for perfect no error run, would be 4)

    Total Bytes sent: 4800, received: 200

    udp short read : 200 (100.0 %)

    All done 200 calls (plus 0 warmup) 11.426 ms avg, 8.0 qps

    ```


    The final result is that the average time it takes to process is 11.426 ms. Now
    let’s compare this with the server code that does not use goroutines, which is
    inside the `chapter9/udp/loadtesting/server` directory. Once you run the UDP server,
    use the same command to run `fortio`. You will see results that look like the
    following:


    ```

    ...

    00:00:07 I udprunner.go:223> Starting udp test for udp://0.0.0.0:3000/ with 4
    threads at 8.0 qps

    Starting at 8 qps with 4 thread(s) [gomax 12] : exactly 200, 50 calls each (total
    200 + 0)

    ...

    Aggregated Function Time : count 200 avg 0.026354093 +/- 0.01187 min 0.010296825
    max 0.054235708 sum 5.27081864

    # range, mid point, percentile, count

    >= 0.0102968  0.011  0.02  0.03  0.035  0.04  0.045  0.05 <= 0.0542357 , 0.0521179
    , 100.00, 2

    # target 50% 0.025

    # target 75% 0.0402041

    # target 90% 0.0432653

    # target 99% 0.05

    # target 99.9% 0.0538121

    Sockets used: 200 (for perfect no error run, would be 4)

    Total Bytes sent: 4800, received: 200

    udp short read : 200 (100.0 %)

    All done 200 calls (plus 0 warmup) 26.354 ms avg, 8.0 qps

    ```


    The average time recorded this time is 26.354 ms, which is more than the previous
    result of 11.426 ms. With this, you can conclude that it is important to remember
    to use goroutines when writing a network server application to ensure concurrent
    request processing.


    ## Summary


    In this chapter, you learned how to create network applications using TCP and
    UDP. You learned how to write client and server for both protocols. You learned
    how to write an application that can process multiple requests concurrently using
    goroutines.


    This is an important step to understand because it is the foundation of how to
    write network applications that can process huge amounts of traffic. This chapter
    is a stepping-stone for the upcoming chapter where you will look at different
    styles of writing network applications in Linux.


    # System Networking


    In the previous chapter, you wrote TCP and UDP applications using the standard
    library. In this chapter, you will use this knowledge to build system network
    tools. The objective of writing these tools is to gain a better understanding
    of how easy it is to do so using the capability of the Go standard library. This
    surfaces the fact that the standard library provides a lot of capabilities, enabling
    developers to build all kinds of network-related applications.


    In this chapter, you will get a good understanding of the following:


    - Using the standard library to write network tools

    - The `net/dns` package

    - How DNS packs and unpacks messages


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ## Ping Utility


    In this section, you will write an application that provides ping-like functionality.
    The code can be found inside the `chapter10/ping` folder.


    The application uses the `icmp` package provided by the Go standard library, and
    the documentation can be found at [`https://pkg.go.dev/golang.org/x/net/icmp`](https://pkg.go.dev/golang.org/x/net/icmp).
    As outlined in the documentation, this package provides functions to manipulate
    the ICMPv4/6, which is based on RFC 792 and RFC 4443.


    Compile the app as follows:


    ```

    go build -o pinggoogle .

    ```


    Run the app with root, as shown:


    ```

    sudo ./pinggoogle

    ```


    You will see the following output:


    ```

    2022/01/21 00:07:09 Ping golang.org (142.250.66.241): 21.30063ms

    ```


    To provide ping-like functionality, the code uses the Internet Control Message
    Protocol (ICMP), which is part of the IP stack that all networking stacks use,
    which means that any computer that uses an IP stack can respond to ICMP requests
    unless it is disabled. The IP network stack has the capability to respond to an
    ICMP request regardless of where it is running. The ICMP is part of the IP stack,
    which is normally used for error reporting and network diagnostics.'
