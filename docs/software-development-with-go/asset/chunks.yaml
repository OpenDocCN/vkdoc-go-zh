  trans: '

    # 使用代理进行 Docker 通信


    以下代码片段展示了监听 `/tmp/docker.sock` 套接字的代码：


    ```

    func main() {

    in := flag.String("in", proxySocket, "代理 Docker 套接字")

    ...

    sock, err := net.Listen("unix", *in)

    if err != nil {

    log.Fatalf("错误 : %v", err)

    }

    ...

    }

    ```


    代码使用了 `net.Listen(..)` 函数，并传入了参数 `unix`。`unix` 参数向函数指明所需的套接字是一个非网络类型的 Unix 套接字，这在
    `net` 库内部会进行特殊处理。


    一旦套接字成功初始化，代码将创建一个套接字处理器，负责处理传入的请求和传出的响应。这一操作由 `handler` 结构体的 `ServeHTTP` 函数执行。以下代码片段展示了处理器的声明，并通过调用
    `http.Serve` 通知库该处理器将由套接字 `sock` 使用。创建处理器时，传入 `dsocket` 以赋值给 `socket` 变量。


    ```

    func main() {

    ...

    dhandler := &handler{dsocket}

    ...

    err = http.Serve(sock, dhandler)

    ...

    }

    ```


    当套接字准备好接受连接后，`ServeHTTP` 函数负责处理所有通信的请求和响应。该函数首先创建一条与 Docker 套接字独立的连接。


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    conn, err := net.DialUnix(unix, nil, &net.UnixAddr{h.socket, unix})

    if err != nil {

    writeError(response, errCode, err)

    return

    }

    ...

    }

    ```


    `net.DialUnix(..)` 函数使用 `h.socket` 的值作为套接字名称来创建一个 Unix 套接字；在本示例代码中，该值为 `var/run/docker.sock`。此函数返回的连接对象将被代码用作桥梁，以在请求和响应之间进行双向传递。


    代码会将传入的请求*转发*到 Docker 套接字，如下所示：


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    err = request.Write(conn)

    ...

    }

    ```


    `request.Write(..)` 函数将传入的请求转发到 `conn` 变量指向的原始 Docker 套接字。请求发送后，代码需要获取一个 `http/Response`
    结构体，以便读取 Docker 套接字返回的响应。以下代码片段展示了这一过程：


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    resp, err := http.ReadResponse(bufio.NewReader(conn), request)

    if err != nil {

    writeError(response, errCode, err)

    return

    }

    ...

    }

    ```


    现在，`resp` 变量包含了来自原始 Docker 套接字的响应。它会提取相关信息，并将其转发回存储在 `response` 对象中的调用方响应，如下列代码片段所示：


    ```

    func (h *handler) ServeHTTP(response http.ResponseWriter, request *http.Request)
    {

    ...

    response.WriteHeader(resp.StatusCode)

    reader := bufio.NewReader(resp.Body)

    for {

    line, _, err := reader.ReadLine()

    ...

    // 将响应写回调用方

    response.Write(line)

    ...

    }

    }

    ```


    在下一节中，你将了解如何配置你的 Dockerfile 以最大限度地减少容器的攻击面。


    ## 容器攻击面


    为云环境构建应用程序需要将应用程序构建为容器镜像，这需要创建 Dockerfile。本节将展示如何在使用 Go 应用程序创建 Docker 镜像时将风险降至最低。


    构建 Docker 镜像时要记住的主要事项是应用程序最终将在其上运行的镜像。经验法则是使用最精简的基础镜像来托管你的应用程序。在 Docker 生态中，最精简的基础镜像是
    *scratch*。有关 scratch 镜像的更多详细信息，请访问 [`https://hub.docker.com/_/scratch`](https://hub.docker.com/_/scratch)。


    使用 scratch 镜像的示例 Dockerfile 可以在 `chapter6/dockersecurity` 目录中找到。打开终端并切换到 `chapter6/dockersecurity`
    目录，然后按如下方式构建镜像：


    ```

    docker build -t sample:latest  .

    ```


    构建成功后，你的终端将显示如下输出：


    ```

    Step 1/14 : FROM golang:1.18 as build

    ---> 65b2f1fa535f

    Step 2/14 : COPY ./main.go .

    ---> 5164c620eaff

    ...

    Step 10/14 : FROM scratch

    --->

    ...

    Successfully built 1a977f4b1cec

    Successfully tagged sample:latest

    ```


    使用以下命令运行新创建的 Docker 镜像：


    ```

    docker run sample:latest

    ```


    你将看到类似以下的输出：


    ```

    2022/07/09 10:06:42 Hello, from inside Docker image

    2022/07/09 10:06:42 Build using Go version  go1.18.2

    ```


    示例 Dockerfile 使用了 scratch 镜像，如下所示：


    ```

    FROM golang:1.18 as build

    ...

    RUN go build -trimpath -v -a -o sample -ldflags="-w -s"

    RUN useradd -u 12345 normaluser

    FROM scratch

    ...

    ENTRYPOINT ["/sample"]

    ```


    通过使用 scratch 镜像，你最大限度地减少了容器的攻击面，因为此镜像不像其他 Docker 镜像（例如：Ubuntu、Debian 等）那样安装了大量应用程序。


    ## 本章小结


    在本章中，你学习了 Docker 安全方面的知识。首先介绍的是 seccomp 及其重要性。你通过示例代码学习了如何使用 seccomp 来限制 Go 应用程序。你还学习了如何设置
    libseccomp，这使得你可以限制应用程序可以进行的系统调用。


    接下来，你学习了如何在你的应用程序中使用 libseccomp-golang 库，以及如何在代码内部应用系统调用限制。在代码内部应用限制是好的做法，但一旦代码在生产环境中运行，不断修改这些代码会变得困难，因此你学习了在运行
    Docker 容器时使用 seccomp 配置文件。


    最后，你学习了 Docker 代理，以拦截并理解 Docker 客户端和服务器之间的通信。你还深入研究了代理代码，了解代理如何转发请求和响应。最后，你简要了解了通过编写
    Dockerfile 使用 scratch 基础镜像来减少容器攻击面的最佳方法。


    # 第三部分：应用程序安全


    # 7. Gosec 与 AST


    在本章中，你将学习 AST（抽象语法树），了解它的概念及其重要性。你将通过本章中的不同示例来学习 AST，从而理解 Go 源代码到 AST 的转换过程。你还将了解一个名为
    gosec 的开源代码安全分析工具。该工具利用 AST 进行代码静态分析，你将看到这个工具是如何执行此过程的。


    ## 源代码


    本章的源代码可在 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库中获取。

