- fmt: "# Summary\n\nIn this chapter, you looked at an open source project called\
    \ Scorecard that provides security metrics for projects hosted on GitHub. The\
    \ project measures the security of a project on a scale of 0-10 and this can also\
    \ be used for projects stored locally. The major benefit of the tool is the public\
    \ availability of data for projects that have been scanned by the tool. This data\
    \ is useful for developers because it gives them information and insights on the\
    \ security metrics of projects they are planning to use.\n\nYou also looked at\
    \ how the tool works and learned how to use the GitHub API to extract repository\
    \ information to perform predefined security checks.\n\nYou learned in detail\
    \ about the different availability of the GitHub APIs, which are REST and GraphQL.\
    \ You looked at the sample code to understand how to use each of these APIs to\
    \ extract information from a GitHub repository. Finally, you explore the GitHub\
    \ Explorer to understand how to construct GraphQL queries for performing query\
    \ operations on GitHub.\n\n# Part IV Networking\n\n# 9. Simple Networking\n\n\
    In this chapter, you will learn how to write networking code using Go. You will\
    \ understand how to write client and server code for the TCP and UDP protocols.\
    \ You will also look at writing a network server that can process requests concurrently\
    \ using goroutines. By the end of the chapter, you will know how to do the following:\n\
    \n- Write a network client for TCP and UDP\n- Write a network server for TCP and\
    \ UDP\n- Use goroutines to process requests\n- Load test a network server\n\n\
    ## Source Code\n\nThe source code for this chapter is available from the `https://github.com/Apress/Software-Development-Go`\
    \ repository.\n\n## TCP Networking\n\nIn this section, you will explore creating\
    \ TCP applications using the standard Go network library. The code that you will\
    \ write is both TCP client and server.\n\n### TCP Client\n\nLet’s start by writing\
    \ a TCP client that connects to a particular HTTP server, in this case `google.com`,\
    \ and prints out the response from the server. The code can be found inside the\
    \ `chapter9/tcp/simple` directory. Run it as follows:\n\n```\ngo run main.go\n\
    ```\n\nWhen the code runs, it will try to connect to the `google.com` server and\
    \ print out the web page returned to the console, as shown in the output here:\n\
    \n```\nHTTP/1.0 200 OK\nDate: Sun, 05 Dec 2021 10:27:46 GMT\nExpires: -1\nCache-Control:\
    \ private, max-age=0\nContent-Type: text/html; charset=ISO-8859-1\nP3P: CP=\"\
    This is not a P3P policy! See g.co/p3phelp for more info.\"\nServer: gws\nX-XSS-Protection:\
    \ 0\nX-Frame-Options: SAMEORIGIN\nSet-Cookie: 1P_JAR=2021-12-05-10; expires=Tue,\
    \ 04-Jan-2022 10:27:46 GMT; path=/; domain=.google.com; Secure\nSet-Cookie:\n\
    ...\nAccept-Ranges: none\nVary: Accept-Encoding\n\n...\n```\n\nThe app uses the\
    \ `net` package from the standard library and it uses a TCP connection specified\
    \ in the following code:\n\n```\nconn, err := net.Dial(\"tcp\", t)\nif err !=\
    \ nil {\n    panic(err)\n}\n```\n\nHere is the code that connects to the server:\n\
    \n```\npackage main\n...\nconst (\n    host = \"google.com\"\n    port = \"80\"\
    \n)\nfunc main() {\n    t := net.JoinHostPort(host, port)\n    conn, err := net.Dial(\"\
    tcp\", t)\n    if err != nil {\n        panic(err)\n    }\n...\n}\n```\n\nThe\
    \ code uses the `net.Dial(..)` function to connect to `google.com` on port 80\
    \ using a TCP connection. Once it successfully connects, it sends the HTTP protocol\
    \ to the server to tell the server that it is requesting the index page, as shown\
    \ here:\n\n```\nfunc main() {\n...\n    req := \"GET / \\r\\nHost: google.com\\\
    r\\nConnection: close\\r\\n\\r\\n\"\n    conn.Write([]byte(req))\n...\n}\n```\n\
    \nOnce it receives the response, it prints the output on the console, as shown\
    \ in this code snippet:\n\n```\n...\nfunc main() {\n...\n    connReader := bufio.NewReader(conn)\n\
    \    scanner := bufio.NewScanner(connReader)\n    for scanner.Scan() {\n     \
    \   fmt.Printf(\"%s\\n\", scanner.Text())\n    }\n    if err := scanner.Err();\
    \ err != nil {\n        fmt.Println(\"Scanner error\", err)\n    }\n}\n```\n\n\
    Now that you understand how to write a TCP client, in the next section you will\
    \ learn how to write a TCP server.\n\n### TCP Server\n\nIn this section, you will\
    \ write a TCP server that listens to port 3333 on your local machine. The server\
    \ will print out what it received and send a response back. The code is inside\
    \ the `tcp/server` directory, and it can be run as follows:\n\n```\ngo run main.go\n\
    ```\n\nYou will get output as follows:\n\n```\n2022/03/05 22:51:19 Listening on\
    \ port 3333\n```\n\nUse the `nc` (network connect) tool to connect to the server,\
    \ as shown here:\n\n```\nnc localhost 3333\n```\n\nOnce connected, enter any text\
    \ and press Enter. You will get a response back. The following is an example.\
    \ I typed in *This is a test* and it came back with a response of *Message received\
    \ of length : 15.*\n\n```\nThis is a test\nMessage received of length : 15\n```\n\
    \nLet’s take a look at the code. The first thing you will look at how the code\
    \ waits and listens on port 3333, as shown in the following code snippet:\n\n\
    ```\nfunc main() {\n    t := net.JoinHostPort(\"localhost\", \"3333\")\n    l,\
    \ err := net.Listen(\"tcp\", t)\n    ...\n    for {\n        conn, err := l.Accept()\n\
    \        if err != nil {\n            log.Println(\"Error accepting: \", err.Error())\n\
    \            os.Exit(1)\n        }\n        go handleRequest(conn)\n    }\n}\n\
    ```\n\nThe code uses the `Accept` function of the `Listener` object, which is\
    \ returned when calling the `net.Listen(..)` function. The `Accept` function waits\
    \ until it receives a connection.\n\nWhen the client is connected successfully,\
    \ the code proceeds by calling the `handleRequest` function in a separate goroutine.\
    \ Having requests processed in a separate goroutine allows the application to\
    \ process requests concurrently.\n\nThe handling of the request and the sending\
    \ of the response is taken care of inside the `handleRequest` function, as shown\
    \ in the following snippet:\n\n```\nfunc handleRequest(conn net.Conn) {\n    ...\n\
    \    len, err := conn.Read(buf)\n    ...\n    conn.Write([]byte(fmt.Sprintf(\"\
    Message received of length : %d\", len)))\n    conn.Close()\n}\n```\n\nThe code\
    \ reads the data sent by the client using the `Read(..)` function of the connection\
    \ and writes the response back using the `Write(..)` function of the same connection.\n\
    \nBecause the code uses a goroutine, the TCP server is able to process multiple\
    \ client requests without any blocking issues.\n\n## UDP Networking\n\nIn this\
    \ section, you will look at writing network applications using the UDP protocol."
  raw: '## Summary


    In this chapter, you looked at an open source project called Scorecard that provides
    security metrics for projects hosted on GitHub. The project measures the security
    of a project on a scale of 0-10 and this can also be used for projects stored
    locally. The major benefit of the tool is the public availability of data for
    projects that have been scanned by the tool. This data is useful for developers
    because it gives them information and insights on the security metrics of projects
    they are planning to use.


    You also looked at how the tool works and learned how to use the GitHub API to
    extract repository information to perform predefined security checks.


    You learned in detail about the different availability of the GitHub APIs, which
    are REST and GraphQL. You looked at the sample code to understand how to use each
    of these APIs to extract information from a GitHub repository. Finally, you explore
    the GitHub Explorer to understand how to construct GraphQL queries for performing
    query operations on GitHub.


    # Part IVNetworking


    # 9. Simple Networking


    In this chapter, you will learn how to write networking code using Go. You will
    understand how to write client and server code for the TCP and UDP protocols.
    You will also look at writing a network server that can process requests concurrently
    using goroutines. By the end of the chapter, you will know how to do the following:


    *   Write a network client for TCP and UDP


    *   Write a network server for TCP and UDP


    *   Use goroutines to process requests


    *   Load test a network server


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.


    ## TCP Networking


    In this section, you will explore creating TCP applications using the standard
    Go network library. The code that you will write is both TCP client and server.


    ### TCP Client


    Let’s start by writing a TCP client that connects to a particular HTTP server,
    in this case [`google.com`](http://google.com), and prints out the response from
    the server. The code can be found inside the `chapter9/tcp/simple` directory.
    Run it as follows:


    ```

    go run main.go

    ```


    When the code runs, it will try to connect to the [`google.com`](http://google.com)
    server and print out the web page returned to the console, as shown in the output
    here:


    ```

    HTTP/1.0 200 OK

    Date: Sun, 05 Dec 2021 10:27:46 GMT

    Expires: -1

    Cache-Control: private, max-age=0

    Content-Type: text/html; charset=ISO-8859-1

    P3P: CP="This is not a P3P policy! See g.co/p3phelp for more info."

    Server: gws

    X-XSS-Protection: 0

    X-Frame-Options: SAMEORIGIN

    Set-Cookie: 1P_JAR=2021-12-05-10; expires=Tue, 04-Jan-2022 10:27:46 GMT; path=/;
    domain=.google.com; Secure

    Set-Cookie:

    ...

    Accept-Ranges: none

    Vary: Accept-Encoding


    ...

    ```


    The app uses the `net` package from the standard library and it uses a TCP connection
    specified in the following code:


    ```

    conn, err := net.Dial("tcp", t)

    if err != nil {

    panic(err)

    }

    ```


    Here is the code that connects to the server:


    ```

    package main

    ...

    const (

    host = "google.com"

    port = "80"

    )

    func main() {

    t := net.JoinHostPort(host, port)

    conn, err := net.Dial("tcp", t)

    if err != nil {

    panic(err)

    }

    ...

    }

    ```


    The code uses the `net.Dial(..)` function to connect to [`google.com`](http://google.com)
    on port 80 using a TCP connection. Once it successfully connects, it sends the
    HTTP protocol to the server to tell the server that it is requesting the index
    page, as shown here:


    ```

    func main() {

    ...

    req := "GET / \r\nHost: google.com\r\nConnection: close\r\n\r\n"

    conn.Write([]byte(req))

    ...

    }

    ```


    Once it receives the response, it prints the output on the console, as shown in
    this code snippet:


    ```

    ...

    func main() {

    ...

    connReader := bufio.NewReader(conn)

    scanner := bufio.NewScanner(connReader)

    for scanner.Scan() {

    fmt.Printf("%s\n", scanner.Text())

    }

    if err := scanner.Err(); err != nil {

    fmt.Println("Scanner error", err)

    }

    }

    ```


    Now that you understand how to write a TCP client, in the next section you will
    learn how to write a TCP server.


    ### TCP Server


    In this section, you will write a TCP server that listens to port 3333 on your
    local machine. The server will print out what it received and send a response
    back. The code is inside the `tcp/server` directory, and it can be run as follows:


    ```

    go run main.go

    ```


    You will get output as follows:


    ```

    2022/03/05 22:51:19 Listening on port 3333

    ```


    Use the `nc` (network connect) tool to connect to the server, as shown here:


    ```

    nc localhost 3333

    ```


    Once connected, enter any text and press Enter. You will get a response back.
    The following is an example. I typed in *This is a test* and it came back with
    a response of *Message received of length : 15.*


    ```

    This is a test

    Message received of length : 15

    ```


    Let’s take a look at the code. The first thing you will look at how the code waits
    and listens on port 3333, as shown in the following code snippet:


    ```

    func main() {

    t := net.JoinHostPort("localhost", "3333")

    l, err := net.Listen("tcp", t)

    ...

    for {

    conn, err := l.Accept()

    if err != nil {

    log.Println("Error accepting: ", err.Error())

    os.Exit(1)

    }

    go handleRequest(conn)

    }

    }

    ```


    The code uses the `Accept` function of the `Listener` object, which is returned
    when calling the `net.Listen(..)` function. The `Accept` function waits until
    it receives a connection.


    When the client is connected successfully, the code proceeds by calling the `handleRequest`
    function in a separate goroutine. Having requests processed in a separate goroutine
    allows the application to process requests concurrently.


    The handling of the request and the sending of the response is taken care of inside
    the `handleRequest` function, as shown in the following snippet:


    ```

    func handleRequest(conn net.Conn) {

    ...

    len, err := conn.Read(buf)

    ...

    conn.Write([]byte(fmt.Sprintf("Message received of length : %d", len)))

    conn.Close()

    }

    ```


    The code reads the data sent by the client using the `Read(..)` function of the
    connection and writes the response back using the `Write(..)` function of the
    same connection.


    Because the code uses a goroutine, the TCP server is able to process multiple
    client requests without any blocking issues.


    ## UDP Networking


    In this section, you will look at writing network applications using the UDP protocol.'
  trans: "\n# 总结\n\n在本章中，你了解了一个名为 Scorecard 的开源项目，它为托管在 GitHub 上的项目提供安全指标。该项目以 0-10\
    \ 的评分标准衡量项目的安全性，该评分标准同样适用于本地存储的项目。该工具的主要优势在于，被扫描项目的相关数据可公开获取。这些数据对开发者极为有用，因为它能提供有关他们计划使用的项目安全指标的洞察和信息。\n\
    \n你还了解了该工具的工作原理，并学习了如何使用 GitHub API 提取仓库信息以执行预定义的安全检查。\n\n你详细了解了 GitHub API 的不同可用形式，即\
    \ REST 和 GraphQL。你查看了示例代码，以理解如何使用这些 API 从 GitHub 仓库中提取信息。最后，你探索了 GitHub Explorer，以理解如何构建用于在\
    \ GitHub 上执行查询操作的 GraphQL 查询。\n\n# 第四部分 网络\n\n# 9. 简单网络\n\n在本章中，你将学习如何使用 Go 编写网络代码。你将理解如何为\
    \ TCP 和 UDP 协议编写客户端和服务器代码。你还将学习如何编写一个能够使用 goroutine 并发处理请求的网络服务器。到本章结束时，你将掌握以下内容：\n\
    \n- 为 TCP 和 UDP 编写网络客户端\n- 为 TCP 和 UDP 编写网络服务器\n- 使用 goroutine 处理请求\n- 对网络服务器进行负载测试\n\
    \n## 源代码\n\n本章的源代码可从 `https://github.com/Apress/Software-Development-Go` 仓库获取。\n\
    \n## TCP 网络\n\n在本节中，你将探索如何使用 Go 标准网络库创建 TCP 应用程序。你将编写的代码包括 TCP 客户端和服务器。\n\n###\
    \ TCP 客户端\n\n让我们从编写一个 TCP 客户端开始，该客户端连接到一个特定的 HTTP 服务器，在本例中是 `google.com`，并打印出服务器的响应。代码位于\
    \ `chapter9/tcp/simple` 目录下。按如下方式运行它：\n\n```\ngo run main.go\n```\n\n代码运行时，它将尝试连接到\
    \ `google.com` 服务器，并将返回的网页打印到控制台，如下所示输出：\n\n```\nHTTP/1.0 200 OK\nDate: Sun, 05\
    \ Dec 2021 10:27:46 GMT\nExpires: -1\nCache-Control: private, max-age=0\nContent-Type:\
    \ text/html; charset=ISO-8859-1\nP3P: CP=\"This is not a P3P policy! See g.co/p3phelp\
    \ for more info.\"\nServer: gws\nX-XSS-Protection: 0\nX-Frame-Options: SAMEORIGIN\n\
    Set-Cookie: 1P_JAR=2021-12-05-10; expires=Tue, 04-Jan-2022 10:27:46 GMT; path=/;\
    \ domain=.google.com; Secure\nSet-Cookie:\n...\nAccept-Ranges: none\nVary: Accept-Encoding\n\
    \n...\n```\n\n该应用使用了标准库中的 `net` 包，并使用如下代码指定的 TCP 连接：\n\n```\nconn, err := net.Dial(\"\
    tcp\", t)\nif err != nil {\n    panic(err)\n}\n```\n\n以下是连接到服务器的代码：\n\n```\npackage\
    \ main\n...\nconst (\n    host = \"google.com\"\n    port = \"80\"\n)\nfunc main()\
    \ {\n    t := net.JoinHostPort(host, port)\n    conn, err := net.Dial(\"tcp\"\
    , t)\n    if err != nil {\n        panic(err)\n    }\n...\n}\n```\n\n代码使用 `net.Dial(..)`\
    \ 函数通过 TCP 连接到 `google.com` 的 80 端口。成功连接后，它向服务器发送 HTTP 协议，告知服务器正在请求首页，如下所示：\n\n\
    ```\nfunc main() {\n...\n    req := \"GET / \\r\\nHost: google.com\\r\\nConnection:\
    \ close\\r\\n\\r\\n\"\n    conn.Write([]byte(req))\n...\n}\n```\n\n收到响应后，它将输出打印到控制台，如下面这段代码所示：\n\
    \n```\n...\nfunc main() {\n...\n    connReader := bufio.NewReader(conn)\n    scanner\
    \ := bufio.NewScanner(connReader)\n    for scanner.Scan() {\n        fmt.Printf(\"\
    %s\\n\", scanner.Text())\n    }\n    if err := scanner.Err(); err != nil {\n \
    \       fmt.Println(\"Scanner error\", err)\n    }\n}\n```\n\n现在你已经理解了如何编写 TCP\
    \ 客户端，下一节你将学习如何编写 TCP 服务器。\n\n### TCP 服务器\n\n在本节中，你将编写一个 TCP 服务器，它监听本地机器上的 3333\
    \ 端口。该服务器将打印出收到的内容，并发送一个响应。代码位于 `tcp/server` 目录下，可以按如下方式运行：\n\n```\ngo run main.go\n\
    ```\n\n你将得到如下输出：\n\n```\n2022/03/05 22:51:19 Listening on port 3333\n```\n\n使用\
    \ `nc`（网络连接）工具连接到该服务器，如下所示：\n\n```\nnc localhost 3333\n```\n\n连接后，输入任何文本并按回车键。你将得到一个响应。以下是一个示例。我输入了\
    \ *This is a test*，它返回了一个响应：*Message received of length : 15.*\n\n```\nThis is\
    \ a test\nMessage received of length : 15\n```\n\n让我们看一下代码。首先，你将看到代码如何等待并监听 3333\
    \ 端口，如下面这段代码所示：\n\n```\nfunc main() {\n    t := net.JoinHostPort(\"localhost\"\
    , \"3333\")\n    l, err := net.Listen(\"tcp\", t)\n    ...\n    for {\n      \
    \  conn, err := l.Accept()\n        if err != nil {\n            log.Println(\"\
    Error accepting: \", err.Error())\n            os.Exit(1)\n        }\n       \
    \ go handleRequest(conn)\n    }\n}\n```\n\n代码使用了 `Listener` 对象的 `Accept` 函数，该对象在调用\
    \ `net.Listen(..)` 函数时返回。`Accept` 函数会一直等待，直到收到连接。\n\n当客户端成功连接后，代码会继续调用一个单独的 goroutine\
    \ 中的 `handleRequest` 函数。在单独的 goroutine 中处理请求，使得应用能够并发处理请求。\n\n请求的处理和响应的发送在 `handleRequest`\
    \ 函数内部完成，如下面这段代码所示：\n\n```\nfunc handleRequest(conn net.Conn) {\n    ...\n   \
    \ len, err := conn.Read(buf)\n    ...\n    conn.Write([]byte(fmt.Sprintf(\"Message\
    \ received of length : %d\", len)))\n    conn.Close()\n}\n```\n\n代码使用连接的 `Read(..)`\
    \ 函数读取客户端发送的数据，并使用同一连接的 `Write(..)` 函数写回响应。\n\n由于代码使用了 goroutine，TCP 服务器能够处理多个客户端请求而不会出现阻塞问题。\n\
    \n## UDP 网络\n\n在本节中，你将学习如何使用 UDP 协议编写网络应用程序。\n"
- fmt: "### UDP Client\n\nIn this section, you will write a simple UDP application\
    \ that communicates with a quote-of-the-day (qotd) server that returns a string\
    \ quote and prints it out to the console. The following link provides more information\
    \ about the qotd protocol and the available public servers: [`www.gkbrk.com/wiki/qotd_protocol/`](http://www.gkbrk.com/wiki/qotd_protocol/).\
    \ The sample code connects to the server [`djxms.net`](http://djxms.net) that\
    \ listens on port 17.\n\nThe code can be found inside the `chapter9/udp/simple`\
    \ directory, and it can be run as follows:\n\n```\ngo run main.go\n```\n\nEvery\
    \ time you run the application you will get different quotes. In my case, one\
    \ was the following:\n\n> “Man can climb to the highest summits, but he cannot\
    \ dwell there long.”\n> \n> George Bernard Shaw (1856-1950)\n\nLet’s take a look\
    \ at the different parts of the application and understand what it is doing. The\
    \ `qotd` function contains the following snippet. It uses `net.ResolveUDPAddr(..)`\
    \ from the standard library to connect to the server and return a `UDPAddr` struct.\n\
    \n```\nudpAddr, err := net.ResolveUDPAddr(\"udp\", s)\nif err != nil {\nprintln(\"\
    Error Resolving UDP Address:\", err.Error())\nos.Exit(1)\n}\n```\n\nThe library\
    \ does a lookup to ensure that the provided domain is valid, and this is done\
    \ by doing a DNS lookup. On encountering error, it will return a non-nil for the\
    \ `err` variable.\n\nStepping through the `net.ResolveUDPAddr` function inside\
    \ the standard library shown in Figure [9-1](#527551_1_En_9_Chapter.xhtml#Fig1),\
    \ you can see that the DNS lookup for the domain returns more than one IP address,\
    \ but only the first IP address is populated in the returned `UDPAddr` struct.\n\
    \n![](images/527551_1_En_9_Chapter/527551_1_En_9_Fig1_HTML.jpg)\n\nTwo screenshots.\
    \ Above is the snippet explaining the connection to the server via IP address.\
    \ Below are the multiple IPs from the resolve UDP Addr.\n\n**Figure 9-1** Multiple\
    \ IPs from `ResolveUDPAddr`\n\nOnce `udpAddr` is successfully populated, it is\
    \ used when calling `net.DialUDP`. The function call opens a socket connection\
    \ to the server using the IP address that is provided inside `udpAddr`:\n\n```\n\
    conn, err := net.DialUDP(\"udp\", nil, udpAddr)\n```\n\nIn this section, you learned\
    \ how to connect a UDP server using the standard library. In the next section,\
    \ you will learn more on how to write a UDP server.\n\n### UDP Server\n\nIn this\
    \ section, you will explore further and write a UDP server using the standard\
    \ library. The server listens on port 3000 and prints out what is sent by the\
    \ client. The code can be found inside the `chapter9/udp/server` directory, and\
    \ it can be run as follows:\n\n```\ngo run main.go\n```\n\nThe sample prints out\
    \ the following on the console:\n\n```\n2022/03/05 23:51:32 Listening [::]:3000\n\
    ```\n\nOn a terminal window, use the `nc` command to connect to port 3000:\n\n\
    ```\nnc -u localhost 3000\n```\n\nOnce the `nc` tool runs, enter any text and\
    \ you will see it printed in the server’s terminal. Here is an example of how\
    \ it looked on my machine:\n\n```\n2022/03/05 23:51:32 Listening [::]:3000\n2022/03/05\
    \ 23:51:36 Received: nanik from [::1]:41518\n2022/03/05 23:51:44 Received: this\
    \ is a long letter from [::1]:41518\n```\n\nLet’s explore how the code works.\
    \ The following snippet sets up the UDP server using the `net.ListenUDP` function:\n\
    \n```\n...\nfunc main() {\nconn, err := net.ListenUDP(\"udp\", &net.UDPAddr{\n\
    Port: 3000,\nIP:   net.ParseIP(\"0.0.0.0\"),\n})\n...\n}\n```\n\nThe function\
    \ call returns a `UDPConn` struct that is used to read and write to the client.\
    \ After the code successfully creates a UDP server connection, it starts listening\
    \ to read data from it, as shown here:\n\n```\n...\nfunc main() {\n...\nfor {\n\
    message := make([]byte, 512)\nl, u, err := conn.ReadFromUDP(message[:])\n...\n\
    log.Printf(\"Received: %s from %s\\n\", data, u)\n}\n}\n```\n\nThe code uses the\
    \ `ReadFromUDP(..)` function of the UDP connection to read the data that is sent\
    \ by the client to print it out to the console.\n\n### Concurrent Servers\n\n\
    In the previous section, you wrote a UDP server but one of the things that is\
    \ lacking is its ability to process multiple UDP client requests. Writing a UDP\
    \ server that can process multiple requests is different from normal TCP. The\
    \ way to structure the application is to spin off multiple goroutines to listen\
    \ on the same connection and let each goroutine take care of processing the request.\
    \ The code can be found inside the `udp/concurrent` directory. Let’s take a look\
    \ at what it is doing differently compared to the previous UDP server implementation.\n\
    \nThe following snippet shows the code spinning off multiple goroutines to listen\
    \ to the UDP connection:\n\n```\n...\nfunc main() {\naddr := net.UDPAddr{\nPort:\
    \ 3333,\n}\nconnection, err := net.ListenUDP(\"udp\", &addr)\n...\nfor i := 0;\
    \ i < runtime.NumCPU(); i++ {\n...\ngo listen(id, connection, quit)\n...\n}\n\
    ...\n}\n```\n\nThe number of goroutine runs depends on the result returned from\
    \ `runtime.NumCPU()`. The goroutine use the `listen` function, which is shown\
    \ in the following snippet:\n\n```\nfunc listen(i int, connection *net.UDPConn,\
    \ quit chan struct{}) {\nbuffer := make([]byte, 1024)\nfor {\n_, remote, err :=\
    \ connection.ReadFromUDP(buffer)\nif err != nil {\nbreak\n}\n...\n}\n...\n}\n\
    ```\n\nNow that the `listen` function is run as several goroutines, it waits on\
    \ an incoming UDP request by calling the `ReadFromUDP` function. When an incoming\
    \ UDP request is detected, one of the running goroutines processes it."
