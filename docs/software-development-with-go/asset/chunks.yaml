    \n让我们看看位于 `chapter17/machine` 文件夹中的示例应用程序。此示例使用 `go-systemd` 库来查询本地存储的镜像。将目录更改为\
    \ `chapter17/machine` 并按如下方式运行示例：\n\n```\ngo run main.go\n```\n\n你将得到类似如下的输出：\n\
