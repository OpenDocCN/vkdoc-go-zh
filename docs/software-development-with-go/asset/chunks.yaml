    # Introduction


    Go has been out for more than 10 years, and open source projects were developed
    using Go. The aim of this book is to show you the way to use Go to write a variety
    of applications that are useful in cloud-based systems.


    Deploying applications into the cloud is a normal process that developers do every
    day. There are many questions that developers ask themselves about the cloud,
    like


    *   How do containers work in a cloud environment?

    *   How do cloud monitoring applications know how much memory is left for my virtual
    machines?

    *   How can I build a high performance networking server in Linux environment?

    *   How do I scan code before deploying to the cloud to stop code deployment if
    it contains related information?


    and many other cloud-relevant questions.


    The book talks about different topics that are relevant in today’s cloud environment.
    The approach is to explain each topic at a high level and then help you understand
    it by going through the details with the code. The book uses a combination of
    open source projects hosted in GitHub and sample code. The open source projects
    chosen are relevant to the topic. You will get a good grasp about the tool and
    also how the code works internally.


    # Acknowledgments


    Thanks to everyone on the Apress team who helped and guided me so much. Special
    thanks to James Robinson-Prior who guided me through the writing process and to
    Nirmal Selvaraj who made sure everything was done correctly and things were on
    track.


    Thanks to the technical reviewers for taking time from their busy schedules to
    review my book and provide great feedback.


    Finally, thanks to you, the reader, for spending time reading this book and spreading
    the love of Go.


