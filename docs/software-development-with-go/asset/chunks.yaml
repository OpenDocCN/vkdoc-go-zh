- fmt: "# Abstract Syntax Tree\n\nAbstract syntax tree (also known as syntax tree)\
    \ is a tree representation of the structure of the source code written in a programming\
    \ language. When you write code in Go and you compiled the code, the compiler\
    \ will first convert the source code internally into a data structure representing\
    \ the code. This data structure will be used by the compiler as an intermediate\
    \ representation and it will go through several stages before it produces machine\
    \ code. Figure [7-1](#527551_1_En_7_Chapter.xhtml#Fig1) shows at a high level\
    \ the different steps that compiler does when compiling code.\n\n![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig1_HTML.jpg)\n\
    \nA flow diagram represents stages of source code including scanning, parsing,\
    \ generating AST, and generating machine code.\n\nFigure 7-1\n\nStages of compiling\
    \ source code\n\nLet’s take a quick peek at what AST looks like in comparison\
    \ to the original code. Figure [7-2](#527551_1_En_7_Chapter.xhtml#Fig2) shows\
    \ the comparison between the original Go code and when it is converted into AST\
    \ during the compilation process.\n\n![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig2_HTML.jpg)\n\
    \nA screenshot of the conversion of the original code representing package main\
    \ including the main function and print convert with the help of an Abstract syntax\
    \ tree to the final code.\n\nFigure 7-2\n\nOriginal code vs. AST\n\nTo the normal\
    \ eye, the AST looks like a bunch of text, but for the compiler it is very helpful\
    \ because the data structure allows it to go through different parts of the code\
    \ to check for errors, warnings, and many other things.\n\nGo provides a built-in\
    \ module that makes it easy for applications to convert source code into AST,\
    \ and this module is used by tools like `golanci-lint` (`github.com/golangci/golangci-lint`)\
    \ for reading and linting Go source code.\n\nWhat does the AST data structure\
    \ look like? Figure [7-3](#527551_1_En_7_Chapter.xhtml#Fig3) shows a brief view\
    \ of the AST structure.\n\n![](images/527551_1_En_7_Chapter/527551_1_En_7_Fig3_HTML.jpg)\n\
    \nA classification chart of `Ast.Node` into 3 categories including `ast.Declaration`,\
    \ `ImportSpec`, and `Identification`. `ast.Declaration` is further classified\
    \ into `GenDecl` and `FunDecl`.\n\nFigure 7-3\n\nAST structure\n\nTable [7-1](#527551_1_En_7_Chapter.xhtml#Tab1)\
    \ briefly explains the different structures.\n\nTable 7-1\n\nDifferent Structures\n\
    \n| `Ast.Node` | This is the main interface that others must implement |\n| `ast.FuncDecl`\
    \ | The structure representing the declaration-like function, such as `func myfunc(){\
    \ }` |\n| `ast.GenDecl` | The structure representing a generic declaration, such\
    \ as `var x = \"a string\"` |\n| `ast.ImportSpec` | The structure representing\
    \ an import declaration, such as `import \"go/token\"` |\n\nThere are many real\
    \ world use cases that benefit from using AST:\n\n- **Code generators**: This\
    \ kind of application requires the use of AST to generate source code.\n- **Static\
    \ code analyzer**: Tools such as `gosec`, which will be discussed in this chapter,\
