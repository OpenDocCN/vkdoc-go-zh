    2022/07/17 19:20:42 Getpgrp :  23712

    2022/07/17 19:20:42 Gettid :  23815

    2022/07/17 19:20:42 /home/nanik/go/chapter2/syscal

    ```


    示例代码使用系统调用获取自身信息，例如操作系统为其分配的进程 ID、父进程 ID 等。以下是它如何使用 `syscall` 包的示例：


