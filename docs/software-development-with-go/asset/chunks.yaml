  trans: '

    ### GitHub API


    GitHub 提供两种 API：REST 和 GraphQL (`https://docs.github.com/en/graphql`)。有多个不同的项目实现了这两种
    API，稍后你会看到它们。


    基于 REST 的 API 的访问方式与普通 HTTP 调用类似。例如，你可以在自己的浏览器中输入以下地址：


    ```

    https://api.github.com/users/test

    ```


    你将在浏览器中看到如下的 JSON 响应：


    ```

    {

    "login": "test",

    "id": 383316,

    "node_id": "MDQ6VXNlcjM4MzMxNg==",

    "avatar_url": "https://avatars.githubusercontent.com/u/383316?v=4",

    "gravatar_id": "",

    "url": "https://api.github.com/users/test",

    "html_url": "https://github.com/test",

    ...

    "created_at": "2010-09-01T10:39:12Z",

    "updated_at": "2020-04-24T20:58:44Z"

    }

    ```


    你看到的是 GitHub 中注册的名为 `test` 的用户信息。你可以尝试使用你自己的 GitHub 用户名，然后就会看到你自己的详细信息。现在，让我们获取某个特定组织的仓库列表。在浏览器地址栏中输入以下内容：


    ```

    https://api.github.com/orgs/golang/repos

    ```


    该地址会返回存放在某个特定组织名下、且公开托管在 GitHub 上的仓库列表。在示例中，你想要获取存放在 Golang 组织下的仓库列表。你将得到如下响应：


    ```

    [

    {

    "id": 1914329,

    "node_id": "MDEwOlJlcG9zaXRvcnkxOTE0MzI5",

    "name": "gddo",

    "full_name": "golang/gddo",

    "private": false,

    "owner": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "html_url": "https://github.com/golang/gddo",

    "description": "Go Doc Dot Org",

    "fork": false,

    ...

    "license": {

    ...

    },

    ...

    "permissions": {

    ...

    }

    },

    { ... }

    ]

    ```


    响应是 JSON 格式。你看到的信息与你访问 `https://github.com/golang` 上的 Golang 项目页面时所看到的信息相同。`https://docs.github.com/en/rest`
    上的 GitHub 文档提供了所有可访问的 REST 端点的完整列表。


    在 Go 应用程序中使用该 API，需要将不同的端点转换为你可以在应用程序中使用的函数，这是一个耗时的过程。因此，你可以使用来自 `https://github.com/google/go-github`
    的 Go 开源库。让我们运行一个使用此库的示例，该示例可以在 `chapter8/simple` 文件夹中找到。打开终端并按如下方式运行：


    ```

    go run main.go

    ```


    你将得到以下输出：


    ```

    2022/07/16 18:43:43 {

    "id": 23096959,

    "node_id": "MDEwOlJlcG9zaXRvcnkyMzA5Njk1OQ==",

    "owner": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "name": "go",

    "full_name": "golang/go",

    "description": "The Go programming language",

    "homepage": "https://go.dev",

    ...

    "organization": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "topics": [

    "go",

    ...

    ],

    ...

    "license": {

    ...

    },

    ...

    }

    ```


    该示例使用该库获取特定仓库 `http://github.com/golang/go` 的信息，如下面的代码片段所示：


    ```

    package main

    import (

    ...

    "github.com/google/go-github/v38/github"

    )

    func main() {

    client := github.NewClient(&http.Client{})

    ctx := context.Background()

    repo, _, err := client.Repositories.Get(ctx, "golang", "go")

    ...

    log.Println(string(r))

    }

    ```


    应用程序首先通过调用 `github.NewClient(..)` 并传入 `http.Client` 来初始化该库，`http.Client` 用于向 GitHub
    发起 HTTP 调用。库包 `github.com/google/go-github/v38/github` 提供了所需的所有不同函数。在示例中，你使用了
    `Repositories.Get(..)` 来获取特定仓库（`golang`）项目（`go`）的信息。


    查看库的源代码（`github.com/google/go-github/v38/github/repos.go`），你会发现它执行的是与 `https://docs.github.com/en/rest/repos/repos#get-a-repository`
    文档中定义的类似的调用。


    ```

    func (s *RepositoriesService) Get(ctx context.Context, owner, repo string) (*Repository,
    *Response, error) {

    u := fmt.Sprintf("repos/%v/%v", owner, repo)

    req, err := s.client.NewRequest("GET", u, nil)

    if err != nil {

    return nil, nil, err

    }

    ...

    return repository, resp, nil

    }

    ```


    在浏览器中使用 `https://api.github.com/repos/golang/go` 会得到相同的响应。


    GitHub 提供的另一个 API 称为 GraphQL API (`https://docs.github.com/en/graphql`)，它与 REST
    API 截然不同。它基于 GraphQL (`https://graphql.org/`)，其网站对此描述如下：


    GraphQL 是一种用于 API 的查询语言，也是一个利用你现有数据来满足这些查询的运行时。GraphQL 提供了 API 中数据的完整且易于理解的描述，赋予客户端精确请求所需内容（且仅此而已）的能力，让
    API 随着时间推移更容易演进，并支持强大的开发者工具。


    通常，当使用 REST API 获取不同类型的数据时，你需要从不同的端点获取。在收集完所有数据后，还需要将它们构建成一个结构体。GraphQL 使其变得简单：你只需定义你想要获取的仓库数据，它就会将你请求的数据集合作为一个单一的集合返回。


    当你查看提供的示例应用程序时，这一点会变得更加清晰。打开终端并运行 `chapter8/graphql` 中的示例。按如下方式运行：


    ```

    GITHUB_TOKEN= go run main.go

    ```


    你需要使用之前在“设置 Scorecard”部分创建的 GitHub 令牌。如果运行成功，你将得到以下结果（输出会有所不同，因为数据是实时从 GitHub
    获取的，在你运行此示例时数据可能已经发生了变化）：

    '
