    2022/07/16 19:39:00 Commit author (nigeltao), url (https://github.com/nigeltao)

    2022/07/16 19:39:00 Commit author (h4ck3rm1k3), url (https://github.com/h4ck3rm1k3)

    2022/07/16 19:39:00 Commit author (trombonehero), url (https://github.com/trombonehero)

    2022/07/16 19:39:00 Commit author (adg), url (https://github.com/adg)

    ```


    The output shows the information obtained from GitHub from the `http://github.com/golang/go`
    repository as the first 10 issues, first 10 comments, and 10 first labels. This
    kind of information is very useful, and you will see it as you walk through the
    code, which is performed easily by using the GraphQL API.


    The main part of the GraphQL API is the query that the sample passes to the GitHub
    endpoint, which looks like the following:


    ```graphql

    query ($name: String!, $owner: String!) {

    repository(owner: $owner, name: $name) {

    createdAt

    forkCount

    labels(first: 5) {

    edges {

    node {

    name

    }

    }

    }

    issues(first: 5) {

    edges {

    node {

    title

    }

    }

    }

    commitComments(first: 10) {

    totalCount

    edges {

    node {

    author {

    url

    login

    }

    }

    }

    }

    }

    }

    ```


    The query describes to GitHub the repository information you are interested in.
    It starts by defining that the query will pass in two parameters (`$name` and
    `$owner`) and that the top level of the information you want is a repository.
    Inside the repository, you specified that you want the following:


    *   `createdAt`

    *   `forkCount`

    *   `labels` (the first 10 labels)

    *   `issues` (the first 10 issues)

    *   `commitComments` (the first 10 comments)


    GitHub provides a GraphQL tool for creating and testing GraphQL, which you will
    look at in the next section. The GraphQL cannot be used as is inside your code,
    so you need to convert it into a Go struct, as shown in the following snippet:


    ```go

    type graphqlData struct {

    Repository struct {

    CreatedAt githubv4.DateTime

    ForkCount githubv4.Int

    Labels    struct {

    Edges []struct {

    Node struct {

    Name githubv4.String

    }

    }

    } `graphql:"labels(first: $labelcount)"`

    Issues struct {

    Edges []struct {

    Node struct {

    Title githubv4.String

    }

    }

    } `graphql:"issues(first: $issuescount)"`

