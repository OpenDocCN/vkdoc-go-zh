- fmt: '# Learning From CrowdSec


    CrowdSec as a project is quite complex and it contains a lot of different things
    that are very interesting to learn from. In this section, you will pick up a few
    topics that are used inside CrowdSec that are useful to learn. These topics can
    also be applied when designing your own software with Go.


    ## System Signal Handling


    As a system, CrowdSec provides an extensive list of features that are broken down
    into several different modules. The reason for features to be broken down into
    modules is to make it easy for development, maintenance, and testing. When building
    a system, one of the key things to remember is to make sure all the different
    modules can be gracefully terminated and all resources such as memory, network
    connections, and disk space are released. To make sure that different parts of
    the system shut down properly, you need some sort of coordinated communication
    to understand when modules need to prepare for the shutdown process.


    Imagine a scenario where you are designing an application and it is terminated
    by the operating system because of some resource constraint. The application must
    be aware of this and have the capability to shut down all the different modules
    independently before shutting itself down permanently. You will look at an example
    on how this is done using the code sample in the `chapter14/signalhandler` folder.


    Open your terminal and run the sample as follows:


    ```

    go run main.go

    ```


    The application will keep on running, printing out loop messages on the terminal
    until you stop it by hitting Ctrl+C to stop. Then it will print out the following:


    ```

    2022/07/24 22:31:32 loop1000Times -  0

    2022/07/24 22:31:32 loop100Times -  0

    2022/07/24 22:31:32 loop100Times -  1

    ...

    2022/07/24 22:31:32 loop1000Times -  14

    2022/07/24 22:31:33 loop1000Times -  15

    2022/07/24 22:31:33 loop100Times -  15

    ^C2022/07/24 22:31:33 SIGTERM received

    2022/07/24 22:31:33 loop1000Times - quit

    2022/07/24 22:31:33 loop100Times - quit

    2022/07/24 22:31:33 Complete!

    ```


    The application successfully shuts down gracefully because the Ctrl+C key combo
    is detected. Before going through the code, Figure [14-3](#527551_1_En_14_Chapter.xhtml#Fig3)
    shows the app design. Use Figure [14-3](#527551_1_En_14_Chapter.xhtml#Fig3) as
    guidance when you walk through the sample code.


    ![](images/527551_1_En_14_Chapter/527551_1_En_14_Fig3_HTML.jpg)


    A flowchart of the Crowdsec system starts from `main.go` then register signal
    channel after that classified into a loop in 100 and 1000 times function then
    wait for function.


    **Figure 14-3** CrowdSec system signal handling


    The following code snippet shows the registration of system interruption events
    using Go’s built-in `os/signal` package (step 1). The function `signal.Notify(..)`
    is called, passing in the signals that will be registered to listen to. In the
    sample code, you register `SIGHUP`, `SIGTERM`, and `SIGINT`.


    ```

    func main() {

    signalChan := make(chan os.Signal, 1)

    signal.Notify(signalChan,

    syscall.SIGHUP,

    syscall.SIGTERM,

    syscall.SIGINT)

    ...

    go func() {

    for {

    s := <-signalChan

    switch s {

    case syscall.SIGHUP, syscall.SIGINT, syscall.SIGTERM:

    ...

    }

    }

    }()

    ...

    }

    ```


    The following explains the meaning of the signals:


    - `SIGHUP`: The operating system sends this signal when the terminal used to execute
    the application is disconnected, closed, or broken.

    - `SIGTERM`: This is a generic signal that is used by the operating system to
    signal terminating a process or application.

    - `SIGINT`: This is also referred to as a program interrupt and this signal occurs
    when the Ctrl+C combination is detected.


    The code listens to all these signals to ensure that if any of them are detected,
    it will do its job to shut itself down properly.


    The `signalChan` variable is a channel that accepts `os.Signal` and it is passed
    as parameter when calling `signal.Notify()`. The goroutine takes care of handling
    the signal received from the library in a `for{}` loop (step 2). Receiving a signal
    (step 6) means that there is an interruption, so the code must take the necessary
    steps to start the shutdown process (step 7).


    Now that the code is ready to receive the system event and it knows what it is
    supposed to when it receives it, let’s take a look at how other modules/goroutines
    are informed about this. The sample code spawns two goroutines, as shown here:


    ```

    func main() {

    ...

    wg.Add(2)

    go loop100Times(stop, &wg)

    go loop1000Times(stop, &wg)

    wg.Wait()

    log.Println("Complete!")

    }

    ```


    `loop100Times` and `loop1000Times` are called as goroutines (step 3) and are passed
    two parameters, `stop` and `wg`. The `stop` variable is a channel variable that
    is used by the goroutine function to know when it needs to stop processing. The
    following code snippet shows the code that closes the `stop` channel:


    ```

    func main() {

    ...

    go func() {

    for {

    ...

    switch s {

    case syscall.SIGHUP, syscall.SIGINT, syscall.SIGTERM:

    ...

    close(stop)

    ...

    }

    }

    }()

    ...

    }

    ```


    The `close(stop)` function closes the channel, and any part of the application
    that is checking for this channel will detect there is activity happening on the
    channel and will act on it. The checking of the `stop` channel can be seen in
    the following code snippet:


    ```

    func loop100Times(stop <-chan string, wg *sync.WaitGroup) {

    ...

    for {

    select {

    case <-stop:

    log.Println("loop100Times - quit")

    return

    default:

    ...

    }

    }

    }

    ```


    The `loop100Times` function runs inside a `for{}` loop where it checks the channel
    condition inside the `select{}` statement. To make it easy to understand, basically
    the `for{ select {} }` block of code translate to the following:


    Keep on doing the `for` loop, and on every loop check do the following:


    - Is there any value to read from the `stop` channel? if there is something, processes
    must stop.

    - Otherwise, just print to the console and increment the counter.


    The same logic is used inside the `loop1000Times` function, so it works exactly
    the same. Both functions will stop processing and will print the counter value
    to the terminal once the `stop` channel is closed. The application has achieved
    the state of shutting down itself gracefully by informing the different parts
    of the code that it is shutting down.


    The last thing you are going to look at is the wait state (step 4). Now the different
    goroutines know when to shut down, but the application can only completely shut
    itself down *after* all the goroutines complete their processes. This is made
    possible by the use of `sync.WaitGroup`. The following code snippet shows the
    usage of `WaitGroup`:


    ```

    package main

    import (

    ...

    )

    func main() {

    ...

    var wg sync.WaitGroup

    ...

    wg.Add(2)

    go loop100Times(stop, &wg)

    go loop1000Times(stop, &wg)

    wg.Wait()

    log.Println("Complete!")

    }

    func loop100Times(stop <-chan string, wg *sync.WaitGroup) {

    ...

    defer wg.Done()

    for {

    ...

    }

    }

    func loop1000Times(stop <-chan string, wg *sync.WaitGroup) {

    ...

    defer wg.Done()

    for {

    ...

    }

    }

    ```'
