    # System Calls Using Go


    In this chapter, you will explore writing applications that perform system-level
    operations using system calls. The operating system provides a lot of ways for
    applications to extract information and perform operations. You will look at the
    different ways to extract system-level information and use both the Go standard
    library and system files.


    In this chapter, you will learn the following:


    - How to use `syscall` packages

    - How to understand and read ELF format files

    - How to use the `/sys` filesystem

    - How to write a simple application to read disk statistics


