- fmt: '### Epoll Wait


    The last step after registering is to call `syscall.EpollWait` to wait for an
    incoming event from the kernel, which is wrapped inside a `for {}` loop as shown
    in the following snippet. The `-1` parameter passed as the timeout parameter to
    the system indicates the application will wait indefinitely until an event is
    ready to be delivered by the kernel.


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    }

    ```


    When the application receives events, it start processing by looping through the
    number of events it receives, as shown here:


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    // go through the events

    for ev := 0; ev < n; ev++ {

    ...

    }

    }

    ```


    The event received contains the event type generated by the system and the file
    descriptor that it is for. This information is used by the code to check for a
    new client connection. This is done by checking whether the file descriptor it
    received is the same as the listener; if it is, then it will accept the connection
    by calling `syscall.Accept` using the listener FD.


    Once it gets a new FD for the client connection, it will also be registered by
    the code into `epoll` using `EpollCtl` with `EPOLL_CTL_ADD` flag. Once completed,
    both listener FD and client connection FD are registered inside `epoll` and the
    application can multiplex I/O operations for both.


    ```go

    for {

    n, err := syscall.EpollWait(epfd, events[:], -1)

    ...

    // go through the events

    for ev := 0; ev < n; ev++ {

    // if it is the same as the listener then accept connection

    if int(events[ev].Fd) == fd {

    connFd, _, err := syscall.Accept(fd)

    ...

    // new connection should be non blocking

    syscall.SetNonblock(fd, true)

    event.Events = syscall.EPOLLIN

    event.Fd = int32(connFd)

    // register new client connection fd to Interest List

    if err := syscall.EpollCtl(epfd, syscall.EPOLL_CTL_ADD, connFd, &event); err !=
    nil {

    log.Print("EpollCtl err : ", connFd, err)

    os.Exit(1)

    }

    } else {

    ...

    }

    }

    }

    ```


    As a final step, when the code detects that the FD received from the event is
    not the same as the listener FD, it will spin off a goroutine to handle the connection,
    which will echo back data received from the client.


    ### Epoll Library


    You looked at what `epoll` is all about and created an app that uses it. Writing
    an app that uses `epoll` requires writing a lot of repetitive code that takes
    care of accepting connections, reading requests, registering file descriptors,
    and more.


    Using an open source library can help in writing better applications because the
    library takes care of the heavy lifting required for `epoll`. In this section,
    you will look at `netpoll` ([`http://github.com/cloudwego/netpoll`](http://github.com/cloudwego/netpoll)).
    You will create an application using the library and see how the library takes
    care of `epoll` internally.


    The code can be found inside the `chapter12/epolling/netpoll` folder. It is an
    echo server that sends requests received as a response to the user.


    ```go

    import (

    ...

    "github.com/cloudwego/netpoll"

    )

    func main() {

    listener, err := netpoll.CreateListener("tcp", "127.0.0.1:8000")

    if err != nil {

    panic("Failure to create listener")

    }

    var opts = []netpoll.Option{

    netpoll.WithIdleTimeout(1 * time.Second),

    netpoll.WithIdleTimeout(10 * time.Minute),

    }

    eventLoop, err := netpoll.NewEventLoop(echoHandler, opts...)

    if err != nil {

    panic("Failure to create netpoll")

    }

    err = eventLoop.Serve(listener)

    if err != nil {

    panic("Failure to run netpoll")

    }

    }

    ...

    ```


    This code snippet shows the creation of a socket listener using `CreateListener`
    from the library to listen on port 8000. After successfully opening the listener,
    the code proceeds to configure the `netpoll` by specifying the timeout and specifying
    the `echoHandler` function to handle the incoming request. The code starts listening
    to incoming requests by calling the `Serve` function of `netpoll`.


    The `echoHandler` function handles reading and writing from the client socket
    connection using the passed-in parameter `netpoll.Connection`. The function reads
    using the `connection.Reader()` and writes using `connection.Write()`.


    ```go

    func echoHandler(ctx context.Context, connection netpoll.Connection) error {

    reader := connection.Reader()

    bts, err := reader.Next(reader.Len())

    if err != nil {

    log.Println("error reading data")

    return err

    }

    log.Println(fmt.Sprintf("Data: %s", string(bts)))

    connection.Write([]byte("-> " + string(bts)))

    return connection.Writer().Flush()

    }

    ```


    You can see that the code written using the `netpoll` library is easier to read
    than the code that you looked at in the previous section. A lot of the heavy lifting
    is performed by the library; it also provides more features and stability when
    writing high-performance networking code. Let’s take a look at how `netpoll` works
    behind the scenes. Figure [12-3](#527551_1_En_12_Chapter.xhtml#Fig3) shows at
    a high level the different components of `netpoll`.


    ![](images/527551_1_En_12_Chapter/527551_1_En_12_Fig3_HTML.jpg)


    A flow chart of the net poll server and new connection represents the Epoll load
    balancer including epoll blocks under the Linux kernel and finally to the goroutine
    pool.


    **Figure 12-3** netpoll high-level architecture


    The library creates more than one `epoll` and it uses the number of CPUs as the
    total number of `epoll`s it will create. Internally, it uses a load balancing
    strategy to decide which `epoll` a file descriptor will be registered to.


    The library will register to the `epoll` when it receives a new connection or
    when the `netpoll` server runs for the first time, and it decides which epoll
    to use by using either a random or round-robin load balance mechanism, as shown
    in Figure [12-4](#527551_1_En_12_Chapter.xhtml#Fig4). The load balancer type can
    be modified in an app using the following function call:


    ![](images/527551_1_En_12_Chapter/527551_1_En_12_Fig4_HTML.jpg)


    A block diagram of Epoll load balancer includes two small blocks named round-robin
    and random.


    **Figure 12-4** netpoll load balancer


    ```go

    netpoll.SetLoadBalance(netpoll.Random)

    netpoll.SetLoadBalance(netpoll.RoundRobin)

    ```


    The library takes care of a high volume of traffic by using goroutines. This is
    performed internally by utilizing a pool of goroutine pooling mechanisms. Developers
    just need to focus to ensure that their application and infrastructure can scale
    properly.


    ### Summary


    In this chapter, you looked at different ways of writing applications using `epoll`.
    Using your previous learning from Chapter [2](#527551_1_En_2_Chapter.xhtml) about
    system calls, you build an `epoll`-based application using the standard library.
    You learned that designing and writing `epoll` network applications is different
    from normal networking applications. You dove into an `epoll` library and learned
    how to use it to write a network application. Also, you looked at how the library
    works internally.


