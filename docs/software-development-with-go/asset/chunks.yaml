    memory and network. Memory is in limited and unlimited reservations. In the line
    graphs, the network is shown by a bell-shaped impulse.


    In the next section, you will dive into the internals of `cAdvisor` and learn
    how it is able to do all these things in the code.


    # Architecture


    In this section and the next, you will look at the internals of `cAdvisor` and
    how the different components work. `cAdvisor` supports different containers, but
    for this chapter you will focus on the code that is relevant to Docker only. Let’s
    take a look at the high-level component view of `cAdvisor` shown in Figure 18-10.


    ![Figure 18-10](images/527551_1_En_18_Chapter/527551_1_En_18_Fig10_HTML.jpg)


    **Figure 18-10: High-level architecture**


    The Block diagram represents the parts of plugins, managers and handlers in the
    form of labels in `cAdvisor` process. Manager with most labels are containers,
    memory cache, watchers, machine info and watcher.


    Table 18-1 outlines the different components and usage inside `cAdvisor`.


    **Table 18-1: Components**


    | Component | Description |

    | --- | --- |

    | Events Channel | Channel used to report creation or deletion of containers |

    | InMemoryCache | Cache used to store metric information relevant to all containers
    being monitored |

    | Container Watcher | Watcher that monitors container activities |

    | Containers | Different containers monitored by `cAdvisor` |

    | Machine Info | Information related to the local machine that `cAdvisor` is running
    on |

    | Plugins | The different containers that `cAdvisor` supports: Docker, Mesos,
    CRIO, Systemd, and ContainerD |

    | Handlers | HTTP handlers that take care of requests for metrics and other relevant
    APIs exposed by `cAdvisor` |


    In the next few sections, you will look at different parts of `cAdvisor` and how
    they work.'
