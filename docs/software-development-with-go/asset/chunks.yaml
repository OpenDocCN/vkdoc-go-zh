    ```

    func (h *httpStream) run() {

    buf := bufio.NewReader(&h.r)

    for {

    req, err := http.ReadRequest(buf)

    if err == io.EOF {

    ...

    }

    ...

    else {

    log.Println("-- Extracted Http Data --")

    for k, v := range req.Header {

    log.Println(k, v[0])

    }

    log.Println(fmt.Sprintf("Proto : %s, Host : %s, Method : %s, URI : %s ", req.Proto,
    req.Host, req.Method, req.RequestURI))

    log.Println("-------------------------")

    ...

    }

    }

    }

    ```


    ## 总结


    在本章中，您学习了如何使用开源项目 `gopacket` 捕获原始网络。该库通过其简单的公共 API 提供了许多功能。您学习了如何使用该库编写应用程序，以及如何利用不同结构中提供的信息。


    您了解了 BPF（伯克利数据包过滤器），并学习如何在代码中使用它，通过 `gopacket` 过滤网络捕获。使用 BPF 允许应用程序只处理它感兴趣的网络捕获，而不是花费时间处理所有传入流量。这使得开发针对特定流量的应用变得更加容易。


    # 12. Epoll 库


    构建处理大量网络处理的应用程序需要一种在分布式或云环境中处理连接的特殊方式。得益于 2.5.44 版本中引入的可扩展 I/O 事件通知机制，运行在 Linux
    上的应用程序能够做到这一点。在本章中，您将了解 `epoll`。根据 [`linux.die.net/man/7/epoll`](https://linux.die.net/man/7/epoll)
    的文档：


    epoll API 执行与 [poll](https://man7.org/linux/man-pages/man2/poll.2.xhtml) 类似的任务：监视多个文件描述符，以查看它们中的任何一个是否可以进行
    I/O 操作。


    您将首先了解什么是 `epoll`，然后继续编写一个简单的应用程序，最后查看 Go 的 `epoll` 库及其工作原理，以及如何在应用程序中使用它。


    完成本章后，您将理解以下内容：


    *   `epoll` 在 Linux 中如何工作

    *   如何编写一个使用 `epoll` API 的 Go 应用程序

    *   `epoll` 库如何工作

    *   如何编写一个使用 `epoll` 库的 Go 应用程序


    ## 源代码


    本章的源代码可从 [`github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。

