    ,\n\"default\": {},\n\"servers\": {\n\"192-168-1-3\": {\n...\n}\n},\n\"cveDict\"\
    : {\n...\n},\n\"ovalDict\": {\n...\n},\n...\n},\n\"report\": {\n\"logJSON\": false,\n\
    ...\n}\n}\n}\n```\n\nIn the next section, you will explore some of the features\
    \ provided by Vuls.\n\n## Learning From Vuls\n\nThere are many features in Vuls\
    \ that are useful to learn and can be applied when developing systems or security\
    \ applications. You will look at three main features that Vuls uses: port scanning,\
    \ using a SQLite database, and executing on the command line from the Go application.\
    \ These features will be discussed in depth in the following sections.\n\n###\
    \ Port Scan\n\nA port scan is a way to perform an operation to determine which\
    \ ports are open in a network. A port is like a number that is picked by an application\
    \ to listen to. For example, HTTP servers listen to port 80 while FTP servers\
    \ listen to port 21. A list of standard port numbers that are followed in different\
    \ operating systems can be seen at [`www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](http://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml).\n\
    \nLooking at Vuls source code (`scanner/base.go`), you can see the following function\
