  trans: '

    ### 高层流程


    在本节中，你将深入理解该工具的工作原理，并查看其不同部分的代码。通过深入分析代码，你将发现可用于设计自有应用的新内容。首先，宏观了解一下该工具的处理流程，如图
    8-10 所示。


    ![](img/527551_1_En_8_Fig10_HTML.jpg)


    高层数据流程图包括：开始、检查连接、下载扫描信息、goroutine、收集结果、发送结果、排序并打印结果。


    **图 8-10** 高层流程


    阅读应用不同部分及其代码时，请将此图作为参考。工具启动时首先检查能否使用提供的令牌访问 GitHub。它通过访问 [`github.com/google/oss-fuzz`](http://github.com/google/oss-fuzz)
    仓库（步骤 2）来硬编码测试 GitHub 连接。如下代码片段所示（`checker/client.go`）：


    ```

    func GetClients(...) (

    ...

    ) {

    ...

    ossFuzzRepoClient, errOssFuzz := ghrepo.CreateOssFuzzRepoClient(ctx, logger)

    ...

    }

    func CreateOssFuzzRepoClient(ctx context.Context, logger *log.Logger) (clients.RepoClient,
    error) {

    ossFuzzRepo, err := MakeGithubRepo("google/oss-fuzz")

    ...

    return ossFuzzRepoClient, nil

    }

    ```


    成功连接到 GitHub 仓库后，代码通过将连接分配给不同的 GitHub 处理器来继续执行。这些处理器使用该连接从仓库中获取用于执行安全检查的不同信息（步骤
    3）。处理器分配的代码如下（`clients/githubrepo/client.go`）：


    ```

    func (client *Client) InitRepo(inputRepo clients.Repo, commitSHA string) error
    {

    ...

    // 合理性检查。

    repo, _, err := client.repoClient.Repositories.Get(client.ctx, ghRepo.owner, ghRepo.repo)

    if err != nil {

    return sce.WithMessage(sce.ErrRepoUnreachable, err.Error())

    }

    client.repo = repo

    client.repourl = &repoURL{

    owner:         repo.Owner.GetLogin(),

    ...

    commitSHA:     commitSHA,

    }

    client.tarball.init(client.ctx, client.repo, commitSHA)

    // 设置 GraphQL。

    client.graphClient.init(client.ctx, client.repourl)

    client.contributors.init(client.ctx, client.repourl)

    ...

    client.webhook.init(client.ctx, client.repourl)

    client.languages.init(client.ctx, client.repourl)

    return nil

    }

    ```


    图 8-11 概述了使用不同 GitHub 连接的 GitHub 处理器子集。


    ![](img/527551_1_En_8_Fig11_HTML.jpg)


    GitHub 连接流程图包含三个处理器：release、branches、workflow，它们分别与 GitHub 客户端 1 和 4 并行连接。


    **图 8-11** 使用 GitHub 连接的 GitHub 处理器


    一旦处理器成功使用 GitHub 连接完成初始化，工具的主体部分就会启动（步骤 4）。该工具生成一个 goroutine，利用通过 GitHub 连接下载的信息逐一执行安全检查。执行
    goroutine 的代码如下（`pkg/scorecard.go`）：


    ```

    func RunScorecards(ctx context.Context,

    ...

    ) (ScorecardResult, error) {

    ...

    resultsCh := make(chan checker.CheckResult)

    go runEnabledChecks(ctx, repo, &ret.RawResults, checksToRun, repoClient, ossFuzzRepoClient,

    ciiClient, vulnsClient, resultsCh)

    ...

    return ret, nil

    }

    ```


    图 8-12 展示了在 GitHub 仓库上执行的不同安全检查子集。


    ![](img/527551_1_En_8_Fig12_HTML.jpg)


    安全检查流程图包括：二进制工件、分支保护、检查贡献者、危险工作流。


    **图 8-12** 安全检查


    接下来展示的是 `runEnabledChecks(...)` 代码片段。该函数执行每个已配置的检查（步骤 6）。完成后，结果通过 `resultsCh`
    通道传回（步骤 7）。


    ```

    func runEnabledChecks(...

    resultsCh chan checker.CheckResult,

    ) {

    ...

    wg := sync.WaitGroup{}

    for checkName, checkFn := range checksToRun {

    checkName := checkName

    checkFn := checkFn

    wg.Add(1)

    go func() {

    defer wg.Done()

    runner := checker.NewRunner(

    checkName,

    repo.URI(),

    &request,

    )

    resultsCh <- runner.Run(ctx, checkFn)

    }()

    }

    wg.Wait()

    close(resultsCh)

    }

    ```


    工具的最终步骤是收集、格式化并对结果进行评分（步骤 8）。输出取决于配置，可配置为在控制台（默认）显示或输出到文件。代码片段如下所示（`scorecard/cmd/root.go`）：


    ```

    func rootCmd(o *options.Options) {

    ...

    repoResult, err := pkg.RunScorecards(

    ctx,

    ...

    )

    if err != nil {

    log.Panic(err)

    }

    repoResult.Metadata = append(repoResult.Metadata, o.Metadata...)

    sort.Slice(repoResult.Checks, func(i, j int) bool {

    return repoResult.Checks[i].Name < repoResult.Checks[j].Name

    })

    ...

    resultsErr := pkg.FormatResults(

    o,

    &repoResult,

    checkDocs,

    pol,

    )

    ...

    }

    ```


    从这个工具中可以学到的是 GitHub API 的用法。该工具广泛使用 GitHub API，通过下载仓库信息并利用预定义的安全检查来执行检查。现在，你将了解如何使用
    GitHub API 进行 GitHub 探索。


    ## GitHub


    任何从事软件开发的人都了解 GitHub，并以这样或那样的方式使用过它。你可以在 GitHub 上找到大多数类型的开源软件，而且它是免费托管的。它已成为任何涉足软件开发人员的不二之选。


    GitHub 提供允许外部工具与服务交互的 API。该 API 为开发者访问 GitHub 服务以构建能为组织提供价值的工具释放了无限潜力。这使得第三方解决方案（免费和付费）得以普及，并向公众开放。本章中的
    Scorecard 项目正是得益于 GitHub API 而得以实现的工具之一。

    '
- fmt: '### GitHub API


    There are two kinds of GitHub APIs: REST and GraphQL (`https://docs.github.com/en/graphql`).
    There are different projects that implement both APIs, which you will look at
    a bit later.


    The REST-based API offers access like a normal HTTP call. For example, using your
    own browser you can type in the following address:


    ```

    https://api.github.com/users/test

    ```


    You will see the following JSON response in your browser:


    ```

    {

    "login": "test",

    "id": 383316,

    "node_id": "MDQ6VXNlcjM4MzMxNg==",

    "avatar_url": "https://avatars.githubusercontent.com/u/383316?v=4",

    "gravatar_id": "",

    "url": "https://api.github.com/users/test",

    "html_url": "https://github.com/test",

    ...

    "created_at": "2010-09-01T10:39:12Z",

    "updated_at": "2020-04-24T20:58:44Z"

    }

    ```


    You are seeing information about a username called `test` that is registered in
    GitHub. You can try to use your own GitHub username and you will see details about
    yourself. Let’s get the list of repositories for a particular organization. Type
    in the following in your browser address:


    ```

    https://api.github.com/orgs/golang/repos

    ```


    The address will send the list of repositories that are listed under a particular
    organization hosted publicly on GitHub. In the example, you want to get the list
    of repositories hosted under the Golang organization. You will get the following
    response:


    ```

    [

    {

    "id": 1914329,

    "node_id": "MDEwOlJlcG9zaXRvcnkxOTE0MzI5",

    "name": "gddo",

    "full_name": "golang/gddo",

    "private": false,

    "owner": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "html_url": "https://github.com/golang/gddo",

    "description": "Go Doc Dot Org",

    "fork": false,

    ...

    "license": {

    ...

    },

    ...

    "permissions": {

    ...

    }

    },

    { ... }

    ]

    ```


    The response is in JSON format. The information you are seeing is the same when
    you visit the Golang project page at `https://github.com/golang`. The GitHub documentation
    at `https://docs.github.com/en/rest` provides a complete list of REST endpoints
    that are accessible.


    Using the API in a Go application requires you to convert the different endpoints
    to a function that you can use in your application, which is time consuming, so
    for this you can use a Go open source library from `https://github.com/google/go-github`.
    Let’s run the example of using this library, which can be found inside the `chapter8/simple`
    folder. Open your terminal and run it as follows:


    ```

    go run main.go

    ```


    You will get the following output:


    ```

    2022/07/16 18:43:43 {

    "id": 23096959,

    "node_id": "MDEwOlJlcG9zaXRvcnkyMzA5Njk1OQ==",

    "owner": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "name": "go",

    "full_name": "golang/go",

    "description": "The Go programming language",

    "homepage": "https://go.dev",

    ...

    "organization": {

    "login": "golang",

    "id": 4314092,

    ...

    },

    "topics": [

    "go",

    ...

    ],

    ...

    "license": {

    ...

    },

    ...

    }

    ```


    The sample uses the library to get information about a particular repository,
    `http://github.com/golang/go`, which is shown in the following code snippet:


    ```

    package main

    import (

    ...

    "github.com/google/go-github/v38/github"

    )

    func main() {

    client := github.NewClient(&http.Client{})

    ctx := context.Background()

    repo, _, err := client.Repositories.Get(ctx, "golang", "go")

    ...

    log.Println(string(r))

    }

    ```


    The application starts off by initializing the library by calling `github.NewClient(..)`
    and passing in `http.Client`, which is used to make an HTTP call to GitHub. The
    library package `github.com/google/go-github/v38/github` provides all the different
    functions required. In the example, you use `Repositories.Get(..)` to obtain information
    about a particular repository (`golang`) project (`go`).


    Looking at the library source code (`github.com/google/go-github/v38/github/repos.go`),
    you can see that it is performing a similar call to what is defined in the documentation
    at `https://docs.github.com/en/rest/repos/repos#get-a-repository`.


    ```

    func (s *RepositoriesService) Get(ctx context.Context, owner, repo string) (*Repository,
    *Response, error) {

    u := fmt.Sprintf("repos/%v/%v", owner, repo)

    req, err := s.client.NewRequest("GET", u, nil)

    if err != nil {

    return nil, nil, err

    }

    ...

    return repository, resp, nil

    }

    ```


    You get the same response using `https://api.github.com/repos/golang/go` in your
    browser.


    The other API that is provided by GitHub is called the GraphQL API (`https://docs.github.com/en/graphql`)
    and it is very different from the REST API. It is based on GraphQL (`https://graphql.org/`),
    which the website describes as follows:


    GraphQL is a query language for APIs and a runtime for fulfilling those queries
    with your existing data. GraphQL provides a complete and understandable description
    of the data in your API, gives clients the power to ask for exactly what they
    need and nothing more, makes it easier to evolve APIs over time, and enables powerful
    developer tools.


    Normally, when using REST API in order to get different kinds of data, you need
    to get it from different endpoints. Once all of the data is collected, you need
    to construct them into one structure. GraphQL makes it simple: you just have to
    define what repository data you want, and it will return the collection of data
    you requested as one single collection.


    This will become clearer when you look at the sample application provided. Open
    your terminal and run the sample inside `chapter8/graphql`. Run it as follows:


    ```

    GITHUB_TOKEN= go run main.go

    ```


    You need to use the GitHub token you created previously in the section "Setting
    Up Scorecard." On a successful run, you will get the following (the output will
    differ because the data is obtained from GitHub in real time, which will have
    changed by the time you run this sample):'
