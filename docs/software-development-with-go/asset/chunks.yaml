    ## Reading Memory Information


    In the previous section, you learned what `procfs` is all about and looked at
    some of the process information that can be viewed. You looked at extracting the
    information by going into the `/proc` directory and using standard tools like
    `ls` and `cat` to view file and directory content.


    In this section, you are going to write a simple application to read system memory
    information from `procfs`. The sample code can be found inside the `chapter3/readingmemory`
    directory. Run the application using the following command:


    ```

    go run main.go

    ```


    You will see output like the following:


    ```

    MemTotal = 32320240 KB, MemFree = 3260144 KB, MemUsed = 29060096 KB

    MemTotal = 32320240 KB, MemFree = 3146556 KB, MemUsed = 29173684 KB

    MemTotal = 32320240 KB, MemFree = 3074524 KB, MemUsed = 29245716 KB

    MemTotal = 32320240 KB, MemFree = 3068300 KB, MemUsed = 29251940 KB

    MemTotal = 32320240 KB, MemFree = 3264940 KB, MemUsed = 29055300 KB

    MemTotal = 32320240 KB, MemFree = 3269584 KB, MemUsed = 29050656 KB

    MemTotal = 32320240 KB, MemFree = 3270340 KB, MemUsed = 29049900 KB

    ```


    The application continuously prints memory information (total memory, free memory,
    and used memory) in kilobytes of the local device. Let''s look at the code to
    understand how it works.


    ```

    func main() {

    sampler := &sampler{

    rate: 1 * time.Second,

    }

    ...

    for {

    select {

    case sampleSet := <-sampler.sample:

    ...

    fmt.Printf("total = %v KB, free = %v KB, used = %v KB\n",

    s.total, s.free, s.used)

    }

    }

    }

    ```


    On startup, the code initializes the `Sampler` struct and goes into a loop waiting
    on the data to be made available from `SampleSetChan`. Once the data arrives,
    it prints out the memory information into the console.


    The data sampling code that collects the data and sends it to the channel is seen
    below. The `StartSampling` function spins off a Go routine that calls `GetMemSample`
    to extract the memory information and sleep after sending the data to the `SampleSetChan`
    channel.


    ```

    func (s *sampler) start() *sampler {

    ...

    go func() {

    for {

    var ss sample

    ss.memorySample = getMemorySample()

    s.sample <- ss

    time.Sleep(s.rate)

    }

    }()

    ...

    }

    ```


    The crux of reading the memory information can be seen in the following `getMemorySample`
    function:


    ```

    func getMemorySample() (samp memory) {

    ...

    contents, err := ioutil.ReadFile(memInfo)

    if err != nil {

    return

    }

    reader := bufio.NewReader(bytes.NewBuffer(contents))

    for {

    line, _, err := reader.ReadLine()

    if err == io.EOF {

    break

    }

    ...

    if ok && len(fields) == 3 {

    ...

    switch fieldName {

    case "total:":

    samp.total = val

    case "free:":

    samp.free = val

    }

    }

    }

    ...

    }

    ```


    The memory information is collected from the `/proc/meminfo` directory. The collected
    data is parsed and only values that it is interested in are stored, namely total
    memory, free memory, and calculated value of memory used.


    This is how the raw data looks like when reading the `/proc/meminfo` directory:


    ```

    MemTotal:       32320240 kB

    MemFree:          927132 kB

    MemAvailable:    5961720 kB

    ...

    HugePages_Total:       0

    HugePages_Free:        0

    HugePages_Rsvd:        0

    HugePages_Surp:        0

    Hugepagesize:       2048 kB

    Hugetlb:               0 kB

    ...

    ```'
