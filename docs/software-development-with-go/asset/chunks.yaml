- fmt: '### Checking Disk Space


    You are going to take a look at an example application that can be found inside
    the `chapter2/diskspace` directory. The application uses the `syscall` package
    to obtain hard disk information such as free space, total space, and such.


    Open terminal and run the sample as follows:


    ```

    go run main.go

    ```


    You will see the following output:


    ```

    Total Disk Space : 460.1 GB

    Total Disk Used  : 322.4 GB

    Total Disk Free  : 137.7 GB

    ```


    The output shows in gigabytes the total size of the drive, total amount of disk
    used, and total amount of disk free. The following code snippet shows how the
    disk information is obtained using the `syscall` package:


    ```

    func main() {

    var statfs = syscall.Statfs_t{}

    var total uint64

    var used uint64

    var free uint64

    err := syscall.Statfs("/", &statfs)

    if err != nil {

    fmt.Printf("[ERROR]: %s\n", err)

    } else {

    total = statfs.Blocks * uint64(statfs.Bsize)

    free = statfs.Bfree * uint64(statfs.Bsize)

    used = total - free

    }

    ...

    }

    ```


    As seen in the above code snippet, the application uses the `syscall.Statfs` function
    call to get information about the path. In this case, it’s the root directory.
    The result is populated into the `statfs` variable, which is of type `Statfs_t`.
    The `Statfs_t` struct declaration looks like the following:


    ```

    type Statfs_t struct {

    Type    int64

    Bsize   int64

    Blocks  uint64

    Bfree   uint64

    Bavail  uint64

    Files   uint64

    Ffree   uint64

    Fsid    Fsid

    Namelen int64

    Frsize  int64

    Flags   int64

    Spare   [4]int64

    }

    ```


    ### Webserver with syscall


    Let’s take a look at another example using the `syscall` package, which can be
    found inside the `chapter2/webserversyscall` directory. The sample code is a web
    server that uses the `syscall` package to create a socket connection.


    Open terminal and run the sample as follows:


    ```

    go run main.go

    ```


    You will see the following output:


    ```

    2022/07/17 19:27:49 Listening on  127.0.0.1 : 8888

    ```


    The web server is now ready to accept connection on port 8888\. Open your browser
    and type in `http://localhost:8888`. You will get a response in your browser:
    `Server with syscall`


    The following code snippet shows the function that takes care of starting up the
    server that listens on port 8888:


    ```

    func startServer(host string, port int) (int, error) {

    fd, err := syscall.Socket(syscall.AF_INET, syscall.SOCK_STREAM, 0)

    if err != nil {

    log.Fatal("error (listen) : ", err)

    }

    sa := &syscall.SockaddrInet4{Port: port}

    addrs, err := net.LookupHost(host)

    ...

    for _, addr := range addrs {

    ...

    }

    ...

    return fd, nil

    }

    ```


    The code performs the following process:


    *   Creates a socket

    *   Binds a socket to port 8888

    *   Listens for an incoming request


    The code uses `syscall.Socket` to create a socket. Once it is able to create a
    socket, it will bind it to the specified port 8888 by calling `syscall.Bind`,
    as shown in the following code snippet:


    ```

    for _, addr := range addrs {

    ...

    if err = syscall.Bind(fd, srv); err != nil {

    log.Fatal("error (bind) : ", err)

    }

    }

    ```


    On successful completion of the binding process, the code starts listening for
    incoming requests, as shown here:


    ```

    if err = syscall.Listen(fd, syscall.SOMAXCONN); err != nil {

    log.Fatal("error (listening) : ", err)

    } else {

    log.Println("Listening on ", host, ":", port)

    }

    ```


    The `syscall.Listen` is called, passing `syscall.SOMAXCONN` as the parameter.
    This instructs the operating system that the code wants to have the maximum queue
    allocated to take care of pending connections when they happen. Now the server
    is ready to accept connections.


    The next part of the code accepts and processes incoming requests, which can be
    seen in the following code snippet:


    ```

    for {

    cSock, cAddr, err := syscall.Accept(fd)

    if err != nil {

    ...

    }

    go func(clientSocket int, clientAddress syscall.Sockaddr) {

    err := syscall.Sendmsg(clientSocket, []byte(message), []byte{}, clientAddress,
    0)

    ...

    syscall.Close(clientSocket)

    }(cSock, cAddr)

    }

    ```


    The code uses `syscall.Accept` to start accepting incoming requests, as can be
    seen in the `for{}` loop. On every accepted request, the code processes the request
    by processing it in a separate go routine. This allows the server to be able to
    process incoming requests without being blocked.


    ## ELF Package


    The standard library provides different packages that can be used to interact
    with different parts of the operating system. In the previous sections, you looked
    at interacting on a system level by using the different standard library packages.
    In this section, you will look at the `debug/elf` package.


    This package provides interfaces for applications to interact with ELF files.
    ELF stands for the Executable Linkable Format, which means that an ELF file can
    be an executable or object file that is used for linking processes to create an
    executable file. I will not go into detail on ELF; more information can be found
    at [`https://linux.die.net/man/5/elf`](https://linux.die.net/man/5/elf).


    ### High-Level ELF Format


    ELF is a common standard file format for executable files, object code, shared
    libraries, and core dumps; it is cross platform. Figure [2-2](#527551_1_En_2_Chapter.xhtml#Fig2)
    shows at high level the structure of an ELF file.


    ![](images/527551_1_En_2_Chapter/527551_1_En_2_Fig2_HTML.jpg)


    A block diagram of the E L F file represents the header, program header table,
    dot text file, dot rodata, dot data, and section header table.


    Figure 2-2


    ELF file structure


    Figure [2-3](#527551_1_En_2_Chapter.xhtml#Fig3) shows output of the header section
    of a sample application compiled on my local machine.


    ![](images/527551_1_En_2_Chapter/527551_1_En_2_Fig3_HTML.jpg)


    A screenshot of E L F header code represents class, data, version, ABI versions,
    type, flags, size of headers, size of section headers, number of section headers,
    and string table index.


    Figure 2-3


    ELF file header section'
