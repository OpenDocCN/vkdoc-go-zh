  raw: '### Handling Service Dependencies


    Complex applications like CrowdSec have multiple services that run at the same
    time or at scheduled times. In order for services to run properly, there needs
    to be service coordination that takes care of the dependencies between services.


    Figure [14-4](#527551_1_En_14_Chapter.xhtml#Fig4) shows how the service coordination
    is done inside CrowdSec using the channel*.*


    ![](images/527551_1_En_14_Chapter/527551_1_En_14_Fig4_HTML.jpg)


    A flowchart of the service coordinator starts from the main.go then startRunSvc
    after that classified into two categories named serve, serve Prometheus, serveAPIServer,
    and wait for the signal.


    Figure 14-4


    Service coordination


    In Figure [14-4](#527551_1_En_14_Chapter.xhtml#Fig4), the `apiReady` channel is
    the central part of the service coordination when CrowdSec starts up. The diagram
    shows that the `apiServer.Run` function sends a signal to the `apiReady` channel,
    which allows the other service, `servePrometheus`*,* to run the server listening
    on port 6060.


    The following code snippet shows the `StartRunSvc` function running `servePrometheus`
    as a goroutine and passing in the `apiReady` channel, and it also pass the same
    channel when the `Serve` function is called:


    ```

    package main

    import (

    "os"

    ...

    )

    func StartRunSvc() error {

    ...

    apiReady := make(chan bool, 1)

    agentReady := make(chan bool, 1)

    // Enable profiling early

    if cConfig.Prometheus != nil {

    ...

    go servePrometheus(cConfig.Prometheus, dbClient, apiReady, agentReady)

    }

    return Serve(cConfig, apiReady, agentReady)

    }

    ```


    The `servePrometheus` function starts running the server to listen on port 6060
    only when it is able to read the value from the `apiReady` channel (<- `apiReady`),
    as shown in the following snippet:


    ```

    func servePrometheus(config *csconfig.PrometheusCfg, dbClient *database.Client,
    apiReady chan bool, agentReady chan bool) {

    ...

    <-apiReady

    ...

    if err := http.ListenAndServe(fmt.Sprintf("%s:%d", config.ListenAddr, config.ListenPort),
    nil); err != nil {

    log.Warningf("prometheus: %s", err)

    }

    }

    ```


    The `apiReady` channel is set only when the CrowdSec API server has been run successfully,
    as shown in the following code snippet. The `serveAPIServer` function spawns off
    another goroutine when calling the `apiServer.Run(..)` function, where it sends
    a value to the `apiReady` channel where the API server starts up.


    ```

    func serveAPIServer(apiServer *apiserver.APIServer, apiReady chan bool) {

    apiTomb.Go(func() error {

    ...

    go func() {

    ...

    if err := apiServer.Run(apiReady); err != nil {

    log.Fatalf(err.Error())

    }

    }()

    ...

    })

    }

    func (s *APIServer) Run(apiReady chan bool) error {

    ...

    s.httpServerTomb.Go(func() error {

    go func() {

    apiReady <- true

    ...

    }()

    ...

    })

    return nil

    }

    ```


    Let’s take a look at a simpler version of the service coordination, which is in
    the `chapter14/services` folder. The sample code demonstrates how to use service
    coordination between two different services, serviceA and serviceB. Open up terminal
    and make sure you are in the correct `chapter14/services` directory and run the
    code as follows:


    ```

    go run main.go

    ```


    You will get output like the following:


    ```

    2022/07/26 20:40:20 ....Starting serviceB

    2022/07/26 20:40:21 ....Done with serviceB

    2022/07/26 20:40:21 ..Starting serviceA

    2022/07/26 20:40:23 ..Done with serviceA

    ```


    Since the code is running inside a goroutine, the output sequence printed on your
    console will vary; however, the service will be run correctly. The following code
    shows the code that runs the service as a goroutine:


    ```

    func main() {

    serviceBDone := make(chan bool, 1)

    alldone := make(chan bool, 1)

    go serviceB(serviceBDone)

    go serviceA(serviceBDone, alldone)

    <-alldone

    }

    ```


    There are two channels created by the sample app. Let’s take a look the function
    of each channel:


    *   `serviceBDone`: This channel is used to inform that `serviceB` has done its
    job.


    *   `alldone`: This channel is used to inform that `serviceA` has done its job
    so the application can exit.


    The following code snippet shows the `serviceA` and `serviceB` functions:


    ```

    func serviceB(serviceBDone chan bool) {

    ...

    serviceBDone <- true

    log.Println("....Done with serviceB")

    }

    //2nd service

    func serviceA(serviceBDone chan bool, finish chan bool) {

    <-serviceBDone

    ...

    log.Println("..Done with serviceA")

    finish <- true

    }

    ```'
  trans: "\n### 处理服务依赖关系\n\n像 CrowdSec 这样的复杂应用包含多个同时运行或按计划运行的服务。为了让服务正常运行，需要进行服务协调，以处理服务之间的依赖关系。\n\
    \n图 14-4 展示了 CrowdSec 内部如何使用通道（channel）进行服务协调。\n\n![](img/527551_1_En_14_Fig4_HTML.jpg)\n\
    \n服务协调器的流程图从 `main.go` 开始，然后进入 `startRunSvc`，之后分为两类：`serve`、`servePrometheus`、`serveAPIServer`，并等待信号。\n\
    \n**图 14-4**  \n服务协调\n\n在图 14-4 中，当 CrowdSec 启动时，`apiReady` 通道是服务协调的核心部分。该图显示，`apiServer.Run`\
    \ 函数向 `apiReady` 通道发送一个信号，这允许另一个服务 `servePrometheus` 运行监听端口 6060 的服务器。\n\n以下代码片段展示了\
    \ `StartRunSvc` 函数将 `servePrometheus` 作为一个 goroutine 运行，并传入 `apiReady` 通道，同时在调用\
    \ `Serve` 函数时也传入了同一个通道：\n\n```\npackage main\n\nimport (\n\t\"os\"\n\t...\n)\n\
    \nfunc StartRunSvc() error {\n\t...\n\tapiReady := make(chan bool, 1)\n\tagentReady\
    \ := make(chan bool, 1)\n\t// 尽早启用性能分析\n\tif cConfig.Prometheus != nil {\n\t\t\
    ...\n\t\tgo servePrometheus(cConfig.Prometheus, dbClient, apiReady, agentReady)\n\
    \t}\n\treturn Serve(cConfig, apiReady, agentReady)\n}\n```\n\n只有当 `servePrometheus`\
    \ 函数能够从 `apiReady` 通道（`<- apiReady`）读取到值时，它才会启动服务器监听端口 6060，如下列代码片段所示：\n\n```\n\
    func servePrometheus(config *csconfig.PrometheusCfg, dbClient *database.Client,\
    \ apiReady chan bool, agentReady chan bool) {\n\t...\n\t<-apiReady\n\t...\n\t\
    if err := http.ListenAndServe(fmt.Sprintf(\"%s:%d\", config.ListenAddr, config.ListenPort),\
    \ nil); err != nil {\n\t\tlog.Warningf(\"prometheus: %s\", err)\n\t}\n}\n```\n\
    \n`apiReady` 通道仅在 CrowdSec API 服务器成功运行后才被设置，如下列代码片段所示。`serveAPIServer` 函数在调用 `apiServer.Run(..)`\
    \ 函数时会产生另一个 goroutine，在该 goroutine 中，当 API 服务器启动时，会向 `apiReady` 通道发送一个值。\n\n```\n\
    func serveAPIServer(apiServer *apiserver.APIServer, apiReady chan bool) {\n\t\
    apiTomb.Go(func() error {\n\t\t...\n\t\tgo func() {\n\t\t\t...\n\t\t\tif err :=\
    \ apiServer.Run(apiReady); err != nil {\n\t\t\t\tlog.Fatalf(err.Error())\n\t\t\
    \t}\n\t\t}()\n\t\t...\n\t})\n}\n\nfunc (s *APIServer) Run(apiReady chan bool)\
    \ error {\n\t...\n\ts.httpServerTomb.Go(func() error {\n\t\tgo func() {\n\t\t\t\
    apiReady <- true\n\t\t\t...\n\t\t}()\n\t\t...\n\t})\n\treturn nil\n}\n```\n\n\
    让我们来看看 `chapter14/services` 文件夹中一个更简单的服务协调示例。该示例代码演示了如何在两个不同的服务 `serviceA` 和 `serviceB`\
    \ 之间使用服务协调。打开终端，确保你在正确的 `chapter14/services` 目录下，并按如下方式运行代码：\n\n```\ngo run main.go\n\
    ```\n\n你将得到类似如下的输出：\n\n```\n2022/07/26 20:40:20 ....正在启动 serviceB\n2022/07/26\
    \ 20:40:21 ....serviceB 完成\n2022/07/26 20:40:21 ..正在启动 serviceA\n2022/07/26 20:40:23\
    \ ..serviceA 完成\n```\n\n由于代码在 goroutine 中运行，你控制台上打印的输出顺序可能会有所不同；但服务将会正确运行。以下代码展示了将服务作为\
    \ goroutine 运行的代码：\n\n```\nfunc main() {\n\tserviceBDone := make(chan bool, 1)\n\
    \talldone := make(chan bool, 1)\n\tgo serviceB(serviceBDone)\n\tgo serviceA(serviceBDone,\
    \ alldone)\n\t<-alldone\n}\n```\n\n示例应用创建了两个通道。让我们看看每个通道的功能：\n\n- `serviceBDone`：此通道用于通知\
    \ `serviceB` 已完成其工作。\n- `alldone`：此通道用于通知 `serviceA` 已完成其工作，以便应用程序可以退出。\n\n以下代码片段展示了\
    \ `serviceA` 和 `serviceB` 函数：\n\n```\nfunc serviceB(serviceBDone chan bool) {\n\
    \t...\n\tserviceBDone <- true\n\tlog.Println(\"....serviceB 完成\")\n}\n\n// 第二个服务\n\
    func serviceA(serviceBDone chan bool, finish chan bool) {\n\t<-serviceBDone\n\t\
    ...\n\tlog.Println(\"..serviceA 完成\")\n\tfinish <- true\n}\n```\n"
- fmt: '### GeoIP Database


    CrowdSec uses a GeoIP database that contains geographical information of an IP
    address. This database is downloaded as part of setting up the test environment
    discussed in the “Using CrowdSec” section.


    In this section, you will look into this database and learn how to read the data
    from the database. One of the use cases for this database is the ability to build
    a security tool for your infrastructure to label each incoming IP, which is useful
    to monitor and understand the incoming traffic to your infrastructure. The GeoIP
    database comes from the following website: [`https://dev.maxmind.com/geoip/geolite2-free-geolocation-data?lang=en#databases`](https://dev.maxmind.com/geoip/geolite2-free-geolocation-data%253Flang%253Den%2523databases).
    Have a read through the website to get an understanding of the licensing.


    The sample code is inside the `chapter14/geoip/city` folder, but before running
    it, you need to specify the location of the GeoIP database that the code will
    use. If you followed the “Using CrowdSec” section, you will have a database file
    called `GeoLite2-City.mmdb` inside the `data` folder. Copy the location of the
    file to use it inside the snippet, as shown below. My file location is shown in
    the code snippet.


    ```

    package main

    ...

    func main() {

    db, err := maxminddb.Open("/home/nanik/GolandProjects/cloudprogramminggo/chapter14/geoip/city/GeoLite2-City.mmdb")

    ...

    }

    ```


    Once the file location has been specified, open terminal and run the sample as
    follows:


    ```

    go run main.go

    ```


    You will see output like the following:


    ```

    IP : 2.0.0.0/17, Long : 2.338700, Lat : 48.858200, Country : FR, Continent: EU

    IP : 2.0.128.0/19, Long : -0.947200, Lat : 47.171600, Country : FR, Continent:
    EU

    ...

    IP : 2.0.192.0/18, Long : 2.338700, Lat : 48.858200, Country : FR, Continent:
    EU

    IP : 2.1.0.0/19, Long : 2.338700, Lat : 48.858200, Country : FR, Continent: EU

    IP : 2.1.32.0/19, Long : 2.302200, Lat : 44.858601, Country : FR, Continent: EU

    ...

    ```


    The code reads the database to get all IP addresses in the `2.0.0.0` IP range
    and prints all the IP addresses found in that range along with other country-
    and continent-related information. Let’s go through the code and understand how
    it uses the database.


    The data is stored in a single file, which is efficiently packed together, so
    in order to read the database, you must use another library. Use the [`github.com/oschwald/maxminddb-golang`](http://github.com/oschwald/maxminddb-golang)
    library. The documentation of the library can be found at [`https://pkg.go.dev/github.com/oschwald/maxminddb-golang`](https://pkg.go.dev/github.com/oschwald/maxminddb-golang).


    The library provides a function to convert the data into a struct. In the sample
    code, you create your own struct to represent the data that will be read.


    ```

    package main

    ...

    type GeoCityRecord struct {

    Continent struct {

    Code      string                 `json:"code"`

    GeonameId int                    `json:"geoname_id"`

    Names     map[string]interface{} `json:"names"`

    } `json:"continent"`

    Country struct {

    GeonameId int                    `json:"geoname_id"`

    IsoCode   string                 `json:"iso_code"`

    Names     map[string]interface{} `json:"names"`

    } `json:"country"`

    Location struct {

    AccuracyRadius int     `json:"accuracy_radius"`

    Latitude       float32 `json:"latitude"`

    Longitude      float32 `json:"longitude"`

    TimeZone       string  `json:"time_zone"`

    } `json:"location"`

    RegisteredCountry struct {

    GeoNameID int                    `json:"geoname_id"`

    IsoCode   string                 `json:"iso_code"`

    Names     map[string]interface{} `json:"names"`

    } `json:"registered_country"`

    }

    func main() {

    ...

    }

    ```


    The `GeoCityRecord` struct will be populated when calling the library to read
    the data, as shown here:


    ```

    package main

    import (

    ...

    )

    ...

    func main() {

    ...

    _, network, err := net.ParseCIDR("2.0.0.0/8")

    ...

    for networks.Next() {

    var rec interface{}

    r := GeoCityRecord{}

    ip, err := networks.Network(&rec)

    ...

    }

    ```


    `networks.Next()` loops through the records found and reads all geographical information
    from the database by calling the `networks.Network(..)` function, which populates
    the `rec` variable.


    The `rec` variable is an interface, so the code uses `json.Marshal(..)` to marshal
    the content into a proper struct, defined by the `r` variable, as shown here:


    ```

    package main

    ...

    func main() {

    ...

    for networks.Next() {

    var rec interface{}

    r := GeoCityRecord{}

    ip, err := networks.Network(&rec)

    ...

    j, _ := json.Marshal(rec)

    err = json.Unmarshal([]byte(j), &r)

    ...

    fmt.Printf("IP : %s, Long : %f, Lat : %f, Country : %s, Continent: %s\n", ip.String(),
    r.Location.Longitude, r.Location.Latitude,

    r.Country.IsoCode, r.Continent.Code)

    }

    }

    ```


    Once the JSON has been unmarshalled back to the `r` variable, the code prints
    out the information into the console.


    ## Summary


    In this chapter, you not only looked at the crowd source nature of data collection
    used by CrowdSec and how the community benefits from it, you also learned how
    to use it in your application.


    You learned how to use channels to inform applications when system signals are
    sent by the operating system. You also looked at using channels to handle service
    dependencies during startup. Lastly, you looked at how to read a GeoIP database,
    which is useful to know when you want to use the information in your infrastructure
    for logging or monitoring IP traffic purposes.


    # Part VITerminal User Interface


    ## 15. ANSI and UI


    In this chapter, you will learn about writing command-line applications that have
    a user interface (UI). You will look at adding text styling, such as italic or
    bold text, text of a different color, a UI that uses a spinner, and more. This
    kind of user interface is possible by using ANSI escape codes, which contain code
    to do certain things in the terminal.


    You will also look at an open source library that makes it easy to write a user
    interface that takes care of all the heavy lifting of writing the different ANSI
    escape codes to do fancy UI tricks. In this chapter, you will learn about the
    following:


    * ANSI escape codes for UI

    * An open source library to write different kinds of UIs

    * Styling text, such as italic and bold


    ### Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.'
