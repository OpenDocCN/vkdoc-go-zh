    ## 小结


    在本章中，你学习了什么是系统调用，以及如何使用 `sys/unix` 包编写一个简单的应用来与操作系统交互。通过研究一个开源项目，你深入了解了系统调用，并学习了它如何利用系统调用来提供特定文件的统计信息。


    在接下来的章节中，你将进一步探索系统调用，并了解使用 Go 语言与操作系统进行交互的各种方式。


    # 使用 Go 语言进行系统调用


    在本章中，你将学习编写使用系统调用来执行系统级操作的应用。操作系统提供了多种方式供应用提取信息和执行操作。你将了解提取系统级信息的不同方法，并同时使用 Go
    标准库和系统文件。


    在本章中，你将学习以下内容：


    - 如何使用 `syscall` 包

    - 如何理解和读取 ELF 格式文件

    - 如何使用 `/sys` 文件系统

    - 如何编写一个简单的应用来读取磁盘统计信息


    ## 源代码


    本章的源代码可在 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库中获取。


    ## Syscall 包


