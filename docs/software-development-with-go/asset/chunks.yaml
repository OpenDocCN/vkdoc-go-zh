    # 负载测试


    在本节中，你将了解如何使用负载测试来测试在前几节中编写的网络服务器。你将使用一款名为 `fortio` 的开源负载测试工具，该工具可从 [`https://github.com/fortio/fortio`](https://github.com/fortio/fortio)
    下载；本书使用 v1.21.1 版本。


    使用负载测试工具，你将看到不使用 goroutine 处理请求的代码与使用 goroutine 处理请求的代码之间的时序差异。在此练习中，你将使用 `chapter9/udp/loadtesting`
    目录中的 UDP 服务器。你将比较 `chapter9/udp/loadtesting/concurrent` 目录中使用 goroutine 的 UDP
    服务器与 `chapter9/udp/loadtesting/server` 目录中不使用 goroutine 的 UDP 服务器。


    用于负载测试的代码与上一节讨论的代码之间唯一的区别是增加了 `time.Sleep(..)` 函数。添加该函数是为了模拟或模仿在发送响应之前对请求进行某些处理的过程。代码如下：


    ```

    func listen(i int, connection *net.UDPConn, quit chan struct{}) {

    ...

    for {

    ...

    //假装代码正在执行一些请求处理，耗时 10 毫秒

    time.Sleep(10 * time.Millisecond)

    ...

    }

    ...

    }

    func main() {

    ...

    for {

    ...

    //假装代码正在执行一些请求处理，耗时 10 毫秒

    time.Sleep(10 * time.Millisecond)

    ...

    }

    }

    ```


    首先运行 `chapter9/udp/loadtesting/concurrent` 目录下的代码。一旦 UDP 服务器启动，按如下方式运行 `fortio`
    工具：


    ```

    ./fortio load -n 200 udp://0.0.0.0:3333/

    ```


    该工具会对本地运行在 3000 端口的服务器进行 200 次调用。你将看到类似如下的结果：


    ```

    ...

    00:00:44 I udprunner.go:223> Starting udp test for udp://0.0.0.0:3333/ with 4
    threads at 8.0 qps

    Starting at 8 qps with 4 thread(s) [gomax 12] : exactly 200, 50 calls each (total
    200 + 0)

    ...

    Aggregated Function Time : count 200 avg 0.011425742 +/- 0.005649 min 0.010250676
    max 0.054895756 sum 2.2851485

    # range, mid point, percentile, count

    >= 0.0102507  0.011  0.045  0.05 <= 0.0548958 , 0.0524479 , 100.00, 2

    # target 50% 0.0106453

    # target 75% 0.0108446

    # target 90% 0.0109641

    # target 99% 0.05

    # target 99.9% 0.0544062

    Sockets used: 200 (for perfect no error run, would be 4)

    Total Bytes sent: 4800, received: 200

    udp short read : 200 (100.0 %)

    All done 200 calls (plus 0 warmup) 11.426 ms avg, 8.0 qps

    ```


    最终结果是平均处理时间为 11.426 毫秒。现在，将其与 `chapter9/udp/loadtesting/server` 目录中不使用 goroutine
    的服务器代码进行比较。运行 UDP 服务器后，使用相同的命令运行 `fortio`。你将看到类似如下的结果：


    ```

    ...

    00:00:07 I udprunner.go:223> Starting udp test for udp://0.0.0.0:3000/ with 4
    threads at 8.0 qps

    Starting at 8 qps with 4 thread(s) [gomax 12] : exactly 200, 50 calls each (total
    200 + 0)

    ...

    Aggregated Function Time : count 200 avg 0.026354093 +/- 0.01187 min 0.010296825
    max 0.054235708 sum 5.27081864

    # range, mid point, percentile, count

    >= 0.0102968  0.011  0.02  0.03  0.035  0.04  0.045  0.05 <= 0.0542357 , 0.0521179
    , 100.00, 2

    # target 50% 0.025

    # target 75% 0.0402041

    # target 90% 0.0432653

    # target 99% 0.05

    # target 99.9% 0.0538121

    Sockets used: 200 (for perfect no error run, would be 4)

    Total Bytes sent: 4800, received: 200

    udp short read : 200 (100.0 %)

    All done 200 calls (plus 0 warmup) 26.354 ms avg, 8.0 qps

    ```


    这次记录的平均时间为 26.354 毫秒，高于之前 11.426 毫秒的结果。由此可以得出结论：在编写网络服务器应用程序时，务必牢记使用 goroutine
    以确保并发请求处理。


    ## 总结


    在本章中，你学习了如何使用 TCP 和 UDP 创建网络应用程序。你学习了如何为这两种协议编写客户端和服务器。你还学习了如何编写能够使用 goroutine
    并发处理多个请求的应用程序。


    理解这一点很重要，因为这是编写能够处理海量流量的网络应用程序的基础。本章是下一章的垫脚石，在下一章中，你将学习在 Linux 中编写网络应用程序的不同风格。


    # 系统网络


    在上一章中，你使用标准库编写了 TCP 和 UDP 应用程序。在本章中，你将运用这些知识来构建系统网络工具。编写这些工具的目的是为了更深入地理解利用 Go
    标准库的能力来实现这一点是多么容易。这突显了标准库提供了丰富的功能，使开发者能够构建各种网络相关应用。


    在本章中，你将深入理解以下内容：


    - 使用标准库编写网络工具

    - `net/dns` 包

    - DNS 如何打包和解包消息


    ## 源代码


    本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。


    ## Ping 工具


    在本节中，你将编写一个提供类似 ping 功能的应用程序。代码位于 `chapter10/ping` 文件夹中。


    该应用程序使用了 Go 标准库提供的 `icmp` 包，其文档可在 [`https://pkg.go.dev/golang.org/x/net/icmp`](https://pkg.go.dev/golang.org/x/net/icmp)
    找到。如文档所述，该包提供了操作基于 RFC 792 和 RFC 4443 的 ICMPv4/6 的函数。


    按如下方式编译应用程序：


    ```

    go build -o pinggoogle .

    ```


    使用 root 权限运行应用程序，如下所示：


    ```

    sudo ./pinggoogle

    ```


    你将看到以下输出：


    ```

    2022/01/21 00:07:09 Ping golang.org (142.250.66.241): 21.30063ms

    ```


    为了提供类似 ping 的功能，代码使用了互联网控制消息协议（ICMP），该协议是所有网络协议栈都使用的 IP 协议栈的一部分，这意味着任何使用 IP 协议栈的计算机都可以响应
    ICMP 请求，除非被禁用。IP 网络协议栈无论运行在何处，都具有响应 ICMP 请求的能力。ICMP 是 IP 协议栈的一部分，通常用于错误报告和网络诊断。

