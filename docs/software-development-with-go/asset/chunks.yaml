    的表格，展示了不同的前景色和背景色值组合以及每种组合所代表的颜色。


    ![](img/527551_1_En_15_Fig4_HTML.jpg)


    一张包含 FG、BG、名称、VGA、Windows XP 控制台、Windows PowerShell、Visual Studio Code、Windows
    10 和终端等列的截图，解释了前景色和背景色的映射关系。


    图 15-4


    前景色和背景色映射


    在下一节中，您将看到如何使用 ANSI 码在屏幕上格式化文本的示例。


    ### 文本样式设置


    ANSI 码也可用于设置文本样式，例如斜体、上标等。让我们看看 `chapter15/textstyle` 文件夹中的示例代码，它将打印出如图 15-5 所示的输出。


