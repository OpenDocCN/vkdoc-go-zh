    mux.HandleFunc(apiResource, func(w http.ResponseWriter, r *http.Request) {

    err := handleRequest(supportedApiVersions, m, w, r)

    if err != nil {

    http.Error(w, err.Error(), 500)

    }

    })

    return nil

    }

    ```


    The API handlers expose the `/api` path. To test this handler, make sure you have
    cAdvisor running and open your browser and enter the URL `http://localhost:8080/api/v1.0/containers`.
    You will see something like Figure [18-11](#527551_1_En_18_Chapter.xhtml#Fig11).


    ![](images/527551_1_En_18_Chapter/527551_1_En_18_Fig11_HTML.jpg)


    A screenshot displays output as sub-containers with creation time links for C
    P U, memory ranges, status, and schedstat are measured for a certain limit.


    Figure 18-11


    Output of /api/v1.0/containers


    ## Manager


    Manager is the main component of cAdvisor. It takes care of the initialization,
    maintenance, and reporting of different metrics for the containers it manages.
    The interfaces are declared as follows:


    ```

    type Manager interface {

    Start() error

    Stop() error

    GetContainerInfo(containerName string, query *info.ContainerInfoRequest) (*info.ContainerInfo,
    error)

    GetContainerInfoV2(containerName string, options v2.RequestOptions) (map[string]v2.ContainerInfo,
    error)

    SubcontainersInfo(containerName string, query *info.ContainerInfoRequest) ([]*info.ContainerInfo,
    error)

    AllDockerContainers(query *info.ContainerInfoRequest) (map[string]info.ContainerInfo,
    error)

    DockerContainer(dockerName string, query *info.ContainerInfoRequest) (info.ContainerInfo,
    error)

    GetContainerSpec(containerName string, options v2.RequestOptions) (map[string]v2.ContainerSpec,
    error)

    GetDerivedStats(containerName string, options v2.RequestOptions) (map[string]v2.DerivedStats,
    error)

    GetRequestedContainersInfo(containerName string, options v2.RequestOptions) (map[string]*info.ContainerInfo,
    error)

    Exists(containerName string) bool

    GetMachineInfo() (*info.MachineInfo, error)

    GetVersionInfo() (*info.VersionInfo, error)

    GetFsInfoByFsUUID(uuid string) (v2.FsInfo, error)

    GetDirFsInfo(dir string) (v2.FsInfo, error)

    GetFsInfo(label string) ([]v2.FsInfo, error)

    GetProcessList(containerName string, options v2.RequestOptions) ([]v2.ProcessInfo,
    error)

    WatchForEvents(request *events.Request) (*events.EventChannel, error)

    GetPastEvents(request *events.Request) ([]*info.Event, error)

    CloseEventChannel(watchID int)

    DockerInfo() (info.DockerStatus, error)

    DockerImages() ([]info.DockerImage, error)

    DebugInfo() map[string][]string

    }

    ```


    The interfaces and implementation are found inside `manager.go`*.*


    Manager uses plugins for different container technologies. For example, the Docker
    plugin is responsible for communicating with the Docker engine. The Docker plugin
    resides inside the `container/docker/plugin.go` file. The following is the Docker
    plugin code:


    ```

    package docker

    import (

    ...

    )

    const dockerClientTimeout = 10 * time.Second

    ...

    func (p *plugin) InitializeFSContext(context *fs.Context) error {

    SetTimeout(dockerClientTimeout)

    // Try to connect to docker indefinitely on startup.

    dockerStatus := retryDockerStatus()

    ...

    }

    ...

    func retryDockerStatus() info.DockerStatus {

    startupTimeout := dockerClientTimeout

    maxTimeout := 4 * startupTimeout

    for {

    ...

    }

    }

    ```


    The main job of Manager is to monitor containers, but before it is able to do
    that, it needs to find out what containers are available and how to monitor them.
    Let’s take a look at the first step, which is finding out what containers will
    be monitored.


    In the previous section, it was mentioned that conceptually cAdvisor refers to
    containers not only for Docker, but anything that it monitors is considered as
    containers. Let’s take a look at how cAdvisor finds the containers that it monitors.
    The collection of containers that it will monitor are collected when the `Start()`
    function of Manager is called, as shown here:


    ```

    func (m *manager) Start() error {

    ...

    err := raw.Register(m, m.fsInfo, m.includedMetrics, m.rawContainerCgroupPathPrefixWhiteList)

    if err != nil {

    klog.Errorf("Registration of the raw container factory failed: %v", err)

    }

    rawWatcher, err := raw.NewRawContainerWatcher()

    if err != nil {

    return err

    }

    m.containerWatchers = append(m.containerWatchers, rawWatcher)

    ...

    // Create root and then recover all containers.

    err = m.createContainer("/", watcher.Raw)

    if err != nil {

    return err

    }

    klog.V(2).Infof("Starting recovery of all containers")

    err = m.detectSubcontainers("/")

    if err != nil {

    return err

    }

    ...

    return nil

    }

    ```


    The collection process is performed by the `m.createContainer(..)` function and
    Figure [18-12](#527551_1_En_18_Chapter.xhtml#Fig12) shows what is created.


    ![](images/527551_1_En_18_Chapter/527551_1_En_18_Fig12_HTML.jpg)'
