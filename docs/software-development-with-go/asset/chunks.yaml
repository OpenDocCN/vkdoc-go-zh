    \ curl\n[Jun 26 18:33:45] DEBUG [localhost] execResult: servername:\ncmd: type\
    \ curl\nexitstatus: 0\nstdout: curl is /usr/bin/curl\n...\nScan Summary\n================\n\
    localhost    pop22.04    2378 installed, 0 updatable\n```\n\nVuls 生成的扫描报告包含关于已扫描或发现内容的全面信息。报告内容如下：\n\
