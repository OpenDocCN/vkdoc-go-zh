  trans: '

    # gopacket


    在本节中，你将探索 `gopacket` 并了解该库的主要部分，以理解其工作原理。该库提供了编写需要捕获和分析网络流量的应用程序的能力。它负责与内核通信以获取所有网络数据，解析数据并将其提供给应用程序使用。`gopacket`
    使用了一个长期以来一直是 Linux 工具箱一部分的包捕获 Linux 库，名为 `libpcap`。更多信息可在 [`www.tcpdump.org/index.xhtml`](http://www.tcpdump.org/index.xhtml)
    找到。


    `libpcap` 库提供了从网卡抓取网络数据包的功能，这些数据包随后被解析并转换为相关协议，以便应用程序轻松使用。`gopacket` 提供了两种主要的可供应用程序使用的数据结构类型，即
    `Packet` 和 `Layer`，接下来将详细探讨它们。


    ## Layer


    在本节中，你将了解 `Layer` 接口。该接口是库中的主要接口，用于保存与原始网络数据相关的数据。该接口定义如下：


    ```

    type Layer interface {

    // LayerType 是该层的 gopacket 类型。

    LayerType() LayerType

    // LayerContents 返回构成该层的字节集合。

    LayerContents() []byte

    // LayerPayload 返回该层内包含的字节集合，不包括该层本身。

    LayerPayload() []byte

    }

    ```


    `LayerContents` 包含表示特定层的字节。例如，如果这是一个以太网层，那么它将包含构成以太网帧的字节，而 `LayerPayload` 将包含表示以太网协议的字节。


    `LayerType` 定义如下，它包含了该层所代表的类型（例如：以太网、ARP、TCP 等）：


    ```

    type LayerType int64

    ```


    `layertypes.go` 源文件包含了库中支持的不同网络层，如下面的代码片段所示：


    ```

    import (

    ...

    )

    var (

    LayerTypeARP                          = gopacket.RegisterLayerType(10, gopacket.LayerTypeMetadata{Name:
    "ARP", Decoder: gopacket.DecodeFunc(decodeARP)})

    LayerTypeCiscoDiscovery               = gopacket.RegisterLayerType(11, gopacket.LayerTypeMetadata{Name:
    "CiscoDiscovery", Decoder: gopacket.DecodeFunc(decodeCiscoDiscovery)})

    LayerTypeEthernetCTP                  = gopacket.RegisterLayerType(12, gopacket.LayerTypeMetadata{Name:
    "EthernetCTP", Decoder: gopacket.DecodeFunc(decodeEthernetCTP)})

    ...

    LayerTypeIPv4                         = gopacket.RegisterLayerType(20, gopacket.LayerTypeMetadata{Name:
    "IPv4", Decoder:

    ...

    )

    ```


    使用 `Layer` 接口的不同协议可以在 `layers` 目录中找到，如图 11-1 所示。


    ![](img/527551_1_En_11_Fig1_HTML.jpg)


    一张截图展示了 layer 目录中使用 layer 接口的不同协议。


    **图 11-1** Layer 结构体实现


    `layers` 目录中的源代码包含了每种协议的实现，以及如何从从内核获取的原始字节中读取它们。


    ### TCP Layer


    让我们看看一个 TCP 协议实现的例子，该实现可以在 `layers/tcp.go` 文件中找到。包含 TCP 协议信息的 TCP 结构体声明如下：


    ```

    type TCP struct {

    BaseLayer

    SrcPort, DstPort                           TCPPort

    Seq                                        uint32

    Ack                                        uint32

    DataOffset                                 uint8

    FIN, SYN, RST, PSH, ACK, URG, ECE, CWR, NS bool

    Window                                     uint16

    Checksum                                   uint16

    Urgent                                     uint16

    sPort, dPort                               []byte

    Options                                    []TCPOption

    Padding                                    []byte

    opts                                       [4]TCPOption

    tcpipchecksum

    }

    ```


    以下代码展示了 `DecodeFromBytes` 函数，它读取原始字节并将其转换为 TCP 结构体：


    ```

    func (tcp *TCP) DecodeFromBytes(data []byte, df gopacket.DecodeFeedback) error
    {

    ...

    tcp.SrcPort = TCPPort(binary.BigEndian.Uint16(data[0:2]))

    tcp.sPort = data[0:2]

    tcp.DstPort = TCPPort(binary.BigEndian.Uint16(data[2:4]))

    tcp.dPort = data[2:4]

    tcp.Seq = binary.BigEndian.Uint32(data[4:8])

    tcp.Ack = binary.BigEndian.Uint32(data[8:12])

    ...

    ...

    }

    ```


    逐个查看每个协议源文件，你将看到该库支持的不同协议的实现。


    ## Packet


    `Packet` 是你的应用程序将要处理的主要类型。从底层 `libpcap` 库读取的数据将以此处更易于开发者理解的形式呈现。让我们看看定义在 `packet.go`
    文件中的 `Packet` 结构体：


    ```

    type Packet interface {

    String() string

    Dump() string

    Layers() []Layer

    Layer(LayerType) Layer

    LayerClass(LayerClass) Layer

    LinkLayer() LinkLayer

    NetworkLayer() NetworkLayer

    TransportLayer() TransportLayer

    ApplicationLayer() ApplicationLayer

    ErrorLayer() ErrorLayer

    Data() []byte

    Metadata() *PacketMetadata

    }

    ```


    该结构体包含多个不同的函数，这些函数返回你上一节中看到的不同类型的 `Layer`。为了更好地理解，让我们看看由 `ApplicationLayer()`
    函数返回的 `ApplicationLayer` 类型，该类型定义在同一个文件 `packet.go` 中。


    ```

    type ApplicationLayer interface {

    Layer

    Payload() []byte

    }

    ```


    `ApplicationLayer` 是一个接口，它包含了 `Layer` 类型和 `Payload()` 函数，该函数将返回与该特定层相关的网络捕获中的原始字节。下一节你将看到一个关于如何使用
    `Packet` 中不同函数的示例。


    ## 使用 gopacket


    在本节中，你将看到如何使用 `gopacket` 的示例。这些示例将为你提供使用该库的思路，并展示该库在读取网络协议方面的能力。


    ### pcap


    让我们花点时间理解 pcap。它代表包捕获（packet capture）。Linux 拥有允许开发者或系统管理员进行网络故障排除的工具，其中一种工具就是包捕获工具。包捕获工具允许
    Linux root 用户捕获机器上的网络流量。


    流量数据可以保存到文件中，稍后读取进行分析。这种能力对于在云环境或本地环境中执行审计以及安全和网络故障排除非常有用。在本章中，你将捕获并分析 pcap 文件。


    #### 安装 libpcap


    代码依赖于一个名为 libpcap 的 Linux 库（[`www.tcpdump.org/manpages/pcap.3pcap.xhtml`](http://www.tcpdump.org/manpages/pcap.3pcap.xhtml)）。这个库是帮助执行网络捕获的主要库。请确保你的本地
    Linux 机器上已安装该库。使用以下命令安装该库：


    ```

    sudo apt-get install libpcap-dev

    ```


    安装成功后，你需要重启机器。

    '
- fmt: '### Networking Sniffer


    For this section example, you will look at an example of a network sniffer application
    using the library. The sample application can be found inside the `chapter11/gopacket/sniffer`
    folder. The sample code will sniff out your local network and print out the following:


    - IPv4 information

    - DNS information

    - TCP information

    - UDP information

    - Application layer protocol information


    Before running the application, make sure you change the following line of code
    to use the correct network interface that exists in your machine:


    ```

    const (

    iface = "enp7s0"

    ...

    )

    ```


    In my case, it’s called `enp7s0`, which can be found by running the `ifconfig`
    tool. The following is the output of running `ifconfig` on my machine:


    ```

    enp7s0: flags=4099  mtu 1500

    ether ...... txqueuelen 1000  (Ethernet)

    RX packets 0  bytes 0 (0.0 B)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 0  bytes 0 (0.0 B)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    lo: flags=73  mtu 65536

    inet 127.0.0.1  netmask 255.0.0.0

    ......

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    wlp6s0: flags=4163  mtu 1500

    inet 192.168.1.17  netmask 255.255.255.0  broadcast 192.168.1.255

    ......

    TX errors 239484  dropped 0 overruns 0  carrier 0  collisions 0

    device interrupt 18

    ```


    Change your directory to the `chapter11/gopacket/sniffer` folder and compile the
    app.


    ```

    go build -o sniffer

    ```


    Run the app with the root account.


    ```

    sudo ./sniffer

    ```


    Once the app runs, you will see output like the following:


    ```

    2022/03/12 21:11:19 (TCP) Source address : 100.24.164.135, Destination address
    : 192.168.1.6

    2022/03/12 21:11:19 (TCP) From port 443 to 35232

    2022/03/12 21:11:19 (TCP) Source address : 192.168.1.6, Destination address :
    x.x.x.x

    2022/03/12 21:11:19 (TCP) From port 35232 to 443

    2022/03/12 21:11:20 (TCP) Source address : 192.168.1.6, Destination address :
    x.x.x.x

    2022/03/12 21:11:20 (TCP) From port 45988 to 443

    2022/03/12 21:11:20 (TCP) Source address : x.x.x.x, Destination address : x.x.x.x

    ...

    2022/03/12 21:24:03 ----------------------

    2022/03/12 21:24:03 (TCP) Source address : x.x.x.x, Destination address : 192.168.1.6

    2022/03/12 21:24:03 (TCP) From port 80 to 36910

    2022/03/12 21:24:03 HTTP Application layer

    2022/03/12 21:24:03 ----------------------

    2022/03/12 21:24:03 HTTP/1.1 404 Not Found

    Date: Sat, 12 Mar 2022 10:24:03 GMT

    Server: Apache/2.4.29 (Ubuntu)

    Content-Length: 283

    Content-Type: text/html; charset=iso-8859-1

    ...

    2022/03/12 21:24:03 ----------------------

    2022/03/12 21:24:03 (TCP) Source address : 192.168.1.6, Destination address :
    x.x.x.x

    2022/03/12 21:24:03 (TCP) From port 36364 to 443

    ...

    ```


    ### Code Walkthrough


    Let’s take a look step by step at the different parts of the app to understand
    how it uses `gopacket`. The following code shows the process of initializing the
    library to sniff the network traffic using the network interface specified:


    ```

    func main() {

    f, _ := os.Create(fName)

    ...

    handle, err := pcap.OpenLive(iface, sLen, true, -1)

    if err != nil {

    log.Fatal(err)

    }

    ...

    }

    ```


    The `pcap.OpenLive` function calls `gopacket` to open the network device and the
    `true` parameter sent indicates to the library that you want to open it in promiscuous
    mode.


    Once the function returns without an error, it starts listening for incoming packets
    and processes them as follows:


    ```

    func main() {

    f, _ := os.Create(fName)

    ...

    pSource := gopacket.NewPacketSource(handle, handle.LinkType())

    for packet := range pSource.Packets() {

    printPacketInfo(packet)

    ...

    }

    }

    ```


    As mentioned in the “Packet” section, the application interacts with the network
    data via the `Packet` type. In the sample code case, you create a new `PacketSource`
    that the app can use in a `for .. range` to extract all the incoming packets and
    process them inside the `printPacketInfo(..)` function. So far, you have successfully
    initialized and received the packet; now let’s dig further into how to use the
    information made available inside the `Packet` struct.


    The following is the snippet of the `printPacketInfo(..)` function that shows
    how to use the `Packet` struct to check whether the network capture contains an
    HTTP protocol:


    ```

    func printPacketInfo(packet gopacket.Packet) {

    ...

    applicationLayer := packet.ApplicationLayer()

    if applicationLayer != nil {

    // Search for a string inside the payload

    if strings.Contains(string(applicationLayer.Payload()), "HTTP") {

    //log.Println("HTTP found!")

    log.Println("HTTP Application layer")

    log.Println("----------------------")

    log.Println(fmt.Sprintf("%s", string(applicationLayer.Payload())))

    log.Println("----------------------")

    }

    }

    ...

    }

    ```


    The code uses the `ApplicationLayer()` function that instructs `gopacket` to return
    a layer that corresponds to the application layer, which corresponds to Layer
    7 of the OSI network model. Once obtained, it will check whether the layer data
    is an HTTP request by checking for an HTTP string.


    This shows the powerful functionality the library can provide when accessing the
    different network layers that are made available via the `Packet` struct.'
