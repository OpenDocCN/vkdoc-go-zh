- fmt: '# gopacket


    In this section, you will explore `gopacket` and learn about the main part of
    the library to understand how it works. This library provides the capability to
    write applications that need to capture and analyze network traffic. The library
    does the heavy lifting of communicating with the kernel to obtain all the network
    data and parse it and make it available to applications. `gopacket` uses a packet
    capture Linux library that has been part of the Linux toolbox for a long time
    called `libpcap`. More information can be found at [`www.tcpdump.org/index.xhtml`](http://www.tcpdump.org/index.xhtml).


    The `libpcap` library provides functionality to grab network packets from the
    network cards, which in turn are parsed and converted to the relevant protocols
    that are easily used by applications. `gopacket` provides two major types of data
    structures that applications can work with, namely `Packet` and `Layer`, which
    will be explored more in detail next.


    ## Layer


    In this section, you will look at the `Layer` interface. This interface is the
    main interface in the library that holds data in regard to the raw network data.
    The interface looks like the following:


    ```

    type Layer interface {

    // LayerType is the gopacket type for this layer.

    LayerType() LayerType

    // LayerContents returns the set of bytes that make up this layer.

    LayerContents() []byte

    // LayerPayload returns the set of bytes contained within this layer, not

    // including the layer itself.

    LayerPayload() []byte

    }

    ```


    `LayerContents` contains the bytes representing a particular layer. For example,
    if this is an Ethernet layer, then it will contain bytes that make up the Ethernet
    frame, while `LayerPayload` will contain the bytes representing the Ethernet protocol.


    The `LayerType` is defined as follows, which contains the type of layer it represents
    (for example: Ethernet, ARP, TCP, etc.):


    ```

    type LayerType int64

    ```


    The `layertypes.go` source contains the different network layers that are supported
    in the library, as shown in the code snippet here:


    ```

    import (

    ...

    )

    var (

    LayerTypeARP                          = gopacket.RegisterLayerType(10, gopacket.LayerTypeMetadata{Name:
    "ARP", Decoder: gopacket.DecodeFunc(decodeARP)})

    LayerTypeCiscoDiscovery               = gopacket.RegisterLayerType(11, gopacket.LayerTypeMetadata{Name:
    "CiscoDiscovery", Decoder: gopacket.DecodeFunc(decodeCiscoDiscovery)})

    LayerTypeEthernetCTP                  = gopacket.RegisterLayerType(12, gopacket.LayerTypeMetadata{Name:
    "EthernetCTP", Decoder: gopacket.DecodeFunc(decodeEthernetCTP)})

    ...

    LayerTypeIPv4                         = gopacket.RegisterLayerType(20, gopacket.LayerTypeMetadata{Name:
    "IPv4", Decoder:

    ...

    )

    ```


    Different protocols using the `Layer` interface can be found inside the `layers`
    directory, shown in Figure [11-1](#527551_1_En_11_Chapter.xhtml#Fig1).


    ![](images/527551_1_En_11_Chapter/527551_1_En_11_Fig1_HTML.jpg)


    A screenshot representing different protocols using the layer interface in the
    layer directory.


    **Figure 11-1** Layer struct implementation


    The source code inside the `layers` directory contains implementations of each
    protocol and how to read them from the raw bytes obtained from the kernel.


    ### TCP Layer


    Let’s take a look at an example of a TCP protocol implementation that can be found
    inside the `layers/tcp.go` file. The TCP struct declaration that contains the
    TCP protocol information is shown here:


    ```

    type TCP struct {

    BaseLayer

    SrcPort, DstPort                           TCPPort

    Seq                                        uint32

    Ack                                        uint32

    DataOffset                                 uint8

    FIN, SYN, RST, PSH, ACK, URG, ECE, CWR, NS bool

    Window                                     uint16

    Checksum                                   uint16

    Urgent                                     uint16

    sPort, dPort                               []byte

    Options                                    []TCPOption

    Padding                                    []byte

    opts                                       [4]TCPOption

    tcpipchecksum

    }

    ```


    The following code shows the function `DecodeFromBytes` that reads the raw bytes
    and converts them into a TCP struct:


    ```

    func (tcp *TCP) DecodeFromBytes(data []byte, df gopacket.DecodeFeedback) error
    {

    ...

    tcp.SrcPort = TCPPort(binary.BigEndian.Uint16(data[0:2]))

    tcp.sPort = data[0:2]

    tcp.DstPort = TCPPort(binary.BigEndian.Uint16(data[2:4]))

    tcp.dPort = data[2:4]

    tcp.Seq = binary.BigEndian.Uint32(data[4:8])

    tcp.Ack = binary.BigEndian.Uint32(data[8:12])

    ...

    ...

    }

    ```


    Going through each of the protocol source files, you will see the implementation
    of the different protocols that are supported by the library.


    ## Packet


    `Packet` is the primary type that your application will be working with. The data
    that has been read from the low-level `libpcap` library will end up here in a
    form that is easier to understand by the developer. Let’s take a look at the `Packet`
    struct, which is defined inside the `packet.go` file:


    ```

    type Packet interface {

    String() string

    Dump() string

    Layers() []Layer

    Layer(LayerType) Layer

    LayerClass(LayerClass) Layer

    LinkLayer() LinkLayer

    NetworkLayer() NetworkLayer

    TransportLayer() TransportLayer

    ApplicationLayer() ApplicationLayer

    ErrorLayer() ErrorLayer

    Data() []byte

    Metadata() *PacketMetadata

    }

    ```


    The struct holds different functions that return the different types of `Layer`
    that you looked at in the previous section. To understand a bit better, let’s
    take a peek at the `ApplicationLayer` type that is returned by the `ApplicationLayer()`
    function, which is defined inside the same file, `packet.go`.


    ```

    type ApplicationLayer interface {

    Layer

    Payload() []byte

    }

    ```


    The `ApplicationLayer` is an interface that holds the `Layer` type and the `Payload()`
    function that will return the original bytes relevant from the network capture
    for this particular layer. You will look at an example in the next section on
    how to use the different functions inside the `Packet`.


    ## Using gopacket


    In this section, you will look at examples of how to use `gopacket`. They will
    give you ideas of how to use the library and also show the library capabilities
    in reading network protocols.


    ### pcap


    Let’s take a moment to understand pcap. It stands for packet capture. Linux has
    tools that allow a developer or sysadmin to perform network troubleshooting, and
    one of those tools is a packet capture tool. The packet capture tools allow Linux
    root users to capture network traffic in the machine.


    The traffic data can be saved into a file and later read to be analyzed. This
    kind of capability is super useful for performing auditing plus security and network
    troubleshooting in a cloud or local environment. In this chapter, you will capture
    and analyze the pcap file.


    #### Installing libpcap


    The code relies on a Linux library called libpcap ([`www.tcpdump.org/manpages/pcap.3pcap.xhtml`](http://www.tcpdump.org/manpages/pcap.3pcap.xhtml)).
    This library is the main library that helps in performing network captures. Make
    sure you have the library installed on your local Linux machine. Use the following
    command to install the library:


    ```

    sudo apt-get install libpcap-dev

    ```


    You will need to reboot your machine once it is successfully installed.'
