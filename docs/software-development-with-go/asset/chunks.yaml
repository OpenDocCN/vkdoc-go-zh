    图 2-3 显示了一个在我本地机器上编译的示例应用程序的头部部分输出。


    ![](img/527551_1_En_2_Fig3_HTML.jpg)


    一个 E L F 头部代码的截图，展示了 class、data、version、ABI versions、type、flags、headers 的大小、section
    headers 的大小、section headers 的数量以及字符串表索引。


    图 2-3


    ELF 文件头部部分

