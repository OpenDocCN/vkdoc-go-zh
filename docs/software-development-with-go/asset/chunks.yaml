    ### Exec


    The next feature that is used quite often inside Vuls is executing an external
    tool to perform some operation as part of the scanning process. The following
    are some of the commands that Vuls uses for getting network IP information, getting
    kernel information, updating the index of package manager, and many others.


    | `apk update` | Downloads the updated package index from repositories |

    | `/sbin/ip -o addr` | Lists network devices, routing, and other network-related
    information |

    | `uname -r` | Prints out system information |

    | `stat /proc/1/exe` | Gets information about PID 1 |

    | `systemctl status` | Lists information that is registered with system |


    The commands used are different for different operating systems, but the way it
    is run is the same using the os/exec package.


