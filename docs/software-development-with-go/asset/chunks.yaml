- fmt: "# 13. Vulnerability Scanner\n\nThe proliferation of cloud providers enables\
    \ organizations to deploy applications that are affordable at scale. Deploying\
    \ applications at scale is one thing, but securing applications and resources\
    \ is another thing and this has become a headache for organizations everywhere.\
    \ Security is a big topic, and it covers a lot of different aspects. In this chapter,\
    \ you will look at one of the tools that helped in identifying vulnerabilities\
    \ in the infrastructure.\n\nYou are going to look at a tool for detecting vulnerabilities\
    \ inside Linux. The primary focus of the chapter is to understand how and where\
    \ to use this tool and also to take a closer look at the source code to understand\
    \ better how the tool works. In this chapter, you will learn:\n\n* How a vulnerability\
    \ scanner works\n* How the tool uses a different technology to achieve its objectives\n\
    * About port scans, command line executions, and databases using SQLite in Go\n\
    \n## Source Code\n\nThe source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
    \ repository.\n\n## Vulnerability Scanners\n\nVulnerability scanners are tools\
    \ that are used to search and report for known vulnerabilities that exist in your\
    \ IT infrastructure. Every organization has an IT infrastructure that it manages\
    \ in-house or in the cloud. In this infrastructure is a variety of applications,\
    \ networks, and other things running, which requires constant supervision when\
    \ it comes to security. Every day we read news of new vulnerabilities uncovered\
    \ or exploited that can cause damage to organizations and sometimes to an extended\
    \ community.\n\nTools like vulnerability scanners use a lot of interesting technology\
    \ stacks that are useful to learn from, and this is the intention of this chapter.\
    \ You will look at an open source project named Vuls ([`https://github.com/future-architect/vuls`](https://github.com/future-architect/vuls)),\
    \ which is written in Go, and look at how it implements some of the functionality\
    \ it provides in Go. The objective is to apply this knowledge in your own project\
    \ or use it as a knowledge base to understand how this kind of tool works. Please\
    \ remember that this chapter is by no means a go-to chapter for installing or\
    \ using Vuls or for vulnerability scanners.\n\nThe reason for choosing Vuls for\
    \ this chapter is the fact that the project is heavily maintained and updated\
    \ by the community and it has a high star rating. The project uses a database\
    \ of information from different sources rather than relying on its own source,\
    \ making it up to date in terms of detecting vulnerabilities.\n\nSome of the key\
    \ features that Vuls provides are:\n\n* Support for scanning vulnerabilities for\
    \ major Linux/FreeBSD operating systems\n* Can be used to scan cloud infrastructures\
    \ like Amazon, Google, and more\n* Uses multiple vulnerability databases. One\
    \ of the databases it uses is the National Vulnerability Database from NIST (U.S.\
    \ National Institute of Standards and Technology).\n* Ability to do quick, deep,\
    \ or other kinds of scanning depending on the need\n* Notifications via email\
    \ or slack channel\n\nIn the next section, you will download the source code,\
    \ compile it, and use it to understand how it works.\n\n## Using Vuls\n\nIn this\
    \ section, you will explore Vuls and do the following:\n\n* Check out the code\n\
    * Run a scan on a local machine\n\n### Checking Out the Code\n\nVuls requires\
    \ Go 1.8, so make sure you have it installed before proceeding further. The easiest\
    \ way to check out code is to use the `go get` command as in the following:\n\n\
    ```\nGO111MODULE=off go get github.com/future-architect/vuls\n```\n\nMake sure\
    \ you have your `GOPATH` directory set up to the correct folder where you want\
    \ to store your Go modules (in my case, my `GOPATH` points to `/home/nanik/Gopath`).\
    \ Once the command has successfully run, it downloads the source code inside the\
    \ `src/github.com/future-architect/vuls` directory inside `GOPATH`, like so:\n\
    \n```\n...\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 detector\n-rw-rw-r--\
    \  1 nanik nanik    596 Jun 26 15:48 Dockerfile\n-rw-rw-r--  1 nanik nanik   \
    \  55 Jun 26 15:48 .dockerignore\n...\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26\
    \ 15:48 saas\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 scanner\n-rw-rw-r--\
    \  1 nanik nanik    137 Jun 26 15:48 SECURITY.md\ndrwxrwxr-x  2 nanik nanik  \
    \ 4096 Jun 26 15:48 server\ndrwxrwxr-x  3 nanik nanik   4096 Jun 26 15:48 setup\n\
    drwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 subcmds\ndrwxrwxr-x  2 nanik nanik\
    \   4096 Jun 26 15:48 tui\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 util\n\
    ```\n\nThe discussion in this chapter focuses on the `v0.19.7` version, so you\
    \ need to switch to a different branch. Change to the `GOPATH` directory to the\
    \ `src/github.com/future-architect/vuls` directory and change the branch as follows:\n\
    \n```\ngit checkout v0.19.7\n```\n\nThe code is all set and ready to be built.\
    \ Use the `make` command to build it.\n\n```\nmake build\n```\n\nThe compilation\
    \ process starts and all the related modules are downloaded. Once compilation\
    \ completes, you get an executable file called `Vuls`. Run the application as\
    \ follows:\n\n```\n./vuls\n```\n\nYou will get output like the following:\n\n\
    ```\nUsage: vuls   \nSubcommands:\ncommands         list all command names\nflags\
    \            describe all known top-level flags\nhelp             describe subcommands\
    \ and their syntax\nSubcommands for configtest:\nconfigtest       Test configuration\n\
    Subcommands for discover:\ndiscover         Host discovery in the CIDR\nSubcommands\
    \ for history:\nhistory          List history of scanning.\nSubcommands for report:\n\
    report           Reporting\nSubcommands for scan:\nscan             Scan vulnerabilities\n\
    Subcommands for server:\nserver           Server\nSubcommands for tui:\ntui  \
    \            Run Tui view to analyze vulnerabilities\nUse \"vuls flags\" for a\
    \ list of top-level flags\n```"
