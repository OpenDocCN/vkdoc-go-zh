- fmt: '# Web User Interface


    Make sure you have your `cAdvisor` running locally and open your browser to access
    it via URL `http://localhost:8080`. Let’s understand some of the data that is
    presented on the webpage.


    **Note:** The information you see on your local machine might be different from
    what you read in this book. It depends on the operating system or Linux distribution
    you are using.


    Figure 18-3 shows the subdirectory called `subcontainers` in `cAdvisor`. This
    directory provides important statistics and performance information that `cAdvisor`
    uses for reporting purposes.


    ![Figure 18-3](images/527551_1_En_18_Chapter/527551_1_En_18_Fig3_HTML.jpg)


    **Figure 18-3: Subcontainers view**


    A screenshot lists 15 sub-containers names starting with a forward slash.


    Click the `system.slice` link and you will see something like Figure 18-4, which
    shows the different services running on the local machine.


