    ...

    }

    ```


    Calling `color.Style.Println` prints the text that you want using the foreground
    and background colors specified. For example,


    ```

    color.Style{color.FgDefault, color.BgDefault, color.OpStrikethrough}.Println("Strikethrough
    style")

    ```


    prints the words *Strikethrough style* in the default foreground and background
    colors with the strikethrough text format.


    The library uses a constant value to define the different colors it provides,
    as shown in the following code snippets, which can be found in the library under
    the file `color_16.go`:


    ```

    const (

    FgBlack Color = iota + 30

    FgRed

    FgGreen

    FgYellow

    ...

    )

    const (

    FgDarkGray Color = iota + 90

    FgLightRed

    FgLightGreen

    ...

    )

    const (

    BgBlack Color = iota + 40

    BgRed

    ...

    )

    const (

    BgDarkGray Color = iota + 100

    BgLightRed

    ...

    )

    const (

    OpReset         Color = iota

    OpBold

    OpFuzzy

    OpItalic

    ...

    )

    ```


    The library uses the same ANSI codes to format the color and text styling as you
    saw in the previous section. The following code snippet is from the file `color.go`:


    ```

    const (

    SettingTpl   = "\x1b[%sm"

    FullColorTpl = "\x1b[%sm%s\x1b[0m"

    )

    ```


    ### Spinner


    This library provides progress indicators for command-line applications. Progress
    indicators are mostly found in mobile applications or in graphical user interfaces
    like browsers. Progress indicators are used to indicate to the user that the application
    is processing the user''s request. The library project’s home is [`https://github.com/briandowns/spinner`](https://github.com/briandowns/spinner).
    Open your terminal and run the code inside the `chapter15/spinner` folder as follows:


    ```

    go run main.go

    ```


    Figure [15-7](#527551_1_En_15_Chapter.xhtml#Fig7) shows the output you will see
    when running the sample code. It prints the words *Processing request* with a
    red bar moving back and forth as the spinner.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig7_HTML.jpg)


    The text on the left reads processing request. On the right are the dark-shaded
    blocks.


    Figure 15-7


    Spinner sample output


    The library is straightforward to use, as shown in the following code snippet:


    ```

    func main() {

    s := spinner.New(spinner.CharSets[35], 100*time.Millisecond)

    s.Color("red")

    s.Prefix = "Processing request : "

    s.Start()

    ...

    s.Stop()

    }

    ```


    Calling `spinner.New` initializes a new spinner with the type specified, in this
    case `spinner.CharSets[35]`, and the time delay rendering the spinner, which is
    100 milliseconds.


    You can specify the different spinners, which can be found inside the library
    in the file `character_sets.go`.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Figa_HTML.png)


    A screenshot with a text reads character sets = map left bracket int right bracket
    left bracket right bracket string. Symbols are listed from rows 0 to 90.


    The library renders the spinner to the screen by printing through each character
    byte in the array specified after a certain amount of delay. By doing this, it
    gives the illusion of animation when seeing it printed on the screen.


    In Figure [15-8](#527551_1_En_15_Chapter.xhtml#Fig8), you can see in the debugging
    window how the different characters that will form the spinner are stored inside
    the `Spinner` struct, allowing the library to render them individually. This way,
    when the library renders the different characters, it looks like an animation.


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig8_HTML.jpg)


    A screenshot of the spinner structure has different characters such as mu, delay,
    chars with 5 strings, and prefixes as processing requests.


    Figure 15-8


    Spinner struct containing spinner characters


    The `spinner.Start()` function is the central piece of the logic inside the library
    that renders the spinner’s animation.


    ```

    func (s *Spinner) Start() {

    ...

    go func() {

    for {

    for i := 0; i < len(s.chars); i++ {

    select {

    ...

    default:

    ...

    if runtime.GOOS == "windows" {

    ...

    } else {

    outColor = fmt.Sprintf("\r%s%s%s", s.Prefix, s.color(s.chars[i]), s.Suffix)

    }

    ...

    fmt.Fprint(s.Writer, outColor)

    ...

    time.Sleep(delay)

    }

    }

    }

    }()

    }

    ```


    The function fires off a goroutine and endlessly loops the animation on the screen
    until the `stop()` function is called by the application.


    The `outColor` variable contains the text to be printed. In this example, it’s
    *Processing request*, along with the ANSI code of the color specified in the sample
    code, so the content of the variable looks like Figure [15-9](#527551_1_En_15_Chapter.xhtml#Fig9).


    ![](images/527551_1_En_15_Chapter/527551_1_En_15_Fig9_HTML.jpg)


    A screenshot of the output. S = left bracket star spinner dot spinner 0 x c 0
    0 0 0 d 0 0 b 0 I = left bracket interest right bracket 0. outColor = left bracket
    string right bracket slash r.


    Figure 15-9


    `outColor` final output


    ## Summary


    In this chapter, you learn about ANSI codes and how they are useful for creating
    user interfaces in terminals. The available ANSI codes allow you to write text
    in color and apply different formatting to the text printed on the screen. You
    learned that the ANSI codes can be used inside a Bash script and inside Go code.


    You explored deeper into the usage of ANSI codes by looking at different open
    source libraries that provide richer user interface functionality for terminal-based
    applications. The libraries you looked at provide text-based formatting such as
    color and styles and progress indicators.


    # 16. TUI Framework


    You saw in Chapter [15](#527551_1_En_15_Chapter.xhtml) that ANSI codes contain
    a different variety of code that can be used to develop text-based user interfaces.
    You also saw examples of using ANSI codes and learned what the different codes
    mean. There are a number of user interface libraries for Go that take care of
    user interface operations, thereby making development easier and faster. In this
    chapter, you will look at these libraries and explore in detail how they work
    internally.


    In this chapter, you will look at two libraries. The first library is a simple
    library called `uiprogress` that allows an application to create a text-based
    progress bar. The other is called `bubbletea` and it is a more comprehensive library
    that allows an application to create different kinds of text-based UIs such as
    text input, boxes, spinners, and more.


    By the end of this chapter, you will learn the following:


    - How to use the libraries

    - How the libraries work internally'
