    dynstrs, _ = file.DynString(elf.DT_SONAME)

    ...

    dynstrs, _ = file.DynString(elf.DT_RPATH)

    ...

    dynstrs, _ = file.DynString(elf.DT_RUNPATH)

    ...

    }

    ```


    该函数用于获取 ELF 文件的特定部分，这些部分作为参数传递给 `file.DynString` 函数。例如，当调用


    ```

    dynstrs, _ = file.DynString(elf.DT_SONAME)

    ```


    时，代码将获取该文件的共享库名称信息。


    ## /sys 文件系统


    在本节中，你将看到另一种读取系统级信息的方式。你将不会使用函数来读取系统信息；相反，你将使用操作系统为用户应用程序提供的系统目录。


    你要读取的目录是 `/sys` 目录，这是一个包含设备驱动程序、设备信息和其他内核功能的虚拟文件系统。图 2-4 展示了 Linux 机器上 `/sys`
    目录的内容。


    ![](img/527551_1_En_2_Fig4_HTML.jpg)


    一个系统目录的代码截图，用根值表示月份名称。列出的不同文件有 block, bus, class, dev, devices, firmware, fs,
    hypervisor, kernel, 和 module。


    图 2-4


    `/sys` 目录内部


    ### 读取 AppArmor


    Linux 在 `/sys` 目录中提供的一些信息与 AppArmor（Application Armor 的缩写）有关。什么是 AppArmor？它是一个内核安全模块，使系统管理员能够使用配置文件限制应用程序的能力。这使得系统管理员有权选择特定应用程序可以访问哪些资源。例如，系统管理员可以定义应用程序
    A 具有网络访问权限或原始套接字访问权限，而应用程序 B 没有访问网络功能的权限。


    让我们看一个从`/sys`文件系统读取 AppArmor 信息的示例应用程序，具体是检查 AppArmor 是否已启用以及是否已强制执行。以下是可以在 `chapter2/apparmor`
    目录中找到的示例代码：


    ```

    import (

    "fmt"

    ...

    )

    const (

    appArmorEnabledPath = "/sys/module/apparmor/parameters/enabled"

    appArmorModePath    = "/sys/module/apparmor/parameters/mode"

    )

    func appArmorMode() (mode string) {

    content, err := ioutil.ReadFile(appArmorModePath)

    ...

    return strings.TrimSpace(string(content))

    }

    func appArmorEnabled() (support bool) {

    content, err := ioutil.ReadFile(appArmorEnabledPath)

    ...

    return strings.TrimSpace(string(content)) == "Y"

    }

    func main() {

    fmt.Println("AppArmor mode : ", appArmorMode())

    fmt.Println("AppArmor is enabled : ", appArmorEnabled())

    }

    ```


    由于代码正在访问系统文件系统，因此必须使用根用户身份运行它。编译代码并按如下方式运行：


    ```

    sudo ./apparmor

    ```


    该代码使用标准库 `ioUtil.ReadFile` 从目录中读取信息，这就像读取文件一样，因此比你在前面章节中看到的函数调用更简单。


    ## 总结


    在本章中，你学习了如何使用系统调用与操作系统进行交互。你学习了如何使用提供许多函数调用与操作系统交互的 `syscall` 标准库，并编写了一个示例应用程序来打印磁盘空间信息。你学习了如何使用`debug/elf`标准库来读取
    Go ELF 文件信息。最后，你了解了如何通过`/sys`文件系统提取你想要读取的信息，以了解操作系统是否支持 AppArmor。


    # 3. 访问 proc 文件系统


    在第 2 章中，你了解了 Linux 中的 `/sys` 文件系统，并编写了一个简单的应用程序来从中提取信息。在本章中，你将了解另一个名为 `/proc`
    的系统目录。`/proc` 目录也被称为 `procfs`，它包含有关当前正在运行的进程的有用信息。内核将其用作所有相关进程的信息中心。


    在本章中，你将学习如何执行以下操作：


    *   查看 `procfs` 中可用的不同信息

    *   编写一个读取 `procfs` 的应用程序

    *   使用开源库与 `procfs` 进行交互


    ## 源代码


    本章的源代码可从[`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    仓库获取。

    '
