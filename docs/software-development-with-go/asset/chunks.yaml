  trans: "\n# 13. 漏洞扫描器\n\n云服务商的普及使组织能够以可负担的规模部署应用程序。然而，大规模部署应用是一回事，保护应用和资源的安全又是另一回事，这已成为各地组织的难题。安全是一个涵盖众多方面的重大议题。在本章中，你将了解一种用于识别基础设施漏洞的工具。\n\
    \n我们将重点探讨一款在 Linux 系统中检测漏洞的工具。本章的主要目标是理解如何使用该工具及其适用场景，同时通过深入分析源代码，更好地理解其工作原理。在本章中，你将学习：\n\
    \n* 漏洞扫描器的工作原理\n* 该工具如何运用不同技术实现其目标\n* 端口扫描、命令行执行以及 Go 语言中使用 SQLite 的数据库操作\n\n\
    ## 源代码\n\n本章的源代码可从 [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)\
    \ 仓库获取。\n\n## 漏洞扫描器\n\n漏洞扫描器是用于搜索并报告 IT 基础设施中已知漏洞的工具。每个组织都拥有自管或云端管理的 IT 基础设施，其中运行着各种应用程序、网络及其他组件，在安全方面需要持续监控。每天我们都会读到关于新漏洞被发现或被利用的新闻，这些漏洞可能对组织甚至更广泛的社区造成损害。\n\
    \n漏洞扫描器这类工具使用了大量值得学习的有趣技术栈，这正是本章的意图所在。我们将研究一个名为 Vuls 的开源项目（[`https://github.com/future-architect/vuls`](https://github.com/future-architect/vuls)），它使用\
    \ Go 语言编写，并观察它如何实现部分功能。目标是将这些知识应用到你自己的项目中，或将其作为知识库来理解此类工具的工作原理。请注意，本章并非安装或使用 Vuls\
    \ 或漏洞扫描器的专项指南。\n\n本章选择 Vuls 的原因在于该项目由社区持续维护和更新，且拥有较高的星级评分。该工具使用来自不同来源的数据库信息，而非依赖自有数据源，从而在漏洞检测方面保持更新。\n\
    \nVuls 提供的主要功能包括：\n\n* 支持扫描主流 Linux/FreeBSD 操作系统的漏洞\n* 可用于扫描 Amazon、Google 等云基础设施\n\
    * 使用多个漏洞数据库，其中之一是美国国家标准与技术研究院（NIST）的国家漏洞数据库\n* 可根据需求进行快速扫描、深度扫描或其他类型的扫描\n* 通过电子邮件或\
    \ Slack 频道发送通知\n\n下一节中，你将下载源代码、编译并使用它来理解其工作原理。\n\n## 使用 Vuls\n\n在本节中，你将探索 Vuls\
    \ 并执行以下操作：\n\n* 检出代码\n* 在本地机器上运行扫描\n\n### 检出代码\n\nVuls 需要 Go 1.8 环境，请确保在继续之前已安装。检出代码最简单的方法是使用\
    \ `go get` 命令，如下所示：\n\n```\nGO111MODULE=off go get github.com/future-architect/vuls\n\
    ```\n\n确保已将 `GOPATH` 目录设置为用于存储 Go 模块的正确文件夹（我的 `GOPATH` 指向 `/home/nanik/Gopath`）。命令成功运行后，代码将下载到\
    \ `GOPATH` 目录下的 `src/github.com/future-architect/vuls` 文件夹中，示例如下：\n\n```\n...\n\
    drwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 detector\n-rw-rw-r--  1 nanik nanik\
    \    596 Jun 26 15:48 Dockerfile\n-rw-rw-r--  1 nanik nanik     55 Jun 26 15:48\
    \ .dockerignore\n...\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 saas\ndrwxrwxr-x\
    \  2 nanik nanik   4096 Jun 26 15:48 scanner\n-rw-rw-r--  1 nanik nanik    137\
    \ Jun 26 15:48 SECURITY.md\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 server\n\
    drwxrwxr-x  3 nanik nanik   4096 Jun 26 15:48 setup\ndrwxrwxr-x  2 nanik nanik\
    \   4096 Jun 26 15:48 subcmds\ndrwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 tui\n\
    drwxrwxr-x  2 nanik nanik   4096 Jun 26 15:48 util\n```\n\n本章的讨论聚焦于 `v0.19.7`\
    \ 版本，因此需要切换到不同分支。切换到 `GOPATH` 下的 `src/github.com/future-architect/vuls` 目录，并按如下方式切换分支：\n\
    \n```\ngit checkout v0.19.7\n```\n\n代码已就绪，可以开始构建。使用 `make` 命令进行构建：\n\n```\nmake\
    \ build\n```\n\n编译过程开始，所有相关模块将被下载。编译完成后，你将获得一个名为 `Vuls` 的可执行文件。按如下方式运行应用程序：\n\n\
    ```\n./vuls\n```\n\n你将看到类似如下的输出：\n\n```\nUsage: vuls   \nSubcommands:\ncommands\
    \         list all command names\nflags            describe all known top-level\
    \ flags\nhelp             describe subcommands and their syntax\nSubcommands for\
    \ configtest:\nconfigtest       Test configuration\nSubcommands for discover:\n\
    discover         Host discovery in the CIDR\nSubcommands for history:\nhistory\
    \          List history of scanning.\nSubcommands for report:\nreport        \
    \   Reporting\nSubcommands for scan:\nscan             Scan vulnerabilities\n\
    Subcommands for server:\nserver           Server\nSubcommands for tui:\ntui  \
    \            Run Tui view to analyze vulnerabilities\nUse \"vuls flags\" for a\
    \ list of top-level flags\n```\n"
- fmt: "### Running Scan\n\nVuls requires a configuration file in the `.toml` format.\
    \ For this section, you can use the configuration file found inside the `chapter13`\
    \ directory called `config.toml`, which is as follows:\n\n```\n[servers.localhost]\n\
    host = \"localhost\"\nport = \"local\"\n```\n\nThe configuration specifies the\
    \ machine to be scanned. In your example, it’s the localhost on your local machine.\
    \ It performs the standard local mode scanning operation, which does not include\
    \ port scanning as the one excluded service.\n\nRun Vuls as follows:\n\n```\n\
    ./vuls scan --config /config.toml --debug --results-dir \n```\n\nVuls runs with\
    \ the configuration specified with the `–config` parameter and stores the report\
    \ inside the directory specified by the `–results-dir` parameter. You get verbose\
    \ output that looks like the following:\n\n```\n[Jun 26 18:33:45]  INFO [localhost]\
    \ vuls-v0.19.7-build-20220626_181254_91ed318\n[Jun 26 18:33:45]  INFO [localhost]\
    \ Start scanning\n[Jun 26 18:33:45]  INFO [localhost] config: /home/nanik/Downloads/config.toml\n\
    [Jun 26 18:33:45] DEBUG [localhost] map[string]config.ServerInfo{\n\"localhost\"\
    : config.ServerInfo{\nServerName:         \"localhost\",\nUser:              \
    \ \"\",\n...\nSSHConfigPath:      \"\",\nKeyPath:            \"\",\n...\n}\n[Jun\
    \ 26 18:33:45]  INFO [localhost] Validating config...\n...\n[Jun 26 18:33:45]\
    \ DEBUG [localhost] execResult: servername:\ncmd: ls /etc/debian_version\nexitstatus:\
    \ 0\nstdout: /etc/debian_version\n...\n[Jun 26 18:33:45] DEBUG [localhost] Executing...\
    \ cat /etc/issue\n[Jun 26 18:33:45] DEBUG [localhost] execResult: servername:\n\
