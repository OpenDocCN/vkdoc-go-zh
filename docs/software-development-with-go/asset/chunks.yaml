- fmt: '# A model diagram of container data along the handler, and the container is
    displayed and the notification panel at a certain link is marked in the upper
    part of the image.


    Figure 18-12


    The `createContainer` function process


    Basically, what it is doing the following:


    *   Creating a `containerData` struct that is populated with container-related
    information. In this case, it’s populated with information regarding the `/sys/fs/cgroup`
    directory.

    *   Creating a `ContainerHandler` and `CollectManager` that will handle everything
    related to this particular container (in this case `/sys/fs/cgroup`) and collecting
    all the necessary metric information.

    *   Once all structs have been initialized successfully, it will call `Start()`
    of the `containerData` struct to start monitoring.


    From the steps above, it is clear that cAdvisor is monitoring activities that
    are happening inside the `/sys/fs/cgroup` directory. As you learned in Chapter
    [4](#527551_1_En_4_Chapter.xhtml), this directory refers to cgroups, which is
    the cornerstone of Docker containers.


    cAdvisor also monitors the subdirectories of `/sys/fs/cgroup`, which are all treated
    as containers and will be monitored the same as the main `/sys/fs/cgroup` directory.
    This is performed by the `detectSubcontainers(..)` function, as shown here:


    ```

    func (m *manager) detectSubcontainers(containerName string) error {

    added, removed, err := m.getContainersDiff(containerName)

    ...

    for _, cont := range added {

    err = m.createContainer(cont.Name, watcher.Raw)

    ...

    }

    ...

    return nil

    }

    ```


    Once all the subdirectories of `/sys/fs/cgroup` have been processed, it adds those
    containers to be watched by Container Watcher. This is done by the `watchForNewContainers()`
    function shown in the following code:


    ```

    func (m *manager) watchForNewContainers(quit chan error) error {

    ...

    for _, watcher := range m.containerWatchers {

    err := watcher.Start(m.eventsChannel)

    if err != nil {

    for _, w := range watched {

    stopErr := w.Stop()

    ...

    }

    return err

    }

    watched = append(watched, watcher)

    }

    err := m.detectSubcontainers("/")

    ...

    return nil

    }

    ```


    After all containers have been set up to be watched, cAdvisor will be informed
    about any changes to them. This job is done by the goroutine shown in the above
    code snippets. In the next section, you will look at how cAdvisor uses `inotify`,
    which is provided by the Linux operating system to let applications to be notified
    if any activities are detected for the directories that are watched.


    ## Monitoring Filesystem


    cAdvisor uses the `inotify` API that is provided by the Linux kernel ([`https://linux.die.net/man/7/inotify`](https://linux.die.net/man/7/inotify)).
    This API allows applications to monitor file systems events, such as if any files
    are deleted or created. Figure [18-13](#527551_1_En_18_Chapter.xhtml#Fig13) shows
    how cAdvisor uses the `inotify` events.


    ![](images/527551_1_En_18_Chapter/527551_1_En_18_Fig13_HTML.jpg)


    A flow chart has 4 marked events as inotify kernel, library, Goroutine, and monitarization
    of new directories and subdirectories at the final level.


    Figure 18-13


    `inotify` flow in cAdvisor


    In the previous section, you learned that cAdvisor monitors and listens for events
    for `/sys/fs/cgroup` and its subdirectories. This is how cAdvisor knows what Docker
    containers are created or deleted from memory. Let’s take a look at how it uses
    `inotify` for this purpose.


    The code uses the `inotify` library that listens to events coming in from the
    kernel. The cAdvisor code uses a goroutine to process the `inotify` events. This
    goroutine is created as part of the initialization process when `watchForNewContainers`
    is called. `watchForNewContainers` calls the `Start` function inside `container/raw/watcher.go`,
    as shown:


    ```

    func (w *rawContainerWatcher) Start(events chan watcher.ContainerEvent) error
    {

    watched := make([]string, 0)

    for _, cgroupPath := range w.cgroupPaths {

    _, err := w.watchDirectory(events, cgroupPath, "/")

    ...

    watched = append(watched, cgroupPath)

    }

    go func() {

    for {

    select {

    case event := <-w.watcher.Event():

    err := w.processEvent(event, events)

    if err != nil {

    ...

    }

    case err := <-w.watcher.Error():

    ...

    case <-w.stopWatcher:

    err := w.watcher.Close()

    ...

    }

    }

    }()

    return nil

    }

    ```


    The `w.processEvent(..)` function takes care of the received `inotify` event and
    converts it into its own internal event, as shown:


    ```

    func (w *rawContainerWatcher) processEvent(event *inotify.Event, events chan watcher.ContainerEvent)
    error {

    // Convert the inotify event type to a container create or delete.

    var eventType watcher.ContainerEventType

    switch {

    case (event.Mask & inotify.InCreate) > 0:

    eventType = watcher.ContainerAdd

    case (event.Mask & inotify.InDelete) > 0:

    eventType = watcher.ContainerDelete

    ...

    }

    ...

    switch eventType {

    case watcher.ContainerAdd:

    alreadyWatched, err := w.watchDirectory(events, event.Name, containerName)

    ...

    case watcher.ContainerDelete:

    // Container was deleted, stop watching for it.

    lastWatched, err := w.watcher.RemoveWatch(containerName, event.Name)

    ...

    default:

    return fmt.Errorf("unknown event type %v", eventType)

    }

    // Deliver the event.

    events <- watcher.ContainerEvent{

    EventType:   eventType,

    Name:        containerName,

    WatchSource: watcher.Raw,

    }

    return nil

    }

    ```


    The function converts the events received into internal events that the code understands:
    `watcher.ContainerAdd` and `watcher.ContainerDelete`. These events are broadcast
    internally for other parts of the code to process.'
