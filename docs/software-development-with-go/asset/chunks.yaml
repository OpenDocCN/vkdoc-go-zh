    bold text, text of a different color, a UI that uses a spinner, and more. This
    kind of user interface is possible by using ANSI escape codes, which contain code
    to do certain things in the terminal.


    You will also look at an open source library that makes it easy to write a user
    interface that takes care of all the heavy lifting of writing the different ANSI
    escape codes to do fancy UI tricks. In this chapter, you will learn about the
    following:


    *   ANSI escape codes for UI


    *   An open source library to write different kinds of UIs


    *   Styling text, such as italic and bold


    ## Source Code


    The source code for this chapter is available from the [`https://github.com/Apress/Software-Development-Go`](https://github.com/Apress/Software-Development-Go)
    repository.'
