    ```

    Total Disk Space : 460.1 GB

    Total Disk Used  : 322.4 GB

    Total Disk Free  : 137.7 GB

    ```


    输出以吉字节为单位，显示了驱动器的总大小、已使用的磁盘总量以及空闲的磁盘总量。以下代码片段展示了如何使用 `syscall` 包获取磁盘信息：


    ```

    func main() {

    var statfs = syscall.Statfs_t{}

    var total uint64

    var used uint64

    var free uint64

    err := syscall.Statfs("/", &statfs)

    if err != nil {

    fmt.Printf("[ERROR]: %s\n", err)

    } else {

    total = statfs.Blocks * uint64(statfs.Bsize)

    free = statfs.Bfree * uint64(statfs.Bsize)

    used = total - free

    }

    ...

    }

    ```


    如上述代码片段所示，该应用程序调用 `syscall.Statfs` 函数来获取指定路径的信息。在本例中，路径是根目录。结果被填充到 `statfs` 变量中，该变量的类型是
    `Statfs_t`。`Statfs_t` 结构体的声明如下所示：


    ```

    type Statfs_t struct {

    Type    int64

    Bsize   int64

    Blocks  uint64

    Bfree   uint64

    Bavail  uint64

    Files   uint64

    Ffree   uint64

    Fsid    Fsid

