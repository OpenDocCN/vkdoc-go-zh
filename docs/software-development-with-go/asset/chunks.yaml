    ...

    }

    ```


    `Run(..)`函数接收一个字符串参数，该参数在调用`Command(..)`函数时被添加到参数中。该示例将传递给`Run(..)`函数的参数作为`/bin/sh`命令工具的一部分来运行。例如，当调用`Run("ip
    link")`时，它会按如下方式运行：


