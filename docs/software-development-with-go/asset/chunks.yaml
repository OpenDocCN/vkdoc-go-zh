    **图 7-4** Gosec 高层级流程图


    该工具会加载内部已定义的规则（步骤 1）。这些规则定义了一些函数，用于检查正在处理的代码。下一节将对此进行详细讨论。


    规则加载完成后，它会继续处理作为参数给定的目录，并递归获取所有找到的 `.go` 文件（步骤 4）。这是通过以下代码（`helpers.go`）执行的：


    ```

    func PackagePaths(root string, excludes []*regexp.Regexp) ([]string, error) {

    ...

    err := filepath.Walk(root, func(path string, f os.FileInfo, err error) error {

    if filepath.Ext(path) == ".go" {

    path = filepath.Dir(path)

    if isExcluded(filepath.ToSlash(path), excludes) {

    return nil

    }

    paths[path] = true

    }

    return nil

    })

    ...

    result := []string{}

    for path := range paths {

    result = append(result, path)

    }

    return result, nil

    }

    ```


    `PackagePaths(..)` 函数使用 Go 内部模块 `path/filepath` 遍历目录，以收集所有包含 `.go` 源代码的不同目录。在成功收集所有目录名称后，它会调用
    `Process(..)` 函数（`analyzer.go`），如下所示：


    ```

    func (gosec *Analyzer) Process(buildTags []string, packagePaths ...string) error
    {

    ...

    for _, pkgPath := range packagePaths {

    pkgs, err := gosec.load(pkgPath, config)

    if err != nil {

    gosec.AppendError(pkgPath, err)

    }

    for _, pkg := range pkgs {

    if pkg.Name != "" {

    err := gosec.ParseErrors(pkg)

    if err != nil {

    return fmt.Errorf("parsing errors in pkg %q: %w", pkg.Name, err)

    }

    gosec.Check(pkg)

    }

    }

    }

    sortErrors(gosec.errors)

    return nil

    }

    ```


    此函数调用 `gosec.load(..)` 函数，使用另一个名为 `golang.org/x/tools` 的 Go 模块，来收集目录中找到的所有不同 `.go`
    源代码。


    ```

    func (gosec *Analyzer) load(pkgPath string, conf *packages.Config) ([]*packages.Package,
    error) {

    abspath, err := GetPkgAbsPath(pkgPath)

    ...  conf.BuildFlags = nil

    pkgs, err := packages.Load(conf, packageFiles...)

    if err != nil {

    return []*packages.Package{}, fmt.Errorf("loading files from package %q: %w",
    pkgPath, err)

    }

    return pkgs, nil

    }

    ```


    收集完所有文件名后的最后一步是，遍历这些文件并调用 `ast.Walk`。


    ```

    func (gosec *Analyzer) Check(pkg *packages.Package) {

    ...

    for _, file := range pkg.Syntax {

    fp := pkg.Fset.File(file.Pos())

    ...

    checkedFile := fp.Name()

    ...

    gosec.context.PassedValues = make(map[string]interface{})

    ast.Walk(gosec, file)

    ...

    }

    }

