  trans: "\n### 使用 CrowdSec\n\n我不会介绍 CrowdSec 的完整安装过程，而是介绍一个最小化安装步骤，帮助你理解学习“从 CrowdSec\
    \ 中学习”这一节所需要的内容。本次安装的目标是让你能够看到中央服务器复制到本地数据库的社区数据。\n\n创建一个空目录来执行以下步骤。在我的本地安装中，我在\
