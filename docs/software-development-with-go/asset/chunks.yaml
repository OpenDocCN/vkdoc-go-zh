- fmt: '# Understanding epoll


    In this section, you will start by looking at what `epoll` is all about from a
    system perspective. When you open a socket in Linux, you are given a file descriptor
    (or FD for short), which is a non-negative value. When the user application wants
    to perform an I/O operation to the socket, it passes the FD to the kernel. The
    `epoll` mechanism is event-driven, so the user application is notified when an
    I/O operation happens.


    As shown in Figure [12-1](#527551_1_En_12_Chapter.xhtml#Fig1), `epoll` is actually
    a data structure inside Linux that is provided to multiplex I/O operations on
    multiple file descriptors. Linux provides system calls for user applications to
    register, modify, or delete FDs from the data structure. Another thing to note
    is that `epoll` has Linux-specific features, which means applications can only
    be run on Linux kernel-based operating systems.


    ![](images/527551_1_En_12_Chapter/527551_1_En_12_Fig1_HTML.jpg)


    A block diagram has 2 blocks of user space and kernel space. A user-space includes
    a user app to register, modify, and delete linked to 2 rectangular blocks of interest
    and a ready list.


    **Figure 12-1** epoll data structure


    The data structure contains two sets of lists:


    *   **Interest List**: This list/set contains FDs that applications are interested
    in. The kernel will only send events related to a particular FD that applications
    are interested in.

    *   **Ready List**: This list/set contains a subset of reference FDs from the
    Interest List FDs. The FDs in this list are in the **ready** state that the user
    application will be notified of.


    The following are the system calls used by applications to work with the data
    structure. In the later sections, you will look closely at how you are going to
    use them in application and also inside an `epoll` library.


    *   `epoll_create`: A system call to create a new `epoll` instance and return
    a file descriptor.

    *   `epoll_ctl`: A system call to register, modify, and delete a FD from the Interest
    List.

    *   `epoll_wait`: A system call to wait for I/O events or another way the system
    call is called to fetch items that are ready from the Ready List.


    To use `epoll` effectively in application, you need to understand how event distribution
    is performed. Simply put, there are two different ways events are distributed
    to applications:


    *   **Edge triggered**: A monitored FD configured with edge will be guaranteed
    to get one notification if the readiness state changed since the last time it
    called `epoll_wait`. The application will receive one event and, if it requires
    more events, it must perform an operation via a system call to inform `epoll`
    that it is waiting for more events.

    *   **Level triggered**: A monitored FD configured with level will be batch together
    as a single notification and an application can process them all at once.


    From the above, it is obvious that *edge triggered* requires an application to
    do more work compared to *level triggered*. By default, `epoll` operates using
    a level triggered mechanism.


    ## epoll in Golang


    In this section, you will write a simple application that uses `epoll`. The app
    is an echo server that receives connections and sends responses to the value that
    is sent to it.


    Run the code inside the `chapter12/epolling/epollecho` folder. Open your terminal
    to run the following command:


    ```

    go run main.go

    ```


    Once the app runs, open another terminal and use the `nc` (network connect) tool
    to connect to the application. Type in something in the console and press Enter.
    This will be sent to the server.


    ```

    nc 127.0.0.1 9999

    ```


    The sample app will respond by sending the string that was sent by the client.
    Before diving into the code, let’s take a look at how `epoll` is used in an application.


    ### Epoll Registration


    As you can see in Figure [12-2](#527551_1_En_12_Chapter.xhtml#Fig2), the application
    creates a listener on port 9999 to listen for incoming connections. When a client
    connects to this port, the application spins off a goroutine to handle the client
    connection.


    ![](images/527551_1_En_12_Chapter/527551_1_En_12_Fig2_HTML.jpg)


    A block diagram has 2 blocks. A client app is reversibly linked to the user app
    in the user space block with an FD value of 2000. The user app is linked to interest
    list blocks in kernel space.


    **Figure 12-2** Listener epoll registration


    Now, let’s take a more detailed look at how the whole thing works inside the app.
    The following snippet shows the application creating a socket listener using the
    `syscall.Socket` system call and binding it to port 9999 using `syscall.Bind`:


    ```

    ...

    fd, err := syscall.Socket(syscall.AF_INET, syscall.O_NONBLOCK|syscall.SOCK_STREAM,
    0)

    if err != nil {

    fmt.Println("Socket err : ", err)

    os.Exit(1)

    }

    defer syscall.Close(fd)

    if err = syscall.SetNonblock(fd, true); err != nil {

    ...

    }

    // prepare listener

    addr := syscall.SockaddrInet4{Port: 9999}

    copy(addr.Addr[:], net.ParseIP("127.0.0.1").To4())

    err = syscall.Bind(fd, &addr)

    ...

    // listener

    err = syscall.Listen(fd, 10)

    ...

    ...

    ```


    On successfully listening on the port, the app creates a new `epoll` by calling
    `syscall.EpollCreate1`. This instructs the kernel to prepare a data structure
    that the application will use to listen for I/O events for file descriptors that
    it is interested in.


    ```

    ...

    epfd, e := syscall.EpollCreate1(0)

    if e != nil {

    ...

    }

    ...

    ```


    Once the data structure successfully creates the application, it proceeds by registering
    the socket listener file descriptor, as seen in the following code snippet. The
    code uses `syscall.EPOLL_CTL_ADD` to specify to the system call that it is interested
    in doing a new registration.


    The registration is done based on the information provided in the `event` struct,
    which contains the file descriptor and the event that it is interested in monitoring.


    The application uses the `EPOLLIN` flag to indicate that it is only interested
    in reading the event. The `epoll` documentation at `https://man7.org/linux/man-pages/man2/epoll_ctl.2.xhtml`
    provides details on the different flags that can be set for the `event.Events`
    field.


    ```

    // register listener fd to Interest List

    event.Events = syscall.EPOLLIN

    event.Fd = int32(fd)

    if e = syscall.EpollCtl(epfd, syscall.EPOLL_CTL_ADD, fd, &event); e != nil {

    ...

    }

    ```'
