    : [\n\"192.168.1.3\"\n],\n\"ipv6Addrs\": [\n...\n],\n\"scannedAt\": \"2022-06-26T18:40:16.045650086+10:00\"\
    ,\n\"scanMode\": \"fast mode\",\n\"...\n\"scannedVia\": \"remote\",\n\"scannedIpv4Addrs\"\
