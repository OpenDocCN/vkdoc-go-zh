    \ you can see that the DNS lookup for the domain returns more than one IP address,\
    \ but only the first IP address is populated in the returned `UDPAddr` struct.\n\
    \n![](images/527551_1_En_9_Chapter/527551_1_En_9_Fig1_HTML.jpg)\n\nTwo screenshots.\
    \ Above is the snippet explaining the connection to the server via I P address.\
    \ Below are the multiple I Ps from the resolve U D P Addr.\n\nFigure 9-1\n\nMultiple\
    \ IPs from ResolveUDPAddr\n\nOnce `udpAddr` is successfully populated, it is used\
    \ when calling `net.DialUDP`. The function call opens a socket connection to the\
    \ server using the IP address that is provided inside `udpAddr`\n\n```\nconn,\
    \ err := net.DialUDP(\"udp\", nil, udpAddr)\n```\n\nIn this section, you learned\
    \ how to connect a UDP server using the standard library. In the next section,\
    \ you will learn more on how to write a UDP server.\n\n### UDP Server\n\nIn this\
    \ section, you will explore further and write a UDP server using the standard\
    \ library. The server listens on port 3000 and prints out what is sent by the\
    \ client. The code can be found inside the `chapter9/udp/server` directory, and\
    \ it can be run as follows:\n\n```\ngo run main.go\n```\n\nThe sample prints out\
    \ the following on the console:\n\n```\n2022/03/05 23:51:32 Listening [::]:3000\n\
    ```\n\nOn a terminal window, use the `nc` command to connect to port 3000.\n\n\
    ```\nnc -u localhost 3000\n```\n\nOnce the `nc` tool runs, enter any text and\
    \ you will see it printed in the server’s terminal. Here is an example of how\
    \ it looked on my machine:\n\n```\n2022/03/05 23:51:32 Listening [::]:3000\n2022/03/05\
    \ 23:51:36 Received: nanik from [::1]:41518\n2022/03/05 23:51:44 Received: this\
    \ is a long letter from [::1]:41518\n```\n\nLet’s explore how the code works.\
    \ The following snippet sets up the UDP server using the `net.ListenUDP` function:\n\
    \n```\n...\nfunc main() {\nconn, err := net.ListenUDP(\"udp\", &net.UDPAddr{\n\
    Port: 3000,\nIP:   net.ParseIP(\"0.0.0.0\"),\n})\n...\n}\n```\n\nThe function\
    \ call returns a `UDPConn` struct that is used to read and write to the client.\
    \ After the code successfully creates a UDP server connection, it starts listening\
    \ to read data from it, as shown here:\n\n```\n...\nfunc main() {\n...\nfor {\n\
    message := make([]byte, 512)\nl, u, err := conn.ReadFromUDP(message[:])\n...\n\
    log.Printf(\"Received: %s from %s\\n\", data, u)\n}\n}\n```\n\nThe code uses the\
    \ `ReadFromUDP(..)` function of the UDP connection to read the data that is sent\
    \ by the client to print it out to the console.\n\n### Concurrent Servers\n\n\
    In the previous section, you wrote a UDP server but one of the things that is\
    \ lacking is its ability to process multiple UDP client requests. Writing a UDP\
    \ server that can process multiple requests is different from normal TCP. The\
    \ way to structure the application is to spin off multiple goroutines to listen\
    \ on the same connection and let each goroutine take care of processing the request.\
    \ The code can be found inside the `udp/concurrent` directory. Let’s take a look\
    \ at what it is doing differently compared to the previous UDP server implementation.\n\
    \nThe following snippet shows the code spinning off multiple goroutines to listen\
    \ to the UDP connection:\n\n```\n...\nfunc main() {\naddr := net.UDPAddr{\nPort:\
    \ 3333,\n}\nconnection, err := net.ListenUDP(\"udp\", &addr)\n...\nfor i := 0;\
    \ i < runtime.NumCPU(); i++ {\n...\ngo listen(id, connection, quit)\n}\n...\n\
    }\n```\n\nThe number of goroutine runs depends on the result returned from `runtime.NumCPU()``.`\
    \ The goroutine use the `listen` function, which is shown in the following snippet:\n\
    \n```\nfunc listen(i int, connection *net.UDPConn, quit chan struct{}) {\nbuffer\
    \ := make([]byte, 1024)\nfor {\n_, remote, err := connection.ReadFromUDP(buffer)\n\
    if err != nil {\nbreak\n}\n...\n}\n...\n}\n```\n\nNow that the `listen` function\
    \ is run as several goroutines, it waits on an incoming UDP request by calling\
    \ the `ReadFromUDP` function. When an incoming UDP request is detected, one of\
    \ the running goroutines processes it."
