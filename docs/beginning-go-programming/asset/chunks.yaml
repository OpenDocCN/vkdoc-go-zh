  trans: '

    # 安装 Go


    要安装 Go 编译器，请访问 [`go.dev/dl/`](https://go.dev/dl/) 并下载适合您系统的二进制发行版。只需运行安装程序即可在系统上安装编译器。


    为了验证安装，在 Windows 操作系统上，打开命令提示符并输入 `go version`，如图 2-1 所示。输出显示系统上安装的 Go 编译器的版本。


    ![](img/536365_1_En_2_Fig1_HTML.jpg)


    文本截图显示系统上安装的 Go 编译器的输出版本；它显示了 `go 1.17.6 windows/amd64`。


    图 2-1 — 显示已安装 Go 版本的输出


    如果在命令提示符下输入 `path` 命令，可以看到所有 Go 可执行命令的保存位置。如果能找到 Go 安装目录的路径，例如 `C:\Users\UserName\go\bin`，就可以开始用
    Go 构建程序了。


    要在 macOS 上找到 Go 的安装目录，请打开终端窗口并输入 `export $PATH`。成功执行后，将显示目录列表，指示 Go 安装到的 `bin`
    文件夹的路径，例如 `/user/local/go/bin`。此外，除了将执行 Go 程序的命令添加到目录短语中之外，还会在根目录下的某个路径中添加一个文件。为确保可以从任何位置运行
    Go 程序，请转到 `home` 目录并输入 `go version`。如果一切正常，应该会看到显示所使用的 Go 语言版本的输出，如图 2-2 所示。


    ![](img/536365_1_En_2_Fig2_HTML.jpg)


    屏幕截图显示用于检查 `PATH` 变量的程序以及指示所使用的 Go 语言版本的输出。显示了登录信息、路径和版本。


    图 2-2 — 检查 `PATH` 变量和版本以确保正确安装 Go 编译器


    如果能看到版本信息，就可以开始使用 Go 语言进行编程了。您首先想要探索的是 Go Playground。


    # Go Playground


    开始编码和开发基于 Go 的程序的最快方法之一是使用 [Go Playground](https://go.dev/play/)，这是一个基于 Web 的
    IDE。如图 2-3 所示，无需安装任何东西，Go Playground 允许用户编辑、运行和试验 Go 编程语言。单击“运行”按钮时，Go Playground
    会在谷歌服务器上编译并执行 Go 代码，并输出执行结果。


    ![](img/536365_1_En_2_Fig3_HTML.jpg)


    屏幕截图显示了一个程序，展示了使用基于 Web 的 IDE Go Playground 开始编码和开发基于 Go 的程序的最快方法之一。


    图 2-3 — Go Playground IDE


    Go Playground 是一个完全免费使用的服务，没有任何限制。无需用户注册或支付许可费。此外，它对您可以处理的源代码文件数量或运行代码的次数没有限制。这是一个无需创建或编译任何本地源文件即可测试
    Go 代码的好方法。尽管如此，还有其他几个 IDE 可用于开发 Go 应用程序。


    # 使用 IDE 开发 Go 应用程序


    没有一个单一的集成开发环境（IDE）是由 Go 开发团队认可甚至开发的。但是，有许多适用于商业和开源 IDE 的插件是由 Go 社区或 IDE 供应商创建的，您选择哪种主要取决于您已经熟悉的开发环境。在本书中，我们将使用
    Go Playground 和 Visual Studio Code 来编写和运行 Go 程序。让我们开始学习如何编写 Go 应用程序。


    # 开始编写 Go 应用程序入门


    一旦安装了 Go 开发工具，就可以根据需要创建任意数量的 Go 应用程序。通常，一个 Go 程序由以下部分组成：


    - 声明包名

    - 导入包

    - 声明和定义函数

    - 变量

    - 表达式和语句

    - 注释


    ## 让我们打印 Hello World！


    在学习 Go 编程语言的基本构建块之前，了解 Go 程序的最小结构非常重要。清单 2-3 演示了如何将 `"Hello World!"` 消息作为输出打印到屏幕上。尽管该程序简洁且功能最少，但它足以理解
    Go 的程序结构。


    ```

    package main

    import (

    "fmt"

    )

    // 单行注释

    /*

    多

    行

    注释

    */

    func main() {

    fmt.Println("Hello, World !")

    }

    ```


    清单 2-3 — 说明 Go 程序不同部分的基本程序


    **Go 程序的不同部分**


    清单 2-3 解释了以下 Go 程序的不同部分：


    - **包：** 在 Go 程序的第一行，总是提及包。在清单 2-3 中，语句 `package main` 指明了该程序所属的包名。此语句是强制性的，因为在
    Go 中，所有程序都在包中组织和运行。对于任何程序，执行的起点都是 `main` 包。此外，每个包都关联了路径和名称。


    - **导入：** `import` 关键字用于导入应用程序将使用的不同包。它是一个预处理器指令，指示 Go 编译器包含所提及包中的所有文件。在前面的例子中，我们导入了
    `fmt`（格式）包，它提供了用于格式化输入和输出的不同函数。


    - **注释：** 在 Go 中，双斜杠 `//` 用于表示代码中的单行注释。多行注释包含在 `/* */` 块中。


    - **函数（Func）：** `func` 关键字用于声明函数；在这种情况下，是一个名为 `main` 的函数。将每个函数的主体包含在花括号 `{}` 内非常重要。这对于
    Go 编译器知道每个函数的开始和结束位置是必要的。


    - **主函数：** 执行从 `main` 包中的 `main` 函数开始，这使得 `main` 标识符非常重要。如果排除了 `main` 函数，编译器将抛出错误。


    - `fmt` 包中可用的内建函数之一是 `Println(...)` 函数。通过导入 `fmt` 包，您也导出了 `Println` 方法。`Println`
    函数用于在屏幕上显示输出。


    - 在 Go 中，大写的标识符表示该特定标识符是导出的，例如，`Println` 方法的首字母是大写字母。在 Go 中，“导出”一词意味着该函数、常量或变量可以被该特定包的导入者访问。

