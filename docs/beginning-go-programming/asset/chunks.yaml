    var i, j int

    //初始化数组元素

    for i =0; i < 10; i++{

    array2[i] = i + 50 //将位置 i 处的元素设置为 i+50

    }

    //打印 array1 每个元素的值

    fmt.Println("Elements stored in Array1")

    for j =0; j <3; j++{

    fmt.Printf("Element[%d] = %f \n", j, array1[j])

    }

