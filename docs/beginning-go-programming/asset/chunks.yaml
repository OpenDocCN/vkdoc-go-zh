    对网络服务发起请求时，响应返回的数据通常以 JSON 格式编码。为方便处理网络服务与 API，Go 通过 `json` 包提供了对 JSON 格式数据的支持。`json`
    包让你能轻松创建和读取 JSON 格式的文本。上一节中，你已学习如何从网络服务获取 JSON 数据。本节将学习如何解析 JSON 数据，并将其格式化为 Go
    应用程序可用的结构化数据。清单 2-58 演示了如何解析 JSON 数据并格式化为结构化数据，它从接收的 JSON 数据中解析了旅游线路名称和价格。


    在清单 2-58 中，首先创建了一个名为 `Tour` 的新自定义类型，它是一个包含两个 `string` 类型成员字段 `Name` 和 `Price`
    的结构体。注意，为了使这些字段名称公开，它们以大写字母开头。另外请注意，JSON 内容中的标签均使用小写。但 JSON 解码器不受此影响，因为它能轻松将这些标签与结构体成员匹配。本示例中，我们导入了
    [`encoding/json`](https://pkg.go.dev/encoding/json) (https://pkg.go.dev/encoding/json)、[`io/ioutil`](https://pkg.go.dev/io/ioutil)
