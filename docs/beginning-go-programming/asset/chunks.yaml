    \ 函数返回的写入文件的字节数。`WriteString()` 函数需要一个写入器对象和一个字符串，这里我们将 `file` 作为写入器，并将 `content`\
    \ 变量作为要写入文件的字符串传入。在处理文件时，操作完成后关闭打开的文件至关重要。`defer` 关键字会等待其他所有操作完成后再执行此命令。我们使用 `defer`\
    \ 关键字编写了 `file.Close()` 命令，以确保所有操作完成后，`file` 引用对象所引用的文件被关闭。\n\n```go\npackage\
    \ main\n\nimport (\n    \"fmt\"\n    \"io\"\n    \"io/ioutil\"\n)\n\nfunc main()\
