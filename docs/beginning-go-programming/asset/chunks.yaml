    as its value. On Line#2, the ampersand (`&`) operator is used to assign the direct
    memory address of the variable `value1` to the variable `pointer1`. Since you
    are using an ampersand `(&)` operator, the Go compiler will automatically recognize
    that `pointer1` is a pointer variable used for storing memory addresses. Now,
    if you print the value stored at the memory pointed by the pointer `pointer1`,
    it will be the same as that stored in `value1`, i.e., 42\. In order to print the
    value stored where the memory address points, the asterisk (`*`) operator is used,
    as shown in Lines #3 and #8 of the `main` function. Similarly, you can use pointers
    to point to floating-point variables as well. Note that `pointer1` is declared
    and assigned value implicitly, whereas the `pointer2` is declared explicitly with
    a data type.


    You can also change the values of pointed variables through the pointers, as shown
    in Listing [2-17](#536365_1_En_2_Chapter.xhtml#PC23):


    ```

    *pointer1 = *pointer1 / 31

    fmt.Println("Pointer1: ",*pointer1)

    fmt.Println("Value1: ", value1)

    ```


    **Output:**


    ```

    Pointer3:  1.0483870967741935

    Value3:  1.0483870967741935

    ```


    On Line#1, you access the value stored at the memory location pointed by `pointer1`
    using the asterisk (`*`) operator, dividing that value by 31 and storing the answer
    in the same location. As seen in the output, the `pointer1` and `value1` variables
    have the same value.


    ### Comparison with Java and C-Style Languages


    As in Java or C#, if you have an original variable and a reference variable (pointer)
    that points to that variable, you can change that value of the original variable
    either by changing the original variable or by changing the variable that’s pointing
    to it. However, unlike in Java, the pointer doesn’t have to point at any particular
    value initially, and you can change it at runtime to point to another value. On
    the other hand, you’ll find pointers in Go to be very similar and just as valuable
    in C, C#, and other similar languages.


    ## Ordered Values in Arrays and Slices


    This section discusses the arrays data structure and the slice, which is an abstraction
    of arrays.


    ### Arrays in Go


    As with other C-style languages, Go supports the array data structure. Arrays
    in Go are used to store sequential fixed-size collections of elements, noticeably
    of the same type. Even though an array is usually referred to as a storage of
    a collection of items, it can also be considered a collection of variables having
    identical types. Furthermore, arrays are consecutive memory locations, whereby
    the first element of the array corresponds to the lowest address and the last
    element to the highest address. It is also possible to access any particular element
    of an array through the index number. The index numbers of an array range from
    0 to size-1, as illustrated in Figure [2-10](#536365_1_En_2_Chapter.xhtml#Fig10).
    As per the figure, to access the element in the second index (i.e., the third
    element), you use `array_name[2]`, which would yield the value 11.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig10_HTML.jpg)


    A tabular representation shows the arrays in Go. It has access to elements 1,
    2, 3, 4 to n and index 0, 1, 2, 3 to n.


    Figure 2-10


    Arrays in Go


    #### Declaring Arrays


    The general format for declaration of an array in Go is `var array_name [SIZE]
    data_type`. Note that you must mention the `data_type`, as it indicates the type
    of elements the array will be holding. Also, the total count of elements (`SIZE`)
    is also required, as it indicates the size of the array. Arrays declared in this
    format are known as *single-dimensional* arrays. Note that `Size` should be an
    integer constant value that is greater than zero. Additionally, any valid Go type
    can be used to specify the `data_type`, i.e., the type of elements that the array
    can hold. For example, the statement `var floatArray [10] float32` declares an
    array of ten elements called `floatArray` of `data_type` as `float32`.


    #### Initializing Arrays


    Arrays in Go can be initialized element at a time or using a single statement,
    as illustrated in Listing [2-18](#536365_1_En_2_Chapter.xhtml#PC27). Remember,
    the number of items specified between the curly braces `{ }` should not exceed
    the size of the array specified between the square brackets `[ ]`, as illustrated
    by Listing [2-18](#536365_1_En_2_Chapter.xhtml#PC27).


    ```

    var floatArray = [5]float32{10.0, 200.0, 35.64, 78.0, 540.60}

    Listing 2-18

    Initializing Arrays with Size Specified in Go

    ```


    If the size of the array is omitted, the Go compiler automatically sets the size
    of the array equal to the number of items specified in the initialization statement.
    For example, Listing [2-19](#536365_1_En_2_Chapter.xhtml#PC28) will create an
    array of size `5` as the array is initialized with five values.


    ```

    var floatArray = []float32{10.0, 200.0, 35.64, 78.0, 540.60}

    Listing 2-19

    Initializing Arrays Without Specifying Size in Go

    ```


    #### Accessing Array Elements


    Individual elements of an array can be accessed through the use of indexes with
    array names. This is achieved by wrapping the index number of the required element
    within square brackets `[]`, placed right after the name of the array. For example,
    to assign value to a single element of an array, the following statement can be
    used


    ```

    balance[4] = 50.0

    ```


    This statement assigns the value on the right side of the assignment operator
    to the element at the forth index of the array named `balance`. As the index number
    in arrays starts with 0, this statement assigns the value 50.0 to the fifth element
    in the array. Note, the first index of an array is also known as the *base index,*
    whereas the last index will always be `arraySize-1`. Also note that the `=` operator
    is used to assign values to individual elements and not the `:=` operator, as
    the data type of the array has already been defined. Figure [2-11](#536365_1_En_2_Chapter.xhtml#Fig11)
    is a pictorial representation of the concepts discussed here.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig11_HTML.jpg)


    A tabular representation of the concept of data stored in arrays. The balance
    of elements from 0 to 4 is 1000.0, 2.0, 3.4, 7.0, and 50.0.


    Figure 2-11


    Data storage in arrays


    **Example**


    Listing [2-20](#536365_1_En_2_Chapter.xhtml#PC30) shows an example that includes
    all of the concepts discussed so far.


    ```

    package main

    import (

    "fmt"

    )

    func main(){

    /*declaring and initializing an array "array1" of size 3 and type as floating-point*/

    var array1 = []float32{10.5, 5.2, 2.88}

    var array2 [10]int

    var i, j int

    //Initializing elements of the array

    for i =0; i < 10; i++{

    array2[i] = i + 50 //setting element at location i to i+50

    }

    //Print the value of each elements of array1

    fmt.Println("Elements stored in Array1")

    for j =0; j <3; j++{

    fmt.Printf("Element[%d] = %f \n", j, array1[j])

    }

    //Print the value of each elements of array2

    fmt.Println("Elements stored in Array2)

    for j =0; j <10; j++{

    fmt.Printf("Element[%d] = %d \n", j, array2[j])

    }

    fmt.Println("Size of array1: ", len(array1))

    fmt.Println("Size of array2: ", len(array2))

    }

    Listing 2-20

    Basic Program Illustrating the Use of Arrays in Go

    ```


    **/*Output:**


    ```

    $ go run array-1.go

    Elements stored in Array1

    Element[0] = 10.500000

    Element[1] = 5.200000

    Element[2] = 2.880000

    Elements stored in Array1

    Element[0] = 50

    Element[1] = 100

    Element[2] = 150

    Element[3] = 200

    Element[4] = 250

    Element[5] = 300

    Element[6] = 350

    Element[7] = 400

    Element[8] = 450

    Element[9] = 500 */

    ```'
