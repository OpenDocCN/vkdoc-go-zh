    The basic synchronization primitives, for example, mutual exclusion (mutex) locks,
    are provided by the `sync` package. Note that other than `Once` and `WaitGroup`,
    most of the synchronization primitive types are intended to be used by low-level
    library routines. Higher-level synchronization is performed using communication
    and channels.


    Defined in the `sync` package, the `Once` type object is intended to perform exactly
    one action. On the other hand, `WaitGroup` waits for a collection of goroutines
    to complete their execution. The built-in `Add()` function sets the number of
    goroutines to wait for. Each of the goroutines that are part of a wait group calls
    the `Done()` function to indicate that they have finished execution. While the
    goroutines in a wait group are running, the `Wait()` function can be used for
    blocking purposes unless all of the goroutines have finished execution. Note that
    `WaitGroup` and `once` should not be copied after first use.


    Let’s look at an example of using both types in Go programs. Suppose you have
    code that can update the servers to a new version of your application. Instead
    of updating each server one by one, you want to update all the servers concurrently
    and wait for all the updates to complete. Listing [8-7](#536365_1_En_8_Chapter.xhtml#PC13)
    depicts the `updateAll()` function that gets a version as a string and the hosts
    in a channel. Assume that you don’t know in advance how many hosts need to be
    updated. Within the function, you start by creating a `WaitGroup`. Then, for every
    host in the channel, you increment the counter in the `WaitGroup` (i.e., `waitgroup1`),
    and then spin a goroutine that will decrement the counter by calling `waitgroup1.Done()`.
    Then you call the `update()` function to run the code to update the server. Remember,
    `defer` is called when a function exits, so the object is called first and then
    `defer` is called. The `waitgroup1.Wait()` function means that you are going to
    wait until all the goroutines defined in the `WaitGroup` are done.


    ```

    func updateAll(version string, hosts <-chan string) {

    var waitgroup1 sync.WaitGroup

    for host:=range hosts{

    waitgroup1.Add(1)

    go func(host, version string){

    defer waitgroup1.Done()

    update(host, version)

    }(host, version)

    }

    waitgroup1.Wait()

    }

    Listing 8-7

    Go Recipe for Using WaitGroup

    ```


    A single `waitGroup` does not return an error; the external `errGroup` package
    can be used to overcome this limitation, if you must know the error value from
    the goroutine. When multiple goroutine groups are executing subtasks of a common
    task, the `errgroup` package can be very handy. It provides facilities like `Context`
    cancellation, error propagation, and synchronization.


    Let’s look at an example of using the `errgroup` package in Go programs. Suppose
    you host a system that lets multiple users send messages to one another. Sometimes
    they need to calculate the digital signature associated with a message, but this
    is a very rare case, as this calculation can be time-consuming, so it’s required
    only once. Listing [8-8](#536365_1_En_8_Chapter.xhtml#PC14) shows a sample Go
    program that achieves this goal.


    In Listing [8-8](#536365_1_En_8_Chapter.xhtml#PC14), you first define a struct
    named `Message` with three member fields—`Content` which is `string`, `once` which
    is a `sync.Once` type variable, and `sig` of `string` type, which will be a cached
    signature and will be empty initially.


