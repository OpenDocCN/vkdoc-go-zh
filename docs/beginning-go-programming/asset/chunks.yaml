    # 处理 JSON 中的缺失值与零值


    `encoding/json` 包只会填充 JSON 对象中存在的结构体字段。默认情况下，Go 会将所有结构体字段初始化为其零值。换句话说，数字被设置为 0，字符串被视作空字符串。切片、映射和通道被设置为
    `nil`，布尔值被设置为 `false`。


    假设你有一条来自收据的 `lineItem`（行项目），如图 6-1 所示，其中包含价格、折扣和数量。你期望实现以下逻辑：


    - 如果 JSON 对象中没有 `quantity`（数量）字段，则 `quantity` 应为 1。

    - 否则，如果存在 `quantity`，则其值必须大于 0。


    一种方案是将 `quantity` 设为指向整数的指针（`Quantity *int`）。在这种情况下，如果数量为 `nil`，你就知道 JSON 对象中没有该值。否则，就存在某些值，但使用指针既繁琐又容易出错。


    更好的方法如代码清单 6-4 所示，你定义了一个 `NewLineItem()` 函数，该函数返回一个已将 `quantity` 初始化为 1 的 `lineItem`。然后，当从字节切片
    `[]byte` 中反序列化 `lineItem` 时，你创建 `NewLineItem` 实例，这意味着 `quantity` 字段的值为 1。接着你可以从
    JSON 中解析它。也就是说，如果 JSON 中存在 quantity 字段，它将覆盖存储在 `li` 中的值；否则，该值将保持为 1。然后你对数量字段执行值验证。为了检查此代码的运行情况，我们在
    `main()` 函数中传递了两个不同的值。


    ```go

    package main

    import (

    "encoding/json"

    "fmt"

    )

    //LineItem 表示收据中的一行

    type LineItem struct {

    SKU      string

    Price    float64

    Discount float64

    Quantity int

    }

    //NewLineItem 返回一个包含默认值的新行项目

    func NewLineItem() LineItem {

    return LineItem{

    Quantity: 1,

    }

    }

    func unmarshalLineItem(data []byte) (LineItem, error) {

    li := NewLineItem()

    if err := json.Unmarshal(data, &li); err != nil {

    return LineItem{}, nil

    }

    if li.Quantity < 1 {

    return LineItem{}, fmt.Errorf("数量不合法")

    }

    return li, nil

    }

    func main() {

    data := []byte(`{"sku": "x3xs", "price": 1.2}`)

    li, err := unmarshalLineItem(data)

    if err != nil {

    fmt.Println("错误：", err)

    } else {

    fmt.Printf("%#v\n", li)

    }

    data = []byte(`{"sku": "x3xs", "price": 1.2, "quantity": 0}`)

    li, err = unmarshalLineItem(data)

    if err != nil {

    fmt.Println("错误：", err)

    } else {

    fmt.Printf("%#v\n", li)

    }

    }

    ```


    **输出：**


    ```

    main.LineItem{SKU:"x3xs", Price:1.2, Discount:0, Quantity:1}

    错误：数量不合法

    ```


    ## 使用 `mapstructure` 处理任意 JSON


    假设你有一个端点，用于接收 JSON 格式的作业相关请求。该请求可以是以下格式的启动请求或状态请求：


    ```json

    {

    "type": "start",

    "user": "joe",

    "count": 3

    }

    {

    "type": "status",

    "Id": "689fae62"

    }

    ```


    内置的 `encoding/json` 包无法处理任意 JSON。为了克服这一缺点，你可以使用 `mapstructure` 外部包。`mapstructure`
    包的用法看起来与 JSON 包相似，但它并非作用于字节切片，而是作用于 `map[string]interface{}`，这在 Go 中代表一个任意的 JSON
    对象。代码清单 6-5 说明了这一概念。首先，导入 `mapstructure` 包。然后定义两个结构体——`StartJob` 和 `JobStatus`。`handleStart()`
    和 `handleStatus()` 函数分别处理 `start` 和 `status` 请求。`handleRequest()` 函数接收一个 `[]byte`
    切片作为输入，并返回任何错误。该函数首先创建一个 `map[string]interface{}`，然后使用 `encoding/json` 包中的内置函数
    `json.Unmarshal()` 将数据反序列化到该映射中。接着，使用逗号 ok 惯用语从映射中获取 type 的值。逗号 ok 惯用语用于判断值是否存在。如果值不存在，则返回一条包含消息“`JSON
    中缺少类型`”的错误。`val` 是一个空接口；因此，需要通过使用逗号 ok 惯用语进行类型断言，将其转换为 `string` 类型。然后你使用 `switch`
    语句来确定请求类型。


    ```go

    package main

    import (

    "encoding/json"

    "fmt"

    "mapstructure"

    )

    //StartJob 是启动作业的请求

    type StartJob struct {

    Type  string

    User  string

    Count int

    }

    //JobStatus 是查询作业状态的请求

    type JobStatus struct {

    Type string

    ID   string

    }

    func handleStart(req StartJob) error {

    fmt.Printf("启动：%#v\n", req)

    return nil

    }

    func handleStatus(req JobStatus) error {

    fmt.Printf("状态：%#v\n", req)

    return nil

    }

    func handleRequest(data []byte) error {

    var m map[string]interface{}

    if err := json.Unmarshal(data, &m); err != nil {

    return err

    }

    val, ok := m["type"]

    if !ok {

    return fmt.Errorf("JSON 中缺少 ''type'' 字段")

    }

    typ, ok := val.(string)

    if !ok {

    return fmt.Errorf("''type'' 不是字符串类型")

    }

    switch typ {

    case "start":

    var sj StartJob

    if err := mapstructure.Decode(m, &sj); err != nil {

    return fmt.Errorf("错误的 ''start'' 请求：%w", err)

    }

    return handleStart(sj)

    case "status":

    var js JobStatus

    if err := mapstructure.Decode(m, &js); err != nil {

    return fmt.Errorf("错误的 ''status'' 请求：%w", err)

    }

    return handleStatus(js)

    }

    return fmt.Errorf("未知的请求类型：%q", typ)

    }

    func main() {

    data := []byte(`{"type": "start", "user": "joe", "count": 7}`)

    if err := handleRequest(data); err != nil {

    fmt.Println("错误：", err)

    }

    data = []byte(`{"type": "status", "id": "seven"}`)

    if err := handleRequest(data); err != nil {

    fmt.Println("错误：", err)

    }

    }

    ```


    **输出：**


    ```

    start: main.StartJob{Type:"start", User:"joe", Count:7}

    status: main.JobStatus{Type:"status", ID:"seven"}

    ```


    请注意，要成功运行代码清单 6-5，你首先需要从 [`www.github.com/mitchellh/mapstructure`](http://www.github.com/mitchellh/mapstructure)
    导入 `mapstructure` 包。为此，请从包含代码清单 6-5 所示程序的文件所在目录下运行代码清单 6-6 中所示的命令。


    ```

    go mod init "github.com/mitchellh/mapstructure"

    ```


    ## 总结


    本章提供了 Go 实践方案，让您获得在 Go 中处理 JSON 结构化数据的实践经验。Go 提供了一个名为 `json` 的内置包，用于处理 JSON 格式的数据。在本章中，您学习了使用
    JSON 包、解析复杂 JSON 数据以及处理 JSON 格式化数据中缺失值或零值的方法。本章还提供了一个使用 `mapstructure` 包处理任意 JSON
    数据的 Go 实践方案。


    现在您已经了解了如何处理 JSON 数据，在下一章中，您将通过构建和验证 HTTP 服务器来学习如何处理 HTTP 调用。


    # 7. HTTP


    现在您已经掌握了 Go 编程语言的基础知识，是时候付诸实践了！最简单的方式是通过 Web 应用程序编程接口（API）来实现。API 是一组用于在两个程序之间进行通信的规范。API
    利用 Web 技术，尤其是超文本传输协议（HTTP），在客户端和服务器之间交换信息。Go 为 HTTP 提供了广泛的支持。本章包含了使用 `net/http`
    包的 Go 实践方案，该包包含了 HTTP 客户端和服务器的实现。

