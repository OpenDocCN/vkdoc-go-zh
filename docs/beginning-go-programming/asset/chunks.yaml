    # 1. 简介


    Go（又称 GoLang）是由谷歌于 2007 年开发的一门编程语言，其设计以简洁和高效为核心。Go 的设计目标是兼具像 Python 这类动态类型高级语言的简洁可读语法，同时拥有像
    C/C++ 这类静态类型低级语言的稳定性和效率。在谷歌的支持下，Go 作为一门开源编程语言，更易于学习和上手。它内置了对并发的支持，拥有强大的标准库、类型安全、多种内置类型、动态类型能力、垃圾回收机制，以及诸如键值映射和可变长数组等其他高级特性。Go
    能让你充分利用多核处理器的强大能力，从而开发出运行更快的程序。


    ## GoLang 是静态类型还是编译型语言？


    任何程序员对一门编程语言的自然关注点在于，该语言是编译型还是解释型。JavaScript 就是解释型语言的一个例子。网页浏览器可以直接读取 JavaScript
    源代码并在运行时执行，无需任何预计算。即使某些解释环境可以生成诸如字节码之类的中间格式，也不涉及预计算步骤。


    ### 编译型编程语言


    与解释型语言相反，编译型语言的源代码会被转换成特定于操作系统的格式。与 C 和 C++ 一样，Go 是一门编译型语言。然而，与将源代码编译成能够在不同操作系统上运行格式的
    Java 不同，Go 的源代码会被编译成特定于操作系统的格式。这意味着代码仅能在其编译时针对的操作系统上执行。


    ### 静态类型语言


    Go 是一门静态类型语言。这意味着它的变量必须具有特定的类型。不过，并不总是必须显式声明变量。编译器可以推断类型；然而，在编译时，类型总是已知的。


    无需重新编译即可运行源代码文件的能力有时会让程序员认为 Go 是一门解释型语言。真正的奥秘在于后台，源代码被编译成一种临时的可执行形式。需要用到“Go”这个编译工具来构建分发给用户的应用程序。这是因为编译后的可执行文件是特定于操作系统的格式。每个
    Go 应用程序都包含一个静态链接的运行时。在应用程序的编译过程中，运行时组件会被打包进可执行格式中。这就是为什么使用 Go 语言构建的应用程序大小相比其源代码要大一些。由于不涉及外部虚拟机，因此有必要包含一个运行时包。


    ## Go 是一门面向对象的编程语言吗？


    Go 并非一门面向对象的编程语言。尽管如此，你会在 Go 语言中发现某些重要的面向对象特性。


    *   可以定义自定义接口。在 Go 中，接口可以被视为一种契约，它规定了一组必须由任何实现该接口的程序实现的功能。

    *   可以定义自定义类型。自定义类型也可以拥有自己的方法（函数）。值得注意的是，在 Go 中，几乎所有东西都是类型，并且每个类型至少实现一个接口。

    *   可以定义自定义结构体（数据结构），包含成员字段和方法。


    ## 使 GoLang 成为编程首选的功能特性


    Go 的其他使其在领先公司中广受欢迎的功能包括：


    *   Go 支持与动态语言提供的相同的环境自适应模式。例如，它支持类型推断。这意味着 `intVariable:= 123` 是声明一个名为 `intVariable`、值为
    `123` 的 `int` 类型变量的有效方式。

    *   Go 的编译速度快得多。

    *   Go 支持并发。例如，它提供了 `select` 语句、*goroutines*（类似于轻量级进程）以及通道。

    *   Go 程序更加简单、简洁，并相对更安全。

    *   Go 支持类型嵌入和接口。

    *   无需外部依赖，Go 支持生成静态链接的原生二进制文件。


    ## GoLang 有意排除的功能特性


    为了保持 Go 的简单和简洁，一些类似编程语言通常支持的功能特性被 Go 语言排除在外。省略的主要原因在于，Go 的创造者认为所有这些因素会使编程语言变得越来越难以理解和容易出错。一些被有意排除的功能如下：


    *   类型继承（没有类）

    *   泛型编程

    *   方法或运算符重载

    *   指针运算

    *   结构化异常处理

    *   隐式数值转换

    *   断言

    *   包之间的循环依赖


    ## Go 程序


    一个 Go 程序可以短至三行，也可长达数百万行。Go 程序被写入扩展名为 `.go` 的文本文件中，例如 `myProgram.go`。你可以使用任何你喜欢的文本编辑器（如
    vim、vi、sublime、vs code 等）来编写 Go 程序。为了高效管理依赖，Go 程序使用包来构建。Go 编程实现采用传统的编译和链接模型来生成可执行的二进制文件。

    '
- fmt: "## Summary\n\nThe Go programming language was developed by Google in 2007.\
    \ It was designed as a compiled language with simplicity and speed as its focus.\
    \ The design goals of Go were to create a simple and readable syntax of a dynamically-typed\
    \ high-level programming language but also have the stability and efficiency of\
    \ a statically-typed low-level language. It is an open-source programming language\
    \ and is relatively easier to learn and get started with. Go comes with built-in\
    \ support for concurrency, a robust standard library, type safety, multiple built-in\
    \ types, dynamic-typing capability, garbage collection, and several other advanced\
    \ features, including key-value maps and variable-length arrays.\n\nFurthermore,\
    \ Go has the power to let you leverage the might that multi-core processors have\
    \ to offer, which results in faster-running programs. One of the important aspects\
    \ to remember about Go is that it is not an object-oriented programming language.\
    \ Nevertheless, you do find certain important object-oriented features in the\
    \ Go language, like custom interfaces, types, and structs (data structures), which\
    \ can be defined.\n\nCertain features have been excluded from Go to meet its design\
    \ goals. The major reason for these omissions is that Go's creators believed that\
    \ all these factors make programming languages increasingly hard to comprehend\
    \ and bug-prone.\n\nThe next chapter takes a dive deep into the programming fundamentals\
    \ of Go, along with practical recipes that provide hands-on examples of the concepts.\n\
    \n# 2. Go Basics\n\nWhat makes Go an easy-to-learn language is that everything\
    \ you need to know about a Go program is right on the surface. There is no need\
    \ to remember any language rules, as they are all in the application code. This\
    \ chapter covers the basics of the Go programming language, like accepting input,\
    \ using math operators and packages, managing memory, using different data structures,\
    \ and understanding the program flow of a Go-based application. It also covers\
    \ using functions and returning multiple values, as well as reading and writing\
    \ data to files and handling JSON data.\n\n## Ancestors of Go\n\nGo is based on\
    \ a number of different languages. It was originally designed to be the next generation\
    \ of the C language. It’s capable of performing everything you can do with C,\
    \ including system programming, application development, and so on.\n\n## Go Syntax\n\
    \nGo borrows a lot of its syntax from C and its related languages—C++, C#, Java,\
    \ and so on. Along with this, it also borrows syntax from Pascal, Modula, Oberon,\
    \ and other similar languages. One of the biggest attractions of Go is that its\
    \ programs are very concise because of the precise and comprehensive set of keywords\
    \ and syntax. In order to be effective with any language, you have to know the\
    \ certain basic syntax rules of that particular language. The following is a list\
    \ of some of the most important syntax rules set by the designers of the Go programming\
    \ language.\n\n1. **Case sensitivity**\n   - You must spell identifiers like functions,\
    \ variables, and type names in the exact manner mentioned in the official documentation\
    \ ([`https://go.dev/doc/`](https://go.dev/doc/)).\n   - Names for packages and\
    \ variables use lowercase and mixed case.\n   - Methods and fields of a type are\
    \ initial capped.\n   - In Go, initial uppercase characters indicate a special\
    \ purpose.\n     - Equivalent to the `public` keyword in other high-level programming\
    \ languages like C++, C#, Java, and so on, in Go, an initial uppercase character\
    \ indicates that the symbol is exported.\n   - Similarly, equivalent to the `private`\
    \ keyword, in Go, a lowercase initial character indicates that the particular\
    \ method or variable is not exported nor accessible by the rest of the application\
    \ other than the code block it is declared in.\n\n2. **Semicolons can be skipped**\n\
    \   - For the sake of reducing the amount of typing a developer has to do, as\
    \ shown in Listing [2-1](#536365_1_En_2_Chapter.xhtml#PC1), Go eliminates semicolons\
    \ from the ends of lines. This means that line feeds end the statement and no\
    \ semicolons are required.\n\n   ```\n   var color [2] string\n   colors[0] =\
    \ \"black\"\n   colors[1] = \"white\"\n   Listing 2-1\n   Semicolons Are Not Required\
    \ as End-of-Line Indicators\n   ```\n\n   Even though the language specification\
    \ requires semicolons, it is not necessary to type them explicitly. Thanks to\
    \ Lexer, the software component that parses the code and analyses it, semicolons\
    \ are added during the compilation process as needed.\n\n   **The Rule Followed\
    \ by Lexer for Adding Semicolons**\n\n   When a statement is determined to be\
    \ complete and Lexer encounters a line feed, meaning it's the end of the statement\
    \ and the developer has not explicitly added a semicolon, Lexer will do so.\n\n\
    \   **Note:** You can't always add line feeds freely or break up statements with\
    \ extra line feeds, as you can in other languages, because in certain cases they\
    \ can be misinterpreted by Lexer.\n\n3. **Code blocks with braces**\n   - Code\
    \ blocks, i.e., multiple lines of code that are intended to be grouped together,\
    \ are wrapped within braces. See Listing [2-2](#536365_1_En_2_Chapter.xhtml#PC2).\n\
    \n   ```\n   sum := 0\n   for i :=0; i<10; i++{\n       sum += i\n   }\n   fmt.Println(sum)\
    \ // prints '45'\n   Listing 2-2\n   Braces Are Used to Indicate Code Blocks\n\
    \   ```\n\n   In Listing [2-2](#536365_1_En_2_Chapter.xhtml#PC2), the variable\
    \ named `sum` is declared and then assigned a value of zero. The `for` loop is\
    \ initialized from 0 to 10 and is used to increment the value of the `sum` by\
    \ `i`. After the loop terminates, the value stored in the `sum` variable is printed\
    \ using a function called `Println` or \"print line\". `Println` is a built-in\
    \ function of the package called `FMT`. The code that you want to iterate over\
    \ is wrapped between two braces. Note that it is important to make sure that the\
    \ opening brace is on the same line as any preceding statement.\n\n4. **Built-in\
    \ functions**\n   - Go supports a set of several built-in functions that are always\
    \ available in your code without having to import anything. These functions are\
    \ members of a special package named `Builtin`. The Go compiler assumes that the\
    \ `Builtin` package is always imported. Example functions include the following:\n\
    \     - `len(string)` returns the length of the string.\n     - `panic(error)`\
    \ stops execution and displays an error message.\n     - `recover()` manages the\
    \ behavior of a panicking goroutine.\n\n   For more information, you can visit\
    \ the official documentation of the [builtin package](https://pkg.go.dev/builtin)\
    \ at [`https://pkg.go.dev/builtin`](https://pkg.go.dev/builtin)."
