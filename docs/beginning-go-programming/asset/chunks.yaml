    ### 查看共享资源对协程的影响


    为了查看共享资源对协程的影响，请参考清单 8-4 中的程序。在此示例程序中，有一个名为 `balanceAmount` 的全局变量，以及两个函数 `creditToBalance`
    和 `debitFromBalance`，它们会同时作为协程被调用。`creditToBalance` 函数向 `balanceAmount` 加 1000，而
    `debitFromBalance` 函数则从中减 1000。


    ```go

    package main

    import (

    "fmt"

    "math/rand"

    "time"

    )

    var balanceAmount int

    func creditToBalance() {

    for i := 0; i < 5; i++ {

    balanceAmount += 1000

    time.Sleep(time.Duration(rand.Intn(100)) *

    time.Millisecond)

    fmt.Println("余额增加后： ", balanceAmount)

    }

    }

    func debitFromBalance() {

    for i := 0; i < 5; i++ {

    balanceAmount -= 1000

    time.Sleep(time.Duration(rand.Intn(100)) *

    time.Millisecond)

    fmt.Println("余额减少后： ", balanceAmount)

    }

    }

    func main() {

    balanceAmount = 3000

    fmt.Println("初始余额： ", balanceAmount)

    go creditToBalance()

    go debitFromBalance()

    fmt.Scanln()

    }

    清单 8-4

    演示共享资源对协程影响的 Go 示例

    ```


    **输出：**


    ```

    初始余额：  3000

    余额增加后：  3000

    余额减少后：  3000

    余额增加后：  3000

    余额减少后：  4000

    余额减少后：  3000

    余额减少后：  2000

    余额增加后：  1000

    余额减少后：  2000

    余额增加后：  2000

    余额增加后：  3000

    ```


    当你执行清单 8-4 时，你会发现输出结果并不符合预期，并且存在错误。第一个明显的错误出现在输出结果的第二行。仔细一看，你会发现第一行显示的初始余额是 3000，这是正确的。但第二行的余额本应是
    4000，却显示了 3000，这是错误的。这是因为在 `creditToBalance()` 函数中，当 1000 被加到 `balanceAmount`（即更新为
    4000）后，在将更新后的 `balanceAmount` 值显示到控制台之前，会有一段随机的时间延迟。这个延迟是由以下语句导致的：


    ```go

    time.Sleep(time.Duration(rand.Intn(100))*time.Millisecond)

    ```


    `debitFromBalance()` 函数利用这个延迟从 `balanceAmount` 中减去了 1000，将其值更新为 3000。当 `creditToBalance()`
    恢复任务去打印 `balanceAmount` 中存储的值时，显示的便是 3000 而非 4000。尽管最后打印的 `balanceAmount` 值是 3000，但这个程序仍然不能被认为是安全的，因为执行过程中打印的值是错误的。此外，由于对同一资源的访问，`balanceAmount`
    变量会进入不一致的状态。


    ### 使用互斥锁访问共享资源


    如前所述，只要多个协程同时访问同一个共享资源，确保一次只有一个协程能访问该资源就至关重要。为了避免资源进入不一致状态和出现竞态条件，互斥（也称为 *mutex*）的概念便应运而生。


    Go 语言通过 `sync` 包中的 `mutex` 类型来支持互斥。在 Go 中，`mutex` 提供了必要的锁机制，以确保不会发生竞态条件。它确保在任何时间点，只有一个协程在代码的临界区中运行。所谓临界区，是指代码中两个或多个协程不能同时执行的任何部分。当一个协程获得了互斥锁时，其他协程必须等待，直到该锁被释放才能访问共享资源。让我们修改上一小节的程序，通过使用
    `mutex` 类型来演示互斥的概念。


    清单 8-5 演示了如何使用 `mutex` 对象来封装代码的临界区。这确保当一个协程正在执行一个代码块时，没有其他代码块可以执行。


    ```go

    package main

    import (

    "fmt"

    "math/rand"

    "sync"

    "time"

    )

    var balanceAmount int

    var mutex = &sync.Mutex{}

    func creditToBalance() {

    for i := 0; i < 5; i++ {

    mutex.Lock()

    balanceAmount += 1000

    time.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)

    fmt.Println("余额增加后： ", balanceAmount)

    mutex.Unlock()

    }

    }

    func debitFromBalance() {

    for i := 0; i < 5; i++ {

    mutex.Lock()

    balanceAmount -= 1000

    time.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)

    fmt.Println("余额减少后： ", balanceAmount)

    mutex.Unlock()

    }

    }

    func main() {

    balanceAmount = 3000

    fmt.Println("初始余额： ", balanceAmount)

    go creditToBalance()

    go debitFromBalance()

    fmt.Scanln()

    }

    清单 8-5

    使用互斥锁访问共享资源的 Go 示例

    ```


    **输出：**


    ```

    初始余额：  3000

    余额增加后：  4000

    余额增加后：  5000

    余额减少后：  4000

    余额减少后：  3000

    余额增加后：  4000

    余额增加后：  5000

    余额减少后：  4000

    余额减少后：  3000

    余额增加后：  4000

    余额减少后：  3000

    ```


    在这段代码中，`Lock()` 和 `Unlock()` 是内置函数，可以与 `mutex` 类型的对象一起使用，并标记程序临界区的开始和结束。当一个协程获取了
    `mutex` 锁后，所有其他协程都被禁止执行任何受该 `mutex` 保护的代码。因此，它们被迫等待，直到该锁被释放。所以，这个程序的输出正如你所预期的那样。

