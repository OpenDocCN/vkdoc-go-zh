- fmt: "# Timeouts in Go\n\nTimeouts play a very important role when your programs\
    \ are connected to external resources or you need to bound the execution time.\
    \ Due to channels and `select` statements, it is very easy to implement timeouts\
    \ in Go. This section provides recipes for implementing timeouts in Go programs.\n\
    \nLet’s say you have to write software that will be used to participate in real-time\
    \ bidding (RTB). Say you have 10 milliseconds to reply to a call to the bid, whenever\
    \ it may arrive. Suppose your team has written an algorithm that can find the\
    \ best bid for a given URL. However, the algorithm sometimes takes too long finding\
    \ the best bid. When the algorithm does not finish in time, a default bid is returned.\n\
    \n```\npackage main\n\nimport (\n    \"context\"\n    \"fmt\"\n    \"log\"\n \
    \   \"time\"\n)\n\ntype Bid struct {\n    Price float64\n    URL   string\n}\n\
    \nvar (\n    defaultBid = Bid{\n        Price: 0.02,\n        URL:   \"https://j.mp/3cbDsIY\"\
    ,\n    }\n    bidTimeout = 10 * time.Millisecond\n)\n\nfunc bidOn(ctx context.Context,\
    \ url string) Bid {\n    ch := make(chan Bid, 1)\n    go func() {\n        ch\
    \ <- bestBid(url)\n    }()\n    select {\n    case bid := <-ch:\n        return\
    \ bid\n    case <-ctx.Done():\n        log.Printf(\"bid for %q times out, returning\
    \ default\", url)\n        return defaultBid\n    }\n}\n\nfunc main() {\n    ctx,\
    \ cancel := context.WithTimeout(context.Background(), bidTimeout)\n    defer cancel()\n\
    \    bid := bidOn(ctx, \"https://353solution.com\")\n    fmt.Println(bid)\n  \
    \  ctx, cancel = context.WithTimeout(context.Background(), bidTimeout)\n    defer\
    \ cancel()\n    bid = bidOn(ctx, \"https://google.com\")\n    fmt.Println(bid)\n\
    }\n```\n\nListing 8-9: Go Recipe for Using Timeouts\n\n**Output:**\n\n```\n{0.35\
    \ https://j.mp/3f3Dpkb}\n2022/02/22 15:46:00 bid for \"https://example.com\" timed\
    \ out, returning default\n{0.02 https://j.mp/3f3Dpkb}\n```\n\n**Note:** The code\
    \ of the `bestBid()` function is not provided, as it is out of scope of this book.\n\
    \nIn Listing 8-9, you first declare a struct named `Bid` with `Price` and `URL`\
    \ as member fields. You also define a default bid value to return and the default\
    \ bid timeout. The `bidOn()` function takes as input a context object that contains\
    \ the timeout for the bid and an URL of string type. The first step in the `bidOn()`\
    \ function is the creation of a channel. In order to ensure there are no goroutine\
    \ leaks, this channel is buffered. After this, a goroutine is spinned that is\
    \ responsible for calling the `bestBid()` function. The `select` statement allows\
    \ a goroutine to wait on several different communication operations by blocking\
    \ until one of the associated cases can run. It then executes that particular\
    \ case. When multiple cases are ready to run, the `select` statement chooses one\
    \ to run randomly. This code uses the `select` statement to specify two cases.\
    \ The first case is executed when `bestBid()` finishes in time and it returns\
    \ the bid. Otherwise, if the context is done before you have a result, it logs\
    \ the error and returns the default values.\n\nIn `main()`, there are two examples.\
    \ You start by creating context with `WithTimeout()`, using `context.Background()`\
    \ as the initial context and the default `bidTimeout` for timeout. The `defer`\
    \ keyword is used with `cancel()` to make sure that the context is canceled when\
    \ the function exits. The first call succeeds, but the second doesn’t, as the\
    \ URL is not real. It times out and returns the default values.\n\n# Pooling Goroutines\n\
    \nThere can be tasks that are CPU intensive, whereby more time is spent using\
    \ the CPU instead of waiting for the network. With CPU-intensive tasks, running\
    \ more goroutines than the machine cores can handle is fruitless. When resources\
    \ are limited, it is best not to choose one goroutine per job and instead use\
    \ a fixed pool of goroutines. This section introduces Go recipes for working with\
    \ a worker pool (aka thread pool) of goroutines.\n\nLet’s look at an example to\
    \ see the pool of goroutines. Suppose you want to find the median of multiple\
    \ vectors. This can be achieved using a pool of goroutines. In Listing 8-10, the\
    \ `multiMedian()` function calculates the medians of multiple vectors. In the\
    \ `multiMedian()` function, the first step is the creation of `WaitGroup`. In\
    \ this case, the number of jobs to be completed are the number of vectors, so\
    \ you add this value to the `WaitGroup`. A channel is then created which will\
    \ be used to send data to the workers. In order to query about the number of logical\
    \ CPUs that the current process can use, the program uses the `runtime.NumCPU()`\
    \ function. The `poolWorker()` is then initiated within the `for` loop. The data\
    \ is sent to the worker pool through the channel; it waits until all of the jobs\
    \ have been completed. Finally, when there is no more work to be done, the channel\
    \ is closed.\n\nThe `poolWorker()` function takes as input a channel as slice\
    \ of `float32` type and a `WaitGroup`. By using a `for` loop, the `poolWorker()`\
    \ function iterates over the values in the given channel. This `for` loop will\
    \ terminate when the channel is closed. It calculates the median, prints it out,\
    \ and then signals that this specific job is done by calling the `Done()` function.\
    \ Once there are no more values in the channel, the program prints the “`shutting\
    \ down`” message to indicate that the worker is shutting down.\n\n```\npackage\
    \ main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"runtime\"\n    \"sync\"\n\
    \    \"time\"\n\n    \"github.com/montanaflynn/stats\"\n)\n\nfunc multiMedian(vectors\
    \ [][]float64) {\n    var wg sync.WaitGroup\n    wg.Add(len(vectors))\n    ch\
    \ := make(chan []float64)\n\n    for i := 0; i < runtime.NumCPU(); i++ {\n   \
    \     go poolWorker(ch, &wg)\n    }\n\n    for _, v := range vectors {\n     \
    \   ch <- v\n    }\n    close(ch)\n    wg.Wait()\n}\n\nfunc poolWorker(ch chan\
    \ []float64, wg *sync.WaitGroup) {\n    for values := range ch {\n        m, _\
    \ := stats.Median(values)\n        fmt.Printf(\"Median %v -> %f\", values, m)\n\
    \        wg.Done()\n    }\n    log.Printf(\"Shutting Down\")\n}\n\nfunc main()\
    \ {\n    vectors := [][]float64{\n        {1.1, 2.2, 3.3},\n        {2.2, 3.3,\
    \ 4.4},\n        {3.3, 4.4, 5.5},\n        {4.4, 5.5, 6.6},\n        {5.5, 6.6,\
    \ 7.7},\n    }\n    multiMedian(vectors)\n    time.Sleep(10 * time.Millisecond)\
    \ // Let workers terminate\n    fmt.Println(\"DONE\")\n}\n```\n\nListing 8-10:\
    \ Go Recipe for Pooling Goroutines\n\n**Output:**\n\n```\nMedian [1.1 2.2 3.3]\
    \ -> 2.200000\nMedian [5.5 6.6 7.7] -> 6.600000\nMedian [2.2 3.3 4.4] -> 3.300000\n\
    Median [3.3 4.4 5.5] -> 4.400000\nMedian [4.4 5.5 6.6] -> 5.500000\nShutting Down\n\
    Shutting Down\nShutting Down\nShutting Down\nShutting Down\nShutting Down\nShutting\
    \ Down\nShutting Down\nDONE\n```\n\n# Hands-On Challenge\n\nFor this challenge,\
    \ suppose you want to download multiple files over HTTP. However, you want to\
    \ check the total amount of data that will be downloaded prior to downloading\
    \ the files. You must write a function that will calculate the download size for\
    \ a single file, single URL, and multiple URLs."
  raw: '### Timeouts in Go


    Timeouts play a very important role when your programs are connected to external
    resources or you need to bound the execution time. Due to channels and `select`
    statements, it is very easy to implement timeouts in Go. This section provides
    recipes for implementing timeouts in Go programs.


    Let’s say you have to write software that will be used to participate in real-time
    bidding (RTB). Say you have 10 milliseconds to reply to a call to the bid, whenever
    it may arrive. Suppose your team has written an algorithm that can find the best
    bid for a given URL. However, the algorithm sometimes takes too long finding the
