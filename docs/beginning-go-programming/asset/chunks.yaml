    Length: 15

    ```


    ## Case-Insensitive Comparisons in Go


    In Go, strings are UTF-8 encoded. The `strings` package of Go provides an `EqualFold`
    method for performing case-insensitive comparisons of two strings.


    The example in Listing [4-2](#536365_1_En_4_Chapter.xhtml#Figa) demonstrates a
    function that returns the English name for a Greek letter. In English, there are
    upper- and lowercase letters. Generally, to run a case-insensitive comparison
    of strings, you have to convert the letters in a string to either one of the cases
    for performing the comparison. However, this is not the case with every language.
    For example, in Greek, the letter sigma has three forms (`Σ`, `σ`, and `ς`). Here,
    the `string.toUpper()` function won’t work. Rather, the `string.EqualFold()` function
    would be handy.


    Listing [4-2](#536365_1_En_4_Chapter.xhtml#Figa) defines struct `letters` with
    member fields `Symbol` to store Greek symbols and the `English` field to store
    the associated English name. The `letters` slice will hold the symbols and names
    for you. If the letter passed is not found, the program will return an error message.
    Note that since `Σ`, `σ`, and `ς` are all forms of sigma, the code will print
    `"Sigma"` for each of these letters.


