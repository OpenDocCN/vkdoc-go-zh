    import (

    "fmt"

    )

    func main() {

    var name string

    var age int

    fmt.Print("请输入您的姓名: ")

    fmt.Scanln(&name)

    fmt.Println("你好 ", name)

    fmt.Print("请输入您的年龄: ")

    fmt.Scanln(&age)

    fmt.Println("您的年龄是 ", age)

    var anInt int = 5

    var aFloat float64 = 42

    sum := float64(anInt) + aFloat

    fmt.Printf("总和: %v, 类型: %T \n", sum, sum)

    }

    清单 2-6

    在 Go 中使用 Scanln 内置函数获取用户输入

    ```


    **输出：**


    ```

    请输入您的姓名: Maryam

    你好 Maryam

    请输入您的年龄: 30

    您的年龄是 30

    ```


    **Scan 与 Reader 函数对比**


    要拆分空格分隔的标记，您使用 `Scan` 函数；要读取完整的行，您使用 `reader` 函数。


    ### 使用 bufio


    缓冲 I/O 通过 `bufio` 包实现。`bufio` 包装了 `io.Writer` 或 `io.Reader` 对象，并返回一个新的 `Writer`
    或 `Reader` 对象，该对象实现了实用方法所需的接口。这种包装还提供了文本 I/O 辅助和缓冲功能。


    在清单 2-7 中，第 11 行声明了两个变量，一个用于存储输入。第二个是错误对象，用于存储任何错误消息。


    ```

