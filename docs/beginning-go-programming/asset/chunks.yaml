- fmt: '### Seeing the Impact of Shared Resources on Goroutines


    To see the impact of shared resources on goroutines, consider the program shown
    in Listing [8-4](#536365_1_En_8_Chapter.xhtml#PC6). In this example program, there
    is a global variable called `balanceAmount` and two functions called `creditToBalance`
    and `debitFromBalance` that are called simultaneously as goroutines. The `creditToBalance`
    function adds 1000 to the `balanceAmount`, whereas `debitFromBalance` subtracts
    1000 from it.


    ```go

    package main

    import (

    "fmt"

    "math/rand"

    "time"

    )

    var balanceAmount int

    func creditToBalance() {

    for i := 0; i < 5; i++ {

    balanceAmount += 1000

    time.Sleep(time.Duration(rand.Intn(100)) *

    time.Millisecond)

    fmt.Println("Balance After Credit: ", balanceAmount)

    }

    }

    func debitFromBalance() {

    for i := 0; i < 5; i++ {

    balanceAmount -= 1000

    time.Sleep(time.Duration(rand.Intn(100)) *

    time.Millisecond)

    fmt.Println("Balance After Debit: ", balanceAmount)

    }

    }

    func main() {

    balanceAmount = 3000

    fmt.Println("Initial balance: ", balanceAmount)

    go creditToBalance()

    go debitFromBalance()

    fmt.Scanln()

    }

    Listing 8-4

    Go Recipe Illustrating the Impact of Shared Resources on Goroutines

    ```


    **Output:**


    ```

    Initial balance:  3000

    Balance After Credit:  3000

    Balance After Debit:  3000

    Balance After Credit:  3000

    Balance After Debit:  4000

    Balance After Debit:  3000

    Balance After Debit:  2000

    Balance After Credit:  1000

    Balance After Debit:  2000

    Balance After Credit:  2000

    Balance After Credit:  3000

    ```


    When you run Listing [8-4](#536365_1_En_8_Chapter.xhtml#PC6), you’ll notice that
    the output is not as desired and is erroneous. One of the first visible errors
    is in the second line of the output. Upon looking closely, you’ll notice that
    the initial balance displayed on the first line is 3000, which is correct. However,
    in the second line, the balance should have been 4000, but it displays 3000, which
    is incorrect. This happens because in the `creditToBalance()` function, after
    the 1000 is added to the `balanceAmount` (i.e., updated to 4000), there is a delay
    for a random amount of time before the updated value of `balanceAmount` is displayed
    on the console. This delay is caused due to the following statement:


    ```go

    time.Sleep(time.Duration(rand.Intn(100))*time.Millisecond)

    ```


    The `debitFromBalance()` function used this delay to subtract 1000 from `balanceAmount`,
    updating its value to 3000. When the `creditToBalance()` resumes its task to print
    the value stored in `balanceAmount`, instead of 4000, it displays 3000. Even though
    the final value printed for `balanceAmount` is 3000, this program can still not
    be considered safe, because the values printed during the execution process are
    incorrect. Also, because of the access to the same resource, the `balanceAmount`
    variable goes into an inconsistent state.


    ### Accessing Shared Resources Using Mutual Exclusion


    As mentioned, whenever more than one goroutine is simultaneously accessing the
    same shared resource, it is critical to ensure that only one goroutine can access
    the resource at a time. To avoid the resource from going into an inconsistent
    state and race conditions, the concept of mutual exclusion (also called *mutex*)
    comes into action.


    Go supports mutual exclusion by providing the `mutex` type in the `sync` package.
    In Go, `mutex` provides the locking mechanism required to make sure that race
    conditions do not occur. It ensures that, at any point in time, only one goroutine
    is running in the critical section of code. By critical section, we mean any part
    of the code where two or more goroutines cannot execute simultaneously. When the
    mutual exclusion lock is gained by one goroutine, the other goroutines have to
    wait until the lock is released to access the shared resource. Let’s make changes
    to the program from the previous section to illustrate the concept of mutual exclusion
    through the use of the `mutex` type.


    Listing [8-5](#536365_1_En_8_Chapter.xhtml#PC9) illustrates how a `mutex` object
    can be used to enclose the critical section of the code. This ensures that when
    one goroutine is executing a block of code, no other block can be executed.


    ```go

    package main

    import (

    "fmt"

    "math/rand"

    "sync"

    "time"

    )

    var balanceAmount int

    var mutex = &sync.Mutex{}

    func creditToBalance() {

    for i := 0; i < 5; i++ {

    mutex.Lock()

    balanceAmount += 1000

    time.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)

    fmt.Println("Balance After Credit: ", balanceAmount)

    mutex.Unlock()

    }

    }

    func debitFromBalance() {

    for i := 0; i < 5; i++ {

    mutex.Lock()

    balanceAmount -= 1000

    time.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)

    fmt.Println("Balance After Debit: ", balanceAmount)

    mutex.Unlock()

    }

    }

    func main() {

    balanceAmount = 3000

    fmt.Println("Initial balance: ", balanceAmount)

    go creditToBalance()

    go debitFromBalance()

    fmt.Scanln()

    }

    Listing 8-5

    Go Recipe for Accessing Shared Resources Using Mutual Exclusion

    ```


    **Output:**


    ```

    Initial balance:  3000

    Balance After Credit:  4000

    Balance After Credit:  5000

    Balance After Debit:  4000

    Balance After Debit:  3000

    Balance After Credit:  4000

    Balance After Credit:  5000

    Balance After Debit:  4000

    Balance After Debit:  3000

    Balance After Credit:  4000

    Balance After Debit:  3000

    ```


    In this code, `Lock()` and `Unlock()` are built-in functions that can be used
    with a `mutex` type object and can mark the start and end of a critical section
    of the program. When one goroutine acquires a `mutex` lock, all the other goroutines
    are barred from executing any code that is protected by that `mutex`. They are
    hence forced into waiting until the lock is released. Therefore, the output of
    this program is as you’d expect.'
