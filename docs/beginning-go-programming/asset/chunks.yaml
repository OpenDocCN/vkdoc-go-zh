    ## 程序流程


    条件逻辑可用于改变程序流程。与其他 C 风格语言一样，Go 也提供了条件语句，例如 `if`、`if…else`、`嵌套 if`、`switch` 和 `select`。不过，在使用方式上存在细微的语法差异。


    ### If 语句


    在大多数情况下，Go 中的 `if` 语句看起来与 C 或 Java 中的相同；但是，它不需要在布尔条件周围加上括号。另一个重要方面是如何格式化条件代码块。在其他
    C 风格语言中，可以选择将代码块的起始大括号放在下一行。Go 不允许这样做，这样做会引发错误。起始大括号必须与前面的语句在同一行。清单 2-37 是在 Go
    中使用 `if-else` 语句的示例。


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    theAnswer := 42

    var result string

    if theAnswer < 0 {

    result = "Less than Zero"

    } else if theAnswer == 0 {

    result = "Equal to Zero"

    } else {

    result = "Greater than Zero"

    }

    fmt.Println(result)

    }

    清单 2-37

    Go 中 if-else 语句的示例

    ```


    **/*输出：**


    ```

    Greater than Zero

    */

    ```


    Go 的 `if` 语法中另一个有趣且有时很有用的变体是，你可以包含一个作为 `if` 语句一部分的初始语句。例如，你可以在根据变量值执行条件逻辑之前初始化它。清单
    2-38 是一个实现此功能的示例。


    ```

    if x:= 50; if x < 0 {

    result = "Less than Zero"

    } else if x == 0 {

    result = "Equal to Zero"

    } else {

    result = "Greater than Zero"

    }

    fmt.Println(result)

    清单 2-38

    带有初始化的 if 语句

    ```


    **输出：**


    ```

    Greater than Zero

    ```

