  trans: "\n# 使用还是不用：自定义构造函数\n\n通常不需要使用自定义构造函数。但有时却不得不使用它们；例如，在初始化时设置值的同时，还必须对默认值进行排序。为了说明自定义构造函数的用法，我们以一个日志记录器为例，在该示例中需要设置一个默认的日志记录器，如代码清单\
    \ 9-1 所示。\n\n```go\npackage main\nimport (\n\"log\"\n\"os\"\n)\ntype Jobs struct\
    \ {\nCmd string\n*log.Logger\n}\nfunc CreateJob(cmd string) *Jobs {\nreturn &Jobs{cmd,\
    \ log.New(os.Stderr, \"New Job \", log.Ldate)}\n}\nfunc main() {\nCreateJob(\"\
    SampleRun\").Print(\"Initiating . . .\")\n}\n代码清单 9-1\nGo 语言自定义构造函数示例\n```\n\n\
    **输出：**\n\n```\nNew Job 2022/06/24 Initiating . . .\n```\n\n## 将代码模块化并组织成包\n\n\
    在决定项目的文件夹结构时，请务必牢记可扩展性和复杂性。在 Go 语言中，每个源文件都属于某个特定的包。因此，每个程序都以 `package` 语句开头，该语句指明了源文件所属包的名称。对于非常小的程序，唯一需要的包就是\
    \ `main` 包。最佳实践是确保包名不要太长。当一个包包含多个文件时，应维护一个包含包文档的 `doc.go` 文件。有关包的最佳实践更多信息，请参阅\
    \ [`https://talks.golang.org/2014/organizeio.slide#2`](https://talks.golang.org/2014/organizeio.slide%25232)。\n\
    \n## 依赖包管理\n\n遗憾的是，Go 语言没有自己的依赖包管理系统。这在持续集成（CI）环境或多个开发人员共同开发一个项目时可能会成为挑战。尽管如此，Go\
    \ 社区已经提出了几种解决方案来克服这一缺陷。Go 包管理器（`gpm`）（[`https://github.com/pote/gpm`](https://github.com/pote/gpm)）被认为是最简单可行的解决方案之一。它本质上是一个简单的\
    \ bash 脚本，可以进行修改，因此被复制到每个需要的仓库中（[`https://gist.github.com/mattetti/9334318`](https://gist.github.com/mattetti/9334318)）。它使用一个名为\
    \ `Godeps` 的自定义文件，该文件列出了需要安装的包名，以避免依赖问题。有关如何在代码中管理依赖项的更多信息，请参阅 [`https://go.dev/doc/modules/managing-dependencies`](https://go.dev/doc/modules/managing-dependencies)。\n\
    \n## 编译器优化\n\n开发者通常会在构建时使用不同的标志，称为 `gcflags`，以了解编译器正在应用哪些优化和内存管理技术。代码清单 9-2 演示了如何使用编译器标志。\n\
    \n```go\npackage main\nimport (\n\"fmt\"\n)\ntype UserData struct {\nID      \
    \ int\nName     string\nLocation string\n}\nfunc (user *UserData) GreetUser()\
    \ string {\nreturn fmt.Sprintf(\"Hello %s from %s\",\nuser.Name, user.Location)\n\
    }\nfunc CreateNewUser(id int, name, location string) *UserData {\nid++\nreturn\
    \ &UserData{id, name, location}\n}\nfunc main() {\nuser := CreateNewUser(10, \"\
    Maryam\", \"PK\")\nfmt.Println(user.GreetUser())\n}\n代码清单 9-2\n展示编译器标志使用的基础程序\n\
    ```\n\n假设这个文件名为 `gcflags-eg.go`。你可以在构建该文件的同时，将 `gcflags` 与 `build` 命令一起传入，如图 9-1\
    \ 所示。\n\n![](img/536365_1_En_9_Fig1_HTML.jpg)\n\n一组包含 18 个命令行参数的代码，以 `gcflags`\
    \ 开头。\n\n图 9-1  \n使用 `gcflags` 编译文件的示例输出\n\n从此处显示的输出中可以注意到的一种优化是[函数内联](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go)（[`https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go`](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go)）。函数内联用于减少函数调用开销，通过将函数体移动到函数调用处来实现。例如，`GreetUser()`\
    \ 函数在第 13 行定义，并在第 25 行被内联。有关内联如何提升 Go 程序性能的更多信息，请参阅 [`http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast`](http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast)。本质上，编译器会创建与以下代码清单等效的代码。\n\
    \n```go\nfunc main() {\nid := 12 + 1\nuser := &UserData{id, \"Maryam\", \"PK\"\
    }\nfmt.Println(user.Greetings())\n}\n```\n\n## 使用 Git 的 SHA 设置构建 ID\n\n将构建 ID\
    \ 烧录到二进制文件中通常非常有用。使用 Git 命令的 SHA1 是实现此目的的一种方法。第一步是使用 Git 命令从你的仓库中获取最新提交的 SHA1\
    \ 短版本：`git rev-parse --short HEAD`。之后，如下面的代码清单所示，你需要设置一个导出的变量，在此例中为 `Build`，其值将通过\
    \ `-ldflags` 标志在编译时设置。\n\n```go\npackage main\nimport \"fmt\"\nvar Build string\n\
    func main() {\nfmt.Printf(\"Build ID: %s\\n\", Build)\n}\n```\n\n将前面的代码清单保存到名为\
    \ `buildId-eg.go` 的文件中。仅编译代码不会设置构建 ID；你需要使用以下 Go 命令来设置构建值：\n\n```\n$ go build\
    \ -ldflags \"-X main.Build m9163zh\" buildId-eg.go\n```\n\n为了确保你的构建 ID 已设置，运行并检查你的构建。然后可以在应用程序的部署编译过程中使用该构建\
    \ ID。\n\n```\nBuild ID: m9163zh\n```\n\n## 优雅常量的案例，即 IOTA\n\n有时，概念的名称非常重要，尤其是在代码中，如代码清单\
    \ 9-3 所示。\n\n```go\nconst (\nCCRamada    = \"Ramada\"\nCCMarriot   = \"Marriot\"\
    \nCCHilton    = \"Hilton\"\n)\n代码清单 9-3\n为概念赋予恰当名称以区分它们\n```\n\n然而，在其他时候，你只需要区分不同事物，而名称并不重要。例如，在数据库中存储产品类别信息时，可能希望使用整数值来区分它们，而不是按名称存储为字符串值，因为产品类别会随时间变化。实现此目的的一种方法如代码清单\
    \ 9-4 所示。\n\n```go\nconst (\nCatElectronics  = 0\nCatAppliances   = 1\nCatHardware\
    \     = 2\n)\n代码清单 9-4\n使用整数值来区分概念\n```\n\n请注意，在此示例中，我们使用 0、1 和 2 作为常量的值。但这些是任意值，由程序员自行选择。\n\
    \n尽管常量被认为很重要，但有时它们可能难以解释和维护。由于这些原因，Ruby 等某些语言的开发者会避免使用常量。然而，Go 语言中的常量具有某些微妙特性，当谨慎使用得当时，可以使代码保持可维护性和优雅性。\n\
    \n### 自动递增\n\n在 Go 中实现自动递增的一个便捷技巧是使用 `IOTA` 标识符。使用 `IOTA` 本质上简化了常量定义。如代码清单 9-5\
    \ 所示，你可以使用 `IOTA` 来分配与上一节示例中相同的值。\n\n```go\nconst (\nCatElectronics  = iota  \
    \  //0\nCatAppliances             //1\nCatHardware               //2\n)\n代码清单\
    \ 9-5\n使用 IOTA 标识符实现自动递增\n```\n"
- fmt: '### Custom Types


    Custom types are commonly used in combination with auto-incrementing constants
    to allow programmers to lean onto the compiler, as shown in Listing [9-6](#536365_1_En_9_Chapter.xhtml#PC13).


    ```go

    type Months int

    const (

    January    Months = iota // 0

    February                 // 1

    March                    // 2

    April                    // 3

    May                      // 4

    June                     // 5

    July                     // 6

    )

    Listing 9-6

    Custom Types with IOTA

    ```


    As illustrated by Listing [9-7](#536365_1_En_9_Chapter.xhtml#PC14), if a `Months`
    type argument is passed to a function that is defined to take only `int` type
    as an argument, this will not work. The program will throw an error at compile-time.


    ```go

    func Counter(k int) {

    fmt.Printf("No. Of items: %d", k)

    }

    func main() {

    m1 := January

    fmt.Println(Counter(m1))

    }

    Listing 9-7

    Compile-Time Errors Due to Assigning Mismatch Types

    ```


    **Output:**


    ![](images/536365_1_En_9_Chapter/536365_1_En_9_Figa_HTML.jpg)


    An error message reads, "cannot use m1 (variable of type `Months`) as `int` value
    in argument to `Counter`".


    The opposite of this case is also true. As shown in Listing [9-8](#536365_1_En_9_Chapter.xhtml#PC15),
    you cannot pass an `int` type argument to a function that is defined to take an
    argument of the `Months` type.


    ```go

    type Months int

    const (

    January  Months = iota // 0

    February               // 1

    March                  // 2

    April                  // 3

    May                    // 4

    June                   // 5

    July                   // 6

    )

    func Counter(k Months) {

    fmt.Printf("No. Of items: %d", k)

    }

    func main() {

    m2 := 2

    fmt.Println(Counter2(m2))

    }

    Listing 9-8

    Compile-Time Errors Due to Assigning Mismatch Types

    ```


    **Output**


    ![](images/536365_1_En_9_Chapter/536365_1_En_9_Figb_HTML.jpg)


    An error message reads, "cannot use m2 (variable of type `int`) as `Months` value
    in argument to `Counter-2`".


    However, there is a twist with this situation too. When a number constant is passed
    as an argument, it will compile and work fine, as shown in Listing [9-9](#536365_1_En_9_Chapter.xhtml#PC16).
    This occurs due to the fact that, in Go, constants are loosely typed unless used
    in a strict context.


    ```go

    func GetMonth(character Months) string {

    var str string

    switch character {

    case January:

    str = "Its January."

    case February:

    str = "Its February."

    case Tuesday:

    str = "Its March."

    }

    return str

    }

    func main() {

    fmt.Println(GetMonth(0))

    }

    Listing 9-9

    Program to Illustrate the Loosely Typed Feature of Constants in Go

    ```


    **Output:**


    `Its January.`


    ### Skipping Values


    There can be scenarios where you want to use IOTA to assign values to constants,
    but you don’t want the values to be in a serial fashion and want to skip some
    values. As illustrated in Listing [9-10](#536365_1_En_9_Chapter.xhtml#PC17), you
    can use underscores to skip any unwanted values.


    ```go

    const (

    CatElectronics  = iota   //0

    CatAppliances            //1

    CatHardware              //2

    _

    _

    CatComputer              //5

    )

    Listing 9-10

    Skipping Values When Using IOTA

    ```


    ### Expressions


    IOTA can be used for several other purposes other than auto-incrementation. One
    of the uses is within expressions. The result can be stored in the constant. Listing
    [9-11](#536365_1_En_9_Chapter.xhtml#PC18) shows an example that illustrates this
    functionality. In this example, `<<` is the bitmask operator. This trick works
    because there is only one identifier on a single line in a const group, so the
    previous expression is taken and reapplied to the identifier but with an incremented
    value of IOTA. This process is also known as the implicit repetition of the last
    non-empty expression list.


    ```go

    type AllergyMagnitude float32

    const (

    PeanutAllergy = 1 << iota //00000001

    ChocolateAllerg           // 1 << 1 i.e. 00000010

    DustAllergy               // 1 << 2 i.e. 00000100

    MilkAllergy               // 1 << 3 i.e. 00001000

    )

    Listing 9-11

    Using IOTA Identifiers with Expressions

    ```


    ### Tricky Constants


    You might wonder what the output of defining two constants in a single line in
    a const group would be. For example, in Listing [9-12](#536365_1_En_9_Chapter.xhtml#PC19),
    what would the value of constants `Value2` or `Value6` be?


    ```go

    const (

    Value1, Value2 = iota + 1, iota + 2

    Value3, Value4

    Value5, Value6

    )

    Listing 9-12

    Incorrect Way of Declaring Multiple Constants in a Single Line in Const Group
    Using IOTA

    ```


    In this case, the value of IOTA is incremented on the next line instead of when
    it is referenced. This would mess up your code, as you would now have constants
    with the same values, as shown in Listing [9-13](#536365_1_En_9_Chapter.xhtml#PC20).


    ```

    // ValA: 1

    // ValB: 2

    // ValC: 2

    // ValD: 3

    // ValE: 3

    // ValF: 4

    Listing 9-13

    Output for Defining Two Constants in Single Line in a Const Group Using IOTA

    ```


    ## Summary


    This chapter provided different tips and tricks for using Go in a more effective
    and efficient way. These handy tips covered several topics, including importing
    packages, checking which packages are imported in your program, using `goimports`
    to format code, efficient code organization, using custom constructors, dependency
    package management, optimizing compilation, setting the build ID of your project
    via Git, and several tricks regarding IOTA identifiers.'
