    `Decode()` 函数从其输入中读取下一个 JSON 编码值，并将其存储到传入参数所指向的值中。此处传入 `tour` 对象的内存地址。然后，通过 `append()`
    函数将 `tour` 对象添加到 `tours` 切片。最后，函数返回 `tours` 对象。


