- fmt: "#### Recipe to See Interfaces in Action\n\nLet’s look at a Go recipe to learn\
    \ how to use interfaces. Suppose that you have several sensors and want to print\
    \ them all. In this case, you first need to define a user-defined type, `Sensor`,\
    \ which is used to store information regarding a sensor. Since all of the sensors\
    \ need a similar functionality, you can use interfaces for this purpose.\n\nListing\
    \ [5-8](#536365_1_En_5_Chapter.xhtml#PC12) illustrates the use of interfaces in\
    \ Go. Here, you have a `thermostat` struct with three associated methods. The\
    \ other struct is that of `camera`, which has the same methods as those associated\
    \ with the `thermostat`. The `printAll()` function prints the ID of any sensor.\
    \ You can use an interface for printing purposes. It gets a slice of sensors and,\
    \ for every sensor, prints the ID and the kind. In `main()`, you create a slice\
    \ of type `Sensors` that will contain the `Thermostat` and `Camera` structs and\
    \ print their details.\n\n```\npackage main\nimport (\n\"fmt\"\n)\n//A thermostat\
    \ measures and controls the temperature\ntype Thermostat struct {\nid    string\n\
    value float64\n}\n//Value return the current temperature in Celsius\nfunc (t *Thermostat)\
    \ Value() float64 {\nreturn t.value\n}\n//ID returns the thermostat ID\nfunc (t\
    \ *Thermostat) ID() string {\nreturn t.id\n}\n//Set tells the thermostat to set\
    \ the temperature\nfunc (t *Thermostat) Set(value float64) {\nt.value = value\n\
    }\n//Kind returns the device kind\nfunc (t *Thermostat) Kind() string {\nreturn\
    \ \"thermostat\"\n}\n//Camera is a security camera\ntype Camera struct {\nid string\n\
    }\n//ID return the camera ID\nfunc (c *Camera) ID() string {\nreturn c.id\n}\n\
    func (*Camera) Kind() string {\nreturn \"camera\"\n}\ntype Sensor interface {\n\
    ID() string\nKind() string\n}\nfunc printAll(sensors []Sensor) {\nfor _, s :=\
    \ range sensors {\nfmt.Printf(\"%s \\n\", s.ID(), s.Kind())\n}\n}\nfunc main()\
    \ {\nt := Thermostat{\"Living Room\", 16.2}\nc := Camera{\"Baby Room\"}\nsensors\
    \ := []Sensor{&t, &c}\nprintAll(sensors)\n/*fmt.Printf(\"%s Before: %.2f\\n\"\
    , t.ID, t.Value())\nt.Set(18)\nfmt.Printf(\"%s After: %.2f\\n\", t.ID, t.Value())*/\n\
    }\nListing 5-8\nGo Recipe for Using Interfaces in Go\n```\n\n**/*Output:***\n\n\
    ```\nLiving Room \nBaby Room \n*/\n```\n\n## Empty Interface and Working with\
    \ IOTA in Go\n\nWhen an interface type does not specify any methods, it is called\
    \ an empty interface. In Go, empty interfaces handle values of unknown type. An\
    \ empty interface can also accommodate values of any type. Another concept to\
    \ look into in Go is that of `IOTA`. `IOTA` is an identifier that is used with\
    \ constants that use auto-increment numbers. In simple words, `IOTA` is essentially\
    \ a counter that starts with zero and increments by 1. It can be used to create\
    \ effective constants and enums in Go. In this section, we discuss the use of\
    \ empty interfaces and `IOTA` in Go through examples.\n\n### JSON Encoding/Decoding\n\
    \nGo offers built-in support for JSON encoding and decoding, including to and\
    \ from built-in and custom data types. The `encoding/json` package allows you\
    \ to do encoding of JSON data as defined in the RFC 7159. When working with data,\
    \ you usually want to encode some Go struct into a `json` string. Let's look at\
    \ the JSON Marshall function, as defined in the official documentation ([`https://pkg.go.dev/encoding/json#Manual`](https://pkg.go.dev/encoding/json%2523Manual)).\n\
    \nAs shown in Figure [5-1](#536365_1_En_5_Chapter.xhtml#Fig1), the `Marshal()`\
    \ function gets an object of `any` type, which is an alias for an empty interface,\
    \ i.e., `interface{}`, and returns a `byte` array containing the JSON encoding\
    \ of the passed argument. The JSON `Marshal()` can marshal several types, such\
    \ as `integers`, `strings`, `time.Time`, and so on. These types don't share common\
    \ methods and hence the only interface that satisfies them all is the empty interface.\
    \ The empty interface says nothing. It's a way to bypass the type system followed\
    \ in Go. However, you should only use an empty interface as a last resort.\n\n\
    ![](images/536365_1_En_5_Chapter/536365_1_En_5_Fig1_HTML.jpg)\n\nA screenshot\
    \ reads the format of the Marshal function.\n\nFigure 5-1\n\nFormat of the Marshal\
    \ function from a JSON package\n\nLet's look at an example to get a better understanding.\
    \ In Listing [5-9](#536365_1_En_5_Chapter.xhtml#PC14), assume that you have several\
    \ kinds of events, for example, `ClickEvent` and `HoverEvent`. There is also a\
    \ counter for how many times each event is fired. The `recordEvent()` function\
    \ records the counts. It gets an empty interface because these two events and\
    \ any other event in the system do not have anything in common. In this function,\
    \ you use the `switch` statement to check the type of the current event. If it's\
    \ a `ClickEvent`, the counter for the click event is incremented. Whereas, in\
    \ case of the `HoverEvent`, its respective counter is incremented. Otherwise,\
    \ you should look out for a warning. You can also make type decisions, using `value.(typeName)`\
    \ to convert the empty interface to the underlying type. This is going to panic\
    \ if you get the type wrong. The other way and the safer one is to use the `comma,ok`\
    \ idiom. The `comma,ok` idiom works like an `if-else` statement. If the passed\
    \ key is found in the map, it returns the value; otherwise, it returns zero.\n\
    \n```\npackage main\nimport (\n\"fmt\"\n\"log\"\n)\ntype ClickEvent struct {\n\
    // ...\n}\ntype HoverEvent struct {\n// ...\n}\nvar eventCounts = make(map[string]int)\
    \ //type->count\nfunc recordEvent(evt interface{}) {\nswitch evt.(type) {\ncase\
    \ *ClickEvent:\neventCounts[\"click\"]++\ncase *HoverEvent:\neventCounts[\"hover\"\
    ]++\ndefault:\nlog.Printf(\"warning: unknown event: %#v of type %T\\n\", evt,\
    \ evt)\n}\n}\nfunc main() {\nrecordEvent(&ClickEvent{})\nrecordEvent(&HoverEvent{})\n\
    recordEvent(&ClickEvent{})\nrecordEvent(3)\nfmt.Println(\"event counts\", eventCounts)\n\
    }\nListing 5-9\nGo Recipe for Using the Marshal Function\n```\n\n**/*Output:***\n\
    \n```\n2022/02/15 00:08:22 warning: unknown event: 3 of type int\nevent counts\
    \ map[click:2 hover:1]\n*/\n```"
