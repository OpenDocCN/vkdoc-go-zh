    # 使用 Go 语言解析 JSON


    为了学习如何在 Go 语言中解析 JSON 数据，我们来看一个例子。假设你需要处理从气象测量站接收到的读数。这些读数以 JSON 消息的形式呈现，包含以下格式的时间、站点名称、温度和降雨量信息：


    ```

    {

    "time": "2022-02-15T00:00:00Z",

    "station": "DS9",

    "temperature": 21.6,

    "rain": 0

    }

    ```


    你可以使用代码清单 6-1 来实现这个目标。第一步是定义一个名为 `Record` 的结构体，它包含 `Time`、`Station`、`Temperature`
    和 `Rain` 这些成员字段。这个结构体将用于存储从气象站接收到的读数。请注意，结构体成员字段的名称都是大写字母开头的。这是因为我们希望导出它们，即让程序的其他部分可以访问它们。在
    Go 语言中，`json` 包包含了将 JSON 格式数据从大写转换为小写的逻辑，所以你不用担心这个问题。`readRecord()` 函数负责从接收到的读数中读取并解码
    JSON 数据。它接收一个 `io.Reader` 对象作为输入，并返回一个 `Record` 类型的结构体实例，如果发生错误则一并返回。在 `readRecord()`
    函数内部，会创建一个空的记录。此外，与 `io.reader` 对象一样，我们使用 `decoder` 来解码接收到的 JSON 数据。解码器会解码数据，并将结果存储在一个名为
    `rec` 的结构体实例中，通过指针传递并处理可能出现的错误。


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io"

    "log"

    "os"

    "time"

    )

    // Record 是一条天气记录

    type Record struct {

    Time    time.Time

    Station string

    Temperature    float64 //`json: "temperature"` //摄氏度

    Rain    float64 //毫米

    }

    func readRecord(r io.Reader) (Record, error) {

    var rec Record

    dec := json.NewDecoder(r)

    if err := dec.Decode(&rec); err != nil {

    return Record{}, err

    }

    return rec, nil

    }

    func main() {

    file, err := os.Open("record.json")

    fmt.Printf("file: %v\n", file)

    if err != nil {

    log.Fatal(err)

    }

    defer file.Close()

    rec, err := readRecord(file)

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", rec)

    }

    代码清单 6-1

    使用 JSON 包的 Go 语言方案

    ```


    **输出：**


    ```

    {Time:2022-02-02 00:00:00 +0000 UTC Station: DS9 Temp:21.6 Rain:0}

    ```


    # 使用 Go 语言解析复杂 JSON


    在某些情况下，JSON 响应可能非常复杂。假设你有一个 API 用于获取一系列站点的状态。JSON 响应如下所示：


    ```

    {

    "lastCheckTime": "2022-02-15 09:20:15 PM",

    "stations":[

    {

    "id":3,

    "name": "station 3",

    "status": "Active",

    "statusKey": 1,

    "lastCheck": {

    "time": "2016-01-22 04:30:15 PM",

    "success": true

    }

    },

    {

    "id":1,

    "name": "station 2",

    "status": "Active",

    "lastCheck": {

    "time": "2020-01-22 04:32:41 PM",

    "success": true

    }

    },

    ]

    }

    ```


    从这个 JSON 响应中，假设你想要打印出所有最后一次检查时间超过某个特定时间阈值的站点名称。为了实现这个目标，请使用代码清单 6-2。在 `laggingStations()`
    函数中，我们不用为 JSON 中的每条消息都编写特定的类型，而是使用一个名为 `reply` 的匿名结构体。该结构体包含 `lastCheckTime` 以及站点详情。务必注意确保结构体中的字段名称与
    JSON 中的名称匹配。然后我们有一个 `stations`，它是一个结构体切片，包含 `name`、`status` 和 `lastCheckTime`，而后者的
    `lastCheck` 字段又是一个结构体，其中 `time` 是 `string` 类型的成员字段。这个例子将 `time` 作为 `string` 处理，因为
    JSON 消息中的时间格式与 Go 语言在 JSON 中编码时间的方式不符。


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io"

    "log"

    "os"

    "time"

    )

    /*{

    "lastCheckTime": "2022-02-15 09:20:15 PM",

    "stations":[

    {

    "id":3,

    "name": "station 3",

    "status": "Active",

    "statusKey": 1,

    "lastCheck": {

    "time": "2016-01-22 04:30:15 PM",

    "success": true

    }

    },

    {

    "id":1,

    "name": "station 2",

    "status": "Active",

    "lastCheck": {

    "time": "2020-01-22 04:32:41 PM",

    "success": true

    }

    },

    ]

    }

    */

    // laggingStations 返回检查时间滞后的站点

    func laggingStations(r io.Reader, timeout time.Duration) ([]string, error) {

    var reply struct {

    LastCheckTime string

    Stations      []struct {

    Name      string

    Status    string

    LastCheck struct {

    Time string

    }

    }

    }

    dec := json.NewDecoder(r)

    if err := dec.Decode(&reply); err != nil {

    return nil, err

    }

    checkTime, err := parseTime(reply.LastCheckTime)

    if err != nil {

    return nil, err

    }

    var lagging []string

    for _, station := range reply.Stations {

    if station.Status != "Active" {

    continue

    }

    lastCheck, err := parseTime(station.LastCheck.Time)

    if err != nil {

    return nil, err

    }

    if checkTime.Sub(lastCheck) > timeout {

    lagging = append(lagging, station.Name)

    }

    }

    return lagging, nil

    }

    func parseTime(ts string) (time.Time, error) {

    return time.Parse("2006-01-02 15:04:05 PM", ts)

    }

    func main() {

    file, err := os.Open("stations.json")

    if err != nil {

    log.Fatal(err)

    }

    defer file.Close()

    lagging, err := laggingStations(file, time.Minute)

    if err != nil {

    log.Fatal(err)

    }

    for _, name := range lagging {

    fmt.Println(name)

    }

    }

