- fmt: '### Read Text Files


    In this section, in order to illustrate how reading data from a text file can
    be achieved in Go, as shown in Listing [2-56](#536365_1_En_2_Chapter.xhtml#PC94),
    we modify the previous example in Listing [2-55](#536365_1_En_2_Chapter.xhtml#PC92)
    by adding a custom function called `readFile()` which will take a filename as
    input. Whenever a file is read, it is always returned as an array of bytes. The
    `data` variable in Listing [2-56](#536365_1_En_2_Chapter.xhtml#PC94) will hold
    the returned bytes. Once again, the `err` object checks if an error is thrown.
    The `ReadFile()` function is a built-in function in the `ioutil` package that
    can be used to read any file indicated by the filename passed to it as an argument.
    As output, it returns the contents of the file read. Upon successful execution
    of the `ReadFile()`, the error value is returned as `nil` instead of `EOF`. This
    is because the `ReadFile()` function reads as input the entire file and does not
    treat an `EOF` returned from the `Read()` function as an error. At the last line
    in the `readFile()`, the `string(data)` statement is used to type-cast the contents
    of the file received as bytes into the string to display them on the screen. In
    the `main()` function we used the `defer` keyword again and then called the `readFile()`
    function and passed it the file we want to read. It is important to use the `defer`
    keyword whenever you are working with anything that might not run automatically
    in the current thread. Also, if you want to wait until the file is completely
    closed before you try to read it, the `defer` keyword achieves this for you.


    ```

    package main

    import (

    "fmt"

    "io"

    "io/ioutil"

    "os"

    )

    func main() {

    content := "Hello from Go!"

    file, err := os.Create("./fromString.txt")

    checkError(err)

    length, err := io.WriteString(file, content)

    checkError(err)

    fmt.Printf("Wrote a file with %v characters\n", length)

    readFile(file.Name())

    defer file.Close()

    }

    // readFile is a function for reading content of text file

    func readFile(fileName string) {

    data, err := ioutil.ReadFile(fileName)

    checkError(err)

    fmt.Println("Text read from file: ", string(data))

    }

    // checkError is a function for error checking

    func checkError(err error) {

    if err != nil {

    panic(err)

    }

    }

    Listing 2-56

    Reading from Text Files in Go

    ```


    **Output:**


    ```

    Wrote a file with 14 characters

    Hello from Go!

    ```


    ## HTTP Package


    To help programmers build applications that can effectively communicate with different
    web applications and services, the Go programming language offers an extensive
    set of different tools, one of them being the `http` package. The `http` package
    allows you to easily communicate with remote hosts by creating requests and sending
    data. It also helps in creating HTTP server applications that can listen and respond
    to the received requests. The example in Listing [2-57](#536365_1_En_2_Chapter.xhtml#PC96)
    illustrates the use of the `http` package.


    In Listing [2-57](#536365_1_En_2_Chapter.xhtml#PC96), a request is sent to a remote
    host to fetch some data. Here, we want to download the JSON contents of the page
    specified in the content named `url` to the local development machine. To do so,
    the first step is to import the `net/http` and `ioutil` packages. To download
    the content use the `get()` function from the `http` package. The `get()` function
    returns a response object as well as an `error` object. The `resp` variable is
    used to store the returned response object. When you print the contents of the
    `resp` variable, you will get a pointer to an object named `response`. Notice
    that it’s a member of the `http` package. The `response` object has a public field
    called `body`. It contains the JSON packet you intend to download. Just like with
    files, after reading the contents of the body, you should use the `defer` keyword
    along with the `resp.Body.Close()` command to close the body.


    The contents are received in the form of a byte array. To store this, use the
    `bytes` variable. The `ioutil.ReadAll(resp.Body)` reads the contents of the `resp.Body`.
    Since the returned content is a byte array, you have to type-cast it into a `string`
    to print it onto the screen, by wrapping the `bytes` variable within the string
    type using the `string(bytes)` command.


    ```

    package main

    import (

    "fmt"

    "io/ioutil"

    "net/http"

    )

    const url = "http://services.explorecalifornia.org/json/tours.php"

    func main() {

    fmt.Println("Network Requests Demo")

    response, err := http.Get(url)

    if err != nil {

    panic(err)

    }

    fmt.Printf("Response Type: %T\n", response)

    defer response.Body.Close()

    bytes, err := ioutil.ReadAll(response.Body)

    if err != nil {

    panic(err)

    }

    content := string(bytes)

    fmt.Print(content)

    }

    Listing 2-57

    Basic Program Showing the Use of the HTTP Package in Go

    ```


    **Output:**


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Figc_HTML.jpg)


    A screenshot of the output of the program in Go.'
