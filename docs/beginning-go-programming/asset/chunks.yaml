  raw: '## Authentication and Writing an HTTP Server in Go


    Some websites require authentication in the HTTP protocol. There are several methods
    for authentication, such as Basic, Bearer, Digest, and so on. There are also several
    formats of authentication, like Auth2, SAML, OICD, and so on. Go supports Basic
    authentication; for other authentication methods such as `Auth0`, you need to
    get a token and then must set the authorization HTTP header.


    In the Go recipe shown in Listing [7-2](#536365_1_En_7_Chapter.xhtml#PC3), you
    are going to use the `httpbin.org` website to demonstrate Basic authentication.
    The `authRequest()` function takes the URL, user, and password as input. These
    parameters are then used to create a new HTTP request using the `http.NewRequest()`
    function. You pass `nil` for the body since this is a `GET` request. The `SetBasicAuth()`
    built-in function sets the basic authentication with the user and the password
    supplied to the function. To make a call to the server, use the `http.DefaultClient.Do()`
    function. Then you perform validations to check if the returned response has an
    `OK` status.


    ```

    package main

    import (

    "fmt"

    "log"

    "net/http"

    )

    func authRequest(user, url, passwd string) error {

    req, err := http.NewRequest("GET", url, nil)

    if err != nil {

    return err

    }

    req.SetBasicAuth(user, passwd)

    resp, err := http.DefaultClient.Do(req)

    if err != nil {

    return err

    }

    if resp.StatusCode != http.StatusOK {

    return fmt.Errorf("bad status: %d %s", resp.StatusCode, resp.Status)

    }

    return nil

    }

    func main() {

    user, passwd := "joe", "baz00ka"

    url := fmt.Sprintf("https://httpbin.org/basic-auth/%s/%s", user, passwd)

    if err := authRequest(user, url, passwd); err != nil {

    log.Fatal(err)

    }

    fmt.Println("OK")

    }

    Listing 7-2

    Go Recipe on Authentication and Writing an HTTP Server in Go

    ```


    **/*Output:**


    ```

    OK

    */

    ```


    If you were to use the `httpbin.org` website to generate HTTP requests and responses,
    the results you’d get are illustrated in Figure [7-2](#536365_1_En_7_Chapter.xhtml#Fig2).


    ![](images/536365_1_En_7_Chapter/536365_1_En_7_Fig2_HTML.jpg)


    A structure of an H T T P response includes a response body and response headers.
    The response body contains authenticated users. Response headers contain the date,
    content type and length, connection, and server.


    Figure 7-2


    HTTP response structure when using httpbin.org


    Let’s look at another example, shown in Listing [7-3](#536365_1_En_7_Chapter.xhtml#PC5),
    this time of an HTTP server that accepts metrics. Here, a metric is a JSON object
    that has host time, CPU, and memory. In the Go recipe, you define a struct called
    `Metric` to match the definitions in the JSON object, that is, the struct has
    member fields called `time`, `host`, `CPU`, and `memory`. The `handleMetrics()`
    function handles the HTTP requests. It takes input in the `w` variable, which
    is of type `http.ResponseWriter`, used to send the response back to the client,
    and `r` of type `http.Request`. Within the function, you first check to see that
    the request is a `POST` request. If it’s not, you issue an error. To limit the
    amount of data to be read, you set a maximum size, `maxSize`, in megabytes; this
    is 1MB in this case. You add the metric to the database and print out that the
    metric was added. To send the response back to the user, you set the `Header`
    of the response first. Now you create a response, which in this case is a map
    from a string to the empty interfaces with the `id` that you got from the server.
    You use `json.NewEncoder` to encode the response into `W`, sending it back to
    the client if there is an error. You cannot change the `HTTP status code`, so
    you just log the error.


    ```

    package main

    import (

    "encoding/json"

    "gorilla/mux"

    "io"

    "log"

    "net/http"

    "time"

    )

    // DB is a database

    type DataBase struct{}

    // Add adds a metric to the database

    func (db *DataBase) Add(m Metric) string {

    return "success"

    }

    type Metric struct {

    Time   time.Time `json:"time"`

    Host   string    `json:"host"`

    CPU    float64   `json:"cpu"`    //CPU load

    Memory float64   `json:"memory"` //MB

    }

    func handleMetric(w http.ResponseWriter, r *http.Request) {

    if r.Method != "POST" {

    http.Error(w, "This Method is Not Allowed", http.StatusMethodNotAllowed)

    return

    }

    var db *DataBase

    defer r.Body.Close()

    var m Metric

    const maxSize = 1 << 20 //MB

    dec := json.NewDecoder(io.LimitReader(r.Body, maxSize))

    if err := dec.Decode(&m); err != nil {

    log.Printf("Error Decoding: %s", err)

    http.Error(w, err.Error(), http.StatusBadRequest)

    return

    }

    id := db.Add(m)

    log.Printf("metric: %+v (id=%s)", m, id)

    w.Header().Set("Content-Type", "application/json")

    resp := map[string]interface{}{

    "id": id,

    }

    if err := json.NewEncoder(w).Encode(resp); err != nil {

    log.Printf("error reply: %s", err)

    }

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/metrics.json", handleMetric).Methods("POST")

    http.Handle("/", r)

    if err := http.ListenAndServe(":8080", nil); err != nil {

    log.Fatal(err)

    }

    }

    Listing 7-3

    Go Recipe on Authentication and Writing HTTP Server That Accepts Metrics

    ```


    **Output:**


    1.  Open a terminal from the folder where your source code resides and run the
    file using the `go run filename.go` command.


    2.  Open another terminal and run the following command to send the metric to
    the server:


    ![](images/536365_1_En_7_Chapter/536365_1_En_7_Figa_HTML.jpg)


    A code shows a curl command.


    1.  Upon success, you will get the following output on the first terminal running
    the server:


    ![](images/536365_1_En_7_Chapter/536365_1_En_7_Figb_HTML.jpg)


    A code illustrates a go run code.'
