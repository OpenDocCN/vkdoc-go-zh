    #### Nil Slice


    A slice is initialized as `nil` by default if it is declared with no inputs. Also,
    the length and capacity of such a slice is zero. Listing [2-24](#536365_1_En_2_Chapter.xhtml#PC37)
    demonstrates the concept of `nil` slices in Go.


    ```

    package main

    import "fmt"

    func main() {

    var marks []float64       //declaring slice of float type

    printItemsOfSlice(marks)  //pass slice to a function

    if marks == nil {

    fmt.Printf("Slice is Nil")

    }

