- fmt: '# Math Operators and Packages


    Go supports the same set of mathematical operators as other C-style languages,
    including the usual arithmetic operators, all the bitwise operators, assignment
    operators, and relational operators. Tables [2-2](#536365_1_En_2_Chapter.xhtml#Tab2)
    through [2-6](#536365_1_En_2_Chapter.xhtml#Tab6) list all of the operators in
    Go.


    **Table 2-6** — List of Assignment Operators in Go


    | **Assignment Operator** | Description |

    |---|---|

    | `=` | Simple assignment operator. The left operand is assigned the value of
    the right operand. For example, `Z = X + Y` will assign `Z` the calculated value
    of `X + Y`. |

    | `+=` | Add and assignment operator. The value stored in the right operand is
    added to the value of the left operand and the result is assigned to the left
    operand. For example, `X += Y` is equivalent to `X = X + Y`. |

    | `-=` | Subtract and assignment operator. The value stored in the right operand
    is subtracted from the value of the left operand and the result is assigned to
    the left operand. For example, `X -= Y` is equivalent to `X = X - Y`. |

    | `*=` | Multiply and assignment operator. The value stored in the right operand
    is multiplied by the value of the left operand and the result is assigned to the
    left operand. For example, `X *= Y` is equivalent to `X = X * Y`. |

    | `/=` | Divide and assignment operator. The value stored in the right operand
    is divided by the value of the left operand and the result is assigned to the
    left operand. For example, `X /= Y` is equivalent to `X = X / Y`. |

    | `%=` | Modulus and assignment operator. The value stored in the right operand
    is divided by the value of the left operand and the remainder of the division
    is assigned to the left operand. For example, `X %= Y` is equivalent to `X = X
    % Y`. |

    | `<<=` | Left shift and assignment operator. The value of the left operand is
    shifted to the left by the number of times specified by the right operand. For
    example, `X <<= 1` is equivalent to `X = X << 1`. |

    | `>>=` | Right shift and assignment operator. The value of the left operand is
    shifted to the right by the number of times specified by the right operand. For
    example, `X >>= 1` is equivalent to `X = X >> 1`. |

    | `&=` | Bitwise `AND` assignment operator. For example, `Y &= 3` is equivalent
    to `Y = Y & 3`. |

    | `^=` | Bitwise exclusive `OR` and assignment operator. For example, `Y ^= 3`
    is equivalent to `Y = Y ^ 3`. |

    | `&#124;=` | Bitwise inclusive `OR` and assignment operator. For example, `Y
    &#124;= 3` is equivalent to `Y = Y &#124; 2`. |


    **Table 2-5** — List of Logical Operators in Go


    | **Logical Operator** | Description |

    |---|---|

    | `&&` | Logical `AND` operator. Returns `false` if both operands are `false`
    and `true` if both the operands are `true`. |

    | `&#124;&#124;` | Logical OR operator. Returns `true` if any of the operands
    are `true`. |

    | `!` | Logical `NOT` operator. Reverses the logical state of its operand, i.e.,
    changes `true` to `false` and vice versa. |


    **Table 2-4** — List of Relational Operators in Go


    | **Relational Operator** | Description |

    |---|---|

    | `==` | Checks if the two operands have equal values, if they do, it returns
    `true`. |

    | `!=` | Checks if the two operands have unequal values, if they do, it returns
    `true`. |

    | `>` | Checks if the left operand is greater than the right operand, if it is,
    it returns `true`. |

    | `<` | Checks if the left operand is less than the right operand, if it is, it
    returns `true`. |

    | `<=` | Checks if the left operand is less than or equal to the right operand,
    if it is, it returns `true`. |

    | `>=` | Checks if the left operand is greater than or equal to the right operand,
    if it is, it returns `true`. |


    **Table 2-3** — List of Bitwise Operators in Go


    | **Bitwise Operator** | Description |

    |---|---|

    | `&` | Binary `AND` operator. If the bit is present in both operands, the binary
    and operator copy it to the result. |

    | `&#124;` | Binary `OR` operator. If the bit is present in either of the operands,
    the binary or operator copies it to the result. |

    | `^` | Bitwise `XOR` operator. If the bit is set in any operand, the bitwise
    `xor` operator copies the bit. |

    | `&^` | Bit clear. |

    | `<<` | Left shift operator. Shifts the left operand’s value to the left by the
    number of bits specified by the right operand. |

    | `>>` | Right shift operator. Shifts the left operand’s value to the right by
    the number of bits specified by the right operand. |


    **Table 2-2** — List of Arithmetic Operators in Go


    | **Arithmetic Operator** | Description |

    |---|---|

    | `+` | Sum operator is used for addition. |

    | `-` | Difference operator is used for finding differences. |

    | `*` | Multiply operator is used for finding products. |

    | `/` | Quotient operator is used for finding the quotient after division. |

    | `%` | Remainder operator is used for finding the remainder after division. |

    | `--` | Decrement operator decreases one from the value of its operand and stores
    the result in the operand. |

    | `++` | Increment operator increases one from the value of its operand and stores
    the result in the operand. |


    Note that Go doesn’t support implicit conversion of numeric types. This means
    that, for example, you cannot take an integer value and add it to a floating-point
    value without converting it.


    Listing [2-8](#536365_1_En_2_Chapter.xhtml#PC11) contains two variables, one an
    integer and another a float. When you try to add them, this will result in the
    `"invalid operation"` error, crashing the application.


    ```

    var anInt int = 5

    var aFloat float32 = 42

    sum := anInt + aFloat  //invalid operation

    fmt.Printf("Sum: %v, Type: %T \n", sum, sum)

    ```


    Listing 2-8 — Illustration of Go Not Supporting Implicit Conversion of Numeric
    Types


    **Output:**


    A screenshot of the output of invalid operation mismatched types `int` and `float64`
    compiler (mismatched type).


    In order to correctly perform this operation, you must convert one of these variables
    to match the type of the other. To achieve this goal, you have to wrap the value
    in the target type as a function call, as shown in Listing [2-9](#536365_1_En_2_Chapter.xhtml#PC12).


    ```

    var anInt int = 5

    var aFloat float32 = 42

    sum := float32(anInt) + aFloat

    fmt.Printf("Sum: %v, Type: %T \n", sum, sum)

    ```


    Listing 2-9 — Explicit Conversion of Numeric Types in Go


    **Output:**


    ```

    Sum: 47, Type: float32

    ```


    ## The Math Package


    To perform different math operations, you use the `Math` package. It contains
    different functions and constants like `pi`. Go offers many tools for mathematical
    operations, operators and members of the `math` package, including functions and
    constants. Listing [2-10](#536365_1_En_2_Chapter.xhtml#PC14) illustrates the use
    of functions and constants from the `Math` package. For more information on the
    `Math` package, refer to the [official documentation](https://pkg.go.dev/math)
    at `https://pkg.go.dev/math`.


    ```

    package main

    import (

    "fmt"

    "math"

    )

    func main() {

    i1, i2, i3 := 12, 45, 68

    intSum := i1 + i2 + i3

    fmt.Println("Integer Sum: ", intSum)

    f1, f2, f3 := 23.5, 65.1, 76.3

    floatSum := f1 + f2 + f3

    fmt.Println("Float Sum: ", floatSum)

    floatSum = math.Round(floatSum)

    fmt.Println("Rounded Sum is: ", floatSum)

    floatSum = math.Round(floatSum*100) / 100

    fmt.Println("Sum Rounded To Nearest 2 Decimals: ", floatSum)

    circleRadius := 15.6

    circumference := circleRadius * 2 * math.Pi

    fmt.Printf("Circumference: %.2f\n", circumference)

    }

    ```


    Listing 2-10 — Basic Program Illustrating the Use of the Math Package in Go'
