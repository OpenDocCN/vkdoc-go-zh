- fmt: '#### The `append()` and `copy()` Functions


    In Go, the `append()` function increases the capacity of a slice. The `copy()`
    function copies contents of a source slice into a destination slice. Listing 2-26
    shows the use of these two functions in Go.


    ```

    package main

    import "fmt"

    func main() {

    /* Declaring a slice of int type */

    var nums []int

    /* pass slice to user-defined function to print details */

    printSliceDetails(nums)

    /* Nil slice are allowed with Append */

    nums = append(nums, 10)

    printSliceDetails(nums)

    /* Adding one element to the slice */

    nums = append(nums, 100)

    printSliceDetails(nums)

    /* At one time adding more than one element to the slice */

    nums = append(nums, 1000, 10000, 100000)

    printSliceDetails(nums)

    /* Creating a slice nums1 that has double the capacity of nums slice*/

    nums1 := make([]int, len(nums), (cap(nums))*2)

    /* Copy the elements stored in nums into nums1 */

    copy(nums1, nums)

    /* pass slice to user-defined function to print details */

    printSliceDetails(nums1)

    var colors = []string{"Red", "Green", "Blue"}

    fmt.Println("Before: ", colors)

    colors = append(colors[1:len(colors)])

    fmt.Println("Items after removig 1st element:", colors)

    }

    func printSliceDetails(x []int) {

    fmt.Printf("Length=%d Capacity=%d Slice=%v\n", len(x), cap(x), x)

    }

    Listing 2-26

    Using the Append and Copy Functions in Go

    ```


    **Output:**


    ```

    Length=0 Capacity=0 Slice=[]

    Length=1 Capacity=1 Slice=[10]

    Length=2 Capacity=2 Slice=[10 100]

    Length=5 Capacity=6 Slice=[10 100 1000 10000 100000]

    Length=5 Capacity=12 Slice=[10 100 1000 10000 100000]

    ```


    To remove items from a slice, you can also use the `append()` function, but this
    time indicate the range in the format of two numbers separated by a colon wrapped
    in parentheses, as shown in Listing 2-27.


    ```

    var colors = []string{"Red", "Green", "Blue"}

    fmt.Println("Before: ", colors)

    colors =  append(colors[1:len(colors)])

    fmt.Println("Items after removing 1st element: ", colors)

    Listing 2-27

    Using the Append Function to Remove Items from a Slice

    ```


    **Output:**


    ```

    Before:  [Red Green Blue]

    Items after removing 1st element: [Green Blue]

    ```


    In Listing 2-27, the first item is removed because that range is telling it to
    start with the item in array at index one, which is the second item.


    However, in the `colors = append(colors[:len(colors)-1])` statement, if the starting
    index in the range is eliminated and instead you pass `colors[:len(colors)-1]`,
    the last item will be removed from the slice.


    #### Sorting Slices


    As shown in Listing 2-28, you can also perform sorting on slices using the `sort`
    package in Go. The `sort` function has multiple functions for sorting different
    data types. By default, the slice will be sorted in numerical order from lowest
    to highest using the `sort()` function. For more information, refer to the official
    developer documentation on the [sort package](https://pkg.go.dev/sort) at `https://pkg.go.dev/sort`.
    Note that, using the `sort()` function, you can also sort user-defined data collections.


    ```

    package main

    import (

    "fmt"

    "sort"

    )

    func main() {

    intSlice := make([]int, 5)

    intSlice[0] = 6

    intSlice[1] = 99

    intSlice[2] = 45

    intSlice[3] = 34

    intSlice[4] = 1

    fmt.Println("Original Slice: ", intSlice)

    sort.Ints(intSlice)

    fmt.Println("Sorted Slice: ", intSlice)

    }

    Listing 2-28

    Using Sort Function to Sort Slices

    ```


    **Output:**


    ```

    Original Slice:  [6 99 45 34 1]

    Sorted Slice:  [1 6 34 45 99]

    ```


    ## Maps


    A map, in Go language, can be considered an unordered collection of key-value
    pairs. In other terms, a map can be considered a hash table that allows storage
    of collections of data from which values can then be retrieved arbitrarily based
    on their keys.


    Note that, as the keys are compared for sorting purposes, a map’s keys should
    be of any type that’s comparable. However, it’s a usual practice of using string
    type for keys and any other valid type for the associated values.


    ### Defining Maps


    The `make()` function allocates and initializes a non-zero storage when used to
    declare complex data types. Therefore, it is a must to use the `make()` function
    to declare a map object. The general format for declaring a map is as follows:


    `map_variable := make(map[key_data_type]value_data_type)`


    ### Adding Entries to a Map Object


    To add an entry into the map object, use this general format: `map_variable_name[key]
    = value`. Note that because the `map` is an unordered collection of items, the
    order in which the items will be displayed is not always guaranteed.


    ### Deleting Entries from a Map Object


    In Go, to delete a map’s entry (i.e., a key-value pair stored in the map), you
    use a built-in function called `delete()`. The `delete()` function takes two arguments—the
    map whose entry is to be deleted and the key to delete. The general format to
    achieve this is `delete(map_variable, key)`.'
