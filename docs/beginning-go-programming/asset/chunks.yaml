    ## Modularizing and Organizing Code into Packages


    Make sure to keep in mind scalability and complexity when you decide on the folder
    structure for your project. In Go, every source file belongs to a certain package.
    Hence, every program begins with the package statement, which indicates the name
    of the package the source file belongs to. In the case of very small programs,
    the only package that’s required is the `main` package. It is best practice to
    make sure that packages don’t have long names. When a package has multiple files,
    a `doc.go` file should be maintained that contains package documentation. For
    more on best practices regarding packages, refer to [`https://talks.golang.org/2014/organizeio.slide#2`](https://talks.golang.org/2014/organizeio.slide%25232).


    ## Dependency Package Management


    Unfortunately, Go does not have its own dependency package management system.
    This can become challenging in a Continuous Integration (CI) environment or when
    multiple developers are working on a project. Nevertheless, the Go community has
    proposed several solutions to overcome this drawback. Go Package Manager ([`gpm`](https://github.com/pote/gpm))
    ([`https://github.com/pote/gpm`](https://github.com/pote/gpm)) is considered one
    of the simplest working solutions. It is essentially a simple bash script that
    can be modified are therefore copied to each of the required repositories ([`https://gist.github.com/mattetti/9334318`](https://gist.github.com/mattetti/9334318)).
    It uses a custom file named `Godeps` that lists the names of the packages that
    need to be installed to avoid dependency issues. For more information on how to
    manage dependencies in your code, refer to [`https://go.dev/doc/modules/managing-dependencies`](https://go.dev/doc/modules/managing-dependencies).


    ## Compiler Optimizations


    Developers typically use different flags, known as `gcflags`, at build time in
    order to know what optimizations and memory management techniques are being applied
    by the compiler. Listing [9-2](#536365_1_En_9_Chapter.xhtml#PC5) illustrates using
    compiler flags.


    ```

    package main

    import (

    "fmt"

    )

    type UserData struct {

    ID       int

    Name     string

    Location string

    }

    func (user *UserData) GreetUser() string {

    return fmt.Sprintf("Hello %s from %s",

    user.Name, user.Location)

    }

    func CreateNewUser(id int, name, location string) *UserData {

    id++

    return &UserData{id, name, location}

    }

    func main() {

    user := CreateNewUser(10, "Maryam", "PK")

    fmt.Println(user.GreetUser())

    }

    Listing 9-2

    Basic Program Illustrating the Use of Compiler Flags

    ```


    Suppose this file is called `gcflags-eg.go`. You can build this file while also
    passing `gcflags` with the `build` command, as shown in Figure [9-1](#536365_1_En_9_Chapter.xhtml#Fig1).


    ![](images/536365_1_En_9_Chapter/536365_1_En_9_Fig1_HTML.jpg)


    A set of codes with 18 command line arguments starting with g c flags.


    Figure 9-1


    Sample output of compiling files with gcflags on


    One of the optimizations that can be noticed from the output shown here is [*function
    inlining*](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go) ([`https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go`](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go)).
    Function inlining is used to reduce function call overhead and is done by moving
    the function body to the function call. For example, the `GreetUser()` function
    is defined at line#13 and inlined at line#25\. For more information about how
    inlining improves the performance of Go programs, refer to [`http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast`](http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast).
    In essence, an equivalent of the following listing is created by the compiler.


    ```

    func main() {

    id := 12 + 1

    user := &UserData{id, "Maryam", "PK"}

    fmt.Println(user.Greetings())

    }

    ```


    ## Using Git’s SHA to Set the Build ID


    Burning build IDs into binaries is usually very useful. Using the Git command’s
    SHA1 is one way to achieve this. The first step is to use the Git command to fetch
    the short version of the SHA1 of the latest commit from your repository `git rev-parse
    --short HEAD`. After this, as shown in the following listing, you have to set
    an exported variable, in this case `Build`, whose value will be set at compilation
    time through the `-ldflags` flag.


    ```

    package main

    import "fmt"

    var Build string

    func main() {

    fmt.Printf("Build ID: %s\n", Build)

    }

    ```


    Save the previous listing in a file named `buildId-eg.go`. Simply compiling the
    code will not set the build; you have to set the build value by using the following
    Go command:


    ```

    $ go build -ldflags "-X main.Build m9163zh" buildId-eg.go

    ```


    In order to make sure that your build ID is set, run and check your build. This
    build ID can then be used in the deployment compilation process of your application.


    ```

    Build ID: m9163zh

    ```


    ## The Case of Elegant Constants, aka IOTA


    There are times when the names of concepts matter greatly, especially in code,
    as shown in Listing [9-3](#536365_1_En_9_Chapter.xhtml#PC10).


    ```

    const (

    CCRamada    = "Ramada"

    CCMarriot   = "Marriot"

    CCHilton    = "Hilton"

    )

    Listing 9-3

    Giving Proper Names to Concepts to Distinguish Them

    ```


    However, at other times, you’ll only need to differentiate one thing from another
    and the names don’t matter. For example, when storing information about categories
    of products in a database, it is possible that instead of storing categories as
    string values by names, you’ll want to have integer values to distinguish them
    because the categories of products change over time. One of the ways to do this
    is shown in Listing [9-4](#536365_1_En_9_Chapter.xhtml#PC11).


    ```

    const (

    CatElectronics  = 0

    CatAppliances   = 1

    CatHardware     = 2

    )

    Listing 9-4

    Using Integer Values to Distinguish Concepts

    ```


    Note that in this example, we use 0, 1, and 2 as values for constants. However,
    these are arbitrary values and it’s up to the programmers to choose whatever they
    desire.


    Even though constants are considered important, at times they can be difficult
    to interpret and maintain. Due to these reasons, developers in some languages
    like Ruby avoid using them. However, there are certain subtle features of constants
    in Go that make the code maintainable and elegant when they are used well and
    cautiously.


    ### Auto Increment


    One handy trick to implement auto-increment in Go is using the IOTA identifier.
    Using IOTA essentially simplifies the constant definitions. As shown in Listing
    [9-5](#536365_1_En_9_Chapter.xhtml#PC12), you can use IOTA to assign the same
    values as assigned in the example from the previous section.


    ```

    const (

    CatElectronics  = iota    //0

    CatAppliances             //1

    CatHardware               //2

    )

    Listing 9-5

    Auto-Increment Using IOTA Identifiers

