- fmt: '# JSON


    The data returned as a response to a request made to a web service is commonly
    encoded in the JSON format. To facilitate working with web services and APIs,
    Go offers support for handling JSON-formatted data in the form of the `json` package.
    The `json` package allows you to easily create and read text that is in the JSON
    format. In the previous section, you learned how to get JSON data from a web service.
    In this section, you learn how to parse the JSON data and format it into structured
    data for use in your Go applications. Listing [2-58](#536365_1_En_2_Chapter.xhtml#PC97)
    is a demonstration of how to parse JSON data and format it into structured data.
    It parses the tour name and price from the received JSON data.


    In Listing [2-58](#536365_1_En_2_Chapter.xhtml#PC97), you first create a new custom
    type named `Tour`, which will be a struct with two member fields of `string` type—`Name`
    and `Price`. Note that to make these field names public, they start with an uppercase
    character. Also note that in the JSON content the labels are all in lowercase.
    However, the JSON decoder is not affected by this, as it can easily match these
    labels to the members of the struct. For this example, we imported the [`encoding/json`](https://pkg.go.dev/encoding/json)
    (https://pkg.go.dev/encoding/json), [`io/ioutil`](https://pkg.go.dev/io/ioutil)
    (https://pkg.go.dev/io/ioutil), [`net/http`](https://pkg.go.dev/net/http) (https://pkg.go.dev/net/http)
    and [`strings`](https://pkg.go.dev/strings) (https://pkg.go.dev/strings) packages.


    The `toursFromJson()` function is a custom function used to decode the body content
    in the JSON format of the HTTP response. It takes one argument, which is the JSON-formatted
    string fetched from the website. The function will return these values as structured
    data, specifically a slice containing instances of that `tour` object.


    Within the `toursFromJson()` function, the first step is to create a slice `tour`
    of tour objects. The tour slice is initially set to size zero and an initial capacity
    of 20. Note that 20 is just a guess and not the exact number of objects that might
    be fetched. As slices can resize dynamically, you don’t have to give a large initial
    capacity. The `NewDecoder()` built-in function returns a decoder that will read
    from the reader object passed to it. The `NewReader()` returns a reader that reads
    from the string passed to it. The `Token()` function returns the next JSON token
    in the input stream.


    To transform the JSON-formatted text into the slice of tour objects, you declare
    a variable named `tours` and set its type to `Tour`. Next, a `while`-style `for`
    loop is used; the `decoder.More()` function reports whether or not any other elements
    are present in the current array or any other object is getting parsed. Within
    the `for` loop, the `Decode()` function of the decoder object reads the next JSON-encoded
    value from its input and stores it in the value pointed to by the argument passed
    to it. You pass the memory address of the `tour` object. Then you add the `tour`
    object to the `tours` slice using the `append()` function. In the end, the `tours`
    object is returned from the function.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io/ioutil"

    "net/http"

    "strings"

    )

    const url = "http://services.explorecalifornia.org/json/tours.php"

    func main() {

    resp, err := http.Get(url)

    if err != nil {

    panic(err)

    }

    fmt.Printf("Response Type: %T\n", resp)

    defer resp.Body.Close()

    bytes, err := ioutil.ReadAll(resp.Body)

    if err != nil {

    panic(err)

    }

    content := string(bytes)

    tours := toursFromJson(content)

    for _, tour := range tours {

    fmt.Println(tour.Name, "  ", tour.Price)

    }

    }

    func toursFromJson(content string) []Tour {

    tours := make([]Tour, 0, 20) //slice of Tour array with initial size 0 and capacity
    20

    decoder := json.NewDecoder(strings.NewReader(content))

    _, err := decoder.Token()

    if err != nil {

    panic(err)

    }

    var tour Tour

    for decoder.More() {

    err := decoder.Decode(&tour)

    if err != nil {

    panic(err)

    }

    tours = append(tours, tour)

    }

    return tours

    }

    type Tour struct {

    Name, Price string

    }

    Listing 2-58

    Basic Program Illustrating How to Handle JSON Data in Go

    ```


    **Output:**


    ```

    2 Days Adrift the Salton Sea    350

    A Week of Wine    850

    Amgen Tour of California Special    6000

    Avila Beach Hot springs    1000

    Big Sur Retreat    750

    Channel Islands Excursion    150

    Coastal Experience    1500

    Cycle California: My Way    1200

    Day Spa Package    550

    Endangered Species Expedition    600

    Fossil Tour    500

    Hot Salsa Tour    400

    Huntington Library and Pasadena Retreat Tour    225

    In the Steps of John Muir    600

    Joshua Tree: Best of the West Tour    150

    Kids L.A. Tour    200

    Mammoth Mountain Adventure    800

    Matilija Hot springs    1000

    Mojave to Malibu    200

    Monterey to Santa Barbara Tour    2500

    Mountain High Lift-off    800

    Olive Garden Tour    75

    Oranges & Apples Tour    350

    Restoration Package    900

    The Death Valley Survivor''s Trek    250

    The Mt. Whitney Climbers Tour    650

