    # 使用 `gorilla/mux` 实现 REST


    `net/http` 包内置的 `HTTP` 服务器功能强大，但也非常简单。有时仅使用内置 HTTP 服务器就能满足需求；然而，为项目添加外部依赖的风险比你想象的更大。建议阅读
    [`https://research.swtch.com/deps`](https://research.swtch.com/deps) 上的研究论文，这是一篇关于软件依赖问题的推荐读物。它解释了为什么依赖存在风险，以及为何应尽可能避免使用依赖。尽管
    `net/http` 包提供了多项功能来完成与 HTTP 协议相关的不同任务，但在某些情况下（尤其是编写复杂 API 时），拥有功能更丰富的 `routers`
    会非常方便。`net/http` 包在处理复杂的请求路由（例如将请求 URL 拆分为单个参数）时表现欠佳。`gorilla/mux` 包在这种情况下就能派上用场，因为它能够创建带有命名参数、域名限制和
    `GET/POST` 处理器的路由。


    `gorilla/mux` 包包含请求路由器和分发器的实现，可用于将传入请求匹配到各自对应的处理器。这里的 `mux` 是 `HTTP 请求多路复用器` 的缩写。`gorilla/mux`
    包中的 `mux.Router` 能够将任何传入请求与已注册的路由列表进行匹配，然后根据匹配的 URL 或其他条件，调用相应路由对应的处理器函数。本节包含一个基于使用
    `mux 路由器` 的示例。


    假设你经营一家书店，用户正在请求一本图书。作为响应，用户会收到包含书名、作者和 ISBN 的图书信息。用户发起请求时，会使用 `/books/author/ISBN`
    的格式。首先，你需要定义一个名为 `Book` 的结构体，用于存储图书信息。处理器函数 `handleGetBook()` 接收一个 `ResponseWriter`
    和 `request` 作为参数。`gorilla/mux` 包中的 `mux.Vars(r)` 函数，以 `http.Request` 对象作为输入参数，并返回一个包含路径段落的
    `map`。通过对请求使用 `mux.Vars()` 提取变量，并从路径中获取 `ISBN`，然后 `getBook()` 函数从数据库中获取图书信息。如果数据库中不存在该图书，则记录日志并向客户端返回错误信息。如果图书存在，你可以将
    `content-type` 设置为 `application/json`，并使用 `json.Encoder` 将数据编码后返回给客户端。


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "log"

    "net/http"

    "github.com/gorilla/mux"

    )

    //Book 存储图书信息

    type Book struct {

    Title  string `json:"title"`

    Author string `json:"author"`

    ISBN   string `json:"isbn"`

    }

    // isbn -> book

    var booksDB = map[string]Book{

    "0062225677": {

    Title:  "The Colour of Magic",

    Author: "Terry Pratchett",

    ISBN:   "0062225677",

    },

    "0765394855": {

    Title:  "Old Mans War",

    Author: "John Scalzi",

    ISBN:   "0765394855",

    },

    }

    func getBook(isbn string) (Book, error) {

    book, ok := booksDB[isbn]

    if !ok {

    return Book{}, fmt.Errorf("未知的 ISBN: %q", isbn)

    }

    return book, nil

    }

    func handleGetBook(w http.ResponseWriter, r *http.Request) {

    vars := mux.Vars(r)

    isbn := vars["isbn"]

    book, err := getBook(isbn)

    if err != nil {

    log.Printf("错误 - 获取: 未知的 ISBN - %q", isbn)

    http.Error(w, err.Error(), http.StatusNotFound)

    return

    }

    w.Header().Set("Content-Type", "application/json")

    if err := json.NewEncoder(w).Encode(book); err != nil {

    log.Printf("错误 - json: %s", err)

    }

    fmt.Println(w.Write(book))

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/books/{isbn}", handleGetBook).Methods("GET")

    http.Handle("/", r)

    if err := http.ListenAndServe(":8080", nil); err != nil {

    log.Fatal(err)

    }

    }

    清单 7-4

    使用 gorilla/mux 包的 Go REST 示例

    ```


    **输出:**


    1.  打开终端，使用 `go run` 命令运行包含此清单的文件。例如，如果你的文件名为 `code-7.4.go`，则运行 `go run code-7.4.go`。


    2.  打开另一个终端，运行以下命令从服务器获取图书详细信息：


    ![](img/536365_1_En_7_Figc_HTML.jpg)


    一个代码示例展示了 `curl localhost`。


    请注意，为了成功运行代码片段，如果遇到与导入包相关的错误，请打开终端并运行以下命令：


    - `cd [你的源代码目录]`

    - `go mod init`

    - `go get github.com/gorilla/mux`


    之后，重启你的 IDE。如需更多信息，请运行 `go help mod`。


    ## 动手挑战


    此挑战要求你在 HTTP 数据库及其客户端的内存中编写键值对。为此，支持的功能列表包括：


    - `Get()` 从内存中获取键值

    - `Set()` 将从标准输入接收的数据设置为键值

    - `List()` 列出所有已存储的键


    你需要为客户端和服务端分别实现代码。


    对于客户端，你应该使用 `flag` 包执行命令行参数解析。同时，使用 `switch` 语句根据接收到的输入执行相应的功能。对于服务端代码，请使用 `gorilla/mux`
    包；`db` 变量数据库将是一个内存中的 `map`。同时，使用 `sync.RWMutex` 类型的 `dbLock` 来保护数据库免受死锁影响。你还需要为
    `Get`、`Set` 和 `List` 键请求编写处理器函数。为了执行服务端代码的路由，你必须在 `main()` 中创建一个路由器，并使用 `http.Handle()`
    处理路由。

