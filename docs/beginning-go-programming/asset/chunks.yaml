    # Go 字符串格式化与 Unicode 处理


    计算机最初是为英国和美国等英语国家开发的。当时，单个字节的容量最多为 255 个数字，足以使用 ASCII 格式表示英文字母表。然而，当其他国家开始使用计算机时，便需要用多个字节来编码字母。因此，Unicode
    应运而生。在 Unicode 中，字符或码点被编码为特定的数字。这些数字又根据编码方案被编码为字节。例如，UTF-8 用于编码代码字符串。在 Go 中，Unicode
    码点被称为 *rune*。此外，Unicode 被设计为 ASCII 格式的超集。而且，Unicode 旨在涵盖世界上所有书写系统中的字符，包括多种变音符号、不同的重音符号以及控制码（如回车符、制表符等）。


    清单 4-1 中展示的 Go 代码片段演示了一个函数，该函数返回给定句子中的字符总数。给定的输入也可以包含 Unicode 格式的字符。一个句子作为输入参数传递给
    `lineLength()` 函数。该输入本质上是一个名为 `word` 的字符串切片。你必须计算以字符为单位的单词长度。请记住，这与以字节为单位计算长度不同。如果使用内置函数
    `len()`，它将返回字节长度。另一方面，如果使用 `unicode/utf` 包中的 `RuneCountInString()` 函数，它会返回字符串中的
    rune 总数。由于 `for` 循环只会遍历每个单词，为了记录空格的数量，你可以使用公式 `(单词长度)-1`。在函数末尾，返回总数与空格数之和。请注意，作为输入传递的字符串中的尖括号是
    Unicode 编码的。


    ```

    package main

    import (

    "fmt"

    "unicode/utf8"

    )

    func lineLength(words []string) int {

    total := 0

    for _, word := range words {

    total += utf8.RuneCountInString(word)

    }

    numSpaces := len(words) - 1

    return total + numSpaces

    }

