    **输出：**


    ```

    Pointer3:  1.0483870967741935

    Value3:  1.0483870967741935

    ```


    在第1行中，使用星号（`*`）运算符访问`pointer1`所指向的内存位置的值，将该值除以`31`，并将结果存储在同一位置。从输出中可以看到，`pointer1`和`value1`变量的值相同。


    ### 与Java及C风格语言的比较


    在Java或C#中，如果有一个原始变量和一个指向该变量的引用变量（指针），可以通过修改原始变量或修改指向它的变量来改变原始变量的值。但与Java不同的是，指针最初不必指向任何特定值，并且可以在运行时将其更改为指向另一个值。另一方面，Go中的指针与C、C#及其他类似语言中的指针非常相似且同样有价值。


    ## 数组和切片中的有序值


    本节讨论数组数据结构以及作为数组抽象的切片。


    ### Go中的数组


    与其他C风格语言一样，Go支持数组数据结构。Go中的数组用于存储固定大小的顺序元素集合，且所有元素类型相同。尽管数组通常被称为存储项目集合的容器，但它也可以被视为具有相同类型的变量的集合。此外，数组是连续的内存位置，其中数组的第一个元素对应最低地址，最后一个元素对应最高地址。还可以通过索引号访问数组的任意特定元素。数组的索引号范围从`0`到`size-1`，如图[2-10](#536365_1_En_2_Chapter.xhtml#Fig10)所示。根据该图，要访问第二个索引（即第三个元素）处的元素，可以使用`array_name[2]`，这将得到值`11`。


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig10_HTML.jpg)


    一个表格表示展示了Go中的数组。它可以访问元素1、2、3、4到n以及索引0、1、2、3到n。


    图2-10


    Go中的数组


    #### 声明数组


    Go中数组声明的一般格式是`var array_name [SIZE] data_type`。注意，必须指定`data_type`，因为它指明了数组将要持有的元素类型。同时，元素总数（`SIZE`）也是必需的，因为它指明了数组的大小。以此格式声明的数组被称为*单维*数组。注意，`Size`必须是一个大于零的整数常量值。此外，任何有效的Go类型都可以用于指定`data_type`，即数组可以持有的元素类型。例如，语句`var
    floatArray [10] float32`声明了一个包含十个元素的数组，名为`floatArray`，`data_type`为`float32`。


    #### 初始化数组


    Go中的数组可以逐个元素初始化，也可以使用单个语句初始化，如清单[2-18](#536365_1_En_2_Chapter.xhtml#PC27)所示。请记住，花括号`{
    }`中指定的项数不应超过方括号`[ ]`中指定的数组大小，如清单[2-18](#536365_1_En_2_Chapter.xhtml#PC27)所示。


    ```

    var floatArray = [5]float32{10.0, 200.0, 35.64, 78.0, 540.60}

    清单2-18

    在Go中初始化指定大小的数组

    ```


    如果省略了数组的大小，Go编译器会自动将数组大小设置为初始化语句中指定的项数。例如，清单[2-19](#536365_1_En_2_Chapter.xhtml#PC28)将创建一个大小为`5`的数组，因为该数组用五个值进行了初始化。


    ```

    var floatArray = []float32{10.0, 200.0, 35.64, 78.0, 540.60}

    清单2-19

    在Go中初始化未指定大小的数组

    ```


    #### 访问数组元素


    数组的单个元素可以通过数组名加索引的方式访问。具体做法是将所需元素的索引号放在紧跟数组名后的方括号`[]`中。例如，为数组的单个元素赋值，可以使用以下语句：


    ```

    balance[4] = 50.0

    ```


    该语句将赋值运算符右侧的值赋值给名为`balance`的数组中索引为4的元素。由于数组的索引号从`0`开始，该语句将值`50.0`赋值给了数组中的第五个元素。注意，数组的第一个索引也称为*基索引*，而最后一个索引总是`arraySize-1`。还要注意，赋值使用`=`运算符而不是`:=`运算符，因为数组的数据类型已经定义。图[2-11](#536365_1_En_2_Chapter.xhtml#Fig11)是对此处讨论概念的图示。


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig11_HTML.jpg)


    一个表格表示展示了数组中的数据存储概念。索引0到4的`balance`元素分别为`1000.0`、`2.0`、`3.4`、`7.0`和`50.0`。


    图2-11


    数组中的数据存储


    **示例**


    清单[2-20](#536365_1_En_2_Chapter.xhtml#PC30)展示了一个包含到目前为止所讨论所有概念的示例。


    ```

