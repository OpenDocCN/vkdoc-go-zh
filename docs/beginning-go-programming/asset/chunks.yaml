    the digital signature of the message when called. Since you want to perform the
    signature calculation only once, you call the member field of the message and
    then call the `Do()` built-in function to make a call to the `calcSig()` function
    to calculate the signature. The `m.once.Do(m.calcSig)` statement will only call
    the `calcSig()` function once. After that it will do nothing. This property is
    also known as *idempotence*. In the `calcSig()` function, the `sha1.New()` function
    is used to create a new hash. Then it copies the content to the variable containing
    the `sha1` hash and finally the `sig` field of the message to the cached signature.
    The “`Calculating Signature`” message is printed as output, and then the signature.
    When you do it the second time, you’ll see only the output.


    ```

