- fmt: '# REST with `gorilla/mux`


    The built-in `HTTP` server included in the `net/http` package is great, but it''s
    also very simple. At times it is possible that you can get by with just using
    the built-in HTTP server; however, adding external dependencies to a project is
    a bigger risk than you might think. Refer to the research paper at [`https://research.swtch.com/deps`](https://research.swtch.com/deps),
    which is recommended reading on software dependency problems. It explains why
    dependencies are risky and why you should avoid them as much as possible. Even
    though the `net/http` package provides several functionalities to accomplish different
    tasks related to the HTTP protocol, in some cases, especially when you''re writing
    complex APIs, it''s nice to have `routers` with more features. The `net/http`
    package performs poorly when it comes to complex request routing, for example,
    when splitting up a request URL into single parameters. The `gorilla/mux` package
    comes in handy in this situation due to its capabilities of creating routes with
    named parameters, domain restrictions, and `GET/POST` handlers.


    The `gorilla/mux` package contains the implementations of a request router and
    dispatcher that can be used to match incoming requests to their respective handlers.
    Here, `mux` is the abbreviation for `HTTP request multiplexer`. The `mux.Router`
    present in the `gorilla/mux` package has the capability of matching any incoming
    request(s) against a list of registered routes, then calling the respective handler
    function for the route based on the matching URL or any other condition(s). This
    section includes an example based on using `mux routers`.


    Say you have a bookstore and the user is requesting a book. In response, the user
    gets information about the book with the book title, author, and ISBN. When they
    call it, they''ll use `/books/author/ISBN`. You start by defining a struct named
    `Book` that holds the information about the book. The handler function, `handleGetBook()`,
    takes in a `ResponseWriter` and the `request`. The `gorilla/mux` package contains
    the `mux.Vars(r)` function, which takes an object of `http.Request` as an input
    argument and returns a `map` containing the segments as the output. To extract
    the `vars` with `mux.Vars()` on the request and get the `ISBN` from the path,
    the `getBook()` function gets the book from the database. If the book is not present
    in the database, you log and return an error for the client. If the book is in
    the database, you can set the `content-type` to `application/json` and use `json.Encoder`
    to encode it back to the client.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "log"

    "net/http"

    "github.com/gorilla/mux"

    )

    //Book is information about the book

    type Book struct {

    Title  string `json:"title"`

    Author string `json:"author"`

    ISBN   string `json:"isbn"`

    }

    // isbn -> book

    var booksDB = map[string]Book{

    "0062225677": {

    Title:  "The Colour of Magic",

    Author: "Terry Pratchett",

    ISBN:   "0062225677",

    },

    "0765394855": {

    Title:  "Old Mans War",

    Author: "John Scalzi",

    ISBN:   "0765394855",

    },

    }

    func getBook(isbn string) (Book, error) {

    book, ok := booksDB[isbn]

    if !ok {

    return Book{}, fmt.Errorf("unknown ISBN: %q", isbn)

    }

    return book, nil

    }

    func handleGetBook(w http.ResponseWriter, r *http.Request) {

    vars := mux.Vars(r)

    isbn := vars["isbn"]

    book, err := getBook(isbn)

    if err != nil {

    log.Printf("error - get: unknown ISBN - %q", isbn)

    http.Error(w, err.Error(), http.StatusNotFound)

    return

    }

    w.Header().Set("Content-Type", "application/json")

    if err := json.NewEncoder(w).Encode(book); err != nil {

    log.Printf("error - json: %s", err)

    }

    fmt.Println(w.Write(book))

    }

    func main() {

    r := mux.NewRouter()

    r.HandleFunc("/books/{isbn}", handleGetBook).Methods("GET")

    http.Handle("/", r)

    if err := http.ListenAndServe(":8080", nil); err != nil {

    log.Fatal(err)

    }

    }

    Listing 7-4

    Go Recipe on REST Using the gorilla/mux Package

    ```


    **Output:**


    1.  Open a terminal and enter the `go run` command with the file containing this
    listing. For example, if your filename is `code-7.4.go` then you would run `go
    run code-7.4.go`.


    2.  Open another terminal and run the following command to get the book details
    from the server:


    ![](images/536365_1_En_7_Chapter/536365_1_En_7_Figc_HTML.jpg)


    A code illustrates a `curl localhost`.


    Note that to successfully run the code snippets, if you encounter any errors related
    to importing packages, open the terminal and run these commands:


    - `cd [the dir of your source code]`

    - `go mod init`

    - `go get github.com/gorilla/mux`


    Afterward, restart your IDE. For more information, run `go help mod`.


    ## Hands-on Challenge


    For this challenge, you must write key-value pairs in the memory of the HTTP database
    and its client. To do this, the list of supported functions include:


    - `Get()` gets the key from the memory

    - `Set()` sets the key to the data as received from the standard input

    - `List()` lists all the stored keys


    You are required to implement code for the client and server sides.


    For the client, you are supposed to use the `flag` package to perform command-line
    flag parsing. Also, use the `switch` statement to perform the appropriate function
    based on the input you received. For the server code, use the `gorilla/mux` package;
    the `db` variable database will be an in-memory map. Also make `dbLock` of type
    `sync.RWMutex` guard the database from deadlocks. You also have handler functions
    for `Get`, `Set`, and `List` key requests. To perform routing for the server code,
    you must create a router in `main()` and use `http.Handle()` to handle the routing.'
