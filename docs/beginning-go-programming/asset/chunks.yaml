    # Summary


    This chapter covered the basic programming fundamentals you need to get started
    programming in Go, ranging from how to install the Go compiler and different IDEs
    available, the program structure of Go, to programming concepts. You also gained
    insight into how to use different data structures and programming features like
    variables, taking user input, available math operators and packages, managing
    memory and referencing values, and using pointers. You learned how to manage ordered
    values using arrays and slices, how to use maps to store key-value pairs, and
    how to define user-defined types using structs.


    Managing program flow is a key point in programming, and this chapter also provided
    guidance into how to control the flow using different conditional statements,
    like `if`, `if..else`, `switch`, and `goto`. You also learned about the only type
    of loop available in Go that can be used in whichever way possible to achieve
    desired results.


    Functions are an important part of modular programming. This chapter also covered
    how to use user-defined functions and attach methods to slices in Go. Another
    important capability of any program is the ability to read and write to files.
    This chapter also provided details into doing this. It also covered how to use
    HTTP package and handle JSON data. This is important to help programmers build
    applications that can effectively communicate with different web applications
    and services.


    In the upcoming chapters, you’ll go through Go recipes based on real-life scenarios
    in order to get a better understanding of the concepts covered in this chapter.


    # Go Recipes: Programming Fundamentals and Basics


    Go is a great language. It’s compact, performant, and has great support for concurrency.
    This chapter covers common programming tasks and shows recipes for completing
    them. It covers language basics, date/time types, how to work with text files
    effectively, how to work with structs, and how to handle concurrency.'
