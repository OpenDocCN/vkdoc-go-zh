    ### 结构体实战解析


    清单 5-3 通过一个家庭自动化系统的示例，演示了结构体的使用。该系统使用传感器发送不同的事件详情。由于可能存在多个不同的传感器，为了存储它们产生的不同事件信息，首先定义了一个名为
    `event` 的结构体。`event` 结构体的成员字段用于标识产生事件的设备（本例中为门或恒温器）以及事件发生的时间。


    该示例还定义了特定于设备的事件，即 `DoorEvent` 和 `TemperatureEvent`，以说明 Go 语言中*类型嵌入*的概念。类型嵌入是一种将一个类型包含到另一个类型中，但将其作为无名称参数的技术。通过类型嵌入，嵌入类型中所有导出的参数和方法，对于嵌入该类型的类型来说也是可访问的。`DoorEvent`
    和 `TemperatureEvent` 结构体都嵌入了 `Event` 类型。除了 `Event` 结构体的成员字段外，每个结构体也拥有各自特定的成员字段。`NewDoorEvent()`
    函数接收用于创建 `DoorEvent` 结构体对象的输入参数。进入函数后，执行一些验证以确保 `ID` 不为空。接着，创建一个嵌入类型 `Event` 的变量
    `evt`。在函数末尾，返回指向包含事件详情的 `evt` 变量的指针。如果你熟悉 C 或 C++，返回一个指向栈上分配内容的指针可能看起来很奇怪。Go 编译器会执行逃逸分析，并将函数中使用到的事件详情从栈移动到堆上。


    ```

    package main

    import (

    "fmt"

    "log"

    "time"

    )

    type Event struct {

    ID   string

    Time time.Time

    }

    type DoorEvent struct {

    Event

    Action string //open, close

    }

    type TemperatureEvent struct {

    Event

    Value float32

    }

    func NewDoorEvent(id string, time time.Time, action string) (*DoorEvent, error)
    {

    if id == "" {

    return nil, fmt.Errorf("empty id")

    }

    evt := DoorEvent{

    Event:  Event{id, time},

    Action: action,

    }

    return &evt, nil

    }

    func main() {

    evt, err := NewDoorEvent("front door", time.Now(), "open")

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", evt)

    }

    清单 5-3

    Go 结构体使用示例

    ```


    **输出：**


    ```

    &{Event:{ID:front door Time:2022-02-14 17:45:54.9964674 +0500 PKT m=+0.003330501}
    Action:open}

    ```


    ### 方法


    可以为用户定义的数据类型定义并附加方法。Go 的方法和函数彼此相似，不同之处在于方法有一个额外的接收者参数。方法使用这个接收者参数来访问与接收者对象相关的不同属性。然而，接收者可以是结构体类型或非结构体类型。需要注意的重要一点是，方法使用的接收者和接收者类型必须位于同一个包中。此外，如果接收者类型已在另一个包中定义，则不能为其创建方法。这包括诸如
    `string`、`float`、`int` 等内置类型。尝试这样做会在编译时报错。


    #### 在 Go 中声明方法


    在 Go 中声明方法的语法如清单 5-4 所示。`func` 关键字后跟接收者名称及其类型，然后是方法名称，接着是输入参数列表，最后显示返回类型（如果方法有返回值的话）。


    ```

    func(reciver_name Type) method_name(parameter_list)(return_type){

    // Code

    }

    清单 5-4

    Go 中声明方法的一般格式

    ```


    #### 方法实战解析


    查看清单 5-5 中的 Go 示例，该示例演示了恒温器的工作原理。恒温器是一种用于控制和测量温度的设备。首先，定义了一个名为 `thermostat` 的结构体。它有两个成员字段：`ID`（`string`
    类型）和 `value`（`float32` 类型）。注意，`ID` 字段是导出的（公开的），因此其名称以大写字母开头。由于 `value` 字段未导出，它是私有的，因此其名称以小写字母开头。`Value()`
    函数获取一个接收者键，该键是指向 `thermostat` 的指针类型。它返回一个 `float32` 类型的内部值。`Set()` 函数根据其参数指定的值设置恒温器的值。请记住，指针接收者用于修改结构体的方法。方法也可以没有接收者。例如，清单
    5-5 中的 `Kind()` 函数就是这样一个方法。


    ```

    package main

    import (

    "fmt"

    )

    //A thermostat measures and controls the temperature

    type Thermostat struct {

    ID    string

    value float64

    }

    //Value return the current temperature in Celsius

    func (t *Thermostat) Value() float64 {

    return t.value

    }

    //Set tells the thermostat to set the temperature

    func (t *Thermostat) Set(value float64) {

    t.value = value

    }

    //Kind returns the device kind

    func (t *Thermostat) Kind() string {

    return "thermostat"

    }

    func main() {

    t := Thermostat{"Living Room", 16.2}

    fmt.Printf("%s Before: %.2f\n", t.ID, t.Value())

    t.Set(18)

    fmt.Printf("%s After: %.2f\n", t.ID, t.Value())

    }

    清单 5-5

    Go 方法使用示例

    ```


    **输出：**


    ```

    Living Room Before: 16.20

    Living Room After: 18.00

    ```


    ### 接口


    Go 是一种多范型语言，它兼具函数式、命令式和面向对象编程的特点。尽管看起来 Go 从 OOP 范型中借鉴了很多，但有一个例外。Go 不支持使用类进行继承；相反，它选择组合而非继承，并使用结构体和接口来实现这一目标。


    #### 在 Go 中声明接口


    在 Go 中，*接口*是一种抽象类型，即它用于描述一个类型可以实现的所有方法。然而，接口仅限于提供方法签名，而不提供其实现。方法的实现完全由实现接口的类型决定。因此，可以说接口只定义（而不声明）特定类型对象的行为。


    清单 5-6 演示了在 Go 中创建接口。首先是 `type` 关键字，后跟接口名称，接口名称可由程序员选择（Go 语言保留关键字除外）。最后是 `interface`
    关键字。相关的方法签名包含在花括号内，如清单 5-6 所示。


    ```

    type interface_name interface{

    // Method signatures

    }

    清单 5-6

    Go 中声明接口的一般格式

    ```


    #### 在 Go 中实现接口


    在 Go 中，实现接口时必须实现接口中声明的所有方法。此外，与其他需要 `implement` 关键字来实现接口的语言不同，Go 是隐式实现接口的。清单 5-7
    演示了如何在 Go 中声明和实现接口。


    ```

    package main

    import (

    "fmt"

    )

    // Creating an Interface

    type Shape interface {

    // Method Signatures

    Area() float64

    Perimeter() float64

    }

    type Rectangle struct {

    length  float64

    breadth float64

    }

    // Implementing Methods of the Shape Interface

    func (r Rectangle) Area() float64 {

    return r.length * r.breadth

    }

    func (r Rectangle) Perimeter() float64 {

    return 2 * (r.length + r.breadth)

    }

    // Main Method

    func main() {

    // Accessing Elements of the Shape Interface

    var s Shape

    s = Rectangle{10, 14}

    fmt.Println("Area of Shape :", s.Area())

    fmt.Println("Perimeter of Shape:", s.Perimeter())

    }

    清单 5-7

    Go 接口实现示例

    ```


    **输出：**


    ```

    Area of Shape : 140

    Perimeter of Shape: 48

    ```

