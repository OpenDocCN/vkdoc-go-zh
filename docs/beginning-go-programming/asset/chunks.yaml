- fmt: '# Defer and Panic Recovery


    You’ll sometimes use resources that need to be released once you are finished
    using them. One of the more important resources in programming is memory. Memory
    is managed automatically by the garbage collectors. However, there are other resources,
    such as files, that need to be explicitly closed.


    There is usually a limit in the operating system to how many open files a process
    can have. If this limit is reached, maybe because your server has been running
    for a couple of days, the server will start showing different errors. In Go, the
    built-in keyword `defer` is designed exactly for these cases.


    In Go, the `defer` keyword makes sure that a function call is delayed and executed
    sometime later, during the execution of a program. It is also used for cleanup
    purposes. The `defer` keyword, as compared to other programming languages, is
    similar to the `ensure` and `finally` keywords.


    In the Go recipe shown in Listing 3-5, we use the `defer` keyword by creating
    a file and writing data to it. For this purpose, we create a file, write data
    in it, and finally close the file when the required task is completed. Notice
    that we do not close the file immediately after getting the file object using
    `createFile()`. Rather, the `defer` keyword delays the closing of the file. In
    Go, the `closeFile()` function is used to close an open file. The deferred commands
    are executed at the end of the enclosing function. In this case, the execution
    of the deferred function will occur after `main()` and `writeFile()` have finished
    their execution. Remember that, even with a deferred function, it is important
    to check for any errors when closing a file.


    ```

    package main

    import (

    "fmt"

    "os"

    )

    func main() {

    f := createFile("defer-eg.txt")

    defer closeFile(f)

    writeFile(f)

    }

    func createFile(fileName string) *os.File {

    fmt.Println("Creating File with name ", fileName)

    file, err := os.Create(fileName)

    if err != nil {

    panic(err)

    }

    return file

    }

    func writeFile(fileName *os.File) {

    fmt.Println("Writing Data to File with name ", fileName.Name())

    fmt.Fprintln(fileName, "Hi, My name is Maryam.")

    }

    func closeFile(file *os.File) {

    fmt.Println("Closing File with name ", file.Name())

    err := file.Close()

    if err != nil {

    fmt.Fprintf(os.Stderr, "Error: %v\n", err)

    os.Exit(1)

    }

    }

    Listing 3-5

    Go Recipe for Defer and Panic Recovery

    ```


    **Output:**


    ```

    Creating File with name  defer-eg.txt

    Writing Data to File with name  defer-eg.txt

    Closing File with name  defer-eg.txt

    ```


    In Go, the `panic` idiom is used to return errors. However, in some cases, the
    Go program can panic, which is similar to an exception, and sometimes it’s likely
    to guard against these panics. A *panic* usually refers to something that went
    wrong unexpectedly. It is normally used for failing fast on errors that aren’t
    raised during the normal execution of the program, or for errors that cannot be
    managed in a graceful manner.


    Throughout the recipes in this book, we illustrate the use of `panic` to ensure
    the behavior of our Go programs against any unexpected error(s). Aborting a program
    is one of the most common use cases of `panic`. For example, a program can be
    aborted if a function returns an error that you either have no clue how to handle
    or don’t want to handle.


    The Go recipe shown in Listing 3-6 illustrates how to use `panic` when an unexpected
    error occurs while you’re creating a new file. Running this Go recipe will cause
    the application to panic. It will also print a message indicating the error along
    with related `goroutine` traces for the user. Furthermore, the application will
    exit with a status not equal to zero. When the first line of the main function
    runs, the panic gets triggered. In this case, the program will exit without executing
    the rest of the code. Note that, unlike other programming languages that use exceptions
    to perform error handling wherever possible, Go uses error-indicating return values
    to obtain the same results.


    ```

    package main

    import "os"

    func main() {

    //Trigger panic with Custom Error Message

    panic("Problem!")

    _, err := os.Create("/tmp/file")

    if err != nil {

    panic(err)

    }

    }

    Listing 3-6

    Go Recipe for Using Panic with Unexpected Errors

    ```


    **Output:**


    ```

    panic: Problem!

    goroutine 1 [running]:

    main.main()

    ../.../code-3.6.go:8 +0x27

    exit status 2

    ```


    ## Hands-on Challenge


    Suppose you have to write a function called `filter`. The function must take two
    arguments as input. The first argument is a predicate function named `isOdd` and
    the second is a slice of `int` type containing eight non-negative integers. In
    general, a statement that can be true or false is referred to as a *predicate*.
    Predicates in programming refer to functions that take a single argument as input
    and return a `bool` value as output. The `isOdd` function should take an integer
    as an input argument and return `true` if the number is odd and `false` otherwise.
    The `filter` function must return from the passed slice the values that the predicate
    function returns `true` for. The output of the program should be odd numbers from
    the passed input slice.


    ### Solution


    Listing 3-7 illustrates one of the possible solutions for this hands-on challenge.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    values := []int{22, 85, 36, 94, 50, 67, 17, 18}

    fmt.Println("Before Filtering: ", values)

    fmt.Println("After Filtering: ", filter(isOdd, values))

    }

    //filter returns a slice with only the values that pred(val) returned true

    func filter(pred func(int) bool, values []int) []int {

    var out []int

    for _, val := range values {

    if pred(val) {

    out = append(out, val)

    }

    }

    return out

    }

    func isOdd(n int) bool {

    return n%2 == 1

    }

    Listing 3-7

    Solution for the Hands-on Challenge

    ```


    **Output:**


    ```

    [85 67 17]

    ```


    ## Summary


    This chapter provided recipes that illustrate the programming fundamentals of
    the Go language. Working through these recipes provides you with hands-on experience
    with Go. The recipes covered in this chapter include basic Go programs, like calculating
    the mean and the median, that help you understand maps, slices, and arrays in
    a more efficient manner. These recipes also covered how error handling is performed
    in Go and the use of `defer` and panic recovery.


    In the upcoming chapter, we provide recipes for working with text in Go.


    # 4. Working with Text


    Real-world applications work with a lot of textual data. Unlike languages like
    C++ and Java, in Go, strings behave as read-only slices of bytes. Furthermore,
    Unicode text using UTF-8 encoding is used to represent bytes of strings. Several
    Go libraries are available for the purpose of string manipulation, for example,
    packages like `strings`, `unicode`, and `regexp`. Note that, in Go, strings are
    *immutable* or read-only, meaning that their value cannot be changed after their
    creation. Trying to make changes to them will raise errors. This chapter discusses
    how to work with text in the Go language. Specifically, it covers string formatting,
    Unicode data handling, and using regular expressions in the Go language.'
