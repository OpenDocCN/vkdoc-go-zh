    `&argError` 语法来构造一个类型为 `argError` 的新结构体，这是一个自定义类型。`&argError` 传递了两个参数来初始化成员字段——`argument`
    和 `problem`。此外，在 `main()` 函数中，使用了两个循环来测试我们的自定义错误返回函数的功能。请记住，在 Go 中对 `if` 语句使用内联错误检查是一种良好且常见的做法。


    此外，要以编程方式利用自定义错误的数据，你需要通过类型断言将错误作为自定义错误类型的实例获取。Go 中的 `ok` 惯用语法用于测试键值对是否存在。


