- fmt: '# 1. Introduction


    Developed by Google in 2007, Go (aka GoLang) is a programming language designed
    with simplicity and speed as its focus. The design goals of Go were to create
    a simple and readable syntax of a dynamically-typed, high-level language programming
    language like Python, but also have the stability and efficiency of a statically-typed
    low-level language like C/C++. Supported by Google, Go is an open-source programming
    language and is easier to learn and get started with. It has built-in support
    for concurrency, a robust standard library, type safety, multiple built-in types,
    dynamic-typing capability, garbage collection, and several other advanced features,
    such as key-value maps and variable-length arrays. Go has the power to let you
    leverage the might that multi-core processors have to offer, which results in
    faster-running programs.


    ## Is GoLang Static-Typed or Compiled?


    Any programmer’s natural concern about a programming language is whether the language
    is compiled or interpreted. JavaScript is an example of an interpreted language.
    Web browsers can directly read JavaScript source code and execute it at runtime.
    There is no pre-computation involved. Even though some interpreted environments
    can produce intermediate formats such as bytecode, there is no pre-computation
    step involved.


    ### Compiled Programming Language


    In contrast to an interpreted language, the source code of a compiled language
    is transformed into an operating system-specific format. Like C and C++, Go is
    a compiled language. However, compared to Java, whose source code is compiled
    into a format capable of running on different operating systems, Go’s source code
    is compiled into an operating system-specific format. That means the code is executable
    only on the operating system for which it was compiled.


    ### Statically-Typed Language


    Go is a statically-typed language. That means its variables must have specific
    types. Nevertheless, it is not always mandatory to declare variables explicitly.
    The compiler can infer the types; however, at compilation time, the types are
    always known.


    The capability to run a source code file without recompiling it can sometimes
    lead programmers to think that Go is an interpreted language. The real magic is
    in the background, where the source code is compiled into a temporary executable
    form. The compilation tool, "Go," is required to build applications delivered
    to users. This is because the compiled executable is in a format that is operating-system-specific.
    Each Go application consists of a statically-linked runtime. During the compilation
    process of the application, a runtime component is packaged with the executable
    format. This is why the size of applications built using the Go language is comparatively
    larger than the source code. No external virtual machine is involved, so it is
    necessary to include a runtime package.


    ## Is Go an Object-Oriented Programming Language?


    Go is not an object-oriented programming language. Nevertheless, you will find
    certain important object-oriented features in the Go language.


    *   Custom interfaces can be defined. In Go, an interface can be thought of as
    a contract that lays out a set of functions that must be implemented by any program
    that implements this interface.

    *   Custom types can be defined. Custom types can also have their own methods
    (functions). It''s worth noting that in Go, practically everything is a type,
    and each type implements at least one interface.

    *   Custom structs (data structures) can be defined, containing member fields
    and methods.


    ## Features that Make GoLang the Premium Choice for Programming


    Other features of Go that make it popular among leading companies include the
    following:


    *   Go supports environment-adopting patterns identical to those offered by dynamic
    languages. For example, it supports type inference. That means that `intVariable:=
    123` is a valid way to declare a type `int` variable named `intVariable` with
    a value of `123`.

    *   Go offers much faster compilation times.

    *   Go supports concurrency. For example, it offers the `select` statement, *goroutines,*
    which are similar to lightweight processes, and channels.

    *   Go programs are much simpler, more concise, and comparatively safer.

    *   Go supports type embedding and interfaces.

    *   Without the need for external dependencies, Go supports the production of
    statically-linked native binaries.


    ## Intentionally Excluded Features from GoLang


    In order to keep Go simple and concise, some of the features that are usually
    supported by similar programming languages are excluded from the Go language.
    The major reason for the omission is that Go''s creators believed that all these
    factors make programming languages increasingly hard to comprehend and bug-prone.
    Some of the features that are excluded intentionally are as follows:


    *   Type inheritance (no classes)

    *   Generic programming

    *   Method or operator overloading

    *   Pointer arithmetic

    *   Structured exception handling

    *   Implicit numeric conversions

    *   Assertions

    *   Circular dependencies among packages


    ## Go Programs


    A Go program can be a minimum of three lines and extend to up to millions of lines.
    Go programs are written into text files having the `.go` extension, such as `myProgram.go`.
    Any text editor (like vim, vi, sublime, vs code, etc.) of your choice can be used
    to write Go programs. For efficient management of dependencies, Go programs are
    constructed using packages. The traditional compile and link model is used by
    the Go programming implementation to generate executable binaries.'
