    goroutine 1 [running]:

    main.main()

    ../.../code-3.6.go:8 +0x27

    exit status 2

    ```


    ## 动手挑战


    假设你需要编写一个名为 `filter` 的函数。该函数必须接受两个参数作为输入。第一个参数是一个名为 `isOdd` 的谓词函数，第二个参数是一个包含八个非负整数的
    `int` 类型切片。通常，一个可以为真或假的陈述被称为*谓词*。编程中的谓词指的是接受单个参数作为输入并返回 `bool` 值作为输出的函数。`isOdd`
    函数应接受一个整数作为输入参数，如果数字是奇数则返回 `true`，否则返回 `false`。`filter` 函数必须从传入的切片中返回谓词函数返回 `true`
    的值。程序的输出应该是传入输入切片中的奇数。


    ### 解决方案


    清单 3-7 展示了此动手挑战的一个可能解决方案。


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    values := []int{22, 85, 36, 94, 50, 67, 17, 18}

    fmt.Println("过滤前: ", values)

    fmt.Println("过滤后: ", filter(isOdd, values))

    }

    //filter 返回一个切片，其中只包含 pred(val) 返回 true 的值

    func filter(pred func(int) bool, values []int) []int {

    var out []int

    for _, val := range values {

    if pred(val) {

    out = append(out, val)

    }

    }

    return out

    }

    func isOdd(n int) bool {

    return n%2 == 1

    }

