    ## 总结


    本章提供了 Go 方案，让您获得在 Go 中构建并发程序的实践经验。Go 通过 goroutine 和 channel 为并发提供了内建支持。本章中的方案涵盖了通过使用
    goroutine 将顺序代码转换为并发代码。此外，还提供了深入探讨 goroutine 间共享资源影响的 Go 方案，并解释了互斥锁如何克服这些副作用。它还提供了一个使用原子计数器在
    goroutine 之间修改共享资源的 Go 方案，以克服可能因共享资源导致的死锁或读/写不一致问题，以及使用 `sync.WaitGroup` 和 `sync.Once`、超时和
    goroutine 池在 goroutine 之间实现同步的方案。


    下一章包含更高效、更有效地使用 Go 语言的实用技巧与窍门。


    # 9. 技巧与实用窍门


    本章提供了一些黑客技巧和快捷方式，可以帮助您更有效、更轻松地掌握 Go 编程语言。这些技巧和窍门涉及 Go 编程语言的不同方面，包括包、导入、数据类型等。


    ## 导入包


    除了将包导入到 Go 程序中的常规方法外，还有一些其他替代方法可以实现此目的。以下示例使用 `regexp` 包说明了这些不同的方式。


    - `import alias_name "package_name"` — 使用此语法导入包将为指定的包名（本例中为 `regexp`）创建一个别名。然后，您可以使用此别名，通过成员访问运算符（即点运算符
    `.`）来访问 `regexp` 包中的所有内容。例如，`RegularExpression`。

    - `import . "package_name"` — 以这种方式导入任何包，允许您访问特定包的内容，而无需在导出内容前添加包名前缀。例如，您可以使用
    `regexp.MatchString("m([a-z]+)rs", "mars")` 语句，而不是输入 `regexp.MatchString("m([a-z]+)rs",
    "mars")`。

    - `import _ "package_name"` — 以这种方式导入包会告诉编译器不要引发任何与导入但未使用的包相关的警告。但是，任何初始化函数仍将被执行。不过，包的其他内容不会被导出和访问。


    ## 检查应用程序导入了哪些包


    检查应用程序正在导入哪些包是一种有用且实际的方法。然而，并没有简单的方法可以做到这一点。尽管如此，仍可以使用 `go list` 工具和 `templates`
    来做到这一点。在应用程序的根目录下运行以下命令。


    ```sh

    $ go list -f ''{{join .Deps "\n"}}'' |

    xargs go list -f ''{{if not .Standard}}{{.ImportPath}}{{end}}''

    ```


    如果您希望列表也包含标准包，可以编辑此模板：


    ```sh

    $ go list -f ''{{join .Deps "\n"}}'' |  xargs go list -f ''{{.ImportPath}}''

    ```


    ## 使用 `goimports` 代替 `gofmt`


    Go 提供了两种工具可以自动按照 Go 编码标准格式化您的源代码，分别是 `gofmt` 和 `goimports`。前者随 Go 编译器的标准安装包一起提供。而
    `goimports` 工具需要单独安装。此外，`goimports` 工具还能修复包导入问题。


    ## 代码组织


    尽管 Go 编程语言相对更容易学习，但对于初学者来说，Go 代码组织的标准方式可能是最难理解的事情之一。Go 提供了关于代码组织、放置源代码的不同位置以及需要遵循的不同惯用法的清晰指导。此外，像
    `gofmt` 这样的工具随 Go 编译器打包在一起，它制定了严格的规则：如果代码包含任何未使用的导入包、变量等，则不会允许成功编译。有关更多信息，请参考官方演讲
    [`https://talks.golang.org/2014/organizeio.slide#1`](https://talks.golang.org/2014/organizeio.slide%25231)
    或官方文档 [`https://tinyurl.com/3x3hapub`](https://tinyurl.com/3x3hapub)。

