    ## Taking User Input


    In the previous section, you learned about the use of the `fmt` package through
    which you can output different messages on the screen. This section demonstrates
    how to read user input from the console, store it in variables, or echo it to
    the screen. Note that standard input (`stdin`) is a stream that is used to read
    input data.


    One important point to remember regarding Go Playground is that it does not support
    interactive programs and hence cannot read from `os.Stdin`. Due to this, it is
    better to use other IDEs, like Visual Studio or Code, to test the code in this
    book whenever user input is required.


    In Go, the `OS` and `IO` packages contain different functions for reading the
    standard input from the console. These sets of functions are used to scan formatted
    text and extract values.


    *   `Scan`, `Scanf`, and `Scanln` can be used to read input from `os.Stdin`.

    *   `Fscan`, `Fscanf`, and `Fscanln` can be used to read input from a specified
    `io.Reader`.

    *   `Sscan`, `Sscanf`, and `Sscanln` can be used to read input from an argument
    string.


    ### Using scanf


    In order to use the `Scanf` function, you must import the `fmt` package. It is
    used to specify which way the input should be read. The `Scanf` function scans
    the text input from `stdin` and stores the space-separated values into consecutive
    arguments as defined in the string format. The count of successfully scanned items
    is also returned by the `Scanf` function. If the returned number of items is less
    than the specified arguments, the function will throw an error. This is because
    it is mandatory for newline feeds in the input to match the newlines specified
    in the format. Listing [2-5](#536365_1_En_2_Chapter.xhtml#PC5) illustrates the
    use of the `Scanf` function for taking user input.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    var name string

    var age int

    fmt.Print("Enter Your name: ")

    fmt.Scanf("%s", &name)

    fmt.Println("Hello ", name)

    fmt.Print("Enter Your age: ")

    fmt.Scan(&age)

    fmt.Println("Your age is ", age)

    }

    Listing 2-5

    Using the Built-In Scanf Function to Take User Input

    ```


    **Output:**


    ```

    Enter your name: Maryam

    Hello Maryam

    Enter your age: 30

    Your age is 30

    ```


    ### Using Scanln


    `Scanln` scans the text from `stdin`; however, it stops scanning when a newline
    is encountered. Therefore, it is necessary to place a newline character or EOF
    after the final item to indicate the end of input. Listing [2-6](#536365_1_En_2_Chapter.xhtml#PC7)
    illustrates the use of `Scanln`.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    var name string

    var age int

    fmt.Print("Enter your name: ")

    fmt.Scanln(&name)

    fmt.Println("Hello ", name)

    fmt.Print("Enter your age: ")

    fmt.Scanln(&age)

    fmt.Println("Your age is ", age)

    var anInt int = 5

    var aFloat float64 = 42

    sum := float64(anInt) + aFloat

    fmt.Printf("Sum: %v, Type: %T \n", sum, sum)

    }

    Listing 2-6

    Using the Scanln Built-In Function to Take User Input in Go

    ```


    **Output:**


    ```

    Enter your name: Maryam

    Hello Maryam

    Enter your age: 30

    Your age is 30

    ```


    **Scan vs Reader Functions**


    To split space-delimited tokens, you use the `Scan` functions and to read full
    lines, you used the `reader` function.


    ### Using bufio


    Buffered I/O is implemented via the `bufio` package. The `bufio` package wraps
    the `io.Writer` or `io.Reader` objects and returns a new `Writer` or `Reader`
    object, which has the necessary interface implemented for utility methods. This
    wrapping also provides textual I/O assistance and buffering.


    In Listing [2-7](#536365_1_En_2_Chapter.xhtml#PC9), Line#11 declares two variables,
    one that stores the input. The second is an error object that stores any error
    messages.


    ```

    1   package main

    2   import(

    3       "bufio"

    4       "fmt"

    5       "os"

    6   )


    8   func main(){

    9         reader := bufio.NewReader(os.Stdin)

    10         fmt.Print("Enter Some Text: ")

    11         input, _ := reader.ReadString(''\n'')

    12         fmt.Println("You have entered: ", input)

    13   }

    Listing 2-7

    Using the bufio Built-In Function to Take User Input in Go

    ```


    **Output:**


    ```

    Enter Text: Hi! I am the author

    You entered: Hi! I am the author

    ```


    As illustrated, if you want to ignore a variable in Go, you name it with an underscore.


    Now that you know how to use variables and take user input in your Go programs,
    it is time to learn how to use different math operators in Go.'
