    As shown in Listing [7-5](#536365_1_En_7_Chapter.xhtml#PC7), in the `handleSet()`
    function, you first retrieve the keys from the `vars` and defer the closing of
    the response body. Then you use `LimitReader` to limit how much you are going
    to write. Using `ioutil.ReadAll()`, you read until the limit. If there is an error,
    you log it. You look at the database using the built-in `Lock()` function and
    defer the unlocking until the function exits. The key is set using `db[key] =
    data`. The response is then stored in the `resp` variable. It contains the key
    and the size of the data that was sent. The `content-type` header is set to `application-json`.


    The `handleGet()` function is also similar. When the `Lock()` function is used
    to lock a resource, only one goroutine can read/write at a time by acquiring the
    lock. Whereas, in the case of `RLock()`, multiple goroutines can read (not write)
    at a time by acquiring the lock. In this handler, the `comma,ok` idiom checks
    if the desired key is present in the database.


    In the `handleList()` function, you first acquire the lock on the database. Then
    you create a slice for the names of the keys, iterate over the database, (i.e.,
    the map), and append the keys and write them out as JSON.


