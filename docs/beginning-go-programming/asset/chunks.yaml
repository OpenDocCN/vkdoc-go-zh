    Green = color.RGBA{0, 0xFF, 0, 0xFF}

    Blue  = color.RGBA{0, 0, 0xFF, 0xFF}

    )

    type Shape struct {

    //contains features that are common to all the drawable items

    X     int

    Y     int

    Color color.Color

    }

    type Circle struct {

    Shape

    Radius int

