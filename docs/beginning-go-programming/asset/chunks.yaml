    \ certain basic syntax rules of that particular language. The following is a list\
    \ of some of the most important syntax rules set by the designers of the Go programming\
    \ language.\n\n1.  **Case sensitivity**\n    *   You must spell *identifiers*\
    \ like functions, variables, and type names in the exact manner mentioned in the\
    \ official documentation ([`https://go.dev/doc/`](https://go.dev/doc/)).\n\n*\
    \   Names for packages and variables use lowercase and mixed case.\n\n*   Methods\
    \ and fields of a type are initial capped.\n\n*   In Go, initial uppercase characters\
    \ indicate a special purpose.\n        *   Equivalent to the `public` keyword\
    \ in other high-level programming languages like C++, C#, Java, and so on, in\
    \ Go, an initial uppercase character indicates that the symbol is exported.\n\n\
    *   Similarly, equivalent to the `private` keyword, in Go, a lowercase initial\
    \ character indicates that the particular method or variable is not exported nor\
    \ accessible by the rest of the application other than the code block it is declared\
    \ in.\n\n2.  **Semicolons can be skipped**\n    *   For the sake of reducing the\
    \ amount of typing a developer has to do, as shown in Listing [2-1](#536365_1_En_2_Chapter.xhtml#PC1),\
    \ Go eliminates semicolons from the ends of lines. This means that line feeds\
    \ end the statement and no semicolons are required.\n\n```\n        var color\
    \ [2] string\n        colors[0] = \"black\"\n        colors[1] = \"white\"\n \
    \       Listing 2-1\n        Semicolons Are Not Required as End-of-Line Indicators\n\
    \        ```\n\nEven though the language specification requires semicolons, it\
    \ is not necessary to type them explicitly. Thanks to Lexer, the software component\
    \ that parses the code and analyses it, semicolons are added during the compilation\
    \ process as needed.\n\nThe Rule Followed by Lexer for Adding Semicolons\n\nWhen\
    \ a statement is determined to be complete and Lexer encounters a line feed, meaning\
    \ it’s the end of the statement and the developer has not explicitly added a semicolon,\
    \ Lexer will do so.\n\nNote\n\nYou can’t always add line feeds freely or break\
    \ up statements with extra line feeds, as you can in other languages, because\
    \ in certain cases they can be misinterpreted by Lexer.\n\n3.  **Code blocks with\
    \ braces**\n    *   Code blocks, i.e., multiple lines of code that are intended\
    \ to be grouped together, are wrapped within braces. See Listing [2-2](#536365_1_En_2_Chapter.xhtml#PC2).\n\
    \n```\n        sum := 0\n        for i :=0; i<10; i++{\n        sum += i\n   \
    \     }\n        fmt.Println(sum) //prints '45'\n        Listing 2-2\n       \
    \ Braces Are Used to Indicate Code Blocks\n        ```\n\nIn Listing [2-2](#536365_1_En_2_Chapter.xhtml#PC2),\
    \ the variable named `sum` is declared and then assigned a value of zero. The\
    \ `for` loop is initialized from 0 to 10 and is used to increment the value of\
    \ the `sum` by i. After the loop terminates, the value stored in the `sum` variable\
    \ is printed using a function called `Println` or “print line”. `Println` is a\
    \ built-in function of the package called `FMT`. The code that you want to iterate\
    \ over is wrapped between two braces. Note that it is important to make sure that\
    \ the opening brace is on the same line as any preceding statement.\n\n4.  **Built-in\
    \ functions**\n    *   Go supports a set of several built-in functions that are\
    \ always available in your code without having to import anything. These functions\
    \ are members of a special package named `Builtin`. The Go compiler assumes that\
    \ the `Builtin` package is always imported. Example functions include the following:\n\
    \        *   `len(string)` returns the length of the string.\n\n*   `panic(error)`\
    \ stops execution and displays an error message.\n\n*   `recover()` manages the\
    \ behavior of a panicking goroutine.\n\nFor more information, you can visit the\
    \ official documentation of the [builtin package](https://pkg.go.dev/builtin)\
    \ at [`https://pkg.go.dev/builtin`](https://pkg.go.dev/builtin)."
  trans: "\n## 摘要\n\nGo 编程语言由谷歌于 2007 年开发。它被设计为一种以简洁和快速为焦点的编译型语言。Go 的设计目标是创建一种具有动态类型高级编程语言简洁可读语法，同时兼具静态类型低级语言的稳定性和效率的编程语言。它是一种开源编程语言，相对更容易学习和上手。Go\
    \ 内置了对并发、强大的标准库、类型安全、多种内置类型、动态类型能力、垃圾回收以及多项其他高级特性的支持，包括键值映射和可变长数组。\n\n此外，Go 还能让你利用多核处理器提供的能力，从而实现运行更快的程序。关于\
    \ Go，需要记住的一个重要方面是它不是一种面向对象的编程语言。不过，你在 Go 语言中确实能找到某些重要的面向对象特性，比如可以自定义接口、类型和结构体（数据结构）。\n\
    \n为了达到其设计目标，Go 语言排除了一些特性。排除这些特性的主要原因在于，Go 的创造者认为这些因素都会让编程语言越来越难以理解且容易出错。\n\n下一章将深入探讨\
    \ Go 的编程基础，并提供实际操作示例的实用方案。\n\n# 2. Go 基础\n\nGo 之所以成为一种易学的语言，是因为你需要了解的关于 Go 程序的一切都一目了然。无需记住任何语言规则，因为它们都在应用程序代码中。本章涵盖了\
    \ Go 编程语言的基础知识，例如接受输入、使用数学运算符和包、管理内存、使用不同的数据结构以及理解基于 Go 的应用程序的程序流程。本章还涵盖了使用函数并返回多个值，以及如何读写文件数据和如何处理\
    \ JSON 数据。\n\n## Go 的起源\n\nGo 基于多种不同的编程语言。它最初被设计为 C 语言的下一代。它能够完成用 C 语言可以做的一切，包括系统编程、应用程序开发等。\n\
    \n## Go 语法\n\nGo 从 C 及其相关语言（如 C++、C#、Java 等）中借鉴了大量语法。与此同时，它还借鉴了 Pascal、Modula、Oberon\
    \ 以及其他类似语言的语法。Go 最大的吸引力之一在于，由于其精确且全面的关键字与语法集，它的程序非常简洁。为了有效使用任何语言，你必须掌握该语言特定的基本语法规则。以下是\
    \ Go 编程语言设计者设定的一些最重要的语法规则列表。\n\n1.  **大小写敏感**\n    - 你必须严格按照官方文档（[`https://go.dev/doc/`](https://go.dev/doc/)）中所述的准确形式拼写标识符，如函数、变量和类型名称。\n\
    \    - 包和变量的名称使用小写字母和大小写混合形式。\n    - 类型的方法和字段首字母大写。\n    - 在 Go 中，首字母大写字符表示特殊用途。\n\
    \        - 在其他高级编程语言（如 C++、C#、Java 等）中相当于 `public` 关键字，在 Go 中，首字母大写字符表示该标识符是导出的。\n\
    \    - 类似地，在 Go 中，小写首字母字符表示特定方法或变量未被导出，除了声明它的代码块之外，应用程序的其他部分不能访问它，这相当于 `private`\
    \ 关键字。\n\n2.  **分号可以省略**\n    - 为了减少开发者的输入量，如清单 2-1 所示，Go 去掉了行尾的分号。这意味着换行即结束语句，不需要分号。\n\
    \n    ```\n    var color [2] string\n    colors[0] = \"black\"\n    colors[1]\
    \ = \"white\"\n    清单 2-1\n    不需要用分号作为行尾指示符\n    ```\n\n    即使语言规范要求使用分号，也不需要显式键入它们。得益于词法分析器（解析和分析代码的软件组件），分号会在编译过程中根据需要自动添加。\n\
    \n    **词法分析器添加分号的规则**\n\n    当一条语句被确定是完整的，并且词法分析器遇到换行符时，这意味着该语句结束了而开发者没有显式添加分号，那么词法分析器就会自动添加。\n\
    \n    **注意：** 你不能像在其他语言中那样随意自由地添加换行符或使用额外的换行符来中断语句，因为在某些情况下，这会被词法分析器误解释。\n\n3.\
    \  **带花括号的代码块**\n    - 代码块，即旨在组合在一起的多行代码，被括在花括号内。参见清单 2-2。\n\n    ```\n    sum\
    \ := 0\n    for i :=0; i<10; i++{\n        sum += i\n    }\n    fmt.Println(sum)\
    \ // 打印 '45'\n    清单 2-2\n    使用花括号表示代码块\n    ```\n\n    在清单 2-2 中，声明了一个名为 `sum`\
    \ 的变量，然后为其赋值 0。`for` 循环从 0 初始化到 10，用于将 `sum` 的值增加 `i`。循环结束后，使用一个名为 `Println` 或“打印行”的函数打印\
    \ `sum` 变量中存储的值。`Println` 是名为 `FMT` 的包的内置函数。你想要迭代的代码包裹在两个花括号之间。注意，确保左花括号与任何前一个语句在同一行是很重要的。\n\
    \n4.  **内置函数**\n    - Go 支持一组内置函数，这些函数总是可以在代码中使用，无需导入任何内容。这些函数是一个名为 `Builtin`\
    \ 的特殊包的成员。Go 编译器假定 `Builtin` 包始终被导入。示例函数包括：\n        - `len(string)` 返回字符串的长度。\n\
    \        - `panic(error)` 停止执行并显示错误消息。\n        - `recover()` 管理 panic 状态下的 goroutine\
    \ 的行为。\n\n    有关更多信息，你可以访问 [`https://pkg.go.dev/builtin`](https://pkg.go.dev/builtin)\
    \ 上 [builtin 包](https://pkg.go.dev/builtin)的官方文档。\n"
- fmt: '# Installing Go


    To install the Go compiler, visit [https://go.dev/dl/](https://go.dev/dl/) and
    download the binary release suitable for your system. Just run the installer to
    install the compiler on your system.


    In order to verify your installation, on Windows OS, open the command prompt and
    type `go version`, as illustrated in Figure [2-1](#536365_1_En_2_Chapter.xhtml#Fig1).
    The output shows the version of the Go compiler installed on your system.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig1_HTML.jpg)


    A screenshot of a text reads the output version of the Go compiler installed on
    the system; it displays the `go 1.17.6 windows/amd64`.


    Figure 2-1 — Output showing the installed version of Go


    If you type the `path` command at the command prompt, you can see where all the
    Go executable commands are saved. If you can see the path to the directory where
    Go is installed, e.g. `C:\Users\UserName\go\bin`, you are ready to build programs
    in Go.


    To find the directory where Go is installed on macOS, open a terminal window and
    type `export $PATH`. Upon successful execution, a listing of the directory, indicating
    the path to the `bin` folder where Go was installed, e.g., `/user/local/go/bin`,
    is shown. In addition, along with the addition of the command to execute Go programs
    to the directory phrase, a file is added to a path under the root. To ensure that
    you can run Go programs from anywhere, go to your `home` directory and type `go
    version`. If everything’s working correctly, you should see output indicating
    the version of the Go language that you’re using, as shown in Figure [2-2](#536365_1_En_2_Chapter.xhtml#Fig2).


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig2_HTML.jpg)


    A screenshot displays the program to check the `PATH` variables and the output
    indicating the version of the Go language which is used. The login information,
    path, and version are displayed.


    Figure 2-2 — Checking the `PATH` variable and version to ensure correct installation
    of Go Compiler


    If you can see the version, you’re ready to start programming using the Go language.
    The first element you’ll want to explore is the Go Playground.


    # Go Playground


    One of the fastest ways to start coding and developing Go-based programs is by
    using the [Go Playground](https://go.dev/play/), a web-based IDE. As shown in
    Figure [2-3](#536365_1_En_2_Chapter.xhtml#Fig3), without having to install anything,
    Go Playground allows users to edit, run, and experiment with the Go programming
    language. When the Run button is clicked, the Go Playground compiles and executes
    the Go code on Google servers and outputs the result of the execution.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig3_HTML.jpg)


    A screenshot of a program displaying one of the fastest ways to start coding and
    a Go-based program using Go Playground, a web-based IDE.


    Figure 2-3 — The Go Playground IDE


    The Go Playground is a completely free-to-use service with no limitations. There
    are no requirements for user registration or licensing fees. Furthermore, it has
    no limitations on the number of source code files you can work with or the number
    of times you can run your code. It is a great way to test your Go code without
    creating or compiling any local source files. Nonetheless, there are other several
    IDEs available that can be used to develop Go applications.


    # Developing Go Applications Using IDEs


    There isn’t a single integrated development environment (IDE) for good programming
    that’s endorsed or even developed by the Go development team. There are, however,
    many plug-ins for commercial and open-source IDEs that have been created by the
    Go community or by IDE vendors, which you choose mostly depending on what development
    environments you’re already familiar with. In this book, we use Go Playground
    and Visual Studio Code to write and run Go programs. Let’s jump into how to get
    started programming Go applications.


    # Getting Started Programming Go Applications


    Once you’ve installed the Go development tools, you are ready to create as many
    Go applications as you like. Usually, a Go program is constructed of the following
    parts:


    - Declaring package name

    - Importing package(s)

    - Declaring and defining function(s)

    - Variable(s)

    - Expressions and statements

    - Comment(s)


    ## Let’s Print Hello World!


    Prior to learning about the Go programming language’s basic building blocks, knowing
    about the bare minimum structure of Go programs is important. Listing [2-3](#536365_1_En_2_Chapter.xhtml#PC3)
    illustrates how to print the `"Hello World!"` message on the screen as output.
    Even though the program is concise and has minimum functionality, it is adequate
    for understanding Go’s program structure.


    ```

    package main

    import (

    "fmt"

    )

    // Single-Line Comment

    /*

    Multi

    Line

    Comment

    */

    func main() {

    fmt.Println("Hello, World !")

    }

    ```


    Listing 2-3 — Basic Program that Illustrates Different Parts of a Go Program


    **Different parts of a Go program**


    Listing [2-3](#536365_1_En_2_Chapter.xhtml#PC3) explains the different parts of
    the following Go program:


    - **Packages:** In the first line of a Go program, packages are always mentioned.
    In Listing [2-3](#536365_1_En_2_Chapter.xhtml#PC3), the statement `package main`
    indicates the name of the package to which the program belongs. This statement
    is mandatory because, in Go, all programs are organized and run in packages. For
    any program, the starting point of execution is the `main` package. Furthermore,
    with every package, a path and name are associated.


    - **Import:** The `import` keyword is used to import different packages the application
    will use. It is a preprocessor directive that instructs the Go compiler to include
    all the files in the mentioned package. In the previous example, we imported the
    `fmt` (format) package, which provides different functions for formatting input
    and output.


    - **Comments:** In Go, double forward-slashes `//` are used to indicate a single-line
    comment in code. Multi-line comments are enclosed with the `/* */` block.


    - **Func:** The `func` keyword is used to declare functions; in this case, a function
    named `main`. It is important to enclose the body of each function within curly
    braces `{}`. This is necessary for the Go compiler to know where each function
    starts and ends.


    - **Main function:** Execution starts at the `main` function in the `main` package,
    which makes the `main` identifier very important. The compiler will throw an error
    if the `main` function is excluded.


    - One of the built-in functions available in the `fmt` package is the `Println(...)`
    function. By importing the `fmt` package, you also export the `Println` method.
    The `Println` function is used to display output on the screen.


    - In Go, identifiers that are capitalized indicate that the particular identifier
    is exported, for example, the initial letter of the `Println` method is a capital
    letter. In Go, the term “exported” means the function, constant, or variable can
    be accessed by the importer of that particular package.'
