    A killer feature of the Go language that sets it apart from other languages is
    its built-in support for concurrency. This built-in support makes Go the best
    choice for programming several different types of applications. The next chapter
    explains how to build concurrent programs using the Go programming language.


    # 8. Concurrency


    In modular programming, large programs are usually made up of several smaller
    sub-programs. For example, a web server handles several requests from multiple
    web browsers and serves them with HTML web pages simultaneously. Each request
    is treated like a small program. The ability to run and make progress on multiple
    smaller components of a larger program simultaneously is known as *concurrency*.
    Concurrent programming often requires the use of different constructs, like threads
    and locks, to perform complex tasks of synchronization and deadlock prevention.


    Go offers rich support for concurrency. Go programs can contain multiple independent
    tasks operating simultaneously, all doing their own thing, while communicating
    with each other to achieve a common goal. In the Go programming language, independently-running
    tasks are referred to as *goroutines*. The use of goroutines makes your program
    more responsive. Compared to other programming languages, like Java, goroutines
    can be regarded as lightweight threads. This chapter includes Go recipes that
    cover the most powerful feature of the Go language—concurrency. It also explains
    the basics of goroutines, synchronizing goroutines, and safely sharing resources
    among goroutines.


    ## Understanding Goroutines


    In Go, goroutines and channels are used to achieve concurrency. A goroutine is
    the smallest entity that can perform execution both simultaneously and independently
    alongside any other goroutines that may be present in a Go program. Put in simpler
    words, every task that is running concurrently in Go is referred to as a *goroutine*.
    Channels are used to get data from goroutines in an efficient and concurrent manner.
    Channels also provide goroutines with a point of reference and help different
    goroutines communicate.


    A goroutine can be considered a lightweight thread. However, the cost of creating
    goroutines is far less than that required for a thread. Also, every Go program
    contains at minimum one goroutine, known as the *main goroutine*, which is responsible
    for executing the program. All the goroutines initiated by a program work under
    the main goroutine. Hence, when the main goroutine is terminated, the goroutines
    present in the associated Go program are also terminated. Furthermore, goroutines
    always operate in the background.


    Compared to other high-level programming languages that use threads for multitasking,
    goroutines have several advantages. Complexity and brittleness are some of the
    biggest drawbacks of using threads for achieving high concurrency. Moreover, threads
    can also lead to hidden deadlocks and race conditions, the cause of which can
    be almost impossible to find. Some of the major advantages of goroutines over
    threads are listed here:


    *   **Extremely cheap in terms of resources:** Goroutines require only a few kilobytes
    of space on the stack. Furthermore, unlike threads, where the stack size is fixed,
    with goroutines, the stack can grow or shrink based on the requirements of the
    application.


    *   **Fewer OS threads required for multiplexing:** Goroutines require a fewer
    number of OS threads for multiplexing. It is possible for only one thread to exist
    in a program with several goroutines running in it. If a goroutine in a thread
    moves into a blocking state, e.g., it’s waiting for input from the user, a new
    OS thread is spun and the remaining goroutines are moved to this thread. All these
    details are taken care of by the Go runtime and abstracted by an API from the
    programmers.


    *   **Channels for communication****:** Channels are used to communicate among
    the different goroutines. Channels are designed to preclude race conditions from
    when goroutines access shared memory. Channels can be thought of as a pipe used
    by goroutines to communicate.


    ### Converting Sequential Code into Concurrent Code


    Before you start writing concurrent code, start by writing sequential code. Sequential
    code is much simpler and easier to understand and maintain. Move to concurrent
    code only when you have a need for the extra performance.


