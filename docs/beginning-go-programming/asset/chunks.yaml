    To iterate over the key-value pairs stored in a map, you can use the `For` loop
    statement, as illustrated in Listing [2-29](#536365_1_En_2_Chapter.xhtml#PC48).
    Here, the `key` is a variable to store the keys and the `value` is another variable
    to store the corresponding value. At every iteration, the `key` variable will
    hold only one of the keys stored in the map, and the `value` variable will hold
    its corresponding value. Note that `key` and `value` are both user-defined variable
    names.


    ```

    for key, value := range map_variable_name{

    /*perform desired operation - e.g. print all stored key-value pair */

    fmt.printf("%v: %v \n", key, value)

    }

    Listing 2-29

    Using the For Loop to Iterate Over a Map

    ```


    Just like the display order of a map, its iteration order is also not guaranteed.
    It is up to the user to manage it themselves if they want to guarantee the order.
    Users must list all the items stored in alphabetical order by using slices. This
    can be achieved by extracting the keys from the map as slices of the strings array,
    as illustrated in Listing [2-30](#536365_1_En_2_Chapter.xhtml#PC49).


    ```

    package main

    import (

    "fmt"

    "sort"

    )

    func main() {

    states := make(map[string]string)

    states["WA"] = "Washington"

    states["NY"] = "New York"

    states["CA"] = "California"

    keys := make([]string, len(states))

    i := 0

    for key := range states {

    keys[i] = key

    i++

    }

    fmt.Println("Order of Keys Before Sorting: ", keys)

    sort.Strings(keys)

    fmt.Println("Order of Keys After Forting: ", keys)

    }

    Listing 2-30

    Displaying Items of a Map

    ```


    **/*Output:**


    ```

    Order of Keys Before Sorting: [WA NY CA]//the display order is not guaranteed

    Order of Keys After Forting: [CA NY WA]//the display order is guaranteed

    */

    ```


    The first line declares a slice named `keys` of string type with a size equal
    to that of the map object named `states`. Then a `for` loop is used to iterate
    over the keys stored in the map object and store them into the `keys` slice. After
    that, to sort the `keys` slice, you use the `sort()` function that is available
    in the `sort` package. In this example, the initial key-value pairs stored in
    the `states` map were `[CA:California NY:New York WA:Washington]`


    Using the technique shown in Listing [2-30](#536365_1_En_2_Chapter.xhtml#PC49),
    you can ensure that the order will be the same. Each time you iterate through
    a slice using the `range` keyword, you will get an integer representing the current
    index in the slice. Now you can use an integer instead to iterate over the `keys`
    slice, as shown in Listing [2-31](#536365_1_En_2_Chapter.xhtml#PC51).


    ```

    for i := range keys {

    fmt.Println(states[keys[i]])

    //outputs the value stored in the states map at the passed key

    }

    Listing 2-31

    Using a For Range to Iterate Over a Map

    ```


    **Output:**


    ```

    California

    New York

    Washington

    ```


    **Example**


    Listing [2-32](#536365_1_En_2_Chapter.xhtml#PC53) includes all of the concepts
    discussed previously related to how to use maps in Go to store unordered data
    collections in memory and then access the items arbitrarily using their keys.
    It also shows how to use slices and maps together to process the stored data in
    a desired order.


    ```

    package main

    import (

    "fmt"

    "sort"

    )

    func main() {

    states := make(map[string]string)

    fmt.Println(states)

    states["WA"] = "Washington"

    states["OR"] = "Oregon"

    states["CA"] = "California"

    fmt.Println(states)

    california := states["CA"]

    fmt.Println(california)

    delete(states, "OR")

    states["NY"] = "New York"

    fmt.Println(states)

    for key, value := range states {

    fmt.Printf("%v: %v \n", key, value)

    }

    keys := make([]string, len(states))

    i := 0

    for key := range states {

    keys[i] = key

    i++

    }

    fmt.Println(keys)

    sort.Strings(keys)

    fmt.Println(keys)

    for i := range keys {

    fmt.Println(states[keys[i]])

    }

    }

    Listing 2-32

    Example Illustrating the Use of Map in Go

    ```


