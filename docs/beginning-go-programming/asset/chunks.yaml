    Listing [5-11](#536365_1_En_5_Chapter.xhtml#PC18) is one solution to of this hands-on
    challenge. First, you define the colors `Red`, `Green`, and `Blue`. Then you declare
    a `Shape` struct that will be embedded in the `Circle` and `Rectangle` structs.
    The `Device` interface sets the pixel to a specified color.


