    # 6. Working with JSON


    JSON is one of the most popular data formats used to transmit data over web applications.
    Like many modern languages, Go also supports the conversion of data to and from
    JSON. In this chapter, we walk you through recipes for working with data encoded
    as JSON, especially how to encode and decode JSON-formatted data for use in Go
    applications.


    ## JSON Package


    JavaScript Object Notation (JSON) is one of the most popular data serialization
    and interchange formats. The built-in package in Go that supports JSON encoding
    and decoding is called `encoding/json`. Using the `encoding/json` package, you
    can work with JSON in two ways. You can encode and decode data using the `Unmarshal()`
    and `Marshal()` methods. Both of these methods work on `byte` slices. An `io.Reader`
    object is required for the decoder to work, whereas the encoder requires `io.Writer`.
    In Go, encoding is referred to as *marshalling* and decoding is referred to as
    *unmarshalling*. Furthermore, using `Unmarshal()`, you can convert `[]byte` into
    JSON format, whereas `Marshal()` converts JSON-formatted data into `[]byte`. The
    conversion between the different Go types and JSON is defined by the `encoding/json`
    package, as shown in Table [6-1](#536365_1_En_6_Chapter.xhtml#Tab1).


    **Table 6-1.** Conversion Between the Different Go Types and JSON as Defined by
    the `encoding/json` Package


    | Go Type | JSON Type |

    | --- | --- |

    | `bool` | Boolean |

    | `int`, `float32`, `float64`, … | number |

    | `string` | string |

    | `nil` | null |

    | `[]interface{}` | array |

    | `map[string]interface{}` | object |

    | `time.Time` | string |

    | `[]byte` | string (base64 encoded) |'
