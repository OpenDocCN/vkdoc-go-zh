    \n现在您了解了 HTTP 请求和响应的样子，让我们深入了解本示例中关于将应用程序指标发布到服务器的具体方案。\n\n在清单 7-1 中，`postMetric()`\
    \ 函数接收一个 `Metric` 类型变量作为输入，并返回任何错误。在函数中，您使用 `json.Marshal()` 将 `metric` 编组为 `byte`\
    \ 切片。然后，您创建一个名为 `ctx` 的 `Context` 变量来为请求设置超时时间。在此示例中，我们设置了 3 秒的超时时间，并推迟了请求的 `cancel()`。一个常量存储了您要为其生成\
    \ HTTP 请求的网站的 URL。内置的 `NewRequestWithContext()` 函数创建一个带有上下文的新 HTTP 请求。`NewRequestWithContext()`\
    \ 函数接受四个参数：`context`、`method`（本例中为 `POST`）、`URL` 和 `request body`。请注意，正文必须是 `io.Reader`。这就是为什么您将数据包装在\
    \ `bytes.NewReader()` 函数中。\n\n在数据之上，您将 `Content-Type` 的标头设置为 `application/JSON`。`http.DefaultClient.Do()`\
    \ 函数调用服务器并检查是否返回任何错误。除了错误之外，您还检查请求的 `StatusCode` 以确保其状态为 `OK`。通过验证后，您可以解析 HTTP\
    \ 响应。`defer` 关键字确保在函数退出时关闭响应的正文。您永远不应盲目地从网络读取所有内容，因此您应该定义一个最大大小，本例中为 1MB。然后，您在正文上使用\
    \ `io.LimitReader()` 来确保只读取定义的大小。您定义了一个名为 `reply` 的匿名结构来存储 `JSON` 回复，即 `metric`。在\
    \ Go 中，匿名结构是没有名称的结构。它们对于创建一次性使用的结构很有用。为了解码回复，使用了 `json.NewDecoder()`。最后，您记录回复。\n\
    \n```\npackage main\n\nimport (\n    \"bytes\"\n    \"context\"\n    \"encoding/json\"\
