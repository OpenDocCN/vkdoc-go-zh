    Go 语言有别于其他语言的一个杀手级特性是其对并发的内置支持。这种内置支持使 Go 成为编程多种类型应用时的最佳选择。下一章将解释如何使用 Go 编程语言构建并发程序。


    # 8. 并发


    在模块化编程中，大型程序通常由若干较小的子程序组成。例如，一个 Web 服务器会同时处理来自多个浏览器的请求，并向它们提供 HTML 网页。每个请求都被视为一个小的程序。在大型程序中同时运行并推进多个较小组件的能力被称为*并发*。并发编程通常需要使用不同的结构，如线程和锁，来执行复杂的同步和死锁预防任务。


    Go 为并发提供了丰富的支持。Go 程序可以包含多个同时运行的独立任务，这些任务各司其职，同时相互通信以实现共同目标。在 Go 编程语言中，独立运行的任务被称为*goroutine*。使用
    goroutine 能使你的程序响应更迅速。与其他编程语言（如 Java）相比，goroutine 可以被视为轻量级线程。本章包含了覆盖 Go 语言最强大特性——并发的
    Go 实例。它还解释了 goroutine 的基础知识、如何同步 goroutine 以及如何在 goroutine 之间安全地共享资源。


    ## 理解 Goroutines


    在 Go 中，goroutine 和 channel 被用于实现并发。goroutine 是能够与 Go 程序中可能存在的任何其他 goroutine 同时且独立执行的最小实体。简而言之，在
    Go 中每个并发运行的任务都被称为 *goroutine*。Channel 用于以高效且并发的方式从 goroutine 获取数据。Channel 还为 goroutine
    提供了参考点，并帮助不同的 goroutine 进行通信。


    可以将 goroutine 视为轻量级线程。然而，创建 goroutine 的成本远低于线程。此外，每个 Go 程序至少包含一个 goroutine，即 *主
    goroutine*，它负责执行程序。程序启动的所有 goroutine 都在主 goroutine 下工作。因此，当主 goroutine 终止时，关联
    Go 程序中存在的 goroutine 也会终止。此外，goroutine 总是在后台运行。


    与使用线程进行多任务处理的其他高级编程语言相比，goroutine 有几个优点。复杂性和脆弱性是使用线程实现高并发的一些最大缺点。此外，线程还可能导致隐藏的死锁和竞态条件，其起因几乎无法找到。以下是
    goroutine 相对于线程的一些主要优势：


    - **资源方面极其廉价：** Goroutine 在栈上仅需几 KB 的空间。此外，与栈大小固定的线程不同，goroutine 的栈可以根据应用程序的需求增长或收缩。


    - **多路复用所需的 OS 线程更少：** Goroutine 进行多路复用所需的 OS 线程数量更少。一个程序可以只存在一个线程，而其中运行着多个 goroutine。如果线程中的某个
    goroutine 进入阻塞状态（例如，等待用户输入），则会衍生出一个新的 OS 线程，并将剩余的 goroutine 移动到该线程。所有这些细节都由 Go
    运行时处理，并通过 API 对程序员进行抽象。


    - **用于通信的通道：** Channel 用于在不同的 goroutine 之间进行通信。Channel 旨在防止 goroutine 访问共享内存时出现竞态条件。可以将
    Channel 视为 goroutine 用于通信的管道。


    ### 将顺序代码转换为并发代码


    在开始编写并发代码之前，先从编写顺序代码开始。顺序代码更简单，更容易理解和维护。只有在需要额外性能时，才转向并发代码。


    假设你有一个 Web 服务器，它每天返回一个包含出租车行程信息的 CSV 文件。CSV 文件包含如图 8-1 所示的数据。它包含行程开始时间、行程结束时间、行驶距离和乘客人数等信息。你想计算整个月的行驶距离，因此需要每天调用
    API。


