- fmt: '# Go String Formatting and Working with Unicode


    Computers were initially developed for countries like the United Kingdom and the
    United States of America, which are English-speaking. At that time, the capacity
    of a single byte was up to 255 numbers, which was enough to represent the English
    alphabet set using the ASCII format. However, the need to encode letters in more
    than one byte emerged when other countries started using computers. Hence, Unicode
    was developed. In Unicode, characters or code points are encoded to specific numbers.
    These numbers are, in turn, encoded into bytes as per the encoding scheme. For
    example, UTF-8 is used for encoding code strings. In Go, Unicode code points are
    referred to as *runes*. Additionally, Unicode is designed to be a superset of
    the ASCII format. Furthermore, Unicode is designed to include all characters present
    in the world’s writing systems, inclusive of several diacritical marks, different
    accents, and control codes such as carriage returns, tabs, and so on.


    The Go recipe shown in Listing [4-1](#536365_1_En_4_Chapter.xhtml#PC1) illustrates
    a function that returns the total count of characters present in a given sentence.
    The given input can also contain Unicode formatted characters. A sentence is passed
    as an input argument to the `lineLength()` function. The input is basically a
    slice of strings named `word`. You must calculate the length of the word in terms
    of characters. Remember that this is different from calculating length in terms
    of bytes. If the built-in function of `len()` is used, it will return the length
    in bytes. On the other hand, if you use the `RuneCountInString()` function from
    the `unicode/utf` package, it gives you the total number of runes in a string.
    Since the `for` loop will only iterate each word, to keep a record of the number
    of spaces, you can use the formula `(length of the word)-1`. At the function’s
    end, you return the sum of the total and the number of spaces. Note that the angular
    brackets in the string passed as input are Unicode-encoded.


    ```

    package main

    import (

    "fmt"

    "unicode/utf8"

    )

    func lineLength(words []string) int {

    total := 0

    for _, word := range words {

    total += utf8.RuneCountInString(word)

    }

    numSpaces := len(words) - 1

    return total + numSpaces

    }

    func main() {

    words := []string{"«", "Don''t", "Panic", "»"} //UTF-8 angular brackets

    fmt.Println("Length: ", lineLength(words))

    }

    Listing 4-1

    Go Recipe for String Formatting and Working with Unicode

