    # Go 的错误处理方式


    在 Go 中，错误作为显式提到的单独返回值进行传递。Go 的错误处理机制旨在让程序轻松推断返回错误的函数。它还被设计为使用与无错误任务相同的语言结构来处理错误。


    Go 中的所有错误都是 `error` 类型，它有一个用于错误处理的内置接口。按照惯例和 Go 中的常见做法，错误通常是函数返回的最后一个值。但是，通过使用
    `errors.New()` 函数，你可以构造一个自定义错误值，并将关联的错误消息作为输入传递给该函数。此外，`nil` 值表示未发生错误。使用 `Error()`
    方法意味着你可以将自定义类型用作错误。


