    ### Memory Deallocation


    Memory deallocation is performed in an autonomous fashion by the *garbage collector*
    (GC) that comes packaged with the Go runtime. When the garbage collector is triggered
    while working in the background, it searches for objects that are either out of
    scope or set to nil, so it may clear away the memory and return it to your memory
    pool.


    In Go version 1.5, the garbage collector was completely reconstructed to have
    very low latency for effectively reducing the number of pauses that occur while
    running Go applications. In the latest version, 1.18.3, the performance of the
    garbage collector while performing memory allocation is much faster and is also
    almost unnoticeable even on slower computers. For more information on garbage
    collectors, refer to the official documentation on [runtime](https://pkg.go.dev/runtime)
    at [`https://pkg.go.dev/runtime`](https://pkg.go.dev/runtime) and the talk release
    of the [garbage collector improvement](https://talks.golang.org/2015/go-gc.pdf)
    at [`https://talks.golang.org/2015/go-gc.pdf`](https://talks.golang.org/2015/go-gc.pdf).


    ## Pointers Data Type


    Every variable is essentially a memory location. Note also that each memory location
    has a defined address as well. In Go, the ampersand (`&`) operator indicates a
    memory address and is used to access the address of a variable.


    ### What Is a Pointer?


    Pointers are in essence variables that have the capability of storing memory addresses
    of other variables. Note that a memory address refers to the direct address of
    the variable. A pointer can be declared with any data type, however, initializing
    it, i.e., storing the address of another variable, is not necessary. Similar to
    high-level languages, Go also supports pointers. Pointers are useful in Go to
    perform different tasks, for example, without the use of pointers you cannot perform
    a call by reference.


    ### Declaring Pointers in Go


    It is necessary to declare a pointer before its use, like any other variable or
    constant. The general syntax for declaring a pointer variable in Go is `var variable_name
    *variable-type`. Here, `variable-type` indicates the base type of the pointer.
    Make sure that the selected base type is a valid Go data type. `variable-name`
    indicates the pointer’s name. One of the most important things that differentiates
    pointer declarations from other variable declarations is the asterisk (`*`) operator.
    In this statement, the asterisk indicates that the declared variable is a pointer.
    Listing [2-15](#536365_1_En_2_Chapter.xhtml#PC21) illustrates some valid examples
    of pointer declarations.


    ```

    var intPointer  *int         /* pointer to an integer variable */

    var floatPointer  *float32   /* pointer to a float variable */

    var strPointer *string       /* pointer to a string variable */

    Listing 2-15

    Different Ways of Declaring Pointers in Go

    ```


    It should be noted that, irrespective of its type, the inherent data type of value
    stored in all pointers is the same, i.e., a long hexadecimal number. This represents
    memory addresses, as all addresses are in the long hexadecimal format. The data
    type of the variable or constant that a pointer points to is the only differentiation
    between pointers of different data types. Furthermore, the value of the pointer
    can also be set to `nil` manually in the case of strings and automatically if
    the pointer is not initialized at the time of declaration.


    **Example**


    Let’s learn more about pointers through an example program, shown in Listing [2-16](#536365_1_En_2_Chapter.xhtml#PC22).


    ```

    var intPointer  *int         /* pointer to an integer variable */

    fmt.Println("Value of intPointer: ", *intPointer)

    Listing 2-16

    Declaring Pointers

    ```


    In Listing [2-16](#536365_1_En_2_Chapter.xhtml#PC22), the first line declares
    a pointer named `intPointer` with `int` type. This is a correct way of declaration;
    however, if you try to print the contents of `intPointer` in the second line,
    this will throw a runtime error and the application will crash, as shown in Figure
    [2-9](#536365_1_En_2_Chapter.xhtml#Fig9). This happens because `intPointer` is
    not currently initialized to point at anything and is hence `nil`.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig9_HTML.jpg)


    A screenshot showcases the output of a program. The first line declares a pointer
    named int pointer with int type. The content of the int pointer in the second
    line shows a runtime error and the application crash.


