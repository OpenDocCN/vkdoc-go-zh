    # 延迟与恐慌恢复


    有时你会使用一些资源，这些资源在使用完毕后需要被释放。编程中最重要的资源之一就是内存。内存由垃圾回收器自动管理。然而，还有其他资源，比如文件，需要显式关闭。


    操作系统通常会对一个进程能打开的文件数量设有限制。如果达到这个限制，可能是因为你的服务器已经运行了数天，那么服务器将开始显示各种错误。在 Go 中，内置关键字
    `defer` 正是为这些情况设计的。


    在 Go 中，`defer` 关键字确保一个函数调用被延迟，并在程序执行过程中的稍后时间执行。它也用于清理工作。与其他编程语言相比，`defer` 关键字类似于
    `ensure` 和 `finally` 关键字。


    在清单 3-5 所示的 Go 示例中，我们通过创建文件并向其中写入数据来使用 `defer` 关键字。为此，我们创建一个文件，往里面写入数据，最后在所需任务完成时关闭文件。请注意，我们在使用
    `createFile()` 获取文件对象后并没有立即关闭文件。相反，`defer` 关键字延迟了文件的关闭。在 Go 中，`closeFile()` 函数用于关闭一个打开的文件。延迟的命令会在包围它的函数结束时执行。在这个例子中，延迟函数的执行将在
    `main()` 和 `writeFile()` 执行完毕后发生。请记住，即使使用了延迟函数，在关闭文件时检查是否有错误依然很重要。


    ```

    package main

    import (

    "fmt"

    "os"

    )

    func main() {

    f := createFile("defer-eg.txt")

    defer closeFile(f)

    writeFile(f)

    }

    func createFile(fileName string) *os.File {

    fmt.Println("创建文件，名为 ", fileName)

    file, err := os.Create(fileName)

    if err != nil {

    panic(err)

    }

    return file

    }

    func writeFile(fileName *os.File) {

    fmt.Println("向名为 ", fileName.Name(), " 的文件写入数据")

    fmt.Fprintln(fileName, "你好，我的名字是 Maryam。")

    }

    func closeFile(file *os.File) {

    fmt.Println("关闭名为 ", file.Name(), " 的文件")

    err := file.Close()

    if err != nil {

    fmt.Fprintf(os.Stderr, "错误: %v\n", err)

    os.Exit(1)

    }

    }

