  trans: "\n### 如何执行 Go 程序\n\n要执行程序，请点击 Go Playground 上的 `Run` 按钮。你的代码将在谷歌服务器上编译并执行，输出结果会显示在屏幕上。\n\
    \n要在 Windows 上通过命令提示符执行程序，可以使用 `go run filename.go` 命令。例如，如图 2-4 所示，运行代码清单 2-3\
    \ 的命令是 `go run main.go`。要构建应用程序，请运行 `go build filename.go` 命令。例如，构建示例程序时，你需要执行命令\
    \ `go build main.go`。要运行编译后的程序版本，你需要执行 `./filename` 命令，例如 `./main`。\n\n![](img/536365_1_En_2_Fig4_HTML.jpg)\n\
    \n截图展示了用于运行代码清单的命令 `go run main.go`，以及用于构建应用程序的命令 `go build main.go`。\n\n**图 2-4**\
    \ 运行和构建 Go 程序的命令\n\n有趣的是，编译后的应用程序运行速度比 `go run` 命令更快。构建源代码文件将产生一个编译后的二进制文件，该文件专门针对你当前的操作系统设计。尽管也可以为其他操作系统编译程序，但默认情况下，编译器会生成与你的操作系统兼容的二进制文件。\n\
    \n### 关键字\n\n与每种编程语言一样，Go 也有一套关键字（为特殊用途保留的词）。这些关键字不能用作内容、变量、函数或其他任何目的的标识符名称。表\
    \ 2-1 列出了 Go 的关键字。\n\n**表 2-1** Go 的关键字\n\n| `chan` | `const` | `goto` | `interface`\
    \ | `struct` |\n| `defer` | `case` | `func` | `var` | `select` |\n| `break` |\
    \ `for` | `go` | `import` | `continue` |\n| `default` | `fallthrough` | `switch`\
    \ | `type` | `range` |\n| `if` | `else` | `return` | `package` | `map` |\n\n既然你已经了解了这些关键字，接下来就可以学习如何在\
    \ Go 中使用变量和其他数据结构了。\n\n## 变量\n\n与其他编程语言一样，Go 中使用变量在内存中存储数据。作为一种静态类型语言，Go 要求每个变量都必须分配一个类型。一旦分配了类型，就不能更改。为变量设置类型有两种方式——显式或隐式。显式是指在声明时指明类型名称。隐式是指编译器会根据变量的初始值来推断其类型。\n\
    \n在 Go 中，每个变量都应该有一个类型。该类型在确定变量内存的布局和大小、允许的取值范围以及适用于该变量的操作集合方面起着重要作用。\n\n### 变量数据类型\n\
    \nGo 允许用户定义类型，并内置了多种数据类型。以下是 Go 中一些基本的 built-in 数据类型：\n\n*   **布尔型：** `bool` 以\
    \ `true`/`false` 的形式表示布尔数据。布尔数据类型只能被赋予 `true` 和 `false` 这两个值。\n*   **字符串：** 在\
    \ Go 中，`string` 类型的变量包含一系列字符。\n*   **数值数据类型：**\n    *   **整数型：** 用于存储整数。\n   \
    \     *   **定长整数：** 包含的格式有 `uint8`、`uint16`、`uint32`、`int8`、`int16` 和 `int32`。这些用于声明无符号或有符号整数。格式名称中的数字是位数，它影响变量可被赋予的数值范围。\n\
    \    *   **浮点型：** 用于存储浮点数。支持的格式包括 `float32` 和 `float64`。\n    *   **复数型：** 复数包含两部分：实数和虚数。支持的格式有\
    \ `complex64` 和 `complex128`。\n    *   **别名：** 这些可以用来代替完整的类型名称，例如 `byte`（等同于 `uint8`）、`uint`（32\
    \ 或 64 位）、`rune`（等同于 `int32`）、`int`（等同于 `uint`）和 `uintptr`（一种用于存储指针值未解释位的无符号整数）。\n\
    *   **数据集合：** Go 也为不同的数据集合提供了内置类型。\n    *   **数组和切片：** 用于管理有序数据集合。\n    *   **映射和结构体：**\
    \ 用于管理值的聚合。\n    *   **枚举：** 用于存储一组命名的常量值。\n*   **语言组织类型：**\n    *   **函数：** Go\
    \ 将函数视为一种类型。这允许将一个函数作为参数传递给另一个函数。\n    *   **接口：** 用于指定一个或多个方法签名的集合。\n    *  \
    \ **通道：** 用于连接 goroutine。\n*   **数据管理：**\n    *   **指针：** 存储内存位置（变量）的直接地址。\n\n\
    除了内置类型之外，Go 还允许程序员创建用户定义的数据类型。\n\n### 变量命名约定\n\n变量名可以由字母、数字和下划线组成。但是，变量名应以字母或下划线开头。由于\
    \ Go 语言是区分大小写的，因此小写和大写字母会被区别对待。\n\n"
- fmt: '### Declaring Variables


    As Go is statically-typed, it requires you to set the type (explicitly or implicitly)
    of each variable used in your program during the compilation process. The assigned
    type cannot be changed at runtime.


    Listing [2-4](#536365_1_En_2_Chapter.xhtml#PC4) illustrates the different ways
    of declaring and assigning a type to variables in Go. In the explicit declaration
    of a variable, the `var` keyword is used, after which the name and type of the
    variable are mentioned. For example, as shown in lines # 8 and 12, assigning an
    initial value is optional. Line#10 uses placeholders in the `print` function to
    print the values stored in the variables along with a message. Note that `Printf`
    doesn’t add the line feed automatically and hence we added the `\n` for a line
    feed.


    ```

    package main

    import(

    "fmt"

    )

    func main() {{

    //Explicit Declaration

    var aStringVariable string = "i am a string"

    fmt.Println(aStringVariable)

    fmt.Printf("Printing variable along text: %s \n", aStringVariable)

    var anotherStringVariable string

    fmt.Println(anotherStringVariable)

    fmt.Printf("Printing variable along text: %s \n", anotherStringVariable)

    var defaultInt int

    fmt.Println(defaultInt)

    //Implicit Declaration

    myString := "Implicit Declaration of string"

    fmt.Println(myString)

    }

    Listing 2-4

    Ways to Declare Variables in Go

    ```


    In the case of implicit declaration, the variable type is inferred based on the
