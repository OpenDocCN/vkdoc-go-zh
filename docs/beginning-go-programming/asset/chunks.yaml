    ### Pointers to Structures


    Just as you can define pointers that can be used for pointing (storing) to other
    constants or variables, you can also define pointers to structures in Go. For
    example, a pointer variable named `struct_pointer` of the type `Books` can be
    declared using the `var struct_pointer *Books` statement. The `struct_pointer`
    variable can then be used to store addresses of structure variables. The ampersand
    (`&`) operator gets the direct address of a structure variable, for example, `struct_pointer
    = &Book1`. Furthermore, the member access operator (`.`) accesses the members
    of a structure where the pointer is pointing, such as `struct_pointer.title`.


    **Example**


    Let’s rewrite Listing [2-35](#536365_1_En_2_Chapter.xhtml#PC58) to illustrate
    the use of structure pointers in Go. The result is shown in Listing [2-36](#536365_1_En_2_Chapter.xhtml#PC60).


    ```

    package main

    import "fmt"

    type Books struct {

    bTitle      string

    bAuthorName string

    bSubject    string

    book_id     int

    }

    func main() {

    var Book1 Books /* Declaring variable of type Book */

    var Book2 Books /* Declaring variable of type Book */

    /* Access member fields of Book struct to define Book1 */

    Book1.bTitle = "The Go Programming Language"

    Book1.bAuthorName = "Alan A. A. Donovan and Brian W. Kernighan"

    Book1.bSubject = "A complete guide to Go programming"

    Book1.book_id = 6495

    /* Access member fields of Book struct to define Book2 */

    Book2.bTitle = "The Complete Book of Arts & Crafts"

    Book2.bAuthorName = "Dawn Purney"

    Book2.bSubject = "The Complete Book of Arts and Crafts of fun activities for children"

    Book2.book_id = 6496

    /* Print the details of Book1 by passing it as a pointer to function */

    printBookDetails(&Book1)

    /* Print the details of Book2 by passing it as a pointer to function */

    printBookDetails(&Book2)

    }

    func printBookDetails(book *Books) {

    fmt.Printf("\nTitle : %s\n", book.bTitle)

    fmt.Printf("Authors : %s\n", book.bAuthorName)

    fmt.Printf("Subject : %s\n", book.bSubject)

    fmt.Printf("Book ID : %d\n", book.book_id)

    }

    Listing 2-36

    Program to Illustrate Structure Pointers in Go

    ```


    **/*Output:**


    ```

    Title   : The Go Programming Language

    Authors : Alan A. A. Donovan and Brian W. Kernighan

    Subject : A complete guide to Go programming

    Book ID : 6495

    Title   : The Complete Book of Arts & Crafts

    Authors : Dawn Purney

    Subject : The Complete Book of Arts and Crafts of fun activities for children

    Book ID : 6496

    */

    ```


    The `struct` type in Go is a data structure that has similar purpose and function
    as the `struct` type in C and as `classes` in Java. Structs can encapsulate data
    and methods. However, unlike Java, Go does not have an inheritance model, that
    is, there is no concept of a `super()` function or substructures. Each structure
    is independent with its own fields for data management and optionally its own
    methods. Remember that `struct` in Go is a custom type. Note that the structure
    name starts with a capital letter, e.g., `Book`, to ensure that it can be used
    in other parts of the applications, i.e., exported, similar to public access specifiers
    in C-style languages. On the other hand, if a lowercase initial character is used,
    the struct type will be private and cannot be exported for use in other parts
    of the application.


    ## Program Flow


    Conditional logic can be used to change the program flow. Like other C-style languages,
    Go also offers conditional statements like `if`, `if…else`, `nested if`, `switch`,
    and `select`. However, there is a slight syntax difference in their uses.


    ### If Statement


    For most of the part, the `if` statement in Go looks the same as in C or Java;
    however, it does not need parentheses around the Boolean condition. Another important
    aspect is how you format your conditional code blocks. In other C-style languages,
    there is the option available of starting your beginning brace of a code block
    on the next line. This is not the case with Go, and doing so will throw an error.
    The opening brace has to be on the same line as the preceding statement. Listing
    [2-37](#536365_1_En_2_Chapter.xhtml#PC62) is an example of using an `if-else`
    statement in Go.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    theAnswer := 42

    var result string

    if theAnswer < 0 {

    result = "Less than Zero"

    } else if theAnswer == 0 {

    result = "Equal to Zero"

    } else {

    result = "Greater than Zero"

    }

    fmt.Println(result)

    }

    Listing 2-37

    Illustration of an if-else Statement in Go

    ```


    **/*Output:**


    ```

    Greater than Zero

    */

    ```


    Another interesting and sometimes useful variation in Go’s `if` syntax is that
    you can include an initial statement that’s part of the `if` statement. For example,
    you can initialize a variable before performing conditional logic based on its
    value. Listing [2-38](#536365_1_En_2_Chapter.xhtml#PC64) is an example of doing
    this.


    ```

    if x:= 50; if x < 0 {

    result = "Less than Zero"

    } else if x == 0 {

    result = "Equal to Zero"

    } else {

    result = "Greater than Zero"

    }

    fmt.Println(result)

    Listing 2-38

    An if Statement with Initialization

    ```


    **Output:**


    ```

    Greater than Zero

    ```'
