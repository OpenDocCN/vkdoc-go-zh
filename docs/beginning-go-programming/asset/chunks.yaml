- fmt: '# 5. Structs, Methods, and Interfaces


    Go supports `structs` (short for *structures*) that allow programmers to define
    user-defined types. Related data that exhibits a “has-a” relationship can be grouped
    into a single logical unit using `structs`. Methods in Go are functions that can
    be tied to user-defined types to define their behavior. Another important feature
    of the Go language is the concept of interfaces. In Go, `structs` and interfaces
    go hand in hand to organize methods and data handling. An interface can be defined
    as a collection of method signatures that can be implemented by any other type.
    Implementing an interface in Go merely means implementing the methods defined
    by that interface. Furthermore, an interface only defines but does not declare
    the behavior of an object. To simplify, a `struct` defines the fields of an object,
    e.g., a shape’s type and color, whereas an `interface` defines the methods that
    can be used with that object, e.g., setting and returning a shape’s color. This
    chapter provides Go recipes related to the usage of `structs`, methods, and interfaces.


    ## Go Structs, Methods, and Interfaces


    In this section, we provide recipes to illustrate how to define user-defined data
    types using `structs`, define methods associated with `structs`, and use interfaces
    having a collection of methods to associate with `structs`. We use an example
    of a home automation system that uses sensors to send events details to a server,
    e.g., a door or a thermostat sending events.


    ### Structs


    In Go, whenever there is a need to define user-defined data types, `structs` are
    used. They allow programmers to group together logically related data. For example,
    a struct named `Person` can be used to group related information like first name,
    last name, age, and so on, in order to create a data record. In other words, `structs`
    can be used to store collections of items. `Structs` can be used to group user-defined
    data types as well as Go’s built-in data types. They also improve the modularity
    of your code and help create and pass around complex data structures.


    #### Declaring Structs in Go


    Listing [5-1](#536365_1_En_5_Chapter.xhtml#PC1) illustrates the declaration of
    a `struct` in Go. The declaration starts with the `type` keyword, followed by
    the user-defined name for the structure. This can be anything of your choice,
    and in the end, the `struct` keyword indicates that a new struct is being declared.
    Within the curly brackets, you can specify any number of data fields that you
    want to group. For each data field, it is important to specify the name and the
    data type.


    ```

    type identifier struct{

    field1 data_type

    field2 data_type

    field3 data_type

    }

    Listing 5-1

    General Format for Declaring Structs in Go

    ```


    While naming a `struct`, always remember that neither the `struct` nor its fields
    are exported to other packages if the identifiers of the `struct` and its fields
    start with lowercase letters. In Go, to export the identifiers, i.e., to allow
    accessibility to other packages, it is necessary to make ensure that the name
    begins with an uppercase letter.


    #### Creating Instances of a Struct Type


    There are multiple ways to instantiate new instances of a `struct` type. Consider
    Listing [5-2](#536365_1_En_5_Chapter.xhtml#PC2), where a `circle` struct is declared
    with three data fields—`length`, `breadth`, and `color`. Line#15 depicts how to
    use a `struct` without explicitly instantiating a new instance of that `struct`
    type. The `var` keyword initializes a variable `circle1` of the type `circle`.
    The dot notation (`.`) assigns values to the fields of the `struct` instance,
    as illustrated on line#19. Line#26 depicts how to create a `struct` instance using
    a struct literal, and you can skip values for data fields in this way. Lines 32
    and 39 use the `new` keyword to instantiate new instances of the `circle` struct.
    The difference between `circle3` and `circle4` is that `circle3` is a pointer
    to an instance of `circle`, whereas `circle4` is an instance of `circle`. Similarly,
    you can instantiate a new instance of the `struct` type using the pointer address
    operator (`&`), as shown in lines 46, 49, and 54.


    ```

    package main

    import (

    "fmt"

    )

    type circle struct {

    length  float32

    breadth float32

    color   string

    }

    func main() {

    //use struct without instantiating a new instance

    fmt.Println("Without Instantiating: ", circle{10.5, 25.10, "red"})

    //Creating Instance of Struct type

    var circle1 circle

    circle1.length = 20 //dot notation to assign values

    circle1.breadth = 30

    circle1.color = "Yellow"

    fmt.Println("Circle1: ", circle1)

    //Creating a Struct Instance Using a Struct Literal

    var circle2 = circle{length: 10, color: "Green"} /* breadth

    value is skipped */

    fmt.Println("Circle2: ", circle2)

    //Struct Instantiation Using new Keyword

    circle3 := new(circle) /* circle3 is a pointer to an instance of circle */

    circle3.length = 10

    circle3.breadth = 20

    circle3.color = "Red"

    fmt.Println("Circle3: ", circle3)

    var circle4 = new(circle) //circle4 is an instance of circle

    circle4.length = 40

    circle4.color = "Blue"

    fmt.Println("Circle4: ", circle4)

    //Struct Instantiation Using Pointer Address Operator

    var circle5 = &circle{10, 20, "Green"} //Can''t skip any value!

    fmt.Println(circle5)

    var circle6 = &circle{}

    circle6.length = 10

    circle6.color = "Red"

    fmt.Println(circle6) //value for breadth is skipped

    var circle7 = &circle{}

    (*circle7).breadth = 10

    (*circle7).color = "Blue"

    fmt.Println(circle7) //value for length is skipped

    }

    Listing 5-2

    Go Recipe for Creating Instances of a Struct Type

    ```


    **Output:**


    ```

    Without Instantiating:  {10.5 25.1 red}

    Circle1:  {20 30 Yellow}

    Circle2:  {10 0 Green}

    Circle3:  &{10 20 Red}

    Circle4:  &{40 0 Blue}

    Circle5:  &{10 20 Green}

    Circle6:  &{10 0 Red}

    Circle7:  &{0 10 Blue}

    ```'
