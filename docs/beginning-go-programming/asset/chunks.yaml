    \n本章通过一个示例来探讨如何在 Go 中执行 HTTP 调用。假设您想将应用程序的一些指标（包括时间戳、CPU 负载和内存）发布到服务器。在深入讲解实现此目标的\
    \ Go 代码之前，我们先来看一下 HTTP 响应是什么样子。最简单的方法是使用命令提示符中的 `curl` 命令后跟一个 URL，如图 7-1 所示。\n\
    \n![](img/536365_1_En_7_Fig1_HTML.jpg)\n\nHTTP 响应的结构。它包含 `curl` 命令、`Date`、`Content-Type`、`Content-Length`、`Connection`、`Server`\
