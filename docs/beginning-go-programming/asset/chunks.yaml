    本章提供了一些示例，说明了 Go 语言的基础编程知识。通过这些示例的练习，你可以获得 Go 的实践经验。本章涵盖的示例包括基本的 Go 程序，例如计算平均值和中位数，它们能帮助你更有效地理解映射、切片和数组。这些示例还涵盖了
    Go 中如何进行错误处理以及 `defer` 和恐慌恢复的使用。


    在下一章中，我们将提供在 Go 中处理文本的示例。


    # 4. 处理文本


    现实世界中的应用程序会处理大量文本数据。与 C++ 和 Java 等语言不同，在 Go 中，字符串表现为只读的字节切片。此外，使用 UTF-8 编码的 Unicode
    文本用于表示字符串的字节。Go 提供了多个用于字符串操作的库，例如 `strings`、`unicode` 和 `regexp` 等包。请注意，在 Go 中，字符串是*不可变的*或只读的，这意味着它们在被创建后其值不能被改变。尝试修改它们会引发错误。本章讨论如何在
    Go 语言中处理文本。具体来说，它涵盖了字符串格式化、Unicode 数据处理以及在 Go 语言中使用正则表达式。

