- fmt: '#### Querying the Size of an Array


    You can find the number of items that an array can hold (i.e., its size) by using
    the built-in `len` (short for length) function. You wrap the array identifier
    in the `len` function, like `len(array_name)`. Listing [2-21](#536365_1_En_2_Chapter.xhtml#PC32)
    demonstrates the use of the `len` function.


    ```

    fmt.Println("Size of array1: ", len(array1))

    fmt.Println("Size of array2: ", len(array2))

    Listing 2-21

    Using the len Function with Array in Go

    ```


    **Output:**


    ```

    Size of array1:  3

    Size of array2:  10

    ```


    Remember that, in Go, an array is an object, and like all objects, if you pass
    it to a function, a copy will be made of that array. However, storing the data
    is just about all you can do with the arrays and it’s not easy to sort or add/remove
    items at runtime. For such features and other operations, you should package the
    ordered data in slices instead of arrays.


    ### Slices in Go


    In Go, a *slice* is a layer of abstraction placed on top of the array data structure.
    The runtime allocates the necessary memory and constructs the array in the background
    when you define a slice, but only returns the slice. Furthermore, similar to arrays,
    all elements of a slice are of the same type. Even though arrays can simultaneously
    hold multiple data items of the same kind, there is no way to dynamically increase
    its size or extract a sub-array from it using any built-in functions. Slices get
    around these drawbacks. Slices are commonly utilized in Go and they provide various
    utility methods that are required with arrays.


    #### Defining Slices


    Slices are declared the same way as an array, with the difference that you do
    not specify their size, as shown in Listing [2-22](#536365_1_En_2_Chapter.xhtml#PC34).
    Alternatively, the `make` function can also be used to create slices.


    ```

    var colors = []string{"ed", "Green", "Blue"}

    var marks []float32          /* slice of unspecified size */

    var marks = make([]int,5,5)  /* slice of length and capacity 5*/

    Listing 2-22

    Defining Slices in Go

    ```


    #### The `len()` and `cap()` Functions


    Being an abstraction placed on top of arrays, the underlying structure of slices
    are arrays. To query the total number of items present in a slice, you use the
    `len()` function. To query the total number of items that can be stored in a slice,
    you use the `cap()` function. This essentially returns the size of the slice.
    Listing [2-23](#536365_1_En_2_Chapter.xhtml#PC35) illustrates the use of slices
    in Go.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    var marks = make([]float64, 3, 5) //declaring slice of length 3 and capacity 5

    printItemsOfSlice(marks)          //pass slice to a function

    }

    // function that accepts a slice and prints its details

    func printItemsOfSlice(x []float64) {

    fmt.Printf("Length=%d Capacity=%d Slice=%v\n", len(x), cap(x), x)

    }

    Listing 2-23

    Example Illustrating the Use of the len() and cap() Functions

    ```


    **Output:**


    ```

    Length=0 Capacity=0 Slice=[]

    ```


    #### Nil Slice


    A slice is initialized as `nil` by default if it is declared with no inputs. Also,
    the length and capacity of such a slice is zero. Listing [2-24](#536365_1_En_2_Chapter.xhtml#PC37)
    demonstrates the concept of `nil` slices in Go.


    ```

    package main

    import "fmt"

    func main() {

    var marks []float64       //declaring slice of float type

    printItemsOfSlice(marks)  //pass slice to a function

    if marks == nil {

    fmt.Printf("Slice is Nil")

    }

    }

    // function that accepts a slice and prints its details

    func printItemsOfSlice(x []float64) {

    fmt.Printf("Length=%d Capacity=%d Slice=%v\n", len(x), cap(x), x)

    }

    Listing 2-24

    Nil Slices in Go

    ```


    **Output:**


    ```

    Length=0 Capacity=0 Slice=[]

    Slice is Nil

    ```


    #### Sub-Slicing in Go


    In Go, you can extract a sub-slice of an array by specifying the required lower
    and upper bounds using `[lower-bound:upper-bound]`. Listing [2-25](#536365_1_En_2_Chapter.xhtml#PC39)
    illustrates the concept of sub-slicing in Go.


    ```

    package main

    import "fmt"

    func main() {

    /* Declare and Initialize a Slice of float type */

    marks := []float32{10, 12.6, 20.0, 37.56, 48.74, 50.0, 64.15, 79.63, 8.75}

    /*pass slice to user-defined function to print it details*/

    printSliceDetails(marks)

    /* Printing the Elements of the Original Slice */

    fmt.Println("Original Slice =", marks)

    /* Printing sub-slice of marks slice beginning from

    index 1(inclusive) to index 5(excluded)*/

    fmt.Println("Marks[1:5] = ", marks[1:5])

    /* Not indicating the lower bound inferred as 0 */

    fmt.Println("Marks[:4] =", marks[:4])

    /* Not indicating the upper bound is inferred as len(slice) */

    fmt.Println("Marks[3:] =", marks[3:])

    marks1 := make([]float32, 0, 5)

    /*pass slice to user-defined function to print it details*/

    printSliceDetails(marks1)

    /* Printing sub-slice of marks beginning from

    index 0(inclusive) to index 3(exclusive) */

    marks2 := marks[:3] //storing subslice in slice named marks2

    /*pass slice to user-defined function to print it details*/

    printSliceDetails(marks2)

    /* Printing sub-slice of marks beginning from

    index 4(inclusive) to index 5(exclusive) */

    marks3 := marks[4:5]

    /*pass slice to user-defined function to print it details*/

    printSliceDetails(marks3)

    }

    func printSliceDetails(x []float32) {

    fmt.Printf("Length=%d Capacity=%d Slice=%v\n", len(x), cap(x), x)

    }

    Listing 2-25

    Sub-Slicing in Go

    ```


    **Output:**


    ```

    Length=9 Capacity=9 Slice=[10 12.6 20 37.56 48.74 50 64.15 79.63 8.75]

    Original Slice = [10 12.6 20 37.56 48.74 50 64.15 79.63 8.75]

    Marks[1:5] = [12.6 20 37.56 48.74]

    Marks[:4] = [10 12.6 20 37.56]

    Marks[3:] = [37.56 48.74 50 64.15 79.63 8.75]

    Length=0 Capacity=5 Slice=[]

    Length=3 Capacity=9 Slice=[10 12.6 20]

    Length=1 Capacity=5 Slice=[48.74]

    ```'
