- fmt: '### Modifying Shared Resources Using Atomic Counters


    Other than using the `mutex` type to mark critical sections of a program, Go also
    provides mechanisms through which you can perform changes to shared variables
    but in a thread-safe manner. These are called *atomic counters*. Atomic counters
    are routines that allow you to perform mathematical operations on variables one
    thread at a time. Go provides the `sync/atomic` package, which contains different
    low-level atomic memory primitives that can be handy when implementing synchronization
    algorithms. However, great caution is required to ensure that these functions
    are used correctly. Other than certain particular low-level applications, it is
    always recommended to write synchronization algorithms using channels or functionalities
    provided by the `sync` package.


    Let’s look at an example to learn how to use the `atomic` package in Go programs.
    Let’s say you host a web server that is used by multiple people to upload files.
    Suppose you want to keep track of the amount of data that has been uploaded to
    the server. In order to accomplish this task, the `sync/atomic` package can be
    used. The `sync/atomic` contains different low-level primitives that are faster
    in performance and usage when compared to `sync.Mutex`.


    As shown in Listing [8-6](#536365_1_En_8_Chapter.xhtml#PC11), this program starts
    by declaring the variable `totalSize` of `uint64` type. This is used to store
    the total uploaded size. Note that, when working with the `sync/atomic` package,
    you have to be very specific about sizes. Generic types cannot be used, in this
    case `int` or `uint`. Inside the `uploadHandler()` handler function, you defer
    the closing of the body of the response object, then read the data, then signal
    any errors. To update `totalSize`, `atomic.AddUint64()` is called. It takes the
    pointer to `totalSize` as input and converts the length of the data to `uint64`.
    No locking is required during this conversion, as it’s very fast and done automatically
    by `sync/atomic`. In `main()`, you set up the handler function and use `http.ListenAndServe()`
    to start an HTTP server with a given address and handler. If you’re going to expose
    metrics, consider using the `expvar` package. It not only lets you automatically
    increment counters, but also exposes them to the web.


    ```

    package main

    import (

    "fmt"

    "io/ioutil"

    "log"

    "net/http"

    "sync/atomic"

    )

    var totalSize uint64

    func uploadHandler(w http.ResponseWriter, r *http.Request) {

    defer r.Body.Close()

    data, err := ioutil.ReadAll(r.Body)

    if err != nil {

    http.Error(w, err.Error(), http.StatusBadRequest)

    return

    }

    size := atomic.AddUint64(&totalSize, uint64(len(data)))

    //TODO: work with data

    fmt.Fprintf(w, "size=%d\n", size)

    }

    func main() {

    http.HandleFunc("/upload", uploadHandler)

    if err := http.ListenAndServe(":8080", nil); err != nil {

    log.Fatal(err)

    }

    }

    ```


    **Listing 8-6** Go Recipe for Modifying Shared Resources Using Atomic Counters


    ## Synchronizing Goroutines


    When multiple goroutines are running simultaneously, it is important to synchronize
    the goroutines to ensure the way a program’s execution is coordinated. For example,
    there can be two goroutines in a program responsible for getting data from different
    web services, and you must make sure that both of these goroutines finish their
    execution before the next block of code is executed. In this case, there must
    be some mechanism to indicate when these goroutines have finished their execution.


    If you look at the following snippet from Listing [8-6](#536365_1_En_8_Chapter.xhtml#PC11),
    you will notice the `fmt.Scanln()` statement at the end of the `main()` function.


    ```

    func main() {

    balanceAmount = 3000

    fmt.Println("Initial balance: ", balanceAmount)

    go creditToBalance()

    go debitFromBalance()

    fmt.Scanln()

    }

    ```


    If the `fmt.Scanln()` statement is removed from Listing [8-6](#536365_1_En_8_Chapter.xhtml#PC11),
    after calling the two goroutines, the `main()` function exits immediately and
    the balance printed is not the correct final result, as shown in Figure [8-2](#536365_1_En_8_Chapter.xhtml#Fig2).


    ![](images/536365_1_En_8_Chapter/536365_1_En_8_Fig2_HTML.jpg)


    An illustration depicts the code which displays the effect of not adding Scanln
    to the end of the code. The code is written as dollar go run mutex-1.go and the
    initial balance: 3000.


    **Figure 8-2** The effect of not adding `Scanln` to the end of code


    When multiple goroutines are running simultaneously and there is a need to know
    when they have completed their execution, this is called a *wait group*, as explained
    in the following section.'
