    Let’s suppose you have a ledger of stocks saved on your system in a text format.
    There are 12 shares of Microsoft for $234.57 and 10 shares of Tesla of $692.40.
    Suppose that, after automatically parsing the ledger, the text must be transferred
    into a slice of struct type `transaction`.


    To do this, first write a function that will be used for parsing one line of the
    ledger at a time. Additionally, the ledger is not in a structured format, such
    as YAML, CSV, XML, or JSON. Because of this, it is necessary to use regular expressions
    to perform parsing. In Go, the `regexp` package provides several regular expressions
    that programmers can use. To learn about the syntax for using regular expressions,
    refer to the [`regexp/syntax`](https://pkg.go.dev/regexp/syntax) package’s official
    documentation (`https://pkg.go.dev/regexp/syntax`).


    Listing 4-4 is one sample solution to solving this scenario. In Listing 4-4, you
    must first define the regular expression to parse a single line. Remember that
    it is considered good practice to always give an example of your regular expressions
    in the form of comments code for better understanding. Here, the `MustCompile()`
    function will cause panic if the regular expression is not valid.


    Note that this program declared the variable holding the regular expression at
    the global level so that it is accessible by the entire program and the `panic`
    will cause the entire program to crash. In the regular expression, `\d+` is a
    placeholder for numbers. The `+` sign means one or more characters are allowed.
    The expression `([A-Z]+)` means that uppercase characters are acceptable. The
    `\$` is for a dollar sign. The expression `(\d+(\.\d+)?)` is used for printing
    prices. It accepts one or more numbers after the dollar sign followed by a (`.`)
    and then one or more numbers. Thus you have declared the `Transaction` struct.


    The `parseLine()` function takes a string as an input argument and returns an
    object of `Transaction` type along with an error. Within the function, we first
    check whether the string passed matches the regular expression using the `FindStringSubmatch()`
    function. It returns a slice of matches. If there are no matches, it returns an
    error and an empty transaction object. When there’s a match, it assigns the values
    to the respective member fields of the `transaction` type object `trans`. Since
    regular expressions deal with text, the matches are going to be strings. You need
    to convert them to integers in the case of the volume and to floats in the case
    of the price. You can do this by using the `strconv.Atoi()` and `strconv.ParseFloat()`
    functions, respectively. While doing so, you can ignore the returned errors, because
    you know the regular expression matches a valid string that can be converted safely
    into a number.


    ```go

    package main

    import (

    "fmt"

    "log"

    "regexp"

    "strconv"

    )

    /*

    12 shares of MSFT for $234.57

    10 shares of TSLA for $692.4

    */

    var transRe = regexp.MustCompile(`(\d+) shares of ([A-Z]+) for \$(\d+(\.\d+)?)`)

    type Transaction struct {

    Symbol string

    Volume int

    Price  float64

    }

    func parseLine(line string) (Transaction, error) {

    matches := transRe.FindStringSubmatch(line)

    if matches == nil {

    return Transaction{}, fmt.Errorf("Bad Line: %q", line)

    }

    var trans Transaction

    trans.Symbol = matches[2]

    trans.Volume, _ = strconv.Atoi(matches[1])

    trans.Price, _ = strconv.ParseFloat(matches[3], 64)

    return trans, nil

    }

    func main() {

    line := "12 shares of MSFT for $234.57"

    t, err := parseLine(line)

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", t)

    }

    ```


    **Output:**

    ```

    {Symbol:MSFT Volume:12 Price:234.57}

    ```


    Suppose you are running a Linux machine and would like to know how many times
    your system has rebooted. This information can be obtained from a `sys.log` file.
    Using the `grep` utility, you can search this file for the sentence “System is
    rebooting”. In the following example, you will write a function that will work
    like the `grep` utility and show lines that contain the terms you are searching
    for.


    As shown in Listing 4-5, the `grep()` function takes two inputs—an `io.Reader`
    object from which the text will be read and the term you have to search for. Additionally,
    it returns a slice of strings matching the desired term. The `NewScanner()` returns
    a new scanner to read from the `io.Reader`. The `strings.Contains()` determines
    whether the current text contains the required terms. If it does, you append the
    current line to the `matches` slice. You need to check if there was an error while
    scanning. If not, you return the `matches`.


    ```go

    package main

    import (

    "bufio"

    "fmt"

    "io"

    "log"

    "strings"

    )

    func main() {

    r := strings.NewReader("This is a sample code. Learn to code properly")

    term := "code"

    matches, err := (grep(r, term))

    if err != nil {

    log.Fatalln(err.Error())

    }

    if matches != nil {

    fmt.Println("Lines containing \"", term, "\" are :")

    fmt.Println(matches)

    } else {

    fmt.Println("Query term is not present")

    }

    }

    //grep returns lines in r that contain term

    func grep(r io.Reader, term string) ([]string, error) {

    var matches []string

    s := bufio.NewScanner(r)

    for s.Scan() {

    if strings.Contains(s.Text(), term) {

    matches = append(matches, s.Text())

    }

    }

    if err := s.Err(); err != nil {

    return nil, err

    }

    return matches, nil

    }

    ```


    **Output:**

    ```

    Lines containing " code " are :

    [This is a sample code. Learn to code properly]

    ```


    ## Hands-on Challenge


    Write a Go program to return the count of occurrences of Go subcommands from a
    given file. The file contains text in the following format.


    ```

    1542784314:0;git push

    1542784378:0;ls

    1542784308:0;go test

    1542784310:0;go test -v

    ```


    ## Solution


    Listing 4-6 shows one possible solution to this hands-on challenge.


    ```go

    package main

    import (

    "bufio"

    "fmt"

    "os"

    "regexp"

    )

    /* Example data in file to read

    1542784314:0;git push

    1542784378:0;ls

    1542784308:0;go test

    1542784310:0;go run -v

    1542784311:0;go test -v

    */

    var cmdRe = regexp.MustCompile(`;go ([a-z]+)`)

    //cmdFreq returns the frequency of the go subcommand from the given file

    func cmdFreq(fileName string) (map[string]int, error) {

    file, err := os.Open(fileName)

    if err != nil {

    return nil, err

    }

    defer file.Close()

    freqs := make(map[string]int)

    s := bufio.NewScanner(file)

    for s.Scan() {

    matches := cmdRe.FindStringSubmatch(s.Text())

    if len(matches) == 0 {

    continue

    }

    cmd := matches[1]

    freqs[cmd]++

    }

    if err := s.Err(); err != nil {

    return nil, err

    }

    return freqs, nil

    }

    func main() {

    result, _ := cmdFreq("./sample.txt")

    for key, _ := range result {

    fmt.Println("Subcommand: ", key, " Count: ", result[key])

    }

    }

    ```


    **Output:**

    ```

    Subcommand:  test  Count:  2

    Subcommand:  run  Count:  1

    ```


