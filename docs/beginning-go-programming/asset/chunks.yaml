- fmt: '# Unmarshalling JSON with Go


    To learn how to unmarshal JSON data in the Go language, you’ll look at an example.
    Say you would like to process readings received from a weather measurement station.
    The readings are in the form of JSON messages containing information in the following
    format about time, station name, temperature, and rain:


    ```

    {

    "time": "2022-02-15T00:00:00Z",

    "station": "DS9",

    "temperature": 21.6,

    "rain": 0

    }

    ```


    You can use Listing [6-1](#536365_1_En_6_Chapter.xhtml#PC2) to achieve this goal.
    The first step is to define a struct named `Record` that has the `Time`, `Station`,
    `Temperature`, and `Rain` member fields. This struct will be used to store the
    readings received from a weather station. Note that the name the member fields
    of the struct are capitalized. This is because we intend to export them, i.e.,
    make them accessible to other parts of the program. In Go, the `json` package
    contains the heuristics for conversion of JSON-formatted data from uppercase to
    lowercase, so you don’t have to worry about this. The `readRecord()` function
    reads and decodes the JSON data from the received readings. It takes an `io.Reader`
    object as input and returns a struct instance of the `Record` type along with
    any `error` if one occurs. Within the `readRecord()` function, an empty record
    is created. Furthermore, as with the `io.reader` object, we used the `decoder`
    to decode the JSON data received. The decoder will decode as well as store the
    result in the struct instance called `rec`, passing it as a pointer with any errors.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io"

    "log"

    "os"

    "time"

    )

    //Record is a weather record

    type Record struct {

    Time    time.Time

    Station string

    Temperature    float64 //`json: "temperature"` //celsius

    Rain    float64 //millimeter

    }

    func readRecord(r io.Reader) (Record, error) {

    var rec Record

    dec := json.NewDecoder(r)

    if err := dec.Decode(&rec); err != nil {

    return Record{}, err

    }

    return rec, nil

    }

    func main() {

    file, err := os.Open("record.json")

    fmt.Printf("file: %v\n", file)

    if err != nil {

    log.Fatal(err)

    }

    defer file.Close()

    rec, err := readRecord(file)

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", rec)

    }

    Listing 6-1

    Go Recipe for Using a JSON Package

    ```


    **Output:**


    ```

    {Time:2022-02-02 00:00:00 +0000 UTC Station: DS9 Temp:21.6 Rain:0}

    ```


    # Parsing Complex JSON with Go


    In some cases, the JSON response can be too complex. Say you have an API that
    gets the status of a list of stations. The JSON response is shown here:


    ```

    {

    "lastCheckTime": "2022-02-15 09:20:15 PM",

    "stations":[

    {

    "id":3,

    "name": "station 3",

    "status": "Active",

    "statusKey": 1,

    "lastCheck": {

    "time": "2016-01-22 04:30:15 PM",

    "success": true

    }

    },

    {

    "id":1,

    "name": "station 2",

    "status": "Active",

    "lastCheck": {

    "time": "2020-01-22 04:32:41 PM",

    "success": true

    }

    },

    ]

    }

    ```


    From this JSON response, say you want to print the names of all the stations whose
    last check is more than a certain time. To achieve this goal, use Listing [6-2](#536365_1_En_6_Chapter.xhtml#PC5).
    In the `laggingStations()` function, instead of writing a specific type for each
    message in the JSON, you use an anonymous struct called `reply`. This structure
    contains the `lastCheckTime` as well as the station detail. Be careful to ensure
    that the name of the fields in the struct match the names in the JSON. Then you
    have `stations`, which is a slice of struct that has a `name`, `status`, and `lastCheckTime`,
    which is again a struct with a member field called `time` of `string` type. This
    example uses `time` as a `string` because the time format in the JSON message
    does not match how Go encodes times in JSON.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io"

    "log"

    "os"

    "time"

    )

    /*{

    "lastCheckTime": "2022-02-15 09:20:15 PM",

    "stations":[

    {

    "id":3,

    "name": "station 3",

    "status": "Active",

    "statusKey": 1,

    "lastCheck": {

    "time": "2016-01-22 04:30:15 PM",

    "success": true

    }

    },

    {

    "id":1,

    "name": "station 2",

    "status": "Active",

    "lastCheck": {

    "time": "2020-01-22 04:32:41 PM",

    "success": true

    }

    },

    ]

    }

    */

    //laggingStations return stations that are lagging in their check time

    func laggingStations(r io.Reader, timeout time.Duration) ([]string, error) {

    var reply struct {

    LastCheckTime string

    Stations      []struct {

    Name      string

    Status    string

    LastCheck struct {

    Time string

    }

    }

    }

    dec := json.NewDecoder(r)

    if err := dec.Decode(&reply); err != nil {

    return nil, err

    }

    checkTime, err := parseTime(reply.LastCheckTime)

    if err != nil {

    return nil, err

    }

    var lagging []string

    for _, station := range reply.Stations {

    if station.Status != "Active" {

    continue

    }

    lastCheck, err := parseTime(station.LastCheck.Time)

    if err != nil {

    return nil, err

    }

    if checkTime.Sub(lastCheck) > timeout {

    lagging = append(lagging, station.Name)

    }

    }

    return lagging, nil

    }

    func parseTime(ts string) (time.Time, error) {

    return time.Parse("2006-01-02 15:04:05 PM", ts)

    }

    func main() {

    file, err := os.Open("stations.json")

    if err != nil {

    log.Fatal(err)

    }

    defer file.Close()

    lagging, err := laggingStations(file, time.Minute)

    if err != nil {

    log.Fatal(err)

    }

    for _, name := range lagging {

    fmt.Println(name)

    }

    }

    Listing 6-2

    Go Recipe for Parsing Complex JSON in Go

    ```


    **Output:**


    ```

    station 3

    ```


    # Marshalling JSON with Go


    Not all Go types can be converted to JSON, and in some cases you’ll need a different
    JSON coding for your types. If you like custom serialization for your types, you
    need to implement the `json.Marshaler` interface. If you also like to support
    unmarshalling, you need to implement `json.Unmarshaler`. Listing [6-3](#536365_1_En_6_Chapter.xhtml#PC7)
    shows how to achieve this. Say you have `Quantity`, which is a struct with the
    `value` and `unit` member fields. You want to encode it as a `string` such as
    `42.192km`, instead of as JSON objects with two fields. For this, you define the
    `MarshalJSON()` function on the `Quantity` type. It returns a `byte` slice and
    a possible error. This function has three steps. First, you validate that the
    value is not an empty unit. Second, you convert the type to a type that is recognized
    by JSON. In this case, we use `%f` to convert the `struct` into a `string`. The
    last step, we use the built-in `json.Marshal()` to convert the `string` to JSON.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "os"

    )

    //Quantity is combination of value and unit (e.g. 2.7cm)

    type Quantity struct {

    Value float64

    Unit  string

    }

    //MarshalJSON implements the json.Marshaler interface

    //Example encoding: "42.192km"

    func (q *Quantity) MarshalJSON() ([]byte, error) {

    if q.Unit == "" {

    return nil, fmt.Errorf("empty unit")

    }

    text := fmt.Sprintf("%f%s", q.Value, q.Unit)

    return json.Marshal(text)

    }

    func main() {

    q := Quantity{1.78, " meter"}

    json.NewEncoder(os.Stdout).Encode(&q) //"1.780000meter"

    }

    Listing 6-3

    Go Recipe for Marshalling JSON in Go

    ```


    **Output:**


    ```

    1.780000meter

    ```'
