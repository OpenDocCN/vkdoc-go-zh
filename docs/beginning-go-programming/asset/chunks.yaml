    ### Methods


    In Go, if functions are attached to user-defined custom types, they are then referred
    to as methods. In the case of an object-oriented language like Java, each method
    is a member of a class. Whereas, in Go a method is a member of a type. Listing
    [2-53](#536365_1_En_2_Chapter.xhtml#PC88) illustrates how to attach a method to
    the struct.


    ```go

    package main

    import (

    "fmt"

    )

    func main() {

    poodle := Dog{"Poodle", 10, "woff!"}

    fmt.Println(poodle)

    fmt.Printf("%+v\n", poodle)

    fmt.Printf("Breed: %v\nWeight: %v \n", poodle.Breed, poodle.Weight)

    poodle.Speak()

    }

    //Dog is a struct

    type Dog struct {

    Breed  string

    Weight int

    Sound  string

    }

    func (d Dog) Speak() {

    fmt.Println(d.Sound)

    }

    Listing 2-53

    Example Illustrating the Use of Methods in Go

    ```


    **/*Output:**


    ```

    {Poodle 10 woff!}

    {Breed: Poodle Weight:10 Sound:woff!}

    Breed: Poodle

    Weight: 10

    woff!

    */

    ```


    Go doesn’t support method overriding; each method must have its own unique name.
    But like all functions, methods can return values just to clear the type assigned
    to the method, as shown in Listing [2-54](#536365_1_En_2_Chapter.xhtml#PC90).


    ```go

    package main

    import (

    "fmt"

    )

    func main() {

    poodle := Dog{"Poodle", 10, "woff!"}

    fmt.Println(poodle)

    fmt.Printf("%+v\n", poodle)

    fmt.Printf("Breed: %v\nWeight: %v \n", poodle.Breed, poodle.Weight)

    poodle.Speak()

    poodle.Sound = "Arf!"

    poodle.Speak()

    poodle.SpeakThreeTimes()

    }

    //Dog is a struct

    type Dog struct {

    Breed  string

    Weight int

    Sound  string

    }

    func (d Dog) Speak() {

    fmt.Println(d.Sound)

    }

    func (d Dog) SpeakThreeTimes() {

    d.Sound = fmt.Sprintf("%v %v %v", d.Sound, d.Sound, d.Sound)

    fmt.Println(d.Sound)

    }

    Listing 2-54

    Methods with Returning Values

    ```


    **/*Output:**


    ```

    {Poodle 10 woff!}

    {Breed:Poodle Weight:10 Sound:woff!}

    Breed: Poodle

    Weight: 10

    Woff!

    Arf!

    Arf! Arf! Arf!

    */

    ```


    Note that when you pass the `dog` object to a function as the receiver, a copy
    is made of it, i.e. this is pass by value and not reference. If you want it to
    be a reference, you can use pointers. But within the function, this is a brand
    new copy of the object. So when you modify the `sound` field, you are not modifying
    the version that was created in the `main` function. The ability to create custom
    methods for your own types makes the Go programming language behave more like
    a fully object-oriented language. Even without the sort of type inheritance that
    you find in C++ and Java, a struct can have as many different methods as it needs
    to accomplish your application’s requirements.


    ## Write/Read Text Files


    There are a number of ways to create a file in Go. There are high-level abstractions
    of the low-level operations that are required.


    ### Write Text Files


    The example in Listing [2-55](#536365_1_En_2_Chapter.xhtml#PC92) shows you how
    to write to a file in Go. The `checkError()` will be used for error checking throughout
    this program. The function will check the object passed to it and if the object
    is not `nil`, i.e., an error has occurred performing some operation in the main
    program, the function will crash the application and display the error message.


    In the `main()` function, the `content` variable holds the string value you want
    to write to the `fromString.txt` file. On Line#2, in the `main()` function, we
    create a file reference named `file`, which is basically a variable that will
    be used as a reference to the file. Along with this, we also specify a variable
    called `err` to store error messages returned by the `os.Create()` function. The
    `Create()` function takes the location of the file to which the data should be
    written. Furthermore, it creates the named file if it doesn’t exist or truncates
    it if it already exists. Here, the `./` means the file is in the same directory
    as the application.


    On Line#4 in the `main()` function, the `length` variable stores the number of
    bytes written to the file as returned by the `WriteString()` function. The `WriteString()`
    function requires a writer object and a string, here we passed `file` as the writer
    and the `content` variable as the string that has to be written to the file. Whenever
    you’re working with files, it is of utmost importance to close files that you
    opened when you are done. The `defer` keyword is waiting until everything else
    is done and then executes this command. With the `defer` keyword, we have written
    the `file.Close()` command to ensure that when everything is done, the file referred
    to in the `file` reference object is closed.


    ```go

    package main

    import (

    "fmt"

    "io"

    "io/ioutil"

    )

    func main() {

    content := "Hello from Go! "

    file, err := os.Create("./fromString.txt")

    checkError(err)

    defer file.Close()

    length, err := io.WriteString(file, content)

    checkError(err)

    fmt.Printf("Wrote a file with %v characters\n",length)

    }

    /* checkError is a function for error checking */

    func checkError(err error) {

    if err != nil {

    panic(err)

    }

    }

    Listing 2-55

    Program Illustrating How to Write to Text Files in Go

    ```


    **Output:**


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Figb_HTML.jpg)


    A screenshot of a program output reads Hello from Go.


    ```

