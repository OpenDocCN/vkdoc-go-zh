    ```

    map[]

    map[CA:California OR:Oregon WA:Washington]

    California

    map[CA:California NY:New York WA:Washington]

    WA: Washington

    NY: New York

    CA: California

    [WA NY CA]

    [CA NY WA]

    California

    New York

    Washington

    */

    ```


    ## Structs Data Type


    As discussed earlier, arrays in Go are essentially variables that can store multiple
    data items of the *same* kind. To overcome this limitation, Go offers *structures,*
    which are user-defined types that can be used to store data items of *different*
    kinds. A structure essentially represents a *record* of data. For example, if
    there is a need to track different information about books available in a library,
    structures are the most useful way to store different attributes of a book, such
    as `BookID`, `Title`, `Subject`, `Author`, and so on.


    ### Defining a Structure


    To define a structure, you must use the `type` and `struct` statements. The `struct`
    statement defines a new data type that will contain multiple members. The `type`
    statement binds a name to the structure. The general format for declaring a structure
    using the `type` and `struct` statements is illustrated in Listing [2-33](#536365_1_En_2_Chapter.xhtml#PC55).


    ```

    type struct_variable_type struct {

    member definition;

    member definition;

    ...

    member definition;

    }

    Listing 2-33

    General Format for Declaring Structures in Go

    ```


    After defining a structure type in your code, multiple variables of this struct
    type can be declared. The general format for doing so is `variable_name := structure_variable_type
    {value1, value2...value n}`


    ### Accessing Members of a Structure


    In order to access any member field of a `struct`, you use the member access operator
    (`.`). Remember that the `struct` keyword is mandatory for defining variables
    of a defined `struct` type. Listing [2-34](#536365_1_En_2_Chapter.xhtml#PC56)
    illustrates the use of the `struct` type in Go and shows how to access its member
    fields.


    ```

    package main

    import "fmt"

    type Books struct {

    bTitle      string

    bAuthorName string

    bSubject    string

    book_id     int

    }

    func main() {

    var Book1 Books /* Declaring variable of type Book */

    var Book2 Books /* Declaring variable of type Book */

    /* Access member fields of Book struct to define Book1 */

    Book1.bTitle = "The Go Programming Language"

    Book1.bAuthorName = "Alan A. A. Donovan and Brian W. Kernighan"

    Book1.bSubject = "A complete guide to Go programming"

    Book1.book_id = 6495

    /* Access member fields of Book struct to define Book2 */

    Book2.bTitle = "The Complete Book of Arts & Crafts"

    Book2.bAuthorName = "Dawn Purney"

    Book2.bSubject = "The Complete Book of Arts and Crafts of fun activities for children"

    Book2.book_id = 6496

    /* Print the details of Book1 */

    fmt.Printf("Book1 bTitle : %s\n", Book1.bTitle)

    fmt.Printf("Book1 bAuthorName : %s\n", Book1.bAuthorName)

    fmt.Printf("Book1 bSubject : %s\n", Book1.bSubject)

    fmt.Printf("Book1 book_id : %d\n", Book1.book_id)

    /* Print the details of Book1 */

    fmt.Printf("Book2 bTitle : %s\n", Book2.bTitle)

    fmt.Printf("Book2 bAuthorName : %s\n", Book2.bAuthorName)

    fmt.Printf("Book2 bSubject : %s\n", Book2.bSubject)

    fmt.Printf("Book2 book_id : %d\n", Book2.book_id)

    }

    Listing 2-34

    Using Structs in Go

    ```


    **/*Output:**


    ```

    Book1 bTitle      : The Go Programming Language

    Book1 bAuthorName : Alan A. A. Donovan and Brian W. Kernighan

    Book1 bSubject    : A complete guide to Go programming

    Book1 book_id     : 6495

    Book2 bTitle      : The Complete Book of Arts & Crafts

    Book2 bAuthorName : Dawn Purney

    Book2 bSubject    : The Complete Book of Arts and Crafts of fun activities for
    children

    Book2 book_id     : 6496

    */

    ```'
