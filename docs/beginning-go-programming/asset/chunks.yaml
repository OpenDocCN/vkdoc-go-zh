  trans: '

    ### 自定义类型


    自定义类型通常与自动递增常量结合使用，以便程序员可以依赖编译器进行处理，如代码清单 9-6 所示。


    ```go

    type Months int

    const (

    January    Months = iota // 0

    February                 // 1

    March                    // 2

    April                    // 3

    May                      // 4

    June                     // 5

    July                     // 6

    )

    代码清单 9-6

    使用 IOTA 的自定义类型

    ```


    如代码清单 9-7 所示，如果将 `Months` 类型参数传递给一个定义为只接受 `int` 类型参数的函数，这将无法正常工作。程序将在编译时抛出错误。


    ```go

    func Counter(k int) {

    fmt.Printf("物品数量: %d", k)

    }

    func main() {

    m1 := January

    fmt.Println(Counter(m1))

    }

    代码清单 9-7

    因类型不匹配导致的编译时错误

    ```


    **输出：**


    ![](img/536365_1_En_9_Figa_HTML.jpg)


    错误信息显示："cannot use m1 (variable of type `Months`) as `int` value in argument to
    `Counter`"（不能将类型为 `Months` 的变量 m1 作为 `int` 值传递给 `Counter` 函数）。


    反之亦然。如代码清单 9-8 所示，不能将 `int` 类型参数传递给一个定义为接受 `Months` 类型参数的函数。


    ```go

    type Months int

    const (

    January  Months = iota // 0

    February               // 1

    March                  // 2

    April                  // 3

    May                    // 4

    June                   // 5

    July                   // 6

    )

    func Counter(k Months) {

    fmt.Printf("物品数量: %d", k)

    }

    func main() {

    m2 := 2

    fmt.Println(Counter2(m2))

    }

    代码清单 9-8

    因类型不匹配导致的编译时错误

    ```


    **输出：**


    ![](img/536365_1_En_9_Figb_HTML.jpg)


    错误信息显示："cannot use m2 (variable of type `int`) as `Months` value in argument to
    `Counter-2`"（不能将类型为 `int` 的变量 m2 作为 `Months` 值传递给 `Counter-2` 函数）。


    然而，这种情况也有一个例外。当数值常量作为参数传递时，代码会编译并通过，如代码清单 9-9 所示。这是因为在 Go 语言中，常量是松散类型的，除非在严格的上下文中使用。


    ```go

    func GetMonth(character Months) string {

    var str string

    switch character {

    case January:

    str = "这是一月。"

    case February:

    str = "这是二月。"

    case Tuesday:

    str = "这是三月。"

    }

    return str

    }

    func main() {

    fmt.Println(GetMonth(0))

    }

    代码清单 9-9

    演示 Go 语言中常量松散类型特性的程序

    ```


    **输出：**


    `这是一月。`


    ### 跳过值


    在某些场景下，你可能希望使用 IOTA 为常量赋值，但又不希望值按顺序连续排列，而是想跳过某些值。如代码清单 9-10 所示，可以使用下划线来跳过不需要的值。


    ```go

    const (

    CatElectronics  = iota   //0

    CatAppliances            //1

    CatHardware              //2

    _

    _

    CatComputer              //5

    )

    代码清单 9-10

    使用 IOTA 时跳过值

    ```


    ### 表达式


    除了自动递增之外，IOTA 还可用于其他多种用途。其中一种用途是在表达式中使用。其结果可以存储在常量中。代码清单 9-11 展示了一个说明此功能的示例。在此示例中，`<<`
    是位掩码操作符。这个技巧之所以有效，是因为在 const 组中，每一行只有一个标识符，所以前一个表达式会被取出并重新应用于该标识符，但会使用递增后的 IOTA
    值。这个过程也称为最后非空表达式列表的隐式重复。


    ```go

    type AllergyMagnitude float32

    const (

    PeanutAllergy = 1 << iota //00000001

    ChocolateAllerg           // 1 << 1 即 00000010

    DustAllergy               // 1 << 2 即 00000100

    MilkAllergy               // 1 << 3 即 00001000

    )

    代码清单 9-11

    将 IOTA 标识符与表达式结合使用

    ```


    ### 易混淆的常量


    你可能会好奇在 const 组中，一行内定义两个常量的输出结果是什么。例如，在代码清单 9-12 中，常量 `Value2` 或 `Value6` 的值会是多少？


    ```go

    const (

    Value1, Value2 = iota + 1, iota + 2

    Value3, Value4

    Value5, Value6

    )

    代码清单 9-12

    在 const 组中使用 IOTA 在一行内错误声明多个常量

    ```


    在这种情况下，IOTA 的值是在下一行递增，而不是在它被引用时。这会导致代码混乱，因为你现在会得到具有相同值的常量，如代码清单 9-13 所示。


    ```

    // ValA: 1

    // ValB: 2

    // ValC: 2

    // ValD: 3

    // ValE: 3

    // ValF: 4

    代码清单 9-13

    在 const 组中使用 IOTA 在一行内定义两个常量的输出结果

    ```


    ## 总结


    本章提供了关于如何更有效、更高效地使用 Go 的各种技巧和诀窍。这些实用技巧涵盖了几个主题，包括导入包、检查程序中导入了哪些包、使用 `goimports`
    格式化代码、高效组织代码、使用自定义构造函数、依赖包管理、优化编译、通过 Git 设置项目的构建 ID，以及关于 IOTA 标识符的几个技巧。

