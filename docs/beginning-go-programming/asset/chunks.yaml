- fmt: '### Recipe to See Structs in Action


    Listing [5-3](#536365_1_En_5_Chapter.xhtml#PC4) illustrates the use of structs
    through an example of a house automation system that uses sensors that send different
    event details. Because there can be multiple different sensors, to store the information
    of different events generated by them, you first define a struct named `event`.
    The member fields of the `event` struct are used to identify the instrument that
    generated the event (in this case, a door or thermostat) and the time that the
    event has occurred.


    It also defines instrument-specific events, namely `DoorEvent` and `TemperatureEvent`,
    to illustrate the concept of *type embedding* in Go. Type embedding is a technique
    where you include one type into another but as a parameter without a name. Through
    type embedding, all of the exported parameters and methods defined on the embedded
    type are also accessible to the type within which the type is embedded. Both the
    `DoorEvent` and `TemperatureEvent` structs embed the `Event` type. In addition
    to the member fields of the `Event` struct, each struct also has its own respective
    member fields as well. The `NewDoorEvent()` function takes input parameters that
    will be used to create an object of the struct `DoorEvent`. Upon entering the
    function, you perform some validation to make sure that the `ID` is not empty.
    Next, you create an `evt` variable of the embedded type `Event`. At the end of
    the function, you return the pointer to the `evt` variable containing the event
    details. If you’re familiar with C or C++, it might seem odd to return a pointer
    to something that is allocated on the stack. The Go compiler performs an escape
    analysis and moves the event details being used outside of the function from the
    stack to the heap.


    ```

    package main

    import (

    "fmt"

    "log"

    "time"

    )

    type Event struct {

    ID   string

    Time time.Time

    }

    type DoorEvent struct {

    Event

    Action string //open, close

    }

    type TemperatureEvent struct {

    Event

    Value float32

    }

    func NewDoorEvent(id string, time time.Time, action string) (*DoorEvent, error)
    {

    if id == "" {

    return nil, fmt.Errorf("empty id")

    }

    evt := DoorEvent{

    Event:  Event{id, time},

    Action: action,

    }

    return &evt, nil

    }

    func main() {

    evt, err := NewDoorEvent("front door", time.Now(), "open")

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", evt)

    }

    Listing 5-3

    Go Recipe for Using Structs

    ```


    **Output:**


    ```

    &{Event:{ID:front door Time:2022-02-14 17:45:54.9964674 +0500 PKT m=+0.003330501}
    Action:open}

    ```


    ### Methods


    Methods can be defined and attached to user-defined data types. Go methods and
    functions are similar to each other except that methods have an additional receiver
    argument. Methods use this receiver argument to access different properties associated
    with the receiver object. However, it is possible for the receiver to be a struct
    type or non-struct type. One important thing to remember is both the receiver
    and the receiver type used with a method should reside in the same package. Furthermore,
    if a receiver type is already defined in a different package, you cannot create
    a method for it. This includes the built-in types like `string`, `float`, `int`,
    and so on. Trying to do so will result in errors at compile time.


    #### Declaring Methods in Go


    The syntax for declaring a method in Go is shown in Listing [5-4](#536365_1_En_5_Chapter.xhtml#PC6).
    The `func` keyword is followed by a receiver name and its type, then the method
    name is followed by the list of input parameters, and finally the return type
    is shown, if the method returns anything.


    ```

    func(reciver_name Type) method_name(parameter_list)(return_type){

    // Code

    }

    Listing 5-4

    General Format for Declaring Methods in Go

    ```


    #### Recipe to See Methods in Action


    Look at the Go recipe in Listing [5-5](#536365_1_En_5_Chapter.xhtml#PC7), which
    illustrates the workings of a thermostat, which is a device used to control and
    measure temperature. First, you define a struct named `thermostat`. It has two
    member fields—`ID`, which is a `string`, and `value` of `float32` type. Note that
    the `ID` field is exported (it’s public), so its name starts with an uppercase
    letter. Since the `value` field is not exported, it’s private, which is why its
    name starts with a lowercase letter. The `Value()` function gets a receiver key,
    which is a pointer type to the `thermostat`. It returns an internal value of type
    `float32`. The `Set()` function sets the value on the thermostat according to
    the value specified as its argument. Remember, pointer receivers are used with
    methods that change a struct. It is also possible for methods to have a type without
    any receiver. For example, the `Kind()` function in Listing [5-5](#536365_1_En_5_Chapter.xhtml#PC7)
    is one such method.


    ```

    package main

    import (

    "fmt"

    )

    //A thermostat measures and controls the temperature

    type Thermostat struct {

    ID    string

    value float64

    }

    //Value return the current temperature in Celsius

    func (t *Thermostat) Value() float64 {

    return t.value

    }

    //Set tells the thermostat to set the temperature

    func (t *Thermostat) Set(value float64) {

    t.value = value

    }

    //Kind returns the device kind

    func (t *Thermostat) Kind() string {

    return "thermostat"

    }

    func main() {

    t := Thermostat{"Living Room", 16.2}

    fmt.Printf("%s Before: %.2f\n", t.ID, t.Value())

    t.Set(18)

    fmt.Printf("%s After: %.2f\n", t.ID, t.Value())

    }

    Listing 5-5

    Go Recipe for Using Methods in Go

    ```


    **Output:**


    ```

    Living Room Before: 16.20

    Living Room After: 18.00

    ```


    ### Interfaces


    Go is a multi-paradigm language, as it shares aspects of functional, imperative,
    and object-oriented programming. Even though it may seem that Go shares much from
    the OOP paradigm, there is an exception. Go does not support inheritance using
    classes; rather, it chooses composition over inheritance and uses structs and
    interfaces to achieve this goal.


    #### Declaring Interfaces in Go


    In Go, an *interface* is an abstract type, i.e., it is used to describe all the
    methods that can be implemented by a type. However, interfaces are limited to
    providing the method signatures and not their implementation. The implementation
    of the methods is entirely up to the type implementing the interface. Hence, it
    can be stated that interfaces only define, and do not declare, the behavior of
    an object of a specific type.


    Listing [5-6](#536365_1_En_5_Chapter.xhtml#PC9) illustrates creating an interface
    in Go. First comes the `type` keyword, followed by the interface name, which can
    be the programmers’ choice, except for the Go language reserved keywords. In the
    end is the `interface` keyword. The associated method signatures are enclosed
    within curly braces, as shown in Listing [5-6](#536365_1_En_5_Chapter.xhtml#PC9).


    ```

    type interface_name interface{

    // Method signatures

    }

    Listing 5-6

    General Format for Declaring Interfaces in Go

    ```


    #### Implementing Interfaces in Go


    In Go, it is mandatory to implement all of the methods declared in an interface
    when implementing it. Furthermore, unlike other languages that require an `implement`
    keyword to implement interfaces, Go implements interfaces implicitly. Listing
    [5-7](#536365_1_En_5_Chapter.xhtml#PC10) illustrates how to declare and implement
    an interface in Go.


    ```

    package main

    import (

    "fmt"

    )

    // Creating an Interface

    type Shape interface {

    // Method Signatures

    Area() float64

    Perimeter() float64

    }

    type Rectangle struct {

    length  float64

    breadth float64

    }

    // Implementing Methods of the Shape Interface

    func (r Rectangle) Area() float64 {

    return r.length * r.breadth

    }

    func (r Rectangle) Perimeter() float64 {

    return 2 * (r.length + r.breadth)

    }

    // Main Method

    func main() {

    // Accessing Elements of the Shape Interface

    var s Shape

    s = Rectangle{10, 14}

    fmt.Println("Area of Shape :", s.Area())

    fmt.Println("Perimeter of Shape:", s.Perimeter())

    }

    Listing 5-7

    Go Recipe for Implementing Interfaces in Go

    ```


    **Output:**


    ```

    Area of Shape : 140

    Perimeter of Shape: 48

    ```'
