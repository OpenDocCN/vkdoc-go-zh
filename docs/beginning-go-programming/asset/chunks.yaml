    Let’s look at another example, where we need to write a function to calculate
    the median of a slice of type `float32`. The median is calculated by first sorting
    the values in numerical order. If the total count of items is odd, the middle
    value is the median. If the count is even, the average of the two middle items
    is considered the median. Listing [3-2](#536365_1_En_3_Chapter.xhtml#PC3) illustrates
    this concept.


    ```

    package main

    import (

    "fmt"

    "sort"

    )

    func main() {

    fmt.Println("Median of {56, 85, 92} is: ", median([]float64{56, 85, 92}))         //median=
    85

    fmt.Println("Median of {56, 85, 92, 99} is: ", median([]float64{56, 85, 92, 99}))     //median=
    88.5

    }

    func median(nums []float64) float64 {

    // Pass by Value: work on a copy, don''t change the input slice

    vals := make([]float64, len(nums))

    copy(vals, nums)

    sort.Float64s(vals)

    i := len(vals) / 2

    if len(vals)%2 == 1 { //in case the slice has odd number of items

    return vals[i]

    }

    //in case the slice has even number of items

    return (vals[i-1] + vals[i]) / 2

    }

    Listing 3-2

    Go Recipe for Calculating the Median

    ```


    **Output:**


    ```

    Median of {56, 85, 92} is:  85

    Median of {56, 85, 92, 99} is:  88.5

    ```


    # Working with Maps in Go


    In this section, we write a program to count how many times a word appears in
    the text. This is known as word frequency and is a common task in text processing.
    For example, in the sentence “to be or not to be,” the frequency of “to” is 2,
    “be” is 2, “not” is 1, and “or” is 1. For this task, we use maps to store words
    and the word’s count as the key-value pairs. Go maps don’t generate panic when
    you try to access a nonexistent key. They instead return a zero value for the
    nonexistent key. In this example, the map values are integers and the zero value
    means the word count is zero. Listing [3-3](#536365_1_En_3_Chapter.xhtml#PC5)
    illustrates the recipe for accomplishing this.


    ```

    package main

    import (

    "fmt"

    )

    var moby = []string{

    "shall", "pass", "shall", "away", "too"}

    func main() {

    fmt.Println(frequency(moby))

    }

    func frequency(words []string) map[string]int {

    freq := make(map[string]int)

    for _, w := range words {

    freq[w]++

    }

    return freq

    }

    Listing 3-3

    Go Recipe for Working with Maps

    ```


    **Output:**


    ```

    map[away:1 pass:1 shall:2 too:1]

    ```


    # Go’s Catch of Error Handling


    In Go, errors are transmitted as an explicitly mentioned separate return value.
    The error-handling mechanism of Go is designed to make it easy for programs to
    infer error-returning functions. It is also designed to handle errors using the
    same language constructs that are used with tasks where no errors occur.


    All errors in Go are of the type `error`, which has a built-in interface for error
    handling. By convention and as a common practice in Go, errors are usually the
    last value returned by a function. However, by using the `errors.New()` function,
    you can construct a custom error value with an associated error message given
    as input to the function. Furthermore, a `nil` value indicates that no error has
    occurred. Using the `Error()` method means you can use custom types as errors.


    In the Go recipe shown in Listing [3-4](#536365_1_En_3_Chapter.xhtml#PC7), we
    illustrate how to use a custom type to raise an error that represents “argument
    error,” which is basically an integer value that is not acceptable as input to
    a function. In this recipe, we use the `&argError` syntax to construct a new struct
    of type `argError`, which is a custom time. The `&argError` is passed two arguments
    to initialize the member fields—`argument` and `problem`. Furthermore, in the
    `main()` function, two loops are used to test the functioning of our custom error-returning
    functions. Remember that it is a good and common practice to use inline error
    checking on the `if` statement in Go.


    Additionally, to programmatically utilize a custom error’s data, you have to get
    the error as an instance of the custom error type through type assertion. The
    `ok` idiom in Go is used to test whether the key-value pair is present.


    ```

    package main

    import (

    "errors"

    "fmt"

    )

    func function1(argument int) (int, error) {

    if argument == 12 {

    return -1, errors.New("12 is not an acceptable argument")

    }

    return argument + 3, nil

    }

    type argError struct {

    argument int

    problem  string

    }

    func (e *argError) Error() string {

    return fmt.Sprintf("%d - %s", e.argument, e.problem)

    }

    func function2(argument int) (int, error) {

    if argument == 12 {

    return -1, &argError{argument, "Unacceptable Argument"}

    }

    return argument + 3, nil

    }

    func main() {

    for _, i := range []int{7, 12} {

    if r, e := function1(i); e != nil {

    fmt.Println("function1 Failed to Execute Successfully \nError:", e)

    } else {

    fmt.Println("function1 Executed Successfully:", r)

    }

    }

    for _, i := range []int{70, 12} {

    if r, e := function2(i); e != nil {

    fmt.Println("function2 Failed to Execute Successfully \nError:", e)

    } else {

    fmt.Println("function1 Executed Successfully:", r)

    }

    }

    _, e := function2(42)

    if ae, ok := e.(*argError); ok {

    fmt.Println(ae.argument)

    fmt.Println(ae.problem)

    }

    }

    Listing 3-4

    Go Recipe for Illustrating Error Handling

    ```


    **/*Output:**


    ```

    function1 Executed Successfully: 10

    function1 Failed to Execute Successfully

    Error: 12 is not an acceptable argument

    function1 Executed Successfully: 73

    function2 Failed to Execute Successfully

    Error: 12 - Unacceptable Argument

    */

    ```'
