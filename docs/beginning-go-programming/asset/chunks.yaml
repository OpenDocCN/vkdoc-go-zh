  trans: "\n# Switch 语句\n\n与其他 C 风格语言类似，Go 语言也提供了功能相同的 `switch` 语句；但其语法在这些语言的基础上有所扩展。`switch`\
    \ 语句可用于一个变量，以测试该变量是否与一系列值相等。列表 2-39 使用了 `rand` 包中的 `Math.Rand` 包；我们将使用 `seed()`\
    \ 函数，并通过语句 `rand.seed(time.Now().Unix())` 向其传入当前时间的 UNIX 格式。接着，`rand` 包中的 `Intn()`\
    \ 函数会返回一个非负的伪随机整数。`Intn()` 函数要求你指定一个区间范围 `0,n)`。务必确保 `n <= 0`。在本例中，我们提供了一个上限值\
    \ `7+1`，即该函数将使用区间 `[0, 7) + 1`。这样一来，该函数会返回一个介于 1 到 7 之间的数字。每次运行此应用程序时，它会根据你计算机当前时间的毫秒数生成不同的数字。（你有可能反复看到同一个数字，但这只是巧合。）每次运行列表\
    \ [2-39 中的代码时，你可能会得到不同的输出。\n\n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\
    \n\"time\"\n)\nfunc main() {\nrand.Seed(time.Now().Unix())\ndow := rand.Intn(7)\
    \ + 1\nfmt.Println(\"Day: \", dow)\nvar result string\nswitch dow {\ncase 1:\n\
    result = \"It's Sunday\"\ncase 2:\nresult = \"It's Monday\"\ndefault:\nresult\
    \ = \"It's some other day\"\n}\nfmt.Println(result)\n}\n列表 2-39\n在 Go 中使用 switch\
    \ 语句\n```\n\n**输出：**\n\n```\nDay:  2\nIt's Monday\n```\n\n请注意，在 `switch` 语句中，被评估的表达式周围不需要括号。与\
    \ C 和 Java 的另一个区别是，Go 中的 `switch` 语句不需要 `break` 语句。在 Go 中，只要其中一个 `case` 被评估为 `true`，该\
    \ `case` 内的语句就会被执行，并且控制权会转移到 `switch` 语句的末尾。此外，就像 `if` 语句一样，你还可以在 `switch` 语句中对变量进行评估之前包含一个短语句，如列表\
    \ 2-40 所示。请记住，在 `switch` 语句中声明的任何变量都将属于该 `switch` 语句的局部变量。\n\n```\npackage main\n\
    import (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\nfunc main() {\nrand.Seed(time.Now().Unix())\n\
    var result string\nswitch dow := rand.Intn(7) + 1; dow {\ncase 1:\nresult = \"\
    It's Sunday\"\ncase 2:\nresult = \"It's Monday\"\ndefault:\nresult = \"It's some\
    \ other day\"\n}\nfmt.Println(result)\n}\n列表 2-40\n使用带有评估语句的 switch 语句\n```\n\n\
    在 Go 中，`fallthrough` 关键字用于 `switch` 语句的 `case` 块中。如果任何 `case` 块中存在 `fallthrough`\
    \ 关键字，无论当前 `case` 是否被评估为 `true`，它都会将程序的控制流转移到下一个 `case`。\n\n# For 语句\n\n与其他高级编程语言不同，Go\
    \ 只提供一种循环结构，即 `for` 循环。`for` 循环可用于重复性任务，例如遍历值的集合。`for` 循环的基本语法与 Java 或 C 风格语言相同，不同之处在于\
    \ `for` 语句中不需要括号 `( )`。此外，就像 C 风格语言或 Java 一样，`for` 循环语句中的前置和后置语句不是必需的，可以留空。另外，在\
    \ Go 中，`for` 循环有四种变体用法，如下所述：\n\n1.  **带有步长变量、条件和范围的** `for` **循环。**\n\n    `range`\
    \ 关键字在 Go 中用于遍历存储在各种数据结构中的元素。当与数组和切片一起使用时，`range` 关键字还会返回每个条目的索引和值。在列表 2-41 的第二个\
    \ `for` 循环中，我们使用了空白标识符（`_`）来忽略索引。然而，如同第三个 `for` 循环所示，有时也需要索引。在第四个 `for` 循环中，`range`\
    \ 会从一个逗号分隔的列表中将值赋给变量 `i`。第一个变量将是索引，第二个变量将是关联的值。\n\n    ```\n    package main\n\
    \    import \"fmt\"\n    func main() {\n    total := 0\n    for k := 0; k < 5;\
    \ k++ {\n    total += k\n    }\n    nums := []int{2, 3, 4}\n    total = 0\n  \
    \  for _, num := range nums {\n    total += num\n    }\n    fmt.Println(\"Total:\"\
    , total)\n    for j, num := range nums {\n    if num == 2 {\n    fmt.Println(\"\
    Index:\", j)\n    }\n    }\n    for i := range nums {\n    fmt.Println(nums[i])\n\
    \    }\n    }\n    列表 2-41\n    带有步长变量、条件和范围的 for 循环\n    ```\n\n    **输出：**\n\
    \n    ```\n    Total: 9\n    Index: 0\n\n    ```\n\n2.  **带有空白前置/后置语句的** `for`\
    \ **循环**\n\n    列表 2-42 展示了使用带有空白前置/后置语句的 `for` 循环。\n\n    ```\n    total := 1\n\
    \    for ; total < 10; {\n    total += total\n    }\n    列表 2-42\n    带有空白前置/后置语句的\
    \ for 循环\n    ```\n\n3.  **作为 `while` 循环使用的** `for` **循环**\n\n    许多语言都有一个 `while`\
    \ 关键字，它允许你只要布尔表达式为真就可以循环执行一组语句。Go 使用 `for` 关键字实现了这种类型的循环。你只需声明一个布尔条件，而不是一个计数器变量或范围。列表\
    \ 2-43 说明了这一概念。\n\n    ```\n    total := 1\n    for < 10 {\n    total += total\n\
    \    }\n    列表 2-43\n    将 for 循环用作 while 循环\n    ```\n\n4.  **无限循环**\n\n    通常，如果循环指定的条件语句永远不会变为假，那么循环就变成了无限循环。通常，`for`\
    \ 循环用于创建无限循环。当 `for` 语句中的这三个表达式都没有指定时，这会使得条件语句永远保持为真，从而将 `for` 循环变成无限循环。列表 2-44\
    \ 说明了这一概念。\n\n    ```\n    for {\n    // 你想要无限循环的任何任务\n    }\n    列表 2-44\n  \
    \  将 for 循环用作无限循环\n    ```\n\n# goto 语句\n\nGo 也支持 `goto` 语句，它可以将控制权转移到代码中的一个标签。列表\
    \ 2-45 说明了如何将标签与 `goto` 语句结合使用以改变程序控制流。在此代码片段中，当 `if` 语句变为真时，`goto` 语句将被执行，控制权将转移到\
    \ `theEnd` 标签，然后执行此标签之后的语句。列表 2-45 展示了一个基本程序，描述了在 Go 中使用 `goto` 语句的方法。\n\n```\n\
    package main\nimport (\n\"fmt\"\n)\nfunc main() {\ntotal := 1\nfor total < 5 {\n\
    total += total\nfmt.Println(\"Total: \", total)\nif total == 5 {\ngoto theEnd\n\
    }\n}\ntheEnd:\nfmt.Println(\"End of Program\")\n}\n列表 2-45\n在 Go 中使用 goto 语句\n\
    ```\n\n**输出：**\n\n```\nTotal:  2\nTotal:  4\nTotal:  8\nEnd of Program\n```\n\n\
    总之，Go 支持 `continue`、`break` 和 `goto` 语句的使用。Go 也支持多种编码模式的循环，并为 `for` 语句添加了特性，使其简洁易读。\n"
- fmt: '# Functions


    Go is organized into packages and packages have functions. Every Go application
    has a package named`main`and at least one function, also named`main`. The`main`function
    is called automatically by the runtime as the application starts up. In Go, like
    other programming languages, you can also create custom functions and organize
    them into your own custom packages.


    A function declaration tells the Go compiler what the function name is, its return
    type, and the input parameters. On the other hand, the function definition is
    the actual body of the function and is a set of the statement(s) that perform
    the intended task.


    Several built-in functions are provided by the Go standard library that you can
    call and use in your Go programs. For example, the`len()`function takes arguments
    of various types as input and returns their length. Functions are also called
    methods, subroutines, or procedures.


    ## Defining a Function


    A function definition in Go is made up of two parts—the function header and the
    body. The general format for defining a function in Go is shown in Listing [2-46](#536365_1_En_2_Chapter.xhtml#PC76).


    ```

    func function_name( [parameter list] ) [return_types]

    {

    body of the function

    }

    Listing 2-46

    General Format of Functions in Go

    ```


    Here, the`func`keyword instructs the compiler about the start of a function declaration
    and`function_name`represents the function’s name. Function signature is referred
    to as the function’s name and input parameter list combined. Also,`parameters`are
    used as placeholders. Values passed to the function when it is invoked are called
    function arguments and these parameters are also referred to as formal parameters.
    A function’s parameter list defines the type, order, and total count parameters
    it will take as input. It is possible that a function may have no parameters and
    hence the parameters are optional.`return_type`is used to define the data type
    of value(s) the function may return. Here again, the`return_type`is optional if
    the function does not return anything. The body of the function contains multiple
    statements that together define the task it has to perform.


    Listing [2-47](#536365_1_En_2_Chapter.xhtml#PC77) illustrates the use of custom
    functions in Go. Here,`findMaximum()`is a user-defined function that takes two
    parameters,`n1`and`n2`. As output, it returns the maximum value among the two
    passed values. Also, because both the parameters are of the same type, it is not
    necessary to specify the type with each variable.


    ```

    /* Function to find maximum value among two numbers */

    func findMaximum(n1, n2 int) int {

    /* Declaring Local Variables */

    var maxVal int

    if (n1 > n2) {

    maxVal = n1

    } else {

    maxVal = n2

    }

    return maxVal

    }

    Listing 2-47

    Basic Program Illustrating Custom Functions in Go

    ```


    Like other languages, Go functions can also accept an arbitrary number of values
    of the same type. To do this, as shown in Listing [2-48](#536365_1_En_2_Chapter.xhtml#PC78),
    you declare the parameter name, then add three dots, and then specify the data
    type. As`values`will act as an array, the`range`keyword can be used to loop over
    the values stored in it.


    ```

    package main

    import (

    "fmt"

    )

    func main() {

    total := addValues(40, 50, 60)

    fmt.Println("Sum of Passed Values: ", total)

    }

    func addValues(values ... int) int{

    sum := 0

    for _, val := range values{

    sum += val

    }

    return sum

    }

    Listing 2-48

    Functions with Arbitrary Number of Values

    ```


    **/*Output:**


    ```

    Sum of Passed Values:  150

    */

    ```


    ## Doing Function Calls in Go


    In order to create a function in Go, it is necessary to provide its definition
    as well, which defines what task the function should perform. In order to use
    a function, it has to be called from the program. When a function call is made
    from a program, the control flow is transferred to it. When the called function
    finishes the defined task or a`return`statement is encountered or the closing
    brace of the function is reached, the control flow returns to the program where
    the initial call was made.


    To make a function call, you simply pass the required parameters, wrapped within
    parentheses`()`next to the function name. If a value is to be returned from the
    function, the returned values can either be used directly, like with`Println()`,
    or can be stored and reused later for performing different operations. Listing
    [2-49](#536365_1_En_2_Chapter.xhtml#PC80) illustrates the concept of performing
    function calls in Go.


    ```

    package main

    import "fmt"

    func main() {

    /* Defining Local Variables */

    var val1 int = 50

    var val2 int = 80

    var retVal int

    /* Function call to findMaximum() */

    retVal = findMaximum(val1, val2)

    fmt.Printf("Maximum value: %d\n", retVal)

    }

    /* Function to find maximum value between the two numbers */

    func findMaximum(num1, num2 int) int {

    /* Declaring Local Variables */

    var maxVal int

    if (num1 > num2) {

    maxVal = num1

    } else {

    maxVal = num2

    }

    return maxVal

    }

    Listing 2-49

    Basic Program to Illustrate Function Calls in Go

    ```


    **Output:**


    ```

    Maximum Value: 80

    ```


    ## Return More than One Value from Functions


    Unlike other C-style languages, Go functions are designed to return multiple values
    at a time. The following example illustrates how to return values from a function.
    Refer to the [official documentation](https://golangdocs.com/functions-in-golang)
    at[`https://golangdocs.com/functions-in-golang`](https://golangdocs.com/functions-in-golang)to
    learn more ways of returning values and syntax variations in Go. Listing [2-50](#536365_1_En_2_Chapter.xhtml#PC82)
    illustrates this concept.


    ```

    package main

    import (

    "fmt"

    )

    func swapValues(str1, str2 string) (string, string) {

    return str2, str1

    }

    func main() {

    val1, val2 := swapValues("Abdullah", "Hassan")

    fmt.Println("Values After Swap: ", val1, val2)

    }

    Listing 2-50

    Go Program Illustrating How to Return More than One Value from Functions

    ```


    **Output:**


    ```

    "Values After Swap: Hassan Abdullah

    ```


    ## Passing Arguments to Functions


    You must declare all of the variables that would accept the values passed to the
    function as its arguments. This set of variables are also known as a function’s
    formal parameters. Note that the scope of all of the formal parameters of a function
    is local to it only, i.e., they are accessible only within the scope of that particular
    function. Furthermore, the formal parameters are only created upon entering the
    function and are destroyed when it exits.


    There are two ways to pass arguments to a function—*call by value* and *call by
    reference*. When the call by value way of passing arguments is used, it basically
    copies the value of the passed argument into the formal parameters of the called
    function. Any changes made to the formal parameters inside the respective function
    have no effect on the value of the argument that was passed with function call.


    On the other hand, the call by reference technique copies the direct address of
    the passed argument into the formal parameters of the called function. As the
    direct address is copied and used to access the actual argument, any changes made
    to the formal parameters inside the respective function will also be reflected
    in the argument passed with the function call. To ensure that a function cannot
    change the value of the passed arguments, by default, call by value is used to
    pass arguments to functions in the Go programming language.'
