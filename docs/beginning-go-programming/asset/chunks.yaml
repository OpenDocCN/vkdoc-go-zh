    \ 调用的 Go 方案\n\n**输出：**\n\n```\n2022/02/16 17:14:31 收到回复: {Time:2022-02-16 17:14:29.9096948\
    \ +0500 PKT CPU:0.23 Memory:87.32}\n```\n"
- fmt: "# Authentication and Writing an HTTP Server in Go\n\nSome websites require\
    \ authentication in the HTTP protocol. There are several methods for authentication,\
    \ such as Basic, Bearer, Digest, and so on. There are also several formats of\
    \ authentication, like Auth2, SAML, OICD, and so on. Go supports Basic authentication;\
    \ for other authentication methods such as `Auth0`, you need to get a token and\
    \ then must set the authorization HTTP header.\n\nIn the Go recipe shown in Listing\
    \ [7-2](#536365_1_En_7_Chapter.xhtml#PC3), you are going to use the `httpbin.org`\
    \ website to demonstrate Basic authentication. The `authRequest()` function takes\
    \ the URL, user, and password as input. These parameters are then used to create\
    \ a new HTTP request using the `http.NewRequest()` function. You pass `nil` for\
    \ the body since this is a `GET` request. The `SetBasicAuth()` built-in function\
    \ sets the basic authentication with the user and the password supplied to the\
    \ function. To make a call to the server, use the `http.DefaultClient.Do()` function.\
    \ Then you perform validations to check if the returned response has an `OK` status.\n\
    \n```go\npackage main\nimport (\n\"fmt\"\n\"log\"\n\"net/http\"\n)\nfunc authRequest(user,\
    \ url, passwd string) error {\nreq, err := http.NewRequest(\"GET\", url, nil)\n\
    if err != nil {\nreturn err\n}\nreq.SetBasicAuth(user, passwd)\nresp, err := http.DefaultClient.Do(req)\n\
    if err != nil {\nreturn err\n}\nif resp.StatusCode != http.StatusOK {\nreturn\
    \ fmt.Errorf(\"bad status: %d %s\", resp.StatusCode, resp.Status)\n}\nreturn nil\n\
    }\nfunc main() {\nuser, passwd := \"joe\", \"baz00ka\"\nurl := fmt.Sprintf(\"\
    https://httpbin.org/basic-auth/%s/%s\", user, passwd)\nif err := authRequest(user,\
    \ url, passwd); err != nil {\nlog.Fatal(err)\n}\nfmt.Println(\"OK\")\n}\n```\n\
    \n*Output:*\n\n```go\nOK\n```\n\nIf you were to use the `httpbin.org` website\
    \ to generate HTTP requests and responses, the results you’d get are illustrated\
    \ in Figure [7-2](#536365_1_En_7_Chapter.xhtml#Fig2).\n\n![](images/536365_1_En_7_Chapter/536365_1_En_7_Fig2_HTML.jpg)\n\
    \nA structure of an HTTP response includes a response body and response headers.\
    \ The response body contains authenticated users. Response headers contain the\
    \ date, content type and length, connection, and server.\n\n**Figure 7-2** HTTP\
    \ response structure when using `httpbin.org`\n\nLet’s look at another example,\
    \ shown in Listing [7-3](#536365_1_En_7_Chapter.xhtml#PC5), this time of an HTTP\
    \ server that accepts metrics. Here, a metric is a JSON object that has host time,\
    \ CPU, and memory. In the Go recipe, you define a struct called `Metric` to match\
    \ the definitions in the JSON object, that is, the struct has member fields called\
    \ `time`, `host`, `CPU`, and `memory`. The `handleMetrics()` function handles\
    \ the HTTP requests. It takes input in the `w` variable, which is of type `http.ResponseWriter`,\
    \ used to send the response back to the client, and `r` of type `http.Request`.\
    \ Within the function, you first check to see that the request is a `POST` request.\
    \ If it’s not, you issue an error. To limit the amount of data to be read, you\
    \ set a maximum size, `maxSize`, in megabytes; this is 1MB in this case. You add\
    \ the metric to the database and print out that the metric was added. To send\
    \ the response back to the user, you set the `Header` of the response first. Now\
    \ you create a response, which in this case is a map from a string to the empty\
    \ interfaces with the `id` that you got from the server. You use `json.NewEncoder`\
    \ to encode the response into `W`, sending it back to the client if there is an\
    \ error. You cannot change the `HTTP status code`, so you just log the error.\n\
    \n```go\npackage main\nimport (\n\"encoding/json\"\n\"gorilla/mux\"\n\"io\"\n\"\
    log\"\n\"net/http\"\n\"time\"\n)\n// DB is a database\ntype DataBase struct{}\n\
    // Add adds a metric to the database\nfunc (db *DataBase) Add(m Metric) string\
    \ {\nreturn \"success\"\n}\ntype Metric struct {\nTime   time.Time `json:\"time\"\
    `\nHost   string    `json:\"host\"`\nCPU    float64   `json:\"cpu\"`    //CPU\
    \ load\nMemory float64   `json:\"memory\"` //MB\n}\nfunc handleMetric(w http.ResponseWriter,\
    \ r *http.Request) {\nif r.Method != \"POST\" {\nhttp.Error(w, \"This Method is\
    \ Not Allowed\", http.StatusMethodNotAllowed)\nreturn\n}\nvar db *DataBase\ndefer\
    \ r.Body.Close()\nvar m Metric\nconst maxSize = 1 << 20 //MB\ndec := json.NewDecoder(io.LimitReader(r.Body,\
    \ maxSize))\nif err := dec.Decode(&m); err != nil {\nlog.Printf(\"Error Decoding:\
