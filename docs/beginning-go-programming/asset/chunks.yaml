  trans: "\n#### 接口实战示例\n\n让我们通过一个 Go 语言示例来学习如何使用接口。假设你有多个传感器，并希望将它们全部打印出来。在这种情况下，首先需要定义一个自定义类型\
    \ `Sensor`，用于存储传感器相关信息。由于所有传感器都需要类似的功能，你可以使用接口来实现这一目的。\n\n代码清单 5-8 展示了 Go 语言中接口的使用方式。这里定义了一个包含三个关联方法的\
    \ `thermostat` 结构体。另一个结构体是 `camera`，它具有与 `thermostat` 相同的方法。`printAll()` 函数用于打印任意传感器的\
    \ ID。你可以使用接口来实现打印功能。该函数接收一个传感器切片，并针对每个传感器打印其 ID 和类型。在 `main()` 函数中，你创建了一个 `Sensors`\
    \ 类型的切片，其中包含 `Thermostat` 和 `Camera` 结构体，并打印它们的详细信息。\n\n```\npackage main\nimport\
    \ (\n\"fmt\"\n)\n//thermostat（恒温器）用于测量和控制温度\ntype Thermostat struct {\nid    string\n\
    value float64\n}\n//Value 返回当前摄氏温度\nfunc (t *Thermostat) Value() float64 {\nreturn\
    \ t.value\n}\n//ID 返回恒温器 ID\nfunc (t *Thermostat) ID() string {\nreturn t.id\n\
    }\n//Set 用于设置恒温器温度\nfunc (t *Thermostat) Set(value float64) {\nt.value = value\n\
    }\n//Kind 返回设备类型\nfunc (t *Thermostat) Kind() string {\nreturn \"thermostat\"\n\
    }\n//Camera 是安防摄像头\ntype Camera struct {\nid string\n}\n//ID 返回摄像头 ID\nfunc (c\
    \ *Camera) ID() string {\nreturn c.id\n}\nfunc (*Camera) Kind() string {\nreturn\
    \ \"camera\"\n}\ntype Sensor interface {\nID() string\nKind() string\n}\nfunc\
    \ printAll(sensors []Sensor) {\nfor _, s := range sensors {\nfmt.Printf(\"%s \\\
    n\", s.ID(), s.Kind())\n}\n}\nfunc main() {\nt := Thermostat{\"Living Room\",\
    \ 16.2}\nc := Camera{\"Baby Room\"}\nsensors := []Sensor{&t, &c}\nprintAll(sensors)\n\
    /*fmt.Printf(\"%s Before: %.2f\\n\", t.ID, t.Value())\nt.Set(18)\nfmt.Printf(\"\
    %s After: %.2f\\n\", t.ID, t.Value())*/\n}\n代码清单 5-8\nGo 语言中使用接口的示例\n```\n\n**/*输出结果:***\n\
    \n```\nLiving Room \nBaby Room \n*/\n```\n\n## 空接口与 Go 语言中的 IOTA 使用\n\n当接口类型未指定任何方法时，它被称为空接口。在\
    \ Go 语言中，空接口用于处理未知类型的值。空接口也可以容纳任意类型的值。Go 语言中另一个需要了解的概念是 `IOTA`。`IOTA` 是一个标识符，用于与使用自增数字的常量配合使用。简单来说，`IOTA`\
    \ 本质上是一个从零开始、每次递增 1 的计数器。它可以用来高效地创建 Go 语言中的常量和枚举。本节将通过示例讨论 Go 语言中空接口和 `IOTA` 的使用。\n\
    \n### JSON 编码/解码\n\nGo 语言内置支持 JSON 编码和解码，包括与内置和自定义数据类型之间的相互转换。`encoding/json`\
    \ 包允许你按照 RFC 7159 标准对 JSON 数据进行编码。处理数据时，你通常希望将某个 Go 结构体编码为 `json` 字符串。让我们看看官方文档（[`https://pkg.go.dev/encoding/json#Manual`](https://pkg.go.dev/encoding/json%2523Manual)）中定义的\
    \ JSON Marshal 函数。\n\n如图 5-1 所示，`Marshal()` 函数接收一个 `any` 类型的对象（`any` 是空接口 `interface{}`\
    \ 的别名），并返回一个包含传入参数 JSON 编码结果的 `byte` 数组。JSON 的 `Marshal()` 函数可以处理多种类型，例如 `integers`、`strings`、`time.Time`\
    \ 等。这些类型没有共享的公共方法，因此唯一能同时满足它们所有类型的接口就是空接口。空接口不作出任何声明。它是一种绕过 Go 语言类型系统的方法。不过，空接口应作为最后手段使用。\n\
    \n![](img/536365_1_En_5_Fig1_HTML.jpg)\n\n截图显示了 Marshal 函数的格式。\n\n图 5-1\n\nJSON\
    \ 包中 Marshal 函数的格式\n\n让我们看一个示例来加深理解。在代码清单 5-9 中，假设你有多种事件类型，例如 `ClickEvent` 和 `HoverEvent`。还有一个计数器用于记录每个事件被触发的次数。`recordEvent()`\
    \ 函数用于记录计数。它接收一个空接口类型的参数，因为这两个事件以及系统中任何其他事件都没有共同点。在该函数中，你使用 `switch` 语句来检查当前事件的类型。如果是\
    \ `ClickEvent`，则点击事件计数器递增；如果是 `HoverEvent`，则其对应计数器递增；否则，应发出警告。你还可以通过 `value.(typeName)`\
    \ 进行类型断言，将空接口转换为底层类型。但如果类型错误，这会导致程序崩溃。另一种更安全的方法是使用 `comma,ok` 惯用法。`comma,ok` 惯用法的工作方式类似于\
    \ `if-else` 语句。如果在映射中找到传入的键，则返回对应的值；否则返回零值。\n\n```\npackage main\nimport (\n\"\
    fmt\"\n\"log\"\n)\ntype ClickEvent struct {\n// ...\n}\ntype HoverEvent struct\
    \ {\n// ...\n}\nvar eventCounts = make(map[string]int) //type->count\nfunc recordEvent(evt\
    \ interface{}) {\nswitch evt.(type) {\ncase *ClickEvent:\neventCounts[\"click\"\
    ]++\ncase *HoverEvent:\neventCounts[\"hover\"]++\ndefault:\nlog.Printf(\"warning:\
    \ unknown event: %#v of type %T\\n\", evt, evt)\n}\n}\nfunc main() {\nrecordEvent(&ClickEvent{})\n\
    recordEvent(&HoverEvent{})\nrecordEvent(&ClickEvent{})\nrecordEvent(3)\nfmt.Println(\"\
    event counts\", eventCounts)\n}\n代码清单 5-9\nGo 语言中使用 Marshal 函数的示例\n```\n\n**/*输出结果:***\n\
    \n```\n2022/02/15 00:08:22 warning: unknown event: 3 of type int\nevent counts\
    \ map[click:2 hover:1]\n*/\n```\n"
- fmt: '### Generics


    Generics, which is code that is independent of the specific types being used,
    were added to the Go version 1.18. Generics allow functions or types to be able
    to take up several types defined in their generic form.


    Suppose you want to write your own logging system. As shown in Listing [5-10](#536365_1_En_5_Chapter.xhtml#PC16),
    you first define the possible log levels in the system—debug, warning, and error—using
    the `LogLevel` type. In other languages, you might use `enum`; however, in Go,
    you use `IOTA`. `IOTA` is an identifier used with constants to simplify constant
    definitions that use auto-increment. The `IOTA` keyword represents an integer
    constant starting from zero. In the following code, you define a user type `LogLevel`
    as an unsigned integer of eight bits, i.e., `uint8`.


    Using the `const` clause, you can define the three desired levels—`DebugLevel`,
    `WarningLevel`, and `ErrorLevel`. Here, because of `iota`, you want to start at
    zero, so `DebugLevel` is going to be one. The other values in the same `const`
    clause get an increasing value of `iota`. So the `WarningLevel` is `iota + two`
    and the `ErrorLevel` will be `iota + 3`. You also want a nice string representation.
    For this, the `String()` function is going to implement the `fmt.Stringer` interface.
    The `String()` function returns a `string`. Here, a `switch` statement checks
    the log level. Note that the example uses `%d` and not `%s`, because doing so
    will result in an infinite recursion.


    ```go

    package main

    import "fmt"

    //LogLevel is a logging level

    type LogLevel uint8

    //possible log levels

    const (

    DebugLevel LogLevel = iota + 1

    WarningLevel

    ErrorLevel

    )

    //string implements the fmt.Stringer interface

    func (l LogLevel) String() string {

    switch l {

    case DebugLevel:

    return "debug"

    case WarningLevel:

    return "warning"

    case ErrorLevel:

    return "error"

    }

    return fmt.Sprintf("unknown log level: %d", l)

    }

    func main() {

    fmt.Println(WarningLevel)

    lvl := LogLevel(19)

    fmt.Println(lvl)

    }

    Listing 5-10

    Go Recipe for Using Generics in Go

    ```


    **Output:**


    ```

    warning

    unknown log level: 19

    ```


    ## Hands-on Challenge


    Implement a painting program that supports the following features:


    - A circle with location (X, Y), a color, and a radius

    - A rectangle with location (X, Y), width, height, and color


    Each type should implement a draw method, `Draw(d Device)`, that works on a device
    and also implement an `ImageCanvas`. It''s a struct that holds the slice of the
    drawable items and has a draw method, `Draw(w io.Writer)`, that writes a PNG to
    `w`, using the `image/png` package.


