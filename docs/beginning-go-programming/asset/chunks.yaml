- fmt: "# Go and HTTP Calls\n\nThis section looks into how to perform HTTP calls in\
    \ Go through an example. Say you want to post some metrics of an application to\
    \ the server containing a timestamp, CPU load, and memory. Before diving into\
    \ Go code to achieve this goal, let's first look at what an HTTP response looks\
    \ like. The easiest way to do this is to use the `curl` command from the command\
    \ prompt followed by an URL, as illustrated in Figure [7-1](#536365_1_En_7_Chapter.xhtml#Fig1).\n\
    \n![](images/536365_1_En_7_Chapter/536365_1_En_7_Fig1_HTML.jpg)\n\nA structure\
    \ of HTTP response. It contains the `curl` command, `Date`, `Content-Type`, `Content-Length`,\
    \ `Connection`, `Server`, and `Origin`. The origin is \"182.185.176.197\".\n\n\
    **Figure 7-1** Structure of an HTTP response\n\nThe HTTP response against the\
    \ `curl` command includes information. The first line is the status line indicating\
    \ which HTTP protocol the server is running, the status code, and an optional\
    \ status explanation. This is followed by a list of headers, such as `Date`, `Content-Type`,\
    \ and so on. The body of the response is enclosed in the curly braces `{}`.\n\n\
    The HTTP request looks the same, except for the first line. In the first line,\
    \ you have the `GET /path` and then the protocol. For example, `GET /ip HTTP/1.1\
    \ HOST:httpbin.org`, followed by the headers, the empty line, and the request\
    \ body. You're going to use `httpbin.org` to emulate the request to the server\
    \ and a response.\n\nNow that you know what an HTTP request and response looks\
    \ like, let's dive into the recipe for this example of posting an application's\
    \ metrics to a server.\n\nIn Listing [7-1](#536365_1_En_7_Chapter.xhtml#PC1),\
    \ the `postMetric()` function takes a `Metric` type variable as input and returns\
    \ any errors. In the function, you use `json.Marshal()` to marshal the `metric`\
    \ into `byte` slices. Then you create a `Context` variable called `ctx` to set\
    \ a timeout on the request. In this example, we set a timeout of three seconds\
    \ and deferred the `cancel()` of the request. A constant stores the URL of the\
    \ website that you want to generate an HTTP request for. The built-in `NewRequestWithContext()`\
    \ function creates a new HTTP request with context. The `NewRequestWithContext()`\
    \ function accepts the four parameters: `context`, `method` (`POST` in this case),\
    \ `URL`, and `request body`. Note that the body should be a `io.Reader`. That's\
    \ why you wrap the data in the `bytes.NewReader()` function.\n\nOn top of the\
    \ data, you set the header of `Content-Type` to the `application/JSON`. The `http.DefaultClient.Do()`\
    \ function calls the server and checks if any error is returned. Apart from the\
    \ error, you also check the `StatusCode` of the request to make sure that its\
    \ status is `OK`. After passing the validations, you can parse the HTTP response.\
    \ The `defer` keyword ensures that the body of the response is closed when the\
    \ function exits. You should never blindly read everything from the network, so\
    \ you should define a maximum size, in this case 1MB. Then you use the `io.LimitReader()`\
    \ on the body to make sure only the defined size is read. You define an anonymous\
    \ structure called `reply` to store the `JSON` reply, which is the `metric`. In\
    \ Go, an anonymous structure is a structure that does not have a name. They are\
    \ useful for creating one-time usable structures. To decode the reply, `json.NewDecoder()`\
    \ is used. In the end, you log the reply.\n\n```\npackage main\n\nimport (\n \
    \   \"bytes\"\n    \"context\"\n    \"encoding/json\"\n    \"fmt\"\n    \"io\"\
    \n    \"log\"\n    \"net/http\"\n    \"time\"\n)\n\n// Metric is an application\
    \ Metric\ntype Metric struct {\n    Time   time.Time `json:\"time\"`\n    CPU\
    \    float64   `json:\"cpu\"`    // CPU load\n    Memory float64   `json:\"memory\"\
    ` // MB\n}\n\nfunc postMetric(m Metric) error {\n    data, err := json.Marshal(m)\n\
    \    if err != nil {\n        return err\n    }\n\n    ctx, cancel := context.WithTimeout(context.Background(),\
    \ 3*time.Second)\n    defer cancel()\n\n    const url = \"https://httpbin.org/post\"\
    \n    req, err := http.NewRequestWithContext(ctx, \"POST\", url, bytes.NewReader(data))\n\
    \    if err != nil {\n        return err\n    }\n\n    req.Header.Set(\"Content-Type\"\
    , \"application/json\")\n\n    resp, err := http.DefaultClient.Do(req)\n    if\
    \ err != nil {\n        return err\n    }\n    if resp.StatusCode != http.StatusOK\
    \ {\n        return fmt.Errorf(\"bad status: %d %s\", resp.StatusCode, resp.Status)\n\
    \    }\n    defer resp.Body.Close()\n\n    const maxSize = 1 << 20 // 1 MB\n \
    \   r := io.LimitReader(resp.Body, maxSize)\n\n    var reply struct {\n      \
    \  JSON Metric\n    }\n    if err := json.NewDecoder(r).Decode(&reply); err !=\
    \ nil {\n        return err\n    }\n\n    log.Printf(\"GOT: %+v\\n\", reply.JSON)\n\
    \    return nil\n}\n\nfunc main() {\n    m := Metric{\n        Time:   time.Now(),\n\
    \        CPU:    0.23,\n        Memory: 87.32,\n    }\n    if err := postMetric(m);\
    \ err != nil {\n        log.Fatal(err)\n    }\n}\n```\n\n**Listing 7-1** Go Recipe\
    \ for Working with HTTP Calls in Go\n\n**Output:**\n\n```\n2022/02/16 17:14:31\
    \ GOT: {Time:2022-02-16 17:14:29.9096948 +0500 PKT CPU:0.23 Memory:87.32}\n```"
  raw: '## Go and HTTP Calls


    This section looks into how to perform HTTP calls in Go through an example. Say
    you want to post some metrics of an application to the server containing a timestamp,
    CPU load, and memory. Before diving into Go code to achieve this goal, let’s first
    look at what an HTTP response looks like. The easiest way to do this is to use
    the `curl` command from the command prompt followed by an URL, as illustrated
    in Figure [7-1](#536365_1_En_7_Chapter.xhtml#Fig1).


    ![](images/536365_1_En_7_Chapter/536365_1_En_7_Fig1_HTML.jpg)


    A structure of H T T P response. It contains the curl command, date, content type,
    content length, connection, server, and origin. The origin is " 182.185.176.197".


    Figure 7-1


    Structure of an HTTP response


    The HTTP response against the `curl` command includes information. The first line
    is the status line indicating which HTTP protocol the server is running, the status
    code, and an optional status explanation. This is followed by a list of headers,
    such as `Date`, `Content-Type`, and so on. The body of the response is enclosed
    in the curly braces `{}`.


    The HTTP request looks the same, except for the first line. In the first line,
    you have the `GET /path` and then the protocol. For example, `GET /ip HTTP/1.1
    HOST:httpbin.org`, followed by the headers, the empty line, and the request body.
    You’re going to use `httpbin.org` to emulate the request to the server and a response.


    Now that you know what an HTTP request and response looks like, let’s dive into
    the recipe for this example of posting an application’s metrics to a server.


    In Listing [7-1](#536365_1_En_7_Chapter.xhtml#PC1), the `postMetric()` function
    takes a `Metric` type variable as input and returns any errors. In the function,
    you use `json.Marshal()` to marshal the `metric` into `byte` slices. Then you
    create a `Context` variable called `ctx` to set a timeout on the request. In this
    example, we set a timeout of three seconds and deferred the `cancel()` of the
    request. A constant stores the URL of the website that you want to generate an
    HTTP request for. The built-in `NewRequestWithContext()` function creates a new
    HTTP request with context. The `NewRequestWithContext()` function accepts the
    four parameters: `context`, `method` (`POST` in this case), `URL`, and `request
    body`. Note that the body should be a `io.Reader`. That’s why you wrap the data
    in the `bytes.NewReader()` function.


    On top of the data, you set the header of `Content-Type` to the `application/JSON`.
    The `http.DefaultClient.Do()` function calls the server and checks if any error
    is returned. Apart from the error, you also check the `StatusCode` of the request
    to make sure that its status is `OK`. After passing the validations, you can parse
    the HTTP response. The `defer` keyword ensures that the body of the response is
    closed when the function exits. You should never blindly read everything from
    the network, so you should define a maximum size, in this case 1MB. Then you use
    the `io.LimitReader()` on the body to make sure only the defined size is read.
    You define an anonymous structure called `reply` to store the `JSON` reply, which
    is the `metric`. In Go, an anonymous structure is a structure that does not have
    a name. They are useful for creating one-time usable structures. To decode the
    reply, `json.NewDecoder()` is used. In the end, you log the reply.


    ```

    package main

    import (

    "bytes"

    "context"

    "encoding/json"

    "fmt"

    "io"

    "log"

    "net/http"

    "time"

    )

    //Metric is an application Metric

    type Metric struct {

    Time   time.Time `json:"time"`

    CPU    float64   `json:"cpu"`    //CPU load

    Memory float64   `json:"memory"` //MB

    }

    func postMetric(m Metric) error {

    data, err := json.Marshal(m)

    if err != nil {

    return err

    }

    ctx, cancel := context.WithTimeout(context.Background(), 3*time.Second)

    defer cancel()

    const url = "https://httpbin.org/post"

    req, err := http.NewRequestWithContext(ctx, "POST", url, bytes.NewReader(data))

    if err != nil {

    return err

    }

    req.Header.Set("Content-Type", "application/json")

    resp, err := http.DefaultClient.Do(req)

    if err != nil {

    return err

    }

    if resp.StatusCode != http.StatusOK {

    return fmt.Errorf("bad status: %d %s", resp.StatusCode, resp.Status)

    }

    defer resp.Body.Close()

    const maxSize = 1 << 20 //1MB

    r := io.LimitReader(resp.Body, maxSize)

    var reply struct {

    JSON Metric

    }

    if err := json.NewDecoder(r).Decode(&reply); err != nil {

    return err

    }

    log.Printf("GOT: %+v\n", reply.JSON)

    return nil

    }

    func main() {

    m := Metric{

    Time:   time.Now(),

    CPU:    0.23,

    Memory: 87.32,

    }

    if err := postMetric(m); err != nil {

    log.Fatal(err)

    }

    }

    Listing 7-1

    Go Recipe for Working with HTTP Calls in Go

    ```


    **/*Output:**


    ```

    2022/02/16 17:14:31 GOT: {Time:2022-02-16 17:14:29.9096948 +0500 PKT CPU:0.23
    Memory:87.32}

    */

    ```'
