    `net/http` 和 `ioutil` 包。要下载内容，请使用 `http` 包中的 `get()` 函数。`get()` 函数会返回一个响应对象以及一个
    `error` 对象。`resp` 变量用于存储返回的响应对象。当你打印 `resp` 变量的内容时，会得到一个指向名为 `response` 的对象的指针。请注意，它是
    `http` 包的成员。`response` 对象有一个名为 `body` 的公共字段，其中包含了你打算下载的 JSON 数据包。与处理文件类似，在读取完
    body 的内容后，应使用 `defer` 关键字配合 `resp.Body.Close()` 命令来关闭 body。


