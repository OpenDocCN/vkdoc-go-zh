    In Listing [8-2](#536365_1_En_8_Chapter.xhtml#PC2), the `monthDistance()` function
    calculates and returns the total distance covered in the month specified as the
    function input parameter. Within the function, you use a `for` loop to iterate
    over the rides in the same month and construct the URL for that day. Then you
    use the `http.Get()` function to generate a request to get the data. Some error
    checking is also performed to check if the response received was good or not.
    If everything is fine, you then calculate the `totalDistance` and move to the
    next day. The `for` loop iterates until the end of the month.


    This code shown in Listing [8-2](#536365_1_En_8_Chapter.xhtml#PC2) is pretty simple
    and performs in approximately two seconds. However, if two seconds is not fast
    enough, you can make changes to the code to make it concurrent. Let’s convert
    this sequential code into a concurrent version, as shown in Listing [8-2](#536365_1_En_8_Chapter.xhtml#PC2).
    To achieve concurrency, we are going to run a goroutine per day. This is done
    by splitting the sequential algorithm into two parts. The first part is generating
    the work or spinning the workers. The second part is gathering the results.


    ```

    package main

    import (

    "fmt"

    "log"

    "net/http"

    "time"

    )

    const timeFmt = "2006-01-02T15:04:05"

    func handler(w http.ResponseWriter, r *http.Request) {

    s := r.URL.Path[1:] // trim leading /

    day, err := time.Parse("2006-01-02", s)

    if err != nil {

    msg := fmt.Sprintf("bad date: %q", s)

    log.Printf("error: %s", msg)

    http.Error(w, msg, http.StatusBadRequest)

    return

    }

    fmt.Fprintf(w, "start,end,distance,passengers\n")

    start := day

    nextDay := day.Add(24 * time.Hour)

    for start.Before(nextDay) {

    start = start.Add(3 * time.Second)

    end := start.Add(17 * time.Second)

    distance := 3.14

    passengers := 1

    fmt.Fprintf(w, "%s,%s,%.2f,%d\n", start.Format(timeFmt), end.Format(timeFmt),
    distance, passengers)

    }

    }

    func main() {

    http.HandleFunc("/", handler)

    if err := http.ListenAndServe(":8080", nil); err != nil {

    log.Fatal(err)

    }

    }

    Listing 8-3

    Concurrent Code Using Goroutines

    ```


    **Output:**


    ```

    distance=2532096.00, duration=1.0311312s

    ```


    Within `monthDistance()`, the first statement is used to spin the workers. You
    specify the number of workers to be created and a channel to get the results.
    The keyword `chan` is used to create channels. For every date, you spin a worker,
    increment the number of workers, and then move forward to the next date. The `dateWorker()`
    function will return a result indicating happened. Since you get the results back
    in an unspecified order, you need to return as much information as you can in
    the result. So Unlike the previous sequential code, now you return the date, the
    distance, and any errors, using the resulting struct.


    The `result{date: date}` statement initializes a result with the date. The `defer`
    function will send the result back to a channel. Note that channels are type conduits
    through which you can send and receive values with the channel operator, `<-`.
    Then, you create the URL, check for errors, and finally, add the date and the
    error to the result.


    Back to the second part of the concurrent algorithm, in `monthDistance()`, you
    gather the results. First, you initialize the total distance to zero and run the
    number of walkers. You then read the results from the channel using the channel
    operator (`<-`). If there are any errors, you return the error or update the distance.
    Finally, in the end, you return the `totalDistance`.


    Upon running this concurrent code, you will notice that there was a significant
    drop in the running time; for example, from 1.7 seconds to 1\. This is an overall
    improvement of 58.8 percent in performance. Note that the running time will be
    different from machine to machine.


    ## Using Goroutines with Shared Resources


    Even though goroutines allow you to perform concurrent operations easily, you
    have to be very careful when using goroutines that access shared resources, like
    variables. For example, it is possible for two different goroutines to concurrently
    access the same variable, where one might be adding something to the value of
    the variable and the other one subtracting from it. It is important to make sure
    that when one goroutine is making changes to the variable, the other one cannot
    access the variable until the first goroutine has finished changing the variable.
    This section covers the various problems that arise when multiple goroutines try
    to simultaneously access a shared resource. It also covers the different techniques
    used to resolve these issues.'
