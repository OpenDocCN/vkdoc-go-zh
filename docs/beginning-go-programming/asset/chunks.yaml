    Preface


    Google designed the Go language to be comprehensive yet be powerful enough to
    tackle big problems. It is a multi-paradigm programming language with built-in
    features for concurrent programming. It enables developers to easily build software
    that is simple, reliable, and efficient. This book is designed to provide knowledge
    to beginners and help them start developing great Go-based applications.


    In this book, we cover the basics of the Go programming language and provide you
    with hands-on working experience through clear examples and recipes. From basic
    syntax formulation to providing insights into using the Go language to build concurrent
    programs and applications like HTTP servers and communication with REST APIs,
    this book covers it all.


    This is a practical hands-on guide through which you will learn how to write Go
    code using clear examples that demonstrate the language in action. You’ll also
    learn tips and tricks about the Go programming language for an efficient use.


