- fmt: '### Solution


    Listing [8-11](#536365_1_En_8_Chapter.xhtml#PC20) is one sample solution to this
    problem. The `downloadSize()` function will return the `Content-Length` from the
    HTTP header. The `downloadsSize()` function will receive multiple URLs as input
    and will calculate the total download size at the same time. To test this code,
    we used the [New York City TLC Trip dataset](https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page)
    (`https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page`). The `gen2020url()`
    function calculates the URLs for the year 2020.


    Within the `downloadsSize()` function, the `dlSize` variable of type `int64` is
    used to return the size of the downloads. An error group named `g` shows when
    the jobs are done. You iterate over the URLs and construct a new variable to avoid
    closure capture. Then you use the `errgroup`’s Go function to spin goroutines.
    Goroutines log the URL, call the `downloadSize()`, and if there are no errors,
    increment the download size, `dlSize`, using `sync/atomic`. Next, you wait for
    the error group. This is going to be blocked until all of the jobs are done. If
    one of them returns an error, you get an error. Finally, you convert `dlSize`
    from `int64` to `integer` and return `nil` for an error.


    In the `main()` function, the URLs are calculated and then the `downloadsSize()`
    function is called. If the execution is successful and has no errors, the program
    will output a message indicating a download size of 2.27 gigabytes.


    ```go

    package main

    import (

    "fmt"

    "log"

    "net/http"

    "strconv"

    "sync/atomic"

    "golang.org/x/sync/errgroup"

    )

    func downloadSize(url string) (int, error) {

    resp, err := http.Head(url)

    if err != nil {

    return 0, err

    }

    if resp.StatusCode != http.StatusOK {

    return 0, fmt.Errorf("Bad Status: %d %s", resp.StatusCode, resp.Status)

    }

    return strconv.Atoi(resp.Header.Get("Content-Length"))

    }

    func downloadsSize(urls []string) (int, error) {

    var dlSize int64

    var g errgroup.Group

    for _, url := range urls {

    url := url // https://golang.org/doc/faq#closures_and_goroutines

    g.Go(func() error {

    log.Print(url)

    size, err := downloadSize(url)

    if err != nil {

    return err

    }

    atomic.AddInt64(&dlSize, int64(size))

    return nil

    })

    }

    if err := g.Wait(); err != nil {

    return 0, err

    }

    return int(dlSize), nil

    }

    func gen2020URLs() []string {

    var urls []string

    urlTemplate := "https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page"

    for _, vendor := range []string{"yellow", "green"} {

    for month := 1; month <= 12; month++ {

    url := fmt.Sprintf(urlTemplate, vendor, month)

    urls = append(urls, url)

    }

    }

    return urls

    }

    func main() {

    urls := gen2020URLs()

    size, err := downloadsSize(urls)

    if err != nil {

    log.Fatal(err)

    }

    sizeGB := float64(size) / (1 << 30)

    fmt.Printf("size = %.2fGB\n", sizeGB)

    }

    Listing 8-11

    Go Recipe for the Hands-On Challenge

    ```


    **/*Output:**


    ```

    size = 2.27GB

    */

    ```


    ## Summary


    This chapter provided Go recipes to give you hands-on experience building concurrent
    programs in Go. Go provides built-in support for concurrency through goroutines
    and channels. The recipes in this chapter covered converting sequential code into
    concurrent code through the use of goroutines. It also provided Go recipes that
    dig into the effects of shared resources among goroutines and explained how mutual
    exclusion can overcome these side-effects. It also provided a Go recipe for using
    atomic counters to modify shared resources among the goroutines to overcome any
    deadlocks or read/write discrepancies that may occur due to shared resources,
    as well as recipes on achieving synchronization among goroutines with the use
    of `sync.WaitGroup` and `sync.Once`, timeouts, and pooling goroutines.


    The next chapter includes handy tricks and tips for using the Go language more
    efficiently and effectively.


    # 9. Tricks and Handy Tips


    This chapter provides a few hacks and shortcuts that can help you get your hands
    around the Go programming language much more effectively and easily. These tips
    and tricks are related to different aspects of the Go programming language, including
    packages, imports, data types, and more.


    ## Importing Packages


    Other than the usual way of importing packages into your Go program, there are
    also some other alternative ways to achieve this goal. The following example illustrates
    these different ways using the `regexp` package.


    - `import alias_name "package_name"` — Importing a package using this syntax will
    create an alias for the specified package name, in this case `regexp`. You can
    then use this alias to access all of the contents of the `regexp` package using
    the member access operator, aka the dot operator (`.`). For example, `RegularExpression`.

    - `import . "package_name"` — Importing any package this way allows you to access
    the contents of the particular package without the need of prefixing the exported
    content with the package name. For example, instead of typing `regexp.MatchString("m([a-z]+)rs",
    "mars")`, you can use the `regexp.MatchString("m([a-z]+)rs", "mars")` statement.

    - `import _ "package_name"` — Importing a package in this way tells the compiler
    to not raise any warnings related to a package being imported and unused in the
    code. Any initialization functions, however, will be executed. However, no other
    contents of the package are exported and accessible.


    ## Check What Packages Are Being Imported by Your Application


    It is a useful and practical approach to check the packages being imported by
    your application. However, there is no easy way of doing this. Nevertheless, `go
    list tool` and `templates` can be used to get your hands around this as well.
    Run the following command while in the root directory of your application.


    ```sh

    $ go list -f ''{{join .Deps "\n"}}'' |

    xargs go list -f ''{{if not .Standard}}{{.ImportPath}}{{end}}''

    ```


    You can edit this template if you want the list to also contain standard packages:


    ```sh

    $ go list -f ''{{join .Deps "\n"}}'' |  xargs go list -f ''{{.ImportPath}}''

    ```


    ## Use `goimports` Instead of `gofmt`


    There are two tools provided by Go that can automatically format your source code
    as per the Go coding standard, namely `gofmt` and `goimports`. The former comes
    packaged in the standard installation of the Go compiler. The `goimports` tool
    has to be installed separately. Additionally, the `goimports` tool is also able
    to fix package imports.


    ## Code Organization


    Even though the Go programming language is comparatively easier to learn, for
    beginners, the standard way that Go’s code is organized can be among the hardest
    things to understand. Clear directions about the code organization, the different
    places to place source code, and the different idioms that have to be followed
    are provided by Go. Additionally, tools like `gofmt` come packaged with the Go
    compiler, which has strict rules for not allowing successful compilation in case
    the code contains any unused imported packages, variables, and so on. For more
    information, refer to the official talk at [`https://talks.golang.org/2014/organizeio.slide#1`](https://talks.golang.org/2014/organizeio.slide%25231)
    or the official docs at [`https://tinyurl.com/3x3hapub`](https://tinyurl.com/3x3hapub).'
