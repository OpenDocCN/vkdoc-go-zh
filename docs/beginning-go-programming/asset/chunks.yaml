  raw: '### Dates and Times


    In the Go language, the `time` package is used to manage the `dates` and `times`
    types. Declaring a variable with type as `time` encapsulates everything required
    for both times and dates type of data, which includes time zone management, math
    operations, and so on. Listing [2-11](#536365_1_En_2_Chapter.xhtml#PC15) illustrates
    the use of the `time` package.


    ```

    package main

    import (

    "fmt"

    "time"

    )

    func main() {

    now := time.Now()

    fmt.Println("Current Time is: ", now)

    formatDate := time.Date(2009, time.November, 10, 23, 0, 0, 0, time.UTC)

    fmt.Println("Go was launched at: ", formatDate)

    fmt.Println(formatDate.Format(time.ANSIC))

    parsedTime, _ := time.Parse(time.ANSIC, "Tue Nov 10 23:00:00 2009")

    fmt.Printf("The type of parsedTime is %T\n", parsedTime)

    }

    Listing 2-11

    Basic program Illustrating the Use of the Time Package in Go

    ```


    **Output:**


    ```

    Current Time is:  2022-08-29 21:06:14.02792 +0500 PKT m=+0.003998301

    Go was launched at:  2009-11-10 23:00:00 +0000 UTC

    Tue Nov 10 23:00:00 2009

    The type of parsedTime is time.Time

    ```


    Listing [2-11](#536365_1_En_2_Chapter.xhtml#PC15) illustrates the use of the `time
    package` for using `date` and `time` types. In the example, in Line#10, a variable
    named `now` is declared. It will be initialized using the built-in `time.Now()`
    function, which returns a timestamp containing the current date, time, and time
    zone. It is also possible in Go for users to create their own explicit date and
    time values. Line#14 declares a variable named `formatDate`, which is initialized
    using the `time.Date()` function. The `Date()` function returns the time in the
    appropriate zone according to a given location corresponding to the format `yyyy-mm-dd
    hh:mm:ss + nsec nanoseconds`. You can also use a formatted version of the `daytime`
    value, as shown in Line#18\. The `Format()` function returns a textual representation
    of the time value formatted as per the layout defined by the argument. This example
    uses the ANSIC format, but you can refer to the official documentation at [`https://pkg.go.dev/time#Time.Format`](https://pkg.go.dev/time%2523Time.Format)
    for other standard formats.


    In Listing [2-12](#536365_1_En_2_Chapter.xhtml#PC17), the `Parse()` function returns
    the time value representation of a string after parsing it.


    ```

    parsedTime, _ := time.Parse(time.ANSIC, "Tue Nov 10 23:00:00 2009")

    fmt.Printf("The type of parsedTime is %T \n", parsedTime)

    Listing 2-12

    Using the Parse Function from the Time Package

    ```


    **Output:**


    ```

    The type of parsedTime is time.Time

    ```


    Since the `Parse()` function can return an error object, in this example, we added
    an underscore to ignore the object. The time object has many other useful functions.
    For example, you can add dates and perform special kinds of formatting, and so
    on. There are also patterns available that give you complete flexibility in how
    to format `daytime` values. The functions and constants in the `time` package
    give you all the tools you need to store and manage the date and time values.
    For more on this topic, refer to the official documentation on the [time package](https://pkg.go.dev/time)
    at [`https://pkg.go.dev/time`](https://pkg.go.dev/time).


    ### Operators Precedence in Go


    Operator precedence refers to the criteria that determine the grouping of terms
    in an expression. It also affects the result of the expression evaluation. Like
    other programming languages, in Go, there is a pre-defined order of precedence
    of the operators, where some have higher precedence over the others. For example,
    the division operator `/` has higher precedence over the subtraction operator
    `-`.


    Consider the statement `a = 56 + 4 * 8` Here, variable `a` is assigned the value
    88, not 480\. This is because the multiply operator `*` has higher precedence
    over the addition operator `+`. Therefore, 4 `*` 8 is multiplied first and then
    the obtained result is added to 56.


    Table [2-7](#536365_1_En_2_Chapter.xhtml#Tab7) lists the operators from highest
    to lowest precedence. In a given expression, after scanning it from left to right,
    first, the operators having higher precedence are evaluated.


    Table 2-7


    List of Operator Precedence in Go


    | Category | Operator | Associativity |

    | --- | --- | --- |

    | Postfix | **( ) [ ] -> . ++ - -** | Left to right |

    | Unary | **+ - ! ~ ++ - - (type)* & sizeof** | Right to left |

    | Multiplicative | *** / %** | Left to right |

    | Additive | **+ -** | Left to right |

    | Shift | **<< >>** | Left to right |

    | Relational | **< <= > >=** | Left to right |

    | Equality | **== !=** | Left to right |

    | Bitwise AND | **&** | Left to right |

    | Bitwise XOR | **^** | Left to right |

    | Bitwise OR | **&#124;** | Left to right |

    | Logical AND | **&&** | Left to right |

    | Logical OR | **&#124;&#124;** | Left to right |

    | Assignment | **= += -= *= /= %=>>= <<= &= ^= &#124;=** | Right to left |

    | Comma | **,** | Left to right |


    ## Memory Management and Reference Values


    The Go runtime is required to run Go applications using the `go run` command on
    your system. The runtime is also included in the compiled and build binary Go
    application. Either way, like in any marked language, such as Java and C#, Go
    applications rely on the runtime that operates silently in the background utilizing
    dedicated threads for memory management. The advantage of the runtime is the elimination
    of the need to explicitly duplicate or allocate memory in the code.


    ### New vs Make


    It is critical to ensure that complex types, such as maps, are appropriately initialized.
    To initialize the complex objects in the Go programming language, there are two
    built-in functions—`make` and `new`. Be careful using them, as there is a difference
    between the two.


    The `new` function only allocates memory for the complex object but does not initialize
    the memory. When an object, say a map, is allocated using the `new` function,
    it only returns the memory address of where that map is located. However, there
    is zero memory storage associated with the map object. Therefore, when a key-value
    pair is added to the map, it will throw an error.


    Contrary to this, the `make` function allocates as well as initializes the memory
    for the map object created using the `make` function. It returns the memory address,
    like the `new` function, and the storage is initialized to non-zero. This means
    the map object can accept values without throwing errors.


    ### Incorrect Memory Allocation Example


    Listing [2-13](#536365_1_En_2_Chapter.xhtml#PC19) illustrates the incorrect memory
    allocation of map objects. A map object named `string_map` is declared on Line#1
    using the `new` function. The map object accepts keys as `strings` and the associated
    values as `integers`. On Line#2, a key-value pair is added as an entry to the
    declared map object, where the key is named `Marks` and the associated value is
    `56`.


    ```

    string_Map := new(map[string]int)

    string_Map["Marks"] = 56

    fmt.Println(string_Map)

    Listing 2-13

    Illustration of Incorrect Memory Allocation of Map Objects

    ```


    At runtime, Listing [2-13](#536365_1_En_2_Chapter.xhtml#PC19) will make the application
    crash and an error is thrown, as shown in Figure [2-7](#536365_1_En_2_Chapter.xhtml#Fig7).
    This error is raised because you are attempting to place data in a map that does
    not have any memory storage initialized.


    ![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig7_HTML.jpg)


    A screenshot of an output error raised because of attempting to place data in
    an amp that does not have any memory storage initialized stating invalid operation.


    Figure 2-7


    Error raised due to incorrect memory allocation of map object'
