    # 5. 结构体、方法与接口


    Go 语言支持 `structs`（*结构体*的简称），允许程序员定义用户自定义类型。具有“组成”关系的相关数据可以使用 `structs` 分组到一个逻辑单元中。Go
    语言中的方法是可与用户自定义类型绑定以定义其行为的函数。Go 语言的另一个重要特性是接口的概念。在 Go 语言中，`structs` 和接口协同工作，用于组织方法和数据处理。接口可以定义为可由任何其他类型实现的方法签名集合。在
    Go 语言中实现一个接口仅需实现该接口定义的方法。此外，接口只定义但不声明对象的行为。简而言之，`struct` 定义了对象的字段，例如，形状的类型和颜色；而
    `interface` 则定义了可用于该对象的方法，例如，设置和返回形状的颜色。本章提供与 `structs`、方法和接口使用相关的 Go 语言实践指南。


    ## Go 语言中的结构体、方法与接口


    在本节中，我们提供实践指南来说明如何使用 `structs` 定义用户自定义数据类型、定义与 `structs` 关联的方法，以及使用包含一组方法与 `structs`
    关联的接口。我们以一个家庭自动化系统为例，该系统使用传感器将事件详情发送到服务器，例如，门或恒温器发送事件。


    ### 结构体


    在 Go 语言中，每当需要定义用户自定义数据类型时，就会使用 `structs`。它们允许程序员将逻辑上相关的数据分组在一起。例如，一个名为 `Person`
    的结构体可用于将姓名、姓氏、年龄等相关信息分组，以创建一条数据记录。换句话说，`structs` 可用于存储项目集合。`Structs` 可用于分组用户自定义数据类型以及
    Go 的内置数据类型。它们还能提高代码的模块化程度，并有助于创建和传递复杂的数据结构。


    #### 在 Go 语言中声明结构体


    代码清单 5-1 演示了在 Go 语言中声明 `struct` 的方法。声明以 `type` 关键字开头，后跟用户自定义的结构体名称。这可以是您选择的任何名称，最后，`struct`
    关键字表示正在声明一个新的结构体。在大括号内，您可以指定任意数量的、您想要分组的数据字段。对于每个数据字段，指定名称和数据类型非常重要。


    ```

    type 标识符 struct{

    字段 1 数据类型

    字段 2 数据类型

    字段 3 数据类型

    }

    代码清单 5-1

    在 Go 语言中声明结构体的通用格式

    ```


    在命名 `struct` 时，请始终记住：如果 `struct` 及其字段的标识符以小写字母开头，则 `struct` 及其字段都不会被导出到其他包。在 Go
    语言中，要导出标识符（即允许其他包访问），必须确保名称以大写字母开头。


    #### 创建结构体类型的实例


    有多种方法可以实例化 `struct` 类型的新实例。考虑代码清单 5-2，其中声明了一个包含三个数据字段（`length`、`breadth` 和 `color`）的
    `circle` 结构体。第 15 行演示了如何在不显式实例化该 `struct` 类型新实例的情况下使用 `struct`。`var` 关键字初始化了一个
    `circle` 类型的变量 `circle1`。点符号（`.`）为 `struct` 实例的字段赋值，如第 19 行所示。第 26 行演示了如何使用结构体字面量创建
    `struct` 实例，这样您可以跳过某些数据字段的值。第 32 行和第 39 行使用 `new` 关键字实例化 `circle` 结构体的新实例。`circle3`
    和 `circle4` 的区别在于：`circle3` 是指向 `circle` 实例的指针，而 `circle4` 是 `circle` 的一个实例。类似地，您可以使用指针地址运算符（`&`）实例化
    `struct` 类型的新实例，如第 46、49 和 54 行所示。


    ```

    package main

    import (

    "fmt"

    )

    type circle struct {

    length  float32

    breadth float32

    color   string

    }

    func main() {

    // 不实例化新实例直接使用结构体

    fmt.Println("不实例化: ", circle{10.5, 25.10, "red"})

    // 创建结构体类型的实例

    var circle1 circle

    circle1.length = 20 // 使用点符号赋值

    circle1.breadth = 30

    circle1.color = "Yellow"

    fmt.Println("Circle1: ", circle1)

    // 使用结构体字面量创建结构体实例

    var circle2 = circle{length: 10, color: "Green"} /* bread

    字段值被省略 */

    fmt.Println("Circle2: ", circle2)

    // 使用 new 关键字实例化结构体

    circle3 := new(circle) /* circle3 是指向 circle 实例的指针 */

    circle3.length = 10

    circle3.breadth = 20

    circle3.color = "Red"

    fmt.Println("Circle3: ", circle3)

    var circle4 = new(circle) //circle4 是 circle 的一个实例

    circle4.length = 40

    circle4.color = "Blue"

    fmt.Println("Circle4: ", circle4)

    // 使用指针地址运算符实例化结构体

    var circle5 = &circle{10, 20, "Green"} //不能省略任何值！

    fmt.Println(circle5)

    var circle6 = &circle{}

    circle6.length = 10

    circle6.color = "Red"

    fmt.Println(circle6) // breadth 的值被省略

    var circle7 = &circle{}

    (*circle7).breadth = 10

    (*circle7).color = "Blue"

    fmt.Println(circle7) // length 的值被省略

    }

