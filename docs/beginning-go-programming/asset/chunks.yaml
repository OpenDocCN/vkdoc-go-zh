- fmt: '# Handling Missing Values and Zeros in JSON


    The `encoding/json` package will only fill struct fields that are found in the
    JSON object. By default, Go initializes all the struct fields to their zero value.
    In other words, numbers are set to zero and strings are treated as empty strings.
    Slices, maps, and channels are set to `nil`, and bools are set to `false`.


    Say you have a `lineItem` from a receipt, as shown in Figure [6-1](#536365_1_En_6_Chapter.xhtml#Fig1),
    containing the price, the discount, and the quantity. You want the following logic:


    - If you don''t have the `quantity` in the JSON object, the `quantity` should
    be one.

    - Otherwise, if there is a `quantity`, it should be more than zero.


    One option is to make the `quantity` a pointer to an integer (`Quantity *int`).
    In this case, if the quantity is `nil`, you know that there is no value in the
    JSON object. Otherwise, there is some value, but working with pointers is cumbersome
    and error prone.


    A better approach is shown in Listing [6-4](#536365_1_En_6_Chapter.xhtml#PC9),
    where you define a `NewLineItem()` function that returns a `lineItem` already
    populated with the quantity equal to one. Then, when you unmarshal a `lineItem`
    from a byte slice, `[]byte`, you create `NewLineItem`, meaning the `quantity`
    field will be one. Then you can marshal it from JSON. Meaning if there was a quantity
    field in JSON, it''s going to override the value stored in the `li`; otherwise,
    it’s going to stay one. Then you perform the value validation on the quantity
    field. To check the workings of this code, we pass two different values in the
    `main()` function.


    ```go

    package main

    import (

    "encoding/json"

    "fmt"

    )

    //LineItem is a line in receipt

    type LineItem struct {

    SKU      string

    Price    float64

    Discount float64

    Quantity int

    }

    //NewLineItem returns a new line item with default values

    func NewLineItem() LineItem {

    return LineItem{

    Quantity: 1,

    }

    }

    func unmarshalLineItem(data []byte) (LineItem, error) {

    li := NewLineItem()

    if err := json.Unmarshal(data, &li); err != nil {

    return LineItem{}, nil

    }

    if li.Quantity < 1 {

    return LineItem{}, fmt.Errorf("bad quantity")

    }

    return li, nil

    }

    func main() {

    data := []byte(`{"sku": "x3xs", "price": 1.2}`)

    li, err := unmarshalLineItem(data)

    if err != nil {

    fmt.Println("ERROR:", err)

    } else {

    fmt.Printf("%#v\n", li)

    }

    data = []byte(`{"sku": "x3xs", "price": 1.2, "quantity": 0}`)

    li, err = unmarshalLineItem(data)

    if err != nil {

    fmt.Println("ERROR:", err)

    } else {

    fmt.Printf("%#v\n", li)

    }

    }

    ```


    **Output:**


    ```

    main.LineItem{SKU:"x3xs", Price:1.2, Discount:0, Quantity:1}

    ERROR: bad quantity

    ```


    ## Using `mapstructure` to Handle Arbitrary JSON


    Say you have an endpoint that gets job-related requests in JSON format. The request
    can be a start or a status request in the following format:


    ```json

    {

    "type": "start",

    "user": "joe",

    "count": 3

    }

    {

    "type": "status",

    "Id": "689fae62"

    }

    ```


    The built-in `encoding/json` package cannot handle arbitrary JSONs. To overcome
    this shortcoming, you can use the `mapstructure` external package. The `mapstructure`
    package looks just like the JSON package but instead of working on a `byte` slice,
    it works on a map from `string` to `interface{}` that in Go represents an arbitrary
    JSON object. Listing [6-5](#536365_1_En_6_Chapter.xhtml#PC12) illustrates this
    concept. First, you import the `mapstructure` package. Then you define two structs—`StartJob`
    and `JobStatus`. The `handleStart()` and `handleStatus()` functions handle `start`
    and `status` requests, respectively. The `handleRequest()` function takes a `[]byte`
    slice as input and returns any errors. The function starts with a `map[string]interface{}`,
    and you use the built-in `json.Unmarshal()` function from the `encoding/json`
    package to unmarshal the data into this map. Then, you get the value of the type
    using the comma-ok idiom from the map. The comma-ok idiom determines if the value
    exists. If the value is not there, it returns an error with the message “`type
    is missing in JSON`”. `val` is the empty interface; therefore, you need to convert
    it to a `string` by type assertion with the comma-ok idiom. Then you use the `switch`
    statement to determine the request type.


    ```go

    package main

    import (

    "encoding/json"

    "fmt"

    "mapstructure"

    )

    //StartJob is a request to start a job

    type StartJob struct {

    Type  string

    User  string

    Count int

    }

    //JobStatus is a request for job status

    type JobStatus struct {

    Type string

    ID   string

    }

    func handleStart(req StartJob) error {

    fmt.Printf("Start: %#v\n", req)

    return nil

    }

    func handleStatus(req JobStatus) error {

    fmt.Printf("Status: %#v\n", req)

    return nil

    }

    func handleRequest(data []byte) error {

    var m map[string]interface{}

    if err := json.Unmarshal(data, &m); err != nil {

    return err

    }

    val, ok := m["type"]

    if !ok {

    return fmt.Errorf("type ''type'' missing from JSON")

    }

    typ, ok := val.(string)

    if !ok {

    return fmt.Errorf(" ''type'' is not a string")

    }

    switch typ {

    case "start":

    var sj StartJob

    if err := mapstructure.Decode(m, &sj); err != nil {

    return fmt.Errorf("bad ''start'' request: %w", err)

    }

    return handleStart(sj)

    case "status":

    var js JobStatus

    if err := mapstructure.Decode(m, &js); err != nil {

    return fmt.Errorf("bad ''status'' request: %w", err)

    }

    return handleStatus(js)

    }

    return fmt.Errorf("Unknown Request Type: %q", typ)

    }

    func main() {

    data := []byte(`{"type": "start", "user": "joe", "count": 7}`)

    if err := handleRequest(data); err != nil {

    fmt.Println("ERROR: ", err)

    }

    data = []byte(`{"type": "status", "id": "seven"}`)

    if err := handleRequest(data); err != nil {

    fmt.Println("ERROR: ", err)

    }

    }

    ```


    **Output:**


    ```

    start: main.StartJob{Type:"start", User:"joe", Count:7}

    status: main.JobStatus{Type:"status", ID:"seven"}

    ```


    Note that in order to run Listing [6-5](#536365_1_En_6_Chapter.xhtml#PC12) successfully,
    you first have to import the `mapstructure` package at [`www.github.com/mitchellh/mapstructure`](http://www.github.com/mitchellh/mapstructure).
    In order to do so, run the commands shown in Listing [6-6](#536365_1_En_6_Chapter.xhtml#PC14)
    from the folder where the file containing the program shown in Listing [6-5](#536365_1_En_6_Chapter.xhtml#PC12)
    resides.


    ```

    go mod init "github.com/mitchellh/mapstructure"

    ```


    ## Summary


    This chapter provided Go recipes to give you hands-on experience handling JSON
    structured data in Go. Go provides a built-in package named `json` for handling
    data that is formatted in JSON. In this chapter, you went through recipes on using
    the JSON package, parsing complex JSON data, and handling missing values or zeros
    in JSON formatted-data. The chapter also provided a Go recipe on handling arbitrary
    JSON data using the `mapstructure` package.


    Now that you know how to handle JSON data, in the next chapter, you’ll run through
    Go recipes that teach you how to handle HTTP calls by building and authenticating
    HTTP servers.


    # 7. HTTP


    Now that you have a good grasp of the basics of the Go programming language, it’s
    time to put things into action! The easiest way to do that is through web application
    programming interfaces (APIs). An API is a set of specifications used to communicate
    between two programs. APIs utilize web technologies, especially Hypertext Transfer
    Protocol (HTTP), to exchange information between clients and servers. Go provides
    extensive support for HTTP. This chapter includes Go recipes for working with
    the `net/http` package, which contains implementations of the HTTP client and
    server.'
