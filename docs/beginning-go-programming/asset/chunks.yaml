    Within the `toursFromJson()` function, the first step is to create a slice `tour`
    of tour objects. The tour slice is initially set to size zero and an initial capacity
    of 20\. Note that 20 is just a guess and not the exact number of objects that
    might be fetched. As slices can resize dynamically, you don’t have to give a large
    initial capacity. The `NewDecoder()` built-in function returns a decoder that
    will read from the reader object passed to it. The `NewReader()` returns a reader
    that reads from the string passed to it. The `Token()` function returns the next
    JSON token in the input stream.


    To transform the JSON-formatted text into the slice of tour objects, you declare
    a variable named `tours` and set its type to `Tour`. Next, a `while`-style `for`
    loop is used; the `decoder.More()` function reports whether or not any other elements
    are present in the current array or any other object is getting parsed. Within
    the `for` loop, the `Decode()` function of the decoder object reads the next JSON-encoded
    value from its input and stores it in the value pointed to by the argument passed
    to it. You pass the memory address of the `tour` object. Then you add the `tour`
    object to the `tours` slice using the `append()` function. In the end, the `tours`
    object is returned from the function.


    ```

    package main

    import (

    "encoding/json"

    "fmt"

    "io/ioutil"

    "net/http"

    "strings"

    )

    const url = "http://services.explorecalifornia.org/json/tours.php"

    func main() {

    resp, err := http.Get(url)

    if err != nil {

    panic(err)

    }

    fmt.Printf("Response Type: %T\n", resp)

    defer resp.Body.Close()

    bytes, err := ioutil.ReadAll(resp.Body)

    if err != nil {

    panic(err)

    }

    content := string(bytes)

    tours := toursFromJson(content)

    for _, tour := range tours {

    fmt.Println(tour.Name, "  ", tour.Price)

    }

    }

    func toursFromJson(content string) []Tour {

    tours := make([]Tour, 0, 20) //slice of Tour array with initial size 0 and capacity
    20

    decoder := json.NewDecoder(strings.NewReader(content))

    _, err := decoder.Token()

    if err != nil {

    panic(err)

    }

    var tour Tour

    for decoder.More() {

    err := decoder.Decode(&tour)

    if err != nil {

    panic(err)

    }

    tours = append(tours, tour)

    }

    return tours

    }

    type Tour struct {

    Name, Price string

    }

