    清单 4-4 是解决此场景的一个示例方案。在清单 4-4 中，你必须首先定义用于解析单行的正则表达式。请记住，通常的最佳实践是以注释代码的形式给出正则表达式的示例，以便更好地理解。此处，如果正则表达式无效，`MustCompile()`
    函数将触发 panic。


    请注意，该程序将保存正则表达式的变量声明在全局级别，以便整个程序都能访问它，并且 `panic` 将导致整个程序崩溃。在正则表达式中，`\d+` 是数字的占位符。`+`
    号表示允许一个或多个字符。表达式 `([A-Z]+)` 表示可以接受大写字符。`\$` 用于表示美元符号。表达式 `(\d+(\.\d+)?)` 用于打印价格。它接受美元符号后的一个或多个数字，后跟一个点（`.`），然后再跟一个或多个数字。这样你就声明了
    `Transaction` 结构体。


    `parseLine()` 函数将一个字符串作为输入参数，并返回一个 `Transaction` 类型的对象以及一个错误。在该函数内部，我们首先使用 `FindStringSubmatch()`
    函数检查传入的字符串是否与正则表达式匹配。它返回一个匹配项的切片。如果没有匹配项，则返回一个错误和一个空的事务对象。当存在匹配项时，它将值分配给 `transaction`
    类型对象 `trans` 的相应成员字段。由于正则表达式处理的是文本，匹配项将是字符串。你需要将它们转换为整数（对于交易量）和浮点数（对于价格）。你可以分别使用
    `strconv.Atoi()` 和 `strconv.ParseFloat()` 函数来实现这一点。在此过程中，你可以忽略返回的错误，因为你知道正则表达式匹配的字符串是合法的，可以安全地转换为数字。


    ```go

    package main

    import (

    "fmt"

    "log"

    "regexp"

    "strconv"

    )

    /*

    12 shares of MSFT for $234.57

    10 shares of TSLA for $692.4

    */

    var transRe = regexp.MustCompile(`(\d+) shares of ([A-Z]+) for \$(\d+(\.\d+)?)`)

    type Transaction struct {

    Symbol string

    Volume int

    Price  float64

    }

    func parseLine(line string) (Transaction, error) {

    matches := transRe.FindStringSubmatch(line)

    if matches == nil {

    return Transaction{}, fmt.Errorf("Bad Line: %q", line)

    }

    var trans Transaction

    trans.Symbol = matches[2]

    trans.Volume, _ = strconv.Atoi(matches[1])

    trans.Price, _ = strconv.ParseFloat(matches[3], 64)

    return trans, nil

    }

    func main() {

    line := "12 shares of MSFT for $234.57"

    t, err := parseLine(line)

    if err != nil {

    log.Fatal(err)

    }

    fmt.Printf("%+v\n", t)

    }

    ```


    **输出：**

    ```

    {Symbol:MSFT Volume:12 Price:234.57}

    ```


    假设你正在运行一台 Linux 机器，并且想知道系统重启了多少次。此信息可以从 `sys.log` 文件中获取。使用 `grep` 工具，你可以在这个文件中搜索“System
    is rebooting”这句话。在下面的例子中，你将编写一个像 `grep` 工具一样工作的函数，并显示包含搜索词的行。


    如清单 4-5 所示，`grep()` 函数接收两个输入——一个用于读取文本的 `io.Reader` 对象，以及你要搜索的术语。此外，它返回一个与所需术语匹配的字符串切片。`NewScanner()`
    返回一个新的扫描器，用于从 `io.Reader` 中读取。`strings.Contains()` 确定当前文本是否包含所需的术语。如果包含，则将当前行追加到
    `matches` 切片中。你需要检查扫描时是否出错。如果没有，则返回 `matches`。


    ```go

    package main

    import (

    "bufio"

    "fmt"

    "io"

    "log"

    "strings"

    )

    func main() {

    r := strings.NewReader("This is a sample code. Learn to code properly")

    term := "code"

    matches, err := (grep(r, term))

    if err != nil {

    log.Fatalln(err.Error())

    }

    if matches != nil {

    fmt.Println("Lines containing \"", term, "\" are :")

    fmt.Println(matches)

    } else {

    fmt.Println("Query term is not present")

    }

    }

    //grep 返回 r 中包含术语 term 的行

    func grep(r io.Reader, term string) ([]string, error) {

    var matches []string

    s := bufio.NewScanner(r)

    for s.Scan() {

    if strings.Contains(s.Text(), term) {

    matches = append(matches, s.Text())

    }

    }

    if err := s.Err(); err != nil {

    return nil, err

    }

    return matches, nil

    }

    ```


    **输出：**

    ```

    Lines containing " code " are :

    [This is a sample code. Learn to code properly]

    ```


    ## 动手挑战


    编写一个 Go 程序，从给定文件中返回 Go 子命令出现的次数。该文件包含以下格式的文本。


    ```

    1542784314:0;git push

    1542784378:0;ls

    1542784308:0;go test

    1542784310:0;go test -v

    ```


    ## 解决方案


    清单 4-6 展示了此动手挑战的一种可能解决方案。


    ```go

    package main

    import (

    "bufio"

    "fmt"

    "os"

    "regexp"

    )

    /* 要读取的文件中的示例数据

    1542784314:0;git push

    1542784378:0;ls

    1542784308:0;go test

    1542784310:0;go run -v

    1542784311:0;go test -v

    */

    var cmdRe = regexp.MustCompile(`;go ([a-z]+)`)

    //cmdFreq 从给定文件中返回 go 子命令的频率

    func cmdFreq(fileName string) (map[string]int, error) {

    file, err := os.Open(fileName)

    if err != nil {

    return nil, err

    }

    defer file.Close()

    freqs := make(map[string]int)

    s := bufio.NewScanner(file)

    for s.Scan() {

    matches := cmdRe.FindStringSubmatch(s.Text())

    if len(matches) == 0 {

    continue

    }

    cmd := matches[1]

    freqs[cmd]++

    }

    if err := s.Err(); err != nil {

    return nil, err

    }

    return freqs, nil

    }

    func main() {

    result, _ := cmdFreq("./sample.txt")

    for key, _ := range result {

    fmt.Println("Subcommand: ", key, " Count: ", result[key])

    }

    }

    ```


    **输出：**

    ```

    Subcommand:  test  Count:  2

    Subcommand:  run  Count:  1

    ```


    ## 小结


    本章包含了基于不同场景的 Go 语言食谱，旨在为用户提供字符串格式化、读取文本文件、执行大小写敏感比较以及使用正则表达式等高级主题的实践体验。


    能够定义数据类型至关重要，因此在下一章中，我们将提供关于结构体、方法和接口的食谱。

