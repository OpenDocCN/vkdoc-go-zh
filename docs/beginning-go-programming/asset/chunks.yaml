- fmt: "# Switch Statement\n\nLike other C-Style languages, the Go language also offers\
    \ `switch` statements that serve the same purpose; however their syntax expands\
    \ on those languages. A `switch` statement can be used on a variable to test a\
    \ variable’s equality against a list of values. Listing [2-39](#536365_1_En_2_Chapter.xhtml#PC66)\
    \ uses the `Math.Rand` package from the `rand` package; we will be using the `seed()`\
    \ function and passing it the current time in UNIX format using the statement\
    \ `rand.seed(time.Now().Unix())`. Next, the `Intn()` function from the `rand`\
    \ package returns a non-negative pseudo-random integer. The `Intn()` function\
    \ requires you to specify a range interval `[0,n)`. It is important to make sure\
    \ that `n <= 0`. In this example, we provided a ceiling value of `7+1`, i.e.,\
    \ the function will use the interval `[0, 7) + 1`. In this way the function will\
    \ return a number between one and seven. Each time you run this application, it\
    \ will generate a different number depending on the millisecond of the current\
    \ time on your computer. (It is possible to see the same number again and again,\
    \ but that’s just a coincidence.) Every time the code in Listing [2-39](#536365_1_En_2_Chapter.xhtml#PC66)\
    \ runs, you will possibly get different output.\n\n```\npackage main\nimport (\n\
    \"fmt\"\n\"math/rand\"\n\"time\"\n)\nfunc main() {\nrand.Seed(time.Now().Unix())\n\
    dow := rand.Intn(7) + 1\nfmt.Println(\"Day: \", dow)\nvar result string\nswitch\
    \ dow {\ncase 1:\nresult = \"It's Sunday\"\ncase 2:\nresult = \"It's Monday\"\n\
    default:\nresult = \"It's some other day\"\n}\nfmt.Println(result)\n}\nListing\
    \ 2-39\nUsing a switch Statement in Go\n```\n\n**Output:**\n\n```\nDay:  2\nIt's\
    \ Monday\n```\n\nNote that in the `switch` statement, the parentheses are not\
    \ required around the expression that is being evaluated. One more difference\
    \ from C and Java is that the `switch` statement in Go does not require the `break`\
    \ statement. In Go, as soon as one of the cases is evaluated as `true`, the statements\
    \ within that case are executed and the control is transferred to the end of the\
    \ `switch` statement. Furthermore, just like the `if` statement, you can also\
    \ include a short statement before the evaluation of the variables in the `switch`\
    \ statement, as shown in Listing [2-40](#536365_1_En_2_Chapter.xhtml#PC68). Remember\
    \ that any variable declared in the `switch` statement will be local to that `switch`\
    \ statement.\n\n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n\
    )\nfunc main() {\nrand.Seed(time.Now().Unix())\nvar result string\nswitch dow\
    \ := rand.Intn(7) + 1; dow {\ncase 1:\nresult = \"It's Sunday\"\ncase 2:\nresult\
    \ = \"It's Monday\"\ndefault:\nresult = \"It's some other day\"\n}\nfmt.Println(result)\n\
    }\nListing 2-40\nUsing a Switch Statement with Evaluation Statement\n```\n\nIn\
    \ Go, the `fallthrough` keyword is used in the `case` block of the `switch` statement.\
    \ If the `fallthrough` keyword is present in any `case` block, it will transfer\
    \ the program’s control flow to the next case, whether or not the current case\
    \ evaluated to `true`.\n\n# For Statement\n\nUnlike the other high-level programming\
    \ languages, Go offers only one looping construct, namely the `for` loop. The\
    \ `for` loop can be used for repetitive tasks such as iterating through collections\
    \ of values. The basic syntax of the `for` loop is identical to that in Java or\
    \ C-style languages, with the exception that the parentheses `( )` in the `for`\
    \ statement are not required. Furthermore, just like C-style languages or Java,\
    \ the pre- and post- statements in the `for` loop statement are not mandatory\
    \ and can be left blank. Additionally, in Go, a `for` loop can be used in four\
    \ variations, discussed here:\n\n1.  **A** `for` **loop with step variable, condition,\
    \ and range.**\n\n    The `range` keyword is used in Go to iterate over elements\
    \ stored in a variety of data structures. When used with arrays and slices, the\
    \ `range` keyword also returns the index and value for each entry. In Listing\
    \ [2-41](#536365_1_En_2_Chapter.xhtml#PC69), in the second `for` loop, we used\
    \ the blank identifier ( `_` ) to ignore the index. However, as in the third `for`\
    \ loop, the indexes are sometimes required as well. In the fourth `for` loop,\
    \ the range will return to the variable `i` from a comma-delimited list. The first\
    \ variable will be the index and the second will be the associated value.\n\n\
    \    ```\n    package main\n    import \"fmt\"\n    func main() {\n    total :=\
    \ 0\n    for k := 0; k < 5; k++ {\n    total += k\n    }\n    nums := []int{2,\
    \ 3, 4}\n    total = 0\n    for _, num := range nums {\n    total += num\n   \
    \ }\n    fmt.Println(\"Total:\", total)\n    for j, num := range nums {\n    if\
    \ num == 2 {\n    fmt.Println(\"Index:\", j)\n    }\n    }\n    for i := range\
    \ nums {\n    fmt.Println(nums[i])\n    }\n    }\n    Listing 2-41\n    For Loop\
    \ with Step Variable, Condition, and Range\n    ```\n\n    **Output:**\n\n   \
    \ ```\n    Total: 9\n    Index: 0\n\n    ```\n\n2.  **A** `for` **loop with blank\
    \ pre/post statements**\n\n    Listing [2-42](#536365_1_En_2_Chapter.xhtml#PC71)\
    \ illustrates the use of `for` loops with blank pre/post statements.\n\n    ```\n\
    \    total := 1\n    for ; total < 10; {\n    total += total\n    }\n    Listing\
    \ 2-42\n    For Loop with Blank Pre/Post Statements\n    ```\n\n3.  **A** `for`\
    \ **loop as a** `while` **loop**\n\n    Many languages have a `while` keyword\
    \ that lets you loop over a set of statement(s) as long as a Boolean expression\
    \ is true. Go implements this type of looping using the `for` keyword. Instead\
    \ of a counter variable or a range, you just declare a Boolean condition. Listing\
    \ [2-43](#536365_1_En_2_Chapter.xhtml#PC72) illustrates this concept.\n\n    ```\n\
    \    total := 1\n    for  < 10 {\n    total += total\n    }\n    Listing 2-43\n\
    \    Using a For Loop as a While Loop\n    ```\n\n4.  **Infinite loop**\n\n  \
    \  In general, if the specified condition statement of a loop never turns false,\
    \ the loop turns into an infinite loop. Usually, `for` loops are used for creating\
    \ infinite loops. When all of the three expressions in the `for` statement are\
    \ not specified, this makes the condition statement remain true forever, turning\
    \ the `for` loop into an infinite loop. Listing [2-44](#536365_1_En_2_Chapter.xhtml#PC73)\
    \ illustrates this concept.\n\n    ```\n    for {\n    // Any task you want to\
    \ loop forever\n    }\n    Listing 2-44\n    Using a For loop as an Inifinite\
    \ Loop\n    ```\n\n# The goto Statement\n\nGo also supports the `goto` statement,\
    \ which transfers control to a label in the code. Listing [2-45](#536365_1_En_2_Chapter.xhtml#PC74)\
    \ illustrates the use of labels with `goto` statements to alter the program control\
    \ flow. In this snippet, when the `if` statement turns true, the `goto` statement\
    \ will be executed and control will be transferred to the `theEnd` label, then\
    \ the statements following this label will be executed. Listing [2-45](#536365_1_En_2_Chapter.xhtml#PC74)\
    \ illustrates a basic program depicting the use of a `goto` statement in Go.\n\
    \n```\npackage main\nimport (\n\"fmt\"\n)\nfunc main() {\ntotal := 1\nfor total\
    \ < 5 {\ntotal += total\nfmt.Println(\"Total: \", total)\nif total == 5 {\ngoto\
    \ theEnd\n}\n}\ntheEnd:\nfmt.Println(\"End of Program\")\n}\nListing 2-45\nUsing\
    \ the goto Statement in Go\n```\n\n**Output:**\n\n```\nTotal:  2\nTotal:  4\n\
    Total:  8\nEnd of Program\n```\n\nTo summarize, Go supports the use of `continue`,\
    \ `break,` and `goto` statements. Go also supports looping with a variety of coding\
    \ patterns and adds features to the `for` statement to make it concise and readable."
