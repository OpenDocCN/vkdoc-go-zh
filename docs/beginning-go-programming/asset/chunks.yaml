- fmt: "### How to Execute a Go Program\n\nIn order to execute the program, click\
    \ the `Run` button on the Go Playground. Your code will be compiled and executed\
    \ on Google servers and the output will be displayed on the screen.\n\nTo execute\
    \ your program using the command prompt on Windows, you can use the `go run filename.go`\
    \ command. For example, as shown in Figure [2-4](#536365_1_En_2_Chapter.xhtml#Fig4),\
    \ the command used to run Listing [2-3](#536365_1_En_2_Chapter.xhtml#PC3) is `go\
    \ run main.go`. To build applications, run the `go build filename.go` command.\
    \ For example, to build the sample program, you’d issue the command `go build\
    \ main.go`. To run the compiled version of the program, you’d issue the `./filename`\
    \ command, for example, `./main`.\n\n![](images/536365_1_En_2_Chapter/536365_1_En_2_Fig4_HTML.jpg)\n\
    \nA screenshot displays the command used to run the listing. `go run main.go`,\
    \ and to build an application, run the `go build main.go` command.\n\n**Figure\
    \ 2-4** Commands to run and build a Go program\n\nInterestingly, the compiled\
    \ application runs faster than the `go run` command. Building the source code\
    \ file will result in the creation of a compiled binary file specifically designed\
    \ to work on your current operating system. Even though it is possible to compile\
    \ your programs for other operating systems, by default, the compiler will generate\
    \ the binary compatible with your operating system.\n\n### Keywords\n\nLike every\
    \ programming language, Go has a set of keywords (words reserved for special purposes).\
    \ These keywords cannot be used as identifier names for contents, variables, functions,\
    \ or any other purpose. Table [2-1](#536365_1_En_2_Chapter.xhtml#Tab1) includes\
    \ a list of Go’s keywords.\n\n**Table 2-1** Go’s Keywords\n\n| `chan` | `const`\
    \ | `goto` | `interface` | `struct` |\n| `defer` | `case` | `func` | `var` | `select`\
    \ |\n| `break` | `for` | `go` | `import` | `continue` |\n| `default` | `fallthrough`\
    \ | `switch` | `type` | `range` |\n| `if` | `else` | `return` | `package` | `map`\
    \ |\n\nNow that you are aware of its keywords, you are ready to learn how to use\
    \ variables and other data structures in Go.\n\n## Variables\n\nLike other programming\
    \ languages, variables are used in Go to store data in memory. Being a statically-typed\
    \ language, Go requires that each variable be assigned a type. Once a type is\
    \ assigned it cannot be changed. There are two ways to set the type for a variable—explicitly\
    \ or implicitly. By explicitly, we mean that at the time of declaration, the name\
    \ of the type is mentioned. Implicitly means that, based on the variable’s initial\
    \ value, the compiler will infer the type.\n\nIn Go, every variable should have\
    \ a type. The type plays an important role in determining the layout and size\
    \ of the variable’s memory, the allowed value ranges, and the set of operations\
    \ applicable to the variable.\n\n### Variable Data Types\n\nGo allows user-defined\
    \ types and comes with various built-in data types. Here are a few basic built-in\
    \ data types available in Go:\n\n* **Boolean:** `bool` represents Boolean data\
    \ in the form of `true`/`false`. `true` and `false` are the only two values that\
    \ a Boolean data type can be assigned.\n* **String:** In Go, a variable of `string`\
    \ type contains a series of characters.\n* **Numeric data types:**\n  * **Integers:**\
    \ Used to store whole numbers.\n    * **Fixed Integer:** Included formats are\
    \ `uint8`, `uint16`, `uint32`, `int8`, `int16`, and `int32`. These are used to\
    \ declare unsigned or signed integers. The numbers in the name of the formats\
    \ are the bits that have an effect on the range of numbers that a variable can\
    \ be assigned.\n  * **Float:** Used to store floating-point numbers. Supported\
    \ formats include `float32` and `float64`.\n  * **Complex:** Complex numbers contain\
    \ two parts: the real number and imaginary number. Supported formats are `complex64`\
    \ and `complex128`.\n  * **Aliases:** These can be used instead of full type names,\
    \ such as `byte` (same as `uint8`), `uint` (32 or 64 bits), `rune` (same as `int32`),\
    \ `int` (same as `uint`), and `uintptr` (an unsigned integer that is used to store\
    \ uninterpreted bits of a pointer value).\n* **Data collections:** Go also has\
    \ built-in types for different data collections.\n  * **Arrays and slices:** Used\
    \ to manage ordered data collections.\n  * **Maps and structs:** Used to manage\
    \ aggregations of values.\n  * **Enumeration:** Used to store a set of named constant\
    \ values.\n* **Language organization types:**\n  * **Function:** Go considers\
    \ function a type. This allows the passing of one function as an argument to another.\n\
    \  * **Interfaces:** Used to specify a set of one or more method signatures.\n\
    \  * **Channels:** Used to connect goroutines.\n* **Data management:**\n  * **Pointers:**\
    \ Store direct addresses of memory locations (variables).\n\nOther than the built-in\
    \ types, Go also allows programmers to create user-defined data types.\n\n###\
    \ Variable Naming Conventions\n\nA variable name can be made up of letters, digits,\
    \ and underscores. However, the variable name should begin with either an underscore\
    \ or a letter. The lower- and uppercase letters are treated differently, because\
    \ of the case-sensitive nature of the Go language."
