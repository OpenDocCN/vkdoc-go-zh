  \ version`。如果一切正常，应该会看到显示所使用的 Go 语言版本的输出，如图 2-2 所示。\n\n![](img/536365_1_En_2_Fig2_HTML.jpg)\n\
  \n屏幕截图显示用于检查 `PATH` 变量的程序以及指示所使用的 Go 语言版本的输出。显示了登录信息、路径和版本。\n\n图 2-2 — 检查 `PATH`\
  \ 变量和版本以确保正确安装 Go 编译器\n\n如果能看到版本信息，就可以开始使用 Go 语言进行编程了。您首先想要探索的是 Go Playground。\n\
  \n## Go Playground\n\n开始编码和开发基于 Go 的程序的最快方法之一是使用 [Go Playground](https://go.dev/play/)，这是一个基于\
  \ Web 的 IDE。如图 2-3 所示，无需安装任何东西，Go Playground 允许用户编辑、运行和试验 Go 编程语言。单击“运行”按钮时，Go Playground\
