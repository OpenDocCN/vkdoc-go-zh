  func main() {\nt := Thermostat{\"Living Room\", 16.2}\nfmt.Printf(\"%s Before: %.2f\\\
  n\", t.ID, t.Value())\nt.Set(18)\nfmt.Printf(\"%s After: %.2f\\n\", t.ID, t.Value())\n\
  }\n清单 5-5\nGo 方法使用示例\n```\n\n**输出：**\n\n```\nLiving Room Before: 16.20\nLiving Room\
  \ After: 18.00\n```\n\n### 接口\n\nGo 是一种多范型语言，它兼具函数式、命令式和面向对象编程的特点。尽管看起来 Go 从 OOP\
  \ 范型中借鉴了很多，但有一个例外。Go 不支持使用类进行继承；相反，它选择组合而非继承，并使用结构体和接口来实现这一目标。\n\n#### 在 Go 中声明接口\n\
  \n在 Go 中，*接口*是一种抽象类型，即它用于描述一个类型可以实现的所有方法。然而，接口仅限于提供方法签名，而不提供其实现。方法的实现完全由实现接口的类型决定。因此，可以说接口只定义（而不声明）特定类型对象的行为。\n\
  \n清单 5-6 演示了在 Go 中创建接口。首先是 `type` 关键字，后跟接口名称，接口名称可由程序员选择（Go 语言保留关键字除外）。最后是 `interface`\
  \ 关键字。相关的方法签名包含在花括号内，如清单 5-6 所示。\n\n```\ntype interface_name interface{\n// Method\
  \ signatures\n}\n清单 5-6\nGo 中声明接口的一般格式\n```\n\n#### 在 Go 中实现接口\n\n在 Go 中，实现接口时必须实现接口中声明的所有方法。此外，与其他需要\
  \ `implement` 关键字来实现接口的语言不同，Go 是隐式实现接口的。清单 5-7 演示了如何在 Go 中声明和实现接口。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n)\n// Creating an Interface\ntype Shape interface {\n\
  // Method Signatures\nArea() float64\nPerimeter() float64\n}\ntype Rectangle struct\
  \ {\nlength  float64\nbreadth float64\n}\n// Implementing Methods of the Shape Interface\n\
  func (r Rectangle) Area() float64 {\nreturn r.length * r.breadth\n}\nfunc (r Rectangle)\
  \ Perimeter() float64 {\nreturn 2 * (r.length + r.breadth)\n}\n// Main Method\n\
  func main() {\n// Accessing Elements of the Shape Interface\nvar s Shape\ns = Rectangle{10,\
  \ 14}\nfmt.Println(\"Area of Shape :\", s.Area())\nfmt.Println(\"Perimeter of Shape:\"\
  , s.Perimeter())\n}\n清单 5-7\nGo 接口实现示例\n```\n\n**输出：**\n\n```\nArea of Shape : 140\n\
  Perimeter of Shape: 48\n```\n\n\n\n#### 接口实战示例\n\n让我们通过一个 Go 语言示例来学习如何使用接口。假设你有多个传感器，并希望将它们全部打印出来。在这种情况下，首先需要定义一个自定义类型\
  \ `Sensor`，用于存储传感器相关信息。由于所有传感器都需要类似的功能，你可以使用接口来实现这一目的。\n\n代码清单 5-8 展示了 Go 语言中接口的使用方式。这里定义了一个包含三个关联方法的\
  \ `thermostat` 结构体。另一个结构体是 `camera`，它具有与 `thermostat` 相同的方法。`printAll()` 函数用于打印任意传感器的\
  \ ID。你可以使用接口来实现打印功能。该函数接收一个传感器切片，并针对每个传感器打印其 ID 和类型。在 `main()` 函数中，你创建了一个 `Sensors`\
  \ 类型的切片，其中包含 `Thermostat` 和 `Camera` 结构体，并打印它们的详细信息。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n)\n//thermostat（恒温器）用于测量和控制温度\ntype Thermostat struct {\nid    string\n\
  value float64\n}\n//Value 返回当前摄氏温度\nfunc (t *Thermostat) Value() float64 {\nreturn\
  \ t.value\n}\n//ID 返回恒温器 ID\nfunc (t *Thermostat) ID() string {\nreturn t.id\n}\n\
  //Set 用于设置恒温器温度\nfunc (t *Thermostat) Set(value float64) {\nt.value = value\n}\n\
  //Kind 返回设备类型\nfunc (t *Thermostat) Kind() string {\nreturn \"thermostat\"\n}\n\
  //Camera 是安防摄像头\ntype Camera struct {\nid string\n}\n//ID 返回摄像头 ID\nfunc (c *Camera)\
  \ ID() string {\nreturn c.id\n}\nfunc (*Camera) Kind() string {\nreturn \"camera\"\
  \n}\ntype Sensor interface {\nID() string\nKind() string\n}\nfunc printAll(sensors\
  \ []Sensor) {\nfor _, s := range sensors {\nfmt.Printf(\"%s \\n\", s.ID(), s.Kind())\n\
  }\n}\nfunc main() {\nt := Thermostat{\"Living Room\", 16.2}\nc := Camera{\"Baby\
  \ Room\"}\nsensors := []Sensor{&t, &c}\nprintAll(sensors)\n/*fmt.Printf(\"%s Before:\
  \ %.2f\\n\", t.ID, t.Value())\nt.Set(18)\nfmt.Printf(\"%s After: %.2f\\n\", t.ID,\
  \ t.Value())*/\n}\n代码清单 5-8\nGo 语言中使用接口的示例\n```\n\n**/*输出结果:***\n\n```\nLiving Room\
  \ \nBaby Room \n*/\n```\n\n## 空接口与 Go 语言中的 IOTA 使用\n\n当接口类型未指定任何方法时，它被称为空接口。在 Go\
  \ 语言中，空接口用于处理未知类型的值。空接口也可以容纳任意类型的值。Go 语言中另一个需要了解的概念是 `IOTA`。`IOTA` 是一个标识符，用于与使用自增数字的常量配合使用。简单来说，`IOTA`\
  \ 本质上是一个从零开始、每次递增 1 的计数器。它可以用来高效地创建 Go 语言中的常量和枚举。本节将通过示例讨论 Go 语言中空接口和 `IOTA` 的使用。\n\
  \n### JSON 编码/解码\n\nGo 语言内置支持 JSON 编码和解码，包括与内置和自定义数据类型之间的相互转换。`encoding/json` 包允许你按照\
  \ RFC 7159 标准对 JSON 数据进行编码。处理数据时，你通常希望将某个 Go 结构体编码为 `json` 字符串。让我们看看官方文档（[`https://pkg.go.dev/encoding/json#Manual`](https://pkg.go.dev/encoding/json%2523Manual)）中定义的\
  \ JSON Marshal 函数。\n\n如图 5-1 所示，`Marshal()` 函数接收一个 `any` 类型的对象（`any` 是空接口 `interface{}`\
  \ 的别名），并返回一个包含传入参数 JSON 编码结果的 `byte` 数组。JSON 的 `Marshal()` 函数可以处理多种类型，例如 `integers`、`strings`、`time.Time`\
  \ 等。这些类型没有共享的公共方法，因此唯一能同时满足它们所有类型的接口就是空接口。空接口不作出任何声明。它是一种绕过 Go 语言类型系统的方法。不过，空接口应作为最后手段使用。\n\
  \n![](img/536365_1_En_5_Fig1_HTML.jpg)\n\n截图显示了 Marshal 函数的格式。\n\n图 5-1\n\nJSON\
  \ 包中 Marshal 函数的格式\n\n让我们看一个示例来加深理解。在代码清单 5-9 中，假设你有多种事件类型，例如 `ClickEvent` 和 `HoverEvent`。还有一个计数器用于记录每个事件被触发的次数。`recordEvent()`\
  \ 函数用于记录计数。它接收一个空接口类型的参数，因为这两个事件以及系统中任何其他事件都没有共同点。在该函数中，你使用 `switch` 语句来检查当前事件的类型。如果是\
  \ `ClickEvent`，则点击事件计数器递增；如果是 `HoverEvent`，则其对应计数器递增；否则，应发出警告。你还可以通过 `value.(typeName)`\
  \ 进行类型断言，将空接口转换为底层类型。但如果类型错误，这会导致程序崩溃。另一种更安全的方法是使用 `comma,ok` 惯用法。`comma,ok` 惯用法的工作方式类似于\
  \ `if-else` 语句。如果在映射中找到传入的键，则返回对应的值；否则返回零值。\n\n```\npackage main\nimport (\n\"fmt\"\
  \n\"log\"\n)\ntype ClickEvent struct {\n// ...\n}\ntype HoverEvent struct {\n//\
  \ ...\n}\nvar eventCounts = make(map[string]int) //type->count\nfunc recordEvent(evt\
  \ interface{}) {\nswitch evt.(type) {\ncase *ClickEvent:\neventCounts[\"click\"\
  ]++\ncase *HoverEvent:\neventCounts[\"hover\"]++\ndefault:\nlog.Printf(\"warning:\
  \ unknown event: %#v of type %T\\n\", evt, evt)\n}\n}\nfunc main() {\nrecordEvent(&ClickEvent{})\n\
  recordEvent(&HoverEvent{})\nrecordEvent(&ClickEvent{})\nrecordEvent(3)\nfmt.Println(\"\
  event counts\", eventCounts)\n}\n代码清单 5-9\nGo 语言中使用 Marshal 函数的示例\n```\n\n**/*输出结果:***\n\
  \n```\n2022/02/15 00:08:22 warning: unknown event: 3 of type int\nevent counts map[click:2\
  \ hover:1]\n*/\n```\n\n\n\n### 泛型\n\n泛型是一种与具体使用类型无关的代码，已在 Go 1.18 版本中加入。泛型允许函数或类型接受其泛型形式中定义的多种类型。\n\
  \n假设你想编写自己的日志系统。如代码清单 5-10 所示，首先使用 `LogLevel` 类型定义系统中可能的日志级别——调试、警告和错误。在其他语言中，你可能会使用\
  \ `enum`；但在 Go 中，使用的是 `IOTA`。`IOTA` 是一个与常量一起使用的标识符，用于简化使用自动递增的常量定义。`IOTA` 关键字代表一个从零开始的整数常量。在下面的代码中，你定义了一个用户自定义类型\
  \ `LogLevel`，它是一个八位无符号整数，即 `uint8`。\n\n使用 `const` 子句，你可以定义所需的三个级别——`DebugLevel`、`WarningLevel`\
  \ 和 `ErrorLevel`。这里，由于使用了 `iota`，你想要从零开始，因此 `DebugLevel` 将是 1。同一个 `const` 子句中的其他值会获得递增的\
  \ `iota` 值。所以 `WarningLevel` 是 `iota + 2`，`ErrorLevel` 将是 `iota + 3`。你还需要一个良好的字符串表示形式。为此，`String()`\
  \ 函数将实现 `fmt.Stringer` 接口。`String()` 函数返回一个 `string`。这里，`switch` 语句检查日志级别。注意，示例中使用了\
  \ `%d` 而不是 `%s`，因为如果使用 `%s` 会导致无限递归。\n\n```go\npackage main\nimport \"fmt\"\n//LogLevel\
  \ 是一个日志级别\ntype LogLevel uint8\n//可能的日志级别\nconst (\nDebugLevel LogLevel = iota +\
  \ 1\nWarningLevel\nErrorLevel\n)\n//string 实现了 fmt.Stringer 接口\nfunc (l LogLevel)\
  \ String() string {\nswitch l {\ncase DebugLevel:\nreturn \"debug\"\ncase WarningLevel:\n\
  return \"warning\"\ncase ErrorLevel:\nreturn \"error\"\n}\nreturn fmt.Sprintf(\"\
  unknown log level: %d\", l)\n}\nfunc main() {\nfmt.Println(WarningLevel)\nlvl :=\
  \ LogLevel(19)\nfmt.Println(lvl)\n}\n代码清单 5-10\n在 Go 中使用泛型的 Go 方案\n```\n\n**输出：**\n\
  \n```\nwarning\nunknown log level: 19\n```\n\n### 动手挑战\n\n实现一个支持以下功能的绘画程序：\n\n-\
  \ 具有位置 (X, Y)、颜色和半径的圆形\n- 具有位置 (X, Y)、宽度、高度和颜色的矩形\n\n每种类型都应实现一个绘制方法 `Draw(d Device)`，该方法在设备上工作，并实现一个\
  \ `ImageCanvas`。它是一个包含可绘制项切片的结构体，并有一个绘制方法 `Draw(w io.Writer)`，该方法使用 `image/png`\
  \ 包将 PNG 写入 `w`。\n\n### 解决方案\n\n代码清单 5-11 是该动手挑战的一种解决方案。首先，定义颜色 `Red`、`Green` 和\
  \ `Blue`。然后声明一个 `Shape` 结构体，该结构体将被嵌入到 `Circle` 和 `Rectangle` 结构体中。`Device` 接口将像素设置为指定颜色。\n\
  \n```go\npackage main\nimport (\n\"fmt\"\n\"image\"\n\"image/color\"\n\"image/png\"\
  \n\"io\"\n\"log\"\n\"math\"\n\"os\"\n)\nvar (\nRed   = color.RGBA{0xFF, 0, 0, 0xFF}\n\
  Green = color.RGBA{0, 0xFF, 0, 0xFF}\nBlue  = color.RGBA{0, 0, 0xFF, 0xFF}\n)\n\
  type Shape struct {\n//包含所有可绘制项共有的特性\nX     int\nY     int\nColor color.Color\n\
  }\ntype Circle struct {\nShape\nRadius int\n}\nfunc NewCircle(x, y, r int, c color.Color)\
  \ *Circle {\ncr := Circle{\nShape:  Shape{x, y, c},\nRadius: r,\n}\nreturn &cr\n\
  }\nfunc (c *Circle) Draw(d Device) {\n//计算边界矩形\nminX, minY := c.X-c.Radius, c.Y-c.Radius\n\
  maxX, maxY := c.X+c.Radius, c.Y+c.Radius\n//在边界矩形内绘制像素\nfor x := minX; x <= maxX;\
  \ x++ {\nfor y := minY; y <= maxY; y++ {\ndx, dy := x-c.X, y-c.Y\n//检查该点是否在圆内\n\
  if int(math.Sqrt(float64(dx*dx+dy*dy))) <= c.Radius {\n//将像素设置为该颜色\nd.Set(x, y,\
  \ c.Color)\n}\n}\n}\n}\ntype Rectangle struct {\nShape\nHeight int\nWidth  int\n\
  }\nfunc NewRectangle(x, y, h, w int, c color.Color) *Rectangle {\nr := Rectangle{\n\
  Shape:  Shape{x, y, c},\nHeight: h,\nWidth:  w,\n}\nreturn &r\n}\nfunc (r *Rectangle)\
  \ Draw(d Device) {\nminX, minY := r.X-r.Width/2, r.Y-r.Height/2\nmaxX, maxY := r.X+r.Width/2,\
  \ r.Y+r.Height/2\nfor x := minX; x <= maxX; x++ {\nfor y := minY; y <= maxY; y++\
  \ {\nd.Set(x, y, r.Color)\n}\n}\n}\ntype Device interface {\nSet(int, int, color.Color)\n\
  }\ntype ImageCanvas struct {\nwidth  int\nheight int\nshapes []Drawer\n}\nfunc NewImageCanvas(width,\
  \ height int) (*ImageCanvas, error) {\nif width <= 0 || height <= 0 {\nreturn nil,\
  \ fmt.Errorf(\"negative size: width=%d, height=%d\", width, height)\n}\nc := ImageCanvas{\n\
  width:  width,\nheight: height,\n}\nreturn &c, nil\n}\ntype Drawer interface {\n\
  Draw(d Device)\n}\nfunc (ic *ImageCanvas) Add(d Drawer) {\nic.shapes = append(ic.shapes,\
  \ d)\n}\nfunc (ic *ImageCanvas) Draw(w io.Writer) error {\nimg := image.NewRGBA(image.Rect(0,\
  \ 0, ic.width, ic.height))\nfor _, s := range ic.shapes {\ns.Draw(img)\n}\nreturn\
  \ png.Encode(w, img)\n}\nfunc main() {\nic, err := NewImageCanvas(200, 200)\nif\
  \ err != nil {\nlog.Fatal(err)\n}\nic.Add(NewCircle(100, 100, 80, Green))\nic.Add(NewCircle(60,\
  \ 80, 10, Blue))\nic.Add(NewCircle(140, 60, 10, Blue))\nic.Add(NewRectangle(100,\
  \ 130, 80, 10, Red))\nf, err := os.Create(\"face.png\")\nif err != nil {\nlog.Fatal(err)\n\
  }\ndefer f.Close()\nif err := ic.Draw(f); err != nil {\nlog.Fatal(err)\n}\n}\n代码清单\
  \ 5-11\n展示动手挑战一种解决方案的 Go 方案\n```\n\n**输出：**\n\n![](img/536365_1_En_5_Figa_HTML.jpg)\n\
  \n图表展示了代码的输出。它显示了一个大圆内部的两个小圆和一个垂直矩形。\n\n## 总结\n\n本章包含了 Go 方案，为读者提供处理结构体以及使用方法与接口的实践体验。此外，还涵盖了空接口以及如何处理\
  \ Go 中 `IOTA` 类型等进阶主题。\n\n下一章将提供用于处理 Web 应用程序之间交换的 JSON 格式数据的 Go 方案。\n\n"
- '# 6. 使用 JSON 工作


  JSON 是用于在 Web 应用程序上传输数据的最流行数据格式之一。与许多现代语言一样，Go 也支持数据与 JSON 格式之间的相互转换。在本章中，我们将带你了解处理编码为
  JSON 的数据的方案，特别是如何编码和解码 JSON 格式的数据以在 Go 应用程序中使用。


  ## JSON 包


  JavaScript 对象表示法（JSON）是最流行的数据序列化和交换格式之一。Go 中支持 JSON 编码和解码的内置包称为 `encoding/json`。使用
  `encoding/json` 包，你可以通过两种方式使用 JSON。你可以使用 `Unmarshal()` 和 `Marshal()` 方法对数据进行编码和解码。这两种方法都作用于
  `byte` 切片。解码器需要一个 `io.Reader` 对象才能工作，而编码器则需要 `io.Writer`。在 Go 中，编码称为*编组（marshalling）*，解码称为*解组（unmarshalling）*。此外，使用
  `Unmarshal()`，你可以将 `[]byte` 转换为 JSON 格式，而 `Marshal()` 则将 JSON 格式的数据转换为 `[]byte`。`encoding/json`
  包定义了不同 Go 类型与 JSON 之间的转换，如表 6-1 所示。


  **表 6-1.** `encoding/json` 包定义的 Go 类型与 JSON 之间的转换


  | Go 类型 | JSON 类型 |

  | --- | --- |

  | `bool` | 布尔值 |

  | `int`, `float32`, `float64`, … | 数字 |

  | `string` | 字符串 |

  | `nil` | 空值 |

  | `[]interface{}` | 数组 |

  | `map[string]interface{}` | 对象 |

  | `time.Time` | 字符串 |

  | `[]byte` | 字符串（base64 编码） |




  ## 使用 Go 语言解析 JSON


  为了学习如何在 Go 语言中解析 JSON 数据，我们来看一个例子。假设你需要处理从气象测量站接收到的读数。这些读数以 JSON 消息的形式呈现，包含以下格式的时间、站点名称、温度和降雨量信息：


  ```

  {

  "time": "2022-02-15T00:00:00Z",

  "station": "DS9",

  "temperature": 21.6,

  "rain": 0

  }

  ```


  你可以使用代码清单 6-1 来实现这个目标。第一步是定义一个名为 `Record` 的结构体，它包含 `Time`、`Station`、`Temperature`
  和 `Rain` 这些成员字段。这个结构体将用于存储从气象站接收到的读数。请注意，结构体成员字段的名称都是大写字母开头的。这是因为我们希望导出它们，即让程序的其他部分可以访问它们。在
  Go 语言中，`json` 包包含了将 JSON 格式数据从大写转换为小写的逻辑，所以你不用担心这个问题。`readRecord()` 函数负责从接收到的读数中读取并解码
  JSON 数据。它接收一个 `io.Reader` 对象作为输入，并返回一个 `Record` 类型的结构体实例，如果发生错误则一并返回。在 `readRecord()`
  函数内部，会创建一个空的记录。此外，与 `io.reader` 对象一样，我们使用 `decoder` 来解码接收到的 JSON 数据。解码器会解码数据，并将结果存储在一个名为
  `rec` 的结构体实例中，通过指针传递并处理可能出现的错误。


  ```

  package main

  import (

  "encoding/json"

  "fmt"

  "io"

  "log"

  "os"

  "time"

  )

  // Record 是一条天气记录

  type Record struct {

  Time    time.Time

  Station string

  Temperature    float64 //`json: "temperature"` //摄氏度

  Rain    float64 //毫米

  }

  func readRecord(r io.Reader) (Record, error) {

  var rec Record

  dec := json.NewDecoder(r)

  if err := dec.Decode(&rec); err != nil {

  return Record{}, err

  }

  return rec, nil

  }

  func main() {

  file, err := os.Open("record.json")

  fmt.Printf("file: %v\n", file)

  if err != nil {

  log.Fatal(err)

  }

  defer file.Close()

  rec, err := readRecord(file)

  if err != nil {

  log.Fatal(err)

  }

  fmt.Printf("%+v\n", rec)

  }

  代码清单 6-1

  使用 JSON 包的 Go 语言方案

  ```


  **输出：**


  ```

  {Time:2022-02-02 00:00:00 +0000 UTC Station: DS9 Temp:21.6 Rain:0}

  ```


  ## 使用 Go 语言解析复杂 JSON


  在某些情况下，JSON 响应可能非常复杂。假设你有一个 API 用于获取一系列站点的状态。JSON 响应如下所示：


  ```

  {

  "lastCheckTime": "2022-02-15 09:20:15 PM",

  "stations":[

  {

  "id":3,

  "name": "station 3",

  "status": "Active",

  "statusKey": 1,

  "lastCheck": {

  "time": "2016-01-22 04:30:15 PM",

  "success": true

  }

  },

  {

  "id":1,

  "name": "station 2",

  "status": "Active",

  "lastCheck": {

  "time": "2020-01-22 04:32:41 PM",

  "success": true

  }

  },

  ]

  }

  ```


  从这个 JSON 响应中，假设你想要打印出所有最后一次检查时间超过某个特定时间阈值的站点名称。为了实现这个目标，请使用代码清单 6-2。在 `laggingStations()`
  函数中，我们不用为 JSON 中的每条消息都编写特定的类型，而是使用一个名为 `reply` 的匿名结构体。该结构体包含 `lastCheckTime` 以及站点详情。务必注意确保结构体中的字段名称与
  JSON 中的名称匹配。然后我们有一个 `stations`，它是一个结构体切片，包含 `name`、`status` 和 `lastCheckTime`，而后者的
  `lastCheck` 字段又是一个结构体，其中 `time` 是 `string` 类型的成员字段。这个例子将 `time` 作为 `string` 处理，因为
  JSON 消息中的时间格式与 Go 语言在 JSON 中编码时间的方式不符。


  ```

  package main

  import (

  "encoding/json"

  "fmt"

  "io"

  "log"

  "os"

  "time"

  )

  /*{

  "lastCheckTime": "2022-02-15 09:20:15 PM",

  "stations":[

  {

  "id":3,

  "name": "station 3",

  "status": "Active",

  "statusKey": 1,

  "lastCheck": {

  "time": "2016-01-22 04:30:15 PM",

  "success": true

  }

  },

  {

  "id":1,

  "name": "station 2",

  "status": "Active",

  "lastCheck": {

  "time": "2020-01-22 04:32:41 PM",

  "success": true

  }

  },

  ]

  }

  */

  // laggingStations 返回检查时间滞后的站点

  func laggingStations(r io.Reader, timeout time.Duration) ([]string, error) {

  var reply struct {

  LastCheckTime string

  Stations      []struct {

  Name      string

  Status    string

  LastCheck struct {

  Time string

  }

  }

  }

  dec := json.NewDecoder(r)

  if err := dec.Decode(&reply); err != nil {

  return nil, err

  }

  checkTime, err := parseTime(reply.LastCheckTime)

  if err != nil {

  return nil, err

  }

  var lagging []string

  for _, station := range reply.Stations {

  if station.Status != "Active" {

  continue

  }

  lastCheck, err := parseTime(station.LastCheck.Time)

  if err != nil {

  return nil, err

  }

  if checkTime.Sub(lastCheck) > timeout {

  lagging = append(lagging, station.Name)

  }

  }

  return lagging, nil

  }

  func parseTime(ts string) (time.Time, error) {

  return time.Parse("2006-01-02 15:04:05 PM", ts)

  }

  func main() {

  file, err := os.Open("stations.json")

  if err != nil {

  log.Fatal(err)

  }

  defer file.Close()

  lagging, err := laggingStations(file, time.Minute)

  if err != nil {

  log.Fatal(err)

  }

  for _, name := range lagging {

  fmt.Println(name)

  }

  }

