  \ 实例，这样您可以跳过某些数据字段的值。第 32 行和第 39 行使用 `new` 关键字实例化 `circle` 结构体的新实例。`circle3` 和 `circle4`\
  \ 的区别在于：`circle3` 是指向 `circle` 实例的指针，而 `circle4` 是 `circle` 的一个实例。类似地，您可以使用指针地址运算符（`&`）实例化\
  \ `struct` 类型的新实例，如第 46、49 和 54 行所示。\n\n```\npackage main\nimport (\n\"fmt\"\n)\n\
