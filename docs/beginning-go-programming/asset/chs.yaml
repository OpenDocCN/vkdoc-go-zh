  ### 使用 Go 进行正则表达式和读取文本文件


  Go 内置了对 `regexp` 包的支持。清单 4-3 中的代码片段演示了 `regexp` 包在 Go 中的一些常见用例。在此代码中，在第 12 行，`regexp.MatchString()`
  函数直接检查正则表达式和字符串是否匹配。`regexp.MatchString()` 函数在检查后返回 `true` 或 `false`。在第 17 行，使用
  `Compile()` 函数生成一个可用于匹配文本的 `regex` 对象，而不是直接指定正则表达式。如第 58 行所示，应改用 `Compile()` 的 `MustCompile()`
  版本。这是因为 `MustCompile()` 版本不会返回错误，而是会导致 panic，这对于全局变量来说是更安全的做法。


  第 21 到 48 行演示了各种内置函数，用于使用正则表达式和作为参数传递的字符串来查找匹配项、子匹配项、匹配项或子匹配项的起始和结束索引等。你还可以通过传递一个非负整数作为参数来限制返回的匹配项数量，如第
  53 行所示。如第 64 行所示，`ReplaceAllString()` 函数可用于将字符串的子集替换为所需的值。有关 `regex` 包的更多信息，请参考[官方文档](https://pkg.go.dev/regexp)（`https://pkg.go.dev/regexp`）。


  ```

  package main

  import (

  "bytes"

  "fmt"

  "regexp"

  )

  func main() {

  /* 直接检查正则表达式模式是否匹配字符串 */

  match, _ := regexp.MatchString("p([a-z]+)ch", "preach")

  fmt.Println(match)

  /* 编译一个优化的 Regexp 结构体，得到一个

  可用于匹配文本的 Regexp 对象 */

  r, _ := regexp.Compile("p([a-z]+)ch")

  /* MatchString 检查传递的字符串是否包含正则表达式的任何匹配项 */

  fmt.Println(r.MatchString("preach"))

  /* FindString 检查传递的字符串是否包含与正则表达式最左边文本匹配的文本 */

  fmt.Println(r.FindString("preach patch"))

  /* FindStringIndex 在传递的字符串中查找第一个与正则表达式匹配的项，

  并返回匹配的起始和结束索引（而非文本） */

  fmt.Println("匹配的起始和结束索引:",

  r.FindStringIndex("pinch pouch"))

  /* FindStringSubmatch 在传递的字符串中查找最左边与正则表达式匹配的项以及子匹配项 */

  fmt.Println(r.FindStringSubmatch("poach pitch"))

  /* FindStringSubmatchIndex 在传递的字符串中查找最左边与正则表达式匹配的项

  以及子匹配项，并返回起始和结束索引

  （而非文本）。此处，匹配的结束索引是排他的。 */

  fmt.Println(r.FindStringSubmatchIndex("punch"))

  /* All 变体查找传递字符串中的所有匹配项 */

