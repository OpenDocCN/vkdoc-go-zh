  ### Go 中的不区分大小写比较


  在 Go 中，字符串是 UTF-8 编码的。Go 的 `strings` 包提供了一个 `EqualFold` 方法，用于对两个字符串进行不区分大小写的比较。


  清单 4-2 中的示例演示了一个返回希腊字母英文名称的函数。在英语中，有大写和小写字母。通常，要对字符串进行不区分大小写的比较，必须将字符串中的字母转换为其中一种大小写形式以进行比较。然而，并非所有语言都如此。例如，在希腊语中，字母
  sigma 有三种形式（`Σ`、`σ` 和 `ς`）。在这里，`string.toUpper()` 函数将不起作用。相反，`string.EqualFold()`
  函数会很有用。


  清单 4-2 定义了结构体 `letters`，其成员字段 `Symbol` 用于存储希腊符号，`English` 字段用于存储对应的英文名称。`letters`
  切片将为你保存符号和名称。如果传递的字母未找到，程序将返回一条错误消息。请注意，由于 `Σ`、`σ` 和 `ς` 都是 sigma 的形式，代码将为每个字母打印
  `"Sigma"`。


