- "# 2. Go 基础\n\nGo 之所以成为一种易学的语言，是因为你需要了解的关于 Go 程序的一切都一目了然。无需记住任何语言规则，因为它们都在应用程序代码中。本章涵盖了\
  \ Go 编程语言的基础知识，例如接受输入、使用数学运算符和包、管理内存、使用不同的数据结构以及理解基于 Go 的应用程序的程序流程。本章还涵盖了使用函数并返回多个值，以及如何读写文件数据和如何处理\
  \ JSON 数据。\n\n## Go 的起源\n\nGo 基于多种不同的编程语言。它最初被设计为 C 语言的下一代。它能够完成用 C 语言可以做的一切，包括系统编程、应用程序开发等。\n\
  \n## Go 语法\n\nGo 从 C 及其相关语言（如 C++、C#、Java 等）中借鉴了大量语法。与此同时，它还借鉴了 Pascal、Modula、Oberon\
  \ 以及其他类似语言的语法。Go 最大的吸引力之一在于，由于其精确且全面的关键字与语法集，它的程序非常简洁。为了有效使用任何语言，你必须掌握该语言特定的基本语法规则。以下是\
  \ Go 编程语言设计者设定的一些最重要的语法规则列表。\n\n1.  **大小写敏感**\n    - 你必须严格按照官方文档（[`https://go.dev/doc/`](https://go.dev/doc/)）中所述的准确形式拼写标识符，如函数、变量和类型名称。\n\
  \    - 包和变量的名称使用小写字母和大小写混合形式。\n    - 类型的方法和字段首字母大写。\n    - 在 Go 中，首字母大写字符表示特殊用途。\n\
  \        - 在其他高级编程语言（如 C++、C#、Java 等）中相当于 `public` 关键字，在 Go 中，首字母大写字符表示该标识符是导出的。\n\
  \    - 类似地，在 Go 中，小写首字母字符表示特定方法或变量未被导出，除了声明它的代码块之外，应用程序的其他部分不能访问它，这相当于 `private`\
  \ 关键字。\n\n2.  **分号可以省略**\n    - 为了减少开发者的输入量，如清单 2-1 所示，Go 去掉了行尾的分号。这意味着换行即结束语句，不需要分号。\n\
  \n    ```\n    var color [2] string\n    colors[0] = \"black\"\n    colors[1] =\
  \ \"white\"\n    清单 2-1\n    不需要用分号作为行尾指示符\n    ```\n\n    即使语言规范要求使用分号，也不需要显式键入它们。得益于词法分析器（解析和分析代码的软件组件），分号会在编译过程中根据需要自动添加。\n\
  \n    **词法分析器添加分号的规则**\n\n    当一条语句被确定是完整的，并且词法分析器遇到换行符时，这意味着该语句结束了而开发者没有显式添加分号，那么词法分析器就会自动添加。\n\
  \n    **注意：** 你不能像在其他语言中那样随意自由地添加换行符或使用额外的换行符来中断语句，因为在某些情况下，这会被词法分析器误解释。\n\n3. \
  \ **带花括号的代码块**\n    - 代码块，即旨在组合在一起的多行代码，被括在花括号内。参见清单 2-2。\n\n    ```\n    sum :=\
  \ 0\n    for i :=0; i<10; i++{\n        sum += i\n    }\n    fmt.Println(sum) //\
  \ 打印 '45'\n    清单 2-2\n    使用花括号表示代码块\n    ```\n\n    在清单 2-2 中，声明了一个名为 `sum` 的变量，然后为其赋值\
  \ 0。`for` 循环从 0 初始化到 10，用于将 `sum` 的值增加 `i`。循环结束后，使用一个名为 `Println` 或“打印行”的函数打印 `sum`\
  \ 变量中存储的值。`Println` 是名为 `FMT` 的包的内置函数。你想要迭代的代码包裹在两个花括号之间。注意，确保左花括号与任何前一个语句在同一行是很重要的。\n\
  \n4.  **内置函数**\n    - Go 支持一组内置函数，这些函数总是可以在代码中使用，无需导入任何内容。这些函数是一个名为 `Builtin` 的特殊包的成员。Go\
  \ 编译器假定 `Builtin` 包始终被导入。示例函数包括：\n        - `len(string)` 返回字符串的长度。\n        - `panic(error)`\
  \ 停止执行并显示错误消息。\n        - `recover()` 管理 panic 状态下的 goroutine 的行为。\n\n    有关更多信息，你可以访问\
  \ [`https://pkg.go.dev/builtin`](https://pkg.go.dev/builtin) 上 [builtin 包](https://pkg.go.dev/builtin)的官方文档。\n\
  \n\n\n## 安装 Go\n\n要安装 Go 编译器，请访问 [`go.dev/dl/`](https://go.dev/dl/) 并下载适合您系统的二进制发行版。只需运行安装程序即可在系统上安装编译器。\n\
