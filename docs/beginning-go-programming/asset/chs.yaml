  ## 使用 Go 语言生成 JSON


  并非所有 Go 类型都能转换为 JSON，在某些情况下，你可能需要为你的类型使用不同的 JSON 编码。如果你希望自定义类型的序列化方式，就需要实现 `json.Marshaler`
  接口。如果你还想支持反序列化，则需要实现 `json.Unmarshaler` 接口。代码清单 6-3 展示了如何实现这一点。假设你有一个 `Quantity`
  结构体，它包含 `value` 和 `unit` 这两个成员字段。你希望将其编码为 `string`，例如 `42.192km`，而不是编码成包含两个字段的 JSON
  对象。为此，你可以在 `Quantity` 类型上定义 `MarshalJSON()` 函数。它返回一个 `byte` 切片和一个可能的错误。这个函数包含三个步骤。首先，你验证数值对应的单位不为空。其次，你将类型转换为
  JSON 可识别的类型。在这个例子中，我们使用 `%f` 将 `struct` 转换为 `string`。最后一步，我们使用内置的 `json.Marshal()`
  将 `string` 转换为 JSON。


  ```

  package main

  import (

  "encoding/json"

  "fmt"

  "os"

  )

  // Quantity 是数值和单位的组合 (例如 2.7cm)

  type Quantity struct {

  Value float64

  Unit  string

  }

  // MarshalJSON 实现了 json.Marshaler 接口

  // 示例编码: "42.192km"

  func (q *Quantity) MarshalJSON() ([]byte, error) {

  if q.Unit == "" {

  return nil, fmt.Errorf("empty unit")

  }

  text := fmt.Sprintf("%f%s", q.Value, q.Unit)

  return json.Marshal(text)

  }

  func main() {

  q := Quantity{1.78, " meter"}

  json.NewEncoder(os.Stdout).Encode(&q) //"1.780000meter"

  }

