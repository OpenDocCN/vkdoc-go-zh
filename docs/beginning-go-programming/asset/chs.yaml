  \ 和接口协同工作，用于组织方法和数据处理。接口可以定义为可由任何其他类型实现的方法签名集合。在 Go 语言中实现一个接口仅需实现该接口定义的方法。此外，接口只定义但不声明对象的行为。简而言之，`struct`\
  \ 定义了对象的字段，例如，形状的类型和颜色；而 `interface` 则定义了可用于该对象的方法，例如，设置和返回形状的颜色。本章提供与 `structs`、方法和接口使用相关的\
  \ Go 语言实践指南。\n\n## Go 语言中的结构体、方法与接口\n\n在本节中，我们提供实践指南来说明如何使用 `structs` 定义用户自定义数据类型、定义与\
  \ `structs` 关联的方法，以及使用包含一组方法与 `structs` 关联的接口。我们以一个家庭自动化系统为例，该系统使用传感器将事件详情发送到服务器，例如，门或恒温器发送事件。\n\
  \n### 结构体\n\n在 Go 语言中，每当需要定义用户自定义数据类型时，就会使用 `structs`。它们允许程序员将逻辑上相关的数据分组在一起。例如，一个名为\
  \ `Person` 的结构体可用于将姓名、姓氏、年龄等相关信息分组，以创建一条数据记录。换句话说，`structs` 可用于存储项目集合。`Structs`\
  \ 可用于分组用户自定义数据类型以及 Go 的内置数据类型。它们还能提高代码的模块化程度，并有助于创建和传递复杂的数据结构。\n\n#### 在 Go 语言中声明结构体\n\
  \n代码清单 5-1 演示了在 Go 语言中声明 `struct` 的方法。声明以 `type` 关键字开头，后跟用户自定义的结构体名称。这可以是您选择的任何名称，最后，`struct`\
  \ 关键字表示正在声明一个新的结构体。在大括号内，您可以指定任意数量的、您想要分组的数据字段。对于每个数据字段，指定名称和数据类型非常重要。\n\n```\n\
  type 标识符 struct{\n字段 1 数据类型\n字段 2 数据类型\n字段 3 数据类型\n}\n代码清单 5-1\n在 Go 语言中声明结构体的通用格式\n\
  ```\n\n在命名 `struct` 时，请始终记住：如果 `struct` 及其字段的标识符以小写字母开头，则 `struct` 及其字段都不会被导出到其他包。在\
  \ Go 语言中，要导出标识符（即允许其他包访问），必须确保名称以大写字母开头。\n\n#### 创建结构体类型的实例\n\n有多种方法可以实例化 `struct`\
  \ 类型的新实例。考虑代码清单 5-2，其中声明了一个包含三个数据字段（`length`、`breadth` 和 `color`）的 `circle` 结构体。第\
