  ```\n\n### 方法\n\n可以为用户定义的数据类型定义并附加方法。Go 的方法和函数彼此相似，不同之处在于方法有一个额外的接收者参数。方法使用这个接收者参数来访问与接收者对象相关的不同属性。然而，接收者可以是结构体类型或非结构体类型。需要注意的重要一点是，方法使用的接收者和接收者类型必须位于同一个包中。此外，如果接收者类型已在另一个包中定义，则不能为其创建方法。这包括诸如\
