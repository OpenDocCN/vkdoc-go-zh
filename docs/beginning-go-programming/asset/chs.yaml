  \ 时的 HTTP 响应结构\n\n让我们再看另一个示例，如清单 7-3 所示，这次是一个接收指标的 HTTP 服务器。在这里，指标是一个 JSON 对象，包含主机时间、CPU\
  \ 和内存。在这个 Go 示例中，你定义了一个名为 `Metric` 的结构体，以匹配 JSON 对象中的定义，即该结构体包含名为 `time`、`host`、`CPU`\
  \ 和 `memory` 的成员字段。`handleMetrics()` 函数负责处理 HTTP 请求。它接收输入变量 `w`（类型为 `http.ResponseWriter`，用于将响应发送回客户端）和\
  \ `r`（类型为 `http.Request`）。在该函数内部，你首先检查请求是否为 `POST` 请求。如果不是，则返回一个错误。为了限制要读取的数据量，你设置了一个最大大小\
  \ `maxSize`，以兆字节为单位；本例中为 1MB。你将指标添加到数据库，并打印输出指标已添加。为了将响应发送回用户，你首先设置响应的 `Header`。现在创建一个响应，本例中是一个从字符串到空接口的映射，包含从服务器获得的\
  \ `id`。你使用 `json.NewEncoder` 将响应编码到 `W` 中，如果出现错误则发送回客户端。你无法更改 `HTTP 状态码`，因此只记录错误。\n\
  \n```go\npackage main\nimport (\n\"encoding/json\"\n\"gorilla/mux\"\n\"io\"\n\"\
  log\"\n\"net/http\"\n\"time\"\n)\n// DB 是一个数据库\ntype DataBase struct{}\n// Add 向数据库添加一个指标\n\
  func (db *DataBase) Add(m Metric) string {\nreturn \"success\"\n}\ntype Metric struct\
  \ {\nTime   time.Time `json:\"time\"`\nHost   string    `json:\"host\"`\nCPU   \
  \ float64   `json:\"cpu\"`    //CPU 负载\nMemory float64   `json:\"memory\"` //MB\n\
  }\nfunc handleMetric(w http.ResponseWriter, r *http.Request) {\nif r.Method != \"\
  POST\" {\nhttp.Error(w, \"This Method is Not Allowed\", http.StatusMethodNotAllowed)\n\
  return\n}\nvar db *DataBase\ndefer r.Body.Close()\nvar m Metric\nconst maxSize =\
  \ 1 << 20 //MB\ndec := json.NewDecoder(io.LimitReader(r.Body, maxSize))\nif err\
  \ := dec.Decode(&m); err != nil {\nlog.Printf(\"Error Decoding: %s\", err)\nhttp.Error(w,\
  \ err.Error(), http.StatusBadRequest)\nreturn\n}\nid := db.Add(m)\nlog.Printf(\"\
  metric: %+v (id=%s)\", m, id)\nw.Header().Set(\"Content-Type\", \"application/json\"\
  )\nresp := map[string]interface{}{\n\"id\": id,\n}\nif err := json.NewEncoder(w).Encode(resp);\
  \ err != nil {\nlog.Printf(\"error reply: %s\", err)\n}\n}\nfunc main() {\nr :=\
  \ mux.NewRouter()\nr.HandleFunc(\"/metrics.json\", handleMetric).Methods(\"POST\"\
  )\nhttp.Handle(\"/\", r)\nif err := http.ListenAndServe(\":8080\", nil); err !=\
  \ nil {\nlog.Fatal(err)\n}\n}\n```\n\n**输出：**\n\n1. 在源代码所在文件夹中打开一个终端，并使用 `go run\
  \ filename.go` 命令运行该文件。\n\n2. 打开另一个终端并运行以下命令，将指标发送到服务器：\n\n   ![](img/536365_1_En_7_Figa_HTML.jpg)\n\
  \n   代码显示了一个 `curl` 命令。\n\n3. 成功后，你将在运行服务器的第一个终端上看到以下输出：\n\n   ![](img/536365_1_En_7_Figb_HTML.jpg)\n\
  \n   代码展示了一个 `go run` 的输出。\n\n\n\n## 使用 `gorilla/mux` 实现 REST\n\n`net/http` 包内置的\
  \ `HTTP` 服务器功能强大，但也非常简单。有时仅使用内置 HTTP 服务器就能满足需求；然而，为项目添加外部依赖的风险比你想象的更大。建议阅读 [`https://research.swtch.com/deps`](https://research.swtch.com/deps)\
  \ 上的研究论文，这是一篇关于软件依赖问题的推荐读物。它解释了为什么依赖存在风险，以及为何应尽可能避免使用依赖。尽管 `net/http` 包提供了多项功能来完成与\
  \ HTTP 协议相关的不同任务，但在某些情况下（尤其是编写复杂 API 时），拥有功能更丰富的 `routers` 会非常方便。`net/http` 包在处理复杂的请求路由（例如将请求\
  \ URL 拆分为单个参数）时表现欠佳。`gorilla/mux` 包在这种情况下就能派上用场，因为它能够创建带有命名参数、域名限制和 `GET/POST` 处理器的路由。\n\
  \n`gorilla/mux` 包包含请求路由器和分发器的实现，可用于将传入请求匹配到各自对应的处理器。这里的 `mux` 是 `HTTP 请求多路复用器` 的缩写。`gorilla/mux`\
  \ 包中的 `mux.Router` 能够将任何传入请求与已注册的路由列表进行匹配，然后根据匹配的 URL 或其他条件，调用相应路由对应的处理器函数。本节包含一个基于使用\
  \ `mux 路由器` 的示例。\n\n假设你经营一家书店，用户正在请求一本图书。作为响应，用户会收到包含书名、作者和 ISBN 的图书信息。用户发起请求时，会使用\
  \ `/books/author/ISBN` 的格式。首先，你需要定义一个名为 `Book` 的结构体，用于存储图书信息。处理器函数 `handleGetBook()`\
  \ 接收一个 `ResponseWriter` 和 `request` 作为参数。`gorilla/mux` 包中的 `mux.Vars(r)` 函数，以 `http.Request`\
  \ 对象作为输入参数，并返回一个包含路径段落的 `map`。通过对请求使用 `mux.Vars()` 提取变量，并从路径中获取 `ISBN`，然后 `getBook()`\
  \ 函数从数据库中获取图书信息。如果数据库中不存在该图书，则记录日志并向客户端返回错误信息。如果图书存在，你可以将 `content-type` 设置为 `application/json`，并使用\
  \ `json.Encoder` 将数据编码后返回给客户端。\n\n```\npackage main\nimport (\n\"encoding/json\"\
  \n\"fmt\"\n\"log\"\n\"net/http\"\n\"github.com/gorilla/mux\"\n)\n//Book 存储图书信息\n\
  type Book struct {\nTitle  string `json:\"title\"`\nAuthor string `json:\"author\"\
  `\nISBN   string `json:\"isbn\"`\n}\n// isbn -> book\nvar booksDB = map[string]Book{\n\
  \"0062225677\": {\nTitle:  \"The Colour of Magic\",\nAuthor: \"Terry Pratchett\"\
  ,\nISBN:   \"0062225677\",\n},\n\"0765394855\": {\nTitle:  \"Old Mans War\",\nAuthor:\
  \ \"John Scalzi\",\nISBN:   \"0765394855\",\n},\n}\nfunc getBook(isbn string) (Book,\
  \ error) {\nbook, ok := booksDB[isbn]\nif !ok {\nreturn Book{}, fmt.Errorf(\"未知的\
  \ ISBN: %q\", isbn)\n}\nreturn book, nil\n}\nfunc handleGetBook(w http.ResponseWriter,\
  \ r *http.Request) {\nvars := mux.Vars(r)\nisbn := vars[\"isbn\"]\nbook, err :=\
  \ getBook(isbn)\nif err != nil {\nlog.Printf(\"错误 - 获取: 未知的 ISBN - %q\", isbn)\n\
  http.Error(w, err.Error(), http.StatusNotFound)\nreturn\n}\nw.Header().Set(\"Content-Type\"\
  , \"application/json\")\nif err := json.NewEncoder(w).Encode(book); err != nil {\n\
  log.Printf(\"错误 - json: %s\", err)\n}\nfmt.Println(w.Write(book))\n}\nfunc main()\
  \ {\nr := mux.NewRouter()\nr.HandleFunc(\"/books/{isbn}\", handleGetBook).Methods(\"\
  GET\")\nhttp.Handle(\"/\", r)\nif err := http.ListenAndServe(\":8080\", nil); err\
  \ != nil {\nlog.Fatal(err)\n}\n}\n清单 7-4\n使用 gorilla/mux 包的 Go REST 示例\n```\n\n\
  **输出:**\n\n1.  打开终端，使用 `go run` 命令运行包含此清单的文件。例如，如果你的文件名为 `code-7.4.go`，则运行 `go run\
  \ code-7.4.go`。\n\n2.  打开另一个终端，运行以下命令从服务器获取图书详细信息：\n\n![](img/536365_1_En_7_Figc_HTML.jpg)\n\
  \n一个代码示例展示了 `curl localhost`。\n\n请注意，为了成功运行代码片段，如果遇到与导入包相关的错误，请打开终端并运行以下命令：\n\n\
  - `cd [你的源代码目录]`\n- `go mod init`\n- `go get github.com/gorilla/mux`\n\n之后，重启你的\
  \ IDE。如需更多信息，请运行 `go help mod`。\n\n### 动手挑战\n\n此挑战要求你在 HTTP 数据库及其客户端的内存中编写键值对。为此，支持的功能列表包括：\n\
  \n- `Get()` 从内存中获取键值\n- `Set()` 将从标准输入接收的数据设置为键值\n- `List()` 列出所有已存储的键\n\n你需要为客户端和服务端分别实现代码。\n\
  \n对于客户端，你应该使用 `flag` 包执行命令行参数解析。同时，使用 `switch` 语句根据接收到的输入执行相应的功能。对于服务端代码，请使用 `gorilla/mux`\
  \ 包；`db` 变量数据库将是一个内存中的 `map`。同时，使用 `sync.RWMutex` 类型的 `dbLock` 来保护数据库免受死锁影响。你还需要为\
  \ `Get`、`Set` 和 `List` 键请求编写处理器函数。为了执行服务端代码的路由，你必须在 `main()` 中创建一个路由器，并使用 `http.Handle()`\
  \ 处理路由。\n\n\n\n### 解决方案\n\n代码清单 7-5 和 7-6 展示了本动手挑战的一种可行解法。下面我们来探讨代码中的重点部分。\n\n```\n\
  package main\n\nimport (\n\t\"encoding/json\"\n\t\"flag\"\n\t\"fmt\"\n\t\"io\"\n\
  \t\"io/ioutil\"\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n\t\"sync\"\n\n\t\"github.com/gorilla/mux\"\
  \n)\n\nvar (\n\tdb     = make(map[string][]byte)\n\tdbLock sync.RWMutex\n)\n\nconst\
  \ maxSize = 1 << 20 //MB\n\n//客户端侧\nconst apiBase = \"http://localhost:8080/kv\"\
  \n\nfunc list() error {\n\tresp, err := http.Get(apiBase)\n\tif err != nil {\n\t\
  \treturn err\n\t}\n\tif resp.StatusCode != http.StatusOK {\n\t\treturn fmt.Errorf(\"\
  bad status: %d %s\", resp.StatusCode, resp.Status)\n\t}\n\tdefer resp.Body.Close()\n\
  \tvar keys []string\n\tif json.NewDecoder(resp.Body).Decode(&keys); err != nil {\n\
  \t\treturn err\n\t}\n\tfor _, key := range keys {\n\t\tfmt.Println(key)\n\t}\n\t\
  return nil\n}\n\nfunc set(key string) error {\n\turl := fmt.Sprintf(\"%s/%s\", apiBase,\
  \ key)\n\tresp, err := http.Post(url, \"application/octet-stream\", os.Stdin)\n\t\
  if err != nil {\n\t\treturn err\n\t}\n\tif resp.StatusCode != http.StatusOK {\n\t\
  \treturn fmt.Errorf(\"Bad Status: %d %s\", resp.StatusCode, resp.Status)\n\t}\n\t\
  var reply struct {\n\t\tKey  string\n\t\tSize int\n\t}\n\tdefer resp.Body.Close()\n\
  \tif err := json.NewDecoder(resp.Body).Decode(&reply); err != nil {\n\t\treturn\
  \ err\n\t}\n\tfmt.Printf(\"%s: %d bytes\\n\", reply.Key, reply.Size)\n\treturn nil\n\
  }\n\nfunc get(key string) error {\n\turl := fmt.Sprintf(\"%s/%s\", apiBase, key)\n\
  \tresp, err := http.Get(url)\n\tif err != nil {\n\t\treturn err\n\t}\n\tif resp.StatusCode\
  \ != http.StatusOK {\n\t\treturn fmt.Errorf(\"Bad Status: %d %s\", resp.StatusCode,\
  \ resp.Status)\n\t}\n\t_, err = io.Copy(os.Stdout, resp.Body)\n\treturn err\n}\n\
  \n//服务端侧\nfunc handleSet(w http.ResponseWriter, r *http.Request) {\n\tvars := mux.Vars(r)\n\
  \tkey := vars[\"key\"]\n\tdefer r.Body.Close()\n\trdr := io.LimitReader(r.Body,\
  \ maxSize)\n\tdata, err := ioutil.ReadAll(rdr)\n\tif err != nil {\n\t\tlog.Printf(\"\
  read error: %s\", err)\n\t\thttp.Error(w, err.Error(), http.StatusBadRequest)\n\t\
  \treturn\n\t}\n\tdbLock.Lock()\n\tdefer dbLock.Unlock()\n\tdb[key] = data\n\tresp\
  \ := map[string]interface{}{\n\t\t\"key\":  key,\n\t\t\"size\": len(data),\n\t}\n\
  \tw.Header().Set(\"Content-Type\", \"application/json\")\n\tif err := json.NewEncoder(w).Encode(resp);\
  \ err != nil {\n\t\tlog.Printf(\"error sending: %s\", err)\n\t}\n}\n\nfunc handleGet(w\
  \ http.ResponseWriter, r *http.Request) {\n\tvars := mux.Vars(r)\n\tkey := vars[\"\
  key\"]\n\tdbLock.RLock()\n\tdefer dbLock.RUnlock()\n\tdata, ok := db[key]\n\tif\
  \ !ok {\n\t\tlog.Printf(\"error get - unknown key: %q\", key)\n\t\thttp.Error(w,\
  \ fmt.Sprintf(\"%q not found\", key), http.StatusNotFound)\n\t\treturn\n\t}\n\t\
  if _, err := w.Write(data); err != nil {\n\t\tlog.Printf(\"error sending: %s\",\
  \ err)\n\t}\n}\n\nfunc handleList(w http.ResponseWriter, r *http.Request) {\n\t\
  dbLock.RLock()\n\tdefer dbLock.RUnlock()\n\tkeys := make([]string, 0, len(db))\n\
  \tfor key := range db {\n\t\tkeys = append(keys, key)\n\t}\n\tw.Header().Set(\"\
  Content-Type\", \"application/json\")\n\tif err := json.NewEncoder(w).Encode(keys);\
  \ err != nil {\n\t\tlog.Printf(\"error sending: %s\", err)\n\t}\n}\n\nfunc main()\
  \ {\n\tflag.Usage = func() {\n\t\tfmt.Fprintf(os.Stderr, \"usage: kv get|set|list\
  \ [key]\")\n\t\tflag.PrintDefaults()\n\t}\n\tflag.Parse()\n\tif flag.NArg() == 0\
  \ {\n\t\tlog.Fatalf(\"error: wrong  number of arguments\")\n\t}\n\tswitch flag.Arg(0)\
  \ {\n\tcase \"get\":\n\t\tkey := flag.Arg(1)\n\t\tif key == \"\" {\n\t\t\tlog.Fatal(\"\
  error: missing key\")\n\t\t}\n\t\tif err := get(key); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tcase \"set\":\n\t\tkey := flag.Arg(1)\n\t\tif key == \"\" {\n\t\t\tlog.Fatal(\"\
  error: missing key\")\n\t\t}\n\t\tif err := set(key); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tcase \"list\":\n\t\tkey := flag.Arg(1)\n\t\tif key == \"\" {\n\t\t\tlog.Fatal(\"\
  error: missing key\")\n\t\t}\n\t\tif err := list(); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tdefault:\n\t\tlog.Fatal(\"error: unknown command: %q\", flag.Arg(0))\n\t\
  }\n\tr := mux.NewRouter()\n\tr.HandleFunc(\"/kv/{key}\", handleSet).Methods(\"POST\"\
  )\n\tr.HandleFunc(\"/kv/{key}\", handleGet).Methods(\"GET\")\n\tr.HandleFunc(\"\
  /kv\", handleList).Methods(\"GET\")\n\thttp.Handle(\"/\", r)\n\taddr := \":8080\"\
  \n\tlog.Printf(\"Server Ready On %s\", addr)\n\tif err := http.ListenAndServe(addr,\
  \ nil); err != nil {\n\t\tlog.Fatal(err)\n\t}\n}\n清单 7-5\n动手挑战的服务端代码\n```\n\n如代码清单\
  \ 7-5 所示，在`handleSet()`函数中，首先从`vars`中获取键，并延迟关闭响应体。然后使用`LimitReader`来限制写入的数据量。通过`ioutil.ReadAll()`读取数据直到达到限制。如果出现错误，则记录日志。使用内置的`Lock()`函数锁定数据库，并延迟解锁直到函数退出。通过`db[key]\
  \ = data`设置键。响应随后存储在`resp`变量中，其中包含键以及发送数据的大小。设置`content-type`头为`application-json`。\n\
  \n`handleGet()`函数也类似。当使用`Lock()`函数锁定资源时，通过获取锁，同一时间只有一个 goroutine 可以进行读/写操作。而使用`RLock()`时，通过获取锁，同一时间可以有多个\
  \ goroutine 进行读操作（但不能写）。在此处理程序中，通过`comma,ok`惯用法检查数据库中是否存在指定的键。\n\n在`handleList()`函数中，首先获取数据库的锁。然后创建一个用于存放键名的切片，遍历数据库（即映射），追加键，并将它们以\
  \ JSON 格式写出。\n\n```\npackage main\n\nimport (\n\t\"encoding/json\"\n\t\"flag\"\n\
  \t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n)\n\nconst apiBase = \"\
  http://localhost:8080/kv\"\n\nfunc list() error {\n\tresp, err := http.Get(apiBase)\n\
  \tif err != nil {\n\t\treturn err\n\t}\n\tif resp.StatusCode != http.StatusOK {\n\
  \t\treturn fmt.Errorf(\"bad status: %d %s\", resp.StatusCode, resp.Status)\n\t}\n\
  \tdefer resp.Body.Close()\n\tvar keys []string\n\tif json.NewDecoder(resp.Body).Decode(&keys);\
  \ err != nil {\n\t\treturn err\n\t}\n\tfor _, key := range keys {\n\t\tfmt.Println(key)\n\
  \t}\n\treturn nil\n}\n\nfunc set(key string) error {\n\turl := fmt.Sprintf(\"%s/%s\"\
  , apiBase, key)\n\tresp, err := http.Post(url, \"application/octet-stream\", os.Stdin)\n\
  \tif err != nil {\n\t\treturn err\n\t}\n\tif resp.StatusCode != http.StatusOK {\n\
  \t\treturn fmt.Errorf(\"bad status: %d %s\", resp.StatusCode, resp.Status)\n\t}\n\
  \tvar reply struct {\n\t\tKey  string\n\t\tSize int\n\t}\n\tdefer resp.Body.Close()\n\
  \tif err := json.NewDecoder(resp.Body).Decode(&reply); err != nil {\n\t\treturn\
  \ err\n\t}\n\tfmt.Printf(\"%s: %d bytes\\n\", reply.Key, reply.Size)\n\treturn nil\n\
  }\n\nfunc get(key string) error {\n\turl := fmt.Sprintf(\"%s/%s\", apiBase, key)\n\
  \tresp, err := http.Get(url)\n\tif err != nil {\n\t\treturn err\n\t}\n\tif resp.StatusCode\
  \ != http.StatusOK {\n\t\treturn fmt.Errorf(\"bad status: %d %s\", resp.StatusCode,\
  \ resp.Status)\n\t}\n\t_, err = io.Copy(os.Stdout, resp.Body)\n\treturn err\n}\n\
  \nfunc main() {\n\tflag.Usage = func() {\n\t\tfmt.Fprintf(os.Stderr, \"usage: kv\
  \ get|set|list [key]\")\n\t\tflag.PrintDefaults()\n\t}\n\tflag.Parse()\n\tif flag.NArg()\
  \ == 0 {\n\t\tlog.Fatalf(\"error: wrong number of arguments\")\n\t}\n\tswitch flag.Arg(0)\
  \ {\n\tcase \"get\":\n\t\tkey := flag.Arg(1)\n\t\tif key == \"\" {\n\t\t\tlog.Fatalf(\"\
  error: missing key\")\n\t\t}\n\t\tif err := get(key); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tcase \"set\":\n\t\tkey := flag.Arg(1)\n\t\tif key == \"\" {\n\t\t\tlog.Fatalf(\"\
  error: missing key\")\n\t\t}\n\t\tif err := set(key); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tcase \"list\":\n\t\tif err := list(); err != nil {\n\t\t\tlog.Fatal(err)\n\
  \t\t}\n\tdefault:\n\t\tlog.Fatalf(\"error: unknown command: %q\", flag.Arg(0))\n\
  \t}\n}\n清单 7-6\n动手挑战的客户端代码\n```\n\n代码清单 7-6 定义了一个保存`apiBase`的常量。它还定义了`list()`、`set()`和`get()`函数。`list()`函数读取键并逐个打印。`set()`函数设置值。`get()`函数从数据库中检索特定键。\n\
  \n在`main()`中，创建一个新的路由器并配置路由。这里，`Get`和`Set`函数在路径中通过`vars`包含`key`，而`List`的路由仅是`/kv`。\n\
  \n**输出：**\n\n![](img/536365_1_En_7_Fig3_HTML.jpg)\n一段说明 `go run code-7.5` 的代码。\n\
  \n图 7-3\n运行动手解决方案的输出\n\n\n\n## 格式化结果\n\n1. 打开终端，使用 `go run filename.go` 命令运行服务端代码。例如，如果你的文件名是\
  \ `code-7.5-server.go`，则应执行 `go run code-7.5-server.go`。\n\n2. 打开另一个终端并运行以下命令。请记住，发送请求后至少等待一分钟。发送\
  \ `set` 请求并等待一分钟后，按 `Ctrl+C`。然后发送 `list` 请求以确认你的键值已设置，如图 7-3 所示。\n\n## 总结\n\n本章提供了\
  \ Go 语言的相关实例，帮助你实践在 Go 中处理 HTTP 调用。Go 提供了名为 `net/http` 的内置包用于处理 HTTP 调用。本章包含的实例涉及如何使用\
  \ `net/http` 包发送和接收 HTTP 请求与响应、进行身份验证、构建 HTTP 服务器，以及如何使用 `gorilla/mux` 包处理 REST\
  \ 请求。\n\nGo 语言有别于其他语言的一个杀手级特性是其对并发的内置支持。这种内置支持使 Go 成为编程多种类型应用时的最佳选择。下一章将解释如何使用 Go\
  \ 编程语言构建并发程序。\n\n"
- "# 8. 并发\n\n在模块化编程中，大型程序通常由若干较小的子程序组成。例如，一个 Web 服务器会同时处理来自多个浏览器的请求，并向它们提供 HTML 网页。每个请求都被视为一个小的程序。在大型程序中同时运行并推进多个较小组件的能力被称为*并发*。并发编程通常需要使用不同的结构，如线程和锁，来执行复杂的同步和死锁预防任务。\n\
  \nGo 为并发提供了丰富的支持。Go 程序可以包含多个同时运行的独立任务，这些任务各司其职，同时相互通信以实现共同目标。在 Go 编程语言中，独立运行的任务被称为*goroutine*。使用\
  \ goroutine 能使你的程序响应更迅速。与其他编程语言（如 Java）相比，goroutine 可以被视为轻量级线程。本章包含了覆盖 Go 语言最强大特性——并发的\
  \ Go 实例。它还解释了 goroutine 的基础知识、如何同步 goroutine 以及如何在 goroutine 之间安全地共享资源。\n\n## 理解\
  \ Goroutines\n\n在 Go 中，goroutine 和 channel 被用于实现并发。goroutine 是能够与 Go 程序中可能存在的任何其他\
  \ goroutine 同时且独立执行的最小实体。简而言之，在 Go 中每个并发运行的任务都被称为 *goroutine*。Channel 用于以高效且并发的方式从\
  \ goroutine 获取数据。Channel 还为 goroutine 提供了参考点，并帮助不同的 goroutine 进行通信。\n\n可以将 goroutine\
  \ 视为轻量级线程。然而，创建 goroutine 的成本远低于线程。此外，每个 Go 程序至少包含一个 goroutine，即 *主 goroutine*，它负责执行程序。程序启动的所有\
  \ goroutine 都在主 goroutine 下工作。因此，当主 goroutine 终止时，关联 Go 程序中存在的 goroutine 也会终止。此外，goroutine\
  \ 总是在后台运行。\n\n与使用线程进行多任务处理的其他高级编程语言相比，goroutine 有几个优点。复杂性和脆弱性是使用线程实现高并发的一些最大缺点。此外，线程还可能导致隐藏的死锁和竞态条件，其起因几乎无法找到。以下是\
  \ goroutine 相对于线程的一些主要优势：\n\n- **资源方面极其廉价：** Goroutine 在栈上仅需几 KB 的空间。此外，与栈大小固定的线程不同，goroutine\
  \ 的栈可以根据应用程序的需求增长或收缩。\n\n- **多路复用所需的 OS 线程更少：** Goroutine 进行多路复用所需的 OS 线程数量更少。一个程序可以只存在一个线程，而其中运行着多个\
  \ goroutine。如果线程中的某个 goroutine 进入阻塞状态（例如，等待用户输入），则会衍生出一个新的 OS 线程，并将剩余的 goroutine\
  \ 移动到该线程。所有这些细节都由 Go 运行时处理，并通过 API 对程序员进行抽象。\n\n- **用于通信的通道：** Channel 用于在不同的 goroutine\
  \ 之间进行通信。Channel 旨在防止 goroutine 访问共享内存时出现竞态条件。可以将 Channel 视为 goroutine 用于通信的管道。\n\
  \n### 将顺序代码转换为并发代码\n\n在开始编写并发代码之前，先从编写顺序代码开始。顺序代码更简单，更容易理解和维护。只有在需要额外性能时，才转向并发代码。\n\
  \n假设你有一个 Web 服务器，它每天返回一个包含出租车行程信息的 CSV 文件。CSV 文件包含如图 8-1 所示的数据。它包含行程开始时间、行程结束时间、行驶距离和乘客人数等信息。你想计算整个月的行驶距离，因此需要每天调用\
  \ API。\n\n![](img/536365_1_En_8_Fig1_HTML.jpg)\n\n*图 8-1* – 出租车行程 CSV 文件中的数据格式\n\
  \n**HTTP 服务器代码**\n\n清单 8-1 展示了运行此示例的 HTTP 服务器的 Go 实例。\n\n```go\npackage main\nimport\
  \ (\n\"encoding/csv\"\n\"fmt\"\n\"io\"\n\"log\"\n\"net/http\"\n\"strconv\"\n\"time\"\
  \n)\nfunc dayDistance(r io.Reader) (float64, error) {\nrdr := csv.NewReader(r)\n\
  total, lNum := 0.0, 0\nfor {\n//2021-01-02T23:58:36,2021-01-02T23:58:40,3.41,1\n\
  fields, err := rdr.Read()\nif err == io.EOF {\nbreak\n}\nif err != nil {\nreturn\
  \ 0, err\n}\nlNum++\nif lNum == 1 {\ncontinue // 跳过标题行\n}\ndist, err := strconv.ParseFloat(fields[2],\
  \ 64)\nif err != nil {\nreturn 0, err\n}\ntotal += dist\n}\nreturn total, nil\n\
  }\nfunc monthDistance(month time.Time) (float64, error) {\ntotalDistance := 0.0\n\
  date := month\nfor date.Month() == month.Month() {\nurl := fmt.Sprintf(\"http://localhost:8080/%s\"\
  , date.Format(\"2006-01-02\"))\nresp, err := http.Get(url)\nif err != nil {\nreturn\
  \ 0, err\n}\nif resp.StatusCode != http.StatusOK {\nreturn 0, fmt.Errorf(\"bad status:\
  \ %d %s\", resp.Request.Response.StatusCode, resp.Status)\n}\ndefer resp.Body.Close()\n\
  dist, err := dayDistance(resp.Body)\nif err != nil {\nreturn 0, err\n}\ntotalDistance\
  \ += dist\ndate = date.Add(24 * time.Hour)\n}\nreturn totalDistance, nil\n}\nfunc\
  \ main() {\nmonth := time.Date(2021, 2, 1, 0, 0, 0, 0, time.UTC)\nstart := time.Now()\n\
  dist, err := monthDistance(month)\nif err != nil {\nlog.Fatal(err)\n}\nduration\
  \ := time.Since(start)\nfmt.Printf(\"distance=%.2f, duration=%v\\n\", dist, duration)\n\
  }\n```\n\n**顺序代码**\n\n让我们从顺序代码开始，如清单 8-2 所示。\n\n\n```go\npackage main\n\nimport\
  \ (\n\t\"encoding/csv\"\n\t\"fmt\"\n\t\"io\"\n\t\"log\"\n\t\"net/http\"\n\t\"strconv\"\
  \n\t\"time\"\n)\n\nfunc dayDistance(r io.Reader) (float64, error) {\n\trdr := csv.NewReader(r)\n\
  \ttotal, lNum := 0.0, 0\n\tfor {\n\t\t//2021-01-02T23:58:36,2021-01-02T23:58:40,3.41,1\n\
  \t\tfields, err := rdr.Read()\n\t\tif err == io.EOF {\n\t\t\tbreak\n\t\t}\n\t\t\
  if err != nil {\n\t\t\treturn 0, err\n\t\t}\n\t\tlNum++\n\t\tif lNum == 1 {\n\t\t\
  \tcontinue // 跳过表头\n\t\t}\n\t\tdist, err := strconv.ParseFloat(fields[2], 64)\n\t\
  \tif err != nil {\n\t\t\treturn 0, err\n\t\t}\n\t\ttotal += dist\n\t}\n\treturn\
  \ total, nil\n}\n\ntype result struct {\n\tdate time.Time\n\tdist float64\n\terr\
  \  error\n}\n\nfunc dateWorker(date time.Time, ch chan<- result) {\n\tres := result{date:\
  \ date}\n\tdefer func() {\n\t\tch <- res\n\t}()\n\turl := fmt.Sprintf(\"http://localhost:8080/%s\"\
  , date.Format(\"2006-01-02\"))\n\tresp, err := http.Get(url)\n\tif err != nil {\n\
  \t\tres.err = err\n\t\treturn\n\t}\n\tif resp.StatusCode != http.StatusOK {\n\t\t\
  res.err = fmt.Errorf(\"错误状态码: %d %s\", resp.Request.Response.StatusCode, resp.Status)\n\
  \t\treturn\n\t}\n\tdefer resp.Body.Close()\n\tres.dist, res.err = dayDistance(resp.Body)\n\
  }\n\nfunc monthDistance(month time.Time) (float64, error) {\n\tnumWorkers, ch :=\
  \ 0, make(chan result)\n\tdate := month\n\tfor date.Month() == month.Month() {\n\
