  \ Go Playground 和 Visual Studio Code 来编写和运行 Go 程序。让我们开始学习如何编写 Go 应用程序。\n\n## 开始编写\
  \ Go 应用程序入门\n\n一旦安装了 Go 开发工具，就可以根据需要创建任意数量的 Go 应用程序。通常，一个 Go 程序由以下部分组成：\n\n- 声明包名\n\
  - 导入包\n- 声明和定义函数\n- 变量\n- 表达式和语句\n- 注释\n\n### 让我们打印 Hello World！\n\n在学习 Go 编程语言的基本构建块之前，了解\
  \ Go 程序的最小结构非常重要。清单 2-3 演示了如何将 `\"Hello World!\"` 消息作为输出打印到屏幕上。尽管该程序简洁且功能最少，但它足以理解\
  \ Go 的程序结构。\n\n```\npackage main\nimport (\n\"fmt\"\n)\n// 单行注释\n/*\n多\n行\n注释\n\
  */\nfunc main() {\nfmt.Println(\"Hello, World !\")\n}\n```\n\n清单 2-3 — 说明 Go 程序不同部分的基本程序\n\
  \n**Go 程序的不同部分**\n\n清单 2-3 解释了以下 Go 程序的不同部分：\n\n- **包：** 在 Go 程序的第一行，总是提及包。在清单 2-3\
  \ 中，语句 `package main` 指明了该程序所属的包名。此语句是强制性的，因为在 Go 中，所有程序都在包中组织和运行。对于任何程序，执行的起点都是\
  \ `main` 包。此外，每个包都关联了路径和名称。\n\n- **导入：** `import` 关键字用于导入应用程序将使用的不同包。它是一个预处理器指令，指示\
  \ Go 编译器包含所提及包中的所有文件。在前面的例子中，我们导入了 `fmt`（格式）包，它提供了用于格式化输入和输出的不同函数。\n\n- **注释：**\
  \ 在 Go 中，双斜杠 `//` 用于表示代码中的单行注释。多行注释包含在 `/* */` 块中。\n\n- **函数（Func）：** `func` 关键字用于声明函数；在这种情况下，是一个名为\
  \ `main` 的函数。将每个函数的主体包含在花括号 `{}` 内非常重要。这对于 Go 编译器知道每个函数的开始和结束位置是必要的。\n\n- **主函数：**\
  \ 执行从 `main` 包中的 `main` 函数开始，这使得 `main` 标识符非常重要。如果排除了 `main` 函数，编译器将抛出错误。\n\n- `fmt`\
  \ 包中可用的内建函数之一是 `Println(...)` 函数。通过导入 `fmt` 包，您也导出了 `Println` 方法。`Println` 函数用于在屏幕上显示输出。\n\
  \n- 在 Go 中，大写的标识符表示该特定标识符是导出的，例如，`Println` 方法的首字母是大写字母。在 Go 中，“导出”一词意味着该函数、常量或变量可以被该特定包的导入者访问。\n\
  \n\n\n#### 如何执行 Go 程序\n\n要执行程序，请点击 Go Playground 上的 `Run` 按钮。你的代码将在谷歌服务器上编译并执行，输出结果会显示在屏幕上。\n\
  \n要在 Windows 上通过命令提示符执行程序，可以使用 `go run filename.go` 命令。例如，如图 2-4 所示，运行代码清单 2-3 的命令是\
  \ `go run main.go`。要构建应用程序，请运行 `go build filename.go` 命令。例如，构建示例程序时，你需要执行命令 `go\
  \ build main.go`。要运行编译后的程序版本，你需要执行 `./filename` 命令，例如 `./main`。\n\n![](img/536365_1_En_2_Fig4_HTML.jpg)\n\
  \n截图展示了用于运行代码清单的命令 `go run main.go`，以及用于构建应用程序的命令 `go build main.go`。\n\n**图 2-4**\
  \ 运行和构建 Go 程序的命令\n\n有趣的是，编译后的应用程序运行速度比 `go run` 命令更快。构建源代码文件将产生一个编译后的二进制文件，该文件专门针对你当前的操作系统设计。尽管也可以为其他操作系统编译程序，但默认情况下，编译器会生成与你的操作系统兼容的二进制文件。\n\
  \n#### 关键字\n\n与每种编程语言一样，Go 也有一套关键字（为特殊用途保留的词）。这些关键字不能用作内容、变量、函数或其他任何目的的标识符名称。表 2-1\
  \ 列出了 Go 的关键字。\n\n**表 2-1** Go 的关键字\n\n| `chan` | `const` | `goto` | `interface`\
  \ | `struct` |\n| `defer` | `case` | `func` | `var` | `select` |\n| `break` | `for`\
  \ | `go` | `import` | `continue` |\n| `default` | `fallthrough` | `switch` | `type`\
  \ | `range` |\n| `if` | `else` | `return` | `package` | `map` |\n\n既然你已经了解了这些关键字，接下来就可以学习如何在\
  \ Go 中使用变量和其他数据结构了。\n\n### 变量\n\n与其他编程语言一样，Go 中使用变量在内存中存储数据。作为一种静态类型语言，Go 要求每个变量都必须分配一个类型。一旦分配了类型，就不能更改。为变量设置类型有两种方式——显式或隐式。显式是指在声明时指明类型名称。隐式是指编译器会根据变量的初始值来推断其类型。\n\
  \n在 Go 中，每个变量都应该有一个类型。该类型在确定变量内存的布局和大小、允许的取值范围以及适用于该变量的操作集合方面起着重要作用。\n\n#### 变量数据类型\n\
  \nGo 允许用户定义类型，并内置了多种数据类型。以下是 Go 中一些基本的 built-in 数据类型：\n\n*   **布尔型：** `bool` 以 `true`/`false`\
  \ 的形式表示布尔数据。布尔数据类型只能被赋予 `true` 和 `false` 这两个值。\n*   **字符串：** 在 Go 中，`string` 类型的变量包含一系列字符。\n\
  *   **数值数据类型：**\n    *   **整数型：** 用于存储整数。\n        *   **定长整数：** 包含的格式有 `uint8`、`uint16`、`uint32`、`int8`、`int16`\
  \ 和 `int32`。这些用于声明无符号或有符号整数。格式名称中的数字是位数，它影响变量可被赋予的数值范围。\n    *   **浮点型：** 用于存储浮点数。支持的格式包括\
  \ `float32` 和 `float64`。\n    *   **复数型：** 复数包含两部分：实数和虚数。支持的格式有 `complex64` 和 `complex128`。\n\
  \    *   **别名：** 这些可以用来代替完整的类型名称，例如 `byte`（等同于 `uint8`）、`uint`（32 或 64 位）、`rune`（等同于\
  \ `int32`）、`int`（等同于 `uint`）和 `uintptr`（一种用于存储指针值未解释位的无符号整数）。\n*   **数据集合：** Go\
  \ 也为不同的数据集合提供了内置类型。\n    *   **数组和切片：** 用于管理有序数据集合。\n    *   **映射和结构体：** 用于管理值的聚合。\n\
  \    *   **枚举：** 用于存储一组命名的常量值。\n*   **语言组织类型：**\n    *   **函数：** Go 将函数视为一种类型。这允许将一个函数作为参数传递给另一个函数。\n\
  \    *   **接口：** 用于指定一个或多个方法签名的集合。\n    *   **通道：** 用于连接 goroutine。\n*   **数据管理：**\n\
  \    *   **指针：** 存储内存位置（变量）的直接地址。\n\n除了内置类型之外，Go 还允许程序员创建用户定义的数据类型。\n\n#### 变量命名约定\n\
  \n变量名可以由字母、数字和下划线组成。但是，变量名应以字母或下划线开头。由于 Go 语言是区分大小写的，因此小写和大写字母会被区别对待。\n\n\n\n\n\
  #### 声明变量\n\n由于 Go 是静态类型语言，它要求您在编译过程中为程序中使用的每个变量设置类型（显式或隐式）。分配的类型在运行时无法更改。\n\n清单\
  \ 2-4 展示了在 Go 中声明和分配变量类型的不同方式。在变量的显式声明中，使用了 `var` 关键字，其后指定变量的名称和类型。例如，如第 8 行和第 12\
  \ 行所示，分配初始值是可选的。第 10 行在 `print` 函数中使用了占位符来打印变量中存储的值以及一条消息。请注意，`Printf` 不会自动添加换行符，因此我们添加了\
  \ `\\n` 来实现换行。\n\n```\npackage main\nimport(\n\"fmt\"\n)\nfunc main() {\n//显式声明\n\
  var aStringVariable string = \"我是一个字符串\"\nfmt.Println(aStringVariable)\nfmt.Printf(\"\
  打印变量及其文本: %s \\n\", aStringVariable)\nvar anotherStringVariable string\nfmt.Println(anotherStringVariable)\n\
  fmt.Printf(\"打印变量及其文本: %s \\n\", anotherStringVariable)\nvar defaultInt int\nfmt.Println(defaultInt)\n\
  //隐式声明\nmyString := \"字符串的隐式声明\"\nfmt.Println(myString)\n}\n清单 2-4\n在 Go 中声明变量的方式\n\
  ```\n\n在隐式声明的情况下，变量类型是根据分配给变量的初始值推断出来的。清单 2-4 中的第 20 行说明了隐式声明。请注意，`:=` 运算符仅适用于函数内部的变量声明。必须使用\
  \ `var` 关键字来声明函数外部的变量。\n\n`var` 语句也可以用来声明变量列表，如图 2-5 所示。\n\n![](img/536365_1_En_2_Fig5_HTML.jpg)\n\
  \n一个 `var` 语句的列表，该语句声明了 Go 中的一组变量 - chan、const、goto、interface、struct、defer、case、func、var、select、break、for、go、continue\
  \ 和 default 等。\n\n图 2-5\n\n在 Go 中声明变量的不同方式\n\n要声明常量，程序员必须使用 `const` 关键字。图 2-6 展示了如何在\
  \ Go 程序中声明常量。\n\n![](img/536365_1_En_2_Fig6_HTML.jpg)\n\n一张截图展示了 Go 程序中声明的常量。`aconstantvariable\
  \ int` 等于 `64`，并且 `anotherconstantvariable int` 等于 `64`。\n\n图 2-6\n\n在 Go 中声明常量\n\
  \n常量总是在函数外部声明。如果常量变量的名称以小写字母开头，这意味着它仅可供程序的函数使用（类似于 `private` 关键字）。当变量名称以大写字母开头时，该变量是公共的。\n\
  \n### 获取用户输入\n\n在上一节中，您了解了 `fmt` 包的用法，通过它可以在屏幕上输出不同的消息。本节演示如何从控制台读取用户输入，将其存储在变量中，或将其回显到屏幕上。请注意，标准输入（`stdin`）是用于读取输入数据的一个流。\n\
  \n关于 Go Playground 需要记住的重要一点是，它不支持交互式程序，因此无法从 `os.Stdin` 读取。因此，每当需要用户输入时，最好使用其他\
  \ IDE，例如 Visual Studio 或 Code，来测试本书中的代码。\n\n在 Go 中，`OS` 和 `IO` 包包含了用于从控制台读取标准输入的不同函数。这些函数集用于扫描格式化文本并提取值。\n\
  \n*   `Scan`、`Scanf` 和 `Scanln` 可用于从 `os.Stdin` 读取输入。\n*   `Fscan`、`Fscanf` 和 `Fscanln`\
  \ 可用于从指定的 `io.Reader` 读取输入。\n*   `Sscan`、`Sscanf` 和 `Sscanln` 可用于从参数字符串读取输入。\n\n\
  #### 使用 scanf\n\n为了使用 `Scanf` 函数，您必须导入 `fmt` 包。它用于指定输入的读取方式。`Scanf` 函数从 `stdin`\
  \ 扫描文本输入，并将空格分隔的值按字符串格式中定义的顺序存储到连续的参数中。`Scanf` 函数还会返回成功扫描的项数。如果返回的项数少于指定的参数，该函数将抛出错误。这是因为输入中的换行符必须与格式中指定的换行符匹配。清单\
  \ 2-5 说明了使用 `Scanf` 函数获取用户输入的方法。\n\n```\npackage main\nimport (\n\"fmt\"\n)\nfunc\
  \ main() {\nvar name string\nvar age int\nfmt.Print(\"请输入您的姓名: \")\nfmt.Scanf(\"\
  %s\", &name)\nfmt.Println(\"你好 \", name)\nfmt.Print(\"请输入您的年龄: \")\nfmt.Scan(&age)\n\
  fmt.Println(\"您的年龄是 \", age)\n}\n清单 2-5\n使用内置的 Scanf 函数获取用户输入\n```\n\n**输出：**\n\n\
  ```\n请输入您的姓名: Maryam\n你好 Maryam\n请输入您的年龄: 30\n您的年龄是 30\n```\n\n#### 使用 Scanln\n\n\
  `Scanln` 从 `stdin` 扫描文本；但是，当遇到换行符时，它会停止扫描。因此，有必要在最后一个项之后放置一个换行符或 EOF 来指示输入的结束。清单\
  \ 2-6 说明了 `Scanln` 的使用方法。\n\n```\npackage main\nimport (\n\"fmt\"\n)\nfunc main()\
  \ {\nvar name string\nvar age int\nfmt.Print(\"请输入您的姓名: \")\nfmt.Scanln(&name)\n\
  fmt.Println(\"你好 \", name)\nfmt.Print(\"请输入您的年龄: \")\nfmt.Scanln(&age)\nfmt.Println(\"\
  您的年龄是 \", age)\nvar anInt int = 5\nvar aFloat float64 = 42\nsum := float64(anInt)\
  \ + aFloat\nfmt.Printf(\"总和: %v, 类型: %T \\n\", sum, sum)\n}\n清单 2-6\n在 Go 中使用 Scanln\
  \ 内置函数获取用户输入\n```\n\n**输出：**\n\n```\n请输入您的姓名: Maryam\n你好 Maryam\n请输入您的年龄: 30\n您的年龄是\
  \ 30\n```\n\n**Scan 与 Reader 函数对比**\n\n要拆分空格分隔的标记，您使用 `Scan` 函数；要读取完整的行，您使用 `reader`\
  \ 函数。\n\n#### 使用 bufio\n\n缓冲 I/O 通过 `bufio` 包实现。`bufio` 包装了 `io.Writer` 或 `io.Reader`\
  \ 对象，并返回一个新的 `Writer` 或 `Reader` 对象，该对象实现了实用方法所需的接口。这种包装还提供了文本 I/O 辅助和缓冲功能。\n\n\
  在清单 2-7 中，第 11 行声明了两个变量，一个用于存储输入。第二个是错误对象，用于存储任何错误消息。\n\n```\n1   package main\n\
  2   import(\n3       \"bufio\"\n4       \"fmt\"\n5       \"os\"\n6   )\n\n8   func\
  \ main(){\n9         reader := bufio.NewReader(os.Stdin)\n10         fmt.Print(\"\
  输入一些文本: \")\n11         input, _ := reader.ReadString('\\n')\n12         fmt.Println(\"\
  您输入了: \", input)\n13   }\n清单 2-7\n在 Go 中使用 bufio 内置函数获取用户输入\n```\n\n**输出：**\n\n\
  ```\n输入文本: 嗨！我是作者\n您输入了: 嗨！我是作者\n```\n\n如图所示，如果您想在 Go 中忽略一个变量，可以将其命名为下划线。\n\n现在您已经知道如何在\
  \ Go 程序中使用变量和获取用户输入，是时候学习如何使用 Go 中的不同数学运算符了。\n\n\n\n## 数学运算符与包\n\nGo 语言支持与其他 C 风格语言相同的数学运算符，包括常规算术运算符、所有位运算符、赋值运算符和关系运算符。表\
  \ 2-2 至 2-6 列出了 Go 语言中的所有运算符。\n\n**表 2-6** — Go 赋值运算符列表\n\n| **赋值运算符** | 描述 |\n\
  |---|---|\n| `=` | 简单赋值运算符。将右操作数的值赋给左操作数。例如，`Z = X + Y` 会将 `X + Y` 的计算结果赋给 `Z`。\
  \ |\n| `+=` | 加并赋值运算符。将右操作数的值与左操作数的值相加，并将结果赋给左操作数。例如，`X += Y` 等价于 `X = X + Y`。 |\n\
  | `-=` | 减并赋值运算符。从左操作数的值中减去右操作数的值，并将结果赋给左操作数。例如，`X -= Y` 等价于 `X = X - Y`。 |\n| `*=`\
  \ | 乘并赋值运算符。将左操作数的值乘以右操作数的值，并将结果赋给左操作数。例如，`X *= Y` 等价于 `X = X * Y`。 |\n| `/=` |\
  \ 除并赋值运算符。将左操作数的值除以右操作数的值，并将结果赋给左操作数。例如，`X /= Y` 等价于 `X = X / Y`。 |\n| `%=` | 取模并赋值运算符。将左操作数的值除以右操作数的值，并将余数赋给左操作数。例如，`X\
  \ %= Y` 等价于 `X = X % Y`。 |\n| `<<=` | 左移并赋值运算符。将左操作数的值向左移动右操作数指定的位数。例如，`X <<= 1`\
  \ 等价于 `X = X << 1`。 |\n| `>>=` | 右移并赋值运算符。将左操作数的值向右移动右操作数指定的位数。例如，`X >>= 1` 等价于\
  \ `X = X >> 1`。 |\n| `&=` | 按位 `AND` 赋值运算符。例如，`Y &= 3` 等价于 `Y = Y & 3`。 |\n| `^=`\
  \ | 按位异或 `OR` 并赋值运算符。例如，`Y ^= 3` 等价于 `Y = Y ^ 3`。 |\n| `&#124;=` | 按位或 `OR` 并赋值运算符。例如，`Y\
  \ &#124;= 3` 等价于 `Y = Y &#124; 2`。 |\n\n**表 2-5** — Go 逻辑运算符列表\n\n| **逻辑运算符** |\
  \ 描述 |\n|---|---|\n| `&&` | 逻辑 `AND` 运算符。如果两个操作数都为 `false`，则返回 `false`；如果两个操作数都为\
  \ `true`，则返回 `true`。 |\n| `&#124;&#124;` | 逻辑 OR 运算符。如果任一操作数为 `true`，则返回 `true`。\
  \ |\n| `!` | 逻辑 `NOT` 运算符。反转其操作数的逻辑状态，即将 `true` 变为 `false`，反之亦然。 |\n\n**表 2-4**\
  \ — Go 关系运算符列表\n\n| **关系运算符** | 描述 |\n|---|---|\n| `==` | 检查两个操作数的值是否相等，如果相等则返回\
  \ `true`。 |\n| `!=` | 检查两个操作数的值是否不相等，如果不相等则返回 `true`。 |\n| `>` | 检查左操作数是否大于右操作数，如果是则返回\
  \ `true`。 |\n| `<` | 检查左操作数是否小于右操作数，如果是则返回 `true`。 |\n| `<=` | 检查左操作数是否小于或等于右操作数，如果是则返回\
  \ `true`。 |\n| `>=` | 检查左操作数是否大于或等于右操作数，如果是则返回 `true`。 |\n\n**表 2-3** — Go 位运算符列表\n\
  \n| **位运算符** | 描述 |\n|---|---|\n| `&` | 二进制 `AND` 运算符。如果相应位在两个操作数中都存在，则二进制 AND 运算符会将该位复制到结果中。\
  \ |\n| `&#124;` | 二进制 `OR` 运算符。如果相应位在任一操作数中存在，则二进制 OR 运算符会将该位复制到结果中。 |\n| `^` |\
  \ 按位 `XOR` 运算符。如果相应位在任一操作数中被设置，则按位异或 `xor` 运算符会复制该位。 |\n| `&^` | 位清除。 |\n| `<<`\
  \ | 左移运算符。将左操作数的值向左移动右操作数指定的位数。 |\n| `>>` | 右移运算符。将左操作数的值向右移动右操作数指定的位数。 |\n\n**表\
  \ 2-2** — Go 算术运算符列表\n\n| **算术运算符** | 描述 |\n|---|---|\n| `+` | 求和运算符，用于加法运算。 |\n\
  | `-` | 求差运算符，用于减法运算。 |\n| `*` | 乘法运算符，用于求积。 |\n| `/` | 求商运算符，用于求除法后的商。 |\n| `%`\
  \ | 求余运算符，用于求除法后的余数。 |\n| `--` | 递减运算符，将操作数的值减一，并将结果存回操作数。 |\n| `++` | 递增运算符，将操作数的值加一，并将结果存回操作数。\
  \ |\n\n请注意，Go 语言不支持数值类型的隐式转换。这意味着，例如，你不能在不进行转换的情况下，将一个整数值与一个浮点数值相加。\n\n代码清单 2-8\
  \ 包含两个变量，一个是整数，另一个是浮点数。当你尝试将它们相加时，会导致 `\"invalid operation\"` 错误，并使应用程序崩溃。\n\n```\n\
  var anInt int = 5\nvar aFloat float32 = 42\nsum := anInt + aFloat  //invalid operation\n\
  fmt.Printf(\"Sum: %v, Type: %T \\n\", sum, sum)\n```\n\n代码清单 2-8 — 演示 Go 不支持数值类型隐式转换\n\
  \n**输出：**\n\n一张显示“无效操作：类型不匹配的 `int` 和 `float64`”的编译器输出截图（类型不匹配）。\n\n为了正确执行此操作，你必须将其中一个变量转换为与另一个变量匹配的类型。为了实现此目标，你需要将目标类型作为函数调用包裹住该值，如代码清单\
  \ 2-9 所示。\n\n```\nvar anInt int = 5\nvar aFloat float32 = 42\nsum := float32(anInt)\
  \ + aFloat\nfmt.Printf(\"Sum: %v, Type: %T \\n\", sum, sum)\n```\n\n代码清单 2-9 — Go\
  \ 中数值类型的显式转换\n\n**输出：**\n\n```\nSum: 47, Type: float32\n```\n\n### Math 包\n\n要执行不同的数学运算，你可以使用\
  \ `math` 包。它包含不同的函数和常量，例如 `pi`。Go 语言为数学运算提供了许多工具，包括 `math` 包中的函数和常量等运算符和成员。代码清单\
  \ 2-10 演示了如何使用 `math` 包中的函数和常量。有关 `math` 包的更多信息，请参考 `https://pkg.go.dev/math` 上的[官方文档](https://pkg.go.dev/math)。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"math\"\n)\nfunc main() {\ni1, i2, i3 :=\
  \ 12, 45, 68\nintSum := i1 + i2 + i3\nfmt.Println(\"Integer Sum: \", intSum)\nf1,\
  \ f2, f3 := 23.5, 65.1, 76.3\nfloatSum := f1 + f2 + f3\nfmt.Println(\"Float Sum:\
  \ \", floatSum)\nfloatSum = math.Round(floatSum)\nfmt.Println(\"Rounded Sum is:\
  \ \", floatSum)\nfloatSum = math.Round(floatSum*100) / 100\nfmt.Println(\"Sum Rounded\
  \ To Nearest 2 Decimals: \", floatSum)\ncircleRadius := 15.6\ncircumference := circleRadius\
  \ * 2 * math.Pi\nfmt.Printf(\"Circumference: %.2f\\n\", circumference)\n}\n```\n\
  \n代码清单 2-10 — 演示在 Go 中使用 Math 包的基本程序\n\n\n\n#### 日期与时间\n\n在 Go 语言中，`time`包用于管理`日期`和`时间`类型。使用`time`类型声明的变量封装了处理时间和日期类型数据所需的一切，包括时区管理、数学运算等。代码清单\
  \ 2-11 展示了`time`包的用法。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc\
  \ main() {\nnow := time.Now()\nfmt.Println(\"当前时间是：\", now)\nformatDate := time.Date(2009,\
  \ time.November, 10, 23, 0, 0, 0, time.UTC)\nfmt.Println(\"Go 语言发布于：\", formatDate)\n\
  fmt.Println(formatDate.Format(time.ANSIC))\nparsedTime, _ := time.Parse(time.ANSIC,\
  \ \"Tue Nov 10 23:00:00 2009\")\nfmt.Printf(\"parsedTime 的类型是 %T\\n\", parsedTime)\n\
  }\n代码清单 2-11\n展示 Go 语言中使用 time 包的基本程序\n```\n\n**输出：**\n\n```\n当前时间是： 2022-08-29\
  \ 21:06:14.02792 +0500 PKT m=+0.003998301\nGo 语言发布于： 2009-11-10 23:00:00 +0000 UTC\n\
  Tue Nov 10 23:00:00 2009\nparsedTime 的类型是 time.Time\n```\n\n代码清单 2-11 展示了如何使用`time\
  \ 包`来处理`日期`和`时间`类型。在示例中，第#10 行声明了一个名为`now`的变量。它将使用内置的`time.Now()`函数进行初始化，该函数返回一个包含当前日期、时间和时区的时间戳。在\
  \ Go 中，用户也可以创建自己的显式日期和时间值。第#14 行声明了一个名为`formatDate`的变量，它使用`time.Date()`函数进行初始化。`Date()`函数根据给定的位置，按照`yyyy-mm-dd\
  \ hh:mm:ss + nsec nanoseconds`格式返回相应时区的时间。你还可以使用`daytime`值的格式化版本，如第#18 行所示。`Format()`函数返回时间值的文本表示，格式由参数定义的布局决定。此示例使用了\
  \ ANSIC 格式，但你可以参考[`https://pkg.go.dev/time#Time.Format`](https://pkg.go.dev/time%2523Time.Format)的官方文档，了解其他标准格式。\n\
  \n在代码清单 2-12 中，`Parse()`函数在解析字符串后返回其时间值表示。\n\n```go\nparsedTime, _ := time.Parse(time.ANSIC,\
  \ \"Tue Nov 10 23:00:00 2009\")\nfmt.Printf(\"parsedTime 的类型是 %T \\n\", parsedTime)\n\
  代码清单 2-12\n使用 time 包中的 Parse 函数\n```\n\n**输出：**\n\n```\nparsedTime 的类型是 time.Time\n\
  ```\n\n由于`Parse()`函数可能返回一个错误对象，在此示例中，我们添加了下划线来忽略该对象。时间对象还有许多其他有用的函数。例如，你可以添加日期、执行特殊格式化等。还有一些模式可以让你在格式化`daytime`值时拥有完全的灵活性。`time`包中的函数和常量为你提供了存储和管理日期与时间值所需的所有工具。有关此主题的更多信息，请参考[time\
  \ 包](https://pkg.go.dev/time)在[`https://pkg.go.dev/time`](https://pkg.go.dev/time)的官方文档。\n\
  \n#### Go 中的运算符优先级\n\n运算符优先级是指确定表达式中各项分组的标准。它也会影响表达式求值的结果。与其他编程语言一样，Go 中有一个预定义的运算符优先级顺序，某些运算符的优先级高于其他运算符。例如，除法运算符`/`的优先级高于减法运算符`-`。\n\
  \n考虑语句`a = 56 + 4 * 8`。这里，变量`a`被赋值为 88，而不是 480。这是因为乘法运算符`*`的优先级高于加法运算符`+`。因此，首先计算\
  \ 4`*`8，然后将得到的结果加到 56 上。\n\n表 2-7 按从高到低的顺序列出了运算符优先级。在给定的表达式中，从左到右扫描后，会首先计算优先级较高的运算符。\n\
  \n**表 2-7**  \nGo 语言运算符优先级列表\n\n| 类别 | 运算符 | 结合性 |\n| --- | --- | --- |\n| 后缀 |`(\
  \ ) [ ] -> . ++ - -`| 左到右 |\n| 一元 |`+ - ! ~ ++ - - (type)* & sizeof`| 右到左 |\n| 乘法\
  \ |`* / %`| 左到右 |\n| 加法 |`+ -`| 左到右 |\n| 移位 |`<< >>`| 左到右 |\n| 关系 |`< <= > >=`|\
  \ 左到右 |\n| 相等 |`== !=`| 左到右 |\n| 按位与 |`&`| 左到右 |\n| 按位异或 |`^`| 左到右 |\n| 按位或 |`&#124;`|\
  \ 左到右 |\n| 逻辑与 |`&&`| 左到右 |\n| 逻辑或 |`&#124;&#124;`| 左到右 |\n| 赋值 |`= += -= *= /=\
  \ %=>>= <<= &= ^= &#124;=`| 右到左 |\n| 逗号 |`,`| 左到右 |\n\n## 内存管理与引用值\n\nGo 运行时需要通过在你系统上使用`go\
  \ run`命令来运行 Go 应用程序。运行时也包含在已编译和构建的 Go 二进制应用程序中。无论哪种方式，与 Java 和 C# 等任何托管语言一样，Go 应用程序都依赖于运行时，该运行时在后台静默运行，利用专用线程进行内存管理。运行时的优点是不需要在代码中显式地复制或分配内存。\n\
  \n### New 与 Make 的区别\n\n确保诸如映射之类的复杂类型被正确初始化至关重要。在 Go 编程语言中，有两个内置函数用于初始化复杂对象——`make`和`new`。使用它们时需要小心，因为两者之间存在区别。\n\
  \n`new`函数仅为复杂对象分配内存，但不会初始化该内存。当使用`new`函数分配一个对象（例如一个映射）时，它只返回该映射所在的内存地址。但是，与该映射对象关联的内存存储为零。因此，当向映射添加键值对时，它会抛出错误。\n\
  \n与此相反，`make`函数不仅分配内存，还会为使用`make`函数创建的映射对象初始化内存。它返回内存地址（与`new`函数一样），并且存储被初始化为非零值。这意味着映射对象可以接受值而不会抛出错误。\n\
  \n### 错误的内存分配示例\n\n代码清单 2-13 展示了映射对象的错误内存分配。一个名为`string_map`的映射对象在第#1 行使用`new`函数声明。该映射对象接受键为`strings`类型，关联值为`integers`类型。在第#2\
  \ 行，将一个键值对作为条目添加到声明的映射对象中，其中键为`Marks`，关联值为`56`。\n\n```go\nstring_Map := new(map[string]int)\n\
  string_Map[\"Marks\"] = 56\nfmt.Println(string_Map)\n代码清单 2-13\n映射对象错误内存分配的示例\n\
  ```\n\n在运行时，代码清单 2-13 将导致应用程序崩溃并抛出错误，如图 2-7 所示。引发此错误是因为你试图将数据放入一个尚未初始化任何内存存储的映射中。\n\
  \n![显示由于试图将数据放入一个尚未初始化内存存储的映射而引发的输出错误截图，提示无效操作。](img/536365_1_En_2_Fig7_HTML.jpg)\n\
  \n**图 2-7**  \n由于映射对象内存分配错误而引发的错误\n\n\n\n### 正确的内存分配示例\n\n为像映射这样的复杂对象分配内存的正确方式是将声明包裹在`make`函数中，如代码清单\
  \ 2-14 所示。`make`函数也会为该对象的非零存储内存进行初始化。\n\n```\nstring_Map := make(map[string]int)\n\
  string_Map[\"Marks\"] = 56\nfmt.Println(string_Map)\n代码清单 2-14\n映射对象正确内存分配示意图\n\
  ```\n\n这次，当你使用`make`函数初始化对象，并尝试向映射对象添加新条目时，代码将成功编译并运行，不会报错，如图 2-8 的输出所示。请记住，在使用复杂对象时，如果需要立即向对象添加数据，使用`make`函数进行初始化至关重要。\n\
  \n![](img/536365_1_En_2_Fig8_HTML.jpg)\n\n代码截图展示了向映射对象添加新条目后的结果。代码显示为 `go run mem-allocation-eg.go`。`map\
  \ 左括号 marks:56 右括号`。\n\n图 2-8\n\n正确内存分配后的输出\n\n### 内存释放\n\n内存释放是由 Go 运行时自带的*垃圾回收器*（GC）以自主方式执行的。当垃圾回收器在后台工作时被触发，它会搜索那些超出作用域或被设置为`nil`的对象，从而清理内存并将其归还到内存池中。\n\
  \n在 Go 1.5 版本中，垃圾回收器被完全重构，具有极低的延迟，有效减少了运行 Go 应用程序时发生的暂停次数。在最新的 1.18.3 版本中，垃圾回收器在执行内存分配时的性能大大提升，即使在较慢的电脑上也几乎察觉不到。有关垃圾回收器的更多信息，请参考[`runtime`](https://pkg.go.dev/runtime)的官方文档（位于[`https://pkg.go.dev/runtime`](https://pkg.go.dev/runtime)），以及[垃圾回收器改进](https://talks.golang.org/2015/go-gc.pdf)的演讲发布稿（位于[`https://talks.golang.org/2015/go-gc.pdf`](https://talks.golang.org/2015/go-gc.pdf)）。\n\
  \n## 指针数据类型\n\n每个变量本质上都是一个内存位置。同时请注意，每个内存位置都有一个明确的地址。在 Go 中，取地址符（`&`）表示一个内存地址，用于访问变量的地址。\n\
  \n### 什么是指针？\n\n指针本质上是能够存储其他变量内存地址的变量。请注意，内存地址指的是变量的直接地址。指针可以用任何数据类型声明，但对其进行初始化（即存储另一个变量的地址）并非必须。与高级语言类似，Go\
  \ 也支持指针。指针在 Go 中用于执行不同的任务，例如，不使用指针就无法进行引用调用。\n\n### 在 Go 中声明指针\n\n与任何其他变量或常量一样，在使用指针之前必须先声明。在\
  \ Go 中声明指针变量的通用语法是 `var variable_name *variable-type`。这里，`variable-type` 表示指针的基类型。请确保选择的基类型是有效的\
  \ Go 数据类型。`variable-name` 表示指针的名称。将指针声明与其他变量声明区分开来的最重要特征之一是星号（`*`）运算符。在此语句中，星号表示声明的变量是一个指针。代码清单\
  \ 2-15 展示了一些有效的指针声明示例。\n\n```\nvar intPointer  *int         /* 指向一个整型变量的指针 */\n\
  var floatPointer  *float32   /* 指向一个浮点变量的指针 */\nvar strPointer *string       /*\
  \ 指向一个字符串变量的指针 */\n代码清单 2-15\n在 Go 中声明指针的不同方式\n```\n\n应注意，无论其类型如何，所有指针中存储的值的内在数据类型都是相同的，即一个长十六进制数。这代表了内存地址，因为所有地址都采用长十六进制格式。指针所指向的变量或常量的数据类型是区分不同数据类型指针的唯一依据。此外，指针的值也可以手动设置为`nil`（对于字符串），或者如果在声明时未初始化则会自动设置。\n\
  \n**示例**\n\n让我们通过一个示例程序进一步了解指针，如代码清单 2-16 所示。\n\n```\nvar intPointer  *int     \
  \    /* 指向一个整型变量的指针 */\nfmt.Println(\"intPointer 的值: \", *intPointer)\n代码清单 2-16\n\
  声明指针\n```\n\n在代码清单 2-16 中，第一行声明了一个名为`intPointer`的`int`类型指针。这是一种正确的声明方式；然而，如果你尝试在第二行打印`intPointer`的内容，将会抛出一个运行时错误，导致应用程序崩溃，如图\
  \ 2-9 所示。这是因为`intPointer`当前未被初始化指向任何东西，因此是`nil`。\n\n![](img/536365_1_En_2_Fig9_HTML.jpg)\n\
  \n屏幕截图展示了程序的输出。第一行声明了一个名为`int pointer`的`int`类型指针。第二行中`int pointer`的内容显示了一个运行时错误，并且应用程序崩溃。\n\
  \n图 2-9\n\n打印空指针的输出\n\n让我们修改代码清单 2-16，以确保指针变量指向一个有效的变量。如代码清单 2-17 所示，我们使用`:=`运算符显式声明一个指针，并使用取地址符`&`运算符使其成为指向另一个变量的指针。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n)\nfunc main() {\nvalue1 := 42\nvar pointer1\
  \ = &value1\nfmt.Println(\"pointer1 的值: \", *pointer1)\nvalue2 := 42.13\npointer2\
  \ := &value2\nfmt.Println(\"Value1: \", *pointer2)\nvalue3 := 32.5\npointer3 :=\
  \ &value3\n*pointer3 = *pointer3 / 31\nfmt.Println(\"Pointer3: \", *pointer3)\n\
  fmt.Println(\"Value3: \", value3)\n}\n代码清单 2-17\n展示指针正确初始化的程序\n```\n\n**//输出：**\n\
  \n```\n/*\nValue of pointer1: 42\nValue1: 42.13\nPointer3: 1.0483870967741935\n\
  Value3: 1.0483870967741935\n*/\n```\n\n\n\n在`main`函数中，第 1 行声明了一个值为`42`的整数变量。第 2\
  \ 行使用取地址运算符（`&`）将变量`value1`的直接内存地址赋值给变量`pointer1`。由于使用了取地址运算符`(&)`，Go 编译器会自动识别出`pointer1`是用于存储内存地址的指针变量。现在，若打印指针`pointer1`所指向的内存中存储的值，它将与`value1`中存储的值相同，即`42`。为了打印内存地址指向位置的值，需要使用星号（`*`）运算符，如`main`函数的第\
  \ 3 行和第 8 行所示。同样，也可以使用指针指向浮点型变量。注意，`pointer1`是隐式声明并赋值的，而`pointer2`是显式声明了数据类型的。\n\
  \n还可以通过指针修改所指向变量的值，如清单 2-17 所示：\n\n```\n*pointer1 = *pointer1 / 31\nfmt.Println(\"\
  Pointer1: \",*pointer1)\nfmt.Println(\"Value1: \", value1)\n```\n\n**输出：**\n\n```\n\
  Pointer3:  1.0483870967741935\nValue3:  1.0483870967741935\n```\n\n在第 1 行中，使用星号（`*`）运算符访问`pointer1`所指向的内存位置的值，将该值除以`31`，并将结果存储在同一位置。从输出中可以看到，`pointer1`和`value1`变量的值相同。\n\
  \n### 与 Java 及 C 风格语言的比较\n\n在 Java 或 C#中，如果有一个原始变量和一个指向该变量的引用变量（指针），可以通过修改原始变量或修改指向它的变量来改变原始变量的值。但与\
  \ Java 不同的是，指针最初不必指向任何特定值，并且可以在运行时将其更改为指向另一个值。另一方面，Go 中的指针与 C、C#及其他类似语言中的指针非常相似且同样有价值。\n\
  \n## 数组和切片中的有序值\n\n本节讨论数组数据结构以及作为数组抽象的切片。\n\n### Go 中的数组\n\n与其他 C 风格语言一样，Go 支持数组数据结构。Go\
  \ 中的数组用于存储固定大小的顺序元素集合，且所有元素类型相同。尽管数组通常被称为存储项目集合的容器，但它也可以被视为具有相同类型的变量的集合。此外，数组是连续的内存位置，其中数组的第一个元素对应最低地址，最后一个元素对应最高地址。还可以通过索引号访问数组的任意特定元素。数组的索引号范围从`0`到`size-1`，如图\
  \ 2-10 所示。根据该图，要访问第二个索引（即第三个元素）处的元素，可以使用`array_name[2]`，这将得到值`11`。\n\n![](img/536365_1_En_2_Fig10_HTML.jpg)\n\
  \n一个表格表示展示了 Go 中的数组。它可以访问元素 1、2、3、4 到 n 以及索引 0、1、2、3 到 n。\n\n**图 2-10** Go 中的数组\n\
  \n#### 声明数组\n\nGo 中数组声明的一般格式是`var array_name [SIZE] data_type`。注意，必须指定`data_type`，因为它指明了数组将要持有的元素类型。同时，元素总数（`SIZE`）也是必需的，因为它指明了数组的大小。以此格式声明的数组被称为*单维*数组。注意，`Size`必须是一个大于零的整数常量值。此外，任何有效的\
  \ Go 类型都可以用于指定`data_type`，即数组可以持有的元素类型。例如，语句`var floatArray [10] float32`声明了一个包含十个元素的数组，名为`floatArray`，`data_type`为`float32`。\n\
  \n#### 初始化数组\n\nGo 中的数组可以逐个元素初始化，也可以使用单个语句初始化，如清单 2-18 所示。请记住，花括号`{ }`中指定的项数不应超过方括号`[\
  \ ]`中指定的数组大小，如清单 2-18 所示。\n\n```\nvar floatArray = [5]float32{10.0, 200.0, 35.64,\
  \ 78.0, 540.60}\n清单 2-18\n在 Go 中初始化指定大小的数组\n```\n\n如果省略了数组的大小，Go 编译器会自动将数组大小设置为初始化语句中指定的项数。例如，清单\
  \ 2-19 将创建一个大小为`5`的数组，因为该数组用五个值进行了初始化。\n\n```\nvar floatArray = []float32{10.0,\
  \ 200.0, 35.64, 78.0, 540.60}\n清单 2-19\n在 Go 中初始化未指定大小的数组\n```\n\n#### 访问数组元素\n\n\
  数组的单个元素可以通过数组名加索引的方式访问。具体做法是将所需元素的索引号放在紧跟数组名后的方括号`[]`中。例如，为数组的单个元素赋值，可以使用以下语句：\n\
  \n```\nbalance[4] = 50.0\n```\n\n该语句将赋值运算符右侧的值赋值给名为`balance`的数组中索引为 4 的元素。由于数组的索引号从`0`开始，该语句将值`50.0`赋值给了数组中的第五个元素。注意，数组的第一个索引也称为*基索引*，而最后一个索引总是`arraySize-1`。还要注意，赋值使用`=`运算符而不是`:=`运算符，因为数组的数据类型已经定义。图\
  \ 2-11 是对此处讨论概念的图示。\n\n![](img/536365_1_En_2_Fig11_HTML.jpg)\n\n一个表格表示展示了数组中的数据存储概念。索引\
  \ 0 到 4 的`balance`元素分别为`1000.0`、`2.0`、`3.4`、`7.0`和`50.0`。\n\n**图 2-11** 数组中的数据存储\n\
  \n**示例**\n\n清单 2-20 展示了一个包含到目前为止所讨论所有概念的示例。\n\n```\npackage main\nimport (\n\"fmt\"\
  \n)\nfunc main(){\n/*声明并初始化一个名为\"array1\"的数组，大小为 3，类型为浮点数*/\nvar array1 = []float32{10.5,\
  \ 5.2, 2.88}\nvar array2 [10]int\nvar i, j int\n//初始化数组元素\nfor i =0; i < 10; i++{\n\
  array2[i] = i + 50 //将位置 i 处的元素设置为 i+50\n}\n//打印 array1 每个元素的值\nfmt.Println(\"Elements\
  \ stored in Array1\")\nfor j =0; j <3; j++{\nfmt.Printf(\"Element[%d] = %f \\n\"\
  , j, array1[j])\n}\n//打印 array2 每个元素的值\nfmt.Println(\"Elements stored in Array2)\n\
  for j =0; j <10; j++{\nfmt.Printf(\"Element[%d] = %d \\n\", j, array2[j])\n}\nfmt.Println(\"\
  Size of array1: \", len(array1))\nfmt.Println(\"Size of array2: \", len(array2))\n\
  }\n清单 2-20\n演示 Go 中数组使用的基本程序\n```\n\n**/*输出：**\n\n```\n$ go run array-1.go\nElements\
  \ stored in Array1\nElement[0] = 10.500000\nElement[1] = 5.200000\nElement[2] =\
  \ 2.880000\nElements stored in Array1\nElement[0] = 50\nElement[1] = 100\nElement[2]\
  \ = 150\nElement[3] = 200\nElement[4] = 250\nElement[5] = 300\nElement[6] = 350\n\
  Element[7] = 400\nElement[8] = 450\nElement[9] = 500 */\n```\n\n\n\n#### 查询数组的大小\n\
  \n你可以通过内置函数 `len` （length 的缩写）来获取数组可以容纳的项数（即其大小）。将数组标识符包裹在 `len` 函数中，就像 `len(array_name)`\
  \ 这样。清单 2-21 演示了 `len` 函数的用法。\n\n```\nfmt.Println(\"Size of array1: \", len(array1))\n\
  fmt.Println(\"Size of array2: \", len(array2))\n清单 2-21\n在 Go 中使用 len 函数处理数组\n```\n\
  \n**输出：**\n\n```\nSize of array1:  3\nSize of array2:  10\n```\n\n请记住，在 Go 中，数组是一个对象，并且像所有对象一样，如果你将其传递给函数，将会创建该数组的一个副本。然而，使用数组基本上只能存储数据，并且在运行时进行排序或添加/删除项并不容易。为了获得这些功能以及执行其他操作，你应该将有序数据打包到切片中，而不是数组中。\n\
  \n### Go 中的切片\n\n在 Go 中，*切片* 是建立在数组数据结构之上的一层抽象。当你定义切片时，运行时会在后台分配必要的内存并构建数组，但只返回切片。此外，与数组类似，切片的所有元素都是同一类型。尽管数组可以同时容纳多个相同类型的数据项，但无法使用任何内置函数动态增加其大小或从中提取子数组。切片克服了这些缺点。切片在\
  \ Go 中被广泛使用，并且提供了数组所需的多种实用方法。\n\n#### 定义切片\n\n切片的声明方式与数组相同，区别在于你不需要指定其大小，如清单 2-22\
  \ 所示。另外，也可以使用 `make` 函数来创建切片。\n\n```\nvar colors = []string{\"ed\", \"Green\", \"\
  Blue\"}\nvar marks []float32          /* 未指定大小的切片 */\nvar marks = make([]int,5,5)\
  \  /* 长度和容量均为 5 的切片 */\n清单 2-22\n在 Go 中定义切片\n```\n\n#### `len()` 和 `cap()` 函数\n\n\
  作为建立在数组之上的抽象，切片底层结构是数组。要查询切片中当前存在的元素总数，使用 `len()` 函数。要查询切片中可以存储的元素总数，使用 `cap()`\
  \ 函数。这本质上返回的是切片的大小。清单 2-23 说明了切片在 Go 中的使用。\n\n```\npackage main\nimport (\n\"fmt\"\
  \n)\nfunc main() {\nvar marks = make([]float64, 3, 5) // 声明长度为 3、容量为 5 的切片\nprintItemsOfSlice(marks)\
  \          // 将切片传递给函数\n}\n// 接受切片并打印其详情的函数\nfunc printItemsOfSlice(x []float64)\
  \ {\nfmt.Printf(\"Length=%d Capacity=%d Slice=%v\\n\", len(x), cap(x), x)\n}\n清单\
  \ 2-23\n演示 len() 和 cap() 函数用法的示例\n```\n\n**输出：**\n\n```\nLength=0 Capacity=0 Slice=[]\n\
  ```\n\n#### nil 切片\n\n如果声明切片时没有提供输入，那么它会被默认初始化为 `nil`。同时，这种切片的长度和容量均为零。清单 2-24 演示了\
  \ Go 中 `nil` 切片的概念。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nvar marks\
  \ []float64       // 声明 float 类型的切片\nprintItemsOfSlice(marks)  // 将切片传递给函数\nif marks\
  \ == nil {\nfmt.Printf(\"Slice is Nil\")\n}\n}\n// 接受切片并打印其详情的函数\nfunc printSliceDetails(x\
  \ []float64) {\nfmt.Printf(\"Length=%d Capacity=%d Slice=%v\\n\", len(x), cap(x),\
  \ x)\n}\n清单 2-24\nGo 中的 nil 切片\n```\n\n**输出：**\n\n```\nLength=0 Capacity=0 Slice=[]\n\
  Slice is Nil\n```\n\n#### Go 中的子切片操作\n\n在 Go 中，你可以使用 `[下限:上限]` 指定所需的下限和上限，从而提取数组的一个子切片。清单\
  \ 2-25 说明了 Go 中的子切片概念。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n/* 声明并初始化一个\
  \ float 类型的切片 */\nmarks := []float32{10, 12.6, 20.0, 37.56, 48.74, 50.0, 64.15,\
  \ 79.63, 8.75}\n/* 将切片传递给用户自定义函数以打印其详情 */\nprintSliceDetails(marks)\n/* 打印原始切片的元素\
  \ */\nfmt.Println(\"Original Slice =\", marks)\n/* 打印 marks 切片中从索引 1(含)到索引 5(不含)的子切片\
  \ */\nfmt.Println(\"Marks[1:5] = \", marks[1:5])\n/* 不指定下限，则默认为 0 */\nfmt.Println(\"\
  Marks[:4] =\", marks[:4])\n/* 不指定上限，则默认为 len(slice) */\nfmt.Println(\"Marks[3:]\
  \ =\", marks[3:])\nmarks1 := make([]float32, 0, 5)\n/* 将切片传递给用户自定义函数以打印其详情 */\n\
  printSliceDetails(marks1)\n/* 打印 marks 中从索引 0(含)到索引 3(不含)的子切片 */\nmarks2 := marks[:3]\
  \ // 将子切片存储在名为 marks2 的切片中\n/* 将切片传递给用户自定义函数以打印其详情 */\nprintSliceDetails(marks2)\n\
  /* 打印 marks 中从索引 4(含)到索引 5(不含)的子切片 */\nmarks3 := marks[4:5]\n/* 将切片传递给用户自定义函数以打印其详情\
  \ */\nprintSliceDetails(marks3)\n}\nfunc printSliceDetails(x []float32) {\nfmt.Printf(\"\
  Length=%d Capacity=%d Slice=%v\\n\", len(x), cap(x), x)\n}\n清单 2-25\nGo 中的子切片操作\n\
  ```\n\n**输出：**\n\n```\nLength=9 Capacity=9 Slice=[10 12.6 20 37.56 48.74 50 64.15\
  \ 79.63 8.75]\nOriginal Slice = [10 12.6 20 37.56 48.74 50 64.15 79.63 8.75]\nMarks[1:5]\
  \ = [12.6 20 37.56 48.74]\nMarks[:4] = [10 12.6 20 37.56]\nMarks[3:] = [37.56 48.74\
  \ 50 64.15 79.63 8.75]\nLength=0 Capacity=5 Slice=[]\nLength=3 Capacity=9 Slice=[10\
  \ 12.6 20]\nLength=1 Capacity=5 Slice=[48.74]\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项，将给定的英文文本翻译成中文。\n\
  \n\n#### `append()` 和 `copy()` 函数\n\n在 Go 语言中，`append()` 函数用于增加切片的容量。`copy()` 函数用于将源切片的内容复制到目标切片中。清单\
  \ 2-26 展示了这两个函数在 Go 中的使用。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  /* 声明一个 int 类型的切片 */\nvar nums []int\n/* 将切片传递给自定义函数以打印详情 */\nprintSliceDetails(nums)\n\
  /* 空切片可以与 Append 一起使用 */\nnums = append(nums, 10)\nprintSliceDetails(nums)\n/* 向切片中添加一个元素\
  \ */\nnums = append(nums, 100)\nprintSliceDetails(nums)\n/* 一次向切片中添加多个元素 */\nnums\
  \ = append(nums, 1000, 10000, 100000)\nprintSliceDetails(nums)\n/* 创建一个切片 nums1，其容量是\
  \ nums 切片的两倍 */\nnums1 := make([]int, len(nums), (cap(nums))*2)\n/* 将 nums 中存储的元素复制到\
  \ nums1 中 */\ncopy(nums1, nums)\n/* 将切片传递给自定义函数以打印详情 */\nprintSliceDetails(nums1)\n\
  var colors = []string{\"Red\", \"Green\", \"Blue\"}\nfmt.Println(\"Before: \", colors)\n\
  colors = append(colors[1:len(colors)])\nfmt.Println(\"Items after removig 1st element:\"\
  , colors)\n}\nfunc printSliceDetails(x []int) {\nfmt.Printf(\"Length=%d Capacity=%d\
  \ Slice=%v\\n\", len(x), cap(x), x)\n}\n清单 2-26\n在 Go 中使用 Append 和 Copy 函数\n```\n\
  \n**输出：**\n\n```\nLength=0 Capacity=0 Slice=[]\nLength=1 Capacity=1 Slice=[10]\n\
  Length=2 Capacity=2 Slice=[10 100]\nLength=5 Capacity=6 Slice=[10 100 1000 10000\
  \ 100000]\nLength=5 Capacity=12 Slice=[10 100 1000 10000 100000]\n```\n\n要从切片中移除元素，你也可以使用\
  \ `append()` 函数，但这次需要以括号包裹、冒号分隔的两个数字格式指定范围，如清单 2-27 所示。\n\n```\nvar colors = []string{\"\
  Red\", \"Green\", \"Blue\"}\nfmt.Println(\"Before: \", colors)\ncolors =  append(colors[1:len(colors)])\n\
  fmt.Println(\"Items after removing 1st element: \", colors)\n清单 2-27\n使用 Append\
  \ 函数从切片中移除元素\n```\n\n**输出：**\n\n```\nBefore:  [Red Green Blue]\nItems after removing\
  \ 1st element: [Green Blue]\n```\n\n在清单 2-27 中，第一个元素被移除了，因为该范围指示从数组中索引为 1 的元素（即第二个元素）开始。\n\
  \n然而，在 `colors = append(colors[:len(colors)-1])` 语句中，如果省略了范围中的起始索引，而是传入 `colors[:len(colors)-1]`，则最后一个元素会从切片中移除。\n\
  \n#### 排序切片\n\n如清单 2-28 所示，你还可以使用 Go 中的 `sort` 包对切片进行排序。`sort` 函数包含多个用于对不同数据类型进行排序的函数。默认情况下，使用\
  \ `sort()` 函数会将切片按数字升序排列。更多信息，请参考 `https://pkg.go.dev/sort` 上的 [sort 包](https://pkg.go.dev/sort)\
  \ 的官方开发者文档。注意，使用 `sort()` 函数，你还可以对用户自定义的数据集合进行排序。\n\n```\npackage main\nimport (\n\
  \"fmt\"\n\"sort\"\n)\nfunc main() {\nintSlice := make([]int, 5)\nintSlice[0] = 6\n\
  intSlice[1] = 99\nintSlice[2] = 45\nintSlice[3] = 34\nintSlice[4] = 1\nfmt.Println(\"\
  Original Slice: \", intSlice)\nsort.Ints(intSlice)\nfmt.Println(\"Sorted Slice:\
  \ \", intSlice)\n}\n清单 2-28\n使用 Sort 函数对切片进行排序\n```\n\n**输出：**\n\n```\nOriginal\
  \ Slice:  [6 99 45 34 1]\nSorted Slice:  [1 6 34 45 99]\n```\n\n## 映射\n\n在 Go 语言中，映射可以被视为一个无序的键值对集合。换句话说，映射可以看作是一个哈希表，它允许存储数据集合，然后可以根据键任意检索这些值。\n\
  \n注意，由于键是用于排序比较的，映射的键应该是任何可比较的类型。然而，通常的做法是使用字符串类型作为键，并使用任何其他有效类型作为关联的值。\n\n### 定义映射\n\
  \n当用于声明复杂数据类型时，`make()` 函数会分配并初始化一个非零的存储空间。因此，使用 `make()` 函数来声明一个映射对象是必须的。声明映射的一般格式如下：\n\
  \n`map_variable := make(map[key_data_type]value_data_type)`\n\n### 向映射对象添加条目\n\n\
  要向映射对象中添加条目，请使用以下一般格式：`map_variable_name[key] = value`。注意，由于 `map` 是一个无序的条目集合，条目的显示顺序并不总是有保证的。\n\
  \n### 从映射对象中删除条目\n\n在 Go 中，要删除一个映射的条目（即存储在映射中的键值对），可以使用一个名为 `delete()` 的内置函数。`delete()`\
  \ 函数接受两个参数——要删除条目的映射和要删除的键。实现此操作的一般格式是 `delete(map_variable, key)`。\n\n\n\n### 遍历映射对象中存储的值\n\
  \n要遍历映射中存储的键值对，可以使用 `For` 循环语句，如代码清单 2-29 所示。其中，`key` 是用于存储键的变量，`value` 是用于存储对应值的另一个变量。在每次迭代中，`key`\
  \ 变量将只持有映射中存储的一个键，而 `value` 变量则持有其对应的值。请注意，`key` 和 `value` 均为用户定义的变量名。\n\n```\n\
  for key, value := range map_variable_name{\n/* 执行所需操作 - 例如，打印所有存储的键值对 */\nfmt.printf(\"\
  %v: %v \\n\", key, value)\n}\n代码清单 2-29\n使用 For 循环遍历映射\n```\n\n与映射的显示顺序一样，其迭代顺序也是不保证的。如果需要保证顺序，则由用户自行管理。用户必须使用切片将所有条目按字母顺序列出。这可以通过从映射中提取键作为字符串数组的切片来实现，如代码清单\
  \ 2-30 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"sort\"\n)\nfunc main() {\n\
  states := make(map[string]string)\nstates[\"WA\"] = \"Washington\"\nstates[\"NY\"\
  ] = \"New York\"\nstates[\"CA\"] = \"California\"\nkeys := make([]string, len(states))\n\
  i := 0\nfor key := range states {\nkeys[i] = key\ni++\n}\nfmt.Println(\"排序前键的顺序:\
  \ \", keys)\nsort.Strings(keys)\nfmt.Println(\"排序后键的顺序: \", keys)\n}\n代码清单 2-30\n\
  显示映射的条目\n```\n\n**/*输出:**\n\n```\n排序前键的顺序: [WA NY CA]// 显示顺序不保证\n排序后键的顺序: [CA NY\
  \ WA]// 显示顺序已保证\n*/\n```\n\n第一行声明了一个名为 `keys` 的字符串类型切片，其大小与名为 `states` 的映射对象相同。然后使用\
  \ `for` 循环遍历映射对象中存储的键，并将其存储到 `keys` 切片中。之后，要排序 `keys` 切片，可以使用 `sort` 包中提供的 `sort()`\
  \ 函数。在此示例中，`states` 映射中初始存储的键值对为 `[CA:California NY:New York WA:Washington]`\n\n\
  使用代码清单 2-30 中所示的技术，可以确保顺序保持一致。每次使用 `range` 关键字遍历切片时，都会得到一个表示切片当前索引的整数。现在，你可以改用整数来遍历\
  \ `keys` 切片，如代码清单 2-31 所示。\n\n```\nfor i := range keys {\nfmt.Println(states[keys[i]])\n\
  // 输出在 states 映射中传入键所对应的值\n}\n代码清单 2-31\n使用 For Range 遍历映射\n```\n\n**输出:**\n\n```\n\
  California\nNew York\nWashington\n```\n\n**示例**\n\n代码清单 2-32 包含了前述所有关于如何在 Go 中使用映射在内存中存储无序数据集合，然后通过键任意访问条目的概念。它还展示了如何同时使用切片和映射来按所需顺序处理存储的数据。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"sort\"\n)\nfunc main() {\nstates := make(map[string]string)\n\
  fmt.Println(states)\nstates[\"WA\"] = \"Washington\"\nstates[\"OR\"] = \"Oregon\"\
  \nstates[\"CA\"] = \"California\"\nfmt.Println(states)\ncalifornia := states[\"\
  CA\"]\nfmt.Println(california)\ndelete(states, \"OR\")\nstates[\"NY\"] = \"New York\"\
  \nfmt.Println(states)\nfor key, value := range states {\nfmt.Printf(\"%v: %v \\\
  n\", key, value)\n}\nkeys := make([]string, len(states))\ni := 0\nfor key := range\
  \ states {\nkeys[i] = key\ni++\n}\nfmt.Println(keys)\nsort.Strings(keys)\nfmt.Println(keys)\n\
  for i := range keys {\nfmt.Println(states[keys[i]])\n}\n}\n代码清单 2-32\n演示在 Go 中使用映射的示例\n\
  ```\n\n**/*输出:**\n\n```\nmap[]\nmap[CA:California OR:Oregon WA:Washington]\nCalifornia\n\
  map[CA:California NY:New York WA:Washington]\nWA: Washington\nNY: New York\nCA:\
  \ California\n[WA NY CA]\n[CA NY WA]\nCalifornia\nNew York\nWashington\n*/\n```\n\
  \n## 结构体数据类型\n\n如前所述，Go 中的数组本质上是可以存储多个*相同*类型数据项的变量。为了克服这个限制，Go 提供了*结构体*，这是一种用户定义的类型，可用于存储*不同*类型的数据项。结构体本质上代表了一个数据的*记录*。例如，如果需要追踪图书馆中图书的不同信息，结构体是存储图书不同属性（如\
  \ `BookID`、`Title`、`Subject`、`Author` 等）最有用的方式。\n\n### 定义结构体\n\n要定义结构体，必须使用 `type`\
  \ 和 `struct` 语句。`struct` 语句定义了一个包含多个成员的新数据类型。`type` 语句为结构体绑定了一个名称。使用 `type` 和 `struct`\
  \ 语句声明结构体的通用格式如代码清单 2-33 所示。\n\n```\ntype struct_variable_type struct {\n成员定义;\n\
  成员定义;\n...\n成员定义;\n}\n代码清单 2-33\n在 Go 中声明结构体的通用格式\n```\n\n在代码中定义了结构体类型后，可以声明该结构体类型的多个变量。这样做的通用格式是\
  \ `variable_name := structure_variable_type {value1, value2...value n}`\n\n### 访问结构体的成员\n\
  \n要访问 `struct` 的任何成员字段，请使用成员访问运算符（`.`）。请记住，`struct` 关键字对于定义已定义的 `struct` 类型的变量是必需的。代码清单\
  \ 2-34 演示了 Go 中 `struct` 类型的使用方法，并展示了如何访问其成员字段。\n\n```\npackage main\nimport \"\
  fmt\"\ntype Books struct {\nbTitle      string\nbAuthorName string\nbSubject   \
  \ string\nbook_id     int\n}\nfunc main() {\nvar Book1 Books /* 声明 Book 类型的变量 */\n\
  var Book2 Books /* 声明 Book 类型的变量 */\n/* 访问 Book 结构体的成员字段来定义 Book1 */\nBook1.bTitle\
  \ = \"The Go Programming Language\"\nBook1.bAuthorName = \"Alan A. A. Donovan and\
  \ Brian W. Kernighan\"\nBook1.bSubject = \"A complete guide to Go programming\"\n\
  Book1.book_id = 6495\n/* 访问 Book 结构体的成员字段来定义 Book2 */\nBook2.bTitle = \"The Complete\
  \ Book of Arts & Crafts\"\nBook2.bAuthorName = \"Dawn Purney\"\nBook2.bSubject =\
  \ \"The Complete Book of Arts and Crafts of fun activities for children\"\nBook2.book_id\
  \ = 6496\n/* 打印 Book1 的详细信息 */\nfmt.Printf(\"Book1 bTitle : %s\\n\", Book1.bTitle)\n\
  fmt.Printf(\"Book1 bAuthorName : %s\\n\", Book1.bAuthorName)\nfmt.Printf(\"Book1\
  \ bSubject : %s\\n\", Book1.bSubject)\nfmt.Printf(\"Book1 book_id : %d\\n\", Book1.book_id)\n\
  /* 打印 Book1 的详细信息 */\nfmt.Printf(\"Book2 bTitle : %s\\n\", Book2.bTitle)\nfmt.Printf(\"\
  Book2 bAuthorName : %s\\n\", Book2.bAuthorName)\nfmt.Printf(\"Book2 bSubject : %s\\\
  n\", Book2.bSubject)\nfmt.Printf(\"Book2 book_id : %d\\n\", Book2.book_id)\n}\n\
  代码清单 2-34\n在 Go 中使用结构体\n```\n\n**/*输出:**\n\n```\nBook1 bTitle      : The Go Programming\
  \ Language\nBook1 bAuthorName : Alan A. A. Donovan and Brian W. Kernighan\nBook1\
  \ bSubject    : A complete guide to Go programming\nBook1 book_id     : 6495\nBook2\
  \ bTitle      : The Complete Book of Arts & Crafts\nBook2 bAuthorName : Dawn Purney\n\
  Book2 bSubject    : The Complete Book of Arts and Crafts of fun activities for children\n\
  Book2 book_id     : 6496\n*/\n```\n\n\n\n### 将结构体作为函数参数传递\n\n在 Go 语言中，与任何其他变量或指针一样，你也可以将结构体作为函数参数传递。清单\
  \ 2-35 演示了如何将结构体作为函数参数传递。\n\n```\npackage main\nimport \"fmt\"\ntype Books struct\
  \ {\nbTitle      string\nbAuthorName string\nbSubject    string\nbook_id     int\n\
  }\nfunc main() {\nvar Book1 Books /* 声明 Book 类型的变量 */\nvar Book2 Books /* 声明 Book\
  \ 类型的变量 */\n/* 访问 Book 结构体的成员字段以定义 Book1 */\nBook1.bTitle = \"The Go Programming\
  \ Language\"\nBook1.bAuthorName = \"Alan A. A. Donovan and Brian W. Kernighan\"\n\
  Book1.bSubject = \"A complete guide to Go programming\"\nBook1.book_id = 6495\n\
  /* 访问 Book 结构体的成员字段以定义 Book2 */\nBook2.bTitle = \"The Complete Book of Arts & Crafts\"\
  \nBook2.bAuthorName = \"Dawn Purney\"\nBook2.bSubject = \"The Complete Book of Arts\
  \ and Crafts of fun activities for children\"\nBook2.book_id = 6496\n/* 通过将 Book1\
  \ 作为参数传递给函数来打印其详细信息 */\nprintBookDetails(Book1)\n/* 通过将 Book2 作为参数传递给函数来打印其详细信息\
  \ */\nprintBookDetails(Book2)\n}\nfunc printBookDetails(book Books) {\nfmt.Printf(\"\
  \\nTitle : %s\\n\", book.bTitle)\nfmt.Printf(\"Authors : %s\\n\", book.bAuthorName)\n\
  fmt.Printf(\"Subject : %s\\n\", book.bSubject)\nfmt.Printf(\"Book ID : %d\\n\",\
  \ book.book_id)\n}\n清单 2-35\n在 Go 中将结构体作为函数参数传递\n```\n\n**/*输出：**\n\n```\nTitle\
  \   : The Go Programming Language\nAuthors : Alan A. A. Donovan and Brian W. Kernighan\n\
  Subject : A complete guide to Go programming\nBook ID : 6495\nTitle   : The Complete\
  \ Book of Arts & Crafts\nAuthors : Dawn Purney\nSubject : The Complete Book of Arts\
  \ and Crafts of fun activities for children\nBook ID : 6496\n*/\n```\n\n### 指向结构体的指针\n\
  \n正如你可以定义用于指向（存储）其他常量或变量的指针一样，你也可以在 Go 中定义指向结构体的指针。例如，可以使用 `var struct_pointer *Books`\
  \ 语句声明一个名为 `struct_pointer`、类型为 `Books` 的指针变量。然后可以使用 `struct_pointer` 变量来存储结构体变量的地址。取地址符（`&`）用于获取结构体变量的直接地址，例如\
  \ `struct_pointer = &Book1`。此外，成员访问运算符（`.`）用于访问指针所指向的结构体的成员，例如 `struct_pointer.title`。\n\
  \n**示例**\n\n让我们重写清单 2-35 来演示 Go 中结构体指针的用法。结果如清单 2-36 所示。\n\n```\npackage main\n\
  import \"fmt\"\ntype Books struct {\nbTitle      string\nbAuthorName string\nbSubject\
  \    string\nbook_id     int\n}\nfunc main() {\nvar Book1 Books /* 声明 Book 类型的变量\
  \ */\nvar Book2 Books /* 声明 Book 类型的变量 */\n/* 访问 Book 结构体的成员字段以定义 Book1 */\nBook1.bTitle\
  \ = \"The Go Programming Language\"\nBook1.bAuthorName = \"Alan A. A. Donovan and\
  \ Brian W. Kernighan\"\nBook1.bSubject = \"A complete guide to Go programming\"\n\
  Book1.book_id = 6495\n/* 访问 Book 结构体的成员字段以定义 Book2 */\nBook2.bTitle = \"The Complete\
  \ Book of Arts & Crafts\"\nBook2.bAuthorName = \"Dawn Purney\"\nBook2.bSubject =\
  \ \"The Complete Book of Arts and Crafts of fun activities for children\"\nBook2.book_id\
  \ = 6496\n/* 通过将 Book1 作为指针传递给函数来打印其详细信息 */\nprintBookDetails(&Book1)\n/* 通过将 Book2\
  \ 作为指针传递给函数来打印其详细信息 */\nprintBookDetails(&Book2)\n}\nfunc printBookDetails(book\
  \ *Books) {\nfmt.Printf(\"\\nTitle : %s\\n\", book.bTitle)\nfmt.Printf(\"Authors\
  \ : %s\\n\", book.bAuthorName)\nfmt.Printf(\"Subject : %s\\n\", book.bSubject)\n\
  fmt.Printf(\"Book ID : %d\\n\", book.book_id)\n}\n清单 2-36\n用于演示 Go 中结构体指针的程序\n```\n\
  \n**/*输出：**\n\n```\nTitle   : The Go Programming Language\nAuthors : Alan A. A.\
  \ Donovan and Brian W. Kernighan\nSubject : A complete guide to Go programming\n\
  Book ID : 6495\nTitle   : The Complete Book of Arts & Crafts\nAuthors : Dawn Purney\n\
  Subject : The Complete Book of Arts and Crafts of fun activities for children\n\
  Book ID : 6496\n*/\n```\n\nGo 语言中的 `struct` 类型是一种数据结构，其目的和功能与 C 语言中的 `struct` 类型以及\
  \ Java 中的 `class` 类似。结构体可以封装数据和方法。然而，与 Java 不同，Go 没有继承模型，也就是说，没有 `super()` 函数或子结构体的概念。每个结构体都是独立的，拥有自己的字段用于数据管理，也可以选择性地拥有自己的方法。请记住，Go\
  \ 中的 `struct` 是一种自定义类型。请注意，结构体名称以大写字母开头，例如 `Book`，以确保它可以在应用程序的其他部分使用，即被导出，这类似于 C\
  \ 风格语言中的公有访问说明符。另一方面，如果使用小写字母开头，结构体类型将是私有的，并且不能被导出以供应用程序的其他部分使用。\n\n## 程序流程\n\n\
  条件逻辑可用于改变程序流程。与其他 C 风格语言一样，Go 也提供了条件语句，例如 `if`、`if…else`、`嵌套 if`、`switch` 和 `select`。不过，在使用方式上存在细微的语法差异。\n\
  \n### If 语句\n\n在大多数情况下，Go 中的 `if` 语句看起来与 C 或 Java 中的相同；但是，它不需要在布尔条件周围加上括号。另一个重要方面是如何格式化条件代码块。在其他\
  \ C 风格语言中，可以选择将代码块的起始大括号放在下一行。Go 不允许这样做，这样做会引发错误。起始大括号必须与前面的语句在同一行。清单 2-37 是在 Go\
  \ 中使用 `if-else` 语句的示例。\n\n```\npackage main\nimport (\n\"fmt\"\n)\nfunc main() {\n\
  theAnswer := 42\nvar result string\nif theAnswer < 0 {\nresult = \"Less than Zero\"\
  \n} else if theAnswer == 0 {\nresult = \"Equal to Zero\"\n} else {\nresult = \"\
  Greater than Zero\"\n}\nfmt.Println(result)\n}\n清单 2-37\nGo 中 if-else 语句的示例\n```\n\
  \n**/*输出：**\n\n```\nGreater than Zero\n*/\n```\n\nGo 的 `if` 语法中另一个有趣且有时很有用的变体是，你可以包含一个作为\
  \ `if` 语句一部分的初始语句。例如，你可以在根据变量值执行条件逻辑之前初始化它。清单 2-38 是一个实现此功能的示例。\n\n```\nif x:= 50;\
  \ if x < 0 {\nresult = \"Less than Zero\"\n} else if x == 0 {\nresult = \"Equal\
  \ to Zero\"\n} else {\nresult = \"Greater than Zero\"\n}\nfmt.Println(result)\n\
  清单 2-38\n带有初始化的 if 语句\n```\n\n**输出：**\n\n```\nGreater than Zero\n```\n\n\n\n## Switch\
  \ 语句\n\n与其他 C 风格语言类似，Go 语言也提供了功能相同的 `switch` 语句；但其语法在这些语言的基础上有所扩展。`switch` 语句可用于一个变量，以测试该变量是否与一系列值相等。列表\
  \ 2-39 使用了 `rand` 包中的 `Math.Rand` 包；我们将使用 `seed()` 函数，并通过语句 `rand.seed(time.Now().Unix())`\
  \ 向其传入当前时间的 UNIX 格式。接着，`rand` 包中的 `Intn()` 函数会返回一个非负的伪随机整数。`Intn()` 函数要求你指定一个区间范围\
  \ `0,n)`。务必确保 `n <= 0`。在本例中，我们提供了一个上限值 `7+1`，即该函数将使用区间 `[0, 7) + 1`。这样一来，该函数会返回一个介于\
  \ 1 到 7 之间的数字。每次运行此应用程序时，它会根据你计算机当前时间的毫秒数生成不同的数字。（你有可能反复看到同一个数字，但这只是巧合。）每次运行列表 [2-39\
  \ 中的代码时，你可能会得到不同的输出。\n\n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n\"\
  time\"\n)\nfunc main() {\nrand.Seed(time.Now().Unix())\ndow := rand.Intn(7) + 1\n\
  fmt.Println(\"Day: \", dow)\nvar result string\nswitch dow {\ncase 1:\nresult =\
  \ \"It's Sunday\"\ncase 2:\nresult = \"It's Monday\"\ndefault:\nresult = \"It's\
  \ some other day\"\n}\nfmt.Println(result)\n}\n列表 2-39\n在 Go 中使用 switch 语句\n```\n\
  \n**输出：**\n\n```\nDay:  2\nIt's Monday\n```\n\n请注意，在 `switch` 语句中，被评估的表达式周围不需要括号。与\
  \ C 和 Java 的另一个区别是，Go 中的 `switch` 语句不需要 `break` 语句。在 Go 中，只要其中一个 `case` 被评估为 `true`，该\
  \ `case` 内的语句就会被执行，并且控制权会转移到 `switch` 语句的末尾。此外，就像 `if` 语句一样，你还可以在 `switch` 语句中对变量进行评估之前包含一个短语句，如列表\
  \ 2-40 所示。请记住，在 `switch` 语句中声明的任何变量都将属于该 `switch` 语句的局部变量。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\nfunc main() {\nrand.Seed(time.Now().Unix())\n\
  var result string\nswitch dow := rand.Intn(7) + 1; dow {\ncase 1:\nresult = \"It's\
  \ Sunday\"\ncase 2:\nresult = \"It's Monday\"\ndefault:\nresult = \"It's some other\
  \ day\"\n}\nfmt.Println(result)\n}\n列表 2-40\n使用带有评估语句的 switch 语句\n```\n\n在 Go 中，`fallthrough`\
  \ 关键字用于 `switch` 语句的 `case` 块中。如果任何 `case` 块中存在 `fallthrough` 关键字，无论当前 `case` 是否被评估为\
  \ `true`，它都会将程序的控制流转移到下一个 `case`。\n\n## For 语句\n\n与其他高级编程语言不同，Go 只提供一种循环结构，即 `for`\
  \ 循环。`for` 循环可用于重复性任务，例如遍历值的集合。`for` 循环的基本语法与 Java 或 C 风格语言相同，不同之处在于 `for` 语句中不需要括号\
  \ `( )`。此外，就像 C 风格语言或 Java 一样，`for` 循环语句中的前置和后置语句不是必需的，可以留空。另外，在 Go 中，`for` 循环有四种变体用法，如下所述：\n\
  \n1.  **带有步长变量、条件和范围的** `for` **循环。**\n\n    `range` 关键字在 Go 中用于遍历存储在各种数据结构中的元素。当与数组和切片一起使用时，`range`\
  \ 关键字还会返回每个条目的索引和值。在列表 2-41 的第二个 `for` 循环中，我们使用了空白标识符（`_`）来忽略索引。然而，如同第三个 `for` 循环所示，有时也需要索引。在第四个\
  \ `for` 循环中，`range` 会从一个逗号分隔的列表中将值赋给变量 `i`。第一个变量将是索引，第二个变量将是关联的值。\n\n    ```\n \
  \   package main\n    import \"fmt\"\n    func main() {\n    total := 0\n    for\
  \ k := 0; k < 5; k++ {\n    total += k\n    }\n    nums := []int{2, 3, 4}\n    total\
  \ = 0\n    for _, num := range nums {\n    total += num\n    }\n    fmt.Println(\"\
  Total:\", total)\n    for j, num := range nums {\n    if num == 2 {\n    fmt.Println(\"\
  Index:\", j)\n    }\n    }\n    for i := range nums {\n    fmt.Println(nums[i])\n\
  \    }\n    }\n    列表 2-41\n    带有步长变量、条件和范围的 for 循环\n    ```\n\n    **输出：**\n\n\
  \    ```\n    Total: 9\n    Index: 0\n\n    ```\n\n2.  **带有空白前置/后置语句的** `for` **循环**\n\
  \n    列表 2-42 展示了使用带有空白前置/后置语句的 `for` 循环。\n\n    ```\n    total := 1\n    for ;\
  \ total < 10; {\n    total += total\n    }\n    列表 2-42\n    带有空白前置/后置语句的 for 循环\n\
  \    ```\n\n3.  **作为 `while` 循环使用的** `for` **循环**\n\n    许多语言都有一个 `while` 关键字，它允许你只要布尔表达式为真就可以循环执行一组语句。Go\
  \ 使用 `for` 关键字实现了这种类型的循环。你只需声明一个布尔条件，而不是一个计数器变量或范围。列表 2-43 说明了这一概念。\n\n    ```\n\
  \    total := 1\n    for < 10 {\n    total += total\n    }\n    列表 2-43\n    将 for\
  \ 循环用作 while 循环\n    ```\n\n4.  **无限循环**\n\n    通常，如果循环指定的条件语句永远不会变为假，那么循环就变成了无限循环。通常，`for`\
  \ 循环用于创建无限循环。当 `for` 语句中的这三个表达式都没有指定时，这会使得条件语句永远保持为真，从而将 `for` 循环变成无限循环。列表 2-44\
  \ 说明了这一概念。\n\n    ```\n    for {\n    // 你想要无限循环的任何任务\n    }\n    列表 2-44\n    将\
  \ for 循环用作无限循环\n    ```\n\n## goto 语句\n\nGo 也支持 `goto` 语句，它可以将控制权转移到代码中的一个标签。列表\
  \ 2-45 说明了如何将标签与 `goto` 语句结合使用以改变程序控制流。在此代码片段中，当 `if` 语句变为真时，`goto` 语句将被执行，控制权将转移到\
  \ `theEnd` 标签，然后执行此标签之后的语句。列表 2-45 展示了一个基本程序，描述了在 Go 中使用 `goto` 语句的方法。\n\n```\n\
  package main\nimport (\n\"fmt\"\n)\nfunc main() {\ntotal := 1\nfor total < 5 {\n\
  total += total\nfmt.Println(\"Total: \", total)\nif total == 5 {\ngoto theEnd\n\
  }\n}\ntheEnd:\nfmt.Println(\"End of Program\")\n}\n列表 2-45\n在 Go 中使用 goto 语句\n```\n\
  \n**输出：**\n\n```\nTotal:  2\nTotal:  4\nTotal:  8\nEnd of Program\n```\n\n总之，Go\
  \ 支持 `continue`、`break` 和 `goto` 语句的使用。Go 也支持多种编码模式的循环，并为 `for` 语句添加了特性，使其简洁易读。\n\
  \n\n\n## 函数\n\nGo 语言由包组成，而包中包含函数。每个 Go 应用程序都有一个名为`main`的包，并且至少有一个同样名为`main`的函数。当应用程序启动时，`main`函数会被运行时自动调用。与其他编程语言一样，在\
  \ Go 中，你也可以创建自定义函数，并将它们组织到自己的自定义包中。\n\n函数声明告诉 Go 编译器函数的名称、返回类型以及输入参数。另一方面，函数定义是函数的实际主体，由一组执行预期任务的语句组成。\n\
  \nGo 标准库提供了几个内置函数，你可以在 Go 程序中调用和使用它们。例如，`len()`函数接收各种类型的参数作为输入，并返回它们的长度。函数也被称为方法、子例程或过程。\n\
  \n### 定义函数\n\nGo 中的函数定义由两部分组成——函数头部和函数体。在 Go 中定义函数的一般格式如代码清单 2-46 所示。\n\n```\nfunc\
  \ function_name( [parameter list] ) [return_types]\n{\nbody of the function\n}\n\
  代码清单 2-46\nGo 中函数的一般格式\n```\n\n在这里，`func`关键字告诉编译器函数声明的开始，而`function_name`代表函数的名称。函数签名指的是函数名称和输入参数列表的组合。另外，`parameters`用作占位符。函数被调用时传递给它的值被称为函数实参，而这些形参也被称为形式参数。函数的参数列表定义了它将接收的输入参数的类型、顺序和总数。函数可能没有参数，因此参数是可选的。`return_type`用于定义函数可能返回的值的类型。同样，如果函数不返回任何内容，则`return_type`是可选的。函数体包含多个语句，这些语句共同定义了它要执行的任务。\n\
  \n代码清单 2-47 说明了 Go 中自定义函数的使用。在这里，`findMaximum()`是一个用户定义的函数，它接受两个参数`n1`和`n2`。作为输出，它返回这两个传入值中的最大值。此外，由于两个参数的类型相同，因此不必为每个变量指定类型。\n\
  \n```\n/* 用于找出两个数中最大值的函数 */\nfunc findMaximum(n1, n2 int) int {\n/* 声明局部变量 */\n\
  var maxVal int\nif (n1 > n2) {\nmaxVal = n1\n} else {\nmaxVal = n2\n}\nreturn maxVal\n\
  }\n代码清单 2-47\n说明 Go 中自定义函数的基本程序\n```\n\n与其他语言类似，Go 函数也可以接受同一类型的任意数量的值。为此，如代码清单 2-48\
  \ 所示，你声明参数名称，然后添加三个点，接着指定数据类型。由于`values`将充当数组，因此可以使用`range`关键字来遍历其中存储的值。\n\n```\n\
  package main\nimport (\n\"fmt\"\n)\nfunc main() {\ntotal := addValues(40, 50, 60)\n\
  fmt.Println(\"传入值的总和: \", total)\n}\nfunc addValues(values ... int) int{\nsum :=\
  \ 0\nfor _, val := range values{\nsum += val\n}\nreturn sum\n}\n代码清单 2-48\n接受任意数量值的函数\n\
  ```\n\n**/*输出:**\n\n```\n传入值的总和:  150\n*/\n```\n\n### 在 Go 中执行函数调用\n\n为了在 Go 中创建一个函数，还需要提供它的定义，该定义指定了函数应该执行的任务。要使用一个函数，必须从程序中调用它。当从程序中进行函数调用时，控制流会转移到该函数。当被调用的函数完成定义的任务，或遇到`return`语句，或到达函数的结束花括号时，控制流返回到最初发起调用的程序。\n\
  \n要进行函数调用，你只需传递所需的参数，这些参数被包裹在函数名旁边的圆括号`()`内。如果有值需要从函数返回，返回的值可以直接使用（例如与`Println()`一起使用），或者可以存储起来，以便稍后用于执行不同的操作。代码清单\
  \ 2-49 说明了在 Go 中执行函数调用的概念。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  /* 定义局部变量 */\nvar val1 int = 50\nvar val2 int = 80\nvar retVal int\n/* 调用 findMaximum()\
  \ 函数 */\nretVal = findMaximum(val1, val2)\nfmt.Printf(\"最大值: %d\\n\", retVal)\n\
  }\n/* 用于找出两个数之间最大值的函数 */\nfunc findMaximum(num1, num2 int) int {\n/* 声明局部变量 */\n\
  var maxVal int\nif (num1 > num2) {\nmaxVal = num1\n} else {\nmaxVal = num2\n}\n\
  return maxVal\n}\n代码清单 2-49\n说明 Go 中函数调用的基本程序\n```\n\n**输出:**\n\n```\n最大值: 80\n\
  ```\n\n### 从函数返回多个值\n\n与其他 C 风格的语言不同，Go 函数被设计为一次可以返回多个值。下面的示例说明了如何从函数中返回值。请参考[官方文档](https://golangdocs.com/functions-in-golang)\
  \ at[`https://golangdocs.com/functions-in-golang`](https://golangdocs.com/functions-in-golang)了解在\
  \ Go 中返回值及语法变化的更多方式。代码清单 2-50 说明了这一概念。\n\n```\npackage main\nimport (\n\"fmt\"\n\
  )\nfunc swapValues(str1, str2 string) (string, string) {\nreturn str2, str1\n}\n\
  func main() {\nval1, val2 := swapValues(\"阿卜杜拉\", \"哈桑\")\nfmt.Println(\"交换后的值:\
  \ \", val1, val2)\n}\n代码清单 2-50\n说明如何从函数返回多个值的 Go 程序\n```\n\n**输出:**\n\n```\n交换后的值:\
  \ 哈桑 阿卜杜拉\n```\n\n### 向函数传递参数\n\n你必须声明所有将接收作为参数传递给函数的值的变量。这组变量也称为函数的形式参数。请注意，函数的所有形式参数的作用域仅局限于该函数本身，即它们只能在该特定函数的作用域内被访问。此外，形式参数只在进入函数时创建，并在退出时销毁。\n\
  \n向函数传递参数有两种方式——*按值调用*和*按引用调用*。当使用按值调用的方式传递参数时，它本质上是将传入参数的值复制到被调用函数的形式参数中。在相应函数内部对形式参数所做的任何更改都不会影响通过函数调用传递的原始参数的值。\n\
  \n另一方面，按引用调用的技术将传入参数的直接地址复制到被调用函数的形式参数中。由于直接地址被复制并用于访问实际参数，因此在相应函数内部对形式参数所做的任何更改也会反映在通过函数调用传递的参数上。为了确保函数不能更改传递给它的参数的值，默认情况下，Go\
  \ 编程语言使用按值调用来向函数传递参数。\n\n\n\n#### 传值示例\n\n清单 2-51 展示了 Go 语言中传值的概念。\n\n```go\npackage\
  \ main\n\nimport (\n    \"fmt\"\n)\n\nfunc modifyInt(val int) int {\n    return\
  \ val + 5\n}\n\nfunc main() {\n    num := 500\n    fmt.Println(\"函数调用前传入参数的值：\"\
  , num)\n    fmt.Println(\"函数调用返回的值：\", modifyInt(num))\n    fmt.Println(\"函数调用后传入参数的值：\"\
  , num)\n}\n清单 2-51\nGo 语言传值演示程序\n```\n\n**输出：**\n\n```\n函数调用前传入参数的值： 500\n函数调用返回的值：\
  \ 505\n函数调用后传入参数的值： 500\n```\n\n#### 传引用示例\n\n清单 2-52 展示了 Go 语言中传引用的概念。\n\n```go\n\
  package main\n\nimport (\n    \"fmt\"\n)\n\nfunc myMap(mapObject map[int]int) {\n\
  \    // make() 声明并初始化 map 为 0\n    mapObject = make(map[int]int)\n}\n\nfunc myInt(values\
  \ []int) {\n    // make() 声明并初始化 slice 为 0\n    values = make([]int, 5)\n}\n\nfunc\
  \ main() {\n    // mapObject 已声明但未初始化，即其值为 nil\n    var mapObject map[int]int\n\
  \    myMap(mapObject)\n    fmt.Println(\"map 是否等于 nil？\", mapObject == nil)\n  \
  \  // Slice 已声明但未初始化，即其值为 nil\n    var intSlice []int\n    myInt(intSlice)\n   \
  \ fmt.Println(\"slice 是否等于 nil？\", intSlice == nil)\n}\n清单 2-52\nGo 语言传引用演示程序\n\
  ```\n\n**输出：**\n\n```\nmap 是否等于 nil？ true\nslice 是否等于 nil？ true\n```\n\n### 方法\n\
  \n在 Go 语言中，如果函数依附于用户定义的自定义类型，则这些函数被称为方法。在面向对象语言（如 Java）中，每个方法都是类的成员。而在 Go 中，方法则是类型的成员。清单\
  \ 2-53 演示了如何为结构体附加方法。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n)\n\nfunc\
  \ main() {\n    poodle := Dog{\"贵宾犬\", 10, \"汪！\"}\n    fmt.Println(poodle)\n  \
  \  fmt.Printf(\"%+v\\n\", poodle)\n    fmt.Printf(\"品种：%v\\n 体重：%v \\n\", poodle.Breed,\
  \ poodle.Weight)\n    poodle.Speak()\n}\n\n// Dog 是一个结构体\ntype Dog struct {\n  \
  \  Breed  string\n    Weight int\n    Sound  string\n}\n\nfunc (d Dog) Speak() {\n\
  \    fmt.Println(d.Sound)\n}\n清单 2-53\nGo 语言方法使用示例\n```\n\n**输出：**\n\n```\n{贵宾犬\
  \ 10 汪！}\n{Breed:贵宾犬 Weight:10 Sound:汪！}\n品种：贵宾犬\n体重：10\n汪！\n```\n\nGo 不支持方法重写；每个方法必须拥有唯一名称。但与所有函数一样，方法也可以返回值，仅用于明确该方法所赋值的类型，如清单\
  \ 2-54 所示。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n)\n\nfunc main() {\n\
  \    poodle := Dog{\"贵宾犬\", 10, \"汪！\"}\n    fmt.Println(poodle)\n    fmt.Printf(\"\
  %+v\\n\", poodle)\n    fmt.Printf(\"品种：%v\\n 体重：%v \\n\", poodle.Breed, poodle.Weight)\n\
  \    poodle.Speak()\n    poodle.Sound = \"嗷！\"\n    poodle.Speak()\n    poodle.SpeakThreeTimes()\n\
  }\n\n// Dog 是一个结构体\ntype Dog struct {\n    Breed  string\n    Weight int\n    Sound\
  \  string\n}\n\nfunc (d Dog) Speak() {\n    fmt.Println(d.Sound)\n}\n\nfunc (d Dog)\
  \ SpeakThreeTimes() {\n    d.Sound = fmt.Sprintf(\"%v %v %v\", d.Sound, d.Sound,\
  \ d.Sound)\n    fmt.Println(d.Sound)\n}\n清单 2-54\n带有返回值的方法\n```\n\n**输出：**\n\n```\n\
  {贵宾犬 10 汪！}\n{Breed:贵宾犬 Weight:10 Sound:汪！}\n品种：贵宾犬\n体重：10\n汪！\n嗷！\n嗷！嗷！嗷！\n```\n\
  \n请注意，当你将 `dog` 对象作为接收者传递给函数时，会创建该对象的一个副本，即这是传值而非传引用。如果你希望按引用传递，可以使用指针。但在函数内部，这是该对象的一个全新副本。因此，当你修改\
  \ `sound` 字段时，你并没有修改在 `main` 函数中创建的原始版本。能够为自定义类型创建方法，使得 Go 编程语言的行为更接近完整的面向对象语言。即使没有\
  \ C++ 和 Java 中的那种类型继承机制，结构体也可以拥有任意数量的不同方法，以满足应用的需求。\n\n## 读写文本文件\n\n在 Go 中创建文件有多种方式。这些方式是对所需底层操作的高层抽象。\n\
  \n### 写入文本文件\n\n清单 2-55 中的示例演示了如何在 Go 中向文件写入内容。`checkError()` 函数将在整个程序中用于错误检查。该函数会检查传递给它的对象，如果对象不为\
  \ `nil`（即主程序中执行某些操作时发生错误），则函数将使应用崩溃并显示错误消息。\n\n在 `main()` 函数中，`content` 变量保存要写入\
  \ `fromString.txt` 文件的字符串值。在 `main()` 函数的第 2 行，我们创建了一个名为 `file` 的文件引用，它本质上是一个用作文件引用的变量。与此同时，我们还指定了一个名为\
  \ `err` 的变量，用于存储 `os.Create()` 函数返回的错误消息。`Create()` 函数接受数据应写入的文件位置作为参数。此外，如果指定文件不存在，它会创建该文件；如果文件已存在，则会清空文件内容。这里的\
  \ `./` 表示该文件与应用程序位于同一目录。\n\n在 `main()` 函数的第 4 行，`length` 变量存储了 `WriteString()` 函数返回的写入文件的字节数。`WriteString()`\
  \ 函数需要一个写入器对象和一个字符串，这里我们将 `file` 作为写入器，并将 `content` 变量作为要写入文件的字符串传入。在处理文件时，操作完成后关闭打开的文件至关重要。`defer`\
  \ 关键字会等待其他所有操作完成后再执行此命令。我们使用 `defer` 关键字编写了 `file.Close()` 命令，以确保所有操作完成后，`file`\
  \ 引用对象所引用的文件被关闭。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"io\"\n \
  \   \"io/ioutil\"\n)\n\nfunc main() {\n    content := \"来自 Go 的问候！\"\n    file,\
  \ err := os.Create(\"./fromString.txt\")\n    checkError(err)\n    defer file.Close()\n\
  \    length, err := io.WriteString(file, content)\n    checkError(err)\n    fmt.Printf(\"\
  已写入一个包含 %v 个字符的文件\\n\", length)\n}\n\n/* checkError 是用于错误检查的函数 */\nfunc checkError(err\
  \ error) {\n    if err != nil {\n        panic(err)\n    }\n}\n清单 2-55\n演示如何在 Go\
  \ 中写入文本文件的程序\n```\n\n**输出：**\n\n![](img/536365_1_En_2_Figb_HTML.jpg)\n\n程序输出的屏幕截图显示“来自\
  \ Go 的问候。”。\n\n```\n已写入一个包含 14 个字符的文件\n```\n\n\n\n### 读取文本文件\n\n在本节中，为了说明如何在 Go\
  \ 中实现从文本文件读取数据，如代码清单 2-56 所示，我们在代码清单 2-55 的示例基础上进行了修改，添加了一个名为 `readFile()` 的自定义函数，该函数将文件名作为输入。每当读取文件时，它总是以字节数组的形式返回。代码清单\
  \ 2-56 中的 `data` 变量将保存返回的字节。同样，`err` 对象会检查是否抛出了错误。`ReadFile()` 函数是 `ioutil` 包中的一个内置函数，可用于读取作为参数传递的文件名所指定的任何文件。作为输出，它返回读取到的文件内容。成功执行\
  \ `ReadFile()` 后，错误值会返回 `nil` 而不是 `EOF`。这是因为 `ReadFile()` 函数会将整个文件作为输入读取，并且不会将从\
  \ `Read()` 函数返回的 `EOF` 视为错误。在 `readFile()` 函数的最后一行，使用 `string(data)` 语句将作为字节接收到的文件内容类型转换为字符串，以便在屏幕上显示。在\
  \ `main()` 函数中，我们再次使用了 `defer` 关键字，然后调用了 `readFile()` 函数，并将我们要读取的文件传递给它。在处理任何可能不会在当前线程中自动运行的内容时，使用\
  \ `defer` 关键字非常重要。此外，如果你想等到文件完全关闭后再尝试读取它，`defer` 关键字可以帮你实现这一点。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"io\"\n\"io/ioutil\"\n\"os\"\n)\nfunc main() {\ncontent := \"\
  Hello from Go!\"\nfile, err := os.Create(\"./fromString.txt\")\ncheckError(err)\n\
  length, err := io.WriteString(file, content)\ncheckError(err)\nfmt.Printf(\"Wrote\
  \ a file with %v characters\\n\", length)\nreadFile(file.Name())\ndefer file.Close()\n\
  }\n// readFile 是一个用于读取文本文件内容的函数\nfunc readFile(fileName string) {\ndata, err :=\
  \ ioutil.ReadFile(fileName)\ncheckError(err)\nfmt.Println(\"Text read from file:\
  \ \", string(data))\n}\n// checkError 是一个用于错误检查的函数\nfunc checkError(err error) {\n\
  if err != nil {\npanic(err)\n}\n}\n代码清单 2-56\n在 Go 中从文本文件读取内容\n```\n\n**输出：**\n\n\
  ```\nWrote a file with 14 characters\nHello from Go!\n```\n\n## HTTP 包\n\n为了帮助程序员构建能够有效与不同\
  \ Web 应用和服务进行通信的应用程序，Go 编程语言提供了大量不同的工具，其中之一就是 `http` 包。`http` 包允许你通过创建请求和发送数据来轻松地与远程主机通信。它还有助于创建能够监听并响应接收到的请求的\
  \ HTTP 服务器应用程序。代码清单 2-57 中的示例演示了 `http` 包的用法。\n\n在代码清单 2-57 中，向远程主机发送了一个请求以获取一些数据。这里，我们希望将名为\
  \ `url` 的变量所指定页面的 JSON 内容下载到本地开发机器上。为此，第一步是导入 `net/http` 和 `ioutil` 包。要下载内容，请使用\
  \ `http` 包中的 `get()` 函数。`get()` 函数会返回一个响应对象以及一个 `error` 对象。`resp` 变量用于存储返回的响应对象。当你打印\
  \ `resp` 变量的内容时，会得到一个指向名为 `response` 的对象的指针。请注意，它是 `http` 包的成员。`response` 对象有一个名为\
  \ `body` 的公共字段，其中包含了你打算下载的 JSON 数据包。与处理文件类似，在读取完 body 的内容后，应使用 `defer` 关键字配合 `resp.Body.Close()`\
  \ 命令来关闭 body。\n\n接收到的内容以字节数组的形式提供。为了存储它，请使用 `bytes` 变量。`ioutil.ReadAll(resp.Body)`\
  \ 读取 `resp.Body` 的内容。由于返回的内容是字节数组，你需要将其类型转换为 `string` 才能打印到屏幕上，方法是通过 `string(bytes)`\
  \ 命令将 `bytes` 变量包裹在 string 类型中。\n\n```\npackage main\nimport (\n\"fmt\"\n\"io/ioutil\"\
  \n\"net/http\"\n)\nconst url = \"http://services.explorecalifornia.org/json/tours.php\"\
  \nfunc main() {\nfmt.Println(\"Network Requests Demo\")\nresponse, err := http.Get(url)\n\
  if err != nil {\npanic(err)\n}\nfmt.Printf(\"Response Type: %T\\n\", response)\n\
  defer response.Body.Close()\nbytes, err := ioutil.ReadAll(response.Body)\nif err\
  \ != nil {\npanic(err)\n}\ncontent := string(bytes)\nfmt.Print(content)\n}\n代码清单\
  \ 2-57\n展示在 Go 中使用 HTTP 包的基础程序\n```\n\n**输出：**\n\n![](img/536365_1_En_2_Figc_HTML.jpg)\n\
  \nGo 程序输出的截图。\n\n\n\n## JSON\n\n对网络服务发起请求时，响应返回的数据通常以 JSON 格式编码。为方便处理网络服务与 API，Go\
  \ 通过 `json` 包提供了对 JSON 格式数据的支持。`json` 包让你能轻松创建和读取 JSON 格式的文本。上一节中，你已学习如何从网络服务获取\
  \ JSON 数据。本节将学习如何解析 JSON 数据，并将其格式化为 Go 应用程序可用的结构化数据。清单 2-58 演示了如何解析 JSON 数据并格式化为结构化数据，它从接收的\
  \ JSON 数据中解析了旅游线路名称和价格。\n\n在清单 2-58 中，首先创建了一个名为 `Tour` 的新自定义类型，它是一个包含两个 `string`\
  \ 类型成员字段 `Name` 和 `Price` 的结构体。注意，为了使这些字段名称公开，它们以大写字母开头。另外请注意，JSON 内容中的标签均使用小写。但\
  \ JSON 解码器不受此影响，因为它能轻松将这些标签与结构体成员匹配。本示例中，我们导入了 [`encoding/json`](https://pkg.go.dev/encoding/json)\
  \ (https://pkg.go.dev/encoding/json)、[`io/ioutil`](https://pkg.go.dev/io/ioutil)\
  \ (https://pkg.go.dev/io/ioutil)、[`net/http`](https://pkg.go.dev/net/http) (https://pkg.go.dev/net/http)\
  \ 和 [`strings`](https://pkg.go.dev/strings) (https://pkg.go.dev/strings) 等包。\n\n\
  `toursFromJson()` 函数是一个自定义函数，用于解码 HTTP 响应中 JSON 格式的正文内容。它接受一个参数，即从网站获取的 JSON 格式字符串。该函数将以结构化数据的形式返回这些值，具体来说，是一个包含\
  \ `tour` 对象实例的切片。\n\n在 `toursFromJson()` 函数内部，第一步是创建一个 `tour` 对象切片 `tour`。`tour`\
  \ 切片初始大小设为 0，初始容量为 20。注意，20 仅为推测值，并非可能获取的对象精确数量。由于切片可以动态调整大小，无需预先分配过大的初始容量。内置函数\
  \ `NewDecoder()` 返回一个解码器，它将从传入的读取器对象中读取数据。`NewReader()` 返回一个读取器，从传入的字符串中读取数据。`Token()`\
  \ 函数返回输入流中的下一个 JSON 令牌。\n\n为了将 JSON 格式文本转换为 `tour` 对象切片，声明一个名为 `tours` 的变量，并将其类型设置为\
  \ `Tour`。接着使用一个 `while` 风格的 `for` 循环；`decoder.More()` 函数报告当前数组中是否还有其他元素，或是否有其他对象正在被解析。在\
  \ `for` 循环内，解码器对象的 `Decode()` 函数从其输入中读取下一个 JSON 编码值，并将其存储到传入参数所指向的值中。此处传入 `tour`\
  \ 对象的内存地址。然后，通过 `append()` 函数将 `tour` 对象添加到 `tours` 切片。最后，函数返回 `tours` 对象。\n\n```\n\
  package main\nimport (\n\"encoding/json\"\n\"fmt\"\n\"io/ioutil\"\n\"net/http\"\n\
  \"strings\"\n)\nconst url = \"http://services.explorecalifornia.org/json/tours.php\"\
  \nfunc main() {\nresp, err := http.Get(url)\nif err != nil {\npanic(err)\n}\nfmt.Printf(\"\
  Response Type: %T\\n\", resp)\ndefer resp.Body.Close()\nbytes, err := ioutil.ReadAll(resp.Body)\n\
  if err != nil {\npanic(err)\n}\ncontent := string(bytes)\ntours := toursFromJson(content)\n\
  for _, tour := range tours {\nfmt.Println(tour.Name, \"  \", tour.Price)\n}\n}\n\
  func toursFromJson(content string) []Tour {\ntours := make([]Tour, 0, 20) //slice\
  \ of Tour array with initial size 0 and capacity 20\ndecoder := json.NewDecoder(strings.NewReader(content))\n\
  _, err := decoder.Token()\nif err != nil {\npanic(err)\n}\nvar tour Tour\nfor decoder.More()\
  \ {\nerr := decoder.Decode(&tour)\nif err != nil {\npanic(err)\n}\ntours = append(tours,\
  \ tour)\n}\nreturn tours\n}\ntype Tour struct {\nName, Price string\n}\n清单 2-58\n\
  Go 中处理 JSON 数据的基础程序示例\n```\n\n**输出：**\n\n```\n2 Days Adrift the Salton Sea    350\n\
  A Week of Wine    850\nAmgen Tour of California Special    6000\nAvila Beach Hot\
  \ springs    1000\nBig Sur Retreat    750\nChannel Islands Excursion    150\nCoastal\
  \ Experience    1500\nCycle California: My Way    1200\nDay Spa Package    550\n\
  Endangered Species Expedition    600\nFossil Tour    500\nHot Salsa Tour    400\n\
  Huntington Library and Pasadena Retreat Tour    225\nIn the Steps of John Muir \
  \   600\nJoshua Tree: Best of the West Tour    150\nKids L.A. Tour    200\nMammoth\
  \ Mountain Adventure    800\nMatilija Hot springs    1000\nMojave to Malibu    200\n\
  Monterey to Santa Barbara Tour    2500\nMountain High Lift-off    800\nOlive Garden\
  \ Tour    75\nOranges & Apples Tour    350\nRestoration Package    900\nThe Death\
  \ Valley Survivor's Trek    250\nThe Mt. Whitney Climbers Tour    650\n```\n\n##\
  \ 总结\n\n本章涵盖了入门 Go 编程所需的基础编程知识，内容包括如何安装 Go 编译器与各种可用的 IDE、Go 的程序结构，直至编程概念。你还深入学习了如何使用不同的数据结构与编程特性，例如变量、用户输入处理、可用的数学运算符与包、内存管理与值引用，以及指针的使用。你掌握了如何使用数组与切片管理有序的值，如何利用映射存储键值对，以及如何通过结构体定义自定义类型。\n\
  \n程序流程管理是编程的关键点，本章还指导你如何使用不同的条件语句（如 `if`、`if..else`、`switch` 和 `goto`）控制流程。你还学习了\
  \ Go 中唯一可用的循环类型，并了解如何灵活运用它来实现预期结果。\n\n函数是模块化编程的重要组成部分。本章还介绍了如何在 Go 中使用自定义函数，以及如何为切片附加方法。程序的另一项重要能力是读写文件，本章也提供了相关详细说明。此外，还讲解了如何使用\
  \ HTTP 包和处理 JSON 数据，这有助于程序员构建能有效与不同网络应用和服务通信的应用程序。\n\n在接下来的章节中，你将基于实际场景学习 Go 实战方案，以便更深入地理解本章涵盖的概念。\n\
  \n"
- '# Go 实战方案：编程基础与入门


  Go 是一门出色的语言。它紧凑、高效，并对并发有良好的支持。本章涵盖常见的编程任务，并展示完成这些任务的解决方案。内容包括语言基础、日期/时间类型、如何高效处理文本文件、如何使用结构体，以及如何处理并发。




