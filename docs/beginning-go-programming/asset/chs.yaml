  \ 未使用 Goroutine 的顺序代码\n\n**输出:**\n\n```\ndistance=2532096.00, duration=1.7266259s\n\
  ```\n\n在清单 8-2 中，`monthDistance()`函数计算并返回指定月份（作为函数输入参数）的总骑行距离。在该函数内部，使用`for`循环遍历同月的每一天，并构建当天的\
  \ URL。然后，使用`http.Get()`函数生成请求以获取数据。此外，还执行了一些错误检查，以判断收到的响应是否正常。如果一切正常，则计算`totalDistance`并进入下一天。`for`循环会持续进行，直到月末。\n\
  \n清单 8-2 中的代码非常简单，大约在两秒内完成。但是，如果两秒不够快，你可以修改代码使其并发执行。让我们将这个顺序执行的代码转换为并发版本，如清单 8-2\
  \ 所示。为了实现并发，我们计划每天运行一个`goroutine`。这是通过将顺序算法拆分为两部分来实现的：第一部分是生成工作或启动工作者（worker）；第二部分是收集结果。\n\
  \n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"net/http\"\n\t\"time\"\
  \n)\n\nconst timeFmt = \"2006-01-02T15:04:05\"\n\nfunc handler(w http.ResponseWriter,\
  \ r *http.Request) {\n\ts := r.URL.Path[1:] // 去掉前导斜杠 /\n\tday, err := time.Parse(\"\
  2006-01-02\", s)\n\tif err != nil {\n\t\tmsg := fmt.Sprintf(\"错误日期格式: %q\", s)\n\
  \t\tlog.Printf(\"error: %s\", msg)\n\t\thttp.Error(w, msg, http.StatusBadRequest)\n\
  \t\treturn\n\t}\n\tfmt.Fprintf(w, \"start,end,distance,passengers\\n\")\n\tstart\
  \ := day\n\tnextDay := day.Add(24 * time.Hour)\n\tfor start.Before(nextDay) {\n\t\
  \tstart = start.Add(3 * time.Second)\n\t\tend := start.Add(17 * time.Second)\n\t\
  \tdistance := 3.14\n\t\tpassengers := 1\n\t\tfmt.Fprintf(w, \"%s,%s,%.2f,%d\\n\"\
  , start.Format(timeFmt), end.Format(timeFmt), distance, passengers)\n\t}\n}\n\n\
  func main() {\n\thttp.HandleFunc(\"/\", handler)\n\tif err := http.ListenAndServe(\"\
  :8080\", nil); err != nil {\n\t\tlog.Fatal(err)\n\t}\n}\n```\n\n**清单 8-3** 使用 Goroutine\
  \ 的并发代码\n\n**输出:**\n\n```\ndistance=2532096.00, duration=1.0311312s\n```\n\n在`monthDistance()`函数内部，第一条语句用于启动工作者。你需要指定要创建的工作者数量以及一个用于获取结果的通道（channel）。关键字`chan`用于创建通道。对于每一天，你启动一个工作者，递增工作者计数，然后进入下一天。`dateWorker()`函数会返回一个结果，指示发生了什么。由于结果返回的顺序是不确定的，你需要在结果中返回尽可能多的信息。因此，与之前的顺序代码不同，现在你使用`result`结构体返回日期、距离以及任何错误。\n\
  \n`result{date: date}`语句使用指定的日期初始化一个结果。`defer`函数会将结果发送回通道。请注意，通道是一种类型化的管道，你可以通过通道操作符`<-`发送和接收值。然后，你创建\
  \ URL，检查错误，最后将日期和错误添加到结果中。\n\n回到并发算法的第二部分，在`monthDistance()`函数中，你需要收集结果。首先，将总距离初始化为\
  \ 0，并遍历所有工作者（数量）。然后，使用通道操作符（`<-`）从通道读取结果。如果出现任何错误，则返回错误；否则更新距离。最后，返回`totalDistance`。\n\
  \n运行这段并发代码后，你会注意到运行时间显著缩短；例如，从 1.7 秒降至 1 秒。这相当于性能提升了 58.8%。请注意，不同机器上的运行时间会有所不同。\n\
  \n## 使用带有共享资源的 Goroutines\n\n尽管`goroutine`让你能够轻松执行并发操作，但在使用访问共享资源（如变量）的`goroutine`时必须非常小心。例如，两个不同的`goroutine`可能同时访问同一个变量，其中一个可能向该变量的值做加法，而另一个做减法。确保当一个`goroutine`正在修改变量时，另一个`goroutine`无法访问该变量，直到第一个`goroutine`完成修改，这一点至关重要。本节将涵盖当多个`goroutine`试图同时访问共享资源时出现的各种问题，并介绍用于解决这些问题的不同技术。\n\
  \n\n### 查看共享资源对协程的影响\n\n为了查看共享资源对协程的影响，请参考清单 8-4 中的程序。在此示例程序中，有一个名为 `balanceAmount`\
  \ 的全局变量，以及两个函数 `creditToBalance` 和 `debitFromBalance`，它们会同时作为协程被调用。`creditToBalance`\
  \ 函数向 `balanceAmount` 加 1000，而 `debitFromBalance` 函数则从中减 1000。\n\n```go\npackage\
  \ main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\nvar balanceAmount int\nfunc\
  \ creditToBalance() {\nfor i := 0; i < 5; i++ {\nbalanceAmount += 1000\ntime.Sleep(time.Duration(rand.Intn(100))\
  \ *\ntime.Millisecond)\nfmt.Println(\"余额增加后： \", balanceAmount)\n}\n}\nfunc debitFromBalance()\
  \ {\nfor i := 0; i < 5; i++ {\nbalanceAmount -= 1000\ntime.Sleep(time.Duration(rand.Intn(100))\
  \ *\ntime.Millisecond)\nfmt.Println(\"余额减少后： \", balanceAmount)\n}\n}\nfunc main()\
  \ {\nbalanceAmount = 3000\nfmt.Println(\"初始余额： \", balanceAmount)\ngo creditToBalance()\n\
  go debitFromBalance()\nfmt.Scanln()\n}\n清单 8-4\n演示共享资源对协程影响的 Go 示例\n```\n\n**输出：**\n\
  \n```\n初始余额：  3000\n余额增加后：  3000\n余额减少后：  3000\n余额增加后：  3000\n余额减少后：  4000\n余额减少后：\
  \  3000\n余额减少后：  2000\n余额增加后：  1000\n余额减少后：  2000\n余额增加后：  2000\n余额增加后：  3000\n\
  ```\n\n当你执行清单 8-4 时，你会发现输出结果并不符合预期，并且存在错误。第一个明显的错误出现在输出结果的第二行。仔细一看，你会发现第一行显示的初始余额是\
  \ 3000，这是正确的。但第二行的余额本应是 4000，却显示了 3000，这是错误的。这是因为在 `creditToBalance()` 函数中，当 1000\
  \ 被加到 `balanceAmount`（即更新为 4000）后，在将更新后的 `balanceAmount` 值显示到控制台之前，会有一段随机的时间延迟。这个延迟是由以下语句导致的：\n\
  \n```go\ntime.Sleep(time.Duration(rand.Intn(100))*time.Millisecond)\n```\n\n`debitFromBalance()`\
  \ 函数利用这个延迟从 `balanceAmount` 中减去了 1000，将其值更新为 3000。当 `creditToBalance()` 恢复任务去打印\
  \ `balanceAmount` 中存储的值时，显示的便是 3000 而非 4000。尽管最后打印的 `balanceAmount` 值是 3000，但这个程序仍然不能被认为是安全的，因为执行过程中打印的值是错误的。此外，由于对同一资源的访问，`balanceAmount`\
  \ 变量会进入不一致的状态。\n\n### 使用互斥锁访问共享资源\n\n如前所述，只要多个协程同时访问同一个共享资源，确保一次只有一个协程能访问该资源就至关重要。为了避免资源进入不一致状态和出现竞态条件，互斥（也称为\
  \ *mutex*）的概念便应运而生。\n\nGo 语言通过 `sync` 包中的 `mutex` 类型来支持互斥。在 Go 中，`mutex` 提供了必要的锁机制，以确保不会发生竞态条件。它确保在任何时间点，只有一个协程在代码的临界区中运行。所谓临界区，是指代码中两个或多个协程不能同时执行的任何部分。当一个协程获得了互斥锁时，其他协程必须等待，直到该锁被释放才能访问共享资源。让我们修改上一小节的程序，通过使用\
  \ `mutex` 类型来演示互斥的概念。\n\n清单 8-5 演示了如何使用 `mutex` 对象来封装代码的临界区。这确保当一个协程正在执行一个代码块时，没有其他代码块可以执行。\n\
  \n```go\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n\"sync\"\n\"time\"\n)\n\
  var balanceAmount int\nvar mutex = &sync.Mutex{}\nfunc creditToBalance() {\nfor\
  \ i := 0; i < 5; i++ {\nmutex.Lock()\nbalanceAmount += 1000\ntime.Sleep(time.Duration(rand.Intn(100))\
  \ * time.Millisecond)\nfmt.Println(\"余额增加后： \", balanceAmount)\nmutex.Unlock()\n\
  }\n}\nfunc debitFromBalance() {\nfor i := 0; i < 5; i++ {\nmutex.Lock()\nbalanceAmount\
  \ -= 1000\ntime.Sleep(time.Duration(rand.Intn(100)) * time.Millisecond)\nfmt.Println(\"\
  余额减少后： \", balanceAmount)\nmutex.Unlock()\n}\n}\nfunc main() {\nbalanceAmount =\
  \ 3000\nfmt.Println(\"初始余额： \", balanceAmount)\ngo creditToBalance()\ngo debitFromBalance()\n\
  fmt.Scanln()\n}\n清单 8-5\n使用互斥锁访问共享资源的 Go 示例\n```\n\n**输出：**\n\n```\n初始余额：  3000\n\
  余额增加后：  4000\n余额增加后：  5000\n余额减少后：  4000\n余额减少后：  3000\n余额增加后：  4000\n余额增加后：  5000\n\
  余额减少后：  4000\n余额减少后：  3000\n余额增加后：  4000\n余额减少后：  3000\n```\n\n在这段代码中，`Lock()` 和\
  \ `Unlock()` 是内置函数，可以与 `mutex` 类型的对象一起使用，并标记程序临界区的开始和结束。当一个协程获取了 `mutex` 锁后，所有其他协程都被禁止执行任何受该\
  \ `mutex` 保护的代码。因此，它们被迫等待，直到该锁被释放。所以，这个程序的输出正如你所预期的那样。\n\n\n\n### 使用原子计数器修改共享资源\n\
  \n除了使用 `mutex` 类型标记程序的临界区之外，Go 还提供了一些机制，使你能够以线程安全的方式修改共享变量。这些机制被称为*原子计数器*。原子计数器是一种例程，允许你一次在一个线程上对变量执行数学运算。Go\
  \ 提供了 `sync/atomic` 包，其中包含不同的低级原子内存原语，在实现同步算法时非常有用。然而，需要非常小心才能确保这些函数被正确使用。除了一些特定的低级应用程序外，通常建议使用通道或\
  \ `sync` 包提供的功能来编写同步算法。\n\n让我们看一个示例，学习如何在 Go 程序中使用 `atomic` 包。假设你托管了一个 Web 服务器，供多人上传文件。假设你想跟踪上传到服务器的数据量。为了完成这个任务，可以使用\
  \ `sync/atomic` 包。与 `sync.Mutex` 相比，`sync/atomic` 包含不同的低级原语，其在性能和使用上都更快。\n\n如 8-6\
  \ 所示，此程序首先声明了 `uint64` 类型的变量 `totalSize`。这用于存储总上传大小。注意，当使用 `sync/atomic` 包时，你必须非常明确类型的大小。不能使用通用类型，例如这里的\
  \ `int` 或 `uint`。在 `uploadHandler()` 处理函数内部，你推迟关闭响应对象主体的操作，然后读取数据，再发出错误信号。为了更新 `totalSize`，调用了\
  \ `atomic.AddUint64()`。它接受指向 `totalSize` 的指针作为输入，并将数据长度转换为 `uint64`。在此转换过程中不需要加锁，因为它非常快，并且由\
  \ `sync/atomic` 自动完成。在 `main()` 中，你设置处理函数，并使用 `http.ListenAndServe()` 启动一个具有给定地址和处理函数的\
  \ HTTP 服务器。如果你要暴露指标，请考虑使用 `expvar` 包。它不仅允许你自动递增计数器，还可以将它们暴露给 Web。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"io/ioutil\"\n\"log\"\n\"net/http\"\n\"sync/atomic\"\
  \n)\nvar totalSize uint64\nfunc uploadHandler(w http.ResponseWriter, r *http.Request)\
  \ {\ndefer r.Body.Close()\ndata, err := ioutil.ReadAll(r.Body)\nif err != nil {\n\
  http.Error(w, err.Error(), http.StatusBadRequest)\nreturn\n}\nsize := atomic.AddUint64(&totalSize,\
  \ uint64(len(data)))\n//TODO: work with data\nfmt.Fprintf(w, \"size=%d\\n\", size)\n\
  }\nfunc main() {\nhttp.HandleFunc(\"/upload\", uploadHandler)\nif err := http.ListenAndServe(\"\
  :8080\", nil); err != nil {\nlog.Fatal(err)\n}\n}\n```\n\n**清单 8-6** 使用原子计数器修改共享资源的\
  \ Go 方案\n\n## 同步协程\n\n当多个协程同时运行时，同步这些协程以确保程序执行被协调非常重要。例如，程序中可能有两个协程负责从不同的 Web 服务获取数据，你必须确保这两个协程在执行下一个代码块之前都完成执行。在这种情况下，必须有一些机制来指示这些协程何时完成执行。\n\
  \n如果你查看 8-6 中的以下代码片段，你会注意到 `main()` 函数末尾的 `fmt.Scanln()` 语句。\n\n```\nfunc main()\
  \ {\nbalanceAmount = 3000\nfmt.Println(\"Initial balance: \", balanceAmount)\ngo\
  \ creditToBalance()\ngo debitFromBalance()\nfmt.Scanln()\n}\n```\n\n如果将 `fmt.Scanln()`\
  \ 语句从 8-6 中移除，那么在调用两个协程之后，`main()` 函数会立即退出，打印出的余额并非正确的最终结果，如图 8-2 所示。\n\n![](img/536365_1_En_8_Fig2_HTML.jpg)\n\
  \n一幅插图展示了代码，其显示了在代码末尾不添加 Scanln 的效果。代码显示为：dollar go run mutex-1.go，初始余额：3000。\n\n\
  **图 8-2** 不在代码末尾添加 `Scanln` 的效果\n\n当多个协程同时运行，并且需要知道它们何时完成执行时，这被称为*等待组*，将在下一节中解释。\n\
  \n\n\n### `sync.WaitGroup` 与 `sync.Once`\n\n基本的同步原语，例如互斥锁（mutex），由`sync`包提供。请注意，除了`Once`和`WaitGroup`之外，大多数同步原语类型都旨在供底层库例程使用。更高级别的同步则通过通信和通道来实现。\n\
  \n`Once`类型对象定义在`sync`包中，旨在确保某个操作**只执行一次**。另一方面，`WaitGroup`用于等待一组 goroutine 完成执行。内置的`Add()`函数用于设置需要等待的\
  \ goroutine 数量。属于某个等待组的每个 goroutine 都会调用`Done()`函数来表明它们已执行完毕。当等待组中的 goroutine 正在运行时，`Wait()`函数可用于阻塞，直到所有\
  \ goroutine 都执行完毕。请注意，`WaitGroup`和`Once`在首次使用后不应被复制。\n\n让我们来看一个在 Go 程序中使用这两种类型的示例。假设你有一段代码，可以将服务器更新到应用程序的新版本。你不想逐个更新服务器，而是希望并发地更新所有服务器，并等待所有更新完成。代码清单\
  \ 8-7 展示了`updateAll()`函数，它接收一个版本字符串，并通过通道获取主机列表。假设你事先不知道需要更新多少个主机。在函数内部，首先创建一个`WaitGroup`。然后，对于通道中的每个主机，递增`WaitGroup`中的计数器（即`waitgroup1`），并启动一个\
  \ goroutine，该 goroutine 将通过调用`waitgroup1.Done()`来递减计数器。接着，调用`update()`函数来运行更新服务器的代码。请记住，`defer`会在函数退出时被调用，因此会先调用对象，然后调用`defer`。`waitgroup1.Wait()`函数意味着你将一直等待，直到`WaitGroup`中定义的所有\
  \ goroutine 都执行完毕。\n\n```\nfunc updateAll(version string, hosts <-chan string) {\n\
  var waitgroup1 sync.WaitGroup\nfor host:=range hosts{\nwaitgroup1.Add(1)\ngo func(host,\
  \ version string){\ndefer waitgroup1.Done()\nupdate(host, version)\n}(host, version)\n\
  }\nwaitgroup1.Wait()\n}\n代码清单 8-7\n使用 WaitGroup 的 Go 方案\n```\n\n单个`WaitGroup`不会返回错误；如果你必须从\
  \ goroutine 中获取错误值，可以使用外部的`errGroup`包来克服这一限制。当多个 goroutine 组正在执行一个共同任务的子任务时，`errgroup`包会非常有用。它提供了诸如`Context`取消、错误传播和同步等功能。\n\
  \n让我们来看一个在 Go 程序中使用`errgroup`包的示例。假设你托管了一个系统，允许多个用户相互发送消息。有时他们需要计算与消息关联的数字签名，但这种情况非常罕见，因为计算可能很耗时，所以只需要计算一次。代码清单\
  \ 8-8 展示了一个实现此目标的示例 Go 程序。\n\n在代码清单 8-8 中，首先定义了一个名为`Message`的结构体，它包含三个成员字段：`Content`（`string`类型）、`once`（`sync.Once`类型变量）以及`sig`（`string`类型，用于缓存签名，初始为空）。\n\
  \n当调用`Signature()`函数时，它接收一个指向消息的指针作为输入，并返回该消息的数字签名。由于你只想计算一次签名，因此调用消息的成员字段，然后调用内置的`Do()`函数来调用`calcSig()`函数以计算签名。`m.once.Do(m.calcSig)`语句将只调用`calcSig()`函数一次。之后再调用它则不会执行任何操作。这个特性也被称为*幂等性*。在`calcSig()`函数中，使用`sha1.New()`函数创建一个新的哈希。接着，将内容复制到包含`sha1`哈希的变量中，最后将消息的`sig`字段设置为缓存的签名。会打印出`\"\
  Calculating Signature\"`消息，然后打印签名。当你第二次调用时，只会看到输出结果。\n\n```\npackage main\nimport\
  \ (\n\"crypto/sha1\"\n\"fmt\"\n\"io\"\n\"log\"\n\"strings\"\n\"sync\"\n)\ntype Message\
  \ struct {\nContent string\nonce sync.Once\nsig  string //cached signature\n}\n\
  //Signature returns the digital signature of the message\nfunc (m *Message) Signature()\
  \ string {\nm.once.Do(m.calcSig)\nreturn m.sig\n}\nfunc (m *Message) calcSig() {\n\
  log.Printf(\"Calculating signature\")\nh := sha1.New()\nio.Copy(h, strings.NewReader(m.Content))\n\
  m.sig = fmt.Sprintf(\"%x\", h.Sum(nil))\n}\nfunc main() {\nm := Message{\nContent:\
  \ \"There is nothing more deceptive than an obvious fact.\",\n}\nfmt.Println(m.Signature())\n\
  fmt.Println(m.Signature())\n}\n代码清单 8-8\n使用 errgroup 的 Go 方案\n```\n\n**/*输出：**\n\
  \n```\n2022/02/21 19:59:34 Calculating signature\n93c80b92baa010458540914c7324adb9e86f0eca\n\
  93c80b92baa010458540914c7324adb9e86f0eca\n*/\n```\n\n\n\n## Go 语言中的超时处理\n\n当程序连接到外部资源，或者需要限制执行时间时，超时处理扮演着非常重要的角色。得益于通道（channel）和\
  \ `select` 语句，在 Go 中实现超时非常容易。本节将介绍在 Go 程序中实现超时的方案。\n\n假设你需要编写一个用于参与实时竞价（RTB）的软件。假设你需要在\
  \ 10 毫秒内对随时可能到达的出价请求做出回应。假设你的团队已经编写了一个算法，可以为给定的 URL 找到最优出价。然而，该算法有时会在寻找最优出价上花费过多时间。当算法未能及时完成时，将返回一个默认出价。\n\
  \n```\npackage main\n\nimport (\n    \"context\"\n    \"fmt\"\n    \"log\"\n   \
  \ \"time\"\n)\n\ntype Bid struct {\n    Price float64\n    URL   string\n}\n\nvar\
  \ (\n    defaultBid = Bid{\n        Price: 0.02,\n        URL:   \"https://j.mp/3cbDsIY\"\
  ,\n    }\n    bidTimeout = 10 * time.Millisecond\n)\n\nfunc bidOn(ctx context.Context,\
  \ url string) Bid {\n    ch := make(chan Bid, 1)\n    go func() {\n        ch <-\
  \ bestBid(url)\n    }()\n    select {\n    case bid := <-ch:\n        return bid\n\
  \    case <-ctx.Done():\n        log.Printf(\"对 %q 的出价已超时，返回默认值\", url)\n      \
  \  return defaultBid\n    }\n}\n\nfunc main() {\n    ctx, cancel := context.WithTimeout(context.Background(),\
  \ bidTimeout)\n    defer cancel()\n    bid := bidOn(ctx, \"https://353solution.com\"\
  )\n    fmt.Println(bid)\n    ctx, cancel = context.WithTimeout(context.Background(),\
  \ bidTimeout)\n    defer cancel()\n    bid = bidOn(ctx, \"https://google.com\")\n\
  \    fmt.Println(bid)\n}\n```\n\n清单 8-9：Go 超时处理方案\n\n**输出：**\n\n```\n{0.35 https://j.mp/3f3Dpkb}\n\
  2022/02/22 15:46:00 对 \"https://example.com\" 的出价已超时，返回默认值\n{0.02 https://j.mp/3f3Dpkb}\n\
  ```\n\n**注意：** `bestBid()` 函数的代码未提供，因为它超出了本书的范围。\n\n在清单 8-9 中，你首先声明了一个名为 `Bid` 的结构体，其成员字段为\
  \ `Price` 和 `URL`。你还定义了一个要返回的默认出价值和默认的出价超时时间。`bidOn()` 函数接收一个包含出价超时信息的上下文对象（context）和一个字符串类型的\
  \ URL 作为输入。`bidOn()` 函数的第一步是创建一个通道。为了确保没有 goroutine 泄漏，这个通道是带缓冲的。之后，启动一个负责调用 `bestBid()`\
  \ 函数的 goroutine。`select` 语句允许一个 goroutine 在多个不同的通信操作上等待，它会阻塞直到其中一个关联的 case 可以运行，然后执行该特定的\
  \ case。当多个 case 都准备好运行时，`select` 语句会随机选择一个执行。这段代码使用 `select` 语句指定了两个 case。第一个 case\
  \ 在 `bestBid()` 及时完成时执行，并返回出价。否则，如果在获得结果之前上下文已完成，则会记录错误并返回默认值。\n\n在 `main()` 函数中，有两个示例。你首先使用\
  \ `WithTimeout()` 创建上下文，使用 `context.Background()` 作为初始上下文，并使用默认的 `bidTimeout` 作为超时时间。`defer`\
  \ 关键字与 `cancel()` 一起使用，以确保在函数退出时取消上下文。第一个调用成功，但第二个失败了，因为该 URL 不是真实的。它超时并返回了默认值。\n\
  \n## Goroutine 池化\n\n有些任务是 CPU 密集型的，即更多时间花费在使用 CPU 上，而非等待网络。对于 CPU 密集型任务，运行比机器核心数更多的\
  \ goroutine 是徒劳的。当资源有限时，最好不为每个任务都启动一个独立的 goroutine，而是使用一个固定的 goroutine 池。本节将介绍在\
  \ Go 中处理工作者池（也称为线程池）的方案。\n\n让我们通过一个例子来看看 goroutine 池。假设你想计算多个向量的中位数。这可以通过使用 goroutine\
  \ 池来实现。在清单 8-10 中，`multiMedian()` 函数计算了多个向量的中位数。在 `multiMedian()` 函数中，第一步是创建 `WaitGroup`。在本例中，需要完成的任务数量就是向量的数量，因此你将这个值添加到\
  \ `WaitGroup` 中。然后创建一个通道，用于向工作者发送数据。为了查询当前进程可以使用的逻辑 CPU 数量，程序使用了 `runtime.NumCPU()`\
  \ 函数。接着在 `for` 循环中启动 `poolWorker()`。数据通过该通道发送给工作者池；它会等待直到所有任务完成。最后，当没有更多工作需要处理时，关闭该通道。\n\
  \n`poolWorker()` 函数接收一个 `float32` 切片类型的通道和一个 `WaitGroup` 作为输入。通过使用 `for` 循环，`poolWorker()`\
  \ 函数遍历给定通道中的值。当通道关闭时，这个 `for` 循环将终止。它计算中位数，将其打印出来，然后通过调用 `Done()` 函数来标记该特定任务已完成。一旦通道中没有更多值，程序会打印“`shutting\
  \ down`”消息，以指示该工作者正在关闭。\n\n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\
  \n    \"runtime\"\n    \"sync\"\n    \"time\"\n\n    \"github.com/montanaflynn/stats\"\
  \n)\n\nfunc multiMedian(vectors [][]float64) {\n    var wg sync.WaitGroup\n    wg.Add(len(vectors))\n\
  \    ch := make(chan []float64)\n\n    for i := 0; i < runtime.NumCPU(); i++ {\n\
  \        go poolWorker(ch, &wg)\n    }\n\n    for _, v := range vectors {\n    \
  \    ch <- v\n    }\n    close(ch)\n    wg.Wait()\n}\n\nfunc poolWorker(ch chan\
  \ []float64, wg *sync.WaitGroup) {\n    for values := range ch {\n        m, _ :=\
  \ stats.Median(values)\n        fmt.Printf(\"中位数 %v -> %f\", values, m)\n      \
  \  wg.Done()\n    }\n    log.Printf(\"正在关闭\")\n}\n\nfunc main() {\n    vectors :=\
  \ [][]float64{\n        {1.1, 2.2, 3.3},\n        {2.2, 3.3, 4.4},\n        {3.3,\
  \ 4.4, 5.5},\n        {4.4, 5.5, 6.6},\n        {5.5, 6.6, 7.7},\n    }\n    multiMedian(vectors)\n\
  \    time.Sleep(10 * time.Millisecond) // 让工作者终止\n    fmt.Println(\"完成\")\n}\n```\n\
  \n清单 8-10：Go Goroutine 池化方案\n\n**输出：**\n\n```\n中位数 [1.1 2.2 3.3] -> 2.200000\n中位数\
  \ [5.5 6.6 7.7] -> 6.600000\n中位数 [2.2 3.3 4.4] -> 3.300000\n中位数 [3.3 4.4 5.5] ->\
  \ 4.400000\n中位数 [4.4 5.5 6.6] -> 5.500000\n正在关闭\n正在关闭\n正在关闭\n正在关闭\n正在关闭\n正在关闭\n\
  正在关闭\n正在关闭\n完成\n```\n\n### 动手挑战\n\n对于本次挑战，假设你想通过 HTTP 下载多个文件。但是，在下载文件之前，你需要检查将要下载的数据总量。你必须编写一个函数，用于计算单个文件、单个\
  \ URL 和多个 URL 的下载大小。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\
  \n### 解决方案\n\n代码清单 8-11 是该问题的一个示例解决方案。`downloadSize()` 函数将从 HTTP 头部返回 `Content-Length`。`downloadsSize()`\
  \ 函数接收多个 URL 作为输入，并同时计算总下载大小。为了测试此代码，我们使用了[纽约市 TLC 出行数据集](https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page)\
  \ (`https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page`)。`gen2020url()`\
  \ 函数用于计算 2020 年的 URL。\n\n在 `downloadsSize()` 函数内部，定义了一个 `int64` 类型的变量 `dlSize`，用于返回下载大小。一个名为\
  \ `g` 的错误组用于指示任务何时完成。你遍历 URLs 并构造一个新变量以避免闭包捕获。然后，你使用 `errgroup` 的 Go 函数来启动 goroutine。Goroutine\
  \ 记录 URL，调用 `downloadSize()`，如果没有错误，则使用 `sync/atomic` 原子地增加下载大小 `dlSize`。接着，你等待错误组完成。这将阻塞，直到所有任务完成。如果其中一个返回错误，你将获得一个错误。最后，你将\
  \ `dlSize` 从 `int64` 转换为 `int`，并返回 `nil` 表示没有错误。\n\n在 `main()` 函数中，计算 URL，然后调用 `downloadsSize()`\
  \ 函数。如果执行成功且没有错误，程序将输出一条消息，指示下载大小为 2.27 GB。\n\n```go\npackage main\nimport (\n\"\
  fmt\"\n\"log\"\n\"net/http\"\n\"strconv\"\n\"sync/atomic\"\n\"golang.org/x/sync/errgroup\"\
  \n)\nfunc downloadSize(url string) (int, error) {\nresp, err := http.Head(url)\n\
  if err != nil {\nreturn 0, err\n}\nif resp.StatusCode != http.StatusOK {\nreturn\
  \ 0, fmt.Errorf(\"Bad Status: %d %s\", resp.StatusCode, resp.Status)\n}\nreturn\
  \ strconv.Atoi(resp.Header.Get(\"Content-Length\"))\n}\nfunc downloadsSize(urls\
  \ []string) (int, error) {\nvar dlSize int64\nvar g errgroup.Group\nfor _, url :=\
  \ range urls {\nurl := url // https://golang.org/doc/faq#closures_and_goroutines\n\
  g.Go(func() error {\nlog.Print(url)\nsize, err := downloadSize(url)\nif err != nil\
  \ {\nreturn err\n}\natomic.AddInt64(&dlSize, int64(size))\nreturn nil\n})\n}\nif\
  \ err := g.Wait(); err != nil {\nreturn 0, err\n}\nreturn int(dlSize), nil\n}\n\
  func gen2020URLs() []string {\nvar urls []string\nurlTemplate := \"https://www1.nyc.gov/site/tlc/about/tlc-trip-record-data.page\"\
  \nfor _, vendor := range []string{\"yellow\", \"green\"} {\nfor month := 1; month\
  \ <= 12; month++ {\nurl := fmt.Sprintf(urlTemplate, vendor, month)\nurls = append(urls,\
  \ url)\n}\n}\nreturn urls\n}\nfunc main() {\nurls := gen2020URLs()\nsize, err :=\
  \ downloadsSize(urls)\nif err != nil {\nlog.Fatal(err)\n}\nsizeGB := float64(size)\
  \ / (1 << 30)\nfmt.Printf(\"size = %.2fGB\\n\", sizeGB)\n}\n代码清单 8-11\n实战挑战的 Go\
  \ 方案\n```\n\n**/*输出：**\n\n```\nsize = 2.27GB\n*/\n```\n\n## 总结\n\n本章提供了 Go 方案，让您获得在\
  \ Go 中构建并发程序的实践经验。Go 通过 goroutine 和 channel 为并发提供了内建支持。本章中的方案涵盖了通过使用 goroutine 将顺序代码转换为并发代码。此外，还提供了深入探讨\
  \ goroutine 间共享资源影响的 Go 方案，并解释了互斥锁如何克服这些副作用。它还提供了一个使用原子计数器在 goroutine 之间修改共享资源的\
  \ Go 方案，以克服可能因共享资源导致的死锁或读/写不一致问题，以及使用 `sync.WaitGroup` 和 `sync.Once`、超时和 goroutine\
  \ 池在 goroutine 之间实现同步的方案。\n\n下一章包含更高效、更有效地使用 Go 语言的实用技巧与窍门。\n\n"
- "# 9. 技巧与实用窍门\n\n本章提供了一些黑客技巧和快捷方式，可以帮助您更有效、更轻松地掌握 Go 编程语言。这些技巧和窍门涉及 Go 编程语言的不同方面，包括包、导入、数据类型等。\n\
  \n## 导入包\n\n除了将包导入到 Go 程序中的常规方法外，还有一些其他替代方法可以实现此目的。以下示例使用 `regexp` 包说明了这些不同的方式。\n\
  \n- `import alias_name \"package_name\"` — 使用此语法导入包将为指定的包名（本例中为 `regexp`）创建一个别名。然后，您可以使用此别名，通过成员访问运算符（即点运算符\
  \ `.`）来访问 `regexp` 包中的所有内容。例如，`RegularExpression`。\n- `import . \"package_name\"\
  ` — 以这种方式导入任何包，允许您访问特定包的内容，而无需在导出内容前添加包名前缀。例如，您可以使用 `regexp.MatchString(\"m([a-z]+)rs\"\
  , \"mars\")` 语句，而不是输入 `regexp.MatchString(\"m([a-z]+)rs\", \"mars\")`。\n- `import\
  \ _ \"package_name\"` — 以这种方式导入包会告诉编译器不要引发任何与导入但未使用的包相关的警告。但是，任何初始化函数仍将被执行。不过，包的其他内容不会被导出和访问。\n\
  \n## 检查应用程序导入了哪些包\n\n检查应用程序正在导入哪些包是一种有用且实际的方法。然而，并没有简单的方法可以做到这一点。尽管如此，仍可以使用 `go\
  \ list` 工具和 `templates` 来做到这一点。在应用程序的根目录下运行以下命令。\n\n```sh\n$ go list -f '{{join\
  \ .Deps \"\\n\"}}' |\nxargs go list -f '{{if not .Standard}}{{.ImportPath}}{{end}}'\n\
  ```\n\n如果您希望列表也包含标准包，可以编辑此模板：\n\n```sh\n$ go list -f '{{join .Deps \"\\n\"}}' |\
  \  xargs go list -f '{{.ImportPath}}'\n```\n\n## 使用 `goimports` 代替 `gofmt`\n\nGo\
  \ 提供了两种工具可以自动按照 Go 编码标准格式化您的源代码，分别是 `gofmt` 和 `goimports`。前者随 Go 编译器的标准安装包一起提供。而\
  \ `goimports` 工具需要单独安装。此外，`goimports` 工具还能修复包导入问题。\n\n## 代码组织\n\n尽管 Go 编程语言相对更容易学习，但对于初学者来说，Go\
  \ 代码组织的标准方式可能是最难理解的事情之一。Go 提供了关于代码组织、放置源代码的不同位置以及需要遵循的不同惯用法的清晰指导。此外，像 `gofmt` 这样的工具随\
  \ Go 编译器打包在一起，它制定了严格的规则：如果代码包含任何未使用的导入包、变量等，则不会允许成功编译。有关更多信息，请参考官方演讲 [`https://talks.golang.org/2014/organizeio.slide#1`](https://talks.golang.org/2014/organizeio.slide%25231)\
  \ 或官方文档 [`https://tinyurl.com/3x3hapub`](https://tinyurl.com/3x3hapub)。\n\n\n\n\
  ## 使用还是不用：自定义构造函数\n\n通常不需要使用自定义构造函数。但有时却不得不使用它们；例如，在初始化时设置值的同时，还必须对默认值进行排序。为了说明自定义构造函数的用法，我们以一个日志记录器为例，在该示例中需要设置一个默认的日志记录器，如代码清单\
  \ 9-1 所示。\n\n```go\npackage main\nimport (\n\"log\"\n\"os\"\n)\ntype Jobs struct\
  \ {\nCmd string\n*log.Logger\n}\nfunc CreateJob(cmd string) *Jobs {\nreturn &Jobs{cmd,\
  \ log.New(os.Stderr, \"New Job \", log.Ldate)}\n}\nfunc main() {\nCreateJob(\"SampleRun\"\
  ).Print(\"Initiating . . .\")\n}\n代码清单 9-1\nGo 语言自定义构造函数示例\n```\n\n**输出：**\n\n```\n\
  New Job 2022/06/24 Initiating . . .\n```\n\n## 将代码模块化并组织成包\n\n在决定项目的文件夹结构时，请务必牢记可扩展性和复杂性。在\
  \ Go 语言中，每个源文件都属于某个特定的包。因此，每个程序都以 `package` 语句开头，该语句指明了源文件所属包的名称。对于非常小的程序，唯一需要的包就是\
  \ `main` 包。最佳实践是确保包名不要太长。当一个包包含多个文件时，应维护一个包含包文档的 `doc.go` 文件。有关包的最佳实践更多信息，请参阅 [`https://talks.golang.org/2014/organizeio.slide#2`](https://talks.golang.org/2014/organizeio.slide%25232)。\n\
  \n## 依赖包管理\n\n遗憾的是，Go 语言没有自己的依赖包管理系统。这在持续集成（CI）环境或多个开发人员共同开发一个项目时可能会成为挑战。尽管如此，Go\
  \ 社区已经提出了几种解决方案来克服这一缺陷。Go 包管理器（`gpm`）（[`https://github.com/pote/gpm`](https://github.com/pote/gpm)）被认为是最简单可行的解决方案之一。它本质上是一个简单的\
  \ bash 脚本，可以进行修改，因此被复制到每个需要的仓库中（[`https://gist.github.com/mattetti/9334318`](https://gist.github.com/mattetti/9334318)）。它使用一个名为\
  \ `Godeps` 的自定义文件，该文件列出了需要安装的包名，以避免依赖问题。有关如何在代码中管理依赖项的更多信息，请参阅 [`https://go.dev/doc/modules/managing-dependencies`](https://go.dev/doc/modules/managing-dependencies)。\n\
  \n## 编译器优化\n\n开发者通常会在构建时使用不同的标志，称为 `gcflags`，以了解编译器正在应用哪些优化和内存管理技术。代码清单 9-2 演示了如何使用编译器标志。\n\
  \n```go\npackage main\nimport (\n\"fmt\"\n)\ntype UserData struct {\nID       int\n\
  Name     string\nLocation string\n}\nfunc (user *UserData) GreetUser() string {\n\
  return fmt.Sprintf(\"Hello %s from %s\",\nuser.Name, user.Location)\n}\nfunc CreateNewUser(id\
  \ int, name, location string) *UserData {\nid++\nreturn &UserData{id, name, location}\n\
  }\nfunc main() {\nuser := CreateNewUser(10, \"Maryam\", \"PK\")\nfmt.Println(user.GreetUser())\n\
  }\n代码清单 9-2\n展示编译器标志使用的基础程序\n```\n\n假设这个文件名为 `gcflags-eg.go`。你可以在构建该文件的同时，将 `gcflags`\
  \ 与 `build` 命令一起传入，如图 9-1 所示。\n\n![](img/536365_1_En_9_Fig1_HTML.jpg)\n\n一组包含 18\
  \ 个命令行参数的代码，以 `gcflags` 开头。\n\n图 9-1  \n使用 `gcflags` 编译文件的示例输出\n\n从此处显示的输出中可以注意到的一种优化是[函数内联](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go)（[`https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go`](https://dave.cheney.net/2020/04/25/inlining-optimisations-in-go)）。函数内联用于减少函数调用开销，通过将函数体移动到函数调用处来实现。例如，`GreetUser()`\
  \ 函数在第 13 行定义，并在第 25 行被内联。有关内联如何提升 Go 程序性能的更多信息，请参阅 [`http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast`](http://dave.cheney.net/2014/06/07/five-things-that-make-go-fast)。本质上，编译器会创建与以下代码清单等效的代码。\n\
  \n```go\nfunc main() {\nid := 12 + 1\nuser := &UserData{id, \"Maryam\", \"PK\"}\n\
  fmt.Println(user.Greetings())\n}\n```\n\n## 使用 Git 的 SHA 设置构建 ID\n\n将构建 ID 烧录到二进制文件中通常非常有用。使用\
  \ Git 命令的 SHA1 是实现此目的的一种方法。第一步是使用 Git 命令从你的仓库中获取最新提交的 SHA1 短版本：`git rev-parse --short\
  \ HEAD`。之后，如下面的代码清单所示，你需要设置一个导出的变量，在此例中为 `Build`，其值将通过 `-ldflags` 标志在编译时设置。\n\n\
  ```go\npackage main\nimport \"fmt\"\nvar Build string\nfunc main() {\nfmt.Printf(\"\
  Build ID: %s\\n\", Build)\n}\n```\n\n将前面的代码清单保存到名为 `buildId-eg.go` 的文件中。仅编译代码不会设置构建\
  \ ID；你需要使用以下 Go 命令来设置构建值：\n\n```\n$ go build -ldflags \"-X main.Build m9163zh\"\
  \ buildId-eg.go\n```\n\n为了确保你的构建 ID 已设置，运行并检查你的构建。然后可以在应用程序的部署编译过程中使用该构建 ID。\n\n\
  ```\nBuild ID: m9163zh\n```\n\n## 优雅常量的案例，即 IOTA\n\n有时，概念的名称非常重要，尤其是在代码中，如代码清单 9-3\
  \ 所示。\n\n```go\nconst (\nCCRamada    = \"Ramada\"\nCCMarriot   = \"Marriot\"\nCCHilton\
  \    = \"Hilton\"\n)\n代码清单 9-3\n为概念赋予恰当名称以区分它们\n```\n\n然而，在其他时候，你只需要区分不同事物，而名称并不重要。例如，在数据库中存储产品类别信息时，可能希望使用整数值来区分它们，而不是按名称存储为字符串值，因为产品类别会随时间变化。实现此目的的一种方法如代码清单\
  \ 9-4 所示。\n\n```go\nconst (\nCatElectronics  = 0\nCatAppliances   = 1\nCatHardware\
  \     = 2\n)\n代码清单 9-4\n使用整数值来区分概念\n```\n\n请注意，在此示例中，我们使用 0、1 和 2 作为常量的值。但这些是任意值，由程序员自行选择。\n\
  \n尽管常量被认为很重要，但有时它们可能难以解释和维护。由于这些原因，Ruby 等某些语言的开发者会避免使用常量。然而，Go 语言中的常量具有某些微妙特性，当谨慎使用得当时，可以使代码保持可维护性和优雅性。\n\
  \n### 自动递增\n\n在 Go 中实现自动递增的一个便捷技巧是使用 `IOTA` 标识符。使用 `IOTA` 本质上简化了常量定义。如代码清单 9-5 所示，你可以使用\
  \ `IOTA` 来分配与上一节示例中相同的值。\n\n```go\nconst (\nCatElectronics  = iota    //0\nCatAppliances\
  \             //1\nCatHardware               //2\n)\n代码清单 9-5\n使用 IOTA 标识符实现自动递增\n\
  ```\n\n\n\n### 自定义类型\n\n自定义类型通常与自动递增常量结合使用，以便程序员可以依赖编译器进行处理，如代码清单 9-6 所示。\n\n```go\n\
  type Months int\nconst (\nJanuary    Months = iota // 0\nFebruary              \
  \   // 1\nMarch                    // 2\nApril                    // 3\nMay    \
  \                  // 4\nJune                     // 5\nJuly                   \
  \  // 6\n)\n代码清单 9-6\n使用 IOTA 的自定义类型\n```\n\n如代码清单 9-7 所示，如果将 `Months` 类型参数传递给一个定义为只接受\
  \ `int` 类型参数的函数，这将无法正常工作。程序将在编译时抛出错误。\n\n```go\nfunc Counter(k int) {\nfmt.Printf(\"\
  物品数量: %d\", k)\n}\nfunc main() {\nm1 := January\nfmt.Println(Counter(m1))\n}\n代码清单\
  \ 9-7\n因类型不匹配导致的编译时错误\n```\n\n**输出：**\n\n![](img/536365_1_En_9_Figa_HTML.jpg)\n\n\
  错误信息显示：\"cannot use m1 (variable of type `Months`) as `int` value in argument to\
  \ `Counter`\"（不能将类型为 `Months` 的变量 m1 作为 `int` 值传递给 `Counter` 函数）。\n\n反之亦然。如代码清单\
  \ 9-8 所示，不能将 `int` 类型参数传递给一个定义为接受 `Months` 类型参数的函数。\n\n```go\ntype Months int\n\
  const (\nJanuary  Months = iota // 0\nFebruary               // 1\nMarch       \
  \           // 2\nApril                  // 3\nMay                    // 4\nJune\
  \                   // 5\nJuly                   // 6\n)\nfunc Counter(k Months)\
  \ {\nfmt.Printf(\"物品数量: %d\", k)\n}\nfunc main() {\nm2 := 2\nfmt.Println(Counter2(m2))\n\
  }\n代码清单 9-8\n因类型不匹配导致的编译时错误\n```\n\n**输出：**\n\n![](img/536365_1_En_9_Figb_HTML.jpg)\n\
  \n错误信息显示：\"cannot use m2 (variable of type `int`) as `Months` value in argument\
  \ to `Counter-2`\"（不能将类型为 `int` 的变量 m2 作为 `Months` 值传递给 `Counter-2` 函数）。\n\n然而，这种情况也有一个例外。当数值常量作为参数传递时，代码会编译并通过，如代码清单\
  \ 9-9 所示。这是因为在 Go 语言中，常量是松散类型的，除非在严格的上下文中使用。\n\n```go\nfunc GetMonth(character Months)\
  \ string {\nvar str string\nswitch character {\ncase January:\nstr = \"这是一月。\"\n\
  case February:\nstr = \"这是二月。\"\ncase Tuesday:\nstr = \"这是三月。\"\n}\nreturn str\n\
  }\nfunc main() {\nfmt.Println(GetMonth(0))\n}\n代码清单 9-9\n演示 Go 语言中常量松散类型特性的程序\n\
  ```\n\n**输出：**\n\n`这是一月。`\n\n### 跳过值\n\n在某些场景下，你可能希望使用 IOTA 为常量赋值，但又不希望值按顺序连续排列，而是想跳过某些值。如代码清单\
  \ 9-10 所示，可以使用下划线来跳过不需要的值。\n\n```go\nconst (\nCatElectronics  = iota   //0\nCatAppliances\
  \            //1\nCatHardware              //2\n_\n_\nCatComputer              //5\n\
  )\n代码清单 9-10\n使用 IOTA 时跳过值\n```\n\n### 表达式\n\n除了自动递增之外，IOTA 还可用于其他多种用途。其中一种用途是在表达式中使用。其结果可以存储在常量中。代码清单\
  \ 9-11 展示了一个说明此功能的示例。在此示例中，`<<` 是位掩码操作符。这个技巧之所以有效，是因为在 const 组中，每一行只有一个标识符，所以前一个表达式会被取出并重新应用于该标识符，但会使用递增后的\
  \ IOTA 值。这个过程也称为最后非空表达式列表的隐式重复。\n\n```go\ntype AllergyMagnitude float32\nconst (\n\
  PeanutAllergy = 1 << iota //00000001\nChocolateAllerg           // 1 << 1 即 00000010\n\
  DustAllergy               // 1 << 2 即 00000100\nMilkAllergy               // 1 <<\
  \ 3 即 00001000\n)\n代码清单 9-11\n将 IOTA 标识符与表达式结合使用\n```\n\n### 易混淆的常量\n\n你可能会好奇在 const\
  \ 组中，一行内定义两个常量的输出结果是什么。例如，在代码清单 9-12 中，常量 `Value2` 或 `Value6` 的值会是多少？\n\n```go\n\
  const (\nValue1, Value2 = iota + 1, iota + 2\nValue3, Value4\nValue5, Value6\n)\n\
  代码清单 9-12\n在 const 组中使用 IOTA 在一行内错误声明多个常量\n```\n\n在这种情况下，IOTA 的值是在下一行递增，而不是在它被引用时。这会导致代码混乱，因为你现在会得到具有相同值的常量，如代码清单\
  \ 9-13 所示。\n\n```\n// ValA: 1\n// ValB: 2\n// ValC: 2\n// ValD: 3\n// ValE: 3\n\
  // ValF: 4\n代码清单 9-13\n在 const 组中使用 IOTA 在一行内定义两个常量的输出结果\n```\n\n## 总结\n\n本章提供了关于如何更有效、更高效地使用\
  \ Go 的各种技巧和诀窍。这些实用技巧涵盖了几个主题，包括导入包、检查程序中导入了哪些包、使用 `goimports` 格式化代码、高效组织代码、使用自定义构造函数、依赖包管理、优化编译、通过\
  \ Git 设置项目的构建 ID，以及关于 IOTA 标识符的几个技巧。\n\n\n\n"
