  ## Go 中的映射操作


  在本节中，我们将编写一个程序来统计文本中单词出现的次数。这被称为词频统计，是文本处理中的常见任务。例如，在句子“to be or not to be”中，“to”的频率为
  2，“be”的频率为 2，“not”的频率为 1，“or”的频率为 1。对于此任务，我们使用映射来存储单词及其计数，作为键值对。Go 映射在尝试访问不存在的键时不会引发恐慌。相反，它们会为不存在的键返回零值。在此示例中，映射值为整数，零值意味着单词计数为零。清单
  3-3 展示了实现此功能的配方。


  ```

  package main

  import (

  "fmt"

  )

  var moby = []string{

  "shall", "pass", "shall", "away", "too"}

  func main() {

  fmt.Println(frequency(moby))

  }

  func frequency(words []string) map[string]int {

  freq := make(map[string]int)

  for _, w := range words {

  freq[w]++

  }

  return freq

  }

