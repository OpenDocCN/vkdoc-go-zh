  \t\tif res.err != nil {\n\t\t\treturn 0, res.err\n\t\t}\n\t\ttotalDistance += res.dist\n\
  \t}\n\treturn totalDistance, nil\n}\n\nfunc main() {\n\tmonth := time.Date(2021,\
  \ 2, 1, 0, 0, 0, 0, time.UTC)\n\tstart := time.Now()\n\tdist, err := monthDistance(month)\n\
  \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\tduration := time.Since(start)\n\t\
