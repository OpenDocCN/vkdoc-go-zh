  \ Web 的 IDE Go Playground 开始编码和开发基于 Go 的程序的最快方法之一。\n\n图 2-3 — Go Playground IDE\n\
  \nGo Playground 是一个完全免费使用的服务，没有任何限制。无需用户注册或支付许可费。此外，它对您可以处理的源代码文件数量或运行代码的次数没有限制。这是一个无需创建或编译任何本地源文件即可测试\
