  ```  \n\n\n\n### 理解函数类型\n\n在 Go 语言中，函数拥有数据类型，这意味着它们可以被赋值给变量，并用作函数参数、实参和返回值。代码清单\
  \ 9-4 展示了函数数据类型的一个简单用法。\n\n```\npackage main\nimport \"fmt\"\nfunc calcWithTax(price\
  \ float64) float64 {\nreturn price + (price * 0.2)\n}\nfunc calcWithoutTax(price\
  \ float64) float64 {\nreturn price\n}\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products\
  \ {\nvar calcFunc func(float64) float64\nif (price > 100) {\ncalcFunc = calcWithTax\n\
  } else {\ncalcFunc = calcWithoutTax\n}\ntotalPrice := calcFunc(price)\nfmt.Println(\"\
  Product:\", product, \"Price:\", totalPrice)\n}\n}\n代码清单 9-4\n在 functionTypes 文件夹的\
  \ main.go 文件中使用函数数据类型\n```\n\n这个示例包含两个函数，每个函数都定义了一个 `float64` 参数并返回一个 `float64`\
  \ 结果。`main` 函数中的 `for` 循环会选中其中一个函数，并用它来计算某个产品的总价。循环中的第一条语句定义了一个变量，如图 9-1 所示。\n\n\
  ![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig1_HTML.jpg](img/512642_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n定义函数类型变量\n\n函数类型使用 `func` 关键字来指定，后面跟着括号中的参数类型，然后是结果类型。这被称为**函数签名**。如果有多个结果，那么结果类型也需要用括号括起来。代码清单\
  \ 9-4 中的函数类型描述了一个接受 `float64` 参数并返回 `float64` 结果的函数。\n\n代码清单 9-4 中定义的 `calcFunc`\
  \ 变量可以被赋值为任何与其类型匹配的值，这意味着任何参数和结果的数量及类型都正确的函数。要将特定函数赋值给变量，需要使用该函数的名称，如图 9-2 所示。\n\
  \n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig2_HTML.jpg](img/512642_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n将函数赋值给变量\n\n一旦函数被赋值给变量，就可以像使用变量名作为函数名那样来调用它。在示例中，这意味着赋值给 `calcFunc` 变量的函数可以如图\
  \ 9-3 所示进行调用。\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig3_HTML.jpg](img/512642_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n通过变量调用函数\n\n其效果是，无论哪个函数被赋值给了 `totalPrice` 变量，该函数都会被调用。如果 `price` 值大于\
  \ 100，则将 `calcWithTax` 函数赋值给 `totalPrice` 变量，并执行此函数。如果 `price` 小于或等于 100，则将 `calcWithoutTax`\
  \ 函数赋值给 `totalPrice` 变量，并执行此函数。代码清单 9-4 中的代码在编译和执行时会产生以下输出（不过你可能看到的结果顺序不同，正如第 7\
  \ 章所述）：\n\n```\nProduct: Kayak Price: 330\nProduct: Lifejacket Price: 48.95\n```\n\
  \n## 理解函数比较与零值类型\n\nGo 的比较运算符不能用于比较函数，但可以用于判断一个函数是否已被赋值给变量，如代码清单 9-5 所示。\n\n```\n\
  package main\nimport \"fmt\"\nfunc calcWithTax(price float64) float64 {\nreturn\
  \ price + (price * 0.2)\n}\nfunc calcWithoutTax(price float64) float64 {\nreturn\
  \ price\n}\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"\
  Lifejacket\": 48.95,\n}\nfor product, price := range products {\nvar calcFunc func(float64)\
  \ float64\nfmt.Println(\"Function assigned:\", calcFunc == nil)\nif (price > 100)\
  \ {\ncalcFunc = calcWithTax\n} else {\ncalcFunc = calcWithoutTax\n}\nfmt.Println(\"\
  Function assigned:\", calcFunc == nil)\ntotalPrice := calcFunc(price)\nfmt.Println(\"\
  Product:\", product, \"Price:\", totalPrice)\n}\n}\n代码清单 9-5\n在 functionTypes 文件夹的\
  \ main.go 文件中检查赋值\n```\n\n函数类型的零值是 `nil`，代码清单 9-5 中的新语句使用相等运算符来判断一个函数是否已被赋值给 `calcFunc`\
  \ 变量。代码清单 9-5 中的代码会产生以下输出：\n\n```\nFunction assigned: true\nFunction assigned: false\n\
  Product: Kayak Price: 330\nFunction assigned: true\nFunction assigned: false\nProduct:\
  \ Lifejacket Price: 48.95\n```\n\n## 将函数用作参数\n\n函数类型可以像任何其他类型一样使用，包括作为其他函数的参数，如代码清单\
  \ 9-6 所示。\n\n注意\n\n以下章节中的某些描述可能难以理解，因为需要频繁使用 *函数* 这个词。我建议你密切关注代码示例，这有助于理解文本内容。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc calcWithTax(price float64) float64 {\n\
  return price + (price * 0.2)\n}\nfunc calcWithoutTax(price float64) float64 {\n\
  return price\n}\nfunc printPrice(product string, price float64, calculator func(float64)\
  \ float64 ) {\nfmt.Println(\"Product:\", product, \"Price:\", calculator(price))\n\
  }\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\"\
  : 48.95,\n}\nfor product, price := range products {\nif (price > 100) {\nprintPrice(product,\
  \ price, calcWithTax)\n} else {\nprintPrice(product, price, calcWithoutTax)\n}\n\
  }\n}\n代码清单 9-6\n在 functionTypes 文件夹的 main.go 文件中将函数用作参数\n```\n\n`printPrice` 函数定义了三个参数，其中前两个接收\
  \ `string` 和 `float64` 类型的值。第三个参数名为 `calculator`，接收一个接收 `float64` 值并返回 `float64`\
  \ 结果的函数，如图 9-4 所示。\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig4_HTML.jpg](img/512642_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\n函数参数\n\n在 `printPrice` 函数内部，`calculator` 参数的使用方式与任何其他函数相同：\n\n```\n...\n\
  fmt.Println(\"Product:\", product, \"Price:\", calculator(price))\n...\n```\n\n\
  重要的是，`printPrice` 函数不知道也不关心它通过 `calculator` 参数接收到的是 `calcWithTax` 还是 `calcWithoutTax`\
  \ 函数。`printPrice` 函数只知道它可以用一个 `float64` 参数调用 `calculator` 函数并接收一个 `float64` 结果，因为这是该参数的函数类型。\n\
  \n选择使用哪个函数由 `main` 函数中的 `if` 语句决定，并且函数名被用来将一个函数作为参数传递给另一个函数，如下所示：\n\n```\n...\n\
  printPrice(product, price, calcWithTax)\n...\n```\n\n代码清单 9-6 中的代码在编译和执行时会产生以下输出：\n\
  \n```\nProduct: Kayak Price: 330\nProduct: Lifejacket Price: 48.95\n```\n\n\n\n\
  ### 使用函数作为结果\n\n函数也可以作为结果，这意味着函数返回的值是另一个函数，如代码清单 9-7 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc calcWithTax(price float64) float64 {\nreturn price + (price\
  \ * 0.2)\n}\nfunc calcWithoutTax(price float64) float64 {\nreturn price\n}\nfunc\
  \ printPrice(product string, price float64, calculator func(float64) float64 ) {\n\
  fmt.Println(\"Product:\", product, \"Price:\", calculator(price))\n}\nfunc selectCalculator(price\
  \ float64) func(float64) float64 {\nif (price > 100) {\nreturn calcWithTax\n}\n\
  return calcWithoutTax\n}\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\"\
  \ : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products {\nprintPrice(product,\
  \ price, selectCalculator(price))\n}\n}\n代码清单 9-7  在 functionTypes 文件夹的 main.go\
  \ 文件中生成函数结果\n```\n\n`selectCalculator` 函数接收一个 `float64` 值并返回一个函数，如图 9-5 所示。\n\n\
  ![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig5_HTML.jpg](img/512642_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5  函数类型结果\n\n`selectCalculator` 产生的结果是一个函数，该函数接受一个 `float64` 值并产生一个 `float64`\
  \ 结果。`selectCalculator` 的调用者并不知道自己收到的是 `calcWithTax` 还是 `calcWithoutTax` 函数，只知道会收到一个具有指定签名的函数。编译并执行代码清单\
  \ 9-7 中的代码会生成以下输出：\n\n```\nProduct: Kayak Price: 330\nProduct: Lifejacket Price:\
  \ 48.95\n```\n\n## 创建函数类型别名\n\n如之前的示例所示，使用函数类型可能显得冗长且重复，这会导致代码难以阅读和维护。Go 支持类型别名，可用于为函数签名分配名称，这样在使用函数类型时就不必每次都指定参数和结果类型，如代码清单\
  \ 9-8 所示。\n\n```\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n\
  func calcWithTax(price float64) float64 {\nreturn price + (price * 0.2)\n}\nfunc\
  \ calcWithoutTax(price float64) float64 {\nreturn price\n}\nfunc printPrice(product\
  \ string, price float64, calculator calcFunc) {\nfmt.Println(\"Product:\", product,\
  \ \"Price:\", calculator(price))\n}\nfunc selectCalculator(price float64) calcFunc\
  \ {\nif (price > 100) {\nreturn calcWithTax\n}\nreturn calcWithoutTax\n}\nfunc main()\
  \ {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n\
  }\nfor product, price := range products {\nprintPrice(product, price, selectCalculator(price))\n\
  }\n}\n代码清单 9-8  在 functionTypes 文件夹的 main.go 文件中使用类型别名\n```\n\n别名使用 `type` 关键字创建，后跟别名名称，再跟类型，如图\
  \ 9-6 所示。\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig6_HTML.jpg](img/512642_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6  类型别名\n\n> **注意**  \n> `type` 关键字也用于创建自定义类型，如第 10 章所述。\n\n代码清单 9-8 中的别名将名称\
  \ `calcFunc` 分配给接受一个 `float64` 参数并产生一个 `float64` 结果的函数类型。可以使用别名名称代替函数类型，如下所示：\n\n\
  ```\n...\nfunc selectCalculator(price float64) calcFunc {\n...\n```\n\n你不必为函数类型使用别名，但它们可以简化代码，并更容易识别特定函数签名的使用。代码清单\
  \ 9-8 中的代码会生成以下输出：\n\n```\nProduct: Kayak Price: 330\nProduct: Lifejacket Price:\
  \ 48.95\n```\n\n## 使用函数字面量语法\n\n函数字面量语法允许定义特定于代码区域的函数，如代码清单 9-9 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n// func calcWithTax(price\
  \ float64) float64 {\n//     return price + (price * 0.2)\n// }\n// func calcWithoutTax(price\
  \ float64) float64 {\n//     return price\n// }\nfunc printPrice(product string,\
  \ price float64, calculator calcFunc) {\nfmt.Println(\"Product:\", product, \"Price:\"\
  , calculator(price))\n}\nfunc selectCalculator(price float64) calcFunc {\nif (price\
  \ > 100) {\nvar withTax calcFunc = func (price float64) float64 {\nreturn price\
  \ + (price * 0.2)\n}\nreturn withTax\n}\nwithoutTax := func (price float64) float64\
  \ {\nreturn price\n}\nreturn withoutTax\n}\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products\
  \ {\nprintPrice(product, price, selectCalculator(price))\n}\n}\n代码清单 9-9  在 functionTypes\
  \ 文件夹的 main.go 文件中使用字面量语法的函数\n```\n\n字面量语法省略了名称，因此 `func` 关键字后紧跟参数、结果类型和代码块，如图 9-7\
  \ 所示。由于名称被省略，用这种方式定义的函数被称为**匿名函数**。\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig7_HTML.jpg](img/512642_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7  函数字面量语法\n\n> **注意**  \n> Go 不支持箭头函数（即通过 `=>` 操作符更简洁地表达函数，而无需 `func` 关键字和花括号包围的代码块）。在\
  \ Go 中，函数必须始终使用关键字和函数体来定义。\n\n字面量语法创建的函数可以像任何其他值一样使用，包括将函数赋值给变量，这正是我在代码清单 9-9 中所做的。函数字面量的类型由函数签名定义，这意味着函数参数的数量和类型必须与变量类型匹配，如下所示：\n\
  \n```\n...\nvar withTax calcFunc = func (price float64) float64 {\nreturn price\
  \ + (price * 0.2)\n}\n...\n```\n\n这个字面量函数的签名与 `calcFunc` 类型别名匹配，具有一个 `float64` 参数和一个\
  \ `float64` 结果。字面量函数也可以与短变量声明语法一起使用：\n\n```\n...\nwithoutTax := func (price float64)\
  \ float64 {\nreturn price\n}\n...\n```\n\nGo 编译器会根据函数签名确定变量类型，这意味着 `withoutTax`\
  \ 变量的类型是 `func(float64) float64`。编译并执行代码清单 9-9 中的代码会生成以下输出：\n\n```\nProduct: Kayak\
  \ Price: 330\nProduct: Lifejacket Price: 48.95\n```\n\n### 理解函数变量作用域\n\n函数与其他任何值一样被对待，但添加税费的函数只能通过\
  \ `withTax` 变量访问，而该变量又只能在 `if` 语句的代码块内访问，如代码清单 9-10 所示。\n\n```\n...\nfunc selectCalculator(price\
  \ float64) calcFunc {\nif (price > 100) {\nvar withTax calcFunc = func (price float64)\
  \ float64 {\nreturn price + (price * 0.2)\n}\nreturn withTax\n} else if (price <\
  \ 10) {\nreturn withTax\n}\nwithoutTax := func (price float64) float64 {\nreturn\
  \ price\n}\nreturn withoutTax\n}\n...\n代码清单 9-10  在 functionTypes 文件夹的 main.go 文件中在其作用域外使用函数\n\
  ```\n\n`else`/`if` 子句中的语句尝试访问赋值给 `withTax` 变量的函数。该变量无法访问，因为它位于另一个代码块中，因此编译器会生成以下错误：\n\
  \n```\n### command-line-arguments\n.\\main.go:18:16: undefined: withTax\n```\n\n\
  \n\n### 直接使用函数值\n\n在之前的示例中，我将函数赋值给变量，是为了演示 Go 语言把字面量函数当作普通值一样对待。但实际上，函数不必赋值给变量，可以像其他任何字面量值一样直接使用，如代码清单\
  \ 9-11 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n\
  func printPrice(product string, price float64, calculator calcFunc) {\nfmt.Println(\"\
  Product:\", product, \"Price:\", calculator(price))\n}\nfunc selectCalculator(price\
  \ float64) calcFunc {\nif (price > 100) {\nreturn func (price float64) float64 {\n\
  return price + (price * 0.2)\n}\n}\nreturn func (price float64) float64 {\nreturn\
  \ price\n}\n}\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\
  \"Lifejacket\": 48.95,\n}\nfor product, price := range products {\nprintPrice(product,\
  \ price, selectCalculator(price))\n}\n}\n代码清单 9-11\n在 functionTypes 文件夹的 main.go\
  \ 文件中直接使用函数\n```\n\n`return` 关键字直接作用于函数本身，无需将函数赋值给变量。代码清单 9-11 中的代码输出如下：\n\n```go\n\
  Product: Kayak Price: 330\nProduct: Lifejacket Price: 48.95\n```\n\n字面量函数也可以作为其他函数的参数，如代码清单\
  \ 9-12 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n\
  func printPrice(product string, price float64, calculator calcFunc) {\nfmt.Println(\"\
  Product:\", product, \"Price:\", calculator(price))\n}\nfunc main() {\nproducts\
  \ := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product,\
  \ price := range products {\nprintPrice(product, price, func (price float64) float64\
  \ {\nreturn price + (price * 0.2)\n})\n}\n}\n代码清单 9-12\n在 functionTypes 文件夹的 main.go\
  \ 文件中使用字面量函数参数\n```\n\n`printPrice` 函数的最后一个参数使用了字面量语法，并且没有将该函数赋值给变量。代码清单 9-12 中的代码输出如下：\n\
  \n```go\nProduct: Kayak Price: 330\nProduct: Lifejacket Price: 58.74\n```\n\n###\
  \ 理解函数闭包\n\n使用字面量语法定义的函数可以引用周围代码中的变量，这一特性被称为*闭包*。这个特性可能难以理解，因此我将首先从一个不依赖闭包的示例开始，如代码清单\
  \ 9-13 所示，然后再解释如何改进它。\n\n```go\npackage main\nimport \"fmt\"\ntype calcFunc func(float64)\
  \ float64\nfunc printPrice(product string, price float64, calculator calcFunc) {\n\
  fmt.Println(\"Product:\", product, \"Price:\", calculator(price))\n}\nfunc main()\
  \ {\nwatersportsProducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\"\
  : 48.95,\n}\nsoccerProducts := map[string] float64 {\n\"Soccer Ball\": 19.50,\n\"\
  Stadium\": 79500,\n}\ncalc := func(price float64) float64 {\nif (price > 100) {\n\
  return price + (price * 0.2)\n}\nreturn price;\n}\nfor product, price := range watersportsProducts\
  \ {\nprintPrice(product, price, calc)\n}\ncalc = func(price float64) float64 {\n\
  if (price > 50) {\nreturn price + (price * 0.1)\n}\nreturn price\n}\nfor product,\
  \ price := range soccerProducts {\nprintPrice(product, price, calc)\n}\n}\n代码清单\
  \ 9-13\n在 functionTypes 文件夹的 main.go 文件中使用多个函数\n```\n\n两个映射分别包含水上运动和足球类产品的名称和价格。这些映射通过\
  \ `for` 循环进行遍历，并为每个映射元素调用 `printPrice` 函数。`printPrice` 函数所需的参数之一是 `calcFunc`，这是一个用于计算产品含税总价的函数。每个产品类别所需的免税门槛和税率不同，如表\
  \ 9-3 所述。\n\n表 9-3  \n产品类别门槛与税率\n\n| 类别 | 门槛 | 税率 |\n|----------|-----------|----------|\n\
  | 水上运动 | 100 | 20% |\n| 足球 | 50 | 10% |\n\n注意\n\n请不要写信抱怨说我虚构的税率显示了对足球的厌恶。我对所有运动都一视同仁地不喜欢，除了长跑——我热衷于长跑，主要是因为每跑一英里，我就能离那些谈论运动的人更远一些。\n\
  \n我使用字面量语法创建了应用每个类别门槛的函数。这样做是可行的，但存在高度的重复性，如果价格计算方式发生变化，我必须记住更新每个类别的计算器函数。\n\n我想要的是能够整合计算价格所需的公共代码，并允许通过每个类别的变化来配置这些公共代码。使用闭包特性可以轻松实现这一点，如代码清单\
  \ 9-14 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n\
  func printPrice(product string, price float64, calculator calcFunc) {\nfmt.Println(\"\
  Product:\", product, \"Price:\", calculator(price))\n}\nfunc priceCalcFactory(threshold,\
  \ rate float64) calcFunc {\nreturn func(price float64) float64 {\nif (price > threshold)\
  \ {\nreturn price + (price * rate)\n}\nreturn price\n}\n}\nfunc main() {\nwatersportsProducts\
  \ := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nsoccerProducts\
  \ := map[string] float64 {\n\"Soccer Ball\": 19.50,\n\"Stadium\": 79500,\n}\nwaterCalc\
  \ := priceCalcFactory(100, 0.2);\nsoccerCalc := priceCalcFactory(50, 0.1)\nfor product,\
  \ price := range watersportsProducts {\nprintPrice(product, price, waterCalc)\n\
  }\nfor product, price := range soccerProducts {\nprintPrice(product, price, soccerCalc)\n\
  }\n}\n代码清单 9-14\n在 functionTypes 文件夹的 main.go 文件中使用函数闭包\n```\n\n关键新增部分是 `priceCalcFactory`\
  \ 函数，在本节中我将其称为*工厂函数*，以区别于代码的其他部分。工厂函数的作用是为特定的门槛和税率组合创建计算器函数。这个任务由函数签名描述，如图 9-8 所示。\n\
  \n\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig8_HTML.jpg](img/512642_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8**\n\n### 工厂函数签名\n\n工厂函数的输入是某个类别的 `threshold` 和 `rate`，输出是一个用于计算该类别的价格函数。工厂函数中的代码使用字面量语法定义了一个计算器函数，该函数包含执行计算的通用代码，如图\
  \ 9-9 所示。\n\n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig9_HTML.jpg](img/512642_1_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9**\n\n### 通用代码\n\n闭包特性是工厂函数和计算器函数之间的纽带。计算器函数依赖两个变量来生成结果，如下所示：\n\n```\n\
  ...\nreturn func(price float64) float64 {\nif (price > threshold) {\nreturn price\
  \ + (price * rate)\n}\nreturn price\n}\n...\n```\n\n`threshold` 和 `rate` 值取自工厂函数的参数，如下所示：\n\
  \n```\n...\nfunc priceCalcFactory(threshold, rate float64) calcFunc {\n...\n```\n\
  \n闭包特性允许函数访问周围代码中的变量和参数。在本例中，计算器函数依赖工厂函数的参数。当计算器函数被调用时，这些参数值被用来生成结果，如图 9-10 所示。\n\
  \n![../images/512642_1_En_9_Chapter/512642_1_En_9_Fig10_HTML.jpg](img/512642_1_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10**\n\n### 函数闭包\n\n如果一个函数*闭合*了它所需值的来源，则称该函数“闭包”于这些来源，即计算器函数*闭包*于工厂函数的 `threshold`\
  \ 和 `rate` 参数。\n\n最终得到一个工厂函数，它能创建专为某个产品类别的税率门槛和税率定制的计算器函数。计算价格所需的代码已被整合，因此更改将应用于所有类别。清单\
  \ 9-13 和清单 9-14 都能生成以下输出：\n\n```\nProduct: Kayak Price: 330\nProduct: Lifejacket\
  \ Price: 48.95\nProduct: Soccer Ball Price: 19.5\nProduct: Stadium Price: 87450\n\
  ```\n\n### 理解闭包的求值时机\n\n函数所闭包的变量在每次函数被调用时才会被求值，这意味着函数外部的改动会影响它产生的结果，如清单 9-15 所示。\n\
  \n```\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\nfunc printPrice(product\
  \ string, price float64, calculator calcFunc) {\nfmt.Println(\"Product:\", product,\
  \ \"Price:\", calculator(price))\n}\nvar prizeGiveaway = false\nfunc priceCalcFactory(threshold,\
  \ rate float64) calcFunc {\nreturn func(price float64) float64 {\nif (prizeGiveaway)\
  \ {\nreturn 0\n} else if (price > threshold) {\nreturn price + (price * rate)\n\
  }\nreturn price\n}\n}\nfunc main() {\nwatersportsProducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nsoccerProducts := map[string]\
  \ float64 {\n\"Soccer Ball\": 19.50,\n\"Stadium\": 79500,\n}\nprizeGiveaway = false\n\
  waterCalc := priceCalcFactory(100, 0.2);\nprizeGiveaway = true\nsoccerCalc := priceCalcFactory(50,\
  \ 0.1)\nfor product, price := range watersportsProducts {\nprintPrice(product, price,\
  \ waterCalc)\n}\nfor product, price := range soccerProducts {\nprintPrice(product,\
  \ price, soccerCalc)\n}\n}\n```\n\n**清单 9-15** 在 `functionTypes` 文件夹的 `main.go`\
  \ 文件中修改闭包所引用的值\n\n计算器函数闭包于 `prizeGiveaway` 变量，这导致价格降至零。在创建水上运动类别的函数之前，`prizeGiveaway`\
  \ 变量被设置为 `false`；在创建 `soccer` 类别的函数之前，它被设置为 `true`。\n\n但由于闭包是在函数被调用时才求值，因此使用的是 `prizeGiveaway`\
  \ 变量的当前值，而非函数创建时的值。结果，两个类别的价格都降为零，代码产生如下输出：\n\n```\nProduct: Lifejacket Price: 0\n\
  Product: Kayak Price: 0\nProduct: Soccer Ball Price: 0\nProduct: Stadium Price:\
  \ 0\n```\n\n### 强制提前求值\n\n在函数被调用时求值闭包可能很有用，但如果你想使用函数创建时变量的当前值，则需要复制该值，如清单 9-16 所示。\n\
  \n```\n...\nfunc priceCalcFactory(threshold, rate float64) calcFunc {\nfixedPrizeGiveway\
  \ := prizeGiveaway\nreturn func(price float64) float64 {\nif (fixedPrizeGiveway)\
  \ {\nreturn 0\n} else if (price > threshold) {\nreturn price + (price * rate)\n\
  }\nreturn price\n}\n}\n...\n```\n\n**清单 9-16** 在 `functionTypes` 文件夹的 `main.go`\
  \ 文件中强制提前求值\n\n计算器函数闭包于 `fixedPrizeGiveway` 变量，该变量的值在工厂函数被调用时设置。这确保了即使 `prizeGiveaway`\
  \ 的值发生变化，计算器函数也不会受影响。通过给工厂函数添加参数也能达到相同效果，因为函数参数默认是按值传递的。清单 9-17 为工厂函数添加了一个参数。\n\n\
  ```\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\nfunc printPrice(product\
  \ string, price float64, calculator calcFunc) {\nfmt.Println(\"Product:\", product,\
  \ \"Price:\", calculator(price))\n}\nvar prizeGiveaway = false\nfunc priceCalcFactory(threshold,\
  \ rate float64, zeroPrices bool) calcFunc {\nreturn func(price float64) float64\
  \ {\nif (zeroPrices) {\nreturn 0\n} else if (price > threshold) {\nreturn price\
  \ + (price * rate)\n}\nreturn price\n}\n}\nfunc main() {\nwatersportsProducts :=\
  \ map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nsoccerProducts\
  \ := map[string] float64 {\n\"Soccer Ball\": 19.50,\n\"Stadium\": 79500,\n}\nprizeGiveaway\
  \ = false\nwaterCalc := priceCalcFactory(100, 0.2, prizeGiveaway);\nprizeGiveaway\
  \ = true\nsoccerCalc := priceCalcFactory(50, 0.1, prizeGiveaway)\nfor product, price\
  \ := range watersportsProducts {\nprintPrice(product, price, waterCalc)\n}\nfor\
  \ product, price := range soccerProducts {\nprintPrice(product, price, soccerCalc)\n\
  }\n}\n```\n\n**清单 9-17** 在 `functionTypes` 文件夹的 `main.go` 文件中添加参数\n\n在清单 9-16 和清单\
  \ 9-17 中，当 `prizeGiveaway` 变量被更改时，计算器函数不受影响，并产生如下输出：\n\n```\nProduct: Kayak Price:\
  \ 330\nProduct: Lifejacket Price: 48.95\nProduct: Stadium Price: 0\nProduct: Soccer\
  \ Ball Price: 0\n```\n\n\n\n### 闭包指针以防止过早求值\n\n大多数与闭包相关的问题都是由函数创建后变量发生变化引起的，这可以通过上一节中的技术来解决。有时，您可能会遇到相反的问题，即需要避免过早求值，以确保函数使用的是当前值。在这种情况下，使用指针可以防止值被复制，如代码清单\
  \ 9-18 所示。\n\n```\npackage main\nimport \"fmt\"\ntype calcFunc func(float64) float64\n\
  func printPrice(product string, price float64, calculator calcFunc) {\nfmt.Println(\"\
  Product:\", product, \"Price:\", calculator(price))\n}\nvar prizeGiveaway = false\n\
  func priceCalcFactory(threshold, rate float64, zeroPrices *bool) calcFunc {\nreturn\
  \ func(price float64) float64 {\nif (*zeroPrices) {\nreturn 0\n} else if (price\
  \ > threshold) {\nreturn price + (price * rate)\n}\nreturn price\n}\n}\nfunc main()\
  \ {\nwatersportsProducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\"\
  : 48.95,\n}\nsoccerProducts := map[string] float64 {\n\"Soccer Ball\": 19.50,\n\"\
  Stadium\": 79500,\n}\nprizeGiveaway = false\nwaterCalc := priceCalcFactory(100,\
  \ 0.2, &prizeGiveaway);\nprizeGiveaway = true\nsoccerCalc := priceCalcFactory(50,\
  \ 0.1, &prizeGiveaway)\nfor product, price := range watersportsProducts {\nprintPrice(product,\
  \ price, waterCalc)\n}\nfor product, price := range soccerProducts {\nprintPrice(product,\
  \ price, soccerCalc)\n}\n}\n代码清单 9-18\n在 functionTypes 文件夹的 main.go 文件中闭包指针\n```\n\
  \n在此例中，工厂函数定义了一个参数，该参数接收一个指向`bool`值的指针，计算器函数闭包于此指针。当调用计算器函数时，会跟随该指针，从而确保使用当前值。代码清单\
  \ 9-18 中的代码产生以下输出：\n\n```\nProduct: Kayak Price: 0\nProduct: Lifejacket Price: 0\n\
  Product: Soccer Ball Price: 0\nProduct: Stadium Price: 0\n```\n\n## 本章小结\n\n在本章中，我描述了\
  \ Go 语言处理函数类型的方式，允许它们像任何其他数据类型一样使用，并且允许将函数视为任何其他值。我解释了如何描述函数类型，并向您展示了如何使用它们来定义其他函数的参数和结果。我演示了如何通过类型别名来避免在代码中重复复杂的函数类型，并解释了函数字面量语法的使用以及函数闭包的工作方式。在下一章中，我将解释如何通过创建结构体类型来定义自定义数据类型。\n\
  \n# 10. 定义结构体\n\n在本章中，我将介绍结构体，这是 Go 语言中定义自定义数据类型的方式。我将向您展示如何定义新的结构体类型，描述如何从这些类型创建值，并解释值被复制时会发生什么。表\
  \ 10-1 将结构体放在上下文中进行说明。\n\n**表 10-1**\n\n结构体上下文说明\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它们是什么？ | 结构体是由字段组成的数据类型。 |\n| 为什么它们有用？ | 结构体允许定义自定义数据类型。 |\n| 如何使用它们？ | 使用 `type`\
  \ 和 `struct` 关键字来定义类型，可以指定字段名称和类型。 |\n| 是否有陷阱或限制？ | 必须注意避免意外复制结构体值，并确保在使用之前初始化存储指针的字段。\
  \ |\n| 是否有替代方案？ | 简单的应用程序可以仅使用内置数据类型，但大多数应用程序需要定义自定义类型，而结构体是唯一的选择。 |\n\n**表 10-2**\n\
  \n本章摘要\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 定义自定义数据类型 | 定义结构体类型 | 4,\
  \ 24 |\n| 创建结构体值 | 使用字面量语法创建新值，并为各个字段赋值 | 5–7, 15 |\n| 定义类型为另一个结构体的结构体字段 | 定义嵌入字段\
  \ | 8, 9 |\n| 比较结构体值 | 使用比较运算符，确保被比较的值具有相同类型，或者具有相同字段（所有字段必须可比较）的类型 | 10, 11 |\n\
  | 转换结构体类型 | 执行显式转换，确保类型具有相同的字段 | 12 |\n| 定义未分配名称的结构体 | 定义匿名结构体 | 13–14 |\n| 防止结构体在分配给变量或用作函数参数时被复制\
  \ | 使用指针 | 16–21, 25–29 |\n| 一致地创建结构体值 | 定义构造函数 | 22, 23 |\n\n## 本章准备\n\n为准备本章，打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `structs` 的目录。导航到 `structs` 文件夹并运行清单 10-1 中所示的命令来初始化项目。\n\n提示\n\n您可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。参见第 2 章了解如何在运行示例时遇到问题时获得帮助。\n\n```\ngo mod init structs\n\
  代码清单 10-1\n初始化项目\n```\n\n在 `structs` 文件夹中添加一个名为 `main.go` 的文件，内容如清单 10-2 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc main() {\nfmt.Println(\"Hello, Structs\"\
  )\n}\n代码清单 10-2\nstructs 文件夹中 main.go 文件的内容\n```\n\n使用命令提示符在 `structs` 文件夹中运行清单\
  \ 10-3 中所示的命令。\n\n```\ngo run .\n代码清单 10-3\n运行示例项目\n```\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\
  \n```\nHello, Structs\n```\n\n## 定义和使用结构体\n\n自定义数据类型是使用 Go 语言的结构体功能定义的，如清单 10-4\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct {\n\
  name, category string\nprice float64\n}\nkayak := Product {\nname: \"Kayak\",\n\
  category: \"Watersports\",\nprice: 275,\n}\nfmt.Println(kayak.name, kayak.category,\
  \ kayak.price)\nkayak.price = 300\nfmt.Println(\"Changed price:\", kayak.price)\n\
  }\n代码清单 10-4\n在 structs 文件夹的 main.go 文件中创建自定义数据类型\n```\n\n自定义数据类型在 Go 语言中被称为*结构体类型*，使用\
  \ `type` 关键字、一个名称和 `struct` 关键字来定义。花括号内包含一系列字段，每个字段都通过名称和类型来定义。相同类型的字段可以一起声明，如图\
  \ 10-1 所示，并且所有字段必须具有不同的名称。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig1_HTML.jpg](img/512642_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1**\n\n定义结构体类型\n\n此结构体类型名为 `Product`，它有三个字段：`name` 和 `category` 字段保存 `string`\
  \ 值，`price` 字段保存 `float64` 值。`name` 和 `category` 字段具有相同的类型，可以一起定义。\n\n**GO 语言中的类在哪里？**\n\
  \nGo 语言不像其他语言那样区分结构体和类。所有自定义数据类型都定义为结构体，而决定按引用还是按值传递取决于是否使用指针。正如我在第 4 章中解释的那样，这达到了与拥有单独类型类别相同的效果，并且具有额外的灵活性，允许在每次使用值时都可以做出选择。然而，这要求程序员更加勤勉，在编码过程中必须仔细思考该选择的后果。两种方法没有孰优孰劣，结果本质上是相同的。\n\
  \n\n\n### 创建结构体值\n\n下一步是使用自定义类型创建一个值，这需要用到结构体类型名称，后跟包含结构体字段值的大括号，如图 10-2 所示。\n\n\
  ![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig2_HTML.jpg](img/512642_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** – 创建结构体值\n\n清单 10-4 中创建的值是一个 `Product`，其 `name` 字段被赋值为 `Kayak`，`category`\
  \ 字段为 `Watersports`，`price` 字段为 `275`。该结构体值被赋值给一个名为 `kayak` 的变量。\n\nGo 对语法要求严格，如果最后一个字段的值后面没有逗号或右花括号，就会报错。我通常倾向于使用尾随逗号，这样可以将右花括号放在代码文件的下一行，就像我在第\
  \ 7 章处理映射字面量语法时那样。\n\n> **注意：** Go 不允许结构体与 `const` 关键字一起使用，如果你试图定义一个常量结构体，编译器会报错。只有第\
  \ 9 章中描述的数据类型才能用于创建常量。\n\n### 使用结构体值\n\n结构体值的字段通过变量名来访问，因此，赋值给 `kayak` 变量的结构体值的\
  \ `name` 字段的值，可以通过 `kayak.name` 来访问，如图 10-3 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig3_HTML.jpg](img/512642_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** – 访问结构体字段\n\n可以使用相同的语法为结构体字段赋予新值，如图 10-4 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig4_HTML.jpg](img/512642_1_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4** – 修改结构体字段\n\n该语句将 `kayak` 变量所赋值的 `Product` 结构体值的 `price` 字段设置为 `300`。清单\
  \ 10-4 中的代码在编译和执行后会产生以下输出：\n\n```\nKayak Watersports 275\nChanged price: 300\n```\n\
  \n**理解结构体标签**\n\n结构体类型可以使用标签来定义，这些标签提供了关于字段应如何处理的信息。结构体标签只是字符串，由处理结构体值的代码通过 `reflect`\
  \ 包提供的功能来解释。关于如何使用结构体标签来改变结构体在 JSON 数据中的编码方式，请参见第 21 章；关于如何自行访问结构体标签的详细信息，请参见第 28\
  \ 章。\n\n### 部分赋值结构体值\n\n创建结构体值时，不必为所有字段提供值，如清单 10-5 所示。\n\n```go\npackage main\n\
  import \"fmt\"\nfunc main() {\ntype Product struct {\nname, category string\nprice\
  \ float64\n}\nkayak := Product {\nname: \"Kayak\",\ncategory: \"Watersports\",\n\
  }\nfmt.Println(kayak.name, kayak.category, kayak.price)\nkayak.price = 300\nfmt.Println(\"\
  Changed price:\", kayak.price)\n}\n```\n\n**清单 10-5** – 在 `structs` 文件夹的 `main.go`\
  \ 文件中分配部分字段\n\n没有为赋值给 `kayak` 变量的结构体的 `price` 字段提供初始值。当字段未提供值时，会使用该字段类型的零值。对于清单\
  \ 10-5，`price` 字段的零值是 `0`，因为该字段类型是 `float64`；代码在编译和执行后会产生以下输出：\n\n```\nKayak Watersports\
  \ 0\nChanged price: 300\n```\n\n如输出所示，省略初始值并不会阻止后续为该字段赋值。\n\n如果你定义了一个结构体类型的变量但没有为其赋值，那么所有字段都会被赋予零值，如清单\
  \ 10-6 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\nkayak := Product {\nname: \"Kayak\"\
  ,\ncategory: \"Watersports\",\n}\nfmt.Println(kayak.name, kayak.category, kayak.price)\n\
  kayak.price = 300\nfmt.Println(\"Changed price:\", kayak.price)\nvar lifejacket\
  \ Product\nfmt.Println(\"Name is zero value:\", lifejacket.name == \"\")\nfmt.Println(\"\
  Category is zero value:\", lifejacket.category == \"\")\nfmt.Println(\"Price is\
  \ zero value:\", lifejacket.price == 0)\n}\n```\n\n**清单 10-6** – 在 `structs` 文件夹的\
  \ `main.go` 文件中未赋值的变量\n\n`lifejacket` 变量的类型是 `Product`，但其字段没有被赋予任何值。`lifejacket`\
  \ 的所有字段的值都是其类型的零值，这由清单 10-6 的输出所证实：\n\n```\nKayak Watersports 0\nChanged price:\
  \ 300\nName is zero value: true\nCategory is zero value: true\nPrice is zero value:\
  \ true\n```\n\n**使用 `new` 函数创建结构体值**\n\n你可能会看到使用内置的 `new` 函数来创建结构体值的代码，如下所示：\n\n\
  ```go\n...\nvar lifejacket = new(Product)\n...\n```\n\n结果是一个指向结构体值的指针，该结构体值的字段被初始化为其类型的零值。这等价于以下语句：\n\
  \n```go\n...\nvar lifejacket = &Product{}\n...\n```\n\n这两种方法可以互换，选择哪种取决于个人偏好。\n\n\
  ### 使用字段位置创建结构体值\n\n结构体值可以不用字段名来定义，只要值的类型与结构体类型定义字段的顺序相对应即可，如清单 10-7 所示。\n\n```go\n\
  package main\nimport \"fmt\"\nfunc main() {\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\nvar kayak = Product { \"Kayak\", \"Watersports\", 275.00\
  \ }\nfmt.Println(\"Name:\", kayak.name)\nfmt.Println(\"Category:\", kayak.category)\n\
  fmt.Println(\"Price:\", kayak.price)\n}\n```\n\n**清单 10-7** – 在 `structs` 文件夹的 `main.go`\
  \ 文件中省略字段名\n\n用于定义结构体值的字面量语法仅包含值，这些值按照指定的顺序分配给结构体字段。清单 10-7 中的代码会产生以下输出：\n\n```\n\
  Name: Kayak\nCategory: Watersports\nPrice: 275\n```\n\n\n\n### 定义嵌入字段\n\n如果一个字段定义时没有名称，则称为*嵌入字段*，并通过其类型名称来访问，如代码清单\
  \ 10-8 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\ntype StockLevel struct {\nProduct\n\
  count int\n}\nstockItem := StockLevel {\nProduct: Product { \"Kayak\", \"Watersports\"\
  , 275.00 },\ncount: 100,\n}\nfmt.Println(\"Name:\", stockItem.Product.name)\nfmt.Println(\"\
  Count:\", stockItem.count\n}\n代码清单 10-8\n在 structs 文件夹的 main.go 文件中定义嵌入字段\n```\n\
  \n`StockLevel` 结构体类型有两个字段。第一个字段是嵌入字段，仅通过类型（即 `Product` 结构体类型）来定义，如图 10-5 所示。\n\n\
  ![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig5_HTML.jpg](img/512642_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n定义嵌入字段\n\n嵌入字段通过字段类型的名称来访问，这就是该特性对于字段类型为结构体的情形最为有用的原因。在此例中，嵌入字段使用 `Product`\
  \ 类型定义，这意味着使用 `Product` 作为字段名称对其进行赋值和读取，如下所示：\n\n```\n...\nstockItem := StockLevel\
  \ {\nProduct: Product { \"Kayak\", \"Watersports\", 275.00 },\ncount: 100,\n}\n\
  ...\nfmt.Println(fmt.Sprint(\"Name: \", stockItem.Product.name))\n...\n```\n\n编译并执行代码清单\
  \ 10-8 中的代码，将产生以下输出：\n\n```\nName: Kayak\nCount: 100\n```\n\n如前所述，字段名称在结构体类型中必须是唯一的，这意味着对于特定类型，只能定义一个嵌入字段。如果需要定义两个相同类型的字段，则必须为其中一个字段赋予名称，如代码清单\
  \ 10-9 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\ntype StockLevel struct {\nProduct\n\
  Alternate Product\ncount int\n}\nstockItem := StockLevel {\nProduct: Product { \"\
  Kayak\", \"Watersports\", 275.00 },\nAlternate: Product{\"Lifejacket\", \"Watersports\"\
  , 48.95 },\ncount: 100,\n}\nfmt.Println(\"Name:\", stockItem.Product.name)\nfmt.Println(\"\
  Alt Name:\", stockItem.Alternate.name)\n}\n代码清单 10-9\n在 structs 文件夹的 main.go 文件中定义一个额外的字段\n\
  ```\n\n`StockLevel` 类型有两个 `Product` 类型的字段，但其中只能有一个是嵌入字段。对于第二个字段，我为其指定了一个名称，用于后续访问该字段。编译并执行代码清单\
  \ 10-9 中的代码，将产生以下输出：\n\n```\nName: Kayak\nAlt Name: Lifejacket\n```\n\n### 比较结构体值\n\
  \n如果结构体的所有字段都可以进行比较，那么结构体值本身也是可比较的。代码清单 10-10 创建了几个结构体值，并使用比较运算符来判断它们是否相等。\n\n```\n\
  package main\nimport \"fmt\"\nfunc main() {\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\np1 := Product { name: \"Kayak\", category: \"Watersports\"\
  , price: 275.00 }\np2 := Product { name: \"Kayak\", category: \"Watersports\", price:\
  \ 275.00 }\np3 := Product { name: \"Kayak\", category: \"Boats\", price: 275.00\
  \ }\nfmt.Println(\"p1 == p2:\", p1 == p2)\nfmt.Println(\"p1 == p3:\", p1 == p3)\n\
  }\n代码清单 10-10\n在 structs 文件夹的 main.go 文件中比较结构体值\n```\n\n结构体值 `p1` 和 `p2` 相等，因为它们的字段全部相等。结构体值\
  \ `p1` 和 `p3` 不相等，因为它们的 `category` 字段所赋予的值不同。编译并执行项目，你会看到以下结果：\n\n```\np1 == p2:\
  \ true\np1 == p3: false\n```\n\n如果结构体类型定义了不可比较类型的字段，例如切片（slice），则该结构体无法进行比较，如代码清单\
  \ 10-11 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\notherNames []string\n}\np1 := Product\
  \ { name: \"Kayak\", category: \"Watersports\", price: 275.00 }\np2 := Product {\
  \ name: \"Kayak\", category: \"Watersports\", price: 275.00 }\np3 := Product { name:\
  \ \"Kayak\", category: \"Boats\", price: 275.00 }\nfmt.Println(\"p1 == p2:\", p1\
  \ == p2)\nfmt.Println(\"p1 == p3:\", p1 == p3)\n}\n代码清单 10-11\n在 structs 文件夹的 main.go\
  \ 文件中添加一个不可比较的字段\n```\n\n如第 7 章所述，Go 的比较运算符不能用于切片，这意味着 `Product` 值无法进行比较。编译这段代码时，会产生以下错误：\n\
  \n```\n.\\main.go:17:33: 无效操作: p1 == p2 (包含 []string 的结构体无法比较)\n.\\main.go:18:33:\
  \ 无效操作: p1 == p3 (包含 []string 的结构体无法比较)\n```\n\n#### 结构体类型之间的转换\n\n一个结构体类型可以转换为任何具有相同字段的其他结构体类型，即所有字段必须具有相同的名称、类型，并且按照相同的顺序定义，如代码清单\
  \ 10-12 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\n//otherNames []string\n}\ntype Item struct\
  \ {\nname string\ncategory string\nprice float64\n}\nprod := Product { name: \"\
  Kayak\", category: \"Watersports\", price: 275.00 }\nitem := Item { name: \"Kayak\"\
  , category: \"Watersports\", price: 275.00 }\nfmt.Println(\"prod == item:\", prod\
  \ == Product(item))\n}\n代码清单 10-12\n在 structs 文件夹的 main.go 文件中转换结构体类型\n```\n\n由\
  \ `Product` 和 `Item` 结构体类型创建的值可以进行比较，因为它们按照相同的顺序定义了相同的字段。编译并执行项目；你会看到以下输出：\n\n```\n\
  prod == item: true\n```\n\n\n\n### 定义匿名结构体类型\n\n匿名结构体类型在定义时不使用名称，如代码清单 10-13 所示。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc writeName(val struct {\nname, category\
  \ string\nprice float64}) {\nfmt.Println(\"Name:\", val.name)\n}\nfunc main() {\n\
  type Product struct {\nname, category string\nprice float64\n//otherNames []string\n\
  }\ntype Item struct {\nname string\ncategory string\nprice float64\n}\nprod := Product\
  \ { name: \"Kayak\", category: \"Watersports\", price: 275.00 }\nitem := Item {\
  \ name: \"Stadium\", category: \"Soccer\", price: 75000 }\nwriteName(prod)\nwriteName(item)\n\
  }\n```\n\n`writeName` 函数使用匿名结构体类型作为其参数，这意味着它可以接受任何定义了指定字段集合的结构体类型。编译并执行该项目，你将看到以下输出：\n\
  \n```\nName: Kayak\nName: Stadium\n```\n\n我并不觉得这个功能如代码清单 10-13 所示那样特别有用，但有一种变体我确实会用到，那就是在一步之内定义匿名结构体并为其赋值。这在调用那些在运行时利用\
  \ `reflect` 包提供的功能来检查其接收类型的代码时非常有用，我将在第 27 章到第 29 章中介绍这一点。`reflect` 包包含高级功能，但它也被标准库的其他部分使用，例如对\
  \ JSON 数据编码的内置支持。我将在第 21 章详细解释 JSON 功能，但就本章而言，代码清单 10-14 演示了如何使用匿名结构体来选择要包含在 JSON\
  \ 字符串中的字段。\n\n```\npackage main\nimport (\n\"fmt\"\n\"encoding/json\"\n\"strings\"\
  \n)\nfunc main() {\ntype Product struct {\nname, category string\nprice float64\n\
  }\nprod := Product { name: \"Kayak\", category: \"Watersports\", price: 275.00 }\n\
  var builder strings.Builder\njson.NewEncoder(&builder).Encode(struct {\nProductName\
  \ string\nProductPrice float64\n}{\nProductName: prod.name,\nProductPrice: prod.price,\n\
  })\nfmt.Println(builder.String())\n}\n```\n\n不用担心 `encoding/json` 和 `strings` 包，这些将在后续章节中介绍。这个示例演示了如何一步定义匿名结构体并为其赋值，我在代码清单\
  \ 10-14 中使用它创建了一个具有 `ProductName` 和 `ProductPrice` 字段的结构体，然后使用 `Product` 字段中的值为其赋值。编译并执行该项目，你将看到以下输出：\n\
  \n```\n{\"ProductName\":\"Kayak\",\"ProductPrice\":275}\n```\n\n## 创建包含结构体值的数组、切片和映射\n\
  \n在使用结构体值填充数组、切片和映射时，可以省略结构体类型，如代码清单 10-15 所示。\n\n```\npackage main\nimport \"fmt\"\
  \nfunc main() {\ntype Product struct {\nname, category string\nprice float64\n//otherNames\
  \ []string\n}\ntype StockLevel struct {\nProduct\nAlternate Product\ncount int\n\
  }\narray := [1]StockLevel {\n{\nProduct: Product { \"Kayak\", \"Watersports\", 275.00\
  \ },\nAlternate: Product{\"Lifejacket\", \"Watersports\", 48.95 },\ncount: 100,\n\
  },\n}\nfmt.Println(\"Array:\", array[0].Product.name)\nslice := []StockLevel {\n\
  {\nProduct: Product { \"Kayak\", \"Watersports\", 275.00 },\nAlternate: Product{\"\
  Lifejacket\", \"Watersports\", 48.95 },\ncount: 100,\n},\n}\nfmt.Println(\"Slice:\"\
  , slice[0].Product.name)\nkvp := map[string]StockLevel {\n\"kayak\": {\nProduct:\
  \ Product { \"Kayak\", \"Watersports\", 275.00 },\nAlternate: Product{\"Lifejacket\"\
  , \"Watersports\", 48.95 },\ncount: 100,\n},\n}\nfmt.Println(\"Map:\", kvp[\"kayak\"\
  ].Product.name)\n}\n```\n\n代码清单 10-15 中的代码创建了一个数组、一个切片和一个映射，它们都填充了一个 `StockLevel`\
  \ 值。编译器可以从包含的数据结构中推断出结构体值的类型，从而使代码表达更简洁。代码清单 10-15 产生以下输出：\n\n```\nArray: Kayak\n\
  Slice: Kayak\nMap: Kayak\n```\n\n## 理解结构体与指针\n\n将结构体赋值给一个新变量或将结构体用作函数参数时，会创建一个复制了字段值的新值，如代码清单\
  \ 10-16 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\np1 := Product {\nname: \"Kayak\",\n\
  category: \"Watersports\",\nprice: 275,\n}\np2 := p1\np1.name = \"Original Kayak\"\
  \nfmt.Println(\"P1:\", p1.name)\nfmt.Println(\"P2:\", p2.name)\n}\n```\n\n创建了一个结构体值并分配给变量\
  \ `p1`，然后复制给变量 `p2`。第一个结构体值的 `name` 字段被更改，然后两个 `name` 值都被打印出来。代码清单 10-16 的输出证实了赋值结构体值会创建一个副本：\n\
  \n```\nP1: Original Kayak\nP2: Kayak\n```\n\n与其他数据类型一样，可以使用指针创建对结构体值的引用，如代码清单 10-17\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ntype Product struct {\n\
  name, category string\nprice float64\n}\np1 := Product {\nname: \"Kayak\",\ncategory:\
  \ \"Watersports\",\nprice: 275,\n}\np2 := &p1\np1.name = \"Original Kayak\"\nfmt.Println(\"\
  P1:\", p1.name)\nfmt.Println(\"P2:\", (*p2).name)\n}\n```\n\n我使用一个与号（&）创建了一个指向 `p1`\
  \ 变量的指针，并将该地址赋给了 `p2`，`p2` 的类型变为 `*Product`，这意味着它是一个指向 `Product` 值的指针。请注意，我必须使用括号来解引用指针以访问结构体值，然后读取\
  \ `name` 字段的值，如图 10-6 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig6_HTML.jpg](img/512642_1_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 通过指针读取结构体字段\n\n其效果是，对 `name` 字段所做的更改可以通过 `p1` 和 `p2` 两者读取到，当代码被编译并执行时，会产生以下输出：\n\
  \n```\nP1: Original Kayak\nP2: Original Kayak\n```\n\n\n\n### 理解结构体指针便捷语法\n\n通过指针访问结构体字段的方式有些笨拙，这成为一个问题，因为结构体常被用作函数参数和返回值，需要使用指针来确保结构体不被不必要地复制，并且函数所做的更改能影响作为参数接收的值，如代码清单\
  \ 10-18 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Product struct {\nname,\
  \ category string\nprice float64\n}\nfunc calcTax(product *Product) {\nif ((*product).price\
  \ > 100) {\n(*product).price += (*product).price * 0.2\n}\n}\nfunc main() {\nkayak\
  \ := Product {\nname: \"Kayak\",\ncategory: \"Watersports\",\nprice: 275,\n}\ncalcTax(&kayak)\n\
  fmt.Println(\"Name:\", kayak.name, \"Category:\",\nkayak.category, \"Price\", kayak.price)\n\
  }\n```\n*代码清单 10-18 - 在 structs 文件夹的 main.go 文件中使用结构体指针*\n\n这段代码能工作，但可读性差，尤其是在同一段代码中有多处引用时，比如\
  \ `calcTax` 方法的函数体。\n\n为了简化这类代码，Go 允许在访问结构体字段时无需星号就能跟随指针，如代码清单 10-19 所示。\n\n```go\n\
  package main\nimport \"fmt\"\ntype Product struct {\nname, category string\nprice\
  \ float64\n}\nfunc calcTax(product *Product) {\nif (product.price > 100) {\nproduct.price\
  \ += product.price * 0.2\n}\n}\nfunc main() {\nkayak := Product {\nname: \"Kayak\"\
  ,\ncategory: \"Watersports\",\nprice: 275,\n}\ncalcTax(&kayak)\nfmt.Println(\"Name:\"\
  , kayak.name, \"Category:\",\nkayak.category, \"Price\", kayak.price)\n}\n```\n\
  *代码清单 10-19 - 在 structs 文件夹的 main.go 文件中使用结构体指针便捷语法*\n\n星号和括号不再是必需的，这使得指向结构体的指针可以被当作结构体值来对待，如图\
  \ 10-7 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig7_HTML.jpg](img/512642_1_En_10_Fig7_HTML.jpg)\n\
  \n*图 10-7 - 使用结构体或指向结构体的指针*\n\n这个特性不会改变函数参数的数据类型，其仍然是 `*Product`，并且仅适用于访问字段时。代码清单\
  \ 10-18 和 10-19 都产生如下输出：\n\n```\nName: Kayak Category: Watersports Price 330\n```\n\
  \n### 理解指向值的指针\n\n之前的示例分两步使用指针。第一步是创建一个值并将其赋值给一个变量，像这样：\n\n```go\n...\nkayak :=\
  \ Product {\nname: \"Kayak\",\ncategory: \"Watersports\",\nprice: 275,\n}\n...\n\
  ```\n\n第二步是使用取地址运算符来创建指针，像这样：\n\n```go\n...\ncalcTax(&kayak)\n...\n```\n\n在创建指针之前，无需将结构体值赋值给变量，取地址运算符可以直接与字面量结构体语法一起使用，如代码清单\
  \ 10-20 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Product struct {\nname,\
  \ category string\nprice float64\n}\nfunc calcTax(product *Product) {\nif (product.price\
  \ > 100) {\nproduct.price += product.price * 0.2\n}\n}\nfunc main() {\nkayak :=\
  \ &Product {\nname: \"Kayak\",\ncategory: \"Watersports\",\nprice: 275,\n}\ncalcTax(kayak)\n\
  fmt.Println(\"Name:\", kayak.name, \"Category:\",\nkayak.category, \"Price\", kayak.price)\n\
  }\n```\n*代码清单 10-20 - 在 structs 文件夹的 main.go 文件中直接创建指针*\n\n取地址运算符用在结构体类型之前，如图 10-8\
  \ 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig8_HTML.jpg](img/512642_1_En_10_Fig8_HTML.jpg)\n\
  \n*图 10-8 - 创建指向结构体值的指针*\n\n代码清单 10-20 中的代码只使用了一个指向 `Product` 值的指针，这意味着先创建常规变量再用来创建指针毫无益处。能够直接从值创建指针有助于使代码更简洁，如代码清单\
  \ 10-21 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Product struct {\nname,\
  \ category string\nprice float64\n}\nfunc calcTax(product *Product) *Product {\n\
  if (product.price > 100) {\nproduct.price += product.price * 0.2\n}\nreturn product\n\
  }\nfunc main() {\nkayak := calcTax(&Product {\nname: \"Kayak\",\ncategory: \"Watersports\"\
  ,\nprice: 275,\n})\nfmt.Println(\"Name:\", kayak.name, \"Category:\",\nkayak.category,\
  \ \"Price\", kayak.price)\n}\n```\n*代码清单 10-21 - 在 structs 文件夹的 main.go 文件中直接使用指针*\n\
  \n我修改了 `calcTax` 函数，使其返回一个结果，这样函数就能通过指针对 `Product` 值进行转换。在 `main` 函数中，我使用取地址运算符结合字面量语法创建了一个\
  \ `Product` 值，并将其指针传递给 `calcTax` 函数，然后将转换后的结果赋值给类型为 `*Pointer` 的变量。代码清单 10-20 和\
  \ 10-21 都产生如下输出：\n\n```\nName: Kayak Category: Watersports Price 330\n```\n\n\n\n\
  ### 理解结构体构造函数\n\n构造函数负责使用通过参数接收的值来创建结构体值，如代码清单 10-22 所示。\n\n```\npackage main\n\
  import \"fmt\"\ntype Product struct {\nname, category string\nprice float64\n}\n\
  func newProduct(name, category string, price float64) *Product {\nreturn &Product{name,\
  \ category, price}\n}\nfunc main() {\nproducts := [2]*Product {\nnewProduct(\"Kayak\"\
  , \"Watersports\", 275),\nnewProduct(\"Hat\", \"Skiing\", 42.50),\n}\nfor _, p :=\
  \ range products {\nfmt.Println(\"Name:\", p.name, \"Category:\",  p.category, \"\
  Price\", p.price)\n}\n}\n代码清单 10-22\n在 structs 文件夹的 main.go 文件中定义构造函数\n```\n\n构造函数用于一致地创建结构体值。构造函数通常命名为\
  \ `new` 或 `New`，后跟结构体类型，例如用于创建 `Product` 值的构造函数命名为 `newProduct`。（我将在第 12 章解释为什么构造函数名称通常以大写字母开头。）\n\
  \n构造函数返回结构体指针，地址运算符直接与结构体字面量语法一起使用，如图 10-9 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig9_HTML.jpg](img/512642_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n在构造函数中使用指针\n\n我喜欢在构造函数中通过依赖字段位置来创建值，如代码清单 10-22 所示，尽管这只是我的个人偏好。重要的是要记住返回一个指针，以避免函数返回时结构体值被复制。代码清单\
  \ 10-22 使用数组存储产品数据，你可以在数组类型中看到指针的使用：\n\n```\n...\nproducts := [2]*Product {\n...\n\
  ```\n\n此类型指定一个包含两个指向 `Product` 结构体值的指针的数组。代码清单 10-22 中的代码编译并执行后会产生以下输出：\n\n```\n\
  Name: Kayak Category: Watersports Price 275\nName: Hat Category: Skiing Price 42.5\n\
  ```\n\n使用构造函数的好处是一致性，确保对构造过程的更改会反映在该函数创建的所有结构体值中。例如，代码清单 10-23 修改了构造函数以对所有产品应用折扣。\n\
  \n```\n...\nfunc newProduct(name, category string, price float64) *Product {\nreturn\
  \ &Product{name, category, price - 10}\n}\n...\n代码清单 10-23\n在 structs 文件夹的 main.go\
  \ 文件中修改构造函数\n```\n\n这是一个简单的更改，但它将应用于由 `newProduct` 函数创建的所有 `Product` 值，这意味着我不必在代码中找到所有创建\
  \ `Product` 值的地方并逐一修改。遗憾的是，Go 在定义了构造函数后并不会阻止使用字面量语法，这意味着需要自觉使用构造函数。代码清单 10-23 中的代码会产生以下输出：\n\
  \n```\nName: Kayak Category: Watersports Price 265\nName: Hat Category: Skiing Price\
  \ 32.5\n```\n\n### 为结构体字段使用指针类型\n\n指针也可以用于 `struct` 字段，包括指向其他结构体类型的指针，如代码清单 10-24\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n*Supplier\n}\ntype Supplier struct {\nname, city string\n\
  }\nfunc newProduct(name, category string, price float64, supplier *Supplier) *Product\
  \ {\nreturn &Product{name, category, price -10, supplier}\n}\nfunc main() {\nacme\
  \ := &Supplier { \"Acme Co\", \"New York\"}\nproducts := [2]*Product {\nnewProduct(\"\
  Kayak\", \"Watersports\", 275, acme),\nnewProduct(\"Hat\", \"Skiing\", 42.50, acme),\n\
  }\nfor _, p := range products {\nfmt.Println(\"Name:\", p.name, \"Supplier:\",\n\
  p.Supplier.name, p.Supplier.city)\n}\n}\n代码清单 10-24\n在 structs 文件夹的 main.go 文件中为结构体字段使用指针\n\
  ```\n\n我向 `Product` 类型添加了一个嵌入字段，该字段使用 `Supplier` 类型，并更新了 `newProduct` 函数，使其接受一个指向\
  \ `Supplier` 的指针。通过 `Product` 结构体定义的字段来访问 `Supplier` 结构体定义的字段，如图 10-10 所示。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig10_HTML.jpg](img/512642_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10\n访问嵌套的结构体字段\n\n请注意 Go 如何处理嵌入结构体字段的指针类型使用，它允许我通过结构体类型的名称来引用该字段，在此例中 `Supplier`\
  \ 就是该名称。代码清单 10-24 中的代码会产生以下输出：\n\n```\nName: Kayak Supplier: Acme Co New York\n\
  Name: Hat Supplier: Acme Co New York\n```\n\n\n\n### 理解指针字段的复制\n\n复制结构体时，必须注意对指针字段的影响，如代码清单\
  \ 10-25 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n*Supplier\n}\ntype Supplier struct {\nname, city string\n\
  }\nfunc newProduct(name, category string, price float64, supplier *Supplier) *Product\
  \ {\nreturn &Product{name, category, price -10, supplier}\n}\nfunc main() {\nacme\
  \ := &Supplier { \"Acme Co\", \"New York\"}\np1 := newProduct(\"Kayak\", \"Watersports\"\
  , 275, acme)\np2 := *p1\np1.name = \"Original Kayak\"\np1.Supplier.name = \"BoatCo\"\
  \nfor _, p := range []Product { *p1, p2 } {\nfmt.Println(\"Name:\", p.name, \"Supplier:\"\
  ,\np.Supplier.name, p.Supplier.city)\n}\n}\n代码清单 10-25\n在 structs 文件夹的 main.go 文件中复制一个结构体\n\
  ```\n\n`newProduct` 函数用于创建一个指向 `Product` 值的指针，该指针被赋值给一个名为 `p1` 的变量。该指针被解引用并赋值给一个名为\
  \ `p2` 的变量，其效果是复制了 `Product` 值。接着修改了 `p1.name` 和 `p1.Supplier.name` 字段，然后使用 `for`\
  \ 循环输出这两个 `Product` 值的详细信息，产生如下输出：\n\n```\nName: Original Kayak Supplier: BoatCo\
  \ New York\nName: Kayak Supplier: BoatCo New York\n```\n\n输出显示，对 `name` 字段的修改仅影响了一个\
  \ `Product` 值，而对 `Supplier.name` 字段的修改则影响了两个值。这是因为复制 `Product` 结构体时，复制的是赋值给 `Supplier`\
  \ 字段的指针，而不是该指针所指向的值，从而产生了如图 10-11 所示的效果。\n\n![../images/512642_1_En_10_Chapter/512642_1_En_10_Fig11_HTML.jpg](img/512642_1_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11\n\n复制一个包含指针字段的结构体所产生的效果\n\n这通常被称为*浅拷贝*，即指针被复制，但指针所指向的值并未被复制。Go 语言没有内置支持执行*深拷贝*（即跟随指针并复制其指向的值）。相反，必须手动执行复制，如代码清单\
  \ 10-26 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n*Supplier\n}\ntype Supplier struct {\nname, city string\n\
  }\nfunc newProduct(name, category string, price float64, supplier *Supplier) *Product\
  \ {\nreturn &Product{name, category, price -10, supplier}\n}\nfunc copyProduct(product\
  \ *Product) Product {\np := *product\ns := *product.Supplier\np.Supplier = &s\n\
  return p\n}\nfunc main() {\nacme := &Supplier { \"Acme Co\", \"New York\"}\np1 :=\
  \ newProduct(\"Kayak\", \"Watersports\", 275, acme)\np2 := copyProduct(p1)\np1.name\
  \ = \"Original Kayak\"\np1.Supplier.name = \"BoatCo\"\nfor _, p := range []Product\
  \ { *p1, p2 } {\nfmt.Println(\"Name:\", p.name, \"Supplier:\",\np.Supplier.name,\
  \ p.Supplier.city)\n}\n}\n代码清单 10-26\n在 structs 文件夹的 main.go 文件中复制一个结构体值\n```\n\n\
  为了确保 `Supplier` 被复制，`copyProduct` 函数将其赋值给一个单独的变量，然后创建一个指向该变量的指针。这种方法虽然笨拙，但效果是强制复制了该结构体——尽管这是一种特定于单一结构体类型的技术，并且必须为每个嵌套的结构体字段重复执行。代码清单\
  \ 10-26 的输出显示了深拷贝的效果：\n\n```\nName: Original Kayak Supplier: BoatCo New York\nName:\
  \ Kayak Supplier: Acme Co New York\n```\n\n## 理解结构体与结构体指针的零值\n\n结构体类型的零值是一个结构体值，其所有字段都被赋予其类型的零值。指向结构体的指针的零值是\
  \ `nil`，如代码清单 10-27 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\nfunc main() {\nvar prod Product\n\
  var prodPtr *Product\nfmt.Println(\"Value:\", prod.name, prod.category, prod.price)\n\
  fmt.Println(\"Pointer:\", prodPtr)\n}\n代码清单 10-27\n在 structs 文件夹的 main.go 文件中检查零类型\n\
  ```\n\n编译并执行该项目，你会在输出中看到零值，其中 `name` 和 `category` 字段为空字符串，因为空字符串是 `string` 类型的零值：\n\
  \n```\nValue: 0\nPointer: <nil>\n```\n\n这里有一个我经常遇到的陷阱：当结构体定义了一个指向另一个结构体类型的指针字段时，如代码清单\
  \ 10-28 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n*Supplier\n}\ntype Supplier struct {\nname, city string\n\
  }\nfunc main() {\nvar prod Product\nvar prodPtr *Product\nfmt.Println(\"Value:\"\
  , prod.name, prod.category, prod.price, prod.Supplier.name)\nfmt.Println(\"Pointer:\"\
  , prodPtr)\n}\n代码清单 10-28\n在 structs 文件夹的 main.go 文件中添加一个指针字段\n```\n\n这里的问题在于尝试访问内嵌结构体的\
  \ `name` 字段。内嵌字段的零值是 `nil`，这会导致以下运行时错误：\n\n```\npanic: runtime error: invalid memory\
  \ address or nil pointer dereference\n[signal 0xc0000005 code=0x0 addr=0x0 pc=0x5bc592]\n\
  goroutine 1 [running]:\nmain.main()\nC:/structs/main.go:20 +0x92\nexit status 2\n\
  ```\n\n我经常遇到这个错误，以至于习惯性地初始化结构体指针字段，如代码清单 10-29 所示，并且在后续章节中也会经常重复这种做法。\n\n```\n...\n\
  func main() {\nvar prod Product = Product{ Supplier: &Supplier{}}\nvar prodPtr *Product\n\
  fmt.Println(\"Value:\", prod.name, prod.category, prod.price, prod.Supplier.name)\n\
  fmt.Println(\"Pointer:\", prodPtr)\n}\n...\n代码清单 10-29\n在 structs 文件夹的 main.go 文件中初始化一个结构体指针字段\n\
  ```\n\n这避免了运行时错误，你可以通过编译并执行该项目产生的输出看到：\n\n```\nValue:   0\nPointer: <nil>\n```\n\
  \n## 总结\n\n在本章中，我描述了 Go 语言的结构体特性，该特性用于创建自定义数据类型。我解释了如何定义结构体字段、如何从结构体类型创建值，以及如何在集合中使用结构体类型。我还向你展示了如何创建匿名结构体，以及如何使用指针来控制结构体值被复制时值的处理方式。下一章，我将介绍\
  \ Go 语言对方法和接口的支持。\n\n\n\n# 11. 使用方法和接口\n\n在本章中，我将介绍 Go 对方法的支持，这些方法可用于为结构体提供功能，并通过接口创建抽象。表\
  \ 11-1 将这些功能放在上下文中。\n\n表 11-1\n将方法和接口置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？\
  \ | 方法是在结构体上调用的函数，可以访问该值类型定义的所有字段。接口定义了一组方法，可以由结构体类型实现。 |\n| 为什么它们有用？ | 这些功能允许类型通过其共同特征进行混合和使用。\
  \ |\n| 如何使用它们？ | 方法使用 `func` 关键字定义，但额外添加了一个接收者。接口使用 `type` 和 `interface` 关键字定义。\
  \ |\n| 是否存在任何陷阱或限制？ | 在创建方法时，谨慎使用指针很重要；使用接口时也需小心，以避免底层动态类型带来的问题。 |\n| 是否有替代方案？ |\
  \ 这些是可选功能，但它们使得创建复杂数据类型并通过其提供的常见功能使用它们成为可能。 |\n\n表 11-2 总结了本章内容。\n\n表 11-2\n章节总结\n\
