  ```\nSlice (string): true\nArray (string): true\nArray (int): false\n```\n\n## 处理数组与切片值\n\
  \n`Value` 接口定义了表 28-6 中描述的方法，用于处理数组和切片的值。\n\n**表 28-6** 用于处理数组与切片的 `Value` 方法\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `Index(index)` | 此方法返回一个 `Value`，表示指定索引处的元素。 |\n|\
  \ `Len()` | 此方法返回数组或切片的长度。 |\n| `Cap()` | 此方法返回数组或切片的容量。 |\n| `SetLen()` | 此方法设置切片的长度。不能在数组上使用。\
