  \ `error`，当结果集已关闭时使用。 |\n\n## 理解反射的缺点\n\n反射是一个高级特性，从我用了三章来描述如何使用它这一点就可以看出。这个示例只是为了展示使用\
  \ `database/sql` 包提供的信息可以实现什么。为简单起见，此示例对结果行的结构有固定的预期。\n\n如代码清单 26-14 所示，指定单个字段是扫描到结构体中最简单、最健壮的方法。如果你决定动态地扫描到结构体，那么可以考虑一些经过充分测试的第三方包，例如\
