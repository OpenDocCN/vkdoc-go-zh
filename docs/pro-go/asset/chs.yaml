  \ | 41, 42 |\n\n## 本章准备工作\n\n为了准备本章，打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为`htmltext`的目录。运行清单\
  \ 23-1 中所示的命令来创建一个模块文件。\n\n> 提示：你可以从`https://github.com/apress/pro-go`下载本章以及本书其他所有章节的示例项目。如果在运行示例时遇到问题，请参阅第\
