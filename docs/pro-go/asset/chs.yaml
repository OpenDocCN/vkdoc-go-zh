  \ 文件夹中 types.go 文件的内容\n```\n\n在`reflection`文件夹中添加一个名为`main.go`的文件，内容如清单 27-4 所示。\n\
  \n```\npackage main\nfunc printDetails(values ...Product) {\nfor _, elem := range\
  \ values {\nPrintfln(\"Product: Name: %v, Category: %v, Price: %v\",\nelem.Name,\
  \ elem.Category, elem.Price)\n}\n}\nfunc main() {\nproduct := Product {\nName: \"\
