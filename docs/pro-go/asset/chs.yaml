  Product: Bling-Bling King ($1200.00)\nThis is the layout footer\n```\n\n\n\n###\
  \ 定义模板函数\n\n前面章节描述的内置模板函数可以通过特定于某个`Template`的自定义函数进行补充，这意味着这些函数是在代码中定义和设置的。清单 23-31\
  \ 演示了设置自定义函数的过程。\n\n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n)\n\
  func GetCategories(products []Product) (categories []string) {\ncatMap := map[string]string\
  \ {}\nfor _, p := range products {\nif (catMap[p.Category] == \"\") {\ncatMap[p.Category]\
  \ = p.Category\ncategories = append(categories, p.Category)\n}\n}\nreturn\n}\nfunc\
  \ Exec(t *template.Template) error {\nreturn t.Execute(os.Stdout, Products)\n}\n\
  func main() {\nallTemplates := template.New(\"allTemplates\")\nallTemplates.Funcs(map[string]interface{}\
  \ {\n\"getCats\": GetCategories,\n})\nallTemplates, err := allTemplates.ParseGlob(\"\
  templates/*.html\")\nif (err == nil) {\nselectedTemplated := allTemplates.Lookup(\"\
  mainTemplate\")\nerr = Exec(selectedTemplated)\n}\nif (err != nil) {\nPrintfln(\"\
  Error: %v %v\", err.Error())\n}\n}\n清单 23-31\n在 htmltext 文件夹的 main.go 文件中定义自定义函数\n\
  ```\n\n`GetCategories` 函数接收一个 `Product` 切片，并返回唯一的 `Category` 值集合。为了设置 `GetCategories`\
  \ 函数，使其能被 `Template` 使用，需要调用 `Funcs` 方法，并传入一个从函数名到函数的映射，如下所示：\n\n```\n...\nallTemplates.Funcs(map[string]interface{}\
  \ {\n\"getCats\": GetCategories,\n})\n...\n```\n\n清单 23-31 中的映射指定 `GetCategories`\
  \ 函数将使用名称 `getCats` 来调用。`Funcs` 方法必须在解析模板文件之前调用，这意味着需要先使用 `New` 函数创建一个 `Template`，这样就能在调用\
  \ `ParseFiles` 或 `ParseGlob` 方法之前注册自定义函数：\n\n```\n...\nallTemplates := template.New(\"\
  allTemplates\")\nallTemplates.Funcs(map[string]interface{} {\n\"getCats\": GetCategories,\n\
  })\nallTemplates, err := allTemplates.ParseGlob(\"templates/*.html\")\n...\n```\n\
  \n在模板内部，可以使用与内置函数相同的语法来调用自定义函数，如清单 23-32 所示。\n\n```\n{{ define \"mainTemplate\"\
  \ -}}\nThere are {{ len . }} products in the source data.\n{{ range getCats .  -}}\n\
  Category: {{ . }}\n{{ end }}\n{{- end }}\n清单 23-32\n在 templates 文件夹的 template.html\
  \ 文件中使用自定义函数\n```\n\n使用 `range` 关键字来枚举自定义函数返回的类别，这些类别会被包含在模板输出中。编译并执行该项目，你将看到以下输出（为消除空白符已进行格式化）：\n\
  \n```\nThere are 8 products in the source data.\nCategory: Watersports\nCategory:\
  \ Soccer\nCategory: Chess\n```\n\n### 禁用函数结果编码\n\n函数产生的结果会被编码，以确保安全地包含在 HTML 文档中。这对于生成\
  \ HTML、JavaScript 或 CSS 片段的函数来说可能是个问题，如清单 23-33 所示。\n\n```\n...\nfunc GetCategories(products\
  \ []Product) (categories []string) {\ncatMap := map[string]string {}\nfor _, p :=\
  \ range products {\nif (catMap[p.Category] == \"\") {\ncatMap[p.Category] = p.Category\n\
  categories = append(categories, \"p.Category\")\n}\n}\nreturn\n}\n...\n清单 23-33\n\
  在 htmltext 文件夹的 main.go 文件中创建 HTML 片段\n```\n\n`GetCategories` 函数已被修改，现在它生成一个包含 HTML\
  \ 字符串的切片。模板引擎对这些值进行了编码，这一点可以从编译并执行项目后的输出中看出：\n\n```\nThere are 8 products in the\
  \ source data.\nCategory: &lt;b&gt;p.Category&lt;/b&gt;\nCategory: &lt;b&gt;p.Category&lt;/b&gt;\n\
  Category: &lt;b&gt;p.Category&lt;/b&gt;\n```\n\n这是一种良好的实践，但当函数用于生成应直接包含在模板中而不进行编码的内容时，就会引发问题。针对这些情况，`html/template`\
  \ 包定义了一组 `string` 类型别名，用于表明函数返回的结果需要特殊处理，如表 23-10 所述。\n\n**表 23-10** 用于标识内容类型的类型别名\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `CSS` | 此类型表示 CSS 内容。 |\n| `HTML` | 此类型表示一个 HTML\
  \ 片段。 |\n| `HTMLAttr` | 此类型表示将用作 HTML 属性值的值。 |\n| `JS` | 此类型表示一段 JavaScript 代码片段。\
  \ |\n| `JSStr` | 此类型表示一个用于 JavaScript 表达式中引号内的值。 |\n| `Srcset` | 此类型表示可在 `img` 元素的\
  \ `srcset` 属性中使用的值。 |\n| `URL` | 此类型表示一个 URL。 |\n\n为了防止常规的内容处理，生成内容的函数应使用表 23-10\
  \ 中列出的类型之一，如清单 23-34 所示。\n\n```\n...\nfunc GetCategories(products []Product) (categories\
  \ []template.HTML) {\ncatMap := map[string]string {}\nfor _, p := range products\
