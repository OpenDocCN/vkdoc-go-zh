  \ 文件中使用映射\n```\n\n清单 23-40 更新了模板，以使用模板变量枚举映射的内容。\n\n```\n{{ define \"mainTemplate\"\
  \ -}}\n{{ range $key, $value := . -}}\n{{ $key }}: {{ printf \"$%.2f\" $value.Price\
  \ }}\n{{ end }}\n{{- end }}\n清单 23-40\n在 templates 文件夹的 template.html 文件中枚举映射\n\
