  \ 关键字的 `for` 循环 | [50] |\n\n## 本章准备\n\n为准备本章，打开一个新的命令提示符，导航到方便的位置，并创建一个名为 `collections`\
  \ 的目录。导航到 `collections` 文件夹，并运行代码清单 [7-1] 中所示的命令来初始化项目。\n\n```\ngo mod init collections\n\
  ```\n\n将一个名为 `main.go` 的文件添加到 `collections` 文件夹，其内容如代码清单 [7-2] 所示。\n\n**提示：** 您可以从\
  \ [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章（以及本书所有其他章节）的示例项目。请参阅第\
  \ [2] 章了解如果在运行示例时遇到问题如何获取帮助。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  fmt.Println(\"Hello, Collections\")\n}\n```\n\n使用命令提示符在 `collections` 文件夹中运行代码清单\
  \ [7-3] 中所示的命令。\n\n```\ngo run .\n```\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\n```\n\
  Hello, Collections\n```\n\n\n\n### 处理数组\n\nGo 数组的长度是固定的，包含单一类型的元素，通过索引进行访问，如代码清单\
  \ 7-4 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nvar names [3]string\n\
  names[0] = \"Kayak\"\nnames[1] = \"Lifejacket\"\nnames[2] = \"Paddle\"\nfmt.Println(names)\n\
  }\n```\n\n数组类型在方括号中包含数组的大小，接着是数组将包含的元素类型，即所谓的*底层类型*，如图 7-1 所示。数组的长度和元素类型不能更改，并且数组长度必须指定为常量。（稍后本章将介绍的切片可以存储可变数量的值。）\n\
  \n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig1_HTML.jpg](img/512642_1_En_7_Fig1_HTML.jpg)\n\
  \n数组创建后，会用元素类型的零值进行填充。在此示例中，`names` 数组将用空字符串（`\"\"`）填充，这是 `string` 类型的零值。数组中的元素使用从零开始的索引符号进行访问，如图\
  \ 7-2 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig2_HTML.jpg](img/512642_1_En_7_Fig2_HTML.jpg)\n\
  \n代码清单 7-4 中的最后一条语句将数组传递给 `fmt.Println`，它会生成数组的字符串表示并将其写入控制台，编译并执行代码时将产生以下输出：\n\n\
  ```\n[Kayak Lifejacket Paddle]\n```\n\n## 使用数组字面量语法\n\n可以使用字面量语法在一条语句中定义并填充数组，如代码清单\
  \ 7-5 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := [3]string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\" }\nfmt.Println(names)\n}\n```\n\n数组类型后面跟着包含填充数组元素的花括号，如图\
  \ 7-3 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig3_HTML.jpg](img/512642_1_En_7_Fig3_HTML.jpg)\n\
  \n**提示**\n\n使用字面量语法指定的元素数量可以小于数组的容量。数组中任何未提供值的位置都将被分配该数组类型的零值。\n\n代码清单 7-5 中的代码在编译并执行时会产生以下输出：\n\
  \n```\n[Kayak Lifejacket Paddle]\n```\n\n### 创建多维数组\n\nGo 数组是一维的，但可以组合创建多维数组，如下所示：\n\
  \n```\n...\nvar coords [3][3]int\n...\n```\n\n此语句创建一个容量为 3、底层类型为容量同样是 3 的 `int`\
  \ 数组的数组，从而产生一个 3×3 的 `int` 值数组。可以使用两个索引位置来指定单个值，如下所示：\n\n```\n...\ncoords[1][2]\
  \ = 10\n...\n```\n\n这种语法有些笨拙，尤其是对于维度更多的数组，但它功能完备，并且保持了 Go 处理数组方式的一致性。\n\n## 理解数组类型\n\
  \n数组的类型是其大小和底层类型的组合。以下是代码清单 7-5 中定义数组的语句：\n\n```\n...\nnames := [3]string { \"Kayak\"\
  , \"Lifejacket\", \"Paddle\" }\n...\n```\n\n`names` 变量的类型是 `[3]string`，意思是一个底层类型为\
  \ `string`、容量为 3 的数组。底层类型和容量的每种组合都是一种不同的类型，如代码清单 7-6 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\nnames := [3]string { \"Kayak\", \"Lifejacket\", \"\
  Paddle\" }\nvar otherArray [4]string = names\nfmt.Println(names)\n}\n```\n\n此示例中两个数组的底层类型相同，但编译器会报告错误，即使\
  \ `otherArray` 的容量足以容纳 `names` 数组中的元素也是如此。以下是编译器产生的错误：\n\n```\n.\\main.go:9:9: cannot\
  \ use names (type [3]string) as type [4]string in assignment\n```\n\n### 让编译器确定数组长度\n\
  \n使用字面量语法时，编译器可以从元素列表中推断出数组的长度，如下所示：\n\n```\n...\nnames := [...]string { \"Kayak\"\
  , \"Lifejacket\", \"Paddle\" }\n...\n```\n\n显式长度被替换为三个句点（`...`），这告诉编译器根据字面量值确定数组长度。`names`\
  \ 变量的类型仍然是 `[3]string`，唯一的区别是你可以添加或删除字面量值，而无需同时更新显式指定的长度。在本书的示例中，我不会使用此功能，因为我希望尽可能清晰地表明所使用的类型。\n\
  \n## 理解数组值\n\n正如我在第 4 章中解释的，Go 默认使用值而非引用。此行为也适用于数组，这意味着将数组赋值给一个新变量会复制数组及其包含的值，如代码清单\
  \ 7-7 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := [3]string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\" }\notherArray := names\nnames[0] = \"\
  Canoe\"\nfmt.Println(\"names:\", names)\nfmt.Println(\"otherArray:\", otherArray)\n\
  }\n```\n\n在此示例中，我将 `names` 数组赋值给一个名为 `otherArray` 的新变量，然后更改 `names` 数组索引零处的值，最后写出这两个数组。编译并执行代码会产生以下输出，表明数组及其内容已被复制：\n\
  \n```\nnames: [Canoe Lifejacket Paddle]\notherArray: [Kayak Lifejacket Paddle]\n\
  ```\n\n可以使用指针来创建对数组的引用，如代码清单 7-8 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ main() {\nnames := [3]string { \"Kayak\", \"Lifejacket\", \"Paddle\" }\notherArray\
  \ := &names\nnames[0] = \"Canoe\"\nfmt.Println(\"names:\", names)\nfmt.Println(\"\
  otherArray:\", *otherArray)\n}\n```\n\n`otherArray` 变量的类型是 `*[3]string`，表示指向一个容量为\
  \ 3 个 `string` 值的数组的指针。数组指针的工作方式与任何其他指针一样，必须解引用才能访问数组内容。代码清单 7-8 中的代码在编译并执行时会产生以下输出：\n\
  \n```\nnames: [Canoe Lifejacket Paddle]\notherArray: [Canoe Lifejacket Paddle]\n\
  ```\n\n你也可以创建包含指针的数组，这意味着数组中的值在复制数组时不会被复制。而且，正如我在第 4 章中演示的，你可以创建指向数组中特定位置的指针，即使数组内容被更改，该指针也能提供对该位置值的访问权限。\n\
  \n\n\n### 比较数组\n\n比较运算符 `==` 和 `!=` 可以应用于数组，如代码清单 7-9 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\nnames := [3]string { \"Kayak\", \"Lifejacket\", \"\
  Paddle\" }\nmoreNames := [3]string { \"Kayak\", \"Lifejacket\", \"Paddle\" }\nsame\
  \ := names == moreNames\nfmt.Println(\"comparison:\", same)\n}\n```\n\n当数组类型相同且包含相同顺序的相等元素时，它们就是相等的。`names`\
  \ 和 `moreNames` 数组相等，因为它们都是 `[3]string` 数组，并且包含相同的字符串值。代码清单 7-9 中的代码会产生以下输出：\n\n\
  ```\ncomparison: true\n```\n\n### 枚举数组\n\n使用 `for` 和 `range` 关键字对数组进行枚举，如代码清单 7-10\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := [3]string {\
  \ \"Kayak\", \"Lifejacket\", \"Paddle\" }\nfor index, value := range names {\nfmt.Println(\"\
  Index:\", index, \"Value:\", value)\n}\n}\n```\n\n我在第 6 章中详细描述了 `for` 循环，但当与 `range`\
  \ 关键字一起使用时，`for` 关键字会枚举数组的内容，在枚举数组时为每个元素生成两个值，如图 7-4 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig4_HTML.jpg](img/512642_1_En_7_Fig4_HTML.jpg)\n\
  \n第一个值（在代码清单 7-10 中分配给 `index` 变量）被赋值给当前正在枚举的数组位置。第二个值（在代码清单 7-10 中分配给名为 `value`\
  \ 的变量）被赋值给当前位置的元素。编译并执行该清单会产生以下输出：\n\n```\nIndex: 0 Value: Kayak\nIndex: 1 Value:\
  \ Lifejacket\nIndex: 2 Value: Paddle\n```\n\nGo 不允许定义变量而不使用。如果你不需要同时使用索引和值，可以使用下划线（`_`\
  \ 字符）代替变量名，如代码清单 7-11 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  names := [3]string { \"Kayak\", \"Lifejacket\", \"Paddle\" }\nfor _, value := range\
  \ names {\nfmt.Println(\"Value:\", value)\n}\n}\n```\n\n下划线被称为*空白标识符*，当某个特性返回的值后续不再使用且不应分配名称时，就会用到它。代码清单\
  \ 7-11 中的代码在枚举数组时丢弃了当前索引，并产生以下输出：\n\n```\nValue: Kayak\nValue: Lifejacket\nValue:\
  \ Paddle\n```\n\n## 使用切片\n\n将切片视为可变长度数组是理解它的最佳方式，因为当不知道需要存储多少个值，或者数量随时间变化时，切片就非常有用。定义切片的一种方法是使用内置的\
  \ `make` 函数，如代码清单 7-12 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  names := make([]string, 3)\nnames[0] = \"Kayak\"\nnames[1] = \"Lifejacket\"\nnames[2]\
  \ = \"Paddle\"\nfmt.Println(names)\n}\n```\n\n`make` 函数接受指定切片类型和长度的参数，如图 7-5 所示。\n\
  \n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig5_HTML.jpg](img/512642_1_En_7_Fig5_HTML.jpg)\n\
  \n此示例中的切片类型是 `[]string`，表示一个保存 `string` 值的切片。长度不是切片类型的一部分，因为切片的大小可以变化，我在本节后面会演示这一点。切片也可以使用字面量语法创建，如代码清单\
  \ 7-13 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := []string\
  \ {\"Kayak\", \"Lifejacket\", \"Paddle\"}\nfmt.Println(names)\n}\n```\n\n切片字面量语法与数组的语法类似，切片的初始长度由字面量值的数量推断得出，如图\
  \ 7-6 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig6_HTML.jpg](img/512642_1_En_7_Fig6_HTML.jpg)\n\
  \n切片类型和长度的组合用于创建一个数组，该数组作为切片的数据存储。切片是一个包含三个值的数据结构：一个指向数组的指针、切片的长度和切片的容量。切片的长度是它可以存储的元素数量，容量是数组中可存储的元素数量。在此示例中，长度和容量都是\
  \ 3，如图 7-7 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig7_HTML.jpg](img/512642_1_En_7_Fig7_HTML.jpg)\n\
  \n切片支持数组风格的索引表示法，允许访问底层数组中的元素。尽管图 7-7 更真实地表示了切片，但图 7-8 展示了切片如何映射到其数组。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig8_HTML.jpg](img/512642_1_En_7_Fig8_HTML.jpg)\n\
  \n此切片与其数组之间的映射很简单，但切片并不总是与其数组有如此直接的映射关系，后续示例会演示这一点。编译并执行代码清单 7-12 和代码清单 7-13 中的代码会产生以下输出：\n\
  \n```\n[Kayak Lifejacket Paddle]\n```\n\n\n\n### 向切片追加元素\n\n切片的一个关键优势在于它可以扩展以容纳更多元素，如代码清单\
  \ 7-14 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := []string\
  \ {\"Kayak\", \"Lifejacket\", \"Paddle\"}\nnames = append(names, \"Hat\", \"Gloves\"\
  )\nfmt.Println(names)\n}\n```\n\n内置的 `append` 函数接收一个切片以及一个或多个要添加到该切片的元素，元素之间用逗号分隔，如图\
  \ 7-9 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig9_HTML.jpg](img/512642_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9：向切片追加元素\n\n`append` 函数会创建一个足够大以容纳新元素的数组，复制现有的数组，并添加新的值。`append` 函数返回的结果是一个映射到新数组上的切片，如图\
  \ 7-10 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig10_HTML.jpg](img/512642_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10：向切片追加元素的结果\n\n代码清单 7-14 中的代码在编译并执行后会产生以下输出，显示两个新元素已添加到切片中：\n\n```\n[Kayak\
  \ Lifejacket Paddle Hat Gloves]\n```\n\n原始的切片及其底层数组仍然存在并可被使用，如代码清单 7-15 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := []string {\"Kayak\",\
  \ \"Lifejacket\", \"Paddle\"}\nappendedNames := append(names, \"Hat\", \"Gloves\"\
  )\nnames[0] = \"Canoe\"\nfmt.Println(\"names:\", names)\nfmt.Println(\"appendedNames:\"\
  , appendedNames)\n}\n```\n\n在这个例子中，`append` 函数的结果被赋值给一个不同的变量，效果是有了两个切片，其中一个是由另一个切片创建的。每个切片都有一个底层数组，并且这些切片是独立的。代码清单\
  \ 7-15 中的代码在编译并执行后会产生以下输出，表明通过一个切片更改值不会影响另一个切片：\n\n```\nnames: [Canoe Lifejacket\
  \ Paddle]\nappendedNames: [Kayak Lifejacket Paddle Hat Gloves]\n```\n\n#### 分配额外的切片容量\n\
  \n创建和复制数组可能效率较低。如果你预期需要向切片追加元素，可以在使用 `make` 函数时指定额外的容量，如代码清单 7-16 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc main() {\nnames := make([]string, 3, 6)\nnames[0] =\
  \ \"Kayak\"\nnames[1] = \"Lifejacket\"\nnames[2] = \"Paddle\"\nfmt.Println(\"len:\"\
  , len(names))\nfmt.Println(\"cap:\", cap(names))\n}\n```\n\n如前所述，切片具有*长度*和*容量*。切片的长度是它当前可以包含的值的数量，而容量则是在切片必须调整大小并创建新数组之前，可在底层数组中存储的元素数量。容量总是至少等于长度，但如果使用\
  \ `make` 函数分配了额外的容量，则可以更大。代码清单 7-16 中对 `make` 函数的调用创建了一个长度为 3、容量为 6 的切片，如图 7-11\
  \ 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig11_HTML.jpg](img/512642_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11：分配额外容量\n\n**提示**：你也可以对标准的固定长度数组使用 `len` 和 `cap` 函数。这两个函数都会返回数组的长度，例如，对于一个类型为\
  \ `[3]string` 的数组，两个函数都会返回 `3`。有关示例，请参阅“使用 `copy` 函数”一节。\n\n内置的 `len` 和 `cap` 函数分别返回切片的长度和容量。代码清单\
  \ 7-16 中的代码在编译并执行后会产生以下输出：\n\n```\nlen: 3\ncap: 6\n```\n\n其效果是切片的底层数组有了一些增长空间，如图\
  \ 7-12 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig12_HTML.jpg](img/512642_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12：底层数组具有额外容量的切片\n\n当 `append` 函数在具有足够容量容纳新元素的切片上调用时，底层数组不会被替换，如代码清单 7-17\
  \ 所示。\n\n**警告**：如果你定义了一个切片变量但没有对其进行初始化，那么结果将是一个长度为 0、容量为 0 的切片，并且当向它追加元素时会导致错误。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := make([]string, 3, 6)\n\
  names[0] = \"Kayak\"\nnames[1] = \"Lifejacket\"\nnames[2] = \"Paddle\"\nappendedNames\
  \ := append(names, \"Hat\", \"Gloves\")\nnames[0] = \"Canoe\"\nfmt.Println(\"names:\"\
  , names)\nfmt.Println(\"appendedNames:\", appendedNames)\n}\n```\n\n`append` 函数的结果是一个长度增加但仍然由同一个底层数组支持的切片。原始切片仍然存在并且由同一数组支持，其效果是现在有两个对单个数组的视图，如图\
  \ 7-13 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig13_HTML.jpg](img/512642_1_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13：由单个数组支持的多个切片\n\n由于这些切片由同一个数组支持，因此通过一个切片分配新值也会影响另一个切片，这可以从代码清单 7-17 代码的输出中看到：\n\
  \n```\nnames: [Canoe Lifejacket Paddle]\nappendedNames: [Canoe Lifejacket Paddle\
  \ Hat Gloves]\n```\n\n### 将一个切片追加到另一个切片\n\n`append` 函数可用于将一个切片追加到另一个切片，如代码清单 7-18\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nnames := make([]string,\
  \ 3, 6)\nnames[0] = \"Kayak\"\nnames[1] = \"Lifejacket\"\nnames[2] = \"Paddle\"\n\
  moreNames := []string { \"Hat Gloves\"}\nappendedNames := append(names, moreNames...)\n\
  fmt.Println(\"appendedNames:\", appendedNames)\n}\n```\n\n第二个参数后面跟三个点（`...`），这是必需的，因为内置的\
  \ `append` 函数定义了一个*可变参数*，我将在第 8 章中描述。对于本章来说，只要知道你可以将一个切片的内容追加到另一个切片即可，前提是使用了这三个点。（如果你省略了这三个点，Go\
  \ 编译器将会报告错误，因为它认为你试图将第二个切片作为单个值添加到第一个切片，并且它知道类型不匹配。）代码清单 7-18 中的代码在编译并执行后会产生以下输出：\n\
  \n```\nappendedNames: [Kayak Lifejacket Paddle Hat Gloves]\n```\n\n\n\n### 从现有数组创建切片\n\
  \n切片可以通过使用现有数组来创建，这建立在前文示例所述行为的基础之上，并强调了切片作为数组视图的本质。代码清单 7-19 定义了一个数组，并使用它来创建切片。\n\
  \n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := [4]string { \"\
  Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nsomeNames := products[1:3]\nallNames\
  \ := products[:]\nfmt.Println(\"someNames:\", someNames)\nfmt.Println(\"allNames\"\
  , allNames)\n}\n```\n\n`products` 变量被赋值为一个标准的固定长度数组，其中包含 `string` 类型的值。该数组通过一个指定了低值和高值的范围来创建切片，如图\
  \ 7-14 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig14_HTML.jpg](img/512642_1_En_7_Fig14_HTML.jpg)\n\
  \n使用范围从现有数组创建切片\n\n范围用方括号表示，低值和高值之间用冒号分隔。切片中的第一个索引被设置为低值，其长度是高值减去低值的结果。这意味着范围 `[1:3]`\
  \ 创建了一个切片，其零索引映射到数组的索引 1，且长度为 2。正如本例所示，切片不必与底层数组的起始位置对齐。\n\n范围的起始索引和数量可以省略，以便包含来源中的所有元素，如图\
  \ 7-15 所示。（你也可以只省略其中一个值，后面的示例会展示。）\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig15_HTML.jpg](img/512642_1_En_7_Fig15_HTML.jpg)\n\
  \n包含所有元素的范围\n\n代码清单 7-19 中的代码创建了两个切片，这两个切片都由同一个数组支持。`someNames` 切片提供了数组的部分视图，而 `allNames`\
  \ 切片则是整个数组的视图，如图 7-16 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig16_HTML.jpg](img/512642_1_En_7_Fig16_HTML.jpg)\n\
  \n从现有数组创建切片\n\n代码清单 7-19 中的代码编译并执行后，会产生以下输出：\n\n```\nsomeNames: [Lifejacket Paddle]\n\
  allNames [Kayak Lifejacket Paddle Hat]\n```\n\n### 使用现有数组创建切片时追加元素\n\n当追加元素时，切片与现有数组之间的关系可能会产生不同的结果。\n\
  \n如前例所示，可以对切片进行偏移，使其第一个索引位置不在数组的起始位置，并且其最后一个索引不指向数组的最后一个元素。在代码清单 7-19 中，`someNames`\
  \ 切片的索引 0 映射到了数组的索引 1。在此之前，切片的容量与底层数组的长度保持一致，但现在情况不同了，因为偏移的效果是减少了切片可以使用的数组部分。代码清单\
  \ 7-20 添加了打印两个切片长度和容量信息的语句。\n\n```go\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\nproducts := [4]string { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nsomeNames\
  \ := products[1:3]\nallNames := products[:]\nfmt.Println(\"someNames:\", someNames)\n\
  fmt.Println(\"someNames len:\", len(someNames), \"cap:\", cap(someNames))\nfmt.Println(\"\
  allNames\", allNames)\nfmt.Println(\"allNames len\", len(allNames), \"cap:\", cap(allNames))\n\
  }\n```\n\n代码清单 7-20 中的代码编译并执行后，会产生以下输出，证实了偏移切片的效果：\n\n```\nsomeNames: [Lifejacket\
  \ Paddle]\nsomeNames len: 2 cap: 3\nallNames [Kayak Lifejacket Paddle Hat]\nallNames\
  \ len 4 cap: 4\n```\n\n代码清单 7-21 向 `someNames` 切片追加了一个元素。\n\n```go\npackage main\n\
  import \"fmt\"\nfunc main() {\nproducts := [4]string { \"Kayak\", \"Lifejacket\"\
  , \"Paddle\", \"Hat\"}\nsomeNames := products[1:3]\nallNames := products[:]\nsomeNames\
  \ = append(someNames, \"Gloves\")\nfmt.Println(\"someNames:\", someNames)\nfmt.Println(\"\
  someNames len:\", len(someNames), \"cap:\", cap(someNames))\nfmt.Println(\"allNames\"\
  , allNames)\nfmt.Println(\"allNames len\", len(allNames), \"cap:\", cap(allNames))\n\
  }\n```\n\n这个切片有足够的容量来容纳新元素而无需扩容，但用于存储该元素的数组位置已经包含在 `allNames` 切片中，这意味着 `append`\
  \ 操作会扩展 `someNames` 切片，并改变通过 `allNames` 切片可以访问的一个值，如图 7-17 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig17_HTML.jpg](img/512642_1_En_7_Fig17_HTML.jpg)\n\
  \n向切片追加元素\n\n### 让切片行为可预测\n\n切片共享数组的方式会引起混淆。一些开发者期望切片是独立的，当值被存储到多个切片共用的数组时，会得到意外的结果。另一些开发者编写的代码期望数组被共享，但当扩容导致切片分离时，也会得到意外的结果。\n\
  \n切片看似不可预测，但仅仅是因为你使用它们的方式不一致。我的建议是将切片分为两类，在创建时决定它属于哪一类，并且不改变其类别。\n\n第一类是固定长度数组的固定长度视图。这听起来比实际更有用，因为切片可以映射到数组的特定区域，并且可以通过编程方式选择这个区域。在此类别中，你可以修改切片中的元素，但不能追加新元素，这意味着所有映射到该数组的切片都将使用修改后的元素。\n\
  \n第二类是可变长度的数据集合。我确保此类别中的每个切片都有自己的底层数组，并且不被任何其他切片共享。这种方法允许我自由地向切片添加新元素，而无需担心对其他切片的影响。\n\
  \n\n\n如果你在使用切片时感到困惑，且没有得到预期结果，那么请问自己：你的每个切片属于哪一类？你是否在处理切片时存在不一致，或者从同一源数组中创建了不同类别的切片？\n\
  \n如果你将切片用作数组的固定视图，那么你可以期待多个切片对该数组提供一致的视图，并且你赋值的任何新值都将被所有映射到被修改元素的切片所反映。\n\n这一结果由清单\
  \ 7-21 中的代码编译和执行后产生的输出所证实：\n\n```\nsomeNames: [Lifejacket Paddle Gloves]\nsomeNames\
  \ len: 3 cap: 3\nallNames [Kayak Lifejacket Paddle Gloves]\nallNames len 4 cap:\
  \ 4\n```\n\n将值`Gloves`追加到`someNames`切片会改变`allNames[3]`返回的值，因为这些切片共享同一个数组。\n\n输出还显示切片的长度和容量相同，这意味着在没有创建更大的后备数组的情况下，切片已经没有扩展空间。为了确认这一行为，清单\
  \ 7-22 向`someNames`切片追加了另一个元素。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\nproducts := [4]string { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nsomeNames\
  \ := products[1:3]\nallNames := products[:]\nsomeNames = append(someNames, \"Gloves\"\
  )\nsomeNames = append(someNames, \"Boots\")\nfmt.Println(\"someNames:\", someNames)\n\
  fmt.Println(\"someNames len:\", len(someNames), \"cap:\", cap(someNames))\nfmt.Println(\"\
  allNames\", allNames)\nfmt.Println(\"allNames len\", len(allNames), \"cap:\", cap(allNames))\n\
  }\n清单 7-22：在 collections 文件夹的 main.go 文件中追加另一个元素\n\n```\n\n第一次调用`append`函数会在现有的后备数组中扩展`someNames`切片。当再次调用`append`函数时，没有剩余容量，因此会创建一个新数组，复制内容，两个切片由不同的数组支持，如图\
  \ 7-18 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig18_HTML.jpg](img/512642_1_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18：通过追加元素导致切片调整大小\n\n调整大小的过程只复制切片映射的数组元素，这具有重新对齐切片和数组索引的效果。清单 7-22 中的代码在编译和执行后产生以下输出：\n\
  \n```\nsomeNames: [Lifejacket Paddle Gloves Boots]\nsomeNames len: 4 cap: 6\nallNames\
  \ [Kayak Lifejacket Paddle Gloves]\nallNames len 4 cap: 4\n```\n\n### 从数组创建切片时指定容量\n\
  \n范围可以包含一个最大容量，这在一定程度上可以控制数组何时会被复制，如清单 7-23 所示。\n\n```\npackage main\nimport \"\
  fmt\"\nfunc main() {\nproducts := [4]string { \"Kayak\", \"Lifejacket\", \"Paddle\"\
  , \"Hat\"}\nsomeNames := products[1:3:3]\nallNames := products[:]\nsomeNames = append(someNames,\
  \ \"Gloves\")\n//someNames = append(someNames, \"Boots\")\nfmt.Println(\"someNames:\"\
  , someNames)\nfmt.Println(\"someNames len:\", len(someNames), \"cap:\", cap(someNames))\n\
  fmt.Println(\"allNames\", allNames)\nfmt.Println(\"allNames len\", len(allNames),\
  \ \"cap:\", cap(allNames))\n}\n清单 7-23：在 collections 文件夹的 main.go 文件中指定切片容量\n\n\
  ```\n\n这个附加的值被称为*最大值*，在高位值之后指定，如图 7-19 所示，并且必须在被切片的数组边界内。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig19_HTML.jpg](img/512642_1_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19：在范围中指定容量\n\n最大值并不直接指定最大容量。相反，最大容量是通过从最大值中减去低位值来确定的。在示例中，最大值是`3`，低位值是`1`，这意味着容量将被限制为\
  \ 2。结果是`append`操作导致切片调整大小并分配自己的数组，而不是在现有数组中扩展，这可以从清单 7-23 代码的输出中看出：\n\n```\nsomeNames:\
  \ [Lifejacket Paddle Gloves]\nsomeNames len: 3 cap: 4\nallNames [Kayak Lifejacket\
  \ Paddle Hat]\nallNames len 4 cap: 4\n```\n\n切片调整大小意味着追加到`someNames`切片的`Gloves`值不会成为`allNames`切片映射的值之一。\n\
  \n### 从其他切片创建切片\n\n切片也可以从其他切片创建，但如果它们被调整大小，切片之间的关系不会保留。为了说明这一点，清单 7-24 从一个切片创建了另一个切片。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := [4]string { \"Kayak\"\
  , \"Lifejacket\", \"Paddle\", \"Hat\"}\nallNames := products[1:]\nsomeNames := allNames[1:3]\n\
  allNames = append(allNames, \"Gloves\")\nallNames[1] = \"Canoe\"\nfmt.Println(\"\
  someNames:\", someNames)\nfmt.Println(\"allNames\", allNames)\n}\n清单 7-24：在 collections\
  \ 文件夹的 main.go 文件中从切片创建切片\n\n```\n\n用于创建`someNames`切片的范围应用于`allNames`，它本身也是一个切片：\n\
  \n```\n...\nsomeNames := allNames[1:3]\n...\n```\n\n这个范围创建了一个映射到`allNames`切片中第二个和第三个元素的切片。`allNames`切片是使用它自己的范围创建的：\n\
  \n```\n...\nallNames := products[1:]\n...\n```\n\n这个范围创建了一个映射到源数组中除第一个元素之外的所有元素的切片。这些范围的效果是组合的，这意味着`someNames`切片将映射到数组中的第二个和第三个位置，如图\
  \ 7-20 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig20_HTML.jpg](img/512642_1_En_7_Fig20_HTML.jpg)\n\
  \n图 7-20：从切片创建切片\n\n使用一个切片创建另一个切片是一种有效的方法，可以继承偏移起始位置，这正是图 7-19 所展示的。但请记住，切片本质上是数组部分的指针，这意味着它们不能指向另一个切片。实际上，范围用于确定由同一个数组支持的切片映射，如图\
  \ 7-21 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig21_HTML.jpg](img/512642_1_En_7_Fig21_HTML.jpg)\n\
  \n图 7-21：切片的实际排列\n\n切片的行为与本章节中的其他示例一致：如果追加元素时没有可用容量，切片将被调整大小，此时它们将不再共享同一个数组。\n\n\
  ### 使用`copy`函数\n\n`copy`函数用于在切片之间复制元素。此函数可用于确保切片拥有独立的数组，以及创建组合来自不同源元素的切片。\n\n\n\n\
  #### 使用 `copy` 函数确保切片数组独立\n\n`copy` 函数可用于复制现有切片，选择部分或全部元素，但确保新切片由其自有数组支持，如代码清单 7-25\
  \ 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := [4]string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nallNames := products[1:]\n\
  someNames := make([]string, 2)\ncopy(someNames, allNames)\nfmt.Println(\"someNames:\"\
  , someNames)\nfmt.Println(\"allNames\", allNames)\n}\n代码清单 7-25\n在 collections 文件夹的\
  \ main.go 文件中复制切片\n```\n\n`copy` 函数接受两个参数，即目标切片和源切片，如图 7-22 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig22_HTML.jpg](img/512642_1_En_7_Fig22_HTML.jpg)\n\
  \n图 7-22\n\n使用内置的 `copy` 函数\n\n该函数将元素复制到目标切片。切片不必具有相同长度，因为 `copy` 函数只会在到达目标切片或源切片的末尾时停止复制。即使现有后备数组中有可用容量，目标切片的大小也不会调整，这意味着你必须确保它有足够的长度来容纳你想要复制的元素数量。\n\
  \n代码清单 7-25 中 `copy` 语句的效果是：元素从 `allNames` 切片中复制，直到 `someNames` 切片的长度被耗尽。编译并执行该代码清单将产生以下输出：\n\
  \n```go\nsomeNames: [Lifejacket Paddle]\nallNames [Lifejacket Paddle Hat]\n```\n\
  \n`someNames` 切片的长度为 `2`，这意味着从 `allNames` 切片复制了两个元素。即使 `someNames` 切片有额外的容量，也不会复制更多元素，因为\
  \ `copy` 函数依赖的是切片的长度。\n\n#### 理解未初始化切片的陷阱\n\n正如我在上一节中所解释的，`copy` 函数不会调整目标切片的大小。一个常见的陷阱是试图将元素复制到尚未初始化的切片中，如代码清单\
  \ 7-26 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := [4]string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nallNames := products[1:]\n\
  var someNames []string\ncopy(someNames, allNames)\nfmt.Println(\"someNames:\", someNames)\n\
  fmt.Println(\"allNames\", allNames)\n}\n代码清单 7-26\n在 collections 文件夹的 main.go 文件中将元素复制到未初始化的切片\n\
  ```\n\n我用一条定义了 `someNames` 变量但未初始化的语句，替换了使用 `make` 函数初始化 `someNames` 切片的语句。这段代码可以编译并执行，不会报错，但会产生以下结果：\n\
  \n```go\nsomeNames: []\nallNames [Lifejacket Paddle Hat]\n```\n\n没有元素被复制到目标切片。发生这种情况是因为未初始化的切片长度和容量都为零。当到达目标切片的长度时，`copy`\
  \ 函数会停止复制，由于长度为零，因此不会发生任何复制操作。没有报告错误，因为 `copy` 函数按预期方式工作，但这很少是预期的效果，如果你遇到切片意外为空的情况，这很可能是原因。\n\
  \n#### 复制切片时指定范围\n\n可以使用范围对要复制的元素进行精细控制，如代码清单 7-27 所示。\n\n```go\npackage main\n\
  import \"fmt\"\nfunc main() {\nproducts := [4]string { \"Kayak\", \"Lifejacket\"\
  , \"Paddle\", \"Hat\"}\nallNames := products[1:]\nsomeNames := []string { \"Boots\"\
  , \"Canoe\"}\ncopy(someNames[1:], allNames[2:3])\nfmt.Println(\"someNames:\", someNames)\n\
  fmt.Println(\"allNames\", allNames)\n}\n代码清单 7-27\n在 collections 文件夹的 main.go 文件中使用范围复制元素\n\
  ```\n\n应用于目标切片的范围意味着复制的元素将从位置 1 开始。应用于源切片的范围意味着复制将从位置 2 的元素开始，并且将复制一个元素。编译并执行代码清单\
  \ 7-27 中的代码将产生以下输出：\n\n```go\nsomeNames: [Boots Hat]\nallNames [Lifejacket Paddle\
  \ Hat]\n```\n\n#### 复制不同大小的切片\n\n导致“理解未初始化切片的陷阱”一节中所述问题的行为允许复制不同大小的切片，只要记得初始化它们即可。如果目标切片比源切片大，那么复制将继续，直到源切片中的最后一个元素被复制，如代码清单\
  \ 7-28 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := []string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nreplacementProducts := []string\
  \ { \"Canoe\", \"Boots\"}\ncopy(products, replacementProducts)\nfmt.Println(\"products:\"\
  , products)\n}\n代码清单 7-28\n在 collections 文件夹的 main.go 文件中复制较小的源切片\n```\n\n源切片仅包含两个元素，并且未使用范围。结果是\
  \ `copy` 函数开始将元素从 `replacementProducts` 切片复制到 `products` 切片，并在到达 `replacementProducts`\
  \ 切片的末尾时停止。`products` 切片中的其余元素不受复制操作影响，如示例输出所示：\n\n```go\nproducts: [Canoe Boots\
  \ Paddle Hat]\n```\n\n如果目标切片比源切片小，那么复制将继续，直到目标切片中的所有元素都被替换，如代码清单 7-29 所示。\n\n```go\n\
  package main\nimport \"fmt\"\nfunc main() {\nproducts := []string { \"Kayak\", \"\
  Lifejacket\", \"Paddle\", \"Hat\"}\nreplacementProducts := []string { \"Canoe\"\
  , \"Boots\"}\ncopy(products[0:1], replacementProducts)\nfmt.Println(\"products:\"\
  , products)\n}\n代码清单 7-29\n在 collections 文件夹的 main.go 文件中复制较大的源切片\n```\n\n用于目标切片范围的切片长度为\
  \ 1，这意味着只会从源数组复制一个元素，如示例输出所示：\n\n```go\nproducts: [Canoe Lifejacket Paddle Hat]\n\
  ```\n\n### 删除切片元素\n\n没有用于删除切片元素的内置函数，但可以使用范围和 `append` 函数执行此操作，如代码清单 7-30 所示。\n\n\
  ```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := [4]string { \"Kayak\"\
  , \"Lifejacket\", \"Paddle\", \"Hat\"}\ndeleted := append(products[:2], products[3:]...)\n\
  fmt.Println(\"Deleted:\", deleted)\n}\n代码清单 7-30\n在 collections 文件夹的 main.go 文件中删除切片元素\n\
  ```\n\n要删除一个值，可使用 `append` 方法组合两个范围，这两个范围包含切片中除不再需要的元素之外的所有元素。编译并执行代码清单 7-30 将产生以下输出：\n\
  \n```go\nDeleted: [Kayak Lifejacket Hat]\n```\n\n\n\n### 枚举切片\n\n切片的枚举方式与数组相同，使用`for`和`range`关键字，如代码清单\
  \ 7-31 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := []string\
  \ { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\nfor index, value := range products[2:]\
  \ {\nfmt.Println(\"Index:\", index, \"Value:\", value)\n}\n}\n```\n\n我在代码清单 7-31\
  \ 中描述了`for`循环的不同使用方式，但当与`range`关键字结合时，`for`关键字可以枚举切片，为每个元素生成`index`和`value`变量。代码清单\
  \ 7-31 中的代码将输出以下内容：\n\n```\nIndex: 0 Value: Paddle\nIndex: 1 Value: Hat\n```\n\n\
  ### 排序切片\n\n切片没有内置的排序支持，但标准库包含`sort`包，该包定义了用于对不同类型切片进行排序的函数。`sort`包将在第 18 章中详细描述，但代码清单\
  \ 7-32 演示了一个简单示例，为本章提供一些背景。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"sort\"\n\
  )\nfunc main() {\nproducts := []string { \"Kayak\", \"Lifejacket\", \"Paddle\",\
  \ \"Hat\"}\nsort.Strings(products)\nfor index, value := range products {\nfmt.Println(\"\
  Index:\", index, \"Value:\", value)\n}\n}\n```\n\n`Strings`函数对`[]string`中的值进行原地排序，当示例编译并执行时，将产生以下结果：\n\
  \n```\nIndex: 0 Value: Hat\nIndex: 1 Value: Kayak\nIndex: 2 Value: Lifejacket\n\
  Index: 3 Value: Paddle\n```\n\n正如第 18 章所解释的，`sort`包包含对包含整数和字符串的切片进行排序的函数，并支持对自定义数据类型进行排序。\n\
  \n### 比较切片\n\nGo 限制使用比较运算符，因此切片只能与`nil`值进行比较。比较两个切片会产生错误，代码清单 7-33 将演示这一点。\n\n```go\n\
  package main\nimport (\n\"fmt\"\n//\"sort\"\n)\nfunc main() {\np1 := []string {\
  \ \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\np2 := p1\nfmt.Println(\"Equal:\"\
  , p1 == p2)\n}\n```\n\n当编译此代码时，会产生以下错误：\n\n```\n.\\main.go:13:30: invalid operation:\
  \ p1 == p2 (slice can only be compared to nil)\n```\n\n然而，有一种方法可以比较切片。标准库包含一个名为`reflect`的包，其中包含一个名为`DeepEqual`的便捷函数。`reflect`包在第\
  \ 27 章至第 29 章中描述，并包含高级特性（这就是为什么需要三章来描述其提供的特性）。`DeepEqual`函数可用于比较比相等运算符更广泛的数据类型，包括切片，如代码清单\
  \ 7-34 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"reflect\"\n)\nfunc main()\
  \ {\np1 := []string { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\np2 := p1\n\
  fmt.Println(\"Equal:\", reflect.DeepEqual(p1, p2))\n}\n```\n\n`DeepEqual`函数很方便，但在你自己的项目中用它之前，你应该阅读描述`reflect`包的章节以了解其工作原理。该清单在编译并执行时将产生以下输出：\n\
  \n```\nEqual: true\n```\n\n### 获取切片底层的数组\n\n如果你有一个切片但需要一个数组（通常是因为某个函数需要数组作为参数），你可以对切片执行显式转换，如代码清单\
  \ 7-35 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"reflect\"\n)\nfunc main()\
  \ {\np1 := []string { \"Kayak\", \"Lifejacket\", \"Paddle\", \"Hat\"}\narrayPtr\
  \ := (*[3]string)(p1)\narray := *arrayPtr\nfmt.Println(array)\n}\n```\n\n我分两步完成了这个任务。第一步是对`[]string`切片执行显式类型转换，转换为`*[3]string`。在指定数组类型时必须小心，因为如果数组所需的元素数量超过切片的长度，则会发生错误。数组的长度可以小于切片的长度，在这种情况下，数组将不包含所有切片的值。在这个例子中，切片中有四个值，而我指定了一个可以存储三个值的数组类型，这意味着数组将只包含前三个切片值。\n\
  \n在第二步中，我跟随指针获取数组值，然后将其打印出来。代码清单 7-35 中的代码在编译并执行时产生以下输出：\n\n```\n[Kayak Lifejacket\
  \ Paddle]\n```\n\n## 使用映射\n\n映射是一种内建的数据结构，它将数据值与键关联起来。与数组将值与顺序的整数位置关联不同，映射可以使用其他数据类型作为键，如代码清单\
  \ 7-36 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := make(map[string]float64,\
  \ 10)\nproducts[\"Kayak\"] = 279\nproducts[\"Lifejacket\"] = 48.95\nfmt.Println(\"\
  Map size:\", len(products))\nfmt.Println(\"Price:\", products[\"Kayak\"])\nfmt.Println(\"\
  Price:\", products[\"Hat\"])\n}\n```\n\n映射使用内建的`make`函数创建，就像切片一样。映射的类型使用`map`关键字指定，后跟方括号中的键类型，再后跟值类型，如图\
  \ 7-23 所示。`make`函数的最后一个参数指定了映射的初始容量。映射和切片一样，会自动调整大小，并且可以省略大小参数。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig23_HTML.jpg](img/512642_1_En_7_Fig23_HTML.jpg)\n\
  \n图 7-23：定义映射\n\n代码清单 7-36 中的语句将存储`float64`值，这些值使用`string`键进行索引。使用类似数组的语法将值存储到映射中，但指定的是键而不是位置，如下所示：\n\
  \n```\n...\nproducts[\"Kayak\"] = 279\n...\n```\n\n此语句使用键`Kayak`存储`float64`值。使用相同的语法从映射中读取值：\n\
  \n```\n...\nfmt.Println(\"Price:\", products[\"Kayak\"])\n...\n```\n\n如果映射包含指定的键，则返回与该键关联的值。如果映射不包含该键，则返回映射值类型的零值。使用内建的`len`函数获取映射中存储的项目数量，如下所示：\n\
  \n```\n...\nfmt.Println(\"Map size:\", len(products))\n...\n```\n\n代码清单 7-36 中的代码在编译并执行时产生以下输出：\n\
  \n```\nMap size: 2\nPrice: 279\nPrice: 0\n```\n\n\n\n### 使用映射字面量语法\n\n切片也可以使用字面量语法来定义，如代码清单\
  \ 7-37 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 279,\n\"Lifejacket\": 48.95,\n}\nfmt.Println(\"Map size:\", len(products))\n\
  fmt.Println(\"Price:\", products[\"Kayak\"])\nfmt.Println(\"Price:\", products[\"\
  Hat\"])\n}\nListing 7-37\n在 collections 文件夹的 main.go 文件中使用映射字面量语法\n```\n\n字面量语法在大括号之间指定映射的初始内容。每个映射条目使用键、冒号、值，然后逗号来指定，如图\
  \ 7-24 所示。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig24_HTML.jpg](img/512642_1_En_7_Fig24_HTML.jpg)\n\
  \n图 7-24  \n映射字面量语法\n\nGo 对语法很讲究，如果映射值后面没有逗号或结束大括号，就会产生错误。我更倾向于使用尾随逗号，这样可以将结束大括号放在代码文件的下一行。\n\
  \n字面量语法中使用的键必须是唯一的，如果两个字面量条目使用了相同的名称，编译器会报错。编译并执行代码清单 7-37 会产生以下输出：\n\n```\nMap\
  \ size: 2\nPrice: 279\nPrice: 0\n```\n\n### 检查映射中的元素\n\n如前所述，当读取没有对应键的值时，映射会返回值类型的零值。这可能使得难以区分存储的值恰好是零值还是键不存在，如代码清单\
  \ 7-38 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 279,\n\"Lifejacket\": 48.95,\n\"Hat\": 0,\n}\nfmt.Println(\"Hat:\"\
  , products[\"Hat\"])\n}\nListing 7-38\n在 collections 文件夹的 main.go 文件中读取映射值\n```\n\
  \n这段代码的问题在于 `products[\"Hat\"]` 返回零，但不知道这是因为零是存储的值，还是因为没有与键 `Hat` 相关联的值。为了解决这个问题，映射在读取值时会产生两个值，如代码清单\
  \ 7-39 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 279,\n\"Lifejacket\": 48.95,\n\"Hat\": 0,\n}\nvalue, ok := products[\"\
  Hat\"]\nif (ok) {\nfmt.Println(\"Stored value:\", value)\n} else {\nfmt.Println(\"\
  No stored value\")\n}\n}\nListing 7-39\n在 collections 文件夹的 main.go 文件中判断映射中是否存在值\n\
  ```\n\n这被称为“逗号 ok”技巧，即从映射中读取值时，将值赋给两个变量：\n\n```\n...\nvalue, ok := products[\"Hat\"\
  ]\n...\n```\n\n第一个值要么是与指定键关联的值，要么是键不存在时的零值。第二个值是 `bool` 类型，如果映射包含指定键则为 `true`，否则为\
  \ `false`。第二个值通常赋给名为 `ok` 的变量，这就是“逗号 ok”这个术语的由来。\n\n此技巧可以使用初始化语句进行简化，如代码清单 7-40\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 279,\n\"Lifejacket\": 48.95,\n\"Hat\": 0,\n}\nif value, ok := products[\"\
  Hat\"]; ok {\nfmt.Println(\"Stored value:\", value)\n} else {\nfmt.Println(\"No\
  \ stored value\")\n}\n}\nListing 7-40\n在 collections 文件夹的 main.go 文件中使用初始化语句\n```\n\
  \n编译并执行代码清单 7-39 和 7-40 中的代码会产生以下输出，表明键 `Hat` 在映射中存储了值 `0`：\n\n```\nStored value:\
  \ 0\n```\n\n### 从映射中删除元素\n\n使用内置的 `delete` 函数从映射中删除元素，如代码清单 7-41 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\"\
  \ : 279,\n\"Lifejacket\": 48.95,\n\"Hat\": 0,\n}\ndelete(products, \"Hat\")\nif\
  \ value, ok := products[\"Hat\"]; ok {\nfmt.Println(\"Stored value:\", value)\n\
  } else {\nfmt.Println(\"No stored value\")\n}\n}\nListing 7-41\n在 collections 文件夹的\
  \ main.go 文件中从映射中删除元素\n```\n\n`delete` 函数的参数是映射和要删除的键。如果指定的键不在映射中，不会报错。编译并执行代码清单\
  \ 7-41 中的代码会产生以下输出，确认 `Hat` 键已不在映射中：\n\n```\nNo stored value\n```\n\n### 枚举映射的内容\n\
  \n使用 `for` 和 `range` 关键字来枚举映射，如代码清单 7-42 所示。\n\n```\npackage main\nimport \"fmt\"\
  \nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\" : 279,\n\"Lifejacket\"\
  : 48.95,\n\"Hat\": 0,\n}\nfor key, value := range products {\nfmt.Println(\"Key:\"\
  , key, \"Value:\", value)\n}\n}\nListing 7-42\n在 collections 文件夹的 main.go 文件中枚举映射\n\
  ```\n\n当 `for` 和 `range` 关键字与映射一起使用时，两个变量会在枚举映射内容时被赋予键和值。编译并执行代码清单 7-42 中的代码会产生以下输出（尽管它们的顺序可能不同，我将在下一节解释）：\n\
  \n```\nKey: Kayak Value: 279\nKey: Lifejacket Value: 48.95\nKey: Hat Value: 0\n\
  ```\n\n#### 按顺序枚举映射\n\n你可能会看到代码清单 7-42 的结果顺序不同，因为无法保证映射的内容会按任何特定顺序被枚举。如果你想按顺序获取映射中的值，最好的方法是枚举映射并创建一个包含键的切片，对切片进行排序，然后枚举切片以从映射中读取值，如代码清单\
  \ 7-43 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"sort\"\n)\nfunc main() {\n\
  products := map[string]float64 {\n\"Kayak\" : 279,\n\"Lifejacket\": 48.95,\n\"Hat\"\
  : 0,\n}\nkeys := make([]string, 0, len(products))\nfor key, _ := range products\
  \ {\nkeys = append(keys, key)\n}\nsort.Strings(keys)\nfor _, key := range keys {\n\
  fmt.Println(\"Key:\", key, \"Value:\", products[key])\n}\n}\nListing 7-43\n在 collections\
  \ 文件夹的 main.go 文件中按键顺序枚举映射\n```\n\n编译并执行项目，你将看到以下输出，显示按键排序的值：\n\n```\nKey: Hat Value:\
  \ 0\nKey: Kayak Value: 279\nKey: Lifejacket Value: 48.95\n```\n\n\n\n### 理解字符串的双重本质\n\
  \n在第 4 章中，我将字符串描述为字符序列。这一说法是正确的，但实际情况更为复杂，因为 Go 语言的字符串具有双重人格，具体表现取决于你如何使用它们。\n\n\
  Go 语言将字符串视为字节数组，并支持数组索引和切片范围表示法，如代码清单 7-44 所示。\n\n```\npackage main\nimport (\n\"\
  fmt\"\n\"strconv\"\n)\nfunc main() {\nvar price string = \"$48.95\"\nvar currency\
  \ byte = price[0]\nvar amountString string = price[1:]\namount, parseErr  := strconv.ParseFloat(amountString,\
  \ 64)\nfmt.Println(\"Currency:\", currency)\nif (parseErr == nil) {\nfmt.Println(\"\
  Amount:\", amount)\n} else {\nfmt.Println(\"Parse Error:\", parseErr)\n}\n}\n代码清单\
  \ 7-44\ncollections 文件夹中的 main.go 文件中对字符串进行索引和切片\n```\n\n我使用了完整的变量声明语法来强调每个变量的类型。当使用索引表示法时，结果是从字符串指定位置取出的一个\
  \ `byte`：\n\n```\n...\nvar currency byte = price[0]\n...\n```\n\n该语句选择位置为零处的 `byte`\
  \ 并将其赋值给名为 `currency` 的变量。当对 `string` 进行切片时，切片也是以字节为单位描述的，但结果是 `string`：\n\n```\n\
  ...\nvar amountString string = price[1:]\n...\n```\n\n该范围选取除位置零处的 `byte` 之外的所有字节，并将缩短后的字符串赋值给名为\
  \ `amountString` 的变量。使用代码清单 7-44 所示的命令编译并执行此代码，将生成以下输出：\n\n```\nCurrency: 36\nAmount:\
  \ 48.95\n```\n\n正如我在第 4 章中解释的那样，`byte` 类型是 `uint8` 的别名，这就是为什么 `currency` 的值显示为数字的原因：Go\
  \ 语言并不知道数值 `36` 应表示为美元符号。图 7-25 展示了作为字节数组的 `string`，并说明了如何对其进行索引和切片。\n\n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig25_HTML.jpg](img/512642_1_En_7_Fig25_HTML.jpg)\n\
  \n图 7-25\n\n作为字节数组的字符串\n\n对字符串进行切片会生成另一个字符串，但需要显式转换才能将 `byte` 解释为其所代表的字符，如代码清单 7-45\
  \ 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nvar\
  \ price string = \"$48.95\"\nvar currency string = string(price[0])\nvar amountString\
  \ string = price[1:]\namount, parseErr  := strconv.ParseFloat(amountString, 64)\n\
  fmt.Println(\"Currency:\", currency)\nif (parseErr == nil) {\nfmt.Println(\"Amount:\"\
  , amount)\n} else {\nfmt.Println(\"Parse Error:\", parseErr)\n}\n}\n代码清单 7-45\n\
  collections 文件夹中的 main.go 文件中转换结果\n```\n\n编译并执行代码，你将看到以下结果：\n\n```\nCurrency: $\n\
  Amount: 48.95\n```\n\n这看起来是有效的，但其中包含一个陷阱，如果更改货币符号，就可以发现这个问题，如代码清单 7-46 所示。（如果你所在的地区键盘上没有欧元货币符号，请按住\
  \ `Alt` 键，然后在数字小键盘上按 `0128`。）\n\n```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\
  \n)\nfunc main() {\nvar price string = \"€48.95\"\nvar currency string = string(price[0])\n\
  var amountString string = price[1:]\namount, parseErr  := strconv.ParseFloat(amountString,\
  \ 64)\nfmt.Println(\"Currency:\", currency)\nif (parseErr == nil) {\nfmt.Println(\"\
  Amount:\", amount)\n} else {\nfmt.Println(\"Parse Error:\", parseErr)\n}\n}\n代码清单\
  \ 7-46\ncollections 文件夹中的 main.go 文件中更改货币符号\n```\n\n编译并执行代码，你将看到类似如下的输出：\n\n```\n\
  Currency: â\nParse Error: strconv.ParseFloat: parsing \"\\x82\\xac48.95\": invalid\
  \ syntax\n```\n\n问题在于，数组和范围表示法选取的是字节，但并非所有字符都只用一个字节表示。新的货币符号使用三个字节存储，如图 7-26 所示。\n\
  \n![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig26_HTML.jpg](img/512642_1_En_7_Fig26_HTML.jpg)\n\
  \n图 7-26\n\n更改货币符号\n\n该图显示了仅获取单个 `byte` 值如何只能获得货币符号的一部分。它还显示了切片包含了该货币符号三个字节中的两个，后面跟着字符串的其余部分。你可以使用\
  \ `len` 函数确认货币符号的更改增加了数组的大小，如代码清单 7-47 所示。\n\n```\npackage main\nimport (\n\"fmt\"\
  \n\"strconv\"\n)\nfunc main() {\nvar price string = \"€48.95\"\nvar currency string\
  \ = string(price[0])\nvar amountString string = price[1:]\namount, parseErr  :=\
  \ strconv.ParseFloat(amountString, 64)\nfmt.Println(\"Length:\", len(price))\nfmt.Println(\"\
  Currency:\", currency)\nif (parseErr == nil) {\nfmt.Println(\"Amount:\", amount)\n\
  } else {\nfmt.Println(\"Parse Error:\", parseErr)\n}\n}\n代码清单 7-47\ncollections\
  \ 文件夹中的 main.go 文件中获取字符串长度\n```\n\n`len` 函数将字符串视为字节数组，代码清单 7-47 中的代码编译并执行后，会生成以下输出：\n\
  \n```\nLength: 8\nCurrency: â\nParse Error: strconv.ParseFloat: parsing \"\\x82\\\
  xac48.95\": invalid syntax\n```\n\n输出证实该字符串中有八个字节，这就是索引和切片产生奇怪结果的原因。\n\n\n\n####\
  \ 将字符串转换为 Rune\n\n`rune` 类型表示一个 Unicode 码点，本质上等同于单个字符。为了避免在字符中间切割字符串，可以执行显式转换为 `rune`\
  \ 切片，如代码清单 7-48 所示。\n\n**提示**  \nUnicode 极其复杂，这在任何试图描述跨越数千年演变的多种书写系统的标准中都是意料之中的。本书不会详细描述\
  \ Unicode，为简单起见，我将 `rune` 值视为单个字符，这对大多数开发项目来说已经足够。我会对 Unicode 进行充分说明，以解释 Go 特性的工作原理。\n\
  \n```go\npackage main\nimport (\n    \"fmt\"\n    \"strconv\"\n)\nfunc main() {\n\
  \    var price []rune = []rune(\"€48.95\")\n    var currency string = string(price[0])\n\
  \    var amountString string = string(price[1:])\n    amount, parseErr := strconv.ParseFloat(amountString,\
  \ 64)\n    fmt.Println(\"Length:\", len(price))\n    fmt.Println(\"Currency:\",\
  \ currency)\n    if (parseErr == nil) {\n        fmt.Println(\"Amount:\", amount)\n\
  \    } else {\n        fmt.Println(\"Parse Error:\", parseErr)\n    }\n}\n```\n\n\
  *代码清单 7-48：在 `collections` 文件夹的 `main.go` 文件中转换为 Rune*\n\n我对字面量字符串应用了显式转换，并将切片赋值给\
  \ `price` 变量。当处理 `rune` 切片时，各个字节会被分组到它们所表示的字符中，而无需关心每个字符需要多少个字节，如图 7-27 所示。\n\n\
  ![../images/512642_1_En_7_Chapter/512642_1_En_7_Fig27_HTML.jpg](img/512642_1_En_7_Fig27_HTML.jpg)\n\
  \n*图 7-27：一个 rune 切片*\n\n如第 4 章所述，`rune` 类型是 `int32` 的别名，这意味着打印 `rune` 值时会显示用于表示该字符的数值。这意味着，与之前的\
  \ `byte` 示例类似，我必须将单个 `rune` 显式转换为 `string`，如下所示：\n\n```go\n...\nvar currency string\
  \ = string(price[0])\n...\n```\n\n但是，与之前的示例不同，我还必须对创建的切片执行显式转换，如下所示：\n\n```go\n\
  ...\nvar amountString string = string(price[1:])\n...\n```\n\n切片的结果类型是 `[]rune`；换句话说，对\
  \ `rune` 切片进行切片会得到另一个 `rune` 切片。编译并执行代码清单 7-48 中的代码，将产生以下输出：\n\n```\nLength: 6\n\
  Currency: €\nAmount: 48.95\n```\n\n`len` 函数返回 `6`，因为该数组包含的是字符，而非字节。当然，其余输出也符合预期，因为没有孤立的字节来影响结果。\n\
  \n**理解为什么字节和 Rune 都有用**  \nGo 处理字符串的方式可能看起来有些奇怪，但它有其用途。当你关心如何存储字符串并需要知道分配多少空间时，字节很重要。当你关注字符串的内容时（例如在现有字符串中插入新字符），字符就很重要。字符串的这两个方面都很重要。然而，理解对于任何给定操作，你需要处理的是字节还是字符至关重要。\n\
  \n你可能会倾向于只使用字节，只要只使用那些由单个字节表示的字符（通常是 ASCII 字符），这就能正常工作。这在最初可能可行，但几乎总是以糟糕的结局收场，特别是当你的代码处理用户输入的非\
  \ ASCII 字符集或处理包含非 ASCII 数据的文件时。只需额外做少量工作，接受 Unicode 确实存在并依赖 Go 来处理字节到字符的转换，会更简单也更安全。\n\
  \n#### 枚举字符串\n\n`for` 循环可用于枚举字符串的内容。这个特性展示了 Go 在处理字节到 rune 的映射方面的一些巧妙之处。代码清单 7-49\
  \ 枚举了一个字符串。\n\n```go\npackage main\nimport (\n    \"fmt\"\n    //\"strconv\"\n)\n\
  func main() {\n    var price = \"€48.95\"\n    for index, char := range price {\n\
  \        fmt.Println(index, char, string(char))\n    }\n}\n```\n\n*代码清单 7-49：在 `collections`\
  \ 文件夹的 `main.go` 文件中枚举字符串*\n\n我在本例中使用了一个包含欧元货币符号的字符串，这演示了当与 `for` 循环一起使用时，Go 将字符串视为\
  \ rune 序列。编译并执行代码清单 7-49 中的代码，你将看到以下输出：\n\n```\n0 8364 €\n3 52 4\n4 56 8\n5 46 .\n\
  6 57 9\n7 53 5\n```\n\n`for` 循环将字符串视作元素数组。输出的值分别是当前元素的索引、该元素的数值以及将该数值转换成的 `string`。\n\
  \n请注意，`index` 值不是连续的。`for` 循环将字符串处理为从底层字节序列派生出的字符序列。索引值对应于构成每个字符的第一个字节，如图 7-2 所示。例如，第二个索引值是\
  \ `3`，因为字符串中的第一个字符由位置 `0`、`1` 和 `2` 的字节组成。\n\n如果你想枚举底层字节而不将它们转换为字符，则可以执行显式转换为 `byte`\
  \ 切片，如代码清单 7-50 所示。\n\n```go\npackage main\nimport (\n    \"fmt\"\n    //\"strconv\"\
  \n)\nfunc main() {\n    var price = \"€48.95\"\n    for index, char := range []byte(price)\
  \ {\n        fmt.Println(index, char)\n    }\n}\n```\n\n*代码清单 7-50：在 `collections`\
  \ 文件夹的 `main.go` 文件中枚举字符串中的字节*\n\n使用代码清单 7-50 所示的命令编译并执行此代码，你将看到以下输出：\n\n```\n0\
  \ 226\n1 130\n2 172\n3 52\n4 56\n5 46\n6 57\n7 53\n```\n\n索引值是连续的，并且显示的是单个字节的值，而不会将其解释为它们所表示的字符的一部分。\n\
  \n## 总结\n\n在本章中，我介绍了 Go 的集合类型。我解释了数组是固定长度的值序列，切片是由数组支持的变长序列，而映射是键值对的集合。我演示了如何使用范围来选择元素，解释了切片与其底层数组之间的关系，并向你展示了如何执行常见任务（例如从切片中删除元素），对于这些任务，Go\
  \ 没有内置的特性。本章最后，我解释了字符串的复杂性质，这可能会给那些假设所有字符都可以用单个字节数据来表示的程序员带来问题。在下一章中，我将讲解 Go 中函数的使用。\n\
  \n\n\n# 定义与使用函数\n\n本章将介绍 Go 语言中的函数，它们能将代码语句组合在一起，并在需要时执行。Go 函数具有一些不寻常的特性，其中最有用的是能够定义多个返回值。正如我将要解释的，这是对函数常见问题的一个优雅解决方案。表\
  \ 8-1 对函数进行了概述。\n\n**表 8-1** 函数概述\n\n| 问题 | 答案 |\n| --- | --- |\n| 什么是函数？ | 函数是一组代码语句，仅在程序执行流程中调用该函数时才执行。\
  \ |\n| 为什么它们有用？ | 函数允许将功能定义一次并重复使用。 |\n| 如何使用它们？ | 通过函数名调用函数，并且可以通过参数向函数提供要处理的数据值。函数中语句的执行结果可以作为函数结果产生。\
  \ |\n| 是否存在任何陷阱或局限性？ | Go 函数的行为大体符合预期，并增加了诸如多返回值和命名返回值等有用的特性。 |\n| 是否有替代方案？ | 没有，函数是\
  \ Go 语言的核心特性。 |\n\n表 8-2 总结了本章内容。\n\n**表 8-2** 章节总结\n\n| 问题 | 解决方案 | 清单 |\n| ---\
  \ | --- | --- |\n| 分组语句以便按需执行 | 定义一个函数 | 4 |\n| 定义一个函数，使其包含的语句所使用的值可以改变 | 定义函数参数\
  \ | 5–8 |\n| 允许函数接受可变数量的参数 | 定义一个可变参数 | 9–13 |\n| 使用在函数外部定义的值的引用 | 定义接受指针的参数 | 14,\
  \ 15 |\n| 从函数中定义的语句产生输出 | 定义一个或多个结果 | 16–22 |\n| 丢弃函数产生的结果 | 使用空白标识符 | 23 |\n| 安排一个函数在当前执行的函数完成时被调用\
  \ | 使用 `defer` 关键字 | 24 |\n\n## 本章准备\n\n为准备本章内容，请打开一个新的命令提示符，导航到一个方便的位置，创建一个名为 `functions`\
  \ 的目录。导航到 `functions` 文件夹，并运行清单 8-1 中所示的命令来初始化项目。\n\n> **提示：** 你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init functions\n\
  ```\n*清单 8-1* 初始化项目\n\n在 `functions` 文件夹中添加一个名为 `main.go` 的文件，其内容如清单 8-2 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc main() {\nfmt.Println(\"Hello, Functions\"\
  )\n}\n```\n*清单 8-2* `functions` 文件夹中 `main.go` 文件的内容\n\n使用命令提示符在 `functions` 文件夹中运行清单\
  \ 8-3 所示的命令。\n\n```\ngo run .\n```\n*清单 8-3* 运行示例项目\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\
  \n```\nHello, Functions\n```\n\n## 定义一个简单函数\n\n函数是作为单个动作被使用和重用的语句组。作为开端，清单 8-4 定义了一个简单的函数。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc printPrice() {\nkayakPrice := 275.00\n\
  kayakTax := kayakPrice * 0.2\nfmt.Println(\"Price:\", kayakPrice, \"Tax:\", kayakTax)\n\
  }\nfunc main() {\nfmt.Println(\"About to call function\")\nprintPrice()\nfmt.Println(\"\
  Function complete\")\n}\n```\n*清单 8-4* 在 `functions` 文件夹的 `main.go` 文件中定义一个函数\n\n\
  函数由 `func` 关键字定义，后跟函数名、圆括号以及用大括号括起的代码块，如图 8-1 所示。\n\n![图 8-1](img/512642_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** 函数结构剖析\n\n现在 `main.go` 代码文件中有了两个函数。新函数名为 `printPrice`，它包含定义两个变量并调用 `fmt`\
  \ 包中 `Println` 函数的语句。`main` 函数是应用程序的入口点，执行在此开始和结束。Go 函数必须使用大括号定义，并且左大括号必须定义在 `func`\
  \ 关键字和函数名的同一行。其他语言中常见的惯例，例如省略大括号或将大括号放在下一行，是不允许的。\n\n> **注意：** 请注意 `printPrice`\
  \ 函数是与 `main.go` 文件中已有的 `main` 函数一起定义的。Go 确实支持在其他函数内部定义函数，但需要使用不同的语法，这将在第 9 章中描述。\n\
  \n`main` 函数调用 `printPrice` 函数，这是通过一条指定函数名后跟圆括号的语句完成的，如图 8-2 所示。\n\n![图 8-2](img/512642_1_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** 调用函数\n\n当函数被调用时，函数代码块中包含的语句将被执行。当所有语句执行完毕，程序继续执行调用该函数语句之后的下一条语句。这可以从清单\
  \ 8-4 中的代码被编译和执行时产生的输出中看到：\n\n```\nAbout to call function\nPrice: 275 Tax: 55\n\
  Function complete\n```\n\n\n\n### 定义与使用函数参数\n\n参数允许函数在被调用时接收数据值，从而改变其行为。清单 8-5 修改了上一节中定义的\
  \ `printPrice` 函数，使其定义了参数。\n\n```\npackage main\nimport \"fmt\"\nfunc printPrice(product\
  \ string, price float64, taxRate float64) {\ntaxAmount := price * taxRate\nfmt.Println(product,\
  \ \"price:\", price, \"Tax:\", taxAmount)\n}\nfunc main() {\nprintPrice(\"Kayak\"\
  , 275, 0.2)\nprintPrice(\"Lifejacket\", 48.95, 0.2)\nprintPrice(\"Soccer Ball\"\
  , 19.50, 0.15)\n}\nListing 8-5\nDefining Function Parameters in the main.go File\
  \ in the functions Folder\n```\n\n参数通过名称后跟类型来定义。多个参数用逗号分隔，如图 8-3 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig3_HTML.jpg](img/512642_1_En_8_Fig3_HTML.jpg)\n\
  \nFigure 8-3\n\nDefining function parameters\n\n清单 8-5 为 `printPrice` 函数添加了三个参数：一个名为\
  \ `product` 的 `string`，一个名为 `price` 的 `float64`，以及一个名为 `taxRate` 的 `float64`。在函数的代码块内，通过参数名称访问其对应的值，如图\
  \ 8-4 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig4_HTML.jpg](img/512642_1_En_8_Fig4_HTML.jpg)\n\
  \nFigure 8-4\n\nAccessing a parameter inside a code block\n\n在调用函数时，参数的值作为实参提供，这意味着每次调用函数时都可以提供不同的值。实参放在函数名后的括号内，用逗号分隔，并且顺序与参数定义的顺序一致，如图\
  \ 8-5 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig5_HTML.jpg](img/512642_1_En_8_Fig5_HTML.jpg)\n\
  \nFigure 8-5\n\nInvoking a function with arguments\n\n用作实参的值必须与函数定义的参数类型相匹配。编译并执行清单\
  \ 8-5 中的代码将产生以下输出：\n\n```\nKayak price: 275 Tax: 55\nLifejacket price: 48.95 Tax:\
  \ 9.790000000000001\nSoccer Ball price: 19.5 Tax: 2.925\n```\n\n`Lifejacket` 产品显示的值包含一个长小数部分，对于货币金额通常需要进行四舍五入。我将在第\
  \ 17 章中解释如何将数字值格式化为字符串。\n\n**注意：** Go 不支持可选参数或参数的默认值。\n\n## 省略参数类型\n\n当相邻参数具有相同类型时，可以省略其类型，如清单\
  \ 8-6 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printPrice(product string,\
  \ price, taxRate float64) {\ntaxAmount := price * taxRate\nfmt.Println(product,\
  \ \"price:\", price, \"Tax:\", taxAmount)\n}\nfunc main() {\nprintPrice(\"Kayak\"\
  , 275, 0.2)\nprintPrice(\"Lifejacket\", 48.95, 0.2)\nprintPrice(\"Soccer Ball\"\
  , 19.50, 0.15)\n}\nListing 8-6\nOmitting the Parameter Data Type in the main.go\
  \ File in the functions Folder\n```\n\n`price` 和 `taxRate` 参数都是 `float64` 类型，并且由于它们相邻，因此该数据类型仅应用于该类型中的最后一个参数。省略参数的数据类型不会改变参数或其类型。清单\
  \ 8-6 中的代码产生以下输出：\n\n```\nKayak price: 275 Tax: 55\nLifejacket price: 48.95 Tax:\
  \ 9.790000000000001\nSoccer Ball price: 19.5 Tax: 2.925\n```\n\n## 省略参数名称\n\n下划线（`_`\
  \ 字符）可以用于函数已定义但未在函数代码语句中使用的参数，如清单 8-7 所示。\n\n```\npackage main\nimport \"fmt\"\n\
  func printPrice(product string, price, _ float64) {\ntaxAmount := price * 0.25\n\
  fmt.Println(product, \"price:\", price, \"Tax:\", taxAmount)\n}\nfunc main() {\n\
  printPrice(\"Kayak\", 275, 0.2)\nprintPrice(\"Lifejacket\", 48.95, 0.2)\nprintPrice(\"\
  Soccer Ball\", 19.50, 0.15)\n}\nListing 8-7\nOmitting a Parameter Name in the main.go\
  \ File in the functions Folder\n```\n\n下划线被称为*空白标识符*，其结果是定义一个参数：调用函数时必须为其提供一个值，但无法在函数的代码块内访问其值。这听起来可能像一个奇怪的功能，但它是一种很有用的方式，可以用来指示某个参数在函数内部未被使用——这在实现接口所需的方法时可能会出现。编译并执行清单\
  \ 8-7 中的代码将产生以下输出：\n\n```\nKayak price: 275 Tax: 68.75\nLifejacket price: 48.95\
  \ Tax: 12.2375\nSoccer Ball price: 19.5 Tax: 4.875\n```\n\n函数也可以省略其所有参数的名称，如清单 8-8\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printPrice(string, float64, float64)\
  \ {\n// taxAmount := price * 0.25\nfmt.Println(\"No parameters\")\n}\nfunc main()\
  \ {\nprintPrice(\"Kayak\", 275, 0.2)\nprintPrice(\"Lifejacket\", 48.95, 0.2)\nprintPrice(\"\
  Soccer Ball\", 19.50, 0.15)\n}\nListing 8-8\nOmitting All Parameter Names in the\
  \ main.go File in the functions Folder\n```\n\n没有名称的参数无法在函数内部访问，此功能主要与接口（将在第 11\
  \ 章中描述）结合使用，或者在定义函数类型（将在第 9 章中描述）时使用。编译并执行清单 8-8 中的代码将产生以下输出：\n\n```\nNo parameters\n\
  No parameters\nNo parameters\n```\n\n\n\n### 定义可变参数\n\n可变参数可以接受数量不定的值，这能让函数更易于使用。为了理解可变参数所解决的问题，考虑另一种替代方案会有所帮助，如代码清单\
  \ 8-9 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printSuppliers(product string,\
  \ suppliers []string ) {\nfor _, supplier := range suppliers {\nfmt.Println(\"Product:\"\
  , product, \"Supplier:\", supplier)\n}\n}\nfunc main() {\nprintSuppliers(\"Kayak\"\
  , []string {\"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\"})\nprintSuppliers(\"\
  Lifejacket\", []string {\"Sail Safe Co\"})\n}\n```\n\n`printSuppliers` 函数定义的第二个参数通过\
  \ `string` 切片接受数量不定的供应商。这样做是可行的，但可能有些笨拙，因为即使只需要一个 `string`，也需要构建切片，就像这样：\n\n```\n\
  printSuppliers(\"Lifejacket\", []string {\"Sail Safe Co\"})\n```\n\n可变参数允许函数更优雅地接收数量不定的参数，如代码清单\
  \ 8-10 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printSuppliers(product string,\
  \ suppliers ...string ) {\nfor _, supplier := range suppliers {\nfmt.Println(\"\
  Product:\", product, \"Supplier:\", supplier)\n}\n}\nfunc main() {\nprintSuppliers(\"\
  Kayak\", \"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\")\nprintSuppliers(\"\
  Lifejacket\", \"Sail Safe Co\")\n}\n```\n\n可变参数使用省略号（三个点）定义，后面跟着类型，如图 8-6 所示。\n\n\
  ![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig6_HTML.jpg](img/512642_1_En_8_Fig6_HTML.jpg)\n\
  \n可变参数必须是函数定义的最后一个参数，并且只能使用单一类型，例如本例中的 `string` 类型。调用函数时，可以指定数量不定的字符串参数，而无需创建切片：\n\
  \n```\nprintSuppliers(\"Kayak\", \"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\"\
  )\n```\n\n可变参数的类型不会改变，提供的值仍然包含在一个切片中。对于代码清单 8-10 来说，这意味着 `suppliers` 参数的类型仍然是 `[]string`。代码清单\
  \ 8-9 和 8-10 中的代码编译并执行后，会产生以下输出：\n\n```\nProduct: Kayak Supplier: Acme Kayaks\n\
  Product: Kayak Supplier: Bob's Boats\nProduct: Kayak Supplier: Crazy Canoes\nProduct:\
  \ Lifejacket Supplier: Sail Safe Co\n```\n\n## 处理可变参数无参数的情况\n\nGo 允许完全省略可变参数的实参，这可能会导致意外结果，如代码清单\
  \ 8-11 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printSuppliers(product string,\
  \ suppliers ...string ) {\nfor _, supplier := range suppliers {\nfmt.Println(\"\
  Product:\", product, \"Supplier:\", supplier)\n}\n}\nfunc main() {\nprintSuppliers(\"\
  Kayak\", \"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\")\nprintSuppliers(\"\
  Lifejacket\", \"Sail Safe Co\")\nprintSuppliers(\"Soccer Ball\")\n}\n```\n\n对 `printSuppliers`\
  \ 函数的新调用没有为 `suppliers` 参数提供任何实参。发生这种情况时，Go 使用 `nil` 作为参数值，这可能会给那些假设切片中至少有一个值的代码带来问题。编译并运行代码清单\
  \ 8-11 中的代码；你将收到以下输出：\n\n```\nProduct: Kayak Supplier: Acme Kayaks\nProduct: Kayak\
  \ Supplier: Bob's Boats\nProduct: Kayak Supplier: Crazy Canoes\nProduct: Lifejacket\
  \ Supplier: Sail Safe Co\n```\n\n没有关于 `Soccer Ball` 产品的输出，因为 `nil` 切片的长度为零，所以 `for`\
  \ 循环从未执行。代码清单 8-12 通过检查此问题来修正它。\n\n```\npackage main\nimport \"fmt\"\nfunc printSuppliers(product\
  \ string, suppliers ...string ) {\nif (len(suppliers) == 0) {\nfmt.Println(\"Product:\"\
  , product, \"Supplier: (none)\")\n} else {\nfor _, supplier := range suppliers {\n\
  fmt.Println(\"Product:\", product, \"Supplier:\", supplier)\n}\n}\n}\nfunc main()\
  \ {\nprintSuppliers(\"Kayak\", \"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\"\
  )\nprintSuppliers(\"Lifejacket\", \"Sail Safe Co\")\nprintSuppliers(\"Soccer Ball\"\
  )\n}\n```\n\n我使用了第 7 章中描述的内置 `len` 函数来识别空切片，尽管我也可以检查 `nil` 值。编译并执行代码；你将收到以下输出，该输出处理了调用函数时未提供可变参数值的情况：\n\
  \n```\nProduct: Kayak Supplier: Acme Kayaks\nProduct: Kayak Supplier: Bob's Boats\n\
  Product: Kayak Supplier: Crazy Canoes\nProduct: Lifejacket Supplier: Sail Safe Co\n\
  Product: Soccer Ball Supplier: (none)\n```\n\n## 使用切片作为可变参数的值\n\n可变参数允许调用函数时无需创建切片，但当你已经有一个想使用的切片时，这就不太有用了。针对这种情况，在传递给函数的最后一个参数后面加上省略号，就可以使用切片，如代码清单\
  \ 8-13 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc printSuppliers(product string,\
  \ suppliers ...string ) {\nif (len(suppliers) == 0) {\nfmt.Println(\"Product:\"\
  , product, \"Supplier: (none)\")\n} else {\nfor _, supplier := range suppliers {\n\
  fmt.Println(\"Product:\", product, \"Supplier:\", supplier)\n}\n}\n}\nfunc main()\
  \ {\nnames := []string {\"Acme Kayaks\", \"Bob's Boats\", \"Crazy Canoes\"}\nprintSuppliers(\"\
  Kayak\", names...)\nprintSuppliers(\"Lifejacket\", \"Sail Safe Co\")\nprintSuppliers(\"\
  Soccer Ball\")\n}\n```\n\n这种技术避免了将切片拆解成单个值，然后再将它们组合回切片以用于可变参数的必要。编译并执行代码清单 8-13\
  \ 中的代码，你将收到以下输出：\n\n```\nProduct: Kayak Supplier: Acme Kayaks\nProduct: Kayak Supplier:\
  \ Bob's Boats\nProduct: Kayak Supplier: Crazy Canoes\nProduct: Lifejacket Supplier:\
  \ Sail Safe Co\nProduct: Soccer Ball Supplier: (none)\n```\n\n\n\n### 使用指针作为函数参数\n\
  \n默认情况下，Go 会复制作为参数传入的值，因此对参数的修改仅限于函数内部，如代码清单 8-14 所示。\n\n```\npackage main\nimport\
  \ \"fmt\"\nfunc swapValues(first, second int) {\nfmt.Println(\"Before swap:\", first,\
  \ second)\ntemp := first\nfirst = second\nsecond = temp\nfmt.Println(\"After swap:\"\
  , first, second)\n}\nfunc main() {\nval1, val2 := 10, 20\nfmt.Println(\"Before calling\
  \ function\", val1, val2)\nswapValues(val1, val2)\nfmt.Println(\"After calling function\"\
  , val1, val2)\n}\n代码清单 8-14\n在 functions 文件夹的 main.go 文件中修改参数值\n```\n\n`swapValues`\
  \ 函数接收两个 `int` 值，先打印它们，然后交换，再次打印。在函数调用前后，都打印了传入函数的值。代码清单 8-14 的输出显示，在 `swapValues`\
  \ 函数中对值的修改不会影响 `main` 函数中定义的变量：\n\n```\nBefore calling function 10 20\nBefore swap:\
  \ 10 20\nAfter swap: 20 10\nAfter calling function 10 20\n```\n\nGo 允许函数接收指针，这会改变上述行为，如代码清单\
  \ 8-15 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc swapValues(first, second *int)\
  \ {\nfmt.Println(\"Before swap:\", *first, *second)\ntemp := *first\n*first = *second\n\
  *second = temp\nfmt.Println(\"After swap:\", *first, *second)\n}\nfunc main() {\n\
  val1, val2 := 10, 20\nfmt.Println(\"Before calling function\", val1, val2)\nswapValues(&val1,\
  \ &val2)\nfmt.Println(\"After calling function\", val1, val2)\n}\n代码清单 8-15\n在 functions\
  \ 文件夹的 main.go 文件中定义带指针的函数\n```\n\n`swapValues` 函数仍然交换两个值，但这次是通过指针进行的，这意味着修改发生在\
  \ `main` 函数也在使用的内存位置上。这一点可以从代码的输出中看出：\n\n```\nBefore calling function 10 20\nBefore\
  \ swap: 10 20\nAfter swap: 20 10\nAfter calling function 20 10\n```\n\n有更好的方法来完成像交换值这样的任务——包括使用多个函数返回值（如下一节所述）——但这个例子展示了函数可以直接通过值工作，也可以通过指针间接工作。\n\
  \n## 定义和使用函数返回值\n\n函数可以定义返回值，这使得函数能够向调用者提供操作的结果，如代码清单 8-16 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc calcTax(price float64) float64 {\nreturn price + (price * 0.2)\n\
  }\nfunc main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\"\
  : 48.95,\n}\nfor product, price := range products {\npriceWithTax := calcTax(price)\n\
  fmt.Println(\"Product: \", product, \"Price:\", priceWithTax)\n}\n}\n代码清单 8-16\n\
  在 functions 文件夹的 main.go 文件中生成函数返回值\n```\n\n该函数通过在参数之后指定一个数据类型来声明其返回值，如图 8-7 所示。\n\
  \n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig7_HTML.jpg](img/512642_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n定义函数返回值\n\n`calcTax` 函数生成一个 `float64` 类型的返回值，该返回值由 `return` 语句产生，如图 8-8\
  \ 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig8_HTML.jpg](img/512642_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\n生成函数返回值\n\n当函数被调用时，其返回值可以赋值给一个变量，如图 8-9 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig9_HTML.jpg](img/512642_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n使用函数返回值\n\n函数返回值可以直接在表达式中使用。代码清单 8-17 省略了变量，直接调用 `calcTax` 函数来为 `fmt.Println`\
  \ 函数生成参数。\n\n```\npackage main\nimport \"fmt\"\nfunc calcTax(price float64) float64\
  \ {\nreturn price + (price * 0.2)\n}\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products\
  \ {\nfmt.Println(\"Product: \", product, \"Price:\", calcTax(price))\n}\n}\n代码清单\
  \ 8-17\n在 functions 文件夹的 main.go 文件中直接使用函数返回值\n```\n\nGo 使用了 `calcTax` 函数产生的返回值，而无需定义中间变量。代码清单\
  \ 8-16 和 8-17 中的代码产生以下输出：\n\n```\nProduct:  Kayak Price: 330\nProduct:  Lifejacket\
  \ Price: 58.74\n```\n\n### 返回多个函数返回值\n\nGo 函数的一个不寻常的特性是能够产生多个返回值，如代码清单 8-18 所示。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc swapValues(first, second int) (int, int)\
  \ {\nreturn second, first\n}\nfunc main() {\nval1, val2 := 10, 20\nfmt.Println(\"\
  Before calling function\", val1, val2)\nval1, val2 = swapValues(val1, val2)\nfmt.Println(\"\
  After calling function\", val1, val2)\n}\n代码清单 8-18\n在 functions 文件夹的 main.go 文件中产生多个返回值\n\
  ```\n\n函数返回值的类型使用括号分组，如图 8-10 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig10_HTML.jpg](img/512642_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n\n定义多个返回值\n\n当一个函数定义了多个返回值时，使用 `return` 关键字提供每个返回值对应的值，并用逗号分隔，如图 8-11\
  \ 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig11_HTML.jpg](img/512642_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n\n返回多个返回值\n\n`swapValues` 函数使用 `return` 关键字产生两个 `int` 类型的返回值，这些值是通过其参数接收到的。这些返回值可以赋值给调用该函数的语句中的变量，同样用逗号分隔，如图\
  \ 8-12 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig12_HTML.jpg](img/512642_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n接收多个返回值\n\n编译并执行代码清单 8-18 中的代码会产生以下输出：\n\n```\nBefore calling function\
  \ 10 20\nAfter calling function 20 10\n```\n\n\n\n### 使用多个结果而非多重含义\n\n多函数结果乍看可能有些奇怪，但可用于避免其他语言中常见的错误来源，即根据返回的值为单一结果赋予不同的含义。清单\
  \ 8-19 展示了因给单一结果附加多种含义而导致的问题。\n\n```\npackage main\nimport \"fmt\"\nfunc calcTax(price\
  \ float64) float64 {\nif (price > 100) {\nreturn price * 0.2\n}\nreturn -1\n}\n\
  func main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\"\
  : 48.95,\n}\nfor product, price := range products {\ntax := calcTax(price)\nif (tax\
  \ != -1) {\nfmt.Println(\"Product: \", product, \"Tax:\", tax)\n} else {\nfmt.Println(\"\
  Product: \", product, \"No tax due\")\n}\n}\n}\n清单 8-19\n在 functions 文件夹的 main.go\
  \ 文件中使用单一结果\n```\n\n`calcTax` 函数使用 `float64` 结果来传达两种结果。对于大于 100 的值，结果表示应缴税额；对于小于\
  \ 100 的值，结果表示无需缴税。编译并执行清单 8-19 中的代码会生成以下结果：\n\n```\nProduct:  Kayak Tax: 55\nProduct:\
  \  Lifejacket No tax due\n```\n\n随着项目演进，给单一结果赋予多重含义可能成为问题。税务机关可能开始对某些购买行为进行退税，这将使值\
  \ `-1` 变得模棱两可，因为它可能表示无需缴税，也可能表示应退税 1 美元。\n\n解决这种歧义的方法有很多，但使用多个函数结果是一种优雅的解决方案——尽管需要花些时间去适应。在清单\
  \ 8-20 中，我修改了 `calcTax` 函数，使其产生多个结果。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ calcTax(price float64) (float64, bool) {\nif (price > 100) {\nreturn price * 0.2,\
  \ true\n}\nreturn 0, false\n}\nfunc main() {\nproducts := map[string]float64 {\n\
  \"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products\
  \ {\ntaxAmount, taxDue := calcTax(price)\nif (taxDue) {\nfmt.Println(\"Product:\
  \ \", product, \"Tax:\", taxAmount)\n} else {\nfmt.Println(\"Product: \", product,\
  \ \"No tax due\")\n}\n}\n}\n清单 8-20\n在 functions 文件夹的 main.go 文件中使用多个结果\n```\n\n\
  `calcTax` 方法返回的额外结果是一个 `bool` 值，用于指示是否应缴税，从而将该信息与其他结果分离。在清单 8-20 中，两个结果在单独的语句中获取，但多结果非常适合\
  \ `if` 语句对初始化语句的支持，如清单 8-21 所示。（有关此功能的详细信息，请参阅第 12 章。）\n\n```\npackage main\nimport\
  \ \"fmt\"\nfunc calcTax(price float64) (float64, bool) {\nif (price > 100) {\nreturn\
  \ price * 0.2, true\n}\nreturn 0, false\n}\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\nfor product, price := range products\
  \ {\nif taxAmount, taxDue := calcTax(price); taxDue {\nfmt.Println(\"Product: \"\
  , product, \"Tax:\", taxAmount)\n} else {\nfmt.Println(\"Product: \", product, \"\
  No tax due\")\n}\n}\n}\n清单 8-21\n在 functions 文件夹的 main.go 文件中使用初始化语句\n```\n\n通过在初始化语句中调用\
  \ `calcTax` 函数获取两个结果，然后将 `bool` 结果用作语句的表达式。清单 8-20 和 8-21 中的代码会生成以下输出：\n\n```\n\
  Product:  Kayak Tax: 55\nProduct:  Lifejacket No tax due\n```\n\n### 使用命名结果\n\n\
  函数的结果可以有名称，在函数执行期间可以为其分配值。当执行到达 `return` 关键字时，将返回分配给结果的当前值，如清单 8-22 所示。\n\n```\n\
  package main\nimport \"fmt\"\nfunc calcTax(price float64) (float64, bool) {\nif\
  \ (price > 100) {\nreturn price * 0.2, true\n}\nreturn 0, false\n}\nfunc calcTotalPrice(products\
  \ map[string]float64,\nminSpend float64) (total, tax float64)  {\ntotal = minSpend\n\
  for _, price := range products {\nif taxAmount, due := calcTax(price); due {\ntotal\
  \ += taxAmount;\ntax += taxAmount\n} else {\ntotal += price\n}\n}\nreturn\n}\nfunc\
  \ main() {\nproducts := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\":\
  \ 48.95,\n}\ntotal1, tax1 := calcTotalPrice(products, 10)\nfmt.Println(\"Total 1:\"\
  , total1, \"Tax 1:\", tax1)\ntotal2, tax2 := calcTotalPrice(nil, 10)\nfmt.Println(\"\
  Total 2:\", total2, \"Tax 2:\", tax2)\n}\n清单 8-22\n在 functions 文件夹的 main.go 文件中使用命名结果\n\
  ```\n\n命名结果定义为名称和结果类型的组合，如图 8-13 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig13_HTML.jpg](img/512642_1_En_8_Fig13_HTML.jpg)\n\
  \n图 8-13\n\n命名结果\n\n`calcTotalPrice` 函数定义了名为 `total` 和 `tax` 的结果。两者都是 `float64`\
  \ 值，这意味着我可以省略第一个名称的数据类型。在函数内部，结果可以像普通变量一样使用：\n\n```\n...\ntotal = minSpend\nfor\
  \ _, price := range products {\nif taxAmount, due := calcTax(price); due {\ntotal\
  \ += taxAmount;\ntax += taxAmount\n} else {\ntotal += price\n}\n}\n...\n```\n\n\
  `return` 关键字单独使用，从而返回分配给命名结果的当前值。清单 8-22 中的代码会生成以下输出：\n\n```\nTotal 1: 113.95 Tax\
  \ 1: 55\nTotal 2: 10 Tax 2: 0\n```\n\n### 使用空白标识符丢弃结果\n\nGo 要求所有声明的变量都必须被使用，当函数返回不需要的值时，这可能会很棘手。为避免编译器错误，可以使用空白标识符（`_`\
  \ 字符）来表示不会被使用的结果，如清单 8-23 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc calcTotalPrice(products\
  \ map[string]float64) (count int, total float64)  {\ncount = len(products)\nfor\
  \ _, price := range products {\ntotal += price\n}\nreturn\n}\nfunc main() {\nproducts\
  \ := map[string]float64 {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\n_, total\
  \  := calcTotalPrice(products)\nfmt.Println(\"Total:\", total)\n}\n清单 8-23\n在 functions\
  \ 文件夹的 main.go 文件中丢弃函数结果\n```\n\n`calcTotalPrice` 函数返回两个结果，但只使用了其中一个。空白标识符用于不需要的值，从而避免编译器错误。清单\
  \ 8-23 中的代码会生成以下输出：\n\n```\nTotal: 323.95\n```\n\n\n  \n### 使用 `defer` 关键字\n\n`defer`\
  \ 关键字用于调度一个函数调用，该调用将在当前函数返回前立即执行，如代码清单 8-24 所示。\n\n```\npackage main\nimport \"\
  fmt\"\nfunc calcTotalPrice(products map[string]float64) (count int, total float64)\
  \  {\nfmt.Println(\"函数开始\")\ndefer fmt.Println(\"第一个 defer 调用\")\ncount = len(products)\n\
  for _, price := range products {\ntotal += price\n}\ndefer fmt.Println(\"第二个 defer\
  \ 调用\")\nfmt.Println(\"函数即将返回\")\nreturn\n}\nfunc main() {\nproducts := map[string]float64\
  \ {\n\"Kayak\" : 275,\n\"Lifejacket\": 48.95,\n}\n_, total  := calcTotalPrice(products)\n\
  fmt.Println(\"总计:\", total)\n}\n代码清单 8-24\n在 functions 文件夹的 main.go 文件中使用 defer\
  \ 关键字\n```\n\n`defer` 关键字用于函数调用之前，如图 8-14 所示。\n\n![../images/512642_1_En_8_Chapter/512642_1_En_8_Fig14_HTML.jpg](img/512642_1_En_8_Fig14_HTML.jpg)\n\
  \n图 8-14\n\n`defer` 关键字\n\n`defer` 关键字的主要用途是调用释放资源的函数，例如关闭已打开的文件（参见第 22 章）或 HTTP\
  \ 连接（第 24 章和第 25 章）。如果没有 `defer` 关键字，释放资源的语句必须出现在函数末尾，而这往往是在资源创建和使用之后的许多条语句之后。`defer`\
  \ 关键字允许你将创建、使用和释放资源的语句组合在一起。\n\n如代码清单 8-24 所示，`defer` 关键字可用于任何函数调用，并且单个函数可以多次使用\
  \ `defer` 关键字。在函数即将返回之前，Go 将按照定义顺序执行通过 `defer` 关键字调度的调用。代码清单 8-24 中的代码调度了 `fmt.Println`\
  \ 函数的调用，编译并执行后会产生以下输出：\n\n```\n函数开始\n函数即将返回\n第二个 defer 调用\n第一个 defer 调用\n总计: 323.95\n\
  ```\n\n## 本章小结\n\n在本章中，我介绍了 Go 函数，解释了如何定义和使用它们。我演示了参数可以定义的不同方式，以及 Go 函数如何产生结果。在下一章中，我将介绍函数如何作为类型使用。\n\
  \n### 使用函数类型\n\n在本章中，我将介绍 Go 如何处理函数类型，这是一个有用（尽管有时令人困惑）的特性，它允许以一致的方式描述函数，并像其他值一样进行描述。表\
  \ 9-1 将函数类型置于上下文中。\n\n表 9-1  \n函数类型的上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 什么是函数类型？\
  \ | Go 中的函数具有数据类型，该类型描述了函数接受的参数组合以及函数产生的结果。此类型可以显式指定，也可以从使用字面量语法定义的函数中推断得出。 |\n\
  | 它们为什么有用？ | 将函数视为数据类型意味着它们可以分配给变量，并且只要一个函数具有相同的参数和结果组合，就可以替换另一个函数。 |\n| 如何使用它们？\
  \ | 函数类型使用 `func` 关键字定义，后跟描述参数和结果的签名。不指定函数体。 |\n| 是否有任何陷阱或限制？ | 函数类型的高级用法可能变得难以理解和调试，尤其是在定义了嵌套的字面量函数时。\
  \ |\n| 是否有替代方案？ | 你不必使用函数类型或使用字面量语法定义函数，但这样做可以减少代码重复并提高所写代码的灵活性。 |\n\n表 9-2 总结了本章内容。\n\
