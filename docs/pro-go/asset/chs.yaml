  \ `Time` 值被传递给 `PrintTime` 函数，该函数使用表 19-4 中的方法访问日、月和年组件，以写出描述每个 `Time` 的消息。编译并执行该项目，你将看到类似下面的输出，其中\
  \ `Now` 函数返回的时间会有所不同：\n\n```\nCurrent: Day: 2: Month: June Year: 2021\nSpecific:\
  \ Day: 9: Month: June Year: 1995\nUNIX: Day: 2: Month: June Year: 2015\n```\n\n\
  `Date` 函数的最后一个参数是 `Location`，它指定了该 `Time` 值将使用的时区对应的位置。在清单 19-5 中，我使用了 `time` 包定义的\
  \ `Local` 常量，它提供了系统时区的 `Location`。我将在本章后面的“从字符串解析时间值”部分解释如何创建不由系统配置决定的 `Location`\
  \ 值。\n\n\n\n### 将时间格式化为字符串\n\n`Format`方法用于从`Time`值创建格式化字符串。字符串的格式通过提供一个布局字符串来指定，该字符串显示了`Time`的哪些组件是必需的，以及它们应该被表达的顺序和精度。表\
  \ 19-6 描述了`Format`方法以供快速参考。\n\n表 19-6\n创建格式化字符串的`Time`方法\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `Format(layout)` | 此方法返回一个格式化字符串，该字符串使用指定的布局创建。 |\n\n布局字符串使用一个参考时间，即\
  \ MST 时区（比格林威治标准时间晚 7 小时）2006 年 1 月 2 日星期一 15:04:05（即下午 3 点过 4 分 5 秒）。清单 19-6 演示了如何使用参考时间创建格式化字符串。\n\
  \n```\npackage main\nimport (\n\"time\"\n\"fmt\"\n)\nfunc PrintTime(label string,\
  \ t *time.Time) {\nlayout := \"Day: 02 Month: Jan Year: 2006\"\nfmt.Println(label,\
  \ t.Format(layout))\n}\nfunc main() {\ncurrent := time.Now()\nspecific := time.Date(1995,\
  \ time.June, 9, 0, 0, 0, 0, time.Local)\nunix := time.Unix(1433228090, 0)\nPrintTime(\"\
  Current\", &current)\nPrintTime(\"Specific\", &specific)\nPrintTime(\"UNIX\", &unix)\n\
  }\n清单 19-6\ndatesandtimes 文件夹中的 main.go 文件：格式化时间值\n```\n\n布局可以混合日期组件和固定字符串，在示例中，我使用了一个布局来重新创建早期示例中使用的格式，该格式使用参考日期指定。编译并执行项目，您将看到以下输出：\n\
  \n```\nCurrent Day: 03 Month: Jun Year: 2021\nSpecific Day: 09 Month: Jun Year:\
  \ 1995\nUNIX Day: 02 Month: Jun Year: 2015\n```\n\n`time`包定义了一组常用时间和日期格式的常量，如表 19-7\
  \ 所示。\n\n表 19-7\n`time`包定义的布局常量\n\n| 名称 | 参考日期格式 |\n| --- | --- |\n| `ANSIC` | `Mon\
  \ Jan _2 15:04:05 2006` |\n| `UnixDate` | `Mon Jan _2 15:04:05 MST 2006` |\n| `RubyDate`\
  \ | `Mon Jan 02 15:04:05 -0700 2006` |\n| `RFC822` | `02 Jan 06 15:04 MST` |\n|\
  \ `RFC822Z` | `02 Jan 06 15:04 -0700` |\n| `RFC850` | `Monday, 02-Jan-06 15:04:05\
  \ MST` |\n| `RFC1123` | `Mon, 02 Jan 2006 15:04:05 MST` |\n| `RFC1123Z` | `Mon,\
  \ 02 Jan 2006 15:04:05 -0700` |\n| `RFC3339` | `2006-01-02T15:04:05Z07:00` |\n|\
  \ `RFC3339Nano` | `2006-01-02T15:04:05.999999999Z07:00` |\n| `Kitchen` | `3:04PM`\
  \ |\n| `Stamp` | `Jan _2 15:04:05` |\n| `StampMilli` | `Jan _2 15:04:05.000` |\n\
  | `StampMicro` | `Jan _2 15:04:05.000000` |\n| `StampNano` | `Jan _2 15:04:05.000000000`\
  \ |\n\n这些常量可以代替自定义布局使用，如清单 19-7 所示。\n\n```\npackage main\nimport (\n\"time\"\n\"\
  fmt\"\n)\nfunc PrintTime(label string, t *time.Time) {\n//layout := \"Day: 02 Month:\
  \ Jan Year: 2006\"\nfmt.Println(label, t.Format(time.RFC822Z))\n}\nfunc main() {\n\
  current := time.Now()\nspecific := time.Date(1995, time.June, 9, 0, 0, 0, 0, time.Local)\n\
  unix := time.Unix(1433228090, 0)\nPrintTime(\"Current\", &current)\nPrintTime(\"\
  Specific\", &specific)\nPrintTime(\"UNIX\", &unix)\n}\n清单 19-7\ndatesandtimes 文件夹中的\
  \ main.go 文件：使用预定义布局\n```\n\n自定义布局已被`RFC822Z`布局替换，当项目被编译和执行时，会产生以下输出：\n\n```\nCurrent\
  \ 03 Jun 21 08:04 +0100\nSpecific 09 Jun 95 00:00 +0100\nUNIX 02 Jun 15 07:54 +0100\n\
  ```\n\n### 从字符串解析时间值\n\n`time`包提供了从字符串创建`Time`值的支持，如表 19-8 所述。\n\n表 19-8\n`time`包用于将字符串解析为时间值的函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Parse(layout, str)` | 此函数使用指定的布局解析字符串以创建`Time`值。返回一个`error`来指示解析字符串时的问题。\
  \ |\n| `ParseInLocation(layout, str, location)` | 此函数使用指定的布局解析字符串，如果字符串中不包含时区，则使用`Location`。返回一个`error`来指示解析字符串时的问题。\
  \ |\n\n表 19-8 中描述的函数使用一个参考时间，该时间用于指定要解析的字符串的格式。这个参考时间是 MST 时区（比 GMT 晚七小时）2006 年\
  \ 1 月 2 日星期一 15:04:05（即下午 3 点过 4 分 5 秒）。\n\n参考日期的组件被排列起来，以指定要解析的日期字符串的布局，如清单 19-8\
  \ 所示。\n\n```\npackage main\nimport (\n\"time\"\n\"fmt\"\n)\nfunc PrintTime(label\
  \ string, t *time.Time) {\n//layout := \"Day: 02 Month: Jan Year: 2006\"\nfmt.Println(label,\
  \ t.Format(time.RFC822Z))\n}\nfunc main() {\nlayout := \"2006-Jan-02\"\ndates :=\
  \ []string {\n\"1995-Jun-09\",\n\"2015-Jun-02\",\n}\nfor _, d := range dates {\n\
  time, err := time.Parse(layout, d)\nif (err == nil) {\nPrintTime(\"Parsed\", &time)\n\
  } else {\nPrintfln(\"Error: %s\", err.Error())\n}\n}\n}\n清单 19-8\ndatesandtimes\
  \ 文件夹中的 main.go 文件：解析日期字符串\n```\n\n此示例中使用的布局包括四位数的年份、三个字母的月份和两位数的日期，全部用连字符分隔。布局与要解析的字符串一起传递给`Parse`函数，该函数返回一个时间值和一个错误，该错误将详细说明任何解析问题。编译并执行项目，您将收到以下输出，尽管您可能会看到不同的时区偏移（我稍后会解释）：\n\
  \n```\nParsed 09 Jun 95 00:00 +0000\nParsed 02 Jun 15 00:00 +0000\n```\n\n## 使用预定义日期布局\n\
  \n表 19-7 中描述的布局常量可用于解析日期，如清单 19-9 所示。\n\n```\npackage main\nimport (\n\"time\"\n\
  \"fmt\"\n)\nfunc PrintTime(label string, t *time.Time) {\n//layout := \"Day: 02\
  \ Month: Jan Year: 2006\"\nfmt.Println(label, t.Format(time.RFC822Z))\n}\nfunc main()\
  \ {\n//layout := \"2006-Jan-02\"\ndates := []string {\n\"09 Jun 95 00:00 GMT\",\n\
  \"02 Jun 15 00:00 GMT\",\n}\nfor _, d := range dates {\ntime, err := time.Parse(time.RFC822,\
  \ d)\nif (err == nil) {\nPrintTime(\"Parsed\", &time)\n} else {\nPrintfln(\"Error:\
  \ %s\", err.Error())\n}\n}\n}\n清单 19-9\ndatesandtimes 文件夹中的 main.go 文件：使用预定义布局\n\
  ```\n\n此示例使用`RFC822`常量解析日期字符串，并产生以下输出，尽管您可能会看到不同的时区偏移：\n\n```\nParsed 09 Jun 95\
  \ 01:00 +0100\nParsed 02 Jun 15 01:00 +0100\n```\n\n\n\n### 指定解析位置\n\n`Parse` 函数假定未指定时区的日期和时间以协调世界时（UTC）定义。可以使用\
  \ `ParseInLocation` 方法来指定当未指定时区时使用的位置，如清单 19-10 所示。\n\n```\npackage main\nimport\
  \ (\n\"time\"\n\"fmt\"\n)\nfunc PrintTime(label string, t *time.Time) {\n//layout\
  \ := \"Day: 02 Month: Jan Year: 2006\"\nfmt.Println(label, t.Format(time.RFC822Z))\n\
  }\nfunc main() {\nlayout := \"02 Jan 06 15:04\"\ndate := \"09 Jun 95 19:30\"\nlondon,\
  \ lonerr := time.LoadLocation(\"Europe/London\")\nnewyork, nycerr := time.LoadLocation(\"\
  America/New_York\")\nif (lonerr == nil && nycerr == nil) {\nnolocation, _ := time.Parse(layout,\
  \ date)\nlondonTime, _ := time.ParseInLocation(layout, date, london)\nnewyorkTime,\
  \ _ := time.ParseInLocation(layout, date, newyork)\nPrintTime(\"No location:\",\
  \ &nolocation)\nPrintTime(\"London:\", &londonTime)\nPrintTime(\"New York:\", &newyorkTime)\n\
  } else {\nfmt.Println(lonerr.Error(), nycerr.Error())\n}\n}\nListing 19-10\n在 datesandtimes\
  \ 文件夹的 main.go 文件中指定位置\n```\n\n`ParseInLocation` 接受一个 `time.Location` 参数，该参数指定一个位置，当解析的字符串中不含时区时，将使用该位置的时区。`Location`\
  \ 值可以使用表 19-9 中描述的函数创建。\n\n**表 19-9** 创建位置的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `LoadLocation(name)`\
  \ | 该函数返回指定名称的 `*Location` 和一个指示任何问题的 `error`。 |\n| `LoadLocationFromTZData(name,\
  \ data)` | 该函数从一个包含格式化时区数据库的 `byte` 切片返回 `*Location`。 |\n| `FixedZone(name, offset)`\
  \ | 该函数返回一个始终使用指定名称和 UTC 偏移量的 `*Location`。 |\n\n当向 `LoadLocation` 函数传递一个地点时，返回的\
  \ `Location` 包含该地点所使用的时区的详细信息。地点名称定义在 IANA 时区数据库 [`www.iana.org/time-zones`](https://www.iana.org/time-zones)\
  \ 中，并列出在 [`en.wikipedia.org/wiki/List_of_tz_database_time_zones`](https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)\
  \ 上。清单 19-10 中的示例指定了 `Europe/London` 和 `America/New_York`，分别生成了伦敦和纽约的 `Location`\
  \ 值。编译并执行代码，你将看到以下输出：\n\n```\nNo location: 09 Jun 95 19:30 +0000\nLondon: 09 Jun\
  \ 95 19:30 +0100\nNew York: 09 Jun 95 19:30 -0400\n```\n\n这三个日期显示了如何使用不同的时区解析字符串。当使用\
  \ `Parse` 方法时，时区被假定为 UTC，其偏移量为零（输出中的 `+0000` 部分）。当使用伦敦位置时，时间被假定为比 UTC 早一小时，因为解析字符串中的日期处于英国使用的夏令时期间。类似地，当使用纽约位置时，偏移量比\
  \ UTC 晚四小时。\n\n### 嵌入时区数据库\n\n用于创建 `Location` 值的时区数据库与 Go 工具一起安装，这意味着在部署编译后的应用程序时，该数据库可能不可用。`time/tzdata`\
  \ 包包含一个嵌入版本的数据库，该数据库通过包初始化函数加载（如第 12 章所述）。为了确保时区数据始终可用，请像这样声明对该包的依赖：\n\n```\n...\n\
  import (\n\"fmt\"\n\"time\"\n_ \"time/tzdata\"\n)\n...\n```\n\n该包中没有导出的特性，因此必须使用空白标识符来声明依赖关系，而不会产生编译器错误。\n\
  \n### 使用本地位置\n\n如果用于创建 `Location` 的地点名称是 `Local`，则将使用运行应用程序的计算机的时区设置，如清单 19-11 所示。\n\
  \n```\npackage main\nimport (\n\"time\"\n\"fmt\"\n)\nfunc PrintTime(label string,\
  \ t *time.Time) {\n//layout := \"Day: 02 Month: Jan Year: 2006\"\nfmt.Println(label,\
  \ t.Format(time.RFC822Z))\n}\nfunc main() {\nlayout := \"02 Jan 06 15:04\"\ndate\
  \ := \"09 Jun 95 19:30\"\nlondon, lonerr := time.LoadLocation(\"Europe/London\"\
  )\nnewyork, nycerr := time.LoadLocation(\"America/New_York\")\nlocal, _ := time.LoadLocation(\"\
  Local\")\nif (lonerr == nil && nycerr == nil) {\nnolocation, _ := time.Parse(layout,\
  \ date)\nlondonTime, _ := time.ParseInLocation(layout, date, london)\nnewyorkTime,\
  \ _ := time.ParseInLocation(layout, date, newyork)\nlocalTime, _ := time.ParseInLocation(layout,\
  \ date, local)\nPrintTime(\"No location:\", &nolocation)\nPrintTime(\"London:\"\
  , &londonTime)\nPrintTime(\"New York:\", &newyorkTime)\nPrintTime(\"Local:\", &localTime)\n\
  } else {\nfmt.Println(lonerr.Error(), nycerr.Error())\n}\n}\nListing 19-11\n在 datesandtimes\
  \ 文件夹的 main.go 文件中使用本地时区\n```\n\n此示例产生的输出将因你的位置而异。我住在英国，这意味着在我的本地时区，夏令时期间比 UTC 早一小时，产生以下输出：\n\
  \n```\nNo location: 09 Jun 95 19:30 +0000\nLondon: 09 Jun 95 19:30 +0100\nNew York:\
  \ 09 Jun 95 19:30 -0400\nLocal: 09 Jun 95 19:30 +0100\n```\n\n### 直接指定时区\n\n使用地点名称是确保日期正确解析的最可靠方法，因为夏令时会自动应用。`FixedZone`\
  \ 函数可用于创建具有固定时区的 `Location`，如清单 19-12 所示。\n\n```\npackage main\nimport (\n\"time\"\
  \n\"fmt\"\n)\nfunc PrintTime(label string, t *time.Time) {\n//layout := \"Day: 02\
  \ Month: Jan Year: 2006\"\nfmt.Println(label, t.Format(time.RFC822Z))\n}\nfunc main()\
  \ {\nlayout := \"02 Jan 06 15:04\"\ndate := \"09 Jun 95 19:30\"\nlondon := time.FixedZone(\"\
  BST\", 1 * 60 * 60)\nnewyork := time.FixedZone(\"EDT\", -4 * 60 * 60)\nlocal :=\
  \ time.FixedZone(\"Local\", 0)\n//if (lonerr == nil && nycerr == nil) {\nnolocation,\
  \ _ := time.Parse(layout, date)\nlondonTime, _ := time.ParseInLocation(layout, date,\
  \ london)\nnewyorkTime, _ := time.ParseInLocation(layout, date, newyork)\nlocalTime,\
  \ _ := time.ParseInLocation(layout, date, local)\nPrintTime(\"No location:\", &nolocation)\n\
  PrintTime(\"London:\", &londonTime)\nPrintTime(\"New York:\", &newyorkTime)\nPrintTime(\"\
  Local:\", &localTime)\n// } else {\n//     fmt.Println(lonerr.Error(), nycerr.Error())\n\
  // }\n}\nListing 19-12\n在 datesandtimes 文件夹的 main.go 文件中指定时区\n```\n\n`FixedZone`\
  \ 函数的参数是一个名称和距 UTC 的偏移秒数。此示例创建了三个固定时区，其中一个比 UTC 早一小时，其中一个晚四小时，还有一个没有偏移。编译并执行该项目，你将看到以下输出：\n\
  \n```\nNo location: 09 Jun 95 19:30 +0000\nLondon: 09 Jun 95 19:30 +0100\nNew York:\
  \ 09 Jun 95 19:30 -0400\nLocal: 09 Jun 95 19:30 +0000\n```\n\n\n\n### 操作时间值\n\n\
  `time` 包中定义了用于处理 `Time` 值的方法，如表 19-10 所述。其中一些方法依赖于 `Duration` 类型，我将在下一节中对此进行描述。\n\
  \n**表 19-10** 用于处理时间值的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Add(duration)` | 此方法将指定的\
  \ `Duration` 添加到 `Time` 中，并返回结果。 |\n| `Sub(time)` | 此方法返回一个 `Duration`，该值表示调用该方法的\
  \ `Time` 与作为参数提供的 `Time` 之间的差值。 |\n| `AddDate(y, m, d)` | 此方法将指定的年、月、日添加到 `Time`\
  \ 中，并返回结果。 |\n| `After(time)` | 如果调用该方法的 `Time` 晚于作为参数提供的 `Time`，则此方法返回 `true`。\
  \ |\n| `Before(time)` | 如果调用该方法的 `Time` 早于作为参数提供的 `Time`，则此方法返回 `true`。 |\n| `Equal(time)`\
  \ | 如果调用该方法的 `Time` 等于作为参数提供的 `Time`，则此方法返回 `true`。 |\n| `IsZero()` | 如果调用该方法的 `Time`\
  \ 表示零时间点（即 `公元 1 年 1 月 1 日, 00:00:00 UTC`），则此方法返回 `true`。 |\n| `In(loc)` | 此方法返回以指定的\
  \ `Location` 表示的 `Time` 值。 |\n| `Location()` | 此方法返回与 `Time` 相关联的 `Location`，从而有效地允许时间在不同的时区表示。\
  \ |\n| `Round(duration)` | 此方法将 `Time` 舍入到由 `Duration` 值表示的最近间隔。 |\n| `Truncate(duration)`\
  \ | 此方法将 `Time` 向下舍入到由 `Duration` 值表示的最近间隔。 |\n\n清单 19-13 从一个字符串解析出 `Time`，并使用表中描述的一些方法。\n\
  \n```\npackage main\nimport (\n\"time\"\n\"fmt\"\n)\nfunc main() {\nt, err := time.Parse(time.RFC822,\
  \ \"09 Jun 95 04:59 BST\")\nif (err == nil) {\nPrintfln(\"After: %v\", t.After(time.Now()))\n\
  Printfln(\"Round: %v\", t.Round(time.Hour))\nPrintfln(\"Truncate: %v\", t.Truncate(time.Hour))\n\
  } else {\nfmt.Println(err.Error())\n}\n}\n清单 19-13\n在 datesandtimes 文件夹中的 main.go\
  \ 文件里处理 Time 值\n```\n\n编译并执行该项目，你会收到以下输出，日期格式可能略有不同：\n\n```\nAfter: false\nRound:\
  \ 1995-06-09 05:00:00 +0100 BST\nTruncate: 1995-06-09 04:00:00 +0100 BST\n```\n\n\
  `Time` 值可以使用 `Equal` 函数进行比较，该函数会考虑时区差异，如清单 19-14 所示。\n\n```\npackage main\nimport\
  \ (\n//\"fmt\"\n\"time\"\n)\nfunc main() {\nt1, _ := time.Parse(time.RFC822Z, \"\
  09 Jun 95 04:59 +0100\")\nt2, _ := time.Parse(time.RFC822Z, \"08 Jun 95 23:59 -0400\"\
  )\nPrintfln(\"Equal Method: %v\", t1.Equal(t2))\nPrintfln(\"Equality Operator: %v\"\
  , t1 == t2)\n}\n清单 19-14\n在 datesandtimes 文件夹中的 main.go 文件里比较 Time 值\n```\n\n此示例中的\
  \ `Time` 值表示不同时区中的同一时刻。`Equal` 函数考虑了时区的影响，而使用标准相等运算符时则不会。编译并执行该项目，你会收到以下输出：\n\n\
  ```\nEqual Method: true\nEquality Operator: false\n```\n\n### 表示持续时间\n\n`Duration`\
  \ 类型是 `int64` 类型的别名，用于表示特定的毫秒数。自定义的 `Duration` 值由 `time` 包中定义的 `Duration` 常量组成，如表\
  \ 19-11 所述。\n\n**表 19-11** time 包中的 Duration 常量\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `Hour` | 此常量表示 1 小时。 |\n| `Minute` | 此常量表示 1 分钟。 |\n| `Second` | 此常量表示 1 秒。 |\n\
  | `Millisecond` | 此常量表示 1 毫秒。 |\n| `Microsecond` | 此常量表示 1 微秒。 |\n| `Nanosecond`\
  \ | 此常量表示 1 纳秒。 |\n\n创建 `Duration` 后，可以使用表 19-12 中描述的方法进行检查。\n\n**表 19-12** Duration\
  \ 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Hours()` | 此方法返回一个 `float64`，表示以小时为单位的 `Duration`。\
  \ |\n| `Minutes()` | 此方法返回一个 `float64`，表示以分钟为单位的 `Duration`。 |\n| `Seconds()` |\
  \ 此方法返回一个 `float64`，表示以秒为单位的 `Duration`。 |\n| `Milliseconds()` | 此方法返回一个 `int64`，表示以毫秒为单位的\
  \ `Duration`。 |\n| `Microseconds()` | 此方法返回一个 `int64`，表示以微秒为单位的 `Duration`。 |\n\
  | `Nanoseconds()` | 此方法返回一个 `int64`，表示以纳秒为单位的 `Duration`。 |\n| `Round(duration)`\
  \ | 此方法返回一个 `Duration`，该值被舍入到指定 `Duration` 的最近倍数。 |\n| `Truncate(duration)` | 此方法返回一个\
  \ `Duration`，该值被向下舍入到指定 `Duration` 的最近倍数。 |\n\n清单 19-15 演示了如何使用这些常量创建一个 `Duration`，并使用了表\
  \ 19-12 中的一些方法。\n\n```\npackage main\nimport (\n//\"fmt\"\n\"time\"\n)\nfunc main()\
  \ {\nvar d time.Duration = time.Hour + (30 * time.Minute)\nPrintfln(\"Hours: %v\"\
  , d.Hours())\nPrintfln(\"Mins: %v\", d.Minutes())\nPrintfln(\"Seconds: %v\", d.Seconds())\n\
  Printfln(\"Millseconds: %v\", d.Milliseconds())\nrounded := d.Round(time.Hour)\n\
  Printfln(\"Rounded Hours: %v\", rounded.Hours())\nPrintfln(\"Rounded Mins: %v\"\
  , rounded.Minutes())\ntrunc := d.Truncate(time.Hour)\nPrintfln(\"Truncated  Hours:\
  \ %v\", trunc.Hours())\nPrintfln(\"Rounded Mins: %v\", trunc.Minutes())\n}\n清单 19-15\n\
  在 datesandtimes 文件夹中的 main.go 文件里创建和检查 Duration\n```\n\n`Duration` 被设置为 90 分钟，然后使用\
  \ `Hours()`、`Minutes()`、`Seconds()` 和 `Milliseconds()` 方法生成输出。使用 `Round` 和 `Truncate`\
  \ 方法来创建新的 `Duration` 值，并以小时和分钟的形式输出。编译并执行该项目，你会收到以下输出：\n\n```\nHours: 1.5\nMins:\
  \ 90\nSeconds: 5400\nMillseconds: 5400000\nRounded Hours: 2\nRounded Mins: 120\n\
  Truncated  Hours: 1\nRounded Mins: 60\n```\n\n注意，表 19-12 中的方法返回的是以特定单位（如小时或分钟）表示的整个持续时间。这与\
  \ `Time` 类型定义的名称相似的方法不同，后者只返回日期/时间的某一部分。\n\n\n\n### 创建相对于某个时间的持续时间\n\n`time`包定义了两个函数，可用于创建表示特定`Time`与当前`Time`之间时间量的`Duration`值，如表\
  \ 19-13 所述。\n\n**表 19-13**  \n用于创建相对于某个`Time`的`Duration`值的`time`函数\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| `Since(time)` | 此函数返回一个`Duration`，表示自指定的`Time`值以来经过的时间。 |\n\
  | `Until(time)` | 此函数返回一个`Duration`，表示直到指定的`Time`值所经过的时间。 |\n\n清单 19-18 演示了这些函数的用法。\n\
  \n```\npackage main\nimport (\n//\"fmt\"\n\"time\"\n)\nfunc main() {\ntoYears :=\
  \ func(d time.Duration) int {\nreturn int( d.Hours() / (24 * 365))\n}\nfuture :=\
  \ time.Date(2051, 0, 0, 0, 0, 0, 0, time.Local)\npast := time.Date(1965, 0, 0, 0,\
  \ 0, 0, 0, time.Local)\nPrintfln(\"Future: %v\", toYears(time.Until(future)))\n\
  Printfln(\"Past: %v\", toYears(time.Since(past)))\n}\n```\n\n**清单 19-16**  \n在`datesandtimes`文件夹中的`main.go`文件里创建相对于时间的`Duration`\n\
  \n该示例使用`Until`和`Since`方法来计算到 2051 年还有多少年，以及自 1965 年以来过去了多少年。清单 19-16 中的代码在编译后会产生以下输出，不过根据你运行示例的时间，你可能会看到不同的结果：\n\
  \n```\nFuture: 29\nPast: 56\n```\n\n### 从字符串创建持续时间\n\n`time.ParseDuration`函数解析字符串以创建`Duration`值。为快速参考，表\
  \ 19-14 描述了此函数。\n\n**表 19-14**  \n用于将字符串解析为`Duration`值的函数\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `ParseDuration(str)` | 此函数返回一个`Duration`和一个`error`，指示解析指定字符串时是否存在问题。\
  \ |\n\n`ParseDuration`函数支持的字符串格式是一系列数值后面跟着表 19-15 中描述的单位指示符。\n\n**表 19-15**  \n\
  `Duration`字符串单位指示符\n\n| 单位 | 描述 |\n| --- | --- |\n| `h` | 此单位表示小时。 |\n| `m` | 此单位表示分钟。\
  \ |\n| `s` | 此单位表示秒。 |\n| `ms` | 此单位表示毫秒。 |\n| `us` 或 `μs` | 这些单位表示微秒。 |\n| `ns`\
  \ | 此单位表示纳秒。 |\n\n数值之间不允许有空格，可以指定为整数或浮点数。清单 19-17 演示了如何从字符串创建`Duration`。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc main() {\nd, err := time.ParseDuration(\"\
  1h30m\")\nif (err == nil) {\nPrintfln(\"Hours: %v\", d.Hours())\nPrintfln(\"Mins:\
  \ %v\", d.Minutes())\nPrintfln(\"Seconds: %v\", d.Seconds())\nPrintfln(\"Millseconds:\
  \ %v\", d.Milliseconds())\n} else {\nfmt.Println(err.Error())\n}\n}\n```\n\n**清单\
  \ 19-17**  \n在`datesandtimes`文件夹中的`main.go`文件里解析字符串\n\n该字符串指定了 1 小时 30 分钟。编译并执行该项目，将产生以下输出：\n\
  \n```\nHours: 1.5\nMins: 90\nSeconds: 5400\nMillseconds: 5400000\n```\n\n## 在协程和通道中使用时间特性\n\
  \n`time`包提供了一小组函数，用于处理协程和通道，如表 19-16 所述。\n\n**表 19-16**  \n`time`包函数\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| `Sleep(duration)` | 此函数将当前协程暂停至少指定的持续时间。 |\n| `AfterFunc(duration,\
  \ func)` | 此函数在指定的持续时间后，在自己的协程中执行指定的函数。结果是一个`*Timer`，其`Stop`方法可用于在持续时间结束前取消函数的执行。\
  \ |\n| `After(duration)` | 此函数返回一个通道，该通道会阻塞指定的持续时间，然后产生一个`Time`值。详情请参阅“接收定时通知”一节。\
  \ |\n| `Tick(duration)` | 此函数返回一个通道，该通道会定期发送一个`Time`值，周期由持续时间指定。 |\n\n尽管这些函数都定义在同一个包中，但它们的用途不同，接下来的几节将进行演示。\n\
  \n### 让协程休眠\n\n`Sleep`函数将当前协程的执行暂停指定的持续时间，如清单 19-18 所示。\n\n```\npackage main\nimport\
  \ (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(channel chan <- string) {\nnames\
  \ := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\" }\nfor _, name := range\
  \ names {\nchannel <- name\ntime.Sleep(time.Second * 1)\n}\nclose(channel)\n}\n\
  func main() {\nnameChannel := make (chan string)\ngo writeToChannel(nameChannel)\n\
  for name := range nameChannel {\nPrintfln(\"Read name: %v\", name)\n}\n}\n```\n\n\
  **清单 19-18**  \n在`datesandtimes`文件夹中的`main.go`文件里暂停协程\n\n`Sleep`函数指定的持续时间是协程被暂停的最短时间，你不应依赖精确的时间段，尤其是对于较短的持续时间。请记住，`Sleep`函数会暂停调用它的协程，这意味着它也会暂停`main`协程，这可能会让应用程序看起来像被锁住了。（如果发生这种情况，你不小心调用了`Sleep`函数的迹象是自动死锁检测不会引发恐慌。）编译并执行该项目，你会看到以下输出，每个名字之间会有短暂延迟：\n\
  \n```\nRead name: Alice\nRead name: Bob\nRead name: Charlie\nRead name: Dora\n```\n\
  \n### 延迟执行函数\n\n`AfterFunc`函数用于将函数的执行延迟指定的时间，如清单 19-19 所示。\n\n```\npackage main\n\
  import (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(channel chan <- string) {\n\
  names := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\" }\nfor _, name :=\
  \ range names {\nchannel <- name\n//time.Sleep(time.Second * 1)\n}\nclose(channel)\n\
  }\nfunc main() {\nnameChannel := make (chan string)\ntime.AfterFunc(time.Second\
  \ * 5, func () {\nwriteToChannel(nameChannel)\n})\nfor name := range nameChannel\
  \ {\nPrintfln(\"Read name: %v\", name)\n}\n}\n```\n\n**清单 19-19**  \n在`datesandtimes`文件夹中的`main.go`文件里延迟执行函数\n\
  \n`AfterFunc`的第一个参数是延迟时间，本例中为五秒。第二个参数是要执行的函数。在这个例子中，我想执行`writeToChannel`函数，但`AfterFunc`只接受没有参数和返回值的函数，所以我必须使用一个简单的包装器。编译并执行该项目，你会看到以下结果，这些结果会在五秒延迟后写出：\n\
  \n```\nRead name: Alice\nRead name: Bob\nRead name: Charlie\nRead name: Dora\n```\n\
  \n\n\n### 接收定时通知\n\n`After` 函数会等待指定的持续时间，然后将一个 `Time` 值发送到一个通道，这是一种利用通道在指定的未来时间接收通知的有用方式，如代码清单\
  \ 19-20 所示。\n\n```\npackage main\nimport (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(channel\
  \ chan <- string) {\nPrintfln(\"等待初始时长...\")\n_ = <- time.After(time.Second * 2)\n\
  Printfln(\"初始时长已过。\")\nnames := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\"\
  \ }\nfor _, name := range names {\nchannel <- name\ntime.Sleep(time.Second * 1)\n\
  }\nclose(channel)\n}\nfunc main() {\nnameChannel := make (chan string)\ngo writeToChannel(nameChannel)\n\
  for name := range nameChannel {\nPrintfln(\"读取姓名：%v\", name)\n}\n}\n代码清单 19-20\n\
  在 datesandtimes 文件夹的 main.go 文件中接收未来通知\n```\n\n`After` 函数返回一个通道，该通道携带 `Time` 值。该通道会阻塞指定的持续时间，当发送一个\
  \ `Time` 值时，表示持续时间已过。在此示例中，通过通道发送的值仅作为信号使用，并未直接使用，这就是为什么它被赋值给空白标识符，如下所示：\n\n```\n\
  ...\n_ = <- time.After(time.Second * 2)\n...\n```\n\n这种使用 `After` 函数的方式在 `writeToChannel`\
  \ 函数中引入了初始延迟。编译并执行该项目，您将看到以下输出：\n\n```\n等待初始时长...\n初始时长已过。\n读取姓名：Alice\n读取姓名：Bob\n\
  读取姓名：Charlie\n读取姓名：Dora\n```\n\n在此示例中，其效果与使用 `Sleep` 函数相同，但区别在于 `After` 函数返回一个通道，该通道在读取值之前不会阻塞，这意味着可以先指定方向，执行额外的工作，然后再执行通道读取，这样通道只会阻塞持续时间的剩余部分。\n\
  \n### 在 Select 语句中将通知用作超时\n\n`After` 函数可以与 `select` 语句一起使用来提供超时，如代码清单 19-21 所示。\n\
  \n```\npackage main\nimport (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(channel\
  \ chan <- string) {\nPrintfln(\"等待初始时长...\")\n_ = <- time.After(time.Second * 2)\n\
  Printfln(\"初始时长已过。\")\nnames := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\"\
  \ }\nfor _, name := range names {\nchannel <- name\ntime.Sleep(time.Second * 3)\n\
  }\nclose(channel)\n}\nfunc main() {\nnameChannel := make (chan string)\ngo writeToChannel(nameChannel)\n\
  channelOpen := true\nfor channelOpen {\nPrintfln(\"开始读取通道\")\nselect {\ncase name,\
  \ ok := <- nameChannel:\nif (!ok) {\nchannelOpen = false\nbreak\n} else {\nPrintfln(\"\
  读取姓名：%v\", name)\n}\ncase <- time.After(time.Second * 2):\nPrintfln(\"超时\")\n}\n\
  }\n}\n代码清单 19-21\n在 datesandtimes 文件夹的 main.go 文件中使用 Select 语句中的超时\n```\n\n`select`\
  \ 语句会阻塞，直到其中一个通道就绪或计时器到期。这是因为 `select` 语句会阻塞直到其某个通道就绪，并且 `After` 函数创建了一个在指定时间段内阻塞的通道。编译并执行该项目，您将看到以下输出：\n\
  \n```\n等待初始时长...\n初始时长已过。\n超时\n读取姓名：Alice\n超时\n读取姓名：Bob\n超时\n读取姓名：Charlie\n超时\n\
  读取姓名：Dora\n超时\n```\n\n### 停止和重置计时器\n\n当您确定始终需要定时通知时，`After` 函数非常有用。如果您需要取消通知的选项，则可以使用表\
  \ 19-17 中描述的函数。\n\n**表 19-17**  \n用于创建计时器的 `time` 函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `NewTimer(duration)` | 此函数返回一个带有指定周期的 `*Timer`。 |\n\n`NewTimer` 函数的结果是指向一个\
  \ `Timer` 结构体的指针，该结构体定义了表 19-18 中描述的方法。\n\n**表 19-18**  \n`Timer` 结构体定义的方法\n\n|\
  \ 名称 | 描述 |\n| --- | --- |\n| `C` | 此字段返回 `Time` 将通过其发送 `Time` 值的通道。 |\n| `Stop()`\
  \ | 此方法停止计时器。结果是一个 `bool`，如果计时器已停止则为 `true`，如果计时器已发送其消息则为 `false`。 |\n| `Reset(duration)`\
  \ | 此方法停止计时器并重置它，使其间隔为指定的 `Duration`。 |\n\n代码清单 19-22 使用 `NewTimer` 函数创建一个 `Timer`，该计时器在指定持续时间过去之前被重置。\n\
  \n> **警告**  \n> 停止计时器时要小心。计时器的通道不会关闭，这意味着即使计时器停止后，从通道读取仍会继续阻塞。\n\n```\npackage main\n\
  import (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(channel chan <- string) {\n\
  timer := time.NewTimer(time.Minute * 10)\ngo func () {\ntime.Sleep(time.Second *\
  \ 2)\nPrintfln(\"重置计时器\")\ntimer.Reset(time.Second)\n}()\nPrintfln(\"等待初始时长...\"\
  )\n<- timer.C\nPrintfln(\"初始时长已过。\")\nnames := []string { \"Alice\", \"Bob\", \"\
  Charlie\", \"Dora\" }\nfor _, name := range names {\nchannel <- name\n//time.Sleep(time.Second\
  \ * 3)\n}\nclose(channel)\n}\nfunc main() {\nnameChannel := make (chan string)\n\
  go writeToChannel(nameChannel)\nfor name := range nameChannel {\nPrintfln(\"读取姓名：%v\"\
  , name)\n}\n}\n代码清单 19-22\n在 datesandtimes 文件夹的 main.go 文件中重置计时器\n```\n\n此示例中的 `Timer`\
  \ 创建时持续时间为十分钟。一个 goroutine 休眠两秒，然后重置计时器，使其持续时间为两秒。编译并执行该项目，您将看到以下输出：\n\n```\n等待初始时长...\n\
  重置计时器\n初始时长已过。\n读取姓名：Alice\n读取姓名：Bob\n读取姓名：Charlie\n读取姓名：Dora\n```\n\n\n\n### 接收定期通知\n\
  \n`Tick` 函数返回一个通道，该通道会按指定时间间隔发送 `Time` 值，如代码清单 19-23 所示。\n\n```\npackage main\n\
  import (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(nameChannel chan <- string)\
  \ {\nnames := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\" }\ntickChannel\
  \ := time.Tick(time.Second)\nindex := 0\nfor {\n<- tickChannel\nnameChannel <- names[index]\n\
  index++\nif (index == len(names)) {\nindex = 0\n}\n}\n}\nfunc main() {\nnameChannel\
  \ := make (chan string)\ngo writeToChannel(nameChannel)\nfor name := range nameChannel\
  \ {\nPrintfln(\"Read name: %v\", name)\n}\n}\n代码清单 19-23\n在 datesandtimes 文件夹的 main.go\
  \ 文件中接收定期通知\n```\n\n同样，`Tick` 函数创建的通道的价值并非在于其上发送的 `Time` 值，而在于发送这些值的周期性。在此示例中，`Tick`\
  \ 函数用于创建一个通道，该通道每秒发送一次值。当没有值可读时，该通道会阻塞，这使得 `Tick` 函数创建的通道能够控制 `writeToChannel` 函数生成值的速率。编译并执行该项目，你将看到以下输出，该输出会重复直到程序终止：\n\
  \n```\nRead name: Alice\nRead name: Bob\nRead name: Charlie\nRead name: Dora\nRead\
  \ name: Alice\nRead name: Bob\n...\n```\n\n当需要无限序列的信号时，`Tick` 函数非常有用。如果需要固定序列的值，则可以使用表\
  \ 19-19 中描述的函数。\n\n**表 19-19** 用于创建 Ticker 的 `time` 函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `NewTicker(duration)` | 此函数返回一个具有指定周期的 `*Ticker`。 |\n\n`NewTicker` 函数的结果是一个指向\
  \ `Ticker` 结构体的指针，该结构体定义了表 19-20 中描述的字段和方法。\n\n**表 19-20** `Ticker` 结构体定义的字段和方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `C` | 此字段返回 `Ticker` 用于发送其 `Time` 值的通道。 |\n| `Stop()`\
  \ | 此方法停止 ticker（但不会关闭 `C` 字段返回的通道）。 |\n| `Reset(duration)` | 此方法停止一个 ticker 并重置它，使其时间间隔变为指定的\
  \ `Duration`。 |\n\n代码清单 19-24 使用 `NewTicker` 函数创建一个 `Ticker`，并在不再需要时将其停止。\n\n```\n\
  package main\nimport (\n//\"fmt\"\n\"time\"\n)\nfunc writeToChannel(nameChannel\
  \ chan <- string) {\nnames := []string { \"Alice\", \"Bob\", \"Charlie\", \"Dora\"\
  \ }\nticker := time.NewTicker(time.Second / 10)\nindex := 0\nfor {\n<- ticker.C\n\
  nameChannel <- names[index]\nindex++\nif (index == len(names)) {\nticker.Stop()\n\
  close(nameChannel)\nbreak\n}\n}\n}\nfunc main() {\nnameChannel := make (chan string)\n\
  go writeToChannel(nameChannel)\nfor name := range nameChannel {\nPrintfln(\"Read\
  \ name: %v\", name)\n}\n}\n代码清单 19-24\n在 datesandtimes 文件夹的 main.go 文件中创建一个 Ticker\n\
  ```\n\n当应用程序需要创建多个 ticker，同时又不希望那些不再需要的 ticker 继续发送消息时，这种方法非常有用。编译并执行该项目，你将看到以下输出：\n\
  \n```\nRead name: Alice\nRead name: Bob\nRead name: Charlie\nRead name: Dora\n```\n\
  \n## 总结\n\n在本章中，我描述了 Go 标准库中用于处理时间、日期和持续时间的特性，包括对通道和 goroutine 的内置支持。在下一章中，我将介绍\
  \ reader 和 writer，它们是 Go 中用于读写数据的机制。\n\n"
- "# 20. 读写数据\n\n在本章中，我将描述标准库中最重要的两个接口：`Reader` 接口和 `Writer` 接口。这些接口无论在哪里读写数据都会用到，这意味着任何数据的源或目标都可以用大致相同的方式处理。例如，将数据写入文件与将数据写入网络连接是完全一样的。表\
  \ 20-1 介绍了本章描述的特性所处的上下文。\n\n**表 20-1** Reader 和 Writer 的上下文\n\n| 问题 | 答案 |\n| ---\
  \ | --- |\n| 它们是什么？ | 这些接口定义了读写数据所需的基本方法。 |\n| 它们有什么用？ | 这种方法意味着几乎任何数据源都可以用相同的方式使用，同时仍然允许使用第\
  \ 13 章中描述的组合特性来定义专门的特性。 |\n| 如何使用它们？ | `io` 包定义了这些接口，但其实现在许多其他包中可用，其中一些将在后续章节中详细描述。\
  \ |\n| 是否有任何陷阱或限制？ | 这些接口并不能完全隐藏数据源或目标的具体细节，并且通常需要额外的由基于 `Reader` 和 `Writer` 构建的接口提供的方法。\
  \ |\n| 是否有替代方案？ | 使用这些接口是可选的，但很难避免，因为它们在标准库中广泛使用。 |\n\n**表 20-2** 章节总结\n\n| 问题 |\
  \ 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 读取数据 | 使用 `Reader` 接口的实现 | 6 |\n| 写入数据 |\
  \ 使用 `Writer` 接口的实现 | 7 |\n| 简化读写数据的过程 | 使用工具函数 | 8 |\n| 组合读取器或写入器 | 使用专门的实现 | 9–16\
  \ |\n| 缓冲读取和写入 | 使用 `bufio` 包提供的特性 | 17–23 |\n| 使用 reader 和 writer 扫描和格式化数据 | 使用接受\
  \ `Reader` 或 `Writer` 参数的 `fmt` 包中的函数 | 24–27 |\n\n\n\n## 本章准备\n\n要开始本章的学习，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `readersandwriters` 的目录。运行代码清单 20-1 所示的命令来创建一个模块文件。\n\n**提示**  \n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init readersandwriters\n\
  代码清单 20-1\n初始化模块\n```\n\n在 `readersandwriters` 文件夹中添加一个名为 `printer.go` 的文件，内容如代码清单\
  \ 20-2 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string,\
  \ values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n}\n代码清单 20-2\n\
  readersandwriters 文件夹中 printer.go 文件的内容\n```\n\n在 `readersandwriters` 文件夹中添加一个名为\
  \ `product.go` 的文件，内容如代码清单 20-3 所示。\n\n```\npackage main\ntype Product struct {\n\
