  \n### 扩展仓储\n\n完成管理功能需要两个新的仓储方法，如代码清单 38-1 所示。\n\n```go\npackage models\n\ntype Repository\
  \ interface {\n    GetProduct(id int) Product\n    GetProducts() []Product\n   \
  \ SaveProduct(*Product)\n    GetProductPage(page, pageSize int) (products []Product,\
