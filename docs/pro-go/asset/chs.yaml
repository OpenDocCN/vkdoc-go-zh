  \n`scanIntoStruct` 函数接受一个 `Rows` 值和一个目标值，数据将被扫描到该目标值中。使用 Go 反射特性来查找结构体中具有相同名称的字段，匹配时不区分大小写。对于嵌套的结构体字段，列名必须与用点号分隔的字段名对应，以便例如\
  \ `Category.Name` 字段将从名为 `category.name` 的结果列中扫描出来。\n\n为 `Scan` 方法创建了一个指针切片，并将扫描的结构体值添加到一个切片中，该切片用于生成方法结果。如果没有结构体字段与结果列匹配，则使用一个虚拟值，因为\
  \ `Scan` 方法期望一组完整的指针用于扫描数据。代码清单 26-23 使用这个新函数来扫描查询结果。\n\n```go\npackage main\nimport\
