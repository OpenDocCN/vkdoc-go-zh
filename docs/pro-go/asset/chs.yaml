  , 79500 },\n{ \"Thinking Cap\", \"Chess\", 16 },\n{ \"Unsteady Chair\", \"Chess\"\
  , 75 },\n{ \"Bling-Bling King\", \"Chess\", 1200 },\n}\n```\n\n代码清单 24-3: `httpserver`\
  \ 文件夹中 `product.go` 文件的内容\n\n在 `httpserver` 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 24-4\
  \ 所示。\n\n```\npackage main\nfunc main() {\nfor _, p := range Products {\nPrintfln(\"\
  Product: %v, Category: %v, Price: $%.2f\",\np.Name, p.Category, p.Price)\n}\n}\n\
  ```\n\n代码清单 24-4: `httpserver` 文件夹中 `main.go` 文件的内容\n\n使用命令提示符在 `httpserver` 文件夹中运行代码清单\
  \ 24-5 所示的命令。\n\n```\ngo run .\n```\n\n代码清单 24-5: 运行示例项目\n\n项目将被编译并执行，产生以下输出：\n\n\
  ```\nProduct: Kayak, Category: Watersports, Price: $279.00\nProduct: Lifejacket,\
  \ Category: Watersports, Price: $49.95\nProduct: Soccer Ball, Category: Soccer,\
  \ Price: $19.50\nProduct: Corner Flags, Category: Soccer, Price: $34.95\nProduct:\
  \ Stadium, Category: Soccer, Price: $79500.00\nProduct: Thinking Cap, Category:\
  \ Chess, Price: $16.00\nProduct: Unsteady Chair, Category: Chess, Price: $75.00\n\
  Product: Bling-Bling King, Category: Chess, Price: $1200.00\n```\n\n## 创建简单的 HTTP\
  \ 服务器\n\n`net/http` 包使得创建简单的 HTTP 服务器变得容易，随后可以扩展该服务器以添加更复杂和有用的功能。代码清单 24-6 展示了一个服务器，它以简单的字符串响应请求。\n\
  \n```\npackage main\nimport (\n\"net/http\"\n\"io\"\n)\ntype StringHandler struct\
  \ {\nmessage string\n}\nfunc (sh StringHandler) ServeHTTP(writer http.ResponseWriter,\n\
  request *http.Request) {\nio.WriteString(writer, sh.message)\n}\nfunc main() {\n\
  err := http.ListenAndServe(\":5000\", StringHandler{ message: \"Hello, World\"})\n\
  if (err != nil) {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n```\n\n代码清单 24-6:\
  \ 在 `httpserver` 文件夹的 `main.go` 文件中创建简单的 HTTP 服务器\n\n虽然只有几行代码，但它们足以创建一个 HTTP 服务器，该服务器以\
  \ `Hello, World` 响应请求。编译并执行项目，然后使用 Web 浏览器请求 `http://localhost:5000`，将产生如图 24-1\
  \ 所示的结果。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig1_HTML.jpg](img/512642_1_En_24_Fig1_HTML.jpg)\n\
  \n图 24-1: 对 HTTP 请求的响应\n\n### 处理 Windows 防火墙权限请求\n\nWindows 用户可能会收到内置防火墙的提示，要求允许网络访问。不幸的是，`go\
  \ run` 命令每次运行时都会在一个唯一路径下创建可执行文件，这意味着每次修改代码并执行时，你都会被提示授予访问权限。要解决此问题，请在项目文件夹中创建一个名为\
  \ `buildandrun.ps1` 的文件，内容如下：\n\n```\n$file = \"./httpserver.exe\"\n&go build -o\
  \ $file\nif ($LASTEXITCODE -eq 0) {\n&$file\n}\n```\n\n这个 PowerShell 脚本每次都将项目编译到同一个文件，并且在没有错误的情况下执行结果，这意味着你只需授予一次防火墙访问权限。通过项目文件夹中运行以下命令来执行该脚本：\n\
  \n```\n./buildandrun.ps1\n```\n\n每次构建和执行项目时都必须使用此命令，以确保编译后的输出写入到同一位置。\n\n尽管代码清单\
  \ 24-6 中的代码行数不多，但需要花些时间理解。不过，花时间了解 HTTP 服务器是如何创建的是值得的，因为它能揭示 `net/http` 包提供的许多功能。\n\
  \n\n\n### 创建 HTTP 监听器与处理器\n\n`net/http` 包提供了一组便捷函数，可简化 HTTP 服务器的创建过程，无需指定过多细节。表\
  \ 24-3 描述了这些用于搭建服务器的便捷函数。\n\n**表 24-3：net/http 便捷函数**\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `ListenAndServe(addr, handler)` | 此函数在指定地址上开始监听 HTTP 请求，并将请求传递给指定的处理器。 |\n\
  | `ListenAndServeTLS(addr, cert, key, handler)` | 此函数开始监听 HTTPS 请求。参数包括地址、证书、密钥和处理器。\
  \ |\n\n`ListenAndServe` 函数会在指定的网络地址上开始监听 HTTP 请求。`ListenAndServeTLS` 函数对 HTTPS 请求执行相同操作，我将在“支持\
  \ HTTPS 请求”一节中进行演示。\n\n表 24-3 中的函数接受的地址可用于限制 HTTP 服务器，使其仅接受特定接口上的请求，或监听任何接口上的请求。代码清单\
  \ 24-6 采用了后一种方法，即仅指定端口号：\n\n```\nerr := http.ListenAndServe(\":5000\", StringHandler{\
  \ message: \"Hello, World\"})\n```\n\n未指定名称或地址，仅端口号跟在冒号后面，这意味着这条语句创建了一个 HTTP 服务器，该服务器在所有接口上监听端口\
  \ 5000 的请求。\n\n当请求到达时，它会被传递给一个处理器，该处理器负责生成响应。处理器必须实现 `Handler` 接口，该接口定义了表 24-4 中描述的方法。\n\
  \n**表 24-4：Handler 接口定义的方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `ServeHTTP(writer,\
  \ request)` | 调用此方法来处理 HTTP 请求。请求由 `Request` 值描述，响应通过 `ResponseWriter` 写入，两者都作为参数接收。\
  \ |\n\n我将在后面的章节中更详细地描述 `Request` 和 `ResponseWriter` 类型，但 `ResponseWriter` 接口定义了\
  \ `Writer` 接口所需的 `Write` 方法（第 20 章中描述），这意味着我可以使用 `io` 包中定义的 `WriteString` 函数来生成字符串响应：\n\
  \n```\nio.WriteString(writer, sh.message)\n```\n\n将所有这些特性组合在一起，结果就是一个 HTTP 服务器，它可以在所有接口上监听端口\
  \ 5000 的请求，并通过写入字符串来创建响应。诸如打开网络连接和解析 HTTP 请求之类的细节都在后台处理。\n\n### 检查请求\n\nHTTP 请求由\
  \ `net/http` 包中定义的 `Request` 结构体表示。表 24-5 描述了 `Request` 结构体定义的基本字段。\n\n**表 24-5：Request\
  \ 结构体定义的基本字段**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Method` | 此字段以 `string` 形式提供 HTTP\
  \ 方法（GET、POST 等）。`net/http` 包为 HTTP 方法定义了常量，例如 `MethodGet` 和 `MethodPost`。 |\n|\
  \ `URL` | 此字段返回请求的 URL，以 `URL` 值形式表示。 |\n| `Proto` | 此字段返回一个 `string`，指示请求使用的 HTTP\
  \ 版本。 |\n| `Host` | 此字段返回一个包含请求主机名的 `string`。 |\n| `Header` | 此字段返回一个 `Header` 值，它是\
  \ `map[string][]string` 的别名，包含请求头。map 的键是头的名称，值是包含头值的字符串切片。 |\n| `Trailer` | 此字段返回一个\
  \ `map[string]string`，包含请求体之后可能包含的任何附加头。 |\n| `Body` | 此字段返回一个 `ReadCloser`，它是一个接口，结合了\
  \ `Reader` 接口的 `Read` 方法和 `Closer` 接口的 `Close` 方法，这两个接口都在第 22 章中描述。 |\n\n代码清单 24-7\
  \ 向请求处理函数添加了一些语句，将基本的 `Request` 字段值写入标准输出。\n\n```\npackage main\nimport (\n\"net/http\"\
  \n\"io\"\n)\ntype StringHandler struct {\nmessage string\n}\nfunc (sh StringHandler)\
  \ ServeHTTP(writer http.ResponseWriter,\nrequest *http.Request) {\nPrintfln(\"Method:\
  \ %v\", request.Method)\nPrintfln(\"URL: %v\", request.URL)\nPrintfln(\"HTTP Version:\
  \ %v\", request.Proto)\nPrintfln(\"Host: %v\", request.Host)\nfor name, val := range\
  \  request.Header {\nPrintfln(\"Header: %v, Value: %v\", name, val)\n}\nPrintfln(\"\
  ---\")\nio.WriteString(writer, sh.message)\n}\nfunc main() {\nerr := http.ListenAndServe(\"\
  :5000\", StringHandler{ message: \"Hello, World\"})\nif (err != nil) {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\n代码清单 24-7\n在 httpserver 文件夹的 main.go 文件中编写请求字段\n\
  ```\n\n编译并执行项目，然后请求 `http://localhost:5000`。你会在浏览器窗口中看到与前一个示例相同的响应，但这次命令提示符下也会有输出。具体输出取决于你的浏览器，以下是使用\
  \ Google Chrome 时收到的输出：\n\n```\nMethod: GET\nURL: /\nHTTP Version: HTTP/1.1\nHost:\
  \ localhost:5000\nHeader: Upgrade-Insecure-Requests, Value: [1]\nHeader: Sec-Fetch-Site,\
  \ Value: [none]\nHeader: Sec-Fetch-Mode, Value: [navigate]\nHeader: Sec-Fetch-User,\
  \ Value: [?1]\nHeader: Accept-Encoding, Value: [gzip, deflate, br]\nHeader: Connection,\
  \ Value: [keep-alive]\nHeader: Cache-Control, Value: [max-age=0]\nHeader: User-Agent,\
  \ Value: [Mozilla/5.0 (Windows NT 10.0; Win64; x64)\nAppleWebKit/537.36 (KHTML,\
  \ like Gecko) Chrome/91.0.4472.124 Safari/537.36]\nHeader: Accept, Value: [text/html,application/xhtml+xml,application/xml;q=0.9,\n\
  image/avif,image/webp,image/apng,*/*;q=0.8,application/signedexchange;\nv=b3;q=0.9]\n\
  Header: Sec-Fetch-Dest, Value: [document]\nHeader: Sec-Ch-Ua, Value: [\" Not;A Brand\"\
  ;v=\"99\", \"Google Chrome\";v=\"91\",\n\"Chromium\";v=\"91\"]\nHeader: Accept-Language,\
  \ Value: [en-GB,en-US;q=0.9,en;q=0.8]\nHeader: Sec-Ch-Ua-Mobile, Value: [?0]\n\n\
  Method: GET\nURL: /favicon.ico\nHTTP Version: HTTP/1.1\nHost: localhost:5000\nHeader:\
  \ Sec-Fetch-Site, Value: [same-origin]\nHeader: Sec-Fetch-Dest, Value: [image]\n\
  Header: Referer, Value: [http://localhost:5000/]\nHeader: Pragma, Value: [no-cache]\n\
  Header: Cache-Control, Value: [no-cache]\nHeader: User-Agent, Value: [Mozilla/5.0\
  \ (Windows NT 10.0; Win64; x64)\nAppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124\
  \ Safari/537.36]\nHeader: Accept-Language, Value: [en-GB,en-US;q=0.9,en;q=0.8]\n\
  Header: Sec-Ch-Ua, Value: [\" Not;A Brand\";v=\"99\", \"Google Chrome\";v=\"91\"\
  ,\n\"Chromium\";v=\"91\"]\nHeader: Sec-Ch-Ua-Mobile, Value: [?0]\nHeader: Sec-Fetch-Mode,\
  \ Value: [no-cors]\nHeader: Accept-Encoding, Value: [gzip, deflate, br]\nHeader:\
  \ Connection, Value: [keep-alive]\nHeader: Accept, Value:[image/avif,image/webp,image/apng,image/svg+xml,\n\
  image/*,*/*;q=0.8]\n\n```\n\n浏览器发出了两个 HTTP 请求。第一个是对 `/` 的请求，即请求 URL 的路径部分。第二个请求是对\
  \ `/favicon.ico` 的请求，浏览器发送该请求是为了获取一个图标，以显示在窗口或选项卡顶部。\n\n**使用请求上下文**\n\n`net/http`\
  \ 包为 `Request` 结构体定义了一个 `Context` 方法，该方法返回一个 `context.Context` 接口的实现。`Context` 接口用于管理请求在应用程序中的流程，这将在第\
  \ 30 章中描述。在第 3 部分中，我将在自定义 Web 平台和在线商店中使用 `Context` 功能。\n\n\n\n### 过滤请求和生成响应\n\n\
  HTTP 服务器对所有请求都以相同方式响应，这并不理想。为了生成不同的响应，需要检查 URL 以确定请求的内容，并使用`net/http`包提供的函数发送适当的响应。`URL`结构体定义的最有用的字段和方法如表\
  \ 24-6 所述。\n\n**表 24-6** URL 结构体定义的有用字段和方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Scheme`\
  \ | 该字段返回 URL 的 scheme 组件。 |\n| `Host` | 该字段返回 URL 的 host 组件，可能包含端口。 |\n| `RawQuery`\
  \ | 该字段返回 URL 的查询字符串。使用`Query`方法将查询字符串处理成 map。 |\n| `Path` | 该字段返回 URL 的 path 组件。\
  \ |\n| `Fragment` | 该字段返回 URL 的 fragment 组件，不包含`#`字符。 |\n| `Hostname()` | 该方法返回\
  \ URL 的主机名组件（`string`类型）。 |\n| `Port()` | 该方法返回 URL 的端口组件（`string`类型）。 |\n| `Query()`\
  \ | 该方法返回一个`map[string][]string`（键为`string`，值为`string`切片的 map），包含查询字符串字段。 |\n| `User()`\
  \ | 该方法返回与请求关联的用户信息，如第 30 章所述。 |\n| `String()` | 该方法返回 URL 的`string`表示。 |\n\n`ResponseWriter`接口定义了创建响应时可用的方法。如前所述，该接口包含`Write`方法，因此可以用作`Writer`，但`ResponseWriter`还定义了表\
  \ 24-7 中描述的方法。注意，必须在调用`Write`方法之前完成设置响应头。\n\n**表 24-7** ResponseWriter 方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Header()` | 该方法返回一个`Header`（`map[string][]string`的别名），用于设置响应头。\
  \ |\n| `WriteHeader(code)` | 该方法设置响应的状态码，指定为`int`类型。`net/http`包为大多数状态码定义了常量。 |\n\
  | `Write(data)` | 该方法将数据写入响应体，并实现了`Writer`接口。 |\n\n在清单 24-8 中，更新了请求处理函数，以对图标文件的请求返回\
  \ 404 Not Found 响应。\n\n```\npackage main\nimport (\n\"net/http\"\n\"io\"\n)\ntype\
  \ StringHandler struct {\nmessage string\n}\nfunc (sh StringHandler) ServeHTTP(writer\
  \ http.ResponseWriter,\nrequest *http.Request) {\nif (request.URL.Path == \"/favicon.ico\"\
  ) {\nPrintfln(\"Request for icon detected - returning 404\")\nwriter.WriteHeader(http.StatusNotFound)\n\
  return\n}\nPrintfln(\"Request for %v\", request.URL.Path)\nio.WriteString(writer,\
  \ sh.message)\n}\nfunc main() {\nerr := http.ListenAndServe(\":5000\", StringHandler{\
  \ message: \"Hello, World\"})\nif (err != nil) {\nPrintfln(\"Error: %v\", err.Error())\n\
  }\n}\n```\n**清单 24-8** 在 httpserver 文件夹的 main.go 文件中生成不同响应\n\n请求处理函数检查`URL.Path`字段以检测图标请求，并通过使用`WriteHeader`方法设置状态码（使用`StatusNotFound`常量，尽管也可以直接指定整数`404`）来响应。编译并执行项目，使用浏览器请求`http://localhost:5000`。浏览器将收到图\
  \ 24-1 所示的响应，并且在命令提示符下会看到 Go 应用程序的以下输出：\n\n```\nRequest for /\nRequest for icon\
  \ detected - returning 404\n```\n\n可能会发现，浏览器后续对`http://localhost:5000`的请求不会再次触发对图标文件的请求。这是因为浏览器记录了\
  \ 404 响应，并知道该 URL 没有图标文件。清除浏览器缓存，然后重新请求`http://localhost:5000`即可恢复原始行为。\n\n## 使用响应便利函数\n\
  \n`net/http`包提供了一组便利函数，可用于创建对 HTTP 请求的常见响应，如表 24-8 所述。\n\n**表 24-8** 响应便利函数\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `Error(writer, message, code)` | 该函数将响应头设置为指定状态码，将`Content-Type`头设置为`text/plain`，并将错误消息写入响应体。同时设置`X-Content-Type-Options`头，以防止浏览器将响应解释为文本以外的内容。\
  \ |\n| `NotFound(writer, request)` | 该函数调用`Error`函数，并指定 404 错误码。 |\n| `Redirect(writer,\
  \ request, url, code)` | 该函数向指定的 URL 发送重定向响应，并带有指定的状态码。 |\n| `ServeFile(writer,\
  \ request, fileName)` | 该函数发送包含指定文件内容的响应。`Content-Type`头基于文件名设置，但可以在调用函数前显式设置该头来覆盖。请参阅“创建静态\
  \ HTTP 服务器”部分中的文件服务示例。 |\n\n在清单 24-9 中，使用`NotFound`函数实现了一个简单的 URL 处理方案。\n\n```\n\
  package main\nimport (\n\"net/http\"\n\"io\"\n)\ntype StringHandler struct {\nmessage\
  \ string\n}\nfunc (sh StringHandler) ServeHTTP(writer http.ResponseWriter,\nrequest\
  \ *http.Request) {\nPrintfln(\"Request for %v\", request.URL.Path)\nswitch request.URL.Path\
  \ {\ncase \"/favicon.ico\":\nhttp.NotFound(writer, request)\ncase \"/message\":\n\
  io.WriteString(writer, sh.message)\ndefault:\nhttp.Redirect(writer, request, \"\
  /message\", http.StatusTemporaryRedirect)\n}\n}\nfunc main() {\nerr := http.ListenAndServe(\"\
  :5000\", StringHandler{ message: \"Hello, World\"})\nif (err != nil) {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\n```\n**清单 24-9** 在 httpserver 文件夹的 main.go 文件中使用便利函数\n\
  \n清单 24-9 使用`switch`语句来决定如何响应请求。编译并执行项目，使用浏览器请求`http://localhost:5000/message`，将产生之前图\
  \ 24-1 所示的响应。如果浏览器请求图标文件，服务器将返回 404 响应。对于所有其他请求，浏览器将被重定向到`/message`。\n\n\n\n###\
  \ 使用便捷的路由处理器\n\n检查 URL 并选择响应的过程可能会产生难以阅读和维护的复杂代码。为简化这一过程，`net/http` 包提供了一个`Handler`实现，允许将\
  \ URL 匹配与请求处理分离，如代码清单 24-10 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"\
  io\"\n)\ntype StringHandler struct {\nmessage string\n}\nfunc (sh StringHandler)\
  \ ServeHTTP(writer http.ResponseWriter,\nrequest *http.Request) {\nPrintfln(\"Request\
  \ for %v\", request.URL.Path)\nio.WriteString(writer, sh.message)\n}\nfunc main()\
  \ {\nhttp.Handle(\"/message\", StringHandler{ \"Hello, World\"})\nhttp.Handle(\"\
  /favicon.ico\", http.NotFoundHandler())\nhttp.Handle(\"/\", http.RedirectHandler(\"\
  /message\", http.StatusTemporaryRedirect))\nerr := http.ListenAndServe(\":5000\"\
  , nil)\nif (err != nil) {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n```\n\n实现这一功能的关键是向`ListenAndServe`函数传入`nil`参数，如下所示：\n\
  \n```\n...\nerr := http.ListenAndServe(\":5000\", nil)\n...\n```\n\n这会启用默认的处理器，该处理器会根据表\
  \ 24-9 中描述的函数设置的规则，将请求路由到对应的处理器。\n\n**表 24-9** 用于创建路由规则的 `net/http` 函数\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `Handle(pattern, handler)` | 此函数创建一个规则，当请求匹配该模式时，调用指定`Handler`的`ServeHTTP`方法。\
  \ |\n| `HandleFunc(pattern, handlerFunc)` | 此函数创建一个规则，当请求匹配该模式时，调用指定的函数。该函数接收`ResponseWriter`和`Request`参数。\
  \ |\n\n为帮助设置路由规则，`net/http` 包提供了表 24-10 中描述的函数，这些函数用于创建`Handler`实现，其中一些函数包装了表 24-7\
  \ 中描述的响应函数。\n\n**表 24-10** 用于创建请求处理器的 `net/http` 函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `FileServer(root)` | 此函数创建一个`Handler`，使用`ServeFile`函数生成响应。有关提供文件的示例，请参见“创建静态\
  \ HTTP 服务器”一节。 |\n| `NotFoundHandler()` | 此函数创建一个`Handler`，使用`NotFound`函数生成响应。 |\n\
  | `RedirectHandler(url, code)` | 此函数创建一个`Handler`，使用`Redirect`函数生成响应。 |\n| `StripPrefix(prefix,\
  \ handler)` | 此函数创建一个`Handler`，从请求 URL 中移除指定的前缀，并将请求传递给指定的`Handler`。详情请参见“创建静态 HTTP\
  \ 服务器”一节。 |\n| `TimeoutHandler(handler, duration, message)` | 此函数将请求传递给指定的`Handler`，但如果响应未在指定时间内生成，则会生成错误响应。\
  \ |\n\n用于匹配请求的模式可以表示为路径（例如`/favicon.ico`），也可以表示为树（带有尾随斜杠，例如`/files/`）。匹配时优先选择最长的模式，根路径（`\"\
  /\"`）匹配任何请求，并作为后备路由。\n\n在代码清单 24-10 中，我使用`Handle`函数设置了三个路由：\n\n```\n...\nhttp.Handle(\"\
  /message\", StringHandler{ \"Hello, World\"})\nhttp.Handle(\"/favicon.ico\", http.NotFoundHandler())\n\
  http.Handle(\"/\", http.RedirectHandler(\"/message\", http.StatusTemporaryRedirect))\n\
  ...\n```\n\n这样做的效果是：对`/message`的请求被路由到`StringHandler`，对`/favicon.ico`的请求会得到`404\
  \ Not Found`响应，而所有其他请求都会被重定向到`/message`。这与上一节中的配置相同，但 URL 与请求处理器之间的映射与生成响应的代码是分离的。\n\
  \n### 支持 HTTPS 请求\n\n`net/http` 包内置了对 HTTPS 的支持。要准备使用 HTTPS，你需要在`httpserver`文件夹中添加两个文件：一个证书文件和一个私钥文件。\n\
  \n**获取 HTTPS 证书**\n\n开始使用 HTTPS 的一个好方法是使用自签名证书，它可用于开发和测试。如果你还没有自签名证书，你可以使用诸如 [`getacert.com`](https://getacert.com)\
  \ 或 [`www.selfsignedcertificate.com`](https://www.selfsignedcertificate.com) 之类的网站在线创建一个，这两个网站都可以让你轻松免费地创建自签名证书。\n\
  \n无论你的证书是否是自签名的，使用 HTTPS 都需要两个文件。第一个是证书文件，通常具有`.cer`或`.cert`文件扩展名。第二个是私钥文件，通常具有`.key`文件扩展名。\n\
  \n当你准备好部署应用程序时，可以使用真实的证书。我推荐 [`letsencrypt.org`](https://letsencrypt.org)，它提供免费证书并且（相对）易于使用。我无法帮助读者获取和使用证书，因为这需要控制颁发证书的域名以及访问私钥，而私钥应保密。如果你在跟随示例时遇到问题，我建议使用自签名证书。\n\
  \n`ListenAndServeTLS` 函数用于启用 HTTPS，其额外参数指定了证书和私钥文件。在我的项目中，它们分别被命名为`certificate.cer`和`certificate.key`，如代码清单\
  \ 24-11 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"io\"\n)\ntype StringHandler\
  \ struct {\nmessage string\n}\nfunc (sh StringHandler) ServeHTTP(writer http.ResponseWriter,\n\
  request *http.Request) {\nPrintfln(\"Request for %v\", request.URL.Path)\nio.WriteString(writer,\
  \ sh.message)\n}\nfunc main() {\nhttp.Handle(\"/message\", StringHandler{ \"Hello,\
  \ World\"})\nhttp.Handle(\"/favicon.ico\", http.NotFoundHandler())\nhttp.Handle(\"\
  /\", http.RedirectHandler(\"/message\", http.StatusTemporaryRedirect))\ngo func\
  \ () {\nerr := http.ListenAndServeTLS(\":5500\", \"certificate.cer\",\n\"certificate.key\"\
  , nil)\nif (err != nil) {\nPrintfln(\"HTTPS Error: %v\", err.Error())\n}\n}()\n\
  err := http.ListenAndServe(\":5000\", nil)\nif (err != nil) {\nPrintfln(\"Error:\
  \ %v\", err.Error())\n}\n}\n```\n\n`ListenAndServeTLS` 和 `ListenAndServe` 函数会阻塞，因此我使用了一个\
  \ goroutine 来同时支持 HTTP 和 HTTPS 请求，其中 HTTP 在端口 `5000` 上处理，HTTPS 在端口 `5500` 上处理。\n\
  \n`ListenAndServeTLS` 和 `ListenAndServe` 函数在调用时都传入了 `nil` 作为处理器，这意味着 HTTP 和 HTTPS\
  \ 请求将使用相同的路由集进行处理。编译并执行该项目，然后使用浏览器请求 `http://localhost:5000` 和 `https://localhost:5500`。请求将以相同的方式处理，如图\
  \ 24-2 所示。如果你使用的是自签名证书，浏览器会警告你证书无效，你需要接受安全风险后，浏览器才会显示内容。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig2_HTML.jpg](img/512642_1_En_24_Fig2_HTML.jpg)\n\
  \n**图 24-2** 支持 HTTPS 请求\n\n\n\n#### 将 HTTP 请求重定向到 HTTPS\n\n创建 Web 服务器时，一个常见需求是将\
  \ HTTP 请求重定向到 HTTPS 端口。这可以通过创建一个自定义处理器来实现，如清单 24-12 所示。\n\n```\npackage main\nimport\
  \ (\n\"net/http\"\n\"io\"\n\"strings\"\n)\ntype StringHandler struct {\nmessage\
  \ string\n}\nfunc (sh StringHandler) ServeHTTP(writer http.ResponseWriter,\nrequest\
  \ *http.Request) {\nPrintfln(\"请求 %v\", request.URL.Path)\nio.WriteString(writer,\
  \ sh.message)\n}\nfunc HTTPSRedirect(writer http.ResponseWriter,\nrequest *http.Request)\
  \ {\nhost := strings.Split(request.Host, \":\")[0]\ntarget := \"https://\" + host\
  \ + \":5500\" + request.URL.Path\nif len(request.URL.RawQuery) > 0 {\ntarget +=\
  \ \"?\" + request.URL.RawQuery\n}\nhttp.Redirect(writer, request, target, http.StatusTemporaryRedirect)\n\
  }\nfunc main() {\nhttp.Handle(\"/message\", StringHandler{ \"Hello, World\"})\n\
  http.Handle(\"/favicon.ico\", http.NotFoundHandler())\nhttp.Handle(\"/\", http.RedirectHandler(\"\
  /message\", http.StatusTemporaryRedirect))\ngo func () {\nerr := http.ListenAndServeTLS(\"\
  :5500\", \"certificate.cer\",\n\"certificate.key\", nil)\nif (err != nil) {\nPrintfln(\"\
  HTTPS 错误: %v\", err.Error())\n}\n}()\nerr := http.ListenAndServe(\":5000\", http.HandlerFunc(HTTPSRedirect))\n\
  if (err != nil) {\nPrintfln(\"错误: %v\", err.Error())\n}\n}\n清单 24-12\n将 httpserver\
  \ 文件夹中的 main.go 文件重定向到 HTTPS\n```\n\n清单 24-12 中用于 HTTP 的处理器将客户端重定向到 HTTPS URL。编译并执行项目，请求\
  \ `http://localhost:5000`。响应会将浏览器重定向到 HTTPS 服务，产生如图 24-3 所示的输出。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig3_HTML.jpg](img/512642_1_En_24_Fig3_HTML.jpg)\n\
  \n图 24-3\n\n使用 HTTPS\n\n## 创建静态 HTTP 服务器\n\n`net/http` 包内置了使用文件内容响应请求的支持。为了准备静态\
  \ HTTP 服务器，创建 `httpserver/static` 文件夹，并向其中添加一个名为 `index.html` 的文件，内容如清单 24-13 所示。\n\
  \n注意\n\n本章中 HTML 文件和模板中的 `class` 属性都应用了由 Bootstrap CSS 包定义的样式，该包将在清单 24-15 中被添加到项目中。有关每个类的作用以及\
  \ Bootstrap 包提供的其他功能，请参见 [`https://getbootstrap.com`](https://getbootstrap.com)。\n\
  \n```\n\nPro Go\n\nHello, World\n\n清单 24-13\nstatic 文件夹中 index.html 文件的内容\n```\n\
  \n接下来，在 `httpserver/static` 文件夹中添加一个名为 `store.html` 的文件，内容如清单 24-14 所示。\n\n```\n\
  \nPro Go\n\nProducts\n\nNameCategoryPrice\n\nKayakWatersports$279.00\nLifejacketWatersports$49.95\n\
  \n清单 24-14\nstatic 文件夹中 store.html 文件的内容\n```\n\nHTML 文件依赖 Bootstrap CSS 包来设计 HTML\
  \ 内容的样式。在 `httpserver` 文件夹中运行清单 24-15 所示的命令，将 Bootstrap CSS 文件下载到 `static` 文件夹中。（你可能需要安装\
  \ `curl` 命令。）\n\n```\ncurl https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css\
  \ --output static/bootstrap.min.css\n清单 24-15\n下载 CSS 文件\n```\n\n如果您使用的是 Windows，可以使用清单\
  \ 24-16 中所示的 PowerShell 命令下载 CSS 文件。\n\n```\nInvoke-WebRequest -OutFile static/bootstrap.min.css\
  \ -Uri https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css\n\
  清单 24-16\n下载 CSS 文件（Windows）\n```\n\n### 创建静态文件路由\n\n现在有了可用的 HTML 和 CSS 文件，是时候定义路由，使它们可以通过\
  \ HTTP 请求访问，如清单 24-17 所示。\n\n```\n...\nfunc main() {\nhttp.Handle(\"/message\",\
  \ StringHandler{ \"Hello, World\"})\nhttp.Handle(\"/favicon.ico\", http.NotFoundHandler())\n\
  http.Handle(\"/\", http.RedirectHandler(\"/message\", http.StatusTemporaryRedirect))\n\
  fsHandler := http.FileServer(http.Dir(\"./static\"))\nhttp.Handle(\"/files/\", http.StripPrefix(\"\
  /files\", fsHandler))\ngo func () {\nerr := http.ListenAndServeTLS(\":5500\", \"\
  certificate.cer\",\n\"certificate.key\", nil)\nif (err != nil) {\nPrintfln(\"HTTPS\
  \ 错误: %v\", err.Error())\n}\n}()\nerr := http.ListenAndServe(\":5000\", http.HandlerFunc(HTTPSRedirect))\n\
  if (err != nil) {\nPrintfln(\"错误: %v\", err.Error())\n}\n}\n...\n清单 24-17\n在 httpserver\
  \ 文件夹中的 main.go 文件中定义路由\n```\n\n`FileServer` 函数创建一个提供文件服务的处理器，通过 `Dir` 函数指定目录。（也可以直接提供文件服务，但需要谨慎，因为很容易让请求选择目标文件夹之外的文件。最安全的选择是像本例中这样使用\
  \ `Dir` 函数。）\n\n我将提供 `static` 文件夹中的内容，URL 路径以 `files` 开头，这样对 `/files/store.html`\
  \ 的请求将由 `static/store.html` 文件处理。为此，我使用了 `StripPrefix` 函数，它创建一个处理器，移除路径前缀并将请求传递给另一个处理器来处理。如我在清单\
  \ 24-17 中所做的那样，将这些处理器组合起来，意味着我可以安全地使用 `files` 前缀暴露 `static` 文件夹的内容。\n\n请注意，我指定了带有尾部斜杠的路由，如下所示：\n\
  \n```\n...\nhttp.Handle(\"/files/\", http.StripPrefix(\"/files\", fsHandler))\n\
  ...\n```\n\n如前所述，内置路由器支持路径和树，为目录进行路由需要一个树，通过尾部斜杠指定。编译并执行项目，使用浏览器请求 `https://localhost:5500/files/store.html`，你将收到如图\
  \ 24-4 所示的响应。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig4_HTML.jpg](img/512642_1_En_24_Fig4_HTML.jpg)\n\
  \n图 24-4\n\n提供静态内容服务\n\n提供文件服务支持一些有用的功能。首先，响应的 `Content-Type` 标头会根据文件扩展名自动设置。其次，未指定文件的请求会通过\
  \ `index.html` 来处理，这一点可以通过请求 `https://localhost:5500/files` 看到，产生的响应如图 24-5 所示。最后，如果请求指定了一个文件，但该文件不存在，则会自动发送\
  \ 404 响应，这也如图 24-5 所示。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig5_HTML.jpg](img/512642_1_En_24_Fig5_HTML.jpg)\n\
  \n图 24-5\n\n回退响应\n\n\n\n## 使用模板生成响应\n\nHTTP 请求并没有对使用模板作为响应提供内置支持，但设置一个处理器来利用 `html/template`\
  \ 包提供的功能（我在第 23 章中已描述）是一个简单的过程。首先，创建 `httpserver/templates` 文件夹，并向其中添加一个名为 `products.html`\
  \ 的文件，其内容如清单 24-18 所示。\n\n```\n\nPro Go\n\nProducts\n\nIndexNameCategory\nPrice\n\
  \n{{ range $index, $product := .Data }}\n\n{{ $index }}\n{{ $product.Name }}\n{{\
  \ $product.Category }}\n\n{{ printf \"$%.2f\" $product.Price }}\n\n{{ end }}\n\n\
  清单 24-18\ntemplates 文件夹中 products.html 文件的内容\n```\n\n接下来，向 `httpserver` 文件夹添加一个名为\
  \ `dynamic.go` 的文件，其内容如清单 24-19 所示。\n\n```\npackage main\nimport (\n\"html/template\"\
  \n\"net/http\"\n\"strconv\"\n)\ntype Context struct {\nRequest *http.Request\nData\
  \ []Product\n}\nvar htmlTemplates *template.Template\nfunc HandleTemplateRequest(writer\
  \ http.ResponseWriter, request *http.Request) {\npath := request.URL.Path\nif (path\
  \ == \"\") {\npath = \"products.html\"\n}\nt := htmlTemplates.Lookup(path)\nif (t\
  \ == nil) {\nhttp.NotFound(writer, request)\n} else {\nerr := t.Execute(writer,\
  \ Context{  request, Products})\nif (err != nil) {\nhttp.Error(writer, err.Error(),\
  \ http.StatusInternalServerError)\n}\n}\n}\nfunc init() {\nvar err error\nhtmlTemplates\
  \ = template.New(\"all\")\nhtmlTemplates.Funcs(map[string]interface{} {\n\"intVal\"\
  : strconv.Atoi,\n})\nhtmlTemplates, err = htmlTemplates.ParseGlob(\"templates/*.html\"\
  )\nif (err == nil) {\nhttp.Handle(\"/templates/\", http.StripPrefix(\"/templates/\"\
  ,\nhttp.HandlerFunc(HandleTemplateRequest)))\n} else {\npanic(err)\n}\n}\n清单 24-19\n\
  httpserver 文件夹中 dynamic.go 文件的内容\n```\n\n初始化函数会加载 `templates` 文件夹中所有扩展名为 `html`\
  \ 的模板，并设置路由，以便以 `/templates/` 开头的请求由 `HandleTemplateRequest` 函数处理。此函数查找模板，如果未指定文件路径则回退到\
  \ `products.html` 文件，执行模板，并写入响应。编译并执行项目，使用浏览器请求 `https://localhost:5500/templates`，将产生如图\
  \ 24-6 所示的响应。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig6_HTML.jpg](img/512642_1_En_24_Fig6_HTML.jpg)\n\
  \n图 24-6\n\n使用 HTML 模板生成响应\n\n注意\n\n我这里展示的方法有一个局限性，即传递给模板的数据是硬编码在 `HandleTemplateRequest`\
  \ 函数中的。我将在第 3 部分演示一种更灵活的方法。\n\n## 理解内容类型嗅探\n\n请注意，在使用模板生成响应时，我无需设置 `Content-Type`\
  \ 标头。在提供文件服务时，`Content-Type` 标头是根据文件扩展名设置的，但在此情况下无法这样做，因为我是直接将内容写入 `ResponseWriter`。\n\
  \n当响应没有 `Content-Type` 标头时，写入 `ResponseWriter` 的前 512 字节内容会被传递给 `DetectContentType`\
  \ 函数，该函数实现了 [`https://mimesniff.spec.whatwg.org`](https://mimesniff.spec.whatwg.org)\
  \ 定义的 MIME 嗅探算法。嗅探过程无法检测所有内容类型，但对于标准 Web 类型（如 HTML、CSS 和 JavaScript）表现良好。`DetectContentType`\
  \ 函数返回一个 MIME 类型，用作 `Content-Type` 标头的值。在此示例中，嗅探算法检测到内容是 HTML，并将标头设置为 `text/html`。通过显式设置\
  \ `Content-Type` 标头，可以禁用内容嗅探过程。\n\n## 使用 JSON 数据响应\n\nJSON 响应广泛用于 Web 服务，这些服务为不希望接收\
  \ HTML 的客户端（例如 Angular 或 React JavaScript 客户端）提供对应用程序数据的访问。我将在第 3 部分创建一个更复杂的 Web\
  \ 服务，但对于本章而言，只需理解用于提供静态和动态 HTML 内容的相同功能也可以用来生成 JSON 响应就足够了。向 `httpserver` 文件夹添加一个名为\
  \ `json.go` 的文件，其内容如清单 24-20 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"\
  encoding/json\"\n)\nfunc HandleJsonRequest(writer http.ResponseWriter, request *http.Request)\
  \ {\nwriter.Header().Set(\"Content-Type\", \"application/json\")\njson.NewEncoder(writer).Encode(Products)\n\
  }\nfunc init() {\nhttp.HandleFunc(\"/json\", HandleJsonRequest)\n}\n清单 24-20\nhttpserver\
  \ 文件夹中 json.go 文件的内容\n```\n\n初始化函数创建了一条路由，这意味着对 `/json` 的请求将由 `HandleJsonRequest`\
  \ 函数处理。此函数使用第 21 章中描述的 JSON 功能对清单 24-3 中创建的 `Product` 值切片进行编码。请注意，我在清单 24-20 中显式设置了\
  \ `Content-Type` 标头：\n\n```go\n...\nwriter.Header().Set(\"Content-Type\", \"application/json\"\
  )\n...\n```\n\n本章前面描述的嗅探功能无法可靠地识别 JSON 内容，并会导致响应具有 `text/plain` 内容类型。许多 Web 服务客户端会忽略\
  \ `Content-Type` 标头而将响应视为 JSON，但依赖此行为并非好主意。编译并执行项目，使用浏览器请求 `https://localhost:5500/json`。浏览器将显示以下\
  \ JSON 内容：\n\n```json\n[{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\"\
  :279},\n{\"Name\":\"Lifejacket\",\"Category\":\"Watersports\",\"Price\":49.95},\n\
  {\"Name\":\"Soccer Ball\",\"Category\":\"Soccer\",\"Price\":19.5},\n{\"Name\":\"\
  Corner Flags\",\"Category\":\"Soccer\",\"Price\":34.95},\n{\"Name\":\"Stadium\"\
  ,\"Category\":\"Soccer\",\"Price\":79500},\n{\"Name\":\"Thinking Cap\",\"Category\"\
  :\"Chess\",\"Price\":16},\n{\"Name\":\"Unsteady Chair\",\"Category\":\"Chess\",\"\
  Price\":75},\n{\"Name\":\"Bling-Bling King\",\"Category\":\"Chess\",\"Price\":1200}]\n\
  ```\n\n## 处理表单数据\n\n`net/http` 包提供了轻松接收和处理表单数据的支持。向 `templates` 文件夹添加一个名为 `edit.html`\
  \ 的文件，其内容如清单 24-21 所示。\n\n```\n\nPro Go\n\n{{ $index := intVal (index (index .Request.URL.Query\
  \ \"index\") 0) }}\n{{ if lt $index (len .Data)}}\n{{ with index .Data $index}}\n\
  Product\n\nIndex\n\nName\n\nCategory\n\nPrice\n\nSave\nCancel\n\n{{ end }}\n{{ else\
  \ }}\n\nNo Product At Specified Index\n\n{{end }}\n\n清单 24-21\ntemplates 文件夹中 edit.html\
  \ 文件的内容\n```\n\n此模板利用模板变量、表达式和函数从请求中获取查询字符串，并选择第一个 `index` 值，将其转换为 `int` 并用于从提供给模板的数据中检索\
  \ `Product` 值：\n\n```go\n...\n{{ $index := intVal (index (index .Request.URL.Query\
  \ \"index\") 0) }}\n{{ if lt $index (len .Data)}}\n{{ with index .Data $index}}\n\
  ...\n```\n\n这些表达式比我通常希望在模板中看到的更复杂，我将在第 3 部分向您展示一种我认为更健壮的方法。然而，对于本章而言，这使我能够生成一个 HTML\
  \ 表单，为 `Product` 结构体定义的字段呈现 `input` 元素，该表单将其数据提交到由 `action` 属性指定的 URL，如下所示：\n\n\
  ```html\n...\n<form action=\"/templates/edit\" method=\"post\">\n...\n```\n\n\n\n\
  ### 从请求中读取表单数据\n\n现在我已经在项目中添加了`form`，可以编写接收其中数据的代码了。`Request`结构体定义了表 24-11 中描述的用于处理表单数据的字段和方法。\n\
  \n**表 24-11** `Request`表单数据字段和方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Form` | 该字段返回一个`map[string][]string`，其中包含已解析的表单数据和查询字符串参数。在读取此字段之前，必须先调用`ParseForm`方法。\
  \ |\n| `PostForm` | 此字段与`Form`类似，但排除了查询字符串参数，因此映射中仅包含来自请求体的数据。在读取此字段之前，必须先调用`ParseForm`方法。\
  \ |\n| `MultipartForm` | 该字段返回一个多部分表单，使用`mime/multipart`包中定义的`Form`结构体表示。在读取此字段之前，必须先调用`ParseMultipartForm`方法。\
  \ |\n| `FormValue(key)` | 此方法返回指定表单键的第一个值，如果没有值则返回空字符串。此方法的数据源来自`Form`字段，调用`FormValue`方法会自动调用`ParseForm`或`ParseMultipartForm`来解析表单。\
  \ |\n| `PostFormValue(key)` | 此方法返回指定表单键的第一个值，如果没有值则返回空字符串。此方法的数据源来自`PostForm`字段，调用`PostFormValue`方法会自动调用`ParseForm`或`ParseMultipartForm`来解析表单。\
  \ |\n| `FormFile(key)` | 此方法提供对表单中具有指定键的第一个文件的访问。返回结果是一个`File`、一个`FileHeader`（两者均在`mime/multipart`包中定义）以及一个`error`。调用此函数会触发`ParseForm`或`ParseMultipartForm`函数来解析表单。\
  \ |\n| `ParseForm()` | 此方法解析表单并填充`Form`和`PostForm`字段。返回结果是一个描述解析问题的错误。 |\n| `ParseMultipartForm(max)`\
  \ | 此方法解析 MIME 多部分表单并填充`MultipartForm`字段。参数指定分配给表单数据的最大字节数，返回结果是一个`error`，描述处理表单时出现的任何问题。\
  \ |\n\n如果你了解正在处理的表单结构，`FormValue`和`PostFormValue`方法是访问表单数据最便捷的方式。在`httpserver`文件夹中添加一个名为`forms.go`的文件，内容如代码清单\
  \ 24-22 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"strconv\"\n)\nfunc ProcessFormData(writer\
  \ http.ResponseWriter, request *http.Request) {\nif (request.Method == http.MethodPost)\
  \ {\nindex, _ := strconv.Atoi(request.PostFormValue(\"index\"))\np := Product {}\n\
  p.Name = request.PostFormValue(\"name\")\np.Category = request.PostFormValue(\"\
  category\")\np.Price, _ = strconv.ParseFloat(request.PostFormValue(\"price\"), 64)\n\
  Products[index] = p\n}\nhttp.Redirect(writer, request, \"/templates\", http.StatusTemporaryRedirect)\n\
  }\nfunc init() {\nhttp.HandleFunc(\"/forms/edit\", ProcessFormData)\n}\n```\n\n\
  **代码清单 24-22** `httpserver`文件夹中`forms.go`文件的内容\n\n`init`函数设置了一个新路由，使得`ProcessFormData`函数处理路径为`/forms/edit`的请求。在`ProcessFormData`函数内部，会检查请求方法，并使用请求中的表单数据来创建`Product`结构体并替换现有数据值。在实际项目中，验证表单提交的数据至关重要，但本章中我假定表单包含有效数据。\n\
  \n编译并执行项目，使用浏览器请求`https://localhost:5500/templates/edit.html?index=2`，这将选中代码清单 24-3\
  \ 中切片里索引为 2 的`Product`值。将`Category`字段的值更改为`Soccer/Football`，然后点击“Save”按钮。表单中的数据将被应用，浏览器会重定向，如图\
  \ 24-7 所示。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig7_HTML.jpg](img/512642_1_En_24_Fig7_HTML.jpg)\n\
  \n**图 24-7** 处理表单数据\n\n\n\n### 读取多部分表单\n\n编码为 `multipart/form-data` 的表单允许将二进制数据（如文件）安全地发送到服务器。要创建一个允许服务器接收文件的表单，请在\
  \ `static` 文件夹中创建一个名为 `upload.html` 的文件，其内容如代码清单 24-23 所示。\n\n```\nPro Go\n\nUpload\
  \ File\n\nName\n\nCity\n\nChoose Files\n\nUpload\n\n代码清单 24-23\nstatic 文件夹中 upload.html\
  \ 文件的内容\n```\n\n`form` 元素上的 `enctype` 属性创建了一个多部分表单，而 `type` 为 `file` 的 `input` 元素则创建了一个允许用户选择文件的表单控件。`multiple`\
  \ 属性告诉浏览器允许用户选择多个文件，稍后我将回过头来介绍这一点。在 `httpserver` 文件夹中添加一个名为 `upload.go` 的文件，其代码如代码清单\
  \ 24-24 所示，用于接收和处理表单数据。\n\n```\npackage main\nimport (\n\"net/http\"\n\"io\"\n\"\
  fmt\"\n)\nfunc HandleMultipartForm(writer http.ResponseWriter, request *http.Request)\
  \ {\nfmt.Fprintf(writer, \"Name: %v, City: %v\\n\", request.FormValue(\"name\"),\n\
  request.FormValue(\"city\"))\nfmt.Fprintln(writer, \"------\")\nfile, header, err\
  \ := request.FormFile(\"files\")\nif (err == nil) {\ndefer file.Close()\nfmt.Fprintf(writer,\
  \ \"Name: %v, Size: %v\\n\", header.Filename, header.Size)\nfor k, v := range header.Header\
  \ {\nfmt.Fprintf(writer, \"Key: %v, Value: %v\\n\", k, v)\n}\nfmt.Fprintln(writer,\
  \ \"------\")\nio.Copy(writer, file)\n} else {\nhttp.Error(writer, err.Error(),\
  \ http.StatusInternalServerError)\n}\n}\nfunc init() {\nhttp.HandleFunc(\"/forms/upload\"\
  , HandleMultipartForm)\n}\n代码清单 24-24\nhttpserver 文件夹中 upload.go 文件的内容\n```\n\n\
  `FormValue` 和 `PostFormValue` 方法可用于访问表单中的字符串值，但必须使用 `FormFile` 方法来访问文件，如下所示：\n\n\
  ```\n...\nfile, header, err := request.FormFile(\"files\")\n...\n```\n\n`FormFile`\
  \ 方法的第一个返回值是一个 `File`，定义在 `mime/multipart` 包中，它是一个接口，组合了第 20 章和第 22 章中描述的 `Reader`、`Closer`、`Seeker`\
  \ 和 `ReaderAt` 接口。其效果是，上传文件的内容可以作为 `Reader` 来处理，并支持从特定位置进行定位或读取。在这个例子中，我将上传文件的内容复制到\
  \ `ResponseWriter`。\n\n`FormFile` 方法的第二个返回值是一个 `FileHeader`，也定义在 `mime/multipart`\
  \ 包中。这个结构体定义了表 24-12 中描述的字段和方法。\n\n**表 24-12** `FileHeader` 字段和方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Name` | 该字段返回一个包含文件名称的 `string`。 |\n| `Size` | 该字段返回一个包含文件大小的\
  \ `int64`。 |\n| `Header` | 该字段返回一个 `map[string][]string`，其中包含包含该文件的 MIME 部分的标头。\
  \ |\n| `Open()` | 该方法返回一个 `File`，可用于读取与标头关联的内容，如下一节所示。|\n\n编译并执行项目，使用浏览器请求 `https://localhost:5500/files/upload.html`。输入你的姓名和城市，点击\
  \ `Choose Files` 按钮，并选择一个文件（我将在下一节解释如何处理多个文件）。你可以选择系统中的任何文件，但为了简单起见，文本文件是最佳选择。点击\
  \ `Upload` 按钮，表单将被提交。响应将包含姓名和城市值，以及文件的标头和内容，如图 24-8 所示。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig8_HTML.jpg](img/512642_1_En_24_Fig8_HTML.jpg)\n\
  \n**图 24-8** 处理包含文件的多部分表单\n\n### 在表单中接收多个文件\n\n`FormFile` 方法只返回指定名称的第一个文件，这意味着当允许用户为单个表单元素选择多个文件（如示例表单所示）时，它不能被使用。\n\
  \n`Request.MultipartForm` 字段提供了对多部分表单中数据的完全访问，如代码清单 24-25 所示。\n\n```\npackage main\n\
  import (\n\"net/http\"\n\"io\"\n\"fmt\"\n)\nfunc HandleMultipartForm(writer http.ResponseWriter,\
  \ request *http.Request) {\nrequest.ParseMultipartForm(10000000)\nfmt.Fprintf(writer,\
  \ \"Name: %v, City: %v\\n\",\nrequest.MultipartForm.Value[\"name\"][0],\nrequest.MultipartForm.Value[\"\
  city\"][0])\nfmt.Fprintln(writer, \"------\")\nfor _, header := range request.MultipartForm.File[\"\
  files\"] {\nfmt.Fprintf(writer, \"Name: %v, Size: %v\\n\", header.Filename, header.Size)\n\
  file, err := header.Open()\nif (err == nil) {\ndefer file.Close()\nfmt.Fprintln(writer,\
  \ \"------\")\nio.Copy(writer, file)\n} else {\nhttp.Error(writer, err.Error(),\
  \ http.StatusInternalServerError)\nreturn\n}\n}\n}\nfunc init() {\nhttp.HandleFunc(\"\
  /forms/upload\", HandleMultipartForm)\n}\n代码清单 24-25\n在 httpserver 文件夹的 upload.go\
  \ 文件中处理多个文件\n```\n\n你必须在访问 `MultipartForm` 字段之前确保调用了 `ParseMultipartForm` 方法。`MultipartForm`\
  \ 字段返回一个 `Form` 结构体，定义在 `mime/multipart` 包中，它定义了表 24-13 中描述的字段。\n\n**表 24-13** `Form`\
  \ 字段\n\n| 名称 | 描述 |\n| --- | --- |\n| `Value` | 该字段返回一个包含表单值的 `map[string][]string`。\
  \ |\n| `File` | 该字段返回一个包含文件的 `map[string][]*FileHeader`。 |\n\n在代码清单 24-25 中，我使用\
  \ `Value` 字段从表单中获取 `name` 和 `city` 值。我使用 `File` 字段获取表单中所有名称为 `files` 的文件，这些文件由 `FileHeader`\
  \ 值表示，如 表 24-13 所述。编译并执行项目，使用浏览器请求 `https://localhost:5500/files/upload.html`，并填写表单。这次，点击\
  \ `Choose Files` 按钮时，选择两个或更多文件。提交表单，你将看到所有所选文件的内容，如图 24-9 所示。对于这个例子，文本文件是首选。\n\n\
  ![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig9_HTML.jpg](img/512642_1_En_24_Fig9_HTML.jpg)\n\
  \n**图 24-9** 处理多个文件\n\n\n\n## 读取与设置 Cookie\n\n`net/http` 包定义了 `SetCookie` 函数，用于向发送给客户端的响应中添加\
  \ `Set-Cookie` 标头。为方便查阅，表 24-14 描述了 `SetCookie` 函数。\n\n**表 24-14** `net/http` 中用于设置\
  \ Cookie 的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `SetCookie(writer, cookie)` | 该函数向指定的\
  \ `ResponseWriter` 添加 `Set-Cookie` 标头。Cookie 通过指向 `Cookie` 结构体的指针来描述，该结构体将在下文介绍。\
  \ |\n\nCookie 使用 `Cookie` 结构体来描述，该结构体定义于 `net/http` 包中，并定义了表 24-15 中描述的字段。仅使用 `Name`\
  \ 和 `Value` 字段即可创建一个基础的 Cookie。\n\n**表 24-15** `Cookie` 结构体定义的字段\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Name` | 该字段表示 Cookie 的名称，以 `string` 类型表示。 |\n| `Value` | 该字段表示\
  \ Cookie 的值，以 `string` 类型表示。 |\n| `Path` | 该可选字段指定 Cookie 的路径。 |\n| `Domain` | 该可选字段指定将设置\
  \ Cookie 的主机/域名。 |\n| `Expires` | 该字段指定 Cookie 的过期时间，以 `time.Time` 值表示。 |\n| `MaxAge`\
  \ | 该字段指定 Cookie 过期前的秒数，以 `int` 类型表示。 |\n| `Secure` | 当此 `bool` 字段为 `true` 时，客户端仅会通过\
  \ HTTPS 连接发送 Cookie。 |\n| `HttpOnly` | 当此 `bool` 字段为 `true` 时，客户端将阻止 JavaScript\
  \ 代码访问该 Cookie。 |\n| `SameSite` | 该字段使用 `SameSite` 常量指定 Cookie 的跨源策略，定义了 `SameSiteDefaultMode`、`SameSiteLaxMode`、`SameSiteStrictMode`\
  \ 和 `SameSiteNoneMode`。 |\n\n`Cookie` 结构体也用于获取客户端发送的 Cookie 集合，这可以通过表 24-16 中描述的\
  \ `Request` 方法来实现。\n\n**表 24-16** 用于处理 Cookie 的 `Request` 方法\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `Cookie(name)` | 此方法返回具有指定名称的 `Cookie` 值的指针，以及一个 `error`，用于指示何时没有匹配的\
  \ Cookie。 |\n| `Cookies()` | 此方法返回一个 `Cookie` 指针的切片。 |\n\n在 `httpserver` 文件夹中添加一个名为\
  \ `cookies.go` 的文件，其中包含如代码清单 24-26 所示的代码。\n\n```\npackage main\n\nimport (\n   \
  \ \"net/http\"\n    \"fmt\"\n    \"strconv\"\n)\n\nfunc GetAndSetCookie(writer http.ResponseWriter,\
  \ request *http.Request) {\n    counterVal := 1\n    counterCookie, err := request.Cookie(\"\
  counter\")\n    if (err == nil) {\n        counterVal, _ = strconv.Atoi(counterCookie.Value)\n\
  \        counterVal++\n    }\n    http.SetCookie(writer, &http.Cookie{\n       \
  \ Name: \"counter\", Value: strconv.Itoa(counterVal),\n    })\n\n    if (len(request.Cookies())\
  \ > 0) {\n        for _, c := range request.Cookies() {\n            fmt.Fprintf(writer,\
  \ \"Cookie Name: %v, Value: %v\", c.Name, c.Value)\n        }\n    } else {\n  \
  \      fmt.Fprintln(writer, \"Request contains no cookies\")\n    }\n}\n\nfunc init()\
  \ {\n    http.HandleFunc(\"/cookies\", GetAndSetCookie)\n}\n```\n\n**代码清单 24-26**\
  \ `httpserver` 文件夹中 `cookies.go` 文件的内容\n\n此示例设置了一个 `/cookies` 路由，`GetAndSetCookie`\
  \ 函数为其设置了一个名为 `counter` 的 Cookie，初始值为零。当请求中包含该 Cookie 时，会读取其值，解析为 `int` 并递增，从而用于设置新的\
  \ Cookie 值。该函数还会枚举请求中的 Cookie，并将 `Name` 和 `Value` 字段写入响应。\n\n编译并执行该项目，然后使用浏览器请求\
  \ `https://localhost:5500/cookies`。客户端最初没有可发送的 Cookie，但之后每次重复请求时，都会读取并递增 Cookie\
  \ 值，如图 24-10 所示。\n\n![../images/512642_1_En_24_Chapter/512642_1_En_24_Fig10_HTML.jpg](img/512642_1_En_24_Fig10_HTML.jpg)\n\
  \n**图 24-10** 读取与设置 Cookie\n\n## 本章小结\n\n在本章中，我描述了用于创建 HTTP 服务器和处理 HTTP 请求的标准库特性。在下一章中，我将描述用于创建和发送\
  \ HTTP 请求的补充特性。\n\n"
- "# 25. 创建 HTTP 客户端\n\n在本章中，我将描述用于发起 HTTP 请求的标准库特性，使应用程序能够使用 Web 服务器。表 25-1 阐述了 HTTP\
  \ 请求的上下文。\n\n**表 25-1** HTTP 客户端上下文说明\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？ |\
  \ HTTP 请求用于从 HTTP 服务器检索数据，例如在第 24 章中创建的服务器。 |\n| 它们有何用处？ | HTTP 是使用最广泛的协议之一，常用于提供可呈现给用户的内容以及可通过编程方式消费的数据。\
  \ |\n| 如何使用？ | 使用 `net/http` 包的特性来创建和发送请求，并处理响应。 |\n| 是否存在陷阱或限制？ | 这些特性设计良好且易于使用，尽管某些特性需要按特定顺序使用。\
  \ |\n| 有哪些替代方案？ | 标准库包含对其他网络协议的支持，也支持打开和使用底层网络连接。有关 `net` 包及其子包（例如实现 SMTP 协议的 `net/smtp`）的详细信息，请参阅\
  \ [`https://pkg.go.dev/net@go1.17.1`](https://pkg.go.dev/net%2540go1.17.1)。 |\n\n\
  **表 25-2** 本章概要\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 发送 HTTP 请求 | 针对特定\
  \ HTTP 方法使用便捷方法 | 8–12 |\n| 配置 HTTP 请求 | 使用 `Client` 结构体定义的字段和方法 | 13 |\n| 创建预配置的请求\
  \ | 使用 `NewRequest` 便捷函数 | 14 |\n| 在请求中使用 Cookie | 使用 Cookie jar | 15–18 |\n| 配置重定向处理方式\
  \ | 使用 `CheckRedirect` 字段注册一个函数来处理重定向 | 19–21 |\n| 发送多部分表单 | 使用 `mime/multipart`\
  \ 包 | 22, 23 |\n\n\n\n## 本章准备工作\n\n为准备本章内容，请打开一个新的命令提示符，导航至一个方便的位置，并创建一个名为 `httpclient`\
  \ 的目录。运行清单 25-1 所示的命令来创建一个模块文件。\n\n**提示：** 你可以从 [`github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init httpclient\n\
  ```\n\n*清单 25-1：初始化模块*\n\n在 `httpclient` 文件夹中添加一个名为 `printer.go` 的文件，内容如清单 25-2\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string, values\
  \ ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n}\n```\n\n*清单 25-2：`httpclient`\
  \ 文件夹中 `printer.go` 文件的内容*\n\n在 `httpclient` 文件夹中添加一个名为 `product.go` 的文件，内容如清单 25-3\
  \ 所示。\n\n```\npackage main\ntype Product struct {\nName, Category string\nPrice\
  \ float64\n}\nvar Products = []Product {\n{ \"Kayak\", \"Watersports\", 279 },\n\
  { \"Lifejacket\", \"Watersports\", 49.95 },\n{ \"Soccer Ball\", \"Soccer\", 19.50\
  \ },\n{ \"Corner Flags\", \"Soccer\", 34.95 },\n{ \"Stadium\", \"Soccer\", 79500\
  \ },\n{ \"Thinking Cap\", \"Chess\", 16 },\n{ \"Unsteady Chair\", \"Chess\", 75\
  \ },\n{ \"Bling-Bling King\", \"Chess\", 1200 },\n}\n```\n\n*清单 25-3：`httpclient`\
  \ 文件夹中 `product.go` 文件的内容*\n\n在 `httpclient` 文件夹中添加一个名为 `index.html` 的文件，内容如清单 25-4\
  \ 所示。\n\n```\n\nPro Go\n\nHello, World\n\n```\n\n*清单 25-4：`httpclient` 文件夹中 `index.html`\
  \ 文件的内容*\n\n在 `httpclient` 文件夹中添加一个名为 `server.go` 的文件，内容如清单 25-5 所示。\n\n```\npackage\
  \ main\nimport (\n\"encoding/json\"\n\"fmt\"\n\"io\"\n\"net/http\"\n\"os\"\n)\n\
  func init() {\nhttp.HandleFunc(\"/html\",\nfunc (writer http.ResponseWriter, request\
  \ *http.Request) {\nhttp.ServeFile(writer, request, \"./index.html\")\n})\nhttp.HandleFunc(\"\
  /json\",\nfunc (writer http.ResponseWriter, request *http.Request) {\nwriter.Header().Set(\"\
  Content-Type\", \"application/json\")\njson.NewEncoder(writer).Encode(Products)\n\
  })\nhttp.HandleFunc(\"/echo\",\nfunc (writer http.ResponseWriter, request *http.Request)\
  \ {\nwriter.Header().Set(\"Content-Type\", \"text/plain\")\nfmt.Fprintf(writer,\
  \ \"Method: %v\\n\", request.Method)\nfor header, vals := range request.Header {\n\
  fmt.Fprintf(writer, \"Header: %v: %v\\n\", header, vals)\n}\nfmt.Fprintln(writer,\
  \ \"----\")\ndata, err := io.ReadAll(request.Body)\nif (err == nil) {\nif len(data)\
  \ == 0 {\nfmt.Fprintln(writer, \"No body\")\n} else {\nwriter.Write(data)\n}\n}\
  \ else {\nfmt.Fprintf(os.Stdout,\"Error reading body: %v\\n\", err.Error())\n}\n\
  })\n}\n```\n\n*清单 25-5：`httpclient` 文件夹中 `server.go` 文件的内容*\n\n此代码文件中的初始化函数创建了生成\
  \ HTML 和 JSON 响应的路由。还有一个路由会在响应中回显请求的详细信息。\n\n在 `httpclient` 文件夹中添加一个名为 `main.go`\
  \ 的文件，内容如清单 25-6 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n)\nfunc main()\
  \ {\nPrintfln(\"Starting HTTP Server\")\nhttp.ListenAndServe(\":5000\", nil)\n}\n\
  ```\n\n*清单 25-6：`httpclient` 文件夹中 `main.go` 文件的内容*\n\n在命令提示符中，于 `usingstrings` 文件夹内运行清单\
  \ 25-7 所示的命令。\n\n```\ngo run .\n```\n\n*清单 25-7：运行示例项目*\n\n### 处理 Windows 防火墙权限请求\n\
  \n如第 24 章所述，每次编译代码时，Windows 防火墙都会提示网络访问权限。为解决此问题，请在项目文件夹中创建一个名为 `buildandrun.ps1`\
  \ 的文件，内容如下：\n\n```\n$file = \"./httpclient.exe\"\n&go build -o $file\nif ($LASTEXITCODE\
  \ -eq 0) {\n&$file\n}\n```\n\n此 PowerShell 脚本每次都编译项目到同一个文件，并在没有错误时执行结果，这意味着你只需授予防火墙访问权限一次。在项目文件夹中运行以下命令来执行该脚本：\n\
  \n```\n./buildandrun.ps1\n```\n\n你必须每次使用此命令来构建和运行项目，以确保编译输出被写入同一位置。\n\n`httpclient`\
  \ 文件夹中的代码将被编译并执行。使用网络浏览器请求 `http://localhost:5000/html` 和 `http://localhost:5000/json`，将产生如图\
  \ 25-1 所示的响应。\n\n![../images/512642_1_En_25_Chapter/512642_1_En_25_Fig1_HTML.jpg](img/512642_1_En_25_Fig1_HTML.jpg)\n\
  \n*图 25-1：运行示例应用程序*\n\n要查看回显结果，请请求 `http://localhost:5000/echo`，这将产生类似于图 25-2 的输出，不过根据你的操作系统和浏览器，你可能会看到不同的详细信息。\n\
  \n![../images/512642_1_En_25_Chapter/512642_1_En_25_Fig2_HTML.jpg](img/512642_1_En_25_Fig2_HTML.jpg)\n\
  \n*图 25-2：在响应中回显请求的详细信息*\n\n\n\n### 发送简单 HTTP 请求\n\n`net/http` 包提供了一组便捷函数，用于执行基本的\
  \ HTTP 请求。这些函数的命名与其创建的 HTTP 请求方法相对应，如表 25-3 所述。\n\n**表 25-3** HTTP 请求便捷方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Get(url)` | 该函数向指定的 HTTP 或 HTTPS URL 发送 GET 请求。返回结果为\
  \ `Response` 值与一个 `error`，该错误用于报告请求过程中的问题。 |\n| `Head(url)` | 该函数向指定的 HTTP 或 HTTPS\
  \ URL 发送 HEAD 请求。HEAD 请求仅返回 GET 请求会返回的头部信息。返回结果为 `Response` 值与一个 `error`，该错误用于报告请求过程中的问题。\
  \ |\n| `Post(url, contentType, reader)` | 该函数向指定的 HTTP 或 HTTPS URL 发送 POST 请求，并附带指定的\
  \ `Content-Type` 头部值。表单内容由指定的 `Reader` 提供。返回结果为 `Response` 值与一个 `error`，该错误用于报告请求过程中的问题。\
  \ |\n| `PostForm(url, data)` | 该函数向指定的 HTTP 或 HTTPS URL 发送 POST 请求，并将 `Content-Type`\
  \ 头部设置为 `application/x-www-form-urlencoded`。表单内容由 `map[string][]string` 提供。返回结果为\
  \ `Response` 值与一个 `error`，该错误用于报告请求过程中的问题。 |\n\n清单 25-8 使用了 `Get` 方法向服务器发送一个 GET\
  \ 请求。服务器在一个 goroutine 中启动，以防止其阻塞，并允许在同一个应用程序内发送 HTTP 请求。这是本章将使用的模式，因为它避免了分离客户端和服务器项目。我使用了第\
  \ 19 章中描述的 `time.Sleep` 函数，以确保 goroutine 有足够的时间启动服务器。你可能需要根据系统情况增加延迟时间。\n\n```\n\
  package main\nimport (\n\"net/http\"\n\"os\"\n\"time\"\n)\nfunc main() {\ngo http.ListenAndServe(\"\
  :5000\", nil)\ntime.Sleep(time.Second)\nresponse, err := http.Get(\"http://localhost:5000/html\"\
  )\nif (err == nil) {\nresponse.Write(os.Stdout)\n} else {\nPrintfln(\"Error: %v\"\
  , err.Error())\n}\n}\n清单 25-8\n在 httpclient 文件夹的 main.go 文件中发送一个 GET 请求\n```\n\n\
  `Get` 函数的参数是一个包含请求 URL 的字符串。返回结果是一个 `Response` 值和一个用于报告发送请求时任何问题的 `error`。\n\n**注意**\n\
  \n表 25-3 中函数返回的 `error` 值用于报告创建和发送请求时的问题，但当服务器返回 HTTP 错误状态码时，该错误不会被使用。\n\n`Response`\
  \ 结构体描述了 HTTP 服务器发送的响应，并定义了表 25-4 中所示的字段和方法。\n\n**表 25-4** Response 结构体定义的字段和方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `StatusCode` | 该字段返回响应状态码，以 `int` 类型表示。 |\n| `Status`\
  \ | 该字段返回一个包含状态描述的 `string`。 |\n| `Proto` | 该字段返回一个包含响应 HTTP 协议的 `string`。 |\n|\
  \ `Header` | 该字段返回一个包含响应头部的 `map[string][]string`。 |\n| `Body` | 该字段返回一个 `ReadCloser`，它是一个定义了\
  \ `Close` 方法的 `Reader`，并提供对响应体的访问。 |\n| `Trailer` | 该字段返回一个包含响应尾部的 `map[string][]string`。\
  \ |\n| `ContentLength` | 该字段返回 `Content-Length` 头部的值，解析为 `int64` 类型。 |\n| `TransferEncoding`\
  \ | 该字段返回一组 `Transfer-Encoding` 头部的值。 |\n| `Close` | 如果响应包含设置为 `close` 的 `Connection`\
  \ 头部（表明应关闭 HTTP 连接），此 `bool` 类型字段返回 `true`。 |\n| `Uncompressed` | 如果服务器发送了压缩响应，且该响应已被\
  \ `net/http` 包解压缩，此字段返回 `true`。 |\n| `Request` | 该字段返回用于获取此响应的 `Request`。`Request`\
  \ 结构体在第 24 章中描述。 |\n| `TLS` | 该字段提供 HTTPS 连接的详细信息。 |\n| `Cookies()` | 该方法返回一个 `[]*Cookie`，包含响应中的\
  \ `Set-Cookie` 头部。`Cookie` 结构体在第 24 章中描述。 |\n| `Location()` | 该方法从响应的 `Location`\
  \ 头部返回 `URL`，以及一个在响应不包含此头部时指示错误的 `error`。 |\n| `Write(writer)` | 该方法将响应摘要写入指定的 `Writer`。\
  \ |\n\n我在清单 25-8 中使用了 `Write` 方法，它会输出响应摘要。编译并执行项目，你将会看到类似于下面的输出，但头部值可能不同：\n\n```\n\
  HTTP/1.1 200 OK\nContent-Length: 182\nAccept-Ranges: bytes\nContent-Type: text/html;\
  \ charset=utf-8\nDate: Sat, 25 Sep 2021 08:23:21 GMT\nLast-Modified: Sat, 25 Sep\
  \ 2021 06:51:09 GMT\n\nPro Go\n\nHello, World\n\n```\n\n当你只是想查看响应时，`Write` 方法很方便，但大多数项目会检查状态码以确保请求成功，然后读取响应体，如清单\
  \ 25-9 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"os\"\n\"time\"\n\"io\"\
  \n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  response, err := http.Get(\"http://localhost:5000/html\")\nif (err == nil && response.StatusCode\
  \ == http.StatusOK) {\ndata, err := io.ReadAll(response.Body)\nif (err == nil) {\n\
  defer response.Body.Close()\nos.Stdout.Write(data)\n}\n} else {\nPrintfln(\"Error:\
  \ %v, Status Code: %v\", err.Error(), response.StatusCode)\n}\n}\n清单 25-9\n在 httpclient\
  \ 文件夹的 main.go 文件中读取响应体\n```\n\n我使用了 `io` 包中定义的 `ReadAll` 函数，将响应 `Body` 读取到一个 `byte`\
  \ 切片中，然后将其写入标准输出。编译并执行项目，你将会看到以下输出，显示了 HTTP 服务器发送的响应体内容：\n\n```\n\nPro Go\n\nHello,\
  \ World\n\n```\n\n当响应包含数据（如 JSON）时，可以将它们解析为 Go 值，如清单 25-10 所示。\n\n```\npackage main\n\
  import (\n\"net/http\"\n//\"os\"\n\"time\"\n//\"io\"\n\"encoding/json\"\n)\nfunc\
  \ main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\nresponse,\
  \ err := http.Get(\"http://localhost:5000/json\")\nif (err == nil && response.StatusCode\
  \ == http.StatusOK) {\ndefer response.Body.Close()\ndata := []Product {}\nerr =\
  \ json.NewDecoder(response.Body).Decode(&data)\nif (err == nil) {\nfor _, p := range\
  \ data {\nPrintfln(\"Name: %v, Price: $%.2f\", p.Name, p.Price)\n}\n} else {\nPrintfln(\"\
  Decode error: %v\", err.Error())\n}\n} else {\nPrintfln(\"Error: %v, Status Code:\
  \ %v\", err.Error(), response.StatusCode)\n}\n}\n清单 25-10\n在 httpclient 文件夹的 main.go\
  \ 文件中读取并解析数据\n```\n\nJSON 数据使用第 21 章中描述的 `encoding/json` 包进行解码。数据被解码为一个 `Product`\
  \ 切片，并通过 `for` 循环进行枚举，当项目编译并执行时，将产生以下输出：\n\n```\nName: Kayak, Price: $279.00\nName:\
  \ Lifejacket, Price: $49.95\nName: Soccer Ball, Price: $19.50\nName: Corner Flags,\
  \ Price: $34.95\nName: Stadium, Price: $79500.00\nName: Thinking Cap, Price: $16.00\n\
  Name: Unsteady Chair, Price: $75.00\nName: Bling-Bling King, Price: $1200.00\n```\n\
  \n\n\n## 发送 POST 请求\n\n`Post` 和 `PostForm` 函数用于发送 POST 请求。`PostForm` 函数会将值的映射编码为表单数据，如代码清单\
  \ 25-11 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"os\"\n\"time\"\n\"io\"\
  \n//\"encoding/json\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\n\
  time.Sleep(time.Second)\nformData := map[string][]string {\n\"name\":  { \"Kayak\
  \ \"},\n\"category\": { \"Watersports\"},\n\"price\":  { \"279\"},\n}\nresponse,\
  \ err := http.PostForm(\"http://localhost:5000/echo\", formData)\nif (err == nil\
  \ && response.StatusCode == http.StatusOK) {\nio.Copy(os.Stdout, response.Body)\n\
  defer response.Body.Close()\n} else {\nPrintfln(\"Error: %v, Status Code: %v\",\
  \ err.Error(), response.StatusCode)\n}\n}\n代码清单 25-11\n在 httpclient 文件夹的 main.go\
  \ 文件中发送表单\n```\n\nHTML 表单支持每个键对应多个值，这就是映射中值为字符串切片的原因。在代码清单 25-11 中，我为表单的每个键只发送了一个值，但仍需将该值括在大括号中以创建一个切片。`PostForm`\
  \ 函数对映射进行编码，将数据添加到请求体中，并将 `Content-Type` 标头设置为 `application/x-www-form-urlencoded`。该表单被发送到\
  \ `/echo` URL，该 URL 简单地将在响应中收到的服务器请求原样返回。编译并执行该项目，你将看到以下输出：\n\n```\nMethod: POST\n\
  Header: User-Agent: [Go-http-client/1.1]\nHeader: Content-Length: [42]\nHeader:\
  \ Content-Type: [application/x-www-form-urlencoded]\nHeader: Accept-Encoding: [gzip]\n\
  \ncategory=Watersports&name=Kayak+&price=279\n```\n\n#### 使用 Reader 发布表单\n\n`Post`\
  \ 函数向服务器发送 POST 请求，并通过从 `Reader` 中读取内容来创建请求体，如代码清单 25-12 所示。与 `PostForm` 函数不同，数据不必编码为表单格式。\n\
  \n```\npackage main\nimport (\n\"net/http\"\n\"os\"\n\"time\"\n\"io\"\n\"encoding/json\"\
  \n\"strings\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  var builder strings.Builder\nerr := json.NewEncoder(&builder).Encode(Products[0])\n\
  if (err == nil) {\nresponse, err := http.Post(\"http://localhost:5000/echo\",\n\"\
  application/json\",\nstrings.NewReader(builder.String()))\nif (err == nil && response.StatusCode\
  \ == http.StatusOK) {\nio.Copy(os.Stdout, response.Body)\ndefer response.Body.Close()\n\
  } else {\nPrintfln(\"Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"Error: %v\"\
  , err.Error())\n}\n}\n代码清单 25-12\n在 httpclient 文件夹的 main.go 文件中从 Reader 发布数据\n```\n\
  \n此示例将代码清单 25-12 中定义的 `Product` 值切片的第一个元素编码为 JSON，准备数据以便其能够作为 `Reader` 进行处理。`Post`\
  \ 函数的参数分别是请求发送到的 URL、`Content-Type` 标头的值以及 `Reader`。编译并执行该项目，你将看到回显的请求数据：\n\n```\n\
  Method: POST\nHeader: User-Agent: [Go-http-client/1.1]\nHeader: Content-Length:\
  \ [54]\nHeader: Content-Type: [application/json]\nHeader: Accept-Encoding: [gzip]\n\
  \n{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279}\n```\n\n#### 理解\
  \ Content-Length 标头\n\n如果检查代码清单 25-11 和代码清单 25-12 发送的请求，你会发现它们都包含一个 `Content-Length`\
  \ 标头。此标头会自动设置，但仅当可以预先确定请求体中包含多少数据时，才会包含在请求中。这是通过检查 `Reader` 以确定动态类型来实现的。当数据使用 `strings.Reader`、`bytes.Reader`\
  \ 或 `bytes.Buffer` 类型存储在内存中时，会使用内置的 `len` 函数来确定数据量，并使用结果来设置 `Content-Length` 标头。\n\
  \n对于所有其他类型，`Content-Type` 标头不会设置，而是使用*分块编码*，这意味着请求体以数据块的形式写入，其大小作为请求体的一部分声明。这种方法允许发送请求，而无需为了计算有多少字节而读取\
  \ `Reader` 中的所有数据。分块编码的描述参见 [`https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Transfer-Encoding`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Transfer-Encoding)。\n\
  \n\n\n### 配置 HTTP 客户端请求\n\n当需要对 HTTP 请求进行精细控制时，可使用 `Client` 结构体，它定义了表 25-5 所示的字段和方法。\n\
  \n**表 25-5** `Client` 字段和方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Transport` | 该字段用于选择发送\
  \ HTTP 请求时将使用的传输层。`net/http` 包提供了一个默认的传输层。 |\n| `CheckRedirect` | 该字段用于指定处理重复重定向的自定义策略，详见\"\
  管理重定向\"一节。 |\n| `Jar` | 该字段返回一个 `CookieJar`，用于管理 Cookie，详见\"使用 Cookie\"一节。 |\n|\
  \ `Timeout` | 该字段用于设置请求的超时时间，以 `time.Duration` 类型指定。 |\n| `Do(request)` | 此方法发送指定的\
  \ `Request`，返回 `Response` 和一个指示发送请求问题的 `error`。 |\n| `CloseIdleConnections()` |\
  \ 此方法关闭当前打开但未使用的空闲 HTTP 请求。 |\n| `Get(url)` | 此方法由表 25-3 中描述的 `Get` 函数调用。 |\n| `Head(url)`\
  \ | 此方法由表 25-3 中描述的 `Head` 函数调用。 |\n| `Post(url, contentType, reader)` | 此方法由表 25-3\
  \ 中描述的 `Post` 函数调用。 |\n| `PostForm(url, data)` | 此方法由表 25-3 中描述的 `PostForm` 函数调用。\
  \ |\n\n`net/http` 包定义了 `DefaultClient` 变量，它提供了一个默认的 `Client`，可用于使用表 25-5 中描述的字段和方法。当使用表\
  \ 25-3 中描述的函数时，实际使用的就是该变量。\n\n描述 HTTP 请求的 `Request` 结构体与第 24 章中用于 HTTP 服务器的结构体相同。表\
  \ 25-6 描述了对于客户端请求最常用的 `Request` 字段和方法。\n\n**表 25-6** 有用的 `Request` 字段和方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Method` | 此 `string` 字段指定将用于请求的 HTTP 方法。`net/http` 包为\
  \ HTTP 方法定义了常量，如 `MethodGet` 和 `MethodPost`。 |\n| `URL` | 此 `URL` 字段指定将发送请求的目标 URL。`URL`\
  \ 结构体在第 24 章中定义。 |\n| `Header` | 该字段用于指定请求的头部信息。头部以 `map[string][]string` 形式指定，当使用字面量结构体语法创建\
  \ `Request` 值时，该字段将为 `nil`。 |\n| `ContentLength` | 该字段用于使用 `int64` 类型的值设置 `Content-Length`\
  \ 头部。 |\n| `TransferEncoding` | 该字段用于使用字符串切片设置 `Transfer-Encoding` 头部。 |\n| `Body`\
  \ | 此 `ReadCloser` 字段指定请求体的来源。如果你有一个没有定义 `Close` 方法的 `Reader`，则可以使用 `io.NopCloser`\
  \ 函数创建一个 `Close` 方法不执行任何操作的 `ReadCloser`。 |\n\n创建 `URL` 值的最简单方法是使用 `net/url` 包提供的\
  \ `Parse` 函数，该函数解析一个字符串，表 25-7 提供了快速参考。\n\n**表 25-7** 用于解析 URL 值的函数\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| `Parse(string)` | 此方法将一个 `string` 解析为 `URL`。返回结果为 `URL` 值和一个指示解析字符串问题的\
  \ `error`。 |\n\n清单 25-13 结合了上述表格中描述的功能，创建了一个简单的 HTTP POST 请求。\n\n```go\npackage\
  \ main\nimport (\n\"net/http\"\n\"os\"\n\"time\"\n\"io\"\n\"encoding/json\"\n\"\
  strings\"\n\"net/url\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\n\
  time.Sleep(time.Second)\nvar builder strings.Builder\nerr := json.NewEncoder(&builder).Encode(Products[0])\n\
  if (err == nil) {\nreqURL, err := url.Parse(\"http://localhost:5000/echo\")\nif\
  \ (err == nil) {\nreq := http.Request {\nMethod: http.MethodPost,\nURL: reqURL,\n\
  Header: map[string][]string {\n\"Content-Type\": { \"application.json\" },\n},\n\
  Body: io.NopCloser(strings.NewReader(builder.String())),\n}\nresponse, err := http.DefaultClient.Do(&req)\n\
  if (err == nil && response.StatusCode == http.StatusOK) {\nio.Copy(os.Stdout, response.Body)\n\
  defer response.Body.Close()\n} else {\nPrintfln(\"Request Error: %v\", err.Error())\n\
  }\n} else {\nPrintfln(\"Parse Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"\
  Encoder Error: %v\", err.Error())\n}\n}\n```\n\n该清单使用字面量语法创建了一个新的请求，然后设置了 `Method`、`URL`\
  \ 和 `Body` 字段。设置方法以便发送 POST 请求，使用 `Parse` 函数创建 `URL`，并使用 `io.NopCloser` 函数设置 `Body`\
  \ 字段，该函数接受一个 `Reader` 并返回一个 `ReadCloser`，这是 `Request` 结构体所需的类型。`Header` 字段被分配了一个定义了\
  \ `Content-Type` 头部的映射。`Request` 的指针被传递给赋给 `DefaultClient` 变量的 `Client` 的 `Do` 方法，该方法发送请求。\n\
  \n此示例使用了本章开头设置的 `/echo` URL，该 URL 会在响应中回显服务器收到的请求。编译并执行该项目，你将看到以下输出：\n\n```\nMethod:\
  \ POST\nHeader: Content-Type: [application.json]\nHeader: Accept-Encoding: [gzip]\n\
  Header: User-Agent: [Go-http-client/1.1]\n\n{\"Name\":\"Kayak\",\"Category\":\"\
  Watersports\",\"Price\":279}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项，对给定的英文文本进行专业、准确的中文翻译。\n\
  \n\n## 使用便捷函数创建请求\n\n之前的示例演示了可以使用结构体字面量语法来创建 `Request` 值，但 `net/http` 包也提供了一些便捷函数来简化流程，如表\
  \ 25-8 所述。\n\n**表 25-8** 用于创建请求的 net/http 便捷函数\n\n| 名称 | 描述 |\n| --- | --- |\n|\
  \ `NewRequest(method, url, reader)` | 此函数创建一个新的 `Reader`，并使用指定的方法、URL 和请求体进行配置。该函数还返回一个错误，用于指示创建值（包括解析以\
  \ `string` 形式表示的 URL）时出现的问题。 |\n| `NewRequestWithContext(context, method, url, reader)`\
  \ | 此函数创建一个新的 `Reader`，该 `Reader` 将在指定的上下文中发送。上下文将在第 30 章中描述。 |\n\n清单 25-14 使用 `NewRequest`\
  \ 函数（而非字面量语法）来创建一个 `Request`。\n\n```go\npackage main\n\nimport (\n\t\"net/http\"\
  \n\t\"os\"\n\t\"time\"\n\t\"io\"\n\t\"encoding/json\"\n\t\"strings\"\n\t//\"net/url\"\
  \n)\n\nfunc main() {\n\tgo http.ListenAndServe(\":5000\", nil)\n\ttime.Sleep(time.Second)\n\
  \n\tvar builder strings.Builder\n\terr := json.NewEncoder(&builder).Encode(Products[0])\n\
  \tif err == nil {\n\t\treq, err := http.NewRequest(http.MethodPost, \"http://localhost:5000/echo\"\
  ,\n\t\t\tio.NopCloser(strings.NewReader(builder.String())))\n\t\tif err == nil {\n\
  \t\t\treq.Header[\"Content-Type\"] = []string{\"application/json\"}\n\t\t\tresponse,\
  \ err := http.DefaultClient.Do(req)\n\t\t\tif err == nil && response.StatusCode\
  \ == http.StatusOK {\n\t\t\t\tio.Copy(os.Stdout, response.Body)\n\t\t\t\tdefer response.Body.Close()\n\
  \t\t\t} else {\n\t\t\t\tPrintfln(\"Request Error: %v\", err.Error())\n\t\t\t}\n\t\
  \t} else {\n\t\t\tPrintfln(\"Request Init Error: %v\", err.Error())\n\t\t}\n\t}\
  \ else {\n\t\tPrintfln(\"Encoder Error: %v\", err.Error())\n\t}\n}\n```\n\n*清单 25-14：在\
  \ httpclient 文件夹的 main.go 文件中使用便捷函数*\n\n结果是相同的——一个可以传递给 `Client.Do` 方法的 `Request`，但我不需要显式解析\
  \ URL。 `NewRequest` 函数会初始化 `Header` 字段，因此我可以直接添加 `Content-Type` 标头，而无需先创建映射。编译并执行项目，你将看到发送到服务器的请求详情：\n\
  \n```\nMethod: POST\nHeader: User-Agent: [Go-http-client/1.1]\nHeader: Content-Type:\
  \ [application/json]\nHeader: Accept-Encoding: [gzip]\n\n{\"Name\":\"Kayak\",\"\
  Category\":\"Watersports\",\"Price\":279}\n```\n\n### 处理 Cookie\n\n`Client` 会跟踪它从服务器接收到的\
  \ cookie，并自动将其包含在后续请求中。为了进行准备，请在 `httpclient` 文件夹中添加一个名为 `server_cookie.go` 的文件，其内容如清单\
  \ 25-15 所示。\n\n```go\npackage main\n\nimport (\n\t\"net/http\"\n\t\"strconv\"\n\t\
  \"fmt\"\n)\n\nfunc init() {\n\thttp.HandleFunc(\"/cookie\",\n\t\tfunc(writer http.ResponseWriter,\
  \ request *http.Request) {\n\t\t\tcounterVal := 1\n\t\t\tcounterCookie, err := request.Cookie(\"\
  counter\")\n\t\t\tif err == nil {\n\t\t\t\tcounterVal, _ = strconv.Atoi(counterCookie.Value)\n\
  \t\t\t\tcounterVal++\n\t\t\t}\n\t\t\thttp.SetCookie(writer, &http.Cookie{\n\t\t\t\
  \tName: \"counter\", Value: strconv.Itoa(counterVal),\n\t\t\t})\n\t\t\tif len(request.Cookies())\
  \ > 0 {\n\t\t\t\tfor _, c := range request.Cookies() {\n\t\t\t\t\tfmt.Fprintf(writer,\
  \ \"Cookie Name: %v, Value: %v\\n\",\n\t\t\t\t\t\tc.Name, c.Value)\n\t\t\t\t}\n\t\
  \t\t} else {\n\t\t\t\tfmt.Fprintln(writer, \"Request contains no cookies\")\n\t\t\
  \t}\n\t\t})\n}\n```\n\n*清单 25-15：httpclient 文件夹中 server_cookie.go 文件的内容*\n\n新路由设置并读取一个名为\
  \ `counter` 的 cookie，使用的是第 24 章其中一个示例中的代码。清单 25-16 更新了客户端请求以使用新 URL。\n\n```go\n\
  package main\n\nimport (\n\t\"net/http\"\n\t\"os\"\n\t\"time\"\n\t\"io\"\n\t// \"\
  encoding/json\"\n\t// \"strings\"\n\t//\"net/url\"\n\t\"net/http/cookiejar\"\n)\n\
  \nfunc main() {\n\tgo http.ListenAndServe(\":5000\", nil)\n\ttime.Sleep(time.Second)\n\
  \n\tjar, err := cookiejar.New(nil)\n\tif err == nil {\n\t\thttp.DefaultClient.Jar\
  \ = jar\n\t}\n\n\tfor i := 0; i < 3; i++ {\n\t\treq, err := http.NewRequest(http.MethodGet,\n\
  \t\t\t\"http://localhost:5000/cookie\", nil)\n\t\tif err == nil {\n\t\t\tresponse,\
  \ err := http.DefaultClient.Do(req)\n\t\t\tif err == nil && response.StatusCode\
  \ == http.StatusOK {\n\t\t\t\tio.Copy(os.Stdout, response.Body)\n\t\t\t\tdefer response.Body.Close()\n\
  \t\t\t} else {\n\t\t\t\tPrintfln(\"Request Error: %v\", err.Error())\n\t\t\t}\n\t\
  \t} else {\n\t\t\tPrintfln(\"Request Init Error: %v\", err.Error())\n\t\t}\n\t}\n\
  }\n```\n\n*清单 25-16：在 httpclient 文件夹的 main.go 文件中更改 URL*\n\n默认情况下，`Client` 值会忽略\
  \ cookie，这是一个明智的策略，因为一个响应中设置的 cookie 会影响后续请求，这可能会导致意外结果。要选择跟踪 cookie，需要将 `Jar` 字段设置为\
  \ `net/http/CookieJar` 接口的一个实现，该接口定义了表 25-9 中描述的方法。\n\n**表 25-9** CookieJar 接口定义的方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `SetCookies(url, cookies)` | 此方法为指定的 URL 存储一个 `*Cookie`\
  \ 切片。 |\n| `Cookies(url)` | 此方法返回一个 `*Cookie` 切片，其中包含应对指定 URL 的请求中包含的 cookie。 |\n\
  \n`net/http/cookiejar` 包包含一个 `CookieJar` 接口的实现，该实现将 cookie 存储在内存中。Cookie jar 使用构造函数创建，如表\
  \ 25-10 所述。\n\n**表 25-10** net/http/cookiejar 包中的 Cookie Jar 构造函数\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `New(options)` | 此函数创建一个新的 `CookieJar`，并使用 `Options` 结构体进行配置，该结构体将在下文描述。该函数还会返回一个\
  \ `error`，用于报告创建 jar 时出现的问题。 |\n\n`New` 函数接受一个 `net/http/cookiejar/Options` 结构体，用于配置\
  \ cookie jar。只有一个 `Options` 字段 `PublicSuffixList`，用于指定具有相同名称的接口的实现，该接口提供支持以防止 cookie\
  \ 被设置得过于广泛，这可能导致隐私侵犯。标准库不包含 `PublicSuffixList` 接口的实现，但在 [`https://pkg.go.dev/golang.org/x/net/publicsuffix`](https://pkg.go.dev/golang.org/x/net/publicsuffix)\
  \ 上有一个可用的实现。\n\n在清单 25-16 中，我使用 `nil` 调用了 `New` 函数，这意味着没有使用 `PublicSuffixList` 的实现，然后将\
  \ `CookieJar` 分配给赋给 `DefaultClient` 变量的 `Client` 的 `Jar` 字段。编译并执行项目，你将看到以下输出：\n\n\
  ```\nRequest contains no cookies\nCookie Name: counter, Value: 1\nCookie Name: counter,\
  \ Value: 2\n```\n\n清单 25-16 中的代码发送了三个 HTTP 请求。第一个请求不包含 cookie，但服务器在响应中包含了一个。该 cookie\
  \ 被包含在第二个和第三个请求中，这使得服务器能够读取并递增其中包含的值。\n\n请注意，在清单 25-16 中，我不必管理 cookie。只需设置 cookie\
  \ jar 即可，`Client` 会自动跟踪 cookie。\n\n\n\n### 创建独立的客户端和 Cookie Jar\n\n使用 `DefaultClient`\
  \ 的一个后果是所有请求共享相同的 cookie，这很有用，尤其是因为 Cookie Jar 会确保每个请求只包含该 URL 所需的 cookie。\n\n如果你不想共享\
  \ cookie，那么你可以创建一个拥有自己 Cookie Jar 的 `Client`，如清单 25-17 所示。\n\n```\npackage main\n\
  import (\n\"net/http\"\n\"os\"\n\"time\"\n\"io\"\n//\"encoding/json\"\n//\"strings\"\
  \n//\"net/url\"\n\"net/http/cookiejar\"\n\"fmt\"\n)\nfunc main() {\ngo http.ListenAndServe(\"\
  :5000\", nil)\ntime.Sleep(time.Second)\nclients := make([]http.Client, 3)\nfor index,\
  \ client := range clients {\njar, err := cookiejar.New(nil)\nif (err == nil) {\n\
  client.Jar = jar\n}\nfor i := 0; i < 3; i++ {\nreq, err := http.NewRequest(http.MethodGet,\n\
  \"http://localhost:5000/cookie\", nil)\nif (err == nil) {\nresponse, err := client.Do(req)\n\
  if (err == nil && response.StatusCode == http.StatusOK) {\nfmt.Fprintf(os.Stdout,\
  \ \"Client %v: \", index)\nio.Copy(os.Stdout, response.Body)\ndefer response.Body.Close()\n\
  }  else {\nPrintfln(\"Request Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"\
  Request Init Error: %v\", err.Error())\n}\n}\n}\n}\n```\n\n此示例创建了三个独立的 `Client`\
  \ 值，每个都有其自己的 `CookieJar`。每个 `Client` 发送三个请求，编译并执行该项目时，代码产生以下输出：\n\n```\nClient 0:\
  \ Request contains no cookies\nClient 0: Cookie Name: counter, Value: 1\nClient\
  \ 0: Cookie Name: counter, Value: 2\nClient 1: Request contains no cookies\nClient\
  \ 1: Cookie Name: counter, Value: 1\nClient 1: Cookie Name: counter, Value: 2\n\
  Client 2: Request contains no cookies\nClient 2: Cookie Name: counter, Value: 1\n\
  Client 2: Cookie Name: counter, Value: 2\n```\n\n如果需要多个 `Client` 值但希望共享 cookie，则可以使用单个\
  \ `CookieJar`，如清单 25-18 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"os\"\
  \n\"io\"\n\"time\"\n//\"encoding/json\"\n//\"strings\"\n//\"net/url\"\n\"net/http/cookiejar\"\
  \n\"fmt\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  jar, err := cookiejar.New(nil)\nclients := make([]http.Client, 3)\nfor index, client\
  \ := range clients {\n//jar, err := cookiejar.New(nil)\nif (err == nil) {\nclient.Jar\
  \ = jar\n}\nfor i := 0; i < 3; i++ {\nreq, err := http.NewRequest(http.MethodGet,\n\
  \"http://localhost:5000/cookie\", nil)\nif (err == nil) {\nresponse, err := client.Do(req)\n\
  if (err == nil && response.StatusCode == http.StatusOK) {\nfmt.Fprintf(os.Stdout,\
  \ \"Client %v: \", index)\nio.Copy(os.Stdout, response.Body)\ndefer response.Body.Close()\n\
  }  else {\nPrintfln(\"Request Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"\
  Request Init Error: %v\", err.Error())\n}\n}\n}\n}\n```\n\n一个 `Client` 接收到的 cookie\
  \ 会在后续请求中使用，如下面编译并执行项目时产生的输出所示：\n\n```\nClient 0: Request contains no cookies\n\
  Client 0: Cookie Name: counter, Value: 1\nClient 0: Cookie Name: counter, Value:\
  \ 2\nClient 1: Cookie Name: counter, Value: 3\nClient 1: Cookie Name: counter, Value:\
  \ 4\nClient 1: Cookie Name: counter, Value: 5\nClient 2: Cookie Name: counter, Value:\
  \ 6\nClient 2: Cookie Name: counter, Value: 7\nClient 2: Cookie Name: counter, Value:\
  \ 8\n```\n\n### 管理重定向\n\n默认情况下，一个 `Client` 在十次请求后会停止跟随重定向，但这可以通过指定自定义策略来更改。在 `httpclient`\
  \ 文件夹中添加一个名为 `server_redirects.go` 的文件，其内容如清单 25-19 所示。\n\n```\npackage main\nimport\
  \ \"net/http\"\nfunc init() {\nhttp.HandleFunc(\"/redirect1\",\nfunc (writer http.ResponseWriter,\
  \ request *http.Request) {\nhttp.Redirect(writer, request, \"/redirect2\",\nhttp.StatusTemporaryRedirect)\n\
  })\nhttp.HandleFunc(\"/redirect2\",\nfunc (writer http.ResponseWriter, request *http.Request)\
  \ {\nhttp.Redirect(writer, request, \"/redirect1\",\nhttp.StatusTemporaryRedirect)\n\
  })\n}\n```\n\n重定向会持续进行，直到客户端停止跟随它们。清单 25-20 创建了一个请求，该请求发送到由清单 25-19 中定义的第一条路由处理的\
  \ URL。\n\n```\npackage main\nimport (\n\"net/http\"\n\"os\"\n\"io\"\n\"time\"\n\
  //\"encoding/json\"\n//\"strings\"\n//\"net/url\"\n//\"net/http/cookiejar\"\n//\"\
  fmt\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  req, err := http.NewRequest(http.MethodGet,\n\"http://localhost:5000/redirect1\"\
  , nil)\nif (err == nil) {\nvar response *http.Response\nresponse, err = http.DefaultClient.Do(req)\n\
  if (err == nil) {\nio.Copy(os.Stdout, response.Body)\n} else {\nPrintfln(\"Request\
  \ Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"Error: %v\", err.Error())\n\
  }\n}\n```\n\n编译并执行该项目，你将看到一个错误，该错误在十次请求后阻止 `Client` 跟随重定向：\n\n```\nRequest Error:\
  \ Get \"/redirect1\": stopped after 10 redirects\n```\n\n自定义策略通过向 `Client.CheckRedirect`\
  \ 字段分配一个函数来定义，如清单 25-21 所示。\n\n```\npackage main\nimport (\n\"net/http\"\n\"os\"\
  \n\"io\"\n\"time\"\n//\"encoding/json\"\n//\"strings\"\n\"net/url\"\n//\"net/http/cookiejar\"\
  \n//\"fmt\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  http.DefaultClient.CheckRedirect = func(req *http.Request,\nprevious []*http.Request)\
  \ error {\nif len(previous) == 3 {\nurl, _ := url.Parse(\"http://localhost:5000/html\"\
  )\nreq.URL =   url\n}\nreturn nil\n}\nreq, err := http.NewRequest(http.MethodGet,\n\
  \"http://localhost:5000/redirect1\", nil)\nif (err == nil) {\nvar response *http.Response\n\
  response, err = http.DefaultClient.Do(req)\nif (err == nil) {\nio.Copy(os.Stdout,\
  \ response.Body)\n} else {\nPrintfln(\"Request Error: %v\", err.Error())\n}\n} else\
  \ {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n```\n\n该函数的参数是一个指向即将执行的 `Request`\
  \ 的指针，以及一个包含导致重定向的请求的 `*Request` 切片。这意味着该切片将至少包含一个值，因为仅当服务器返回重定向响应时才会调用 `CheckRedirect`。\n\
  \n`CheckRedirect` 函数可以通过返回一个 `error` 来阻止请求，该错误随后作为 `Do` 方法的结果返回。或者 `CheckRedirect`\
  \ 函数可以更改即将发出的请求，这正是清单 25-21 中所做的。当一个请求导致三次重定向时，自定义策略会更改 `URL` 字段，使 `Request` 指向本章前面设置的\
  \ `/html` URL，从而产生 HTML 结果。\n\n结果是，对 `/redirect1` URL 的请求将导致在 `/redirect2` 和 `/redirect1`\
  \ 之间进行短暂的重定向循环，然后策略更改 URL，产生以下输出：\n\n```\n\nPro Go\n\nHello, World\n\n```\n\n\n\n\
  ### 创建多部分表单\n\n`mime/multipart` 包可用于创建编码为 `multipart/form-data` 的请求体，这使得表单能够安全地包含二进制数据，例如文件内容。在\
  \ `httpclient` 文件夹中创建一个名为 `server_forms.go` 的文件，内容如清单 25-22 所示。\n\n```\npackage\
  \ main\nimport (\n\"net/http\"\n\"fmt\"\n\"io\"\n)\nfunc init() {\nhttp.HandleFunc(\"\
  /form\",\nfunc (writer http.ResponseWriter, request *http.Request) {\nerr := request.ParseMultipartForm(10000000)\n\
  if (err == nil) {\nfor name, vals := range request.MultipartForm.Value {\nfmt.Fprintf(writer,\
  \ \"Field %v: %v\\n\", name, vals)\n}\nfor name, files := range request.MultipartForm.File\
  \ {\nfor _, file := range files {\nfmt.Fprintf(writer, \"File %v: %v\\n\", name,\
  \ file.Filename)\nif f, err := file.Open(); err == nil {\ndefer f.Close()\nio.Copy(writer,\
  \ f)\n}\n}\n}\n} else {\nfmt.Fprintf(writer, \"Cannot parse form %v\", err.Error())\n\
  }\n})\n}\n清单 25-22\nhttpclient 文件夹中 server_forms.go 文件的内容\n```\n\n新的处理函数使用了第 24\
  \ 章中描述的功能来解析多部分表单，并回显其包含的字段和文件。\n\n要在客户端创建表单，需要使用 `multipart.Writer` 结构体，它是 `io.Writer`\
  \ 的一个包装器，并通过表 25-11 中描述的构造函数创建。\n\n表 25-11\n\n`multipart.Writer` 构造函数\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `NewWriter(writer)` | 此函数创建一个新的 `multipart.Writer`，它将表单数据写入指定的\
  \ `io.Writer`。 |\n\n一旦有了可用的 `multipart.Writer`，就可以使用表 25-12 中描述的方法来创建表单内容。\n\n表\
  \ 25-12\n\n`multipart.Writer` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `CreateFormField(fieldname)`\
  \ | 此方法创建一个具有指定名称的新表单字段。返回结果是一个用于写入字段数据的 `io.Writer` 和一个报告创建字段时出现问题的 `error`。 |\n\
  | `CreateFormFile(fieldname, filename)` | 此方法创建一个具有指定字段名称和文件名的新文件字段。返回结果是一个用于写入字段数据的\
  \ `io.Writer` 和一个报告创建字段时出现问题的 `error`。 |\n| `FormDataContentType()` | 此方法返回一个 `string`，用于设置\
  \ `Content-Type` 请求标头，其中包含表示表单各部分之间边界的字符串。 |\n| `Close()` | 此函数完成表单的创建，并写入表示表单数据结束的终止边界。\
  \ |\n\n还定义了其他方法，可以对表单的构建方式进行精细控制，但表 25-12 中的方法对于大多数项目来说最为有用。清单 25-23 使用这些方法创建了一个发送到服务器的多部分表单。\n\
  \n```\npackage main\nimport (\n\"net/http\"\n\"os\"\n\"io\"\n\"time\"\n//\"encoding/json\"\
  \n//\"strings\"\n//\"net/url\"\n//\"net/http/cookiejar\"\n//\"fmt\"\n\"mime/multipart\"\
  \n\"bytes\"\n)\nfunc main() {\ngo http.ListenAndServe(\":5000\", nil)\ntime.Sleep(time.Second)\n\
  var buffer bytes.Buffer\nformWriter := multipart.NewWriter(&buffer)\nfieldWriter,\
  \ err := formWriter.CreateFormField(\"name\")\nif (err == nil) {\nio.WriteString(fieldWriter,\
  \ \"Alice\")\n}\nfieldWriter, err = formWriter.CreateFormField(\"city\")\nif (err\
  \ == nil) {\nio.WriteString(fieldWriter, \"New York\")\n}\nfileWriter, err := formWriter.CreateFormFile(\"\
  codeFile\", \"printer.go\")\nif (err == nil) {\nfileData, err := os.ReadFile(\"\
  ./printer.go\")\nif (err == nil) {\nfileWriter.Write(fileData)\n}\n}\nformWriter.Close()\n\
  req, err := http.NewRequest(http.MethodPost,\n\"http://localhost:5000/form\", &buffer)\n\
  req.Header[\"Content-Type\"] = []string{ formWriter.FormDataContentType()}\nif (err\
  \ == nil) {\nvar response *http.Response\nresponse, err = http.DefaultClient.Do(req)\n\
  if (err == nil) {\nio.Copy(os.Stdout, response.Body)\n} else {\nPrintfln(\"Request\
  \ Error: %v\", err.Error())\n}\n} else {\nPrintfln(\"Error: %v\", err.Error())\n\
  }\n}\n清单 25-23\n在 httpclient 文件夹的 main.go 文件中创建并发送多部分表单\n```\n\n创建表单需要特定的顺序。首先，调用\
  \ `NewWriter` 函数获取一个 `multipart.Writer`：\n\n```\n...\nvar buffer bytes.Buffer\n\
  formWriter := multipart.NewWriter(&buffer)\n...\n```\n\n需要使用 `Reader` 来将表单数据作为 HTTP\
  \ 请求的请求体，但创建表单则需要 `Writer`。这是使用 `bytes.Buffer` 结构体的理想场景，它提供了 `Reader` 和 `Writer`\
  \ 接口的内存实现。\n\n创建 `multipart.Writer` 后，即可使用 `CreateFormField` 和 `CreateFormFile`\
  \ 方法向表单添加字段和文件：\n\n```\n...\nfieldWriter, err := formWriter.CreateFormField(\"name\"\
  )\n...\nfileWriter, err := formWriter.CreateFormFile(\"codeFile\", \"printer.go\"\
  )\n...\n```\n\n这两个方法都返回一个 `Writer`，用于向表单写入内容。添加完字段和文件后，下一步是使用 `FormDataContentType`\
  \ 方法的结果来设置 `Content-Type` 标头：\n\n```\n...\nreq.Header[\"Content-Type\"] = []string{\
  \ formWriter.FormDataContentType()}\n...\n```\n\n该方法返回的结果包含了用于表示表单各部分之间边界的字符串。最后一步（这一步很容易忘记）是调用\
  \ `multipart.Writer` 的 `Close` 方法，它会向表单添加一个最终的边界字符串。\n\n**警告**\n\n不要在调用 `Close`\
  \ 方法时使用 `defer` 关键字；否则，最终的边界字符串会在请求发送之后才添加到表单中，从而生成一个并非所有服务器都能处理的表单。务必在发送请求之前调用\
  \ `Close` 方法。\n\n编译并执行项目，你将看到多部分表单的内容在服务器响应中被回显：\n\n```\nField city: [New York]\n\
  Field name: [Alice]\nFile codeFile: printer.go\npackage main\nimport \"fmt\"\nfunc\
  \ Printfln(template string, values ...interface{}) {\nfmt.Printf(template + \"\\\
  n\", values...)\n}\n```\n\n## 总结\n\n在本章中，我介绍了用于发送 HTTP 请求的标准库功能，解释了如何使用不同的 HTTP\
  \ 动词、如何发送表单以及如何处理诸如 cookies 之类的问题。在下一章中，我将向您展示 Go 标准库如何提供对数据库操作的支持。\n\n\n\n"
- "# 26. 使用数据库\n\n在本章中，我将介绍用于操作 SQL 数据库的 Go 标准库。这些功能提供了对数据库所提供能力的抽象表示，并依赖驱动程序包来处理特定数据库的实现。\n\
  \n市面上有众多数据库的驱动程序，其列表可在 [`https://github.com/golang/go/wiki/sqldrivers`](https://github.com/golang/go/wiki/sqldrivers)\
  \ 找到。数据库驱动程序以 Go 包的形式分发，并且大多数数据库都有多个驱动程序包。一些驱动程序包依赖于 `cgo`（这允许 Go 代码使用 C 库），而另一些则纯粹用\
  \ Go 编写。\n\n本章我将使用 SQLite 数据库（在第三部分中，我将使用更复杂的数据库）。SQLite 是一款卓越的嵌入式数据库，支持广泛的平台，免费提供，且无需安装和配置服务器组件。表\
  \ 26-1 列出了标准库数据库功能的背景信息。\n\n**表 26-1.** 使用数据库的背景信息\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它是什么？ | `database/sql` 包提供了用于操作 SQL 数据库的功能。 |\n| 它为什么有用？ | 关系型数据库仍然是存储大量结构化数据最有效的方式，并广泛应用于大多数大型项目中。\
  \ |\n| 如何使用它？ | 驱动程序包为特定的数据库提供支持，而 `database/sql` 包则提供一组类型，使得数据库能被一致地使用。 |\n| 有陷阱或局限性吗？\
  \ | 这些功能不会自动从结果行中填充结构体字段。 |\n| 有替代方案吗？ | 有一些第三方包构建在这些功能之上，用于简化或增强其使用。 |\n\n**关于数据库的抱怨**\n\
  \n您可能会想联系我抱怨本书中数据库的选择。您肯定不是唯一一个，因为数据库选择是我收到最多邮件的主题之一。抱怨通常暗示我选择了“错误”的数据库，这通常意味着“不是发件人使用的数据库”。\n\
  \n在联系我之前，请考虑两点。首先，这不是一本关于数据库的书，SQLite 采用的零配置方法意味着大多数读者无需诊断设置和配置问题就能跟随示例操作。其次，SQLite\
  \ 是一款出色的数据库，许多项目因其没有传统的服务器组件而忽视它，尽管许多项目并不需要或受益于拥有一个独立的数据库服务器。\n\n如果您是 Oracle/DB2/MySQL/MariaDB\
  \ 的忠实用户，并希望将连接代码直接复制粘贴到您的项目中，我在此致歉。但这种方法让我能够专注于 Go 语言，并且您会在所选驱动程序的文档中找到所需的代码示例。\n\
  \n表 26-2 总结了本章内容。\n\n**表 26-2.** 本章小结\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n\
  | 为项目添加对特定类型数据库的支持 | 使用 `go get` 命令添加数据库驱动程序包 | 8 |\n| 打开和关闭数据库 | 使用 `Open` 函数和\
  \ `Close` 方法 | 9, 10 |\n| 查询数据库 | 使用 `Query` 方法并使用 `Scan` 方法处理 `Rows` 结果 | 11–16,\
  \ 22, 23 |\n| 查询单行数据库记录 | 使用 `QueryRow` 方法并处理 `Row` 结果 | 17 |\n| 执行不产生行结果的查询或语句\
  \ | 使用 `Exec` 方法并处理其产生的 `Result` | 18 |\n| 预处理一条语句以便重复使用 | 创建一条预处理语句 | 19, 20 |\n\
  | 将多个查询作为单个工作单元执行 | 使用事务 | 21 |\n\n## 本章准备\n\n为准备本章，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `data` 的目录。在 `data` 文件夹中运行清单 26-1 所示的命令来创建一个模块文件。\n\n**提示** 您可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章以获取帮助。\n\n```\ngo mod init data\n```\n\
  \n**清单 26-1.** 初始化模块\n\n将一个名为 `printer.go` 的文件添加到 `data` 文件夹中，其内容如清单 26-2 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{})\
  \ {\nfmt.Printf(template + \"\\n\", values...)\n}\n```\n\n**清单 26-2.** `data` 文件夹中\
  \ `printer.go` 文件的内容\n\n将一个名为 `main.go` 的文件添加到 `data` 文件夹中，其内容如清单 26-3 所示。\n\n```\n\
  package main\nfunc main() {\nPrintfln(\"Hello, Data\")\n}\n```\n\n**清单 26-3.** `data`\
  \ 文件夹中 `main.go` 文件的内容\n\n在 `data` 文件夹中运行清单 26-4 所示的命令来编译并运行项目。\n\n```\ngo run .\n\
  ```\n\n**清单 26-4.** 编译并执行项目\n\n该命令将产生以下输出：\n\n```\nHello, Data\n```\n\n### 准备数据库\n\
  \n本章使用的 SQLite 数据库管理器将在稍后安装，但首先需要一个工具包来根据 SQL 文件创建数据库。（在第三部分中，我将演示在应用程序内部创建数据库的过程。）\n\
  \n为了定义将创建数据库的 SQL 文件，请将一个名为 `products.sql` 的文件添加到 `data` 文件夹中，其内容如清单 26-5 所示。\n\n\
  ```\nDROP TABLE IF EXISTS Categories;\nDROP TABLE IF EXISTS Products;\nCREATE TABLE\
  \ IF NOT EXISTS Categories (\nId INTEGER NOT NULL PRIMARY KEY,\nName TEXT\n);\n\
  CREATE TABLE IF NOT EXISTS Products (\nId INTEGER NOT NULL PRIMARY KEY,\nName TEXT,\n\
  Category INTEGER,\nPrice decimal(8, 2),\nCONSTRAINT CatRef FOREIGN KEY(Category)\
  \ REFERENCES Categories (Id)\n);\nINSERT INTO Categories (Id, Name) VALUES\n(1,\
  \ \"Watersports\"),\n(2, \"Soccer\");\nINSERT INTO Products (Id, Name, Category,\
  \ Price) VALUES\n(1, \"Kayak\", 1, 279),\n(2, \"Lifejacket\", 1, 48.95),\n(3, \"\
  Soccer Ball\", 2, 19.50),\n(4, \"Corner Flags\", 2, 34.95);\n```\n\n**清单 26-5.**\
  \ `data` 文件夹中 `products.sql` 文件的内容\n\n请前往 [`https://www.sqlite.org/download.html`](https://www.sqlite.org/download.html)，查找适用于您操作系统的预编译二进制文件部分，并下载工具包。我无法在本章中包含链接，因为\
  \ URL 包含软件包版本号，当您阅读本章时可能已发生变化。\n\n解压 zip 归档文件，并将 `sqlite3` 或 `sqlite3.exe` 文件复制到\
  \ `data` 文件夹中。在 `data` 文件夹中运行清单 26-6 所示的命令来创建数据库。\n\n**注意** 适用于 Linux 的预编译二进制文件是\
  \ 32 位的，对于仅支持 64 位的操作系统，这可能需要安装一些额外的软件包。\n\n```\n./sqlite3 products.db \".read products.sql\"\
  \n```\n\n**清单 26-6.** 创建数据库\n\n为了确认数据库已创建并填充了数据，请在 `data` 文件夹中运行清单 26-7 所示的命令。\n\
  \n```\n./sqlite3 products.db \"select * from PRODUCTS\"\n```\n\n**清单 26-7.** 测试数据库\n\
  \n如果数据库创建正确，您将看到以下输出：\n\n```\n1|Kayak|1|279\n2|Lifejacket|1|48.95\n3|Soccer Ball|2|19.5\n\
  4|Corner Flags|2|34.95\n```\n\n如果您在遵循本章示例时需要重置数据库，可以删除 `products.db` 文件，然后再次运行清单\
  \ 26-6 中的命令。\n\n\n\n### 安装数据库驱动\n\nGo 标准库包含用于简单且一致地处理数据库的功能，但依赖数据库驱动包来实现这些功能以支持每种特定的数据库引擎或服务器。如前所述，本章使用\
  \ SQLite，有一个优秀的纯 Go 驱动可用。在 `data` 文件夹中运行清单 26-8 所示的命令来安装该驱动包。\n\n```\ngo get modernc.org/sqlite\n\
  清单 26-8 安装 SQL 驱动包\n```\n\n大多数数据库服务器是独立设置的，因此数据库驱动会打开一个到独立进程的连接。SQLite 是一个嵌入式数据库，并包含在驱动包中，这意味着无需额外配置。\n\
  \n### 打开数据库\n\n标准库提供了 `database/sql` 包用于处理数据库。表 26-3 中描述的函数用于打开数据库，以便在应用程序中使用。\n\
  \n表 26-3 用于打开数据库的 `database/sql` 函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Drivers()`\
  \ | 此函数返回一个字符串切片，每个字符串包含一个数据库驱动的名称。 |\n| `Open(driver, connectionStr)` | 此函数使用指定的驱动和连接字符串打开数据库。结果是一个指向\
  \ `DB` 结构体的指针（用于与数据库交互）和一个指示打开数据库时出现问题的 `error`。 |\n\n在 `data` 文件夹中添加一个名为 `database.go`\
  \ 的文件，代码如清单 26-9 所示。\n\n```\npackage main\nimport (\n\"database/sql\"\n_ \"modernc.org/sqlite\"\
  \n)\nfunc listDrivers() {\nfor _, driver := range sql.Drivers() {\nPrintfln(\"Driver:\
  \ %v\", driver)\n}\n}\nfunc openDatabase() (db *sql.DB, err error) {\ndb, err =\
  \ sql.Open(\"sqlite\", \"products.db\")\nif (err == nil) {\nPrintfln(\"Opened database\"\
  )\n}\nreturn\n}\n清单 26-9 data 文件夹中 database.go 文件的内容\n```\n\n空白标识符用于导入数据库驱动包，该包会加载驱动并允许其注册为\
  \ SQL API 的提供程序：\n\n```\n...\n_ \"modernc.org/sqlite\"\n...\n```\n\n导入该包仅用于初始化，不会直接使用，尽管你可能会遇到需要一些初始配置的驱动。数据库通过\
  \ `database/sql` 包来使用，如清单 26-9 中定义的函数所示。`listDrivers` 函数会输出可用的驱动，尽管在此示例项目中只有一个。`openDatabase`\
  \ 函数使用表 26-3 中描述的 `Open` 函数来打开数据库：\n\n```\n...\ndb, err = sql.Open(\"sqlite\", \"\
  products.db\")\n...\n```\n\n`Open` 函数的参数是使用的驱动名称和数据库的连接字符串，该字符串特定于所使用的数据库引擎。SQLite\
  \ 使用数据库文件名来打开数据库。\n\n`Open` 函数返回一个指向 `sql.DB` 结构体的指针和一个报告任何打开数据库问题的 `error`。`DB`\
  \ 结构体提供对数据库的访问，而不暴露数据库引擎或其连接的细节。\n\n我将在后续部分描述 `DB` 结构体提供的功能。但首先，我将只使用一个方法，如清单 26-10\
  \ 所示。\n\n```\npackage main\nfunc main() {\nlistDrivers()\ndb, err := openDatabase()\n\
  if (err == nil) {\ndb.Close()\n} else {\npanic(err)\n}\n}\n清单 26-10 在 data 文件夹的\
  \ main.go 文件中使用 DB 结构体\n```\n\n`main` 方法调用 `listDrivers` 函数以打印已加载驱动的名称，然后调用 `openDatabase`\
  \ 函数来打开数据库。尚未对数据库执行任何操作，但调用了 `Close` 方法。该方法（如表 26-4 所述）会关闭数据库并阻止后续操作。\n\n表 26-4\
  \ 用于关闭数据库的 DB 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Close()` | 此函数关闭数据库并阻止后续操作。 |\n\
  \n虽然调用 `Close` 方法是个好习惯，但只有在完全完成对数据库的操作时才需要这样做。单个 `DB` 可用于对同一数据库重复执行查询，并且与数据库的连接会在后台自动管理。无需为每个查询调用\
  \ `Open` 方法来获取新的 `DB`，然后在查询完成后使用 `Close` 将其关闭。\n\n编译并执行该项目，你将看到以下输出，其中显示了数据库驱动的名称并确认数据库已打开：\n\
  \n```\nDriver: sqlite\nOpened database\n```\n\n### 执行语句和查询\n\n`DB` 结构体用于执行 SQL 语句，使用表\
  \ 26-5 中描述的方法，这些方法将在后续部分演示。\n\n表 26-5 用于执行 SQL 语句的 DB 方法\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `Query(query, ...args)` | 此方法使用可选的占位符参数执行指定查询。结果是一个包含查询结果的 `Rows` 结构体，以及一个指示执行查询时出现的问题的\
  \ `error`。 |\n| `QueryRow(query, ...args)` | 此方法使用可选的占位符参数执行指定查询。结果是一个 `Row` 结构体，代表查询结果中的第一行。参见“为单行执行查询”部分。\
  \ |\n| `Exec(query, ...args)` | 此方法执行不返回数据行的语句或查询。该方法返回一个描述数据库响应的 `Result`，以及一个指示执行问题的\
  \ `error`。参见“执行其他查询”部分。 |\n\n在数据库中使用上下文\n\n在第 30 章中，我描述了 `context` 包及其定义的 `Context`\
  \ 接口，该接口用于在服务器处理请求时管理请求。`database/sql` 包中定义的所有重要方法也都有接受 `Context` 参数的版本，这对于利用诸如请求处理超时等功能非常有用。本章未列出这些方法，但我在第\
  \ 3 部分中广泛使用了 `Context` 接口——包括使用接受它们作为参数的 `database/sql` 方法——在那一部分中，我使用 Go 及其标准库创建了一个\
  \ Web 应用平台和一个在线商店。\n\n\n\n#### 查询多行数据\n\n`Query` 方法会执行一个从数据库中检索一行或多行数据的查询。`Query`\
  \ 方法返回一个 `Rows` 结构体，其中包含查询结果以及一个用于指示问题的 `error`。行数据通过表 26-6 中描述的方法进行访问。\n\n**表 26-6**\
  \ `Rows` 结构体的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Next()` | 此方法会前进到下一个结果行。结果是一个\
  \ `bool` 值，当存在可读取的数据时为 `true`，当到达数据末尾时为 `false`，此时会自动调用 `Close` 方法。 |\n| `NextResultSet()`\
  \ | 当同一个数据库响应中包含多个结果集时，此方法会前进到下一个结果集。如果还有另一组行需要处理，则该方法返回 `true`。 |\n| `Scan(...targets)`\
  \ | 此方法将当前行中的 SQL 值赋值给指定的变量。通过指针进行赋值，如果无法扫描这些值，该方法会返回一个 `error`。详细信息请参见“理解 Scan\
  \ 方法”一节。 |\n| `Close()` | 此方法阻止对结果的进一步枚举，当不需要全部数据时使用。如果使用 `Next` 方法前进直到其返回 `false`，则无需调用此方法。\
  \ |\n\n清单 26-11 演示了一个简单的查询，展示了如何使用 `Rows` 结构体。\n\n```\npackage main\nimport \"database/sql\"\
  \nfunc queryDatabase(db *sql.DB) {\nrows, err := db.Query(\"SELECT * from Products\"\
  )\nif (err == nil) {\nfor (rows.Next()) {\nvar id, category int\nvar name string\n\
  var price float64\nrows.Scan(&id, &name, &category, &price)\nPrintfln(\"Row: %v\
  \ %v %v %v\", id, name, category, price)\n}\n} else {\nPrintfln(\"Error: %v\", err)\n\
  }\n}\nfunc main() {\n//listDrivers()\ndb, err := openDatabase()\nif (err == nil)\
  \ {\nqueryDatabase(db)\ndb.Close()\n} else {\npanic(err)\n}\n}\n清单 26-11\n在 data\
  \ 文件夹的 main.go 文件中查询数据库\n```\n\n`queryDatabase` 函数使用 `Query` 方法对 `Products` 表执行一个简单的\
  \ `SELECT` 查询，该查询会生成一个 `Rows` 结果和一个 `error`。如果 `error` 为 `nil`，则使用 `for` 循环通过调用\
  \ `Next` 方法遍历结果行，当存在待处理的行时返回 `true`，到达数据末尾时返回 `false`。\n\n`Scan` 方法用于从结果行中提取值，并将其赋值给\
  \ Go 变量，如下所示：\n\n```\n...\nrows.Scan(&id, &name, &category, &price)\n...\n```\n\n\
  变量的指针按照从数据库中读取列的顺序传递给 `Scan` 方法。必须注意确保 Go 变量能够表示将要赋值给它们的 SQL 结果。编译并执行该项目，你将看到以下输出：\n\
  \n```\nOpened database\nRow: 1 Kayak 1 279\nRow: 2 Lifejacket 1 48.95\nRow: 3 Soccer\
  \ Ball 2 19.5\nRow: 4 Corner Flags 2 34.95\n```\n\n#### 理解 Scan 方法\n\n`Scan` 方法对其接收的参数数量、顺序和类型很敏感。如果参数数量与结果中的列数不匹配，或者参数无法存储结果值，则会返回一个错误，如清单\
  \ 26-12 所示。\n\n```\n...\nfunc queryDatabase(db *sql.DB) {\nrows, err := db.Query(\"\
  SELECT * from Products\")\nif (err == nil) {\nfor (rows.Next()) {\nvar id, category\
  \ int\nvar name int\nvar price float64\nscanErr := rows.Scan(&id, &name, &category,\
  \ &price)\nif (scanErr == nil) {\nPrintfln(\"Row: %v %v %v %v\", id, name, category,\
  \ price)\n} else {\nPrintfln(\"Scan error: %v\", scanErr)\nbreak\n}\n}\n} else {\n\
  Printfln(\"Error: %v\", err)\n}\n}\n...\n清单 26-12\n在 data 文件夹的 main.go 文件中不匹配的 Scan\n\
  ```\n\n清单 26-12 中对 `Scan` 方法的调用为一个在数据库中存储为 SQL `TEXT` 类型的值提供了一个 `int` 类型变量。编译并执行该项目，你会看到\
  \ `Scan` 方法返回了一个错误：\n\n```\nScan error: sql: Scan error on column index 1, name\
  \ \"Name\": converting driver.Value type string (\"Kayak\") to a int: invalid syntax\n\
  ```\n\n`Scan` 方法不会仅仅跳过导致问题的列，如果有问题，将不会扫描任何值。\n\n#### 理解 SQL 值如何被扫描\n\n`Scan` 方法最常见的问题是\
  \ SQL 数据类型与要扫描到的 Go 变量之间不匹配。`Scan` 方法在将 SQL 值映射到 Go 值时确实提供了一些灵活性。以下是最重要规则的简要总结：\n\
  \n- SQL 字符串、数值和布尔值可以映射到它们对应的 Go 类型，但需注意数值类型以防止溢出。\n- SQL 数值和布尔类型可以扫描到 Go 字符串中。\n\
  - SQL 字符串可以扫描到 Go 数值类型，但前提是该字符串可以使用常规 Go 特性（在第 5 章中描述）进行解析，并且没有溢出。\n- SQL 时间值可以扫描到\
  \ Go 字符串或 `*time.Time` 值。\n- 任何 SQL 值都可以扫描到空接口的指针（`*interface{}`），这允许你将值转换为其他类型。\n\
  \n这些是最有用的映射，但有关完整详细信息，请参阅 Go 文档中关于 `Scan` 方法的部分。通常，我倾向于保守地选择类型，并且我经常将值扫描到 Go 字符串中，然后自己解析该值以管理转换过程。清单\
