  \ 2 章了解如何获取帮助。\n\n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n)\nfunc main()\
  \ {\nfmt.Println(rand.Int())\n}\n清单 4-2\nbasicFeatures 文件夹中 main.go 文件的内容\n```\n\
  \n在命令提示符下，在 `basicFeatures` 文件夹中运行清单 4-3 所示的命令。\n\n```\ngo run .\n清单 4-3\n运行示例项目\n\
  ```\n\n`main.go` 文件中的代码将被编译并执行，产生如下输出：\n\n```\n\n```\n\n该代码的输出总是相同的值，尽管它是由随机数包生成的，我将在第\
  \ 18 章中解释原因。\n\n\n\n### 使用 Go 标准库\n\nGo 通过其*标准库*提供了一系列广泛有用的功能，标准库是用来描述内置 API 的术语。Go\
  \ 标准库以一组*包*的形式呈现，这些包是第 1 章中使用的 Go 安装程序的一部分。\n\n我将在第 12 章中描述 Go 包的创建和使用方式，但部分示例依赖于标准库中的包，因此理解它们的使用方式至关重要。\n\
  \n标准库中的每个包都汇集了一组相关功能。清单 4-2 中的代码使用了两个包：`fmt` 包提供格式化和写入字符串的功能，`math/rand` 包则处理随机数。\n\
  \n使用包的第一步是定义 `import` 语句。图 4-1 展示了清单 4-2 中使用的 `import` 语句。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig1_HTML.jpg](img/512642_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** – 导入包\n\n`import` 语句包含两部分：`import` 关键字和包路径。如果导入多个包，路径需要用括号括起来。\n\n`import`\
  \ 语句创建了一个包引用，通过它可以访问包提供的功能。包引用的名称是包路径中的最后一个片段。`fmt` 包的路径只有一个片段，因此包引用名为 `fmt`。`math/rand`\
  \ 路径有两个片段——`math` 和 `rand`——因此包引用名为 `rand`。（我将在第 12 章中解释如何选择自己的包引用名称。）\n\n`fmt`\
  \ 包定义了一个 `Println` 函数，用于将值写入标准输出；`math/rand` 包定义了一个 `Int` 函数，用于生成随机整数。要访问这些函数，我使用其包引用，后跟句点和函数名，如图\
  \ 4-2 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig2_HTML.jpg](img/512642_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** – 使用包引用\n\n**提示**  \nGo 标准库包列表可在 [`https://golang.org/pkg`](https://golang.org/pkg)\
  \ 查看。最有用的包将在第 2 部分中描述。\n\n`fmt` 包提供的一个相关功能是将静态内容与数据值组合成字符串，如清单 4-4 所示。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"math/rand\"\n)\nfunc main() {\nfmt.Println(\"\
  Value:\", rand.Int())\n}\n```\n\n**清单 4-4** – 在 `basicFeatures` 文件夹的 `main.go` 文件中组合字符串\n\
  \n传递给 `Println` 函数的逗号分隔值序列被组合成一个字符串，然后写入标准输出。要编译并执行代码，请使用命令提示符在 `basicFeatures`\
  \ 文件夹中运行清单 4-5 所示的命令。\n\n```\ngo run .\n```\n\n**清单 4-5** – 运行示例项目\n\n`main.go`\
  \ 文件中的代码将被编译并执行，产生以下输出：\n\n```\nValue: 5577006791947779410\n```\n\n还有更多有用的字符串组合方式——我将在第\
  \ 2 部分中描述——但这种方法简单实用，便于我在示例中提供输出。\n\n## 了解基本数据类型\n\nGo 提供了一组基本数据类型，如表 4-3 所示。在接下来的章节中，我将描述这些类型并解释如何使用它们。这些类型是\
  \ Go 开发的基础，其许多特性在其他语言中也会很熟悉。\n\n**表 4-3** – Go 基本数据类型\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `int` | 此类型表示整数，可正可负。`int` 类型的大小取决于平台，为 32 位或 64 位。还有特定大小的整数类型，例如 `int8`、`int16`、`int32`\
  \ 和 `int64`，但除非需要特定大小，否则应使用 `int` 类型。 |\n| `uint` | 此类型表示正整数。`uint` 类型的大小取决于平台，为\
  \ 32 位或 64 位。还有特定大小的无符号整数类型，例如 `uint8`、`uint16`、`uint32` 和 `uint64`，但除非需要特定大小，否则应使用\
  \ `uint` 类型。 |\n| `byte` | 此类型是 `uint8` 的别名，通常用于表示数据的一个字节。 |\n| `float32`、`float64`\
  \ | 这些类型表示带小数的数字。这些类型分配 32 位或 64 位来存储值。 |\n| `complex64`、`complex128` | 这些类型表示具有实部和虚部的复数。这些类型分配\
  \ 64 位或 128 位来存储值。 |\n| `bool` | 此类型表示布尔值，值为 `true` 和 `false`。 |\n| `string` | 此类型表示字符序列。\
  \ |\n| `rune` | 此类型表示单个 Unicode 码点。Unicode 很复杂，但——粗略地说——这就是单个字符的表示。`rune` 类型是 `int32`\
  \ 的别名。 |\n\n**GO 中的复数**\n\n如表 4-3 所述，Go 内置支持具有实部和虚部的复数。我记得在学校学过复数，但很快就忘光了，直到我开始阅读\
  \ Go 语言规范才重新想起。本书中不会描述复数的使用，因为它们仅在特定领域（例如电气工程）中使用。你可以在 [`https://en.wikipedia.org/wiki/Complex_number`](https://en.wikipedia.org/wiki/Complex_number)\
  \ 了解更多关于复数的信息。\n\n\n\n### 理解字面量\n\nGo 的值可以通过字面量来表示，即直接在源代码文件中定义该值。字面量的常见用途包括表达式中的操作数和函数的参数，如代码清单\
  \ 4-6 所示。\n\n**提示：** 请注意，我在代码清单 4-6 的 `import` 语句中注释掉了 `math/rand` 包。在 Go 中，导入未使用的包是一个错误。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n//\"math/rand\"\n)\nfunc main() {\nfmt.Println(\"\
  Hello, Go\")\nfmt.Println(20 + 20)\nfmt.Println(20 + 30)\n}\n```\n\n*代码清单 4-6：在\
  \ basicFeatures 文件夹的 main.go 文件中使用字面量*\n\n`main` 函数中的第一条语句使用了一个字符串字面量（由双引号表示）作为\
  \ `fmt.Println` 函数的参数。其他语句在表达式中使用了 `int` 类型的字面量，这些表达式的结果被用作 `fmt.Println` 函数的参数。编译并执行该代码，你将看到以下输出：\n\
  \n```\nHello, Go\n40\n50\n```\n\n使用字面量时无需指定类型，因为编译器会根据值的表示方式来推断其类型。为便于快速参考，表 4-4\
  \ 给出了基本类型的字面量示例。\n\n**表 4-4：字面量示例**\n\n| 类型 | 示例 |\n| --- | --- |\n| `int` | `20`,\
  \ `-20`。也可以使用十六进制（`0x14`）、八进制（`0o24`）和二进制表示法（`0b0010100`）。 |\n| `uint` | 没有 `uint`\
  \ 字面量。所有整数类型的字面量都被视为 `int` 值。 |\n| `byte` | 没有 `byte` 字面量。由于 `byte` 类型是 `uint8`\
  \ 类型的别名，字节通常表示为整数字面量（如 `101`）或 `rune` 字面量（`'e'`）。 |\n| `float64` | `20.2`, `-20.2`,\
  \ `1.2e10`, `1.2e-10`。也可以使用十六进制表示法（`0x2p10`），尽管指数部分以十进制数字表示。 |\n| `bool` | `true`,\
  \ `false`。 |\n| `string` | `\"Hello\"`。如果值用双引号括起来（`\"Hello\\n\"`），则会解释反斜杠转义的字符序列。如果值用反引号括起来（``\
  \ `Hello\\n` ``），则不会解释转义序列。 |\n| `rune` | `'A'`, `'\\n'`, `'\\u00A5'`, `'¥'`。字符、字形和转义序列用单引号（`'`\
  \ 字符）括起来。 |\n\n## 使用常量\n\n常量是特定值的名称，使其能够被重复且一致地使用。在 Go 中定义常量有两种方式：有类型常量和无类型常量。代码清单\
  \ 4-7 展示了有类型常量的使用。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"math/rand\"\n)\n\
  func main() {\nconst price float32 = 275.00\nconst tax float32 = 27.50\nfmt.Println(price\
  \ + tax)\n}\n```\n\n*代码清单 4-7：在 basicFeatures 文件夹的 main.go 文件中定义有类型常量*\n\n有类型常量使用\
  \ `const` 关键字定义，后跟名称、类型和值赋值，如图 4-3 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig3_HTML.jpg](img/512642_1_En_4_Fig3_HTML.jpg)\n\
  \n*图 4-3：定义有类型常量*\n\n该语句创建了一个名为 `price` 的 `float32` 类型常量，其值为 `275.00`。代码清单 4-7 中的代码创建了两个常量，并将它们用于传递给\
  \ `fmt.Println` 函数的表达式中。编译并运行代码，你将得到以下输出：\n\n```\n302.5\n```\n\n### 理解无类型常量\n\n\
  Go 对其数据类型有严格的规则，并且不执行自动类型转换，这可能会使常见的编程任务复杂化，如代码清单 4-8 所示。\n\n```\npackage main\n\
  import (\n\"fmt\"\n//\"math/rand\"\n)\nfunc main() {\nconst price float32 = 275.00\n\
  const tax float32 = 27.50\nconst quantity int = 2\nfmt.Println(\"Total:\", quantity\
  \ * (price + tax))\n}\n```\n\n*代码清单 4-8：在 basicFeatures 文件夹的 main.go 文件中混合数据类型*\n\
  \n新常量的类型是 `int`，对于只能表示整数数量的场景（例如产品数量）来说，这是一个合适的选择。该常量在传递给 `fmt.Println` 函数的表达式中用于计算总价。但编译该代码时，编译器报告了以下错误：\n\
  \n```\n.\\main.go:12:26: invalid operation: quantity * (price + tax) (mismatched\
  \ types int and float32)\n```\n\n大多数编程语言会自动转换类型以允许表达式求值，但 Go 更严格的方法意味着 `int` 和 `float32`\
  \ 类型不能混合使用。*无类型常量* 功能使常量的使用更加方便，因为 Go 编译器会执行有限的自动转换，如代码清单 4-9 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n//\"math/rand\"\n)\nfunc main() {\nconst price float32\
  \ = 275.00\nconst tax float32 = 27.50\nconst quantity = 2\nfmt.Println(\"Total:\"\
  , quantity * (price + tax))\n}\n```\n\n*代码清单 4-9：在 basicFeatures 文件夹的 main.go 文件中使用无类型常量*\n\
  \n无类型常量的定义不带数据类型，如图 4-4 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig4_HTML.jpg](img/512642_1_En_4_Fig4_HTML.jpg)\n\
  \n*图 4-4：定义无类型常量*\n\n在定义 `quantity` 常量时省略类型，告诉 Go 编译器它应该对该常量的类型更加灵活。当对传递给 `fmt.Println`\
  \ 函数的表达式求值时，Go 编译器会将 `quantity` 的值转换为 `float32` 类型。编译并执行代码，你将得到以下输出：\n\n```\nTotal:\
  \ 605\n```\n\n只有当值可以用目标类型表示时，无类型常量才会被转换。实际上，这意味着你可以混合使用无类型的整数和浮点数数值，但其他数据类型之间的转换必须显式执行，我将在第\
  \ 5 章中介绍。\n\n#### 理解 IOTA\n\n`iota` 关键字可用于创建一系列连续的无类型整数常量，而无需为它们单独赋值。以下是一个 `iota`\
  \ 示例：\n\n```\n...\nconst (\nWatersports = iota\nSoccer\nChess\n)\n...\n```\n\n该模式创建了一系列常量，每个常量都被赋以一个整数值，从零开始。你可以在第\
  \ 3 部分看到 `iota` 的示例。\n\n### 使用单个语句定义多个常量\n\n可以使用单个语句定义多个常量，如代码清单 4-10 所示。\n\n```\n\
  package main\nimport (\n\"fmt\"\n//\"math/rand\"\n)\nfunc main() {\nconst price,\
  \ tax float32 = 275, 27.50\nconst quantity, inStock = 2, true\nfmt.Println(\"Total:\"\
  , quantity * (price + tax))\nfmt.Println(\"In stock: \", inStock)\n}\n```\n\n*代码清单\
  \ 4-10：在 basicFeatures 文件夹的 main.go 文件中定义多个常量*\n\n`const` 关键字后跟一个逗号分隔的名称列表、一个等号和一个逗号分隔的值列表，如图\
  \ 4-5 所示。如果指定了类型，则所有常量都会以该类型创建。如果省略了类型，则会创建无类型常量，并且每个常量的类型将从其值推断而来。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig5_HTML.jpg](img/512642_1_En_4_Fig5_HTML.jpg)\n\
  \n*图 4-5：定义多个常量*\n\n编译并执行代码清单 4-10 中的代码将产生以下输出：\n\n```\nTotal: 605\nIn stock:  true\n\
  ```\n\n\n\n### 再探字面量\n\n无类型常量可能看起来像是一个奇怪的功能，但它能让 Go 语言的编程工作变得容易得多。你会发现自己经常依赖这个功能，甚至常常没有意识到，因为字面值就是无类型常量。这意味着你可以在表达式中使用字面值，并依靠编译器来处理类型不匹配的问题，如代码清单\
  \ 4-11 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"math/rand\"\n)\nfunc main()\
  \ {\nconst price, tax float32 = 275, 27.50\nconst quantity, inStock = 2, true\n\
  fmt.Println(\"Total:\", 2 * quantity * (price + tax))\nfmt.Println(\"In stock: \"\
  , inStock)\n}\n```\n\n高亮显示的表达式使用了字面值 `2`（如表格 4-4 所述，这是一个 `int` 类型值），以及两个 `float32`\
  \ 类型的值。由于 `int` 值可以表示为 `float32`，因此该值会被自动转换。编译并执行这段代码，将产生以下输出：\n\n```\nTotal: 1210\n\
  In stock:  true\n```\n\n## 使用变量\n\n变量使用 `var` 关键字定义，与常量不同，变量的值可以更改，如代码清单 4-12 所示。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nvar price float32 = 275.00\n\
  var tax float32 = 27.50\nfmt.Println(price + tax)\nprice = 300\nfmt.Println(price\
  \ + tax)\n}\n```\n\n变量使用 `var` 关键字、名称、类型和值赋值来声明，如图 4-6 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig6_HTML.jpg](img/512642_1_En_4_Fig6_HTML.jpg)\n\
  \n代码清单 4-12 定义了 `price` 和 `tax` 变量，两者都被赋值为 `float32` 类型。使用等号将新值赋给 `price` 变量，这是\
  \ Go 语言的赋值运算符，如图 4-7 所示。（请注意，我可以将值 `300` 赋给一个浮点型变量。这是因为字面值 `300` 是一个无类型常量，可以表示为\
  \ `float32` 值。）\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig7_HTML.jpg](img/512642_1_En_4_Fig7_HTML.jpg)\n\
  \n代码清单 4-12 中的代码使用 `fmt.Println` 函数向标准输出写入两个字符串，编译并执行后，将产生以下输出：\n\n```\n302.5\n\
  327.5\n```\n\n### 省略变量的数据类型\n\nGo 编译器可以根据初始值推断变量的类型，从而允许省略类型，如代码清单 4-13 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc main() {\nvar price = 275.00\nvar price2\
  \ = price\nfmt.Println(price)\nfmt.Println(price2)\n}\n```\n\n变量使用 `var` 关键字、名称和值赋值来定义，但省略了类型，如图\
  \ 4-8 所示。变量的值可以使用字面值、常量名称或其他变量名称来设置。在该代码清单中，`price` 变量的值是使用字面值设置的，而 `price2` 的值则被设置为\
  \ `price` 的当前值。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig8_HTML.jpg](img/512642_1_En_4_Fig8_HTML.jpg)\n\
  \n编译器会根据赋给变量的值来推断其类型。编译器会检查赋给 `price` 的字面值，并将其类型推断为 `float64`，如表格 4-4 所述。`price2`\
  \ 的类型也会被推断为 `float64`，因为它的值是通过 `price` 的值设置的。编译并执行代码清单 4-13 中的代码，将产生以下输出：\n\n```\n\
  \n```\n\n省略类型对于变量的效果与对于常量不同。Go 编译器不允许混合使用不同类型，如代码清单 4-14 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\nvar price = 275.00\nvar tax float32 = 27.50\nfmt.Println(price\
  \ + tax)\n}\n```\n\n编译器总是将浮点字面值的类型推断为 `float64`，这与 `tax` 变量的 `float32` 类型不匹配。Go\
  \ 语言严格的类型执行机制意味着编译代码时，编译器会产生以下错误：\n\n```\n.\\main.go:10:23: invalid operation: price\
  \ + tax (mismatched types float64 and float32)\n```\n\n要在同一表达式中使用 `price` 和 `tax`\
  \ 变量，它们必须具有相同的类型，或者可以转换为相同的类型。我将在第 5 章中解释类型转换的不同方法。\n\n### 省略变量的值赋值\n\n变量可以在没有初始值的情况下定义，如代码清单\
  \ 4-15 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nvar price float32\n\
  fmt.Println(price)\nprice = 275.00\nfmt.Println(price)\n}\n```\n\n变量使用 `var` 关键字，后跟名称和类型来定义，如图\
  \ 4-9 所示。当没有初始值时，不能省略类型。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig9_HTML.jpg](img/512642_1_En_4_Fig9_HTML.jpg)\n\
  \n以这种方式定义的变量会被赋予指定类型的*零值*，如表格 4-5 所述。\n\n基本数据类型的零值：\n\n| 类型 | 零值 |\n| --- | ---\
  \ |\n| `int` | 0 |\n| `uint` | 0 |\n| `byte` | 0 |\n| `float64` | 0 |\n| `bool`\
  \ | false |\n| `string` | \"\"（空字符串） |\n| `rune` | 0 |\n\n数字类型的零值是 0，编译并执行代码即可看到。输出中显示的第一个值是零值，接着是后续语句中显式赋的值：\n\
  \n```\n\n```\n\n### 使用单个语句定义多个变量\n\n可以使用单个语句定义多个变量，如代码清单 4-16 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc main() {\nvar price, tax = 275.00, 27.50\nfmt.Println(price\
  \ + tax)\n}\n```\n\n这与定义常量的方法相同，每个变量的初始值用于推断其类型。如果没有分配初始值，则必须指定一个类型，如代码清单 4-17 所示，所有变量都将使用指定的类型创建并赋予其零值。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nvar price, tax float64\nprice\
  \ = 275.00\ntax = 27.50\nfmt.Println(price + tax)\n}\n```\n\n编译并执行代码清单 4-16 和代码清单\
  \ 4-17 将产生相同的输出：\n\n```\n302.5\n```\n\n\n\n### 使用短变量声明语法\n\n短变量声明提供了一种声明变量的简写形式，如代码清单\
  \ 4-18 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nprice := 275.00\n\
  fmt.Println(price)\n}\n代码清单 4-18\n在 basicFeatures 文件夹的 main.go 文件中使用短变量声明语法\n```\n\
  \n这种简写语法依次指定了变量名、冒号、等号和初始值，如图 4-10 所示。这里没有使用 `var` 关键字，并且无法指定数据类型。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig10_HTML.jpg](img/512642_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n短变量声明语法\n\n当编译并执行代码清单 4-18 中的代码时，会产生以下输出：\n\n```\n\n```\n\n通过创建以逗号分隔的名称列表和值列表，可以用一条语句定义多个变量，如代码清单\
  \ 4-19 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nprice, tax, inStock\
  \ := 275.00, 27.50, true\nfmt.Println(\"Total:\", price + tax)\nfmt.Println(\"In\
  \ stock:\", inStock)\n}\n代码清单 4-19\n在 basicFeatures 文件夹的 main.go 文件中定义多个变量\n```\n\
  \n在简写语法中未指定任何类型，这意味着可以创建不同类型的变量，依靠编译器从分配给每个变量的值推断其类型。当编译并执行代码清单 4-19 中的代码时，会产生以下输出：\n\
  \n```\nTotal: 302.5\nIn stock: true\n```\n\n短变量声明语法只能在函数内部使用，例如代码清单 4-19 中的 `main`\
  \ 函数。Go 函数将在第 8 章中详细说明。\n\n### 使用短变量语法重定义变量\n\nGo 通常不允许重定义变量，但在使用短语法时做出了有限的例外。为了演示默认行为，代码清单\
  \ 4-20 使用了 `var` 关键字来定义一个变量，其名称与同一函数内已存在的变量相同。\n\n```go\npackage main\nimport \"\
  fmt\"\nfunc main() {\nprice, tax, inStock := 275.00, 27.50, true\nfmt.Println(\"\
  Total:\", price + tax)\nfmt.Println(\"In stock:\", inStock)\nvar price2, tax = 200.00,\
  \ 25.00\nfmt.Println(\"Total 2:\", price2 + tax)\n}\n代码清单 4-20\n在 basicFeatures\
  \ 文件夹的 main.go 文件中重定义一个变量\n```\n\n第一个新语句使用 `var` 关键字定义了名为 `price2` 和 `tax` 的变量。`main`\
  \ 函数中已存在一个名为 `tax` 的变量，这会导致编译代码时出现以下错误：\n\n```\n.\\main.go:10:17: tax redeclared\
  \ in this block\n```\n\n然而，如果使用短语法，则允许重定义变量，如代码清单 4-21 所示，只要至少有一个正在定义的其他变量尚不存在，并且该变量的类型不发生改变即可。\n\
  \n```go\npackage main\nimport \"fmt\"\nfunc main() {\nprice, tax, inStock := 275.00,\
  \ 27.50, true\nfmt.Println(\"Total:\", price + tax)\nfmt.Println(\"In stock:\",\
  \ inStock)\nprice2, tax := 200.00, 25.00\nfmt.Println(\"Total 2:\", price2 + tax)\n\
  }\n代码清单 4-21\n在 basicFeatures 文件夹的 main.go 文件中使用短语法\n```\n\n编译并执行该项目，你会看到以下输出：\n\
  \n```\nTotal: 302.5\nIn stock: true\nTotal 2: 225\n```\n\n### 使用空白标识符\n\n在 Go 中，定义一个变量却不使用它是非法的，如代码清单\
  \ 4-22 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nprice, tax, inStock,\
  \ discount := 275.00, 27.50, true, true\nvar salesPerson = \"Alice\"\nfmt.Println(\"\
  Total:\", price + tax)\nfmt.Println(\"In stock:\", inStock)\n}\n代码清单 4-22\n在 basicFeatures\
  \ 文件夹的 main.go 文件中定义未使用的变量\n```\n\n该代码清单定义了名为 `discount` 和 `salesperson` 的变量，这两个变量在后续代码中均未被使用。编译代码时，会报告以下错误：\n\
  \n```\n.\\main.go:6:26: discount declared but not used\n.\\main.go:7:9: salesPerson\
  \ declared but not used\n```\n\n解决此问题的一种方法是移除未使用的变量，但这并不总是可行。针对这些情况，Go 提供了*空白标识符*，用于表示一个将不会被使用的值，如代码清单\
  \ 4-23 所示。\n\n```go\npackage main\nimport \"fmt\"\nfunc main() {\nprice, tax, inStock,\
  \ _ := 275.00, 27.50, true, true\nvar _ = \"Alice\"\nfmt.Println(\"Total:\", price\
  \ + tax)\nfmt.Println(\"In stock:\", inStock)\n}\n代码清单 4-23\n在 basicFeatures 文件夹的\
  \ main.go 文件中使用空白标识符\n```\n\n空白标识符是下划线（`_` 字符），它可以用在通常使用一个名称会创建一个将来不会被使用的变量的任何地方。当编译并执行代码清单\
  \ 4-23 中的代码时，会产生以下输出：\n\n```\nTotal: 302.5\nIn stock: true\n```\n\n这是另一个看似不寻常的特性，但在使用\
  \ Go 函数时却很重要。正如我在第 8 章中所解释的，Go 函数可以返回多个结果，当你需要其中某些结果值但不需要其他结果值时，空白标识符就很有用。\n\n\n\
  \n## 理解指针\n\n指针常常被误解，尤其是当你从 Java 或 C# 这类语言转到 Go 时——这些语言在幕后使用指针，但会小心地将其对开发者隐藏。要理解指针的工作原理，最好的起点是了解\
  \ Go 在不使用指针时的情况，如代码清单 4-24 所示。\n\n> **提示**  \n> 本节最后一个示例将简单演示指针为何有用，而不仅仅是解释其用法。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nfirst := 100\nsecond := first\n\
  first++\nfmt.Println(\"First:\", first)\nfmt.Println(\"Second:\", second)\n}\n```\n\
  \n代码清单 4-24 中的代码编译并执行后会输出以下结果：\n\n```\nFirst: 101\nSecond: 100\n```\n\n代码清单 4-24\
  \ 创建了两个变量。名为 `first` 的变量通过字面量赋值。名为 `second` 的变量则使用 `first` 的值进行赋值，如下所示：\n\n```\n\
  ...\nfirst := 100\nsecond := first\n...\n```\n\n在创建 `second` 时，Go 会复制 `first` 的当前值，此后这两个变量互不依赖。每个变量都是对存储其值的独立内存位置的引用，如图\
  \ 4-11 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig11_HTML.jpg](img/512642_1_En_4_Fig11_HTML.jpg)\n\
  \n*图 4-11：独立的值*\n\n当我在代码清单 4-24 中使用 `++` 运算符递增 `first` 变量时，Go 会读取该变量关联内存位置的值，递增后将其存储回同一个内存位置。`second`\
  \ 变量所赋的值保持不变，因为这一变更仅影响 `first` 变量存储的值，如图 4-12 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig12_HTML.jpg](img/512642_1_En_4_Fig12_HTML.jpg)\n\
  \n*图 4-12：修改值*\n\n### 理解指针算术\n\n指针之所以名声不好，是因为*指针算术*。指针将内存位置存储为数值，这意味着可以使用算术运算符对其进行操作，从而访问其他内存位置。例如，你可以从一个指向\
  \ `int` 值的位置开始，将该值增加一个 `int` 所占用的位数，然后读取相邻的值。这种方法虽有用，但也可能导致意外结果，比如试图访问错误位置或超出程序分配内存范围的位置。\n\
  \nGo 不支持指针算术，这意味着不能通过指向某个位置的指针来获取其他位置。如果尝试对指针执行算术运算，编译器会报告错误。\n\n#### 定义指针\n\n指针是一种变量，其值为内存地址。代码清单\
  \ 4-25 定义了一个指针。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nfirst := 100\n\
  var second *int = &first\nfirst++\nfmt.Println(\"First:\", first)\nfmt.Println(\"\
  Second:\", second)\n}\n```\n\n指针使用与号（`&` 字符，即*取址运算符*）后跟变量名来定义，如图 4-13 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig13_HTML.jpg](img/512642_1_En_4_Fig13_HTML.jpg)\n\
  \n*图 4-13：定义指针*\n\n指针与 Go 中的其他变量类似，它们有类型和值。`second` 变量的值将是 Go 用于存储 `first` 变量值的内存地址。编译并执行代码，你会看到类似下面的输出：\n\
  \n```\nFirst: 101\nSecond: 0xc000010088\n```\n\n根据 Go 选择存储 `first` 变量值的位置不同，你可能会看到不同的输出。具体的内存位置并不重要，重要的是变量之间的关系，如图\
  \ 4-14 所示。\n\n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig14_HTML.jpg](img/512642_1_En_4_Fig14_HTML.jpg)\n\
  \n*图 4-14：指针及其内存位置*\n\n指针的类型基于创建它时所用的变量类型，并在该类型前加上星号（`*` 字符）。名为 `second` 的变量类型为\
  \ `*int`，因为它是对值为 `int` 类型的 `first` 变量应用取址运算符得到的。当你看到 `*int` 类型时，就知道它是一个变量，其值为存储\
  \ `int` 变量的内存地址。\n\n指针的类型是固定的，因为 Go 中所有类型都是固定的。这意味着，例如创建一个指向 `int` 的指针后，你可以改变它所指向的值，但不能用它来指向用于存储其他类型（如\
  \ `float64`）的内存地址。这个限制很重要——在 Go 中，指针不仅仅是内存地址，更是可能存储特定类型值的内存地址。\n\n\n\n### 跟随指针\n\
  \n*跟随指针*（*following a pointer*）指的是读取指针所指向内存地址处的值，通过使用星号（`*` 字符）来实现，如清单 4-26 所示。在本例中，我还对指针使用了短变量声明语法。Go\
  \ 会像推断其他类型一样推断指针类型。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nfirst :=\
  \ 100\nsecond := &first\nfirst++\nfmt.Println(\"First:\", first)\nfmt.Println(\"\
  Second:\", *second)\n}\n```\n\n星号告诉 Go 跟随指针并获取该内存位置的值，如图 4-15 所示。这一过程被称为*解引用*（*dereferencing*）指针。\n\
  \n![../images/512642_1_En_4_Chapter/512642_1_En_4_Fig15_HTML.jpg](img/512642_1_En_4_Fig15_HTML.jpg)\n\
  \n编译并执行清单 4-26 中的代码，将产生以下输出：\n\n```\nFirst: 101\nSecond: 101\n```\n\n一个常见的误解是认为\
  \ `first` 和 `second` 变量值相同，但实际情况并非如此。这里有两个值。有一个 `int` 值，可以通过名为 `first` 的变量访问。还有一个\
  \ `*int` 值，它存储了 `first` 值的内存地址。可以跟随这个 `*int` 值，从而访问所存储的 `int` 值。但是，由于 `*int` 值本身也是一个值，它可以独立使用，这意味着它可以赋值给其他变量、作为参数调用函数等。\n\
  \n清单 4-27 演示了指针的第一种用途：跟随指针，并递增内存位置处的值。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ main() {\nfirst := 100\nsecond := &first\nfirst++\n*second++\nfmt.Println(\"First:\"\
  , first)\nfmt.Println(\"Second:\", *second)\n}\n```\n\n编译并执行这段代码，将产生以下输出：\n\n```\n\
  First: 102\nSecond: 102\n```\n\n清单 4-28 演示了指针的第二种用途：将其本身作为一个值使用，并赋值给另一个变量。\n\n```\n\
  package main\nimport \"fmt\"\nfunc main() {\nfirst := 100\nsecond := &first\nfirst++\n\
  *second++\nvar myNewPointer *int\nmyNewPointer = second\n*myNewPointer++\nfmt.Println(\"\
  First:\", first)\nfmt.Println(\"Second:\", *second)\n}\n```\n\n第一个新语句定义了一个新变量，我使用\
  \ `var` 关键字来强调该变量类型是 `*int`，即指向 `int` 值的指针。下一条语句将 `second` 变量的值赋给新变量，这意味着 `second`\
  \ 和 `myNewPointer` 的值都是 `first` 值的内存地址。跟随任一指针访问的是同一内存位置，因此递增 `myNewPointer` 会影响通过跟随\
  \ `second` 指针所获得的值。编译并执行代码，你将看到以下输出：\n\n```\nFirst: 103\nSecond: 103\n```\n\n###\
  \ 理解指针的零值\n\n已定义但未赋值的指针，其零值为 `nil`，如清单 4-29 所示。\n\n```\npackage main\nimport \"\
  fmt\"\nfunc main() {\nfirst := 100\nvar second *int\nfmt.Println(second)\nsecond\
  \ = &first\nfmt.Println(second)\n}\n```\n\n指针 `second` 被定义但未初始化赋值，并使用 `fmt.Println`\
  \ 函数输出。接着使用地址运算符创建指向 `first` 变量的指针，并再次输出 `second` 的值。编译并执行清单 4-29 中的代码，将产生以下输出（忽略结果中的\
  \ `<` 和 `>`，这只是 `Println` 函数用来表示 `nil` 的符号）：\n\n```\n0xc000010088\n```\n\n如果跟随一个尚未赋值的指针，将会发生运行时错误，如清单\
  \ 4-30 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nfirst := 100\nvar\
  \ second *int\nfmt.Println(*second)\nsecond = &first\nfmt.Println(second == nil)\n\
  }\n```\n\n这段代码可以编译，但执行时会产生以下错误：\n\n```\npanic: runtime error: invalid memory address\
  \ or nil pointer dereference\n[signal 0xc0000005 code=0x0 addr=0x0 pc=0xec798a]\n\
  goroutine 1 [running]:\nmain.main()\nC:/basicFeatures/main.go:10 +0x2a\nexit status\
  \ 2\n```\n\n### 指向指针的指针\n\n由于指针存储的是内存地址，因此可以创建一个指针，其值是另一个指针的内存地址，如清单 4-31 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\nfunc main() {\nfirst := 100\nsecond := &first\n\
  third := &second\nfmt.Println(first)\nfmt.Println(*second)\nfmt.Println(**third)\n\
  }\n```\n\n跟随指针链的语法可能有些别扭。本例中需要两个星号。第一个星号跟随指针到内存位置，获取变量 `second` 所存储的值，这是一个 `*int`\
  \ 值。第二个星号跟随名为 `second` 的指针，从而访问变量 `first` 所存储值的内存位置。在大多数项目中你不需要这样做，但这确实很好地印证了指针的工作方式，以及如何沿着指针链找到数据值。编译并执行清单\
  \ 4-31 中的代码，将产生以下输出：\n\n```\n100\n100\n100\n```\n\n\n\n#### 理解指针为何有用\n\n人们很容易在指针的工作原理中迷失方向，而忽视它们为何能成为程序员的得力助手。指针之所以有用，是因为它们允许程序员在传递值和传递引用之间做出选择。后续章节中会有大量使用指针的示例，但为了结束本章，一个快速的演示会有所帮助。也就是说，本节中的代码清单依赖于后续章节才会解释的特性，因此您可能需要在之后回过头来再看这些示例。代码清单\
  \ 4-32 提供了一个在处理值时非常有用的示例。\n\n```\npackage main\nimport (\n\"fmt\"\n\"sort\"\n)\n\
  func main() {\nnames := [3]string {\"Alice\", \"Charlie\", \"Bob\"}\nsecondName\
  \ := names[1]\nfmt.Println(secondName)\nsort.Strings(names[:])\nfmt.Println(secondName)\n\
  }\n代码清单 4-32\n在 basicFeatures 文件夹的 main.go 文件中处理值\n```\n\n语法可能不常见，但这个示例很简单。创建了一个包含三个字符串值的数组，并将位置\
  \ 1 的值赋给一个名为 `secondName` 的变量。`secondName` 变量的值被写入控制台，然后数组被排序，`secondName` 变量的值再次被写入控制台。编译并执行此代码会产生以下输出：\n\
  \n```\nCharlie\nCharlie\n```\n\n当创建 `secondName` 变量时，数组中位置 1 的字符串值被复制到一个新的内存位置，这就是该值不受排序操作影响的原因。因为值已被复制，所以它现在与数组完全无关，对数组进行排序不会影响\
  \ `secondName` 变量的值。\n\n代码清单 4-33 为该示例引入了一个指针变量。\n\n```\npackage main\nimport (\n\
  \"fmt\"\n\"sort\"\n)\nfunc main() {\nnames := [3]string {\"Alice\", \"Charlie\"\
  , \"Bob\"}\nsecondPosition := &names[1]\nfmt.Println(*secondPosition)\nsort.Strings(names[:])\n\
  fmt.Println(*secondPosition)\n}\n代码清单 4-33\n在 basicFeatures 文件夹的 main.go 文件中使用指针\n\
  ```\n\n当创建 `secondPosition` 变量时，其值是用于存储数组中位置 1 的 `string` 值的内存地址。当数组被排序时，数组中条目的顺序发生了变化，但指针仍然指向位置\
  \ 1 的内存地址，这意味着通过该指针返回的是排序后的值，当代码被编译并执行时，会产生以下输出：\n\n```\nCharlie\nBob\n```\n\n指针意味着我可以保持对位置\
  \ 1 的引用，这种方式能够访问当前的值，从而反映对数组内容所做的任何更改。这是一个简单的例子，但它展示了指针如何为开发者提供在复制值和使用引用之间进行选择的灵活性。\n\
  \n如果您仍然对指针感到不确定，那么可以考虑一下您熟悉的其他语言是如何处理值与引用的问题的。例如，我经常使用的 `C#` 既支持通过值传递的结构体（struct），也支持通过引用传递的类实例。Go\
  \ 和 `C#` 都让我可以选择是使用副本还是引用。区别在于 `C#` 让我在创建数据类型时一次性做出选择，而 Go 则让我在每次使用值时做出选择。Go 的方法更灵活，但需要程序员做更多的考量。\n\
  \n## 本章小结\n\n在本章中，我介绍了 Go 提供的基本内置类型，这些类型构成了几乎所有语言特性的基础。我解释了如何使用完整语法和简短语法来定义常量和变量；演示了无类型常量的使用；并描述了\
  \ Go 中指针的用法。在下一章中，我将介绍可以对内置数据类型执行的操作，并解释如何将值从一种类型转换为另一种类型。\n\n# 5. 操作与类型转换\n\n在本章中，我将介绍\
  \ Go 的运算符，这些运算符用于执行算术运算、比较值以及创建产生 `true`/`false` 结果的逻辑表达式。我还将解释将值从一种类型转换为另一种类型的过程，这可以通过结合使用内置语言特性和\
  \ Go 标准库提供的功能来完成。表 5-1 将 Go 的操作和类型转换置于上下文中。\n\n**表 5-1** 操作与类型转换的应用场景\n\n| 问题 |\
  \ 答案 |\n| --- | --- |\n| 它们是什么？ | 基本操作用于算术运算、比较运算和逻辑判断。类型转换功能允许将一种类型的值表示为另一种类型。\
  \ |\n| 它们为什么有用？ | 几乎每个编程任务都需要基本操作，很难编写不包含它们的代码。因为 Go 严格的类型规则阻止不同类型的值一起使用，所以类型转换功能非常有用。\
  \ |\n| 如何使用它们？ | 基本操作通过运算符来应用，这些运算符与其他语言中使用的类似。类型转换要么通过使用 Go 的显式转换语法，要么通过使用 Go 标准库包提供的功能来执行。\
  \ |\n| 有没有什么陷阱或限制？ | 任何转换过程都可能导致精度损失，因此必须小心，确保转换值不会产生比任务所需精度更低的结果。 |\n| 有替代方案吗？\
  \ | 没有。本章描述的特性是 Go 开发的基础。|\n\n**表 5-2** 本章摘要\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | ---\
  \ | --- |\n| 执行算术运算 | 使用算术运算符 | 4–7 |\n| 拼接字符串 | 使用 `+` 运算符 | 8 |\n| 比较两个值 | 使用比较运算符\
  \ | 9–11 |\n| 组合表达式 | 使用逻辑运算符 | 12 |\n| 从一种类型转换为另一种类型 | 执行显式转换 | 13–15 |\n| 将浮点值转换为整数\
  \ | 使用 `math` 包定义的函数 | 16 |\n| 将字符串解析为另一种数据类型 | 使用 `strconv` 包定义的函数 | 17–28 |\n\
  | 将值表示为字符串 | 使用 `strconv` 包定义的函数 | 29–32 |\n\n## 本章准备工作\n\n为准备本章内容，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `operations` 的目录。运行代码清单 5-1 中所示的命令来初始化项目。\n\n**提示** 你可以从 `https://github.com/apress/pro-go`\
  \ 下载本章——以及本书所有其他章节——的示例项目。如果运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init operations\n\
  代码清单 5-1\n初始化项目\n```\n\n在 `operations` 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 5-2 所示。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nfmt.Println(\"Hello, Operations\"\
  )\n}\n代码清单 5-2\noperations 文件夹中 main.go 文件的内容\n```\n\n在命令提示符下，转到 `operations` 文件夹并运行代码清单\
  \ 5-3 中所示的命令。\n\n```\ngo run .\n代码清单 5-3\n运行示例项目\n```\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\
  \n```\nHello, Operations\n```\n\n\n\n## 理解 Go 语言运算符\n\nGo 语言提供了一套标准的运算符，表 5-3 描述了最常用的一些运算符，尤其是处理第\
  \ 4 章所述数据类型时会经常用到。\n\n### 表 5-3 Go 语言基本运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `+`,\
  \ `-`, `*`, `/`, `%` | 用于对数值进行算术运算，详见“理解算术运算符”一节。`+` 运算符也可用于字符串拼接，详见“拼接字符串”一节。 |\n\
  | `==`, `!=`, `<`, `<=`, `>`, `>=` | 用于比较两个值，详见“理解比较运算符”一节。 |\n| `\\|\\|`, `&&`,\
  \ `!` | 逻辑运算符，应用于 `bool` 值并返回 `bool` 类型结果，详见“理解逻辑运算符”一节。 |\n| `=`, `:=` | 赋值运算符。标准赋值运算符（`=`）用于在定义常量或变量时设置初始值，或更改已定义变量的值。短变量声明运算符（`:=`）用于定义变量并赋值，详见第\
  \ 4 章。 |\n| `-=`, `+=`, `++`, `--` | 用于递增和递减数值，详见“使用递增和递减运算符”一节。 |\n| `&`, `\\|`,\
  \ `^`, `&^`, `<<`, `>>` | 位运算符，应用于整型值。这些运算符在主流开发中不常用，但可在第 31 章中看到示例，其中使用 `\\|` 运算符配置\
  \ Go 语言的日志功能。 |\n\n## 理解算术运算符\n\n算术运算符可应用于数值数据类型（`float32`、`float64`、`int`、`uint`\
  \ 以及第 4 章描述的特定尺寸类型）。例外是取余运算符（`%`），它只能用于整数。表 5-4 描述了算术运算符。\n\n### 表 5-4 算术运算符\n\n\
  | 运算符 | 描述 |\n| --- | --- |\n| `+` | 返回两个操作数之和。 |\n| `-` | 返回两个操作数之差。 |\n| `*` |\
  \ 返回两个操作数之积。 |\n| `/` | 返回两个操作数之商。 |\n| `%` | 返回余数，类似于其他编程语言提供的取模运算符，但可以返回负值，详见“使用取余运算符”一节。\
  \ |\n\n与算术运算符一起使用的值必须为相同类型（例如全部是 `int` 值），或者可以用相同类型表示，例如无类型数值常量。代码清单 5-4 演示了算术运算符的使用。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nprice, tax := 275.00, 27.40\n\
  sum := price + tax\ndifference := price - tax\nproduct := price * tax\nquotient\
  \ := price / tax\nfmt.Println(sum)\nfmt.Println(difference)\nfmt.Println(product)\n\
  fmt.Println(quotient)\n}\n代码清单 5-4\n在 operations 文件夹的 main.go 文件中使用算术运算符\n```\n\n\
  编译并执行代码清单 5-4 中的代码将产生以下输出：\n\n```\n302.4\n247.6\n10.036496350364963\n```\n\n####\
  \ 理解算术溢出\n\nGo 语言允许整数值通过回绕的方式溢出，而不是报错。浮点数值会溢出到正无穷或负无穷。代码清单 5-5 展示了两种数据类型的溢出情况。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"math\"\n)\nfunc main() {\nvar intVal =\
  \ math.MaxInt64\nvar floatVal = math.MaxFloat64\nfmt.Println(intVal * 2)\nfmt.Println(floatVal\
  \ * 2)\nfmt.Println(math.IsInf((floatVal * 2), 0))\n}\n代码清单 5-5\n在 operations 文件夹的\
  \ main.go 文件中使数值溢出\n```\n\n最容易故意造成溢出的方法是使用 `math` 包，它是 Go 标准库的一部分。我将在第 18 章更详细地描述该包，但本章我只关注每个数据类型可表示的最小值和最大值的常量，以及\
  \ `IsInf` 函数，该函数可用于确定浮点值是否已溢出到无穷大。在代码清单中，我使用 `MaxInt64` 和 `MaxFloat64` 常量设置了两个变量的值，然后在传递给\
  \ `fmt.Println` 函数的表达式中使它们溢出。编译并执行该代码清单将产生以下输出：\n\n```\n-2\n+Inf\ntrue\n```\n\n\
  整数值回绕后产生 `-2`，浮点数值溢出到 `+Inf`，表示正无穷。`math.IsInf` 函数用于检测无穷大。\n\n### 使用取余运算符\n\nGo\
  \ 语言提供 `%` 运算符，当一个整数值被另一个整数除时，该运算符返回余数。这经常被误认为是其他编程语言（如 Python）提供的取模运算符，但与之不同的是，Go\
  \ 语言的取余运算符可以返回负值，如代码清单 5-6 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"math\"\
  \n)\nfunc main() {\nposResult := 3 % 2\nnegResult := -3 % 2\nabsResult := math.Abs(float64(negResult))\n\
  fmt.Println(posResult)\nfmt.Println(negResult)\nfmt.Println(absResult)\n}\n代码清单\
  \ 5-6\n在 operations 文件夹的 main.go 文件中使用取余运算符\n```\n\n取余运算符在两个表达式中使用，以演示可以产生正负结果。`math`\
  \ 包提供了 `Abs` 函数，该函数返回 `float64` 类型的绝对值，但结果也是 `float64` 类型。编译并执行代码清单 5-6 中的代码将产生以下输出：\n\
  \n```\n1\n-1\n1\n```\n\n### 使用递增和递减运算符\n\nGo 语言提供了一组用于递增和递减数值的运算符，如代码清单 5-7 所示。这些运算符可应用于整数和浮点数。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main() {\nvalue\
  \ := 10.2\nvalue++\nfmt.Println(value)\nvalue += 2\nfmt.Println(value)\nvalue -=\
  \ 2\nfmt.Println(value)\nvalue--\nfmt.Println(value)\n}\n代码清单 5-7\n在 operations\
  \ 文件夹的 main.go 文件中使用递增和递减运算符\n```\n\n`++` 和 `--` 运算符将值递增或递减 1。`+=` 和 `-=` 将值按指定量递增或递减。这些操作受前述溢出行为的影响，但在其他方面与其他语言中的类似运算符一致，只是\
  \ `++` 和 `--` 运算符只能是后置的，这意味着不支持 `--value` 这样的表达式。编译并执行代码清单 5-7 中的代码将产生以下输出：\n\n\
  ```\n11.2\n13.2\n11.2\n10.2\n```\n\n\n\n### 拼接字符串\n\n`+` 运算符可用于拼接字符串以生成更长的字符串，如代码清单\
  \ 5-8 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main()\
  \ {\ngreeting := \"Hello\"\nlanguage := \"Go\"\ncombinedString := greeting + \"\
  , \" + language\nfmt.Println(combinedString)\n}\n代码清单 5-8\n在 operations 文件夹的 main.go\
  \ 文件中拼接字符串\n```\n\n`+` 运算符的结果是一个新字符串，代码清单 5-8 中的代码在编译并执行后会产生以下输出：\n\n```\nHello,\
  \ Go\n```\n\nGo 不会将字符串与其他数据类型拼接，但标准库中确实包含一些函数，可以从不同类型的值组合出字符串，详见第 17 章。\n\n## 理解比较运算符\n\
  \n比较运算符用于比较两个值，如果它们相同则返回 `bool` 值 `true`，否则返回 `false`。表 5-5 描述了每个运算符执行的比较操作。\n\n\
  **表 5-5**  \n比较运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `==` | 如果操作数相等，此运算符返回 `true`。\
  \ |\n| `!=` | 如果操作数不相等，此运算符返回 `true`。 |\n| `<` | 如果第一个操作数小于第二个操作数，此运算符返回 `true`。\
  \ |\n| `>` | 如果第一个操作数大于第二个操作数，此运算符返回 `true`。 |\n| `<=` | 如果第一个操作数小于或等于第二个操作数，此运算符返回\
  \ `true`。 |\n| `>=` | 如果第一个操作数大于或等于第二个操作数，此运算符返回 `true`。 |\n\n与比较运算符一起使用的值必须属于同一类型，或者必须是可表示为目标类型的无类型常量，如代码清单\
  \ 5-9 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main()\
  \ {\nfirst := 100\nconst second = 200.00\nequal := first == second\nnotEqual :=\
  \ first != second\nlessThan := first < second\nlessThanOrEqual := first <= second\n\
  greaterThan := first > second\ngreaterThanOrEqual := first >= second\nfmt.Println(equal)\n\
  fmt.Println(notEqual)\nfmt.Println(lessThan)\nfmt.Println(lessThanOrEqual)\nfmt.Println(greaterThan)\n\
  fmt.Println(greaterThanOrEqual)\n}\n代码清单 5-9\n在 operations 文件夹的 main.go 文件中使用无类型常量\n\
  ```\n\n无类型常量是一个浮点值，但可以表示为整数值，因为其小数部分为零。这使得变量 `first` 和常量 `second` 可以在比较中一起使用。例如，对于常量值\
  \ `200.01`，这是不可能的，因为浮点值无法在不舍弃小数部分并创建不同值的情况下表示为整数。对此，需要进行显式转换，本章稍后将介绍。代码清单 5-9 中的代码在编译并执行后会产生以下输出：\n\
  \n```\nfalse\ntrue\ntrue\ntrue\nfalse\nfalse\n```\n\n**执行三元比较**\n\nGo 没有提供三元运算符，这意味着不能使用像这样的表达式：\n\
  \n```\n...\nmax := first > second ? first : second\n...\n```\n\n相反，需要将表 5-5 中描述的比较运算符之一与\
  \ `if` 语句一起使用，如下所示：\n\n```\n...\nvar max int\nif (first > second) {\nmax = first\n\
  } else {\nmax = second\n}\n...\n```\n\n这种语法不够简洁，但和 Go 的许多特性一样，你会很快习惯在没有三元表达式的情况下工作。\n\
  \n#### 比较指针\n\n可以比较指针，看它们是否指向同一内存位置，如代码清单 5-10 所示。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n//    \"math\"\n)\nfunc main() {\nfirst := 100\nsecond := &first\n\
  third := &first\nalpha := 100\nbeta := &alpha\nfmt.Println(second == third)\nfmt.Println(second\
  \ == beta)\n}\n代码清单 5-10\n在 operations 文件夹的 main.go 文件中比较指针\n```\n\nGo 的相等运算符（`==`）用于比较内存位置。在代码清单\
  \ 5-10 中，名为 `second` 和 `third` 的指针都指向同一位置，因此相等。名为 `beta` 的指针指向一个不同的内存位置。代码清单 5-10\
  \ 中的代码在编译并执行后会产生以下输出：\n\n```\ntrue\nfalse\n```\n\n重要的是要理解，比较的是内存位置，而不是它们存储的值。如果你想比较值，那么应该解引用指针，如代码清单\
  \ 5-11 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main()\
  \ {\nfirst := 100\nsecond := &first\nthird := &first\nalpha := 100\nbeta := &alpha\n\
  fmt.Println(*second == *third)\nfmt.Println(*second == *beta)\n}\n代码清单 5-11\n在 operations\
  \ 文件夹的 main.go 文件中解引用指针进行比较\n```\n\n这些比较解引用指针，以比较所引用内存位置中存储的值，当代码编译并执行后会产生以下输出：\n\
  \n```\ntrue\ntrue\n```\n\n## 理解逻辑运算符\n\n逻辑运算符用于比较 `bool` 值，如表 5-6 所述。这些运算符产生的结果可以赋值给变量，或用作流程控制表达式的一部分，我将在第\
  \ 6 章中介绍。\n\n**表 5-6**  \n逻辑运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `&#124;&#124;`\
  \ | 如果任一操作数为 `true`，此运算符返回 `true`。如果第一个操作数为 `true`，则不会评估第二个操作数。 |\n| `&&` | 如果两个操作数都为\
  \ true，此运算符返回 `true`。如果第一个操作数为 `false`，则不会评估第二个操作数。 |\n| `!` | 此运算符与单个操作数一起使用。如果操作数为\
  \ `false`，则返回 `true`；如果操作数为 `true`，则返回 `false`。 |\n\n代码清单 5-12 展示了如何使用逻辑运算符生成值并将其赋值给变量。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main() {\nmaxMph\
  \ := 50\npassengerCapacity := 4\nairbags := true\nfamilyCar := passengerCapacity\
  \ > 2 && airbags\nsportsCar := maxMph > 100 || passengerCapacity == 2\ncanCategorize\
  \ := !familyCar && !sportsCar\nfmt.Println(familyCar)\nfmt.Println(sportsCar)\n\
  fmt.Println(canCategorize)\n}\n代码清单 5-12\n在 operations 文件夹的 main.go 文件中使用逻辑运算符\n\
  ```\n\n只有 `bool` 值才能与逻辑运算符一起使用，Go 不会尝试转换值来获取 `true` 或 `false` 结果。如果逻辑运算符的操作数是一个表达式，则会计算该表达式以生成用于比较的\
  \ `bool` 结果。代码清单 5-12 中的代码在编译并执行后会产生以下输出：\n\n```\ntrue\nfalse\nfalse\n```\n\nGo\
  \ 在使用逻辑运算符时会短路评估过程，这意味着会评估最少数量的值来产生结果。对于 `&&` 运算符，当遇到 `false` 值时停止评估。对于 `||` 运算符，当遇到\
  \ `true` 值时停止评估。在这两种情况下，后续的值都无法改变操作的结果，因此不需要进行额外的评估。\n\n\n\n## 转换、解析和格式化值\n\nGo\
  \ 语言不允许在运算中混用类型，并且不会自动转换类型（无类型常量除外）。为了展示编译器对混合数据类型的响应，清单 5-13 包含了一条对不同类型值应用加法运算符的语句。（你可能会发现代码编辑器自动更正了清单\
  \ 5-13 中的代码，你可能需要撤销更正，以使编辑器中的代码与清单匹配，从而看到编译器错误。）\n\n```\npackage main\nimport (\n\
  \"fmt\"\n//    \"math\"\n)\nfunc main() {\nkayak := 275\nsoccerBall := 19.50\ntotal\
  \ := kayak + soccerBall\nfmt.Println(total)\n}\n```\n\n用于定义 `kayak` 和 `soccerBall`\
  \ 变量的字面量值会产生一个 `int` 值和一个 `float64` 值，然后它们被用于加法运算来设置 `total` 变量的值。编译代码时，会报告以下错误：\n\
  \n```\n.\\main.go:13:20: invalid operation: kayak + soccerBall (mismatched types\
  \ int and float64)\n```\n\n对于这样一个简单的例子，我只需将用于初始化 `kayak` 变量的字面量值改为 `275.00`，这会产生一个\
  \ `float64` 变量。但在实际项目中，类型很少能这么容易更改，这正是 Go 语言提供后续章节所描述特性的原因。\n\n### 执行显式类型转换\n\n\
  *显式转换*会转换一个值，以改变其类型，如清单 5-14 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//   \
  \ \"math\"\n)\nfunc main() {\nkayak := 275\nsoccerBall := 19.50\ntotal := float64(kayak)\
  \ + soccerBall\nfmt.Println(total)\n}\n```\n\n显式转换的语法是 `T(x)`，其中 `T` 是目标类型，`x` 是要转换的值或表达式。在清单\
  \ 5-14 中，我使用显式转换从 `kayak` 变量生成一个 `float64` 值，如图 5-1 所示。\n\n![../images/512642_1_En_5_Chapter/512642_1_En_5_Fig1_HTML.jpg](img/512642_1_En_5_Fig1_HTML.jpg)\n\
  \n类型的显式转换\n\n转换为 `float64` 值意味着加法运算中的类型是一致的。清单 5-14 中的代码编译并执行后，会生成以下输出：\n\n```\n\
  294.5\n```\n\n#### 理解显式转换的局限性\n\n仅当值能够在目标类型中*表示*时才能使用显式转换。这意味着你可以在数值类型之间以及字符串和 rune\
  \ 之间进行转换，但其他组合，例如将 `int` 值转换为 `bool` 值，则不受支持。\n\n选择要转换的值时必须小心，因为显式转换可能导致数值精度丢失或溢出，如清单\
  \ 5-15 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//    \"math\"\n)\nfunc main()\
  \ {\nkayak := 275\nsoccerBall := 19.50\ntotal := kayak + int(soccerBall)\nfmt.Println(total)\n\
  fmt.Println(int8(total))\n}\n```\n\n此清单将 `float64` 值转换为 `int` 以进行加法运算，并另外将 `int`\
  \ 转换为 `int8`（如第 4 章所述，这是一种分配了 8 位存储空间的有符号整数类型）。该代码编译并执行后，会生成以下输出：\n\n```\n\n```\n\
  \n当从浮点数转换为整数时，值的小数部分会被丢弃，因此浮点数 `19.50` 变成了 `int` 值 `19`。丢弃小数部分是为什么 `total` 变量的值是\
  \ `294`，而不是上一节中产生的 `294.5` 的原因。\n\n第二个显式转换中使用的 `int8` 太小，无法表示 `int` 值 `294`，因此变量溢出，如前面“理解算术溢出”部分所述。\n\
  \n### 将浮点值转换为整数\n\n如前例所示，显式转换可能产生意外结果，尤其是在将浮点值转换为整数时。最安全的方法是向相反方向转换，即表示整数和浮点值。但如果这不可行，那么\
  \ `math` 包提供了一组有用的函数，可以受控地进行转换，如表 5-7 所述。\n\n表 5-7：`math` 包中用于转换数值类型的函数\n\n| 函数\
  \ | 描述 |\n| --- | --- |\n| `Ceil(value)` | 此函数返回大于指定浮点值的最小整数。例如，大于 `27.1` 的最小整数是\
  \ `28`。 |\n| `Floor(value)` | 此函数返回小于指定浮点值的最大整数。例如，小于 `27.1` 的最大整数是 `28`。 |\n| `Round(value)`\
  \ | 此函数将指定的浮点值四舍五入到最接近的整数。 |\n| `RoundToEven(value)` | 此函数将指定的浮点值四舍五入到最接近的偶数整数。\
  \ |\n\n表中描述的函数返回 `float64` 值，然后可以将其显式转换为 `int` 类型，如清单 5-16 所示。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"math\"\n)\nfunc main() {\nkayak := 275\nsoccerBall := 19.50\n\
  total := kayak + int(math.Round(soccerBall))\nfmt.Println(total)\n}\n```\n\n`math.Round`\
  \ 函数会将 `soccerBall` 值从 `19.5` 四舍五入到 `20`，然后将其显式转换为 `int` 并用于加法运算。清单 5-16 中的代码编译并执行后，会生成以下输出：\n\
  \n```\n\n```\n\n\n\n#### 从字符串解析\n\nGo 标准库包含 `strconv` 包，该包提供了将 `string` 值转换为其他基本数据类型的函数。表\
  \ 5-8 描述了用于将字符串解析为其他数据类型的函数。\n\n**表 5-8.** 将字符串解析为其他数据类型的函数\n\n| 函数 | 描述 |\n| ---\
  \ | --- |\n| `ParseBool(str)` | 该函数将字符串解析为 `bool` 值。可识别的字符串值有 `\"true\"`、`\"false\"\
  `、`\"TRUE\"`、`\"FALSE\"`、`\"True\"`、`\"False\"`、`\"T\"`、`\"F\"`、`\"0\"` 和 `\"1\"\
  `。 |\n| `ParseFloat(str, size)` | 该函数将字符串解析为具有指定大小的浮点值，详见“解析浮点数”一节。 |\n| `ParseInt(str,\
  \ base, size)` | 该函数将字符串解析为具有指定基数和大小的 `int64` 值。可接受的基数有 2（二进制）、8（八进制）、16（十六进制）和\
  \ 10，详见“解析整数”一节。 |\n| `ParseUint(str, base, size)` | 该函数将字符串解析为具有指定基数和大小的无符号整数值。\
  \ |\n| `Atoi(str)` | 该函数将字符串解析为基数为 10 的 `int` 值，相当于调用 `ParseInt(str, 10, 0)`，详见“使用整数便捷函数”一节。\
  \ |\n\n代码清单 5-17 展示了如何使用 `ParseBool` 函数将字符串解析为 `bool` 值。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"true\"\nval2 := \"false\"\
  \nval3 := \"not true\"\nbool1, b1err := strconv.ParseBool(val1)\nbool2, b2err :=\
  \ strconv.ParseBool(val2)\nbool3, b3err := strconv.ParseBool(val3)\nfmt.Println(\"\
  Bool 1\", bool1, b1err)\nfmt.Println(\"Bool 2\", bool2, b2err)\nfmt.Println(\"Bool\
  \ 3\", bool3, b3err)\n}\n代码清单 5-17\n在 operations 文件夹的 main.go 文件中解析字符串\n```\n\n\
  正如我在第 6 章中解释的那样，Go 函数可以产生多个结果值。表 5-8 中描述的函数返回两个结果值：解析结果和一个错误，如图 5-2 所示。\n\n![../images/512642_1_En_5_Chapter/512642_1_En_5_Fig2_HTML.jpg](img/512642_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** 解析字符串\n\n你可能习惯于使用抛出异常来报告问题的语言，这些异常可以通过专门的 `catch` 等关键字捕获并处理。Go 的做法是将错误赋值给表\
  \ 5-8 中函数产生的第二个结果。如果错误结果为 `nil`，则表示字符串已成功解析。如果错误结果不是 `nil`，则解析失败。你可以通过编译并执行代码清单\
  \ 5-17 中的代码来查看成功和失败解析的示例，该代码会生成以下输出：\n\n```\nBool 1 true \nBool 2 false \nBool 3\
  \ false strconv.ParseBool: parsing \"not true\": invalid syntax\n```\n\n前两个字符串被解析为\
  \ `true` 和 `false` 值，并且这两个函数调用的错误结果均为 `nil`。第三个字符串不在表 5-8 描述的可识别值列表中，因此无法解析。对于此操作，错误结果提供了问题的详细信息。\n\
  \n必须要检查错误结果，因为当字符串无法解析时，另一个结果将默认返回零值。如果你不检查错误结果，就无法区分从字符串正确解析出的 `false` 值和因解析失败而使用的零值。对错误的检查通常使用\
  \ `if`/`else` 关键字来完成，如代码清单 5-18 所示。我在第 6 章中描述了 `if` 关键字及相关特性。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"0\"\nbool1, b1err :=\
  \ strconv.ParseBool(val1)\nif b1err == nil {\nfmt.Println(\"Parsed value:\", bool1)\n\
  } else {\nfmt.Println(\"Cannot parse\", val1)\n}\n}\n代码清单 5-18\n在 operations 文件夹的\
  \ main.go 文件中检查错误\n```\n\n`if`/`else` 块允许将零值与成功处理能够解析为 `false` 值的字符串区分开来。正如我在第 6\
  \ 章中解释的那样，Go 的 `if` 语句可以定义一个初始化语句，这使得可以在单个语句中调用转换函数并检查其结果，如代码清单 5-19 所示。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"0\"\n\
  if bool1, b1err := strconv.ParseBool(val1); b1err == nil {\nfmt.Println(\"Parsed\
  \ value:\", bool1)\n} else {\nfmt.Println(\"Cannot parse\", val1)\n}\n}\n代码清单 5-19\n\
  在 operations 文件夹的 main.go 文件中用单个语句检查错误\n```\n\n当编译并执行项目时，代码清单 5-18 和代码清单 5-19 均会生成以下输出：\n\
  \n```\nParsed value: false\n```\n\n\n\n### 解析整数\n\n`ParseInt` 和 `ParseUint` 函数需要指定字符串所表示数字的进制，以及用于表示解析值的数据类型大小，如代码清单\
  \ 5-20 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main()\
  \ {\nval1 := \"100\"\nint1, int1err := strconv.ParseInt(val1, 0, 8)\nif int1err\
  \ == nil {\nfmt.Println(\"Parsed value:\", int1)\n} else {\nfmt.Println(\"Cannot\
  \ parse\", val1)\n}\n}\n```\n\n**代码清单 5-20**：在 `operations` 文件夹的 `main.go` 文件中解析整数\n\
  \n`ParseInt` 函数的第一个参数是要解析的字符串。第二个参数是数字的进制，如果设为 0，则让函数根据字符串前缀自动检测进制。最后一个参数是用于存放解析值的数据类型大小。在这个示例中，我让函数自动检测进制，并指定大小为\
  \ 8。\n\n编译并执行代码清单 5-20 中的代码，你将看到以下输出，显示了解析后的整数值：\n\n```\nParsed value: 100\n```\n\
  \n你可能会认为指定大小会改变结果的类型，但事实并非如此，该函数始终返回 `int64` 类型。这个大小仅指定了解析值必须能够容纳的数据大小。如果字符串值包含的数字无法在指定大小内表示，则解析会失败。在代码清单\
  \ 5-21 中，我将字符串值改成了一个更大的数字。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strconv\"\
  \n)\nfunc main() {\nval1 := \"500\"\nint1, int1err := strconv.ParseInt(val1, 0,\
  \ 8)\nif int1err == nil {\nfmt.Println(\"Parsed value:\", int1)\n} else {\nfmt.Println(\"\
  Cannot parse\", val1, int1err)\n}\n}\n```\n\n**代码清单 5-21**：在 `operations` 文件夹的 `main.go`\
  \ 文件中增加数值\n\n字符串 `\"500\"` 可以解析为整数，但它太大，无法表示为 8 位值，而 8 位正是 `ParseInt` 参数指定的大小。编译并执行代码后，输出显示了函数返回的错误：\n\
  \n```\nCannot parse 500 strconv.ParseInt: parsing \"500\": value out of range\n\
  ```\n\n这看似是一种间接的方法，但它允许 Go 在确保可以安全地对成功解析的结果执行显式转换的同时，维持其类型规则，如代码清单 5-22 所示。\n\n\
  ```go\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"\
  100\"\nint1, int1err := strconv.ParseInt(val1, 0, 8)\nif int1err == nil {\nsmallInt\
  \ := int8(int1)\nfmt.Println(\"Parsed value:\", smallInt)\n} else {\nfmt.Println(\"\
  Cannot parse\", val1, int1err)\n}\n}\n```\n\n**代码清单 5-22**：在 `operations` 文件夹的 `main.go`\
  \ 文件中显式转换结果\n\n在调用 `ParseInt` 函数时指定大小为 8，使我能够安全地执行到 `int8` 类型的显式转换，而不会发生溢出。编译并执行代码清单\
  \ 5-22 中的代码，将产生以下输出：\n\n```\nParsed value: 100\n```\n\n### 解析二进制、八进制和十六进制整数\n\n\
  `Parse<Type>` 函数接收的 `base` 参数允许解析非十进制数字字符串，如代码清单 5-23 所示。\n\n```go\npackage main\n\
  import (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"100\"\nint1, int1err\
  \ := strconv.ParseInt(val1, 2, 8)\nif int1err == nil {\nsmallInt := int8(int1)\n\
  fmt.Println(\"Parsed value:\", smallInt)\n} else {\nfmt.Println(\"Cannot parse\"\
  , val1, int1err)\n}\n}\n```\n\n**代码清单 5-23**：在 `operations` 文件夹的 `main.go` 文件中解析二进制值\n\
  \n字符串 `\"100\"` 可以解析为十进制数值 100，但它也可能表示二进制数值 4。通过使用 `ParseInt` 函数的第二个参数，我可以指定基数为\
  \ `2`，这意味着该字符串将被解释为二进制值。编译并执行代码，你将看到从二进制字符串解析出的数字的十进制表示形式：\n\n```\nParsed value:\
  \ 4\n```\n\n你也可以让 `Parse<Type>` 函数使用前缀来自动检测值的进制，如代码清单 5-24 所示。\n\n```go\npackage\
  \ main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"0b1100100\"\n\
  int1, int1err := strconv.ParseInt(val1, 0, 8)\nif int1err == nil {\nsmallInt :=\
  \ int8(int1)\nfmt.Println(\"Parsed value:\", smallInt)\n} else {\nfmt.Println(\"\
  Cannot parse\", val1, int1err)\n}\n}\n```\n\n**代码清单 5-24**：在 `operations` 文件夹的 `main.go`\
  \ 文件中使用前缀\n\n表 5-8 中描述的函数可以根据解析值的前缀来确定其进制。表 5-9 描述了所支持的前缀集合。\n\n**表 5-9：** 数字字符串的进制前缀\n\
  \n| 前缀 | 描述 |\n| --- | --- |\n| `0b` | 此前缀表示二进制值，例如 `0b1100100`。 |\n| `0o` | 此前缀表示八进制值，例如\
  \ `0o144`。 |\n| `0x` | 此前缀表示十六进制值，例如 `0x64`。 |\n\n代码清单 5-24 中的字符串带有 `0b` 前缀，这表示一个二进制值。编译并执行代码，将产生以下输出：\n\
  \n```\nParsed value: 100\n```\n\n#### 使用整数便捷函数\n\n对于许多项目而言，最常见的解析任务是从包含十进制数字的字符串创建\
  \ `int` 值，如代码清单 5-25 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n\
  )\nfunc main() {\nval1 := \"100\"\nint1, int1err := strconv.ParseInt(val1, 10, 0)\n\
  if int1err == nil {\nvar intResult int = int(int1)\nfmt.Println(\"Parsed value:\"\
  , intResult)\n} else {\nfmt.Println(\"Cannot parse\", val1, int1err)\n}\n}\n```\n\
  \n**代码清单 5-25**：在 `operations` 文件夹的 `main.go` 文件中执行常见的解析任务\n\n这是一个非常常见的任务，因此 `strconv`\
  \ 包提供了 `Atoi` 函数，该函数可以一步完成解析和显式转换，如代码清单 5-26 所示。\n\n```go\npackage main\nimport\
  \ (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"100\"\nint1, int1err := strconv.Atoi(val1)\n\
  if int1err == nil {\nvar intResult int = int1\nfmt.Println(\"Parsed value:\", intResult)\n\
  } else {\nfmt.Println(\"Cannot parse\", val1, int1err)\n}\n}\n```\n\n**代码清单 5-26**：在\
  \ `operations` 文件夹的 `main.go` 文件中使用便捷函数\n\n`Atoi` 函数只接收待解析的值，并且不支持解析非十进制值。其结果类型是\
  \ `int`，而不是 `ParseInt` 函数产生的 `int64` 类型。编译并执行代码清单 5-25 和 5-26 中的代码，将产生以下输出：\n\n\
  ```\nParsed value: 100\n```\n\n\n\n#### 解析浮点数\n\n`ParseFloat` 函数用于解析包含浮点数的字符串，如代码清单\
  \ 5-27 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main()\
  \ {\nval1 := \"48.95\"\nfloat1, float1err := strconv.ParseFloat(val1, 64)\nif float1err\
  \ == nil {\nfmt.Println(\"Parsed value:\", float1)\n} else {\nfmt.Println(\"Cannot\
  \ parse\", val1, float1err)\n}\n}\n代码清单 5-27\noperations 文件夹中 main.go 文件内的浮点数值解析\n\
  ```\n\n`ParseFloat` 函数的第一个参数是要解析的值。第二个参数指定结果的大小。`ParseFloat` 函数返回一个 `float64` 类型的值，但如果指定了\
  \ `32`，则结果可以显式转换为 `float32` 类型的值。\n\n`ParseFloat` 函数可以解析带有指数的值，如代码清单 5-28 所示。\n\n\
  ```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval1 := \"\
  4.895e+01\"\nfloat1, float1err := strconv.ParseFloat(val1, 64)\nif float1err ==\
  \ nil {\nfmt.Println(\"Parsed value:\", float1)\n} else {\nfmt.Println(\"Cannot\
  \ parse\", val1, float1err)\n}\n}\n代码清单 5-28\noperations 文件夹中 main.go 文件内的指数值解析\n\
  ```\n\n编译并执行代码清单 5-27 和 5-28 会得到相同的输出：\n\n```\nParsed value: 48.95\n```\n\n### 将值格式化为字符串\n\
  \nGo 标准库还提供了将基本数据值转换为字符串的功能，这些字符串可以直接使用，也可以与其他字符串组合。`strconv` 包提供了表 5-10 中描述的函数。\n\
  \n表 5-10\n\n将值转换为字符串的 strconv 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `FormatBool(val)`\
  \ | 此函数根据指定的 `bool` 值返回字符串 `true` 或 `false`。 |\n| `FormatInt(val, base)` | 此函数返回指定\
  \ `int64` 值的字符串表示形式，使用指定的基数表示。 |\n| `FormatUint(val, base)` | 此函数返回指定 `uint64` 值的字符串表示形式，使用指定的基数表示。\
  \ |\n| `FormatFloat(val, format, precision, size)` | 此函数返回指定 `float64` 值的字符串表示形式，使用指定的格式、精度和大小表示。\
  \ |\n| `Itoa(val)` | 此函数返回指定 `int` 值的字符串表示形式，使用十进制基数 10 表示。 |\n\n#### 格式化布尔值\n\n\
  `FormatBool` 函数接受一个 `bool` 值并返回其字符串表示形式，如代码清单 5-29 所示。这是表 5-10 中描述的最简单的函数，因为它只返回\
  \ `true` 和 `false` 字符串。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\n\
  func main() {\nval1 := true\nval2 := false\nstr1 := strconv.FormatBool(val1)\nstr2\
  \ := strconv.FormatBool(val2)\nfmt.Println(\"Formatted value 1: \" + str1)\nfmt.Println(\"\
  Formatted value 2: \" + str2)\n}\n代码清单 5-29\noperations 文件夹中 main.go 文件内的布尔值格式化\n\
  ```\n\n请注意，我使用了 `+` 运算符将 `FormatBool` 函数的结果与字面字符串连接起来，这样只向 `fmt.Println` 函数传递了一个参数。编译并执行代码清单\
  \ 5-29 中的代码会产生以下输出：\n\n```\nFormatted value 1: true\nFormatted value 2: false\n\
  ```\n\n#### 格式化整数值\n\n`FormatInt` 和 `FormatUint` 函数将整数值格式化为字符串，如代码清单 5-30 所示。\n\n\
  ```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval := 275\n\
  base10String := strconv.FormatInt(int64(val), 10)\nbase2String := strconv.FormatInt(int64(val),\
  \ 2)\nfmt.Println(\"Base 10: \" + base10String)\nfmt.Println(\"Base 2: \" + base2String)\n\
  }\n代码清单 5-30\noperations 文件夹中 main.go 文件内的整数值格式化\n```\n\n`FormatInt` 函数只接受 `int64`\
  \ 类型的值，因此我执行了显式转换，并指定了以十进制 (基数 10) 和二进制 (基数 2) 表示该值的字符串。编译并执行该代码会产生以下输出：\n\n```\n\
  Base 10: 275\nBase 2: 100010011\n```\n\n#### 使用整数便捷函数\n\n整数值通常使用 `int` 类型表示，并使用基数\
  \ 10 转换为字符串。`strconv` 包提供了 `Itoa` 函数，这是一种执行此特定转换的更便捷方式，如代码清单 5-31 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main() {\nval := 275\nbase10String\
  \ := strconv.Itoa(val)\nbase2String := strconv.FormatInt(int64(val), 2)\nfmt.Println(\"\
  Base 10: \" + base10String)\nfmt.Println(\"Base 2: \" + base2String)\n}\n代码清单 5-31\n\
  operations 文件夹中 main.go 文件内的便捷函数使用\n```\n\n`Itoa` 函数接受一个 `int` 值，该值被显式转换为 `int64`\
  \ 并传递给 `ParseInt` 函数。代码清单 5-31 中的代码会产生以下输出：\n\n```\nBase 10: 275\nBase 2: 100010011\n\
  ```\n\n\n\n### 格式化浮点数值\n\n将浮点数值表示为字符串需要额外的配置选项，因为有不同的格式可用。清单 5-32 展示了一个使用 `FormatFloat`\
  \ 函数的基本格式化操作。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main()\
  \ {\nval := 49.95\nFstring := strconv.FormatFloat(val, 'f', 2, 64)\nEstring := strconv.FormatFloat(val,\
  \ 'e', -1, 64)\nfmt.Println(\"Format F: \" + Fstring)\nfmt.Println(\"Format E: \"\
  \ + Estring)\n}\nListing 5-32\nConverting a Floating-Point Number in the main.go\
  \ File in the operations Folder\n```\n\n`FormatFloat` 函数的第一个参数是要处理的值。第二个参数是一个 `byte`\
  \ 值，它指定了字符串的格式。`byte` 通常表示为一个 `rune` 字面量值，表 5-11 描述了最常用的格式 rune。（如第 4 章所述，`byte`\
  \ 类型是 `uint8` 的别名，为了方便，通常使用 `rune` 来表示。）\n\n**表 5-11**  \n浮点数字符串格式化常用格式选项\n\n| 功能\
  \ | 描述 |\n| --- | --- |\n| `f` | 浮点数值将表示为 `±ddd.ddd` 的形式，不带指数，例如 `49.95`。 |\n| `e,\
  \ E` | 浮点数值将表示为 `±ddd.ddde±dd` 的形式，例如 `4.995e+01` 或 `4.995E+01`。表示指数的字母的大小写由用作格式参数的\
  \ rune 的大小写决定。 |\n| `g, G` | 对于较大的指数，浮点数值将使用 `e`/`E` 格式表示；对于较小的值，则使用 `f` 格式表示。 |\n\
  \n`FormatFloat` 函数的第三个参数指定小数点后要显示的位数。特殊值 `-1` 可用于选择最少的位数，从而生成一个可以无精度损失地解析回相同浮点数值的字符串。最后一个参数决定是否对浮点数值进行四舍五入，以便其可以表示为\
  \ `float32` 或 `float64` 值，使用值 `32` 或 `64` 来指定。\n\n这些参数意味着，以下语句使用格式选项 `f`、两位小数，并对值进行四舍五入以便能够用\
  \ `float64` 类型表示，从而对赋值给名为 `val` 的变量的值进行格式化：\n\n```\n...\nFstring := strconv.FormatFloat(val,\
  \ 'f', 2, 64)\n...\n```\n\n其效果是将该值格式化为一个可用于表示货币金额的字符串。清单 5-32 中的代码在编译和执行后会产生以下输出：\n\
  \n```\nFormat F: 49.95\nFormat E: 4.995e+01\n```\n\n## 本章小结\n\n在本章中，我介绍了 Go 语言的运算符，并展示了如何使用它们执行算术、比较、拼接和逻辑运算。我还描述了使用\
  \ Go 语言内置特性和 Go 标准库中的函数将一种类型转换为另一种类型的不同方法。在下一章中，我将介绍 Go 的流程控制特性。\n\n# 6. 流程控制\n\n\
  在本章中，我将介绍 Go 语言中用于控制执行流程的特性。Go 支持其他编程语言中常见的关键字，例如 `if`、`for`、`switch` 等，但每个关键字都具有一些不寻常且创新的特性。表\
  \ 6-1 介绍了 Go 流程控制特性的上下文。\n\n**表 6-1**  \n流程控制上下文介绍\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它是什么？ | 流程控制允许程序员有选择地执行语句。 |\n| 为什么它有用？ | 没有流程控制，应用程序按顺序执行一系列代码语句，然后退出。流程控制允许改变这个顺序，推迟某些语句的执行并重复执行其他语句。\
  \ |\n| 如何使用它？ | Go 支持流程控制关键字，包括 `if`、`for` 和 `switch`，每个关键字都以不同的方式控制执行流程。 |\n| 是否有任何陷阱或限制？\
  \ | Go 为其每个流程控制关键字引入了不寻常的特性，这些特性提供了额外的功能，必须小心使用。 |\n| 是否有替代方案？ | 没有。流程控制是一种基本的语言特性。\
  \ |\n\n**表 6-2**  \n本章摘要\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 有条件地执行语句\
  \ | 使用 `if` 语句，可选的 `else if` 和 `else` 子句以及初始化语句 | 4–10 |\n| 重复执行语句 | 使用 `for` 循环，可选的初始化和完成语句\
  \ | 11–13 |\n| 中断循环 | 使用 `continue` 或 `break` 关键字 | 14 |\n| 枚举一个值序列 | 使用带有 `range`\
  \ 关键字的 `for` 循环 | 15–18 |\n| 执行复杂比较以有条件地执行语句 | 使用 `switch` 语句，可选的初始化语句 | 19–21,\
  \ 23–26 |\n| 强制一个 `case` 语句流入下一个 `case` 语句 | 使用 `fallthrough` 关键字 | 22 |\n| 指定执行应跳转到的位置\
  \ | 使用标签 | 27 |\n\n## 本章准备\n\n为准备本章，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `flowcontrol`\
  \ 的目录。导航到 `flowcontrol` 文件夹，并运行清单 6-1 中所示的命令来初始化项目。\n\n**提示**  \n你可以从 [`github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章的示例项目——以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init\
  \ flowcontrol\nListing 6-1\nInitializing the Project\n```\n\n向 `flowcontrol` 文件夹添加一个名为\
  \ `main.go` 的文件，内容如清单 6-2 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\nkayakPrice := 275.00\nfmt.Println(\"Price:\", kayakPrice)\n}\nListing 6-2\n\
  The Contents of the main.go File in the flowcontrol Folder\n```\n\n在 `flowcontrol`\
  \ 文件夹中使用命令提示符运行清单 6-3 中所示的命令。\n\n```\ngo run .\nListing 6-3\nRunning the Example\
  \ Project\n```\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\n```\nPrice: 275\n```\n\n##\
  \ 理解流程控制\n\nGo 应用程序中的执行流程很容易理解，尤其是当应用程序像示例这样简单时。定义在特殊 `main` 函数中的语句（称为应用程序的*入口点*）按照它们定义的顺序执行。一旦所有这些语句都执行完毕，应用程序就会退出。图\
  \ 6-1 说明了基本流程。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig1_HTML.jpg](img/512642_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1**  \n执行流程\n\n每条语句执行后，流程会移动到下一条语句，并重复此过程，直到没有语句可以执行为止。\n\n有些应用程序恰好需要这种基本的执行流程，但对于大多数应用程序来说，会使用以下各节描述的特性来控制执行流程，以便有选择地执行语句。\n\
  \n\n\n### 使用 if 语句\n\n`if` 语句用于仅当指定的表达式求值结果产生 `bool` 值 `true` 时，才执行一组语句，如清单 6-4\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nkayakPrice := 275.00\n\
  if kayakPrice > 100 {\nfmt.Println(\"Price is greater than 100\")\n}\n}\nListing\
  \ 6-4\nUsing an if Statement in the main.go File in the flowcontrol Folder\n```\n\
  \n`if` 关键字后跟表达式，然后是待执行的语句组，语句组用花括号包裹，如图 6-2 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig2_HTML.jpg](img/512642_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2  \nif 语句的结构\n\n清单 6-4 中的表达式使用 `>` 运算符将 `kayakPrice` 变量的值与字面常量值 `100` 进行比较。该表达式求值为\
  \ `true`，这意味着花括号内的语句得以执行，并产生以下输出：\n\n```\nPrice is greater than 100\n```\n\n我倾向于将表达式放在圆括号内，如清单\
  \ 6-5 所示。Go 语言不要求使用圆括号，但我是出于习惯而使用它们。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ main() {\nkayakPrice := 275.00\nif (kayakPrice > 100) {\nfmt.Println(\"Price is\
  \ greater than 100\")\n}\n}\nListing 6-5\nUsing Parentheses in the main.go File\
  \ in the flowcontrol Folder\n```\n\n## 关于流程控制语句语法的限制\n\n就 `if` 语句和其他流程控制语句的语法而言，Go\
  \ 语言的灵活性不如其他语言。首先，即使代码块中只有一条语句，花括号也不能省略，这意味着不允许使用以下语法：\n\n```\n...\nif (kayakPrice\
  \ > 100)\nfmt.Println(\"Price is greater than 100\")\n...\n```\n\n其次，左花括号必须与流程控制关键字在同一行，不能出现在下一行，这意味着也不允许使用以下语法：\n\
  \n```\n...\nif (kayakPrice > 100)\n{\nfmt.Println(\"Price is greater than 100\"\
  )\n}\n...\n```\n\n第三，如果要将长表达式拆分成多行，不能在值或变量名之后换行：\n\n```\n...\nif (kayakPrice > 100\n\
  && kayakPrice < 500) {\nfmt.Println(\"Price is greater than 100 and less than 500\"\
  )\n}\n...\n```\n\nGo 编译器会对所有这些语句报错，问题在于构建过程尝试在源代码中插入分号的方式。无法改变这种行为，这也是本书中有些示例格式怪异的原因：某些代码语句包含的字符数超过了印刷页面上一行所能显示的数量，我不得不小心地拆分这些语句以避免此问题。\n\
  \n## 使用 else 关键字\n\n`else` 关键字可用于在 `if` 语句中创建附加子句，如清单 6-6 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\nkayakPrice := 275.00\nif (kayakPrice > 500) {\nfmt.Println(\"\
  Price is greater than 500\")\n} else if (kayakPrice < 300) {\nfmt.Println(\"Price\
  \ is less than 300\")\n}\n}\nListing 6-6\nUsing the else Keyword in the main.go\
  \ File in the flowcontrol Folder\n```\n\n当 `else` 关键字与 `if` 关键字结合使用时，仅当表达式的值为 `true`\
  \ 且前一个子句中的表达式为 `false` 时，才会执行花括号中的代码语句，如图 6-3 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig3_HTML.jpg](img/512642_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3  \nif 语句中的 else/if 子句\n\n在清单 6-6 中，`if` 子句中使用的表达式产生 `false` 结果，因此执行流程转到\
  \ `else`/`if` 表达式，该表达式产生 `true` 结果。编译并执行清单 6-6 中的代码会产生以下输出：\n\n```\nPrice is less\
  \ than 300\n```\n\n可以重复使用 `else`/`if` 组合来创建一系列子句，如清单 6-7 所示。只有在之前所有表达式都产生 `false`\
  \ 结果时，才会执行每个子句。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nkayakPrice\
  \ := 275.00\nif (kayakPrice > 500) {\nfmt.Println(\"Price is greater than 500\"\
  )\n} else if (kayakPrice  200 && kayakPrice < 300) {\nfmt.Println(\"Price is between\
  \ 200 and 300\")\n}\n}\nListing 6-7\nDefining Multiple else/if Clauses in the main.go\
  \ File in the flowcontrol Folder\n```\n\n执行过程会遍历 `if` 语句，对表达式求值，直到获得 `true` 值或没有更多表达式可供求值为止。编译并执行清单\
  \ 6-7 中的代码会产生以下输出：\n\n```\nPrice is between 200 and 300\n```\n\n`else` 关键字也可用于创建回退子句。仅当语句中的所有\
  \ `if` 和 `else`/`if` 表达式都产生 `false` 结果时，才会执行回退子句中的语句，如清单 6-8 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc main() {\nkayakPrice := 275.00\nif (kayakPrice > 500)\
  \ {\nfmt.Println(\"Price is greater than 500\")\n} else if (kayakPrice < 100) {\n\
  fmt.Println(\"Price is less than 100\")\n} else {\nfmt.Println(\"Price not matched\
  \ by earlier expressions\")\n}\n}\nListing 6-8\nCreating a Fallback Clause in the\
  \ main.go File in the flowcontrol Folder\n```\n\n回退子句必须在语句末尾定义，并通过不带表达式的 `else`\
  \ 关键字来指定，如图 6-4 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig4_HTML.jpg](img/512642_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4  \nif 语句中的回退子句\n\n编译并执行清单 6-8 中的代码会产生以下输出：\n\n```\nPrice not matched by\
  \ earlier expressions\n```\n\n## 理解 if 语句的作用域\n\n`if` 语句中的每个子句都有自己的作用域，这意味着变量只能在其被定义的子句内部访问。这也意味着你可以在不同子句中对不同用途使用相同的变量名，如清单\
  \ 6-9 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nkayakPrice := 275.00\n\
  if (kayakPrice > 500) {\nscopedVar := 500\nfmt.Println(\"Price is greater than\"\
  , scopedVar)\n} else if (kayakPrice < 100) {\nscopedVar := \"Price is less than\
  \ 100\"\nfmt.Println(scopedVar)\n} else {\nscopedVar := false\nfmt.Println(\"Matched:\
  \ \", scopedVar)\n}\n}\nListing 6-9\nRelying on Scopes in the main.go File in the\
  \ flowcontrol Folder\n```\n\n`if` 语句中的每个子句都定义了一个名为 `scopedVar` 的变量，且每个变量的类型都不同。每个变量都是其所属子句的局部变量，这意味着它无法在其他子句或\
  \ `if` 语句外部访问。编译并执行清单 6-9 中的代码会产生以下输出：\n\n```\nMatched:  false\n```\n\n\n\n### 在\
  \ `if` 语句中使用初始化语句\n\nGo 语言允许 `if` 语句使用一个初始化语句，该语句会在 `if` 语句的表达式求值之前执行。初始化语句被限制为\
  \ Go 的简单语句，这通常意味着该语句可以定义一个新变量、为已有变量赋新值，或者调用一个函数。\n\n此功能最常见的用途是初始化一个随后在表达式中使用的变量，如代码清单\
  \ 6-10 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strconv\"\n)\nfunc main()\
  \ {\npriceString := \"275\"\nif kayakPrice, err := strconv.Atoi(priceString); err\
  \ == nil {\nfmt.Println(\"Price:\", kayakPrice)\n} else {\nfmt.Println(\"Error:\"\
  , err)\n}\n}\n```\n\n`if` 关键字后紧跟着初始化语句，然后是一个分号和待求值的表达式，如图 6-5 所示。\n\n![图 6-5](img/512642_1_En_6_Fig5_HTML.jpg)\n\
  \n**图 6-5** 使用初始化语句\n\n代码清单 6-10 中的初始化语句调用了第 5 章中描述的 `strconv.Atoi` 函数，以将一个字符串解析为\
  \ `int` 值。该函数返回两个值，分别赋值给名为 `kayakPrice` 和 `err` 的变量：\n\n```go\n...\nif kayakPrice,\
  \ err := strconv.Atoi(priceString); err == nil {\n...\n```\n\n由初始化语句定义的变量的作用域是整个\
  \ `if` 语句，包括表达式在内。`err` 变量被用在 `if` 语句的表达式中，以判断字符串是否被无错误解析：\n\n```go\n...\nif kayakPrice,\
  \ err := strconv.Atoi(priceString); err == nil {\n...\n```\n\n这些变量也可以在 `if` 子句以及任何\
  \ `else`/`if` 和 `else` 子句中使用：\n\n```go\n...\nif kayakPrice, err := strconv.Atoi(priceString);\
  \ err == nil {\nfmt.Println(\"Price:\", kayakPrice)\n} else {\nfmt.Println(\"Error:\"\
  , err)\n}\n...\n```\n\n代码清单 6-10 中的代码在编译并执行后会产生以下输出：\n\n```\nPrice: 275\n```\n\n\
  **在初始化语句中使用括号**\n\n正如我之前所解释的，我倾向于在 `if` 语句中使用括号来括起表达式。当使用初始化语句时，这仍然是可行的，但必须确保括号只应用于表达式，如下所示：\n\
  \n```go\n...\nif kayakPrice, err := strconv.Atoi(priceString); (err == nil) {\n\
  ...\n```\n\n括号不能应用于初始化语句，也不能用来括起该语句的这两个部分。\n\n## 使用 `for` 循环\n\n`for` 关键字用于创建循环，以重复执行语句。最基本的\
  \ `for` 循环会无限重复，除非被 `break` 关键字中断，如代码清单 6-11 所示。（`return` 关键字也可用于终止循环。）\n\n```go\n\
  package main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\ncounter := 0\n\
  for {\nfmt.Println(\"Counter:\", counter)\ncounter++\nif (counter > 3) {\nbreak\n\
  }\n}\n}\n```\n\n`for` 关键字后跟着要重复执行的语句，这些语句用花括号括起来，如图 6-6 所示。对于大多数循环来说，其中一个语句会是 `break`\
  \ 关键字，用于终止循环。\n\n![图 6-6](img/512642_1_En_6_Fig6_HTML.jpg)\n\n**图 6-6** 基本的 `for`\
  \ 循环\n\n代码清单 6-11 中的 `break` 关键字位于一个 `if` 语句内部，这意味着直到 `if` 语句的表达式产生 `true` 值时，循环才会终止。代码清单\
  \ 6-11 中的代码在编译并执行后会产生以下输出：\n\n```\nCounter: 0\nCounter: 1\nCounter: 2\nCounter:\
  \ 3\n```\n\n### 将条件整合到循环中\n\n上一节演示的循环代表了一个常见需求：重复执行直到满足某个条件。这是一个非常普遍的需求，因此可以将条件整合到循环语法中，如代码清单\
  \ 6-12 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main()\
  \ {\ncounter := 0\nfor (counter <= 3) {\n//     break\n// }\n}\n}\n```\n\n条件在 `for`\
  \ 关键字和包裹循环语句的左花括号之间指定，如图 6-7 所示。条件可以用括号括起来，如示例中所示，但这并非强制要求。\n\n![图 6-7](img/512642_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7** `for` 循环的条件\n\n花括号内的语句将在条件求值为 `true` 时重复执行。在此示例中，当 `counter` 变量的值小于或等于\
  \ 3 时，条件产生 `true`，代码在编译并执行后会产生以下结果：\n\n```\nCounter: 0\nCounter: 1\nCounter: 2\n\
  Counter: 3\n```\n\n### 使用初始化语句和完成语句\n\n循环可以定义附加的语句，这些语句在循环第一次迭代之前（称为*初始化语句*）和每次迭代之后（称为*后置语句*）执行，如代码清单\
  \ 6-13 所示。\n\n**提示** 与 `if` 语句一样，可以将括号应用于 `for` 语句的条件，但不能应用于初始化语句或后置语句。\n\n```go\n\
  package main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nfor counter :=\
  \ 0; counter <= 3; counter++ {\nfmt.Println(\"Counter:\", counter)\n// counter++\n\
  }\n}\n```\n\n初始化语句、条件和后置语句由分号分隔，并跟在 `for` 关键字之后，如图 6-8 所示。\n\n![图 6-8](img/512642_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8** 带有初始化语句和后置语句的 `for` 循环\n\n首先执行初始化语句，然后对条件进行求值。如果条件产生 `true` 结果，则执行花括号内的语句，接着执行后置语句。然后再次对条件求值，并重复此循环。这意味着初始化语句仅执行一次，而每当条件产生\
  \ `true` 结果时，后置语句都会执行一次；如果条件在首次求值时产生 `false` 结果，则后置语句永远不会执行。代码清单 6-13 中的代码在编译并执行后会产生以下输出：\n\
  \n```\nCounter: 0\nCounter: 1\nCounter: 2\nCounter: 3\n```\n\n**重新创建 DO...WHILE\
  \ 循环**\n\nGo 语言没有提供 `do...while` 循环，这是其他编程语言提供的一种功能，用于定义一个至少执行一次的循环，之后通过条件求值来决定是否需要进行后续迭代。虽然有些笨拙，但可以使用\
  \ `for` 循环实现类似的效果，如下所示：\n\n```go\npackage main\nimport (\n\"fmt\"\n)\nfunc main()\
  \ {\nfor counter := 0; true; counter++ {\nfmt.Println(\"Counter:\", counter)\nif\
  \ (counter > 3) {\nbreak\n}\n}\n}\n```\n\n`for` 循环的条件是 `true`，随后的迭代由 `if` 语句控制，该语句使用\
  \ `break` 关键字来终止循环。\n\n\n\n### 循环的继续执行\n\n`continue` 关键字可用于终止当前值的 `for` 循环语句执行，并进入下一次迭代，如代码清单\
  \ 6-14 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main()\
  \ {\nfor counter := 0; counter <= 3; counter++ {\nif (counter == 1) {\ncontinue\n\
  }\nfmt.Println(\"Counter:\", counter)\n}\n}\n```\n*代码清单 6-14：在 `flowcontrol` 文件夹的\
  \ `main.go` 文件中继续执行循环*\n\n`if` 语句确保只有当 `counter` 变量的值等于 `1` 时，才会执行 `continue` 关键字。对于这个值，执行流程将不会到达调用\
  \ `fmt.Println` 函数的语句，编译并执行上述代码将产生以下输出：\n\n```\nCounter: 0\nCounter: 2\nCounter:\
  \ 3\n```\n\n### 枚举序列\n\n`for` 关键字可以与 `range` 关键字一起使用，创建枚举序列的循环，如代码清单 6-15 所示。\n\n\
  ```go\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nproduct\
  \ := \"Kayak\"\nfor index, character := range product {\nfmt.Println(\"Index:\"\
  , index, \"Character:\", string(character))\n}\n}\n```\n*代码清单 6-15：在 `flowcontrol`\
  \ 文件夹的 `main.go` 文件中使用 `range` 关键字*\n\n此示例枚举一个字符串，`for` 循环将其视为一个 `rune` 值序列，每个 `rune`\
  \ 值代表一个字符。循环的每次迭代都会将值赋给两个变量，这两个变量分别提供当前在序列中的索引以及当前索引处的值，如图 6-9 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig9_HTML.jpg](img/512642_1_En_6_Fig9_HTML.jpg)\n\
  \n*图 6-9：枚举序列*\n\n对于序列中的每一项，`for` 循环大括号内的语句都会执行一次。这些语句可以读取两个变量的值，从而访问序列中的元素。对于代码清单\
  \ 6-15 而言，这意味着循环内的语句可以访问字符串中包含的各个字符，编译并执行后会产生以下输出：\n\n```\nIndex: 0 Character: K\n\
  Index: 1 Character: a\nIndex: 2 Character: y\nIndex: 3 Character: a\nIndex: 4 Character:\
  \ k\n```\n\n#### 枚举序列时仅接收索引或值\n\n如果定义了一个变量但未使用，Go 会报告错误。如果只需要索引值，你可以从 `for...range`\
  \ 语句中省略值变量，如代码清单 6-16 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\
  \n)\nfunc main() {\nproduct := \"Kayak\"\nfor index := range product {\nfmt.Println(\"\
  Index:\", index)\n}\n}\n```\n*代码清单 6-16：在 `flowcontrol` 文件夹的 `main.go` 文件中接收索引值*\n\
  \n此示例中的 `for` 循环将为 `product` 字符串中的每个字符生成一个索引值序列，编译并执行后会产生以下输出：\n\n```\nIndex: 0\n\
  Index: 1\nIndex: 2\nIndex: 3\nIndex: 4\n```\n\n当你只需要序列中的值而不需要索引时，可以使用空白标识符，如代码清单\
  \ 6-17 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main()\
  \ {\nproduct := \"Kayak\"\nfor _, character := range product {\nfmt.Println(\"Character:\"\
  , string(character))\n}\n}\n```\n*代码清单 6-17：在 `flowcontrol` 文件夹的 `main.go` 文件中接收值*\n\
  \n空白标识符（`_` 字符）用于索引变量，而普通变量用于接收值。编译并执行代码清单 6-17 中的代码将产生以下输出：\n\n```\nCharacter:\
  \ K\nCharacter: a\nCharacter: y\nCharacter: a\nCharacter: k\n```\n\n#### 枚举内置数据结构\n\
  \n`range` 关键字也可以与 Go 提供的内置数据结构一起使用——数组、切片和映射——这些内容将在第 7 章中描述，包括使用 `for` 和 `range`\
  \ 关键字的示例。为快速参考，代码清单 6-18 展示了一个使用 `range` 关键字枚举数组内容的 `for` 循环。\n\n```go\npackage\
  \ main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nproducts := []string\
  \ { \"Kayak\", \"Lifejacket\", \"Soccer Ball\"}\nfor index, element:= range products\
  \ {\nfmt.Println(\"Index:\", index, \"Element:\", element)\n}\n}\n```\n*代码清单 6-18：在\
  \ `flowcontrol` 文件夹的 `main.go` 文件中枚举数组*\n\n此示例使用字面量语法定义数组，数组是固定长度的值集合。（Go 也有内置的变长集合，称为*切片*，以及键值映射。）该数组包含三个字符串值，每次执行\
  \ `for` 循环时，当前索引和元素都会被赋给这两个变量，编译并执行代码将产生以下输出：\n\n```\nIndex: 0 Element: Kayak\n\
  Index: 1 Element: Lifejacket\nIndex: 2 Element: Soccer Ball\n```\n\n## 使用 switch\
  \ 语句\n\n`switch` 语句提供了一种替代方法来控制执行流程，它是基于将表达式的结果与特定值进行匹配，而不是评估 `true` 或 `false` 的结果，如代码清单\
  \ 6-19 所示。这是执行多重比较的一种简洁方式，为复杂的 `if`/`else if`/`else` 语句提供了更简洁的替代方案。\n\n> **注意：**\
  \ `switch` 语句也可用于区分数据类型，这将在第 11 章中描述。\n\n```go\npackage main\nimport (\n\"fmt\"\n\
  //\"strconv\"\n)\nfunc main() {\nproduct := \"Kayak\"\nfor index, character := range\
  \ product {\nswitch (character) {\ncase 'K':\nfmt.Println(\"K at position\", index)\n\
  case 'y':\nfmt.Println(\"y at position\", index)\n}\n}\n}\n```\n*代码清单 6-19：在 `flowcontrol`\
  \ 文件夹的 `main.go` 文件中使用 `switch` 语句*\n\n`switch` 关键字后跟一个值或表达式，其结果用于执行比较。比较是针对一系列\
  \ `case` 语句进行的，每个 `case` 语句指定一个值，如图 6-10 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig10_HTML.jpg](img/512642_1_En_6_Fig10_HTML.jpg)\n\
  \n*图 6-10：一个基本的 `switch` 语句*\n\n在代码清单 6-19 中，`switch` 语句用于检查应用于 `string` 值的 `for`\
  \ 循环产生的每个字符，生成一个 `rune` 值序列，并使用 `case` 语句来匹配特定的字符。\n\n`case` 关键字后跟一个值、一个冒号以及一个或多个语句，当比较值与\
  \ `case` 语句值匹配时执行这些语句，如图 6-11 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig11_HTML.jpg](img/512642_1_En_6_Fig11_HTML.jpg)\n\
  \n*图 6-11：`case` 语句的结构*\n\n此 `case` 语句匹配 rune `K`，当匹配时，将执行调用 `fmt.Println` 函数的语句。编译并执行代码清单\
  \ 6-19 中的代码将产生以下输出：\n\n```\nK at position 0\ny at position 2\n```\n\n\n\n### 匹配多个值\n\
  \n在某些语言中，`switch` 语句会“穿透”（fall through），这意味着一旦某个 `case` 语句匹配成功，就会一直执行语句直到遇到 `break`\
  \ 语句，哪怕这意味着会继续执行后续 `case` 语句中的代码。穿透通常用于让多个 `case` 语句执行相同代码，但必须谨慎使用 `break` 关键字来防止意外地持续执行。\n\
  \nGo 的 `switch` 语句不会自动穿透，但可以通过逗号分隔的列表指定多个值，如代码清单 6-20 所示。\n\n```\npackage main\n\
  import (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nproduct := \"Kayak\"\nfor index,\
  \ character := range product {\nswitch (character) {\ncase 'K', 'k':\nfmt.Println(\"\
  K or k at position\", index)\ncase 'y':\nfmt.Println(\"y at position\", index)\n\
  }\n}\n}\n代码清单 6-20\n在 flowcontrol 文件夹的 main.go 文件中使用多个值\n```\n\n`case` 语句所匹配的值集合以逗号分隔的列表形式表示，如图\
  \ 6-12 所示。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig12_HTML.jpg](img/512642_1_En_6_Fig12_HTML.jpg)\n\
  \n*图 6-12：在 `case` 语句中指定多个值*\n\n`case` 语句将匹配任意一个指定的值，当编译并运行代码清单 6-20 中的代码时，会生成以下输出：\n\
  \n```\nK or k at position 0\ny at position 2\nK or k at position 4\n```\n\n####\
  \ 终止 `case` 语句的执行\n\n虽然每个 `case` 语句不需要强制使用 `break` 关键字来终止，但它可以用于在到达 `case` 语句末尾之前结束语句的执行，如代码清单\
  \ 6-21 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main()\
  \ {\nproduct := \"Kayak\"\nfor index, character := range product {\nswitch (character)\
  \ {\ncase 'K', 'k':\nif (character == 'k') {\nfmt.Println(\"Lowercase k at position\"\
  , index)\nbreak\n}\nfmt.Println(\"Uppercase K at position\", index)\ncase 'y':\n\
  fmt.Println(\"y at position\", index)\n}\n}\n}\n代码清单 6-21\n在 flowcontrol 文件夹的 main.go\
  \ 文件中使用 break 关键字\n```\n\n`if` 语句用于检查当前 `rune` 是否为 `k`，如果是，则调用 `fmt.Println` 函数，然后使用\
  \ `break` 关键字终止 `case` 语句的执行，阻止后续任何语句被执行。编译并运行代码清单 6-21 中的代码，会生成以下输出：\n\n```\nUppercase\
  \ K at position 0\ny at position 2\nLowercase k at position 4\n```\n\n### 强制穿透到下一个\
  \ `case` 语句\n\nGo 的 `switch` 语句不会自动穿透，但可以通过 `fallthrough` 关键字启用此行为，如代码清单 6-22 所示。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nproduct\
  \ := \"Kayak\"\nfor index, character := range product {\nswitch (character) {\n\
  case 'K':\nfmt.Println(\"Uppercase character\")\nfallthrough\ncase 'k':\nfmt.Println(\"\
  k at position\", index)\ncase 'y':\nfmt.Println(\"y at position\", index)\n}\n}\n\
  }\n代码清单 6-22\n在 flowcontrol 文件夹的 main.go 文件中实现穿透\n```\n\n第一个 `case` 语句包含了 `fallthrough`\
  \ 关键字，这意味着执行将继续到下一个 `case` 语句中的代码。编译并运行代码清单 6-22 中的代码，会生成以下输出：\n\n```\nUppercase\
  \ character\nk at position 0\ny at position 2\nk at position 4\n```\n\n### 提供 `default`\
  \ 子句\n\n`default` 关键字用于定义一个子句，当没有任何 `case` 语句匹配 `switch` 语句的值时，将执行该子句，如代码清单 6-23\
  \ 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\n\
  product := \"Kayak\"\nfor index, character := range product {\nswitch (character)\
  \ {\ncase 'K', 'k':\nif (character == 'k') {\nfmt.Println(\"Lowercase k at position\"\
  , index)\nbreak\n}\nfmt.Println(\"Uppercase K at position\", index)\ncase 'y':\n\
  fmt.Println(\"y at position\", index)\ndefault:\nfmt.Println(\"Character\", string(character),\
  \ \"at position\", index)\n}\n}\n}\n代码清单 6-23\n在 flowcontrol 文件夹的 main.go 文件中添加\
  \ default 子句\n```\n\n`default` 子句中的语句仅会在那些没有被 `case` 语句匹配的值上执行。在此示例中，字符 `K`、`k`\
  \ 和 `y` 被 `case` 语句匹配，因此 `default` 子句将仅用于其他字符。编译并运行代码清单 6-23 中的代码，会生成以下输出：\n\n```\n\
  Uppercase K at position 0\nCharacter a at position 1\ny at position 2\nCharacter\
  \ a at position 3\nLowercase k at position 4\n```\n\n### 使用初始化语句\n\n`switch` 语句可以带有一个初始化语句来定义，这是一种准备比较值的有用方式，以便在\
  \ `case` 语句中引用该值。代码清单 6-24 演示了 `switch` 语句中一个常见问题：使用表达式来产生比较值。\n\n```\npackage main\n\
  import (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\nfor counter := 0; counter <\
  \ 20; counter++ {\nswitch(counter / 2) {\ncase 2, 3, 5, 7:\nfmt.Println(\"Prime\
  \ value:\", counter / 2)\ndefault:\nfmt.Println(\"Non-prime value:\", counter /\
  \ 2)\n}\n}\n}\n代码清单 6-24\n在 flowcontrol 文件夹的 main.go 文件中使用表达式\n```\n\n`switch` 语句对\
  \ `counter` 变量的值应用除法运算符来产生其比较值，这意味着必须在 `case` 语句中执行相同的操作，才能将匹配的值传递给 `fmt.Println`\
  \ 函数。使用初始化语句可以避免这种重复，如代码清单 6-25 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"\
  strconv\"\n)\nfunc main() {\nfor counter := 0; counter < 20; counter++ {\nswitch\
  \ val := counter / 2; val {\ncase 2, 3, 5, 7:\nfmt.Println(\"Prime value:\", val)\n\
  default:\nfmt.Println(\"Non-prime value:\", val)\n}\n}\n}\n代码清单 6-25\n在 flowcontrol\
  \ 文件夹的 main.go 文件中使用初始化语句\n```\n\n初始化语句跟随在 `switch` 关键字之后，并通过分号与比较值分隔开，如图 6-13 所示。\n\
  \n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig13_HTML.jpg](img/512642_1_En_6_Fig13_HTML.jpg)\n\
  \n*图 6-13：`switch` 语句的初始化语句*\n\n初始化语句通过除法运算符创建了一个名为 `val` 的变量。这意味着 `val` 既可用作比较值，也可以在\
  \ `case` 语句内部访问，从而避免了重复执行该运算。代码清单 6-24 和代码清单 6-25 是等效的，两者在编译并运行后都会产生以下输出：\n\n```\n\
  Non-prime value: 0\nNon-prime value: 0\nNon-prime value: 1\nNon-prime value: 1\n\
  Prime value: 2\nPrime value: 2\nPrime value: 3\nPrime value: 3\nNon-prime value:\
  \ 4\nNon-prime value: 4\nPrime value: 5\nPrime value: 5\nNon-prime value: 6\nNon-prime\
  \ value: 6\nPrime value: 7\nPrime value: 7\nNon-prime value: 8\nNon-prime value:\
  \ 8\nNon-prime value: 9\nNon-prime value: 9\n```\n\n\n\n### 省略比较值\n\nGo 为 `switch`\
  \ 语句提供了一种不同的方法，即省略比较值，并在 `case` 语句中使用表达式。这强化了 `switch` 语句是 `if` 语句的简洁替代方案这一理念，如代码清单\
  \ [6-26] 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main()\
  \ {\nfor counter := 0; counter < 10; counter++ {\nif counter == 0 {\nfmt.Println(\"\
  Zero value\")\n} else if counter < 3 {\nfmt.Println(counter, \"is < 3\")\n} else\
  \ if counter >= 3 && counter < 7 {\nfmt.Println(counter, \"is >= 3 && < 7\")\n}\
  \ else {\nfmt.Println(counter, \"is >= 7\")\n}\n}\n}\n```\n\n当省略比较值时，每个 `case` 语句都带有一个条件。执行\
  \ `switch` 语句时，会对每个条件求值，直到某个条件产生 `true` 结果，或到达可选的 `default` 子句。当项目被编译并执行时，代码清单 [6-26]\
  \ 产生以下输出：\n\n```\nZero value\n1 is < 3\n2 is < 3\n3 is >= 3 && < 7\n4 is >= 3 &&\
  \ < 7\n5 is >= 3 && < 7\n6 is >= 3 && < 7\n7 is >= 7\n8 is >= 7\n9 is >= 7\n```\n\
  \n## 使用标签语句\n\n标签语句允许执行跳转到不同的点，比其他流程控制特性提供了更大的灵活性。代码清单 [6-27] 展示了标签语句的使用。\n\n```\n\
  package main\nimport (\n\"fmt\"\n//\"strconv\"\n)\nfunc main() {\ncounter := 0\n\
  target: fmt.Println(\"Counter\", counter)\ncounter++\nif (counter < 5) {\ngoto target\n\
  }\n}\n```\n\n标签由一个名称、一个冒号和一个常规代码语句定义，如图 [6-14] 所示。`goto` 关键字用于跳转到标签。\n\n![../images/512642_1_En_6_Chapter/512642_1_En_6_Fig14_HTML.jpg](img/512642_1_En_6_Fig14_HTML.jpg)\n\
  \n**图 6-14** - 标记语句\n\n**提示：** 关于何时可以跳转到标签有一些限制，例如，不能从外部 `switch` 语句跳入 `case` 语句。\n\
  \n在此示例中，分配给标签的名称为 `target`。当执行到达 `goto` 关键字时，它会跳转到具有指定标签的语句。其效果是一个基本的循环，使得 `counter`\
  \ 变量的值在小于 5 时递增。当编译并执行时，代码清单 [6-27] 产生以下输出：\n\n```\nCounter 0\nCounter 1\nCounter\
  \ 2\nCounter 3\nCounter 4\n```\n\n## 总结\n\n在本章中，我描述了 Go 的流程控制特性。我解释了如何使用 `if` 和\
  \ `switch` 语句有条件地执行语句，以及如何使用 `for` 循环重复执行语句。如本章所示，Go 的流程控制关键字比其他语言少，但每个关键字都有附加功能，例如初始化语句和对\
  \ `range` 关键字的支持。在下一章中，我将介绍 Go 的集合类型：数组、切片和映射。\n\n# 7. 使用数组、切片和映射\n\n在本章中，我将介绍 Go\
  \ 内置的集合类型：数组、切片和映射。这些特性允许将相关值分组，就像其他特性一样，Go 在集合方面采用了与其他语言不同的方法。我还将介绍 Go `string`\
  \ 值的一个不寻常方面，它可以像数组一样处理，但根据元素的使用方式表现出不同的行为。表 [7-1] 将数组、切片和映射置于上下文中。\n\n**表 7-1**\
  \ - 数组、切片和映射的上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？ | Go 集合类用于对相关值进行分组。数组存储固定数量的值，切片存储可变数量的值，映射存储键值对。\
  \ |\n| 为什么它们有用？ | 这些集合类是跟踪相关数据值的一种便捷方式。 |\n| 如何使用它们？ | 每种集合类型都可以使用字面量语法或 `make`\
  \ 函数来使用。 |\n| 是否有任何陷阱或限制？ | 必须谨慎理解对切片执行的操作对底层数组的影响，以避免意外结果。 |\n| 有替代方案吗？ | 您不必使用这些类型中的任何一种，但使用它们会使大多数编程任务更容易。\
