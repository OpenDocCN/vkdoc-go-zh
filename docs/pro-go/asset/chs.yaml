  \n代码将被编译并执行，产生以下输出：\n\n```\nHello, Dates and Times\n```\n\n### 处理日期和时间\n\n`time`\
  \ 包提供了测量时间间隔以及表示日期和时间的功能。在接下来的章节中，我将介绍其中最有用的功能。\n\n## 表示日期和时间\n\n`time` 包提供了 `Time`\
  \ 类型，用于表示特定的时间点。表 19-3 中描述的函数用于创建 `Time` 值。\n\n**表 19-3 time 包中用于创建 Time 值的函数**\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Now()` | 此函数创建一个表示当前时刻的 `Time`。 |\n| `Date(y, m,\
  \ d, h, min, sec, nsec, loc)` | 此函数创建一个表示指定时刻的 `Time`，该时刻由年、月、日、时、分、秒、纳秒和 `Location`\
  \ 参数表示。（`Location` 类型在“从字符串解析时间值”部分中描述。） |\n| `Unix(sec, nsec)` | 此函数根据自协调世界时 (UTC)\
  \ 1970 年 1 月 1 日以来的秒数和纳秒数创建一个 `Time` 值，通常称为 Unix 时间。 |\n\n`Time` 的各个组件可通过表 19-4\
  \ 中描述的方法进行访问。\n\n**表 19-4 用于访问 Time 组件的方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Date()`\
  \ | 此方法返回年、月和日组件。年和日以 `int` 值返回，月以 `Month` 值返回。 |\n| `Clock()` | 此方法返回 `Time` 的时、分、秒组件。\
  \ |\n| `Year()` | 此方法返回年组件，以 `int` 形式表示。 |\n| `YearDay()` | 此方法返回一年中的第几天，以 `int`\
  \ 形式表示，范围在 1 到 366 之间（以容纳闰年）。 |\n| `Month()` | 此方法返回月组件，使用 `Month` 类型表示。 |\n| `Day()`\
  \ | 此方法返回月份中的第几天，以 `int` 形式表示。 |\n| `Weekday()` | 此方法返回星期几，以 `Weekday` 类型表示。 |\n\
  | `Hour()` | 此方法返回一天中的小时，以 `int` 形式表示，范围在 0 到 23 之间。 |\n| `Minute()` | 此方法返回当前小时已过去的分钟数，以\
  \ `int` 形式表示，范围在 0 到 59 之间。 |\n| `Second()` | 此方法返回当前分钟已过去的秒数，以 `int` 形式表示，范围在 0\
  \ 到 59 之间。 |\n| `Nanosecond()` | 此方法返回当前秒已过去的纳秒数，以 `int` 形式表示，范围在 0 到 999,999,999\
  \ 之间。 |\n\n定义了两种类型来帮助描述 `Time` 值的组件，如表 19-5 所示。\n\n**表 19-5 用于描述时间组件的类型**\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Month` | 此类型表示月份，`time` 包为英文月份名称定义了常量值：`January`、`February`\
  \ 等。`Month` 类型定义了一个 `String` 方法，在格式化字符串时使用这些名称。 |\n| `Weekday` | 此类型表示星期几，`time`\
  \ 包为英文星期名定义了常量值：`Sunday`、`Monday` 等。`Weekday` 类型定义了一个 `String` 方法，在格式化字符串时使用这些名称。\
  \ |\n\n使用表 19-3 至 19-5 中描述的类型和方法，清单 19-5 演示了如何创建 `Time` 值并访问其组件。\n\n```\npackage\
  \ main\nimport \"time\"\nfunc PrintTime(label string, t *time.Time) {\nPrintfln(\"\
  %s: Day: %v: Month: %v Year: %v\",\nlabel, t.Day(), t.Month(), t.Year())\n}\nfunc\
  \ main() {\ncurrent := time.Now()\nspecific := time.Date(1995, time.June, 9, 0,\
  \ 0, 0, 0, time.Local)\nunix := time.Unix(1433228090, 0)\nPrintTime(\"Current\"\
  , &current)\nPrintTime(\"Specific\", &specific)\nPrintTime(\"UNIX\", &unix)\n}\n\
  ```\n\n*清单 19-5 在 datesandtimes 文件夹的 main.go 文件中创建 Time 值*\n\n`main` 函数中的语句使用表 19-3\
