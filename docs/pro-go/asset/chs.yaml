  \ {\ntx, err := repo.DB.Begin()\nif err != nil {\nrepo.Logger.Panicf(\"Cannot create\
  \ transaction: %v\", err.Error())\nreturn\n}\nresult, err :=  tx.StmtContext(repo.Context,\n\
  repo.Commands.SaveOrder).Exec(order.Name, order.StreetAddr, order.City,\norder.Zip,\
  \ order.Country, order.Shipped)\nif err != nil {\nrepo.Logger.Panicf(\"Cannot exec\
