  \ are 8 products in the source data.\nFirst product: {Kayak Watersports 279}\nMidrange\
  \ Product: Kayak ($279.00)\nName: Lifejacket, Category: Watersports, Price,$49.95\n\
  Name: Soccer Ball, Category: Soccer, Price,$19.50\nName: Corner Flags, Category:\
  \ Soccer, Price,$34.95\nExpensive Product Stadium ($79500.00)\nName: Thinking Cap,\
  \ Category: Chess, Price,$16.00\nName: Unsteady Chair, Category: Chess, Price,$75.00\n\
  Midrange Product: Bling-Bling King ($1200.00)\n```\n\n### 定义模板块\n\n模板块用于定义带有默认内容的模板，该默认内容可以在另一个模板文件中被覆盖，这需要多个模板被同时加载和执行。这通常用于提供公共内容，例如布局，如清单\
  \ 23-28 所示。\n\n```\n{{ define \"mainTemplate\" -}}\nThis is the layout header\n\
  {{ block \"body\" . }}\nThere are {{ len . }} products in the source data.\n{{ end\
  \ }}\nThis is the layout footer\n{{ end }}\n```\n\n> **清单 23-28：** 在 `templates`\
  \ 文件夹中的 `template.html` 文件中定义一个块\n\n`block` 操作用于为模板指定一个名称，但与 `define` 操作不同，该模板会直接包含在输出中，而无需使用\
  \ `template` 操作。通过编译并运行项目可以看到这一点（我已格式化输出以移除空白符）：\n\n```\nThis is the layout header\n\
  There are 8 products in the source data.\nThis is the layout footer\n```\n\n单独使用时，模板文件的输出包含块中的内容。但此内容可以被另一个模板文件重新定义。在\
  \ `templates` 文件夹中添加一个名为 `list.html` 的文件，内容如清单 23-29 所示。\n\n```\n{{ define \"body\"\
  \ }}\n{{ range . }}\nProduct: {{ .Name }} ({{ printf \"$%.2f\" .Price}})\n{{ end\
  \ -}}\n{{ end }}\n```\n\n> **清单 23-29：** `templates` 文件夹中 `list.html` 文件的内容\n\n\
