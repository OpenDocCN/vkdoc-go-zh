  \ {\nsquares[val] = int(math.Pow(float64(val), 2))\n}\n// rwmutex.Unlock()\n// Printfln(\"\
  Broadcasting condition\")\n// readyCond.Broadcast()\n// waitGroup.Done()\n}\nfunc\
  \ readSquares(id, max, iterations int) {\nonce.Do(func () {\ngenerateSquares(max)\n\
  })\n// readyCond.L.Lock()\n// for len(squares) == 0 {\n//     readyCond.Wait()\n\
  // }\nfor i := 0; i < iterations; i++ {\nkey := rand.Intn(max)\nPrintfln(\"#%v Read\
  \ value: %v = %v\", id, key, squares[key])\ntime.Sleep(time.Millisecond * 100)\n\
  }\n//readyCond.L.Unlock()\nwaitGroup.Done()\n}\nfunc main() {\nrand.Seed(time.Now().UnixNano())\n\
  numRoutines := 2\nwaitGroup.Add(numRoutines)\nfor i := 0; i < numRoutines; i++ {\n\
  go readSquares(i, 10, 5)\n}\n// waitGroup.Add(1)\n// go generateSquares(10)\nwaitGroup.Wait()\n\
  Printfln(\"Cached values: %v\", len(squares))\n}\n```\n\n*代码清单 30-13*：在 `coordination`\
  \ 文件夹的 `main.go` 文件中的函数只执行一次\n\n使用 `Once` 结构体简化了此示例，因为 `Do` 方法会阻塞，直到它接收的函数执行完毕，之后再次调用\
  \ `Do` 方法时不会再执行该函数。由于在此示例中，对共享数据的唯一修改是由 `generateSquares` 函数完成的，因此使用 `Do` 方法来执行此函数确保了这些修改是安全进行的。并非所有代码都能如此完美地适配\
  \ `Once` 模型，但在此示例中，我可以移除 `RWMutex` 和 `Cond`。编译并执行该项目，您将看到类似于以下的输出：\n\n```\nGenerating\
  \ data...\n#1 Read value: 0 = 0\n#0 Read value: 0 = 0\n#0 Read value: 4 = 16\n#1\
  \ Read value: 9 = 81\n#1 Read value: 2 = 4\n#0 Read value: 9 = 81\n#0 Read value:\
  \ 8 = 64\n#1 Read value: 3 = 9\n#1 Read value: 7 = 49\n#0 Read value: 3 = 9\nCached\
  \ values: 10\n```\n\n### 使用上下文\n\nGo 语言使得创建服务器应用程序变得很容易，这些应用程序代表客户端接收请求，并在自己的 goroutine\
  \ 中处理它们。`context` 包提供了 `Context` 接口，使用表 30-10 中描述的方法，可以更轻松地管理请求。\n\n**表 30-10**\
  \ `Context` 接口定义的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Value(key)` | 该方法返回与指定键关联的值。\
  \ |\n| `Done()` | 该方法返回一个可用于接收取消通知的通道。 |\n| `Deadline()` | 该方法返回表示请求截止时间的 `time.Time`，以及一个\
  \ `bool` 值，如果未指定截止时间，则该值为 `false`。 |\n| `Err()` | 该方法返回一个 `error`，指示 `Done` 通道收到信号的原因。`context`\
  \ 包定义了两个可用于比较 `error` 的变量：`Canceled` 表示请求被取消，`DeadlineExeeded` 表示已超过截止时间。 |\n\n\
  `context` 包提供了表 30-11 中描述的函数，用于创建 `Context` 值。\n\n**表 30-11** 用于创建 `Context` 值的\
  \ `context` 包函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Background()` | 该方法返回默认的 `Context`，其他上下文均由此派生。\
  \ |\n| `WithCancel(ctx)` | 该方法返回一个上下文和一个取消函数，如“取消请求”一节所述。 |\n| `WithDeadline(ctx,\
  \ time)` | 该方法返回一个带有截止时间的上下文，截止时间使用 `time.Time` 值表示，如“设置截止时间”一节所述。 |\n| `WithTimeout(ctx,\
  \ duration)` | 该方法返回一个带有截止时间的上下文，截止时间使用 `time.Duration` 值表示，如“设置截止时间”一节所述。 |\n|\
  \ `WithValue(ctx, key, val)` | 该方法返回一个包含指定键值对的上下文，如“提供请求数据”一节所述。 |\n\n为准备本节内容，代码清单\
  \ 30-14 定义了一个模拟请求处理的函数。\n\n```go\npackage main\nimport (\n\"sync\"\n\"time\"\n//\
  \ \"math\"\n// \"math/rand\"\n)\nfunc processRequest(wg *sync.WaitGroup, count int)\
  \ {\ntotal := 0\nfor i := 0; i < count; i++ {\nPrintfln(\"Processing request: %v\"\
  , total)\ntotal++\ntime.Sleep(time.Millisecond * 250)\n}\nPrintfln(\"Request processed...%v\"\
  , total)\nwg.Done()\n}\nfunc main() {\nwaitGroup := sync.WaitGroup {}\nwaitGroup.Add(1)\n\
  Printfln(\"Request dispatched...\")\ngo processRequest(&waitGroup, 10)\nwaitGroup.Wait()\n\
  }\n```\n\n*代码清单 30-14*：在 `coordination` 文件夹的 `main.go` 文件中模拟请求处理\n\n`processRequest`\
  \ 函数通过递增计数器来模拟处理一个请求，并调用 `time.Sleep` 函数来放慢处理速度。`main` 函数使用一个 goroutine 来调用 `processRequest`\
  \ 函数，模拟来自客户端的请求到达。（有关处理实际请求的示例，请参见第 3 部分。本节仅介绍上下文的工作原理。）编译并执行该项目，您将看到以下输出：\n\n```\n\
  Request dispatched...\nProcessing request: 0\nProcessing request: 1\nProcessing\
  \ request: 2\nProcessing request: 3\nProcessing request: 4\nProcessing request:\
  \ 5\nProcessing request: 6\nProcessing request: 7\nProcessing request: 8\nProcessing\
  \ request: 9\nRequest processed...10\n```\n\n\n\n#### 取消请求\n\n`Context` 的第一个用途是在请求被取消时通知处理该请求的代码，如代码清单\
  \ 30-19 所示。\n\n```go\npackage main\nimport (\n\"sync\"\n\"time\"\n// \"math\"\n\
  // \"math/rand\"\n\"context\"\n)\nfunc processRequest(ctx context.Context, wg *sync.WaitGroup,\
  \ count int) {\ntotal := 0\nfor i := 0; i < count; i++ {\nselect {\ncase <- ctx.Done():\n\
  Printfln(\"Stopping processing - request cancelled\")\ngoto end\ndefault:\nPrintfln(\"\
  Processing request: %v\", total)\ntotal++\ntime.Sleep(time.Millisecond * 250)\n\
  }\n}\nPrintfln(\"Request processed...%v\", total)\nend:\nwg.Done()\n}\nfunc main()\
  \ {\nwaitGroup := sync.WaitGroup {}\nwaitGroup.Add(1)\nPrintfln(\"Request dispatched...\"\
  )\nctx, cancel := context.WithCancel(context.Background())\ngo processRequest(ctx,\
  \ &waitGroup, 10)\ntime.Sleep(time.Second)\nPrintfln(\"Canceling request\")\ncancel()\n\
  waitGroup.Wait()\n}\n```\n\n`Background` 函数返回默认的 `Context`，它本身没什么实际作用，但为使用表 30-11\
  \ 中描述的其他函数派生新的 `Context` 值提供了一个起点。 `WithCancel` 函数返回一个可以被取消的 `Context`，以及一个用于执行取消操作的函数：\n\
  \n```go\n...\nctx, cancel := context.WithCancel(context.Background())\ngo processRequest(ctx,\
  \ &waitGroup, 10)\n...\n```\n\n派生的上下文被传递给 `processRequest` 函数。`main` 函数调用 `time.Sleep`\
  \ 函数，让 `processRequest` 函数有机会执行一些工作，然后调用取消函数：\n\n```go\n...\ntime.Sleep(time.Second)\n\
  Printfln(\"Canceling request\")\ncancel()\n...\n```\n\n调用取消函数会向上下文的 `Done` 方法返回的通道发送一条消息，该通道通过\
  \ `select` 语句进行监视：\n\n```go\n...\ncase <- ctx.Done():\nPrintfln(\"Stopping processing\
  \ - request cancelled\")\ngoto end\ndefault:\nPrintfln(\"Processing request: %v\"\
  , total)\ntotal++\ntime.Sleep(time.Millisecond * 250)\n}\n...\n```\n\n如果请求未被取消，`Done`\
  \ 通道会被阻塞，因此会执行 `default` 子句，从而允许处理请求。在每个工作单元之后检查该通道，并使用 `goto` 语句跳出处理循环，以便可以通知 `WaitGroup`\
  \ 并结束函数。编译并执行该项目，您将看到模拟的请求处理被提前终止，输出如下：\n\n```\nRequest dispatched...\nProcessing\
  \ request: 0\nProcessing request: 1\nProcessing request: 2\nProcessing request:\
  \ 3\nCanceling request\nStopping processing - request cancelled\n```\n\n#### 设置截止时间\n\
  \n可以创建带有截止时间的上下文，截止时间过后，`Done` 通道会收到一个信号，就像请求被取消时一样。可以使用 `WithDeadline` 函数指定一个绝对时间，该函数接受一个\
  \ `time.Time` 值；或者，如代码清单 30-20 所示，`WithTimeout` 函数接受一个 `time.Duration`，它指定了一个相对于当前时间的截止时间。`Context.Deadline`\
  \ 方法可用于在请求处理期间检查截止时间。\n\n```go\npackage main\nimport (\n\"sync\"\n\"time\"\n// \"\
  math\"\n// \"math/rand\"\n\"context\"\n)\nfunc processRequest(ctx context.Context,\
  \ wg *sync.WaitGroup, count int) {\ntotal := 0\nfor i := 0; i < count; i++ {\nselect\
  \ {\ncase <- ctx.Done():\nif (ctx.Err() == context.Canceled) {\nPrintfln(\"Stopping\
  \ processing - request cancelled\")\n} else {\nPrintfln(\"Stopping processing -\
  \ deadline reached\")\n}\ngoto end\ndefault:\nPrintfln(\"Processing request: %v\"\
  , total)\ntotal++\ntime.Sleep(time.Millisecond * 250)\n}\n}\nPrintfln(\"Request\
  \ processed...%v\", total)\nend:\nwg.Done()\n}\nfunc main() {\nwaitGroup := sync.WaitGroup\
  \ {}\nwaitGroup.Add(1)\nPrintfln(\"Request dispatched...\")\nctx, _ := context.WithTimeout(context.Background(),\
  \ time.Second * 2)\ngo processRequest(ctx, &waitGroup, 10)\n// time.Sleep(time.Second)\n\
  // Printfln(\"Canceling request\")\n// cancel()\nwaitGroup.Wait()\n}\n```\n\n`WithDeadline`\
  \ 和 `WithTimeout` 函数返回派生的上下文和一个取消函数，这允许在截止时间到期之前取消请求。在此示例中，`processRequest` 函数所需的时间超过了截止时间，这意味着\
  \ `Done` 通道将终止处理。编译并执行该项目，您将看到类似于以下的输出：\n\n```\nRequest dispatched...\nProcessing\
  \ request: 0\nProcessing request: 1\nProcessing request: 2\nProcessing request:\
  \ 3\nProcessing request: 4\nProcessing request: 5\nProcessing request: 6\nProcessing\
  \ request: 7\nStopping processing - deadline reached\n```\n\n#### 提供请求数据\n\n`WithValue`\
  \ 函数创建一个带有键值对的派生 `Context`，该键值对可以在请求处理期间读取，如代码清单 30-21 所示。\n\n```go\npackage main\n\
  import (\n\"sync\"\n\"time\"\n// \"math\"\n// \"math/rand\"\n\"context\"\n)\nconst\
  \ (\ncountKey  = iota\nsleepPeriodKey\n)\nfunc processRequest(ctx context.Context,\
  \ wg *sync.WaitGroup) {\ntotal := 0\ncount := ctx.Value(countKey).(int)\nsleepPeriod\
  \ := ctx.Value(sleepPeriodKey).(time.Duration)\nfor i := 0; i < count; i++ {\nselect\
  \ {\ncase <- ctx.Done():\nif (ctx.Err() == context.Canceled) {\nPrintfln(\"Stopping\
  \ processing - request cancelled\")\n} else {\nPrintfln(\"Stopping processing -\
  \ deadline reached\")\n}\ngoto end\ndefault:\nPrintfln(\"Processing request: %v\"\
  , total)\ntotal++\ntime.Sleep(sleepPeriod)\n}\n}\nPrintfln(\"Request processed...%v\"\
  , total)\nend:\nwg.Done()\n}\nfunc main() {\nwaitGroup := sync.WaitGroup {}\nwaitGroup.Add(1)\n\
  Printfln(\"Request dispatched...\")\nctx, _ := context.WithTimeout(context.Background(),\
  \ time.Second * 2)\nctx = context.WithValue(ctx, countKey, 4)\nctx = context.WithValue(ctx,\
  \ sleepPeriodKey, time.Millisecond * 250)\ngo processRequest(ctx, &waitGroup)\n\
  // time.Sleep(time.Second)\n// Printfln(\"Canceling request\")\n// cancel()\nwaitGroup.Wait()\n\
  }\n```\n\n`WithValue` 函数只接受单个键值对，但可以重复调用表 30-11 中的函数来创建所需的特性组合。在代码清单 30-21 中，使用\
  \ `WithTimeout` 函数派生一个带有截止时间的 `Context`，然后将此派生的 `Context` 作为参数传递给 `WithValue` 函数，以添加两个键值对。这些数据通过\
  \ `Value` 方法访问，这意味着请求处理函数不必为其所需的所有数据值定义参数。编译并执行该项目，您将看到以下输出：\n\n```\nRequest dispatched...\n\
  Processing request: 0\nProcessing request: 1\nProcessing request: 2\nProcessing\
  \ request: 3\nRequest processed...4\n```\n\n## 小结\n\n在本章中，我描述了用于协调 goroutine 的标准库特性，包括使用等待组（允许一个\
  \ goroutine 等待其他 goroutine 完成）和互斥锁（阻止 goroutine 同时修改相同数据）。我还介绍了 `Context` 特性，它允许服务器更一致地处理请求。在本书第\
  \ 3 部分中，我将反复使用这个特性，其中我将创建一个自定义的 Web 应用程序框架和一个使用该框架的在线商店。在下一章中，我将介绍用于单元测试的标准库支持。\n\
  \n\n\n"
- "# 31. 单元测试、基准测试与日志记录\n\n在本章中，我将通过单元测试、基准测试和日志记录来介绍最实用的标准库包。Go 的日志功能虽然基础，但尚可；此外还有许多第三方包可用于将日志信息发送到不同目的地。测试和基准测试功能已集成到\
  \ `go` 命令中，但正如我接下来要解释的，我对这两项功能并不热衷。表 31-1 总结了本章内容。\n\n表 31-1  \n章节概要\n\n| 问题 | 解决方案\
  \ | 代码清单 |\n| --- | --- | --- |\n| 创建单元测试 | 添加一个以 `_test.go` 结尾的文件，定义一个以 `Test`\
  \ 开头且后跟大写字母的函数，并使用 `testing` 包提供的功能 | 4, 6, 7, 10, 11 |\n| 运行单元测试 | 使用 `go test`\
  \ 命令 | 5, 8, 9 |\n| 创建基准测试 | 定义一个以 `Benchmark` 开头且后跟大写字母的函数 | 12, 14, 15 |\n| 运行基准测试\
  \ | 使用带有 `-bench` 参数的 `go test` 命令 | 13 |\n| 记录数据 | 使用 `log` 包提供的功能 | 16, 17 |\n\
  \n## 本章准备\n\n为准备本章内容，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `tests` 的目录。在 `tests` 文件夹中运行如代码清单\
  \ 31-1 所示的命令以创建一个模块文件。\n\n提示\n\n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章——以及本书所有其他章节——的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init tests\n\
  ```\n代码清单 31-1  \n初始化模块\n\n在 `tests` 文件夹中添加一个名为 `main.go` 的文件，其内容如代码清单 31-2 所示。\n\
  \n```\npackage main\nimport (\n\"sort\"\n\"fmt\"\n)\nfunc sortAndTotal(vals []int)\
  \ (sorted []int, total int) {\nsorted = make([]int, len(vals))\ncopy(sorted, vals)\n\
  sort.Ints(sorted)\nfor _, val := range sorted {\ntotal += val\ntotal++\n}\nreturn\n\
  }\nfunc main() {\nnums := []int { 100, 20, 1, 7, 84 }\nsorted, total := sortAndTotal(nums)\n\
  fmt.Println(\"Sorted Data:\", sorted)\nfmt.Println(\"Total:\", total)\n}\n```\n\
  代码清单 31-2  \n`tests` 文件夹中 `main.go` 文件的内容\n\n`sortAndTotal` 函数包含一个故意引入的错误，这将有助于演示下一节中的测试功能。在\
  \ `tests` 文件夹中运行如代码清单 31-3 所示的命令以编译并执行该项目。\n\n```\ngo run .\n```\n代码清单 31-3  \n\
  编译并运行项目\n\n该命令将产生以下输出：\n\n```\nSorted Data: [1 7 20 84 100]\nTotal: 217\n```\n\n\
  ## 使用测试\n\n单元测试定义在文件名以 `_test.go` 结尾的文件中。若要创建一个简单的测试，请在 `tests` 文件夹中添加一个名为 `simple_test.go`\
  \ 的文件，其内容如代码清单 31-4 所示。\n\n```\npackage main\nimport \"testing\"\nfunc TestSum(t\
  \ *testing.T) {\ntestValues := []int{ 10, 20, 30 }\n_, sum := sortAndTotal(testValues)\n\
  expected := 60\nif (sum != expected) {\nt.Fatalf(\"Expected %v, Got %v\", expected,\
  \ sum)\n}\n}\n```\n代码清单 31-4  \n`tests` 文件夹中 `simple_test.go` 文件的内容\n\nGo 标准库通过\
  \ `testing` 包为编写单元测试提供支持。单元测试被表示为以 `Test` 开头的函数，后跟一个以大写字母开头的术语，例如 `TestSum`。（大写字母很重要，因为测试工具不会将以\
  \ `Testsum` 这样的函数名识别为单元测试。）\n\n### 决定是否使用测试工具\n\n我喜欢集成测试的理念，但我发现自己并不常用 Go 的测试功能；即使使用，也并非按预期的方式使用。\n\
  \n我喜欢单元测试，但我只在尝试理清具有复杂问题的代码时，或者在编写我知道很难一次写对的功能时，才会编写测试。这可能只是我思考测试的方式，或者是我习惯了经典的\
  \ arrange/act/assert 测试工具模式，但 Go 的测试工具总有一些让我不太喜欢的地方。\n\n我最终使用测试是为了能创建简单的入口点来检查特定包是否正常工作。但即便如此，我也只是创建一个简单的测试，用于实例化包中的类型，从而让我能够访问它们定义的字段、函数和方法，而不必修改我的\
  \ `main` 函数。这些测试中的代码总是杂乱无章的，我使用 `println` 语句输出结果，而不是使用表 31-2 中描述的方法。一旦确认代码工作正常，我就会删除测试文件。\n\
  \n我完全承认这是我的一个缺点，但我对于 Go 的测试工具就是提不起热情。这并不意味着你不会觉得它们有用——也许你比我更勤奋。但如果你发现本节描述的功能并不能激发你编写测试的动力，那么请记住，你并不孤单。\n\
  \n单元测试函数接收一个指向 `T` 结构体的指针，该结构体定义了管理测试和报告测试结果的方法。Go 测试不依赖断言，而是使用常规代码语句编写。测试工具只关心测试是否失败，失败信息通过表\
  \ 31-2 中描述的方法来报告。\n\n表 31-2  \n用于报告测试结果的 `T` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `Log(...vals)` | 此方法将指定的值写入测试错误日志。 |\n| `Logf(template, ...vals)` | 此方法使用指定的模板和值向测试错误日志写入一条消息。\
  \ |\n| `Fail()` | 调用此方法将测试标记为失败，但继续执行测试。 |\n| `FailNow()` | 调用此方法将测试标记为失败，并停止执行测试。\
  \ |\n| `Failed()` | 如果测试失败，此方法返回 `true`。 |\n| `Error(...errs)` | 调用此方法等效于先调用 `Log`\
  \ 方法，再调用 `Fail` 方法。 |\n| `Errorf(template, ...vals)` | 调用此方法等效于先调用 `Logf` 方法，再调用\
  \ `Fail` 方法。 |\n| `Fatal(...vals)` | 调用此方法等效于先调用 `Log` 方法，再调用 `FailNow` 方法。 |\n\
  | `Fatalf(template, ...vals)` | 调用此方法等效于先调用 `Logf` 方法，再调用 `FailNow` 方法。 |\n\n代码清单\
  \ 31-4 中的测试调用 `sumAndTotal` 函数，传入一组值，并使用标准 Go 比较运算符将结果与预期结果进行比较。如果结果不等于预期值，则调用 `Fatalf`\
  \ 方法，该方法报告测试失败并阻止执行单元测试中的任何剩余语句（尽管此示例中没有剩余语句）。\n\n### 理解测试包访问权限\n\n代码清单 31-4 中的测试文件使用\
  \ `package` 关键字指定了 `main` 包。由于测试是用标准 Go 编写的，这意味着此文件中的测试可以访问 `main` 包中定义的所有功能，包括那些未在包外导出的功能。\n\
  \n如果你希望编写仅能访问导出功能的测试，则可以使用 `package` 语句指定 `main_test` 包。`_test` 后缀不会导致编译器问题，并且允许编写的测试仅能访问被测试包中导出的功能。\n\
  \n\n\n### 运行单元测试\n\n要发现并运行项目中的单元测试，请在 `tests` 文件夹中运行如代码清单 31-5 所示的命令。\n\n#### 为单元测试编写\
  \ Mock 对象\n\n创建单元测试 mock 实现的唯一方法是创建接口实现，这样可以定义自定义方法来产生测试所需的结果。如果要在单元测试中使用 mock，则应编写接受接口类型的\
  \ API。\n\n尽管 mock 的使用仅限于接口，但通常仍然可以创建结构体值，为其字段分配特定的值用于测试。这有时可能有点麻烦，但大多数函数和方法都可以通过某种方式进行测试，即使需要一些持久化的技巧来弄清楚细节。\n\
  \n```\ngo test\n代码清单 31-5\n执行单元测试\n```\n\n如前所述，代码清单 31-2 中定义的代码存在错误，导致单元测试失败：\n\n\
  ```\ntests > go test\n--- FAIL: TestSum (0.00s)\nsimple_test.go:10: Expected 60,\
  \ Got 63\nFAIL\nexit status 1\nFAIL    tests   0.090s\n```\n\n测试输出报告了错误以及测试运行的整体结果。代码清单\
  \ 31-6 修复了 `sortAndTotal` 函数中的错误。\n\n```\n...\nfunc sortAndTotal(vals []int) (sorted\
  \ []int, total int) {\nsorted = make([]int, len(vals))\ncopy(sorted, vals)\nsort.Ints(sorted)\n\
  for _, val := range sorted {\ntotal += val\n//total++\n}\nreturn\n}\n...\n代码清单 31-6\n\
  修复 tests 文件夹中 main.go 文件中的错误\n```\n\n保存更改并运行 `go test` 命令，输出将显示测试通过：\n\n```\nPASS\n\
  ok      tests   0.102s\n```\n\n一个测试文件可以包含多个测试，它们会被自动发现并执行。代码清单 31-7 在 `simple_test.go`\
  \ 文件中添加了第二个测试函数。\n\n```\npackage main\nimport (\n\"testing\"\n\"sort\"\n)\nfunc\
  \ TestSum(t *testing.T) {\ntestValues := []int{ 10, 20, 30 }\n_, sum := sortAndTotal(testValues)\n\
  expected := 60\nif (sum != expected) {\nt.Fatalf(\"Expected %v, Got %v\", expected,\
  \ sum)\n}\n}\nfunc TestSort(t *testing.T) {\ntestValues := []int{ 1, 279, 48, 12,\
  \ 3}\nsorted, _ := sortAndTotal(testValues)\nif (!sort.IntsAreSorted(sorted)) {\n\
  t.Fatalf(\"Unsorted data %v\", sorted)\n}\n}\n代码清单 31-7\n在 tests 文件夹的 simple_test.go\
  \ 文件中定义测试\n```\n\n`TestSort` 测试验证 `sortAndTotal` 函数是否对数据进行了排序。请注意，在单元测试中我可以依赖 Go\
  \ 标准库提供的特性，并使用 `sort.IntsAreSorted` 函数来执行测试。运行 `go test` 命令，你将看到以下结果：\n\n```\nok\
  \      tests   0.087s\n```\n\n`go test` 命令默认不报告任何详细信息，但可以通过在 `tests` 文件夹中运行代码清单\
  \ 31-8 所示的命令来生成更多信息。\n\n```\ngo test  -v\n代码清单 31-8\n执行详细测试\n```\n\n`-v` 参数启用详细模式，该模式会报告每个测试的结果：\n\
  \n```\n=== RUN   TestSum\n--- PASS: TestSum (0.00s)\n=== RUN   TestSort\n--- PASS:\
  \ TestSort (0.00s)\nPASS\nok      tests   0.164s\n```\n\n#### 运行特定测试\n\n`go test`\
  \ 命令可用于按名称选择运行测试。在 `tests` 文件夹中运行代码清单 31-9 所示的命令。\n\n```\ngo test -v -run \"um\"\
  \n代码清单 31-9\n在 tests 文件夹的 main.go 文件中选择测试\n```\n\n测试通过正则表达式进行选择，代码清单 31-9 中的命令选择函数名包含\
  \ `um` 的测试（无需包含函数名中的 `Test` 部分）。唯一名称匹配该表达式的测试是 `TestSum`，该命令产生以下输出：\n\n```\n===\
  \ RUN   TestSum\n--- PASS: TestSum (0.00s)\nPASS\nok      tests   0.123s\n```\n\n\
  ### 管理测试执行\n\n`T` 结构体还提供了一组用于管理测试执行的方法，如表 31-3 所述。\n\n**表 31-3** 用于管理测试执行的 T 方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Run(name, func)` | 调用此方法将指定的函数作为子测试执行。在测试于其自身的\
  \ goroutine 中执行时，该方法会阻塞，并返回一个 `bool` 值，指示测试是否成功。 |\n| `SkipNow()` | 调用此方法将停止执行测试并将其标记为跳过。\
  \ |\n| `Skip(...args)` | 此方法等同于先调用 `Log` 方法，再调用 `SkipNow` 方法。 |\n| `Skipf(template,\
  \ ...args)` | 此方法等同于先调用 `Logf` 方法，再调用 `SkipNow` 方法。 |\n| `Skipped()` | 如果测试已被跳过，此方法返回\
  \ `true`。 |\n\n`Run` 方法用于执行子测试，这是从单个函数运行一系列相关测试的便捷方式，如代码清单 31-10 所示。\n\n```\npackage\
  \ main\nimport (\n\"testing\"\n\"sort\"\n\"fmt\"\n)\nfunc TestSum(t *testing.T)\
  \ {\ntestValues := []int{ 10, 20, 30 }\n_, sum := sortAndTotal(testValues)\nexpected\
  \ := 60\nif (sum != expected) {\nt.Fatalf(\"Expected %v, Got %v\", expected, sum)\n\
  }\n}\nfunc TestSort(t *testing.T) {\nslices := [][]int {\n{ 1, 279, 48, 12, 3 },\n\
  { -10, 0, -10 },\n{ 1, 2, 3, 4, 5, 6, 7 },\n{ 1 },\n}\nfor index, data := range\
  \ slices {\nt.Run(fmt.Sprintf(\"Sort #%v\", index), func(subT *testing.T) {\nsorted,\
  \ _ := sortAndTotal(data)\nif (!sort.IntsAreSorted(sorted)) {\nsubT.Fatalf(\"Unsorted\
  \ data %v\", sorted)\n}\n})\n}\n}\n代码清单 31-10\n在 tests 文件夹的 simple_test.go 文件中运行子测试\n\
  ```\n\n`Run` 方法的参数是测试的名称以及一个接受 `T` 结构体并执行测试的函数。在代码清单 31-10 中，`Run` 方法用于测试一组不同的 `int`\
  \ 切片是否被正确排序。使用 `go test -v` 命令运行测试以显示详细输出，你将看到以下输出：\n\n```\n=== RUN   TestSum\n\
  --- PASS: TestSum (0.00s)\n=== RUN   TestSort\n=== RUN   TestSort/Sort_#0\n=== RUN\
  \   TestSort/Sort_#1\n=== RUN   TestSort/Sort_#2\n=== RUN   TestSort/Sort_#3\n---\
  \ PASS: TestSort (0.00s)\n--- PASS: TestSort/Sort_#0 (0.00s)\n--- PASS: TestSort/Sort_#1\
  \ (0.00s)\n--- PASS: TestSort/Sort_#2 (0.00s)\n--- PASS: TestSort/Sort_#3 (0.00s)\n\
  PASS\nok      tests   0.112s\n```\n\n\n\n#### 跳过测试\n\n可以使用表 31-3 中描述的方法跳过测试，当某个测试失败导致执行相关测试意义不大时，此方法非常有用，如清单\
  \ 31-11 所示。\n\n```\npackage main\nimport (\n\"testing\"\n\"sort\"\n\"fmt\"\n)\n\
  type SumTest struct {\ntestValues []int\nexpectedResult int\n}\nfunc TestSum(t *testing.T)\
  \ {\ntestVals := []SumTest {\n{ testValues: []int{10, 20, 30}, expectedResult: \
  \ 10},\n{ testValues: []int{ -10, 0, -10 }, expectedResult:  -20},\n{ testValues:\
  \ []int{ -10, 0, -10 }, expectedResult:  -20},\n}\nfor index, testVal := range testVals\
  \ {\nt.Run(fmt.Sprintf(\"Sum #%v\", index), func(subT *testing.T) {\nif (t.Failed())\
  \ {\nsubT.SkipNow()\n}\n_, sum := sortAndTotal(testVal.testValues)\nif (sum != testVal.expectedResult)\
  \ {\nsubT.Fatalf(\"Expected %v, Got %v\", testVal.expectedResult, sum)\n}\n})\n\
  }\n}\nfunc TestSort(t *testing.T) {\nslices := [][]int {\n{ 1, 279, 48, 12, 3 },\n\
  { -10, 0, -10 },\n{ 1, 2, 3, 4, 5, 6, 7 },\n{ 1 },\n}\nfor index, data := range\
  \ slices {\nt.Run(fmt.Sprintf(\"Sort #%v\", index), func(subT *testing.T) {\nsorted,\
  \ _ := sortAndTotal(data)\nif (!sort.IntsAreSorted(sorted)) {\nsubT.Fatalf(\"Unsorted\
  \ data %v\", sorted)\n}\n})\n}\n}\n清单 31-11\n在 tests 文件夹的 simple_test.go 文件中跳过测试\n\
  ```\n\n`TestSum`函数已被重写以运行子测试。使用子测试时，如果任何单个测试失败，则整个测试也会失败。在清单 31-11 中，我通过调用整体测试的`T`结构上的`Failed`方法，并使用`SkipNow`方法在发生故障后跳过子测试来依赖此行为。`TestSum`执行的第一个子测试定义的预期结果不正确，导致测试失败，当使用`go\
  \ test -v`命令时会产生以下输出：\n\n```\n=== RUN   TestSum\n=== RUN   TestSum/Sum_#0\nsimple_test.go:27:\
  \ Expected 10, Got 60\n=== RUN   TestSum/Sum_#1\n=== RUN   TestSum/Sum_#2\n--- FAIL:\
  \ TestSum (0.00s)\n--- FAIL: TestSum/Sum_#0 (0.00s)\n--- SKIP: TestSum/Sum_#1 (0.00s)\n\
  --- SKIP: TestSum/Sum_#2 (0.00s)\n=== RUN   TestSort\n=== RUN   TestSort/Sort_#0\n\
  === RUN   TestSort/Sort_#1\n=== RUN   TestSort/Sort_#2\n=== RUN   TestSort/Sort_#3\n\
  --- PASS: TestSort (0.00s)\n--- PASS: TestSort/Sort_#0 (0.00s)\n--- PASS: TestSort/Sort_#1\
  \ (0.00s)\n--- PASS: TestSort/Sort_#2 (0.00s)\n--- PASS: TestSort/Sort_#3 (0.00s)\n\
  FAIL\nexit status 1\nFAIL    tests   0.138s\n```\n\n## 基准测试代码\n\n名称以`Benchmark`开头、后跟以大写字母开头的单词（如`Sort`）的函数是基准测试，其执行将被计时。基准测试函数接收一个指向`testing.B`结构体的指针，该结构体定义了表\
  \ 31-4 中描述的字段。\n\n表 31-4  \n由 `B` 结构体定义的字段\n\n| 名称 | 描述 |\n| --- | --- |\n| `N`\
  \ | 这个`int`字段指定基准测试函数应执行待测代码的次数。 |\n\n`N`的值用于基准测试函数内部的`for`循环中，以重复执行待测代码。基准测试工具可能会使用不同的`N`值重复调用基准测试函数，以建立稳定的测量结果。在`tests`文件夹中添加一个名为`benchmark_test.go`的文件，内容如清单\
  \ 31-12 所示。\n\n决定何时进行基准测试\n\n性能调优代码就像性能调优汽车：可能很有趣，通常很昂贵，而且几乎每次都会引发比解决的问题更多的问题。\n\
  \n任何项目中最昂贵的部分都是程序员时间，无论是在初始开发阶段还是在维护阶段。性能调优不仅会占用本可用于完成项目的时间，而且通常会导致代码更难理解，这将在未来消耗更多时间，因为其他开发人员试图理解你巧妙的优化。\n\
  \n我愿意接受有些项目具有特定的性能要求，但你的项目很可能不是其中之一。不过别担心，因为我的项目也没有那些要求。对于普通项目来说，购买更多服务器或存储容量比雇佣昂贵的开发人员进行调优更便宜。\n\
  \n基准测试可以具有教育意义，通过理解代码的执行方式，你可以了解很多关于项目的信息。但进行教育性基准测试的时间窗口很短暂，介于部署和第一个缺陷报告到来之间，否则这段时间你可能只能用来按颜色整理打印纸。在此之前，我的建议是专注于编写易于理解和易于维护的代码。\n\
  \n```\npackage main\nimport (\n\"testing\"\n\"math/rand\"\n\"time\"\n)\nfunc BenchmarkSort(b\
  \ *testing.B) {\nrand.Seed(time.Now().UnixNano())\nsize := 250\ndata := make([]int,\
  \ size)\nfor i := 0; i < b.N; i++ {\nfor j := 0; j < size; j++ {\ndata[j] = rand.Int()\n\
  }\nsortAndTotal(data)\n}\n}\n清单 31-12\ntests 文件夹中 benchmark_test.go 文件的内容\n```\n\
  \n`BenchmarkSort`函数创建一个包含随机数据的切片，并将其传递给在清单 31-2 中定义的`sortAndTotal`函数。要执行基准测试，请在`tests`文件夹中运行清单\
  \ 31-13 所示的命令。\n\n```\ngo test -bench . -run notest\n清单 31-13\n执行基准测试\n```\n\n`-bench`参数后的句点会让`go\
  \ test`工具发现的所有基准测试都被执行。句点可以替换为正则表达式来选择特定的基准测试。默认情况下，单元测试也会被执行，但由于我在清单 31-12 的`TestSum`函数中引入了一个故意错误，我使用了`-run`参数指定了一个不会与项目中任何测试函数名称匹配的值，结果将只执行基准测试。\n\
  \n清单 31-13 中的命令会查找并执行`BenchmarkSort`函数，并产生类似如下的输出，具体内容因系统而异：\n\n```\ngoos: windows\n\
  goarch: amd64\npkg: tests\nBenchmarkSort-12           23853             42642 ns/op\n\
  PASS\nok      tests   1.577s\n```\n\n基准测试函数的名称后面跟着 CPU 或核心数，在我的系统上是 12，但这不会对测试结果产生影响，因为代码没有使用\
  \ goroutine：\n\n```\n...\nBenchmarkSort-12           23853             42642 ns/op\n\
  ...\n```\n\n下一个字段报告了传递给基准测试函数以生成这些结果的`N`值：\n\n```\n...\nBenchmarkSort-12       \
  \    23853             42642 ns/op\n...\n```\n\n在我的系统上，测试工具以`N`值为 23853 运行了`BenchmarkSort`函数。这个数字会因测试和系统而异。最后一个值报告了基准循环每次迭代所花费的持续时间（以纳秒为单位）：\n\
  \n```\n...\nBenchmarkSort-12           23853             42642 ns/op\n...\n```\n\
  \n对于这次测试运行，基准测试完成了 42,642 纳秒。\n\n\n\n### 从基准测试中移除准备工作\n\n在`for`循环的每次迭代中，`BenchmarkSort`函数都必须生成随机数据，而生成这些数据所花费的时间被计入基准测试结果中。`B`结构体定义了表\
  \ 31-5 中描述的方法，这些方法用于控制测试所用的计时器。\n\n**表 31-5**\n*用于计时控制的 B 方法*\n\n| 名称 | 描述 |\n|\
  \ --- | --- |\n| `StopTimer()` | 此方法停止计时器。 |\n| `StartTimer()` | 此方法启动计时器。 |\n|\
  \ `ResetTimer()` | 此方法重置计时器。 |\n\n当一个基准测试需要一些初始设置时，`ResetTimer`方法非常有用；而其他方法则在每次被测活动都有额外开销时发挥作用。清单\
  \ 31-14 使用了这些方法，将准备工作从基准测试结果中排除。\n\n```\npackage main\nimport (\n\"testing\"\n\"\
  math/rand\"\n\"time\"\n)\nfunc BenchmarkSort(b *testing.B) {\nrand.Seed(time.Now().UnixNano())\n\
  size := 250\ndata := make([]int, size)\nb.ResetTimer()\nfor i := 0; i < b.N; i++\
  \ {\nb.StopTimer()\nfor j := 0; j < size; j++ {\ndata[j] = rand.Int()\n}\nb.StartTimer()\n\
  sortAndTotal(data)\n}\n}\n```\n\n**清单 31-14**\n*在 tests 文件夹下的 benchmark_test.go\
  \ 文件中控制计时器*\n\n在设置了随机数种子并初始化了切片之后，计时器被重置。在`for`循环内部，使用`StopTimer`方法在切片填充随机数据前停止计时器，并使用`StartTimer`方法在调用`sortAndTotal`函数前启动计时器。在`tests`文件夹下运行清单\
  \ 31-14 所示的命令，修改后的基准测试将被执行。在我的系统上，产生了以下结果：\n\n```\ngoos: windows\ngoarch: amd64\n\
  pkg: tests\nBenchmarkSort-12           35088             32095 ns/op\nPASS\nok \
  \     tests   4.133s\n```\n\n排除了为基准测试做准备所需的工作后，对执行`sortAndTotal`函数所花费时间的评估更加准确了。\n\
  \n### 执行子基准测试\n\n基准测试函数可以执行子基准测试，就像测试函数可以运行子测试一样。为方便参考，表 31-6 描述了用于运行子基准测试的方法。\n\
  \n**表 31-6**\n*用于运行子基准测试的 B 方法*\n\n| 名称 | 描述 |\n| --- | --- |\n| `Run(name, func)`\
  \ | 调用此方法会将指定的函数作为子基准测试执行。该方法在基准测试执行期间会阻塞。 |\n\n清单 31-15 更新了`BenchmarkSort`函数，使其对不同的数组大小执行一系列基准测试。\n\
  \n```\npackage main\nimport (\n\"testing\"\n\"math/rand\"\n\"time\"\n\"fmt\"\n)\n\
  func BenchmarkSort(b *testing.B) {\nrand.Seed(time.Now().UnixNano())\nsizes := []int\
  \ { 10, 100, 250 }\nfor _, size := range sizes {\nb.Run(fmt.Sprintf(\"Array Size\
  \ %v\", size), func(subB *testing.B) {\ndata := make([]int, size)\nsubB.ResetTimer()\n\
  for i := 0; i < subB.N; i++ {\nsubB.StopTimer()\nfor j := 0; j < size; j++ {\ndata[j]\
  \ = rand.Int()\n}\nsubB.StartTimer()\nsortAndTotal(data)\n}\n})\n}\n}\n```\n\n**清单\
  \ 31-15**\n*在 tests 文件夹下的 benchmarks_test.go 文件中执行子基准测试*\n\n这些基准测试可能需要一些时间才能完成。以下是我系统上的结果，使用清单\
  \ 31-13 所示的命令生成：\n\n```\ngoos: windows\ngoarch: amd64\npkg: tests\nBenchmarkSort/Array_Size_10-12\
  \            753120              1984 ns/op\nBenchmarkSort/Array_Size_100-12   \
  \        110248             10953 ns/op\nBenchmarkSort/Array_Size_250-12       \
  \     34369             31717 ns/op\nPASS\nok      tests   61.453s\n```\n\n### 记录数据\n\
  \n`log`包提供了一个简单的日志记录 API，用于创建日志条目并将其发送到`io.Writer`，从而允许应用程序生成日志数据而不需要知道这些数据将存储在哪里。`log`包定义的最有用的函数如表\
  \ 31-7 所述。\n\n**表 31-7**\n*有用的 log 函数*\n\n| 名称 | 描述 |\n| --- | --- |\n| `Output()`\
  \ | 此函数返回将接收日志消息的`Writer`。默认情况下，日志消息写入标准输出。 |\n| `SetOutput(writer)` | 此函数使用指定的`Writer`进行日志记录。\
  \ |\n| `Flags()` | 此函数返回用于格式化日志消息的标志。 |\n| `SetFlags(flags)` | 此函数使用指定的标志来格式化日志消息。\
  \ |\n| `Prefix()` | 此函数返回应用于日志消息的前缀。默认没有前缀。 |\n| `SetPrefix(prefix)` | 此函数使用指定的`string`作为日志消息的前缀。\
  \ |\n| `Output(depth, message)` | 此函数将指定的消息写入由`Output`函数返回的`Writer`，并带有指定的调用深度，默认为`2`。调用深度用于控制代码文件的选择，通常不会更改。\
  \ |\n| `Print(...vals)` | 此函数通过调用`fmt.Sprint`并将结果传递给`Output`函数来创建日志消息。 |\n| `Printf(template,\
  \ ...vals)` | 此函数通过调用`fmt.Sprintf`并将结果传递给`Output`函数来创建日志消息。 |\n| `Fatal(...vals)`\
  \ | 此函数通过调用`fmt.Sprint`创建日志消息，将结果传递给`Output`函数，然后终止应用程序。 |\n| `Fatalf(template,\
  \ ...vals)` | 此函数通过调用`fmt.Sprintf`创建日志消息，将结果传递给`Output`函数，然后终止应用程序。 |\n| `Panic(...vals)`\
  \ | 此函数通过调用`fmt.Sprint`创建日志消息，然后将结果传递给`Output`函数，接着调用`panic`函数。 |\n| `Panicf(template,\
  \ ...vals)` | 此函数通过调用`fmt.Sprintf`创建日志消息，然后将结果传递给`Output`函数，接着调用`panic`函数。 |\n\n\
  日志消息的格式通过`SetFlags`函数控制，`log`包为它定义了表 31-8 中描述的常量。\n\n**表 31-8**\n*log 包常量*\n\n|\
  \ 名称 | 描述 |\n| --- | --- |\n| `Ldate` | 选择此标志会在日志输出中包含日期。 |\n| `Ltime` | 选择此标志会在日志输出中包含时间。\
  \ |\n| `Lmicroseconds` | 选择此标志会在时间中包含微秒。 |\n| `Llongfile` | 选择此标志会包含记录消息的代码文件名（含目录）和行号。\
  \ |\n| `Lshortfile` | 选择此标志会包含记录消息的代码文件名（不含目录）和行号。 |\n| `LUTC` | 选择此标志会使用 UTC 表示日期和时间，而不是本地时区。\
  \ |\n| `Lmsgprefix` | 选择此标志会将前缀从其默认位置（日志消息的开头）移动到紧靠传递给`Output`函数的字符串之前。 |\n| `LstdFlags`\
  \ | 此常量表示默认格式，即选择`Ldate`和`Ltime`。 |\n\n清单 31-16 使用了表 31-7 中的函数来执行简单的日志记录。\n\n\n\
  ```markdown\n\n## 代码示例与日志记录\n\n```go\npackage main\nimport (\n\"sort\"\n//\"fmt\"\
  \n\"log\"\n)\nfunc sortAndTotal(vals []int) (sorted []int, total int) {\nsorted\
  \ = make([]int, len(vals))\ncopy(sorted, vals)\nsort.Ints(sorted)\nfor _, val :=\
  \ range sorted {\ntotal += val\n//total++\n}\nreturn\n}\nfunc main() {\nnums :=\
  \ []int { 100, 20, 1, 7, 84 }\nsorted, total := sortAndTotal(nums)\nlog.Print(\"\
  Sorted Data: \", sorted)\nlog.Print(\"Total: \", total)\n}\nfunc init() {\nlog.SetFlags(log.Lshortfile\
  \ | log.Ltime)\n}\n```\n\n清单 31-16：在 `tests` 文件夹的 `main.go` 文件中记录日志消息\n\n初始化函数使用\
  \ `SetFlags` 函数选择 `Lshortfile` 和 `Ltime` 标志，这些标志将在日志输出中包含文件名和时间。在 `main` 函数中，使用\
  \ `Print` 函数创建日志消息。使用 `go run .` 命令编译并执行项目，您将看到类似于以下的输出：\n\n```\n08:51:25 main.go:26:\
  \ Sorted Data: [1 7 20 84 100]\n08:51:25 main.go:27: Total: 212\n```\n\n### 创建自定义日志记录器\n\
  \n`log` 包可用于设置不同的日志选项，以便应用程序的不同部分可以写入不同目标或使用不同格式选项。表 31-9 描述了用于创建自定义日志目标的函数。\n\n\
  **表 31-9：** 用于自定义日志记录的 `log` 包函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `New(writer, prefix,\
  \ flags)` | 此函数返回一个 `Logger`，它将消息写入指定的写入器，并配置了指定的前缀和标志。 |\n\n`New` 函数的结果是一个 `Logger`，它是一个结构体，定义了与表\
  \ 31-7 中描述的函数相对应的方法。表 31-7 中的函数只是调用默认记录器上同名的方法。清单 31-17 使用 `New` 函数创建一个 `Logger`。\n\
  \n```go\npackage main\nimport (\n\"sort\"\n//\"fmt\"\n\"log\"\n)\nfunc sortAndTotal(vals\
  \ []int) (sorted []int, total int) {\nvar logger = log.New(log.Writer(), \"sortAndTotal:\
  \ \",\nlog.Flags() | log.Lmsgprefix)\nlogger.Printf(\"Invoked with %v values\",\
  \ len(vals))\nsorted = make([]int, len(vals))\ncopy(sorted, vals)\nsort.Ints(sorted)\n\
  logger.Printf(\"Sorted data: %v\", sorted)\nfor _, val := range sorted {\ntotal\
  \ += val\n//total++\n}\nlogger.Printf(\"Total: %v\", total)\nreturn\n}\nfunc main()\
  \ {\nnums := []int { 100, 20, 1, 7, 84 }\nsorted, total := sortAndTotal(nums)\n\
  log.Print(\"Sorted Data: \", sorted)\nlog.Print(\"Total: \", total)\n}\nfunc init()\
  \ {\nlog.SetFlags(log.Lshortfile | log.Ltime)\n}\n```\n\n清单 31-17：在 `tests` 文件夹的\
  \ `main.go` 文件中创建自定义日志记录器\n\n`Logger` 结构体使用新的前缀和添加的 `Lmsgprefix` 标志创建，并使用从表 31-7\
  \ 中描述的 `Output` 函数获得的 `Writer`。结果是日志消息仍然写入同一目标，但带有一个额外的前缀，表示来自 `sortAndTotal` 函数的消息。编译并执行项目，您将看到额外的日志消息：\n\
  \n```\n09:12:37 main.go:11: sortAndTotal: Invoked with 5 values\n09:12:37 main.go:15:\
  \ sortAndTotal: Sorted data: [1 7 20 84 100]\n09:12:37 main.go:20: sortAndTotal:\
  \ Total: 212\n09:12:37 main.go:27: Sorted Data: [1 7 20 84 100]\n09:12:37 main.go:28:\
  \ Total: 212\n```\n\n## 总结\n\n在本章中，我通过单元测试、基准测试和日志记录完成了对最有用的标准库包的描述。正如我所解释的，我觉得测试功能不够吸引人，并且对基准测试有强烈保留意见，但这两组功能都很好地集成到了\
  \ Go 工具中，这使得它们更容易使用，如果您在这些主题上的观点与我不一致的话。日志记录功能争议较少，我在第三部分中创建的自定义 Web 应用程序平台中使用了它们。\n\
  \n# 第三部分：应用 Go\n\n# 32. 创建 Web 平台\n\n在本章中，我开始开发一个自定义 Web 应用程序平台，并在第 33 章和第 34 章中继续此开发。在第\
  \ 35 章至第 38 章中，我使用该平台创建一个名为 SportsStore 的应用程序，该应用程序以某种形式出现在我的几乎所有书籍中。\n\n本部分书籍的目的是展示\
  \ Go 被用于解决实际开发项目中出现的各种问题。对于 Web 应用程序平台，这意味着创建日志记录、会话、HTML 模板、授权等功能。对于 SportsStore\
  \ 应用程序，这意味着使用产品数据库、跟踪用户的产品选择、验证用户输入以及结账。\n\n请记住，这些章节中的代码是专门为本书编写的，并且仅测试到后续章节中的功能按预期工作的程度。有一些优秀的第三方包提供了本部分中创建的部分或全部功能，这些是开始您项目的良好起点。我推荐\
  \ Gorilla Web Toolkit（[`www.gorillatoolkit.org`](http://www.gorillatoolkit.org)），它提供了一些有用的包（我在第\
  \ 34 章中使用了其中一个包）。\n\n> **注意：** 这些章节内容高级且复杂，请务必完全按照所示示例进行操作。如果您遇到困难，应首先检查本书在 GitHub\
  \ 仓库（[`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)）中的勘误表，我将在其中列出任何出现问题的解决方案。\n\
  \n## 创建项目\n\n打开命令提示符，导航到合适的位置，并创建一个名为 `platform` 的新目录。导航到 `platform` 目录并运行清单 32-1\
  \ 中所示的命令。\n\n> **提示：** 您可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。有关如何在运行示例时遇到问题获得帮助，请参见第 2 章。\n\n```\ngo mod init platform\n\
  ```\n\n清单 32-1：初始化项目\n\n在 `platform` 文件夹中添加一个名为 `main.go` 的文件，内容如清单 32-2 所示。\n\n\
  ```go\npackage main\nimport (\n\"fmt\"\n)\nfunc writeMessage() {\nfmt.Println(\"\
  Hello, Platform\")\n}\nfunc main() {\nwriteMessage()\n}\n```\n\n清单 32-2：`platform`\
  \ 文件夹中 `main.go` 文件的内容\n\n在 `platform` 文件夹中运行清单 32-3 中所示的命令。\n\n```\ngo run .\n\
  ```\n\n清单 32-3：编译并执行项目\n\n项目将被编译并执行，并产生以下输出：\n\n```\nHello, Platform\n```\n\n##\
  \ 创建一些基本平台功能\n\n首先，我将定义一些基本服务，这些服务将为运行 Web 应用程序提供基础。\n\n```\n\n\n### 创建日志系统\n\n\
  需要实现的第一个服务器特性是日志记录。Go 标准库中的`log`包为创建日志提供了一套不错的基础功能，但还需要一些额外特性来筛选消息的详细程度。请创建`platform/logging`文件夹，并在其中添加一个名为`logging.go`的文件，文件内容如清单\
  \ 32-4 所示。\n\n```\npackage logging\n\ntype LogLevel int\n\nconst (\n    Trace LogLevel\
  \ = iota\n    Debug\n    Information\n    Warning\n    Fatal\n    None\n)\n\ntype\
  \ Logger interface {\n    Trace(string)\n    Tracef(string, ...interface{})\n  \
  \  Debug(string)\n    Debugf(string, ...interface{})\n    Info(string)\n    Infof(string,\
  \ ...interface{})\n    Warn(string)\n    Warnf(string, ...interface{})\n    Panic(string)\n\
  \    Panicf(string, ...interface{})\n}\n```\n\n该文件定义了`Logger`接口，该接口指定了用于记录不同严重级别消息的方法，严重级别通过`LogLevel`值设置，其范围从`Trace`到`Fatal`。此外还有一个`None`级别，表示不输出任何日志。对于每个严重级别，`Logger`接口定义了一个接受简单字符串的方法和一个接受模板字符串及占位符值的方法。\n\
  \n我为平台提供的所有功能定义了接口，并使用这些接口提供默认实现。这将允许应用程序在需要时替换默认实现，并且还能以服务的形式向应用程序提供功能，我将在本章后面部分进行描述。\n\
  \n为了创建`Logger`接口的默认实现，请在`logging`文件夹中添加一个名为`logger_default.go`的文件，文件内容如清单 32-5 所示。\n\
  \n```\npackage logging\n\nimport (\n    \"log\"\n    \"fmt\"\n)\n\ntype DefaultLogger\
  \ struct {\n    minLevel    LogLevel\n    loggers     map[LogLevel]*log.Logger\n\
  \    triggerPanic bool\n}\n\nfunc (l *DefaultLogger) MinLogLevel() LogLevel {\n\
  \    return l.minLevel\n}\n\nfunc (l *DefaultLogger) write(level LogLevel, message\
  \ string) {\n    if (l.minLevel <= level) {\n        l.loggers[level].Output(2,\
  \ message)\n    }\n}\n\nfunc (l *DefaultLogger) Trace(msg string) {\n    l.write(Trace,\
  \ msg)\n}\n\nfunc (l *DefaultLogger) Tracef(template string, vals ...interface{})\
  \ {\n    l.write(Trace, fmt.Sprintf(template, vals...))\n}\n\nfunc (l *DefaultLogger)\
  \ Debug(msg string) {\n    l.write(Debug, msg)\n}\n\nfunc (l *DefaultLogger) Debugf(template\
  \ string, vals ...interface{}) {\n    l.write(Debug, fmt.Sprintf(template, vals...))\n\
  }\n\nfunc (l *DefaultLogger) Info(msg string) {\n    l.write(Information, msg)\n\
  }\n\nfunc (l *DefaultLogger) Infof(template string, vals ...interface{}) {\n   \
  \ l.write(Information, fmt.Sprintf(template, vals...))\n}\n\nfunc (l *DefaultLogger)\
  \ Warn(msg string) {\n    l.write(Warning, msg)\n}\n\nfunc (l *DefaultLogger) Warnf(template\
  \ string, vals ...interface{}) {\n    l.write(Warning, fmt.Sprintf(template, vals...))\n\
  }\n\nfunc (l *DefaultLogger) Panic(msg string) {\n    l.write(Fatal, msg)\n    if\
  \ (l.triggerPanic) {\n        panic(msg)\n    }\n}\n\nfunc (l *DefaultLogger) Panicf(template\
  \ string, vals ...interface{}) {\n    formattedMsg := fmt.Sprintf(template, vals...)\n\
  \    l.write(Fatal, formattedMsg)\n    if (l.triggerPanic) {\n        panic(formattedMsg)\n\
  \    }\n}\n```\n\n`DefaultLogger`结构体使用标准库中`log`包提供的功能实现了`Logger`接口，该`log`包在第 31\
  \ 章中有所描述。每个严重级别都分配了一个`log.Logger`，这意味着消息可以发送到不同的目的地或以不同的方式格式化。请将名为`default_create.go`的文件添加到`logging`文件夹，其代码如清单\
  \ 32-6 所示。\n\n```\npackage logging\n\nimport (\n    \"log\"\n    \"os\"\n)\n\nfunc\
  \ NewDefaultLogger(level LogLevel) Logger {\n    flags := log.Lmsgprefix | log.Ltime\n\
  \    return &DefaultLogger {\n        minLevel: level,\n        loggers: map[LogLevel]*log.Logger\
  \ {\n            Trace:       log.New(os.Stdout, \"TRACE \",  flags),\n        \
  \    Debug:       log.New(os.Stdout, \"DEBUG \",  flags),\n            Information:\
  \ log.New(os.Stdout, \"INFO \",  flags),\n            Warning:     log.New(os.Stdout,\
  \ \"WARN \",  flags),\n            Fatal:       log.New(os.Stdout, \"FATAL \", \
  \ flags),\n        },\n        triggerPanic: true,\n    }\n}\n```\n\n`NewDefaultLogger`函数创建了一个`DefaultLogger`，它包含一个最低严重级别以及将消息写入标准输出的`log.Loggers`。作为简单测试，清单\
  \ 32-7 修改了`main`函数，使其使用日志功能来输出消息。\n\n```\npackage main\n\nimport (\n    //\"fmt\"\
  \n    \"platform/logging\"\n)\n\nfunc writeMessage(logger logging.Logger) {\n  \
  \  logger.Info(\"Hello, Platform\")\n}\n\nfunc main() {\n    var logger logging.Logger\
  \ = logging.NewDefaultLogger(logging.Information)\n    writeMessage(logger)\n}\n\
  ```\n\n`NewDefaultLogger`创建的日志记录器的最低严重级别设置为`Information`，这意味着严重级别较低的消息（`Trace`和`Debug`）将被丢弃。编译并执行该项目，你将看到以下输出，尽管时间戳可能不同：\n\
  \n```\n18:28:46 INFO Hello, Platform\n```\n\n### 创建配置系统\n\n下一步是添加配置应用程序的能力，这样就不必在代码文件中定义设置。请创建`platform/config`文件夹，并在其中添加一个名为`config.go`的文件，文件内容如清单\
  \ 32-8 所示。\n\n```\npackage config\n\ntype Configuration interface {\n    GetString(name\
  \ string) (configValue string, found bool)\n    GetInt(name string) (configValue\
  \ int, found bool)\n    GetBool(name string) (configValue bool, found bool)\n  \
  \  GetFloat(name string) (configValue float64, found bool)\n    GetStringDefault(name,\
  \ defVal string) (configValue string)\n    GetIntDefault(name string, defVal int)\
  \ (configValue int)\n    GetBoolDefault(name string, defVal bool) (configValue bool)\n\
  \    GetFloatDefault(name string, defVal float64) (configValue float64)\n    GetSection(sectionName\
  \ string) (section Configuration, found bool)\n}\n```\n\n`Configuration`接口定义了用于获取配置设置的方法，支持获取`string`、`int`、`float64`和`bool`类型的值。还有一组方法允许提供默认值。配置数据将支持嵌套的配置节，可以通过`GetSection`方法获取。\n\
  \n#### 定义配置文件\n\n如果你能看到我将要使用的配置文件类型，那么理解配置系统的实现会更容易。请将名为`config.json`的文件添加到`platform`文件夹，其内容如清单\
  \ 32-9 所示。\n\n```\n{\n    \"logging\" : {\n        \"level\": \"debug\"\n    },\n\
  \    \"main\" : {\n        \"message\" : \"Hello from the config file\"\n    }\n\
  }\n```\n\n该配置文件定义了两个配置节，分别名为`logging`和`main`。`logging`节包含一个名为`level`的`string`类型配置设置。`main`节包含一个名为`message`的`string`类型配置设置。随着我为平台添加功能以及开始处理\
  \ SportsStore 应用程序时，我会添加更多的配置设置，但该文件展示了配置文件使用的基本结构。添加配置设置时，请特别注意引号和逗号，JSON 格式对这两者都有要求，但很容易遗漏。\n\
  \n\n\n### 实现配置接口\n\n要创建`Configuration`接口的实现，请在`config`文件夹中添加一个名为`config_default.go`的文件，其内容如清单\
  \ 32-10 所示。\n\n```go\npackage config\nimport \"strings\"\ntype DefaultConfig struct\
  \ {\nconfigData map[string]interface{}\n}\nfunc (c *DefaultConfig) get(name string)\
  \ (result interface{}, found bool) {\ndata := c.configData\nfor _, key := range\
  \ strings.Split(name, \":\") {\nresult, found = data[key]\nif newSection, ok :=\
  \ result.(map[string]interface{}); ok && found {\ndata = newSection\n} else {\n\
  return\n}\n}\nreturn\n}\nfunc (c *DefaultConfig) GetSection(name string) (section\
  \ Configuration, found bool) {\nvalue, found := c.get(name)\nif (found) {\nif sectionData,\
  \ ok := value.(map[string]interface{}) ; ok {\nsection = &DefaultConfig { configData:\
  \ sectionData }\n}\n}\nreturn\n}\nfunc (c *DefaultConfig) GetString(name string)\
  \ (result string, found bool) {\nvalue, found := c.get(name)\nif (found) { result\
  \ = value.(string) }\nreturn\n}\nfunc (c *DefaultConfig) GetInt(name string) (result\
  \ int, found bool) {\nvalue, found := c.get(name)\nif (found) { result =  int(value.(float64))\
  \ }\nreturn\n}\nfunc (c *DefaultConfig) GetBool(name string) (result bool, found\
  \ bool) {\nvalue, found := c.get(name)\nif (found) { result = value.(bool) }\nreturn\n\
  }\nfunc (c *DefaultConfig) GetFloat(name string) (result float64, found bool) {\n\
  value, found := c.get(name)\nif (found) { result = value.(float64) }\nreturn\n}\n\
  ```\n\n`DefaultConfig`结构体使用`map`实现了`Configuration`接口。嵌套的配置节也以映射形式表示。通过用冒号分隔节名与设置名，可以请求单个配置项（如`logging:level`），也可以使用节名（如`logging`）请求包含所有设置的映射。为了定义接受默认值的方法，请在`config`文件夹中添加一个名为`config_default_fallback.go`的文件，其内容如清单\
  \ 32-11 所示。\n\n```go\npackage config\nfunc (c *DefaultConfig) GetStringDefault(name,\
  \ val string) (result string) {\nresult, ok := c.GetString(name)\nif !ok {\nresult\
  \ = val\n}\nreturn\n}\nfunc (c *DefaultConfig) GetIntDefault(name string, val int)\
  \ (result int) {\nresult, ok := c.GetInt(name)\nif !ok {\nresult = val\n}\nreturn\n\
  }\nfunc (c *DefaultConfig) GetBoolDefault(name string, val bool) (result bool) {\n\
  result, ok := c.GetBool(name)\nif !ok {\nresult = val\n}\nreturn\n}\nfunc (c *DefaultConfig)\
  \ GetFloatDefault(name string, val float64) (result float64) {\nresult, ok := c.GetFloat(name)\n\
  if !ok {\nresult = val\n}\nreturn\n}\n```\n\n为了定义从配置文件中加载数据的函数，请在`config`文件夹中添加一个名为`config_json.go`的文件，其内容如清单\
  \ 32-12 所示。\n\n```go\npackage config\nimport (\n\"os\"\n\"strings\"\n\"encoding/json\"\
  \n)\nfunc Load(fileName string) (config Configuration,  err error) {\nvar data []byte\n\
  data, err = os.ReadFile(fileName)\nif (err == nil) {\ndecoder := json.NewDecoder(strings.NewReader(string(data)))\n\
  m := map[string]interface{} {}\nerr = decoder.Decode(&m)\nif (err == nil) {\nconfig\
  \ = &DefaultConfig{ configData: m }\n}\n}\nreturn\n}\n```\n\n`Load`函数读取文件内容，将其中的\
  \ JSON 解码为一个映射，然后使用该映射创建一个`DefaultConfig`值。\n\n### 使用配置系统\n\n为了从配置系统中获取日志级别，请对`logging`文件夹中的`default_create.go`文件进行清单\
  \ 32-13 所示的修改。\n\n```go\npackage logging\nimport (\n\"log\"\n\"os\"\n\"strings\"\
  \n\"platform/config\"\n)\nfunc NewDefaultLogger(cfg config.Configuration) Logger\
  \ {\nvar level LogLevel = Debug\nif configLevelString, found := cfg.GetString(\"\
  logging:level\"); found {\nlevel = LogLevelFromString(configLevelString)\n}\nflags\
  \ := log.Lmsgprefix | log.Ltime\nreturn &DefaultLogger {\nminLevel: level,\nloggers:\
  \ map[LogLevel]*log.Logger {\nTrace: log.New(os.Stdout, \"TRACE \",  flags),\nDebug:\
  \ log.New(os.Stdout, \"DEBUG \",  flags),\nInformation: log.New(os.Stdout, \"INFO\
  \ \",  flags),\nWarning: log.New(os.Stdout, \"WARN \",  flags),\nFatal: log.New(os.Stdout,\
  \ \"FATAL \",  flags),\n},\ntriggerPanic: true,\n}\n}\nfunc LogLevelFromString(val\
  \ string) (level LogLevel) {\nswitch strings.ToLower(val) {\ncase \"debug\":\nlevel\
  \ = Debug\ncase \"information\":\nlevel = Information\ncase \"warning\":\nlevel\
  \ = Warning\ncase \"fatal\":\nlevel = Fatal\ncase \"none\":\nlevel = None\ndefault:\n\
  level = Debug\n}\nreturn\n}\n```\n\n在 JSON 中无法很好地表示`iota`值，因此我使用了字符串，并定义了`LogLevelFromString`函数来将配置设置转换为`LogLevel`值。清单\
  \ 32-14 更新了`main`函数，以加载并应用配置数据，并使用配置系统读取其写出的消息。\n\n```go\npackage main\nimport (\n\
  //\"fmt\"\n\"platform/config\"\n\"platform/logging\"\n)\nfunc writeMessage(logger\
  \ logging.Logger, cfg config.Configuration) {\nsection, ok := cfg.GetSection(\"\
  main\")\nif (ok) {\nmessage, ok := section.GetString(\"message\")\nif (ok) {\nlogger.Info(message)\n\
  } else {\nlogger.Panic(\"Cannot find configuration setting\")\n}\n} else {\nlogger.Panic(\"\
  Config section not found\")\n}\n}\nfunc main() {\nvar cfg config.Configuration\n\
  var err error\ncfg, err = config.Load(\"config.json\")\nif (err != nil) {\npanic(err)\n\
  }\nvar logger logging.Logger = logging.NewDefaultLogger(cfg)\nwriteMessage(logger,\
  \ cfg)\n}\n```\n\n配置从`config.json`文件中加载，然后将`Configuration`实现传递给`NewDefaultLogger`函数，该函数使用它来读取日志级别设置。\n\
  \n`writeMessage`函数演示了如何使用配置节，这可以很好地为组件提供其所需的设置，尤其当需要多个具有不同设置的实例时，每个实例都可以在其自己的节中定义。\n\
  \n编译并执行清单 32-14 中的代码，会产生以下输出：\n\n```\n18:49:12 INFO Hello from the config file\n\
  ```\n\n\n\n### 使用依赖注入管理服务\n\n为了获取 `Logger` 和 `Configuration` 接口的实现，`main` 函数中的代码需要知道如何创建实现这些接口的结构体实例：\n\
  \n```\n...\ncfg, err = config.Load(\"config.json\")\n...\nvar logger logging.Logger\
  \ = logging.NewDefaultLogger(cfg)\n...\n```\n\n这是一种可行的方法，但它违背了定义接口的初衷，需要谨慎确保实例创建的一致性，并使替换接口实现的过程复杂化。\n\
  \n我更推荐的方法是使用**依赖注入 (DI)**，在这种模式下，依赖接口的代码无需选择底层类型或直接创建实例就能获取实现。我将先从**服务定位**说起，这为后续更高级的功能奠定基础。\n\
  \n在应用程序启动时，应用定义的接口将连同创建实现结构体实例的工厂函数一起被添加到一个注册器中。例如，`platform.logger.Logger` 接口将注册一个调用\
  \ `NewDefaultLogger` 函数的工厂函数。当一个接口被添加到注册器时，它就被称为一个**服务**。\n\n在程序执行期间，需要服务所描述功能的应用程序组件会访问注册器，请求它们需要的接口。注册器调用工厂函数并返回创建的结构体，这使得应用程序组件能够使用接口的功能，而无需知道或指定使用哪个实现结构体以及如何创建它。如果这一点现在还不太清楚，别担心——这可能是一个难以理解的话题，在实际应用中会变得更容易理解。\n\
  \n## 定义服务生命周期\n\n服务注册时带有生命周期，它指定了何时调用工厂函数来创建新的结构体值。我将使用三种服务生命周期，如表 32-1 所述。\n\n\
  **表 32-1** 服务生命周期\n\n| 生命周期 | 描述 |\n| --- | --- |\n| `Transient` | 对于此生命周期，每次服务请求都会调用工厂函数。\
  \ |\n| `Singleton` | 对于此生命周期，工厂函数只调用一次，所有请求都接收同一个结构体实例。 |\n| `Scoped` | 对于此生命周期，工厂函数在作用域内的第一个请求时被调用一次，该作用域内的所有请求都接收同一个结构体实例。\
  \ |\n\n创建 `platform/services` 文件夹，并在其中添加一个名为 `lifecycles.go` 的文件，内容如清单 32-15 所示。\n\
  \n```\npackage services\ntype lifecycle int\nconst (\nTransient lifecycle = iota\n\
  Singleton\nScoped\n)\nListing 32-15\nThe Contents of the lifecycles.go File in the\
  \ services Folder\n```\n\n我将使用标准库中的 `context` 包来实现 `Scoped` 生命周期，该包在第 30 章中有描述。服务器收到的每个\
  \ HTTP 请求都会自动创建一个 `Context`，这意味着处理该请求的所有请求处理代码都可以共享同一组服务。例如，一个提供会话信息的单一结构体可以在整个给定请求的处理过程中被使用。\n\
  \n为了更容易地使用上下文，在 `services` 文件夹中添加一个名为 `context.go` 的文件，内容如清单 32-16 所示。\n\n```\n\
  package services\nimport (\n\"context\"\n\"reflect\"\n)\nconst ServiceKey = \"services\"\
  \ntype serviceMap map[reflect.Type]reflect.Value\nfunc NewServiceContext(c context.Context)\
  \ context.Context {\nif (c.Value(ServiceKey) == nil) {\nreturn context.WithValue(c,\
  \ ServiceKey, make(serviceMap))\n} else {\nreturn c\n}\n}\nListing 32-16\nThe Contents\
  \ of the context.go File in the services Folder\n```\n\n`NewServiceContext` 函数使用\
  \ `WithValue` 函数派生一个上下文，并添加一个存储已解析服务的映射。有关派生上下文的不同方式的详细信息，请参见第 30 章。\n\n\n\n###\
  \ 定义内部服务函数\n\n我将通过检查一个工厂函数并使用其结果来确定它处理的接口，来处理服务注册。以下是注册新服务时将使用的工厂函数类型示例：\n\n```go\n\
  ...\nfunc ConfigurationFactory() config.Configuration {\n// TODO 创建实现 Configuration\
  \ 接口的结构体\n}\n...\n```\n\n此函数的结果类型是 `config.Configuration`。使用反射检查该函数，我可以获取结果类型并确定其对应的工厂接口。\n\
  \n某些工厂函数会依赖其他服务。以下是另一个工厂函数示例：\n\n```go\n...\nfunc Loggerfactory(cfg config.Configuration)\
  \ logging.Logger {\n// TODO 创建实现 Logger 接口的结构体\n}\n...\n```\n\n这个工厂函数解析对 `Logger`\
  \ 接口的请求，但它依赖于 `Configuration` 接口的实现。这意味着必须先解析 `Configuration` 接口，以便提供解析 `Logger`\
  \ 接口所需的参数。这是一个*依赖注入*的示例，其中工厂函数所依赖的参数被解析，以便能够调用该函数。\n\n**注意**：定义依赖其他服务的工厂函数可能会改变嵌套服务的生命周期。例如，如果你定义了一个依赖瞬态服务的单例服务，那么嵌套服务只会在单例首次实例化时被解析一次。在大多数项目中这不是问题，但需要谨记这一点。\n\
  \n在 `services` 文件夹中添加一个名为 `core.go` 的文件，内容如代码清单 32-17 所示。\n\n```go\npackage services\n\
  import (\n\"reflect\"\n\"context\"\n\"fmt\"\n)\ntype BindingMap struct {\nfactoryFunc\
  \ reflect.Value\nlifecycle\n}\nvar services = make(map[reflect.Type]BindingMap)\n\
  func addService(life lifecycle, factoryFunc interface{}) (err error) {\nfactoryFuncType\
  \ := reflect.TypeOf(factoryFunc)\nif factoryFuncType.Kind() == reflect.Func && factoryFuncType.NumOut()\
  \ == 1 {\nservices[factoryFuncType.Out(0)] = BindingMap{\nfactoryFunc: reflect.ValueOf(factoryFunc),\n\
  lifecycle: life,\n}\n} else {\nerr = fmt.Errorf(\"类型不能用作服务: %v\", factoryFuncType)\n\
  }\nreturn\n}\nvar contextReference = (*context.Context)(nil)\nvar contextReferenceType\
  \ = reflect.TypeOf(contextReference).Elem()\nfunc resolveServiceFromValue(c context.Context,\
  \ val reflect.Value) (err error ){\nserviceType := val.Elem().Type()\nif serviceType\
  \ == contextReferenceType {\nval.Elem().Set(reflect.ValueOf(c))\n} else if binding,\
  \ found := services[serviceType]; found {\nif (binding.lifecycle == Scoped) {\n\
  resolveScopedService(c, val, binding)\n} else {\nval.Elem().Set(invokeFunction(c,\
  \ binding.factoryFunc)[0])\n}\n} else {\nerr = fmt.Errorf(\"找不到服务 %v\", serviceType)\n\
  }\nreturn\n}\nfunc resolveScopedService(c context.Context, val reflect.Value,\n\
  binding BindingMap) (err error) {\nsMap, ok := c.Value(ServiceKey).(serviceMap)\n\
  if (ok) {\nserviceVal, ok := sMap[val.Type()]\nif (!ok) {\nserviceVal = invokeFunction(c,\
  \ binding.factoryFunc)[0]\nsMap[val.Type()] = serviceVal\n}\nval.Elem().Set(serviceVal)\n\
  } else {\nval.Elem().Set(invokeFunction(c, binding.factoryFunc)[0])\n}\nreturn\n\
  }\nfunc resolveFunctionArguments(c context.Context,  f reflect.Value,\notherArgs\
  \ ...interface{}) []reflect.Value {\nparams := make([]reflect.Value, f.Type().NumIn())\n\
  i := 0\nif (otherArgs != nil) {\nfor ; i < len(otherArgs); i++ {\nparams[i] = reflect.ValueOf(otherArgs[i])\n\
  }\n}\nfor ; i < len(params); i++ {\npType := f.Type().In(i)\npVal := reflect.New(pType)\n\
  err := resolveServiceFromValue(c, pVal)\nif err != nil {\npanic(err)\n}\nparams[i]\
  \ = pVal.Elem()\n}\nreturn params\n}\nfunc invokeFunction(c context.Context, f reflect.Value,\n\
  otherArgs ...interface{}) []reflect.Value {\nreturn f.Call(resolveFunctionArguments(c,\
  \ f, otherArgs...))\n}\n```\n\n*代码清单 32-17：`services` 文件夹中 `core.go` 文件的内容*\n\n\
  `BindingMap` 结构体表示一个工厂函数（以 `reflect.Value` 形式表示）与一个生命周期的组合。`addService` 函数用于注册服务，它通过创建\
  \ `BindingMap` 并将其添加到分配给 services 变量的映射中来实现。\n\n调用 `resolveServiceFromValue` 函数来解析服务，其参数是一个\
  \ `Context` 和一个 `Value`，该 `Value` 是指向变量的指针，变量的类型是要解析的接口（当你看到服务解析的实际过程时，这将更有意义）。为了解析服务，`resolveServiceFromValue`\
  \ 函数会使用请求的类型作为键，检查 services 映射中是否存在 `BindingMap`。如果存在 `BindingMap`，则调用其工厂函数，并通过指针赋值。\n\
  \n`invokeFunction` 函数负责调用工厂函数，它使用 `resolveFunctionArguments` 函数来检查工厂函数的参数并解析每个参数。这些函数接受可选的附加参数，当需要以服务和常规值参数的混合方式调用函数时，会使用这些参数（在这种情况下，需要常规值的参数必须先定义）。\n\
  \n作用域服务需要特殊处理。`resolveScopedService` 函数会检查 `Context` 是否包含之前请求解析该服务的值。如果没有，则会解析该服务并将其添加到\
  \ `Context` 中，以便在同一作用域内复用。\n\n### 定义服务注册函数\n\n代码清单 32-17 中定义的函数均未导出。为了创建应用程序其余部分中用于注册服务的函数，请在\
  \ `services` 文件夹中添加一个名为 `registration.go` 的文件，内容如代码清单 32-18 所示。\n\n```go\npackage\
  \ services\nimport (\n\"reflect\"\n\"sync\"\n)\nfunc AddTransient(factoryFunc interface{})\
  \ (err error) {\nreturn addService(Transient, factoryFunc)\n}\nfunc AddScoped(factoryFunc\
  \ interface{}) (err error) {\nreturn addService(Scoped, factoryFunc)\n}\nfunc AddSingleton(factoryFunc\
  \ interface{}) (err error) {\nfactoryFuncVal := reflect.ValueOf(factoryFunc)\nif\
  \ factoryFuncVal.Kind() == reflect.Func && factoryFuncVal.Type().NumOut() == 1 {\n\
  var results []reflect.Value\nonce := sync.Once{}\nwrapper := reflect.MakeFunc(factoryFuncVal.Type(),\n\
  func ([]reflect.Value) []reflect.Value {\nonce.Do(func() {\nresults = invokeFunction(nil,\
  \ factoryFuncVal)\n})\nreturn results\n})\nerr = addService(Singleton, wrapper.Interface())\n\
  }\nreturn\n}\n```\n\n*代码清单 32-18：`services` 文件夹中 `registration.go` 文件的内容*\n\n`AddTransient`\
  \ 和 `AddScoped` 函数只是将工厂函数传递给 `addService` 函数。单例生命周期需要稍多一些工作，`AddSingleton` 函数创建了一个围绕工厂函数的包装器，确保该工厂函数只在首次请求解析服务时执行一次。这保证了只会创建实现结构体的一个实例，并且直到首次需要它时才会创建。\n\
  \n\n\n### 定义服务解析函数\n\n接下来的一组功能包括允许解析服务的函数。在 `services` 文件夹中添加一个名为 `resolution.go`\
  \ 的文件，其内容如代码清单 32-19 所示。\n\n```\npackage services\nimport (\n\"reflect\"\n\"errors\"\
  \n\"context\"\n)\nfunc GetService(target interface{}) error {\nreturn GetServiceForContext(context.Background(),\
  \ target)\n}\nfunc GetServiceForContext(c context.Context, target interface{}) (err\
  \ error) {\ntargetValue := reflect.ValueOf(target)\nif targetValue.Kind() == reflect.Ptr\
  \ &&\ntargetValue.Elem().CanSet() {\nerr = resolveServiceFromValue(c, targetValue)\n\
  } else {\nerr = errors.New(\"Type cannot be used as target\")\n}\nreturn\n}\n```\n\
  \n`GetServiceForContext` 接受一个上下文和一个指向可使用反射设置值的指针。为方便起见，`GetService` 函数使用后台上下文来解析服务。\n\
  \n### 注册和使用服务\n\n基本服务功能已就绪，这意味着可以注册服务然后解析它们。在 `services` 文件夹中添加一个名为 `services_default.go`\
  \ 的文件，其内容如代码清单 32-20 所示。\n\n```\npackage services\nimport (\n\"platform/logging\"\
  \n\"platform/config\"\n)\nfunc RegisterDefaultServices() {\nerr := AddSingleton(func()\
  \ (c config.Configuration) {\nc, loadErr :=  config.Load(\"config.json\")\nif (loadErr\
  \ != nil) {\npanic(loadErr)\n}\nreturn\n})\nerr = AddSingleton(func(appconfig config.Configuration)\
  \ logging.Logger {\nreturn logging.NewDefaultLogger(appconfig)\n})\nif (err != nil)\
  \ {\npanic(err)\n}\n}\n```\n\n`RegisterDefaultServices` 创建了 `Configuration` 和 `Logger`\
  \ 服务。这些服务是使用 `AddSingleton` 函数创建的，这意味着实现每个接口的结构体的单个实例将由整个应用程序共享。代码清单 32-21 更新了 `main`\
  \ 函数以使用服务，而不是直接实例化结构体。\n\n```\npackage main\nimport (\n//\"fmt\"\n\"platform/config\"\
  \n\"platform/logging\"\n\"platform/services\"\n)\nfunc writeMessage(logger logging.Logger,\
  \ cfg config.Configuration) {\nsection, ok := cfg.GetSection(\"main\")\nif (ok)\
  \ {\nmessage, ok := section.GetString(\"message\")\nif (ok) {\nlogger.Info(message)\n\
  } else {\nlogger.Panic(\"Cannot find configuration setting\")\n}\n} else {\nlogger.Panic(\"\
  Config section not found\")\n}\n}\nfunc main() {\nservices.RegisterDefaultServices()\n\
  var cfg config.Configuration\nservices.GetService(&cfg)\nvar logger logging.Logger\n\
  services.GetService(&logger)\nwriteMessage(logger, cfg)\n}\n```\n\n解析服务是通过传递一个指向接口类型变量的指针来完成的。在代码清单\
  \ 32-21 中，使用 `GetService` 函数获取 `Repository` 和 `Logger` 接口的实现，无需知道将使用哪个结构体类型、创建它的过程或服务生命周期。\n\
  \n解析服务需要两个步骤：创建变量和传递指针。编译并执行项目，您将看到以下输出：\n\n```\n19:17:06 INFO Hello from the config\
  \ file\n```\n\n#### 添加对调用函数的支持\n\n一旦基本服务功能就绪，就很容易创建增强功能，使服务解析更简单、更容易。为了添加对直接执行函数的支持，在\
  \ `services` 文件夹中添加一个名为 `functions.go` 的文件，其内容如代码清单 32-22 所示。\n\n```\npackage services\n\
  import (\n\"reflect\"\n\"errors\"\n\"context\"\n)\nfunc Call(target interface{},\
  \ otherArgs ...interface{}) ([]interface{}, error) {\nreturn CallForContext(context.Background(),\
  \ target, otherArgs...)\n}\nfunc CallForContext(c context.Context, target interface{},\
  \ otherArgs ...interface{}) (results []interface{}, err error) {\ntargetValue :=\
  \ reflect.ValueOf(target)\nif (targetValue.Kind() == reflect.Func) {\nresultVals\
  \ := invokeFunction(c, targetValue, otherArgs...)\nresults = make([]interface{},\
  \ len(resultVals))\nfor i := 0; i < len(resultVals); i++ {\nresults[i] = resultVals[i].Interface()\n\
  }\n} else {\nerr = errors.New(\"Only functions can be invoked\")\n}\nreturn\n}\n\
  ```\n\n`CallForContext` 函数接收一个函数，并使用服务来生成用作函数调用参数的值。`Call` 函数是一个便利函数，用于当没有 `Context`\
  \ 可用时。此功能的实现依赖于代码清单 32-22 中用于调用工厂函数的代码。代码清单 32-23 演示了直接调用函数如何简化服务的使用。\n\n```\npackage\
  \ main\nimport (\n//\"fmt\"\n\"platform/config\"\n\"platform/logging\"\n\"platform/services\"\
  \n)\nfunc writeMessage(logger logging.Logger, cfg config.Configuration) {\nsection,\
  \ ok := cfg.GetSection(\"main\")\nif (ok) {\nmessage, ok := section.GetString(\"\
  message\")\nif (ok) {\nlogger.Info(message)\n} else {\nlogger.Panic(\"Cannot find\
  \ configuration setting\")\n}\n} else {\nlogger.Panic(\"Config section not found\"\
  )\n}\n}\nfunc main() {\nservices.RegisterDefaultServices()\n// var cfg config.Configuration\n\
  // services.GetService(&cfg)\n// var logger logging.Logger\n// services.GetService(&logger)\n\
  services.Call(writeMessage)\n}\n```\n\n函数被传递给 `Call`，后者将检查其参数并使用服务解析它们。（请注意，函数名后面没有括号，因为那样会调用函数，而不是将其传递给\
  \ `services.Call`。）不再需要直接请求服务，可以依赖 `services` 包来处理细节。编译并执行代码，您将看到以下输出：\n\n```\n\
  19:19:08 INFO Hello from the config file\n```\n\n\n\n#### 为结构体字段添加依赖解析支持\n\n我计划为`service`包添加的最后一个功能，是解析对结构体字段的依赖关系。在`services`文件夹中新建一个名为`structs.go`的文件，内容如代码清单\
  \ 32-24 所示。\n\n```go\npackage services\nimport (\n\"reflect\"\n\"errors\"\n\"context\"\
  \n)\nfunc Populate(target interface{}) error {\nreturn PopulateForContext(context.Background(),\
  \ target)\n}\nfunc PopulateForContext(c context.Context, target interface{}) (err\
  \ error) {\nreturn PopulateForContextWithExtras(c, target,\nmake(map[reflect.Type]reflect.Value))\n\
  }\nfunc PopulateForContextWithExtras(c context.Context, target interface{},\nextras\
  \ map[reflect.Type]reflect.Value) (err error) {\ntargetValue := reflect.ValueOf(target)\n\
  if targetValue.Kind() == reflect.Ptr &&\ntargetValue.Elem().Kind() == reflect.Struct\
  \ {\ntargetValue = targetValue.Elem()\nfor i := 0; i < targetValue.Type().NumField();\
  \ i++ {\nfieldVal := targetValue.Field(i)\nif fieldVal.CanSet() {\nif extra, ok\
  \ := extras[fieldVal.Type()]; ok {\nfieldVal.Set(extra)\n} else {\nresolveServiceFromValue(c,\
  \  fieldVal.Addr() )\n}\n}\n}\n} else {\nerr = errors.New(\"Type cannot be used\
  \ as target\")\n}\nreturn\n}\n```\n\n*代码清单 32-24：services 文件夹中 structs.go 文件的内容*\n\
  \n这些函数会检查结构体定义的字段，并尝试使用已定义的服务来解析它们。任何类型不是接口或没有对应服务的字段都会被跳过。`PopulateForContextWithExtras`函数允许为结构体字段提供额外的值。\n\
  \n代码清单 32-25 定义了一个结构体，其字段声明了对服务的依赖关系。\n\n```go\npackage main\nimport (\n//\"fmt\"\
  \n\"platform/config\"\n\"platform/logging\"\n\"platform/services\"\n)\nfunc writeMessage(logger\
  \ logging.Logger, cfg config.Configuration) {\nsection, ok := cfg.GetSection(\"\
  main\")\nif (ok) {\nmessage, ok := section.GetString(\"message\")\nif (ok) {\nlogger.Info(message)\n\
  } else {\nlogger.Panic(\"Cannot find configuration setting\")\n}\n} else {\nlogger.Panic(\"\
  Config section not found\")\n}\n}\nfunc main() {\nservices.RegisterDefaultServices()\n\
  services.Call(writeMessage)\nval := struct {\nmessage string\nlogging.Logger\n}{\n\
  message: \"Hello from the struct\",\n}\nservices.Populate(&val)\nval.Logger.Debug(val.message)\n\
  }\n```\n\n*代码清单 32-25：在 platform 文件夹的 main.go 文件中注入结构体依赖*\n\n`main`函数定义了一个匿名结构体，并通过将指针传递给`Populate`函数来解析其所需的服务。结果是，嵌入的`Logger`字段通过服务进行了填充。`Populate`函数跳过了`message`字段，但在结构体初始化时已为其定义了值。编译并执行项目，你将看到以下输出：\n\
  \n```\n19:21:43 INFO Hello from the config file\n19:21:43 DEBUG Hello from the struct\n\
  ```\n\n## 本章小结\n\n在本章中，我开始了自定义 Web 应用平台的开发。我创建了日志记录和配置功能，并添加了对服务和依赖注入的支持。在下一章中，我将继续开发，创建请求处理管道和自定义模板系统。\n\
  \n"
- "# 33. 中间件、模板和处理器\n\n在本章中，我将继续第 32 章开始的 Web 应用平台开发，增加对处理 HTTP 请求的支持。\n\n**提示** 你可以从\
  \ [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章以及本书其他所有章节的示例项目。如果你在运行示例时遇到问题，请参阅第\
  \ 2 章获取帮助。\n\n### 创建请求管道\n\n构建平台的下一步是创建一个 Web 服务，用于处理来自浏览器的 HTTP 请求。为做准备，我将创建一个简单的管道，其中包含可以检查和修改请求的中间件组件。\n\
  \n当 HTTP 请求到达时，它将被传递到管道中每个已注册的中间件组件，让每个组件都有机会处理请求并参与响应的生成。组件还可以终止请求处理，阻止请求被转发到管道中的后续组件。\n\
  \n一旦请求到达管道的末端，它会沿着管道反向传递，以便组件有机会进行进一步的更改或执行额外的工作，如图 33-1 所示。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig1_HTML.jpg](img/512642_1_En_33_Fig1_HTML.jpg)\n\
  \n*图 33-1：请求处理管道*\n\n### 定义中间件组件接口\n\n创建`platform/pipeline`文件夹，并在其中添加一个名为`component.go`的文件，内容如代码清单\
  \ 33-1 所示。\n\n```go\npackage pipeline\nimport (\n\"net/http\"\n)\ntype ComponentContext\
  \ struct {\n*http.Request\nhttp.ResponseWriter\nerror\n}\nfunc (mwc *ComponentContext)\
  \ Error(err error) {\nmwc.error = err\n}\nfunc (mwc *ComponentContext) GetError()\
  \ error {\nreturn mwc.error\n}\ntype MiddlewareComponent interface {\nInit()\nProcessRequest(context\
  \ *ComponentContext, next func(*ComponentContext))\n}\n```\n\n*代码清单 33-1：pipeline\
  \ 文件夹中 component.go 文件的内容*\n\n顾名思义，`MiddlewareComponent`接口描述了中间件组件所需的功能。`Init`方法用于执行任何一次性设置，另一个名为`ProcessRequest`的方法负责处理\
  \ HTTP 请求。`ProcessRequest`方法定义的参数包括一个指向`ComponentContext`结构体的指针，以及一个将请求传递给管道中下一个组件的函数。\n\
  \n组件处理请求所需的一切都由`ComponentContext`结构体提供，通过它可以访问`http.Request`和`http.ResponseWriter`。`ComponentContext`结构体还定义了一个未导出的`error`字段，用于指示处理请求时的问题，并通过`Error`方法进行设置。\n\
  \n### 创建请求管道\n\n为了创建处理请求的管道，请在`pipeline`文件夹中添加一个名为`pipeline.go`的文件，内容如代码清单 33-2\
  \ 所示。\n\n```go\npackage pipeline\nimport (\n\"net/http\"\n)\ntype RequestPipeline\
  \ func(*ComponentContext)\nvar emptyPipeline RequestPipeline = func(*ComponentContext)\
  \ { /* 什么都不做 */ }\nfunc CreatePipeline(components ...MiddlewareComponent) RequestPipeline\
  \ {\nf := emptyPipeline\nfor i := len(components) -1 ; i >= 0; i-- {\ncurrentComponent\
  \ := components[i]\nnextFunc := f\nf = func(context *ComponentContext) {\nif (context.error\
  \ == nil) {\ncurrentComponent.ProcessRequest(context, nextFunc)\n}\n}\ncurrentComponent.Init()\n\
  }\nreturn f\n}\nfunc (pl RequestPipeline) ProcessRequest(req *http.Request,\nresp\
  \ http.ResponseWriter) error {\nctx := ComponentContext {\nRequest: req,\nResponseWriter:\
  \ resp,\n}\npl(&ctx)\nreturn ctx.error\n}\n```\n\n*代码清单 33-2：pipeline 文件夹中 pipeline.go\
  \ 文件的内容*\n\n`CreatePipeline`函数是这个清单中最重要的部分，因为它接受一系列组件，并将它们连接起来，生成一个接受`ComponentContext`结构体指针的函数。该函数会调用管道中第一个组件的`ProcessRequest`方法，其`next`参数会调用下一个组件的`ProcessRequest`方法。这个链会依次将`ComponentContext`结构体传递给所有组件，除非其中一个组件调用了`Error`方法。请求通过`ProcessRequest`方法处理，该方法会创建`ComponentContext`值，并用它来启动请求处理。\n\
  \n\n\n### 创建基础组件\n\n组件接口和管道的定义虽然简单，但它们为编写组件提供了灵活的基础。应用程序可以定义并选择自己的组件，但我会将一些基本功能作为平台的一部分包含进来。\n\
  \n#### 创建服务中间件组件\n\n创建 `platform/pipeline/basic` 文件夹，并在其中添加一个名为 `services.go` 的文件，内容如代码清单\
  \ 33-3 所示。\n\n```go\npackage basic\n\nimport (\n\t\"platform/pipeline\"\n\t\"platform/services\"\
  \n)\n\ntype ServicesComponent struct{}\n\nfunc (c *ServicesComponent) Init() {}\n\
  \nfunc (c *ServicesComponent) ProcessRequest(ctx *pipeline.ComponentContext,\n\t\
  next func(*pipeline.ComponentContext)) {\n\treqContext := ctx.Request.Context()\n\
  \tctx.Request.WithContext(services.NewServiceContext(reqContext))\n\tnext(ctx)\n\
  }\n```\n\n此中间件组件会修改与请求关联的 `Context`，以便在请求处理过程中可以使用上下文范围内的服务。`http.Request.Context`\
  \ 方法用于获取随请求创建的标准 `Context`，该上下文会为服务做好准备，然后通过 `WithContext` 方法进行更新。\n\n上下文准备就绪后，通过调用名为\
  \ `next` 的参数所接收的函数，将请求沿管道传递：\n\n```go\n...\nnext(ctx)\n...\n```\n\n该参数使中间件组件能够控制请求处理，并允许其修改后续组件接收到的上下文数据。同时，它也允许组件通过不调用\
  \ `next` 函数来中断请求处理流程。\n\n#### 创建日志中间件组件\n\n接下来，在 `basic` 文件夹中添加一个名为 `logging.go`\
  \ 的文件，内容如代码清单 33-4 所示。\n\n```go\npackage basic\n\nimport (\n\t\"net/http\"\n\t\"\
  platform/logging\"\n\t\"platform/pipeline\"\n\t\"platform/services\"\n)\n\ntype\
  \ LoggingResponseWriter struct {\n\tstatusCode int\n\thttp.ResponseWriter\n}\n\n\
  func (w *LoggingResponseWriter) WriteHeader(statusCode int) {\n\tw.statusCode =\
  \ statusCode\n\tw.ResponseWriter.WriteHeader(statusCode)\n}\n\nfunc (w *LoggingResponseWriter)\
  \ Write(b []byte) (int, error) {\n\tif w.statusCode == 0 {\n\t\tw.statusCode = http.StatusOK\n\
  \t}\n\treturn w.ResponseWriter.Write(b)\n}\n\ntype LoggingComponent struct{}\n\n\
  func (lc *LoggingComponent) Init() {}\n\nfunc (lc *LoggingComponent) ProcessRequest(ctx\
  \ *pipeline.ComponentContext,\n\tnext func(*pipeline.ComponentContext)) {\n\tvar\
  \ logger logging.Logger\n\terr := services.GetServiceForContext(ctx.Request.Context(),\
  \ &logger)\n\tif err != nil {\n\t\tctx.Error(err)\n\t\treturn\n\t}\n\tloggingWriter\
  \ := LoggingResponseWriter{0, ctx.ResponseWriter}\n\tctx.ResponseWriter = &loggingWriter\n\
  \tlogger.Infof(\"REQ --- %v - %v\", ctx.Request.Method, ctx.Request.URL)\n\tnext(ctx)\n\
  \tlogger.Infof(\"RSP %v %v\", loggingWriter.statusCode, ctx.Request.URL)\n}\n```\n\
  \n该组件使用第 32 章创建的 `Logger` 服务记录请求和响应的基本信息。由于 `ResponseWriter` 接口不提供对响应中发送的状态码的访问，因此创建了一个\
  \ `LoggingResponseWriter` 并将其传递给管道中的下一个组件。\n\n该组件在调用 `next` 函数前后执行操作：在传递请求前记录一条消息，并在请求处理完成后记录另一条包含状态码的消息。\n\
  \n该组件在处理请求时获取 `Logger` 服务。虽然可以只获取一次 `Logger`，但这样做之所以可行，只是因为我已知 `Logger` 已注册为单例服务。我更倾向于不对\
  \ `Logger` 的生命周期做假设，这意味着如果未来生命周期发生变化，也不会出现意外结果。\n\n#### 创建错误处理组件\n\n请求管道允许组件在发生错误时终止处理。为了定义一个处理错误的组件，请在\
  \ `platform/pipeline/basic` 文件夹中添加一个名为 `errors.go` 的文件，内容如代码清单 33-5 所示。\n\n```go\n\
  package basic\n\nimport (\n\t\"fmt\"\n\t\"net/http\"\n\t\"platform/logging\"\n\t\
  \"platform/pipeline\"\n\t\"platform/services\"\n)\n\ntype ErrorComponent struct{}\n\
  \nfunc recoveryFunc(ctx *pipeline.ComponentContext, logger logging.Logger) {\n\t\
  if arg := recover(); arg != nil {\n\t\tlogger.Debugf(\"Error: %v\", fmt.Sprint(arg))\n\
  \t\tctx.ResponseWriter.WriteHeader(http.StatusInternalServerError)\n\t}\n}\n\nfunc\
  \ (c *ErrorComponent) Init() {}\n\nfunc (c *ErrorComponent) ProcessRequest(ctx *pipeline.ComponentContext,\n\
  \tnext func(*pipeline.ComponentContext)) {\n\tvar logger logging.Logger\n\tservices.GetServiceForContext(ctx.Context(),\
  \ &logger)\n\tdefer recoveryFunc(ctx, logger)\n\tnext(ctx)\n\tif ctx.GetError()\
  \ != nil {\n\t\tlogger.Debugf(\"Error: %v\", ctx.GetError())\n\t\tctx.ResponseWriter.WriteHeader(http.StatusInternalServerError)\n\
  \t}\n}\n```\n\n此组件用于恢复后续组件在处理请求时可能发生的任何 panic，并处理所有预期错误。在两种情况下，都会记录错误，并将响应状态码设置为指示发生错误。\n\
  \n#### 创建静态文件组件\n\n几乎所有的 Web 应用都需要支持提供静态文件服务，即使仅用于 CSS 样式表也是如此。标准库内置了对提供文件服务的支持，这很有帮助，因为该任务本身充满潜在问题。但幸运的是，将标准库功能集成到示例项目的请求管道中是一件简单的事情。在\
  \ `basic` 文件夹中添加一个名为 `files.go` 的文件，内容如代码清单 33-6 所示。\n\n```go\npackage basic\n\n\
  import (\n\t\"net/http\"\n\t\"platform/config\"\n\t\"platform/pipeline\"\n\t\"platform/services\"\
  \n\t\"strings\"\n)\n\ntype StaticFileComponent struct {\n\turlPrefix     string\n\
  \tstdLibHandler http.Handler\n}\n\nfunc (sfc *StaticFileComponent) Init() {\n\t\
  var cfg config.Configuration\n\tservices.GetService(&cfg)\n\tsfc.urlPrefix = cfg.GetStringDefault(\"\
  files:urlprefix\", \"/files/\")\n\tpath, ok := cfg.GetString(\"files:path\")\n\t\
  if ok {\n\t\tsfc.stdLibHandler = http.StripPrefix(sfc.urlPrefix,\n\t\t\thttp.FileServer(http.Dir(path)))\n\
  \t} else {\n\t\tpanic(\"Cannot load file configuration settings\")\n\t}\n}\n\nfunc\
  \ (sfc *StaticFileComponent) ProcessRequest(ctx *pipeline.ComponentContext,\n\t\
  next func(*pipeline.ComponentContext)) {\n\tif !strings.EqualFold(ctx.Request.URL.Path,\
  \ sfc.urlPrefix) &&\n\t\tstrings.HasPrefix(ctx.Request.URL.Path, sfc.urlPrefix)\
  \ {\n\t\tsfc.stdLibHandler.ServeHTTP(ctx.ResponseWriter, ctx.Request)\n\t} else\
  \ {\n\t\tnext(ctx)\n\t}\n}\n```\n\n该处理器使用 `Init` 方法读取配置设置，这些设置指定了文件请求使用的前缀以及提供文件的目录，并使用\
  \ `net/http` 包提供的处理器来提供文件服务。\n\n\n\n### 创建占位响应组件\n\n该项目不包含任何生成响应的中间件组件（这些组件通常作为应用程序的一部分定义）。不过，目前您需要一个占位组件，以便在开发其他功能时生成简单的响应。创建\
  \ `platform/placeholder` 文件夹，并向其中添加一个名为 `message_middleware.go` 的文件，其内容如清单 33-7\
  \ 所示。\n\n```\npackage placeholder\nimport (\n\"io\"\n\"errors\"\n\"platform/pipeline\"\
  \n\"platform/config\"\n\"platform/services\"\n)\ntype SimpleMessageComponent struct\
  \ {}\nfunc (c *SimpleMessageComponent) Init() {}\nfunc (c *SimpleMessageComponent)\
  \ ProcessRequest(ctx *pipeline.ComponentContext,\nnext func(*pipeline.ComponentContext))\
  \  {\nvar cfg config.Configuration\nservices.GetService(&cfg)\nmsg, ok := cfg.GetString(\"\
  main:message\")\nif (ok) {\nio.WriteString(ctx.ResponseWriter, msg)\n} else {\n\
  ctx.Error(errors.New(\"Cannot find config setting\"))\n}\nnext(ctx)\n}\n```\n\n\
  该组件生成一个简单的文本响应，足以确保管道按预期工作。接下来，创建 `platform/placeholder/files` 文件夹，并向其中添加一个名为 `hello.json`\
  \ 的文件，其内容如清单 33-8 所示。\n\n```\n{\n\"message\": \"Hello from the JSON file\"\n}\n\
  ```\n\n要设置静态文件的读取位置，请将清单 33-9 中所示的配置项添加到 `platform` 文件夹的 `config.json` 文件中。\n\n\
  ```\n{\n\"logging\" : {\n\"level\": \"debug\"\n},\n\"main\" : {\n\"message\" : \"\
  Hello from the config file\"\n},\n\"files\": {\n\"path\": \"placeholder/files\"\n\
  }\n}\n```\n\n### 创建 HTTP 服务器\n\n现在是创建 HTTP 服务器并使用管道来处理其接收到的请求的时候了。创建 `platform/http`\
  \ 文件夹，并向其中添加一个名为 `server.go` 的文件，其内容如清单 33-10 所示。\n\n```\npackage http\nimport (\n\
  \"fmt\"\n\"sync\"\n\"net/http\"\n\"platform/config\"\n\"platform/logging\"\n\"platform/pipeline\"\
  \n)\ntype pipelineAdaptor struct {\npipeline.RequestPipeline\n}\nfunc (p pipelineAdaptor)\
  \ ServeHTTP(writer http.ResponseWriter,\nrequest *http.Request) {\np.ProcessRequest(request,\
  \ writer)\n}\nfunc Serve(pl pipeline.RequestPipeline, cfg config.Configuration,\
  \ logger logging.Logger ) *sync.WaitGroup {\nwg := sync.WaitGroup{}\nadaptor :=\
  \ pipelineAdaptor { RequestPipeline: pl }\nenableHttp := cfg.GetBoolDefault(\"http:enableHttp\"\
  , true)\nif (enableHttp) {\nhttpPort := cfg.GetIntDefault(\"http:port\", 5000)\n\
  logger.Debugf(\"Starting HTTP server on port %v\", httpPort)\nwg.Add(1)\ngo func()\
  \ {\nerr := http.ListenAndServe(fmt.Sprintf(\":%v\", httpPort), adaptor)\nif (err\
  \ != nil) {\npanic(err)\n}\n}()\n}\nenableHttps := cfg.GetBoolDefault(\"http:enableHttps\"\
  , false)\nif (enableHttps) {\nhttpsPort := cfg.GetIntDefault(\"http:httpsPort\"\
  , 5500)\ncertFile, cfok := cfg.GetString(\"http:httpsCert\")\nkeyFile, kfok := cfg.GetString(\"\
  http:httpsKey\")\nif cfok && kfok {\nlogger.Debugf(\"Starting HTTPS server on port\
  \ %v\", httpsPort)\nwg.Add(1)\ngo func() {\nerr := http.ListenAndServeTLS(fmt.Sprintf(\"\
  :%v\", httpsPort),\ncertFile, keyFile, adaptor)\nif (err != nil) {\npanic(err)\n\
  }\n}()\n} else {\npanic(\"HTTPS certificate settings not found\")\n}\n}\nreturn\
  \ &wg\n}\n```\n\n`Serve` 函数使用 `Configuration` 服务读取 HTTP 和 HTTPS 的设置，并利用标准库提供的功能接收请求，然后将请求传递给管道进行处理。（您将在第\
  \ 38 章为部署做准备时启用 HTTPS 支持，但在此之前，您将使用默认设置，即在端口 5000 上监听 HTTP 请求。）\n\n### 配置应用程序\n\n\
  最后一步是配置应用程序所需的管道，并使用它来配置和启动 HTTP 服务器。当您在第 35 章开始开发时，这将是由应用程序执行的任务。不过，现在请向 `placeholder`\
  \ 文件夹添加一个名为 `startup.go` 的文件，其内容如清单 33-11 所示。\n\n```\npackage placeholder\nimport\
  \ (\n\"platform/http\"\n\"platform/pipeline\"\n\"platform/pipeline/basic\"\n\"platform/services\"\
  \n\"sync\"\n)\nfunc createPipeline() pipeline.RequestPipeline {\nreturn pipeline.CreatePipeline(\n\
  &basic.ServicesComponent{},\n&basic.LoggingComponent{},\n&basic.ErrorComponent{},\n\
  &basic.StaticFileComponent{},\n&SimpleMessageComponent{},\n)\n}\nfunc Start() {\n\
  results, err := services.Call(http.Serve, createPipeline())\nif (err == nil) {\n\
  (results[0].(*sync.WaitGroup)).Wait()\n} else {\npanic(err)\n}\n}\n```\n\n`createPipeline`\
  \ 函数创建一个包含先前创建的中间件组件的管道。`Start` 函数调用 `createPipeline`，并使用其结果来配置和启动 HTTP 服务器。清单 33-12\
  \ 使用 `main` 函数完成设置并启动 HTTP 服务器。\n\n```\npackage main\nimport (\n\"platform/services\"\
  \n\"platform/placeholder\"\n)\nfunc main() {\nservices.RegisterDefaultServices()\n\
  placeholder.Start()\n}\n```\n\n编译并执行项目，然后使用 Web 浏览器请求 `http://localhost:5000`。\n\
  \n**处理 Windows 防火墙权限请求**\n\n如前面章节所述，每次使用 `go run` 命令编译项目时，Windows 都会提示防火墙权限。可以使用一个简单的\
  \ PowerShell 脚本代替 `go run` 命令来避免这些提示。创建一个名为 `buildandrun.ps1` 的文件，内容如下：\n\n```\n\
  $file = \"./platform.exe\"\n&go build -o $file\nif ($LASTEXITCODE -eq 0) {\n&$file\n\
  }\n```\n\n要构建并执行项目，请在 `platform` 文件夹中使用命令 `./buildandrun.ps1`。\n\nHTTP 请求将由服务器接收并沿着管道传递，产生如图\
  \ 33-2 所示的响应。请求 `http://localhost:5000/files/hello.json`，您将看到静态文件的内容，如图 33-2 所示。\n\
  \n类似以下内容的输出将写入标准输出，显示服务器接收和处理请求的过程（根据您的浏览器，您可能还会看到对 `/favicon.ico` 的请求）：\n\n```\n\
  20:10:12 DEBUG Starting HTTP server on port 5000\n20:10:23 INFO REQ --- GET - /\n\
  20:10:23 INFO RSP 200 /\n20:10:33 INFO REQ --- GET - /files/hello.json\n20:10:33\
  \ INFO RSP 200 /files/hello.json\n```\n\n目前，服务器对所有非文件请求的响应方式相同，这就是日志显示对 `/favicon.ico`\
  \ 文件的请求都生成 `200 OK` 响应的原因。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig2_HTML.jpg](img/512642_1_En_33_Fig2_HTML.jpg)\n\
  \n**图 33-2** 从 HTTP 服务器获得响应\n\n\n\n### 简化服务解析\n\n目前，中间件组件必须直接解析它们所需的服务。但由于依赖注入系统可以调用函数并填充结构体，只需少量额外工作，就能让组件声明其所依赖的服务并自动获取这些服务。首先，需要一个接口，允许组件表明它们需要依赖注入来处理请求，如代码清单\
  \ 33-13 所示。\n\n```go\npackage pipeline\n\nimport (\n\t\"net/http\"\n)\n\ntype ComponentContext\
  \ struct {\n\t*http.Request\n\thttp.ResponseWriter\n\terror\n}\n\nfunc (mwc *ComponentContext)\
  \ Error(err error) {\n\tmwc.error = err\n}\n\nfunc (mwc *ComponentContext) GetError()\
  \ error {\n\treturn mwc.error\n}\n\ntype MiddlewareComponent interface {\n\tInit()\n\
  \tProcessRequest(context *ComponentContext, next func(*ComponentContext))\n}\n\n\
  type ServicesMiddlwareComponent interface {\n\tInit()\n\tImplementsProcessRequestWithServices()\n\
  }\n```\n\n通过实现一个名为 `ImplementsProcessRequestWithServices` 的方法，组件可以表明它们需要服务。由于每个组件所需服务方法的方法签名不同，因此无法在接口中包含需要服务的方法。相反，我将检测\
  \ `ServicesMiddlwareComponent`，然后使用反射判断该组件是否实现了名为 `ProcessRequestWithServices` 的方法，该方法的头两个参数与\
  \ `MiddlewareComponent` 接口定义的 `ProcessRequest` 方法相同。代码清单 33-14 在创建管道函数中新增了这一功能，并在准备管道时，用服务填充组件的结构体字段。\n\
  \n```go\npackage pipeline\n\nimport (\n\t\"net/http\"\n\t\"platform/services\"\n\
  \t\"reflect\"\n)\n\ntype RequestPipeline func(*ComponentContext)\n\nvar emptyPipeline\
  \ RequestPipeline = func(*ComponentContext) { /* 什么都不做 */ }\n\nfunc CreatePipeline(components\
  \ ...interface{}) RequestPipeline {\n\tf := emptyPipeline\n\tfor i := len(components)\
  \ - 1; i >= 0; i-- {\n\t\tcurrentComponent := components[i]\n\t\tservices.Populate(currentComponent)\n\
  \t\tnextFunc := f\n\t\tif servComp, ok := currentComponent.(ServicesMiddlwareComponent);\
  \ ok {\n\t\t\tf = createServiceDependentFunction(currentComponent, nextFunc)\n\t\
  \t\tservComp.Init()\n\t\t} else if stdComp, ok := currentComponent.(MiddlewareComponent);\
  \ ok {\n\t\t\tf = func(context *ComponentContext) {\n\t\t\t\tif context.error ==\
  \ nil {\n\t\t\t\t\tstdComp.ProcessRequest(context, nextFunc)\n\t\t\t\t}\n\t\t\t\
  }\n\t\t\tstdComp.Init()\n\t\t} else {\n\t\t\tpanic(\"值不是中间件组件\")\n\t\t}\n\t}\n\t\
  return f\n}\n\nfunc createServiceDependentFunction(component interface{}, nextFunc\
  \ RequestPipeline) RequestPipeline {\n\tmethod := reflect.ValueOf(component).MethodByName(\"\
  ProcessRequestWithServices\")\n\tif method.IsValid() {\n\t\treturn func(context\
  \ *ComponentContext) {\n\t\t\tif context.error == nil {\n\t\t\t\t_, err := services.CallForContext(context.Request.Context(),\
  \ method.Interface(), context, nextFunc)\n\t\t\t\tif err != nil {\n\t\t\t\t\tcontext.Error(err)\n\
  \t\t\t\t}\n\t\t\t}\n\t\t}\n\t} else {\n\t\tpanic(\"未定义 ProcessRequestWithServices\
  \ 方法\")\n\t}\n}\n\nfunc (pl RequestPipeline) ProcessRequest(req *http.Request, resp\
  \ http.ResponseWriter) error {\n\tctx := ComponentContext{\n\t\tRequest:       \
  \ req,\n\t\tResponseWriter: resp,\n\t}\n\tpl(&ctx)\n\treturn ctx.error\n}\n```\n\
  \n这些改动使中间件组件能够利用依赖注入，从而将服务依赖声明为参数，如代码清单 33-15 所示。\n\n```go\npackage basic\n\nimport\
  \ (\n\t\"net/http\"\n\t\"platform/logging\"\n\t\"platform/pipeline\"\n\t//\"platform/services\"\
  \n)\n\ntype LoggingResponseWriter struct {\n\tstatusCode int\n\thttp.ResponseWriter\n\
  }\n\nfunc (w *LoggingResponseWriter) WriteHeader(statusCode int) {\n\tw.statusCode\
  \ = statusCode\n\tw.ResponseWriter.WriteHeader(statusCode)\n}\n\nfunc (w *LoggingResponseWriter)\
  \ Write(b []byte) (int, error) {\n\tif w.statusCode == 0 {\n\t\tw.statusCode = http.StatusOK\n\
  \t}\n\treturn w.ResponseWriter.Write(b)\n}\n\ntype LoggingComponent struct{}\n\n\
  func (lc *LoggingComponent) ImplementsProcessRequestWithServices() {}\nfunc (lc\
  \ *LoggingComponent) Init()                                 {}\nfunc (lc *LoggingComponent)\
  \ ProcessRequestWithServices(\n\tctx *pipeline.ComponentContext,\n\tnext func(*pipeline.ComponentContext),\n\
  \tlogger logging.Logger) {\n\t// var logger logging.Logger\n\t// err := services.GetServiceForContext(ctx.Request.Context(),\
  \ &logger)\n\t// if (err != nil) {\n\t//     ctx.Error(err)\n\t//     return\n\t\
  // }\n\tloggingWriter := LoggingResponseWriter{0, ctx.ResponseWriter}\n\tctx.ResponseWriter\
  \ = &loggingWriter\n\tlogger.Infof(\"REQ --- %v - %v\", ctx.Request.Method, ctx.Request.URL)\n\
  \tnext(ctx)\n\tlogger.Infof(\"RSP %v %v\", loggingWriter.statusCode, ctx.Request.URL)\n\
  }\n```\n\n定义 `ImplementsProcessRequestWithServices` 方法实现了管道使用的接口，以表明存在一个需要依赖注入的\
  \ `ProcessRequestWithServices` 方法。组件也可以依赖通过其结构体字段解析的服务，如代码清单 33-16 所示。\n\n```go\n\
  package basic\n\nimport (\n\t\"net/http\"\n\t\"platform/config\"\n\t\"platform/pipeline\"\
  \n\t//\"platform/services\"\n\t\"strings\"\n)\n\ntype StaticFileComponent struct\
  \ {\n\turlPrefix     string\n\tstdLibHandler http.Handler\n\tConfig        config.Configuration\n\
  }\n\nfunc (sfc *StaticFileComponent) Init() {\n\t// var cfg config.Configuration\n\
  \t// services.GetService(&cfg)\n\tsfc.urlPrefix = sfc.Config.GetStringDefault(\"\
  files:urlprefix\", \"/files/\")\n\tpath, ok := sfc.Config.GetString(\"files:path\"\
  )\n\tif ok {\n\t\tsfc.stdLibHandler = http.StripPrefix(sfc.urlPrefix,\n\t\t\thttp.FileServer(http.Dir(path)))\n\
  \t} else {\n\t\tpanic(\"无法加载文件配置设置\")\n\t}\n}\n\nfunc (sfc *StaticFileComponent)\
  \ ProcessRequest(ctx *pipeline.ComponentContext,\n\tnext func(*pipeline.ComponentContext))\
  \ {\n\tif !strings.EqualFold(ctx.Request.URL.Path, sfc.urlPrefix) &&\n\t\tstrings.HasPrefix(ctx.Request.URL.Path,\
  \ sfc.urlPrefix) {\n\t\tsfc.stdLibHandler.ServeHTTP(ctx.ResponseWriter, ctx.Request)\n\
  \t} else {\n\t\tnext(ctx)\n\t}\n}\n```\n\n编译并执行项目，使用浏览器请求 `http://localhost:5000`\
  \ 和 `http://localhost:5000/files/hello.json`，将产生与上一节相同的结果。请求 JSON 文件时可能会看到 304 状态结果，因为自上一节请求以来该文件没有变化。\n\
  \n## 创建 HTML 响应\n\n我在第 23 章中描述了 HTML 模板处理功能，但它们与我处理 HTML 内容的方式不同。我希望能够定义一个 HTML\
  \ 模板，并指定一个将在该模板中使用的共享布局。这与 `html/template` 包采用的标准方法相反，但通过定制默认行为很容易达到我想要的效果。\n\n\
  > **注意：** 由于我颠倒了模板处理的顺序，模板不能使用块特性来为被另一个模板覆盖的模板提供默认内容。\n\n\n\n### 创建布局和模板\n\n当你了解模板的结构时，适配模板引擎的过程会更加轻松。在\
  \ `platform/placeholder` 文件夹中添加一个名为 `simple_message.html` 的文件，内容如清单 33-17 所示。\n\n\
  ```\n{{ layout \"layout.html\" }}\n\nHello from the template\n\n清单 33-17\nplaceholder\
  \ 文件夹中 simple_message.html 文件的内容\n```\n\n该模板使用 `layout` 表达式指定所需的布局，但除此之外，它是一个使用第\
  \ 23 章所述功能的标准模板。模板中包含一个 `h3` 元素，其内容包含一个用于插入数据值的动作。\n\n要定义布局，请在 `placeholder` 文件夹中添加一个名为\
  \ `layout.html` 的文件，内容如清单 33-18 所示。\n\n```\nPro Go\n\nHello from the layout\n{{\
  \ body }}\n\n清单 33-18\nplaceholder 文件夹中 layout.html 文件的内容\n```\n\n布局包含定义 HTML 文档所需的元素，并额外添加了一个包含\
  \ `body` 表达式的动作，该动作会将所选模板的内容插入到输出中。\n\n为了渲染内容，模板会被选中并执行，这将确定它所需的布局。布局也会被渲染，并与模板内容相结合，以生成完整的\
  \ HTML 响应。这是我偏好的方法，部分原因是它避免了在选择模板时需要知道所需布局，另一部分原因是我在其他语言和平台中习惯如此。\n\n### 实现模板执行\n\
  \n内置的模板包非常出色，使得支持模板指定布局的模型变得容易。创建 `platform/templates` 文件夹，并在其中添加一个名为 `template_executor.go`\
  \ 的文件，内容如清单 33-19 所示。\n\n```\npackage templates\nimport \"io\"\ntype TemplateExecutor\
  \ interface {\nExecTemplate(writer io.Writer, name string, data interface{}) (err\
  \ error)\n}\n清单 33-19\ntemplates 文件夹中 template_executor.go 文件的内容\n```\n\n`TemplateProcessor`\
  \ 接口定义了一个名为 `ExecTemplate` 的方法，它使用提供的数据值处理模板，并将内容写入一个 `Writer`。为了创建该接口的实现，请在 `templates`\
  \ 文件夹中添加一个名为 `layout_executor.go` 的文件，内容如清单 33-20 所示。\n\n```\npackage templates\n\
  import (\n\"io\"\n\"strings\"\n\"html/template\"\n)\ntype LayoutTemplateProcessor\
  \ struct {}\nfunc (proc *LayoutTemplateProcessor) ExecTemplate(writer io.Writer,\n\
  name string, data interface{}) (err error) {\nvar sb strings.Builder\nlayoutName\
  \ := \"\"\nlocalTemplates := getTemplates()\nlocalTemplates.Funcs(map[string]interface{}\
  \ {\n\"body\": insertBodyWrapper(&sb),\n\"layout\": setLayoutWrapper(&layoutName),\n\
  })\nerr = localTemplates.ExecuteTemplate(&sb, name, data)\nif (layoutName != \"\"\
  ) {\nlocalTemplates.ExecuteTemplate(writer, layoutName, data)\n} else {\nio.WriteString(writer,\
  \ sb.String())\n}\nreturn\n}\nvar getTemplates func() (t *template.Template)\nfunc\
  \ insertBodyWrapper(body *strings.Builder) func() template.HTML {\nreturn func()\
  \ template.HTML {\nreturn template.HTML(body.String())\n}\n}\nfunc setLayoutWrapper(val\
  \ *string) func(string) string {\nreturn func(layout string) string {\n*val = layout\n\
  return \"\"\n}\n}\n清单 33-20\ntemplates 文件夹中 layout_executor.go 文件的内容\n```\n\n`ExecTemplate`\
  \ 方法的实现执行一个模板，并将内容存储在 `strings.Builder` 中。为了支持上一节中描述的 `layout` 和 `body` 表达式，需要创建自定义模板函数，如下所示：\n\
  \n```\n...\nlocalTemplates.Funcs(map[string]interface{} {\n\"body\": insertBodyWrapper(&sb),\n\
  \"layout\": setLayoutWrapper(&layoutName),\n})\n...\n```\n\n当内置模板引擎遇到 `template`\
  \ 表达式时，它会调用 `setLayoutWrapper` 创建的函数，该函数设置一个变量的值，然后这个变量被用来执行指定的布局模板。在布局执行期间，`body`\
  \ 表达式会调用 `insertBodyWrapper` 函数创建的函数，该函数将原始模板生成的内容插入到布局产生的输出中。为了防止内置模板引擎转义 HTML\
  \ 字符，此操作的结果是一个 `template.HTML` 值：\n\n```\n...\nfunc insertBodyWrapper(body *strings.Builder)\
  \ func() template.HTML {\nreturn func() template.HTML {\nreturn template.HTML(body.String())\n\
  }\n}\n...\n```\n\n正如第 23 章所解释的，Go 模板系统会自动对内容进行编码，以确保其安全地嵌入 HTML 文档。这通常是一个有用的特性，但在此例中，当内容从模板插入到布局时进行转义会使其无法被解释为\
  \ HTML。\n\n`ExecTemplate` 方法通过调用一个名为 `getTemplates` 的函数来获取已加载的模板，该函数对应的变量在清单 33-20\
  \ 中定义。为了添加对加载模板并创建将被赋值给 `getTemplates` 变量的函数值的支持，请在 `templates` 文件夹中添加一个名为 `template_loader.go`\
  \ 的文件，内容如清单 33-21 所示。\n\n```\npackage templates\nimport (\n\"html/template\"\n\"\
  sync\"\n\"errors\"\n\"platform/config\"\n)\nvar once = sync.Once{}\nfunc LoadTemplates(c\
  \ config.Configuration) (err error) {\npath, ok := c.GetString(\"templates:path\"\
  )\nif !ok {\nreturn errors.New(\"Cannot load template config\")\n}\nreload := c.GetBoolDefault(\"\
  templates:reload\", false)\nonce.Do(func() {\ndoLoad := func() (t *template.Template)\
  \ {\nt = template.New(\"htmlTemplates\")\nt.Funcs(map[string]interface{} {\n\"body\"\
  : func() string { return \"\" },\n\"layout\": func() string { return \"\" },\n})\n\
  t, err = t.ParseGlob(path)\nreturn\n}\nif (reload) {\ngetTemplates = doLoad\n} else\
  \ {\nvar templates *template.Template\ntemplates = doLoad()\ngetTemplates = func()\
  \ *template.Template {\nt, _ := templates.Clone()\nreturn t\n}\n}\n})\nreturn\n\
  }\n清单 33-21\ntemplates 文件夹中 template_loader.go 文件的内容\n```\n\n`LoadTemplates` 函数从配置文件中指定的位置加载模板。还有一个配置设置允许在每次请求时重新加载模板，这在已部署的项目中不建议使用，但在开发过程中很有用，因为这意味着无需重新启动应用程序即可看到对模板的更改。清单\
  \ 33-22 将新的设置添加到了配置文件中。\n\n```\n{\n\"logging\" : {\n\"level\": \"debug\"\n},\n\"\
  main\" : {\n\"message\" : \"Hello from the config file\"\n},\n\"files\": {\n\"path\"\
  : \"placeholder/files\"\n},\n\"templates\": {\n\"path\": \"placeholder/*.html\"\
  ,\n\"reload\": true\n}\n}\n清单 33-22\n在 platform 文件夹中的 config.json 文件中添加设置\n```\n\
  \n通过 `reload` 设置接收的值决定了分配给 `getTemplates` 变量的函数。如果 `reload` 为 `true`，那么调用 `getTemplates`\
  \ 将从磁盘加载模板；如果为 `false`，则将克隆之前加载的模板。\n\n需要克隆或重新加载模板以确保自定义的 `body` 和 `layout` 函数能正常工作。`LoadTemplates`\
  \ 函数定义了占位函数，以便在加载时能够解析模板。\n\n\n\n### 创建并使用模板服务\n\n自定义模板引擎将作为服务提供。将列表 33-23 所示的语句添加到\
  \ `platform/services` 文件夹中的 `services_default.go` 文件中。\n\n```\npackage services\n\
  \nimport (\n\t\"platform/logging\"\n\t\"platform/config\"\n\t\"platform/templates\"\
  \n)\n\nfunc RegisterDefaultServices() {\n\terr := AddSingleton(func() (c config.Configuration)\
  \ {\n\t\tc, loadErr := config.Load(\"config.json\")\n\t\tif loadErr != nil {\n\t\
  \t\tpanic(loadErr)\n\t\t}\n\t\treturn\n\t})\n\terr = AddSingleton(func(appconfig\
  \ config.Configuration) logging.Logger {\n\t\treturn logging.NewDefaultLogger(appconfig)\n\
  \t})\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\terr = AddSingleton(\n\t\tfunc(c\
  \ config.Configuration) templates.TemplateExecutor {\n\t\t\ttemplates.LoadTemplates(c)\n\
  \t\t\treturn &templates.LayoutTemplateProcessor{}\n\t\t})\n\tif err != nil {\n\t\
  \tpanic(err)\n\t}\n}\n```\n\n列表 33-23 — 在 `services` 文件夹的 `services_default.go`\
  \ 文件中创建模板服务\n\n为确保模板引擎正常工作，请对本章前面创建的占位中间件组件进行列表 33-24 所示的更改，使其返回 HTML 响应而非简单字符串。\n\
  \n```\npackage placeholder\n\nimport (\n\t//\"io\"\n\t//\"errors\"\n\t\"platform/pipeline\"\
  \n\t\"platform/config\"\n\t//\"platform/services\"\n\t\"platform/templates\"\n)\n\
  \ntype SimpleMessageComponent struct {\n\tMessage string\n\tconfig.Configuration\n\
  }\n\nfunc (lc *SimpleMessageComponent) ImplementsProcessRequestWithServices() {}\n\
  \nfunc (c *SimpleMessageComponent) Init() {\n\tc.Message = c.Configuration.GetStringDefault(\"\
  main:message\",\n\t\t\"Default Message\")\n}\n\nfunc (c *SimpleMessageComponent)\
  \ ProcessRequestWithServices(\n\tctx *pipeline.ComponentContext,\n\tnext func(*pipeline.ComponentContext),\n\
  \texecutor templates.TemplateExecutor) {\n\terr := executor.ExecTemplate(ctx.ResponseWriter,\n\
  \t\t\"simple_message.html\", c.Message)\n\tif err != nil {\n\t\tctx.Error(err)\n\
  \t} else {\n\t\tnext(ctx)\n\t}\n}\n```\n\n列表 33-24 — 在 `placeholder` 文件夹的 `message_middleware.go`\
  \ 文件中使用模板\n\n该组件现在实现了 `ProcessRequestWithServices` 方法，并通过依赖注入接收服务。其中一个请求的服务是 `TemplateExecutor`\
  \ 接口的实现，用于显示 `simple_message.html` 模板。编译并执行项目，使用浏览器请求 `http://localhost:5000`，您将看到图\
  \ 33-3 所示的 HTML 响应。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig3_HTML.jpg](img/512642_1_En_33_Fig3_HTML.jpg)\n\
  \n图 33-3 — 创建 HTML 响应\n\n## 引入请求处理器\n\n下一步是引入对定义处理 HTTP 请求并生成适当响应的逻辑的支持，这将使我能够编写响应特定\
  \ URL 的代码，而无需重复太多代码。要理解其工作原理，最好从请求处理器的示例开始，该处理器将被定义为一个包含一组处理请求方法的类型。在 `placeholder`\
  \ 文件夹中添加一个名为 `name_handler.go` 的文件，内容如列表 33-25 所示。\n\n```\npackage placeholder\n\
  \nimport (\n\t\"fmt\"\n\t\"platform/logging\"\n)\n\nvar names = []string{\"Alice\"\
  , \"Bob\", \"Charlie\", \"Dora\"}\n\ntype NameHandler struct {\n\tlogging.Logger\n\
  }\n\nfunc (n NameHandler) GetName(i int) string {\n\tn.Logger.Debugf(\"GetName method\
  \ invoked with argument: %v\", i)\n\tif i < len(names) {\n\t\treturn fmt.Sprintf(\"\
  Name #%v: %v\", i, names[i])\n\t} else {\n\t\treturn fmt.Sprintf(\"Index out of\
  \ bounds\")\n\t}\n}\n\nfunc (n NameHandler) GetNames() string {\n\tn.Logger.Debug(\"\
  GetNames method invoked\")\n\treturn fmt.Sprintf(\"Names: %v\", names)\n}\n\ntype\
  \ NewName struct {\n\tName        string\n\tInsertAtStart bool\n}\n\nfunc (n NameHandler)\
  \ PostName(new NewName) string {\n\tn.Logger.Debugf(\"PostName method invoked with\
  \ argument %v\", new)\n\tif new.InsertAtStart {\n\t\tnames = append([]string{new.Name},\
  \ names...)\n\t} else {\n\t\tnames = append(names, new.Name)\n\t}\n\treturn fmt.Sprintf(\"\
  Names: %v\", names)\n}\n```\n\n列表 33-25 — `placeholder` 文件夹中 `name_handler.go` 文件的内容\n\
  \n`NameHandler` 结构体定义了三个方法：`GetName`、`GetNames` 和 `PostName`。应用程序启动时，将检查已注册的处理器集，并使用它们定义的方法名来创建与\
  \ HTTP 请求匹配的路由。\n\n每个方法名的第一部分指定了该路由将匹配的 HTTP 方法，例如 `GetName` 方法将匹配 GET 请求。方法名的其余部分将用作路由匹配的\
  \ URL 路径中的第一个段，GET 请求的参数将添加额外的段。\n\n表 33-1 显示了将由列表 33-25 中定义的方法处理的请求的详细信息。\n\n表\
  \ 33-1 — 示例处理器方法匹配的请求\n\n| 名称 | HTTP 方法 | 示例 URL |\n| --- | --- | --- |\n| `GetName`\
  \ | GET | `/name/1` |\n| `GetNames` | GET | `/names` |\n| `PostName` | POST | `/names`\
  \ |\n\n当请求到达并匹配到方法的路径时，参数值将从请求 URL、查询字符串以及请求表单（如果存在）中获取。如果方法参数的类型是一个结构体，则其字段将使用相同的请求数据进行填充。\n\
  \n处理请求所需的服务被声明为处理器结构体定义的字段。在列表 33-25 中，`NameHandler` 结构体定义了一个字段，声明了对 `logging.Logger`\
  \ 服务的依赖。将创建该结构体的一个新实例，填充其字段，然后调用被选中处理请求的方法。\n\n\n\n### 生成 URL 路由\n\n第一步是为请求处理方法添加生成\
  \ URL 路由的支持。创建 `platform/http/handling` 文件夹，并在其中添加一个名为 `routes.go` 的文件，其内容如代码清单\
  \ 33-26 所示。\n\n```\npackage handling\n\nimport (\n\t\"reflect\"\n\t\"regexp\"\n\t\
  \"strings\"\n\t\"net/http\"\n)\n\ntype HandlerEntry struct {\n\tPrefix  string\n\
  \tHandler interface{}\n}\n\ntype Route struct {\n\thttpMethod    string\n\tprefix\
  \        string\n\thandlerName   string\n\tactionName    string\n\texpression  \
  \  regexp.Regexp\n\thandlerMethod reflect.Method\n}\n\nvar httpMethods = []string{http.MethodGet,\
  \ http.MethodPost,\n\thttp.MethodDelete, http.MethodPut}\n\nfunc generateRoutes(entries\
  \ ...HandlerEntry) []Route {\n\troutes := make([]Route, 0, 10)\n\tfor _, entry :=\
  \ range entries {\n\t\thandlerType := reflect.TypeOf(entry.Handler)\n\t\tpromotedMethods\
  \ := getAnonymousFieldMethods(handlerType)\n\t\tfor i := 0; i < handlerType.NumMethod();\
  \ i++ {\n\t\t\tmethod := handlerType.Method(i)\n\t\t\tmethodName := strings.ToUpper(method.Name)\n\
  \t\t\tfor _, httpMethod := range httpMethods {\n\t\t\t\tif strings.Index(methodName,\
  \ httpMethod) == 0 {\n\t\t\t\t\tif (matchesPromotedMethodName(method, promotedMethods))\
  \ {\n\t\t\t\t\t\tcontinue\n\t\t\t\t\t}\n\t\t\t\t\troute := Route{\n\t\t\t\t\t\t\
  httpMethod:    httpMethod,\n\t\t\t\t\t\tprefix:        entry.Prefix,\n\t\t\t\t\t\
  \thandlerName:   strings.Split(handlerType.Name(), \"Handler\")[0],\n\t\t\t\t\t\t\
  actionName:    strings.Split(methodName, httpMethod)[1],\n\t\t\t\t\t\thandlerMethod:\
  \ method,\n\t\t\t\t\t}\n\t\t\t\t\tgenerateRegularExpression(entry.Prefix, &route)\n\
  \t\t\t\t\troutes = append(routes, route)\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\treturn\
  \ routes\n}\n\nfunc matchesPromotedMethodName(method reflect.Method,\n\tmethods\
  \ []reflect.Method) bool {\n\tfor _, m := range methods {\n\t\tif m.Name == method.Name\
  \ {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n\nfunc getAnonymousFieldMethods(target\
  \ []reflect.Type) reflect.Method {\n\tmethods := []reflect.Method{}\n\tfor i :=\
  \ 0; i < target.NumField(); i++ {\n\t\tfield := target.Field(i)\n\t\tif (field.Anonymous\
  \ && field.IsExported()) {\n\t\t\tfor j := 0; j < field.Type.NumMethod(); j++ {\n\
  \t\t\t\tmethod := field.Type.Method(j)\n\t\t\t\tif (method.IsExported()) {\n\t\t\
  \t\t\tmethods = append(methods, method)\n\t\t\t\t}\n\t\t\t}\n\t\t}\n\t}\n\treturn\
  \ methods\n}\n\nfunc generateRegularExpression(prefix string, route *Route) {\n\t\
  if (prefix != \"\" && !strings.HasSuffix(prefix, \"/\")) {\n\t\tprefix += \"/\"\n\
  \t}\n\tpattern := \"(?i)\" + \"/\" + prefix + route.actionName\n\tif (route.httpMethod\
  \ == http.MethodGet) {\n\t\tfor i := 1; i < route.handlerMethod.Type.NumIn(); i++\
  \ {\n\t\t\tif route.handlerMethod.Type.In(i).Kind() == reflect.Int {\n\t\t\t\tpattern\
  \ += \"/([0-9]*)\"\n\t\t\t} else {\n\t\t\t\tpattern += \"/([A-z0-9]*)\"\n\t\t\t\
  }\n\t\t}\n\t}\n\tpattern = \"^\" + pattern + \"[/]?$\"\n\troute.expression = *regexp.MustCompile(pattern)\n\
  }\n```\n\n**代码清单 33-26** `http/handling` 文件夹中 `routes.go` 文件的内容\n\n路由将使用一个可选的前缀进行配置，这使我能够为应用程序的不同部分创建不同的\
  \ URL，例如在第 34 章中引入访问控制时。`HandlerEntry` 结构体描述了处理器及其前缀，而 `Route` 结构体定义了单个路由的处理结果。`generateRoutes`\
  \ 函数为处理器定义的方法创建 `Route` 值，并依赖 `generateRegularExpression` 函数来创建和编译用于匹配 URL 路径的正则表达式。\n\
  \n> **注意：** 如第 28 章所述，在对结构体使用反射时，会将匿名内嵌字段中提升的方法包含在内。代码清单 33-26 中的代码过滤掉了这些提升的方法，以防止生成允许这些方法被\
  \ HTTP 请求调用的路由。\n\n### 为处理方法准备参数值\n\n当收到 HTTP 请求并与某路由匹配时，必须从请求中提取值，以便将它们用作处理方法的参数。所有可以从请求中获取的值都使用\
  \ Go `string` 类型表示，因为 HTTP 不支持在 URL 或表单数据中包含类型信息。我可以将请求中的字符串值直接传递给处理方法，但这意味着每个处理方法都必须自行将字符串值解析为其所需的类型。相反，我将根据处理方法参数类型自动解析值，这样可以一次性定义解析代码。创建\
  \ `http/handling/params` 文件夹，并在其中添加一个名为 `parser.go` 的文件，其内容如代码清单 33-27 所示。\n\n```\n\
  package params\n\nimport (\n\t\"reflect\"\n\t\"fmt\"\n\t\"strconv\"\n)\n\nfunc parseValueToType(target\
  \ reflect.Type, val string) (result reflect.Value,\n\terr error) {\n\tswitch target.Kind()\
  \ {\n\tcase reflect.String:\n\t\tresult = reflect.ValueOf(val)\n\tcase reflect.Int:\n\
  \t\tiVal, convErr := strconv.Atoi(val)\n\t\tif convErr == nil {\n\t\t\tresult =\
  \ reflect.ValueOf(iVal)\n\t\t} else {\n\t\t\treturn reflect.Value{}, convErr\n\t\
  \t}\n\tcase reflect.Float64:\n\t\tfVal, convErr := strconv.ParseFloat(val, 64)\n\
  \t\tif (convErr == nil) {\n\t\t\tresult = reflect.ValueOf(fVal)\n\t\t} else {\n\t\
  \t\treturn reflect.Value{}, convErr\n\t\t}\n\tcase reflect.Bool:\n\t\tbVal, convErr\
  \ := strconv.ParseBool(val)\n\t\tif (convErr == nil) {\n\t\t\tresult = reflect.ValueOf(bVal)\n\
  \t\t} else {\n\t\t\treturn reflect.Value{}, convErr\n\t\t}\n\tdefault:\n\t\terr\
  \ = fmt.Errorf(\"Cannot use type %v as handler method parameter\",\n\t\t\ttarget.Name())\n\
  \t}\n\treturn\n}\n```\n\n**代码清单 33-27** `http/handling/params` 文件夹中 `parser.go`\
  \ 文件的内容\n\n`parseValueToType` 函数会检查所需参数的类型，并使用 `strconv` 包中定义的函数将值解析为预期类型。我将支持四种基本类型：`string`、`float64`、`int`\
  \ 和 `bool`。我还会支持字段为这四种类型的结构体。如果参数定义为其他类型，或者请求中接收到的值无法解析，`parseValueToType` 函数将返回一个\
  \ `error`。\n\n下一步是使用 `parseValueToType` 函数来处理定义了这四种支持类型参数的处理方法，例如代码清单 33-25 中定义的\
  \ `GetName` 方法：\n\n```\n...\nfunc (n NameHandler) GetName(i int) string {\n...\n\
  ```\n\n此类参数的值将从处理器注册时生成的正则表达式中获取。在 `http/handling/params` 文件夹中添加一个名为 `simple_params.go`\
  \ 的文件，其内容如代码清单 33-28 所示。\n\n```\npackage params\n\nimport (\n\t\"reflect\"\n\t\"\
  errors\"\n)\n\nfunc getParametersFromURLValues(funcType reflect.Type,\n\turlVals\
  \ []string) (params []reflect.Value, err error) {\n\tif (len(urlVals) == funcType.NumIn()-1)\
  \ {\n\t\tparams = make([]reflect.Value, funcType.NumIn()-1)\n\t\tfor i := 0; i <\
  \ len(urlVals); i++ {\n\t\t\tparams[i], err = parseValueToType(funcType.In(i+1),\
  \ urlVals[i])\n\t\t\tif (err != nil) {\n\t\t\t\treturn\n\t\t\t}\n\t\t}\n\t} else\
  \ {\n\t\terr = errors.New(\"Parameter number mismatch\")\n\t}\n\treturn\n}\n```\n\
  \n**代码清单 33-28** `http/handling/params` 文件夹中 `simple_params.go` 文件的内容\n\n`getParametersFromURLValues`\
  \ 函数会检查处理方法定义的参数，并调用 `parseValueToType` 函数尝试为每个参数获取一个值。请注意，我跳过了该方法定义的第一个参数。如第 28\
  \ 章所述，在使用反射时，第一个参数是调用方法所在的接收器。\n\n\n\n若处理器方法需要从 URL 查询字符串或表单数据中获取值，可通过定义一个参数来实现，该参数的类型是一个结构体，其字段名称需与请求数据值的名称匹配，如清单\
  \ 33-25 中定义的方法所示：\n\n```\n...\ntype NewName struct {\nName string\nInsertAtStart\
  \ bool\n}\nfunc (n NameHandler) PostName(new NewName) string {\n...\n```\n\n该参数表示处理器方法需要从请求中获取\
  \ `name` 和 `insertAtStart` 值。为了从请求中填充结构体字段，请在 `http/handling/params` 文件夹中添加一个名为\
  \ `struct_params.go` 的文件，其内容如清单 33-29 所示。\n\n```\npackage params\nimport (\n\"reflect\"\
  \n\"encoding/json\"\n\"io\"\n\"strings\"\n)\nfunc populateStructFromForm(structVal\
  \ reflect.Value,\nformVals map[string][]string) (err error) {\nfor i := 0; i  0\
  \ {\nvalField := structVal.Elem().Field(i)\nif (valField.CanSet()) {\nvalToSet,\
  \ convErr := parseValueToType(valField.Type(), vals[0])\nif (convErr == nil) {\n\
  valField.Set(valToSet)\n} else {\nerr = convErr\n}\n}\n}\n}\n}\nreturn\n}\nfunc\
  \ populateStructFromJSON(structVal reflect.Value,\nreader io.ReadCloser) (err error)\
  \ {\nreturn json.NewDecoder(reader).Decode(structVal.Interface())\n}\n清单 33-29\n\
  `http/handling/params` 文件夹中 `struct_params.go` 文件的内容\n```\n\n`populateStructFromForm`\
  \ 函数将用于所有需要结构体并从映射中设置结构体字段值的处理器方法。`populateStructFromJSON` 函数使用 JSON 解码器读取请求体，并将在请求包含\
  \ JSON 负载时使用。为了应用这些函数，请在 `http/handling/params` 文件夹中添加一个名为 `processor.go` 的文件，其内容如清单\
  \ 33-30 所示。\n\n```\npackage params\nimport (\n\"net/http\"\n\"reflect\"\n)\nfunc\
  \ GetParametersFromRequest(request *http.Request, handlerMethod reflect.Method,\n\
  urlVals []string) (params []reflect.Value, err error) {\nhandlerMethodType := handlerMethod.Type\n\
  params = make([]reflect.Value, handlerMethodType.NumIn() -1)\nif (handlerMethodType.NumIn()\
  \ == 1) {\nreturn []reflect.Value {}, nil\n} else if handlerMethodType.NumIn() ==\
  \ 2 &&\nhandlerMethodType.In(1).Kind() == reflect.Struct {\nstructVal := reflect.New(handlerMethodType.In(1))\n\
  err = request.ParseForm()\nif err == nil && getContentType(request) == \"application/json\"\
  \ {\nerr = populateStructFromJSON(structVal, request.Body)\n}\nif err == nil {\n\
  err = populateStructFromForm(structVal, request.Form)\n}\nreturn []reflect.Value\
  \ { structVal.Elem() }, err\n} else {\nreturn getParametersFromURLValues(handlerMethodType,\
  \ urlVals)\n}\n}\nfunc getContentType(request *http.Request) (contentType string)\
  \ {\nheaderSlice := request.Header[\"Content-Type\"]\nif headerSlice != nil && len(headerSlice)\
  \ > 0 {\ncontentType = headerSlice[0]\n}\nreturn\n}\n清单 33-30\n`http/handling/params`\
  \ 文件夹中 `processor.go` 文件的内容\n```\n\n`GetParametersFromRequest` 被导出以便在项目的其他地方使用。它接收一个请求、一个反射处理器方法以及一个包含路由匹配值的切片。该方法会被检查是否需要结构体参数，然后使用之前介绍的函数创建该方法所需的参数。\n\
  \n### 将请求匹配到路由\n\n本章的最后一步是将传入的 HTTP 请求匹配到路由，并执行处理器方法以生成响应。请在 `http/handling` 文件夹中添加一个名为\
  \ `request_dispatch.go` 的文件，其内容如清单 33-31 所示。\n\n```\npackage handling\nimport (\n\
  \"platform/http/handling/params\"\n\"platform/pipeline\"\n\"platform/services\"\n\
  \"net/http\"\n\"reflect\"\n\"strings\"\n\"io\"\n\"fmt\"\n)\nfunc NewRouter(handlers\
  \ ...HandlerEntry) *RouterComponent {\nreturn &RouterComponent{ generateRoutes(handlers...)\
  \ }\n}\ntype RouterComponent struct {\nroutes []Route\n}\nfunc (router *RouterComponent)\
  \ Init() {}\nfunc (router *RouterComponent) ProcessRequest(context *pipeline.ComponentContext,\n\
  next func(*pipeline.ComponentContext)) {\nfor _, route := range router.routes {\n\
  if (strings.EqualFold(context.Request.Method, route.httpMethod)) {\nmatches := route.expression.FindAllStringSubmatch(context.URL.Path,\
  \ -1)\nif len(matches) > 0 {\nrawParamVals := []string {}\nif len(matches[0]) >\
  \ 1 {\nrawParamVals = matches[0][1:]\n}\nerr := router.invokeHandler(route, rawParamVals,\
  \ context)\nif (err == nil) {\nnext(context)\n} else {\ncontext.Error(err)\n}\n\
  return\n}\n}\n}\ncontext.ResponseWriter.WriteHeader(http.StatusNotFound)\n}\nfunc\
  \ (router *RouterComponent) invokeHandler(route Route, rawParams []string,\ncontext\
  \ *pipeline.ComponentContext) error {\nparamVals, err := params.GetParametersFromRequest(context.Request,\n\
  route.handlerMethod, rawParams)\nif (err == nil) {\nstructVal := reflect.New(route.handlerMethod.Type.In(0))\n\
  services.PopulateForContext(context.Context(), structVal.Interface())\nparamVals\
  \ = append([]reflect.Value { structVal.Elem() }, paramVals...)\nresult := route.handlerMethod.Func.Call(paramVals)\n\
  io.WriteString(context.ResponseWriter, fmt.Sprint(result[0].Interface()))\n}\nreturn\
  \ err\n}\n清单 33-31\n`http/handling` 文件夹中 `request_dispatch.go` 文件的内容\n```\n\n`NewRouter`\
  \ 函数用于创建一个新的中间件组件，该组件使用路由处理请求，这些路由由一系列 `HandlerEntry` 值生成。`RouterComponent` 结构体实现了\
  \ `MiddlewareComponent` 接口，其 `ProcessRequest` 方法使用 HTTP 方法和 URL 路径匹配路由。当找到匹配的路由时，会调用\
  \ `invokeHandler` 函数，该函数准备处理器方法定义的参数值，然后调用该方法。\n\n此中间件组件被设计为假设它在管道的末尾应用，这意味着如果没有路由匹配请求，则返回\
  \ 404 - Not Found 响应。\n\n最后需要注意的一点是，处理器方法产生的响应会被简单地以字符串形式写出，如下所示：\n\n```\n...\n\
  io.WriteString(context.ResponseWriter, fmt.Sprint(result[0].Interface()))\n...\n\
  ```\n\n这与本章前面介绍的模板相比有所退步，但我将在第 34 章中解决这个问题。清单 33-32 更改了占位符配置，以使用新的路由中间件组件。\n\n```\n\
  package placeholder\nimport (\n\"platform/http\"\n\"platform/pipeline\"\n\"platform/pipeline/basic\"\
  \n\"platform/services\"\n\"sync\"\n\"platform/http/handling\"\n)\nfunc createPipeline()\
  \ pipeline.RequestPipeline {\nreturn pipeline.CreatePipeline(\n&basic.ServicesComponent{},\n\
  &basic.LoggingComponent{},\n&basic.ErrorComponent{},\n&basic.StaticFileComponent{},\n\
  //&SimpleMessageComponent{},\nhandling.NewRouter(\nhandling.HandlerEntry{ \"\",\
  \  NameHandler{}},\n),\n)\n}\nfunc Start() {\nresults, err := services.Call(http.Serve,\
  \ createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n清单 33-32\n在 `placeholder` 文件夹的 `startup.go` 文件中配置应用程序\n\
  ```\n\n\n\n编译并执行项目，使用浏览器请求`http://localhost:5000/names`。此 URL 将由占位请求处理器为`GetNames`方法定义的路由匹配，并生成如图\
  \ 33-4 所示的结果。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig4_HTML.jpg](img/512642_1_En_33_Fig4_HTML.jpg)\n\
  \n图 33-4：使用请求处理器生成响应\n\n要测试对简单处理器方法参数的支持，请使用浏览器请求`http://localhost:5000/name/0`和`http://localhost:5000/name/100`。请注意这些\
  \ URL 中是`name`（单数）而非`names`（复数），它们将生成如图 33-5 所示的响应。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig5_HTML.jpg](img/512642_1_En_33_Fig5_HTML.jpg)\n\
  \n图 33-5：使用简单参数定位请求处理器方法\n\n要测试发送 POST 请求，请在命令提示符下运行清单 33-33 所示的命令。\n\n```\ncurl\
  \ --header \"Content-Type: application/json\" --request POST --data '{\"name\" :\
  \ \"Edith\",\"insertatstart\" : false}' http://localhost:5000/name\n清单 33-33：发送包含\
  \ JSON 数据的 POST 请求\n```\n\n如果您使用 Windows，请在 PowerShell 命令提示符下运行清单 33-34 所示的命令。\n\
  \n```\nInvoke-WebRequest http://localhost:5000/name -Method Post -Body `\n(@{name=\"\
  Edith\";insertatstart=$false} | ConvertTo-Json) `\n-ContentType \"application/json\"\
  \n清单 33-34：在 Windows 上发送包含 JSON 数据的 POST 请求\n```\n\n这些命令向服务器发送相同的请求，其效果可通过请求`http://localhost:5000/names`查看，如图\
  \ 33-6 所示。\n\n![../images/512642_1_En_33_Chapter/512642_1_En_33_Fig6_HTML.jpg](img/512642_1_En_33_Fig6_HTML.jpg)\n\
  \n图 33-6：发送 POST 请求的效果\n\n## 本章小结\n\n在本章中，我通过创建使用中间件组件处理请求的管道，继续开发 Web 应用程序平台。我增加了对可指定其布局的模板的支持，并引入了请求处理器，我将在下一章中进一步构建这些功能。\n\
  \n"
- "# 34. 操作、会话与授权\n\n在本章中，我将在第 32 章开始、第 33 章继续的自定义 Web 应用程序平台的开发基础上，完成其开发。\n\n提示\n\
  \n您可以从此书（以及书中所有其他章节）的示例项目下载地址 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 获取本章的示例项目。有关运行示例时遇到问题的帮助，请参阅第 2 章。\n\n## 引入操作结果\n\n目前，平台通过将请求处理器生成的响应以字符串形式写入来处理这些响应。我不希望让每个处理器方法都处理如何生成响应的具体细节，因为大多数响应将是相似的（大部分是渲染模板），并且我不希望每次都重复相同的代码。\n\
  \n相反，我将增加对操作结果的支持。操作结果是指示需要什么类型的响应的指令，以及生成该响应所需的任何附加信息。当处理器方法希望渲染一个模板作为响应时，它将返回一个选择该模板的操作结果，该操作将被执行，而无需处理器方法理解其发生过程。创建`platform/http/actionresults`文件夹，并向其中添加一个名为`actionresult.go`的文件，其内容如清单\
  \ 34-1 所示。\n\n```\npackage actionresults\n\nimport (\n    \"context\"\n    \"net/http\"\
  \n)\n\ntype ActionContext struct {\n    context.Context\n    http.ResponseWriter\n\
  }\n\ntype ActionResult interface {\n    Execute(*ActionContext) error\n}\n清单 34-1：`http/actionresults`文件夹中`actionresult.go`文件的内容\n\
  ```\n\n`ActionResult`接口定义了一个`Execute`方法，该方法将使用`ActionContext`结构体提供的设施（一个用于获取服务的`Context`和一个用于生成响应的`ResponseWriter`）来生成响应。\n\
  \n清单 34-2 更新了调用处理器方法的代码，使其在使用操作结果时执行它们。\n\n```\npackage handling\n\nimport (\n \
  \   \"platform/http/handling/params\"\n    \"platform/pipeline\"\n    \"platform/services\"\
  \n    \"net/http\"\n    \"reflect\"\n    \"strings\"\n    \"io\"\n    \"fmt\"\n\
  \    \"platform/http/actionresults\"\n)\n\n// ...为简洁起见，省略了函数和类型...\n\nfunc (router\
  \ *RouterComponent) invokeHandler(route Route, rawParams []string,\n    context\
  \ *pipeline.ComponentContext) error {\n    paramVals, err := params.GetParametersFromRequest(context.Request,\n\
  \        route.handlerMethod, rawParams)\n    if (err == nil) {\n        structVal\
  \ := reflect.New(route.handlerMethod.Type.In(0))\n        services.PopulateForContext(context.Context(),\
  \ structVal.Interface())\n        paramVals = append([]reflect.Value { structVal.Elem()\
  \ }, paramVals...)\n        result := route.handlerMethod.Func.Call(paramVals)\n\
  \        if len(result) > 0 {\n            if action, ok := result[0].Interface().(actionresults.ActionResult);\
  \ ok {\n                err = services.PopulateForContext(context.Context(), action)\n\
  \                if (err == nil) {\n                    err = action.Execute(&actionresults.ActionContext{\n\
  \                        context.Context(), context.ResponseWriter  })\n       \
  \         }\n            } else {\n                io.WriteString(context.ResponseWriter,\n\
  \                    fmt.Sprint(result[0].Interface()))\n            }\n       \
  \ }\n    }\n    return err\n}\n清单 34-2：在`http/handling`文件夹的`request_dispatch.go`文件中执行操作结果\n\
  ```\n\n实现`ActionResult`接口的结构体被传递给`services.PopulateForContext`函数，以便其字段填充服务，然后调用`Execute`方法来生成结果。\n\
  \n\n\n### 定义通用操作结果\n\n最常见的响应类型将通过模板生成，因此需要在 `platform/http/actionresults` 文件夹中添加一个名为\
  \ `templateresult.go` 的文件，其内容如代码清单 34-3 所示。\n\n```\npackage actionresults\nimport\
  \ (\n\"platform/templates\"\n)\nfunc NewTemplateAction(name string, data interface{})\
  \ ActionResult {\nreturn &TemplateActionResult{ templateName:  name, data: data\
  \ }\n}\ntype TemplateActionResult struct {\ntemplateName string\ndata interface{}\n\
  templates.TemplateExecutor\n}\nfunc (action *TemplateActionResult) Execute(ctx *ActionContext)\
  \ error {\nreturn action.TemplateExecutor.ExecTemplate(ctx.ResponseWriter,\naction.templateName,\
  \ action.data)\n}\n```\n\n`TemplateActionResult` 结构体是一种操作，它会在执行时渲染一个模板。其字段指定了模板名称、将传递给模板执行器的数据以及模板执行器服务。`NewTemplateAction`\
  \ 函数用于创建 `TemplateActionResult` 结构体的新实例。\n\n另一种常见的操作结果是重定向，这通常在处理完 `POST` 或 `PUT`\
  \ 请求后执行。要创建这类操作结果，请在 `platform/http/actionresults` 文件夹中添加一个名为 `redirectresult.go`\
  \ 的文件，其内容如代码清单 34-4 所示。\n\n```\npackage actionresults\nimport \"net/http\"\nfunc\
  \ NewRedirectAction(url string) ActionResult {\nreturn &RedirectActionResult{ url:\
  \ url}\n}\ntype RedirectActionResult struct {\nurl string\n}\nfunc (action *RedirectActionResult)\
  \ Execute(ctx *ActionContext) error {\nctx.ResponseWriter.Header().Set(\"Location\"\
  , action.url)\nctx.ResponseWriter.WriteHeader(http.StatusSeeOther)\nreturn nil\n\
  }\n```\n\n此操作结果会产生一个 `303 See Other` 响应。这是一种重定向，它会指定一个新的 URL，并确保浏览器不会重复使用原始请求中的\
  \ HTTP 方法或 URL。\n\n本节中要定义的另一个操作结果将允许处理方法返回一个 JSON 结果，这在第 38 章创建 Web 服务时会非常有用。请在\
  \ `platform/http/actionresults` 文件夹中创建一个名为 `jsonresult.go` 的文件，其内容如代码清单 34-5 所示。\n\
  \n```\npackage actionresults\nimport \"encoding/json\"\nfunc NewJsonAction(data\
  \ interface{}) ActionResult {\nreturn &JsonActionResult{ data: data}\n}\ntype JsonActionResult\
  \ struct {\ndata interface{}\n}\nfunc (action *JsonActionResult) Execute(ctx *ActionContext)\
  \ error {\nctx.ResponseWriter.Header().Set(\"Content-Type\", \"application/json\"\
  )\nencoder := json.NewEncoder(ctx.ResponseWriter)\nreturn encoder.Encode(action.data)\n\
