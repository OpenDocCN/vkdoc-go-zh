  \ Watersports Price 275\nName: Lifejacket Category: Watersports Price 48.95\nName:\
  \ Soccer Ball Category: Soccer Price 19.5\n```\n\n## 定义和使用方法\n\n方法是可以通过值调用的函数，是表达对特定类型进行操作的函数的便捷方式。理解方法如何工作的最佳方式是从常规函数开始，如清单\
  \ 11-4 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\nfunc printDetails(product *Product) {\nfmt.Println(\"\
  Name:\", product.name, \"Category:\", product.category,\n\"Price\", product.price)\n\
  }\nfunc main() {\nproducts := []*Product {\n{\"Kayak\", \"Watersports\", 275 },\n\
  {\"Lifejacket\", \"Watersports\", 48.95 },\n{\"Soccer Ball\", \"Soccer\", 19.50},\n\
  }\nfor _, p := range products {\nprintDetails(p)\n}\n}\n清单 11-4\n在 methodsAndInterfaces\
  \ 文件夹的 main.go 文件中定义函数\n```\n\n`printDetails` 函数接收一个指向 `Product` 类型的指针，并用它来输出 `name`、`category`\
  \ 和 `price` 字段的值。本节的关键点是 `printDetails` 函数的调用方式：\n\n```\n...\nprintDetails(p)\n\
  ...\n```\n\n函数名后面跟着用括号括起来的参数。清单 11-5 将相同的功能实现为方法。\n\n```\npackage main\nimport \"\
  fmt\"\ntype Product struct {\nname, category string\nprice float64\n}\nfunc newProduct(name,\
  \ category string, price float64) *Product {\nreturn &Product{ name, category, price\
  \ }\n}\nfunc (product *Product) printDetails() {\nfmt.Println(\"Name:\", product.name,\
  \ \"Category:\", product.category,\n\"Price\", product.price)\n}\nfunc main() {\n\
  products := []*Product {\nnewProduct(\"Kayak\", \"Watersports\", 275),\nnewProduct(\"\
  Lifejacket\", \"Watersports\", 48.95),\nnewProduct(\"Soccer Ball\", \"Soccer\",\
  \ 19.50),\n}\nfor _, p := range products {\np.printDetails()\n}\n}\n清单 11-5\n在 methodsAndInterfaces\
  \ 文件夹的 main.go 文件中定义方法\n```\n\n方法定义为函数，使用相同的 `func` 关键字，但额外添加了一个*接收者*，它表示一个特殊参数，即方法操作的类型，如图\
  \ 11-1 所示。\n\n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig1_HTML.jpg](img/512642_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n方法\n\n此方法的接收者类型是 `*Product`，并命名为 `product`，可以像任何普通函数参数一样在方法内部使用。代码块无需更改，可以将接收者视为常规函数参数：\n\
  \n```\n...\nfunc (product *Product) printDetails() {\nfmt.Println(\"Name:\", product.name,\
  \ \"Category:\", product.category,\n\"Price\", product.price)\n}\n...\n```\n\n方法不同于常规函数之处在于方法的调用方式：\n\
  \n```\n...\np.printDetails()\n...\n```\n\n方法通过一个其类型与接收者匹配的值来调用。在此示例中，我使用由 `for`\
  \ 循环生成的 `*Product` 值来调用切片中每个值的 `printDetails` 方法，产生以下输出：\n\n```\nName: Kayak Category:\
  \ Watersports Price 275\nName: Lifejacket Category: Watersports Price 48.95\nName:\
  \ Soccer Ball Category: Soccer Price 19.5\n```\n\n\n\n### 定义方法参数与返回值\n\n方法可以定义参数和返回值，这与普通函数类似，如代码清单\
  \ 11-6 所示，但额外增加了接收者。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\n\
  name, category string\nprice float64\n}\nfunc newProduct(name, category string,\
  \ price float64) *Product {\nreturn &Product{ name, category, price }\n}\nfunc (product\
  \ *Product) printDetails() {\nfmt.Println(\"Name:\", product.name, \"Category:\"\
  , product.category,\n\"Price\",  product.calcTax(0.2, 100))\n}\nfunc (product *Product)\
  \ calcTax(rate, threshold float64) float64 {\nif (product.price > threshold) {\n\
  return product.price + (product.price * rate)\n}\nreturn product.price;\n}\nfunc\
  \ main() {\nproducts := []*Product {\nnewProduct(\"Kayak\", \"Watersports\", 275),\n\
  newProduct(\"Lifejacket\", \"Watersports\", 48.95),\nnewProduct(\"Soccer Ball\"\
  , \"Soccer\", 19.50),\n}\nfor _, p := range products {\np.printDetails()\n}\n}\n\
  代码清单 11-6\nmethodsAndInterfaces 文件夹中 main.go 文件内的参数与返回值\n```\n\n方法参数定义在方法名之后的圆括号内，其后是返回值类型，如图\
  \ 11-2 所示。\n\n![[external image]](images/512642_1_En_11_Chapter/512642_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n\n包含参数与返回值的方法\n\n`calcTax` 方法定义了 `rate` 和 `threshold` 参数，并返回一个 `float64`\
  \ 类型的值。在该方法的代码块内部，无需特殊处理即可区分接收者和普通参数。\n\n调用方法时，其参数传递方式与普通函数相同，如下所示：\n\n```\n...\n\
  product.calcTax(0.2, 100)\n...\n```\n\n在此例中，`printDetails` 方法调用了 `calcTax` 方法，并产生以下输出：\n\
  \n```\nName: Kayak Category: Watersports Price 330\nName: Lifejacket Category: Watersports\
  \ Price 48.95\nName: Soccer Ball Category: Soccer Price 19.5\n```\n\n### 理解方法重载\n\
  \nGo 不支持方法重载，即不允许定义多个名称相同但参数不同的方法。相反，每个方法名称与接收者类型的组合必须是唯一的，无论定义的其他参数是什么。在代码清单 11-7\
  \ 中，我定义了名称相同但接收者类型不同的方法。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct\
  \ {\nname, category string\nprice float64\n}\ntype Supplier struct {\nname, city\
  \ string\n}\nfunc newProduct(name, category string, price float64) *Product {\n\
  return &Product{ name, category, price }\n}\nfunc (product *Product) printDetails()\
  \ {\nfmt.Println(\"Name:\", product.name, \"Category:\", product.category,\n\"Price\"\
  ,  product.calcTax(0.2, 100))\n}\nfunc (product *Product) calcTax(rate, threshold\
  \ float64) float64 {\nif (product.price > threshold) {\nreturn product.price + (product.price\
  \ * rate)\n}\nreturn product.price;\n}\nfunc (supplier *Supplier) printDetails()\
  \ {\nfmt.Println(\"Supplier:\", supplier.name, \"City:\", supplier.city)\n}\nfunc\
  \ main() {\nproducts := []*Product {\nnewProduct(\"Kayak\", \"Watersports\", 275),\n\
  newProduct(\"Lifejacket\", \"Watersports\", 48.95),\nnewProduct(\"Soccer Ball\"\
  , \"Soccer\", 19.50),\n}\nfor _, p := range products {\np.printDetails()\n}\nsuppliers\
  \ := []*Supplier {\n{ \"Acme Co\", \"New York City\"},\n{ \"BoatCo\", \"Chicago\"\
  },\n}\nfor _,s := range suppliers {\ns.printDetails()\n}\n}\n代码清单 11-7\nmethodsAndInterfaces\
  \ 文件夹中 main.go 文件内名称相同的方法\n```\n\n`*Product` 和 `*Supplier` 类型都有 `printDetails` 方法，这是允许的，因为每个方法都代表了唯一的名称与接收者类型组合。代码清单\
  \ 11-7 中的代码产生以下输出：\n\n```\nName: Kayak Category: Watersports Price 330\nName: Lifejacket\
  \ Category: Watersports Price 48.95\nName: Soccer Ball Category: Soccer Price 19.5\n\
  Supplier: Acme Co City: New York City\nSupplier: BoatCo City: Chicago\n```\n\n如果我尝试定义一个与现有名称/接收者组合重复的方法，编译器会报错，无论剩余的方法参数是否不同，如代码清单\
  \ 11-8 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\ntype Supplier struct {\nname, city string\n}\n// ...为简洁起见省略了其他方法...\n\
  func (supplier *Supplier) printDetails() {\nfmt.Println(\"Supplier:\", supplier.name,\
  \ \"City:\", supplier.city)\n}\nfunc (supplier *Supplier) printDetails(showName\
  \ bool) {\nif (showName) {\nfmt.Println(\"Supplier:\", supplier.name, \"City:\"\
  , supplier.city)\n} else {\nfmt.Println(\"Supplier:\", supplier.name)\n}\n}\nfunc\
  \ main() {\nproducts := []*Product {\nnewProduct(\"Kayak\", \"Watersports\", 275),\n\
  newProduct(\"Lifejacket\", \"Watersports\", 48.95),\nnewProduct(\"Soccer Ball\"\
  , \"Soccer\", 19.50),\n}\nfor _, p := range products {\np.printDetails()\n}\nsuppliers\
  \ := []*Supplier {\n{ \"Acme Co\", \"New York City\"},\n{ \"BoatCo\", \"Chicago\"\
  },\n}\nfor _,s := range suppliers {\ns.printDetails()\n}\n}\n代码清单 11-8\nmethodsAndInterfaces\
  \ 文件夹中 main.go 文件内定义另一个方法\n```\n\n新的方法会产生以下编译器错误：\n\n```\n### command-line-arguments\n\
  .\\main.go:34:6: method redeclared: Supplier.printDetails\nmethod(*Supplier) func()\n\
  method(*Supplier) func(bool)\n.\\main.go:34:27: (*Supplier).printDetails redeclared\
  \ in this block\nprevious declaration at .\\main.go:30:6\n```\n\n\n\n### 理解指针接收者与值接收者\n\
  \n接收者为指针类型的方法也可以通过底层类型的普通值来调用，这意味着，例如，一个方法类型为 `*Product` 时，可以与 `Product` 值一起使用，如代码清单\
  \ 11-9 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\n// type Supplier struct {\n//     name, city string\n\
  // }\n// func newProduct(name, category string, price float64) *Product {\n//  \
  \   return &Product{ name, category, price }\n// }\nfunc (product *Product) printDetails()\
  \ {\nfmt.Println(\"Name:\", product.name, \"Category:\", product.category,\n\"Price\"\
  ,  product.calcTax(0.2, 100))\n}\nfunc (product *Product) calcTax(rate, threshold\
  \ float64) float64 {\nif (product.price > threshold) {\nreturn product.price + (product.price\
  \ * rate)\n}\nreturn product.price;\n}\n// func (supplier *Supplier) printDetails()\
  \ {\n//     fmt.Println(\"Supplier:\", supplier.name, \"City:\", supplier.city)\n\
  // }\nfunc main() {\nkayak := Product { \"Kayak\", \"Watersports\", 275 }\nkayak.printDetails()\n\
  }\n代码清单 11-9  在 methodsAndInterfaces 文件夹的 main.go 文件中调用方法\n```\n\n`kayak` 变量被赋值为一个\
  \ `Product` 值，但用于调用接收者为 `*Product` 的 `printDetails` 方法。Go 会自动处理这种不匹配并无缝调用该方法。反之亦然，即接收者为值类型的方法也可以通过指针来调用，如代码清单\
  \ 11-10 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nname, category\
  \ string\nprice float64\n}\nfunc (product Product) printDetails() {\nfmt.Println(\"\
  Name:\", product.name, \"Category:\", product.category,\n\"Price\",  product.calcTax(0.2,\
  \ 100))\n}\nfunc (product *Product) calcTax(rate, threshold float64) float64 {\n\
  if (product.price > threshold) {\nreturn product.price + (product.price * rate)\n\
  }\nreturn product.price;\n}\nfunc main() {\nkayak := &Product { \"Kayak\", \"Watersports\"\
  , 275 }\nkayak.printDetails()\n}\n代码清单 11-10  在 methodsAndInterfaces 文件夹的 main.go\
  \ 文件中调用方法\n```\n\n这一特性意味着，你可以根据期望的方法行为来编写方法，使用指针可以避免值拷贝，或者允许方法修改接收者。\n\n**注意**\n\
  \n此特性带来的一个影响是，在方法重载方面，值类型和指针类型被视为相同类型，这意味着一个名为 `printDetails`、接收者类型为 `Product` 的方法，将与另一个名为\
  \ `printDetails`、接收者类型为 `*Product` 的方法发生冲突。\n\n代码清单 11-9 和 11-10 均会产生以下输出：\n\n```\n\
  Name: Kayak Category: Watersports Price 330\n```\n\n#### 通过接收者类型调用方法\n\nGo 方法的一个不常见之处是，它们可以通过接收者类型来调用，因此，具有以下签名的方法：\n\
  \n```\n...\nfunc (product Product) printDetails() {\n...\n```\n\n可以像这样调用：\n\n```\n\
  ...\nProduct.printDetails(Product{ \"Kayak\", \"Watersports\", 275 })\n...\n```\n\
  \n在这种调用方式中，方法接收者类型（此例中为 `Product`）的名称后跟一个句点和方法名。参数就是用作接收者值的 `Product` 值。代码清单 11-9\
  \ 和 11-10 中展示的自动指针/值映射特性，在通过接收者类型调用方法时不适用，这意味着，具有指针类型签名的方法，例如：\n\n```\n...\nfunc\
  \ (product *Product) printDetails() {\n...\n```\n\n必须通过指针类型来调用，并且传入一个指针参数，如下所示：\n\
  \n```\n...\n(*Product).printDetails(&Product{ \"Kayak\", \"Watersports\", 275 })\n\
  ...\n```\n\n不要将此特性与 C# 或 Java 等语言提供的静态方法相混淆。Go 中没有静态方法，通过类型调用方法与通过值或指针调用方法的效果相同。\n\
  \n### 为类型别名定义方法\n\n可以为当前包中定义的任何类型定义方法。我将在第 12 章解释如何向项目中添加包，但就本章而言，只有一个包含单个包的代码文件，这意味着方法只能为\
  \ `main.go` 文件中定义的类型定义。\n\n但这并不意味着方法仅限于结构体，因为 `type` 关键字可用于为任何类型创建别名，并且可以为该别名定义方法。（我在第\
  \ 9 章中介绍了 `type` 关键字，作为简化处理函数类型的一种方式。）代码清单 11-11 创建了一个别名及其方法。\n\n```\npackage main\n\
  import \"fmt\"\ntype Product struct {\nname, category string\nprice float64\n}\n\
  type ProductList []Product\nfunc (products *ProductList) calcCategoryTotals() map[string]float64\
  \ {\ntotals := make(map[string]float64)\nfor _, p := range *products {\ntotals[p.category]\
  \ = totals[p.category] + p.price\n}\nreturn totals\n}\nfunc main() {\nproducts :=\
  \ ProductList {\n{ \"Kayak\", \"Watersports\", 275 },\n{ \"Lifejacket\", \"Watersports\"\
  , 48.95 },\n{\"Soccer Ball\", \"Soccer\", 19.50 },\n}\nfor category, total := range\
  \ products.calcCategoryTotals() {\nfmt.Println(\"Category: \", category, \"Total:\"\
  , total)\n}\n}\n代码清单 11-11  在 methodsAndInterfaces 文件夹的 main.go 文件中为类型别名定义方法\n```\n\
  \n`type` 关键字用于为 `[]Product` 类型创建别名，别名为 `ProductList`。该类型可用于定义方法，既可以使用值类型接收者，也可以像本例一样使用指针接收者。\n\
  \n你并不总能以调用某个别名上定义的方法所需的类型来接收数据，例如在处理函数结果时。在这些情况下，你可以执行类型转换，如代码清单 11-12 所示。\n\n```\n\
  package main\nimport \"fmt\"\ntype Product struct {\nname, category string\nprice\
  \ float64\n}\ntype ProductList []Product\nfunc (products *ProductList) calcCategoryTotals()\
  \ map[string]float64 {\ntotals := make(map[string]float64)\nfor _, p := range *products\
  \ {\ntotals[p.category] = totals[p.category] + p.price\n}\nreturn totals\n}\nfunc\
  \ getProducts() []Product {\nreturn []Product {\n{ \"Kayak\", \"Watersports\", 275\
  \ },\n{ \"Lifejacket\", \"Watersports\", 48.95 },\n{\"Soccer Ball\", \"Soccer\"\
  , 19.50 },\n}\n}\nfunc main() {\nproducts := ProductList(getProducts())\nfor category,\
  \ total := range products.calcCategoryTotals() {\nfmt.Println(\"Category: \", category,\
  \ \"Total:\", total)\n}\n}\n代码清单 11-12  在 methodsAndInterfaces 文件夹的 main.go 文件中执行类型转换\n\
  ```\n\n`getProducts` 函数返回的结果类型为 `[]Product`，通过显式转换将其转换为 `ProductList`，从而可以使用该别名上定义的方法。代码清单\
  \ 11-11 和 11-12 中的代码会产生以下输出：\n\n```\nCategory:  Watersports Total: 323.95\nCategory:\
  \  Soccer Total: 19.5\n```\n\n\n\n## 将类型和方法放在不同文件中\n\n随着项目变得越来越复杂，定义自定义类型及其方法所需的代码量会迅速增加，导致单个代码文件难以管理。Go\
  \ 项目可以组织成多个文件，在构建项目时由编译器将这些文件合并。\n\n下一节的示例太长，无法在一个代码清单中完整展示，否则本章剩余部分将充斥着大量未发生变化的长代码段。因此，我将引入多个代码文件。\n\
  \n这一特性是 Go 语言对*包（packages）*支持的一部分。*包*提供了在项目中组织代码文件的不同方式，我将在第 12 章中介绍。本章中，我将使用包的最简单方面，即在项目文件夹中使用多个代码文件。\n\
  \n向 `methodsAndInterfaces` 文件夹中添加一个名为 `product.go` 的文件，其内容如代码清单 11-13 所示。\n\n```go\n\
  package main\ntype Product struct {\nname, category string\nprice float64\n}\n```\n\
  \n向 `methodsAndInterfaces` 文件夹中添加一个名为 `service.go` 的文件，并用它来定义代码清单 11-14 中所示的类型。\n\
  \n```go\npackage main\ntype Service struct {\ndescription string\ndurationMonths\
  \ int\nmonthlyFee float64\n}\n```\n\n最后，用代码清单 11-15 所示的内容替换 `main.go` 文件的内容。\n\n\
  ```go\npackage main\nimport \"fmt\"\nfunc main() {\nkayak := Product { \"Kayak\"\
  , \"Watersports\", 275 }\ninsurance := Service {\"Boat Cover\", 12, 89.50 }\nfmt.Println(\"\
  Product:\", kayak.name, \"Price:\", kayak.price)\nfmt.Println(\"Service:\", insurance.description,\
  \ \"Price:\",\ninsurance.monthlyFee * float64(insurance.durationMonths))\n}\n```\n\
  \n这段代码使用在其他文件中定义的结构体类型来创建值。编译并执行该项目，将产生以下输出：\n\n```text\nProduct: Kayak Price: 275\n\
  Service: Boat Cover Price: 1074\n```\n\n## 定义和使用接口\n\n很容易设想一个场景，即上一节中定义的 `Product`\
  \ 和 `Service` 类型被一起使用。例如，一个个人账户包可能需要向用户呈现一份支出列表，其中一些支出用 `Product` 值表示，另一些用 `Service`\
  \ 值表示。尽管这些类型有共同的目的，但 Go 的类型规则阻止它们一起使用，例如创建一个包含两种类型值的切片。\n\n### 定义接口\n\n这个问题通过*接口（interfaces）*来解决。接口描述了一组方法，而不指定这些方法的实现。如果一个类型实现了接口定义的所有方法，那么该类型的值就可以在任何允许使用该接口的地方使用。第一步是定义一个接口，如代码清单\
  \ 11-16 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\nfunc main() {\nkayak := Product { \"\
  Kayak\", \"Watersports\", 275 }\ninsurance := Service {\"Boat Cover\", 12, 89.50\
  \ }\nfmt.Println(\"Product:\", kayak.name, \"Price:\", kayak.price)\nfmt.Println(\"\
  Service:\", insurance.description, \"Price:\",\ninsurance.monthlyFee * float64(insurance.durationMonths))\n\
  }\n```\n\n接口使用 `type` 关键字、名称、`interface` 关键字以及由花括号括起来的方法签名主体来定义，如图 11-3 所示。\n\n\
  ![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig3_HTML.jpg](img/512642_1_En_11_Fig3_HTML.jpg)\n\
  \n这个接口被命名为 `Expense`，接口体包含一个方法签名。方法签名由名称、参数和结果类型组成，如图 11-4 所示。\n\n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig4_HTML.jpg](img/512642_1_En_11_Fig4_HTML.jpg)\n\
  \n`Expense` 接口描述了两个方法。第一个方法是 `getName`，不接受任何参数并返回一个字符串。第二个方法名为 `getCost`，接受一个 `bool`\
  \ 参数并返回一个 `float64` 结果。\n\n### 实现接口\n\n要实现一个接口，必须为结构体类型定义接口指定的所有方法，如代码清单 11-17 所示。\n\
  \n```go\npackage main\ntype Product struct {\nname, category string\nprice float64\n\
  }\nfunc (p Product) getName() string {\nreturn p.name\n}\nfunc (p Product) getCost(_\
  \ bool) float64 {\nreturn p.price\n}\n```\n\n大多数语言需要用关键字来表明一个类型实现了接口，但 Go 仅要求定义接口指定的所有方法。Go\
  \ 允许使用不同的参数和结果名称，但方法必须具有相同的名称、参数类型和结果类型。代码清单 11-18 为 `Service` 类型定义了实现接口所需的方法。\n\
  \n```go\npackage main\ntype Service struct {\ndescription string\ndurationMonths\
  \ int\nmonthlyFee float64\n}\nfunc (s Service) getName() string {\nreturn s.description\n\
  }\nfunc (s Service) getCost(recur bool) float64 {\nif (recur) {\nreturn s.monthlyFee\
  \ * float64(s.durationMonths)\n}\nreturn s.monthlyFee\n}\n```\n\n接口只描述方法，而不描述字段。因此，接口通常指定返回存储在结构体字段中的值的方法，例如代码清单\
  \ 11-17 和代码清单 11-18 中的 `getName` 方法。\n\n\n\n### 使用接口\n\n一旦实现了接口，你就可以通过接口类型来引用值，如代码清单\
  \ 11-19 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\nfunc main() {\nexpenses := []Expense\
  \ {\nProduct { \"Kayak\", \"Watersports\", 275 },\nService {\"Boat Cover\", 12,\
  \ 89.50 },\n}\nfor _, expense := range expenses {\nfmt.Println(\"Expense:\", expense.getName(),\
  \ \"Cost:\", expense.getCost(true))\n}\n}\n```\n\n在此示例中，我定义了一个 `Expense` 切片，并利用字面量语法为其填充了\
  \ `Product` 和 `Service` 值。该切片用于一个 `for` 循环，循环中对每个值调用了 `getName` 和 `getCost` 方法。\n\
  \n类型为接口的变量拥有两种类型：*静态类型* 和 *动态类型*。静态类型就是接口类型。动态类型则是赋给该变量的、实现了该接口的值的类型，例如本例中的 `Product`\
  \ 或 `Service`。静态类型从不改变——例如，一个 `Expense` 变量的静态类型始终是 `Expense`——但动态类型可以通过赋给一个实现了该接口的不同类型的新值来改变。\n\
  \n`for` 循环只处理静态类型——`Expense`——并且不知道（也无需知道）这些值的动态类型。通过使用接口，我能够将不同的动态类型组合在一起，并使用静态接口类型指定的通用方法。编译并执行该项目，你将看到以下输出：\n\
  \n```\nExpense: Kayak Cost: 275\nExpense: Boat Cover Cost: 1074\n```\n\n#### 在函数中使用接口\n\
  \n接口类型可用于变量、函数参数和函数返回值，如代码清单 11-20 所示。\n\n> **注意：** 不能将接口作为接收者来定义方法。与接口关联的唯一方法就是它自身指定的那些。\n\
  \n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName() string\n\
  getCost(annual bool) float64\n}\nfunc calcTotal(expenses []Expense) (total float64)\
  \ {\nfor _, item := range expenses {\ntotal += item.getCost(true)\n}\nreturn\n}\n\
  func main() {\nexpenses := []Expense {\nProduct { \"Kayak\", \"Watersports\", 275\
  \ },\nService {\"Boat Cover\", 12, 89.50 },\n}\nfor _, expense := range expenses\
  \ {\nfmt.Println(\"Expense:\", expense.getName(), \"Cost:\", expense.getCost(true))\n\
  }\nfmt.Println(\"Total:\", calcTotal(expenses))\n}\n```\n\n`calcTotal` 函数接收一个包含\
  \ `Expense` 值的切片，并通过 `for` 循环对其进行处理，从而得出一个 `float64` 类型的总额。编译并执行该项目，将产生以下输出：\n\n\
  ```\nExpense: Kayak Cost: 275\nExpense: Boat Cover Cost: 1074\nTotal: 1349\n```\n\
  \n#### 为结构体字段使用接口\n\n接口类型可用于结构体字段，这意味着字段可以被赋值为任何实现了该接口所定义方法的类型的值，如代码清单 11-21 所示。\n\
  \n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName() string\n\
  getCost(annual bool) float64\n}\nfunc calcTotal(expenses []Expense) (total float64)\
  \ {\nfor _, item := range expenses {\ntotal += item.getCost(true)\n}\nreturn\n}\n\
  type Account struct {\naccountNumber int\nexpenses []Expense\n}\nfunc main() {\n\
  account := Account {\naccountNumber: 12345,\nexpenses: []Expense {\nProduct { \"\
  Kayak\", \"Watersports\", 275 },\nService {\"Boat Cover\", 12, 89.50 },\n},\n}\n\
  for _, expense := range account.expenses {\nfmt.Println(\"Expense:\", expense.getName(),\
  \ \"Cost:\", expense.getCost(true))\n}\nfmt.Println(\"Total:\", calcTotal(account.expenses))\n\
  }\n```\n\n`Account` 结构体有一个 `expenses` 字段，其类型是 `Expense` 值的切片，其用法与其他任何字段无异。编译并执行该项目，将产生以下输出：\n\
  \n```\nExpense: Kayak Cost: 275\nExpense: Boat Cover Cost: 1074\nTotal: 1349\n```\n\
  \n### 理解指针方法接收者的影响\n\n`Product` 和 `Service` 类型定义的方法都拥有值接收者，这意味着这些方法将在 `Product`\
  \ 或 `Service` 值的副本上被调用。这可能会造成混淆，因此代码清单 11-22 提供了一个简单的示例。\n\n```go\npackage main\n\
  import \"fmt\"\ntype Expense interface {\ngetName() string\ngetCost(annual bool)\
  \ float64\n}\nfunc main() {\nproduct := Product { \"Kayak\", \"Watersports\", 275\
  \ }\nvar expense Expense = product\nproduct.price = 100\nfmt.Println(\"Product field\
  \ value:\", product.price)\nfmt.Println(\"Expense method result:\", expense.getCost(false))\n\
  }\n```\n\n此示例创建了一个 `Product` 结构体值，将其赋给一个 `Expense` 变量，然后修改了该结构体值的 `price` 字段，并分别直接通过字段和通过接口方法输出了该字段值。编译并执行代码，你将得到以下结果：\n\
  \n```\nProduct field value: 100\nExpense method result: 275\n```\n\n`Product` 值在赋给\
  \ `Expense` 变量时被复制了，这意味着对 `price` 字段的修改不会影响 `getCost` 方法的结果。\n\n在向接口变量赋值时，可以使用指向结构体值的指针，如代码清单\
  \ 11-23 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\nfunc main() {\nproduct := Product { \"\
  Kayak\", \"Watersports\", 275 }\nvar expense Expense = &product\nproduct.price =\
  \ 100\nfmt.Println(\"Product field value:\", product.price)\nfmt.Println(\"Expense\
  \ method result:\", expense.getCost(false))\n}\n```\n\n使用指针意味着将对 `Product` 值的引用赋给了\
  \ `Expense` 变量，但这并不会改变接口变量的类型，其仍然是 `Expense`。编译并执行该项目，你将在输出中看到这种引用的效果——对 `price`\
  \ 字段的修改会反映在 `getCost` 方法的结果中：\n\n```\nProduct field value: 100\nExpense method result:\
  \ 100\n```\n\n这很有用，因为这意味着你可以选择赋给接口变量的值将如何被使用。但它也可能反直觉，因为无论变量被赋的是 `Product` 还是 `*Product`\
  \ 值，其类型始终是 `Expense`。\n\n你可以在实现接口方法时指定指针接收者，从而强制使用引用，如代码清单 11-24 所示。\n\n```go\n\
  package main\ntype Product struct {\nname, category string\nprice float64\n}\nfunc\
  \ (p *Product) getName() string {\nreturn p.name\n}\nfunc (p *Product) getCost(_\
  \ bool) float64 {\nreturn p.price\n}\n```\n\n这是一个小改动，但意味着 `Product` 类型不再实现 `Expense`\
  \ 接口，因为所需的方法不再被定义。相反，是 `*Product` 类型实现了该接口，这意味着指向 `Product` 值的指针可以被当作 `Expense`\
  \ 值处理，但普通的 `Product` 值不行。编译并执行该项目，你将得到与代码清单 11-23 相同的输出：\n\n```\nProduct field value:\
  \ 100\nExpense method result: 100\n```\n\n代码清单 11-25 尝试将一个 `Product` 值赋给一个 `Expense`\
  \ 变量。\n\n\n\n```\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\nfunc main() {\nproduct := Product { \"\
  Kayak\", \"Watersports\", 275 }\nvar expense Expense = product\nproduct.price =\
  \ 100\nfmt.Println(\"Product field value:\", product.price)\nfmt.Println(\"Expense\
  \ method result:\", expense.getCost(false))\n}\n```\n清单 11-25 在 `methodsAndInterfaces`\
  \ 文件夹的 `main.go` 文件中赋值\n\n编译该项目，您将收到以下错误，提示需要使用指针接收器：\n\n```\n.\\main.go:14:9: cannot\
  \ use product (type Product) as type Expense in assignment:\nProduct does not implement\
  \ Expense (getCost method has pointer receiver)\n```\n\n## 比较接口值\n\n接口值可以使用 Go 比较运算符进行比较，如清单\
  \ 11-26 所示。如果两个接口值具有相同的动态类型且所有字段都相等，则这两个接口值相等。\n\n```\npackage main\nimport \"fmt\"\
  \ntype Expense interface {\ngetName() string\ngetCost(annual bool) float64\n}\n\
  func main() {\nvar e1 Expense = &Product { name: \"Kayak\" }\nvar e2 Expense = &Product\
  \ { name: \"Kayak\" }\nvar e3 Expense = Service { description: \"Boat Cover\" }\n\
  var e4 Expense = Service { description: \"Boat Cover\" }\nfmt.Println(\"e1 == e2\"\
  , e1 == e2)\nfmt.Println(\"e3 == e4\", e3 == e4)\n}\n```\n清单 11-26 在 `methodsAndInterfaces`\
  \ 文件夹的 `main.go` 文件中比较接口值\n\n比较接口值时必须小心，并且不可避免地需要了解一些动态类型的知识。\n\n前两个 `Expense` 值不相等。这是因为这些值的动态类型是指针类型，而指针只有在指向同一内存位置时才相等。后两个\
  \ `Expense` 值相等，因为它们是具有相同字段值的简单结构体值。编译并执行该项目以确认这些值的相等性：\n\n```\ne1 == e2 false\n\
  e3 == e4 true\n```\n\n如果动态类型不可比较，接口相等性检查也可能导致运行时错误。清单 11-27 向 `Service` 结构体添加了一个字段。\n\
  \n```\npackage main\ntype Service struct {\ndescription string\ndurationMonths int\n\
  monthlyFee float64\nfeatures []string\n}\nfunc (s Service) getName() string {\n\
  return s.description\n}\nfunc (s Service) getCost(recur bool) float64 {\nif (recur)\
  \ {\nreturn s.monthlyFee * float64(s.durationMonths)\n}\nreturn s.monthlyFee\n}\n\
  ```\n清单 11-27 在 `methodsAndServices` 文件夹的 `service.go` 文件中添加字段\n\n正如第 7 章所述，切片是不可比较的。编译并执行该项目，您将看到新字段的效果：\n\
  \n```\npanic: runtime error: comparing uncomparable type main.Service\ngoroutine\
  \ 1 [running]:\nmain.main()\nC:/main.go:20 +0x1c5\nexit status 2\n```\n\n## 执行类型断言\n\
  \n接口可能很有用，但也可能带来问题，能够直接访问动态类型通常很有用，这被称为*类型收窄*，即从不太精确的类型过渡到更精确的类型的过程。\n\n*类型断言*用于访问接口值的动态类型，如清单\
  \ 11-28 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\nfunc main() {\nexpenses := []Expense\
  \ {\nService {\"Boat Cover\", 12, 89.50, []string{} },\nService {\"Paddle Protect\"\
  , 12, 8, []string{} },\n}\nfor _, expense := range expenses {\ns := expense.(Service)\n\
  fmt.Println(\"Service:\", s.description, \"Price:\",\ns.monthlyFee * float64(s.durationMonths))\n\
  }\n}\n```\n清单 11-28 在 `methodsAndInterfaces` 文件夹的 `main.go` 文件中使用类型断言\n\n类型断言的执行方式是在值后面加上一个句点，然后以括号形式指定目标类型，如图\
  \ 11-5 所示。\n\n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig5_HTML.jpg](img/512642_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 类型断言\n\n在清单 11-28 中，我使用类型断言从 `Expense` 接口类型的切片中访问动态的 `Service` 值。一旦获得了可以操作的\
  \ `Service` 值，就可以使用为 `Service` 类型定义的所有字段和方法，而不仅仅是 `Expense` 接口定义的方法。\n\n### 类型断言与类型转换\n\
  \n不要将类型断言（如图 11-6 所示）与第 5 章描述的类型转换语法混淆。类型断言只能应用于接口，用于告知编译器某个接口值具有特定的动态类型。类型转换只能应用于特定类型（而非接口），并且仅在这些类型的结构兼容时才能使用，例如在具有相同字段的结构体类型之间进行转换。\n\
  \n编译并执行清单 11-28 中的代码，将产生以下输出：\n\n```\nService: Boat Cover Price: 1074\nService:\
  \ Paddle Protect Price: 96\n```\n\n### 执行类型断言前进行测试\n\n使用类型断言时，编译器相信程序员比它更了解代码中的动态类型，例如，相信一个\
  \ `Expense` 切片只包含 `Supplier` 值。为了了解情况并非如此时会发生什么，清单 11-29 向 `Expense` 切片中添加了一个 `*Product`\
  \ 值。\n\n```\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName() string\n\
  getCost(annual bool) float64\n}\nfunc main() {\nexpenses := []Expense {\nService\
  \ {\"Boat Cover\", 12, 89.50, []string{} },\nService {\"Paddle Protect\", 12, 8,\
  \ []string{} },\n&Product { \"Kayak\", \"Watersports\", 275 },\n}\nfor _, expense\
  \ := range expenses {\ns := expense.(Service)\nfmt.Println(\"Service:\", s.description,\
  \ \"Price:\",\ns.monthlyFee * float64(s.durationMonths))\n}\n}\n```\n清单 11-29 在\
  \ `methodsAndInterfaces` 文件夹的 `main.go` 文件中混合动态类型\n\n编译并执行该项目；代码执行时您将看到以下错误：\n\n\
  ```\npanic: interface conversion: main.Expense is *main.Product, not main.Service\n\
  ```\n\nGo 运行时尝试执行断言但失败了。为避免此问题，有一种特殊形式的类型断言可以指示断言是否能够执行，如清单 11-30 所示。\n\n```\npackage\
  \ main\nimport \"fmt\"\ntype Expense interface {\ngetName() string\ngetCost(annual\
  \ bool) float64\n}\nfunc main() {\nexpenses := []Expense {\nService {\"Boat Cover\"\
  , 12, 89.50, []string{} },\nService {\"Paddle Protect\", 12, 8, []string{} },\n\
  &Product { \"Kayak\", \"Watersports\", 275 },\n}\nfor _, expense := range expenses\
  \ {\nif s, ok := expense.(Service); ok {\nfmt.Println(\"Service:\", s.description,\
  \ \"Price:\",\ns.monthlyFee * float64(s.durationMonths))\n} else {\nfmt.Println(\"\
  Expense:\", expense.getName(),\n\"Cost:\", expense.getCost(true))\n}\n}\n}\n```\n\
  清单 11-30 在 `methodsAndInterfaces` 文件夹的 `main.go` 文件中测试断言\n\n类型断言可以产生两个结果，如图 11-6\
  \ 所示。第一个结果被赋值为动态类型，第二个结果是一个 `bool` 值，指示断言是否能够执行。\n\n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig6_HTML.jpg](img/512642_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6 类型断言的两种结果\n\n`bool` 值可以与 `if` 语句配合使用，以便为特定的动态类型执行语句。编译并执行该项目；您将看到以下输出：\n\
  \n```\nService: Boat Cover Price: 1074\nService: Paddle Protect Price: 96\nExpense:\
  \ Kayak Cost: 275\n```\n\n\n\n### 启用动态类型切换\n\nGo 语言的 `switch` 语句可用于访问动态类型，如清单 11-31\
  \ 所示，这可以成为使用 `if` 语句进行类型断言的一种更简洁的方式。\n\n```\npackage main\nimport \"fmt\"\ntype\
  \ Expense interface {\ngetName() string\ngetCost(annual bool) float64\n}\nfunc main()\
  \ {\nexpenses := []Expense {\nService {\"Boat Cover\", 12, 89.50, []string{} },\n\
  Service {\"Paddle Protect\", 12, 8, []string{} },\n&Product { \"Kayak\", \"Watersports\"\
  , 275 },\n}\nfor _, expense := range expenses {\nswitch value := expense.(type)\
  \ {\ncase Service:\nfmt.Println(\"Service:\", value.description, \"Price:\",\nvalue.monthlyFee\
  \ * float64(value.durationMonths))\ncase *Product:\nfmt.Println(\"Product:\", value.name,\
  \ \"Price:\", value.price)\ndefault:\nfmt.Println(\"Expense:\", expense.getName(),\n\
  \"Cost:\", expense.getCost(true))\n}\n}\n}\n清单 11-31\n在 methodsAndInterfaces 文件夹的\
  \ main.go 文件中进行类型切换\n```\n\n`switch` 语句使用一种特殊的类型断言，其中使用了 `type` 关键字，如图 11-7 所示。\n\
  \n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig7_HTML.jpg](img/512642_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\n\n类型切换\n\n每个 `case` 语句指定一个类型和一段代码块，当 `switch` 语句评估的值具有指定类型时，将执行该代码块。Go\
  \ 编译器足够智能，能够理解 `switch` 语句评估的值之间的关系，并且不允许为不匹配的类型编写 `case` 语句。例如，如果存在针对 `Product`\
  \ 类型的 `case` 语句，编译器会报错，因为 `switch` 语句正在评估 `Expense` 类型的值，而 `Product` 类型不具备实现该接口所需的方法（因为\
  \ `product.go` 文件中的方法使用了指针接收器，见清单 11-24）。\n\n在 `case` 语句内部，可以将结果视为指定的类型，这意味着，例如，在指定了\
  \ `Supplier` 类型的 `case` 语句中，可以使用 `Supplier` 类型定义的所有字段和方法。\n\n可以使用 `default` 语句来指定一个代码块，当没有任何\
  \ `case` 语句匹配时，将执行该代码块。编译并执行该项目，您将看到以下输出：\n\n```\nService: Boat Cover Price: 1074\n\
  Service: Paddle Protect Price: 96\nProduct: Kayak Price: 275\n```\n\n## 使用空接口\n\n\
  Go 语言允许使用空接口——即一个未定义任何方法的接口——来表示任何类型，这可以成为将没有共同特征的不同类型分组的一种有用方式，如清单 11-32 所示。\n\n\
  ```\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName() string\n\
  getCost(annual bool) float64\n}\ntype Person struct {\nname, city string\n}\nfunc\
  \ main() {\nvar expense Expense = &Product { \"Kayak\", \"Watersports\", 275 }\n\
  data := []interface{} {\nexpense,\nProduct { \"Lifejacket\", \"Watersports\", 48.95\
  \ },\nService {\"Boat Cover\", 12, 89.50, []string{} },\nPerson { \"Alice\", \"\
  London\"},\n&Person { \"Bob\", \"New York\"},\n\"This is a string\",\n100,\ntrue,\n\
  }\nfor _, item := range data {\nswitch value := item.(type) {\ncase Product:\nfmt.Println(\"\
  Product:\", value.name, \"Price:\", value.price)\ncase *Product:\nfmt.Println(\"\
  Product Pointer:\", value.name, \"Price:\", value.price)\ncase Service:\nfmt.Println(\"\
  Service:\", value.description, \"Price:\",\nvalue.monthlyFee * float64(value.durationMonths))\n\
  case Person:\nfmt.Println(\"Person:\", value.name, \"City:\", value.city)\ncase\
  \ *Person:\nfmt.Println(\"Person Pointer:\", value.name, \"City:\", value.city)\n\
  case string, bool, int:\nfmt.Println(\"Built-in type:\", value)\ndefault:\nfmt.Println(\"\
  Default:\", value)\n}\n}\n}\n清单 11-32\n在 methodsAndInterfaces 文件夹的 main.go 文件中使用空接口\n\
  ```\n\n空接口以字面量语法使用，通过 `interface` 关键字和空花括号定义，如图 11-8 所示。\n\n![../images/512642_1_En_11_Chapter/512642_1_En_11_Fig8_HTML.jpg](img/512642_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n\n空接口\n\n空接口代表所有类型，包括内置类型以及已定义的任何结构体和接口。在清单中，我定义了一个空的数组切片，其中混合了 `Product`、`*Product`、`Service`、`Person`、`*Person`、`string`、`int`\
  \ 和 `bool` 类型的值。该切片由 `for` 循环处理，循环中使用 `switch` 语句将每个值缩小到特定类型。编译并执行该项目，将产生以下输出：\n\
  \n```\nProduct Pointer: Kayak Price: 275\nProduct: Lifejacket Price: 48.95\nService:\
  \ Boat Cover Price: 1074\nPerson: Alice City: London\nPerson Pointer: Bob City:\
  \ New York\nBuilt-in type: This is a string\nBuilt-in type: 100\nBuilt-in type:\
  \ true\n```\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的注意事项，将给定的英文文本翻译成中文。\n\n\n### 使用空接口作为函数参数\n\
  \n空接口可以用作函数参数的类型，允许使用任何值来调用函数，如代码清单 11-33 所示。\n\n```go\npackage main\nimport \"\
  fmt\"\ntype Expense interface {\ngetName() string\ngetCost(annual bool) float64\n\
  }\ntype Person struct {\nname, city string\n}\nfunc processItem(item interface{})\
  \ {\nswitch value := item.(type) {\ncase Product:\nfmt.Println(\"Product:\", value.name,\
  \ \"Price:\", value.price)\ncase *Product:\nfmt.Println(\"Product Pointer:\", value.name,\
  \ \"Price:\", value.price)\ncase Service:\nfmt.Println(\"Service:\", value.description,\
  \ \"Price:\",\nvalue.monthlyFee * float64(value.durationMonths))\ncase Person:\n\
  fmt.Println(\"Person:\", value.name, \"City:\", value.city)\ncase *Person:\nfmt.Println(\"\
  Person Pointer:\", value.name, \"City:\", value.city)\ncase string, bool, int:\n\
  fmt.Println(\"Built-in type:\", value)\ndefault:\nfmt.Println(\"Default:\", value)\n\
  }\n}\nfunc main() {\nvar expense Expense = &Product { \"Kayak\", \"Watersports\"\
  , 275 }\ndata := []interface{} {\nexpense,\nProduct { \"Lifejacket\", \"Watersports\"\
  , 48.95 },\nService {\"Boat Cover\", 12, 89.50, []string{} },\nPerson { \"Alice\"\
  , \"London\"},\n&Person { \"Bob\", \"New York\"},\n\"This is a string\",\n100,\n\
  true,\n}\nfor _, item := range data {\nprocessItem(item)\n}\n}\n代码清单 11-33\n在 methodsAndInterfaces\
  \ 文件夹的 main.go 文件中使用空接口参数\n```\n\n空接口也可以用于可变参数，这允许使用任意数量的参数来调用函数，每个参数都可以是任何类型，如代码清单\
  \ 11-34 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype Expense interface {\ngetName()\
  \ string\ngetCost(annual bool) float64\n}\ntype Person struct {\nname, city string\n\
  }\nfunc processItems(items ...interface{}) {\nfor _, item := range items {\nswitch\
  \ value := item.(type) {\ncase Product:\nfmt.Println(\"Product:\", value.name, \"\
  Price:\", value.price)\ncase *Product:\nfmt.Println(\"Product Pointer:\", value.name,\
  \ \"Price:\", value.price)\ncase Service:\nfmt.Println(\"Service:\", value.description,\
  \ \"Price:\",\nvalue.monthlyFee * float64(value.durationMonths))\ncase Person:\n\
  fmt.Println(\"Person:\", value.name, \"City:\", value.city)\ncase *Person:\nfmt.Println(\"\
  Person Pointer:\", value.name, \"City:\", value.city)\ncase string, bool, int:\n\
  fmt.Println(\"Built-in type:\", value)\ndefault:\nfmt.Println(\"Default:\", value)\n\
  }\n}\n}\nfunc main() {\nvar expense Expense = &Product { \"Kayak\", \"Watersports\"\
  , 275 }\ndata := []interface{} {\nexpense,\nProduct { \"Lifejacket\", \"Watersports\"\
  , 48.95 },\nService {\"Boat Cover\", 12, 89.50, []string{} },\nPerson { \"Alice\"\
  , \"London\"},\n&Person { \"Bob\", \"New York\"},\n\"This is a string\",\n100,\n\
  true,\n}\nprocessItems(data...)\n}\n代码清单 11-34\n在 methodsAndInterfaces 文件夹的 main.go\
  \ 文件中使用可变参数\n```\n\n编译并执行项目后，代码清单 11-33 和代码清单 11-34 都会产生以下输出：\n\n```\nProduct Pointer:\
  \ Kayak Price: 275\nProduct: Lifejacket Price: 48.95\nService: Boat Cover Price:\
  \ 1074\nPerson: Alice City: London\nPerson Pointer: Bob City: New York\nBuilt-in\
  \ type: This is a string\nBuilt-in type: 100\nBuilt-in type: true\n```\n\n## 本章小结\n\
  \n在本章中，我描述了 Go 对方法的支持，包括为结构体类型定义方法以及定义方法接口集合。我演示了结构体如何实现接口，这允许混合类型一起使用。在下一章中，我将解释\
  \ Go 如何使用包和模块来支持项目结构。\n\n# 创建和使用包\n\n包是 Go 的一项功能，它允许对项目进行结构化，以便将相关功能组合在一起，而不必将所有代码放在单个文件或文件夹中。在本章中，我将描述如何创建和使用包，以及如何使用第三方开发的包。表\
  \ 12-1 将包置于上下文中。\n\n**表 12-1** 将包置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？\
  \ | 包允许对项目进行结构化，以便相关功能可以一起开发。 |\n| 为什么它们有用？ | 包是 Go 实现访问控制的方式，因此功能的实现对使用它的代码是隐藏的。\
  \ |\n| 如何使用它们？ | 通过在文件夹中创建代码文件并使用 `package` 关键字来表示它们属于哪个包来定义包。 |\n| 是否有任何陷阱或限制？\
  \ | 有意义的名称数量有限，包名之间的冲突很常见，需要使用别名来避免错误。 |\n| 有替代方案吗？ | 简单的应用程序可以在不需要包的情况下编写。 |\n\n\
