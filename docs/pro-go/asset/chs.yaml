  \n## 加载和执行模板\n\n使用模板是一个两步过程。首先，加载模板文件并进行处理，以创建 `Template` 值。表 23-3 描述了用于加载模板文件的函数。\n\
  \n**表 23-3：用于加载模板文件的 `html/template` 函数**\n\n| 名称 | 描述 |\n| --- | --- |\n| `ParseFiles(...files)`\
  \ | 此函数加载一个或多个由名称指定的文件。结果是一个可用于生成内容的 `Template` 值，以及一个用于报告加载模板时出现问题的 `error`。 |\n\
  | `ParseGlob(pattern)` | 此函数加载一个或多个由模式选定的文件。结果是一个可用于生成内容的 `Template` 值，以及一个用于报告加载模板时出现问题的\
  \ `error`。 |\n\n如果你能一致地命名你的模板文件，那么你可以使用 `ParseGlob` 函数通过一个简单的模式来加载它们。如果你需要特定的文件——或者文件命名不一致——那么你可以使用\
  \ `ParseFiles` 函数来指定单独的文件。\n\n加载模板文件后，表 23-3 中的函数返回的 `Template` 值用于选择一个模板并执行它以生成内容，使用的就是表\
  \ 23-4 中描述的方法。\n\n**表 23-4：用于选择和执行模板的 Template 方法**\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `Templates()` | 此函数返回一个切片，其中包含指向已加载的 `Template` 值的指针。 |\n| `Lookup(name)`\
  \ | 此函数为指定的已加载模板返回一个 `*Template`。 |\n| `Name()` | 此方法返回 `Template` 的名称。 |\n| `Execute(writer,\
  \ data)` | 此函数使用指定的数据执行 `Template`，并将输出写入指定的 `Writer`。 |\n| `ExecuteTemplate(writer,\
  \ templateName, data)` | 此函数使用指定的名称和数据执行模板，并将输出写入指定的 `Writer`。 |\n\n在代码清单 23-8 中，我加载并执行了一个模板。\n\
  \n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n)\nfunc main() {\nt, err\
  \ := template.ParseFiles(\"templates/template.html\")\nif (err == nil) {\nt.Execute(os.Stdout,\
  \ &Kayak)\n} else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n代码清单 23-8\n在 htmltext\
  \ 文件夹的 main.go 文件中加载并执行模板\n```\n\n我使用了 `ParseFiles` 函数来加载单个模板。`ParseFiles` 函数返回一个\
  \ `Template` 值，我在此值上调用了 `Execute` 方法，将标准输出指定为 `Writer`，并将一个 `Product` 作为模板要处理的数据。\n\
  \n`template.html` 文件的内容被处理，其中包含的动作被执行，并将传递给 `Execute` 方法的数据参数插入到发送给 `Writer` 的输出中。编译并执行该项目，你将看到以下输出：\n\
  \n```\nTemplate Value: {Kayak Watersports 279}\n```\n\n模板输出包含了 `Product` 结构体的字符串表示形式。在本章后面，我将介绍从结构体值生成内容的更有用的方法。\n\
  \n### 加载多个模板\n\n处理多个模板有两种方法。第一种是为每个模板创建一个单独的 `Template` 值，并分别执行它们，如代码清单 23-9 所示。\n\
  \n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n)\nfunc main() {\nt1,\
  \ err1 := template.ParseFiles(\"templates/template.html\")\nt2, err2 := template.ParseFiles(\"\
  templates/extras.html\")\nif (err1 == nil && err2 == nil) {\nt1.Execute(os.Stdout,\
  \ &Kayak)\nos.Stdout.WriteString(\"\\n\")\nt2.Execute(os.Stdout, &Kayak)\n} else\
  \ {\nPrintfln(\"Error: %v %v\", err1.Error(), err2.Error())\n}\n}\n代码清单 23-9\n在\
  \ htmltext 文件夹的 main.go 文件中使用独立的模板\n```\n\n注意，我在执行模板之间写入了一个换行符。模板的输出与文件中的内容完全一致。`templates`\
  \ 目录中的两个文件都不包含换行符，所以我不得不在输出中添加一个来分隔模板生成的内容。编译并执行该项目，你将看到以下输出：\n\n```\nTemplate Value:\
  \ {Kayak Watersports 279}\nExtras Template Value: {Kayak Watersports 279}\n```\n\
  \n使用单独的 `Template` 值是最简单的方法，但另一种方法是将多个文件加载到一个单独的 `Template` 值中，然后指定要执行的模板名称，如代码清单\
  \ 23-10 所示。\n\n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n)\nfunc main()\
  \ {\nallTemplates, err1 := template.ParseFiles(\"templates/template.html\",\n\"\
  templates/extras.html\")\nif (err1 == nil) {\nallTemplates.ExecuteTemplate(os.Stdout,\
  \ \"template.html\", &Kayak)\nos.Stdout.WriteString(\"\\n\")\nallTemplates.ExecuteTemplate(os.Stdout,\
  \ \"extras.html\", &Kayak)\n} else {\nPrintfln(\"Error: %v %v\", err1.Error())\n\
  }\n}\n代码清单 23-10\n在 htmltext 文件夹的 main.go 文件中使用组合模板\n```\n\n当使用 `ParseFiles` 加载多个文件时，结果是一个\
  \ `Template` 值，可以调用其上的 `ExecuteTemplate` 方法来执行指定的模板。文件名被用作模板名称，这意味着本例中的模板被命名为 `template.html`\
  \ 和 `extras.html`。\n\n> **注意：** 你可以在由 `ParseFiles` 或 `ParseGlob` 函数返回的 `Template`\
  \ 上调用 `Execute` 方法，此时将选择并执行第一个加载的模板来生成输出。使用 `ParseGlob` 函数时要小心，因为第一个加载的模板——因此也就是将要执行的模板——可能不是你期望的文件。\n\
  \n你不必为模板文件使用文件扩展名，但我这样做是为了区分本节创建的模板与本章后面创建的文本模板。编译并执行该项目，你将看到以下输出：\n\n```\nTemplate\
  \ Value: {Kayak Watersports 279}\nExtras Template Value: {Kayak Watersports 279}\n\
  ```\n\n加载多个模板允许将内容定义在多个文件中，这样，一个模板可以依赖于另一个模板生成的内容，我将在本章后面的“定义模板块”部分对此进行演示。\n\n\n\
  \n#### 枚举已加载的模板\n\n枚举已加载的模板非常有用，尤其是在使用 `ParseGlob` 函数时，可以确保所有预期的文件都已找到。代码清单 23-11\
  \ 使用了 `Templates` 方法来获取模板列表，并使用 `Name` 方法获取每个模板的名称。\n\n```\npackage main\nimport\
  \ (\n\"html/template\"\n//\"os\"\n)\nfunc main() {\nallTemplates, err := template.ParseGlob(\"\
  templates/*.html\")\nif (err == nil) {\nfor _, t := range allTemplates.Templates()\
  \ {\nPrintfln(\"Template name: %v\", t.Name())\n}\n} else {\nPrintfln(\"Error: %v\
  \ %v\", err.Error())\n}\n}\n代码清单 23-11\n在 htmltext 文件夹的 main.go 文件中枚举已加载的模板\n```\n\
  \n传递给 `ParseGlob` 函数的模式会选中 `templates` 文件夹中所有扩展名为 `html` 的文件。编译并执行该项目，你将看到已加载的模板列表：\n\
  \n```\nTemplate name: extras.html\nTemplate name: template.html\n```\n\n#### 查找特定模板\n\
  \n除了指定名称，另一种方法是使用 `Lookup` 方法来选择模板，这在需要将模板作为参数传递给函数时非常有用，如代码清单 23-12 所示。\n\n```\n\
  package main\nimport (\n\"html/template\"\n\"os\"\n)\nfunc Exec(t *template.Template)\
  \ error {\nreturn t.Execute(os.Stdout, &Kayak)\n}\nfunc main() {\nallTemplates,\
  \ err := template.ParseGlob(\"templates/*.html\")\nif (err == nil) {\nselectedTemplated\
  \ := allTemplates.Lookup(\"template.html\")\nerr = Exec(selectedTemplated)\n}\n\
  if (err != nil) {\nPrintfln(\"Error: %v %v\", err.Error())\n}\n}\n代码清单 23-12\n在\
  \ htmltext 文件夹的 main.go 文件中查找模板\n```\n\n此示例使用 `Lookup` 方法获取从 `template.txt` 文件加载的模板，并将其作为参数传递给\
  \ `Exec` 函数，该函数使用标准输出执行模板。编译并执行该项目，你将看到以下输出：\n\n```\nTemplate Value: {Kayak Watersports\
  \ 279}\n```\n\n### 理解模板动作\n\nGo 模板支持多种动作，这些动作可用于根据传递给 `Execute` 或 `ExecuteTemplate`\
  \ 方法的数据生成内容。为快速参考，表 23-5 总结了模板动作，其中最有用的动作将在后续章节中演示。\n\n**表 23-5** 模板动作\n\n| 动作 |\
  \ 描述 |\n| --- | --- |\n| `{{ value }}` `{{ expr }}` | 该动作将数据值或表达式的结果插入模板。句点 (`.`)\
  \ 用于引用传递给 `Execute` 或 `ExecuteTemplate` 函数的数据值。详细信息请参阅“插入数据值”一节。 |\n| `{{ value.fieldname\
  \ }}` | 该动作插入结构体字段的值。详细信息请参阅“插入数据值”一节。 |\n| `{{ value.method arg }}` | 该动作调用一个方法并将结果插入模板输出。不使用括号，参数之间用空格分隔。详细信息请参阅“插入数据值”一节。\
  \ |\n| `{{ func arg }}` | 该动作调用一个函数并将结果插入输出。有用于常见任务的内置函数，例如格式化数据值，也可以自定义函数，如“定义模板函数”一节所述。\
  \ |\n| `{{ expr &#124; value.method }}` `{{ expr &#124; func }}` | 表达式可以使用竖线 (`|`)\
  \ 链接，这样第一个表达式的结果将用作第二个表达式的最后一个参数。 |\n| `{{ range value }}` `...` `{{ end }}` | 该动作遍历指定的切片，并为每个元素添加位于\
  \ `range` 和 `end` 关键字之间的内容。嵌套内容中的动作会被执行，当前元素可通过句点访问。详细信息请参阅“在模板中使用切片”一节。 |\n| `{{\
  \ range value }}` `...` `{{ else }}` `...` `{{ end }}` | 该动作类似于 range/end 组合，但定义了一段当切片没有元素时使用的嵌套内容。\
  \ |\n| `{{ if expr }}` `...` `{{ end }}` | 该动作计算一个表达式，如果结果为 `true`，则执行嵌套的模板内容，如“条件执行模板内容”一节所示。该动作可以与可选的\
  \ `else` 和 `else if` 子句一起使用。 |\n| `{{ with expr }}` `...` `{{ end }}` | 该动作计算一个表达式，如果结果不为\
  \ `nil` 或空字符串，则执行嵌套的模板内容。该动作可以与可选的子句一起使用。 |\n| `{{ define \"name\" }}` `...` `{{\
  \ end }}` | 该动作定义一个具有指定名称的模板。 |\n| `{{ template \"name\" expr }}` | 该动作使用指定的名称和数据执行模板，并将结果插入输出。\
  \ |\n| `{{ block \"name\" expr }}` `...` `{{ end }}` | 该动作定义一个具有指定名称的模板，并使用指定的数据调用它。这通常用于定义一个可以被另一个文件加载的模板替换的模板，如“定义模板块”一节所示。\
  \ |\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 插入数据值\n\n\
  模板中最简单的任务就是将值插入到由模板生成的输出中，这通过创建一个包含表达式（可生成你想插入的值）的操作来实现。表 23-6 描述了基本的模板表达式，其中最有用的一些表达式将在后续章节中演示。\n\
  \n**表 23-6**：用于向模板中插入值的模板表达式\n\n| 表达式 | 描述 |\n| --- | --- |\n| `.` | 此表达式将传递给 `Execute`\
  \ 或 `ExecuteTemplate` 方法的值插入到模板输出中。 |\n| `.Field` | 此表达式将指定字段的值插入到模板输出中。 |\n| `.Method`\
  \ | 此表达式调用指定的无参方法，并将结果插入到模板输出中。 |\n| `.Method arg` | 此表达式使用指定的参数调用指定的方法，并将结果插入到模板输出中。\
  \ |\n| `call .Field arg` | 此表达式调用一个结构体函数字段，使用以空格分隔的指定参数。函数的结果被插入到模板输出中。 |\n\n在上一节中，我只使用了句点，其效果是插入用于执行模板的数据值的字符串表示形式。大多数实际项目中的模板都包含特定字段的值或调用方法的结果，如清单\
  \ 23-13 所示。\n\n```\nTemplate Value: {{ . }}\nName: {{ .Name }}\nCategory: {{ .Category\
  \ }}\nPrice: {{ .Price }}\nTax: {{ .AddTax }}\nDiscount Price: {{ .ApplyDiscount\
  \ 10 }}\n清单 23-13\n在 templates 文件夹中的 template.html 文件中插入数据值\n```\n\n这些新操作包含的表达式会写出\
  \ `Name`、`Category` 和 `Price` 字段的值，以及调用 `AddTax` 和 `ApplyDiscount` 方法的结果。访问字段的语法与\
  \ Go 代码大致相似，但调用方法和函数的方式差异很大，很容易出错。与 Go 代码不同，方法调用时不使用括号，参数只需在方法名称后用空格分隔指定。开发者有责任确保参数的类型可被方法或函数使用。编译并执行该项目，你将看到以下输出：\n\
  \n```\nTemplate Value: {Kayak Watersports 279}\nName: Kayak\nCategory: Watersports\n\
  Price: 279\nTax: 334.8\nDiscount Price: 269\n```\n\n### 理解上下文转义\n\n值会被自动转义，以确保它们安全地包含在\
  \ HTML、CSS 和 JavaScript 代码中，并根据上下文应用适当的转义规则。例如，一个像 `\"It was a <big> boat\"` 这样的字符串值，如果用作\
  \ HTML 元素的文本内容，会被插入为 `\"It was a &lt;big&gt; boat\"`；但如果用在 JavaScript 代码中作为字符串字面量，则会插入为\
  \ `\"It was a \\u003cbig\\u003e boat\"`。有关值如何转义的完整详细信息，请参见 [`https://golang.org/pkg/html/template`](https://golang.org/pkg/html/template)。\n\
  \n### 格式化数据值\n\n模板支持用于常见任务的内置函数，包括格式化插入到输出中的数据值，如表 23-7 所述。其他内置函数将在后续章节中介绍。\n\n\
  **表 23-7**：用于格式化数据的内置模板函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `print` | 这是 `fmt.Sprint`\
  \ 函数的别名。 |\n| `printf` | 这是 `fmt.Sprintf` 函数的别名。 |\n| `println` | 这是 `fmt.Sprintln`\
  \ 函数的别名。 |\n| `html` | 此函数对值进行编码，以便安全地包含在 HTML 文档中。 |\n| `js` | 此函数对值进行编码，以便安全地包含在\
  \ JavaScript 文档中。 |\n| `urlquery` | 此函数对值进行编码，以便用于 URL 查询字符串。 |\n\n这些函数通过指定其名称，后跟一个以空格分隔的参数列表来调用。在清单\
  \ 23-14 中，我使用了 `printf` 函数来格式化模板输出中包含的一些数据字段。\n\n```\nTemplate Value: {{ . }}\n\
  Name: {{ .Name }}\nCategory: {{ .Category }}\nPrice: {{ printf \"$%.2f\" .Price\
  \ }}\nTax: {{ printf \"$%.2f\" .AddTax }}\nDiscount Price: {{ .ApplyDiscount 10\
  \ }}\n清单 23-14\n在 templates 文件夹中的 template.html 文件中使用格式化函数\n\n使用 `printf` 函数可以将两个数据值格式化为美元金额，编译并执行项目后，将产生以下输出：\n\
  \n```\nExtras Template Value: {Kayak Watersports 279}\nName: Kayak\nCategory: Watersports\n\
  Price: $279.00\nTax: $334.80\nDiscount Price: 269\n```\n\n### 链式与括号化模板表达式\n\n链式表达式可以为值创建管道，从而允许将一个方法或函数的输出用作另一个方法或函数的输入。清单\
  \ 23-15 通过链式连接 `ApplyDiscount` 方法的结果，将其用作 `printf` 函数的参数，从而创建了一个管道。\n\n```\nTemplate\
  \ Value: {{ . }}\nName: {{ .Name }}\nCategory: {{ .Category }}\nPrice: {{ printf\
  \ \"$%.2f\" .Price }}\nTax: {{ printf \"$%.2f\" .AddTax }}\nDiscount Price: {{ .ApplyDiscount\
  \ 10 | printf \"$%.2f\" }}\n清单 23-15\n在 templates 文件夹中的 template.html 文件中使用链式表达式\n\
  ```\n\n表达式使用竖线（`|` 字符）进行链式连接，其效果是一个表达式的结果被用作下一个表达式的最后一个参数。在清单 23-15 中，调用 `ApplyDiscount`\
  \ 方法的结果被用作调用内置 `printf` 函数的最后一个参数。编译并执行该项目，你将在模板生成的输出中看到格式化后的值：\n\n```\nExtras Template\
  \ Value: {Kayak Watersports 279}\nName: Kayak\nCategory: Watersports\nPrice: $279.00\n\
  Tax: $334.80\nDiscount Price: $269.00\n```\n\n链式连接只能用于传递给函数的最后一个参数。另一种方法——也是可以用来设置其他函数参数的方法——是使用括号，如清单\
  \ 23-16 所示。\n\n```\nTemplate Value: {{ . }}\nName: {{ .Name }}\nCategory: {{ .Category\
  \ }}\nPrice: {{ printf \"$%.2f\" .Price }}\nTax: {{ printf \"$%.2f\" .AddTax }}\n\
  Discount Price: {{ printf \"$%.2f\" (.ApplyDiscount 10) }}\n清单 23-16\n在 templates\
  \ 文件夹中的 template.html 文件中使用括号\n```\n\n这里调用了 `ApplyDiscount` 方法，并将其结果用作 `printf`\
  \ 函数的参数。清单 23-16 中的模板产生的输出与清单 23-15 相同。\n\n\n\n#### 修剪空白\n\n默认情况下，模板的内容会严格按照文件中的定义进行渲染，包括动作之间的任何空白。HTML\
  \ 对元素间的空白不敏感，但空白仍可能对文本内容和属性值造成问题，特别是当你希望编排模板内容使其易于阅读时，如清单 23-17 所示。\n\n```\nName:\
  \ {{ .Name }}, Category: {{ .Category }}, Price,\n{{ printf \"$%.2f\" .Price }}\n\
  \n清单 23-17\n在 templates 文件夹的 template.html 文件中编排模板内容\n```\n\n我添加了换行和缩进，以便内容适合打印页面，并将元素内容与其标签分开。编译并执行项目时，这些空白会包含在输出中：\n\
  \n```\nName: Kayak, Category: Watersports, Price,\n$279.00\n```\n\n可以使用减号来修剪空白，将其紧跟在打开或关闭动作的花括号之后或之前。在清单\
  \ 23-18 中，我使用此功能修剪了清单 23-17 中引入的空白。\n\n```\nName: {{ .Name }}, Category: {{ .Category\
  \ }}, Price,\n{{- printf \"$%.2f\" .Price -}}\n\n清单 23-18\n在 templates 文件夹的 template.html\
  \ 文件中修剪空白\n```\n\n减号必须用空格与动作表达式的其余部分隔开。其效果是移除动作之前或之后的所有空白，你可以通过编译并执行项目来看到这一点，它将产生以下输出：\n\
  \n```\nName: Kayak, Category: Watersports, Price,$279.00\n```\n\n最终动作周围的空白已被移除，但开头的\
  \ `h1` 标签后仍有一个换行符，因为空白修剪仅适用于动作。如果无法从模板中移除这些空白，则可以使用一个向输出中插入空字符串的动作来仅修剪空白，如清单 23-19\
  \ 所示。\n\n```\n{{- \"\" -}} Name: {{ .Name }}, Category: {{ .Category }}, Price,\n\
  {{- printf \"$%.2f\" .Price -}}\n\n清单 23-19\n在 templates 文件夹的 template.html 文件中修剪额外的空白\n\
  ```\n\n新动作不会引入任何新输出，仅用于修剪周围的空白，这可以通过编译并执行项目来查看：\n\n```\nName: Kayak, Category: Watersports,\
  \ Price,$279.00\n```\n\n即使有了这个功能，在编写易于理解的模板时，控制空白仍然很困难，你将在后续示例中看到这一点。如果特定的文档结构很重要，那么你就必须接受更难阅读和维护的模板。如果可读性和可维护性是优先考虑的因素，那么你就必须接受模板输出中额外的空白。\n\
  \n#### 在模板中使用切片\n\n模板动作可用于为切片生成内容，如清单 23-20 所示，它替换了整个模板。\n\n```\n{{ range . -}}\n\
  Name: {{ .Name }}, Category: {{ .Category }}, Price,\n{{- printf \"$%.2f\" .Price\
  \ }}\n{{ end }}\n\n清单 23-20\n在 templates 文件夹的 template.html 文件中处理切片\n```\n\n`range`\
  \ 表达式会遍历指定的数据，我在清单 23-20 中使用了句点来选择用于执行模板的数据值，稍后将对此进行配置。`range` 表达式和 `end` 表达式之间的模板内容会为切片中的每个值重复，当前值被赋值给句点，以便可以在嵌套动作中使用它。清单\
  \ 23-20 的效果是，`Name`、`Category` 和 `Price` 字段被插入到由 `range` 表达式枚举的切片中每个值的输出中。\n\n注意\n\
  \n`range` 关键字也可用于枚举映射，如本章稍后的“定义模板变量”部分所述。\n\n清单 23-21 更新了执行模板的代码，使用切片代替单个 `Product`\
  \ 值。\n\n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n)\nfunc Exec(t *template.Template)\
  \ error {\nreturn t.Execute(os.Stdout, Products)\n}\nfunc main() {\nallTemplates,\
  \ err := template.ParseGlob(\"templates/*.html\")\nif (err == nil) {\nselectedTemplated\
  \ := allTemplates.Lookup(\"template.html\")\nerr = Exec(selectedTemplated)\n}\n\
  if (err != nil) {\nPrintfln(\"Error: %v %v\", err.Error())\n}\n}\n\n清单 23-21\n在\
  \ htmltext 文件夹的 main.go 文件中使用切片执行模板\n```\n\n编译并执行代码，你将看到以下输出：\n\n```\nName: Kayak,\
  \ Category: Watersports, Price,$279.00\nName: Lifejacket, Category: Watersports,\
  \ Price,$49.95\nName: Soccer Ball, Category: Soccer, Price,$19.50\nName: Corner\
  \ Flags, Category: Soccer, Price,$34.95\nName: Stadium, Category: Soccer, Price,$79500.00\n\
  Name: Thinking Cap, Category: Chess, Price,$16.00\nName: Unsteady Chair, Category:\
  \ Chess, Price,$75.00\nName: Bling-Bling King, Category: Chess, Price,$1200.00\n\
  ```\n\n请注意，我在清单 23-20 中向包含 `range` 表达式的动作应用了减号。我希望 `range` 和 `end` 动作内的模板内容通过放在新行并添加缩进来在视觉上清晰可辨，但这会导致输出中出现额外的换行和间距。在\
  \ `range` 表达式末尾放置减号会修剪嵌套内容中的所有前导空白。我没有向 `end` 动作添加减号，这具有保留尾部换行符的效果，从而使切片中每个元素的输出都显示在单独的行上。\n\
  \n##### 使用内置切片函数\n\nGo 文本模板支持表 23-8 中描述的内置函数来处理切片。\n\n**表 23-8** 用于切片的内置模板函数\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `slice` | 此函数创建一个新切片。其参数是原始切片、起始索引和结束索引。 |\n| `index`\
  \ | 此函数返回指定索引处的元素。 |\n| `len` | 此函数返回指定切片的长度。 |\n\n清单 23-22 使用内置函数来报告切片的大小、获取特定索引处的元素以及创建新切片。\n\
  \n```\nThere are {{ len . }} products in the source data.\nFirst product: {{ index\
  \ . 0 }}\n{{ range slice . 3 5 -}}\nName: {{ .Name }}, Category: {{ .Category }},\
  \ Price,\n{{- printf \"$%.2f\" .Price }}\n{{ end }}\n\n清单 23-22\n在 templates 文件夹的\
  \ template.html 文件中使用内置函数\n```\n\n编译并执行项目，你将看到以下输出：\n\n```\nThere are 8 products\
  \ in the source data.\nFirst product: {Kayak Watersports 279}\nName: Corner Flags,\
  \ Category: Soccer, Price,$34.95\nName: Stadium, Category: Soccer, Price,$79500.00\n\
  ```\n\n\n\n#### 条件执行模板内容\n\n动作可用于根据其表达式的计算结果，有条件地向输出中插入内容，如清单 23-23 所示。\n\n```\n\
  There are {{ len . }} products in the source data.\nFirst product: {{ index . 0\
  \ }}\n{{ range . -}}\n{{ if lt .Price 100.00 -}}\nName: {{ .Name }}, Category: {{\
  \ .Category }}, Price,\n{{- printf \"$%.2f\" .Price }}\n{{ end -}}\n{{ end }}\n\
  清单 23-23\n在 templates 文件夹中的 template.html 文件中使用条件动作\n```\n\n`if` 关键字后面跟一个表达式，该表达式决定是否执行嵌套的模板内容。为了帮助编写这些动作的表达式，模板支持表\
  \ 23-9 中描述的函数。\n\n**表 23-9**  \n模板条件函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `eq arg1\
  \ arg2` | 如果 `arg1 == arg2`，此函数返回 `true`。 |\n| `ne arg1 arg2` | 如果 `arg1 != arg2`，此函数返回\
  \ `true`。 |\n| `lt arg1 arg2` | 如果 `arg1 < arg2`，此函数返回 `true`。 |\n| `le arg1 arg2`\
  \ | 如果 `arg1 <= arg2`，此函数返回 `true`。 |\n| `gt arg1 arg2` | 如果 `arg1 > arg2`，此函数返回\
  \ `true`。 |\n| `ge arg1 arg2` | 如果 `arg1 >= arg2`，此函数返回 `true`。 |\n| `and arg1 arg2`\
  \ | 如果 `arg1` 和 `arg2` 均为 `true`，此函数返回 `true`。 |\n| `not arg1` | 如果 `arg1` 为 `false`，此函数返回\
  \ `true`；如果为 `true`，则返回 `false`。 |\n\n这些函数的语法与模板其他功能保持一致，在习惯之前会显得有些别扭。在清单 23-23\
  \ 中，我使用了以下表达式：\n\n```\n...\n{{ if lt .Price 100.00 -}}\n...\n```\n\n`if` 关键字表示一个条件动作，`lt`\
  \ 函数执行小于比较，其余参数指定 `range` 表达式中当前值的 `Price` 字段以及一个字面值 `100.00`。表 23-9 中描述的比较函数在处理数据类型时没有复杂的方法，这意味着我必须将字面值指定为\
  \ `100.00`，以便将其作为 `float64` 处理，而不能依赖 Go 处理无类型常量的方式。\n\n`range` 动作枚举 `Product` 切片中的值，并执行嵌套的\
  \ `if` 动作。只有当当前元素的 `Price` 字段值小于 100 时，`if` 动作才会执行其嵌套内容。编译并执行该项目，你将看到以下输出：\n\n```\n\
  There are 8 products in the source data.\nFirst product: {Kayak Watersports 279}\n\
  Name: Lifejacket, Category: Watersports, Price,$49.95\nName: Soccer Ball, Category:\
  \ Soccer, Price,$19.50\nName: Corner Flags, Category: Soccer, Price,$34.95\nName:\
  \ Thinking Cap, Category: Chess, Price,$16.00\nName: Unsteady Chair, Category: Chess,\
  \ Price,$75.00\n```\n\n尽管使用了减号来修剪空白，但由于我选择构建模板的方式，输出的格式仍然很奇怪。如前所述，在构建易于阅读的模板和管理输出中的空白之间存在权衡。本章我侧重于使模板易于理解，因此示例的输出格式比较别扭。\n\
  \n### 使用可选条件动作\n\n`if` 动作可以与可选的 `else` 和 `else if` 关键字一起使用，如清单 23-24 所示，从而允许提供回退内容，这些内容将在\
  \ `if` 表达式为 `false` 时执行，或仅在第二个表达式为 `true` 时执行。\n\n```\nThere are {{ len . }} products\
  \ in the source data.\nFirst product: {{ index . 0 }}\n{{ range . -}}\n{{ if lt\
  \ .Price 100.00 -}}\nName: {{ .Name }}, Category: {{ .Category }}, Price,\n{{- printf\
  \ \"$%.2f\" .Price }}\n{{ else if gt .Price 1500.00 -}}\nExpensive Product {{ .Name\
  \ }} ({{ printf \"$%.2f\" .Price}})\n{{ else -}}\nMidrange Product: {{ .Name }}\
  \ ({{ printf \"$%.2f\" .Price}})\n{{ end -}}\n{{ end }}\n清单 23-24\n在 templates 文件夹中的\
  \ template.html 文件中使用可选关键字\n```\n\n编译并执行该项目，你将看到 `if`、`else if` 和 `else` 动作产生以下输出：\n\
  \n```\nThere are 8 products in the source data.\nFirst product: {Kayak Watersports\
  \ 279}\nMidrange Product: Kayak ($279.00)\nName: Lifejacket, Category: Watersports,\
  \ Price,$49.95\nName: Soccer Ball, Category: Soccer, Price,$19.50\nName: Corner\
  \ Flags, Category: Soccer, Price,$34.95\nExpensive Product Stadium ($79500.00)\n\
  Name: Thinking Cap, Category: Chess, Price,$16.00\nName: Unsteady Chair, Category:\
  \ Chess, Price,$75.00\nMidrange Product: Bling-Bling King ($1200.00)\n```\n\n\n\n\
  ### 创建具名嵌套模板\n\n`define` 操作用于创建一个可通过名称执行的嵌套模板，这样就能将内容定义一次，然后通过 `template` 操作重复使用，如清单\
  \ 23-25 所示。\n\n```\n{{ define \"currency\" }}{{ printf \"$%.2f\" . }}{{ end }}\n\
  {{ define \"basicProduct\" -}}\nName: {{ .Name }}, Category: {{ .Category }}, Price,\n\
  {{- template \"currency\" .Price }}\n{{- end }}\n{{ define \"expensiveProduct\"\
  \ -}}\nExpensive Product {{ .Name }} ({{ template \"currency\" .Price }})\n{{- end\
  \ }}\nThere are {{ len . }} products in the source data.\nFirst product: {{ index\
  \ . 0 }}\n{{ range . -}}\n{{ if lt .Price 100.00 -}}\n{{ template \"basicProduct\"\
  \ . }}\n{{ else if gt .Price 1500.00 -}}\n{{ template \"expensiveProduct\" . }}\n\
  {{ else -}}\nMidrange Product: {{ .Name }} ({{ printf \"$%.2f\" .Price}})\n{{ end\
  \ -}}\n{{ end }}\n```\n\n> **清单 23-25：** 在 `templates` 文件夹中的 `template.html` 文件中定义并使用嵌套模板\n\
  \n`define` 关键字后跟用引号括起来的模板名称，模板以 `end` 关键字结束。`template` 关键字用于执行一个具名模板，需要指定模板名称和一个数据值：\n\
  \n```\n...\n{{- template \"currency\" .Price }}\n...\n```\n\n此操作执行名为 `currency`\
  \ 的模板，并使用 `Price` 字段的值作为数据值。在具名模板内部，可以通过句点（`.`）来访问该数据值：\n\n```\n...\n{{ define \"\
  currency\" }}{{ printf \"$%.2f\" . }}{{ end }}\n...\n```\n\n一个具名模板可以调用其他具名模板，如清单\
  \ 23-25 所示，其中 `basicProduct` 和 `expensiveProduct` 模板执行了 `currency` 模板。\n\n嵌套的具名模板可能会加剧空白符问题，因为模板周围的空白符（为了清晰起见，我在清单\
  \ 23-25 中添加的）会被包含在主模板的输出中。解决此问题的一种方法是将具名模板定义在单独的文件中，但也可以通过只使用具名模板（即使是主输出部分）来解决，如清单\
  \ 23-26 所示。\n\n```\n{{ define \"currency\" }}{{ printf \"$%.2f\" . }}{{ end }}\n\
  {{ define \"basicProduct\" -}}\nName: {{ .Name }}, Category: {{ .Category }}, Price,\n\
  {{- template \"currency\" .Price }}\n{{- end }}\n{{ define \"expensiveProduct\"\
  \ -}}\nExpensive Product {{ .Name }} ({{ template \"currency\" .Price }})\n{{- end\
  \ }}\n{{ define \"mainTemplate\" -}}\nThere are {{ len . }} products in the source\
  \ data.\nFirst product: {{ index . 0 }}\n{{ range . -}}\n{{ if lt .Price 100.00\
  \ -}}\n{{ template \"basicProduct\" . }}\n{{ else if gt .Price 1500.00 -}}\n{{ template\
  \ \"expensiveProduct\" . }}\n{{ else -}}\nMidrange Product: {{ .Name }} ({{ printf\
  \ \"$%.2f\" .Price}})\n{{ end -}}\n{{ end }}\n{{- end}}\n```\n\n> **清单 23-26：**\
  \ 在 `templates` 文件夹中的 `template.html` 文件中添加一个具名模板\n\n对主模板内容使用 `define` 和 `end` 关键字，可以排除用于分隔其他具名模板的空白符。在清单\
  \ 23-27 中，我通过在选择要执行的模板时使用其名称来完成此更改。\n\n```go\npackage main\n\nimport (\n\t\"html/template\"\
  \n\t\"os\"\n)\n\nfunc Exec(t *template.Template) error {\n\treturn t.Execute(os.Stdout,\
