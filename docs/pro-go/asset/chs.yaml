  \n```\nBling-Bling King: $1200.00\nCorner Flags: $34.95\nKayak: $279.00\nLifejacket:\
  \ $49.95\nSoccer Ball: $19.50\nStadium: $79500.00\nThinking Cap: $16.00\nUnsteady\
  \ Chair: $75.00\n```\n\n## 创建文本模板\n\n`html/template` 包构建在 `text/template` 包提供的功能之上，后者可以直接用于执行文本模板。HTML\
  \ 当然也是文本，不同之处在于 `text/template` 包不会自动转义内容。在其他所有方面，使用文本模板与使用 HTML 模板相同。在 `templates`\
  \ 文件夹中添加一个名为 `template.txt` 的文件，内容如清单 23-41 所示。\n\n```\n{{ define \"mainTemplate\"\
  \ -}}\n{{ range $key, $value := . -}}\n{{ $key }}: {{ printf \"$%.2f\" $value.Price\
  \ }}\n{{ end }}\n{{- end }}\n清单 23-41\ntemplates 文件夹中 template.txt 文件的内容\n\n该模板与清单\
  \ 23-40 中的模板类似，只是不包含 `h1` 元素。模板动作、表达式、变量和空白修剪都是相同的。而且，如清单 23-42 所示，用于加载和执行模板的函数名称也相同，只是通过不同的包来访问。\n\
  \n```\npackage main\nimport (\n\"text/template\"\n\"os\"\n\"strings\"\n)\nfunc GetCategories(products\
  \ []Product) (categories []string) {\ncatMap := map[string]string {}\nfor _, p :=\
  \ range products {\nif (catMap[p.Category] == \"\") {\ncatMap[p.Category] = p.Category\n\
  categories = append(categories, p.Category)\n}\n}\nreturn\n}\nfunc Exec(t *template.Template)\
  \ error {\nproductMap := map[string]Product {}\nfor _, p := range Products {\nproductMap[p.Name]\
  \ = p\n}\nreturn t.Execute(os.Stdout, &productMap)\n}\nfunc main() {\nallTemplates\
  \ := template.New(\"allTemplates\")\nallTemplates.Funcs(map[string]interface{} {\n\
  \"getCats\": GetCategories,\n\"lower\": strings.ToLower,\n})\nallTemplates, err\
  \ := allTemplates.ParseGlob(\"templates/*.txt\")\nif (err == nil) {\nselectedTemplated\
  \ := allTemplates.Lookup(\"mainTemplate\")\nerr = Exec(selectedTemplated)\n}\nif\
  \ (err != nil) {\nPrintfln(\"Error: %v %v\", err.Error())\n}\n}\n清单 23-42\n在 htmltext\
  \ 文件夹的 main.go 文件中加载与执行文本模板\n```\n\n除了更改 `import` 语句并选择扩展名为 `txt` 的文件外，加载和执行文本模板的过程是相同的。编译并运行项目，你将看到以下输出：\n\
  \n```\nBling-Bling King: $1200.00\nCorner Flags: $34.95\nKayak: $279.00\nLifejacket:\
  \ $49.95\nSoccer Ball: $19.50\nStadium: $79500.00\nThinking Cap: $16.00\nUnsteady\
  \ Chair: $75.00\n```\n\n## 本章小结\n\n在本章中，我介绍了用于创建 HTML 和文本模板的标准库。模板可以包含多种动作，这些动作用于在输出中包含内容。模板的语法可能有些别扭——必须严格按照模板引擎的要求来表达内容——但模板引擎灵活且可扩展，并且如我在第\
  \ 3 部分中所示，可以轻松修改以改变其行为。\n\n\n\n### 创建 HTTP 服务器\n\n本章将介绍用于创建 HTTP 服务器和处理 HTTP 及 HTTPS\
  \ 请求的标准库支持。我将展示如何创建服务器，并解释处理请求的不同方式，包括表单请求。表 24-1 说明了 HTTP 服务器的上下文。\n\n表 24-1: HTTP\
  \ 服务器上下文说明\n\n| 问题 | 答案 |\n| --- | --- |\n| 这是什么？ | 本章介绍的功能使 Go 应用程序能够轻松创建 HTTP\
  \ 服务器。 |\n| 有什么用处？ | HTTP 是使用最广泛的协议之一，既适用于面向用户的应用程序，也适用于 Web 服务。 |\n| 如何使用？ | 使用\
  \ `net/http` 包的功能来创建服务器和处理请求。 |\n| 是否存在陷阱或限制？ | 这些功能设计精良且易于使用。 |\n| 是否有替代方案？ | 标准库支持其他网络协议，也支持打开和使用更底层的网络连接。详见\
  \ [`https://pkg.go.dev/net@go1.17.1`](https://pkg.go.dev/net%2540go1.17.1) 了解 `net`\
  \ 包及其子包的信息，例如实现 SMTP 协议的 `net/smtp`。 |\n\n表 24-2 总结了本章内容。\n\n表 24-2: 本章摘要\n\n| 问题\
  \ | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 创建 HTTP 或 HTTPS 服务器 | 使用 `ListenAndServe`\
