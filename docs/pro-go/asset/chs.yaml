  \    Printfln(\"Follow pointer value: %v\", name)\n}\n```\n\n**清单 28-4.** 在 `reflection`\
  \ 文件夹的 `main.go` 文件中跟踪指针\n\n`transformString` 函数识别 `*string` 值，并使用 `Elem` 方法获取 `string`\
