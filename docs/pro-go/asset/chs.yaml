  \n图 34-2\n\n从模板中调用处理程序\n\n\n\n### 从路由生成 URL\n\n在清单 34-7 中，当我想将浏览器重定向到一个新的 URL 时，不得不像下面这样指定\
  \ URL：\n\n```\nreturn actionresults.NewRedirectAction(\"/names\")\n```\n\n这种方式并不理想，因为更改路由配置可能会导致这种硬编码的\
  \ URL 失效。更可靠的方法是添加对指定处理程序方法的支持，并根据与之关联的路由配置生成 URL。在 `http/handling` 文件夹中添加一个名为 `url_generation.go`\
  \ 的文件，其内容如清单 34-18 所示。\n\n```\npackage handling\nimport (\n\"fmt\"\n\"net/http\"\
  \n\"strings\"\n\"errors\"\n\"reflect\"\n)\ntype URLGenerator interface {\nGenerateUrl(method\
  \ interface{}, data ...interface{}) (string, error)\nGenerateURLByName(handlerName,\
  \ methodName string,\ndata ...interface{}) (string, error)\nAddRoutes(routes []Route)\n\
  }\ntype routeUrlGenerator struct {\nroutes []Route\n}\nfunc (gen *routeUrlGenerator)\
  \ AddRoutes(routes []Route) {\nif gen.routes == nil {\ngen.routes = routes\n} else\
  \ {\ngen.routes = append(gen.routes, routes...)\n}\n}\nfunc (gen *routeUrlGenerator)\
  \ GenerateUrl(method interface{},\ndata ...interface{}) (string, error) {\nmethodVal\
  \ := reflect.ValueOf(method)\nif methodVal.Kind() == reflect.Func &&\nmethodVal.Type().In(0).Kind()\
  \ == reflect.Struct {\nfor _, route := range gen.routes {\nif route.handlerMethod.Func.Pointer()\
  \ == methodVal.Pointer() {\nreturn generateUrl(route, data...)\n}\n}\n}\nreturn\
  \ \"\", errors.New(\"No matching route\")\n}\nfunc (gen *routeUrlGenerator) GenerateURLByName(handlerName,\
  \ methodName string,\ndata ...interface{}) (string, error) {\nfor _, route := range\
  \ gen.routes {\nif strings.EqualFold(route.handlerName, handlerName) &&\nstrings.EqualFold(route.httpMethod\
  \ + route.actionName, methodName) {\nreturn generateUrl(route, data...)\n}\n}\n\
  return \"\", errors.New(\"No matching route\")\n}\nfunc generateUrl(route Route,\
  \ data ...interface{}) (url string, err error) {\nurl = \"/\" + route.prefix\nif\
  \ (!strings.HasPrefix(url, \"/\")) {\nurl = \"/\" + url\n}\nif (!strings.HasSuffix(url,\
  \ \"/\")) {\nurl += \"/\"\n}\nurl+= strings.ToLower(route.actionName)\nif len(data)\
  \ > 0 && !strings.EqualFold(route.httpMethod, http.MethodGet) {\nerr = errors.New(\"\
  Only GET handler can have data values\")\n} else if strings.EqualFold(route.httpMethod,\
  \ http.MethodGet) &&\nlen(data) != route.handlerMethod.Type.NumIn() -1 {\nerr =\
  \ errors.New(\"Number of data values doesn't match method params\")\n} else {\n\
  for _, val := range data {\nurl = fmt.Sprintf(\"%v/%v\", url, val)\n}\n}\nreturn\n\
  }\n```\n\n`URLGenerator` 接口定义了名为 `GenerateURL` 和 `GenerateURLByName` 的方法。`GenerateURL`\
  \ 方法接收一个处理程序函数，并用它来定位路由；而 `GenerateURLByName` 方法则使用字符串值来定位处理程序函数。`routeUrlGenerator`\
  \ 结构体实现了 `URLGenerator` 的方法，它利用路由来生成 URL。\n\n## 创建 URL 生成器服务\n\n我想为 `URLGenerator`\
  \ 接口创建一个服务，但希望该服务仅在请求管道配置为使用第 33 章定义的路由功能时可用。清单 34-19 在路由中间件组件实例化时设置了这个服务。\n\n```\n\
  func NewRouter(handlers ...HandlerEntry) *RouterComponent {\nroutes := generateRoutes(handlers...)\n\
  var urlGen URLGenerator\nservices.GetService(&urlGen)\nif urlGen == nil {\nservices.AddSingleton(func\
  \ () URLGenerator {\nreturn &routeUrlGenerator { routes: routes }\n})\n} else {\n\
  urlGen.AddRoutes(routes)\n}\nreturn &RouterComponent{ routes: routes }\n}\n```\n\
  \n这个新服务意味着我可以以编程方式生成 URL，如清单 34-20 所示。\n\n```\npackage placeholder\nimport (\n\"\
  fmt\"\n\"platform/logging\"\n\"platform/http/actionresults\"\n\"platform/http/handling\"\
  \n)\nvar names = []string{\"Alice\", \"Bob\", \"Charlie\", \"Dora\"}\ntype NameHandler\
  \ struct {\nlogging.Logger\nhandling.URLGenerator\n}\nfunc (n NameHandler) GetName(i\
  \ int) actionresults.ActionResult {\nn.Logger.Debugf(\"GetName method invoked with\
  \ argument: %v\", i)\nvar response string\nif (i < len(names)) {\nresponse = fmt.Sprintf(\"\
  Name #%v: %v\", i, names[i])\n} else {\nresponse =  fmt.Sprintf(\"Index out of bounds\"\
  )\n}\nreturn actionresults.NewTemplateAction(\"simple_message.html\", response)\n\
  }\nfunc (n NameHandler) GetNames() actionresults.ActionResult {\nn.Logger.Debug(\"\
  GetNames method invoked\")\nreturn actionresults.NewTemplateAction(\"simple_message.html\"\
  , names)\n}\ntype NewName struct {\nName string\nInsertAtStart bool\n}\nfunc (n\
  \ NameHandler) PostName(new NewName) actionresults.ActionResult {\nn.Logger.Debugf(\"\
  PostName method invoked with argument %v\", new)\nif (new.InsertAtStart) {\nnames\
  \ = append([] string { new.Name}, names... )\n} else {\nnames = append(names, new.Name)\n\
  }\nreturn n.redirectOrError(NameHandler.GetNames)\n}\nfunc (n NameHandler) GetRedirect()\
  \ actionresults.ActionResult {\nreturn n.redirectOrError(NameHandler.GetNames)\n\
  }\nfunc (n NameHandler) GetJsonData() actionresults.ActionResult {\nreturn actionresults.NewJsonAction(names)\n\
  }\nfunc (n NameHandler) redirectOrError(handler interface{},\ndata ...interface{})\
  \ actionresults.ActionResult {\nurl, err := n.GenerateUrl(handler)\nif (err == nil)\
  \ {\nreturn actionresults.NewRedirectAction(url)\n} else {\nreturn actionresults.NewErrorAction(err)\n\
  }\n}\n```\n\n这个新服务使得可以动态生成 URL，反映已定义的路由。测试 POST 请求不太方便，因此清单 34-20 添加了一个名为 `GetRedirect`\
  \ 的新处理方法，它接收 GET 请求并重定向到通过指定 `GetNames` 方法创建的 URL：\n\n```\nreturn n.redirectOrError(NameHandler.GetNames)\n\
  ```\n\n请注意，在选择处理方法时没有使用括号，因为生成 URL 需要的是方法本身，而不是调用它产生的结果。\n\n编译并执行项目，然后使用浏览器请求 `http://localhost:5000/redirect`。浏览器将自动重定向到指向\
  \ `GetNames` 方法的 URL，如图 34-3 所示。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig3_HTML.jpg](img/512642_1_En_34_Fig3_HTML.jpg)\n\
  \n\n\n### 定义别名路由\n\n对 URL 生成的支持简化了定义路由的过程，这些路由能将 URL 匹配到处理方法，但除了直接从处理方法生成的路由之外，还存在一些缺口。例如，占位符路由支持的\
  \ URL 存在空白，这意味着对默认 URL `http://localhost:5000/` 的请求会返回 404 - 未找到的结果。在本节中，我将添加对定义并非直接源于处理结构体及其方法的额外路由的支持，从而填补此类空白。\n\
  \n在 `platform/http/handling` 文件夹中添加一个名为 `alias_route.go` 的文件，内容如清单 34-21 所示。\n\n\
  ```go\npackage handling\nimport (\n\"platform/http/actionresults\"\n\"platform/services\"\
  \n\"net/http\"\n\"reflect\"\n\"regexp\"\n\"fmt\"\n)\nfunc (rc *RouterComponent)\
  \ AddMethodAlias(srcUrl string,\nmethod interface{}, data ...interface{}) *RouterComponent\
  \ {\nvar urlgen URLGenerator\nservices.GetService(&urlgen)\nurl, err := urlgen.GenerateUrl(method,\
  \ data...)\nif (err == nil) {\nreturn rc.AddUrlAlias(srcUrl, url)\n} else {\npanic(err)\n\
  }\n}\nfunc (rc *RouterComponent) AddUrlAlias(srcUrl string,\ntargetUrl string) *RouterComponent\
  \ {\naliasFunc := func(interface{}) actionresults.ActionResult {\nreturn actionresults.NewRedirectAction(targetUrl)\n\
  }\nalias := Route {\nhttpMethod: http.MethodGet,\nhandlerName: \"Alias\",\nactionName:\
  \ \"Redirect\",\nexpression: *regexp.MustCompile(fmt.Sprintf(\"^%v[/]?$\", srcUrl)),\n\
  handlerMethod: reflect.Method{\nType: reflect.TypeOf(aliasFunc),\nFunc: reflect.ValueOf(aliasFunc),\n\
  },\n}\nrc.routes = append([]Route { alias},  rc.routes... )\nreturn rc\n}\n```\n\
  \n该文件为 `RouterComponent` 结构体定义了额外的方法。`AddUrlAlias` 方法创建了一个 `Route`，但它是通过创建一个 `reflect.Method`\
  \ 来实现的，该 `reflect.Method` 调用一个生成重定向操作结果的函数。人们很容易忘记 `reflect` 包定义的类型只是常规的 Go 结构体和接口，但\
  \ `Method` 本身就是一个结构体，我可以设置其 `Type` 和 `Func` 字段，使得别名函数看起来像是执行路由的代码中的一个常规方法。\n\n`AddMethodAlias`\
  \ 方法允许使用 URL 和处理方法来创建路由。使用 `URLGenerator` 服务为处理方法生成 URL，然后将该 URL 传递给 `AddUrlAlias`\
  \ 方法。\n\n清单 34-22 向占位符路由集合添加了一个别名，这样对默认 URL 的请求会被重定向，从而由 `GetNames` 处理方法进行处理。\n\n\
  ```go\npackage placeholder\nimport (\n\"platform/http\"\n\"platform/pipeline\"\n\
  \"platform/pipeline/basic\"\n\"platform/services\"\n\"sync\"\n\"platform/http/handling\"\
  \n)\nfunc createPipeline() pipeline.RequestPipeline {\nreturn pipeline.CreatePipeline(\n\
  &basic.ServicesComponent{},\n&basic.LoggingComponent{},\n&basic.ErrorComponent{},\n\
  &basic.StaticFileComponent{},\n//&SimpleMessageComponent{},\nhandling.NewRouter(\n\
  handling.HandlerEntry{ \"\",  NameHandler{}},\nhandling.HandlerEntry{ \"\",  DayHandler{}},\n\
  ).AddMethodAlias(\"/\", NameHandler.GetNames),\n)\n}\nfunc Start() {\nresults, err\
  \ := services.Call(http.Serve, createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n```\n\n编译并执行项目，然后使用浏览器请求 `http://localhost:5000`。浏览器将不会收到\
  \ 404 响应，而是会被重定向，如图 34-4 所示。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig4_HTML.jpg](img/512642_1_En_34_Fig4_HTML.jpg)\n\
  \n**图 34-4** – 别名路由的效果\n\n### 验证请求数据\n\n一旦应用程序开始接受用户数据，验证的需求就会随之而来。用户可能会在表单字段中输入任何内容，有时是因为说明不清晰，有时则是因为他们只想尽快完成整个流程。通过将验证定义为一项服务，我可以最大限度地减少各个处理程序需要实现的代码量。\n\
  \n由于服务无法知道处理程序需要哪些验证要求，我需要某种方式来将这些要求描述为处理程序处理的数据类型的一部分。最简单的方法是使用结构体标签，通过它可以表达一些基本的验证要求。\n\
  \n创建 `platform/validation` 文件夹，并在其中添加一个名为 `validator.go` 的文件，内容如清单 34-23 所示。\n\n\
  ```go\npackage validation\ntype Validator interface {\nValidate(data interface{})\
  \ (ok bool, errs []ValidationError)\n}\ntype ValidationError struct {\nFieldName\
  \ string\nError error\n}\ntype ValidatorFunc func(fieldName string, value interface{},\n\
  arg string) (bool, error)\nfunc DefaultValidators() map[string]ValidatorFunc {\n\
  return map[string]ValidatorFunc {\n\"required\": required,\n\"min\": min,\n}\n}\n\
  ```\n\n`Validator` 接口将用于提供验证作为一项服务，单个验证检查由 `ValidatorFunc` 函数执行。我将定义两个验证器：`required`\
  \ 和 `min`。`required` 将确保为 `string` 值提供一个值，而 `min` 将对 `int` 和 `float64` 值强制执行最小值，并对\
  \ `string` 值强制执行最小长度。根据需要可以定义其他验证器，但对于本项目来说，这两个已经足够。为了定义验证器函数，在 `platform/validation`\
  \ 文件夹中添加一个名为 `validator_functions.go` 的文件，内容如清单 34-24 所示。\n\n```go\npackage validation\n\
  import (\n\"errors\"\n\"fmt\"\n\"strconv\"\n)\nfunc required(fieldName string, value\
  \ interface{},\narg string) (valid bool, err error) {\nif str, ok := value.(string);\
  \ ok {\nvalid = str != \"\"\nerr = fmt.Errorf(\"A value is required\")\n} else {\n\
  err = errors.New(\"The required validator is for strings\")\n}\nreturn\n}\nfunc\
  \ min(fieldName string, value interface{}, arg string) (valid bool, err error) {\n\
  minVal, err := strconv.Atoi(arg)\nif err != nil {\npanic(\"Invalid arguments for\
  \ validator: \" + arg)\n}\nerr = fmt.Errorf(\"The minimum value is %v\", minVal)\n\
  if iVal, iValOk := value.(int); iValOk {\nvalid = iVal >= minVal\n} else if fVal,\
  \ fValOk := value.(float64); fValOk {\nvalid = fVal >= float64(minVal)\n} else if\
  \ strVal, strValOk := value.(string); strValOk {\nerr = fmt.Errorf(\"The minimum\
  \ length is %v characters\", minVal)\nvalid = len(strVal) >= minVal\n} else {\n\
  err = errors.New(\"The min validator is for int, float64, and str values\")\n}\n\
  return\n}\n```\n\n为了执行验证，每个函数接收正在验证的结构体字段的名称、从请求中获取的值以及配置验证过程的可选参数。为了创建实现以及设置服务的函数，在\
  \ `platform/validation` 文件夹中添加一个名为 `tag_validator.go` 的文件，内容如清单 34-25 所示。\n\n\n\
  ```go\npackage validation\nimport (\n\"reflect\"\n\"strings\"\n)\nfunc NewDefaultValidator(validators\
  \ map[string]ValidatorFunc) Validator {\nreturn &TagValidator{ DefaultValidators()\
  \ }\n}\ntype TagValidator struct {\nvalidators map[string]ValidatorFunc\n}\nfunc\
  \ (tv *TagValidator) Validate(data interface{}) (ok bool,\nerrs []ValidationError)\
  \ {\nerrs = []ValidationError{}\ndataVal := reflect.ValueOf(data)\nif (dataVal.Kind()\
  \ == reflect.Ptr) {\ndataVal = dataVal.Elem()\n}\nif (dataVal.Kind() != reflect.Struct)\
  \ {\npanic(\"Only structs can be validated\")\n}\nfor i := 0; i < dataVal.NumField();\
  \ i++ {\nfieldType := dataVal.Type().Field(i)\nvalidationTag, found := fieldType.Tag.Lookup(\"\
  validation\")\nif found {\nfor _, v := range strings.Split(validationTag, \",\"\
  ) {\nvar name, arg string = \"\", \"\"\nif strings.Contains(v, \":\") {\nnameAndArgs\
  \ := strings.SplitN(v, \":\", 2)\nname = nameAndArgs[0]\narg = nameAndArgs[1]\n\
  } else {\nname = v\n}\nif validator, ok := tv.validators[name]; ok {\nvalid, err\
  \ := validator(fieldType.Name,\ndataVal.Field(i).Interface(), arg )\nif (!valid)\
  \ {\nerrs = append(errs, ValidationError{\nFieldName: fieldType.Name,\nError: err,\n\
  })\n}\n} else {\npanic(\"Unknown validator: \" + name)\n}\n}\n}\n}\nok = len(errs)\
  \ == 0\nreturn\n}\n```\n\n清单 34-25\n`validation` 文件夹中 `tag_validator.go` 文件的内容\n\
  \n`TagValidator` 结构体通过查找名为 `validation` 的结构体标签，并解析该标签以确定结构体的每个字段需要哪些验证（如果需要的话），从而实现了\
  \ `Validator` 接口。每个指定的验证器都会被使用，并且错误会被收集起来，作为 `Validate` 方法的结果返回。`NewDefaultValidation`\
  \ 函数用于实例化该结构体并创建验证服务，如清单 34-26 所示。\n\n```go\npackage services\nimport (\n\"platform/logging\"\
  \n\"platform/config\"\n\"platform/templates\"\n\"platform/validation\"\n)\nfunc\
  \ RegisterDefaultServices() {\n// ...为简洁起见，省略了语句...\nerr = AddSingleton(\nfunc()\
  \ validation.Validator {\nreturn validation.NewDefaultValidator(validation.DefaultValidators())\n\
  })\nif (err != nil) {\npanic(err)\n}\n}\n```\n\n清单 34-26\n在 `services` 文件夹中的 `services_default.go`\
  \ 文件里注册验证服务\n\n我已将该新服务注册为单例，并使用由 `DefaultValidators` 函数返回的验证器。\n\n## 执行数据验证\n\n\
  为了检查数据验证是否正常工作，需要进行一些准备工作。首先，清单 34-27 创建了一个新的处理器方法，并将验证结构体标签应用到占位符请求处理器上。\n\n```go\n\
  package placeholder\nimport (\n\"fmt\"\n\"platform/logging\"\n\"platform/http/actionresults\"\
  \n\"platform/http/handling\"\n\"platform/validation\"\n)\nvar names = []string{\"\
  Alice\", \"Bob\", \"Charlie\", \"Dora\"}\ntype NameHandler struct {\nlogging.Logger\n\
  handling.URLGenerator\nvalidation.Validator\n}\nfunc (n NameHandler) GetName(i int)\
  \ actionresults.ActionResult {\nn.Logger.Debugf(\"GetName method invoked with argument:\
  \ %v\", i)\nvar response string\nif (i < len(names)) {\nresponse = fmt.Sprintf(\"\
  Name #%v: %v\", i, names[i])\n} else {\nresponse =  fmt.Sprintf(\"Index out of bounds\"\
  )\n}\nreturn actionresults.NewTemplateAction(\"simple_message.html\", response)\n\
  }\nfunc (n NameHandler) GetNames() actionresults.ActionResult {\nn.Logger.Debug(\"\
  GetNames method invoked\")\nreturn actionresults.NewTemplateAction(\"simple_message.html\"\
  , names)\n}\ntype NewName struct {\nName string `validation:\"required,min:3\"`\n\
  InsertAtStart bool\n}\nfunc (n NameHandler) GetForm() actionresults.ActionResult\
  \ {\npostUrl, _ := n.URLGenerator.GenerateUrl(NameHandler.PostName)\nreturn actionresults.NewTemplateAction(\"\
  name_form.html\", postUrl)\n}\nfunc (n NameHandler) PostName(new NewName) actionresults.ActionResult\
  \ {\nn.Logger.Debugf(\"PostName method invoked with argument %v\", new)\nif ok,\
  \ errs := n.Validator.Validate(&new); !ok {\nreturn actionresults.NewTemplateAction(\"\
  validation_errors.html\", errs)\n}\nif (new.InsertAtStart) {\nnames = append([]\
  \ string { new.Name}, names... )\n} else {\nnames = append(names, new.Name)\n}\n\
  return n.redirectOrError(NameHandler.GetNames)\n}\nfunc (n NameHandler) GetRedirect()\
  \ actionresults.ActionResult {\nreturn n.redirectOrError(NameHandler.GetNames)\n\
  }\nfunc (n NameHandler) GetJsonData() actionresults.ActionResult {\nreturn actionresults.NewJsonAction(names)\n\
  }\nfunc (n NameHandler) redirectOrError(handler interface{},\ndata ...interface{})\
  \ actionresults.ActionResult {\nurl, err := n.GenerateUrl(handler)\nif (err == nil)\
  \ {\nreturn actionresults.NewRedirectAction(url)\n} else {\nreturn actionresults.NewErrorAction(err)\n\
  }\n}\n```\n\n清单 34-27\n在 `placeholder` 文件夹中的 `name_handler.go` 文件里准备验证\n\n`validation`\
  \ 标签已添加到 `Name` 字段，应用了 `required` 和 `min` 验证器，这意味着该字段为必填项，且最少需要三个字符。为了使验证更易于测试，我添加了一个名为\
  \ `GetForm` 的处理器方法，该方法渲染一个名为 `name_form.html` 的模板。当 `PostName` 方法接收到数据时，会使用该服务进行验证，如果存在验证错误，则使用\
  \ `validation_errors.html` 模板来生成响应。\n\n在 `placeholder` 文件夹中添加一个名为 `name_form.html`\
  \ 的文件，内容如清单 34-28 所示。\n\n```html\n{{ layout \"layout.html\" }}\n\n<form method=\"\
  POST\" action=\"{{.}}\">\n  Name: <input type=\"text\" name=\"Name\" />\n  Insert\
  \ At Front: <input type=\"checkbox\" name=\"InsertAtStart\" value=\"true\" />\n\
  \  <input type=\"submit\" value=\"Submit\" />\n</form>\n```\n\n清单 34-28\n`placeholder`\
  \ 文件夹中 `name_form.html` 文件的内容\n\n该模板生成一个简单的 HTML 表单，用于将数据发送到从处理器方法获取的 URL。在 `placeholder`\
  \ 文件夹中添加一个名为 `validation_errors.html` 的文件，内容如清单 34-29 所示。\n\n```html\n{{ layout\
  \ \"layout.html\" }}\n<h1>Validation Errors</h1>\n<ul>\n{{ range . }}\n<li>{{.FieldName}}:\
  \ {{ .Error }}</li>\n{{ end }}\n</ul>\n```\n\n清单 34-29\n`placeholder` 文件夹中 `validation_errors.html`\
  \ 文件的内容\n\n从处理器方法收到的验证错误切片会以列表形式显示。编译并执行该项目，然后使用浏览器请求 `http://localhost:5000/form`。在不向\
  \ Name 字段输入值的情况下点击 Submit 按钮，您将看到来自 `required` 和 `min` 验证器的错误，如图 34-5 所示。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig5_HTML.jpg](img/512642_1_En_34_Fig5_HTML.jpg)\n\
  \n图 34-5\n\n显示验证错误\n\n如果您输入的姓名少于三个字符，那么您只会看到来自 `min` 验证器的警告。如果您输入三个或更多字符的姓名，则该姓名将被添加到姓名列表中，如图\
  \ 34-6 所示。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig6_HTML.jpg](img/512642_1_En_34_Fig6_HTML.jpg)\n\
  \n图 34-6\n\n通过数据验证\n\n\n### 添加会话\n\n会话利用 Cookie 来关联相关的 HTTP 请求，使得用户一次操作的结果能够体现在后续操作中。尽管我强烈建议自己编写平台来学习\
  \ Go 语言及其标准库，但这并不包括安全相关的特性——这些领域需要使用经过精心设计和充分测试的代码。Cookie 和会话看似与安全无关，但它们构成了许多应用程序在验证用户凭据后识别用户身份的基础。粗心编写的会话功能可能导致用户绕过访问控制或访问其他用户的数据。\n\
  \n在第 32 章中，我推荐了 Gorilla Web 工具包，作为替代自建框架的良好起点。Gorilla 工具包提供的其中一个包名为`sessions`，它支持安全地创建和管理会话。本章将使用此包来添加会话支持。在`platform`文件夹中运行列表\
  \ 34-30 所示的命令，以下载并安装`sessions`包。\n\n```bash\ngo get github.com/gorilla/sessions\n\
  ```\n*列表 34-30：安装包*\n\n### 延迟写入响应数据\n\n在请求处理的管道方法中使用 Cookie 处理会话会带来一个问题。会话在处理器方法执行之前获取，在方法执行过程中被修改，然后在处理器方法完成后更新会话\
  \ Cookie。这会造成问题，因为处理器已经向`ResponseWriter`写入了数据，之后便无法再更新响应头中的 Cookie。在`pipeline`文件夹中添加一个名为`deferredwriter.go`的代码文件，内容如列表\
  \ 34-31 所示。（这个写入器类似于我在模板中调用处理器时创建的那个。我更倾向于在拦截请求和响应数据时定义单独的类型，因为拦截数据的使用方式可能会随时间变化。）\n\
  \n```go\npackage pipeline\n\nimport (\n\t\"net/http\"\n\t\"strings\"\n)\n\ntype\
  \ DeferredResponseWriter struct {\n\thttp.ResponseWriter\n\tstrings.Builder\n\t\
  statusCode int\n}\n\nfunc (dw *DeferredResponseWriter) Write(data []byte) (int,\
  \ error) {\n\treturn dw.Builder.Write(data)\n}\n\nfunc (dw *DeferredResponseWriter)\
  \ FlushData() {\n\tif dw.statusCode == 0 {\n\t\tdw.statusCode = http.StatusOK\n\t\
  }\n\tdw.ResponseWriter.WriteHeader(dw.statusCode)\n\tdw.ResponseWriter.Write([]byte(dw.Builder.String()))\n\
  }\n\nfunc (dw *DeferredResponseWriter) WriteHeader(statusCode int) {\n\tdw.statusCode\
  \ = statusCode\n}\n```\n*列表 34-31：`pipeline`文件夹中`deferredwriter.go`文件的内容*\n\n`DeferredResponseWriter`是`ResponseWriter`的一个包装器，它不会立即写入响应，直到调用`FlushData`方法时才会写入，在此之前数据都保存在内存中。列表\
  \ 34-32 在创建传递给中间件组件的上下文时，使用了`DeferredResponseWriter`。\n\n```go\nfunc (pl RequestPipeline)\
  \ ProcessRequest(req *http.Request,\n\tresp http.ResponseWriter) error {\n\tdeferredWriter\
  \ := &DeferredResponseWriter{ResponseWriter: resp}\n\tctx := ComponentContext{\n\
  \t\tRequest:        req,\n\t\tResponseWriter: deferredWriter,\n\t}\n\tpl(&ctx)\n\
  \tif ctx.error == nil {\n\t\tdeferredWriter.FlushData()\n\t}\n\treturn ctx.error\n\
  }\n```\n*列表 34-32：在`pipeline`文件夹的`pipeline.go`文件中使用修改后的写入器*\n\n此更改允许在请求沿着管道返回时设置响应头。\n\
  \n### 创建会话接口、服务和中间件\n\n我将将会话作为服务提供，并使用接口，以便平台的其他部分不直接依赖 Gorilla 工具包，从而在需要时易于更换不同的会话包。\n\
  \n创建`platform/sessions`文件夹，并添加一个名为`sessions.go`的文件，内容如列表 34-33 所示。\n\n```go\npackage\
  \ sessions\n\nimport (\n\t\"context\"\n\t\"platform/services\"\n\tgorilla \"github.com/gorilla/sessions\"\
  \n)\n\nconst SESSION__CONTEXT_KEY string = \"pro_go_session\"\n\nfunc RegisterSessionService()\
  \ {\n\terr := services.AddScoped(func(c context.Context) Session {\n\t\tval := c.Value(SESSION__CONTEXT_KEY)\n\
  \t\tif s, ok := val.(*gorilla.Session); ok {\n\t\t\treturn &SessionAdaptor{gSession:\
  \ s}\n\t\t} else {\n\t\t\tpanic(\"Cannot get session from context\")\n\t\t}\n\t\
  })\n\tif err != nil {\n\t\tpanic(err)\n\t}\n}\n\ntype Session interface {\n\tGetValue(key\
  \ string) interface{}\n\tGetValueDefault(key string, defVal interface{}) interface{}\n\
  \tSetValue(key string, val interface{})\n}\n\ntype SessionAdaptor struct {\n\tgSession\
  \ *gorilla.Session\n}\n\nfunc (adaptor *SessionAdaptor) GetValue(key string) interface{}\
  \ {\n\treturn adaptor.gSession.Values[key]\n}\n\nfunc (adaptor *SessionAdaptor)\
  \ GetValueDefault(key string,\n\tdefVal interface{}) interface{} {\n\tif val, ok\
  \ := adaptor.gSession.Values[key]; ok {\n\t\treturn val\n\t}\n\treturn defVal\n\
  }\n\nfunc (adaptor *SessionAdaptor) SetValue(key string, val interface{}) {\n\t\
  if val == nil {\n\t\tadaptor.gSession.Values[key] = nil\n\t} else {\n\t\tswitch\
  \ typedVal := val.(type) {\n\t\tcase int, float64, bool, string:\n\t\t\tadaptor.gSession.Values[key]\
  \ = typedVal\n\t\tdefault:\n\t\t\tpanic(\"Sessions only support int, float64, bool,\
  \ and string values\")\n\t\t}\n\t}\n}\n```\n*列表 34-33：`sessions`文件夹中`sessions.go`文件的内容*\n\
  \n为避免名称冲突，我使用`gorilla`作为别名导入了 Gorilla 工具包。`Session`接口定义了获取和设置会话值的方法，该接口由`SessionAdaptor`结构体实现并映射到\
  \ Gorilla 的功能。`RegisterSessionService`函数注册了一个单例服务，该服务从当前`Context`中获取 Gorilla 包的会话，并将其包装在`SessionAdaptor`中。\n\
  \n与会话关联的任何数据都将保存到 Cookie 中。为避免结构体和切片带来的问题，`SetValue`方法仅接受`int`、`float64`、`bool`和`string`类型的值，并支持传入`nil`以从会话中移除某个值。\n\
  \n中间件组件将负责在请求沿管道传递时创建会话，并在请求返回时保存会话。在`platform/sessions`文件夹中添加一个名为`session_middleware.go`的文件，内容如列表\
  \ 34-34 所示。\n\n> **注意**\n> 我选择了最简单的存储会话方式，即将会话数据存储在发送给浏览器的响应 Cookie 中。这限制了可以安全存储在会话中的数据类型范围，并且仅适用于存储少量数据的会话。还有其他的会话存储方式，可以将数据存储在数据库中，从而解决这些问题。请参阅[`github.com/gorilla/sessions`](https://github.com/gorilla/sessions)获取可用存储包的列表。\n\
  \n\n\n```go\npackage sessions\nimport (\n\"context\"\n\"time\"\n\"platform/config\"\
  \n\"platform/pipeline\"\ngorilla \"github.com/gorilla/sessions\"\n)\ntype SessionComponent\
  \ struct {\nstore *gorilla.CookieStore\nconfig.Configuration\n}\nfunc (sc *SessionComponent)\
  \ Init() {\ncookiekey, found := sc.Configuration.GetString(\"sessions:key\")\nif\
  \ !found {\npanic(\"Session key not found in configuration\")\n}\nif sc.GetBoolDefault(\"\
  sessions:cyclekey\", true) {\ncookiekey += time.Now().String()\n}\nsc.store = gorilla.NewCookieStore([]byte(cookiekey))\n\
  }\nfunc (sc *SessionComponent) ProcessRequest(ctx *pipeline.ComponentContext,\n\
  next func(*pipeline.ComponentContext)) {\nsession, _ := sc.store.Get(ctx.Request,\
  \ SESSION__CONTEXT_KEY)\nc := context.WithValue(ctx.Request.Context(), SESSION__CONTEXT_KEY,\
  \ session)\nctx.Request = ctx.Request.WithContext(c)\nnext(ctx)\nsession.Save(ctx.Request,\
  \ ctx.ResponseWriter)\n}\n```\n\n`Init`方法创建一个 cookie 存储，这是 Gorilla 包支持存储会话的方式之一。`ProcessRequest`方法在将请求沿管道传递给`next`参数函数之前，从存储中获取一个会话。当请求沿管道返回时，会话会被保存到存储中。\n\
  \n如果`sessions:cyclekey`配置设置为`true`，则用于会话 cookie 的名称将包含中间件组件初始化时的时间。这在开发期间很有用，因为它意味着每次应用程序启动时会话都会重置。\n\
  \n### 创建使用会话的处理程序\n\n为了简单验证会话功能是否正常工作，请在`placeholder`文件夹中添加一个名为`counter_handler.go`的文件，其内容如列表\
  \ 34-35 所示。\n\n```go\npackage placeholder\nimport (\n\"fmt\"\n\"platform/sessions\"\
  \n)\ntype CounterHandler struct {\nsessions.Session\n}\nfunc (c CounterHandler)\
  \ GetCounter() string {\ncounter := c.Session.GetValueDefault(\"counter\", 0).(int)\n\
  c.Session.SetValue(\"counter\", counter + 1)\nreturn fmt.Sprintf(\"Counter: %v\"\
  , counter)\n}\n```\n\n该处理程序通过定义一个结构体字段来声明其对`Session`的依赖关系，当结构体被实例化以处理请求时，该字段将被填充。`GetCounter`方法从会话中获取名为`counter`的值，将其递增，更新会话，然后将该值用作响应。\n\
  \n### 配置应用程序\n\n为了设置会话服务和请求管道，请对`placeholder`文件夹中的`startup.go`文件进行列表 34-36 所示的更改。\n\
  \n```go\npackage placeholder\nimport (\n\"platform/http\"\n\"platform/pipeline\"\
  \n\"platform/pipeline/basic\"\n\"platform/services\"\n\"sync\"\n\"platform/http/handling\"\
  \n\"platform/sessions\"\n)\nfunc createPipeline() pipeline.RequestPipeline {\nreturn\
  \ pipeline.CreatePipeline(\n&basic.ServicesComponent{},\n&basic.LoggingComponent{},\n\
  &basic.ErrorComponent{},\n&basic.StaticFileComponent{},\n&sessions.SessionComponent{},\n\
  //&SimpleMessageComponent{},\nhandling.NewRouter(\nhandling.HandlerEntry{ \"\",\
  \  NameHandler{}},\nhandling.HandlerEntry{ \"\",  DayHandler{}},\nhandling.HandlerEntry{\
  \ \"\",  CounterHandler{}},\n).AddMethodAlias(\"/\", NameHandler.GetNames),\n)\n\
  }\nfunc Start() {\nsessions.RegisterSessionService()\nresults, err := services.Call(http.Serve,\
  \ createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n```\n\n最后，将列表 34-37 所示的配置设置添加到`config.json`文件中。Gorilla\
  \ 会话包使用一个密钥来保护会话数据。理想情况下，应将其存储在项目文件夹之外，以避免意外提交到公共源代码仓库，但为简单起见，我已将其包含在配置文件中。\n\n\
  ```json\n{\n\"logging\" : {\n\"level\": \"debug\"\n},\n\"main\" : {\n\"message\"\
  \ : \"Hello from the config file\"\n},\n\"files\": {\n\"path\": \"placeholder/files\"\
  \n},\n\"templates\": {\n\"path\": \"placeholder/*.html\",\n\"reload\": true\n},\n\
  \"sessions\": {\n\"key\": \"MY_SESSION_KEY\",\n\"cyclekey\": true\n}\n}\n```\n\n\
  编译并执行项目，然后使用浏览器请求`http://localhost:5000/counter`。每次重新加载浏览器时，存储在会话中的值都会递增，如图 34-7\
  \ 所示。\n\n## 添加用户授权\n\n平台所需的最后一个功能是支持授权，能够限制特定用户对 URL 的访问。在本节中，我将定义描述用户的接口，并添加使用这些接口控制访问的支持。\n\
  \n务必不要将授权与身份验证和用户管理混淆。授权是执行访问控制的过程，这是本节的主题。\n\n身份验证是接收和验证用户凭据的过程，以便他们可以被识别以进行授权。用户管理是管理用户详细信息（包括密码和其他凭据）的过程。\n\
  \n在本书中，我只为身份验证创建一个占位符，完全不涉及用户管理。在实际项目中，身份验证和用户管理应由一个经过充分测试的服务提供，此类服务有很多。这些服务提供 HTTP\
  \ API，可以轻松使用 Go 标准库消费，有关使用 Go 标准库发起 HTTP 请求的功能在第 25 章中已描述。\n\n\n\n### 定义基本授权类型\n\
  \n创建`platform/authorization/identity`文件夹，并添加一个名为`user.go`的文件，内容如清单 34-38 所示。\n\n\
  ```\npackage identity\n\ntype User interface {\n\tGetID() int\n\tGetDisplayName()\
  \ string\n\tInRole(name string) bool\n\tIsAuthenticated() bool\n}\n```\n\n*清单 34-38：`authorization/identity`文件夹中`user.go`文件的内容*\n\
  \n`User`接口将表示一个已认证的用户，以便可以评估对受限资源的请求。为了创建一个`User`接口的默认实现（这对具有简单授权要求的应用程序很有用），请向`authorization/identity`文件夹添加一个名为`basic_user.go`的文件，内容如清单\
  \ 34-39 所示。\n\n```\npackage identity\n\nimport \"strings\"\n\nvar UnauthenticatedUser\
  \ User = &basicUser{}\n\nfunc NewBasicUser(id int, name string, roles ...string)\
  \ User {\n\treturn &basicUser{\n\t\tId:            id,\n\t\tName:          name,\n\
  \t\tRoles:         roles,\n\t\tAuthenticated: true,\n\t}\n}\n\ntype basicUser struct\
  \ {\n\tId            int\n\tName          string\n\tRoles         []string\n\tAuthenticated\
  \ bool\n}\n\nfunc (user *basicUser) GetID() int {\n\treturn user.Id\n}\n\nfunc (user\
  \ *basicUser) GetDisplayName() string {\n\treturn user.Name\n}\n\nfunc (user *basicUser)\
  \ InRole(role string) bool {\n\tfor _, r := range user.Roles {\n\t\tif strings.EqualFold(r,\
  \ role) {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n\nfunc (user *basicUser)\
  \ IsAuthenticated() bool {\n\treturn user.Authenticated\n}\n```\n\n*清单 34-39：`authorization/identity`文件夹中`basic_user.go`文件的内容*\n\
  \n`NewBasicUser`函数创建了`User`接口的一个简单实现，而`UnauthenticatedUser`变量将用于表示未登录应用程序的用户。\n\n\
  向`platform/authorization/identity`文件夹添加一个名为`signin_mgr.go`的文件，内容如清单 34-40 所示。\n\n\
  ```\npackage identity\n\ntype SignInManager interface {\n\tSignIn(user User) error\n\
  \tSignOut(user User) error\n}\n```\n\n*清单 34-40：`authorization/identity`文件夹中`signin_mgr.go`文件的内容*\n\
  \n`SignInManager`接口将用于定义一个服务，应用程序将使用该服务来让用户登录和退出。用户如何被认证的细节则留给应用程序自行决定。\n\n向`platform/authorization/identity`文件夹添加一个名为`user_store.go`的文件，内容如清单\
  \ 34-41 所示。\n\n```\npackage identity\n\ntype UserStore interface {\n\tGetUserByID(id\
  \ int) (user User, found bool)\n\tGetUserByName(name string) (user User, found bool)\n\
  }\n```\n\n*清单 34-41：`authorization/identity`文件夹中`user_store.go`文件的内容*\n\n用户存储提供了对应用程序已知用户的访问，这些用户可以通过\
  \ ID 或名称进行查找。\n\n接下来，我需要一个用于描述访问控制需求的接口。向`platform/authorization/identity`文件夹添加一个名为`auth_condition.go`的文件，内容如清单\
  \ 34-42 所示。\n\n```\npackage identity\n\ntype AuthorizationCondition interface {\n\
  \tValidate(user User) bool\n}\n```\n\n*清单 34-42：`authorization/identity`文件夹中`auth_condition.go`文件的内容*\n\
  \n`AuthorizationCondition`接口将用于评估已登录用户是否有权访问受保护的 URL，并且将作为请求处理过程的一部分使用。\n\n### 实现平台接口\n\
  \n下一步是实现平台将提供的用于授权的接口。向`platform/authorization`文件夹添加一个名为`sessionsignin.go`的文件，内容如清单\
  \ 34-43 所示。\n\n```\npackage authorization\n\nimport (\n\t\"platform/authorization/identity\"\
  \n\t\"platform/services\"\n\t\"platform/sessions\"\n\t\"context\"\n)\n\nconst USER_SESSION_KEY\
  \ string = \"USER\"\n\nfunc RegisterDefaultSignInService() {\n\terr := services.AddScoped(func(c\
  \ context.Context) identity.SignInManager {\n\t\treturn &SessionSignInMgr{Context:\
  \ c}\n\t})\n\tif err != nil {\n\t\tpanic(err)\n\t}\n}\n\ntype SessionSignInMgr struct\
  \ {\n\tcontext.Context\n}\n\nfunc (mgr *SessionSignInMgr) SignIn(user identity.User)\
  \ (err error) {\n\tsession, err := mgr.getSession()\n\tif err == nil {\n\t\tsession.SetValue(USER_SESSION_KEY,\
  \ user.GetID())\n\t}\n\treturn\n}\n\nfunc (mgr *SessionSignInMgr) SignOut(user identity.User)\
  \ (err error) {\n\tsession, err := mgr.getSession()\n\tif err == nil {\n\t\tsession.SetValue(USER_SESSION_KEY,\
  \ nil)\n\t}\n\treturn\n}\n\nfunc (mgr *SessionSignInMgr) getSession() (s sessions.Session,\
  \ err error) {\n\terr = services.GetServiceForContext(mgr.Context, &s)\n\treturn\n\
  }\n```\n\n*清单 34-43：`authorization`文件夹中`sessionsignin.go`文件的内容*\n\n`SessionSignInMgr`结构体实现了`SignInManager`接口，它将已登录用户的\
  \ ID 存储在会话中，并在用户退出时将其移除。依赖会话可以确保用户在退出或会话过期之前保持登录状态。`RegisterDefaultSignInService`函数为`SignInManager`接口创建了一个范围服务，该服务通过`SessionSignInMgr`结构体来解析。\n\
  \n为了提供一个展示已登录用户的服务，请向`platform/authorization`文件夹添加一个名为`user_service.go`的文件，内容如清单\
  \ 34-44 所示。\n\n```\npackage authorization\n\nimport (\n\t\"platform/services\"\n\
  \t\"platform/sessions\"\n\t\"platform/authorization/identity\"\n)\n\nfunc RegisterDefaultUserService()\
  \ {\n\terr := services.AddScoped(func(session sessions.Session,\n\t\tstore identity.UserStore)\
  \ identity.User {\n\t\tuserID, found := session.GetValue(USER_SESSION_KEY).(int)\n\
  \t\tif found {\n\t\t\tuser, userFound := store.GetUserByID(userID)\n\t\t\tif userFound\
  \ {\n\t\t\t\treturn user\n\t\t\t}\n\t\t}\n\t\treturn identity.UnauthenticatedUser\n\
  \t})\n\tif err != nil {\n\t\tpanic(err)\n\t}\n}\n```\n\n*清单 34-44：`authorization`文件夹中`user_service.go`文件的内容*\n\
  \n`RegisterDefaultUserService`函数为`User`接口创建了一个范围服务，该服务读取当前会话中存储的值，并使用它来查询`UserStore`服务。\n\
  \n为了创建一个简单的访问条件来检查用户是否属于某个角色，请向`platform/authorization`文件夹添加一个名为`role_condition.go`的文件，内容如清单\
  \ 34-45 所示。\n\n```\npackage authorization\n\nimport (\"platform/authorization/identity\"\
  )\n\nfunc NewRoleCondition(roles ...string) identity.AuthorizationCondition {\n\t\
  return &roleCondition{allowedRoles: roles}\n}\n\ntype roleCondition struct {\n\t\
  allowedRoles []string\n}\n\nfunc (c *roleCondition) Validate(user identity.User)\
  \ bool {\n\tfor _, allowedRole := range c.allowedRoles {\n\t\tif user.InRole(allowedRole)\
  \ {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n```\n\n*清单 34-45：`authorization`文件夹中`role_condition.go`文件的内容*\n\
  \n`NewRoleCondition`函数接受一组角色，用于创建一个条件，如果用户被分配了其中任何一个角色，该条件将返回`true`。\n\n\n\n###\
  \ 实现访问控制\n\n下一步是添加对定义访问限制并将其应用于请求的支持。在 `platform/authorization` 文件夹中添加一个名为 `auth_middleware.go`\
  \ 的文件，其内容如代码清单 34-46 所示。\n\n```\npackage authorization\n\nimport (\n    \"net/http\"\
  \n    \"platform/authorization/identity\"\n    \"platform/config\"\n    \"platform/http/handling\"\
  \n    \"platform/pipeline\"\n    \"strings\"\n    \"regexp\"\n)\n\nfunc NewAuthComponent(prefix\
  \ string, condition identity.AuthorizationCondition,\n    requestHandlers ...interface{})\
  \ *AuthMiddlewareComponent {\n    entries := []handling.HandlerEntry{}\n    for\
  \ _, handler := range requestHandlers {\n        entries = append(entries, handling.HandlerEntry{prefix,\
  \ handler})\n    }\n    router := handling.NewRouter(entries...)\n    return &AuthMiddlewareComponent{\n\
  \        prefix:          \"/\" + prefix,\n        condition:       condition,\n\
  \        RequestPipeline: pipeline.CreatePipeline(router),\n        fallbacks: \
  \      map[*regexp.Regexp]string{},\n    }\n}\n\ntype AuthMiddlewareComponent struct\
  \ {\n    prefix    string\n    condition identity.AuthorizationCondition\n    pipeline.RequestPipeline\n\
  \    config.Configuration\n    authFailURL string\n    fallbacks   map[*regexp.Regexp]string\n\
  }\n\nfunc (c *AuthMiddlewareComponent) Init() {\n    c.authFailURL, _ = c.Configuration.GetString(\"\
  authorization:failUrl\")\n}\n\nfunc (*AuthMiddlewareComponent) ImplementsProcessRequestWithServices()\
  \ {}\n\nfunc (c *AuthMiddlewareComponent) ProcessRequestWithServices(\n    context\
  \ *pipeline.ComponentContext,\n    next func(*pipeline.ComponentContext),\n    user\
  \ identity.User) {\n    if strings.HasPrefix(context.Request.URL.Path, c.prefix)\
  \ {\n        for expr, target := range c.fallbacks {\n            if expr.MatchString(context.Request.URL.Path)\
  \ {\n                http.Redirect(context.ResponseWriter, context.Request,\n  \
  \                  target, http.StatusSeeOther)\n                return\n      \
  \      }\n        }\n        if c.condition.Validate(user) {\n            c.RequestPipeline.ProcessRequest(context.Request,\
  \ context.ResponseWriter)\n        } else {\n            if c.authFailURL != \"\"\
  \ {\n                http.Redirect(context.ResponseWriter, context.Request,\n  \
  \                  c.authFailURL, http.StatusSeeOther)\n            } else if user.IsAuthenticated()\
  \ {\n                context.ResponseWriter.WriteHeader(http.StatusForbidden)\n\
  \            } else {\n                context.ResponseWriter.WriteHeader(http.StatusUnauthorized)\n\
  \            }\n        }\n    } else {\n        next(context)\n    }\n}\n\nfunc\
  \ (c *AuthMiddlewareComponent) AddFallback(target string,\n    patterns ...string)\
  \ *AuthMiddlewareComponent {\n    for _, p := range patterns {\n        c.fallbacks[regexp.MustCompile(p)]\
  \ = target\n    }\n    return c\n}\n```\n*代码清单 34-46*  \n*authorization 文件夹中 auth_middleware.go\
  \ 文件的内容*\n\n`AuthMiddlewareComponent` 结构体是一个中间件组件，它在请求管道中创建分支，并带有一个 URL 路由器，其处理程序仅在满足授权条件时接收请求。\n\
  \n### 实现应用程序占位功能\n\n按照先前功能所建立的模式，我将为使用该平台的应用程序提供基本的授权功能实现。在 `platform/placeholder`\
  \ 文件夹中添加一个名为 `placeholder_store.go` 的文件，其内容如代码清单 34-47 所示。\n\n```\npackage placeholder\n\
  \nimport (\n    \"platform/services\"\n    \"platform/authorization/identity\"\n\
  \    \"strings\"\n)\n\nfunc RegisterPlaceholderUserStore() {\n    err := services.AddSingleton(func()\
  \ identity.UserStore {\n        return &PlaceholderUserStore{}\n    })\n    if err\
  \ != nil {\n        panic(err)\n    }\n}\n\nvar users = map[int]identity.User{\n\
  \    1: identity.NewBasicUser(1, \"Alice\", \"Administrator\"),\n    2: identity.NewBasicUser(2,\
  \ \"Bob\"),\n}\n\ntype PlaceholderUserStore struct{}\n\nfunc (store *PlaceholderUserStore)\
  \ GetUserByID(id int) (identity.User, bool) {\n    user, found := users[id]\n  \
  \  return user, found\n}\n\nfunc (store *PlaceholderUserStore) GetUserByName(name\
  \ string) (identity.User, bool) {\n    for _, user := range users {\n        if\
  \ strings.EqualFold(user.GetDisplayName(), name) {\n            return user, true\n\
  \        }\n    }\n    return nil, false\n}\n```\n*代码清单 34-47*  \n*placeholder 文件夹中\
  \ placeholder_store.go 文件的内容*\n\n`PlaceholderUserStore` 结构体使用静态定义的 `Alice` 和 `Bob`\
  \ 两个用户数据实现了 `UserStore` 接口，并由 `RegisterPlaceholderUserStore` 函数用于创建单例服务。\n\n###\
  \ 创建认证处理器\n\n为了实现简单的身份认证，在 `placeholder` 文件夹中添加一个名为 `authentication_handler.go`\
  \ 的文件，其内容如代码清单 34-48 所示。\n\n```\npackage placeholder\n\nimport (\n    \"platform/http/actionresults\"\
  \n    \"platform/authorization/identity\"\n    \"fmt\"\n)\n\ntype AuthenticationHandler\
  \ struct {\n    identity.User\n    identity.SignInManager\n    identity.UserStore\n\
  }\n\nfunc (h AuthenticationHandler) GetSignIn() actionresults.ActionResult {\n \
  \   return actionresults.NewTemplateAction(\"signin.html\",\n        fmt.Sprintf(\"\
  Signed in as: %v\", h.User.GetDisplayName()))\n}\n\ntype Credentials struct {\n\
  \    Username string\n    Password string\n}\n\nfunc (h AuthenticationHandler) PostSignIn(creds\
  \ Credentials) actionresults.ActionResult {\n    if creds.Password == \"mysecret\"\
  \ {\n        user, ok := h.UserStore.GetUserByName(creds.Username)\n        if ok\
  \ {\n            h.SignInManager.SignIn(user)\n            return actionresults.NewTemplateAction(\"\
  signin.html\",\n                fmt.Sprintf(\"Signed in as: %v\", user.GetDisplayName()))\n\
  \        }\n    }\n    return actionresults.NewTemplateAction(\"signin.html\", \"\
  Access Denied\")\n}\n\nfunc (h AuthenticationHandler) PostSignOut() actionresults.ActionResult\
  \ {\n    h.SignInManager.SignOut(h.User)\n    return actionresults.NewTemplateAction(\"\
  signin.html\", \"Signed out\")\n}\n```\n*代码清单 34-48*  \n*placeholder 文件夹中 authentication_handler.go\
  \ 文件的内容*\n\n该请求处理程序为所有用户硬编码了密码 `mysecret`。`GetSignIn` 方法显示一个模板来收集用户名和密码。`PostSignIn`\
  \ 方法在将用户登录到应用程序之前，检查密码并确保存储中存在具有指定名称的用户。`PostSignOut` 方法将用户从应用程序中注销。为了创建处理程序所使用的模板，在\
  \ `placeholder` 文件夹中添加一个名为 `signin.html` 的文件，其内容如代码清单 34-49 所示。\n\n```\n{{ layout\
  \ \"layout.html\" }}\n{{ if ne . \"\" }}\n{{. }}\n{{ end }}\n\n<form method=\"post\"\
  >\n    <label>Username:</label>\n    <input name=\"username\" type=\"text\" /><br/>\n\
  \    <label>Password:</label>\n    <input name=\"password\" type=\"password\" /><br/>\n\
  \    <button type=\"submit\" formaction=\"/signin\">Sign In</button>\n    <button\
  \ type=\"submit\" formaction=\"/signout\">Sign Out</button>\n</form>\n```\n*代码清单\
  \ 34-49*  \n*placeholder 文件夹中 signin.html 文件的内容*\n\n该模板显示一个基本的 HTML 表单，并带有由渲染它的处理程序方法提供的消息。\n\
  \n\n\n### 配置应用程序\n\n剩下的工作是配置应用程序，以创建一个受保护的处理程序并设置授权功能，如清单 34-50 所示。\n\n```\npackage\
  \ placeholder\nimport (\n\"platform/http\"\n\"platform/pipeline\"\n\"platform/pipeline/basic\"\
  \n\"platform/services\"\n\"sync\"\n\"platform/http/handling\"\n\"platform/sessions\"\
  \n\"platform/authorization\"\n)\nfunc createPipeline() pipeline.RequestPipeline\
  \ {\nreturn pipeline.CreatePipeline(\n&basic.ServicesComponent{},\n&basic.LoggingComponent{},\n\
  &basic.ErrorComponent{},\n&basic.StaticFileComponent{},\n&sessions.SessionComponent{},\n\
  //&SimpleMessageComponent{},\nauthorization.NewAuthComponent(\n\"protected\",\n\
  authorization.NewRoleCondition(\"Administrator\"),\nCounterHandler{},\n),\nhandling.NewRouter(\n\
  handling.HandlerEntry{ \"\",  NameHandler{}},\nhandling.HandlerEntry{ \"\",  DayHandler{}},\n\
  //handling.HandlerEntry{ \"\",  CounterHandler{}},\nhandling.HandlerEntry{ \"\"\
  , AuthenticationHandler{}},\n).AddMethodAlias(\"/\", NameHandler.GetNames),\n)\n\
  }\nfunc Start() {\nsessions.RegisterSessionService()\nauthorization.RegisterDefaultSignInService()\n\
  authorization.RegisterDefaultUserService()\nRegisterPlaceholderUserStore()\nresults,\
  \ err := services.Call(http.Serve, createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n清单 34-50\n在 placeholder 文件夹的 startup.go 文件中配置应用程序\n\
  ```\n\n这些更改创建了一个以 `/protected` 为前缀的管道分支，该分支仅限于被分配了 `Administrator` 角色的用户访问。本章前面定义的\
  \ `CounterHandler` 是该分支上唯一的处理程序。`AuthenticationHandler` 被添加到管道的主分支中。\n\n编译并执行应用程序，然后使用浏览器请求\
  \ `http://localhost:5000/protected/counter`。这是一个受保护的处理程序方法，由于没有已登录的用户，将会显示如图 34-8\
  \ 所示的结果。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig8_HTML.jpg](img/512642_1_En_34_Fig8_HTML.jpg)\n\
  \n图 34-8\n\n未经身份验证的请求\n\n当未经身份验证的用户请求受保护的资源时，会发送 401 响应，这被称为质询响应，通常用于向用户提供登录机会。\n\
  \n接下来，请求 `http://localhost:5000/signin`，在“用户名”字段中输入 `bob`，在“密码”字段中输入 `mysecret`，然后单击“登录”，如图\
  \ 34-9 所示。请求 `http://localhost:5000/protected/counter`，您将收到 403 响应，当已提供凭据的用户请求访问受保护的资源时会发送此响应。\n\
  \n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig9_HTML.jpg](img/512642_1_En_34_Fig9_HTML.jpg)\n\
  \n图 34-9\n\n未经授权的请求\n\n最后，请求 `http://localhost:5000/signin`，在“用户名”字段中输入 `alice`，在“密码”字段中输入\
  \ `mysecret`，然后单击“登录”，如图 34-10 所示。请求 `http://localhost:5000/protected/counter`，您将收到处理程序的响应，也显示在图\
  \ 34-10 中，因为 `Alice` 属于 `Adminstrator` 角色。\n\n![../images/512642_1_En_34_Chapter/512642_1_En_34_Fig10_HTML.jpg](img/512642_1_En_34_Fig10_HTML.jpg)\n\
  \n图 34-10\n\n已授权的请求\n\n## 总结\n\n在本章中，我通过添加对操作结果、数据验证、会话和授权的支持，完成了自定义 Web 应用程序框架的开发。在下一章中，我将开始使用该平台创建一个在线商店。\n\
  \n"
- "# SportsStore：一个真实的应用程序\n\n在本章中，我将开始开发一个名为 `SportsStore` 的应用程序，这是一个体育用品在线商店。这是一个我在许多书中都包含的示例，它让我能够演示如何用不同的语言和框架实现相同的功能集。\n\
  \n## 创建 SportsStore 项目\n\n我将创建一个应用程序，它使用第 32–34 章中创建的 platform 项目，但定义在自己的项目中。打开命令提示符，在包含\
  \ `platform` 文件夹的同一文件夹中创建一个名为 `sportsstore` 的文件夹。导航到 `sportsstore` 文件夹，并运行清单 35-1\
  \ 所示的命令。\n\n> 提示：您可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。如果您在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init sportsstore\n\
  清单 35-1\n初始化项目\n```\n\n此命令创建 `go.mod` 文件。为了声明对 platform 项目的依赖，在 `sportsstore` 文件夹中运行清单\
  \ 35-2 所示的命令。\n\n```\ngo mod edit -require=\"platform@v1.0.0\"\ngo mod edit -replace=\"\
  platform@v1.0.0\"=\"../platform\"\ngo get -d \"platform@v1.0.0\"\n清单 35-2\n创建依赖项\n\
  ```\n\n打开 `go.mod` 文件，您将看到这些命令的效果，如清单 35-3 所示。\n\n```\nmodule sportsstore\ngo 1.17\n\
  require platform v1.0.0\nrequire (\ngithub.com/gorilla/securecookie v1.1.1 // indirect\n\
  github.com/gorilla/sessions v1.2.1 // indirect\n)\nreplace platform v1.0.0 => ../platform\n\
  清单 35-3\ngo 命令在 sportsstore 文件夹的 go.mod 文件中的效果\n```\n\n`require` 指令声明了对 `platform`\
  \ 模块的依赖。在实际项目中，这可以指定为版本控制仓库的 URL，例如 GitHub 的 URL。本项目不会提交到版本控制，所以我只使用了名称 `platform`。\n\
  \n`replace` 指令提供了一个本地路径，用于查找 `platform` 模块。当 Go 工具解析对 `platform` 模块中包的依赖时，它们将使用\
  \ `platform` 文件夹，该文件夹与 `sportsstore` 文件夹位于同一级别。\n\n`platform` 项目依赖于第三方包，这些包必须先解析才能使用。这是通过\
  \ `go get` 命令完成的，该命令生成了 `require` 指令，该指令声明了对第 34 章中用于实现会话的包的间接依赖。\n\n### 配置应用程序\n\
  \n向 `sportsstore` 文件夹添加一个名为 `config.json` 的文件，并使用它定义清单 35-4 所示的配置设置。\n\n```\n{\n\
  \"logging\" : {\n\"level\": \"debug\"\n},\n\"files\": {\n\"path\": \"files\"\n},\n\
  \"templates\": {\n\"path\": \"templates/*.html\",\n\"reload\": true\n},\n\"sessions\"\
  : {\n\"key\": \"MY_SESSION_KEY\",\n\"cyclekey\": true\n}\n}\n清单 35-4\nsportsstore\
  \ 文件夹中 config.json 文件的内容\n\n接下来，向 `sportsstore` 文件夹添加一个名为 `main.go` 的文件，内容如清单 35-5\
  \ 所示。\n\n```\npackage main\nimport (\n\"platform/services\"\n\"platform/logging\"\
  \n)\nfunc writeMessage(logger logging.Logger) {\nlogger.Info(\"SportsStore\")\n\
  }\nfunc main() {\nservices.RegisterDefaultServices()\nservices.Call(writeMessage)\n\
  }\n清单 35-5\nsportsstore 文件夹中 main.go 文件的内容\n```\n\n在 `sportsstore` 文件夹中使用清单 35-6\
  \ 所示的命令编译并执行项目。\n\n```\ngo run .\n清单 35-6\n编译并执行项目\n```\n\n`main` 方法设置了默认的 `platform`\
  \ 服务并调用 `writeMessage`，产生以下输出：\n\n```\n07:55:03 INFO SportsStore\n```\n\n\n\n###\
  \ 启动数据模型\n\n几乎所有项目都有某种数据模型，而我通常从这部分开始开发。我喜欢先从几个简单的数据类型入手，然后让它们能被项目其他部分使用。随着为应用程序添加功能，我会不断回到数据模型，扩展其能力。\n\
  \n在 `sportsstore/models` 文件夹中创建名为 `product.go` 的文件，其内容如清单 35-7 所示。\n\n```\npackage\
  \ models\ntype Product struct {\nID int\nName string\nDescription string\nPrice\
  \ float64\n*Category\n}\n清单 35-7\nmodels 文件夹中 product.go 文件的内容\n```\n\n我倾向于在每个文件中定义一个类型，以及与该类型相关的任何构造函数或方法。为了给嵌入的\
  \ `Category` 字段创建数据类型，在 `models` 文件夹中添加一个名为 `category.go` 的文件，其内容如清单 35-8 所示。\n\n\
  ```\npackage models\ntype Category struct {\nID int\nCategoryName string\n}\n清单\
  \ 35-8\nmodels 文件夹中 category.go 文件的内容\n```\n\n在定义嵌入字段的类型时，我尽量选择那些在字段被提升时仍然有用的字段名。在本例中，之所以选择\
  \ `CategoryName` 这个字段名，是为了避免与外部 `Product` 类型定义的字段冲突，尽管如果作为独立类型，我不会选用这个名称。\n\n##\
  \ 定义仓储接口\n\n我喜欢用仓储来将应用程序中的数据源与使用数据的代码分离开。在 `sportsstore/models` 文件夹中添加一个名为 `repository.go`\
  \ 的文件，其内容如清单 35-9 所示。\n\n```\npackage models\ntype Repository interface {\nGetProduct(id\
  \ int) Product\nGetProducts() []Product\nGetCategories() []Category\nSeed()\n}\n\
  清单 35-9\nmodels 文件夹中 repository.go 文件的内容\n```\n\n我将为 `Repository` 接口创建一个服务，这样就能轻松地更改应用程序所使用的数据源。\n\
  \n请注意，清单 35-9 中定义的 `GetProduct`、`GetProducts` 和 `GetCategories` 方法返回的是值而非指针。我倾向于使用值，以防止使用数据的代码通过指针进行修改，从而影响仓储管理的数据。这种方法意味着数据值会被复制，但能确保不会因通过共享引用意外修改而产生奇怪的影响。换句话说，我不希望仓储在提供数据访问时，让使用数据的代码共享引用。\n\
  \n## 实现（临时）仓储\n\n我会将 SportsStore 的数据存储在关系型数据库中，但我更倾向于先基于内存实现一个简单的仓储，在基本应用功能完成前使用它。\n\
  \n项目开发过程中，方法上的调整是不可避免的。如果一开始就使用数据库作为仓储，我就很难再去修改已经写好的 SQL 查询语句。这最终会导致我为了绕开 SQL 的限制而调整应用程序代码——我知道这并不合理，但我知道自己还是会这么做。你可能更有自律性，但对我来说，先使用简单的内存仓储，等我完全清楚数据的最终形态后再编写\
  \ SQL，效果最好。\n\n在 `sportsstore/models/repo` 文件夹中创建名为 `memory_repo.go` 的文件，其内容如清单\
  \ 35-10 所示。\n\n```\npackage repo\nimport (\n\"platform/services\"\n\"sportsstore/models\"\
  \n)\nfunc RegisterMemoryRepoService() {\nservices.AddSingleton(func() models.Repository\
  \ {\nrepo := &MemoryRepo{}\nrepo.Seed()\nreturn repo\n})\n}\ntype MemoryRepo struct\
  \ {\nproducts []models.Product\ncategories []models.Category\n}\nfunc (repo *MemoryRepo)\
  \ GetProduct(id int) (product models.Product) {\nfor _, p := range repo.products\
  \ {\nif (p.ID == id) {\nproduct = p\nreturn\n}\n}\nreturn\n}\nfunc (repo *MemoryRepo)\
  \ GetProducts() (results []models.Product) {\nreturn repo.products\n}\nfunc (repo\
  \ *MemoryRepo) GetCategories() (results []models.Category) {\nreturn repo.categories\n\
  }\n清单 35-10\nmodels/repo 文件夹中 memory_repo.go 文件的内容\n```\n\n`MemoryRepo` 结构体实现了 `Repository`\
  \ 接口所需的大部分功能，将值存储在切片中。为了实现 `Seed` 方法，在 `repo` 文件夹中添加名为 `memory_repo_seed.go` 的文件，其内容如清单\
  \ 35-11 所示。\n\n```\npackage repo\nimport (\n\"fmt\"\n\"math/rand\"\n\"sportsstore/models\"\
  \n)\nfunc (repo *MemoryRepo) Seed() {\nrepo.categories = make([]models.Category,\
  \ 3)\nfor i := 0; i < 3; i++ {\ncatName := fmt.Sprintf(\"Category_%v\", i + 1)\n\
  repo.categories[i]= models.Category{ID: i + 1, CategoryName: catName}\n}\nfor i\
  \ := 0; i < 20; i++ {\nname := fmt.Sprintf(\"Product_%v\", i + 1)\nprice := rand.Float64()\
  \ * float64(rand.Intn(500))\ncat := &repo.categories[rand.Intn(len(repo.categories))]\n\
  repo.products = append(repo.products, models.Product{\nID: i + 1,\nName: name, Price:\
  \ price,\nDescription: fmt.Sprintf(\"%v (%v)\", name, cat.CategoryName),\nCategory:\
  \ cat,\n})\n}\n}\n清单 35-11\nmodels/repo 文件夹中 memory_repo_seed.go 文件的内容\n```\n\n\
  我将该方法单独定义，这样在向仓储添加功能时，就不必每次都列出种子数据的代码。\n\n### 显示产品列表\n\n显示内容的第一步是展示待售产品的列表。创建 `sportsstore/store`\
  \ 文件夹，并在其中添加名为 `product_handler.go` 的文件，其内容如清单 35-12 所示。\n\n```\npackage store\n\
  import (\n\"sportsstore/models\"\n\"platform/http/actionresults\"\n)\ntype ProductHandler\
  \ struct {\nRepository models.Repository\n}\ntype ProductTemplateContext struct\
  \ {\nProducts []models.Product\n}\nfunc (handler ProductHandler) GetProducts() actionresults.ActionResult\
  \ {\nreturn actionresults.NewTemplateAction(\"product_list.html\",\nProductTemplateContext\
  \ {\nProducts: handler.Repository.GetProducts(),\n})\n}\n清单 35-12\nstore 文件夹中 product_handler.go\
  \ 文件的内容\n```\n\n`GetProducts` 方法渲染一个名为 `product_list.html` 的模板，并传入一个 `ProductTemplateContext`\
  \ 值，稍后我将利用它向模板提供更多信息。\n\n注意\n\n从匿名嵌入结构体字段提升的方法不会生成路由，这是为了避免意外创建路由，从而将请求处理器的内部机制暴露给\
  \ HTTP 请求。这一决定带来的一个后果是，它也会排除那些与提升方法同名的结构体方法。正因如此，我才为 `ProductHandler` 结构体中的 `Products`\
  \ 字段显式命名。如果我没有这样做，那么 `GetProducts` 方法就不会用于生成路由，因为它与 `models.Repository` 接口中定义的方法名重合。\n\
  \n\n\n## 创建模板和布局\n\n为了定义模板，需要创建 `sportsstore/templates` 文件夹，并在其中添加一个名为 `product_list.html`\
  \ 的文件，其内容如清单 35-13 所示。\n\n```\n{{ layout \"store_layout.html\" }}\n{{ range .Products\
  \ }}\n\n{{.ID}}, {{ .Name }}, {{ printf \"$%.2f\" .Price }}, {{ .CategoryName }}\n\
  \n{{ end }}\n```\n\n*清单 35-13：`templates` 文件夹中 `product_list.html` 文件的内容*\n\n该布局对处理器提供的结构体中的\
  \ `Product` 字段使用 `range` 表达式，为 `Repository` 中的每个 `Product` 生成一个 `div` 元素。\n\n要创建清单\
  \ 35-13 中指定的布局，请将名为 `store_layout.html` 的文件添加到 `sportsstore/templates` 文件夹中，其内容如清单\
  \ 35-14 所示。\n\n```\nSportsStore\n\n{{ body }}\n```\n\n*清单 35-14：`templates` 文件夹中\
  \ `store_layout.html` 文件的内容*\n\n### 配置应用程序\n\n为了注册服务并创建 SportsStore 应用程序所需的管道，请将\
  \ `main.go` 文件的内容替换为清单 35-15 所示的内容。\n\n```\npackage main\nimport (\n\"sync\"\n\"\
  platform/http\"\n\"platform/http/handling\"\n\"platform/services\"\n\"platform/pipeline\"\
  \n\"platform/pipeline/basic\"\n\"sportsstore/store\"\n\"sportsstore/models/repo\"\
  \n)\nfunc registerServices() {\nservices.RegisterDefaultServices()\nrepo.RegisterMemoryRepoService()\n\
  }\nfunc createPipeline() pipeline.RequestPipeline {\nreturn pipeline.CreatePipeline(\n\
  &basic.ServicesComponent{},\n&basic.LoggingComponent{},\n&basic.ErrorComponent{},\n\
  &basic.StaticFileComponent{},\nhandling.NewRouter(\nhandling.HandlerEntry{ \"\"\
  ,  store.ProductHandler{}},\n).AddMethodAlias(\"/\", store.ProductHandler.GetProducts),\n\
  )\n}\nfunc main() {\nregisterServices()\nresults, err := services.Call(http.Serve,\
  \ createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n```\n\n*清单 35-15：替换 `sportsstore` 文件夹中 `main.go` 文件的内容*\n\
  \n默认服务已注册，同时注册的还有内存存储库。管道包含第 34 章创建的基本组件，并设置了包含 `ProductHandler` 的路由器。\n\n编译并执行该项目，然后使用浏览器请求\
  \ `http://localhost:5000`，将得到如图 35-1 所示的响应。\n\n![../images/512642_1_En_35_Chapter/512642_1_En_35_Fig1_HTML.jpg](img/512642_1_En_35_Fig1_HTML.jpg)\n\
  \n*图 35-1：显示产品列表*\n\n**处理 Windows 防火墙权限请求**\n\n如前几章所述，每次使用 `go run` 命令编译项目时，Windows\
  \ 都会提示授予防火墙权限，这可以通过一个简单的 PowerShell 脚本避免。提醒一下，以下是我保存为 `buildandrun.ps1` 的脚本内容：\n\
  \n```\n$file = \"./sportsstore.exe\"\n&go build -o $file\nif ($LASTEXITCODE -eq\
  \ 0) {\n&$file\n}\n```\n\n要构建并执行该项目，请在 `sportsstore` 文件夹中使用命令 `./buildandrun.ps1`。\n\
  \n## 添加分页功能\n\n图 35-1 的输出显示存储库中的所有产品都显示在一个列表中。下一步是添加对分页的支持，以便向用户展示少量产品，并能够在不同页面之间切换。我喜欢先在存储库中进行更改，然后逐步推进到显示数据的模板。清单\
  \ 35-16 向 `Repository` 接口添加了一个方法，用于请求一页 `Product` 值。\n\n```\npackage models\ntype\
  \ Repository interface {\nGetProduct(id int) Product\nGetProducts() []Product\n\
  GetProductPage(page, pageSize int) (products []Product, totalAvailable int)\nGetCategories()\
  \ []Category\nSeed()\n}\n```\n\n*清单 35-16：在 `models` 文件夹的 `repository.go` 文件中添加方法*\n\
  \n`GetProductPage` 方法返回一个 `Product` 切片以及存储库中的项目总数。清单 35-17 在内存存储库中实现了该新方法。\n\n```\n\
  package repo\nimport (\n\"platform/services\"\n\"sportsstore/models\"\n\"math\"\n\
  )\nfunc RegisterMemoryRepoService() {\nservices.AddSingleton(func() models.Repository\
  \ {\nrepo := &MemoryRepo{}\nrepo.Seed()\nreturn repo\n})\n}\ntype MemoryRepo struct\
  \ {\nproducts []models.Product\ncategories []models.Category\n}\nfunc (repo *MemoryRepo)\
  \ GetProduct(id int) (product models.Product) {\nfor _, p := range repo.products\
  \ {\nif (p.ID == id) {\nproduct = p\nreturn\n}\n}\nreturn\n}\nfunc (repo *MemoryRepo)\
  \ GetProducts() (results []models.Product) {\nreturn repo.products\n}\nfunc (repo\
  \ *MemoryRepo) GetCategories() (results []models.Category) {\nreturn repo.categories\n\
  }\nfunc (repo *MemoryRepo) GetProductPage(page, pageSize int) ([]models.Product,\
  \ int) {\nreturn getPage(repo.products, page, pageSize), len(repo.products)\n}\n\
  func getPage(src []models.Product, page, pageSize int) []models.Product {\nstart\
  \ := (page -1) * pageSize\nif page > 0 && len(src) > start {\nend := (int)(math.Min((float64)(len(src)),\
  \ (float64)(start + pageSize)))\nreturn src[start : end]\n}\nreturn []models.Product{}\n\
  }\n```\n\n*清单 35-17：在 `models/repo` 文件夹的 `memory_repo.go` 文件中实现方法*\n\n清单 35-18 更新了请求处理器，使其选择一页数据并将其传递给模板，同时传递支持分页所需的额外结构体字段。\n\
  \n```\npackage store\nimport (\n\"sportsstore/models\"\n\"platform/http/actionresults\"\
  \n\"platform/http/handling\"\n\"math\"\n)\nconst pageSize = 4\ntype ProductHandler\
  \ struct {\nRepository models.Repository\nURLGenerator handling.URLGenerator\n}\n\
  type ProductTemplateContext struct {\nProducts []models.Product\nPage int\nPageCount\
  \ int\nPageNumbers []int\nPageUrlFunc func(int) string\n}\nfunc (handler ProductHandler)\
  \ GetProducts(page int) actionresults.ActionResult {\nprods, total := handler.Repository.GetProductPage(page,\
  \ pageSize)\npageCount := int(math.Ceil(float64(total) / float64(pageSize)))\nreturn\
  \ actionresults.NewTemplateAction(\"product_list.html\",\nProductTemplateContext\
  \ {\nProducts: prods,\nPage: page,\nPageCount: pageCount,\nPageNumbers: handler.generatePageNumbers(pageCount),\n\
  PageUrlFunc: handler.createPageUrlFunction(),\n})\n}\nfunc (handler ProductHandler)\
  \ createPageUrlFunction() func(int) string {\nreturn func(page int) string {\nurl,\
  \ _ := handler.URLGenerator.GenerateUrl(ProductHandler.GetProducts, page)\nreturn\
  \ url\n}\n}\nfunc (handler ProductHandler) generatePageNumbers(pageCount int) (pages\
  \ []int) {\npages = make([]int, pageCount)\nfor i := 0; i < pageCount; i++ {\npages[i]\
  \ = i + 1\n}\nreturn\n}\n```\n\n*清单 35-18：在 `store` 文件夹的 `product_handler.go` 文件中更新处理器方法*\n\
  \n\n\n清单 35-18 中包含许多新语句，因为处理程序必须向模板提供更多信息以支持分页。`GetProducts`方法已被修改为接受一个参数，该参数用于获取一页数据。传递给模板的结构体所定义的额外字段包括：选定的页面、用于生成页面导航链接的函数，以及包含连续数字的切片（这是必需的，因为模板可以使用`range`但不能使用`for`循环来生成内容）。清单\
  \ 35-19 更新了模板以使用这些新信息。\n\n```\n{{ layout \"store_layout.html\" }}\n{{ $context :=\
  \ . }}\n{{ range .Products }}\n\n{{.ID}}, {{ .Name }}, {{ printf \"$%.2f\" .Price\
  \ }}, {{ .CategoryName }}\n\n{{ end }}\n{{ range .PageNumbers}}\n{{ if eq $context.Page\
  \ .}}\n{{ . }}\n{{ else }}\n{{ . }}\n{{ end }}\n{{ end }}\nListing 35-19\nSupporting\
  \ Pagination in the product_list.html File in the templates Folder\n```\n\n我定义了一个`$context`变量，以便始终可以轻松访问由处理程序方法传递给模板的结构体值。新的`range`表达式枚举了页码列表，并为除当前选中页之外的所有页面显示导航链接。链接的\
  \ URL 是通过调用分配给上下文结构体`PageUrlFunc`字段的函数来创建的。\n\n接下来，需要对路由系统的别名进行更改，以便默认 URL 和`/products`\
  \ URL 都能触发重定向到产品第一页，如清单 35-20 所示。\n\n```\n...\nfunc createPipeline() pipeline.RequestPipeline\
  \ {\nreturn pipeline.CreatePipeline(\n&basic.ServicesComponent{},\n&basic.LoggingComponent{},\n\
  &basic.ErrorComponent{},\n&basic.StaticFileComponent{},\nhandling.NewRouter(\nhandling.HandlerEntry{\
  \ \"\",  store.ProductHandler{}},\n).AddMethodAlias(\"/\", store.ProductHandler.GetProducts,\
