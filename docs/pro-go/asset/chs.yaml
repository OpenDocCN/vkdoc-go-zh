  \n```\nValue: London\nValue: 279\nValue: Alice\n```\n\n## 使用指针\n\n`reflect` 包提供了表\
  \ 28-2 所示的函数和方法，用于处理指针类型。\n\n**表 28-2.** `reflect` 包中用于指针的函数和方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `PtrTo(type)` | 此函数返回一个 `Type`，该 `Type` 是指向作为参数传入的 `Type` 的指针。\
  \ |\n| `Elem()` | 此方法在指针类型上调用，返回底层的 `Type`。在非指针类型上使用此方法会导致恐慌。 |\n\n`PtrTo` 函数创建指针类型，而\
  \ `Elem` 方法返回被指向的类型，如清单 28-3 所示。\n\n```\npackage main\n\nimport (\n    \"reflect\"\
  \n    //\"strings\"\n    // \"fmt\"\n)\n\nfunc createPointerType(t reflect.Type)\
  \ reflect.Type {\n    return reflect.PtrTo(t)\n}\n\nfunc followPointerType(t reflect.Type)\
  \ reflect.Type {\n    if t.Kind() == reflect.Ptr {\n        return t.Elem()\n  \
  \  }\n    return t\n}\n\nfunc main() {\n    name := \"Alice\"\n    t := reflect.TypeOf(name)\n\
  \    Printfln(\"Original Type: %v\", t)\n    pt := createPointerType(t)\n    Printfln(\"\
  Pointer Type: %v\", pt)\n    Printfln(\"Follow pointer type: %v\", followPointerType(pt))\n\
  }\n```\n\n**清单 28-3.** 在 `reflection` 文件夹的 `main.go` 文件中使用指针类型\n\n`PtrTo` 函数从 `reflect`\
  \ 包中导出。它可以在任何类型（包括指针类型）上调用，结果是一个指向原始类型的类型，因此 `string` 类型产生 `*string` 类型，而 `*string`\
  \ 产生 `**string`。\n\n`Elem` 是 `Type` 接口定义的一个方法，只能用于指针类型，这就是为什么清单 28-3 中的 `followPointerType`\
  \ 函数在调用 `Elem` 方法之前会检查 `Kind` 方法的结果。编译并执行项目，你将看到以下输出：\n\n```\nOriginal Type: string\n\
  Pointer Type: *string\nFollow pointer type: string\n```\n\n### 使用指针值\n\n`Value`\
  \ 结构体定义了表 28-3 所示的方法，用于处理指针值（区别于上一节描述的类型）。\n\n**表 28-3.** 用于处理指针类型的 `Value` 方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Addr()` | 此方法返回一个 `Value`，该 `Value` 是指向调用它的 `Value`\
  \ 的指针。如果 `CanAddr` 方法返回 `false`，此方法会引发恐慌。 |\n| `CanAddr()` | 如果 `Value` 可以与 `Addr`\
  \ 方法一起使用，此方法返回 `true`。 |\n| `Elem()` | 此方法跟踪指针并返回其 `Value`。如果在非指针值上调用此方法，会引发恐慌。\
  \ |\n\n`Elem` 方法用于跟踪指针以获取其底层值，如清单 28-4 所示。其他方法在处理结构体字段时最有用，如“设置结构体字段值”一节所述。\n\n\
  ```\npackage main\n\nimport (\n    \"reflect\"\n    \"strings\"\n    // \"fmt\"\n\
  )\n\nvar stringPtrType = reflect.TypeOf((*string)(nil))\n\nfunc transformString(val\
  \ interface{}) {\n    elemValue := reflect.ValueOf(val)\n    if (elemValue.Type()\
