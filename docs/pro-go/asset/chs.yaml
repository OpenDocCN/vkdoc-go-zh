  \    handler.Repository.SetOrderShipped(&order)\n    return actionresults.NewRedirectAction(mustGenerateUrl(handler.URLGenerator,\
  \ AdminHandler.GetSection, \"Orders\"))\n}\n```\n\n订单唯一允许的修改是改变 `Shipped` 字段的值，以表示订单已发货。将\
  \ `database_handler.go` 文件的内容替换为代码清单 38-7 所示的内容。\n\n```go\npackage admin\n\nimport\
  \ (\n    \"platform/http/actionresults\"\n    \"platform/http/handling\"\n    \"\
  sportsstore/models\"\n)\n\ntype DatabaseHandler struct {\n    models.Repository\n\
  \    handling.URLGenerator\n}\n\nfunc (handler DatabaseHandler) GetData() actionresults.ActionResult\
  \ {\n    return actionresults.NewTemplateAction(\"admin_database.html\", struct\
  \ {\n        InitUrl, SeedUrl string\n    }{\n        InitUrl: mustGenerateUrl(handler.URLGenerator,\
  \ DatabaseHandler.PostDatabaseInit),\n        SeedUrl: mustGenerateUrl(handler.URLGenerator,\
  \ DatabaseHandler.PostDatabaseSeed),\n    })\n}\n\nfunc (handler DatabaseHandler)\
  \ PostDatabaseInit() actionresults.ActionResult {\n    handler.Repository.Init()\n\
  \    return actionresults.NewRedirectAction(mustGenerateUrl(handler.URLGenerator,\
  \ AdminHandler.GetSection, \"Database\"))\n}\n\nfunc (handler DatabaseHandler) PostDatabaseSeed()\
  \ actionresults.ActionResult {\n    handler.Repository.Seed()\n    return actionresults.NewRedirectAction(mustGenerateUrl(handler.URLGenerator,\
  \ AdminHandler.GetSection, \"Database\"))\n}\n```\n\n这里为每个可在数据库上执行的操作都提供了处理器方法。这样一来，在本章后续完成部署准备后，管理员就可以快速启动应用程序。\n\
  \n\n\n### 创建模板\n\n要创建用于管理订单的模板，请在 `sportsstore/templates` 文件夹中添加名为 `admin_orders.html`\
  \ 的文件，其内容如清单 38-8 所示。\n\n```\n{{ $context := .}}\n\nIDNameAddress\n\n{{ range $context.Orders\
  \ }}\n\n{{ .ID }}\n{{ .Name }}\n{{ .StreetAddr }}, {{ .City }}, {{ .State }},\n\
  {{ .Country }}, {{ .Zip }}\n\n{{ if .Shipped }}\n\nShip Order\n\n{{ else }}\n\n\
  Mark Unshipped\n\n{{ end }}\n\nQuantityProduct\n{{ range .Products }}\n\n{{ .Quantity\
  \ }}\n{{ .Product.Name }}\n\n{{ end }}\n{{ end }}\n```\n\n清单 38-8\n`templates` 文件夹中\
  \ `admin_orders.html` 文件的内容\n\n该模板以表格形式显示订单，并包含每个订单中所含产品的详细信息。要创建用于管理数据库的模板，请在 `sportsstore/templates`\
  \ 文件夹中添加名为 `admin_database.html` 的文件，其内容如清单 38-9 所示。\n\n```\n{{ $context := . }}\n\
  \nInitialize Database\n\nSeed Database\n```\n\n清单 38-9\n`templates` 文件夹中 `admin_database.html`\
  \ 文件的内容\n\n编译并执行项目，使用浏览器请求 `http://localhost:5000/admin`，然后点击 Orders 按钮即可查看数据库中的订单并更改其发货状态，如图\
  \ 38-1 所示。点击 Database 按钮，您将能够重置和初始化（seed）数据库，同样见图 38-1。\n\n![../images/512642_1_En_38_Chapter/512642_1_En_38_Fig1_HTML.jpg](img/512642_1_En_38_Fig1_HTML.jpg)\n\
  \n图 38-1\n完成管理功能\n\n## 限制对管理功能的访问\n\n允许开放访问管理功能可以简化开发，但在生产环境中绝不允许这样做。现在管理功能已经完成，是时候确保只有授权用户才能访问它们了。\n\
  \n### 创建用户存储和请求处理器\n\n如前所述，我没有实现一个真正的身份验证系统，因为安全地实现这一点很困难，也超出了本书的范围。相反，我将采用与 `platform`\
  \ 项目类似的方法，依赖硬编码的凭据来验证用户身份。创建 `sportsstore/admin/auth` 文件夹，并在其中添加一个名为 `user_store.go`\
  \ 的文件，其内容如清单 38-10 所示。\n\n```\npackage auth\nimport (\n\"platform/services\"\n\"\
  platform/authorization/identity\"\n\"strings\"\n)\nfunc RegisterUserStoreService()\
  \ {\nerr := services.AddSingleton(func () identity.UserStore {\nreturn &userStore{}\n\
  })\nif (err != nil) {\npanic(err)\n}\n}\nvar users = map[int]identity.User {\n1:\
  \ identity.NewBasicUser(1, \"Alice\", \"Administrator\"),\n}\ntype userStore struct\
  \ {}\nfunc (store *userStore) GetUserByID(id int) (identity.User, bool) {\nuser,\
  \ found := users[id]\nreturn user, found\n}\nfunc (store *userStore) GetUserByName(name\
  \ string) (identity.User, bool) {\nfor _, user := range users {\nif strings.EqualFold(user.GetDisplayName(),\
  \ name) {\nreturn user, true\n}\n}\nreturn nil, false\n}\n```\n\n清单 38-10\n`admin/auth`\
  \ 文件夹中 `user_store.go` 文件的内容\n\n要创建用于处理身份验证请求的处理器，请在 `sportsstore/admin` 文件夹中添加一个名为\
  \ `auth_handler.go` 的文件，其内容如清单 38-11 所示。\n\n```\npackage admin\nimport (\n\"platform/authorization/identity\"\
  \n\"platform/http/actionresults\"\n\"platform/http/handling\"\n\"platform/sessions\"\
  \n)\ntype AuthenticationHandler struct {\nidentity.User\nidentity.SignInManager\n\
  identity.UserStore\nsessions.Session\nhandling.URLGenerator\n}\nconst SIGNIN_MSG_KEY\
  \ string = \"signin_message\"\nfunc (handler AuthenticationHandler) GetSignIn()\
  \ actionresults.ActionResult {\nmessage := handler.Session.GetValueDefault(SIGNIN_MSG_KEY,\
  \ \"\").(string)\nreturn actionresults.NewTemplateAction(\"signin.html\", message)\n\
  }\ntype Credentials struct {\nUsername string\nPassword string\n}\nfunc (handler\
  \ AuthenticationHandler) PostSignIn(creds Credentials) actionresults.ActionResult\
  \ {\nif creds.Password == \"mysecret\" {\nuser, ok := handler.UserStore.GetUserByName(creds.Username)\n\
  if (ok) {\nhandler.Session.SetValue(SIGNIN_MSG_KEY, \"\")\nhandler.SignInManager.SignIn(user)\n\
  return actionresults.NewRedirectAction(\"/admin/section/\")\n}\n}\nhandler.Session.SetValue(SIGNIN_MSG_KEY,\
  \ \"Access Denied\")\nreturn actionresults.NewRedirectAction(mustGenerateUrl(handler.URLGenerator,\n\
  AuthenticationHandler.GetSignIn))\n}\nfunc (handler AuthenticationHandler) PostSignOut(creds\
  \ Credentials) actionresults.ActionResult {\nhandler.SignInManager.SignOut(handler.User)\n\
  return actionresults.NewRedirectAction(\"/\")\n}\n```\n\n清单 38-11\n`admin` 文件夹中\
  \ `auth_handler.go` 文件的内容\n\n`GetSignIn` 方法渲染一个模板，该模板会提示用户输入其凭据，并显示存储在会话中的消息。`PostSignIn`\
  \ 方法从表单接收凭据，然后将用户登录到应用程序，或者向会话添加一条消息并重定向浏览器，以便用户可以再次尝试。\n\n要创建让用户登录应用程序的模板，请在 `sportsstore/templates`\
  \ 文件夹中添加一个名为 `signin.html` 的文件，其内容如清单 38-12 所示。\n\n```\n{{ layout \"simple_layout.html\"\
  \ }}\n{{ if ne . \"\" }}\n{{ . }}\n{{ end }}\n\nUsername:\n\nPassword:\n\nSign In\n\
  ```\n\n清单 38-12\n`templates` 文件夹中 `signin.html` 文件的内容\n\n该模板提示用户输入其账户名和密码，这些信息会回发到请求处理器。\n\
  \n要允许用户退出应用程序，请在 `sportsstore/admin` 文件夹中添加一个名为 `signout_handler.go` 的文件，其内容如清单\
  \ 38-13 所示。\n\n```\npackage admin\nimport (\n\"platform/authorization/identity\"\
  \n\"platform/http/actionresults\"\n\"platform/http/handling\"\n)\ntype SignOutHandler\
  \ struct {\nidentity.User\nhandling.URLGenerator\n}\nfunc (handler SignOutHandler)\
  \ GetUserWidget() actionresults.ActionResult {\nreturn actionresults.NewTemplateAction(\"\
  user_widget.html\", struct {\nidentity.User\nSignoutUrl string}{\nhandler.User,\n\
  mustGenerateUrl(handler.URLGenerator,\nAuthenticationHandler.PostSignOut),\n})\n\
  }\n```\n\n清单 38-13\n`admin` 文件夹中 `signout_handler.go` 文件的内容\n\n要创建让用户退出的模板，请在 `sportsstore/templates`\
  \ 文件夹中添加一个名为 `user_widget.html` 的文件，其内容如清单 38-14 所示。\n\n```\n{{ $context := . }}\n\
  {{ if $context.User.IsAuthenticated }}\n\nSign Out\n\n{{ end }}\n```\n\n清单 38-14\n\
  `templates` 文件夹中 `user_widget.html` 文件的内容\n\n清单 38-15 将用户控件（user widget）添加到了用于管理功能的布局中。\n\
  \n```\n...\n\nSPORTS STORE Administration\n\n{{ handler \"signout\" \"getuserwidget\"\
  \ }}\n\n...\n```\n\n清单 38-15\n在 `templates` 文件夹的 `admin.html` 文件中添加控件\n\n\n\n###\
  \ 配置应用程序\n\n清单 38-16 添加了一项配置设置，用于指定在请求受限 URL 时使用的 URL，这比直接返回状态码提供了更有用的替代方案。\n\n\
  ```json\n{\n\"logging\" : {\n\"level\": \"debug\"\n},\n\"files\": {\n\"path\": \"\
  files\"\n},\n\"templates\": {\n\"path\": \"templates/*.html\",\n\"reload\": true\n\
  },\n\"sessions\": {\n\"key\": \"MY_SESSION_KEY\",\n\"cyclekey\": true\n},\n\"sql\"\
  : {\n// ...为简洁起见，省略了设置...\n},\n\"authorization\": {\n\"failUrl\": \"/signin\"\n\
  }\n}\n```\n\n*清单 38-16：在 `sportsstore` 文件夹的 `config.json` 文件中添加配置设置*\n\n指定的 URL\
  \ 将提示用户输入其凭据。清单 38-17 重新配置了请求管道，以保护管理功能。\n\n```go\npackage main\nimport (\n\"sync\"\
  \n\"platform/http\"\n\"platform/http/handling\"\n\"platform/services\"\n\"platform/pipeline\"\
  \n\"platform/pipeline/basic\"\n\"sportsstore/store\"\n\"sportsstore/models/repo\"\
  \n\"platform/sessions\"\n\"sportsstore/store/cart\"\n\"sportsstore/admin\"\n\"platform/authorization\"\
  \n\"sportsstore/admin/auth\"\n)\nfunc registerServices() {\nservices.RegisterDefaultServices()\n\
  //repo.RegisterMemoryRepoService()\nrepo.RegisterSqlRepositoryService()\nsessions.RegisterSessionService()\n\
  cart.RegisterCartService()\nauthorization.RegisterDefaultSignInService()\nauthorization.RegisterDefaultUserService()\n\
  auth.RegisterUserStoreService()\n}\nfunc createPipeline() pipeline.RequestPipeline\
  \ {\nreturn pipeline.CreatePipeline(\n&basic.ServicesComponent{},\n&basic.LoggingComponent{},\n\
  &basic.ErrorComponent{},\n&basic.StaticFileComponent{},\n&sessions.SessionComponent{},\n\
  authorization.NewAuthComponent(\n\"admin\",\nauthorization.NewRoleCondition(\"Administrator\"\
  ),\nadmin.AdminHandler{},\nadmin.ProductsHandler{},\nadmin.CategoriesHandler{},\n\
  admin.OrdersHandler{},\nadmin.DatabaseHandler{},\nadmin.SignOutHandler{},\n).AddFallback(\"\
  /admin/section/\", \"^/admin[/]?$\"),\nhandling.NewRouter(\nhandling.HandlerEntry{\
  \ \"\",  store.ProductHandler{}},\nhandling.HandlerEntry{ \"\",  store.CategoryHandler{}},\n\
  handling.HandlerEntry{ \"\", store.CartHandler{}},\nhandling.HandlerEntry{ \"\"\
  , store.OrderHandler{}},\n// handling.HandlerEntry{ \"admin\", admin.AdminHandler{}},\n\
  // handling.HandlerEntry{ \"admin\", admin.ProductsHandler{}},\n// handling.HandlerEntry{\
  \ \"admin\", admin.CategoriesHandler{}},\n// handling.HandlerEntry{ \"admin\", admin.OrdersHandler{}},\n\
  // handling.HandlerEntry{ \"admin\", admin.DatabaseHandler{}},\nhandling.HandlerEntry{\
  \ \"\", admin.AuthenticationHandler{}},\n).AddMethodAlias(\"/\", store.ProductHandler.GetProducts,\
  \ 0, 1).\nAddMethodAlias(\"/products[/]?[A-z0-9]*?\",\nstore.ProductHandler.GetProducts,\
  \ 0, 1),    )\n}\nfunc main() {\nregisterServices()\nresults, err := services.Call(http.Serve,\
  \ createPipeline())\nif (err == nil) {\n(results[0].(*sync.WaitGroup)).Wait()\n\
  } else {\npanic(err)\n}\n}\n```\n\n*清单 38-17：在 `sportsstore` 文件夹的 `main.go` 文件中配置应用程序*\n\
  \n编译并执行应用程序，然后使用浏览器请求 `http://localhost:5000/admin`。当提示时，使用用户名 `alice` 和密码 `mysecret`\
  \ 进行身份验证，您将被授予访问管理功能的权限，如图 38-2 所示。\n\n![../images/512642_1_En_38_Chapter/512642_1_En_38_Fig2_HTML.jpg](img/512642_1_En_38_Fig2_HTML.jpg)\n\
  \n*图 38-2：登录应用程序*\n\n## 创建 Web 服务\n\n我要添加的最后一个功能是一个简单的 Web 服务，只是为了展示如何实现。我不会使用授权来保护该\
  \ Web 服务，因为这可能是一个复杂的过程，取决于预期需要访问的客户端类型。这意味着任何用户都能够修改数据库。如果您要部署一个真正的 Web 服务，那么您可以像本示例中那样使用\
  \ cookie。如果您的客户端不支持 cookie，则可以使用 JSON Web 令牌（JWT），如 [`https://jwt.io`](https://jwt.io)\
  \ 所述。\n\n要创建 Web 服务，请在 `sportsstore/store` 文件夹中添加一个名为 `rest_handler.go` 的文件，其内容如清单\
  \ 38-18 所示。\n\n```go\npackage store\nimport (\n\"sportsstore/models\"\n\"platform/http/actionresults\"\
  \n\"net/http\"\n)\ntype StatusCodeResult struct {\ncode int\n}\nfunc (action *StatusCodeResult)\
  \ Execute(ctx *actionresults.ActionContext) error {\nctx.ResponseWriter.WriteHeader(action.code)\n\
  return nil\n}\ntype RestHandler struct {\nRepository models.Repository\n}\nfunc\
  \ (h RestHandler) GetProduct(id int) actionresults.ActionResult {\nreturn actionresults.NewJsonAction(h.Repository.GetProduct(id))\n\
  }\nfunc (h RestHandler) GetProducts() actionresults.ActionResult {\nreturn actionresults.NewJsonAction(h.Repository.GetProducts())\n\
  }\ntype ProductReference struct {\nmodels.Product\nCategoryID int\n}\nfunc (h RestHandler)\
  \ PostProduct(p ProductReference) actionresults.ActionResult {\nif p.ID == 0 {\n\
  return actionresults.NewJsonAction(h.processData(p))\n} else {\nreturn &StatusCodeResult{\
  \ http.StatusBadRequest }\n}\n}\nfunc (h RestHandler) PutProduct(p ProductReference)\
  \ actionresults.ActionResult {\nif p.ID > 0 {\nreturn actionresults.NewJsonAction(h.processData(p))\n\
  } else {\nreturn &StatusCodeResult{ http.StatusBadRequest }\n}\n}\nfunc (h RestHandler)\
  \ processData(p ProductReference) models.Product {\nproduct := p.Product\nproduct.Category\
  \ = &models.Category {\nID: p.CategoryID,\n}\nh.Repository.SaveProduct(&product)\n\
  return h.Repository.GetProduct(product.ID)\n}\n```\n\n*清单 38-18：`store` 文件夹中 `rest_handler.go`\
  \ 文件的内容*\n\n`StatusCodeResult` 结构体是一个操作结果，用于发送 HTTP 状态码，这对 Web 服务非常有用。请求处理程序定义了一些方法，允许通过\
  \ `GET` 请求检索单个产品和所有产品，通过 `POST` 请求创建新产品，以及通过 `PUT` 请求修改现有产品。清单 38-19 将新处理程序注册到前缀\
  \ `/api`。\n\n```go\n...\nhandling.NewRouter(\nhandling.HandlerEntry{ \"\",  store.ProductHandler{}},\n\
  handling.HandlerEntry{ \"\",  store.CategoryHandler{}},\nhandling.HandlerEntry{\
  \ \"\", store.CartHandler{}},\nhandling.HandlerEntry{ \"\", store.OrderHandler{}},\n\
  handling.HandlerEntry{ \"\", admin.AuthenticationHandler{}},\nhandling.HandlerEntry{\
  \ \"api\", store.RestHandler{}},\n).AddMethodAlias(\"/\", store.ProductHandler.GetProducts,\
  \ 0, 1).\nAddMethodAlias(\"/products[/]?[A-z0-9]*?\",\nstore.ProductHandler.GetProducts,\
  \ 0, 1),\n...\n```\n\n*清单 38-19：在 `sportsstore` 文件夹的 `main.go` 文件中注册处理程序*\n\n编译并执行项目。打开一个新的命令提示符，并执行清单\
  \ 38-20 中所示的命令，以向数据库添加新产品。\n\n```bash\ncurl --header \"Content-Type: application/json\"\
  \ --request POST --data '{\"name\" : \"Jet Engine\",\"description\": \"Paddling\
  \ is hard work\", \"price\":650, \"categoryid\":1}' http://localhost:5000/api/product\n\
  ```\n\n*清单 38-20：添加新产品*\n\n如果您使用的是 Windows，请打开一个新的 PowerShell 窗口并运行清单 38-21 中所示的命令。\n\
  \n```powershell\nInvoke-RestMethod http://localhost:5000/api/product -Method POST\
  \ -Body  (@{ Name=\"Jet Engine\"; Description=\"Paddling is hard work\"; Price=650;\
  \ CategoryId=1 } | ConvertTo-Json) -ContentType \"application/json\"\n```\n\n*清单\
  \ 38-21：在 Windows 中添加新产品*\n\n\n\n要查看更改的效果，请运行清单 38-22 中所示的命令。\n\n```\ncurl http://localhost:5000/api/product/10\n\
  Listing 38-22\nRequesting Data\n```\n\n如果您使用 Windows，请在 PowerShell 窗口中运行清单 38-23\
  \ 中所示的命令。\n\n```\nInvoke-RestMethod http://localhost:5000/api/product/10\nListing\
  \ 38-23\nRequesting Data in Windows\n```\n\n您也可以使用浏览器来查看更改的效果。请求 `http://localhost:5000/admin`。使用用户名\
  \ `alice` 和密码 `mysecret` 进行身份验证，然后点击“产品”按钮。表格的最后一行将包含使用 Web 服务创建的产品，如图 38-3 所示。\n\
  \n![../images/512642_1_En_38_Chapter/512642_1_En_38_Fig3_HTML.jpg](img/512642_1_En_38_Fig3_HTML.jpg)\n\
  \nFigure 38-3\n\nChecking the effect of a database change\n\n## 为部署做准备\n\n在本节中，我将完成\
  \ SportsStore 应用程序的准备工作，并创建一个可以部署到生产环境中的容器。这并不是部署 Go 应用程序的唯一方式，但我选择 Docker 容器是因为它们被广泛使用，并且适合\
  \ Web 应用程序。这不是一份完整的部署指南，但能让您了解准备应用程序的流程。\n\n### 安装证书\n\n第一步是添加用于 HTTPS 的证书。如第 24\
  \ 章所述，如果您没有真正的证书，可以创建一个自签名证书，或者使用本书 GitHub 仓库中的证书文件（其中包含我创建的一个自签名证书）。\n\n### 配置应用程序\n\
  \n最重要的更改是修改应用程序配置，以禁用那些在开发时方便但在部署中不应使用的功能，并启用 HTTPS，如清单 38-24 所示。\n\n```\n{\n\"\
  logging\" : {\n\"level\": \"information\"\n},\n\"files\": {\n\"path\": \"files\"\
  \n},\n\"templates\": {\n\"path\": \"templates/*.html\",\n\"reload\": false\n},\n\
  \"sessions\": {\n\"key\": \"MY_SESSION_KEY\",\n\"cyclekey\": false\n},\n\"sql\"\
  : {\n\"connection_str\": \"store.db\",\n\"always_reset\": false,\n\"commands\":\
  \ {\n\"Init\": \"sql/init_db.sql\",\n\"Seed\": \"sql/seed_db.sql\",\n\"GetProduct\"\
  : \"sql/get_product.sql\",\n\"GetProducts\": \"sql/get_products.sql\",\n\"GetCategories\"\
  : \"sql/get_categories.sql\",\n\"GetPage\": \"sql/get_product_page.sql\",\n\"GetPageCount\"\
  : \"sql/get_page_count.sql\",\n\"GetCategoryPage\": \"sql/get_category_product_page.sql\"\
  ,\n\"GetCategoryPageCount\": \"sql/get_category_product_page_count.sql\",\n\"GetOrder\"\
  : \"sql/get_order.sql\",\n\"GetOrderLines\": \"sql/get_order_lines.sql\",\n\"GetOrders\"\
  : \"sql/get_orders.sql\",\n\"GetOrdersLines\": \"sql/get_orders_lines.sql\",\n\"\
  SaveOrder\": \"sql/save_order.sql\",\n\"SaveOrderLine\": \"sql/save_order_line.sql\"\
  ,\n\"SaveProduct\":          \"sql/save_product.sql\",\n\"UpdateProduct\":     \
  \   \"sql/update_product.sql\",\n\"SaveCategory\":         \"sql/save_category.sql\"\
  ,\n\"UpdateCategory\":       \"sql/update_category.sql\",\n\"UpdateOrder\":    \
  \      \"sql/update_order.sql\"\n}\n},\n\"authorization\": {\n\"failUrl\": \"/signin\"\
  \n},\n\"http\": {\n\"enableHttp\": false,\n\"enableHttps\": true,\n\"httpsPort\"\
  : 5500,\n\"httpsCert\": \"certificate.cer\",\n\"httpsKey\": \"certificate.key\"\n\
  }\n}\nListing 38-24\nChanging Settings in the config.json File in the sportsstore\
  \ Folder\n```\n\n确保您为 `httpsCert` 和 `httpsKey` 属性指定的值与您的证书文件名匹配，并且证书文件位于 `sportsstore`\
  \ 文件夹中。\n\n### 构建应用程序\n\nDocker 容器运行在 Linux 上。如果您使用 Windows，则必须在 PowerShell 窗口中运行清单\
  \ 38-25 中所示的命令，将 Linux 设置为构建目标，以配置 Go 构建工具。如果您运行的是 Linux，则无需执行此操作。\n\n```\n$Env:GOOS\
  \ = \"linux\"; $Env:GOARCH = \"amd64\"\nListing 38-25\nSetting Linux as the Build\
  \ Target\n```\n\n在 `sportsstore` 文件夹中运行清单 38-26 中所示的命令来构建应用程序。\n\n```\ngo build\n\
  Listing 38-26\nBuilding the Application\n```\n\n注\n\n如果您是 Windows 用户，可以通过以下命令恢复到正常的\
  \ Windows 构建：`$Env:GOOS = \"windows\"; $Env:GOARCH = \"amd64\"`。但在完成部署流程之前，请不要运行此命令。\n\
  \n### 安装 Docker Desktop\n\n访问 `docker.com` 并下载安装 Docker Desktop 软件包。按照安装流程操作，重启您的机器，然后运行清单\
  \ 38-27 中所示的命令，检查 Docker 是否已安装并已添加到您的环境路径中。（Docker 的安装过程似乎经常变化，这就是我没有提供更详细说明的原因。）\n\
  \n注\n\n您需要在 `docker.com` 上创建一个帐户才能下载安装程序。\n\n```\ndocker --version\nListing 38-27\n\
  Checking the Docker Desktop Installation\n```\n\n### 创建 Docker 配置文件\n\n要为应用程序创建\
  \ Docker 配置，请在 `sportsstore` 文件夹中创建一个名为 `Dockerfile` 的文件，其内容如清单 38-28 所示。\n\n```\n\
  FROM alpine:latest\nCOPY sportsstore /app/\nCOPY templates /app/templates\nCOPY\
  \ sql/* /app/sql/\nCOPY files/* /app/files/\nCOPY config.json /app/\nCOPY certificate.*\
  \ /app/\nEXPOSE 5500\nWORKDIR /app\nENTRYPOINT [\"./sportsstore\"]\nListing 38-28\n\
  The Contents of the Dockerfile in the sportsstore Folder\n```\n\n这些指令将应用程序及其支持文件复制到一个\
  \ Docker 镜像中，并配置其执行方式。下一步是使用清单 38-28 中定义的指令创建一个镜像。在 `sportsstore` 文件夹中运行清单 38-29\
  \ 中所示的命令来创建一个 Docker 镜像。\n\n```\ndocker build  --tag go_sportsstore .\nListing 38-29\n\
  Creating an Image\n```\n\n确保您已停止所有其他应用程序实例，然后运行清单 38-30 中所示的命令，从该镜像创建一个新容器并执行它。\n\
  \n```\ndocker run -p 5500:5500 go_sportsstore\nListing 38-30\nCreating and Starting\
  \ a Container\n```\n\n给容器一点时间启动，然后使用浏览器请求 `https://localhost:5500`，这将产生如图 38-4 所示的响应。如果您使用了自签名证书，则可能需要通过安全警告。\n\
  \n![../images/512642_1_En_38_Chapter/512642_1_En_38_Fig4_HTML.jpg](img/512642_1_En_38_Fig4_HTML.jpg)\n\
  \nFigure 38-4\n\nRunning the application in a container\n\n应用程序现在已准备好部署。要停止该容器以及任何其他正在运行的容器，请运行清单\
  \ 38-31 中所示的命令。\n\n```\ndocker kill $(docker ps -q)\nListing 38-31\nStopping Containers\n\
  ```\n\n## 总结\n\n在本章中，我通过完成管理功能、配置授权以及创建一个基本的 Web 服务，完成了 SportsStore 应用程序，然后使用 Docker\
  \ 容器为应用程序的部署做好了准备。\n\n这就是我要教给您的关于 Go 的全部内容。我只希望您能像我享受写作这本书一样享受阅读它，并祝愿您在 Go 项目取得圆满成功。\n\
