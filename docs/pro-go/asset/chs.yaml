  \ [Alice London Running]\nModified slice: [Alice Paris Running]\nOriginal slice:\
  \ [Alice London Running]\nModified slice: [Alice Rome Running]\n```\n\n\n\n### 枚举切片与数组\n\
  \n使用 `Len` 方法可以在 `for` 循环中设定枚举数组或切片元素的限制，如代码清单 28-7 所示。\n\n```go\npackage main\n\
  import (\n\"reflect\"\n//\"strings\"\n// \"fmt\"\n)\nfunc enumerateStrings(arrayOrSlice\
  \ interface{}) {\narrayOrSliceVal := reflect.ValueOf(arrayOrSlice)\nif (arrayOrSliceVal.Kind()\
  \ == reflect.Array ||\narrayOrSliceVal.Kind() == reflect.Slice) &&\narrayOrSliceVal.Type().Elem().Kind()\
  \ == reflect.String {\nfor i := 0; i < arrayOrSliceVal.Len(); i++ {\nPrintfln(\"\
  Element: %v, Value: %v\", i, arrayOrSliceVal.Index(i).String())\n}\n}\n}\nfunc main()\
  \ {\nname := \"Alice\"\ncity := \"London\"\nhobby := \"Running\"\nslice := []string\
  \ { name, city, hobby }\narray := [3]string { name, city, hobby}\nenumerateStrings(slice)\n\
  enumerateStrings(array)\n}\n代码清单 28-7\n在 reflection 文件夹的 main.go 文件中枚举数组和切片\n```\n\
  \n`enumerateStrings` 函数检查 `Kind` 结果，以确保处理的是字符串数组或字符串切片。在此过程中，很容易对使用了哪个 `Elem` 方法感到困惑，因为\
  \ `Type` 和 `Value` 都定义了 `Kind` 和 `Elem` 方法。`Kind` 方法执行相同的任务，但在切片或数组的 `Value` 上调用\
  \ `Elem` 方法会导致 panic，而在切片或数组的 `Type` 上调用 `Elem` 方法则会返回元素的 `Type`：\n\n```go\n...\n\
  arrayOrSliceVal.Type().Elem().Kind() == reflect.String {\n...\n```\n\n一旦函数确认处理的是字符串数组或字符串切片，就会使用\
  \ `for` 循环，其限制由 `Len` 方法的结果设定：\n\n```go\n...\nfor i := 0; i < arrayOrSliceVal.Len();\
  \ i++ {\n...\n```\n\n在 `for` 循环内部使用 `Index` 方法获取当前索引处的元素，并使用 `String` 方法获取其值：\n\n\
  ```go\n...\nPrintfln(\"Element: %v, Value: %v\", i, arrayOrSliceVal.Index(i).String())\n\
  ...\n```\n\n注意，枚举其内容时不需要使用指针引用数组。这仅在进行修改时才需要。编译并执行项目，你将看到以下输出，这是对切片和数组的枚举结果：\n\n\
  ```\nElement: 0, Value: Alice\nElement: 1, Value: London\nElement: 2, Value: Running\n\
  Element: 0, Value: Alice\nElement: 1, Value: London\nElement: 2, Value: Running\n\
  ```\n\n### 从现有切片创建新切片\n\n`Slice` 方法用于从一个切片创建另一个切片，如代码清单 28-8 所示。\n\n```go\npackage\
  \ main\nimport (\n\"reflect\"\n//\"strings\"\n// \"fmt\"\n)\nfunc findAndSplit(slice\
  \ interface{}, target interface{}) interface{} {\nsliceVal := reflect.ValueOf(slice)\n\
  targetType := reflect.TypeOf(target)\nif (sliceVal.Kind() == reflect.Slice && sliceVal.Type().Elem()\
  \ == targetType) {\nfor i := 0; i < sliceVal.Len(); i++ {\nif sliceVal.Index(i).Interface()\
  \ == target {\nreturn sliceVal.Slice(0, i +1)\n}\n}\n}\nreturn slice\n}\nfunc main()\
  \ {\nname := \"Alice\"\ncity := \"London\"\nhobby := \"Running\"\nslice := []string\
  \ { name, city, hobby }\n//array := [3]string { name, city, hobby}\nPrintfln(\"\
  Strings: %v\", findAndSplit(slice, \"London\"))\nnumbers := []int {1, 3, 4, 5, 7}\n\
  Printfln(\"Numbers: %v\", findAndSplit(numbers, 4))\n}\n代码清单 28-8\n在 reflection\
  \ 文件夹的 main.go 文件中创建新切片\n```\n\n`findAndSplit` 函数枚举切片，查找指定元素，这通过 `Interface` 方法完成，该方法允许比较切片元素而无需处理特定类型。一旦找到目标元素，就使用\
  \ `Slice` 方法创建并返回一个新切片。编译并执行项目，你将看到以下输出：\n\n```\nStrings: [Alice London]\nNumbers:\
  \ [1 3 4]\n```\n\n### 创建、复制和追加元素到切片\n\n`reflect` 包定义了表 28-7 中描述的函数，这些函数允许将值复制和追加到切片，而无需处理底层类型。\n\
  \n**表 28-7** 用于追加元素到切片的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `MakeSlice(type, len,\
  \ cap)` | 此函数创建一个反映新切片的 `Value`，使用 `Type` 表示元素类型，并具有指定的长度和容量。 |\n| `Append(sliceVal,\
  \ ...val)` | 此函数将一个或多个值追加到指定切片，所有这些值都使用 `Value` 接口表示。结果是修改后的切片。如果对切片之外的任何类型使用该函数，或者值的类型与切片元素类型不匹配，则该函数会引发\
  \ panic。 |\n| `AppendSlice(sliceVal, sliceVal)` | 此函数将一个切片追加到另一个切片。如果任何一个 `Value`\
  \ 不表示切片，或者切片类型不兼容，则该函数会引发 panic。 |\n| `Copy(dst, src)` | 此函数将 `src Value` 反映的切片或数组中的元素复制到\
  \ `dst Value` 反映的切片或数组中。元素会被复制，直到目标切片已满或所有源元素都被复制完毕。源和目标必须具有相同的元素类型。 |\n\n这些函数接受\
  \ `Type` 或 `Value` 参数，这可能违反直觉并需要准备。`MakeSlice` 函数接受一个 `Type` 参数，指定切片类型，并返回一个反映新切片的\
  \ `Value`。其他函数对 `Value` 参数进行操作，如代码清单 28-9 所示。\n\n```go\npackage main\nimport (\n\
  \"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc pickValues(slice interface{}, indices\
  \ ...int) interface{} {\nsliceVal := reflect.ValueOf(slice)\nif (sliceVal.Kind()\
  \ == reflect.Slice) {\nnewSlice := reflect.MakeSlice(sliceVal.Type(), 0, 10)\nfor\
  \ _, index := range indices {\nnewSlice = reflect.Append(newSlice, sliceVal.Index(index))\n\
  }\nreturn newSlice\n}\nreturn nil\n}\nfunc main() {\nname := \"Alice\"\ncity :=\
  \ \"London\"\nhobby := \"Running\"\nslice := []string { name, city, hobby, \"Bob\"\
  , \"Paris\", \"Soccer\" }\npicked := pickValues(slice, 0, 3, 5)\nPrintfln(\"Picked\
  \ values: %v\", picked)\n}\n代码清单 28-9\n在 reflection 文件夹的 main.go 文件中创建新切片\n```\n\
  \n`pickValues` 函数使用从现有切片反映出的 `Type` 创建一个新切片，并使用 `Append` 函数将值添加到新切片。编译并执行项目，你将看到以下输出：\n\
  \n```\nPicked values: [Alice Bob Soccer]\n```\n\n\n\n### 使用映射类型\n\n`Type` 结构体定义了一些可用于检查映射类型的方法，如表\
  \ 28-8 所述。\n\n**表 28-8** 用于映射的 `Type` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Key()`\
  \ | 此方法返回映射键的 `Type`。 |\n| `Elem()` | 此方法返回映射值的 `Type`。 |\n\n除了这些方法之外，`reflect`\
