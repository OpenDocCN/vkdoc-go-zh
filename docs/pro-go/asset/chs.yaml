  \ |\n| 生成响应 | 使用 `ResponseWriter` 接口或便捷函数 | 9 |\n| 处理对特定 URL 的请求 | 使用集成路由器 | 10,\
  \ 12 |\n| 提供静态内容 | 使用 `FileServer` 和 `StripPrefix` 函数 | 13–17 |\n| 使用模板生成响应或生成 JSON\
  \ 响应 | 将内容写入 `ResponseWriter` | 18–20 |\n| 处理表单数据 | 使用 `Request` 方法 | 21–25 |\n\
  | 设置或读取 Cookie | 使用 `Cookie`、`Cookies` 和 `SetCookie` 方法 | 26 |\n\n## 本章准备\n\n为准备本章内容，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `httpserver` 的目录。运行代码清单 24-1 所示的命令来创建模块文件。\n\n提示\n\n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init httpserver\n\
  ```\n\n代码清单 24-1: 初始化模块\n\n在 `httpserver` 文件夹中添加一个名为 `printer.go` 的文件，内容如代码清单 24-2\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string, values\
  \ ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n}\n```\n\n代码清单 24-2:\
  \ `httpserver` 文件夹中 `printer.go` 文件的内容\n\n在 `httpserver` 文件夹中添加一个名为 `product.go`\
  \ 的文件，内容如代码清单 24-3 所示。\n\n```\npackage main\ntype Product struct {\nName, Category\
