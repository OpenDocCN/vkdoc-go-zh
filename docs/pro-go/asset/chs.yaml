  \n**图 3-1** 代码文件中的关键元素\n\n### 理解包声明\n\n第一个语句是包声明。包用于将相关功能分组，每个代码文件都必须声明其内容所属的包。包声明使用\
  \ `package` 关键字，后跟包的名称，如图 3-2 所示。本例文件中的语句指定了一个名为 `main` 的包。\n\n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig2_HTML.jpg](img/512642_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** 为代码文件指定包\n\n### 理解导入语句\n\n接下来的语句是导入语句，用于声明对其它包的依赖。`import` 关键字后跟包名，包名用双引号括起来，如图\
  \ 3-3 所示。清单 3-1 中的导入语句指定了一个名为 `fmt` 的包，这是 Go 内置的用于读写格式化字符串的包（我将在第 17 章中详细描述）。\n\n\
  ![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig3_HTML.jpg](img/512642_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3** 声明包依赖\n\n**提示**\n\nGo 提供的所有内置包的完整列表可在 [`https://golang.org/pkg`](https://golang.org/pkg)\
  \ 上找到。\n\n### 理解函数\n\n`main.go` 文件中的其余语句定义了一个名为 `main` 的函数。我将在第 8 章中详细描述函数，但 `main`\
  \ 函数是特殊的。当你在名为 `main` 的包中定义一个名为 `main` 的函数时，你就创建了一个*入口点*，命令行应用程序的执行正是从这里开始的。图 3-4\
  \ 展示了 `main` 函数的结构。\n\n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig4_HTML.jpg](img/512642_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4** `main` 函数的结构\n\nGo 函数的基本结构与其他语言类似。`func` 关键字表示一个函数，后跟函数名，本例中为 `main`。\n\
  \n清单 3-1 中的函数没有定义参数，由空括号表示，并且不产生任何结果。我将在后续示例中介绍更复杂的函数，但这个简单的函数已足够入门使用。\n\n函数的代码块包含了当该函数被调用时将执行的语句。由于\
  \ `main` 函数是入口点，当项目的编译输出被执行时，该函数将被自动调用。\n\n\n\n### 理解代码语句\n\n`main` 函数包含一条代码语句。当你通过\
  \ `import` 语句声明对某个包的依赖时，会获得一个包引用，从而能够访问该包的功能。默认情况下，包引用被赋值为包名，因此，例如 `fmt` 包提供的功能，需要通过\
  \ `fmt` 包引用来访问，如图 3-5 所示。\n\n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig5_HTML.jpg](img/512642_1_En_3_Fig5_HTML.jpg)\n\
  \n**图 3-5** – 访问包功能\n\n该语句调用了 `fmt` 包提供的一个名为 `Println` 的函数。此函数将字符串写入标准输出，这意味着在下一节构建并运行项目时，该字符串将显示在控制台上。\n\
  \n要访问该函数，需使用包名，后跟句点，然后是函数名：`fmt.Println`。向该函数传递一个参数，即要写入的字符串。\n\n## 在 Go 代码中使用分号\n\
  \nGo 对分号的处理方式不同寻常：分号是终止代码语句所必需的，但在源代码文件中却不需要。实际上，Go 构建工具在处理文件时会自行确定分号应该放在哪里，其效果相当于开发者手动添加了分号。\n\
  \n因此，分号可以在 Go 源代码文件中使用，但并非必需，按惯例通常会省略。\n\n如果你不遵循预期的 Go 代码风格，可能会出现一些奇怪的问题。例如，如果你尝试将\
  \ `function` 或 `for` 循环的左花括号放在下一行，就会收到编译器错误，如下所示：\n\n```\npackage main\nimport \"\
  fmt\"\nfunc main()\n{\nfmt.Println(\"Hello, Go\")\n}\n```\n\n错误信息会提示意外的分号和缺少函数体。这是因为\
  \ Go 工具自动插入了分号，效果如下：\n\n```\npackage main\nimport \"fmt\"\nfunc main();\n{\nfmt.Println(\"\
  Hello, Go\")\n}\n```\n\n当你理解了错误产生的原因后，这些错误信息就变得更有意义了，不过如果你习惯这种花括号放置方式，可能需要一些时间来适应预期的代码格式。\n\
  \n在本书中，我尽量遵循不带分号的约定，但几十年来我一直在使用需要分号的语言编写代码，因此你可能会发现偶尔有示例因习惯而添加了分号。我在“格式化 Go 代码”一节中介绍的\
  \ `go fmt` 命令，会移除分号并调整其他格式问题。\n\n## 编译并运行源代码\n\n`go build` 命令用于编译 Go 源代码并生成可执行文件。在\
  \ `tools` 文件夹中运行清单 3-2 所示的命令来编译代码。\n\n```\ngo build main.go\n```\n\n**清单 3-2** –\
  \ 使用编译器\n\n编译器处理 `main.go` 文件中的语句，并生成一个可执行文件，在 Windows 上命名为 `main.exe`，在其他平台上命名为\
  \ `main`。（一旦我在“定义模块”一节中引入模块，编译器将开始创建具有更有用名称的文件。）\n\n在 `tools` 文件夹中运行清单 3-3 所示的命令来运行可执行文件。\n\
  \n```\n./main\n```\n\n**清单 3-3** – 运行编译后的可执行文件\n\n项目的入口点——即 `main` 包中名为 `main` 的函数——被执行并产生以下输出：\n\
  \n```\nHello, Go\n```\n\n### 配置 Go 编译器\n\nGo 编译器的行为可以通过额外的参数进行配置，尽管默认设置对于大多数项目来说已经足够。最有用的两个参数是\
  \ `-a`（强制完整重新编译，即使文件未更改）和 `-o`（指定编译输出文件的名称）。使用 `go help build` 命令查看所有可用选项的完整列表。默认情况下，编译器生成一个可执行文件，但也有其他可用的输出类型——详情请参见\
  \ [`https://golang.org/cmd/go/#hdr-Build_modes`](https://golang.org/cmd/go/%2523hdr-Build_modes)。\n\
  \n### 清理\n\n要移除编译过程中的输出，请在 `tools` 文件夹中运行清单 3-4 所示的命令。\n\n```\ngo clean main.go\n\
  ```\n\n**清单 3-4** – 清理\n\n上一节中创建的编译可执行文件被移除，只留下源代码文件。\n\n### 使用 Go Run 命令\n\n大多数常规开发工作使用\
  \ `go run` 命令进行。在 `tools` 文件夹中运行清单 3-5 所示的命令。\n\n```\ngo run main.go\n```\n\n**清单\
  \ 3-5** – 使用 Go Run 命令\n\n该文件在单一步骤中被编译并执行，而无需在 `tools` 文件夹中创建可执行文件。可执行文件会被创建，但位于一个临时文件夹中，然后从该临时文件夹运行。（正是这一系列临时位置导致\
  \ Windows 防火墙在第一章中使用 `go run` 命令时每次都需要请求权限。每次运行该命令，都会在一个新的临时文件夹中创建可执行文件，这对防火墙来说就像是一个全新的文件。）\n\
  \n清单 3-5 中的命令产生以下输出：\n\n```\nHello, Go\n```\n\n### 定义模块\n\n上一节演示了你只需要创建一个代码文件即可开始，但更常见的做法是创建一个\
  \ Go 模块，这是开始新项目时的常规第一步。创建 Go 模块可以使项目轻松使用第三方包，并简化构建过程。在 `tools` 文件夹中运行清单 3-6 所示的命令。\n\
  \n```\ngo mod init tools\n```\n\n**清单 3-6** – 创建模块\n\n此命令在 `tools` 文件夹中添加一个名为 `go.mod`\
  \ 的文件。大多数项目从 `go mod init` 命令开始的原因是它能简化构建过程。无需指定特定的代码文件，项目只需使用一个点号（表示当前目录中的项目）即可构建和执行。在\
  \ `tools` 文件夹中运行清单 3-7 所示的命令，编译并执行其中包含的代码，而无需指定代码文件名。\n\n```\ngo run .\n```\n\n\
  **清单 3-7** – 编译并执行一个项目\n\n`go.mod` 文件还有其他用途——正如后续章节所展示的那样——但本书剩余部分的所有示例我都以 `go mod\
  \ init` 命令开始，以简化构建过程。\n\n\n\n## 调试 Go 代码\n\nGo 应用程序的标准调试器名为 Delve。它是一款第三方工具，但得到了\
  \ Go 开发团队的充分支持与推荐。Delve 支持 Windows、macOS、Linux 和 FreeBSD 平台。如需安装 Delve 包，请打开一个新的命令提示符窗口，并运行清单\
  \ 3-8 中所示的命令。\n\n> **提示：** 各平台的详细安装说明请参见 [`github.com/go-delve/delve/tree/master/Documentation/installation`](https://github.com/go-delve/delve/tree/master/Documentation/installation)。根据你所选的操作系统，可能还需要进行额外配置。\n\
  \n```\ngo install github.com/go-delve/delve/cmd/dlv@latest\n清单 3-8\n安装调试器包\n```\n\
  \n`go install` 命令用于下载并安装某个包，常用于安装调试器等工具。类似的命令 `go get` 则用于处理那些提供代码功能、需要被包含在应用程序中的包，如第\
  \ 12 章所示。\n\n为确保调试器已正确安装，请运行清单 3-9 所示的命令。\n\n```\ndlv version\n清单 3-9\n运行调试器\n```\n\
  \n如果你收到错误信息，提示找不到 `dlv` 命令，请尝试直接指定其路径。默认情况下，`dlv` 命令会被安装在 `~/go/bin` 文件夹中（不过可以通过设置\
  \ `GOPATH` 环境变量来覆盖此默认路径），如清单 3-10 所示。\n\n```\n~/go/bin/dlv\n清单 3-10\n使用路径运行调试器\n\
  ```\n\n如果包已正确安装，你将看到类似如下的输出，不过具体的版本号和构建 ID 可能有所不同：\n\n```\nDelve 调试器\n版本: 1.7.1\n\
  构建: $Id: 3bde2354aafb5a4043fd59838842c4cd4a8b6f0b $\n```\n\n### 使用 Println 函数进行调试\n\
  \n我喜欢像 Delve 这样的调试器，但我只会在一些无法通过我的首选调试技巧——`Println` 函数——解决的问题上使用它们。我使用 `Println`\
  \ 是因为它快速、简单且可靠，而且大多数 bug（至少在我自己的代码中）都是由于函数没有接收到我期望的值，或者某个特定语句没有在我预期的时候被执行所致。这些简单的问题通过向控制台输出一条消息就能轻松诊断。\n\
  \n如果 `Println` 输出的信息没有帮助，那么我会启动调试器，设置断点，然后逐步执行代码。即使在那个时候，一旦我对问题的原因有了初步了解，我往往还是会回到\
  \ `Println` 语句来验证我的理论。\n\n许多开发者不愿承认他们觉得调试器笨拙或令人困惑，最终都会偷偷地用回 `Println`。调试器*确实*让人困惑，但使用所有可用的工具并不可耻。`Println`\
  \ 函数和调试器是互补的工具，重要的是 bug 能够得到修复，无论通过何种方式。\n\n### 准备调试\n\n`main.go` 文件中没有足够的代码来进行调试。请添加清单\
  \ 3-11 中所示的语句，以创建一个循环，该循环将打印出一系列数字值。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ main() {\nfmt.Println(\"Hello, Go\")\nfor i := 0; i < 5; i++ {\nfmt.Println(i)\n\
  }\n}\n清单 3-11\n在 tools 文件夹的 main.go 文件中添加一个循环\n```\n\n我将在第 6 章中描述 `for` 语法，但本章我只需要一些代码语句来演示调试器的工作方式。使用\
  \ `go run .` 命令编译并执行代码；你将看到以下输出：\n\n```\nHello, Go\n\n```\n\n### 使用调试器\n\n要启动调试器，请在\
  \ `tools` 文件夹中运行清单 3-12 中所示的命令。\n\n```\ndlv debug main.go\n清单 3-12\n启动调试器\n```\n\
  \n此命令会启动一个基于文本的调试客户端。刚开始可能会觉得它令人困惑，但一旦你习惯了它的工作方式，就会发现它极其强大。第一步是创建一个断点，通过指定代码中的一个位置来实现，如清单\
  \ 3-13 所示。\n\n```\nbreak bp1 main.main:3\n清单 3-13\n创建断点\n```\n\n`break` 命令用于创建断点。参数指定了断点的名称和位置。位置可以用多种方式指定，但清单\
  \ 3-13 中使用的位置指定了包名、该包中的函数以及该函数中的行号，如图 3-6 所示。\n\n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig6_HTML.jpg](img/512642_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6：** 指定断点位置\n\n断点的名称是 `bp1`，其位置指定了 `main` 包中 `main` 函数的第三行。调试器会显示以下确认消息：\n\
  \n```\n断点 1 设置在 0x697716，对应 main.main() c:/tools/main.go:8\n```\n\n接下来，我将为这个断点创建一个条件，这样只有当指定的表达式计算结果为\
  \ `true` 时，程序执行才会暂停。在调试器中输入清单 3-14 中所示的命令，然后按回车键。\n\n```\ncondition bp1 i == 2\n\
  清单 3-14\n在调试器中指定断点条件\n\n`condition` 命令的参数指定了一个断点和一个表达式。此命令告诉调试器，名为 `bp1` 的断点仅在表达式\
  \ `i == 2` 为 `true` 时才暂停执行。要开始执行代码，请输入清单 3-15 中所示的命令，然后按回车键。\n\n```\ncontinue\n\
  清单 3-15\n在调试器中开始执行\n```\n\n调试器开始执行代码，并产生以下输出：\n\n```\nHello, Go\n\n```\n\n当清单 3-15\
  \ 中指定的条件满足时，程序执行会暂停，调试器会显示相应的代码以及执行停止的位置：\n\n```\n> [bp1] main.main() c:/tools/main.go:8\
  \ (命中 goroutine(1):1 总次数:1) (PC: 0x207716)\n3: import \"fmt\"\n4:\n5: func main()\
  \ {\n6:     fmt.Println(\"Hello, Go\")\n7:     for i := 0; i    8:         fmt.Println(i)\n\
  9:     }\n10: }\n```\n\n调试器提供了一套完整的命令用于检查和修改应用程序的状态，其中最常用的命令如表 3-2 所示。（调试器支持的全部命令集请参见\
  \ [`github.com/go-delve/delve`](https://github.com/go-delve/delve)。）\n\n**表 3-2：**\
  \ 有用的调试器状态命令\n\n| 命令 | 描述 |\n| --- | --- |\n| `print <expr>` | 该命令用于计算表达式并显示结果。它可以用来显示一个值（`print\
  \ i`），或者执行更复杂的测试（`print i > 0`）。 |\n| `set <variable> = <value>` | 该命令用于更改指定变量的值。\
  \ |\n| `locals` | 该命令用于打印所有局部变量的值。 |\n| `whatis <expr>` | 该命令用于打印指定表达式的类型，例如 `whatis\
  \ i`。我将在第 4 章中描述 Go 的类型。 |\n\n运行清单 3-16 中所示的命令，以显示变量 `i` 的当前值。\n\n```\nprint i\n\
  清单 3-16\n在调试器中打印一个值\n```\n\n\n\n调试器显示响应值 `2`，即变量的当前值，该值符合我在清单 3-16 中为断点指定的条件。调试器提供了一整套用于控制执行的命令，其中最常用的命令如表\
  \ 3-3 所示。\n\n| 命令 | 描述 |\n| --- | --- |\n| `continue` | 此命令恢复应用程序的执行。 |\n| `next`\
  \ | 此命令移动到下一条语句。 |\n| `step` | 此命令进入当前语句。 |\n| `stepout` | 此命令跳出当前语句。 |\n| `restart`\
  \ | 此命令重新启动进程。使用 `continue` 命令开始执行。 |\n| `exit` | 此命令退出调试器。 |\n\n输入 `continue` 命令以恢复执行，这将产生以下输出：\n\
  \n```\nProcess 3160 has exited with status 0\n```\n\n我为断点指定的条件不再满足，因此程序会运行直到终止。使用\
  \ `exit` 命令退出调试器并返回命令提示符。\n\n#### 使用 Delve 编辑器插件\n\nDelve 也受到一系列编辑器插件的支持，这些插件为 Go\
  \ 提供了基于 UI 的调试体验。完整的插件列表可在 [`https://github.com/go-delve/delve`](https://github.com/go-delve/delve)\
  \ 找到，但最佳的 Go/Delve 调试体验之一是由 Visual Studio Code 提供的，并且当安装 Go 语言工具时会自动安装该插件。\n\n如果你使用\
  \ Visual Studio Code，可以通过点击代码编辑器的边缘来创建断点，并使用“运行”菜单中的“开始调试”命令启动调试器。\n\n如果你收到错误或被提示选择环境，请打开\
  \ `main.go` 文件进行编辑，点击编辑器窗口中的任意代码语句，然后再次选择“开始调试”命令。\n\n我不打算详细描述使用 Visual Studio Code（或任何编辑器）进行调试的过程，但图\
  \ 3-7 展示了条件断点暂停执行后的调试器状态，重现了上一节中的命令行示例。\n\n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig7_HTML.jpg](img/512642_1_En_3_Fig7_HTML.jpg)\n\
  \n使用 Delve 编辑器插件\n\n## Linting Go 代码\n\nLinter 是一种工具，它使用一组规则检查代码文件，这些规则描述那些导致混淆、产生意外结果或降低代码可读性的问题。Go\
  \ 最广泛使用的 linter 叫做 `golint`，它应用的规则来自两个来源。第一个是 Google 制作的《Effective Go》文档 ([`https://golang.org/doc/effective_go.html`](https://golang.org/doc/effective_go.html))，该文档提供了编写清晰简洁\
  \ Go 代码的技巧。第二个来源是来自代码审查的评论合集 ([`https://github.com/golang/go/wiki/CodeReviewComments`](https://github.com/golang/go/wiki/CodeReviewComments))。\n\
  \n`golint` 的问题在于它不提供任何配置选项，并且始终应用所有规则，这可能导致你关心的警告淹没在一长串你不关心的规则警告中。我更喜欢使用 `revive`\
  \ linter 包，它可以直接替代 `golint`，但支持控制哪些规则被应用。要安装 `revive` 包，请打开一个新的命令提示符，并运行清单 3-17\
  \ 中所示的命令。\n\n```\ngo install github.com/mgechev/revive@latest\n```\n\n**LINTING\
  \ 的喜与悲**\n\nLinter 可以成为一个强大的有益工具，尤其是在一个技能和经验水平参差不齐的开发团队中。Linter 可以检测常见问题以及那些导致意外行为或长期维护问题的细微错误。我喜欢这类\
  \ linting，并且在我完成一个主要应用功能或将代码提交到版本控制之前，喜欢通过 linting 过程运行我的代码。\n\n但是，当使用规则将某个开发者的个人偏好强加于整个团队时，linter\
  \ 也可能成为不和与冲突的工具。这通常是在“有主见”的旗帜下进行的。其逻辑是，开发者花了太多时间争论不同的编码风格，而被强制以相同方式编写代码对所有人都更好。\n\
  \n我的经验是，开发者只会找到其他事情来争论，而强制编码风格往往只是借口，让一个人的偏好成为整个开发团队的强制性要求。\n\n我在本章中没有使用流行的 `golint`\
  \ 包，因为它无法禁用单个规则。我尊重 `golint` 开发者强烈的个人观点，但使用 `golint` 让我感觉像是在和某个我根本不认识的人进行无休止的争论，这不知怎么地，感觉比和团队里那个对缩进感到不满的开发者进行无休止的争论更糟糕。\n\
  \n我的建议是，谨慎使用 linting，并专注于那些会造成真正问题的问题。给予各个开发者自然表达的自由，只关注那些对项目有可察觉影响的问题。这与 Go 的“有主见”精神相悖，但我认为，生产力不是通过盲目地执行武断的规则来实现的，无论这些规则的本意多么良好。\n\
  \n\n### 使用 Linter\n\n`main.go` 文件非常简单，以至于 linter 找不到任何问题。请添加清单 3-19 中所示的语句，这些语句是合法的\
  \ Go 代码，但不遵守 linter 应用的规则。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  PrintHello()\nfor i := 0; i < 5; i++ {\nPrintNumber(i)\n}\n}\nfunc PrintHello()\
  \ {\nfmt.Println(\"Hello, Go\")\n}\nfunc PrintNumber(number int) {\nfmt.Println(number)\n\
  }\n```\n\n保存更改，并使用命令提示符运行清单 3-19 中所示的命令。（与 `dlv` 命令一样，你可能需要指定 `home` 文件夹中的 `go/bin`\
  \ 路径才能运行此命令。）\n\n```\nrevive\n```\n\nlinter 会检查 `main.go` 文件并报告以下问题：\n\n```\nmain.go:12:1:\
  \ exported function PrintHello should have comment or be unexported\nmain.go:16:1:\
  \ exported function PrintNumber should have comment or be unexported\n```\n\n正如我在第\
  \ 12 章中解释的，以大写字母开头的函数被称为 **导出（exported）** 函数，并且可以在其定义的包之外使用。导出函数的惯例是提供描述性注释。linter\
  \ 已标记出 `PrintHello` 和 `PrintNumber` 函数没有注释的事实。清单 3-20 为其中一个函数添加了注释。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc main() {\nPrintHello()\nfor i := 0; i < 5; i++ {\n\
  PrintNumber(i)\n}\n}\nfunc PrintHello() {\nfmt.Println(\"Hello, Go\")\n}\n// This\
  \ function writes a number using the fmt.Println function\nfunc PrintNumber(number\
  \ int) {\nfmt.Println(number)\n}\n```\n\n再次运行 `revive` 命令；你会收到关于 `PrintNumber` 函数的不同错误：\n\
  \n```\nmain.go:12:1: exported function PrintHello should have comment or be unexported\n\
  main.go:16:1: comment on exported function PrintNumber should be of the form \"\
  PrintNumber ...\"\n```\n\n一些 linter 规则在其要求上很具体。清单 3-20 中的注释不被接受，因为 Effective Go\
  \ 声明注释应包含以函数名开头的句子，并应提供函数目的的简要概述，正如 [`https://golang.org/doc/effective_go.html#commentary`](https://golang.org/doc/effective_go.html%2523commentary)\
  \ 所述。清单 3-21 修订了注释，以遵循所需的结构。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\n\
  PrintHello()\nfor i := 0; i < 5; i++ {\nPrintNumber(i)\n}\n}\nfunc PrintHello()\
  \ {\nfmt.Println(\"Hello, Go\")\n}\n// PrintNumber writes a number using the fmt.Println\
  \ function\nfunc PrintNumber(number int) {\nfmt.Println(number)\n}\n```\n\n再次运行\
  \ `revive` 命令；linter 将完成执行而不会报告 `PrintNumber` 函数的任何错误，但 `PrintHello` 函数仍会报告一个警告，因为它没有注释。\n\
  \n### 理解 Go 文档\n\nlinter 对注释如此严格的原因是因为它们被 `go doc` 命令使用，该命令从源代码注释生成文档。你可以在 [`https://blog.golang.org/godoc`](https://blog.golang.org/godoc)\
  \ 查看如何使用 `go doc` 命令的详细信息，但你可以通过在 `tools` 文件夹中运行 `go doc -all` 命令来快速演示它如何使用注释来记录一个包。\n\
  \n### 禁用 Linter 规则\n\n可以使用代码文件中的注释来配置 `revive` 包，为代码段禁用一个或多个规则。在清单 3-22 中，我使用注释禁用了导致\
  \ `PrintNumber` 函数警告的规则。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nPrintHello()\n\
  for i := 0; i < 5; i++ {\nPrintNumber(i)\n}\n}\n// revive:disable:exported\nfunc\
  \ PrintHello() {\nfmt.Println(\"Hello, Go\")\n}\n// revive:enable:exported\n// PrintNumber\
  \ writes a number using the fmt.Println function\nfunc PrintNumber(number int) {\n\
  fmt.Println(number)\n}\n```\n\n控制 linter 所需的语法是 `revive`，后跟一个冒号、`enable` 或 `disable`，并可选择再跟一个冒号和\
  \ linter 规则的名称。例如，`revive:disable:exported` 注释可防止 linter 实施名为 `exported` 的规则，该规则一直在生成警告。`revive:enable:exported`\
  \ 注释启用该规则，以便将其应用于代码文件中后续的语句。\n\n你可以在 [`https://github.com/mgechev/revive#available-rules`](https://github.com/mgechev/revive%2523available-rules)\
  \ 找到 linter 支持的规则列表。或者，你也可以从注释中省略规则名称，以控制所有规则的应用。\n\n\n\n### 创建 Linter 配置文件\n\n\
  当你想抑制特定代码区域的警告，但在项目的其他地方仍然应用规则时，使用代码注释会很有帮助。如果你根本不想应用某条规则，那么可以使用 TOML 格式的配置文件。在\
  \ `tools` 文件夹中添加一个名为 `revive.toml` 的文件，其内容如清单 3-23 所示。\n\n> **提示**  \n> TOML 格式是专门为配置文件设计的，其描述位于\
  \ [`https://toml.io/en`](https://toml.io/en)。`revive` 的全部配置选项说明位于 [`https://github.com/mgechev/revive#configuration`](https://github.com/mgechev/revive%2523configuration)。\n\
  \n```\nignoreGeneratedHeader = false\nseverity = \"warning\"\nconfidence = 0.8\n\
  errorCode = 0\nwarningCode = 0\n[rule.blank-imports]\n[rule.context-as-argument]\n\
  [rule.context-keys-type]\n[rule.dot-imports]\n[rule.error-return]\n[rule.error-strings]\n\
  [rule.error-naming]\n#[rule.exported]\n[rule.if-return]\n[rule.increment-decrement]\n\
  [rule.var-naming]\n[rule.var-declaration]\n[rule.package-comments]\n[rule.range]\n\
  [rule.receiver-naming]\n[rule.time-naming]\n[rule.unexported-return]\n[rule.indent-error-flow]\n\
  [rule.errorf]\n清单 3-23\ntools 文件夹中 revive.toml 文件的内容\n```\n\n这是 [`https://github.com/mgechev/revive#recommended-configuration`](https://github.com/mgechev/revive%2523recommended-configuration)\
  \ 中描述的默认 `revive` 配置，只是我在启用 `exported` 规则的条目前面加了一个 `#` 字符。在清单 3-24 中，我已经从 `main.go`\
  \ 文件中移除了注释，这些注释不再是满足 linter 要求所必需的。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\nPrintHello()\nfor i := 0; i < 5; i++ {\nPrintNumber(i)\n}\n}\nfunc PrintHello()\
  \ {\nfmt.Println(\"Hello, Go\")\n}\nfunc PrintNumber(number int) {\nfmt.Println(number)\n\
  }\n清单 3-24\n从 tools 文件夹中的 main.go 文件移除注释\n```\n\n要使用带有配置文件的 linter，在 `tools` 文件夹中运行清单\
  \ 3-25 所示的命令。\n\n```\nrevive -config revive.toml\n清单 3-25\n使用配置文件运行 Linter\n```\n\
  \n将不会有任何输出，因为唯一触发错误的规则已被禁用。\n\n### 在代码编辑器中进行 Lint 检查\n\n某些代码编辑器支持自动进行代码 lint 检查。例如，如果你使用的是\
  \ Visual Studio Code，lint 检查会在后台执行，并将问题标记为警告。Visual Studio Code 默认使用的 linter 会不时更改；在撰写本文时是\
  \ `staticcheck`，它是可配置的，但之前是 `golint`，而 `golint` 是不可配置的。\n\n通过“首选项” ➤ “扩展” ➤ “Go”\
  \ ➤ “Lint Tool” 配置选项，可以轻松地将 linter 更改为 `revive`。如果你想使用自定义配置文件，请使用“Lint Flags”配置选项添加一个标志，其值为\
  \ `-config=./revive.toml`，这将选取 `revive.toml` 文件。\n\n## 修复 Go 代码中的常见问题\n\n`go vet`\
  \ 命令用于识别可能是错误的语句。与通常关注代码风格问题的 linter 不同，`go vet` 命令能够找出那些可以编译但很可能不会按开发者意图执行的代码。\n\
  \n我喜欢 `go vet` 命令，因为它能发现其他工具遗漏的错误，尽管分析器并不能发现所有错误，有时也会将一些没有问题的代码高亮显示为问题。在清单 3-26\
  \ 中，我在 `main.go` 文件中添加了一条语句，故意引入了一个错误。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ main() {\nPrintHello()\nfor i := 0; i < 5; i++ {\ni = i\nPrintNumber(i)\n}\n}\n\
  func PrintHello() {\nfmt.Println(\"Hello, Go\")\n}\nfunc PrintNumber(number int)\
  \ {\nfmt.Println(number)\n}\n清单 3-26\n在 tools 文件夹中的 main.go 文件添加一条语句\n```\n\n新语句将变量\
  \ `i` 赋值给自己，Go 编译器允许这样做，但这很可能是一个错误。要分析代码，请在 `tools` 文件夹中使用命令提示符运行清单 3-27 所示的命令。\n\
  \n```\ngo vet main.go\n清单 3-27\n分析代码\n```\n\n`go vet` 命令将检查 `main.go` 文件中的语句，并产生以下警告：\n\
  \n```\n### _/C_/tools\n.\\main.go:8:9: i 对 i 的自我赋值\n```\n\n`go vet` 命令产生的警告会指明代码中检测到问题的位置，并提供问题的描述。\n\
  \n`go vet` 命令会对代码应用多个分析器，你可以在 [`https://golang.org/cmd/vet`](https://golang.org/cmd/vet)\
  \ 查看分析器列表。你可以选择启用或禁用单个分析器，但要知道哪个分析器生成了特定消息可能比较困难。要找出哪个分析器负责某个警告，请在 `tools` 文件夹中运行清单\
  \ 3-28 所示的命令。\n\n```\ngo vet -json main.go\n清单 3-28\n识别分析器\n```\n\n`json` 参数会生成\
  \ JSON 格式的输出，该输出按分析器对警告进行分组，如下所示：\n\n```\n### _/C_/tools {\n\"_/C_/tools\": {\n\"\
  assign\": [\n{\n\"posn\": \"C:\\\\tools\\\\main.go:8:9\",\n\"message\": \"i 对 i\
  \ 的自我赋值\"\n}\n]\n}\n}\n```\n\n使用此命令可以揭示，名为 `assign` 的分析器负责生成针对 `main.go` 文件的警告。一旦知道了名称，就可以启用或禁用该分析器，如清单\
  \ 3-29 所示。\n\n```\ngo vet -assign=false\ngo vet -assign\n清单 3-29\n选择分析器\n```\n\n\
  清单 3-29 中的第一个命令运行除 `assign` 之外的所有分析器，而 `assign` 正是生成自我赋值语句警告的分析器。第二个命令仅运行 `assign`\
  \ 分析器。\n\n#### 了解每个分析器的功能\n\n弄清楚每个 `go vet` 分析器在寻找什么可能比较困难。我觉得 Go 团队为这些分析器编写的单元测试很有帮助，因为它们包含了正在寻找的问题类型的示例。这些测试位于\
  \ [`https://github.com/golang/go/tree/master/src/cmd/vet/testdata`](https://github.com/golang/go/tree/master/src/cmd/vet/testdata)。\n\
  \n某些编辑器（包括 Visual Studio Code）会在编辑器窗口中显示来自 `go vet` 的消息，如图 3-8 所示，这使得无需显式运行命令就能轻松获益于代码分析。\n\
  \n![../images/512642_1_En_3_Chapter/512642_1_En_3_Fig8_HTML.jpg](img/512642_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8**  \n代码编辑器中的潜在代码问题\n\nVisual Studio Code 在编辑器窗口中标记该错误，并在“问题”窗口中显示详细信息。默认情况下，使用\
  \ `go vet` 进行分析是启用的，你可以通过“设置” ➤ “扩展” ➤ “Go” ➤ “Vet On Save” 配置项来禁用此功能。\n\n\n## 格式化\
  \ Go 代码\n\n`go fmt` 命令可以统一格式化 Go 源代码文件。该命令没有可配置的选项来改变其应用的格式，它会将代码转换为 Go 开发团队指定的风格。最明显的变化包括：使用制表符进行缩进、对齐注释以及删除不必要的分号。清单\
  \ 3-30 展示了一段缩进不一致、注释未对齐且包含非必需分号的代码。\n\n> **提示：** 您可能会发现，当代码粘贴到编辑器窗口或保存文件时，编辑器会自动格式化代码。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\nPrintHello  ()\nfor i := 0;\
  \ i < 5; i++ { // 带计数器的循环\nPrintHello(); // 打印消息\nPrintNumber(i); // 打印计数器值\n}\n\
  }\nfunc PrintHello  () {\nfmt.Println(\"Hello, Go\");\n}\nfunc PrintNumber  (number\
  \ int) {\nfmt.Println(number);\n}\n清单 3-30\n在 tools 文件夹的 main.go 文件中创建格式问题\n```\n\
  \n在 `tools` 文件夹中运行清单 3-31 所示的命令以重新格式化代码。\n\n```\ngo fmt main.go\n清单 3-31\n格式化源代码\n\
  ```\n\n格式化程序将删除分号、调整缩进并对齐注释，生成如下格式化后的代码：\n\n```\npackage main\nimport \"fmt\"\n\
  func main() {\nPrintHello()\nfor i := 0; i < 5; i++ { // 带计数器的循环\nPrintHello() \
  \  // 打印消息\nPrintNumber(i) // 打印计数器值\n}\n}\nfunc PrintHello() {\nfmt.Println(\"\
  Hello, Go\")\n}\nfunc PrintNumber(number int) {\nfmt.Println(number)\n}\n```\n\n\
  本书的示例中未使用 `go fmt`，因为使用制表符会导致在打印页面上出现布局问题。为了确保代码在书籍印刷时显示正常，我不得不使用空格进行缩进，而 `go fmt`\
  \ 会将这些空格替换为制表符。\n\n## 本章小结\n\n在本章中，我介绍了用于 Go 开发的工具。我解释了如何编译和执行源代码、如何调试 Go 代码、如何使用\
  \ linter、如何格式化源代码以及如何查找常见问题。下一章，我将开始介绍 Go 语言的功能特性，首先从基本数据类型讲起。\n\n# 4. 基本类型、值和指针\n\
  \n本章开始介绍 Go 语言，重点介绍基本数据类型，然后介绍如何使用它们创建常量和变量。同时，我还会介绍 Go 对指针的支持。指针可能会引起混淆，特别是如果您从\
  \ Java 或 C# 等语言转向 Go 语言，我将解释 Go 指针的工作原理，演示其有用之处，并说明为何无需畏惧指针。\n\n任何编程语言提供的功能都是为了协同使用，这使得逐步介绍它们变得有些困难。本书本部分的一些示例依赖于后面章节介绍的功能特性。这些示例包含了足够的细节来提供上下文，并引用了书中可以找到更多细节的部分。表\
  \ 4-1 将 Go 的基本功能特性置于上下文中。\n\n**表 4-1** 将基本类型、值和指针功能置于上下文中\n\n| 问题 | 答案 |\n| ---\
  \ | --- |\n| 它们是什么？ | 数据类型用于存储所有编程中共有的基本值，包括数字、字符串和 `true`/`false` 值。这些数据类型可用于定义常量和变量值。指针是一种特殊的数据类型，用于存储内存地址。\
  \ |\n| 它们为什么有用？ | 基本数据类型本身对于存储值很有用，但它们也是定义更复杂数据类型的基础，我将在第 10 章中解释。指针之所以有用，是因为它们允许程序员决定一个值在被使用时是否应该被复制。\
  \ |\n| 如何使用它们？ | 基本数据类型有各自的名称，例如 `int` 和 `float64`，并且可以与 `const` 和 `var` 关键字一起使用。指针使用地址运算符\
  \ `&` 创建。 |\n| 是否有任何陷阱或限制？ | Go 语言不会自动进行值转换，除了被称为*无类型常量*的特殊类别值。 |\n| 是否有替代方案？ |\
  \ 基本数据类型没有替代方案，它们在 Go 开发中被广泛使用。 |\n\n**表 4-2** 章节总结\n\n| 问题 | 解决方案 | 清单 |\n| ---\
  \ | --- | --- |\n| 直接使用值 | 使用字面量值 | 6 |\n| 定义常量 | 使用 `const` 关键字 | 7, 10 |\n| 定义可转换为相关数据类型的常量\
  \ | 创建无类型常量 | 8, 9, 11 |\n| 定义变量 | 使用 `var` 关键字或短声明语法 | 12–21 |\n| 防止未使用变量的编译器错误\
  \ | 使用空标识符 | 22, 23 |\n| 定义指针 | 使用地址运算符 | 24, 25, 29–30 |\n| 跟随指针 | 在指针变量名前使用星号\
  \ | 26–28, 31 |\n\n## 本章准备工作\n\n为准备本章，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `basicFeatures`\
  \ 的目录。运行清单 4-1 所示的命令来为项目创建 `go.mod` 文件。\n\n```\ngo mod init basicfeatures\n清单 4-1\n\
  创建示例项目\n```\n\n将名为 `main.go` 的文件添加到 `basicFeatures` 文件夹中，其内容如清单 4-2 所示。\n\n> **提示：**\
