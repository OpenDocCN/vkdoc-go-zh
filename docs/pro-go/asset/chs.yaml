  \n图 36-2\n\n显示购物车组件\n\n## 使用数据库存储库\n\n大部分基本功能已经就位，是时候淘汰我在第 35 章中创建的临时存储库，并替换为一个使用持久化数据库的存储库了。我打算使用\
  \ SQLite。在命令提示符下，在 `sportsstore` 文件夹中运行列表 36-12 所示的命令，下载并安装 SQLite 驱动，其中也包含 SQLite\
  \ 运行时。\n\n```\ngo get modernc.org/sqlite\n列表 36-12\n安装 SQLite 驱动和数据库包\n```\n\n###\
  \ 创建存储库类型\n\n在 `models/repo` 文件夹中添加一个名为 `sql_repo.go` 的文件，其内容如列表 36-13 所示，该文件定义了\
  \ SQL 存储库的基本类型。\n\n```\npackage repo\nimport (\n\"database/sql\"\n\"platform/config\"\
  \n\"platform/logging\"\n\"context\"\n)\ntype SqlRepository struct {\nconfig.Configuration\n\
  logging.Logger\nCommands SqlCommands\n*sql.DB\ncontext.Context\n}\ntype SqlCommands\
  \ struct {\nInit,\nSeed,\nGetProduct,\nGetProducts,\nGetCategories,\nGetPage,\n\
  GetPageCount,\nGetCategoryPage,\nGetCategoryPageCount *sql.Stmt\n}\n列表 36-13\nmodels/repo\
  \ 文件夹中 sql_repo.go 文件的内容\n```\n\n`SqlRepository` 结构体将用于实现 `Repository` 接口，并作为服务提供给应用程序的其他部分。该结构体定义了一个\
  \ `*sql.DB` 字段，用于提供对数据库的访问，以及一个 `Commands` 字段，该字段是一个 `*sql.Stmt` 字段的集合，这些字段将填充实现\
  \ `Repository` 接口功能所需的预编译语句。\n\n### 打开数据库并加载 SQL 命令\n\n在第 26 章中，我将 SQL 命令定义为 Go\
  \ 字符串。在实际项目中，我更喜欢将 SQL 命令定义在扩展名为 `.sql` 的文本文件中，这样我的编辑器可以进行语法检查。这意味着我需要打开一个数据库，然后定位并处理与列表\
  \ 36-13 中定义的 `SqlCommands` 结构体字段相对应的 SQL 文件。在 `models/repo` 文件夹中添加一个名为 `sql_loader.go`\
  \ 的文件，其内容如列表 36-14 所示。\n\n```\npackage repo\nimport (\n\"os\"\n\"database/sql\"\n\
  \"reflect\"\n\"platform/config\"\n\"platform/logging\"\n_ \"modernc.org/sqlite\"\
  \n)\nfunc openDB(config config.Configuration, logger logging.Logger) (db *sql.DB,\n\
  commands *SqlCommands, needInit bool) {\ndriver := config.GetStringDefault(\"sql:driver_name\"\
  , \"sqlite\")\nconnectionStr, found := config.GetString(\"sql:connection_str\")\n\
  if !found {\nlogger.Panic(\"无法从配置中读取 SQL 连接字符串\")\nreturn\n}\nif _, err := os.Stat(connectionStr);\
  \ os.IsNotExist(err) {\nneedInit = true\n}\nvar err error\nif db, err = sql.Open(driver,\
  \ connectionStr); err == nil {\ncommands = loadCommands(db, config, logger)\n} else\
  \ {\nlogger.Panic(err.Error())\n}\nreturn\n}\nfunc loadCommands(db *sql.DB, config\
  \ config.Configuration,\nlogger logging.Logger) (commands *SqlCommands)  {\ncommands\
  \ = &SqlCommands {}\ncommandVal := reflect.ValueOf(commands).Elem()\ncommandType\
  \ := reflect.TypeOf(commands).Elem()\nfor i := 0; i < commandType.NumField(); i++\
  \ {\ncommandName := commandType.Field(i).Name\nlogger.Debugf(\"正在加载 SQL 命令：%v\"\
  , commandName)\nstmt := prepareCommand(db, commandName, config, logger)\ncommandVal.Field(i).Set(reflect.ValueOf(stmt))\n\
  }\nreturn commands\n}\nfunc prepareCommand(db *sql.DB, command string, config config.Configuration,\n\
  logger logging.Logger) *sql.Stmt {\nfilename, found := config.GetString(\"sql:commands:\"\
  \ + command)\nif !found {\nlogger.Panicf(\"配置中未包含 SQL 命令的位置：%v\",\ncommand)\n}\n\
  data, err := os.ReadFile(filename)\nif err != nil {\nlogger.Panicf(\"无法读取 SQL 命令文件：%v\"\
  , filename)\n}\nstatement, err := db.Prepare(string(data))\nif (err != nil) {\n\
  logger.Panicf(err.Error())\n}\nreturn statement\n}\n列表 36-14\nmodels/repo 文件夹中 sql_loader.go\
  \ 文件的内容\n```\n\n`openDB` 函数从配置系统中读取数据库驱动程序名称和连接字符串，并在调用 `loadCommands` 函数之前打开数据库。`loadCommands`\
  \ 函数使用反射获取 `SqlCommands` 结构体定义的字段列表，并为每个字段调用 `prepareCommand`。`prepareCommand` 函数从配置系统中获取包含该命令\
  \ SQL 的文件名，读取文件内容，并创建一个预编译语句，然后将其赋值给 `SqlCommands` 字段。\n\n\n\n### 定义种子与初始化语句\n\n\
  对于`Repository`接口所需的每个功能，我需要定义一个包含查询语句的 SQL 文件，以及一个用于执行该查询的 Go 方法。我将从`Seed`和`Init`命令开始。`Seed`命令是`Repository`接口所必需的，而`Init`函数是`SqlRepository`结构体特有的，用于创建数据库模式。在`models/repo`文件夹中创建一个名为`sql_initseed.go`的文件，其内容如代码清单\
  \ 36-15 所示。\n\n请注意，资源库使用的所有查询都调用了接受`context.Context`参数的方法（`ExecContext`、`QueryContext`等）。在第\
  \ 32 至 34 章构建的平台会将`Context`值传递给中间件组件和请求处理器，因此我在查询数据库时使用了这些方法。\n\n```\npackage repo\n\
  func (repo *SqlRepository) Init() {\nif _, err := repo.Commands.Init.ExecContext(repo.Context);\
  \ err != nil {\nrepo.Logger.Panic(\"Cannot exec init command\")\n}\n}\nfunc (repo\
  \ *SqlRepository) Seed() {\nif _, err := repo.Commands.Seed.ExecContext(repo.Context);\
  \ err != nil {\nrepo.Logger.Panic(\"Cannot exec seed command\")\n}\n}\n代码清单 36-15\n\
  models/repo 文件夹中 sql_initseed.go 文件的内容\n```\n\n为了创建这些方法所使用的 SQL 命令，请创建`sportsstore/sql`文件夹，并在其中添加一个名为`init_db.sql`的文件，其内容如代码清单\
  \ 36-16 所示。\n\n```\nDROP TABLE IF EXISTS Products;\nDROP TABLE IF EXISTS Categories;\n\
  CREATE TABLE IF NOT EXISTS Categories (\nId INTEGER NOT NULL PRIMARY KEY,      \
  \  Name TEXT\n);\nCREATE TABLE IF NOT EXISTS Products (\nId INTEGER NOT NULL PRIMARY\
  \ KEY,\nName TEXT, Description TEXT,\nCategory INTEGER, Price decimal(8, 2),\nCONSTRAINT\
  \ CatRef FOREIGN KEY(Category) REFERENCES Categories (Id)\n);\n代码清单 36-16\nsql 文件夹中\
