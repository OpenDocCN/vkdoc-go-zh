  \ int) (products []Product, totalAvailable int)\n    GetCategories() []Category\n\
  \    SaveCategory(*Category)\n    GetOrder(id int) []Order\n    GetOrders() Order\n\
  \    SaveOrder(*Order)\n    SetOrderShipped(*Order)\n    Seed()\n    Init()\n}\n\
  ```\n\n`SetOrderShipped` 方法将用于更新现有的 `Order`，以标记其已发货状态。`Init` 方法与接口的 SQL 实现中已定义的方法名对应，用于让管理员在部署后首次使用前准备数据库。\n\
  \n为了定义用于更新现有订单的 SQL，在 `sportsstore/sql` 文件夹中添加一个名为 `update_order.sql` 的文件，内容如代码清单\
  \ 38-2 所示。\n\n```sql\nUPDATE Orders SET Shipped = ? WHERE Id == ?\n```\n\n代码清单 38-3\
  \ 新增了一条命令，以便像其他 SQL 语句一样访问代码清单 38-2 中定义的 SQL。\n\n```go\ntype SqlCommands struct\
  \ {\n    Init,\n    Seed,\n    GetProduct,\n    GetProducts,\n    GetCategories,\n\
