  \ `package` 语句的代码文件。 | 4, 9, 10, 15, 16 |\n| 使用一个包 | 添加一个 `import` 语句，指定包及其所在模块的路径。\
  \ | 5 |\n| 控制对包中功能的访问 | 通过在功能名称中使用首字母大写来导出功能。首字母小写是不可导出的，不能在包外部使用。 | 6–8 |\n| 处理包冲突\
  \ | 使用别名或点导入。 | 11–14 |\n| 在加载包时执行任务 | 定义一个初始化函数。 | 17, 18 |\n| 执行包初始化函数而不导入其包含的功能\
  \ | 在 `import` 语句中使用空白标识符。 | 19, 20 |\n| 使用外部包 | 使用 `go get` 命令。 | 21, 22 |\n| 移除未使用的包依赖项\
  \ | 使用 `go mod tidy` 命令。 | 23 |\n\n## 本章准备\n\n为准备本章，打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `packages` 的目录。导航到 `packages` 文件夹并运行代码清单 12-1 中所示的命令来初始化项目。\n\n> **提示**  \n> 你可以从\
  \ [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章的示例项目——以及本书所有其他章节的示例项目。参见第\
  \ 2 章，了解如果在运行示例时遇到问题如何获取帮助。\n\n```\ngo mod init packages\n代码清单 12-1\n初始化项目\n```\n\
  \n在 `packages` 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 12-2 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\nfmt.Println(\"Hello, Packages and Modules\")\n}\n\
  代码清单 12-2\npackages 文件夹中 main.go 文件的内容\n```\n\n使用命令提示符在 `packages` 文件夹中运行代码清单 12-3\
  \ 中所示的命令。\n\n```\ngo run .\n代码清单 12-3\n运行示例项目\n```\n\n`main.go` 文件中的代码将被编译和执行，产生以下输出：\n\
  \n```\nHello, Packages and Modules\n```\n\n\n\n## 理解模块文件\n\n本书中所有示例项目的第一步都是创建一个模块文件，这通过清单\
  \ 12-1 中的命令完成。\n\n模块文件的原始目的是发布代码，以便它可以在其他项目中使用，甚至可能由其他开发者使用。模块文件至今仍为此目的而使用，但随着 Go\
  \ 开始获得主流开发领域的认可，已发布项目的比例已经下降。如今，创建模块文件最常见的原因是它能轻松安装已发布的包，并且还有一个额外的好处：允许使用清单 12-3\
  \ 所示的命令，而不必向 Go 构建工具提供需要编译的单个文件列表。\n\n清单 12-1 中的命令在 `packages` 文件夹中创建了一个名为 `go.mod`\
  \ 的文件，内容如下：\n\n```\nmodule packages\ngo 1.17\n```\n\n`module` 语句指定了模块的名称，该名称由清单\
  \ 12-1 中的命令指定。这个名称很重要，因为后续示例将演示它用于导入同一项目中其他包以及第三方包的功能。`go` 语句指定了所使用的 Go 版本，本书使用的是\
  \ 1.17 版本。\n\n## 创建自定义包\n\n包使得项目能够增加结构，从而将相关功能组合在一起。创建 `packages/store` 文件夹，并在其中添加一个名为\
  \ `product.go` 的文件，内容如清单 12-4 所示。\n\n```\npackage store\ntype Product struct {\n\
  Name, Category string\nprice float64\n}\n清单 12-4\npackages/store 文件夹中 product.go\
  \ 文件的内容\n```\n\n自定义包使用 `package` 关键字定义，我指定的包名为 `store`：\n\n```\n...\npackage store\n\
  ...\n```\n\n`package` 语句指定的名称应与代码文件所在文件夹的名称匹配，在此例中为 `store`。\n\n`Product` 类型与之前章节中定义的类似类型有一些重要区别，我将在后续部分进行解释。\n\
  \n### 注释导出的特性\n\nGo 语言检查器会对任何从包中导出但未在注释中描述的特性报告错误。注释应简洁且具有描述性，惯例是以特性的名称开头，如下所示：\n\
  \n```\n...\n// Product describes an item for sale\ntype Product struct {\nName,\
  \ Category string // Name and type of the product\nprice float64\n}\n...\n```\n\n\
  当注释自定义类型时，也可以描述导出的字段。Go 还支持描述整个包的注释，该注释出现在 `package` 关键字之前，如下所示：\n\n```\n...\n//\
  \ Package store provides types and methods\n// commonly required for online sales\n\
  package store\n...\n```\n\n这些注释会被 `go doc` 工具处理，用于生成代码文档。为简洁起见，本书的示例中未添加注释，但在编写供其他开发者使用的包时，注释代码尤为重要。\n\
  \n### 使用自定义包\n\n对自定义包的依赖通过 `import` 语句声明，如清单 12-5 所示。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"packages/store\"\n)\nfunc main() {\nproduct := store.Product {\n\
  Name: \"Kayak\",\nCategory: \"Watersports\",\n}\nfmt.Println(\"Name:\", product.Name)\n\
  fmt.Println(\"Category:\", product.Category)\n}\n清单 12-5\n在 packages 文件夹的 main.go\
  \ 文件中使用自定义包\n```\n\n`import` 语句将包指定为一个路径，该路径由清单 12-1 中命令创建的模块名称和包名称组成，两者之间用正斜杠分隔，如图\
  \ 12-1 所示。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig1_HTML.jpg](img/512642_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n导入自定义包\n\n包提供的导出功能通过将包名称作为前缀来访问，如下所示：\n\n```\n...\nvar product *store.Product\
  \ = &store.Product {\n...\n```\n\n为了指定 `Product` 类型，我必须在该类型前面加上包名称，如图 12-2 所示。\n\
  \n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig2_HTML.jpg](img/512642_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n使用包名称\n\n构建并执行该项目，将产生以下输出：\n\n```\nName: Kayak\nCategory: Watersports\n\
  ```\n\n\n\n### 理解包访问控制\n\n清单 12-4 中定义的`Product`类型与之前章节中定义的类似类型有一个重要区别：`Name`和`Category`属性的首字母均为大写。\n\
  \nGo 语言采用了一种独特的访问控制方式。它不依赖于`public`和`private`这类专用关键字，而是通过检查代码文件中类型、函数和方法等特性名称的首字母来判断。如果首字母是小写，则该特性只能在定义它的包内使用。若要将特性导出到包外使用，则需将其首字母大写。\n\
  \n清单 12-4 中结构体类型的名称是`Product`，这意味着该类型可以在`store`包外部使用。`Name`和`Category`字段的名称也以大写字母开头，因此它们也是导出的。`price`字段的首字母为小写，这意味着它只能在`store`包内部访问。图\
  \ 12-3 展示了这些差异。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig3_HTML.jpg](img/512642_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3\n\n导出特性与私有特性\n\n编译器会强制执行包导出规则，这意味着如果在`store`包外部访问`price`字段，就会产生错误，如清单 12-6\
  \ 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"packages/store\"\n)\nfunc main()\
  \ {\nproduct := store.Product {\nName: \"Kayak\",\nCategory: \"Watersports\",\n\
  price: 279,\n}\nfmt.Println(\"Name:\", product.Name)\nfmt.Println(\"Category:\"\
  , product.Category)\nfmt.Println(\"Price:\", product.price)\n}\n清单 12-6\n在 packages\
  \ 文件夹的 main.go 文件中访问未导出字段\n```\n\n第一个改动尝试在使用字面量语法创建`Product`值时，为`price`字段设置一个值。第二个改动则尝试读取`price`字段的值。\n\
  \n访问控制规则由编译器强制执行，编译代码时会报告以下错误：\n\n```\n.\\main.go:13:9: cannot refer to unexported\
  \ field 'price' in struct literal of type store.Product\n.\\main.go:18:34: product.price\
  \ undefined (cannot refer to unexported field or method price)\n```\n\n要解决这些错误，我可以选择导出`price`字段，或者导出用于访问该字段值的方法或函数。清单\
  \ 12-7 定义了一个构造函数用于创建`Product`值，以及用于获取和设置`price`字段的方法。\n\n```\npackage store\ntype\
  \ Product struct {\nName, Category string\nprice float64\n}\nfunc NewProduct(name,\
  \ category string, price float64) *Product {\nreturn &Product{ name, category, price\
  \ }\n}\nfunc (p *Product) Price() float64 {\nreturn p.price\n}\nfunc (p *Product)\
  \ SetPrice(newPrice float64)  {\np.price = newPrice\n}\n清单 12-7\n在 store 文件夹的 product.go\
  \ 文件中定义方法\n```\n\n访问控制规则不适用于单个函数或方法的参数，这意味着`NewProduct`函数必须将首字母大写才能被导出，但参数名称可以使用小写。\n\
  \n这些方法遵循访问字段的导出方法的典型命名约定，即`Price`方法返回字段值，`SetPrice`方法分配新值。清单 12-8 更新了`main.go`文件中的代码，以使用这些新特性。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"packages/store\"\n)\nfunc main() {\nproduct\
  \ := store.NewProduct(\"Kayak\", \"Watersports\", 279)\nfmt.Println(\"Name:\", product.Name)\n\
  fmt.Println(\"Category:\", product.Category)\nfmt.Println(\"Price:\", product.Price())\n\
  }\n清单 12-8\n在 packages 文件夹的 main.go 文件中使用包特性\n```\n\n使用清单 12-8 中的命令编译并执行项目，你将会得到以下输出，这表明`main`包中的代码可以通过`Price`方法读取`price`字段：\n\
  \n```\nName: Kayak\nCategory: Watersports\nPrice: 279\n```\n\n### 向包中添加代码文件\n\n\
  包可以包含多个代码文件，为了简化开发，当访问同一包中定义的特性的，访问控制规则和包前缀不再适用。在`store`文件夹中添加一个名为`tax.go`的文件，内容如清单\
  \ 12-9 所示。\n\n```\npackage store\nconst defaultTaxRate float64 = 0.2\nconst minThreshold\
  \ = 10\ntype taxRate struct {\nrate, threshold float64\n}\nfunc newTaxRate(rate,\
  \ threshold float64) *taxRate {\nif (rate == 0) {\nrate = defaultTaxRate\n}\nif\
  \ (threshold < minThreshold) {\nthreshold = minThreshold\n}\nreturn &taxRate{rate,\
  \ threshold}\n}\nfunc (taxRate *taxRate) calcTax(product *Product) float64 {\nif\
  \ (product.price > taxRate.threshold) {\nreturn product.price + (product.price *\
  \ taxRate.rate)\n}\nreturn product.price\n}\n清单 12-9\nstore 文件夹中 tax.go 文件的内容\n\
  ```\n\n`tax.go`文件中定义的所有特性都是未导出的，这意味着它们只能在`store`包内部使用。请注意，`calcTax`方法可以访问`Product`类型的`price`字段，并且无需将其引用为`store.Product`，因为它们在同一个包中：\n\
  \n```\n...\nfunc (taxRate *taxRate) calcTax(product *Product) float64 {\nif (product.price\
  \ > taxRate.threshold) {\nreturn product.price + (product.price * taxRate.rate)\n\
  }\nreturn product.price\n}\n...\n```\n\n在清单 12-10 中，我修改了`Product.Price`方法，使其返回`price`字段的值加上税费。\n\
  \n```\npackage store\nvar standardTax = newTaxRate(0.25, 20)\ntype Product struct\
  \ {\nName, Category string\nprice float64\n}\nfunc NewProduct(name, category string,\
  \ price float64) *Product {\nreturn &Product{ name, category, price }\n}\nfunc (p\
  \ *Product) Price() float64 {\nreturn standardTax.calcTax(p)\n}\nfunc (p *Product)\
  \ SetPrice(newPrice float64)  {\np.price = newPrice\n}\n清单 12-10\n在 store 文件夹的 product.go\
  \ 文件中计算税费\n```\n\n`Price`方法可以访问未导出的`calcTax`方法，但该方法——以及它所属的类型——只能在`store`包内部使用。使用清单\
  \ 12-10 中的命令编译并执行代码，你将会得到以下输出：\n\n```\nName: Kayak\nCategory: Watersports\nPrice:\
  \ 348.75\n```\n\n避免重定义陷阱\n\n一个常见的错误是在同一个包的不同文件中重复使用名称。这是我经常犯的错误，包括在编写清单 12-10 所示的示例时。我的`product.go`文件中最初的代码版本包含了以下语句：\n\
  \n```\n...\nvar taxRate = newTaxRate(0.25, 20)\n...\n```\n\n这会导致编译错误，因为`tax.go`文件定义了一个名为`taxRate`的结构体类型。编译器不会区分分配给变量的名称和分配给类型的名称，并会报告类似如下的错误：\n\
  \n```\nstore\\tax.go:6:6: taxRate redeclared in this block\nprevious declaration\
  \ at store\\product.go:3:5\n```\n\n你也可能在代码编辑器中看到错误提示，说`taxRate`是一个无效的类型。这是同一问题的不同表现。要避免这些错误，你必须确保包中定义的顶层特性具有唯一的名称。名称不需要在包之间或在函数和方法内部保持唯一。\n\
  \n\n\n### 处理包名冲突\n\n导入包时，模块名和包名的组合确保了包的唯一标识。但在访问包所提供的功能时，仅使用包名，这可能导致冲突。为了了解这个问题是如何产生的，请创建\
  \ `packages`/`fmt` 文件夹，并在其中添加一个名为 `formats.go` 的文件，其代码如代码清单 12-11 所示。\n\n```\npackage\
  \ fmt\nimport \"strconv\"\nfunc ToCurrency(amount float64) string {\nreturn \"$\"\
  \ + strconv.FormatFloat(amount, 'f', 2, 64)\n}\n```\n\n代码清单 12-11  \n`fmt` 文件夹中\
  \ `formats.go` 文件的内容\n\n此文件导出名为 `ToCurrency` 的函数，该函数接收一个 `float64` 值，并使用我在第 17 章中描述的\
  \ `strconv.FormatFloat` 函数，生成一个格式化的美元金额。\n\n代码清单 12-11 中定义的 `fmt` 包与一个最广泛使用的标准库包同名。当两个包同时使用时就会引发问题，如代码清单\
  \ 12-12 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"packages/store\"\n\"packages/fmt\"\
  \n)\nfunc main() {\nproduct := store.NewProduct(\"Kayak\", \"Watersports\", 279)\n\
  fmt.Println(\"Name:\", product.Name)\nfmt.Println(\"Category:\", product.Category)\n\
  fmt.Println(\"Price:\", fmt.ToCurrency(product.Price()))\n}\n```\n\n代码清单 12-12 \
  \ \n`packages` 文件夹中 `main.go` 文件内使用同名包\n\n编译该项目，您将收到以下错误：\n\n```\n.\\main.go:6:5:\
  \ fmt redeclared as imported package name\nprevious declaration at .\\main.go:4:5\n\
  .\\main.go:13:5: undefined: \"packages/fmt\".Println\n.\\main.go:14:5: undefined:\
  \ \"packages/fmt\".Println\n.\\main.go:15:5: undefined: \"packages/fmt\".Println\n\
  ```\n\n## 使用包别名\n\n处理包名冲突的一种方法是使用别名，它允许使用不同的名称来访问包，如代码清单 12-13 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"packages/store\"\ncurrencyFmt \"packages/fmt\"\n)\n\
  func main() {\nproduct := store.NewProduct(\"Kayak\", \"Watersports\", 279)\nfmt.Println(\"\
  Name:\", product.Name)\nfmt.Println(\"Category:\", product.Category)\nfmt.Println(\"\
  Price:\", currencyFmt.ToCurrency(product.Price()))\n}\n```\n\n代码清单 12-13  \n`packages`\
  \ 文件夹中 `main.go` 文件内使用包别名\n\n包的别名在导入路径之前声明，如图 12-4 所示。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig4_HTML.jpg](img/512642_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4  \n包别名\n\n本例中的别名解决了名称冲突，使得以 `packages/fmt` 路径导入的包所定义的功能可以通过 `currencyFmt`\
  \ 作为前缀来访问，如下所示：\n\n```\n...\nfmt.Println(\"Price:\", currencyFmt.ToCurrency(product.Price()))\n\
  ...\n```\n\n编译并执行该项目，您将收到以下输出，该输出依赖于标准库中的 `fmt` 包以及已被别名的自定义 `fmt` 包定义的功能：\n\n```\n\
  Name: Kayak\nCategory: Watersports\nPrice: $348.75\n```\n\n## 使用点导入\n\n有一种特殊的别名，称为*点导入*，它允许在不使用前缀的情况下使用包的功能，如代码清单\
  \ 12-14 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"packages/store\"\n. \"packages/fmt\"\
  \n)\nfunc main() {\nproduct := store.NewProduct(\"Kayak\", \"Watersports\", 279)\n\
  fmt.Println(\"Name:\", product.Name)\nfmt.Println(\"Category:\", product.Category)\n\
  fmt.Println(\"Price:\", ToCurrency(product.Price()))\n}\n```\n\n代码清单 12-14  \n`packages`\
  \ 文件夹中 `main.go` 文件内使用点导入\n\n点导入使用句点作为包别名，如图 12-5 所示。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig5_HTML.jpg](img/512642_1_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5  \n使用点导入\n\n点导入允许我在不使用前缀的情况下访问 `ToCurrency` 函数，如下所示：\n\n```\n...\nfmt.Println(\"\
  Price:\", ToCurrency(product.Price()))\n...\n```\n\n使用点导入时，必须确保从该包导入的功能名称未在导入包中定义。对于本例，这意味着我必须确保\
  \ `ToCurrency` 这个名称没有被 `main` 包中定义的任何功能使用。因此，点导入应谨慎使用。\n\n## 创建嵌套包\n\n包可以在其他包内部定义，这使得将复杂功能分解为尽可能多的单元变得容易。创建\
  \ `packages/store/cart` 文件夹，并在其中添加一个名为 `cart.go` 的文件，其内容如代码清单 12-15 所示。\n\n```\n\
  package cart\nimport \"packages/store\"\ntype Cart struct {\nCustomerName string\n\
  Products []store.Product\n}\nfunc (cart *Cart) GetTotal() (total float64) {\nfor\
  \ _, p := range cart.Products {\ntotal += p.Price()\n}\nreturn\n}\n```\n\n代码清单 12-15\
  \  \n`store/cart` 文件夹中 `cart.go` 文件的内容\n\n`package` 语句的使用方式与任何其他包相同，无需包含父包或外层包的名称。对自定义包的依赖必须包含完整的包路径，如代码清单所示。代码清单\
  \ 12-15 中的代码定义了一个名为 `Cart` 的结构体类型，它导出了 `CustomerName` 和 `Products` 字段，以及一个 `GetTotal`\
  \ 方法。\n\n导入嵌套包时，包路径以模块名开头并列出包的序列，如代码清单 12-16 所示。\n\n```\npackage main\nimport (\n\
  \"fmt\"\n\"packages/store\"\n. \"packages/fmt\"\n\"packages/store/cart\"\n)\nfunc\
  \ main() {\nproduct := store.NewProduct(\"Kayak\", \"Watersports\", 279)\ncart :=\
  \ cart.Cart {\nCustomerName: \"Alice\",\nProducts: []store.Product{ *product },\n\
  }\nfmt.Println(\"Name:\", cart.CustomerName)\nfmt.Println(\"Total:\",  ToCurrency(cart.GetTotal()))\n\
  }\n```\n\n代码清单 12-16  \n`packages` 文件夹中 `main.go` 文件内使用嵌套包\n\n嵌套包定义的功能使用包名访问，与任何其他包一样。在代码清单\
  \ 12-16 中，这意味着 `store/cart` 包导出的类型和函数使用 `cart` 作为前缀来访问。编译并执行该项目，您将收到以下输出：\n\n```\n\
  Name: Alice\nTotal: $348.75\n```\n\n\n\n### 使用包初始化函数\n\n每个代码文件都可以包含一个初始化函数，该函数仅在所有包都已加载且所有其他初始化（例如定义常量和变量）完成之后执行。初始化函数最常见的用途是执行难以计算或需要重复计算的操作，如代码清单\
  \ 12-17 所示。\n\n```go\npackage store\nconst defaultTaxRate float64 = 0.2\nconst minThreshold\
  \ = 10\nvar categoryMaxPrices = map[string]float64 {\n\"Watersports\": 250 + (250\
  \ * defaultTaxRate),\n\"Soccer\": 150 + (150 * defaultTaxRate),\n\"Chess\": 50 +\
  \ (50 * defaultTaxRate),\n}\ntype taxRate struct {\nrate, threshold float64\n}\n\
  func newTaxRate(rate, threshold float64) *taxRate {\nif (rate == 0) {\nrate = defaultTaxRate\n\
  }\nif (threshold < minThreshold) {\nthreshold = minThreshold\n}\nreturn &taxRate{rate,\
  \ threshold}\n}\nfunc (taxRate *taxRate) calcTax(product *Product) (price float64)\
  \ {\nif product.price > taxRate.threshold {\nprice = product.price + (product.price\
  \ * taxRate.rate)\n} else {\nprice = product.price\n}\nif max, ok := categoryMaxPrices[product.Category];\
  \ ok && price > max {\nprice = max\n}\nreturn\n}\n代码清单 12-17\n在 store 文件夹的 tax.go\
  \ 文件中计算最高价格\n```\n\n这些改动引入了类别特定的最高价格，它们存储在一个映射中。每个类别的最高价格都以相同的方式计算，这导致了代码重复，并使代码难以阅读和维护。\n\
  \n这个问题用 `for` 循环可以轻松解决，但 Go 语言只允许在函数内部使用循环，而我需要在代码文件的顶层执行这些计算。\n\n解决方案是使用初始化函数，该函数在包加载时自动调用，并且可以使用\
  \ `for` 循环等语言特性，如代码清单 12-18 所示。\n\n```go\npackage store\nconst defaultTaxRate float64\
  \ = 0.2\nconst minThreshold = 10\nvar categoryMaxPrices = map[string]float64 {\n\
  \"Watersports\": 250,\n\"Soccer\": 150,\n\"Chess\": 50,\n}\nfunc init() {\nfor category,\
  \ price := range categoryMaxPrices {\ncategoryMaxPrices[category] = price + (price\
  \ * defaultTaxRate)\n}\n}\ntype taxRate struct {\nrate, threshold float64\n}\nfunc\
  \ newTaxRate(rate, threshold float64) *taxRate {\n// ...为简洁起见，省略了语句...\n}\nfunc\
  \ (taxRate *taxRate) calcTax(product *Product) (price float64) {\n// ...为简洁起见，省略了语句...\n\
  }\n代码清单 12-18\n在 store 文件夹的 tax.go 文件中使用初始化函数\n```\n\n初始化函数名为 `init`，定义时没有参数和返回值。`init`\
  \ 函数会被自动调用，为包的使用提供准备机会。编译并执行代码清单 12-17 和 12-18 中的代码，都会产生以下输出：\n\n```\nName: Kayak\n\
  Price: $300.00\n```\n\n`init` 函数并不是一个常规的 Go 函数，不能被直接调用。此外，与常规函数不同，单个文件可以定义多个 `init`\
  \ 函数，所有这些函数都会被执行。\n\n### 避免多个初始化函数的陷阱\n\n每个代码文件都可以有自己的初始化函数。使用标准 Go 编译器时，初始化函数会根据文件名的字母顺序执行，因此\
  \ `a.go` 文件中的函数会在 `b.go` 文件中的函数之前执行，依此类推。\n\n但此顺序并非 Go 语言规范的一部分，不应依赖于此。你的初始化函数应该是自包含的，不应依赖于其他\
  \ `init` 函数之前已被调用。\n\n#### 仅为初始化效果而导入包\n\nGo 语言禁止导入包却不使用它，如果你依赖于初始化函数的效果，但又无需使用该包导出的任何功能，这就会成为一个问题。创建\
  \ `packages/data` 文件夹，并向其中添加一个名为 `data.go` 的文件，内容如代码清单 12-19 所示。\n\n```go\npackage\
  \ data\nimport \"fmt\"\nfunc init() {\nfmt.Println((\"data.go init function invoked\"\
  ))\n}\nfunc GetData() []string {\nreturn []string {\"Kayak\", \"Lifejacket\", \"\
  Paddle\", \"Soccer Ball\"}\n}\n代码清单 12-19\ndata 文件夹中 data.go 文件的内容\n```\n\n在本示例中，初始化函数在被调用时会输出一条消息。如果我需要初始化函数的效果，但不需要使用该包导出的\
  \ `GetData` 函数，那么我可以使用空白标识符作为包名的别名来 `import` 该包，如代码清单 12-20 所示。\n\n```go\npackage\
  \ main\nimport (\n\"fmt\"\n\"packages/store\"\n. \"packages/fmt\"\n\"packages/store/cart\"\
  \n_ \"packages/data\"\n)\nfunc main() {\nproduct := store.NewProduct(\"Kayak\",\
  \ \"Watersports\", 279)\ncart := cart.Cart {\nCustomerName: \"Alice\",\nProducts:\
  \ []store.Product{ *product },\n}\nfmt.Println(\"Name:\", cart.CustomerName)\nfmt.Println(\"\
  Total:\",  ToCurrency(cart.GetTotal()))\n}\n代码清单 12-20\n在 packages 文件夹的 main.go\
  \ 文件中为初始化而导入\n```\n\n空白标识符（下划线字符）允许导入包而无需使用其导出的功能。编译并执行该项目，你将看到由代码清单 12-19 中定义的初始化函数输出的消息：\n\
  \n```\ndata.go init function invoked\nName: Alice\nTotal: $300.00\n```\n\n\n\n##\
  \ 使用外部包\n\n项目可以通过使用第三方开发的包来扩展。使用 `go get` 命令下载并安装包。在 `packages` 文件夹中运行清单 12-21 所示的命令，将包添加到示例项目中。\n\
  \n```\ngo get github.com/fatih/color@v1.10.0\n清单 12-21\n安装包\n```\n\n`go get` 命令的参数是包含你想要使用的包的模块的路径。其后跟着\
  \ `@` 字符和包版本号，版本号以字母 `v` 开头，如图 12-6 所示。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig6_HTML.jpg](img/512642_1_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n\n选择包\n\n`go get` 命令功能强大，它知道清单 12-21 中指定的路径是一个 GitHub URL。它会下载指定版本的模块，然后编译并安装其中包含的包，以便在项目中使用。（包以源代码形式分发，这样它们就可以为你正在使用的平台进行编译。）\n\
  \n### 寻找 Go 包\n\n有两个有用的资源可以用来查找 Go 包。第一个是 [`https://pkg.go.dev`](https://pkg.go.dev)，它提供了一个搜索引擎。不幸的是，可能需要花些时间才能弄清楚需要哪些关键字才能找到特定类型的包。\n\
  \n第二个资源是 [`https://github.com/golang/go/wiki/Projects`](https://github.com/golang/go/wiki/Projects)，它提供了一个精心挑选的\
  \ Go 项目列表，并按类别分组。并非所有列在 `pkg.go.dev` 上的项目都出现在这个列表中，我倾向于同时使用这两种资源来查找包。\n\n在选择模块时必须小心。许多\
  \ Go 模块是由个人开发者编写的，用于解决某个问题，然后发布给其他人使用。这创建了一个丰富的模块生态系统，但这意味着维护和支持可能不一致。例如，我在这节中使用的\
  \ `github.com/fatih/color` 模块已经退役，不再接收更新。我很乐意继续使用它，因为我在本章中对它的使用很简单，而且代码运行良好。你必须对你项目中依赖的模块进行同样的评估。\n\
  \n当 `go get` 命令完成后，检查 `go.mod` 文件，你会看到新的配置语句：\n\n```\nmodule packages\ngo 1.17\n\
  require (\ngithub.com/fatih/color v1.10.0 // indirect\ngithub.com/mattn/go-colorable\
  \ v0.1.8 // indirect\ngithub.com/mattn/go-isatty v0.0.12 // indirect\ngolang.org/x/sys\
  \ v0.0.0-20200223170610-d5e6a3e2c0ae // indirect\n)\n```\n\n`require` 语句指出了对 `github.com/fatih/color`\
  \ 模块及其所需的其他模块的依赖关系。语句末尾的 `indirect` 注释是自动添加的，因为项目代码尚未使用这些包。当获取模块时，会创建一个名为 `go.sum`\
  \ 的文件，其中包含用于验证包的校验和。\n\n**注意**：你也可以使用 `go.mod` 文件来创建对你本地创建的项目的依赖关系，这是我在第 3 部分 SportsStore\
  \ 示例中采用的方法。详情请参见第 35 章。\n\n一旦模块安装完成，它包含的包就可以在项目中使用，如清单 12-22 所示。\n\n```\npackage\
  \ main\nimport (\n//\"fmt\"\n\"packages/store\"\n. \"packages/fmt\"\n\"packages/store/cart\"\
  \n_ \"packages/data\"\n\"github.com/fatih/color\"\n)\nfunc main() {\nproduct :=\
  \ store.NewProduct(\"Kayak\", \"Watersports\", 279)\ncart := cart.Cart {\nCustomerName:\
  \ \"Alice\",\nProducts: []store.Product{ *product },\n}\ncolor.Green(\"Name: \"\
  \ + cart.CustomerName)\ncolor.Cyan(\"Total: \" + ToCurrency(cart.GetTotal()))\n\
  }\n清单 12-22\n在 packages 文件夹中的 main.go 文件里使用第三方包\n```\n\n外部包的导入和使用方式与自定义包相同。`import`\
  \ 语句指定模块路径，该路径的最后一部分用于访问包导出的特性。在这个例子中，包名为 `color`，这是访问包功能的前缀。\n\n清单 12-22 中使用的 `Green`\
  \ 和 `Cyan` 函数写入彩色输出，如果你编译并运行该项目，将会看到如图 12-7 所示的输出。\n\n![../images/512642_1_En_12_Chapter/512642_1_En_12_Fig7_HTML.jpg](img/512642_1_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7\n\n运行示例应用程序\n\n### 理解最小版本选择\n\n第一次运行清单 12-22 中的 `go get` 命令时，你会看到下载的模块列表，这说明了模块有它们自己的依赖关系，并且这些依赖关系会被自动解析：\n\
  \n```\ngo: downloading github.com/fatih/color v1.10.0\ngo: downloading github.com/mattn/go-isatty\
  \ v0.0.12\ngo: downloading github.com/mattn/go-colorable v0.1.8\ngo: downloading\
  \ golang.org/x/sys v0.0.0-20200223170610-d5e6a3e2c0ae\n```\n\n下载的内容会被缓存，这就是为什么下次对同一个模块使用\
  \ `go get` 命令时不会看到这些消息的原因。\n\n你可能会发现你的项目依赖于不同版本的模块，尤其是在具有大量依赖关系的复杂项目中。在这种情况下，Go\
  \ 会使用这些依赖关系指定的最新版本。例如，如果存在对模块版本 1.1 和 1.5 的依赖，Go 在构建项目时将使用版本 1.5。Go 只会使用依赖关系指定的最新版本，即使有更新的版本可用。例如，如果某个模块最新的依赖关系指定了版本\
  \ 1.5，即使版本 1.6 可用，Go 也不会使用它。\n\n这种方法的效果是，如果某个模块依赖于更新的版本，你的项目可能不会使用你通过 `go get` 命令选择的模块版本进行编译。同样地，如果另一个模块（或\
  \ `go.mod` 文件）指定了更新的版本，那么模块可能无法使用其依赖关系所期望的版本进行编译。\n\n### 管理外部包\n\n`go get` 命令会向\
  \ `go.mod` 文件添加依赖关系，但如果外部包不再需要，这些依赖关系不会自动移除。清单 12-23 更改了 `main.go` 文件的内容，移除了对 `github.com/fatih/color`\
  \ 包的使用。\n\n```\npackage main\nimport (\n\"fmt\"\n\"packages/store\"\n. \"packages/fmt\"\
  \n\"packages/store/cart\"\n_ \"packages/data\"\n//\"github.com/fatih/color\"\n)\n\
  func main() {\nproduct := store.NewProduct(\"Kayak\", \"Watersports\", 279)\ncart\
  \ := cart.Cart {\nCustomerName: \"Alice\",\nProducts: []store.Product{ *product\
  \ },\n}\n// color.Green(\"Name: \" + cart.CustomerName)\n// color.Cyan(\"Total:\
  \ \" + ToCurrency(cart.GetTotal()))\nfmt.Println(\"Name:\", cart.CustomerName)\n\
  fmt.Println(\"Total:\",  ToCurrency(cart.GetTotal()))\n}\n清单 12-23\n在 packages 文件夹中的\
  \ main.go 文件里移除包\n```\n\n要更新 `go.mod` 文件以反映此更改，请在 `packages` 文件夹中运行清单 12-24 所示的命令。\n\
  \n```\ngo mod tidy\n清单 12-24\n更新包依赖关系\n```\n\n该命令会检查项目代码，确定不再依赖于 `require` 的 `github.com/fatih/color`\
  \ 模块中的任何包，然后从 `go.mod` 文件中移除 `require` 语句：\n\n```\nmodule packages\ngo 1.17\n```\n\
  \n\n\n## 本章小结\n\n在本章中，我讲解了包在 Go 开发中扮演的角色。我展示了如何使用包为项目增加结构，以及包如何提供对第三方开发功能的访问。下一章，我将介绍\
  \ Go 中用于组合类型的特性，通过这些特性可以创建复杂类型。\n\n# 13. 类型与接口组合\n\n在本章中，我将解释如何将类型组合起来创建新功能。Go 没有使用你可能在其他语言中熟悉的继承机制，而是采用了一种称为*组合*的方法。这可能比较难理解，因此本章将回顾前面几章中介绍的一些特性，为解释组合过程奠定坚实的基础。表\
  \ 13-1 展示了类型和接口组合的上下文。\n\n**表 13-1.** 类型与接口组合的上下文\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 这是什么？ | 组合是通过组合结构体和接口来创建新类型的过程。 |\n| 为什么有用？ | 组合允许基于现有类型定义新类型。 |\n| 如何使用？ | 将现有类型嵌入到新类型中。\
  \ |\n| 是否有陷阱或限制？ | 组合的工作方式与继承不同，需要小心操作才能达到预期效果。 |\n| 是否有替代方案？ | 组合是可选的，你也可以创建完全独立的类型。\
  \ |\n\n表 13-2 总结了本章内容。\n\n**表 13-2.** 本章总结\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | ---\
  \ | --- |\n| 组合结构体类型 | 添加嵌入字段 | 7-9, 14–17 |\n| 在已组合类型上继续构建 | 创建嵌套的嵌入类型链 | 10–13\
  \ |\n| 组合接口类型 | 在新接口定义中添加现有接口的名称 | 25–26 |\n\n## 本章准备\n\n为准备本章内容，打开一个新命令提示符，导航到方便的位置，创建一个名为\
  \ `composition` 的目录。在 `composition` 文件夹中运行清单 13-1 所示的命令以创建模块文件。\n\n**提示**\n\n你可以从\
  \ [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章以及本书其他章节的示例项目。如果在运行示例时遇到问题，请参阅第\
  \ 2 章了解如何获取帮助。\n\n```\ngo mod init composition\n```\n\n**清单 13-1.** 初始化模块\n\n在 `composition`\
  \ 文件夹中添加一个名为 `main.go` 的文件，内容如清单 13-2 所示。\n\n```\npackage main\nimport \"fmt\"\n\
  func main() {\nfmt.Println(\"Hello, Composition\")\n}\n```\n\n**清单 13-2.** `composition`\
  \ 文件夹中 `main.go` 文件的内容\n\n使用命令提示符在 `composition` 文件夹中运行清单 13-3 所示的命令。\n\n```\ngo\
  \ run .\n```\n\n**清单 13-3.** 运行示例项目\n\n`main.go` 文件中的代码将被编译并执行，产生以下输出：\n\n```\n\
  Hello, Composition\n```\n\n## 理解类型组合\n\n如果你习惯使用 C# 或 Java 等语言，那么你可能曾创建过基类，并通过创建子类来添加更具体的功能。子类从基类继承功能，从而避免代码重复。其结果是形成一组类，其中基类定义通用功能，而各个子类则补充更具体的特性，如图\
  \ 13-1 所示。\n\n![../images/512642_1_En_13_Chapter/512642_1_En_13_Fig1_HTML.jpg](img/512642_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1.** 一组类\n\nGo 不支持类或继承，而是专注于*组合*。尽管存在差异，组合仍然可以用于创建类型层次结构，只是方式不同。\n\n###\
  \ 定义基类型\n\n首先定义一个结构体类型和一个方法，我将在后续示例中使用它们来创建更具体的类型。创建 `composition/store` 文件夹，并在其中添加一个名为\
  \ `product.go` 的文件，内容如清单 13-4 所示。\n\n```\npackage store\ntype Product struct {\n\
  Name, Category string\nprice float64\n}\nfunc (p *Product) Price(taxRate float64)\
  \ float64 {\nreturn p.price + (p.price * taxRate)\n}\n```\n\n**清单 13-4.** `store`\
  \ 文件夹中 `product.go` 文件的内容\n\n`Product` 结构体定义了导出字段 `Name` 和 `Category`，以及一个未导出字段\
  \ `price`。此外还有一个名为 `Price` 的方法，它接受一个 `float64` 参数，并利用该参数与 `price` 字段计算含税价格。\n\n\
  #### 定义构造函数\n\n由于 Go 不支持类，因此也不支持类构造函数。如前所述，一种常见的约定是定义一个名为 `New<Type>` 的构造函数，例如 `NewProduct`，如清单\
  \ 13-5 所示，这样可以为所有字段（即使未导出的字段）提供值。与其他代码特性一样，构造函数名称首字母的大小写决定了它是否在包外导出。\n\n```\npackage\
  \ store\ntype Product struct {\nName, Category string\nprice float64\n}\nfunc NewProduct(name,\
  \ category string, price float64) *Product {\nreturn &Product{ name, category, price\
  \ }\n}\nfunc (p *Product) Price(taxRate float64) float64 {\nreturn p.price + (p.price\
  \ * taxRate)\n}\n```\n\n**清单 13-5.** 在 `store` 文件夹的 `product.go` 文件中定义构造函数\n\n构造函数函数仅是一种约定，其使用并非强制要求，这意味着只要不为未导出字段赋值，就可以使用字面量语法创建导出类型。清单\
  \ 13-6 展示了构造函数和字面量语法的使用。\n\n```\npackage main\nimport (\n\"fmt\"\n\"composition/store\"\
  \n)\nfunc main() {\nkayak := store.NewProduct(\"Kayak\", \"Watersports\", 275)\n\
  lifejacket := &store.Product{ Name: \"Lifejacket\", Category:  \"Watersports\"}\n\
  for _, p := range []*store.Product { kayak, lifejacket} {\nfmt.Println(\"Name:\"\
  , p.Name, \"Category:\", p.Category, \"Price:\", p.Price(0.2))\n}\n}\n```\n\n**清单\
  \ 13-6.** 在 `composition` 文件夹的 `main.go` 文件中创建结构体值\n\n只要定义了构造函数，就应该使用它，因为这有助于更轻松地管理值创建方式的变化，并能确保字段得到正确初始化。在清单\
  \ 13-6 中，使用字面量语法意味着未给 `price` 字段赋值，这会影响 `Price` 方法的输出。但由于 Go 不强制使用构造函数，因此使用构造函数需要一定的自律性。\n\
  \n编译并运行项目，你将得到以下输出：\n\n```\nName: Kayak Category: Watersports Price: 330\nName:\
  \ Lifejacket Category: Watersports Price: 0\n```\n\n\n\n## 组合类型\n\nGo 语言支持通过组合结构体类型来实现**组合**，而非继承。在\
  \ `store` 文件夹中添加一个名为 `boat.go` 的文件，内容如代码清单 13-7 所示。\n\n```\npackage store\ntype\
  \ Boat struct {\n*Product\nCapacity int\nMotorized bool\n}\nfunc NewBoat(name string,\
  \ price float64, capacity int, motorized bool) *Boat {\nreturn &Boat {\nNewProduct(name,\
  \ \"Watersports\", price), capacity, motorized,\n}\n}\n代码清单 13-7\nstore 文件夹中 boat.go\
  \ 文件的内容\n```\n\n`Boat` 结构体类型定义了一个嵌入的 `*Product` 字段，如图 13-2 所示。\n\n![../images/512642_1_En_13_Chapter/512642_1_En_13_Fig2_HTML.jpg](img/512642_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n\n嵌入一个类型\n\n一个结构体可以混合常规字段和嵌入字段类型，但嵌入字段是组合特性的重要组成部分，稍后你将看到这一点。\n\n`NewBoat`\
  \ 函数是一个构造函数，它使用其参数创建一个 `Boat`，并包含嵌入的 `Product` 值。代码清单 13-8 展示了这个新结构体的使用。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\nboats\
  \ := []*store.Boat {\nstore.NewBoat(\"Kayak\", 275, 1, false),\nstore.NewBoat(\"\
  Canoe\", 400, 3, false),\nstore.NewBoat(\"Tender\", 650.25, 2, true),\n}\nfor _,\
  \ b := range boats {\nfmt.Println(\"Conventional:\", b.Product.Name, \"Direct:\"\
  , b.Name)\n}\n}\n代码清单 13-8\n在 composition 文件夹的 main.go 文件中使用 Boat 结构体\n```\n\n这些新语句创建了一个包含\
  \ `Boat` 类型的 `*Boat` 切片，并使用 `NewBoat` 构造函数进行填充。\n\n对于包含类型为另一个结构体类型的字段，Go 语言会给予特殊处理，就像示例项目中\
  \ `Boat` 类型拥有 `*Product` 字段一样。你可以在 `for` 循环中的语句里看到这种特殊处理，该语句负责输出每个 `Boat` 的详细信息。\n\
  \nGo 语言允许通过两种方式访问嵌套类型的字段。第一种是传统方法，即遍历类型层次结构以获取所需的值。`*Product` 字段是嵌入的，这意味着它的名字就是它的类型。要访问\
  \ `Name` 字段，我可以这样遍历嵌套类型：\n\n```\n...\nfmt.Println(\"Conventional:\", b.Product.Name,\
  \ \"Direct:\", b.Name)\n...\n```\n\nGo 语言也允许直接使用嵌套的字段类型，就像这样：\n\n```\n...\nfmt.Println(\"\
  Conventional:\", b.Product.Name, \"Direct:\", b.Name)\n...\n```\n\n`Boat` 类型并没有定义\
  \ `Name` 字段，但由于直接访问特性，它可以被视为定义了该字段。这被称为**字段提升**，Go 语言实际上将类型“扁平化”了，使得 `Boat` 类型的行为就像它定义了由嵌套的\
  \ `Product` 类型提供的字段一样，如图 13-3 所示。\n\n![../images/512642_1_En_13_Chapter/512642_1_En_13_Fig3_HTML.jpg](img/512642_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n\n提升的字段\n\n编译并执行该项目，你将看到两种方法产生的值相同：\n\n```\nConventional: Kayak Direct:\
  \ Kayak\nConventional: Canoe Direct: Canoe\nConventional: Tender Direct: Tender\n\
  ```\n\n方法也会被提升，因此为嵌套类型定义的方法可以从外部类型调用，如代码清单 13-9 所示。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\nboats := []*store.Boat {\n\
  store.NewBoat(\"Kayak\", 275, 1, false),\nstore.NewBoat(\"Canoe\", 400, 3, false),\n\
  store.NewBoat(\"Tender\", 650.25, 2, true),\n}\nfor _, b := range boats {\nfmt.Println(\"\
  Boat:\", b.Name, \"Price:\", b.Price(0.2))\n}\n}\n代码清单 13-9\n在 composition 文件夹的\
  \ main.go 文件中调用方法\n```\n\n如果字段类型是值类型，例如 `Product`，那么所有使用 `Product` 或 `*Product`\
  \ 接收器定义的方法都会被提升。如果字段类型是指针类型，例如 `*Product`，那么只有使用 `*Product` 接收器定义的方法会被提升。\n\n`*Boat`\
  \ 类型没有定义 `Price` 方法，但 Go 语言提升了使用 `*Product` 接收器定义的方法。编译并执行该项目，你将得到以下输出：\n\n```\n\
  Boat: Kayak Price: 330\nBoat: Canoe Price: 480\nBoat: Tender Price: 780.3\n```\n\
  \n**理解提升字段与字面量语法**\n\nGo 语言在结构体值创建之后才会应用其特殊处理来提升字段。例如，如果我使用 `NewBoat` 函数创建了一个值，像这样：\n\
  \n```\n...\nboat := store.NewBoat(\"Kayak\", 275, 1, false)\n...\n```\n\n那么我可以像这样读取和赋值给提升的字段：\n\
  \n```\n...\nboat.Name = \"Green Kayak\"\n...\n```\n\n但是，当最初使用字面量语法创建值时，这个特性不可用，这意味着我不能像这样替换\
  \ `NewBoat` 函数：\n\n```\n...\nboat := store.Boat { Name: \"Kayak\", Category: \"\
  Watersports\",\nCapacity: 1, Motorized: false }\n...\n```\n\n编译器不允许直接赋值，并且在编译代码时会报告“未知字段”错误。如果你确实使用字面量语法，那么必须像这样为嵌套字段赋值：\n\
  \n```\n...\nboat := store.Boat { Product: &store.Product{ Name: \"Kayak\",\nCategory:\
  \ \"Watersports\"}, Capacity: 1, Motorized: false }\n...\n```\n\n正如我在“创建嵌套类型链”一节中解释的，Go\
  \ 语言使得使用组合特性创建复杂类型变得容易，但这使得字面量语法的使用越来越困难，并产生容易出错且难以维护的代码。我的建议是使用构造函数，并且在一个构造函数中调用另一个构造函数，就像\
  \ `NewBoat` 函数在代码清单 13-7 中调用 `NewProduct` 函数一样。\n\n### 创建嵌套类型链\n\n组合特性可用于创建复杂的嵌套类型链，其字段和方法会被提升到顶层外部类型。在\
  \ `store` 文件夹中添加一个名为 `rentalboats.go` 的文件，内容如代码清单 13-10 所示。\n\n```\npackage store\n\
  type RentalBoat struct {\n*Boat\nIncludeCrew bool\n}\nfunc NewRentalBoat(name string,\
  \ price float64, capacity int,\nmotorized, crewed bool) *RentalBoat {\nreturn &RentalBoat{NewBoat(name,\
  \ price, capacity, motorized), crewed}\n}\n代码清单 13-10\nstore 文件夹中 rentalboats.go\
  \ 文件的内容\n```\n\n`RentalBoat` 类型由 `*Boat` 类型组合而成，而 `*Boat` 类型又由 `*Product` 类型组合而成，形成了一个链条。Go\
  \ 语言执行提升操作，使得链条中所有三种类型定义的字段都可以被直接访问，如代码清单 13-11 所示。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\nrentals := []*store.RentalBoat\
  \ {\nstore.NewRentalBoat(\"Rubber Ring\", 10, 1, false, false),\nstore.NewRentalBoat(\"\
  Yacht\", 50000, 5, true, true),\nstore.NewRentalBoat(\"Super Yacht\", 100000, 15,\
  \ true, true),\n}\nfor _, r := range rentals {\nfmt.Println(\"Rental Boat:\", r.Name,\
  \ \"Rental Price:\", r.Price(0.2))\n}\n}\n代码清单 13-11\n在 composition 文件夹的 main.go\
  \ 文件中直接访问嵌套字段\n```\n\nGo 语言从嵌套的 `Boat` 和 `Product` 类型提升字段，使其可以通过顶层 `RentalBoat`\
  \ 类型访问，从而允许在代码清单 13-11 中读取 `Name` 字段。方法也会被提升到顶层类型，这就是为什么我可以使用 `Price` 方法，即使它是在链条末端的\
  \ `*Product` 类型上定义的。编译并执行代码清单 13-11 中的代码，将产生以下输出：\n\n```\nRental Boat: Rubber Ring\
  \ Rental Price: 12\nRental Boat: Yacht Rental Price: 60000\nRental Boat: Super Yacht\
  \ Rental Price: 120000\n```\n\n\n\n### 在同一个结构体中使用多个嵌套类型\n\n类型可以定义多个结构体字段，并且 Go 会为所有嵌套类型提升字段。清单\
  \ 13-12 定义了一个描述船务人员的新类型，并将其用作另一个结构体中的字段类型。\n\n```go\npackage store\n\ntype Crew\
  \ struct {\n    Captain, FirstOfficer string\n}\n\ntype RentalBoat struct {\n  \
  \  *Boat\n    IncludeCrew bool\n    *Crew\n}\n\nfunc NewRentalBoat(name string,\
  \ price float64, capacity int,\n    motorized, crewed bool, captain, firstOfficer\
  \ string) *RentalBoat {\n    return &RentalBoat{NewBoat(name, price, capacity, motorized),\
  \ crewed,\n        &Crew{captain, firstOfficer}}\n}\n```\n（清单 13-12：在 `store` 文件夹的\
  \ `rentalboats.go` 文件中定义一个新类型）\n\n`RentalBoat` 类型拥有 `*Boat` 和 `*Crew` 字段，Go 会提升这两个嵌套类型的所有字段和方法，如清单\
  \ 13-13 所示。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"composition/store\"\
  \n)\n\nfunc main() {\n    rentals := []*store.RentalBoat{\n        store.NewRentalBoat(\"\
  Rubber Ring\", 10, 1, false, false, \"N/A\", \"N/A\"),\n        store.NewRentalBoat(\"\
  Yacht\", 50000, 5, true, true, \"Bob\", \"Alice\"),\n        store.NewRentalBoat(\"\
  Super Yacht\", 100000, 15, true, true,\n            \"Dora\", \"Charlie\"),\n  \
  \  }\n    for _, r := range rentals {\n        fmt.Println(\"Rental Boat:\", r.Name,\
  \ \"Rental Price:\", r.Price(0.2),\n            \"Captain:\", r.Captain)\n    }\n\
  }\n```\n（清单 13-13：在 `composition` 文件夹的 `main.go` 文件中使用提升的字段）\n\n编译并执行该项目，你将看到以下输出，其中增加了船务人员的详细信息：\n\
  \n```\nRental Boat: Rubber Ring Rental Price: 12 Captain: N/A\nRental Boat: Yacht\
  \ Rental Price: 60000 Captain: Bob\nRental Boat: Super Yacht Rental Price: 120000\
  \ Captain: Dora\n```\n\n### 理解何时不能进行提升\n\n只有当封闭类型上没有定义同名的字段或方法时，Go 才能执行提升，否则会导致意外的结果。在\
  \ `store` 文件夹中添加一个名为 `specialdeal.go` 的文件，其代码如清单 13-14 所示。\n\n```go\npackage store\n\
  \ntype SpecialDeal struct {\n    Name string\n    *Product\n    price float64\n\
  }\n\nfunc NewSpecialDeal(name string, p *Product, discount float64) *SpecialDeal\
  \ {\n    return &SpecialDeal{name, p, p.price - discount}\n}\n\nfunc (deal *SpecialDeal)\
  \ GetDetails() (string, float64, float64) {\n    return deal.Name, deal.price, deal.Price(0)\n\
  }\n```\n（清单 13-14：`store` 文件夹中 `specialdeal.go` 文件的内容）\n\n`SpecialDeal` 类型定义了一个\
  \ `*Product` 嵌入字段。这种组合导致了重复字段，因为两个类型都定义了 `Name` 和 `price` 字段。此外还有一个构造函数和 `GetDetails`\
  \ 方法，该方法返回 `Name` 和 `price` 字段的值，以及 `Price` 方法的结果（为了示例更易于理解，此处调用 `Price` 时传入了零作为参数）。清单\
  \ 13-15 使用这个新类型来演示如何处理提升。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"\
  composition/store\"\n)\n\nfunc main() {\n    product := store.NewProduct(\"Kayak\"\
  , \"Watersports\", 279)\n    deal := store.NewSpecialDeal(\"Weekend Special\", product,\
  \ 50)\n    Name, price, Price := deal.GetDetails()\n    fmt.Println(\"Name:\", Name)\n\
  \    fmt.Println(\"Price field:\", price)\n    fmt.Println(\"Price method:\", Price)\n\
  }\n```\n（清单 13-15：在 `composition` 文件夹的 `main.go` 文件中使用新类型）\n\n这段代码创建了一个 `*Product`，然后用来创建一个\
  \ `*SpecialDeal`。调用 `GetDetails` 方法，并打印其返回的三个结果。编译并运行代码，你将看到以下输出：\n\n```\nName:\
  \ Weekend Special\nPrice field: 229\nPrice method: 279\n```\n\n前两个结果可能符合预期：`Product`\
  \ 类型中的 `Name` 和 `price` 字段没有被提升，因为 `SpecialDeal` 类型有同名的字段。\n\n第三个结果可能会引发问题。Go 可以提升\
  \ `Price` 方法，但当它被调用时，它使用的是 `Product` 中的 `price` 字段，而不是 `SpecialDeal` 中的。\n\n很容易忘记字段和方法提升只是一个便利特性。清单\
  \ 13-14 中的这条语句：\n\n```go\nreturn deal.Name, deal.price, deal.Price(0)\n```\n\n是以下语句的更简洁写法：\n\
  \n```go\nreturn deal.Name, deal.price, deal.Product.Price(0)\n```\n\n当通过结构体字段调用方法时，很明显调用\
  \ `Price` 方法的结果不会使用 `SpecialDeal` 类型定义的 `price` 字段。\n\n如果我想要能够调用 `Price` 方法并得到一个确实依赖于\
  \ `SpecialDeal.price` 字段的结果，那么我必须定义一个新方法，如清单 13-16 所示。\n\n```go\npackage store\n\
  \ntype SpecialDeal struct {\n    Name string\n    *Product\n    price float64\n\
  }\n\nfunc NewSpecialDeal(name string, p *Product, discount float64) *SpecialDeal\
  \ {\n    return &SpecialDeal{name, p, p.price - discount}\n}\n\nfunc (deal *SpecialDeal)\
  \ GetDetails() (string, float64, float64) {\n    return deal.Name, deal.price, deal.Price(0)\n\
  }\n\nfunc (deal *SpecialDeal) Price(taxRate float64) float64 {\n    return deal.price\n\
  }\n```\n（清单 13-16：在 `store` 文件夹的 `specialdeal.go` 文件中定义一个方法）\n\n新的 `Price` 方法阻止了\
  \ Go 提升 `Product` 方法，并在项目编译和执行后产生以下结果：\n\n```\nName: Weekend Special\nPrice field:\
  \ 229\nPrice method: 229\n```\n\n#### 理解提升的二义性\n\n一个相关的问题是，当两个嵌入字段使用相同的字段或方法名时，如清单\
  \ 13-17 所示。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"composition/store\"\
  \n)\n\nfunc main() {\n    kayak := store.NewProduct(\"Kayak\", \"Watersports\",\
  \ 279)\n    type OfferBundle struct {\n        *store.SpecialDeal\n        *store.Product\n\
  \    }\n    bundle := OfferBundle{\n        store.NewSpecialDeal(\"Weekend Special\"\
  , kayak, 50),\n        store.NewProduct(\"Lifrejacket\", \"Watersports\", 48.95),\n\
  \    }\n    fmt.Println(\"Price:\", bundle.Price(0))\n}\n```\n（清单 13-17：在 `composition`\
  \ 文件夹的 `main.go` 文件中产生二义性的方法）\n\n`OfferBundle` 类型有两个嵌入字段，它们都具有 `Price` 方法。Go 无法区分这两个方法，清单\
  \ 13-17 中的代码在编译时会报以下错误：\n\n```\n.\\main.go:22:33: ambiguous selector bundle.Price\n\
  ```\n\n## 理解组合与接口\n\n组合类型可以轻松构建专门化的功能，而无需重复通用类型所需的代码；例如，项目中的 `Boat` 类型可以构建在 `Product`\
  \ 类型提供的功能之上。\n\n这看起来与其他语言中的类相似，但有一个重要的区别：每个组合后的类型都是独立的，不能用在需要其组成部分类型的地方，如清单 13-18\
  \ 所示。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"composition/store\"\
  \n)\n\nfunc main() {\n    products := map[string]*store.Product{\n        \"Kayak\"\
  : store.NewBoat(\"Kayak\", 279, 1, false),\n        \"Ball\":  store.NewProduct(\"\
  Soccer Ball\", \"Soccer\", 19.50),\n    }\n    for _, p := range products {\n  \
  \      fmt.Println(\"Name:\", p.Name, \"Category:\", p.Category, \"Price:\", p.Price(0.2))\n\
  \    }\n}\n```\n（清单 13-18：在 `composition` 文件夹的 `main.go` 文件中混合使用类型）\n\nGo 编译器不允许将\
  \ `Boat` 作为值用在需要 `Product` 值的切片中。在 C# 或 Java 这类语言中，这是允许的，因为 `Boat` 会是 `Product`\
  \ 的子类，但 Go 处理类型的方式并非如此。如果你编译该项目，将会看到以下错误：\n\n```\n.\\main.go:11:9: cannot use store.NewBoat(\"\
  Kayak\", 279, 1, false) (type *store.Boat) as type *store.Product in map value\n\
  ```\n\n\n\n### 使用组合实现接口\n\n正如我在第 11 章中所解释的，Go 使用接口来描述可由多种类型实现的方法。\n\nGo 在判断某个类型是否符合接口时，会考虑提升的方法，这避免了重复编写已通过嵌入字段实现的方法。为了理解其工作原理，在\
  \ `store` 文件夹中添加一个名为 `forsale.go` 的文件，内容如代码清单 13-19 所示。\n\n```\npackage store\n\
  type ItemForSale interface {\nPrice(taxRate float64) float64\n}\n代码清单 13-19\nstore\
  \ 文件夹中 forsale.go 文件的内容\n```\n\n`ItemForSale` 类型是一个接口，它指定了一个名为 `Price` 的单一方法，该方法有一个\
  \ `float64` 型参数和一个 `float64` 型返回值。代码清单 13-20 使用该接口类型创建了一个映射，其中填充了符合该接口的条目。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\nproducts\
  \ := map[string]store.ItemForSale {\n\"Kayak\": store.NewBoat(\"Kayak\", 279, 1,\
  \ false),\n\"Ball\": store.NewProduct(\"Soccer Ball\", \"Soccer\", 19.50),\n}\n\
  for key, p := range products {\nfmt.Println(\"Key:\", key, \"Price:\", p.Price(0.2))\n\
  }\n}\n代码清单 13-20\n在 composition 文件夹的 main.go 文件中使用接口\n```\n\n将映射改为使用接口后，我就可以存储 `Product`\
  \ 和 `Boat` 类型的值了。`Product` 类型直接符合 `ItemForSale` 接口，因为存在一个 `Price` 方法，其签名与接口指定的一致，且接收者为\
  \ `*Product`。\n\n`*Boat` 接收者并没有 `Price` 方法，但 Go 会考虑从 `Boat` 类型的嵌入字段中提升而来的 `Price`\
  \ 方法，并用它来满足接口的要求。编译并执行该项目，你将看到以下输出：\n\n```\nKey: Kayak Price: 334.8\nKey: Ball Price:\
  \ 23.4\n```\n\n#### 理解类型切换的局限性\n\n接口只能指定方法，这就是为什么在代码清单 13-20 中，我在输出时使用了映射中存储值的键。在第\
  \ 11 章中，我解释了可以使用 `switch` 语句来获取底层类型，但这可能并不像你期望的那样工作，如代码清单 13-21 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\nproducts :=\
  \ map[string]store.ItemForSale {\n\"Kayak\": store.NewBoat(\"Kayak\", 279, 1, false),\n\
  \"Ball\": store.NewProduct(\"Soccer Ball\", \"Soccer\", 19.50),\n}\nfor key, p :=\
  \ range products {\nswitch item := p.(type) {\ncase *store.Product, *store.Boat:\n\
  fmt.Println(\"Name:\", item.Name, \"Category:\", item.Category,\n\"Price:\", item.Price(0.2))\n\
  default:\nfmt.Println(\"Key:\", key, \"Price:\", p.Price(0.2))\n}\n}\n}\n代码清单 13-21\n\
  在 composition 文件夹的 main.go 文件中访问底层类型\n```\n\n代码清单 13-21 中的 `case` 语句指定了 `*Product`\
  \ 和 `*Boat`，这会导致编译器失败，并出现以下错误：\n\n```\n.\\main.go:21:42: item.Name undefined (type\
  \ store.ItemForSale has no field or method Name)\n.\\main.go:21:66: item.Category\
  \ undefined (type store.ItemForSale has no field or method Category)\n```\n\n问题在于，指定了多个类型的\
  \ `case` 语句会匹配所有这些类型的值，但不会执行类型断言。对于代码清单 13-21 来说，这意味着 `*Product` 和 `*Boat` 的值会被\
  \ `case` 语句匹配，但 `item` 变量的类型将是 `ItemForSale`，这就是编译器报错的原因。相反，必须使用额外的类型断言或单类型 `case`\
  \ 语句，如代码清单 13-22 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"composition/store\"\
  \n)\nfunc main() {\nproducts := map[string]store.ItemForSale {\n\"Kayak\": store.NewBoat(\"\
  Kayak\", 279, 1, false),\n\"Ball\": store.NewProduct(\"Soccer Ball\", \"Soccer\"\
  , 19.50),\n}\nfor key, p := range products {\nswitch item := p.(type) {\ncase *store.Product:\n\
  fmt.Println(\"Name:\", item.Name, \"Category:\", item.Category,\n\"Price:\", item.Price(0.2))\n\
  case *store.Boat:\nfmt.Println(\"Name:\", item.Name, \"Category:\", item.Category,\n\
  \"Price:\", item.Price(0.2))\ndefault:\nfmt.Println(\"Key:\", key, \"Price:\", p.Price(0.2))\n\
  }\n}\n}\n代码清单 13-22\n在 composition 文件夹的 main.go 文件中使用单独的 case 语句\n```\n\n当指定单个类型时，`case`\
  \ 语句会执行类型断言，尽管这可能导致代码重复，因为每个类型都需要单独处理。编译并执行代码清单 13-22 中的代码，将产生以下输出：\n\n```\nName:\
  \ Kayak Category: Watersports Price: 334.8\nName: Soccer Ball Category: Soccer Price:\
  \ 23.4\n```\n\n另一种解决方案是定义能够提供属性值访问的接口方法。这可以通过向现有接口添加方法，或者定义一个新的独立接口来实现，如代码清单 13-23\
  \ 所示。\n\n```\npackage store\ntype Product struct {\nName, Category string\nprice\
  \ float64\n}\nfunc NewProduct(name, category string, price float64) *Product {\n\
  return &Product{ name, category, price }\n}\nfunc (p *Product) Price(taxRate float64)\
  \ float64 {\nreturn p.price + (p.price * taxRate)\n}\ntype Describable interface\
  \  {\nGetName() string\nGetCategory() string\n}\nfunc (p *Product) GetName() string\
  \ {\nreturn p.Name\n}\nfunc (p *Product) GetCategory() string {\nreturn p.Category\n\
  }\n代码清单 13-23\n在 store 文件夹的 product.go 文件中定义接口\n```\n\n`Describable` 接口定义了 `GetName`\
  \ 和 `GetCategory` 方法，这些方法已为 `*Product` 类型实现。代码清单 13-24 修改了 `switch` 语句，使其使用接口而不是字段。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"composition/store\"\n)\nfunc main() {\n\
  products := map[string]store.ItemForSale {\n\"Kayak\": store.NewBoat(\"Kayak\",\
  \ 279, 1, false),\n\"Ball\": store.NewProduct(\"Soccer Ball\", \"Soccer\", 19.50),\n\
  }\nfor key, p := range products {\nswitch item := p.(type) {\ncase store.Describable:\n\
  fmt.Println(\"Name:\", item.GetName(), \"Category:\", item.GetCategory(),\n\"Price:\"\
  , item.(store.ItemForSale).Price(0.2))\ndefault:\nfmt.Println(\"Key:\", key, \"\
  Price:\", p.Price(0.2))\n}\n}\n}\n代码清单 13-24\n在 composition 文件夹的 main.go 文件中使用接口\n\
  ```\n\n这种方法是可行的，但它依赖于向 `ItemForSale` 接口的类型断言来访问 `Price` 方法。这有问题，因为一个类型可能实现了 `Describable`\
  \ 接口，却没有实现 `ItemForSale` 接口，这会导致运行时错误。我可以通过将 `Price` 方法添加到 `Describable` 接口来处理类型断言，但还有另一种方法，我将在下一节中描述。编译并执行该项目，你将看到以下输出：\n\
  \n```\nName: Kayak Category: Watersports Price: 334.8\nName: Soccer Ball Category:\
  \ Soccer Price: 23.4\n```\n\n\n\n### 组合接口\n\nGo 允许将一个接口与其他接口组合，如代码清单 13-25 所示。\n\
  \n```go\npackage store\ntype Product struct {\n\tName, Category string\n\tprice\
  \ float64\n}\nfunc NewProduct(name, category string, price float64) *Product {\n\
  \treturn &Product{ name, category, price }\n}\nfunc (p *Product) Price(taxRate float64)\
  \ float64 {\n\treturn p.price + (p.price * taxRate)\n}\ntype Describable interface\
  \  {\n\tGetName() string\n\tGetCategory() string\n\tItemForSale\n}\nfunc (p *Product)\
  \ GetName() string {\n\treturn p.Name\n}\nfunc (p *Product) GetCategory() string\
  \ {\n\treturn p.Category\n}\n```\n\n一个接口可以包含另一个接口，其效果是类型必须实现外层接口和内层接口定义的所有方法。接口比结构体更简单，没有需要提升的字段或方法。组合接口的结果是外层和内层类型定义的方法的并集。在此示例中，这个并集意味着实现\
  \ `Describable` 接口需要 `GetName`、`GetCategory` 和 `Price` 方法。由 `Describable` 接口直接定义的\
  \ `GetName` 和 `GetCategory` 方法，与 `ItemForSale` 接口定义的 `Price` 方法形成了一个并集。\n\n对 `Describable`\
  \ 接口的修改意味着上一节中使用的类型断言不再需要，如代码清单 13-26 所示。\n\n```go\npackage main\nimport (\n\t\"\
  fmt\"\n\t\"composition/store\"\n)\nfunc main() {\n\tproducts := map[string]store.ItemForSale\
  \ {\n\t\t\"Kayak\": store.NewBoat(\"Kayak\", 279, 1, false),\n\t\t\"Ball\": store.NewProduct(\"\
  Soccer Ball\", \"Soccer\", 19.50),\n\t}\n\tfor key, p := range products {\n\t\t\
  switch item := p.(type) {\n\t\tcase store.Describable:\n\t\t\tfmt.Println(\"Name:\"\
  , item.GetName(), \"Category:\", item.GetCategory(),\n\t\t\t\t\"Price:\", item.Price(0.2))\n\
  \t\tdefault:\n\t\t\tfmt.Println(\"Key:\", key, \"Price:\", p.Price(0.2))\n\t\t}\n\
  \t}\n}\n```\n\n任何实现了 `Describable` 接口的类型，其值都必须拥有一个 `Price` 方法，因为代码清单 13-25 中执行了组合操作，这意味着可以调用该方法，而无需进行有风险的类型断言。编译并执行该项目，你将收到以下输出：\n\
  \n```\nName: Kayak Category: Watersports Price: 334.8\nName: Soccer Ball Category:\
  \ Soccer Price: 23.4\n```\n\n## 本章小结\n\n在本章中，我描述了 Go 类型如何被组合以创建更复杂的功能，为其他语言基于继承的方法提供了一种替代方案。下一章，我将描述协程（goroutines）和通道（channels），它们是\
  \ Go 用于管理并发的特性。\n\n# 14. 使用协程和通道\n\nGo 对编写并发应用程序提供了出色的支持，其使用的特性比我用过的任何其他语言都更简单、更直观。本章我将介绍*协程*（goroutines）的使用，它允许函数并发执行，以及*通道*（channels），通过它协程可以异步产生结果。表\
  \ 14-1 将协程和通道置于适当的上下文中。\n\n**表 14-1：** 协程和通道的上下文\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它们是什么？ | 协程是由 Go 运行时创建和管理的轻量级线程。通道是承载特定类型值的管道。 |\n| 它们为什么有用？ | 协程允许函数并发执行，而无需处理操作系统线程的复杂性。通道允许协程异步产生结果。\
  \ |\n| 如何使用它们？ | 使用 `go` 关键字创建协程。通道被定义为数据类型。 |\n| 是否有任何陷阱或限制？ | 必须小心管理通道的方向。共享数据的协程需要额外的特性，这些将在第\
  \ 14 章中描述。 |\n| 是否有替代方案？ | 协程和通道是 Go 内置的并发特性，但某些应用程序可以依赖单线程执行，该线程默认被创建用来执行 main\
  \ 函数。 |\n\n**表 14-2：** 本章摘要\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 异步执行函数\
  \ | 创建一个协程 | 7 |\n| 从异步执行的函数获取结果 | 使用通道 | 10, 15, 16, 22–26 |\n| 使用通道发送和接收值 | 使用箭头表达式\
  \ | 11–13 |\n| 指示将不再通过通道发送更多值 | 使用 `close` 函数 | 17–20 |\n| 枚举从通道接收到的值 | 使用带 `range`\
  \ 关键字的 `for` 循环 | 21 |\n| 使用多个通道发送或接收值 | 使用 `select` 语句 | 27–32 |\n\n\n\n## 本章准备\n\
  \n要开始本章的学习，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `concurrency` 的目录。运行如代码清单 14-1 所示的命令来创建一个模块文件。\n\
  \n> **提示**  \n> 你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书其他所有章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init concurrency\n\
  代码清单 14-1\n初始化模块\n```\n\n向 `concurrency` 文件夹中添加一个名为 `product.go` 的文件，其内容如代码清单 14-2\
  \ 所示。\n\n```\npackage main\nimport \"strconv\"\ntype Product struct {\nName, Category\
  \ string\nPrice float64\n}\nvar ProductList = []*Product {\n{ \"Kayak\", \"Watersports\"\
  , 279 },\n{ \"Lifejacket\", \"Watersports\", 49.95 },\n{ \"Soccer Ball\", \"Soccer\"\
  , 19.50 },\n{ \"Corner Flags\", \"Soccer\", 34.95 },\n{ \"Stadium\", \"Soccer\"\
  , 79500 },\n{ \"Thinking Cap\", \"Chess\", 16 },\n{ \"Unsteady Chair\", \"Chess\"\
  , 75 },\n{ \"Bling-Bling King\", \"Chess\", 1200 },\n}\ntype ProductGroup []*Product\n\
  type ProductData = map[string]ProductGroup\nvar Products =  make(ProductData)\n\
  func ToCurrency(val float64) string {\nreturn \"$\" + strconv.FormatFloat(val, 'f',\
  \ 2, 64)\n}\nfunc init() {\nfor _, p := range ProductList {\nif _, ok := Products[p.Category];\
  \ ok {\nProducts[p.Category] = append(Products[p.Category], p)\n} else {\nProducts[p.Category]\
  \ = ProductGroup{ p }\n}\n}\n}\n代码清单 14-2\nconcurrency 文件夹中 product.go 文件的内容\n```\n\
  \n该文件定义了一个名为 `Product` 的自定义类型，以及一些类型别名，我利用这些别名创建了一个按类别组织产品的映射（map）。我在切片（slice）和映射中使用了\
  \ `Product` 类型，并借助一个 `init` 函数（详见第 12 章）来根据切片内容填充映射，而切片本身则通过字面量语法进行填充。该文件还包含一个 `ToCurrency`\
  \ 函数，用于将 `float64` 类型的值格式化为美元货币字符串，我将在本章中用其格式化结果。\n\n向 `concurrency` 文件夹中添加一个名为\
  \ `operations.go` 的文件，其内容如代码清单 14-3 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ CalcStoreTotal(data ProductData) {\nvar storeTotal float64\nfor category, group\
  \ := range data {\nstoreTotal += group.TotalPrice(category)\n}\nfmt.Println(\"Total:\"\
  , ToCurrency(storeTotal))\n}\nfunc (group ProductGroup) TotalPrice(category string,\
  \ ) (total float64) {\nfor _, p := range group {\ntotal += p.Price\n}\nfmt.Println(category,\
  \ \"subtotal:\", ToCurrency(total))\nreturn\n}\n代码清单 14-3\nconcurrency 文件夹中 operations.go\
  \ 文件的内容\n```\n\n该文件定义了操作 `product.go` 文件中创建的类型别名的方法。如我在第 11 章中所述，方法只能定义在同一包内创建的类型上，这意味着例如我不能为\
  \ `[]*Product` 类型定义方法，但可以为该类型创建一个别名，并将别名用作方法接收者。\n\n向 `concurrency` 文件夹中添加一个名为 `main.go`\
  \ 的文件，其内容如代码清单 14-4 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\nfmt.Println(\"\
  main function started\")\nCalcStoreTotal(Products)\nfmt.Println(\"main function\
  \ complete\")\n}\n代码清单 14-4\nconcurrency 文件夹中 main.go 文件的内容\n```\n\n在命令提示符下，导航到\
  \ `concurrency` 文件夹，运行如代码清单 14-5 所示的命令。\n\n```\ngo run .\n代码清单 14-5\n运行示例项目\n```\n\
  \n代码将被编译并执行，产生以下输出：\n\n```\nmain function started\nWatersports subtotal: $328.95\n\
  Soccer subtotal: $79554.45\nChess subtotal: $1291.00\nTotal: $81174.40\nmain function\
  \ complete\n```\n\n## 理解 Go 如何执行代码\n\n执行 Go 程序的关键构建块是 *goroutine*，它是 Go 运行时创建的一个轻量级线程。所有\
  \ Go 程序都至少使用一个 goroutine，因为这是 Go 执行 `main` 函数中代码的方式。当编译后的 Go 代码被执行时，运行时会创建一个 goroutine，该\
  \ goroutine 从入口点（即 `main` 包中的 `main` 函数）开始执行语句。`main` 函数中的每条语句都会按定义顺序依次执行。goroutine\
  \ 会持续执行语句，直到到达 `main` 函数的末尾，此时应用程序终止。\n\ngoroutine *同步地* 执行 `main` 函数中的每条语句，这意味着它会等待当前语句执行完毕后再继续执行下一条语句。`main`\
  \ 函数中的语句可以调用其他函数、使用 `for` 循环、创建值，以及使用本书中描述的所有其他特性。`main` goroutine 会沿代码路径逐条执行语句，依次推进。\n\
  \n对于示例应用程序来说，这意味着产品映射会被顺序处理，每个产品类别依次被处理，并且在每个类别内部，每个产品也会依次被处理，如图 14-1 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig1_HTML.jpg](img/512642_1_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1** 顺序执行\n\n代码清单 14-6 添加了一条语句，在处理每个产品时输出其详细信息，这将展示图中所示的流程。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc CalcStoreTotal(data ProductData) {\nvar storeTotal\
  \ float64\nfor category, group := range data {\nstoreTotal += group.TotalPrice(category)\n\
  }\nfmt.Println(\"Total:\", ToCurrency(storeTotal))\n}\nfunc (group ProductGroup)\
  \ TotalPrice(category string) (total float64) {\nfor _, p := range group {\nfmt.Println(category,\
  \ \"product:\", p.Name)\ntotal += p.Price\n}\nfmt.Println(category, \"subtotal:\"\
  , ToCurrency(total))\nreturn\n}\n代码清单 14-6\n在 concurrency 文件夹的 operations.go 文件中添加一条语句\n\
  ```\n\n编译并执行代码，你将看到类似以下的输出：\n\n```\nmain function started\nSoccer product: Soccer\
  \ Ball\nSoccer product: Corner Flags\nSoccer product: Stadium\nSoccer subtotal:\
  \ $79554.45\nChess product: Thinking Cap\nChess product: Unsteady Chair\nChess product:\
  \ Bling-Bling King\nChess subtotal: $1291.00\nWatersports product: Kayak\nWatersports\
  \ product: Lifejacket\nWatersports subtotal: $328.95\nTotal: $81174.40\nmain function\
  \ complete\n```\n\n根据从映射中检索键的顺序，你可能会看到不同的结果，但关键在于，一个类别中的所有产品都会处理完毕，然后才会执行到下一个类别。\n\
  \n同步执行的优势在于简单性和一致性——同步代码的行为易于理解且可预测。其缺点则是效率可能低下。像示例中那样顺序处理九个数据项并不会产生任何问题，但大多数实际项目都有更大的数据量或需要执行其他任务，这意味着顺序执行耗时过长，且无法足够快地产生结果。\n\
  \n\n\n## 创建额外的 Goroutine\n\nGo 允许开发者创建额外的 goroutine，这些 goroutine 可以与 `main` goroutine\
  \ 同时执行代码。如清单 14-7 所示，Go 使得创建新 goroutine 变得非常简单。\n\n```\npackage main\nimport \"\
  fmt\"\nfunc CalcStoreTotal(data ProductData) {\nvar storeTotal float64\nfor category,\
  \ group := range data {\ngo group.TotalPrice(category)\n}\nfmt.Println(\"Total:\"\
  , ToCurrency(storeTotal))\n}\nfunc (group ProductGroup) TotalPrice(category string)\
  \ (total float64) {\nfor _, p := range group {\nfmt.Println(category, \"product:\"\
  , p.Name)\ntotal += p.Price\n}\nfmt.Println(category, \"subtotal:\", ToCurrency(total))\n\
  return\n}\n清单 14-7  在 concurrency 文件夹的 operations.go 文件中创建 Go 例程\n```\n\n使用 `go`\
  \ 关键字后跟应异步执行的函数或方法，即可创建一个 goroutine，如图 14-2 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig2_HTML.jpg](img/512642_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2  一个 goroutine\n\n当 Go 运行时遇到 `go` 关键字时，它会创建一个新的 goroutine，并用它来执行指定的函数或方法。这改变了程序的执行方式，因为在任意给定时刻，可能存在多个\
  \ goroutine，每个都在执行自己的一组语句。这些语句是*并发*执行的，这意味着它们同时被执行。在这个例子中，每次调用 `TotalPrice` 方法都会创建一个\
  \ goroutine，这意味着各个类别会被并发处理，如图 14-3 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig3_HTML.jpg](img/512642_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3  并发函数调用\n\nGo 例程使得调用函数和方法变得容易，但清单 14-7 中的改动引入了一个常见问题。编译并执行该项目，你将看到如下结果：\n\
  \n```\nmain function started\nTotal: $0.00\nmain function complete\n```\n\n你可能会看到略有不同的结果，其中可能包含一个或多个类别的分类小计。但大多数情况下，你会看到这些消息。在将\
  \ goroutine 引入代码之前，`TotalPrice` 方法是这样调用的：\n\n```\n...\nstoreTotal += group.TotalPrice(category)\n\
  ...\n```\n\n这是一个同步函数调用。它告诉运行时逐一执行 `TotalPrice` 方法中的语句，并将结果赋值给名为 `storeTotal` 的变量。在所有\
  \ `TotalPrice` 语句处理完毕之前，程序不会继续执行。但清单 14-7 引入了一个 goroutine 来执行该函数，如下所示：\n\n```\n\
  ...\ngo group.TotalPrice(category)\n...\n```\n\n这条语句告诉运行时使用一个新的 goroutine 来执行 `TotalPrice`\
  \ 方法中的语句。运行时不会等待 goroutine 执行完该方法，而是立即继续执行下一条语句。这正是 goroutine 的全部意义所在，因为 `TotalPrice`\
  \ 方法将被异步调用，这意味着其中一个 goroutine 在评估其语句的同时，原始 goroutine 正在执行 `main` 函数中的语句。但正如我之前解释的，当\
  \ `main` goroutine 执行完 `main` 函数中的所有语句时，程序就会终止。结果就是，在用于执行 `TotalPrice` 方法的 goroutine\
  \ 完成之前，程序就已经终止了，这就是为什么我们没有看到任何分类小计。\n\n在介绍更多特性时，我会解释如何解决这个问题，但眼下，我只需要让程序持续足够长的时间，以便让\
  \ goroutine 能够完成，如清单 14-8 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\n\
  )\nfunc main() {\nfmt.Println(\"main function started\")\nCalcStoreTotal(Products)\n\
  time.Sleep(time.Second * 5)\nfmt.Println(\"main function complete\")\n}\n清单 14-8\
  \  在 concurrency 文件夹的 main.go 文件中延迟程序退出\n```\n\n`time` 包是标准库的一部分，在第 19 章会进行描述。`time`\
  \ 包提供了 `Sleep` 函数，该函数会使执行该语句的 goroutine 暂停。暂停时长通过一组表示时间间隔的数字常量来指定，因此 `time.Second`\
  \ 表示一秒，乘以 5 后得到五秒的时长。在这个例子中，它会暂停 `main` goroutine 的执行，从而给创建的 goroutine 留出时间来执行 `TotalPrice`\
  \ 方法。当暂停时长过去后，`main` goroutine 会恢复执行语句，到达函数末尾，并导致程序终止。\n\n编译并执行该项目，你将看到如下输出：\n\n\
  ```\nmain function started\nWatersports product: Kayak\nWatersports product: Lifejacket\n\
  Watersports subtotal: $328.95\nSoccer product: Soccer Ball\nSoccer product: Corner\
  \ Flags\nSoccer product: Stadium\nSoccer subtotal: $79554.45\nChess product: Thinking\
  \ Cap\nChess product: Unsteady Chair\nChess product: Bling-Bling King\nChess subtotal:\
  \ $1291.00\nTotal: $0.00\nmain function complete\n```\n\n程序不再提前退出，但很难确定 goroutine\
  \ 是否在并发工作。这是因为这个例子太简单了，以至于一个 goroutine 可以在 Go 创建并启动下一个 goroutine 的极短时间内完成。在清单 14-9\
  \ 中，我添加了另一个暂停，这会减慢 `TotalPrice` 方法的执行速度，以帮助说明代码是如何执行的。（在实际项目中你不应该这样做，但这有助于理解这些特性的工作原理。）\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc CalcStoreTotal(data ProductData)\
  \ {\nvar storeTotal float64\nfor category, group := range data {\ngo group.TotalPrice(category)\n\
  }\nfmt.Println(\"Total:\", ToCurrency(storeTotal))\n}\nfunc (group ProductGroup)\
  \ TotalPrice(category string) (total float64) {\nfor _, p := range group {\nfmt.Println(category,\
  \ \"product:\", p.Name)\ntotal += p.Price\ntime.Sleep(time.Millisecond * 100)\n\
  }\nfmt.Println(category, \"subtotal:\", ToCurrency(total))\nreturn\n}\n清单 14-9 \
  \ 在 concurrency 文件夹的 operations.go 文件中添加 Sleep 语句\n```\n\n新语句在 `TotalPrice` 方法的\
  \ `for` 循环的每次迭代中增加了 100 毫秒的延迟。编译并执行代码，你将看到类似下面的输出：\n\n```\nmain function started\n\
  Total: $0.00\nSoccer product: Soccer Ball\nWatersports product: Kayak\nChess product:\
  \ Thinking Cap\nChess product: Unsteady Chair\nWatersports product: Lifejacket\n\
  Soccer product: Corner Flags\nChess product: Bling-Bling King\nSoccer product: Stadium\n\
  Watersports subtotal: $328.95\nSoccer subtotal: $79554.45\nChess subtotal: $1291.00\n\
  main function complete\n```\n\n你可能会看到结果顺序不同，但关键是，不同类别的消息是交错出现的，这表明数据正在被并行处理。（如果清单\
  \ 14-9 中的改动没有给你带来预期的结果，那么你可能需要增加 `time.Sleep` 函数引入的暂停时长。）\n\n\n\n### 从 Goroutine\
  \ 中获取结果\n\n当我在代码清单 14-7 中创建 goroutine 时，改变了调用`TotalPrice`方法的方式。原本的代码如下所示：\n\n```\n\
  ...\nstoreTotal += group.TotalPrice(category)\n...\n```\n\n但引入 Go 例程后，我将语句改为：\n\n\
  ```\n...\ngo group.TotalPrice(category)\n...\n```\n\n我获得了异步执行能力，但失去了方法的返回结果，这就是为什么代码清单\
  \ 14-9 的输出中总计结果为零：\n\n```\n...\nTotal: $0.00\n...\n```\n\n从异步执行的函数中获取结果可能很复杂，因为这需要在产生结果的\
  \ goroutine 和使用结果的 goroutine 之间进行协作。\n\n为了解决这个问题，Go 提供了*通道（channels）*，这是一种可以发送和接收数据的管道。我将逐步在示例中引入通道，从代码清单\
  \ 14-10 开始，这意味着在完成所有步骤前该示例无法编译。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\
  \n)\nfunc CalcStoreTotal(data ProductData) {\nvar storeTotal float64\nvar channel\
  \ chan float64 = make(chan float64)\nfor category, group := range data {\ngo group.TotalPrice(category)\n\
  }\nfmt.Println(\"Total:\", ToCurrency(storeTotal))\n}\nfunc (group ProductGroup)\
  \ TotalPrice(category string) (total float64) {\nfor _, p := range group {\nfmt.Println(category,\
  \ \"product:\", p.Name)\ntotal += p.Price\ntime.Sleep(time.Millisecond * 100)\n\
  }\nfmt.Println(category, \"subtotal:\", ToCurrency(total))\nreturn\n}\n```\n\n代码清单\
  \ 14-10  \n在`concurrency`文件夹的`operations.go`文件中定义通道\n\n通道是强类型的，这意味着它们将携带指定类型或接口的值。通道的类型由`chan`关键字后跟通道将携带的类型组成，如图\
  \ 14-4 所示。使用内置的`make`函数创建通道，并指定通道类型。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig4_HTML.jpg](img/512642_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4  \n定义通道\n\n在本清单中，我使用了完整的变量声明语法以强调类型，即`chan float64`，表示一个携带`float64`值的通道。\n\
  \n**注意：** `sync`包提供了管理共享数据的 goroutine 的功能，如第 30 章所述。\n\n## 使用通道发送结果\n\n下一步是更新`TotalPrice`方法，使其通过通道发送结果，如代码清单\
  \ 14-11 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc CalcStoreTotal(data\
  \ ProductData) {\nvar storeTotal float64\nvar channel chan float64 = make(chan float64)\n\
  for category, group := range data {\ngo group.TotalPrice(category)\n}\nfmt.Println(\"\
  Total:\", ToCurrency(storeTotal))\n}\nfunc (group ProductGroup) TotalPrice(category\
  \ string, resultChannel chan float64)  {\nvar total float64\nfor _, p := range group\
  \ {\nfmt.Println(category, \"product:\", p.Name)\ntotal += p.Price\ntime.Sleep(time.Millisecond\
  \ * 100)\n}\nfmt.Println(category, \"subtotal:\", ToCurrency(total))\nresultChannel\
  \ <- total\n}\n```\n\n代码清单 14-11  \n在`concurrency`文件夹的`operations.go`文件中使用通道发送结果\n\
  \n第一个更改是移除传统的返回结果，并添加一个`chan float64`参数，其类型与代码清单 14-10 中创建的通道相匹配。我还定义了一个名为`total`的变量，这在此前并非必需，因为该函数使用了命名返回值。\n\
  \n另一个更改展示了如何使用通道发送结果。先指定通道，后跟一个由`<`和`-`字符组成的指向箭头，然后是值，如图 14-5 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig5_HTML.jpg](img/512642_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5  \n发送结果\n\n该语句通过`resultChannel`通道发送`total`值，使其可被应用程序中其他部分接收。需要注意的是，当通过通道发送值时，发送方无需了解该值将如何被接收和使用，就如同常规的同步函数不知道其返回值将如何被使用一样。\n\
  \n\n\n### 通过通道接收结果\n\n箭头语法用于从通道接收值，这将允许 `CalcStoreTotal` 函数接收 `TotalPrice` 方法发送的数据，如清单\
  \ 14-12 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc CalcStoreTotal(data\
  \ ProductData) {\nvar storeTotal float64\nvar channel chan float64 = make(chan float64)\n\
  for category, group := range data {\ngo group.TotalPrice(category, channel)\n}\n\
  for i := 0; i < len(data); i++ {\nstoreTotal += <- channel\n}\nfmt.Println(\"Total:\"\
  , ToCurrency(storeTotal))\n}\nfunc (group ProductGroup) TotalPrice(category string,\
  \ resultChannel chan float64)  {\nvar total float64\nfor _, p := range group {\n\
  fmt.Println(category, \"product:\", p.Name)\ntotal += p.Price\ntime.Sleep(time.Millisecond\
  \ * 100)\n}\nfmt.Println(category, \"subtotal:\", ToCurrency(total))\nresultChannel\
  \ <- total\n}\n清单 14-12\n在 concurrency 文件夹的 operations.go 文件中接收结果\n```\n\n箭头放在通道之前以从中接收值，如图\
  \ 14-6 所示，接收到的值可以像任何标准 Go 表达式的一部分一样使用，例如示例中使用的 `+=` 操作。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig6_HTML.jpg](img/512642_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6  \n接收结果\n\n在此示例中，我知道可以从通道接收的结果数量恰好与我创建的 goroutine 数量匹配。而且，由于我为映射中的每个键创建了一个\
  \ goroutine，因此可以在 `for` 循环中使用 `len` 函数来读取所有结果。\n\n通道可以在多个 goroutine 之间安全地共享，本节中所做更改的效果是：为调用\
  \ `TotalPrice` 方法而创建的 Go 例程都通过 `CalcStoreTotal` 函数创建的通道发送其结果，并在该通道中接收和处理它们。\n\n\
  从通道接收是一个阻塞操作，这意味着在接收到值之前不会继续执行，这意味着我不再需要阻止程序终止，如清单 14-13 所示。\n\n```go\npackage main\n\
  import (\n\"fmt\"\n//\"time\"\n)\nfunc main() {\nfmt.Println(\"main function started\"\
  )\nCalcStoreTotal(Products)\n//time.Sleep(time.Second * 5)\nfmt.Println(\"main function\
  \ complete\")\n}\n清单 14-13\n在 concurrency 文件夹的 main.go 文件中移除 Sleep 语句\n```\n\n这些更改的总体效果是，程序启动并开始执行\
  \ `main` 函数中的语句。这导致调用 `CalcStoreTotal` 函数，该函数创建一个通道并启动多个 goroutine。这些 goroutine\
  \ 执行 `TotalPrice` 方法中的语句，该方法使用通道发送其结果。\n\n`main` goroutine 继续执行 `CalcStoreTotal`\
  \ 函数中的语句，该函数通过通道接收结果。这些结果用于计算总金额，并将其打印出来。然后执行 `main` 函数中的其余语句，程序终止。\n\n编译并执行该项目，您将看到以下输出：\n\
  \n```\nmain function started\nWatersports product: Kayak\nChess product: Thinking\
  \ Cap\nSoccer product: Soccer Ball\nSoccer product: Corner Flags\nWatersports product:\
  \ Lifejacket\nChess product: Unsteady Chair\nChess product: Bling-Bling King\nSoccer\
  \ product: Stadium\nWatersports subtotal: $328.95\nChess subtotal: $1291.00\nSoccer\
  \ subtotal: $79554.45\nTotal: $81174.40\nmain function complete\n```\n\n您可能会看到消息以不同的顺序显示，但需要注意的关键点是总金额计算正确，如下所示：\n\
  \n```\n...\nTotal: $81174.40\n...\n```\n\n通道用于协调 goroutine，允许 `main` goroutine 等待在\
  \ `CalcStoreTotal` 函数中创建的 goroutine 产生的各个结果。图 14-7 显示了这些例程与通道之间的关系。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig7_HTML.jpg](img/512642_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7  \n使用通道进行协调\n\n### 使用适配器异步执行函数\n\n重写现有函数或方法以使用通道并不总是可行的，但在包装器中异步执行同步函数是一件简单的事情，如下所示：\n\
  \n```go\n...\ncalcTax := func(price float64) float64 {\nreturn price + (price *\
  \ 0.2)\n}\nwrapper := func (price float64, c chan float64)  {\nc <- calcTax(price)\n\
  }\nresultChannel := make(chan float64)\ngo wrapper(275, resultChannel)\nresult :=\
  \ <- resultChannel\nfmt.Println(\"Result:\", result)\n...\n```\n\n`wrapper` 函数接收一个通道，它使用该通道发送通过同步执行\
  \ `calcTax` 函数获得的值。这可以通过定义一个不将其赋值给变量的函数来更简洁地表达，如下所示：\n\n```go\n...\ngo func (price\
  \ float64, c chan float64) {\nc <- calcTax(price)\n}(275, resultChannel)\n...\n\
  ```\n\n这种语法有点笨拙，因为用于调用函数的参数直接在函数定义之后写出。但结果是相同的，即同步函数可以由 goroutine 执行，并将结果通过通道发送出去。\n\
  \n### 使用通道\n\n上一节演示了通道的基本用法及其在协调 goroutine 中的应用。在接下来的几节中，我将描述使用通道来改变协调方式的不同方法，从而使\
  \ goroutine 能够适应不同的场景。\n\n\n\n### 协调通道\n\n默认情况下，通过通道发送和接收数据是阻塞操作。这意味着，发送值的 goroutine\
  \ 在另一个 goroutine 从该通道接收到该值之前，不会执行任何后续语句。如果第二个 goroutine 发送了一个值，它将会被阻塞，直到通道被清空，从而形成一个等待接收值的\
  \ goroutine 队列。这种情况在另一个方向上也会发生，因此接收值的 goroutine 会阻塞，直到另一个 goroutine 发送一个值。示例项目中的代码清单\
  \ 14-14 更改了发送和接收值的方式，以突出显示此行为。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\
  \n)\nfunc CalcStoreTotal(data ProductData) {\nvar storeTotal float64\nvar channel\
  \ chan float64 = make(chan float64)\nfor category, group := range data {\ngo group.TotalPrice(category,\
  \ channel)\n}\ntime.Sleep(time.Second * 5)\nfmt.Println(\"-- 开始从通道接收\")\nfor i :=\
  \ 0; i < len(data); i++ {\nfmt.Println(\"-- 通道读取挂起\")\nvalue :=  <- channel\nfmt.Println(\"\
  -- 通道读取完成\", value)\nstoreTotal += value\ntime.Sleep(time.Second)\n}\nfmt.Println(\"\
  总计:\", ToCurrency(storeTotal))\n}\nfunc (group ProductGroup) TotalPrice(category\
  \ string, resultChannel chan float64)  {\nvar total float64\nfor _, p := range group\
  \ {\n//fmt.Println(category, \"product:\", p.Name)\ntotal += p.Price\ntime.Sleep(time.Millisecond\
  \ * 100)\n}\nfmt.Println(category, \"通道发送\", ToCurrency(total))\nresultChannel <-\
  \ total\nfmt.Println(category, \"通道发送完成\")\n}\n代码清单 14-14\n在 concurrency 文件夹的 operations.go\
  \ 文件中发送和接收值\n```\n\n这些修改引入了延迟：在 `CalcStoreTotal` 创建 goroutine 之后，以及在从通道接收第一个值之前。每次接收值之前和之后也有延迟。\n\
  \n这些延迟的效果是，让 goroutine 在接收任何值之前完成其工作并通过通道发送值。编译并执行该项目，你将看到以下输出：\n\n```\nmain function\
  \ started\nWatersports 通道发送 $328.95\nChess 通道发送 $1291.00\nSoccer 通道发送 $79554.45\n\
  -- 开始从通道接收\n-- 通道读取挂起\nWatersports 通道发送完成\n-- 通道读取完成 328.95\n-- 通道读取挂起\n-- 通道读取完成\
  \ 1291\nChess 通道发送完成\n-- 通道读取挂起\n-- 通道读取完成 79554.45\nSoccer 通道发送完成\n总计: $81174.40\n\
  main function complete\n```\n\n我倾向于通过想象人与人之间的互动来理解并发应用。如果鲍勃有消息要告诉爱丽丝，默认的通道行为要求爱丽丝和鲍勃约定一个会面地点，先到者必须等待另一方到达。只有当两人都在场时，鲍勃才会将消息给爱丽丝。当查理也有消息要告诉爱丽丝时，他会在鲍勃后面排队。大家都耐心等待，消息仅在发送方和接收方都可用时才进行传递，并且消息是按顺序处理的。\n\
  \n你可以在代码清单 14-14 的输出中看到这种模式。goroutine 启动，处理它们的数据，并通过通道发送它们的结果：\n\n```\n...\nWatersports\
  \ 通道发送 $328.95\nChess 通道发送 $1291.00\nSoccer 通道发送 $79554.45\n...\n```\n\n因为没有可用的接收方，所以\
  \ goroutine 被迫等待，形成一个等待的发送方队列，直到接收方开始工作。每当接收到一个值，发送方的 goroutine 就会被解除阻塞，并能够继续执行\
  \ `TotalPrice` 方法中的语句。\n\n### 使用带缓冲的通道\n\n默认的通道行为可能导致 goroutine 在完成工作时出现活动爆发，随后是漫长的空闲期等待接收消息。这对示例应用程序没有影响，因为\
  \ goroutine 在它们的消息被接收后就完成了，但在实际项目中，goroutine 通常执行重复性任务，等待接收方可能会导致性能瓶颈。\n\n另一种方法是创建一个带有缓冲区的通道，该缓冲区用于接受来自发送方的值，并将它们存储起来，直到接收方可用。这使得发送消息成为非阻塞操作，允许发送方将其值传递给通道并继续工作，而无需等待接收方。这类似于爱丽丝的办公桌上有一个收件箱。发送方来到爱丽丝的办公室，将他们的消息放入收件箱，等待爱丽丝有空时阅读。但是，如果收件箱已满，那么他们必须等到她处理完一些积压的工作后，才能发送新消息。代码清单\
  \ 14-15 创建了一个带有缓冲区的通道。\n\n```\n...\nfunc CalcStoreTotal(data ProductData) {\nvar\
  \ storeTotal float64\nvar channel chan float64 = make(chan float64, 2)\nfor category,\
  \ group := range data {\ngo group.TotalPrice(category, channel)\n}\ntime.Sleep(time.Second\
  \ * 5)\nfmt.Println(\"-- 开始从通道接收\")\nfor i := 0; i < len(data); i++ {\nfmt.Println(\"\
  -- 通道读取挂起\")\nvalue :=  <- channel\nfmt.Println(\"-- 通道读取完成\", value)\nstoreTotal\
  \ += value\ntime.Sleep(time.Second)\n}\nfmt.Println(\"总计:\", ToCurrency(storeTotal))\n\
  }\n...\n代码清单 14-15\n在 concurrency 文件夹的 operations.go 文件中创建带缓冲的通道\n```\n\n缓冲区的大小作为参数传递给\
  \ `make` 函数，如图 14-8 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig8_HTML.jpg](img/512642_1_En_14_Fig8_HTML.jpg)\n\
  \n**图 14-8** — 带缓冲的通道\n\n在这个例子中，我将缓冲区大小设置为 2，这意味着两个发送方能够通过通道发送值，而无需等待它们被接收。任何后续的发送方将不得不等待，直到其中一个缓冲消息被接收。通过编译并执行该项目，你可以看到这种行为，它会产生以下输出：\n\
  \n```\nmain function started\nWatersports 通道发送 $328.95\nWatersports 通道发送完成\nChess\
  \ 通道发送 $1291.00\nChess 通道发送完成\nSoccer 通道发送 $79554.45\n-- 开始从通道接收\n-- 通道读取挂起\nSoccer\
  \ 通道发送完成\n-- 通道读取完成 328.95\n-- 通道读取挂起\n-- 通道读取完成 1291\n-- 通道读取挂起\n-- 通道读取完成 79554.45\n\
  总计: $81174.40\nmain function complete\n```\n\n你可以看到，即使没有接收方准备好，`Watersports` 和 `Chess`\
  \ 类别发送的值也被通道接收了。`Soccer` 通道的发送方被迫等待，直到接收方的 `time.Sleep` 调用结束并且值从通道中被接收。\n\n在实际项目中，会使用更大的缓冲区，其大小要经过选择，以便有足够的容量让\
  \ goroutine 发送消息而无需等待。（我通常指定缓冲区大小为 100，这对于大多数项目来说通常足够大，但又不至于大到占用大量内存。）\n\n\n\n###\
  \ 检查通道缓冲区\n\n你可以使用内置的 `cap` 函数来确定通道缓冲区的大小，并使用 `len` 函数来确定缓冲区中的值的数量，如清单 14-16 所示。\n\
  \n```\n...\nfunc CalcStoreTotal(data ProductData) {\nvar storeTotal float64\nvar\
  \ channel chan float64 = make(chan float64, 2)\nfor category, group := range data\
  \ {\ngo group.TotalPrice(category, channel)\n}\ntime.Sleep(time.Second * 5)\nfmt.Println(\"\
  -- 开始从通道接收数据\")\nfor i := 0; i < len(data); i++ {\nfmt.Println(len(channel), cap(channel))\n\
  fmt.Println(\"-- 通道读取待处理：缓冲区中有\",\nlen(channel), \"项，缓冲区大小为\", cap(channel))\nvalue\
  \ :=  <- channel\nfmt.Println(\"-- 通道读取完成\", value)\nstoreTotal += value\ntime.Sleep(time.Second)\n\
  }\nfmt.Println(\"总计:\", ToCurrency(storeTotal))\n}\n...\n清单 14-16\n在 concurrency\
  \ 文件夹中的 operations.go 文件中检查通道缓冲区\n```\n\n修改后的语句使用 `len` 和 `cap` 函数来报告通道缓冲区中的值的数量以及缓冲区的总大小。编译并执行代码，你将看到在接收值时的缓冲区详细信息：\n\
  \n```\nmain 函数启动\n水上运动通道发送 $328.95\n水上运动通道发送完成\n国际象棋通道发送 $1291.00\n国际象棋通道发送完成\n\
  足球通道发送 $79554.45\n-- 开始从通道接收数据\n-- 通道读取待处理：缓冲区中有 2 项，缓冲区大小为 2\n足球通道发送完成\n-- 通道读取完成\
  \ 328.95\n-- 通道读取待处理：缓冲区中有 2 项，缓冲区大小为 2\n-- 通道读取完成 1291\n-- 通道读取待处理：缓冲区中有 1 项，缓冲区大小为\
  \ 2\n-- 通道读取完成 79554.45\n总计: $81174.40\nmain 函数完成\n```\n\n使用 `len` 和 `cap` 函数可以了解通道缓冲区的情况，但不应使用其结果来试图避免发送消息时的阻塞。Goroutine\
  \ 是并行执行的，这意味着在你检查缓冲区容量之后但在发送值之前，可能有值已被发送到通道。有关如何可靠地无阻塞发送和接收的详细信息，请参阅“使用 Select 语句”部分。\n\
  \n### 发送和接收未知数量的值\n\n`CalcStoreTotal` 函数利用其对正在处理的数据的了解来确定应从通道接收多少次值。这种洞察并不总是可用的，而且将要发送到通道的值的数量往往是事先未知的。作为演示，在\
  \ `concurrency` 文件夹中添加一个名为 `orderdispatch.go` 的文件，内容如清单 14-17 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\ntype DispatchNotification\
  \ struct {\nCustomer string\n*Product\nQuantity int\n}\nvar Customers = []string{\"\
  Alice\", \"Bob\", \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel chan DispatchNotification)\
  \ {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount := rand.Intn(3) + 2\nfmt.Println(\"\
  订单数量:\", orderCount)\nfor i := 0; i < orderCount; i++ {\nchannel <- DispatchNotification{\n\
  Customer: Customers[rand.Intn(len(Customers)-1)],\nQuantity: rand.Intn(10),\nProduct:\
  \  ProductList[rand.Intn(len(ProductList)-1)],\n}\n}\n}\n清单 14-17\n在 concurrency\
  \ 文件夹中的 orderdispatch.go 文件内容\n```\n\n`DispatchOrders` 函数创建随机数量的 `DispatchNotification`\
  \ 值，并通过 `channel` 参数接收到的通道发送它们。我将在第 18 章中描述如何使用 `math/rand` 包创建随机数，但对于本章，只需知道每个调度通知的详细信息也是随机的就足够了，因此客户名称、产品和数量都会变化，通过通道发送的值的总数也会变化（尽管至少会发送两个，只是为了能看到一些输出）。\n\
  \n无法事先知道 `DispatchOrders` 函数会创建多少个 `DispatchNotification` 值，这给编写从通道接收数据的代码带来了挑战。清单\
  \ 14-18 采用了最简单的方法，即使用 `for` 循环，这意味着代码将永远尝试接收值。\n\n```\npackage main\nimport (\n\"\
  fmt\"\n//\"time\"\n)\nfunc main() {\ndispatchChannel := make(chan DispatchNotification,\
  \ 100)\ngo DispatchOrders(dispatchChannel)\nfor {\ndetails := <- dispatchChannel\n\
  fmt.Println(\"派送至\", details.Customer, \":\", details.Quantity,\n\"x\", details.Product.Name)\n\
  }\n}\n清单 14-18\n在 concurrency 文件夹中的 main.go 文件中使用 for 循环接收值\n```\n\n这个 `for` 循环无法正常工作，因为发送方停止产生值后，接收代码仍会尝试从通道获取值。如果所有\
  \ goroutine 都被阻塞，Go 运行时将终止程序，你可以通过编译并执行该项目看到这一点，这将产生以下输出：\n\n```\n订单数量: 4\n派送至 Charlie\
  \ : 3 x 救生衣\n派送至 Bob : 6 x 足球\n派送至 Bob : 7 x 思考帽\n派送至 Charlie : 5 x 体育场\n致命错误: 所有\
  \ goroutine 都处于休眠状态 - 死锁！\ngoroutine 1 [通道接收]:\nmain.main()\nC:/concurrency/main.go:12\
  \ +0xa6\nexit status 2\n```\n\n你将看到不同的输出，这反映了 `DispatchNotification` 数据的随机性。重要的是，goroutine\
  \ 在发送完其值后退出，导致 `main` goroutine 持续等待接收值而被阻塞。Go 运行时检测到没有活动的 goroutine，于是终止了应用程序。\n\
  \n\n\n#### 关闭通道\n\n这个问题的解决方案是让发送方指示何时不再有值通过通道发送，这通过关闭通道来实现，如清单 14-19 所示。\n\n```go\n\
  package main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\ntype DispatchNotification\
  \ struct {\nCustomer string\n*Product\nQuantity int\n}\nvar Customers = []string{\"\
  Alice\", \"Bob\", \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel chan DispatchNotification)\
  \ {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount := rand.Intn(3) + 2\nfmt.Println(\"\
  Order count:\", orderCount)\nfor i := 0; i < orderCount; i++ {\nchannel <- DispatchNotification{\n\
  Customer: Customers[rand.Intn(len(Customers)-1)],\nQuantity: rand.Intn(10),\nProduct:\
  \  ProductList[rand.Intn(len(ProductList)-1)],\n}\n}\nclose(channel)\n}\n```\n\n\
  内置的 `close` 函数接受一个通道作为参数，用于指示将不再有值通过该通道发送。接收方可以在请求值时检查通道是否关闭，如清单 14-20 所示。\n\n**提示**\n\
  \n仅当有助于协调 goroutine 时才需要关闭通道。Go 不要求关闭通道以释放资源或执行任何类型的清理任务。\n\n```go\npackage main\n\
  import (\n\"fmt\"\n//\"time\"\n)\nfunc main() {\ndispatchChannel := make(chan DispatchNotification,\
  \ 100)\ngo DispatchOrders(dispatchChannel)\nfor {\nif details, open := <- dispatchChannel;\
  \ open {\nfmt.Println(\"Dispatch to\", details.Customer, \":\", details.Quantity,\n\
  \"x\", details.Product.Name)\n} else {\nfmt.Println(\"Channel has been closed\"\
  )\nbreak\n}\n}\n}\n```\n\n接收运算符可用于获取两个值。第一个值被赋值为从通道接收到的值，第二个值指示通道是否关闭，如图 14-9 所示。\n\
  \n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig9_HTML.jpg](img/512642_1_En_14_Fig9_HTML.jpg)\n\
  \n如果通道是打开的，则关闭指示器将为 `false`，并且从通道接收到的值将被赋值给另一个变量。如果通道已关闭，则关闭指示器将为 `true`，并且通道类型的零值将被分配给另一个变量。\n\
  \n描述比代码更复杂，但实际使用起来很容易，因为通道读取操作可以用作 `if` 表达式的初始化语句，通过关闭指示器来确定通道何时已关闭。清单 14-20 中的代码定义了一个\
  \ `else` 子句，当通道关闭时执行该子句，这会阻止进一步尝试从通道接收数据，并允许程序干净地退出。\n\n**注意**\n\n通道一旦关闭，再向其发送值是非法操作。\n\
  \n编译并执行该项目，您将看到类似于以下的输出：\n\n```\nOrder count: 3\nDispatch to Bob : 2 x Soccer Ball\n\
  Dispatch to Alice : 9 x Thinking Cap\nDispatch to Bob : 3 x Soccer Ball\nChannel\
  \ has been closed\n```\n\n#### 枚举通道值\n\n`for` 循环可以与 `range` 关键字一起使用来枚举通过通道发送的值，从而更容易地接收值，并在通道关闭时终止循环，如清单\
  \ 14-21 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n//\"time\"\n)\nfunc main()\
  \ {\ndispatchChannel := make(chan DispatchNotification, 100)\ngo DispatchOrders(dispatchChannel)\n\
  for details := range dispatchChannel {\nfmt.Println(\"Dispatch to\", details.Customer,\
  \ \":\", details.Quantity,\n\"x\", details.Product.Name)\n}\nfmt.Println(\"Channel\
  \ has been closed\")\n}\n```\n\n`range` 表达式每次迭代产生一个值，该值是从通道接收到的。`for` 循环将持续接收值，直到通道关闭。（您可以在未关闭的通道上使用\
  \ `for`...`range` 循环，这种情况下循环将永远不会退出。）编译并执行该项目，您将看到类似于以下的输出：\n\n```\nOrder count:\
  \ 2\nDispatch to Alice : 9 x Kayak\nDispatch to Charlie : 8 x Corner Flags\nChannel\
  \ has been closed\n```\n\n\n\n### 限制通道方向\n\n默认情况下，通道可用于发送和接收数据，但在将通道用作参数时可以对此进行限制，使其只能执行发送或接收操作。我发现这个功能有助于避免错误，因为发送和接收操作的语法相似，我有时本想发送消息却执行了接收操作，如代码清单\
  \ 14-22 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\n\
  type DispatchNotification struct {\nCustomer string\n*Product\nQuantity int\n}\n\
  var Customers = []string{\"Alice\", \"Bob\", \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel\
  \ chan DispatchNotification) {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount\
  \ := rand.Intn(3) + 2\nfmt.Println(\"Order count:\", orderCount)\nfor i := 0; i\
  \ < orderCount; i++ {\nchannel <- DispatchNotification{\nCustomer: Customers[rand.Intn(len(Customers)-1)],\n\
  Quantity: rand.Intn(10),\nProduct:  ProductList[rand.Intn(len(ProductList)-1)],\n\
  }\nif (i == 1) {\nnotification := <- channel\nfmt.Println(\"Read:\", notification.Customer)\n\
  }\n}\nclose(channel)\n}\n代码清单 14-22\nconcurrency 文件夹中 orderdispatch.go 文件里的操作错误\n\
  ```\n\n在示例代码中很容易发现这个问题，但我通常是在使用 `if` 语句有条件地通过通道发送额外值时犯这个错误。结果是，该函数会接收到自己刚刚发送的消息，并将其从通道中移除。\n\
  \n有时消息丢失会导致预期的接收者协程阻塞，从而触发之前描述的死锁检测并终止程序，但更常见的情况是程序继续运行却产生意外结果。编译并执行该代码，你会得到类似以下的输出：\n\
  \n```\nOrder count: 4\nRead: Alice\nDispatch to Alice : 4 x Unsteady Chair\nDispatch\
  \ to Alice : 7 x Unsteady Chair\nDispatch to Bob : 0 x Thinking Cap\nChannel has\
  \ been closed\n```\n\n输出显示将通过通道发送四个值，但只接收到了三个。这个问题可以通过限制通道方向来解决，如代码清单 14-23 所示。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\ntype DispatchNotification\
  \ struct {\nCustomer string\n*Product\nQuantity int\n}\nvar Customers = []string{\"\
  Alice\", \"Bob\", \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel chan<- DispatchNotification)\
  \ {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount := rand.Intn(3) + 2\nfmt.Println(\"\
  Order count:\", orderCount)\nfor i := 0; i < orderCount; i++ {\nchannel <- DispatchNotification{\n\
  Customer: Customers[rand.Intn(len(Customers)-1)],\nQuantity: rand.Intn(10),\nProduct:\
  \  ProductList[rand.Intn(len(ProductList)-1)],\n}\nif (i == 1) {\nnotification :=\
  \ <- channel\nfmt.Println(\"Read:\", notification.Customer)\n}\n}\nclose(channel)\n\
  }\n代码清单 14-23\nconcurrency 文件夹中 orderdispatch.go 文件里的通道方向限制\n```\n\n通道的方向在 `chan`\
  \ 关键字旁指定，如图 14-10 所示。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig10_HTML.jpg](img/512642_1_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10\n\n指定通道方向\n\n箭头的位置指明了通道的方向。当箭头跟在 `chan` 关键字之后（如代码清单 14-23 所示），则该通道只能用于发送。如果箭头位于\
  \ `chan` 关键字之前（例如 `<-chan`），则通道只能用于接收。尝试从只发送通道接收数据（反之亦然）会在编译时报错，你可以编译该项目看看：\n\n\
  ```\n### concurrency\n.\\orderdispatch.go:29:29: invalid operation: <-channel (receive\
  \ from send-only type chan<- DispatchNotification)\n```\n\n这样一来，`DispatchOrders`\
  \ 函数中的错误就很容易发现了，我可以删除从通道接收数据的语句，如代码清单 14-24 所示。\n\n```\npackage main\nimport (\n\
  \"fmt\"\n\"math/rand\"\n\"time\"\n)\ntype DispatchNotification struct {\nCustomer\
  \ string\n*Product\nQuantity int\n}\nvar Customers = []string{\"Alice\", \"Bob\"\
  , \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel chan<- DispatchNotification)\
  \ {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount := rand.Intn(3) + 2\nfmt.Println(\"\
  Order count:\", orderCount)\nfor i := 0; i < orderCount; i++ {\nchannel <- DispatchNotification{\n\
  Customer: Customers[rand.Intn(len(Customers)-1)],\nQuantity: rand.Intn(10),\nProduct:\
  \  ProductList[rand.Intn(len(ProductList)-1)],\n}\n// if (i == 1) {\n//     notification\
  \ := <- channel\n//     fmt.Println(\"Read:\", notification.Customer)\n// }\n}\n\
  close(channel)\n}\n代码清单 14-24\n修正 concurrency 文件夹中 orderdispatch.go 文件里的错误\n```\n\
  \n该代码将编译无误，并产生与代码清单 14-22 类似的输出。\n\n\n\n#### 限制通道参数方向\n\n上一节中的修改使得 `DispatchOrders`\
  \ 函数能够声明其仅需通过通道发送消息而无需接收消息。这是一个有用的特性，但它并未解决这样一种情况：你希望仅提供一个单向通道，而不是让函数自行决定其接收什么。\n\
  \n定向通道是一种类型，因此清单 14-25 中函数参数的类型为 `chan<- DispatchNotification`，这表示一个仅用于发送的通道，它将承载\
  \ `DispatchNotification` 值。Go 允许将双向通道赋值给单向通道变量，从而可以施加限制，如清单 14-26 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n//\"time\"\n)\nfunc receiveDispatches(channel <-chan\
  \ DispatchNotification) {\nfor details := range channel {\nfmt.Println(\"Dispatch\
  \ to\", details.Customer, \":\", details.Quantity,\n\"x\", details.Product.Name)\n\
  }\nfmt.Println(\"Channel has been closed\")\n}\nfunc main() {\ndispatchChannel :=\
  \ make(chan DispatchNotification, 100)\nvar sendOnlyChannel chan<- DispatchNotification\
  \ = dispatchChannel\nvar receiveOnlyChannel <-chan DispatchNotification = dispatchChannel\n\
  go DispatchOrders(sendOnlyChannel)\nreceiveDispatches(receiveOnlyChannel)\n}\n```\n\
  \n我使用完整的变量语法来定义仅发送和仅接收的通道变量，然后将它们用作函数参数。这确保了仅发送通道的接收者只能发送值或关闭通道，而仅接收通道的接收者只能接收值。这些限制应用于同一个底层通道，因此通过\
  \ `sendOnlyChannel` 发送的消息将通过 `receiveOnlyChannel` 被接收。\n\n对通道方向的限制也可以通过显式转换来创建，如清单\
  \ 14-27 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n//\"time\"\n)\nfunc receiveDispatches(channel\
  \ <-chan DispatchNotification) {\nfor details := range channel {\nfmt.Println(\"\
  Dispatch to\", details.Customer, \":\", details.Quantity,\n\"x\", details.Product.Name)\n\
  }\nfmt.Println(\"Channel has been closed\")\n}\nfunc main() {\ndispatchChannel :=\
  \ make(chan DispatchNotification, 100)\n// var sendOnlyChannel chan<- DispatchNotification\
  \ = dispatchChannel\n// var receiveOnlyChannel <-chan DispatchNotification = dispatchChannel\n\
  go DispatchOrders(chan<- DispatchNotification(dispatchChannel))\nreceiveDispatches((<-chan\
  \ DispatchNotification)(dispatchChannel))\n}\n```\n\n对于仅接收通道的显式转换，需要在通道类型周围加上括号，以防止编译器将其解释为转换为\
  \ `DispatchNotification` 类型。清单 14-26 和 14-27 中的代码会产生相同的输出，输出内容类似于以下内容：\n\n```\n\
  Order count: 4\nDispatch to Bob : 0 x Kayak\nDispatch to Alice : 2 x Stadium\nDispatch\
  \ to Bob : 6 x Stadium\nDispatch to Alice : 3 x Thinking Cap\nChannel has been closed\n\
  ```\n\n## 使用 Select 语句\n\n`select` 关键字用于对将从通道发送或接收的操作进行分组，这允许创建复杂的 goroutine 和通道编排。`select`\
  \ 语句有几种用途，因此我将从基础开始讲解，然后逐步介绍更高级的选项。为准备本节中的示例，清单 14-28 增加了 `DispatchOrders` 函数发送的\
  \ `DispatchNotification` 值的数量，并引入了一个延迟，以便它们在更长的时间内发送。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"math/rand\"\n\"time\"\n)\ntype DispatchNotification struct {\nCustomer\
  \ string\n*Product\nQuantity int\n}\nvar Customers = []string{\"Alice\", \"Bob\"\
  , \"Charlie\", \"Dora\"}\nfunc DispatchOrders(channel chan<- DispatchNotification)\
  \ {\nrand.Seed(time.Now().UTC().UnixNano())\norderCount := rand.Intn(5) + 5\nfmt.Println(\"\
  Order count:\", orderCount)\nfor i := 0; i < orderCount; i++ {\nchannel <- DispatchNotification{\n\
  Customer: Customers[rand.Intn(len(Customers)-1)],\nQuantity: rand.Intn(10),\nProduct:\
  \  ProductList[rand.Intn(len(ProductList)-1)],\n}\n// if (i == 1) {\n//     notification\
  \ := <- channel\n//     fmt.Println(\"Read:\", notification.Customer)\n// }\ntime.Sleep(time.Millisecond\
  \ * 750)\n}\nclose(channel)\n}\n```\n\n\n### 无阻塞接收\n\n使用`select`语句最简单的场景是无阻塞地从通道接收数据，确保当通道为空时，协程无需等待。清单\
  \ 14-28 展示了以此方式使用`select`语句的简单示例。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"\
  time\"\n)\n// func receiveDispatches(channel <-chan DispatchNotification) {\n//\
  \     for details := range channel {\n//         fmt.Println(\"Dispatch to\", details.Customer,\
  \ \":\", details.Quantity,\n//             \"x\", details.Product.Name)\n//    \
  \ }\n//     fmt.Println(\"Channel has been closed\")\n// }\nfunc main() {\ndispatchChannel\
  \ := make(chan DispatchNotification, 100)\ngo DispatchOrders(chan<- DispatchNotification(dispatchChannel))\n\
  // receiveDispatches((<-chan DispatchNotification)(dispatchChannel))\nfor {\nselect\
  \ {\ncase details, ok := <- dispatchChannel:\nif ok {\nfmt.Println(\"Dispatch to\"\
  , details.Customer, \":\",\ndetails.Quantity, \"x\", details.Product.Name)\n} else\
  \ {\nfmt.Println(\"Channel has been closed\")\ngoto alldone\n}\ndefault:\nfmt.Println(\"\
  -- No message ready to be received\")\ntime.Sleep(time.Millisecond * 500)\n}\n}\n\
  alldone: fmt.Println(\"All values received\")\n}\n```\n\n`select`语句的结构与`switch`语句类似，区别在于其`case`子句执行的是通道操作。当`select`语句执行时，会逐一评估每个通道操作，直到找到可以无阻塞执行的那一个。随后执行该通道操作，并运行该`case`子句中的代码块。如果没有任何通道操作可以执行，则执行`default`子句中的代码。图\
  \ 14-11 展示了`select`语句的结构。\n\n![../images/512642_1_En_14_Chapter/512642_1_En_14_Fig11_HTML.jpg](img/512642_1_En_14_Fig11_HTML.jpg)\n\
  \n**图 14-11**：`select`语句\n\n`select`语句只会对`case`子句评估一次，这就是为什么我在清单 14-28 中还配合使用了`for`循环。循环会持续执行`select`语句，当通道中有可用数据时，`select`就会从中接收值。如果没有可用值，则执行`default`子句，该子句引入了一个睡眠周期。\n\
  \n清单 14-28 中的`case`子句通道操作会检查通道是否已关闭，如果已关闭，则使用`goto`关键字跳转到一个标签语句，该标签位于`for`循环之外。\n\
  \n编译并执行该项目，你将会看到与下面类似的输出。由于数据是随机生成的，输出可能略有不同：\n\n```plaintext\n-- No message ready\
  \ to be received\nOrder count: 5\nDispatch to Bob : 5 x Soccer Ball\n-- No message\
  \ ready to be received\nDispatch to Bob : 0 x Thinking Cap\n-- No message ready\
  \ to be received\nDispatch to Alice : 2 x Corner Flags\n-- No message ready to be\
  \ received\n-- No message ready to be received\nDispatch to Bob : 6 x Corner Flags\n\
  -- No message ready to be received\nDispatch to Alice : 2 x Corner Flags\n-- No\
  \ message ready to be received\n-- No message ready to be received\nChannel has\
  \ been closed\nAll values received\n```\n\n通过`time.Sleep`方法引入的延迟，导致值通过通道发送的速率与接收速率之间产生了微小的不匹配。结果就是，当通道为空时，`select`语句有时仍会被执行。与常规通道操作会阻塞不同，此时`select`语句会执行`default`子句中的代码。一旦通道关闭，循环即终止。\n\
  \n### 从多通道接收\n\n正如前一个示例所展示的，`select`语句可用于无阻塞接收。但当存在多个通道，且值以不同速率发送时，这个特性会变得更加有用。`select`语句允许接收方从任意一个有值的通道获取数据，而无需在任何一个通道上阻塞，如清单\
  \ 14-29 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc enumerateProducts(channel\
  \ chan<- *Product) {\nfor _, p := range ProductList[:3] {\nchannel <- p\ntime.Sleep(time.Millisecond\
  \ * 800)\n}\nclose(channel)\n}\nfunc main() {\ndispatchChannel := make(chan DispatchNotification,\
  \ 100)\ngo DispatchOrders(chan<- DispatchNotification(dispatchChannel))\nproductChannel\
  \ := make(chan *Product)\ngo enumerateProducts(productChannel)\nopenChannels :=\
  \ 2\nfor  {\nselect {\ncase details, ok := <- dispatchChannel:\nif ok {\nfmt.Println(\"\
  Dispatch to\", details.Customer, \":\",\ndetails.Quantity, \"x\", details.Product.Name)\n\
  } else {\nfmt.Println(\"Dispatch channel has been closed\")\ndispatchChannel = nil\n\
  openChannels--\n}\ncase product, ok := <- productChannel:\nif ok {\nfmt.Println(\"\
  Product:\", product.Name)\n} else {\nfmt.Println(\"Product channel has been closed\"\
  )\nproductChannel = nil\nopenChannels--\n}\ndefault:\nif (openChannels == 0) {\n\
  goto alldone\n}\nfmt.Println(\"-- No message ready to be received\")\ntime.Sleep(time.Millisecond\
  \ * 500)\n}\n}\nalldone: fmt.Println(\"All values received\")\n}\n```\n\n在此示例中，`select`语句用于从两个通道接收值：一个传递`DispatchNotification`值，另一个传递`Product`值。每次执行`select`语句时，它会遍历`case`子句，并构建一个可以无阻塞读取值的`case`列表。然后，会从该列表中随机选择一个`case`子句执行。如果没有`case`子句可以执行，则执行`default`子句。\n\
  \n需要注意管理已关闭的通道，因为通道关闭后的每次接收操作都会返回`nil`值，并依赖关闭标志来表明通道已关闭。不幸的是，这意味着`select`语句总是会选择已关闭通道的`case`子句，因为这类通道始终准备就绪，无需阻塞即可提供值——尽管该值已经无用。\n\
  \n**提示**：如果省略`default`子句，那么`select`语句将会阻塞，直到其中一个通道有值可接收。这有时很有用，但当通道可能被关闭时，这种方式无法处理。\n\
  \n管理已关闭的通道需要采取两项措施。第一项是防止`select`语句在通道关闭后选中它。可以通过将通道变量赋值为`nil`来实现，如下所示：\n\n```go\n\
  ...\ndispatchChannel = nil\n...\n```\n\n`nil`通道永远无法就绪，不会被选中，从而允许`select`语句转到其他`case`子句，这些子句的通道可能仍然开着。\n\
  \n第二项措施是在所有通道都关闭后跳出`for`循环，否则`select`语句将无休止地执行`default`子句。清单 14-29 使用了一个`int`变量，当某个通道关闭时，该变量值递减。当开放通道的数量降至零时，使用`goto`语句跳出循环。编译并执行该项目，你将看到类似下面的输出，展示了单个接收器如何从两个通道获取值：\n\
  \n\n\n### 输出结果\n\n```\nOrder count: 5\nProduct: Kayak\nDispatch to Alice : 9 x Unsteady\
  \ Chair\n-- No message ready to be received\nDispatch to Bob : 6 x Kayak\n-- No\
  \ message ready to be received\nProduct: Lifejacket\nDispatch to Charlie : 5 x Thinking\
  \ Cap\n-- No message ready to be received\n-- No message ready to be received\n\
  Dispatch to Alice : 1 x Stadium\nProduct: Soccer Ball\n-- No message ready to be\
  \ received\nDispatch to Charlie : 8 x Lifejacket\n-- No message ready to be received\n\
  Product channel has been closed\n-- No message ready to be received\nDispatch channel\
  \ has been closed\nAll values received\n```\n\n## 无阻塞发送\n\n`select` 语句也可用于向通道发送数据而不发生阻塞，如清单\
  \ 14-30 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc enumerateProducts(channel\
  \ chan<- *Product) {\nfor _, p := range ProductList {\nselect {\ncase channel <-\
  \ p:\nfmt.Println(\"Sent product:\", p.Name)\ndefault:\nfmt.Println(\"Discarding\
  \ product:\", p.Name)\ntime.Sleep(time.Second)\n}\n}\nclose(channel)\n}\nfunc main()\
  \ {\nproductChannel := make(chan *Product, 5)\ngo enumerateProducts(productChannel)\n\
  time.Sleep(time.Second)\nfor p := range productChannel {\nfmt.Println(\"Received\
  \ product:\", p.Name)\n}\n}\nListing 14-30\nSending Using a select Statement in\
  \ the main.go File in the concurrency Folder\n```\n\n清单 14-30 中的通道创建时带有小型缓冲区，并且需要经过短暂延迟后才会从通道接收值。这意味着\
  \ `enumerateProducts` 函数可以在缓冲区满之前通过通道发送值而不发生阻塞。`select` 语句的 `default` 分支会丢弃无法发送的值。编译并执行代码，你将看到类似以下的输出：\n\
  \n```\nSent product: Kayak\nSent product: Lifejacket\nSent product: Soccer Ball\n\
  Sent product: Corner Flags\nSent product: Stadium\nDiscarding product: Thinking\
  \ Cap\nDiscarding product: Unsteady Chair\nReceived product: Kayak\nReceived product:\
  \ Lifejacket\nReceived product: Soccer Ball\nReceived product: Corner Flags\nReceived\
  \ product: Stadium\nSent product: Bling-Bling King\nReceived product: Bling-Bling\
  \ King\n```\n\n输出显示，`select` 语句在检测到发送操作会阻塞时，转而去执行了 `default` 分支。在清单 14-30 中，`case`\
  \ 语句包含一条输出消息的语句，但这并非必需；`case` 语句可以只指定发送操作而不附带额外语句，如清单 14-31 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"time\"\n)\nfunc enumerateProducts(channel chan<- *Product)\
  \ {\nfor _, p := range ProductList {\nselect {\ncase channel <- p:\n//fmt.Println(\"\
  Sent product:\", p.Name)\ndefault:\nfmt.Println(\"Discarding product:\", p.Name)\n\
  time.Sleep(time.Second)\n}\n}\nclose(channel)\n}\nfunc main() {\nproductChannel\
  \ := make(chan *Product, 5)\ngo enumerateProducts(productChannel)\ntime.Sleep(time.Second)\n\
  for p := range productChannel {\nfmt.Println(\"Received product:\", p.Name)\n}\n\
  }\nListing 14-31\nOmitting Statements in the main.go File in the concurrency Folder\n\
  ```\n\n## 发送到多个通道\n\n如果有多个通道可用，可以使用 `select` 语句找到一个发送不会阻塞的通道，如清单 14-32 所示。\n\n**提示**\n\
  \n你可以在同一个 `select` 语句中混用包含发送和接收操作的 `case` 语句。当执行 `select` 语句时，Go 运行时会构建一个可被执行而不阻塞的\
  \ `case` 语句列表，并从中随机选择一个，这个被选中的可以是发送或接收语句。\n\n```\npackage main\nimport (\n\"fmt\"\
  \n\"time\"\n)\nfunc enumerateProducts(channel1, channel2 chan<- *Product) {\nfor\
  \ _, p := range ProductList {\nselect {\ncase channel1 <- p:\nfmt.Println(\"Send\
  \ via channel 1\")\ncase channel2 <- p:\nfmt.Println(\"Send via channel 2\")\n}\n\
  }\nclose(channel1)\nclose(channel2)\n}\nfunc main() {\nc1 := make(chan *Product,\
  \ 2)\nc2 := make(chan *Product, 2)\ngo enumerateProducts(c1, c2)\ntime.Sleep(time.Second)\n\
  for p := range c1 {\nfmt.Println(\"Channel 1 received product:\", p.Name)\n}\nfor\
  \ p := range c2 {\nfmt.Println(\"Channel 2 received product:\", p.Name)\n}\n}\n\
  Listing 14-32\nSending Over Multiple Channels in the main.go File in the concurrency\
  \ Folder\n```\n\n此示例有两个带小型缓冲区的通道。与接收的情况类似，`select` 语句会构建一个可无阻塞发送值的通道列表，然后从中随机选择一个。如果没有通道可用，则会执行\
  \ `default` 分支。本示例中没有 `default` 分支，这意味着 `select` 语句将发生阻塞，直到至少有一个通道可以接收值。\n\n在创建执行\
  \ `enumerateProducts` 函数的 goroutine 之后，需要等待一秒钟才会从通道接收值。这意味着只有缓冲区决定了向通道发送是否会阻塞。编译并执行该项目，你将得到以下输出：\n\
  \n```\nSend via channel 1\nSend via channel 1\nSend via channel 2\nSend via channel\
  \ 2\nChannel 1 received product: Kayak\nChannel 1 received product: Lifejacket\n\
  Channel 1 received product: Stadium\nSend via channel 1\nSend via channel 1\nSend\
  \ via channel 1\nSend via channel 1\nChannel 1 received product: Thinking Cap\n\
  Channel 1 received product: Unsteady Chair\nChannel 1 received product: Bling-Bling\
  \ King\nChannel 2 received product: Soccer Ball\nChannel 2 received product: Corner\
  \ Flags\n```\n\n一个常见的错误是认为 `select` 语句会将值均匀地分配到多个通道。如前面所述，`select` 语句会随机选择一个可无阻塞执行的\
  \ `case` 语句，这意味着值的分配是不可预测的，可能是不均匀的。通过重复运行该示例，你可以观察到这一效果：值会以不同的顺序发送到各个通道。\n\n## 本章小结\n\
  \n在本章中，我介绍了 goroutine 的使用方法，它能让 Go 函数并发执行。Goroutine 通过通道异步产生结果，通道也在本章中做了介绍。Goroutine\
  \ 和通道使得编写并发应用程序变得容易，而无需管理单个执行线程。在下一章中，我将介绍 Go 对错误处理的支持。\n\n\n\n# 15. 错误处理\n\n本章描述了\
  \ Go 语言处理错误的方式。我将介绍表示错误的接口，向你展示如何创建错误，并解释处理错误的不同方法。我还会介绍 panic，这是处理不可恢复错误的方式。表格\
  \ 15-1 将错误处理置于上下文中。\n\n**表 15-1.** 错误处理上下文\n\n| 问题 | 答案 |\n| --- | --- |\n| 它是什么？\
  \ | Go 的错误处理允许表示和处理异常情况与失败。 |\n| 它为什么有用？ | 应用程序经常会遇到意外情况，错误处理功能提供了一种在出现这些情况时做出响应的方法。\
  \ |\n| 如何使用？ | `error` 接口用于定义错误条件，这些条件通常作为函数结果返回。当发生不可恢复的错误时，会调用 `panic` 函数。 |\n\
  | 有陷阱或限制吗？ | 必须注意确保将错误传达给应用程序中最能判断情况严重性的部分。 |\n| 有替代方案吗？ | 你不必在代码中使用 `error` 接口，但它在\
  \ Go 标准库中被广泛使用，并且很难避免。 |\n\n表格 15-2 总结了本章内容。\n\n**表 15-2.** 本章总结\n\n| 问题 | 解决方案\
  \ | 代码清单 |\n| --- | --- | --- |\n| 指示发生了错误 | 创建一个实现 `error` 接口的结构体并将其作为函数结果返回 |\
  \ 7–8, 11, 12 |\n| 通过通道报告错误 | 向用于通道消息的结构体类型添加一个 `error` 字段 | 9–10 |\n| 指示发生了不可恢复的错误\
  \ | 调用 `panic` 函数 | 13, 16 |\n| 从 panic 中恢复 | 使用 `defer` 关键字注册一个调用 `recover` 函数的函数\
  \ | 14, 15, 17–19 |\n\n## 本章准备\n\n为准备本章，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `errorHandling`\
  \ 的目录。在 `errorHandling` 文件夹中运行代码清单 15-1 所示的命令来创建一个模块文件。\n\n**提示**\n\n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书其他所有章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init errorHandling\n\
  代码清单 15-1\n初始化模块\n```\n\n在 `errorHandling` 文件夹中添加一个名为 `product.go` 的文件，内容如代码清单 15-2\
  \ 所示。\n\n```\npackage main\nimport \"strconv\"\ntype Product struct {\nName, Category\
  \ string\nPrice float64\n}\ntype ProductSlice []*Product\nvar Products = ProductSlice\
  \ {\n{ \"Kayak\", \"Watersports\", 279 },\n{ \"Lifejacket\", \"Watersports\", 49.95\
  \ },\n{ \"Soccer Ball\", \"Soccer\", 19.50 },\n{ \"Corner Flags\", \"Soccer\", 34.95\
  \ },\n{ \"Stadium\", \"Soccer\", 79500 },\n{ \"Thinking Cap\", \"Chess\", 16 },\n\
  { \"Unsteady Chair\", \"Chess\", 75 },\n{ \"Bling-Bling King\", \"Chess\", 1200\
  \ },\n}\nfunc ToCurrency(val float64) string {\nreturn \"$\" + strconv.FormatFloat(val,\
  \ 'f', 2, 64)\n}\n代码清单 15-2\nerrorHandling 文件夹中 product.go 文件的内容\n```\n\n该文件定义了一个名为\
  \ `Product` 的自定义类型，一个 `*Product` 值切片的别名，以及一个使用字面量语法填充的切片。我还定义了一个将 `float64` 值格式化为美元金额的函数。\n\
  \n在 `errorHandling` 文件夹中添加一个名为 `operations.go` 的文件，内容如代码清单 15-3 所示。\n\n```\npackage\
  \ main\nfunc (slice ProductSlice) TotalPrice(category string) (total float64) {\n\
  for _, p := range slice {\nif (p.Category == category) {\ntotal += p.Price\n}\n\
  }\nreturn\n}\n代码清单 15-3\nerrorHandling 文件夹中 operations.go 文件的内容\n```\n\n该文件定义了一个方法，它接收一个\
  \ `ProductSlice`，并对具有指定 `Category` 值的 `Product` 值的 `Price` 字段进行求和。\n\n在 `errorHandling`\
  \ 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 15-4 所示。\n\n```\npackage main\nimport \"fmt\"\
  \nfunc main() {\ncategories := []string { \"Watersports\", \"Chess\" }\nfor _, cat\
  \ := range categories {\ntotal := Products.TotalPrice(cat)\nfmt.Println(cat, \"\
  Total:\", ToCurrency(total))\n}\n}\n代码清单 15-4\nerrorHandling 文件夹中 main.go 文件的内容\n\
  ```\n\n使用命令提示符在 `errorHandling` 文件夹中运行代码清单 15-5 所示的命令。\n\n```\ngo run .\n代码清单 15-5\n\
  运行示例项目\n```\n\n代码将被编译并执行，产生以下输出：\n\n```\nWatersports Total: $328.95\nChess Total:\
  \ $1291.00\n```\n\n## 处理可恢复的错误\n\nGo 使得表达异常条件变得容易，这允许函数或方法向调用代码指示出现了问题。例如，代码清单 15-6\
  \ 添加了会从 `TotalPrice` 方法产生有问题结果的语句。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\ncategories := []string { \"Watersports\", \"Chess\", \"Running\" }\nfor _,\
  \ cat := range categories {\ntotal := Products.TotalPrice(cat)\nfmt.Println(cat,\
  \ \"Total:\", ToCurrency(total))\n}\n}\n代码清单 15-6\n在 errorHandling 文件夹的 main.go\
  \ 文件中调用方法\n```\n\n编译并执行项目，你将收到以下输出：\n\n```\nWatersports Total: $328.95\nChess Total:\
  \ $1291.00\nRunning Total: $0.00\n```\n\n`TotalPrice` 方法对于 `Running` 类别的响应是模糊的。零结果可能意味着指定类别中没有产品，或者意味着有产品但它们的总和为零。调用\
  \ `TotalPrice` 方法的代码无法得知零值代表什么。\n\n在一个简单的示例中，很容易从上下文理解结果：`Running` 类别中没有产品。在实际项目中，这种结果可能更难以理解和响应。\n\
  \nGo 提供了一个名为 `error` 的预定义接口，它提供了一种解决此问题的方法。以下是该接口的定义：\n\n```\ntype error interface\
  \ {\nError() string\n}\n```\n\n该接口要求错误定义一个名为 `Error` 的方法，该方法返回一个字符串。\n\n\n\n###\
  \ 生成错误\n\n函数和方法可以通过产生 `error` 响应来表达异常或意外的结果，如清单 15-7 所示。\n\n```\npackage main\n\
  type CategoryError struct {\nrequestedCategory string\n}\nfunc (e *CategoryError)\
  \ Error() string {\nreturn \"Category \" + e.requestedCategory + \" does not exist\"\
  \n}\nfunc (slice ProductSlice) TotalPrice(category string) (total float64,\nerr\
  \ *CategoryError) {\nproductCount := 0\nfor _, p := range slice {\nif (p.Category\
  \ == category) {\ntotal += p.Price\nproductCount++\n}\n}\nif (productCount == 0)\
  \ {\nerr = &CategoryError{ requestedCategory: category}\n}\nreturn\n}\n清单 15-7\n\
  在 errorHandling 文件夹的 operations.go 文件中定义一个错误\n```\n\n`CategoryError` 类型定义了一个未导出的\
  \ `requestedCategory` 字段，并且有一个符合 `error` 接口的方法。`TotalPrice` 方法的签名已更新，现在返回两个结果：原始的\
  \ `float64` 值和一个 `error`。如果 `for` 循环没有找到任何具有指定类别的产品，则 `err` 结果被赋值为一个 `CategoryError`\
  \ 值，表明请求了一个不存在的类别。清单 15-8 更新了调用代码以使用该错误结果。\n\n```\npackage main\nimport \"fmt\"\n\
  func main() {\ncategories := []string { \"Watersports\", \"Chess\", \"Running\"\
  \ }\nfor _, cat := range categories {\ntotal, err := Products.TotalPrice(cat)\n\
  if (err == nil) {\nfmt.Println(cat, \"Total:\", ToCurrency(total))\n} else {\nfmt.Println(cat,\
  \ \"(no such category)\")\n}\n}\n}\n清单 15-8\n在 errorHandling 文件夹的 main.go 文件中处理错误\n\
  ```\n\n调用 `TotalPrice` 方法的结果通过检查两个结果的组合来确定。\n\n如果错误结果为 `nil`，则请求的类别存在，并且 `float64`\
  \ 结果代表其价格总和，即使该总和为零。如果 `error` 结果不为 `nil`，则请求的类别不存在，并且应忽略 `float64` 值。编译并执行项目，您将看到该错误使得清单\
  \ 15-8 中的代码能够识别出不存在的产品类别：\n\n```\nWatersports Total: $328.95\nChess Total: $1291.00\n\
  Running (no such category)\n```\n\n#### 忽略错误结果\n\n我不建议忽略错误结果，因为这意味着您将丢失重要信息——但如果您不需要知道何时出错，则可以使用空白标识符代替错误结果的名称，如下所示：\n\
  \n```\npackage main\nimport \"fmt\"\nfunc main() {\ncategories := []string { \"\
  Watersports\", \"Chess\", \"Running\" }\nfor _, cat := range categories {\ntotal,\
  \ _ := Products.TotalPrice(cat)\nfmt.Println(cat, \"Total:\", ToCurrency(total))\n\
  }\n}\n```\n\n这种技术阻止了调用代码理解 `TotalPrice` 方法的完整响应，应谨慎使用。\n\n### 通过通道报告错误\n\n如果函数是使用\
  \ goroutine 执行的，那么唯一的通信方式就是通过通道，这意味着任何问题的详细信息必须与成功操作一起传递。保持错误处理尽可能简单非常重要，我建议避免尝试使用额外的通道或创建复杂的机制来在通道之外发信号通知错误情况。我更倾向于创建一个自定义类型来整合两种结果，如清单\
  \ 15-9 所示。\n\n```\npackage main\ntype CategoryError struct {\nrequestedCategory\
  \ string\n}\nfunc (e *CategoryError) Error() string {\nreturn \"Category \" + e.requestedCategory\
  \ + \" does not exist\"\n}\ntype ChannelMessage struct {\nCategory string\nTotal\
  \ float64\n*CategoryError\n}\nfunc (slice ProductSlice) TotalPrice(category string)\
  \ (total float64,\nerr *CategoryError) {\nproductCount := 0\nfor _, p := range slice\
  \ {\nif (p.Category == category) {\ntotal += p.Price\nproductCount++\n}\n}\nif (productCount\
  \ == 0) {\nerr = &CategoryError{ requestedCategory: category}\n}\nreturn\n}\nfunc\
  \ (slice ProductSlice) TotalPriceAsync (categories []string,\nchannel chan<- ChannelMessage)\
  \ {\nfor _, c := range categories {\ntotal, err := slice.TotalPrice(c)\nchannel\
  \ <- ChannelMessage{\nCategory: c,\nTotal: total,\nCategoryError: err,\n}\n}\nclose(channel)\n\
  }\n清单 15-9\n在 errorHandling 文件夹的 operations.go 文件中定义类型和函数\n```\n\n`ChannelMessage`\
  \ 类型允许我传达准确反映 `TotalPrice` 方法结果所需的一对结果，该方法由新的 `TotalPriceAsync` 方法异步执行。这种方式的结果类似于同步方法结果可以表达错误的方式。\n\
  \n如果一个通道只有一个发送方，您可以在发生错误后关闭该通道。但如果存在多个发送方，则必须注意避免关闭通道，因为它们可能仍然能够生成有效的结果，并且会尝试向已关闭的通道发送数据，这将导致程序以\
  \ panic 终止。\n\n清单 15-10 更新了 main 函数，以使用 `TotalPrice` 方法的新异步版本。\n\n```\npackage main\n\
  import \"fmt\"\nfunc main() {\ncategories := []string { \"Watersports\", \"Chess\"\
  , \"Running\" }\nchannel := make(chan ChannelMessage, 10)\ngo Products.TotalPriceAsync(categories,\
  \ channel)\nfor message := range channel {\nif message.CategoryError == nil {\n\
  fmt.Println(message.Category, \"Total:\", ToCurrency(message.Total))\n} else {\n\
  fmt.Println(message.Category, \"(no such category)\")\n}\n}\n}\n清单 15-10\n在 errorHandling\
  \ 文件夹的 main.go 文件中使用新方法\n```\n\n编译并执行项目，您将收到类似于以下内容的输出：\n\n```\nWatersports Total:\
  \ $328.95\nChess Total: $1291.00\nRunning (no such category)\n```\n\n\n\n### 使用错误便捷函数\n\
  \n为应用程序可能遇到的每种错误类型定义数据类型可能会很繁琐。标准库中的 `errors` 包提供了一个 `New` 函数，该函数返回一个内容为 `string`\
  \ 的 `error`。这种方法的缺点在于它只能创建简单的错误，但其优点是简单明了，如代码清单 15-11 所示。\n\n```go\npackage main\n\
  import \"errors\"\n// type CategoryError struct {\n//     requestedCategory string\n\
  // }\n// func (e *CategoryError) Error() string {\n//     return \"Category \" +\
  \ e.requestedCategory + \" does not exist\"\n//}\ntype ChannelMessage struct {\n\
  Category string\nTotal float64\nCategoryError error\n}\nfunc (slice ProductSlice)\
  \ TotalPrice(category string) (total float64,\nerr error) {\nproductCount := 0\n\
  for _, p := range slice {\nif (p.Category == category) {\ntotal += p.Price\nproductCount++\n\
  }\n}\nif (productCount == 0) {\nerr = errors.New(\"Cannot find category\")\n}\n\
  return\n}\nfunc (slice ProductSlice) TotalPriceAsync (categories []string,\nchannel\
  \ chan<- ChannelMessage) {\nfor _, c := range categories {\ntotal, err := slice.TotalPrice(c)\n\
  channel <- ChannelMessage{\nCategory: c,\nTotal: total,\nCategoryError: err,\n}\n\
  }\nclose(channel)\n}\n```\n\n代码清单 15-11：在 `errorHandling` 文件夹的 `operations.go` 文件中使用\
  \ `Errors` 便捷函数\n\n虽然在这个例子中去除了自定义错误类型，但生成的 `error` 不再包含被请求类别的详细信息。这不是一个大问题，因为可以合理地期望调用代码拥有这些信息，但对于那些无法接受的情况，可以使用\
  \ `fmt` 包轻松创建包含更复杂字符串内容的错误。\n\n`fmt` 包负责格式化字符串，它通过格式化动词来实现这一点。这些动词将在第 17 章中详细描述，`fmt`\
  \ 包提供的函数之一是 `Errorf`，它使用格式化字符串创建 `error` 值，如代码清单 15-12 所示。\n\n```go\npackage main\n\
  import \"fmt\"\ntype ChannelMessage struct {\nCategory string\nTotal float64\nCategoryError\
  \ error\n}\nfunc (slice ProductSlice) TotalPrice(category string) (total float64,\n\
  err error) {\nproductCount := 0\nfor _, p := range slice {\nif (p.Category == category)\
  \ {\ntotal += p.Price\nproductCount++\n}\n}\nif (productCount == 0) {\nerr = fmt.Errorf(\"\
  Cannot find category: %v\", category)\n}\nreturn\n}\nfunc (slice ProductSlice) TotalPriceAsync\
  \ (categories []string,\nchannel chan<- ChannelMessage) {\nfor _, c := range categories\
  \ {\ntotal, err := slice.TotalPrice(c)\nchannel <- ChannelMessage{\nCategory: c,\n\
  Total: total,\nCategoryError: err,\n}\n}\nclose(channel)\n}\n```\n\n代码清单 15-12：在\
  \ `errorHandling` 文件夹的 `operations.go` 文件中使用 `Errorf` 格式化函数\n\n`Errorf` 函数的第一个参数中的\
  \ `%v` 是格式化动词的一个例子，它会被下一个参数替换，如第 17 章所述。代码清单 15-11 和代码清单 15-12 都会产生以下输出，该输出与错误响应中的消息无关：\n\
  \n```\nWatersports Total: $328.95\nChess Total: $1291.00\nRunning (no such category)\n\
  ```\n\n## 处理不可恢复的错误\n\n有些错误非常严重，应当导致应用程序立即终止，这个过程称为*恐慌（panicking）*，如代码清单 15-13 所示。\n\
  \n```go\npackage main\nimport \"fmt\"\nfunc main() {\ncategories := []string { \"\
  Watersports\", \"Chess\", \"Running\" }\nchannel := make(chan ChannelMessage, 10)\n\
  go Products.TotalPriceAsync(categories, channel)\nfor message := range channel {\n\
  if message.CategoryError == nil {\nfmt.Println(message.Category, \"Total:\", ToCurrency(message.Total))\n\
  } else {\npanic(message.CategoryError)\n//fmt.Println(message.Category, \"(no such\
  \ category)\")\n}\n}\n}\n```\n\n代码清单 15-13：在 `errorHandling` 文件夹的 `main.go` 文件中触发恐慌\n\
  \n当找不到某个类别时，`main` 函数不再打印消息，而是触发恐慌，这是通过内置的 `panic` 函数完成的，如图 15-1 所示。\n\n![../images/512642_1_En_15_Chapter/512642_1_En_15_Fig1_HTML.jpg](img/512642_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1：`panic` 函数\n\n调用 `panic` 函数时需要传入一个参数，该参数可以是任何有助于解释恐慌原因的值。在代码清单 15-13 中，`panic`\
  \ 函数被调用时传入了一个 `error`，这是一种将 Go 语言错误处理功能结合起来的实用方式。\n\n当调用 `panic` 函数时，正在执行的函数会停止，所有的\
  \ `defer` 函数都会被执行。（`defer` 特性在第 8 章中有描述。）恐慌会沿着调用栈向上冒泡，终止调用函数的执行，并调用它们的 `defer` 函数。在示例中，是\
  \ `GetProducts` 函数触发了恐慌，这导致了 `CountProducts` 函数的终止，最后是 `main` 函数的终止，此时应用终止。编译并执行代码，您将看到以下输出，其中显示了恐慌的栈跟踪信息：\n\
  \n```\nWatersports Total: $328.95\nChess Total: $1291.00\npanic: Cannot find category:\
  \ Running\ngoroutine 1 [running]:\nmain.main()\nC:/errorHandling/main.go:16 +0x309\n\
  exit status 2\n```\n\n输出显示发生了恐慌，并且发生在 `main` 包的 `main` 函数内部，由 `main.go` 文件的第 16\
  \ 行语句引发。在更复杂的应用程序中，恐慌显示的栈跟踪信息有助于弄清楚恐慌发生的原因。\n\n### 定义恐慌函数和非恐慌函数\n\n对于何时适合返回错误、何时使用恐慌更有用，并没有明确的规则。问题在于问题的严重程度通常最好由调用函数来决定，而触发恐慌的决定往往不是由调用函数做出的。正如我之前解释的，使用不存在的产品类别在某些情况下可能是一个严重的、不可恢复的问题，而在另一些情况下则可能是预期的结果，这两种情况完全有可能存在于同一个项目中。\n\
  \n一种常见的约定是提供函数的两个版本，一个返回错误，另一个触发恐慌。在第 16 章中可以看到这种安排的例子，其中 `regexp` 包定义了一个返回错误的 `Compile`\
  \ 函数和一个触发恐慌的 `MustCompile` 函数。\n\n\n\n### 从恐慌中恢复\n\nGo 提供了内置函数 `recover`，调用它可以阻止恐慌沿调用栈向上传播并终止程序。`recover`\
  \ 函数必须在通过 `defer` 关键字执行的代码中调用，如代码清单 15-14 所示。\n\n```\npackage main\nimport \"fmt\"\
  \nfunc main() {\nrecoveryFunc := func() {\nif arg := recover(); arg != nil {\nif\
  \ err, ok := arg.(error); ok {\nfmt.Println(\"Error:\", err.Error())\n} else if\
  \ str, ok := arg.(string); ok {\nfmt.Println(\"Message:\", str)\n} else {\nfmt.Println(\"\
  Panic recovered\")\n}\n}\n}\ndefer recoveryFunc()\ncategories := []string { \"Watersports\"\
  , \"Chess\", \"Running\" }\nchannel := make(chan ChannelMessage, 10)\ngo Products.TotalPriceAsync(categories,\
  \ channel)\nfor message := range channel {\nif message.CategoryError == nil {\n\
  fmt.Println(message.Category, \"Total:\", ToCurrency(message.Total))\n} else {\n\
  panic(message.CategoryError)\n//fmt.Println(message.Category, \"(no such category)\"\
  )\n}\n}\n}\n代码清单 15-14\n在 errorHandling 文件夹的 main.go 文件中从恐慌中恢复\n```\n\n此示例使用 `defer`\
  \ 关键字注册一个函数，该函数将在 `main` 函数完成时执行，即使没有发生恐慌也会执行。调用 `recover` 函数时，如果发生了恐慌，它会返回一个值，从而阻止恐慌的继续传播，并提供对用于调用\
  \ `panic` 函数的参数的访问，如图 15-2 所示。\n\n![../images/512642_1_En_15_Chapter/512642_1_En_15_Fig2_HTML.jpg](img/512642_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2\n\n从恐慌中恢复\n\n由于任何值都可以传递给 `panic` 函数，所以 `recover` 函数返回值的类型是空接口（`interface{}`），这需要在使用之前进行类型断言。代码清单\
  \ 15-14 中的恢复函数处理了 `error` 和 `string` 类型，这是两种最常见的恐慌参数类型。\n\n定义一个函数并立即与 `defer` 关键字结合使用可能会显得笨拙，因此恐慌恢复通常使用匿名函数来完成，如代码清单\
  \ 15-15 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main() {\ndefer func() {\n\
  if arg := recover(); arg != nil {\nif err, ok := arg.(error); ok {\nfmt.Println(\"\
  Error:\", err.Error())\n} else if str, ok := arg.(string); ok {\nfmt.Println(\"\
  Message:\", str)\n} else {\nfmt.Println(\"Panic recovered\")\n}\n}\n}()\ncategories\
  \ := []string { \"Watersports\", \"Chess\", \"Running\" }\nchannel := make(chan\
  \ ChannelMessage, 10)\ngo Products.TotalPriceAsync(categories, channel)\nfor message\
  \ := range channel {\nif message.CategoryError == nil {\nfmt.Println(message.Category,\
  \ \"Total:\", ToCurrency(message.Total))\n} else {\npanic(message.CategoryError)\n\
  //fmt.Println(message.Category, \"(no such category)\")\n}\n}\n}\n代码清单 15-15\n在\
  \ errorHandling 文件夹的 main.go 文件中使用匿名函数\n\n请注意匿名函数右大括号后面使用了括号，这是调用匿名函数所必需的，而不仅仅是定义它。编译并执行代码清单\
  \ 15-14 和 15-15 都会产生相同的输出：\n\n```\nWatersports Total: $328.95\nChess Total: $1291.00\n\
  Error: Cannot find category: Running\n```\n\n### 恢复后再次恐慌\n\n你可能会从一个恐慌中恢复过来，但随后意识到情况终究是无法恢复的。发生这种情况时，你可以启动一个新的恐慌，要么提供一个新的参数，要么重用调用\
  \ `recover` 函数时收到的值，如代码清单 15-16 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\ndefer func() {\nif arg := recover(); arg != nil {\nif err, ok := arg.(error);\
  \ ok {\nfmt.Println(\"Error:\", err.Error())\npanic(err)\n} else if str, ok := arg.(string);\
  \ ok {\nfmt.Println(\"Message:\", str)\n} else {\nfmt.Println(\"Panic recovered\"\
  )\n}\n}\n}()\ncategories := []string { \"Watersports\", \"Chess\", \"Running\" }\n\
  channel := make(chan ChannelMessage, 10)\ngo Products.TotalPriceAsync(categories,\
  \ channel)\nfor message := range channel {\nif message.CategoryError == nil {\n\
  fmt.Println(message.Category, \"Total:\", ToCurrency(message.Total))\n} else {\n\
  panic(message.CategoryError)\n//fmt.Println(message.Category, \"(no such category)\"\
  )\n}\n}\n}\n代码清单 15-16\n在 errorHandling 文件夹的 main.go 文件中恢复后有选择地再次恐慌\n```\n\n这个延迟函数恢复了恐慌，检查了错误的详细信息，然后再次引发恐慌。编译并执行该项目，你将看到更改的效果：\n\
  \n```\nWatersports Total: $328.95\nChess Total: $1291.00\nError: Cannot find category:\
  \ Running\npanic: Cannot find category: Running [recovered]\npanic: Cannot find\
  \ category: Running\ngoroutine 1 [running]:\nmain.main.func1()\nC:/errorHandling/main.go:11\
  \ +0x1c8\npanic({0xad91a0, 0xc000088230})\nC:/Program Files/Go/src/runtime/panic.go:1038\
  \ +0x215\nmain.main()\nC:/errorHandling/main.go:29 +0x333\nexit status 2\n```\n\n\
  \n\n### 从 Go 协程的恐慌中恢复\n\n恐慌会沿着调用栈向上传播，但仅会到达当前协程的顶部，此时会导致应用程序终止。这种限制意味着必须在协程执行的代码中恢复恐慌，如代码清单\
  \ 15-17 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype CategoryCountMessage struct\
  \ {\nCategory string\nCount int\n}\nfunc processCategories(categories [] string,\
  \ outChan chan <- CategoryCountMessage) {\ndefer func() {\nif arg := recover();\
  \ arg != nil {\nfmt.Println(arg)\n}\n}()\nchannel := make(chan ChannelMessage, 10)\n\
  go Products.TotalPriceAsync(categories, channel)\nfor message := range channel {\n\
  if message.CategoryError == nil {\noutChan <- CategoryCountMessage {\nCategory:\
  \ message.Category,\nCount: int(message.Total),\n}\n} else {\npanic(message.CategoryError)\n\
  }\n}\nclose(outChan)\n}\nfunc main() {\ncategories := []string { \"Watersports\"\
  , \"Chess\", \"Running\" }\nchannel := make(chan CategoryCountMessage)\ngo processCategories(categories,\
  \ channel)\nfor message := range channel {\nfmt.Println(message.Category, \"Total:\"\
  , message.Count)\n}\n}\n代码清单 15-17\n在 errorHandling 文件夹的 main.go 文件中从恐慌中恢复\n```\n\
  \n`main` 函数使用一个协程来调用 `processCategories` 函数，如果 `TotalPriceAsync` 函数发送了一个 `error`，该函数就会引发恐慌。`processCategories`\
  \ 函数从恐慌中恢复，但这会带来一个意想不到的后果，你可以通过编译和执行项目得到的输出来看到：\n\n```\nWatersports Total: 328\n\
  Chess Total: 1291\nCannot find category: Running\nfatal error: all goroutines are\
  \ asleep - deadlock!\ngoroutine 1 [chan receive]:\nmain.main()\nC:/errorHandling/main.go:39\
  \ +0x1c5\nexit status 2\n```\n\n问题在于，从恐慌中恢复并不会恢复执行 `processCategories` 函数，这意味着 `close`\
  \ 函数永远不会在 `main` 函数接收消息的那个通道上被调用。`main` 函数试图接收一条永远不会被发送的消息，从而阻塞在通道上，触发了 Go 运行时的死锁检测。\n\
  \n最简单的方法是在恢复过程中调用通道上的 `close` 函数，如代码清单 15-18 所示。\n\n```go\n...\ndefer func() {\n\
  if arg := recover(); arg != nil {\nfmt.Println(arg)\nclose(outChan)\n}\n}()\n...\n\
  代码清单 15-18\n在 errorHandling 文件夹的 main.go 文件中确保关闭通道\n```\n\n这可以防止死锁，但它没有向 `main`\
  \ 函数指示 `processCategories` 函数未能完成其工作，这可能会带来后果。一个更好的方法是在关闭通道之前，通过通道表示这个结果，如代码清单 15-19\
  \ 所示。\n\n```go\npackage main\nimport \"fmt\"\ntype CategoryCountMessage struct {\n\
  Category string\nCount int\nTerminalError interface{}\n}\nfunc processCategories(categories\
  \ [] string, outChan chan <- CategoryCountMessage) {\ndefer func() {\nif arg :=\
  \ recover(); arg != nil {\nfmt.Println(arg)\noutChan <- CategoryCountMessage{\n\
  TerminalError: arg,\n}\nclose(outChan)\n}\n}()\nchannel := make(chan ChannelMessage,\
  \ 10)\ngo Products.TotalPriceAsync(categories, channel)\nfor message := range channel\
  \ {\nif message.CategoryError == nil {\noutChan <- CategoryCountMessage {\nCategory:\
  \ message.Category,\nCount: int(message.Total),\n}\n} else {\npanic(message.CategoryError)\n\
  }\n}\nclose(outChan)\n}\nfunc main() {\ncategories := []string { \"Watersports\"\
  , \"Chess\", \"Running\" }\nchannel := make(chan CategoryCountMessage)\ngo processCategories(categories,\
  \ channel)\nfor message := range channel {\nif (message.TerminalError == nil) {\n\
  fmt.Println(message.Category, \"Total:\", message.Count)\n} else {\nfmt.Println(\"\
  A terminal error occured\")\n}\n}\n}\n代码清单 15-19\n在 errorHandling 文件夹的 main.go 文件中指示失败\n\
  ```\n\n结果是，如何处理恐慌的决策从协程传递给了调用代码，调用代码可以根据具体问题选择继续执行或触发新的恐慌。编译并执行该项目，你将得到以下输出：\n\n\
  ```\nWatersports Total: 328\nChess Total: 1291\nCannot find category: Running\n\
  A terminal error occured\n```\n\n## 本章小结\n\n在本章中，我描述了 Go 中用于处理错误情况的特性。我介绍了 `error`\
  \ 类型，并展示了如何创建自定义错误，以及如何使用便捷函数创建带有简单消息的错误。我还解释了恐慌，即如何处理不可恢复的错误。我说明了关于一个错误是否不可恢复的决定可能是主观的，这就是为什么\
  \ Go 允许恢复恐慌。我解释了恢复过程，并演示了如何使其适应在协程中有效工作。在下一章中，我将开始描述 Go 标准库。\n\n"
- '# 第二部分 - 使用 Go 标准库


  '
- "# 16. 字符串处理与正则表达式\n\n在本章中，我将介绍用于处理 `string` 值的标准库特性，这些特性几乎是每个项目都需要的，并且许多语言将其作为内建类型的方法提供。但是，尽管\
  \ Go 在标准库中定义了这些特性，但仍提供了一整套函数，以及对正则表达式工作的良好支持。表 16-1 将这些特性置于上下文中。\n\n**表 16-1** -\
  \  将字符串处理与正则表达式置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？ | 字符串处理包括从修剪空白到将字符串拆分为组件的广泛操作。正则表达式是允许简洁定义字符串匹配规则的模式。\
  \ |\n| 为什么它们有用？ | 当应用程序需要处理 `string` 值时，这些操作非常有用。一个常见的例子是处理 HTTP 请求。 |\n| 如何使用它们？\
  \ | 这些特性包含在属于标准库的 `strings` 和 `regexp` 包中。 |\n| 是否有任何陷阱或限制？ | 某些操作的执行方式存在一些特性，但它们大多符合预期行为。\
  \ |\n| 是否有任何替代方案？ | 使用这些包是可选的，并非必须使用。话虽如此，自己实现这些特性几乎没有意义，因为标准库编写良好且经过了彻底测试。 |\n\n\
  **表 16-2** - 本章小结\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 比较字符串 | 使用 `strings`\
  \ 包中的 `Contains`、`EqualFold` 或 `Has*` 函数 | 4 |\n| 转换字符串大小写 | 使用 `strings` 包中的 `ToLower`、`ToUpper`、`Title`\
  \ 或 `ToTitle` 函数 | 5, 6 |\n| 检查或更改字符大小写 | 使用 `unicode` 包提供的函数 | 7 |\n| 在字符串中查找内容\
  \ | 使用 `strings` 或 `regexp` 包提供的函数 | 8, 9, 24–27, 29–32 |\n| 拆分字符串 | 使用 `strings`\
  \ 和 `regexp` 包中的 `Fields` 或 `Split*` 函数 | 10–14, 28 |\n| 连接字符串 | 使用 `strings` 包中的\
  \ `Join` 或 `Repeat` 函数 | 22 |\n| 从字符串修剪字符 | 使用 `strings` 包中的 `Trim*` 函数 | 15–18\
  \ |\n| 执行替换 | 使用 `strings` 包中的 `Replace*` 或 `Map` 函数，使用 `Replacer`，或使用 `regexp`\
  \ 包中的 `Replace*` 函数 | 19–21, 33 |\n| 高效构建字符串 | 使用 `strings` 包中的 `Builder` 类型 | 23\
  \ |\n\n\n\n## 本章准备\n\n为准备本章内容，请打开一个新的命令提示符窗口，导航至一个便捷位置，并创建一个名为 `stringsandregexp`\
  \ 的目录。运行清单 16-1 所示的命令来创建一个模块文件。\n\n**提示**\n\n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init stringsandregexp\n\
  清单 16-1\n初始化模块\n```\n\n在 `stringsandregexp` 文件夹中添加一个名为 `main.go` 的文件，内容如清单 16-2\
  \ 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n)\nfunc main() {\nproduct := \"Kayak\"\
  \nfmt.Println(\"Product:\", product)\n}\n清单 16-2\nstringsandregexp 文件夹中 main.go\
  \ 文件的内容\n```\n\n使用命令提示符在 `stringsandregexp` 文件夹中运行清单 16-3 所示的命令。\n\n```\ngo run\
  \ .\n清单 16-3\n运行示例项目\n```\n\n代码将被编译并执行，产生如下输出：\n\n```\nProduct: Kayak\n```\n\n###\
  \ 处理字符串\n\n`strings` 包提供了一组用于处理字符串的函数。在接下来的小节中，我将介绍 `strings` 包中最有用的功能，并演示其用法。\n\
  \n## 比较字符串\n\n`strings` 包提供了比较函数，如表 16-3 所述。这些函数可以作为相等运算符（`==` 和 `!=`）的补充使用。\n\n\
  **表 16-3** `strings` 包的字符串比较函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `Contains(s, substr)`\
  \ | 如果字符串 `s` 包含 `substr`，则返回 `true`；否则返回 `false`。 |\n| `ContainsAny(s, substr)`\
  \ | 如果字符串 `s` 包含字符串 `substr` 中的任意字符，则返回 `true`。 |\n| `ContainsRune(s, rune)` | 如果字符串\
  \ `s` 包含特定的 `rune`，则返回 `true`。 |\n| `EqualFold(s1, s2)` | 该函数执行不区分大小写的比较，如果字符串 `s1`\
  \ 和 `s2` 相同，则返回 `true`。 |\n| `HasPrefix(s, prefix)` | 如果字符串 `s` 以字符串 `prefix` 开头，则返回\
  \ `true`。 |\n| `HasSuffix(s, suffix)` | 如果字符串 `s` 以字符串 `suffix` 结尾，则返回 `true`。 |\n\
  \n清单 16-4 演示了表 16-3 中所述函数的用法。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\
  \n)\nfunc main() {\nproduct := \"Kayak\"\nfmt.Println(\"Contains:\", strings.Contains(product,\
  \ \"yak\"))\nfmt.Println(\"ContainsAny:\", strings.ContainsAny(product, \"abc\"\
  ))\nfmt.Println(\"ContainsRune:\", strings.ContainsRune(product, 'K'))\nfmt.Println(\"\
  EqualFold:\", strings.EqualFold(product, \"KAYAK\"))\nfmt.Println(\"HasPrefix:\"\
  , strings.HasPrefix(product, \"Ka\"))\nfmt.Println(\"HasSuffix:\", strings.HasSuffix(product,\
  \ \"yak\"))\n}\n清单 16-4\n在 stringsandregexp 文件夹的 main.go 文件中比较字符串\n```\n\n表 16-3\
  \ 中的函数执行区分大小写的比较，但 `EqualFold` 函数除外。（折叠是 Unicode 处理字符大小写的方式，其中字符可以有不同的小写、大写和首字母大写表示形式。）清单\
  \ 16-4 中的代码执行后将产生如下输出：\n\n```\nContains: true\nContainsAny: true\nContainsRune:\
  \ true\nHasPrefix: true\nHasSuffix: true\nEqualFold: true\n```\n\n## 使用面向字节的函数\n\
  \n对于 `strings` 包中所有操作字符的函数，`bytes` 包中都有一个对应的函数来操作 `byte` 切片，如下所示：\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"strings\"\n\"bytes\"\n)\nfunc main() {\nprice := \"\
  €100\"\nfmt.Println(\"Strings Prefix:\", strings.HasPrefix(price, \"€\"))\nfmt.Println(\"\
  Bytes Prefix:\", bytes.HasPrefix([]byte(price),\n[]byte { 226, 130 }))\n}\n```\n\
  \n此示例展示了两个包提供的 `HasPrefix` 函数的用法。`strings` 版本对字符进行操作，无论字符占用多少个字节，都会检查前缀。这让我能够判断\
  \ `price` 字符串是否以欧元货币符号开头。`bytes` 版本的函数让我能够判断 `price` 变量是否以特定的字节序列开头，无论这些字节与字符的关系如何。在本章中，我将使用\
  \ `strings` 包中的函数，因为它们是最常用的。在第 25 章中，我将使用 `bytes.Buffer` 结构，这是一种在内存中存储二进制数据的有用方法。\n\
  \n\n\n### 转换字符串大小写\n\n`strings` 包提供了表 16-4 中描述的用于转换字符串大小写的函数。\n\n**表 16-4** `strings`\
  \ 包中的大小写函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `ToLower(str)` | 此函数返回一个新字符串，其中包含将指定字符串中的字符映射为小写形式的结果。\
  \ |\n| `ToUpper(str)` | 此函数返回一个新字符串，其中包含将指定字符串中的字符映射为大写形式的结果。 |\n| `Title(str)`\
  \ | 此函数转换指定字符串，使每个单词的首字符大写，其余字符小写。 |\n| `ToTitle(str)` | 此函数返回一个新字符串，其中包含将指定字符串中的字符映射为首字母大写形式的结果。\
  \ |\n\n必须小心使用 `Title` 和 `ToTitle` 函数，它们的工作方式可能与你预期的不同。`Title` 函数返回一个适合用作标题的字符串，但它对所有单词一视同仁，如代码清单\
  \ 16-5 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\ndescription := \"A boat for sailing\"\nfmt.Println(\"Original:\", description)\n\
  fmt.Println(\"Title:\", strings.Title(description))\n}\n```\n\n按照惯例，标题大小写不会大写冠词、短介词和连词，这意味着转换这个字符串：\n\
  \n```\nA boat for sailing\n```\n\n按惯例应转换如下：\n\n```\nA Boat for Sailing\n```\n\n\
  单词 *for* 并未大写，但其他单词都大写了。然而这些规则很复杂，存在多种解释，且因语言而异，因此 Go 采取了一种更简单的方法，即大写所有单词。编译并运行代码清单\
  \ 16-5 中的代码可以看到效果，其输出如下：\n\n```\nOriginal: A boat for sailing\nTitle: A Boat For\
  \ Sailing\n```\n\n在某些语言中，有些字符在标题中使用时其外观会发生变化。Unicode 为每个字符定义了三种状态——小写、大写和标题大小写——而\
  \ `ToTitle` 函数返回一个仅包含标题大小写字符的字符串。对于英语，其效果与 `ToUpper` 函数相同，但在其他语言中可能会产生不同的结果，如代码清单\
  \ 16-6 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\nspecialChar := \"\\u01c9\"\nfmt.Println(\"Original:\", specialChar, []byte(specialChar))\n\
  upperChar := strings.ToUpper(specialChar)\nfmt.Println(\"Upper:\", upperChar, []byte(upperChar))\n\
  titleChar := strings.ToTitle(specialChar)\nfmt.Println(\"Title:\", titleChar, []byte(titleChar))\n\
  }\n```\n\n我有限的语言技能尚未掌握需要不同标题大小写的语言，因此我使用了一个 Unicode 转义序列来选择字符。（我是从 Unicode 规范中获得该字符代码的。）编译并执行代码清单\
  \ 16-6 中的代码后，会输出该字符的小写、大写和标题大小写版本，以及用于表示它的字节：\n\n```\nOriginal: ǉ [199 137]\nUpper:\
  \ Ǉ [199 135]\nTitle: ǈ [199 136]\n```\n\n你可能能看到字符外观上的差异，但即使看不到，也能看到大写和标题大小写使用了不同的字节值组合。\n\
  \n**本地化：要么不做，要么做好**\n\n产品本地化需要时间、精力和资源——并且需要由了解目标国家或地区语言、文化和货币惯例的人来完成。如果没有正确本地化，其结果可能比根本不本地化更糟糕。\n\
  \n正是由于这个原因，我在本书（以及我的任何一本书中）都不会详细描述本地化特性。在脱离使用情境的情况下描述特性，感觉就像是在为读者埋下自酿苦果的陷阱。至少，如果产品没有本地化，用户知道自己的处境，不必试图弄清楚你只是忘了更改货币代码，还是那些价格实际上就是美元。（这是我在英国生活时经常看到的问题。）\n\
  \n你*应该*本地化你的产品。你的用户*应该*能够以他们理解的方式进行交易或执行其他操作。但你*必须*认真对待，并投入所需的时间和精力来正确地完成它。\n\n\
  ### 处理字符大小写\n\n`unicode` 包提供了可用于判断或转换单个字符大小写的函数，如表 16-5 所述。\n\n**表 16-5** `unicode`\
  \ 包中用于字符大小写的函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `IsLower(rune)` | 如果指定的 rune 是小写，则此函数返回\
  \ `true`。 |\n| `ToLower(rune)` | 此函数返回与指定 rune 关联的小写 rune。 |\n| `IsUpper(rune)`\
  \ | 如果指定的 rune 是大写，则此函数返回 `true`。 |\n| `ToUpper(rune)` | 此函数返回与指定 rune 关联的大写 rune。\
  \ |\n| `IsTitle(rune)` | 如果指定的 rune 是标题大小写，则此函数返回 `true`。 |\n| `ToTitle(rune)` |\
  \ 此函数返回与指定 rune 关联的标题大小写 rune。 |\n\n代码清单 16-7 使用了表 16-5 中描述的函数来检查和转换一个 rune 的大小写。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n//\"strings\"\n\"unicode\"\n)\nfunc main()\
  \ {\nproduct := \"Kayak\"\nfor _, char := range product {\nfmt.Println(string(char),\
  \ \"Upper case:\", unicode.IsUpper(char))\n}\n}\n```\n\n代码清单 16-7 中的代码枚举了 `product`\
  \ 字符串中的字符，以判断它们是否为大写。编译并执行此代码会产生以下输出：\n\n```\nK Upper case: true\na Upper case:\
  \ false\ny Upper case: false\na Upper case: false\nk Upper case: false\n```\n\n\n\
  \n### 检查字符串\n\n表 16-6 中的函数由 `strings` 包提供，用于检查字符串。\n\n**表 16-6**  \n`strings` 包中用于检查字符串的函数\n\
  \n| 函数 | 描述 |\n| --- | --- |\n| `Count(s, sub)` | 该函数返回一个 `int` 值，报告指定子串在字符串 `s`\
  \ 中出现的次数。 |\n| `Index(s, sub)`, `LastIndex(s, sub)` | 这些函数返回指定子串在字符串 `s` 中第一次或最后一次出现的索引，如果未出现则返回\
  \ `-1`。 |\n| `IndexAny(s, chars)`, `LastIndexAny(s, chars)` | 这些函数返回指定字符串中任意字符在字符串\
  \ `s` 中第一次或最后一次出现的索引，如果未出现则返回 `-1`。 |\n| `IndexByte(s, b)`, `LastIndexByte(s, b)`\
  \ | 这些函数返回指定 `byte` 在字符串 `s` 中第一次或最后一次出现的索引，如果未出现则返回 `-1`。 |\n| `IndexFunc(s, func)`,\
  \ `LastIndexFunc(s, func)` | 这些函数返回字符串 `s` 中使指定函数返回 `true` 的字符第一次或最后一次出现的索引，详见“使用自定义函数检查字符串”部分。\
  \ |\n\n清单 16-8 演示了表 16-6 中描述的函数，其中一些通常用于根据内容对字符串进行切片。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"strings\"\n//\"unicode\"\n)\nfunc main() {\ndescription := \"A boat\
  \ for one person\"\nfmt.Println(\"Count:\", strings.Count(description, \"o\"))\n\
  fmt.Println(\"Index:\", strings.Index(description, \"o\"))\nfmt.Println(\"LastIndex:\"\
  , strings.LastIndex(description, \"o\"))\nfmt.Println(\"IndexAny:\", strings.IndexAny(description,\
  \ \"abcd\"))\nfmt.Println(\"LastIndex:\", strings.LastIndex(description, \"o\"))\n\
  fmt.Println(\"LastIndexAny:\", strings.LastIndexAny(description, \"abcd\"))\n}\n\
  ```\n\n*清单 16-8：在 `stringsandregexp` 文件夹的 `main.go` 文件中检查字符串*\n\n这些函数执行的比较是区分大小写的，这意味着清单\
  \ 16-8 中用于测试的字符串包含 `person`，但不包含 `Person`。要进行不区分大小写的比较，请将表 16-6 中描述的函数与表 16-4 和\
  \ 16-5 中的函数结合使用。编译并执行清单 16-8 中的代码，将产生以下输出：\n\n```\nCount: 4\nIndex: 3\nLastIndex:\
  \ 19\nIndexAny: 2\nLastIndex: 19\nLastIndexAny: 4\n```\n\n#### 使用自定义函数检查字符串\n\n\
  `IndexFunc` 和 `LastIndexFunc` 函数使用自定义函数来检查字符串，如清单 16-9 所示。\n\n```\npackage main\n\
  import (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ndescription := \"A boat for one\
  \ person\"\nisLetterB := func (r rune) bool {\nreturn r == 'B' || r == 'b'\n}\n\
  fmt.Println(\"IndexFunc:\", strings.IndexFunc(description, isLetterB))\n}\n```\n\
  \n*清单 16-9：在 `stringsandregexp` 文件夹的 `main.go` 文件中使用自定义函数检查字符串*\n\n自定义函数接收一个 `rune`\
  \ 并返回一个 `bool` 结果，指示该字符是否满足所需条件。`IndexFunc` 函数会为字符串中的每个字符调用自定义函数，直到获得 `true` 结果，此时返回该索引。\n\
  \n`isLetterB` 变量被赋予一个自定义函数，该函数接收一个 `rune`，如果该 rune 是大写或小写的 `B`，则返回 `true`。该自定义函数被传递给\
  \ `strings.IndexFunc` 函数，在编译并执行代码时产生以下输出：\n\n```\nIndexFunc: 2\n```\n\n### 操作字符串\n\
  \n`strings` 包提供了用于编辑字符串的有用函数，包括替换部分或全部字符或删除空格的功能。\n\n#### 分割字符串\n\n第一组函数用于分割字符串，如表\
  \ 16-7 所述。（还有一个使用正则表达式分割字符串的有用功能，在本章后面的“使用正则表达式”部分中介绍。）\n\n**表 16-7**  \n`strings`\
  \ 包中用于分割字符串的函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `Fields(s)` | 该函数根据空白字符分割字符串，并返回一个包含字符串\
  \ `s` 中非空白部分的切片。 |\n| `FieldsFunc(s, func)` | 该函数根据自定义函数返回 `true` 的字符分割字符串 `s`，并返回包含字符串剩余部分的切片。\
  \ |\n| `Split(s, sub)` | 该函数在指定子串的每次出现处分割字符串 `s`，返回一个 `string` 切片。如果分隔符是空字符串，则切片将包含每个字符的字符串。\
  \ |\n| `SplitN(s, sub, max)` | 此函数与 `Split` 类似，但接受一个额外的 `int` 参数，指定要返回的最大子串数量。结果切片中的最后一个子串将包含源字符串未分割的部分。\
  \ |\n| `SplitAfter(s, sub)` | 此函数与 `Split` 类似，但会将用于分割的子串包含在结果中。详见表格后的演示。 |\n| `SplitAfterN(s,\
  \ sub, max)` | 此函数与 `SplitAfter` 类似，但接受一个额外的 `int` 参数，指定要返回的最大子串数量。 |\n\n表 16-7\
  \ 中描述的函数执行相同的基本任务。`Split` 和 `SplitAfter` 函数之间的区别在于，`Split` 函数不会将用于分割的子串包含在结果中，如清单\
  \ 16-10 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\ndescription := \"A boat for one person\"\nsplits := strings.Split(description,\
  \ \" \")\nfor _, x := range splits {\nfmt.Println(\"Split >>\" + x + \">\" + x +\
  \ \"<<\")\n}\n}\n```\n\n*清单 16-10：在 `stringsandregexp` 文件夹的 `main.go` 文件中分割字符串*\n\
  \n为了突出显示区别，清单 16-10 中的代码使用 `Split` 和 `SplitAfter` 函数分割了同一个字符串。两个函数的结果都使用 `for` 循环进行枚举，循环写入的消息将结果括在尖括号中，结果前后没有空格。编译并执行代码，您将看到以下结果：\n\
  \n```\nSplit >>A>boat>for>one>person>A >boat >for >one >person<<\n```\n\n这些字符串是根据空格字符进行分割的。结果所示，空格字符不包含在\
  \ `Split` 函数产生的结果中，但包含在 `SplitAfter` 函数产生的结果中。\n\n#### 限制结果数量\n\n`SplitN` 和 `SplitAfterN`\
  \ 函数接受一个 `int` 参数，用于指定结果中应包含的最大结果数量，如清单 16-11 所示。\n\n```\npackage main\nimport (\n\
  \"fmt\"\n\"strings\"\n)\nfunc main() {\ndescription := \"A boat for one person\"\
  \nsplits := strings.SplitN(description, \" \", 3)\nfor _, x := range splits {\n\
  fmt.Println(\"Split >>\" + x + \">\" + x + \"<<\")\n}\n}\n```\n\n*清单 16-11：在 `stringsandregexp`\
  \ 文件夹的 `main.go` 文件中限制结果数量*\n\n如果字符串可以分割成的子串数量超过指定数量，则结果切片中的最后一个元素将是字符串未分割的剩余部分。清单\
  \ 16-11 指定了最多三个结果，这意味着切片中的前两个元素将正常分割，第三个元素将是字符串的剩余部分。编译并执行代码，您将看到以下输出：\n\n```\n\
  Split >>A>boat>for one person<<\n```\n\n\n\n#### 按空白字符分割\n\n`Split`、`SplitN`、`SplitAfter`\
  \ 和 `SplitAfterN` 函数的一个局限在于它们无法处理重复字符序列，这在按空白字符分割字符串时可能成为问题，如清单 16-12 所示。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ndescription := \"\
  This  is  double  spaced\"\nsplits := strings.SplitN(description, \" \", 3)\nfor\
  \ _, x := range splits {\nfmt.Println(\"Split >>\" + x + \"<<\")\n}\n}\n```\n\n\
  源字符串中的单词是双空格间隔的，但 `SplitN` 函数仅根据第一个空格字符进行分割，产生了奇怪的结果。编译并执行代码，你将看到以下输出：\n\n```\n\
  Split >>This>>is  double  spaced<<\n```\n\n结果切片中的第二个元素是一个空格字符。为了处理重复的空白字符，`Fields`\
  \ 函数可根据任意空白字符来分割字符串，如清单 16-13 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\
  \n)\nfunc main() {\ndescription := \"This  is  double  spaced\"\nsplits := strings.Fields(description)\n\
  for _, x := range splits {\nfmt.Println(\"Field >>\" + x + \"<<\")\n}\n}\n```\n\n\
  `Fields` 函数不支持限制结果数量，但能正确处理双空格。编译并执行该项目，你将看到以下输出：\n\n```\nField >>This>is>double>spaced<<\n\
  ```\n\n#### 使用自定义函数分割字符串\n\n`FieldsFunc` 函数通过将每个字符传递给自定义函数，并在该函数返回 `true` 时进行分割，如清单\
  \ 16-14 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\ndescription := \"This  is  double  spaced\"\nsplitter := func(r rune) bool\
  \ {\nreturn r == ' '\n}\nsplits := strings.FieldsFunc(description, splitter)\nfor\
  \ _, x := range splits {\nfmt.Println(\"Field >>\" + x + \"<<\")\n}\n}\n```\n\n\
  自定义函数接收一个 `rune` 类型参数，如果该字符应导致字符串被分割，则返回 `true`。`FieldsFunc` 函数足够智能，能够处理重复字符，例如清单\
  \ 16-14 中的双空格。\n\n注意\n\n在清单 16-14 中，我指定了空格字符，以强调 `FieldsFunc` 函数能够处理重复字符。`Fields`\
  \ 函数有更优的方法，即根据 `unicode` 包中 `IsSpace` 函数返回 `true` 的任意字符进行分割。\n\n编译并执行该项目，你将看到以下输出：\n\
  \n```\nField >>This>is>double>spaced<<\n```\n\n### 修剪字符串\n\n修剪过程会移除字符串开头和结尾的字符，最常用于去除空白字符。表\
  \ 16-8 描述了 `strings` 包提供的用于修剪的函数。\n\n**表 16-8** strings 包中用于修剪字符串的函数\n\n| 函数 | 描述\
  \ |\n| --- | --- |\n| `TrimSpace(s)` | 该函数返回字符串 `s`，并移除开头或结尾的空白字符。 |\n| `Trim(s,\
  \ set)` | 该函数返回从字符串 `s` 中移除了包含在字符串 `set` 中的任何开头或结尾字符后的结果。 |\n| `TrimLeft(s, set)`\
  \ | 该函数返回字符串 `s`，并移除任何包含在字符串 `set` 中的开头字符。此函数匹配指定的任一字符——若要移除完整的子串，请使用 `TrimPrefix`\
  \ 函数。 |\n| `TrimRight(s, set)` | 该函数返回字符串 `s`，并移除任何包含在字符串 `set` 中的结尾字符。此函数匹配指定的任一字符——若要移除完整的子串，请使用\
  \ `TrimSuffix` 函数。 |\n| `TrimPrefix(s, prefix)` | 该函数返回移除指定前缀字符串后的字符串 `s`。此函数会移除完整的\
  \ `prefix` 字符串——若要移除字符集中的字符，请使用 `TrimLeft` 函数。 |\n| `TrimSuffix(s, suffix)` | 该函数返回移除指定后缀字符串后的字符串\
  \ `s`。此函数会移除完整的 `suffix` 字符串——若要移除字符集中的字符，请使用 `TrimRight` 函数。 |\n| `TrimFunc(s,\
  \ func)` | 该函数返回字符串 `s`，并移除自定义函数返回 `true` 的任何开头或结尾字符。 |\n| `TrimLeftFunc(s, func)`\
  \ | 该函数返回字符串 `s`，并移除自定义函数返回 `true` 的任何开头字符。 |\n| `TrimRightFunc(s, func)` | 该函数返回字符串\
  \ `s`，并移除自定义函数返回 `true` 的任何结尾字符。 |\n\n#### 修剪空白字符\n\n`TrimSpace` 函数执行最常见的修剪任务，即移除任何开头或结尾的空白字符。这在处理用户输入时尤其有用，例如输入用户名时，用户可能无意中引入空格，若不加以清除则会造成混淆，如清单\
  \ 16-15 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\nusername := \" Alice\"\ntrimmed := strings.TrimSpace(username)\nfmt.Println(\"\
  Trimmed:\", \">>\" + trimmed + \"<<\")\n}\n```\n\n用户可能在输入姓名时并未意识到自己按下了空格键，通过在使用前修剪输入的姓名，可以避免用户混淆。编译并执行示例项目，你将看到修剪后的姓名显示如下：\n\
  \n```\nTrimmed: >>Alice<<\n```\n\n#### 修剪字符集\n\n`Trim`、`TrimLeft` 和 `TrimRight`\
  \ 函数会匹配指定字符串中的任意字符。清单 16-16 展示了 `Trim` 函数的用法。其他函数的工作方式与此相同，但仅修剪字符串的开头或结尾。\n\n```\n\
  package main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ndescription := \"\
  A boat for one person\"\ntrimmed := strings.Trim(description, \"Asno \")\nfmt.Println(\"\
  Trimmed:\", trimmed)\n}\n```\n\n在清单 16-16 中，调用 `Trim` 函数时，我指定了字母 `A`、`s`、`n`、`o`\
  \ 和空格字符。该函数使用字符集中的任一字符进行区分大小写的匹配，并从结果中移除所有匹配的字符。一旦找到不在字符集中的字符，匹配即停止。对前缀的匹配从字符串开头进行，对后缀的匹配从字符串结尾进行。如果字符串中不包含字符集中的任何字符，则\
  \ `Trim` 函数将原封不动地返回该字符串。\n\n对于本例，这意味着字符串开头的字母 `A` 和空格将被修剪，字符串结尾的字母 `s`、`o` 和 `n`\
  \ 也将被修剪。编译并执行该项目，输出将显示修剪后的字符串：\n\n```\nTrimmed: boat for one per\n```\n\n\n\n####\
  \ 修剪子字符串\n\n`TrimPrefix`和`TrimSuffix`函数用于修剪子字符串，而不是从字符集中修剪字符，如清单 16-17 所示。\n\n```go\n\
  package main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ndescription := \"\
  A boat for one person\"\nprefixTrimmed := strings.TrimPrefix(description, \"A boat\
  \ \")\nwrongPrefix := strings.TrimPrefix(description, \"A hat \")\nfmt.Println(\"\
  Trimmed:\", prefixTrimmed)\nfmt.Println(\"Not trimmed:\", wrongPrefix)\n}\n```\n\
  \n目标字符串的开头或结尾必须与指定的前缀或后缀完全匹配；否则，修剪函数的返回结果将是原始字符串。在清单 16-17 中，我使用了两次`TrimPrefix`函数，但只有一次使用了与字符串开头匹配的前缀，编译并执行代码时会产生以下结果：\n\
  \n```\nTrimmed: for one person\nNot trimmed: A boat for one person\n```\n\n####\
  \ 使用自定义函数进行修剪\n\n`TrimFunc`、`TrimLeftFunc`和`TrimRightFunc`函数使用自定义函数修剪字符串，如清单 16-18\
  \ 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\n\
  description := \"A boat for one person\"\ntrimmer := func(r rune) bool {\nreturn\
  \ r == 'A' || r == 'n'\n}\ntrimmed := strings.TrimFunc(description, trimmer)\nfmt.Println(\"\
  Trimmed:\", trimmed)\n}\n```\n\n自定义函数会对字符串开头和结尾的字符进行调用，并且会一直修剪字符直到函数返回`false`。编译并执行该示例，您将收到以下输出，其中字符串的第一个和最后一个字符已被修剪：\n\
  \n```\nTrimmed:  boat for one perso\n```\n\n### 修改字符串\n\n表 16-9 中描述的函数由`strings`包提供，用于修改字符串的内容。\n\
  \n**表 16-9** `strings`包中用于修改字符串的函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `Replace(s,\
  \ old, new, n)` | 此函数通过将字符串`old`的出现替换为字符串`new`来修改字符串`s`。可替换的最大次数由`int`参数`n`指定。 |\n\
  | `ReplaceAll(s, old, new)` | 此函数通过将字符串`old`的所有出现替换为字符串`new`来修改字符串`s`。与`Replace`函数不同，它对替换次数没有限制。\
  \ |\n| `Map(func, s)` | 此函数通过对字符串`s`中的每个字符调用自定义函数并连接结果来生成一个新字符串。如果函数产生负值，则当前字符被丢弃而不进行替换。\
  \ |\n\n`Replace`和`ReplaceAll`函数用于定位子字符串并替换它们。`Replace`函数允许指定最大更改次数，而`ReplaceAll`函数将替换其找到的所有子字符串，如清单\
  \ 16-19 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main()\
  \ {\ntext := \"It was a boat. A small boat.\"\nreplace := strings.Replace(text,\
  \ \"boat\", \"canoe\", 1)\nreplaceAll := strings.ReplaceAll(text, \"boat\", \"truck\"\
  )\nfmt.Println(\"Replace:\", replace)\nfmt.Println(\"Replace All:\", replaceAll)\n\
  }\n```\n\n在清单 16-19 中，`Replace`函数被用来替换单词`boat`的一个实例，而`ReplaceAll`函数用来替换每一个实例。编译并执行代码，您将看到以下输出：\n\
  \n```\nReplace: It was a canoe. A small boat.\nReplace All: It was a truck. A small\
  \ truck.\n```\n\n#### 使用映射函数修改字符串\n\n`Map`函数通过对每个字符调用一个函数并将结果组合成新字符串来修改字符串，如清单 16-20\
  \ 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\n\
  text := \"It was a boat. A small boat.\"\nmapper := func(r rune) rune {\nif r ==\
  \ 'b' {\nreturn 'c'\n}\nreturn r\n}\nmapped := strings.Map(mapper, text)\nfmt.Println(\"\
  Mapped:\", mapped)\n}\n```\n\n清单 16-20 中的映射函数将字符`b`替换为字符`c`，并原封不动地传递所有其他字符。编译并执行该项目，您将看到以下结果：\n\
  \n```\nMapped: It was a coat. A small coat.\n```\n\n#### 使用字符串替换器\n\n`strings`包导出了一个名为`Replacer`的结构体类型，用于替换字符串，提供了一种替代表\
  \ 16-10 中所述函数的方法。清单 16-21 演示了`Replacer`的使用。\n\n**表 16-10** `Replacer`方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Replace(s)` | 此方法返回一个字符串，其中构造函数指定的所有替换都已在字符串`s`上执行。\
  \ |\n| `WriteString(writer, s)` | 此方法用于执行构造函数指定的替换，并将结果写入`io.Writer`，该接口在第 20 章中有描述。\
  \ |\n\n```go\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ntext\
  \ := \"It was a boat. A small boat.\"\nreplacer := strings.NewReplacer(\"boat\"\
  , \"kayak\", \"small\", \"huge\")\nreplaced := replacer.Replace(text)\nfmt.Println(\"\
  Replaced:\", replaced)\n}\n```\n\n名为`NewReplacer`的构造函数函数用于创建`Replacer`，它接受成对的参数来指定子字符串及其替换内容。表\
  \ 16-10 描述了为`Replacer`类型定义的方法。\n\n用于创建清单 16-21 中`Replacer`的构造函数指定了应将`boat`的实例替换为`kayak`，并将`small`的实例替换为`huge`。调用`Replace`方法来执行替换，编译并执行代码时会产生以下输出：\n\
  \n```\nReplaced: It was a kayak. A huge kayak.\n```\n\n\n\n### 构建与生成字符串\n\n`strings`\
  \ 包提供了两个用于生成字符串的函数，以及一个结构体类型，该类型的结构体方法可用于高效地逐步构建字符串。表 16-11 描述了这些函数。\n\n**表 16-11**\
  \  \n用于生成字符串的 `strings` 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `Join(slice, sep)` |\
  \ 此函数将指定字符串切片中的元素进行组合，并在元素之间插入指定的分隔符字符串。 |\n| `Repeat(s, count)` | 此函数通过将字符串 `s`\
  \ 重复指定次数来生成一个字符串。 |\n\n在这两个函数中，`Join` 最为有用，因为它可用于重新组合已被拆分的字符串，如清单 16-22 所示。\n\n\
  ```\npackage main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ntext := \"\
  It was a boat. A small boat.\"\nelements := strings.Fields(text)\njoined := strings.Join(elements,\
  \ \"--\")\nfmt.Println(\"Joined:\", joined)\n}\n```\n*清单 16-22*  \n在 `stringsandregexp`\
  \ 文件夹的 `main.go` 文件中拆分和连接字符串\n\n此示例使用 `Fields` 函数按空白字符拆分字符串，并使用两个连字符作为分隔符来连接各元素。编译并执行该项目，你将看到以下输出：\n\
  \n```\nJoined: It--was--a--boat.--A--small--boat.\n```\n\n### 构建字符串\n\n`strings`\
  \ 包提供了 `Builder` 类型，该类型没有导出字段，但提供了一组方法，可用于高效地逐步构建字符串，如表 16-12 所述。\n\n**表 16-12**\
  \  \n`strings.Builder` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `WriteString(s)` | 此方法将字符串\
  \ `s` 追加到正在构建的字符串中。 |\n| `WriteRune(r)` | 此方法将字符 `r` 追加到正在构建的字符串中。 |\n| `WriteByte(b)`\
  \ | 此方法将字节 `b` 追加到正在构建的字符串中。 |\n| `String()` | 此方法返回由构建器创建的字符串。 |\n| `Reset()` |\
  \ 此方法重置由构建器创建的字符串。 |\n| `Len()` | 此方法返回用于存储构建器所创建字符串的字节数。 |\n| `Cap()` | 此方法返回由构建器分配的字节数。\
  \ |\n| `Grow(size)` | 此方法增加由构建器分配用于存储正在构建的字符串的字节数。 |\n\n通用模式是创建一个 `Builder`；使用 `WriteString`、`WriteRune`\
  \ 和 `WriteByte` 函数构建一个字符串；然后通过 `String` 方法获取已构建的字符串，如清单 16-23 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"strings\"\n)\nfunc main() {\ntext := \"It was a boat.\
  \ A small boat.\"\nvar builder strings.Builder\nfor _, sub := range strings.Fields(text)\
  \ {\nif (sub == \"small\") {\nbuilder.WriteString(\"very \")\n}\nbuilder.WriteString(sub)\n\
  builder.WriteRune(' ')\n}\nfmt.Println(\"String:\", builder.String())\n}\n```\n\
  *清单 16-23*  \n在 `stringsandregexp` 文件夹的 `main.go` 文件中构建字符串\n\n使用 `Builder` 创建字符串比在常规\
  \ `string` 值上使用连接运算符更高效，尤其是在使用 `Grow` 方法预先分配存储空间的情况下。\n\n**注意**  \n在向函数和方法传递 `Builder`\
  \ 值或从中返回时，务必使用指针；否则，当 `Builder` 被复制时，效率优势将丧失。\n\n编译并执行该项目，你将看到以下输出：\n\n```\nString:\
  \ It was a boat. A very small boat.\n```\n\n## 使用正则表达式\n\n`regexp` 包提供了对正则表达式的支持，允许在字符串中查找复杂模式。表\
  \ 16-13 描述了基本的正则表达式函数。\n\n**表 16-13**  \n`regexp` 包提供的基本函数\n\n| 函数 | 描述 |\n| ---\
  \ | --- |\n| `Match(pattern, b)` | 此函数返回一个 `bool` 值，指示字节切片 `b` 是否匹配给定的模式。 |\n| `MatchString(pattern,\
  \ s)` | 此函数返回一个 `bool` 值，指示字符串 `s` 是否匹配给定的模式。 |\n| `Compile(pattern)` | 此函数返回一个\
  \ `RegExp`，可用于使用指定模式执行重复模式匹配，如“编译与重用模式”部分所述。 |\n| `MustCompile(pattern)` | 此函数提供与\
  \ `Compile` 相同的功能，但如果指定的模式无法编译，则会引发 panic，如第 15 章所述。 |\n\n**注意**  \n本节中使用的正则表达式执行基本匹配，但\
  \ `regexp` 包支持广泛的模式语法，该语法在 [`https://pkg.go.dev/regexp/syntax@go1.17.1`](https://pkg.go.dev/regexp/syntax%40go1.17.1)\
  \ 中有描述。\n\n`MatchString` 方法是判断字符串是否匹配正则表达式的最简单方式，如清单 16-24 所示。\n\n```\npackage main\n\
  import (\n\"fmt\"\n//\"strings\"\n\"regexp\"\n)\nfunc main() {\ndescription := \"\
  A boat for one person\"\nmatch, err := regexp.MatchString(\"[A-z]oat\", description)\n\
  if (err == nil) {\nfmt.Println(\"Match:\", match)\n} else {\nfmt.Println(\"Error:\"\
  , err)\n}\n}\n```\n*清单 16-24*  \n在 `stringsandregexp` 文件夹的 `main.go` 文件中使用正则表达式\n\
  \n`MatchString` 函数接受一个正则表达式模式以及要搜索的字符串。`MatchString` 函数返回一个 `bool` 值（如果匹配则为 `true`）和一个错误（如果匹配过程没有问题则为\
  \ `nil`）。正则表达式的错误通常出现在模式无法处理时。\n\n清单 16-24 中使用的模式将匹配任何大写或小写字母 A–Z，后跟小写的 `oat`。该模式将匹配\
  \ `description` 字符串中的单词 *boat*，当代码编译并执行时将产生以下输出：\n\n```\nMatch: true\n```\n\n\n\n\
  ### 编译与复用模式\n\n`MatchString` 函数简单便捷，但正则表达式的全部威力需要通过 `Compile` 函数来发挥。该函数会编译一个正则表达式模式，以便可以重复使用，如代码清单\
  \ 16-25 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\nfunc main()\
  \ {\npattern, compileErr := regexp.Compile(\"[A-z]oat\")\ndescription := \"A boat\
  \ for one person\"\nquestion := \"Is that a goat?\"\npreference := \"I like oats\"\
  \nif (compileErr == nil) {\nfmt.Println(\"Description:\", pattern.MatchString(description))\n\
  fmt.Println(\"Question:\", pattern.MatchString(question))\nfmt.Println(\"Preference:\"\
  , pattern.MatchString(preference))\n} else {\nfmt.Println(\"Error:\", compileErr)\n\
  }\n}\n```\n\n这样做效率更高，因为模式只需编译一次。`Compile` 函数的结果是 `RegExp` 类型的一个实例，该类型定义了 `MatchString`\
  \ 函数。编译并执行代码清单 16-25 中的代码，将产生如下输出：\n\n```\nDescription: true\nQuestion: true\nPreference:\
  \ false\n```\n\n编译模式还能让你访问使用正则表达式功能的方法，其中最实用的方法在表 16-14 中描述。本章介绍的方法作用于字符串，但 `RegExp`\
  \ 类型也提供了用于处理字节切片的方法，以及处理读取器的方法。读取器是 Go 语言对 I/O 支持的一部分，将在第 20 章中介绍。\n\n**表 16-14**\
  \ 有用的基本 Regexp 方法\n\n| 函数 | 描述 |\n| --- | --- |\n| `MatchString(s)` | 如果字符串 `s`\
  \ 与编译后的模式匹配，则此方法返回 `true`。 |\n| `FindStringIndex(s)` | 此方法返回一个包含 `int` 值的切片，该切片表示编译后的模式在字符串\
  \ `s` 中最左侧匹配的位置。如果结果为 `nil`，则表示未找到匹配项。 |\n| `FindAllStringIndex(s, max)` | 此方法返回一个包含\
  \ `int` 切片切片的切片，这些切片表示编译后的模式在字符串 `s` 中所有匹配的位置。如果结果为 `nil`，则表示未找到匹配项。 |\n| `FindString(s)`\
  \ | 此方法返回一个字符串，其中包含编译后的模式在字符串 `s` 中最左侧的匹配。如果没有匹配项，则返回空字符串。 |\n| `FindAllString(s,\
  \ max)` | 此方法返回一个字符串切片，其中包含编译后的模式在字符串 `s` 中的所有匹配。整数参数 `max` 指定最大匹配数，`-1` 表示不限制数量。如果没有匹配项，则返回\
  \ `nil`。 |\n| `Split(s, max)` | 此方法使用编译后的模式匹配结果作为分隔符来拆分字符串 `s`，并返回一个包含拆分后子字符串的切片。\
  \ |\n\n`MatchString` 方法是表 16-3 中所述函数的一个替代方案，用于确认一个字符串是否与某个模式匹配。\n\n`FindStringIndex`\
  \ 和 `FindAllStringIndex` 方法提供匹配项的索引位置，然后可以结合数组/切片范围表示法来提取字符串的子区域，如代码清单 16-26 所示。（范围表示法已在第\
  \ 7 章中介绍。）\n\n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\nfunc getSubstring(s\
  \ string, indices []int) string {\nreturn string(s[indices[0]:indices[1]])\n}\n\
  func main() {\npattern := regexp.MustCompile(\"K[a-z]{4}|[A-z]oat\")\ndescription\
  \ := \"Kayak. A boat for one person.\"\nfirstIndex := pattern.FindStringIndex(description)\n\
  allIndices := pattern.FindAllStringIndex(description, -1)\nfmt.Println(\"First index\"\
  , firstIndex[0], \"-\", firstIndex[1],\n\"=\", getSubstring(description, firstIndex))\n\
  for i, idx := range allIndices {\nfmt.Println(\"Index\", i, \"=\", idx[0], \"-\"\
  ,\nidx[1], \"=\", getSubstring(description, idx))\n}\n}\n```\n\n代码清单 16-26 中的正则表达式将对\
  \ `description` 字符串进行两次匹配。`FindStringIndex` 方法只返回从左到右的第一个匹配。匹配结果以一个 `int` 切片表示，其中第一个值表示匹配在字符串中的起始位置，第二个数字表示匹配的字符数。\n\
  \n`FindAllStringIndex` 方法返回多个匹配，在代码清单 16-26 中是使用参数 `-1` 调用的，表示应返回所有匹配。匹配结果在一个 `int`\
  \ 切片的切片中返回（即结果切片中的每个值都是一个 `int` 值的切片），每个切片描述一个单独的匹配。在代码清单 16-26 中，这些索引被用于通过一个名为\
  \ `getSubstring` 的函数从字符串中提取子区域，编译并执行后将产生如下结果：\n\n```\nFirst index 0 - 5 = Kayak\n\
  Index 0 = 0 - 5 = Kayak\nIndex 1 = 9 - 13 = boat\n```\n\n如果你不需要知道匹配的位置，那么 `FindString`\
  \ 和 `FindAllString` 方法会更实用，因为它们的结果直接是与正则表达式匹配的子字符串，如代码清单 16-27 所示。\n\n```\npackage\
  \ main\nimport (\n\"fmt\"\n\"regexp\"\n)\n// func getSubstring(s string, indices\
  \ []int) string {\n//     return string(s[indices[0]:indices[1]])\n// }\nfunc main()\
  \ {\npattern := regexp.MustCompile(\"K[a-z]{4}|[A-z]oat\")\ndescription := \"Kayak.\
  \ A boat for one person.\"\nfirstMatch := pattern.FindString(description)\nallMatches\
  \ := pattern.FindAllString(description, -1)\nfmt.Println(\"First match:\", firstMatch)\n\
  for i, m := range allMatches {\nfmt.Println(\"Match\", i, \"=\", m)\n}\n}\n```\n\
  \n编译并执行该项目，你将看到以下输出：\n\n```\nFirst match: Kayak\nMatch 0 = Kayak\nMatch 1 = boat\n\
  ```\n\n### 使用正则表达式拆分字符串\n\n`Split` 方法使用正则表达式的匹配结果来拆分字符串，这为本章前面介绍的拆分函数提供了一种更灵活的替代方案，如代码清单\
  \ 16-28 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\nfunc main()\
  \ {\npattern := regexp.MustCompile(\" |boat|one\")\ndescription := \"Kayak. A boat\
  \ for one person.\"\nsplit := pattern.Split(description, -1)\nfor _, s := range\
  \ split {\nif s != \"\" {\nfmt.Println(\"Substring:\", s)\n}\n}\n}\n```\n\n本例中的正则表达式匹配空格字符或字符串\
  \ `boat` 和 `one`。每当表达式匹配时，`description` 字符串就会被拆分。`Split` 方法有一个奇特之处，即它会在匹配点周围的结果中引入空字符串，这就是我在示例中从结果切片里过滤掉这些值的原因。编译并执行代码，你将看到以下结果：\n\
  \n```\nSubstring: Kayak.\nSubstring: A\nSubstring: for\nSubstring: person.\n```\n\
  \n\n\n### 使用子表达式\n\n子表达式允许访问正则表达式的部分内容，这可以更容易地从匹配区域中提取子字符串。`清单 16-29` 提供了一个子表达式何时有用的示例。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\nfunc main() {\npattern :=\
  \ regexp.MustCompile(\"A [A-z]* for [A-z]* person\")\ndescription := \"Kayak. A\
  \ boat for one person.\"\nstr := pattern.FindString(description)\nfmt.Println(\"\
  Match:\", str)\n}\n```\n\n此示例中的模式匹配一个特定的句子结构，这使我能够匹配字符串中感兴趣的部分。但是，句子结构的大部分是静态的，而模式中的两个可变部分包含了我想要的内容。在这种情况下，`FindString`\
  \ 方法是一种生硬的工具，因为它匹配整个模式，包括静态部分。编译并执行代码，您将看到以下输出：\n\n```\nMatch: A boat for one person\n\
  ```\n\n我可以添加子表达式来识别模式中重要的内容区域，如 `清单 16-30` 所示。\n\n```\npackage main\nimport (\n\"\
  fmt\"\n\"regexp\"\n)\nfunc main() {\npattern := regexp.MustCompile(\"A ([A-z]*)\
  \ for ([A-z]*) person\")\ndescription := \"Kayak. A boat for one person.\"\nsubs\
  \ := pattern.FindStringSubmatch(description)\nfor _, s := range subs {\nfmt.Println(\"\
  Match:\", s)\n}\n}\n```\n\n子表达式用括号表示。在 `清单 16-30` 中，我定义了两个子表达式，每个子表达式都包围模式中的一个可变部分。`FindStringSubmatch`\
  \ 方法执行与 `FindString` 相同的任务，但其结果中还包含由这些表达式匹配的子字符串。编译并执行代码，您将看到以下输出：\n\n```\nMatch:\
  \ A boat for one person\nMatch: boat\nMatch: one\n```\n\n`表 16-15` 描述了用于处理子表达式的\
  \ `RegExp` 方法。\n\n**表 16-15 子表达式相关的 Regexp 方法**\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `FindStringSubmatch(s)` | 此方法返回一个切片，其中包含模式匹配到的第一个结果以及模式定义的子表达式对应的文本。 |\n| `FindAllStringSubmatch(s,\
  \ max)` | 此方法返回一个切片，其中包含所有匹配结果及子表达式对应的文本。`int` 参数用于指定最大匹配次数。值为 `-1` 表示匹配所有。 |\n\
  | `FindStringSubmatchIndex(s)` | 此方法等同于 `FindStringSubmatch`，但返回的是索引而非子字符串。 |\n\
  | `FindAllStringSubmatchIndex(s, max)` | 此方法等同于 `FindAllStringSubmatch`，但返回的是索引而非子字符串。\
  \ |\n| `NumSubexp()` | 此方法返回子表达式的数量。 |\n| `SubexpIndex(name)` | 此方法返回具有指定名称的子表达式的索引，如果没有该子表达式则返回\
  \ `-1`。 |\n| `SubexpNames()` | 此方法返回子表达式的名称，按定义的顺序排列。 |\n\n#### 使用命名子表达式\n\n子表达式可以被赋予名称，这会使正则表达式更难理解，但使结果更易于处理。`清单\
  \ 16-31` 展示了命名子表达式的用法。\n\n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\n\
  func main() {\npattern := regexp.MustCompile(\n\"A (?P<type>[A-z]*) for (?P<capacity>[A-z]*)\
  \ person\")\ndescription := \"Kayak. A boat for one person.\"\nsubs := pattern.FindStringSubmatch(description)\n\
  for _, name := range []string { \"type\", \"capacity\" } {\nfmt.Println(name, \"\
  =\", subs[pattern.SubexpIndex(name)])\n}\n}\n```\n\n为子表达式分配名称的语法有些别扭：在括号内，使用一个问号，后跟一个大写字母\
  \ *P*，再后跟尖括号内的名称。`清单 16-31` 中的模式定义了两个命名子表达式：\n\n```\n...\npattern := regexp.MustCompile(\"\
  A (?P<type>[A-z]*) for (?P<capacity>[A-z]*) person\")\n...\n```\n\n这两个子表达式分别被命名为\
  \ `type` 和 `capacity`。`SubexpIndex` 方法返回命名子表达式在结果中的位置，这使我能够获取由 `type` 和 `capacity`\
  \ 子表达式匹配的子字符串。编译并执行该示例，您将看到以下输出：\n\n```\ntype = boat\ncapacity = one\n```\n\n###\
  \ 使用正则表达式替换子字符串\n\n最后一组 `RegExp` 方法用于替换正则表达式匹配到的子字符串，如 `表 16-16` 所述。\n\n**表 16-16\
  \ 替换子字符串相关的 Regexp 方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `ReplaceAllString(s, template)`\
  \ | 此方法使用指定的模板替换字符串 `s` 中匹配的部分，该模板在包含到结果中之前会进行扩展以纳入子表达式。 |\n| `ReplaceAllLiteralString(s,\
  \ sub)` | 此方法使用指定的内容替换字符串 `s` 中匹配的部分，该内容会直接包含到结果中，而不会为子表达式进行扩展。 |\n| `ReplaceAllStringFunc(s,\
  \ func)` | 此方法使用指定函数产生的结果替换字符串 `s` 中匹配的部分。 |\n\n`ReplaceAllString` 方法用于将正则表达式匹配到的字符串部分替换为一个模板，该模板可以引用子表达式，如\
  \ `清单 16-32` 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"regexp\"\n)\nfunc main()\
  \ {\npattern := regexp.MustCompile(\n\"A (?P<type>[A-z]*) for (?P<capacity>[A-z]*)\
  \ person\")\ndescription := \"Kayak. A boat for one person.\"\ntemplate := \"(type:\
  \ ${type}, capacity: ${capacity})\"\nreplaced := pattern.ReplaceAllString(description,\
  \ template)\nfmt.Println(replaced)\n}\n```\n\n`ReplaceAllString` 方法返回一个包含替换后内容的字符串。模板可以通过名称（如\
  \ `${type}`）或位置（如 `${1}`）来引用子表达式的匹配结果。在清单中，`description` 字符串中被模式匹配到的部分将被替换为一个模板，该模板包含\
  \ `type` 和 `capacity` 子表达式的匹配结果。编译并执行代码，您将看到以下输出：\n\n```\nKayak. (type: boat, capacity:\
  \ one).\n```\n\n请注意，在 `清单 16-32` 中，模板只负责 `ReplaceAllString` 方法结果的一部分。`description`\
  \ 字符串的前面部分——单词 `Kayak`，后跟一个句点和空格——没有被正则表达式匹配到，因此未做修改就直接包含在结果中。\n\n**提示：** 如果你想要替换内容，并且不希望新的子字符串被解释为子表达式，请使用\
  \ `ReplaceAllLiteralString` 方法。\n\n\n\n#### 用函数替换匹配的内容\n\n`ReplaceAllStringFunc`\
  \ 方法会用函数生成的内容替换字符串中匹配的部分，如代码清单 16-33 所示。\n\n```go\npackage main\nimport (\n\"fmt\"\
  \n\"regexp\"\n)\nfunc main() {\npattern := regexp.MustCompile(\n\"A (?P[A-z]*) for\
  \ (?P[A-z]*) person\")\ndescription := \"Kayak. A boat for one person.\"\nreplaced\
  \ := pattern.ReplaceAllStringFunc(description, func(s string) string {\nreturn \"\
  This is the replacement content\"\n})\nfmt.Println(replaced)\n}\n```\n\n代码清单 16-33\
  \ - 在 `stringsandregexp` 文件夹的 `main.go` 文件中使用函数替换内容\n\n函数返回的结果不会针对子表达式引用进行处理，你可以在代码编译并执行时产生的输出中看到这一点：\n\
  \n```\nKayak. This is the replacement content.\n```\n\n## 本章总结\n\n在本章中，我介绍了用于处理\
  \ `string` 值和应用正则表达式的标准库功能，这些功能由 `strings`、`unicode` 和 `regexp` 包提供。在下一章中，我将介绍相关的功能，这些功能允许对字符串进行格式化和扫描。\n\
  \n"
- "# 17. 格式化与扫描字符串\n\n在本章中，我介绍用于格式化和扫描字符串的标准库功能。格式化是从一个或多个数据值组合成新字符串的过程，而扫描是从字符串中解析出值的过程。表\
  \ 17-1 将格式化与扫描字符串放在上下文中进行说明。\n\n表 17-1 - 格式化与扫描字符串的背景说明\n\n| 问题 | 答案 |\n| --- |\
  \ --- |\n| 它们是什么？ | 格式化是将值组合成字符串的过程。扫描是从字符串中解析出其所含值的过程。 |\n| 它们有什么用？ | 格式化字符串是一种常见需求，用于生成从日志记录和调试到向用户展示信息等各种目的的字符串。扫描对于从字符串（如\
  \ HTTP 请求或用户输入）中提取数据非常有用。 |\n| 如何使用它们？ | 这两个功能集都通过 `fmt` 包中定义的函数提供。 |\n| 是否存在任何陷阱或限制？\
  \ | 用于格式化字符串的模板可能难以阅读，并且没有内置函数可以自动在生成的格式化字符串末尾追加换行符。 |\n| 是否有其他替代方案？ | 可以使用第 23\
  \ 章中描述的模板功能来生成大量的文本和 HTML 内容。 |\n\n表 17-2 总结了本章内容。\n\n表 17-2 - 本章总结\n\n| 问题 | 解决方案\
  \ | 代码清单 |\n| --- | --- | --- |\n| 将数据值组合成字符串 | 使用 `fmt` 包提供的基本格式化函数 | 5, 6 |\n\
  | 指定字符串的结构 | 使用使用格式化模板的 `fmt` 函数，并使用格式化动词 | 7–9, 11–18 |\n| 更改自定义数据类型的表示方式 | 实现\
  \ `Stringer` 接口 | 10 |\n| 解析字符串以获取其中包含的数据值 | 使用 `fmt` 包提供的扫描函数 | 19–22 |\n\n## 本章准备工作\n\
  \n为准备本章内容，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为 `usingstrings` 的目录。运行代码清单 17-1 中所示的命令以创建一个模块文件。\n\
  \n提示\n\n你可以从 `https://github.com/apress/pro-go` 下载本章以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第\
  \ 2 章以获取帮助。\n\n```go\ngo mod init usingstrings\n```\n\n代码清单 17-1 - 初始化模块\n\n在 `usingstrings`\
  \ 文件夹中添加一个名为 `product.go` 的文件，内容如代码清单 17-2 所示。\n\n```go\npackage main\ntype Product\
  \ struct {\nName, Category string\nPrice float64\n}\nvar Kayak = Product {\nName:\
  \ \"Kayak\",\nCategory: \"Watersports\",\nPrice: 275,\n}\nvar Products = []Product\
  \ {\n{ \"Kayak\", \"Watersports\", 279 },\n{ \"Lifejacket\", \"Watersports\", 49.95\
  \ },\n{ \"Soccer Ball\", \"Soccer\", 19.50 },\n{ \"Corner Flags\", \"Soccer\", 34.95\
  \ },\n{ \"Stadium\", \"Soccer\", 79500 },\n{ \"Thinking Cap\", \"Chess\", 16 },\n\
  { \"Unsteady Chair\", \"Chess\", 75 },\n{ \"Bling-Bling King\", \"Chess\", 1200\
  \ },\n}\n```\n\n代码清单 17-2 - `usingstrings` 文件夹中 `product.go` 文件的内容\n\n在 `usingstrings`\
  \ 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 17-3 所示。\n\n```go\npackage main\nimport \"fmt\"\
  \nfunc main() {\nfmt.Println(\"Product:\", Kayak.Name, \"Price:\", Kayak.Price)\n\
  }\n```\n\n代码清单 17-3 - `usingstrings` 文件夹中 `main.go` 文件的内容\n\n使用命令提示符在 `usingstrings`\
  \ 文件夹中运行代码清单 17-4 中所示的命令。\n\n```go\ngo run .\n```\n\n代码清单 17-4 - 运行示例项目\n\n代码将被编译并执行，产生以下输出：\n\
  \n```\nProduct: Kayak Price: 275\n```\n\n## 编写字符串\n\n`fmt` 包提供了组合和编写字符串的函数。基本函数在表\
  \ 17-3 中进行了描述。其中一些函数使用写入器，这是 Go 对输入/输出支持的一部分，将在第 20 章中描述。\n\n表 17-3 - 用于组合和编写字符串的基本\
  \ `fmt` 函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Print(...vals)` | 此函数接受可变数量的参数，并将其值写入标准输出。在非字符串值之间会添加空格。\
  \ |\n| `Println(...vals)` | 此函数接受可变数量的参数，并将其值写入标准输出，值之间用空格分隔，末尾追加换行符。 |\n| `Fprint(writer,\
  \ ...vals)` | 此函数将可变数量的参数写入指定的写入器（我将在第 20 章中描述）。在非字符串值之间会添加空格。 |\n| `Fprintln(writer,\
  \ ...vals)` | 此函数将可变数量的参数写入指定的写入器（我将在第 20 章中描述），末尾追加换行符。所有值之间都会添加空格。 |\n\n注意\n\n\
  Go 标准库包含一个模板包（在第 23 章中描述），可用于生成大量的文本和 HTML 内容。\n\n表 17-3 中描述的函数会在其生成的字符串中的值之间添加空格，但添加方式不一致。`Println`\
  \ 和 `Fprintln` 函数在所有值之间都添加空格，但 `Print` 和 `Fprint` 函数仅在不属于字符串的值之间添加空格。这意味着表 17-3\
  \ 中的函数对之间的差异不仅仅是多了一个换行符，如代码清单 17-5 所示。\n\n```go\npackage main\nimport \"fmt\"\n\
  func main() {\nfmt.Println(\"Product:\", Kayak.Name, \"Price:\", Kayak.Price)\n\
  fmt.Print(\"Product:\", Kayak.Name, \"Price:\", Kayak.Price, \"\\n\")\n}\n```\n\n\
  代码清单 17-5 - 在 `usingstrings` 文件夹的 `main.go` 文件中编写字符串\n\n在许多编程语言中，代码清单 17-5 中的语句产生的字符串不会有任何区别，因为我向\
  \ `Print` 函数传递的参数中添加了一个换行符。但是，由于 `Print` 函数仅在成对的非字符串值之间添加空格，因此结果是不同的。编译并执行代码，你将看到以下输出：\n\
  \n```\nProduct: Kayak Price: 275\nProduct:KayakPrice:275\n```\n\n\n\n### 格式化字符串\n\
  \n在前面的章节中，我一直使用 `fmt.Println` 函数来输出内容。之所以用这个函数，是因为它很简单，但它无法控制输出的格式，这意味着它适用于简单的调试，但不适合生成复杂的字符串或格式化要展示给用户的值。`fmt`\
  \ 包中其他提供格式化控制功能的函数如清单 17-6 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc main()\
  \ {\nfmt.Printf(\"Product: %v, Price: $%4.2f\", Kayak.Name, Kayak.Price)\n}\n```\n\
  \n`Printf` 函数接受一个模板字符串和一系列值。模板中会扫描*动词*，动词由百分号（`%` 字符）后跟格式说明符表示。清单 17-6 的模板中有两个动词：\n\
  \n```\n...\nfmt.Printf(\"Product: %v, Price: $%4.2f\", Kayak.Name, Kayak.Price)\n\
  ...\n```\n\n第一个动词是 `%v`，它指定类型的默认表示形式。例如，对于 `string` 类型的值，`%v` 只是将字符串包含在输出中。`%4.2f`\
  \ 动词指定浮点值的格式，小数点前有 4 位数字，小数点后有 2 位数字。模板动词的值取自其余参数，并按照指定的顺序使用。就本例而言，这意味着 `%v` 动词用于格式化\
  \ `Product.Name` 值，`%4.2f` 动词用于格式化 `Product.Price` 值。这些值被格式化后，插入到模板字符串中，并输出到控制台，你可以通过编译和执行代码看到结果：\n\
  \n```\nProduct: Kayak, Price: $275.00\n```\n\n表 17-4 描述了 `fmt` 包提供的用于格式化字符串的函数。我将在“理解格式化动词”一节中介绍格式化动词。\n\
  \n**表 17-4.** `fmt` 函数：用于格式化字符串\n\n| 名称 | 描述 |\n| --- | --- |\n| `Sprintf(t, ...vals)`\
  \ | 此函数返回一个字符串，该字符串通过处理模板 `t` 创建。其余参数用作模板动词的值。 |\n| `Printf(t, ...vals)` | 此函数通过处理模板\
  \ `t` 创建一个字符串。其余参数用作模板动词的值。该字符串被写入标准输出。 |\n| `Fprintf(writer, t, ...vals)` | 此函数通过处理模板\
  \ `t` 创建一个字符串。其余参数用作模板动词的值。该字符串被写入一个 `Writer`，这将在第 20 章中介绍。 |\n| `Errorf(t, ...values)`\
  \ | 此函数通过处理模板 `t` 创建一个 `error`。其余参数用作模板动词的值。结果是一个 `error` 值，其 `Error` 方法返回格式化后的字符串。\
  \ |\n\n在清单 17-7 中，我定义了一个函数，它使用 `Sprintf` 格式化字符串结果，并使用 `Errorf` 创建一个错误。\n\n```\n\
  package main\nimport \"fmt\"\nfunc getProductName(index int) (name string, err error)\
  \ {\nif (len(Products) > index) {\nname = fmt.Sprintf(\"Name of product: %v\", Products[index].Name)\n\
  } else {\nerr = fmt.Errorf(\"Error for index %v\", index)\n}\nreturn\n}\nfunc main()\
  \ {\nname, _ := getProductName(1)\nfmt.Println(name)\n_, err := getProductName(10)\n\
  fmt.Println(err.Error())\n}\n```\n\n本例中的两个格式化字符串都使用了 `%v` 值，它将以默认形式输出值。编译并执行该项目，你将看到如下结果和一个错误：\n\
  \n```\nName of product: Lifejacket\nError for index 10\n```\n\n## 理解格式化动词\n\n表 17-4\
  \ 中描述的函数在其模板中支持多种格式化动词。在接下来的章节中，我将介绍最常用的动词。我先介绍那些可用于任何数据类型的动词，然后再介绍更具体的动词。\n\n###\
  \ 使用通用格式化动词\n\n通用动词可用于显示任何值，如表 17-5 所述。\n\n**表 17-5.** 适用于任何值的格式化动词\n\n| 动词 | 描述\
  \ |\n| --- | --- |\n| `%v` | 此动词显示值的默认格式。在动词后加上加号（`%+v`）会在输出结构体值时包含字段名。 |\n| `%#v`\
  \ | 此动词以一种可用于在 Go 代码文件中重新创建该值的格式来显示值。 |\n| `%T` | 此动词显示值的 Go 类型。 |\n\n在清单 17-8 中，我定义了一个自定义结构体类型，并使用表中所示的动词来格式化该类型的一个值。\n\
  \n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{})\
  \ {\nfmt.Printf(template + \"\\n\", values...)\n}\nfunc main() {\nPrintfln(\"Value:\
  \ %v\", Kayak)\nPrintfln(\"Go syntax: %#v\", Kayak)\nPrintfln(\"Type: %T\", Kayak)\n\
  }\n```\n\n`Printf` 函数不会像 `Println` 函数那样在其输出后追加换行符，因此我定义了一个 `Printfln` 函数，该函数在调用\
  \ `Printf` 函数之前会在模板后追加换行符。`main` 函数中的语句定义了包含表 17-5 中动词的简单字符串模板。编译并执行代码，你将看到以下输出：\n\
  \n```\nValue: {Kayak Watersports 275}\nGo syntax: main.Product{Name:\"Kayak\", Category:\"\
  Watersports\", Price:275}\nType: main.Product\n```\n\n\n\n### 控制结构体格式化\n\nGo 为所有数据类型都提供了一种默认格式，由\
  \ `%v` 动词使用。对于结构体，默认值会在花括号内列出字段值。可以通过加号修改默认动词，以便在输出中包含字段名称，如代码清单 17-9 所示。\n\n```\n\
  package main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{})\
  \ {\nfmt.Printf(template + \"\\n\", values...)\n}\nfunc main() {\nPrintfln(\"Value:\
  \ %v\", Kayak)\nPrintfln(\"Value with fields: %+v\", Kayak)\n}\n```\n\n编译并执行该项目，你将看到同一个\
  \ `Product` 值分别以包含和不包含字段名称的格式输出：\n\n```\nValue: {Kayak Watersports 275}\nValue with\
  \ fields: {Name:Kayak Category:Watersports Price:275}\n```\n\n`fmt` 包通过一个名为 `Stringer`\
  \ 的接口支持自定义结构体格式化，该接口定义如下：\n\n```\ntype Stringer interface {\nString() string\n}\n\
  ```\n\n`Stringer` 接口指定的 `String` 方法将用于获取任何定义了该方法的类型的字符串表示形式，从而可以指定自定义格式，如代码清单 17-10\
  \ 所示。\n\n```\npackage main\nimport \"fmt\"\ntype Product struct {\nName, Category\
  \ string\nPrice float64\n}\n// ...为简洁起见，变量已省略...\nfunc (p Product) String() string\
  \ {\nreturn fmt.Sprintf(\"Product: %v, Price: $%4.2f\", p.Name, p.Price)\n}\n```\n\
  \n当需要 `Product` 值的字符串表示形式时，`String` 方法将被自动调用。编译并执行代码，输出将使用自定义格式：\n\n```\nValue:\
  \ Product: Kayak, Price: $275.00\nValue with fields: Product: Kayak, Price: $275.00\n\
  ```\n\n请注意，当修改 `%v` 动词以显示结构体字段时，也会使用自定义格式。\n\n**提示**：如果你定义了一个返回字符串的 `GoString` 方法，那么你的类型将符合\
  \ `GoStringer` 接口，该接口允许为 `%#v` 动词提供自定义格式。\n\n### 格式化数组、切片和映射\n\n当数组和切片被表示为字符串时，输出是一组方括号，其中包含各个元素，如下所示：\n\
  \n```\n...\n[Kayak Lifejacket Paddle]\n...\n```\n\n请注意，元素之间没有逗号分隔。当映射被表示为字符串时，键值对显示在方括号内，并以\
  \ `map` 关键字开头，如下所示：\n\n```\n...\nmap[1:Kayak 2:Lifejacket 3:Paddle]\n...\n```\n\n\
  `Stringer` 接口可用于更改数组、切片或映射中包含的自定义数据类型的格式。但是，除非你使用类型别名，否则无法更改默认格式，因为方法必须与它们所应用的类型定义在同一个包中。\n\
  \n### 使用整数格式化动词\n\n表 17-6 描述了整数值的格式化动词，无论其大小如何。\n\n**表 17-6**：整数值的格式化动词\n\n| 动词\
  \ | 描述 |\n| --- | --- |\n| `%b` | 此动词将整数值显示为二进制字符串。 |\n| `%d` | 此动词将整数值显示为十进制字符串。这是整数值的默认格式，在使用\
  \ `%v` 动词时应用。 |\n| `%o`, `%O` | 这些动词将整数值显示为八进制字符串。`%O` 动词会添加 `0o` 前缀。 |\n| `%x`,\
  \ `%X` | 这些动词将整数值显示为十六进制字符串。字母 A–F 由 `%x` 动词以小写形式显示，由 `%X` 动词以大写形式显示。 |\n\n代码清单\
  \ 17-11 将表 17-6 中描述的动词应用于一个整数值。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template\
  \ string, values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n\
  }\nfunc main() {\nnumber := 250\nPrintfln(\"Binary: %b\", number)\nPrintfln(\"Decimal:\
  \ %d\", number)\nPrintfln(\"Octal: %o, %O\", number, number)\nPrintfln(\"Hexadecimal:\
  \ %x, %X\", number, number)\n}\n```\n\n编译并执行该项目，你将收到以下输出：\n\n```\nBinary: 11111010\n\
  Decimal: 250\nOctal: 372, 0o372\nHexadecimal: fa, FA\n```\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 使用浮点数格式化动词\n\n表 17-7 描述了用于浮点数值的格式化动词，这些动词可以应用于 `float32` 和 `float64` 两种类型的值。\n\
  \n**表 17-7**  \n浮点数值的格式化动词\n\n| 动词 | 描述 |\n| --- | --- |\n| `%b` | 此动词显示带有指数但无小数位的浮点数值。\
  \ |\n| `%e, %E` | 这些动词显示带有指数和小数位的浮点数值。`%e` 使用小写指数指示符，而 `%E` 使用大写指示符。 |\n| `%f, %F`\
  \ | 这些动词显示带有小数位但没有指数的浮点数值。`%f` 和 `%F` 动词产生相同的输出。 |\n| `%g` | 此动词会根据其显示的值进行调整。对于指数较大的值，使用\
  \ `%e` 格式；否则使用 `%f` 格式。这是默认格式，在使用 `%v` 动词时会应用此格式。 |\n| `%G` | 此动词会根据其显示的值进行调整。对于指数较大的值，使用\
  \ `%E` 格式；否则使用 `%f` 格式。 |\n| `%x, %X` | 这些动词以十六进制表示法显示浮点数值，使用小写字母 (`%x`) 或大写字母 (`%X`)。\
  \ |\n\n清单 17-12 将表 17-7 中描述的动词应用到一个浮点数值上。\n\n```\npackage main\nimport \"fmt\"\n\
  func Printfln(template string, values ...interface{}) {\nfmt.Printf(template + \"\
  \\n\", values...)\n}\nfunc main() {\nnumber := 279.00\nPrintfln(\"Decimalless with\
  \ exponent: %b\", number)\nPrintfln(\"Decimal with exponent: %e\", number)\nPrintfln(\"\
  Decimal without exponent: %f\", number)\nPrintfln(\"Hexadecimal: %x, %X\", number,\
  \ number)\n}\n```\n\n编译并执行该项目，您将看到以下输出：\n\n```\nDecimalless with exponent: 4908219906392064p-44\n\
  Decimal with exponent: 2.790000e+02\nDecimal without exponent: 279.000000\nHexadecimal:\
  \ 0x1.17p+08, 0X1.17P+08\n```\n\n浮点数值的格式可以通过修改动词来指定宽度（用于表示值的字符数）和精度（小数点后的位数）来控制，如清单\
  \ 17-13 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string,\
  \ values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n}\nfunc main()\
  \ {\nnumber := 279.00\nPrintfln(\"Decimal without exponent: >>%8.2f<<\", number)\n\
  }\n```\n\n宽度在百分号后指定，后跟句点，再跟精度，最后是动词的其余部分。在清单 17-13 中，宽度是 8 个字符，精度是两位，当代码被编译并执行时，会产生以下输出：\n\
  \n```\nDecimal without exponent: >>  279.00<<\n```\n\n我在清单 17-13 中为格式化后的值添加了尖括号，以演示当指定的宽度大于显示值所需的字符数时，会使用空格进行填充。\n\
  \n如果您只关心精度，可以省略宽度，如清单 17-14 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template\
  \ string, values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n\
  }\nfunc main() {\nnumber := 279.00\nPrintfln(\"Decimal without exponent: >>%.2f<<\"\
  , number)\n}\n```\n\n宽度值被省略，但句点仍然是必需的。清单 17-7 中指定的格式在编译并执行时会产生以下输出：\n\n```\nDecimal\
  \ without exponent: >>279.00<<\n```\n\n表 17-7 中动词的输出可以使用表 17-8 中描述的修饰符进行更改。\n\n\
  **表 17-8**  \n格式化动词修饰符\n\n| 修饰符 | 描述 |\n| --- | --- |\n| `+` | 此修饰符（加号）始终为数值打印符号，无论是正号还是负号。\
  \ |\n| `0` | 当宽度大于显示值所需的字符数时，此修饰符使用零（而不是空格）进行填充。 |\n| `-` | 此修饰符（减号）将填充添加到数字的右侧，而不是左侧。\
  \ |\n\n清单 17-15 应用了这些修饰符来更改整数值的格式。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template\
  \ string, values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n\
  }\nfunc main() {\nnumber := 279.00\nPrintfln(\"Sign: >>%+.2f>%010.2f>%-8.2f<<\"\
  , number)\n}\n```\n\n编译并执行该项目，您将看到这些修饰符对格式化输出的影响：\n\n```\nSign: >>+279.00>0000279.00>279.00\
  \  <<\n```\n\n### 使用字符串和字符格式化动词\n\n表 17-9 描述了用于字符串和符文（rune）的格式化动词。\n\n**表 17-9**\
  \  \n字符串和符文的格式化动词\n\n| 动词 | 描述 |\n| --- | --- |\n| `%s` | 此动词显示一个字符串。这是默认格式，在使用\
  \ `%v` 动词时会应用此格式。 |\n| `%c` | 此动词显示一个字符。必须小心避免将字符串分割成单个字节，如下表后的文本所述。 |\n| `%U` |\
  \ 此动词以 Unicode 格式显示一个字符，因此输出以 `U+` 开头，后跟十六进制字符代码。 |\n\n字符串很容易格式化，但在格式化单个字符时必须小心。正如我在第\
  \ 7 章中解释的，某些字符使用多个字节表示，您必须确保不会尝试仅格式化该字符的部分字节。清单 17-16 演示了表 17-9 中描述的动词的使用。\n\n```\n\
  package main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{})\
  \ {\nfmt.Printf(template + \"\\n\", values...)\n}\nfunc main() {\nname := \"Kayak\"\
  \nPrintfln(\"String: %s\", name)\nPrintfln(\"Character: %c\", []rune(name)[0])\n\
  Printfln(\"Unicode: %U\", []rune(name)[0])\n}\n```\n\n编译并执行该项目，您将看到以下格式化输出：\n\n\
  ```\nString: Kayak\nCharacter: K\nUnicode: U+004B\n```\n\n### 使用布尔格式化动词\n\n表 17-10\
  \ 描述了用于格式化 `bool` 值的动词。这是默认的 `bool` 格式，这意味着 `%v` 动词将使用它。\n\n**表 17-10**  \nbool\
  \ 格式化动词\n\n| 动词 | 描述 |\n| --- | --- |\n| `%t` | 此动词格式化 `bool` 值，并显示 `true` 或 `false`。\
  \ |\n\n清单 17-17 展示了 `bool` 格式化动词的使用。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ Printfln(template string, values ...interface{}) {\nfmt.Printf(template + \"\\\
  n\", values...)\n}\nfunc main() {\nname := \"Kayak\"\nPrintfln(\"Bool: %t\", len(name)\
  \ > 1)\nPrintfln(\"Bool: %t\", len(name) > 100)\n}\n```\n\n编译并执行该项目，您将看到格式化输出：\n\
  \n```\nBool: true\nBool: false\n```\n\n\n\n### 使用指针格式化动词\n\n表 17-11 中描述的动词适用于指针。\n\
  \n**表 17-11：** 指针格式化动词\n\n| 动词 | 描述 |\n| --- | --- |\n| `%p` | 此动词显示指针存储位置的十六进制表示。\
  \ |\n\n清单 17-18 演示了指针动词的使用。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template\
  \ string, values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n\
  }\nfunc main() {\nname := \"Kayak\"\nPrintfln(\"Pointer: %p\", &name)\n}\n清单 17-18\n\
  在 usingstrings 文件夹的 main.go 文件中格式化指针\n```\n\n编译并执行代码，您将看到类似如下的输出，但显示的地址可能不同：\n\n\
  ```\nPointer: 0xc00004a240\n```\n\n## 扫描字符串\n\n`fmt` 包提供了用于扫描字符串的函数，即解析包含空格分隔值的字符串的过程。表\
  \ 17-12 描述了这些函数，其中一些函数与后续章节中介绍的功能一起使用。\n\n**表 17-12：** 用于扫描字符串的 `fmt` 函数\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Scan(...vals)` | 此函数从标准输入读取文本，并将空格分隔的值存储到指定的参数中。换行符被视为空格，该函数会一直读取，直到为其所有参数接收到值为止。其结果是已读取值的数量以及描述任何问题的\
  \ `error`。 |\n| `Scanln(...vals)` | 此函数的工作方式与 `Scan` 相同，但在遇到换行符时会停止读取。 |\n| `Scanf(template,\
  \ ...vals)` | 此函数的工作方式与 `Scan` 相同，但使用模板字符串从其收到的输入中选择值。 |\n| `Fscan(reader, ...vals)`\
  \ | 此函数从指定的读取器（详见第 20 章）读取空格分隔的值。换行符被视为空格，该函数返回已读取值的数量以及描述任何问题的错误。 |\n| `Fscanln(reader,\
  \ ...vals)` | 此函数的工作方式与 `Fscan` 相同，但在遇到换行符时会停止读取。 |\n| `Fscanf(reader, template,\
  \ ...vals)` | 此函数的工作方式与 `Fscan` 相同，但使用模板从其收到的输入中选择值。 |\n| `Sscan(str, ...vals)`\
  \ | 此函数扫描指定字符串中由空格分隔的值，这些值被分配给其余参数。其结果是扫描值的数量以及描述任何问题的错误。 |\n| `Sscanf(str, template,\
  \ ...vals)` | 此函数的工作方式与 `Sscan` 相同，但使用模板从字符串中选择值。 |\n| `Sscanln(str, template, ...vals)`\
  \ | 此函数的工作方式与 `Sscanf` 相同，但一旦遇到换行符就会停止扫描字符串。 |\n\n选择使用哪个扫描函数取决于要扫描的字符串来源、如何处理换行符以及是否应使用模板。清单\
  \ 17-19 展示了 `Scan` 函数的基本用法，这是一个很好的入门示例。\n\n```\npackage main\nimport \"fmt\"\nfunc\
  \ Printfln(template string, values ...interface{}) {\nfmt.Printf(template + \"\\\
  n\", values...)\n}\nfunc main() {\nvar name string\nvar category string\nvar price\
  \ float64\nfmt.Print(\"Enter text to scan: \")\nn, err := fmt.Scan(&name, &category,\
  \ &price)\nif (err == nil) {\nPrintfln(\"Scanned %v values\", n)\nPrintfln(\"Name:\
  \ %v, Category: %v, Price: %.2f\", name, category, price)\n} else {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\n清单 17-19\n在 usingstrings 文件夹的 main.go 文件中扫描字符串\n\
  ```\n\n`Scan` 函数从标准输入读取字符串，并扫描其中由空格分隔的值。从字符串解析出的值按其定义的顺序分配给参数。为了让 `Scan` 函数能够赋值，其参数是指针。\n\
  \n在清单 17-19 中，我定义了 `name`、`category` 和 `price` 变量，并将它们用作 `Scan` 函数的参数：\n\n```\n\
  ...\nn, err := fmt.Scan(&name, &category, &price)\n...\n```\n\n当被调用时，`Scan` 函数将读取一个字符串，提取三个空格分隔的值，并将它们分配给这些变量。编译并执行该项目，系统将提示您输入文本，如下所示：\n\
  \n```\n...\nEnter text to scan:\n...\n```\n\n输入 `Kayak Watersports 279`，即单词 `Kayak`，后跟空格，再跟单词\
  \ `Watersports`，后跟空格，再跟数字 `279`。按下回车键，字符串将被扫描，产生如下输出：\n\n```\nScanned 3 values\n\
  Name: Kayak, Category: Watersports, Price: 279.00\n```\n\n`Scan` 函数必须将接收到的子字符串转换为\
  \ Go 值，如果字符串无法处理，则会报告错误。再次运行代码，但输入 `Kayak Watersports Zero`，您将收到以下错误：\n\n```\nError:\
  \ strconv.ParseFloat: parsing \"\": invalid syntax\n```\n\n字符串 `Zero` 无法转换为 Go 的\
  \ `float64` 值，而 `float64` 正是 `Price` 参数的类型。\n\n### 扫描到切片\n\n如果需要扫描一系列相同类型的值，很自然的做法是扫描到切片或数组中，如下所示：\n\
  \n```\n...\nvals := make([]string, 3)\nfmt.Print(\"Enter text to scan: \")\nfmt.Scan(vals...)\n\
  Printfln(\"Name: %v\", vals)\n...\n```\n\n这段代码无法编译，因为字符串切片无法正确分解以用于可变参数。还需要一个额外的步骤，如下所示：\n\
  \n```\n...\nvals := make([]string, 3)\nivals := make([]interface{}, 3)\nfor i :=\
  \ 0; i < len(vals); i++ {\nivals[i] = &vals[i]\n}\nfmt.Print(\"Enter text to scan:\
  \ \")\nfmt.Scan(ivals...)\nPrintfln(\"Name: %v\", vals)\n...\n```\n\n这是一个笨拙的过程，但可以将其封装在一个实用函数中，这样就不必每次都创建并填充\
  \ `interface` 切片。\n\n### 处理换行符\n\n默认情况下，扫描将换行符视为空格，作为值之间的分隔符。要查看此行为，请执行该项目，并在提示输入时，输入\
  \ `Kayak`，后跟空格，再跟 `Watersports`，然后按回车键，输入 `279`，再按一次回车键。此序列将产生以下输出：\n\n```\nScanned\
  \ 3 values\nName: Kayak, Category: Watersports, Price: 279.00\n```\n\n`Scan` 函数在接收到期望数量的值之前不会停止查找值，第一次按下回车键被视为分隔符，而不是输入的终止。表\
  \ 17-12 中名称以 `ln` 结尾的函数（例如 `Scanln`）改变了此行为。清单 17-20 使用了 `Scanln` 函数。\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{}) {\n\
  fmt.Printf(template + \"\\n\", values...)\n}\nfunc main() {\nvar name string\nvar\
  \ category string\nvar price float64\nfmt.Print(\"Enter text to scan: \")\nn, err\
  \ := fmt.Scanln(&name, &category, &price)\nif (err == nil) {\nPrintfln(\"Scanned\
  \ %v values\", n)\nPrintfln(\"Name: %v, Category: %v, Price: %.2f\", name, category,\
  \ price)\n} else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n清单 17-20\n在 usingstrings\
  \ 文件夹的 main.go 文件中使用 Scanln 函数\n```\n\n编译并执行项目，重复输入序列。当您第一次按下回车键时，换行符将终止输入，导致 `Scanln`\
  \ 函数接收到的值少于所需数量，产生如下输出：\n\n```\nError: unexpected newline\n```\n\n\n\n### 使用不同的字符串源\n\
  \n表 17-12 中描述的函数从三种来源扫描字符串：标准输入、读取器（在第 20 章中描述）以及作为参数提供的值。将字符串作为参数提供最为灵活，因为这意味着字符串可以来自任何地方。在代码清单\
  \ 17-21 中，我用 `Sscan` 函数替换了 `Scanln` 函数，这样就可以扫描一个字符串变量了。\n\n```\npackage main\nimport\
  \ \"fmt\"\nfunc Printfln(template string, values ...interface{}) {\nfmt.Printf(template\
  \ + \"\\n\", values...)\n}\nfunc main() {\nvar name string\nvar category string\n\
  var price float64\nsource := \"Lifejacket Watersports 48.95\"\nn, err := fmt.Sscan(source,\
  \ &name, &category, &price)\nif (err == nil) {\nPrintfln(\"Scanned %v values\",\
  \ n)\nPrintfln(\"Name: %v, Category: %v, Price: %.2f\", name, category, price)\n\
  } else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n代码清单 17-21\n在 usingstrings\
  \ 文件夹的 main.go 文件中扫描变量\n```\n\n`Sscan` 函数的第一个参数是要扫描的字符串，但在其他所有方面，扫描过程是相同的。编译并执行该项目，你将看到以下输出：\n\
  \n```\nScanned 3 values\nName: Lifejacket, Category: Watersports, Price: 48.95\n\
  ```\n\n### 使用扫描模板\n\n可以使用模板扫描包含不需要的字符的字符串中的值，如代码清单 17-22 所示。\n\n```\npackage main\n\
  import \"fmt\"\nfunc Printfln(template string, values ...interface{}) {\nfmt.Printf(template\
  \ + \"\\n\", values...)\n}\nfunc main() {\nvar name string\nvar category string\n\
  var price float64\nsource := \"Product Lifejacket Watersports 48.95\"\ntemplate\
  \ := \"Product %s %s %f\"\nn, err := fmt.Sscanf(source, template, &name, &category,\
  \ &price)\nif (err == nil) {\nPrintfln(\"Scanned %v values\", n)\nPrintfln(\"Name:\
  \ %v, Category: %v, Price: %.2f\", name, category, price)\n} else {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\n代码清单 17-22\n在 usingstrings 文件夹的 main.go 文件中使用模板\n\
  ```\n\n在代码清单 17-22 中使用的模板忽略了术语 `Product`，跳过了字符串的该部分，并允许从下一个术语开始扫描。编译并执行该项目，你将看到以下输出：\n\
  \n```\nScanned 3 values\nName: Lifejacket, Category: Watersports, Price: 48.95\n\
  ```\n\n使用模板进行扫描不如使用正则表达式灵活，因为扫描的字符串只能包含由空格分隔的值。但如果你只想要字符串中的某些值，并且不想定义复杂的匹配规则，使用模板仍然很有用。\n\
  \n## 本章小结\n\n在本章中，我描述了标准库中用于格式化和扫描字符串的功能，这些功能都由 `fmt` 包提供。在下一章中，我将描述标准库提供的数学函数和切片排序功能。\n\
  \n"
- "# 18. 数学函数与数据排序\n\n在本章中，我将介绍两组功能。首先，我介绍对执行常见数学任务的支持，包括生成随机数。其次，我介绍对切片中的元素进行排序的功能，使其按顺序排列。表\
  \ 18-1 给出了数学和排序功能的背景信息。\n\n表 18-1  \n数学函数与数据排序背景信息\n\n| 问题 | 答案 |\n| --- | --- |\n\
  | 它们是什么？ | 数学函数允许执行常见的计算。随机数是按难以预测的顺序生成的数字。排序是将一系列值按预定顺序排列的过程。 |\n| 为什么它们有用？ | 这些是在整个开发过程中都会使用的功能。\
  \ |\n| 如何使用它们？ | 这些功能在 `math`、`math/rand` 和 `sort` 包中提供。 |\n| 是否存在任何陷阱或限制？ | 除非使用种子值初始化，否则\
  \ `math/rand` 包生成的数字不是随机的。 |\n| 有替代方案吗？ | 你可以从头实现这两组功能，不过提供这些包就是为了避免这样做。 |\n\n表\
  \ 18-2 总结了本章内容。\n\n表 18-2  \n本章总结\n\n| 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n\
  | 执行常见计算 | 使用 `math` 包中定义的函数 | 5 |\n| 生成随机数 | 使用 `math/rand` 包中的函数，注意提供种子值 | 6–9\
  \ |\n| 打乱切片中的元素 | 使用 `Shuffle` 函数 | 10 |\n| 对切片中的元素进行排序 | 使用 `sort` 包中定义的函数 | 11,\
  \ 12, 15–20 |\n| 在已排序的切片中定位元素 | 使用 `Search*` 函数 | 13, 14 |\n\n## 本章准备工作\n\n为了准备本章，打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
  \ `mathandsorting` 的目录。在 `mathandsorting` 文件夹中运行代码清单 18-1 所示的命令，以创建一个模块文件。\n\n**提示**\n\
  你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章以及本书所有其他章节的示例项目。如果在运行示例时遇到问题，请参阅第\
  \ 2 章了解如何获取帮助。\n\n```\ngo mod init mathandsorting\n代码清单 18-1\n初始化模块\n```\n\n向 `mathandsorting`\
  \ 文件夹添加一个名为 `printer.go` 的文件，其内容如代码清单 18-2 所示。\n\n```\npackage main\nimport \"fmt\"\
  \nfunc Printfln(template string, values ...interface{}) {\nfmt.Printf(template +\
  \ \"\\n\", values...)\n}\n代码清单 18-2\nmathandsorting 文件夹中 printer.go 文件的内容\n```\n\
  \n向 `mathandsorting` 文件夹添加一个名为 `main.go` 的文件，其内容如代码清单 18-3 所示。\n\n```\npackage main\n\
  func main() {\nPrintfln(\"Hello, Math and Sorting\")\n}\n代码清单 18-3\nmathandsorting\
  \ 文件夹中 main.go 文件的内容\n```\n\n使用命令提示符在 `mathandsorting` 文件夹中运行代码清单 18-4 所示的命令。\n\n\
  ```\ngo run .\n代码清单 18-4\n运行示例项目\n```\n\n该代码将编译并执行，生成以下输出：\n\n```\nHello, Math and\
  \ Sorting\n```\n\n\n\n## 使用数字\n\n正如我在第 4 章中解释的，Go 语言支持一组可应用于数值的算术运算符，允许执行加法和乘法等基本任务。对于更高级的操作，Go\
  \ 标准库包含 `math` 包，它提供了大量的函数。表 18-3 描述了在典型项目中最常用的函数。有关完整的函数集，包括对三角学等更特定领域的支持，请参阅 [`https://golang.org/pkg/math`](https://golang.org/pkg/math)\
  \ 上的包文档。\n\n**表 18-3：math 包中的实用函数**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Abs(val)`\
  \ | 此函数返回 `float64` 值的绝对值，即不考虑方向时与零的距离。 |\n| `Ceil(val)` | 此函数返回大于或等于指定 `float64`\
  \ 值的最小整数。结果也是一个 `float64` 值，即使它代表一个整数。 |\n| `Copysign(x, y)` | 此函数返回一个 `float64`\
  \ 值，它是 `x` 的绝对值并带有 `y` 的符号。 |\n| `Floor(val)` | 此函数返回小于或等于指定 `float64` 值的最大整数。结果也是一个\
  \ `float64` 值，即使它代表一个整数。 |\n| `Max(x, y)` | 此函数返回指定的 `float64` 值中的最大值。 |\n| `Min(x,\
  \ y)` | 此函数返回指定的 `float64` 值中的最小值。 |\n| `Mod(x, y)` | 此函数返回 `x` / `y` 的余数。 |\n|\
  \ `Pow(x, y)` | 此函数返回 `x` 的 `y` 次幂。 |\n| `Round(val)` | 此函数将指定值四舍五入到最接近的整数，将 .5\
  \ 的情况向上舍入。结果是一个 `float64` 值，即使它代表一个整数。 |\n| `RoundToEven(val)` | 此函数将指定值舍入到最接近的整数，将\
  \ .5 的情况舍入到最接近的偶数。结果是一个 `float64` 值，即使它代表一个整数。 |\n\n这些函数都作用于 `float64` 值并产生 `float64`\
  \ 结果，这意味着你必须显式地与其他类型进行转换。清单 18-5 演示了表 18-3 中所描述的函数的用法。\n\n```\npackage main\nimport\
  \ \"math\"\nfunc main() {\nval1 := 279.00\nval2 := 48.95\nPrintfln(\"Abs: %v\",\
  \ math.Abs(val1))\nPrintfln(\"Ceil: %v\", math.Ceil(val2))\nPrintfln(\"Copysign:\
  \ %v\", math.Copysign(val1, -5))\nPrintfln(\"Floor: %v\", math.Floor(val2))\nPrintfln(\"\
  Max: %v\", math.Max(val1, val2))\nPrintfln(\"Min: %v\", math.Min(val1, val2))\n\
  Printfln(\"Mod: %v\", math.Mod(val1, val2))\nPrintfln(\"Pow: %v\", math.Pow(val1,\
  \ 2))\nPrintfln(\"Round: %v\", math.Round(val2))\nPrintfln(\"RoundToEven: %v\",\
  \ math.RoundToEven(val2))\n}\n清单 18-5：在 mathandsorting 文件夹的 main.go 文件中使用 math 包中的函数\n\
  ```\n\n编译并执行该项目，你将看到以下输出：\n\n```\nAbs: 279\nCeil: 49\nCopysign: -279\nFloor: 48\n\
  Max: 279\nMin: 48.95\nMod: 34.249999999999986\nPow: 77841\nRound: 49\nRoundToEven:\
  \ 49\n```\n\n`math` 包还为数值数据类型的限制提供了一组常量，如表 18-4 所述。\n\n**表 18-4：限制常量**\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `MaxInt8` / `MinInt8` | 这些常量表示可以使用 `int8` 存储的最大值和最小值。 |\n\
  | `MaxInt16` / `MinInt16` | 这些常量表示可以使用 `int16` 存储的最大值和最小值。 |\n| `MaxInt32` / `MinInt32`\
  \ | 这些常量表示可以使用 `int32` 存储的最大值和最小值。 |\n| `MaxInt64` / `MinInt64` | 这些常量表示可以使用 `int64`\
  \ 存储的最大值和最小值。 |\n| `MaxUint8` | 此常量表示可以使用 `uint8` 表示的最大值。最小值是零。 |\n| `MaxUint16`\
  \ | 此常量表示可以使用 `uint16` 表示的最大值。最小值是零。 |\n| `MaxUint32` | 此常量表示可以使用 `uint32` 表示的最大值。最小值是零。\
  \ |\n| `MaxUint64` | 此常量表示可以使用 `uint64` 表示的最大值。最小值是零。 |\n| `MaxFloat32` / `MaxFloat64`\
  \ | 这些常量表示可以使用 `float32` 和 `float64` 值表示的最大值。 |\n| `SmallestNonzeroFloat32` / `SmallestNonzeroFloat64`\
  \ | 这些常量表示可以使用 `float32` 和 `float64` 值表示的最小非零值。 |\n\n### 生成随机数\n\n`math/rand` 包为生成随机数提供了支持。最有用的函数在表\
  \ 18-5 中进行了描述。（尽管我在本节中使用了术语 *随机*，但 `math/rand` 包产生的数字是伪随机的，这意味着它们不应用于随机性至关重要的场景，例如生成加密密钥。）\n\
  \n**表 18-5：实用的 math/rand 函数**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Seed(s)` | 此函数使用指定的\
  \ `int64` 值设置种子值。 |\n| `Float32()` | 此函数生成一个介于 0 和 1 之间的随机 `float32` 值。 |\n| `Float64()`\
  \ | 此函数生成一个介于 0 和 1 之间的随机 `float64` 值。 |\n| `Int()` | 此函数生成一个随机的 `int` 值。 |\n| `Intn(max)`\
  \ | 此函数生成一个小于指定值的随机 `int`。 |\n| `UInt32()` | 此函数生成一个随机的 `uint32` 值。 |\n| `UInt64()`\
  \ | 此函数生成一个随机的 `uint64` 值。 |\n| `Shuffle(count, func)` | 此函数用于随机化元素的顺序。 |\n\n`math/rand`\
  \ 包的一个奇怪之处在于，默认情况下它返回一组可预测的值，如清单 18-6 所示。\n\n```\npackage main\nimport \"math/rand\"\
  \nfunc main() {\nfor i := 0; i < 5; i++ {\nPrintfln(\"Value %v : %v\", i, rand.Int())\n\
  }\n}\n清单 18-6：在 mathandsorting 文件夹的 main.go 文件中生成可预测的值\n```\n\n此示例调用 `Int` 函数并写出该值。编译并执行代码，你将看到以下输出：\n\
  \n```\nValue 0 : 5577006791947779410\nValue 1 : 8674665223082153551\nValue 2 : 6129484611666145821\n\
  Value 3 : 4037200794235010051\nValue 4 : 3916589616287113937\n```\n\n清单 18-6 中的代码将始终生成相同的数字集，这是因为初始种子值始终相同。为了避免生成相同的数字序列，必须使用一个非固定的值调用\
  \ `Seed` 函数，如清单 18-7 所示。\n\n```\npackage main\nimport (\n\"math/rand\"\n\"time\"\
  \n)\nfunc main() {\nrand.Seed(time.Now().UnixNano())\nfor i := 0; i < 5; i++ {\n\
  Printfln(\"Value %v : %v\", i, rand.Int())\n}\n}\n清单 18-7：在 mathandsorting 文件夹的\
  \ main.go 文件中设置种子值\n```\n\n通常的做法是使用当前时间作为种子值，这是通过调用 `time` 包提供的 `Now` 函数，并对结果调用\
  \ `UnixNano` 方法来实现的，该方法提供一个可以传递给 `Seed` 函数的 `int64` 值。（我将在第 19 章中描述 `time` 包。）编译并执行该项目，你将看到一系列每次执行程序时都会变化的数字。以下是我收到的输出：\n\
  \n```\nValue 0 : 8113726196145714527\nValue 1 : 3479565125812279859\nValue 2 : 8074476402089812953\n\
  Value 3 : 3916870404047362448\nValue 4 : 8226545715271170755\n```\n\n\n\n### 生成指定范围内的随机数\n\
  \n`Intn`函数可用于生成具有指定最大值的随机数，如代码清单[18-8]所示。\n\n```\npackage main\nimport (\n\"math/rand\"\
  \n\"time\"\n)\nfunc main() {\nrand.Seed(time.Now().UnixNano())\nfor i := 0; i <\
  \ 5; i++ {\nPrintfln(\"Value %v : %v\", i, rand.Intn(10))\n}\n}\n代码清单 18-8\n在 mathandsorting\
  \ 文件夹的 main.go 文件中指定最大值\n```\n\n该语句指定所有随机数都应小于 10。编译并执行代码，你将看到类似如下的输出，但具体的随机值会不同：\n\
  \n```\nValue 0 : 7\nValue 1 : 5\nValue 2 : 4\nValue 3 : 0\nValue 4 : 7\n```\n\n\
  虽然没有专门指定最小值的函数，但可以轻松地将 `Intn` 函数生成的值偏移到特定范围内，如代码清单[18-9]所示。\n\n```\npackage main\n\
  import (\n\"math/rand\"\n\"time\"\n)\nfunc IntRange(min, max int) int {\nreturn\
  \ rand.Intn(max - min) + min\n}\nfunc main() {\nrand.Seed(time.Now().UnixNano())\n\
  for i := 0; i < 5; i++ {\nPrintfln(\"Value %v : %v\", i, IntRange(10, 20))\n}\n\
  }\n代码清单 18-9\n在 mathandsorting 文件夹的 main.go 文件中指定下限\n```\n\n`IntRange` 函数返回指定范围内的一个随机数。编译并执行该项目，你将得到一系列介于\
  \ 10 到 19 之间的数字，类似于：\n\n```\nValue 0 : 10\nValue 1 : 19\nValue 2 : 11\nValue 3 :\
  \ 10\nValue 4 : 17\n```\n\n### 打乱元素顺序\n\n`Shuffle` 函数用于随机重新排列元素，它通过一个自定义函数来实现，如代码清单[18-10]所示。\n\
  \n```\npackage main\nimport (\n\"math/rand\"\n\"time\"\n)\nvar names = []string\
  \ { \"Alice\", \"Bob\", \"Charlie\", \"Dora\", \"Edith\"}\nfunc main() {\nrand.Seed(time.Now().UnixNano())\n\
  rand.Shuffle(len(names), func (first, second int) {\nnames[first], names[second]\
  \ = names[second], names[first]\n})\nfor i, name := range names {\nPrintfln(\"Index\
  \ %v: Name: %v\", i, name)\n}\n}\n代码清单 18-10\n在 mathandsorting 文件夹的 main.go 文件中打乱元素顺序\n\
  ```\n\n`Shuffle` 函数的参数是元素数量和一个用于交换两个元素的函数，这两个元素通过索引标识。该函数被调用来随机交换元素。在代码清单[18-10]中，匿名函数交换了\
  \ `names` 切片中的两个元素，这意味着使用 `Shuffle` 函数起到了打乱 `names` 值顺序的效果。编译并执行该项目，输出将显示 `names`\
  \ 切片中元素被打乱后的顺序，类似于：\n\n```\nIndex 0: Name: Edith\nIndex 1: Name: Dora\nIndex 2:\
  \ Name: Charlie\nIndex 3: Name: Alice\nIndex 4: Name: Bob\n```\n\n## 排序数据\n\n前面的示例展示了如何打乱切片中的元素，但更常见的需求是将元素排列成更可预测的顺序，这便是\
  \ `sort` 包提供的函数所负责的工作。在接下来的章节中，我将介绍该包提供的内置排序功能，并演示它们的用法。\n\n### 对数字和字符串切片进行排序\n\n\
  表 18-6 中描述的函数用于对包含 `int`、`float64` 或 `string` 值的切片进行排序。\n\n**表 18-6：** 用于排序的基本函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Float64s(slice)` | 此函数对 `float64` 值的切片进行排序。元素会被原地排序。\
  \ |\n| `Float64sAreSorted(slice)` | 如果指定的 `float64` 切片中的元素已排序，则此函数返回 `true`。 |\n\
  | `Ints(slice)` | 此函数对 `int` 值的切片进行排序。元素会被原地排序。 |\n| `IntsAreSorted(slice)` | 如果指定的\
  \ `int` 切片中的元素已排序，则此函数返回 `true`。 |\n| `Strings(slice)` | 此函数对 `string` 值的切片进行排序。元素会被原地排序。\
  \ |\n| `StringsAreSorted(slice)` | 如果指定的 `string` 切片中的元素已排序，则此函数返回 `true`。 |\n\n\
  每种数据类型都有一组自己的函数，用于对数据进行排序或判断数据是否已排序，如代码清单[18-11]所示。\n\n```\npackage main\nimport\
  \ (\n//\"math/rand\"\n//\"time\"\n\"sort\"\n)\nfunc main() {\nints := []int { 9,\
  \ 4, 2, -1, 10}\nPrintfln(\"Ints: %v\", ints)\nsort.Ints(ints)\nPrintfln(\"Ints\
  \ Sorted: %v\", ints)\nfloats := []float64 { 279, 48.95, 19.50 }\nPrintfln(\"Floats:\
  \ %v\", floats)\nsort.Float64s(floats)\nPrintfln(\"Floats Sorted: %v\", floats)\n\
  strings := []string { \"Kayak\", \"Lifejacket\", \"Stadium\" }\nPrintfln(\"Strings:\
  \ %v\", strings)\nif (!sort.StringsAreSorted(strings)) {\nsort.Strings(strings)\n\
  Printfln(\"Strings Sorted: %v\", strings)\n} else {\nPrintfln(\"Strings Already\
  \ Sorted: %v\", strings)\n}\n}\n代码清单 18-11\n在 mathandsorting 文件夹的 main.go 文件中排序切片\n\
  ```\n\n此示例对包含 `int` 和 `float64` 值的切片进行排序。还有一个 `string` 切片，使用 `StringsAreSorted`\
  \ 函数对其进行了检查，以避免对已排序的数据进行排序。编译并执行该项目，你将看到如下输出：\n\n```\nInts: [9 4 2 -1 10]\nInts\
  \ Sorted: [-1 2 4 9 10]\nFloats: [279 48.95 19.5]\nFloats Sorted: [19.5 48.95 279]\n\
  Strings: [Kayak Lifejacket Stadium]\nStrings Already Sorted: [Kayak Lifejacket Stadium]\n\
  ```\n\n请注意，代码清单[18-11]中的函数是原地对元素进行排序，而不是创建新的切片。如果你想创建一个已排序的新切片，则必须使用内置的 `make` 和\
  \ `copy` 函数，如代码清单[18-12]所示。这些函数在第[7]章中介绍过。\n\n```\npackage main\nimport (\n\"sort\"\
  \n)\nfunc main() {\nints := []int { 9, 4, 2, -1, 10}\nsortedInts := make([]int,\
  \ len(ints))\ncopy(sortedInts, ints)\nsort.Ints(sortedInts)\nPrintfln(\"Ints: %v\"\
  , ints)\nPrintfln(\"Ints Sorted: %v\", sortedInts)\n}\n代码清单 18-12\n在 mathandsorting\
  \ 文件夹的 main.go 文件中创建切片的已排序副本\n```\n\n编译并执行该项目，你将看到如下输出：\n\n```\nInts: [9 4 2 -1\
  \ 10]\nInts Sorted: [-1 2 4 9 10]\n```\n\n\n\n### 排序已排序数据\n\n`sort` 包定义了表 18-7 中描述的函数，用于在已排序数据中搜索特定值。\n\
  \n**表 18-7** 用于搜索已排序数据的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `SearchInts(slice, val)`\
  \ | 此函数在已排序切片中搜索指定的 `int` 值。结果是该指定值的索引，如果未找到该值，则结果为在保持排序顺序的情况下可插入该值的索引。 |\n| `SearchFloat64s(slice,\
  \ val)` | 此函数在已排序切片中搜索指定的 `float64` 值。结果是该指定值的索引，如果未找到该值，则结果为在保持排序顺序的情况下可插入该值的索引。\
  \ |\n| `SearchStrings(slice, val)` | 此函数在已排序切片中搜索指定的 `string` 值。结果是该指定值的索引，如果未找到该值，则结果为在保持排序顺序的情况下可插入该值的索引。\
  \ |\n| `Search(count, testFunc)` | 此函数对指定数量的元素调用测试函数。结果是函数返回 `true` 的索引。如果没有匹配项，则结果为可插入指定值以保持排序顺序的索引。\
  \ |\n\n表 18-7 中描述的函数使用起来略显笨拙。当找到值时，这些函数会返回其在切片中的位置。但不同寻常的是，如果未找到该值，则结果是在保持排序顺序的情况下可插入该值的位置，如清单\
  \ 18-13 所示。\n\n```\npackage main\nimport (\n\"sort\"\n)\nfunc main() {\nints :=\
  \ []int { 9, 4, 2, -1, 10}\nsortedInts := make([]int, len(ints))\ncopy(sortedInts,\
  \ ints)\nsort.Ints(sortedInts)\nPrintfln(\"Ints: %v\", ints)\nPrintfln(\"Ints Sorted:\
  \ %v\", sortedInts)\nindexOf4:= sort.SearchInts(sortedInts, 4)\nindexOf3 := sort.SearchInts(sortedInts,\
  \ 3)\nPrintfln(\"Index of 4: %v\", indexOf4)\nPrintfln(\"Index of 3: %v\", indexOf3)\n\
  }\n清单 18-13\n在 mathandsorting 文件夹中的 main.go 文件中搜索已排序数据\n```\n\n编译并执行代码，你会看到搜索切片中存在的值与搜索不存在的值得到了相同的结果：\n\
  \n```\nInts: [9 4 2 -1 10]\nInts Sorted: [-1 2 4 9 10]\nIndex of 4: 2\nIndex of\
  \ 3: 2\n```\n\n这些函数需要一个额外的测试来检查这些函数返回位置上的值是否是所搜索的值，如清单 18-14 所示。\n\n```\npackage\
  \ main\nimport (\n\"sort\"\n)\nfunc main() {\nints := []int { 9, 4, 2, -1, 10}\n\
  sortedInts := make([]int, len(ints))\ncopy(sortedInts, ints)\nsort.Ints(sortedInts)\n\
  Printfln(\"Ints: %v\", ints)\nPrintfln(\"Ints Sorted: %v\", sortedInts)\nindexOf4:=\
  \ sort.SearchInts(sortedInts, 4)\nindexOf3 := sort.SearchInts(sortedInts, 3)\nPrintfln(\"\
  Index of 4: %v (present: %v)\", indexOf4, sortedInts[indexOf4] == 4)\nPrintfln(\"\
  Index of 3: %v (present: %v)\", indexOf3, sortedInts[indexOf3] == 3)\n}\n清单 18-14\n\
  在 mathandsorting 文件夹中的 main.go 文件中消除搜索结果歧义\n```\n\n编译并执行项目，你将得到以下结果：\n\n```\nInts:\
  \ [9 4 2 -1 10]\nInts Sorted: [-1 2 4 9 10]\nIndex of 4: 2 (present: true)\nIndex\
  \ of 3: 2 (present: false)\n```\n\n### 排序自定义数据类型\n\n为了对自定义数据类型进行排序，`sort` 包定义了一个命名令人困惑的接口\
  \ `Interface`，该接口指定了表 18-8 中描述的方法。\n\n**表 18-8** `sort.Interface` 接口定义的方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Len()` | 此方法返回将要排序的项数。 |\n| `Less(i, j)` | 如果索引 `i`\
  \ 处的元素应出现在排序序列中索引 `j` 的元素之前，则此方法返回 `true`。如果 `Less(i,j)` 和 `Less(j, i)` 都为 `false`，则这些元素被视为相等。\
  \ |\n| `Swap(i, j)` | 此方法交换指定索引处的元素。 |\n\n当一个类型定义了表 18-8 中描述的方法时，就可以使用表 18-9 中描述的函数对其进行排序，这些函数由\
  \ `sort` 包定义。\n\n**表 18-9** 用于排序实现 `Interface` 的类型的函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `Sort(data)` | 此函数使用表 18-8 中描述的方法对指定数据进行排序。 |\n| `Stable(data)` | 此函数使用表\
  \ 18-8 中描述的方法对指定数据进行排序，而不改变相等值元素的顺序。 |\n| `IsSorted(data)` | 如果数据已按顺序排序，则此函数返回 `true`。\
  \ |\n| `Reverse(data)` | 此函数反转数据的顺序。 |\n\n表 18-8 中定义的方法应用于要排序的数据项集合，这意味着需要引入一个类型别名和用于转换的函数，以便调用表\
  \ 18-9 中定义的函数。为演示，在 `mathandsorting` 文件夹中添加一个名为 `productsort.go` 的文件，代码如清单 18-15\
  \ 所示。\n\n```\npackage main\nimport \"sort\"\ntype Product struct {\nName string\n\
  Price float64\n}\ntype ProductSlice []Product\nfunc ProductSlices(p []Product) {\n\
  sort.Sort(ProductSlice(p))\n}\nfunc ProductSlicesAreSorted(p []Product) {\nsort.IsSorted(ProductSlice(p))\n\
  }\nfunc (products ProductSlice) Len() int {\nreturn len(products)\n}\nfunc (products\
  \ ProductSlice) Less(i, j int) bool {\nreturn products[i].Price < products[j].Price\n\
  }\nfunc (products ProductSlice) Swap(i, j int) {\nproducts[i], products[j] = products[j],\
  \ products[i]\n}\n清单 18-15\n在 mathandsorting 文件夹中的 productsort.go 文件内容\n```\n\n\
  `ProductSlice` 类型是 `Product` 切片的别名，并且是在该类型上实现了接口方法。除了这些方法，我还定义了一个 `ProductSlices`\
  \ 函数，它接收一个 `Product` 切片，将其转换为 `ProductSlice` 类型，并将其作为参数传递给 `Sort` 函数。还有一个 `ProductSlicesAreSorted`\
  \ 函数，它调用 `IsSorted` 函数。这些函数的命名遵循 `sort` 包建立的惯例，即在别名类型名后加上字母 `s`。清单 18-16 使用这些函数对\
  \ `Product` 值的切片进行排序。\n\n```\npackage main\nimport (\n//\"sort\"\n)\nfunc main()\
  \ {\nproducts := []Product {\n{ \"Kayak\", 279} ,\n{ \"Lifejacket\", 49.95 },\n\
  { \"Soccer Ball\",  19.50 },\n}\nProductSlices(products)\nfor _, p := range products\
  \ {\nPrintfln(\"Name: %v, Price: %.2f\", p.Name, p.Price)\n}\n}\n清单 18-16\n在 mathandsorting\
  \ 文件夹中的 main.go 文件中排序切片\n```\n\n编译并执行项目，你将看到输出显示 `Product` 值按 `Price` 字段的升序排序：\n\
  \n```\nName: Soccer Ball, Price: 19.50\nName: Lifejacket, Price: 49.95\nName: Kayak,\
  \ Price: 279.00\n```\n\n\n\n### 使用不同字段进行排序\n\n类型组合可用于支持对同一结构体类型使用不同字段进行排序，如代码清单\
  \ 18-17 所示。\n\n```go\npackage main\nimport \"sort\"\ntype Product struct {\nName\
  \ string\nPrice float64\n}\ntype ProductSlice []Product\nfunc ProductSlices(p []Product)\
  \ {\nsort.Sort(ProductSlice(p))\n}\nfunc ProductSlicesAreSorted(p []Product) {\n\
  sort.IsSorted(ProductSlice(p))\n}\nfunc (products ProductSlice) Len() int {\nreturn\
  \ len(products)\n}\nfunc (products ProductSlice) Less(i, j int) bool {\nreturn products[i].Price\
  \ < products[j].Price\n}\nfunc (products ProductSlice) Swap(i, j int) {\nproducts[i],\
  \ products[j] = products[j], products[i]\n}\ntype ProductSliceName struct { ProductSlice\
  \ }\nfunc ProductSlicesByName(p []Product) {\nsort.Sort(ProductSliceName{ p })\n\
  }\nfunc (p ProductSliceName) Less(i, j int) bool {\nreturn p.ProductSlice[i].Name\
  \ < p.ProductSlice[j].Name\n}\n```\n\n**代码清单 18-17** `mathandsorting` 文件夹中 `productsort.go`\
  \ 文件内对不同字段进行排序\n\n为每个需要排序的结构体字段定义一个结构体类型，其中嵌入一个 `ProductSlice` 字段，如下所示：\n\n```go\n\
  ...\ntype ProductSliceName struct { ProductSlice }\n...\n```\n\n类型组合特性意味着为 `ProductSlice`\
  \ 类型定义的方法会被提升到外层类型。为外层类型定义一个新的 `Less` 方法，该方法将用于使用不同字段对数据进行排序，如下所示：\n\n```go\n...\n\
  func (p ProductSliceName) Less(i, j int) bool {\nreturn p.ProductSlice[i].Name <=\
  \ p.ProductSlice[j].Name\n}\n...\n```\n\n最后一步是定义一个函数，执行从 `Product` 切片到新类型的转换，并调用\
  \ `Sort` 函数：\n\n```go\n...\nfunc ProductSlicesByName(p []Product) {\nsort.Sort(ProductSliceName{\
  \ p })\n}\n...\n```\n\n代码清单 18-17 中添加内容的结果是，`Product` 值的切片可以根据其 `Name` 字段的值进行排序，如代码清单\
  \ 18-18 所示。\n\n```go\npackage main\nimport (\n//\"sort\"\n)\nfunc main() {\nproducts\
  \ := []Product {\n{ \"Kayak\", 279} ,\n{ \"Lifejacket\", 49.95 },\n{ \"Soccer Ball\"\
  ,  19.50 },\n}\nProductSlicesByName(products)\nfor _, p := range products {\nPrintfln(\"\
  Name: %v, Price: %.2f\", p.Name, p.Price)\n}\n}\n```\n\n**代码清单 18-18** `mathandsorting`\
  \ 文件夹中 `main.go` 文件内按附加字段排序\n\n编译并执行该项目，你会看到 `Product` 值按其 `Name` 字段排序，结果如下：\n\n\
  ```\nName: Kayak, Price: 279.00\nName: Lifejacket, Price: 49.95\nName: Soccer Ball,\
  \ Price: 19.50\n```\n\n### 指定比较函数\n\n另一种方法是在 `sort` 函数外部指定用于比较元素的表达式，如代码清单 18-19\
  \ 所示。\n\n```go\npackage main\nimport \"sort\"\ntype Product struct {\nName string\n\
  Price float64\n}\ntype ProductSlice []Product\n// ...为简洁起见省略了类型和函数...\ntype ProductComparison\
  \ func(p1, p2 Product) bool\ntype ProductSliceFlex struct {\nProductSlice\nProductComparison\n\
  }\nfunc (flex ProductSliceFlex) Less(i, j int) bool {\nreturn flex.ProductComparison(flex.ProductSlice[i],\
  \ flex.ProductSlice[j])\n}\nfunc SortWith(prods []Product, f ProductComparison)\
  \ {\nsort.Sort(ProductSliceFlex{ prods, f})\n}\n```\n\n**代码清单 18-19** `mathandsorting`\
  \ 文件夹中 `productsort.go` 文件内使用外部比较函数\n\n创建了一个名为 `ProductSliceFlex` 的新类型，它结合了数据和比较函数，这将使此方法能够适应\
  \ `sort` 包所定义函数的结构。为 `ProductSliceFlex` 类型定义了一个 `Less` 方法，该方法会调用比较函数。最后一部分是 `SortWith`\
  \ 函数，它将数据和函数组合成一个 `ProductSliceFlex` 值，并将其传递给 `sort.Sort` 函数。代码清单 18-20 演示了通过指定比较函数来对数据进行排序。\n\
  \n```go\npackage main\nimport (\n//\"sort\"\n)\nfunc main() {\nproducts := []Product\
  \ {\n{ \"Kayak\", 279} ,\n{ \"Lifejacket\", 49.95 },\n{ \"Soccer Ball\",  19.50\
  \ },\n}\nSortWith(products, func (p1, p2 Product) bool {\nreturn p1.Name < p2.Name\n\
  })\nfor _, p := range products {\nPrintfln(\"Name: %v, Price: %.2f\",  p.Name, p.Price)\n\
  }\n}\n```\n\n**代码清单 18-20** `mathandsorting` 文件夹中 `main.go` 文件内使用比较函数进行排序\n\n数据通过比较\
  \ `Name` 字段进行排序，编译并执行该项目后，代码产生以下输出：\n\n```\nName: Kayak, Price: 279.00\nName: Lifejacket,\
  \ Price: 49.95\nName: Soccer Ball, Price: 19.50\n```\n\n## 本章小结\n\n在本章中，我介绍了用于生成随机数和打乱切片元素的功能。我还介绍了与之相反的功能，即对切片中的元素进行排序。在下一章中，我将介绍关于时间、日期和时段的标准库功能。\n\
