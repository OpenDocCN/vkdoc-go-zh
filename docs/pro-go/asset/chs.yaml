  \n### 定义基本查询\n\n为了完善资源库，我需要逐一实现`Repository`接口所需的方法，为每个方法定义 Go 实现以及它将使用的 SQL 查询。在`models/repo`文件夹中添加一个名为`sql_basic_methods.go`的文件，其内容如代码清单\
  \ 36-18 所示。\n\n```\npackage repo\nimport \"sportsstore/models\"\nfunc (repo *SqlRepository)\
  \ GetProduct(id int) (p models.Product) {\nrow := repo.Commands.GetProduct.QueryRowContext(repo.Context,\
  \ id)\nif row.Err() == nil {\nvar err error\nif p, err = scanProduct(row); err !=\
  \ nil {\nrepo.Logger.Panicf(\"Cannot scan data: %v\", err.Error())\n}\n} else {\n\
  repo.Logger.Panicf(\"Cannot exec GetProduct command: %v\", row.Err().Error())\n\
  }\nreturn\n}\nfunc (repo *SqlRepository) GetProducts() (results []models.Product)\
  \ {\nrows, err := repo.Commands.GetProducts.QueryContext(repo.Context)\nif err ==\
  \ nil {\nif results, err = scanProducts(rows); err != nil {\nrepo.Logger.Panicf(\"\
  Cannot scan data: %v\", err.Error())\nreturn\n}\n} else {\nrepo.Logger.Panicf(\"\
  Cannot exec GetProducts command: %v\", err)\n}\nreturn\n}\nfunc (repo *SqlRepository)\
  \ GetCategories() []models.Category {\nresults := make([]models.Category, 0, 10)\n\
  rows, err := repo.Commands.GetCategories.QueryContext(repo.Context)\nif err == nil\
  \ {\nfor rows.Next() {\nc := models.Category{}\nif err := rows.Scan(&c.ID, &c.CategoryName);\
  \ err != nil {\nrepo.Logger.Panicf(\"Cannot scan data: %v\", err.Error())\n}\nresults\
  \ = append(results, c)\n}\n} else {\nrepo.Logger.Panicf(\"Cannot exec GetCategories\
  \ command: %v\", err)\n}\nreturn results\n}\n代码清单 36-18\nmodels/repo 文件夹中 sql_basic_methods.go\
  \ 文件的内容\n```\n\n代码清单 36-18 实现了`GetProduct`、`GetProducts`和`GetCategories`方法。为了定义从\
  \ SQL 结果中扫描`Product`值的函数，请在`models/repo`文件夹中添加一个名为`sql_scan.go`的文件，其内容如代码清单 36-19\
  \ 所示。\n\n```\npackage repo\nimport (\n\"database/sql\"\n\"sportsstore/models\"\n\
  )\nfunc scanProducts(rows *sql.Rows) (products []models.Product, err error) {\n\
  products = make([]models.Product, 0, 10)\nfor rows.Next() {\np := models.Product{\
  \ Category: &models.Category{}}\nerr = rows.Scan(&p.ID, &p.Name, &p.Description,\
  \ &p.Price,\n&p.Category.ID, &p.Category.CategoryName)\nif (err == nil) {\nproducts\
  \ = append(products, p)\n} else {\nreturn\n}\n}\nreturn\n}\nfunc scanProduct(row\
  \ *sql.Row) (p models.Product, err error) {\np = models.Product{ Category: &models.Category{}}\n\
  err = row.Scan(&p.ID, &p.Name, &p.Description, &p.Price, &p.Category.ID,\n&p.Category.CategoryName)\n\
  return p, err\n}\n代码清单 36-19\nmodels/repo 文件夹中 sql_scan.go 文件的内容\n```\n\n`scanProducts`函数用于扫描有多行数据的情况，而`scanProduct`函数则对单行结果执行相同操作。\n\
  \n#### 为基本查询定义 SQL 文件\n\n现在是时候为每个查询定义 SQL 文件了。在`sportsstore/sql`文件夹中添加一个名为`get_product.sql`的文件，其内容如代码清单\
  \ 36-20 所示。\n\n```\nSELECT Products.Id, Products.Name, Products.Description, Products.Price,\n\
  Categories.Id, Categories.Name\nFROM Products, Categories\nWHERE Products.Category\
  \ = Categories.Id\nAND Products.Id = ?\n代码清单 36-20\nsql 文件夹中 get_product.sql 文件的内容\n\
  ```\n\n此查询生成一行数据，其中包含指定`Id`产品的详细信息。在`sportsstore/sql`文件夹中添加一个名为`get_products.sql`的文件，其内容如代码清单\
  \ 36-21 所示。\n\n```\nSELECT Products.Id, Products.Name, Products.Description, Products.Price,\n\
