  \ Products.Name, Products.Price,\nCategories.Id as \"Category.Id\", Categories.Name\
  \ as \"Category.Name\"\nFROM Products, Categories\nWHERE Products.Category = Categories.Id`)\n\
  if (err != nil) {\nreturn\n} else {\nresults, err := scanIntoStruct(rows, &Product{})\n\
  if err == nil {\nproducts = (results).([]Product)\n} else {\nPrintfln(\"Scanning\
  \ error: %v\", err)\n}\n}\nreturn\n}\nfunc main() {\ndb, err := openDatabase()\n\
  if (err == nil) {\nproducts, _ := queryDatabase(db)\nfor _, p := range products\
  \ {\nPrintfln(\"Product: %v\", p)\n}\ndb.Close()\n} else {\npanic(err)\n}\n}\n```\n\
  \n**代码清单 26-23** 在 `data` 目录下的 `main.go` 文件中扫描查询结果\n\n\n\n查询数据库时，需要指定列名，这些列名将与`Product`和`Category`结构体定义的字段匹配。正如我在第\
  \ 27 章中解释的，通过反射生成的结果需要进行类型断言来缩小其类型。\n\n此示例的效果是，扫描是基于将结果列与结构体字段名和类型进行动态匹配来完成的。编译并执行该项目，您将看到以下输出：\n\
  \n```\nOpened database\nProduct: {1 Kayak {1 Watersports} 279}\nProduct: {2 Lifejacket\
  \ {4 Category_1} 48.95}\nProduct: {3 Soccer Ball {2 Soccer} 19.5}\nProduct: {4 Corner\
  \ Flags {2 Soccer} 34.95}\nProduct: {5 Stadium {2 Soccer} 79500}\n```\n\n## 总结\n\
  \n在本章中，我描述了 Go 标准库对使用 SQL 数据库的支持，这些支持简单、设计良好且易于使用。在下一章中，我将开始描述 Go 的反射特性，这些特性允许在运行时确定和使用类型。\n\
  \n"
- "# 27. 使用反射\n\n在本章中，我将描述 Go 对反射的支持，它允许应用程序处理在项目编译时未知的类型。例如，这对于创建将被其他项目使用的 API 非常有用。您可以在第\
  \ 3 部分中看到反射的广泛使用，在那里我创建了一个自定义的 Web 应用程序框架。在这种情况下，应用程序框架中的代码对将要运行的应用程序定义的数据类型一无所知，必须使用反射来获取这些类型的信息，并处理由它们创建的值。\n\
  \n使用反射应谨慎。由于所使用的数据类型是未知的，编译器通常提供的安全保障无法使用，程序员有责任安全地检查和操作类型。反射代码通常冗长且难以阅读，并且在编写反射代码时很容易做出错误的假设，这些错误直到代码被其他开发者使用时才会暴露出来。反射代码中的错误通常会导致程序崩溃。\n\
  \n使用反射的代码比常规 Go 代码慢，尽管这在大多数项目中不会成为问题。除非您有特别苛刻的性能要求，否则您会发现所有 Go 代码都能以可接受的速度运行，无论它是否使用反射。有些\
  \ Go 编程任务只能通过反射完成，并且反射在整个标准库中都有使用。\n\n这并不意味着您应该急于使用反射——因为它难以使用且容易出错——但有时它无法避免，一旦您理解了它的工作原理，谨慎地应用\
  \ Go 反射特性可以编写出灵活且适应性强的代码，正如您将在第 3 部分中看到的那样。表 27-1 将反射置于上下文中。\n\n表 27-1：反射的上下文\n\n\
  | 问题 | 答案 |\n| --- | --- |\n| 它是什么？ | 反射允许在运行时检查类型和值，即使这些类型是在编译时未定义的。 |\n| 它为什么有用？\
  \ | 当编写依赖于将来定义类型的代码时（例如，在编写将被其他项目使用的 API 时），反射非常有用。 |\n| 如何使用？ | `reflect`包提供了允许反射类型和值的特性，使得可以在没有明确了解正在使用的数据类型的情况下使用它们。\
  \ |\n| 有陷阱或局限性吗？ | 反射很复杂，需要高度关注细节。很容易对数据类型做出假设，这些假设直到代码在其他项目中使用时才会暴露出问题。 |\n| 有替代方案吗？\
  \ | 只有在项目编译时类型未知时才需要反射。当类型预先已知时，应使用标准的 Go 语言特性。 |\n\n表 27-2 总结了本章内容。\n\n表 27-2：章节总结\n\
  \n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 获取反射后的类型和值 | 使用`TypeOf`和`ValueOf`函数\
  \ | 8 |\n| 检查反射后的类型 | 使用`Type`接口定义的方法 | 9 |\n| 检查反射后的值 | 使用`Value`结构体定义的方法 | 10\
  \ |\n| 识别一个反射后的类型 | 检查其种类，并可选地检查其元素类型 | 11, 12 |\n| 获取底层类型 | 使用`Interface`方法 | 13\
  \ |\n| 设置反射后的值 | 使用`Set*`方法 | 14–16 |\n| 比较反射后的值 | 使用`Comparable`方法和 Go 比较运算符，或使用`DeepEqual`函数\
  \ | 17–19 |\n| 将反射后的值转换为不同类型 | 使用`ConvertibleTo`和`Convert`方法 | 20, 21 |\n| 创建新的反射值\
  \ | 对于基本类型使用`New`类型，对于其他类型使用`Make*`方法之一 | 22 |\n\n## 准备本章内容\n\n为了准备本章的内容，请打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为`reflection`的目录。然后在`reflection`文件夹中运行清单\
  \ 27-1 所示的命令来创建一个模块文件。\n\n> 提示\n> 您可以从[`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)下载本章以及本书其他章节的示例项目。如果您在运行示例时遇到问题，请参阅第\
  \ 2 章以获取帮助。\n\n```\ngo mod init reflection\n清单 27-1\n初始化模块\n```\n\n在`reflection`文件夹中添加一个名为`printer.go`的文件，内容如清单\
  \ 27-2 所示。\n\n```\npackage main\nimport \"fmt\"\nfunc Printfln(template string,\
  \ values ...interface{}) {\nfmt.Printf(template + \"\\n\", values...)\n}\n清单 27-2\n\
  reflection 文件夹中 printer.go 文件的内容\n```\n\n在`reflection`文件夹中添加一个名为`types.go`的文件，内容如清单\
  \ 27-3 所示。\n\n```\npackage main\ntype Product struct {\nName, Category string\n\
