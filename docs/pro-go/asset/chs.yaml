  \ 字段已正确设置的 `StructField`。随后使用一个 `for` 循环反向遍历类型层次结构，依次检查每个父级。编译并执行该项目，你将看到以下结果：\n\
  \n```\nFound: Price, Type: float64, Index: [1 2]\nParent : Product, Type: main.Product,\
  \ Index: [1]\nTop-Level Type: main.Purchase\n```\n\n请注意，我必须使用 `FieldByName()` 方法返回的\
  \ `StructField` 中的 `Index` 值，因为使用 `FieldByIndex()` 方法向上遍历层次结构会引入上一节描述的问题。\n\n##\
  \ 检查结构体标签\n\n`StructField.Tag` 字段提供了与字段关联的结构体标签的详细信息。结构体标签只能通过反射来检查，这限制了它们的用途。大多数项目只在定义结构体时使用标签，以便为其他包提供指导，如第\
  \ 21 章中处理 JSON 数据所示。\n\n`Tag` 字段返回一个 `StructTag` 值，该值是 `string` 类型的别名。结构体标签本质上是一个包含编码键值对的字符串，创建\
  \ `StructTag` 别名类型的原因是为了能够定义表 28-15 中描述的方法。\n\n**表 28-15：StructTag 类型定义的方法**\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `Get(key)` | 该方法返回一个 `string`，其中包含指定键的值；如果未定义任何值，则返回空字符串。\
  \ |\n| `Lookup(key)` | 该方法返回一个 `string`，其中包含指定键的值（如果未定义任何值，则返回空字符串），并返回一个 `bool`\
  \ 值：如果值已定义则为 `true`，否则为 `false`。 |\n\n表 28-15 中的方法类似，区别在于 `Lookup()` 方法能够区分未定义值的键和值被定义为空字符串的键。清单\
  \ 28-18 定义了一个带有标签的结构体，并演示了这些方法的使用。\n\n```\npackage main\nimport (\n\"reflect\"\n\
  //\"strings\"\n//\"fmt\"\n)\nfunc inspectTags(s interface{}, tagName string) {\n\
  structType := reflect.TypeOf(s)\nfor i := 0; i < structType.NumField(); i++ {\n\
  field := structType.Field(i)\ntag := field.Tag\nvalGet := tag.Get(tagName)\nvalLookup,\
  \ ok := tag.Lookup(tagName)\nPrintfln(\"Field: %v, Tag %v: %v\", field.Name, tagName,\
  \ valGet)\nPrintfln(\"Field: %v, Tag %v: %v, Set: %v\",\nfield.Name, tagName, valLookup,\
  \ ok)\n}\n}\ntype Person struct {\nName string `alias:\"id\"`\nCity string `alias:\"\
  \"`\nCountry string\n}\nfunc main() {\ninspectTags(Person{}, \"alias\")\n}\n清单 28-18\n\
  在 reflection 文件夹的 main.go 文件中检查结构体标签\n```\n\n`inspectTags()` 函数枚举结构体类型中定义的字段，并使用\
  \ `Get()` 和 `Lookup()` 方法来获取指定的标签。该函数应用于 `Person` 类型，该类型在其某些字段上定义了 `alias` 标签。编译并执行该项目，你将看到以下输出：\n\
  \n```\nField: Name, Tag alias: id\nField: Name, Tag alias: id, Set: true\nField:\
  \ City, Tag alias:\nField: City, Tag alias: , Set: true\nField: Country, Tag alias:\n\
  Field: Country, Tag alias: , Set: false\n```\n\n`Lookup()` 方法返回的额外结果使得区分 `City`\
  \ 字段（其 `alias` 标签定义为空字符串）和 `Country` 字段（根本没有 `alias` 标签）成为可能。\n\n## 创建结构体类型\n\n\
  `reflect` 包提供了表 28-16 中描述的函数来创建结构体类型。这不是一个常用的功能，因为其结果是一种只能通过反射使用的类型。\n\n**表 28-16：用于创建结构体类型的\
  \ reflect 函数**\n\n| 名称 | 描述 |\n| --- | --- |\n| `StructOf(fields)` | 该函数使用指定的 `StructField`\
  \ 切片定义字段，创建一个新的结构体类型。只能指定导出的字段。 |\n\n清单 28-19 创建了一个结构体类型，然后检查其标签。\n\n```\npackage\
  \ main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc inspectTags(s interface{},\
  \ tagName string) {\nstructType := reflect.TypeOf(s)\nfor i := 0; i < structType.NumField();\
  \ i++ {\nfield := structType.Field(i)\ntag := field.Tag\nvalGet := tag.Get(tagName)\n\
  valLookup, ok := tag.Lookup(tagName)\nPrintfln(\"Field: %v, Tag %v: %v\", field.Name,\
  \ tagName, valGet)\nPrintfln(\"Field: %v, Tag %v: %v, Set: %v\",\nfield.Name, tagName,\
  \ valLookup, ok)\n}\n}\nfunc main() {\nstringType := reflect.TypeOf(\"this is a\
  \ string\")\nstructType := reflect.StructOf([] reflect.StructField {\n{ Name: \"\
  Name\", Type: stringType, Tag: `alias:\"id\"` },\n{ Name: \"City\", Type: stringType,Tag:\
  \ `alias:\"\"`},\n{ Name: \"Country\", Type: stringType },\n})\ninspectTags(reflect.New(structType),\
  \ \"alias\")\n}\n清单 28-19\n在 reflection 文件夹的 main.go 文件中创建结构体类型\n```\n\n此示例创建了一个结构体，其特性与上一节中的\
  \ `Person` 结构体相同，包含 `Name`、`City` 和 `Country` 字段。这些字段通过创建 `StructField` 值来描述，这些值本身只是普通的\
  \ Go 结构体。使用 `New()` 函数根据该结构体创建一个新值，并将其传递给 `inspectTags()` 函数。编译并执行该项目，你将收到以下输出：\n\
  \n```\nField: typ, Tag alias:\nField: typ, Tag alias: , Set: false\nField: ptr,\
  \ Tag alias:\nField: ptr, Tag alias: , Set: false\nField: flag, Tag alias:\nField:\
  \ flag, Tag alias: , Set: false\n```\n\n\n\n### 使用结构体值\n\n`Value` 接口定义了表 28-17 中描述的方法，用于处理结构体值。\n\
  \n**表 28-17** 用于处理结构体的 Value 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `NumField()` |\
  \ 该方法返回结构体值类型所定义的字段数量。 |\n| `Field(index)` | 该方法返回一个 `Value`，反映指定索引处的字段。 |\n| `FieldByIndex(indices)`\
  \ | 该方法返回一个 `Value`，反映指定索引处的嵌套字段。 |\n| `FieldByName(name)` | 该方法返回一个 `Value`，反映找到的第一个具有指定名称的字段。\
  \ |\n| `FieldByNameFunc(func)` | 该方法将每个字段（包括嵌套字段）的名称传递给指定函数，并返回一个 `Value` 反映函数返回\
  \ `true` 的第一个字段，以及一个指示是否找到匹配项的 `bool`。 |\n\n表 28-17 中的方法对应于上一节中描述的处理结构体类型的方法。一旦你理解了结构体类型的构成，就可以为你感兴趣的每个字段获取一个\
  \ `Value`，并应用基本的反射功能，如清单 28-20 所示。\n\n```\npackage main\nimport (\n\"reflect\"\n\
  //\"strings\"\n//\"fmt\"\n)\nfunc getFieldValues(s interface{}) {\nstructValue :=\
  \ reflect.ValueOf(s)\nif structValue.Kind() == reflect.Struct {\nfor i := 0; i <\
  \ structValue.NumField(); i++ {\nfieldType := structValue.Type().Field(i)\nfieldVal\
  \ := structValue.Field(i)\nPrintfln(\"Name: %v, Type: %v, Value: %v\",\nfieldType.Name,\
  \ fieldType.Type, fieldVal)\n}\n} else {\nPrintfln(\"Not a struct\")\n}\n}\nfunc\
  \ main() {\nproduct := Product{ Name: \"Kayak\", Category: \"Watersports\", Price:\
  \ 279 }\ncustomer := Customer{ Name: \"Acme\", City: \"Chicago\" }\npurchase :=\
  \ Purchase { Customer: customer, Product: product, Total: 279,\ntaxRate: 10 }\n\
  getFieldValues(purchase)\n}\n清单 28-20\n在 reflection 文件夹的 main.go 文件中读取结构体字段值\n```\n\
  \n`getFieldValues` 函数枚举结构体定义的字段，并输出字段类型和值的详细信息。编译并执行该项目，你将看到以下输出：\n\n```\nName:\
  \ Customer, Type: main.Customer, Value: {Acme Chicago}\nName: Product, Type: main.Product,\
  \ Value: {Kayak Watersports 279}\nName: Total, Type: float64, Value: 279\nName:\
  \ taxRate, Type: float64, Value: 10\n```\n\n## 设置结构体字段值\n\n一旦你获取了结构体字段的 `Value`，就可以像更改任何其他反射值一样更改该字段，如清单\
  \ 28-21 所示。\n\n```\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\
  \n)\nfunc setFieldValue(s interface{}, newVals map[string]interface{}) {\nstructValue\
  \ := reflect.ValueOf(s)\nif (structValue.Kind() == reflect.Ptr &&\nstructValue.Elem().Kind()\
  \ == reflect.Struct) {\nfor name, newValue := range newVals {\nfieldVal := structValue.Elem().FieldByName(name)\n\
  if (fieldVal.CanSet()) {\nfieldVal.Set(reflect.ValueOf(newValue))\n} else if (fieldVal.CanAddr())\
  \ {\nptr := fieldVal.Addr()\nif (ptr.CanSet()) {\nptr.Set(reflect.ValueOf(newValue))\n\
  } else {\nPrintfln(\"Cannot set field via pointer\")\n}\n} else {\nPrintfln(\"Cannot\
  \ set field\")\n}\n}\n} else {\nPrintfln(\"Not a pointer to a struct\")\n}\n}\n\
  func getFieldValues(s interface{}) {\nstructValue := reflect.ValueOf(s)\nif structValue.Kind()\
  \ == reflect.Struct {\nfor i := 0; i < structValue.NumField(); i++ {\nfieldType\
  \ := structValue.Type().Field(i)\nfieldVal := structValue.Field(i)\nPrintfln(\"\
  Name: %v, Type: %v, Value: %v\",\nfieldType.Name, fieldType.Type, fieldVal)\n}\n\
  } else {\nPrintfln(\"Not a struct\")\n}\n}\nfunc main() {\nproduct := Product{ Name:\
  \ \"Kayak\", Category: \"Watersports\", Price: 279 }\ncustomer := Customer{ Name:\
  \ \"Acme\", City: \"Chicago\" }\npurchase := Purchase { Customer: customer, Product:\
  \ product, Total: 279,\ntaxRate: 10 }\nsetFieldValue(&purchase, map[string]interface{}\
  \ {\n\"City\": \"London\", \"Category\": \"Boats\", \"Total\": 100.50,\n})\ngetFieldValues(purchase)\n\
  }\n清单 28-21\n在 reflection 文件夹的 main.go 文件中设置结构体字段\n```\n\n与其他数据类型一样，反射只能通过指向结构体的指针来更改值。使用\
  \ `Elem` 方法跟随指针，以便可以使用表 28-17 中描述的方法之一获取反映字段的 `Value`。使用 `CanSet` 方法来确定是否可以设置字段。\n\
  \n对于非嵌套结构体的字段，需要额外步骤：使用 `Addr` 方法为字段值创建一个指针，如下所示：\n\n```\n...\n} else if (fieldVal.CanAddr())\
  \ {\nptr := fieldVal.Addr()\nif (ptr.CanSet()) {\nptr.Set(reflect.ValueOf(newValue))\n\
  ...\n```\n\n如果没有这个额外步骤，非嵌套字段的值将无法更改。清单 28-21 中的更改改变了 `City`、`Category` 和 `Total`\
  \ 字段的值，当编译并执行项目时，会产生以下输出：\n\n```\nName: Customer, Type: main.Customer, Value: {Acme\
  \ London}\nName: Product, Type: main.Product, Value: {Kayak Boats 279}\nName: Total,\
  \ Type: float64, Value: 100.5\nName: taxRate, Type: float64, Value: 10\n```\n\n\
  请注意，即使在清单 28-21 中调用了 `Addr` 方法来创建指针值之后，我仍然使用了 `CanSet` 方法。反射不能用于设置未导出的结构体字段，因此我需要执行额外的检查，以避免因尝试设置永远无法设置的字段而导致\
  \ panic。（实际上，有一些变通方法可以设置未导出的字段，但它们很糟糕，我不建议使用它们。如果你决心设置未导出的字段，网络搜索会为你提供所需的详细信息。）\n\
  \n## 总结\n\n在本章中，我继续描述了 Go 的反射功能，解释了如何将它们用于指针、数组、切片、映射和结构体。在下一章中，我将完成对这个重要但复杂的功能的描述。\n\
  \n"
- "# 29. 使用反射，第 3 部分\n\n在本章中，我将完成对 Go 反射支持功能的描述，该内容始于第 27 章，并在第 28 章中继续。在本章中，我将解释如何将反射用于函数、方法、接口和通道。表\
  \ 29-1 总结了本章内容。\n\n**表 29-1** 章节总结\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n\
  | 检查并调用反射函数 | 使用针对函数的 `Type` 和 `Value` 方法 | 5–7 |\n| 创建新函数 | 使用 `FuncOf` 和 `MakeFunc`\
  \ 函数 | 8, 9 |\n| 检查并调用反射方法 | 使用针对方法的 `Type` 和 `Value` 方法 | 10–12 |\n| 检查反射接口 | 使用针对接口的\
  \ `Type` 和 `Value` 方法 | 13–15 |\n| 检查并使用反射通道 | 使用针对通道的 `Type` 和 `Value` 方法 | 16–19\
  \ |\n\n\n\n## 准备工作\n\n本章将继续使用第 28 章中的 `reflection` 项目。为做好准备，请在 `reflection` 项目中添加一个名为\
  \ `interfaces.go` 的文件，其内容如代码清单 29-1 所示。\n\n**提示**  \n你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章以及本书其他所有章节的示例项目。如果在运行示例时遇到问题，请参阅第 2 章获取帮助。\n\n```go\npackage main\nimport\
  \ \"fmt\"\ntype NamedItem interface {\nGetName() string\nunexportedMethod()\n}\n\
  type CurrencyItem interface {\nGetAmount() string\ncurrencyName() string\n}\nfunc\
  \ (p *Product) GetName() string {\nreturn p.Name\n}\nfunc (c *Customer) GetName()\
  \ string {\nreturn c.Name\n}\nfunc (p *Product) GetAmount() string {\nreturn fmt.Sprintf(\"\
  $%.2f\", p.Price)\n}\nfunc (p *Product) currencyName() string {\nreturn \"USD\"\n\
  }\nfunc (p *Product) unexportedMethod() {}\n```\n*代码清单 29-1：`reflection` 文件夹中 `interfaces.go`\
  \ 文件的内容*\n\n在 `reflection` 文件夹中添加一个名为 `functions.go` 的文件，其内容如代码清单 29-2 所示。\n\n```go\n\
  package main\nfunc Find(slice []string, vals... string) (matches bool) {\nfor _,\
  \ s1 := range slice {\nfor _, s2 := range vals {\nif s1 == s2 {\nmatches = true\n\
  return\n}\n}\n}\nreturn\n}\n```\n*代码清单 29-2：`reflection` 文件夹中 `functions.go` 文件的内容*\n\
  \n在 `reflection` 文件夹中添加一个名为 `methods.go` 的文件，其内容如代码清单 29-3 所示。\n\n```go\npackage\
  \ main\nfunc (p Purchase) calcTax(taxRate float64) float64 {\nreturn p.Price * taxRate\n\
  }\nfunc (p Purchase) GetTotal() float64 {\nreturn p.Price + p.calcTax(.20)\n}\n\
  ```\n*代码清单 29-3：`reflection` 文件夹中 `methods.go` 文件的内容*\n\n在 `reflection` 文件夹中运行如代码清单\
  \ 29-4 所示的命令，以编译并执行项目。\n\n```bash\ngo run .\n```\n*代码清单 29-4：编译并执行项目*\n\n该命令将产生以下输出：\n\
  \n```\nName: Customer, Type: main.Customer, Value: {Acme London}\nName: Product,\
  \ Type: main.Product, Value: {Kayak Boats 279}\nName: Total, Type: float64, Value:\
  \ 100.5\nName: taxRate, Type: float64, Value: 10\n```\n\n### 使用函数类型\n\n如第 9 章所述，函数在\
  \ Go 中是一种类型，正如你所预料的，函数可以通过反射进行检查和使用。`Type` 结构体定义了一些可用于检查函数类型的方法，如表 29-2 所述。\n\n\
  *表 29-2：用于处理函数的 Type 方法*\n\n| 名称 | 描述 |\n| --- | --- |\n| `NumIn()` | 此方法返回函数定义的参数数量。\
  \ |\n| `In(index)` | 此方法返回一个 `Type`，反映指定索引处的参数。 |\n| `IsVariadic()` | 如果最后一个参数是可变参数，此方法返回\
  \ `true`。 |\n| `NumOut()` | 此方法返回函数定义的结果数量。 |\n| `Out(index)` | 此方法返回一个 `Type`，反映指定索引处的结果。\
  \ |\n\n代码清单 29-5 使用反射来描述一个函数。\n\n```go\npackage main\nimport (\n\"reflect\"\n//\"\
  strings\"\n//\"fmt\"\n)\nfunc inspectFuncType(f interface{}) {\nfuncType := reflect.TypeOf(f)\n\
  if (funcType.Kind() == reflect.Func) {\nPrintfln(\"Function parameters: %v\", funcType.NumIn())\n\
  for i := 0 ; i < funcType.NumIn(); i++ {\nparamType := funcType.In(i)\nif (i < funcType.NumIn()\
  \ -1) {\nPrintfln(\"Parameter #%v, Type: %v\", i, paramType)\n} else {\nPrintfln(\"\
  Parameter #%v, Type: %v, Variadic: %v\", i, paramType,\nfuncType.IsVariadic())\n\
  }\n}\nPrintfln(\"Function results: %v\", funcType.NumOut())\nfor i := 0 ; i < funcType.NumOut();\
  \ i++ {\nresultType := funcType.Out(i)\nPrintfln(\"Result #%v, Type: %v\", i, resultType)\n\
  }\n}\n}\nfunc main() {\ninspectFuncType(Find)\n}\n```\n*代码清单 29-5：在 `reflection`\
  \ 文件夹的 `main.go` 文件中反射一个函数*\n\n`inspectFuncType` 函数使用表 29-2 中描述的方法来检查函数类型，并报告其参数和结果。编译并执行该项目，你将看到以下输出，它描述了在代码清单\
  \ 29-2 中定义的 `Find` 函数：\n\n```\nParameter #0, Type: []string\nParameter #1, Type:\
  \ []string, Variadic: true\nFunction results: 1\nResult #0, Type: bool\n```\n\n\
  输出显示 `Find` 函数有两个参数，最后一个参数是可变参数，并有一个返回值。\n\n\n\n### 使用函数值\n\n`Value` 接口定义了表 29-3\
  \ 中描述的方法用于调用函数。\n\n**表 29-3** 用于调用函数的 `Value` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n\
  | `Call(params)` | 此函数使用 `[]Value` 作为参数来调用所反射的函数。结果是一个包含函数返回值的 `[]Value`。提供的参数值必须与函数定义的参数相匹配。\
  \ |\n\n`Call` 方法调用一个函数并返回一个包含结果的切片。函数的参数使用 `Value` 切片指定，并且 `Call` 方法会自动检测可变参数。结果作为另一个\
  \ `Value` 切片返回，如清单 29-6 所示。\n\n```go\npackage main\nimport (\n\"reflect\"\n//\"\
  strings\"\n//\"fmt\"\n)\nfunc invokeFunction(f interface{}, params ...interface{})\
  \ {\nparamVals := []reflect.Value {}\nfor _, p := range params {\nparamVals = append(paramVals,\
  \ reflect.ValueOf(p))\n}\nfuncVal := reflect.ValueOf(f)\nif (funcVal.Kind() == reflect.Func)\
  \ {\nresults := funcVal.Call(paramVals)\nfor i, r := range results {\nPrintfln(\"\
  Result #%v: %v\", i, r)\n}\n}\n}\nfunc main() {\nnames := []string { \"Alice\",\
  \ \"Bob\", \"Charlie\" }\ninvokeFunction(Find, names, \"London\", \"Bob\")\n}\n\
  Listing 29-6\nInvoking a Function in the main.go File in the reflection Folder\n\
  ```\n\n编译并执行该项目，您将看到以下输出：\n\n```\nResult #0: true\n```\n\n以这种方式调用函数并不是常见需求，因为调用代码本可以直接调用函数，但这个示例清晰地展示了\
  \ `Call` 方法的用法，并强调了参数和结果都使用 `Value` 切片来表示。清单 29-7 提供了一个更实际的示例。\n\n```go\npackage\
  \ main\nimport (\n\"reflect\"\n\"strings\"\n//\"fmt\"\n)\nfunc mapSlice(slice interface{},\
  \ mapper interface{}) (mapped []interface{}) {\nsliceVal := reflect.ValueOf(slice)\n\
  mapperVal := reflect.ValueOf(mapper)\nmapped = []interface{} {}\nif sliceVal.Kind()\
  \ == reflect.Slice && mapperVal.Kind() == reflect.Func &&\nmapperVal.Type().NumIn()\
  \ == 1 &&\nmapperVal.Type().In(0) == sliceVal.Type().Elem() {\nfor i := 0; i < sliceVal.Len();\
  \ i++ {\nresult := mapperVal.Call([]reflect.Value {sliceVal.Index(i)})\nfor _, r\
  \ := range result {\nmapped = append(mapped, r.Interface())\n}\n}\n}\nreturn\n}\n\
  func main() {\nnames := []string { \"Alice\", \"Bob\", \"Charlie\" }\nresults :=\
  \ mapSlice(names, strings.ToUpper)\nPrintfln(\"Results: %v\", results)\n}\nListing\
  \ 29-7\nCalling a Function on Slice Elements in the main.go File in the reflection\
  \ Folder\n```\n\n`mapSlice` 函数接受一个切片和一个函数，将每个切片元素传递给该函数，并返回结果。可能会倾向于像这样描述函数参数以指定参数数量：\n\
  \n```go\n...\nmapper func(interface{}) interface{}\n...\n```\n\n这种方法的问题在于，它限制了可使用的函数，仅能使用那些参数和结果类型被定义为空接口的函数。相反，将整个函数指定为一个单独的空接口值，如下所示：\n\
  \n```go\n...\nfunc mapSlice(slice interface{}, mapper interface{}) (mapped []interface{})\
  \ {\n...\n```\n\n这允许使用任何函数，但需要检查该函数以确保它能按预期使用：\n\n```go\n...\nif sliceVal.Kind()\
  \ == reflect.Slice && mapperVal.Kind() == reflect.Func &&\nmapperVal.Type().NumIn()\
  \ == 1 &&\nmapperVal.Type().In(0) == sliceVal.Type().Elem() {\n...\n```\n\n这些检查确保了函数定义了一个参数，并且该参数类型与切片元素类型匹配。编译并执行该项目，您将看到以下结果：\n\
  \n```\nResults: [ALICE BOB CHARLIE]\n```\n\n## 创建和调用新的函数类型和值\n\n`reflect` 包定义了表\
  \ 29-4 中描述的函数，用于创建新的函数类型和值。\n\n**表 29-4** 用于创建新函数类型和函数值的 `reflect` 函数\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `FuncOf(params, results, variadic)` | 此函数创建一个新的 `Type`，它反映了具有指定参数和结果的函数类型。最后一个参数指定该函数类型是否具有可变参数。参数和结果通过\
  \ `Type` 切片指定。 |\n| `MakeFunc(type, fn)` | 此函数返回一个 `Value`，它反映了一个新函数，该函数是对函数 `fn`\
  \ 的封装。该函数必须接受一个 `Value` 切片作为其唯一参数，并返回一个 `Value` 切片作为其唯一结果。 |\n\n`FuncOf` 函数的一个用途是创建一个类型签名，并用它来检查函数值的签名，取代上一节中执行的检查，如清单\
  \ 29-8 所示。\n\n```go\npackage main\nimport (\n\"reflect\"\n\"strings\"\n//\"fmt\"\
  \n)\nfunc mapSlice(slice interface{}, mapper interface{}) (mapped []interface{})\
  \ {\nsliceVal := reflect.ValueOf(slice)\nmapperVal := reflect.ValueOf(mapper)\n\
  mapped = []interface{} {}\nif sliceVal.Kind() == reflect.Slice && mapperVal.Kind()\
  \ == reflect.Func {\nparamTypes := []reflect.Type { sliceVal.Type().Elem() }\nresultTypes\
  \ := []reflect.Type {}\nfor i := 0; i < mapperVal.Type().NumOut(); i++ {\nresultTypes\
  \ = append(resultTypes, mapperVal.Type().Out(i))\n}\nexpectedFuncType := reflect.FuncOf(paramTypes,\n\
  resultTypes, mapperVal.Type().IsVariadic())\nif (mapperVal.Type() == expectedFuncType)\
  \ {\nfor i := 0; i < sliceVal.Len(); i++ {\nresult := mapperVal.Call([]reflect.Value\
  \ {sliceVal.Index(i)})\nfor _, r := range result {\nmapped = append(mapped, r.Interface())\n\
  }\n}\n} else {\nPrintfln(\"Function type not as expected\")\n}\n}\nreturn\n}\nfunc\
  \ main() {\nnames := []string { \"Alice\", \"Bob\", \"Charlie\" }\nresults := mapSlice(names,\
  \ strings.ToUpper)\nPrintfln(\"Results: %v\", results)\n}\nListing 29-8\nCreating\
  \ a Function Type in the main.go File in the reflection Folder\n```\n\n这种方法并不简洁，主要原因是我希望接受那些参数类型与切片元素类型相同但结果类型任意的函数。获取切片元素类型很简单，但我需要做一些工作来创建一个反映映射函数结果的\
  \ `Type` 切片，以确保我创建的类型能够被正确比较。编译并执行该项目，您将看到以下输出：\n\n```\nResults: [ALICE BOB CHARLIE]\n\
  ```\n\n`FuncOf` 函数由 `MakeFunc` 函数补充，后者使用函数类型作为模板来创建新函数。清单 29-9 演示了如何使用 `MakeFunc`\
  \ 函数创建一个可复用的类型化映射函数。\n\n\n\n## 关于反射创建函数的示例\n\n```go\npackage main\nimport (\n\"\
  reflect\"\n\"strings\"\n\"fmt\"\n)\nfunc makeMapperFunc(mapper interface{}) interface{}\
  \ {\nmapVal := reflect.ValueOf(mapper)\nif mapVal.Kind() == reflect.Func && mapVal.Type().NumIn()\
  \ == 1 &&\nmapVal.Type().NumOut() == 1 {\ninType := reflect.SliceOf( mapVal.Type().In(0))\n\
  inTypeSlice := []reflect.Type { inType }\noutType := reflect.SliceOf( mapVal.Type().Out(0))\n\
  outTypeSlice := []reflect.Type { outType }\nfuncType := reflect.FuncOf(inTypeSlice,\
  \ outTypeSlice, false)\nfuncVal := reflect.MakeFunc(funcType,\nfunc (params []reflect.Value)\
  \ (results []reflect.Value) {\nsrcSliceVal := params[0]\nresultsSliceVal := reflect.MakeSlice(outType,\
  \ srcSliceVal.Len(), 10)\nfor i := 0; i < srcSliceVal.Len(); i++ {\nr := mapVal.Call([]reflect.Value\
  \ { srcSliceVal.Index(i)})\nresultsSliceVal.Index(i).Set(r[0])\n}\nresults = []reflect.Value\
  \ { resultsSliceVal }\nreturn\n})\nreturn funcVal.Interface()\n}\nPrintfln(\"Unexpected\
  \ types\")\nreturn nil\n}\nfunc main() {\nlowerStringMapper := makeMapperFunc(strings.ToLower).(func([]string)[]string)\n\
  names := []string { \"Alice\", \"Bob\", \"Charlie\" }\nresults := lowerStringMapper(names)\n\
  Printfln(\"Lowercase Results: %v\", results)\nincrementFloatMapper := makeMapperFunc(func\
  \ (val float64) float64 {\nreturn val + 1\n}).(func([]float64)[]float64)\nprices\
  \ := []float64 { 279, 48.95, 19.50}\nfloatResults := incrementFloatMapper(prices)\n\
  Printfln(\"Increment Results: %v\", floatResults)\nfloatToStringMapper := makeMapperFunc(func\
  \ (val float64) string {\nreturn fmt.Sprintf(\"$%.2f\", val)\n}).(func([]float64)[]string)\n\
  Printfln(\"Price Results: %v\", floatToStringMapper(prices))\n}\n```\n\n### 理解 `makeMapperFunc`\
  \ 函数\n\n`makeMapperFunc`函数演示了反射的灵活性，但也展示了反射的冗长和复杂性。理解这个函数的最佳方式是关注其输入和输出。`makeMapperFunc`接受一个将一个值转换为另一个值的函数，其签名如下：\n\
  \n```go\nfunc mapper(int) string\n```\n\n这个假设的函数接收一个`int`值并产生一个`string`结果。`makeMapperFunc`使用该函数的类型来生成一个在常规\
  \ Go 代码中可能如下所示的函数：\n\n```go\nfunc useMapper(slice []int) []string {\nresults :=\
  \ []string {}\nfor _, val := range slice {\nresults = append(results, mapper(val))\n\
  }\nreturn results\n}\n```\n\n`useMapper`函数是`mapper`函数的包装器。在常规 Go 代码中定义`mapper`和`useMapper`函数很容易，但它们仅适用于单一类型集合。`makeMapperFunc`使用反射，以便它可以接收任何映射函数并生成相应的包装器，然后可以与标准的\
  \ Go 类型安全特性一起使用。\n\n#### 第一步：识别映射函数的类型\n\n```go\ninType := reflect.SliceOf( mapVal.Type().In(0))\n\
  inTypeSlice := []reflect.Type { inType }\noutType := reflect.SliceOf( mapVal.Type().Out(0))\n\
  outTypeSlice := []reflect.Type { outType }\n```\n\n#### 第二步：创建包装器的函数类型\n\n```go\n\
  funcType := reflect.FuncOf(inTypeSlice, outTypeSlice, false)\n```\n\n#### 第三步：使用\
  \ `MakeFunc` 创建包装器函数\n\n```go\nfuncVal := reflect.MakeFunc(funcType,\nfunc (params\
  \ []reflect.Value) (results []reflect.Value) {\n```\n\n`MakeFunc`函数接受描述函数的`Type`以及新函数将要调用的函数。在\
  \ Listing 29-9 中，该函数枚举切片中的元素，为每个元素调用映射函数，并构建结果切片。\n\n#### 结果：类型安全的函数\n\n结果是类型安全的函数，尽管它需要进行类型断言：\n\
  \n```go\nlowerStringMapper := makeMapperFunc(strings.ToLower).(func([]string)[]string)\n\
  ```\n\n`makeMapperFunc`被传入`strings.ToLower`函数，并生成一个接受`string`切片并返回`string`切片的函数。对`makeMapperFunc`的其他调用创建了将`float64`值转换为其他`float64`值的函数，以及将`float64`值转换为货币格式字符串的函数。\n\
  \n#### 运行结果\n\n编译并执行项目，您将看到以下输出：\n\n```text\nLowercase Results: [alice bob charlie]\n\
  Increment Results: [280 49.95 20.5]\nPrice Results: [$279.00 $48.95 $19.50]\n```\n\
  \n\n\n### 使用方法\n\n`Type` 结构体定义了表 29-5 所描述的方法，用于检查某个结构体所定义的方法。\n\n**表 29-5**  \n\
  使用方法的 `Type` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `NumMethod()` | 该方法返回反射的结构体类型所定义的导出方法的数量。\
  \ |\n| `Method(index)` | 该方法返回指定索引处的反射方法，以 `Method` 结构体表示。 |\n| `MethodByName(name)`\
  \ | 该方法返回具有指定名称的反射方法。返回结果是一个 `Method` 结构体，以及一个 `bool` 值，用于指示是否存在具有指定名称的方法。 |\n\n\
  > **注意：** 反射并不支持创建新方法。它只能用于检查并调用现有方法。\n\n方法使用 `Method` 结构体表示，该结构体定义了表 29-6 所描述的字段。\n\
  \n**表 29-6**  \n`Method` 结构体定义的字段\n\n| 名称 | 描述 |\n| --- | --- |\n| `Name` | 该字段以\
  \ `string` 形式返回方法的名称。 |\n| `PkgPath` | 该字段用于接口，如“使用接口”部分所述，而不用于通过结构体类型访问的方法。该字段返回一个包含包路径的\
  \ `string`。对于导出的字段，返回空字符串；对于未导出的字段，将包含结构体的包名称。 |\n| `Type` | 该字段返回一个描述方法函数类型的 `Type`。\
  \ |\n| `Func` | 该字段返回一个反映方法函数值的 `Value`。调用方法时，第一个参数必须是该方法被调用的结构体，如“调用方法”部分所示。 |\n\
  | `Index` | 该字段返回一个 `int`，用于指定方法索引，以便与表 29-5 中描述的 `Method` 方法配合使用。 |\n\n> **注意：**\
  \ 检查结构体时，从嵌入字段提升而来的方法也包含在本节所述方法产生的结果中。\n\n`Value` 接口也定义了用于处理反射方法的方法，如表 29-7 所述。\n\
  \n**表 29-7**  \n使用方法的 `Value` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `NumMethod()`\
  \ | 该方法返回反射的结构体类型所定义的导出方法的数量。它会调用 `Type.NumMethod` 方法。 |\n| `Method(index)` | 该方法返回一个\
  \ `Value`，用于反映指定索引处的方法函数。调用该函数时，接收器不作为第一个参数提供，如“调用方法”部分所示。 |\n| `MethodByName(name)`\
  \ | 该方法返回一个 `Value`，用于反映具有指定名称的方法函数。调用该函数时，接收器不作为第一个参数提供，如“调用方法”部分所示。 |\n\n表 29-7\
  \ 中的方法是便捷功能，它们提供了与表 29-5 中方法相同底层功能的访问途径，尽管在方法如何调用上存在差异，如下一节所述。\n\n代码清单 29-10 定义了一个函数，该函数使用\
  \ `Type` 结构体提供的方法来描述某个结构体所定义的方法。\n\n```go\npackage main\nimport (\n\"reflect\"\n\
  //\"strings\"\n//\"fmt\"\n)\nfunc inspectMethods(s interface{}) {\nsType := reflect.TypeOf(s)\n\
  if sType.Kind() == reflect.Struct || (sType.Kind() == reflect.Ptr &&\nsType.Elem().Kind()\
  \ == reflect.Struct) {\nPrintfln(\"Type: %v, Methods: %v\", sType, sType.NumMethod())\n\
  for i := 0; i < sType.NumMethod(); i++ {\nmethod := sType.Method(i)\nPrintfln(\"\
  Method name: %v, Type: %v\",\nmethod.Name, method.Type)\n}\n}\n}\nfunc main() {\n\
  inspectMethods(Purchase{})\ninspectMethods(&Purchase{})\n}\n```\n\n*代码清单 29-10：在\
  \ reflection 文件夹的 main.go 文件中描述方法*\n\nGo 语言让调用方法变得非常简单，允许通过结构体指针调用为结构体定义的方法，反之亦然。然而，当使用反射来检查类型时，结果并不总是一致，这可以从项目编译并执行后的输出中看出：\n\
  \n```\nType: main.Purchase, Methods: 1\nMethod name: GetTotal, Type: func(main.Purchase)\
  \ float64\nType: *main.Purchase, Methods: 2\nMethod name: GetAmount, Type: func(*main.Purchase)\
  \ string\nMethod name: GetTotal, Type: func(*main.Purchase) float64\n```\n\n当对 `Purchase`\
  \ 类型使用反射时，只会列出为 `Product` 定义的方法。但当对 `*Purchase` 类型使用反射时，则会列出为 `Product` 和 `*Product`\
  \ 定义的方法。请注意，只有导出的方法能通过反射访问——未导出的方法无法被检查或调用。\n\n## 调用方法\n\n`Method` 结构体定义了 `Func`\
  \ 字段，该字段返回一个 `Value`，可用于调用方法，采用本章前面介绍的相同方法，如代码清单 29-11 所示。\n\n```go\npackage main\n\
  import (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc executeFirstVoidMethod(s\
  \ interface{}) {\nsVal := reflect.ValueOf(s)\nfor i := 0; i < sVal.NumMethod();\
  \ i++ {\nmethod := sVal.Type().Method(i)\nif method.Type.NumIn() == 1 {\nresults\
  \ := method.Func.Call([]reflect.Value{ sVal })\nPrintfln(\"Type: %v, Method: %v,\
  \ Results: %v\",\nsVal.Type(), method.Name, results)\nbreak\n} else {\nPrintfln(\"\
  Skipping method %v %v\", method.Name, method.Type.NumIn())\n}\n}\n}\nfunc main()\
  \ {\nexecuteFirstVoidMethod(&Product { Name: \"Kayak\", Price: 279})\n}\n```\n\n\
  *代码清单 29-11：在 reflection 文件夹的 main.go 文件中调用方法*\n\n`executeFirstVoidMethod` 函数枚举参数类型所定义的方法，并调用第一个定义一个参数的方法。当通过\
  \ `Method.Func` 字段调用方法时，第一个参数必须是接收器，也就是方法将被调用的结构体值：\n\n```go\n...\nresults := method.Func.Call([]reflect.Value{\
  \ sVal })\n...\n```\n\n这意味着，查找具有一个参数的方法，实际上选择的是不接受参数的方法，这可以从项目编译并执行后的输出结果中看出：\n\n\
  ```\nType: *main.Product, Method: GetAmount, Results: [$279.00]\n```\n\n`executeFirstVoidMethod`\
  \ 函数选择了 `GetAmount` 方法。当通过 `Value` 接口调用方法时，不需要指定接收器，如代码清单 29-12 所示。\n\n```go\npackage\
  \ main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc executeFirstVoidMethod(s\
  \ interface{}) {\nsVal := reflect.ValueOf(s)\nfor i := 0; i < sVal.NumMethod();\
  \ i++ {\nmethod := sVal.Method(i)\nif method.Type().NumIn() == 0 {\nresults := method.Call([]reflect.Value{})\n\
  Printfln(\"Type: %v, Method: %v, Results: %v\",\nsVal.Type(), sVal.Type().Method(i).Name,\
  \ results)\nbreak\n} else {\nPrintfln(\"Skipping method %v %v\",\nsVal.Type().Method(i).Name,\
  \ method.Type().NumIn())\n}\n}\n}\nfunc main() {\nexecuteFirstVoidMethod(&Product\
  \ { Name: \"Kayak\", Price: 279})\n}\n```\n\n*代码清单 29-12：在 reflection 文件夹的 main.go\
  \ 文件中通过 Value 调用方法*\n\n为了找到可以在不提供额外参数的情况下调用的方法，我必须寻找零参数的方法，因为接收器不是显式指定的。相反，接收器是通过调用\
  \ `Call` 方法的 `Value` 来确定的：\n\n```go\n...\nresults := method.Call([]reflect.Value{})\n\
  ...\n```\n\n此示例产生的输出与代码清单 29-11 中的代码相同。\n\n\n\n### 使用接口\n\n`Type` 结构体定义了可用于检查接口类型的方法，详见表\
  \ 29-8。这些方法中的大多数也同样适用于结构体（如前几节所示），但其行为会略有不同。\n\n表 29-8\n用于接口的 Type 方法\n\n| 名称  \
  \               | 描述                                                           \
  \                                                                |\n| --------------------\
  \ | ------------------------------------------------------------------------------------------------------------------------------\
  \ |\n| `Implements(type)`   | 如果被反射的 `Value` 实现了指定的接口（该接口同样由 `Value` 表示），则此方法返回\
  \ `true`。                                           |\n| `Elem()`             |\
  \ 此方法返回一个 `Value`，该 `Value` 反映了接口所包含的值。                                        \
  \                                 |\n| `NumMethod()`        | 此方法返回为被反射的结构体类型定义的已导出方法数量。\
  \                                                                              \
  \ |\n| `Method(index)`      | 此方法返回指定索引处的被反射方法，该方法由 `Method` 结构体表示。            \
  \                                                  |\n| `MethodByName(name)` | 此方法返回具有指定名称的被反射方法。结果是一个\
  \ `Method` 结构体和一个 `bool` 值，用于指示是否存在具有指定名称的方法。                 |\n\n在使用反射处理接口时必须小心，因为\
  \ `reflect` 包总是从一个值开始，并会尝试处理该值的底层类型。解决此问题的最简单方法是转换一个 `nil` 值，如代码清单 29-13 所示。\n\n\
  ```go\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc checkImplementation(check\
  \ interface{}, targets ...interface{}) {\ncheckType := reflect.TypeOf(check)\nif\
  \ (checkType.Kind() == reflect.Ptr &&\ncheckType.Elem().Kind() == reflect.Interface)\
  \ {\ncheckType := checkType.Elem()\nfor _, target := range targets {\ntargetType\
  \ := reflect.TypeOf(target)\nPrintfln(\"Type %v implements %v: %v\",\ntargetType,\
  \ checkType, targetType.Implements(checkType))\n}\n}\n}\nfunc main() {\ncurrencyItemType\
  \ := (*CurrencyItem)(nil)\ncheckImplementation(currencyItemType, Product{}, &Product{},\
  \ &Purchase{})\n}\n```\n\n代码清单 29-13\n在 reflection 文件夹的 main.go 文件中反射一个接口\n\n为了指定我想要检查的接口，我将\
  \ `nil` 转换为一个指向该接口的指针，如下所示：\n\n```go\n...\ncurrencyItemType := (*CurrencyItem)(nil)\n\
  ...\n```\n\n这必须使用指针完成，随后在 `checkImplementation` 函数中使用 `Elem` 方法跟踪该指针，以获取一个反映该接口的\
  \ `Type`（在此示例中即 `CurrencyItem`）：\n\n```go\n...\nif (checkType.Kind() == reflect.Ptr\
  \ &&\ncheckType.Elem().Kind() == reflect.Interface) {\ncheckType := checkType.Elem()\n\
  ...\n```\n\n之后，就可以轻松地使用 `Implements` 方法检查某个类型是否实现了该接口。编译并执行该项目，你将看到以下输出：\n\n```\n\
  Type main.Product implements main.CurrencyItem: false\nType *main.Product implements\
  \ main.CurrencyItem: true\nType *main.Purchase implements main.CurrencyItem: true\n\
  ```\n\n输出显示 `Product` 结构体并未实现该接口，但 `*Product` 实现了，因为 `*Product` 是用于实现 `CurrencyItem`\
  \ 所需方法的接收者类型。`*Purchase` 类型也实现了该接口，因为它嵌套了定义所需方法的结构体字段。\n\n## 从接口获取底层值\n\n虽然反射通常会生成具体类型，但在某些情况下，必须使用\
  \ `Elem` 方法从接口转移到实现该接口的类型，如代码清单 29-14 所示。\n\n```go\npackage main\nimport (\n\"reflect\"\
  \n//\"strings\"\n//\"fmt\"\n)\ntype Wrapper struct {\nNamedItem\n}\nfunc getUnderlying(item\
  \ Wrapper, fieldName string) {\nitemVal := reflect.ValueOf(item)\nfieldVal := itemVal.FieldByName(fieldName)\n\
  Printfln(\"Field Type: %v\", fieldVal.Type())\nif (fieldVal.Kind() == reflect.Interface)\
  \ {\nPrintfln(\"Underlying Type: %v\", fieldVal.Elem().Type())\n}\n}\nfunc main()\
  \ {\ngetUnderlying(Wrapper{NamedItem: &Product{}}, \"NamedItem\")\n}\n```\n\n代码清单\
  \ 29-14\n在 reflection 文件夹的 main.go 文件中获取底层接口值\n\n`Wrapper` 类型定义了一个嵌套的 `NamedItem`\
  \ 字段。`getUnderlying` 函数使用反射获取该字段，并输出字段类型以及通过 `Elem` 方法获取的底层类型。编译并执行该项目，你将看到以下结果：\n\
  \n```\nField Type: main.NamedItem\nUnderlying Type: *main.Product\n```\n\n字段类型是\
  \ `NamedItem` 接口，但 `Elem` 方法显示分配给 `NamedItem` 字段的底层值是 `*Product`。\n\n## 检查接口方法\n\
  \n`NumMethod`、`Method` 和 `MethodByName` 方法可以用于接口类型，但结果会包含未导出的方法，而在直接检查结构体类型时则不会出现这种情况，如代码清单\
  \ 29-15 所示。\n\n```go\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\
  \n)\ntype Wrapper struct {\nNamedItem\n}\nfunc getUnderlying(item Wrapper, fieldName\
  \ string) {\nitemVal := reflect.ValueOf(item)\nfieldVal := itemVal.FieldByName(fieldName)\n\
  Printfln(\"Field Type: %v\", fieldVal.Type())\nfor i := 0; i < fieldVal.Type().NumMethod();\
  \ i++ {\nmethod := fieldVal.Type().Method(i)\nPrintfln(\"Interface Method: %v, Exported:\
  \ %v\",\nmethod.Name, method.PkgPath == \"\")\n}\nPrintfln(\"--------\")\nif (fieldVal.Kind()\
  \ == reflect.Interface) {\nPrintfln(\"Underlying Type: %v\", fieldVal.Elem().Type())\n\
  for i := 0; i < fieldVal.Elem().Type().NumMethod(); i++ {\nmethod := fieldVal.Elem().Type().Method(i)\n\
  Printfln(\"Underlying Method: %v\", method.Name)\n}\n}\n}\nfunc main() {\ngetUnderlying(Wrapper{NamedItem:\
  \ &Product{}}, \"NamedItem\")\n}\n```\n\n代码清单 29-15\n在 reflection 文件夹的 main.go 文件中检查接口方法\n\
  \n这些更改输出了从接口和底层类型获取的方法的详细信息。编译并执行该项目，你将看到以下输出：\n\n```\nField Type: main.NamedItem\n\
  Interface Method: GetName, Exported: true\nInterface Method: unexportedMethod, Exported:\
  \ false\n\nUnderlying Type: *main.Product\nUnderlying Method: GetAmount\nUnderlying\
  \ Method: GetName\n```\n\n`NamedItem` 接口的方法列表包含 `unexportedMethod`，而 `*Product`\
  \ 的方法列表中不包含该方法。`*Product` 定义了超出接口所需的方法，这就是输出中出现 `GetAmount` 方法的原因。\n\n可以通过接口调用方法，但必须在使用\
  \ `Call` 方法之前确保这些方法是已导出的。如果尝试调用未导出的方法，`Call` 将会触发 panic。\n\n\n\n### 使用通道类型\n\n`Type`\
  \ 结构体定义了可用于检查通道类型的方法，见表 29-9。\n\n**表 29-9** 通道的 Type 方法\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `ChanDir()` | 该方法返回一个 `ChanDir` 值，用于描述通道方向，该值使用表 29-10 中显示的值之一。 |\n|\
  \ `Elem()` | 该方法返回一个 `Type`，它反映通道携带的类型。 |\n\n由 `ChanDir` 方法返回的 `ChanDir` 结果指示通道的方向，可与表\
  \ 29-10 中描述的 `reflect` 包常量之一进行比较。\n\n**表 29-10** ChanDir 值\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `RecvDir` | 该值表示通道可用于接收数据。当表示为字符串时，该值返回 `<-chan`。 |\n| `SendDir` |\
  \ 该值表示通道可用于发送数据。当表示为字符串时，该值返回 `chan<-`。 |\n| `BothDir` | 该值表示通道可用于发送和接收数据。当表示为字符串时，该值返回\
  \ `chan`。 |\n\n清单 29-16 演示了如何使用表 29-9 中的方法来检查通道类型。\n\n```\npackage main\nimport\
  \ (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc inspectChannel(channel interface{})\
  \ {\nchannelType := reflect.TypeOf(channel)\nif (channelType.Kind() == reflect.Chan)\
  \ {\nPrintfln(\"Type %v, Direction: %v\",\nchannelType.Elem(), channelType.ChanDir())\n\
  }\n}\nfunc main() {\nvar c chan<- string\ninspectChannel(c)\n}\n清单 29-16\n在 reflection\
  \ 文件夹的 main.go 文件中检查通道类型\n```\n\n此示例中检查的通道是只发送的，当编译并执行项目时，会产生以下输出：\n\n```\nType\
  \ string, Direction: chan<-\n```\n\n### 使用通道值\n\n`Value` 接口定义了表 29-11 中描述的方法，用于处理通道。\n\
  \n**表 29-11** 通道的 Value 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Send(val)` | 此方法在通道上发送由\
  \ `Value` 参数反映的值。此方法会阻塞，直到值被发送。 |\n| `Recv()` | 此方法从通道接收一个值，该值作为用于反射的 `Value` 返回。此方法还返回一个\
  \ `bool`，指示是否接收到值，如果通道已关闭，则返回 `false`。此方法会阻塞，直到接收到值或通道已关闭。 |\n| `TrySend(val)` |\
  \ 此方法发送指定的值，但不会阻塞。`bool` 结果指示值是否已发送。 |\n| `TryRecv()` | 此方法尝试从通道接收一个值，但不会阻塞。结果是反映接收到的值的\
  \ `Value`，以及一个指示是否已接收到值的 `bool`。 |\n| `Close()` | 此方法关闭通道。 |\n\n清单 29-17 定义了一个函数，该函数接收一个通道和一个包含将通过通道发送的值的切片。\n\
  \n```\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc sendOverChannel(channel\
  \ interface{}, data interface{}) {\nchannelVal := reflect.ValueOf(channel)\ndataVal\
  \ := reflect.ValueOf(data)\nif (channelVal.Kind() == reflect.Chan &&\ndataVal.Kind()\
  \ == reflect.Slice &&\nchannelVal.Type().Elem() == dataVal.Type().Elem()) {\nfor\
  \ i := 0; i < dataVal.Len(); i++ {\nval := dataVal.Index(i)\nchannelVal.Send(val)\n\
  }\nchannelVal.Close()\n} else {\nPrintfln(\"Unexpected types: %v, %v\", channelVal.Type(),\
  \ dataVal.Type())\n}\n}\nfunc main() {\nvalues := []string { \"Alice\", \"Bob\"\
  , \"Charlie\", \"Dora\"}\nchannel := make(chan string)\ngo sendOverChannel(channel,\
  \ values)\nfor {\nif val, open := <- channel; open {\nPrintfln(\"Received value:\
  \ %v\", val)\n} else {\nbreak\n}\n}\n}\n清单 29-17\n在 reflection 文件夹的 main.go 文件中使用通道\n\
  ```\n\n`sendOverChannel` 函数检查其接收到的类型，枚举切片中的值，并通过通道发送每个值。发送所有值后，通道关闭。编译并执行项目，你将看到以下输出：\n\
  \n```\nReceived value: Alice\nReceived value: Bob\nReceived value: Charlie\nReceived\
  \ value: Dora\n```\n\n## 创建新的通道类型和值\n\n`reflect` 包定义了表 29-12 中描述的函数，用于创建新的通道类型和值。\n\
  \n**表 29-12** 用于创建通道类型和值的 reflect 包函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `ChanOf(dir,\
  \ type)` | 此函数返回一个 `Type`，它反映一个具有指定方向和数据类型（使用 `ChanDir` 和 `Value` 表示）的通道。 |\n| `MakeChan(type,\
  \ buffer)` | 此函数返回一个 `Value`，它反映一个使用指定 `Type` 和 `int` 缓冲区大小创建的新通道。 |\n\n清单 29-18\
  \ 定义了一个函数，该函数接收一个切片，并用它创建一个通道，然后使用该通道发送切片中的元素。\n\n```\npackage main\nimport (\n\"\
  reflect\"\n//\"strings\"\n//\"fmt\"\n)\nfunc createChannelAndSend(data interface{})\
  \ interface{} {\ndataVal := reflect.ValueOf(data)\nchannelType := reflect.ChanOf(reflect.BothDir,\
  \ dataVal.Type().Elem())\nchannel := reflect.MakeChan(channelType, 1)\ngo func()\
  \ {\nfor i := 0; i < dataVal.Len(); i++ {\nchannel.Send(dataVal.Index(i))\n}\nchannel.Close()\n\
  }()\nreturn channel.Interface()\n}\nfunc main() {\nvalues := []string { \"Alice\"\
  , \"Bob\", \"Charlie\", \"Dora\"}\nchannel := createChannelAndSend(values).(chan\
  \ string)\nfor {\nif val, open := <- channel; open {\nPrintfln(\"Received value:\
  \ %v\", val)\n} else {\nbreak\n}\n}\n}\n清单 29-18\n在 reflection 文件夹的 main.go 文件中创建通道\n\
  ```\n\n`createChannelAndSend` 函数使用切片的元素类型来创建通道类型，然后使用该类型创建一个通道。使用一个 goroutine 将切片中的元素发送到通道，并将该通道作为函数结果返回。编译并执行项目，你将看到以下输出：\n\
  \n```\nReceived value: Alice\nReceived value: Bob\nReceived value: Charlie\nReceived\
  \ value: Dora\n```\n\n\n\n## 从多个通道中选择\n\n第 14 章描述的通道选择功能可以在反射代码中使用，具体通过 `reflect`\
  \ 包提供的 `Select` 函数实现。表 29-13 对此进行了简要说明，方便快速查阅。\n\n**表 29-13** `reflect` 包中用于选择通道的函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Select(cases)` | 该函数接受一个 `SelectCase` 切片，其中每个元素描述一组发送或接收操作。返回结果为：被执行\
  \ `SelectCase` 的 `int` 类型索引、接收到的 `Value`（若选中的 case 是读取操作），以及一个指示是否读取到值或通道是否被阻塞/关闭的\
  \ `bool` 值。 |\n\n`SelectCase` 结构体用于表示单个 `case` 语句，其字段如表 29-14 所示。\n\n**表 29-14**\
  \ `SelectCase` 结构体字段\n\n| 名称 | 描述 |\n| --- | --- |\n| `Chan` | 该字段被赋值为表示通道的 `Value`。\
  \ |\n| `Dir` | 该字段被赋值为一个 `SelectDir` 值，用于指定当前 case 的通道操作类型。 |\n| `Send` | 该字段被赋值为表示发送操作中要发送到通道的值的\
  \ `Value`。 |\n\n`SelectDir` 类型是 `int` 的别名，`reflect` 包定义了表 29-15 中的常量，用于指定选择 case\
  \ 的类型。\n\n**表 29-15** `SelectDir` 常量\n\n| 名称 | 描述 |\n| --- | --- |\n| `SelectSend`\
  \ | 该常量表示向通道发送值的操作。 |\n| `SelectRecv` | 该常量表示从通道接收值的操作。 |\n| `SelectDefault` | 该常量表示\
  \ select 语句中的默认分支。 |\n\n使用反射定义 select 语句虽然冗长，但结果可以更灵活，并且能接受比常规 Go 代码更广泛的类型。清单 29-19\
  \ 使用 `Select` 函数从多个通道读取值。\n\n```\npackage main\n\nimport (\n\t\"reflect\"\n\t//\"\
  strings\"\n\t//\"fmt\"\n)\n\nfunc createChannelAndSend(data interface{}) interface{}\
  \ {\n\tdataVal := reflect.ValueOf(data)\n\tchannelType := reflect.ChanOf(reflect.BothDir,\
  \ dataVal.Type().Elem())\n\tchannel := reflect.MakeChan(channelType, 1)\n\n\tgo\
  \ func() {\n\t\tfor i := 0; i < dataVal.Len(); i++ {\n\t\t\tchannel.Send(dataVal.Index(i))\n\
  \t\t}\n\t\tchannel.Close()\n\t}()\n\n\treturn channel.Interface()\n}\n\nfunc readChannels(channels\
  \ ...interface{}) {\n\tchannelsVal := reflect.ValueOf(channels)\n\tcases := []reflect.SelectCase{}\n\
  \n\tfor i := 0; i < channelsVal.Len(); i++ {\n\t\tcases = append(cases, reflect.SelectCase{\n\
  \t\t\tChan: channelsVal.Index(i).Elem(),\n\t\t\tDir:  reflect.SelectRecv,\n\t\t\
  })\n\t}\n\n\tfor {\n\t\tcaseIndex, val, ok := reflect.Select(cases)\n\t\tif ok {\n\
  \t\t\tPrintfln(\"Value read: %v, Type: %v\", val, val.Type())\n\t\t} else {\n\t\t\
  \tif len(cases) == 1 {\n\t\t\t\tPrintfln(\"All channels closed.\")\n\t\t\t\treturn\n\
  \t\t\t}\n\t\t\tcases = append(cases[:caseIndex], cases[caseIndex+1:]...)\n\t\t}\n\
  \t}\n}\n\nfunc main() {\n\tvalues := []string{\"Alice\", \"Bob\", \"Charlie\", \"\
  Dora\"}\n\tchannel := createChannelAndSend(values).(chan string)\n\n\tcities :=\
  \ []string{\"London\", \"Rome\", \"Paris\"}\n\tcityChannel := createChannelAndSend(cities).(chan\
  \ string)\n\n\tprices := []float64{279, 48.95, 19.50}\n\tpriceChannel := createChannelAndSend(prices).(chan\
  \ float64)\n\n\treadChannels(channel, cityChannel, priceChannel)\n}\n```\n\n*清单\
  \ 29-19: 在 `reflection` 文件夹的 `main.go` 文件中使用 `Select` 函数*\n\n本示例使用 `createChannelAndSend`\
  \ 函数创建了三个通道，并将它们传递给 `readChannels` 函数。`readChannels` 函数使用 `Select` 函数读取值，直到所有通道关闭。为确保仅在打开的通道上执行读取操作，当\
  \ `SelectCase` 所代表的通道关闭时，会将其从传递给 `Select` 函数的切片中移除。编译并执行该项目，你将看到以下输出：\n\n```\nValue\
  \ read: London, Type: string\nValue read: Alice, Type: string\nValue read: Rome,\
  \ Type: string\nValue read: Bob, Type: string\nValue read: Paris, Type: string\n\
  Value read: Charlie, Type: string\nValue read: 279, Type: float64\nValue read: Dora,\
  \ Type: string\nValue read: 48.95, Type: float64\nValue read: 19.5, Type: float64\n\
  All channels closed.\n```\n\n由于使用了 goroutine 来发送通道中的值，你可能看到值的显示顺序有所不同。\n\n## 本章小结\n\
  \n在本章中，我描述了用于处理函数、方法、接口和通道的反射特性，至此完成了从第 27 章开始，并在第 28 章继续的 Go 反射特性的全部介绍。在下一章中，我将介绍用于协调\
  \ goroutine 的标准库特性。\n\n"
- "# 30. 协调 Goroutine\n\n在本章中，我将介绍 Go 标准库中用于协调 goroutine 的包及其特性。表 30-1 展示了本章所述特性的上下文。\n\
  \n**表 30-1** 将协调 Goroutine 的特性置于上下文中\n\n| 问题 | 答案 |\n| --- | --- |\n| 这些是什么？ | 当应用程序使用多个\
  \ goroutine 时，这些特性非常有用。 |\n| 为什么它们有用？ | 当 goroutine 共享数据，或当在服务器中使用一个 goroutine 跨多个\
  \ API 组件处理请求时，goroutine 的使用会变得复杂。 |\n| 如何使用它们？ | `sync` 包提供了管理 goroutine 的类型和函数，包括确保对数据的独占访问。`context`\
  \ 包提供了用于支持服务器处理请求的特性，这通常通过 goroutine 完成。 |\n| 是否有任何陷阱或局限性？ | 这些是高级特性，应谨慎使用。 |\n\
  | 是否有替代方案？ | 并非所有应用程序都需要这些特性，特别是如果它们使用不共享数据的 goroutine。 |\n\n表 30-2 总结了本章内容。\n\n\
  **表 30-2** 本章总结\n\n| 问题 | 解决方案 | 清单 |\n| --- | --- | --- |\n| 等待一个或多个 goroutine\
  \ 完成 | 使用等待组 | 5, 6 |\n| 防止多个 goroutine 同时访问数据 | 使用互斥锁 | 7–10 |\n| 等待某个事件发生 | 使用条件变量\
  \ | 11, 12 |\n| 确保函数只执行一次 | 使用 `Once` 结构体 | 13 |\n| 为跨服务器 API 边界处理的请求提供上下文 | 使用上下文\
  \ | 14–17 |\n\n\n\n## 准备工作\n\n要开始准备本章内容，请打开一个新的命令提示符窗口，导航到一个方便的位置，并创建一个名为 `coordination`\
  \ 的目录。然后在 `coordination` 文件夹中运行如代码清单 30-1 所示的命令，以创建一个模块文件。\n\n> **提示**  \n> 你可以从\
  \ [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go) 下载本章——以及本书其他所有章节——的示例项目。如果在运行示例时遇到问题，请参阅第\
  \ 2 章了解如何获取帮助。\n\n```\ngo mod init coordination\n代码清单 30-1\n初始化模块\n```\n\n在 `coordination`\
  \ 文件夹中添加一个名为 `printer.go` 的文件，其内容如代码清单 30-2 所示。\n\n```\npackage main\nimport \"\
  fmt\"\nfunc Printfln(template string, values ...interface{}) {\nfmt.Printf(template\
  \ + \"\\n\", values...)\n}\n代码清单 30-2\ncoordination 文件夹中 printer.go 文件的内容\n```\n\
  \n在 `coordination` 文件夹中添加一个名为 `main.go` 的文件，其内容如代码清单 30-3 所示。\n\n```\npackage main\n\
  func doSum(count int, val *int)  {\nfor i := 0; i < count; i++ {\n*val++\n}\n}\n\
  func main() {\ncounter := 0\ndoSum(5000, &counter)\nPrintfln(\"Total: %v\", counter)\n\
  }\n代码清单 30-3\ncoordination 文件夹中 main.go 文件的内容\n```\n\n在 `coordination` 文件夹中运行如代码清单\
  \ 30-4 所示的命令，以编译并执行该项目。\n\n```\ngo run .\n代码清单 30-4\n编译并执行项目\n```\n\n此命令将产生以下输出：\n\
  \n```\nTotal: 5000\n```\n\n### 使用等待组\n\n一个常见的问题是确保 `main` 函数在其启动的 goroutine 完成之前不会提前结束，因为一旦\
  \ `main` 结束，程序就会终止。至少对我来说，这种情况通常发生在将 goroutine 引入现有代码时，如代码清单 30-5 所示。\n\n```\npackage\
  \ main\nfunc doSum(count int, val *int)  {\nfor i := 0; i < count; i++ {\n*val++\n\
  }\n}\nfunc main() {\ncounter := 0\ngo doSum(5000, &counter)\nPrintfln(\"Total: %v\"\
  , counter)\n}\n代码清单 30-5\n在 coordination 文件夹的 main.go 文件中引入 Goroutine\n```\n\n创建\
  \ goroutine 是如此简单，以至于很容易忘记它们带来的影响。在这个例子中，`main` 函数的执行与 goroutine 并行进行，这意味着 `main`\
  \ 函数中的最后一条语句会在 goroutine 完成执行 `doSum` 函数之前就被执行，从而导致编译并执行项目时产生如下输出：\n\n```\nTotal:\
  \ 0\n```\n\n`sync` 包提供了 `WaitGroup` 结构体，该结构体可用于等待一个或多个 goroutine 完成，它使用了表 30-3 中描述的方法。\n\
  \n**表 30-3**  \n`WaitGroup` 结构体定义的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Add(num)`\
  \ | 此方法将 `WaitGroup` 正在等待的 goroutine 数量增加指定的 `int` 值。 |\n| `Done()` | 此方法将 `WaitGroup`\
  \ 正在等待的 goroutine 数量减一。 |\n| `Wait()` | 此方法会阻塞，直到对 `Add` 方法调用所指定的 goroutine 总数，每个都调用了\
  \ `Done` 方法一次。 |\n\n`WaitGroup` 充当一个计数器。当创建 goroutine 时，调用 `Add` 方法来指定要启动的 goroutine\
  \ 数量，这会增加计数器；之后调用 `Wait` 方法，该方法会阻塞。每个 goroutine 完成时，会调用 `Done` 方法，该方法会减少计数器。当计数器归零时，`Wait`\
  \ 方法停止阻塞，完成等待过程。代码清单 30-6 为示例添加了一个 `WaitGroup`。\n\n```\npackage main\nimport (\n\
  \"sync\"\n)\nvar waitGroup = sync.WaitGroup{}\nfunc doSum(count int, val *int) \
  \ {\nfor i := 0; i < count; i++ {\n*val++\n}\nwaitGroup.Done()\n}\nfunc main() {\n\
  counter := 0\nwaitGroup.Add(1)\ngo doSum(5000, &counter)\nwaitGroup.Wait()\nPrintfln(\"\
  Total: %v\", counter)\n}\n代码清单 30-6\n在 coordination 文件夹的 main.go 文件中使用 WaitGroup\n\
  ```\n\n如果计数器变为负数，`WaitGroup` 会触发 panic，因此在启动 goroutine 之前调用 `Add` 方法以防止 `Done` 方法被过早调用是很重要的。同样重要的是，确保传递给\
  \ `Add` 方法的值总和等于 `Done` 方法被调用的次数。如果 `Done` 调用次数过少，`Wait` 方法将永远阻塞；但如果 `Done` 方法被调用次数过多，则\
  \ `WaitGroup` 会触发 panic。示例中只有一个 goroutine，但如果你编译并执行该项目，你会看到它阻止了 `main` 函数提前结束，并产生以下输出：\n\
  \n```\nTotal: 5000\n```\n\n#### 避免复制陷阱\n\n切记不要复制 `WaitGroup` 值，因为这意味着不同的 goroutine\
  \ 将针对不同的值调用 `Done` 和 `Wait` 方法，这通常会导致应用程序死锁。如果你想将 `WaitGroup` 作为函数参数传递，则需要使用指针，示例如下：\n\
  \n```\npackage main\nimport (\n\"sync\"\n)\nfunc doSum(count int, val *int, waitGroup\
  \ * sync.WaitGroup)  {\nfor i := 0; i < count; i++ {\n*val++\n}\nwaitGroup.Done()\n\
  }\nfunc main() {\ncounter := 0\nwaitGroup := sync.WaitGroup{}\nwaitGroup.Add(1)\n\
  go doSum(5000, &counter, &waitGroup)\nwaitGroup.Wait()\nPrintfln(\"Total: %v\",\
  \ counter)\n}\n```\n\n此原则适用于本节中描述的所有结构体。作为经验法则，协调工作需要所有 goroutine 使用同一个结构体值。\n\n\
  \n\n### 使用互斥（Mutual Exclusion）\n\n如果多个 goroutine 访问同一份数据，那么有可能两个 goroutine 会同时访问该数据并导致意外结果。作为一个简单演示，清单\
  \ 30-7 增加了示例中使用的 goroutine 数量。\n\n```\npackage main\nimport (\n\"sync\"\n\"time\"\
  \n)\nvar waitGroup = sync.WaitGroup{}\nfunc doSum(count int, val *int)  {\ntime.Sleep(time.Second)\n\
  for i := 0; i < count; i++ {\n*val++\n}\nwaitGroup.Done()\n}\nfunc main() {\ncounter\
  \ := 0\nnumRoutines := 3\nwaitGroup.Add(numRoutines)\nfor i := 0; i < numRoutines;\
  \ i++ {\ngo doSum(5000, &counter)\n}\nwaitGroup.Wait()\nPrintfln(\"Total: %v\",\
  \ counter)\n}\n清单 30-7\n在 coordination 文件夹的 main.go 文件中使用更多 Goroutine\n```\n\n此清单增加了执行\
  \ `doSum` 函数的 goroutine 数量，这些 goroutine 都在同时访问同一个变量。（调用 `time.Sleep` 函数是为了确保所有 goroutine\
  \ 同时运行，这有助于强调本节要解决的问题，但不应在实际项目中这样做。）编译并执行该项目，你将看到以下输出：\n\n```\nTotal: 12129\n```\n\
  \n你可能会看到不同的结果，并且重复运行项目可能会每次生成不同的结果。你可能会得到正确结果——即 15,000，因为有三个 goroutine 各自执行 5,000\
  \ 次操作——但在我的机器上很少出现这种情况。这种行为可能因操作系统而异。在我的简单测试中，我在 Windows 上始终遇到问题，而在 Linux 上则更常成功。\n\
  \n问题在于增量运算符不是原子的，这意味着它需要几个步骤才能完成：读取 `counter` 变量、递增它、再写回它。这是一个简化说明，但问题在于这些步骤被 goroutine\
  \ 并行执行，并且开始重叠，如图 30-1 所示。\n\n![../images/512642_1_En_30_Chapter/512642_1_En_30_Fig1_HTML.jpg](img/512642_1_En_30_Fig1_HTML.jpg)\n\
  \n图 30-1\n\n多个 Goroutine 访问同一个变量\n\n第二个 goroutine 在第一个 goroutine 更新变量之前读取了它的值，这意味着两个\
  \ goroutine 都试图递增同一个值。结果是两个 goroutine 产生相同的结果并写入相同的值。这只是 goroutine 之间共享数据可能导致的潜在问题之一，但所有此类问题的根源都在于操作需要时间执行，在此期间其他\
  \ goroutine 也在试图处理该数据。\n\n解决这个问题的一种方法是使用*互斥（mutual exclusion）*，它确保某个 goroutine 拥有对所需数据的独占访问权，并阻止其他\
  \ goroutine 访问该数据。\n\n互斥就像从图书馆借书。在任何给定时间，只有一个人可以借出这本书，而所有其他想要这本书的人都必须等到第一个人用完，这时书才能被另一个人借出。\n\
  \n`sync` 包通过 `Mutex` 结构体提供了互斥功能，该结构体定义了表 30-4 中描述的方法。\n\n**表 30-4** `Mutex` 结构体定义的方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Lock()` | 该方法锁定 `Mutex`。如果 `Mutex` 已被锁定，该方法会阻塞直到它被解锁。\
  \ |\n| `Unlock()` | 该方法解锁 `Mutex`。 |\n\n清单 30-8 使用 `Mutex` 解决了示例中的问题。\n\n> **注意**\
  \  \n> 标准库包含 `sync/atomic` 包，该包定义了用于低级操作的函数，例如以原子方式递增整数，这意味着它们不会出现图 30-1 所示的那种问题。我没有描述这些函数，因为它们很难正确使用，并且\
  \ Go 开发团队建议改用本章介绍的功能。\n\n```\npackage main\nimport (\n\"sync\"\n\"time\"\n)\nvar\
  \ waitGroup = sync.WaitGroup{}\nvar mutex = sync.Mutex{}\nfunc doSum(count int,\
  \ val *int)  {\ntime.Sleep(time.Second)\nfor i := 0; i < count; i++ {\nmutex.Lock()\n\
  *val++\nmutex.Unlock()\n}\nwaitGroup.Done()\n}\nfunc main() {\ncounter := 0\nnumRoutines\
  \ := 3\nwaitGroup.Add(numRoutines)\nfor i := 0; i < numRoutines; i++ {\ngo doSum(5000,\
  \ &counter)\n}\nwaitGroup.Wait()\nPrintfln(\"Total: %v\", counter)\n}\n清单 30-8\n\
  在 coordination 文件夹的 main.go 文件中使用 Mutex\n```\n\n`Mutex` 在创建时是解锁状态，这意味着第一个调用 `Lock`\
  \ 方法的 goroutine 不会阻塞，并且能够递增 `counter` 变量。我们说该 goroutine *获得了锁*。任何其他调用 `Lock` 方法的\
  \ goroutine 都会阻塞，直到 `Unlock` 方法被调用（称为*释放锁*），此时另一个 goroutine 将能够获得锁并继续访问 `counter`\
  \ 变量。结果是同一时间只有一个 goroutine 可以递增该变量，如图 30-2 所示。\n\n![../images/512642_1_En_30_Chapter/512642_1_En_30_Fig2_HTML.jpg](img/512642_1_En_30_Fig2_HTML.jpg)\n\
  \n图 30-2\n\n使用互斥\n\n编译并执行该项目，你将看到以下输出，表明 goroutine 能够正确递增 `counter` 变量：\n\n```\n\
  Total: 15000\n```\n\n使用互斥时必须小心谨慎，仔细考虑互斥锁使用方式的影响非常重要。例如，在清单 30-8 中，我每次递增变量时都加锁和解锁互斥锁。使用互斥锁会产生开销，另一种方法是在执行\
  \ `for` 循环之前锁定互斥锁，如清单 30-9 所示。\n\n```\n...\nfunc doSum(count int, val *int)  {\n\
  time.Sleep(time.Second)\nmutex.Lock()\nfor i := 0; i < count; i++ {\n*val++\n}\n\
  mutex.Unlock()\nwaitGroup.Done()\n}\n...\n清单 30-9\n在 coordination 文件夹的 main.go 文件中减少\
  \ Mutex 操作次数\n```\n\n对于这样一个简单的例子，这是一种更明智的方法，但实际情况通常更复杂，锁定较大段的代码可能会降低应用程序的响应能力并影响整体性能。我的建议是，先从只锁定访问共享数据的语句开始。\n\
  \n## 避免 `Mutex` 陷阱\n\n使用互斥的最佳方法是小心谨慎并保守处理。你必须确保所有访问共享数据的代码都使用同一个 `Mutex`，并且每一次对\
  \ `Lock` 方法的调用都必须与一次对 `Unlock` 方法的调用相平衡。尝试进行巧妙增强或优化可能很诱人，但这可能导致性能不佳或应用程序死锁。\n\n\n\
  \n### 使用读写互斥锁\n\n`Mutex` 将所有 goroutine 视为平等的，并且只允许一个 goroutine 获取锁。`RWMutex` 结构体则更加灵活，它支持两类\
  \ goroutine：读者和写者。多个读者可以同时获取锁，或者单个写者可以获取锁。其设计思想是，读者只关心与写者的冲突，并且可以与其他读者无碍地并发执行。`RWMutex`\
  \ 结构体定义了表 30-5 中描述的方法。\n\n**表 30-5** `RWMutex` 定义的方法\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `RLock()` | 此方法尝试获取读锁，并会阻塞直到获取成功。 |\n| `RUnlock()` | 此方法释放读锁。 |\n| `Lock()`\
  \ | 此方法尝试获取写锁，并会阻塞直到获取成功。 |\n| `Unlock()` | 此方法释放写锁。 |\n| `RLocker()` | 此方法返回一个指向\
  \ `Locker` 的指针，用于获取和释放读锁，如“使用条件协调 Goroutine”部分所述。 |\n\n`RWMutex` 并不像看起来那么复杂。下面是\
  \ `RWMutex` 遵循的规则：\n\n- 如果 `RWMutex` 未锁定，则读者（通过调用 `RLock` 方法）或写者（通过调用 `Lock` 方法）均可获取锁。\n\
  - 如果锁被读者获取，则其他读者也可以通过调用 `RLock` 方法获取锁，该方法不会阻塞。`Lock` 方法会阻塞，直到所有读者通过调用 `RUnlock`\
  \ 方法释放锁。\n- 如果锁被写者获取，则 `RLock` 和 `Lock` 方法都会阻塞，以防止其他 goroutine 获取锁，直到调用了 `Unlock`\
  \ 方法。\n- 如果锁被读者获取，并且某个写者调用了 `Lock` 方法，则 `Lock` 和 `RLock` 方法都将阻塞，直到调用了 `Unlock` 方法。这可以防止互斥锁被读者永久锁定，而不给写者获取写锁的机会。\n\
  \n清单 30-10 演示了 `RWMutex` 的使用。\n\n```\npackage main\nimport (\n\"sync\"\n\"time\"\
  \n\"math\"\n\"math/rand\"\n)\nvar waitGroup = sync.WaitGroup{}\nvar rwmutex = sync.RWMutex{}\n\
  var squares = map[int]int {}\nfunc calculateSquares(max, iterations int) {\nfor\
  \ i := 0; i < iterations; i++ {\nval := rand.Intn(max)\nrwmutex.RLock();\nsquare,\
  \ ok := squares[val]\nrwmutex.RUnlock()\nif (ok) {\nPrintfln(\"Cached value: %v\
  \ = %v\", val, square)\n} else {\nrwmutex.Lock()\nif _, ok := squares[val]; !ok\
  \ {\nsquares[val] = int(math.Pow(float64(val), 2))\nPrintfln(\"Added value: %v =\
  \ %v\", val, squares[val])\n}\nrwmutex.Unlock()\n}\n}\nwaitGroup.Done()\n}\nfunc\
  \ main() {\nrand.Seed(time.Now().UnixNano())\n//counter := 0\nnumRoutines := 3\n\
  waitGroup.Add(numRoutines)\nfor i := 0; i < numRoutines; i++ {\ngo calculateSquares(10,\
  \ 5)\n}\nwaitGroup.Wait()\nPrintfln(\"Cached values: %v\", len(squares))\n}\n清单\
  \ 30-10\n在 coordination 文件夹的 main.go 文件中使用 RWMutex\n```\n\n`calculateSquares` 函数获取读锁来检查\
  \ map 中是否包含一个随机选择的键。如果 map 包含该键，则读取关联的值，并释放读锁。如果 map 不包含该键，则获取写锁，为 map 添加该键的值，然后释放写锁。\n\
  \n使用 `RWMutex` 意味着当一个 goroutine 持有读锁时，其他 goroutine 也可以获取该锁并进行读取操作。读取数据不会引起任何并发问题，除非同时有数据在被修改。如果一个\
  \ goroutine 调用了 `Lock` 方法，它将无法获取写锁，直到所有获取了读锁的 goroutine 都释放了它。\n\n请注意，在清单 30-10\
  \ 中，goroutine 在获取写锁之前会先释放读锁。`RWMutex` 不支持从读锁升级到写锁（你可能在其他语言中遇到过），你必须在调用 `Lock` 方法之前释放读锁，以避免死锁。在释放读锁和获取写锁之间可能存在延迟，在此期间其他\
  \ goroutine 可能获取写锁并做出更改，因此一旦获取了写锁，检查数据状态是否已更改非常重要，如下所示：\n\n```\n...\nrwmutex.Lock()\n\
  if _, ok := squares[val]; !ok {\nsquares[val] = int(math.Pow(float64(val), 2))\n\
  ...\n```\n\n编译并执行该项目，你将看到类似如下的输出，尽管具体结果由随机选择的键决定：\n\n```\nAdded value: 6 = 36\n\
  Added value: 2 = 4\nAdded value: 7 = 49\nCached value: 7 = 49\nAdded value: 8 =\
  \ 64\nCached value: 6 = 36\nAdded value: 1 = 1\nCached value: 1 = 1\nAdded value:\
  \ 3 = 9\nCached value: 8 = 64\nCached value: 8 = 64\nCached value: 1 = 1\nCached\
  \ value: 1 = 1\nAdded value: 5 = 25\nCached values: 7\n```\n\n\n\n### 使用条件变量协调协程\n\
  \n前一示例中的协程共享同一数据，但彼此之间是独立的。当协程需要协调（例如等待某个事件发生）时，可以使用`Cond`结构体。`sync`包提供了表 30-6 中描述的函数，用于创建`Cond`结构体值。\n\
  \n**表 30-6** 用于创建`Cond`值的`sync`函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `NewCond(*locker)`\
  \ | 此函数使用指定`Locker`的指针创建一个`Cond`。 |\n\n`NewCond`函数的参数是一个`Locker`，它是一个接口，定义了表 30-7\
  \ 中描述的方法。\n\n**表 30-7** `Locker`接口定义的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Lock()`\
  \ | 此方法获取由`Locker`管理的锁。 |\n| `Unlock()` | 此方法释放由`Locker`管理的锁。 |\n\n`Mutex`和`RWMutex`结构体定义了`Locker`接口要求的方法。对于`RWMutex`，`Lock`和`Unlock`方法操作的是写锁，而`RLocker`方法可用于获取一个操作读锁的`Locker`。表\
  \ 30-8 描述了`Cond`结构体定义的字段和方法。\n\n**表 30-8** `Cond`结构体定义的字段和方法\n\n| 名称 | 描述 |\n| ---\
  \ | --- |\n| `L` | 此字段返回传递给`NewCond`函数的`Locker`，用于获取锁。 |\n| `Wait()` | 此方法释放锁并挂起协程。\
  \ |\n| `Signal()` | 此方法唤醒一个等待中的协程。 |\n| `Broadcast()` | 此方法唤醒所有等待中的协程。 |\n\n清单 30-11\
  \ 演示了如何使用`Cond`向等待中的协程通知事件。\n\n```\npackage main\nimport (\n\"sync\"\n\"time\"\n\
  \"math\"\n\"math/rand\"\n)\nvar waitGroup = sync.WaitGroup{}\nvar rwmutex = sync.RWMutex{}\n\
  var readyCond = sync.NewCond(rwmutex.RLocker())\nvar squares = map[int]int {}\n\
  func generateSquares(max int) {\nrwmutex.Lock()\nPrintfln(\"生成数据...\")\nfor val\
  \ := 0; val < max; val++ {\nsquares[val] = int(math.Pow(float64(val), 2))\n}\nrwmutex.Unlock()\n\
  Printfln(\"广播条件\")\nreadyCond.Broadcast()\nwaitGroup.Done()\n}\nfunc readSquares(id,\
  \ max, iterations int) {\nreadyCond.L.Lock()\nfor len(squares) == 0 {\nreadyCond.Wait()\n\
  }\nfor i := 0; i < iterations; i++ {\nkey := rand.Intn(max)\nPrintfln(\"#%v 读取值:\
  \ %v = %v\", id, key, squares[key])\ntime.Sleep(time.Millisecond * 100)\n}\nreadyCond.L.Unlock()\n\
  waitGroup.Done()\n}\nfunc main() {\nrand.Seed(time.Now().UnixNano())\nnumRoutines\
  \ := 2\nwaitGroup.Add(numRoutines)\nfor i := 0; i < numRoutines; i++ {\ngo readSquares(i,\
  \ 10, 5)\n}\nwaitGroup.Add(1)\ngo generateSquares(10)\nwaitGroup.Wait()\nPrintfln(\"\
  缓存的值数量: %v\", len(squares))\n}\n清单 30-11\n在 coordination 文件夹的 main.go 文件中使用 Cond\n\
  ```\n\n这个示例需要协程之间进行协调，如果没有`Cond`，这种协调将难以实现。一个协程负责用数据值填充 map，然后由其他协程读取。读取者在运行之前需要收到数据生成完成的通知。\n\
  \n读取者通过获取`Cond`锁并调用`Wait`方法来等待，如下所示：\n\n```\n...\nreadyCond.L.Lock()\nfor len(squares)\
  \ == 0 {\nreadyCond.Wait()\n}\n...\n```\n\n调用`Wait`方法会挂起协程并释放锁，以便其他协程能够获取该锁。`Wait`方法的调用通常放在一个`for`循环中，该循环会检查协程正在等待的条件是否已满足，以确保数据处于预期状态。\n\
  \n当`Wait`方法解除阻塞时，无需再次获取锁，协程可以再次调用`Wait`方法，也可以访问共享数据。使用完共享数据后，必须释放锁：\n\n```\n...\n\
  readyCond.L.Unlock()\n...\n```\n\n生成数据的协程使用`RWMutex`获取写锁，修改数据，释放写锁，然后调用`Cond.Broadcast`方法，该方法会唤醒所有等待中的协程。编译并执行该项目，你将看到类似于下面的输出结果，其中随机选择的键值可能会有所不同：\n\
  \n```\n生成数据...\n广播条件\n#0 读取值: 4 = 16\n#1 读取值: 1 = 1\n#1 读取值: 5 = 25\n#0 读取值: 6 =\
  \ 36\n#0 读取值: 2 = 4\n#1 读取值: 2 = 4\n#1 读取值: 6 = 36\n#0 读取值: 6 = 36\n#0 读取值: 6 =\
  \ 36\n#1 读取值: 8 = 64\n缓存的值数量: 10\n```\n\n`readSquares`函数中调用`time.Sleep`函数减慢了数据的读取过程，这样两个读取协程就会同时处理数据，你可以从输出行中第一个数字的交错出现看到这一点。由于这些协程获取的是`RWMutex`读锁，因此它们都能获取锁并同时读取数据。清单\
  \ 30-12 更改了`Cond`使用的锁类型。\n\n```\n...\nvar waitGroup = sync.WaitGroup{}\nvar rwmutex\
  \ = sync.RWMutex{}\nvar readyCond = sync.NewCond(&rwmutex)\n...\n清单 30-12\n在 coordination\
  \ 文件夹的 main.go 文件中更改锁类型\n```\n\n这一更改意味着所有协程都使用写锁，即只有一个协程能够获取锁。编译并执行该项目，你会发现输出不再出现交错：\n\
  \n```\n生成数据...\n广播条件\n#0 读取值: 5 = 25\n#0 读取值: 8 = 64\n#0 读取值: 9 = 81\n#0 读取值: 0\
  \ = 0\n#0 读取值: 4 = 16\n#1 读取值: 7 = 49\n#1 读取值: 8 = 64\n#1 读取值: 5 = 25\n#1 读取值: 8\
  \ = 64\n#1 读取值: 5 = 25\n缓存的值数量: 10\n```\n\n\n\n### 确保函数只执行一次\n\n解决上一个示例的另一种方法是使用\
  \ `sync.Once` 结构体来确保 `generateSquares` 函数只执行一次。`Once` 结构体定义了一个方法，如表 30-9 所述。\n\n\
  **表 30-9** Once 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Do(func)` | 该方法执行指定的函数，但仅当该函数尚未被执行过时。\
  \ |\n\n代码清单 30-13 演示了 `Once` 结构体的使用。\n\n```go\npackage main\nimport (\n\"sync\"\n\
  \"time\"\n\"math\"\n\"math/rand\"\n)\nvar waitGroup = sync.WaitGroup{}\n//var rwmutex\
