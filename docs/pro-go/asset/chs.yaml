  if err != nil {\nrepo.Logger.Panicf(\"Cannot get inserted ID: %v\", err.Error())\n\
  tx.Rollback()\nreturn\n}\nstatement := tx.StmtContext(repo.Context, repo.Commands.SaveOrderLine)\n\
  for _, sel := range order.Products {\n_, err := statement.Exec(id, sel.Product.ID,\
  \ sel.Quantity)\nif err != nil {\nrepo.Logger.Panicf(\"Cannot exec SaveOrderLine\
  \ command: %v\", err.Error())\ntx.Rollback()\nreturn\n}\n}\nerr = tx.Commit()\n\
  if err != nil {\nrepo.Logger.Panicf(\"Transaction cannot be committed: %v\", err.Error())\n\
  err = tx.Rollback()\nif err != nil {\nrepo.Logger.Panicf(\"Transaction cannot be\
  \ rolled back: %v\", err.Error())\n}\n}\norder.ID = int(id)\n}\n```\n清单 37-16\n\
