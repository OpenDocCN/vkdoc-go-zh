  \ 27-4\nreflection 文件夹中 main.go 文件的内容\n```\n\n使用命令提示符，在`usingstrings`文件夹中运行清单 27-5\
  \ 所示的命令。\n\n```\ngo run .\n清单 27-5\n运行示例项目\n```\n\n项目中的代码将被编译并执行，产生以下结果：\n\n```\n\
  Product: Name: Kayak, Category: Watersports, Price: 279\n```\n\n\n\n### 理解反射的必要性\n\
  \nGo 的类型系统执行严格，这意味着当期望的是不同类型时，你不能使用某一类型的值。清单 27-6 创建了一个 `Customer` 值并将其传递给 `printDetails`\
  \ 函数，该函数定义了一个可变参数 `Product`。\n\n```\npackage main\nfunc printDetails(values ...Product)\
  \ {\nfor _, elem := range values {\nPrintfln(\"Product: Name: %v, Category: %v,\
  \ Price: %v\",\nelem.Name, elem.Category, elem.Price)\n}\n}\nfunc main() {\nproduct\
  \ := Product {\nName: \"Kayak\", Category: \"Watersports\", Price: 279,\n}\ncustomer\
  \ := Customer { Name: \"Alice\", City: \"New York\" }\nprintDetails(product, customer)\n\
  }\n```\n\n这段代码无法编译，因为它违反了 Go 的类型规则。当你编译项目时，会看到以下错误：\n\n```\n.\\main.go:16:17: cannot\
  \ use customer (type Customer) as type Product in argument to printDetails\n```\n\
  \n在第 11 章中，我介绍了接口，它允许通过方法定义共同特征，这些方法可以被任何实现该接口的类型调用。第 11 章还介绍了空接口，它可以用于接受任何类型，如清单\
  \ 27-7 所示。\n\n```\npackage main\nfunc printDetails(values ...interface{}) {\nfor\
  \ _, elem := range values {\nswitch val := elem.(type) {\ncase Product:\nPrintfln(\"\
  Product: Name: %v, Category: %v, Price: %v\",\nval.Name, val.Category, val.Price)\n\
  case Customer:\nPrintfln(\"Customer: Name: %v, City: %v\", val.Name, val.City)\n\
  }\n}\n}\nfunc main() {\nproduct := Product {\nName: \"Kayak\", Category: \"Watersports\"\
  , Price: 279,\n}\ncustomer := Customer { Name: \"Alice\", City: \"New York\" }\n\
  printDetails(product, customer)\n}\n```\n\n空接口允许 `printDetails` 函数接收任何类型，但由于接口未定义任何方法，因此不允许访问特定特性。需要使用类型断言将空接口缩小到特定类型，这样才能处理每个值。编译并执行代码，你将收到以下输出：\n\
  \n```\nProduct: Name: Kayak, Category: Watersports, Price: 279\nCustomer: Name:\
  \ Alice, City: New York\n```\n\n这种方法的局限性在于 `printDetails` 函数只能处理预先已知的类型。每当我向项目添加一个类型时，就必须扩展\
  \ `printDetails` 函数来处理该类型。\n\n许多项目处理的类型集合足够小，这不会成为问题，或者能够定义具有提供通用功能访问权限方法的接口。反射则解决了那些不满足这些条件的项目的问题，原因可能是要处理的类型数量庞大，或者无法编写接口和方法。\n\
  \n## 使用反射\n\n`reflect` 包提供了 Go 的反射特性，关键函数是 `TypeOf` 和 `ValueOf`，表 27-3 简要描述了这两个函数。\n\
  \n**表 27-3** 关键反射函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `TypeOf(val)` | 此函数返回一个实现了\
  \ `Type` 接口的值，该接口描述指定值的类型。 |\n| `ValueOf(val)` | 此函数返回一个 `Value` 结构体，该结构体允许检查和操作指定的值。\
  \ |\n\n`TypeOf` 和 `ValueOf` 函数及其结果背后有大量细节，很容易忽略反射为何有用。在深入细节之前，清单 27-8 修改了 `printDetails`\
  \ 函数以使用 `reflect` 包，使其能够处理任何类型，展示了应用反射所需的基本模式。\n\n```\npackage main\nimport (\n\"\
  reflect\"\n\"strings\"\n\"fmt\"\n)\nfunc printDetails(values ...interface{}) {\n\
  for _, elem := range values {\nfieldDetails := []string {}\nelemType := reflect.TypeOf(elem)\n\
  elemValue := reflect.ValueOf(elem)\nif elemType.Kind() == reflect.Struct {\nfor\
  \ i := 0; i < elemType.NumField(); i++ {\nfieldName := elemType.Field(i).Name\n\
  fieldVal := elemValue.Field(i)\nfieldDetails = append(fieldDetails,\nfmt.Sprintf(\"\
  %v: %v\", fieldName, fieldVal ))\n}\nPrintfln(\"%v: %v\", elemType.Name(), strings.Join(fieldDetails,\
  \ \", \"))\n} else {\nPrintfln(\"%v: %v\", elemType.Name(), elemValue)\n}\n}\n}\n\
  type Payment struct {\nCurrency string\nAmount float64\n}\nfunc main() {\nproduct\
  \ := Product {\nName: \"Kayak\", Category: \"Watersports\", Price: 279,\n}\ncustomer\
  \ := Customer { Name: \"Alice\", City: \"New York\" }\npayment := Payment { Currency:\
  \ \"USD\", Amount: 100.50 }\nprintDetails(product, customer, payment, 10, true)\n\
  }\n```\n\n使用反射的代码可能很冗长，但一旦熟悉了基础知识，基本模式就会变得容易理解。需要记住的关键点是，反射有两个协同工作的方面：**反射类型**和**反射值**。\n\
  \n**反射类型**让你能够在事先不知道的情况下访问 Go 类型的详细信息。你可以探索反射类型，通过 `Type` 接口定义的方法了解其细节和特性。\n\n**反射值**让你能够操作你所拥有的具体值。例如，当你不知道正在处理的类型时，你不能像在普通代码中那样仅通过读取结构体字段或调用方法来操作它。\n\
  \n反射类型和反射值的使用导致了代码冗长。例如，如果你知道正在处理一个 `Product` 结构体，你可以直接读取 `Name` 字段并获取 `string`\
  \ 结果。如果你不知道正在使用什么类型，那么必须使用反射类型来确定你是否在处理一个结构体，以及它是否有 `Name` 字段。一旦确定存在这样一个字段，你就使用反射值来读取该字段并获取其值。\n\
  \n反射可能会令人困惑，因此我将逐步介绍清单 27-8 中的语句，并简要描述每条语句的作用，这将为接下来对 `reflect` 包的详细描述提供一些背景。\n\n\
  `printDetails` 函数使用空接口定义了一个可变参数，该参数通过 `range` 关键字进行枚举：\n\n```\n...\nfunc printDetails(values\
  \ ...interface{}) {\nfor _, elem := range values {\n...\n```\n\n如前所述，空接口允许函数接受任何数据类型，但不允许访问任何特定类型的特性。`reflect`\
  \ 包用于获取每个接收值的反射类型和反射值：\n\n```\n...\nelemType := reflect.TypeOf(elem)\nelemValue\
  \ := reflect.ValueOf(elem)\n...\n```\n\n\n\n`TypeOf`函数返回反射类型，该类型由`Type`接口描述。`ValueOf`函数返回反射值，该值由`Value`接口表示。\n\
  \n下一步是确定正在处理什么类型的类型，通过调用`Type.Kind`方法完成：\n\n```\n...\nif elemType.Kind() == reflect.Struct\
  \ {\n...\n```\n\n`reflect`包定义了标识 Go 中不同种类类型的常量，我在表 27-5 中进行了描述。在此语句中，使用`if`语句判断反射类型是否为结构体。如果是结构体，则结合`NumField`方法使用`for`循环，该方法返回结构体定义的字段数量：\n\
  \n```\n...\nfor i := 0; i < elemType.NumField(); i++ {\n...\n```\n\n在`for`循环中，获取字段的名称和值：\n\
  \n```\n...\nfieldName := elemType.Field(i).Name\nfieldVal := elemValue.Field(i)\n\
  ...\n```\n\n对反射类型调用`Field`方法会返回一个`StructField`，它描述单个字段，包括`Name`字段。对反射值调用`Field`方法会返回一个`Value`结构体，它代表字段的值。\n\
  \n字段的名称和值被添加到一个字符串切片中，该切片构成输出的一部分。使用`fmt`包创建字段值的字符串表示：\n\n```\n...\nfieldDetails\
  \ = append(fieldDetails, fmt.Sprintf(\"%v: %v\", fieldName, fieldVal))\n...\n```\n\
  \n处理完所有结构体字段后，写出一个包含反射类型名称的字符串，该名称通过`Name`方法获取，并为每个字段获取详细信息：\n\n```\n...\nPrintfln(\"\
  %v: %v\", elemType.Name(), strings.Join(fieldDetails, \", \"))\n...\n```\n\n如果反射类型不是结构体，则写出更简单的消息，包含反射类型名称和值，其格式化由`fmt`包处理：\n\
  \n```\n...\nPrintfln(\"%v: %v\", elemType.Name(), elemValue)\n...\n```\n\n新代码允许`printDetails`函数接收任何数据类型，包括新定义的`Payment`结构体，以及诸如`int`和`bool`值之类的内置类型。编译并执行项目，你将看到以下输出：\n\
  \n```\nProduct: Name: Kayak, Category: Watersports, Price: 279\nCustomer: Name:\
  \ Alice, City: New York\nPayment: Currency: USD, Amount: 100.5\nint: 10\nbool: true\n\
  ```\n\n### 使用基本类型特性\n\n`Type`接口通过表 27-4 中描述的方法提供类型的基本详细信息。有专门的方法用于处理特定类型的类型，例如数组，这些将在后续章节中描述，但这些是提供所有类型基本详细信息的方法。\n\
  \n**表 27-4：Type 接口定义的基本方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Name()` | 此方法返回类型的名称。\
  \ |\n| `PkgPath()` | 此方法返回类型的包路径。对于内置类型，如`int`和`bool`，返回空字符串。 |\n| `Kind()` | 此方法返回类型的种类，使用与`reflect`包定义的常量值之一匹配的值，如表\
  \ 27-5 所述。 |\n| `String()` | 此方法返回类型名称的字符串表示，包括包名称。 |\n| `Comparable()` | 如果此类型的值可以使用标准比较运算符进行比较，则此方法返回`true`，如“比较值”部分所述。\
  \ |\n| `AssignableTo(type)` | 如果此类型的值可以分配给指定反射类型的变量或字段，则此方法返回`true`。 |\n\n`reflect`包定义了一个名为`Kind`的类型，它是`uint`的别名，并用于一系列描述不同类型种类的常量，如表\
  \ 27-5 所述。\n\n**表 27-5：Kind 常量**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Bool` | 此值表示`bool`。\
  \ |\n| `Int`, `Int8`, `Int16`, `Int32`, `Int64` | 这些值表示不同大小的整数类型。 |\n| `Uint`, `Uint8`,\
  \ `Uint16`, `Uint32`, `Uint64` | 这些值表示不同大小的无符号整数类型。 |\n| `Float32`, `Float64` |\
  \ 这些值表示不同大小的浮点类型。 |\n| `String` | 此值表示字符串。 |\n| `Struct` | 此值表示结构体。 |\n| `Array`\
  \ | 此值表示数组。 |\n| `Slice` | 此值表示切片。 |\n| `Map` | 此值表示映射。 |\n| `Chan` | 此值表示通道。 |\n\
  | `Func` | 此值定义一个函数。 |\n| `Interface` | 此值表示接口。 |\n| `Ptr` | 此值表示指针。 |\n| `Uintptr`\
  \ | 此值表示不安全指针，本书未对此进行描述。 |\n\n清单 27-9 简化了示例，以显示`printDetails`函数接收的每个值的反射类型的详细信息。\n\
  \n```\npackage main\nimport (\n    \"reflect\"\n    // \"strings\"\n    // \"fmt\"\
  \n)\nfunc getTypePath(t reflect.Type) (path string) {\n    path = t.PkgPath()\n\
  \    if (path == \"\") {\n        path = \"(built-in)\"\n    }\n    return\n}\n\
  func printDetails(values ...interface{}) {\n    for _, elem := range values {\n\
  \        elemType := reflect.TypeOf(elem)\n        Printfln(\"Name: %v, PkgPath:\
  \ %v, Kind: %v\",\n            elemType.Name(), getTypePath(elemType), elemType.Kind())\n\
  \    }\n}\ntype Payment struct {\n    Currency string\n    Amount float64\n}\nfunc\
  \ main() {\n    product := Product {\n        Name: \"Kayak\", Category: \"Watersports\"\
  , Price: 279,\n    }\n    customer := Customer { Name: \"Alice\", City: \"New York\"\
  \ }\n    payment := Payment { Currency: \"USD\", Amount: 100.50 }\n    printDetails(product,\
  \ customer, payment, 10, true)\n}\n**清单 27-9：在 reflection 文件夹的 main.go 文件中打印类型详细信息**\n\
  ```\n\n我添加了一个函数来替换空的包名称，以便更清楚地描述内置类型。编译并执行项目，你将看到以下输出：\n\n```\nName: Product, PkgPath:\
  \ main, Kind: struct\nName: Customer, PkgPath: main, Kind: struct\nName: Payment,\
  \ PkgPath: main, Kind: struct\nName: int, PkgPath: (built-in), Kind: int\nName:\
  \ bool, PkgPath: (built-in), Kind: bool\n```\n\n许多特定于单个类型种类（例如数组）的反射特性，如果对其他类型调用，会导致\
  \ panic，这使得`Kind`方法在使用反射时尤其重要。\n\n\n\n### 使用基本值特性\n\n对于每组反射类型特性，都有相应的反射值特性。`Value`\
  \ 结构体定义了表 27-6 中描述的方法，这些方法提供了对基本反射特性的访问，包括访问底层值。\n\n**表 27-6** `Value` 结构体定义的基本方法\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Kind()` | 此方法使用表 27-5 中的某个值返回该值类型的种类。 |\n| `Type()`\
  \ | 此方法返回该 `Value` 对应的 `Type`。 |\n| `IsNil()` | 如果该值为 `nil`，则此方法返回 `true`。如果底层值不是函数、接口、指针、切片或通道，此方法将引发\
  \ panic。 |\n| `IsZero()` | 如果底层值是其类型的零值，则此方法返回 `true`。 |\n| `Bool()` | 此方法返回底层的\
  \ `bool` 值。如果底层值的 `Kind` 不是 `Bool`，此方法将引发 panic。 |\n| `Bytes()` | 此方法返回底层的 `[]byte`\
  \ 值。如果底层值不是 `byte` 切片，此方法将引发 panic。我将在“识别字节切片”部分演示如何确定切片的类型。 |\n| `Int()` | 此方法以\
  \ `int64` 形式返回底层值。如果底层值的 `Kind` 不是 `Int`、`Int8`、`Int16`、`Int32` 或 `Int64`，此方法将引发\
  \ panic。 |\n| `Uint()` | 此方法以 `uint64` 形式返回底层值。如果底层值的 `Kind` 不是 `Uint`、`Uint8`、`Uint16`、`Uint32`\
  \ 或 `Uint64`，此方法将引发 panic。 |\n| `Float()` | 此方法以 `float64` 形式返回底层值。如果底层值的 `Kind`\
  \ 不是 `Float32` 或 `Float64`，此方法将引发 panic。 |\n| `String()` | 如果值的 `Kind` 是 `String`，此方法以字符串形式返回底层值。对于其他\
  \ `Kind` 值，此方法返回字符串 `<T Value>`，其中 `T` 是底层类型，例如 `<int Value>`。 |\n| `Elem()` | 此方法返回指针所引用的\
  \ `Value`。此方法也可与接口一起使用，如第 29 章所述。如果底层值的 `Kind` 不是 `Ptr`，此方法将引发 panic。 |\n| `IsValid()`\
  \ | 如果 `Value` 是零值（例如通过 `Value{}` 创建，而不是通过 `ValueOf` 获取），则此方法返回 `false`。此方法不涉及是其反射类型零值的反射值。如果此方法返回\
  \ `false`，则所有其他 `Value` 方法都将引发 panic。 |\n\n在使用返回底层值的方法时，务必检查 `Kind` 结果以避免 panic。清单\
  \ 27-10 演示了表中描述的一些方法。\n\n```go\npackage main\nimport (\n\"reflect\"\n// \"strings\"\
  \n// \"fmt\"\n)\nfunc printDetails(values ...interface{}) {\nfor _, elem := range\
  \ values {\nelemValue := reflect.ValueOf(elem)\nswitch elemValue.Kind() {\ncase\
  \ reflect.Bool:\nvar val bool = elemValue.Bool()\nPrintfln(\"Bool: %v\", val)\n\
  case reflect.Int:\nvar val int64 = elemValue.Int()\nPrintfln(\"Int: %v\", val)\n\
  case reflect.Float32, reflect.Float64:\nvar val float64 = elemValue.Float()\nPrintfln(\"\
  Float: %v\", val)\ncase reflect.String:\nvar val string = elemValue.String()\nPrintfln(\"\
  String: %v\", val)\ncase reflect.Ptr:\nvar val reflect.Value = elemValue.Elem()\n\
  if (val.Kind() == reflect.Int) {\nPrintfln(\"Pointer to Int: %v\", val.Int())\n\
  }\ndefault:\nPrintfln(\"Other: %v\", elemValue.String())\n}\n}\n}\nfunc main() {\n\
  product := Product {\nName: \"Kayak\", Category: \"Watersports\", Price: 279,\n\
  }\nnumber := 100\nprintDetails(true, 10, 23.30, \"Alice\", &number, product)\n}\n\
  ```\n\n**清单 27-10** 在 `reflection` 文件夹的 `main.go` 文件中使用基本值方法\n\n此示例使用 `switch` 语句结合\
  \ `Kind` 方法的结果来确定值的类型，并调用适当的方法来获取底层值。编译并执行该项目，你将看到以下输出：\n\n```\nBool: true\nInt:\
  \ 10\nFloat: 23.3\nString: Alice\nPointer to Int: 100\nOther: \n```\n\n`String`\
  \ 方法的行为与其他方法不同，当在非 `string` 类型的值上调用时不会引发 panic。相反，该方法会返回类似这样的 `string`：\n\n```\n\
  ...\nOther: \n...\n```\n\n这不是 Go 标准库中其他地方常见的 `String` 方法用法，在这些地方，此方法通常返回某个值的 `string`\
  \ 表示。在使用反射时，你可以使用后面章节描述的技术，或者依赖使用相同技术的 `format` 包来为你创建值的 `string` 表示。\n\n### 识别类型\n\
  \n请注意，在清单 27-10 中处理指针时需要两个步骤。第一步使用 `Kind` 方法识别 `Ptr` 值，第二步使用 `Elem` 方法获取表示指针所引用数据的\
  \ `Value`：\n\n```go\n...\ncase reflect.Ptr:\nvar val reflect.Value = elemValue.Elem()\n\
  if (val.Kind() == reflect.Int) {\nPrintfln(\"Pointer to Int: %v\", val.Int())\n\
  }\n...\n```\n\n第一步告诉我正在处理一个指针，第二步告诉我它指向一个 `int` 值。这个过程可以通过执行反射类型的比较来简化。如果两个值具有相同的\
  \ Go 数据类型，那么将比较运算符应用于 `reflect.TypeOf` 函数的结果时，它将返回 `true`，如清单 27-11 所示。\n\n```go\n\
  package main\nimport (\n\"reflect\"\n// \"strings\"\n// \"fmt\"\n)\nvar intPtrType\
  \ = reflect.TypeOf((*int)(nil))\nfunc printDetails(values ...interface{}) {\nfor\
  \ _, elem := range values {\nelemValue := reflect.ValueOf(elem)\nelemType := reflect.TypeOf(elem)\n\
  if (elemType == intPtrType) {\nPrintfln(\"Pointer to Int: %v\", elemValue.Elem().Int())\n\
  } else {\nswitch elemValue.Kind() {\ncase reflect.Bool:\nvar val bool = elemValue.Bool()\n\
  Printfln(\"Bool: %v\", val)\ncase reflect.Int:\nvar val int64 = elemValue.Int()\n\
  Printfln(\"Int: %v\", val)\ncase reflect.Float32, reflect.Float64:\nvar val float64\
  \ = elemValue.Float()\nPrintfln(\"Float: %v\", val)\ncase reflect.String:\nvar val\
  \ string = elemValue.String()\nPrintfln(\"String: %v\", val)\n// case reflect.Ptr:\n\
  //     var val reflect.Value = elemValue.Elem()\n//     if (val.Kind() == reflect.Int)\
  \ {\n//         Printfln(\"Pointer to Int: %v\", val.Int())\n//     }\ndefault:\n\
  Printfln(\"Other: %v\", elemValue.String())\n}\n}\n}\n}\nfunc main() {\nproduct\
  \ := Product {\nName: \"Kayak\", Category: \"Watersports\", Price: 279,\n}\nnumber\
  \ := 100\nprintDetails(true, 10, 23.30, \"Alice\", &number, product)\n}\n```\n\n\
  **清单 27-11** 在 `reflection` 文件夹的 `main.go` 文件中比较类型\n\n这种技术从一个 `nil` 值开始，将其转换为一个指向\
  \ `int` 值的指针，然后将其传递给 `TypeOf` 函数以获取一个可用于比较的 `Type`：\n\n```go\n...\nvar intPtrType\
  \ = reflect.TypeOf((*int)(nil))\n...\n```\n\n执行此操作所需的括号使其难以阅读，但这种方法避免了仅为了获取其 `Type`\
  \ 而定义变量的需要。该 `Type` 可以与普通的 Go 比较运算符一起使用：\n\n```go\n...\nif (elemType == intPtrType)\
  \ {\nPrintfln(\"Pointer to Int: %v\", elemValue.Elem().Int())\n} else {\n...\n```\n\
  \n像这样比较类型可能比检查指针类型及其指向值的 `Kind` 值更简单。编译并执行代码，你将看到以下输出：\n\n```\nBool: true\nInt:\
  \ 10\nFloat: 23.3\nString: Alice\nPointer to Int: 100\nOther: \n```\n\n\n\n### 识别字节切片\n\
  \n使用比较运算符也是安全调用 `Bytes()` 方法的一种好方式。如果对非字节切片类型调用 `Bytes()` 方法，程序会崩溃（panic），但 `Kind()`\
  \ 方法仅能指示切片类型，而无法区分其内容。清单 27-12 为 `byte` 切片定义了一个类型变量，并与比较运算符配合使用，以判断何时可以安全调用 `Bytes()`\
  \ 方法。\n\n```go\npackage main\nimport (\n\"reflect\"\n// \"strings\"\n// \"fmt\"\n\
  )\nvar intPtrType = reflect.TypeOf((*int)(nil))\nvar byteSliceType = reflect.TypeOf([]byte(nil))\n\
  func printDetails(values ...interface{}) {\nfor _, elem := range values {\nelemValue\
  \ := reflect.ValueOf(elem)\nelemType := reflect.TypeOf(elem)\nif (elemType == intPtrType)\
  \ {\nPrintfln(\"Pointer to Int: %v\", elemValue.Elem().Int())\n} else if (elemType\
  \ == byteSliceType) {\nPrintfln(\"Byte slice: %v\", elemValue.Bytes())\n} else {\n\
  switch elemValue.Kind() {\ncase reflect.Bool:\nvar val bool = elemValue.Bool()\n\
  Printfln(\"Bool: %v\", val)\ncase reflect.Int:\nvar val int64 = elemValue.Int()\n\
  Printfln(\"Int: %v\", val)\ncase reflect.Float32, reflect.Float64:\nvar val float64\
  \ = elemValue.Float()\nPrintfln(\"Float: %v\", val)\ncase reflect.String:\nvar val\
  \ string = elemValue.String()\nPrintfln(\"String: %v\", val)\ndefault:\nPrintfln(\"\
  Other: %v\", elemValue.String())\n}\n}\n}\n}\nfunc main() {\nproduct := Product\
  \ {\nName: \"Kayak\", Category: \"Watersports\", Price: 279,\n}\nnumber := 100\n\
  slice := []byte(\"Alice\")\nprintDetails(true, 10, 23.30, \"Alice\", &number, product,\
  \ slice)\n}\n清单 27-12\n在 reflection 文件夹的 main.go 文件中识别字节切片\n```\n\n编译并执行该项目，你将看到以下输出，其中包含了对\
  \ `byte` 切片的检测：\n\n```\nBool: true\nInt: 10\nFloat: 23.3\nString: Alice\nPointer\
  \ to Int: 100\nOther: \nByte slice: [65 108 105 99 101]\n```\n\n### 获取底层值\n\n`Value`\
  \ 结构体定义了表 27-7 中描述的方法，用于获取底层值。\n\n**表 27-7** 用于获取底层值的 `Value` 方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Interface()` | 此方法通过空接口返回底层值。如果用于未导出的结构体字段，此方法会崩溃（panic）。|\n|\
  \ `CanInterface()` | 如果 `Interface()` 方法可以安全使用而不会崩溃，此方法返回 `true`。|\n\n`Interface()`\
  \ 方法允许你跳出反射，获取一个可由普通 Go 代码使用的值，如清单 27-13 所示。\n\n```go\npackage main\nimport (\n\"\
  reflect\"\n// \"strings\"\n// \"fmt\"\n)\nfunc selectValue(data interface{}, index\
  \ int) (result interface{}) {\ndataVal := reflect.ValueOf(data)\nif (dataVal.Kind()\
  \ == reflect.Slice) {\nresult = dataVal.Index(index).Interface()\n}\nreturn\n}\n\
  func main() {\nnames := []string {\"Alice\", \"Bob\", \"Charlie\"}\nval := selectValue(names,\
  \ 1).(string)\nPrintfln(\"Selected: %v\", val)\n}\n清单 27-13\n在 reflection 文件夹的 main.go\
  \ 文件中获取底层值\n```\n\n`selectValue` 函数用于从切片中选择一个值，而无需知道切片的元素类型。该值通过 `Index()` 方法从切片中获取，该方法在第\
  \ 28 章中有描述。对于本章来说，重要的是 `Index()` 方法返回一个 `Value`，这仅对使用反射的代码有用。`Interface()` 方法用于获取一个可作为函数结果的值：\n\
  \n```go\n...\nresult = dataVal.Index(index).Interface()\n...\n```\n\n使用反射的一个缺点是函数和方法结果的处理方式。如果结果的类型不是固定的，那么函数或方法的调用者就需要负责将结果转换为特定类型，清单\
  \ 27-13 中的以下语句正是如此：\n\n```go\n...\nval := selectValue(names, 1).(string)\n...\n\
  ```\n\n`selectValue` 函数的结果将与切片元素具有相同的类型，但在 Go 中无法表达这一点，这就是为什么该函数使用空接口作为结果，也是 `Interface()`\
  \ 方法返回空接口的原因。\n\n这带来的问题是，调用代码需要了解函数的内部工作方式才能处理结果。当函数的行为发生变化时，这种变化必须反映在所有调用该函数的代码中，这需要一种往往难以保持的细致程度。\n\
  \n这并不理想——这也是应谨慎使用反射的原因之一。编译并执行该项目，你将看到以下输出：\n\n```\nSelected: Bob\n```\n\n\n\n###\
  \ 使用反射设置值\n\n`Value`（值）结构体定义了允许通过反射设置值的方法，如表 27-8 所述。\n\n**表 27-8** 用于设置值的 Value\
  \ 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `CanSet()` | 如果该值可以被设置则返回 `true`，否则返回 `false`。\
  \ |\n| `SetBool(val)` | 该方法将底层值设置为指定的 `bool`（布尔值）。 |\n| `SetBytes(slice)` | 该方法将底层值设置为指定的\
  \ `byte`（字节）切片。 |\n| `SetFloat(val)` | 该方法将底层值设置为指定的 `float64`（64 位浮点数）。 |\n| `SetInt(val)`\
  \ | 该方法将底层值设置为指定的 `int64`（64 位整数）。 |\n| `SetUint(val)` | 该方法将底层值设置为指定的 `uint64`（64\
  \ 位无符号整数）。 |\n| `SetString(val)` | 该方法将底层值设置为指定的 `string`（字符串）。 |\n| `Set(val)`\
  \ | 该方法将底层值设置为指定 `Value` 的底层值。 |\n\n表 27-8 中的 `Set` 方法，如果 `CanSet` 方法返回 `false`，或者被用于设置类型不符的值，则会引发恐慌（panic）。代码清单\
  \ 27-14 展示了 `CanSet` 方法所解决的问题。\n\n```\npackage main\nimport (\n\"reflect\"\n\"strings\"\
  \n// \"fmt\"\n)\nfunc incrementOrUpper(values ...interface{}) {\nfor _, elem :=\
  \ range values {\nelemValue := reflect.ValueOf(elem)\nif (elemValue.CanSet()) {\n\
  switch (elemValue.Kind()) {\ncase reflect.Int:\nelemValue.SetInt(elemValue.Int()\
  \ + 1)\ncase reflect.String:\nelemValue.SetString(strings.ToUpper( elemValue.String()))\n\
  }\nPrintfln(\"Modified Value: %v\", elemValue)\n} else {\nPrintfln(\"Cannot set\
  \ %v: %v\", elemValue.Kind(), elemValue)\n}\n}\n}\nfunc main() {\nname := \"Alice\"\
  \nprice := 279\ncity := \"London\"\nincrementOrUpper(name, price, city)\nfor _,\
  \ val := range []interface{} { name, price, city }  {\nPrintfln(\"Value: %v\", val)\n\
  }\n}\n代码清单 27-14\n在 reflection 文件夹中的 main.go 文件中创建不可设置的值\n```\n\n`incrementOrUpper`\
  \ 函数递增 `int` 值，并将字符串值转换为大写。编译并执行代码，你将看到以下输出，显示传递给 `incrementOrUpper` 函数的所有值都无法被设置：\n\
  \n```\nCannot set string: Alice\nCannot set int: 279\nCannot set string: London\n\
  Value: Alice\nValue: 279\nValue: London\n```\n\n`CanSet` 方法可能会引起混淆，但请记住，当值作为函数和方法的参数时，它们会被复制。当这些值被传递给\
  \ `incrementOrUpper` 时，它们被复制了：\n\n```\n...\nincrementOrUpper(name, price, city)\n\
  ...\n```\n\n这阻止了这些值被修改，因为这些值已被复制供函数内部使用。代码清单 27-15 通过使用指针解决了这个问题。\n\n```\npackage\
  \ main\nimport (\n\"reflect\"\n\"strings\"\n// \"fmt\"\n)\nfunc incrementOrUpper(values\
  \ ...interface{}) {\nfor _, elem := range values {\nelemValue := reflect.ValueOf(elem)\n\
  if (elemValue.Kind() == reflect.Ptr) {\nelemValue = elemValue.Elem()\n}\nif (elemValue.CanSet())\
  \ {\nswitch (elemValue.Kind()) {\ncase reflect.Int:\nelemValue.SetInt(elemValue.Int()\
  \ + 1)\ncase reflect.String:\nelemValue.SetString(strings.ToUpper( elemValue.String()))\n\
  }\nPrintfln(\"Modified Value: %v\", elemValue)\n} else {\nPrintfln(\"Cannot set\
  \ %v: %v\", elemValue.Kind(), elemValue)\n}\n}\n}\nfunc main() {\nname := \"Alice\"\
  \nprice := 279\ncity := \"London\"\nincrementOrUpper(&name, &price, &city)\nfor\
  \ _, val := range []interface{} { name, price, city }  {\nPrintfln(\"Value: %v\"\
  , val)\n}\n}\n代码清单 27-15\n在 reflection 文件夹中的 main.go 文件中设置值\n```\n\n因此，就像常规代码一样，反射只有在能够访问原始存储时才能修改一个值。在代码清单\
  \ 27-15 中，使用指针来调用 `incrementOrUpper` 函数，这需要修改反射代码以检测指针，并在找到指针时使用 `Elem` 方法沿着指针找到其值。编译并执行该项目，你将看到以下输出：\n\
  \n```\nModified Value: ALICE\nModified Value: 280\nModified Value: LONDON\nValue:\
  \ ALICE\nValue: 280\nValue: LONDON\n```\n\n## 使用一个值设置另一个值\n\n`Set` 方法允许使用一个 `Value`\
  \ 来设置另一个 `Value`，这是一种使用通过反射接收到的值来修改值的便捷方式，如代码清单 27-16 所示。\n\n```\npackage main\n\
  import (\n\"reflect\"\n//\"strings\"\n// \"fmt\"\n)\nfunc setAll(src interface{},\
  \ targets ...interface{}) {\nsrcVal := reflect.ValueOf(src)\nfor _, target := range\
  \  targets {\ntargetVal := reflect.ValueOf(target)\nif (targetVal.Kind() == reflect.Ptr\
  \ &&\ntargetVal.Elem().Type() == srcVal.Type() &&\ntargetVal.Elem().CanSet()) {\n\
  targetVal.Elem().Set(srcVal)\n}\n}\n}\nfunc main() {\nname := \"Alice\"\nprice :=\
  \ 279\ncity := \"London\"\nsetAll(\"New String\", &name, &price, &city)\nsetAll(10,\
  \ &name, &price, &city)\nfor _, val := range []interface{} { name, price, city }\
  \  {\nPrintfln(\"Value: %v\", val)\n}\n}\n代码清单 27-16\n在 reflection 文件夹中的 main.go\
  \ 文件中使用一个值设置另一个值\n```\n\n`setAll` 函数使用 `for` 循环处理其可变参数，并查找那些指向与 `src` 参数类型相同值的指针。当找到匹配的指针时，它所引用的值会通过\
  \ `Set` 方法被更改。`setAll` 函数中的大部分代码负责检查值的兼容性和可设置性，但结果就是，使用一个 `string` 作为第一个参数会设置所有后续的\
  \ `string` 参数，而使用一个 `int` 则会设置所有后续的 `int` 值。编译并执行代码，你将收到以下输出：\n\n```\nValue: New\
  \ String\nValue: 10\nValue: New String\n```\n\n\n\n### 比较值\n\n并非所有数据类型都能使用 Go 语言的关系运算符进行比较，这很容易在反射代码中引发恐慌（panic），如清单\
  \ 27-17 所示。\n\n```\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n// \"fmt\"\
  \n)\nfunc contains(slice interface{}, target interface{}) (found bool) {\nsliceVal\
  \ := reflect.ValueOf(slice)\nif (sliceVal.Kind() == reflect.Slice) {\nfor i := 0;\
  \ i < sliceVal.Len(); i++ {\nif sliceVal.Index(i).Interface() == target {\nfound\
  \ = true\n}\n}\n}\nreturn\n}\nfunc main() {\n// name := \"Alice\"\n// price := 279\n\
  city := \"London\"\ncitiesSlice := []string { \"Paris\", \"Rome\", \"London\"}\n\
  Printfln(\"Found #1: %v\", contains(citiesSlice, city))\nsliceOfSlices := [][]string\
  \ {\ncitiesSlice,  { \"First\", \"Second\", \"Third\"}}\nPrintfln(\"Found #2: %v\"\
  , contains(sliceOfSlices, citiesSlice))\n}\nListing 27-17\nComparing Value in the\
  \ main.go File in the reflection Folder\n```\n\n`contains` 函数接受一个切片，如果其中包含指定值则返回\
  \ `true`。该函数使用 `Len` 和 `Index` 方法枚举切片，这两个方法将在第 28 章中介绍，但本节中重要的语句是这一行：\n\n```\n...\n\
  if sliceVal.Index(i).Interface() == target {\n...\n```\n\n该语句将关系运算符应用于切片中特定索引处的值和目标值。但由于\
  \ `contains` 函数接受任何类型，如果函数接收到的类型无法进行比较，应用程序就会发生恐慌。编译并执行该项目，你将看到以下输出：\n\n```\nFound\
  \ #1: true\npanic: runtime error: comparing uncomparable type []string\ngoroutine\
  \ 1 [running]:\nmain.contains(0x243640, 0xc000114078, 0x243f00, 0xc000153f60, 0xc000153f40)\n\
  C:/reflection/main.go:13 +0x1a5\nmain.main()\nC:/reflection/main.go:33 +0x2e5\n\
  exit status 2\n```\n\n在清单 27-17 中，`main` 函数调用了两次 `contains` 函数。第一次调用成功，因为切片包含字符串值，字符串值可以使用关系运算符。第二次调用失败，因为切片包含其他切片，而关系运算符不能应用于切片。为了帮助避免这个问题，`Type`\
  \ 接口定义了表 27-9 中描述的方法。\n\n表 27-9\n\n用于判断类型是否可比较的 Type 方法\n\n| 名称 | 描述 |\n| --- |\
  \ --- |\n| `Comparable()` | 如果反射类型可以与 Go 关系运算符一起使用，则此方法返回 `true`，否则返回 `false`。 |\n\
  \n清单 27-18 展示了如何使用 `Comparable` 方法来避免执行会导致恐慌的比较操作。\n\n```\n...\nfunc contains(slice\
  \ interface{}, target interface{}) (found bool) {\nsliceVal := reflect.ValueOf(slice)\n\
  targetType := reflect.TypeOf(target)\nif (sliceVal.Kind() == reflect.Slice &&\n\
  sliceVal.Type().Elem().Comparable() &&\ntargetType.Comparable()) {\nfor i := 0;\
  \ i < sliceVal.Len(); i++ {\nif sliceVal.Index(i).Interface() == target {\nfound\
  \ = true\n}\n}\n}\nreturn\n}\n...\nListing 27-18\nSafely Comparing Values in the\
  \ main.go File in the reflection Folder\n```\n\n这些更改确保关系运算符仅应用于那些类型可比较的值。编译并执行该项目，你将看到以下输出：\n\
  \n```\nFound #1: true\nFound #2: false\n```\n\n## 使用比较便捷函数\n\n`reflect` 包定义了一个函数，该函数提供了标准\
  \ Go 关系运算符的替代方案，如表 27-10 所述。\n\n表 27-10\n\n用于比较值的 reflect 包函数\n\n| 名称 | 描述 |\n|\
  \ --- | --- |\n| `DeepEqual(val, val)` | 此函数比较任意两个值，如果它们相同则返回 `true`。 |\n\n`DeepEqual`\
  \ 函数不会引发恐慌，并且可以执行 `==` 运算符无法进行的额外比较。此函数的所有比较规则都列在 [`https://pkg.go.dev/reflect@go1.17.1#DeepEqual`](https://pkg.go.dev/reflect%2540go1.17.1%2523DeepEqual)\
  \ 上，但总的来说，`DeepEqual` 函数通过递归检查值的所有字段或元素来进行比较。这种比较最有用的一个方面是，如果切片的所有值都相等，则切片相等，这解决了标准关系运算符最常遇到的限制之一，如清单\
  \ 27-19 所示。\n\n```\npackage main\nimport (\n\"reflect\"\n//\"strings\"\n// \"fmt\"\
  \n)\nfunc contains(slice interface{}, target interface{}) (found bool) {\nsliceVal\
  \ := reflect.ValueOf(slice)\nif (sliceVal.Kind() == reflect.Slice) {\nfor i := 0;\
  \ i < sliceVal.Len(); i++ {\nif reflect.DeepEqual(sliceVal.Index(i).Interface(),\
  \ target) {\nfound = true\n}\n}\n}\nreturn\n}\nfunc main() {\n// name := \"Alice\"\
  \n// price := 279\ncity := \"London\"\ncitiesSlice := []string { \"Paris\", \"Rome\"\
  , \"London\"}\nPrintfln(\"Found #1: %v\", contains(citiesSlice, city))\nsliceOfSlices\
  \ := [][]string {\ncitiesSlice,  { \"First\", \"Second\", \"Third\"}}\nPrintfln(\"\
  Found #2: %v\", contains(sliceOfSlices, citiesSlice))\n}\nListing 27-19\nPerforming\
  \ a Comparison in the main.go File in the reflection Folder\n```\n\n这种简化版的 `contains`\
  \ 函数无需检查类型是否可比较，并且在编译和执行项目时会产生以下输出：\n\n```\nFound #1: true\nFound #2: true\n```\n\
  \n这个例子可以比较切片，因此对 `contains` 函数的两次调用都产生 `true` 结果。\n\n## 转换值\n\n如第 3 部分所述，Go 语言支持类型转换，允许将定义为一个类型的值以不同的类型表示。`Type`\
  \ 接口定义了表 27-11 中描述的方法，用于判断反射类型是否可以转换。\n\n表 27-11\n\n用于评估类型转换的 Type 方法\n\n| 名称 |\
  \ 描述 |\n| --- | --- |\n| `ConvertibleTo(type)` | 如果调用该方法的 `Type` 可以转换为指定的 `Type`，则此方法返回\
  \ `true`。 |\n\n`Type` 接口定义的方法允许检查类型的可转换性。表 27-12 描述了 `Value` 结构体定义的用于执行转换的方法。\n\n\
  表 27-12\n\n用于转换类型的 Value 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Convert(type)` | 此方法执行类型转换，并返回一个包含新类型和原始值的\
  \ `Value`。 |\n\n清单 27-20 演示了使用反射执行的简单类型转换。\n\n```\npackage main\nimport (\n\"reflect\"\
  \n//\"strings\"\n// \"fmt\"\n)\nfunc convert(src, target interface{}) (result interface{},\
  \ assigned bool) {\nsrcVal := reflect.ValueOf(src)\ntargetVal := reflect.ValueOf(target)\n\
  if (srcVal.Type().ConvertibleTo(targetVal.Type())) {\nresult = srcVal.Convert(targetVal.Type()).Interface()\n\
  assigned = true\n} else {\nresult = src\n}\nreturn\n}\nfunc main() {\nname := \"\
  Alice\"\nprice := 279\n//city := \"London\"\nnewVal, ok := convert(price, 100.00)\n\
  Printfln(\"Converted %v: %v, %T\", ok, newVal, newVal)\nnewVal, ok = convert(name,\
  \ 100.00)\nPrintfln(\"Converted %v: %v, %T\", ok, newVal, newVal)\n}\nListing 27-20\n\
  Performing a Type Conversion in the main.go File in the reflection Folder\n```\n\
  \n`convert` 函数尝试将一个值转换为另一个值的类型，这是通过 `ConvertibleTo` 和 `Convert` 方法完成的。第一次调用 `convert`\
  \ 函数尝试将 `int` 值转换为 `float64`，成功了；第二次调用尝试将 `string` 转换为 `float64`，失败了。编译并执行该项目，你将看到以下输出：\n\
  \n```\nConverted true: 279, float64\nConverted false: Alice, string\n```\n\n\n\n\
  ### 转换数值类型\n\n`Value` 结构体定义了表 27-13 所示的方法，用于检查某个值在转换为目标类型时是否会导致溢出。这些方法在将一种数值类型转换为另一种数值类型时非常有用。\n\
  \n表 27-13  \n用于检查溢出的 `Value` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `OverflowFloat(val)`\
  \ | 如果指定的 `float64` 值转换为调用该方法的 `Value` 的类型会导致溢出，则此方法返回 `true`。除非 `Value.Kind` 方法返回\
  \ `Float32` 或 `Float64`，否则此方法将引发 panic。 |\n| `OverflowInt(val)` | 如果指定的 `int64`\
  \ 值转换为调用该方法的 `Value` 的类型会导致溢出，则此方法返回 `true`。除非 `Value.Kind` 方法返回有符号整数类型之一，否则此方法将引发\
  \ panic。 |\n| `OverflowUint(val)` | 如果指定的 `uint64` 值转换为调用该方法的 `Value` 的类型会导致溢出，则此方法返回\
  \ `true`。除非 `Value.Kind` 方法返回无符号整数类型之一，否则此方法将引发 panic。 |\n\n如第 5 章所述，Go 数值在溢出时会进行回绕（wrap）。表\
  \ 27-13 中描述的方法可用于判断转换是否会导致溢出，如清单 27-21 所示，这可能会产生意外结果。\n\n```\npackage main\nimport\
  \ (\n    \"reflect\"\n    //\"strings\"\n    // \"fmt\"\n)\nfunc IsInt(v reflect.Value)\
  \ bool {\n    switch v.Kind() {\n        case reflect.Int, reflect.Int8, reflect.Int16,\
  \ reflect.Int32, reflect.Int64:\n        return true\n    }\n    return false\n\
  }\nfunc IsFloat(v reflect.Value) bool {\n    switch v.Kind() {\n        case reflect.Float32,\
  \ reflect.Float64:\n        return true\n    }\n    return false\n}\nfunc convert(src,\
  \ target interface{}) (result interface{}, assigned bool) {\n    srcVal := reflect.ValueOf(src)\n\
  \    targetVal := reflect.ValueOf(target)\n    if (srcVal.Type().ConvertibleTo(targetVal.Type()))\
  \ {\n        if (IsInt(targetVal) && IsInt(srcVal)) &&\n            targetVal.OverflowInt(srcVal.Int())\
  \ {\n                Printfln(\"Int overflow\")\n                return src, false\n\
  \        } else if (IsFloat(targetVal) && IsFloat(srcVal) &&\n            targetVal.OverflowFloat(srcVal.Float()))\
  \ {\n            Printfln(\"Float overflow\")\n            return src, false\n \
  \       }\n        result = srcVal.Convert(targetVal.Type()).Interface()\n     \
  \   assigned = true\n    } else {\n        result = src\n    }\n    return\n}\n\
  func main() {\n    name := \"Alice\"\n    price := 279\n    //city := \"London\"\
  \n    newVal, ok := convert(price, 100.00)\n    Printfln(\"Converted %v: %v, %T\"\
  , ok, newVal, newVal)\n    newVal, ok = convert(name, 100.00)\n    Printfln(\"Converted\
  \ %v: %v, %T\", ok, newVal, newVal)\n    newVal, ok = convert(5000, int8(100))\n\
  \    Printfln(\"Converted %v: %v, %T\", ok, newVal, newVal)\n}\n清单 27-21\nreflection\
  \ 文件夹中 main.go 文件中的溢出预防\n```\n\n清单 27-21 中的新代码增加了在将一种整数类型转换为另一种整数类型，以及将一种浮点值转换为另一种浮点值时的溢出保护。编译并执行该项目，你将看到以下输出：\n\
  \n```\nConverted true: 279, float64\nConverted false: Alice, string\nInt overflow\n\
  Converted false: 5000, int\n```\n\n清单 27-21 中对 `convert` 函数的最后一次调用尝试将值 `5000` 转换为\
  \ `int8`，这将导致溢出。`OverflowInt` 方法返回 `true`，因此不会执行转换。\n\n## 创建新值\n\n`reflect` 包定义了用于创建新值的函数，这些函数在表\
  \ 27-14 中进行了描述。我将在后续章节中演示特定于特定数据结构（例如切片和映射）的函数。\n\n表 27-14  \n用于创建新值的函数\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `New(type)` | 此函数创建一个 `Value`，它指向指定类型的一个值，并初始化为该类型的零值。\
  \ |\n| `Zero(type)` | 此函数创建一个 `Value`，它表示指定类型的零值。 |\n| `MakeMap(type)` | 此函数创建一个新的映射，如第\
  \ 28 章所述。 |\n| `MakeMapWithSize(type, size)` | 此函数创建一个具有指定大小的新映射，如第 28 章所述。 |\n\
  | `MakeSlice(type, capacity)` | 此函数创建一个新的切片，如第 28 章所述。 |\n| `MakeFunc(type, args,\
  \ results)` | 此函数创建一个具有指定参数和结果的新函数，如第 29 章所述。 |\n| `MakeChan(type, buffer)` | 此函数创建一个具有指定缓冲区大小的新通道，如第\
  \ 29 章所述。 |\n\n使用 `New` 函数时必须小心，因为它返回一个指向指定类型新值的指针，这意味着很容易创建指向指针的指针。清单 27-22 使用\
  \ `New` 函数在交换其参数的函数中创建一个临时值。\n\n```\npackage main\nimport (\n    \"reflect\"\n \
  \   //\"strings\"\n    // \"fmt\"\n)\nfunc swap(first interface{}, second interface{})\
  \ {\n    firstValue, secondValue := reflect.ValueOf(first), reflect.ValueOf(second)\n\
  \    if firstValue.Type() == secondValue.Type() &&\n        firstValue.Kind() ==\
  \ reflect.Ptr &&\n        firstValue.Elem().CanSet() && secondValue.Elem().CanSet()\
  \ {\n        temp :=  reflect.New(firstValue.Elem().Type())\n        temp.Elem().Set(firstValue.Elem())\n\
  \        firstValue.Elem().Set(secondValue.Elem())\n        secondValue.Elem().Set(temp.Elem())\n\
  \    }\n}\nfunc main() {\n    name := \"Alice\"\n    price := 279\n    city := \"\
  London\"\n    swap(&name, &city)\n    for _, val := range []interface{} { name,\
  \ price, city }  {\n        Printfln(\"Value: %v\", val)\n    }\n}\n清单 27-22\nreflection\
  \ 文件夹中 main.go 文件中的值创建\n```\n\n执行交换需要一个新值，该值通过 `New` 函数创建：\n\n```\n...\ntemp :=\
  \  reflect.New(firstValue.Elem().Type())\n...\n```\n\n传递给 `New` 函数的 `Type` 是从某个参数值的\
  \ `Elem` 结果中获取的，这避免了创建指向指针的指针。`Set` 方法用于设置临时值并执行交换。编译并执行该项目，你将收到以下输出，显示 `name` 和\
  \ `city` 变量的值已被交换：\n\n```\nValue: London\nValue: 279\nValue: Alice\n```\n\n## 本章小结\n\
  \n在本章中，我介绍了 Go 反射的基本特性并演示了它们的用法。我解释了如何获取反射的类型和值、如何确定被反射的类型种类、如何设置反射值，以及如何使用 `reflect`\
  \ 包提供的便捷功能。在下一章中，我将继续描述反射，向你展示如何处理指针、切片、映射和结构体。\n\n\n\n"
