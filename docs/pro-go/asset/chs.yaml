  , 1200 },\n}\nfunc (p *Product) AddTax() float64 {\nreturn p.Price * 1.2\n}\nfunc\
  \ (p * Product) ApplyDiscount(amount float64) float64 {\nreturn p.Price - amount\n\
  }\n```\n\n在`htmltext`文件夹中添加一个名为`main.go`的文件，其内容如清单 23-4 所示。\n\n```\npackage main\n\
  func main() {\nfor _, p := range Products {\nPrintfln(\"Product: %v, Category: %v,\
  \ Price: $%.2f\",\np.Name, p.Category, p.Price)\n}\n}\n```\n\n使用命令提示符在`htmltext`文件夹中运行清单\
