  \n为了添加订单管理支持，将 `sportsstore/admin` 文件夹中的 `orders_handler.go` 文件内容替换为代码清单 38-6 所示的内容。\n\
  \n```go\npackage admin\n\nimport (\n    \"platform/http/actionresults\"\n    \"\
  platform/http/handling\"\n    \"sportsstore/models\"\n)\n\ntype OrdersHandler struct\
  \ {\n    models.Repository\n    handling.URLGenerator\n}\n\nfunc (handler OrdersHandler)\
