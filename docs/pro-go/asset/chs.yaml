  Product: {2 Lifejacket {3 Misc Products} 48.95}\n```\n\n\n\n### 使用事务\n\n事务允许执行多条语句，使得它们要么全部应用到数据库，要么全部不应用。`DB`\
  \ 结构体定义了表 26-11 中描述的用于创建新事务的方法。\n\n**表 26-11** 用于创建事务的 `DB` 方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Begin()` | 此方法开始一个新事务。返回结果是一个指向 `Tx` 值的指针，以及一个指示创建事务时出现问题的 `error`。\
  \ |\n\n事务由 `Tx` 结构体表示，该结构体定义了表 26-12 中描述的方法。\n\n**表 26-12** `Tx` 结构体定义的方法\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `Query(query, ...args)` | 此方法等同于表 26-5 中描述的 `DB.Query`\
  \ 方法，但查询是在事务范围内执行的。 |\n| `QueryRow(query, ...args)` | 此方法等同于表 26-5 中描述的 `DB.QueryRow`\
  \ 方法，但查询是在事务范围内执行的。 |\n| `Exec(query, ...args)` | 此方法等同于表 26-5 中描述的 `DB.Exec` 方法，但查询/语句是在事务范围内执行的。\
  \ |\n| `Prepare(query)` | 此方法等同于表 26-9 中描述的 `DB.Query` 方法，但它创建的预编译语句是在事务范围内执行的。\
  \ |\n| `Stmt(statement)` | 此方法接受一个在事务范围外创建的预编译语句，并返回一个在事务范围内执行的语句。 |\n| `Commit()`\
  \ | 此方法将待定的更改提交到数据库，返回一个指示应用更改时出现问题的 `error`。 |\n| `Rollback()` | 此方法中止事务，以便丢弃待定的更改。此方法返回一个指示中止事务时出现问题的\
  \ `error`。 |\n\n上一节定义的 `insertAndUseCategory` 函数是一个适合使用事务的好例子（尽管很简单），因为它涉及两个关联操作。清单\
  \ 26-21 引入了一个事务，如果没有产品匹配指定的 ID，该事务将被回滚。\n\n```\npackage main\nimport \"database/sql\"\
  \n// ...为简洁起见省略了语句...\nfunc insertAndUseCategory(db *sql.DB, name string, productIDs\
  \ ...int) (err error) {\ntx, err := db.Begin()\nupdatedFailed := false\nif (err\
  \ == nil) {\ncatResult, err := tx.Stmt(insertNewCategory).Exec(name)\nif (err ==\
  \ nil) {\nnewID, _ := catResult.LastInsertId()\npreparedStatement := tx.Stmt(changeProductCategory)\n\
  for _, id := range productIDs {\nchangeResult, err := preparedStatement.Exec(newID,\
  \ id)\nif (err == nil) {\nchanges, _ := changeResult.RowsAffected()\nif (changes\
  \ == 0) {\nupdatedFailed = true\nbreak\n}\n}\n}\n}\n}\nif (err != nil || updatedFailed)\
  \ {\nPrintfln(\"Aborting transaction %v\", err)\ntx.Rollback()\n} else {\ntx.Commit()\n\
  }\nreturn\n}\nfunc main() {\ndb, err := openDatabase()\nif (err == nil) {\ninsertAndUseCategory(db,\
  \ \"Category_1\", 2)\np := queryDatabase(db, 2)\nPrintfln(\"Product: %v\", p)\n\
  insertAndUseCategory(db, \"Category_2\", 100)\ndb.Close()\n} else {\npanic(err)\n\
