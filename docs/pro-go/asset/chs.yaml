  ,\nCategory: \"Watersports\",\nPrice: 279,\n}\nvar Products = []Product {\n{ \"\
  Kayak\", \"Watersports\", 279 },\n{ \"Lifejacket\", \"Watersports\", 49.95 },\n\
  { \"Soccer Ball\", \"Soccer\", 19.50 },\n{ \"Corner Flags\", \"Soccer\", 34.95 },\n\
  { \"Stadium\", \"Soccer\", 79500 },\n{ \"Thinking Cap\", \"Chess\", 16 },\n{ \"\
  Unsteady Chair\", \"Chess\", 75 },\n{ \"Bling-Bling King\", \"Chess\", 1200 },\n\
  }\n代码清单 20-3\nreadersandwriters 文件夹中 product.go 文件的内容\n```\n\n在 `readersandwriters`\
  \ 文件夹中添加一个名为 `main.go` 的文件，内容如代码清单 20-4 所示。\n\n```\npackage main\nfunc main() {\n\
  Printfln(\"Product: %v, Price : %v\", Kayak.Name, Kayak.Price)\n}\n代码清单 20-4\nreadersandwriters\
  \ 文件夹中 main.go 文件的内容\n```\n\n在命令提示符中，进入 `readersandwriters` 文件夹并运行代码清单 20-5 所示的命令。\n\
  \n```\ngo run .\n代码清单 20-5\n运行示例项目\n```\n\n代码将被编译并执行，产生以下输出：\n\n```\nProduct: Kayak\
  \ Price: 275\n```\n\n### 理解读取器与写入器\n\n`Reader` 和 `Writer` 接口由 `io` 包定义，提供了读写数据的抽象方式，而不与数据的来源或去向绑定。在接下来的章节中，我将介绍这些接口并演示它们的用法。\n\
  \n## 理解读取器\n\n`Reader` 接口定义了一个单一方法，如表 20-3 所述。\n\n**表 20-3**  \n**Reader 接口**\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `Read(byteSlice)` | 此方法将数据读入指定的 `[]byte`。该方法返回已读取的字节数（以\
  \ `int` 类型表示）和一个 `error`。 |\n\n`Reader` 接口不包含关于数据来自何处或如何获取的任何细节——它仅定义了 `Read` 方法。具体细节由实现该接口的类型决定，标准库中有针对不同数据源的读取器实现。其中最简单的读取器之一使用\
  \ `string` 作为数据源，如代码清单 20-6 所示。\n\n```\npackage main\nimport (\n\"io\"\n\"strings\"\
  \n)\nfunc processData(reader io.Reader) {\nb := make([]byte, 2)\nfor {\ncount, err\
  \ := reader.Read(b);\nif (count > 0) {\nPrintfln(\"读取了 %v 字节: %v\", count, string(b[0:count]))\n\
  }\nif err == io.EOF {\nbreak\n}\n}\n}\nfunc main() {\nr := strings.NewReader(\"\
  Kayak\")\nprocessData(r)\n}\n代码清单 20-6\n在 readersandwriters 文件夹的 main.go 文件中使用读取器\n\
  ```\n\n每种类型的 `Reader` 的创建方式都不同，我将在本章及后续章节中演示。要创建一个基于 `string` 的读取器，`strings` 包提供了\
  \ `NewReader` 构造函数，它接受一个 `string` 作为参数：\n\n```\n...\nr := strings.NewReader(\"Kayak\"\
  )\n...\n```\n\n为了强调接口的使用，我将 `NewReader` 函数的结果作为参数传递给一个接受 `io.Reader` 的函数。在函数内部，我使用\
  \ `Read` 方法来读取字节数据。我通过设置传递给 `Read` 函数的 `byte` 切片的大小来指定想要接收的最大字节数。`Read` 函数的返回值指示已读取了多少字节数据以及是否发生了错误。\n\
  \n`io` 包定义了一个名为 `EOF` 的特殊错误，用于指示 `Reader` 已到达数据末尾。如果 `Read` 函数返回的 `error` 结果等于 `EOF`\
  \ 错误，则我会跳出正在从 `Reader` 读取数据的 `for` 循环：\n\n```\n...\nif err == io.EOF {\nbreak\n\
  }\n...\n```\n\n其效果是，`for` 循环每次调用 `Read` 函数最多获取两个字节并将其写出。当到达字符串末尾时，`Read` 函数返回 `EOF`\
  \ 错误，导致 `for` 循环终止。编译并执行代码，你将看到以下输出：\n\n```\n读取了 2 字节: Ka\n读取了 2 字节: ya\n读取了 1 字节:\
  \ k\n```\n\n## 理解写入器\n\n`Writer` 接口定义了表 20-4 所述的方法。\n\n**表 20-4**  \n**Writer 接口**\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Write(byteSlice)` | 此方法写入指定 `byte` 切片中的数据。该方法返回已写入的字节数和一个\
  \ `error`。如果写入的字节数小于切片的长度，则 `error` 将不为 `nil`。 |\n\n`Writer` 接口不包含关于写入数据如何存储、传输或处理的任何细节，这些都由实现该接口的类型决定。在代码清单\
  \ 20-7 中，我创建了一个 `Writer`，它根据接收到的数据构建一个字符串。\n\n```\npackage main\nimport (\n\"io\"\
  \n\"strings\"\n)\nfunc processData(reader io.Reader, writer io.Writer) {\nb := make([]byte,\
  \ 2)\nfor {\ncount, err := reader.Read(b);\nif (count > 0) {\nwriter.Write(b[0:count])\n\
  Printfln(\"读取了 %v 字节: %v\", count, string(b[0:count]))\n}\nif err == io.EOF {\n\
  break\n}\n}\n}\nfunc main() {\nr := strings.NewReader(\"Kayak\")\nvar builder strings.Builder\n\
  processData(r, &builder)\nPrintfln(\"字符串构建器内容: %s\", builder.String())\n}\n代码清单\
  \ 20-7\n在 readersandwriters 文件夹的 main.go 文件中使用写入器\n```\n\n我在第 16 章中描述的 `strings.Builder`\
  \ 结构体实现了 `io.Writer` 接口，这意味着我可以将字节写入 `Builder`，然后调用其 `String` 方法从这些字节创建字符串。\n\n\
  如果写入器无法写入切片中的所有数据，它将返回一个 `error`。在代码清单 20-7 中，我检查了错误结果，如果返回错误，则跳出 `for` 循环。然而，由于此示例中的\
  \ `Writer` 是在内存中构建字符串，因此几乎不会发生错误。\n\n请注意，我使用了地址运算符将指向 `Builder` 的指针传递给 `processData`\
  \ 函数，如下所示：\n\n```\n...\nprocessData(r, &builder)\n...\n```\n\n通常，`Reader` 和 `Writer`\
  \ 的方法是为指针实现的，这样将 `Reader` 或 `Writer` 传递给函数时不会创建副本。在代码清单 20-7 中，我不必对 `Reader` 使用地址运算符，因为\
  \ `strings.NewReader` 函数返回的结果本身就是一个指针。\n\n编译并执行项目，你将看到以下输出，表明字节从一个字符串中读取并用于创建另一个字符串：\n\
  \n```\n读取了 2 字节: Ka\n读取了 2 字节: ya\n读取了 1 字节: k\n字符串构建器内容: Kayak\n```\n\n\n\n\n###\
  \ 为读写器使用便捷函数\n\n`io`包包含一组函数，它们提供了读写数据的额外方式，如表 20-5 所述。\n\n**表 20-5** `io`包中用于读写数据的函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Copy(w, r)` | 此函数将数据从`Reader`复制到`Writer`，直到返回`EOF`或遇到其他错误。返回值是复制的字节数和一个用于描述问题的`error`。\
  \ |\n| `CopyBuffer(w, r, buffer)` | 此函数执行与`Copy`相同的任务，但在将数据传递到`Writer`之前，会先将数据读入指定的`buffer`。\
  \ |\n| `CopyN(w, r, count)` | 此函数将`count`个字节从`Reader`复制到`Writer`。返回值是复制的字节数和一个用于描述问题的`error`。\
  \ |\n| `ReadAll(r)` | 此函数从指定的`Reader`读取数据，直到到达`EOF`。返回值是一个包含已读取数据的`byte`切片和一个用于描述问题的`error`。\
  \ |\n| `ReadAtLeast(r, byteSlice, min)` | 此函数从读取器读取至少指定数量的字节，并将它们放入`byte`切片中。如果读取的字节少于指定数量，则会报告错误。\
  \ |\n| `ReadFull(r, byteSlice)` | 此函数用数据填充指定的`byte`切片。返回值是读取的`bytes`数和一个`error`。如果在读取足够填充切片的字节之前遇到`EOF`，则会报告错误。\
  \ |\n| `WriteString(w, str)` | 此函数将指定的`string`写入写入器。 |\n\n表 20-5 中的函数使用了由`Reader`和`Writer`接口定义的`Read`和`Write`方法，但方式更为便捷，避免了在需要处理数据时定义`for`循环。在清单\
  \ 20-8 中，我使用了`Copy`函数将示例`string`中的字节从`Reader`复制到`Writer`。\n\n```\npackage main\n\
  import (\n\"io\"\n\"strings\"\n)\nfunc processData(reader io.Reader, writer io.Writer)\
  \ {\ncount, err := io.Copy(writer, reader)\nif (err == nil) {\nPrintfln(\"Read %v\
  \ bytes\", count)\n} else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\nfunc main()\
  \ {\nr := strings.NewReader(\"Kayak\")\nvar builder strings.Builder\nprocessData(r,\
  \ &builder)\nPrintfln(\"String builder contents: %s\", builder.String())\n}\nListing\
  \ 20-8\nCopying Data in the main.go File in the readersandwriters Folder\n```\n\n\
  使用`Copy`函数实现了与之前示例相同的结果，但更简洁。编译并执行代码，您将收到以下输出：\n\n```\nRead 5 bytes\nString builder\
  \ contents: Kayak\n```\n\n## 使用专门的读写器\n\n除了基本的`Reader`和`Writer`接口之外，`io`包还提供了一些专门的实现，如表\
  \ 20-6 所述，并在随后的章节中进行了演示。\n\n**表 20-6** 用于专用读写器的`io`包函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `Pipe()` | 此函数返回一个`PipeReader`和一个`PipeWriter`，可用于连接需要`Reader`和`Writer`的函数，如“使用管道”部分所述。\
  \ |\n| `MultiReader(...readers)` | 此函数定义了一个可变参数，允许指定任意数量的`Reader`值。结果是一个`Reader`，它会按其参数定义的顺序传递来自每个参数的内容，如“连接多个读取器”部分所述。\
  \ |\n| `MultiWriter(...writers)` | 此函数定义了一个可变参数，允许指定任意数量的`Writer`值。结果是一个`Writer`，它会将相同的数据发送到所有指定的写入器，如“组合多个写入器”部分所述。\
  \ |\n| `LimitReader(r, limit)` | 此函数创建一个`Reader`，它在读取了指定数量的字节后将返回`EOF`，如“限制读取数据”部分所述。\
  \ |\n\n\n\n\n### 使用管道\n\n管道用于连接通过 `Reader` 消费数据的代码和通过 `Writer` 产生数据的代码。在 `readersandwriters`\
  \ 文件夹中添加一个名为 `data.go` 的文件，内容如代码清单 20-9 所示。\n\n```go\npackage main\nimport \"io\"\
  \nfunc GenerateData(writer io.Writer) {\ndata := []byte(\"Kayak, Lifejacket\")\n\
  writeSize := 4\nfor i := 0; i < len(data); i += writeSize {\nend := i + writeSize\n\
  if (end > len(data)) {\nend = len(data)\n}\ncount, err := writer.Write(data[i: end])\n\
  Printfln(\"Wrote %v byte(s): %v\", count, string(data[i: end]))\nif (err != nil)\
  \  {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n}\nfunc ConsumeData(reader io.Reader)\
  \ {\ndata := make([]byte, 0, 10)\nslice := make([]byte, 2)\nfor {\ncount, err :=\
  \ reader.Read(slice)\nif (count > 0) {\nPrintfln(\"Read data: %v\", string(slice[0:count]))\n\
  data = append(data, slice[0:count]...)\n}\nif (err == io.EOF) {\nbreak\n}\n}\nPrintfln(\"\
  Read data: %v\", string(data))\n}\n```\n\n*代码清单 20-9：readersandwriters 文件夹中 data.go\
  \ 文件的内容*\n\n`GenerateData` 函数定义了一个 `Writer` 参数，它使用该参数从一个字符串写入字节。`ConsumeData` 函数定义了一个\
  \ `Reader` 参数，它使用该参数读取字节数据，然后将这些数据用于创建一个字符串。\n\n实际项目中无需从一个字符串读取字节再创建另一个字符串，但这样做能很好地展示管道的工作原理，如代码清单\
  \ 20-10 所示。\n\n```go\npackage main\nimport (\n\"io\"\n//\"strings\"\n)\n// func\
  \ processData(reader io.Reader, writer io.Writer) {\n//     count, err := io.Copy(writer,\
  \ reader)\n//     if (err == nil) {\n//         Printfln(\"Read %v bytes\", count)\n\
  //     } else {\n//         Printfln(\"Error: %v\", err.Error())\n//     }\n// }\n\
  func main() {\npipeReader, pipeWriter := io.Pipe()\ngo func() {\nGenerateData(pipeWriter)\n\
  pipeWriter.Close()\n}()\nConsumeData(pipeReader)\n}\n```\n\n*代码清单 20-10：readersandwriters\
  \ 文件夹中 main.go 文件里使用管道*\n\n`io.Pipe` 函数返回一个 `PipeReader` 和一个 `PipeWriter`。`PipeReader`\
  \ 和 `PipeWriter` 结构体实现了 `Closer` 接口，该接口定义了表 20-7 所示的方法。\n\n**表 20-7：Closer 方法**\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `Close()` | 此方法关闭读取器或写入器。具体细节取决于实现，但通常来说，后续对已关闭\
  \ `Reader` 的任何读取都将返回零字节和 `EOF` 错误，而对已关闭 `Writer` 的任何后续写入都将返回一个错误。 |\n\n由于 `PipeWriter`\
  \ 实现了 `Writer` 接口，我可以将其作为参数传递给 `GenerateData` 函数，然后在函数完成后调用 `Close` 方法，以便读取器能够接收到\
  \ `EOF`，如下所示：\n\n```go\n...\nGenerateData(pipeWriter)\npipeWriter.Close()\n...\n\
  ```\n\n管道是同步的，这意味着 `PipeWriter.Write` 方法会阻塞，直到数据从管道中被读取。因此，`PipeWriter` 需要在与读取器不同的\
  \ goroutine 中使用，以防止应用程序死锁：\n\n```go\n...\ngo func() {\nGenerateData(pipeWriter)\n\
  pipeWriter.Close()\n}()\n...\n```\n\n注意此语句末尾的括号。为匿名函数创建 goroutine 时需要这些括号，但很容易忘记添加。\n\
  \n`PipeReader` 结构体实现了 `Reader` 接口，这意味着我可以将其作为参数传递给 `ConsumeData` 函数。`ConsumeData`\
  \ 函数在 `main` goroutine 中执行，这意味着在该函数完成之前，应用程序不会退出。\n\n其效果是，数据通过 `PipeWriter` 写入管道，并通过\
  \ `PipeReader` 从管道读取。当 `GenerateData` 函数完成后，会在 `PipeWriter` 上调用 `Close` 方法，这将导致\
  \ `PipeReader` 的下一次读取产生 `EOF`。编译并执行该项目，你将看到以下输出：\n\n```\nRead data: Ka\nWrote 4\
  \ byte(s): Kaya\nRead data: ya\nRead data: k,\nWrote 4 byte(s): k, L\nRead data:\
  \  L\nRead data: if\nWrote 4 byte(s): ifej\nRead data: ej\nRead data: ac\nWrote\
  \ 4 byte(s): acke\nRead data: ke\nWrote 1 byte(s): t\nRead data: t\nRead data: Kayak,\
  \ Lifejacket\n```\n\n输出结果突显了管道是同步的这一事实。`GenerateData` 函数调用写入器的 `Write` 方法，然后阻塞，直到数据被读取。这就是为什么输出中的第一条消息来自读取器：读取器每次消费两个字节，这意味着在用于发送四个字节的\
  \ `Write` 方法的初始调用完成之前，需要两次读取操作，然后才会显示来自 `GenerateData` 函数的消息。\n\n#### 改进示例\n\n在代码清单\
  \ 20-10 中，我在执行 `GenerateData` 函数的 goroutine 中调用了 `PipeWriter` 上的 `Close` 方法。这确实可行，但我更倾向于在生成数据的代码中检查\
  \ `Writer` 是否实现了 `Closer` 接口，如代码清单 20-11 所示。\n\n```go\n...\nfunc GenerateData(writer\
  \ io.Writer) {\ndata := []byte(\"Kayak, Lifejacket\")\nwriteSize := 4\nfor i :=\
  \ 0; i < len(data); i += writeSize {\nend := i + writeSize\nif (end > len(data))\
  \ {\nend = len(data)\n}\ncount, err := writer.Write(data[i: end])\nPrintfln(\"Wrote\
  \ %v byte(s): %v\", count, string(data[i: end]))\nif (err != nil)  {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\nif closer, ok := writer.(io.Closer); ok {\ncloser.Close()\n\
  }\n}\n...\n```\n\n*代码清单 20-11：readersandwriters 文件夹中 data.go 文件里关闭一个写入器*\n\n这种方法为定义了\
  \ `Close` 方法的 `Writer` 提供了一致的处理方式，其中包含后续章节中描述的一些最常用的类型。它还使我能够更改 goroutine，以便无需匿名函数即可执行\
  \ `GenerateData` 函数，如代码清单 20-12 所示。\n\n```go\npackage main\nimport (\n\"io\"\n//\"\
  strings\"\n)\nfunc main() {\npipeReader, pipeWriter := io.Pipe()\ngo GenerateData(pipeWriter)\n\
  ConsumeData(pipeReader)\n}\n```\n\n*代码清单 20-12：readersandwriters 文件夹中 main.go 文件里简化代码*\n\
  \n此示例产生的输出与代码清单 20-10 中的代码相同。\n\n### 连接多个读取器\n\n`MultiReader` 函数将多个读取器的输入串联起来，以便可以按顺序处理它们，如代码清单\
  \ 20-13 所示。\n\n```go\npackage main\nimport (\n\"io\"\n\"strings\"\n)\nfunc main()\
  \ {\nr1 := strings.NewReader(\"Kayak\")\nr2 := strings.NewReader(\"Lifejacket\"\
  )\nr3 := strings.NewReader(\"Canoe\")\nconcatReader := io.MultiReader(r1, r2, r3)\n\
  ConsumeData(concatReader)\n}\n```\n\n*代码清单 20-13：readersandwriters 文件夹中 main.go\
  \ 文件里连接读取器*\n\n由 `MultiReader` 函数返回的 `Reader` 在响应 `Read` 方法时，会从底层某个 `Reader` 值中获取内容。当第一个\
  \ `Reader` 返回 `EOF` 时，则会从第二个 `Reader` 读取内容。此过程一直持续，直到最后一个底层 `Reader` 返回 `EOF`。编译并执行代码，你将看到以下输出：\n\
  \n```\nRead data: Ka\nRead data: ya\nRead data: k\nRead data: Li\nRead data: fe\n\
  Read data: ja\nRead data: ck\nRead data: et\nRead data: Ca\nRead data: no\nRead\
  \ data: e\nRead data: KayakLifejacketCanoe\n```\n\n\n\n### 组合多个写入器\n\n`MultiWriter`\
  \ 函数用于组合多个写入器，使数据同时发送至所有写入器，如代码清单 20-14 所示。\n\n```\npackage main\nimport (\n\"io\"\
  \n\"strings\"\n)\nfunc main() {\nvar w1 strings.Builder\nvar w2 strings.Builder\n\
  var w3 strings.Builder\ncombinedWriter := io.MultiWriter(&w1, &w2, &w3)\nGenerateData(combinedWriter)\n\
  Printfln(\"写入器 #1: %v\", w1.String())\nPrintfln(\"写入器 #2: %v\", w2.String())\nPrintfln(\"\
  写入器 #3: %v\", w3.String())\n}\n代码清单 20-14\n在 readersandwriters 文件夹的 main.go 文件中组合写入器\n\
  ```\n\n此示例中的写入器是 `string.Builder` 类型的值，该类在第 16 章中已有描述，并实现了 `Writer` 接口。`MultiWriter`\
  \ 函数用于创建一个 `Writer`，调用其 `Write` 方法会导致同一数据被写入这三个独立的写入器。编译并执行项目，你将看到如下输出：\n\n```\n\
  写入 4 字节: Kaya\n写入 4 字节: k, L\n写入 4 字节: ifej\n写入 4 字节: acke\n写入 1 字节: t\n写入器 #1:\
  \ Kayak, Lifejacket\n写入器 #2: Kayak, Lifejacket\n写入器 #3: Kayak, Lifejacket\n```\n\
  \n### 将读取数据回显到写入器\n\n`TeeReader` 函数返回一个 `Reader`，该读取器会将接收到的数据回显至一个 `Writer`，如代码清单\
  \ 20-15 所示。\n\n```\npackage main\nimport (\n\"io\"\n\"strings\"\n)\nfunc main()\
  \ {\nr1 := strings.NewReader(\"Kayak\")\nr2 := strings.NewReader(\"Lifejacket\"\
  )\nr3 := strings.NewReader(\"Canoe\")\nconcatReader := io.MultiReader(r1, r2, r3)\n\
  var writer strings.Builder\nteeReader := io.TeeReader(concatReader, &writer);\n\
  ConsumeData(teeReader)\nPrintfln(\"回显数据: %v\", writer.String())\n}\n代码清单 20-15\n\
  在 readersandwriters 文件夹的 main.go 文件中回显数据\n```\n\n`TeeReader` 函数用于创建一个 `Reader`，该读取器会将数据回显至一个\
  \ `strings.Builder`（该类在第 16 章中已有描述，并实现了 `Writer` 接口）。编译并执行项目，你将看到如下输出，其中包含回显的数据：\n\
  \n```\n读取数据: Ka\n读取数据: ya\n读取数据: k\n读取数据: Li\n读取数据: fe\n读取数据: ja\n读取数据: ck\n读取数据:\
  \ et\n读取数据: Ca\n读取数据: no\n读取数据: e\n读取数据: KayakLifejacketCanoe\n回显数据: KayakLifejacketCanoe\n\
  ```\n\n### 限制读取数据量\n\n`LimitReader` 函数用于限制从 `Reader` 中获取的数据量，如代码清单 20-16 所示。\n\n\
  ```\npackage main\nimport (\n\"io\"\n\"strings\"\n)\nfunc main() {\nr1 := strings.NewReader(\"\
  Kayak\")\nr2 := strings.NewReader(\"Lifejacket\")\nr3 := strings.NewReader(\"Canoe\"\
  )\nconcatReader := io.MultiReader(r1, r2, r3)\nlimited := io.LimitReader(concatReader,\
  \ 5)\nConsumeData(limited)\n}\n代码清单 20-16\n在 readersandwriters 文件夹的 main.go 文件中限制数据量\n\
  ```\n\n`LimitReader` 函数的第一个参数是提供数据的 `Reader`，第二个参数是可读取的最大字节数。当达到限制时，`LimitReader`\
  \ 函数返回的 `Reader` 将发送 `EOF`——除非底层读取器先发送 `EOF`。在代码清单 20-16 中，我将限制设置为 5 字节，编译并执行项目后，将产生如下输出：\n\
  \n```\n读取数据: Ka\n读取数据: ya\n读取数据: k\n读取数据: Kayak\n```\n\n## 数据缓冲\n\n`bufio` 包提供了为读取器和写入器添加缓冲的功能。要了解无缓冲时数据是如何处理的，请在\
  \ `readersandwriters` 文件夹中添加一个名为 `custom.go` 的文件，其内容如代码清单 20-17 所示。\n\n```\npackage\
  \ main\nimport \"io\"\ntype CustomReader struct {\nreader io.Reader\nreadCount int\n\
  }\nfunc NewCustomReader(reader io.Reader) *CustomReader {\nreturn &CustomReader\
  \ { reader, 0 }\n}\nfunc (cr *CustomReader) Read(slice []byte) (count int, err error)\
  \ {\ncount, err = cr.reader.Read(slice)\ncr.readCount++\nPrintfln(\"自定义读取器: %v 字节\"\
  , count)\nif (err == io.EOF) {\nPrintfln(\"总读取次数: %v\", cr.readCount)\n}\nreturn\n\
  }\n代码清单 20-17\nreadersandwriters 文件夹中 custom.go 文件的内容\n```\n\n代码清单 20-17 中的代码定义了一个名为\
  \ `CustomReader` 的结构体类型，它作为 `Reader` 的包装器。`Read` 方法的实现会生成输出，报告读取了多少数据以及总共执行了多少次读取操作。代码清单\
  \ 20-18 将新类型用作基于字符串的 `Reader` 的包装器。\n\n```\npackage main\nimport (\n\"io\"\n\"strings\"\
  \n)\nfunc main() {\ntext := \"It was a boat. A small boat.\"\nvar reader io.Reader\
  \ = NewCustomReader(strings.NewReader(text))\nvar writer strings.Builder\nslice\
  \ := make([]byte, 5)\nfor {\ncount, err := reader.Read(slice)\nif (count > 0) {\n\
  writer.Write(slice[0:count])\n}\nif (err != nil) {\nbreak\n}\n}\nPrintfln(\"读取数据:\
  \ %v\", writer.String())\n}\n代码清单 20-18\n在 readersandwriters 文件夹的 main.go 文件中使用读取器包装器\n\
  ```\n\n`NewCustomReader` 函数用于创建一个 `CustomReader`，它从字符串中读取数据，并使用 `for` 循环通过 `byte`\
  \ 切片来消费数据。编译并执行项目，你将看到数据是如何被读取的：\n\n```\n自定义读取器: 5 字节\n自定义读取器: 5 字节\n自定义读取器: 5 字节\n\
  自定义读取器: 5 字节\n自定义读取器: 5 字节\n自定义读取器: 3 字节\n自定义读取器: 0 字节\n总读取次数: 7\n读取数据: It was a\
  \ boat. A small boat.\n```\n\n传递给 `Read` 函数的 `byte` 切片的大小决定了数据如何被消费。在本例中，切片大小为 5，这意味着每次调用\
  \ `Read` 函数最多读取 5 字节。有两次读取未获得 5 字节数据。倒数第二次读取产生了 3 字节，因为源数据不能被 5 整除，剩余了 3 字节数据。最后一次读取返回了\
  \ 0 字节，但收到了 `EOF` 错误，表明已到达数据末尾。\n\n总共读取 28 字节需要 7 次读取。（我选择的源数据中所有字符都只需单字节表示；但如果修改示例，引入需要多字节表示的字符，你可能会看到不同的读取次数。）\n\
  \n当每次操作的开销较大时，少量读取数据可能会成为问题。对于内存中存储的字符串，这不是问题，但从文件等其他数据源读取数据时，开销可能更大，因此最好进行次数较少但每次读取量更大的操作。为此，可以引入一个缓冲区，将大量数据读入其中，以满足多次较小的数据请求。表\
  \ 20-8 描述了 `bufio` 包提供的用于创建带缓冲读取器的函数。\n\n表 20-8\n\n用于创建带缓冲读取器的 `bufio` 函数\n\n| 名称\
  \ | 描述 |\n| --- | --- |\n| `NewReader(r)` | 此函数返回一个具有默认缓冲区大小（撰写本文时为 4,096 字节）的带缓冲\
  \ `Reader`。 |\n| `NewReaderSize(r, size)` | 此函数返回一个具有指定缓冲区大小的带缓冲 `Reader`。 |\n\n\
  \n\n`NewReader`和`NewReaderSize`产生的结果实现了`Reader`接口，但引入了缓冲区，这可以减少对底层数据源执行的读取操作次数。清单\
  \ 20-19 演示了在示例中引入缓冲区。\n\n```go\npackage main\nimport (\n\"io\"\n\"strings\"\n\"\
  bufio\"\n)\nfunc main() {\ntext := \"It was a boat. A small boat.\"\nvar reader\
  \ io.Reader = NewCustomReader(strings.NewReader(text))\nvar writer strings.Builder\n\
  slice := make([]byte, 5)\nreader = bufio.NewReader(reader)\nfor {\ncount, err :=\
  \ reader.Read(slice)\nif (count > 0) {\nwriter.Write(slice[0:count])\n}\nif (err\
  \ != nil) {\nbreak\n}\n}\nPrintfln(\"Read data: %v\", writer.String())\n}\n```\n\
  清单 20-19：在 `readersandwriters` 文件夹的 `main.go` 文件中使用缓冲区\n\n我使用了`NewReader`函数，它会创建一个具有默认缓冲区大小的`Reader`。带缓冲的`Reader`会填充其缓冲区，并使用其中包含的数据来响应`Read`方法的调用。编译并执行项目，查看引入缓冲区的效果：\n\
  \n```\nCustom Reader: 28 bytes\nCustom Reader: 0 bytes\nTotal Reads: 2\nRead data:\
  \ It was a boat. A small boat.\n```\n\n默认缓冲区大小为 4,096 字节，这意味着带缓冲的读取器能够通过一次读取操作读取所有数据，外加一次额外的读取来产生`EOF`结果。引入缓冲区可以减少与读取操作相关的开销，但代价是消耗了用于缓冲数据的内存。\n\
  \n### 使用额外的带缓冲读取器方法\n\n`NewReader`和`NewReaderSize`函数返回`bufio.Reader`值，这些值实现了`io.Reader`接口，并且可以作为其他类型`Reader`方法的即插即用包装器，无缝地引入读取缓冲区。\n\
  \n`bufio.Reader`结构体定义了直接使用缓冲区的额外方法，如表 20-9 所述。\n\n表 20-9：带缓冲读取器定义的方法\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| `Buffered()` | 此方法返回一个`int`，表示可以从缓冲区读取的字节数。 |\n| `Discard(count)`\
  \ | 此方法丢弃指定数量的字节。 |\n| `Peek(count)` | 此方法返回指定数量的字节，而不将其从缓冲区中移除，这意味着它们将在后续对`Read`方法的调用中被返回。\
  \ |\n| `Reset(reader)` | 此方法丢弃缓冲区中的数据，并从指定的`Reader`执行后续读取。 |\n| `Size()` | 此方法返回缓冲区的大小，以`int`表示。\
  \ |\n\n清单 20-20 展示了使用`Size`和`Buffered`方法来报告缓冲区的大小及其包含的数据量。\n\n```go\npackage main\n\
  import (\n\"io\"\n\"strings\"\n\"bufio\"\n)\nfunc main() {\ntext := \"It was a boat.\
  \ A small boat.\"\nvar reader io.Reader = NewCustomReader(strings.NewReader(text))\n\
  var writer strings.Builder\nslice := make([]byte, 5)\nbuffered := bufio.NewReader(reader)\n\
  for {\ncount, err := buffered.Read(slice)\nif (count > 0) {\nPrintfln(\"Buffer size:\
  \ %v, buffered: %v\",\nbuffered.Size(), buffered.Buffered())\nwriter.Write(slice[0:count])\n\
  }\nif (err != nil) {\nbreak\n}\n}\nPrintfln(\"Read data: %v\", writer.String())\n\
  }\n```\n清单 20-20：在 `readersandwriters` 文件夹的 `main.go` 文件中操作缓冲区\n\n编译并执行项目，你会看到每次读取操作都会消耗部分缓冲数据：\n\
  \n```\nCustom Reader: 28 bytes\nBuffer size: 4096, buffered: 23\nBuffer size: 4096,\
  \ buffered: 18\nBuffer size: 4096, buffered: 13\nBuffer size: 4096, buffered: 8\n\
  Buffer size: 4096, buffered: 3\nBuffer size: 4096, buffered: 0\nCustom Reader: 0\
  \ bytes\nTotal Reads: 2\nRead data: It was a boat. A small boat.\n```\n\n### 执行带缓冲写入\n\
  \n`bufio`包也提供了创建使用缓冲区的写入器的支持，使用的函数如表 20-10 所述。\n\n表 20-10：用于创建带缓冲写入器的 `bufio` 函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `NewWriter(w)` | 此函数返回一个具有默认缓冲区大小（撰写本文时为 4,096 字节）的带缓冲`Writer`。\
  \ |\n| `NewWriterSize(w, size)` | 此函数返回一个具有指定缓冲区大小的带缓冲`Writer`。 |\n\n表 20-10 中描述的函数的产生结果实现了`Writer`接口，这意味着它们可以无缝地引入写入缓冲区。这些函数返回的具体数据类型是`bufio.Writer`，它定义了表\
  \ 20-11 中描述的用于管理缓冲区及其内容的方法。\n\n表 20-11：`bufio.Writer` 结构体定义的方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Available()` | 此方法返回缓冲区中的可用字节数。 |\n| `Buffered()` | 此方法返回已写入缓冲区的字节数。\
  \ |\n| `Flush()` | 此方法将缓冲区的内容写入到底层`Writer`。 |\n| `Reset(writer)` | 此方法丢弃缓冲区中的数据，并将后续写入操作定向到指定的`Writer`。\
  \ |\n| `Size()` | 此方法返回缓冲区的容量（以字节为单位）。 |\n\n清单 20-21 定义了一个自定义`Writer`，它会报告其操作，并展示缓冲区的效果。这是上一节中创建的`Reader`的对应部分。\n\
  \n```go\npackage main\nimport \"io\"\n// ...为了简洁起见，省略了读取器类型和函数...\ntype CustomWriter\
  \ struct {\nwriter io.Writer\nwriteCount int\n}\nfunc NewCustomWriter(writer io.Writer)\
  \ * CustomWriter {\nreturn &CustomWriter{ writer, 0}\n}\nfunc (cw *CustomWriter)\
  \ Write(slice []byte) (count int, err error) {\ncount, err = cw.writer.Write(slice)\n\
  cw.writeCount++\nPrintfln(\"Custom Writer: %v bytes\", count)\nreturn\n}\nfunc (cw\
  \ *CustomWriter) Close() (err error) {\nif closer, ok := cw.writer.(io.Closer);\
  \ ok {\ncloser.Close()\n}\nPrintfln(\"Total Writes: %v\", cw.writeCount)\nreturn\n\
  }\n```\n清单 20-21：在 `readersandwriters` 文件夹的 `custom.go` 文件中定义自定义写入器\n\n`NewCustomWriter`构造函数使用`CustomWriter`结构体包装了一个`Writer`，该结构体会报告其写入操作。清单\
  \ 20-22 演示了不带缓冲执行写入操作的方式。\n\n```go\npackage main\nimport (\n//\"io\"\n\"strings\"\
  \n//\"bufio\"\n)\nfunc main() {\ntext := \"It was a boat. A small boat.\"\nvar builder\
  \ strings.Builder\nvar writer = NewCustomWriter(&builder)\nfor i := 0; true; {\n\
  end := i + 5\nif (end >= len(text)) {\nwriter.Write([]byte(text[i:]))\nbreak\n}\n\
  writer.Write([]byte(text[i:end]))\ni = end\n}\nPrintfln(\"Written data: %v\", builder.String())\n\
  }\n```\n清单 20-22：在 `readersandwriters` 文件夹的 `main.go` 文件中执行无缓冲写入\n\n该示例每次向`Writer`写入五个字节，该`Writer`由`strings`包中的`Builder`支持。编译并执行项目，你可以看到每次调用`Write`方法的效果：\n\
  \n```\nCustom Writer: 5 bytes\nCustom Writer: 5 bytes\nCustom Writer: 5 bytes\n\
  Custom Writer: 5 bytes\nCustom Writer: 5 bytes\nCustom Writer: 3 bytes\nWritten\
  \ data: It was a boat. A small boat.\n```\n\n带缓冲的`Writer`将数据保留在缓冲区中，并且仅当缓冲区已满或调用`Flush`方法时，才将其传递到底层`Writer`。清单\
  \ 20-23 在示例中引入了缓冲区。\n\n\n\n```\npackage main\nimport (\n//\"io\"\n\"strings\"\n\"\
  bufio\"\n)\nfunc main() {\ntext := \"It was a boat. A small boat.\"\nvar builder\
  \ strings.Builder\nvar writer = bufio.NewWriterSize(NewCustomWriter(&builder), 20)\n\
  for i := 0; true; {\nend := i + 5\nif (end >= len(text)) {\nwriter.Write([]byte(text[i:]))\n\
  writer.Flush()\nbreak\n}\nwriter.Write([]byte(text[i:end]))\ni = end\n}\nPrintfln(\"\
  Written data: %v\", builder.String())\n}\nListing 20-23\nUsing a Buffered Writer\
  \ in the main.go File in the readersandwriters Folder\n```\n\n使用缓冲的 `Writer` 并非完全无缝衔接，因为调用\
  \ `Flush` 方法确保所有数据被写出至关重要。我在清单 20-23 中选择的缓冲区大小为 20 字节，远小于默认缓冲区（在实际项目中太小而无法发挥作用），但它非常适合演示引入缓冲区如何减少示例中的写操作次数。编译并执行该项目，你将看到以下输出：\n\
  \n```\nCustom Writer: 20 bytes\nCustom Writer: 8 bytes\nWritten data: It was a boat.\
  \ A small boat.\n```\n\n## 使用读写器进行格式化和扫描\n\n在第十七章中，我描述了 `fmt` 包提供的格式化和扫描功能，并演示了它们如何与字符串一起使用。正如该章所述，`fmt`\
  \ 包提供了将这些功能应用于 `Reader` 和 `Writer` 的支持，具体内容如下节所述。我还描述了如何使用 `strings` 包中的功能与 `Writer`\
  \ 配合使用。\n\n### 从读取器中扫描值\n\n`fmt` 包提供了从 `Reader` 中扫描值并将其转换为不同类型的函数，如清单 20-24 所示。（使用函数扫描值并非必需，此处仅为强调扫描过程适用于任何\
  \ `Reader`。）\n\n```\npackage main\nimport (\n\"io\"\n\"strings\"\n//\"bufio\"\n\"\
  fmt\"\n)\nfunc scanFromReader(reader io.Reader, template string,\nvals ...interface{})\
  \ (int, error) {\nreturn fmt.Fscanf(reader, template, vals...)\n}\nfunc main() {\n\
  reader := strings.NewReader(\"Kayak Watersports $279.00\")\nvar name, category string\n\
  var price float64\nscanTemplate := \"%s %s $%f\"\n_, err := scanFromReader(reader,\
  \ scanTemplate, &name, &category, &price)\nif (err != nil) {\nPrintfln(\"Error:\
  \ %v\", err.Error())\n} else {\nPrintfln(\"Name: %v\", name)\nPrintfln(\"Category:\
  \ %v\", category)\nPrintfln(\"Price: %.2f\", price)\n}\n}\nListing 20-24\nScanning\
  \ from a Reader in the main.go File in the readersandwriters Folder\n```\n\n扫描过程从\
  \ `Reader` 中读取字节，并使用扫描模板解析接收到的数据。清单 20-24 中的扫描模板包含两个字符串和一个 `float64` 值，编译并执行代码将产生以下输出：\n\
  \n```\nName: Kayak\nCategory: Watersports\nPrice: 279.00\n```\n\n使用 `Reader` 时的一个实用技巧是通过循环逐步扫描数据，如清单\
  \ 20-25 所示。这种方法在字节随时间到达时效果很好，例如从 HTTP 连接读取时（我将在第二十五章中描述）。\n\n```\npackage main\n\
  import (\n\"io\"\n\"strings\"\n//\"bufio\"\n\"fmt\"\n)\nfunc scanFromReader(reader\
  \ io.Reader, template string,\nvals ...interface{}) (int, error) {\nreturn fmt.Fscanf(reader,\
  \ template, vals...)\n}\nfunc scanSingle(reader io.Reader, val interface{}) (int,\
  \ error) {\nreturn fmt.Fscan(reader, val)\n}\nfunc main() {\nreader := strings.NewReader(\"\
  Kayak Watersports $279.00\")\nfor {\nvar str string\n_, err := scanSingle(reader,\
  \ &str)\nif (err != nil) {\nif (err != io.EOF) {\nPrintfln(\"Error: %v\", err.Error())\n\
  }\nbreak\n}\nPrintfln(\"Value: %v\", str)\n}\n}\nListing 20-25\nScanning Gradually\
  \ in the main.go File in the readersandwriters Folder\n```\n\n`for` 循环调用 `scanSingle`\
  \ 函数，该函数使用 `Fscan` 从 `Reader` 中读取一个 `string`。值会一直被读取到返回 `EOF` 为止，此时循环终止。编译并执行该项目，你将得到以下输出：\n\
  \n```\nValue: Kayak\nValue: Watersports\nValue: $279.00\n```\n\n### 将格式化字符串写入写入器\n\
  \n`fmt` 包还提供了将格式化字符串写入 `Writer` 的函数，如清单 20-26 所示。（使用函数格式化字符串并非必需，此处仅为强调格式化适用于任何\
  \ `Reader`。）\n\n```\npackage main\nimport (\n\"io\"\n\"strings\"\n//\"bufio\"\n\"\
  fmt\"\n)\n// func scanFromReader(reader io.Reader, template string,\n//        \
  \ vals ...interface{}) (int, error) {\n//     return fmt.Fscanf(reader, template,\
  \ vals...)\n// }\n// func scanSingle(reader io.Reader, val interface{}) (int, error)\
  \ {\n//     return fmt.Fscan(reader, val)\n// }\nfunc writeFormatted(writer io.Writer,\
  \ template string, vals ...interface{}) {\nfmt.Fprintf(writer, template, vals...)\n\
  }\nfunc main() {\nvar writer strings.Builder\ntemplate := \"Name: %s, Category:\
  \ %s, Price: $%.2f\"\nwriteFormatted(&writer, template, \"Kayak\", \"Watersports\"\
  , float64(279))\nfmt.Println(writer.String())\n}\nListing 20-26\nWriting a Formatted\
  \ String in the main.go File in the readersandwriters Folder\n```\n\n`writeFormatted`\
  \ 函数使用 `fmt.Fprintf` 函数将按模板格式化的字符串写入 `Writer`。编译并执行该项目，你将看到以下输出：\n\n```\nName: Kayak,\
  \ Category: Watersports, Price: $279.00\n```\n\n### 将替换器与写入器配合使用\n\n`strings.Replacer`\
  \ 结构体可用于对 `string` 执行替换，并将修改后的结果输出到 `Writer`，如清单 20-27 所示。\n\n```\npackage main\n\
  import (\n\"io\"\n\"strings\"\n//\"bufio\"\n\"fmt\"\n)\nfunc writeReplaced(writer\
  \ io.Writer, str string, subs ...string) {\nreplacer := strings.NewReplacer(subs...)\n\
  replacer.WriteString(writer, str)\n}\nfunc main() {\ntext := \"It was a boat. A\
  \ small boat.\"\nsubs := []string { \"boat\", \"kayak\", \"small\", \"huge\" }\n\
  var writer strings.Builder\nwriteReplaced(&writer, text, subs...)\nfmt.Println(writer.String())\n\
  }\nListing 20-27\nUsing a Replacer in the main.go File in the readersandwriters\
  \ Folder\n```\n\n`WriteString` 方法执行替换并写出修改后的字符串。编译并执行代码，你将得到以下输出：\n\n```\nIt was\
  \ a kayak. A huge kayak.\n```\n\n## 总结\n\n在本章中，我介绍了 `Reader` 和 `Writer` 接口，它们在整个标准库中用于数据的读取和写入。我描述了这些接口定义的方法，解释了可用的专用实现的用法，并向你展示了如何实现缓冲、格式化和扫描。下一章，我将介绍处理\
  \ JSON 数据的支持，其中会用到本章描述的功能。\n\n\n\n"
- "# 处理 JSON 数据\n\n在本章中，我将介绍 Go 标准库对 JavaScript 对象表示法（JSON）格式的支持。JSON 已成为表示数据的实际标准，这主要是因为其简单且跨平台兼容。如果你之前没有接触过\
  \ JSON，请参阅 [`http://json.org`](http://json.org) 了解该数据格式的简要说明。JSON 通常是 RESTful Web\
  \ 服务中使用的数据格式，我将在第 3 部分进行演示。表 21-1 将 JSON 功能置于上下文中。\n\n**表 21-1** 将处理 JSON 数据置于上下文中\n\
  \n| 问题 | 回答 |\n| --- | --- |\n| 它是什么？ | JSON 数据是数据交换的实际标准，尤其在 HTTP 应用中。 |\n| 它为什么有用？\
  \ | JSON 足够简单，任何语言都支持，但能表示相对复杂的数据。 |\n| 如何使用？ | `encoding/json` 包提供了对 JSON 数据进行编码和解码的支持。\
  \ |\n| 是否存在陷阱或限制？ | 并非所有 Go 数据类型都能用 JSON 表示，这要求开发者注意 Go 数据类型将如何被表达。 |\n| 有哪些替代方案？\
  \ | 还有许多其他数据编码方式，其中一些由 Go 标准库支持。 |\n\n表 21-2 总结了本章内容。\n\n**表 21-2** 章节总结\n\n| 问题\
  \ | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 编码 JSON 数据 | 使用 `Writer` 创建 `Encoder`，并调用\
  \ `Encode` 方法 | 2–7, 14, 15 |\n| 控制结构体编码 | 使用 JSON 结构体标签或实现 `Mashaler` 接口 | 8–13,\
  \ 16 |\n| 解码 JSON 数据 | 使用 `Reader` 创建 `Decoder`，并调用 `Decode` 方法 | 17–25 |\n| 控制结构体解码\
  \ | 使用 JSON 结构体标签或实现 `Unmarshaler` 接口 | 26–28 |\n\n## 本章准备工作\n\n本章继续使用第 20 章中创建的\
  \ `readersandwriters` 项目。本章无需做任何更改。打开新的命令提示符，导航到 `readersandwriters` 文件夹，运行列表 21-1\
  \ 中所示的命令来编译并执行项目。\n\n提示：你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章（以及本书所有其他章节）的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获得帮助。\n\n```\ngo run .\n```\n*列表\
  \ 21-1* 编译并执行项目\n\n编译后的项目在执行时会产生以下输出：\n\n```\nIt was a kayak. A huge kayak.\n```\n\
  \n## 读取和写入 JSON 数据\n\n`encoding/json` 包提供了对 JSON 数据进行编码和解码的支持，如下各节所示。为方便参考，表 21-3\
  \ 描述了用于创建编码和解码 JSON 数据的结构体的构造函数，这些函数将在后面详细说明。\n\n**表 21-3** 用于 JSON 数据的 `encoding/json`\
  \ 构造函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `NewEncoder(writer)` | 此函数返回一个 `Encoder`，可用于编码\
  \ JSON 数据并将其写入指定的 `Writer`。 |\n| `NewDecoder(reader)` | 此函数返回一个 `Decoder`，可用于从指定的\
  \ `Reader` 读取 JSON 数据并解码。 |\n\n注意：Go 标准库包含用于其他数据格式的包，包括 XML 和 CSV。详情请参阅 [`https://golang.org/pkg/encoding`](https://golang.org/pkg/encoding)。\n\
  \n`encoding/json` 包还提供了不使用 `Reader` 或 `Writer` 进行 JSON 编码和解码的函数，如表 21-4 所述。\n\n\
  **表 21-4** 用于创建和解析 JSON 数据的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Marshal(value)`\
  \ | 此函数将指定的值编码为 JSON。结果是包含于 `byte` 切片中的 JSON 内容以及一个 `error`，用于指示任何编码问题。 |\n| `Unmarshal(byteSlice,\
  \ val)` | 此函数解析指定字节切片中包含的 JSON 数据，并将结果分配给指定的值。 |\n\n### 编码 JSON 数据\n\n`NewEncoder`\
  \ 构造函数用于创建 `Encoder`，该 `Encoder` 可以使用表 21-5 中描述的方法将 JSON 数据写入 `Writer`。\n\n**表 21-5**\
  \ `Encoder` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Encode(val)` | 此方法将指定的值编码为 JSON\
  \ 并写入 `Writer`。 |\n| `SetEscapeHTML(on)` | 此方法接受一个 `bool` 参数，当为 `true` 时，会对 HTML\
  \ 中危险字符进行转义。默认行为是转义这些字符。 |\n| `SetIndent(prefix, indent)` | 此方法指定一个前缀和缩进，应用于 JSON\
  \ 输出中每个字段的名称。 |\n\n除 JavaScript 外，在任何语言中，JSON 表达的数据类型都不会与原生数据类型完全对应。表 21-6 总结了基本\
  \ Go 数据类型在 JSON 中如何表示。\n\n**表 21-6** 在 JSON 中表达基本 Go 数据类型\n\n| 数据类型 | 描述 |\n| ---\
  \ | --- |\n| `bool` | Go 的 `bool` 值表示为 JSON 的 `true` 或 `false`。 |\n| `string` |\
  \ Go 的 `string` 值表示为 JSON 字符串。默认情况下，不安全的 HTML 字符会被转义。 |\n| `float32, float64` |\
  \ Go 的浮点值表示为 JSON 数字。 |\n| `int, int<size>` | Go 的整数值表示为 JSON 数字。 |\n| `uint, uint<size>`\
  \ | Go 的整数值表示为 JSON 数字。 |\n| `byte` | Go 的字节表示为 JSON 数字。 |\n| `rune` | Go 的符文表示为\
  \ JSON 数字。 |\n| `nil` | Go 的 `nil` 值表示为 JSON 的 `null` 值。 |\n| `指针` | JSON 编码器会跟随指针，并编码指针指向位置的值。\
  \ |\n\n列表 21-2 演示了创建 JSON 编码器并编码一些基本 Go 类型的过程。\n\n```\npackage main\n\nimport (\n\
  \    //\"io\"\n    \"strings\"\n    \"fmt\"\n    \"encoding/json\"\n)\n\n// func\
  \ writeReplaced(writer io.Writer, str string, subs ...string) {\n//     replacer\
  \ := strings.NewReplacer(subs...)\n//     replacer.WriteString(writer, str)\n//\
  \ }\n\nfunc main() {\n    var b bool = true\n    var str string = \"Hello\"\n  \
  \  var fval float64 = 99.99\n    var ival int = 200\n    var pointer *int = &ival\n\
  \    var writer strings.Builder\n\n    encoder := json.NewEncoder(&writer)\n   \
  \ for _, val := range []interface{} {b, str, fval, ival, pointer} {\n        encoder.Encode(val)\n\
  \    }\n    fmt.Print(writer.String())\n}\n```\n*列表 21-2* 在 `readersandwriters`\
  \ 文件夹的 `main.go` 文件中编码 JSON 数据\n\n列表 21-2 定义了一系列不同类型的变量。使用 `NewEncoder` 构造函数创建一个\
  \ `Encoder`，然后使用 `for` 循环将每个值编码为 JSON。数据被写入一个 `Builder`，调用其 `String` 方法来显示 JSON。编译并执行项目，你将看到以下输出：\n\
  \n```\ntrue\n\"Hello\"\n99.99\n\n```\n\n注意，我在列表 21-2 中使用了 `fmt.Print` 函数来生成输出。JSON\
  \ `Encoder` 在编码每个值后会添加一个换行符。\n\n\n\n#### 编码数组和切片\n\nGo 的切片和数组会被编码为 JSON 数组，唯一的例外是\
  \ `byte` 切片会被编码为 base64 编码的字符串。而字节数组则被编码为 JSON 数字数组。清单 21-3 演示了对数组和切片（包括字节类型）的支持。\n\
  \n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"encoding/json\"\n)\nfunc\
  \ main() {\nnames := []string {\"Kayak\", \"Lifejacket\", \"Soccer Ball\"}\nnumbers\
  \ := [3]int { 10, 20, 30}\nvar byteArray [5]byte\ncopy(byteArray[0:], []byte(names[0]))\n\
  byteSlice := []byte(names[0])\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\n\
  encoder.Encode(names)\nencoder.Encode(numbers)\nencoder.Encode(byteArray)\nencoder.Encode(byteSlice)\n\
  fmt.Print(writer.String())\n}\n清单 21-3\n在 readersandwriters 文件夹的 main.go 文件中编码切片和数组\n\
  ```\n\n`Encoder` 会将每个数组表达为 JSON 语法格式，但字节切片除外。编译并执行该项目，你将看到以下输出：\n\n```json\n[\"\
  Kayak\",\"Lifejacket\",\"Soccer Ball\"]\n[10,20,30]\n[75,97,121,97,107]\n\"S2F5YWs=\"\
  \n```\n\n请注意，字节数组和字节切片的处理方式是不同的，即使它们的内容相同。\n\n#### 编码映射\n\nGo 映射会被编码为 JSON 对象，映射的键用作对象的键。映射中包含的值根据其类型进行编码。清单\
  \ 21-4 编码了一个包含 `float64` 类型值的映射。\n\n**提示**\n\n映射也可用于创建 Go 数据的自定义 JSON 表示，如“创建完全自定义的\
  \ JSON 编码”一节所述。\n\n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"encoding/json\"\
  \n)\nfunc main() {\nm := map[string]float64 {\n\"Kayak\": 279,\n\"Lifejacket\":\
  \ 49.95,\n}\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\nencoder.Encode(m)\n\
  fmt.Print(writer.String())\n}\n清单 21-4\n在 readersandwriters 文件夹的 main.go 文件中编码映射\n\
  ```\n\n编译并执行该项目，你将看到以下输出，其中展示了映射中的键和值如何被编码为 JSON 对象：\n\n```json\n{\"Kayak\":279,\"\
  Lifejacket\":49.95}\n```\n\n#### 编码结构体\n\n`Encoder` 会将结构体值表达为 JSON 对象，使用导出的结构体字段名作为对象的键，字段值作为对象的值，如清单\
  \ 21-5 所示。未导出的字段会被忽略。\n\n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"\
  encoding/json\"\n)\nfunc main() {\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\n\
  encoder.Encode(Kayak)\nfmt.Print(writer.String())\n}\n清单 21-5\n在 readersandwriters\
  \ 文件夹的 main.go 文件中编码结构体\n```\n\n此示例编码了名为 `Kayak` 的 `Product` 结构体值，该结构体定义在第 20 章中。`Product`\
  \ 结构体定义了导出的 `Name`、`Category` 和 `Price` 字段，这些字段可以在项目编译并执行时生成的输出中看到：\n\n```json\n\
  {\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279}\n```\n\n##### 理解\
  \ JSON 编码中字段提升的影响\n\n当一个结构体定义了本身也是结构体的内嵌字段时，内嵌结构体的字段会被提升并编码，就像它们是由外层类型定义的一样。在 `readersandwriters`\
  \ 文件夹中添加一个名为 `discount.go` 的文件，内容如清单 21-6 所示。\n\n```go\npackage main\ntype DiscountedProduct\
  \ struct {\n*Product\nDiscount float64\n}\n清单 21-6\nreadersandwriters 文件夹中 discount.go\
  \ 文件的内容\n```\n\n`DiscountedProduct` 结构体类型定义了一个内嵌的 `Product` 字段。清单 21-7 创建了一个 `DiscountedProduct`\
  \ 值并将其编码为 JSON。\n\n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"encoding/json\"\
  \n)\nfunc main() {\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\n\
  dp := DiscountedProduct {\nProduct: &Kayak,\nDiscount: 10.50,\n}\nencoder.Encode(&dp)\n\
  fmt.Print(writer.String())\n}\n清单 21-7\n在 readersandwriters 文件夹的 main.go 文件中编码带有内嵌字段的结构体\n\
  ```\n\n`Encoder` 会将 `Product` 的字段提升到 JSON 输出中，如下所示项目编译并执行时的输出所示：\n\n```json\n{\"\
  Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279,\"Discount\":10.5}\n\
  ```\n\n请注意，清单 21-7 编码了一个指向 `struct` 值的指针。`Encode` 函数会跟随该指针并在其指向的位置编码值，这意味着清单 21-7\
  \ 中的代码在编码 `DiscountedProduct` 值时不会创建副本。\n\n#### 自定义结构体的 JSON 编码\n\n结构体的编码方式可以通过使用*结构体标签*进行自定义，结构体标签是跟随字段的字符串字面量。结构体标签是\
  \ Go 中反射支持的一部分，我将在第 28 章中描述，但对于本章来说，只需要知道标签位于字段之后，并可用于更改字段在 JSON 中编码的两个方面，如清单 21-8\
  \ 所示。\n\n```go\npackage main\ntype DiscountedProduct struct {\n*Product `json:\"\
  product\"`\nDiscount float64\n}\n清单 21-8\n在 discount.go 文件中使用结构体标签\n```\n\n结构体标签遵循特定格式，如图\
  \ 21-1 所示。术语 `json` 后跟一个冒号，再后跟编码字段时应使用的名称，该名称用双引号括起来。整个标签用反引号括起来。\n\n![../images/512642_1_En_21_Chapter/512642_1_En_21_Fig1_HTML.jpg](img/512642_1_En_21_Fig1_HTML.jpg)\n\
  \n图 21-1\n\n结构体类型\n\n清单 21-8 中的标签为内嵌字段指定了名称 `product`。编译并执行该项目，你将看到以下输出，这表明使用此标签阻止了字段提升：\n\
  \n```json\n{\"product\":{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\"\
  :279},\"Discount\":10.5}\n```\n\n##### 省略字段\n\n`Encoder` 会跳过使用指定名称（连字符 `-` 字符）的标签修饰的字段，如清单\
  \ 21-9 所示。\n\n```go\npackage main\ntype DiscountedProduct struct {\n*Product `json:\"\
  product\"`\nDiscount float64 `json:\"-\"`\n}\n清单 21-9\n在 discount.go 文件中省略字段\n```\n\
  \n这个新标签告诉 `Encoder` 在创建 `DiscountedProduct` 值的 JSON 表示时跳过 `Discount` 字段。编译并执行该项目，你将看到以下输出：\n\
  \n```json\n{\"product\":{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\"\
  :279}}\n```\n\n\n\n### 省略未赋值的字段\n\n默认情况下，JSON 的`Encoder`会包含结构体字段，即使它们尚未被赋值，如清单 21-10\
  \ 所示。\n\n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"encoding/json\"\n\
  )\nfunc main() {\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\n\
  dp := DiscountedProduct {\nProduct: &Kayak,\nDiscount: 10.50,\n}\nencoder.Encode(&dp)\n\
  dp2 := DiscountedProduct { Discount: 10.50 }\nencoder.Encode(&dp2)\nfmt.Print(writer.String())\n\
  }\n```\n\n编译并执行代码，你会看到对`nil`字段的默认处理方式：\n\n```json\n{\"product\":{\"Name\":\"Kayak\"\
  ,\"Category\":\"Watersports\",\"Price\":279}}\n{\"product\":null}\n```\n\n要忽略`nil`字段，需将`omitempty`关键字添加到字段的标签中，如清单\
  \ 21-11 所示。\n\n```go\npackage main\ntype DiscountedProduct struct {\n*Product `json:\"\
  product,omitempty\"`\nDiscount float64 `json:\"-\"`\n}\n```\n\n`omitempty`关键字与字段名之间用逗号分隔，但**不能**包含空格。编译并执行代码，你将看到没有空字段的输出：\n\
  \n```json\n{\"product\":{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\"\
  :279}}\n{}\n```\n\n要在不更改名称或字段提升的情况下跳过`nil`字段，请指定不带名称的`omitempty`关键字，如清单 21-12 所示。\n\
  \n```go\npackage main\ntype DiscountedProduct struct {\n*Product `json:\",omitempty\"\
  `\nDiscount float64 `json:\"-\"`\n}\n```\n\n如果已为嵌入字段赋值，`Encoder`将提升`Product`字段；如果未赋值，则会忽略该字段。编译并执行项目，你将看到以下输出：\n\
  \n```json\n{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279}\n{}\n\
  ```\n\n### 强制字段编码为字符串\n\n结构体标签可用于强制将字段值编码为字符串，从而覆盖该字段类型的正常编码，如清单 21-13 所示。\n\n```go\n\
  package main\ntype DiscountedProduct struct {\n*Product `json:\",omitempty\"`\n\
  Discount float64 `json:\",string\"`\n}\n```\n\n添加`string`关键字会覆盖默认编码，并为`Discount`字段生成字符串。编译并执行项目后，你可以从输出中看到这一点：\n\
  \n```json\n{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279,\"Discount\"\
  :\"10.5\"}\n{\"Discount\":\"10.5\"}\n```\n\n## 编码接口\n\nJSON 编码器可用于赋值给接口变量的值，但实际编码的是动态类型。在`readersandwriters`文件夹中添加一个名为`interface.go`的文件，内容如清单\
  \ 21-14 所示。\n\n```go\npackage main\ntype Named interface { GetName() string }\n\
  type Person struct { PersonName string}\nfunc (p *Person) GetName() string { return\
  \ p.PersonName}\nfunc (p *DiscountedProduct) GetName() string { return p.Name}\n\
  ```\n\n该文件定义了一个简单的接口和一个实现该接口的结构体，同时还为`DiscountedProduct`结构体定义了一个方法，使其也实现该接口。清单 21-15\
  \ 使用 JSON 编码器编码一个接口切片。\n\n```go\npackage main\nimport (\n\"strings\"\n\"fmt\"\n\"\
  encoding/json\"\n)\nfunc main() {\nvar writer strings.Builder\nencoder := json.NewEncoder(&writer)\n\
  dp := DiscountedProduct {\nProduct: &Kayak,\nDiscount: 10.50,\n}\nnamedItems :=\
  \ []Named { &dp, &Person{ PersonName: \"Alice\"}}\nencoder.Encode(namedItems)\n\
  fmt.Print(writer.String())\n}\n```\n\n`Named`值的切片包含不同的动态类型，编译并执行项目可以看到这一点：\n\n```json\n\
  [{\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279,\"Discount\":\"\
  10.5\"},\n{\"PersonName\":\"Alice\"}]\n```\n\n接口的任何方面都不会用于适配 JSON，切片中每个值的所有导出字段都会包含在\
  \ JSON 中。这可能是一个有用的特性，但在解码此类 JSON 时必须小心，因为每个值可能具有不同的字段集，我将在“解码数组”一节中解释这一点。\n\n##\
  \ 创建完全自定义的 JSON 编码\n\n`Encoder`会检查结构体是否实现了`Marshaler`接口，该接口表示具有自定义编码的类型，并定义了表 21-7\
  \ 中描述的方法。\n\n| 名称           | 描述                                               \
  \                                      |\n| -------------- | ----------------------------------------------------------------------------------------\
  \ |\n| `MarshalJSON()` | 调用此方法以创建值的 JSON 表示，并返回包含 JSON 的字节切片以及表示编码问题的`error`。 |\n\
  \n清单 21-16 为指向`DiscountedProduct`结构体类型的指针实现了`Marshaler`接口。\n\n```go\npackage main\n\
  import \"encoding/json\"\ntype DiscountedProduct struct {\n*Product `json:\",omitempty\"\
  `\nDiscount float64 `json:\",string\"`\n}\nfunc (dp *DiscountedProduct) MarshalJSON()\
  \ (jsn []byte, err error) {\nif (dp.Product != nil) {\nm := map[string]interface{}\
  \ {\n\"product\": dp.Name,\n\"cost\": dp.Price - dp.Discount,\n}\njsn, err = json.Marshal(m)\n\
  }\nreturn\n}\n```\n\n`MarshalJSON`方法可以以任何适合项目的方式生成 JSON，但我发现最可靠的方法是使用对 map 编码的支持。我定义一个键为`string`的\
  \ map，并使用空接口作为值。这允许我通过向 map 添加键值对来构建 JSON，然后将 map 传递给`Marshal`函数（见表 21-7），该函数使用内置支持来编码\
  \ map 中的每个值。编译并执行项目，你将看到以下输出：\n\n```json\n[{\"cost\":268.5,\"product\":\"Kayak\"\
  },{\"PersonName\":\"Alice\"}]\n```\n\n\n\n#### 解码 JSON 数据\n\n`NewDecoder` 构造函数创建一个\
  \ `Decoder`，可以使用表 21-8 中描述的方法，解码从 `Reader` 获取的 JSON 数据。\n\n**表 21-8**\n**`Decoder`\
  \ 的方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Decode(value)` | 此方法读取并解码数据，用于创建指定的值。该方法返回一个\
  \ `error`，指示解码数据时出现的问题，例如类型不匹配或遇到 EOF。 |\n| `DisallowUnknownFields()` | 默认情况下，在解码结构体类型时，`Decoder`\
  \ 会忽略 JSON 数据中任何没有对应结构体字段的键。调用此方法会导致 `Decode` 返回错误，而不是忽略该键。 |\n| `UseNumber()` |\
  \ 默认情况下，JSON 数值被解码为 `float64` 值。调用此方法将使用 `Number` 类型代替，如“解码数值”一节所述。 |\n\n清单 21-17\
  \ 演示了解码基本数据类型。\n\n```\npackage main\nimport (\n\"strings\"\n//\"fmt\"\n\"encoding/json\"\
  \n\"io\"\n)\nfunc main() {\nreader := strings.NewReader(`true \"Hello\" 99.99 200`)\n\
  vals := []interface{} { }\ndecoder := json.NewDecoder(reader)\nfor {\nvar decodedVal\
  \ interface{}\nerr := decoder.Decode(&decodedVal)\nif (err != nil) {\nif (err !=\
  \ io.EOF) {\nPrintfln(\"Error: %v\", err.Error())\n}\nbreak\n}\nvals = append(vals,\
  \ decodedVal)\n}\nfor _, val := range vals {\nPrintfln(\"Decoded (%T): %v\", val,\
  \ val)\n}\n}\n```\n\n**清单 21-17**\n*在 readersandwriters 文件夹的 main.go 文件中解码基本数据类型*\n\
  \n我创建了一个 `Reader`，它从一个包含一系列值的字符串中生成数据，这些值用空格分隔（JSON 规范允许值之间用空格或换行符分隔）。\n\n解码数据的第一步是创建\
  \ `Decoder`，它接受一个 `Reader`。我想解码多个值，所以在 `for` 循环内部调用 `Decode` 方法。`Decoder` 能够为 JSON\
  \ 值选择合适的 Go 数据类型，这是通过向 `Decode` 方法传递一个指向空接口的指针来实现的，如下所示：\n\n```\n...\nvar decodedVal\
  \ interface{}\nerr := decoder.Decode(&decodedVal)\n...\n```\n\n`Decode` 方法返回一个 `error`，它指示解码问题，但也用于通过\
  \ `io.EOF` 错误来标识数据结束。一个 `for` 循环重复解码值，直到遇到 EOF，然后我使用另一个 `for` 循环，使用第 17 章中描述的格式化动词，写出每个解码后的类型和值。编译并执行该项目，你将看到解码后的值：\n\
  \n```\nDecoded (bool): true\nDecoded (string): Hello\nDecoded (float64): 99.99\n\
  Decoded (float64): 200\n```\n\n#### 解码数值\n\nJSON 使用单一数据类型来表示浮点数和整数值。`Decoder` 将这些数值解码为\
  \ `float64` 值，这可以从上一个示例的输出中看到。\n\n可以通过调用 `Decoder` 的 `UseNumber` 方法来改变此行为，该方法会使\
  \ JSON 数值被解码为 `Number` 类型，该类型定义在 `encoding/json` 包中。`Number` 类型定义了表 21-9 中描述的方法。\n\
  \n**表 21-9**\n**`Number` 类型定义的方法**\n\n| 名称 | 描述 |\n| --- | --- |\n| `Int64()` |\
  \ 此方法将解码后的值作为 `int64` 返回，并返回一个 `error`，指示该值是否无法转换。 |\n| `Float64()` | 此方法将解码后的值作为\
  \ `float64` 返回，并返回一个 `error`，指示该值是否无法转换。 |\n| `String()` | 此方法返回来自 JSON 数据的未转换的\
  \ `string`。 |\n\n表 21-9 中的方法按顺序使用。并非所有 JSON 数值都能表示为 Go 的 `int64` 值，因此这通常是首先调用的方法。如果尝试转换为整数失败，则可以调用\
  \ `Float64` 方法。如果某个数字无法转换为任何一种 Go 类型，则可以使用 `String` 方法获取来自 JSON 数据的未转换字符串。此顺序如清单\
  \ 21-18 所示。\n\n```\npackage main\nimport (\n\"strings\"\n//\"fmt\"\n\"encoding/json\"\
  \n\"io\"\n)\nfunc main() {\nreader := strings.NewReader(`true \"Hello\" 99.99 200`)\n\
  vals := []interface{} { }\ndecoder := json.NewDecoder(reader)\ndecoder.UseNumber()\n\
  for {\nvar decodedVal interface{}\nerr := decoder.Decode(&decodedVal)\nif (err !=\
  \ nil) {\nif (err != io.EOF) {\nPrintfln(\"Error: %v\", err.Error())\n}\nbreak\n\
  }\nvals = append(vals, decodedVal)\n}\nfor _, val := range vals {\nif num, ok :=\
  \ val.(json.Number); ok {\nif ival, err := num.Int64(); err == nil {\nPrintfln(\"\
  Decoded Integer: %v\", ival)\n} else if fpval, err := num.Float64(); err == nil\
  \ {\nPrintfln(\"Decoded Floating Point: %v\", fpval)\n} else {\nPrintfln(\"Decoded\
  \ String: %v\", num.String())\n}\n} else {\nPrintfln(\"Decoded (%T): %v\", val,\
  \ val)\n}\n}\n}\n```\n\n**清单 21-18**\n*在 readersandwriters 文件夹的 main.go 文件中解码数字*\n\
  \n编译并执行代码，你将看到其中一个 JSON 值已被转换为 `int64` 值：\n\n```\nDecoded (bool): true\nDecoded\
  \ (string): Hello\nDecoded Floating Point: 99.99\nDecoded Integer: 200\n```\n\n\
  #### 为解码指定类型\n\n前面的示例将一个空接口变量传递给 `Decode` 方法，如下所示：\n\n```\n...\nvar decodedVal interface{}\n\
  err := decoder.Decode(&decodedVal)\n...\n```\n\n这会让 `Decoder` 为将要解码的 JSON 值选择 Go\
  \ 数据类型。如果你知道正在解码的 JSON 数据的结构，你可以通过使用该类型的变量来接收解码值，从而指示 `Decoder` 使用特定的 Go 类型，如清单\
  \ 21-19 所示。\n\n```\npackage main\nimport (\n\"strings\"\n//\"fmt\"\n\"encoding/json\"\
  \n//\"io\"\n)\nfunc main() {\nreader := strings.NewReader(`true \"Hello\" 99.99\
  \ 200`)\nvar bval bool\nvar sval string\nvar fpval float64\nvar ival int\nvals :=\
  \ []interface{} { &bval, &sval, &fpval, &ival }\ndecoder := json.NewDecoder(reader)\n\
  for i := 0; i < len(vals); i++ {\nerr := decoder.Decode(vals[i])\nif err != nil\
  \ {\nPrintfln(\"Error: %v\", err.Error())\nbreak\n}\n}\nPrintfln(\"Decoded (%T):\
  \ %v\", bval, bval)\nPrintfln(\"Decoded (%T): %v\", sval, sval)\nPrintfln(\"Decoded\
  \ (%T): %v\", fpval, fpval)\nPrintfln(\"Decoded (%T): %v\", ival, ival)\n}\n```\n\
  \n**清单 21-19**\n*在 readersandwriters 文件夹的 main.go 文件中指定解码类型*\n\n清单 21-19 指定了应使用的解码数据类型，并为方便起见将它们分组到一个切片中。值被解码为目标类型，这可以在编译并执行项目时显示的输出中看到：\n\
  \n```\nDecoded (bool): true\nDecoded (string): Hello\nDecoded (float64): 99.99\n\
  Decoded (int): 200\n```\n\n如果 `Decoder` 无法将 JSON 值解码为指定的类型，它将返回一个错误。只有在您确信自己了解将要解码的\
  \ JSON 数据时，才应使用此技术。\n\n\n\n### 解码数组\n\n`Decoder`会**自动**处理数组，但必须小心，因为 JSON 允许数组包含不同类型的值，这与\
  \ Go 强制执行的严格类型规则相冲突。清单 21-20 演示了如何解码数组。\n\n```go\npackage main\n\nimport (\n\t\"\
  strings\"\n\t//\"fmt\"\n\t\"encoding/json\"\n\t\"io\"\n)\n\nfunc main() {\n\treader\
  \ := strings.NewReader(`[10,20,30][\"Kayak\",\"Lifejacket\",279]`)\n\tvals := []interface{}{}\n\
  \tdecoder := json.NewDecoder(reader)\n\tfor {\n\t\tvar decodedVal interface{}\n\t\
  \terr := decoder.Decode(&decodedVal)\n\t\tif err != nil {\n\t\t\tif err != io.EOF\
  \ {\n\t\t\t\tPrintfln(\"Error: %v\", err.Error())\n\t\t\t}\n\t\t\tbreak\n\t\t}\n\
  \t\tvals = append(vals, decodedVal)\n\t}\n\tfor _, val := range vals {\n\t\tPrintfln(\"\
  Decoded (%T): %v\", val, val)\n\t}\n}\n```\n\n*清单 21-20 在 readersandwriters 文件夹的\
  \ main.go 文件中解码一个数组*\n\n源 JSON 数据包含两个数组，一个只包含数字，另一个混合了数字和字符串。`Decoder`不会尝试判断一个 JSON\
  \ 数组是否可以用单个 Go 类型表示，而是将每个数组解码成一个空接口切片：\n\n```\nDecoded ([]interface {}): [10 20\
  \ 30]\nDecoded ([]interface {}): [Kayak Lifejacket 279]\n```\n\n每个值都根据 JSON 值进行类型化，但切片的类型是空接口。如果你事先知道\
  \ JSON 数据的结构，并且正在解码一个包含单一 JSON 数据类型的数组，那么你可以将所需类型的 Go 切片传递给`Decode`方法，如清单 21-21\
  \ 所示。\n\n```go\npackage main\n\nimport (\n\t\"strings\"\n\t//\"fmt\"\n\t\"encoding/json\"\
  \n\t//\"io\"\n)\n\nfunc main() {\n\treader := strings.NewReader(`[10,20,30][\"Kayak\"\
  ,\"Lifejacket\",279]`)\n\tints := []int{}\n\tmixed := []interface{}{}\n\tvals :=\
  \ []interface{}{&ints, &mixed}\n\tdecoder := json.NewDecoder(reader)\n\tfor i :=\
  \ 0; i < len(vals); i++ {\n\t\terr := decoder.Decode(vals[i])\n\t\tif err != nil\
  \ {\n\t\t\tPrintfln(\"Error: %v\", err.Error())\n\t\t\tbreak\n\t\t}\n\t}\n\tPrintfln(\"\
  Decoded (%T): %v\", ints, ints)\n\tPrintfln(\"Decoded (%T): %v\", mixed, mixed)\n\
  }\n```\n\n*清单 21-21 在 readersandwriters 文件夹的 main.go 文件中指定解码后的数组类型*\n\n我可以指定一个`int`切片来解码\
  \ JSON 数据中的第一个数组，因为所有值都可以表示为 Go 的`int`值。第二个数组包含混合值，这意味着我必须将空接口指定为目标类型。当使用空接口时，字面量切片语法很笨拙，因为需要两组花括号：\n\
  \n```go\n...\nmixed := []interface{}{}\n...\n```\n\n空接口类型包含空花括号（`interface{}`），指定空切片（`{}`）也是如此。编译并执行项目，你会看到第一个\
  \ JSON 数组已被解码成一个`int`切片：\n\n```\nDecoded ([]int): [10 20 30]\nDecoded ([]interface\
  \ {}): [Kayak Lifejacket 279]\n```\n\n### 解码映射\n\nJavaScript 对象表示为键值对，这使得将它们解码为\
  \ Go 映射变得容易，如清单 21-22 所示。\n\n```go\npackage main\n\nimport (\n\t\"strings\"\n\t\
  //\"fmt\"\n\t\"encoding/json\"\n\t//\"io\"\n)\n\nfunc main() {\n\treader := strings.NewReader(`{\"\
  Kayak\" : 279, \"Lifejacket\" : 49.95}`)\n\tm := map[string]interface{}{}\n\tdecoder\
  \ := json.NewDecoder(reader)\n\terr := decoder.Decode(&m)\n\tif err != nil {\n\t\
  \tPrintfln(\"Error: %v\", err.Error())\n\t} else {\n\t\tPrintfln(\"Map: %T, %v\"\
  , m, m)\n\t\tfor k, v := range m {\n\t\t\tPrintfln(\"Key: %v, Value: %v\", k, v)\n\
  \t\t}\n\t}\n}\n```\n\n*清单 21-22 在 readersandwriters 文件夹的 main.go 文件中解码一个映射*\n\n\
  最安全的方法是定义一个具有`string`键和空接口值的映射，这确保了 JSON 数据中的所有键值对都可以解码到该映射中，如清单 21-22 所示。一旦 JSON\
  \ 被解码，就会使用一个`for`循环来枚举映射内容，当项目被编译和执行时，会产生以下输出：\n\n```\nMap: map[string]interface\
  \ {}, map[Kayak:279 Lifejacket:49.95]\nKey: Kayak, Value: 279\nKey: Lifejacket,\
  \ Value: 49.95\n```\n\n单个 JSON 对象可以用于多种数据类型作为值，但如果你事先知道将要解码的 JSON 对象具有单一值类型，那么在定义数据将被解码到的映射时，你可以更具体地指定，如清单\
  \ 21-23 所示。\n\n```go\npackage main\n\nimport (\n\t\"strings\"\n\t//\"fmt\"\n\t\"\
  encoding/json\"\n\t//\"io\"\n)\n\nfunc main() {\n\treader := strings.NewReader(`{\"\
  Kayak\" : 279, \"Lifejacket\" : 49.95}`)\n\tm := map[string]float64{}\n\tdecoder\
  \ := json.NewDecoder(reader)\n\terr := decoder.Decode(&m)\n\tif err != nil {\n\t\
  \tPrintfln(\"Error: %v\", err.Error())\n\t} else {\n\t\tPrintfln(\"Map: %T, %v\"\
  , m, m)\n\t\tfor k, v := range m {\n\t\t\tPrintfln(\"Key: %v, Value: %v\", k, v)\n\
  \t\t}\n\t}\n}\n```\n\n*清单 21-23 在 readersandwriters 文件夹的 main.go 文件中使用特定的值类型*\n\n\
  JSON 对象中的值都可以表示为 Go 的`float64`类型，因此清单 21-23 将映射类型更改为`map[string]float64`。编译并执行项目，你会看到映射类型的更改：\n\
  \n```\nMap: map[string]float64, map[Kayak:279 Lifejacket:49.95]\nKey: Kayak, Value:\
  \ 279\nKey: Lifejacket, Value: 49.95\n```\n\n### 解码结构体\n\nJSON 对象的键值结构可以解码为 Go 结构体值，如清单\
  \ 21-24 所示，尽管这需要比将数据解码为映射更多的 JSON 数据知识。\n\n**解码为接口类型**\n\n正如本章前面所解释的，JSON 编码器通过使用动态类型的导出字段对值进行编码来处理接口。这是因为\
  \ JSON 处理的是键值对，无法表达方法。因此，你不能直接从 JSON 解码到接口变量。相反，你必须解码到一个结构体或映射，然后将创建的值赋给一个接口变量。\n\
  \n```go\npackage main\n\nimport (\n\t\"strings\"\n\t//\"fmt\"\n\t\"encoding/json\"\
  \n\t\"io\"\n)\n\nfunc main() {\n\treader := strings.NewReader(`\n\t\t{\"Name\":\"\
  Kayak\",\"Category\":\"Watersports\",\"Price\":279}\n\t\t{\"Name\":\"Lifejacket\"\
  ,\"Category\":\"Watersports\" }\n\t\t{\"name\":\"Canoe\",\"category\":\"Watersports\"\
  , \"price\": 100, \"inStock\": true }\n\t`)\n\tdecoder := json.NewDecoder(reader)\n\
  \tfor {\n\t\tvar val Product\n\t\terr := decoder.Decode(&val)\n\t\tif err != nil\
  \ {\n\t\t\tif err != io.EOF {\n\t\t\t\tPrintfln(\"Error: %v\", err.Error())\n\t\t\
  \t}\n\t\t\tbreak\n\t\t} else {\n\t\t\tPrintfln(\"Name: %v, Category: %v, Price:\
  \ %v\",\n\t\t\t\tval.Name, val.Category, val.Price)\n\t\t}\n\t}\n}\n```\n\n*清单 21-24\
  \ 在 readersandwriters 文件夹的 main.go 文件中解码为一个结构体*\n\n`Decoder`解码 JSON 对象，并使用键来设置导出结构体字段的值。字段和\
  \ JSON 键的大小写不必匹配，并且`Decoder`会忽略任何没有对应结构体字段的 JSON 键，以及任何没有对应 JSON 键的结构体字段。清单 21-24\
  \ 中的 JSON 对象包含不同的大小写，并且键的数量多于或少于`Product`结构体的字段。`Decoder`尽其所能地处理数据，当项目被编译和执行时，会产生以下输出：\n\
  \n```\nName: Kayak, Category: Watersports, Price: 279\nName: Lifejacket, Category:\
  \ Watersports, Price: 0\nName: Canoe, Category: Watersports, Price: 100\n```\n\n\
  \n\n### 禁止未使用的键\n\n默认情况下，`Decoder` 会忽略 JSON 中那些没有对应结构体字段的键。可以通过调用 `DisallowUnknownFields`\
  \ 方法来改变此行为，如代码清单 21-25 所示，当遇到此类键时会触发一个错误。\n\n```\n...\ndecoder := json.NewDecoder(reader)\n\
  decoder.DisallowUnknownFields()\n...\n代码清单 21-25\n在 readersandwriters 文件夹的 main.go\
  \ 文件中禁止未使用的键\n```\n\n代码清单 21-25 中定义的其中一个 JSON 对象包含一个 `inStock` 键，该键没有对应的 `Product`\
  \ 字段。通常，这个键会被忽略，但由于调用了 `DisallowUnknownFields` 方法，解码该对象会产生一个错误，你可以在输出中看到：\n\n```\n\
  Name: Kayak, Category: Watersports, Price: 279\nName: Lifejacket, Category: Watersports,\
  \ Price: 0\nError: json: unknown field \"inStock\"\n```\n\n### 使用结构体标签控制解码\n\nJSON\
  \ 对象中使用的键并不总是与 Go 项目中结构体定义的字段一致。当发生这种情况时，可以使用结构体标签来映射 JSON 数据和结构体，如代码清单 21-26 所示。\n\
  \n```\npackage main\nimport \"encoding/json\"\ntype DiscountedProduct struct {\n\
  *Product `json:\",omitempty\"`\nDiscount float64 `json:\"offer,string\"`\n}\nfunc\
  \ (dp *DiscountedProduct) MarshalJSON() (jsn []byte, err error) {\nif (dp.Product\
  \ != nil) {\nm := map[string]interface{} {\n\"product\": dp.Name,\n\"cost\": dp.Price\
  \ - dp.Discount,\n}\njsn, err = json.Marshal(m)\n}\nreturn\n}\n代码清单 21-26\n在 readersandwriters\
  \ 文件夹的 discount.go 文件中使用结构体标签\n```\n\n应用于 `Discount` 字段的标签告诉 `Decoder`，该字段的值应从名为\
  \ `offer` 的 JSON 键中获取，并且该值将从字符串解析，而不是通常期望的 Go `float64` 值的 JSON 数字。代码清单 21-27 将一个\
  \ JSON 字符串解码为 `DiscountedProduct` 结构体值。\n\n```\npackage main\nimport (\n\"strings\"\
  \n//\"fmt\"\n\"encoding/json\"\n\"io\"\n)\nfunc main() {\nreader := strings.NewReader(`\n\
  {\"Name\":\"Kayak\",\"Category\":\"Watersports\",\"Price\":279, \"Offer\": \"10\"\
  }`)\ndecoder := json.NewDecoder(reader)\nfor {\nvar val DiscountedProduct\nerr :=\
  \ decoder.Decode(&val)\nif err != nil {\nif err != io.EOF {\nPrintfln(\"Error: %v\"\
  , err.Error())\n}\nbreak\n} else {\nPrintfln(\"Name: %v, Category: %v, Price: %v,\
  \ Discount: %v\",\nval.Name, val.Category, val.Price, val.Discount)\n}\n}\n}\n代码清单\
  \ 21-27\n在 readersandwriters 文件夹的 main.go 文件中解码带有标签的结构体\n```\n\n编译并执行项目，你将看到结构体标签如何用于控制\
  \ JSON 数据的解码：\n\n```\nName: Kayak, Category: Watersports, Price: 279, Discount:\
  \ 10\n```\n\n### 创建完全自定义的 JSON 解码器\n\n`Decoder` 会检查结构体是否实现了 `Unmarshaler` 接口，该接口表示一个具有自定义编码的类型，并定义了表\
  \ 21-10 中描述的方法。\n\n**表 21-10** Unmarshaler 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `UnmarshalJSON(byteSlice)`\
  \ | 调用此方法来解码指定字节切片中包含的 JSON 数据。结果是表示编码问题的 `error`。 |\n\n代码清单 21-28 为 `DiscountedProduct`\
  \ 结构体类型的指针实现了该接口。\n\n```\npackage main\nimport (\n\"encoding/json\"\n\"strconv\"\
  \n)\ntype DiscountedProduct struct {\n*Product `json:\",omitempty\"`\nDiscount float64\
  \ `json:\"offer,string\"`\n}\nfunc (dp *DiscountedProduct) MarshalJSON() (jsn []byte,\
  \ err error) {\nif (dp.Product != nil) {\nm := map[string]interface{} {\n\"product\"\
  : dp.Name,\n\"cost\": dp.Price - dp.Discount,\n}\njsn, err = json.Marshal(m)\n}\n\
  return\n}\nfunc (dp *DiscountedProduct) UnmarshalJSON(data []byte) (err error) {\n\
  mdata := map[string]interface{} {}\nerr = json.Unmarshal(data, &mdata)\nif (dp.Product\
  \ == nil) {\ndp.Product = &Product{}\n}\nif (err == nil) {\nif name, ok := mdata[\"\
  Name\"].(string); ok {\ndp.Name = name\n}\nif category, ok := mdata[\"Category\"\
  ].(string); ok {\ndp.Category = category\n}\nif price, ok := mdata[\"Price\"].(float64);\
  \ ok {\ndp.Price = price\n}\nif discount, ok := mdata[\"Offer\"].(string); ok {\n\
  fpval, fperr := strconv.ParseFloat(discount, 64)\nif (fperr == nil) {\ndp.Discount\
  \ = fpval\n}\n}\n}\nreturn\n}\n代码清单 21-28\n在 readersandwriters 文件夹的 discount.go\
  \ 文件中定义自定义解码器\n```\n\n这个 `UnmarshalJSON` 方法的实现使用了 `Unmarshal` 方法将 JSON 数据解码到一个映射中，然后检查\
  \ `DiscountedProduct` 结构体所需的每个值的类型。编译并执行项目，你将看到自定义解码：\n\n```\nName: Kayak, Category:\
  \ Watersports, Price: 279, Discount: 10\n```\n\n## 本章小结\n\n在本章中，我描述了 Go 对处理 JSON\
  \ 数据的支持，这依赖于第 20 章中描述的 `Reader` 和 `Writer` 接口。这些接口在整个标准库中一致使用，正如你将在下一章中看到的，我将解释如何读写文件。\n\
  \n"
- "# 22. 文件处理\n\n在本章中，我将介绍 Go 标准库为处理文件和目录提供的功能。Go 在多个平台上运行，标准库采用平台中立的方法，这样代码编写就无需了解不同操作系统使用的文件系统。表\
  \ 22-1 提供了文件处理的背景信息。\n\n**表 22-1** 文件处理背景\n\n| 问题 | 答案 |\n| --- | --- |\n| 它们是什么？\
  \ | 这些功能提供对文件系统的访问，以便可以读写文件。 |\n| 它们为什么有用？ | 文件用于从日志记录到配置文件的各种场景。 |\n| 如何使用它们？ |\
  \ 通过 `os` 包访问这些功能，该包提供对文件系统的平台中立访问。 |\n| 是否存在陷阱或限制？ | 必须考虑底层文件系统的一些因素，尤其是在处理路径时。\
  \ |\n| 是否有其他替代方案？ | Go 支持其他存储数据的方式，例如数据库，但没有访问文件的替代机制。 |\n\n**表 22-2** 本章摘要\n\n\
  | 问题 | 解决方案 | 代码清单 |\n| --- | --- | --- |\n| 读取文件内容 | 使用 `ReadFile` 函数 | 6–8 |\n\
  | 控制文件的读取方式 | 获取一个 `File` 结构体并使用其提供的功能 | 9–10 |\n| 写入文件内容 | 使用 `WriteFile` 函数 |\
  \ 11 |\n| 控制文件的写入方式 | 获取一个 `File` 结构体并使用其提供的功能 | 12, 13 |\n| 创建新文件 | 使用 `Create`\
  \ 或 `CreateTemp` 函数 | 14 |\n| 处理文件路径 | 使用 `path/filepath` 包中的函数，或使用 `os` 包中提供的常见位置函数\
  \ | 15 |\n| 管理文件和目录 | 使用 `os` 包提供的函数 | 16–17, 19, 20 |\n| 判断文件是否存在 | 检查 `Stat` 函数返回的\
  \ `error` | 18 |\n\n\n\n## 本章准备工作\n\n为完成本章的准备工作，请打开一个新的命令提示符，导航至一个方便的位置，并创建一个名为`files`的目录。运行清单\
  \ 22-1 所示的命令来创建一个模块文件。\n\n> **提示**\n>\n> 你可以从 [`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)\
  \ 下载本章——以及本书其他所有章节——的示例项目。如果在运行示例时遇到问题，请参阅第 2 章了解如何获取帮助。\n\n```\ngo mod init files\n\
  清单 22-1\n初始化模块\n```\n\n在`files`文件夹中添加一个名为`printer.go`的文件，内容如清单 22-2 所示。\n\n```\n\
  package main\nimport \"fmt\"\nfunc Printfln(template string, values ...interface{})\
  \ {\nfmt.Printf(template + \"\\n\", values...)\n}\n清单 22-2\nfiles 文件夹中 printer.go\
  \ 文件的内容\n```\n\n在`files`文件夹中添加一个名为`product.go`的文件，内容如清单 22-3 所示。\n\n```\npackage\
  \ main\ntype Product struct {\nName, Category string\nPrice float64\n}\nvar Products\
  \ = []Product {\n{ \"Kayak\", \"Watersports\", 279 },\n{ \"Lifejacket\", \"Watersports\"\
  , 49.95 },\n{ \"Soccer Ball\", \"Soccer\", 19.50 },\n{ \"Corner Flags\", \"Soccer\"\
  , 34.95 },\n{ \"Stadium\", \"Soccer\", 79500 },\n{ \"Thinking Cap\", \"Chess\",\
  \ 16 },\n{ \"Unsteady Chair\", \"Chess\", 75 },\n{ \"Bling-Bling King\", \"Chess\"\
  , 1200 },\n}\n清单 22-3\nfiles 文件夹中 product.go 文件的内容\n```\n\n在`files`文件夹中添加一个名为`main.go`的文件，内容如清单\
  \ 22-4 所示。\n\n```\npackage main\nfunc main() {\nfor _, p := range Products {\nPrintfln(\"\
  Product: %v, Category: %v, Price: $%.2f\",\np.Name, p.Category, p.Price)\n}\n}\n\
  清单 22-4\nfiles 文件夹中 main.go 文件的内容\n```\n\n在命令提示符中，于`files`文件夹内运行清单 22-5 所示的命令。\n\
  \n```\ngo run .\n清单 22-5\n运行示例项目\n```\n\n代码将被编译并执行，产生以下输出：\n\n```\nProduct: Kayak,\
  \ Category: Watersports, Price: $279.00\nProduct: Lifejacket, Category: Watersports,\
  \ Price: $49.95\nProduct: Soccer Ball, Category: Soccer, Price: $19.50\nProduct:\
  \ Corner Flags, Category: Soccer, Price: $34.95\nProduct: Stadium, Category: Soccer,\
  \ Price: $79500.00\nProduct: Thinking Cap, Category: Chess, Price: $16.00\nProduct:\
  \ Unsteady Chair, Category: Chess, Price: $75.00\nProduct: Bling-Bling King, Category:\
  \ Chess, Price: $1200.00\n```\n\n### 读取文件\n\n处理文件时，关键包是`os`包。该包以一种隐藏大部分实现细节的方式提供对操作系统特性（包括文件系统）的访问，这意味着无论使用哪种操作系统，都可以使用相同的函数来达到相同的结果。\n\
  \n`os`包采用的中立方法导致了一些妥协，并倾向于 UNIX/Linux，而非 Windows。但即便如此，`os`包提供的功能是可靠且稳定的，使得编写的 Go\
  \ 代码可以在不同平台上无需修改即可使用。表 22-3 描述了`os`包中用于读取文件的函数。\n\n**表 22-3** `os`包中用于读取文件的函数\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `ReadFile(name)` | 此函数打开指定文件并读取其内容。返回结果是一个包含文件内容的`byte`切片，以及一个指示打开或读取文件时出现问题的`error`。\
  \ |\n| `Open(name)` | 此函数打开指定文件以供读取。返回结果是一个`File`结构体和一个指示打开文件时出现问题的`error`。 |\n\n\
  为准备本章此部分的示例，请在`files`文件夹中添加一个名为`config.json`的文件，内容如清单 22-6 所示。\n\n```\n{\n\"Username\"\
  : \"Alice\",\n\"AdditionalProducts\": [\n{\"name\": \"Hat\", \"category\": \"Skiing\"\
  , \"price\": 10},\n{\"name\": \"Boots\", \"category\":\"Skiing\", \"price\": 220.51\
  \ },\n{\"name\": \"Gloves\", \"category\":\"Skiing\", \"price\": 40.20 }\n]\n}\n\
  清单 22-6\nfiles 文件夹中 config.json 文件的内容\n```\n\n读取文件最常见的原因之一是加载配置数据。JSON 格式非常适合配置文件，因为它处理简单，在\
  \ Go 标准库中有良好的支持（如第 21 章所示），并且可以表示复杂的结构。\n\n## 使用便捷的读取函数\n\n`ReadFile`函数提供了一种便捷的方式，可以在一步操作中将文件的完整内容读取到一个字节切片中。在`files`文件夹中添加一个名为`readconfig.go`的文件，内容如清单\
  \ 22-7 所示。\n\n```\npackage main\nimport \"os\"\nfunc LoadConfig() (err error) {\n\
  data, err := os.ReadFile(\"config.json\")\nif (err == nil) {\nPrintfln(string(data))\n\
  }\nreturn\n}\nfunc init() {\nerr := LoadConfig()\nif (err != nil) {\nPrintfln(\"\
  Error Loading Config: %v\", err.Error())\n}\n}\n清单 22-7\nfiles 文件夹中 readconfig.go\
  \ 文件的内容\n```\n\n`LoadConfig`函数使用`ReadFile`函数来读取`config.json`文件的内容。当应用程序执行时，将从当前工作目录读取该文件，这意味着我只需使用文件名即可打开该文件。\n\
  \n文件内容以`byte`切片形式返回，然后被转换为`string`并输出。`LoadConfig`函数由一个初始化函数调用，这确保了配置文件被读取。编译并执行代码，你将在应用程序产生的输出中看到`config.json`文件的内容：\n\
  \n```\n{\n\"Username\": \"Alice\",\n\"AdditionalProducts\": [\n{\"name\": \"Hat\"\
  , \"category\": \"Skiing\", \"price\": 10},\n{\"name\": \"Boots\", \"category\"\
  :\"Skiing\", \"price\": 220.51 },\n{\"name\": \"Gloves\", \"category\":\"Skiing\"\
  , \"price\": 40.20 }\n]\n}\nProduct: Kayak, Category: Watersports, Price: $279.00\n\
  Product: Lifejacket, Category: Watersports, Price: $49.95\nProduct: Soccer Ball,\
  \ Category: Soccer, Price: $19.50\nProduct: Corner Flags, Category: Soccer, Price:\
  \ $34.95\nProduct: Stadium, Category: Soccer, Price: $79500.00\nProduct: Thinking\
  \ Cap, Category: Chess, Price: $16.00\nProduct: Unsteady Chair, Category: Chess,\
  \ Price: $75.00\nProduct: Bling-Bling King, Category: Chess, Price: $1200.00\n```\n\
  \n\n\n#### 解码 JSON 数据\n\n对于示例配置文件，将文件内容作为字符串接收并不理想，更有用的做法是将内容解析为 JSON。只需将字节数据包装起来，使其可以通过\
  \ `Reader` 访问，即可轻松实现，如代码清单 22-8 所示。\n\n```\npackage main\nimport (\n\"os\"\n\"encoding/json\"\
  \n\"strings\"\n)\ntype ConfigData struct {\nUserName string\nAdditionalProducts\
  \ []Product\n}\nvar Config ConfigData\nfunc LoadConfig() (err error) {\ndata, err\
  \ := os.ReadFile(\"config.json\")\nif (err == nil) {\ndecoder := json.NewDecoder(strings.NewReader(string(data)))\n\
  err = decoder.Decode(&Config)\n}\nreturn\n}\nfunc init() {\nerr := LoadConfig()\n\
  if (err != nil) {\nPrintfln(\"Error Loading Config: %v\", err.Error())\n} else {\n\
  Printfln(\"Username: %v\", Config.UserName)\nProducts = append(Products, Config.AdditionalProducts...)\n\
  }\n}\n代码清单 22-8\n在 files 文件夹的 readconfig.go 文件中解码 JSON 数据\n```\n\n我本可以将 `config.json`\
  \ 文件中的 JSON 数据解码到一个映射中，但在代码清单 22-8 中，我采用了一种更有结构化的方法，定义了一个结构体类型，其字段与配置数据的结构相匹配。我发现这种做法在实际项目中更容易使用配置数据。一旦配置数据被解码，我就输出\
  \ `UserName` 字段的值，并将 `Product` 值追加到 `product.go` 文件中定义的切片中。编译并执行该项目，你将看到以下输出：\n\n\
  ```\nUsername: Alice\nProduct: Kayak, Category: Watersports, Price: $279.00\nProduct:\
  \ Lifejacket, Category: Watersports, Price: $49.95\nProduct: Soccer Ball, Category:\
  \ Soccer, Price: $19.50\nProduct: Corner Flags, Category: Soccer, Price: $34.95\n\
  Product: Stadium, Category: Soccer, Price: $79500.00\nProduct: Thinking Cap, Category:\
  \ Chess, Price: $16.00\nProduct: Unsteady Chair, Category: Chess, Price: $75.00\n\
  Product: Bling-Bling King, Category: Chess, Price: $1200.00\nProduct: Hat, Category:\
  \ Skiing, Price: $10.00\nProduct: Boots, Category: Skiing, Price: $220.51\nProduct:\
  \ Gloves, Category: Skiing, Price: $40.20\n```\n\n### 使用 File 结构体读取文件\n\n`Open`\
  \ 函数打开一个文件用于读取，并返回一个 `File` 值（表示已打开的文件）以及一个错误（用于指示打开文件时出现的问题）。`File` 结构体实现了 `Reader`\
  \ 接口，这使得读取和处理示例 JSON 数据变得简单，而无需将整个文件读入字节切片，如代码清单 22-9 所示。\n\n使用标准输入、输出和错误\n\n`os`\
  \ 包定义了三个 `*File` 变量，分别名为 `Stdin`、`Stdout` 和 `Stderr`，它们提供了对标准输入、标准输出和标准错误的访问。\n\n\
  ```\npackage main\nimport (\n\"os\"\n\"encoding/json\"\n//\"strings\"\n)\ntype ConfigData\
  \ struct {\nUserName string\nAdditionalProducts []Product\n}\nvar Config ConfigData\n\
  func LoadConfig() (err error) {\nfile, err := os.Open(\"config.json\")\nif (err\
  \ == nil) {\ndefer file.Close()\ndecoder := json.NewDecoder(file)\nerr = decoder.Decode(&Config)\n\
  }\nreturn\n}\nfunc init() {\nerr := LoadConfig()\nif (err != nil) {\nPrintfln(\"\
  Error Loading Config: %v\", err.Error())\n} else {\nPrintfln(\"Username: %v\", Config.UserName)\n\
  Products = append(Products, Config.AdditionalProducts...)\n}\n}\n代码清单 22-9\n在 files\
  \ 文件夹的 readconfig.go 文件中读取配置文件\n```\n\n`File` 结构体还实现了 `Closer` 接口（在第 21 章中描述），该接口定义了一个\
  \ `Close` 方法。可以使用 `defer` 关键字在封闭函数完成时调用 `Close` 方法，如下所示：\n\n```\n...\ndefer file.Close()\n\
  ...\n```\n\n如果你愿意，也可以简单地在函数末尾调用 `Close` 方法，但使用 `defer` 关键字可以确保即使在函数提前返回时文件也能被关闭。结果与之前的示例相同，你可以通过编译和执行该项目来验证。\n\
  \n```\nUsername: Alice\nProduct: Kayak, Category: Watersports, Price: $279.00\n\
  Product: Lifejacket, Category: Watersports, Price: $49.95\nProduct: Soccer Ball,\
  \ Category: Soccer, Price: $19.50\nProduct: Corner Flags, Category: Soccer, Price:\
  \ $34.95\nProduct: Stadium, Category: Soccer, Price: $79500.00\nProduct: Thinking\
  \ Cap, Category: Chess, Price: $16.00\nProduct: Unsteady Chair, Category: Chess,\
  \ Price: $75.00\nProduct: Bling-Bling King, Category: Chess, Price: $1200.00\nProduct:\
  \ Hat, Category: Skiing, Price: $10.00\nProduct: Boots, Category: Skiing, Price:\
  \ $220.51\nProduct: Gloves, Category: Skiing, Price: $40.20\n```\n\n\n\n### 从特定位置读取\n\
  \n`File` 结构体定义了 `Reader` 接口所要求之外的方法，这些方法允许在文件的特定位置执行读取操作，如表 22-4 所述。\n\n**表 22-4**\
  \ `File` 结构体定义的用于在特定位置读取的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `ReadAt(slice, offset)`\
  \ | 该方法由 `ReaderAt` 接口定义，在文件中指定的位置偏移量处，将数据读取到指定的切片中。 |\n| `Seek(offset, how)` |\
  \ 该方法由 `Seeker` 接口定义，移动文件中的偏移量，以便进行下一次读取。偏移量由两个参数共同决定：第一个参数指定偏移的字节数，第二个参数决定如何应用偏移量——值为\
  \ `0` 表示偏移量相对于文件开头，值为 `1` 表示偏移量相对于当前读取位置，值为 `2` 表示偏移量相对于文件末尾。 |\n\n清单 22-10 演示了如何使用表\
  \ 22-4 中的方法从文件中读取特定的数据段，然后将这些数据段组合成一个 JSON 字符串并进行解码。\n\n```\npackage main\nimport\
  \ (\n\"os\"\n\"encoding/json\"\n//\"strings\"\n)\ntype ConfigData struct {\nUserName\
  \ string\nAdditionalProducts []Product\n}\nvar Config ConfigData\nfunc LoadConfig()\
  \ (err error) {\nfile, err := os.Open(\"config.json\")\nif (err == nil) {\ndefer\
  \ file.Close()\nnameSlice := make([]byte, 5)\nfile.ReadAt(nameSlice, 20)\nConfig.UserName\
  \ = string(nameSlice)\nfile.Seek(55, 0)\ndecoder := json.NewDecoder(file)\nerr =\
  \ decoder.Decode(&Config.AdditionalProducts)\n}\nreturn\n}\nfunc init() {\nerr :=\
  \ LoadConfig()\nif (err != nil) {\nPrintfln(\"Error Loading Config: %v\", err.Error())\n\
  } else {\nPrintfln(\"Username: %v\", Config.UserName)\nProducts = append(Products,\
  \ Config.AdditionalProducts...)\n}\n}\n```\n\n从特定位置读取需要了解文件结构。在这个例子中，我知道要读取的数据的位置，这让我可以使用\
  \ `ReadAt` 方法读取用户名字段，并使用 `Seek` 方法跳转到产品数据的起始位置。编译并执行该项目，你将看到以下输出：\n\n```\nUsername:\
  \ Alice\nProduct: Kayak, Category: Watersports, Price: $279.00\nProduct: Lifejacket,\
  \ Category: Watersports, Price: $49.95\nProduct: Soccer Ball, Category: Soccer,\
  \ Price: $19.50\nProduct: Corner Flags, Category: Soccer, Price: $34.95\nProduct:\
  \ Stadium, Category: Soccer, Price: $79500.00\nProduct: Thinking Cap, Category:\
  \ Chess, Price: $16.00\nProduct: Unsteady Chair, Category: Chess, Price: $75.00\n\
  Product: Bling-Bling King, Category: Chess, Price: $1200.00\nProduct: Hat, Category:\
  \ Skiing, Price: $10.00\nProduct: Boots, Category: Skiing, Price: $220.51\nProduct:\
  \ Gloves, Category: Skiing, Price: $40.20\n```\n\n如果运行此示例时收到错误，那么很可能是清单 22-10 中指定的位置与你的\
  \ JSON 文件结构不符。作为第一步，尤其是在 Linux 上，请确保你已保存同时包含 CR 和 LR 字符的文件，你可以在 Visual Studio Code\
  \ 中通过单击窗口底部的 LR 指示器来完成此操作。\n\n## 写入文件\n\n`os` 包也包含了用于写入文件的函数，如表 22-5 所述。这些函数比它们对应的读取函数更复杂，因为需要更多的配置选项。\n\
  \n**表 22-5** `os` 包用于写入文件的函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `WriteFile(name, slice,\
  \ modePerms)` | 该函数使用指定的名称、模式和权限创建一个文件，并写入指定的 `byte` 切片的内容。如果文件已存在，其内容将被 `byte`\
  \ 切片替换。返回值是一个错误，报告创建文件或写入数据时出现的任何问题。 |\n| `OpenFile(name, flag, modePerms)` | 该函数使用指定的名称打开文件，并使用标志来控制文件的打开方式。如果创建了新文件，则会应用指定的模式和权限。返回值是一个提供对文件内容访问权限的\
  \ `File` 值，以及一个指示打开文件时出现问题的错误。 |\n\n### 使用便捷写入函数\n\n`WriteFile` 函数提供了一种便捷的方式，可以一步完成整个文件的写入，如果文件不存在则会创建它。清单\
  \ 22-11 演示了 `WriteFile` 函数的用法。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\
  \n\"os\"\n)\nfunc main() {\ntotal := 0.0\nfor _, p := range Products {\ntotal +=\
  \ p.Price\n}\ndataStr := fmt.Sprintf(\"Time: %v, Total: $%.2f\\n\",\ntime.Now().Format(\"\
  Mon 15:04:05\"), total)\nerr := os.WriteFile(\"output.txt\", []byte(dataStr), 0666)\n\
  if (err == nil) {\nfmt.Println(\"Output file created\")\n} else {\nPrintfln(\"Error:\
  \ %v\", err.Error())\n}\n}\n```\n\n`WriteFile` 函数的前两个参数是文件名和包含待写入数据的字节切片。第三个参数结合了文件的两种设置：文件模式和文件权限，如图\
  \ 22-1 所示。\n\n![../images/512642_1_En_22_Chapter/512642_1_En_22_Fig1_HTML.jpg](img/512642_1_En_22_Fig1_HTML.jpg)\n\
  \n**图 22-1** 文件模式与文件权限\n\n文件模式用于指定文件的特殊属性，但对于普通文件，如示例所示，使用值为 0。你可以在 [`https://golang.org/pkg/io/fs/#FileMode`](https://golang.org/pkg/io/fs/%2523FileMode)\
  \ 找到文件模式值及其设置的列表，但在大多数项目中并不需要它们，本书中也不作描述。\n\n文件权限使用更广泛，遵循 UNIX 风格的文件权限，由三位数字组成，分别设置文件所有者、用户组和其他用户的访问权限。每个数字是应授予权限的总和，其中读取权限值为\
  \ 4，写入权限值为 2，执行权限值为 1。这些值相加，因此读取和写入文件的权限通过将值 4 和 2 相加得到权限值 6。在清单 22-11 中，我想创建一个所有用户都能读写文件，因此我将三个设置的值都设为\
  \ 6，得到权限 `666`。\n\n如果文件不存在，`WriteFile` 函数会创建它，你可以通过编译和执行项目来看到这一点，项目会输出以下内容：\n\n\
  ```\nUsername: Alice\nOutput file created\n```\n\n检查 `files` 文件夹的内容，你会看到一个名为 `output.txt`\
  \ 的文件已被创建，内容类似于下面所示，不过你会看到不同的时间戳：\n\n```\nTime: Sun 07:05:06, Total: $81445.11\n\
  ```\n\n如果指定的文件已经存在，`WriteFile` 方法会替换其内容，你可以通过再次执行编译后的程序来验证。执行完成后，原始内容将被新的时间戳替换：\n\
  \n```\nTime: Sun 07:08:21, Total: $81445.11\n```\n\n\n\n### 使用 File 结构体写入文件\n\n\
  `OpenFile` 函数用于打开文件并返回一个 `File` 值。与 `Open` 函数不同，`OpenFile` 函数接受一个或多个用于指定文件打开方式的标志位。这些标志位在\
  \ `os` 包中定义为常量，如表 22-6 所示。使用这些标志位时需要小心，因为它们并非在所有操作系统上都受支持。\n\n**表 22-6** 文件打开标志位\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `O_RDONLY` | 此标志位以只读方式打开文件，即只能从文件读取，不能写入。 |\n| `O_WRONLY`\
  \ | 此标志位以只写方式打开文件，即只能写入文件，不能读取。 |\n| `O_RDWR` | 此标志位以读写方式打开文件，即可写入和读取文件。 |\n| `O_APPEND`\
  \ | 此标志位会将写入操作追加到文件末尾。 |\n| `O_CREATE` | 如果文件不存在，此标志位会创建该文件。 |\n| `O_EXCL` | 此标志位与\
  \ `O_CREATE` 结合使用，以确保创建的是新文件。如果文件已存在，此标志位将触发错误。 |\n| `O_SYNC` | 此标志位启用同步写入，即在写入函数/方法返回之前，数据会被写入存储设备。\
  \ |\n| `O_TRUNC` | 此标志位会截断文件中已有的内容。 |\n\n标志位通过按位或运算符进行组合，如清单 22-12 所示。\n\n```go\n\
  package main\nimport (\n\"fmt\"\n\"time\"\n\"os\"\n)\nfunc main() {\ntotal := 0.0\n\
  for _, p := range Products {\ntotal += p.Price\n}\ndataStr := fmt.Sprintf(\"Time:\
  \ %v, Total: $%.2f\\n\",\ntime.Now().Format(\"Mon 15:04:05\"), total)\nfile, err\
  \ := os.OpenFile(\"output.txt\",\nos.O_WRONLY | os.O_CREATE | os.O_APPEND, 0666)\n\
  if (err == nil) {\ndefer file.Close()\nfile.WriteString(dataStr)\n} else {\nPrintfln(\"\
  Error: %v\", err.Error())\n}\n}\n```\n\n**清单 22-12** 在 `files` 文件夹的 `main.go` 文件中写入文件\n\
  \n我组合使用了 `O_WRONLY` 标志位以写入方式打开文件，`O_CREATE` 标志位在文件不存在时创建它，以及 `O_APPEND` 标志位将任何写入的数据追加到文件末尾。\n\
  \n`File` 结构体定义了表 22-7 中描述的方法，用于在文件打开后向其中写入数据。\n\n**表 22-7** 用于写入数据的 File 方法\n\n\
  | 名称 | 描述 |\n| --- | --- |\n| `Seek(offset, how)` | 此方法设置后续操作的位置。 |\n| `Write(slice)`\
  \ | 此方法将指定的字节切片内容写入文件。返回值为写入的字节数和一个指示写入问题的错误。 |\n| `WriteAt(slice, offset)` | 此方法在指定位置写入切片中的数据，与\
  \ `ReadAt` 方法相对应。 |\n| `WriteString(str)` | 此方法将一个字符串写入文件。这是一个便捷方法，它将字符串转换为字节切片，调用\
  \ `Write` 方法，并返回其接收到的结果。 |\n\n在清单 22-12 中，我使用了 `WriteString` 便捷方法将一个字符串写入文件。编译并执行该项目，程序完成后，你将在\
  \ `output.txt` 文件的末尾看到一条额外的消息：\n\n```\nTime: Sun 07:08:21, Total: $81445.11\nTime:\
  \ Sun 07:49:14, Total: $81445.11\n```\n\n### 将 JSON 数据写入文件\n\n`File` 结构体实现了 `Writer`\
  \ 接口，这使得文件可以与前面章节中描述的用于格式化和处理字符串的函数一起使用。这也意味着可以使用第 21 章中描述的 JSON 功能将 JSON 数据写入文件，如清单\
  \ 22-13 所示。\n\n```go\npackage main\nimport (\n// \"fmt\"\n// \"time\"\n\"os\"\n\"\
  encoding/json\"\n)\nfunc main() {\ncheapProducts := []Product {}\nfor _, p := range\
  \ Products {\nif (p.Price < 100) {\ncheapProducts = append(cheapProducts, p)\n}\n\
  }\nfile, err := os.OpenFile(\"cheap.json\", os.O_WRONLY | os.O_CREATE, 0666)\nif\
  \ (err == nil) {\ndefer file.Close()\nencoder := json.NewEncoder(file)\nencoder.Encode(cheapProducts)\n\
  } else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n```\n\n**清单 22-13** 在 `files`\
  \ 文件夹的 `main.go` 文件中将 JSON 数据写入文件\n\n此示例选择 `Price` 值小于 `100` 的 `Product` 值，将它们放入一个切片中，并使用一个\
  \ JSON `Encoder` 将该切片写入名为 `cheap.json` 的文件。编译并执行该项目，执行完成后，你将看到 `files` 文件夹中有一个名为\
  \ `cheap.json` 的文件，其内容如下（为适应页面显示，我已进行格式化）：\n\n```json\n[{\"Name\":\"Lifejacket\"\
  ,\"Category\":\"Watersports\",\"Price\":49.95},\n{\"Name\":\"Soccer Ball\",\"Category\"\
  :\"Soccer\",\"Price\":19.5},\n{\"Name\":\"Corner Flags\",\"Category\":\"Soccer\"\
  ,\"Price\":34.95},\n{\"Name\":\"Thinking Cap\",\"Category\":\"Chess\",\"Price\"\
  :16},\n{\"Name\":\"Unsteady Chair\",\"Category\":\"Chess\",\"Price\":75},\n{\"Name\"\
  :\"Hat\",\"Category\":\"Skiing\",\"Price\":10},\n{\"Name\":\"Gloves\",\"Category\"\
  :\"Skiing\",\"Price\":40.2}]\n```\n\n\n\n### 使用便捷函数创建新文件\n\n虽然可以使用上一节演示的 `OpenFile`\
  \ 函数创建新文件，但 `os` 包也提供了一些有用的便捷函数，如表 22-8 所述。\n\n**表 22-8** `os` 包中用于创建文件的函数\n\n|\
  \ 名称 | 描述 |\n| --- | --- |\n| `Create(name)` | 此函数等价于使用 `O_RDWR`、`O_CREATE` 和 `O_TRUNC`\
  \ 标志调用 `OpenFile`。返回结果包括一个可用于读写的 `File` 和一个用于指示创建文件问题的 `error`。请注意，这种标志组合意味着如果指定名称的文件已存在，它将被打开，并且其内容将被删除。\
  \ |\n| `CreateTemp(dirName, fileName)` | 此函数在指定名称的目录中创建一个新文件。如果名称为空字符串，则使用通过 `TempDir`\
  \ 函数（如表 22-9 所述）获取的系统临时目录。创建的文件名包含随机字符序列，如表格后的文本所演示。文件以 `O_RDWR`、`O_CREATE` 和 `O_EXCL`\
  \ 标志打开。文件关闭时不会被删除。 |\n\n`CreateTemp` 函数可能很有用，但重要的是要理解此函数的目的是生成一个随机文件名，而在其他所有方面，创建的文件只是一个普通文件。创建的文件不会自动删除，并且在应用程序执行后会保留在存储设备上。\n\
  \n清单 22-14 演示了 `CreateTemp` 函数的用法，并展示了如何控制文件名的随机部分的位置。\n\n```\npackage main\nimport\
  \ (\n// \"fmt\"\n// \"time\"\n\"os\"\n\"encoding/json\"\n)\nfunc main() {\ncheapProducts\
  \ := []Product {}\nfor _, p := range Products {\nif (p.Price < 100) {\ncheapProducts\
  \ = append(cheapProducts, p)\n}\n}\nfile, err := os.CreateTemp(\".\", \"tempfile-*.json\"\
  )\nif (err == nil) {\ndefer file.Close()\nencoder := json.NewEncoder(file)\nencoder.Encode(cheapProducts)\n\
  } else {\nPrintfln(\"Error: %v\", err.Error())\n}\n}\n```\n\n**清单 22-14** 在 `files`\
  \ 文件夹的 `main.go` 文件中创建临时文件\n\n临时文件的位置通过一个句点指定，意味着当前工作目录。如表 22-8 所述，如果使用空字符串，则文件将在默认临时目录中创建，该目录通过表\
  \ 22-9 中描述的 `TempDir` 函数获取。文件名可以包含星号（`*` 字符），如果存在，则文件名的随机部分将替换它。如果文件名不包含星号，则文件名的随机部分将附加到名称的末尾。\n\
  \n编译并执行项目，执行完成后，你将在 `files` 文件夹中看到一个新文件。我的项目中的文件名为 `tempfile-1732419518.json`，但你的文件名会不同，并且每次执行程序时你都会看到一个具有唯一名称的新文件。\n\
  \n### 处理文件路径\n\n本章到目前为止的示例都使用了当前工作目录中的文件，这通常是启动编译后可执行文件的位置。如果你想在其他位置读取和写入文件，则必须指定文件路径。问题在于，并非所有\
  \ Go 支持的操作系统都以相同的方式表达文件路径。例如，在 Linux 系统上，我主目录中名为 `mydata.json` 的文件的路径可能如下所示：\n\n\
  ```\n/home/adam/mydata.json\n```\n\n我通常将项目部署到 Linux，但我更喜欢在 Windows 上进行开发，在该系统上，我主目录中相同文件的路径表示如下：\n\
  \n```\nC:\\Users\\adam\\mydata.json\n```\n\nWindows 比你预期的更灵活，Go 函数（如 `OpenFile`）调用的底层\
  \ API 与文件分隔符无关，并且会同时接受反斜杠和正斜杠。这意味着在编写 Go 代码时，我可以将文件路径表示为 `c:/users/adam/mydata.json`\
  \ 甚至 `/users/adam/mydata.json`，而 Windows 仍然可以正确打开该文件。但文件分隔符只是平台之间的差异之一。卷的处理方式不同，并且存储文件的默认位置也不同。因此，例如，我可能能够使用\
  \ `/home/adam.mydata.json` 或 `/users/mydata.json` 读取我的假设数据文件，但正确的选择将取决于我正在使用的操作系统。随着\
  \ Go 被移植到更多平台，将会有更广泛的可能位置。为了解决这个问题，`os` 包提供了一组函数，用于返回常见位置的路径，如表 22-9 所述。\n\n**表\
  \ 22-9** `os` 包定义的常见位置函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Getwd()` | 此函数返回当前工作目录，以\
  \ `string` 表示，以及一个指示获取该值时出现问题的 `error`。 |\n| `UserHomeDir()` | 此函数返回用户的主目录以及一个指示获取路径时出现问题的\
  \ error。 |\n| `UserCacheDir()` | 此函数返回用户特定缓存数据的默认目录以及一个指示获取路径时出现问题的 error。 |\n|\
  \ `UserConfigDir()` | 此函数返回用户特定配置数据的默认目录以及一个指示获取路径时出现问题的 error。 |\n| `TempDir()`\
  \ | 此函数返回临时文件的默认目录以及一个指示获取路径时出现问题的 error。 |\n\n一旦你获得了路径，你可以将其视为字符串，并简单地附加额外的段，或者为了避免错误，使用\
  \ `path/filepath` 包提供的函数来操作路径，其中最有用的一些函数在表 22-10 中描述。\n\n**表 22-10** 用于路径的 `path/filepath`\
  \ 函数\n\n\n\n| 名称 | 描述 |\n| --- | --- |\n| `Abs(path)` | 该函数返回绝对路径，如果你有一个相对路径（例如文件名）时，此函数非常有用。\
  \ |\n| `IsAbs(path)` | 如果指定路径是绝对路径，此函数返回 `true`。 |\n| `Base(path)` | 此函数返回路径中的最后一个元素。\
  \ |\n| `Clean(path)` | 此函数通过清除重复的分隔符和相对引用来整理路径字符串。 |\n| `Dir(path)` | 此函数返回路径中除最后一个元素外的所有部分。\
  \ |\n| `EvalSymlinks(path)` | 此函数评估符号链接并返回结果路径。 |\n| `Ext(path)` | 此函数从指定路径返回文件扩展名，该扩展名被认为是路径字符串中最后一个句点之后的后缀。\
  \ |\n| `FromSlash(path)` | 此函数将每个正斜杠替换为平台的文件分隔符字符。 |\n| `ToSlash(path)` | 此函数将平台的文件分隔符替换为正斜杠。\
  \ |\n| `Join(...elements)` | 此函数使用平台的文件分隔符合并多个元素。 |\n| `Match(pattern, path)` |\
  \ 如果路径与指定模式匹配，此函数返回 `true`。 |\n| `Split(path)` | 此函数返回指定路径中最后一个路径分隔符两侧的组成部分。 |\n\
  | `SplitList(path)` | 此函数将路径拆分为其组成部分，并以字符串切片形式返回。 |\n| `VolumeName(path)` | 此函数返回指定路径的卷名部分；如果路径不包含卷，则返回空字符串。\
  \ |\n\n清单 22-15 演示了从表 22-10 所述便利函数返回的路径开始，并使用表 22-9 中的函数对其进行操作的过程。\n\n```\npackage\
  \ main\nimport (\n// \"fmt\"\n// \"time\"\n\"os\"\n//\"encoding/json\"\n\"path/filepath\"\
  \n)\nfunc main() {\npath, err := os.UserHomeDir()\nif (err == nil) {\npath = filepath.Join(path,\
  \ \"MyApp\", \"MyTempFile.json\")\n}\nPrintfln(\"Full path: %v\", path)\nPrintfln(\"\
  Volume name: %v\", filepath.VolumeName(path))\nPrintfln(\"Dir component: %v\", filepath.Dir(path))\n\
  Printfln(\"File component: %v\", filepath.Base(path))\nPrintfln(\"File extension:\
  \ %v\", filepath.Ext(path))\n}\n清单 22-15\n在 files 文件夹的 main.go 文件中处理路径\n```\n\n\
  此示例从 `UserHomeDir` 函数返回的路径开始，使用 `Join` 函数添加额外的段，然后输出路径的不同部分。你得到的结果将取决于你的用户名和平台。以下是我在\
  \ Windows 机器上收到的输出：\n\n```\nUsername: Alice\nFull path: C:\\Users\\adam\\MyApp\\\
  MyTempFile.json\nVolume name: C:\nDir component: C:\\Users\\adam\\MyApp\nFile component:\
  \ MyTempFile.json\nFile extension: .json\n```\n\n以下是我在 Ubuntu 测试机器上收到的输出：\n\n```\n\
  Username: Alice\nFull path: /home/adam/MyApp/MyTempFile.json\nVolume name:\nDir\
  \ component: /home/adam/MyApp\nFile component: MyTempFile.json\nFile extension:\
  \ .json\n```\n\n## 管理文件和目录\n\n上一节描述的函数用于处理路径，但这些路径只是字符串。当我在清单 22-15 中向路径添加段时，结果只是另一个字符串，文件系统上并没有相应的更改。要进行此类更改，`os`\
  \ 包提供了表 22-11 中描述的函数。\n\n### 表 22-11：用于管理文件和目录的 os 包函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `Chdir(dir)` | 此函数将当前工作目录更改为指定目录。结果是一个 `error`，用于指示进行更改时出现的问题。 |\n| `Mkdir(name,\
  \ modePerms)` | 此函数创建具有指定名称和模式/权限的目录。结果是一个 `error`，如果创建成功则为 `nil`；如果出现问题则描述该问题。\
  \ |\n| `MkdirAll(name, modePerms)` | 此函数执行与 `Mkdir` 相同的任务，但会创建指定路径中的任何父目录。 |\n|\
  \ `MkdirTemp(parentDir, name)` | 此函数类似于 `CreateTemp`，但创建的是目录而非文件。一个随机字符串会被附加到指定名称的末尾或替换星号，并且新目录会在指定的父目录内创建。结果返回目录名称和一个指示问题的\
  \ `error`。 |\n| `Remove(name)` | 此函数删除指定的文件或目录。结果是一个描述出现问题的 `error`。 |\n| `RemoveAll(name)`\
  \ | 此函数删除指定的文件或目录。如果名称指定的是一个目录，则其包含的所有子项也会被删除。结果是一个描述出现问题的 `error`。 |\n| `Rename(old,\
  \ new)` | 此函数重命名指定的文件或文件夹。结果是一个描述出现问题的 `error`。 |\n| `Symlink(old, new)` | 此函数创建指向指定文件的符号链接。结果是一个描述出现问题的\
  \ `error`。 |\n\n清单 22-16 使用 `MkdirAll` 函数来确保创建文件路径所需的目录均已存在，这样在尝试创建文件时就不会出错。\n\n\
  ```\npackage main\nimport (\n// \"fmt\"\n// \"time\"\n\"os\"\n\"encoding/json\"\n\
  \"path/filepath\"\n)\nfunc main() {\npath, err := os.UserHomeDir()\nif (err == nil)\
  \ {\npath = filepath.Join(path, \"MyApp\", \"MyTempFile.json\")\n}\nPrintfln(\"\
  Full path: %v\", path)\nerr = os.MkdirAll(filepath.Dir(path), 0766)\nif (err ==\
  \ nil) {\nfile, err := os.OpenFile(path, os.O_CREATE | os.O_WRONLY, 0666)\nif (err\
  \ == nil) {\ndefer file.Close()\nencoder := json.NewEncoder(file)\nencoder.Encode(Products)\n\
  }\n}\nif (err != nil) {\nPrintfln(\"Error %v\", err.Error())\n}\n}\n清单 22-16\n在\
  \ files 文件夹的 main.go 文件中创建目录\n```\n\n为了确保路径中的目录存在，我使用了 `filepath.Dir` 函数，并将结果传递给\
  \ `os.MkdirAll` 函数。然后，我可以使用 `OpenFile` 函数并指定 `O_CREATE` 标志来创建文件。我将 `File` 作为 JSON\
  \ `Encoder` 的 `Writer`，并将清单 22-3 中定义的 `Product` 切片的内容写入新文件。defer 语句中的 `Close` 关闭了文件。编译并执行项目，你会看到在你的主文件夹中创建了一个名为\
  \ `MyApp` 的目录，其中包含一个名为 `MyTempFile.json` 的 JSON 文件。该文件将包含以下 JSON 数据（为了适应页面宽度已重新格式化）：\n\
  \n```\n[{\"Name\":\"Lifejacket\",\"Category\":\"Watersports\",\"Price\":49.95},\n\
  {\"Name\":\"Soccer Ball\",\"Category\":\"Soccer\",\"Price\":19.5},\n{\"Name\":\"\
  Corner Flags\",\"Category\":\"Soccer\",\"Price\":34.95},\n{\"Name\":\"Thinking Cap\"\
  ,\"Category\":\"Chess\",\"Price\":16},\n{\"Name\":\"Unsteady Chair\",\"Category\"\
  :\"Chess\",\"Price\":75},\n{\"Name\":\"Hat\",\"Category\":\"Skiing\",\"Price\":10},\n\
  {\"Name\":\"Gloves\",\"Category\":\"Skiing\",\"Price\":40.2}]\n```\n\n\n\n### 探索文件系统\n\
  \n如果你知道所需文件的位置，可以直接使用上一节描述的函数创建路径，并利用这些路径打开文件。但如果你的项目需要处理由其他进程创建的文件，那么你就需要探索文件系统。`os`\
  \ 包提供了表 22-12 中描述的函数。\n\n表 22-12  \n用于列出目录的 `os` 包函数\n\n| 名称 | 描述 |\n| --- | ---\
  \ |\n| `ReadDir(name)` | 该函数读取指定目录，并返回一个 `DirEntry` 切片，其中每个元素描述了目录中的一个条目。 |\n\n\
  `ReadDir` 函数返回一个实现了 `DirEntry` 接口的值切片，该接口定义了表 22-13 中描述的方法。\n\n表 22-13  \n`DirEntry`\
  \ 接口定义的方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Name()` | 该方法返回由 `DirEntry` 值描述的文件或目录的名称。\
  \ |\n| `IsDir()` | 如果 `DirEntry` 值代表一个目录，则该方法返回 `true`。 |\n| `Type()` | 该方法返回一个\
  \ `FileMode` 值（`FileMode` 是 `uint32` 的别名），该值描述了由 `DirEntry` 值代表的文件或目录的更多信息和权限。 |\n\
  | `Info()` | 该方法返回一个 `FileInfo` 值，提供关于由 `DirEntry` 值代表的文件或目录的额外细节。 |\n\n`Info` 方法返回的\
  \ `FileInfo` 接口用于获取文件或目录的详细信息。`FileInfo` 接口定义的最有用的方法在表 22-14 中描述。\n\n表 22-14  \n\
  `FileInfo` 接口定义的有用方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Name()` | 该方法返回一个字符串，包含文件或目录的名称。\
  \ |\n| `Size()` | 该方法返回文件的大小，以 `int64` 值表示。 |\n| `Mode()` | 该方法返回文件或目录的文件模式和权限设置。\
  \ |\n| `ModTime()` | 该方法返回文件或目录的最后修改时间。 |\n\n你也可以使用表 22-15 中描述的函数获取单个文件的 `FileInfo`\
  \ 值。\n\n表 22-15  \n用于检查文件的 `os` 包函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Stat(path)`\
  \ | 该函数接受一个路径字符串。它返回一个描述文件的 `FileInfo` 值和一个 `error`，后者用于指示检查文件时出现的问题。 |\n\n清单 22-17\
  \ 使用了 `ReadDir` 函数来枚举项目文件夹的内容。\n\n```\npackage main\nimport (\n// \"fmt\"\n// \"\
  time\"\n\"os\"\n//\"encoding/json\"\n//\"path/filepath\"\n)\nfunc main() {\npath,\
  \ err := os.Getwd()\nif (err == nil) {\ndirEntries, err := os.ReadDir(path)\nif\
  \ (err == nil) {\nfor _, dentry := range dirEntries {\nPrintfln(\"Entry name: %v,\
  \ IsDir: %v\", dentry.Name(), dentry.IsDir())\n}\n}\n}\nif (err != nil) {\nPrintfln(\"\
  Error %v\", err.Error())\n}\n}\n清单 22-17\n在 files 文件夹的 main.go 文件中枚举文件\n```\n\n\
  `for` 循环用于枚举 `ReadDir` 函数返回的 `DirEntry` 值，并输出 `Name` 和 `IsDir` 函数的结果。编译并执行该项目，你将看到类似于以下的输出，根据\
  \ `CreateTemp` 函数创建的文件名可能会有所不同：\n\n```\nUsername: Alice\nEntry name: cheap.json,\
  \ IsDir: false\nEntry name: config.go, IsDir: false\nEntry name: config.json, IsDir:\
  \ false\nEntry name: go.mod, IsDir: false\nEntry name: main.go, IsDir: false\nEntry\
  \ name: output.txt, IsDir: false\nEntry name: product.go, IsDir: false\nEntry name:\
  \ tempfile-1732419518.json, IsDir: false\n```\n\n### 判断文件是否存在\n\n`os` 包定义了一个名为 `IsNotExist`\
  \ 的函数，它接受一个错误，如果该错误表示文件不存在，则返回 `true`，如清单 22-18 所示。\n\n```\npackage main\nimport\
  \ (\n// \"fmt\"\n// \"time\"\n\"os\"\n// \"encoding/json\"\n// \"path/filepath\"\
  \n)\nfunc main() {\ntargetFiles := []string { \"no_such_file.txt\", \"config.json\"\
  \ }\nfor _, name := range targetFiles {\ninfo, err := os.Stat(name)\nif os.IsNotExist(err)\
  \ {\nPrintfln(\"File does not exist: %v\", name)\n} else if err != nil  {\nPrintfln(\"\
  Other error: %v\", err.Error())\n} else {\nPrintfln(\"File %v, Size: %v\", info.Name(),\
  \ info.Size())\n}\n}\n}\n清单 22-18\n在 files 文件夹的 main.go 文件中检查文件是否存在\n```\n\n`Stat`\
  \ 函数返回的错误被传递给 `IsNotExist` 函数，从而能够识别不存在的文件。编译并执行该项目，你将收到以下输出：\n\n```\nUsername:\
  \ Alice\nFile does not exist: no_such_file.txt\nFile config.json, Size: 262\n```\n\
  \n### 使用模式定位文件\n\n`path/filepath` 包定义了 `Glob` 函数，该函数返回目录中与指定模式匹配的所有名称。表 22-16 对该函数进行了快速参考描述。\n\
  \n表 22-16  \n用于使用模式定位文件的 `path/filepath` 函数\n\n| 名称 | 描述 |\n| --- | --- |\n| `Match(pattern,\
  \ name)` | 该函数将单个路径与模式进行匹配。结果是一个 `bool` 值（表示是否匹配）和一个 `error`（表示模式或执行匹配过程中的问题）。 |\n\
  | `Glob(pathPatten)` | 该函数查找所有与指定模式匹配的文件。结果是一个包含匹配路径的 `string` 切片和一个表示执行搜索过程中出现问题的错误。\
  \ |\n\n表 22-16 中的函数使用的模式采用表 22-17 中描述的语法。\n\n表 22-17  \n`path/filepath` 函数的搜索模式语法\n\
  \n| 项 | 描述 |\n| --- | --- |\n| `*` | 匹配任何字符序列（不包括路径分隔符）。 |\n| `?` | 匹配任何单个字符（不包括路径分隔符）。\
  \ |\n| `[a-Z]` | 匹配指定范围内的任何字符。 |\n\n清单 22-19 使用 `Glob` 函数获取当前工作目录中 JSON 文件的路径。\n\
  \n```\npackage main\nimport (\n// \"fmt\"\n// \"time\"\n\"os\"\n// \"encoding/json\"\
  \n\"path/filepath\"\n)\nfunc main() {\npath, err := os.Getwd()\nif (err == nil)\
  \ {\nmatches, err := filepath.Glob(filepath.Join(path, \"*.json\"))\nif (err ==\
  \ nil) {\nfor _, m := range matches {\nPrintfln(\"Match: %v\", m)\n}\n}\n}\nif (err\
  \ != nil) {\nPrintfln(\"Error %v\", err.Error())\n}\n}\n清单 22-19\n在 files 文件夹的 main.go\
  \ 文件中定位文件\n```\n\n我使用 `Getwd` 和 `Join` 函数创建搜索模式，并输出 `Glob` 函数返回的路径。编译并执行该项目，你将看到以下输出，不过路径会反映你项目文件夹的位置：\n\
  \n```\nUsername: Alice\nMatch: C:\\files\\cheap.json\nMatch: C:\\files\\config.json\n\
  Match: C:\\files\\tempfile-1732419518.json\n```\n\n\n\n### 处理目录下的所有文件\n\n除了使用模式匹配，另一种方法是枚举特定位置的所有文件，这可以通过表\
  \ 22-18 中描述的函数来实现，该函数定义在`path/filepath`包中。\n\n**表 22-18**  \n`path/filepath`包提供的函数\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `WalkDir(directory, func)` | 此函数对指定目录中的每个文件和目录调用指定的函数。\
  \ |\n\n由`WalkDir`调用的回调函数接收一个包含路径的字符串、一个提供文件或目录详细信息的`DirEntry`值，以及一个指示访问该文件或目录时出现问题的错误。回调函数的结果是一个错误，通过返回特殊的`SkipDir`值来阻止`WalkDir`函数进入当前目录。清单\
  \ 22-20 演示了`WalkDir`函数的使用。\n\n```\npackage main\nimport (\n// \"fmt\"\n// \"time\"\
  \n\"os\"\n//\"encoding/json\"\n\"path/filepath\"\n)\nfunc callback(path string,\
  \ dir os.DirEntry, dirErr error) (err error) {\ninfo, _ := dir.Info()\nPrintfln(\"\
  路径 %v, 大小: %v\", path, info.Size())\nreturn\n}\nfunc main() {\npath, err := os.Getwd()\n\
  if (err == nil) {\nerr = filepath.WalkDir(path, callback)\n} else {\nPrintfln(\"\
  错误 %v\", err.Error())\n}\n}\n```\n\n此示例使用`WalkDir`函数枚举当前工作目录的内容，并写出找到的每个文件的路径和大小。编译并执行该项目，你将看到类似于以下的输出：\n\
  \n```\n用户名: Alice\n路径 C:\\files, 大小: 4096\n路径 C:\\files\\cheap.json, 大小: 384\n路径\
  \ C:\\files\\config.json, 大小: 262\n路径 C:\\files\\go.mod, 大小: 28\n路径 C:\\files\\\
  main.go, 大小: 467\n路径 C:\\files\\output.txt, 大小: 74\n路径 C:\\files\\product.go, 大小:\
  \ 679\n路径 C:\\files\\readconfig.go, 大小: 870\n路径 C:\\files\\tempfile-1732419518.json,\
  \ 大小: 384\n```\n\n## 小结\n\n在本章中，我描述了用于处理文件的标准库支持。我介绍了读写文件的便利特性，解释了`File`结构体的使用，并演示了如何探索和管理文件系统。在下一章中，我将解释如何创建和使用\
  \ HTML 与文本模板。\n\n"
