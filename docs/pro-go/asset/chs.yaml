  \ ALICE\n```\n\n\n\n## 处理数组与切片类型\n\n`Type` 结构体定义了一些可用于检查数组和切片类型的方法，详见表 28-4。\n\n\
  **表 28-4** 数组与切片的 `Type` 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Elem()` | 此方法返回数组或切片元素的\
