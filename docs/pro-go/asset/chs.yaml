  \ = append(categories, \"p.Category\")\n}\n}\nreturn\n}\n...\n清单 23-34\n在 htmltext\
  \ 文件夹的 main.go 文件中返回 HTML 内容\n```\n\n这一更改告诉模板系统，`GetCategories` 函数返回的结果是 HTML。编译并执行项目后，将产生以下输出：\n\
  \n```\nThere are 8 products in the source data.\nCategory: p.Category\nCategory:\
  \ p.Category\nCategory: p.Category\n```\n\n### 提供对标准库函数的访问\n\n模板函数也可以用来提供对标准库所提供功能的访问，如清单\
  \ 23-35 所示。\n\n```\npackage main\nimport (\n\"html/template\"\n\"os\"\n\"strings\"\
  \n)\nfunc GetCategories(products []Product) (categories []string) {\ncatMap := map[string]string\
