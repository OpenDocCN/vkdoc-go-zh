  \ 文件中定义的模板会重新定义名为 `body` 的模板，从而让 `list.html` 文件中的内容替换掉 `template.html` 文件中的内容。编译并运行项目，您将看到以下输出（我已格式化以移除空白符）：\n\
  \n```\nThis is the layout header\nProduct: Kayak ($279.00)\nProduct: Lifejacket\
