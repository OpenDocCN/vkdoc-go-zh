  \n图 37-2\n\n开始开发管理功能\n\n### 创建产品管理功能\n\n产品管理功能将允许向商店添加新产品，以及修改现有产品。为简化起见，我不允许从数据库中删除产品，而该数据库已建立了表之间的外键关系。\n\
  \n\n\n### 扩展仓库\n\n第一步是扩展仓库，以便我对数据库进行修改。清单 37-30 为 `Repository` 接口添加了一个新方法。\n\n```go\n\
  package models\ntype Repository interface {\nGetProduct(id int) Product\nGetProducts()\
  \ []Product\nSaveProduct(*Product)\nGetProductPage(page, pageSize int) (products\
  \ []Product, totalAvailable int)\nGetProductPageCategory(categoryId int, page, pageSize\
  \ int) (products []Product,\ntotalAvailable int)\nGetCategories() []Category\nGetOrder(id\
  \ int) Order\nGetOrders() []Order\nSaveOrder(*Order)\nSeed()\n}\n```\n\n为了定义用于存储新产品的\
  \ SQL，在 `sportsstore/sql` 文件夹中添加一个名为 `save_product.sql` 的文件，其内容如清单 37-31 所示。\n\n\
  ```sql\nINSERT INTO Products(Name, Description, Category, Price)\nVALUES (?, ?,\
  \ ?, ?)\n```\n\n为了定义用于修改现有产品的 SQL，在 `sportsstore/sql` 文件夹中添加一个名为 `update_product.sql`\
  \ 的文件，其内容如清单 37-32 所示。\n\n```sql\nUPDATE Products\nSET Name = ?, Description = ?,\
  \ Category = ?, Price =?\nWHERE Id == ?\n```\n\n清单 37-33 新增了一些命令，这些命令将提供对用于修改产品数据的\
  \ SQL 文件的访问。\n\n```go\npackage repo\nimport (\n\"database/sql\"\n\"platform/config\"\
  \n\"platform/logging\"\n\"context\"\n)\ntype SqlRepository struct {\nconfig.Configuration\n\
  logging.Logger\nCommands SqlCommands\n*sql.DB\ncontext.Context\n}\ntype SqlCommands\
  \ struct {\nInit,\nSeed,\nGetProduct,\nGetProducts,\nGetCategories,\nGetPage,\n\
  GetPageCount,\nGetCategoryPage,\nGetCategoryPageCount,\nGetOrder,\nGetOrderLines,\n\
  GetOrders,\nGetOrdersLines,\nSaveOrder,\nSaveOrderLine,\nSaveProduct,\nUpdateProduct\
  \ *sql.Stmt\n}\n```\n\n清单 37-34 新增了配置设置，用于指定新命令对应 SQL 文件的位置。\n\n```json\n{\n\"sql\"\
  : {\n\"connection_str\": \"store.db\",\n\"always_reset\": true,\n\"commands\": {\n\
  \"Init\":                 \"sql/init_db.sql\",\n\"Seed\":                 \"sql/seed_db.sql\"\
  ,\n\"GetProduct\":           \"sql/get_product.sql\",\n\"GetProducts\":        \
  \  \"sql/get_products.sql\",\n\"GetCategories\":        \"sql/get_categories.sql\"\
  ,\n\"GetPage\":              \"sql/get_product_page.sql\",\n\"GetPageCount\":  \
  \       \"sql/get_page_count.sql\",\n\"GetCategoryPage\":      \"sql/get_category_product_page.sql\"\
  ,\n\"GetCategoryPageCount\": \"sql/get_category_product_page_count.sql\",\n\"GetOrder\"\
  :             \"sql/get_order.sql\",\n\"GetOrderLines\":        \"sql/get_order_lines.sql\"\
  ,\n\"GetOrders\":            \"sql/get_orders.sql\",\n\"GetOrdersLines\":      \
  \ \"sql/get_orders_lines.sql\",\n\"SaveOrder\":            \"sql/save_order.sql\"\
  ,\n\"SaveOrderLine\":        \"sql/save_order_line.sql\",\n\"SaveProduct\":    \
  \      \"sql/save_product.sql\",\n\"UpdateProduct\":        \"sql/update_product.sql\"\
  \n}\n}\n}\n```\n\n为了使用 SQL 命令来实现仓库方法，在 `sportsstore/models/repo` 文件夹中添加一个名为 `sql_products_save.go`\
  \ 的文件，其内容如清单 37-35 所示。\n\n```go\npackage repo\nimport \"sportsstore/models\"\nfunc\
  \ (repo *SqlRepository) SaveProduct(p *models.Product) {\nif (p.ID == 0) {\nresult,\
  \ err := repo.Commands.SaveProduct.ExecContext(repo.Context, p.Name,\np.Description,\
  \ p.Category.ID, p.Price)\nif err == nil {\nid, err := result.LastInsertId()\nif\
  \ err == nil {\np.ID = int(id)\nreturn\n} else {\nrepo.Logger.Panicf(\"Cannot get\
  \ inserted ID: %v\", err.Error())\n}\n} else {\nrepo.Logger.Panicf(\"Cannot exec\
  \ SaveProduct command: %v\", err.Error())\n}\n} else {\nresult, err := repo.Commands.UpdateProduct.ExecContext(repo.Context,\
  \ p.Name,\np.Description, p.Category.ID, p.Price, p.ID)\nif err == nil {\naffected,\
  \ err := result.RowsAffected()\nif err == nil && affected != 1 {\nrepo.Logger.Panicf(\"\
  Got unexpected rows affected: %v\", affected)\n} else if err != nil {\nrepo.Logger.Panicf(\"\
  Cannot get rows affected: %v\", err)\n}\n} else {\nrepo.Logger.Panicf(\"Cannot exec\
  \ Update command: %v\", err.Error())\n}\n}\n}\n```\n\n如果该方法接收到的 `Product` 的 `ID`\
