  \ `lower` 来调用该函数，如清单 23-36 所示。\n\n```\n{{ define \"mainTemplate\" -}}\nThere are\
  \ {{ len . }} products in the source data.\n{{ range getCats .  -}}\nCategory: {{\
  \ lower . }}\n{{ end }}\n{{- end }}\n清单 23-36\n在 templates 文件夹的 template.html 文件中使用模板函数\n\
  ```\n\n编译并执行项目，你将看到以下输出：\n\n```\nThere are 8 products in the source data.\nCategory:\
  \ watersports\nCategory: soccer\nCategory: chess\n```\n\n\n\n### 定义模板变量\n\n动作可以在其表达式中定义变量，并可在嵌入的模板内容中访问这些变量，如清单\
  \ 23-37 所示。当你需要在表达式中生成一个值进行评估，并且在嵌套内容中也用到同一值时，这一特性非常有用。\n\n```\n{{ define \"mainTemplate\"\
  \ -}}\n{{ $length := len . }}\n源数据中共有 {{ $length }} 个产品。\n{{ range getCats .  -}}\n\
  分类: {{ lower . }}\n{{ end }}\n{{- end }}\n清单 23-37\n在 templates 文件夹的 template.html\
  \ 文件中定义与使用模板变量\n```\n\n模板变量名以 `$` 字符为前缀，并使用短变量声明语法创建。第一个动作创建了一个名为 `length` 的变量，该变量在随后的动作中被使用。编译并运行项目，你将看到以下输出：\n\
  \n```\n源数据中共有 8 个产品。\n分类: watersports\n分类: soccer\n分类: chess\n```\n\n清单 23-38 展示了一个更复杂的定义与使用模板变量的例子。\n\
  \n```\n{{ define \"mainTemplate\" -}}\n源数据中共有 {{ len . }} 个产品。\n{{- range getCats\
  \ .  -}}\n{{ if ne ($char := slice (lower .) 0 1) \"s\"  }}\n{{$char}}: {{.}}\n\
  {{- end }}\n{{- end }}\n{{- end }}\n清单 23-38\n在 templates 文件夹的 template.html 文件中定义与使用模板变量\n\
  ```\n\n在这个例子中，`if` 动作使用了 `slice` 和 `lower` 函数来获取当前分类的第一个字符，并在用于 `if` 表达式之前将其赋值给名为\
  \ `$char` 的变量。`$char` 变量在嵌套的模板内容中被访问，这避免了重复使用 `slice` 和 `lower` 函数。编译并运行项目，你将看到以下输出：\n\
  \n```\n源数据中共有 8 个产品。\nw: Watersports\nc: Chess\n```\n\n### 在 Range 动作中使用模板变量\n\n\
