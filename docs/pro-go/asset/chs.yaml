  ### 添加对类别筛选的支持\n\n下一步是使用按钮替换左列中的占位内容，这些按钮允许用户选择一个类别，以过滤列表中所显示的产品。首先，将清单 35-26 所示的方法添加到\
  \ `Repository` 接口中。\n\n```go\npackage models\n\ntype Repository interface {\n\t\
  GetProduct(id int) Product\n\tGetProducts() []Product\n\tGetProductPage(page, pageSize\
  \ int) (products []Product, totalAvailable int)\n\tGetProductPageCategory(categoryId\
  \ int, page, pageSize int) (products []Product, totalAvailable int)\n\tGetCategories()\
  \ []Category\n\tSeed()\n}\n```\n\n这个新方法允许在请求一个页面时指定一个类别。清单 35-27 在内存存储库中实现了这个新方法。\n\
  \n```go\npackage repo\n\nimport (\n\t\"math\"\n\t\"platform/services\"\n\t\"sportsstore/models\"\
  \n)\n\nfunc RegisterMemoryRepoService() {\n\tservices.AddSingleton(func() models.Repository\
  \ {\n\t\trepo := &MemoryRepo{}\n\t\trepo.Seed()\n\t\treturn repo\n\t})\n}\n\ntype\
  \ MemoryRepo struct {\n\tproducts   []models.Product\n\tcategories []models.Category\n\
  }\n\nfunc (repo *MemoryRepo) GetProduct(id int) (product models.Product) {\n\tfor\
  \ _, p := range repo.products {\n\t\tif p.ID == id {\n\t\t\tproduct = p\n\t\t\t\
  return\n\t\t}\n\t}\n\treturn\n}\n\nfunc (repo *MemoryRepo) GetProducts() (results\
  \ []models.Product) {\n\treturn repo.products\n}\n\nfunc (repo *MemoryRepo) GetCategories()\
  \ (results []models.Category) {\n\treturn repo.categories\n}\n\nfunc (repo *MemoryRepo)\
  \ GetProductPage(page, pageSize int) ([]models.Product, int) {\n\treturn getPage(repo.products,\
  \ page, pageSize), len(repo.products)\n}\n\nfunc (repo *MemoryRepo) GetProductPageCategory(category\
  \ int, page, pageSize int) (products []models.Product, totalAvailable int) {\n\t\
  if category == 0 {\n\t\treturn repo.GetProductPage(page, pageSize)\n\t} else {\n\
  \t\tfilteredProducts := make([]models.Product, 0, len(repo.products))\n\t\tfor _,\
  \ p := range repo.products {\n\t\t\tif p.Category.ID == category {\n\t\t\t\tfilteredProducts\
  \ = append(filteredProducts, p)\n\t\t\t}\n\t\t}\n\t\treturn getPage(filteredProducts,\
  \ page, pageSize), len(filteredProducts)\n\t}\n}\n\nfunc getPage(src []models.Product,\
  \ page, pageSize int) []models.Product {\n\tstart := (page - 1) * pageSize\n\tif\
  \ page > 0 && len(src) > start {\n\t\tend := int(math.Min(float64(len(src)), float64(start+pageSize)))\n\
  \t\treturn src[start:end]\n\t}\n\treturn []models.Product{}\n}\n```\n\n这个新方法枚举产品数据，针对所选类别进行过滤，然后选择指定页码的数据。\n\
  \n## 更新请求处理器\n\n下一步是修改请求处理器方法，使其接收一个类别参数，并使用它来获取过滤后的数据，然后将其连同生成导航按钮所需的额外上下文数据一起传递给模板，导航按钮允许用户选择不同的类别，如清单\
  \ 35-28 所示。\n\n```go\npackage store\n\nimport (\n\t\"math\"\n\t\"platform/http/actionresults\"\
  \n\t\"platform/http/handling\"\n\t\"sportsstore/models\"\n)\n\nconst pageSize =\
  \ 4\n\ntype ProductHandler struct {\n\tRepository   models.Repository\n\tURLGenerator\
  \ handling.URLGenerator\n}\n\ntype ProductTemplateContext struct {\n\tProducts \
  \        []models.Product\n\tPage             int\n\tPageCount        int\n\tPageNumbers\
  \      []int\n\tPageUrlFunc      func(int) string\n\tSelectedCategory int\n}\n\n\
  func (handler ProductHandler) GetProducts(category, page int) actionresults.ActionResult\
  \ {\n\tprods, total := handler.Repository.GetProductPageCategory(category, page,\
  \ pageSize)\n\tpageCount := int(math.Ceil(float64(total) / float64(pageSize)))\n\
  \treturn actionresults.NewTemplateAction(\"product_list.html\", ProductTemplateContext{\n\
  \t\tProducts:         prods,\n\t\tPage:             page,\n\t\tPageCount:      \
  \  pageCount,\n\t\tPageNumbers:      handler.generatePageNumbers(pageCount),\n\t\
  \tPageUrlFunc:      handler.createPageUrlFunction(category),\n\t\tSelectedCategory:\
  \ category,\n\t})\n}\n\nfunc (handler ProductHandler) createPageUrlFunction(category\
  \ int) func(int) string {\n\treturn func(page int) string {\n\t\turl, _ := handler.URLGenerator.GenerateUrl(ProductHandler.GetProducts,\
  \ category, page)\n\t\treturn url\n\t}\n}\n\nfunc (handler ProductHandler) generatePageNumbers(pageCount\
  \ int) (pages []int) {\n\tpages = make([]int, pageCount)\n\tfor i := 0; i < pageCount;\
  \ i++ {\n\t\tpages[i] = i + 1\n\t}\n\treturn\n}\n```\n\n我还必须更新现有用于生成选择页码的 URL 的函数，并引入一个用于生成选择新类别\
  \ URL 的函数。\n\n## 创建类别处理器\n\n我添加对从模板调用处理器的支持，其原因是能够显示自包含的内容，例如类别按钮。在 `sportsstore/store`\
