  \n## 使用预编译语句\n\n`DB` 结构体提供了创建预编译语句的支持，随后可以使用这些预编译语句来执行预编译的 SQL。表 26-9 描述了用于创建预编译语句的\
  \ `DB` 方法。预编译语句由 `Stmt` 结构体表示，该结构体定义了表 26-10 中描述的方法。\n\n**表 26-9** 用于创建预编译语句的 DB\
  \ 方法\n\n| 名称 | 描述 |\n| --- | --- |\n| `Prepare(query)` | 此方法为指定的查询创建一个预编译语句。结果是\
  \ `Stmt` 结构体和一个指示准备语句时出现问题的 `error`。 |\n\n> **注意**：`database/sql` 包的一个奇特之处在于，表 26-5\
  \ 中描述的许多方法也会创建预编译语句，但这些语句在单次查询后就被丢弃。\n\n**表 26-10** Stmt 结构体定义的方法\n\n| 名称 | 描述 |\n\
  | --- | --- |\n| `Query(...vals)` | 此方法执行预编译语句，附带可选的占位符值。结果是 `Rows` 结构体和一个 `error`。此方法等同于\
  \ `DB.Query` 方法。 |\n| `QueryRow(...vals)` | 此方法执行预编译语句，附带可选的占位符值。结果是 `Row` 结构体和一个\
  \ `error`。此方法等同于 `DB.QueryRow` 方法。 |\n| `Exec(...vals)` | 此方法执行预编译语句，附带可选的占位符值。结果是\
  \ `Result` 和一个 `error`。此方法等同于 `DB.Exec` 方法。 |\n| `Close()` | 此方法关闭语句。关闭后无法再执行语句。\
  \ |\n\n清单 26-19 演示了如何创建预编译语句。\n\n```\npackage main\nimport (\n\"database/sql\"\n\
  _ \"modernc.org/sqlite\"\n)\nfunc listDrivers() {\nfor _, driver := range sql.Drivers()\
  \ {\nPrintfln(\"Driver: %v\", driver)\n}\n}\nvar insertNewCategory *sql.Stmt\nvar\
  \ changeProductCategory *sql.Stmt\nfunc openDatabase() (db *sql.DB, err error) {\n\
