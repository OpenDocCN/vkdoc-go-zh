  \n**图 35-4** 按分类筛选\n\n## 本章小结\n\n在本章中，我利用第 32 章至第 34 章创建的平台，开始了 SportsStore 应用程序的开发。我从基本的数据模型和仓库入手，创建了一个显示产品的处理器，并支持分页和按分类筛选。我将在下一章继续开发\
  \ SportsStore 应用程序。\n\n# 36. SportsStore：购物车与数据库\n\n在本章中，我继续开发 SportsStore 应用程序，新增对购物车的支持，并引入数据库来替换我在第\
  \ 35 章中创建的临时仓库。\n\n> **提示** 你可以从[`https://github.com/apress/pro-go`](https://github.com/apress/pro-go)下载本章——以及本书所有其他章节——的示例项目。如果在运行示例时遇到问题，请参阅第\
  \ 2 章了解如何获取帮助。\n\n## 构建购物车\n\nSportsStore 应用程序进展顺利，但要销售产品，我必须实现购物车功能，以便用户在结账前将所选商品集中在一起。\n\
  \n### 定义购物车模型与仓库\n\n为了定义购物车数据类型，创建`sportsstore/store/cart`文件夹，并在其中添加一个名为`cart.go`的文件，内容如清单\
  \ 36-1 所示。\n\n```\npackage cart\n\nimport \"sportsstore/models\"\n\ntype CartLine\
  \ struct {\n    models.Product\n    Quantity int\n}\n\nfunc (cl *CartLine) GetLineTotal()\
  \ float64 {\n    return cl.Price * float64(cl.Quantity)\n}\n\ntype Cart interface\
  \ {\n    AddProduct(models.Product)\n    GetLines() []*CartLine\n    RemoveLineForProduct(id\
  \ int)\n    GetItemCount() int\n    GetTotal() float64\n    Reset()\n}\n\ntype BasicCart\
  \ struct {\n    lines []*CartLine\n}\n\nfunc (cart *BasicCart) AddProduct(p models.Product)\
  \ {\n    for _, line := range cart.lines {\n        if (line.Product.ID == p.ID)\
  \ {\n            line.Quantity++\n            return\n        }\n    }\n    cart.lines\
  \ = append(cart.lines, &CartLine{\n        Product: p, Quantity: 1,\n    })\n}\n\
  \nfunc (cart *BasicCart) GetLines() []*CartLine {\n    return cart.lines\n}\n\n\
  func (cart *BasicCart) RemoveLineForProduct(id int) {\n    for index, line := range\
  \ cart.lines {\n        if (line.Product.ID == id) {\n            cart.lines = append(cart.lines[0:\
  \ index], cart.lines[index + 1:]...)\n        }\n    }\n}\n\nfunc (cart *BasicCart)\
  \ GetItemCount() (total int) {\n    for _, l := range cart.lines {\n        total\
  \ += l.Quantity\n    }\n    return\n}\n\nfunc (cart *BasicCart) GetTotal() (total\
  \ float64) {\n    for _, line := range cart.lines {\n        total += float64(line.Quantity)\
  \ * line.Product.Price\n    }\n    return\n}\n\nfunc (cart *BasicCart) Reset() {\n\
  \    cart.lines = []*CartLine{}\n}\n```\n\n`Cart`接口将作为服务提供，我定义了一个`BasicCart`结构体，通过切片实现`Cart`方法。为了定义此服务，在`sportsstore/store/cart`文件夹中添加一个名为`cart_service.go`的文件，内容如清单\
  \ 36-2 所示。\n\n```\npackage cart\n\nimport (\n    \"platform/services\"\n    \"platform/sessions\"\
  \n    \"sportsstore/models\"\n    \"encoding/json\"\n    \"strings\"\n)\n\nconst\
  \ CART_KEY string = \"cart\"\n\nfunc RegisterCartService() {\n    services.AddScoped(func(session\
  \ sessions.Session) Cart {\n        lines := []*CartLine {}\n        sessionVal\
  \ := session.GetValue(CART_KEY)\n        if strVal, ok := sessionVal.(string); ok\
  \ {\n            json.NewDecoder(strings.NewReader(strVal)).Decode(&lines)\n   \
  \     }\n        return &sessionCart{\n            BasicCart: &BasicCart{ lines:\
  \ lines},\n            Session: session,\n        }\n    })\n}\n\ntype sessionCart\
  \ struct {\n    *BasicCart\n    sessions.Session\n}\n\nfunc (sc *sessionCart) AddProduct(p\
  \ models.Product) {\n    sc.BasicCart.AddProduct(p)\n    sc.SaveToSession()\n}\n\
  \nfunc (sc *sessionCart) RemoveLineForProduct(id int) {\n    sc.BasicCart.RemoveLineForProduct(id)\n\
  \    sc.SaveToSession()\n}\n\nfunc (sc *sessionCart) SaveToSession() {\n    builder\
  \ := strings.Builder{}\n    json.NewEncoder(&builder).Encode(sc.lines)\n    sc.Session.SetValue(CART_KEY,\
  \ builder.String())\n}\n\nfunc (sc *sessionCart) Reset() {\n    sc.lines = []*CartLine{}\n\
  \    sc.SaveToSession()\n}\n```\n\n`sessionCart`结构体通过将其`CartLine`值的 JSON 表示形式添加到会话中，来响应变化。`RegisterCartService`函数创建一个作用域的`Cart`服务，该服务创建一个`sessionCart`，并从会话\
  \ JSON 数据中填充其行数据。\n\n\n\n### 创建购物车请求处理器\n\n在 `sportsstore/store` 文件夹中添加一个名为 `cart_handler.go`\
  \ 的文件，其内容如代码清单 36-3 所示。\n\n```\npackage store\n\nimport (\n\t\"platform/http/actionresults\"\
  \n\t\"platform/http/handling\"\n\t\"sportsstore/models\"\n\t\"sportsstore/store/cart\"\
  \n)\n\ntype CartHandler struct {\n\tmodels.Repository\n\tcart.Cart\n\thandling.URLGenerator\n\
  }\n\ntype CartTemplateContext struct {\n\tcart.Cart\n\tProductListUrl string\n\t\
  CartUrl        string\n\tCheckoutUrl    string\n\tRemoveUrl      string\n}\n\nfunc\
  \ (handler CartHandler) GetCart() actionresults.ActionResult {\n\treturn actionresults.NewTemplateAction(\"\
  cart.html\", CartTemplateContext{\n\t\tCart:            handler.Cart,\n\t\tProductListUrl:\
  \  handler.mustGenerateUrl(ProductHandler.GetProducts, 0, 1),\n\t\tRemoveUrl:  \
  \     handler.mustGenerateUrl(CartHandler.PostRemoveFromCart),\n\t})\n}\n\ntype\
  \ CartProductReference struct {\n\tID int\n}\n\nfunc (handler CartHandler) PostAddToCart(ref\
  \ CartProductReference) actionresults.ActionResult {\n\tp := handler.Repository.GetProduct(ref.ID)\n\
  \thandler.Cart.AddProduct(p)\n\treturn actionresults.NewRedirectAction(\n\t\thandler.mustGenerateUrl(CartHandler.GetCart))\n\
  }\n\nfunc (handler CartHandler) PostRemoveFromCart(ref CartProductReference) actionresults.ActionResult\
  \ {\n\thandler.Cart.RemoveLineForProduct(ref.ID)\n\treturn actionresults.NewRedirectAction(\n\
  \t\thandler.mustGenerateUrl(CartHandler.GetCart))\n}\n\nfunc (handler CartHandler)\
  \ mustGenerateUrl(method interface{}, data ...interface{}) string {\n\turl, err\
  \ := handler.URLGenerator.GenerateUrl(method, data...)\n\tif err != nil {\n\t\t\
  panic(err)\n\t}\n\treturn url\n}\n```\n\n*代码清单 36-3：`store` 文件夹中 `cart_handler.go`\
  \ 文件的内容*\n\n`GetCart` 方法将渲染一个模板，用于显示用户购物车中的内容。调用 `PostAddToCart` 方法可将产品添加到购物车，之后浏览器会重定向到\
  \ `GetCart` 方法。要创建 `GetCart` 方法使用的模板，请在 `templates` 文件夹中添加一个名为 `cart.html` 的文件，其内容如代码清单\
  \ 36-4 所示。\n\n```\n{{ layout \"simple_layout.html\" }}\n{{ $context := . }}\n\n\
  <h1>Your cart</h1>\n\n<table>\n  <thead>\n    <tr>\n      <th>Quantity</th>\n  \
  \    <th>Item</th>\n      <th>Price</th>\n      <th>Subtotal</th>\n    </tr>\n \
  \ </thead>\n  <tbody>\n    {{ range $context.Cart.GetLines }}\n    <tr>\n      <td>{{\
  \ .Quantity }}</td>\n      <td>{{ .Name }}</td>\n      <td>{{ printf \"$%.2f\" .Price\
  \ }}</td>\n      <td>{{ printf \"$%.2f\" .GetLineTotal }}</td>\n      <td>\n   \
  \     <form method=\"POST\" action=\"{{ $context.RemoveUrl }}\">\n          <input\
  \ type=\"hidden\" name=\"ID\" value=\"{{ .ProductID }}\" />\n          <button type=\"\
  submit\">Remove</button>\n        </form>\n      </td>\n    </tr>\n    {{ end }}\n\
  \  </tbody>\n</table>\n\n<p>Total: {{ printf \"$%.2f\" $context.Cart.GetTotal }}</p>\n\
  \n<a href=\"{{ $context.ProductListUrl }}\">Continue shopping</a>\n```\n\n*代码清单\
  \ 36-4：`templates` 文件夹中 `cart.html` 文件的内容*\n\n此模板生成一个 HTML 表格，用户选择的每个产品对应一行。还有一个按钮可将用户返回到产品列表，以便继续选择。要创建此模板使用的布局，请在\
  \ `templates` 文件夹中添加一个名为 `simple_layout.html` 的文件，其内容如代码清单 36-5 所示。\n\n```\n<!DOCTYPE\
  \ html>\n<html>\n<head>\n  <title>SportsStore</title>\n</head>\n<body>\n  <h1>SPORTS\
