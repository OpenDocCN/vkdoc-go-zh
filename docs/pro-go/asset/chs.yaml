  \ | 22–25 |\n| 比较接口值 | 使用比较运算符，并确保动态类型是可比较的 | 26, 27 |\n| 访问接口值的动态类型 | 使用类型断言 |\
  \ 28–31 |\n| 定义可以赋值任何值的变量 | 使用空接口 | 32–34 |\n\n## 本章准备\n\n为准备本章，打开一个新的命令提示符，导航到一个方便的位置，并创建一个名为\
