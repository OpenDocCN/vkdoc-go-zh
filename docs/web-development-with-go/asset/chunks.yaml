    \ ID иҺ·еҸ–еҚ•дёӘд»»еҠЎгҖӮID еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ |\n| `/tasks/users/{id}` | `Get` | иҺ·еҸ–дёҺжҹҗдёӘз”ЁжҲ·е…іиҒ”зҡ„жүҖжңүд»»еҠЎгҖӮз”ЁжҲ· ID\
    \ еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ |\n| `/tasks/{id}` | `Delete` | ж №жҚ®з»ҷе®ҡ ID еҲ йҷӨзҺ°жңүд»»еҠЎгҖӮID еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ |\n| `/notes`\
    \ | `Post` | й’ҲеҜ№зҺ°жңүд»»еҠЎеҲӣе»әж–°еӨҮжіЁгҖӮ |\n| `/notes/{id}` | `Put` | жӣҙж–°зҺ°жңүзҡ„д»»еҠЎеӨҮжіЁгҖӮ |\n| `/notes`\
    \ | `Get` | иҺ·еҸ–жүҖжңүд»»еҠЎеӨҮжіЁгҖӮ |\n| `/notes/{id}` | `Get` | ж №жҚ®з»ҷе®ҡ ID иҺ·еҸ–еҚ•дёӘеӨҮжіЁгҖӮID еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ\
    \ |\n| `/notes/tasks/{id}` | `Get` | ж №жҚ®з»ҷе®ҡд»»еҠЎ ID иҺ·еҸ–жүҖжңүд»»еҠЎеӨҮжіЁгҖӮID еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ |\n| `/notes/{id}`\
    \ | `Delete` | ж №жҚ®з»ҷе®ҡ ID еҲ йҷӨзҺ°жңүеӨҮжіЁгҖӮID еҖјжқҘиҮӘи·Ҝз”ұеҸӮж•°гҖӮ |\n\n#### е°Ҷиө„жәҗжҳ е°„еҲ°еә”з”Ёи·Ҝз”ұ\n\nдҪ йңҖиҰҒе°Ҷиө„жәҗж ҮиҜҶз¬Ұжҳ е°„еҲ°\
    \ HTTP жңҚеҠЎеҷЁзҡ„еә”з”Ёи·Ҝз”ұпјҢд»ҘдҫҝдёәеҸ‘еҫҖ RESTful API иө„жәҗзҡ„ HTTP иҜ·жұӮжү§иЎҢзӣёеә”зҡ„еә”з”ЁеӨ„зҗҶеҷЁгҖӮжүҖжңүи·Ҝз”ұйғҪз»„з»ҮеңЁ `routers` еҢ…дёӯпјҢе…¶дёӯдёәжҜҸдёӘиө„жәҗи·Ҝеҫ„еҲҶеҲ«зј–еҶҷдәҶ\
    \ Go жәҗж–Үд»¶жқҘжҢҮе®ҡи·Ҝз”ұгҖӮеңЁиҝҷдёӘ RESTful API еә”з”ЁдёӯпјҢдҪҝз”ЁдәҶдёүдёӘе®һдҪ“пјҡ`User`гҖҒ`Task` е’Ң `TaskNote`гҖӮиҝҷдәӣе®һдҪ“жҳ е°„еҲ°дёүдёӘиө„жәҗпјҡ`\"\
    /users\"`гҖҒ`\"/tasks\"` е’Ң `\"/notes\"`гҖӮ\n\nеӣҫ 9-3 еұ•зӨәдәҶ `routers` еҢ…зӣ®еҪ•зҡ„з»“жһ„пјҡ\n\n![A978-1-4842-1052-9_9_Fig3_HTML.jpg](img/A978-1-4842-1052-9_9_Fig3_HTML.jpg)\n\
    \n**еӣҫ 9-3.** `routers` еҢ…зҡ„з»“жһ„\n\n#### з”ЁжҲ·иө„жәҗзҡ„и·Ҝз”ұ\n\nи®©жҲ‘д»¬е®ҡд№үз”ЁжҲ·иө„жәҗзҡ„и·Ҝз”ұпјҲи§Ғжё…еҚ• 9-2пјүгҖӮ\n\n**жё…еҚ•\
    \ 9-2.** `user.go` дёӯз”ЁжҲ·иө„жәҗзҡ„и·Ҝз”ұ\n\n```go\npackage routers\n\nimport (\n    \"github.com/gorilla/mux\"\
    \n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\n)\n\nfunc SetUserRoutes(router\
    \ *mux.Router) *mux.Router {\n    router.HandleFunc(\"/users/register\", controllers.Register).Methods(\"\
    POST\")\n    router.HandleFunc(\"/users/login\", controllers.Login).Methods(\"\
    POST\")\n    return router\n}\n```\n\n`SetUserRoutes` еҮҪж•°жҺҘж”¶дёҖдёӘжҢҮеҗ‘ Gorilla `mux` и·Ҝз”ұеҷЁеҜ№иұЎ\
    \ (`mux.Router`) зҡ„жҢҮй’ҲдҪңдёәеҸӮж•°пјҢе№¶иҝ”еӣһ `mux.Router` еҜ№иұЎзҡ„жҢҮй’ҲгҖӮиҝҷйҮҢжҢҮе®ҡдәҶдёӨжқЎи·Ҝз”ұпјҡдёҖжқЎз”ЁдәҺжіЁеҶҢж–°з”ЁжҲ·пјҢеҸҰдёҖжқЎз”ЁдәҺз”ЁжҲ·зҷ»еҪ•зі»з»ҹгҖӮеә”з”ЁеӨ„зҗҶеҷЁеҮҪж•°д»Һ\
    \ `controllers` еҢ…дёӯи°ғз”ЁпјҢиҜҘеҢ…е°ҶеңЁжң¬з« еҗҺйқўи®Ёи®әгҖӮ\n"
- fmt: "#### Routes for the Tasks Resource\n\nA user must log in to the system to\
    \ access the resources of `Task` and `TaskNote`. When users log in using a username\
    \ and password, the system gives them a JWT that can be used as authorization\
    \ to access the resources of the `Task` and `TaskNote` entities. The server validates\
    \ the JWT of HTTP requests in the `Task` and `TaskNote` resources by using an\
    \ HTTP middleware that wraps the application handlers and ensures that HTTP requests\
    \ have a valid bearer token as a JWT.\n\nThe third-party package `Negroni` is\
    \ used for handling HTTP middleware (refer to [Chapter 6](#A978-1-4842-1052-9_6_Chapter.html)).\
    \ A middleware handler function named `Authorize` is in the `common` package and\
    \ used to authorize HTTP requests with the JWT. In the RESTful API application,\
    \ it isnвҖҷt necessary to use the authorization middleware across the routes of\
    \ the application; when the resources of `User вҖ“ Register and Login` are accessed,\
    \ the middleware function should not be invoked. The authentication middleware\
    \ function is applied into the `Task` and `TaskNote` entities. Here, the resources\
    \ of the `Task` entity are mapped with the URI `\"/tasks\"`, so the authorization\
    \ middleware has to be added to work with the `\"/tasks\"` URL path. The `Negroni`\
    \ package allows you to add middleware to route specific URL paths.\n\nListing\
    \ [9-3](#A978-1-4842-1052-9_9_Chapter.html#FPar4) provides the routes specified\
    \ for the `Tasks` resource.\n\n**Listing 9-3.** Routes for the Tasks Resource\
    \ in `task.go`\n\n```go\npackage routers\n\nimport (\n    \"github.com/codegangsta/negroni\"\
    \n    \"github.com/gorilla/mux\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
    \n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\n)\n\nfunc SetTaskRoutes(router\
    \ *mux.Router) *mux.Router {\n    taskRouter := mux.NewRouter()\n    taskRouter.HandleFunc(\"\
    /tasks\", controllers.CreateTask).Methods(\"POST\")\n    taskRouter.HandleFunc(\"\
    /tasks/{id}\", controllers.UpdateTask).Methods(\"PUT\")\n    taskRouter.HandleFunc(\"\
    /tasks\", controllers.GetTasks).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/{id}\", controllers.GetTaskById).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/users/{id}\", controllers.GetTasksByUser).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/{id}\", controllers.DeleteTask).Methods(\"DELETE\")\n    router.PathPrefix(\"\
    /tasks\").Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n\
    \        negroni.Wrap(taskRouter),\n    ))\n    return router\n}\n```\n\n### Adding\
    \ Route-Specific Middleware\n\nYou can add the authorization middleware for the\
    \ route path `\"/tasks\"` to restrict access only to authenticated users. In the\
    \ `SetTaskRoutes` function, a new router instance of `mux router` is created,\
    \ the routes for the `\"/tasks\"` resource are specified, and the authorization\
    \ middleware is wrapped into the handler functions of the routes path `\"/tasks\"\
    `:\n\n```go\nrouter.PathPrefix(\"/tasks\").Handler(negroni.New(\n    negroni.HandlerFunc(common.Authorize),\n\
    \    negroni.Wrap(taskRouter),\n))\n```\n\n#### Routes for the TaskNote Resource\n\
    \nThe `TaskNote` entity is wrapped with the URI `\"/notes\"`. Like the `\"/tasks\"\
    ` resources, authorization middleware has to be added to the `\"/notes\"` resource.\n\
    \nListing [9-4](#A978-1-4842-1052-9_9_Chapter.html#FPar5) provides the routes\
    \ specified for the `TaskNote` resource.\n\n**Listing 9-4.** Routes for the TaskNote\
    \ Resource in `note.go`\n\n```go\npackage routers\n\nimport (\n    \"github.com/codegangsta/negroni\"\
    \n    \"github.com/gorilla/mux\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
    \n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\n)\n\nfunc SetNoteRoutes(router\
    \ *mux.Router) *mux.Router {\n    noteRouter := mux.NewRouter()\n    noteRouter.HandleFunc(\"\
    /notes\", controllers.CreateNote).Methods(\"POST\")\n    noteRouter.HandleFunc(\"\
    /notes/{id}\", controllers.UpdateNote).Methods(\"PUT\")\n    noteRouter.HandleFunc(\"\
    /notes/{id}\", controllers.GetNoteById).Methods(\"GET\")\n    noteRouter.HandleFunc(\"\
    /notes\", controllers.GetNotes).Methods(\"GET\")\n    noteRouter.HandleFunc(\"\
    /notes/tasks/{id}\", controllers.GetNotesByTask).Methods(\"GET\")\n    noteRouter.HandleFunc(\"\
    /notes/{id}\", controllers.DeleteNote).Methods(\"DELETE\")\n    router.PathPrefix(\"\
    /notes\").Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n\
    \        negroni.Wrap(noteRouter),\n    ))\n    return router\n}\n```\n\n####\
    \ Initializing Routes for a RESTful API\n\nAll routes are now specified for the\
    \ RESTful API application. LetвҖҷs write the code to initialize all routes specified\
    \ in the previous steps.\n\nListing [9-5](#A978-1-4842-1052-9_9_Chapter.html#FPar6)\
    \ initializes all routes for the RESTful API.\n\n**Listing 9-5.** Initializing\
    \ Routes in `router.go`\n\n```go\npackage routers\n\nimport (\n    \"github.com/gorilla/mux\"\
    \n)\n\nfunc InitRoutes() *mux.Router {\n    router := mux.NewRouter().StrictSlash(false)\n\
    \    // Routes for the User entity\n    router = SetUserRoutes(router)\n    //\
    \ Routes for the Task entity\n    router = SetTaskRoutes(router)\n    // Routes\
    \ for the TaskNote entity\n    router = SetNoteRoutes(router)\n    return router\n\
    }\n```\n\nThe `InitRoutes` function in `main.go` is called when the HTTP server\
    \ starts, as discussed in a later section of the chapter.\n\n### Setting up the\
    \ RESTful API Application\n\nThe resource modeling for the RESTful API application\
    \ is complete. This section focuses on setting up the application and starting\
    \ the HTTP server after executing some essential initialization logic.\n\nBefore\
    \ starting the HTTP server, follow these steps:\n\n- Initialize the `AppConfig`\
    \ identifier of the `common` package by reading configuration values from `config.json`.\
    \ The `AppConfig` identifier provides the configuration values such as the host\
    \ URI of HTTP server and MongoDB, name of the MongoDB database, and authentication\
    \ credentials to access the MongoDB database.\n- Initialize asymmetric cryptographic\
    \ keys for signing the JWT and verifying the tokens.\n- Create a MongoDB `Session`\
    \ object using the `mgo` package.\n- Add indexes into MongoDB collections.\n\n\
    These are one-time activities that are invoked before starting the HTTP server.\
    \ These functionalities are implemented in the `common` package. LetвҖҷs take a\
    \ look at the bootstrapping logic implemented in the `common` package (discussed\
    \ in the following sections).\n\nFigure [9-4](#A978-1-4842-1052-9_9_Chapter.html#Fig4)\
    \ illustrates the source files contained in the `common` package.\n\n![A978-1-4842-1052-9_9_Fig4_HTML.jpg](A978-1-4842-1052-9_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4.** Source files of the common package"
