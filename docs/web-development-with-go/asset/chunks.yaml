- fmt: 'The Google Cloud platform provides various managed services for persisting
    structured data, including `Google Cloud SQL`, `Google Cloud Datastore`, and `Google
    Bigtable`. When you build `App Engine` applications with large volumes of data,
    the `Google Cloud Datastore` is the best database choice. You can build massively
    scalable web applications using `App Engine` and `Cloud Datastore` without spending
    time managing the IT infrastructure.


    `Google Cloud Endpoints` is an `App Engine` service that builds back-end APIs
    for mobile client applications and web client applications. It provides tools,
    libraries, and capabilities for quickly building back-end APIs and generating
    native client libraries from `App Engine` applications. Although you can create
    back-end APIs using a normal `App Engine` application, `Cloud Endpoints` makes
    the development process easier by providing extra capabilities. `Cloud Endpoints`
    allows you to generate native client libraries for iOS, Android, JavaScript, and
    Dart, so client application developers are freed from writing wrappers to access
    back-end APIs.


    ## References


    [`https://github.com/GoogleCloudPlatform/gcloud-golang`](https://github.com/GoogleCloudPlatform/gcloud-golang)


    [`https://cloud.google.com`](https://cloud.google.com/)


    Google Cloud Services infographic: [`https://cloud.google.com/`](https://cloud.google.com/)


    Endpoints architecture diagram: [`https://cloud.google.com/appengine/docs/python/endpoints/`](https://cloud.google.com/appengine/docs/python/endpoints/)'
