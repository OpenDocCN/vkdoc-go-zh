    GET\")\n    noteRouter.HandleFunc(\"/notes/tasks/{id}\", controllers.GetNotesByTask).Methods(\"\
    GET\")\n    noteRouter.HandleFunc(\"/notes/{id}\", controllers.DeleteNote).Methods(\"\
