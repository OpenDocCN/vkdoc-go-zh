- fmt: "### Validating the JWT Token\n\nBecause there is only one private key (`\"\
    app.rsa\"`) to sign the tokens, only its public counterpart (`\"app.rsa.pub\"\
    `) is used to verify the access token.\n\nHere is the authentication handler that\
    \ validates the access token. It automatically looks at the `Bearer` token from\
    \ the HTTP `Authorization` header of the HTTP request object.\n\n```\nfunc authHandler(w\
    \ http.ResponseWriter, r *http.Request) {\n\n    // validate the token\n    token,\
    \ err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{}, error) {\n\
    \        // since we only use one private key to sign the tokens,\n        //\
    \ we also only use its public counter part to verify\n        return verifyKey,\
    \ nil\n    })\n\n    if err != nil {\n        switch err.(type) {\n        case\
    \ *jwt.ValidationError: // something was wrong during the validation\n       \
    \     vErr := err.(*jwt.ValidationError)\n            switch vErr.Errors {\n \
    \           case jwt.ValidationErrorExpired:\n                w.WriteHeader(http.StatusUnauthorized)\n\
    \                fmt.Fprintln(w, \"Token Expired, get a new one.\")\n        \
    \        return\n            default:\n                w.WriteHeader(http.StatusInternalServerError)\n\
    \                fmt.Fprintln(w, \"Error while Parsing Token!\")\n           \
    \     log.Printf(\"ValidationError error: %+v\\n\", vErr.Errors)\n           \
    \     return\n            }\n        default: // something else went wrong\n \
    \           w.WriteHeader(http.StatusInternalServerError)\n            fmt.Fprintln(w,\
    \ \"Error while Parsing Token!\")\n            log.Printf(\"Token parse error:\
    \ %v\\n\", err)\n            return\n        }\n    }\n\n    if token.Valid {\n\
    \        response := Response{\"Authorized to the system\"}\n        jsonResponse(response,\
    \ w)\n    } else {\n        response := Response{\"Invalid token\"}\n        jsonResponse(response,\
    \ w)\n    }\n}\n```\n\nThe `ParseFromRequest` function automatically looks at\
    \ the HTTP header for the access token and validates the string with a corresponding\
    \ verification key. By checking the error, you can see whether the token has expired.\
    \ The `jwt-go` package is very helpful when you work with JWT tokens.\n\n### Running\
    \ and Testing the API Server\n\nLetвҖҷs run the program and call the API endpoints\
    \ using the REST client tool. To log in to the API server, send HTTP `Post` to\
    \ `\"/login\"` by providing a username and password, as shown in Figure [7-6](#A978-1-4842-1052-9_7_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1052-9_7_Fig6_HTML.jpg](A978-1-4842-1052-9_7_Fig6_HTML.jpg)\n\n\
    Figure 7-6.\nHTTP Post to вҖң/loginвҖқ\n\nFigure [7-7](#A978-1-4842-1052-9_7_Chapter.html#Fig7)\
    \ shows the response of the HTTP Post to вҖң/loginвҖқ.\n\n![A978-1-4842-1052-9_7_Fig7_HTML.jpg](A978-1-4842-1052-9_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7.\nAPI server sends JWT access token as the response\n\nIf the login\
    \ is valid, the API server sends a JWT token to the client as an access token\
    \ for subsequent HTTP requests.\n\nLetвҖҷs authorize into the API server with the\
    \ access token received from the HTTP `Post` to `\"/login\"`.\n\nLetвҖҷs send a\
    \ request to `\"/auth\"` by providing the access token in the HTTP `Authorization`\
    \ header as shown in the following format (see Figure [7-8](#A978-1-4842-1052-9_7_Chapter.html#Fig8)):\n\
    \n`Authorization: Bearer \"JWT Access Token\"`\n\n![A978-1-4842-1052-9_7_Fig8_HTML.jpg](A978-1-4842-1052-9_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8.\nAuthenticating into the API server with a JWT access token\n\n\
    Figure [7-9](#A978-1-4842-1052-9_7_Chapter.html#Fig9) displays the response that\
    \ shows a successful authentication into the system.\n\n![A978-1-4842-1052-9_7_Fig9_HTML.jpg](A978-1-4842-1052-9_7_Fig9_HTML.jpg)\n\
    \nFigure 7-9.\nSuccessful authentication into the API server\n\nWhen you build\
    \ web APIs as the back end for mobile applications and web applications, a token-based\
    \ approach is the preferred solution when you provide your own authentication\
    \ and authorization infrastructure. This approach is good for mobile clients and\
    \ SPAs to consume API resources. After logging in to the system using a username\
    \ and a password, a client application can obtain an access token to access protected\
    \ resources in subsequent HTTP requests. Once the client applications obtain the\
    \ access token (JWT token) from an API server, the token can be persisted into\
    \ a local storage of client applications. Whenever HTTP requests are sent to access\
    \ the protected resources of the API server, they then can be taken from local\
    \ storage.\n\n### Using HTTP Middleware to Validate JWT Tokens\n\nWhen you work\
    \ with JWT tokens as an authentication model for accessing the protected resources\
    \ of a server, you have to validate the tokens on every HTTP request. It would\
    \ be a tedious job to implement the validation logic in each HTTP request, so\
    \ HTTP middleware is a great approach for implementing authentication and authorization\
    \ logic in web applications in which you can decorate the authentication middleware\
    \ into the routes (which is required for authentication). You write authentication\
    \ logic in one place that can be applied into multiple routes in which you want\
    \ to implement authorization for accessing its protected resources.\n\nListing\
    \ [7-3](#A978-1-4842-1052-9_7_Chapter.html#FPar5) is an authentication middleware\
    \ that can be used for decorating into multiple application handlers to perform\
    \ authorization.\n\nListing 7-3. Authentication Middleware for Validating JWT\
    \ Tokens\n\n```\nfunc authMiddleware(w http.ResponseWriter, r *http.Request, next\
    \ http.HandlerFunc) {\n    // validate the token\n    token, err := jwt.ParseFromRequest(r,\
    \ func(token *jwt.Token) (interface{}, error) {\n        return verifyKey, nil\n\
    \    })\n\n    if(err==nil && token.Valid) {\n        next(w,r)\n    } else {\n\
    \        w.WriteHeader(http.StatusUnauthorized)\n        fmt.Fprint(w, \"Authentication\
    \ failed\")\n    }\n}\n```\n\nIf the token is valid, the next handler in the middleware\
    \ stack is called.\n\nHere is the code block that decorates an authentication\
    \ middleware into an application handler for a protected resource:\n\n```\nr.HandleFunc(\"\
    /login\", loginHandler).Methods(\"POST\")\nr.Handle(\"/admin\", negroni.New(\n\
    \                negroni.HandlerFunc(authMiddleware),\n                negroni.Wrap(http.HandlerFunc(adminHandler)),\n\
    \        ))\n```\n\nThe `Negroni` package for the middleware stack is used. For\
    \ the protected resource `\"/admin\"`, the `authMiddleware` middleware handler\
    \ is decorated into the `adminHandler` application handler."
