    \ еҮҪж•°жҺҘеҸ—дёҖдёӘеӯ—з¬ҰдёІеүҚзјҖе’ҢдёҖдёӘ `http.Handler` дҪңдёәеҸӮж•°пјҢе№¶иҝ”еӣһдёҖдёӘеӨ„зҗҶзЁӢеәҸпјҢиҜҘеӨ„зҗҶзЁӢеәҸйҖҡиҝҮд»ҺиҜ·жұӮ URL зҡ„и·Ҝеҫ„дёӯз§»йҷӨз»ҷе®ҡеүҚзјҖжқҘжңҚеҠЎ HTTP\
    \ иҜ·жұӮпјҲеҸӮи§ҒеҲ—иЎЁ 6-1пјүгҖӮ\n\nеҲ—иЎЁ 6-1. дҪҝз”Ё `StripPrefix` еҢ…иЈ… `http.FileServer` еӨ„зҗҶзЁӢеәҸ\n\n```\n\
    package main\n\nimport (\n    \"net/http\"\n)\n\nfunc main() {\n    // иҰҒд»ҘеӨҮйҖү URL\
    \ и·Ҝеҫ„ (/public/) жҸҗдҫӣзЈҒзӣҳзӣ®еҪ• (/public) дёӯзҡ„жңҚеҠЎпјҢ\n    // иҜ·дҪҝз”Ё StripPrefix еңЁ FileServer зңӢеҲ°иҜ·жұӮ\
    \ URL\n    // зҡ„и·Ҝеҫ„д№ӢеүҚдҝ®ж”№е®ғпјҡ\n    fs := http.FileServer(http.Dir(\"public\"))\n   \
    \ http.Handle(\"/public/\", http.StripPrefix(\"/public/\", fs))\n}\n```\n\n`StripPrefix`\
    \ еҮҪж•°еҢ…иЈ…дәҶ `http.FileServer` еӨ„зҗҶзЁӢеәҸпјҢе№¶жҸҗдҫӣдәҶйўқеӨ–зҡ„еҠҹиғҪпјҢеӣ дёәе®ғйҖҡиҝҮд»ҺиҜ·жұӮ URL зҡ„и·Ҝеҫ„дёӯз§»йҷӨз»ҷе®ҡеүҚзјҖе№¶и°ғз”Ёз»ҷе®ҡзҡ„еӨ„зҗҶзЁӢеәҸеҜ№иұЎжқҘдҝ®ж”№иҜ·жұӮ\
    \ URL зҡ„и·Ҝеҫ„гҖӮ\n\nеҲ—иЎЁ 6-2 жҳҜ `StripPrefix` еҮҪж•°зҡ„ Go жәҗд»Јз ҒгҖӮ\n\nеҲ—иЎЁ 6-2. жқҘиҮӘ `net/http` еә“зҡ„ `StripPrefix`\
    \ жәҗз Ғ\n\n```\nfunc StripPrefix(prefix string, h Handler) Handler {\n    if prefix\
    \ == \"\" {\n        return h\n    }\n    return HandlerFunc(func(w ResponseWriter,\
    \ r *Request) {\n        if p := strings.TrimPrefix(r.URL.Path, prefix); len(p)\
    \ < len(r.URL.Path) {\n            r.URL.Path = p\n            h.ServeHTTP(w,\
    \ r)\n        } else {\n            NotFound(w, r)\n        }\n    })\n}\n```\n\
    \n`StripPrefix` еҮҪж•°йҖҡиҝҮе°ҶдёҖдёӘзӯҫеҗҚеҰӮ `func(w ResponseWriter, r *Request)` зҡ„еҢҝеҗҚеҮҪж•°иҪ¬жҚўдёә `HandlerFunc`\
