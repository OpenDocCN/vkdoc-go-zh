- fmt: "# Helper for Displaying HTTP Errors\n\nError handling in Go is different from\
    \ most mainstream programming languages because it provides a simple and minimalistic\
    \ approach for handling exceptions using a built-in `error` type. The values of\
    \ the `error` type are used to indicate an abnormal state in the applications.\
    \ When you look at the standard library packages, you see that most of the functions\
    \ return multiple values, including an `error` type value to indicate an abnormal\
    \ state.\n\nYou can check the value of the `error` type to see whether any exception\
    \ occurred during the function execution:\n\n```\nfile, err := os.Open(\"common/config.json\"\
    )\nif err != nil {\n    log.Fatalf(\"[loadConfig]: %s\\n\", err)\n}\n```\n\nThe\
    \ `Fatalf` function of the `log` package is called if the error variable contains\
    \ any value. The `Fatalf` function aborts the program after writing the log message.\
    \ In HTTP handlers of the RESTful API application, the program doesn't abort for\
    \ any kind of abnormal state. Instead, a JSON response is provided as the HTTP\
    \ response with the appropriate HTTP status code. A helper function is written\
    \ in a `common` package to display HTTP errors in JSON format so that client applications\
    \ can understand anything wrong with their HTTP requests.\n\nListing [9-13](#A978-1-4842-1052-9_9_Chapter.html#FPar14)\
    \ provides a helper function to display HTTP errors in JSON format, which includes\
    \ appropriate HTTP status codes in the error response.\n\n**Listing 9-13.** Helper\
    \ Function for Displaying Errors in `utils.go`\n\n```\npackage common\n\nimport\
    \ (\n    \"encoding/json\"\n    \"log\"\n    \"net/http\"\n)\n\ntype (\n    appError\
    \ struct {\n        Error      string `json:\"error\"`\n        Message    string\
    \ `json:\"message\"`\n        HttpStatus int    `json:\"status\"`\n    }\n   \
    \ errorResource struct {\n        Data appError `json:\"data\"`\n    }\n)\n\n\
    func DisplayAppError(w http.ResponseWriter, handlerError error, message string,\
    \ code int) {\n    errObj := appError{\n        Error:      handlerError.Error(),\n\
    \        Message:    message,\n        HttpStatus: code,\n    }\n    log.Printf(\"\
    AppError]: %s\\n\", handlerError)\n    w.Header().Set(\"Content-Type\", \"application/json;\
    \ charset=utf-8\")\n    w.WriteHeader(code)\n    if j, err := json.Marshal(errorResource{Data:\
    \ errObj}); err == nil {\n        w.Write(j)\n    }\n}\n```\n\nA helper function\
    \ named `DisplayAppError` is written to provide error messages in JSON as the\
    \ HTTP response. Client applications can check the HTTP status code to verify\
    \ whether the HTTP request is successful. A struct type named `appError` is used\
    \ to create the model object for providing error messages. In the `appError` type,\
    \ the `Error` property is used for holding the string value of the error object,\
    \ the `Message` property is used for holding a custom message on the error, and\
    \ the `HttpStatus` property is used for holding HTTP status code. An instance\
    \ of the `errorResource` type is created by providing the value of `appError`\
    \ to encode the response as JSON.\n\nFigure [9-7](#A978-1-4842-1052-9_9_Chapter.html#Fig7)\
    \ shows the error response of an invalid HTTP request that contains an expired\
    \ access token.\n\n![A978-1-4842-1052-9_9_Fig7_HTML.jpg](A978-1-4842-1052-9_9_Fig7_HTML.jpg)\n\
    \n**Figure 9-7.** HTTP response for error messages in JSON\n\nThe `DisplayAppError`\
    \ function is a simple helper function to provide HTTP errors. You can also write\
    \ the error-handling logic in HTTP middleware, which can be used to wrap application\
    \ handlers and is a more elegant approach to implement error handling in Go web\
    \ applications. If any error occurred in an application handler, you can return\
    \ a model object for holding the error data, and within the middleware function\
    \ you can check whether the error model contains any value. You can also provide\
    \ the HTTP response for an error if one occurs. This approach is not discussed\
    \ in this chapter, but you can try it when you build your own web applications.\n\
    \n## Handling Data for an HTTP Request Lifecycle\n\nLet's define a type for handling\
    \ the data during the lifecycle of an HTTP request. Here, a `Context` struct type\
    \ is defined, on which the MongoDB `Session` object is put as a property, exposing\
    \ the `DbCollection` method for getting the MongoDB `Collection` object and the\
    \ `Close` method for closing the MongoDB `Session` object.\n\nListing [9-14](#A978-1-4842-1052-9_9_Chapter.html#FPar15)\
    \ provides the code block of the `Context` struct type that will be used with\
    \ HTTP handler functions to hold the data during an HTTP request lifecycle.\n\n\
    **Listing 9-14.** `Context` Struct in `context.go`\n\n```\npackage controllers\n\
    \nimport (\n    \"gopkg.in/mgo.v2\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
    \n)\n\n// Struct used for maintaining HTTP Request Context\ntype Context struct\
    \ {\n    MongoSession *mgo.Session\n}\n\n// Close mgo.Session\nfunc (c *Context)\
    \ Close() {\n    c.MongoSession.Close()\n}\n\n// Returns mgo.collection for the\
    \ given name\nfunc (c *Context) DbCollection(name string) *mgo.Collection {\n\
    \    return c.MongoSession.DB(common.AppConfig.Database).C(name)\n}\n\n// Create\
    \ a new Context object for each HTTP request\nfunc NewContext() *Context {\n \
    \   session := common.GetSession().Copy()\n    context := &Context{\n        MongoSession:\
    \ session,\n    }\n    return context\n}\n```\n\nThis source file provides a `NewContext`\
    \ function that returns an instance of `Context` type by providing a copied version\
    \ of the MongoDB `Session` object. The `GetSession` function of the `common` package\
    \ is called to get the `Session` object and take a copy from it. Within the application\
    \ handlers, the `NewContext` function is called to get an instance of a `Context`\
    \ type in which the MongoDB `Session` object of the `Context` type is used for\
    \ performing CRUD operations against the MongoDB database.\n\nIn the `Context`\
    \ type, you are simply storing the MongoDB `Session` object, but you can use any\
    \ kind of data in the `Context` type to be used with the lifecycle of an HTTP\
    \ request. In many use cases, you may need to share these data among various middleware\
    \ handler functions and application handler functions. In short, you need to share\
    \ data among different handler functions.\n\nIn this scenario, you can use a mechanism\
    \ to store objects to work with the HTTP request context. The `context` package\
    \ from the Gorilla web toolkit (www.gorillatoolkit.org/pkg/context) provides the\
    \ functionality for putting data in the HTTP `Context` object for holding the\
    \ data during the lifecycle of an HTTP request. You can put the data into HTTP\
    \ context in one handler, which is accessible from other handlers. In the RESTful\
    \ API example, you use the data in the application handler and don't need to share\
    \ data among handlers. So you aren't putting the `Context` struct into the HTTP\
    \ `Context` object.\n\n## Handlers for the Users Resource\n\nHere are the routes\
    \ specified for the Users resource:\n\n```\nrouter.HandleFunc(\"/users/register\"\
    , controllers.Register).Methods(\"POST\")\nrouter.HandleFunc(\"/users/login\"\
    , controllers.Login).Methods(\"POST\")\n```\n\nTwo routes are specified for the\
    \ `Users` resource. The resource `/users/register` is used to register a user\
    \ into the system, and `/users/login` is used to authenticate into the system\
    \ for getting an access token to be used to authorize the HTTP requests to access\
    \ RESTful API resources."
  raw: '#### Helper for Displaying HTTP Errors


    Error handling in Go is different from most mainstream programming languages because
    it provides a simple and minimalistic approach for handling exceptions using a
    built-in `error` type. The values of the `error` type are used to indicate an
    abnormal state in the applications. When you look at the standard library packages,
    you see that most of the functions return multiple values, including an `error`
    type value to indicate an abnormal state.


    You can check the value of the `error` type to see whether any exception occurred
    during the function execution:


    `file, err := os.Open("common/config.json")`


    `if err != nil {`


    `log.Fatalf("[loadConfig]: %s\n", err)`


    `}`


    The `Fatalf` function of the `log` package is called if the error variable contains
    any value. The `Fatalf` function aborts the program after writing the log message.
    In HTTP handlers of the RESTful API application, the program doesnвҖҷt abort for
    any kind of abnormal state. Instead, a JSON response is provided as the HTTP response
    with the appropriate HTTP status code. A helper function is written in a `common`
    package to display HTTP errors in JSON format so that client applications can
    understand anything wrong with their HTTP requests.


    Listing [9-13](#A978-1-4842-1052-9_9_Chapter.html#FPar14) provides a helper function
    to display HTTP errors in JSON format, which includes appropriate HTTP status
    codes in the error response.


    Listing 9-13.В В Helper Function for Displaying Errors in utils.go


    `package common`


    `import (`


    `"encoding/json"`


    `"log"`


    `"net/http"`


    `)`


    `type (`


    `appError struct {`


    `` ErrorВ В В В В В string `json:"error"` ``


    `` MessageВ В В В string `json:"message"` ``


    `` HttpStatus intВ В В В `json:"status"` ``


    `}`


    `errorResource struct {`


    `` Data appError `json:"data"` ``


    `}`


    `)`


    `func DisplayAppError(w http.ResponseWriter, handlerError error, message string,
    code int) {`


    `errObj := appError{`


    `Error:В В В В В В handlerError.Error(),`


    `Message:В В В В message,`


    `HttpStatus: code,`


    `}`


    `log.Printf("AppError]: %s\n", handlerError)`


    `w.Header().Set("Content-Type", "application/json; charset=utf-8")`


    `w.WriteHeader(code)`


    `if j, err := json.Marshal(errorResource{Data: errObj}); err == nil {`


    `w.Write(j)`


    `}`


    `}`


    A helper function named `DisplayAppError is written` to provide error messages
    in JSON as the HTTP response. Client applications can check the HTTP status code
    to verify whether the HTTP request is successful. A struct type named `appError`
    is used to create the model object for providing error messages. In the `appError`
    type, the `Error` property is used for holding the string value of the error object,
    the `Message` property is used for holding a custom message on the error, and
    the `HttpStatus` property is used for holding HTTP status code. An instance of
    the `errorResource` type is created by providing the value of `appError` to encode
    the response as JSON.


    Figure [9-7](#A978-1-4842-1052-9_9_Chapter.html#Fig7) shows the error response
    of an invalid HTTP request that contains an expired access token.


    ![A978-1-4842-1052-9_9_Fig7_HTML.jpg](A978-1-4842-1052-9_9_Fig7_HTML.jpg)


    Figure 9-7.


    HTTP response for error messages in JSON


    The `DisplayAppError` function `is a simple helper function to provide HTTP errors.
    You can also write the error-handling logic in HTTP middleware, which can be used
    to wrap application handlers and is a more elegant approach to implement error
    handling in Go web applications. If any error occurred in an application handler,
    you can return a model object for holding the error data, and within the middleware
    function you can check whether the error model contains any value. You can also
    provide the HTTP response for an error if one occurs. This approach is not discussed
    in this chapter, but you can try it when you build your own web applications.`


    #### Handling Data for an HTTP Request Lifecycle


    LetвҖҷs define a type for handling the data during the lifecycle of an HTTP request.
    Here, a `Context` struct type is defined, on which the MongoDB `Session` object
    is put as a property, exposing the `DbCollection` method for getting the MongoDB
    `Collection` object and the `Close` method for closing the MongoDB `Session` object.


    Listing [9-14](#A978-1-4842-1052-9_9_Chapter.html#FPar15) provides the code block
    of the `Context` struct type that will be used with HTTP handler functions to
    hold the data during an HTTP request lifecycle.


    Listing 9-14.В В Context Struct in context.go


    `package controllers`


    `import (`


    В В В В В В В В `"gopkg.in/mgo.v2"`


    В В В В В В В В `"github.com/shijuvar/go-web/taskmanager/common"`


    `)`


    `// Struct used for maintaining HTTP Request Context`


    `type Context struct {`


    В В В В В В В В `MongoSession *mgo.Session`


    `}`


    `// Close mgo.Session`


    `func (c *Context) Close() {`


    В В В В В В В В `c.MongoSession.Close()`


    `}`


    `// Returns mgo.collection for the given name`


    `func (c *Context) DbCollection(name string) *mgo.Collection {`


    В В В В В В В В `return c.MongoSession.DB(common.AppConfig.Database).C(name)`


    `}`


    `// Create a new Context object for each HTTP request`


    `func NewContext() *Context {`


    В В В В В В В В `session := common.GetSession().Copy()`


    В В В В В В В В `context := &Context{`


    В В В В В В В В В В В В В В В В `MongoSession: session,`


    В В В В В В В В `}`


    В В В В В В В В `return context`


    `}`


    This source file provides a `NewContext` function that returns an instance of
    `Context` type by providing a copied version of the MongoDB `Session` object.
    The `GetSession` function of the `common` package is called to get the `Session`
    object and take a copy from it. Within the application handlers, the `NewContext`
    function is called to get an instance of a `Context` type in which the MongoDB
    `Session` object of the `Context` type is used for performing CRUD operations
    against the MongoDB database.


    In the `Context` type, you are simply storing the MongoDB `Session` object, but
    you can use any kind of data in the `Context` type to be used with the lifecycle
    of an HTTP request. In many use cases, you may need to share these data among
    various middleware handler functions and application handler functions. In short,
    you need to share data among different handler functions.


    In this scenario, you can use a mechanism to store objects to work with the HTTP
    request context. The `context` package from the Gorilla web toolkit ( [`www.gorillatoolkit.org/pkg/context`](http://www.gorillatoolkit.org/pkg/context)
    ) provides the functionality for putting data in the HTTP `Context` object for
    holding the data during the lifecycle of an HTTP request. You can put the data
    into HTTP context in one handler, which is accessible from other handlers. In
    the RESTful API example, you use the data in the application handler and donвҖҷt
    need to share data among handlers. So you arenвҖҷt putting the `Context` struct
    into the HTTP `Context` object.


    #### Handlers for the Users Resource


    Here are the routes specified for the Users resource:


    `router.HandleFunc("/users/register", controllers.Register).Methods("POST")`


    `router.HandleFunc("/users/login", controllers.Login).Methods("POST")`


    Two routes are specified for the `Users` resource. The resource `"/users/register"`
    is used to register a user into the system, and `"/users/login"` is used to authenticate
