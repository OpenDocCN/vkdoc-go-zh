    \n```go\nvars := mux.Vars(r)\n\nk := vars[\"id\"]\n```\n\n`mux` еҢ…зҡ„ `Vars` еҮҪж•°иҝ”еӣһеҪ“еүҚиҜ·жұӮзҡ„и·Ҝз”ұеҸҳйҮҸгҖӮдҪҝз”Ёи·Ҝз”ұеҖј\
