  trans: "\n#### еҲқе§ӢеҢ–й…ҚзҪ®еҖј\n\nй…ҚзҪ®еҖјеӯҳж”ҫдәҺеҗҚдёә `config.json` зҡ„ж–Үд»¶дёӯпјҢиҜҘж–Үд»¶еӯҳеӮЁдәҶиҜёеҰӮ HTTP жңҚеҠЎеҷЁе’Ң MongoDB\
    \ жңҚеҠЎеҷЁзҡ„дё»жңә URIгҖҒиҝһжҺҘ MongoDB зҡ„иә«д»ҪйӘҢиҜҒеҮӯжҚ®зӯүеҖјгҖӮиҝҷж ·жңүеҠ©дәҺйҒҝе…ҚеңЁеә”з”ЁдёӯдҪҝз”ЁзЎ¬зј–з Ғеӯ—з¬ҰдёІгҖӮ`config.json` ж–Үд»¶иў«иҜ»еҸ–еҗҺпјҢдјҡе°Ҷ\
    \ JSON еҖји§Јз ҒеҲ°еҸҳйҮҸ `AppConfig` дёӯгҖӮй…ҚзҪ®еҖјд»ҺжӯӨеҢ…еҸҳйҮҸдёӯиҜ»еҸ–пјҢз”ЁдәҺеҗҜеҠЁ HTTP жңҚеҠЎеҷЁе’ҢиҝһжҺҘ MongoDB ж•°жҚ®еә“гҖӮ\n\nжё…еҚ• 9-6\
    \ е°Ҷ `config.json` дёӯзҡ„ JSON еӯ—з¬ҰдёІи§Јз ҒпјҢе№¶е°ҶеҖјж”ҫе…Ҙ `AppConfig` дёӯгҖӮ\n\n**жё…еҚ• 9-6.**  еңЁ `utils.go`\
    \ дёӯеҲқе§ӢеҢ– `AppConfig`\n\n```go\npackage common\n\nimport (\n        \"encoding/json\"\
    \n        \"log\"\n        \"os\"\n)\n\ntype configuration struct {\n        Server,\
    \ MongoDBHost, DBUser, DBPwd, Database string\n}\n\n// AppConfig дҝқеӯҳжқҘиҮӘ config.json\
    \ ж–Үд»¶зҡ„й…ҚзҪ®еҖј\nvar AppConfig configuration\n\n// Initialize AppConfig\nfunc initConfig()\
    \ {\n        loadAppConfig()\n}\n\n// иҜ»еҸ– config.json е№¶и§Јз ҒеҲ° AppConfig дёӯ\nfunc loadAppConfig()\
    \ {\n        file, err := os.Open(\"common/config.json\")\n        defer file.Close()\n\
    \        if err != nil {\n                log.Fatalf(\"[loadConfig]: %s\\n\",\
    \ err)\n        }\n\n        decoder := json.NewDecoder(file)\n        AppConfig\
    \ = configuration{}\n        err = decoder.Decode(&AppConfig)\n        if err\
    \ != nil {\n                log.Fatalf(\"[loadAppConfig]: %s\\n\", err)\n    \
    \    }\n}\n```\n\n#### еҠ иҪҪз§Ғй’Ҙ/е…¬й’Ҙ RSA еҜҶй’Ҙ\n\nRSA еҜҶй’Ҙиў«еҠ иҪҪеҲ°дёӨдёӘеҸҳйҮҸдёӯпјҢз”ЁдәҺиЎЁзӨәз§Ғй’Ҙе’Ңе…¬й’ҘпјҢиҝҷдәӣеҜҶй’Ҙз”ЁдәҺеә”з”Ёзҡ„жҺҲжқғеҹәзЎҖи®ҫж–ҪгҖӮз§Ғй’Ҙ/е…¬й’Ҙз”ЁдәҺз”ҹжҲҗ\
    \ JWT е’ҢйӘҢиҜҒ HTTP иҜ·жұӮдёӯзҡ„д»ӨзүҢпјҢд»ҘжҺҲжқғеҜ№еә”з”ЁеҸ—дҝқжҠӨиө„жәҗзҡ„и®ҝй—®гҖӮз§Ғй’Ҙ/е…¬й’ҘеңЁ HTTP жңҚеҠЎеҷЁеҗҜеҠЁеүҚиў«еҠ иҪҪеҲ°дёӨдёӘеҸҳйҮҸдёӯпјҢд»Ҙдҫҝе®ғд»¬еҸҜд»Ҙз”ЁдәҺзҷ»еҪ•еӨ„зҗҶзЁӢеәҸд»ҘеҸҠжҺҲжқғдёӯй—ҙд»¶дёӯеҜ№\
    \ HTTP иҜ·жұӮзҡ„жҺҲжқғгҖӮ\n\nдҪҝз”Ёе‘Ҫд»ӨиЎҢе·Ҙе…· `OpenSSL` з”ҹжҲҗеҜҶй’ҘгҖӮиҰҒз”ҹжҲҗз§Ғй’ҘпјҢиҜ·еңЁе‘Ҫд»ӨиЎҢзӘ—еҸЈдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\n```\nopenssl\
    \ genrsa -out app.rsa 1024\n```\n\nжӯӨе‘Ҫд»Өз”ҹжҲҗдёҖдёӘеҗҚдёә `app.rsa` зҡ„ 1024 дҪҚеҜҶй’ҘгҖӮиҰҒдёәз§Ғй’Ҙз”ҹжҲҗеҜ№еә”зҡ„е…¬й’ҘпјҢиҜ·еңЁе‘Ҫд»ӨиЎҢзӘ—еҸЈдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\
    \n```\nopenssl rsa -in app.rsa -pubout > app.rsa.pub\n```\n\nжӯӨд»Јз Ғз”ҹжҲҗдёҖдёӘеҗҚдёә `app.rsa.pub`\
    \ зҡ„еҜ№еә”е…¬й’ҘгҖӮRSA еҜҶй’ҘеӯҳеӮЁеңЁ `keys` зӣ®еҪ•дёӯгҖӮ\n\nжё…еҚ• 9-7 д»Һ `keys` ж–Үд»¶еӨ№еҠ иҪҪз§Ғй’Ҙ/е…¬й’Ҙ RSA еҜҶй’ҘпјҢе№¶е°Ҷе®ғд»¬еӯҳеӮЁеҲ°дёӨдёӘеҸҳйҮҸдёӯгҖӮ\n\
    \n**жё…еҚ• 9-7.**  еңЁ `auth.go` дёӯеҲқе§ӢеҢ–з§Ғй’Ҙ/е…¬й’Ҙ\n\n```go\npackage common\n\nimport (\n  \
    \      \"io/ioutil\"\n)\n\n// дҪҝз”ЁйқһеҜ№з§°еҠ еҜҶ RSA еҜҶй’Ҙ\nconst (\n    // openssl genrsa -out\
    \ app.rsa 1024\n    privKeyPath = \"keys/app.rsa\"\n    // openssl rsa -in app.rsa\
    \ -pubout > app.rsa.pub\n    pubKeyPath  = \"keys/app.rsa.pub\"\n)\n\n// з”ЁдәҺзӯҫеҗҚзҡ„з§Ғй’Ҙе’Ңз”ЁдәҺйӘҢиҜҒзҡ„е…¬й’Ҙ\n\
    var (\n    verifyKey, signKey []byte\n)\n\n// еңЁеҗҜеҠЁ HTTP еӨ„зҗҶзЁӢеәҸд№ӢеүҚиҜ»еҸ–еҜҶй’Ҙж–Үд»¶\nfunc initKeys()\
    \ {\n        var err error\n        signKey, err = ioutil.ReadFile(privKeyPath)\n\
    \        if err != nil {\n                log.Fatalf(\"[initKeys]: %s\\n\", err)\n\
    \        }\n\n        verifyKey, err = ioutil.ReadFile(pubKeyPath)\n        if\
    \ err != nil {\n                log.Fatalf(\"[initKeys]: %s\\n\", err)\n     \
    \           panic(err)\n        }\n}\n```\n\nз§Ғй’Ҙз”ЁдәҺзӯҫзҪІ JWTпјӣе…¬й’Ҙз”ЁдәҺйӘҢиҜҒ HTTP иҜ·жұӮдёӯзҡ„ JWTпјҢд»Ҙи®ҝй—®\
    \ RESTful API зҡ„иө„жәҗгҖӮдҪ еҸҜд»ҘдҪҝз”Ё `OpenSSL` е·Ҙе…·з”ҹжҲҗ RSA еҜҶй’ҘгҖӮ\n\n#### еҲӣе»ә MongoDB дјҡиҜқеҜ№иұЎ\n\nMongoDB\
    \ `Session` еҜ№иұЎеңЁ HTTP жңҚеҠЎеҷЁеҗҜеҠЁеүҚеҲӣе»әгҖӮ`mongoUtils.go` дёӯзҡ„ `createDbSession` еҮҪж•°йҖҡиҝҮи°ғз”Ё `mgo`\
    \ еҢ…зҡ„ `DialWithInfo` еҮҪж•°жқҘеҲӣе»әдёҖдёӘ `mgo.Session` еҜ№иұЎгҖӮ`DialWithInfo` еҮҪж•°дјҡе»әз«ӢдёҖдёӘеҲ°з”ұ `DialInfo`\
    \ зұ»еһӢе®һдҫӢжҸҗдҫӣзҡ„ MongoDB жңҚеҠЎеҷЁйӣҶзҫӨзҡ„ж–° `Session`гҖӮMongoDB зҡ„ URI д»Һ `AppConfig` еҸҳйҮҸдёӯиҜ»еҸ–гҖӮ`Session`\
    \ еҜ№иұЎе°ҶйҖҡиҝҮ `GetSession` еҮҪж•°и®ҝй—®гҖӮжҜҸеҪ“жү§иЎҢ CRUD ж“ҚдҪңж—¶пјҢйғҪдјҡи°ғз”Ё `GetSession` еҮҪж•°пјҢе№¶дё” `Session` еҜ№иұЎдјҡдҪҝз”Ё\
    \ `mgo.Session` зҡ„ `Copy` ж–№жі•иҝӣиЎҢеӨҚеҲ¶гҖӮдёҖдёӘеӨҚеҲ¶зҡ„ `Session` еҜ№иұЎе°Ҷз”ЁдәҺжүҖжңү CRUD ж“ҚдҪңгҖӮ\n\nжё…еҚ• 9-8 жҸҗдҫӣдәҶ\
    \ `createDbSession` е’Ң `GetSession` зҡ„е®һзҺ°пјҢд»ҘдҫҝдёҺ `Session` еҜ№иұЎдёҖиө·дҪҝз”ЁгҖӮ\n\n**жё…еҚ• 9-8.**  `mongoUtils.go`\
    \ дёӯзҡ„ MongoDB дјҡиҜқ\n\n```go\npackage common\n\nimport (\n    \"gopkg.in/mgo.v2\"\n\
    )\n\nvar session *mgo.Session\n\nfunc GetSession() *mgo.Session {\n        if\
    \ session == nil {\n                var err error\n                session, err\
    \ = mgo.DialWithInfo(&mgo.DialInfo{\n                        Addrs:    []string{AppConfig.MongoDBHost},\n\
    \                        Username: AppConfig.DBUser,\n                       \
    \ Password: AppConfig.DBPwd,\n                        Timeout:  60 * time.Second,\n\
    \                })\n                if err != nil {\n                       \
    \ log.Fatalf(\"[GetSession]: %s\\n\", err)\n                }\n        }\n   \
    \     return session\n}\n\nfunc createDbSession() {\n        var err error\n \
    \       session, err = mgo.DialWithInfo(&mgo.DialInfo{\n                Addrs:\
    \    []string{AppConfig.MongoDBHost},\n                Username: AppConfig.DBUser,\n\
    \                Password: AppConfig.DBPwd,\n                Timeout:  60 * time.Second,\n\
    \        })\n        if err != nil {\n                log.Fatalf(\"[createDbSession]:\
    \ %s\\n\", err)\n        }\n}\n```\n\n#### еҗ‘ MongoDB ж·»еҠ зҙўеј•\n\nзҙўеј•еҸҜд»ҘжҸҗй«ҳеңЁ MongoDB дёӯжү§иЎҢжҹҘиҜўзҡ„жҖ§иғҪгҖӮз”ұдәҺ\
    \ `User` йӣҶеҗҲз»ҸеёёдҪҝз”Ё `email` еӯ—ж®өиҝӣиЎҢжҹҘиҜўпјҢ`Task` йӣҶеҗҲдҪҝз”Ё `createdby` еӯ—ж®өпјҢиҖҢ `TaskNote` йӣҶеҗҲдҪҝз”Ё `taskid`\
    \ еӯ—ж®өпјҢеӣ жӯӨдёәиҝҷдәӣеӯ—ж®өж·»еҠ дәҶзҙўеј•гҖӮ`addIndexes` еҮҪж•°е°Ҷзҙўеј•ж·»еҠ еҲ° MongoDB йӣҶеҗҲдёӯгҖӮ\n\nжё…еҚ• 9-9 еңЁ MongoDB дёӯж·»еҠ зҙўеј•гҖӮ\n\
    \n**жё…еҚ• 9-9.**  еңЁ `mongoUtils.go` дёӯеҗ‘ MongoDB ж·»еҠ зҙўеј•\n\n```go\n// еҗ‘ MongoDB ж·»еҠ зҙўеј•\n\
    func addIndexes() {\n    var err error\n    userIndex := mgo.Index{\n        Key:\
    \        []string{\"email\"},\n        Unique:     true,\n        Background:\
    \ true,\n        Sparse:     true,\n    }\n    taskIndex := mgo.Index{\n     \
    \   Key:        []string{\"createdby\"},\n        Unique:     false,\n       \
    \ Background: true,\n        Sparse:     true,\n    }\n    noteIndex := mgo.Index{\n\
    \        Key:        []string{\"taskid\"},\n        Unique:     false,\n     \
    \   Background: true,\n        Sparse:     true,\n    }\n\n    // еҗ‘ MongoDB ж·»еҠ зҙўеј•\n\
    \    session := GetSession().Copy()\n    defer session.Close()\n\n    userCol\
    \ := session.DB(AppConfig.Database).C(\"users\")\n    taskCol := session.DB(AppConfig.Database).C(\"\
    tasks\")\n    noteCol := session.DB(AppConfig.Database).C(\"notes\")\n\n    err\
    \ = userCol.EnsureIndex(userIndex)\n    if err != nil {\n        log.Fatalf(\"\
    [addIndexes]: %s\\n\", err)\n    }\n\n    err = taskCol.EnsureIndex(taskIndex)\n\
    \    if err != nil {\n        log.Fatalf(\"[addIndexes]: %s\\n\", err)\n    }\n\
    \n    err = noteCol.EnsureIndex(noteIndex)\n    if err != nil {\n        log.Fatalf(\"\
    [addIndexes]: %s\\n\", err)\n    }\n}\n```\n"
- fmt: "# Initialization Logic in the `common` Package\n\nThe `bootstrapper.go` source\
    \ file in the `common` package provides a `StartUp()` function that calls the\
    \ necessary initialization logic before the HTTP server starts. The `StartUp()`\
    \ function of the `common` package is called from `main.go`.\n\nListing [9-10](#A978-1-4842-1052-9_9_Chapter.html#FPar11)\
    \ provides the implementation of the `StartUp()` function that calls the initialization\
    \ logic, which is required before running the HTTP server.\n\n**Listing 9-10.**\
    \ `StartUp()` Function in `bootstrapper.go`\n\n```go\npackage common\n\nfunc StartUp()\
    \ {\n    // Initialize AppConfig variable\n    initConfig()\n    // Initialize\
    \ private/public keys for JWT authentication\n    initKeys()\n    // Start a MongoDB\
    \ session\n    createDbSession()\n    // Add indexes into MongoDB\n    addIndexes()\n\
    }\n```\n\n# Starting the HTTP Server\n\nThe HTTP server is created in `main.go`.\n\
    \nListing [9-11](#A978-1-4842-1052-9_9_Chapter.html#FPar12) provides the implementation\
    \ of `main.go`.\n\n**Listing 9-11.** Entry Point of the Program in `main.go`\n\
    \n```go\npackage main\n\nimport (\n    \"log\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
    \n    \"github.com/shijuvar/go-web/taskmanager/common\"\n    \"github.com/shijuvar/go-web/taskmanager/routers\"\
    \n)\n\n// Entry point of the program\nfunc main() {\n    // Calls startup logic\n\
    \    common.StartUp()\n    // Get the mux router object\n    router := routers.InitRoutes()\n\
    \    // Create a negroni instance\n    n := negroni.Classic()\n    n.UseHandler(router)\n\
    \    server := &http.Server{\n        Addr:    common.AppConfig.Server,\n    \
    \    Handler: n,\n    }\n    log.Println(\"Listening...\")\n    server.ListenAndServe()\n\
    }\n```\n\nThe HTTP server is created in `main.go`, in which the `StartUp()` function\
    \ of the `common` package is called to execute initialization logic for the RESTful\
    \ API application. The `InitRoutes()` function of the `routers` package is then\
    \ called to get the `*mux.Router`, which is used for creating the `Negroni` handler.\
    \ The `http.Server` object is created by providing the `Negroni` handler and finally\
    \ starting the HTTP server. The host URI of the HTTP server is read from `common.AppConfig`.\n\
    \n## Authentication\n\nHere is the authentication workflow defined in the application:\n\
    \n- Users register into the system by sending HTTP requests to the resource `\"\
    /users/register\"`.\n- Registered users can log in to the system by sending HTTP\
    \ requests to the resource `\"/users/login\"`.\n- The server validates the login\
    \ credential and generates a JWT as an access token for accessing the protected\
    \ resources of the RESTful API server.\n- Users can use the JWT to access the\
    \ protected resources of the RESTful API. Users must send this token as a bearer\
    \ token with the `\"Authorization\"` HTTP header.\n\nThe authentication workflow\
    \ is described in more detail in the following sections.\n\n### Generating and\
    \ Verifying JWT\n\nJWT is used to authorize HTTP requests to access RESTful API\
    \ resources. The third-party package `jwt-go` is used for working with JWT (refer\
    \ to [Chapter 7](#A978-1-4842-1052-9_7_Chapter.html)). The `auth.go` source file\
    \ in the `common` package provides the functionalities for generating JWT and\
    \ verifying the token using a middleware handler function. The third-party package\
    \ `jwt-go` is used for generating and verifying the JWT, and the private key is\
    \ used for signing the JWT. It will be invoked from the application handler for\
    \ the request `\"/users/login\"` if the login user is successfully authenticated\
    \ into the system.\n\nListing [9-12](#A978-1-4842-1052-9_9_Chapter.html#FPar13)\
    \ shows the helper functions for generating JWT and verifying it in a HTTP middleware\
    \ handler.\n\n**Listing 9-12.** Helper Functions for JWT Authentication in `auth.go`\n\
    \n```go\npackage common\n\nimport (\n    \"io/ioutil\"\n    \"log\"\n    \"net/http\"\
    \n    \"time\"\n    jwt \"github.com/dgrijalva/jwt-go\"\n)\n\n// using asymmetric\
    \ crypto/RSA keys\n// location of private/public key files\nconst (\n    // openssl\
    \ genrsa -out app.rsa 1024\n    privKeyPath = \"keys/app.rsa\"\n    // openssl\
    \ rsa -in app.rsa -pubout > app.rsa.pub\n    pubKeyPath  = \"keys/app.rsa.pub\"\
    \n)\n\n// Private key for signing and public key for verification\nvar (\n   \
    \ verifyKey, signKey []byte\n)\n\n// Read the key files before starting http handlers\n\
    func initKeys() {\n    var err error\n    signKey, err = ioutil.ReadFile(privKeyPath)\n\
    \    if err != nil {\n        log.Fatalf(\"[initKeys]: %s\\n\", err)\n    }\n\
    \    verifyKey, err = ioutil.ReadFile(pubKeyPath)\n    if err != nil {\n     \
    \   log.Fatalf(\"[initKeys]: %s\\n\", err)\n        panic(err)\n    }\n}\n\n//\
    \ Generate JWT token\nfunc GenerateJWT(name, role string) (string, error) {\n\
    \    // create a signer for rsa 256\n    t := jwt.New(jwt.GetSigningMethod(\"\
    RS256\"))\n    // set claims for JWT token\n    t.Claims[\"iss\"] = \"admin\"\n\
    \    t.Claims[\"UserInfo\"] = struct {\n        Name string\n        Role string\n\
    \    }{name, role}\n    // set the expire time for JWT token\n    t.Claims[\"\
    exp\"] = time.Now().Add(time.Minute * 20).Unix()\n    tokenString, err := t.SignedString(signKey)\n\
    \    if err != nil {\n        return \"\", err\n    }\n    return tokenString,\
    \ nil\n}\n\n// Middleware for validating JWT tokens\nfunc Authorize(w http.ResponseWriter,\
    \ r *http.Request, next http.HandlerFunc) {\n    // validate the token\n    token,\
    \ err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{}, error) {\n\
    \        // Verify the token with public key, which is the counter part of private\
    \ key\n        return verifyKey, nil\n    })\n    if err != nil {\n        switch\
    \ err.(type) {\n        case *jwt.ValidationError: // JWT validation error\n \
    \           vErr := err.(*jwt.ValidationError)\n            switch vErr.Errors\
    \ {\n            case jwt.ValidationErrorExpired: // JWT expired\n           \
    \     DisplayAppError(\n                    w,\n                    err,\n   \
    \                 \"Access Token is expired, get a new Token\",\n            \
    \        401,\n                )\n                return\n            default:\n\
    \                DisplayAppError(w,\n                    err,\n              \
    \      \"Error while parsing the Access Token!\",\n                    500,\n\
    \                )\n                return\n            }\n        default:\n\
    \            DisplayAppError(w,\n                err,\n                \"Error\
    \ while parsing Access Token!\",\n                500)\n            return\n \
    \       }\n    }\n    if token.Valid {\n        next(w, r)\n    } else {\n   \
    \     DisplayAppError(w,\n            err,\n            \"Invalid Access Token\"\
    ,\n            401,\n        )\n    }\n}\n```\n\n#### Generating JWT\n\nThe `GenerateJWT()`\
    \ function generates the JWT by using the private key. Various claims are set\
    \ onto the JWT, including expiration information for the token. The `go-jwt` package\
    \ is used for signing the encoded security token. The `GenerateJWT()` function\
    \ is invoked from the application handler for the request `\"/users/login\"` and\
    \ is called only if the login process is successful.\n\nWhen a user logs in to\
    \ the system, the server sends back a JSON response, as shown here:\n\n```json\n\
    {\"data\":\n    {\"user\":{\"id\":\"55b9f7e13f06221910000001\",\"firstname\":\"\
    Shiju\",\"lastname\":\"Varghese\",\"email\":\"shijuvar@gmail.com\"},\n    \"token\"\
    :\"eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VySW5mbyI6eyJOYW1lIjoic2hpanVAZ21haWwuY29tIiwiUm9sZSI6Im1lbWJlciJ9LCJleHAiOjE0MzgyNTI5MzgsImlzcyI6ImFkbWluIn0.WtdM55KE0cNlj5c2VYwtIUQS8L6UI_ViLiwe0wH_0cpDj0dKkMTMtZ6LSHoIxtZyt92z19WX5gQCi3z-7Mly4kPe5Yvp3IXuDNdgJvBkQvEd_xg0-Vx9bhm_ztf0Hb2CInsVgux49EIxgjFoinwdzrxmM9ZbY7msBYSKutcRKLU\"\
    }\n}\n```\n\nFrom the JSON response, users can take the JWT from the JSON field\
    \ `\"token\"`, which can be used for authorizing the HTTP requests to access protected\
    \ resources of the RESTful API.\n\nJWT has three parts, separated by a `.` (period):\n\
    - `Header`\n- `Payload`\n- `Signature`\n\nJWT is a JSON-based security encoding\
    \ that can be decoded to get JSON representation of these parts.\n\nFigure [9-5](#A978-1-4842-1052-9_9_Chapter.html#Fig5)\
    \ shows the decoded representation of the `Header` and `Payload` sections.\n\n\
    ![A978-1-4842-1052-9_9_Fig5_HTML.jpg](A978-1-4842-1052-9_9_Fig5_HTML.jpg)\n\n\
    **Figure 9-5.** Decoded JSON representation of JWT\n\nThe `Header` section contains\
    \ the algorithm used for generating the token, which is RS256, and the type, which\
    \ is JWT. `Payload` carries the JWT claims in which you can provide user information,\
    \ expiration, and other information about the JWT."
