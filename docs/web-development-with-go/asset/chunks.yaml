    `е…ідәҺжһ„е»әж Үеҝ—зҡ„жӣҙеӨҡдҝЎжҒҜпјҢиҜ·еҸӮи§Ғ 'go help build'гҖӮ`\n`е…ідәҺжҢҮе®ҡеҢ…зҡ„жӣҙеӨҡдҝЎжҒҜпјҢиҜ·еҸӮи§Ғ 'go help packages'гҖӮ`\n`еҸҰиҜ·еҸӮйҳ…пјҡgo\
    \ build, go get, go cleanгҖӮ`\n\n## ж јејҸеҢ– Go д»Јз Ғ\n\nGo е·Ҙе…·жҸҗдҫӣдәҶ `fmt` е‘Ҫд»ӨжқҘж јејҸеҢ– Go д»Јз ҒгҖӮеңЁе°Ҷжәҗж–Үд»¶жҸҗдәӨеҲ°зүҲжң¬жҺ§еҲ¶зі»з»ҹд№ӢеүҚпјҢж јејҸеҢ–\
    \ Go зЁӢеәҸжҳҜдёҖз§ҚиүҜеҘҪзҡ„е®һи·өгҖӮ`go fmt` е‘Ҫд»Өдјҡдёәжәҗд»Јз Ғеә”з”Ёйў„е®ҡд№үзҡ„ж ·ејҸд»Ҙж јејҸеҢ–жәҗж–Үд»¶пјҢд»ҺиҖҢзЎ®дҝқиҠұжӢ¬еҸ·зҡ„жӯЈзЎ®ж”ҫзҪ®пјҢзЎ®дҝқеҲ¶иЎЁз¬Ұе’Ңз©әж јзҡ„дҪҝз”Ёи§„иҢғпјҢе№¶жҢүеӯ—жҜҚйЎәеәҸеҜ№еҢ…еҜје…ҘиҝӣиЎҢжҺ’еәҸгҖӮ`go\
    \ fmt` е‘Ҫд»ӨеҸҜд»Ҙеә”з”ЁдәҺеҢ…зә§еҲ«жҲ–зү№е®ҡзҡ„жәҗж–Үд»¶гҖӮ\n\nеҲ—иЎЁ 2-8 еұ•зӨәдәҶеә”з”Ё `go fmt` д№ӢеүҚзҡ„ `import` еқ—гҖӮ\n\nеҲ—иЎЁ 2-8.\
    \ еә”з”Ё `go fmt` д№ӢеүҚзҡ„еҜје…ҘеҢ…еқ—\n\n```\nimport (\n    \"log\"\n    \"net/http\"\n    \"\
    encoding/json\"\n)\n```\n\nеҲ—иЎЁ 2-9 еұ•зӨәдәҶеә”з”Ё `go fmt` д№ӢеҗҺзҡ„ `import` еқ—пјҡ\n\nеҲ—иЎЁ 2-9. еә”з”Ё\
    \ `go fmt` д№ӢеҗҺзҡ„еҜје…ҘеҢ…еқ—\n\n```\nimport (\n    \"encoding/json\"\n    \"log\"\n    \"\
    net/http\"\n)\n```\n\nжү§иЎҢ `go fmt` е‘Ҫд»ӨеҗҺпјҢ`import` еҢ…еқ—дјҡжҢүеӯ—жҜҚйЎәеәҸйҮҚж–°жҺ’еҲ—гҖӮ\n\nжіЁж„Ҹ\n\nзј–еҶҷ `import`\
    \ еқ—зҡ„жғҜз”Ёж–№ејҸжҳҜд»ҘжҢүеӯ—жҜҚйЎәеәҸжҺ’еҲ—зҡ„ж ҮеҮҶеә“еҢ…ејҖеӨҙпјҢжҺҘзқҖжҳҜжҢүеӯ—жҜҚйЎәеәҸжҺ’еҲ—зҡ„иҮӘе®ҡд№үеҢ…пјҢе№¶еңЁж ҮеҮҶеә“еҢ…е’ҢиҮӘе®ҡд№үеҢ…д№Ӣй—ҙз•ҷдёҖдёӘз©әиЎҢгҖӮ\n\n## Go ж–ҮжЎЈ\n\nж–ҮжЎЈжҳҜдҪҝиҪҜд»¶жҳ“дәҺи®ҝй—®е’Ңз»ҙжҠӨзҡ„йҮҚиҰҒз»„жҲҗйғЁеҲҶгҖӮе®ғеҪ“з„¶еҝ…йЎ»еҶҷеҫ—жё…жҷ°еҮҶзЎ®пјҢеҗҢж—¶д№ҹеҝ…йЎ»жҳ“дәҺзј–еҶҷе’Ңз»ҙжҠӨгҖӮзҗҶжғіжғ…еҶөдёӢпјҢж–ҮжЎЈеә”дёҺд»Јз ҒиҖҰеҗҲпјҢиҝҷж ·е®ғе°ұиғҪйҡҸд»Јз ҒдёҖиө·жј”еҸҳгҖӮзЁӢеәҸе‘ҳи¶Ҡе®№жҳ“з”ҹжҲҗиүҜеҘҪзҡ„ж–ҮжЎЈпјҢеҜ№жүҖжңүдәәжқҘиҜҙжғ…еҶөе°ұи¶ҠеҘҪгҖӮ\n\
    \nGo жҸҗдҫӣдәҶ `godoc` е·Ҙе…·пјҢз”ЁдәҺжҸҗдҫӣ Go еҢ…зҡ„ж–ҮжЎЈгҖӮе®ғдјҡи§Јжһҗ Go жәҗд»Јз ҒпјҲеҢ…жӢ¬жіЁйҮҠпјүпјҢе№¶з”ҹжҲҗ HTML жҲ–зәҜж–Үжң¬ж јејҸзҡ„ж–ҮжЎЈгҖӮз®ҖиҖҢиЁҖд№ӢпјҢ`godoc`\
    \ е·Ҙе…·д»Һжәҗж–Үд»¶дёӯзҡ„жіЁйҮҠз”ҹжҲҗж–ҮжЎЈгҖӮеҰӮжһңдҪ жғід»Һе‘Ҫд»ӨжҸҗзӨәз¬Ұи®ҝй—®ж–ҮжЎЈпјҢиҜ·иҫ“е…Ҙпјҡ\n\n`godoc [еҢ…]`\n\nдҫӢеҰӮпјҢеҰӮжһңдҪ жғіиҺ·еҸ– `fmt` еҢ…зҡ„ж–ҮжЎЈпјҢиҜ·еңЁз»Ҳз«Ҝдёӯиҫ“е…Ҙд»ҘдёӢе‘Ҫд»Өпјҡ\n\
    \n`godoc fmt`\n\nиҜҘе‘Ҫд»Өдјҡе°Ҷ `fmt` еҢ…зҡ„ж–ҮжЎЈжҳҫзӨәеңЁз»Ҳз«ҜдёҠгҖӮ\n\n`godoc` е·Ҙе…·иҝҳжҸҗдҫӣеҸҜйҖҡиҝҮ Web з•ҢйқўжөҸи§Ҳзҡ„ж–ҮжЎЈгҖӮиҰҒйҖҡиҝҮеҹәдәҺ\
    \ Web зҡ„з•Ңйқўи®ҝй—®ж–ҮжЎЈпјҢиҜ·еҗҜеҠЁз”ұ `godoc` е·Ҙе…·жҸҗдҫӣзҡ„ Web жңҚеҠЎеҷЁгҖӮеңЁз»Ҳз«Ҝдёӯиҫ“е…Ҙд»ҘдёӢе‘Ҫд»Өпјҡ\n\n`godoc -http=:3000`\n\n\
    иҜҘе‘Ҫд»ӨдјҡеңЁз«ҜеҸЈ 3000 еҗҜеҠЁдёҖдёӘ Web жңҚеҠЎеҷЁпјҢдҪҝдҪ иғҪеӨҹеңЁ Web жөҸи§ҲеҷЁдёӯи®ҝй—®ж–ҮжЎЈгҖӮз„¶еҗҺпјҢдҪ еҸҜд»ҘиҪ»жқҫеҜјиҲӘеҲ°ж ҮеҮҶеә“е’Ң `GOPATH` дҪҚзҪ®зҡ„еҢ…ж–ҮжЎЈгҖӮеҸӮи§Ғеӣҫ\
    \ 2-1гҖӮ\n\n![A978-1-4842-1052-9_2_Fig1_HTML.jpg](img/A978-1-4842-1052-9_2_Fig1_HTML.jpg)\n\
    \nеӣҫ 2-1. д»Һ Web жөҸи§ҲеҷЁи®ҝй—® godoc ж–ҮжЎЈ\n\n## еӨ„зҗҶйӣҶеҗҲ\n\nеңЁеӨ„зҗҶе®һйҷ…еә”з”ЁзЁӢеәҸж—¶пјҢдҪ еҝ…йЎ»еҲ©з”ЁеӨҡз§Қж•°жҚ®з»“жһ„жқҘз®ЎзҗҶеә”з”Ёж•°жҚ®гҖӮеҪ“дҪ е°Ҷеә”з”Ёж•°жҚ®жҢҒд№…еҢ–еҲ°ж•°жҚ®еә“зі»з»ҹж—¶пјҢеҸҜиғҪдјҡдҪҝз”Ёдҝқеӯҳеә”з”Ёж•°жҚ®зҡ„ж•°жҚ®з»“жһ„еҜ№иұЎзҡ„еҖјгҖӮеҪ“д»Һж•°жҚ®еә“иҜ»еҸ–ж•°жҚ®ж—¶пјҢдҪ еҸҜиғҪйңҖиҰҒе°Ҷж•°жҚ®ж”ҫе…Ҙеҗ„з§ҚеҪўејҸзҡ„ж•°жҚ®з»“жһ„дёӯд»Ҙдҫӣе…¶д»–з”ЁйҖ”пјҢдҫӢеҰӮжёІжҹ“з”ЁжҲ·з•ҢйқўгҖӮйӣҶеҗҲжҳҜеҸҜд»Ҙе®№зәіж•°жҚ®з»“жһ„зҡ„йӣҶеҗҲзҡ„ж•°жҚ®з»“жһ„пјҢиҝҷдәӣж•°жҚ®з»“жһ„еҢ…жӢ¬еҶ…зҪ®зұ»еһӢе’Ңз”ЁжҲ·иҮӘе®ҡд№үзұ»еһӢгҖӮGo\
    \ жҸҗдҫӣдәҶдёүз§Қж•°жҚ®з»“жһ„жқҘз®ЎзҗҶж•°жҚ®йӣҶеҗҲпјҡж•°з»„гҖҒеҲҮзүҮе’Ңжҳ е°„гҖӮ\n"
- fmt: "# Arrays\n\nAn array is a fixed-length data type that contains the sequence\
    \ of elements of a single type. An array is declared by specifying the data type\
    \ and the length.\n\nListing [2-10](#A978-1-4842-1052-9_2_Chapter.html#FPar12)\
    \ is a code block that declares an array.\n\n**Listing 2-10.** Declaring an Integer\
    \ Array of Five Elements\n\n```\nvar x [5]int\n```\n\nAn array `x` is declared\
    \ for storing five elements of the `int` type, so the array `x` will be composed\
    \ of five integer elements.\n\nListing [2-11](#A978-1-4842-1052-9_2_Chapter.html#FPar13)\
    \ is an example program that declares an array and assigns values.\n\n**Listing\
    \ 2-11.** Declaring an Array and Assigning Values\n\n```\npackage main\n\nimport\
    \ (\n    \"fmt\"\n)\n\nfunc main() {\n    var x [5]int\n    x[0] = 10\n    x[1]\
    \ = 20\n    x[2] = 30\n    x[3] = 40\n    x[4] = 50\n    fmt.Println(x)\n}\n```\n\
    \nYou should see the following output:\n\n```\n[10 20 30 40 50]\n```\n\nYou can\
    \ use an array literal to declare and initialize arrays, as shown in Listing [2-12](#A978-1-4842-1052-9_2_Chapter.html#FPar14).\n\
    \n**Listing 2-12.** Initializing an Array with an Array Literal\n\n```\nx := [5]int{10,\
    \ 20, 30, 40, 50}\n```\n\nYou can also initialize an array with a multiline statement\
    \ (see Listing [2-13](#A978-1-4842-1052-9_2_Chapter.html#FPar15)).\n\n**Listing\
    \ 2-13.** Array Declaration with a Multiline Statement\n\n```\nx := [5]int{\n\
    \  10,\n  20,\n  30,\n  40,\n  50,\n}\n```\n\nNote that a comma has been added,\
    \ even after the last element, because Go requires it. Doing so enables usability\
    \ benefits such as being able to easily remove or comment one element from the\
    \ initialization block without removing a comment.\n\nWhen you declare arrays\
    \ using an array literal, you can use `...` instead of specifying the length.\
    \ The Go compiler can identify the length of the array, based on the elements\
    \ you have specified in the array declaration.\n\nListing [2-14](#A978-1-4842-1052-9_2_Chapter.html#FPar16)\
    \ is a code block that declares and initializes an array with `...`.\n\n**Listing\
    \ 2-14.** Initializing an Array with ...\n\n```\nx := [...]int{10, 20, 30, 40,\
    \ 50}\n```\n\nWhen arrays are initialized using an array literal, you can initialize\
    \ values for specific elements.\n\nListing [2-15](#A978-1-4842-1052-9_2_Chapter.html#FPar17)\
    \ is an example program that assigns values for a specific location.\n\n**Listing\
    \ 2-15.** Initializing Values for Specific Elements\n\n```\npackage main\n\nimport\
    \ \"fmt\"\n\nfunc main() {\n    x := [5]int{2: 10, 4: 40}\n    fmt.Println(x)\n\
    }\n```\n\nYou should see the following output:\n\n```\n[0 0 10 0 40]\n```\n\n\
    In Listing [2-15](#A978-1-4842-1052-9_2_Chapter.html#FPar17), a value of `10`\
    \ is assigned to the third element (index 2) and a value of `40` is assigned to\
    \ the fifth element (index 4).\n\n# Slices\n\nA slice is a data structure that\
    \ is very similar to an array, but has no specified length. It is an abstraction\
    \ built on top of an array type that provides a more convenient way of working\
    \ with collections. Unlike regular arrays, slices are dynamic arrays in which\
    \ the length of the slices can be changed at a later stage as data increases or\
    \ shrinks. Slices are very useful data structures when the number of elements\
    \ to be stored into a collection canвҖҷt be predicted.\n\nWhen you develop applications\
    \ in Go, you often see slices in the code. If you want to read a database table\
    \ and put data into a collection type, use slices instead of arrays because you\
    \ canвҖҷt predict the length of the collection. Slices provide a built-in function\
    \ called `append`, which can append elements to a slice quickly.\n\nListing [2-16](#A978-1-4842-1052-9_2_Chapter.html#FPar18)\
    \ is a code block that declares a nil slice.\n\n**Listing 2-16.** Declaring a\
    \ Nil Slice\n\n```\nvar x []int\n```\n\nA slice `x` is declared without specifying\
    \ the length. It will create a nil slice of integers with a length of zero. Because\
    \ slices are dynamic arrays, you can modify their length later on.\n\nThere are\
    \ several ways to create and initialize slices in Go: you can use the built-in\
    \ function `make` or a slice literal.\n\n## Creating a Slice with the `make` Function\n\
    \nWhen you declare a slice with the `make` function, you can explicitly specify\
    \ the length and capacity of a slice.\n\nListing [2-17](#A978-1-4842-1052-9_2_Chapter.html#FPar19)\
    \ is a code block that declares a slice with a length of 5 and a capacity of 10.\n\
    \n**Listing 2-17.** Specifying Length and Capacity in a Slice with the `make`\
    \ Function\n\n```\nx := make([]int, 5, 10)\n```\n\nIf the slice capacity is not\
    \ specified, the capacity is the same as the length.\n\nListing [2-18](#A978-1-4842-1052-9_2_Chapter.html#FPar20)\
    \ is a code block that declares a slice without specifying capacity.\n\n**Listing\
    \ 2-18.** Specifying Length in a Slice with the `make` Function\n\n```\nx := make([]int,\
    \ 5)\n```\n\n## Creating a Slice with Slice Literal\n\nOne common approach for\
    \ creating and initializing a slice is to use a slice literal, which doesnвҖҷt require\
    \ specifying length within the `[]` operator. The initial length and capacity\
    \ are taken from the number of elements that are initialized.\n\nListing [2-19](#A978-1-4842-1052-9_2_Chapter.html#FPar21)\
    \ is a code block that declares and initializes a slice by using a slice literal.\n\
    \n**Listing 2-19.** Initializing a Slice with a Slice Literal\n\n```\nx := []int{10,\
    \ 20, 30, 40, 50}\n```\n\nThis code creates and initializes a slice with a length\
    \ of 5 and a capacity of 5.\n\nWhen you create a slice with a slice literal, you\
    \ can also initialize a slice for a specific length without providing all the\
    \ elements, as shown in Listing [2-20](#A978-1-4842-1052-9_2_Chapter.html#FPar22).\n\
    \n**Listing 2-20.** A Slice Initializes for a Specific Length Without Providing\
    \ Elements\n\n```\nx := []int{4: 0}\n```\n\nThis code creates a slice with a length\
    \ of 5 and a capacity of 5. There is a zero value provided for the index `4`.\n\
    \nYou can create empty slices with a slice literal, as shown in Listing [2-21](#A978-1-4842-1052-9_2_Chapter.html#FPar23).\n\
    \n**Listing 2-21.** Creating an Empty Slice\n\n```\nx := []int{}\n```\n\nThis\
    \ code creates an empty slice with zero elements of value. Empty slices are useful\
    \ when you want to return empty collections from functions.\n\n## Slice Functions\n\
    \nGo provides two built-in functions to easily work with slices: `append` and\
    \ `copy`. The `append` function creates a new slice by taking an existing slice\
    \ and appending all the following elements into it.\n\nListing [2-22](#A978-1-4842-1052-9_2_Chapter.html#FPar24)\
    \ shows an example of `append`.\n\n**Listing 2-22.** Slice with the `append` Function\n\
    \n```\npackage main\n\nimport \"fmt\"\n\nfunc main() {\n    x := []int{10, 20,\
    \ 30}\n    y := append(x, 40, 50)\n    fmt.Println(x, y)\n}\n```\n\nYou should\
    \ see the following output:\n\n```\n[10 20 30] [10 20 30 40 50]\n```\n\nThe `copy`\
    \ function creates a new slice by copying elements from an existing slice into\
    \ another slice.\n\nListing [2-23](#A978-1-4842-1052-9_2_Chapter.html#FPar25)\
    \ shows an example of the `copy` function.\n\n**Listing 2-23.** Slice with the\
    \ `copy` Function\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main() {\n  \
    \  x := []int{10, 20, 30}\n    y := make([]int, 2)\n    copy(y, x)\n    fmt.Println(x,\
    \ y)\n}\n```\n\nYou should see the following output:\n\n```\n[10 20 30] [10 20]\n\
    ```\n\nAfter running this program, slice `x` has `[10, 20, 30]`, and slice `y`\
    \ has `[10, 20]`. Because the length of slice `y` is 2, it copies the first two\
    \ elements from slice `x`. If you specify the length of slice `y` as 3, it will\
    \ copy all three elements from slice `x`."
