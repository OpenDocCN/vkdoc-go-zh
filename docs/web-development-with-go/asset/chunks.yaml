    In this program, you want to pass the username into the next handler: the application
    handler. So you set the user value to the `context` object from the authorized
    middleware handler, which will be accessible in the HTTP request lifecycle. Here
    the value of the `context` object is accessed from the index application handler.


    By leveraging the Gorilla `context` package to share values between middleware
    handlers, or share values with middleware handlers and application handlers, you
    can build useful middleware handler functions to build real-world applications.


    ## Summary


    Using HTTP middleware is an important practical approach for building real-world
    applications in Go. Middleware is a pluggable and self-contained piece of code
    that wraps application handlers, which can be used for implementing shared behaviors
    into across-the-application handlers or into some specific application handlers.


    HTTP middleware allows you to build applications with pluggable logic that obtains
    a greater level of reusability maintainability. Using HTTP middleware, you can
    execute some logic before or after HTTP request handlers. Because HTTP middleware
    are pluggable components, you can add or remove them at any time.


    The `Alice` third-party package allows you to implement chaining of middleware
    handlers with an elegant syntax using its fluent interface. The `Negroni` third-party
    package is a great library for handling middleware functions, which also come
    with some default middleware functions. `Negroni` provides an idiomatic approach
    to using HTTP middleware in Go.


    When you build real-world applications, you may need to share values among various
    middleware handlers and application handlers. The third-party `context` package
    from the Gorilla web toolkit can be used for sharing values during a request lifetime.
    It is a great web development stack in Go to use `net/http` as the fundamental
    programming block for web development, `Negroni` as the handler for working with
    HTTP middleware, Gorilla `mux` as the router, and Gorilla `context` as the mechanism
    for sharing values during the request lifetime. With this web development stack,
    you donвҖҷt need a full-fledged web development framework.


    # 7.В Authentication to Web Apps


    Security is one of the most important factors to consider when building a successful
    web application or web API. If you canвҖҷt protect your applications from unauthorized
    access, the entire application wonвҖҷt make any sense, regardless of its functionality.
    You might have developed a brilliant user experience for your applications, but
    all your implementations will fail if you canвҖҷt secure your applications. Authentication
    and authorization enable applications to be protected from unauthorized access
    to their protected resources.


    This chapter shows you how to protect web-based systems using various authentication
    approaches. It focuses more on modern authentication approaches for securing applications,
    which are useful when you build web applications and mobile applications by using
    a web API as the server-side implementation.


    ## Authentication and Authorization


    Authentication is the process of identifying clients of applications and services
    that will gain access to protected resources. These clients will be end users
    or other applications and services. Typically, a database stores user credentials
    such as usernames and passwords, and end users enter valid usernames and passwords
    to gain access to applications.


    Authorization is the process of granting permission to do certain actions or access
    resources, which is permitted for authenticated clients. Authorization works with
    the authentication process, in which you can attach authorization roles with user
    credentials. When you store user credentials in a database, you can associate
    authorization roles and permissions along with the user information. When you
    build applications, you can differentiate access permissions by defining multiple
    authorization roles. For example, if you want to provide administrator functionalities
    to certain authenticated users, you can define an authorization role for administrator
    users along with the access permissions, so you can differentiate the access permissions
    from other authenticated users. Some applications may not have any authorization
    roles because all authenticated users will have the same privileges to the applications.


    A proper strategy for authentication and authorization is the most important factor
    when you design web applications. If you design your applications with proper
    authentication and authorization, you avoid lots of security challenges, which
    are very critical for a successful application.'
