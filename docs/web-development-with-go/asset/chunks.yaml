    templates/edit.html\", \"templates/base.html\"))\n}\n```\n\nFor each content page,\
    \ the appropriate content file is parsed along with `base.html`.\n\nListing [5-13](#A978-1-4842-1052-9_5_Chapter.html#FPar13)\
