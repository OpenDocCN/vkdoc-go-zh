    \ е‘Ҫд»ӨдјҡйҖ’еҪ’ең°д»Һд»“еә“дҪҚзҪ®иҺ·еҸ–иҜҘеҢ…еҸҠе…¶дҫқиө–еҢ…гҖӮдёҖж—ҰеҢ…иў«иҺ·еҸ–еҲ° `GOPATH` дёӯпјҢдҪ е°ұеҸҜд»Ҙд»ҺжүҖжңүдҪҚдәҺ `GOPATH` дҪҚзҪ®зҡ„зЁӢеәҸдёӯеҜје…Ҙе№¶йҮҚз”ЁиҝҷдәӣеҢ…гҖӮеңЁи®ёеӨҡе…¶д»–ејҖеҸ‘иҖ…з”ҹжҖҒзі»з»ҹдёӯпјҢдҪ йңҖиҰҒеңЁйЎ№зӣ®зә§еҲ«еҜје…ҘиҝҷдәӣеҢ…пјӣдҪ еҝ…йЎ»дёәжҜҸдёӘеҚ•зӢ¬зҡ„йЎ№зӣ®еҲҶеҲ«е®үиЈ…еҢ…гҖӮиҖҢеңЁ\
    \ Go дёӯеҜје…ҘеҢ…ж—¶пјҢдҪ е®һйҷ…дёҠжҳҜд»ҺдёҖдёӘе…¬е…ұдҪҚзҪ®еҜје…Ҙпјҡ`GOPATH/pkg` зӣ®еҪ•пјҢеӣ жӯӨдҪ еҸҜд»ҘдҪ“дјҡеҲ° Go и®ёеӨҡзү№жҖ§пјҲеҢ…жӢ¬еҢ…з”ҹжҖҒзі»з»ҹпјүзҡ„з®ҖжҙҒжҖ§е’Ңе®һз”ЁжҖ§гҖӮ\n\
    \n### зј–еҶҷеҢ…\n\nи®©жҲ‘д»¬зј–еҶҷдёҖдёӘзӨәдҫӢеҢ…пјҢд»Ҙдҫӣе…¶д»–зЁӢеәҸйҮҚз”ЁгҖӮеҲ—иЎЁ 2-6 жҳҜдёҖдёӘз®ҖеҚ•зҡ„еҢ…пјҢз”ЁдәҺдәӨжҚўеӯ—з¬Ұзҡ„еӨ§е°ҸеҶҷзҠ¶жҖҒгҖӮ\n\nеҲ—иЎЁ 2-6. еә“еҢ…\n\n\
    ```\npackage strcon\n\nimport (\n    \"bytes\"\n    \"unicode\"\n)\n\n// SwapCase\
    \ дәӨжҚўеӯ—з¬Ұзҡ„еӨ§е°ҸеҶҷзҠ¶жҖҒгҖӮ\nfunc SwapCase(str string) string {\n    buf := &bytes.Buffer{}\n\
    \    for _, r := range str {\n        if unicode.IsUpper(r) {\n            buf.WriteRune(unicode.ToLower(r))\n\
    \        } else {\n            buf.WriteRune(unicode.ToUpper(r))\n        }\n\
    \    }\n    return buf.String()\n}\n```\n\nиҜҘеҢ…еҗҚдёә `strcon`гҖӮжҸҗдҫӣеҢ…еҗҚзҡ„жғҜз”Ёж–№ејҸжҳҜдҪҝз”Ёз®ҖзҹӯгҖҒз®ҖеҚ•зҡ„е°ҸеҶҷеҗҚз§°пјҢдёҚиҰҒдҪҝз”ЁдёӢеҲ’зәҝжҲ–ж··еҗҲеӨ§е°ҸеҶҷеӯ—жҜҚгҖӮж ҮеҮҶеә“зҡ„еҢ…еҗҚжҳҜе‘ҪеҗҚеҢ…ж—¶еҫҲеҘҪзҡ„еҸӮиҖғгҖӮ\n\
    \nи®©жҲ‘д»¬жһ„е»әе№¶е®үиЈ… `strcon` еҢ…пјҢд»Ҙдҫҝе…¶д»–зЁӢеәҸдҪҝз”ЁгҖӮиҜҘеҢ…жҸҗдҫӣдәҶдёҖдёӘеҗҚдёә `SwapCase` зҡ„ж–№жі•пјҢз”ЁдәҺдәӨжҚўеӯ—з¬ҰдёІдёӯеӯ—з¬Ұзҡ„еӨ§е°ҸеҶҷзҠ¶жҖҒгҖӮе®ғйҮҚз”ЁдәҶж ҮеҮҶеә“дёӯзҡ„\
    \ `bytes` е’Ң `unicode` еҢ…жқҘе®һзҺ°еӯ—з¬ҰеӨ§е°ҸеҶҷзҡ„дәӨжҚўгҖӮз”ұдәҺ `SwapCase` ж–№жі•еҗҚд»ҘеӨ§еҶҷеӯ—жҜҚејҖеӨҙпјҢеҪ“жӯӨеҢ…иў«еј•з”Ёж—¶пјҢе®ғе°Ҷиў«еҜјеҮәз»ҷе…¶д»–зЁӢеәҸгҖӮ`SwapCase`\
    \ ж–№жі•йҒҚеҺҶдёҖдёӘеӯ—з¬ҰдёІе№¶ж”№еҸҳжҜҸдёӘеӯ—з¬Ұзҡ„еӨ§е°ҸеҶҷпјҡ\n\n```\nfor _, r := range str {\n    if unicode.IsUpper(r)\
    \ {\n        buf.WriteRune(unicode.ToLower(r))\n    } else {\n        buf.WriteRune(unicode.ToUpper(r))\n\
    \    }\n}\n```\n\nе…ій”®еӯ— `range` е…Ғи®ёдҪ йҒҚеҺҶж•°з»„е’ҢйӣҶеҗҲгҖӮйҖҡиҝҮйҒҚеҺҶеӯ—з¬ҰдёІеҖјпјҢдҪ еҸҜд»ҘжҸҗеҸ–жҜҸдёӘеӯ—з¬ҰдҪңдёәеҖје№¶дәӨжҚўе…¶еӨ§е°ҸеҶҷгҖӮеңЁ `range`\
    \ еқ—зҡ„е·Ұдҫ§пјҢдҪ еҸҜд»ҘжҸҗдҫӣдёӨдёӘеҸҳйҮҸжқҘиҺ·еҸ–йӣҶеҗҲдёӯжҜҸдёӘйЎ№зҡ„ `key` е’Ң `value`гҖӮеңЁжӯӨд»Јз Ғеқ—дёӯпјҢдҪҝз”ЁдәҶз”ЁдәҺиҺ·еҸ–еӯ—з¬ҰеҖјзҡ„ `value`пјҢдҪҶзЁӢеәҸдёӯжңӘдҪҝз”Ё\
    \ `key`гҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪ еҸҜд»ҘдҪҝз”Ёз©әзҷҪж ҮиҜҶз¬ҰпјҲ`_`пјүжқҘйҒҝе…Қзј–иҜ‘еҷЁй”ҷиҜҜгҖӮжҜҸеҪ“дҪ жғіиҰҒеҝҪз•Ҙе·Ұдҫ§зҡ„ `key` жҲ– `value` еҸҳйҮҸеЈ°жҳҺж—¶пјҢеңЁ `range`\
    \ дёӯдҪҝз”Ёз©әзҷҪж ҮиҜҶз¬ҰжҳҜдёҖз§Қеёёи§ҒеҒҡжі•гҖӮ\n\nеңЁеҢ…зӣ®еҪ•дҪҚзҪ®жү§иЎҢд»ҘдёӢе‘Ҫд»ӨпјҢжһ„е»әеҢ…е№¶е°Ҷе…¶е®үиЈ…еҲ° `GOPATH` зҡ„ `pkg` еӯҗзӣ®еҪ•дёӢпјҡ\n\n```\ngo\
    \ install\n```\n\nи®©жҲ‘д»¬зј–еҶҷдёҖдёӘзӨәдҫӢзЁӢеәҸжқҘйҮҚз”Ё `strcon` еҢ…зҡ„д»Јз ҒпјҲеҸӮи§ҒеҲ—иЎЁ 2-7пјүгҖӮ\n\nеҲ—иЎЁ 2-7. еңЁ main.go\
    \ дёӯйҮҚз”Ё strcon еҢ…\n\n```\npackage main\n\nimport (\n    \"fmt\"\n    \"strcon\"\n\
    )\n\nfunc main() {\n    s := strcon.SwapCase(\"Gopher\")\n    fmt.Println(\"иҪ¬жҚўеҗҺзҡ„еӯ—з¬ҰдёІжҳҜ:\"\
    , s)\n}\n```\n\nжҲ‘д»¬еҜје…Ҙ `strcon` еҢ…жқҘйҮҚз”Ёе…¶дёӯдәӨжҚўеӯ—з¬ҰдёІеӯ—з¬ҰеӨ§е°ҸеҶҷзҡ„д»Јз ҒгҖӮеңЁеҢ…зӣ®еҪ•зҡ„з»Ҳз«Ҝдёӯй”®е…Ҙд»ҘдёӢе‘Ҫд»ӨжқҘиҝҗиЎҢзЁӢеәҸпјҡ\n\n```\n\
    go run main.go\n```\n\nиҝҗиЎҢзЁӢеәҸеҗҺпјҢдҪ еә”иҜҘдјҡзңӢеҲ°д»ҘдёӢз»“жһңпјҡ\n\n```\ngOPHER\n```\n\nз”ұдәҺеҲ—иЎЁ 2-7 дёӯзҡ„зЁӢеәҸзј–еҶҷеңЁ\
    \ `main` еҢ…дёӢпјҢ`go build` е‘Ҫд»ӨдјҡеңЁеҢ…зӣ®еҪ•дёӯз”ҹжҲҗдёҖдёӘеҸҜжү§иЎҢдәҢиҝӣеҲ¶ж–Үд»¶гҖӮ`go install` е‘Ҫд»Өдјҡжһ„е»әеҢ…е№¶е°Ҷз”ҹжҲҗзҡ„дәҢиҝӣеҲ¶ж–Үд»¶е®үиЈ…еҲ° `GOPATH/bin`\
    \ еӯҗзӣ®еҪ•дёӯгҖӮ\n"
- fmt: "# Go Tool\n\nThe Go tool is a very important component of the Go ecosystem.\
    \ In the previous sections, you used the Go tool to build and run Go programs.\
    \ In the terminal, type the `go` command without any parameters to get documentation\
    \ on the commands provided by the Go tool.\n\nHere is the documentation on Go\
    \ commands:\n\n`Go is a tool for managing Go source code.`\n\n`Usage:`\n`go command\
    \ [arguments]`\n\n`The commands are:`\n`build       compile packages and dependencies`\n\
    `clean       remove object files`\n`doc         show documentation for package\
    \ or symbol`\n`env         print Go environment information`\n`fix         run\
    \ go tool fix on packages`\n`fmt         run gofmt on package sources`\n`generate\
    \    generate Go files by processing source`\n`get         download and install\
    \ packages and dependencies`\n`install     compile and install packages and dependencies`\n\
    `list        list packages`\n`run         compile and run Go program`\n`test \
    \       test packages`\n`tool        run specified go tool`\n`version     print\
    \ Go version`\n`vet         run go tool vet on packages`\n\n`Use \"go help [command]\"\
    \ for more information about a command.`\n\n`Additional help topics:`\n`c    \
    \       calling between Go and C`\n`buildmode   description of build modes`\n\
    `filetype    file types`\n`gopath      GOPATH environment variable`\n`environment\
    \ environment variables`\n`importpath  import path syntax`\n`packages    description\
    \ of package lists`\n`testflag    description of testing flags`\n`testfunc   \
    \ description of testing functions`\n\n`Use \"go help [topic]\" for more information\
    \ about that topic.`\n\nFor documentation on any specific command type:\n\n`go\
    \ help [command]`\n\nHere is the command for getting documentation for the `install`\
    \ command:\n\n`go help install`\n\nHere is the documentation for the `install`\
    \ command:\n\n`usage: go install [build flags] [packages]`\n`Install compiles\
    \ and installs the packages named by the import paths,`\n`along with their dependencies.`\n\
    `For more about the build flags, see вҖҷgo help buildвҖҷ.`\n`For more about specifying\
    \ packages, see вҖҷgo help packagesвҖҷ.`\n`See also: go build, go get, go clean.`\n\
    \n## Formatting Go Code\n\nThe Go tool provides the `fmt` command to format Go\
    \ code. It is a good practice to format Go programs before committing source files\
    \ into version control systems. The `go fmt` command applies predefined styles\
    \ to the source code for format source files, which ensures the right placement\
    \ of curly brackets, ensures the proper usage of tabs and spaces, and alphabetically\
    \ sorts package imports. The `go fmt` command can be applied at the package level\
    \ or on a specific source file.\n\nListing 2-8 shows the `import` block before\
    \ applying `go fmt`.\n\nListing 2-8. import Package Block Before go fmt\n\n```\n\
    import (\n    \"log\"\n    \"net/http\"\n    \"encoding/json\"\n)\n```\n\nListing\
    \ 2-9 shows the `import` block after applying `go fmt`:\n\nListing 2-9. import\
    \ Package Block After go fmt\n\n```\nimport (\n    \"encoding/json\"\n    \"log\"\
    \n    \"net/http\"\n)\n```\n\nThe `import` package block rearranges in an alphabetical\
    \ order after the `go fmt` command executes.\n\nNote\n\nThe idiomatic way of writing\
    \ the `import` block is to start with standard library packages in alphabetical\
    \ order and follow with custom packages in alphabetical order by using one line\
    \ space between standard library packages and custom packages.\n\n## Go Documentation\n\
    \nDocumentation is a huge part of making software accessible and maintainable.\
    \ It must be well-written and accurate, of course, but it must also be easy to\
    \ write and maintain. Ideally, the documentation should be coupled to the code\
    \ so it evolves along with the code. The easier it is for programmers to produce\
    \ good documentation, the better the situation for everyone.\n\nGo provides the\
    \ `godoc` tool, which provides documentation for Go packages. It parses Go source\
    \ code, including comments, and generates documentation as HTML or plain text.\
    \ In short, the `godoc` tool generates the documentation from the comments included\
    \ in the source files. If you want to access the documentation from the command\
    \ prompt, type:\n\n`godoc [package]`\n\nFor example, if you want to get documentation\
    \ for the `fmt` package, type the following command in the terminal:\n\n`godoc\
    \ fmt`\n\nThis command displays the `fmt` package documentation onto the terminal.\n\
    \nThe `godoc` tool also provides browsable documentation on a web interface. To\
    \ access the documentation through a web-based interface, start the web server\
    \ provided by the `godoc` tool. Type the following command in the terminal:\n\n\
    `godoc -http=:3000`\n\nThis command starts a web server at port 3000, which allows\
    \ you to access the documentation on the web browser. You can then easily navigate\
    \ to the package documentation from both the standard library and the `GOPATH`\
    \ location. See Figure 2-1.\n\n![A978-1-4842-1052-9_2_Fig1_HTML.jpg](A978-1-4842-1052-9_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1. Accessing godoc documentation from a web browser\n\n## Working with\
    \ Collections\n\nWhen you work with real-world applications, you have to leverage\
    \ various data structures to manage application data. When you persist application\
    \ data into database systems, you might be using the values of data structure\
    \ objects that hold the application data. When you read data from databases, you\
    \ might be putting the data into various forms of data structures for other uses,\
    \ such as rendering the user interface. Collections are the data structures that\
    \ can hold collections of data structures that include built-in and user-defined\
    \ types. Go provides three types of data structures to manage data collections:\
    \ arrays, slices, and maps."
