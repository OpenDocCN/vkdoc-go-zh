  raw: '## Working with Interfaces


    In GoвҖҷs type system, you can create concrete types and interface types. (Concrete
    types were discussed in previous sections of this chapter.) The interface is one
    of the greatest features of the Go language because it provides contracts to user-defined
    concrete types, which allows you to define behaviors for your objects. LetвҖҷs create
    an interface type to specify the behavior for `Person` objects (see Listing [3-15](#A978-1-4842-1052-9_3_Chapter.html#FPar16)).


    Listing 3-15.В В Defining the Interface Type


    `type User interface {`


    `PrintName()`


    `PrintDetails()`


    `}`


