    `func main() {`


    `http.ListenAndServe("localhost:8080", nil)`


    `}`


    The build constraint `!appengine` is used in the `main.go` file to be included
    when the Go tool application is built. When the application is built with the
    Go tool, the `main.go` file is taken as part of the `main` package. In the `main`
    function, the `ListenAndServe` function of the `http` package is called to start
    the HTTP server on the on-premise server. The blank identifier (`_`) is used as
    the alias name for the `hybridapplib` package to invoke its `init` function without
    referring the package identifier in the programs.


    When you run the application on the App Engine, you canвҖҷt use the `main` package.
    Listing [11-6](#A978-1-4842-1052-9_11_Chapter.html#FPar8) provides the implementation
    to build the application in the App Engine environment in which the `init` function
    of the `hybridapplib` package is invoked.


    Listing 11-6.В В appengine.go in the task Package


    `// +build appengine`


    `package task`


    `import (`


    `_ "github.com/shijuvar/go-web/chapter-11/hybridapplib"`


    `)`


    `func init() {`


    `}`


    The build constraint `appengine` is used in the `appengine.go` file to be included
    when the application is built with the App Engine SDK. The `appengine.go` file
    is taken as part of the `task` package. Because the HTTP handler code was implemented
    in the `hybridapplib` package, this source file is kept without having any implementation.


    When you build the application using the Go tool, the `main.go` source file is
    included for compiling Go packages, and the `appengine.go` source file is excluded
    from the compilation. When the application is built with the App Engine SDK, the
    HTTP server is run in the App Engine environment by taking the handler logic from
    the package `init` functions and is ignored by the `main.go` file.'
