    \ дёӯжҢҮе®ҡзҡ„еҢ…зүҲжң¬е®үиЈ…еҲ° `$GOPATH` дёӯпјҢд»ҺиҖҢдҝ®ж”№ `GOPATH` дҪҚзҪ®дёӯеҢ…зҡ„зҠ¶жҖҒгҖӮ\n\n---\n\n## дҪҝз”Ё Docker йғЁзҪІ HTTP\
    \ жңҚеҠЎеҷЁ\n\nдҪ е·Із»Ҹе®ҢжҲҗдәҶ TaskManager еә”з”ЁпјҢе№¶дҪҝз”Ё `godep` е·Ҙе…·жҸҗдҫӣдәҶдҫқиө–з®ЎзҗҶеҹәзЎҖи®ҫж–ҪгҖӮзҺ°еңЁжҳҜж—¶еҖҷжҸҗдҫӣйғЁзҪІеҹәзЎҖи®ҫж–ҪпјҢд»Ҙдҫҝе°Ҷ RESTful\
    \ API еә”з”ЁйғЁзҪІеҲ°з”ҹдә§жңҚеҠЎеҷЁдёҠдәҶгҖӮдҪ еҸҜд»ҘеңЁжң¬ең°жңҚеҠЎеҷЁе’Ңдә‘и®Ўз®—зҺҜеўғдёӯйғЁзҪІ HTTP жңҚеҠЎеҷЁгҖӮпјҲеңЁз¬¬ 11 з« дёӯпјҢдҪ е°ҶеӯҰд№ еҰӮдҪ•дҪҝз”Ё Google Cloud\
    \ Platform йғЁзҪІ Go жңҚеҠЎеҷЁгҖӮпјү\n\nLinux е®№еҷЁпјҲ[`https://linuxcontainers.org/`](https://linuxcontainers.org/)пјүжӯЈйҖҗжёҗжҲҗдёәйғЁзҪІе’ҢиҝҗиЎҢеә”з”Ёзҡ„йҰ–йҖүж–№ејҸпјҢж— и®әиҝҷдәӣеә”з”ЁжҳҜеңЁжң¬ең°жңҚеҠЎеҷЁиҝҳжҳҜдә‘и®Ўз®—е№іеҸ°дёҠиҝҗиЎҢгҖӮDocker\
    \ жҳҜдёҖйЎ№йқ©е‘ҪжҖ§зҡ„жҠҖжңҜпјҢе®ғеҲ©з”Ё Linux е®№еҷЁжқҘжһ„е»әгҖҒдәӨд»ҳе’ҢиҝҗиЎҢеә”з”ЁгҖӮдҪ еҸҜд»ҘдҪҝз”Ё Docker еңЁжң¬ең°жңҚеҠЎеҷЁе’Ңдә‘и®Ўз®—еҹәзЎҖи®ҫж–ҪдёӯиҝҗиЎҢеә”з”ЁгҖӮ\n\nеңЁжң¬иҠӮдёӯпјҢжҲ‘д»¬е°Ҷдёә\
    \ TaskManager еә”з”Ёзј–еҶҷдёҖдёӘ `Dockerfile`пјҢз”ЁдәҺдёҺ Docker й…ҚеҗҲпјҢе°Ҷеә”з”ЁйғЁзҪІеҲ°жң¬ең°жңҚеҠЎеҷЁе’Ңдә‘зҺҜеўғдёӯгҖӮ`Dockerfile`\
    \ жҳҜдёҖдёӘж–Үжң¬ж–ҮжЎЈпјҢз”ЁдәҺдҪҝз”Ё Docker жһ„е»әе’ҢиҝҗиЎҢеә”з”ЁгҖӮеңЁзј–еҶҷ `Dockerfile` д№ӢеүҚпјҢи®©жҲ‘д»¬е…Ҳз®ҖиҰҒи®Ёи®әдёҖдёӢ DockerгҖӮ\n\n### Docker\
    \ з®Җд»Ӣ\n"
- fmt: '# Docker: A Platform for Containerized Applications


    Docker is a platform for developers and SAs to develop, ship, and run applications
    in the container virtualization environment. An application container is a lightweight
    Linux environment that you can leverage to deploy and run an independently deployable
    unit of code. This chapter briefly discussed Microservice architecture, in which
    independently deployable service units are composed to build larger applications.
    A Docker container (application container) is a perfect fit for running a microservice
    in the Microservices architecture. Docker is not just a technology; it is an ecosystem
    that lets you quickly compose applications from components (analogous to a microservice
    in the Microservice architecture).


    In traditional computing environments, you develop applications for virtual machines
    (VMs), in which you target an idealized hardware environment, including the OS,
    network infrastructure layers, and so on. The greatest advantage of using an application
    container is that it separates applications from the infrastructure and from where
    it runs, enabling great opportunities for application developers. With Docker,
    developers can now develop applications against an idealized OS вҖ” a static Linux
    environment вҖ” and ship their applications as quickly as possible.


    Docker eliminates complexities and hurdles that can occur when applications are
    deployed and run. It also provides a great abstraction on the top of Linux container
    technology to easily work on container virtualization, which is becoming a big
    revolution in the IT industry, thanks to the Docker ecosystem.


    Docker was developed with the Go language, which is becoming a language of choice
    for building many innovative systems. On the container ecosystem, the majority
    of systems are being developed with Go. Kubernetes is an example of a technology
    developed with Go that is used for clustering application containers. You can
    also use Kubernetes to cluster Docker applications.


    Although Docker is a Linux technology, you can also run it in both Mac and Windows
    by using the Docker Toolbox (`www.docker.com/docker-toolbox`). To get more information
    about Docker, check out its documentation at `https://docs.docker.com/`.


    The Docker ecosystem consists of the following:


    *   **Docker Engine**: A lightweight, powerful, open source, container virtualization
    technology combined with a workflow for building and containerizing applications

    *   **Docker Hub**: An SaaS portal (`https://hub.docker.com/`) for sharing and
    managing application stacks known as Docker images.


    In Docker, images and containers are important concepts. A container is a вҖңstripped-to-basicsвҖқ
    version of a Linux OS in which an image is loaded. A container is created from
    an image, which is an immutable file that provides a snapshot of a container.
    You can make changes to an existing image, but you persist it as a new image.
    Images are created with the `docker build` command. When these images run using
    the `docker run` command, a container is produced. Images are stored in Docker
    registry systems such as Docker Hub (provided by Docker) and private registry
    systems.


    ## Writing Dockerfile


    In this chapter, the objective will be to create a Dockerfile to automate the
    build process of the TaskManager application to run on Dockerized containers.


    When you work with Docker, you create application containers by manually making
    changes into a base image or by building a Dockerfile, the text document that
    contains all instructions and commands to create a desired image automatically
    without manually running commands. A Dockerfile lets you automate your build to
    execute several command-line instructions. The `docker build` command builds an
    image from a Dockerfile and a build context.


    You create a Dockerfile by naming a text file as a `Dockerfile` without a file
    extension. Typically, you put this file onto the `root` directory of your project
    repository.


    Listing [9-23](#A978-1-4842-1052-9_9_Chapter.html#FPar25) provides a Dockerfile
    for the TaskManager application.


    **Listing 9-23.** Dockerfile for the TaskManager Application


    ```

    # golang image where workspace (GOPATH) configured at /go.

    FROM golang


    # Copy the local package files to the container''s workspace.

    ADD . /go/src/github.com/shijuvar/go-web/taskmanager


    # Setting up working directory

    WORKDIR /go/src/github.com/shijuvar/go-web/taskmanager


    # Get godeps for managing and restoring dependencies

    RUN go get github.com/tools/godep


    # Restore godep dependencies

    RUN godep restore


    # Build the taskmanager command inside the container.

    RUN go install github.com/shijuvar/go-web/taskmanager


    # Run the taskmanager command when the container starts.

    ENTRYPOINT /go/bin/taskmanager


    # Service listens on port 8080.

    EXPOSE 8080

    ```


    LetвҖҷs explore the commands used in the Dockerfile:


    *   The command `FROM golang` instructs Docker to start from an official `golang`
    Docker image, which is a Debian image with the latest version of Go installed,
    and a workspace (`GOPATH`) configured at `/go`.

    *   The `ADD` command copies the local code to the containerвҖҷs workspace.

    *   The `WORKDIR` command sets the working directory in the container.

    *   The `RUN` command runs commands within the container. Using the `RUN` command,
    the `godep` tool is installed.

    *   The `godep restore` command restores dependencies into a containerвҖҷs `GOPATH`
    location.

    *   The `taskmanager` command runs inside the containerвҖҷs `GOPATH/bin` location
    (`/go/bin`) using the `go install` command.

    *   The `ENTRYPOINT` command instructs Docker to run the `taskmanager` command
    from the `/go/bin` location when the container is started.

    *   The `EXPOSE` command instructs Docker that the container listens on the specified
    network ports at runtime. It exposes port 8080. The `EXPOSE` command doesnвҖҷt open
    up the ports of the container to the public. To do that, the publish flag (`--publish`)
    is used to open up the ports by mapping with external HTTP ports.


    The Dockerfile for building and running the TaskManager API server in an application
    container using Docker is complete. Now letвҖҷs build the image from the Dockerfile.
    Run the following command from the `root` directory of the TaskManager application:


    ```

    docker build -t taskmanager

    ```


    A local image is built by executing the instructions defined in the Dockerfile.
    The resulting image tags as `taskmanager`.


    An image named `taskmanager` (the resulting image from the Docker build) is created.
    Use the following to run a container from this image:


    ```

    docker run --publish 80:8080 --name taskmanager_api --rm taskmanager

    ```


    LetвҖҷs explore the flags used in the `docker run` command:


    *   The `--publish` flag instructs Docker to publish the containerвҖҷs exposed port
    8080 on the external port 80.

    *   The `--name` flag gives a name to the container created from the `taskmanager`
    image. The name `taskmanager_api` is given to the container.

    *   The `--rm` flag instructs Docker to remove the container image when the container
    exits. Otherwise, the container image will be there even after the container exits.


    The `docker run` command runs the container by exposing external port 80. You
    can access the server application by navigating to `http://localhost:80`.


    The Dockerfile for the TaskManager application provides everything for running
    the HTTP server inside an application container. When you move the TaskManager
    application into production environments with Docker, the pending action is the
    implementation on MongoDB into an application container. The TaskManager application
    uses MongoDB as the persistence store, so you have to run the MongoDB database
    in another container. You can use one container for running the HTTP server and
    another for running the MongoDB database.'
