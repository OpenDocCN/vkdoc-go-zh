    \ `int`гҖҒ`float64`гҖҒ`string` е’Ң `bool`гҖӮз¬¬ 2 з«  и®Ёи®әдәҶж•°з»„гҖҒеҲҮзүҮе’Ңжҳ е°„пјҢиҝҷдәӣжҳҜз”ұе…¶д»–зұ»еһӢпјҲеҢ…жӢ¬еҶ…зҪ®зұ»еһӢе’Ңз”ЁжҲ·е®ҡд№үзұ»еһӢпјүз»„жҲҗзҡ„еӨҚеҗҲзұ»еһӢгҖӮдҫӢеҰӮпјҢеӨҚеҗҲзұ»еһӢ\
