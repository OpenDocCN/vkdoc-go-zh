    \nеҰӮжһңжӮЁзҹҘйҒ“з»“жһ„дҪ“зұ»еһӢеӯ—ж®өзҡ„йЎәеәҸпјҢиҝҷжҳҜдёҖз§Қйқһеёёж–№дҫҝзҡ„еҲӣе»әз»“жһ„дҪ“зұ»еһӢе®һдҫӢзҡ„ж–№ејҸгҖӮжӮЁиҝҳеҸҜд»ҘдҪҝз”ЁеҚ•иЎҢиҜӯеҸҘеҲӣе»әз»“жһ„дҪ“е®һдҫӢгҖӮ\n\nжё…еҚ• 3-5 еұ•зӨәдәҶдёҖдёӘзӨәдҫӢпјҢйҖҡиҝҮдҪҝз”Ёз»“жһ„дҪ“еӯ—йқўйҮҸжҢҮе®ҡйғЁеҲҶеӯ—ж®өпјҢе№¶еңЁд№ӢеҗҺеҲҶй…Қе…¶дҪҷеӯ—ж®өжқҘеҲӣе»әз»“жһ„дҪ“е®һдҫӢгҖӮ\n\
    \n**жё…еҚ• 3-5. йҖҡиҝҮжҢҮе®ҡйғЁеҲҶеӯ—ж®өеҲӣе»әз»“жһ„дҪ“е®һдҫӢ**\n\n```\np:= Person { FirstName :\"Shiju\", LastName\
    \ : \"Varghese\" }\np.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)\n\
    p.Email= \"shiju@email.com\"\np.Location=\"Kochi\"\n```\n\n### еҗ‘з»“жһ„дҪ“зұ»еһӢж·»еҠ иЎҢдёә\n\n\
    `Go` зҡ„зұ»еһӢзі»з»ҹе…Ғи®ёжӮЁеҗ‘з»“жһ„дҪ“зұ»еһӢж·»еҠ иЎҢдёәгҖӮдёҺе…¶д»–йқўеҗ‘еҜ№иұЎиҜӯиЁҖзҡ„зұ»дёҖж ·пјҢ`Go` дёӯзҡ„з»“жһ„дҪ“е…Ғи®ёжӮЁе®ҡд№үеӯ—ж®өд»ҘеҸҠж“ҚдҪңгҖӮи®©жҲ‘д»¬еҗ‘ `Person` зұ»еһӢж·»еҠ еҮ дёӘиЎҢдёәпјҲеҸӮи§Ғжё…еҚ•\
    \ 3-6пјүгҖӮ\n\n**жё…еҚ• 3-6. еёҰжңүиЎҢдёәзҡ„з»“жһ„дҪ“зұ»еһӢ**\n\n```\ntype Person struct {\n    FirstName,\
    \ LastName string\n    Dob                 time.Time\n    Email, Location    \
    \ string\n}\n\n//дёҖдёӘдәәзү©ж–№жі•\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s\
    \ %s\\n\", p.FirstName, p.LastName)\n}\n\n//дёҖдёӘдәәзү©ж–№жі•\nfunc (p Person) PrintDetails()\
    \ {\n    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(),\
    \ p.Email, p.Location)\n}\n```\n\nе·Із»Ҹдёә `Person` зұ»еһӢж·»еҠ дәҶдёӨдёӘж–№жі•пјҡ`PrintName` е’Ң `PrintDetails`гҖӮ`Go`\
    \ дёӯзҡ„ж–№жі•жҳҜдёҖдёӘеёҰжңүжҺҘж”¶еҷЁзҡ„еҮҪж•°гҖӮе°Ҫз®Ўж–№жі•зңӢиө·жқҘеғҸжҷ®йҖҡеҮҪж•°пјҢдҪҶе®ғжңүдёҖдёӘжҺҘж”¶еҷЁгҖӮжӮЁеҸҜд»ҘеңЁ `func` е…ій”®еӯ—е’ҢеҮҪж•°еҗҚд№Ӣй—ҙжҢҮе®ҡж–№жі•жҺҘж”¶еҷЁгҖӮеңЁжё…еҚ• 3-6 дёӯпјҢ`Person`\
    \ з»“жһ„дҪ“дҪңдёәжҺҘж”¶еҷЁиў«ж·»еҠ еҲ°дәҶеҮҪж•° `PrintName` е’Ң `PrintDetails` дёӯгҖӮе®ҢжҲҗжӯӨж“ҚдҪңеҗҺпјҢеҮҪж•°е°ұйҷ„еҠ еҲ°дәҶ `Person` зұ»еһӢдёҠпјҢеҸҜд»ҘдҪңдёәж–№жі•жқҘи°ғз”ЁгҖӮиҝҷдҪҝеҫ—жӮЁеҸҜд»Ҙд»Һз»“жһ„дҪ“зұ»еһӢе®һдҫӢдёӯдҪҝз”ЁзӮ№пјҲ`.`пјүиҝҗз®—з¬ҰжқҘи°ғз”ЁиҝҷдәӣеҮҪж•°пјҢе°ұеғҸеңЁдј з»ҹйқўеҗ‘еҜ№иұЎиҜӯиЁҖдёӯи°ғз”Ёзұ»зҡ„е®һдҫӢж–№жі•дёҖж ·гҖӮ\n\
