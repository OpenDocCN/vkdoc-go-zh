- fmt: "# Type Composition\n\nGoвҖҷs design philosophy is to be a simple language while\
    \ focusing on real-world practices; it simply ignores many academic thoughts to\
    \ maintain it as a minimalistic language. You saw the simplicity of GoвҖҷs type\
    \ system in previous sections. The major decision about its type system is that\
    \ although it does not support inheritance, it supports composition through type\
    \ embedding. Go encourages you to use composition over inheritance.\n\n**Note**:\
    \ Composition is a design philosophy in which smaller components are combined\
    \ into larger components.\n\nThe `Person` type was defined in the previous section.\
    \ You can create bigger and more concrete types by embedding the `Person` type.\
    \ In Listing [3-11](#A978-1-4842-1052-9_3_Chapter.html#FPar12), two more types\
    \ are created by embedding the `Person` type.\n\nListing 3-11. Type Embedding\
    \ for Composition\n\n```\ntype Admin struct {\n    Person //type embedding for\
    \ composition\n    Roles  []string\n}\n\ntype Member struct {\n    Person //type\
    \ embedding for composition\n    Skills []string\n}\n```\n\nThe `Person` type\
    \ is embedded into `Admin` and `Member` types so that all `Person` fields and\
    \ methods will be available in these new types.\n\nLetвҖҷs create a sample program\
    \ to understand the functionality of type embedding (see Listing [3-12](#A978-1-4842-1052-9_3_Chapter.html#FPar13)).\n\
    \nListing 3-12. Example Program for Type Composition\n\n```\npackage main\n\n\
    import (\n    \"fmt\"\n    \"time\"\n)\n\ntype Person struct {\n    FirstName,\
    \ LastName string\n    Dob                 time.Time\n    Email, Location    \
    \ string\n}\n\n//A person method\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\
    \\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//A person method\nfunc (p Person)\
    \ PrintDetails() {\n    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location:\
    \ %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n}\n\ntype Admin struct {\n\
    \    Person //type embedding for composition\n    Roles  []string\n}\n\ntype Member\
    \ struct {\n    Person //type embedding for composition\n    Skills []string\n\
    }\n\nfunc main() {\n    alex := Admin{\n        Person{\n            \"Alex\"\
    ,\n            \"John\",\n            time.Date(1970, time.January, 10, 0, 0,\
    \ 0, 0, time.UTC),\n            \"alex@email.com\",\n            \"New York\"\
    },\n        []string{\"Manage Team\", \"Manage Tasks\"},\n    }\n\n    shiju :=\
    \ Member{\n        Person{\n            \"Shiju\",\n            \"Varghese\",\n\
    \            time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n     \
    \       \"shiju@email.com\",\n            \"Kochi\"},\n        []string{\"Go\"\
    , \"Docker\", \"Kubernetes\"},\n    }\n\n    //call methods for alex\n    alex.PrintName()\n\
    \    alex.PrintDetails()\n\n    //call methods for shiju\n    shiju.PrintName()\n\
    \    shiju.PrintDetails()\n}\n```\n\nA `Person` type was created with a few fields\
    \ and two methods. Two more types were then createdвҖ”`Admin` and `Member`вҖ”by embedding\
    \ the `Person` type. These new types have all the properties and methods provided\
    \ by the `Person` type. Instances of `Admin` and `Member` types can be created\
    \ by simply embedding the `Person` type, as shown here:\n\n```\nalex := Admin{\n\
    \    Person{\n        \"Alex\",\n        \"John\",\n        time.Date(1970, time.January,\
    \ 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\",\n        \"New York\"\
    },\n    []string{\"Manage Team\", \"Manage Tasks\"},\n}\n\nshiju := Member{\n\
    \    Person{\n        \"Shiju\",\n        \"Varghese\",\n        time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC),\n        \"shiju@email.com\",\n  \
    \      \"Kochi\"},\n    []string{\"Go\", \"Docker\", \"Kubernetes\"},\n}\n```\n\
    \nBecause all `Person` type methods are available to `Admin` and `Member` types,\
    \ you can call the methods as shown in the following code:\n\n```\n//call methods\
    \ for alex\nalex.PrintName()\nalex.PrintDetails()\n\n//call methods for shiju\n\
    shiju.PrintName()\nshiju.PrintDetails()\n```\n\nYou should see the following output:\n\
    \n```\nAlex John\n[Date of Birth: 1970-01-10 00:00:00 +0000 UTC, Email: alex@email.com,\
    \ Location: New York ]\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000\
    \ UTC, Email: shiju@email.com, Location: Kochi ]\n```\n\nType composition with\
    \ type embedding provides the practical benefits of using inheritance, coupled\
    \ with better maintainability.\n\n## Overriding Methods of Embedded Type\n\nIn\
    \ Listing [3-11](#A978-1-4842-1052-9_3_Chapter.html#FPar12), the `Person` type\
    \ was embedded into `Admin` and `Member` types and called the methods provided\
    \ by the `Person` type. Suppose that you want to override the `PrintDetails` method\
    \ in `Admin` and `Member` because these types have additional fields: `Roles`\
    \ and `Skills`. The methods of embedded types can be overridden, as shown in Listing\
    \ [3-13](#A978-1-4842-1052-9_3_Chapter.html#FPar14).\n\nListing 3-13. Overriding\
    \ the Embedded Type Method\n\n```\ntype Admin struct {\n    Person //type embedding\
    \ for composition\n    Roles  []string\n}\n\n//overrides PrintDetails\nfunc (a\
    \ Admin) PrintDetails() {\n    //Call person PrintDetails\n    a.Person.PrintDetails()\n\
    \    fmt.Println(\"Admin Roles:\")\n    for _, v := range a.Roles {\n        fmt.Println(v)\n\
    \    }\n}\n\ntype Member struct {\n    Person //type embedding for composition\n\
    \    Skills []string\n}\n\n//overrides PrintDetails\nfunc (m Member) PrintDetails()\
    \ {\n    //Call person PrintDetails\n    m.Person.PrintDetails()\n    fmt.Println(\"\
    Skills:\")\n    for _, v := range m.Skills {\n        fmt.Println(v)\n    }\n\
    }\n```\n\nThe `PrintDetails` method is overridden to include additional information\
    \ held by each type. When this method is overridden, you can call the `PrintDetails`\
    \ method of the embedded type to get basic information provided by the embedded\
    \ type and then provide additional information held by the types:\n\n```\nfunc\
    \ (m Member) PrintDetails() {\n    //Call person PrintDetails\n    m.Person.PrintDetails()\n\
    \    fmt.Println(\"Skills:\")\n    for _, v := range m.Skills {\n        fmt.Println(v)\n\
    \    }\n}\n```\n\nThe statement `m.Person.PrintDetails()` calls the `PrintDetails`\
    \ method of the `Person` type.\n\nLetвҖҷs run the modified program with the code\
    \ shown in Listing [3-14](#A978-1-4842-1052-9_3_Chapter.html#FPar15).\n\nListing\
    \ 3-14. Running the Program with Method Overriding\n\n```\nalex := Admin{\n  \
    \  Person{\n        \"Alex\",\n        \"John\",\n        time.Date(1970, time.January,\
    \ 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\",\n        \"New York\"\
    },\n    []string{\"Manage Team\", \"Manage Tasks\"},\n}\n\nshiju := Member{\n\
    \    Person{\n        \"Shiju\",\n        \"Varghese\",\n        time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC),\n        \"shiju@email.com\",\n  \
    \      \"Kochi\"},\n    []string{\"Go\", \"Docker\", \"Kubernetes\"},\n}\n\n//call\
    \ methods for alex\nalex.PrintName()\nalex.PrintDetails()\n\n//call methods for\
    \ shiju\nshiju.PrintName()\nshiju.PrintDetails()\n```\n\nYou should see the following\
    \ output:\n\n```\nAlex John\n[Date of Birth: 1970-01-10 00:00:00 +0000 UTC, Email:\
    \ alex@email.com, Location: New York ]\nAdmin Roles:\nManage Team\nManage Tasks\n\
    Shiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000 UTC, Email: shiju@email.com,\
    \ Location: Kochi ]\nSkills:\nGo\nDocker\nKubernetes\n```"
