    ## Authentication with JSON Web Token


    Section 7.2.2 discussed a token-based approach for authentication in which a bearer
    token is used to access the protected resources of a web server. JSON Web Token
    (JWT) is an open standard for generating and using bearer tokens for authentication
    between two parties. JWT is a compact, URL-safe way of representing claims to
    be transferred between two parties. The claims in a JWT are encoded as a JSON
    object that is digitally signed using JSON Web Signature (JWS). Like OAuth 2,
    JWT is an open standard for token-based authentication. (The pronunciation of
    JWT is the same as for the English word jot.)


    JWT is a signed JSON object that can be used as a bearer token in OAuth 2 for
    authentication. A JWT token is made of three parts, separated by a `.` (period).
    The first part is called the `Header`, which is a JSON object that has been base64url-encoded.
    The second part, called the `Claims`, is also a JSON object that contains the
    claims conveyed by the JWT. The last part, called the `Signature`, is verified
    with the information provided by the `Header`.


    Note


    The draft of the JWT specification is available here: [`http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html`](http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html)'
