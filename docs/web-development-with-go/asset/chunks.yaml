    \    w.Write(j)\n\n}\n```\n\nиҝҷйҮҢйҒҚеҺҶдәҶ `noteStore` жҳ е°„пјҢе№¶е°ҶиҝҷдәӣеҖјиҝҪеҠ еҲ°дёҖдёӘ `Note` еҲҮзүҮдёӯгҖӮйҖҡиҝҮдҪҝз”Ё `json`\
    \ еҢ…зҡ„ `Marshal` еҮҪж•°пјҢ`Note` еҲҮзүҮиў«зј–з Ғдёә JSONгҖӮ\n\n`ResponseWriter` з”ЁдәҺеҶҷе…Ҙе“Қеә”еӨҙе’Ңе“Қеә”дҪ“гҖӮжӯӨеӨ„дҪҝз”Ё `ResponseWriter`\
