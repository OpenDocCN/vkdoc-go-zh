    ## BDD Testing in Go


    The Go `testing` and `httptest` standard library packages provide a great foundation
    for writing automated unit tests. The advantage of these packages is that they
    provide many extensibility points, so you can easily use these packages with other
    custom packages.


    This section discusses two third-party packages: `Ginkgo` and `Gomega. Ginkgo`
    is a behavior-driven development (BDD) вҖ“ based testing framework that lets you
    write expressive tests in Go to specify application behaviors. If you are practicing
    BDD for your software development process, `Ginkgo` is a great choice of package.
    `Gomega` is a matcher library that is best paired with the `Ginkgo` package. Although
    `Gomega` is a preferred matching library for `Ginkgo`, it is designed to be matcher-agnostic.


    ### Behavior-Driven Development (BDD)


    BDD is a software development process that evolved from TDD and other agile practices.
    BDD is designed to make an effective software development practice for agile software
    delivery. It is an evolved practice from many agile practices (mainly from TDD).
    The term test in TDD has created confusion in the developer community for those
    who practice TDD in their software development process.


    Although TDD is a software development process and a design philosophy, many developers
    assumed that it was only about testing. But the idea of TDD was to design code
    by writing unit tests. ItвҖҷs all about designing and verifying the behavior of
    applications. BDD is an extension of TDD, with the emphasis on behavior instead
    of test. In BDD, you specify behaviors in automated tests and write code based
    on the behaviors.


    ### Behavior-Driven Development with Ginkgo


    You can easily adopt BDD-style testing if you have a basic understanding of automated
    tests. In BDD, the term behavior is used instead of test. LetвҖҷs take a look at
    how to write BDD-style testing using `Ginkgo` and its preferred matcher library
    `Gomega`.


