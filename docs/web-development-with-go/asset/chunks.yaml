    \tif err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
    \t}\n}\n```\n\nHTTP еӨ„зҗҶйҖ»иҫ‘иў«ж”ҫзҪ®еңЁ`handler.go`зҡ„`init`еҮҪж•°дёӯгҖӮ`handler.go`жәҗж–Үд»¶дёӯзҡ„д»Јз ҒеҜ№дәҺзӢ¬з«Ӣеә”з”Ёе’Ң\
    \ App Engine еә”з”ЁжҳҜйҖҡз”Ёзҡ„гҖӮ\n\nеҲ—иЎЁ 11-5 жҸҗдҫӣдәҶ`main`еҢ…дёӯзҡ„`main.go`жәҗж–Үд»¶пјҢиҜҘж–Үд»¶жҸҗдҫӣдәҶ`main`еҮҪж•°гҖӮе®ғз”ұ Go\
    \ е·Ҙе…·жһ„е»әгҖӮ\n\nеҲ—иЎЁ 11-5. main еҢ…дёӯзҡ„ main.go\n\n```\n// +build !appengine\n\npackage main\n\
    \nimport (\n\t\"net/http\"\n\t_ \"github.com/shijuvar/go-web/chapter-11/hybridapplib\"\
    \n)\n\nfunc main() {\n\thttp.ListenAndServe(\"localhost:8080\", nil)\n}\n```\n\
    \nеңЁ`main.go`ж–Үд»¶дёӯдҪҝз”ЁдәҶжһ„е»әзәҰжқҹ`!appengine`пјҢд»ҘдҫҝеңЁдҪҝз”Ё Go е·Ҙе…·жһ„е»әеә”з”Ёж—¶еҢ…еҗ«иҜҘж–Үд»¶гҖӮеҪ“дҪҝз”Ё Go е·Ҙе…·жһ„е»әеә”з”Ёж—¶пјҢ`main.go`ж–Үд»¶иў«и§Ҷдёә`main`еҢ…зҡ„дёҖйғЁеҲҶгҖӮеңЁ`main`еҮҪж•°дёӯпјҢи°ғз”ЁдәҶ`http`еҢ…зҡ„`ListenAndServe`еҮҪж•°жқҘеңЁжң¬ең°жңҚеҠЎеҷЁдёҠеҗҜеҠЁ\
    \ HTTP жңҚеҠЎеҷЁгҖӮз©әзҷҪж ҮиҜҶз¬ҰпјҲ`_`пјүиў«з”ЁдҪң`hybridapplib`еҢ…зҡ„еҲ«еҗҚпјҢд»ҘдҫҝеңЁдёҚеј•з”ЁзЁӢеәҸдёӯзҡ„еҢ…ж ҮиҜҶз¬Ұзҡ„жғ…еҶөдёӢи°ғз”Ёе…¶`init`еҮҪж•°гҖӮ\n\n\
    еҪ“жӮЁеңЁ App Engine дёҠиҝҗиЎҢеә”з”Ёж—¶пјҢдёҚиғҪдҪҝз”Ё`main`еҢ…гҖӮеҲ—иЎЁ 11-6 жҸҗдҫӣдәҶеңЁ App Engine зҺҜеўғдёӯжһ„е»әеә”з”Ёзҡ„е®һзҺ°пјҢе…¶дёӯи°ғз”ЁдәҶ`hybridapplib`еҢ…зҡ„`init`еҮҪж•°гҖӮ\n\
    \nеҲ—иЎЁ 11-6. task еҢ…дёӯзҡ„ appengine.go\n\n```\n// +build appengine\n\npackage task\n\
    \nimport (\n\t_ \"github.com/shijuvar/go-web/chapter-11/hybridapplib\"\n)\n\n\
    func init() {\n}\n```\n\nеңЁ`appengine.go`ж–Үд»¶дёӯдҪҝз”ЁдәҶжһ„е»әзәҰжқҹ`appengine`пјҢд»ҘдҫҝеңЁдҪҝз”Ё App Engine\
    \ SDK жһ„е»әеә”з”Ёж—¶еҢ…еҗ«иҜҘж–Үд»¶гҖӮ`appengine.go`ж–Үд»¶иў«и§Ҷдёә`task`еҢ…зҡ„дёҖйғЁеҲҶгҖӮз”ұдәҺ HTTP еӨ„зҗҶд»Јз Ғе·ІеңЁ`hybridapplib`еҢ…дёӯе®һзҺ°пјҢжӯӨжәҗж–Үд»¶дҝқжҢҒж— д»»дҪ•е®һзҺ°гҖӮ\n\
    \nеҪ“жӮЁдҪҝз”Ё Go е·Ҙе…·жһ„е»әеә”з”Ёж—¶пјҢ`main.go`жәҗж–Үд»¶дјҡиў«еҢ…еҗ«д»Ҙзј–иҜ‘ Go еҢ…пјҢиҖҢ`appengine.go`жәҗж–Үд»¶еҲҷдјҡиў«жҺ’йҷӨеңЁзј–иҜ‘д№ӢеӨ–гҖӮеҪ“дҪҝз”Ё App\
    \ Engine SDK жһ„е»әеә”з”Ёж—¶пјҢйҖҡиҝҮд»ҺеҢ…зҡ„`init`еҮҪж•°дёӯиҺ·еҸ–еӨ„зҗҶйҖ»иҫ‘пјҢHTTP жңҚеҠЎеҷЁеңЁ App Engine зҺҜеўғдёӯиҝҗиЎҢпјҢе№¶дё”`main.go`ж–Үд»¶дјҡиў«еҝҪз•ҘгҖӮ\n"
- fmt: 'This hybrid approach may not be useful when you develop App Engine applications
    with various Cloud services. For example, letвҖҷs say you want to use the Cloud
    `Datastore` service for your App Engine application. You can test the application
    on a local computer as the App Engine web development server simulates Datastore,
    but you canвҖҷt run this application in your on-premise environment.


    ## Working with Cloud Native Databases


    The App Engine, the platform as a service of the Google Cloud platform, allows
    you to build massively scalable web applications in which you donвҖҷt have to worry
    about setting up an IT infrastructure. As discussed in previous sections, Go developers
    can develop, test, and deploy web applications on the App Engine by using the
    App Engine SDK for Go, and these applications are available for autoscaling. When
    you develop scalable applications, persisting data in a scalable storage mechanism
    is very important for achieving scalability and availability.


    When you develop applications for the Google Cloud platform, you can use any kind
    of database. Chapters 8 and 9 discussed MongoDB, a NoSQL data store. You can set
    up a database like MongoDB, which can be used with web applications running on
    the Google Cloud platform. To use a database such as MongoDB on Google Cloud,
    you need to obtain a VM as a Google Compute Engine (GCE) service, which is an
    IaaS platform in the Google Cloud. Then you need to set up the database on the
    VM instance. It requires IaaS instances; managing and scaling these databases
    may require lot of manual interventions.


    Google Cloud provides different data stores as managed services that can be used
    with web applications without worrying about setting up and managing IaaS instances.
    So you donвҖҷt need Ops on your databases running on Cloud, giving you lots of operational
    agility for Google Cloud applications.


    In Google Cloud Platform, you can use the following databases for persisting structured
    data:


    *   Google Cloud SQL: A MySQL-compatible relational database available for Cloud
    scale.

    *   Google Cloud Datastore: A NoSQL data store that provides scalable storage.

    *   Google Cloud Bigtable: A NoSQL database that can scale to billions of rows
    and thousands of columns, allowing petabytes of data. It is an ideal data store
    for Big Data solutions.


    Google Cloud provides both NoSQL and relational databases. Google Cloud offers
    two options for NoSQL: Google Cloud Datastore and Google Cloud Bigtable. Both
    Datastore and Bigtable are designed to provide a massively scalable data store.


    Even though both are designed to be massively scalable, Bigtable is a better choice
    when you deal with terabytes of data. Bigtable is designed for HBase compatibility
    and is accessible through extensions to the HBase 1.0 API, so it is compatible
    with the Big Data ecosystem. In Big Data solutions, you can store the massive
    volume of data in Bigtable and analyze it with analytics tools on the Hadoop ecosystem.


    Cloud Datastore is built on the top of Bigtable. Datastore provides high availability
    with replication and data synchronization; Bigtable doesnвҖҷt replicate data and
    runs in a single datacenter region. Datastore provides support for ACID transactions
    and SQL-like queries using GQL, which is a SQL-like language for retrieving entities
    from Datastore. Cloud Datastore is a great data store choice for App Engine web
    applications.


    The following section describes how to use the Google Cloud Datastore with App
    Engine applications.


    ### Introduction to Google Cloud Datastore


    Google Cloud Datastore is a schema-less NoSQL data store that provides robust,
    scalable storage for applications. It has the following features:


    *   No planned downtime

    *   Atomic transactions

    *   High availability of reads and writes

    *   Strong consistency for reads and ancestor queries

    *   Eventual consistency for all other queries'
  raw: 'This hybrid approach may not be useful when you develop App Engine applications
    with various Cloud services. For example, letвҖҷs say you want to use the Cloud
    `Datastore` service for your App Engine application. You can test the application
    on a local computer as the App Engine web development server simulates Datastore,
    but you canвҖҷt run this application in your on-premise environment.


    ## Working with Cloud Native Databases


    The App Engine, the platform as a service of the Google Cloud platform, allows
    you to build massively scalable web applications in which you donвҖҷt have to worry
    about setting up an IT infrastructure. As discussed in previous sections, Go developers
    can develop, test, and deploy web applications on the App Engine by using the
    App Engine SDK for Go, and these applications are available for autoscaling. When
    you develop scalable applications, persisting data in a scalable storage mechanism
    is very important for achieving scalability and availability.


    When you develop applications for the Google Cloud platform, you can use any kind
    of database. [Chapters 8](#A978-1-4842-1052-9_8_Chapter.html) and [9](#A978-1-4842-1052-9_9_Chapter.html)
    discussed MongoDB, a NoSQL data store. You can set up a database like MongoDB,
    which can be used with web applications running on the Google Cloud platform.
    To use a database such as MongoDB on Google Cloud, you need to obtain a VM as
    a Google Compute Engine (GCE) service, which is an IaaS platform in the Google
    Cloud. Then you need to set up the database on the VM instance. It requires IaaS
    instances; managing and scaling these databases may require lot of manual interventions.


    Google Cloud provides different data stores as managed services that can be used
    with web applications without worrying about setting up and managing IaaS instances.
    So you donвҖҷt need Ops on your databases running on Cloud, giving you lots of operational
    agility for Google Cloud applications.


    In Google Cloud Platform, you can use the following databases for persisting structured
    data:


    *   Google Cloud SQL: A MySQL-compatible relational database available for Cloud
    scale.

    *   Google Cloud Datastore: A NoSQL data store that provides scalable storage.

    *   Google Cloud Bigtable: A NoSQL database that can scale to billions of rows
    and thousands of columns, allowing petabytes of data. It is an ideal data store
    for Big Data solutions.


    Google Cloud provides both NoSQL and relational databases. Google Cloud offers
    two options for NoSQL: Google Cloud Datastore and Google Cloud Bigtable. Both
    Datastore and Bigtable are designed to provide a massively scalable data store.


    Even though both are designed to be massively scalable, Bigtable is a better choice
    when you deal with terabytes of data. Bigtable is designed for HBase compatibility
    and is accessible through extensions to the HBase 1.0 API, so it is compatible
    with the Big Data ecosystem. In Big Data solutions, you can store the massive
    volume of data in Bigtable and analyze it with analytics tools on the Hadoop ecosystem.


    Cloud Datastore is built on the top of Bigtable. Datastore provides high availability
    with replication and data synchronization; [Bigtable](https://cloud.google.com/bigtable/)
    doesnвҖҷt replicate data and runs in a single datacenter region. Datastore provides
    support for ACID transactions and SQL-like queries using GQL, which is a SQL-like
    language for retrieving entities from Datastore. Cloud Datastore is a great data
    store choice for App Engine web applications.


    The following section describes how to use the Google Cloud Datastore with App
    Engine applications.


    ### Introduction to Google Cloud Datastore


    Google Cloud Datastore is a schema-less NoSQL data store that provides robust,
    scalable storage for applications. It has the following features:


    *   No planned downtime

    *   Atomic transactions

    *   High availability of reads and writes

    *   Strong consistency for reads and ancestor queries

    *   Eventual consistency for all other queries'
