- fmt: '### Logging


    The Logging service allows App Engine applications to collect and store logs.


    ### Task Queues


    The Task Queues service enables App Engine applications to perform work outside
    of user requests by using small discrete tasks that are executed later.


    ### Security Scanning


    The Security Scanning service scans applications for security vulnerabilities
    such as XSS attacks.


    ## Google App Engine for Go


    App Engine provides a Go runtime environment to run natively compiled Go code
    on the Cloud that allows you to build highly scalable web applications on the
    Google Cloud infrastructure. With App Engine, Go applications run in a secured
    "sandbox" environment that allows the App Engine environment to distribute web
    requests across multiple servers and scaling servers for on-demand scalability.
    When you develop applications in the sandbox environment of App Engine, you don''t
    need to provision servers or spend time managing infrastructure. App Engine provides
    a deployment tool that allows you to upload your Go applications into the Cloud.


    ## Go Development Environment


    You can develop, test, and deploy Go applications on App Engine using the App
    Engine SDK for Go, which provides the tools and APIs for developing, testing,
    and running applications on Google Cloud. The App Engine Go SDK includes a development
    web server that allows you to run an App Engine application on a local computer
    to test Go applications before uploading them into the Cloud.


    The development web server simulates many Cloud services in the development environment
    so that you can test App Engine applications on your local computer. This is very
    useful because you don''t need to deploy applications into the Cloud whenever
    you want to test an App Engine application during the development cycle. You can
    test your App Engine application locally, and whenever you want to deploy the
    application into the Cloud platformвҖҷs production environment, you can do so by
    using the tools provided by App Engine. The development server application simulates
    the App Engine environment, including a local version of the Google Accounts data
    store, and gives the ability to fetch URLs and send e-mail directly from a local
    computer using the App Engine APIs.


    The Go SDK uses a modified version of the development tools from the Python SDK
    and runs on Mac OS X, Linux, and Windows computers with Python 2.7. So you can
    download and install Python 2.7 for your platform from the Python web site. Most
    Mac OS X users already have Python 2.7 installed. To develop Go applications on
    App Engine, download and install the App Engine SDK for Go for your OS.


    `App Engine SDK for Go` provides a command-line tool named `goapp` that provides
    the following commands:


    - `goapp serve`: The command `goapp serve` runs Go applications on a local development
    server.

    - `goapp deploy`: The command `goapp deploy` is used to upload a Go application
    into the App Engine production environment.


    You can find the `goapp` tool in the `go_appengine` directory of the zip archive
    of `App Engine SDK for Go`. To invoke the `goapp` tool from a command line, add
    the `go_appengine` directory to the `PATH` environment variable. This command
    adds the `go_appengine` directory to the `PATH` environment variable:


    ```

    export PATH=$HOME/go_appengine:$PATH

    ```


    ## Building App Engine Applications


    Once you have set up `App Engine SDK for Go`, you can start developing web applications
    on the App Engine platform. Although App Engine applications are very similar
    to stand-alone Go web applications, there are some fundamental differences between
    them. The main difference is that the Go App Engine runtime provides a special
    `main` package, so you shouldn''t use the `main` package for your App Engine applications.
    Instead, you can put HTTP handler code in a package of your choice. The Go `http`
    standard library package has been slightly modified for the App Engine runtime
    environment for running App Engine applications in the `sandbox` environment.'
