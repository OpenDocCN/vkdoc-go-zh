- fmt: "### Writing a Logging Middleware\n\nLetвҖҷs write an HTTP middleware to log\
    \ all HTTP requests so that this behavior can be applied into multiple application\
    \ handlers.\n\nListing [6-4](#A978-1-4842-1052-9_6_Chapter.html#FPar4) is an example\
    \ of logging middleware.\n\n**Listing 6-4.** Logging Middleware\n\n```\npackage\
    \ main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"net/http\"\n\t\"time\"\n)\n\nfunc\
    \ loggingHandler(next http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w\
    \ http.ResponseWriter, r *http.Request) {\n\t\tstart := time.Now()\n\t\tlog.Printf(\"\
    Started %s %s\", r.Method, r.URL.Path)\n\t\tnext.ServeHTTP(w, r)\n\t\tlog.Printf(\"\
    Completed %s in %v\", r.URL.Path, time.Since(start))\n\t})\n}\n\nfunc index(w\
    \ http.ResponseWriter, r *http.Request) {\n\tlog.Println(\"Executing index handler\"\
    )\n\tfmt.Fprintf(w, \"Welcome!\")\n}\n\nfunc about(w http.ResponseWriter, r *http.Request)\
    \ {\n\tlog.Println(\"Executing about handler\")\n\tfmt.Fprintf(w, \"Go Middleware\"\
    )\n}\n\nfunc iconHandler(w http.ResponseWriter, r *http.Request) {\n}\n\nfunc\
    \ main() {\n\thttp.HandleFunc(\"/favicon.ico\", iconHandler)\n\tindexHandler :=\
    \ http.HandlerFunc(index)\n\taboutHandler := http.HandlerFunc(about)\n\thttp.Handle(\"\
    /\", loggingHandler(indexHandler))\n\thttp.Handle(\"/about\", loggingHandler(aboutHandler))\n\
    \tserver := &http.Server{\n\t\tAddr: \":8080\",\n\t}\n\tlog.Println(\"Listening...\"\
    )\n\tserver.ListenAndServe()\n}\n```\n\nRun this program and make a request to\
    \ `\"/\"` and `\"/about\"`. You should get a log output similar to this:\n\n```\n\
    2015/04/25 19:40:10 Started GET /\n2015/04/25 19:40:10 Executing index handler\n\
    2015/04/25 19:40:10 Completed / in 0\n2015/04/25 19:40:18 Started GET /about\n\
    2015/04/25 19:40:18 Executing about handler\n2015/04/25 19:40:18 Completed /about\
    \ in 1.0005ms\n```\n\nIn the previous program, `loggingHandler` is the HTTP middleware\
    \ that decorates into the application handlers for the `\"/\"` and `\"/about\"\
    ` routes. Middleware allows you to reuse the shared behavior functionality onto\
    \ multiple handlers. In the logging middleware handler, the log messages are written\
    \ before and after executing the application handler. The middleware function\
    \ logs the HTTP method and URL path of the requests before invoking the application\
    \ handler, and logs the time it takes to execute the application handler after\
    \ executing the application handler. By calling `next.ServeHTTP(w, r)`, the middleware\
    \ function can execute the application handler function:\n\n```\nfunc loggingHandler(next\
    \ http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter,\
    \ r *http.Request) {\n\t\tstart := time.Now()\n\t\tlog.Printf(\"Started %s %s\"\
    , r.Method, r.URL.Path)\n\t\tnext.ServeHTTP(w, r)\n\t\tlog.Printf(\"Completed\
    \ %s in %v\", r.URL.Path, time.Since(start))\n\t})\n}\n```\n\nThe application\
    \ handler functions are converted to the `HandlerFunc` func type and passed into\
    \ the logging middleware handler function:\n\n```\nindexHandler := http.HandlerFunc(index)\n\
    aboutHandler := http.HandlerFunc(about)\n\nhttp.Handle(\"/\", loggingHandler(indexHandler))\n\
    http.Handle(\"/about\", loggingHandler(aboutHandler))\n```\n\n### Controlling\
    \ the Flow of HTTP Middleware\n\nBecause HTTP middleware handler functions take\
    \ `http.Handler` as a function parameter and return an `http.Handler`, you can\
    \ easily chain with other middleware handlers and finally call the application\
    \ handler. It is important to understand the control flow of middleware handlers\
    \ when you chain with other middleware handlers. LetвҖҷs write a couple of middleware\
    \ handlers and wrap this into application handlers.\n\nListing [6-5](#A978-1-4842-1052-9_6_Chapter.html#FPar5)\
    \ illustrates the control flow of middleware handlers.\n\n**Listing 6-5.** Control\
    \ Flow of Middleware Handlers\n\n```\npackage main\n\nimport (\n\"fmt\"\n\"log\"\
    \n\"net/http\"\n)\n\nfunc middlewareFirst(next http.Handler) http.Handler {\n\
    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\nlog.Println(\"\
    MiddlewareFirst - Before Handler\")\nnext.ServeHTTP(w, r)\nlog.Println(\"MiddlewareFirst\
    \ - After Handler\")\n})\n}\n\nfunc middlewareSecond(next http.Handler) http.Handler\
    \ {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\
    log.Println(\"MiddlewareSecond - Before Handler\")\nif r.URL.Path == \"/message\"\
    \ {\nif r.URL.Query().Get(\"password\") == \"pass123\" {\nlog.Println(\"Authorized\
    \ to the system\")\nnext.ServeHTTP(w, r)\n} else {\nlog.Println(\"Failed to authorize\
    \ to the system\")\nreturn\n}\n} else {\nnext.ServeHTTP(w, r)\n}\nlog.Println(\"\
    MiddlewareSecond - After Handler\")\n})\n}\n\nfunc index(w http.ResponseWriter,\
    \ r *http.Request) {\nlog.Println(\"Executing index Handler\")\nfmt.Fprintf(w,\
    \ \"Welcome\")\n}\n\nfunc message(w http.ResponseWriter, r *http.Request) {\n\
    log.Println(\"Executing message Handler\")\nfmt.Fprintf(w, \"HTTP Middleware is\
    \ awesome\")\n}\n\nfunc iconHandler(w http.ResponseWriter, r *http.Request) {\n\
    }\n\nfunc main() {\nhttp.HandleFunc(\"/favicon.ico\", iconHandler)\nhttp.Handle(\"\
    /\", middlewareFirst(middlewareSecond(http.HandlerFunc(index))))\nhttp.Handle(\"\
    /message\", middlewareFirst(middlewareSecond(http.HandlerFunc(message))))\nserver\
    \ := &http.Server{\nAddr: \":8080\",\n}\nlog.Println(\"Listening...\")\nserver.ListenAndServe()\n\
    }\n```\n\nRun this program and make a request to `\"http://localhost:8080/\"`.\
    \ You should get the following output:\n\n- `2015/04/30 11:10:53 MiddlewareFirst\
    \ - Before Handler`\n- `2015/04/30 11:10:53 MiddlewareSecond - Before Handler`\n\
    - `2015/04/30 11:10:53 Executing index Handler`\n- `2015/04/30 11:10:53 MiddlewareSecond\
    \ - After Handler`\n- `2015/04/30 11:10:53 MiddlewareFirst - After Handler`\n\n\
    When you make a request for `\"http://localhost:8080/message\"` by providing the\
    \ wrong value for the querystring variable `password` (letвҖҷs say you provide `\"\
    http://localhost:8080/message?password=wrongpass\"`), you should get the following\
    \ output:\n\n- `2015/04/30 11:11:06 MiddlewareFirst - Before Handler`\n- `2015/04/30\
    \ 11:11:06 MiddlewareSecond - Before Handler`\n- `2015/04/30 11:11:06 Failed to\
    \ authorize to the system`\n- `2015/04/30 11:11:06 MiddlewareFirst - After Handler`\n\
    \nWhen you make a request for `\"http://localhost:8080/message\"` by providing\
    \ the correct value for the querystring variable `password` (`\"http://localhost:8080/message?password=pass123\"\
    `), you should get the following output:\n\n- `2015/04/30 11:11:35 MiddlewareFirst\
    \ - Before Handler`\n- `2015/04/30 11:11:35 MiddlewareSecond - Before Handler`\n\
    - `2015/04/30 11:11:35 Authorized to the system`\n- `2015/04/30 11:11:35 Executing\
    \ message Handler`\n- `2015/04/30 11:11:35 MiddlewareSecond - After Handler`\n\
    - `2015/04/30 11:11:35 MiddlewareFirst - After Handler`\n\nYou can easily understand\
    \ the control flow of middleware handlers by looking at the log messages generated\
    \ by the program. Here `middlewareFirst` and `middlewareSecond` are called as\
    \ the wrapper handlers; you can apply this into the application handler. In the\
    \ middleware function `middlewareSecond`, the value of the querystring variable\
    \ `password` is validated if the request URL path is `\"/message\"`."
