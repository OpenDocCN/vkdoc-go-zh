    В В В В `}`


    В В В В `err := tmpl.ExecuteTemplate(w, template, viewModel)`


    В В В В `if err != nil {`


    В В В В В В В В `http.Error(w, err.Error(), http.StatusInternalServerError)`


    В В В В `}`


    `}`


    Here the parameter `name` is used as the key for retrieving the template file
    from the map, while the parameter `template` is used for providing the template
    name when we execute the template. The `renderTemplate` function provides the
    type `interface{}` as the type for the data object, so you can pass any type as
    the data object for applying into the template. The type `interface{}` is known
    as an вҖңempty interfaceвҖқ that can hold values of any type. This type is very useful
    when you pass values to a function parameter when you donвҖҷt know the type that
    you pass at runtime or you want to provide values of any type.'
  trans: "\n### main еҮҪж•°\n\nжё…еҚ• 5-10 еұ•зӨәдәҶзЁӢеәҸзҡ„е…ҘеҸЈзӮ№пјҢе…¶дёӯй…ҚзҪ®дәҶ HTTP иҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁе№¶еҗҜеҠЁдәҶ HTTP жңҚеҠЎеҷЁгҖӮ\n\n\
    жё…еҚ• 5-10. `main.go` дёӯзҡ„зЁӢеәҸе…ҘеҸЈзӮ№\n\n```\n//зЁӢеәҸе…ҘеҸЈзӮ№\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n\
    \    fs := http.FileServer(http.Dir(\"public\"))\n    r.Handle(\"/public/\", fs)\n\
    \    r.HandleFunc(\"/\", getNotes)\n    r.HandleFunc(\"/notes/add\", addNote)\n\
    \    r.HandleFunc(\"/notes/save\", saveNote)\n    r.HandleFunc(\"/notes/edit/{id}\"\
    , editNote)\n    r.HandleFunc(\"/notes/update/{id}\", updateNote)\n    r.HandleFunc(\"\
    /notes/delete/{id}\", deleteNote)\n    server := &http.Server{\n        Addr:\
    \    \":8080\",\n        Handler: r,\n    }\n    log.Println(\"Listening...\"\
    )\n    server.ListenAndServe()\n}\n```\n\n### и§ҶеӣҫдёҺжЁЎжқҝе®ҡд№үж–Үд»¶\n\nиҜҘ Web еә”з”ЁжҸҗдҫӣд»ҘдёӢ HTML йЎөйқўпјҡ\n\
    \n-   `Index` йЎөйқўжҳҫзӨә `Note` еҜ№иұЎзҡ„еҲ—иЎЁгҖӮ\n-   `Add` йЎөйқўз”ЁдәҺеҲӣе»әж–°зҡ„ `Note`гҖӮ\n-   `Edit` йЎөйқўз”ЁдәҺзј–иҫ‘е·Іжңүзҡ„\
    \ `Note` еҜ№иұЎгҖӮ\n\nеҲӣе»әдәҶеӣӣдёӘжЁЎжқҝе®ҡд№үж–Үд»¶жқҘжёІжҹ“ HTML и§Ҷеӣҫпјҡ\n\n-   `index.html`пјҡз”ЁдәҺз”ҹжҲҗ `Index` йЎөйқўеҶ…е®№зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶гҖӮ\n\
    -   `add.html`пјҡз”ЁдәҺз”ҹжҲҗ `Add` йЎөйқўеҶ…е®№зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶гҖӮ\n-   `edit.html`пјҡз”ЁдәҺз”ҹжҲҗ `Edit` йЎөйқўеҶ…е®№зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶гҖӮ\n\
    -   `base.html`пјҡдёҖдёӘеөҢеҘ—зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶пјҢз”ЁдәҺз”ҹжҲҗ Web еә”з”Ёзҡ„жүҖжңүйЎөйқўгҖӮдҪ йңҖиҰҒжҸҗдҫӣеҗҲйҖӮзҡ„еҶ…е®№йЎөйқўжқҘжёІжҹ“жҜҸдёӘзҪ‘йЎөгҖӮ\n\nжё…еҚ• 5-11 жҳҜ\
    \ `base.html` зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶гҖӮ\n\nжё…еҚ• 5-11. `base.html` дёӯзҡ„жЁЎжқҝе®ҡд№ү\n\n```\n{{define \"base\"\
    }}\n<html>\n  <head>{{template \"head\" .}}</head>\n  <body>{{template \"body\"\
    \ .}}</body>\n</html>\n{{end}}\n```\n\nиҝҷйҮҢе®ҡд№үдәҶдёҖдёӘеҗҚдёә `base` зҡ„жЁЎжқҝпјҢе…¶дёӯеөҢе…ҘдәҶдёӨдёӘжЁЎжқҝгҖӮдёәдәҶжёІжҹ“зҪ‘йЎөпјҢжҜҸж¬ЎйғҪдјҡи°ғз”Ё\
    \ `base` жЁЎжқҝпјҢеҗҢж—¶д»ҺеҶ…е®№йЎөйқўжҸҗдҫӣеҗҚдёә `head` е’Ң `body` зҡ„жЁЎжқҝгҖӮдҫӢеҰӮпјҢеҪ“жёІжҹ“ `Index` йЎөйқўж—¶пјҢдјҡи§ЈжһҗжқҘиҮӘ `base.html`\
    \ е’Ң `index.html` зҡ„жЁЎжқҝе®ҡд№үж–Үд»¶пјҢз„¶еҗҺжү§иЎҢеңЁ `base.html` дёӯе®ҡд№үзҡ„еөҢеҘ—жЁЎжқҝ `base`пјҢе№¶д»Һ `index.html` дёӯиҺ·еҸ–\
    \ `head` е’Ң `body` зҡ„еҶ…е®№гҖӮ\n\n### еҲқе§ӢеҢ–и§ҶеӣҫжЁЎжқҝ\n\nжЁЎжқҝе®ҡд№үж–Үд»¶еҝ…йЎ»еңЁжЁЎжқҝжү§иЎҢд№ӢеүҚиҝӣиЎҢи§ЈжһҗгҖӮи§ЈжһҗжЁЎжқҝе®ҡд№үж–Үд»¶жҳҜдёҖж¬ЎжҖ§ж“ҚдҪңпјҢдёҚйңҖиҰҒжҜҸж¬Ўжү§иЎҢжЁЎжқҝж—¶йғҪи§Јжһҗиҝҷдәӣж–Үд»¶гҖӮиҝҷйҮҢи§ЈжһҗдәҶиҝҷдәӣж–Үд»¶пјҢе№¶е°Ҷе®ғд»¬ж”ҫе…ҘдёҖдёӘжҳ е°„дёӯпјҢе…¶дёӯжҜҸдёӘе…ғзҙ д»ЈиЎЁжёІжҹ“зү№е®ҡйЎөйқўзҡ„жЁЎжқҝж–Үд»¶гҖӮйңҖиҰҒз”ҹжҲҗдёүдёӘ\
    \ HTML йЎөйқўпјҢеӣ жӯӨжҳ е°„дёӯж”ҫе…ҘдәҶдёүдёӘе…ғзҙ гҖӮжЁЎжқҝе®ҡд№үж–Үд»¶еңЁ `init` еҮҪж•°дёӯи§ЈжһҗпјҢе№¶дҪҝз”Ё `Must` иҫ…еҠ©еҮҪж•°иҝӣиЎҢи§ЈжһҗгҖӮ`Must` жҳҜдёҖдёӘиҫ…еҠ©еҮҪж•°пјҢе®ғеҢ…иЈ…дәҶеҜ№иҝ”еӣһ\
    \ `(*Template, error)` зҡ„еҮҪж•°зҡ„и°ғз”ЁпјҢе№¶еңЁиҝ”еӣһйқһ `nil` й”ҷиҜҜж—¶и§ҰеҸ‘ `panic`гҖӮ\n\nжё…еҚ• 5-12 дҪҝз”Ё `Must`\
    \ иҫ…еҠ©еҮҪж•°и§ЈжһҗжЁЎжқҝж–Үд»¶е№¶е°Ҷе…¶ж”ҫе…Ҙжҳ е°„дёӯгҖӮ\n\nжё…еҚ• 5-12. еңЁ `main.go` зҡ„ `init` еҮҪж•°дёӯзј–иҜ‘и§ҶеӣҫжЁЎжқҝж–Үд»¶\n\n```\nvar\
    \ templates map[string]*template.Template\n\n//зј–иҜ‘и§ҶеӣҫжЁЎжқҝ\nfunc init() {\n    if templates\
    \ == nil {\n        templates = make(map[string]*template.Template)\n    }\n \
    \   templates[\"index\"] = template.Must(template.ParseFiles(\"templates/index.html\"\
    , \"templates/base.html\"))\n    templates[\"add\"] = template.Must(template.ParseFiles(\"\
    templates/add.html\", \"templates/base.html\"))\n    templates[\"edit\"] = template.Must(template.ParseFiles(\"\
    templates/edit.html\", \"templates/base.html\"))\n}\n```\n\nеҜ№дәҺжҜҸдёӘеҶ…е®№йЎөйқўпјҢзӣёеә”зҡ„еҶ…е®№ж–Үд»¶дјҡдёҺ\
    \ `base.html` дёҖиө·иў«и§ЈжһҗгҖӮ\n\nжё…еҚ• 5-13 жҳҜдёҖдёӘжёІжҹ“еҚ•дёӘзҪ‘йЎөзҡ„иҫ…еҠ©еҮҪж•°гҖӮ\n\nжё…еҚ• 5-13. еңЁ `main.go` дёӯжёІжҹ“жЁЎжқҝзҡ„иҫ…еҠ©еҮҪж•°\n\
    \n```\n//ж №жҚ®з»ҷе®ҡзҡ„еҗҚз§°гҖҒжЁЎжқҝе®ҡд№үе’Ңж•°жҚ®еҜ№иұЎжёІжҹ“жЁЎжқҝ\nfunc renderTemplate(w http.ResponseWriter, name\
    \ string, template string, viewModel interface{}) {\n    // зЎ®дҝқжЁЎжқҝеңЁжҳ е°„дёӯеӯҳеңЁгҖӮ\n    tmpl,\
    \ ok := templates[name]\n    if !ok {\n        http.Error(w, \"The template does\
    \ not exist.\", http.StatusInternalServerError)\n    }\n    err := tmpl.ExecuteTemplate(w,\
    \ template, viewModel)\n    if err != nil {\n        http.Error(w, err.Error(),\
    \ http.StatusInternalServerError)\n    }\n}\n```\n\nиҝҷйҮҢеҸӮж•° `name` з”ЁдҪңд»Һжҳ е°„дёӯжЈҖзҙўжЁЎжқҝж–Үд»¶зҡ„й”®пјҢиҖҢеҸӮж•°\
    \ `template` еҲҷз”ЁдәҺеңЁжү§иЎҢжЁЎжқҝж—¶жҸҗдҫӣжЁЎжқҝеҗҚз§°гҖӮ`renderTemplate` еҮҪж•°дҪҝз”Ё `interface{}` зұ»еһӢдҪңдёәж•°жҚ®еҜ№иұЎзҡ„зұ»еһӢпјҢеӣ жӯӨдҪ еҸҜд»Ҙдј йҖ’д»»дҪ•зұ»еһӢзҡ„ж•°жҚ®еҜ№иұЎд»Ҙеә”з”ЁеҲ°жЁЎжқҝдёӯгҖӮ`interface{}`\
    \ зұ»еһӢиў«з§°дёәвҖңз©әжҺҘеҸЈвҖқпјҢе®ғеҸҜд»Ҙе®№зәід»»дҪ•зұ»еһӢзҡ„еҖјгҖӮеҪ“дҪ иҝҗиЎҢж—¶дёҚзҹҘйҒ“дј йҖ’з»ҷеҮҪж•°еҸӮж•°зҡ„зұ»еһӢпјҢжҲ–иҖ…еёҢжңӣжҸҗдҫӣд»»ж„Ҹзұ»еһӢзҡ„еҖјж—¶пјҢиҝҷз§Қзұ»еһӢйқһеёёжңүз”ЁгҖӮ\n"
- fmt: "### Rendering the Index Page\n\nLetвҖҷs render the `Index` page to show the\
    \ list of `Note` objects. Listing [5-14](#A978-1-4842-1052-9_5_Chapter.html#FPar14)\
    \ is the template definition in `index.html`.\n\n**Listing 5-14.** Template Definition\
    \ in `index.html`\n\n```html\n{{define \"head\"}}<title>Index</title>{{end}}\n\
    \n{{define \"body\"}}\n<h1>Notes List</h1>\n<p>\n<a href=\"/notes/add\" >Add Note</a>\n\
    </p>\n<div>\n<table border=\"1\">\n    <tr>\n        <th>Title</th>\n        <th>Description</th>\n\
    \        <th>Created On</th>\n        <th>Actions</th>\n    </tr>\n    {{range\
    \ $key,$value := . }}\n    <tr>\n        <td> {{$value.Title}}</td>\n        <td>{{$value.Description}}</td>\n\
    \        <td>{{$value.CreatedOn}}</td>\n        <td>\n            <a href=\"/notes/edit/{{$key}}\"\
    \ >Edit</a> |\n            <a href=\"/notes/delete/{{$key}}\" >Delete</a>\n  \
    \      </td>\n    </tr>\n{{end}}\n</table>\n</div>\n{{end}}\n```\n\nNamed definitions\
    \ of two templates are defined: `head` and `body`. Both will be used by the `base`\
    \ template defined in `base.html`. When the `Index` page is executed, the map\
    \ object that contains the object of the `Note` struct in each element is passed.\
    \ The `range` action is used to iterate through the map object. In the `range`\
    \ action, two variables are declared for the key and value element that is referenced\
    \ inside the `range` action. A `range` action must be closed with an `end` action.\n\
    \nWhen users request the route `\"/\"`, the `Index` page is rendered by calling\
    \ the `getNotes` request handler in `main.go`. Listing [5-15](#A978-1-4842-1052-9_5_Chapter.html#FPar15)\
    \ shows the `getNotes` function.\n\n**Listing 5-15.** Handler Function for Route\
    \ `\"/\"` in `main.go`\n\n```go\nfunc getNotes(w http.ResponseWriter, r *http.Request)\
    \ {\n    renderTemplate(w, \"index\", \"base\", noteStore)\n}\n```\n\nIn the `getNotes`\
    \ handler function, the `renderTemplate` helper function is called for rendering\
    \ the `Index` page. To call `renderTemplate`, the `http.ResponseWriter` object\
    \ is provided as the `io.Writer`, the `index` for getting the parsed template\
    \ for executing the `Index` page, the `base` for specifying the template definition\
    \ to be executed, and the map object as the data object to apply to the template\
    \ definitions.\n\nWhen `templates[\"index\"]` is called, you get the compiled\
    \ template that was parsed by using the template definition files `index.html`\
    \ and `base.html`. The `base` template definition is finally executed from the\
    \ parsed template that is a nested template in which it takes the template definition\
    \ from `head` and `page` defined in the `index.html` file.\n\nFigure [5-2](#A978-1-4842-1052-9_5_Chapter.html#Fig2)\
    \ shows the `Index` page with the list of `Note` objects.\n\n![A978-1-4842-1052-9_5_Fig2_HTML.jpg](A978-1-4842-1052-9_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2.** Index page\n\nNote that Figure [5-2](#A978-1-4842-1052-9_5_Chapter.html#Fig2)\
    \ shows the final result of the application after implementing all handler functions\
    \ for the example web application. For the sake of the demo, a couple of values\
    \ were added into the `noteStore` object.\n\n### Rendering the Add Page\n\nThe\
    \ Add page is used to add new `Note` objects. `add.html` is used to provide contents\
    \ for the `head` and `body` sections (see Listing [5-16](#A978-1-4842-1052-9_5_Chapter.html#FPar16)).\n\
    \n**Listing 5-16.** Template Definitions in `add.html`\n\n```html\n{{define \"\
    head\"}}<title>Add Note</title>{{end}}\n\n{{define \"body\"}}\n<h1>Add Note</h1>\n\
    <form action=\"/notes/save\" method=\"post\">\n    <p>Title:<br> <input type=\"\
    text\" name=\"title\"></p>\n    <p>Description:<br> <textarea rows=\"4\" cols=\"\
    50\" name=\"description\"></textarea> </p>\n    <p><input type=\"submit\" value=\"\
    submit\"/> </p>\n</form>\n{{end}}\n```\n\nWhen the HTTP server gets the request\
    \ for the `\"/notes/add\"` route, it calls the `addNote` handler function (see\
    \ Listing [5-17](#A978-1-4842-1052-9_5_Chapter.html#FPar17)).\n\n**Listing 5-17.**\
    \ Handler Function for `\"/notes/add\"` in `main.go`\n\n```go\nfunc addNote(w\
    \ http.ResponseWriter, r *http.Request) {\n    renderTemplate(w, \"add\", \"base\"\
    , nil)\n}\n```\n\nThe `Add` page is used to add a new `Note` object when you donвҖҷt\
    \ need to provide any data object to the template definition. So `nil` is passed\
    \ as the data object. The string `\"add\"` is provided as the key of the map object\
    \ for getting the parsed template, which was parsed by using the template definition\
    \ files `add.html` and `base.html`, for rendering the Add page.\n\nFigure [5-3](#A978-1-4842-1052-9_5_Chapter.html#Fig3)\
    \ shows the Add page that provides the user interface for creating a new `Note`.\n\
    \n![A978-1-4842-1052-9_5_Fig3_HTML.jpg](A978-1-4842-1052-9_5_Fig3_HTML.jpg)\n\n\
    **Figure 5-3.** Add page\n\nWhen the user submits the HTML form, an HTTP `POST`\
    \ request is sent to the server for a URL `\"/notes/save\"` that will be handled\
    \ by the handler function shown in Listing [5-18](#A978-1-4842-1052-9_5_Chapter.html#FPar18).\n\
    \n**Listing 5-18.** Handler Function to Save a New Note Object in `main.go`\n\n\
    ```go\n//Handler for \"/notes/save\" for save a new item into the data store\n\
    func saveNote(w http.ResponseWriter, r *http.Request) {\n    r.ParseForm()\n \
    \   title := r.PostFormValue(\"title\")\n    desc := r.PostFormValue(\"description\"\
    )\n    note := Note{title, desc, time.Now()}\n    //increment the value of id\
    \ for generating key for the map\n    id++\n    //convert id value to string\n\
    \    k := strconv.Itoa(id)\n    noteStore[k] = note\n    http.Redirect(w, r, \"\
    /\", 302)\n}\n```\n\nThe `saveHandler` function parses the form values from the\
    \ `*http.Request` object by calling the `ParseForm` method; then form field values\
    \ are read by calling `PostFormValue(\"element_name\")`. In Listing [5-18](#A978-1-4842-1052-9_5_Chapter.html#FPar18),\
    \ the values are read from the HTML form elements `title` and `description`. The\
    \ value of `id` is incremented for generating a key for the `noteStore` map object,\
    \ and finally the newly added `Note` object is added into the `noteStore` map\
    \ object with the key that was generated. The request is redirected to `\"/\"\
    ` for redirecting to the `Index` page, in which the newly added data can be seen."
