    ### Testing with Server


    In the previous section, unit tests using the `ResponseRecorder` struct type were
    written, and this type is sufficient for testing HTTP responses. The `httptest`
    package also provides a `Server` struct type that allows you to create an HTTP
    server for performing end-to-end HTTP tests in which you can send HTTP requests
    to the server using an HTTP client. Listing [10-9](#A978-1-4842-1052-9_10_Chapter.html#FPar9)
    tested the behavior of HTTP responses without creating an HTTP server. Instead,
    an HTTP `request` and a `ResponseRecorder` object are sent into the multiplexer.
    With `httptest.Server`, an HTTP server can be created, and the behaviors can then
    be tested by sending requests from an HTTP client.


    LetвҖҷs write unit tests by using the `httptest.Server` type to test the example
    HTTP application written in Listing [10-8](#A978-1-4842-1052-9_10_Chapter.html#FPar8).
