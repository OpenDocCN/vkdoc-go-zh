    \ Engine, you can roll back to a previous version of using the administrative\
    \ console.\n- This Go program runs in the Go `runtime` environment with the API\
    \ version `go1`.\n- Every request to a URL whose path matches the regular expression\
    \ `/.*` (all URLs) should be handled by the Go program. The `_go_app` value is\
    \ recognized by the development web server and ignored by the production App Engine\
    \ servers.\n\n# Testing the Application in Development Server\n\nIn the previous\
    \ steps, an App Engine application and a configuration file were created. Now\
