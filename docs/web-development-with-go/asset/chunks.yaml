    #### Writing BDD-style Tests


    The HTTP API application has been refactored to be more testable so that you can
    easily write automated tests. Now letвҖҷs focus on writing tests based on BDD methodology.
    Like TDD, the user stories are defined and converted into test cases before the
    code is written. The primary objective of BDD is to define the behavior in more
    expressive way before the production code is written so that you can easily develop
    applications based on well-defined behavior. Because this book is not primarily
    focused on agile practices and BDD, the exact development process of BDD is not
    followed, but the focus is on how to write BDD-style tests using Go third-party
    libraries.


    The `Ginkgo` package, paired with its preferred matcher library `Gomega`, is used
    to specify the behavior in test cases.


    ##### Installing Ginkgo and Gomega


    To install `Ginkgo` and `Gomega`, run the following commands on the command-line
    window:


    `go get github.com/onsi/ginkgo/ginkgo`


    `go get github.com/onsi/gomega`


    The `Ginkgo` package also provides an executable program named `ginkgo`, which
    can be used for bootstrapping test suite files and running tests. When the `ginkgo`
    package is installed, it also installs the `ginkgo` executable under `$GOPATH/bin`.


    To work with `Ginkgo` and `Gomega`, you must add these packages to the import
    list:


    `import (`


    `"github.com/onsi/ginkgo"`


    `"github.com/onsi/gomega"`


    `)`


    ##### Bootstrapping a Suite


    To write tests with `Ginkgo` for a package, you must first create a test suite
    file by running the following command on the command-line window:


    `ginkgo bootstrap`


    LetвҖҷs navigate to the `lib` directory and then run the `ginkgo bootstrap` command.
    It generates a file named `lib_suite_test.go` that contains the code shown in
    Listing [10-14](#A978-1-4842-1052-9_10_Chapter.html#FPar14).


    Listing 10-14.В В Test Suite File lib_suite_test.go in the lib_test Package


    `package lib_test`


    `import (`


    `. "github.com/onsi/ginkgo"`


    `. "github.com/onsi/gomega"`


    `"testing"`


    `)`


    `func TestLib(t *testing.T) {`


    `RegisterFailHandler(Fail)`


    `RunSpecs(t, "Lib Suite")`


    `}`


    The generated source file will be put into a package named `lib_test`, which isolates
    the tests from the application code sitting on the `lib` package. Go allows you
    to directly put the `lib_test` package inside the `lib` package directory. You
    can also change the package name to `lib` for the test suite file and tests.'
