    ## Creating Hybrid Stand-alone/App Engine applications


    The fundamental differences between an App Engine application and a stand-alone
    application are very few. The App Engine environment provides a special `main`
    package, so you canвҖҷt use it for App Engine applications. You can write handler
    logic in `init` functions of the Go package of your choice for App Engine applications.
    When you develop stand-alone applications, you need to write the `main` package.


    It would be really helpful in some scenarios to write hybrid applications for
    both stand-alone and App Engine environments. LetвҖҷs say you want to write a Go
    web application that tests and deploys on both on-premise servers and Google Cloud.
    Writing a hybrid application to be running in both environments would be really
    helpful for testing and deploying applications in multiple environments without
    modifying the source code before each deployment scenario. You can develop a hybrid
    application for both stand-alone and App Engine environments by using build constraints.


    Note


    A build constraint, also known as a build tag, specifies conditions in which a
    file should be included in the package. A build constraint must appear near the
    top of the source files as a line comment that begins with `// +build`. Build
    constraints can appear in any kind of source file that is not restricted with
    Go source files.


    The App Engine SDK provides a new build constraint, `appengine`, that can be used
    to differentiate the source code in stand-alone and App Engine environments when
    compiling the source code. Using the `appengine` build constraint, you can exclude
    some source files during the build process based on the build environment. For
    example, when you build the application source using the App Engine SDK, you can
    ignore the source code written in the `main` package.


    If you want to build source files using the App Engine SDK to be ignored by the
    Go tool, add the following to the top of the source file:


    `// +build appengine`


    The following build constraint specifies that you want to build with the Go tool,
    so the source files will not be compiled in the App Engine SDK:


    `// +build !appengine`


    LetвҖҷs rewrite the web application from Listing [11-1](#A978-1-4842-1052-9_11_Chapter.html#FPar1)
    to make it a hybrid application for both App Engine and stand-alone environments.
    In this hybrid implementation, youвҖҷll create separate source files for handling
    the HTTP handler logic using build constraints for both App Engine and stand-alone
    applications and putting common logic in a shared library.


    Figure [11-10](#A978-1-4842-1052-9_11_Chapter.html#Fig10) illustrates the directory
    structure of the hybrid application.


    ![A978-1-4842-1052-9_11_Fig10_HTML.jpg](A978-1-4842-1052-9_11_Fig10_HTML.jpg)


    Figure 11-10.


    Directory structure of the hybrid app


