    ### е№¶еҸ‘жҳҜиҜӯиЁҖеұӮйқўзҡ„еҶ…зҪ®зү№жҖ§


    и®Ўз®—жңәзЎ¬д»¶е·ІеҸ‘еұ•еҲ°жӢҘжңүдј—еӨҡ CPU ж ёеҝғе’ҢжӣҙејәеӨ§зҡ„жҖ§иғҪпјҢдҪҶзҺ°д»Ји®Ўз®—жңәзҡ„жҪңеҠӣж— жі•йҖҡиҝҮеҪ“еүҚдҪҝз”Ёзҡ„зј–зЁӢиҜӯиЁҖе’Ңе·Ҙе…·жқҘе……еҲҶеҸ‘жҢҘгҖӮеҪ“з”ҹдә§зә§еә”з”ЁеңЁй«ҳжҖ§иғҪжңҚеҠЎеҷЁдёҠиҝҗиЎҢж—¶пјҢеҚідҪҝ
    CPU еҲ©з”ЁзҺҮеҫҲдҪҺпјҢд№ҹдјҡеҮәзҺ°жҖ§иғҪй—®йўҳгҖӮеңЁжҹҗдәӣзј–зЁӢзҺҜеўғдёӯпјҢиҷҪз„¶жҸҗдҫӣдәҶе№¶еҸ‘е’Ңе№¶иЎҢиғҪеҠӣд»Ҙе®һзҺ°жӣҙй«ҳзҡ„ж•ҲзҺҮе’ҢжҖ§иғҪпјҢдҪҶиҝҷдәӣзү№жҖ§йҖҡеёёд»ҘзӢ¬з«Ӣзҡ„еә“е’ҢжЎҶжһ¶еҪўејҸеӯҳеңЁпјҢиҖҢйқһиҜӯиЁҖеұӮйқўзҡ„еҶ…зҪ®зү№жҖ§пјҢиҝҷеўһеҠ дәҶзј–еҶҷе№¶еҸ‘еә”з”Ёзҡ„еӨҚжқӮжҖ§гҖӮ


    еңЁ Go иҜӯиЁҖдёӯпјҢе№¶еҸ‘жҳҜиҜӯиЁҖзҡ„еҶ…зҪ®еҠҹиғҪпјҢдё“дёәеңЁзҺ°д»Ји®Ўз®—жңәдёҠзј–еҶҷй«ҳжҖ§иғҪе№¶еҸ‘еә”з”ЁиҖҢи®ҫи®ЎгҖӮе№¶еҸ‘жҳҜ Go иҜӯиЁҖзҡ„зӢ¬зү№зү№жҖ§д№ӢдёҖпјҢиў«и®ӨдёәжҳҜе…¶дё»иҰҒзҡ„еҚ–зӮ№гҖӮGo зҡ„е№¶еҸ‘йҖҡиҝҮдёӨдёӘзӢ¬зү№зү№жҖ§е®һзҺ°пјҡgoroutine
    е’ҢйҖҡйҒ“гҖӮ`goroutine` жҳҜдёҖдёӘеҸҜд»ҘдёҺе…¶д»– goroutine е№¶еҸ‘жү§иЎҢзҡ„еҮҪж•°гҖӮе®ғжҳҜдёҖз§ҚиҪ»йҮҸзә§зҡ„жү§иЎҢзәҝзЁӢпјҢи®ёеӨҡ goroutine еҸҜд»ҘеңЁеҚ•дёӘзәҝзЁӢдёӯжү§иЎҢпјҢд»ҺиҖҢжҸҗеҚҮзЁӢеәҸзҡ„жҖ§иғҪе’Ңж•ҲзҺҮгҖӮ`goroutine`
    жңҖйҮҚиҰҒзҡ„зү№жҖ§жҳҜз”ұ Go иҝҗиЎҢж—¶з®ЎзҗҶе№¶жү§иЎҢгҖӮи®ёеӨҡзј–зЁӢиҜӯиЁҖйғҪж”ҜжҢҒзј–еҶҷе№¶еҸ‘зЁӢеәҸпјҢдҪҶе®ғд»¬д»…йҷҗдәҺе·Іжү§иЎҢзәҝзЁӢй—ҙзҡ„йҖҡдҝЎе’ҢеҗҢжӯҘгҖӮиҖҢдё”пјҢеӨ§еӨҡж•°зҺ°жңүиҜӯиЁҖйҖҡиҝҮжЎҶжһ¶жҸҗдҫӣеҜ№е№¶еҸ‘зҡ„ж”ҜжҢҒпјҢиҖҢйқһиҜӯиЁҖеҶ…зҪ®зү№жҖ§пјҢеӣ жӯӨдҪҝз”ЁиҝҷдәӣиҜӯиЁҖе®һзҺ°е№¶еҸ‘ж—¶дјҡеҸ—еҲ°йҷҗеҲ¶гҖӮ


    Go жҸҗдҫӣдәҶйҖҡйҒ“пјҢдҪҝ goroutine д№Ӣй—ҙиғҪеӨҹиҝӣиЎҢйҖҡдҝЎе№¶еҗҢжӯҘе…¶жү§иЎҢгҖӮйҖҡиҝҮйҖҡйҒ“пјҢдҪ еҸҜд»Ҙе°Ҷж•°жҚ®д»ҺдёҖдёӘ goroutine еҸ‘йҖҒеҲ°еҸҰдёҖдёӘгҖӮйҖҡйҒ“иҝҳжҸҗдҫӣдәҶжӣҙй«ҳеұӮж¬Ўзҡ„
    goroutine еҗҢжӯҘзә§еҲ«пјҢзЎ®дҝқдёӨдёӘ goroutine еңЁе·ІзҹҘзҠ¶жҖҒдёӢиҝҗиЎҢгҖӮе№¶еҸ‘жҳҜдҪҝз”Ё Go иҜӯиЁҖжһ„е»әжӣҙй«ҳж•ҲгҖҒжҖ§иғҪжӣҙеҚ“и¶Ҡзҡ„иҪҜд»¶зі»з»ҹзҡ„дё»иҰҒеҺҹеӣ гҖӮ


    ### Go зј–иҜ‘зЁӢеәҸйҖҹеәҰеҝ«


