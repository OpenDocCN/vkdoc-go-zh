    To install `Negroni`, run the following command in the terminal:


    `$ go get github.com/codegangsta/` `negroni`


    To work with the `Negroni` package, the `github.com/codegangsta/negroni` package
    must be added to the import list:


    `import "github.com/codegangsta/negroni"`


    Listing [6-8](#A978-1-4842-1052-9_6_Chapter.html#FPar8) is an example program
    using `Negroni`:


    Listing 6-8.В В Simple HTTP Server with Negroni


    `package main`


    `import (`


    В В В В `"fmt"`


    В В В В `"net/http"`


    В В В В `"github.com/codegangsta/negroni"`


    `)`


    `func index(w http.ResponseWriter, req *http.Request) {`


    В В В В `fmt.Fprintf(w, "Welcome!")`


    `}`


    `func main() {`


    В В В В `mux := http.NewServeMux()`


    В В В В `mux.HandleFunc("/", index)`


    В В В В `n := negroni.Classic()`


    В В В В `n.UseHandler(mux)`


    В В В В `n.Run(":8080")`


    `}`


    In this program, you donвҖҷt use your own middleware functions; you simply run an
    HTTP server with the `Negroni` default middleware functions. A `Negroni` instance
    is created by calling the `negroni.Classic` function.


    When a `Negroni` instance is created with the `Classic` function, it provides
    the following built-in middleware functions, which are useful for most web applications:


    *   `negroni.Recovery`: Panic recovery middleware

    *   `negroni.Logging`: Request/response logging middleware

    *   `negroni.Static`: Static file serving under the `"public"` directory


    `Negroni` instances can also be created by calling the `negroni.New` function,
    which returns a new `Negroni` instance without any middleware preconfigured:


    `n := negroni.New()`


    The `Run` method of a `Negroni` instance is a convenience function that runs the
    `Negroni` stack as an HTTP server. The address string takes the same format as
    `http.ListenAndServe`:


    `n.Run(":8080")`


    #### Routing with Negroni


    The `UseHandler` method of a `Negroni` instance allows you to provide your own
    `http.Handler` onto the middleware stack.


    Listing [6-9](#A978-1-4842-1052-9_6_Chapter.html#FPar9) is an example program
    that uses Gorilla `mux` as the request multiplexer with the `Negroni` package.


    Listing 6-9.В В Simple HTTP Server with Negroni and Gorilla mux


    `package main`


    `import (`


    В В В В `"fmt"`


    В В В В `"net/http"`


    В В В В `"github.com/codegangsta/negroni"`


    В В В В `"github.com/gorilla/mux"`


    `)`


    `func index(w http.ResponseWriter, req *http.Request) {`


    В В В В `fmt.Fprintf(w, "Welcome!")`


    `}`


    `func main() {`


    В В В В `router := mux.NewRouter()`


    В В В В `router.HandleFunc("/", index)`


    В В В В `n := negroni.Classic()`


    В В В В `n.UseHandler(router)`


    В В В В `n.Run(":8080")`


    `}`


    The Gorilla `Mux.Router` object is provided as the handler to be used with `Negroni`.
    You can provide any object of the `http.Handler` interface to the `UseHandler`
    method of the `Negroni` instance.


    #### Registering Middleware


    `Negroni` manages middleware flow through the `negroni.Handler` interface.


    Listing [6-10](#A978-1-4842-1052-9_6_Chapter.html#FPar10) shows the definition
    of the `negroni.Handler` interface:


    Listing 6-10.В В negroni.Handler Interface


    `type Handler interface {`


    В В `ServeHTTP(rw http.ResponseWriter, r *http.Request, next http.HandlerFunc)`


    `}`


    Listing [6-11](#A978-1-4842-1052-9_6_Chapter.html#FPar11) provides the pattern
    for writing middleware handler functions for `Negroni` to work with the `negroni.Handler`
    interface.


    Listing 6-11.В В negroni.Handler Interface


    `func myMiddleware(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)
    {`


    В В `// logic before executing the next handler`


    В В `next(w, r)`


    В В `// logic after running next the handler`


    `}`


    The function signature of a `Negroni`-compatible middleware function is different
    from the functions written in the previous sections. The Negroni middleware stack
    uses the following signature to write middleware functions:


    `func myMiddleware(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)`


    Here you can call the next handler in the middleware stack by invoking the `http.HandlerFunc`
    object by passing the values of the `http.ResponseWriter` object and the `*http.Request`
    object:


    `// logic before executing the next handler`


    В В `next(w, r)`


    В В `// logic after running next the handler`


    You can map the middleware function to the `Negroni` handler chain with the `Use`
    function, which takes an argument of `negroni.Handler` . The `Use` function adds
    a `negroni.Handler` into the middleware stack (see Listing [6-12](#A978-1-4842-1052-9_6_Chapter.html#FPar12)).
    Handlers are invoked in the order in which they are added to a `Negroni` instance.


    Listing 6-12.В В Registering a Middleware Function with Negroni


    `n := negroni.New()`


    `n.Use(negroni.HandlerFunc(myMiddleware))`


    The middleware function is converted into a `negroni.HandlerFunc` type and added
    to the `Negroni` middleware stack. `HandlerFunc` is an adapter that allows ordinary
    functions to be used as `Negroni` handlers.


    #### Registering Middleware for Specific Routes


    When middleware functions such as logging are used, they might be decorated with
    across-the-application handlers. But you may need to use middleware functions
    for some specific routes; for example, you might want to apply some middleware
    functions to be executed with some specific application handlers that will be
    accessible to an administrator user account. In this context, you can create a
    new `Negroni` instance and use it as your route handler.


    Listing [6-13](#A978-1-4842-1052-9_6_Chapter.html#FPar13) is the code block that
    applies middleware functions to be used with some specific routes.


    Listing 6-13.В В Registering Middleware Handlers for Specific Routes


    `router := mux.NewRouter()`


    `adminRoutes := mux.NewRouter()`


    `// add admin routes here`


    `// Create a new negroni for the admin middleware`


    `router.Handle("/admin",` `negroni.New` `(`


    В В `Middleware1,`


    В В `Middleware2,`


    В В `negroni.Wrap(adminRoutes),`


    `))`'
