    Python зҪ‘з«ҷдёӢиҪҪе№¶е®үиЈ…йҖӮз”ЁдәҺжӮЁе№іеҸ°зҡ„ Python 2.7гҖӮеӨ§еӨҡж•° Mac OS X з”ЁжҲ·е·Із»Ҹе®үиЈ…дәҶ Python 2.7гҖӮиҰҒеңЁ App Engine
    дёҠејҖеҸ‘ Go еә”з”ЁзЁӢеәҸпјҢиҜ·дёӢиҪҪе№¶е®үиЈ…йҖӮз”ЁдәҺжӮЁж“ҚдҪңзі»з»ҹзҡ„ App Engine Go SDKгҖӮ


    `App Engine SDK for Go` жҸҗдҫӣдәҶдёҖдёӘеҗҚдёә `goapp` зҡ„е‘Ҫд»ӨиЎҢе·Ҙе…·пјҢиҜҘе·Ҙе…·жҸҗдҫӣд»ҘдёӢе‘Ҫд»Өпјҡ


    - `goapp serve`пјҡ`goapp serve` е‘Ҫд»ӨеңЁжң¬ең°ејҖеҸ‘жңҚеҠЎеҷЁдёҠиҝҗиЎҢ Go еә”з”ЁзЁӢеәҸгҖӮ

    - `goapp deploy`пјҡ`goapp deploy` е‘Ҫд»Өз”ЁдәҺе°Ҷ Go еә”з”ЁзЁӢеәҸдёҠдј еҲ° App Engine з”ҹдә§зҺҜеўғгҖӮ


    жӮЁеҸҜд»ҘеңЁ `App Engine SDK for Go` зҡ„ zip еҺӢзј©еҢ…дёӯзҡ„ `go_appengine` зӣ®еҪ•дёӢжүҫеҲ° `goapp` е·Ҙе…·гҖӮиҰҒд»Һе‘Ҫд»ӨиЎҢи°ғз”Ё
    `goapp` е·Ҙе…·пјҢиҜ·е°Ҷ `go_appengine` зӣ®еҪ•ж·»еҠ еҲ° `PATH` зҺҜеўғеҸҳйҮҸдёӯгҖӮд»ҘдёӢе‘Ҫд»Өе°Ҷ `go_appengine` зӣ®еҪ•ж·»еҠ еҲ° `PATH`
    зҺҜеўғеҸҳйҮҸдёӯпјҡ


    ```

    export PATH=$HOME/go_appengine:$PATH

    ```


    ## жһ„е»ә App Engine еә”з”ЁзЁӢеәҸ


    дёҖж—Ұи®ҫзҪ®еҘҪ `App Engine SDK for Go`пјҢжӮЁе°ұеҸҜд»ҘејҖе§ӢеңЁ App Engine е№іеҸ°дёҠејҖеҸ‘ Web еә”з”ЁзЁӢеәҸдәҶгҖӮе°Ҫз®Ў App Engine
