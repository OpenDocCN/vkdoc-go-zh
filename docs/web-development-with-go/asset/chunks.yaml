  raw: '## Summary


    When you build web applications and RESTful APIs, security is one of the most
    important factors for a successful application. If you canвҖҷt protect your application
    from unauthorized access, the entire application doesnвҖҷt make any sense, despite
    providing a good user experience.


    You usually use two kinds of authentication models for authorizing HTTP requests
    to access the protected resources of a server: cookie-based authentication and
    token-based authentication. A cookie-based authentication is the conventional
    approach that works well for traditional and stand-alone web applications in which
    server-side implementation provides everything, including UI rendering.


    A token-based approach is great for adding authentication into RESTful APIs that
    can be easily accessed from various client applications, including mobile and
    web applications. A token-based approach is a very convenient model for mobile
    applications because tokens can be sent through an HTTP header as bearer tokens.
    When a token-based approach is used, Ajax requests can be sent to any API server,
    regardless of domain constrains, thus avoiding CORS issues.


    OAuth 2 is an open standard for authentication that allows applications to delegate
    authentication to various OAuth 2 service providers such as LinkedIn, GitHub,
    Twitter, Facebook, and Google. Several OAuth 2 service providers are available
    as identity providers. The Go third-party package `Goth` allows you to implement
    authentication with various OAuth 2 service providers. In the OAuth 2 authentication
    flow, an access token is used to obtain access to protected resources.


    JSON Web Token (JWT) is an open standard for generating and using bearer tokens
    for authentication between two parties. JWT is a compact, URL-safe way to represent
    claims to be transferred between two parties. The third-party Go package `jwt-go`
    provides various utility functions for working with JWT tokens. It allows you
    to easily generate JWT tokens and verify tokens for authentication. When you use
    token-based authentication, you might have to apply authentication logic into
    multiple application handlers. In this context, you can use HTTP middleware to
    implement authentication logic, which can decorate into multiple application handlers.


    # 8.В Persistence with MongoDB


    When you build web applications, persistence of application data is very important.
    You can define the data model of your Go applications using structs, in which
    you can program against the structs for working with application data, but you
    need persistent storage for your application data.


    This chapter shows you how to persist application data into MongoDB, which is
    a popular NoSQL database.


    This chapter covers the following:


    *   Introduction to MongoDB

    *   The `mgo` package

    *   Working with MongoDB using mgo

    *   Persistence with MongoDB


    ## Introduction to MongoDB


    MongoDB is a popular NoSQL database that has been widely used for modern web applications.
    MongoDB is an open-source document database that provides high performance, high
    availability, and automatic scaling. MongoDB is a nonrelational database that
    stores data as documents in a binary representation called BSON Binary JSON (BSON).
    In short, MongoDB is the data store for BSON documents. Go structs can be easily
    serialized into BSON documents.


    For more details on MongoDB and to get instructions for download and install,
    check out the MongoDB web site here: [`www.mongodb.org/`](http://www.mongodb.org/)
    .


    Note


    A NoSQL (often interpreted as Not Only SQL) database provides a mechanism for
    data storage and retrieval. It provides an alternative approach to the tabular
    relations used in relational databases to design data models. A NoSQL database
    is designed to cope with modern application development challenges such as dealing
    with large volumes of data with easier scalability and performance. When compared
    with relational databases, the NoSQL database can provide high performance, better
    scalability, and cheaper storage. NoSQL databases are available in different types:
    document databases, graph stores, key-value stores, and wide-column stores. MongoDB
    is a popular document database.


    A MongoDB database holds a set of collections that consists of documents. A document
    comprises one or more fields in which you store data as a set of key-value pairs.
    In MongoDB, you persist documents into collections, which are analogous to tables
    in a relational database. Documents are analogous to rows, and fields within a
    document are analogous to columns.


    Unlike relational databases, MongoDB provides a greater level of flexibility for
    the schema of documents, which enables you to change the document schema whenever
    the data model is evolving. When you work on MongoDB with Go, your Go structs
    can become the schema of your documents; you can change the schema any time you
    want to alter the structure of application data. Documents in a collection donвҖҷt
    need to have the same set of fields or schema, and common fields in a collectionвҖҷs
    documents can hold different types of data. This dynamic schema feature is very
    useful when you build applications in an evolving way with many development iterations.


    ## Getting Started Using MongoDB


    Once you have installed MongoDB, you can start working with it from Go applications
    using a Go driver for MongoDB. (Keep in mind that you have to start the MongoDB
    process before running applications.) You can start MongoDB from a command line
    by entering the `mongod` command with the appropriate command-line options.


    In this chapter, you learn how to persist data and process it with MongoDB using
    the third-party package `mgo`, which is a popular Go driver for MongoDB.


    ### Introduction to mgo Driver for MongoDB


    `mgo` (pronounced mango) is a MongoDB driver for Go that supports the major features
    of MongoDB. The `mgo` package allows you to easily work with MongoDB from Go applications
    using its simple API that follows Go idioms. `mgo` is a mature package that was
    created in 2010 and sponsored by MongoDB Inc. since 2011\. It is a battle-tested
    library that is used for larger production scenarios such as FacebookвҖҷs Parse.com,
    a popular mobile back end as a service (MBaaS) platform written in Go.


    #### Installing mgo


    To install the `mgo` package, run the following command in the terminal:


    `go get gopkg.in/mgo.v2`


    To work with `mgo`, you must add `gopkg.in/mgo.v2` and its subpackage `gopkg.in/mgo.v2/bson`
    to the import list:


    `import (`


    В В В `"gopkg.in/mgo.v2"`


    В В В `"gopkg.in/mgo.v2/bson"`


    `)`'
