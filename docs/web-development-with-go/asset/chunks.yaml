    \nеҲ—иЎЁ [10-1] жҸҗдҫӣдәҶеҮ дёӘеӯ—з¬ҰдёІе®һз”ЁеҮҪж•°пјҢз”ЁдәҺиҪ¬жҚўеӯ—з¬ҰдёІеҸӮж•°зҡ„еӨ§е°ҸеҶҷе№¶еҸҚиҪ¬еӯ—з¬ҰдёІеҸӮж•°гҖӮ\n\n**еҲ—иЎЁ 10-1.**В В `utils.go` дёӯзҡ„еӯ—з¬ҰдёІе®һз”ЁеҮҪж•°\n\
    \n```\npackage stringutils\n\nimport (\n    \"bytes\"\n    \"unicode\"\n)\n\n\
    // SwapCase иҪ¬жҚўеӯ—з¬ҰдёІеҸӮж•°зҡ„еӨ§е°ҸеҶҷ\nfunc SwapCase(str string) string {\n    buf := &bytes.Buffer{}\n\
