    \nжңүе…і MongoDB зҡ„жӣҙеӨҡиҜҰз»ҶдҝЎжҒҜд»ҘеҸҠдёӢиҪҪе’Ңе®үиЈ…иҜҙжҳҺпјҢиҜ·жҹҘзңӢ MongoDB зҪ‘з«ҷпјҡ[www.mongodb.org/](http://www.mongodb.org/)гҖӮ\n\
    \nжіЁж„ҸпјҡNoSQLпјҲйҖҡеёёиў«и§ЈйҮҠдёәвҖңдёҚд»…д»…жҳҜ SQLвҖқпјүж•°жҚ®еә“жҸҗдҫӣдәҶдёҖз§Қж•°жҚ®еӯҳеӮЁе’ҢжЈҖзҙўжңәеҲ¶гҖӮе®ғдёәе…ізі»ж•°жҚ®еә“дёӯз”ЁдәҺи®ҫи®Ўж•°жҚ®жЁЎеһӢзҡ„иЎЁж је…ізі»жҸҗдҫӣдәҶдёҖз§Қжӣҝд»Јж–№жі•гҖӮNoSQL\
    \ ж•°жҚ®еә“ж—ЁеңЁеә”еҜ№зҺ°д»Јеә”з”ЁејҖеҸ‘дёӯзҡ„жҢ‘жҲҳпјҢдҫӢеҰӮеӨ„зҗҶжө·йҮҸж•°жҚ®гҖҒжҳ“дәҺжү©еұ•е’Ңй«ҳжҖ§иғҪгҖӮдёҺе…ізі»ж•°жҚ®еә“зӣёжҜ”пјҢNoSQL ж•°жҚ®еә“еҸҜд»ҘжҸҗдҫӣжӣҙй«ҳзҡ„жҖ§иғҪгҖҒжӣҙеҘҪзҡ„еҸҜжү©еұ•жҖ§е’ҢжӣҙдҪҺзҡ„еӯҳеӮЁжҲҗжң¬гҖӮNoSQL\
    \ ж•°жҚ®еә“жңүеӨҡз§Қзұ»еһӢпјҡж–ҮжЎЈж•°жҚ®еә“гҖҒеӣҫж•°жҚ®еә“гҖҒй”®еҖјеӯҳеӮЁе’Ңе®ҪеҲ—еӯҳеӮЁгҖӮMongoDB жҳҜдёҖз§ҚжөҒиЎҢзҡ„ж–ҮжЎЈж•°жҚ®еә“гҖӮ\n\nдёҖдёӘ MongoDB ж•°жҚ®еә“еҢ…еҗ«дёҖз»„йӣҶеҗҲпјҢйӣҶеҗҲз”ұж–ҮжЎЈз»„жҲҗгҖӮдёҖдёӘж–ҮжЎЈз”ұдёҖдёӘжҲ–еӨҡдёӘеӯ—ж®өз»„жҲҗпјҢдҪ еҸҜд»ҘеңЁе…¶дёӯе°Ҷж•°жҚ®еӯҳеӮЁдёәдёҖз»„й”®еҖјеҜ№гҖӮеңЁ\
    \ MongoDB дёӯпјҢдҪ е°Ҷж–ҮжЎЈжҢҒд№…еҢ–еҲ°йӣҶеҗҲдёӯпјҢиҝҷзұ»дјјдәҺе…ізі»ж•°жҚ®еә“дёӯзҡ„иЎЁгҖӮж–ҮжЎЈзұ»дјјдәҺиЎҢпјҢж–ҮжЎЈдёӯзҡ„еӯ—ж®өзұ»дјјдәҺеҲ—гҖӮ\n\nдёҺе…ізі»ж•°жҚ®еә“дёҚеҗҢпјҢMongoDB дёәж–ҮжЎЈзҡ„\
    \ SchemaпјҲжЁЎејҸпјүжҸҗдҫӣдәҶжӣҙй«ҳзЁӢеәҰзҡ„зҒөжҙ»жҖ§пјҢдҪҝдҪ иғҪеӨҹеңЁж•°жҚ®жЁЎеһӢжј”еҸҳж—¶жӣҙж”№ж–ҮжЎЈ SchemaгҖӮеҪ“дҪ дҪҝз”Ё Go еӨ„зҗҶ MongoDB ж—¶пјҢдҪ зҡ„ Go з»“жһ„дҪ“еҸҜд»ҘжҲҗдёәж–ҮжЎЈзҡ„\
    \ SchemaпјӣеҸӘиҰҒдҪ еёҢжңӣж”№еҸҳеә”з”Ёж•°жҚ®зҡ„з»“жһ„пјҢе°ұеҸҜд»ҘйҡҸж—¶жӣҙж”№ SchemaгҖӮдёҖдёӘйӣҶеҗҲдёӯзҡ„ж–ҮжЎЈдёҚеҝ…е…·жңүзӣёеҗҢзҡ„еӯ—ж®өйӣҶжҲ– SchemaпјҢе№¶дё”йӣҶеҗҲж–ҮжЎЈдёӯзҡ„е…¬е…ұеӯ—ж®өеҸҜд»ҘдҝқеӯҳдёҚеҗҢзұ»еһӢзҡ„ж•°жҚ®гҖӮеҪ“дҪ еңЁеӨҡдёӘејҖеҸ‘иҝӯд»Јдёӯд»Ҙжј”иҝӣзҡ„ж–№ејҸжһ„е»әеә”з”Ёж—¶пјҢиҝҷз§ҚеҠЁжҖҒ\
    \ Schema зү№жҖ§йқһеёёжңүз”ЁгҖӮ\n\n## MongoDB е…Ҙй—Ё\n\nе®үиЈ… MongoDB еҗҺпјҢдҪ еҸҜд»ҘдҪҝз”Ё Go зҡ„ MongoDB й©ұеҠЁзЁӢеәҸд»Һ Go\
    \ еә”з”ЁејҖе§ӢдҪҝз”Ёе®ғгҖӮпјҲиҜ·и®°дҪҸпјҢеңЁиҝҗиЎҢеә”з”Ёд№ӢеүҚпјҢеҝ…йЎ»еҗҜеҠЁ MongoDB иҝӣзЁӢгҖӮпјүдҪ еҸҜд»ҘйҖҡиҝҮе‘Ҫд»ӨиЎҢиҫ“е…Ҙ `mongod` е‘Ҫд»Өе№¶йҷ„еёҰзӣёеә”зҡ„е‘Ҫд»ӨиЎҢйҖүйЎ№жқҘеҗҜеҠЁ MongoDBгҖӮ\n\
    \nеңЁжң¬з« дёӯпјҢдҪ е°ҶеӯҰд№ еҰӮдҪ•дҪҝз”Ёз¬¬дёүж–№еҢ… `mgo`пјҲдёҖдёӘжөҒиЎҢзҡ„ Go MongoDB й©ұеҠЁзЁӢеәҸпјүе°Ҷж•°жҚ®жҢҒд№…еҢ–еҲ° MongoDB е№¶иҝӣиЎҢеӨ„зҗҶгҖӮ\n\n###\
    \ MongoDB зҡ„ `mgo` й©ұеҠЁзЁӢеәҸз®Җд»Ӣ\n\n`mgo`пјҲеҸ‘йҹідёә mangoпјүжҳҜдёҖдёӘз”ЁдәҺ Go зҡ„ MongoDB й©ұеҠЁзЁӢеәҸпјҢж”ҜжҢҒ MongoDB\
    \ зҡ„дё»иҰҒеҠҹиғҪгҖӮ`mgo` еҢ…е…Ғи®ёдҪ дҪҝз”Ёе…¶йҒөеҫӘ Go д№ жғҜз”Ёжі•зҡ„з®ҖеҚ• APIпјҢд»Һ Go еә”з”ЁиҪ»жқҫең°еӨ„зҗҶ MongoDBгҖӮ`mgo` жҳҜдёҖдёӘжҲҗзҶҹзҡ„еҢ…пјҢеҲӣе»әдәҺ\
    \ 2010 е№ҙпјҢиҮӘ 2011 е№ҙиө·з”ұ MongoDB Inc. иөһеҠ©гҖӮе®ғжҳҜдёҖдёӘз»ҸиҝҮе®һжҲҳжЈҖйӘҢзҡ„еә“пјҢз”ЁдәҺеӨ§и§„жЁЎз”ҹдә§еңәжҷҜпјҢдҫӢеҰӮ Facebook зҡ„ Parse.comпјҢиҝҷжҳҜдёҖдёӘдҪҝз”Ё\
    \ Go зј–еҶҷзҡ„жөҒиЎҢзҡ„з§»еҠЁеҗҺз«ҜеҚіжңҚеҠЎе№іеҸ°гҖӮ\n\n#### е®үиЈ… `mgo`\n\nиҰҒе®үиЈ… `mgo` еҢ…пјҢиҜ·еңЁз»Ҳз«ҜдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\n```\ngo\
    \ get gopkg.in/mgo.v2\n```\n\nиҰҒдҪҝз”Ё `mgo`пјҢдҪ еҝ…йЎ»е°Ҷ `gopkg.in/mgo.v2` еҸҠе…¶еӯҗеҢ… `gopkg.in/mgo.v2/bson`\
    \ ж·»еҠ еҲ°еҜје…ҘеҲ—иЎЁдёӯпјҡ\n\n```\nimport (\n   \"gopkg.in/mgo.v2\"\n   \"gopkg.in/mgo.v2/bson\"\
    \n)\n```\n"
- fmt: "### Connecting to MongoDB\n\nTo get started working with MongoDB, you have\
    \ to obtain a MongoDB `Session` using the `Dial` function (see Listing [8-1](#A978-1-4842-1052-9_8_Chapter.html#FPar2)).\
    \ The `Dial` function establishes the connection with the MongoDB server defined\
    \ by the `url` parameter.\n\nListing 8-1. Connecting to MongoDB Server and Obtaining\
    \ a Session\n\n```\nsession, err := mgo.Dial(\"localhost\")\n```\n\nThe `Dial`\
    \ function can also be used to connect with a cluster of servers (see Listing\
    \ [8-2](#A978-1-4842-1052-9_8_Chapter.html#FPar3)). This is useful when you scale\
    \ a MongoDB database into a cluster of servers.\n\nListing 8-2. Connecting to\
    \ a Cluster of MongoDB Servers and Obtaining a Session\n\n```\nsession, err :=\
    \ mgo.Dial(\"server1.mongolab.com,server2.mongolab.com\")\n```\n\nYou can also\
    \ use the `DialWithInfo` function to establish connection to one server or a cluster\
    \ of servers (see Listing [8-3](#A978-1-4842-1052-9_8_Chapter.html#FPar4)). The\
    \ difference from the `Dial` function is that you can provide extra information\
    \ to the cluster by using the value of the `DialInfo` type. `DialWithInfo` establishes\
    \ a new `Session` to the cluster of MongoDB servers identified by the `DialInfo`\
    \ type. The `DialWithInfo` function lets you customize values when you establish\
    \ a connection to a server. When you establish a connection using the `Dial` function,\
    \ the default timeout value is 10 seconds, so it times out after 10 seconds if\
    \ `Dial` can't reach to a server. When you establish a connection using the `DialWithInfo`\
    \ function, you can specify the value for the `Timeout` property.\n\nListing 8-3.\
    \ Connecting to a Cluster of MongoDB Servers Using `DialWithInfo`\n\n```\nmongoDialInfo\
    \ := &mgo.DialInfo{\n    Addrs:    []string{\"localhost\"},\n    Timeout:  60\
    \ * time.Second,\n    Database: \"taskdb\",\n    Username: \"shijuvar\",\n   \
    \ Password: \"password@123\",\n}\n\nsession, err := mgo.DialWithInfo(mongoDialInfo)\n\
    ```\n\nThe `mgo.Session` object handles a pool of connections to MongoDB. Once\
    \ you obtain a `Session` object, you can perform write and read operations with\
    \ MongoDB. MongoDB servers are queried with multiple consistency rules. `SetMode`\
    \ of the `Session` object changes the consistency mode for the session. Three\
    \ types of consistency modes are available: Eventual, Monotonic, and Strong.\n\
    \nListing [8-4](#A978-1-4842-1052-9_8_Chapter.html#FPar5) establishes a `Session`\
    \ object and sets a consistency mode.\n\nListing 8-4. Establishing a Session Object\
    \ and a Consistency Mode\n\n```\nsession, err := mgo.Dial(\"localhost\")\nif err\
    \ != nil {\n    panic(err)\n}\ndefer session.Close()\n\n// Switch the session\
    \ to a monotonic behavior.\nsession.SetMode(mgo.Monotonic, true)\n```\n\nIt is\
    \ important to close the `Session` object at the end of its lifetime by calling\
    \ the `Close` method. In the previous listing, the `Close` method is called by\
    \ using the `defer` function.\n\n### Accessing Collections\n\nTo perform CRUD\
    \ operations into MongoDB, an object of `*mgo.Collection` is created, which represents\
    \ the MongoDB collection. You can create an object of `*mgo.Collection` by calling\
    \ method `C` of `*mgo.Database`. The `mgo.Database` type represents the named\
    \ database that can be created by calling the `DB` method of `*mgo.Session`.\n\
    \nListing [8-5](#A978-1-4842-1052-9_8_Chapter.html#FPar6) accesses the MongoDB\
    \ collection named `\"categories\"`.\n\nListing 8-5. Accessing a MongoDB Collection\n\
    \n```\nc := session.DB(\"taskdb\").C(\"categories\")\n```\n\nThe `DB` method returns\
    \ a value representing a database named `taskdb`, which gets an instance of type\
    \ `Database`. Method `C` of type `Database` returns a value representing a collection\
    \ named `\"categories\"`. The `Collection` object can be used for performing CRUD\
    \ operations.\n\n## CRUD Operations with MongoDB\n\nYou now know how to establish\
    \ a MongoDB `Session` object by using the `Dial` and `DialWithInfo` functions.\
    \ LetвҖҷs take a look at how to perform CRUD operations against the MongoDB database\
    \ using the `mgo` package. In Go, you can persist structs, maps, and slices as\
    \ BSON documents into a MongoDB database. When you persist your data as Go types\
    \ such as structs, maps, and slices, the `mgo` driver automatically serializes\
    \ it as BSON documents.\n\n### Inserting Documents\n\nYou can insert documents\
    \ into MongoDB using the `Insert` method of `mgo.Collection`. The `Insert` method\
    \ inserts one or more documents into the collection. Using this method, you can\
    \ insert values of structs, maps, and document slices."
  raw: '#### Connecting to MongoDB


    To get started working with MongoDB, you have to obtain a MongoDB `Session` using
    the `Dial` function (see Listing [8-1](#A978-1-4842-1052-9_8_Chapter.html#FPar2)).
    The `Dial` function establishes the connection with the MongoDB server defined
    by the `url` parameter.


    Listing 8-1.В В Connecting to MongoDB Server and Obtaining a Session


    `session, err := mgo.Dial("localhost")`


    The `Dial` function can also be used to connect with a cluster of servers (see
    Listing [8-2](#A978-1-4842-1052-9_8_Chapter.html#FPar3)). This is useful when
    you scale a MongoDB database into a cluster of servers.


    Listing 8-2.В В Connecting to a Cluster of MongoDB Servers and Obtaining a Session


    `session, err := mgo.Dial("server1.mongolab.com,server2.mongolab.com")`


    You can also use the `DialWithInfo` function to establish connection to one server
    or a cluster of servers (see Listing [8-3](#A978-1-4842-1052-9_8_Chapter.html#FPar4)).
    The difference from the `Dial` function is that you can provide extra information
    to the cluster by using the value of the `DialInfo` type. `DialWithInfo` establishes
    a new `Session` to the cluster of MongoDB servers identified by the `DialInfo`
    type. The `DialWithInfo` function lets you customize values when you establish
    a connection to a server. When you establish a connection using the `Dial` function,
    the default timeout value is 10 seconds, so it times out after 10 seconds if `Dial`
    canвҖҷt reach to a server. When you establish a connection using the `DialWithInfo`
    function, you can specify the value for the `Timeout` property.


    Listing 8-3.В В Connecting to a Cluster of MongoDB Servers Using DialWithInfo


    `mongoDialInfo := &mgo.DialInfo{`


    В В В В В В В В В В В В `Addrs:В В В В []string{"localhost"},`


    В В В В В В В В В В В В `Timeout:В В 60 * time.Second,`


    В В В В В В В В В В В В `Database: "taskdb",`


    В В В В В В В В В В В В `Username: "shijuvar",`


    В В В В В В В В В В В В `Password: "password@123",`


    В В В В В В В В `}`


    `session, err := mgo.DialWithInfo(mongoDialInfo)`


    The `mgo.Session` object handles a pool of connections to MongoDB. Once you obtain
    a `Session` object, you can perform write and read operations with MongoDB. MongoDB
    servers are queried with multiple consistency rules. `SetMode` of the `Session`
    object changes the consistency mode for the session. Three types of consistency
    modes are available: Eventual, Monotonic, and Strong.


    Listing [8-4](#A978-1-4842-1052-9_8_Chapter.html#FPar5) establishes a `Session`
    object and sets a consistency mode.


    Listing 8-4.В В Establishing a Session Object and a Consistency Mode


    `session, err := mgo.Dial("localhost")`


    `if err != nil {`


    В В В В `panic(err)`


    `}`


    `defer session.Close()`


    `//Switch the session to a monotonic behavior.`


    `session.SetMode(mgo.Monotonic, true)`


    It is important to close the `Session` object at the end of its lifetime by calling
    the `Close` method. In the previous listing, the `Close` method is called by using
    the `defer` function.


    ### Accessing Collections


    To perform CRUD operations into MongoDB, an object of `*mgo.Collection` is created,
    which represents the MongoDB collection. You can create an object of `*mgo.Collection`
    by calling method `C` of `*mgo.Database`. The `mgo.Database` type represents the
    named database that can be created by calling the `DB` method of `*mgo.Session`.


    Listing [8-5](#A978-1-4842-1052-9_8_Chapter.html#FPar6) accesses the MongoDB collection
    named `"categories"`.


    Listing 8-5.В В Accessing a MongoDB Collection


    `c := session.DB("taskdb").C("categories")`


    The `DB` method returns a value representing a database named `taskdb`, which
    gets an instance of type `Database`. Method `C` of type `Database` returns a value
    representing a collection named `"categories"`. The `Collection` object can be
    used for performing CRUD operations.


    ## CRUD Operations with MongoDB


    You now know how to establish a MongoDB `Session` object by using the `Dial` and
    `DialWithInfo` functions. LetвҖҷs take a look at how to perform CRUD operations
    against the MongoDB database using the `mgo` package. In Go, you can persist structs,
    maps, and slices as BSON documents into a MongoDB database. When you persist your
    data as Go types such as structs, maps, and slices, the `mgo` driver automatically
    serializes it as BSON documents.


    ### Inserting Documents


    You can insert documents into MongoDB using the `Insert` method of `mgo.Collection`.
    The `Insert` method inserts one or more documents into the collection. Using this
    method, you can insert values of structs, maps, and document slices.'
  trans: "\n### иҝһжҺҘеҲ° MongoDB\n\nиҰҒејҖе§ӢдҪҝз”Ё MongoDBпјҢдҪ еҝ…йЎ»дҪҝз”Ё `Dial` еҮҪж•°иҺ·еҸ–дёҖдёӘ MongoDB `Session`пјҲеҸӮи§Ғд»Јз Ғжё…еҚ•\
    \ 8-1пјүгҖӮ`Dial` еҮҪж•°дјҡе»әз«ӢдёҺ `url` еҸӮж•°жүҖжҢҮе®ҡзҡ„ MongoDB жңҚеҠЎеҷЁзҡ„иҝһжҺҘгҖӮ\n\nд»Јз Ғжё…еҚ• 8-1. иҝһжҺҘеҲ° MongoDB жңҚеҠЎеҷЁе№¶иҺ·еҸ–дјҡиҜқ\n\
    \n```\nsession, err := mgo.Dial(\"localhost\")\n```\n\n`Dial` еҮҪж•°д№ҹеҸҜд»Ҙз”ЁдәҺиҝһжҺҘжңҚеҠЎеҷЁйӣҶзҫӨпјҲеҸӮи§Ғд»Јз Ғжё…еҚ•\
    \ 8-2пјүгҖӮеҪ“е°Ҷ MongoDB ж•°жҚ®еә“жү©еұ•дёәжңҚеҠЎеҷЁйӣҶзҫӨж—¶пјҢиҝҷдёӘеҠҹиғҪйқһеёёжңүз”ЁгҖӮ\n\nд»Јз Ғжё…еҚ• 8-2. иҝһжҺҘ MongoDB жңҚеҠЎеҷЁйӣҶзҫӨе№¶иҺ·еҸ–дјҡиҜқ\n\n\
    ```\nsession, err := mgo.Dial(\"server1.mongolab.com,server2.mongolab.com\")\n\
    ```\n\nдҪ д№ҹеҸҜд»ҘдҪҝз”Ё `DialWithInfo` еҮҪж•°жқҘе»әз«ӢдёҺеҚ•еҸ°жңҚеҠЎеҷЁжҲ–жңҚеҠЎеҷЁйӣҶзҫӨзҡ„иҝһжҺҘпјҲеҸӮи§Ғд»Јз Ғжё…еҚ• 8-3пјүгҖӮдёҺ `Dial` еҮҪж•°зҡ„еҢәеҲ«еңЁдәҺпјҢдҪ еҸҜд»ҘйҖҡиҝҮдҪҝз”Ё\
    \ `DialInfo` зұ»еһӢзҡ„еҖјеҗ‘йӣҶзҫӨжҸҗдҫӣйўқеӨ–дҝЎжҒҜгҖӮ`DialWithInfo` дјҡе»әз«ӢдёҖдёӘжҢҮеҗ‘з”ұ `DialInfo` зұ»еһӢе®ҡд№үзҡ„ MongoDB жңҚеҠЎеҷЁйӣҶзҫӨзҡ„ж–°\
    \ `Session`гҖӮ`DialWithInfo` еҮҪж•°е…Ғи®ёдҪ еңЁе»әз«ӢжңҚеҠЎеҷЁиҝһжҺҘж—¶иҮӘе®ҡд№үдёҖдәӣеҖјгҖӮеҪ“дҪ дҪҝз”Ё `Dial` еҮҪж•°е»әз«ӢиҝһжҺҘж—¶пјҢй»ҳи®Өи¶…ж—¶еҖјдёә 10\
    \ з§’пјҢеӣ жӯӨеҰӮжһң `Dial` ж— жі•иҝһжҺҘеҲ°жңҚеҠЎеҷЁпјҢе®ғе°ҶеңЁ 10 з§’еҗҺи¶…ж—¶гҖӮеҪ“дҪ дҪҝз”Ё `DialWithInfo` еҮҪж•°е»әз«ӢиҝһжҺҘж—¶пјҢдҪ еҸҜд»ҘжҢҮе®ҡ `Timeout`\
    \ еұһжҖ§зҡ„еҖјгҖӮ\n\nд»Јз Ғжё…еҚ• 8-3. дҪҝз”Ё `DialWithInfo` иҝһжҺҘ MongoDB жңҚеҠЎеҷЁйӣҶзҫӨ\n\n```\nmongoDialInfo\
    \ := &mgo.DialInfo{\n    Addrs:    []string{\"localhost\"},\n    Timeout:  60\
    \ * time.Second,\n    Database: \"taskdb\",\n    Username: \"shijuvar\",\n   \
    \ Password: \"password@123\",\n}\n\nsession, err := mgo.DialWithInfo(mongoDialInfo)\n\
    ```\n\n`mgo.Session` еҜ№иұЎз®ЎзҗҶзқҖдёҖдёӘеҲ° MongoDB зҡ„иҝһжҺҘжұ гҖӮдёҖж—ҰдҪ иҺ·еҸ–дәҶдёҖдёӘ `Session` еҜ№иұЎпјҢе°ұеҸҜд»ҘеҜ№ MongoDB\
    \ жү§иЎҢиҜ»еҶҷж“ҚдҪңгҖӮMongoDB жңҚеҠЎеҷЁдјҡдҫқжҚ®еӨҡз§ҚдёҖиҮҙжҖ§и§„еҲҷиҝӣиЎҢжҹҘиҜўгҖӮ`Session` еҜ№иұЎзҡ„ `SetMode` дјҡжӣҙж”№иҜҘдјҡиҜқзҡ„дёҖиҮҙжҖ§жЁЎејҸгҖӮжңүдёүз§ҚеҸҜз”Ёзҡ„**дёҖиҮҙжҖ§жЁЎејҸ**пјҡEventualгҖҒMonotonic\
    \ е’Ң StrongгҖӮ\n\nд»Јз Ғжё…еҚ• 8-4 е»әз«ӢдәҶдёҖдёӘ `Session` еҜ№иұЎе№¶и®ҫзҪ®дәҶдёҖиҮҙжҖ§жЁЎејҸгҖӮ\n\nд»Јз Ғжё…еҚ• 8-4. е»әз«ӢдёҖдёӘдјҡиҜқеҜ№иұЎе№¶и®ҫзҪ®дёҖиҮҙжҖ§жЁЎејҸ\n\
    \n```\nsession, err := mgo.Dial(\"localhost\")\nif err != nil {\n    panic(err)\n\
    }\ndefer session.Close()\n\n// е°ҶдјҡиҜқеҲҮжҚўеҲ°еҚ•и°ғпјҲmonotonicпјүиЎҢдёәгҖӮ\nsession.SetMode(mgo.Monotonic,\
    \ true)\n```\n\nеңЁе…¶з”ҹе‘Ҫе‘Ёжңҹз»“жқҹж—¶пјҢйҖҡиҝҮи°ғз”Ё `Close` ж–№жі•жқҘе…ій—ӯ `Session` еҜ№иұЎйқһеёёйҮҚиҰҒгҖӮеңЁдёҠдёҖдёӘд»Јз Ғжё…еҚ•дёӯпјҢжҳҜйҖҡиҝҮдҪҝз”Ё\
    \ `defer` еҮҪж•°жқҘи°ғз”Ё `Close` ж–№жі•зҡ„гҖӮ\n\n### и®ҝй—®йӣҶеҗҲ\n\nдёәдәҶеҜ№ MongoDB жү§иЎҢ CRUD ж“ҚдҪңпјҢйңҖиҰҒеҲӣе»әдёҖдёӘ `*mgo.Collection`\
    \ еҜ№иұЎпјҢиҜҘеҜ№иұЎд»ЈиЎЁ MongoDB зҡ„йӣҶеҗҲгҖӮдҪ еҸҜд»ҘйҖҡиҝҮи°ғз”Ё `*mgo.Database` зҡ„ `C` ж–№жі•жқҘеҲӣе»ә `*mgo.Collection` еҜ№иұЎгҖӮ`mgo.Database`\
    \ зұ»еһӢд»ЈиЎЁе‘ҪеҗҚж•°жҚ®еә“пјҢеҸҜд»ҘйҖҡиҝҮи°ғз”Ё `*mgo.Session` зҡ„ `DB` ж–№жі•жқҘеҲӣе»әе®ғгҖӮ\n\nд»Јз Ғжё…еҚ• 8-5 и®ҝй—®дәҶеҗҚдёә `\"categories\"\
    ` зҡ„ MongoDB йӣҶеҗҲгҖӮ\n\nд»Јз Ғжё…еҚ• 8-5. и®ҝй—®дёҖдёӘ MongoDB йӣҶеҗҲ\n\n```\nc := session.DB(\"taskdb\"\
    ).C(\"categories\")\n```\n\n`DB` ж–№жі•иҝ”еӣһдёҖдёӘд»ЈиЎЁеҗҚдёә `taskdb` ж•°жҚ®еә“зҡ„еҖјпјҢиҜҘеҖјиҺ·еҸ–дәҶдёҖдёӘзұ»еһӢдёә `Database`\
    \ зҡ„е®һдҫӢгҖӮзұ»еһӢ `Database` зҡ„ж–№жі• `C` иҝ”еӣһдёҖдёӘд»ЈиЎЁеҗҚдёә `\"categories\"` зҡ„йӣҶеҗҲзҡ„еҖјгҖӮ`Collection` еҜ№иұЎеҸҜз”ЁдәҺжү§иЎҢ\
    \ CRUD ж“ҚдҪңгҖӮ\n\n## MongoDB зҡ„ CRUD ж“ҚдҪң\n\nдҪ зҺ°еңЁе·Із»ҸзҹҘйҒ“еҰӮдҪ•дҪҝз”Ё `Dial` е’Ң `DialWithInfo` еҮҪж•°жқҘе»әз«ӢдёҖдёӘ\
    \ MongoDB `Session` еҜ№иұЎгҖӮжҺҘдёӢжқҘи®©жҲ‘д»¬зңӢзңӢеҰӮдҪ•дҪҝз”Ё `mgo` еҢ…еҜ№ MongoDB ж•°жҚ®еә“жү§иЎҢ CRUD ж“ҚдҪңгҖӮеңЁ Go дёӯпјҢдҪ еҸҜд»Ҙе°Ҷз»“жһ„дҪ“гҖҒжҳ е°„е’ҢеҲҮзүҮдҪңдёә\
    \ BSON ж–ҮжЎЈжҢҒд№…еҢ–еҲ° MongoDB ж•°жҚ®еә“дёӯгҖӮеҪ“дҪ д»Ҙ Go зұ»еһӢпјҲеҰӮз»“жһ„дҪ“гҖҒжҳ е°„е’ҢеҲҮзүҮпјүжҢҒд№…еҢ–ж•°жҚ®ж—¶пјҢ`mgo` й©ұеҠЁдјҡиҮӘеҠЁе°Ҷе…¶еәҸеҲ—еҢ–дёә BSON\
    \ ж–ҮжЎЈгҖӮ\n\n### жҸ’е…Ҙж–ҮжЎЈ\n\nдҪ еҸҜд»ҘдҪҝз”Ё `mgo.Collection` зҡ„ `Insert` ж–№жі•еҗ‘ MongoDB жҸ’е…Ҙж–ҮжЎЈгҖӮ`Insert`\
    \ ж–№жі•е°ҶдёҖдёӘжҲ–еӨҡдёӘж–ҮжЎЈжҸ’е…ҘеҲ°йӣҶеҗҲдёӯгҖӮдҪҝз”ЁиҜҘж–№жі•пјҢдҪ еҸҜд»ҘжҸ’е…Ҙз»“жһ„дҪ“гҖҒжҳ е°„е’Ңж–ҮжЎЈеҲҮзүҮзҡ„еҖјгҖӮ\n"
- fmt: "#### Inserting Struct Values\n\nThe struct type should be your choice when\
    \ you define a data model for Go applications. So when you work with MongoDB,\
    \ you primarily provide values of the struct type to insert BSON documents into\
    \ a MongoDB collection. The `mgo` driver for MongoDB automatically serializes\
    \ the struct values as BSON documents when the `Insert` method is used.\n\nListing\
    \ [8-6](#A978-1-4842-1052-9_8_Chapter.html#FPar7) inserts three documents into\
    \ a MongoDB collection.\n\n**Listing 8-6.** Inserting Struct Values into MongoDB\n\
    \n```\npackage main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"gopkg.in/mgo.v2\"\n\
    \t\"gopkg.in/mgo.v2/bson\"\n)\n\ntype Category struct {\n\tId          bson.ObjectId\
    \ `bson:\"_id,omitempty\"`\n\tName        string\n\tDescription string\n}\n\n\
    func main() {\n\tsession, err := mgo.Dial(\"localhost\")\n\tif err != nil {\n\t\
    \tpanic(err)\n\t}\n\tdefer session.Close()\n\n\t// Optional. Switch the session\
    \ to a monotonic behavior.\n\t// Reads may not be entirely up-to-date, but they\
    \ will always see the\n\t// history of changes moving forward, the data read will\
    \ be consistent\n\t// across sequential queries in the same session, and modifications\
    \ made\n\t// within the session will be observed in following queries (read-your-writes).\n\
    \t// http://godoc.org/labix.org/v2/mgo#Session.SetMode\n\tsession.SetMode(mgo.Monotonic,\
    \ true)\n\n\t//get collection\n\tc := session.DB(\"taskdb\").C(\"categories\"\
    )\n\n\tdoc := Category{\n\t\tbson.NewObjectId(),\n\t\t\"Open Source\",\n\t\t\"\
    Tasks for open-source projects\",\n\t}\n\t//insert a category object\n\terr =\
    \ c.Insert(&doc)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\t//insert two\
    \ category objects\n\terr = c.Insert(&Category{bson.NewObjectId(), \"R & D\",\
    \ \"R & D Tasks\"},\n\t\t&Category{bson.NewObjectId(), \"Project\", \"Project\
    \ Tasks\"})\n\n\tvar count int\n\tcount, err = c.Count()\n\tif err != nil {\n\t\
    \tlog.Fatal(err)\n\t} else {\n\t\tfmt.Printf(\"%d records inserted\", count)\n\
    \t}\n}\n```\n\nA struct named `Category` is created to define the data model and\
    \ persist struct values into a MongoDB database. You can specify the type of `_id`\
    \ field as `bson.ObjectId`.`ObjectId` is a 12-byte BSON type that holds uniquely\
    \ identified values. BSON documents stored in a MongoDB collection require a unique\
    \ `_id` field that acts as a primary key.\n\nWhen you insert a new document, provide\
    \ an `_id` field with a unique `ObjectId`. If an `_id` field isn't provided, MongoDB\
    \ will add an `_id` field that holds an `ObjectId`. When you insert records into\
    \ a MongoDB collection, you can call `bson.NewObjectId()` to generate a unique\
    \ value for `bson.ObjectId`. Tag the `_id` field to be serialized as `_id` when\
    \ the `mgo` driver serializes the values into a BSON document and also specifies\
    \ the `omitempty` tag to omit values when serializing into BSON if the value is\
    \ empty.\n\nThe `Insert` method of `mgo.Collection` is used for persisting values\
    \ into MongoDB. The `Collection` object is created by specifying the name `\"\
    categories\"` and inserting values into the `\"categories\"` collection by calling\
    \ the `Insert` method. The `Insert` method inserts one or more documents into\
    \ the collection. First, one document with the values of the `Category` struct\
    \ is inserted and then two documents are inserted into the collection. The `mgo`\
    \ driver automatically serializes the struct values into BSON representation and\
    \ inserts them into the collection.\n\nIn this example program, three documents\
    \ are inserted. The `Count` method of the `Collection` object is called to get\
    \ the number of records in the collection and finally print the count.\n\nWhen\
    \ you run the program for the first time, you should get the following output:\n\
    \n```\n3 records inserted\n```\n\nInserting `Map` and `Document Slice` Go structs\
    \ are an idiomatic way of defining a data model and persisting data into MongoDB.\
    \ But in some contexts, you may need to persist values from maps and slices.\n\
    \nListing [8-7](#A978-1-4842-1052-9_8_Chapter.html#FPar8) shows how to persist\
    \ values of map objects and document slices (`bson.D`).\n\n**Listing 8-7.** Inserting\
    \ Values from Map and Document Slices (bson.D)\n\n```\npackage main\n\nimport\
    \ (\n\t\"log\"\n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n)\n\nfunc main()\
    \ {\n\tsession, err := mgo.Dial(\"localhost\")\n\tif err != nil {\n\t\tpanic(err)\n\
    \t}\n\tdefer session.Close()\n\n\tsession.SetMode(mgo.Monotonic, true)\n\n\t//get\
    \ collection\n\tc := session.DB(\"taskdb\").C(\"categories\")\n\n\tdocM := map[string]string{\n\
    \t\t\"name\":        \"Open Source\",\n\t\t\"description\": \"Tasks for open-source\
    \ projects\",\n\t}\n\n\t//insert a map object\n\terr = c.Insert(docM)\n\tif err\
    \ != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\tdocD := bson.D{\n\t\t{\"name\", \"Project\"\
    },\n\t\t{\"description\", \"Project Tasks\"},\n\t}\n\n\t//insert a document slice\n\
    \terr = c.Insert(docD)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n}\n```\n\n\
    A document is inserted by using a map object and a document slice (`bson.D`).\
    \ The `bson.D` type represents a BSON document containing ordered elements. Because\
    \ the `Insert` method expects the `interface{}` type for parameter values, struct,\
    \ map, and document slices can be provided."
  raw: '#### Inserting Struct Values


    The struct type should be your choice when you define a data model for Go applications.
    So when you work with MongoDB, you primarily provide values of the struct type
    to insert BSON documents into a MongoDB collection. The `mgo` driver for MongoDB
    automatically serializes the struct values as BSON documents when the `Insert`
    method is used.


    Listing [8-6](#A978-1-4842-1052-9_8_Chapter.html#FPar7) inserts three documents
    into a MongoDB collection.


    Listing 8-6.В В Inserting Struct Values into MongoDB


    `package main`


    `import (`


    `"fmt"`


    `"log"`


    `"gopkg.in/mgo.v2"`


    `"gopkg.in/mgo.v2/bson"`


    `)`


    `type Category struct {`


    `` IdВ В В В В В В В В В bson.ObjectId `bson:"_id,omitempty"` ``


    `NameВ В В В В В В В string`


    `Description string`


    `}`


    `func main() {`


    `session, err := mgo.Dial("localhost")`


    `if err != nil {`


    `panic(err)`


    `}`


    `defer session.Close()`


    `// Optional. Switch the session to a monotonic behavior.`


    `// Reads may not be entirely up-to-date, but they will always see the`


    `// history of changes moving forward, the data read will be consistent`


    `// across sequential queries in the same session, and modifications made`


    `// within the session will be observed in following queries (read-your-writes).`


    `//` [`http://godoc.org/labix.org/v2/mgo#Session.SetMode`](http://godoc.org/labix.org/v2/mgo#Session.SetMode)


    `session.SetMode(mgo.Monotonic, true)`


    `//get collection`


    `c := session.DB("taskdb").C("categories")`


    `doc := Category{`


    `bson.NewObjectId(),`


    `"Open Source",`


    `"Tasks for open-source projects",`


    `}`


    `//insert a category object`


    `err = c.Insert(&doc)`


    `if err != nil {`


    `log.Fatal(err)`


    `}`


    `//insert two category objects`


    `err = c.Insert(&Category{bson.NewObjectId(), "R & D", "R & D Tasks"},`


    `&Category{bson.NewObjectId(), "Project", "Project Tasks"})`


    `var count int`


    `count, err = c.Count()`


    `if err != nil {`


    `log.Fatal(err)`


    `} else {`


    `fmt.Printf("%d records inserted", count)`


    `}`


    `}`


    A struct named `Category` is created to define the data model and persist struct
    values into a MongoDB database. You can specify the type of `_id` field as `bson.ObjectId.
    ObjectId` is a 12-byte BSON type that holds uniquely identified values. BSON documents
    stored in a MongoDB collection require a unique `_id` field that acts as a primary
    key.


    When you insert a new document, provide an `_id` field with a unique `ObjectId`.
    If an `_id` field isnвҖҷt provided, MongoDB will add an `_id` field that holds an
    `ObjectId`. When you insert records into a MongoDB collection, you can call `bson.NewObjectId()`
    to generate a unique value for `bson.ObjectId`. Tag the `_id` field to be serialized
    as `_id` when the `mgo` driver serializes the values into a BSON document and
    also specifies the `omitempty` tag to omit values when serializing into BSON if
    the value is empty.


    The `Insert` method of `mgo.Collection` is used for persisting values into MongoDB.
    The `Collection` object is created by specifying the name `"categories"` and inserting
    values into the `"categories"` collection by calling the `Insert` method. The
    `Insert` method inserts one or more documents into the collection. First, one
    document with the values of the `Category` struct is inserted and then two documents
    are inserted into the collection. The `mgo` driver automatically serializes the
    struct values into BSON representation and inserts them into the collection.


    In this example program, three documents are inserted. The `Count` method of the
    `Collection` object is called to get the number of records in the collection and
    finally print the count.


    When you run the program for the first time, you should get the following output:


    `3 records inserted`


    Inserting `Map` and `Document SliceGo` structs are an idiomatic way of defining
    a data model and persisting data into MongoDB. But in some contexts, you may need
    to persist values from maps and slices.


    Listing [8-7](#A978-1-4842-1052-9_8_Chapter.html#FPar8) shows how to persist values
    of map objects and document slices (`bson.D`).


    Listing 8-7.В В Inserting Values from Map and Document Slices (bson.D)


    `package main`


    `import (`


    `"log"`


    `"gopkg.in/mgo.v2"`


    `"gopkg.in/mgo.v2/bson"`


    `)`


    `func main() {`


    `session, err := mgo.Dial("localhost")`


    `if err != nil {`


    `panic(err)`


    `}`


    `defer session.Close()`


    `session.SetMode(mgo.Monotonic, true)`


    `//get collection`


    `c := session.DB("taskdb").C("categories")`


    `docM := map[string]string{`


    `"name": "Open Source",`


    `"description": "Tasks for open-source projects",`


    `}`


    `//insert a map object`


    `err = c.Insert(docM)`


    `if err != nil {`


    `log.Fatal(err)`


    `}`


    `docD := bson.D{`


    `{"name", "Project"},`


    `{"description", "Project Tasks"},`


    `}`


    `//insert a document slice`


    `err = c.Insert(docD)`


    `if err != nil {`


    `log.Fatal(err)`


    `}`


    `}`


    A document is inserted by using a map object and a document slice (`bson.D`).
    The `bson.D` type represents a BSON document containing ordered elements. Because
    the `Insert` method expects the `interface{}` type for parameter values, struct,
    map, and document slices can be provided.'
  trans: "\n#### жҸ’е…Ҙз»“жһ„дҪ“еҖј\n\nеңЁе®ҡд№ү Go еә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®жЁЎеһӢж—¶пјҢз»“жһ„дҪ“зұ»еһӢеә”жҳҜдҪ зҡ„йҰ–йҖүгҖӮеӣ жӯӨпјҢеңЁдҪҝз”Ё MongoDB ж—¶пјҢдҪ дё»иҰҒйҖҡиҝҮжҸҗдҫӣз»“жһ„дҪ“зұ»еһӢзҡ„еҖјжқҘе°Ҷ\
    \ BSON ж–ҮжЎЈжҸ’е…ҘеҲ° MongoDB йӣҶеҗҲдёӯгҖӮеҪ“дҪҝз”Ё `Insert` ж–№жі•ж—¶пјҢMongoDB зҡ„ `mgo` й©ұеҠЁдјҡиҮӘеҠЁе°Ҷз»“жһ„дҪ“еҖјеәҸеҲ—еҢ–дёә BSON\
    \ ж–ҮжЎЈгҖӮ\n\nжё…еҚ• 8-6 еҗ‘ MongoDB йӣҶеҗҲдёӯжҸ’е…ҘдәҶдёүдёӘж–ҮжЎЈгҖӮ\n\n**жё…еҚ• 8-6.** е°Ҷз»“жһ„дҪ“еҖјжҸ’е…Ҙ MongoDB\n\n```\n\
    package main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\
    \n)\n\ntype Category struct {\n\tId          bson.ObjectId `bson:\"_id,omitempty\"\
    `\n\tName        string\n\tDescription string\n}\n\nfunc main() {\n\tsession,\
    \ err := mgo.Dial(\"localhost\")\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tdefer\
