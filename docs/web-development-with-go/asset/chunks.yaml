    Electronic supplementary material The online version of this chapter (doi:[10.вҖӢ1007/вҖӢ978-1-4842-1052-9_вҖӢ1](http://dx.doi.org/10.1007/978-1-4842-1052-9_1))
    contains supplementary material, which is available to authorized users.


    Everything in this world is evolving, including computers and computer programming
    languages. Ideas and approaches for building applications are also evolving, based
    on past experience. Although highly evolved modern computers now have many CPU
    cores (32, 64, 128 and many more), we still cannot leverage the full power of
    modern computer hardware by using most of our existing programming languages and
    tools. Our programs still run slowly, even in high-powered servers with many CPU
    cores.


    For the last decade, many existing programming languages have been evolving with
    many new features. Language authors have been adding these features based on programming
    language theory (PLT) and other intellectual thoughts, which make the languages
    more complex. In todayвҖҷs computing, many people prefer a minimalistic and pragmatic
    approach for writing applications.


    Programming languages are used that excel in specific areas. Some programming
    languages are great for rapid application development, but would not work well
    for writing high-performance applications. Other programming languages are very
    efficient for writing these high-performance applications, but would be difficult
    for writing applications in a productive manner. It would be great if there were
    a general-purpose language for developing a variety of applications with a greater
    level of efficiency, performance, productivity, and faster compilation time. The
    Go language meets these criteria.


    This chapter shows you why Go is a great programming language for solving modern
    programming challenges. You will learn use cases for adopting Go for your next
    application.


    ## Introducing Go


    Go, also referred to as Golang, is a general-purpose programming language, developed
    by a team at Google and many [contributors](http://golang.org/CONTRIBUTORS) from
    the open source community ( [`http://golang.org/contributors`](http://golang.org/contributors)
    ). The language was announced in November 2009, and the first version was released
    in December 2012\. Go is an open source project that is distributed under a BSD-style
    license. The official web site of the Go project is available at [`http://golang.org/`](http://golang.org/)
    . It is a statically typed, natively compiled, garbage-collected, concurrent programming
    language that mostly belongs to the C family of languages in terms of basic syntax.
    LetвҖҷs look at some of the features of Go to understand its design principles.


    ### Minimalistic Language with Pragmatic Design


    The Go programming language can be simply described in three words: simple, minimal,
    and pragmatic. If you look deeply into the language design of Go, you see its
    simple and minimalistic approach, coupled with a pragmatic design. You can observe
    this simplicity with all the Go language features, including the type system.
    Today, many programming languages provide too many features that make applications
    more complex for developers. The design goal of Go is to be a simple and minimal
    language that provides all the necessary features for developing efficient software
    systems.


    Although Go has fewer language features, productivity is not affected by its pragmatic
    design. A new Go programmer can quickly learn the language and can easily start
    to develop production-quality applications. Go has simply ignored many language
    features from the last three decades and focuses on real-world practices instead
    of academics and programming language theory (PLT).


    From a practical perspective, you might say that Go is an object-oriented programming
    (OOP) language. But GoвҖҷs object-oriented approach is different from programming
    languages such as C++, Java, and C#. Go is not a full-fledged OOP language from
    an academic perspective. Unlike many existing OOP languages, Go does not support
    inheritance and does not even have a `class` keyword. It uses composition over
    inheritance through its simple type system. GoвҖҷs interface type design shows its
    uniqueness when compared with other object-oriented programming languages.


    Is Go an OOP language? The answer is both yes and no. Go language includes all
    batteries required for writing applications with an object-oriented approach,
    but it is not a complete OOP language because it lacks some traditional OOP features.


    Note


    Programming language theory (PLT) is a branch of computer science that deals with
    the design, implementation, analysis, characterization, and classification of
    programming languages and their individual features.


    ### A Static Type Language with High Productivity


    Go is a statically typed programming language, with its syntax loosely derived
    from the C language. Like C and C++, it compiles natively to machine code, so
    Just-In-Time (JIT) compilation is not needed to run its programs. (Programming
    languages such as Java and C# use JIT compilation to run applications.)


    For writing applications, a dynamically typed language provides lots of productivity
    and expressiveness because you donвҖҷt have to worry about the data types of the
    variables you use. In dynamically typed languages, the type of expression is known
    only at runtime, which provides a greater level of productivity and expressiveness
    in the syntax to quickly build applications, especially web applications. But
    when working with a dynamic type language, the performance and maintainability
    of the applications are affected. Sometimes the debugging experience of an application
    written in a dynamic type language can be very difficult due to its lack of type
    safety. Even today, developers use static type languages to generate code for
    their dynamic type languages. For example, JavaScript developers use statically
    typed languages such as Microsoft TypeScript for type safety, which finally compiles
    to JavaScript code.


    Although static type languages can provide type safety and performance, working
    with them can affect the productivity of application development, and compiling
    larger programs can take a long time. It would be great to have a language that
    provides the power of both static type and dynamic type language to blend the
    performance and type safety of a static type language with the productivity of
    a dynamic type language.


    Go is that perfect blend of the power of static type languages and the productivity
    of dynamic type languages. Go can be called a modern C language that provides
    faster compilation than C, coupled with the productivity of a dynamic type language.'
  trans: "\n# 1. ејҖе§ӢдҪҝз”Ё Go\n\nз”өеӯҗиЎҘе……жқҗж–ҷ жң¬з« зҡ„еңЁзәҝзүҲжң¬ (doi:[10.1007/978-1-4842-1052-9_1](http://dx.doi.org/10.1007/978-1-4842-1052-9_1))\
    \ еҢ…еҗ«иЎҘе……жқҗж–ҷпјҢд»…дҫӣжҺҲжқғз”ЁжҲ·дҪҝз”ЁгҖӮ\n\nдё–й—ҙдёҮзү©зҡҶеңЁжј”еҢ–пјҢи®Ўз®—жңәдёҺи®Ўз®—жңәзј–зЁӢиҜӯиЁҖд№ҹдёҚдҫӢеӨ–гҖӮеҹәдәҺиҝҮеҫҖз»ҸйӘҢпјҢжһ„е»әеә”з”ЁзЁӢеәҸзҡ„жҖқи·ҜдёҺж–№жі•д№ҹеңЁдёҚж–ӯжј”иҝӣгҖӮе°Ҫз®Ўй«ҳеәҰжј”еҢ–зҡ„зҺ°д»Ји®Ўз®—жңәе·ІжӢҘжңүдј—еӨҡ\
    \ CPU ж ёеҝғпјҲ32гҖҒ64гҖҒ128 д№ғиҮіжӣҙеӨҡпјүпјҢдҪҶжҲ‘д»¬д»Қж— жі•йҖҡиҝҮзҺ°жңүзҡ„еӨ§еӨҡж•°зј–зЁӢиҜӯиЁҖе’Ңе·Ҙе…·пјҢе……еҲҶеҸ‘жҢҘзҺ°д»Ји®Ўз®—жңәзЎ¬д»¶зҡ„е…ЁйғЁжҪңеҠӣгҖӮеҚідҫҝжҳҜеңЁй…ҚеӨҮеӨҡж ё CPU зҡ„й«ҳжҖ§иғҪжңҚеҠЎеҷЁдёҠпјҢжҲ‘д»¬зҡ„зЁӢеәҸиҝҗиЎҢдҫқз„¶зј“ж…ўгҖӮ\n\
    \nеңЁиҝҮеҺ»еҚҒе№ҙй—ҙпјҢи®ёеӨҡзҺ°жңүзј–зЁӢиҜӯиЁҖйғҪдјҙйҡҸзқҖдј—еӨҡж–°зү№жҖ§дёҚж–ӯжј”иҝӣгҖӮиҜӯиЁҖи®ҫи®ЎиҖ…еҹәдәҺзј–зЁӢиҜӯиЁҖзҗҶи®әпјҲPLTпјүеҸҠе…¶д»–еӯҰжңҜжҖқжғідёҚж–ӯж·»еҠ иҝҷдәӣзү№жҖ§пјҢиҝҷдҪҝеҫ—иҜӯиЁҖжң¬иә«еҸҳеҫ—жӣҙдёәеӨҚжқӮгҖӮеңЁеҪ“д»Ҡзҡ„и®Ўз®—зҺҜеўғдёӯпјҢи®ёеӨҡдәәжӣҙеҖҫеҗ‘дәҺз”Ёз®ҖзәҰеҠЎе®һзҡ„ж–№ејҸжқҘзј–еҶҷеә”з”ЁзЁӢеәҸгҖӮ\n\
    \nдәәд»¬дјҡйҖүз”ЁеңЁжҹҗдәӣзү№е®ҡйўҶеҹҹиЎЁзҺ°еҮәиүІзҡ„зј–зЁӢиҜӯиЁҖгҖӮжңүдәӣзј–зЁӢиҜӯиЁҖйқһеёёйҖӮеҗҲеҝ«йҖҹеә”з”ЁејҖеҸ‘пјҢдҪҶеңЁзј–еҶҷй«ҳжҖ§иғҪеә”з”Ёж–№йқўиЎЁзҺ°дёҚдҪіпјӣеҸҰдёҖдәӣзј–зЁӢиҜӯиЁҖеңЁзј–еҶҷй«ҳжҖ§иғҪеә”з”Ёж—¶ж•ҲзҺҮжһҒй«ҳпјҢеҚҙйҡҫд»Ҙй«ҳж•Ҳең°ејҖеҸ‘еә”з”ЁзЁӢеәҸгҖӮеҖҳиӢҘеӯҳеңЁдёҖз§ҚйҖҡз”ЁиҜӯиЁҖпјҢиғҪеӨҹд»Ҙжӣҙй«ҳзҡ„ж•ҲзҺҮгҖҒжҖ§иғҪгҖҒз”ҹдә§еҠӣеҸҠжӣҙеҝ«зҡ„зј–иҜ‘ж—¶й—ҙжқҘејҖеҸ‘еҗ„зұ»еә”з”ЁпјҢйӮЈе°ҶжҳҜеҶҚеҘҪдёҚиҝҮдәҶгҖӮGo\
    \ иҜӯиЁҖжҒ°еҘҪж»Ўи¶іиҝҷдәӣж ҮеҮҶгҖӮ\n\nжң¬з« е°Ҷеҗ‘дҪ еұ•зӨәдёәдҪ• Go жҳҜи§ЈеҶізҺ°д»Јзј–зЁӢжҢ‘жҲҳзҡ„з»қдҪізј–зЁӢиҜӯиЁҖпјҢе№¶её®еҠ©дҪ дәҶи§Је°Ҷ Go еә”з”ЁдәҺдёӢдёҖдёӘйЎ№зӣ®ж—¶зҡ„з”ЁдҫӢгҖӮ\n\n##\
    \ и®ӨиҜҶ Go\n\nGoпјҢдәҰиў«з§°дёә GolangпјҢжҳҜдёҖз§ҚйҖҡз”Ёзј–зЁӢиҜӯиЁҖпјҢз”ұ Google зҡ„дёҖж”Ҝеӣўйҳҹд»ҘеҸҠејҖжәҗзӨҫеҢәзҡ„дј—еӨҡ[иҙЎзҢ®иҖ…](http://golang.org/CONTRIBUTORS)пјҲ[`http://golang.org/contributors`](http://golang.org/contributors)пјүе…ұеҗҢејҖеҸ‘гҖӮиҜҘиҜӯиЁҖдәҺ\
    \ 2009 е№ҙ 11 жңҲе®ЈеёғпјҢйҰ–дёӘзүҲжң¬дәҺ 2012 е№ҙ 12 жңҲеҸ‘еёғгҖӮGo жҳҜдёҖдёӘејҖжәҗйЎ№зӣ®пјҢйҮҮз”Ё BSD йЈҺж ји®ёеҸҜиҜҒиҝӣиЎҢеҲҶеҸ‘гҖӮGo йЎ№зӣ®зҡ„е®ҳж–№зҪ‘з«ҷжҳҜ [`http://golang.org/`](http://golang.org/)гҖӮе®ғжҳҜдёҖз§ҚйқҷжҖҒзұ»еһӢгҖҒеҺҹз”ҹзј–иҜ‘гҖҒеёҰеһғеңҫеӣһж”¶зҡ„е№¶еҸ‘зј–зЁӢиҜӯиЁҖпјҢеңЁеҹәжң¬иҜӯжі•дёҠдё»иҰҒеҪ’еұһдәҺ\
    \ C иҜӯиЁҖе®¶ж—ҸгҖӮжҺҘдёӢжқҘпјҢи®©жҲ‘д»¬зңӢзңӢ Go зҡ„дёҖдәӣзү№жҖ§пјҢд»ҘзҗҶи§Је…¶и®ҫи®ЎеҺҹеҲҷгҖӮ\n\n### з®ҖзәҰеҠЎе®һзҡ„и®ҫи®ЎиҜӯиЁҖ\n\nGo зј–зЁӢиҜӯиЁҖеҸҜд»Ҙз®ҖеҚ•ең°з”ЁдёүдёӘиҜҚжқҘжҸҸиҝ°пјҡз®ҖжҙҒгҖҒз®ҖзәҰгҖҒеҠЎе®һгҖӮеҰӮжһңдҪ ж·ұе…Ҙз ”з©¶\
    \ Go зҡ„иҜӯиЁҖи®ҫи®ЎпјҢе°ұдјҡеҸ‘зҺ°е®ғйҮҮеҸ–дәҶдёҖз§Қз®ҖзәҰиҖҢеҠЎе®һзҡ„и®ҫи®ЎжҖқи·ҜгҖӮиҝҷз§Қз®ҖжҙҒжҖ§еҸҜд»Ҙд»Һ Go зҡ„жүҖжңүиҜӯиЁҖзү№жҖ§дёӯдҪ“зҺ°еҮәжқҘпјҢеҢ…жӢ¬е…¶зұ»еһӢзі»з»ҹгҖӮеҰӮд»ҠпјҢи®ёеӨҡзј–зЁӢиҜӯиЁҖжҸҗдҫӣдәҶиҝҮеӨҡзҡ„зү№жҖ§пјҢдҪҝеҫ—еә”з”ЁзЁӢеәҸеҜ№ејҖеҸ‘иҖ…иҖҢиЁҖеҸҳеҫ—жӣҙдёәеӨҚжқӮгҖӮGo\
    \ зҡ„и®ҫи®Ўзӣ®ж ҮжҳҜжҲҗдёәдёҖз§Қз®ҖжҙҒгҖҒз®ҖзәҰзҡ„иҜӯиЁҖпјҢжҸҗдҫӣејҖеҸ‘й«ҳж•ҲиҪҜд»¶зі»з»ҹжүҖйңҖзҡ„дёҖеҲҮеҝ…иҰҒзү№жҖ§гҖӮ\n\nе°Ҫз®Ў Go зҡ„иҜӯиЁҖзү№жҖ§иҫғе°‘пјҢдҪҶе…¶еҠЎе®һзҡ„и®ҫи®Ўе№¶жңӘеҜ№з”ҹдә§еҠӣйҖ жҲҗеҪұе“ҚгҖӮж–°зҡ„\
    \ Go зЁӢеәҸе‘ҳиғҪеҝ«йҖҹеӯҰдјҡиҜҘиҜӯиЁҖпјҢе№¶иҪ»жқҫејҖе§ӢејҖеҸ‘е…·жңүз”ҹдә§иҙЁйҮҸзҡ„еә”з”ЁгҖӮGo з®ҖеҚ•ең°е°ҶиҝҮеҺ»дёүеҚҒе№ҙй—ҙзҡ„и®ёеӨҡиҜӯиЁҖзү№жҖ§ејғд№ӢдёҚз”ЁпјҢдё“жіЁдәҺе®һйҷ…е®һи·өиҖҢйқһеӯҰжңҜзҗҶи®әе’Ңзј–зЁӢиҜӯиЁҖзҗҶи®әпјҲPLTпјүгҖӮ\n\
    \nд»Һе®һи·өзҡ„и§’еәҰжқҘзңӢпјҢдҪ еҸҜиғҪдјҡиҜҙ Go жҳҜдёҖз§Қйқўеҗ‘еҜ№иұЎзј–зЁӢпјҲOOPпјүиҜӯиЁҖгҖӮдҪҶ Go зҡ„йқўеҗ‘еҜ№иұЎж–№ејҸдёҺ C++гҖҒJava е’Ң C# зӯүзј–зЁӢиҜӯиЁҖдёҚеҗҢгҖӮд»ҺеӯҰжңҜи§’еәҰзңӢпјҢGo\
    \ е№¶йқһдёҖз§Қе®Ңе…Ёзҡ„йқўеҗ‘еҜ№иұЎиҜӯиЁҖгҖӮдёҺи®ёеӨҡзҺ°жңүзҡ„ OOP иҜӯиЁҖдёҚеҗҢпјҢGo дёҚж”ҜжҢҒз»§жүҝпјҢз”ҡиҮіиҝһ `class` е…ій”®еӯ—йғҪжІЎжңүгҖӮе®ғйҖҡиҝҮе…¶з®ҖеҚ•зҡ„зұ»еһӢзі»з»ҹпјҢд»Ҙз»„еҗҲдјҳдәҺз»§жүҝзҡ„ж–№ејҸжқҘе®һзҺ°еҠҹиғҪгҖӮдёҺе…¶д»–йқўеҗ‘еҜ№иұЎзј–зЁӢиҜӯиЁҖзӣёжҜ”пјҢGo\
    \ зҡ„жҺҘеҸЈзұ»еһӢи®ҫи®Ўеұ•зҺ°дәҶе…¶зӢ¬зү№жҖ§гҖӮ\n\nйӮЈд№Ҳ Go жҳҜдёҖз§Қйқўеҗ‘еҜ№иұЎиҜӯиЁҖеҗ—пјҹзӯ”жЎҲж—ўжҳҜд№ҹдёҚжҳҜгҖӮGo иҜӯиЁҖеҢ…еҗ«дәҶд»Ҙйқўеҗ‘еҜ№иұЎж–№ејҸзј–еҶҷеә”з”ЁжүҖйңҖзҡ„е…ЁйғЁвҖңз”өжұ вҖқпјҲеҚіеҹәзЎҖз»„д»¶пјүпјҢдҪҶе®ғе№¶йқһдёҖз§Қе®Ңе…Ёзҡ„\
    \ OOP иҜӯиЁҖпјҢеӣ дёәе®ғзјәе°‘дёҖдәӣдј з»ҹзҡ„ OOP зү№жҖ§гҖӮ\n\n**жіЁж„Ҹ**  \nзј–зЁӢиҜӯиЁҖзҗҶи®әпјҲPLTпјүжҳҜи®Ўз®—жңәз§‘еӯҰзҡ„дёҖдёӘеҲҶж”ҜпјҢж¶үеҸҠзј–зЁӢиҜӯиЁҖеҸҠе…¶еҗ„иҮӘзү№жҖ§зҡ„и®ҫи®ЎгҖҒе®һзҺ°гҖҒеҲҶжһҗгҖҒиЎЁеҫҒе’ҢеҲҶзұ»гҖӮ\n\
    \n### е…је…·й«ҳз”ҹдә§еҠӣзҡ„йқҷжҖҒзұ»еһӢиҜӯиЁҖ\n\nGo жҳҜдёҖз§ҚйқҷжҖҒзұ»еһӢзј–зЁӢиҜӯиЁҖпјҢе…¶иҜӯжі•еӨ§иҮҙжәҗиҮӘ C иҜӯиЁҖгҖӮдёҺ C е’Ң C++ зұ»дјјпјҢе®ғеҺҹз”ҹзј–иҜ‘дёәжңәеҷЁз ҒпјҢеӣ жӯӨж— йңҖеҚіж—¶пјҲJITпјүзј–иҜ‘еҚіеҸҜиҝҗиЎҢзЁӢеәҸгҖӮпјҲJava\
    \ е’Ң C# зӯүзј–зЁӢиҜӯиЁҖдҪҝз”Ё JIT зј–иҜ‘жқҘиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮпјү\n\nеңЁзј–еҶҷеә”з”ЁзЁӢеәҸж—¶пјҢеҠЁжҖҒзұ»еһӢиҜӯиЁҖжҸҗдҫӣдәҶе·ЁеӨ§зҡ„з”ҹдә§еҠӣе’ҢиЎЁзҺ°еҠӣпјҢеӣ дёәдҪ ж— йңҖжӢ…еҝғжүҖдҪҝз”ЁеҸҳйҮҸзҡ„ж•°жҚ®зұ»еһӢгҖӮеңЁеҠЁжҖҒзұ»еһӢиҜӯиЁҖдёӯпјҢиЎЁиҫҫејҸзҡ„зұ»еһӢд»…еңЁиҝҗиЎҢж—¶жүҚиғҪзЎ®е®ҡпјҢиҝҷдҪҝеҫ—иҜӯжі•еұӮйқўе…·жңүжӣҙй«ҳж°ҙе№ізҡ„з”ҹдә§еҠӣе’ҢиЎЁзҺ°еҠӣпјҢиғҪеӨҹеҝ«йҖҹжһ„е»әеә”з”ЁпјҢе°Өе…¶жҳҜ\
    \ Web еә”з”ЁгҖӮдҪҶеңЁдҪҝз”ЁеҠЁжҖҒзұ»еһӢиҜӯиЁҖж—¶пјҢеә”з”Ёзҡ„жҖ§иғҪдёҺеҸҜз»ҙжҠӨжҖ§дјҡеҸ—еҲ°еҪұе“ҚгҖӮжңүж—¶пјҢз”ЁеҠЁжҖҒзұ»еһӢиҜӯиЁҖзј–еҶҷзҡ„еә”з”ЁпјҢе…¶и°ғиҜ•дҪ“йӘҢдјҡеӣ зјәд№Ҹзұ»еһӢе®үе…ЁиҖҢеҸҳеҫ—йқһеёёеӣ°йҡҫгҖӮеҚідҫҝеңЁд»ҠеӨ©пјҢејҖеҸ‘иҖ…д»ҚдјҡдҪҝз”ЁйқҷжҖҒзұ»еһӢиҜӯиЁҖдёәе…¶еҠЁжҖҒзұ»еһӢиҜӯиЁҖз”ҹжҲҗд»Јз ҒгҖӮдҫӢеҰӮпјҢJavaScript\
    \ ејҖеҸ‘иҖ…дјҡдҪҝз”Ёеҫ®иҪҜ TypeScript иҝҷж ·зҡ„йқҷжҖҒзұ»еһӢиҜӯиЁҖжқҘзЎ®дҝқзұ»еһӢе®үе…ЁпјҢжңҖз»ҲеҶҚзј–иҜ‘дёә JavaScript д»Јз ҒгҖӮ\n\nе°Ҫз®ЎйқҷжҖҒзұ»еһӢиҜӯиЁҖиғҪжҸҗдҫӣзұ»еһӢе®үе…Ёе’ҢжҖ§иғҪпјҢдҪҶдҪҝз”Ёе®ғд»¬еҸҜиғҪдјҡеҪұе“Қеә”з”ЁејҖеҸ‘зҡ„з”ҹдә§еҠӣпјҢе№¶дё”зј–иҜ‘еӨ§еһӢзЁӢеәҸеҸҜиғҪиҖ—ж—¶еҫҲй•ҝгҖӮеҰӮжһңиғҪжңүдёҖз§ҚиҜӯиЁҖпјҢе…је…·йқҷжҖҒзұ»еһӢиҜӯиЁҖе’ҢеҠЁжҖҒзұ»еһӢиҜӯиЁҖзҡ„дјҳеҠҝпјҢе°ҶйқҷжҖҒзұ»еһӢиҜӯиЁҖзҡ„жҖ§иғҪдёҺзұ»еһӢе®үе…ЁеҗҢеҠЁжҖҒзұ»еһӢиҜӯиЁҖзҡ„з”ҹдә§еҠӣиһҚдёәдёҖдҪ“пјҢйӮЈе°ҶжҳҜеҶҚеҘҪдёҚиҝҮдәҶгҖӮ\n\
    \nGo жӯЈжҳҜиҝҷж ·дёҖз§Қе®ҢзҫҺзҡ„иһҚеҗҲпјҡе®ғе…је…·йқҷжҖҒзұ»еһӢиҜӯиЁҖзҡ„ејәеӨ§иғҪеҠӣдёҺеҠЁжҖҒзұ»еһӢиҜӯиЁҖзҡ„й«ҳз”ҹдә§еҠӣгҖӮGo еҸҜд»Ҙиў«з§°дҪңдёҖз§ҚзҺ°д»Ј C иҜӯиЁҖпјҢе®ғдёҚд»…зј–иҜ‘йҖҹеәҰжҜ” C жӣҙеҝ«пјҢиҝҳе…је…·дәҶеҠЁжҖҒзұ»еһӢиҜӯиЁҖзҡ„й«ҳз”ҹдә§еҠӣгҖӮ\n"
- fmt: '### Concurrency Is a Built-In Feature at the Language Level


    Computer hardware has evolved to have many CPU cores and more power, but the power
    of modern computers cannot be leveraged by using the current programming languages
    and tools. When production applications are run on high-powered servers, there
    are performance problems, even though CPU utilization is very low. In some programming
    environments, concurrency and parallelism are available for better efficiency
    and performance, but these features are available as a separate library and framework,
    not as a built-in feature at the language level, which adds more complexity when
    you write concurrent applications.


    In Go, concurrency is built into the language and is designed for writing high-performance
    concurrent applications for modern computers. Concurrency is one of the unique
    features of the Go language and it is considered a major selling point. GoвҖҷs concurrency
    is implemented using two unique features: goroutines and channels. A `goroutine`
    is a function that can run concurrently with other goroutines. It is a lightweight
    thread of execution in which many goroutines execute in a single thread that enables
    more program performance and efficiency. The most important feature of `goroutine`
    is that it is managed and executed by Go runtime. Many programming languages provide
    support for writing concurrent programs, but they are limited only to communication
    and synchronization among the threads being executed. And most of the existing
    languages provide support for concurrency through a framework, but not a built-in
    feature in the language, so it makes restrictions when concurrency is implemented
    with these languages.


    Go provides channels that enable communication between goroutines and the synchronization
    of their executions. With channels, you can send data from one goroutine to another.
    Channels also provide a greater level of synchronization between goroutines and
    ensure that two goroutines are running in a known state. Concurrency is a major
    reason for adopting Go as the language for building highly efficient software
    systems with greater levels of performance.


    ### Go Compiles Programs Quickly


    One of the challenges of writing C and C++ applications is the time needed for
    compiling programs, which is very painful for developers when they work on larger
    C and C++ applications. Go is a language designed for solving the programming
    challenges of existing programming environments. Its compiler is very efficient
    for compiling programs quickly; a large Go application can be compiled in few
    seconds, which is attractive to many C and C++ developers who switch to the Go
    programming environment.


    ### Go as a General-Purpose Language


    Different programming languages are used to develop different kinds of applications.
    C and C++ have been widely used for systems programming and for systems in which
    performance is very critical. At the same time, working with C and C++ affect
    the productivity of application development. Some other programming languages,
    such as Ruby and Python, offer rapid application development that enables better
    productivity. Although the server-side JavaScript platform `Node.js` is good for
    building lightweight JSON APIs and real-time applications, it gets a fail when
    CPU-intensive programming tasks are executed. Another set of programming languages
    is used for building native mobile applications. Programming languages such as
    Objective C and Swift are restricted for use only with mobile application development.
    Various programming languages are used for a variety of use cases, such as systems
    programming, distributed computing, web application development, enterprise applications,
    and mobile application development.


    The greatest practical benefit of using Go is that it can be used to build a variety
    of applications, including systems that require high performance, and also for
    rapid application development scenarios. Although Go was initially designed as
    a systems programming language, it is also used for developing enterprise business
    applications and powerful back-end servers. Go provides high performance while
    keeping high productivity for application development, thanks to its minimalistic
    and pragmatic design. The Go ecosystem (which includes Go tooling, the Go standard
    library, and the Go third-party library) provides essential tools and libraries
    for building a variety of Go applications. The Go Mobile project adds support
    for building native mobile applications for both Android and iOS platforms, enabling
    more opportunities with Go.


    In the era of cloud computing, Go is a modern programming language that can be
    used to build system-level applications; distributed applications; networking
    programs; games; web apps; RESTful services; back-end servers; native mobile applications;
    and cloud-optimized, next-generation applications. Go is the choice of many revolutionary
    innovative systems such as Docker and Kubernetes. A majority of tools on the software
    containerization ecosystem are being written in Go.


    > **Note**: Docker is a revolutionary software container platform, and Kubernetes
    is a container cluster manager. Both are written in Go.


    ## Go Ecosystem


    Go is not just a simple programming language; it is also an ecosystem that provides
    essential tools and features for writing a variety of efficient software systems.
    The Go ecosystem contains the following components:


    - Go language

    - Go libraries

    - Go tooling


    Go language provides essential syntax and features that allows you to write your
    programs. These programs leverage libraries for reusable pieces of functionality
    and tooling for formatting code, compiling code, running tests, installing programs,
    and creating documentations.


    Libraries play a key role in the Go ecosystem because Go is designed to be a modular
    programming language for writing highly maintainable and composable applications.
    Libraries provide reusable pieces of functionality distributed as packages. You
    can use packages in Go to write software components in a modular and reusable
    manner to be shared across Go programs, and can easily maintain your applications.
    The design philosophy of a Go application is to write small pieces of software
    components through packages and then compose Go applications with these smaller
    packages. Libraries are available from the standard library and third-party libraries.
    When you install Go packages from the standard library, they are installed into
    the Go installation directory. When you install Go, the environment variable `GOROOT`
    will be automatically added to your system for specifying the Go installation
    directory. The standard library includes a larger set of packages that provide
    a wide range of functionality for writing real-world applications. For example,
    `"net/http"`, a package from the standard library, can be used to write powerful
    web application and RESTful services.


    > **Note**: For documentation about packages from the standard library, go to
    [http://golang.org/pkg/](http://golang.org/pkg/).


    If you need extra functionality not available from the Go standard library, you
    can leverage third-party libraries provided by the Go developer community, which
    is very enthusiastic about developing and providing many useful third-party Go
    packages. For example, if you want to work with the MongoDB database, you can
    leverage a third-party package called `"mgo"`.


    Go tooling is an important component in the Go ecosystem, which provides a number
    of tooling-support services: building, testing, and installing Go programs; formatting
    Go code; creating documentation; fetching and installing Go packages; and so on.'
