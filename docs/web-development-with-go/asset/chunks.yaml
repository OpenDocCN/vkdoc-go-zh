    , controllers.GetNotesByTask).Methods(\"GET\")`\n`noteRouter.HandleFunc(\"/notes/{id}\"\
    , controllers.DeleteNote).Methods(\"DELETE\")`\n`router.PathPrefix(\"/notes\"\
    ).Handler(negroni.New(`\n    `negroni.HandlerFunc(common.Authorize),`\n    `negroni.Wrap(noteRouter),`\n\
    `))`\n\n---\n\n### JSON Resource Models\n\nListing [9-21](#A978-1-4842-1052-9_9_Chapter.html#FPar22)\
    \ provides the resource models for representing the JSON data for sending and\
    \ receiving messages with the `Notes` resource:\n\n**Listing 9-21.**  JSON Resources\
    \ for Working with `\"/notes\"` in `resources.go`\n\n```go\n//Models for JSON\
