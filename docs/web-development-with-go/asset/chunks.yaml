    \ еҜ№иұЎпјҡ\n\n```\nfunc NewDataStore() *DataStore {\n\tds := &DataStore{\n\t\tsession:\
    \ session.Copy(),\n\t}\n\treturn ds\n}\n```\n\nи°ғз”Ё `NewDataStore` еҮҪж•°жқҘеҲӣе»әдёҖдёӘ `DataStore`\
    \ еҜ№иұЎпјҢд»Ҙдҫҝдёә HTTP иҜ·жұӮзҡ„з”ҹе‘Ҫе‘ЁжңҹжҸҗдҫӣеӨҚеҲ¶зҡ„ `Session` еҜ№иұЎгҖӮеҜ№дәҺжҜҸдёӘи·Ҝз”ұзҡ„еӨ„зҗҶзЁӢеәҸпјҢйғҪйҖҡиҝҮ `DataStore` зұ»еһӢдҪҝз”ЁдёҖдёӘж–°зҡ„ `Session`\
    \ еҜ№иұЎгҖӮз®ҖиҖҢиЁҖд№ӢпјҢдҪҝз”Ёе…ЁеұҖ `Session` еҜ№иұЎе№¶йқһиүҜеҘҪе®һи·өпјӣжҺЁиҚҗеҒҡжі•жҳҜдёәжҜҸдёӘ HTTP иҜ·жұӮзҡ„з”ҹе‘Ҫе‘ЁжңҹдҪҝз”ЁдёҖдёӘеӨҚеҲ¶зҡ„ `Session` еҜ№иұЎгҖӮиҝҷз§Қж–№жі•е…Ғи®ёдҪ еңЁйңҖиҰҒж—¶жӢҘжңүеӨҡдёӘ\
    \ `Session` еҜ№иұЎгҖӮ\n\n## жҖ»з»“\n\nеңЁејҖеҸ‘ Web еә”з”Ёж—¶пјҢе°Ҷеә”з”Ёж•°жҚ®жҢҒд№…еҢ–еҲ°жҢҒд№…еҢ–еӯҳеӮЁдёӯйқһеёёйҮҚиҰҒгҖӮеңЁжң¬з« дёӯпјҢдҪ еӯҰд№ дәҶеҰӮдҪ•дҪҝз”Ё `mgo`\
    \ еҢ…пјҲдёҖдёӘ Go иҜӯиЁҖзҡ„ MongoDB й©ұеҠЁзЁӢеәҸпјүе°Ҷж•°жҚ®жҢҒд№…еҢ–еҲ° MongoDB дёӯгҖӮ\n\nMongoDB жҳҜдёҖдёӘејҖжәҗж–ҮжЎЈж•°жҚ®еә“пјҢжҸҗдҫӣй«ҳжҖ§иғҪгҖҒй«ҳеҸҜз”ЁжҖ§е’ҢиҮӘеҠЁжү©еұ•иғҪеҠӣгҖӮMongoDB\
    \ жҳҜжңҖжөҒиЎҢзҡ„ NoSQL ж•°жҚ®еә“пјҢе·Іиў«зҺ°д»Ј Web еә”з”Ёе№ҝжіӣдҪҝз”ЁгҖӮ`mgo` й©ұеҠЁзЁӢеәҸжҸҗдҫӣдәҶдёҖдёӘйҒөеҫӘ Go иҜӯиЁҖд№ жғҜзҡ„з®ҖеҚ• APIгҖӮ\n\nдҪ еҸҜд»Ҙдёә MongoDB\
    \ йӣҶеҗҲзҡ„еӯ—ж®өж·»еҠ зҙўеј•пјҢд»ҺиҖҢдёәиҜ»ж“ҚдҪңжҸҗдҫӣй«ҳжҖ§иғҪгҖӮеңЁ Go иҜӯиЁҖдёӯејҖеҸ‘ Web еә”з”Ёж—¶пјҢдҪҝз”Ёе…ЁеұҖ `mgo.Session` еҜ№иұЎе№¶йқһиүҜеҘҪе®һи·өгҖӮз®ЎзҗҶ `Session`\
    \ зҡ„жӯЈзЎ®ж–№жі•жҳҜпјҢеҜ№йҖҡиҝҮ `mgo` еҢ…зҡ„ `Dial` ж–№жі•иҺ·еҸ–зҡ„ `Session` еҜ№иұЎи°ғз”Ё `Copy`гҖҒ`Clone` жҲ– `New` жқҘеҲӣе»әдёҖдёӘж–°зҡ„\
    \ `Session` еҜ№иұЎгҖӮ\n\nдёӢдёҖз« е°ҶиҝӣдёҖжӯҘеұ•зӨәеҰӮдҪ•дҪҝз”Ё `mgo` еҢ…ж“ҚдҪң MongoDB ж•°жҚ®еә“гҖӮ\n\n# жһ„е»ә RESTful жңҚеҠЎ\n\n\
    еүҚеҮ з« и®Ёи®әдәҶжһ„е»әеҹәдәҺ Web зҡ„зі»з»ҹж¶үеҸҠзҡ„еҗ„дёӘж–№йқўпјҢеҢ…жӢ¬дҪҝз”Ё `http` еҢ…зҡ„ Go Web зј–зЁӢеҹәзЎҖгҖҒз”ЁдәҺжёІжҹ“ UI зҡ„ `html/template`\
