    In the `getNotes` handler function, the `renderTemplate` helper function is called
    for rendering the `Index` page. To call `renderTemplate`, the `http.ResponseWriter`
    object is provided as the `io.Writer`, the `index` for getting the parsed template
    for executing the `Index` page, the `base` for specifying the template definition
    to be executed, and the map object as the data object to apply to the template
    definitions.


    When `templates["index"]` is called, you get the compiled template that was parsed
    by using the template definition files `index.html` and `base.html`. The `base`
    template definition is finally executed from the parsed template that is a nested
    template in which it takes the template definition from `head` and `page` defined
    in the `index.html` file.


