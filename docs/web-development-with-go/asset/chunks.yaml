    `return r`


    `}`


    The HTTP handler functions are refactored to obtain a parameter value that implements
    the persistence logic. The handler functions return an `http.Handler` by calling
    `http.HandlerFunc`. The handler functions have a parameter of `UserRepository`
    type, which is an interface defined in the `repository.go` file. Because it is
    an interface, you can provide any concrete implementation for this type. For example,
    you can provide implementations of the `UserRepository` type for application code
    and for automated tests separately, which provides better code testability. For
    application code, you can provide an implementation of the `UserRepository` interface
    to implement the persistence logic on a real database. But when you call handler
    functions from automated tests, you can provide a fake implementation of the `UserRepository`
    interface to mimic the functionality when you donвҖҷt need to hit the real database.
    When you write tests, you may need to mock the interfaces in many places like
    this one.


