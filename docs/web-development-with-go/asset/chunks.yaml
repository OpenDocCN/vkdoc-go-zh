    `negroni.NewStatic(http.Dir("public")),`


    `)`


    Negroni provides a very simple and elegant library to work with HTTP middleware
    functions. This is a very tiny library, but really helpful when you build real-world
    web applications and RESTful services in Go. One of the major advantages of `Negroni`
    is that it is fully compatible with the `net/http` library. If you donвҖҷt like
    to use full-fledged web development frameworks to build web applications in Go,
    making and using HTTP middleware with `Negroni` is a good choice for building
    efficient web applications, which helps you to achieve better reusability and
    maintainability.


    ## Sharing Values Among Middleware


    In the previous sections, you learned how to make and use HTTP middleware in Go.
    The example middleware was running independently without depending on any data
    from other middleware handlers and application handlers. In some cases, however,
    you may need to provide values to the next middleware or share values between
    middleware handlers and application handlers. For example, when you authorize
    to an application through a middleware handler function, it may need to provide
    some user-specific values to the next handler in the request-handling cycle.


    ### Using Gorilla context


    Many third-party packages are available for store values to be shared during a
    request lifetime. The `context` package from the Gorilla web toolkit is a great
    choice that can be used for sharing values during a request lifetime.


    To install `context`, run the following command in the terminal:


    `$ go get github.com/gorilla/context`


    To work with the `context` package, the `github.com/gorilla/context` package must
    be added to the import list:


