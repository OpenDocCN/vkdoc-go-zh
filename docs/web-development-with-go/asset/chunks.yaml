    The application has been tested in the local web development server provided by
    Google App Engine SDK for Go. You can deploy the Cloud Endpoints application into
    the production environment of App Engine using the `goapp` tool. Deploying a Cloud
    Endpoints application into a production environment is exactly the same process
    as that of a normal App Engine application. You must provide the application ID
    in the `app.yaml` file to deploy the application. Section 11.4.4 provides instructions
    for creating a project in Google Developer Console and getting an application
    ID. To deploy the application into production, run the `goapp` tool from the `root`
    directory of the application:


    `goapp deploy`


    This command deploys the Cloud Endpoints application into the App Engine production
    environment, powered by the Google Cloud platform.


    #### Generating Client Libraries


    The Cloud Endpoints application not only supports writing back-end APIs but also
    provides useful capabilities to client applications. Cloud Endpoints allows you
    to generate client libraries for accessing APIs from client applications and generates
    native libraries for iOS, Android, Dart, and JavaScript.


    To generate a client library for the tasks API for iOS, run the following command
    on the terminal window:


    `# Use the rpc suffix in the URL:`


    `$ URL=вҖҷ` [`https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rpc`](https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rpc)
    `вҖҷ`


    `$ curl -s $URL > tasks.rpc.discovery`


    Here, `"app-id"` is the application ID of the App Engine application.


    To generate a client library for the tasks API for Android, run the following
    command on the terminal window:


    `# Use the rest suffix in the URL`


    `$ URL=вҖҷ` [`https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rest`](https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rest)
    `вҖҷ`


    `$ curl -s $URL > tasks.rest.discovery`


    `$ endpointscfg.py gen_client_lib java tasks.rest.discovery`


    The `endpointscfg.py` tool is run from the `go_appengine` directory (the directory
    of the Google App Engine SDK for Go) to generate the Java library for Android
    applications. It should generate a zip file named `tasks.rest.zip`.


    ## Summary


    Go is a programming language designed to work with modern hardware and IT infrastructures
    to build massively scalable applications. Go is a perfect language choice for
    building scalable applications in the Cloud computing era. With the Google Cloud
    platform, Go developers can easily build massively scalable applications on the
    Cloud by leveraging the tools and APIs provided by the Google Cloud platform.


    Google Cloud provides App Engine, a Platform as a Service (PaaS) offering that
    lets Go developers build highly scalable and reliable web applications using the
    App Engine SDK for Go and Go APIs to various Cloud services. When you build App
    Engine applications, you donвҖҷt need to spend time managing the IT infrastructure.
    Instead, you can fully focus on building your application, which is available
    for automatic scaling whenever there is a need to increase computing resources.
    With App Engine, developers are freed from system administration, load balancing,
    scaling, and server maintenance.


    App Engine SDK for Go provides the `goapp` tool that allows you to test the App
    Engine application in a development web server. The `goapp` tool can also be used
    for deploying App Engine web applications into the Google Cloud production environment
    that runs on the App Engine sandbox environment.


    The App Engine environment provides a `main` package, so you canвҖҷt use a package
    called `main`. Instead, you can write HTTP handler logic in the package of your
    choice. App Engine applications easily access many Cloud services provided by
    the Google Cloud platform. When you leverage many of Cloud services from your
    App Engine application, you donвҖҷt need to configure these services to be used
    with App Engine because you can directly access them from your application by
    using the corresponding Go API.'
