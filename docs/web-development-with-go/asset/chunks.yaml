    В В В В `}`


    В В В В `templates["index"] = template.Must(template.ParseFiles("templates/index.html",
    "templates/base.html"))`


    В В В В `templates["add"] = template.Must(template.ParseFiles("templates/add.html",
    "templates/base.html"))`


    В В В В `templates["edit"] = template.Must(template.ParseFiles("templates/edit.html",
    "templates/base.html"))`


    `}`


    For each content page, the appropriate content file is parsed along with `base.html`.


    Listing [5-13](#A978-1-4842-1052-9_5_Chapter.html#FPar13) is a helper function
    that renders individual web pages.


    Listing 5-13.В В Helper Function that Renders Templates in main.go


    `//Render templates for the given name, template definition and data object`


    `func renderTemplate(w http.ResponseWriter, name string, template string, viewModel
    interface{}) {`


    В В В В `// Ensure the template exists in the map.`


    В В В В `tmpl, ok := templates[name]`


