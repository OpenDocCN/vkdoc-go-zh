    Listing 9-17.В В Data Persistence Logic for User Entity in userRepository.go


    `package data`


    `import (`


    `"github.com/shijuvar/go-web/taskmanager/models"`


    `"golang.org/x/crypto/bcrypt"`


    `"gopkg.in/mgo.v2"`


