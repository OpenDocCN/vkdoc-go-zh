    \ `net/http` еӨ„зҗҶеҷЁпјҢеҗҢж—¶жҸҗдҫӣдәҶдёҖз§ҚеӨ„зҗҶ HTTP дёӯй—ҙд»¶еҮҪж•°зҡ„ж–№ејҸгҖӮ\n\nдёҠдёҖиҠӮи®Ёи®әдәҶ `Alice` еҢ…пјҢе®ғйқһеёёйҖӮеҗҲй“ҫжҺҘдёӯй—ҙд»¶еӨ„зҗҶеҷЁгҖӮ`Negroni`\
    \ жҸҗдҫӣдәҶдёҖз§ҚдёҚеҗҢзҡ„ж–№жі•пјҢд»Ҙз®ҖеҚ•дё”йқһдҫөе…Ҙзҡ„ж–№ејҸеӨ„зҗҶ HTTP дёӯй—ҙд»¶еҮҪж•°гҖӮеҰӮжһңдҪ жӣҙе–ңж¬ўдҪҝз”Ё `Alice` жқҘеӨ„зҗҶдёӯй—ҙд»¶еҮҪж•°пјҢеҸҜд»Ҙз»§з»ӯдҪҝз”Ёе®ғпјҢеӣ дёә `Alice`\
    \ е’Ң `Negroni` йғҪз”Ёз•ҘжңүдёҚеҗҢзҡ„ж–№ејҸи§ЈеҶідәҶзӣёеҗҢзҡ„й—®йўҳгҖӮ`Negroni` жҸҗдҫӣдәҶдёҖдёӘеҠҹиғҪе®ҢеӨҮзҡ„еә“жқҘеӨ„зҗҶдёӯй—ҙд»¶еҮҪж•°пјҢе…¶дёӯиҝҳйҷ„еёҰдәҶдёҖдәӣеёёи§Ғзҡ„дёӯй—ҙд»¶еҮҪж•°пјҢз”ЁдәҺи®°еҪ•иҜ·жұӮгҖҒеҺӢзј©е“Қеә”гҖҒжҸҗдҫӣйқҷжҖҒж–Үд»¶жңҚеҠЎеҷЁд»ҘеҸҠд»ҺжҒҗж…ҢдёӯжҒўеӨҚгҖӮ\n\
    \n`Negroni` е…Ғи®ёдҪ еңЁе…ЁеұҖзә§еҲ«й…ҚзҪ®дёӯй—ҙд»¶еҮҪж•°пјҢд»ҘдҫҝдёҺжүҖжңүеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁдёҖиө·дҪҝз”ЁгҖӮдҪ д№ҹеҸҜд»Ҙй…ҚзҪ®дёӯй—ҙд»¶еҮҪж•°д»Ҙз”ЁдәҺзү№е®ҡзҡ„еӨ„зҗҶеҷЁгҖӮеҪ“дҪ еҜ№жүҖжңүеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁдҪҝз”Ёдёӯй—ҙд»¶еҮҪж•°ж—¶пјҢж— йңҖдёәжҜҸдёӘеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁеҚ•зӢ¬й…ҚзҪ®гҖӮзӣёеҸҚпјҢдҪ еҸӘйңҖдҪҝз”Ё\
    \ `Negroni` й…ҚзҪ®иҜҘдёӯй—ҙд»¶еҮҪж•°пјҢ`Negroni` дјҡе°Ҷй…ҚзҪ®зҡ„дёӯй—ҙд»¶еҮҪж•°еҢ…иЈ…еҲ°жүҖжңүеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁдёӯгҖӮдҪ д№ҹеҸҜд»Ҙй…ҚзҪ®дёҖдәӣдёӯй—ҙд»¶еҮҪж•°пјҢдҪҝе…¶д»…дёҺжҹҗдәӣзү№е®ҡзҡ„еә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁдёҖиө·жү§иЎҢгҖӮ\n\
    \n### Negroni е…Ҙй—Ё\n\n`Negroni` дёәдҪҝз”Ёдёӯй—ҙд»¶еӨ„зҗҶеҷЁжҸҗдҫӣдәҶдёҖдёӘз®ҖеҚ•зҡ„зј–зЁӢжЁЎеһӢгҖӮеҪ“дҪ дҪҝз”Ёе®ғж—¶пјҢиҝҳеҸҜд»ҘдҪҝз”Ёе…¶й»ҳи®Өзҡ„дёӯй—ҙд»¶еҮҪж•°гҖӮи®©жҲ‘д»¬е®үиЈ…е№¶зј–еҶҷдёҖдёӘз®ҖеҚ•зҡ„зЁӢеәҸпјҢејҖе§ӢдҪҝз”Ё\
    \ `Negroni` еҢ…гҖӮ\n"
- fmt: "### Installing Negroni\n\nTo install `Negroni`, run the following command\
    \ in the terminal:\n\n`$ go get github.com/codegangsta/negroni`\n\nTo work with\
    \ the `Negroni` package, the `github.com/codegangsta/negroni` package must be\
    \ added to the import list:\n\n`import \"github.com/codegangsta/negroni\"`\n\n\
    Listing [6-8](#A978-1-4842-1052-9_6_Chapter.html#FPar8) is an example program\
    \ using `Negroni`:\n\n**Listing 6-8.** Simple HTTP Server with Negroni\n\n```\n\
    package main\n\nimport (\n    \"fmt\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
    \n)\n\nfunc index(w http.ResponseWriter, req *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome!\")\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n    mux.HandleFunc(\"\
    /\", index)\n    n := negroni.Classic()\n    n.UseHandler(mux)\n    n.Run(\":8080\"\
    )\n}\n```\n\nIn this program, you donвҖҷt use your own middleware functions; you\
    \ simply run an HTTP server with the `Negroni` default middleware functions. A\
    \ `Negroni` instance is created by calling the `negroni.Classic` function.\n\n\
    When a `Negroni` instance is created with the `Classic` function, it provides\
    \ the following built-in middleware functions, which are useful for most web applications:\n\
    \n*   `negroni.Recovery`: Panic recovery middleware\n*   `negroni.Logging`: Request/response\
    \ logging middleware\n*   `negroni.Static`: Static file serving under the `\"\
    public\"` directory\n\n`Negroni` instances can also be created by calling the\
    \ `negroni.New` function, which returns a new `Negroni` instance without any middleware\
    \ preconfigured:\n\n`n := negroni.New()`\n\nThe `Run` method of a `Negroni` instance\
    \ is a convenience function that runs the `Negroni` stack as an HTTP server. The\
    \ address string takes the same format as `http.ListenAndServe`:\n\n`n.Run(\"\
    :8080\")`\n\n### Routing with Negroni\n\nThe `UseHandler` method of a `Negroni`\
    \ instance allows you to provide your own `http.Handler` onto the middleware stack.\n\
    \nListing [6-9](#A978-1-4842-1052-9_6_Chapter.html#FPar9) is an example program\
    \ that uses Gorilla `mux` as the request multiplexer with the `Negroni` package.\n\
    \n**Listing 6-9.** Simple HTTP Server with Negroni and Gorilla mux\n\n```\npackage\
    \ main\n\nimport (\n    \"fmt\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
    \n    \"github.com/gorilla/mux\"\n)\n\nfunc index(w http.ResponseWriter, req *http.Request)\
    \ {\n    fmt.Fprintf(w, \"Welcome!\")\n}\n\nfunc main() {\n    router := mux.NewRouter()\n\
    \    router.HandleFunc(\"/\", index)\n    n := negroni.Classic()\n    n.UseHandler(router)\n\
    \    n.Run(\":8080\")\n}\n```\n\nThe Gorilla `mux.Router` object is provided as\
    \ the handler to be used with `Negroni`. You can provide any object of the `http.Handler`\
    \ interface to the `UseHandler` method of the `Negroni` instance.\n\n### Registering\
    \ Middleware\n\n`Negroni` manages middleware flow through the `negroni.Handler`\
    \ interface.\n\nListing [6-10](#A978-1-4842-1052-9_6_Chapter.html#FPar10) shows\
    \ the definition of the `negroni.Handler` interface:\n\n**Listing 6-10.** `negroni.Handler`\
    \ Interface\n\n```\ntype Handler interface {\n  ServeHTTP(rw http.ResponseWriter,\
    \ r *http.Request, next http.HandlerFunc)\n}\n```\n\nListing [6-11](#A978-1-4842-1052-9_6_Chapter.html#FPar11)\
    \ provides the pattern for writing middleware handler functions for `Negroni`\
    \ to work with the `negroni.Handler` interface.\n\n**Listing 6-11.** `negroni.Handler`\
    \ Interface\n\n```\nfunc myMiddleware(w http.ResponseWriter, r *http.Request,\
    \ next http.HandlerFunc) {\n  // logic before executing the next handler\n  next(w,\
    \ r)\n  // logic after running next the handler\n}\n```\n\nThe function signature\
    \ of a `Negroni`-compatible middleware function is different from the functions\
    \ written in the previous sections. The Negroni middleware stack uses the following\
    \ signature to write middleware functions:\n\n`func myMiddleware(w http.ResponseWriter,\
    \ r *http.Request, next http.HandlerFunc)`\n\nHere you can call the next handler\
    \ in the middleware stack by invoking the `http.HandlerFunc` object by passing\
    \ the values of the `http.ResponseWriter` object and the `*http.Request` object:\n\
    \n```\n// logic before executing the next handler\n  next(w, r)\n  // logic after\
    \ running next the handler\n```\n\nYou can map the middleware function to the\
    \ `Negroni` handler chain with the `Use` function, which takes an argument of\
    \ `negroni.Handler`. The `Use` function adds a `negroni.Handler` into the middleware\
    \ stack (see Listing [6-12](#A978-1-4842-1052-9_6_Chapter.html#FPar12)). Handlers\
    \ are invoked in the order in which they are added to a `Negroni` instance.\n\n\
    **Listing 6-12.** Registering a Middleware Function with Negroni\n\n```\nn :=\
    \ negroni.New()\nn.Use(negroni.HandlerFunc(myMiddleware))\n```\n\nThe middleware\
    \ function is converted into a `negroni.HandlerFunc` type and added to the `Negroni`\
    \ middleware stack. `HandlerFunc` is an adapter that allows ordinary functions\
    \ to be used as `Negroni` handlers.\n\n### Registering Middleware for Specific\
    \ Routes\n\nWhen middleware functions such as logging are used, they might be\
    \ decorated with across-the-application handlers. But you may need to use middleware\
    \ functions for some specific routes; for example, you might want to apply some\
    \ middleware functions to be executed with some specific application handlers\
    \ that will be accessible to an administrator user account. In this context, you\
    \ can create a new `Negroni` instance and use it as your route handler.\n\nListing\
    \ [6-13](#A978-1-4842-1052-9_6_Chapter.html#FPar13) is the code block that applies\
    \ middleware functions to be used with some specific routes.\n\n**Listing 6-13.**\
    \ Registering Middleware Handlers for Specific Routes\n\n```\nrouter := mux.NewRouter()\n\
    adminRoutes := mux.NewRouter()\n\n// add admin routes here\n\n// Create a new\
    \ negroni for the admin middleware\nrouter.Handle(\"/admin\", negroni.New(\n \
    \ Middleware1,\n  Middleware2,\n  negroni.Wrap(adminRoutes),\n))\n```"
