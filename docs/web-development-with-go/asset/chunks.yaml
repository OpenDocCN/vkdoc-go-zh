    \ 4пјүгҖӮ\n\n# еҲҮзүҮ\n\nеҲҮзүҮжҳҜдёҖз§ҚдёҺж•°з»„йқһеёёзӣёдјјзҡ„ж•°жҚ®з»“жһ„пјҢдҪҶжІЎжңүжҢҮе®ҡй•ҝеәҰгҖӮе®ғжҳҜеңЁж•°з»„зұ»еһӢд№ӢдёҠжһ„е»әзҡ„дёҖз§ҚжҠҪиұЎпјҢжҸҗдҫӣдәҶдёҖз§Қжӣҙж–№дҫҝзҡ„ж–№ејҸжқҘеӨ„зҗҶйӣҶеҗҲгҖӮдёҺеёёи§„ж•°з»„дёҚеҗҢпјҢеҲҮзүҮжҳҜеҠЁжҖҒж•°з»„пјҢе…¶й•ҝеәҰеҸҜд»ҘеңЁеҗҺз»ӯйҳ¶ж®өйҡҸзқҖж•°жҚ®зҡ„еўһеҠ жҲ–еҮҸе°‘иҖҢж”№еҸҳгҖӮеҪ“иҰҒеӯҳеӮЁеңЁйӣҶеҗҲдёӯзҡ„е…ғзҙ ж•°йҮҸж— жі•йў„жөӢж—¶пјҢеҲҮзүҮжҳҜйқһеёёжңүз”Ёзҡ„ж•°жҚ®з»“жһ„гҖӮ\n\
    \nеңЁз”Ё Go ејҖеҸ‘еә”з”ЁзЁӢеәҸж—¶пјҢдҪ з»ҸеёёдјҡеңЁд»Јз ҒдёӯзңӢеҲ°еҲҮзүҮгҖӮеҰӮжһңдҪ жғіиҜ»еҸ–ж•°жҚ®еә“иЎЁе№¶е°Ҷж•°жҚ®ж”ҫе…ҘйӣҶеҗҲзұ»еһӢдёӯпјҢиҜ·дҪҝз”ЁеҲҮзүҮиҖҢдёҚжҳҜж•°з»„пјҢеӣ дёәдҪ ж— жі•йў„жөӢйӣҶеҗҲзҡ„й•ҝеәҰгҖӮеҲҮзүҮжҸҗдҫӣдәҶдёҖдёӘеҗҚдёә\
    \ `append` зҡ„еҶ…зҪ®еҮҪж•°пјҢеҸҜд»Ҙеҝ«йҖҹең°е°Ҷе…ғзҙ иҝҪеҠ еҲ°еҲҮзүҮдёӯгҖӮ\n\nжё…еҚ• 2-16 жҳҜдёҖдёӘеЈ°жҳҺз©әеҲҮзүҮпјҲnil sliceпјүзҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 2-16.**\
    \ еЈ°жҳҺз©әеҲҮзүҮ\n\n```\nvar x []int\n```\n\nеЈ°жҳҺдәҶдёҖдёӘеҲҮзүҮ `x`пјҢжІЎжңүжҢҮе®ҡй•ҝеәҰгҖӮиҝҷе°ҶеҲӣе»әдёҖдёӘй•ҝеәҰдёәйӣ¶зҡ„ж•ҙж•°з©әеҲҮзүҮгҖӮз”ұдәҺеҲҮзүҮжҳҜеҠЁжҖҒж•°з»„пјҢдҪ еҸҜд»ҘеңЁзЁҚеҗҺдҝ®ж”№е®ғд»¬зҡ„й•ҝеәҰгҖӮ\n\
    \nеңЁ Go дёӯпјҢжңүеҮ з§ҚеҲӣе»әе’ҢеҲқе§ӢеҢ–еҲҮзүҮзҡ„ж–№жі•пјҡдҪ еҸҜд»ҘдҪҝз”ЁеҶ…зҪ®еҮҪж•° `make` жҲ–еҲҮзүҮеӯ—йқўйҮҸгҖӮ\n\n## дҪҝз”Ё `make` еҮҪж•°еҲӣе»әеҲҮзүҮ\n\nеҪ“дҪ дҪҝз”Ё\
    \ `make` еҮҪж•°еЈ°жҳҺеҲҮзүҮж—¶пјҢеҸҜд»ҘжҳҫејҸжҢҮе®ҡеҲҮзүҮзҡ„й•ҝеәҰе’Ңе®№йҮҸгҖӮ\n\nжё…еҚ• 2-17 жҳҜдёҖдёӘеЈ°жҳҺй•ҝеәҰдёә 5гҖҒе®№йҮҸдёә 10 зҡ„еҲҮзүҮзҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ•\
    \ 2-17.** дҪҝз”Ё `make` еҮҪж•°жҢҮе®ҡеҲҮзүҮдёӯзҡ„й•ҝеәҰе’Ңе®№йҮҸ\n\n```\nx := make([]int, 5, 10)\n```\n\nеҰӮжһңжңӘжҢҮе®ҡеҲҮзүҮе®№йҮҸпјҢеҲҷе®№йҮҸдёҺй•ҝеәҰзӣёеҗҢгҖӮ\n\
    \nжё…еҚ• 2-18 жҳҜдёҖдёӘеЈ°жҳҺеҲҮзүҮж—¶жңӘжҢҮе®ҡе®№йҮҸзҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 2-18.** дҪҝз”Ё `make` еҮҪж•°жҢҮе®ҡеҲҮзүҮдёӯзҡ„й•ҝеәҰ\n\n```\nx :=\
    \ make([]int, 5)\n```\n\n## дҪҝз”ЁеҲҮзүҮеӯ—йқўйҮҸеҲӣе»әеҲҮзүҮ\n\nеҲӣе»әе’ҢеҲқе§ӢеҢ–еҲҮзүҮзҡ„дёҖз§Қеёёи§Ғж–№жі•жҳҜдҪҝз”ЁеҲҮзүҮеӯ—йқўйҮҸпјҢе®ғдёҚйңҖиҰҒеңЁ `[]`\
    \ иҝҗз®—з¬ҰдёӯжҢҮе®ҡй•ҝеәҰгҖӮеҲқе§Ӣй•ҝеәҰе’Ңе®№йҮҸз”ұеҲқе§ӢеҢ–зҡ„е…ғзҙ ж•°йҮҸеҶіе®ҡгҖӮ\n\nжё…еҚ• 2-19 жҳҜдёҖдёӘйҖҡиҝҮеҲҮзүҮеӯ—йқўйҮҸеЈ°жҳҺе№¶еҲқе§ӢеҢ–еҲҮзүҮзҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 2-19.**\
    \ дҪҝз”ЁеҲҮзүҮеӯ—йқўйҮҸеҲқе§ӢеҢ–еҲҮзүҮ\n\n```\nx := []int{10, 20, 30, 40, 50}\n```\n\nжӯӨд»Јз ҒеҲӣе»әе№¶еҲқе§ӢеҢ–дәҶдёҖдёӘй•ҝеәҰдёә\
    \ 5гҖҒе®№йҮҸдёә 5 зҡ„еҲҮзүҮгҖӮ\n\nеҪ“дҪ дҪҝз”ЁеҲҮзүҮеӯ—йқўйҮҸеҲӣе»әеҲҮзүҮж—¶пјҢдҪ д№ҹеҸҜд»Ҙдёәзү№е®ҡй•ҝеәҰеҲқе§ӢеҢ–дёҖдёӘеҲҮзүҮпјҢиҖҢдёҚеҝ…жҸҗдҫӣжүҖжңүе…ғзҙ пјҢеҰӮжё…еҚ• 2-20 жүҖзӨәгҖӮ\n\n**жё…еҚ•\
    \ 2-20.** дёәзү№е®ҡй•ҝеәҰеҲқе§ӢеҢ–еҲҮзүҮиҖҢдёҚжҸҗдҫӣе…ғзҙ \n\n```\nx := []int{4: 0}\n```\n\nжӯӨд»Јз ҒеҲӣе»әдәҶдёҖдёӘй•ҝеәҰдёә 5гҖҒе®№йҮҸдёә\
    \ 5 зҡ„еҲҮзүҮгҖӮзҙўеј• `4` еӨ„жҸҗдҫӣдәҶдёҖдёӘйӣ¶еҖјгҖӮ\n\nдҪ еҸҜд»ҘдҪҝз”ЁеҲҮзүҮеӯ—йқўйҮҸеҲӣе»әз©әеҲҮзүҮпјҢеҰӮжё…еҚ• 2-21 жүҖзӨәгҖӮ\n\n**жё…еҚ• 2-21.** еҲӣе»әз©әеҲҮзүҮ\n\
    \n```\nx := []int{}\n```\n\nжӯӨд»Јз ҒеҲӣе»әдәҶдёҖдёӘжІЎжңүеҖје…ғзҙ зҡ„з©әеҲҮзүҮгҖӮеҪ“дҪ жғід»ҺеҮҪж•°иҝ”еӣһз©әйӣҶеҗҲж—¶пјҢз©әеҲҮзүҮйқһеёёжңүз”ЁгҖӮ\n\n## еҲҮзүҮеҮҪж•°\n\
    \nGo жҸҗдҫӣдәҶдёӨдёӘеҶ…зҪ®еҮҪж•°жқҘж–№дҫҝең°ж“ҚдҪңеҲҮзүҮпјҡ`append` е’Ң `copy`гҖӮ`append` еҮҪж•°йҖҡиҝҮиҺ·еҸ–зҺ°жңүеҲҮзүҮе№¶е°ҶжүҖжңүеҗҺз»ӯе…ғзҙ иҝҪеҠ еҲ°е…¶дёӯжқҘеҲӣе»әдёҖдёӘж–°еҲҮзүҮгҖӮ\n\
    \nжё…еҚ• 2-22 еұ•зӨәдәҶ `append` зҡ„дёҖдёӘзӨәдҫӢгҖӮ\n\n**жё…еҚ• 2-22.** дҪҝз”Ё `append` еҮҪж•°зҡ„еҲҮзүҮ\n\n```\npackage\
    \ main\n\nimport \"fmt\"\n\nfunc main() {\n    x := []int{10, 20, 30}\n    y :=\
    \ append(x, 40, 50)\n    fmt.Println(x, y)\n}\n```\n\nдҪ еә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\n[10\
    \ 20 30] [10 20 30 40 50]\n```\n\n`copy` еҮҪж•°йҖҡиҝҮе°ҶзҺ°жңүеҲҮзүҮдёӯзҡ„е…ғзҙ еӨҚеҲ¶еҲ°еҸҰдёҖдёӘеҲҮзүҮдёӯжқҘеҲӣе»әдёҖдёӘж–°еҲҮзүҮгҖӮ\n\nжё…еҚ•\
    \ 2-23 еұ•зӨәдәҶ `copy` еҮҪж•°зҡ„дёҖдёӘзӨәдҫӢгҖӮ\n\n**жё…еҚ• 2-23.** дҪҝз”Ё `copy` еҮҪж•°зҡ„еҲҮзүҮ\n\n```\npackage main\n\
    \nimport \"fmt\"\n\nfunc main() {\n    x := []int{10, 20, 30}\n    y := make([]int,\
    \ 2)\n    copy(y, x)\n    fmt.Println(x, y)\n}\n```\n\nдҪ еә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\n[10\
    \ 20 30] [10 20]\n```\n\nиҝҗиЎҢжӯӨзЁӢеәҸеҗҺпјҢеҲҮзүҮ `x` дёә `[10, 20, 30]`пјҢеҲҮзүҮ `y` дёә `[10, 20]`гҖӮз”ұдәҺеҲҮзүҮ\
    \ `y` зҡ„й•ҝеәҰдёә 2пјҢе®ғд»ҺеҲҮзүҮ `x` еӨҚеҲ¶дәҶеүҚдёӨдёӘе…ғзҙ гҖӮеҰӮжһңдҪ е°ҶеҲҮзүҮ `y` зҡ„й•ҝеәҰжҢҮе®ҡдёә 3пјҢе®ғе°Ҷд»ҺеҲҮзүҮ `x` еӨҚеҲ¶жүҖжңүдёүдёӘе…ғзҙ гҖӮ\n"
- fmt: "## Length and Capacity\n\nAs discussed in previous sections, a slice has a\
    \ length and capacity that you can specify when it is declared. The length of\
    \ the slice is the number of elements referred to by the slice; the capacity is\
    \ the number of elements in the underlying array. A slice canвҖҷt hold values beyond\
    \ its capacity; if you try to add more elements, a runtime error will occur. A\
    \ slice can be grown by using the `append` function. When you add elements using\
    \ the `append` function, it checks to see whether the capacity is sufficient.\
    \ Otherwise, it automatically increases the capacity. You can get the length value\
    \ by using the `len` function and the capacity value by using the `cap` function.\n\
    \nListing [2-24](#A978-1-4842-1052-9_2_Chapter.html#FPar26) illustrates length\
    \ and capacity.\n\n**Listing 2-24.** Slice Length and Capacity\n\n```\npackage\
    \ main\n\nimport \"fmt\"\n\nfunc main() {\n\n        x := make([]int, 2, 5)\n\n\
    \        x[0] = 10\n\n        x[1] = 20\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
    Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n     \
    \   x = append(x, 30, 40, 50)\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
    Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n     \
    \   fmt.Println(x)\n\n        x = append(x, 60)\n\n        fmt.Println(\"Length\
    \ is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n        fmt.Println(x)\n\
    \n}\n```\n\nIn this code, slice `x` with length as `2` and capacity as `5` is\
    \ declared. Two more elements are then appended into slice `x`. This time, the\
    \ capacity is sufficient for slice `x`, but when you try to append one more element\
    \ into slice `x`, the slice automatically grows with more capacity.\n\nWhen you\
    \ run the program, you should get the following output:\n\n```\n[10 20]\n\nLength\
    \ is 2\n\nCapacity is 5\n\n[10 20 30 40 50]\n\nLength is 5\n\nCapacity is 5\n\n\
    [10 20 30 40 50]\n\nLength is 6\n\nCapacity is 12\n\n[10 20 30 40 50 60]\n```\n\
    \nIn this output, the slice capacity gets increased to 12 when the `append` function\
    \ is used for the second time.\n\n## Iterating Over Slices\n\nGo provides a keyword\
    \ `range`, which can be used to iterate over collections. The keyword `range`\
    \ iterates over a collection of elements, which returns two values for each iteration.\
    \ The first value is the index position of the element; the second value is a\
    \ copy of the value contained in the index position.\n\nListing [2-25](#A978-1-4842-1052-9_2_Chapter.html#FPar27)\
    \ is an example of using `range` to iterate over a slice.\n\n**Listing 2-25.**\
    \ Iterating Over Slice\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main() {\n\
    \n    x := []int{10, 20, 30, 40, 50}\n\n    for k, v := range x {\n\n        fmt.Printf(\"\
    Index: %d Value: %d\\n\", k, v)\n\n    }\n\n}\n```\n\nYou should see the following\
    \ output:\n\n```\nIndex: 0 Value: 10\n\nIndex: 1 Value: 20\n\nIndex: 2 Value:\
    \ 30\n\nIndex: 3 Value: 40\n\nIndex: 4 Value: 50\n```\n\n## Maps\n\nA map is a\
    \ data structure that provides an unordered collection of key-value pairs. (A\
    \ data structure similar to a map is a hash table or dictionary in other programming\
    \ languages.) Remember that a map is an unordered collection, so you canвҖҷt predict\
    \ the data order when it is iterated over the collection.\n\nThere are several\
    \ ways to create and initialize maps in Go. Similar to slices, the built-in function\
    \ `make` or the map literal can be used to create and initialize maps.\n\nListing\
    \ [2-26](#A978-1-4842-1052-9_2_Chapter.html#FPar28) is an example program that\
    \ creates and initializes a map and iterates it over the collection.\n\n**Listing\
    \ 2-26.** Creating a Map and Iterating it Over a Collection\n\n```\npackage main\n\
    \nimport \"fmt\"\n\nfunc main() {\n\n    dict := make(map[string]string)\n\n \
    \   dict[\"go\"] = \"Golang\"\n\n    dict[\"cs\"] = \"CSharp\"\n\n    dict[\"\
    rb\"] = \"Ruby\"\n\n    dict[\"py\"] = \"Python\"\n\n    dict[\"js\"] = \"JavaScript\"\
    \n\n    for k, v := range dict {\n\n        fmt.Printf(\"Key: %s Value: %s\\n\"\
    , k, v)\n\n    }\n\n}\n```\n\nA map named `dict` is declared, where the string\
    \ type is specified for the key (type within the `[]` operator) and value:\n\n\
    ```\ndict := make(map[string]string)\n```\n\nValues are assigned to the map with\
    \ the given key (here the key `\"go\"` is for the value `\"Golang\"`):\n\n```\n\
    dict[\"go\"] = \"Golang\"\n```\n\nFinally, iterate over the collection using the\
    \ `range` and `print` key and value of each element in the collection:\n\n```\n\
    for k, v := range dict {\n\n    fmt.Printf(\"Key: %s Value: %s\\n\", k, v)\n\n\
    }\n```\n\nYou should see the following output:\n\n```\nKey: cs Value: CSharp\n\
    \nKey: rb Value: Ruby\n\nKey: py Value: Python\n\nKey: js Value: JavaScript\n\n\
    Key: go Value: Golang\n```\n\n**Note:** The data order will vary every time because\
    \ a map is an unordered collection.\n\nYou can access the value of an element\
    \ from a map by providing the key (see Listing [2-27](#A978-1-4842-1052-9_2_Chapter.html#FPar30)):\n\
    \n**Listing 2-27.** Accessing the Value of an Element from a Map\n\n```\nlan,\
    \ ok := dict[\"go\"]\n```\n\nWhen an element is accessed by providing a key, it\
    \ will return two values: The first value is the result (the value of the element);\
    \ the second is a Boolean value that indicates whether the lookup was successful.\
    \ Go provides a convenient way to write this, as shown in Listing [2-28](#A978-1-4842-1052-9_2_Chapter.html#FPar31).\n\
    \n**Listing 2-28.** Accessing the Element Value from a Map in an Idiomatic Way\n\
    \n```\nif lan, ok := dict[\"go\"]; ok {\n\n    fmt.Println(lan, ok)\n\n}\n```\n\
    \n## Defer, Panic, and Recover\n\nGo is a minimalist programming language that\
    \ comes with essential features to develop applications. Although minimal, Go\
    \ provides all the capabilities to develop highly reliable applications. For example,\
    \ the language features `defer`, `panic`, and `recover` let you properly clean\
    \ up your objects by explicitly panicking your application and then recovering\
    \ from the panic.\n\n### Defer\n\nIf you have used `try/catch/finally` blocks\
    \ in any programming language such as C# and Java, you may have used the `finally`\
    \ block to clean up the resources that are allocated in a `try` block. The statements\
    \ of a `finally` block run when the execution flow of control leaves a `try` statement.\
    \ This `finally` block will invoke even when the flow of control goes to a `catch`\
    \ block due to a handled exception. Using `defer`, you can implement cleanup code\
    \ in Go, which is more efficient than using a `finally` block in other languages.\
    \ Though you would primarily use `defer` for implementing cleanup code, it is\
    \ not used only for that purpose. For example, by using conjunction with `recover`,\
    \ you regain control from a panicking function.\n\nA `defer` statement pushes\
    \ a function call (or a code statement) onto a list. The list of saved вҖңfunction\
    \ callsвҖқ is executed after the surrounding function returns. The last added functions\
    \ are invoked first from the list of deferred functions. Suppose you add function\
    \ `f1` first, then `f2`, and finally `f3` onto the deferred list; the order of\
    \ the execution will be `f3`, `f2`, and then `f1`.\n\nListing [2-29](#A978-1-4842-1052-9_2_Chapter.html#FPar32)\
    \ is a code block that uses `defer` to clean up a database session object.\n\n\
    **Listing 2-29.** Defer Statements for Cleaning up Resources\n\n```\nsession,\
    \ err := mgo.Dial(\"localhost\") //MongoDB Session object\n\ndefer session.Close()\n\
    \nc := session.DB(\"taskdb\").C(\"categories\")\n\n//code statements using session\
    \ object\n```\n\nThis code block creates a session object for a MongoDB database.\
    \ In the next line, the code statement `session.Close()` is added onto the deferred\
    \ list to clean up the resources of the database session object after returning\
    \ the surrounding function. You can add any number of code statements and functions\
    \ onto the deferred list."
