    #### Creating a MongoDB Session Object


    A MongoDB `Session` object is created before the HTTP server starts. The `createDbSession`
    function in `mongoUtils.go` creates a `mgo.Session` object by calling the `DialWithInfo`
    function of the `mgo` package. The `DialWithInfo` function establishes a new `Session`
    to the cluster of MongoDB servers provided by the instance of `DialInfo type`.
    The URI of MongoDB is read from the `AppConfig` variable. The `Session` object
    will be accessed through the `GetSession` function. Whenever CRUD operations are
    performed, the `GetSession` function is called, and the `Session` object is copied
    using the `Copy` method of `mgo.Session`. A copied `Session` object will be used
    for all CRUD operations.


