- fmt: '### Writing a Hello World Program


    LetвҖҷs start by writing a Hello World program, as shown in Listing [1-1](#A978-1-4842-1052-9_1_Chapter.html#FPar5).


    **Listing 1-1.** Hello World Program in Go


    ```

    1 package main

    2 import "fmt"

    3 func main() {

    4       fmt.Println("Hello, world")

    5 }

    ```


    **Line 1:** Go programs are organized as packages, and the package name here is
    specified as `main`. If you name a package `main`, it has a special meaning in
    Go: the resulting binary will be an executable program.


    **Line 2:** The `"fmt"` package, which provides the functionality for format and
    print data, is imported from the standard library. The keyword `import` is used
    for importing packages.


    **Line 3:** The keyword `func` is used to define a function. The function `main`
    will be the entry point of an executable program and will be executed when the
    application runs. The package `main` will have one `main` function.


    **Line 4:** The function `Println` is provided by the package `fmt` to print the
    data. Note that the name of the `Println` function started with an uppercase letter.
    In Go, all identifiers that start with an uppercase letter are exported to other
    packages so they will be available to call in other packages.


    LetвҖҷs compile and run the sample program using the Go tool. Navigate to the package
    directory and then type the `run` command to run the program. Suppose that the
    location of the package directory is at `github.com/user/hello`:


    ```

    cd $GOPATH/src/github.com/user/hello

    go run main.go

    ```


    The preceding command simply prints the phrase вҖңHello, worldвҖқ. The `run` command
    compiles the source and runs the program. You can also use the `build` and `install`
    commands with the Go tool to build and install Go programs that produce binary
    executables to be run later.


    The `build` command compiles the package and puts the resulting binary into the
    package folder:


    ```

    cd $GOPATH/src/github.com/user/hello

    go build

    ```


    The name of the resulting binary is the same as the directory name. If you write
    this program in a directory named `hello`, the resulting binary will be `hello`
    (or `hello.exe` under Windows). After compiling the source with the `build` command,
    you can run the program by typing the binary name.


    The `install` command compiles the package and installs the resulting binary into
    the `bin` directory of `GOPATH`:


    ```

    cd $GOPATH/src/github.com/user/hello

    go install

    ```


    You can run this command from any location on your system:


    ```

    go install github.com/user/hello

    ```


    The name of the resulting binary is the same as the directory name. You can now
    run the program by typing the binary from the `bin` directory of `GOPATH`:


    ```

    $GOPATH/bin/hello

    ```


    If you have added `$GOPATH/bin` to your `PATH` environment variable, just type
    the binary name from any location on your system:


    ```

    hello

    ```


    ### Writing a Library


    In Go, you can write two types of programs: executable programs and reusable libraries.
    The previous sample program was an executable program. LetвҖҷs write a shared library
    to provide a reusable piece of code to other programs. Create a package directory
    at the location `$GOPATH/src/github.com/shijuvar/go-web-book/chapter1/calc`.


    Listing [1-2](#A978-1-4842-1052-9_1_Chapter.html#FPar6) shows a simple package
    that provides the functionality for adding and subtracting two values.


    **Listing 1-2.** Shared Library Program in Go


    ```

    1 package calc

    2

    3 func Add(x, y int) int {

    4       return x + y

    5 }

    6 func Subtract(x, y int) int {

    7       return x - y

    8 }

    ```


    **Line 1:** The package name is specified as `calc`. The name of the package and
    package directory must be same.


    **Line 3:** A function named `Add` is defined with the keyword `func`. The name
    of this function starts with an uppercase letter, so the `Add` function will be
    exported to other packages. If the name of the function starts with a lowercase
    letter, it is not exported to other packages, and accessibility will be limited
    to the same package. Unlike programming in C++, Java, and C#, you donвҖҷt need to
    use `private` and `public` keywords to specify the accessibility of identifiers.
    You can see the simplicity of the Go language throughout the language features.
    The `Add` method takes two integer parameters and returns an integer value.


    **Line 6:** The `Subtract` function is similar to the `Add` function, but subtracts
    values between two integer types.


    LetвҖҷs build and install the package. Navigate to the package directory in the
    terminal window and type the following command:


    ```

