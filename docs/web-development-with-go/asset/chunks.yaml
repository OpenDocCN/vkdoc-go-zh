    \ зҡ„зұ»еһӢзі»з»ҹеҸҠе…¶з”ЁжҲ·е®ҡд№үзұ»еһӢж—¶пјҢжӮЁеә”иҜҘд»Ҙе…Ёж–°зҡ„зңје…үзңӢеҫ…иҝҷй—ЁиҜӯиЁҖпјҢд»ҺиҖҢиғҪеӨҹж¬ЈиөҸе№¶еҲ©з”Ёе…¶з®ҖжҙҒжҖ§е’ҢејәеӨ§еҠҹиғҪжқҘи§ЈеҶіе®һйҷ…й—®йўҳгҖӮ\n\n`Go` зҡ„зұ»еһӢзі»з»ҹдёӯжІЎжңүжҸҗдҫӣзұ»пјҲclassesпјүпјӣе®ғжңүз»“жһ„дҪ“пјҲstructsпјүпјҢе®ғзұ»дјјдәҺзұ»гҖӮз»“жһ„дҪ“еҸҜд»Ҙиў«и§Ҷдёәзұ»зҡ„иҪ»йҮҸзә§зүҲжң¬пјҢдҪҶе…¶и®ҫи®ЎжҳҜзӢ¬зү№зҡ„пјҢеӣ дёәе®ғдё“жіЁдәҺе®һйҷ…еә”з”ЁгҖӮ`Go`\
    \ дёӯзҡ„з»“жһ„дҪ“и®©жӮЁеҸҜд»ҘеҲӣе»әз”ЁжҲ·е®ҡд№үзҡ„е…·дҪ“зұ»еһӢпјӣе®ғд»¬жҳҜеӯ—ж®өжҲ–еұһжҖ§зҡ„йӣҶеҗҲпјҢеҸҜз”ЁдәҺеӯҳеӮЁеӨҚжқӮж•°жҚ®гҖӮжӮЁеҸҜд»ҘдҪҝз”Ёз»“жһ„дҪ“жқҘеӯҳеӮЁеә”з”ЁзЁӢеәҸйўҶеҹҹжЁЎеһӢгҖӮ\n\n### еҲӣе»әз»“жһ„дҪ“зұ»еһӢ\n\
    \nи®©жҲ‘д»¬еҲӣе»әдёҖдёӘз”ЁдәҺиЎЁзӨәдәәе‘ҳдҝЎжҒҜзҡ„з»“жһ„дҪ“зұ»еһӢпјҲеҸӮи§Ғжё…еҚ• 3-1пјүгҖӮ\n\n**жё…еҚ• 3-1. еЈ°жҳҺдёҖдёӘеёҰжңүеӯ—ж®өйӣҶеҗҲзҡ„з»“жһ„дҪ“**\n\n```\ntype\
    \ Person struct {\n        FirstName, LastName string\n        Dob           \
