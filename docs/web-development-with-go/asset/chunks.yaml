  trans: "\n# зј–еҶҷ HTTP жңҚеҠЎеҷЁ\n\nи®©жҲ‘д»¬зј–еҶҷдёҖдёӘзӨәдҫӢ Web еә”з”ЁжңҚеҠЎеҷЁпјҢд»ҘжҺўзҙў Go иҜӯиЁҖзҡ„ App Engine е№іеҸ°гҖӮ\n\nжё…еҚ• 11-1\
    \ жҸҗдҫӣдәҶеңЁ App Engine е№іеҸ°дёҠзҡ„ HTTP жңҚеҠЎеҷЁгҖӮ\n\n**жё…еҚ• 11-1.** App Engine зҡ„ Web еә”з”ЁжңҚеҠЎеҷЁ\n\n```go\n\
    package task\n\nimport (\n    \"fmt\"\n    \"html/template\"\n    \"net/http\"\
    \n)\n\ntype Task struct {\n    Name        string\n    Description string\n}\n\
    \nconst taskForm = `\n<html>\n<body>\n<form action=\"/task\" method=\"post\">\n\
    <p>Task Name: <input type=\"text\" name=\"taskname\" ></p>\n<p> Description: <input\
    \ type=\"text\" name=\"description\" ></p>\n<p><input type=\"submit\" value=\"\
    Submit\"></p>\n</form>\n</body>\n</html>\n`\n\nconst taskTemplateHTML = `\n<html>\n\
    <body>\n<p>New Task has been created:</p>\n<div>Task: {{.Name}}</div>\n<div>Description:\
    \ {{.Description}}</div>\n</body>\n</html>\n`\n\nvar taskTemplate = template.Must(template.New(\"\
    task\").Parse(taskTemplateHTML))\n\nfunc init() {\n    http.HandleFunc(\"/\",\
    \ index)\n    http.HandleFunc(\"/task\", task)\n}\n\nfunc index(w http.ResponseWriter,\
    \ r *http.Request) {\n    fmt.Fprint(w, taskForm)\n}\n\nfunc task(w http.ResponseWriter,\
    \ r *http.Request) {\n    task := Task{\n        Name:        r.FormValue(\"taskname\"\
    ),\n        Description: r.FormValue(\"description\"),\n    }\n    err := taskTemplate.Execute(w,\
    \ task)\n    if err != nil {\n        http.Error(w, err.Error(), http.StatusInternalServerError)\n\
    \    }\n}\n```\n\nдёҖдёӘзӨәдҫӢ Web еә”з”Ёз”ұеӨҡдёӘ HTML йЎөйқўзј–еҶҷиҖҢжҲҗгҖӮHTTP еӨ„зҗҶзЁӢеәҸд»Јз ҒеҶҷеңЁ `task` еҢ…зҡ„ `init` еҮҪж•°дёӯпјҢеӣ дёә\
    \ App Engine иҝҗиЎҢж—¶жҸҗдҫӣдәҶдёҖдёӘзү№ж®Ҡзҡ„ `main` еҢ…пјҢдҪ ж— жі•еңЁеә”з”Ёд»Јз ҒдёӯдҪҝз”Ёе®ғгҖӮ\n\n# еҲӣе»әй…ҚзҪ®ж–Үд»¶\n\nиҰҒиҝҗиЎҢ App Engine\
    \ еә”з”ЁпјҢдҪ еҝ…йЎ»зј–еҶҷдёҖдёӘеҗҚдёә `app.yaml` зҡ„й…ҚзҪ®ж–Үд»¶пјҢиҜҘж–Үд»¶жҢҮе®ҡдәҶиҝҗиЎҢеә”з”ЁжүҖйңҖзҡ„еҗ„з§ҚдҝЎжҒҜпјҢеҢ…жӢ¬еә”з”Ёж ҮиҜҶз¬ҰгҖҒиҝҗиЎҢж—¶пјҢд»ҘеҸҠеә”з”ұ Go Web еә”з”ЁеӨ„зҗҶзҡ„\
    \ URLгҖӮ\n\nи®©жҲ‘д»¬дёә App Engine еә”з”Ёзј–еҶҷдёҖдёӘй…ҚзҪ®ж–Үд»¶пјҲеҸӮи§Ғжё…еҚ• 11-2пјүгҖӮ\n\n**жё…еҚ• 11-2.** `app.yaml` дёӯзҡ„\
    \ App Engine й…ҚзҪ®ж–Үд»¶\n\n```yaml\napplication: gae-demo\nversion: 1\nruntime: go\n\
