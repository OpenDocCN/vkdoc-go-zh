    To render web pages, the `base` template is called every time the named templates
    вҖң`head`вҖқ and вҖң`body`вҖқ are provided from the content pages. For example, when the
    `Index` page is rendered, the template definition files from `base.html` and `index.html
    are parsed`, and the nested template defined in the вҖң`base`вҖқ in `base.html` is
    executed and takes the contents for вҖң`head`вҖқ and вҖң`body`вҖқ from `index.html`.


    ### Initializing View Templates


    Template definition files have to be parsed before templates execute. Parsing
    the template definition files is a one-time activity; the files do not need to
    be parsed each time the templates execute. Here the files are parsed and put into
    a map in which each element represents the template file for rendering a particular
    page. Three HTML pages have to be generated, so three items are put into the map.
    The template definition files are parsed in the `init` function and are parsed
    with the `Must` helper function. `Must` is a helper that wraps a call to a function
    returning `(*Template, error)` and panics if the error is non-`nil`.


    Listing [5-12](#A978-1-4842-1052-9_5_Chapter.html#FPar12) parses the template
    files with the `Must` helper function and puts it into the map.


    Listing 5-12.В В Compiling View Template Files in init in main.go


    `var templates map[string]*template.Template`


    `//Compile view templates`


    `func init() {`


    В В В В `if templates == nil {`


