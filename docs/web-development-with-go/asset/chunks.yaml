    `Cloud Datastore` жҳҜдёҖдёӘж— жЁЎејҸзҡ„ `NoSQL` ж•°жҚ®еә“пјҢеҸҜз”ЁдәҺжҢҒд№…еҢ– App Engine еә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®гҖӮ


    #### Cloud Bigtable


    `Cloud Bigtable` жҳҜдёҖдёӘеҝ«йҖҹгҖҒе®Ңе…Ёжүҳз®ЎгҖҒеӨ§и§„жЁЎеҸҜжү©еұ•зҡ„ `NoSQL` ж•°жҚ®еә“пјҢйқһеёёйҖӮеҗҲз”ЁдәҺеӨ„зҗҶеӨ§йҮҸж•°жҚ®зҡ„еӨ§и§„жЁЎ WebгҖҒз§»еҠЁгҖҒеӨ§ж•°жҚ®е’Ңзү©иҒ”зҪ‘еә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®еӯҳеӮЁгҖӮеҰӮжһң
    App Engine еә”з”ЁзЁӢеәҸйңҖиҰҒдёҖдёӘй«ҳжҖ§иғҪзҡ„еӨ§и§„жЁЎеҸҜжү©еұ•ж•°жҚ®еӯҳеӮЁпјҢ`Cloud Bigtable` жҜ” `Cloud Datastore` жҳҜжӣҙеҘҪзҡ„йҖүжӢ©гҖӮ


    #### Google Cloud SQL


    `Google Cloud SQL` жҳҜ Google Cloud е№іеҸ°дёӯдёҖдёӘе…је®№ `MySQL` зҡ„е…ізі»еһӢж•°жҚ®еә“пјҢдҪңдёәжүҳз®ЎжңҚеҠЎжҸҗдҫӣгҖӮеҰӮжһң App Engine
    еә”з”ЁзЁӢеәҸйңҖиҰҒе…ізі»жЁЎеһӢжқҘиҝӣиЎҢж•°жҚ®жҢҒд№…еҢ–пјҢжӮЁеҸҜд»ҘдҪҝз”Ё `Google Cloud SQL`гҖӮ


    #### Memcache


    еңЁејҖеҸ‘й«ҳжҖ§иғҪеә”з”ЁзЁӢеәҸж—¶пјҢзј“еӯҳеә”з”ЁзЁӢеәҸж•°жҚ®жҳҜжҸҗй«ҳеә”з”ЁзЁӢеәҸжҖ§иғҪзҡ„йҮҚиҰҒзӯ–з•ҘгҖӮ`Memcache` жҳҜдёҖдёӘеҲҶеёғејҸзҡ„еҶ…еӯҳж•°жҚ®зј“еӯҳпјҢеҸҜз”ЁдәҺзј“еӯҳеә”з”ЁзЁӢеәҸж•°жҚ®пјҢд»ҘжҸҗй«ҳ App
    Engine еә”з”ЁзЁӢеәҸзҡ„жҖ§иғҪгҖӮ


    #### жҗңзҙў


    жҗңзҙўжңҚеҠЎе…Ғи®ёжӮЁеҜ№з»“жһ„еҢ–ж•°жҚ®пјҲдҫӢеҰӮзәҜж–Үжң¬гҖҒ`HTML`гҖҒ`Atom` ж‘ҳиҰҒгҖҒж•°еӯ—гҖҒж—Ҙжңҹе’Ңең°зҗҶдҪҚзҪ®пјүжү§иЎҢзұ»дјј Google зҡ„жҗңзҙўгҖӮ


    #### жөҒйҮҸеҲҶй…Қ


    жөҒйҮҸеҲҶй…ҚжңҚеҠЎе…Ғи®ёжӮЁе°Ҷдј е…ҘиҜ·жұӮи·Ҝз”ұеҲ°дёҚеҗҢзҡ„еә”з”ЁзЁӢеәҸзүҲжң¬пјҢиҝҗиЎҢ `A/B` жөӢиҜ•пјҢе№¶иҝӣиЎҢеўһйҮҸзү№жҖ§еҸ‘еёғгҖӮ'
  raw: 'Cloud computing is a вҖңpay-as-you-goвҖқ computing model in which IT infrastructure
    and software development platforms are being offered in a service-based consumption
    model. The greatest advantage of Cloud computing is the operational agility you
    get while developing applications. The Cloud model enables on-demand scalability,
    which means that you can scale up computing resources whenever you require more
    and can use them for as long as you want, and then scale down computing resources
    when they are no longer needed. Most Cloud computing platforms provide autoscaling
    capabilities to their Cloud platform, which allows you to automatically scale
    up and scale down the number of computing resources based on configurations.


    In Cloud computing, various options are available for hosting and running applications.
    These options provide different flexibility models to host, run, and scale your
    applications, which can be used for appropriate computing scenarios.


    Here are the different options available in Cloud computing platforms to host
    and run applications:


    *   Infrastructure as a Service (IaaS)

    *   Platform as a Service (PaaS)

    *   Container as a Service (CaaS)


    ### Infrastructure as a Service (IaaS)


    The Infrastructure as a Service (IaaS) model provides virtualized computing resources
    as a service over the Internet. You can acquire virtual machines (VMs) from the
    Cloud platform for on-demand scalability. In this model, you have to set up everything
    on your end for hosting and running your applications. For example, if you want
    to run an HTTP server in Go, you have to manually set up the Go runtime environment
    and open up the HTTP ports to receive incoming web requests to the HTTP server.
    The most important thing about the IaaS model is that you have full control over
    the VMs acquired on the Cloud.


    ### Platform as a Service (PaaS)


    The Platform as a Service (PaaS) model provides a platform managed by the Cloud
    platform vendor to deploy and run applications. This model provides specialized
    language environments, tools, and software development kits (SDKs) to develop
    and run applications on the Cloud. The PaaS model provides more operational agility
    than the IaaS model because it is a managed service provided by the Cloud platform
    in which you can develop, test, deploy, and run applications by using SDKs and
    tools provided by the platform.


    For example, if you want to leverage the PaaS platform provided by Google Cloud
    for developing Go applications, you can download the Google Cloud PaaS platform
    SDK for Go, which allows you to quickly build, test, and run your Go applications
    on the Google Cloud. Autoscaling can be easily achieved with this model of Cloud
    computing without requiring any manual intervention. You might only need to configure
    the parameters for KPIs to perform autoscaling. In this model, you donвҖҷt have
    to manage and maintain your VMs, unlike the IaaS model. This model enables superior
    operational agility during the development process because developers are freed
    from many IT infrastructure management operations.


    ### Container as a Service


    Container as a Service (CaaS)is an evolutionary computing model from both IaaS
    and PaaS. It is a relatively new model that brings you the best of both IaaS and
    PaaS. This model allows you to run software containers on the Cloud platform by
    using popular container technologies such as Docker and Kubernetes. Application
    containers are gradually becoming a standard for deploying and running applications
    due to their benefits. When you run application containers on Cloud platforms,
    this model gives you many capabilities. Google Container Engine is a CaaS platform
    provided by Google Cloud.


    ## Introduction to Google Cloud


    Google Cloud is a public Cloud platform from Google that enables developers to
    build, test, deploy, and run applications on GoogleвҖҷs highly scalable and reliable
    infrastructure. The Google Cloud platform provides a set of modular Cloud-based
    services that allow you to build a variety of applications, from web applications
    to larger Big Data solutions, with on-demand scalability and a greater level of
    operational agility.


    Google Cloud provides three types of services for computing:


    *   Google App Engine (GAE) is a PaaS service.

    *   Google Compute Engine (GCE) is an IaaS service.

    *   Google Container Engine (GKE) is a CaaS service.


    Figure [11-1](#A978-1-4842-1052-9_11_Chapter.html#Fig1) shows an infographic of
    the various services provided by the Google Cloud platform.


    ![A978-1-4842-1052-9_11_Fig1_HTML.jpg](A978-1-4842-1052-9_11_Fig1_HTML.jpg)


    Figure 11-1.


    Infographic of Google Cloud platform services


    This chapter primarily focuses on the Google App Engine, which is a PaaS in the
    Google Cloud platform.


    ## Google App Engine (GAE)


    Google App Engine is the PaaS offering from the Google Cloud platform that allows
    you to build highly scalable web applications and back-end APIs. App Engine applications
    are available for automatic scaling to scale up computing instances automatically
    when traffic picks up and scale down computing instances automatically when they
    are no longer needed. Unlike IaaS, you donвҖҷt need to provision VMs and maintain
    them by leveraging an Ops (operations) team. With App Engine, you just upload
    source code using the tools provided by App Engine and run applications on the
    Cloud, which is available for load balancing and autoscaling. When compared with
    the IaaS model, App Engine provides lot of operational agility for developing
    and managing applications because you donвҖҷt have to spend time managing the VMs
    for running your applications.


    App Engine provides the support for following language environments:


    *   Python

    *   Java

    *   PHP

    *   Go


    ### Cloud Services with App Engine


    When you develop Go applications on App Engine, you can leverage various Cloud
    services provided by the Google Cloud platform. Google Cloud provides APIs for
    accessing these services from App Engine applications. Keep in mind that these
    services are not restricted to App Engine; you can also use them with Google Compute
    Engine and Google Container Engine.


    The following sections describe some of the Cloud services that can be used for
    App Engine applications.


    #### User Authentication


    You can use User Authentication services to sign on users with a Google account
    or OpenID.


    #### Cloud Datastore


    Cloud Datastore is a schema-less NoSQL database that can be used for persisting
    data of your App Engine applications.


    #### Cloud Bigtable


    Cloud Bigtable is a fast, fully managed, massively scalable NoSQL database that
    is ideal for using the data store for large-scale web, mobile, Big Data, and IoT
    applications that deal with large volumes of data. If the App Engine application
    requires a massively scalable data store with high performance, Cloud Bigtable
    is a better choice than Cloud Datastore.


    #### Google Cloud SQL


    Google Cloud SQL is a MySQL-compatible, relational database in the Google Cloud
    platform available as a managed service. If an App Engine application requires
    a relational model for data persistence, you can use Google Cloud SQL.


    #### Memcache


    When you develop high-performance applications, caching your application data
    is an important strategy for improving application performance. Memcache is a
    distributed, in-memory data cache that can be used to cache application data to
    improve the performance of App Engine applications.


    #### Search


    The Search service allows you to perform Google-like searches over structured
    data such as plain text, HTML, atom, numbers, dates, and geographic locations.


    #### Traffic Splitting


    The Traffic Splitting service allows you to route incoming requests to different
    application versions, run A/B tests, and do incremental feature rollouts.'
