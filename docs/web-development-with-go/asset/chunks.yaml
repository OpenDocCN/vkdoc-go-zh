- fmt: "### Inserting Embedded Documents\n\nThe major difference between relational\
    \ databases and document databases is that the latter doesnвҖҷt support a relational\
    \ approach for modeling a domain model. If you want to make a one-to-many relationship\
    \ in a relational database, you can create a parent and a child table, in which\
    \ each record in the parent table can be associated with multiple records in the\
    \ child table. To enforce data integrity in this relational model, you can define\
    \ a foreign key constraint in the child table that points to a primary key in\
    \ the parent table.\n\nMongoDB collections have flexible schema, so a data model\
    \ can be defined in different ways to achieve the same objectives. You can choose\
    \ the right strategy for defining a data model based on the context of the application.\
    \ To make relationships among connected data, you can either embed the connected\
    \ documents inside the main document or make references between two documents.\
    \ For making relationships among connected data, the first strategy (embedding\
    \ documents) is good in some scenarios; the latter is good for different scenarios.\n\
    \n> **Note**  \n> In [Chapter 9](#A978-1-4842-1052-9_9_Chapter.html), you will\
    \ learn how to make relationships using a reference among documents. Check out\
    \ the MongoDB documentation for more information on data model concepts: [https://docs.mongodb.org/manual/data-modeling/](https://docs.mongodb.org/manual/data-modeling/)\n\
    \nListing [8-8](#A978-1-4842-1052-9_8_Chapter.html#FPar10) is an example that\
    \ shows a data model that uses embedded documents to describe relationships among\
    \ connected data. In this one-to-many relationship between `Category` and `Tasks`\
    \ data, `Category` has multiple `Task` entities.\n\n**Listing 8-8.** Inserting\
    \ a Document with Embedded Documents\n\n```go\npackage main\n\nimport (\n    \"\
    log\"\n    \"time\"\n    \"gopkg.in/mgo.v2\"\n    \"gopkg.in/mgo.v2/bson\"\n)\n\
    \ntype Task struct {\n    Description string\n    Due         time.Time\n}\n\n\
    type Category struct {\n    Id          bson.ObjectId `bson:\"_id,omitempty\"\
    `\n    Name        string\n    Description string\n    Tasks       []Task\n}\n\
    \nfunc main() {\n    session, err := mgo.Dial(\"localhost\")\n    if err != nil\
    \ {\n        panic(err)\n    }\n    defer session.Close()\n    session.SetMode(mgo.Monotonic,\
    \ true)\n\n    //get collection\n    c := session.DB(\"taskdb\").C(\"categories\"\
    )\n\n    //Embedding child collection\n    doc := Category{\n        bson.NewObjectId(),\n\
    \        \"Open-Source\",\n        \"Tasks for open-source projects\",\n     \
    \   []Task{\n            Task{\"Create project in mgo\", time.Date(2015, time.August,\
    \ 10, 0, 0, 0, 0, time.UTC)},\n            Task{\"Create REST API\", time.Date(2015,\
    \ time.August, 20, 0, 0, 0, 0, time.UTC)},\n        },\n    }\n\n    //insert\
    \ a Category object with embedded Tasks\n    err = c.Insert(&doc)\n    if err\
    \ != nil {\n        log.Fatal(err)\n    }\n}\n```\n\nA `Category` struct is created,\
    \ in which a slice of the `Task` struct is specified for the `Tasks` field to\
    \ embed child collection. Embedding documents enables you to get the parent document\
    \ and associated child documents by using a single query (you donвҖҷt need to execute\
    \ another query to get the child details).\n\n### Reading Documents\n\nThe `Find`\
    \ method of `Collection` allows you to query MongoDB collections. When you call\
    \ the `Find` method, you can provide a document to filter the collection data.\
    \ The `Find` method prepares a query using the provided document. To provide the\
    \ document for querying the collection, you can provide a map or a struct value\
    \ capable of being marshalled with BSON. You can use a generic map such as `bson.M`\
    \ to provide the document for querying the data. To query all documents in the\
    \ collection, you can use `nil` as the argument that is equivalent to an empty\
    \ document such as `bson.M{}`. The `Find` method returns the value of the `mgo.Query`\
    \ type, in which you can retrieve results using methods such as `One`, `For`,\
    \ `Iter`, or `Tail`.\n\n#### Retrieving All Records\n\nListing [8-9](#A978-1-4842-1052-9_8_Chapter.html#FPar11)\
    \ retrieves all documents in a collection by providing `nil` as the parameter\
    \ value for the `Find` method. This query executes against the data model defined\
    \ in Listing [8-8](#A978-1-4842-1052-9_8_Chapter.html#FPar10).\n\n**Listing 8-9.**\
    \ Querying All Documents in a Collection\n\n```go\niter := c.Find(nil).Iter()\n\
    \    result := Category{}\n    for iter.Next(&result) {\n        fmt.Printf(\"\
    Category:%s, Description:%s\\n\", result.Name, result.Description)\n        tasks\
    \ := result.Tasks\n        for _, v := range tasks {\n            fmt.Printf(\"\
    Task:%s Due:%v\\n\", v.Description, v.Due)\n        }\n    }\n\nif err = iter.Close();\
    \ err != nil {\n        log.Fatal(err)\n    }\n```\n\nThe `Iter` method of the\
    \ `Query` object is used to iterate over the documents. `Iter` executes the query\
    \ and returns an iterator capable of iterating over all the results. When you\
    \ use embedded documents to define a parent-child relationship, you can obtain\
    \ the associated documents in a single query.\n\n#### Sorting Records\n\nDocuments\
    \ can be sorted using the `Sort` method provided by the `Query` type. The `Sort`\
    \ method prepares the query to order returned documents according to the provided\
    \ field names.\n\nListing [8-10](#A978-1-4842-1052-9_8_Chapter.html#FPar12) sorts\
    \ the collection documents.\n\n**Listing 8-10.** Ordering Documents Using the\
    \ `Sort` Method\n\n```go\niter := c.Find(nil).Sort(\"name\").Iter()\n    result\
    \ := Category{}\n    for iter.Next(&result) {\n        fmt.Printf(\"Category:%s,\
    \ Description:%s\\n\", result.Name, result.Description)\n        tasks := result.Tasks\n\
    \        for _, v := range tasks {\n            fmt.Printf(\"Task:%s Due:%v\\\
    n\", v.Description, v.Due)\n        }\n    }\n\n    if err = iter.Close(); err\
    \ != nil {\n        log.Fatal(err)\n    }\n```\n\nYou can sort the value in reverse\
    \ order by providing a field name prefixed by a `вҖ“` (minus sign), as shown in\
    \ Listing [8-11](#A978-1-4842-1052-9_8_Chapter.html#FPar13).\n\n**Listing 8-11.**\
    \ Sorting Documents in Reverse Order\n\n```go\niter := c.Find(nil).Sort(\"-name\"\
    ).Iter()\n```\n\n#### Retrieving a Single Record\n\nListing [8-12](#A978-1-4842-1052-9_8_Chapter.html#FPar14)\
    \ retrieves a single record from a collection by providing a map object to make\
    \ the query.\n\n**Listing 8-12.** Querying a Single Record from a Collection\n\
    \n```go\nresult := Category{}\nerr := c.Find(bson.M{\"name\": \"Open-Source\"\
    }).One(&result)\nif err != nil {\n    log.Fatal(err)\n}\n\nfmt.Printf(\"Category:%s,\
    \ Description:%s\\n\", result.Name, result.Description)\ntasks := result.Tasks\n\
    for _, v := range tasks {\n    fmt.Printf(\"Task:%s Due:%v\\n\", v.Description,\
    \ v.Due)\n}\n```\n\nThe `bson.M` map type is provided to query the data. Here,\
    \ it queries the collection with the value provided for the `Name` field. The\
    \ `One` method of the `Query` type executes the query and unmarshals the first\
    \ obtained document into the result argument.\n\nThe `Collection` type provides\
    \ the method `FindId` that is a convenience helper equivalent to the following:\n\
    \n```go\nquery := c.Find(bson.M{\"_id\": id})\n```\n\nThe `FindId` method allows\
    \ you to query the collection with a document `_id` field.\n\nListing [8-13](#A978-1-4842-1052-9_8_Chapter.html#FPar15)\
    \ queries the collection with the `FindId` method.\n\n**Listing 8-13.** Querying\
    \ a Single Record Using `FindId`\n\n```go\nresult = Category{}\nerr = c.FindId(obj_id).One(&result)\n\
    ```"
