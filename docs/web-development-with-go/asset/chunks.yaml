    ### Creating the Configuration File


    To run App Engine applications, you have to write a configuration file named `app.yaml`,
    which specifies various kinds of information for running the application, including
    the application identifier, runtime, and URLs that should be handled by the Go
    web application.


    LetвҖҷs write a configuration file for the App Engine application (see Listing [11-2](#A978-1-4842-1052-9_11_Chapter.html#FPar2)).


    Listing 11-2.В В Configuration File for the App Engine in app.yaml


    `application: gae-demo`


    `version: 1`


    `runtime: go`


    `api_version: go1`


    `handlers:`


    `- url: /.*`


    `script: _go_app`


    The `app.yaml` configuration file says the following about the App Engine application:


    *   The application identifier is `gae-demo`. When you deploy an application into
    App Engine, you must specify a unique identifier as the application identifier.
    When you run the application in the development server, you can set any value
    as the application identifier. Here, it is set as `gae-demo` during the time the
    application runs on the development server.

    *   The `version` number of the application code is 1\. If you properly update
    the versions before uploading a new application version of application into App
    Engine, you can roll back to a previous version of using the administrative console.

    *   This Go program runs in the Go `runtime` environment with the API version
    `go1`.

    *   Every request to a URL whose path matches the regular expression `/.*` (all
    URLs) should be handled by the Go program. The `_go_app` value is recognized by
    the development web server and ignored by the production App Engine servers.


    ### Testing the Application in Development Server


    In the previous steps, an App Engine application and a configuration file were
    created. Now the application is ready for running on the development web server
    provided by the App Engine SDK. The development web server allows you to test
    App Engine applications in a development environment.


    Figure [11-2](#A978-1-4842-1052-9_11_Chapter.html#Fig2) illustrates the directory
    structure of the App Engine application.


    ![A978-1-4842-1052-9_11_Fig2_HTML.jpg](A978-1-4842-1052-9_11_Fig2_HTML.jpg)


    Figure 11-2.


    Application directory structure


    LetвҖҷs run the example web application on the development web server by running
    the `goapp` tool:


    `goapp serve gae-server/`


    The development web server is run by providing a path to the `gae-server` directory.
    You can omit the application path if you are running the `goapp` tool from the
    applicationвҖҷs directory:


    `goapp serve`


    Figure [11-3](#A978-1-4842-1052-9_11_Chapter.html#Fig3) shows that the web development
    server has been started and is listening for requests on port 8080 and requests
    for the admin server on port 8000.


    ![A978-1-4842-1052-9_11_Fig3_HTML.jpg](A978-1-4842-1052-9_11_Fig3_HTML.jpg)


    Figure 11-3.


    Running a development web server


    Run and test the App Engine application by accessing the following URL in a web
    browser: `http://localhost:8080/`.


    Figure [11-4](#A978-1-4842-1052-9_11_Chapter.html#Fig4) shows that the application
    is running at `http://localhost:8080/` under the development server.


    ![A978-1-4842-1052-9_11_Fig4_HTML.jpg](A978-1-4842-1052-9_11_Fig4_HTML.jpg)


    Figure 11-4.


    Development web server listening on port 8080 Note


    You can get information about App Engine instances on the admin web server here:
    `http://localhost:8000/`.


    Figure [11-5](#A978-1-4842-1052-9_11_Chapter.html#Fig5) shows that the admin web
    server is providing the information about App Engine instances running in the
    development web server.


    ![A978-1-4842-1052-9_11_Fig5_HTML.jpg](A978-1-4842-1052-9_11_Fig5_HTML.jpg)


    Figure 11-5.


    Admin server listening on port 8000


    ### Deploying App Engine Applications into the Cloud


    To deploy App Engine applications into the Cloud, you have to create a project
    in the Google Cloud platform for the App Engine instance. You also must provide
    a unique project ID, which will be used to deploy the application into the Cloud.
    Specify the application as `Project ID` in the `app.yaml` file.


    You create and manage App Engine applications by using the Google Developers Console
    (see [`https://console.developers.google.com/`](https://console.developers.google.com/)
    ). You can sign in to the Google Developers Console using your Google account
    (Google Cloud provides a free trial account for 60 days).


    LetвҖҷs create an App Engine project in the Google Developers Console. First, click
    the Create a Project button. You can then specify the project name, project ID,
    and App Engine location.


    Figure [11-6](#A978-1-4842-1052-9_11_Chapter.html#Fig6) shows the New Project
    window that displays a new project in Google Developers Console.


    ![A978-1-4842-1052-9_11_Fig6_HTML.jpg](A978-1-4842-1052-9_11_Fig6_HTML.jpg)


    Figure 11-6.


    Creating a new App Engine project


    You create an App Engine project with a unique project ID in the Google Developers
    Console (refer to Figure [11-6](#A978-1-4842-1052-9_11_Chapter.html#Fig6)). The
    project ID is `gae-demo-1073`, which will be used to specify the application identifier
    in `app.yaml` before the application is deployed.


    Figure [11-7](#A978-1-4842-1052-9_11_Chapter.html#Fig7) shows details about the
