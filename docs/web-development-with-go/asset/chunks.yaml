    \ еә”з”Ёе’Ң Web APIгҖӮ\n\n## net/http еҢ…\n\nеҪ“дҪ иҖғиҷ‘еңЁ Go дёӯжһ„е»ә Web еә”з”Ёе’Ң Web APIпјҢжҲ–иҖ…д»…д»…жҳҜжһ„е»ә HTTP жңҚеҠЎеҷЁж—¶пјҢжңҖйҮҚиҰҒзҡ„еҢ…жҳҜ\
    \ `net/http`пјҢе®ғжқҘиҮӘ Go ж ҮеҮҶеә“пјҢе№¶жҸҗдҫӣдәҶејҖеҸ‘е®Ңж•ҙ Web еә”з”ЁжүҖйңҖзҡ„жүҖжңүеҹәжң¬еҠҹиғҪгҖӮGo зҡ„и®ҫи®ЎзҗҶеҝөжҳҜйҖҡиҝҮз»„еҗҲе°ҸеһӢзҡ„з»„д»¶жЁЎеқ—жқҘејҖеҸ‘жӣҙеӨ§зҡ„зЁӢеәҸгҖӮ`net/http`\
    \ еҢ…жҸҗдҫӣдәҶй«ҳеәҰзҡ„з»„еҗҲжҖ§е’ҢеҸҜжү©еұ•жҖ§пјҢеӣ жӯӨдҪ еҸҜд»ҘиҪ»жқҫең°з”ЁиҮӘе·ұзҡ„еҢ…жҲ–з¬¬дёүж–№еҢ…жӣҝжҚўжҲ–жү©еұ•ж ҮеҮҶеә“зҡ„еҠҹиғҪгҖӮеңЁ Ruby зӯүе…¶д»–зј–зЁӢзҺҜеўғдёӯпјҢдҪ дјҡдҪҝз”ЁеғҸ Rails иҝҷж ·зҡ„е®Ңж•ҙ\
    \ Web еә”з”ЁжЎҶжһ¶жқҘејҖеҸ‘ Web еә”з”ЁгҖӮеңЁ Go дёӯпјҢдҪ еҸҜд»ҘжүҫеҲ°и®ёеӨҡе®Ңж•ҙзҡ„ Web еә”з”ЁжЎҶжһ¶пјҢдҫӢеҰӮ BeegoгҖҒRevel е’Ң MartiniгҖӮдҪҶжҳҜпјҢеңЁ\
    \ Go дёӯејҖеҸ‘ Web еә”з”Ёзҡ„жғҜз”Ёж–№ејҸжҳҜдҪҝз”Ёж ҮеҮҶеә“еҢ…дҪңдёәзј–зЁӢеқ—зҡ„еҹәжң¬з»„жҲҗйғЁеҲҶпјҢе№¶з»“еҗҲе…¶д»–дёҺ `http` еҢ…е…је®№зҡ„еә“пјҲиҖҢйқһжЎҶжһ¶пјүгҖӮеҜ№дәҺ Web ејҖеҸ‘пјҢ`net/http`\
    \ е’Ң `html/template` жҳҜж ҮеҮҶеә“жҸҗдҫӣзҡ„дё»иҰҒеҢ…гҖӮд»…дҪҝз”ЁиҝҷдёӨдёӘеҢ…пјҢдҪ е°ұеҸҜд»Ҙжһ„е»әеҠҹиғҪе®Ңж•ҙзҡ„ Web еә”з”ЁпјҢиҖҢж— йңҖеҖҹеҠ©д»»дҪ•з¬¬дёүж–№еҢ…гҖӮ\n\n**жіЁж„Ҹпјҡ**\
    \ дҪ еә”иҜҘе…Ҳд»Һж ҮеҮҶеә“еҢ…ејҖе§Ӣ Web ејҖеҸ‘пјҢз„¶еҗҺеҶҚж¶үи¶із¬¬дёүж–№еҢ…е’ҢжЎҶжһ¶пјҢд»ҘдҫҝзҗҶи§Ј Go зҡ„ Web ејҖеҸ‘з”ҹжҖҒзі»з»ҹгҖӮеҰӮжһңдҪ зӣҙжҺҘд»Һз¬¬дёүж–№еҢ…е’ҢжЎҶжһ¶ејҖе§Ӣ Web ејҖеҸ‘пјҢдҪ е°Ҷй”ҷиҝҮи®ёеӨҡж ёеҝғеҹәзЎҖзҹҘиҜҶпјҢеӣ дёәиҝҷдәӣжЎҶжһ¶жҸҗдҫӣдәҶеӨ§йҮҸвҖңеЎ«йёӯејҸвҖқзҡ„еҠҹиғҪе’ҢиҜӯжі•зі–гҖӮ\n\
    \n`http` еҢ…жҸҗдҫӣдәҶ HTTP е®ўжҲ·з«Ҝе’ҢжңҚеҠЎеҷЁзҡ„е®һзҺ°пјҢеҢ…жӢ¬з”ЁдәҺе®ўжҲ·з«Ҝе’ҢжңҚеҠЎеҷЁе®һзҺ°зҡ„еҗ„з§Қз»“жһ„дҪ“е’ҢеҮҪж•°гҖӮжң¬з« е°ҶжҺўи®Ё `http` еҢ…зҡ„еҗ„з§ҚеҠҹиғҪгҖӮ\n"
- fmt: "# Processing HTTP Requests\n\nThe Web is based on a request-response paradigm.\
    \ In this model (see Figure [4-1](#A978-1-4842-1052-9_4_Chapter.html#Fig1)), HTTP\
    \ clients send a request for some data to the web server, the request is processed,\
    \ and the server sends a response back to the HTTP clients.\n\n![A978-1-4842-1052-9_4_Fig1_HTML.jpg](A978-1-4842-1052-9_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. HTTP request-response paradigm\n\nThe most important thing about\
    \ this communication model is that HTTP is a stateless layer, which means that\
    \ each request to the HTTP server is treated as an independent transaction that\
    \ does not remember any previous requests and cannot persist data between the\
    \ requests. So the communication consists of independent pairs of requests and\
    \ responses. If you are building web APIs, the web server processes the HTTP requests\
    \ and sends the response in either XML or JSON format. If you are building web\
    \ applications, the web server processes the HTTP requests and sends the response\
    \ as HTML web pages, which will be rendered in a web browser.\n\nThe `net/http`\
    \ library has two major components for processing HTTP requests (discussed in\
    \ the following sections):\n\n*   `ServeMux`\n*   `Handler`\n\n## ServeMux\n\n\
    The `ServeMux` is a multiplexor (or simply an HTTP request router) that compares\
    \ incoming HTTP requests against a list of predefined URI resources and then calls\
    \ the associated handler for the resource requested by the HTTP client.\n\n##\
    \ Handler\n\nThe `ServeMux` provides a multiplexor and calls corresponding handlers\
    \ for HTTP requests. Handlers are responsible for writing response headers and\
    \ bodies. In Go, any object can become a handler, thanks to GoвҖҷs excellent interface\
    \ implementation provided by its type system. If any object satisfies the implementation\
    \ of the `http.Handler` interface, it can be a handler for serving HTTP requests.\n\
    \nListing [4-1](#A978-1-4842-1052-9_4_Chapter.html#FPar2) shows the definition\
    \ of the `http.Handler` interface.\n\nListing 4-1. `http.Handler` Interface\n\n\
    ```\ntype Handler interface {\n   ServeHTTP(ResponseWriter, *Request)\n}\n```\n\
    \nThe `ServeHTTP` method has two arguments: an `http.ResponseWriter` interface\
    \ and a pointer to an `http.Request` struct. The `ResponseWriter` interface writes\
    \ response headers and bodies into the HTTP response. You can use `Request` to\
    \ extract information from the incoming HTTP requests. For example, if you want\
    \ to read querystring values, use the `Request` object.\n\nThe `http` package\
    \ provides several functions that implement the `http.Handler` interface and are\
    \ used as common handlers:\n\n*   `FileServer`\n*   `NotFoundHandler`\n*   `RedirectHandler`\n\
    *   `StripPrefix`\n*   `TimeoutHandler`\n\n## Building a Static Web Server\n\n\
    LetвҖҷs build a static web server in Go using the common handler function `FileServer`,\
    \ which returns a handler object that can be used for building static web servers.\n\
    \nFigure [4-2](#A978-1-4842-1052-9_4_Chapter.html#Fig2) illustrates the folder\
    \ structure of a static web site.\n\n![A978-1-4842-1052-9_4_Fig2_HTML.jpg](A978-1-4842-1052-9_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. Folder structure of a static web site\n\nA static web site application\
    \ is created in the `GOPATH` location with the folder structure specified in Figure\
    \ [4-2](#A978-1-4842-1052-9_4_Chapter.html#Fig2). The implementation of the static\
    \ web server is written in the `main.go` source file, and the static contents\
    \ are put into the `public` folder that provides the contents for the static web\
    \ site.\n\nListing [4-2](#A978-1-4842-1052-9_4_Chapter.html#FPar3) shows the implementation\
    \ in `main.go` that provides a static web server by serving the contents of `public`\
    \ folder.\n\nListing 4-2. Static Web Server Using the `FileServer` Function\n\n\
    ```\npackage main\n\nimport (\n    \"net/http\"\n)\n\nfunc main() {\n    mux :=\
    \ http.NewServeMux()\n    fs := http.FileServer(http.Dir(\"public\"))\n    mux.Handle(\"\
    /\", fs)\n    http.ListenAndServe(\":8080\", mux)\n}\n```\n\nIn the `main` function,\
    \ the `http.NewServeMux` function is called to create an empty `ServeMux` object.\
    \ The `http.FileServer` function is then called to create a new handler for serving\
    \ the static contents of a `public` folder in the web site. The `ServeMux.Handle`\
    \ function is called to register the URL path `\"/\"` with the handler created\
    \ with the `http.FileServer` function. Finally, the `http.ListenAndServe` function\
    \ is called to create a HTTP server that starts listening at `:8080` for incoming\
    \ requests. The address and `ServeMux` objects are passed into the `ListenAndServe`\
    \ function.\n\nListing [4-3](#A978-1-4842-1052-9_4_Chapter.html#FPar4) shows the\
    \ signature of the `ListenAndServe` function.\n\nListing 4-3. `ListenAndServe`\
    \ Signature\n\n```\nfunc ListenAndServe(addr string, handler Handler) error\n\
    ```\n\nThe `ListenAndServe` function listens on the TCP network address and then\
    \ calls `Serve` with `http.Handler` to handle requests on incoming connections.\
    \ The second argument of the `ListenAndServe` function is an `http.Handler`, but\
    \ a `ServeMux` object was passed. The `ServeMux` type also has a `ServeHTTP` method,\
    \ which means that it satisfies the `http.Handler` interface so that a `ServeMux`\
    \ object can be passed as a second argument for the `ListenAndServe` function.\
    \ Keep in mind that an instance of a `ServeMux` is an implementation of the `http.Handler`\
    \ interface. If you pass `nil` as the second argument for `ListenAndServe`, a\
    \ `DefaultServeMux` will be used for the `http.Handler`. `DefaultServeMux` is\
    \ an instance of `ServeMux`, so it is also a handler.\n\nWhen you run the program,\
    \ you can access the static web page `about.html` by navigating to `http://localhost:8080/about.html`\
    \ (see Figure [4-3](#A978-1-4842-1052-9_4_Chapter.html#Fig3)). The `about.html`\
    \ page was put into the `public` folder for serving as static content.\n\n![A978-1-4842-1052-9_4_Fig3_HTML.jpg](A978-1-4842-1052-9_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3. Accessing the static web site"
  raw: '## Processing HTTP Requests


    The Web is based on a request-response paradigm. In this model (see Figure [4-1](#A978-1-4842-1052-9_4_Chapter.html#Fig1)),
    HTTP clients send a request for some data to the web server, the request is processed,
    and the server and sends a response back to the HTTP clients.


    ![A978-1-4842-1052-9_4_Fig1_HTML.jpg](A978-1-4842-1052-9_4_Fig1_HTML.jpg)


    Figure 4-1.


    HTTP request-response paradigm


    The most important thing about this communication model is that HTTP is a stateless
    layer, which means that each request to the HTTP server is treated as an independent
    transaction that does not remember any previous requests and cannot persist data
    between the requests. So the communication consists of independent pairs of requests
    and responses. If you are building web APIs, the web server processes the HTTP
    requests and sends the response in either XML or JSON format. If you are building
    web applications, the web server processes the HTTP requests and sends the response
    as HTML web pages, which will be rendered in a web browser.


    The `net/http` library has two major components for processing HTTP requests (discussed
    in the following sections):


    *   `ServeMux`

    *   Handler


    ### ServeMux


    The `ServeMux` is a multiplexor (or simply an HTTP request router) that compares
    incoming HTTP requests against a list of predefined URI resources and then calls
    the associated handler for the resource requested by the HTTP client.


    ### Handler


    The `ServeMux` provides a multiplexor and calls corresponding handlers for HTTP
    requests. Handlers are responsible for writing response headers and bodies. In
    Go, any object can become a handler, thanks to GoвҖҷs excellent interface implementation
    provided by its type system. If any object satisfies the implementation of the
    `http.Handler` interface, it can be a handler for serving HTTP requests.


    Listing [4-1](#A978-1-4842-1052-9_4_Chapter.html#FPar2) shows the definition of
    the `http.Handler` interface.


    Listing 4-1.В В http.Handler Interface


    `type Handler interface {`


    В В В `ServeHTTP(ResponseWriter, *Request)`


    `}`


    The `ServeHTTP` method has two arguments: an `http.ResponseWriter` interface and
    a pointer to an `http.Request` struct. The `ResponseWriter` interface writes response
    headers and bodies into the HTTP response. You can use `Request` to extract information
    from the incoming HTTP requests. For example, if you want to read querystring
    values, use the `Request` object.


    The `http` package provides several functions that implement the `http.Handler`
    interface and are used as common handlers:


    *   `FileServer`

    *   `NotFoundHandler`

    *   `RedirectHandler`

    *   `StripPrefi` `x`

    *   `TimeoutHandler`


    ## Building a Static Web Server


    LetвҖҷs build a static web server in Go using the common handler function `FileServer`,
    which returns a handler object that can be used for building static web servers.


    Figure [4-2](#A978-1-4842-1052-9_4_Chapter.html#Fig2) illustrates the folder structure
    of a static web site.


    ![A978-1-4842-1052-9_4_Fig2_HTML.jpg](A978-1-4842-1052-9_4_Fig2_HTML.jpg)


    Figure 4-2.


    Folder structure of a static web site


    A static web site application is created in the `GOPATH` location with the folder
    structure specified in Figure [4-2](#A978-1-4842-1052-9_4_Chapter.html#Fig2).
    The implementation of the static web server is written in the `main.go` source
    file, and the static contents are put into the `public` folder that provides the
    contents for the static web site.


    Listing [4-2](#A978-1-4842-1052-9_4_Chapter.html#FPar3) shows the implementation
    in `main.go` that provides a static web server by serving the contents of `public`
    folder.


    Listing 4-2.В В Static Web Server Using the FileServer Function


    `package main`


    `import (`


    В В В В `"net/http"`


    `)`


    `func main() {`


    В В В В `mux := http.NewServeMux()`


    В В В В `fs := http.FileServer(http.Dir("public"))`


    В В В В `mux.Handle("/", fs)`


    В В В В `http.ListenAndServe(":8080", mux)`


    `}`


    In the `main` function, the `http.NewServeMux` function is called to create an
    empty `ServeMux` object. The `http.FileServer` function is then called to create
    a new handler for serving the static contents of a `public` folder in the web
    site. The `ServeMux.Handle` function is called to register the URL path `"/"`
    with the handler created with the `http.FileServer` function. Finally, the `http.ListenAndServe`
    function is called to create a HTTP server that starts listening at `:8080` for
    incoming requests. The address and `ServeMux` objects are passed into the `ListenAndServe`
    function.


    Listing [4-3](#A978-1-4842-1052-9_4_Chapter.html#FPar4) shows the signature of
    the `ListenAndServe` function.


    Listing 4-3.В В ListenAndServe Signature


    `func ListenAndServe(addr` [`string`](http://golang.org/pkg/builtin/#string) `,
    handler` [`Handler`](http://golang.org/pkg/net/http/#Handler) `)` [`error`](http://golang.org/pkg/builtin/#error)


    The `ListenAndServe` function listens on the TCP network address and then calls
    `Serve` with `http.Handler` to handle requests on incoming connections. The second
    argument of the `ListenAndServe` function is an `http.Handler`, but a `ServeMux`
    object was passed. The `ServeMux` type also has a `ServeHTTP` method, which means
    that it satisfies the `http.Handler` interface so that a `ServeMux` object can
    be passed as a second argument for the `ListenAndServe` function. Keep in mind
    that an instance of a `ServeMux` is an implementation of the `http.Handler` interface.
    If you pass `nil` as the second argument for `ListenAndServe`, a `DefaultServeMux`
    will be used for the `http.Handler. DefaultServeMux` is an instance of `ServeMux`,
    so it is also a handler.


    When you run the program, you can access the static web page вҖңabout.htmlвҖқ by navigating
    to `http://localhost:8080/about.html` (see Figure [4-3](#A978-1-4842-1052-9_4_Chapter.html#Fig3)).
    The `about.html` page was put into the `public` folder for serving as static content.


    ![A978-1-4842-1052-9_4_Fig3_HTML.jpg](A978-1-4842-1052-9_4_Fig3_HTML.jpg)


    Figure 4-3.


    Accessing the static web site'
  trans: "\n# еӨ„зҗҶ HTTP иҜ·жұӮ\n\nWeb еҹәдәҺиҜ·жұӮ-е“Қеә”иҢғејҸгҖӮеңЁиҜҘжЁЎеһӢпјҲи§Ғеӣҫ 4-1пјүдёӯпјҢHTTP е®ўжҲ·з«Ҝеҗ‘ Web жңҚеҠЎеҷЁеҸ‘йҖҒж•°жҚ®иҜ·жұӮпјҢз»ҸжңҚеҠЎеҷЁеӨ„зҗҶеҗҺпјҢеҶҚе°Ҷе“Қеә”иҝ”еӣһз»ҷ\
    \ HTTP е®ўжҲ·з«ҜгҖӮ\n\n![A978-1-4842-1052-9_4_Fig1_HTML.jpg](img/A978-1-4842-1052-9_4_Fig1_HTML.jpg)\n\
    \nеӣҫ 4-1. HTTP иҜ·жұӮ-е“Қеә”иҢғејҸ\n\nиҝҷз§ҚйҖҡдҝЎжЁЎеһӢжңҖе…ій”®зҡ„дёҖзӮ№еңЁдәҺпјҢHTTP жҳҜдёҖдёӘж— зҠ¶жҖҒеұӮпјҢиҝҷж„Ҹе‘ізқҖжҜҸж¬Ўеҗ‘ HTTP жңҚеҠЎеҷЁеҸ‘еҮәзҡ„иҜ·жұӮйғҪиў«и§ҶдёәзӢ¬з«Ӣзҡ„дәӢеҠЎпјҢе®ғдёҚдјҡи®°дҪҸд»»дҪ•д№ӢеүҚзҡ„иҜ·жұӮпјҢд№ҹж— жі•еңЁиҜ·жұӮд№Ӣй—ҙжҢҒд№…дҝқеӯҳж•°жҚ®гҖӮеӣ жӯӨпјҢйҖҡдҝЎз”ұзӢ¬з«Ӣзҡ„иҜ·жұӮе’Ңе“Қеә”еҜ№з»„жҲҗгҖӮеҰӮжһңдҪ жӯЈеңЁжһ„е»ә\
    \ Web APIпјҢWeb жңҚеҠЎеҷЁдјҡеӨ„зҗҶ HTTP иҜ·жұӮпјҢе№¶д»Ҙ XML жҲ– JSON ж јејҸеҸ‘йҖҒе“Қеә”гҖӮеҰӮжһңдҪ жӯЈеңЁжһ„е»ә Web еә”з”ЁзЁӢеәҸпјҢWeb жңҚеҠЎеҷЁдјҡеӨ„зҗҶ\
    \ HTTP иҜ·жұӮпјҢе№¶д»Ҙ HTML зҪ‘йЎөзҡ„еҪўејҸеҸ‘йҖҒе“Қеә”пјҢиҝҷдәӣзҪ‘йЎөе°ҶеңЁ Web жөҸи§ҲеҷЁдёӯжёІжҹ“гҖӮ\n\n`net/http` еә“жңүдёӨдёӘз”ЁдәҺеӨ„зҗҶ HTTP иҜ·жұӮзҡ„дё»иҰҒз»„д»¶пјҲе°ҶеңЁд»ҘдёӢз« иҠӮдёӯи®Ёи®әпјүпјҡ\n\
    \n*   `ServeMux`\n*   `Handler`\n\n## ServeMux\n\n`ServeMux` жҳҜдёҖдёӘеӨҡи·ҜеӨҚз”ЁеҷЁпјҲжҲ–иҖ…з®Җз§°дёә HTTP\
    \ иҜ·жұӮи·Ҝз”ұеҷЁпјүпјҢе®ғе°Ҷдј е…Ҙзҡ„ HTTP иҜ·жұӮдёҺйў„е®ҡд№үзҡ„ URI иө„жәҗеҲ—иЎЁиҝӣиЎҢеҢ№й…ҚпјҢз„¶еҗҺдёә HTTP е®ўжҲ·з«ҜиҜ·жұӮзҡ„иө„жәҗи°ғз”Ёзӣёеә”зҡ„еӨ„зҗҶеҷЁгҖӮ\n\n## Handler\n\
    \n`ServeMux` жҸҗдҫӣдёҖдёӘеӨҡи·ҜеӨҚз”ЁеҷЁпјҢе№¶дёә HTTP иҜ·жұӮи°ғз”Ёзӣёеә”зҡ„еӨ„зҗҶеҷЁгҖӮеӨ„зҗҶеҷЁиҙҹиҙЈеҶҷе…Ҙе“Қеә”еӨҙе’Ңе“Қеә”дҪ“гҖӮеңЁ Go дёӯпјҢд»»дҪ•еҜ№иұЎйғҪеҸҜд»ҘжҲҗдёәеӨ„зҗҶеҷЁпјҢиҝҷеҪ’еҠҹдәҺ\
    \ Go зұ»еһӢзі»з»ҹжҸҗдҫӣзҡ„еҮәиүІжҺҘеҸЈе®һзҺ°гҖӮеҰӮжһңд»»дҪ•еҜ№иұЎж»Ўи¶і `http.Handler` жҺҘеҸЈзҡ„е®һзҺ°пјҢе®ғе°ұеҸҜд»ҘжҲҗдёәеӨ„зҗҶ HTTP иҜ·жұӮзҡ„еӨ„зҗҶеҷЁгҖӮ\n\nд»Јз Ғжё…еҚ•\
    \ 4-1 еұ•зӨәдәҶ `http.Handler` жҺҘеҸЈзҡ„е®ҡд№үгҖӮ\n\nд»Јз Ғжё…еҚ• 4-1. `http.Handler` жҺҘеҸЈ\n\n```\ntype Handler\
    \ interface {\n   ServeHTTP(ResponseWriter, *Request)\n}\n```\n\n`ServeHTTP` ж–№жі•жңүдёӨдёӘеҸӮж•°пјҡдёҖдёӘ\
    \ `http.ResponseWriter` жҺҘеҸЈе’ҢдёҖдёӘжҢҮеҗ‘ `http.Request` з»“жһ„дҪ“зҡ„жҢҮй’ҲгҖӮ`ResponseWriter` жҺҘеҸЈз”ЁдәҺе°Ҷе“Қеә”еӨҙе’Ңе“Қеә”дҪ“еҶҷе…Ҙ\
    \ HTTP е“Қеә”дёӯгҖӮдҪ еҸҜд»ҘдҪҝз”Ё `Request` д»Һдј е…Ҙзҡ„ HTTP иҜ·жұӮдёӯжҸҗеҸ–дҝЎжҒҜгҖӮдҫӢеҰӮпјҢеҰӮжһңдҪ жғіиҜ»еҸ–жҹҘиҜўеӯ—з¬ҰдёІзҡ„еҖјпјҢиҜ·дҪҝз”Ё `Request` еҜ№иұЎгҖӮ\n\
    \n`http` еҢ…жҸҗдҫӣдәҶеӨҡдёӘе®һзҺ°дәҶ `http.Handler` жҺҘеҸЈзҡ„еҮҪж•°пјҢе®ғд»¬иў«з”ЁдҪңйҖҡз”ЁеӨ„зҗҶеҷЁпјҡ\n\n*   `FileServer`\n*   `NotFoundHandler`\n\
    *   `RedirectHandler`\n*   `StripPrefix`\n*   `TimeoutHandler`\n\n## жһ„е»әйқҷжҖҒ Web\
    \ жңҚеҠЎеҷЁ\n\nи®©жҲ‘д»¬дҪҝз”ЁйҖҡз”ЁеӨ„зҗҶеҷЁеҮҪж•° `FileServer` еңЁ Go дёӯжһ„е»әдёҖдёӘйқҷжҖҒ Web жңҚеҠЎеҷЁпјҢиҜҘеҮҪж•°иҝ”еӣһдёҖдёӘеҸҜз”ЁдәҺжһ„е»әйқҷжҖҒ Web жңҚеҠЎеҷЁзҡ„еӨ„зҗҶеҷЁеҜ№иұЎгҖӮ\n\
    \nеӣҫ 4-2 еұ•зӨәдәҶдёҖдёӘйқҷжҖҒзҪ‘з«ҷзҡ„ж–Үд»¶еӨ№з»“жһ„гҖӮ\n\n![A978-1-4842-1052-9_4_Fig2_HTML.jpg](img/A978-1-4842-1052-9_4_Fig2_HTML.jpg)\n\
    \nеӣҫ 4-2. йқҷжҖҒзҪ‘з«ҷзҡ„ж–Үд»¶еӨ№з»“жһ„\n\nдёҖдёӘйқҷжҖҒзҪ‘з«ҷеә”з”ЁзЁӢеәҸеңЁ `GOPATH` дҪҚзҪ®еҲӣе»әпјҢе…¶ж–Үд»¶еӨ№з»“жһ„еҰӮеӣҫ 4-2 жүҖзӨәгҖӮйқҷжҖҒ Web жңҚеҠЎеҷЁзҡ„е®һзҺ°еңЁ\
    \ `main.go` жәҗж–Үд»¶дёӯзј–еҶҷпјҢйқҷжҖҒеҶ…е®№ж”ҫзҪ®еңЁ `public` ж–Үд»¶еӨ№дёӯпјҢиҜҘж–Үд»¶еӨ№дёәйқҷжҖҒзҪ‘з«ҷжҸҗдҫӣеҶ…е®№гҖӮ\n\nд»Јз Ғжё…еҚ• 4-2 еұ•зӨәдәҶ `main.go`\
    \ дёӯзҡ„е®һзҺ°пјҢе®ғйҖҡиҝҮжҸҗдҫӣ `public` ж–Үд»¶еӨ№зҡ„еҶ…е®№жқҘжһ„е»әдёҖдёӘйқҷжҖҒ Web жңҚеҠЎеҷЁгҖӮ\n\nд»Јз Ғжё…еҚ• 4-2. дҪҝз”Ё `FileServer` еҮҪж•°жһ„е»әзҡ„йқҷжҖҒ\
    \ Web жңҚеҠЎеҷЁ\n\n```\npackage main\n\nimport (\n    \"net/http\"\n)\n\nfunc main()\
    \ {\n    mux := http.NewServeMux()\n    fs := http.FileServer(http.Dir(\"public\"\
    ))\n    mux.Handle(\"/\", fs)\n    http.ListenAndServe(\":8080\", mux)\n}\n```\n\
    \nеңЁ `main` еҮҪж•°дёӯпјҢи°ғз”ЁдәҶ `http.NewServeMux` еҮҪж•°жқҘеҲӣе»әдёҖдёӘз©әзҡ„ `ServeMux` еҜ№иұЎгҖӮз„¶еҗҺи°ғз”ЁдәҶ `http.FileServer`\
    \ еҮҪж•°жқҘеҲӣе»әдёҖдёӘж–°зҡ„еӨ„зҗҶеҷЁпјҢз”ЁдәҺжҸҗдҫӣзҪ‘з«ҷ `public` ж–Үд»¶еӨ№дёӯзҡ„йқҷжҖҒеҶ…е®№гҖӮжҺҘзқҖи°ғз”ЁдәҶ `ServeMux.Handle` еҮҪж•°пјҢе°Ҷ URL и·Ҝеҫ„ `\"\
    /\"` жіЁеҶҢеҲ°йҖҡиҝҮ `http.FileServer` еҮҪж•°еҲӣе»әзҡ„еӨ„зҗҶеҷЁдёҠгҖӮжңҖеҗҺпјҢи°ғз”ЁдәҶ `http.ListenAndServe` еҮҪж•°жқҘеҲӣе»әдёҖдёӘ HTTP\
    \ жңҚеҠЎеҷЁпјҢиҜҘжңҚеҠЎеҷЁејҖе§Ӣзӣ‘еҗ¬ `:8080` з«ҜеҸЈдёҠзҡ„дј е…ҘиҜ·жұӮгҖӮең°еқҖе’Ң `ServeMux` еҜ№иұЎиў«дј йҖ’з»ҷдәҶ `ListenAndServe` еҮҪж•°гҖӮ\n\n\
    д»Јз Ғжё…еҚ• 4-3 еұ•зӨәдәҶ `ListenAndServe` еҮҪж•°зҡ„зӯҫеҗҚгҖӮ\n\nд»Јз Ғжё…еҚ• 4-3. `ListenAndServe` зӯҫеҗҚ\n\n```\n\
    func ListenAndServe(addr string, handler Handler) error\n```\n\n`ListenAndServe`\
    \ еҮҪж•°еңЁ TCP зҪ‘з»ңең°еқҖдёҠзӣ‘еҗ¬пјҢз„¶еҗҺи°ғз”ЁеёҰжңү `http.Handler` зҡ„ `Serve` еҮҪж•°жқҘеӨ„зҗҶдј е…ҘиҝһжҺҘдёҠзҡ„иҜ·жұӮгҖӮ`ListenAndServe`\
    \ еҮҪж•°зҡ„з¬¬дәҢдёӘеҸӮж•°жҳҜдёҖдёӘ `http.Handler`пјҢдҪҶжӯӨеӨ„дј е…Ҙзҡ„жҳҜдёҖдёӘ `ServeMux` еҜ№иұЎгҖӮ`ServeMux` зұ»еһӢд№ҹе…·жңү `ServeHTTP`\
    \ ж–№жі•пјҢиҝҷж„Ҹе‘ізқҖе®ғж»Ўи¶ідәҶ `http.Handler` жҺҘеҸЈпјҢеӣ жӯӨеҸҜд»Ҙе°Ҷ `ServeMux` еҜ№иұЎдҪңдёә `ListenAndServe` еҮҪж•°зҡ„з¬¬дәҢдёӘеҸӮж•°дј е…ҘгҖӮиҜ·и®°дҪҸпјҢ`ServeMux`\
    \ зҡ„е®һдҫӢжҳҜ `http.Handler` жҺҘеҸЈзҡ„дёҖдёӘе®һзҺ°гҖӮеҰӮжһңдҪ е°Ҷ `nil` дҪңдёә `ListenAndServe` зҡ„з¬¬дәҢдёӘеҸӮж•°дј е…ҘпјҢеҲҷе°ҶдҪҝз”Ё `DefaultServeMux`\
    \ дҪңдёә `http.Handler`гҖӮ`DefaultServeMux` жҳҜ `ServeMux` зҡ„дёҖдёӘе®һдҫӢпјҢеӣ жӯӨе®ғд№ҹжҳҜдёҖдёӘеӨ„зҗҶеҷЁгҖӮ\n\nеҪ“дҪ иҝҗиЎҢиҜҘзЁӢеәҸж—¶пјҢеҸҜд»ҘйҖҡиҝҮеҜјиҲӘеҲ°\
    \ `http://localhost:8080/about.html`пјҲи§Ғеӣҫ 4-3пјүжқҘи®ҝй—®йқҷжҖҒзҪ‘йЎө `about.html`гҖӮ`about.html`\
    \ йЎөйқўиў«ж”ҫзҪ®еңЁ `public` ж–Үд»¶еӨ№дёӯпјҢд»ҘдҪңдёәйқҷжҖҒеҶ…е®№жҸҗдҫӣгҖӮ\n\n![A978-1-4842-1052-9_4_Fig3_HTML.jpg](img/A978-1-4842-1052-9_4_Fig3_HTML.jpg)\n\
    \nеӣҫ 4-3. и®ҝй—®йқҷжҖҒзҪ‘з«ҷ\n"
- fmt: "## Creating Custom Handlers\n\nIn Go, any object can be an implementation\
    \ of `http.Handler` if it can provide a method with the signature `ServeHTTP(http.ResponseWriter,\
    \ *http.Request)`.\n\nListing [4-4](#A978-1-4842-1052-9_4_Chapter.html#FPar5)\
    \ creates a custom handler by implementing the `http.Handler` interface.\n\nListing\
    \ 4-4. Creating a Custom Handler\n\n```\ntype messageHandler struct {\n    message\
    \ string\n}\n\nfunc (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request)\
    \ {\n    fmt.Fprintf(w, m.message)\n}\n```\n\nA struct named `messageHandler`\
    \ is created. To make this type implement `Handler`, a method with the signature\
    \ `ServeHTTP(http.ResponseWriter, *http.Request)` is implemented. As discussed\
    \ in [Chapter 3](#A978-1-4842-1052-9_3_Chapter.html), you donвҖҷt need to specify\
    \ a keyword to implement an interface into a type; you can implement an interface\
    \ type into concrete types by providing the methods based on the method signature\
    \ defined by the interface. The `receiver` method is added as a `messageHandler`\
    \ type into the `ServeHTTP` function to make it a method of the `messageHandler`\
    \ struct. In the `ServeHTTP` method, a string message is returned as the HTTP\
    \ response, taking data from the struct field `message`.\n\nLetвҖҷs write a program\
    \ to use the custom handler (see Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6)).\n\
    \nListing 4-5. Using a Custom Handler Type\n\n```\npackage main\n\nimport (\n\
    \    \"fmt\"\n    \"log\"\n    \"net/http\"\n)\n\ntype messageHandler struct {\n\
    \    message string\n}\n\nfunc (m *messageHandler) ServeHTTP(w http.ResponseWriter,\
    \ r *http.Request) {\n    fmt.Fprintf(w, m.message)\n}\n\nfunc main() {\n    mux\
    \ := http.NewServeMux()\n    mh1 := &messageHandler{\"Welcome to Go Web Development\"\
    }\n    mux.Handle(\"/welcome\", mh1)\n    mh2 := &messageHandler{\"net/http is\
    \ awesome\"}\n    mux.Handle(\"/message\", mh2)\n    log.Println(\"Listening...\"\
    )\n    http.ListenAndServe(\":8080\", mux)\n}\n```\n\nIn the `main` function,\
    \ instances of the `messageHandler` struct (the `&` symbol is used to yield a\
    \ pointer) are created and then `ServeMux.Handle` is called to register handlers\
    \ with the `messageHandler` struct instances. If there are requests for the URL\
    \ path `\"/welcome\"` and `\"/message\"`, the `ServeHTTP` method of `messageHandler`\
    \ does all processing at the server. You can also reuse the custom handlers. In\
    \ the example, `messageHandler` is used as the handler for two URL paths.\n\n\
    ## Using Functions as Handlers\n\nListing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6)\
    \ created a struct type and made it a handler by implementing the `ServeHTTP`\
    \ method with the appropriate method signature. The custom handler can even be\
    \ reused for multiple URL paths. Although it works for some scenarios, making\
    \ handlers this way is bit verbose because you have to define structs and then\
    \ provide implementations for the `ServeHTTP` method. And in many contexts, you\
    \ may want to use normal functions as handlers.\n\n### `http.HandlerFunc` type\n\
    \nInstead of creating custom handler types by implementing the `http.Handler`\
    \ interface, you can use the `http.HandlerFunc` type to serve as an HTTP handler.\
    \ You can convert any function into a `HandlerFunc` type if the function has the\
    \ signature `func(http.ResponseWriter, *http.Request)`. The `HandlerFunc` type\
    \ works as an adapter that allows you to use normal functions as HTTP handlers.\
    \ The `HandlerFunc` type has a built-in method `ServeHTTP(http.ResponseWriter,\
    \ *http.Request)`, so it also satisfies the `http.Handler` interface and can work\
    \ as an HTTP handler.\n\nListing [4-6](#A978-1-4842-1052-9_4_Chapter.html#FPar7)\
    \ is an example program that uses the `HandlerFunc` type to create HTTP handlers.\n\
    \nListing 4-6. Using the `HandlerFunc` Type to Create Ordinary Functions as Handlers\n\
    \n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
    )\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
    \    // Convert the messageHandler function to a HandlerFunc type\n    mh := http.HandlerFunc(messageHandler)\n\
    \    mux.Handle(\"/welcome\", mh)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
    :8080\", mux)\n}\n```\n\nWhen you run the program, navigate to `http://localhost:8080/welcome`\
    \ for the output.\n\nIn the `main` function, an instance of `HandlerFunc` is created\
    \ by converting the `messageHandler` function and then adding it to `ServeMux.Handle`\
    \ to handle the requests to the `\"/welcome\"` URL path. With the `HandlerFunc`\
    \ type, you can easily use ordinary functions as HTTP handlers.\n\nIn Listing\
    \ [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6), the custom handler was reused\
    \ for multiple URL paths because it provides a reusable `\"message\"` field that\
    \ provides a string value to the handlers. Listing [4-6](#A978-1-4842-1052-9_4_Chapter.html#FPar7)\
    \ could not provide values for `\"message\"`, so the value for the message string\
    \ has to be hard-coded. In many scenarios, you have to provide some values to\
    \ the handler functions.\n\nSuppose that you want to pass a database connection\
    \ object into a handler function to reuse it inside the handler function. You\
    \ can write a function with an argument for receiving some values, and then define\
    \ and return another function to work as an `http.Handler` inside the function.\
    \ In Go, you can create functions inside the function, and it is also supports\
    \ `closure`. Handler logic can be implemented into a closure.\n\nListing [4-7](#A978-1-4842-1052-9_4_Chapter.html#FPar8)\
    \ is an example program that writes handler logic with a closure.\n\nListing 4-7.\
    \ Writing Handler Logic into a Closure\n\n```\npackage main\n\nimport (\n    \"\
    fmt\"\n    \"log\"\n    \"net/http\"\n)\n\n// Handler logic into a Closure\nfunc\
    \ messageHandler(message string) http.Handler {\n    return http.HandlerFunc(func(w\
    \ http.ResponseWriter, r *http.Request) {\n        fmt.Fprintf(w, message)\n \
    \   })\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n    mux.Handle(\"/welcome\"\
    , messageHandler(\"Welcome to Go Web Development\"))\n    mux.Handle(\"/message\"\
    , messageHandler(\"net/http is awesome\"))\n    log.Println(\"Listening...\")\n\
    \    http.ListenAndServe(\":8080\", mux)\n}\n```\n\nThis program works the same\
    \ way as Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6). The `messageHandler`\
    \ function returns an `http.Handler`. Within the `messageHandler` function, `http.HandlerFunc`\
    \ is returned by calling an anonymous function that has the signature `func(http.ResponseWriter,\
    \ *http.Request)` so that it satisfies the `http.Handler`, and the `messageHandler`\
    \ function can return `http.Handler`. As discussed in the previous section, the\
    \ `http.HandlerFunc` type is an implementation of `http.Handler`. Here, a closure\
    \ is formed with the variable `\"message\"`, and the function is put inside the\
    \ `messageHandler` function. This approach is useful when you are working on real-world\
    \ applications; you can use this approach to provide values of application context\
    \ level types into handler functions."
  raw: '## Creating Custom Handlers


    In Go, any object can be an implementation of `http.Handler` if it can provide
    a method with the signature `ServeHTTP(http.ResponseWriter, *http.Request)`.


    Listing [4-4](#A978-1-4842-1052-9_4_Chapter.html#FPar5) creates a custom handler
    by implementing the `http.Handler` interface.


    Listing 4-4.В В Creating a Custom Handler


    `type messageHandler struct {`


    В В В В `message string`


    `}`


    `func (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request) {`


    В В В В `fmt.Fprintf(w, m.message)`


    `}`


    A struct named `messageHandler` is created. To make this type implement `Handler`,
    a method with the signature `ServeHTTP(http.ResponseWriter, *http.Request)` is
    implemented. As discussed in [Chapter 3](#A978-1-4842-1052-9_3_Chapter.html),
    you donвҖҷt need to specify a keyword to implement an interface into a type; you
    can implement an interface type into concrete types by providing the methods based
    on the method signature defined by the interface. The `receiver` method is added
    as a `messageHandler` type into the `ServeHTTP` function to make it a method of
    the `messageHandler` struct. In the `ServeHTTP` method, a string message is returned
    as the HTTP response, taking data from the struct field `message`.


    LetвҖҷs write a program to use the custom handler (see Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6)).


    Listing 4-5.В В Using a Custom Handler Type


    `package main`


    `import (`


    В В В В `"fmt"`


    В В В В `"log"`


    В В В В `"net/http"`


    `)`


    `type messageHandler struct {`


    В В В В `message string`


    `}`


    `func (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request) {`


    В В В В `fmt.Fprintf(w, m.message)`


    `}`


    `func main() {`


    В В В В `mux := http.NewServeMux()`


    В В В В `mh1 := &messageHandler{"Welcome to Go Web Development"}`


    В В В В `mux.Handle("/welcome", mh1)`


    В В В В `mh2 := &messageHandler{"net/http is awesome"}`


    В В В В `mux.Handle("/message", mh2)`


    В В В В `log.Println("Listening...")`


    В В В В `http.ListenAndServe(":8080", mux)`


    `}`


    In the `main` function, instances of the `messageHandler` struct (the `&` symbol
    is used to yield a pointer) are created and then `ServeMux.Handle` is called to
    register handlers with the `messageHandler` struct instances. If there are requests
    for the URL path `"/welcome"` and `"/message"`, the `ServeHTTP` method of `messageHandler`
    does all processing at the server. You can also reuse the custom handlers. In
    the example, `messageHandler` is used as the handler for two URL paths.


    ## Using Functions as Handlers


    Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6) created a struct type
    and made it a handler by implementing the `ServeHTTP` method with the appropriate
    method signature. The custom handler can even be reused for multiple URL paths.
    Although it works for some scenarios, making handlers this way is bit verbose
    because you have to define structs and then provide implementations for the `ServeHTTP`
    method. And in many contexts, you may want to use normal functions as handlers.


    ### http.HandlerFunc type


    Instead of creating custom handler types by implementing the `http.Handler` interface,
    you can use the `http.HandlerFunc` type to serve as an HTTP handler. You can convert
    any function into a `HandlerFunc` type if the function has the signature `func(http.ResponseWriter,
    *http.Request)`. The `HandlerFunc` type works as an adapter that allows you to
    use normal functions as HTTP handlers. The `HandlerFunc` type has a built-in method
    `ServeHTTP(http.ResponseWriter, *http.Request),` so it also satisfies the `http.Handler`
    interface and can work as an HTTP handler.


    Listing [4-6](#A978-1-4842-1052-9_4_Chapter.html#FPar7) is an example program
    that uses the `HandlerFunc` type to create HTTP handlers.


    Listing 4-6.В В Using the HandlerFunc Type to Create Ordinary Functions as Handlers


    `package main`


    `import (`


    `"fmt"`


    `"log"`


    `"net/http"`


    `)`


    `func messageHandler(w http.ResponseWriter, r *http.Request) {`


    `fmt.Fprintf(w, "Welcome to Go Web Development")`


    `}`


    `func main() {`


    `mux := http.NewServeMux()`


    `// Convert the messageHandler function to a HandlerFunc type`


    `mh := http.HandlerFunc(messageHandler)`


    `mux.Handle("/welcome", mh)`


    `log.Println("Listening...")`


    `http.ListenAndServe(":8080", mux)`


    `}`


    When you run the program, navigate to `http://localhost:8080/welcome` for the
    output.


    In the `main` function, an instance of `HandlerFunc` is created by converting
    the `messageHandler` function and then adding it to `ServeMux.Handle` to handle
    the requests to the `"/welcome"` URL path. With the `HandlerFunc` type, you can
    easily use ordinary functions as HTTP handlers.


    In Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6), the custom handler
    was reused for multiple URL paths because it provides a reusable `"message"` field
    that provides a string value to the handlers. Listing [4-6](#A978-1-4842-1052-9_4_Chapter.html#FPar7)
    could not provide values for `"message"`, so the value for the message string
    has to be hard-coded. In many scenarios, you have to provide some values to the
    handler functions.


    Suppose that you want to pass a database connection object into a handler function
    to reuse it inside the handler function. You can write a function with an argument
    for receiving some values, and then define and return another function to work
    as an `http.Handler` inside the function. In Go, you can create functions inside
    the function, and it is also supports `closure`. Handler logic can be implemented
    into a closure.


    Listing [4-7](#A978-1-4842-1052-9_4_Chapter.html#FPar8) is an example program
    that writes handler logic with a closure.


    Listing 4-7.В В Writing Handler Logic into a Closure


    `package main`


    `import (`


    `"fmt"`


    `"log"`


    `"net/http"`


    `)`


    `//Handler logic into a Closure`


    `func messageHandler(message string) http.Handler {`


    `return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {`


    `fmt.Fprintf(w, message)`


    `})`


    `}`


    `func main() {`


    `mux := http.NewServeMux()`


    `mux.Handle("/welcome", messageHandler("Welcome to Go Web Development"))`


    `mux.Handle("/message", messageHandler("net/http is awesome"))`


    `log.Println("Listening...")`


    `http.ListenAndServe(":8080", mux)`


    `}`


    This program works the same way as Listing [4-5](#A978-1-4842-1052-9_4_Chapter.html#FPar6).
    The `messageHandler` function returns an `http.Handler`. Within the `messageHandler`
    function, `http.HandlerFunc` is returned by calling an anonymous function that
    has the signature `func(http.ResponseWriter, *http.Request)` so that it satisfies
    the `http.Handler`, and the `messageHandler` function can return `http.Handler`.
    As discussed in the previous section, the `http.HandlerFunc` type is an implementation
    of `http.Handler`. Here, a closure is formed with the variable `"message"`, and
    the function is put inside the `messageHandler` function. This approach is useful
    when you are working on real-world applications; you can use this approach to
    provide values of application context level types into handler functions.'
  trans: "\n## еҲӣе»әиҮӘе®ҡд№үеӨ„зҗҶеҷЁ\n\nеңЁ Go иҜӯиЁҖдёӯпјҢеҸӘиҰҒд»»дҪ•еҜ№иұЎиғҪжҸҗдҫӣзӯҫеҗҚеҪўејҸдёә `ServeHTTP(http.ResponseWriter,\
    \ *http.Request)` зҡ„ж–№жі•пјҢе®ғе°ұеҸҜд»ҘжҲҗдёә `http.Handler` зҡ„е®һзҺ°гҖӮ\n\nжё…еҚ• 4-4 йҖҡиҝҮе®һзҺ° `http.Handler`\
    \ жҺҘеҸЈеҲӣе»әдәҶдёҖдёӘиҮӘе®ҡд№үеӨ„зҗҶеҷЁгҖӮ\n\nжё…еҚ• 4-4. еҲӣе»әиҮӘе®ҡд№үеӨ„зҗҶеҷЁ\n\n```\ntype messageHandler struct {\n  \
    \  message string\n}\n\nfunc (m *messageHandler) ServeHTTP(w http.ResponseWriter,\
    \ r *http.Request) {\n    fmt.Fprintf(w, m.message)\n}\n```\n\nеҲӣе»әдәҶдёҖдёӘеҗҚдёә `messageHandler`\
    \ зҡ„з»“жһ„дҪ“гҖӮдёәдәҶи®©иҜҘзұ»еһӢе®һзҺ° `Handler` жҺҘеҸЈпјҢе®һзҺ°дәҶдёҖдёӘзӯҫеҗҚеҪўејҸдёә `ServeHTTP(http.ResponseWriter, *http.Request)`\
    \ зҡ„ж–№жі•гҖӮеҰӮз¬¬ 3 з« жүҖиҝ°пјҢдҪ ж— йңҖжҢҮе®ҡе…ій”®еӯ—жқҘи®©жҹҗдёӘзұ»еһӢе®һзҺ°жҺҘеҸЈпјӣеҸӘйңҖж №жҚ®жҺҘеҸЈе®ҡд№үзҡ„ж–№жі•зӯҫеҗҚжҸҗдҫӣзӣёеә”зҡ„ж–№жі•пјҢе°ұеҸҜд»Ҙе°ҶжҺҘеҸЈзұ»еһӢе®һзҺ°еҲ°е…·дҪ“зұ»еһӢдёӯгҖӮе°Ҷ `receiver`\
    \ ж–№жі•дҪңдёә `messageHandler` зұ»еһӢж·»еҠ еҲ° `ServeHTTP` еҮҪж•°дёӯпјҢдҪҝе…¶жҲҗдёә `messageHandler` з»“жһ„дҪ“зҡ„ж–№жі•гҖӮеңЁ `ServeHTTP`\
    \ ж–№жі•дёӯпјҢд»Һз»“жһ„дҪ“еӯ—ж®ө `message` иҺ·еҸ–ж•°жҚ®пјҢе№¶иҝ”еӣһдёҖжқЎеӯ—з¬ҰдёІж¶ҲжҒҜдҪңдёә HTTP е“Қеә”гҖӮ\n\nи®©жҲ‘д»¬зј–еҶҷдёҖдёӘзЁӢеәҸжқҘдҪҝз”ЁиҝҷдёӘиҮӘе®ҡд№үеӨ„зҗҶеҷЁпјҲи§Ғжё…еҚ•\
    \ 4-5пјүгҖӮ\n\nжё…еҚ• 4-5. дҪҝз”ЁиҮӘе®ҡд№үеӨ„зҗҶеҷЁзұ»еһӢ\n\n```\npackage main\n\nimport (\n    \"fmt\"\n\
    \    \"log\"\n    \"net/http\"\n)\n\ntype messageHandler struct {\n    message\
    \ string\n}\n\nfunc (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request)\
    \ {\n    fmt.Fprintf(w, m.message)\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
    \    mh1 := &messageHandler{\"Welcome to Go Web Development\"}\n    mux.Handle(\"\
    /welcome\", mh1)\n    mh2 := &messageHandler{\"net/http is awesome\"}\n    mux.Handle(\"\
    /message\", mh2)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
    :8080\", mux)\n}\n```\n\nеңЁ `main` еҮҪж•°дёӯпјҢеҲӣе»әдәҶ `messageHandler` з»“жһ„дҪ“зҡ„е®һдҫӢпјҲдҪҝз”Ё `&` з¬ҰеҸ·иҺ·еҸ–жҢҮй’ҲпјүпјҢз„¶еҗҺи°ғз”Ё\
    \ `ServeMux.Handle` жқҘе°ҶеӨ„зҗҶеҷЁжіЁеҶҢеҲ° `messageHandler` з»“жһ„дҪ“зҡ„е®һдҫӢдёҠгҖӮеҰӮжһңеӯҳеңЁеҜ№ URL и·Ҝеҫ„ `\"/welcome\"\
    ` е’Ң `\"/message\"` зҡ„иҜ·жұӮпјҢ`messageHandler` зҡ„ `ServeHTTP` ж–№жі•е°ҶеңЁжңҚеҠЎеҷЁз«Ҝе®ҢжҲҗжүҖжңүеӨ„зҗҶгҖӮдҪ иҝҳеҸҜд»ҘйҮҚеӨҚдҪҝз”ЁиҮӘе®ҡд№үеӨ„зҗҶеҷЁгҖӮеңЁиҜҘзӨәдҫӢдёӯпјҢ`messageHandler`\
    \ иў«з”ЁдҪңдёӨдёӘ URL и·Ҝеҫ„зҡ„еӨ„зҗҶеҷЁгҖӮ\n\n## дҪҝз”ЁеҮҪж•°дҪңдёәеӨ„зҗҶеҷЁ\n\nжё…еҚ• 4-5 еҲӣе»әдәҶдёҖдёӘз»“жһ„дҪ“зұ»еһӢпјҢе№¶йҖҡиҝҮе®һзҺ°зӯҫеҗҚжӯЈзЎ®зҡ„ `ServeHTTP`\
    \ ж–№жі•дҪҝе…¶жҲҗдёәдёҖдёӘеӨ„зҗҶеҷЁгҖӮиҝҷдёӘиҮӘе®ҡд№үеӨ„зҗҶеҷЁз”ҡиҮіеҸҜд»Ҙиў«еӨҡдёӘ URL и·Ҝеҫ„йҮҚеӨҚдҪҝз”ЁгҖӮе°Ҫз®Ўиҝҷз§Қж–№ејҸеңЁжҹҗдәӣеңәжҷҜдёӢеҸҜиЎҢпјҢдҪҶиҝҷж ·еҲӣе»әеӨ„зҗҶеҷЁзҡ„д»Јз Ғз•ҘжҳҫеҶ—й•ҝпјҢеӣ дёәдҪ еҝ…йЎ»е®ҡд№үз»“жһ„дҪ“пјҢз„¶еҗҺеҶҚдёә\
    \ `ServeHTTP` ж–№жі•жҸҗдҫӣе®һзҺ°гҖӮиҖҢдё”еңЁи®ёеӨҡжғ…еҶөдёӢпјҢдҪ еҸҜиғҪеёҢжңӣдҪҝз”Ёжҷ®йҖҡеҮҪж•°дҪңдёәеӨ„зҗҶеҷЁгҖӮ\n\n### `http.HandlerFunc` зұ»еһӢ\n\
    \nйҷӨдәҶйҖҡиҝҮе®һзҺ° `http.Handler` жҺҘеҸЈжқҘеҲӣе»әиҮӘе®ҡд№үеӨ„зҗҶеҷЁзұ»еһӢпјҢдҪ иҝҳеҸҜд»ҘдҪҝз”Ё `http.HandlerFunc` зұ»еһӢжқҘе……еҪ“ HTTP еӨ„зҗҶеҷЁгҖӮеҸӘиҰҒжҹҗдёӘеҮҪж•°зҡ„зӯҫеҗҚжҳҜ\
    \ `func(http.ResponseWriter, *http.Request)`пјҢдҪ е°ұеҸҜд»Ҙе°ҶиҜҘеҮҪж•°иҪ¬жҚўдёә `HandlerFunc` зұ»еһӢгҖӮ`HandlerFunc`\
    \ зұ»еһӢе°ұеғҸдёҖдёӘйҖӮй…ҚеҷЁпјҢе…Ғи®ёдҪ е°Ҷжҷ®йҖҡеҮҪж•°з”ЁдҪң HTTP еӨ„зҗҶеҷЁгҖӮ`HandlerFunc` зұ»еһӢеҶ…зҪ®дәҶ `ServeHTTP(http.ResponseWriter,\
    \ *http.Request)` ж–№жі•пјҢеӣ жӯӨе®ғд№ҹж»Ўи¶ідәҶ `http.Handler` жҺҘеҸЈпјҢеҸҜд»Ҙе……еҪ“ HTTP еӨ„зҗҶеҷЁгҖӮ\n\nжё…еҚ• 4-6 жҳҜдёҖдёӘдҪҝз”Ё\
    \ `HandlerFunc` зұ»еһӢеҲӣе»ә HTTP еӨ„зҗҶеҷЁзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\nжё…еҚ• 4-6. дҪҝз”Ё `HandlerFunc` зұ»еһӢе°Ҷжҷ®йҖҡеҮҪж•°дҪңдёәеӨ„зҗҶеҷЁ\n\
    \n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
    )\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
    \    // е°Ҷ messageHandler еҮҪж•°иҪ¬жҚўдёә HandlerFunc зұ»еһӢ\n    mh := http.HandlerFunc(messageHandler)\n\
    \    mux.Handle(\"/welcome\", mh)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
    :8080\", mux)\n}\n```\n\nиҝҗиЎҢзЁӢеәҸеҗҺпјҢеҜјиҲӘеҲ° `http://localhost:8080/welcome` жҹҘзңӢиҫ“еҮәгҖӮ\n\nеңЁ\
    \ `main` еҮҪж•°дёӯпјҢйҖҡиҝҮиҪ¬жҚў `messageHandler` еҮҪж•°еҲӣе»әдәҶдёҖдёӘ `HandlerFunc` е®һдҫӢпјҢз„¶еҗҺе°Ҷе…¶ж·»еҠ еҲ° `ServeMux.Handle`\
    \ дёӯпјҢд»ҘеӨ„зҗҶеҜ№ `\"/welcome\"` URL и·Ҝеҫ„зҡ„иҜ·жұӮгҖӮдҪҝз”Ё `HandlerFunc` зұ»еһӢпјҢдҪ еҸҜд»ҘиҪ»жқҫең°е°Ҷжҷ®йҖҡеҮҪж•°з”ЁдҪң HTTP еӨ„зҗҶеҷЁгҖӮ\n\
    \nеңЁжё…еҚ• 4-5 дёӯпјҢиҮӘе®ҡд№үеӨ„зҗҶеҷЁеҸҜд»Ҙиў«еӨҡдёӘ URL и·Ҝеҫ„йҮҚеӨҚдҪҝз”ЁпјҢеӣ дёәе®ғжҸҗдҫӣдәҶдёҖдёӘеҸҜйҮҚз”Ёзҡ„ `\"message\"` еӯ—ж®өпјҢдёәеӨ„зҗҶеҷЁжҸҗдҫӣдәҶеӯ—з¬ҰдёІеҖјгҖӮжё…еҚ•\
    \ 4-6 ж— жі•дёә `\"message\"` жҸҗдҫӣеҖјпјҢеӣ жӯӨж¶ҲжҒҜеӯ—з¬ҰдёІзҡ„еҖјеҝ…йЎ»жҳҜзЎ¬зј–з Ғзҡ„гҖӮеңЁи®ёеӨҡеңәжҷҜдёӢпјҢдҪ йңҖиҰҒдёәеӨ„зҗҶеҷЁеҮҪж•°жҸҗдҫӣдёҖдәӣеҖјгҖӮ\n\nеҒҮи®ҫдҪ жғіе°ҶдёҖдёӘж•°жҚ®еә“иҝһжҺҘеҜ№иұЎдј йҖ’з»ҷеӨ„зҗҶеҷЁеҮҪж•°пјҢд»ҘдҫҝеңЁеҮҪж•°еҶ…йғЁйҮҚеӨҚдҪҝз”Ёе®ғгҖӮдҪ еҸҜд»Ҙзј–еҶҷдёҖдёӘеёҰжңүеҸӮж•°пјҲз”ЁдәҺжҺҘж”¶жҹҗдәӣеҖјпјүзҡ„еҮҪж•°пјҢз„¶еҗҺеңЁиҜҘеҮҪж•°еҶ…йғЁе®ҡд№үе№¶иҝ”еӣһеҸҰдёҖдёӘдҪңдёә\
    \ `http.Handler` зҡ„еҮҪж•°гҖӮеңЁ Go дёӯпјҢдҪ еҸҜд»ҘеңЁеҮҪж•°еҶ…йғЁеҲӣе»әеҮҪж•°пјҢе№¶дё”е®ғд№ҹж”ҜжҢҒ**й—ӯеҢ…**гҖӮеӨ„зҗҶеҷЁйҖ»иҫ‘еҸҜд»ҘеңЁй—ӯеҢ…дёӯе®һзҺ°гҖӮ\n\nжё…еҚ• 4-7\
    \ жҳҜдёҖдёӘдҪҝз”Ёй—ӯеҢ…зј–еҶҷеӨ„зҗҶеҷЁйҖ»иҫ‘зҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\nжё…еҚ• 4-7. е°ҶеӨ„зҗҶеҷЁйҖ»иҫ‘еҶҷе…Ҙй—ӯеҢ…\n\n```\npackage main\n\nimport (\n\
    \    \"fmt\"\n    \"log\"\n    \"net/http\"\n)\n\n// е°ҶеӨ„зҗҶеҷЁйҖ»иҫ‘еҶҷе…Ҙй—ӯеҢ…\nfunc messageHandler(message\
    \ string) http.Handler {\n    return http.HandlerFunc(func(w http.ResponseWriter,\
    \ r *http.Request) {\n        fmt.Fprintf(w, message)\n    })\n}\n\nfunc main()\
    \ {\n    mux := http.NewServeMux()\n    mux.Handle(\"/welcome\", messageHandler(\"\
    Welcome to Go Web Development\"))\n    mux.Handle(\"/message\", messageHandler(\"\
    net/http is awesome\"))\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
    :8080\", mux)\n}\n```\n\nиҜҘзЁӢеәҸзҡ„е·ҘдҪңж–№ејҸдёҺжё…еҚ• 4-5 зӣёеҗҢгҖӮ`messageHandler` еҮҪж•°иҝ”еӣһдёҖдёӘ `http.Handler`гҖӮеңЁ\
    \ `messageHandler` еҮҪж•°еҶ…йғЁпјҢйҖҡиҝҮи°ғз”ЁдёҖдёӘзӯҫеҗҚеҪўејҸдёә `func(http.ResponseWriter, *http.Request)`\
    \ зҡ„еҢҝеҗҚеҮҪж•°иҝ”еӣһдәҶ `http.HandlerFunc`пјҢиҝҷдҪҝеҫ—е®ғж»Ўи¶ідәҶ `http.Handler` жҺҘеҸЈпјҢеӣ жӯӨ `messageHandler` еҮҪж•°еҸҜд»Ҙиҝ”еӣһ\
    \ `http.Handler`гҖӮеҰӮеүҚж–ҮжүҖиҝ°пјҢ`http.HandlerFunc` зұ»еһӢжҳҜ `http.Handler` зҡ„дёҖдёӘе®һзҺ°гҖӮжӯӨеӨ„пјҢеҲ©з”ЁеҸҳйҮҸ `\"\
    message\"` еҪўжҲҗдәҶдёҖдёӘй—ӯеҢ…пјҢе№¶дё”иҝҷдёӘеҮҪж•°иў«ж”ҫзҪ®еңЁ `messageHandler` еҮҪж•°еҶ…йғЁгҖӮеҪ“дҪ еңЁеӨ„зҗҶе®һйҷ…еә”з”ЁзЁӢеәҸж—¶пјҢиҝҷз§Қж–№жі•йқһеёёжңүз”ЁпјӣдҪ еҸҜд»ҘдҪҝз”ЁжӯӨж–№жі•е°Ҷеә”з”ЁдёҠдёӢж–Үзә§еҲ«зҡ„зұ»еһӢеҖјдј йҖ’з»ҷеӨ„зҗҶеҷЁеҮҪж•°гҖӮ\n"
- fmt: "### ServeMux.HandleFunc Function\n\nIn the previous section, a normal function\
    \ was converted into a `HandlerFunc` type and used as an HTTP handler by registering\
    \ it with `ServeMux.Handle`. Because ordinary functions are frequently used as\
    \ HTTP handlers in this way, the `http` package provides a shortcut method: `ServeMux.HandleFunc`.\
    \ The `HandleFunc` registers the handler function for the given pattern. (This\
    \ is just a shortcut method for your convenience.) It internally (inside the `http`\
    \ package) converts into a `HandlerFunc` type and registers the handler into `ServeMux`.\n\
    \nListing [4-8](#A978-1-4842-1052-9_4_Chapter.html#FPar9) is an example program\
    \ that uses `ServeMux.HandleFunc`.\n\n**Listing 4-8.** Using `ServeMux.HandleFunc`\n\
    \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
    )\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
    \    // Use the shortcut method ServeMux.HandleFunc\n    mux.HandleFunc(\"/welcome\"\
    , messageHandler)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
    :8080\", mux)\n}\n```\n\nWhen you run the program, navigate to `http://localhost:8080/welcome`\
    \ for the output.\n\n### DefaultServeMux\n\nIn the example programs in this chapter,\
    \ the `ServeMux` object was created by calling the function `http.NewServeMux`.\
    \ `DefaultServeMux` is same as the `ServeMux` objects from the previous programs.\
    \ `DefaultServeMux` is the default `ServeMux` used by the `Serve` method, and\
    \ the `ServeMux` object is instantiated when the `http` package is used.\n\nHere\
    \ is the code statement from Go source:\n\n```go\nvar DefaultServeMux = NewServeMux()\n\
    ```\n\nListing [4-9](#A978-1-4842-1052-9_4_Chapter.html#FPar10) shows the source\
    \ of the `NewServeMux` function from Go source.\n\n**Listing 4-9.** `NewServeMux`\
    \ Function from Go Source\n\n```go\n// NewServeMux allocates and returns a new\
    \ ServeMux.\nfunc NewServeMux() *ServeMux { return &ServeMux{m: make(map[string]muxEntry)}\
    \ }\n```\n\nThe `http` package provides a couple of shortcut methods for working\
    \ with `DefaultServeMux`: `http.Handle` and `http.HandleFunc`. The `http.Handle`\
    \ function registers the handler for the given pattern in `DefaultServeMux`, and\
    \ `http.HandleFunc` registers the handler function for the given pattern in `DefaultServeMux`.\
    \ So these functions are just shortcuts to use `ServeMux.Handle` and `ServeMux.HandleFunc`\
    \ in `DefaultServeMux`. The `ListenAndServe` function uses `DefaultServeMux` if\
    \ the second parameter is set as `nil` instead of providing an `http.Handler`\
    \ object.\n\nLet's rewrite the program in Listing [4-8](#A978-1-4842-1052-9_4_Chapter.html#FPar9)\
    \ to use with `DefaultServeMux` (see Listing [4-10](#A978-1-4842-1052-9_4_Chapter.html#FPar11)).\n\
    \n**Listing 4-10.** Using `DefaultServeMux`\n\n```go\npackage main\n\nimport (\n\
    \    \"fmt\"\n    \"log\"\n    \"net/http\"\n)\n\nfunc messageHandler(w http.ResponseWriter,\
    \ r *http.Request) {\n    fmt.Fprintf(w, \"Welcome to Go Web Development\")\n\
    }\n\nfunc main() {\n    http.HandleFunc(\"/welcome\", messageHandler)\n    log.Println(\"\
    Listening...\")\n    http.ListenAndServe(\":8080\", nil)\n}\n```\n\nWhen you run\
    \ the program, navigate to `http://localhost:8080/welcome` for the output. When\
    \ you use the `http.Handle` and `http.HandleFunc` functions, you can pass a `nil`\
    \ value as the second parameter for calling `ListenAndServe` because handler and\
    \ handler functions register into `DefaultServeMux` through the `http.Handle`\
    \ and `http.HandleFunc` functions.\n\n### http.Server Struct\n\nIn previous examples,\
    \ `http.ListenAndServe` was called to run HTTP servers, which does not allow you\
    \ to customize HTTP server configuration. The `http` package provides a struct\
    \ named `Server` that enables you to specify HTTP server configuration.\n\nListing\
    \ [4-11](#A978-1-4842-1052-9_4_Chapter.html#FPar12) shows the `Server` struct.\n\
    \n**Listing 4-11.** `http.Server` Struct\n\n```go\ntype Server struct {\n    Addr\
    \           string\n    Handler        Handler\n    ReadTimeout    time.Duration\n\
    \    WriteTimeout   time.Duration\n    MaxHeaderBytes int\n    TLSConfig     \
    \ *tls.Config\n    TLSNextProto   map[string]func(*Server, *tls.Conn, Handler)\n\
    \    ConnState      func(net.Conn, ConnState)\n    ErrorLog       *log.Logger\n\
    }\n```\n\nThis struct allows you to configure many values, including error logger\
    \ for the server, maximum duration before timing out read of the request, maximum\
    \ duration before timing out write of the response, and maximum size of request\
    \ headers.\n\nListing [4-12](#A978-1-4842-1052-9_4_Chapter.html#FPar13) is an\
    \ example program that uses the `Server` struct to customize server behavior.\n\
    \n**Listing 4-12.** Using the `http.Server` Struct\n\n```go\npackage main\n\n\
    import (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n    \"time\"\n)\n\nfunc\
    \ messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    http.HandleFunc(\"\
    /welcome\", messageHandler)\n    server := &http.Server{\n        Addr:      \
    \     \":8080\",\n        ReadTimeout:    10 * time.Second,\n        WriteTimeout:\
    \   10 * time.Second,\n        MaxHeaderBytes: 1 << 20,\n    }\n    log.Println(\"\
    Listening...\")\n    server.ListenAndServe()\n}\n```\n\nThe server behavior is\
    \ customized by creating a `Server` type object and calling the `Server.ListenAndServe`\
    \ method. In previous examples, the `http.ListenAndServe` function was used to\
    \ start the HTTP server. When the `http.ListenAndServe` function is called, it\
    \ internally creates a `Server` type instance and calls the `ListenAndServe` method.\n\
    \nListing [4-13](#A978-1-4842-1052-9_4_Chapter.html#FPar14) is the implementation\
    \ of `http.ListenAndServe` from Go source.\n\n**Listing 4-13.** Implementation\
    \ of `http.ListenAndServe`\n\n```go\nfunc ListenAndServe(addr string, handler\
    \ Handler) error {\n        server := &Server{Addr: addr, Handler: handler}\n\
    \        return server.ListenAndServe()\n}\n```"
