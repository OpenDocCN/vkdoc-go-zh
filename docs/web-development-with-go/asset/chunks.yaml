- fmt: "# 1. Getting Started with Go\n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.1007/978-1-4842-1052-9_1](http://dx.doi.org/10.1007/978-1-4842-1052-9_1))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Everything in this world is evolving, including computers and computer programming\
    \ languages. Ideas and approaches for building applications are also evolving,\
    \ based on past experience. Although highly evolved modern computers now have\
    \ many CPU cores (32, 64, 128 and many more), we still cannot leverage the full\
    \ power of modern computer hardware by using most of our existing programming\
    \ languages and tools. Our programs still run slowly, even in high-powered servers\
    \ with many CPU cores.\n\nFor the last decade, many existing programming languages\
    \ have been evolving with many new features. Language authors have been adding\
    \ these features based on programming language theory (PLT) and other intellectual\
    \ thoughts, which make the languages more complex. In todayвҖҷs computing, many\
    \ people prefer a minimalistic and pragmatic approach for writing applications.\n\
    \nProgramming languages are used that excel in specific areas. Some programming\
    \ languages are great for rapid application development, but would not work well\
    \ for writing high-performance applications. Other programming languages are very\
    \ efficient for writing these high-performance applications, but would be difficult\
    \ for writing applications in a productive manner. It would be great if there\
    \ were a general-purpose language for developing a variety of applications with\
    \ a greater level of efficiency, performance, productivity, and faster compilation\
    \ time. The Go language meets these criteria.\n\nThis chapter shows you why Go\
    \ is a great programming language for solving modern programming challenges. You\
    \ will learn use cases for adopting Go for your next application.\n\n## Introducing\
    \ Go\n\nGo, also referred to as Golang, is a general-purpose programming language,\
    \ developed by a team at Google and many [contributors](http://golang.org/CONTRIBUTORS)\
    \ from the open source community ([`http://golang.org/contributors`](http://golang.org/contributors)).\
    \ The language was announced in November 2009, and the first version was released\
    \ in December 2012. Go is an open source project that is distributed under a BSD-style\
    \ license. The official web site of the Go project is available at [`http://golang.org/`](http://golang.org/).\
    \ It is a statically typed, natively compiled, garbage-collected, concurrent programming\
    \ language that mostly belongs to the C family of languages in terms of basic\
    \ syntax. LetвҖҷs look at some of the features of Go to understand its design principles.\n\
    \n### Minimalistic Language with Pragmatic Design\n\nThe Go programming language\
    \ can be simply described in three words: simple, minimal, and pragmatic. If you\
    \ look deeply into the language design of Go, you see its simple and minimalistic\
    \ approach, coupled with a pragmatic design. You can observe this simplicity with\
    \ all the Go language features, including the type system. Today, many programming\
    \ languages provide too many features that make applications more complex for\
    \ developers. The design goal of Go is to be a simple and minimal language that\
    \ provides all the necessary features for developing efficient software systems.\n\
    \nAlthough Go has fewer language features, productivity is not affected by its\
    \ pragmatic design. A new Go programmer can quickly learn the language and can\
    \ easily start to develop production-quality applications. Go has simply ignored\
    \ many language features from the last three decades and focuses on real-world\
    \ practices instead of academics and programming language theory (PLT).\n\nFrom\
    \ a practical perspective, you might say that Go is an object-oriented programming\
    \ (OOP) language. But GoвҖҷs object-oriented approach is different from programming\
    \ languages such as C++, Java, and C#. Go is not a full-fledged OOP language from\
    \ an academic perspective. Unlike many existing OOP languages, Go does not support\
    \ inheritance and does not even have a `class` keyword. It uses composition over\
    \ inheritance through its simple type system. GoвҖҷs interface type design shows\
    \ its uniqueness when compared with other object-oriented programming languages.\n\
    \nIs Go an OOP language? The answer is both yes and no. Go language includes all\
    \ batteries required for writing applications with an object-oriented approach,\
    \ but it is not a complete OOP language because it lacks some traditional OOP\
    \ features.\n\n**Note**  \nProgramming language theory (PLT) is a branch of computer\
    \ science that deals with the design, implementation, analysis, characterization,\
    \ and classification of programming languages and their individual features.\n\
    \n### A Static Type Language with High Productivity\n\nGo is a statically typed\
    \ programming language, with its syntax loosely derived from the C language. Like\
    \ C and C++, it compiles natively to machine code, so Just-In-Time (JIT) compilation\
    \ is not needed to run its programs. (Programming languages such as Java and C#\
    \ use JIT compilation to run applications.)\n\nFor writing applications, a dynamically\
    \ typed language provides lots of productivity and expressiveness because you\
    \ donвҖҷt have to worry about the data types of the variables you use. In dynamically\
    \ typed languages, the type of expression is known only at runtime, which provides\
    \ a greater level of productivity and expressiveness in the syntax to quickly\
    \ build applications, especially web applications. But when working with a dynamic\
    \ type language, the performance and maintainability of the applications are affected.\
    \ Sometimes the debugging experience of an application written in a dynamic type\
    \ language can be very difficult due to its lack of type safety. Even today, developers\
    \ use static type languages to generate code for their dynamic type languages.\
    \ For example, JavaScript developers use statically typed languages such as Microsoft\
    \ TypeScript for type safety, which finally compiles to JavaScript code.\n\nAlthough\
    \ static type languages can provide type safety and performance, working with\
    \ them can affect the productivity of application development, and compiling larger\
    \ programs can take a long time. It would be great to have a language that provides\
    \ the power of both static type and dynamic type language to blend the performance\
    \ and type safety of a static type language with the productivity of a dynamic\
    \ type language.\n\nGo is that perfect blend of the power of static type languages\
    \ and the productivity of dynamic type languages. Go can be called a modern C\
    \ language that provides faster compilation than C, coupled with the productivity\
    \ of a dynamic type language."
