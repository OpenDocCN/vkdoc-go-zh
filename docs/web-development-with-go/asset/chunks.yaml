    running as independent units, RESTful services to communicate among independent
    services, and message brokers to communicate among independent services using
    asynchronous protocols such as AMQP.


    ## Summary


    Go is a modern, statically typed, natively compiled, garbage-collected programming
    language that allows you to write high-performance applications while enabling
    a greater level of productivity with its simple syntax and pragmatic design. In
    Go, concurrency is a built-in feature at the core language level that allows you
    to write highly efficient software systems for modern computers. The Go ecosystem
    includes the language, libraries, and tools that provide all the essential features
    for developing a wide variety of applications. The Go Mobile project includes
    packages and tools for building native mobile applications for Android and iOS.
    Go is a great programming language for building scalable, web-based, back-end
    systems and microservices.


    # 2.В Go Fundamentals


    [Chapter 1](#A978-1-4842-1052-9_1_Chapter.html) furnished an overview of the Go
    programming language and discussed how it is different from other programming
    languages. In this chapter, you will learn Go fundamentals for writing reusable
    code using packages and how to work with arrays and collections. You will also
    learn Go language fundamentals such as `defer`, `panic`, and `recover`, and about
    GoвҖҷs unique error-handling capabilities.


    ## Packages


    For a Go developer, the design philosophy for developing applications is to develop
    reusable pieces of smaller software components and build applications by composing
    these components. Go provides modularity, composability, and code reusability
    through its package ecosystem. Go encourages you to write maintainable and reusable
    pieces of code through packages that enable you to compose your applications with
    these smaller packages. Go packages are a vital concept that allow you to achieve
    many of the Go design principles. Like other features of Go, packages are designed
    with simplicity and pragmatism.


    Go source files are organized into directories called packages, and the name of
    the package must be the name of the directory containing the Go source files.
    You organize Go source files with the `.go` extension into directories in which
    the package name will be same for the source files that belong to a directory.
    Packages from the standard library belong to the `GOROOT` directory, which is
    the Go installation directory. You write Go programs in the `GOPATH` directory
    as packages that are easily reusable from other packages.


    Note


    The documentation on standard library packages is available at [`http://golang.org/pkg/`](http://golang.org/pkg/)
    . Visit [`http://godoc.org/`](http://godoc.org/) for documentation on packages
    of both standard library and third-party libraries.


    ### Package main


    In Go, you can write two types of programs: executable programs and a shared library.
    When you write executable programs, you must give `main` as the package name to
    make the package an executable program: the package `main` tells the Go compiler
    that the package should compile as an executable program. The executable programs
    in Go are often referred to as commands in the official Go documentation. The
    entry point of the executable program is the `main` function of the `main` package;
    the `main` function in the `package` main is the entry point of the executable
    program. When you write packages as shared libraries, there are no `main` packages
    or `main` functions in the package.


    Listing [2-1](#A978-1-4842-1052-9_2_Chapter.html#FPar2) is the code block for
    package `main`.


