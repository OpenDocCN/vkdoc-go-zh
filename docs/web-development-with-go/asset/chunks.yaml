    \nеҰӮжһңжӮЁзҹҘйҒ“з»“жһ„дҪ“еӯ—ж®өзҡ„йЎәеәҸпјҢжӮЁеҸҜд»Ҙз”Ёжӣҙй«ҳж•Ҳзҡ„ж–№ејҸеҲӣе»әз»“жһ„дҪ“е®һдҫӢпјҲеҸӮи§Ғжё…еҚ• 3-4пјүгҖӮ\n\n**жё…еҚ• 3-4. дҪҝз”Ёз»“жһ„дҪ“еӯ—йқўйҮҸеҲӣе»әз»“жһ„дҪ“е®һдҫӢ**\n\n\
    ```\np:= Person {\n    \"Shiju\",\n    \"Varghese\",\n     time.Date(1979, time.February,\
