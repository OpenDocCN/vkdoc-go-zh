    \ Web ејҖеҸ‘жЎҶжһ¶гҖӮ\n\n# 7. дёә Web еә”з”Ёж·»еҠ иә«д»ҪйӘҢиҜҒ\n\nе®үе…ЁжҖ§жҳҜжһ„е»әжҲҗеҠҹзҡ„ Web еә”з”ЁжҲ– Web API ж—¶йңҖиҰҒиҖғиҷ‘зҡ„жңҖйҮҚиҰҒеӣ зҙ д№ӢдёҖгҖӮеҰӮжһңдҪ ж— жі•дҝқжҠӨеә”з”ЁзЁӢеәҸе…ҚеҸ—жңӘжҺҲжқғи®ҝй—®пјҢйӮЈд№Ҳж— и®әе…¶еҠҹиғҪеҰӮдҪ•пјҢж•ҙдёӘеә”з”ЁйғҪе°ҶжҜ«ж— ж„Ҹд№үгҖӮдҪ еҸҜиғҪдёәеә”з”ЁзЁӢеәҸејҖеҸ‘дәҶеҮәиүІзҡ„з”ЁжҲ·дҪ“йӘҢпјҢдҪҶеҰӮжһңдҪ ж— жі•зЎ®дҝқеә”з”Ёе®үе…ЁпјҢйӮЈд№ҲжүҖжңүе®һзҺ°йғҪе°ҶеҠҹдәҸдёҖзҜ‘гҖӮиә«д»ҪйӘҢиҜҒе’ҢжҺҲжқғдҪҝеҫ—еә”з”ЁзЁӢеәҸиғҪеӨҹдҝқжҠӨе…¶еҸ—дҝқжҠӨзҡ„иө„жәҗе…ҚеҸ—жңӘжҺҲжқғи®ҝй—®гҖӮ\n\
    \nжң¬з« е°Ҷеҗ‘дҪ еұ•зӨәеҰӮдҪ•дҪҝз”Ёеҗ„з§Қиә«д»ҪйӘҢиҜҒж–№жі•жқҘдҝқжҠӨеҹәдәҺ Web зҡ„зі»з»ҹгҖӮе®ғе°ҶйҮҚзӮ№д»Ӣз»Қз”ЁдәҺдҝқжҠӨеә”з”ЁзЁӢеәҸзҡ„зҺ°д»Јиә«д»ҪйӘҢиҜҒж–№жі•пјҢеҪ“дҪ дҪҝз”Ё Web API дҪңдёәжңҚеҠЎеҷЁз«Ҝе®һзҺ°жқҘжһ„е»ә\
    \ Web еә”з”Ёе’Ңз§»еҠЁеә”з”Ёж—¶пјҢиҝҷдәӣж–№жі•йқһеёёжңүз”ЁгҖӮ\n\n## иә«д»ҪйӘҢиҜҒдёҺжҺҲжқғ\n\nиә«д»ҪйӘҢиҜҒжҳҜиҜҶеҲ«иғҪеӨҹи®ҝй—®еҸ—дҝқжҠӨиө„жәҗзҡ„еә”з”ЁзЁӢеәҸе’ҢжңҚеҠЎзҡ„е®ўжҲ·з«Ҝзҡ„иҝҮзЁӢгҖӮиҝҷдәӣе®ўжҲ·з«ҜеҸҜд»ҘжҳҜжңҖз»Ҳз”ЁжҲ·пјҢд№ҹеҸҜд»ҘжҳҜе…¶д»–еә”з”ЁзЁӢеәҸе’ҢжңҚеҠЎгҖӮйҖҡеёёпјҢж•°жҚ®еә“еӯҳеӮЁз”ЁжҲ·еҮӯжҚ®пјҢдҫӢеҰӮз”ЁжҲ·еҗҚе’ҢеҜҶз ҒпјҢжңҖз»Ҳз”ЁжҲ·йҖҡиҝҮиҫ“е…Ҙжңүж•Ҳзҡ„з”ЁжҲ·еҗҚе’ҢеҜҶз ҒжқҘиҺ·еҫ—еҜ№еә”з”ЁзЁӢеәҸзҡ„и®ҝй—®жқғйҷҗгҖӮ\n\
    \nжҺҲжқғжҳҜжҺҲдәҲжү§иЎҢзү№е®ҡж“ҚдҪңжҲ–и®ҝй—®иө„жәҗжқғйҷҗзҡ„иҝҮзЁӢпјҢиҜҘжқғйҷҗд»…жҺҲдәҲз»ҸиҝҮиә«д»ҪйӘҢиҜҒзҡ„е®ўжҲ·з«ҜгҖӮжҺҲжқғдёҺиә«д»ҪйӘҢиҜҒиҝҮзЁӢеҚҸеҗҢе·ҘдҪңпјҢдҪ еҸҜд»Ҙе°ҶжҺҲжқғи§’иүІйҷ„еҠ еҲ°з”ЁжҲ·еҮӯжҚ®дёҠгҖӮеҪ“дҪ еңЁж•°жҚ®еә“дёӯеӯҳеӮЁз”ЁжҲ·еҮӯжҚ®ж—¶пјҢдҪ еҸҜд»Ҙе°ҶжҺҲжқғи§’иүІе’ҢжқғйҷҗдёҺз”ЁжҲ·дҝЎжҒҜе…іиҒ”иө·жқҘгҖӮеҪ“дҪ жһ„е»әеә”з”ЁзЁӢеәҸж—¶пјҢеҸҜд»ҘйҖҡиҝҮе®ҡд№үеӨҡдёӘжҺҲжқғи§’иүІжқҘеҢәеҲҶи®ҝй—®жқғйҷҗгҖӮдҫӢеҰӮпјҢеҰӮжһңдҪ жғідёәзү№е®ҡзҡ„е·Іи®ӨиҜҒз”ЁжҲ·жҸҗдҫӣз®ЎзҗҶе‘ҳеҠҹиғҪпјҢдҪ еҸҜд»Ҙдёәз®ЎзҗҶе‘ҳз”ЁжҲ·е®ҡд№үдёҖдёӘжҺҲжқғи§’иүІеҸҠе…¶и®ҝй—®жқғйҷҗпјҢд»ҺиҖҢеҢәеҲҶд»–д»¬дёҺе…¶д»–е·Іи®ӨиҜҒз”ЁжҲ·зҡ„и®ҝй—®жқғйҷҗгҖӮжҹҗдәӣеә”з”ЁзЁӢеәҸеҸҜиғҪжІЎжңүд»»дҪ•жҺҲжқғи§’иүІпјҢеӣ дёәжүҖжңүе·Іи®ӨиҜҒз”ЁжҲ·еҜ№еә”з”ЁзЁӢеәҸжӢҘжңүзӣёеҗҢзҡ„жқғйҷҗгҖӮ\n\
    \nеҪ“дҪ и®ҫи®Ў Web еә”з”ЁзЁӢеәҸж—¶пјҢйҖӮеҪ“зҡ„иә«д»ҪйӘҢиҜҒе’ҢжҺҲжқғзӯ–з•ҘжҳҜжңҖйҮҚиҰҒзҡ„еӣ зҙ гҖӮеҰӮжһңдҪ и®ҫи®Ўзҡ„еә”з”ЁзЁӢеәҸе…·жңүйҖӮеҪ“зҡ„иә«д»ҪйӘҢиҜҒе’ҢжҺҲжқғжңәеҲ¶пјҢе°ұиғҪйҒҝе…Қи®ёеӨҡе®үе…ЁжҢ‘жҲҳпјҢиҖҢиҝҷдәӣжҢ‘жҲҳеҜ№дәҺдёҖдёӘжҲҗеҠҹзҡ„еә”з”ЁзЁӢеәҸжқҘиҜҙиҮіе…ійҮҚиҰҒгҖӮ\n"
- fmt: '# Authentication Approaches


    There are various approaches available for implementing authentication into applications.
    Typically, user credentials are stored in a database of an application. The web
    server takes the username and password through an HTML form and then validates
    these credentials with the credentials stored in the database. But in modern applications,
    people also use social identity providers such as Facebook, Twitter, LinkedIn,
    and Google as social identities for authentication, which helps applications avoid
    maintaining separate user identity systems for each individual application. End
    users donвҖҷt need to remember their user ID and password for individual applications;
    they can use their existing social identities to authenticate to applications.


    Modern web development is moving toward an API-based approach in this mobility
    era, in which these APIs are being consumed from both mobile clients and web clients.
    More-reliable security systems must be provided to modern web applications. APIs
    are developed based on a stateless design, which should be considered when authentication
    systems for APIs are designed. So you canвҖҷt use the same approach for APIs, which
    you have been using for traditional web applications.


    Once users have been logged in to the system, they must be able to access web
    server resources in subsequent HTTP requests without providing user credentials
    for each HTTP request. There are two kinds of approaches available for keeping
    the user as a вҖңlogged-inвҖқ user for subsequent HTTP requests. A conventional approach
    is to use an HTTP session and cookies, and a modern approach is to use an access
    token generated by the web server. A token-based approach is a convenient solution
    for web APIs; an HTTP session and cookies are appropriate for traditional web
    applications.


    ## Cookie-Based Authentication


    A cookie-based approach is the most widely used method of implementing authentication
    into web applications. In this approach, HTTP cookies are used to authenticate
    users on every HTTP request after they have logged in to the system with user
    credentials.


    Figure [7-1](#A978-1-4842-1052-9_7_Chapter.html#Fig1) illustrates the cookie-based
    authentication workflow.


    ![A978-1-4842-1052-9_7_Fig1_HTML.jpg](A978-1-4842-1052-9_7_Fig1_HTML.jpg)


    Figure 7-1. Cookie-based authentication workflow


    In cookie-based authentication, the web server first validates the username and
    password, which are sent through an HTML form. Once the user credentials are validated
    with the credentials stored in the database, the HTTP server sets a session cookie
    that typically contains the user information. For each subsequent HTTP request,
    the web server can validate the HTTP request based on the value contained in the
    cookie. Some server-side technologies provide a very rich infrastructure for implementing
    this kind of authentication, in which you can easily implement cookie-based authentication
    by simply calling its API methods. In other server-side technologies and frameworks,
    you can manually write some code for writing cookies and storing values into session
    storage to implement the authentication.


    A cookie-based approach that combines with sessions is a good fit for traditional
    web applications in which you implement everything at the server side, including
    the logic for UI rendering. The web application is accessed from normal desktop
    browsers.


    In Go, you can use packages such as `sessions` ([www.gorillatoolkit.org/pkg/sessions](http://www.gorillatoolkit.org/pkg/sessions)),
    which is provided by the Gorilla web toolkit, to implement authentication using
    cookie-based sessions.


    Using a cookie-based approach to implement authentication into a web API is not
    a good idea for several reasons. When you build APIs, a stateless design is an
    ideal design choice. If you use a cookie-based approach, you need to maintain
    a session store for your API, which violates the design choice of being a stateless
    API. The cookie-based approach also doesnвҖҷt work well when web server resources
    are accessed from different domains due to cross-origin resource sharing (CORS)
    constraints.


    ## Token-Based Authentication


    Methods of developing web applications have changed in the past few years. The
    era of mobile application development has also changed the way web-based systems
    are developed. Modern web development is moving toward an API-driven approach
    in which a web API (often a RESTful API) is provided on the server side, and web
    applications and mobile applications are built by consuming the web API.


    A token-based approach is a modern approach for implementing authentication into
    web applications and web APIs. In a token-based approach (see Figure [7-2](#A978-1-4842-1052-9_7_Chapter.html#Fig2)),
    an access token ID used for authentication on every HTTP request. In this approach,
    you can also use usernames and passwords to log in to the system. If the user
    gets access to the system, the authentication system generates an access token
    for the subsequent HTTP requests to get authentication into the web server. These
    access tokens are a securely signed string that can be used for accessing HTTP
    resources on every HTTP request. Typically, the access tokens are sent with an
    HTTP `Authorization` header as a bearer token that can be validated at the web
    server.


    ![A978-1-4842-1052-9_7_Fig2_HTML.jpg](A978-1-4842-1052-9_7_Fig2_HTML.jpg)


    Figure 7-2. Token-based authentication workflow


    Sometimes, you can use a third-party identity provider or a third-party API for
    authentication. In this context, a client ID and a secret key for getting logged
    in to the authentication system are used instead of a username and password.


    Here is the token-based authentication process:


    - Authenticate into the system by providing a username and password, or by providing
    a client ID and a secret key.

    - If the authentication request is successful, the authentication system generates
    a securely signed string as an access token for subsequent HTTP requests.

    - The client application receives the token from the web server and uses it to
    access web server resources.

    - The client application provides the access token on every HTTP request into
    the web server. An HTTP header is used to transmit the access token into the web
    server.

    - The web server validates the access token provided by the client application
    and then provides the web server resources if the access token is valid.


    A token-based approach is very convenient when you build mobile applications for
    which you donвҖҷt need to leverage cookies on the client. When you use APIs as your
    server-side implementation, you donвҖҷt need to maintain session stores that allow
    you to build stateless APIs on the server side, which can be easily consumed from
    variety of client applications without any hurdles. Another benefit of using a
    token-based approach is that you can easily make AJAX calls to any web server,
    regardless of domains, because you use an HTTP header to make the HTTP requests.


    A token-based approach is an ideal solution for providing security to RESTful
    APIs. On the web technology space, Go is primarily used for building back-end
    APIs (often RESTful APIs), so the focus of this chapter is primarily on the token-based
    approach.


    ## Authentication with OAuth 2


    A token-based approach actually comes from an OAuth specification that is defined
    for solving problems with authentication, for enabling applications to access
    each otherвҖҷs data with an open authentication model. LetвҖҷs have a brief look at
    OAuth before diving into an example authentication program using an OAuth 2 service
    provider.'
