    ` еҸ‘йҖҒиҜ·жұӮпјҢе№¶жҹҘзңӢж—Ҙеҝ—ж–Үд»¶е’Ң HTTP е“Қеә”гҖӮ\n\nеӣҫ 6-1 еұ•зӨәдәҶ FiddlerпјҲдёҖдёӘ HTTP и°ғиҜ•е·Ҙе…·пјүдёӯзҡ„жҲӘеӣҫпјҢжҳҫзӨә Web е“Қеә”жӯЈеңЁдҪҝз”Ё\
    \ gzip зј–з ҒиҝӣиЎҢеҺӢзј©гҖӮ\n\n![A978-1-4842-1052-9_6_Fig1_HTML.jpg](img/A978-1-4842-1052-9_6_Fig1_HTML.jpg)\n\
    \n**еӣҫ 6-1.** дҪҝз”Ё Gorilla еӨ„зҗҶеҷЁеҺӢзј© HTTP е“Қеә”\n\nдҪҝз”Ё `Alice` еҢ…еҸҜд»Ҙдјҳйӣ…ең°й“ҫжҺҘдёӯй—ҙд»¶еҮҪж•°пјҢдҪҝд»Јз Ғеқ—жҳ“дәҺзҗҶи§ЈгҖӮGorilla\
    \ зҡ„ `LoggingHandler` е№¶дёҚе…·жңү `func (http.Handler) http.Handler` зӯҫеҗҚпјҢе®ғйҷӨдәҶ `http.Handler`\
    \ д№ӢеӨ–пјҢиҝҳжҺҘеҸ—дёҖдёӘж—Ҙеҝ—ж–Үд»¶дҪңдёәеҮҪж•°еҸӮж•°гҖӮеӣ жӯӨпјҢйҖҡиҝҮжӯЈзЎ®дҪҝз”Ё `Alice` еҢ…е№¶еңЁеӨҡдёӘең°ж–№дҪҝз”ЁиҜҘеӨ„зҗҶеҷЁпјҢдҪ еҸҜд»Ҙзј–еҶҷдёҖдёӘз”ЁдәҺж—Ҙеҝ—и®°еҪ•зҡ„дёӯй—ҙд»¶еҮҪж•°пјҢеңЁиҜҘеҮҪж•°дёӯйҖҡиҝҮжҸҗдҫӣж—Ҙеҝ—ж–Үд»¶дҪңдёәеҸӮж•°жқҘи°ғз”Ё\
    \ Gorilla зҡ„ `LoggingHandler`гҖӮеҪ“йңҖиҰҒдёҖдёӘеёҰжңүеӨҡдёӘеҮҪж•°еҸӮж•°зҡ„дёӯй—ҙд»¶еҮҪж•°ж—¶пјҢиҝҷжҳҜдёҖз§ҚеҫҲеҘҪзҡ„ж–№жі•пјҡ\n\n```\nfunc loggingHandler(next\
    \ http.Handler) http.Handler {\n    logFile, err := os.OpenFile(\"server.log\"\
    , os.O_WRONLY|os.O_CREATE|os.O_APPEND, 0777)\n    if err != nil {\n        panic(err)\n\
    \    }\n    return handlers.LoggingHandler(logFile, next)\n}\n```\n\n`loggingHandler`\
    \ дёӯй—ҙд»¶еҮҪж•°еҸҜд»ҘдёҺ `Alice` дёҖиө·дҪҝз”ЁпјҢе®ғдјҡз”Ёеҝ…иҰҒзҡ„еҸӮж•°и°ғз”Ё Gorilla зҡ„ `LoggingHandler` еҮҪж•°гҖӮеҪ“дҪҝз”Ёдёӯй—ҙд»¶еӨ„зҗҶеҷЁж—¶пјҢдҪ еҸҜиғҪйңҖиҰҒе°ҶеӨҡдёӘдёӯй—ҙд»¶еӨ„зҗҶеҷЁиЈ…йҘ°еҲ°еӨҡдёӘеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁдёӯгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪ еҸҜд»ҘйҖҡиҝҮз»„еҗҲеӨҡдёӘдёӯй—ҙд»¶еӨ„зҗҶеҷЁпјҢдҪҝз”Ё\
    \ `Alice` еҲӣе»әе…ұеҗҢзҡ„еӨ„зҗҶеҷЁпјҢе№¶е°Ҷе…¶еә”з”ЁдәҺеӨҡдёӘеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁгҖӮ\n\nиҝҷйҮҢе°Ҷ `commonHandlers` е®ҡд№үдёәз”ЁдәҺеӨҡдёӘеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁзҡ„е…ұеҗҢеӨ„зҗҶеҷЁпјҡ\n\
    \n```\nindexHandler := http.HandlerFunc(index)\naboutHandler := http.HandlerFunc(about)\n\
    commonHandlers := alice.New(loggingHandler, handlers.CompressHandler)\nhttp.Handle(\"\
    /\", commonHandlers.ThenFunc(indexHandler))\nhttp.Handle(\"/about\", commonHandlers.ThenFunc(aboutHandler))\n\
    ```\n\n`Alice` еҢ…жҸҗдҫӣдәҶдёҖдёӘжөҒз•…зҡ„ API жқҘеӨ„зҗҶдёӯй—ҙд»¶еҮҪж•°пјҢдҪҝдҪ еҸҜд»Ҙдјҳйӣ…ең°й“ҫжҺҘдёӯй—ҙд»¶еҮҪж•°гҖӮ`Alice` еҢ…жҳҜдёҖдёӘйқһеёёиҪ»йҮҸзә§зҡ„еә“пјҢд»Јз ҒйҮҸдёҚи¶і\
    \ 100 иЎҢгҖӮ\n\n## дҪҝз”Ё Negroni еҢ…еӨ„зҗҶдёӯй—ҙд»¶\n\nеҪ“дҪ зӣҙжҺҘдҪҝз”Ё `net/http` еҢ…жһ„е»ә Web еә”з”ЁзЁӢеәҸж—¶пјҢз¬¬дёүж–№еә“ `Negroni`\
