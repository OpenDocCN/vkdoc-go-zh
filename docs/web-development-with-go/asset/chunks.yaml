    test cases in parallel. The `SwapCase` and `Reverse` functions are run and tested
    to ensure that there is parallel execution.


    LetвҖҷs run the tests by providing the `parallel` (`-parallel`) flag:


    `go test вҖ“v вҖ“cover вҖ“short вҖ“parallel 2`


    With the `parallel` flag, you specify running two test cases at a time in parallel.
    If you donвҖҷt specify the `parallel` flag, it defaults to `runtime.GOMAXPROCS(0)`,
    which is `1`, so the parallel tests will be run one at a time.


