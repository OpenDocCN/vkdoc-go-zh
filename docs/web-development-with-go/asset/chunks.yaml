    , input, result, expected)\n    }\n}\n```\n\nжөӢиҜ•еҘ—д»¶ж–Үд»¶ `utils_test.go` еҲӣе»әеңЁ `stringutils`\
    \ еҢ…зӣ®еҪ•дёӯгҖӮеңЁ `utils_test.go` ж–Үд»¶дёӯпјҢзј–еҶҷдәҶдёӨдёӘжЁЎејҸдёә `func TestXxx(*testing.T)` зҡ„жөӢиҜ•еҮҪж•°гҖӮ`TestSwapCase`\
    \ еҮҪж•°з”ЁдәҺйӘҢиҜҒ `SwapCase` еҮҪж•°зҡ„иЎҢдёәпјҢ`TestReverse` з”ЁдәҺйӘҢиҜҒ `Reverse` еҮҪж•°гҖӮ\n\nеҰӮжһңжөӢиҜ•з»“жһңдёҺйў„жңҹз»“жһңдёҚеҢ№й…ҚпјҢеҸҜд»Ҙи°ғз”Ё\
