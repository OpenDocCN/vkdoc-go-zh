    \ еҮҪж•°дёә `DefaultServeMux` дёӯзҡ„з»ҷе®ҡжЁЎејҸжіЁеҶҢеӨ„зҗҶзЁӢеәҸпјҢиҖҢ `http.HandleFunc` еҲҷдёә `DefaultServeMux`\
    \ дёӯзҡ„з»ҷе®ҡжЁЎејҸжіЁеҶҢеӨ„зҗҶеҮҪж•°гҖӮеӣ жӯӨпјҢиҝҷдәӣеҮҪж•°еҸӘжҳҜз”ЁдәҺеңЁ `DefaultServeMux` дёӯдҪҝз”Ё `ServeMux.Handle` е’Ң `ServeMux.HandleFunc`\
    \ зҡ„еҝ«жҚ·ж–№ејҸгҖӮеҰӮжһңз¬¬дәҢдёӘеҸӮж•°и®ҫзҪ®дёә `nil` иҖҢйқһжҸҗдҫӣ `http.Handler` еҜ№иұЎпјҢ`ListenAndServe` еҮҪж•°е°ҶдҪҝз”Ё `DefaultServeMux`гҖӮ\n\
    \nи®©жҲ‘д»¬йҮҚеҶҷжё…еҚ• 4-8 дёӯзҡ„зЁӢеәҸпјҢд»ҘдҫҝдёҺ `DefaultServeMux` дёҖиө·дҪҝз”ЁпјҲеҸӮи§Ғжё…еҚ• 4-10пјүгҖӮ\n\n**жё…еҚ• 4-10.** дҪҝз”Ё `DefaultServeMux`\n\
    \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
    )\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
    \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    http.HandleFunc(\"\
    /welcome\", messageHandler)\n    log.Println(\"зӣ‘еҗ¬дёӯ...\")\n    http.ListenAndServe(\"\
    :8080\", nil)\n}\n```\n\nиҝҗиЎҢиҜҘзЁӢеәҸпјҢеҜјиҲӘиҮі `http://localhost:8080/welcome` еҚіеҸҜжҹҘзңӢиҫ“еҮәгҖӮеҪ“жӮЁдҪҝз”Ё\
    \ `http.Handle` е’Ң `http.HandleFunc` еҮҪж•°ж—¶пјҢеҸҜд»Ҙе°Ҷ `nil` еҖјдҪңдёәз¬¬дәҢдёӘеҸӮж•°дј йҖ’з»ҷ `ListenAndServe`пјҢеӣ дёәеӨ„зҗҶзЁӢеәҸе’ҢеӨ„зҗҶеҮҪж•°дјҡйҖҡиҝҮ\
    \ `http.Handle` е’Ң `http.HandleFunc` еҮҪж•°жіЁеҶҢеҲ° `DefaultServeMux` дёӯгҖӮ\n\n### http.Server\
    \ з»“жһ„дҪ“\n\nеңЁд№ӢеүҚзҡ„зӨәдҫӢдёӯпјҢйҖҡиҝҮи°ғз”Ё `http.ListenAndServe` жқҘиҝҗиЎҢ HTTP жңҚеҠЎеҷЁпјҢиҝҷз§Қж–№жі•дёҚе…Ғи®ёжӮЁиҮӘе®ҡд№ү HTTP жңҚеҠЎеҷЁй…ҚзҪ®гҖӮ`http`\
    \ еҢ…жҸҗдҫӣдәҶдёҖдёӘеҗҚдёә `Server` зҡ„з»“жһ„дҪ“пјҢе®ғдҪҝжӮЁиғҪеӨҹжҢҮе®ҡ HTTP жңҚеҠЎеҷЁй…ҚзҪ®гҖӮ\n\nжё…еҚ• 4-11 еұ•зӨәдәҶ `Server` з»“жһ„дҪ“гҖӮ\n\n\
    **жё…еҚ• 4-11.** `http.Server` з»“жһ„дҪ“\n\n```go\ntype Server struct {\n    Addr      \
    \     string\n    Handler        Handler\n    ReadTimeout    time.Duration\n \
    \   WriteTimeout   time.Duration\n    MaxHeaderBytes int\n    TLSConfig      *tls.Config\n\
    \    TLSNextProto   map[string]func(*Server, *tls.Conn, Handler)\n    ConnState\
    \      func(net.Conn, ConnState)\n    ErrorLog       *log.Logger\n}\n```\n\nиҜҘз»“жһ„дҪ“е…Ғи®ёжӮЁй…ҚзҪ®и®ёеӨҡеҖјпјҢеҢ…жӢ¬жңҚеҠЎеҷЁзҡ„й”ҷиҜҜж—Ҙеҝ—и®°еҪ•еҷЁгҖҒиҜ»еҸ–иҜ·жұӮи¶…ж—¶зҡ„жңҖеӨ§жҢҒз»ӯж—¶й—ҙгҖҒеҶҷе…Ҙе“Қеә”и¶…ж—¶зҡ„жңҖеӨ§жҢҒз»ӯж—¶й—ҙд»ҘеҸҠиҜ·жұӮеӨҙзҡ„жңҖеӨ§еӨ§е°ҸгҖӮ\n\
    \nжё…еҚ• 4-12 жҳҜдёҖдёӘдҪҝз”Ё `Server` з»“жһ„дҪ“иҮӘе®ҡд№үжңҚеҠЎеҷЁиЎҢдёәзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ• 4-12.** дҪҝз”Ё `http.Server` з»“жһ„дҪ“\n\
    \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
    \    \"time\"\n)\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request)\
    \ {\n    fmt.Fprintf(w, \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n\
    \    http.HandleFunc(\"/welcome\", messageHandler)\n    server := &http.Server{\n\
    \        Addr:           \":8080\",\n        ReadTimeout:    10 * time.Second,\n\
    \        WriteTimeout:   10 * time.Second,\n        MaxHeaderBytes: 1 << 20,\n\
    \    }\n    log.Println(\"зӣ‘еҗ¬дёӯ...\")\n    server.ListenAndServe()\n}\n```\n\nйҖҡиҝҮеҲӣе»әдёҖдёӘ\
    \ `Server` зұ»еһӢеҜ№иұЎе№¶и°ғз”Ё `Server.ListenAndServe` ж–№жі•жқҘиҮӘе®ҡд№үжңҚеҠЎеҷЁиЎҢдёәгҖӮеңЁд№ӢеүҚзҡ„зӨәдҫӢдёӯпјҢдҪҝз”Ё `http.ListenAndServe`\
    \ еҮҪж•°жқҘеҗҜеҠЁ HTTP жңҚеҠЎеҷЁгҖӮеҪ“и°ғз”Ё `http.ListenAndServe` еҮҪж•°ж—¶пјҢе®ғдјҡеңЁеҶ…йғЁеҲӣе»әдёҖдёӘ `Server` зұ»еһӢе®һдҫӢе№¶и°ғз”Ё `ListenAndServe`\
    \ ж–№жі•гҖӮ\n\nжё…еҚ• 4-13 жҳҜжқҘиҮӘ Go жәҗз Ғзҡ„ `http.ListenAndServe` е®һзҺ°гҖӮ\n\n**жё…еҚ• 4-13.** `http.ListenAndServe`\
    \ зҡ„е®һзҺ°\n\n```go\nfunc ListenAndServe(addr string, handler Handler) error {\n  \
    \      server := &Server{Addr: addr, Handler: handler}\n        return server.ListenAndServe()\n\
    }\n```"
- fmt: "# Gorilla Mux\n\n`http.ServeMux`жҳҜдёҖдёӘHTTPиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁпјҢеңЁеӨ§еӨҡж•°еёёи§ҒеңәжҷҜдёӢйғҪиғҪеҫҲеҘҪең°е·ҘдҪңгҖӮеңЁеүҚйқўзҡ„зӨәдҫӢзЁӢеәҸдёӯпјҢе®ғиў«з”ЁдҪңиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁгҖӮеҰӮжһңдҪ йңҖиҰҒдёәиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁжҸҗдҫӣжӣҙејәеӨ§зҡ„еҠҹиғҪпјҢеҸҜд»ҘиҖғиҷ‘дҪҝз”ЁдёҺж ҮеҮҶ`http.ServeMux`е…је®№зҡ„з¬¬дёүж–№и·Ҝз”ұеҢ…гҖӮдҫӢеҰӮпјҢеҪ“дҪ жғіиҰҒдҪҝз”ЁйҖӮеҪ“зҡ„HTTPз«ҜзӮ№е’ҢHTTPж–№жі•жқҘжҢҮе®ҡRESTfulиө„жәҗж—¶пјҢдҪҝз”Ёж ҮеҮҶ`http.ServeMux`дјҡжҜ”иҫғеӣ°йҡҫгҖӮ\n\
    \nжқҘиҮӘGorilla Webе·Ҙе…·еҢ…пјҲ`github.com/gorilla/mux`пјүзҡ„`mux`еҢ…жҳҜдёҖдёӘејәеӨ§зҡ„иҜ·жұӮи·Ҝз”ұеҷЁпјҢе…Ғи®ёдҪ д»ҘиҮӘе®ҡд№үзҡ„ж–№ејҸй…ҚзҪ®еӨҡи·ҜеӨҚз”ЁеҷЁгҖӮиҝҷдёӘеҢ…еңЁжһ„е»әRESTfulжңҚеҠЎж—¶йқһеёёжңүз”ЁпјҢе®ғе®һзҺ°дәҶ`http.Handler`жҺҘеҸЈпјҢеӣ жӯӨдёҺж ҮеҮҶ`http.ServeMux`е…је®№гҖӮдҪҝз”Ё`mux`еҢ…пјҢеҸҜд»Ҙж №жҚ®URLдё»жңәгҖҒи·Ҝеҫ„гҖҒи·Ҝеҫ„еүҚзјҖгҖҒеҚҸи®®гҖҒж ҮеӨҙе’ҢжҹҘиҜўеҖјд»ҘеҸҠHTTPж–№жі•жқҘеҢ№й…ҚиҜ·жұӮгҖӮдҪ иҝҳеҸҜд»ҘдҪҝз”ЁиҮӘе®ҡд№үеҢ№й…ҚеҷЁпјҢе№¶е°Ҷи·Ҝз”ұдҪңдёәеӯҗи·Ҝз”ұеҷЁдёҺ`this`еҢ…дёҖиө·дҪҝз”ЁгҖӮ\n\
    \nиҰҒе®үиЈ…`mux`еҢ…пјҢеңЁз»Ҳз«ҜдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\n`go get github.com/gorilla/mux`\n\nи®©жҲ‘д»¬дҪҝз”Ё`mux`еҢ…жқҘй…ҚзҪ®и·Ҝз”ұпјҲеҸӮи§Ғжё…еҚ•[4-14](#A978-1-4842-1052-9_4_Chapter.html#FPar15)пјүгҖӮ\n\
    \n**жё…еҚ• 4-14. дҪҝз”Ё`mux`еҢ…иҝӣиЎҢи·Ҝз”ұ**\n\n```\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n\
    \    r.HandleFunc(\"/api/notes\", GetNoteHandler).Methods(\"GET\")\n    r.HandleFunc(\"\
    /api/notes\", PostNoteHandler).Methods(\"POST\")\n    r.HandleFunc(\"/api/notes/{id}\"\
    , PutNoteHandler).Methods(\"PUT\")\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"\
    DELETE\")\n    server := &http.Server{\n        Addr:    \":8080\",\n        Handler:\
    \ r,\n    }\n    server.ListenAndServe()\n}\n```\n\nиҝҷйҮҢйҖҡиҝҮи°ғз”Ё`NewRouter`еҮҪж•°еҲӣе»әдәҶдёҖдёӘ`mux.Router`еҜ№иұЎпјҢз„¶еҗҺдёәиө„жәҗжҢҮе®ҡи·Ҝз”ұгҖӮеңЁжҢҮе®ҡURIжЁЎејҸж—¶пјҢеҸҜд»ҘеҢ№й…ҚHTTPж–№жі•пјҢиҝҷеңЁжһ„е»әRESTfulеә”з”ЁзЁӢеәҸж—¶йқһеёёжңүз”ЁгҖӮз”ұдәҺ`mux`еҢ…е®һзҺ°дәҶ`http.Handler`жҺҘеҸЈпјҢдҪ еҸҜд»ҘиҪ»жқҫең°дҪҝз”Ёж ҮеҮҶ`http`еҢ…гҖӮе®ғжҸҗдҫӣдәҶеӨ§йҮҸзҡ„еҸҜжү©еұ•жҖ§пјҢдҪҝдҪ иғҪеӨҹз”ЁиҮӘе·ұзҡ„еҢ…е’Ңз¬¬дёүж–№еҢ…иҪ»жқҫжӣҝжҚўжҲ–жү©еұ•е…¶и®ёеӨҡеҠҹиғҪгҖӮ\n\
    \nдёҺе…¶д»–Webзј–зЁӢз”ҹжҖҒзі»з»ҹдёҚеҗҢпјҢGoдёӯWebејҖеҸ‘зҡ„жғҜз”Ёж–№ејҸжҳҜдҪҝз”Ёж ҮеҮҶеә“еҢ…пјҢе№¶еңЁйңҖиҰҒж—¶дҪҝз”Ёз¬¬дёүж–№еҢ…жқҘжү©еұ•зҺ°жңүеҠҹиғҪзҡ„иғҪеҠӣгҖӮеңЁйҖүжӢ©з¬¬дёүж–№еҢ…ж—¶пјҢйҖүжӢ©йӮЈдәӣдёҺж ҮеҮҶеә“еҢ…е…је®№зҡ„йқһеёёйҮҚиҰҒгҖӮ`mux`еҢ…жҳҜиҝҷз§Қж–№жі•зҡ„дёҖдёӘеҫҲеҘҪзҡ„дҫӢеӯҗпјҢе®ғдёҺ`http`еҢ…е…је®№пјҢеӣ дёәе®ғжҸҗдҫӣдәҶ`http.Handler`жҺҘеҸЈгҖӮ\n\
    \n# жһ„е»әRESTful API\n\nжң¬з« и®Ёи®әдәҶGoдёӯWebејҖеҸ‘зҡ„еҹәзЎҖзҹҘиҜҶпјҢеҢ…жӢ¬з”ЁдәҺеӨ„зҗҶе’ҢжҸҗдҫӣHTTPиҜ·жұӮзҡ„`http.ServeMux`е’Ң`http.Handler`гҖӮдҪ иҝҳеӯҰд№ дәҶз¬¬дёүж–№еҢ…`mux`пјҢе®ғеҸҜд»ҘдҪңдёә`http.ServeMux`зҡ„жӣҝд»Је“ҒпјҢе№¶дё”дёҺ`http`еҢ…е…је®№гҖӮзҺ°еңЁпјҢи®©жҲ‘д»¬дҪҝз”Ё`mux`еҢ…дҪңдёәиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁжқҘжһ„е»әдёҖдёӘз®ҖеҚ•зҡ„еҹәдәҺJSONзҡ„REST\
    \ APIпјҢиҝҷе°Ҷеё®еҠ©дҪ зҗҶи§ЈеңЁGoдёӯжһ„е»әWebзі»з»ҹзҡ„и®ёеӨҡе®һйҷ…еҒҡжі•пјҲеҸӮи§Ғжё…еҚ•[4-15](#A978-1-4842-1052-9_4_Chapter.html#FPar17)пјүгҖӮ\n\
    \n> **жіЁж„Ҹ**\n> иЎЁиҝ°жҖ§зҠ¶жҖҒиҪ¬з§»пјҲRESTпјүпјҡеҰӮжһңдҪ жғідәҶи§ЈжӣҙеӨҡе…ідәҺRESTзҡ„зҹҘиҜҶпјҢжҲ‘жҺЁиҚҗдҪ йҳ…иҜ»Martin Fowlerзҡ„ж–Үз« гҖҠRichardsonжҲҗзҶҹеәҰжЁЎеһӢпјҡиҝҲеҗ‘RESTиҚЈиҖҖзҡ„жӯҘйӘӨгҖӢгҖӮи®ҝй—®ең°еқҖпјҡ[`http://martinfowler.com/articles/richardsonMaturityModel.html`](http://martinfowler.com/articles/richardsonMaturityModel.html)\n\
    \n**жё…еҚ• 4-15. еҹәдәҺJSONзҡ„RESTful API**\n\n```\npackage main\n\nimport (\n    \"encoding/json\"\
    \n    \"log\"\n    \"net/http\"\n    \"strconv\"\n    \"time\"\n    \"github.com/gorilla/mux\"\
    \n)\n\ntype Note struct {\n     Title       string    `json:\"title\"`\n     Description\
    \ string    `json:\"description\"`\n     CreatedOn   time.Time `json:\"createdon\"\
    `\n}\n\n//Store for the Notes collection\nvar noteStore = make(map[string]Note)\n\
    \n//Variable to generate key for the collection\nvar id int = 0\n\n//HTTP Post\
    \ - /api/notes\nfunc PostNoteHandler(w http.ResponseWriter, r *http.Request) {\n\
    \    var note Note\n    // Decode the incoming Note json\n    err := json.NewDecoder(r.Body).Decode(&note)\n\
    \    if err != nil {\n        panic(err)\n    }\n    note.CreatedOn = time.Now()\n\
    \    id++\n    k := strconv.Itoa(id)\n    noteStore[k] = note\n    j, err := json.Marshal(note)\n\
    \    if err != nil {\n        panic(err)\n    }\n    w.Header().Set(\"Content-Type\"\
    , \"application/json\")\n    w.WriteHeader(http.StatusCreated)\n    w.Write(j)\n\
    }\n\n//HTTP Get - /api/notes\nfunc GetNoteHandler(w http.ResponseWriter, r *http.Request)\
    \ {\n    var notes []Note\n    for _, v := range noteStore {\n        notes =\
    \ append(notes, v)\n    }\n    w.Header().Set(\"Content-Type\", \"application/json\"\
    )\n    j, err := json.Marshal(notes)\n    if err != nil {\n        panic(err)\n\
    \    }\n    w.WriteHeader(http.StatusOK)\n    w.Write(j)\n}\n\n//HTTP Put - /api/notes/{id}\n\
    func PutNoteHandler(w http.ResponseWriter, r *http.Request) {\n    var err error\n\
    \    vars := mux.Vars(r)\n    k := vars[\"id\"]\n    var noteToUpd Note\n    //\
    \ Decode the incoming Note json\n    err = json.NewDecoder(r.Body).Decode(&noteToUpd)\n\
    \    if err != nil {\n        panic(err)\n    }\n    if note, ok := noteStore[k];\
    \ ok {\n        noteToUpd.CreatedOn = note.CreatedOn\n        //delete existing\
    \ item and add the updated item\n        delete(noteStore, k)\n        noteStore[k]\
    \ = noteToUpd\n    } else {\n        log.Printf(\"Could not find key of Note %s\
    \ to delete\", k)\n    }\n    w.WriteHeader(http.StatusNoContent)\n}\n\n//HTTP\
    \ Delete - /api/notes/{id}\nfunc DeleteNoteHandler(w http.ResponseWriter, r *http.Request)\
    \ {\n    vars := mux.Vars(r)\n    k := vars[\"id\"]\n    // Remove from Store\n\
    \    if _, ok := noteStore[k]; ok {\n        //delete existing item\n        delete(noteStore,\
    \ k)\n    } else {\n        log.Printf(\"Could not find key of Note %s to delete\"\
    , k)\n    }\n    w.WriteHeader(http.StatusNoContent)\n}\n\n//Entry point of the\
    \ program\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n    r.HandleFunc(\"\
    /api/notes\", GetNoteHandler).Methods(\"GET\")\n    r.HandleFunc(\"/api/notes\"\
    , PostNoteHandler).Methods(\"POST\")\n    r.HandleFunc(\"/api/notes/{id}\", PutNoteHandler).Methods(\"\
    PUT\")\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"DELETE\"\
    )\n    server := &http.Server{\n        Addr:    \":8080\",\n        Handler:\
    \ r,\n    }\n    log.Println(\"Listening...\")\n    server.ListenAndServe()\n\
    }\n```\n\n## ж•°жҚ®жЁЎеһӢдёҺж•°жҚ®еӯҳеӮЁ\n\nжё…еҚ•[4-15](#A978-1-4842-1052-9_4_Chapter.html#FPar17)жһ„е»әдәҶдёҖдёӘз®ҖеҚ•зҡ„REST\
    \ APIпјҢй’ҲеҜ№ж•°жҚ®жЁЎеһӢ`Note`з»“жһ„дҪ“е®һзҺ°дәҶеҹәжң¬зҡ„CRUDж“ҚдҪңпјҡ\n\n```\ntype Note struct {\n     Title    \
    \   string    `json:\"title\"`\n     Description string    `json:\"description\"\
