    **Figure 1-3.** Install command installing calc package into pkg folder


    The `install` command behaves a bit differently depending on whether you are creating
    an executable program or a reusable library. When you run `install` for executable
    programs the resulting binary will be installed into the `bin` directory of `GOPATH`
    while it will be installed into the `pkg` directory of `GOPATH` for libraries.


