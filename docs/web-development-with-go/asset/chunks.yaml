    В В В В В В В В `_ "lib/mongodb/db"`


    `)`


    `func main() {`


    В В `//implementation here`


    `}`


    In Listing [2-4](#A978-1-4842-1052-9_2_Chapter.html#FPar5), the `db` package was
    imported with a package alias as a blank identifier (`_`). Here you want the `init`
    function of package `db` to be invoked, but not use other package identifiers.


    ### Importing Packages


    Go source files are organized into directories as packages that provide code reusability
    into other packages. If you want to reuse package code into other shared libraries
    and executable programs, you must import the packages into your programs. You
    can import packages into your Go programs by using the keyword `import`. The statement
    `import` tells the Go compiler that you want to reference the code provided by
    that particular package. When you import a package into a program, you can reuse
    all the exported identifiers of the referenced packages. If you want to export
    variables, constants, and functions to be used with other programs, the name of
    the identifier must start with an uppercase letter. See Listing [2-5](#A978-1-4842-1052-9_2_Chapter.html#FPar6).


    Listing 2-5.В В The import Statement to the imports Package


    `import (`


    В В В В `"bytes"`


    В В В В `"fmt"`


    В В В В `"unicode"`


    `)`


    In this listing, the packages `bytes`, `fmt`, and `unicode` are imported. The
    idiomatic way to import multiple packages in Go is to write the `import` statements
    in an `import` block, as shown here.


    When a package is imported, the Go compiler will search the `GOROOT` directory
    and then look for the `GOPATH` directory if it canвҖҷt find the package in `GOROOT`.
    If the Go compiler canвҖҷt find a package in either the `GOROOT` or `GOPATH` location,
    it will generate an error when you try to build your program.


    ### Install Third-Party Packages


    The Go developer community is very enthusiastic about providing many useful third-party
    packages through code-sharing web sites such as `github.com` and code.google.com.
    You can import and reuse these third-party packages by using the Go tools. The
    `go get` command fetches packages from remote repositories.


    The following `go get` command fetches the third-part package `negroni` and installs
    it into the `GOPATH` location:


    `go get github.com/codegangsta/negroni`


    The `go get` command fetches the package and dependent packages recursively from
    the repository location. Once the package is fetched into the `GOPATH`, you can
    import and reuse these packages from all the programs located in the `GOPATH`
    location. In many other developer ecosystems, you have to import these packages
    at a project level; you have to install packages for each individual project separately.
    When you import a package in Go, you actually import from a common location: the
    `GOPATH pkg` directory, so you can appreciate the simplicity and pragmatism in
    many of the Go features, including the package ecosystem.


    ### Writing Packages


    LetвҖҷs write a sample package to reuse with other programs. Listing [2-6](#A978-1-4842-1052-9_2_Chapter.html#FPar7)
    is a simple package that swaps charactersвҖҷ case from upper- to lowercase or lower-
    to uppercase.


    Listing 2-6.В В Library Package


    `package strcon`


    `import (`


    В В В В `"bytes"`


    В В В В `"unicode"`


    `)`


    `// Swap characters case from upper to lower or lower to upper.`


    `func SwapCase(str string) string {`


    В В В В `buf := &bytes.Buffer{}`


    В В В В `for _, r := range str {`


    В В В В В В В В `if unicode.IsUpper(r) {`


    В В В В В В В В В В В В `buf.WriteRune(unicode.ToLower(r))`


    В В В В В В В В `} else {`


    В В В В В В В В В В В В `buf.WriteRune(unicode.ToUpper(r))`


    В В В В В В В В `}`


    В В В В `}`


    В В В В `return buf.String()`


    `}`


    The package is named `strcon`. The idiomatic way to provide a package name is
    to give short and simple lowercase names without underscores or mixed capital
    letters. The package names of the standard library are a great reference for naming
    packages.


    LetвҖҷs build and install the package `strcon` to be used with other programs. The
    package provides a method named `SwapCase` that swaps the character case of a
    string from upper- to lowercase or lower- to uppercase. Reuse the packages `bytes`
    and `unicode` from the standard library to swap character case. Because the name
    of the `SwapCase` method starts with an uppercase letter, it will be exported
    to other programs when this package is referenced package. The `SwapCase` method
    iterates through a string and changed the case of each character:


    В В В В `for _, r := range str {`


    В В В В В В В В `if unicode.IsUpper(r) {`


    В В В В В В В В В В В В `buf.WriteRune(unicode.ToLower(r))`


    В В В В В В В В `} else {`


    В В В В В В В В В В В В `buf.WriteRune(unicode.ToUpper(r))`


    В В В В В В В В `}`


    В В В В `}`


    The keyword `range` allows you to iterate through arrays and collections. By iterating
    through a string value, you can extract each character as a value and swap the
    character case. On the left side of the range block, you can provide two variables
    for getting the `key` and `value` of each item in the collection. In this code
    block, the `value` for getting the character value is used, but you donвҖҷt use
    the `key` in the program. In this context, you can use a blank identifier (`_`)
    to avoid compiler errors. It is common practice to use a blank identifier with
    `range` whenever you want to ignore a `key` or `value` variable declaration from
    the left side.


    With the following command at the location of the package directory, build the
    package and install it on the `pkg` subdirectory of `GOPATH`:


    `go install`


    LetвҖҷs write a sample program to reuse the code of the `strconv` package (see Listing
    [2-7](#A978-1-4842-1052-9_2_Chapter.html#FPar8)).


    Listing 2-7.В В Reusing the strconv Package in main.go


    `package main`


    `import (`


    В В В В `"fmt"`


    В В В В `"strcon"`


    `)`


    `func main() {`


    В В В В `s := strconv.SwapCase("Gopher")`


    В В В В `fmt.Println("Converted string is :", s)`


    `}`


    We import the package `strcon` to reuse the code for swapping character case in
    a string. LetвҖҷs run the program by typing the following command in the terminal
    from the package directory:


    `go run main.go`


    You should see the following result when running the program:


    `gOPHER`


    Because the program in Listing [2-7](#A978-1-4842-1052-9_2_Chapter.html#FPar8)
    is written in package `main`, the `Go build` command generates an executable binary
    into the package directory. The `Go install` command builds the package and installs
    the resulting binary into the `GOPATH bin` subdirectory.'
