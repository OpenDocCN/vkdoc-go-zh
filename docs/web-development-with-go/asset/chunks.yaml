    \ зұ»еһӢзҡ„е®һдҫӢпјҢд»Ҙе°Ҷе“Қеә”зј–з Ғдёә JSONгҖӮ\n\nеӣҫ 9-7 еұ•зӨәдәҶдёҖдёӘеҢ…еҗ«иҝҮжңҹи®ҝй—®д»ӨзүҢзҡ„ж— ж•Ҳ HTTP иҜ·жұӮзҡ„й”ҷиҜҜе“Қеә”гҖӮ\n\n![A978-1-4842-1052-9_9_Fig7_HTML.jpg](img/A978-1-4842-1052-9_9_Fig7_HTML.jpg)\n\
    \n**еӣҫ 9-7.** з”ЁдәҺ JSON й”ҷиҜҜж¶ҲжҒҜзҡ„ HTTP е“Қеә”\n\n`DisplayAppError` еҮҪж•°жҳҜдёҖдёӘз®ҖеҚ•зҡ„иҫ…еҠ©еҮҪж•°пјҢз”ЁдәҺжҸҗдҫӣ HTTP\
    \ й”ҷиҜҜгҖӮдҪ д№ҹеҸҜд»ҘеңЁ HTTP дёӯй—ҙд»¶дёӯзј–еҶҷй”ҷиҜҜеӨ„зҗҶйҖ»иҫ‘пјҢиҜҘйҖ»иҫ‘еҸҜз”ЁдәҺеҢ…иЈ…еә”з”ЁзЁӢеәҸеӨ„зҗҶзЁӢеәҸпјҢиҝҷжҳҜеңЁ Go Web еә”з”ЁзЁӢеәҸдёӯе®һзҺ°й”ҷиҜҜеӨ„зҗҶзҡ„жӣҙдјҳйӣ…ж–№жі•гҖӮеҰӮжһңеңЁеә”з”ЁзЁӢеәҸеӨ„зҗҶзЁӢеәҸдёӯеҸ‘з”ҹд»»дҪ•й”ҷиҜҜпјҢдҪ еҸҜд»Ҙиҝ”еӣһдёҖдёӘз”ЁдәҺдҝқеӯҳй”ҷиҜҜж•°жҚ®зҡ„жЁЎеһӢеҜ№иұЎпјҢе№¶дё”еңЁдёӯй—ҙд»¶еҮҪж•°дёӯпјҢдҪ еҸҜд»ҘжЈҖжҹҘй”ҷиҜҜжЁЎеһӢжҳҜеҗҰеҢ…еҗ«д»»дҪ•еҖјгҖӮеҰӮжһңеҸ‘з”ҹй”ҷиҜҜпјҢдҪ иҝҳеҸҜд»ҘжҸҗдҫӣ\
    \ HTTP й”ҷиҜҜе“Қеә”гҖӮжң¬з« дёҚи®Ёи®әиҝҷз§Қж–№жі•пјҢдҪҶдҪ еҸҜд»ҘеңЁжһ„е»әиҮӘе·ұзҡ„ Web еә”з”ЁзЁӢеәҸж—¶е°қиҜ•дҪҝз”ЁгҖӮ\n\n## еӨ„зҗҶ HTTP иҜ·жұӮз”ҹе‘Ҫе‘Ёжңҹдёӯзҡ„ж•°жҚ®\n\nи®©жҲ‘д»¬е®ҡд№үдёҖдёӘз”ЁдәҺеңЁ\
    \ HTTP иҜ·жұӮз”ҹе‘Ҫе‘ЁжңҹеҶ…еӨ„зҗҶж•°жҚ®зҡ„зұ»еһӢгҖӮиҝҷйҮҢе®ҡд№үдәҶдёҖдёӘ`Context`з»“жһ„дҪ“зұ»еһӢпјҢе°Ҷ MongoDB зҡ„`Session`еҜ№иұЎдҪңдёәе…¶еұһжҖ§пјҢе№¶жҡҙйңІдәҶ`DbCollection`ж–№жі•з”ЁдәҺиҺ·еҸ–\
    \ MongoDB зҡ„`Collection`еҜ№иұЎпјҢд»ҘеҸҠ`Close`ж–№жі•з”ЁдәҺе…ій—ӯ MongoDB зҡ„`Session`еҜ№иұЎгҖӮ\n\nжё…еҚ• 9-14 жҸҗдҫӣдәҶ`Context`з»“жһ„дҪ“зұ»еһӢзҡ„д»Јз Ғеқ—пјҢиҜҘзұ»еһӢе°ҶдёҺ\
    \ HTTP еӨ„зҗҶеҮҪж•°дёҖиө·дҪҝз”ЁпјҢд»ҘеңЁ HTTP иҜ·жұӮз”ҹе‘Ҫе‘ЁжңҹеҶ…дҝқеӯҳж•°жҚ®гҖӮ\n\n**жё…еҚ• 9-14.** `context.go` дёӯзҡ„ `Context`\
    \ з»“жһ„дҪ“\n\n```\npackage controllers\n\nimport (\n    \"gopkg.in/mgo.v2\"\n    \"\
    github.com/shijuvar/go-web/taskmanager/common\"\n)\n\n// Struct used for maintaining\
    \ HTTP Request Context\ntype Context struct {\n    MongoSession *mgo.Session\n\
    }\n\n// Close mgo.Session\nfunc (c *Context) Close() {\n    c.MongoSession.Close()\n\
    }\n\n// Returns mgo.collection for the given name\nfunc (c *Context) DbCollection(name\
    \ string) *mgo.Collection {\n    return c.MongoSession.DB(common.AppConfig.Database).C(name)\n\
    }\n\n// Create a new Context object for each HTTP request\nfunc NewContext() *Context\
    \ {\n    session := common.GetSession().Copy()\n    context := &Context{\n   \
    \     MongoSession: session,\n    }\n    return context\n}\n```\n\nиҝҷдёӘжәҗж–Үд»¶жҸҗдҫӣдәҶдёҖдёӘ`NewContext`еҮҪж•°пјҢиҜҘеҮҪж•°йҖҡиҝҮжҸҗдҫӣ\
    \ MongoDB `Session`еҜ№иұЎзҡ„еүҜжң¬пјҢиҝ”еӣһдёҖдёӘ`Context`зұ»еһӢзҡ„е®һдҫӢгҖӮи°ғз”Ё`common`еҢ…зҡ„`GetSession`еҮҪж•°жқҘиҺ·еҸ–`Session`еҜ№иұЎпјҢе№¶д»ҺдёӯеҲӣе»әдёҖдёӘеүҜжң¬гҖӮеңЁеә”з”ЁзЁӢеәҸеӨ„зҗҶзЁӢеәҸдёӯпјҢи°ғз”Ё`NewContext`еҮҪж•°жқҘиҺ·еҸ–`Context`зұ»еһӢзҡ„е®һдҫӢпјҢиҜҘе®һдҫӢдёӯзҡ„`Context`зұ»еһӢзҡ„\
    \ MongoDB `Session`еҜ№иұЎз”ЁдәҺеҜ№ MongoDB ж•°жҚ®еә“жү§иЎҢ CRUD ж“ҚдҪңгҖӮ\n\nеңЁ`Context`зұ»еһӢдёӯпјҢдҪ еҸӘжҳҜеӯҳеӮЁдәҶ MongoDB\
    \ зҡ„`Session`еҜ№иұЎпјҢдҪҶдҪ еҸҜд»ҘеңЁ`Context`зұ»еһӢдёӯдҪҝз”Ёд»»дҪ•зұ»еһӢзҡ„ж•°жҚ®пјҢд»ҘдҫҝдёҺ HTTP иҜ·жұӮзҡ„з”ҹе‘Ҫе‘ЁжңҹдёҖиө·дҪҝз”ЁгҖӮеңЁи®ёеӨҡз”ЁдҫӢдёӯпјҢдҪ еҸҜиғҪйңҖиҰҒеңЁеҗ„з§Қдёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°е’Ңеә”з”ЁзЁӢеәҸеӨ„зҗҶеҮҪж•°д№Ӣй—ҙе…ұдә«иҝҷдәӣж•°жҚ®гҖӮз®ҖиҖҢиЁҖд№ӢпјҢдҪ йңҖиҰҒеңЁдёҚеҗҢзҡ„еӨ„зҗҶеҮҪж•°д№Ӣй—ҙе…ұдә«ж•°жҚ®гҖӮ\n\
    \nеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪ еҸҜд»ҘдҪҝз”ЁдёҖз§ҚжңәеҲ¶жқҘеӯҳеӮЁеҜ№иұЎпјҢд»ҘдҫҝеңЁ HTTP иҜ·жұӮдёҠдёӢж–Үдёӯе·ҘдҪңгҖӮжқҘиҮӘ Gorilla Web е·Ҙе…·еҢ…пјҲwww.gorillatoolkit.org/pkg/contextпјүзҡ„`context`еҢ…жҸҗдҫӣдәҶе°Ҷж•°жҚ®ж”ҫе…Ҙ\
    \ HTTP `Context`еҜ№иұЎзҡ„еҠҹиғҪпјҢд»ҘдҫҝеңЁ HTTP иҜ·жұӮзҡ„з”ҹе‘Ҫе‘ЁжңҹеҶ…дҝқеӯҳж•°жҚ®гҖӮдҪ еҸҜд»Ҙе°ҶдёҖдёӘеӨ„зҗҶзЁӢеәҸдёӯзҡ„ж•°жҚ®ж”ҫе…Ҙ HTTP дёҠдёӢж–ҮдёӯпјҢиҜҘж•°жҚ®еҸҜд»Ҙиў«е…¶д»–еӨ„зҗҶзЁӢеәҸи®ҝй—®гҖӮеңЁ\
    \ RESTful API зӨәдҫӢдёӯпјҢдҪ еңЁеә”з”ЁзЁӢеәҸеӨ„зҗҶзЁӢеәҸдёӯдҪҝз”Ёиҝҷдәӣж•°жҚ®пјҢе№¶дё”дёҚйңҖиҰҒеңЁеӨ„зҗҶзЁӢеәҸд№Ӣй—ҙе…ұдә«ж•°жҚ®гҖӮеӣ жӯӨпјҢдҪ жІЎжңүе°Ҷ`Context`з»“жһ„дҪ“ж”ҫе…Ҙ HTTP\
    \ `Context`еҜ№иұЎдёӯгҖӮ\n\n## з”ЁжҲ·иө„жәҗзҡ„еӨ„зҗҶзЁӢеәҸ\n\nд»ҘдёӢжҳҜдёәз”ЁжҲ·иө„жәҗжҢҮе®ҡзҡ„и·Ҝз”ұпјҡ\n\n```\nrouter.HandleFunc(\"\
    /users/register\", controllers.Register).Methods(\"POST\")\nrouter.HandleFunc(\"\
    /users/login\", controllers.Login).Methods(\"POST\")\n```\n\nдёәз”ЁжҲ·иө„жәҗжҢҮе®ҡдәҶдёӨжқЎи·Ҝз”ұгҖӮиө„жәҗ`/users/register`з”ЁдәҺе°Ҷз”ЁжҲ·жіЁеҶҢеҲ°зі»з»ҹдёӯпјҢ`/users/login`з”ЁдәҺзҷ»еҪ•зі»з»ҹд»ҘиҺ·еҸ–и®ҝй—®д»ӨзүҢпјҢиҜҘд»ӨзүҢз”ЁдәҺжҺҲжқғи®ҝй—®\
    \ RESTful API иө„жәҗзҡ„ HTTP иҜ·жұӮгҖӮ\n"
