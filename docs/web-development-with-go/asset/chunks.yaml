    \n```\nif p := strings.TrimPrefix(r.URL.Path, prefix); len(p) < len(r.URL.Path)\
    \ {\n    r.URL.Path = p\n    h.ServeHTTP(w, r)\n} else {\n    NotFound(w, r)\n\
    }\n```\n\nжӮЁеҸҜд»ҘеғҸ `http` еҢ…е®һзҺ°еҢ…иЈ…еӨ„зҗҶзЁӢеәҸеҮҪж•°дёҖж ·иҪ»жқҫең°зј–еҶҷ HTTP дёӯй—ҙд»¶гҖӮжӮЁеҸҜд»ҘйҖҡиҝҮе®һзҺ°зӯҫеҗҚеҰӮ `func(http.Handler)\
    \ http.Handler` зҡ„еҮҪж•°жқҘзј–еҶҷдёӯй—ҙд»¶еҮҪж•°гҖӮеҰӮжһңжӮЁжғіеҗ‘дёӯй—ҙд»¶еҮҪж•°дј йҖ’д»»дҪ•еҖјпјҢжӮЁеҸҜд»ҘеғҸ `http` еҢ…дёӯзҡ„ `StripPrefix` еҮҪж•°йӮЈж ·пјҢе°Ҷе®ғд»¬дҪңдёәеҮҪж•°еҸӮж•°дёҺ\
    \ `http.Handler` дёҖиө·жҸҗдҫӣгҖӮ\n\n### еҰӮдҪ•зј–еҶҷ HTTP дёӯй—ҙд»¶\n\nзј–еҶҷ HTTP дёӯй—ҙд»¶зҡ„еҹәжң¬жӯҘйӘӨеҰӮдёӢпјҡ\n\n- зј–еҶҷдёҖдёӘеҮҪж•°пјҢд»Ҙ\
