    \ existing Task document`\n\n`func DeleteTask(w http.ResponseWriter, r *http.Request)\
    \ {`\n\n`vars := mux.Vars(r)`\n\n`id := vars[\"id\"]`\n\n`context := NewContext()`\n\
    \n`defer context.Close()`\n\n`c := context.DbCollection(\"tasks\")`\n\n`repo :=\
    \ &data.TaskRepository{c}`\n\n`// Delete an existing Task document`\n\n`err :=\
    \ repo.Delete(id)`\n\n`if err != nil {`\n\n`common.DisplayAppError(`\n\n`w,`\n\
    \n`err,`\n\n`\"An unexpected error has occurred\",`\n\n`500,`\n\n`)`\n\n`return`\n\
    \n`}`\n\n`w.WriteHeader(http.StatusNoContent)`\n\n`}`\n\nThe handler functions\
    \ in `taskController.go` use the package `\"data\"` for performing CRUD operations\
    \ against the data model `Task`, which is implemented in the `taskRepository`\
    \ struct.\n\nListing [9-20](#A978-1-4842-1052-9_9_Chapter.html#FPar21) provides\
    \ the data persistence logic written in `taskRepository.go`.\n\nListing 9-20.\
    \ Data Persistence Logic for the Task Entity in `taskRepository.go`\n\n```\npackage\
    \ data\n\nimport (\n\t\"time\"\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\
    \n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n)\n\ntype TaskRepository\
    \ struct {\n\tC *mgo.Collection\n}\n\nfunc (r *TaskRepository) Create(task *models.Task)\
    \ error {\n\tobj_id := bson.NewObjectId()\n\ttask.Id = obj_id\n\ttask.CreatedOn\
    \ = time.Now()\n\ttask.Status = \"Created\"\n\terr := r.C.Insert(&task)\n\treturn\
    \ err\n}\n\nfunc (r *TaskRepository) Update(task *models.Task) error {\n\t// partial\
    \ update on MogoDB\n\terr := r.C.Update(bson.M{\"_id\": task.Id},\n\t\tbson.M{\"\
    $set\": bson.M{\n\t\t\t\"name\":        task.Name,\n\t\t\t\"description\": task.Description,\n\
    \t\t\t\"due\":         task.Due,\n\t\t\t\"status\":      task.Status,\n\t\t\t\"\
    tags\":        task.Tags,\n\t\t}})\n\treturn err\n}\n\nfunc (r *TaskRepository)\
    \ Delete(id string) error {\n\terr := r.C.Remove(bson.M{\"_id\": bson.ObjectIdHex(id)})\n\
    \treturn err\n}\n\nfunc (r *TaskRepository) GetAll() []models.Task {\n\tvar tasks\
    \ []models.Task\n\titer := r.C.Find(nil).Iter()\n\tresult := models.Task{}\n\t\
    for iter.Next(&result) {\n\t\ttasks = append(tasks, result)\n\t}\n\treturn tasks\n\
    }\n\nfunc (r *TaskRepository) GetById(id string) (task models.Task, err error)\
    \ {\n\terr = r.C.FindId(bson.ObjectIdHex(id)).One(&task)\n\treturn\n}\n\nfunc\
    \ (r *TaskRepository) GetByUser(user string) []models.Task {\n\tvar tasks []models.Task\n\
    \titer := r.C.Find(bson.M{\"createdby\": user}).Iter()\n\tresult := models.Task{}\n\
    \tfor iter.Next(&result) {\n\t\ttasks = append(tasks, result)\n\t}\n\treturn tasks\n\
    }\n```\n\n## Testing API Operations for the Tasks Resource\n\nLetвҖҷs test the API\
    \ operations of the `Tasks` resource by using a RESTful API client tool. To access\
    \ the API operations of the `Tasks` resource, client applications must provide\
    \ a JWT in the `\"Authorization\"` header as a bearer token. You get the JWT from\
    \ the URI endpoint `\"/users/login\"`.\n\nFigure [9-13](#A978-1-4842-1052-9_9_Chapter.html#Fig13)\
