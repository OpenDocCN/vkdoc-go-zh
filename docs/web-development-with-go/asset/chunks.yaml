  raw: 'A `Server` is an HTTP server designed for testing HTTP applications with a
    test server. You can create a test HTTP server by calling the `NewServer` function
    of the `httptest` package by passing an instance of `http.Handler`, which starts
    an HTTP server by calling the `Serve` method of `http.Server`. By using `httptest.Server`,
    you can test your HTTP applications using a test server (HTTP server). Hence you
    can perform end-to-end HTTP tests by sending HTTP requests to the server from
    a HTTP client.


    ### Testing with ResponseRecorder


    LetвҖҷs take a look at how to write unit tests to inspect HTTP responses by leveraging
    the `ResponseRecorder` type. First, we write an example HTTP API server with the
    endpoints shown in Table [10-1](#A978-1-4842-1052-9_10_Chapter.html#Tab1).


    Table 10-1.


    Example of HTTP API Server


    | HTTP Verb | Path | Functionality |

    | --- | --- | --- |

    | `GET` | `/users` | Lists all users in JSON format |

    | `POST` | `/users` | Creates a user |


    Listing [10-8](#A978-1-4842-1052-9_10_Chapter.html#FPar8) provides an implementation
    of an example HTTP server.


    Listing 10-8.В В Example HTTP API Server in main.go


    `package main`


    `import (`


    `"encoding/json"`


    `"errors"`


    `"net/http"`


    `"github.com/gorilla/mux"`


    `)`


    `type User struct {`


    `` FirstName string `json:"firstname"` ``


    `` LastNameВ В string `json:"lastname"` ``


    `` EmailВ В В В В string `json:email"` ``


    `}`


    `var userStore = []User{}`


    `func getUsers(w http.ResponseWriter, r *http.Request) {`


    `users, err := json.Marshal(userStore)`


    `if err != nil {`


    `w.WriteHeader(http.StatusInternalServerError)`


    `return`


    `}`


    `w.Header().Set("Content-Type", "application/json")`


    `w.WriteHeader(http.StatusOK)`


    `w.Write(users)`


    `}`


    `func createUser(w http.ResponseWriter, r *http.Request) {`


    `var user User`


    `// Decode the incoming User json`


    `err := json.NewDecoder(r.Body).Decode(&user)`


    `if err != nil {`


    `w.WriteHeader(http.StatusInternalServerError)`


    `return`


    `}`


    `// Validate the User entity`


    `err = validate(user)`


    `if err != nil {`


    `w.WriteHeader(http.StatusBadRequest)`


    `return`


    `}`


    `// Insert User entity into User Store`


    `userStore = append(userStore, user)`


    `w.WriteHeader(http.StatusCreated)`


    `}`


    `// Validate User entity`


    `func validate(user User) error {`


    `for _, u := range userStore {`


    `if u.Email == user.Email {`


    `return errors.New("The Email is already exists")`


    `}`


    `}`


    `return nil`


    `}`


    `func SetUserRoutes() *mux.Router {`


    `r := mux.NewRouter()`


    `r.HandleFunc("/users", createUser).Methods("POST")`


    `r.HandleFunc("/users", getUsers).Methods("GET")`


    `return r`


    `}`


    `func main() {`


    `http.ListenAndServe(":8080", SetUserRoutes())`


    `}`


    Two HTTP endpoints are written: HTTP `Post` on `"/users"` and HTTP `Get` on `"/users".
    Gorilla mux` is used to configure the request multiplexer. When a new `User` entity
    is created, you validate whether the `e-mail` ID already exists. For the sake
    of the example demonstration, the `User` objects are persisted into a slice named
    `userStore`.


    In TDD, a developer starts the development cycle by writing unit tests based on
    the requirements identified. Developers normally write user stories to write unit
    tests. Even though this book doesnвҖҷt follow a test-first approach or the purest
    form of TDD, letвҖҷs write user stories for writing unit tests:


    Users should be able to view a list of `User` entities. В  Users should be able
    to create a new `User` entity. В  The e-mail ID of a `User` entity should be unique.


    Listing [10-9](#A978-1-4842-1052-9_10_Chapter.html#FPar9) provides the unit tests
