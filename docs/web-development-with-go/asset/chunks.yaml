  trans: "\n# зұ»еһӢз»„еҗҲ\n\nGo зҡ„и®ҫи®ЎзҗҶеҝөжҳҜжҲҗдёәдёҖй—Ёдё“жіЁдәҺе®һйҷ…еә”з”Ёзҡ„з®ҖеҚ•иҜӯиЁҖпјӣдёәдәҶдҝқжҢҒе…¶жһҒз®Җзү№жҖ§пјҢе®ғеҝҪз•ҘдәҶи®ёеӨҡеӯҰжңҜи§ӮзӮ№гҖӮдҪ еңЁеүҚйқўзҡ„з« иҠӮдёӯе·Із»ҸзңӢеҲ°дәҶ\
    \ Go зұ»еһӢзі»з»ҹзҡ„з®ҖжҙҒжҖ§гҖӮе…¶зұ»еһӢзі»з»ҹзҡ„дёҖдёӘдё»иҰҒеҶізӯ–жҳҜпјҢиҷҪз„¶е®ғдёҚж”ҜжҢҒз»§жүҝпјҢдҪҶйҖҡиҝҮзұ»еһӢеөҢе…ҘпјҲtype embeddingпјүж”ҜжҢҒз»„еҗҲгҖӮGo йј“еҠұдҪ дҪҝз”Ёз»„еҗҲиҖҢйқһз»§жүҝгҖӮ\n\
    \n**жіЁж„Ҹ**пјҡз»„еҗҲжҳҜдёҖз§Қи®ҫи®ЎзҗҶеҝөпјҢеҚіе°Ҷиҫғе°Ҹзҡ„з»„д»¶з»„еҗҲжҲҗиҫғеӨ§зҡ„з»„д»¶гҖӮ\n\nеүҚдёҖиҠӮе®ҡд№үдәҶ `Person` зұ»еһӢгҖӮдҪ еҸҜд»ҘйҖҡиҝҮеөҢе…Ҙ `Person` зұ»еһӢжқҘеҲӣе»әжӣҙеӨ§гҖҒжӣҙе…·дҪ“зҡ„зұ»еһӢгҖӮеңЁд»Јз Ғжё…еҚ•\
    \ 3-11 дёӯпјҢйҖҡиҝҮеөҢе…Ҙ `Person` зұ»еһӢеҲӣе»әдәҶеҸҰеӨ–дёӨз§Қзұ»еһӢгҖӮ\n\n**д»Јз Ғжё…еҚ• 3-11. з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ**\n\n```\ntype Admin\
    \ struct {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Roles  []string\n}\n\ntype Member struct\
    \ {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Skills []string\n}\n```\n\n`Person` зұ»еһӢиў«еөҢе…ҘеҲ° `Admin`\
    \ е’Ң `Member` зұ»еһӢдёӯпјҢеӣ жӯӨ `Person` зҡ„жүҖжңүеӯ—ж®өе’Ңж–№жі•йғҪе°ҶеңЁиҝҷдёӨз§Қж–°зұ»еһӢдёӯеҸҜз”ЁгҖӮ\n\nи®©жҲ‘д»¬еҲӣе»әдёҖдёӘзӨәдҫӢзЁӢеәҸжқҘзҗҶи§Јзұ»еһӢеөҢе…Ҙзҡ„еҠҹиғҪпјҲеҸӮи§Ғд»Јз Ғжё…еҚ•\
    \ 3-12пјүгҖӮ\n\n**д»Јз Ғжё…еҚ• 3-12. зұ»еһӢз»„еҗҲзҡ„зӨәдҫӢзЁӢеәҸ**\n\n```\npackage main\n\nimport (\n    \"\
    fmt\"\n    \"time\"\n)\n\ntype Person struct {\n    FirstName, LastName string\n\
    \    Dob                 time.Time\n    Email, Location     string\n}\n\n//Person\
    \ зҡ„дёҖдёӘж–№жі•\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName,\
    \ p.LastName)\n}\n\n//Person зҡ„дёҖдёӘж–№жі•\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"\
    [Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n\
    }\n\ntype Admin struct {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Roles  []string\n}\n\ntype\
    \ Member struct {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Skills []string\n}\n\nfunc main()\
    \ {\n    alex := Admin{\n        Person{\n            \"Alex\",\n            \"\
    John\",\n            time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n\
    \            \"alex@email.com\",\n            \"New York\"},\n        []string{\"\
    Manage Team\", \"Manage Tasks\"},\n    }\n\n    shiju := Member{\n        Person{\n\
    \            \"Shiju\",\n            \"Varghese\",\n            time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC),\n            \"shiju@email.com\",\n\
    \            \"Kochi\"},\n        []string{\"Go\", \"Docker\", \"Kubernetes\"\
    },\n    }\n\n    //дёә alex и°ғз”Ёж–№жі•\n    alex.PrintName()\n    alex.PrintDetails()\n\
    \n    //дёә shiju и°ғз”Ёж–№жі•\n    shiju.PrintName()\n    shiju.PrintDetails()\n}\n```\n\
    \nеҲӣе»әдәҶдёҖдёӘеёҰжңүеҮ дёӘеӯ—ж®өе’ҢдёӨдёӘж–№жі•зҡ„ `Person` зұ»еһӢгҖӮз„¶еҗҺйҖҡиҝҮеөҢе…Ҙ `Person` зұ»еһӢеҲӣе»әдәҶеҸҰеӨ–дёӨз§Қзұ»еһӢпјҡ`Admin` е’Ң `Member`гҖӮиҝҷдәӣж–°зұ»еһӢжӢҘжңү\
    \ `Person` зұ»еһӢжҸҗдҫӣзҡ„жүҖжңүеұһжҖ§е’Ңж–№жі•гҖӮеҸҜд»ҘеғҸиҝҷж ·йҖҡиҝҮз®ҖеҚ•ең°еөҢе…Ҙ `Person` зұ»еһӢжқҘеҲӣе»ә `Admin` е’Ң `Member` зұ»еһӢзҡ„е®һдҫӢпјҡ\n\
    \n```\nalex := Admin{\n    Person{\n        \"Alex\",\n        \"John\",\n   \
    \     time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\"\
    ,\n        \"New York\"},\n    []string{\"Manage Team\", \"Manage Tasks\"},\n\
    }\n\nshiju := Member{\n    Person{\n        \"Shiju\",\n        \"Varghese\",\n\
    \        time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n        \"\
    shiju@email.com\",\n        \"Kochi\"},\n    []string{\"Go\", \"Docker\", \"Kubernetes\"\
    },\n}\n```\n\nеӣ дёә `Person` зұ»еһӢзҡ„жүҖжңүж–№жі•еҜ№ `Admin` е’Ң `Member` зұ»еһӢйғҪжҳҜеҸҜз”Ёзҡ„пјҢдҪ еҸҜд»ҘеғҸеҰӮдёӢд»Јз ҒжүҖзӨәи°ғз”Ёиҝҷдәӣж–№жі•пјҡ\n\
    \n```\n//дёә alex и°ғз”Ёж–№жі•\nalex.PrintName()\nalex.PrintDetails()\n\n//дёә shiju и°ғз”Ёж–№жі•\n\
    shiju.PrintName()\nshiju.PrintDetails()\n```\n\nдҪ еә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\nAlex John\n\
    [Date of Birth: 1970-01-10 00:00:00 +0000 UTC, Email: alex@email.com, Location:\
    \ New York ]\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000 UTC, Email:\
    \ shiju@email.com, Location: Kochi ]\n```\n\nйҖҡиҝҮзұ»еһӢеөҢе…Ҙе®һзҺ°зҡ„зұ»еһӢз»„еҗҲж—ўжҸҗдҫӣдәҶдҪҝз”Ёз»§жүҝзҡ„е®һйҷ…еҘҪеӨ„пјҢеҸҲе…·жңүжӣҙеҘҪзҡ„еҸҜз»ҙжҠӨжҖ§гҖӮ\n\
    \n## иҰҶзӣ–еөҢе…Ҙзұ»еһӢзҡ„ж–№жі•\n\nеңЁд»Јз Ғжё…еҚ• 3-11 дёӯпјҢ`Person` зұ»еһӢиў«еөҢе…ҘеҲ° `Admin` е’Ң `Member` зұ»еһӢдёӯпјҢе№¶и°ғз”ЁдәҶ `Person`\
    \ зұ»еһӢжҸҗдҫӣзҡ„ж–№жі•гҖӮеҒҮи®ҫдҪ жғіеңЁ `Admin` е’Ң `Member` дёӯиҰҶзӣ– `PrintDetails` ж–№жі•пјҢеӣ дёәиҝҷдәӣзұ»еһӢжңүйўқеӨ–зҡ„еӯ—ж®өпјҡ`Roles`\
    \ е’Ң `Skills`гҖӮеөҢе…Ҙзұ»еһӢзҡ„ж–№жі•еҸҜд»Ҙиў«иҰҶзӣ–пјҢеҰӮд»Јз Ғжё…еҚ• 3-13 жүҖзӨәгҖӮ\n\n**д»Јз Ғжё…еҚ• 3-13. иҰҶзӣ–еөҢе…Ҙзұ»еһӢзҡ„ж–№жі•**\n\n```\n\
    type Admin struct {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Roles  []string\n}\n\n//иҰҶзӣ– PrintDetails\n\
    func (a Admin) PrintDetails() {\n    //и°ғз”Ё Person зҡ„ PrintDetails\n    a.Person.PrintDetails()\n\
    \    fmt.Println(\"Admin Roles:\")\n    for _, v := range a.Roles {\n        fmt.Println(v)\n\
    \    }\n}\n\ntype Member struct {\n    Person //з”ЁдәҺз»„еҗҲзҡ„зұ»еһӢеөҢе…Ҙ\n    Skills []string\n\
    }\n\n//иҰҶзӣ– PrintDetails\nfunc (m Member) PrintDetails() {\n    //и°ғз”Ё Person зҡ„ PrintDetails\n\
    \    m.Person.PrintDetails()\n    fmt.Println(\"Skills:\")\n    for _, v := range\
    \ m.Skills {\n        fmt.Println(v)\n    }\n}\n```\n\n`PrintDetails` ж–№жі•иў«иҰҶзӣ–д»ҘеҢ…еҗ«жҜҸдёӘзұ»еһӢжҢҒжңүзҡ„йўқеӨ–дҝЎжҒҜгҖӮеҪ“жӯӨж–№жі•иў«иҰҶзӣ–ж—¶пјҢдҪ еҸҜд»Ҙи°ғз”ЁеөҢе…Ҙзұ»еһӢзҡ„\
    \ `PrintDetails` ж–№жі•жқҘиҺ·еҸ–еөҢе…Ҙзұ»еһӢжҸҗдҫӣзҡ„еҹәжң¬дҝЎжҒҜпјҢз„¶еҗҺжҸҗдҫӣиҝҷдәӣзұ»еһӢжҢҒжңүзҡ„йўқеӨ–дҝЎжҒҜпјҡ\n\n```\nfunc (m Member) PrintDetails()\
    \ {\n    //и°ғз”Ё Person зҡ„ PrintDetails\n    m.Person.PrintDetails()\n    fmt.Println(\"\
    Skills:\")\n    for _, v := range m.Skills {\n        fmt.Println(v)\n    }\n\
    }\n```\n\nиҜӯеҸҘ `m.Person.PrintDetails()` и°ғз”ЁдәҶ `Person` зұ»еһӢзҡ„ `PrintDetails` ж–№жі•гҖӮ\n\n\
    и®©жҲ‘д»¬иҝҗиЎҢиҝҷдёӘдҝ®ж”№еҗҺзҡ„зЁӢеәҸпјҢе…¶д»Јз ҒеҰӮд»Јз Ғжё…еҚ• 3-14 жүҖзӨәгҖӮ\n\n**д»Јз Ғжё…еҚ• 3-14. иҝҗиЎҢеҢ…еҗ«ж–№жі•иҰҶзӣ–зҡ„зЁӢеәҸ**\n\n```\nalex :=\
    \ Admin{\n    Person{\n        \"Alex\",\n        \"John\",\n        time.Date(1970,\
    \ time.January, 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\",\n    \
    \    \"New York\"},\n    []string{\"Manage Team\", \"Manage Tasks\"},\n}\n\nshiju\
    \ := Member{\n    Person{\n        \"Shiju\",\n        \"Varghese\",\n       \
    \ time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n        \"shiju@email.com\"\
    ,\n        \"Kochi\"},\n    []string{\"Go\", \"Docker\", \"Kubernetes\"},\n}\n\
    \n//дёә alex и°ғз”Ёж–№жі•\nalex.PrintName()\nalex.PrintDetails()\n\n//дёә shiju и°ғз”Ёж–№жі•\nshiju.PrintName()\n\
    shiju.PrintDetails()\n```\n\nдҪ еә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\nAlex John\n[Date of Birth: 1970-01-10\
    \ 00:00:00 +0000 UTC, Email: alex@email.com, Location: New York ]\nAdmin Roles:\n\
    Manage Team\nManage Tasks\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00\
    \ +0000 UTC, Email: shiju@email.com, Location: Kochi ]\nSkills:\nGo\nDocker\n\
    Kubernetes\n```\n"
- fmt: "# Working with Interfaces\n\nIn GoвҖҷs type system, you can create concrete\
    \ types and interface types. (Concrete types were discussed in previous sections\
    \ of this chapter.) The interface is one of the greatest features of the Go language\
    \ because it provides contracts to user-defined concrete types, which allows you\
    \ to define behaviors for your objects. LetвҖҷs create an interface type to specify\
    \ the behavior for `Person` objects (see Listing [3-15](#A978-1-4842-1052-9_3_Chapter.html#FPar16)).\n\
    \n**Listing 3-15.** Defining the Interface Type\n\n```go\ntype User interface\
    \ {\n    PrintName()\n    PrintDetails()\n}\n```\n\nAn interface type named `User`\
    \ was defined with two behaviors: `PrintName` and `PrintDetails`. LetвҖҷs have a\
    \ look at the `Person` type:\n\n```go\ntype Person struct {\n    FirstName, LastName\
    \ string\n    Dob                 time.Time\n    Email, Location     string\n\
    }\n\n//A person method\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s\
    \ %s\\n\", p.FirstName, p.LastName)\n}\n\n//A person method\nfunc (p Person) PrintDetails()\
    \ {\n    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(),\
    \ p.Email, p.Location)\n}\n```\n\nThe most surprising thing about interface is\
    \ that you donвҖҷt need to explicitly implement it into concrete types; instead,\
    \ just define the methods in the concrete types based on the interface type specification.\
    \ The `Person` type has already implemented the `User` interface into the `Person`\
    \ type. The `Person` type has implemented the `PrintName` and `PrintDetails` methods,\
    \ which were defined in the user interface type. In programming languages such\
    \ as C# and Java, you must explicitly implement the interface type into concrete\
    \ types. Go provides lot of productivity while keeping itself as a static type\
    \ language.\n\n**Listing [3-16](#A978-1-4842-1052-9_3_Chapter.html#FPar17)** shows\
    \ a sample program that describes interface and its concrete types:\n\n**Listing\
    \ 3-16.** Example Program with Interface\n\n```go\npackage main\n\nimport (\n\
    \    \"fmt\"\n    \"time\"\n)\n\ntype User interface {\n    PrintName()\n    PrintDetails()\n\
    }\n\ntype Person struct {\n    FirstName, LastName string\n    Dob           \
    \      time.Time\n    Email, Location     string\n}\n\n//A person method\nfunc\
    \ (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName, p.LastName)\n\
    }\n\n//A person method\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"[Date\
    \ of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n\
    }\n\nfunc main() {\n    alex := Person{\n        \"Alex\",\n        \"John\",\n\
    \        time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n        \"\
    alex@email.com\",\n        \"New York\",\n    }\n\n    shiju := Person{\n    \
