    ## DefaultServeMux


    In the example programs in this chapter, the `ServeMux` object was created by
    calling the function `http.NewServeMux. DefaultServeMux` is same as the `ServeMux`
    objects from the previous programs. `DefaultServeMux` is the default `ServeMux`
    used by the `Serve` method, and the `ServeMux` object is instantiated when the
    `http` package is used.


