    The RESTful API is a JSON-based API in which the client applications need to send
    data in JSON format, and the server sends the responses in JSON as well. To work
    with JSON API standards ( [`http://jsonapi.org`](http://jsonapi.org/) ), resource
    models are defined for sending and receiving data in formatted JSON. `"data"`
    is defined as the root element for all JSON representations.


    Listing [9-15](#A978-1-4842-1052-9_9_Chapter.html#FPar16) shows the resource models
    to be used with the `Users` resource.


