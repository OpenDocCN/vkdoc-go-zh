    \nжё…еҚ• 7-3 жҳҜдёҖдёӘиә«д»ҪйӘҢиҜҒдёӯй—ҙд»¶пјҢеҸҜд»Ҙз”ЁдәҺиЈ…йҘ°еӨҡдёӘеә”з”ЁзЁӢеәҸеӨ„зҗҶеҷЁд»Ҙжү§иЎҢжҺҲжқғгҖӮ\n\n**жё…еҚ• 7-3.** з”ЁдәҺйӘҢиҜҒ JWT д»ӨзүҢзҡ„иә«д»ҪйӘҢиҜҒдёӯй—ҙд»¶\n\
    \n```\nfunc authMiddleware(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)\
    \ {\n    // йӘҢиҜҒд»ӨзүҢ\n    token, err := jwt.ParseFromRequest(r, func(token *jwt.Token)\
    \ (interface{}, error) {\n        return verifyKey, nil\n    })\n\n    if(err==nil\
    \ && token.Valid) {\n        next(w,r)\n    } else {\n        w.WriteHeader(http.StatusUnauthorized)\n\
    \        fmt.Fprint(w, \"иә«д»ҪйӘҢиҜҒеӨұиҙҘ\")\n    }\n}\n```\n\nеҰӮжһңд»ӨзүҢжңүж•ҲпјҢеҲҷдјҡи°ғз”Ёдёӯй—ҙд»¶ж Ҳдёӯзҡ„дёӢдёҖдёӘеӨ„зҗҶеҷЁгҖӮ\n\
    \nд»ҘдёӢжҳҜе°Ҷиә«д»ҪйӘҢиҜҒдёӯй—ҙд»¶иЈ…йҘ°еҲ°еҸ—дҝқжҠӨиө„жәҗзҡ„еә”з”ЁеӨ„зҗҶеҷЁзҡ„д»Јз Ғеқ—пјҡ\n\n```\nr.HandleFunc(\"/login\", loginHandler).Methods(\"\
    POST\")\nr.Handle(\"/admin\", negroni.New(\n                negroni.HandlerFunc(authMiddleware),\n\
    \                negroni.Wrap(http.HandlerFunc(adminHandler)),\n        ))\n```\n\
    \nиҝҷйҮҢдҪҝз”ЁдәҶз”ЁдәҺдёӯй—ҙд»¶ж Ҳзҡ„ `Negroni` еҢ…гҖӮеҜ№дәҺеҸ—дҝқжҠӨзҡ„иө„жәҗ `\"/admin\"`пјҢ`authMiddleware` дёӯй—ҙд»¶еӨ„зҗҶеҷЁиў«иЈ…йҘ°еҲ°дәҶ\
