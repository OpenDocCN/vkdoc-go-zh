    \    }\n    return buf.String()\n}\n\n// Reverse еҸҚиҪ¬еӯ—з¬ҰдёІеҸӮж•°\nfunc Reverse(s string)\
    \ string {\n    r := []rune(s)\n    for i, j := 0, len(r)-1; i < len(r)/2; i,\
    \ j = i+1, j-1 {\n        r[i], r[j] = r[j], r[i]\n    }\n    return string(r)\n\
    }\n```\n\nиҝҷйҮҢжңүдёӨдёӘеҮҪж•°йңҖиҰҒжөӢиҜ•пјҡ`SwapCase` е’Ң `Reverse`гҖӮ`SwapCase` еҮҪж•°иҪ¬жҚўеӯ—з¬ҰдёІеҸӮж•°зҡ„еӨ§е°ҸеҶҷпјӣ`Reverse`\
    \ еҮҪж•°еҸҚиҪ¬еӯ—з¬ҰдёІеҸӮж•°гҖӮ\n\nи®©жҲ‘д»¬зј–еҶҷжөӢиҜ• `SwapCase` е’Ң `Reverse` еҮҪж•°зҡ„жөӢиҜ•з”ЁдҫӢгҖӮ\n\nеҲ—иЎЁ [10-2] еңЁжәҗж–Үд»¶ `utils_test.go`\
