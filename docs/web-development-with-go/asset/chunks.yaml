    \      Handler: r,\n\n    }\n\n    log.Println(\"Listening...\")\n\n    server.ListenAndServe()\n\
    \n}\n```\n\nиЎЁ 4-1 еұ•зӨәдәҶдёҺеӨҚз”ЁеҷЁдёҖиө·дҪҝз”Ёзҡ„й…ҚзҪ®гҖӮеҰӮжһң URI е’Ң HTTP ж–№жі•дёҺйў„е®ҡд№үзҡ„й…ҚзҪ®еҲ—иЎЁеҢ№й…ҚпјҢеӨҚз”ЁеҷЁе°Ҷи°ғз”Ёзӣёеә”зҡ„еӨ„зҗҶеҮҪж•°гҖӮ\n\n\
    **иЎЁ 4-1.** еӨҚз”ЁеҷЁй…ҚзҪ®\n\n| URI | HTTP ж–№жі• | еӨ„зҗҶеҮҪж•° |\n| --- | --- | --- |\n| `/api/notes`\
    \ | `Get` | `GetNoteHandler` |\n| `/api/notes` | `Post` | `PostNoteHandler` |\n\
    | `/api/notes/{id}` | `Put` | `PutNoteHandler` |\n| `/api/notes/{id}` | `Delete`\
    \ | `DeleteNoteHandler` |\n\n### з”ЁдәҺ CRUD ж“ҚдҪңзҡ„еӨ„зҗҶеҮҪж•°\n\nи®©жҲ‘д»¬зңӢзңӢз”ЁдәҺ `HTTP Get` иҺ·еҸ– `Note`\
    \ иө„жәҗеҖјзҡ„еӨ„зҗҶеҮҪж•°пјҡ\n\n```go\n//HTTP Get - /api/notes\n\nfunc GetNoteHandler(w http.ResponseWriter,\
