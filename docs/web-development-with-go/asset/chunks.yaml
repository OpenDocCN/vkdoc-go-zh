    An interface, which adds extensibility and maintainability to your programs, is
    a contract that lets you write programs depending on abstractions instead of concrete
    implementations. In the example program, the `Users` field was defined with a
    slice of the user interface type so that you can provide objects of any type to
    provide the implementations of the contract defined in the user interface. If
    you define a slice of the `Member` type as the type for the `Users` property,
    you would be limited to providing `Member` type objects as the value for the `Users`
    field.


    ## Concurrency


    When larger applications are developed, multiple tasks might be needed to complete
    program execution. Other programs are composed of many smaller subprograms. When
    you develop these kinds of applications, you can achieve performance improvements
    if you can execute these tasks and subprograms concurrently. LetвҖҷs say you are
    developing a web-based, back-end API in which many concurrent users are accessing
    the API. If you can concurrently execute these concurrent web requests on the
    web server, you can dramatically improve the performance and efficiency of the
    system.


    When you develop web applications and web APIs, managing a large set of concurrent
    users is really a challenge. Go is designed to solve the challenges of modern
    programming and larger systems. It provides support for concurrency at the core
    language level and implements concurrency directly into its language and runtime.
    This helps you easily build high-performance systems.


    Many programming environments provide concurrency support with the help of an
    extra library, but not as a built-in feature of the core language. Concurrency
    is one of the major selling points of the Go language, along with its simplicity
    and pragmatism. In Go, concurrency is implemented by using two unique features:
    goroutines and channels.'
