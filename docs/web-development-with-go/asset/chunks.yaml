    \nдёҺе…¶д»– Web зј–зЁӢз”ҹжҖҒзі»з»ҹдёҚеҗҢпјҢGo дёӯ Web ејҖеҸ‘зҡ„жғҜз”Ёж–№ејҸжҳҜдҪҝз”Ёж ҮеҮҶеә“еҢ…пјҢе№¶еңЁйңҖиҰҒж—¶дҪҝз”Ёз¬¬дёүж–№еҢ…жқҘжү©еұ•зҺ°жңүеҠҹиғҪзҡ„иғҪеҠӣгҖӮеңЁйҖүжӢ©з¬¬дёүж–№еҢ…ж—¶пјҢйҖүжӢ©йӮЈдәӣдёҺж ҮеҮҶеә“еҢ…е…је®№зҡ„йқһеёёйҮҚиҰҒгҖӮ`mux`еҢ…жҳҜиҝҷз§Қж–№жі•зҡ„дёҖдёӘеҫҲеҘҪзҡ„дҫӢеӯҗпјҢе®ғдёҺ`http`еҢ…е…је®№пјҢеӣ дёәе®ғжҸҗдҫӣдәҶ`http.Handler`жҺҘеҸЈгҖӮ\n\
    \n# жһ„е»ә RESTful API\n\nжң¬з« и®Ёи®әдәҶ Go дёӯ Web ејҖеҸ‘зҡ„еҹәзЎҖзҹҘиҜҶпјҢеҢ…жӢ¬з”ЁдәҺеӨ„зҗҶе’ҢжҸҗдҫӣ HTTP иҜ·жұӮзҡ„`http.ServeMux`е’Ң`http.Handler`гҖӮдҪ иҝҳеӯҰд№ дәҶз¬¬дёүж–№еҢ…`mux`пјҢе®ғеҸҜд»ҘдҪңдёә`http.ServeMux`зҡ„жӣҝд»Је“ҒпјҢе№¶дё”дёҺ`http`еҢ…е…је®№гҖӮзҺ°еңЁпјҢи®©жҲ‘д»¬дҪҝз”Ё`mux`еҢ…дҪңдёәиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁжқҘжһ„е»әдёҖдёӘз®ҖеҚ•зҡ„еҹәдәҺ\
    \ JSON зҡ„ REST APIпјҢиҝҷе°Ҷеё®еҠ©дҪ зҗҶи§ЈеңЁ Go дёӯжһ„е»ә Web зі»з»ҹзҡ„и®ёеӨҡе®һйҷ…еҒҡжі•пјҲеҸӮи§Ғжё…еҚ• 4-15пјүгҖӮ\n\n> **жіЁж„Ҹ**\n> иЎЁиҝ°жҖ§зҠ¶жҖҒиҪ¬з§»пјҲRESTпјүпјҡеҰӮжһңдҪ жғідәҶи§ЈжӣҙеӨҡе…ідәҺ\
    \ REST зҡ„зҹҘиҜҶпјҢжҲ‘жҺЁиҚҗдҪ йҳ…иҜ» Martin Fowler зҡ„ж–Үз« гҖҠRichardson жҲҗзҶҹеәҰжЁЎеһӢпјҡиҝҲеҗ‘ REST иҚЈиҖҖзҡ„жӯҘйӘӨгҖӢгҖӮи®ҝй—®ең°еқҖпјҡ[`http://martinfowler.com/articles/richardsonMaturityModel.html`](http://martinfowler.com/articles/richardsonMaturityModel.html)\n\
    \n**жё…еҚ• 4-15. еҹәдәҺ JSON зҡ„ RESTful API**\n\n```\npackage main\n\nimport (\n    \"\
    encoding/json\"\n    \"log\"\n    \"net/http\"\n    \"strconv\"\n    \"time\"\n\
    \    \"github.com/gorilla/mux\"\n)\n\ntype Note struct {\n     Title       string\
    \    `json:\"title\"`\n     Description string    `json:\"description\"`\n   \
    \  CreatedOn   time.Time `json:\"createdon\"`\n}\n\n//Store for the Notes collection\n\
    var noteStore = make(map[string]Note)\n\n//Variable to generate key for the collection\n\
    var id int = 0\n\n//HTTP Post - /api/notes\nfunc PostNoteHandler(w http.ResponseWriter,\
    \ r *http.Request) {\n    var note Note\n    // Decode the incoming Note json\n\
    \    err := json.NewDecoder(r.Body).Decode(&note)\n    if err != nil {\n     \
    \   panic(err)\n    }\n    note.CreatedOn = time.Now()\n    id++\n    k := strconv.Itoa(id)\n\
    \    noteStore[k] = note\n    j, err := json.Marshal(note)\n    if err != nil\
    \ {\n        panic(err)\n    }\n    w.Header().Set(\"Content-Type\", \"application/json\"\
