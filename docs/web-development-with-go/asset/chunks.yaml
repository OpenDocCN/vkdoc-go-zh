    \    \"unicode\"\n)\n```\n\nеңЁжӯӨеҲ—иЎЁдёӯпјҢеҜје…ҘдәҶ `bytes`гҖҒ`fmt` е’Ң `unicode` еҢ…гҖӮеңЁ Go дёӯеҜје…ҘеӨҡдёӘеҢ…зҡ„жғҜз”Ёж–№ејҸжҳҜе°Ҷ\
    \ `import` иҜӯеҸҘеҶҷеңЁдёҖдёӘ `import` еқ—дёӯпјҢеҰӮиҝҷйҮҢжүҖзӨәгҖӮ\n\nеҪ“еҜје…ҘдёҖдёӘеҢ…ж—¶пјҢGo зј–иҜ‘еҷЁдјҡе…Ҳжҗңзҙў `GOROOT` зӣ®еҪ•пјҢеҰӮжһңеңЁиҜҘзӣ®еҪ•дёӯжүҫдёҚеҲ°еҢ…пјҢеҲҷеҶҚжҹҘжүҫ\
