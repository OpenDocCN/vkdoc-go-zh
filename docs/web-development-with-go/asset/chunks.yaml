    дә‘и®Ўз®—жҳҜдёҖз§ҚвҖңжҢүйңҖд»ҳиҙ№вҖқзҡ„и®Ўз®—жЁЎеһӢпјҢе…¶дёӯ IT еҹәзЎҖи®ҫж–Ҫе’ҢиҪҜд»¶ејҖеҸ‘е№іеҸ°д»ҘеҹәдәҺжңҚеҠЎзҡ„дҪҝз”ЁжЁЎејҸжҸҗдҫӣгҖӮдә‘и®Ўз®—жңҖеӨ§зҡ„дјҳеҠҝеңЁдәҺејҖеҸ‘еә”з”ЁзЁӢеәҸж—¶иҺ·еҫ—зҡ„ж“ҚдҪңж•ҸжҚ·жҖ§гҖӮдә‘жЁЎеһӢж”ҜжҢҒжҢүйңҖжү©еұ•пјҢиҝҷж„Ҹе‘ізқҖжӮЁеҸҜд»ҘеңЁйңҖиҰҒж—¶еўһеҠ и®Ўз®—иө„жәҗпјҢе№¶ж №жҚ®йңҖиҰҒдҪҝз”Ёд»»ж„Ҹж—¶й•ҝпјҢз„¶еҗҺеңЁдёҚеҶҚйңҖиҰҒж—¶зј©еҮҸи®Ўз®—иө„жәҗгҖӮеӨ§еӨҡж•°дә‘и®Ўз®—е№іеҸ°йғҪдёәе…¶дә‘е№іеҸ°жҸҗдҫӣиҮӘеҠЁжү©еұ•еҠҹиғҪпјҢе…Ғи®ёжӮЁж №жҚ®й…ҚзҪ®иҮӘеҠЁжү©еұ•е’Ңзј©еҮҸи®Ўз®—иө„жәҗзҡ„ж•°йҮҸгҖӮ


    еңЁдә‘и®Ўз®—дёӯпјҢжңүеӨҡз§ҚйҖүйЎ№еҸҜз”ЁдәҺжүҳз®Ўе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮиҝҷдәӣйҖүйЎ№жҸҗдҫӣдәҶдёҚеҗҢзҡ„зҒөжҙ»жҖ§жЁЎеһӢжқҘжүҳз®ЎгҖҒиҝҗиЎҢе’Ңжү©еұ•жӮЁзҡ„еә”з”ЁзЁӢеәҸпјҢеҸҜз”ЁдәҺйҖӮеҪ“зҡ„и®Ўз®—еңәжҷҜгҖӮ


    д»ҘдёӢжҳҜдә‘и®Ўз®—е№іеҸ°дёӯеҸҜз”ЁдәҺжүҳз®Ўе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸзҡ„дёҚеҗҢйҖүйЎ№пјҡ


    *   еҹәзЎҖи®ҫж–ҪеҚіжңҚеҠЎпјҲ`IaaS`пјү

    *   е№іеҸ°еҚіжңҚеҠЎпјҲ`PaaS`пјү

    *   е®№еҷЁеҚіжңҚеҠЎпјҲ`CaaS`пјү


    ### еҹәзЎҖи®ҫж–ҪеҚіжңҚеҠЎпјҲ`IaaS`пјү


    еҹәзЎҖи®ҫж–ҪеҚіжңҚеҠЎпјҲ`IaaS`пјүжЁЎеһӢйҖҡиҝҮдә’иҒ”зҪ‘д»ҘжңҚеҠЎеҪўејҸжҸҗдҫӣиҷҡжӢҹеҢ–зҡ„и®Ўз®—иө„жәҗгҖӮжӮЁеҸҜд»Ҙд»Һдә‘е№іеҸ°иҺ·еҸ–иҷҡжӢҹжңәпјҲ`VM`пјүд»Ҙе®һзҺ°жҢүйңҖжү©еұ•гҖӮеңЁжӯӨжЁЎеһӢдёӯпјҢжӮЁеҝ…йЎ»еңЁиҮӘе·ұзҡ„зҺҜеўғдёӯи®ҫзҪ®еҘҪдёҖеҲҮжқҘжүҳз®Ўе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮдҫӢеҰӮпјҢеҰӮжһңиҰҒеңЁ
    Go дёӯиҝҗиЎҢдёҖдёӘ `HTTP` жңҚеҠЎеҷЁпјҢжӮЁеҝ…йЎ»жүӢеҠЁи®ҫзҪ® Go иҝҗиЎҢж—¶зҺҜеўғпјҢе№¶жү“ејҖ `HTTP` з«ҜеҸЈд»ҘжҺҘж”¶дј е…Ҙзҡ„зҪ‘з»ңиҜ·жұӮгҖӮе…ідәҺ `IaaS` жЁЎеһӢжңҖйҮҚиҰҒзҡ„жҳҜпјҢжӮЁеҸҜд»Ҙе®Ңе…ЁжҺ§еҲ¶еңЁдә‘дёҠиҺ·еҸ–зҡ„иҷҡжӢҹжңәгҖӮ


    ### е№іеҸ°еҚіжңҚеҠЎпјҲ`PaaS`пјү


    е№іеҸ°еҚіжңҚеҠЎпјҲ`PaaS`пјүжЁЎеһӢжҸҗдҫӣдёҖдёӘз”ұдә‘е№іеҸ°дҫӣеә”е•Ҷз®ЎзҗҶзҡ„е№іеҸ°пјҢз”ЁдәҺйғЁзҪІе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮжӯӨжЁЎеһӢжҸҗдҫӣдәҶдё“й—Ёзҡ„иҜӯиЁҖзҺҜеўғгҖҒе·Ҙе…·е’ҢиҪҜд»¶ејҖеҸ‘е·Ҙе…·еҢ…пјҲ`SDK`пјүпјҢд»ҘдҫҝеңЁдә‘дёҠејҖеҸ‘е’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮ`PaaS`
    жЁЎеһӢжҜ” `IaaS` жЁЎеһӢжҸҗдҫӣдәҶжӣҙй«ҳзҡ„ж“ҚдҪңж•ҸжҚ·жҖ§пјҢеӣ дёәе®ғжҳҜдёҖз§Қз”ұдә‘е№іеҸ°жҸҗдҫӣзҡ„жүҳз®ЎжңҚеҠЎпјҢжӮЁеҸҜд»ҘдҪҝз”Ёе№іеҸ°жҸҗдҫӣзҡ„ `SDK` е’Ңе·Ҙе…·жқҘејҖеҸ‘гҖҒжөӢиҜ•гҖҒйғЁзҪІе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮ


    дҫӢеҰӮпјҢеҰӮжһңжӮЁжғіеҲ©з”Ё Google Cloud жҸҗдҫӣзҡ„ `PaaS` е№іеҸ°жқҘејҖеҸ‘ Go еә”з”ЁзЁӢеәҸпјҢеҸҜд»ҘдёӢиҪҪз”ЁдәҺ Go зҡ„ Google Cloud `PaaS`
    е№іеҸ° `SDK`пјҢе®ғе…Ғи®ёжӮЁеңЁ Google Cloud дёҠеҝ«йҖҹжһ„е»әгҖҒжөӢиҜ•е’ҢиҝҗиЎҢ Go еә”з”ЁзЁӢеәҸгҖӮдҪҝз”ЁжӯӨдә‘и®Ўз®—жЁЎеһӢпјҢж— йңҖжүӢеҠЁе№Ійў„еҚіеҸҜиҪ»жқҫе®һзҺ°иҮӘеҠЁжү©еұ•гҖӮжӮЁеҸҜиғҪеҸӘйңҖиҰҒй…ҚзҪ®е…ій”®з»©ж•ҲжҢҮж ҮпјҲ`KPI`пјүзҡ„еҸӮж•°еҚіеҸҜжү§иЎҢиҮӘеҠЁжү©еұ•гҖӮеңЁжӯӨжЁЎеһӢдёӯпјҢжӮЁж— йңҖеғҸ
    `IaaS` жЁЎеһӢйӮЈж ·з®ЎзҗҶе’Ңз»ҙжҠӨиҷҡжӢҹжңәгҖӮжӯӨжЁЎеһӢеңЁејҖеҸ‘иҝҮзЁӢдёӯе®һзҺ°дәҶеҚ“и¶Ҡзҡ„ж“ҚдҪңж•ҸжҚ·жҖ§пјҢеӣ дёәејҖеҸ‘иҖ…д»Һи®ёеӨҡ IT еҹәзЎҖи®ҫж–Ҫз®ЎзҗҶж“ҚдҪңдёӯи§Јж”ҫеҮәжқҘгҖӮ


    ### е®№еҷЁеҚіжңҚеҠЎпјҲ`CaaS`пјү


    е®№еҷЁеҚіжңҚеҠЎпјҲ`CaaS`пјүжҳҜдёҖз§Қд»Һ `IaaS` е’Ң `PaaS` жј”еҸҳиҖҢжқҘзҡ„и®Ўз®—жЁЎеһӢгҖӮиҝҷжҳҜдёҖдёӘзӣёеҜ№иҫғж–°зҡ„жЁЎеһӢпјҢдёәжӮЁеёҰжқҘдәҶ `IaaS` е’Ң `PaaS`
    зҡ„жңҖдҪізү№жҖ§гҖӮжӯӨжЁЎеһӢе…Ғи®ёжӮЁйҖҡиҝҮдҪҝз”ЁиҜёеҰӮ `Docker` е’Ң `Kubernetes` зӯүжөҒиЎҢзҡ„е®№еҷЁжҠҖжңҜпјҢеңЁдә‘е№іеҸ°дёҠиҝҗиЎҢиҪҜд»¶е®№еҷЁгҖӮз”ұдәҺе…¶иҜёеӨҡдјҳеҠҝпјҢеә”з”Ёе®№еҷЁжӯЈйҖҗжёҗжҲҗдёәйғЁзҪІе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸзҡ„ж ҮеҮҶгҖӮеҪ“жӮЁеңЁдә‘е№іеҸ°дёҠиҝҗиЎҢеә”з”Ёе®№еҷЁж—¶пјҢжӯӨжЁЎеһӢжҸҗдҫӣдәҶи®ёеӨҡиғҪеҠӣгҖӮGoogle
    Container Engine жҳҜ Google Cloud жҸҗдҫӣзҡ„дёҖдёӘ `CaaS` е№іеҸ°гҖӮ


    ## Google Cloud з®Җд»Ӣ


    Google Cloud жҳҜ Google жҸҗдҫӣзҡ„дёҖдёӘе…¬жңүдә‘е№іеҸ°пјҢдҪҝејҖеҸ‘иҖ…иғҪеӨҹеңЁ Google й«ҳеәҰеҸҜжү©еұ•дё”еҸҜйқ зҡ„еҹәзЎҖи®ҫж–ҪдёҠжһ„е»әгҖҒжөӢиҜ•гҖҒйғЁзҪІе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸгҖӮGoogle
    Cloud е№іеҸ°жҸҗдҫӣдәҶдёҖеҘ—жЁЎеқ—еҢ–зҡ„еҹәдәҺдә‘зҡ„жңҚеҠЎпјҢе…Ғи®ёжӮЁжһ„е»әд»Һ Web еә”з”ЁзЁӢеәҸеҲ°еӨ§еһӢеӨ§ж•°жҚ®и§ЈеҶіж–№жЎҲзҡ„еҗ„з§Қеә”з”ЁзЁӢеәҸпјҢе…·жңүжҢүйңҖжү©еұ•иғҪеҠӣе’Ңжӣҙй«ҳж°ҙе№ізҡ„ж“ҚдҪңж•ҸжҚ·жҖ§гҖӮ


    Google Cloud жҸҗдҫӣдәҶдёүз§Қзұ»еһӢзҡ„и®Ўз®—жңҚеҠЎпјҡ


    *   Google App EngineпјҲ`GAE`пјүжҳҜдёҖйЎ№ `PaaS` жңҚеҠЎгҖӮ

    *   Google Compute EngineпјҲ`GCE`пјүжҳҜдёҖйЎ№ `IaaS` жңҚеҠЎгҖӮ

    *   Google Container EngineпјҲ`GKE`пјүжҳҜдёҖйЎ№ `CaaS` жңҚеҠЎгҖӮ


    еӣҫ 11-1 еұ•зӨәдәҶ Google Cloud е№іеҸ°жҸҗдҫӣзҡ„еҗ„з§ҚжңҚеҠЎзҡ„дҝЎжҒҜеӣҫгҖӮ


    ![A978-1-4842-1052-9_11_Fig1_HTML.jpg](img/A978-1-4842-1052-9_11_Fig1_HTML.jpg)


    еӣҫ 11-1. Google Cloud е№іеҸ°жңҚеҠЎдҝЎжҒҜеӣҫ


    жң¬з« дё»иҰҒе…іжіЁ Google Cloud е№іеҸ°дёӯдҪңдёә `PaaS` зҡ„ Google App EngineгҖӮ


    ## Google App EngineпјҲ`GAE`пјү


    Google App Engine жҳҜ Google Cloud е№іеҸ°жҸҗдҫӣзҡ„ `PaaS` дә§е“ҒпјҢе…Ғи®ёжӮЁжһ„е»әй«ҳеәҰеҸҜжү©еұ•зҡ„ Web еә”з”ЁзЁӢеәҸе’ҢеҗҺз«Ҝ `API`гҖӮApp
    Engine еә”з”ЁзЁӢеәҸж”ҜжҢҒиҮӘеҠЁжү©еұ•пјҢеҸҜд»ҘеңЁжөҒйҮҸжҝҖеўһж—¶иҮӘеҠЁеўһеҠ и®Ўз®—е®һдҫӢпјҢе№¶еңЁдёҚеҶҚйңҖиҰҒж—¶иҮӘеҠЁзј©еҮҸи®Ўз®—е®һдҫӢгҖӮдёҺ `IaaS` дёҚеҗҢпјҢжӮЁж— йңҖйҖҡиҝҮиҝҗз»ҙпјҲ`Ops`пјүеӣўйҳҹжқҘй…ҚзҪ®е’Ңз»ҙжҠӨиҷҡжӢҹжңәгҖӮдҪҝз”Ё
    App EngineпјҢжӮЁеҸӘйңҖдҪҝз”Ё App Engine жҸҗдҫӣзҡ„е·Ҙе…·дёҠдј жәҗд»Јз ҒпјҢз„¶еҗҺеңЁдә‘дёҠиҝҗиЎҢеә”з”ЁзЁӢеәҸпјҢеҚіеҸҜиҺ·еҫ—иҙҹиҪҪеқҮиЎЎе’ҢиҮӘеҠЁжү©еұ•иғҪеҠӣгҖӮдёҺ `IaaS` жЁЎеһӢзӣёжҜ”пјҢApp
    Engine дёәејҖеҸ‘е’Ңз®ЎзҗҶеә”з”ЁзЁӢеәҸжҸҗдҫӣдәҶжһҒеӨ§зҡ„ж“ҚдҪңж•ҸжҚ·жҖ§пјҢеӣ дёәжӮЁж— йңҖиҠұиҙ№ж—¶й—ҙз®ЎзҗҶз”ЁдәҺиҝҗиЎҢеә”з”ЁзЁӢеәҸзҡ„иҷҡжӢҹжңәгҖӮ


    App Engine ж”ҜжҢҒд»ҘдёӢиҜӯиЁҖзҺҜеўғпјҡ


    *   `Python`

    *   `Java`

    *   `PHP`

    *   `Go`


    ### App Engine зҡ„дә‘жңҚеҠЎ


    еҪ“жӮЁеңЁ App Engine дёҠејҖеҸ‘ Go еә”з”ЁзЁӢеәҸж—¶пјҢеҸҜд»ҘеҲ©з”Ё Google Cloud е№іеҸ°жҸҗдҫӣзҡ„еҗ„з§Қдә‘жңҚеҠЎгҖӮGoogle Cloud жҸҗдҫӣдәҶз”ЁдәҺд»Һ App
    Engine еә”з”ЁзЁӢеәҸи®ҝй—®иҝҷдәӣжңҚеҠЎзҡ„ `API`гҖӮиҜ·и®°дҪҸпјҢиҝҷдәӣжңҚеҠЎдёҚд»…йҷҗдәҺ App EngineпјӣжӮЁд№ҹеҸҜд»Ҙе°Ҷе®ғд»¬дёҺ Google Compute Engine
    е’Ң Google Container Engine дёҖиө·дҪҝз”ЁгҖӮ


    д»ҘдёӢйғЁеҲҶжҸҸиҝ°дәҶдёҖдәӣеҸҜз”ЁдәҺ App Engine еә”з”ЁзЁӢеәҸзҡ„дә‘жңҚеҠЎгҖӮ


    #### з”ЁжҲ·иә«д»ҪйӘҢиҜҒ


    жӮЁеҸҜд»ҘдҪҝз”Ёз”ЁжҲ·иә«д»ҪйӘҢиҜҒжңҚеҠЎпјҢи®©з”ЁжҲ·йҖҡиҝҮ Google еёҗжҲ·жҲ– `OpenID` зҷ»еҪ•гҖӮ


    #### Cloud Datastore


    `Cloud Datastore` жҳҜдёҖдёӘж— жЁЎејҸзҡ„ `NoSQL` ж•°жҚ®еә“пјҢеҸҜз”ЁдәҺжҢҒд№…еҢ– App Engine еә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®гҖӮ


    #### Cloud Bigtable


    `Cloud Bigtable` жҳҜдёҖдёӘеҝ«йҖҹгҖҒе®Ңе…Ёжүҳз®ЎгҖҒеӨ§и§„жЁЎеҸҜжү©еұ•зҡ„ `NoSQL` ж•°жҚ®еә“пјҢйқһеёёйҖӮеҗҲз”ЁдәҺеӨ„зҗҶеӨ§йҮҸж•°жҚ®зҡ„еӨ§и§„жЁЎ WebгҖҒз§»еҠЁгҖҒеӨ§ж•°жҚ®е’Ңзү©иҒ”зҪ‘еә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®еӯҳеӮЁгҖӮеҰӮжһң
    App Engine еә”з”ЁзЁӢеәҸйңҖиҰҒдёҖдёӘй«ҳжҖ§иғҪзҡ„еӨ§и§„жЁЎеҸҜжү©еұ•ж•°жҚ®еӯҳеӮЁпјҢ`Cloud Bigtable` жҜ” `Cloud Datastore` жҳҜжӣҙеҘҪзҡ„йҖүжӢ©гҖӮ


    #### Google Cloud SQL


    `Google Cloud SQL` жҳҜ Google Cloud е№іеҸ°дёӯдёҖдёӘе…је®№ `MySQL` зҡ„е…ізі»еһӢж•°жҚ®еә“пјҢдҪңдёәжүҳз®ЎжңҚеҠЎжҸҗдҫӣгҖӮеҰӮжһң App Engine
    еә”з”ЁзЁӢеәҸйңҖиҰҒе…ізі»жЁЎеһӢжқҘиҝӣиЎҢж•°жҚ®жҢҒд№…еҢ–пјҢжӮЁеҸҜд»ҘдҪҝз”Ё `Google Cloud SQL`гҖӮ


    #### Memcache


    еңЁејҖеҸ‘й«ҳжҖ§иғҪеә”з”ЁзЁӢеәҸж—¶пјҢзј“еӯҳеә”з”ЁзЁӢеәҸж•°жҚ®жҳҜжҸҗй«ҳеә”з”ЁзЁӢеәҸжҖ§иғҪзҡ„йҮҚиҰҒзӯ–з•ҘгҖӮ`Memcache` жҳҜдёҖдёӘеҲҶеёғејҸзҡ„еҶ…еӯҳж•°жҚ®зј“еӯҳпјҢеҸҜз”ЁдәҺзј“еӯҳеә”з”ЁзЁӢеәҸж•°жҚ®пјҢд»ҘжҸҗй«ҳ App
    Engine еә”з”ЁзЁӢеәҸзҡ„жҖ§иғҪгҖӮ


    #### жҗңзҙў


    жҗңзҙўжңҚеҠЎе…Ғи®ёжӮЁеҜ№з»“жһ„еҢ–ж•°жҚ®пјҲдҫӢеҰӮзәҜж–Үжң¬гҖҒ`HTML`гҖҒ`Atom` ж‘ҳиҰҒгҖҒж•°еӯ—гҖҒж—Ҙжңҹе’Ңең°зҗҶдҪҚзҪ®пјүжү§иЎҢзұ»дјј Google зҡ„жҗңзҙўгҖӮ


    #### жөҒйҮҸеҲҶй…Қ


    жөҒйҮҸеҲҶй…ҚжңҚеҠЎе…Ғи®ёжӮЁе°Ҷдј е…ҘиҜ·жұӮи·Ҝз”ұеҲ°дёҚеҗҢзҡ„еә”з”ЁзЁӢеәҸзүҲжң¬пјҢиҝҗиЎҢ `A/B` жөӢиҜ•пјҢе№¶иҝӣиЎҢеўһйҮҸзү№жҖ§еҸ‘еёғгҖӮ

