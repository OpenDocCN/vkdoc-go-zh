    ```\nx := [5]int{10, 20, 30, 40, 50}\n```\n\nдҪ д№ҹеҸҜд»ҘдҪҝз”ЁеӨҡиЎҢиҜӯеҸҘжқҘеҲқе§ӢеҢ–ж•°з»„пјҲи§Ғжё…еҚ• 2-13пјүгҖӮ\n\n**жё…еҚ•\
    \ 2-13.** дҪҝз”ЁеӨҡиЎҢиҜӯеҸҘеЈ°жҳҺж•°з»„\n\n```\nx := [5]int{\n  10,\n  20,\n  30,\n  40,\n  50,\n\
    }\n```\n\nжіЁж„ҸпјҢеҚідҪҝеңЁжңҖеҗҺдёҖдёӘе…ғзҙ еҗҺйқўд№ҹж·»еҠ дәҶдёҖдёӘйҖ—еҸ·пјҢеӣ дёәиҝҷжҳҜ Go иҜӯиЁҖзҡ„иҰҒжұӮгҖӮиҝҷж ·еҒҡдҫҝдәҺдҪҝз”ЁпјҢдҫӢеҰӮеҸҜд»ҘиҪ»жқҫең°з§»йҷӨеҲқе§ӢеҢ–еқ—дёӯзҡ„дёҖдёӘе…ғзҙ жҲ–е°Ҷе…¶жіЁйҮҠжҺүпјҢиҖҢж— йңҖз§»йҷӨжіЁйҮҠгҖӮ\n\
    \nеҪ“дҪ дҪҝз”Ёж•°з»„еӯ—йқўйҮҸеЈ°жҳҺж•°з»„ж—¶пјҢеҸҜд»ҘдҪҝз”Ё `...` жқҘжӣҝд»ЈжҢҮе®ҡй•ҝеәҰгҖӮGo зј–иҜ‘еҷЁеҸҜд»Ҙж №жҚ®дҪ еңЁж•°з»„еЈ°жҳҺдёӯжҢҮе®ҡзҡ„е…ғзҙ иҜҶеҲ«ж•°з»„зҡ„й•ҝеәҰгҖӮ\n\nжё…еҚ• 2-14\
