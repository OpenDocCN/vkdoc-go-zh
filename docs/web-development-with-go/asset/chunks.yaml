    /tasks/{id}\", controllers.UpdateTask).Methods(\"PUT\")\n    taskRouter.HandleFunc(\"\
    /tasks\", controllers.GetTasks).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/{id}\", controllers.GetTaskById).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/users/{id}\", controllers.GetTasksByUser).Methods(\"GET\")\n    taskRouter.HandleFunc(\"\
    /tasks/{id}\", controllers.DeleteTask).Methods(\"DELETE\")\n    router.PathPrefix(\"\
