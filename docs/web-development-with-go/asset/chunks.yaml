    description\"`\n    }\n)\n```\n\nThe implementation of the `Users` and `Tasks`\
    \ resources is complete. You can implement the API operations for the `\"/notes\"\
    ` resource as you did for `\"/tasks\"`.\n\n> **Note**  \n> The source code of\
    \ the completed version of the TaskManager application is available at `github.com/shijuvar/go-web/tree/master/taskmanager`.\n\
    \n---\n\n## Go Dependencies Using `godep`\n\nIn previous sections, you completed\
    \ the RESTful API application named TaskManager that uses a few third-party packages.\
    \ Now letвҖҷs focus on managing the dependencies of the application to reduce external\
    \ build dependencies for productivity when building the application.\n\nWhen you\
    \ work on Go applications using many third-party packages, the dependency management\
    \ is always a painful experience. Most software development teams work with version\
    \ control systems to manage and distribute their source code. A proper dependency\
    \ management tool is an essential component for speeding up the development process\
    \ and build process.\n\nMany technology stacks such as Ruby and Node.js provide\
    \ a package management system with better dependency management. Those environments\
    \ provide a centralized repository system to get external packages, so it is extremely\
    \ easy to provide a dependency management system for those technology stacks.\
    \ Go doesnвҖҷt provide a centralized system for its package ecosystem, which is\
    \ designed for simplicity like most of the Go features. This has some limitations\
    \ for managing external dependencies while enabling simplicity for exposing and\
    \ using third-party packages. By default, Go doesnвҖҷt provide any mechanism for\
    \ managing external dependencies.\n\nThe `godep` tool helps you build packages\
    \ reproducibly by fixing their dependencies. This tool ensures a better experience\
    \ for doing repeatable builds.\n\n### Installing the `godep` Tool\n\nTo install\
    \ the `godep` tool, run the following command:\n\n`go get github.com/tools/godep`\n\
    \n### Using `godep` with TaskManager\n\nLetвҖҷs use `godep` with the RESTful API\
    \ application to manage external dependencies. Run the following command:\n\n\
    `godep save -r`\n\nThe `save` command saves a list of the applicationвҖҷs dependencies\
    \ to the file `Godeps.json` inside the `Godeps` directory. The `Godeps.json` file\
    \ contains the JSON representation of the applicationвҖҷs dependencies and the Go\
    \ version. It also copies the source code of the dependencies into the `Godeps/_workspace`\
    \ directory, reflecting the structure of `GOPATH`.\n\nFigure [9-18](#A978-1-4842-1052-9_9_Chapter.html#Fig18)\
    \ illustrates the structure created by the `godep save` command to manage the\
    \ applicationвҖҷs dependencies.\n\n![A978-1-4842-1052-9_9_Fig18_HTML.jpg](A978-1-4842-1052-9_9_Fig18_HTML.jpg)\n\
    \nFigure 9-18. `Godeps` directory structure\n\nListing [9-22](#A978-1-4842-1052-9_9_Chapter.html#FPar24)\
    \ shows the `Godeps.json` file.\n\n**Listing 9-22.**  `Godeps.json` File for the\
    \ TaskManager Application\n\n```json\n{\n    \"ImportPath\": \"github.com/shijuvar/go-web/taskmanager\"\
    ,\n    \"GoVersion\": \"go1.5.1\",\n    \"Deps\": [\n        {\n            \"\
    ImportPath\": \"github.com/codegangsta/negroni\",\n            \"Comment\": \"\
    v0.1-70-gc7477ad\",\n            \"Rev\": \"c7477ad8e330bef55bf1ebe300cf8aa67c492d1b\"\
    \n        },\n        {\n            \"ImportPath\": \"github.com/dgrijalva/jwt-go\"\
    ,\n            \"Comment\": \"v2.2.0-23-g5ca8014\",\n            \"Rev\": \"5ca80149b9d3f8b863af0e2bb6742e608603bd99\"\
    \n        },\n        {\n            \"ImportPath\": \"github.com/gorilla/context\"\
    ,\n            \"Rev\": \"215affda49addc4c8ef7e2534915df2c8c35c6cd\"\n       \
    \ },\n        {\n            \"ImportPath\": \"github.com/gorilla/mux\",\n   \
    \         \"Rev\": \"8a875a034c69b940914d83ea03d3f1299b4d094b\"\n        },\n\
    \        {\n            \"ImportPath\": \"golang.org/x/crypto/bcrypt\",\n    \
    \        \"Rev\": \"02a186af8b62cb007f392270669b91be5527d39c\"\n        },\n \
    \       {\n            \"ImportPath\": \"golang.org/x/crypto/blowfish\",\n   \
    \         \"Rev\": \"02a186af8b62cb007f392270669b91be5527d39c\"\n        },\n\
    \        {\n            \"ImportPath\": \"gopkg.in/mgo.v2\",\n            \"Comment\"\
    : \"r2015.10.05-1-g4d04138\",\n            \"Rev\": \"4d04138ffef2791c479c0c8bbffc30b34081b8d9\"\
    \n        }\n    ]\n}\n```\n\nYou can run the `godep save` command any time you\
    \ want to update the newly imported packages.\n\n### Restoring an ApplicationвҖҷs\
    \ Dependencies\n\nTo restore an applicationвҖҷs dependencies on a target machine,\
    \ run the following command:\n\n`godep restore`\n\nThe `godep restore` command\
    \ installs the package versions specified in `Godeps/Godeps.json` to the `$GOPATH`,\
    \ which modifies the state of the packages in the `GOPATH` location.\n\n---\n\n\
    ## Deploying HTTP Servers with Docker\n\nYou have completed the TaskManager application\
    \ and provided dependency management infrastructure using the `godep` tool. It\
    \ is time to provide the deployment infrastructure for running the RESTful API\
    \ application onto production servers. You can deploy HTTP servers with on-premise\
    \ servers and Cloud computing environments. (In [Chapter 11](#A978-1-4842-1052-9_11_Chapter.html),\
    \ you will learn how to deploy Go servers with Google Cloud Platform.)\n\nLinux\
    \ containers ([`https://linuxcontainers.org/`](https://linuxcontainers.org/))\
    \ are gradually becoming a preferred approach for deploying and running applications\
    \ regardless of on-premise servers and Cloud computing platforms. Docker is a\
    \ technology that revolutionized the concept of using Linux containers for building,\
    \ shipping, and running applications in a Linux container. You can use Docker\
    \ for running applications in both on-premise servers and Cloud computing infrastructures.\n\
    \nIn this section, a `Dockerfile` will be written for the TaskManager application\
    \ to be used with Docker to deploy the application onto both on-premise servers\
    \ and Cloud environments. A `Dockerfile` is a text document that is used to build\
    \ and run applications with Docker. Before writing the `Dockerfile`, letвҖҷs briefly\
    \ discuss Docker.\n\n### Introduction to Docker"
