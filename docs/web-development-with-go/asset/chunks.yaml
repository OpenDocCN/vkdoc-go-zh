- fmt: "#### Initializing Configuration Values\n\nConfiguration values are put in\
    \ a file named `config.json`, which stores values such as host URIs of the HTTP\
    \ server and MongoDB server, authentication credentials to connect MongoDB, and\
    \ so on. This helps you avoid using hard-coded strings in an application. The\
    \ `config.json` file is read and decodes the JSON values into a variable `AppConfig`.\
    \ Configuration values are read from this package variable to start the HTTP server\
    \ and connect to the MongoDB database.\n\nListing [9-6](#A978-1-4842-1052-9_9_Chapter.html#FPar7)\
    \ decodes the JSON string from `config.json` and puts the values into `AppConfig`.\n\
    \n**Listing 9-6.**  Initializing `AppConfig` in `utils.go`\n\n```go\npackage common\n\
    \nimport (\n        \"encoding/json\"\n        \"log\"\n        \"os\"\n)\n\n\
    type configuration struct {\n        Server, MongoDBHost, DBUser, DBPwd, Database\
    \ string\n}\n\n// AppConfig holds the configuration values from config.json file\n\
    var AppConfig configuration\n\n// Initialize AppConfig\nfunc initConfig() {\n\
    \        loadAppConfig()\n}\n\n// Reads config.json and decode into AppConfig\n\
    func loadAppConfig() {\n        file, err := os.Open(\"common/config.json\")\n\
    \        defer file.Close()\n        if err != nil {\n                log.Fatalf(\"\
    [loadConfig]: %s\\n\", err)\n        }\n\n        decoder := json.NewDecoder(file)\n\
    \        AppConfig = configuration{}\n        err = decoder.Decode(&AppConfig)\n\
    \        if err != nil {\n                log.Fatalf(\"[loadAppConfig]: %s\\n\"\
    , err)\n        }\n}\n```\n\n#### Loading Private/Public RSA Keys\n\nRSA keys\
    \ are loaded into two variables for representing private and public keys, which\
    \ are used for the authorization infrastructure of the application. The private/public\
    \ keys are used to generate JWT and verify the token in HTTP requests to authorize\
    \ access to protected resources of the application. The private/public keys are\
    \ loaded into two variables before the HTTP server starts so they can be used\
    \ for a login handler and for authorizing HTTP requests in authorization middleware.\n\
    \nThe command-line tool `OpenSSL` is used to generate the keys. To generate the\
    \ private key, run the following command on the command-line window:\n\n```\n\
    openssl genrsa -out app.rsa 1024\n```\n\nThis command generates a 1024-bit key\
    \ named `app.rsa`. To generate a counterpart public key for the private key, run\
    \ the following command on the command-line window:\n\n```\nopenssl rsa -in app.rsa\
    \ -pubout > app.rsa.pub\n```\n\nThis code generates a counterpart public key named\
    \ `app.rsa.pub`. The RSA keys are stored in the directory `keys`.\n\nListing [9-7](#A978-1-4842-1052-9_9_Chapter.html#FPar8)\
    \ loads the private/public RSA keys from the `keys` folder and stores them into\
    \ two variables.\n\n**Listing 9-7.**  Initializing Private/Public Keys in `auth.go`\n\
    \n```go\npackage common\n\nimport (\n        \"io/ioutil\"\n)\n\n// using asymmetric\
    \ crypto/RSA keys\nconst (\n    // openssl genrsa -out app.rsa 1024\n    privKeyPath\
    \ = \"keys/app.rsa\"\n    // openssl rsa -in app.rsa -pubout > app.rsa.pub\n \
    \   pubKeyPath  = \"keys/app.rsa.pub\"\n)\n\n// private key for signing and public\
    \ key for verification\nvar (\n    verifyKey, signKey []byte\n)\n\n// Read the\
    \ key files before starting http handlers\nfunc initKeys() {\n        var err\
    \ error\n        signKey, err = ioutil.ReadFile(privKeyPath)\n        if err !=\
    \ nil {\n                log.Fatalf(\"[initKeys]: %s\\n\", err)\n        }\n\n\
    \        verifyKey, err = ioutil.ReadFile(pubKeyPath)\n        if err != nil {\n\
    \                log.Fatalf(\"[initKeys]: %s\\n\", err)\n                panic(err)\n\
    \        }\n}\n```\n\nThe private key is used for signing the JWT; the public\
    \ key verifies the JWT in HTTP requests to access the resources of the RESTful\
    \ API. You can use the `OpenSSL` tool to generate the RSA keys.\n\n#### Creating\
    \ a MongoDB Session Object\n\nA MongoDB `Session` object is created before the\
    \ HTTP server starts. The `createDbSession` function in `mongoUtils.go` creates\
    \ a `mgo.Session` object by calling the `DialWithInfo` function of the `mgo` package.\
    \ The `DialWithInfo` function establishes a new `Session` to the cluster of MongoDB\
    \ servers provided by the instance of `DialInfo` type. The URI of MongoDB is read\
    \ from the `AppConfig` variable. The `Session` object will be accessed through\
    \ the `GetSession` function. Whenever CRUD operations are performed, the `GetSession`\
    \ function is called, and the `Session` object is copied using the `Copy` method\
    \ of `mgo.Session`. A copied `Session` object will be used for all CRUD operations.\n\
    \nListing [9-8](#A978-1-4842-1052-9_9_Chapter.html#FPar9) provides the implementation\
    \ of `createDbSession` and `GetSession` to use with the `Session` object.\n\n\
    **Listing 9-8.**  MongoDB Session in `mongoUtils.go`\n\n```go\npackage common\n\
    \nimport (\n    \"gopkg.in/mgo.v2\"\n)\n\nvar session *mgo.Session\n\nfunc GetSession()\
    \ *mgo.Session {\n        if session == nil {\n                var err error\n\
    \                session, err = mgo.DialWithInfo(&mgo.DialInfo{\n            \
    \            Addrs:    []string{AppConfig.MongoDBHost},\n                    \
    \    Username: AppConfig.DBUser,\n                        Password: AppConfig.DBPwd,\n\
    \                        Timeout:  60 * time.Second,\n                })\n   \
    \             if err != nil {\n                        log.Fatalf(\"[GetSession]:\
    \ %s\\n\", err)\n                }\n        }\n        return session\n}\n\nfunc\
    \ createDbSession() {\n        var err error\n        session, err = mgo.DialWithInfo(&mgo.DialInfo{\n\
    \                Addrs:    []string{AppConfig.MongoDBHost},\n                Username:\
    \ AppConfig.DBUser,\n                Password: AppConfig.DBPwd,\n            \
    \    Timeout:  60 * time.Second,\n        })\n        if err != nil {\n      \
    \          log.Fatalf(\"[createDbSession]: %s\\n\", err)\n        }\n}\n```\n\n\
    #### Adding Indexes into MongoDB\n\nIndexes provide improved performance for executing\
    \ queries in MongoDB. Because the `User` collection is frequently queried with\
    \ the `email` field, the `Task` collection with the `createdby` field, and the\
    \ `TaskNote` collection with the `taskid` field, indexes are added for these fields.\
    \ The `addIndexes` function adds indexes into MongoDB collections.\n\nListing\
    \ [9-9](#A978-1-4842-1052-9_9_Chapter.html#FPar10) adds indexes into MongoDB.\n\
    \n**Listing 9-9.**  Adding Indexes in MongoDB in `mongoUtils.go`\n\n```go\n//\
    \ Add indexes into MongoDB\nfunc addIndexes() {\n    var err error\n    userIndex\
