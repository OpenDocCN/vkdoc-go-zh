    ### Goпјҡеҫ®жңҚеҠЎжһ¶жһ„зҡ„дјҹеӨ§жҠҖжңҜж Ҳ


    иҪҜд»¶ејҖеҸ‘е®һи·өдёҚж–ӯжј”иҝӣпјҢд»Ҙеә”еҜ№ж–°зҡ„жҢ‘жҲҳгҖӮдҪңдёәдёҖз§Қзј–зЁӢиҜӯиЁҖпјҢGo жҳҜи§ЈеҶіеҪ“д»Ҡжһ„е»әеӨ§еһӢеә”з”Ёйҡҫйўҳзҡ„дјҳз§ҖиҢғдҫӢгҖӮиҪҜд»¶жһ¶жһ„еҗҢж ·еңЁжј”иҝӣгҖӮеҫ®жңҚеҠЎжһ¶жһ„жҳҜиҪҜд»¶жһ¶жһ„йўҶеҹҹжңҖзғӯй—Ёзҡ„жҰӮеҝөпјҢе®ғжҳҜжһ„е»әеӨ§еһӢеҲҶеёғејҸеә”з”Ёзҡ„иҪҜд»¶ејҖеҸ‘ж–№ејҸзҡ„дёҖж¬Ўж №жң¬жҖ§иҪ¬еҸҳгҖӮ


    иҝҮеҺ»пјҢи®ёеӨҡеә”з”ЁйҮҮз”ЁеҚ•дҪ“жһ¶жһ„жЁЎејҸпјҢеҚіеә”з”Ёзҡ„жүҖжңүз»„д»¶пјҲеҢ…жӢ¬иЎЁзӨәеұӮз»„д»¶гҖҒдёҡеҠЎйҖ»иҫ‘гҖҒж•°жҚ®еә“и®ҝй—®йҖ»иҫ‘е’Ңеә”з”ЁйӣҶжҲҗйҖ»иҫ‘пјүйғҪиў«жү“еҢ…жҲҗдёҖдёӘеҸҜйғЁзҪІеҚ•е…ғгҖӮйҡҸзқҖиҝҷдәӣеә”з”Ёзҡ„иҢғеӣҙе’ҢеҠҹиғҪдёҚж–ӯжј”иҝӣпјҢе®ғд»¬йҖҡиҝҮж·»еҠ ж–°еҠҹиғҪе’ҢиҪҜд»¶з»„д»¶пјҢе§Ӣз»ҲдҪңдёәдёҖдёӘеҚ•дёҖеә”з”ЁеҚ•е…ғиҝӣиЎҢз»ҙжҠӨгҖӮз”ұдәҺе°ҶжүҖжңүеҶ…е®№дҪңдёәдёҖдёӘеҸҜйғЁзҪІеҚ•е…ғиҝӣиЎҢз»ҙжҠӨзҡ„еӨҚжқӮжҖ§пјҢжү©еұ•е’Ңз»ҙжҠӨеҚ•дҪ“еә”з”Ёе§Ӣз»ҲжҳҜдёҖдёӘе·ЁеӨ§зҡ„жҢ‘жҲҳгҖӮеҫ®жңҚеҠЎжһ¶жһ„жҳҜдёҖз§Қжӣҝд»ЈжҖ§зҡ„жһ¶жһ„жЁЎејҸпјҢе®ғи§ЈеҶідәҶеҚ•дҪ“жһ¶жһ„зҡ„еұҖйҷҗжҖ§е’ҢжҢ‘жҲҳгҖӮ


    еҫ®жңҚеҠЎжһ¶жһ„жҳҜиҪҜд»¶ејҖеҸ‘зҡ„дёҖз§ҚиҢғејҸиҪ¬еҸҳпјҢе…¶ж ёеҝғжҳҜжһ„е»әеҸҜзӢ¬з«ӢйғЁзҪІзҡ„еҚ•дёӘиҪҜд»¶жЁЎеқ—гҖӮдёҺејҖеҸ‘еӨ§еһӢеҚ•дҪ“еә”з”ЁдёҚеҗҢпјҢеҫ®жңҚеҠЎжһ¶жһ„е»әи®®жһ„е»әжқҫж•ЈиҖҰеҗҲгҖҒе°ҸеһӢзҡ„иҪҜд»¶жңҚеҠЎпјҢиҝҷдәӣжңҚеҠЎеҸҜд»ҘзӢ¬з«ӢдәҺе…¶д»–жңҚеҠЎиҝӣиЎҢйғЁзҪІгҖӮдёҺеҚ•дҪ“жһ¶жһ„дёҚеҗҢпјҢеҫ®жңҚеҠЎжһ¶жһ„дёӯзҡ„жҜҸдёӘжңҚеҠЎйғҪжҳҜзӢ¬з«ӢејҖеҸ‘дёҺйғЁзҪІзҡ„пјҢеӣ жӯӨдҪ еҸҜд»ҘиҪ»жқҫең°жү©еұ•ејҖеҸ‘е’ҢйғЁзҪІгҖӮдҪ з”ҡиҮіеҸҜд»ҘдҪҝз”ЁдёҚеҗҢзҡ„жҠҖжңҜж ҲжқҘејҖеҸ‘еҚ•дёӘжңҚеҠЎпјҢеӣ дёәе®ғд»¬зӢ¬з«ӢдәҺе…¶д»–жңҚеҠЎиҝӣиЎҢйғЁзҪІе’Ңжӣҙж–°гҖӮ


    #### еҫ®жңҚеҠЎжһ¶жһ„дёӯзҡ„ RESTful жңҚеҠЎ


    еңЁеҫ®жңҚеҠЎжһ¶жһ„дёӯпјҢејҖеҸ‘зҡ„жҳҜжқҫж•ЈиҖҰеҗҲзҡ„иҪҜд»¶жңҚеҠЎпјҢйҖҡиҝҮз»„еҗҲиҝҷдәӣжңҚеҠЎжқҘжһ„е»әеә”з”ЁгҖӮеңЁиҝҷз§Қжһ¶жһ„ж–№жі•дёӯпјҢжҜҸдёӘеҫ®жңҚеҠЎйғҪйңҖиҰҒдёҺе…¶д»–еҫ®жңҚеҠЎйҖҡдҝЎпјӣRESTful API еҸҜз”ЁдәҺиҝҷдәӣеҫ®жңҚеҠЎд№Ӣй—ҙзҡ„йҖҡдҝЎгҖӮRESTful
    API жҳҜеҫ®жңҚеҠЎжһ¶жһ„дёӯйқһеёёйҮҚиҰҒзҡ„з»„д»¶гҖӮ


    Go жҳҜдҪҝз”Ёеҫ®жңҚеҠЎжЁЎејҸжһ„е»әеә”з”Ёзҡ„з»қдҪіжҠҖжңҜж ҲпјҢе…¶и®ҫи®ЎзҗҶеҝөдёҺеҫ®жңҚеҠЎжһ¶жһ„жЁЎејҸзӣёеҫ—зӣҠеҪ°гҖӮGo зј–зЁӢзҡ„жғҜз”Ёж–№жі•жҳҜејҖеҸ‘е°ҸеһӢзҡ„иҪҜд»¶з»„д»¶дҪңдёәеҢ…пјҲpackagesпјүпјҢз„¶еҗҺйҖҡиҝҮз»„еҗҲиҝҷдәӣеҢ…жқҘжһ„е»әеә”з”ЁгҖӮ


    ### жһ„е»ә RESTful API


    и®©жҲ‘д»¬еҲ©з”Ёд»ҺеүҚеҮ з« иҺ·еҫ—зҡ„зҹҘиҜҶпјҢжһ„е»әдёҖдёӘз®ҖеҚ•зҡ„ RESTful API еә”з”ЁгҖӮиҝҷдёӘ RESTful API еә”з”Ёдёәжһ„е»әдёҖдёӘз®ҖеҚ•зҡ„вҖңTaskManagerвҖқеә”з”ЁжҸҗдҫӣеҗҺз«Ҝж”ҜжҢҒпјҢиҜҘеә”з”ЁеҸҜз”ЁдәҺз®ЎзҗҶд»»еҠЎпјҢе№¶жҸҗдҫӣжҜҸдёӘд»»еҠЎзҡ„жӣҙж–°е’ҢеӨҮжіЁгҖӮиҜҘеә”з”Ёзҡ„ж•°жҚ®е°ҶжҢҒд№…еҢ–еҲ°
    MongoDB ж•°жҚ®еә“дёӯгҖӮиҝҷдёӘ TaskManager RESTful API е°ҶжҳҜдёҖдёӘеҹәдәҺ JSON зҡ„ APIпјҢдҪҝз”Ё JSON ж•°жҚ®ж јејҸеңЁе®ўжҲ·з«Ҝеә”з”Ёе’Ң
    RESTful API жңҚеҠЎеҷЁд№Ӣй—ҙеҸ‘йҖҒе’ҢжҺҘж”¶ж¶ҲжҒҜгҖӮ


    #### з¬¬дёүж–№еҢ…


    жһ„е»ә TaskManager еә”з”Ёе°ҶдҪҝз”Ёд»ҘдёӢз¬¬дёүж–№еҢ…пјҡ


    - `gopkg.in/mgo.v2`пјҡ`mgo` еҢ…дёә Go иҜӯиЁҖжҸҗдҫӣдәҶдёҖдёӘ MongoDB й©ұеҠЁгҖӮ

    - `gopkg.in/mgo.v2/bson`пјҡ`mgo` зҡ„еӯҗеҢ…пјҢдёә Go иҜӯиЁҖжҸҗдҫӣдәҶ BSON и§„иҢғзҡ„е®һзҺ°гҖӮ

