    #### Creating a New Entity


    The `Save` application handler creates a new `Task` object and persists the values
    into Datastore with an entity named `"tasks"`. The `NewContext` function of the
    `appengine` package is called, which returns a context for an in-flight HTTP request.
    You have to provide a context object to working with Datastore.


    The `datastore.Put` function is used to create a new entity into Datastore by
    providing a struct instance and a key to the entityвҖҷs key name. The `Task` struct
    type instance is provided to save it to Datastore.


    There are multiple options for providing a key name. For example, the key name
    can be provided by passing a non-empty string ID to the `datastore.NewKey` function,
    as shown here:


    `c := appengine.NewContext(r)`


    `key := datastore.NewKey(c, "tasks", "taskgae", 0, nil)`


    `_, err := datastore.Put(c, key, &task)`


    You can also provide an empty key name or use the `datastore.NewIncompleteKey`
    function to pass a new incomplete key. The `NewIncompleteKey` function creates
    a new incomplete key. The Datastore automatically generates a unique numeric ID
    for the entity key.


    In the example program, the incomplete key is used to insert records into the
    `"tasks"` entity:


    `c := appengine.NewContext(r)`


    `key := datastore.NewIncompleteKey(c, "tasks", nil)`


    `_, err := datastore.Put(c, key, &task)`


    The `datastore.Put` function returns a `datastore.` `PendingKey` that can be resolved
    into a `datastore.Key` value by using the return value from a successful transaction
    commit. If the key is an incomplete key, the returned `PendingKey` resolves to
    a unique key generated by the data store. `PendingKey` represents the key for
    a newly inserted entity. It can be resolved into `datastore.Key` by calling the
    `Key` method of `Commit`.


    You can also use the `datastore.Put` function to update an existing entity. When
    you update an existing entity, modify the fields of the struct and then call the
    `datastore.Put` function to update the values. It overwrites the existing entity.


    #### Querying the Datastore


    The Go Datastore API provides Go idioms to query data against the Datastore. It
    provides a `datastore.Query` type for preparing and executing queries to retrieve
    entities from the App Engine Datastore. The `NewQuery` function prepares a query
    object:


    `q := datastore.NewQuery("tasks").`


    `Order("-CreatedOn")`


    A Datastore query includes the following:


    *   An entity ([entity kind](https://cloud.google.com/appengine/docs/go/datastore/entities#Go_Kinds_and_identifiers))
    to which the query applies

