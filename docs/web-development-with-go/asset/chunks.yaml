  raw: '#### Buffered Channels


    An unbuffered channel provides a synchronous way of data communication among goroutines
    that ensures guaranteed message delivery. A buffered channel is different from
    this approach. Unlike an unbuffered channel, it is created by specifying the number
    of values it can contain. Buffered channels accept the specified number of values
    before they are received.


    Listing [3-24](#A978-1-4842-1052-9_3_Chapter.html#FPar26) is a basic example program
    that demonstrates a buffered channel.


    Listing 3-24.В В Example Program with a Buffered Channel


    `package main`


    `import "fmt"`


    `func main() {`


    В В В В В В В В `messages := make(chan string, 2)`


    В В В В В В В В `messages <- "Golang"`


    В В В В В В В В `messages <- "Gopher"`


    В В В В В В В В `//Recieve value from buffered channel`


    В В В В В В В В `fmt.Println(<-messages)`


    В В В В В В В В `fmt.Println(<-messages)`


    `}`


    You should see the following output:


    `Golang`


    `Gopher`


    Listing [3-24](#A978-1-4842-1052-9_3_Chapter.html#FPar26) is a simple example
    program that demonstrates a buffer channel without having any goroutines. It creates
    a `messages` channel for buffering up to two string values. Values are sent into
    the channel until its capacity of two. Because this channel is buffered, values
    can be sent without depending on a receiver receiving them. If you try to add
    more values than its capacity, you will get an error. Once the values are sent
    into the buffered channel, they can be received from the channel.


    ## Summary


    GoвҖҷs type system has two fundamental types: concrete types and interface types.
    You can create concrete types by using built-in types such as `bool`, `int`, `string`,
    and `float64`. You can also create composite types such as arrays, slices, maps
    and channels, and your own user-defined types.


    Structs are used to create user-defined types in Go. Structs are analogous to
    classes in classical object-oriented languages, but the struct design is unique
    when compared with other languages. A struct is a lightweight version of a class.
    GoвҖҷs type system does not support inheritance. Instead, you can compose your types
    using type embedding.


    The interface type is a powerful feature; it enables you to provide lots of extensibility
    and composability when you build software systems. Interface provides contracts
    to user-defined concrete types. In Go, you donвҖҷt need to explicitly implement
    interfaces into concreate types; you can implement interfaces into concrete types
    by simply providing the implementation of methods into your concrete types based
    on the definition of methods defined in the interface type.


    Concurrency in Go is the capability to run functions concurrently with other functions.
    Concurrency is a built-in feature of the Go language, and the Go runtime manages
    the execution of concurrent functions using a scheduler. Concurrency in Go is
    implemented with two features: goroutines and channels. A goroutine is a function
    that can run concurrently with other functions, working as an independent unit.
    Channels are used to synchronize goroutines to send and receive messages. In Go,
    you can create two type of channels: buffered channels and unbuffered channels.
    Unbuffered channels block receivers of goroutines until the data is available
    on a channel and block senders of goroutines until a receiver is available. Buffered
    channels block a sender only when the buffer is filled to capacity.


    In [Chapters 2](#A978-1-4842-1052-9_2_Chapter.html) and [3](#A978-1-4842-1052-9_3_Chapter.html),
    you learned the basics of the Go programming language. From [Chapter 4](#A978-1-4842-1052-9_4_Chapter.html)
    onward, you will learn about web programming in Go and how to develop web applications
    and RESTful services.


    # 4.В Getting Started with Web Development


    The previous three chapters discussed the fundamentals of the Go programming language
    and the Go ecosystem. Because the primary focus of this book is to explore web
    development in Go, the rest of the chapters will explore web development in Go
    with a practical perspective.


    Go is a great technology stack for building scalable, web-based, back-end systems
    for mobile and web applications, although it might not be the best choice for
    building traditional web applications in which all kind of processing and rendering
    of view templates execute on the server side. This doesnвҖҷt mean that Go is not
    good for developing traditional web applications, but it is an ideal choice for
    building back-end systems for SPAs and mobile applications in which you can use
    Go to build APIs on the server side. In the era of mobile APIs, RESTful APIs are
    becoming the backbone of modern applications, and server-side web development
    is moving toward REST APIs. Go is great environment choice for building these
    kind of APIs for powering as a back end for web and mobile applications. In the
    past, I used C# and Node.js for building back-end APIs for mobile apps, but now
    I highly recommend Go for developing web APIs.


    This chapter takes a look at the fundamentals of building web applications in
    Go. For a web developer, the Go standard library provides everything for developing
    web systems. By simply leveraging the standard library, you can build highly scalable
    web applications and web APIs in Go.


    ## net/http Package


    When you think about building web applications and web APIs, or simply building
    HTTP servers in Go, the most important package is `net/http,` which comes from
    the Go standard library and provides all essential functionalities necessary for
    developing full-fledged web applications. The design philosophy of Go is to develop
    bigger programs by composing small pieces of components. The `net/http` package
    provides a greater level of composability and extensibility so you can easily
    replace or extend functionalities of the standard library with your own package
    or a third-party package. In other programming environments such as Ruby, you
    use a full-fledged web application framework such as Rails to develop web applications.
    In Go, you can find many full-fledged web application frameworks such as Beego,
    Revel, and Martini. But the idiomatic way of developing web applications in Go
    is to leverage standard library packages as the fundamental pieces of the programming
    block, along with other libraries (not frameworks) that are compatible with the
    `http` package. For web development, `net/http` and `html/template` are the major
    packages provided by the standard library. By simply using these two packages,
    you can build fully functional web applications without leveraging any third-party
    packages.


    Note


    You should start web development with standard library packages before diving
    into third-party packages and frameworks so that you understand GoвҖҷs web development
    ecosystem. If you start web development with third-party packages and frameworks,
    you will miss many core fundamentals because these frameworks provide lots of
    spoon-feeding kinds of functionalities and syntactic sugars.


    The `http` package provides implementations for HTTP clients and servers, including
    various structs and functions for client and server implementations. Various functionalities
    of the `http` package will be explored throughout this chapter.'
