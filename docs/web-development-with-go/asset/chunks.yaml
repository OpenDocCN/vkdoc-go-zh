  raw: 'In another scenario, some test cases may require a dependency to resources
    such as a configuration file or an environment variable that should be provided
    for running those tests. If these resources are not available during the execution
    of those tests, you can simply skip those tests instead of letting them fail.
    The `testing` package provides a `Skip` method of `testing.T` type that allows
    you to skip test cases.


    Listing [10-5](#A978-1-4842-1052-9_10_Chapter.html#FPar5) provides a test case
    in `utils_test.go` to illustrate skipping test cases.


    Listing 10-5.В В Skipping Test Cases


    `func TestLongRun(t *testing.T) {`


    `// Checks whether the short flag is provided`


    `if testing.Short() {`


    `t.Skip("Skipping test in short mode")`


    `}`


    `// Long running implementation goes here`


    `time.Sleep(5 * time.Second)`


    `}`


    Within the `TestLongRun` function, you see whether the `short` flag is provided
    by calling `testing.Short()`. If the short flag is provided, call the Skip method
    to skip the test case. Otherwise, the test case executes normally. When the test
    function `TestLongRun` executes normally, the execution is delayed by 5 seconds
    for the sake of the demonstration.


    LetвҖҷs run the tests without providing the `short` flag:


    `go test вҖ“v вҖ“cover`


    You should see output something like this:


    `=== RUNВ В В TestSwapCase`


