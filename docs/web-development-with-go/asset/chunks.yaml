    \n\t\"github.com/markbates/goth\"\n\t\"github.com/markbates/goth/gothic\"\n\t\"\
    github.com/markbates/goth/providers/facebook\"\n\t\"github.com/markbates/goth/providers/twitter\"\
    \n)\n\n//Struct for parsing JSON configuration\ntype Configuration struct {\n\t\
    TwitterKey     string\n\tTwitterSecret  string\n\tFacebookKey    string\n\tFacebookSecret\
    \ string\n}\n\nvar config Configuration\n\n//Read configuration values from config.json\n\
    func init() {\n\tfile, _ := os.Open(\"config.json\")\n\tdecoder := json.NewDecoder(file)\n\
    \tconfig = Configuration{}\n\terr := decoder.Decode(&config)\n\tif err != nil\
    \ {\n\t\tlog.Fatal(err)\n\t}\n}\n\nfunc callbackAuthHandler(res http.ResponseWriter,\
    \ req *http.Request) {\n\tuser, err := gothic.CompleteUserAuth(res, req)\n\tif\
    \ err != nil {\n\t\tfmt.Fprintln(res, err)\n\t\treturn\n\t}\n\tt, _ := template.New(\"\
    userinfo\").Parse(userTemplate)\n\tt.Execute(res, user)\n}\n\nfunc indexHandler(res\
    \ http.ResponseWriter, req *http.Request) {\n\tt, _ := template.New(\"index\"\
    ).Parse(indexTemplate)\n\tt.Execute(res, nil)\n}\n\nfunc main() {\n\t//Register\
    \ providers with Goth\n\tgoth.UseProviders(\n\t\ttwitter.New(config.TwitterKey,\
    \ config.TwitterSecret, \"http://localhost:8080/auth/twitter/callback\"),\n\t\t\
    facebook.New(config.FacebookKey, config.FacebookSecret, \"http://localhost:8080/auth/facebook/callback\"\
