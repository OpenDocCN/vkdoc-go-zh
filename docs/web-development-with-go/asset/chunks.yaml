  raw: '#### Sending JWT to the Server


    When users successfully log in to the system, they provide a JWT as the access
    token to authorize the subsequent HTTP requests to the API server. So whenever
    HTTP requests are sent to access protected resources, the JWT must be provided
    in the HTTP request to get authorization to the API server. Once the login process
    is successfully completed, the returned token string can be put into any kind
    of client storage to be easily accessed whenever HTTP requests are sent to access
    the resources of the RESTful API.


    In front-end web applications, you can use HTML5 Web Storage (`localStorage/sessionStorage`)
    or web cookies to persist the JWT. But you should consider the security aspects
    when you put JWT into various kinds of client application storage.


    When you send HTTP requests to access RESTful API resources, you must provide
    a bearer token in the HTTP request header `"Authorization"`.


    Here is the format for sending a JWT string with the `"Authorization"` header:


    `"Authorization": "Bearer token_stringвҖқ`


    Here is an example that provides a JWT as a bearer token with the `"Authorization"`
    header:


    `"Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWV9.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ"`


    #### Authorizing JWT


    The `Authorize` middleware handler function authorizes HTTP requests, which validate
    whether the HTTP request has a valid JWT in the `"Authorization"` header as a
    bearer token. The `ParseFromRequest` helper function of the `go-jwt` package is
    used to verify the token with a public key. In this application, one private key
    is used to sign the tokens, so its public counterpart is also used to verify the
    token:


    `token, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{}, error)
    {`


    В В В В В `return verifyKey, nil`


    `})`


    If the request has a valid token, the middleware function calls the next handler
    in the middleware stack. If the token is invalid, the `DisplayAppError` helper
    function is called to display HTTP errors in JSON format. When the `DisplayAppError`
    function is called, the error value is provided a custom message for the error
    and an HTTP status code. The HTTP status code 401 represents the HTTP status `"Unauthorized"`:


    `if token.Valid {`


    В В В В В В В В `next(w, r)`


    В В В В `} else {`


    В В В В В В В В `w.WriteHeader(http.StatusUnauthorized)`


    В В В В В В В В `DisplayAppError(`


    В В В В В В В В В В В В `w,`


    В В В В В В В В В В В В `err,`


    В В В В В В В В В В В В `"Invalid Access Token",`


    В В В В В В В В В В В В `401,`


    В В В В В В В В `)`


    В В `}`


    When `next(w,r)` is called, it calls the next handler function. The `Negroni`
    package is called for the middleware stack and uses the signature `func (http.ResponseWriter,
    *http.Request, http.HandlerFunc) to write middleware handler functions` to be
    used with `Negroni`. All HTTP requests to the URL `"/tasks"` and `"/notes"` paths
    must be authorized with a valid access token. So the middleware function `Authorize`
    is added into the `Negroni` middleware stack.


    Here is the code block in `task.go` of the `routers` package to add authentication
    middleware function to the `"/tasks"` path:


    `func SetTaskRoutes(router *mux.Router) *mux.Router {`


    В В В В `taskRouter := mux.NewRouter()`


    В В В В `taskRouter.HandleFunc("/tasks", controllers.CreateTask).Methods("POST")`


    В В В В `taskRouter.HandleFunc("/tasks/{id}", controllers.UpdateTask).Methods("PUT")`


    В В В В `taskRouter.HandleFunc("/tasks", controllers.GetTasks).Methods("GET")`


    В В В В `taskRouter.HandleFunc("/tasks/{id}", controllers.GetTaskById).Methods("GET")`


    В В В В `taskRouter.HandleFunc("/tasks/users/{id}", controllers.GetTasksByUser).Methods("GET")`


    В В В В `taskRouter.HandleFunc("/tasks/{id}", controllers.DeleteTask).Methods("DELETE")`


    В В В В `router.PathPrefix("/tasks").Handler(negroni.New(`


    В В В В В В В В `negroni.HandlerFunc(common.Authorize),`


    В В В В В В В В `negroni.Wrap(taskRouter),`


    В В В В `))`


    В В В В `return router`


    `}`


    You can add middleware functions to specific routes by using the `PathPrefix`
    function of the `router` instance.


    Here is the code block in `note.go` of the `routers` package to add authentication
    middleware function to the `"/notes"` path:


    `func SetNoteRoutes(router *mux.Router) *mux.Router {`


    В В В В `noteRouter := mux.NewRouter()`


    В В В В `noteRouter.HandleFunc("/notes", controllers.CreateNote).Methods("POST")`


    В В В В `noteRouter.HandleFunc("/notes/{id}", controllers.UpdateNote).Methods("PUT")`


    В В В В `noteRouter.HandleFunc("/notes/{id}", controllers.GetNoteById).Methods("GET")`


    В В В В `noteRouter.HandleFunc("/notes", controllers.GetNotes).Methods("GET")`


    В В В В `noteRouter.HandleFunc("/notes/tasks/{id}", controllers.GetNotesByTask).Methods("GET")`


    В В В В `noteRouter.HandleFunc("/notes/{id}", controllers.DeleteNote).Methods("DELETE")`


    В В В В `router.PathPrefix("/notes").Handler(negroni.New(`


    В В В В В В В В `negroni.HandlerFunc(common.Authorize),`


    В В В В В В В В `negroni.Wrap(noteRouter),`


    В В В В `))`


    В В В В `return router`


    `}`


    Middleware functions are great for implementing shared functionalities across
    application handlers. Middleware functions can also be applied to specific routes,
    as was done for URL paths `"/tasks"` and `"/notes"`.


    ### Application Handlers


    Previous sections looked at application data models, RESTful API resource modeling
    and mapping it with an applicationвҖҷs HTTP routes, setting up the HTTP server with
    essential initialization logic, and authentication of RESTful APIs. LetвҖҷs now
