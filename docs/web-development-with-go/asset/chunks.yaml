- fmt: "## Working with Alice\n\nTo work with the `Alice` package, `github.com/justinas/alice`\
    \ must be added to the import list:\n\n```\nimport \"github.com/justinas/alice\"\
    \n```\n\nLetвҖҷs rewrite the program shown in Listing 6-6 with the `Alice` package\
    \ (see Listing 6-7).\n\n**Listing 6-7.** Chaining Middleware Functions with the\
    \ Alice Package\n\n```\npackage main\n\nimport (\n    \"io\"\n    \"log\"\n  \
    \  \"net/http\"\n    \"os\"\n    \"github.com/gorilla/handlers\"\n    \"github.com/justinas/alice\"\
    \n)\n\nfunc loggingHandler(next http.Handler) http.Handler {\n    logFile, err\
    \ := os.OpenFile(\"server.log\", os.O_WRONLY|os.O_CREATE|os.O_APPEND, 0777)\n\
    \    if err != nil {\n        panic(err)\n    }\n    return handlers.LoggingHandler(logFile,\
    \ next)\n}\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n    w.Header().Set(\n\
    \        \"Content-Type\",\n        \"text/html\",\n    )\n    io.WriteString(\n\
    \        w,\n        `<doctype html>\n<html>\n<head>\n<title>Index</title>\n</head>\n\
    <body>\nHello Gopher!\n</body>\n</html>`,\n    )\n}\n\nfunc about(w http.ResponseWriter,\
    \ r *http.Request) {\n    w.Header().Set(\n        \"Content-Type\",\n       \
    \ \"text/html\",\n    )\n    io.WriteString(\n        w,\n        `<doctype html>\n\
    <html>\n<head>\n<title>About</title>\n</head>\n<body>\nGo Web development with\
    \ HTTP Middleware\n</body>\n</html>`,\n    )\n}\n\nfunc iconHandler(w http.ResponseWriter,\
    \ r *http.Request) {\n    http.ServeFile(w, r, \"./favicon.ico\")\n}\n\nfunc main()\
    \ {\n    http.HandleFunc(\"/favicon.ico\", iconHandler)\n    indexHandler := http.HandlerFunc(index)\n\
    \    aboutHandler := http.HandlerFunc(about)\n    commonHandlers := alice.New(loggingHandler,\
    \ handlers.CompressHandler)\n    http.Handle(\"/\", commonHandlers.ThenFunc(indexHandler))\n\
    \    http.Handle(\"/about\", commonHandlers.ThenFunc(aboutHandler))\n    server\
    \ := &http.Server{\n        Addr: \":8080\",\n    }\n    log.Println(\"Listening...\"\
    )\n    server.ListenAndServe()\n}\n```\n\nIn this program, two Gorilla handlers\
    \ are used for logging requests and compressing responses: `LoggingHandler` and\
    \ `CompressHandler`. The HTML string is provided in the responses to verify the\
    \ compression impact of the HTTP responses. Run the program, make requests to\
    \ `\"/\"` and `\"/about\"`, and watch the log file and HTTP responses.\n\nFigure\
    \ 6-1 shows the screenshot in Fiddler: an HTTP debugging tool showing that the\
    \ web responses are compressing with gzip encoding.\n\n![A978-1-4842-1052-9_6_Fig1_HTML.jpg](A978-1-4842-1052-9_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1.** Compressing HTTP responses with a Gorilla handler\n\nChaining\
    \ middleware functions can be done in an elegant way using the `Alice` package,\
    \ which makes it easy to understand code blocks. GorillaвҖҷs `LoggingHandler` does\
    \ not have the signature `func (http.Handler) http.Handler`, and it takes a log\
    \ file as a function parameter along with the `http.Handler`. So by working properly\
    \ with the `Alice` package and using this handler in multiple places, you can\
    \ write a middleware function for logging, in which the Gorilla `LoggingHandler`\
    \ is called by providing the log file as the parameter. This is a good approach\
    \ whenever a middleware function is needed with multiple function parameters:\n\
    \n```\nfunc loggingHandler(next http.Handler) http.Handler {\n    logFile, err\
    \ := os.OpenFile(\"server.log\", os.O_WRONLY|os.O_CREATE|os.O_APPEND, 0777)\n\
    \    if err != nil {\n        panic(err)\n    }\n    return handlers.LoggingHandler(logFile,\
    \ next)\n}\n```\n\nThe `loggingHandler` middleware function can be used with `Alice`,\
    \ which calls the Gorilla `LoggingHandler` function with necessary arguments.\
    \ When you use middleware handlers, you might need to decorate multiple middleware\
    \ handlers into several application handlers. In this context, you can create\
    \ common handlers with `Alice` by combining with multiple middleware handlers,\
    \ and it can apply to multiple application handlers.\n\nHere `commonHandlers`\
    \ is defined as the common handlers for use with multiple application handlers:\n\
    \n```\nindexHandler := http.HandlerFunc(index)\naboutHandler := http.HandlerFunc(about)\n\
    commonHandlers := alice.New(loggingHandler, handlers.CompressHandler)\nhttp.Handle(\"\
    /\", commonHandlers.ThenFunc(indexHandler))\nhttp.Handle(\"/about\", commonHandlers.ThenFunc(aboutHandler))\n\
    ```\n\nThe `Alice` package provides a fluent API for working with middleware functions\
    \ that allows you to chain middleware functions in an elegant way. The `Alice`\
    \ package is a very lightweight library that has fewer than 100 lines of code.\n\
    \n## Using Middleware with the Negroni Package\n\nWhen you work directly with\
    \ the `net/http` package to build web applications, the `Negroni` third-party\
    \ library is a great companion for you. `Negroni` is a library that is designed\
    \ to be compatible with the `net/http` package. `Negroni` provides an idiomatic\
    \ approach to using HTTP middleware in Go. It encourages you to use `net/http`\
    \ handlers while providing a way to handle HTTP middleware functions.\n\nThe previous\
    \ section discussed the `Alice` package, which is great for chaining middleware\
    \ handlers. `Negroni` provides a different approach for handling HTTP middleware\
    \ functions in a simple and nonintrusive way. If you prefer to use `Alice` for\
    \ handling middleware functions, you can stick with it because both `Alice` and\
    \ `Negroni` solve the same problems in a slightly different way. `Negroni` provides\
    \ a full-fledged library for working with middleware functions, which also comes\
