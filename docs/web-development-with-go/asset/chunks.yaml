    Successful authentication into the API server


    When you build web APIs as the back end for mobile applications and web applications,
    a token-based approach is the preferred solution when you provide your own authentication
    and authorization infrastructure. This approach is good for mobile clients and
    SPAs to consume API resources. After logging in to the system using a username
    and a password, a client application can obtain an access token to access protected
    resources in subsequent HTTP requests. Once the client applications obtain the
    access token (JWT token) from an API server, the token can be persisted into a
    local storage of client applications. Whenever HTTP requests are sent to access
    the protected resources of the API server, they then can be taken from local storage.


    ### Using HTTP Middleware to Validate JWT Tokens


    When you work with JWT tokens as an authentication model for accessing the protected
    resources of a server, you have to validate the tokens on every HTTP request.
    It would be a tedious job to implement the validation logic in each HTTP request,
    so HTTP middleware is a great approach for implementing authentication and authorization
    logic in web applications in which you can decorate the authentication middleware
    into the routes (which is required for authentication). You write authentication
    logic in one place that can be applied into multiple routes in which you want
    to implement authorization for accessing its protected resources.


    Listing [7-3](#A978-1-4842-1052-9_7_Chapter.html#FPar5) is an authentication middleware
    that can be used for decorating into multiple application handlers to perform
    authorization.


