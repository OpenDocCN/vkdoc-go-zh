- fmt: '### Go: the Great Stack for Microservice Architecture


    Software development practices have been continuously evolving to cater to solving
    new challenges. As a programming language, Go is a great example of language as
    a solution for solving todayвҖҷs challenges of building larger applications. The
    evolution is happening in software architectures as well. Microservice architecture
    is the hottest buzzword in software architectures, which is a fundamental shift
    in software development for building larger distributed applications.


    In the past, many applications used a monolithic architecture pattern in which
    all components of the application, including presentation components, business
    logic, database access logic, and applications integration logic, were put in
    a single deployable unit. When the scope and functionalities of these applications
    were evolving, they were maintained as a single application unit by adding new
    functionalities and software components. Scaling and maintaining monolithic applications
    are always a big challenge because of the complex nature of maintaining everything
    as a single deployable unit. Microservice architecture is an alternative architecture
    pattern that addresses the limitations and challenges of monolithic architecture.


    Microservice architecture is a paradigm shift in software development that focuses
    on building independently deployable and individual pieces of software. Instead
    of developing larger monolithic applications, Microservice architecture recommends
    building loosely coupled, small pieces of software services that can be deployed
    independently of other services. Unlike monolithic architecture, each service
    in the Microservice architecture is developed and deployed independently so that
    you can easily scale development and deployment. You can even use different technology
    stacks for developing individual services because they are deploying and updating
    independently of other services.


    #### RESTful Services in Microservice Architecture


    In Microservice architecture, loosely coupled software services are developed,
    and the application is built by composing these services. In this architecture
    approach, each microservice needs to communicate with other microservices; RESTful
    APIs can be used to communicate among these microservices. RESTful APIs are very
    important components in the Microservice architecture.


    Go is a great technology stack for building applications with the Microservice
    pattern and its design philosophy intersects with the Microservice architecture
    pattern. The idiomatic approach of Go programming is to develop small pieces of
    software components as packages and then build applications by composing these
    packages.


    ### Building RESTful APIs


    LetвҖҷs build a simple RESTful API application by using the knowledge you have gained
    from previous chapters. This RESTful API application provides the back end for
    building a simple вҖңTaskManagerвҖқ application that can be used to manage tasks and
    give updates and notes about each task. The application will be persisted into
    a MongoDB database. This TaskManager RESTful API will be a JSON-based API in which
    the JSON data format will be used for sending and receiving messages among client
    applications and the RESTful API server.


    #### Third-Party Packages


    The following third-party packages will be used for building the TaskManager application:


    - `gopkg.in/mgo.v2`: The `mgo` package provides a MongoDB driver for Go.

    - `gopkg.in/mgo.v2/bson`: A subpackage of `mgo`, it provides implementation of
    the BSON specification for Go.

    - `github.com/gorilla/mux`: The `mux` package implements a request router and
    dispatcher.

    - `github.com/dgrijalva/jwt-go`: The `jwt-go` package implements helper functions
    for working with JSON Web Tokens (JWT).

    - `github.com/codegangsta/negroni`: The `Negroni` package provides an idiomatic
    approach to HTTP middleware.


    #### Application Structure


    Figure [9-1](#A978-1-4842-1052-9_9_Chapter.html#Fig1) illustrates the high-level
    folder structure of the RESTful API application.


    ![A978-1-4842-1052-9_9_Fig1_HTML.jpg](A978-1-4842-1052-9_9_Fig1_HTML.jpg)


    Figure 9-1. Application folder structure


    Figure [9-2](#A978-1-4842-1052-9_9_Chapter.html#Fig2) illustrates the folder structure
    and associated files of the completed version of the RESTful API application.


    ![A978-1-4842-1052-9_9_Fig2_HTML.jpg](A978-1-4842-1052-9_9_Fig2_HTML.jpg)


    Figure 9-2. Folders and associated files of the completed application


    Besides the `keys` and `Godeps` folders, all other folders represent Go packages.
    The `keys` folder, which contains cryptographic keys for signing JWT and its verification,
    is used for the authentication of APIs with JWT. The `Godeps` folder is used to
    manage external dependencies of the application using the `godep` third-party
    tool.


    The RESTful API application has been divided into the following packages:


    - `common`: Implements some utility functions and provides initialization logic
    for the application

    - `controllers`: Implements the applicationвҖҷs application handlers

    - `data`: Implements the persistence logic with the MongoDB database

    - `models`: Describes the data model of the application

    - `routers`: Implements the HTTP request routers for the RESTful API'
