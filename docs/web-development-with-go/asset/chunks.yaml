- fmt: "# The Most Important Thing About Datastore\n\nThe most important thing about\
    \ `Datastore` is that it replicates data across multiple datacenter regions, providing\
    \ a high level of availability for reads and writes. When you compare `Datastore`\
    \ with `Bigtable`, note that `Bigtable` runs on a single datacenter.\n\n## Entities\n\
    \nThe `Cloud Datastore` holds data objects known as entities. The values of the\
    \ `Go` struct are persisted into entities, which hold one or more properties.\
    \ The `Go` structs fields become the properties of the entity. The type of property\
    \ values are taken from the structs fields.\n\nLike many `NoSQL` databases, `Cloud\
    \ Datastore` is schema-less database, which means that data objects of the same\
    \ entity can have different properties, and properties with the same name can\
    \ have different value types.\n\n`Cloud Datastore` is an evolutionary `NoSQL`\
    \ that has lot of advantages over traditional `NoSQL` databases. `Cloud Datastore`\
    \ allows you to store hierarchically structured data using ancestor paths in a\
    \ tree-like structure.\n\n## Ancestors and Descendants\n\nWhen you create an entity\
    \ in `Datastore`, you can optionally specify another entity as its parent. You\
    \ can associate hierarchically structured data by specifying the parent entity.\
    \ If you are not specifying any entity as a parent, it is designated as a root\
    \ entity. An entityвҖҷs parent, parentвҖҷs parent, and so on recursively are its ancestors.\
    \ An entityвҖҷs children, childrenвҖҷs children, and so on are its descendants. A\
    \ root entity and all its descendants belong to the same entity group. Understanding\
    \ the concept of entity groups can help you perform queries in an efficient way.\n\
    \n# Working with Cloud Datastore\n\n`Google Cloud Datastore` is a great data store\
    \ choice when you develop highly scalable `Cloud native` applications on the `Google\
    \ Cloud` platform using `App Engine`. Both `App Engine` and `Cloud Datastore`\
    \ provide massive scalability to applications without developers having to manage\
    \ infrastructure or work on `Ops`. When you use `Datastore` with your `App Engine`\
    \ applications, you donвҖҷt need to configure anything to work with it. You can\
    \ simply use the `Go` package for `Cloud Datastore` and then persist and query\
    \ data against the `Datastore`.\n\nLetвҖҷs create an example `App Engine` web application\
    \ by using `Cloud Datastore` as the database. This example application works with\
    \ a simple data model without using ancestors and descendants.\n\nThe following\
    \ `Go` packages are used in the `App Engine` application:\n\n- `google.golang.org/appengine`:\
    \ The `appengine` package provides basic functionality for `Google App Engine`.\n\
    - `google.golang.org/appengine/datastore`: The `datastore` package provides a\
    \ client for `App EngineвҖҷs` datastore service.\n\nYou can install the packages\
    \ using the `goapp` tool:\n\n```\ngoapp get google.golang.org/appengine\ngoapp\
    \ get google.golang.org/appengine/datastore\n```\n\nThe example application provides\
    \ the following functionalities:\n\n- The home page of the application shows a\
    \ list of tasks.\n- Users can create a new task by choosing the `Create task`\
    \ option, which displays a form for creating a new task.\n\nListing 11-7 provides\
    \ an example `App Engine` application using `Cloud Datastore`.\n\n## Listing 11-7.\
    \ App Engine Application with Cloud Datastore\n\n```go\npackage task\n\nimport\
    \ (\n    \"fmt\"\n    \"html/template\"\n    \"net/http\"\n    \"time\"\n\n  \
    \  \"google.golang.org/appengine\"\n    \"google.golang.org/appengine/datastore\"\
    \n)\n\ntype Task struct {\n    Name        string\n    Description string\n  \
    \  CreatedOn   time.Time\n}\n\nconst taskForm = `\n<html>\n<body>\n<form action=\"\
    /save\" method=\"post\">\n<p>Task Name: <input type=\"text\" name=\"taskname\"\
    \ ></p>\n<p> Description: <input type=\"text\" name=\"description\" ></p>\n<p><input\
    \ type=\"submit\" value=\"Submit\"></p>\n</form>\n</body>\n</html>\n`\n\nconst\
    \ taskListTmplHTML = `\n<html>\n<body>\n<p>Task List</p>\n{{range .}}\n<p>{{.Name}}\
    \ - {{.Description}}</p>\n{{end}}\n<p><a href=\"/create\">Create task</a> </p>\n\
    </body>\n</html>\n`\n\nvar taskListTemplate = template.Must(template.New(\"taskList\"\
    ).Parse(taskListTmplHTML))\n\nfunc init() {\n```"
  raw: 'The most important thing about Datastore is that it replicates data across
    multiple datacenter regions, providing a high level of availability for reads
    and writes. When you compare Datastore with Bigtable, note that Bigtable runs
    on a single datacenter.


    #### Entities


    The Cloud Datastore holds data objects known as entities. The values of the Go
    struct are persisted into entities, which hold one or more properties. The Go
    structs fields become the properties of the entity. The type of property values
    are taken from the structs fields.


    Like many NoSQL databases, Cloud Datastore is schema-less database, which means
    that data objects of the same entity can have different properties, and properties
    with the same name can have different value types.


    Cloud Datastore is an evolutionary NoSQL that has lot of advantages over traditional
    NoSQL databases. Cloud Datastore allows you to store hierarchically structured
    data using ancestor paths in a tree-like structure.


    #### Ancestors and Descendants


    When you create an entity in Datastore, you can optionally specify another entity
    as its parent. You can associate hierarchically structured data by specifying
    the parent entity. If you are not specifying any entity as a parent, it is designated
    as a root entity. An entityвҖҷs parent, parentвҖҷs parent, and so on recursively are
    its ancestors. An entityвҖҷs children, childrenвҖҷs children, and so on are its descendants.
    A root entity and all its descendants belong to the same entity group. Understanding
    the concept of entity groups can help you perform queries in an efficient way.


    ### Working with Cloud Datastore


    Google Cloud Datastore is a great data store choice when you develop highly scalable
    Cloud native applications on the Google Cloud platform using App Engine. Both
    App Engine and Cloud Datastore provide massive scalability to applications without
    developers having to manage infrastructure or work on Ops. When you use Datastore
    with your App Engine applications, you donвҖҷt need to configure anything to work
    with it. You can simply use the Go package for Cloud Datastore and then persist
    and query data against the Datastore.


    LetвҖҷs create an example App Engine web application by using Cloud Datastore as
    the database. This example application works with a simple data model without
    using ancestors and descendants.


    The following Go packages are used in the App Engine application:


    *   `google.golang.org/appengine`: The `appengine` package provides basic functionality
    for Google App Engine.

    *   `google.golang.org/appengine/datastore`: The `datastore` package provides
    a client for App EngineвҖҷs datastore service.


    You can install the packages using the `goapp` tool:


    `goapp get google.golang.org/appengine`


    `goapp get google.golang.org/appengine/datastore`


    The example application provides the following functionalities:


    *   The home page of the application shows a list of tasks.

    *   Users can create a new task by choosing the Create task option, which displays
    a form for creating a new task.


    Listing [11-7](#A978-1-4842-1052-9_11_Chapter.html#FPar9) provides an example
    App Engine application using Cloud Datastore.


