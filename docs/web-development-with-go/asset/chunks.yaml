    `PrintDetails`. LetвҖҷs have a look at the `Person` type:


    `type Person struct {`


    `FirstName, LastName string`


    `DobВ В В В В В В В В В В В В В В В В time.Time`


    `Email, LocationВ В В В В string`


    `}`


    `//A person method`


    `func (p Person) PrintName() {`


    `fmt.Printf("\n%s %s\n", p.FirstName, p.LastName)`


    `}`


