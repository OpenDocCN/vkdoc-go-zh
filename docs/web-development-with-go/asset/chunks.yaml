    ## Building Back-end APIs with Cloud Endpoints


    In Google Cloud, the App Engine platform lets Go developers build back-end APIs
    and web applications in the sandbox environment of App Engine, which is available
    for autoscaling. With App Engine, you can build massively scalable Cloud-native
    applications on GoogleвҖҷs infrastructure using the tools and SDKs provided by the
    Google Cloud platform. Google Cloud Endpoints is an App Engine service that allows
    you to easily create back-end APIs for web clients and mobile clients.


    Google Cloud Endpoints provides tools, libraries, and services to quickly generate
    APIs and client libraries from an App Engine application. Cloud Endpoints is an
    App Engine application that runs in the App Engine environment, but it provides
    extra capabilities for building API back ends and its client libraries improve
    developer productivity when building mobile back-end systems.


    You can create back-end APIs on the App Engine platform without leveraging Cloud
    Endpoints. However, although you can create back-end APIs using a normal App Engine
    application, Cloud Endpoints makes the development process easier by providing
    extra capabilities. Cloud Endpoints allows you to generate native client libraries
    for iOS, Android, JavaScript, and Dart. Because natively generated libraries are
    available for various client applications, you can quickly build client applications
    on which you donвҖҷt need to write native wrappers to communicate with the back-end
    API. For a back-end developer, it eliminates some complexities from the development
    process for developing RESTful APIs.


    When you build an API with Cloud Endpoints, you donвҖҷt have to write anything on
    HTTP `Request` and `Response` objects. You can write API methods like a normal
    Go function without leveraging these objects and can make them HTTP APIs by using
    the libraries provided by Cloud Endpoints.


    Figure 11-14 illustrates the basic architecture of a Cloud Endpoints application.'
  raw: 'In the preceding query, `"tasks"` was specified as the entity kind, but no
    filter conditions were specified. You can specify the filter condition using the
    `Filter` function:


    `q := datastore.NewQuery("tasks").`


    `Filter("Name =", "GAE").`


    `Order("-CreatedOn")`


    The `Order` condition is applied to get results sorted by descending order in
    the `CreatedOn` field. The `-` is used to sort in descending order.


    The `Query` type instance prepares the query, so you need to call various `Query`
    type methods to execute the query and fill in the data for the Go object. The
    `GetAll` method executes the query and fills the data into a slice of `Task` type:


    `c := appengine.NewContext(r)`


    `var tasks []Task`


    `_, err := q.GetAll(c, &tasks)`


