    Listing [3-18](#A978-1-4842-1052-9_3_Chapter.html#FPar19) created two goroutines
    that were running independently and didnвҖҷt need to communicate with each other.
    However, sometimes there is a need for communication among goroutines for sending
    and receiving data, hence the need for synchronization among goroutines. In many
    programming environments, communication among concurrent programs is complex or
    limited with features. Go allows you to communicate among goroutines using channels
    that enable the synchronization of goroutine execution.


    The built-in `make` function is used to declare a channel with the help of the
    keyword `chan`, followed by the type for specifying the type of data you are using
    for exchanging data:


    `count := make(chan int)`


    A channel of integer `type` is declared, so integer values will be passed into
    channels. There are two types of channels available for synchronization of goroutines:


    *   Buffered channels

    *   Unbuffered channels


    Listing [3-20](#A978-1-4842-1052-9_3_Chapter.html#FPar22) is the code block that
    declares unbuffered and buffered channels.


    Listing 3-20.В В Declaring Unbuffered and Buffered Channels


    `// Unbuffered channel of integers.`


    `count := make(chan int)`


    `// Buffered channel of integers for buffering up to 10 values.`


    `count:= make(chan int, 10)`


    When buffered channels are declared, the capacity of channels to hold the data
    must be specified. If you try to send more data than its capacity, you get an
    error.


    #### Unbuffered Channel


    Unbuffered channels provide synchronous communication among goroutines, which
    ensures message delivery among them. With unbuffered channels, message sending
    is permitted only if there is a corresponding receiver that is ready to receive
    the messages. In this case, both sides of the channel have to wait until the other
    side is ready for sending and receiving messages. With buffered channels, a limited
    number of messages can be sent into the channel without a corresponding concurrent
    receiver for receiving those messages. After the messages are sent into buffered
    channels, those messages from the channel are received. Unlike unbuffered channels,
    message delivery canвҖҷt be guaranteed with buffered channels.


    The <- operator is used to send values into channels (see Listing [3-21](#A978-1-4842-1052-9_3_Chapter.html#FPar23)).


