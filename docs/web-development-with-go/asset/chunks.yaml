    \nTDD ж–№жі•еҸ—еҲ°йӮЈдәӣеңЁиҪҜд»¶дәӨд»ҳдёӯдҪҝз”Ёж•ҸжҚ·ејҖеҸ‘ж–№жі•зҡ„дәәзҡ„й«ҳеәҰжҺЁиҚҗгҖӮж•ҸжҚ·ж–№жі•и®әејәи°ғеҹәдәҺжј”иҝӣејҸж–№жі•ејҖеҸ‘иҪҜд»¶пјҢиҖҢдёҚжҳҜйҒөеҫӘйў„е…Ҳи®ҫи®ЎгҖӮеҪ“дҪ еҹәдәҺжј”иҝӣејҸи®ҫи®Ўж–№жі•ејҖеҸ‘иҪҜд»¶ж—¶пјҢTDD\
    \ дјҡеёҰжқҘеҫҲеӨҡд»·еҖјпјҢеӣ дёәдҪ дёҚж–ӯең°дёәж–°иҜҶеҲ«зҡ„йңҖжұӮжҲ–жңҹжңӣзҡ„ж”№иҝӣйҮҚжһ„еә”з”ЁзЁӢеәҸд»Јз ҒгҖӮз”ұдәҺдҪ зҡ„еә”з”ЁзЁӢеәҸд»Јз Ғиў«еҚ•е…ғжөӢиҜ•иҰҶзӣ–пјҢдҪ еҸҜд»ҘйҡҸж—¶иҝҗиЎҢж•ҙеҘ—еҚ•е…ғжөӢиҜ•пјҢд»ҘзЎ®дҝқдҪ зҡ„еә”з”ЁзЁӢеәҸжҢүи®ҫи®Ўе·ҘдҪңгҖӮеҚ•е…ғжөӢиҜ•е®ҡд№үдәҶдҪ зҡ„еә”з”ЁзЁӢеәҸи®ҫи®ЎгҖӮ\n\
    \nд»ҘдёӢжҳҜ TDD дёӯж¶үеҸҠзҡ„жӯҘйӘӨпјҡ\n\n-   ж·»еҠ дёҖдёӘеҚ•е…ғжөӢиҜ•жқҘе®ҡд№үдёҖдёӘж–°зҡ„еҠҹиғҪйңҖжұӮгҖӮ\n-   иҝҗиЎҢжүҖжңүжөӢиҜ•пјҢзңӢзңӢж–°зҡ„еҚ•е…ғжөӢиҜ•жҳҜеҗҰеӨұиҙҘгҖӮ\n-   зј–еҶҷдёҖдәӣд»Јз ҒжқҘйҖҡиҝҮжөӢиҜ•гҖӮ\n\
