- fmt: "# Summary\n\nGo is a great technology stack for building web-based, back-end\
    \ systems; and is especially excellent for building RESTful APIs. The `net/http`\
    \ package from the standard library provides the fundamental blocks for building\
    \ web applications in Go. The Go philosophy discourages using bigger frameworks\
    \ for building web applications; it encourages the use of the `net/http` package\
    \ as the fundamental block to use third-party packages and your own packages to\
    \ extend the functionalities provided by the `net/http` package.\n\nThe `http`\
    \ package has two major components for processing HTTP requests: `http.ServeMux`\
    \ and `http.Handler`. `http.ServeMux` is a request multiplexor that compares incoming\
    \ HTTP requests against a list of predefined URI resources and calls the associated\
    \ handler for the resource requested by HTTP clients. Handlers are responsible\
    \ for writing response headers and bodies. By using third-party packages such\
    \ as `mux`, you can extend the capabilities of `http.ServeMux`.\n\nThe final section\
    \ of this chapter explored the fundamental pieces of web development in Go by\
    \ showing the development of a JSON-based RESTful API.\n\n# 5. Working with Go\
    \ Templates\n\nChapter 4 discussed the fundamentals of web development in Go using\
    \ the standard library package `net/http`. A JSON-based web API was created by\
    \ using the standard library package `net/http` as the primary web programming\
    \ block and the third-party package Gorilla `mux` as the HTTP request multiplexer.\
    \ This chapter shows you how to develop web applications in Go; the standard library\
    \ package `html/template` is used for rendering web pages.\n\nThis chapter begins\
    \ with the fundamentals of Go templates and includes how to develop full-fledged\
    \ web applications by leveraging the `html/template` package.\n\n## `text/template`\
    \ Package\n\nUsing templates is a great way to build dynamic contents; you provide\
    \ data at runtime to generate dynamic contents with a predefined format. The Go\
    \ standard library package `html/template` allows you to build dynamic HTML pages\
    \ by combining static contents with dynamic contents where it parses the templates\
    \ with the data structure that is provided at runtime.\n\nYou will have a look\
    \ at the standard library package `text/template` before diving into the `html/template`\
    \ package. The `html/template` package provides the same interface as the `text/template`\
    \ package; the only difference between the two is that the `html/template` package\
    \ parses the template and generates the output in HTML, and the `text/template`\
    \ package generates the output in text format. You can start with the `text/template`\
    \ package to understand the syntax of Go templates and can easily work with the\
    \ `html/template` without any syntactical difference. The `text/template` package\
    \ allows you to build data-driven templates for generating textual output.\n\n\
    ### Working with `text/template`\n\nTemplates are parsed against the data structure\
    \ provided at runtime. Commands in the template refer to elements of the data\
    \ structure. For example, struct fields can be mapped with template commands.\
    \ The commands in the templates are delimited by `{{` and `}}`.\n\nTo work with\
    \ `text/template`, add it to the list of imports:\n\n```go\nimport (\n    \"text/template\"\
    \n)\n```\n\nListing 5-1 is an example program that generates textual output with\
    \ struct object fields.\n\n**Listing 5-1. Applying Struct Fields into a Template**\n\
    \n```go\npackage main\n\nimport (\n    \"log\"\n    \"os\"\n    \"text/template\"\
    \n)\n\ntype Note struct {\n    Title       string\n    Description string\n}\n\
    \nconst tmpl = `Note - Title: {{.Title}}, Description: {{.Description}}`\n\nfunc\
    \ main() {\n    // Create an instance of Note struct\n    note := Note{\"text/templates\"\
    , \"Template generates textual output\"}\n    // create a new template with a\
    \ name\n    t := template.New(\"note\")\n    // parse some content and generate\
    \ a template\n    t, err := t.Parse(tmpl)\n    if err != nil {\n        log.Fatal(\"\
    Parse: \", err)\n        return\n    }\n    // Applies a parsed template to the\
    \ data of Note object\n    if err := t.Execute(os.Stdout, note); err != nil {\n\
    \        log.Fatal(\"Execute: \", err)\n        return\n    }\n}\n```\n\nYou should\
    \ get the following output:\n\n```\nNote - Title: text/templates, Description:\
    \ Template generates textual output\n```\n\nIn the previous listing, a struct\
    \ named `Note` is declared, and a template is declared as a string constant:\n\
    \n```go\nconst tmpl = `Note - Title: {{.Title}}, Description: {{.Description}}`\n\
    ```\n\nIn the template, the `Title` and `Description` fields of the `Note` struct\
    \ are mapped so the textual output with the values of the `Note` object can be\
    \ rendered when the template is executed. The template block `{{ . }}` is a context-aware\
    \ block that will be executed based on the execution context. Here the `Note`\
    \ object is provided when the template is executed, so the names after the dot\
    \ (`.`) maps the field names of the `Note` object.\n\nA new template with the\
    \ name `\"note\"` is created. The `New` function returns the type `*Template`:\n\
    \n```go\nt := template.New(\"note\")\n```\n\nThe `Parse` method parses a string\
    \ into a template:\n\n```go\nt, err := t.Parse(tmpl)\n```\n\nHere the template\
    \ is parsed from a string that has declared with a constant variable. To parse\
    \ the template from template files, use the `ParseFiles` method of `*Template`:\n\
    \n```go\nfunc (t *Template) ParseFiles(filenames ...string) (*Template, error)\n\
    ```\n\nThe `ParseGlob` method parses the template definitions in the files identified\
    \ by the pattern. Here is a sample for parsing all template definition files in\
    \ a folder with the extension `.tmpl`:\n\n```go\nt, err := template.ParseGlob(\"\
    templates/*.tmpl\")\n```\n\nThe previous code block parses all template definitions\
    \ in the folder `templates` if the files have an extension of `.tmpl`.\n\nThe\
    \ `Execute` method applies a parsed template to the specified data object (here\
    \ a `Note` object) and writes the output to an output writer. If an error occurs\
    \ during the template execution or between writing its output, execution stops,\
    \ but partial results may already have been written to the output writer:\n\n\
    ```go\nerr1 := t.Execute(os.Stdout, note)\n```\n\nHereвҖҷs a summary of the steps\
    \ for generating the textual output using `text/template`:\n\n1. Declare a template\
    \ for mapping with a data object.\n2. Create a template (`*Template`) by calling\
    \ the `template.New` function.\n3. Parse a string into a template by calling the\
    \ `Parse` method.\n4. Execute the parsed template with the specified data object\
    \ for rendering the textual contents with the values of the data object.\n\nIn\
    \ the previous program, a simple struct object was applied to the template for\
    \ generating the output. LetвҖҷs have a look at how to apply a collection of objects\
    \ to templates for generating the textual output.\n\nListing 5-2 is an example\
    \ program that renders a text template with a collection object.\n\n**Listing\
    \ 5-2. Applying a Slice of Objects into a Template**\n\n```go\npackage main\n\n\
    import (\n    \"log\"\n    \"os\"\n    \"text/template\"\n)\n\ntype Note struct\
    \ {\n```"
  raw: '## Summary


    Go is a great technology stack for building web-based, back-end systems; and is
    especially excellent for building RESTful APIs. The `net/http` package from the
    standard library provides the fundamental blocks for building web applications
    in Go. The Go philosophy discourages using bigger frameworks for building web
    applications; it encourages the use of the `net/http` package as the fundamental
    block to use third-party packages and your own packages to extend the functionalities
    provided by the `net/http` package.


    The `http` package has two major components for processing HTTP requests: `http.ServeMux`
    and `http.Handler. http.ServeMux` is a request multiplexor that compares incoming
    HTTP requests against a list of predefined URI resources and calls the associated
    handler for the resource requested by HTTP clients. Handlers are responsible for
    writing response headers and bodies. By using third-party packages such as `mux`,
    you can extend the capabilities of `http.ServeMux`.


    The final section of this chapter explored the fundamental pieces of web development
    in Go by showing the development of a JSON-based RESTful API.


    # 5.В Working with Go Templates


    [Chapter 4](#A978-1-4842-1052-9_4_Chapter.html) discussed the fundamentals of
    web development in Go using the standard library package `net/http`. A JSON-based
    web API was created by using the standard library package `net/http` as the primary
    web programming block and the third-party package Gorilla `mux` as the HTTP request
    multiplexer. This chapter shows you how to develop web applications in Go; the
    standard library package `html/template` is used for rendering web pages.


    This chapter begins with the fundamentals of Go templates and includes how to
    develop full-fledged web applications by leveraging the `html/template` package.


    ## text/template Package


    Using templates is a great way to build dynamic contents; you provide data at
    runtime to generate dynamic contents with a predefined format. The Go standard
    library package `html/template` allows you to build dynamic HTML pages by combining
    static contents with dynamic contents where it parses the templates with the data
    structure that is provided at runtime.


    You will have a look at the standard library package `text/template` before diving
    into the `html/template` package. The `html/template` package provides the same
    interface as the text/template package; the only difference between the two is
    that the `html/template` package parses the template and generates the output
    in HTML, and the `text/template` package generates the output in text format.
    You can start with the `text/template` package to understand the syntax of Go
    templates and can easily work with the `html/template` without any syntactical
    difference. The `text/template` package allows you to build data-driven templates
    for generating textual output.


    ### Working with text/template


    Templates are parsed against the data structure provided at runtime. Commands
    in the template refer to elements of the data structure. For example, struct fields
    can be mapped with template commands. The commands in the templates are delimited
    by `{{` and `}}`.


    To work with `text/template`, it to the list of imports:


    `import (`


    `"text/template"`


    `)`


    Listing [5-1](#A978-1-4842-1052-9_5_Chapter.html#FPar1) is an example program
    that generates textual output with struct object fields.


    Listing 5-1.В В Applying Struct Fields into a Template


    `package main`


    `import (`


    `"log"`


    `"os"`


    `"text/template"`


    `)`


    `type Note struct {`


    `TitleВ В В В В В В string`


    `Description string`


    `}`


    `` const tmpl = `Note - Title: {{.Title}}, Description: {{.Description}}` ``


    `func main() {`


    `//Create an instance of Note struct`


    `note := Note{"text/templates", "Template generates textual output"}`


    `//create a new template with a name`


    `t := template.New("note")`


    `//parse some content and generate a template`


    `t, err := t.Parse(tmpl)`


    `if err != nil {`


    `log.Fatal("Parse: ", err)`


    `return`


    `}`


    `//Applies a parsed template to the data of Note object`


    `if err := t.Execute(os.Stdout, note); err != nil {`


    `log.Fatal("Execute: ", err)`


    `return`


    `}`


    `}`


    You should get the following output:


    `Note - Title: text/templates, Description: Template generates textual output`


    In the previous listing, a struct named `Note` is declared, and a template is
    declared as a string constant:


    `` const tmpl = `Note - Title: {{.Title}}, Description: {{.Description}}` ``


    In the template, the `Title` and `Description` fields of the `Note` struct are
    mapped so the textual output with the values of the `Note` object can be rendered
    when the template is executed. The template block `{{ . }}` is a context-aware
    block that will be executed based on the execution context. Here the `Note` object
    is provided when the template is executed, so the names after the dot (`.`) maps
    the field names of the `Note` object.


    A new template with the name `"note"` is created. The `New` function returns the
    type `*Template`:


    `t := template.New("note")`


    The `Parse` method parses a string into a template:


    `t, err := t.Parse(tmpl)`


    Here the template is parsed from a string that has declared with a constant variable.
    To parse the template from template files, use the `ParseFiles` method of `*Template`:


    `func (t *Template) ParseFiles(filenames ...string) (*Template, error)`


    The `ParseGlob` method parses the template definitions in the files identified
    by the pattern. Here is a sample for parsing all template definition files in
    a folder with the extension `.tmpl`:


    `t, err := template.ParseGlob("templates/*.tmpl")`


    The previous code block parses all template definitions in the folder `templates`
    if the files have an extension of `.tmpl`.


    The `Execute` method applies a parsed template to the specified data object (here
    a `Note` object) and writes the output to an output writer. If an error occurs
    during the template execution or between writing its output, execution stops,
    but partial results may already have been written to the output writer:


    `err1 := t.Execute(os.Stdout, note)`


    HereвҖҷs a summary of the steps for generating the textual output using `text/template`:


    Declare a template for mapping with a data object. В  Create a template (`*Template`)
    by calling the `template.New` function. В  Parses a string into a template by calling
    the `Parse` method. В  Executes the parsed template with the specified data object
    for rendering the textual contents with the values of the data object.


    In the previous program, a simple struct object was applied to the template for
    generating the output. LetвҖҷs have a look at how to apply a collection of objects
    to templates for generating the textual output.


