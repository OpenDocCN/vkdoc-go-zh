    \  Unique:     false,\n        Background: true,\n        Sparse:     true,\n\
    \    }\n\n    // Add indexes into MongoDB\n    session := GetSession().Copy()\n\
    \    defer session.Close()\n\n    userCol := session.DB(AppConfig.Database).C(\"\
    users\")\n    taskCol := session.DB(AppConfig.Database).C(\"tasks\")\n    noteCol\
    \ := session.DB(AppConfig.Database).C(\"notes\")\n\n    err = userCol.EnsureIndex(userIndex)\n\
    \    if err != nil {\n        log.Fatalf(\"[addIndexes]: %s\\n\", err)\n    }\n\
    \n    err = taskCol.EnsureIndex(taskIndex)\n    if err != nil {\n        log.Fatalf(\"\
    [addIndexes]: %s\\n\", err)\n    }\n\n    err = noteCol.EnsureIndex(noteIndex)\n\
    \    if err != nil {\n        log.Fatalf(\"[addIndexes]: %s\\n\", err)\n    }\n\
    }\n```"
  raw: '#### Initializing Configuration Values


    Configuration values are put in a file named `config.json`, which stores values
    such as host URIs of the HTTP server and MongoDB server, authentication credentials
    to connect MongoDB, and so on. This helps you avoid using hard-coded strings in
    an application. The `config.json` file is read and decodes the JSON values into
    a variable `AppConfig`. Configuration values are read from this package variable
    to start the HTTP server and connect to the MongoDB database.


    Listing [9-6](#A978-1-4842-1052-9_9_Chapter.html#FPar7) decodes the JSON string
    from `config.json` and puts the values into `AppConfig`.


