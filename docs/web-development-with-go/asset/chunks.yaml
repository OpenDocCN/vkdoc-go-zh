    , loginHandler).Methods(\"POST\")\n\tr.HandleFunc(\"/auth\", authHandler).Methods(\"\
    POST\")\n\tserver := &http.Server{\n\t\tAddr:    \":8080\",\n\t\tHandler: r,\n\
    \t}\n\tlog.Println(\"зӣ‘еҗ¬дёӯ...\")\n\tserver.ListenAndServe()\n}\n```\n\n### з”ҹжҲҗ JWT\
    \ д»ӨзүҢ\n\nеҰӮжһңзҷ»еҪ•жҲҗеҠҹпјҢAPI жңҚеҠЎеҷЁдјҡдҪҝз”Ё `jwt-go` еә“з”ҹжҲҗ JWT д»ӨзүҢпјҡ\n\n```\n// дёә rsa 256 еҲӣе»әзӯҫеҗҚеҷЁ\nt :=\
