- fmt: "### Data Model\n\nThe application provides the API for managing tasks. A user\
    \ can add tasks and can provide updates and notes against the individual task.\
    \ LetвҖҷs define the data model for this application to be used with the `MongoDB`\
    \ database.\n\nListing [9-1](#A978-1-4842-1052-9_9_Chapter.html#FPar2) defines\
    \ the data model for the RESTful API application.\n\n**Listing 9-1.** Data Model\
    \ for the Application in `models.go`\n\n```go\npackage models\n\nimport (\n  \
    \  \"time\"\n    \"gopkg.in/mgo.v2/bson\"\n)\n\ntype (\n    User struct {\n  \
    \      Id           bson.ObjectId `bson:\"_id,omitempty\" json:\"id\"`\n     \
    \   FirstName    string        `json:\"firstname\"`\n        LastName     string\
    \        `json:\"lastname\"`\n        Email        string        `json:\"email\"\
    `\n        Password     string        `json:\"password,omitempty\"`\n        HashPassword\
    \ []byte        `json:\"hashpassword,omitempty\"`\n    }\n\n    Task struct {\n\
    \        Id          bson.ObjectId `bson:\"_id,omitempty\" json:\"id\"`\n    \
    \    CreatedBy   string        `json:\"createdby\"`\n        Name        string\
    \        `json:\"name\"`\n        Description string        `json:\"description\"\
    `\n        CreatedOn   time.Time     `json:\"createdon,omitempty\"`\n        Due\
    \         time.Time     `json:\"due,omitempty\"`\n        Status      string \
    \       `json:\"status,omitempty\"`\n        Tags        []string      `json:\"\
    tags,omitempty\"`\n    }\n\n    TaskNote struct {\n        Id          bson.ObjectId\
    \ `bson:\"_id,omitempty\" json:\"id\"`\n        TaskId      bson.ObjectId `json:\"\
    taskid\"`\n        Description string        `json:\"description\"`\n        CreatedOn\
    \   time.Time     `json:\"createdon,omitempty\"`\n    }\n)\n```\n\nThree structs\
    \ are created: `User`, `Task`, and `TaskNote`. The `User` struct represents users\
    \ of the application. A user should register at the application to create tasks.\
    \ An authenticated user can add tasks, which will be represented with the `Task`\
    \ struct. A user can add notes against each task, which will be represented with\
    \ the `TaskNote` struct. The `TaskNote` entity holds the child details of its\
    \ parent entity: `Task`.\n\n[Chapter 8](#A978-1-4842-1052-9_8_Chapter.html) showed\
    \ how to make a parentвҖ“child relationship by embedding child documents into the\
    \ parent document. That approach is good for some scenarios, but document references\
    \ are also appropriate in other contexts. Here, the parent-child relationships\
    \ are made with document references. Whenever a `TaskNote` object is created,\
    \ a reference is put to the parent `Task` document by specifying the `TaskId`\
    \ in the `TaskNote` object. In this approach, you have to execute separate queries\
    \ into the `MongoDB` database to get the documents of the `Task` object and `TaskNote`\
    \ object. When you follow embedded documents to make a one-to-many relationship,\
    \ you can retrieve the information for both parent and child entities by executing\
    \ a single query because child documents are embedded into the parent entity.\n\
    \n### Resource Modeling for RESTful APIs\n\nWhen you design RESTful APIs, resource\
    \ modeling is a very important concept; it is the foundational layer for designing\
    \ RESTful APIs. LetвҖҷs define the resources of the RESTful API by leveraging URIs\
    \ as resource identifiers and HTTP verbs.\n\nTable [9-1](#A978-1-4842-1052-9_9_Chapter.html#Tab1)\
    \ shows the resources identified for the RESTful API.\n\n**Table 9-1.** Resources\
    \ Identified for the RESTful API\n\n| URI | HTTP Verb | Functionality |\n| ---\
    \ | --- | --- |\n| `/users/register` | `Post` | Creates a new user. |\n| `/users/login`\
    \ | `Post` | User logs in to the system, which returns a JWT if the login is successful.\
    \ |\n| `/tasks` | `Post` | Creates a new task. |\n| `/tasks/{id}` | `Put` | Updates\
    \ an existing task. |\n| `/tasks` | `Get` | Gets all tasks. |\n| `/tasks/{id}`\
    \ | `Get` | Gets a single task for a given ID. The value of the ID comes from\
    \ the route parameter. |\n| `/tasks/users/{id}` | `Get` | Gets all tasks associated\
    \ with a user. The value of the user ID comes from the route parameter. |\n| `/tasks/{id}`\
    \ | `Delete` | Deletes an existing task for a given ID. The value of the ID comes\
    \ from the route parameter. |\n| `/notes` | `Post` | Creates a new note against\
    \ an existing task. |\n| `/notes/{id}` | `Put` | Updates an existing task note.\
    \ |\n| `/notes` | `Get` | Gets all task notes. |\n| `/notes/{id}` | `Get` | Gets\
    \ a single note for a given ID. The value of the ID comes from the route parameter.\
    \ |\n| `/notes/tasks/{id}` | `Get` | Gets all task notes for a given task ID.\
    \ The value of the ID comes from the route parameter. |\n| `/notes/{id}` | `Delete`\
    \ | Deletes an existing note for a given ID. The value of the ID comes from the\
    \ route parameter. |\n\n#### Mapping Resources with Application Routes\n\nYou\
    \ have to map the resource identifiers with the HTTP serverвҖҷs application routes\
    \ to execute appropriate application handlers for the HTTP requests to RESTful\
    \ API resources. All routes are organized in the `routers` package, in which separate\
    \ Go source files are written to specify the routes for each resource path. In\
    \ this RESTful API application, three entities are used: `User`, `Task`, and `TaskNote`.\
    \ These entities are mapped with three resources: `\"/users\"`, `\"/tasks\"`,\
    \ and `\"/notes\"`.\n\nFigure [9-3](#A978-1-4842-1052-9_9_Chapter.html#Fig3) illustrates\
    \ the structure of the `routers` package directory:\n\n![A978-1-4842-1052-9_9_Fig3_HTML.jpg](A978-1-4842-1052-9_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3.** Structure of `routers` package\n\n#### Routes for the Users\
    \ Resource\n\nLetвҖҷs define the routes for the Users resource (see Listing [9-2](#A978-1-4842-1052-9_9_Chapter.html#FPar3)).\n\
    \n**Listing 9-2.** Routes for the Users Resource in `user.go`\n\n```go\npackage\
    \ routers\n\nimport (\n    \"github.com/gorilla/mux\"\n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\
    \n)\n\nfunc SetUserRoutes(router *mux.Router) *mux.Router {\n    router.HandleFunc(\"\
    /users/register\", controllers.Register).Methods(\"POST\")\n    router.HandleFunc(\"\
    /users/login\", controllers.Login).Methods(\"POST\")\n    return router\n}\n```\n\
    \nThe `SetUserRoutes` function receives a pointer to the Gorilla `mux` router\
    \ object (`mux.Router`) as an argument and returns the pointer of the `mux.Router`\
    \ object. Two routes are specified: for registering a new user and for user login\
    \ to the system. Application handler functions are called from the `controllers`\
    \ package, which is discussed later in the chapter."
