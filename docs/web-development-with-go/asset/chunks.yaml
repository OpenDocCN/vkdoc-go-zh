    # Dockerпјҡе®№еҷЁеҢ–еә”з”Ёе№іеҸ°


    Docker жҳҜдёҖдёӘдҫӣејҖеҸ‘дәәе‘ҳе’Ңзі»з»ҹз®ЎзҗҶе‘ҳеңЁе®№еҷЁиҷҡжӢҹеҢ–зҺҜеўғдёӯејҖеҸ‘гҖҒдәӨд»ҳе’ҢиҝҗиЎҢеә”з”Ёзҡ„е№іеҸ°гҖӮеә”з”Ёе®№еҷЁжҳҜдёҖз§ҚиҪ»йҮҸзә§зҡ„ Linux зҺҜеўғпјҢдҪ еҸҜд»ҘеҲ©з”Ёе®ғжқҘйғЁзҪІе’ҢиҝҗиЎҢзӢ¬з«ӢеҸҜйғЁзҪІзҡ„д»Јз ҒеҚ•е…ғгҖӮжң¬з« з®ҖиҰҒи®Ёи®әдәҶеҫ®жңҚеҠЎжһ¶жһ„пјҢеңЁиҜҘжһ¶жһ„дёӯпјҢзӢ¬з«ӢеҸҜйғЁзҪІзҡ„жңҚеҠЎеҚ•е…ғиў«з»„еҗҲиө·жқҘжһ„е»әжӣҙеӨ§зҡ„еә”з”ЁзЁӢеәҸгҖӮDocker
    е®№еҷЁпјҲеә”з”Ёе®№еҷЁпјүйқһеёёйҖӮеҗҲеңЁеҫ®жңҚеҠЎжһ¶жһ„дёӯиҝҗиЎҢеҫ®жңҚеҠЎгҖӮDocker дёҚд»…д»…жҳҜдёҖйЎ№жҠҖжңҜпјӣе®ғжҳҜдёҖдёӘз”ҹжҖҒзі»з»ҹпјҢи®©дҪ иғҪеӨҹд»Һеҗ„з§Қз»„д»¶пјҲзұ»дјјдәҺеҫ®жңҚеҠЎжһ¶жһ„дёӯзҡ„еҫ®жңҚеҠЎпјүдёӯеҝ«йҖҹз»„еҗҲеә”з”ЁзЁӢеәҸгҖӮ


    еңЁдј з»ҹи®Ўз®—зҺҜеўғдёӯпјҢдҪ жҳҜдёәиҷҡжӢҹжңәпјҲVMпјүејҖеҸ‘еә”з”ЁзЁӢеәҸзҡ„пјҢе…¶зӣ®ж ҮжҳҜзҗҶжғіеҢ–зҡ„зЎ¬д»¶зҺҜеўғпјҢеҢ…жӢ¬ж“ҚдҪңзі»з»ҹгҖҒзҪ‘з»ңеҹәзЎҖи®ҫж–ҪеұӮзӯүгҖӮдҪҝз”Ёеә”з”Ёе®№еҷЁзҡ„жңҖеӨ§дјҳеҠҝеңЁдәҺпјҢе®ғиғҪе°Ҷеә”з”ЁзЁӢеәҸдёҺеҹәзЎҖи®ҫж–ҪеҸҠе…¶иҝҗиЎҢзҺҜеўғеҲҶзҰ»ејҖжқҘпјҢдёәеә”з”ЁзЁӢеәҸејҖеҸ‘иҖ…еёҰжқҘдәҶе·ЁеӨ§зҡ„жңәйҒҮгҖӮеҖҹеҠ©
    DockerпјҢејҖеҸ‘иҖ…зҺ°еңЁеҸҜд»Ҙй’ҲеҜ№зҗҶжғіеҢ–зҡ„ж“ҚдҪңзі»з»ҹпјҲдёҖдёӘйқҷжҖҒзҡ„ Linux зҺҜеўғпјүејҖеҸ‘еә”з”ЁзЁӢеәҸпјҢе№¶е°ҪеҸҜиғҪеҝ«йҖҹең°дәӨд»ҳд»–д»¬зҡ„еә”з”ЁгҖӮ


    Docker ж¶ҲйҷӨдәҶеңЁйғЁзҪІе’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸж—¶еҸҜиғҪеҮәзҺ°зҡ„еӨҚжқӮжҖ§е’ҢйҡңзўҚгҖӮе®ғиҝҳеңЁ Linux е®№еҷЁжҠҖжңҜд№ӢдёҠжҸҗдҫӣдәҶеҮәиүІзҡ„жҠҪиұЎеұӮпјҢдҪҝеҫ—еңЁе®№еҷЁиҷҡжӢҹеҢ–зҺҜеўғдёӢе·ҘдҪңеҸҳеҫ—е®№жҳ“пјҢиҖҢиҝҷжӯЈжҲҗдёә
    IT иЎҢдёҡзҡ„дёҖеңәйҮҚеӨ§йқ©е‘ҪпјҢиҝҷиҰҒеҪ’еҠҹдәҺ Docker з”ҹжҖҒзі»з»ҹгҖӮ


    Docker жҳҜз”Ё Go иҜӯиЁҖејҖеҸ‘зҡ„пјҢGo жӯЈжҲҗдёәжһ„е»әи®ёеӨҡеҲӣж–°зі»з»ҹзҡ„йҰ–йҖүиҜӯиЁҖгҖӮеңЁе®№еҷЁз”ҹжҖҒзі»з»ҹдёӯпјҢеӨ§еӨҡж•°зі»з»ҹйғҪжҳҜз”Ё Go ејҖеҸ‘зҡ„гҖӮ**Kubernetes**
    е°ұжҳҜдёҖдёӘз”Ё Go ејҖеҸ‘зҡ„жҠҖжңҜзӨәдҫӢпјҢз”ЁдәҺеҜ№еә”з”Ёе®№еҷЁиҝӣиЎҢйӣҶзҫӨз®ЎзҗҶгҖӮдҪ д№ҹеҸҜд»ҘдҪҝз”Ё Kubernetes жқҘеҜ№ Docker еә”з”ЁзЁӢеәҸиҝӣиЎҢйӣҶзҫӨз®ЎзҗҶгҖӮ


    е°Ҫз®Ў Docker жҳҜдёҖз§Қ Linux жҠҖжңҜпјҢдҪҶдҪ д№ҹеҸҜд»ҘйҖҡиҝҮдҪҝз”Ё Docker ToolboxпјҲ`www.docker.com/docker-toolbox`пјүеңЁ
    Mac е’Ң Windows зі»з»ҹдёҠиҝҗиЎҢе®ғгҖӮиҰҒиҺ·еҸ–жӣҙеӨҡе…ідәҺ Docker зҡ„дҝЎжҒҜпјҢиҜ·жҹҘйҳ…е…¶ж–ҮжЎЈпјҢзҪ‘еқҖдёә `https://docs.docker.com/`гҖӮ


    Docker з”ҹжҖҒзі»з»ҹз”ұд»ҘдёӢйғЁеҲҶз»„жҲҗпјҡ


    *   **Docker Engine**пјҡдёҖз§ҚиҪ»йҮҸзә§гҖҒеҠҹиғҪејәеӨ§гҖҒејҖжәҗзҡ„е®№еҷЁиҷҡжӢҹеҢ–жҠҖжңҜпјҢе№¶йӣҶжҲҗдәҶз”ЁдәҺжһ„е»әе’Ңе®№еҷЁеҢ–еә”з”ЁзЁӢеәҸзҡ„е·ҘдҪңжөҒзЁӢгҖӮ

    *   **Docker Hub**пјҡдёҖдёӘ SaaS й—ЁжҲ·зҪ‘з«ҷпјҲ`https://hub.docker.com/`пјүпјҢз”ЁдәҺе…ұдә«е’Ңз®ЎзҗҶиў«з§°дёә Docker й•ңеғҸзҡ„еә”з”Ёе Ҷж ҲгҖӮ


    еңЁ Docker дёӯпјҢй•ңеғҸе’Ңе®№еҷЁжҳҜйҮҚиҰҒзҡ„жҰӮеҝөгҖӮе®№еҷЁжҳҜеҠ иҪҪдәҶй•ңеғҸзҡ„ Linux ж“ҚдҪңзі»з»ҹзҡ„вҖңзІҫз®ҖвҖқзүҲжң¬гҖӮе®№еҷЁжҳҜд»Һй•ңеғҸеҲӣе»әзҡ„пјҢй•ңеғҸжҳҜдёҚеҸҜеҸҳзҡ„ж–Үд»¶пјҢжҸҗдҫӣдәҶе®№еҷЁзҡ„еҝ«з…§гҖӮдҪ еҸҜд»ҘеҜ№зҺ°жңүй•ңеғҸиҝӣиЎҢжӣҙж”№пјҢдҪҶдјҡе°Ҷе…¶жҢҒд№…еҢ–дёәдёҖдёӘж–°й•ңеғҸгҖӮй•ңеғҸдҪҝз”Ё
    `docker build` е‘Ҫд»ӨеҲӣе»әгҖӮеҪ“дҪҝз”Ё `docker run` е‘Ҫд»ӨиҝҗиЎҢиҝҷдәӣй•ңеғҸж—¶пјҢе°ұдјҡз”ҹжҲҗдёҖдёӘе®№еҷЁгҖӮй•ңеғҸеӯҳеӮЁеңЁ Docker жіЁеҶҢиЎЁзі»з»ҹдёӯпјҢдҫӢеҰӮ
    Docker HubпјҲз”ұ Docker жҸҗдҫӣпјүд»ҘеҸҠз§ҒжңүжіЁеҶҢиЎЁзі»з»ҹгҖӮ


    ## зј–еҶҷ Dockerfile


    еңЁжң¬з« дёӯпјҢзӣ®ж ҮжҳҜеҲӣе»әдёҖдёӘ DockerfileпјҢжқҘиҮӘеҠЁеҢ– TaskManager еә”з”ЁзЁӢеәҸзҡ„жһ„е»әиҝҮзЁӢпјҢдҪҝе…¶иғҪеңЁ Docker еҢ–е®№еҷЁдёӯиҝҗиЎҢгҖӮ


    еңЁдҪҝз”Ё Docker ж—¶пјҢдҪ еҸҜд»ҘйҖҡиҝҮжүӢеҠЁдҝ®ж”№еҹәзЎҖй•ңеғҸжҲ–жһ„е»ә Dockerfile жқҘеҲӣе»әеә”з”Ёе®№еҷЁгҖӮDockerfile жҳҜдёҖдёӘж–Үжң¬ж–ҮжЎЈпјҢеҢ…еҗ«дәҶиҮӘеҠЁеҲӣе»әжүҖйңҖй•ңеғҸзҡ„жүҖжңүжҢҮд»Өе’Ңе‘Ҫд»ӨпјҢж— йңҖжүӢеҠЁиҝҗиЎҢе‘Ҫд»ӨгҖӮDockerfile
    е…Ғи®ёдҪ иҮӘеҠЁеҢ–жһ„е»әиҝҮзЁӢпјҢд»Ҙжү§иЎҢиӢҘе№Іе‘Ҫд»ӨиЎҢжҢҮд»ӨгҖӮ`docker build` е‘Ҫд»Өж №жҚ® Dockerfile е’Ңжһ„е»әдёҠдёӢж–Үжһ„е»әй•ңеғҸгҖӮ


    йҖҡиҝҮе°ҶдёҖдёӘж–Үжң¬ж–Үд»¶е‘ҪеҗҚдёә `Dockerfile`пјҲдёҚеёҰж–Үд»¶жү©еұ•еҗҚпјүжқҘеҲӣе»ә DockerfileгҖӮйҖҡеёёпјҢдҪ дјҡе°ҶжӯӨж–Үд»¶ж”ҫеңЁйЎ№зӣ®д»“еә“зҡ„ `root` зӣ®еҪ•дёӢгҖӮ


    жё…еҚ• 9-23 жҸҗдҫӣдәҶ TaskManager еә”з”ЁзЁӢеәҸзҡ„ DockerfileгҖӮ


    **жё…еҚ• 9-23.** TaskManager еә”з”ЁзЁӢеәҸзҡ„ Dockerfile


    ```

    # дҪҝз”Ё golang й•ңеғҸпјҢе…¶дёӯе·ҘдҪңз©әй—ҙпјҲGOPATHпјүй…ҚзҪ®еңЁ /go дёӢгҖӮ

    FROM golang


    # е°Ҷжң¬ең°еҢ…ж–Үд»¶еӨҚеҲ¶еҲ°е®№еҷЁзҡ„е·ҘдҪңз©әй—ҙгҖӮ

    ADD . /go/src/github.com/shijuvar/go-web/taskmanager


    # и®ҫзҪ®е·ҘдҪңзӣ®еҪ•

    WORKDIR /go/src/github.com/shijuvar/go-web/taskmanager


    # иҺ·еҸ– godeps з”ЁдәҺз®ЎзҗҶе’ҢжҒўеӨҚдҫқиө–йЎ№

    RUN go get github.com/tools/godep


    # жҒўеӨҚ godep дҫқиө–йЎ№

    RUN godep restore


    # еңЁе®№еҷЁеҶ…жһ„е»ә taskmanager е‘Ҫд»ӨгҖӮ

    RUN go install github.com/shijuvar/go-web/taskmanager


    # е®№еҷЁеҗҜеҠЁж—¶иҝҗиЎҢ taskmanager е‘Ҫд»ӨгҖӮ

    ENTRYPOINT /go/bin/taskmanager


    # жңҚеҠЎзӣ‘еҗ¬ 8080 з«ҜеҸЈгҖӮ

    EXPOSE 8080

    ```


    и®©жҲ‘д»¬жҺўзҙўдёҖдёӢ Dockerfile дёӯдҪҝз”Ёзҡ„е‘Ҫд»Өпјҡ


    *   `FROM golang` е‘Ҫд»ӨжҢҮзӨә Docker д»Һе®ҳж–№зҡ„ `golang` Docker й•ңеғҸејҖе§ӢпјҢиҝҷжҳҜдёҖдёӘе®үиЈ…дәҶжңҖж–°зүҲжң¬ Go зҡ„ Debian
    й•ңеғҸпјҢе№¶дё”е·ҘдҪңз©әй—ҙпјҲ`GOPATH`пјүй…ҚзҪ®еңЁ `/go`гҖӮ

    *   `ADD` е‘Ҫд»Өе°Ҷжң¬ең°д»Јз ҒеӨҚеҲ¶еҲ°е®№еҷЁзҡ„е·ҘдҪңз©әй—ҙгҖӮ

    *   `WORKDIR` е‘Ҫд»ӨеңЁе®№еҷЁеҶ…и®ҫзҪ®е·ҘдҪңзӣ®еҪ•гҖӮ

    *   `RUN` е‘Ҫд»ӨеңЁе®№еҷЁеҶ…иҝҗиЎҢе‘Ҫд»ӨгҖӮдҪҝз”Ё `RUN` е‘Ҫд»ӨпјҢеҸҜд»Ҙе®үиЈ… `godep` е·Ҙе…·гҖӮ

    *   `godep restore` е‘Ҫд»Өе°Ҷдҫқиө–йЎ№жҒўеӨҚеҲ°е®№еҷЁзҡ„ `GOPATH` дҪҚзҪ®гҖӮ

    *   дҪҝз”Ё `go install` е‘Ҫд»ӨпјҢ`taskmanager` е‘Ҫд»ӨдјҡеңЁе®№еҷЁеҶ…зҡ„ `GOPATH/bin` дҪҚзҪ®пјҲ`/go/bin`пјүиҝҗиЎҢгҖӮ

    *   `ENTRYPOINT` е‘Ҫд»ӨжҢҮзӨә Docker еңЁе®№еҷЁеҗҜеҠЁж—¶д»Һ `/go/bin` дҪҚзҪ®иҝҗиЎҢ `taskmanager` е‘Ҫд»ӨгҖӮ

    *   `EXPOSE` е‘Ҫд»ӨжҢҮзӨә Docker е®№еҷЁеңЁиҝҗиЎҢж—¶зӣ‘еҗ¬жҢҮе®ҡзҡ„зҪ‘з»ңз«ҜеҸЈгҖӮе®ғжҡҙйңІдәҶ 8080 з«ҜеҸЈгҖӮ`EXPOSE` е‘Ҫд»ӨдёҚдјҡе°Ҷе®№еҷЁзҡ„з«ҜеҸЈе…¬ејҖз»ҷеӨ–з•ҢгҖӮдёәжӯӨпјҢйңҖиҰҒдҪҝз”ЁеҸ‘еёғж Үеҝ—пјҲ`--publish`пјүйҖҡиҝҮдёҺеӨ–йғЁ
    HTTP з«ҜеҸЈжҳ е°„жқҘжү“ејҖз«ҜеҸЈгҖӮ


    з”ЁдәҺеңЁ Docker еә”з”Ёе®№еҷЁдёӯжһ„е»әе’ҢиҝҗиЎҢ TaskManager API жңҚеҠЎеҷЁзҡ„ Dockerfile е·Із»Ҹе®ҢжҲҗгҖӮзҺ°еңЁи®©жҲ‘д»¬ж №жҚ®иҜҘ Dockerfile
    жһ„е»әй•ңеғҸгҖӮеңЁ TaskManager еә”з”ЁзЁӢеәҸзҡ„ `root` зӣ®еҪ•дёӢиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ


    ```

    docker build -t taskmanager

    ```


    йҖҡиҝҮжү§иЎҢ Dockerfile дёӯе®ҡд№үзҡ„жҢҮд»ӨпјҢе°Ҷжһ„е»әдёҖдёӘжң¬ең°й•ңеғҸгҖӮз”ҹжҲҗзҡ„й•ңеғҸж Үзӯҫдёә `taskmanager`гҖӮ


    дёҖдёӘеҗҚдёә `taskmanager` зҡ„й•ңеғҸпјҲDocker жһ„е»әзҡ„з»“жһңй•ңеғҸпјүе·ІеҲӣе»әгҖӮдҪҝз”Ёд»ҘдёӢе‘Ҫд»Өд»ҺжӯӨй•ңеғҸиҝҗиЎҢдёҖдёӘе®№еҷЁпјҡ


    ```

    docker run --publish 80:8080 --name taskmanager_api --rm taskmanager

    ```


    и®©жҲ‘д»¬жҺўзҙўдёҖдёӢ `docker run` е‘Ҫд»ӨдёӯдҪҝз”Ёзҡ„ж Үеҝ—пјҡ


    *   `--publish` ж Үеҝ—жҢҮзӨә Docker е°Ҷе®№еҷЁжҡҙйңІзҡ„ 8080 з«ҜеҸЈеҸ‘еёғеҲ°еӨ–йғЁ 80 з«ҜеҸЈгҖӮ

    *   `--name` ж Үеҝ—дёәд»Һ `taskmanager` й•ңеғҸеҲӣе»әзҡ„е®№еҷЁжҢҮе®ҡдёҖдёӘеҗҚз§°гҖӮиҜҘе®№еҷЁиў«е‘ҪеҗҚдёә `taskmanager_api`гҖӮ

    *   `--rm` ж Үеҝ—жҢҮзӨә Docker еңЁе®№еҷЁйҖҖеҮәж—¶з§»йҷӨе®№еҷЁй•ңеғҸгҖӮеҗҰеҲҷпјҢеҚідҪҝе®№еҷЁйҖҖеҮәпјҢе®№еҷЁй•ңеғҸд№ҹдјҡдҝқз•ҷгҖӮ


    `docker run` е‘Ҫд»ӨйҖҡиҝҮжҡҙйңІеӨ–йғЁз«ҜеҸЈ 80 жқҘиҝҗиЎҢе®№еҷЁгҖӮдҪ еҸҜд»ҘйҖҡиҝҮеҜјиҲӘеҲ° `http://localhost:80` жқҘи®ҝй—®иҜҘжңҚеҠЎеҷЁеә”з”ЁзЁӢеәҸгҖӮ


    TaskManager еә”з”ЁзЁӢеәҸзҡ„ Dockerfile жҸҗдҫӣдәҶеңЁеә”з”Ёе®№еҷЁеҶ…иҝҗиЎҢ HTTP жңҚеҠЎеҷЁжүҖйңҖзҡ„дёҖеҲҮгҖӮеҪ“дҪ е°Ҷ TaskManager еә”з”ЁзЁӢеәҸйҖҡиҝҮ
    Docker иҝҒз§»еҲ°з”ҹдә§зҺҜеўғж—¶пјҢеҫ…еӨ„зҗҶзҡ„ж“ҚдҪңжҳҜе°Ҷ MongoDB е®һзҺ°еңЁеә”з”Ёе®№еҷЁдёӯгҖӮTaskManager еә”з”ЁзЁӢеәҸдҪҝз”Ё MongoDB дҪңдёәжҢҒд№…еҢ–еӯҳеӮЁпјҢеӣ жӯӨдҪ еҝ…йЎ»еңЁеҸҰдёҖдёӘе®№еҷЁдёӯиҝҗиЎҢ
    MongoDB ж•°жҚ®еә“гҖӮдҪ еҸҜд»ҘдҪҝз”ЁдёҖдёӘе®№еҷЁжқҘиҝҗиЎҢ HTTP жңҚеҠЎеҷЁпјҢдҪҝз”ЁеҸҰдёҖдёӘе®№еҷЁжқҘиҝҗиЎҢ MongoDB ж•°жҚ®еә“гҖӮ

