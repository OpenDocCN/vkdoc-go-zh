- fmt: "# Goroutines\n\nIn Go, a goroutine is the primary mechanism for running programs\
    \ concurrently. Goroutines let you run functions concurrently with other functions,\
    \ and you can run a function as a goroutine to access the concurrency capability\
    \ of Go. When you create a function as a goroutine, it works as an independent\
    \ task unit that runs concurrently with other goroutines. In short, a goroutine\
    \ is a lightweight thread managed by the Go runtime.\n\nThe most powerful capability\
    \ of GoвҖҷs concurrency is that everything related to concurrency is fully managed\
    \ by the Go runtime, but not the OS resources. Go runtime has a powerful piece\
    \ of software component called the scheduler that controls and manages everything\
    \ related to the scheduling and running of goroutines. Because the Go runtime\
    \ has the full control over the concurrent tasks running with goroutines, it enables\
    \ high performance and better control to your applications when you leverage the\
    \ concurrency capabilities of Go.\n\nTo invoke a function as a goroutine, use\
    \ the keyword `go`:\n\n```\ngo function()\n```\n\nBecause goroutines are treated\
    \ as independent units that are running concurrently, ensure that all goroutines\
    \ are getting executed before the main program is terminated. You can achieve\
    \ this by using the `WaitGroup` type provided by the `sync` standard library package.\n\
    \nListing [3-18] is an example program in which two goroutines are launched and\
    \ executed before terminating the program.\n\n**Listing 3-18.** Concurrency with\
    \ Goroutines\n\n```\n// This sample program demonstrates how to create goroutines\n\
    \npackage main\n\nimport (\n    \"fmt\"\n    \"math/rand\"\n    \"sync\"\n   \
    \ \"time\"\n)\n\n// wg is used to wait for the program to finish goroutines.\n\
    var wg sync.WaitGroup\n\nfunc main() {\n    // Add a count of two, one for each\
    \ goroutine.\n    wg.Add(2)\n    fmt.Println(\"Start Goroutines\")\n    // launch\
    \ a goroutine with label \"A\"\n    go printCounts(\"A\")\n    // launch a goroutine\
    \ with label \"B\"\n    go printCounts(\"B\")\n    // Wait for the goroutines\
    \ to finish.\n    fmt.Println(\"Waiting To Finish\")\n    wg.Wait()\n    fmt.Println(\"\
    \\nTerminating Program\")\n}\n\nfunc printCounts(label string) {\n    // Schedule\
    \ the call to WaitGroup's Done to tell we are done.\n    defer wg.Done()\n   \
    \ // Randomly wait\n    for count := 1; count <= 10; count++ {\n        sleep\
    \ := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) * time.Millisecond)\n\
    \        fmt.Printf(\"Count: %d from %s\\n\", count, label)\n    }\n}\n```\n\n\
    When you run the program, you see the following output. It will vary each time\
    \ because of the random wait during the program execution:\n\n```\nStart Goroutines\n\
    Waiting To Finish\nCount: 1 from A\nCount: 1 from B\nCount: 2 from B\nCount: 2\
    \ from A\nCount: 3 from B\nCount: 3 from A\nCount: 4 from A\nCount: 5 from A\n\
    Count: 4 from B\nCount: 6 from A\nCount: 5 from B\nCount: 7 from A\nCount: 6 from\
    \ B\nCount: 7 from B\nCount: 8 from A\nCount: 8 from B\nCount: 9 from B\nCount:\
    \ 9 from A\nCount: 10 from A\nCount: 10 from B\nTerminating Program\n```\n\nA\
    \ function named `printCounts` is created that is called two times as a goroutine:\n\
    \n```\n// launch a goroutine with label \"A\"\ngo printCounts(\"A\")\n// launch\
    \ a goroutine with label \"B\"\ngo printCounts(\"B\")\n```\n\nTo ensure that all\
    \ goroutines are executed before the program is terminated, use `WaitGroup`, which\
    \ is provided by the `sync` package:\n\n```\nvar wg sync.WaitGroup\n```\n\nIn\
    \ the `main` function, add a count of `2` into the `WaitGroup` for the two goroutines:\n\
    \n```\nwg.Add(2)\n```\n\nLaunch two goroutines by using the keyword `go`:\n\n\
    ```\n// launch a goroutine with label \"A\"\ngo printCounts(\"A\")\n// launch\
    \ a goroutine with label \"B\"\ngo printCounts(\"B\")\n```\n\nIn the `printCounts`\
    \ function, the values from 1 to 10 are printed. For the sake of the demo, the\
    \ execution is randomly delayed.\n\n```\nfunc printCounts(label string) {\n  \
    \  // Schedule the call to WaitGroup's Done to tell we are done.\n    defer wg.Done()\n\
    \    // Randomly wait\n    for count := 1; count <= 10; count++ {\n        sleep\
    \ := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) * time.Millisecond)\n\
    \        fmt.Printf(\"Count: %d from %s\\n\", count, label)\n    }\n}\n```\n\n\
    In the beginning of the `printCounts` function, the `Done` method of the `WaitGroup`\
    \ type is scheduled to call to tell the `main` program that the goroutine has\
    \ executed. The `Done` method of the `WaitGroup` type is scheduled to call using\
    \ the keyword `defer` (as discussed in [Chapter 2]). This keyword allows you to\
    \ schedule other functions to be called when the function returns. In this example,\
    \ the `Done` method will be invoked when the goroutine is executed, which ensures\
    \ that the value of `WaitGroup` is decremented so the `main` function can check\
    \ whether any goroutine is yet to be executed. In the `main` function, the `Wait`\
    \ method of `WaitGroup` is called, which will check the count of `WaitGroup` and\
    \ will block the program until it becomes zero. When the `Done` method of `WaitGroup`\
    \ is called, the count will be decremented by one. At the beginning of the execution,\
    \ the count is added as 2. When `Wait` is called, it will wait for the count to\
    \ turn zero, thereby ensuring that both the goroutines are executed before the\
    \ program terminates. When the count becomes zero, the program terminates:\n\n\
    ```\nwg.Wait()\n```\n\n# GOMAXPROCS and Parallelism\n\nThe Go runtime scheduler\
    \ manages the goroutine execution by leveraging the number of OS threads to attempt\
    \ goroutine executions simultaneously. The value for the OS threads is taken from\
    \ the `GOMAXPROCS` environment variable. Prior to Go 1.5, the default setting\
    \ of `GOMAXPROCS` was 1, meaning that goroutines were running on a single OS thread\
    \ by default. (Keep in mind that Go runtime can execute thousands of goroutines\
    \ on a single OS thread.) With Go 1.5, the default setting of `GOMAXPROCS` was\
    \ changed to the number of CPUs available, as determined by the `NumCPU` function\
    \ provided by the `runtime` package. This default behavior lets the Go programs\
    \ leverage all available CPU cores for running goroutines in parallel. The value\
    \ of the `GOMAXPROCS` can be set by explicitly using the `GOMAXPROCS` environment\
    \ variable or by calling `runtime.GOMAXPROCS` from within a program.\n\nThe simultaneous\
    \ execution of goroutines is achieved by raising the `GOMAXPROCS` setting. This\
    \ behavior is parallelism. Concurrency is not parallelism; concurrency in Go is\
    \ designing a program by breaking it into goroutines (as subprograms or tasks)\
    \ that can be executed independently by leveraging available resources. Parallelism\
    \ is about doing lots of computations at once. In parallelism, more CPU cores\
    \ are leveraged to enable the simultaneous execution of goroutines as much as\
    \ possible.\n\nIn many cases, parallelism can provide better performance because\
    \ the Go runtime can run goroutines in parallel by leveraging all the available\
    \ compute resources of a computer. Remember that running goroutines in parallel\
    \ canвҖҷt always provide better performance because it depends on your program context.\
    \ Sometimes concurrency can outperform parallelism because parallelism may put\
    \ more strain on the OSвҖҷs resources.\n\nYou can control the `GOMAXPROCS` setting\
    \ in your program based on the context of your applications. Listing [3-19] is\
    \ a code block that modifies the `GOMAXPROCS` to one from its default setting:\n\
    \n**Listing 3-19.** Explicitly Set GOMAXPROCS Setting\n\n```\nimport \"runtime\"\
    \n\n// Set the value of GOMAXPROCS.\nruntime.GOMAXPROCS(1)\n```\n\n**Note:** Check\
    \ out Rob PikeвҖҷs excellent presentation, вҖңConcurrency Is Not ParallelismвҖқ to understand\
    \ the difference between concurrency and parallelism: [`www.youtube.com/watch?v=cN_DpYBzKso`](http://www.youtube.com/watch?v=cN_DpYBzKso)"
  raw: '### Goroutines


    In Go, a goroutine is the primary mechanism for running programs concurrently.
    Goroutines let you run functions concurrently with other functions, and you can
    run a function as a goroutine to access the concurrency capability of Go. When
    you create a function as a goroutine, it works as an independent task unit that
    runs concurrently with other goroutines. In short, a goroutine is a lightweight
    thread managed by the Go runtime.


    The most powerful capability of GoвҖҷs concurrency is that everything related to
    concurrency is fully managed by the Go runtime, but not the OS resources. Go runtime
    has a powerful piece of software component called the scheduler that controls
    and manages everything related to the scheduling and running of goroutines. Because
    the Go runtime has the full control over the concurrent tasks running with goroutines,
    it enables high performance and better control to your applications when you leverage
    the concurrency capabilities of Go.


    To invoke a function as a goroutine, use the keyword `go` :


    `go function()`


    Because goroutines are treated as independent units that are running concurrently,
    ensure that all goroutines are getting executed before the main program is terminated.
    You can achieve this by using the `WaitGroup` type provided by the `sync` standard
    library package.


    Listing [3-18](#A978-1-4842-1052-9_3_Chapter.html#FPar19) is an example program
    in which two goroutines are launched and executed before terminating the program.


    Listing 3-18.В В Concurrency with Goroutines


    `// This sample program demonstrates how to create goroutines`


    `package main`


    `import (`


    `"fmt"`


    `"math/rand"`


    `"sync"`


    `"time"`


    `)`


    `// wg is used to wait for the program to finish goroutines.`


    `var wg sync.WaitGroup`


    `func main() {`


    `// Add a count of two, one for each goroutine.`


    `wg.Add(2)`


    `fmt.Println("Start Goroutines")`


    `//launch a goroutine with label "A"`


    `go printCounts("A")`


    `//launch a goroutine with label "B"`


    `go printCounts("B")`


    `// Wait for the goroutines to finish.`


    `fmt.Println("Waiting To Finish")`


    `wg.Wait()`


    `fmt.Println("\nTerminating Program")`


    `}`


    `func printCounts(label string) {`


    `// Schedule the call to WaitGroupвҖҷs Done to tell we are done.`


    `defer wg.Done()`


    `// Randomly wait`


    `for count := 1; count <= 10; count++ {`


    `sleep := rand.Int63n(1000)`


    `time.Sleep(time.Duration(sleep) * time.Millisecond)`


    `fmt.Printf("Count: %d from %s\n", count, label)`


    `}`


    `}`


    When you run the program, you see the following output. It will vary each time
    because of the random wait during the program execution:


    `Start Goroutines`


    `Waiting To Finish`


    `Count: 1 from A`


    `Count: 1 from B`


    `Count: 2 from B`


    `Count: 2 from A`


    `Count: 3 from` `B`


    `Count: 3 from A`


    `Count: 4 from A`


    `Count: 5 from A`


    `Count: 4 from B`


    `Count: 6 from A`


    `Count: 5 from B`


    `Count: 7 from A`


    `Count: 6 from B`


    `Count: 7 from B`


    `Count: 8 from A`


    `Count: 8 from B`


    `Count: 9 from B`


    `Count: 9 from A`


    `Count: 10 from A`


    `Count: 10 from B`


    `Terminating Program`


    A function named `printCounts` is created that is called two times as a goroutine:


    `//launch a goroutine with label "A"`


    `go printCounts("A")`


    `//launch a goroutine with label "B"`


    `go printCounts("B")`


    To ensure that all goroutines are executed before the program is terminated, use
    `WaitGroup`, which is provided by the `sync` package:


    `var wg sync.WaitGroup`


    In the `main` function, add a count of `2` into the `WaitGroup` for the two goroutines:


    `wg.Add(2)`


    Launch two goroutines by using the keyword `go`:


    `//launch a goroutine with label "A"`


    `go printCounts("A")`


    `//launch a goroutine with label "B"`


    `go printCounts("B")`


    In the `printCounts` function, the values from 1 to 10 are printed. For the sake
    of the demo, the execution is randomly delayed.


    `func printCounts(label string) {`


    `// Schedule the call to WaitGroupвҖҷs Done to tell we are done.`


    `defer wg.Done()`


    `// Randomly wait`


    `for count := 1; count <= 10; count++ {`


    `sleep := rand.Int63n(1000)`


    `time.Sleep(time.Duration(sleep) * time.Millisecond)`


    `fmt.Printf("Count: %d from %s\n", count, label)`


    `}`


    `}`


    In the beginning of the `printCounts` function, the `Done` method of the `WaitGroup`
    type is scheduled to call to tell the `main` program that the goroutine has executed.
    The `Done` method of the `WaitGroup` type is scheduled to call using the keyword
    `defer (as` discussed in [Chapter 2](#A978-1-4842-1052-9_2_Chapter.html)). This
    keyword allows you to schedule other functions to be called when the function
    returns. In this example, the `Done` method will be invoked when the goroutine
    is executed, which ensures that the value of `WaitGroup is decremented` so the
    `main` function can check whether any goroutine is yet to be executed. In the
    `main` function, the `Wait` method of `WaitGroup is called` , which will check
    the count of `WaitGroup` and will block the program until it becomes zero. When
    the `Done` method of `WaitGroup is called`, the count will be decremented by one.
    At the beginning of the execution, the count is added as 2\. When `Wait` is called,
    it will wait for the count to turn zero, thereby ensuring that both the goroutines
    are executed before the program terminates. When the count becomes zero, the program
    terminates:


    `wg.Wait()`


    ### GOMAXPROCS and Parallelism


    The Go runtime scheduler manages the goroutine execution by leveraging the number
    of OS threads to attempt goroutine executions simultaneously. The value for the
    OS threads is taken from the `GOMAXPROCS` environment variable. Prior to Go 1.5,
    the default setting of `GOMAXPROCS` was 1, meaning that goroutines were running
    on a single OS thread by default. (Keep in mind that Go runtime can execute thousands
    of goroutines on a single OS thread.) With Go 1.5, the default setting of `GOMAXPROCS`
    was changed to the number of CPUs available, as determined by the `NumCPU` function
    provided by the `runtime` package. This default behavior lets the Go programs
    leverage all available CPU cores for running goroutines in parallel. The value
    of the `GOMAXPROCS` can be set by explicitly using the `GOMAXPROCS` environment
    variable or by calling `runtime.GOMAXPROCS` from within a program.


    The simultaneous execution of goroutines is achieved by raising the `GOMAXPROCS`
    setting. This behavior is parallelism. Concurrency is not parallelism; concurrency
    in Go is designing a program by breaking it into goroutines (as subprograms or
    tasks) that can be executed independently by leveraging available resources. Parallelism
    is about doing lots of computations at once. In parallelism, more CPU cores are
    leveraged to enable the simultaneous execution of goroutines as much as possible.


    In many cases, parallelism can provide better performance because the Go runtime
    can run goroutines in parallel by leveraging all the available compute resources
    of a computer. Remember that running goroutines in parallel canвҖҷt always provide
    better performance because it depends on your program context. Sometimes concurrency
    can outperform parallelism because parallelism may put more strain on the OSвҖҷs
    resources.


    You can control the `GOMAXPROCS` setting in your program based on the context
    of your applications. Listing [3-19](#A978-1-4842-1052-9_3_Chapter.html#FPar20)
    is a code block that modifies the `GOMAXPROCS` to one from its default setting:


    Listing 3-19.В В Explicitly Set GOMAXPROCS Setting


    `import "runtime"`


    `// Set the value of` `GOMAXPROCS` `.`


    `runtime.GOMAXPROCS(1)`


    Note


    Check out Rob PikeвҖҷs excellent presentation, вҖңConcurrency Is Not ParallelismвҖқ
    to understand the difference between concurrency and parallelism: [`www.youtube.com/watch?v=cN_DpYBzKso`](http://www.youtube.com/watch?v=cN_DpYBzKso)'
  trans: "\n# GoroutineпјҲеҚҸзЁӢпјү\n\nеңЁ Go иҜӯиЁҖдёӯпјҢgoroutine жҳҜе®һзҺ°зЁӢеәҸе№¶еҸ‘иҝҗиЎҢзҡ„дё»иҰҒжңәеҲ¶гҖӮGoroutine е…Ғи®ёдҪ е°ҶеҮҪж•°дёҺе…¶д»–еҮҪж•°е№¶еҸ‘жү§иЎҢпјҢйҖҡиҝҮе°ҶеҮҪж•°дҪңдёә\
    \ goroutine и°ғз”ЁеҚіеҸҜи®ҝй—® Go зҡ„е№¶еҸ‘иғҪеҠӣгҖӮеҪ“дҪ е°ҶдёҖдёӘеҮҪж•°еҲӣе»әдёә goroutine ж—¶пјҢе®ғдјҡдҪңдёәдёҖдёӘзӢ¬з«Ӣзҡ„д»»еҠЎеҚ•е…ғпјҢдёҺе…¶д»– goroutine\
    \ е№¶еҸ‘иҝҗиЎҢгҖӮз®ҖиҖҢиЁҖд№ӢпјҢgoroutine жҳҜз”ұ Go иҝҗиЎҢж—¶з®ЎзҗҶзҡ„иҪ»йҮҸзә§зәҝзЁӢгҖӮ\n\nGo е№¶еҸ‘жңҖејәеӨ§зҡ„иғҪеҠӣеңЁдәҺпјҢжүҖжңүдёҺе№¶еҸ‘зӣёе…ізҡ„еҶ…е®№е®Ңе…Ёз”ұ Go иҝҗиЎҢж—¶з®ЎзҗҶпјҢиҖҢйқһж“ҚдҪңзі»з»ҹиө„жәҗгҖӮGo\
    \ иҝҗиЎҢж—¶жӢҘжңүдёҖдёӘеҗҚдёәи°ғеәҰеҷЁзҡ„ејәеӨ§иҪҜд»¶з»„д»¶пјҢе®ғжҺ§еҲ¶е№¶з®ЎзҗҶжүҖжңүдёҺ goroutine и°ғеәҰе’ҢиҝҗиЎҢзӣёе…ізҡ„ж“ҚдҪңгҖӮз”ұдәҺ Go иҝҗиЎҢж—¶е®Ңе…ЁжҺ§еҲ¶зқҖдҪҝз”Ё goroutine\
    \ иҝҗиЎҢзҡ„е№¶еҸ‘д»»еҠЎпјҢеӣ жӯӨеҪ“дҪ еҲ©з”Ё Go зҡ„е№¶еҸ‘иғҪеҠӣж—¶пјҢе®ғеҸҜд»Ҙе®һзҺ°й«ҳжҖ§иғҪе№¶еҜ№еә”з”ЁзЁӢеәҸжҸҗдҫӣжӣҙеҘҪзҡ„жҺ§еҲ¶гҖӮ\n\nиҰҒи°ғз”ЁдёҖдёӘеҮҪж•°дҪңдёә goroutineпјҢиҜ·дҪҝз”Ёе…ій”®еӯ—\
    \ `go`пјҡ\n\n```\ngo function()\n```\n\nз”ұдәҺ goroutine иў«и§ҶдёәзӢ¬з«Ӣе№¶еҸ‘иҝҗиЎҢзҡ„еҚ•е…ғпјҢиҜ·зЎ®дҝқжүҖжңү goroutine\
    \ еңЁдё»зЁӢеәҸз»ҲжӯўеүҚйғҪеҫ—еҲ°жү§иЎҢгҖӮдҪ еҸҜд»ҘйҖҡиҝҮдҪҝз”Ё `sync` ж ҮеҮҶеә“еҢ…жҸҗдҫӣзҡ„ `WaitGroup` зұ»еһӢжқҘе®һзҺ°иҝҷдёҖзӮ№гҖӮ\n\nжё…еҚ• [3-18] жҳҜдёҖдёӘзӨәдҫӢзЁӢеәҸпјҢе…¶дёӯеҗҜеҠЁдәҶдёӨдёӘ\
    \ goroutineпјҢе№¶еңЁзЁӢеәҸз»ҲжӯўеүҚжү§иЎҢе®ғд»¬гҖӮ\n\n**жё…еҚ• 3-18.** дҪҝз”Ё Goroutine е®һзҺ°е№¶еҸ‘\n\n```\n// жӯӨзӨәдҫӢзЁӢеәҸжј”зӨәеҰӮдҪ•еҲӣе»ә\
    \ goroutine\n\npackage main\n\nimport (\n    \"fmt\"\n    \"math/rand\"\n    \"\
    sync\"\n    \"time\"\n)\n\n// wg з”ЁдәҺзӯүеҫ…зЁӢеәҸе®ҢжҲҗ goroutine зҡ„жү§иЎҢгҖӮ\nvar wg sync.WaitGroup\n\
    \nfunc main() {\n    // ж·»еҠ и®Ўж•° 2пјҢжҜҸдёӘ goroutine еҜ№еә”дёҖдёӘгҖӮ\n    wg.Add(2)\n    fmt.Println(\"\
    еҗҜеҠЁ Goroutines\")\n    // еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"A\" зҡ„ goroutine\n    go printCounts(\"A\")\n\
    \    // еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"B\" зҡ„ goroutine\n    go printCounts(\"B\")\n    // зӯүеҫ… goroutine\
    \ е®ҢжҲҗгҖӮ\n    fmt.Println(\"зӯүеҫ…е®ҢжҲҗ\")\n    wg.Wait()\n    fmt.Println(\"\\n з»ҲжӯўзЁӢеәҸ\"\
    )\n}\n\nfunc printCounts(label string) {\n    // е®үжҺ’и°ғз”Ё WaitGroup зҡ„ Done ж–№жі•д»Ҙе‘ҠзҹҘжү§иЎҢе®ҢжҜ•гҖӮ\n\
    \    defer wg.Done()\n    // йҡҸжңәзӯүеҫ…\n    for count := 1; count <= 10; count++ {\n\
    \        sleep := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) *\
    \ time.Millisecond)\n        fmt.Printf(\"и®Ўж•°: %d жқҘиҮӘ %s\\n\", count, label)\n \
    \   }\n}\n```\n\nиҝҗиЎҢзЁӢеәҸж—¶пјҢдҪ дјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәгҖӮз”ұдәҺзЁӢеәҸжү§иЎҢиҝҮзЁӢдёӯзҡ„йҡҸжңәзӯүеҫ…пјҢжҜҸж¬Ўиҫ“еҮәйғҪдјҡжңүжүҖдёҚеҗҢпјҡ\n\n```\nеҗҜеҠЁ Goroutines\n\
    зӯүеҫ…е®ҢжҲҗ\nи®Ўж•°: 1 жқҘиҮӘ A\nи®Ўж•°: 1 жқҘиҮӘ B\nи®Ўж•°: 2 жқҘиҮӘ B\nи®Ўж•°: 2 жқҘиҮӘ A\nи®Ўж•°: 3 жқҘиҮӘ B\nи®Ўж•°: 3 жқҘиҮӘ A\n\
    и®Ўж•°: 4 жқҘиҮӘ A\nи®Ўж•°: 5 жқҘиҮӘ A\nи®Ўж•°: 4 жқҘиҮӘ B\nи®Ўж•°: 6 жқҘиҮӘ A\nи®Ўж•°: 5 жқҘиҮӘ B\nи®Ўж•°: 7 жқҘиҮӘ A\nи®Ўж•°: 6\
    \ жқҘиҮӘ B\nи®Ўж•°: 7 жқҘиҮӘ B\nи®Ўж•°: 8 жқҘиҮӘ A\nи®Ўж•°: 8 жқҘиҮӘ B\nи®Ўж•°: 9 жқҘиҮӘ B\nи®Ўж•°: 9 жқҘиҮӘ A\nи®Ўж•°: 10 жқҘиҮӘ\
    \ A\nи®Ўж•°: 10 жқҘиҮӘ B\nз»ҲжӯўзЁӢеәҸ\n```\n\nеҲӣе»әдәҶдёҖдёӘеҗҚдёә `printCounts` зҡ„еҮҪж•°пјҢиҜҘеҮҪж•°иў«дҪңдёә goroutine и°ғз”ЁдёӨж¬Ўпјҡ\n\
    \n```\n// еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"A\" зҡ„ goroutine\ngo printCounts(\"A\")\n// еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"B\" зҡ„\
    \ goroutine\ngo printCounts(\"B\")\n```\n\nдёәдәҶзЎ®дҝқжүҖжңү goroutine еңЁзЁӢеәҸз»ҲжӯўеүҚйғҪеҫ—еҲ°жү§иЎҢпјҢдҪҝз”ЁдәҶз”ұ `sync`\
    \ еҢ…жҸҗдҫӣзҡ„ `WaitGroup`пјҡ\n\n```\nvar wg sync.WaitGroup\n```\n\nеңЁ `main` еҮҪж•°дёӯпјҢдёәдёӨдёӘ goroutine\
    \ еҗ‘ `WaitGroup` ж·»еҠ и®Ўж•° `2`пјҡ\n\n```\nwg.Add(2)\n```\n\nдҪҝз”Ёе…ій”®еӯ— `go` еҗҜеҠЁдёӨдёӘ goroutineпјҡ\n\
    \n```\n// еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"A\" зҡ„ goroutine\ngo printCounts(\"A\")\n// еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"B\" зҡ„\
    \ goroutine\ngo printCounts(\"B\")\n```\n\nеңЁ `printCounts` еҮҪж•°дёӯпјҢжү“еҚ°дәҶд»Һ 1 еҲ° 10 зҡ„еҖјгҖӮдёәдәҶжј”зӨәж•ҲжһңпјҢжү§иЎҢиҝҮзЁӢиў«йҡҸжңәе»¶иҝҹгҖӮ\n\
    \n```\nfunc printCounts(label string) {\n    // е®үжҺ’и°ғз”Ё WaitGroup зҡ„ Done ж–№жі•д»Ҙе‘ҠзҹҘжү§иЎҢе®ҢжҜ•гҖӮ\n\
    \    defer wg.Done()\n    // йҡҸжңәзӯүеҫ…\n    for count := 1; count <= 10; count++ {\n\
    \        sleep := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) *\
    \ time.Millisecond)\n        fmt.Printf(\"и®Ўж•°: %d жқҘиҮӘ %s\\n\", count, label)\n \
    \   }\n}\n```\n\nеңЁ `printCounts` еҮҪж•°зҡ„ејҖеӨҙпјҢе®үжҺ’дәҶи°ғз”Ё `WaitGroup` зұ»еһӢзҡ„ `Done` ж–№жі•пјҢд»Ҙе‘ҠзҹҘ `main`\
    \ зЁӢеәҸиҜҘ goroutine е·Іжү§иЎҢе®ҢжҜ•гҖӮ`WaitGroup` зұ»еһӢзҡ„ `Done` ж–№жі•йҖҡиҝҮдҪҝз”Ёе…ій”®еӯ— `defer`пјҲеҰӮ[з¬¬ 2 з« ]жүҖиҝ°пјүжқҘе®үжҺ’и°ғз”ЁгҖӮиҝҷдёӘе…ій”®еӯ—е…Ғи®ёдҪ еңЁеҮҪж•°иҝ”еӣһж—¶е®үжҺ’е…¶д»–еҮҪж•°иў«и°ғз”ЁгҖӮеңЁжӯӨзӨәдҫӢдёӯпјҢеҪ“\
    \ goroutine жү§иЎҢе®ҢжҜ•ж—¶дјҡи°ғз”Ё `Done` ж–№жі•пјҢиҝҷдјҡзЎ®дҝқ `WaitGroup` зҡ„еҖјйҖ’еҮҸпјҢд»Ҙдҫҝ `main` еҮҪж•°еҸҜд»ҘжЈҖжҹҘжҳҜеҗҰжңү goroutine\
    \ е°ҡжңӘжү§иЎҢгҖӮеңЁ `main` еҮҪж•°дёӯпјҢи°ғз”ЁдәҶ `WaitGroup` зҡ„ `Wait` ж–№жі•пјҢиҜҘж–№жі•дјҡжЈҖжҹҘ `WaitGroup` зҡ„и®Ўж•°пјҢе№¶йҳ»еЎһзЁӢеәҸзӣҙеҲ°и®Ўж•°еҸҳдёәйӣ¶гҖӮеҪ“и°ғз”Ё\
    \ `WaitGroup` зҡ„ `Done` ж–№жі•ж—¶пјҢи®Ўж•°дјҡеҮҸдёҖгҖӮеңЁзЁӢеәҸжү§иЎҢејҖе§Ӣж—¶пјҢи®Ўж•°иў«и®ҫзҪ®дёә 2гҖӮеҪ“и°ғз”Ё `Wait` ж—¶пјҢе®ғдјҡзӯүеҫ…и®Ўж•°еҸҳдёәйӣ¶пјҢд»ҺиҖҢзЎ®дҝқдёӨдёӘ\
    \ goroutine еңЁзЁӢеәҸз»ҲжӯўеүҚйғҪеҫ—еҲ°жү§иЎҢгҖӮеҪ“и®Ўж•°еҸҳдёәйӣ¶ж—¶пјҢзЁӢеәҸз»Ҳжӯўпјҡ\n\n```\nwg.Wait()\n```\n\n# GOMAXPROCS дёҺе№¶иЎҢжҖ§\n\
    \nGo иҝҗиЎҢж—¶и°ғеәҰеҷЁйҖҡиҝҮеҲ©з”Ёж“ҚдҪңзі»з»ҹзәҝзЁӢзҡ„ж•°йҮҸжқҘе°қиҜ•еҗҢж—¶жү§иЎҢ goroutineпјҢд»ҺиҖҢз®ЎзҗҶ goroutine зҡ„жү§иЎҢгҖӮж“ҚдҪңзі»з»ҹзәҝзЁӢзҡ„еҖјеҸ–иҮӘ `GOMAXPROCS`\
    \ зҺҜеўғеҸҳйҮҸгҖӮеңЁ Go 1.5 д№ӢеүҚпјҢ`GOMAXPROCS` зҡ„й»ҳи®Өи®ҫзҪ®дёә 1пјҢиҝҷж„Ҹе‘ізқҖ goroutine й»ҳи®ӨеңЁеҚ•дёӘж“ҚдҪңзі»з»ҹзәҝзЁӢдёҠиҝҗиЎҢгҖӮпјҲиҜ·и®°дҪҸпјҢGo\
    \ иҝҗиЎҢж—¶еҸҜд»ҘеңЁеҚ•дёӘж“ҚдҪңзі»з»ҹзәҝзЁӢдёҠжү§иЎҢж•°еҚғдёӘ goroutineгҖӮпјүд»Һ Go 1.5 ејҖе§ӢпјҢ`GOMAXPROCS` зҡ„й»ҳи®Өи®ҫзҪ®ж”№дёәеҸҜз”Ё CPU зҡ„ж•°йҮҸпјҢз”ұ\
    \ `runtime` еҢ…жҸҗдҫӣзҡ„ `NumCPU` еҮҪж•°зЎ®е®ҡгҖӮжӯӨй»ҳи®ӨиЎҢдёәи®© Go зЁӢеәҸиғҪеӨҹеҲ©з”ЁжүҖжңүеҸҜз”Ёзҡ„ CPU ж ёеҝғжқҘе№¶иЎҢиҝҗиЎҢ goroutineгҖӮ`GOMAXPROCS`\
    \ зҡ„еҖјеҸҜд»ҘйҖҡиҝҮжҳҫејҸи®ҫзҪ® `GOMAXPROCS` зҺҜеўғеҸҳйҮҸжҲ–д»ҺзЁӢеәҸдёӯи°ғз”Ё `runtime.GOMAXPROCS` жқҘи®ҫе®ҡгҖӮ\n\nйҖҡиҝҮжҸҗй«ҳ `GOMAXPROCS`\
    \ и®ҫзҪ®еҸҜд»Ҙе®һзҺ° goroutine зҡ„еҗҢж—¶жү§иЎҢгҖӮиҝҷз§ҚиЎҢдёәе°ұжҳҜе№¶иЎҢжҖ§гҖӮе№¶еҸ‘дёҚжҳҜе№¶иЎҢжҖ§пјӣGo дёӯзҡ„е№¶еҸ‘жҳҜжҢҮйҖҡиҝҮе°ҶзЁӢеәҸеҲҶи§ЈдёәеҸҜд»ҘзӢ¬з«Ӣжү§иЎҢпјҲеҲ©з”ЁеҸҜз”Ёиө„жәҗпјүзҡ„ goroutineпјҲдҪңдёәеӯҗзЁӢеәҸжҲ–д»»еҠЎпјүжқҘи®ҫи®ЎзЁӢеәҸгҖӮе№¶иЎҢжҖ§еҲҷжҳҜе…ідәҺдёҖж¬Ўе®ҢжҲҗеӨ§йҮҸи®Ўз®—гҖӮеңЁе№¶иЎҢжҖ§дёӯпјҢдјҡеҲ©з”ЁжӣҙеӨҡзҡ„\
    \ CPU ж ёеҝғжқҘе°ҪеҸҜиғҪе®һзҺ° goroutine зҡ„еҗҢж—¶жү§иЎҢгҖӮ\n\nеңЁи®ёеӨҡжғ…еҶөдёӢпјҢе№¶иЎҢжҖ§еҸҜд»ҘжҸҗдҫӣжӣҙеҘҪзҡ„жҖ§иғҪпјҢеӣ дёә Go иҝҗиЎҢж—¶еҸҜд»ҘеҲ©з”Ёи®Ўз®—жңәжүҖжңүеҸҜз”Ёзҡ„и®Ўз®—иө„жәҗжқҘе№¶иЎҢиҝҗиЎҢ\
    \ goroutineгҖӮиҜ·и®°дҪҸпјҢе№¶иЎҢиҝҗиЎҢ goroutine е№¶дёҚжҖ»иғҪеёҰжқҘжӣҙеҘҪзҡ„жҖ§иғҪпјҢеӣ дёәиҝҷеҸ–еҶідәҺдҪ зҡ„зЁӢеәҸдёҠдёӢж–ҮгҖӮжңүж—¶е№¶еҸ‘жҖ§еҸҜд»ҘиғңиҝҮе№¶иЎҢжҖ§пјҢеӣ дёәе№¶иЎҢжҖ§еҸҜиғҪдјҡз»ҷж“ҚдҪңзі»з»ҹиө„жәҗеёҰжқҘжӣҙеӨ§еҺӢеҠӣгҖӮ\n\
    \nдҪ еҸҜд»Ҙж №жҚ®еә”з”ЁзЁӢеәҸзҡ„дёҠдёӢж–ҮеңЁзЁӢеәҸдёӯжҺ§еҲ¶ `GOMAXPROCS` и®ҫзҪ®гҖӮжё…еҚ• [3-19] жҳҜдёҖдёӘе°Ҷ `GOMAXPROCS` д»Һе…¶й»ҳи®Өи®ҫзҪ®дҝ®ж”№дёә 1\
    \ зҡ„д»Јз Ғеқ—пјҡ\n\n**жё…еҚ• 3-19.** жҳҫејҸи®ҫзҪ® GOMAXPROCS и®ҫзҪ®\n\n```\nimport \"runtime\"\n\n// и®ҫзҪ®\
    \ GOMAXPROCS зҡ„еҖјгҖӮ\nruntime.GOMAXPROCS(1)\n```\n\n**жіЁпјҡ** иҜ·жҹҘйҳ… Rob Pike зҡ„зІҫеҪ©жј”и®І вҖңConcurrency\
    \ Is Not ParallelismвҖқ д»ҘдәҶи§Је№¶еҸ‘дёҺе№¶иЎҢзҡ„еҢәеҲ«пјҡ[`www.youtube.com/watch?v=cN_DpYBzKso`](http://www.youtube.com/watch?v=cN_DpYBzKso)\n"
- fmt: "### Channels\n\nListing `[3-18](#A978-1-4842-1052-9_3_Chapter.html#FPar19)`\
    \ created two goroutines that were running independently and didnвҖҷt need to communicate\
    \ with each other. However, sometimes there is a need for communication among\
    \ goroutines for sending and receiving data, hence the need for synchronization\
    \ among goroutines. In many programming environments, communication among concurrent\
    \ programs is complex or limited with features. Go allows you to communicate among\
    \ goroutines using channels that enable the synchronization of goroutine execution.\n\
    \nThe built-in `make` function is used to declare a channel with the help of the\
    \ keyword `chan`, followed by the type for specifying the type of data you are\
    \ using for exchanging data:\n\n`count := make(chan int)`\n\nA channel of integer\
    \ `type` is declared, so integer values will be passed into channels. There are\
    \ two types of channels available for synchronization of goroutines:\n\n- Buffered\
    \ channels\n- Unbuffered channels\n\nListing `[3-20](#A978-1-4842-1052-9_3_Chapter.html#FPar22)`\
    \ is the code block that declares unbuffered and buffered channels.\n\n**Listing\
    \ 3-20.** Declaring Unbuffered and Buffered Channels\n\n```\n// Unbuffered channel\
    \ of integers.\ncount := make(chan int)\n\n// Buffered channel of integers for\
    \ buffering up to 10 values.\ncount:= make(chan int, 10)\n```\n\nWhen buffered\
    \ channels are declared, the capacity of channels to hold the data must be specified.\
    \ If you try to send more data than its capacity, you get an error.\n\n### Unbuffered\
    \ Channel\n\nUnbuffered channels provide synchronous communication among goroutines,\
    \ which ensures message delivery among them. With unbuffered channels, message\
    \ sending is permitted only if there is a corresponding receiver that is ready\
    \ to receive the messages. In this case, both sides of the channel have to wait\
    \ until the other side is ready for sending and receiving messages. With buffered\
    \ channels, a limited number of messages can be sent into the channel without\
    \ a corresponding concurrent receiver for receiving those messages. After the\
    \ messages are sent into buffered channels, those messages from the channel are\
    \ received. Unlike unbuffered channels, message delivery canвҖҷt be guaranteed with\
    \ buffered channels.\n\nThe `<-` operator is used to send values into channels\
    \ (see Listing `[3-21](#A978-1-4842-1052-9_3_Chapter.html#FPar23)`).\n\n**Listing\
    \ 3-21.** Sending Values into a Channel\n\n```\n// Buffered channel of strings.\n\
    messages := make(chan string, 2)\n\n// Send a message into the channel.\nmessages\
    \ <- \"Golang\"\n```\n\nTo receive messages from channels, the `<-` operator is\
    \ used as a unary operator (see Listing `[3-22](#A978-1-4842-1052-9_3_Chapter.html#FPar24)`).\n\
    \n**Listing 3-22.** Receiving Values from a Channel\n\n```\n// Receive a string\
    \ value from the channel.\nvalue := <-messages\n```\n\nListing `[3-23](#A978-1-4842-1052-9_3_Chapter.html#FPar25)`\
    \ is an example program that demonstrates how to communicate and synchronize data\
    \ among goroutines using unbuffered channels.\n\n**Listing 3-23.** Example Program\
    \ with Unbuffered Channel\n\n```\npackage main\n\nimport (\n\t\"fmt\"\n\t\"sync\"\
    \n)\n\n// wg is used to wait for the program to finish.\nvar wg sync.WaitGroup\n\
    \nfunc main() {\n\tcount := make(chan int)\n\t// Add a count of two, one for each\
    \ goroutine.\n\twg.Add(2)\n\tfmt.Println(\"Start Goroutines\")\n\t//launch a goroutine\
    \ with label \"A\"\n\tgo printCounts(\"A\", count)\n\t//launch a goroutine with\
    \ label \"B\"\n\tgo printCounts(\"B\", count)\n\tfmt.Println(\"Channel begin\"\
    )\n\tcount <- 1\n\t// Wait for the goroutines to finish.\n\tfmt.Println(\"Waiting\
    \ To Finish\")\n\twg.Wait()\n\tfmt.Println(\"\\nTerminating Program\")\n}\n\n\
    func printCounts(label string, count chan int) {\n\t// Schedule the call to WaitGroupвҖҷs\
    \ Done to tell we are done.\n\tdefer wg.Done()\n\tfor {\n\t\t//Receives message\
    \ from Channel\n\t\tval, ok := <-count\n\t\tif !ok {\n\t\t\tfmt.Println(\"Channel\
    \ was closed\")\n\t\t\treturn\n\t\t}\n\t\tfmt.Printf(\"Count: %d received from\
    \ %s \\n\", val, label)\n\t\tif val == 10 {\n\t\t\tfmt.Printf(\"Channel Closed\
    \ from %s \\n\", label)\n\t\t\t// Close the channel\n\t\t\tclose(count)\n\t\t\t\
    return\n\t\t}\n\t\tval++\n\t\t// Send count back to the other goroutine.\n\t\t\
    count <- val\n\t}\n}\n```\n\nThe output can vary when you run the program. You\
    \ should see output similar to the following:\n\n```\nStart Goroutines\nChannel\
    \ begin\nCount: 1 received from A\nCount: 2 received from B\nWaiting To Finish\n\
    Count: 3 received from A\nCount: 4 received from B\nCount: 5 received from A\n\
    Count: 6 received from B\nCount: 7 received from A\nCount: 8 received from B\n\
    Count: 9 received from A\nCount: 10 received from B\nChannel Closed from B\nChannel\
    \ was closed\nTerminating Program\n```\n\nIn this program, two goroutines synchronize\
    \ and communicate using an unbuffered channel. A channel of integer values for\
    \ exchanging data among goroutines is used. In the `main` function, the unbuffered\
    \ channel `count` is declared for exchanging messages between two goroutines.\
    \ A count of two is added into `WaitGroup` for the two goroutines. Then two goroutines\
    \ are launched with passing the channel:\n\n```\ncount := make(chan int)\n\n//\
    \ Add a count of two, one for each goroutine.\nwg.Add(2)\n\n//launch a goroutine\
    \ with label \"A\"\ngo printCounts(\"A\", count)\n\n//launch a goroutine with\
    \ label \"B\"\ngo printCounts(\"B\", count)\n```\n\nInside the `printCounts` function,\
    \ an endless `for` loop is used and returns from the function when the value `10`\
    \ is received from the channel. After launching two goroutines, the channel is\
    \ started by sending a value of `1`, which it will receive from the goroutine.\
    \ The unbuffered channel blocks the receiver until the message is available into\
    \ the channel.\n\nThe following code block in the `printCounts` function blocks\
    \ until the value is sent into the channel:\n\n```\n//Receive messages from Channel\n\
    val, ok := <-count\n```\n\nWhen values are received from channels, two variables\
    \ on the left side of the assignment can be used: the data from the channel and\
    \ a Boolean value to indicate whether the channel is available. We return from\
    \ the function if the channel is closed.\n\n```\nif !ok {\n\tfmt.Println(\"Channel\
    \ was closed\")\n\treturn\n}\n```\n\nThe channel is closed when the value `10`\
    \ is received from the channel. If the received value of the channel is less than\
    \ `10`, the value is incremented, and a new value is sent into the channel. This\
    \ process blocks the sender until a receiver receives the value from the channel.\n\
    \n```\nif val == 10 {\n\tfmt.Printf(\"Channel Closed from %s \\n\", label)\n\t\
    // Close the channel\n\tclose(count)\n\treturn\n}\nval++\n// Send count back to\
    \ the other goroutine.\ncount <- val\n```\n\nThe most important thing about the\
    \ unbuffered channel is that a receive on the channel blocks the goroutine until\
    \ the channel gets the data, and a send on the channel blocks the goroutine until\
    \ a receiver receives the data, thus ensuring message delivery among goroutines.\
    \ If you look at the program output you will clearly understand the functionality\
    \ of channels."
