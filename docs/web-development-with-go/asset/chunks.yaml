    \ зұ»еһӢзҡ„й”®ж·»еҠ еҲ°йӣҶеҗҲдёӯпјҢе№¶еҸҜйҖҡиҝҮзӣёеә”зҡ„й”®еҖјжқҘжЈҖзҙўеҖјгҖӮйҷӨдәҶеҶ…зҪ®зұ»еһӢд№ӢеӨ–пјҢжӮЁиҝҳеҸҜд»ҘйҖҡиҝҮз»„еҗҲдёҖдёӘжҲ–еӨҡдёӘеҶ…зҪ®зұ»еһӢжҲ–з”ЁжҲ·е®ҡд№үзұ»еһӢжқҘеҲӣе»әиҮӘе·ұзҡ„зұ»еһӢгҖӮ`Go` еңЁе…¶зұ»еһӢзі»з»ҹдёӯжҸҗдҫӣдәҶдёҖз§ҚжҺҘеҸЈзұ»еһӢпјҢдҪҝжӮЁиғҪеӨҹејҖеҸ‘еҮәе…·жңүжӣҙй«ҳеҸҜжү©еұ•жҖ§зҡ„зЁӢеәҸгҖӮ\n\
    \n## дҪҝз”Ёз»“жһ„дҪ“е®ҡд№үз”ЁжҲ·е®ҡд№үзұ»еһӢ\n\n`Go` зҡ„зұ»еһӢзі»з»ҹеңЁи®ҫи®Ўж—¶иҖғиҷ‘дәҶз®ҖжҙҒжҖ§е’Ңе®һз”ЁжҖ§пјҢиҝҷйҒҝе…ҚдәҶеңЁи®ҫи®Ўеә”з”ЁзЁӢеәҸж•°жҚ®з»“жһ„ж—¶еҮәзҺ°и®ёеӨҡеӨҚжқӮжҖ§гҖӮ`Go` зҡ„йқўеҗ‘еҜ№иұЎж–№жі•дёҺе…¶д»–зј–зЁӢиҜӯиЁҖе®Ңе…ЁдёҚеҗҢгҖӮеҰӮжһңжӮЁжқҘиҮӘ\
