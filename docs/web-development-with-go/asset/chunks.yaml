    \ is the template definition file for `base.html`.\n\nListing 5-11. Template Definition\
    \ in `base.html`\n\n```\n{{define \"base\"}}\n<html>\n  <head>{{template \"head\"\
    \ .}}</head>\n  <body>{{template \"body\" .}}</body>\n</html>\n{{end}}\n```\n\n\
    Here a template called `base` is defined, in which the two templates are embedded.\
    \ To render web pages, the `base` template is called every time the named templates\
    \ `head` and `body` are provided from the content pages. For example, when the\
    \ `Index` page is rendered, the template definition files from `base.html` and\
    \ `index.html` are parsed, and the nested template defined in the `base` in `base.html`\
    \ is executed and takes the contents for `head` and `body` from `index.html`.\n\
    \n### Initializing View Templates\n\nTemplate definition files have to be parsed\
    \ before templates execute. Parsing the template definition files is a one-time\
    \ activity; the files do not need to be parsed each time the templates execute.\
    \ Here the files are parsed and put into a map in which each element represents\
    \ the template file for rendering a particular page. Three HTML pages have to\
    \ be generated, so three items are put into the map. The template definition files\
    \ are parsed in the `init` function and are parsed with the `Must` helper function.\
    \ `Must` is a helper that wraps a call to a function returning `(*Template, error)`\
    \ and panics if the error is non-`nil`.\n\nListing [5-12](#A978-1-4842-1052-9_5_Chapter.html#FPar12)\
    \ parses the template files with the `Must` helper function and puts it into the\
