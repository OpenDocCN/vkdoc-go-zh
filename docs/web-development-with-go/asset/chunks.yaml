    `// Buffered channel of strings.`


    `messages := make(chan string, 2)`


    `// Send a message into the channel.`


    `messages <- "Golang"`


    To receive messages from channels, the <- operator is used as a unary operator
    (see Listing [3-22](#A978-1-4842-1052-9_3_Chapter.html#FPar24)).


    Listing 3-22.В В Receiving Values from a Channel


    `// Receive a string value from the channel.`


    `value := <-messages`


    Listing [3-23](#A978-1-4842-1052-9_3_Chapter.html#FPar25) is an example program
    that demonstrates how to communicate and synchronize data among goroutines using
    unbuffered channels.


    Listing 3-23.В В Example Program with Unbuffered Chanel


