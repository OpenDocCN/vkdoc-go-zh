    the value `"Golang"`):


    `dict["go"] = "Golang"`


    Finally, iterate over the collection using the `range` and `print` key and value
    of each element in the collection:


    `for k, v := range dict {`


    В В В В `fmt.Printf("Key: %s Value: %s\n", k, v)`


