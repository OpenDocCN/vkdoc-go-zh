    ```\n\nеңЁиҝҷдёӘзЁӢеәҸдёӯпјҢдҪ жІЎжңүдҪҝз”ЁиҮӘе·ұзҡ„дёӯй—ҙд»¶еҮҪж•°пјӣдҪ еҸӘжҳҜз”Ё `Negroni` зҡ„й»ҳи®Өдёӯй—ҙд»¶еҮҪж•°иҝҗиЎҢдәҶдёҖдёӘ HTTP жңҚеҠЎеҷЁгҖӮйҖҡиҝҮи°ғз”Ё `negroni.Classic`\
    \ еҮҪж•°жқҘеҲӣе»әдёҖдёӘ `Negroni` е®һдҫӢгҖӮ\n\nеҪ“дҪҝз”Ё `Classic` еҮҪж•°еҲӣе»ә `Negroni` е®һдҫӢж—¶пјҢе®ғдјҡжҸҗдҫӣд»ҘдёӢеҶ…зҪ®дёӯй—ҙд»¶еҮҪж•°пјҢиҝҷдәӣеҮҪж•°еҜ№дәҺеӨ§еӨҡж•°\
    \ Web еә”з”ЁзЁӢеәҸйқһеёёжңүз”Ёпјҡ\n\n*   `negroni.Recovery`пјҡжҒҗж…ҢжҒўеӨҚдёӯй—ҙд»¶\n*   `negroni.Logging`пјҡиҜ·жұӮ/е“Қеә”ж—Ҙеҝ—и®°еҪ•дёӯй—ҙд»¶\n\
    *   `negroni.Static`пјҡеңЁ `\"public\"` зӣ®еҪ•дёӢжҸҗдҫӣйқҷжҖҒж–Үд»¶жңҚеҠЎ\n\n`Negroni` е®һдҫӢд№ҹеҸҜд»ҘйҖҡиҝҮи°ғз”Ё `negroni.New`\
    \ еҮҪж•°жқҘеҲӣе»әпјҢиҜҘеҮҪж•°дјҡиҝ”еӣһдёҖдёӘжІЎжңүйў„й…ҚзҪ®д»»дҪ•дёӯй—ҙд»¶зҡ„ж–°зҡ„ `Negroni` е®һдҫӢпјҡ\n\n`n := negroni.New()`\n\n`Negroni`\
    \ е®һдҫӢзҡ„ `Run` ж–№жі•жҳҜдёҖдёӘдҫҝжҚ·еҮҪж•°пјҢе®ғе°Ҷ `Negroni` е Ҷж ҲдҪңдёә HTTP жңҚеҠЎеҷЁиҝҗиЎҢгҖӮең°еқҖеӯ—з¬ҰдёІзҡ„ж јејҸдёҺ `http.ListenAndServe`\
    \ зӣёеҗҢпјҡ\n\n`n.Run(\":8080\")`\n\n### дҪҝз”Ё Negroni иҝӣиЎҢи·Ҝз”ұ\n\n`Negroni` е®һдҫӢзҡ„ `UseHandler`\
    \ ж–№жі•е…Ғи®ёдҪ е°ҶиҮӘе®ҡд№үзҡ„ `http.Handler` ж”ҫе…Ҙдёӯй—ҙд»¶е Ҷж ҲдёӯгҖӮ\n\nжё…еҚ• 6-9 жҳҜдёҖдёӘзӨәдҫӢзЁӢеәҸпјҢе®ғдҪҝз”Ё Gorilla `mux` дҪңдёәдёҺ\
    \ `Negroni` еҢ…дёҖиө·дҪҝз”Ёзҡ„иҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁгҖӮ\n\n**жё…еҚ• 6-9.** дҪҝз”Ё Negroni е’Ң Gorilla mux зҡ„з®ҖеҚ• HTTP жңҚеҠЎеҷЁ\n\
    \n```\npackage main\n\nimport (\n    \"fmt\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
    \n    \"github.com/gorilla/mux\"\n)\n\nfunc index(w http.ResponseWriter, req *http.Request)\
