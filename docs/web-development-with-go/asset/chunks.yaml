  trans: "\n### зҗҶи§Ј OAuth 2\n\n`OAuth 2` жҳҜдёҖдёӘејҖж”ҫзҡ„иә«д»ҪйӘҢиҜҒи§„иҢғгҖӮ`OAuth 2.0` жҺҲжқғжЎҶжһ¶дҪҝз¬¬дёүж–№еә”з”ЁзЁӢеәҸиғҪеӨҹиҺ·еҫ—еҜ№\
    \ FacebookгҖҒTwitterгҖҒGitHub е’Ң Google зӯү HTTP жңҚеҠЎзҡ„жңүйҷҗи®ҝй—®жқғйҷҗгҖӮжңҖйҮҚиҰҒзҡ„жҳҜпјҢ`OAuth 2` жҳҜдёҖз§Қз”ЁдәҺиә«д»ҪйӘҢиҜҒжөҒзЁӢзҡ„и§„иҢғгҖӮ\n\
    \n`OAuth 2` дёә Web еә”з”ЁзЁӢеәҸгҖҒжЎҢйқўеә”з”ЁзЁӢеәҸе’Ңз§»еҠЁеә”з”ЁзЁӢеәҸжҸҗдҫӣдәҶжҺҲжқғжөҒзЁӢгҖӮеңЁжһ„е»әеә”з”ЁзЁӢеәҸж—¶пјҢжӮЁеҸҜд»Ҙе°Ҷз”ЁжҲ·иә«д»ҪйӘҢиҜҒе§”жүҳз»ҷ FacebookгҖҒTwitterгҖҒGitHub\
    \ е’Ң Google зӯүзӨҫдәӨиә«д»ҪжҸҗдҫӣе•ҶгҖӮжӮЁеҸҜд»ҘеңЁиә«д»ҪжҸҗдҫӣе•ҶеӨ„жіЁеҶҢжӮЁзҡ„еә”з”ЁзЁӢеәҸпјҢд»ҘжҺҲжқғиҜҘеә”з”ЁзЁӢеәҸи®ҝй—®з”ЁжҲ·иҙҰжҲ·гҖӮеҪ“жӮЁеңЁиә«д»ҪжҸҗдҫӣе•ҶеӨ„жіЁеҶҢеә”з”ЁзЁӢеәҸж—¶пјҢйҖҡеёёдјҡиҺ·еҫ—дёҖдёӘ\
    \ `client ID` е’ҢдёҖдёӘ `client secret key`пјҢд»Ҙдҫҝи®ҝй—®иә«д»ҪжҸҗдҫӣе•Ҷзҡ„з”ЁжҲ·иҙҰжҲ·гҖӮдёҖж—ҰжӮЁдҪҝз”Ё `client ID` е’Ң `client\
    \ secret key` зҷ»еҪ•пјҢиә«д»ҪйӘҢиҜҒжңҚеҠЎеҷЁдҫҝдјҡдёәжӮЁжҸҗдҫӣдёҖдёӘ `access token`пјҢиҜҘд»ӨзүҢеҸҜз”ЁдәҺи®ҝй—® Web жңҚеҠЎеҷЁзҡ„еҸ—дҝқжҠӨиө„жәҗгҖӮ\n\nз¬¬ 7.2.2\
    \ иҠӮи®Ёи®әдәҶеҹәдәҺд»ӨзүҢзҡ„иә«д»ҪйӘҢиҜҒе·ҘдҪңжөҒзЁӢгҖӮдҪҝз”Ё Bearer Token жҳҜеңЁ `OAuth 2` жҺҲжқғжЎҶжһ¶дёӯе®ҡд№үзҡ„дёҖз§Қи§„иҢғпјҢе®ғе®ҡд№үдәҶеҰӮдҪ•еңЁ HTTP иҜ·жұӮдёӯдҪҝз”Ё\
