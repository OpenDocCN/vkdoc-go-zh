- fmt: "![A978-1-4842-1052-9_11_Fig14_HTML.jpg](A978-1-4842-1052-9_11_Fig14_HTML.jpg)\n\
    \n**Figure 11-14.** Basic architecture of a Cloud Endpoints application\n\nFigure\
    \ [11-14](#A978-1-4842-1052-9_11_Chapter.html#Fig14) shows the back-end API running\
    \ on App Engine instances that are powered as a back end for mobile clients and\
    \ JavaScript web clients. The operations of back-end applications are made available\
    \ to client applications through endpoints, which expose an API that clients can\
    \ call using native libraries generated by Cloud Endpoints. Cloud Endpoints improves\
    \ developer productivity to both back-end API developers and client application\
    \ developers.\n\nIn [Chapter 9](#A978-1-4842-1052-9_9_Chapter.html), a RESTful\
    \ API was developed as a back end for a client application. By using Cloud Endpoints,\
    \ you can improve your developer productivity when you build RESTful APIs on the\
