    \ {{.AvatarURL}} <img src=\"{{.AvatarURL}}\"></p>\n<p>Description: {{.Description}}</p>\n\
    <p>UserID: {{.UserID}}</p>\n<p>AccessToken: {{.AccessToken}}</p>\n`\n```\n\nTwitter\
    \ and Facebook are used to log in to the example application. To do this, register\
