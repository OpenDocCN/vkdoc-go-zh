    \ are parsed and put into a map object so that you can easily get the parsed template\
    \ files whenever you want to execute the templates. This approach allows you to\
    \ avoid parsing the template files every time the templates are executed, which\
    \ improves web application performance. By leveraging the various techniques shown\
    \ in this example application, you can build real-world web applications.\n\n\
    ## Summary\n\nThis chapter showed how to work with Go templates by developing\
    \ a web application. When you work with data-driven web applications, you have\
    \ to leverage templates to render HTML pages in which you can combine static contents\
    \ with dynamic contents by applying a data object to the templates.\n\nThe `html/template`\
    \ package is used to render HTML pages. It also provides a security mechanism\
    \ against various code injections while rendering the HTML output. Both `html/template`\
    \ and `text/template` provide the same interface for the template authors, in\
    \ which `html/template` generates HTML output, and `text/template` generates textual\
    \ output. By leveraging the standard library packages `net/http` and `html/template`,\
    \ you can build full-fledged web applications in Go.\n\n# 6. HTTP Middleware\n\
    \nThe last two chapters explored various aspects of building web applications\
    \ and web APIs. This chapter takes a look at HTTP middleware, which simplifies\
