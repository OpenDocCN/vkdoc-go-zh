    `ResponseRecorder` is an implementation of `http.ResponseWriter` that can be used
    for records returned HTTP response to inspect the response in unit tests. You
    can create the `ResponseRecorder` instance by calling the `NewRecorder` function
    of the `httptest` package. The `ResponseRecorder` object is passed when the HTTP
    request handlers are executed; the response can be inspected by testing the `ResponseRecorder`
    object that contains the returned response.'
