    The `addTask` operation is an HTTP `Post` request to the URI endpoint: `http://localhost:8080/_ah/api/tasks/v1/tasks`.


    Figure [11-19](#A978-1-4842-1052-9_11_Chapter.html#Fig19) shows the HTTP `Request`
    and `Response` for the `listTasks` operation. The `listTasks` operation is executed
    after the `addTask` operation is executed three times so that you can see three
