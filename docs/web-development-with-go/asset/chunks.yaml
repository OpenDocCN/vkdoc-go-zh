    into MongoDB using the `mgo` package, which is a MongoDB driver for Go.


    MongoDB is an open-source document database that provides high performance, high
    availability, and automatic scaling. MongoDB is the most popular NoSQL database;
    it has been widely used by modern web applications. The `mgo` driver provides
    a simple API that follows the Go idioms.


    You can add indexes to fields of MongoDB collections, which provide high performance
    on read operations. When developing web applications in Go, using a global `mgo.Session`
    object is not a good practice. The right approach for managing `Session` is to
    create a new `Session` object by calling `Copy`, `Clone`, or `New` on the obtained
    Session object, which was obtained by the `Dial` method of the `mgo` package.


    The next chapter will show you more about working with the MongoDB database using
    the mgo package.


    # 9.В Building RESTful Services


    The last few chapters discussed various aspects of building web-based systems,
    including the fundamentals of Go web programming using the `http` package, the
    `html/template` package for rendering the UI, various approaches for authentication,
    HTTP middleware, and data persistence with MongoDB.


    This chapter will implement a full-fledged RESTful API application named TaskManager
    by using the concepts discussed in previous chapters. This application will also
    have new features, such as the capability to manage dependencies for external
    packages and deploy an HTTP server with Docker.'
  trans: "\n# з®ЎзҗҶдјҡиҜқ\n\n`mgo` еҢ…зҡ„ `Dial` ж–№жі•з”ЁдәҺе»әз«ӢдёҺ MongoDB жңҚеҠЎеҷЁйӣҶзҫӨзҡ„иҝһжҺҘпјҢе№¶иҝ”еӣһдёҖдёӘ `mgo.Session`\
