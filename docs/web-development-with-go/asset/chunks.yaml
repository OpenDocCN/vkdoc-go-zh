    ### Running Tests Cases in Parallel


    Although test cases are run sequentially, you can run test cases in parallel if
    you want to speed up the test execution. When you run a large set of sequential
    test cases, you can leverage the capability of running tests in parallel to speed
    up the execution. To run a test case in parallel, call the `Parallel` method of
    the `testing.T` type as the first statement in the test case.


    Listing [10-6](#A978-1-4842-1052-9_10_Chapter.html#FPar6) provides couple of test
    cases inside the `utils_test.go` file to run test cases in parallel.


    Listing 10-6.В В Test Cases to Run in Parallel


    `// Test case for the SwapCase function to execute in parallel`


    `func TestSwapCaseInParallel(t *testing.T) {`


    `t.Parallel()`


    `// Delaying 1 second for the sake of demonstration`


    `time.Sleep(1 * time.Second)`


    `input, expected := "Hello, World", "hELLO, wORLD"`


    `result := SwapCase(input)`


    `if result != expected {`


    `t.Errorf("SwapCase(%q) == %q, expected %q", input, result, expected)`


    `}`


    `}`


    `// Test case for the Reverse function to execute in parallel`


    `func TestReverseInParallel(t *testing.T) {`


    `t.Parallel()`


    `// Delaying 2 seconds for the sake of demonstration`


    `time.Sleep(2 * time.Second)`


    `input, expected := "Hello, World", "dlroW ,olleH"`


    `result := Reverse(input)`


    `if result != expected {`


    `t.Errorf("Reverse(%q) == %q, expected %q", input, result, expected)`


