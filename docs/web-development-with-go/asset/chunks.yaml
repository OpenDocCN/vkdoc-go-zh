    В В В В `noteStore[k] = note`


    В В В В `http.Redirect(w, r, "/", 302)`


    `}`


    The `saveHandler` function parses the form values from the `*http.Request` object
    by calling the `ParseForm` method; then form field values are read by calling
    `PostFormValue("element_name")`. In Listing [5-18](#A978-1-4842-1052-9_5_Chapter.html#FPar18),
    the values are read from the HTML form elements `title` and `description`. The
