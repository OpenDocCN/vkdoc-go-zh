    ## дҪҝз”Ё Cloud Endpoints жһ„е»әеҗҺз«Ҝ API


    еңЁ Google Cloud дёӯпјҢApp Engine е№іеҸ°е…Ғи®ё Go ејҖеҸ‘иҖ…еңЁ App Engine зҡ„жІҷзӣ’зҺҜеўғдёӯжһ„е»әеҗҺз«Ҝ API е’Ң Web еә”з”ЁзЁӢеәҸпјҢиҜҘжІҷзӣ’зҺҜеўғж”ҜжҢҒиҮӘеҠЁжү©зј©гҖӮдҪҝз”Ё
    App EngineпјҢдҪ еҸҜд»ҘеҲ©з”Ё Google Cloud е№іеҸ°жҸҗдҫӣзҡ„е·Ҙе…·е’Ң SDKпјҢеңЁ Google зҡ„еҹәзЎҖи®ҫж–ҪдёҠжһ„е»әеӨ§и§„жЁЎеҸҜжү©еұ•зҡ„дә‘еҺҹз”ҹеә”з”ЁзЁӢеәҸгҖӮGoogle
    Cloud Endpoints жҳҜдёҖйЎ№ App Engine жңҚеҠЎпјҢеҸҜи®©дҪ иҪ»жқҫдёә Web е®ўжҲ·з«Ҝе’Ңз§»еҠЁе®ўжҲ·з«ҜеҲӣе»әеҗҺз«Ҝ APIгҖӮ


    Google Cloud Endpoints жҸҗдҫӣдәҶе·Ҙе…·гҖҒеә“е’ҢжңҚеҠЎпјҢз”ЁдәҺд»Һ App Engine еә”з”ЁзЁӢеәҸеҝ«йҖҹз”ҹжҲҗ API е’Ңе®ўжҲ·з«Ҝеә“гҖӮCloud Endpoints
    жҳҜдёҖдёӘеңЁ App Engine зҺҜеўғдёӯиҝҗиЎҢзҡ„еә”з”ЁзЁӢеәҸпјҢдҪҶе®ғдёәжһ„е»ә API еҗҺз«ҜжҸҗдҫӣдәҶйўқеӨ–еҠҹиғҪпјҢе…¶е®ўжҲ·з«Ҝеә“еңЁжһ„е»әз§»еҠЁеҗҺз«Ҝзі»з»ҹж—¶жҸҗй«ҳдәҶејҖеҸ‘иҖ…зҡ„з”ҹдә§еҠӣгҖӮ


    дҪ еҸҜд»ҘеңЁдёҚеҖҹеҠ© Cloud Endpoints зҡ„жғ…еҶөдёӢпјҢзӣҙжҺҘеңЁ App Engine е№іеҸ°дёҠеҲӣе»әеҗҺз«Ҝ APIгҖӮдёҚиҝҮпјҢиҷҪз„¶еҸҜд»ҘдҪҝз”Ёжҷ®йҖҡзҡ„ App Engine
    еә”з”ЁзЁӢеәҸеҲӣе»әеҗҺз«Ҝ APIпјҢдҪҶ Cloud Endpoints йҖҡиҝҮжҸҗдҫӣйўқеӨ–еҠҹиғҪз®ҖеҢ–дәҶејҖеҸ‘иҝҮзЁӢгҖӮCloud Endpoints е…Ғи®ёдҪ дёә iOSгҖҒAndroidгҖҒJavaScript
    е’Ң Dart з”ҹжҲҗжң¬ең°е®ўжҲ·з«Ҝеә“гҖӮз”ұдәҺеҗ„з§Қе®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸйғҪеҸҜдҪҝз”ЁеҺҹз”ҹз”ҹжҲҗзҡ„еә“пјҢеӣ жӯӨдҪ еҸҜд»Ҙеҝ«йҖҹжһ„е»әе®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸпјҢиҖҢж— йңҖзј–еҶҷеҺҹз”ҹеҢ…иЈ…еҷЁжқҘдёҺеҗҺз«Ҝ API йҖҡдҝЎгҖӮеҜ№дәҺеҗҺз«ҜејҖеҸ‘иҖ…иҖҢиЁҖпјҢиҝҷж¶ҲйҷӨдәҶејҖеҸ‘
    RESTful API иҝҮзЁӢдёӯзҡ„дёҖдәӣеӨҚжқӮжҖ§гҖӮ


    еҪ“дҪ дҪҝз”Ё Cloud Endpoints жһ„е»ә API ж—¶пјҢж— йңҖзј–еҶҷд»»дҪ•е…ідәҺ HTTP `Request` е’Ң `Response` еҜ№иұЎзҡ„еҶ…е®№гҖӮдҪ еҸҜд»ҘеғҸзј–еҶҷжҷ®йҖҡ
    Go еҮҪж•°дёҖж ·зј–еҶҷ API ж–№жі•пјҢж— йңҖдҪҝз”ЁиҝҷдәӣеҜ№иұЎпјҢе№¶йҖҡиҝҮдҪҝз”Ё Cloud Endpoints жҸҗдҫӣзҡ„еә“е°Ҷе…¶иҪ¬жҚўдёә HTTP APIгҖӮ


    еӣҫ 11-14 еұ•зӨәдәҶ Cloud Endpoints еә”з”ЁзЁӢеәҸзҡ„еҹәжң¬жһ¶жһ„гҖӮ

