    ### е®ҡд№үе‘ҪеҗҚжЁЎжқҝ\n\nжЁЎжқҝе®ҡд№үеҸҜд»ҘйҖҡиҝҮ `define` е’Ң `end` еҠЁдҪңжқҘе®ҡд№үгҖӮ`define` еҠЁдҪңйҖҡиҝҮжҸҗдҫӣдёҖдёӘеӯ—з¬ҰдёІеёёйҮҸжқҘе‘ҪеҗҚжӯЈеңЁеҲӣе»әзҡ„жЁЎжқҝпјҢиҝҷеңЁеӨ„зҗҶеөҢеҘ—жЁЎжқҝе®ҡд№үж—¶дјҡйқһеёёжңүз”ЁгҖӮпјҲеҗҺз»ӯеңЁжһ„е»ә\
