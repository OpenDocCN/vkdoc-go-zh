    `func main() {`


    В В В В `fmt.Println("Hello World!")`


    `}`


    When you build the preceding program using the Go tool, the Go compiler generates
    an executable binary as the output. As mentioned earlier, if you want to build
    executable programs in Go, you must write a package `main` with a function `main`
    as the entry point for your programs.


    ### Package Alias


    When you write Go packages, you donвҖҷt have to worry about package ambiguity; you
    can even use the same package names as those of the standard library. When you
    import your own packages from the `GOPATH` location, you refer the full path of
    the package location to avoid package name ambiguity. You can use two packages
    with the same name from two different locations, but you should avoid name ambiguity
    when referencing from your programs. The package alias helps you avoid name ambiguity
    when you reference multiple packages with the same name.


    Listing [2-2](#A978-1-4842-1052-9_2_Chapter.html#FPar3) is an example program
