    ## Summary


    Automated testing is an important practice in software engineering that ensures
    application quality. Unit testing is a kind of automated testing process in which
    the smallest pieces of testable software in the application, called units, are
    individually and independently tested to determine whether they behave exactly
    as designed.


    Test-driven development (TDD) is a software development process that follows a
    test-first development approach, in which unit tests are written before the production
    code. TDD is a design approach that encourages developers to think about their
    implementation before writing the code.


    Go provides the core functionality to write automated unit tests through its `testing`
    standard library package. The `testing` package provides all the essential functionality
    required for writing automated tests with tooling support. It is intended to be
    used with the `go test` command. Besides the `testing` package, the Go standard
    library provides two more packages: `httptest` provides utilities for HTTP testing,
    and `quick` provides utility functions to help with black box testing.


    The following naming conventions and patterns are used to write a test suite:


    *   Create a source file with a name ending in `_test.go`.

    *   Within the test suite (the source file ends in `_test.go`), write functions
    with the signature `func TestXxx(*testing.T)`.


    Test functions are run sequentially when tests using the `go test` command are
    run. In addition to providing support for code testing behavior, the `testing`
    package can also be used for benchmarking tests and testing example code.


    You can test HTTP applications using the `httptest` package. When you test HTTP
    applications, you can use the `ResponseRecorder` and `Server struct types` provided
    by the `httptest` package. `ResponseRecorder` records the response of a returned
    HTTP response so it can be inspected. A `Server` is an HTTP server for testing
    to perform end-to-end HTTP tests.


    This chapter showed you third-party packages `Ginkgo` and `Gomega` for testing.
    `Ginkgo` is a behavior-driven development (BDD) вҖ“ style testing framework that
    lets you write expressive tests in Go to specify application. BDD is an extension
    of TDD, with an emphasis on behavior instead of test. In BDD, you specify behaviors
    in an expressive way in your automated tests, and you write code based on the
    behaviors.


    # 11.В Building Go Web Applications on Google Cloud


    Cloud computing is changing the way scalable applications are developed and run.
    Cloud computing allows you to fully focus on application engineering instead of
    managing the IT infrastructure. Developing Go applications on the Cloud infrastructure
    is a great choice because Go is the language designed for running on modern computer
    hardware and next-generation IT infrastructure platforms. Go is built to solve
    large-scale computing problems, and it is becoming the language of choice for
    building Cloud infrastructure technologies such as Docker and Kubernetes. This
    chapter shows you how to build Cloud native applications using Go by leveraging
    the Google Cloud platform.


    ## Introduction to Cloud Computing


    Cloud computing is gradually becoming a primary option for deploying applications.
    Instead of managing and maintaining on-premise computing resources, Cloud computing
    allows you to move the IT infrastructure and applications to a subscription-based
    computing model in which the software is accessed via the Internet. This allows
    a focus on application engineering instead of managing the IT infrastructure,
    so developers can build highly scalable applications with a greater level of agility.'
