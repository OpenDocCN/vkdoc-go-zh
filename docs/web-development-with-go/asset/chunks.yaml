    Named definitions of two templates are defined: `head` and `body`. Both will be
    used by the `base` template defined in `base.html`. When the `Index` page is executed,
    the map object that contains the object of the `Note` struct in each element is
    passed. The `range` action is used to iterate through the map object. In the `range`
    action, two variables are declared for the key and value element that is referenced
    inside the `range` action. A `range` action must be closed with an `end` action.


    When users request the route `"/"`, the Index page is rendered by calling the
    `getNotes` request handler in `main.go`. Listing [5-15](#A978-1-4842-1052-9_5_Chapter.html#FPar15)
    shows the `getNotes` function.


