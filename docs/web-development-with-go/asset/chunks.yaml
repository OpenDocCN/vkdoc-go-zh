- fmt: "# Managing Sessions\n\nThe `Dial` method of the `mgo` package establishes\
    \ a connection to the cluster of MongoDB servers, which returns an `mgo.Session`\
    \ object. You can manage all CRUD operations using the `Session` object, which\
    \ manages the pool of connections to the MongoDB servers. A connection pool is\
    \ a cache of database connections, so connections can be reused when new connections\
    \ to the database are required. When you develop web applications, using a single\
    \ global `Session` object for all CRUD operations is a really bad practice.\n\n\
    A recommended process for managing the `Session` object in web applications is\
    \ shown here:\n\n- Obtain a `Session` object using the `Dial` method.\n- Create\
    \ a new `Session` object during the lifetime of an individual HTTP request by\
    \ using the `New`, `Copy`, or `Clone` methods on the `Session` object obtained\
    \ from the `Dial` method. This approach enables the `Session` object to use the\
    \ connection pool appropriately.\n- Use the newly obtained `Session` object to\
    \ perform all CRUD operations during the lifetime of an HTTP request.\n\nThe `New`\
    \ method creates a new `Session` with the same parameters as the original `Session`.\
    \ The `Copy` method works just like `New`, but the copied `Session` preserves\
    \ the exact authentication information from the original `Session`. The `Clone`\
    \ method works just like `Copy`, but it also reuses the same socket (connection\
    \ to the server) as the original `Session`.\n\nListing 8-18 is an example HTTP\
    \ server that uses a copied `Session` object during the lifetime of an HTTP request.\
    \ In this example, a struct type is created to hold the `Session` object for easily\
    \ managing database operations from the application handlers.\n\n**Listing 8-18.**\
    \ HTTP Server Using a New Session for Each HTTP Request\n\n```\npackage main\n\
    \nimport (\n\t\"encoding/json\"\n\t\"log\"\n\t\"net/http\"\n\t\"github.com/gorilla/mux\"\
    \n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n)\n\nvar session *mgo.Session\n\
    \ntype (\n\tCategory struct {\n\t\tId          bson.ObjectId `bson:\"_id,omitempty\"\
    `\n\t\tName        string\n\t\tDescription string\n\t}\n\tDataStore struct {\n\
    \t\tsession *mgo.Session\n\t}\n)\n\n//Close mgo.Session\nfunc (d *DataStore) Close()\
    \ {\n\td.session.Close()\n}\n\n//Returns a collection from the database.\nfunc\
    \ (d *DataStore) C(name string) *mgo.Collection {\n\treturn d.session.DB(\"taskdb\"\
    ).C(name)\n}\n\n//Create a new DataStore object for each HTTP request\nfunc NewDataStore()\
    \ *DataStore {\n\tds := &DataStore{\n\t\tsession: session.Copy(),\n\t}\n\treturn\
    \ ds\n}\n\n//Insert a record\nfunc PostCategory(w http.ResponseWriter, r *http.Request)\
    \ {\n\tvar category Category\n\t// Decode the incoming Category json\n\terr :=\
    \ json.NewDecoder(r.Body).Decode(&category)\n\tif err != nil {\n\t\tpanic(err)\n\
    \t}\n\tds := NewDataStore()\n\tdefer ds.Close()\n\t//Getting the mgo.Collection\n\
    \tc := ds.C(\"categories\")\n\t//Insert record\n\terr = c.Insert(&category)\n\t\
    if err != nil {\n\t\tpanic(err)\n\t}\n\tw.WriteHeader(http.StatusCreated)\n}\n\
    \n//Read all records\nfunc GetCategories(w http.ResponseWriter, r *http.Request)\
    \ {\n\tvar categories []Category\n\tds := NewDataStore()\n\tdefer ds.Close()\n\
    \t//Getting the mgo.Collection\n\tc := ds.C(\"categories\")\n\titer := c.Find(nil).Iter()\n\
    \tresult := Category{}\n\tfor iter.Next(&result) {\n\t\tcategories = append(categories,\
    \ result)\n\t}\n\tw.Header().Set(\"Content-Type\", \"application/json\")\n\tj,\
    \ err := json.Marshal(categories)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\t\
    w.WriteHeader(http.StatusOK)\n\tw.Write(j)\n}\n\nfunc main() {\n\tvar err error\n\
    \tsession, err = mgo.Dial(\"localhost\")\n\tif err != nil {\n\t\tpanic(err)\n\t\
    }\n\tr := mux.NewRouter()\n\tr.HandleFunc(\"/api/categories\", GetCategories).Methods(\"\
    GET\")\n\tr.HandleFunc(\"/api/categories\", PostCategory).Methods(\"POST\")\n\t\
    server := &http.Server{\n\t\tAddr:    \":8080\",\n\t\tHandler: r,\n\t}\n\tlog.Println(\"\
    Listening...\")\n\tserver.ListenAndServe()\n}\n```\n\nA `DataStore` struct type\
    \ is defined to easily manage `mgo.Session`. Two methods are added to the `DataStore`\
    \ type: `Close` and `C`. The `Close` method releases the resources of the newly\
    \ created `Session` object by calling the `Close` method of the `Session` object.\
    \ This method is invoked by using the `defer` function after the lifetime of an\
    \ HTTP request. The `C` method returns the `Collection` object with the given\
    \ name:\n\n```\ntype DataStore struct {\n\tsession *mgo.Session\n}\n\n//Close\
    \ mgo.Session\nfunc (d *DataStore) Close() {\n\td.session.Close()\n}\n\n//Returns\
    \ a collection from the database.\nfunc (d *DataStore) C(name string) *mgo.Collection\
    \ {\n\treturn d.session.DB(\"taskdb\").C(name)\n}\n```\n\nThe `NewDataStore` function\
    \ creates a new `DataStore` object by providing a new `Session` object using the\
    \ `Copy` method of the `Session` obtained from the `Dial` method:\n\n```\nfunc\
    \ NewDataStore() *DataStore {\n\tds := &DataStore{\n\t\tsession: session.Copy(),\n\
    \t}\n\treturn ds\n}\n```\n\nThe `NewDataStore` function is called to create a\
    \ `DataStore` object for providing a copied `Session` object being used in the\
    \ lifetime of an HTTP request. For each handler for a route, a new `Session` object\
    \ is used through the `DataStore` type. In short, using a global `Session` object\
    \ is not a good practice; it is recommended to use a copied `Session` object for\
    \ the lifetime of each HTTP request. This approach allows you to have multiple\
    \ `Session` objects if required.\n\n## Summary\n\nWhen working with web applications,\
    \ it is important that you persist application data into persistence storage.\
    \ In this chapter, you learned how to persist data into MongoDB using the `mgo`\
    \ package, which is a MongoDB driver for Go.\n\nMongoDB is an open-source document\
    \ database that provides high performance, high availability, and automatic scaling.\
    \ MongoDB is the most popular NoSQL database; it has been widely used by modern\
    \ web applications. The `mgo` driver provides a simple API that follows the Go\
    \ idioms.\n\nYou can add indexes to fields of MongoDB collections, which provide\
    \ high performance on read operations. When developing web applications in Go,\
    \ using a global `mgo.Session` object is not a good practice. The right approach\
    \ for managing `Session` is to create a new `Session` object by calling `Copy`,\
    \ `Clone`, or `New` on the obtained `Session` object, which was obtained by the\
    \ `Dial` method of the `mgo` package.\n\nThe next chapter will show you more about\
    \ working with the MongoDB database using the `mgo` package.\n\n# Building RESTful\
    \ Services\n\nThe last few chapters discussed various aspects of building web-based\
    \ systems, including the fundamentals of Go web programming using the `http` package,\
    \ the `html/template` package for rendering the UI, various approaches for authentication,\
    \ HTTP middleware, and data persistence with MongoDB.\n\nThis chapter will implement\
    \ a full-fledged RESTful API application named TaskManager by using the concepts\
    \ discussed in previous chapters. This application will also have new features,\
    \ such as the capability to manage dependencies for external packages and deploy\
    \ an HTTP server with Docker."
