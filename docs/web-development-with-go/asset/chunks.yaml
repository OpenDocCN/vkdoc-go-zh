    ### ж—Ҙеҝ—и®°еҪ•


    ж—Ҙеҝ—и®°еҪ•жңҚеҠЎе…Ғи®ё App Engine еә”з”ЁзЁӢеәҸж”¶йӣҶе’ҢеӯҳеӮЁж—Ҙеҝ—гҖӮ


    ### д»»еҠЎйҳҹеҲ—


    д»»еҠЎйҳҹеҲ—жңҚеҠЎйҖҡиҝҮдҪҝз”ЁзЁҚеҗҺжү§иЎҢзҡ„е°ҸеһӢзҰ»ж•Јд»»еҠЎпјҢдҪҝ App Engine еә”з”ЁзЁӢеәҸиғҪеӨҹеңЁз”ЁжҲ·иҜ·жұӮд№ӢеӨ–жү§иЎҢе·ҘдҪңгҖӮ


    ### е®үе…Ёжү«жҸҸ


    е®үе…Ёжү«жҸҸжңҚеҠЎз”ЁдәҺжү«жҸҸеә”з”ЁзЁӢеәҸзҡ„е®үе…ЁжјҸжҙһпјҢдҫӢеҰӮ XSS ж”»еҮ»гҖӮ


    ## йҖӮз”ЁдәҺ Go иҜӯиЁҖзҡ„ Google App Engine


    App Engine жҸҗдҫӣдәҶдёҖдёӘ Go иҝҗиЎҢж—¶зҺҜеўғпјҢз”ЁдәҺеңЁдә‘з«ҜиҝҗиЎҢеҺҹз”ҹзј–иҜ‘зҡ„ Go д»Јз ҒпјҢдҪҝжӮЁиғҪеӨҹеңЁ Google Cloud еҹәзЎҖи®ҫж–ҪдёҠжһ„е»әй«ҳеәҰеҸҜжү©еұ•зҡ„
    Web еә”з”ЁзЁӢеәҸгҖӮдҪҝз”Ё App EngineпјҢGo еә”з”ЁзЁӢеәҸиҝҗиЎҢеңЁдёҖдёӘеҸ—дҝқжҠӨзҡ„вҖңжІҷзӣ’вҖқзҺҜеўғдёӯпјҢиҜҘзҺҜеўғе…Ғи®ё App Engine зҺҜеўғе°Ҷ Web иҜ·жұӮеҲҶеҸ‘еҲ°еӨҡдёӘжңҚеҠЎеҷЁпјҢе№¶ж №жҚ®йңҖжұӮжү©еұ•жңҚеҠЎеҷЁд»Ҙе®һзҺ°жҢүйңҖдјёзј©гҖӮеҪ“жӮЁеңЁ
    App Engine зҡ„жІҷзӣ’зҺҜеўғдёӯејҖеҸ‘еә”з”ЁзЁӢеәҸж—¶пјҢж— йңҖй…ҚзҪ®жңҚеҠЎеҷЁжҲ–иҠұж—¶й—ҙз®ЎзҗҶеҹәзЎҖи®ҫж–ҪгҖӮApp Engine жҸҗдҫӣдәҶдёҖдёӘйғЁзҪІе·Ҙе…·пјҢе…Ғи®ёжӮЁе°Ҷ Go еә”з”ЁзЁӢеәҸдёҠдј еҲ°дә‘з«ҜгҖӮ


    ## Go ејҖеҸ‘зҺҜеўғ


    жӮЁеҸҜд»ҘдҪҝз”ЁйҖӮз”ЁдәҺ Go зҡ„ App Engine SDK еңЁ App Engine дёҠејҖеҸ‘гҖҒжөӢиҜ•е’ҢйғЁзҪІ Go еә”з”ЁзЁӢеәҸпјҢиҜҘ SDK жҸҗдҫӣдәҶеңЁ Google
    Cloud дёҠејҖеҸ‘гҖҒжөӢиҜ•е’ҢиҝҗиЎҢеә”з”ЁзЁӢеәҸжүҖйңҖзҡ„е·Ҙе…·е’Ң APIгҖӮApp Engine Go SDK еҢ…еҗ«дёҖдёӘејҖеҸ‘ Web жңҚеҠЎеҷЁпјҢе…Ғи®ёжӮЁеңЁжң¬ең°и®Ўз®—жңәдёҠиҝҗиЎҢ App
    Engine еә”з”ЁзЁӢеәҸпјҢд»ҘдҫҝеңЁдёҠдј еҲ°дә‘з«Ҝд№ӢеүҚжөӢиҜ• Go еә”з”ЁзЁӢеәҸгҖӮ


