  trans: "\n# дҪҝз”Ё Go иҜӯиЁҖзҡ„еҫ®жңҚеҠЎжһ¶жһ„\n\nеҫ®жңҚеҠЎжһ¶жһ„жҳҜдёҖз§ҚеҲҶеёғејҸеә”з”ЁзЁӢеәҸжһ¶жһ„пјҢиҖҢ Go иҜӯиЁҖжҳҜжһ„е»әеҲҶеёғејҸзі»з»ҹзҡ„з»қдҪійҖүжӢ©гҖӮиҜёеҰӮ `Node.js`\
    \ иҝҷзұ»жҠҖжңҜиҷҪж“…й•ҝжһ„е»әиҪ»йҮҸзә§ RESTful APIпјҢдҪҶеңЁжһ„е»әеҲҶеёғејҸеә”з”Ёж—¶еҫҖеҫҖдјҡеҠӣдёҚд»ҺеҝғгҖӮGo жҳҜеҫ®жңҚеҠЎжһ¶жһ„еә”з”Ёзҡ„йҰ–йҖүиҜӯиЁҖпјҢе®ғеҸҜз”ЁдәҺеә”з”Ёжһ¶жһ„зҡ„жүҖжңүз»„д»¶пјҢеҢ…жӢ¬дҪңдёәзӢ¬з«ӢеҚ•е…ғиҝҗиЎҢзҡ„е°ҸеһӢжңҚеҠЎгҖҒз”ЁдәҺзӢ¬з«ӢжңҚеҠЎй—ҙйҖҡдҝЎзҡ„\
    \ RESTful жңҚеҠЎпјҢд»ҘеҸҠйҖҡиҝҮ AMQP зӯүејӮжӯҘеҚҸи®®е®һзҺ°зӢ¬з«ӢжңҚеҠЎй—ҙйҖҡдҝЎзҡ„ж¶ҲжҒҜд»ЈзҗҶгҖӮ\n\n## жң¬з« ж‘ҳиҰҒ\n\nGo жҳҜдёҖз§ҚзҺ°д»ЈгҖҒйқҷжҖҒзұ»еһӢгҖҒеҺҹз”ҹзј–иҜ‘гҖҒеһғеңҫеӣһж”¶зҡ„зј–зЁӢиҜӯиЁҖпјҢе®ғж—ўиғҪи®©дҪ зј–еҶҷй«ҳжҖ§иғҪзҡ„еә”з”ЁпјҢеҸҲеӣ е…¶з®ҖжҙҒзҡ„иҜӯжі•е’Ңе®һз”Ёзҡ„и®ҫи®ЎиҖҢжҸҗеҚҮдәҶејҖеҸ‘ж•ҲзҺҮгҖӮеңЁ\
    \ Go дёӯпјҢе№¶еҸ‘жҳҜж ёеҝғиҜӯиЁҖеұӮзҡ„еҶ…зҪ®зү№жҖ§пјҢи®©дҪ иғҪдёәзҺ°д»Ји®Ўз®—жңәзј–еҶҷй«ҳж•Ҳзҡ„иҪҜд»¶зі»з»ҹгҖӮGo з”ҹжҖҒзі»з»ҹеҢ…еҗ«дәҶиҜӯиЁҖгҖҒеә“е’Ңе·Ҙе…·пјҢдёәејҖеҸ‘еҗ„зұ»еә”з”ЁжҸҗдҫӣдәҶжүҖжңүеҝ…йңҖеҠҹиғҪгҖӮGo\
    \ Mobile йЎ№зӣ®жҸҗдҫӣдәҶз”ЁдәҺжһ„е»ә Android е’Ң iOS е№іеҸ°еҺҹз”ҹз§»еҠЁеә”з”Ёзҡ„еҢ…е’Ңе·Ҙе…·гҖӮGo жҳҜжһ„е»әеҸҜжү©еұ•гҖҒеҹәдәҺ Web зҡ„еҗҺз«Ҝзі»з»ҹе’Ңеҫ®жңҚеҠЎзҡ„дјҳз§Җзј–зЁӢиҜӯиЁҖгҖӮ\n\
    \n# Go иҜӯиЁҖеҹәзЎҖ\n\nз¬¬ 1 з«  жҰӮиҝ°дәҶ Go зј–зЁӢиҜӯиЁҖпјҢе№¶и®Ёи®әдәҶе®ғдёҺе…¶д»–зј–зЁӢиҜӯиЁҖзҡ„дёҚеҗҢд№ӢеӨ„гҖӮеңЁжң¬з« дёӯпјҢдҪ е°ҶеӯҰд№ дҪҝз”ЁеҢ…зј–еҶҷеҸҜеӨҚз”Ёд»Јз Ғзҡ„ Go еҹәзЎҖпјҢд»ҘеҸҠеҰӮдҪ•еӨ„зҗҶж•°з»„е’ҢйӣҶеҗҲгҖӮдҪ иҝҳе°ҶеӯҰд№ \
    \ Go иҜӯиЁҖзҡ„еҹәзЎҖзҹҘиҜҶпјҢдҫӢеҰӮ `defer`гҖҒ`panic` е’Ң `recover`пјҢе№¶дәҶи§Ј Go зӢ¬зү№зҡ„й”ҷиҜҜеӨ„зҗҶиғҪеҠӣгҖӮ\n\n## еҢ…\n\nеҜ№дәҺ Go\
    \ ејҖеҸ‘иҖ…иҖҢиЁҖпјҢејҖеҸ‘еә”з”Ёзҡ„и®ҫи®ЎзҗҶеҝөжҳҜејҖеҸ‘еҸҜеӨҚз”Ёзҡ„гҖҒиҫғе°Ҹзҡ„иҪҜд»¶з»„д»¶зүҮж®өпјҢз„¶еҗҺйҖҡиҝҮз»„еҗҲиҝҷдәӣз»„д»¶жқҘжһ„е»әеә”з”ЁгҖӮGo йҖҡиҝҮе…¶еҢ…з”ҹжҖҒзі»з»ҹжҸҗдҫӣдәҶжЁЎеқ—еҢ–гҖҒеҸҜз»„еҗҲжҖ§е’Ңд»Јз ҒеӨҚз”ЁжҖ§гҖӮGo\
    \ йј“еҠұдҪ йҖҡиҝҮеҢ…зј–еҶҷеҸҜз»ҙжҠӨдё”еҸҜеӨҚз”Ёзҡ„д»Јз ҒзүҮж®өпјҢдҪҝдҪ иғҪеӨҹз”Ёиҝҷдәӣиҫғе°Ҹзҡ„еҢ…жқҘз»„еҗҲеә”з”ЁгҖӮGo еҢ…жҳҜдёҖдёӘиҮіе…ійҮҚиҰҒзҡ„жҰӮеҝөпјҢе®ғи®©дҪ иғҪеӨҹе®һзҺ°и®ёеӨҡ Go зҡ„и®ҫи®ЎеҺҹеҲҷгҖӮдёҺ Go\
    \ зҡ„е…¶д»–зү№жҖ§дёҖж ·пјҢеҢ…зҡ„и®ҫи®Ўд№ҹжіЁйҮҚз®ҖжҙҒжҖ§е’Ңе®һз”ЁжҖ§гҖӮ\n\nGo жәҗж–Үд»¶иў«з»„з»ҮеҲ°з§°дёәеҢ…зҡ„зӣ®еҪ•дёӯпјҢе№¶дё”еҢ…еҗҚеҝ…йЎ»дёҺеҢ…еҗ« Go жәҗж–Үд»¶зҡ„зӣ®еҪ•еҗҚзӣёеҗҢгҖӮдҪ е°Ҷжү©еұ•еҗҚдёә `.go`\
    \ зҡ„ Go жәҗж–Үд»¶з»„з»ҮеҲ°зӣ®еҪ•дёӯпјҢеҗҢдёҖзӣ®еҪ•дёӢзҡ„жәҗж–Үд»¶еҢ…еҗҚзӣёеҗҢгҖӮж ҮеҮҶеә“дёӯзҡ„еҢ…дҪҚдәҺ `GOROOT` зӣ®еҪ•пјҢеҚі Go зҡ„е®үиЈ…зӣ®еҪ•гҖӮдҪ еңЁ `GOPATH` зӣ®еҪ•дёӯзј–еҶҷ\
    \ Go зЁӢеәҸдҪңдёәеҢ…пјҢиҝҷдәӣеҢ…жҳ“дәҺиў«е…¶д»–еҢ…еӨҚз”ЁгҖӮ\n\n**жіЁж„Ҹпјҡ** ж ҮеҮҶеә“еҢ…зҡ„ж–ҮжЎЈеҸҜеңЁ [`http://golang.org/pkg/`](http://golang.org/pkg/)\
    \ жүҫеҲ°гҖӮи®ҝй—® [`http://godoc.org/`](http://godoc.org/) еҸҜиҺ·еҸ–ж ҮеҮҶеә“е’Ңз¬¬дёүж–№еә“зҡ„еҢ…ж–ҮжЎЈгҖӮ\n\n### еҢ… main\n\
    \nеңЁ Go дёӯпјҢдҪ еҸҜд»Ҙзј–еҶҷдёӨз§Қзұ»еһӢзҡ„зЁӢеәҸпјҡеҸҜжү§иЎҢзЁӢеәҸе’Ңе…ұдә«еә“гҖӮеҪ“зј–еҶҷеҸҜжү§иЎҢзЁӢеәҸж—¶пјҢеҝ…йЎ»е°Ҷ `main` дҪңдёәеҢ…еҗҚпјҢд»ҘдҪҝиҜҘеҢ…жҲҗдёәеҸҜжү§иЎҢзЁӢеәҸпјҡеҢ… `main`\
    \ е‘ҠиҜү Go зј–иҜ‘еҷЁиҜҘеҢ…еә”зј–иҜ‘дёәеҸҜжү§иЎҢзЁӢеәҸгҖӮеңЁе®ҳж–№ Go ж–ҮжЎЈдёӯпјҢеҸҜжү§иЎҢзЁӢеәҸйҖҡеёёиў«з§°дёәе‘Ҫд»ӨпјҲcommandsпјүгҖӮеҸҜжү§иЎҢзЁӢеәҸзҡ„е…ҘеҸЈзӮ№жҳҜ `main` еҢ…дёӯзҡ„\
    \ `main` еҮҪж•°пјӣ`main` еҢ…дёӯзҡ„ `main` еҮҪж•°жҳҜеҸҜжү§иЎҢзЁӢеәҸзҡ„е…ҘеҸЈзӮ№гҖӮеҪ“дҪ зј–еҶҷдҪңдёәе…ұдә«еә“зҡ„еҢ…ж—¶пјҢеҢ…дёӯдёҚеә”еҢ…еҗ« `main` еҢ…жҲ– `main`\
    \ еҮҪж•°гҖӮ\n\nжё…еҚ• 2-1 жҳҜеҢ… `main` зҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 2-1.** еҢ…еҗ« main еҮҪж•°зҡ„еҢ… main\n\n```\npackage\
    \ main\n\nimport (\n    \"fmt\"\n)\n\nfunc main() {\n    fmt.Println(\"Hello World!\"\
    )\n}\n```\n\nеҪ“дҪ дҪҝз”Ё Go е·Ҙе…·жһ„е»әдёҠиҝ°зЁӢеәҸж—¶пјҢGo зј–иҜ‘еҷЁдјҡз”ҹжҲҗдёҖдёӘеҸҜжү§иЎҢдәҢиҝӣеҲ¶ж–Үд»¶дҪңдёәиҫ“еҮәгҖӮеҰӮеүҚжүҖиҝ°пјҢеҰӮжһңдҪ жғіиҰҒеңЁ Go дёӯжһ„е»әеҸҜжү§иЎҢзЁӢеәҸпјҢдҪ еҝ…йЎ»зј–еҶҷдёҖдёӘеҢ…еҗ«\
    \ `main` еҮҪж•°дҪңдёәзЁӢеәҸе…ҘеҸЈзӮ№зҡ„ `main` еҢ…гҖӮ\n\n### еҢ…еҲ«еҗҚ\n\nеңЁзј–еҶҷ Go еҢ…ж—¶пјҢдҪ ж— йңҖжӢ…еҝғеҢ…еҗҚжӯ§д№үпјӣдҪ з”ҡиҮіеҸҜд»ҘдҪҝз”ЁдёҺж ҮеҮҶеә“зӣёеҗҢзҡ„еҢ…еҗҚгҖӮеҪ“дҪ д»Һ\
    \ `GOPATH` дҪҚзҪ®еҜје…ҘиҮӘе·ұзҡ„еҢ…ж—¶пјҢдҪ йңҖиҰҒеј•з”ЁеҢ…дҪҚзҪ®зҡ„е®Ңж•ҙи·Ҝеҫ„д»ҘйҒҝе…ҚеҢ…еҗҚжӯ§д№үгҖӮдҪ еҸҜд»Ҙд»ҺдёӨдёӘдёҚеҗҢзҡ„дҪҚзҪ®дҪҝз”ЁеҗҢеҗҚзҡ„дёӨдёӘеҢ…пјҢдҪҶеңЁзЁӢеәҸдёӯеј•з”Ёж—¶еә”йҒҝе…ҚеҗҚз§°жӯ§д№үгҖӮеҢ…еҲ«еҗҚеё®еҠ©дҪ и§ЈеҶіеј•з”ЁеӨҡдёӘеҗҢеҗҚеҢ…ж—¶зҡ„еҗҚз§°жӯ§д№үй—®йўҳгҖӮ\n\
    \nжё…еҚ• 2-2 жҳҜдёҖдёӘдҪҝз”ЁеҢ…еҲ«еҗҚжқҘеј•з”ЁеҢ…зҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ• 2-2.** дҪҝз”ЁеҢ…еҲ«еҗҚйҒҝе…ҚеҗҚз§°жӯ§д№ү\n\n```\npackage main\n\n\
    import (\n      mongo \"lib/mongodb/db\"\n      mysql \"lib/mysql/db\"\n)\n\n\
    func main() {\n    mongo.Get() //и°ғз”ЁеҢ… \"lib/mongodb/db\" зҡ„ж–№жі•\n    mysql.Get() //и°ғз”ЁеҢ…\
    \ \"lib/mysql/db\" зҡ„ж–№жі•\n}\n```\n\nиҝҷйҮҢеҜје…ҘдәҶдёӨдёӘеҗҢеҗҚдёә `db` зҡ„еҢ…пјҢдҪҶе®ғд»¬дҪҝз”ЁдёҚеҗҢзҡ„еҲ«еҗҚиҝӣиЎҢеј•з”ЁпјҢе№¶дё”йҖҡиҝҮеҲ«еҗҚжқҘи®ҝй—®е…¶еҜјеҮәзҡ„ж ҮиҜҶз¬ҰгҖӮ\n\
    \n### еҮҪж•° init\n\nеҪ“зј–еҶҷеҢ…ж—¶пјҢдҪ еҸҜиғҪйңҖиҰҒдёәеҢ…жҸҗдҫӣдёҖдәӣеҲқе§ӢеҢ–йҖ»иҫ‘пјҢдҫӢеҰӮеҲқе§ӢеҢ–еҢ…еҸҳйҮҸгҖҒеҲқе§ӢеҢ–ж•°жҚ®еә“еҜ№иұЎпјҢд»ҘеҸҠдёәеҢ…жҸҗдҫӣдёҖдәӣеј•еҜјйҖ»иҫ‘гҖӮ`init`\
    \ еҮҪж•°жңүеҠ©дәҺеҗ‘еҢ…дёӯжҸҗдҫӣеҲқе§ӢеҢ–йҖ»иҫ‘пјҢе®ғдјҡеңЁзЁӢеәҸжү§иЎҢејҖе§Ӣж—¶иў«жү§иЎҢгҖӮ\n\nжё…еҚ• 2-3 жҳҜдёҖдёӘдҪҝз”Ё `init` еҮҪж•°еҲқе§ӢеҢ–ж•°жҚ®еә“дјҡиҜқеҜ№иұЎзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n\
    **жё…еҚ• 2-3.** дҪҝз”Ё init еҮҪж•°\n\n```\npackage db\n\nimport (\n    \"gopkg.in/mgo.v2\"\
    \n)\n\nvar Session *mgo.Session //ж•°жҚ®еә“дјҡиҜқеҜ№иұЎ\n\nfunc init() {\n    // еҲқе§ӢеҢ–д»Јз ҒеңЁжӯӨ\n \
    \   Session, err := mgo.Dial(\"localhost\")\n}\n\nfunc get() {\n        //дҪҝз”Ё Session\
    \ еҜ№иұЎзҡ„ get йҖ»иҫ‘\n}\n\nfunc add() {\n        //дҪҝз”Ё Session еҜ№иұЎзҡ„ add йҖ»иҫ‘\n}\n\nfunc update()\
    \ {\n        //дҪҝз”Ё Session еҜ№иұЎзҡ„ update йҖ»иҫ‘\n}\n\nfunc delete() {\n        //дҪҝз”Ё Session\
    \ еҜ№иұЎзҡ„ delete йҖ»иҫ‘\n}\n```\n\nеңЁиҝҷж®өд»Јз ҒдёӯпјҢдёҖдёӘ MongoDB дјҡиҜқеҜ№иұЎеңЁ `init` еҮҪж•°дёӯиў«еҲӣе»әгҖӮеҪ“дҪ е°ҶеҢ… `db` еҜје…Ҙе…¶д»–еҢ…ж—¶пјҢ`init`\
    \ еҮҪж•°е°ҶеңЁзЁӢеәҸжү§иЎҢејҖе§Ӣж—¶иў«и°ғз”ЁпјҢе…¶дёӯеҢ…еҗ«дәҶеҢ…зҡ„еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮеҒҮи®ҫдҪ д»Һ `main` еҢ…дёӯеј•з”ЁдәҶеҢ… `db`пјҢйӮЈд№Ҳ `init` еҮҪж•°е°ҶеңЁ `main` еҮҪж•°жү§иЎҢд№ӢеүҚиў«и°ғз”ЁгҖӮ\n"
- fmt: "### Using a Blank Identifier\n\nIn some scenarios, you may need to reference\
    \ a package to invoke only its `init` method to execute the initialization logic\
    \ in the referenced package, but not to use other identifiers. Suppose that you\
    \ want the `init` function of package `db` (refer to Listing [2-3](#A978-1-4842-1052-9_2_Chapter.html#FPar4))\
    \ to be invoked from the package `main`, but not use other functions. You reference\
    \ the package `db` in package `main` to invoke the `init` function for initializing\
    \ the database session object. The Go compiler shows an error if none of the identifiers\
    \ of package is referencing from the package where you imported a package, but\
    \ not referencing any package identifiers. Keep in mind that you can't directly\
    \ call the `init` function by explicitly referencing it; it gets automatically\
    \ invoked when you reference the packages. When you reference packages, the `init`\
    \ functions of these packages will be invoked at the beginning of the execution.\n\
    \nIf you want to reference a package only for invoking its `init` method, you\
    \ can use a blank identifier (`_`) as the package alias name. The compiler ignores\
    \ the error of not using the package identifier, but still invokes the `init`\
    \ function, as shown in Listing [2-4](#A978-1-4842-1052-9_2_Chapter.html#FPar5).\n\
    \nListing 2-4. Using a Blank Identifier ( _ ) to Call Only the init Method\n\n\
    ```\npackage main\n\nimport (\n    \"fmt\"\n    _ \"lib/mongodb/db\"\n)\n\nfunc\
    \ main() {\n    //implementation here\n}\n```\n\nIn Listing [2-4](#A978-1-4842-1052-9_2_Chapter.html#FPar5),\
    \ the `db` package was imported with a package alias as a blank identifier (`_`).\
    \ Here you want the `init` function of package `db` to be invoked, but not use\
    \ other package identifiers.\n\n### Importing Packages\n\nGo source files are\
    \ organized into directories as packages that provide code reusability into other\
    \ packages. If you want to reuse package code into other shared libraries and\
    \ executable programs, you must import the packages into your programs. You can\
    \ import packages into your Go programs by using the keyword `import`. The statement\
    \ `import` tells the Go compiler that you want to reference the code provided\
    \ by that particular package. When you import a package into a program, you can\
    \ reuse all the exported identifiers of the referenced packages. If you want to\
    \ export variables, constants, and functions to be used with other programs, the\
    \ name of the identifier must start with an uppercase letter. See Listing [2-5](#A978-1-4842-1052-9_2_Chapter.html#FPar6).\n\
    \nListing 2-5. The import Statement to the imports Package\n\n```\nimport (\n\
    \    \"bytes\"\n    \"fmt\"\n    \"unicode\"\n)\n```\n\nIn this listing, the packages\
    \ `bytes`, `fmt`, and `unicode` are imported. The idiomatic way to import multiple\
    \ packages in Go is to write the `import` statements in an `import` block, as\
    \ shown here.\n\nWhen a package is imported, the Go compiler will search the `GOROOT`\
    \ directory and then look for the `GOPATH` directory if it can't find the package\
    \ in `GOROOT`. If the Go compiler can't find a package in either the `GOROOT`\
    \ or `GOPATH` location, it will generate an error when you try to build your program.\n\
    \n### Install Third-Party Packages\n\nThe Go developer community is very enthusiastic\
    \ about providing many useful third-party packages through code-sharing web sites\
    \ such as `github.com` and `code.google.com`. You can import and reuse these third-party\
    \ packages by using the Go tools. The `go get` command fetches packages from remote\
    \ repositories.\n\nThe following `go get` command fetches the third-part package\
    \ `negroni` and installs it into the `GOPATH` location:\n\n```\ngo get github.com/codegangsta/negroni\n\
    ```\n\nThe `go get` command fetches the package and dependent packages recursively\
    \ from the repository location. Once the package is fetched into the `GOPATH`,\
    \ you can import and reuse these packages from all the programs located in the\
    \ `GOPATH` location. In many other developer ecosystems, you have to import these\
    \ packages at a project level; you have to install packages for each individual\
    \ project separately. When you import a package in Go, you actually import from\
    \ a common location: the `GOPATH/pkg` directory, so you can appreciate the simplicity\
    \ and pragmatism in many of the Go features, including the package ecosystem.\n\
    \n### Writing Packages\n\nLet's write a sample package to reuse with other programs.\
    \ Listing [2-6](#A978-1-4842-1052-9_2_Chapter.html#FPar7) is a simple package\
    \ that swaps characters' case from upper- to lowercase or lower- to uppercase.\n\
    \nListing 2-6. Library Package\n\n```\npackage strcon\n\nimport (\n    \"bytes\"\
    \n    \"unicode\"\n)\n\n// Swap characters case from upper to lower or lower to\
    \ upper.\nfunc SwapCase(str string) string {\n    buf := &bytes.Buffer{}\n   \
    \ for _, r := range str {\n        if unicode.IsUpper(r) {\n            buf.WriteRune(unicode.ToLower(r))\n\
    \        } else {\n            buf.WriteRune(unicode.ToUpper(r))\n        }\n\
    \    }\n    return buf.String()\n}\n```\n\nThe package is named `strcon`. The\
    \ idiomatic way to provide a package name is to give short and simple lowercase\
    \ names without underscores or mixed capital letters. The package names of the\
    \ standard library are a great reference for naming packages.\n\nLet's build and\
    \ install the package `strcon` to be used with other programs. The package provides\
    \ a method named `SwapCase` that swaps the character case of a string from upper-\
    \ to lowercase or lower- to uppercase. Reuse the packages `bytes` and `unicode`\
    \ from the standard library to swap character case. Because the name of the `SwapCase`\
    \ method starts with an uppercase letter, it will be exported to other programs\
    \ when this package is referenced package. The `SwapCase` method iterates through\
    \ a string and changed the case of each character:\n\n```\nfor _, r := range str\
    \ {\n    if unicode.IsUpper(r) {\n        buf.WriteRune(unicode.ToLower(r))\n\
    \    } else {\n        buf.WriteRune(unicode.ToUpper(r))\n    }\n}\n```\n\nThe\
    \ keyword `range` allows you to iterate through arrays and collections. By iterating\
    \ through a string value, you can extract each character as a value and swap the\
    \ character case. On the left side of the range block, you can provide two variables\
    \ for getting the `key` and `value` of each item in the collection. In this code\
    \ block, the `value` for getting the character value is used, but you don't use\
    \ the `key` in the program. In this context, you can use a blank identifier (`_`)\
    \ to avoid compiler errors. It is common practice to use a blank identifier with\
    \ `range` whenever you want to ignore a `key` or `value` variable declaration\
    \ from the left side.\n\nWith the following command at the location of the package\
    \ directory, build the package and install it on the `pkg` subdirectory of `GOPATH`:\n\
    \n```\ngo install\n```\n\nLet's write a sample program to reuse the code of the\
    \ `strconv` package (see Listing [2-7](#A978-1-4842-1052-9_2_Chapter.html#FPar8)).\n\
    \nListing 2-7. Reusing the strconv Package in main.go\n\n```\npackage main\n\n\
    import (\n    \"fmt\"\n    \"strcon\"\n)\n\nfunc main() {\n    s := strconv.SwapCase(\"\
    Gopher\")\n    fmt.Println(\"Converted string is :\", s)\n}\n```\n\nWe import\
    \ the package `strcon` to reuse the code for swapping character case in a string.\
    \ Let's run the program by typing the following command in the terminal from the\
    \ package directory:\n\n```\ngo run main.go\n```\n\nYou should see the following\
    \ result when running the program:\n\n```\ngOPHER\n```\n\nBecause the program\
    \ in Listing [2-7](#A978-1-4842-1052-9_2_Chapter.html#FPar8) is written in package\
    \ `main`, the `Go build` command generates an executable binary into the package\
    \ directory. The `Go install` command builds the package and installs the resulting\
    \ binary into the `GOPATH/bin` subdirectory."
