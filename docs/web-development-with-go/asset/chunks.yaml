    ),\n```"
  raw: '### Understanding OAuth 2


    OAuth 2 is an open specification for authentication. The OAuth 2.0 authorization
    framework enables a third-party application to obtain limited access to an HTTP
    service such as Facebook, Twitter, GitHub, and Google. The most important thing
    is that OAuth 2 is a specification for authentication flow.


    OAuth 2 provides the authorization flow for web applications, desktop applications,
    and mobile applications. When you build applications, you can delegate user authentication
    to the social identity providers such as Facebook, Twitter, GitHub, and Google.
    You can register your applications into an identity provider to authorize the
    application to access the user account. When you register your application into
    the identity provider, typically it gives you a client ID and a client secret
    key to obtain access to the user account of the identity provider. Once you are
    logged in with client ID and client secret key, the authentication server gives
    you an access token that can be used for accessing protected resources of the
    web server.


    Section 7.2.2 discussed the token-based approach workflow for authentication.
    The use of a bearer token is a specification defined in the OAuth 2 authorization
    framework, which defines how to use bearer tokens in HTTP requests to access protected
    resources in OAuth 2.


    Several OAuth 2 service providers are available for authentication. Because OAuth
    2 is an open standard for authorization, you can implement these standards for
    your web APIs as an authentication mechanism for various client applications,
    including mobile and web applications.


    Note


    OAuth 2.0 is the next evolution of the OAuth protocol that was originally created
    in 2006\. OAuth 2.0 focuses on client developer simplicity while providing specific
    authorization flows for web applications, desktop applications, and mobile applications.
    The final version of the OAuth 2 specification can be found at [`http://tools.ietf.org/html/rfc6749`](http://tools.ietf.org/html/rfc6749)
    .


    ### Authentication with OAuth 2 using the Goth Package


    The Go ecosystem provides various packages for working on the OAuth 2 authentication
    protocol. The `Goth` third-party package and its `Gothic` subpackage allow you
    to work with OAuth 2 providers. `Goth` supports OAuth 2 service providers such
    as LinkedIn, Facebook, Twitter, Google, and GitHub. The `Goth` package provides
    various providers to work with each service provider. For example, it provides
    the `github.com/markbates/goth/providers/twitter` package for working with the
    Twitter identity provider.


    To install the `Goth` package, run the following command in the terminal:


    `go get github.com/markbates/goth`


    To work with the `Goth` package, you must add `github.com/markbates/goth` to the
    import list:


    `import "github.com/markbates/goth"`


