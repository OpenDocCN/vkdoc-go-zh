  trans: "\n# Gorilla Mux\n\n`http.ServeMux`жҳҜдёҖдёӘ HTTP иҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁпјҢеңЁеӨ§еӨҡж•°еёёи§ҒеңәжҷҜдёӢйғҪиғҪеҫҲеҘҪең°е·ҘдҪңгҖӮеңЁеүҚйқўзҡ„зӨәдҫӢзЁӢеәҸдёӯпјҢе®ғиў«з”ЁдҪңиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁгҖӮеҰӮжһңдҪ йңҖиҰҒдёәиҜ·жұӮеӨҡи·ҜеӨҚз”ЁеҷЁжҸҗдҫӣжӣҙејәеӨ§зҡ„еҠҹиғҪпјҢеҸҜд»ҘиҖғиҷ‘дҪҝз”ЁдёҺж ҮеҮҶ`http.ServeMux`е…је®№зҡ„з¬¬дёүж–№и·Ҝз”ұеҢ…гҖӮдҫӢеҰӮпјҢеҪ“дҪ жғіиҰҒдҪҝз”ЁйҖӮеҪ“зҡ„\
    \ HTTP з«ҜзӮ№е’Ң HTTP ж–№жі•жқҘжҢҮе®ҡ RESTful иө„жәҗж—¶пјҢдҪҝз”Ёж ҮеҮҶ`http.ServeMux`дјҡжҜ”иҫғеӣ°йҡҫгҖӮ\n\nжқҘиҮӘ Gorilla Web\
    \ е·Ҙе…·еҢ…пјҲ`github.com/gorilla/mux`пјүзҡ„`mux`еҢ…жҳҜдёҖдёӘејәеӨ§зҡ„иҜ·жұӮи·Ҝз”ұеҷЁпјҢе…Ғи®ёдҪ д»ҘиҮӘе®ҡд№үзҡ„ж–№ејҸй…ҚзҪ®еӨҡи·ҜеӨҚз”ЁеҷЁгҖӮиҝҷдёӘеҢ…еңЁжһ„е»ә RESTful\
    \ жңҚеҠЎж—¶йқһеёёжңүз”ЁпјҢе®ғе®һзҺ°дәҶ`http.Handler`жҺҘеҸЈпјҢеӣ жӯӨдёҺж ҮеҮҶ`http.ServeMux`е…је®№гҖӮдҪҝз”Ё`mux`еҢ…пјҢеҸҜд»Ҙж №жҚ® URL дё»жңәгҖҒи·Ҝеҫ„гҖҒи·Ҝеҫ„еүҚзјҖгҖҒеҚҸи®®гҖҒж ҮеӨҙе’ҢжҹҘиҜўеҖјд»ҘеҸҠ\
    \ HTTP ж–№жі•жқҘеҢ№й…ҚиҜ·жұӮгҖӮдҪ иҝҳеҸҜд»ҘдҪҝз”ЁиҮӘе®ҡд№үеҢ№й…ҚеҷЁпјҢе№¶е°Ҷи·Ҝз”ұдҪңдёәеӯҗи·Ҝз”ұеҷЁдёҺ`this`еҢ…дёҖиө·дҪҝз”ЁгҖӮ\n\nиҰҒе®үиЈ…`mux`еҢ…пјҢеңЁз»Ҳз«ҜдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\
    \n`go get github.com/gorilla/mux`\n\nи®©жҲ‘д»¬дҪҝз”Ё`mux`еҢ…жқҘй…ҚзҪ®и·Ҝз”ұпјҲеҸӮи§Ғжё…еҚ• 4-14пјүгҖӮ\n\n**жё…еҚ• 4-14.\
    \ дҪҝз”Ё`mux`еҢ…иҝӣиЎҢи·Ҝз”ұ**\n\n```\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n\
    \    r.HandleFunc(\"/api/notes\", GetNoteHandler).Methods(\"GET\")\n    r.HandleFunc(\"\
    /api/notes\", PostNoteHandler).Methods(\"POST\")\n    r.HandleFunc(\"/api/notes/{id}\"\
    , PutNoteHandler).Methods(\"PUT\")\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"\
    DELETE\")\n    server := &http.Server{\n        Addr:    \":8080\",\n        Handler:\
    \ r,\n    }\n    server.ListenAndServe()\n}\n```\n\nиҝҷйҮҢйҖҡиҝҮи°ғз”Ё`NewRouter`еҮҪж•°еҲӣе»әдәҶдёҖдёӘ`mux.Router`еҜ№иұЎпјҢз„¶еҗҺдёәиө„жәҗжҢҮе®ҡи·Ҝз”ұгҖӮеңЁжҢҮе®ҡ\
