    In this example, a full web application was completed in Go by leveraging the
    standard library package `html/template` for rendering the user interfaces with
    dynamic data. Template definition files are parsed and put into a map object so
    that you can easily get the parsed template files whenever you want to execute
    the templates. This approach allows you to avoid parsing the template files every
    time the templates are executed, which improves web application performance. By
    leveraging the various techniques shown in this example application, you can build
    real-world web applications.


    ## Summary


    This chapter showed how to work with Go templates by developing a web application.
    When you work with data-driven web applications, you have to leverage templates
    to render HTML pages in which you can combine static contents with dynamic contents
    by applying a data object to the templates.


    The `html/template` package is used to render HTML pages. It also provides a security
    mechanism against various code injections while rendering the HTML output. Both
    `html/template` and `text/template` provide the same interface for the template
    authors, in which `html/template` generates HTML output, and `text/template` generates
    textual output. By leveraging the standard library packages `net/http` and `html/template`,
    you can build full-fledged web applications in Go.


    # 6.В HTTP Middleware


    The last two chapters explored various aspects of building web applications and
    web APIs. This chapter takes a look at HTTP middleware, which simplifies development
    efforts when real-world web applications are built. The Go developer community
    has not been too interested in adopting full-fledged web application frameworks
    for building web applications. Instead, they prefer to use standard library packages
    such as the fundamental block, along with a few essential third-party libraries
    such as Gorilla `mux`. Writing and using HTTP middleware is an essential approach
    for staying with this strategy. You can implement many cross-cutting behaviors
    such as security, HTTP request and response logging, compressing HTTP responses,
    and caching as middleware components; and these middleware components can be applied
    to many application handlers or across-the-application handlers.'
