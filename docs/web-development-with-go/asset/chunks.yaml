    \ API еә”з”ЁзЁӢеәҸпјҢеҗҚдёә TaskManagerгҖӮиҜҘеә”з”ЁзЁӢеәҸиҝҳе°ҶеҢ…еҗ«дёҖдәӣж–°зү№жҖ§пјҢдҫӢеҰӮз®ЎзҗҶеӨ–йғЁеҢ…дҫқиө–зҡ„иғҪеҠӣд»ҘеҸҠдҪҝз”Ё Docker йғЁзҪІ HTTP жңҚеҠЎеҷЁгҖӮ\n"
- fmt: '# RESTful APIs: the Backbone of Digital Transformation


    Representational State Transfer (REST) is an architectural style for building
    scalable web services. RESTful systems typically communicate over the Hypertext
    Transfer Protocol (HTTP) by using HTTP verbs. The REST architectural style was
    first described by Roy Fielding in his doctoral dissertation, in which he described
    six constraints applied to the REST architecture.


    Here are the six constraints described by Roy Fielding:


    *   Uniform interface

    *   Stateless

    *   Cacheable

    *   Client-server

    *   Layered system

    *   Code on demand (optional)


    Note


    For a better understanding of the REST architectural style, read Roy FieldingвҖҷs
    doctoral dissertation at [`http://www.ics.uci.edu/вҲјfielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%E2%88%BCfielding/pubs/dissertation/rest_arch_style.htm).


    The greatest advantages of REST architecture is that it uses the basic components
    of web programming. If you have basic knowledge of HTTP programming, you can easily
    adopt the REST architecture style for your applications. It uses HTTP as a transport
    system to communicate with remote servers. You can use XML and JSON as the data
    format to communicate among clients and servers. Resource is a key concept in
    RESTful systems, as described by Fielding in his dissertation:


    > The key abstraction of information in REST is a resource. Any information that
    can be named can be a resource: a document or image, a temporal service (e.g.
    вҖңtodayвҖҷs weather in Los AngelesвҖқ), a collection of other resources, a non-virtual
    object (e.g. a person), and so on. In other words, any concept that might be the
    target of an authorвҖҷs hypertext reference must fit within the definition of a
    resource. A resource is a conceptual mapping to a set of entities, not the entity
    that corresponds to the mapping at any particular point in time.


    By using uniform resource identifiers (URIs) and HTTP verbs, you can perform actions
    against the resources. LetвҖҷs say you define the resource `"/api/employees"`. Now
    you can retrieve the information about an employee resource using the HTTP verb
    `Get`, create a new employee resource using the HTTP verb `Post`, update an existing
    employee resource using the HTTP verb `Put`, and delete an employee resource using
    the HTTP verb `Delete`.


    Web service APIs that follow the REST architecture style are known as RESTful
    APIs. When you build RESTful APIs, you use XML and JSON as the data format for
    exchanging data among client applications and API servers. Some APIs support both
    XML and JSON formats; others support a single data format: either XML or JSON.
    When you build APIs targeted for mobile applications, the most commonly used data
    format is JSON because it is lightweight and easier to consume than it compared
    to XML. In this chapter, you will build a JSON-based RESTful API.


    ## API-Driven Development with RESTful APIs


    APIs, often RESTful APIs, are becoming the backbone of modern applications by
    enabling digital transformation in enterprises. RESTful APIs enable better integration
    among applications, regardless of technology, platforms, and devices. They are
    very important components in many application development scenarios, including
    Big Data, the Internet of Things (IoT), Microservice architecture, web applications,
    and mobile applications.


    The importance of API-based development has increased a lot in the era of mobility.
    When you build mobile applications, RESTful APIs can be used as the back end and
    for building web front-end applications. In enterprise mobility, the biggest challenge
    is not about building mobile front-end applications, but to expose enterprise
    data into mobile devices. These data might be spans in multiple systems, technologies,
    and platforms. RESTful APIs allow you to expose your enterprise data into mobile
    devices. A RESTful services layer is an important part of implementation in most
    enterprise mobility scenarios.


    In the past, web applications were developed by implemented everything on the
    server side, including user interface rendering logic using server-side templates.
    TodayвҖҷs APIs are becoming the central point of web applications and mobile applications:
    developers are building RESTful services on the server side and then building
    the front-end applications for both web and mobile by leveraging these RESTful
    services as the back end.


    ## Go: the Great Stack for RESTful Services


    I believe that Go may not be a great choice for building conventional web applications
    in which everything, including UI rendering, is implemented on the server side.
    I am not saying that Go is not good for building traditional web applications;
    you can build conventional web applications by simply using Go standard library
    packages. Go web development frameworks such as Beego and Revel are great for
    building web applications, but I strongly believe that Go is a good choice for
    building highly scalable RESTful API systems to power the back end for modern
    applications. Among the technology stacks available for building RESTful APIs,
    I highly recommended Go, which gives high performance, greater concurrency support,
    and simplicity for building scalable back-end systems. GoвҖҷs simplicity and package
    ecosystem are excellent for writing loosely coupled, maintainable RESTful services.


    The standard library package `http` provides a great foundation for building scalable
    web systems. It comes with built-in concurrency support that executes each HTTP
    request in a separate goroutine. The `http` package comes with a greater number
    of extensibility points that work well with third-party package ecosystems. If
    you want to extend or replace any functionality of the `http` package, you can
    easily build your own package without destroying the design goals of the package.
    Several useful third-party packages extend the functionality of the `http` package,
    enabling you to build highly scalable web applications and RESTful APIs using
    Go.


    When you build web-based systems, the ecosystem is very important, and there are
    many mature database driver packages available for Go. [Chapter 8](#A978-1-4842-1052-9_8_Chapter.html)
    discussed how to work with MongoDB using the `mgo` package. Database driver packages
    are available for major relational databases and NoSQL databases. If your back-end
    systems need to work with middleware messaging systems, you can find client library
    packages to work with those systems. NSQ, a real-time distributed messaging platform,
    is built with Go. In short, the Go ecosystem, including third-party packages and
    tools, provides everything required for building scalable RESTful APIs and other
    web-based, back-end systems using Go.'
  raw: '## RESTful APIs: the Backbone of Digital Transformation


    Representational State Transfer (REST) is an architectural style for building
    scalable web services. RESTful systems typically communicate over the Hypertext
    Transfer Protocol (HTTP) by using HTTP verbs. The REST architectural style was
    first described by Roy Fielding in his doctoral dissertation, in which he described
    six constraints applied to the REST architecture.


    Here are the six constraints described by Roy Fielding:


    *   Uniform interface

    *   Stateless

    *   Cacheable

    *   Client-server

    *   Layered system

    *   Code on demand (optional)


    Note


    For a better understanding of the REST architectural style, read Roy FieldingвҖҷs
    doctoral dissertation at [`http://www.ics.uci.edu/вҲјfielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%E2%88%BCfielding/pubs/dissertation/rest_arch_style.htm)
    .


    The greatest advantages of REST architecture is that it uses the basic components
    of web programming. If you have basic knowledge of HTTP programming, you can easily
    adopt the REST architecture style for your applications. It uses HTTP as a transport
    system to communicate with remote servers. You can use XML and JSON as the data
    format to communicate among clients and servers. Resource is a key concept in
    RESTful systems, as described by Fielding in his dissertation:


    > The key abstraction of information in REST is a resource. Any information that
    can be named can be a resource: a document or image, a temporal service (e.g.
    вҖңtodayвҖҷs weather in Los AngelesвҖқ), a collection of other resources, a non-virtual
    object (e.g. a person), and so on. In other words, any concept that might be the
    target of an authorвҖҷs hypertext reference must fit within the definition of a
    resource. A resource is a conceptual mapping to a set of entities, not the entity
    that corresponds to the mapping at any particular point in time.


    By using uniform resource identifiers (URIs) and HTTP verbs, you can perform actions
    against the resources. LetвҖҷs say you define the resource `"/api/employees"`. Now
    you can retrieve the information about an employee resource using the HTTP verb
    `Get`, create a new employee resource using the HTTP verb `Post`, update an existing
    employee resource using the HTTP verb `Put`, and delete an employee resource using
    the HTTP verb `Delete`.


    Web service APIs that follow the REST architecture style are known as RESTful
    APIs. When you build RESTful APIs, you use XML and JSON as the data format for
    exchanging data among client applications and API servers. Some APIs support both
    XML and JSON formats; others support a single data format: either XML or JSON.
    When you build APIs targeted for mobile applications, the most commonly used data
    format is JSON because it is lightweight and easier to consume than it compared
    to XML. In this chapter, you will build a JSON-based RESTful API.


    ### API-Driven Development with RESTful APIs


    APIs, often RESTful APIs, are becoming the backbone of modern applications by
    enabling digital transformation in enterprises. RESTful APIs enable better integration
    among applications, regardless of technology, platforms, and devices. They are
    very important components in many application development scenarios, including
    Big Data, the Internet of Things (IoT), Microservice architecture, web applications,
    and mobile applications.


    The importance of API-based development has increased a lot in the era of mobility.
    When you build mobile applications, RESTful APIs can be used as the back end and
    for building web front-end applications. In enterprise mobility, the biggest challenge
    is not about building mobile front-end applications, but to expose enterprise
    data into mobile devices. These data might be spans in multiple systems, technologies,
    and platforms. RESTful APIs allow you to expose your enterprise data into mobile
    devices. A RESTful services layer is an important part of implementation in most
    enterprise mobility scenarios.


    In the past, web applications were developed by implemented everything on the
    server side, including user interface rendering logic using server-side templates.
    TodayвҖҷs APIs are becoming the central point of web applications and mobile applications:
    developers are building RESTful services on the server side and then building
    the front-end applications for both web and mobile by leveraging these RESTful
    services as the back end.


    ### Go: the Great Stack for RESTful Services


    I believe that Go may not be a great choice for building conventional web applications
    in which everything, including UI rendering, is implemented on the server side.
    I am not saying that Go is not good for building traditional web applications;
    you can build conventional web applications by simply using Go standard library
    packages. Go web development frameworks such as Beego and Revel are great for
    building web applications, but I strongly believe that Go is a good choice for
    building highly scalable RESTful API systems to power the back end for modern
    applications. Among the technology stacks available for building RESTful APIs,
    I highly recommended Go, which gives high performance, greater concurrency support,
    and simplicity for building scalable back-end systems. GoвҖҷs simplicity and package
    ecosystem are excellent for writing loosely coupled, maintainable RESTful services.


    The standard library package `http` provides a great foundation for building scalable
    web systems. It comes with built-in concurrency support that executes each HTTP
    request in a separate goroutine. The `http` package comes with a greater number
    of extensibility points that work well with third-party package ecosystems. If
    you want to extend or replace any functionality of the `http` package, you can
    easily build your own package without destroying the design goals of the package.
    Several useful third-party packages extend the functionality of the `http` package,
    enabling you to build highly scalable web applications and RESTful APIs using
    Go.


    When you build web-based systems, the ecosystem is very important, and there are
    many mature database driver packages available for Go. [Chapter 8](#A978-1-4842-1052-9_8_Chapter.html)
    discussed how to work with MongoDB using the `mgo` package. Database driver packages
    are available for major relational databases and NoSQL databases. If your back-end
    systems need to work with middleware messaging systems, you can find client library
    packages to work with those systems. NSQ, a real-time distributed messaging platform,
    is built with Go. In short, the Go ecosystem, including third-party packages and
    tools, provides everything required for building scalable RESTful APIs and other
    web-based, back-end systems using Go.'
  trans: '

    # RESTful APIпјҡж•°еӯ—еҢ–иҪ¬еһӢзҡ„еҹәзҹі


    иЎЁиҝ°жҖ§зҠ¶жҖҒиҪ¬з§»пјҲRESTпјүжҳҜдёҖз§Қз”ЁдәҺжһ„е»әеҸҜжү©еұ• Web жңҚеҠЎзҡ„жһ¶жһ„йЈҺж јгҖӮRESTful зі»з»ҹйҖҡеёёйҖҡиҝҮдҪҝз”Ё HTTP еҠЁиҜҚпјҢеңЁи¶…ж–Үжң¬дј иҫ“еҚҸи®®пјҲHTTPпјүдёҠиҝӣиЎҢйҖҡдҝЎгҖӮREST
    жһ¶жһ„йЈҺж јз”ұзҪ—дјҠВ·иҸІе°”дёҒеңЁе…¶еҚҡеЈ«и®әж–ҮдёӯйҰ–ж¬ЎжҸҸиҝ°пјҢе…¶дёӯд»–еҲ—еҮәдәҶеә”з”ЁдәҺ REST жһ¶жһ„зҡ„е…ӯйЎ№зәҰжқҹгҖӮ


    д»ҘдёӢжҳҜзҪ—дјҠВ·иҸІе°”дёҒжҸҸиҝ°зҡ„е…ӯйЎ№зәҰжқҹпјҡ


    *   з»ҹдёҖжҺҘеҸЈ

    *   ж— зҠ¶жҖҒ

    *   еҸҜзј“еӯҳ

    *   е®ўжҲ·з«Ҝ-жңҚеҠЎеҷЁ

    *   еҲҶеұӮзі»з»ҹ

    *   жҢүйңҖд»Јз ҒпјҲеҸҜйҖүпјү


    жіЁж„Ҹ


    дёәдәҶжӣҙеҘҪең°зҗҶи§Ј REST жһ¶жһ„йЈҺж јпјҢиҜ·йҳ…иҜ»зҪ—дјҠВ·иҸІе°”дёҒзҡ„еҚҡеЈ«и®әж–ҮпјҢең°еқҖдёә [`http://www.ics.uci.edu/вҲјfielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%E2%88%BCfielding/pubs/dissertation/rest_arch_style.htm)гҖӮ


    REST жһ¶жһ„жңҖеӨ§зҡ„дјҳеҠҝеңЁдәҺе®ғдҪҝз”ЁдәҶ Web зј–зЁӢзҡ„еҹәжң¬з»„д»¶гҖӮеҰӮжһңдҪ е…·еӨҮ HTTP зј–зЁӢзҡ„еҹәзЎҖзҹҘиҜҶпјҢе°ұиғҪиҪ»жқҫең°е°Ҷ REST жһ¶жһ„йЈҺж јеә”з”ЁдәҺдҪ зҡ„еә”з”ЁзЁӢеәҸгҖӮе®ғдҪҝз”Ё
    HTTP дҪңдёәдј иҫ“зі»з»ҹдёҺиҝңзЁӢжңҚеҠЎеҷЁйҖҡдҝЎгҖӮдҪ еҸҜд»ҘдҪҝз”Ё XML е’Ң JSON дҪңдёәе®ўжҲ·з«ҜдёҺжңҚеҠЎеҷЁд№Ӣй—ҙзҡ„ж•°жҚ®дәӨжҚўж јејҸгҖӮиө„жәҗжҳҜ RESTful зі»з»ҹдёӯзҡ„е…ій”®жҰӮеҝөпјҢжӯЈеҰӮиҸІе°”дёҒеңЁе…¶и®әж–ҮдёӯжүҖжҸҸиҝ°зҡ„йӮЈж ·пјҡ


    > REST дёӯдҝЎжҒҜзҡ„е…ій”®жҠҪиұЎжҳҜиө„жәҗгҖӮд»»дҪ•еҸҜд»Ҙиў«е‘ҪеҗҚзҡ„дҝЎжҒҜйғҪеҸҜд»ҘжҲҗдёәдёҖдёӘиө„жәҗпјҡдёҖд»Ҫж–ҮжЎЈжҲ–еӣҫеғҸгҖҒдёҖйЎ№ж—¶ж•ҲжҖ§жңҚеҠЎпјҲдҫӢеҰӮвҖңжҙӣжқүзҹ¶д»ҠеӨ©зҡ„еӨ©ж°”вҖқпјүгҖҒдёҖдёӘе…¶д»–иө„жәҗзҡ„йӣҶеҗҲгҖҒдёҖдёӘйқһиҷҡжӢҹеҜ№иұЎпјҲдҫӢеҰӮдёҖдёӘдәәпјүпјҢзӯүзӯүгҖӮжҚўеҸҘиҜқиҜҙпјҢд»»дҪ•еҸҜиғҪжҲҗдёәдҪңиҖ…и¶…ж–Үжң¬еј•з”Ёзӣ®ж Үзҡ„жҰӮеҝөпјҢйғҪеҝ…йЎ»з¬ҰеҗҲиө„жәҗзҡ„е®ҡд№үгҖӮиө„жәҗжҳҜдёҖз»„е®һдҪ“зҡ„жҰӮеҝөжҳ е°„пјҢиҖҢдёҚжҳҜеңЁд»»дҪ•дёҖдёӘзү№е®ҡж—¶й—ҙзӮ№дёҺиҜҘжҳ е°„зӣёеҜ№еә”зҡ„е®һдҪ“гҖӮ


    йҖҡиҝҮдҪҝз”Ёз»ҹдёҖиө„жәҗж ҮиҜҶз¬ҰпјҲURIпјүе’Ң HTTP еҠЁиҜҚпјҢдҪ еҸҜд»ҘеҜ№иө„жәҗжү§иЎҢж“ҚдҪңгҖӮеҒҮи®ҫдҪ е®ҡд№үдәҶиө„жәҗ `"/api/employees"`гҖӮзҺ°еңЁпјҢдҪ еҸҜд»ҘдҪҝз”Ё HTTP
    еҠЁиҜҚ `Get` жқҘжЈҖзҙўе‘ҳе·Ҙиө„жәҗзҡ„дҝЎжҒҜпјҢдҪҝз”Ё `Post` жқҘеҲӣе»әж–°зҡ„е‘ҳе·Ҙиө„жәҗпјҢдҪҝз”Ё `Put` жқҘжӣҙж–°зҺ°жңүе‘ҳе·Ҙиө„жәҗпјҢд»ҘеҸҠдҪҝз”Ё `Delete` жқҘеҲ йҷӨе‘ҳе·Ҙиө„жәҗгҖӮ


    йҒөеҫӘ REST жһ¶жһ„йЈҺж јзҡ„ Web жңҚеҠЎ API иў«з§°дёә RESTful APIгҖӮеҪ“жһ„е»ә RESTful API ж—¶пјҢдҪ дјҡдҪҝз”Ё XML е’Ң JSON дҪңдёәе®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸдёҺ
    API жңҚеҠЎеҷЁд№Ӣй—ҙдәӨжҚўж•°жҚ®зҡ„ж јејҸгҖӮдёҖдәӣ API еҗҢж—¶ж”ҜжҢҒ XML е’Ң JSON дёӨз§Қж јејҸпјӣе…¶д»– API еҲҷеҸӘж”ҜжҢҒдёҖз§Қж•°жҚ®ж јејҸпјҡиҰҒд№Ҳ XMLпјҢиҰҒд№Ҳ JSONгҖӮеңЁдёәз§»еҠЁеә”з”ЁзЁӢеәҸжһ„е»ә
    API ж—¶пјҢжңҖеёёз”Ёзҡ„ж•°жҚ®ж јејҸжҳҜ JSONпјҢеӣ дёәе®ғжҜ” XML жӣҙиҪ»йҮҸпјҢд№ҹжӣҙе®№жҳ“дҪҝз”ЁгҖӮеңЁжң¬з« дёӯпјҢдҪ е°Ҷжһ„е»әдёҖдёӘеҹәдәҺ JSON зҡ„ RESTful APIгҖӮ


    ## дҪҝз”Ё RESTful API иҝӣиЎҢ API й©ұеҠЁејҖеҸ‘


    APIпјҲйҖҡеёёжҳҜ RESTful APIпјүйҖҡиҝҮеңЁдјҒдёҡзҡ„ж•°еӯ—еҢ–иҪ¬еһӢиҝҮзЁӢдёӯжҸҗдҫӣж”ҜжҢҒпјҢжӯЈйҖҗжёҗжҲҗдёәзҺ°д»Јеә”з”Ёзҡ„еҹәзҹігҖӮRESTful API иғҪеӨҹе®һзҺ°еә”з”Ёд№Ӣй—ҙжӣҙеҘҪзҡ„йӣҶжҲҗпјҢж— и®әе…¶жҠҖжңҜгҖҒе№іеҸ°е’Ңи®ҫеӨҮеҰӮдҪ•гҖӮе®ғд»¬еңЁи®ёеӨҡеә”з”ЁејҖеҸ‘еңәжҷҜдёӯйғҪжҳҜйқһеёёйҮҚиҰҒзҡ„з»„д»¶пјҢеҢ…жӢ¬еӨ§ж•°жҚ®гҖҒзү©иҒ”зҪ‘пјҲIoTпјүгҖҒеҫ®жңҚеҠЎжһ¶жһ„гҖҒWeb
    еә”з”Ёе’Ңз§»еҠЁеә”з”ЁгҖӮ


    еңЁз§»еҠЁеҢ–ж—¶д»ЈпјҢеҹәдәҺ API зҡ„ејҖеҸ‘зҡ„йҮҚиҰҒжҖ§еӨ§еӨ§жҸҗеҚҮгҖӮеңЁжһ„е»әз§»еҠЁеә”з”Ёж—¶пјҢRESTful API ж—ўеҸҜд»Ҙз”ЁдҪңеҗҺз«ҜпјҢд№ҹеҸҜд»Ҙз”ЁдәҺжһ„е»ә Web еүҚз«Ҝеә”з”ЁгҖӮеңЁдјҒдёҡз§»еҠЁеҢ–дёӯпјҢжңҖеӨ§зҡ„жҢ‘жҲҳе№¶йқһжһ„е»әз§»еҠЁеүҚз«Ҝеә”з”ЁпјҢиҖҢжҳҜе°ҶдјҒдёҡж•°жҚ®жҡҙйңІз»ҷз§»еҠЁи®ҫеӨҮгҖӮиҝҷдәӣж•°жҚ®еҸҜиғҪи·Ёи¶ҠеӨҡдёӘзі»з»ҹгҖҒжҠҖжңҜе’Ңе№іеҸ°гҖӮRESTful
    API дҪҝжӮЁиғҪеӨҹе°ҶдјҒдёҡж•°жҚ®жҡҙйңІз»ҷз§»еҠЁи®ҫеӨҮгҖӮеңЁеӨ§еӨҡж•°дјҒдёҡз§»еҠЁеҢ–еңәжҷҜдёӯпјҢRESTful жңҚеҠЎеұӮжҳҜе®һж–Ҫзҡ„йҮҚиҰҒз»„жҲҗйғЁеҲҶгҖӮ


    иҝҮеҺ»пјҢWeb еә”з”Ёзҡ„ејҖеҸ‘ж–№ејҸжҳҜеңЁжңҚеҠЎеҷЁз«Ҝе®һзҺ°жүҖжңүеҠҹиғҪпјҢеҢ…жӢ¬дҪҝз”ЁжңҚеҠЎеҷЁз«ҜжЁЎжқҝзҡ„з”ЁжҲ·з•ҢйқўжёІжҹ“йҖ»иҫ‘гҖӮеҰӮд»ҠпјҢAPI жӯЈжҲҗдёә Web еә”з”Ёе’Ңз§»еҠЁеә”з”Ёзҡ„ж ёеҝғпјҡејҖеҸ‘дәәе‘ҳеңЁжңҚеҠЎеҷЁз«Ҝжһ„е»ә
    RESTful жңҚеҠЎпјҢз„¶еҗҺеҲ©з”Ёиҝҷдәӣ RESTful жңҚеҠЎдҪңдёәеҗҺз«ҜпјҢдёә Web е’Ңз§»еҠЁз«Ҝжһ„е»әеүҚз«Ҝеә”з”ЁгҖӮ


    ## Goпјҡжһ„е»ә RESTful жңҚеҠЎзҡ„з»қдҪіжҠҖжңҜж Ҳ


    жҲ‘зӣёдҝЎпјҢеҜ№дәҺжһ„е»әеҢ…еҗ«жүҖжңүеҠҹиғҪпјҲеҢ…жӢ¬ UI жёІжҹ“пјүйғҪеңЁжңҚеҠЎеҷЁз«Ҝе®һзҺ°зҡ„дј з»ҹ Web еә”з”ЁжқҘиҜҙпјҢGo еҸҜиғҪдёҚжҳҜдёҖдёӘз»қдҪізҡ„йҖүжӢ©гҖӮжҲ‘е№¶йқһиҜҙ Go дёҚйҖӮеҗҲжһ„е»әдј з»ҹ Web
    еә”з”ЁпјӣдҪ еҸҜд»ҘзӣҙжҺҘдҪҝз”Ё Go ж ҮеҮҶеә“еҢ…жқҘжһ„е»әдј з»ҹ Web еә”з”ЁгҖӮеғҸ Beego е’Ң Revel иҝҷж ·зҡ„ Go Web ејҖеҸ‘жЎҶжһ¶д№ҹйҖӮеҗҲжһ„е»ә Web еә”з”ЁпјҢдҪҶжҲ‘еқҡдҝЎпјҢеҜ№дәҺжһ„е»әй«ҳеәҰеҸҜжү©еұ•зҡ„
    RESTful API зі»з»ҹжқҘдёәзҺ°д»Јеә”з”ЁжҸҗдҫӣеҗҺз«Ҝж”ҜжҢҒпјҢGo жҳҜдёҖдёӘз»қдҪізҡ„йҖүжӢ©гҖӮеңЁеҸҜз”ЁдәҺжһ„е»ә RESTful API зҡ„жҠҖжңҜж ҲдёӯпјҢжҲ‘ејәзғҲжҺЁиҚҗ GoпјҢе®ғеңЁжһ„е»әеҸҜжү©еұ•зҡ„еҗҺз«Ҝзі»з»ҹж–№йқўжҸҗдҫӣдәҶй«ҳжҖ§иғҪгҖҒжӣҙејәзҡ„е№¶еҸ‘ж”ҜжҢҒд»ҘеҸҠз®ҖжҙҒжҖ§гҖӮGo
    зҡ„з®ҖжҙҒжҖ§е’Ңдё°еҜҢзҡ„еҢ…з”ҹжҖҒзі»з»ҹйқһеёёйҖӮеҗҲзј–еҶҷжқҫиҖҰеҗҲгҖҒжҳ“дәҺз»ҙжҠӨзҡ„ RESTful жңҚеҠЎгҖӮ


    ж ҮеҮҶеә“еҢ… `http` дёәжһ„е»әеҸҜжү©еұ•зҡ„ Web зі»з»ҹжҸҗдҫӣдәҶеқҡе®һзҡ„еҹәзЎҖгҖӮе®ғеҶ…зҪ®дәҶе№¶еҸ‘ж”ҜжҢҒпјҢе°ҶжҜҸдёӘ HTTP иҜ·жұӮж”ҫеңЁдёҖдёӘзӢ¬з«Ӣзҡ„ `goroutine` дёӯжү§иЎҢгҖӮ`http`
    еҢ…е…·жңүеӨ§йҮҸзҡ„еҸҜжү©еұ•зӮ№пјҢиғҪеӨҹеҫҲеҘҪең°дёҺз¬¬дёүж–№еҢ…з”ҹжҖҒзі»з»ҹеҚҸдҪңгҖӮеҰӮжһңдҪ жғіжү©еұ•жҲ–жӣҝжҚў `http` еҢ…зҡ„жҹҗдәӣеҠҹиғҪпјҢеҸҜд»ҘиҪ»жқҫжһ„е»әиҮӘе·ұзҡ„еҢ…пјҢиҖҢдёҚдјҡз ҙеқҸиҜҘеҢ…зҡ„и®ҫи®Ўзӣ®ж ҮгҖӮжңүеӨҡдёӘжңүз”Ёзҡ„з¬¬дёүж–№еҢ…жү©еұ•дәҶ
    `http` еҢ…зҡ„еҠҹиғҪпјҢдҪҝдҪ иғҪеӨҹдҪҝз”Ё Go жһ„е»әй«ҳеәҰеҸҜжү©еұ•зҡ„ Web еә”з”Ёе’Ң RESTful APIгҖӮ


    еңЁжһ„е»әеҹәдәҺ Web зҡ„зі»з»ҹж—¶пјҢз”ҹжҖҒзі»з»ҹйқһеёёйҮҚиҰҒпјҢиҖҢ Go жӢҘжңүи®ёеӨҡжҲҗзҶҹзҡ„ж•°жҚ®еә“й©ұеҠЁзЁӢеәҸеҢ…гҖӮз¬¬ 8 з«  и®Ёи®әдәҶеҰӮдҪ•дҪҝз”Ё `mgo` еҢ…дёҺ MongoDB еҚҸеҗҢе·ҘдҪңгҖӮдё»иҰҒзҡ„**е…ізі»еһӢж•°жҚ®еә“**е’Ң**NoSQL
    ж•°жҚ®еә“**йғҪжңүеҸҜз”Ёзҡ„ж•°жҚ®еә“й©ұеҠЁзЁӢеәҸеҢ…гҖӮеҰӮжһңдҪ зҡ„еҗҺз«Ҝзі»з»ҹйңҖиҰҒдёҺдёӯй—ҙд»¶ж¶ҲжҒҜзі»з»ҹеҚҸеҗҢе·ҘдҪңпјҢеҸҜд»ҘжүҫеҲ°зӣёеә”зҡ„е®ўжҲ·з«Ҝеә“еҢ…гҖӮNSQпјҢдёҖдёӘе®һж—¶еҲҶеёғејҸж¶ҲжҒҜе№іеҸ°пјҢе°ұжҳҜз”Ё Go
    жһ„е»әзҡ„гҖӮз®ҖиҖҢиЁҖд№ӢпјҢGo з”ҹжҖҒзі»з»ҹпјҲеҢ…жӢ¬з¬¬дёүж–№еҢ…е’Ңе·Ҙе…·пјүжҸҗдҫӣдәҶдҪҝз”Ё Go жһ„е»әеҸҜжү©еұ•зҡ„ RESTful API д»ҘеҸҠе…¶д»–еҹәдәҺ Web зҡ„еҗҺз«Ҝзі»з»ҹжүҖйңҖзҡ„дёҖеҲҮгҖӮ

