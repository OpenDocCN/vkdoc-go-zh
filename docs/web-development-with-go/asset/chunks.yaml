    LetвҖҷs render the `Index` page to show the list of `Note` objects. Listing [5-14](#A978-1-4842-1052-9_5_Chapter.html#FPar14)
    is the template definition in `index.html`.


    Listing 5-14.В В Template Definition in index.html


    `{{define "head"}}<title>Index</title>{{end}}`


    `{{define "body"}}`


    `<h1>Notes List</h1>`


    `<p>`


