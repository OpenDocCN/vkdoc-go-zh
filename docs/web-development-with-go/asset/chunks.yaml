    2

    3 import (

    4       "fmt"

    5       "github.com/shijuvar/go-web-book/chapter1/calc"

    6 )

    7

    8 func main() {

    9       var x, y int = 10, 5

    10      fmt.Println(calc.Add(x, y))

    11      fmt.Println(calc.Subtract(x, y))

    12 }

    ```


    **Line 1:** Create an executable program.


    **Lines 3 to 6:** These lines import the `"fmt"` package from the standard library
    and the `"calc"` package from your own library. You can use a single `import`
    statement to import multiple packages. The path for the packages from the standard
    library uses short paths such as the `"fmt"` package. For your own packages, you
    must specify the full path when importing the packages. Using the full path for
    external packages avoids name conflicts among packages, and you can use the same
    name for multiple external packages in which the package path would be different.


    **Line 8:** The function `main`, entry point of the package `main`.


    **Line 9:** Declaring two variables, `x` and `y`, with the `int` data type. Go
    uses the `var` keyword to declare variables in which you can declare multiple
    variables in a single statement. If you assign values to variables along with
    the variable declarations, you can use a shorter statement:


    ```

