    ```


    When you use GoвҖҷs shorter statement for declaring variables, you donвҖҷt need to
    specify the variable type because the Go compiler can infer the type, based on
    the value you assign to the variable. Go provides the productivity of a dynamically
    typed language while keeping it as a statically typed language. The Go compiler
    can also do type inference with the `var` statement:


    ```

