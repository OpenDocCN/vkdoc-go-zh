    \n**жё…еҚ• 2-10.** еЈ°жҳҺдёҖдёӘеҢ…еҗ«дә”дёӘе…ғзҙ зҡ„ж•ҙж•°ж•°з»„\n\n```\nvar x [5]int\n```\n\nеЈ°жҳҺдәҶдёҖдёӘж•°з»„ `x`пјҢз”ЁдәҺеӯҳеӮЁдә”дёӘ\
    \ `int` зұ»еһӢзҡ„е…ғзҙ пјҢеӣ жӯӨж•°з»„ `x` е°Ҷз”ұдә”дёӘж•ҙж•°е…ғзҙ з»„жҲҗгҖӮ\n\nжё…еҚ• 2-11 жҳҜдёҖдёӘеЈ°жҳҺж•°з»„е№¶иөӢеҖјзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ• 2-11.**\
