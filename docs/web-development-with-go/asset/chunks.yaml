    \t\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\t\tfmt.Fprintln(w,\
    \ \"и§Јжһҗд»ӨзүҢж—¶еҮәй”ҷпјҒ\")\n\t\t\t\tlog.Printf(\"ValidationError й”ҷиҜҜ: %+v\\n\", vErr.Errors)\n\
    \t\t\t\treturn\n\t\t\t}\n\t\tdefault: // еҸ‘з”ҹе…¶д»–й”ҷиҜҜ\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\
    \t\t\tfmt.Fprintln(w, \"и§Јжһҗд»ӨзүҢж—¶еҮәй”ҷпјҒ\")\n\t\t\tlog.Printf(\"д»ӨзүҢи§Јжһҗй”ҷиҜҜ: %v\\n\", err)\n\
    \t\t\treturn\n\t\t}\n\t}\n\tif token.Valid {\n\t\tresponse := Response{\"е·ІжҺҲжқғи®ҝй—®зі»з»ҹ\"\
