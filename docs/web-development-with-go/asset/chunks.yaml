    #### Loading Private/Public RSA Keys


    RSA keys are loaded into two variables for representing private and public keys,
    which are used for the authorization infrastructure of the application. The private/public
    keys are used to generate JWT and verify the token in HTTP requests to authorize
    access to protected resources of the application. The private/public keys are
    loaded into two variables before the HTTP server starts so they can be used for
    a login handler and for authorizing HTTP requests in authorization middleware.


    The command-line tool `OpenSSL` is used to generate the keys. To generate the
    private key, run the following command on the command-line window:


    `openssl genrsa -out app.rsa 1024`


    This command generates a 1024-bit key named `app.rsa`. To generate a counterpart
    public key for the private key, run the following command on the command-line
    window:


    `openssl rsa -in app.rsa -pubout > app.rsa.pub`


    This code generates a counterpart public key named `app.rsa.pub`. The RSA keys
    are stored in the directory `keys`.


    Listing [9-7](#A978-1-4842-1052-9_9_Chapter.html#FPar8) loads the private/public
    RSA keys from the `keys` folder and stores them into two variables.


