    `err = c.FindId(obj_id).One(&result)`'
  trans: "еҘҪзҡ„пјҢдҪңдёәй«ҳзә§ж–ҮжЎЈе·ҘзЁӢеёҲе’Ңзҝ»иҜ‘е‘ҳпјҢжҲ‘е°ҶдёҘж јйҒөеҫӘжӮЁзҡ„жіЁж„ҸдәӢйЎ№е’ҢзӨәдҫӢж јејҸпјҢе°Ҷз»ҷе®ҡзҡ„иӢұж–Үж–Үжң¬зҝ»иҜ‘жҲҗдёӯж–ҮгҖӮ\n\n\n### жҸ’е…ҘеөҢе…ҘејҸж–ҮжЎЈ\n\nе…ізі»еһӢж•°жҚ®еә“дёҺж–ҮжЎЈеһӢж•°жҚ®еә“зҡ„дё»иҰҒеҢәеҲ«еңЁдәҺпјҢеҗҺиҖ…дёҚж”ҜжҢҒз”ЁдәҺе»әжЁЎйўҶеҹҹжЁЎеһӢзҡ„е…ізі»еһӢж–№жі•гҖӮеҰӮжһңиҰҒеңЁе…ізі»еһӢж•°жҚ®еә“дёӯе»әз«ӢдёҖеҜ№еӨҡе…ізі»пјҢеҸҜд»ҘеҲӣе»әдёҖдёӘзҲ¶иЎЁе’ҢдёҖдёӘеӯҗиЎЁпјҢзҲ¶иЎЁдёӯзҡ„жҜҸжқЎи®°еҪ•йғҪеҸҜд»ҘдёҺеӯҗиЎЁдёӯзҡ„еӨҡжқЎи®°еҪ•зӣёе…іиҒ”гҖӮдёәдәҶеңЁиҝҷз§Қе…ізі»жЁЎеһӢдёӯдҝқиҜҒж•°жҚ®е®Ңж•ҙжҖ§пјҢеҸҜд»ҘеңЁеӯҗиЎЁдёӯе®ҡд№үдёҖдёӘеӨ–й”®зәҰжқҹпјҢжҢҮеҗ‘зҲ¶иЎЁзҡ„дё»й”®гҖӮ\n\
    \nMongoDB йӣҶеҗҲе…·жңүзҒөжҙ»зҡ„ schemaпјҢеӣ жӯӨеҸҜд»ҘйҖҡиҝҮдёҚеҗҢзҡ„ж–№ејҸе®ҡд№үж•°жҚ®жЁЎеһӢжқҘе®һзҺ°зӣёеҗҢзҡ„зӣ®ж ҮгҖӮжӮЁеҸҜд»Ҙж №жҚ®еә”з”ЁзЁӢеәҸзҡ„дёҠдёӢж–ҮпјҢйҖүжӢ©еҗҲйҖӮзҡ„зӯ–з•ҘжқҘе®ҡд№үж•°жҚ®жЁЎеһӢгҖӮдёәдәҶеңЁзӣёе…ізҡ„ж•°жҚ®д№Ӣй—ҙе»әз«Ӣе…ізі»пјҢжӮЁеҸҜд»Ҙе°Ҷзӣёе…іж–ҮжЎЈеөҢе…ҘеҲ°дё»ж–ҮжЎЈдёӯпјҢжҲ–иҖ…еңЁдёӨдёӘж–ҮжЎЈд№Ӣй—ҙе»әз«Ӣеј•з”ЁгҖӮеңЁе»әз«Ӣзӣёе…іж•°жҚ®д№Ӣй—ҙзҡ„е…ізі»ж—¶пјҢз¬¬дёҖз§Қзӯ–з•ҘпјҲеөҢе…Ҙж–ҮжЎЈпјүеңЁжҹҗдәӣеңәжҷҜдёӯиЎЁзҺ°иүҜеҘҪпјӣеҗҺдёҖз§Қзӯ–з•ҘеҲҷйҖӮз”ЁдәҺдёҚеҗҢзҡ„еңәжҷҜгҖӮ\n\
    \n> **жіЁж„Ҹ**  \n> еңЁз¬¬ 9 з« дёӯпјҢдҪ е°ҶеӯҰд№ еҰӮдҪ•дҪҝз”Ёж–ҮжЎЈй—ҙзҡ„еј•з”ЁжқҘе»әз«Ӣе…ізі»гҖӮжңүе…іж•°жҚ®жЁЎеһӢжҰӮеҝөзҡ„жӣҙеӨҡдҝЎжҒҜпјҢиҜ·жҹҘйҳ… MongoDB ж–ҮжЎЈпјҡ [`docs.mongodb.org/manual/data-modeling/`](https://docs.mongodb.org/manual/data-modeling/)\n\
    \nжё…еҚ• 8-8 жҳҜдёҖдёӘзӨәдҫӢпјҢеұ•зӨәдәҶдёҖдёӘдҪҝз”ЁеөҢе…ҘејҸж–ҮжЎЈжқҘжҸҸиҝ°зӣёе…іж•°жҚ®д№Ӣй—ҙе…ізі»зҡ„ж•°жҚ®жЁЎеһӢгҖӮеңЁ `Category` е’Ң `Tasks` ж•°жҚ®д№Ӣй—ҙзҡ„дёҖеҜ№еӨҡе…ізі»дёӯпјҢ`Category`\
    \ жӢҘжңүеӨҡдёӘ `Task` е®һдҪ“гҖӮ\n\n**жё…еҚ• 8-8.** жҸ’е…ҘеҢ…еҗ«еөҢе…ҘејҸж–ҮжЎЈзҡ„ж–ҮжЎЈ\n\n```go\npackage main\n\nimport\
    \ (\n    \"log\"\n    \"time\"\n    \"gopkg.in/mgo.v2\"\n    \"gopkg.in/mgo.v2/bson\"\
    \n)\n\ntype Task struct {\n    Description string\n    Due         time.Time\n\
    }\n\ntype Category struct {\n    Id          bson.ObjectId `bson:\"_id,omitempty\"\
    `\n    Name        string\n    Description string\n    Tasks       []Task\n}\n\
    \nfunc main() {\n    session, err := mgo.Dial(\"localhost\")\n    if err != nil\
    \ {\n        panic(err)\n    }\n    defer session.Close()\n    session.SetMode(mgo.Monotonic,\
    \ true)\n\n    //иҺ·еҸ–йӣҶеҗҲ\n    c := session.DB(\"taskdb\").C(\"categories\")\n\n \
    \   //еөҢе…ҘеӯҗйӣҶеҗҲ\n    doc := Category{\n        bson.NewObjectId(),\n        \"Open-Source\"\
    ,\n        \"Tasks for open-source projects\",\n        []Task{\n            Task{\"\
    Create project in mgo\", time.Date(2015, time.August, 10, 0, 0, 0, 0, time.UTC)},\n\
    \            Task{\"Create REST API\", time.Date(2015, time.August, 20, 0, 0,\
    \ 0, 0, time.UTC)},\n        },\n    }\n\n    //жҸ’е…ҘдёҖдёӘеөҢе…ҘдәҶ Tasks зҡ„ Category еҜ№иұЎ\n\
    \    err = c.Insert(&doc)\n    if err != nil {\n        log.Fatal(err)\n    }\n\
    }\n```\n\nиҝҷйҮҢеҲӣе»әдәҶдёҖдёӘ `Category` з»“жһ„дҪ“пјҢе…¶дёӯдёә `Tasks` еӯ—ж®өжҢҮе®ҡдәҶдёҖдёӘ `Task` з»“жһ„дҪ“еҲҮзүҮпјҢз”ЁдәҺеөҢе…ҘеӯҗйӣҶеҗҲгҖӮеөҢе…Ҙж–ҮжЎЈдҪҝдҪ иғҪеӨҹйҖҡиҝҮдёҖж¬ЎжҹҘиҜўе°ұиҺ·еҸ–еҲ°зҲ¶ж–ҮжЎЈеҸҠе…¶е…іиҒ”зҡ„еӯҗж–ҮжЎЈпјҲдҪ ж— йңҖеҶҚжү§иЎҢеҸҰдёҖдёӘжҹҘиҜўжқҘиҺ·еҸ–еӯҗж–ҮжЎЈзҡ„иҜҰз»ҶдҝЎжҒҜпјүгҖӮ\n\
    \n### иҜ»еҸ–ж–ҮжЎЈ\n\n`Collection` зҡ„ `Find` ж–№жі•е…Ғи®ёдҪ жҹҘиҜў MongoDB йӣҶеҗҲгҖӮеҪ“и°ғз”Ё `Find` ж–№жі•ж—¶пјҢдҪ еҸҜд»ҘжҸҗдҫӣдёҖдёӘж–ҮжЎЈжқҘиҝҮж»ӨйӣҶеҗҲж•°жҚ®гҖӮ`Find`\
    \ ж–№жі•дҪҝз”ЁжҸҗдҫӣзҡ„ж–ҮжЎЈжқҘеҮҶеӨҮдёҖдёӘжҹҘиҜўгҖӮдёәдәҶжҸҗдҫӣжҹҘиҜўйӣҶеҗҲзҡ„ж–ҮжЎЈпјҢдҪ еҸҜд»ҘжҸҗдҫӣдёҖдёӘ map жҲ–дёҖдёӘиғҪеӨҹиў«зј–з»„дёә BSON зҡ„з»“жһ„дҪ“еҖјгҖӮдҪ еҸҜд»ҘдҪҝз”ЁйҖҡз”Ё mapпјҢдҫӢеҰӮ\
    \ `bson.M`пјҢжқҘжҸҗдҫӣз”ЁдәҺжҹҘиҜўж•°жҚ®зҡ„ж–ҮжЎЈгҖӮиҰҒжҹҘиҜўйӣҶеҗҲдёӯзҡ„жүҖжңүж–ҮжЎЈпјҢдҪ еҸҜд»ҘдҪҝз”Ё `nil` дҪңдёәеҸӮж•°пјҢиҝҷзӯүеҗҢдәҺдёҖдёӘз©әж–ҮжЎЈпјҢдҫӢеҰӮ `bson.M{}`гҖӮ`Find`\
    \ ж–№жі•иҝ”еӣһ `mgo.Query` зұ»еһӢзҡ„еҖјпјҢдҪ еҸҜд»ҘйҖҡиҝҮ `One`гҖҒ`For`гҖҒ`Iter` жҲ– `Tail` зӯүж–№жі•жқҘжЈҖзҙўз»“жһңгҖӮ\n\n#### жЈҖзҙўжүҖжңүи®°еҪ•\n\
    \nжё…еҚ• 8-9 йҖҡиҝҮдёә `Find` ж–№жі•жҸҗдҫӣ `nil` дҪңдёәеҸӮж•°еҖјпјҢжқҘжЈҖзҙўйӣҶеҗҲдёӯзҡ„жүҖжңүж–ҮжЎЈгҖӮиҜҘжҹҘиҜўй’ҲеҜ№жё…еҚ• 8-8 дёӯе®ҡд№үзҡ„ж•°жҚ®жЁЎеһӢжү§иЎҢгҖӮ\n\n**жё…еҚ•\
    \ 8-9.** жҹҘиҜўйӣҶеҗҲдёӯзҡ„жүҖжңүж–ҮжЎЈ\n\n```go\niter := c.Find(nil).Iter()\n    result := Category{}\n\
    \    for iter.Next(&result) {\n        fmt.Printf(\"Category:%s, Description:%s\\\
    n\", result.Name, result.Description)\n        tasks := result.Tasks\n       \
    \ for _, v := range tasks {\n            fmt.Printf(\"Task:%s Due:%v\\n\", v.Description,\
    \ v.Due)\n        }\n    }\n\nif err = iter.Close(); err != nil {\n        log.Fatal(err)\n\
    \    }\n```\n\n`Query` еҜ№иұЎзҡ„ `Iter` ж–№жі•з”ЁдәҺйҒҚеҺҶж–ҮжЎЈгҖӮ`Iter` жү§иЎҢжҹҘиҜўе№¶иҝ”еӣһдёҖдёӘеҸҜд»ҘйҒҚеҺҶжүҖжңүз»“жһңзҡ„иҝӯд»ЈеҷЁгҖӮеҪ“дҪ дҪҝз”ЁеөҢе…ҘејҸж–ҮжЎЈе®ҡд№үзҲ¶еӯҗе…ізі»ж—¶пјҢеҸҜд»ҘеңЁдёҖж¬ЎжҹҘиҜўдёӯиҺ·еҸ–еҲ°зӣёе…ізҡ„ж–ҮжЎЈгҖӮ\n\
    \n#### жҺ’еәҸи®°еҪ•\n\nж–ҮжЎЈеҸҜд»ҘдҪҝз”Ё `Query` зұ»еһӢжҸҗдҫӣзҡ„ `Sort` ж–№жі•иҝӣиЎҢжҺ’еәҸгҖӮ`Sort` ж–№жі•еҮҶеӨҮжҹҘиҜўпјҢд»Ҙдҫҝж №жҚ®жҸҗдҫӣзҡ„еӯ—ж®өеҗҚеҜ№иҝ”еӣһзҡ„ж–ҮжЎЈиҝӣиЎҢжҺ’еәҸгҖӮ\n\
    \nжё…еҚ• 8-10 еҜ№йӣҶеҗҲдёӯзҡ„ж–ҮжЎЈиҝӣиЎҢжҺ’еәҸгҖӮ\n\n**жё…еҚ• 8-10.** дҪҝз”Ё `Sort` ж–№жі•еҜ№ж–ҮжЎЈжҺ’еәҸ\n\n```go\niter := c.Find(nil).Sort(\"\
    name\").Iter()\n    result := Category{}\n    for iter.Next(&result) {\n     \
    \   fmt.Printf(\"Category:%s, Description:%s\\n\", result.Name, result.Description)\n\
    \        tasks := result.Tasks\n        for _, v := range tasks {\n          \
    \  fmt.Printf(\"Task:%s Due:%v\\n\", v.Description, v.Due)\n        }\n    }\n\
    \n    if err = iter.Close(); err != nil {\n        log.Fatal(err)\n    }\n```\n\
    \nдҪ еҸҜд»ҘйҖҡиҝҮжҸҗдҫӣдёҖдёӘд»Ҙ `вҖ“`пјҲеҮҸеҸ·пјүдёәеүҚзјҖзҡ„еӯ—ж®өеҗҚпјҢд»ҘзӣёеҸҚйЎәеәҸеҜ№еҖјиҝӣиЎҢжҺ’еәҸпјҢеҰӮжё…еҚ• 8-11 жүҖзӨәгҖӮ\n\n**жё…еҚ• 8-11.** еҸҚеҗ‘жҺ’еәҸж–ҮжЎЈ\n\n\
    ```go\niter := c.Find(nil).Sort(\"-name\").Iter()\n```\n\n#### жЈҖзҙўеҚ•жқЎи®°еҪ•\n\nжё…еҚ• 8-12\
    \ йҖҡиҝҮжҸҗдҫӣдёҖдёӘ map еҜ№иұЎжқҘжү§иЎҢжҹҘиҜўпјҢд»ҺиҖҢд»ҺйӣҶеҗҲдёӯжЈҖзҙўеҚ•жқЎи®°еҪ•гҖӮ\n\n**жё…еҚ• 8-12.** д»ҺйӣҶеҗҲдёӯжҹҘиҜўеҚ•жқЎи®°еҪ•\n\n```go\nresult\
    \ := Category{}\nerr := c.Find(bson.M{\"name\": \"Open-Source\"}).One(&result)\n\
    if err != nil {\n    log.Fatal(err)\n}\n\nfmt.Printf(\"Category:%s, Description:%s\\\
    n\", result.Name, result.Description)\ntasks := result.Tasks\nfor _, v := range\
    \ tasks {\n    fmt.Printf(\"Task:%s Due:%v\\n\", v.Description, v.Due)\n}\n```\n\
    \nиҝҷйҮҢжҸҗдҫӣдәҶ `bson.M` map зұ»еһӢжқҘжҹҘиҜўж•°жҚ®гҖӮе®ғдҪҝз”Ёдёә `Name` еӯ—ж®өжҸҗдҫӣзҡ„еҖјжқҘжҹҘиҜўйӣҶеҗҲгҖӮ`Query` зұ»еһӢзҡ„ `One` ж–№жі•жү§иЎҢжҹҘиҜўе№¶е°ҶиҺ·еҸ–еҲ°зҡ„з¬¬дёҖдёӘж–ҮжЎЈи§Јз»„еҲ°з»“жһңеҸӮж•°дёӯгҖӮ\n\
    \n`Collection` зұ»еһӢжҸҗдҫӣдәҶ `FindId` ж–№жі•пјҢиҝҷжҳҜдёҖдёӘдҫҝжҚ·иҫ…еҠ©ж–№жі•пјҢзӯүеҗҢдәҺд»ҘдёӢд»Јз Ғпјҡ\n\n```go\nquery := c.Find(bson.M{\"\
