    `func (p Person) PrintDetails() {`


    `fmt.Printf("[Date of Birth: %s, Email: %s, Location: %s ]\n", p.Dob.String(),
    p.Email, p.` `Location)`


    `}`


    The most surprising thing about interface is that you donвҖҷt need to explicitly
    implement it into concrete types; instead, just define the methods in the concrete
    types based on the interface type specification. The `Person` type has already
    implemented the `User Interface` into the `Person` type. The `Person` type has
    implemented the `PrintName` and `PrintDetails` methods, which were defined in
    the user interface type. In programming languages such as C# and Java, you must
    explicitly implement the interface type into concrete types. Go provides lot of
    productivity while keeping itself as a static type language.


