    \ 20, 30, 40, 50}\n```\n\nеҪ“дҪҝз”Ёж•°з»„еӯ—йқўйҮҸеҲқе§ӢеҢ–ж•°з»„ж—¶пјҢдҪ еҸҜд»Ҙдёәзү№е®ҡе…ғзҙ еҲқе§ӢеҢ–еҖјгҖӮ\n\nжё…еҚ• 2-15 жҳҜдёҖдёӘдёәзү№е®ҡдҪҚзҪ®иөӢеҖјзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\
