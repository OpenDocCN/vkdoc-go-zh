    Listing 2-28.В В Accessing the Element Value from a Map in an Idiomatic Way


    `if lan, ok := dict["go"]; ok {`


    В В В В `fmt.Println(lan, ok)`


    `}`


    ## Defer, Panic, and Recover


    Go is a minimalist programming language that comes with essential features to
    develop applications. Although minimal, Go provides all the capabilities to develop
    highly reliable applications. For example, the language features `defer`, `panic`,
    and `recover` let you properly clean up your objects by explicitly panicking your
    application and then recovering from the panic.


    ### Defer


    If you have used `try/catch/finally` blocks in any programming language such as
    C# and Java, you may have used the `finally` block to clean up the resources that
    are allocated in a try block. The statements of a `finally` block run when the
    execution flow of control leaves a `try` statement. This `finally` block will
    invoke even when the flow of control goes to a `catch` block due to a handled
    exception. Using `defer`, you can implement cleanup code in Go, which is more
    efficient than using a `finally` block in other languages. Though you would primarily
    use `defer` for implementing cleanup code, it is not used only for that purpose.
    For example, by using `conjunction` with `recover`, you regain control from a
    panicking function.


    A `defer` statement pushes a function call (or a code statement) onto a list.
    The list of saved вҖңfunction callsвҖқ is executed after the surrounding function
    returns. The last added functions are invoked first from the list of deferred
    functions. Suppose you add function `f1` first, then `f2`, and finally `f3` onto
    the deferred list; the order of the execution will be `f3`, `f2`, and then `f1`.


    Listing [2-29](#A978-1-4842-1052-9_2_Chapter.html#FPar32) is a code block that
    uses `defer` to clean up a database session object.


    Listing 2-29.В В Defer Statements for Cleaning up Resources


    `session, err := mgo.Dial("localhost") //MongoDB Session object`


    `defer session.Close()`


    `c := session.DB("taskdb").C("categories")`


    `//code statements using session object`


    This code block creates a session object for a MongoDB database. In the next line,
    the code statement `session.Close()` is added onto the deferred list to clean
    up the resources of the database session object after returning the surrounding
    function. You can add any number of code statements and functions onto the deferred
    list.'
  trans: "\n## й•ҝеәҰдёҺе®№йҮҸ\n\nеҰӮеүҚеҮ иҠӮжүҖиҝ°пјҢеҲҮзүҮеңЁеЈ°жҳҺж—¶еҸҜжҢҮе®ҡе…¶й•ҝеәҰе’Ңе®№йҮҸгҖӮеҲҮзүҮзҡ„й•ҝеәҰжҳҜжҢҮеҲҮзүҮеј•з”Ёзҡ„е…ғзҙ ж•°йҮҸпјӣе®№йҮҸжҳҜжҢҮеә•еұӮж•°з»„дёӯзҡ„е…ғзҙ ж•°йҮҸгҖӮеҲҮзүҮдёҚиғҪдҝқеӯҳи¶…еҮәе…¶е®№йҮҸзҡ„еҖјпјӣеҰӮжһңдҪ е°қиҜ•ж·»еҠ жӣҙеӨҡе…ғзҙ пјҢе°ҶдјҡеҸ‘з”ҹиҝҗиЎҢж—¶й”ҷиҜҜгҖӮеҲҮзүҮеҸҜд»ҘйҖҡиҝҮ\
    \ `append` еҮҪж•°жқҘеўһй•ҝгҖӮеҪ“дҪҝз”Ё `append` еҮҪж•°ж·»еҠ е…ғзҙ ж—¶пјҢе®ғдјҡжЈҖжҹҘе®№йҮҸжҳҜеҗҰи¶іеӨҹпјҢиӢҘдёҚи¶іпјҢеҲҷиҮӘеҠЁеўһеҠ е®№йҮҸгҖӮдҪ еҸҜд»ҘйҖҡиҝҮ `len` еҮҪж•°иҺ·еҸ–й•ҝеәҰеҖјпјҢйҖҡиҝҮ\
    \ `cap` еҮҪж•°иҺ·еҸ–е®№йҮҸеҖјгҖӮ\n\nжё…еҚ• 2-24 еұ•зӨәдәҶй•ҝеәҰдёҺе®№йҮҸзҡ„жҰӮеҝөгҖӮ\n\n**жё…еҚ• 2-24.** еҲҮзүҮй•ҝеәҰдёҺе®№йҮҸ\n\n```\npackage\
    \ main\n\nimport \"fmt\"\n\nfunc main() {\n\n        x := make([]int, 2, 5)\n\n\
    \        x[0] = 10\n\n        x[1] = 20\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
    Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n     \
    \   x = append(x, 30, 40, 50)\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
    Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n     \
    \   fmt.Println(x)\n\n        x = append(x, 60)\n\n        fmt.Println(\"Length\
    \ is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n        fmt.Println(x)\n\
    \n}\n```\n\nеңЁиҝҷж®өд»Јз ҒдёӯпјҢеЈ°жҳҺдәҶдёҖдёӘй•ҝеәҰдёә `2`гҖҒе®№йҮҸдёә `5` зҡ„еҲҮзүҮ `x`гҖӮйҡҸеҗҺеҗ‘еҲҮзүҮ `x` иҝҪеҠ дәҶдёӨдёӘе…ғзҙ гҖӮжӯӨж—¶пјҢе®№йҮҸеҜ№еҲҮзүҮ `x`\
    \ иҖҢиЁҖжҳҜи¶іеӨҹзҡ„пјӣдҪҶеҪ“дҪ е°қиҜ•еҶҚеҗ‘еҲҮзүҮ `x` иҝҪеҠ дёҖдёӘе…ғзҙ ж—¶пјҢеҲҮзүҮдјҡиҮӘеҠЁжү©е®№пјҢе®№йҮҸйҡҸд№ӢеўһеӨ§гҖӮ\n\nиҝҗиЎҢиҜҘзЁӢеәҸпјҢдҪ е°ҶзңӢеҲ°еҰӮдёӢиҫ“еҮәпјҡ\n\n```\n[10\
    \ 20]\n\nLength is 2\n\nCapacity is 5\n\n[10 20 30 40 50]\n\nLength is 5\n\nCapacity\
    \ is 5\n\n[10 20 30 40 50]\n\nLength is 6\n\nCapacity is 12\n\n[10 20 30 40 50\
    \ 60]\n```\n\nд»Һиҫ“еҮәдёӯеҸҜд»ҘзңӢеҮәпјҢеҪ“з¬¬дәҢж¬ЎдҪҝз”Ё `append` еҮҪж•°ж—¶пјҢеҲҮзүҮзҡ„е®№йҮҸеўһеҠ еҲ°дәҶ 12гҖӮ\n\n## йҒҚеҺҶеҲҮзүҮ\n\nGo жҸҗдҫӣдәҶдёҖдёӘ\
    \ `range` е…ій”®еӯ—пјҢеҸҜз”ЁдәҺйҒҚеҺҶйӣҶеҗҲгҖӮ`range` е…ій”®еӯ—дјҡйҒҚеҺҶдёҖдёӘе…ғзҙ йӣҶеҗҲпјҢжҜҸж¬Ўиҝӯд»Јиҝ”еӣһдёӨдёӘеҖјпјҡз¬¬дёҖдёӘеҖјжҳҜе…ғзҙ зҡ„зҙўеј•дҪҚзҪ®пјҢз¬¬дәҢдёӘеҖјжҳҜиҜҘзҙўеј•дҪҚзҪ®еҢ…еҗ«зҡ„еҖјзҡ„еүҜжң¬гҖӮ\n\
    \nжё…еҚ• 2-25 еұ•зӨәдәҶдҪҝз”Ё `range` йҒҚеҺҶеҲҮзүҮзҡ„зӨәдҫӢгҖӮ\n\n**жё…еҚ• 2-25.** йҒҚеҺҶеҲҮзүҮ\n\n```\npackage main\n\n\
    import \"fmt\"\n\nfunc main() {\n\n    x := []int{10, 20, 30, 40, 50}\n\n    for\
    \ k, v := range x {\n\n        fmt.Printf(\"Index: %d Value: %d\\n\", k, v)\n\n\
    \    }\n\n}\n```\n\nдҪ е°ҶзңӢеҲ°еҰӮдёӢиҫ“еҮәпјҡ\n\n```\nIndex: 0 Value: 10\n\nIndex: 1 Value: 20\n\
    \nIndex: 2 Value: 30\n\nIndex: 3 Value: 40\n\nIndex: 4 Value: 50\n```\n\n## жҳ е°„\n\
    \nжҳ е°„пјҲmapпјүжҳҜдёҖз§Қж•°жҚ®з»“жһ„пјҢжҸҗдҫӣй”®еҖјеҜ№зҡ„ж— еәҸйӣҶеҗҲгҖӮпјҲеңЁе…¶д»–зј–зЁӢиҜӯиЁҖдёӯпјҢзұ»дјјдәҺжҳ е°„зҡ„ж•°жҚ®з»“жһ„з§°дёәе“ҲеёҢиЎЁжҲ–еӯ—е…ёгҖӮпјүиҜ·и®°дҪҸпјҢжҳ е°„жҳҜж— еәҸзҡ„йӣҶеҗҲпјҢеӣ жӯӨеңЁйҒҚеҺҶж—¶ж— жі•йў„жөӢж•°жҚ®зҡ„йЎәеәҸгҖӮ\n\
    \nеңЁ Go дёӯпјҢжңүеӨҡз§ҚеҲӣе»әе’ҢеҲқе§ӢеҢ–жҳ е°„зҡ„ж–№жі•гҖӮдёҺеҲҮзүҮзұ»дјјпјҢеҸҜд»ҘдҪҝз”ЁеҶ…зҪ®еҮҪж•° `make` жҲ–жҳ е°„еӯ—йқўйҮҸжқҘеҲӣе»әе’ҢеҲқе§ӢеҢ–жҳ е°„гҖӮ\n\nжё…еҚ• 2-26 жҳҜдёҖдёӘзӨәдҫӢзЁӢеәҸпјҢжј”зӨәдәҶеҰӮдҪ•еҲӣе»әе№¶еҲқе§ӢеҢ–дёҖдёӘжҳ е°„пјҢд»ҘеҸҠеҰӮдҪ•йҒҚеҺҶиҜҘйӣҶеҗҲгҖӮ\n\
    \n**жё…еҚ• 2-26.** еҲӣе»әжҳ е°„е№¶йҒҚеҺҶйӣҶеҗҲ\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main()\
    \ {\n\n    dict := make(map[string]string)\n\n    dict[\"go\"] = \"Golang\"\n\n\
    \    dict[\"cs\"] = \"CSharp\"\n\n    dict[\"rb\"] = \"Ruby\"\n\n    dict[\"py\"\
    ] = \"Python\"\n\n    dict[\"js\"] = \"JavaScript\"\n\n    for k, v := range dict\
    \ {\n\n        fmt.Printf(\"Key: %s Value: %s\\n\", k, v)\n\n    }\n\n}\n```\n\
    \nеЈ°жҳҺдәҶдёҖдёӘеҗҚдёә `dict` зҡ„жҳ е°„пјҢе…¶дёӯй”®пјҲ`[]` иҝҗз®—з¬ҰеҶ…зҡ„зұ»еһӢпјүе’ҢеҖјйғҪиў«жҢҮе®ҡдёәеӯ—з¬ҰдёІзұ»еһӢпјҡ\n\n```\ndict := make(map[string]string)\n\
    ```\n\nйҖҡиҝҮз»ҷе®ҡзҡ„й”®пјҲжӯӨеӨ„й”® `\"go\"` еҜ№еә”еҖј `\"Golang\"`пјүдёәжҳ е°„иөӢеҖјпјҡ\n\n```\ndict[\"go\"] = \"Golang\"\
    \n```\n\nжңҖеҗҺпјҢдҪҝз”Ё `range` йҒҚеҺҶйӣҶеҗҲпјҢе№¶жү“еҚ°йӣҶеҗҲдёӯжҜҸдёӘе…ғзҙ зҡ„й”®е’ҢеҖјпјҡ\n\n```\nfor k, v := range dict {\n\
    \n    fmt.Printf(\"Key: %s Value: %s\\n\", k, v)\n\n}\n```\n\nдҪ е°ҶзңӢеҲ°еҰӮдёӢиҫ“еҮәпјҡ\n\n```\n\
    Key: cs Value: CSharp\n\nKey: rb Value: Ruby\n\nKey: py Value: Python\n\nKey:\
    \ js Value: JavaScript\n\nKey: go Value: Golang\n```\n\n**жіЁж„Ҹпјҡ** з”ұдәҺжҳ е°„жҳҜж— еәҸзҡ„йӣҶеҗҲпјҢеӣ жӯӨжҜҸж¬ЎиҝҗиЎҢж—¶зҡ„ж•°жҚ®йЎәеәҸйғҪдјҡдёҚеҗҢгҖӮ\n\
    \nдҪ еҸҜд»ҘйҖҡиҝҮжҸҗдҫӣй”®жқҘи®ҝй—®жҳ е°„дёӯе…ғзҙ зҡ„еҖјпјҲи§Ғжё…еҚ• 2-27пјүпјҡ\n\n**жё…еҚ• 2-27.** д»Һжҳ е°„дёӯи®ҝй—®е…ғзҙ зҡ„еҖј\n\n```\nlan, ok :=\
    \ dict[\"go\"]\n```\n\nеҪ“йҖҡиҝҮй”®и®ҝй—®е…ғзҙ ж—¶пјҢдјҡиҝ”еӣһдёӨдёӘеҖјпјҡз¬¬дёҖдёӘеҖјжҳҜз»“жһңпјҲе…ғзҙ зҡ„еҖјпјүпјӣз¬¬дәҢдёӘеҖјжҳҜеёғе°”еҖјпјҢжҢҮзӨәжҹҘжүҫжҳҜеҗҰжҲҗеҠҹгҖӮGo жҸҗдҫӣдәҶдёҖз§ҚдҫҝжҚ·зҡ„еҶҷжі•пјҢеҰӮжё…еҚ•\
    \ 2-28 жүҖзӨәгҖӮ\n\n**жё…еҚ• 2-28.** д»ҘжғҜз”Ёж–№ејҸд»Һжҳ е°„дёӯи®ҝй—®е…ғзҙ зҡ„еҖј\n\n```\nif lan, ok := dict[\"go\"];\
    \ ok {\n\n    fmt.Println(lan, ok)\n\n}\n```\n\n## DeferгҖҒPanic е’Ң Recover\n\nGo\
    \ жҳҜдёҖз§ҚжһҒз®Җдё»д№үзј–зЁӢиҜӯиЁҖпјҢжҸҗдҫӣдәҶејҖеҸ‘еә”з”ЁзЁӢеәҸжүҖйңҖзҡ„ж ёеҝғеҠҹиғҪгҖӮе°Ҫз®ЎжһҒз®ҖпјҢдҪҶ Go е…·еӨҮејҖеҸ‘й«ҳеҸҜйқ жҖ§еә”з”ЁзЁӢеәҸжүҖйңҖзҡ„жүҖжңүиғҪеҠӣгҖӮдҫӢеҰӮпјҢиҜӯиЁҖзү№жҖ§ `defer`гҖҒ`panic`\
    \ е’Ң `recover` е…Ғи®ёдҪ йҖҡиҝҮжҳҫејҸеј•еҸ‘ panic з„¶еҗҺд»ҺдёӯжҒўеӨҚпјҢд»ҺиҖҢеҰҘе–„жё…зҗҶеҜ№иұЎгҖӮ\n\n### Defer\n\nеҰӮжһңдҪ жӣҫеңЁ C# е’Ң Java\
    \ зӯүзј–зЁӢиҜӯиЁҖдёӯдҪҝз”ЁиҝҮ `try/catch/finally` еқ—пјҢеҸҜиғҪдјҡдҪҝз”Ё `finally` еқ—жқҘйҮҠж”ҫеңЁ `try` еқ—дёӯеҲҶй…Қзҡ„иө„жәҗгҖӮеҪ“жү§иЎҢжөҒзЁӢзҰ»ејҖ\
    \ `try` иҜӯеҸҘж—¶пјҢ`finally` еқ—дёӯзҡ„иҜӯеҸҘдјҡиҝҗиЎҢгҖӮеҚідҪҝжҺ§еҲ¶жөҒеӣ еӨ„зҗҶејӮеёёиҖҢиҝӣе…Ҙ `catch` еқ—пјҢиҝҷдёӘ `finally` еқ—д№ҹд»Қдјҡиў«и°ғз”ЁгҖӮдҪҝз”Ё\
    \ `defer`пјҢдҪ еҸҜд»ҘеңЁ Go дёӯе®һзҺ°жё…зҗҶд»Јз ҒпјҢиҝҷжҜ”е…¶д»–иҜӯиЁҖдёӯдҪҝз”Ё `finally` еқ—жӣҙдёәй«ҳж•ҲгҖӮиҷҪз„¶ `defer` дё»иҰҒз”ЁдәҺе®һзҺ°жё…зҗҶд»Јз ҒпјҢдҪҶе®ғзҡ„з”ЁйҖ”дёҚжӯўдәҺжӯӨгҖӮдҫӢеҰӮпјҢйҖҡиҝҮдёҺ\
    \ `recover` з»“еҗҲдҪҝз”ЁпјҢдҪ еҸҜд»Ҙд»ҺдёҖдёӘеј•еҸ‘ panic зҡ„еҮҪж•°дёӯйҮҚж–°иҺ·еҫ—жҺ§еҲ¶жқғгҖӮ\n\n`defer` иҜӯеҸҘдјҡе°ҶдёҖдёӘеҮҪж•°и°ғз”ЁпјҲжҲ–дёҖжқЎд»Јз ҒиҜӯеҸҘпјүжҺЁе…ҘдёҖдёӘеҲ—иЎЁгҖӮиҝҷдёӘдҝқеӯҳзҡ„вҖңеҮҪж•°и°ғз”ЁвҖқеҲ—иЎЁдјҡеңЁеӨ–еӣҙеҮҪж•°иҝ”еӣһеҗҺжү§иЎҢгҖӮеҗҺж·»еҠ зҡ„еҮҪж•°дјҡе…Ҳд»Һе»¶иҝҹеҮҪж•°еҲ—иЎЁдёӯиў«и°ғз”ЁгҖӮеҒҮи®ҫдҪ е…Ҳе°ҶеҮҪж•°\
    \ `f1`гҖҒз„¶еҗҺжҳҜ `f2`гҖҒжңҖеҗҺжҳҜ `f3` ж·»еҠ еҲ°е»¶иҝҹеҲ—иЎЁдёӯпјҢеҲҷжү§иЎҢйЎәеәҸе°ҶжҳҜ `f3`гҖҒ`f2`гҖҒз„¶еҗҺ `f1`гҖӮ\n\nжё…еҚ• 2-29 жҳҜдёҖдёӘдҪҝз”Ё\
    \ `defer` жё…зҗҶж•°жҚ®еә“дјҡиҜқеҜ№иұЎзҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 2-29.** з”ЁдәҺжё…зҗҶиө„жәҗзҡ„ Defer иҜӯеҸҘ\n\n```\nsession, err\
    \ := mgo.Dial(\"localhost\") //MongoDB дјҡиҜқеҜ№иұЎ\n\ndefer session.Close()\n\nc := session.DB(\"\
    taskdb\").C(\"categories\")\n\n//дҪҝз”Ё session еҜ№иұЎзҡ„д»Јз ҒиҜӯеҸҘ\n```\n\nжӯӨд»Јз Ғеқ—еҲӣе»әдәҶдёҖдёӘ MongoDB\
    \ ж•°жҚ®еә“зҡ„дјҡиҜқеҜ№иұЎгҖӮеңЁдёӢдёҖиЎҢпјҢд»Јз ҒиҜӯеҸҘ `session.Close()` иў«ж·»еҠ еҲ°е»¶иҝҹеҲ—иЎЁдёӯпјҢд»ҘдҫҝеңЁеӨ–еӣҙеҮҪж•°иҝ”еӣһеҗҺжё…зҗҶж•°жҚ®еә“дјҡиҜқеҜ№иұЎзҡ„иө„жәҗгҖӮдҪ еҸҜд»Ҙе°Ҷд»»ж„Ҹж•°йҮҸзҡ„д»Јз ҒиҜӯеҸҘе’ҢеҮҪж•°ж·»еҠ еҲ°е»¶иҝҹеҲ—иЎЁдёӯгҖӮ\n"
- fmt: "### Panic\n\n`panic`еҮҪж•°жҳҜдёҖдёӘеҶ…зҪ®еҮҪж•°пјҢеҸҜи®©жӮЁеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢе№¶дҪҝеҮҪж•°еҙ©жәғгҖӮеҪ“жӮЁд»ҺеҮҪж•°дёӯи°ғз”Ё`panic`ж—¶пјҢе®ғдјҡеҒңжӯўеҮҪж•°зҡ„жү§иЎҢпјҢжүҖжңүе»¶иҝҹеҮҪж•°йғҪдјҡиў«жү§иЎҢпјҢе№¶дё”и°ғз”ЁиҖ…пјҲ`caller`пјүеҮҪж•°дјҡеҫ—еҲ°дёҖдёӘжӯЈеңЁеҙ©жәғзҡ„еҮҪж•°гҖӮиҜ·и®°дҪҸпјҢжүҖжңүе»¶иҝҹеҮҪж•°еңЁжү§иЎҢеҒңжӯўеүҚйғҪдјҡжӯЈеёёжү§иЎҢгҖӮеңЁејҖеҸ‘еә”з”ЁзЁӢеәҸж—¶пјҢжӮЁеҫҲе°‘дјҡи°ғз”Ё`panic`еҮҪж•°пјҢеӣ дёәжӮЁзҡ„иҒҢиҙЈжҳҜжҸҗдҫӣйҖӮеҪ“зҡ„й”ҷиҜҜж¶ҲжҒҜпјҢиҖҢдёҚжҳҜеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢгҖӮдҪҶеңЁжҹҗдәӣеңәжҷҜдёӢпјҢеҰӮжһңжІЎжңүз»§з»ӯжӯЈеёёжҺ§еҲ¶жөҒзЁӢзҡ„еҸҜиғҪжҖ§пјҢжӮЁеҸҜиғҪйңҖиҰҒи°ғз”Ё`panic`еҮҪж•°гҖӮдҫӢеҰӮпјҢеҰӮжһңжӮЁж— жі•иҝһжҺҘеҲ°ж•°жҚ®еә“жңҚеҠЎеҷЁпјҢз»§з»ӯжү§иЎҢеә”з”ЁзЁӢеәҸе°ұжІЎжңүд»»дҪ•ж„Ҹд№үгҖӮ\n\
    \nжё…еҚ•[2-30](#A978-1-4842-1052-9_2_Chapter.html#FPar33)жҳҜдёҖдёӘд»Јз Ғеқ—пјҢеҰӮжһңиҝһжҺҘж•°жҚ®еә“ж—¶еҮәзҺ°й”ҷиҜҜпјҢе®ғдјҡи°ғз”Ё`panic`гҖӮ\n\
    \n**жё…еҚ• 2-30.** дҪҝз”Ё`panic`еҮҪж•°дҪҝеҮҪж•°еҙ©жәғ\n\n```\nsession, err := mgo.Dial(\"localhost\"\
    ) // Create MongoDB Session object\nif err != nil {\n        panic(err)\n}\ndefer\
    \ session.Close()\n```\n\nжӯӨд»Јз Ғеқ—е°қиҜ•е»әз«ӢдёҺMongoDBж•°жҚ®еә“зҡ„иҝһжҺҘе№¶еҲӣе»әдёҖдёӘ`session`еҜ№иұЎгҖӮеҰӮжһңеңЁе»әз«Ӣж•°жҚ®еә“иҝһжҺҘж—¶еҮәзҺ°й”ҷиҜҜпјҢжӮЁдјҡи°ғз”Ё`panic`гҖӮе®ғдјҡеҒңжӯўжү§иЎҢпјҢе№¶дё”и°ғз”ЁиҖ…еҮҪж•°дјҡеҫ—еҲ°дёҖдёӘжӯЈеңЁеҙ©жәғзҡ„еҮҪж•°гҖӮ\n\
    \n### Recover\n\n`recover`еҮҪж•°жҳҜдёҖдёӘеҶ…зҪ®еҮҪж•°пјҢйҖҡеёёз”ЁеңЁе»¶иҝҹеҮҪж•°еҶ…йғЁпјҢз”ЁдәҺйҮҚж–°иҺ·еҫ—еҜ№жӯЈеңЁеҙ©жәғзҡ„еҮҪж•°зҡ„жҺ§еҲ¶жқғгҖӮ`recover`еҮҪж•°д»…еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁжңүз”ЁпјҢеӣ дёәе»¶иҝҹиҜӯеҸҘжҳҜеңЁеҮҪж•°еҙ©жәғж—¶е”ҜдёҖеҸҜд»Ҙжү§иЎҢжҹҗдәӣж“ҚдҪңзҡ„ж–№ејҸгҖӮ\n\
    \nжё…еҚ•[2-31](#A978-1-4842-1052-9_2_Chapter.html#FPar34)жҳҜдёҖдёӘжј”зӨәpanicжҒўеӨҚзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ•\
    \ 2-31.** дҪҝз”Ё`recover`д»Һеҙ©жәғеҮҪж•°дёӯжҒўеӨҚ\n\n```\npackage main\nimport \"fmt\"\nfunc doPanic()\
    \ {\n        defer func() {\n                if e := recover(); e != nil {\n \
    \                  fmt.Println(\"Recover with: \", e)\n                }\n   \
    \     }()\n        panic(\"Just panicking for the sake of demo\")\n        fmt.Println(\"\
    This will never be called\")\n}\nfunc main() {\n        fmt.Println(\"Starting\
    \ to panic\")\n        doPanic()\n        fmt.Println(\"Program regains control\
    \ after panic recover\")\n}\n```\n\nеңЁеүҚйқўзҡ„зЁӢеәҸдёӯпјҢд»Һ`main`еҮҪж•°и°ғз”ЁдәҶ`doPanic`еҮҪж•°гҖӮеңЁ`doPanic`еҮҪж•°еҶ…йғЁпјҢдёҖдёӘеҢҝеҗҚеҮҪж•°иў«ж·»еҠ еҲ°дәҶе»¶иҝҹеҲ—иЎЁдёӯпјҢеңЁиҜҘеҢҝеҗҚеҮҪж•°дёӯи°ғз”Ё`recover`жқҘд»Һеҙ©жәғеҮҪж•°дёӯйҮҚж–°иҺ·еҫ—жҺ§еҲ¶жқғгҖӮеҮәдәҺжј”зӨәзӣ®зҡ„пјҢйҖҡиҝҮжҸҗдҫӣдёҖдёӘеӯ—з¬ҰдёІеҖјжқҘи°ғз”Ё`panic`еҮҪж•°гҖӮеҪ“дёҖдёӘеҮҪж•°еҙ©жәғж—¶пјҢжүҖжңүе»¶иҝҹеҮҪж•°йғҪдјҡиў«жү§иЎҢгҖӮеӣ дёә`recover`еҮҪж•°еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁиў«и°ғз”ЁпјҢжүҖд»ҘзЁӢеәҸжү§иЎҢзҡ„жҺ§еҲ¶жқғиў«йҮҚж–°иҺ·еҫ—гҖӮеҪ“и°ғз”Ё`recover`ж—¶пјҢдјҡжҺҘж”¶еҲ°з”ұ`panic`еҮҪж•°жҸҗдҫӣзҡ„еҖјгҖӮ\n\
    \n**жіЁж„Ҹ**\n\nеңЁ`doPanic`еҮҪж•°дёӯ`panic`и°ғз”Ёд№ӢеҗҺжҸҗдҫӣзҡ„иҜӯеҸҘдёҚдјҡжү§иЎҢпјҢдҪҶеңЁ`main`еҮҪж•°дёӯеҜ№`doPanic`еҮҪж•°и°ғз”Ёд№ӢеҗҺзҡ„иҜӯеҸҘдјҡжү§иЎҢпјҢеӣ дёәжҺ§еҲ¶жқғе·Ід»Һеҙ©жәғзҡ„еҮҪж•°дёӯйҮҚж–°иҺ·еҫ—гҖӮ\n\
    \nжӮЁеә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\nStarting to panic\nRecover with:  Just panicking for the\
    \ sake of demo\nProgram regains control after panic recover\n```\n\n## й”ҷиҜҜеӨ„зҗҶ\n\n\
    Goдёӯзҡ„й”ҷиҜҜеӨ„зҗҶдёҺе…¶д»–зј–зЁӢиҜӯиЁҖдёҚеҗҢгҖӮеӨ§еӨҡж•°зј–зЁӢиҜӯиЁҖдҪҝз”Ё`try/catch`еқ—жқҘеӨ„зҗҶејӮеёёпјӣеңЁGoдёӯпјҢдёҖдёӘеҮҪж•°еҸҜд»Ҙиҝ”еӣһеӨҡдёӘеҖјгҖӮйҖҡиҝҮеҲ©з”ЁиҝҷдёӘзү№жҖ§пјҢGoеҮҪж•°йҖҡеёёдјҡиҝ”еӣһдёҖдёӘеҶ…зҪ®`error`зұ»еһӢзҡ„еҖјпјҢд»ҘеҸҠеҮҪж•°иҝ”еӣһзҡ„е…¶д»–еҖјгҖӮиҝ”еӣһй”ҷиҜҜеҖјзҡ„жғҜз”Ёж–№ејҸжҳҜеңЁе…¶д»–иҝ”еӣһеҖјд№ӢеҗҺжҸҗдҫӣиҜҘеҖјгҖӮеҪ“жӮЁжҹҘзңӢж ҮеҮҶеә“еҢ…ж—¶пјҢеҸҜд»ҘзңӢеҲ°и®ёеӨҡеҮҪж•°иҝ”еӣһдёҖдёӘ`error`еҖјгҖӮеӣ жӯӨпјҢеҪ“жӮЁи°ғз”Ёж ҮеҮҶеә“еҢ…зҡ„еҮҪж•°ж—¶пјҢеҸҜд»ҘжЈҖжҹҘ`error`еҖјжҳҜеҗҰдёә`nil`гҖӮеҰӮжһңиҝ”еӣһдәҶйқһ`nil`зҡ„`error`еҖјпјҢжӮЁеҸҜд»ҘиҜҶеҲ«еҮәйҒҮеҲ°дәҶејӮеёёгҖӮжӮЁеҸҜд»Ҙе°ҶзӣёеҗҢзҡ„ж–№жі•з”ЁдәҺGoеҮҪж•°пјҢиҝҷдәӣеҮҪж•°еҸҜд»Ҙд»ҺеҮҪж•°дёӯиҝ”еӣһеӨҡдёӘеҖјпјҢеҢ…жӢ¬дёҖдёӘ`error`еҖјгҖӮ\n\
    \nжё…еҚ•[2-32](#A978-1-4842-1052-9_2_Chapter.html#FPar36)жҳҜдёҖдёӘд»Јз Ғеқ—пјҢйҖҡиҝҮи°ғз”Ёж ҮеҮҶеә“еҮҪж•°жј”зӨәдәҶй”ҷиҜҜеӨ„зҗҶгҖӮ\n\
    \n**жё…еҚ• 2-32.** Goдёӯзҡ„й”ҷиҜҜеӨ„зҗҶ\n\n```\nf, err := os.Open(\"readme.ext\")\nif err != nil\
    \ {\n    log.Fatal(err)\n}\n```\n\nеңЁиҝҷдёӘд»Јз Ғеқ—дёӯпјҢи°ғз”ЁдәҶ`os`еҢ…зҡ„`Open`еҮҪж•°жқҘжү“ејҖдёҖдёӘж–Үд»¶гҖӮ`Open`еҮҪж•°иҝ”еӣһдёӨдёӘеҖјпјҡ`File`еҜ№иұЎе’Ң`error`еҖјгҖӮеҰӮжһңеҮҪж•°иҝ”еӣһдёҖдёӘйқһ`nil`зҡ„`error`еҖјпјҢеҲҷеӯҳеңЁй”ҷиҜҜпјҢе№¶дё”ж–Үд»¶е°Ҷж— жі•жү“ејҖгҖӮиҝҷйҮҢпјҢеҰӮжһңеҸ‘з”ҹй”ҷиҜҜпјҢдјҡи®°еҪ•иҜҘ`error`еҖјгҖӮ\n\
    \nжё…еҚ•[2-33](#A978-1-4842-1052-9_2_Chapter.html#FPar37)жҳҜдёҖдёӘиҮӘе®ҡд№үеҮҪж•°пјҢе®ғиҝ”еӣһеӨҡдёӘеҖјпјҢеҢ…жӢ¬дёҖдёӘ`error`еҖјгҖӮ\n\
    \n**жё…еҚ• 2-33.** е®ҡд№үеёҰжңүй”ҷиҜҜеҖјзҡ„еҮҪж•°\n\n```\nfunc GetById(id string) (models.Task, error)\
    \ {\n    var task models.Task\n   // Implementation here\n    return task,nil\
    \ // multiple return values\n}\n```\n\nеҪ“жӮЁзј–еҶҷжҸҗдҫӣ`error`еҖјзҡ„еҮҪж•°ж—¶пјҢеҰӮжһңжІЎжңүеҸ‘з”ҹй”ҷиҜҜпјҢеҸҜд»Ҙиҝ”еӣһ`nil`еҖјгҖӮи°ғз”ЁиҖ…пјҲ`caller`пјүеҮҪж•°еҸҜд»ҘжЈҖжҹҘ`error`еҖјжҳҜеҗҰдёә`nil`пјӣеҰӮжһң`error`еҖјдёҚжҳҜ`nil`пјҢеҲҷеҮҪж•°ж”¶еҲ°дёҖдёӘй”ҷиҜҜгҖӮ\n\
    \nжё…еҚ•[2-34](#A978-1-4842-1052-9_2_Chapter.html#FPar38)жҳҜдёҖдёӘд»Јз Ғеқ—пјҢжј”зӨәдәҶеҰӮдҪ•и°ғз”ЁдёҖдёӘжҸҗдҫӣ`error`еҖјзҡ„еҮҪж•°гҖӮ\n\
    \n**жё…еҚ• 2-34.** и°ғз”ЁиҖ…еҮҪж•°жЈҖжҹҘй”ҷиҜҜеҖј\n\n```\ntask, err:= GetById (\"105\")\nif err != nil\
    \ {\n    log.Fatal(err)\n}\n//Implementation here if error is nill\n```\n\n##\
    \ жҖ»з»“\n\nжң¬з« и®Ёи®әдәҶGoеҢ…пјҢиҝҷжҳҜGoз”ҹжҖҒзі»з»ҹдёӯзҡ„йҮҚиҰҒзү№жҖ§гҖӮGoйҖҡиҝҮе…¶еҢ…з”ҹжҖҒзі»з»ҹжҸҗдҫӣдәҶжЁЎеқ—еҢ–гҖҒеҸҜз»„еҗҲжҖ§е’Ңд»Јз ҒеҸҜйҮҚз”ЁжҖ§гҖӮGoжәҗж–Үд»¶иў«з»„з»ҮеҲ°з§°дёәеҢ…зҡ„зӣ®еҪ•дёӯгҖӮеңЁGoдёӯпјҢжӮЁеҸҜд»Ҙзј–еҶҷдёӨз§Қзұ»еһӢзҡ„еҢ…пјҡеҢ…`main`пјҲз”ҹжҲҗеҸҜжү§иЎҢзЁӢеәҸпјҢеңЁGoж–ҮжЎЈдёӯйҖҡеёёз§°дёәе‘Ҫд»Өпјүе’Ңе…ұдә«еә“еҢ…пјҲз”ЁдәҺдёҺе…¶д»–еҢ…йҮҚз”Ёд»Јз ҒпјүгҖӮжӮЁеҸҜд»Ҙз»ҷеҢ…иө·еҲ«еҗҚпјҢд»ҘйҒҝе…ҚеңЁеј•з”ЁеҗҢеҗҚеҢ…ж—¶еҮәзҺ°еҗҚз§°жӯ§д№үгҖӮеҢ…зҡ„`init`еҮҪж•°еҸҜз”ЁдәҺеҲқе§ӢеҢ–еҢ…еҸҳйҮҸд»ҘеҸҠжү§иЎҢе…¶д»–еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮжӮЁдёҚйңҖиҰҒжҳҫејҸи°ғз”Ё`init`еҮҪж•°пјӣе®ғдјҡеңЁжү§иЎҢејҖе§Ӣж—¶иҮӘеҠЁжү§иЎҢгҖӮ\n\
    \nGoе·Ҙе…·жҳҜдёҖдёӘе‘Ҫд»ӨиЎҢе·Ҙе…·пјҢжҸҗдҫӣдәҶеҗ„з§Қе‘Ҫд»ӨпјҢз”ЁдәҺзј–иҜ‘гҖҒж јејҸеҢ–гҖҒжөӢиҜ•е’ҢиҝҗиЎҢGoд»Јз ҒзӯүеҠҹиғҪгҖӮ\n\nGoжҸҗдҫӣдәҶдёүз§Қж•°жҚ®з»“жһ„жқҘз®ЎзҗҶж•°жҚ®йӣҶеҗҲпјҡж•°з»„гҖҒеҲҮзүҮе’Ңжҳ е°„гҖӮж•°з»„жҳҜдёҖз§Қеӣәе®ҡй•ҝеәҰзҡ„ж•°жҚ®зұ»еһӢпјҢеҢ…еҗ«еҚ•дёҖзұ»еһӢе…ғзҙ зҡ„еәҸеҲ—гҖӮеҲҮзүҮжҳҜдёҖз§ҚеҠЁжҖҒж•°з»„пјҢеҸҜд»ҘйҡҸзқҖж•°жҚ®зҡ„еўһеҠ жҲ–зј©еҮҸиҖҢеўһй•ҝгҖӮGoжҸҗдҫӣдәҶдёӨдёӘз”ЁдәҺж“ҚдҪңеҲҮзүҮзҡ„еҶ…зҪ®еҮҪж•°пјҡ`append`е’Ң`copy`гҖӮжҳ е°„жҳҜдёҖз§ҚжҸҗдҫӣж— еәҸй”®еҖјеҜ№йӣҶеҗҲзҡ„ж•°жҚ®з»“жһ„гҖӮ\n\
    \nGoжҸҗдҫӣдәҶ`defer`е…ій”®еӯ—з”ЁдәҺжё…зҗҶиө„жәҗгҖӮ`defer`иҜӯеҸҘе°ҶдёҖдёӘеҮҪж•°и°ғз”ЁжҺЁе…ҘеҲ°дёҖдёӘе»¶иҝҹеҮҪж•°еҲ—иЎЁдёӯпјҢиҜҘеҲ—иЎЁеңЁеҢ…еӣҙеҮҪж•°иҝ”еӣһеҗҺжү§иЎҢгҖӮ`panic`еҮҪж•°е…Ғи®ёжӮЁеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢе№¶дҪҝеҮҪж•°еҙ©жәғгҖӮ`recover`еҮҪж•°еҸҜд»ҘйҮҚж–°иҺ·еҫ—еҜ№еҙ©жәғеҮҪж•°зҡ„жҺ§еҲ¶жқғпјҢе®ғд»…еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁжңүз”ЁгҖӮ\n\
    \nGoдёӯзҡ„й”ҷиҜҜеӨ„зҗҶдёҺеӨ§еӨҡж•°е…¶д»–зј–зЁӢиҜӯиЁҖдёҚеҗҢгҖӮз”ұдәҺGoеҮҪж•°еҸҜд»Ҙиҝ”еӣһеӨҡдёӘеҖјпјҢеӣ жӯӨеҸҜд»Ҙд»ҺеҮҪж•°иҝ”еӣһдёҖдёӘй”ҷиҜҜеҖјгҖӮеӣ жӯӨпјҢд»Һи°ғз”ЁиҖ…еҮҪж•°дёӯпјҢжӮЁеҸҜд»ҘиҪ»жқҫжЈҖжҹҘеҮҪж•°жҳҜеҗҰиҝ”еӣһдәҶй”ҷиҜҜеҖјпјҢе№¶зӣёеә”ең°жҸҗдҫӣд»Јз Ғе®һзҺ°гҖӮ"
  raw: '### Panic


    The `panic` function is a built-in function that lets you stop the normal flow
    of control and panic a function. When you call `panic` from a function, it stops
    the execution of the function, any deferred functions are executed, and the `caller`
    function gets a panicking function. Keep in mind that all deferred functions are
    executed normally before the execution stops. When developing applications, you
    will rarely call the `panic` function because your responsibility is to provide
    proper error messages rather than stopping the normal control flow. But in some
    scenarios, you may need to call the `panic` function if there are no possibilities
    to continue the normal flow of control. For example, if you canвҖҷt connect to a
    database server, it doesnвҖҷt make any sense to continue executing the application.


    Listing [2-30](#A978-1-4842-1052-9_2_Chapter.html#FPar33) is the code block that
    calls `panic` if there is an error while connecting to a database.


    Listing 2-30.В В Using the panic Function to Panic a Function


    `session, err := mgo.Dial("localhost") // Create MongoDB Session object`


    `if err != nil {`


    В В В В В В В В `panic(err)`


    `}`


    `defer session.Close()`


    This code block tries to establish a connection to a MongoDB database and create
    a `session` object. You call `panic` if there is an error while establishing a
    connection to the database. It stops the execution, and the caller function gets
    a panicking function.


    ### Recover


    The `recover` function is a built-in function that is typically used inside deferred
    functions that regain control of a panicking function. The `recover` function
    is useful only inside deferred functions because the differing statements are
    the only way to execute something when a function is panicking.


    Listing [2-31](#A978-1-4842-1052-9_2_Chapter.html#FPar34) is an example program
    that demonstrates panic recovery.


    Listing 2-31.В В Recovering from a Panicking Function Using recover


    `package main`


    `import "fmt"`


    `func doPanic() {`


    В В В В В В В В `defer func() {`


    В В В В В В В В В В В В В В В В `if e := recover(); e != nil {`


    В В В В В В В В В В В В В В В В В В В `fmt.Println("Recover with: ", e)`


    В В В В В В В В В В В В В В В В `}`


    В В В В В В В В `}()`


    В В В В В В В В `panic("Just panicking for the sake of demo")`


    В В В В В В В В `fmt.Println("This will never be called")`


    `}`


    `func main() {`


    В В В В В В В В `fmt.Println("Starting to panic")`


    В В В В В В В В `doPanic()`


    В В В В В В В В `fmt.Println("Program regains control after panic recover")`


    `}`


    In the preceding program, the function `doPanic` is called from the `main` function.
    Inside the function `doPanic`, an anonymous function has been added to the deferred
    list, in which recover is called to regain control from the panicking function.
    For the sake of the demo, the `panic` function is called by providing a string
    value. When a function is panicking, any deferred functions are executed. Because
    the recover function is called inside the deferred function, control of the program
    execution is regained. When recover is called, the value provided by the `panic`
    function is received.


    Note


    Statements provided after the panic call in the `doPanic` function donвҖҷt execute,
    but statements after the call to the `doPanic` function in the main function do
    execute as control is regained from the panicked function.


    You should see the following output:


    `Starting to panic`


    `Recover with:В В Just panicking for the sake of demo`


    `Program regains control after panic recover`


    ## Error Handling


    Error handling in Go is different from that of other programming languages. Most
    programming languages use a `try/catch` block to handle exceptions; in Go, a function
    can return multiple values. By leveraging this feature, functions in Go typically
    return a value of a built-in error type, along with other values returned from
    a function. An idiomatic way to return an error value is to provide the value
    after other values return. When you look on the standard library packages, you
    can see that many functions return an error value. So when you call the functions
    of standard library packages, you can see whether the error value is nil. If a
    non-nil error value returns, you can identify that you are getting an exception.
    You can use the same approach for Go functions where you can return multiple values
    from a function including an error value.


    Listing [2-32](#A978-1-4842-1052-9_2_Chapter.html#FPar36) is the code block that
    demonstrates error handling by calling the standard library function.


    Listing 2-32.В В Error Handling in Go


    `f, err := os.Open("readme.ext")`


    `if err != nil {`


    В В В В `log.Fatal(err)`


    `}`


    In this code block, the function `Open` of the `os` package is called to open
    a file. The function `Open` returns two values: the `File` object and the error
    value. If the function returns a non-nil error value, there is an error, and the
    file wonвҖҷt open. Here the error value is logged if an error occurred.


    Listing [2-33](#A978-1-4842-1052-9_2_Chapter.html#FPar37) is a custom function
    that returns multiple values, including an error value.


    Listing 2-33.В В Defining Functions with an Error Value


    `func GetById(id string) (models.Task, error) {`


    В В В В `var task models.Task`


    В В В `// Implementation here`


    В В В В `return task,nil // multiple return values`


    `}`


    When you write functions to provide an error value, you can return a nil value
    if any error has occurred. The `caller` function can check whether the error value
    is nil; if the error value is not nil, the function receives an error.


    Listing [2-34](#A978-1-4842-1052-9_2_Chapter.html#FPar38) is the code block that
    demonstrates how to call a function that provides an error value.


    Listing 2-34.В В A caller Function Checks the Error Value


    `task, err:= GetById (вҖң105вҖқ)`


    `if err != nil {`


    В В В В `log.Fatal(err)`


    `}`


    `//Implementation here if error is nill`


    ## Summary


    This chapter discussed Go packages, which are important features in the Go ecosystem.
    Go provides modularity, composability, and code reusability through its package
    ecosystem. Go source files are organized into directories called packages. In
    Go, you can write two types of packages: package `main` that results in an executable
    program (often known as a command in Go documentation) and shared library packages
    that reuse code with other packages. You can give package aliases to avoid name
    ambiguity when referencing packages with the same name. The packageвҖҷs `init` function
    can be used to initialize packages variables and for other initialization logic.
    You donвҖҷt need to explicitly call the `init` function; it is automatically executed
    at the beginning of the execution.


    The Go tool is a command-line tool that provides various commands for functionalities
    such as compiling, formatting, testing and running Go code.


    Go provides three types of data structures to manage collections of data: arrays,
    slices, and maps. An array is a fixed-length data type that contains a sequence
    of elements of a single type. A slice is a dynamic array that can be grown at
    a later stage as data increases or shrinks. Go provides two built-in functions
    for manipulating slices: `append` and `copy`. A map is a data structure that provides
    an unordered collection of key-value pairs.


    Go provides the `defer` keyword for cleaning up resources. A `defer` statement
    pushes a function call onto a list of deferred functions, which is executed after
    the surrounding function returns. The `panic` function allows you to stop the
    normal flow of control and panic a function. The `recover` function, which regains
    control of a panicking function, is useful only inside deferred functions.


    Error handling in Go differs from that of most other programming languages. Because
    Go functions can return multiple values, an error value can be returned from functions.
    So from caller functions, you can easily check whether the function returns an
    error value and then provide code implementations accordingly.'
  trans: "\n### Panic\n\n`panic`еҮҪж•°жҳҜдёҖдёӘеҶ…зҪ®еҮҪж•°пјҢеҸҜи®©жӮЁеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢе№¶дҪҝеҮҪж•°еҙ©жәғгҖӮеҪ“жӮЁд»ҺеҮҪж•°дёӯи°ғз”Ё`panic`ж—¶пјҢе®ғдјҡеҒңжӯўеҮҪж•°зҡ„жү§иЎҢпјҢжүҖжңүе»¶иҝҹеҮҪж•°йғҪдјҡиў«жү§иЎҢпјҢе№¶дё”и°ғз”ЁиҖ…пјҲ`caller`пјүеҮҪж•°дјҡеҫ—еҲ°дёҖдёӘжӯЈеңЁеҙ©жәғзҡ„еҮҪж•°гҖӮиҜ·и®°дҪҸпјҢжүҖжңүе»¶иҝҹеҮҪж•°еңЁжү§иЎҢеҒңжӯўеүҚйғҪдјҡжӯЈеёёжү§иЎҢгҖӮеңЁејҖеҸ‘еә”з”ЁзЁӢеәҸж—¶пјҢжӮЁеҫҲе°‘дјҡи°ғз”Ё`panic`еҮҪж•°пјҢеӣ дёәжӮЁзҡ„иҒҢиҙЈжҳҜжҸҗдҫӣйҖӮеҪ“зҡ„й”ҷиҜҜж¶ҲжҒҜпјҢиҖҢдёҚжҳҜеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢгҖӮдҪҶеңЁжҹҗдәӣеңәжҷҜдёӢпјҢеҰӮжһңжІЎжңүз»§з»ӯжӯЈеёёжҺ§еҲ¶жөҒзЁӢзҡ„еҸҜиғҪжҖ§пјҢжӮЁеҸҜиғҪйңҖиҰҒи°ғз”Ё`panic`еҮҪж•°гҖӮдҫӢеҰӮпјҢеҰӮжһңжӮЁж— жі•иҝһжҺҘеҲ°ж•°жҚ®еә“жңҚеҠЎеҷЁпјҢз»§з»ӯжү§иЎҢеә”з”ЁзЁӢеәҸе°ұжІЎжңүд»»дҪ•ж„Ҹд№үгҖӮ\n\
    \nжё…еҚ• 2-30 жҳҜдёҖдёӘд»Јз Ғеқ—пјҢеҰӮжһңиҝһжҺҘж•°жҚ®еә“ж—¶еҮәзҺ°й”ҷиҜҜпјҢе®ғдјҡи°ғз”Ё`panic`гҖӮ\n\n**жё…еҚ• 2-30.** дҪҝз”Ё`panic`еҮҪж•°дҪҝеҮҪж•°еҙ©жәғ\n\n\
    ```\nsession, err := mgo.Dial(\"localhost\") // Create MongoDB Session object\n\
    if err != nil {\n        panic(err)\n}\ndefer session.Close()\n```\n\nжӯӨд»Јз Ғеқ—е°қиҜ•е»әз«ӢдёҺ\
    \ MongoDB ж•°жҚ®еә“зҡ„иҝһжҺҘе№¶еҲӣе»әдёҖдёӘ`session`еҜ№иұЎгҖӮеҰӮжһңеңЁе»әз«Ӣж•°жҚ®еә“иҝһжҺҘж—¶еҮәзҺ°й”ҷиҜҜпјҢжӮЁдјҡи°ғз”Ё`panic`гҖӮе®ғдјҡеҒңжӯўжү§иЎҢпјҢе№¶дё”и°ғз”ЁиҖ…еҮҪж•°дјҡеҫ—еҲ°дёҖдёӘжӯЈеңЁеҙ©жәғзҡ„еҮҪж•°гҖӮ\n\
    \n### Recover\n\n`recover`еҮҪж•°жҳҜдёҖдёӘеҶ…зҪ®еҮҪж•°пјҢйҖҡеёёз”ЁеңЁе»¶иҝҹеҮҪж•°еҶ…йғЁпјҢз”ЁдәҺйҮҚж–°иҺ·еҫ—еҜ№жӯЈеңЁеҙ©жәғзҡ„еҮҪж•°зҡ„жҺ§еҲ¶жқғгҖӮ`recover`еҮҪж•°д»…еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁжңүз”ЁпјҢеӣ дёәе»¶иҝҹиҜӯеҸҘжҳҜеңЁеҮҪж•°еҙ©жәғж—¶е”ҜдёҖеҸҜд»Ҙжү§иЎҢжҹҗдәӣж“ҚдҪңзҡ„ж–№ејҸгҖӮ\n\
    \nжё…еҚ• 2-31 жҳҜдёҖдёӘжј”зӨә panic жҒўеӨҚзҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ• 2-31.** дҪҝз”Ё`recover`д»Һеҙ©жәғеҮҪж•°дёӯжҒўеӨҚ\n\n```\npackage\
    \ main\nimport \"fmt\"\nfunc doPanic() {\n        defer func() {\n           \
    \     if e := recover(); e != nil {\n                   fmt.Println(\"Recover\
    \ with: \", e)\n                }\n        }()\n        panic(\"Just panicking\
    \ for the sake of demo\")\n        fmt.Println(\"This will never be called\")\n\
    }\nfunc main() {\n        fmt.Println(\"Starting to panic\")\n        doPanic()\n\
    \        fmt.Println(\"Program regains control after panic recover\")\n}\n```\n\
    \nеңЁеүҚйқўзҡ„зЁӢеәҸдёӯпјҢд»Һ`main`еҮҪж•°и°ғз”ЁдәҶ`doPanic`еҮҪж•°гҖӮеңЁ`doPanic`еҮҪж•°еҶ…йғЁпјҢдёҖдёӘеҢҝеҗҚеҮҪж•°иў«ж·»еҠ еҲ°дәҶе»¶иҝҹеҲ—иЎЁдёӯпјҢеңЁиҜҘеҢҝеҗҚеҮҪж•°дёӯи°ғз”Ё`recover`жқҘд»Һеҙ©жәғеҮҪж•°дёӯйҮҚж–°иҺ·еҫ—жҺ§еҲ¶жқғгҖӮеҮәдәҺжј”зӨәзӣ®зҡ„пјҢйҖҡиҝҮжҸҗдҫӣдёҖдёӘеӯ—з¬ҰдёІеҖјжқҘи°ғз”Ё`panic`еҮҪж•°гҖӮеҪ“дёҖдёӘеҮҪж•°еҙ©жәғж—¶пјҢжүҖжңүе»¶иҝҹеҮҪж•°йғҪдјҡиў«жү§иЎҢгҖӮеӣ дёә`recover`еҮҪж•°еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁиў«и°ғз”ЁпјҢжүҖд»ҘзЁӢеәҸжү§иЎҢзҡ„жҺ§еҲ¶жқғиў«йҮҚж–°иҺ·еҫ—гҖӮеҪ“и°ғз”Ё`recover`ж—¶пјҢдјҡжҺҘж”¶еҲ°з”ұ`panic`еҮҪж•°жҸҗдҫӣзҡ„еҖјгҖӮ\n\
    \n**жіЁж„Ҹ**\n\nеңЁ`doPanic`еҮҪж•°дёӯ`panic`и°ғз”Ёд№ӢеҗҺжҸҗдҫӣзҡ„иҜӯеҸҘдёҚдјҡжү§иЎҢпјҢдҪҶеңЁ`main`еҮҪж•°дёӯеҜ№`doPanic`еҮҪж•°и°ғз”Ёд№ӢеҗҺзҡ„иҜӯеҸҘдјҡжү§иЎҢпјҢеӣ дёәжҺ§еҲ¶жқғе·Ід»Һеҙ©жәғзҡ„еҮҪж•°дёӯйҮҚж–°иҺ·еҫ—гҖӮ\n\
    \nжӮЁеә”иҜҘдјҡзңӢеҲ°д»ҘдёӢиҫ“еҮәпјҡ\n\n```\nStarting to panic\nRecover with:  Just panicking for the\
    \ sake of demo\nProgram regains control after panic recover\n```\n\n## й”ҷиҜҜеӨ„зҗҶ\n\n\
    Go дёӯзҡ„й”ҷиҜҜеӨ„зҗҶдёҺе…¶д»–зј–зЁӢиҜӯиЁҖдёҚеҗҢгҖӮеӨ§еӨҡж•°зј–зЁӢиҜӯиЁҖдҪҝз”Ё`try/catch`еқ—жқҘеӨ„зҗҶејӮеёёпјӣеңЁ Go дёӯпјҢдёҖдёӘеҮҪж•°еҸҜд»Ҙиҝ”еӣһеӨҡдёӘеҖјгҖӮйҖҡиҝҮеҲ©з”ЁиҝҷдёӘзү№жҖ§пјҢGo еҮҪж•°йҖҡеёёдјҡиҝ”еӣһдёҖдёӘеҶ…зҪ®`error`зұ»еһӢзҡ„еҖјпјҢд»ҘеҸҠеҮҪж•°иҝ”еӣһзҡ„е…¶д»–еҖјгҖӮиҝ”еӣһй”ҷиҜҜеҖјзҡ„жғҜз”Ёж–№ејҸжҳҜеңЁе…¶д»–иҝ”еӣһеҖјд№ӢеҗҺжҸҗдҫӣиҜҘеҖјгҖӮеҪ“жӮЁжҹҘзңӢж ҮеҮҶеә“еҢ…ж—¶пјҢеҸҜд»ҘзңӢеҲ°и®ёеӨҡеҮҪж•°иҝ”еӣһдёҖдёӘ`error`еҖјгҖӮеӣ жӯӨпјҢеҪ“жӮЁи°ғз”Ёж ҮеҮҶеә“еҢ…зҡ„еҮҪж•°ж—¶пјҢеҸҜд»ҘжЈҖжҹҘ`error`еҖјжҳҜеҗҰдёә`nil`гҖӮеҰӮжһңиҝ”еӣһдәҶйқһ`nil`зҡ„`error`еҖјпјҢжӮЁеҸҜд»ҘиҜҶеҲ«еҮәйҒҮеҲ°дәҶејӮеёёгҖӮжӮЁеҸҜд»Ҙе°ҶзӣёеҗҢзҡ„ж–№жі•з”ЁдәҺ\
    \ Go еҮҪж•°пјҢиҝҷдәӣеҮҪж•°еҸҜд»Ҙд»ҺеҮҪж•°дёӯиҝ”еӣһеӨҡдёӘеҖјпјҢеҢ…жӢ¬дёҖдёӘ`error`еҖјгҖӮ\n\nжё…еҚ• 2-32 жҳҜдёҖдёӘд»Јз Ғеқ—пјҢйҖҡиҝҮи°ғз”Ёж ҮеҮҶеә“еҮҪж•°жј”зӨәдәҶй”ҷиҜҜеӨ„зҗҶгҖӮ\n\n\
    **жё…еҚ• 2-32.** Go дёӯзҡ„й”ҷиҜҜеӨ„зҗҶ\n\n```\nf, err := os.Open(\"readme.ext\")\nif err != nil\
    \ {\n    log.Fatal(err)\n}\n```\n\nеңЁиҝҷдёӘд»Јз Ғеқ—дёӯпјҢи°ғз”ЁдәҶ`os`еҢ…зҡ„`Open`еҮҪж•°жқҘжү“ејҖдёҖдёӘж–Үд»¶гҖӮ`Open`еҮҪж•°иҝ”еӣһдёӨдёӘеҖјпјҡ`File`еҜ№иұЎе’Ң`error`еҖјгҖӮеҰӮжһңеҮҪж•°иҝ”еӣһдёҖдёӘйқһ`nil`зҡ„`error`еҖјпјҢеҲҷеӯҳеңЁй”ҷиҜҜпјҢе№¶дё”ж–Үд»¶е°Ҷж— жі•жү“ејҖгҖӮиҝҷйҮҢпјҢеҰӮжһңеҸ‘з”ҹй”ҷиҜҜпјҢдјҡи®°еҪ•иҜҘ`error`еҖјгҖӮ\n\
    \nжё…еҚ• 2-33 жҳҜдёҖдёӘиҮӘе®ҡд№үеҮҪж•°пјҢе®ғиҝ”еӣһеӨҡдёӘеҖјпјҢеҢ…жӢ¬дёҖдёӘ`error`еҖјгҖӮ\n\n**жё…еҚ• 2-33.** е®ҡд№үеёҰжңүй”ҷиҜҜеҖјзҡ„еҮҪж•°\n\n```\nfunc\
    \ GetById(id string) (models.Task, error) {\n    var task models.Task\n   // Implementation\
    \ here\n    return task,nil // multiple return values\n}\n```\n\nеҪ“жӮЁзј–еҶҷжҸҗдҫӣ`error`еҖјзҡ„еҮҪж•°ж—¶пјҢеҰӮжһңжІЎжңүеҸ‘з”ҹй”ҷиҜҜпјҢеҸҜд»Ҙиҝ”еӣһ`nil`еҖјгҖӮи°ғз”ЁиҖ…пјҲ`caller`пјүеҮҪж•°еҸҜд»ҘжЈҖжҹҘ`error`еҖјжҳҜеҗҰдёә`nil`пјӣеҰӮжһң`error`еҖјдёҚжҳҜ`nil`пјҢеҲҷеҮҪж•°ж”¶еҲ°дёҖдёӘй”ҷиҜҜгҖӮ\n\
    \nжё…еҚ• 2-34 жҳҜдёҖдёӘд»Јз Ғеқ—пјҢжј”зӨәдәҶеҰӮдҪ•и°ғз”ЁдёҖдёӘжҸҗдҫӣ`error`еҖјзҡ„еҮҪж•°гҖӮ\n\n**жё…еҚ• 2-34.** и°ғз”ЁиҖ…еҮҪж•°жЈҖжҹҘй”ҷиҜҜеҖј\n\n```\ntask,\
    \ err:= GetById (\"105\")\nif err != nil {\n    log.Fatal(err)\n}\n//Implementation\
    \ here if error is nill\n```\n\n## жҖ»з»“\n\nжң¬з« и®Ёи®әдәҶ Go еҢ…пјҢиҝҷжҳҜ Go з”ҹжҖҒзі»з»ҹдёӯзҡ„йҮҚиҰҒзү№жҖ§гҖӮGo йҖҡиҝҮе…¶еҢ…з”ҹжҖҒзі»з»ҹжҸҗдҫӣдәҶжЁЎеқ—еҢ–гҖҒеҸҜз»„еҗҲжҖ§е’Ңд»Јз ҒеҸҜйҮҚз”ЁжҖ§гҖӮGo\
    \ жәҗж–Үд»¶иў«з»„з»ҮеҲ°з§°дёәеҢ…зҡ„зӣ®еҪ•дёӯгҖӮеңЁ Go дёӯпјҢжӮЁеҸҜд»Ҙзј–еҶҷдёӨз§Қзұ»еһӢзҡ„еҢ…пјҡеҢ…`main`пјҲз”ҹжҲҗеҸҜжү§иЎҢзЁӢеәҸпјҢеңЁ Go ж–ҮжЎЈдёӯйҖҡеёёз§°дёәе‘Ҫд»Өпјүе’Ңе…ұдә«еә“еҢ…пјҲз”ЁдәҺдёҺе…¶д»–еҢ…йҮҚз”Ёд»Јз ҒпјүгҖӮжӮЁеҸҜд»Ҙз»ҷеҢ…иө·еҲ«еҗҚпјҢд»ҘйҒҝе…ҚеңЁеј•з”ЁеҗҢеҗҚеҢ…ж—¶еҮәзҺ°еҗҚз§°жӯ§д№үгҖӮеҢ…зҡ„`init`еҮҪж•°еҸҜз”ЁдәҺеҲқе§ӢеҢ–еҢ…еҸҳйҮҸд»ҘеҸҠжү§иЎҢе…¶д»–еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮжӮЁдёҚйңҖиҰҒжҳҫејҸи°ғз”Ё`init`еҮҪж•°пјӣе®ғдјҡеңЁжү§иЎҢејҖе§Ӣж—¶иҮӘеҠЁжү§иЎҢгҖӮ\n\
    \nGo е·Ҙе…·жҳҜдёҖдёӘе‘Ҫд»ӨиЎҢе·Ҙе…·пјҢжҸҗдҫӣдәҶеҗ„з§Қе‘Ҫд»ӨпјҢз”ЁдәҺзј–иҜ‘гҖҒж јејҸеҢ–гҖҒжөӢиҜ•е’ҢиҝҗиЎҢ Go д»Јз ҒзӯүеҠҹиғҪгҖӮ\n\nGo жҸҗдҫӣдәҶдёүз§Қж•°жҚ®з»“жһ„жқҘз®ЎзҗҶж•°жҚ®йӣҶеҗҲпјҡж•°з»„гҖҒеҲҮзүҮе’Ңжҳ е°„гҖӮж•°з»„жҳҜдёҖз§Қеӣәе®ҡй•ҝеәҰзҡ„ж•°жҚ®зұ»еһӢпјҢеҢ…еҗ«еҚ•дёҖзұ»еһӢе…ғзҙ зҡ„еәҸеҲ—гҖӮеҲҮзүҮжҳҜдёҖз§ҚеҠЁжҖҒж•°з»„пјҢеҸҜд»ҘйҡҸзқҖж•°жҚ®зҡ„еўһеҠ жҲ–зј©еҮҸиҖҢеўһй•ҝгҖӮGo\
    \ жҸҗдҫӣдәҶдёӨдёӘз”ЁдәҺж“ҚдҪңеҲҮзүҮзҡ„еҶ…зҪ®еҮҪж•°пјҡ`append`е’Ң`copy`гҖӮжҳ е°„жҳҜдёҖз§ҚжҸҗдҫӣж— еәҸй”®еҖјеҜ№йӣҶеҗҲзҡ„ж•°жҚ®з»“жһ„гҖӮ\n\nGo жҸҗдҫӣдәҶ`defer`е…ій”®еӯ—з”ЁдәҺжё…зҗҶиө„жәҗгҖӮ`defer`иҜӯеҸҘе°ҶдёҖдёӘеҮҪж•°и°ғз”ЁжҺЁе…ҘеҲ°дёҖдёӘе»¶иҝҹеҮҪж•°еҲ—иЎЁдёӯпјҢиҜҘеҲ—иЎЁеңЁеҢ…еӣҙеҮҪж•°иҝ”еӣһеҗҺжү§иЎҢгҖӮ`panic`еҮҪж•°е…Ғи®ёжӮЁеҒңжӯўжӯЈеёёзҡ„жҺ§еҲ¶жөҒзЁӢе№¶дҪҝеҮҪж•°еҙ©жәғгҖӮ`recover`еҮҪж•°еҸҜд»ҘйҮҚж–°иҺ·еҫ—еҜ№еҙ©жәғеҮҪж•°зҡ„жҺ§еҲ¶жқғпјҢе®ғд»…еңЁе»¶иҝҹеҮҪж•°еҶ…йғЁжңүз”ЁгҖӮ\n\
    \nGo дёӯзҡ„й”ҷиҜҜеӨ„зҗҶдёҺеӨ§еӨҡж•°е…¶д»–зј–зЁӢиҜӯиЁҖдёҚеҗҢгҖӮз”ұдәҺ Go еҮҪж•°еҸҜд»Ҙиҝ”еӣһеӨҡдёӘеҖјпјҢеӣ жӯӨеҸҜд»Ҙд»ҺеҮҪж•°иҝ”еӣһдёҖдёӘй”ҷиҜҜеҖјгҖӮеӣ жӯӨпјҢд»Һи°ғз”ЁиҖ…еҮҪж•°дёӯпјҢжӮЁеҸҜд»ҘиҪ»жқҫжЈҖжҹҘеҮҪж•°жҳҜеҗҰиҝ”еӣһдәҶй”ҷиҜҜеҖјпјҢе№¶зӣёеә”ең°жҸҗдҫӣд»Јз Ғе®һзҺ°гҖӮ\n"
- fmt: "# 3. User-Defined Types and Concurrency\n\nThe type system is one of the most\
    \ important features of a programming language; types allow you to organize and\
    \ store your application data. When choosing a programming language, it is important\
    \ to take its type system into consideration. `Go` enforces simplicity throughout\
    \ the language design.\n\n`Go` is a static type language in which you can use\
    \ built-in types and user-defined types for storing application data. `Go` provides\
    \ several built-in types, such as `int`, `float64`, `string`, and `bool`. [Chapter\
    \ 2](#A978-1-4842-1052-9_2_Chapter.html) discussed arrays, slices, and maps, which\
    \ are the composite types made up of other types using built-in types and user-defined\
    \ types. For example, the composite type `map[string]float64` represents a collection\
    \ of `float64` values, in which each value of the `float64` type can be added\
    \ to the collection with a key of type `string`, where values can be retrieved\
    \ with the corresponding key value. Apart from built-in types, you can create\
    \ your own types by combining one or more built-in or user-defined types. `Go`\
    \ provides an interface type in its type system that allows you to develop programs\
    \ with a greater level of extensibility.\n\n## User-defined Types with Structs\n\
    \n`Go`вҖҷs type system was designed with simplicity and pragmatism in mind, which\
    \ avoids a lot of complexity when data structures for applications are designed.\
    \ The object-oriented approach of `Go` is completely different from other programming\
    \ languages. If you are coming from programming languages such as `C++`, `Java`,\
    \ and `C#`, you will realize that the object-oriented approach of `Go` is different\
    \ and unique, although you may miss some features of those languages. When you\
    \ look at `Go`вҖҷs type system and its user-defined types, you should look at the\
    \ language with a fresh mind so you can enjoy and appreciate the simplicity and\
    \ power that can be leveraged to solve real-world problems.\n\n`Go` does not provide\
    \ classes in its type system; it has structs, which are analogous to classes.\
    \ A struct can be considered as a lightweight version of a class, but the design\
    \ of the struct is unique because it focuses on real-world practices. Structs\
    \ in `Go` let you create user-defined concrete types; they are a collection of\
    \ fields or properties that can be used for storing complex data. You can use\
    \ structs for storing application domain models.\n\n### Creating a Struct Type\n\
    \nLetвҖҷs create a struct type for representing a personвҖҷs information (see Listing\
    \ [3-1](#A978-1-4842-1052-9_3_Chapter.html#FPar1)).\n\nListing 3-1. Declaring\
    \ a Struct with a Group of Fields\n\n```\ntype Person struct {\n        FirstName,\
    \ LastName string\n        Dob                 time.Time\n        Email, Location\
    \     string\n}\n```\n\nCreate a user-defined type with the keyword `struct`:\n\
    \n```\ntype Person struct\n```\n\nBecause the type identifier starts with an uppercase\
    \ letter, the `Person` type will be exported into other packages. You specify\
    \ the struct fields within the body of the `Person` type. Because the fields `FirstName`\
    \ and `LastName` use the same data type, you can declare both variables in a single\
    \ statement:\n\n```\nFirstName, LastName string\n```\n\n### Creating Instances\
    \ of Struct Types\n\nA struct type named `Person` has been defined. LetвҖҷs create\
    \ an instance of a `Person` type and assign the values to the fields (see Listing\
    \ [3-2](#A978-1-4842-1052-9_3_Chapter.html#FPar2)).\n\nListing 3-2. Creating a\
    \ Struct Instance\n\n```\nvar p Person\np.FirstName=\"Shiju\"\np.LastName=\"Varghese\"\
    \np.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)\np.Email= \"\
    shiju@email.com\"\np.Location=\"Kochi\"\n```\n\nAn instance of a `Person` type\
    \ is created, and field values have been assigned one by one. You can also use\
    \ a struct literal to create a struct type instance (see Listing [3-3](#A978-1-4842-1052-9_3_Chapter.html#FPar3)).\n\
    \nListing 3-3. Creating a Struct Instance Using a Struct Literal\n\n```\np:= Person\
    \ {\n    FirstName : \"Shiju\",\n    LastName : \"Varghese\",\n    Dob : time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC),\n    Email : \"shiju@email.com\",\n\
    \    Location : \"Kochi\",\n}\n```\n\nYou can create a `Person` type instance\
    \ by using a struct literal. When you create struct type instances using struct\
    \ literals, you can split the assignment of struct fields into multiple lines,\
    \ which enhances the readability of your code block. When you create struct instances\
    \ this way, you have to put an extra comma at the end of the last assignment,\
    \ which enables you to easily rearrange the assignment order of the struct fields\
    \ without worrying about removing a comma for the last assignment and adding a\
    \ comma for all other fields. Now you have to insert a comma for every struct\
    \ type field, regardless of whether it is the last field.\n\nYou can create struct\
    \ instances in a more efficient way if you know the order of the struct fields\
    \ (see Listing [3-4](#A978-1-4842-1052-9_3_Chapter.html#FPar4)).\n\nListing 3-4.\
    \ Creating a Struct Instance Using a Struct Literal\n\n```\np:= Person {\n   \
    \ \"Shiju\",\n    \"Varghese\",\n     time.Date(1979, time.February, 17, 0, 0,\
    \ 0, 0, time.UTC),\n    \"shiju@email.com\",\n    \"Kochi\",\n}\n```\n\nThis is\
    \ a very convenient way of creating struct type instances if you know the struct\
    \ type field order. You can also create struct instances with a single-line statement.\n\
    \nListing [3-5](#A978-1-4842-1052-9_3_Chapter.html#FPar5) shows an example of\
    \ creating a struct instance by specifying a few fields using a struct literal\
    \ and assigning remaining fields later.\n\nListing 3-5. Creating a Struct Instance\
    \ by Specifying a Few Fields\n\n```\np:= Person { FirstName :\"Shiju\", LastName\
    \ : \"Varghese\" }\np.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)\n\
    p.Email= \"shiju@email.com\"\np.Location=\"Kochi\"\n```\n\n### Adding Behavior\
    \ to a Struct Type\n\n`Go`вҖҷs type system allows you to add behavior to struct\
    \ types. Like classes of other object-oriented languages, structs in `Go` allow\
    \ you to define fields along with operations. LetвҖҷs add a couple of behaviors\
    \ to the `Person` type (see Listing [3-6](#A978-1-4842-1052-9_3_Chapter.html#FPar6)).\n\
    \nListing 3-6. Struct Type with Behaviors\n\n```\ntype Person struct {\n    FirstName,\
    \ LastName string\n    Dob                 time.Time\n    Email, Location    \
    \ string\n}\n\n//A person method\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\
    \\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//A person method\nfunc (p Person)\
    \ PrintDetails() {\n    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location:\
    \ %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n}\n```\n\nTwo methods have\
    \ been added to the `Person` type: `PrintName` and `PrintDetails`. A method in\
    \ `Go` is a function that is declared with a receiver. Although a method looks\
    \ like a normal function, it has a receiver. You can specify the method receiver\
    \ between the `func` keyword and the name of the function. In Listing [3-6](#A978-1-4842-1052-9_3_Chapter.html#FPar6),\
    \ the `Person` struct was added as the receiver into the functions `PrintName`\
    \ and `PrintDetails`. When this is done, functions are attached to the `Person`\
    \ type to call as methods. This allows you to call the functions using the dot\
    \ (`.`) operator from the struct type instance, just as you call instance methods\
    \ of classes in traditional object-oriented language.\n\nHere, the method with\
    \ the `Person` receiver type is declared:\n\n```\nfunc (p Person) PrintName()\
    \ {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//A person\
    \ method\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"[Date of Birth: %s,\
    \ Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n}\n```"
  raw: '# 3.В User-Defined Types and Concurrency


    The type system is one of the most important features of a programming language;
    types allow you to organize and store your application data. When choosing a programming
    language, it is important to take its type system into consideration. Go enforces
    simplicity throughout the language design.


    Go is a static type language in which you can use built-in types and user-defined
    types for storing application data. Go provides several built-in types, such as
    `int`, `float64`, `string`, and bool. [Chapter 2](#A978-1-4842-1052-9_2_Chapter.html)
    discussed arrays, slices, and maps, which are the composite types made up of other
    types using built-in types and user-defined types. For example, the composite
    type `map[string]float64` represents a collection of `float64` values, in which
    each value of the `float64` type can be added to the collection with a key of
    type `string`, where values can be retrieved with the corresponding key value.
    Apart from built-in types, you can create your own types by combining one or more
    built-in or user-defined types. Go provides an interface type in its type system
    that allows you to develop programs with a greater level of extensibility.


    ## User-defined Types with Structs


    GoвҖҷs type system was designed with simplicity and pragmatism in mind, which avoids
    a lot of complexity when data structures for applications are designed. The object-oriented
    approach of Go is completely different from other programming languages. If you
    are coming from programming languages such as C++, Java, and C#, you will realize
    that the object-oriented approach of Go is different and unique, although you
    may miss some features of those languages. When you look at GoвҖҷs type system and
    its user-defined types, you should look at the language with a fresh mind so you
    can enjoy and appreciate the simplicity and power that can be leveraged to solve
    real-world problems.


    Go does not provide classes in its type system; it has structs, which are analogous
    to classes. A struct can be considered as a lightweight version of a class, but
    the design of the struct is unique because it focuses on real-world practices.
    Structs in Go let you create user-defined concrete types; they are a collection
    of fields or properties that can be used for storing complex data. You can use
    structs for storing application domain models.


    ### Creating a Struct Type


    LetвҖҷs create a struct type for representing a personвҖҷs information (see Listing
    [3-1](#A978-1-4842-1052-9_3_Chapter.html#FPar1)).


    Listing 3-1.В В Declaring a Struct with a Group of Fields


    `type Person struct {`


    В В В В В В В В `FirstName, LastName string`


    В В В В В В В В `DobВ В В В В В В В В В В В В В В В В time.Time`


    В В В В В В В В `Email, LocationВ В В В В string`


    `}`


    Create a user-defined type with the keyword `struct`:


    `type Person struct`


    Because the type identifier starts with an uppercase letter, the `Person` type
    will be exported into other packages. You specify the struct fields within the
    body of the `Person` type. Because the fields `FirstName` and `LastName` use the
    same data type, you can declare both variables in a single statement:


    `FirstName, LastName string`


    ### Creating Instances of Struct Types


    A struct type named `Person` has been defined. LetвҖҷs create an instance of a `Person`
    type and assign the values to the fields (see Listing [3-2](#A978-1-4842-1052-9_3_Chapter.html#FPar2)).


    Listing 3-2.В В Creating a Struct Instance


    `var p Person`


    `p.FirstName="Shiju"`


    `p.LastName="Varghese"`


    `p.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)`


    `p.Email= "shiju@email.com"`


    `p.Location="Kochi"`


    An instance of a `Person` type is created, and field values have been assigned
    one by one. You can also use a struct literal to create a struct type instance
    (see Listing [3-3](#A978-1-4842-1052-9_3_Chapter.html#FPar3)).


    Listing 3-3.В В Creating a Struct Instance Using a Struct Literal


    `p:= Person {`


    В В В В `FirstName : "Shiju",`


    В В В В `LastName : "Varghese",`


    В В В В `Dob : time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),`


    В В В В `Email : "` `shiju@email.com` `",`


    В В В В `Location : "Kochi",`


    `}`


    You can create a `Person` type instance by using a struct literal. When you create
    struct type instances using struct literals, you can split the assignment of struct
    fields into multiple lines, which enhances the readability of your code block.
    When you create struck instances this way, you have to put an extra comma at the
    end of the last assignment, which enables you to easily rearrange the assignment
    order of the struct fields without worrying about removing a comma for the last
    assignment and adding a comma for all other fields. Now you have to insert a comma
    for every struct type field, regardless of whether it is the last field.


    You can create struct instances in a more efficient way if you know the order
    of the struct fields (see Listing [3-4](#A978-1-4842-1052-9_3_Chapter.html#FPar4)).


    Listing 3-4.В В Creating a Struct Instance Using a Struct Literal


    `p:= Person {`


    В В В В `"Shiju",`


    В В В В `"Varghese",`


    В В В В В `time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),`


    В В В В `"` `shiju@email.com` `",`


    В В В В `"Kochi",`


    `}`


    This is a very convenient way of creating struct type instances if you know the
    struct type field order. You can also create struct instances with a single-line
    statement.


    Listing [3-5](#A978-1-4842-1052-9_3_Chapter.html#FPar5) shows an example of creating
    a struct instance by specifying a few fields using a struct literal and assigning
    remaining fields later.


    Listing 3-5.В В Creating a Struct Instance by Specifying a Few Fields


    `p:= Person { FirstName :"Shiju", LastName : "Varghese" }`


    `p.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)`


    `p.Email= "shiju@email.com"`


    `p.Location="Kochi"`


    ### Adding Behavior to a Struct Type


    GoвҖҷs type system allows you to add behavior to struct types. Like classes of other
    object-oriented languages, structs in Go allow you to define fields along with
    operations. LetвҖҷs add a couple of behaviors to the `Person` type (see Listing
    [3-6](#A978-1-4842-1052-9_3_Chapter.html#FPar6)).


    Listing 3-6.В В Struct Type with Behaviors


    `type Person struct {`


    В В В В `FirstName, LastName string`


    В В В В `DobВ В В В В В В В В В В В В В В В В time.Time`


    В В В В `Email, LocationВ В В В В string`


    `}`


    `//A person method`


    `func (p Person) PrintName() {`


    В В В В `fmt.Printf("\n%s %s\n", p.FirstName, p.LastName)`


    `}`


    `//A person method`


    `func (p Person) PrintDetails() {`


    В В В В `fmt.Printf("[Date of Birth: %s, Email: %s, Location: %s ]\n", p.Dob.String(),
    p.Email, p.Location)`


    `}`


    Two methods have been added to the `Person` type: `PrintName` and `PrintDetails`.
    A method in Go is a function that is declared with a receiver. Although a method
    looks like a normal function, it has a receiver. You can specify the method receiver
    between the `func` keyword and the name of the function. In Listing [3-6](#A978-1-4842-1052-9_3_Chapter.html#FPar6),
    the `Person` struct was added as the receiver into the functions `PrintName` and
    `PrintDetails`. When this is done, functions are attached to the `Person` type
    to call as methods. This allows you to call the functions using the dot (`.`)
    operator from the struct type instance, just as you call instance methods of classes
    in traditional object-oriented language.


    Here, the method with the `Person` receiver type is declared:


    `func` `(p Person)` `PrintName() {`


    В В В В `fmt.Printf("\n%s %s\n", p.FirstName, p.LastName)`


    `}`


    `//A person method`


    `func` `(p Person)` `PrintDetails() {`


    В В В В `fmt.Printf("[Date of Birth: %s, Email: %s, Location: %s ]\n", p.Dob.String(),
    p.Email, p.Location)`


    `}`'
  trans: "\n# 3. з”ЁжҲ·е®ҡд№үзұ»еһӢдёҺе№¶еҸ‘\n\nзұ»еһӢзі»з»ҹжҳҜзј–зЁӢиҜӯиЁҖжңҖйҮҚиҰҒзҡ„зү№жҖ§д№ӢдёҖпјӣзұ»еһӢе…Ғи®ёжӮЁз»„з»Үе№¶еӯҳеӮЁеә”з”ЁзЁӢеәҸж•°жҚ®гҖӮеңЁйҖүжӢ©зј–зЁӢиҜӯиЁҖж—¶пјҢеҝ…йЎ»иҖғиҷ‘е…¶зұ»еһӢзі»з»ҹгҖӮ`Go`\
