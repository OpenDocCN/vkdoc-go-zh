    \n**еӣҫ 10-6.** дҪҝз”Ё `ginkgo` е‘Ҫд»ӨиҝҗиЎҢи§„ж јиҜҙжҳҺзҡ„иҫ“еҮә\n\n## жҖ»з»“\n\nиҮӘеҠЁеҢ–жөӢиҜ•жҳҜиҪҜд»¶е·ҘзЁӢдёӯзЎ®дҝқеә”з”ЁзЁӢеәҸиҙЁйҮҸзҡ„дёҖйЎ№йҮҚиҰҒе®һи·өгҖӮеҚ•е…ғжөӢиҜ•жҳҜдёҖз§ҚиҮӘеҠЁеҢ–жөӢиҜ•иҝҮзЁӢпјҢе…¶дёӯеә”з”ЁзЁӢеәҸдёӯжңҖе°ҸеҸҜжөӢиҜ•зҡ„иҪҜд»¶еҚ•е…ғпјҲз§°дёәеҚ•е…ғпјүдјҡиў«еҚ•зӢ¬дё”зӢ¬з«Ӣең°иҝӣиЎҢжөӢиҜ•пјҢд»ҘзЎ®е®ҡе®ғд»¬зҡ„иЎҢдёәжҳҜеҗҰе®Ңе…Ёз¬ҰеҗҲи®ҫи®Ўйў„жңҹгҖӮ\n\
    \nжөӢиҜ•й©ұеҠЁејҖеҸ‘пјҲTDDпјүжҳҜдёҖз§ҚйҒөеҫӘжөӢиҜ•дјҳе…ҲејҖеҸ‘ж–№жі•зҡ„иҪҜд»¶ејҖеҸ‘иҝҮзЁӢпјҢеҚіеңЁзј–еҶҷз”ҹдә§д»Јз Ғд№ӢеүҚе…Ҳзј–еҶҷеҚ•е…ғжөӢиҜ•гҖӮTDD жҳҜдёҖз§Қи®ҫи®Ўж–№жі•пјҢе®ғйј“еҠұејҖеҸ‘дәәе‘ҳеңЁзј–еҶҷд»Јз Ғд№ӢеүҚе…ҲжҖқиҖғе…¶е®һзҺ°ж–№жЎҲгҖӮ\n\
    \nGo йҖҡиҝҮе…¶ `testing` ж ҮеҮҶеә“еҢ…жҸҗдҫӣдәҶзј–еҶҷиҮӘеҠЁеҢ–еҚ•е…ғжөӢиҜ•зҡ„ж ёеҝғеҠҹиғҪгҖӮ`testing` еҢ…жҸҗдҫӣдәҶзј–еҶҷиҮӘеҠЁеҢ–жөӢиҜ•жүҖйңҖзҡ„жүҖжңүеҹәжң¬еҠҹиғҪпјҢе№¶йҷ„еёҰе·Ҙе…·ж”ҜжҢҒгҖӮе®ғж—ЁеңЁдёҺ\
    \ `go test` е‘Ҫд»ӨдёҖиө·дҪҝз”ЁгҖӮйҷӨдәҶ `testing` еҢ…пјҢGo ж ҮеҮҶеә“иҝҳжҸҗдҫӣдәҶеҸҰеӨ–дёӨдёӘеҢ…пјҡ`httptest` жҸҗдҫӣдәҶз”ЁдәҺ HTTP жөӢиҜ•зҡ„е®һз”ЁзЁӢеәҸпјҢ`quick`\
    \ жҸҗдҫӣдәҶжңүеҠ©дәҺиҝӣиЎҢй»‘зӣ’жөӢиҜ•зҡ„е®һз”ЁеҮҪж•°гҖӮ\n\nзј–еҶҷжөӢиҜ•еҘ—д»¶ж—¶дҪҝз”Ёд»ҘдёӢе‘ҪеҗҚзәҰе®ҡе’ҢжЁЎејҸпјҡ\n- еҲӣе»әдёҖдёӘеҗҚз§°д»Ҙ `_test.go` з»“е°ҫзҡ„жәҗж–Үд»¶гҖӮ\n- еңЁжөӢиҜ•еҘ—д»¶пјҲжәҗж–Үд»¶д»Ҙ\
    \ `_test.go` з»“е°ҫпјүдёӯпјҢзј–еҶҷзӯҫеҗҚдёә `func TestXxx(*testing.T)` зҡ„еҮҪж•°гҖӮ\n\nеҪ“дҪҝз”Ё `go test` е‘Ҫд»ӨиҝҗиЎҢжөӢиҜ•ж—¶пјҢжөӢиҜ•еҮҪж•°дјҡйЎәеәҸжү§иЎҢгҖӮйҷӨдәҶж”ҜжҢҒд»Јз ҒжөӢиҜ•иЎҢдёәеӨ–пјҢ`testing`\
    \ еҢ…иҝҳеҸҜз”ЁдәҺеҹәеҮҶжөӢиҜ•е’ҢжөӢиҜ•зӨәдҫӢд»Јз ҒгҖӮ\n\nдҪ еҸҜд»ҘдҪҝз”Ё `httptest` еҢ…жөӢиҜ• HTTP еә”з”ЁзЁӢеәҸгҖӮеңЁжөӢиҜ• HTTP еә”з”ЁзЁӢеәҸж—¶пјҢеҸҜд»ҘдҪҝз”Ё `httptest`\
    \ еҢ…жҸҗдҫӣзҡ„ `ResponseRecorder` е’Ң `Server` з»“жһ„дҪ“зұ»еһӢгҖӮ`ResponseRecorder` и®°еҪ•иҝ”еӣһзҡ„ HTTP е“Қеә”пјҢд»ҘдҫҝиҝӣиЎҢжЈҖжҹҘгҖӮ`Server`\
    \ жҳҜдёҖдёӘз”ЁдәҺжөӢиҜ•зҡ„ HTTP жңҚеҠЎеҷЁпјҢеҸҜд»Ҙжү§иЎҢз«ҜеҲ°з«Ҝзҡ„ HTTP жөӢиҜ•гҖӮ\n\nжң¬з« еҗ‘дҪ еұ•зӨәдәҶз”ЁдәҺжөӢиҜ•зҡ„з¬¬дёүж–№еҢ… `Ginkgo` е’Ң `Gomega`гҖӮ`Ginkgo`\
    \ жҳҜдёҖдёӘиЎҢдёәй©ұеҠЁејҖеҸ‘пјҲBDDпјүйЈҺж јзҡ„жөӢиҜ•жЎҶжһ¶пјҢе®ғе…Ғи®ёдҪ еңЁ Go дёӯзј–еҶҷеҜҢжңүиЎЁзҺ°еҠӣзҡ„жөӢиҜ•жқҘжҢҮе®ҡеә”з”ЁзЁӢеәҸзҡ„иЎҢдёәгҖӮBDD жҳҜ TDD зҡ„жү©еұ•пјҢе®ғејәи°ғиЎҢдёәиҖҢйқһжөӢиҜ•жң¬иә«гҖӮеңЁ\
    \ BDD дёӯпјҢдҪ еңЁиҮӘеҠЁеҢ–жөӢиҜ•дёӯд»ҘеҜҢжңүиЎЁзҺ°еҠӣзҡ„ж–№ејҸжҢҮе®ҡиЎҢдёәпјҢз„¶еҗҺж №жҚ®иҝҷдәӣиЎҢдёәзј–еҶҷд»Јз ҒгҖӮ\n\n# 11. еңЁи°·жӯҢдә‘дёҠжһ„е»ә Go Web еә”з”ЁзЁӢеәҸ\n\nдә‘и®Ўз®—жӯЈеңЁж”№еҸҳеҸҜжү©еұ•еә”з”ЁзЁӢеәҸзҡ„ејҖеҸ‘е’ҢиҝҗиЎҢж–№ејҸгҖӮдә‘и®Ўз®—е…Ғи®ёдҪ е®Ңе…Ёдё“жіЁдәҺеә”з”ЁзЁӢеәҸе·ҘзЁӢпјҢиҖҢж— йңҖз®ЎзҗҶ\
    \ IT еҹәзЎҖи®ҫж–ҪгҖӮеңЁдә‘еҹәзЎҖи®ҫж–ҪдёҠејҖеҸ‘ Go еә”з”ЁзЁӢеәҸжҳҜдёҖдёӘз»қдҪізҡ„йҖүжӢ©пјҢеӣ дёә Go жҳҜдёәеңЁзҺ°д»Ји®Ўз®—жңәзЎ¬д»¶е’ҢдёӢдёҖд»Ј IT еҹәзЎҖи®ҫж–Ҫе№іеҸ°дёҠиҝҗиЎҢиҖҢи®ҫи®Ўзҡ„иҜӯиЁҖгҖӮGo\
    \ ж—ЁеңЁи§ЈеҶіеӨ§и§„жЁЎи®Ўз®—й—®йўҳпјҢе№¶дё”жӯЈжҲҗдёәжһ„е»әдә‘еҹәзЎҖи®ҫж–ҪжҠҖжңҜпјҲеҰӮ Docker е’Ң Kubernetesпјүзҡ„йҰ–йҖүиҜӯиЁҖгҖӮжң¬з« е°Ҷеҗ‘дҪ еұ•зӨәеҰӮдҪ•йҖҡиҝҮеҲ©з”Ёи°·жӯҢдә‘е№іеҸ°пјҢдҪҝз”Ё\
