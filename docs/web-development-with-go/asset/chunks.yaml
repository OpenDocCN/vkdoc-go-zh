    `fmt.Printf("Count: %d received from %s \n", val, label)`


    `if val == 10 {`


    `fmt.Printf("Channel Closed from %s \n", label)`


    `// Close the channel`


    `close(count)`


    `return`


    `}`


    `val++`


    `// Send count back to the other goroutine.`


    `count <-` `val`


    `}`


    `}`


