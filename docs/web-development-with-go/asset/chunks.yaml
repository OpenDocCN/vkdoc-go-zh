    \ `Note` еҜ№иұЎиў«з§»йҷӨе№¶йҮҚж–°ж·»еҠ еҲ° `noteStore` жҳ е°„дёӯгҖӮе…¶дҪҷжүҖжңүе®һзҺ°ж–№ејҸдёҺ `HTTP Post` ж“ҚдҪңзӣёеҗҢпјҡ\n\n```go\n//HTTP\
    \ Put - /api/notes/{id}\n\nfunc PutNoteHandler(w http.ResponseWriter, r *http.Request)\
    \ {\n\n    var err error\n\n    vars := mux.Vars(r)\n\n    k := vars[\"id\"]\n\
    \n    var noteToUpd Note\n\n    // Decode the incoming Note json\n\n    err =\
