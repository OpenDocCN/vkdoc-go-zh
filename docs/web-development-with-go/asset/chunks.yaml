    \  \n\n## Summary  \n\nGo is a programming language designed to work with modern\
    \ hardware and IT infrastructures to build massively scalable applications. Go\
    \ is a perfect language choice for building scalable applications in the Cloud\
    \ computing era. With the Google Cloud platform, Go developers can easily build\
    \ massively scalable applications on the Cloud by leveraging the tools and APIs\
    \ provided by the Google Cloud platform.  \n\nGoogle Cloud provides App Engine,\
    \ a Platform as a Service (PaaS) offering that lets Go developers build highly\
    \ scalable and reliable web applications using the App Engine SDK for Go and Go\
    \ APIs to various Cloud services. When you build App Engine applications, you\
    \ don't need to spend time managing the IT infrastructure. Instead, you can fully\
    \ focus on building your application, which is available for automatic scaling\
    \ whenever there is a need to increase computing resources. With App Engine, developers\
    \ are freed from system administration, load balancing, scaling, and server maintenance.\
    \  \n\nApp Engine SDK for Go provides the `goapp` tool that allows you to test\
    \ the App Engine application in a development web server. The `goapp` tool can\
    \ also be used for deploying App Engine web applications into the Google Cloud\
    \ production environment that runs on the App Engine sandbox environment.  \n\n\
    The App Engine environment provides a `main` package, so you can't use a package\
    \ called `main`. Instead, you can write HTTP handler logic in the package of your\
    \ choice. App Engine applications easily access many Cloud services provided by\
    \ the Google Cloud platform. When you leverage many of these Cloud services from\
    \ your App Engine application, you don't need to configure these services to be\
    \ used with App Engine because you can directly access them from your application\
    \ by using the corresponding Go API."
