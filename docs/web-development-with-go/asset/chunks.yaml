  raw: 'In TDD, you first write a unit test that defines a newly identified requirement
    or a desired improvement before writing the production code, which gives you an
    understanding about what you will develop. You write a unit test against a newly
    identified functional requirement, and the development process starts with the
    newly added unit test. A developer must clearly understand the functional requirement
    in order to write a new unit test. In a pure TDD approach, you run all unit tests
    along with the newly added test before writing the implementation and see the
    newly added test fail. After writing a unit test, you write just enough code to
    pass the test. Once your test is successful, you can fearlessly refactor the application
    code because it is covered by the unit tests.


    The TDD approach is highly recommended by those who are using agile development
    methodologies for their software delivery. Agile methodologies emphasize developing
    software based on an evolutionary approach rather than following an upfront design.
    When you develop software based on an evolutionary design approach, TDD gives
    you lots of values as you continuously refactor application code for a newly identified
    requirement or desired improvement. Because your application code is covered by
    unit tests, you can run the suite of unit tests at any time to ensure that your
    application is working as you designed. Unit tests define the design of your application.


    Here are the steps involved in TDD:


    Add a unit test to define a new functional requirement. В  Run all tests and see
    whether the new unit test gets a fail. В  Write some code to pass the tests. В 
    Run the tests. В  Refactor the code.


    These steps will continue for the entire evolution of the software development
    process.


    This chapter doesnвҖҷt use the test-first approach or TDD as the design approach
    for the examples. It focuses more on writing automated unit tests. TDD is an advanced
    technique of using automated unit tests, so you can easily practice TDD if you
    know how to write automated unit tests.


    ## Unit Testing with Go


    Go provides the core functionality to write automated unit tests through its `testing`
    standard library package. The `testing` package provides all the essential functionality
    to write automated unit tests, which is intended to be used with the `go test`
    command. So you can write unit tests with the `testing` package, and these unit
    tests can then be run with the `go test` command. Like the `net/http` package
    that performs the fundamental block to web programming available for extensibility,
    the `testing` package does the same for unit testing.


    The `testing` package lacks some advanced features required for writing unit tests,
    but there are many third-party packages built on top of the package that provide
    additional functionalities that are required for writing automated unit tests
    for several advanced scenarios. Besides the `testing` package, the Go standard
    library provides two more packages: `httptest` (`net/http/httptest`) provides
    utilities for HTTP testing, and `quick` (`testing/quick`) provides utility functions
    to help with black box testing.


    The `testing` package is intended to be used with the `go test` command. To perform
    it, some naming conventions and patterns are used for writing the test functions
    to be used with this command.


    The `go test` command looks for the following conventions for identifying test
    functions:


    `func TestXxx(*testing.T)`


    Here, `Xxx` can be any alphanumeric string that starts with an uppercase letter.


    The following conventions are used to write a new test suite:


    *   Create a source file with a name ending in `_test.go`.

    *   Within the test suite (the source file ends with `_test.go`), write functions
    with signature `func TestXxx(*testing.T)`.


    You can put the test suite files in the same package that is being tested. These
    test files are excluded when you build the packages, but are included when you
    run the `go test` command, which recompiles each package along with any files
    with names matching the file pattern `"*_test.go"`.


    To get help with `go test`, run the following command:


    `go help test`


    To get help with the various flags used by the `go test` command, run the following
    command:


    `go help testflag`


    ### Writing Unit Tests


    LetвҖҷs write some unit tests using the `testing` package (this chapter doesnвҖҷt
    focus on the test-first development process). First, letвҖҷs write a couple of string
    utility functions to demonstrate unit tests.


    Listing [10-1](#A978-1-4842-1052-9_10_Chapter.html#FPar1) provides several string
    utility functions to change the case of a string parameter and reverse a string
    parameter.


    Listing 10-1.В В String Utility Functions in utils.go


    `package stringutils`


    `import (`


    `"bytes"`


    `"unicode"`


    `)`


    `// Swap the case of a string parameter`


    `func SwapCase(str string) string {`


    `buf := &bytes.Buffer{}`


    `for _, r := range str {`


    `if unicode.IsUpper(r) {`


    `buf.WriteRune(unicode.ToLower(r))`


    `} else {`


    `buf.WriteRune(unicode.ToUpper(r))`


    `}`


    `}`


    `return buf.String()`


    `}`


    `// Reverse the string parameter`


    `func Reverse(s string) string {`


    `r := []rune(s)`


    `for i, j := 0, len(r)-1; i < len(r)/2; i, j = i+1, j-1 {`


    `r[i], r[j] = r[j], r[i]`


    `}`


    `return string(r)`


    `}`


    There are two functions to be tested: `SwapCase` and `Reverse`. The `SwapCase`
    function swaps the case of a string parameter; the `Reverse` function reverses
    the string parameter.


    LetвҖҷs write the test cases for testing the `SwapCase` and `Reverse` functions.


    Listing [10-2](#A978-1-4842-1052-9_10_Chapter.html#FPar2) provides the tests in
    the source file `utils_test.go`.


    Listing 10-2.В В Unit Tests for the stringutils package in utils_test.go


    `package stringutils`


    `import (`


    `"testing"`


    `)`


    `// Test case for the SwapCase function`


    `func TestSwapCase(t *testing.T) {`


    `input, expected := "Hello, World", "hELLO, wORLD"`


    `result := SwapCase(input)`


    `if result != expected {`


    `t.Errorf("SwapCase(%q) == %q, expected %q", input, result, expected)`


    `}`


    `}`


    `// Test case for the Reverse function`


    `func TestReverse(t *testing.T) {`


    `input, expected := "Hello, World", "dlroW ,olleH"`


    `result := Reverse(input)`


    `if result != expected {`


    `t.Errorf("Reverse(%q) == %q, expected %q", input, result, expected)`


    `}`


    `}`


    The test suite file `utils_test.` `go` is created in the `stringutils` package
    directory. Within the `utils_test.go file`, two test functions with the pattern
    `func TestXxx(*testing.T) are written`. The `TestSwapCase` function is written
    to verify the behavior of the `SwapCase` function, and `TestReverse` is written
    to verify the `Reverse` function.


    If the test results donвҖҷt match with the expected results, `Error`, `Fail`, or
    related functions can be called to signal failure of the test cases. The `Error`
    and `Fail` functions signal the failure of a test case, but it will continue the
    execution for the rest of the test cases. If you want to stop the execution when
    any test case fails, you can call the `FailNow` or `Fatal` functions. The `FailNow`
    function calls the `Fail` function and stops the execution. `Fatal` is equivalent
    to `Log` followed by `FailNow`. In these test cases, the `Errorf` function is
    called to signal their failure:


    `if result != expected {`


    `t.Errorf("SwapCase(%q) == %q, expected %q", input, result, expected)`


    `}`


    LetвҖҷs run the test cases. Navigate to the `package` directory and then run the
    following command on the command-line window:


    `go test`


    The `go test` command will execute all `_test.go` files in the `package` directory,
    and you should see output something like this:


    `PASS`


