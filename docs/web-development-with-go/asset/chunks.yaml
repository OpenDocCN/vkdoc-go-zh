    ### Registering New Users


    To register a new user, the client application should send an HTTP `Post` to the
    URI `"/users/register"`. In the `Register` handler function, the incoming JSON
    string is decoded into the type `UserResource` and creates an instance of the
    `models.User` struct by accessing the `Data` property of the `UserResource` object.


    The `Context` type is used to access the MongoDB `Session` object (`mgo.Session`)
    in application handlers. So an instance of `Context` type and the MongoDB `Collection`
    object (`mgo.Collection`) are created by calling the `DbCollection` method:


    `context := NewContext()`


    `defer context.Close()`


    `c := context.DbCollection("users")`


    The `Close` method of the `Context` type is added into the `defer` function to
    close the MongoDB `Session` object, which is a copied version of the `Session`
    object. In all HTTP handler functions, a copied version of the MongoDB `Session`
    object is created and will use the same instance in a single HTTP request lifecycle
    and release the resources using the `defer` function.


    In the `Register` handler function, an instance of `UserRepository` is created
    by providing the MongoDB `Collection` object. The `CreateUser` method of the `UserRepository`
    struct is created to persist the `User` object into the MongoDB database. All
    data persistence logic is written in the `data` package:


    `repo := &data.UserRepository{c}`


    `// Insert User document`


    `repo.CreateUser(user)`


    `UserRepository` provides all CRUD operations against the `User` entity. (This
    topic is discussed in the next section of the chapter.) The `Register` handler
    function sends back a response as a JSON representation of the newly created `User`
    entity.


    LetвҖҷs test the functionality of the `Users` resource by using a RESTful API client
    tool `"Postman"` ( [`www.getpostman.com/`](http://www.getpostman.com/) ), which
    allows you to test your APIs (also very useful for testing RESTful APIs).


    Figure [9-8](#A978-1-4842-1052-9_9_Chapter.html#Fig8) shows the HTTP `Post` request
    sent to the URI endpoint `"users/register"` using the RESTful API client tool
    `"Postman"`.


