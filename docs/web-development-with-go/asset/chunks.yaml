    \ еҲӣе»әдёҖдёӘз”ЁжҲ·е®ҡд№үзұ»еһӢпјҡ\n\n```\ntype Person struct\n```\n\nеӣ дёәзұ»еһӢж ҮиҜҶз¬Ұд»ҘеӨ§еҶҷеӯ—жҜҚејҖеӨҙпјҢжүҖд»Ҙ `Person` зұ»еһӢе°Ҷиў«еҜјеҮәеҲ°е…¶д»–еҢ…дёӯгҖӮжӮЁеңЁ\
    \ `Person` зұ»еһӢзҡ„дё»дҪ“дёӯжҢҮе®ҡз»“жһ„дҪ“еӯ—ж®өгҖӮз”ұдәҺ `FirstName` е’Ң `LastName` еӯ—ж®өдҪҝз”ЁзӣёеҗҢзҡ„ж•°жҚ®зұ»еһӢпјҢжӮЁеҸҜд»ҘеңЁдёҖжқЎиҜӯеҸҘдёӯеЈ°жҳҺиҝҷдёӨдёӘеҸҳйҮҸпјҡ\n\
    \n```\nFirstName, LastName string\n```\n\n### еҲӣе»әз»“жһ„дҪ“зұ»еһӢзҡ„е®һдҫӢ\n\nжҲ‘д»¬е·Із»Ҹе®ҡд№үдәҶдёҖдёӘеҗҚдёә `Person`\
    \ зҡ„з»“жһ„дҪ“зұ»еһӢгҖӮи®©жҲ‘д»¬еҲӣе»әдёҖдёӘ `Person` зұ»еһӢзҡ„е®һдҫӢпјҢе№¶дёәеӯ—ж®өиөӢеҖјпјҲеҸӮи§Ғжё…еҚ• 3-2пјүгҖӮ\n\n**жё…еҚ• 3-2. еҲӣе»әз»“жһ„дҪ“е®һдҫӢ**\n\n```\n\
    var p Person\np.FirstName=\"Shiju\"\np.LastName=\"Varghese\"\np.Dob= time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC)\np.Email= \"shiju@email.com\"\np.Location=\"\
    Kochi\"\n```\n\nеҲӣе»әдәҶдёҖдёӘ `Person` зұ»еһӢзҡ„е®һдҫӢпјҢе№¶йҖҗдёӘдёәеӯ—ж®өиөӢеҖјгҖӮжӮЁд№ҹеҸҜд»ҘдҪҝз”Ёз»“жһ„дҪ“еӯ—йқўйҮҸжқҘеҲӣе»әз»“жһ„дҪ“зұ»еһӢе®һдҫӢпјҲеҸӮи§Ғжё…еҚ• 3-3пјүгҖӮ\n\
    \n**жё…еҚ• 3-3. дҪҝз”Ёз»“жһ„дҪ“еӯ—йқўйҮҸеҲӣе»әз»“жһ„дҪ“е®һдҫӢ**\n\n```\np:= Person {\n    FirstName : \"Shiju\"\
    ,\n    LastName : \"Varghese\",\n    Dob : time.Date(1979, time.February, 17,\
    \ 0, 0, 0, 0, time.UTC),\n    Email : \"shiju@email.com\",\n    Location : \"\
