    `Start Goroutines`


    `Channel begin`


    `Count: 1 received from A`


    `Count: 2 received from B`


    `Waiting To Finish`


    `Count: 3 received from A`


    `Count: 4 received from B`


    `Count: 5 received from A`


    `Count: 6 received from B`


    `Count: 7 received from A`


    `Count: 8 received from B`


    `Count: 9 received from A`


    `Count: 10 received from B`


    `Channel Closed from B`


    `Channel was closed`


    `Terminating Program`


    In this program, two goroutines synchronize and communicate using an unbuffered
    channel. A channel of integer values for exchanging data among goroutines is used.
    In the `main` function, the unbuffered channel `count` is declared for exchanging
    messages between two goroutines. A count of two is added into `WaitGroup` for
    the two goroutines. Then two goroutines are launched with passing the channel:


    `count := make(chan int)`


    `// Add a count of two, one for each goroutine.`


    `wg.Add(2)`


    `//launch a goroutine with label "A"`


    `go printCounts("A", count)`


    `//launch a goroutine with label "B"`


    `go printCounts("B", count)`


    Inside the `printCounts` function, an endless `for` loop is used and returns from
    the function when the value 10 is received from the channel. After launching two
    goroutines, the channel is started by sending a value of 1, which it will receive
    from the goroutine. The unbuffered channel blocks the receiver until the message
    is available into the channel.


    The following code block in the `printCounts` function blocks until the value
    is sent into the channel:


    `//Receive messages from Channel`


    `val, ok := <-count`


    When values are received from channels, two variables on the left side of the
    assignment can be used: the data from the channel and a Boolean value to indicate
    whether the channel is available. We return from the function if the channel is
    closed.


    `if !ok {`


    `fmt.Println("Channel was closed")`


    `return`


    `}`


    The channel is closed when the value 10 is received from the channel. If the received
    value of the channel is less than 10, the value is incremented, and a new value
    is sent into the channel. This process blocks the sender until a receiver receives
    the value from the channel.


    `if val == 10 {`


    `fmt.Printf("Channel Closed from %s \n", label)`


    `// Close the channel`


    `close(count)`


    `return`


    `}`


    `val++`


    `// Send count back to the other goroutine.`


    `count <- val`


    The most important thing about the unbuffered channel is that a receive on the
    channel blocks the goroutine until the channel gets the data, and a send on the
    channel blocks the goroutine until a receiver receives the data, thus ensuring
    message delivery among goroutines. If you look at the program output you will
    clearly understand the functionality of channels.'
  trans: "\n### йҖҡйҒ“\n\nжё…еҚ• `3-18` еҲӣе»әдәҶдёӨдёӘзӢ¬з«ӢиҝҗиЎҢгҖҒж— йңҖзӣёдә’йҖҡдҝЎзҡ„ goroutineгҖӮз„¶иҖҢпјҢжңүж—¶ goroutine д№Ӣй—ҙйңҖиҰҒйҖҡдҝЎжқҘеҸ‘йҖҒе’ҢжҺҘж”¶ж•°жҚ®пјҢеӣ жӯӨйңҖиҰҒеңЁ\
    \ goroutine д№Ӣй—ҙиҝӣиЎҢеҗҢжӯҘгҖӮеңЁи®ёеӨҡзј–зЁӢзҺҜеўғдёӯпјҢе№¶еҸ‘зЁӢеәҸд№Ӣй—ҙзҡ„йҖҡдҝЎиҰҒд№ҲеҫҲеӨҚжқӮпјҢиҰҒд№ҲеҠҹиғҪжңүйҷҗгҖӮGo е…Ғи®ёдҪ йҖҡиҝҮйҖҡйҒ“еңЁ goroutine д№Ӣй—ҙиҝӣиЎҢйҖҡдҝЎпјҢд»ҺиҖҢиғҪеӨҹеҗҢжӯҘ\
    \ goroutine зҡ„жү§иЎҢгҖӮ\n\nдҪҝз”ЁеҶ…зҪ®зҡ„ `make` еҮҪж•°е№¶еҖҹеҠ©е…ій”®еӯ— `chan` жқҘеЈ°жҳҺйҖҡйҒ“пјҢе…¶еҗҺи·ҹйҡҸзұ»еһӢпјҢз”ЁдәҺжҢҮе®ҡдҪ иҰҒдәӨжҚўзҡ„ж•°жҚ®зұ»еһӢпјҡ\n\
    \n`count := make(chan int)`\n\nиҝҷйҮҢеЈ°жҳҺдәҶдёҖдёӘж•ҙж•° `зұ»еһӢ` зҡ„йҖҡйҒ“пјҢеӣ жӯӨж•ҙж•°еҖје°Ҷиў«дј е…ҘйҖҡйҒ“гҖӮжңүдёӨз§Қзұ»еһӢзҡ„йҖҡйҒ“еҸҜз”ЁдәҺ goroutine\
    \ зҡ„еҗҢжӯҘпјҡ\n\n- жңүзј“еҶІйҖҡйҒ“\n- ж— зј“еҶІйҖҡйҒ“\n\nжё…еҚ• `3-20` жҳҜеЈ°жҳҺж— зј“еҶІйҖҡйҒ“е’Ңжңүзј“еҶІйҖҡйҒ“зҡ„д»Јз Ғеқ—гҖӮ\n\n**жё…еҚ• 3-20.** еЈ°жҳҺж— зј“еҶІйҖҡйҒ“е’Ңжңүзј“еҶІйҖҡйҒ“\n\
    \n```\n// ж— зј“еҶІж•ҙж•°йҖҡйҒ“гҖӮ\ncount := make(chan int)\n\n// жңүзј“еҶІж•ҙж•°йҖҡйҒ“пјҢжңҖеӨҡзј“еҶІ 10 дёӘеҖјгҖӮ\ncount :=\
    \ make(chan int, 10)\n```\n\nеҪ“еЈ°жҳҺжңүзј“еҶІйҖҡйҒ“ж—¶пјҢеҝ…йЎ»жҢҮе®ҡйҖҡйҒ“е®№зәіж•°жҚ®зҡ„е®№йҮҸгҖӮеҰӮжһңдҪ е°қиҜ•еҸ‘йҖҒи¶…иҝҮе…¶е®№йҮҸзҡ„ж•°жҚ®пјҢе°Ҷдјҡж”¶еҲ°й”ҷиҜҜжҸҗзӨәгҖӮ\n\
    \n### ж— зј“еҶІйҖҡйҒ“\n\nж— зј“еҶІйҖҡйҒ“жҸҗдҫӣ goroutine д№Ӣй—ҙзҡ„еҗҢжӯҘйҖҡдҝЎпјҢд»ҺиҖҢзЎ®дҝқж¶ҲжҒҜеңЁе®ғд»¬д№Ӣй—ҙдј йҖ’гҖӮеҜ№дәҺж— зј“еҶІйҖҡйҒ“пјҢеҸӘжңүеҪ“еӯҳеңЁзӣёеә”зҡ„жҺҘж”¶иҖ…еҮҶеӨҮеҘҪжҺҘж”¶ж¶ҲжҒҜж—¶пјҢжүҚе…Ғи®ёеҸ‘йҖҒж¶ҲжҒҜгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢйҖҡйҒ“зҡ„еҸҢж–№йғҪеҝ…йЎ»зӯүеҫ…пјҢзӣҙеҲ°еҸҰдёҖж–№еҮҶеӨҮеҘҪеҸ‘йҖҒе’ҢжҺҘж”¶ж¶ҲжҒҜгҖӮиҖҢеҜ№дәҺжңүзј“еҶІйҖҡйҒ“пјҢеҚідҪҝжІЎжңүеҜ№еә”зҡ„е№¶еҸ‘жҺҘж”¶иҖ…жқҘжҺҘж”¶ж¶ҲжҒҜпјҢд№ҹеҸҜд»Ҙеҗ‘йҖҡйҒ“дёӯеҸ‘йҖҒжңүйҷҗж•°йҮҸзҡ„ж¶ҲжҒҜгҖӮж¶ҲжҒҜиў«еҸ‘йҖҒеҲ°жңүзј“еҶІйҖҡйҒ“еҗҺпјҢеҶҚд»ҺйҖҡйҒ“дёӯжҺҘж”¶иҝҷдәӣж¶ҲжҒҜгҖӮдёҺж— зј“еҶІйҖҡйҒ“дёҚеҗҢпјҢжңүзј“еҶІйҖҡйҒ“ж— жі•дҝқиҜҒж¶ҲжҒҜзҡ„дј йҖ’гҖӮ\n\
    \n`<-` иҝҗз®—з¬Ұз”ЁдәҺеҗ‘йҖҡйҒ“еҸ‘йҖҒеҖјпјҲи§Ғжё…еҚ• `3-21`пјүгҖӮ\n\n**жё…еҚ• 3-21.** еҗ‘йҖҡйҒ“еҸ‘йҖҒеҖј\n\n```\n// жңүзј“еҶІеӯ—з¬ҰдёІйҖҡйҒ“гҖӮ\n\
    messages := make(chan string, 2)\n\n// еҗ‘йҖҡйҒ“еҸ‘йҖҒдёҖжқЎж¶ҲжҒҜгҖӮ\nmessages <- \"Golang\"\n```\n\
    \nиҰҒд»ҺйҖҡйҒ“жҺҘж”¶ж¶ҲжҒҜпјҢ`<-` иҝҗз®—з¬Ұиў«з”ЁдҪңдёҖе…ғиҝҗз®—з¬ҰпјҲи§Ғжё…еҚ• `3-22`пјүгҖӮ\n\n**жё…еҚ• 3-22.** д»ҺйҖҡйҒ“жҺҘж”¶еҖј\n\n```\n// д»ҺйҖҡйҒ“жҺҘж”¶дёҖдёӘеӯ—з¬ҰдёІеҖјгҖӮ\n\
    value := <-messages\n```\n\nжё…еҚ• `3-23` жҳҜдёҖдёӘзӨәдҫӢзЁӢеәҸпјҢжј”зӨәдәҶеҰӮдҪ•дҪҝз”Ёж— зј“еҶІйҖҡйҒ“еңЁ goroutine д№Ӣй—ҙйҖҡдҝЎе’ҢеҗҢжӯҘж•°жҚ®гҖӮ\n\
    \n**жё…еҚ• 3-23.** дҪҝз”Ёж— зј“еҶІйҖҡйҒ“зҡ„зӨәдҫӢзЁӢеәҸ\n\n```\npackage main\n\nimport (\n\t\"fmt\"\n\t\"\
    sync\"\n)\n\n// wg з”ЁдәҺзӯүеҫ…зЁӢеәҸз»“жқҹгҖӮ\nvar wg sync.WaitGroup\n\nfunc main() {\n\tcount\
    \ := make(chan int)\n\t// ж·»еҠ и®Ўж•° 2пјҢжҜҸдёӘ goroutine еҜ№еә”дёҖдёӘгҖӮ\n\twg.Add(2)\n\tfmt.Println(\"\
    еҗҜеҠЁ Goroutines\")\n\t//еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"A\" зҡ„ goroutine\n\tgo printCounts(\"A\", count)\n\
    \t//еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"B\" зҡ„ goroutine\n\tgo printCounts(\"B\", count)\n\tfmt.Println(\"\
    йҖҡйҒ“ејҖе§Ӣ\")\n\tcount <- 1\n\t// зӯүеҫ… goroutines е®ҢжҲҗгҖӮ\n\tfmt.Println(\"зӯүеҫ…е®ҢжҲҗ\")\n\twg.Wait()\n\
    \tfmt.Println(\"\\n з»ҲжӯўзЁӢеәҸ\")\n}\n\nfunc printCounts(label string, count chan int)\
    \ {\n\t// е®үжҺ’и°ғз”Ё WaitGroup зҡ„ Done жқҘе‘ҠзҹҘжҲ‘д»¬е·Іе®ҢжҲҗгҖӮ\n\tdefer wg.Done()\n\tfor {\n\t\t//д»ҺйҖҡйҒ“жҺҘж”¶ж¶ҲжҒҜ\n\
    \t\tval, ok := <-count\n\t\tif !ok {\n\t\t\tfmt.Println(\"йҖҡйҒ“е·Іе…ій—ӯ\")\n\t\t\treturn\n\
    \t\t}\n\t\tfmt.Printf(\"и®Ўж•°: %d д»Һ %s жҺҘж”¶ \\n\", val, label)\n\t\tif val == 10 {\n\
    \t\t\tfmt.Printf(\"йҖҡйҒ“д»Һ %s е…ій—ӯ \\n\", label)\n\t\t\t// е…ій—ӯйҖҡйҒ“\n\t\t\tclose(count)\n\
    \t\t\treturn\n\t\t}\n\t\tval++\n\t\t// е°Ҷи®Ўж•°еҸ‘еӣһз»ҷеҸҰдёҖдёӘ goroutineгҖӮ\n\t\tcount <- val\n\
    \t}\n}\n```\n\nиҝҗиЎҢиҜҘзЁӢеәҸж—¶пјҢиҫ“еҮәеҸҜиғҪдјҡжңүжүҖдёҚеҗҢгҖӮдҪ еә”иҜҘдјҡзңӢеҲ°зұ»дјјдәҺд»ҘдёӢзҡ„иҫ“еҮәпјҡ\n\n```\nеҗҜеҠЁ Goroutines\nйҖҡйҒ“ејҖе§Ӣ\n\
    и®Ўж•°: 1 д»Һ A жҺҘж”¶\nи®Ўж•°: 2 д»Һ B жҺҘж”¶\nзӯүеҫ…е®ҢжҲҗ\nи®Ўж•°: 3 д»Һ A жҺҘж”¶\nи®Ўж•°: 4 д»Һ B жҺҘж”¶\nи®Ўж•°: 5 д»Һ A жҺҘж”¶\nи®Ўж•°:\
    \ 6 д»Һ B жҺҘж”¶\nи®Ўж•°: 7 д»Һ A жҺҘж”¶\nи®Ўж•°: 8 д»Һ B жҺҘж”¶\nи®Ўж•°: 9 д»Һ A жҺҘж”¶\nи®Ўж•°: 10 д»Һ B жҺҘж”¶\nйҖҡйҒ“д»Һ B е…ій—ӯ\n\
    йҖҡйҒ“е·Іе…ій—ӯ\nз»ҲжӯўзЁӢеәҸ\n```\n\nеңЁиҝҷдёӘзЁӢеәҸдёӯпјҢдёӨдёӘ goroutine дҪҝз”Ёж— зј“еҶІйҖҡйҒ“иҝӣиЎҢеҗҢжӯҘе’ҢйҖҡдҝЎгҖӮиҝҷйҮҢдҪҝз”ЁдәҶдёҖдёӘж•ҙж•°зұ»еһӢзҡ„йҖҡйҒ“з”ЁдәҺ goroutine\
    \ д№Ӣй—ҙзҡ„ж•°жҚ®дәӨжҚўгҖӮеңЁ `main` еҮҪж•°дёӯпјҢеЈ°жҳҺдәҶж— зј“еҶІйҖҡйҒ“ `count` з”ЁдәҺдёӨдёӘ goroutine д№Ӣй—ҙзҡ„ж¶ҲжҒҜдәӨжҚўгҖӮдёәдёӨдёӘ goroutine еңЁ\
    \ `WaitGroup` дёӯж·»еҠ дәҶдёҖдёӘи®Ўж•° 2гҖӮз„¶еҗҺйҖҡиҝҮдј йҖ’иҜҘйҖҡйҒ“еҗҜеҠЁдәҶдёӨдёӘ goroutineпјҡ\n\n```\ncount := make(chan\
    \ int)\n\n// ж·»еҠ и®Ўж•° 2пјҢжҜҸдёӘ goroutine еҜ№еә”дёҖдёӘгҖӮ\nwg.Add(2)\n\n//еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"A\" зҡ„ goroutine\n\
    go printCounts(\"A\", count)\n\n//еҗҜеҠЁдёҖдёӘж Үзӯҫдёә \"B\" зҡ„ goroutine\ngo printCounts(\"\
    B\", count)\n```\n\nеңЁ `printCounts` еҮҪж•°еҶ…йғЁпјҢдҪҝз”ЁдәҶдёҖдёӘж— йҷҗ `for` еҫӘзҺҜпјҢеҪ“д»ҺйҖҡйҒ“жҺҘж”¶еҲ°еҖј `10` ж—¶пјҢд»ҺеҮҪж•°дёӯиҝ”еӣһгҖӮеҗҜеҠЁдёӨдёӘ\
    \ goroutine еҗҺпјҢйҖҡиҝҮеҸ‘йҖҒеҖј `1` жқҘеҗҜеҠЁйҖҡйҒ“пјҢиҜҘеҖје°Ҷз”ұжҹҗдёӘ goroutine жҺҘж”¶гҖӮж— зј“еҶІйҖҡйҒ“дјҡйҳ»еЎһжҺҘж”¶иҖ…пјҢзӣҙеҲ°йҖҡйҒ“дёӯжңүж¶ҲжҒҜеҸҜз”ЁгҖӮ\n\n\
    `printCounts` еҮҪж•°дёӯзҡ„д»ҘдёӢд»Јз Ғеқ—дјҡйҳ»еЎһпјҢзӣҙеҲ°еҖјиў«еҸ‘йҖҒеҲ°йҖҡйҒ“дёӯпјҡ\n\n```\n//д»ҺйҖҡйҒ“жҺҘж”¶ж¶ҲжҒҜ\nval, ok := <-count\n\
    ```\n\nеҪ“д»ҺйҖҡйҒ“жҺҘж”¶еҖјж—¶пјҢеҸҜд»ҘдҪҝз”ЁиөӢеҖје·Ұдҫ§зҡ„дёӨдёӘеҸҳйҮҸпјҡдёҖдёӘжҳҜд»ҺйҖҡйҒ“жҺҘж”¶зҡ„ж•°жҚ®пјҢеҸҰдёҖдёӘжҳҜиЎЁзӨәйҖҡйҒ“жҳҜеҗҰеҸҜз”Ёзҡ„еёғе°”еҖјгҖӮеҰӮжһңйҖҡйҒ“е·Іе…ій—ӯпјҢжҲ‘д»¬е°ұд»ҺеҮҪж•°иҝ”еӣһгҖӮ\n\
    \n```\nif !ok {\n\tfmt.Println(\"йҖҡйҒ“е·Іе…ій—ӯ\")\n\treturn\n}\n```\n\nеҪ“д»ҺйҖҡйҒ“жҺҘж”¶еҲ°еҖј `10` ж—¶пјҢйҖҡйҒ“иў«е…ій—ӯгҖӮеҰӮжһңжҺҘж”¶еҲ°зҡ„йҖҡйҒ“еҖје°ҸдәҺ\
    \ `10`пјҢеҲҷеҜ№иҜҘеҖјиҝӣиЎҢиҮӘеўһпјҢе№¶е°Ҷж–°еҖјеҸ‘йҖҒеҲ°йҖҡйҒ“дёӯгҖӮиҝҷдёӘиҝҮзЁӢдјҡйҳ»еЎһеҸ‘йҖҒиҖ…пјҢзӣҙеҲ°жҹҗдёӘжҺҘж”¶иҖ…д»ҺйҖҡйҒ“дёӯжҺҘж”¶еҲ°иҜҘеҖјгҖӮ\n\n```\nif val == 10 {\n\
    \tfmt.Printf(\"йҖҡйҒ“д»Һ %s е…ій—ӯ \\n\", label)\n\t// е…ій—ӯйҖҡйҒ“\n\tclose(count)\n\treturn\n\
    }\nval++\n// е°Ҷи®Ўж•°еҸ‘еӣһз»ҷеҸҰдёҖдёӘ goroutineгҖӮ\ncount <- val\n```\n\nе…ідәҺж— зј“еҶІйҖҡйҒ“жңҖйҮҚиҰҒзҡ„жҳҜпјҡеҜ№йҖҡйҒ“зҡ„жҺҘж”¶ж“ҚдҪңдјҡйҳ»еЎһ\
    \ goroutineпјҢзӣҙеҲ°йҖҡйҒ“иҺ·еҸ–еҲ°ж•°жҚ®пјӣеҜ№йҖҡйҒ“зҡ„еҸ‘йҖҒж“ҚдҪңдјҡйҳ»еЎһ goroutineпјҢзӣҙеҲ°жңүжҺҘж”¶иҖ…жҺҘж”¶еҲ°ж•°жҚ®пјҢд»ҺиҖҢзЎ®дҝқдәҶ goroutine д№Ӣй—ҙзҡ„ж¶ҲжҒҜдј йҖ’гҖӮеҰӮжһңдҪ жҹҘзңӢзЁӢеәҸиҫ“еҮәпјҢе°ұиғҪжё…жҘҡең°зҗҶи§ЈйҖҡйҒ“зҡ„еҠҹиғҪгҖӮ\n"
- fmt: "# Buffered Channels\n\nAn unbuffered channel provides a synchronous way of\
    \ data communication among goroutines that ensures guaranteed message delivery.\
    \ A buffered channel is different from this approach. Unlike an unbuffered channel,\
    \ it is created by specifying the number of values it can contain. Buffered channels\
    \ accept the specified number of values before they are received.\n\nListing [3-24](#A978-1-4842-1052-9_3_Chapter.html#FPar26)\
    \ is a basic example program that demonstrates a buffered channel.\n\n**Listing\
    \ 3-24.** Example Program with a Buffered Channel\n\n```\npackage main\n\nimport\
    \ \"fmt\"\n\nfunc main() {\n\n        messages := make(chan string, 2)\n\n   \
    \     messages <- \"Golang\"\n        messages <- \"Gopher\"\n\n        //Recieve\
