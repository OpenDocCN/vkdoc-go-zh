    еә“еңЁ Go з”ҹжҖҒзі»з»ҹдёӯжү®жј”зқҖе…ій”®и§’иүІпјҢеӣ дёә Go иў«и®ҫи®ЎдёәдёҖз§ҚжЁЎеқ—еҢ–зҡ„зј–зЁӢиҜӯиЁҖпјҢз”ЁдәҺзј–еҶҷй«ҳеәҰеҸҜз»ҙжҠӨе’ҢеҸҜз»„еҗҲзҡ„еә”з”ЁгҖӮеә“д»ҘеҢ…зҡ„еҪўејҸжҸҗдҫӣеҸҜеӨҚз”Ёзҡ„еҠҹиғҪжЁЎеқ—гҖӮдҪ еҸҜд»ҘдҪҝз”Ё
    Go еҢ…д»ҘжЁЎеқ—еҢ–е’ҢеҸҜеӨҚз”Ёзҡ„ж–№ејҸзј–еҶҷиҪҜд»¶з»„д»¶пјҢд»ҺиҖҢеңЁ Go зЁӢеәҸй—ҙе…ұдә«пјҢе№¶иҪ»жқҫз»ҙжҠӨдҪ зҡ„еә”з”ЁгҖӮGo еә”з”Ёзҡ„и®ҫи®ЎзҗҶеҝөжҳҜйҖҡиҝҮеҢ…зј–еҶҷе°Ҹзҡ„иҪҜд»¶з»„д»¶пјҢз„¶еҗҺз”Ёиҝҷдәӣиҫғе°Ҹзҡ„еҢ…з»„еҗҲжҲҗ
    Go еә”з”ЁгҖӮеә“еҸҜд»Ҙд»Һж ҮеҮҶеә“е’Ңз¬¬дёүж–№еә“дёӯиҺ·еҫ—гҖӮеҪ“дҪ д»Һж ҮеҮҶеә“е®үиЈ… Go еҢ…ж—¶пјҢе®ғд»¬дјҡиў«е®үиЈ…еҲ° Go зҡ„е®үиЈ…зӣ®еҪ•дёӯгҖӮеҪ“дҪ е®үиЈ… Go ж—¶пјҢзҺҜеўғеҸҳйҮҸ `GOROOT`
    дјҡиҮӘеҠЁж·»еҠ еҲ°дҪ зҡ„зі»з»ҹдёӯпјҢз”ЁдәҺжҢҮе®ҡ Go зҡ„е®үиЈ…зӣ®еҪ•гҖӮж ҮеҮҶеә“еҢ…еҗ«еӨ§йҮҸеҢ…пјҢжҸҗдҫӣдәҶзј–еҶҷзңҹе®һдё–з•Ңеә”з”ЁжүҖйңҖзҡ„е№ҝжіӣеҠҹиғҪгҖӮдҫӢеҰӮпјҢж ҮеҮҶеә“дёӯзҡ„ `"net/http"` еҢ…еҸҜз”ЁдәҺзј–еҶҷејәеӨ§зҡ„
    Web еә”з”Ёе’Ң RESTful жңҚеҠЎгҖӮ


    > **жіЁж„Ҹ**пјҡжңүе…іж ҮеҮҶеә“еҢ…зҡ„ж–ҮжЎЈпјҢиҜ·и®ҝй—® [`golang.org/pkg/`](http://golang.org/pkg/)гҖӮ


