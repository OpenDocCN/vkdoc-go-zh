    ## Indexes in MongoDB


    MongoDB databases can provide high performance on read operations as compared
    with relational databases. In addition to the default performance behavior of
    MongoDB, you can further improve performance by adding indexes to MongoDB collections.
    Indexes in collections provide high performance on read operations for frequently
    used queries. MongoDB defines indexes at the [collection](http://docs.mongodb.org/manual/reference/glossary/#term-collection)
