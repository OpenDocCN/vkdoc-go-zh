    # иә«д»ҪйӘҢиҜҒж–№жі•


    еңЁеә”з”ЁзЁӢеәҸдёӯе®һзҺ°иә«д»ҪйӘҢиҜҒжңүеӨҡз§ҚеҸҜз”Ёж–№жі•гҖӮйҖҡеёёпјҢз”ЁжҲ·еҮӯиҜҒдјҡеӯҳеӮЁеңЁеә”з”ЁзЁӢеәҸзҡ„ж•°жҚ®еә“дёӯгҖӮWeb жңҚеҠЎеҷЁйҖҡиҝҮ HTML иЎЁеҚ•иҺ·еҸ–з”ЁжҲ·еҗҚе’ҢеҜҶз ҒпјҢз„¶еҗҺе°ҶиҝҷдәӣеҮӯиҜҒдёҺж•°жҚ®еә“дёӯеӯҳеӮЁзҡ„еҮӯиҜҒиҝӣиЎҢйӘҢиҜҒгҖӮдҪҶеңЁзҺ°д»Јеә”з”ЁзЁӢеәҸдёӯпјҢдәәд»¬д№ҹдҪҝз”ЁиҜёеҰӮ
    FacebookгҖҒTwitterгҖҒLinkedIn е’Ң Google зӯүзӨҫдәӨиә«д»ҪжҸҗдҫӣе•ҶдҪңдёәзӨҫдәӨиә«д»ҪиҝӣиЎҢиә«д»ҪйӘҢиҜҒпјҢиҝҷжңүеҠ©дәҺеә”з”ЁзЁӢеәҸйҒҝе…ҚдёәжҜҸдёӘеҚ•зӢ¬зҡ„еә”з”Ёз»ҙжҠӨзӢ¬з«Ӣзҡ„з”ЁжҲ·иә«д»Ҫзі»з»ҹгҖӮжңҖз»Ҳз”ЁжҲ·ж— йңҖи®°дҪҸжҜҸдёӘеә”з”Ёзҡ„з”ЁжҲ·
    ID е’ҢеҜҶз ҒпјҢд»–д»¬еҸҜд»ҘдҪҝз”ЁзҺ°жңүзҡ„зӨҫдәӨиә«д»ҪжқҘйӘҢиҜҒзҷ»еҪ•еә”з”ЁзЁӢеәҸгҖӮ


    еңЁиҝҷдёӘз§»еҠЁеҢ–ж—¶д»ЈпјҢзҺ°д»Ј Web ејҖеҸ‘жӯЈжңқзқҖеҹәдәҺ API зҡ„ж–№еҗ‘еҸ‘еұ•пјҢиҝҷдәӣ API еҗҢж—¶иў«з§»еҠЁе®ўжҲ·з«Ҝе’Ң Web е®ўжҲ·з«ҜжүҖдҪҝз”ЁгҖӮеҝ…йЎ»дёәзҺ°д»Ј Web еә”з”ЁзЁӢеәҸжҸҗдҫӣжӣҙеҸҜйқ зҡ„е®үе…Ёзі»з»ҹгҖӮAPI
    жҳҜеҹәдәҺж— зҠ¶жҖҒи®ҫи®ЎејҖеҸ‘зҡ„пјҢеңЁи®ҫи®Ў API зҡ„иә«д»ҪйӘҢиҜҒзі»з»ҹж—¶еә”иҖғиҷ‘еҲ°иҝҷдёҖзӮ№гҖӮеӣ жӯӨпјҢжӮЁдёҚиғҪе°ҶеҜ№дј з»ҹ Web еә”з”ЁзЁӢеәҸдҪҝз”Ёзҡ„ж–№жі•зӣҙжҺҘеә”з”ЁдәҺ APIгҖӮ


    дёҖж—Ұз”ЁжҲ·зҷ»еҪ•зі»з»ҹпјҢд»–д»¬е°ұеҝ…йЎ»иғҪеӨҹеңЁеҗҺз»ӯзҡ„ HTTP иҜ·жұӮдёӯи®ҝй—® Web жңҚеҠЎеҷЁиө„жәҗпјҢиҖҢж— йңҖдёәжҜҸдёӘ HTTP иҜ·жұӮжҸҗдҫӣз”ЁжҲ·еҮӯиҜҒгҖӮжңүдёӨз§Қж–№жі•еҸҜд»Ҙе°Ҷз”ЁжҲ·дҝқжҢҒдёәеҗҺз»ӯ
    HTTP иҜ·жұӮзҡ„"е·Ізҷ»еҪ•"зҠ¶жҖҒгҖӮдј з»ҹж–№жі•жҳҜдҪҝз”Ё HTTP дјҡиҜқе’Ң CookieпјҢиҖҢзҺ°д»Јж–№жі•жҳҜдҪҝз”Ё Web жңҚеҠЎеҷЁз”ҹжҲҗзҡ„и®ҝй—®д»ӨзүҢгҖӮеҹәдәҺд»ӨзүҢзҡ„ж–№жі•еҜ№дәҺ Web
    API жқҘиҜҙжҳҜдёҖз§ҚдҫҝжҚ·зҡ„и§ЈеҶіж–№жЎҲпјӣHTTP дјҡиҜқе’Ң Cookie еҲҷйҖӮз”ЁдәҺдј з»ҹ Web еә”з”ЁзЁӢеәҸгҖӮ


    ## еҹәдәҺ Cookie зҡ„иә«д»ҪйӘҢиҜҒ


    еҹәдәҺ Cookie зҡ„ж–№жі•жҳҜе®һзҺ° Web еә”з”ЁзЁӢеәҸиә«д»ҪйӘҢиҜҒжңҖе№ҝжіӣдҪҝз”Ёзҡ„ж–№ејҸгҖӮеңЁиҝҷз§Қж–№жі•дёӯпјҢз”ЁжҲ·дҪҝз”ЁеҮӯиҜҒзҷ»еҪ•зі»з»ҹеҗҺпјҢжҜҸдёӘ HTTP иҜ·жұӮйғҪйҖҡиҝҮ HTTP Cookie
    иҝӣиЎҢиә«д»ҪйӘҢиҜҒгҖӮ


    еӣҫ 7-1 еұ•зӨәдәҶеҹәдәҺ Cookie зҡ„иә«д»ҪйӘҢиҜҒе·ҘдҪңжөҒзЁӢгҖӮ


    ![A978-1-4842-1052-9_7_Fig1_HTML.jpg](img/A978-1-4842-1052-9_7_Fig1_HTML.jpg)


    еӣҫ 7-1. еҹәдәҺ Cookie зҡ„иә«д»ҪйӘҢиҜҒе·ҘдҪңжөҒзЁӢ


    еңЁеҹәдәҺ Cookie зҡ„иә«д»ҪйӘҢиҜҒдёӯпјҢWeb жңҚеҠЎеҷЁйҰ–е…ҲйӘҢиҜҒйҖҡиҝҮ HTML иЎЁеҚ•еҸ‘йҖҒзҡ„з”ЁжҲ·еҗҚе’ҢеҜҶз ҒгҖӮдёҖж—Ұз”ЁжҲ·еҮӯиҜҒдёҺж•°жҚ®еә“дёӯеӯҳеӮЁзҡ„еҮӯиҜҒйӘҢиҜҒйҖҡиҝҮпјҢHTTP жңҚеҠЎеҷЁе°ұдјҡи®ҫзҪ®дёҖдёӘдјҡиҜқ
    CookieпјҢйҖҡеёёеҢ…еҗ«з”ЁжҲ·дҝЎжҒҜгҖӮеҜ№дәҺжҜҸдёӘеҗҺз»ӯ HTTP иҜ·жұӮпјҢWeb жңҚеҠЎеҷЁеҸҜд»Ҙж №жҚ® Cookie дёӯеҢ…еҗ«зҡ„еҖјжқҘйӘҢиҜҒ HTTP иҜ·жұӮгҖӮдёҖдәӣжңҚеҠЎеҷЁз«ҜжҠҖжңҜдёәе®һж–ҪжӯӨзұ»иә«д»ҪйӘҢиҜҒжҸҗдҫӣдәҶйқһеёёдё°еҜҢзҡ„еҹәзЎҖи®ҫж–ҪпјҢжӮЁеҸӘйңҖи°ғз”Ёе…¶
    API ж–№жі•еҚіеҸҜиҪ»жқҫе®һзҺ°еҹәдәҺ Cookie зҡ„иә«д»ҪйӘҢиҜҒгҖӮеңЁе…¶д»–жңҚеҠЎеҷЁз«ҜжҠҖжңҜе’ҢжЎҶжһ¶дёӯпјҢжӮЁеҸҜд»ҘжүӢеҠЁзј–еҶҷдёҖдәӣд»Јз ҒжқҘеҶҷе…Ҙ Cookie е№¶е°ҶеҖјеӯҳеӮЁеҲ°дјҡиҜқеӯҳеӮЁдёӯпјҢд»Ҙе®һзҺ°иә«д»ҪйӘҢиҜҒгҖӮ


    з»“еҗҲдјҡиҜқзҡ„еҹәдәҺ Cookie зҡ„ж–№жі•йқһеёёйҖӮеҗҲдј з»ҹ Web еә”з”ЁзЁӢеәҸпјҢеңЁиҝҷдәӣеә”з”ЁзЁӢеәҸдёӯпјҢжүҖжңүеҶ…е®№пјҲеҢ…жӢ¬ UI жёІжҹ“йҖ»иҫ‘пјүйғҪеңЁжңҚеҠЎеҷЁз«Ҝе®һзҺ°гҖӮWeb еә”з”ЁзЁӢеәҸйҖҡиҝҮеёёи§„жЎҢйқўжөҸи§ҲеҷЁи®ҝй—®гҖӮ


    еңЁ Go иҜӯиЁҖдёӯпјҢжӮЁеҸҜд»ҘдҪҝз”ЁиҜёеҰӮ `sessions` ([www.gorillatoolkit.org/pkg/sessions](http://www.gorillatoolkit.org/pkg/sessions))
    д№Ӣзұ»зҡ„еҢ…пјҲз”ұ Gorilla Web е·Ҙе…·еҢ…жҸҗдҫӣпјүпјҢйҖҡиҝҮеҹәдәҺ Cookie зҡ„дјҡиҜқжқҘе®һж–Ҫиә«д»ҪйӘҢиҜҒгҖӮ


    з”ұдәҺеӨҡз§ҚеҺҹеӣ пјҢдҪҝз”ЁеҹәдәҺ Cookie зҡ„ж–№жі•дёә Web API е®һж–Ҫиә«д»ҪйӘҢиҜҒе№¶йқһиүҜзӯ–гҖӮеҪ“жӮЁжһ„е»ә API ж—¶пјҢж— зҠ¶жҖҒи®ҫи®ЎжҳҜзҗҶжғізҡ„и®ҫи®ЎйҖүжӢ©гҖӮеҰӮжһңдҪҝз”ЁеҹәдәҺ Cookie
    зҡ„ж–№жі•пјҢжӮЁйңҖиҰҒдёә API з»ҙжҠӨдёҖдёӘдјҡиҜқеӯҳеӮЁпјҢиҝҷиҝқеҸҚдәҶж— зҠ¶жҖҒ API зҡ„и®ҫи®ЎеҺҹеҲҷгҖӮжӯӨеӨ–пјҢеҪ“д»ҺдёҚеҗҢеҹҹи®ҝй—® Web жңҚеҠЎеҷЁиө„жәҗж—¶пјҢз”ұдәҺи·Ёеҹҹиө„жәҗе…ұдә«пјҲCORSпјүзҡ„йҷҗеҲ¶пјҢеҹәдәҺ
    Cookie зҡ„ж–№жі•д№ҹж— жі•еҫҲеҘҪең°е·ҘдҪңгҖӮ


    ## еҹәдәҺд»ӨзүҢзҡ„иә«д»ҪйӘҢиҜҒ


    иҝҮеҺ»еҮ е№ҙдёӯпјҢејҖеҸ‘ Web еә”з”ЁзЁӢеәҸзҡ„ж–№жі•е·Із»ҸеҸ‘з”ҹеҸҳеҢ–гҖӮз§»еҠЁеә”з”ЁејҖеҸ‘зҡ„ж—¶д»Јд№ҹж”№еҸҳдәҶеҹәдәҺ Web зҡ„зі»з»ҹзҡ„ејҖеҸ‘ж–№ејҸгҖӮзҺ°д»Ј Web ејҖеҸ‘жӯЈжңқзқҖ API й©ұеҠЁзҡ„ж–№ејҸеҸ‘еұ•пјҢеҚіеңЁжңҚеҠЎеҷЁз«ҜжҸҗдҫӣ
    Web APIпјҲйҖҡеёёжҳҜ RESTful APIпјүпјҢиҖҢ Web еә”з”ЁзЁӢеәҸе’Ңз§»еҠЁеә”з”ЁзЁӢеәҸеҲҷйҖҡиҝҮдҪҝз”ЁиҜҘ Web API жқҘжһ„е»әгҖӮ


    еҹәдәҺд»ӨзүҢзҡ„ж–№жі•жҳҜдёә Web еә”з”ЁзЁӢеәҸе’Ң Web API е®һж–Ҫиә«д»ҪйӘҢиҜҒзҡ„зҺ°д»Јж–№жі•гҖӮеңЁеҹәдәҺд»ӨзүҢзҡ„ж–№жі•дёӯпјҲи§Ғеӣҫ 7-2пјүпјҢжҜҸдёӘ HTTP иҜ·жұӮйғҪдҪҝз”Ёи®ҝй—®д»ӨзүҢ ID
    иҝӣиЎҢиә«д»ҪйӘҢиҜҒгҖӮеңЁиҝҷз§Қж–№жі•дёӯпјҢжӮЁд№ҹеҸҜд»ҘдҪҝз”Ёз”ЁжҲ·еҗҚе’ҢеҜҶз Ғзҷ»еҪ•зі»з»ҹгҖӮеҰӮжһңз”ЁжҲ·иҺ·еҫ—зі»з»ҹи®ҝй—®жқғйҷҗпјҢиә«д»ҪйӘҢиҜҒзі»з»ҹдјҡз”ҹжҲҗдёҖдёӘи®ҝй—®д»ӨзүҢпјҢз”ЁдәҺеҗҺз»ӯзҡ„ HTTP иҜ·жұӮпјҢд»ҘдҫҝеңЁ
    Web жңҚеҠЎеҷЁдёҠиҝӣиЎҢиә«д»ҪйӘҢиҜҒгҖӮиҝҷдәӣи®ҝй—®д»ӨзүҢжҳҜз»ҸиҝҮе®үе…ЁзӯҫеҗҚзҡ„еӯ—з¬ҰдёІпјҢеҸҜз”ЁдәҺжҜҸдёӘ HTTP иҜ·жұӮи®ҝй—® HTTP иө„жәҗгҖӮйҖҡеёёпјҢи®ҝй—®д»ӨзүҢдҪңдёә Bearer д»ӨзүҢйҖҡиҝҮ
    HTTP `Authorization` еӨҙеҸ‘йҖҒпјҢеҸҜд»ҘеңЁ Web жңҚеҠЎеҷЁз«ҜиҝӣиЎҢйӘҢиҜҒгҖӮ


    ![A978-1-4842-1052-9_7_Fig2_HTML.jpg](img/A978-1-4842-1052-9_7_Fig2_HTML.jpg)


    еӣҫ 7-2. еҹәдәҺд»ӨзүҢзҡ„иә«д»ҪйӘҢиҜҒе·ҘдҪңжөҒзЁӢ


    жңүж—¶пјҢжӮЁеҸҜд»ҘдҪҝз”Ёз¬¬дёүж–№иә«д»ҪжҸҗдҫӣе•ҶжҲ–з¬¬дёүж–№ API иҝӣиЎҢиә«д»ҪйӘҢиҜҒгҖӮеңЁиҝҷз§Қжғ…еҶөдёӢпјҢдҪҝз”Ёе®ўжҲ·з«Ҝ ID е’ҢеҜҶй’ҘпјҲиҖҢйқһз”ЁжҲ·еҗҚе’ҢеҜҶз ҒпјүжқҘзҷ»еҪ•иә«д»ҪйӘҢиҜҒзі»з»ҹгҖӮ


    д»ҘдёӢжҳҜеҹәдәҺд»ӨзүҢзҡ„иә«д»ҪйӘҢиҜҒиҝҮзЁӢпјҡ


    - йҖҡиҝҮжҸҗдҫӣз”ЁжҲ·еҗҚе’ҢеҜҶз ҒпјҢжҲ–жҸҗдҫӣе®ўжҲ·з«Ҝ ID е’ҢеҜҶй’ҘжқҘйӘҢиҜҒзҷ»еҪ•зі»з»ҹгҖӮ

    - еҰӮжһңиә«д»ҪйӘҢиҜҒиҜ·жұӮжҲҗеҠҹпјҢиә«д»ҪйӘҢиҜҒзі»з»ҹдјҡз”ҹжҲҗдёҖдёӘз»ҸиҝҮе®үе…ЁзӯҫеҗҚзҡ„еӯ—з¬ҰдёІдҪңдёәи®ҝй—®д»ӨзүҢпјҢз”ЁдәҺеҗҺз»ӯзҡ„ HTTP иҜ·жұӮгҖӮ

    - е®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸд»Һ Web жңҚеҠЎеҷЁжҺҘж”¶д»ӨзүҢпјҢе№¶дҪҝз”Ёе®ғжқҘи®ҝй—® Web жңҚеҠЎеҷЁиө„жәҗгҖӮ

    - е®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸеңЁжҜҸдёӘеҸ‘еҫҖ Web жңҚеҠЎеҷЁзҡ„ HTTP иҜ·жұӮдёӯжҸҗдҫӣи®ҝй—®д»ӨзүҢгҖӮдҪҝз”Ё HTTP ж ҮеӨҙе°Ҷи®ҝй—®д»ӨзүҢдј иҫ“еҲ° Web жңҚеҠЎеҷЁгҖӮ

    - Web жңҚеҠЎеҷЁйӘҢиҜҒе®ўжҲ·з«Ҝеә”з”ЁзЁӢеәҸжҸҗдҫӣзҡ„и®ҝй—®д»ӨзүҢпјҢеҰӮжһңи®ҝй—®д»ӨзүҢжңүж•ҲпјҢеҲҷжҸҗдҫӣ Web жңҚеҠЎеҷЁиө„жәҗгҖӮ


    еҪ“жӮЁжһ„е»әж— йңҖеңЁе®ўжҲ·з«ҜеҲ©з”Ё Cookie зҡ„з§»еҠЁеә”з”Ёж—¶пјҢеҹәдәҺд»ӨзүҢзҡ„ж–№жі•йқһеёёж–№дҫҝгҖӮеҪ“жӮЁдҪҝз”Ё API дҪңдёәжңҚеҠЎеҷЁз«Ҝе®һзҺ°ж—¶пјҢж— йңҖз»ҙжҠӨдјҡиҜқеӯҳеӮЁпјҢиҝҷдҪҝжӮЁиғҪеӨҹеңЁжңҚеҠЎеҷЁз«Ҝжһ„е»әж— зҠ¶жҖҒ
    APIпјҢе№¶дё”иҝҷдәӣ API еҸҜд»Ҙиў«еҗ„з§Қе®ўжҲ·з«Ҝеә”з”ЁиҪ»жқҫдҪҝз”ЁиҖҢжҜ«ж— йҡңзўҚгҖӮдҪҝз”ЁеҹәдәҺд»ӨзүҢзҡ„ж–№жі•зҡ„еҸҰдёҖдёӘеҘҪеӨ„жҳҜпјҢжӮЁеҸҜд»ҘиҪ»жқҫең°еҗ‘д»»дҪ• Web жңҚеҠЎеҷЁеҸ‘иө· AJAX и°ғз”ЁпјҢж— и®әе…¶еҹҹеҰӮдҪ•пјҢеӣ дёәжӮЁдҪҝз”Ё
    HTTP ж ҮеӨҙеҸ‘иө· HTTP иҜ·жұӮгҖӮ


    еҹәдәҺд»ӨзүҢзҡ„ж–№жі•жҳҜдёә RESTful API жҸҗдҫӣе®үе…ЁжҖ§зҡ„зҗҶжғіи§ЈеҶіж–№жЎҲгҖӮеңЁ Web жҠҖжңҜйўҶеҹҹпјҢGo дё»иҰҒз”ЁдәҺжһ„е»әеҗҺз«Ҝ APIпјҲйҖҡеёёжҳҜ RESTful APIпјүпјҢеӣ жӯӨжң¬з« зҡ„йҮҚзӮ№дё»иҰҒж”ҫеңЁеҹәдәҺд»ӨзүҢзҡ„ж–№жі•дёҠгҖӮ


    ## дҪҝз”Ё OAuth 2 иҝӣиЎҢиә«д»ҪйӘҢиҜҒ


    еҹәдәҺд»ӨзүҢзҡ„ж–№жі•е®һйҷ…дёҠжәҗдәҺ OAuth и§„иҢғпјҢиҜҘи§„иҢғж—ЁеңЁи§ЈеҶіиә«д»ҪйӘҢиҜҒй—®йўҳпјҢдҪҝеә”з”ЁзЁӢеәҸиғҪеӨҹйҖҡиҝҮејҖж”ҫзҡ„иә«д»ҪйӘҢиҜҒжЁЎеһӢи®ҝй—®еҪјжӯӨзҡ„ж•°жҚ®гҖӮеңЁж·ұе…ҘжҺўи®ЁдҪҝз”Ё OAuth 2
    жңҚеҠЎжҸҗдҫӣе•Ҷзҡ„зӨәдҫӢиә«д»ҪйӘҢиҜҒзЁӢеәҸд№ӢеүҚпјҢи®©жҲ‘д»¬е…Ҳз®ҖиҰҒдәҶи§ЈдёҖдёӢ OAuthгҖӮ

