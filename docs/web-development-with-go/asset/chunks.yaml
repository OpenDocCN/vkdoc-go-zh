    \ Web еә”з”ЁпјҢиҝҷдәӣеә”з”Ёзҡ„еҗҺз«Ҝе®һзҺ°жҸҗдҫӣдәҶеҢ…жӢ¬ UI жёІжҹ“еңЁеҶ…зҡ„дёҖеҲҮеҠҹиғҪгҖӮ\n\nеҹәдәҺд»ӨзүҢзҡ„ж–№жі•йқһеёёйҖӮеҗҲдёә RESTful API ж·»еҠ иә«д»ҪйӘҢиҜҒеҠҹиғҪпјҢиҝҷдәӣ\
