  raw: '## Gorilla Mux


    The `http.ServeMux` is an HTTP request multiplexer that works well for most common
    scenarios. It was used in the example programs as the request multiplexer. If
    you want more power for your request multiplexer, you might consider a third-party
    routing package that is compatible with standard `http.ServeMux`. For example,
    if you want to specify RESTful resources with proper HTTP endpoints and HTTP methods,
    it is difficult to work with the standard `http.ServeMux`.


    The `mux` package from the Gorilla web toolkit (`github.com/gorilla/mux`) is a
    powerful request router that allows you to configure the multiplexer in your own
    way. This package is very useful when you build RESTful services and it implements
    the `http.Handler` interface so it is compatible with the standard `http.ServeMux`.
    With the `mux` package, requests can be matched based on URL host, path, path
    prefix, schemes, header and query values, and HTTP methods. You can also use custom
    matchers and routes as subrouters with `this` package.


    To install the `mux` package, run the following command in the terminal:


    `go get github.com/gorilla/mux`


    LetвҖҷs configure routes with the `mux` package (see Listing [4-14](#A978-1-4842-1052-9_4_Chapter.html#FPar15)).


    Listing 4-14.В В Routing with the mux Package


    `func main() {`


    В В В В В В В В `r := mux.NewRouter().StrictSlash(false)`


    В В В В В В В В `r.HandleFunc("/api/notes", GetNoteHandler).Methods("GET")`


    В В В В В В В В `r.HandleFunc("/api/notes", PostNoteHandler).Methods("POST")`


    В В В В В В В В `r.HandleFunc("/api/notes/{id}", PutNoteHandler).Methods("PUT")`


    В В В В В В В В `r.HandleFunc("/api/notes/{id}", DeleteNoteHandler).Methods("DELETE")`


    В В В В В В В В `server := &http.Server{`


    В В В В В В В В В В В В В В В В `Addr:В В В В ":8080",`


    В В В В В В В В В В В В В В В В `Handler: r,`


    В В В В В В В В `}`


    В В В В В В В В `server.ListenAndServe()`


    `}`


    Here a `mux.Router` object is created by calling the `NewRouter` function and
    then specifying the routes for the resources. You can match with HTTP methods
    when specifying URI patterns, so it is useful when building RESTful applications.
    Because the `mux` package implements the `http.Handler` interface, you can easily
    work with the `http` standard package. It provides lot of extensibility so that
    you can easily replace or extend many of its functionalities with your own packages
    and third-party packages.


    Unlike other web-programming ecosystems, the idiomatic way of web development
    in Go is to use standard library packages and third-party packages if required
    to extend the capabilities of existing functionalities. When you choose third-party
    packages, it is important to choose those that are compatible with the standard
    library package. The `mux` package is a great example for this approach, which
    is compatible with the `http` package because it provides the `http.Handler` interface.


    ## Building a RESTful API


    This chapter discussed the fundamentals of web development in Go, including `http.ServeMux`
    and `http.Handler` for processing and serving HTTP requests. You also learned
    about the `mux` third-party package, which can be used as a replacement for `http.ServeMux
    and` is compatible with the `http` package. LetвҖҷs now build a simple JSON-based
    REST API with the `mux` package as the request multiplexer, which will help you
    understand many real-world practices for building web systems in Go (see Listing
    [4-15](#A978-1-4842-1052-9_4_Chapter.html#FPar17)).


    Note


    Representational State Transfer (REST): If you want to know more about REST, I
    recommend that you read Martin FowlerвҖҷs article, вҖңRichardson Maturity Model: Steps
    Toward the Glory of REST.вҖқ Access it here: [`http://martinfowler.com/articles/richardsonMaturityModel.html`](http://martinfowler.com/articles/richardsonMaturityModel.html)


    Listing 4-15.В В JSON-based RESTful API


    `package main`


    `import (`


    `"encoding/json"`


    `"log"`


    `"net/http"`


    `"strconv"`


    `"time"`


    `"github.com/gorilla/mux"`


    `)`


    `type Note struct {`


    `` TitleВ В В В В В В stringВ В В В `json:"title"` ``


    `` Description stringВ В В В `json:"description"` ``


    `` CreatedOnВ В В time.Time `json:"createdon"` ``


    `}`


    `//Store for the Notes collection`


    `var noteStore = make(map[string]Note)`


    `//Variable to generate key for the collection`


    `var id int = 0`


    `//HTTP Post - /api/notes`


    `func PostNoteHandler(w http.ResponseWriter, r *http.Request) {`


    `var note Note`


    `// Decode the incoming Note json`


    `err := json.NewDecoder(r.Body).Decode(&note)`


    `if err != nil {`


    `panic(err)`


    `}`


    `note.CreatedOn = time.Now()`


    `id++`


    `k := strconv.Itoa(id)`


    `noteStore[k] = note`


    `j, err := json.Marshal(note)`


    `if err != nil {`


    `panic(err)`


    `}`


    `w.Header().Set("Content-Type", "application/json")`


    `w.WriteHeader(http.StatusCreated)`


    `w.Write(j)`


    `}`


    `//HTTP Get - /api/notes`


    `func GetNoteHandler(w http.ResponseWriter, r *http.Request) {`


    `var notes []Note`


    `for _, v := range noteStore {`


    `notes = append(notes, v)`


    `}`


    `w.Header().Set("Content-Type", "application/json")`


    `j, err := json.Marshal(notes)`


    `if err != nil {`


    `panic(err)`


    `}`


    `w.WriteHeader(http.StatusOK)`


    `w.Write(j)`


    `}`


    `//HTTP Put - /api/notes/{id}`


    `func PutNoteHandler(w http.ResponseWriter, r *http.Request) {`


    `var err error`


    `vars := mux.Vars(r)`


    `k := vars["id"]`


    `var noteToUpd Note`


    `// Decode the incoming Note json`


    `err = json.` `N` `ewDecoder(r.Body).Decode(&noteToUpd)`


    `if err != nil {`


    `panic(err)`


    `}`


    `if note, ok := noteStore[k]; ok {`


    `noteToUpd.CreatedOn = note.CreatedOn`


    `//delete existing item and add the updated item`


    `delete(noteStore, k)`


    `noteStore[k] = noteToUpd`


    `} else {`


    `log.Printf("Could not find key of Note %s to delete", k)`


    `}`


    `w.WriteHeader(http.StatusNoContent)`


    `}`


    `//HTTP Delete - /api/notes/{id}`


    `func DeleteNoteHandler(w http.ResponseWriter, r *http.Request) {`


    `vars := mux.Vars(r)`


    `k := vars["id"]`


    `// Remove from Store`


    `if _, ok := noteStore[k]; ok {`


    `//delete existing item`


    `delete(noteStore, k)`


    `} else {`


    `log.Printf("Could not find key of Note %s to delete", k)`


    `}`


    `w.WriteHeader(http.StatusNoContent)`


    `}`


    `//Entry point of the program`


    `func main() {`


    `r := mux.NewRouter().StrictSlash(false)`


    `r.HandleFunc("/api/notes", GetNoteHandler).Methods("GET")`


    `r.HandleFunc("/api/notes", PostNoteHandler).Methods("POST")`


    `r.HandleFunc("/api/notes/{id}", PutNoteHandler).Methods("PUT")`


    `r.HandleFunc("/api/notes/{id}", DeleteNoteHandler).Methods("DELETE")`


    `server := &http.Server{`


    `Addr:В В В В ":8080",`


    `Handler: r,`


    `}`


    `log.Println("Listening...")`


    `server.ListenAndServe()`


    `}`


    ### Data Model and Data Store


    Listing [4-15](#A978-1-4842-1052-9_4_Chapter.html#FPar17) built a simple REST
    API with basic CRUD operations against the data model `Note` struct:


    `type Note struct {`


    В В В В `` TitleВ В В В В В В stringВ В В В `json:"title"` ``


    В В В В `` Description stringВ В В В `json:"description"` ``


    В В В В `` CreatedOnВ В В time.Time `json:"createdon"` ``


    `}`


    For the JSON-based API, the struct fields are encoded into JSON to serve as the
    response to HTTP clients. You can easily encode a struct as JSON and decode JSON
    as a struct by using the standard library package `encoding/json`. If you need
    a representation for the elements of JSON different from struct fields, you can
    map the struct fields with the elements you want for JSON encoding:


    `` TitleВ В В В В В В stringВ В В В `json:"title"` ``


    `` Description stringВ В В В `json:"description"` ``


    ``CreatedOnВ В В time.Time `json:"createdon"``


    Here the struct fields are represented in uppercase letters; encode these fields
    in lowercase letters for JSON representation.


    This sample does not use any database storage, so a map is used as the persistence
