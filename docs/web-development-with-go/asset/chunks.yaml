    \ `ServeMux` дёӯгҖӮ\n\nжё…еҚ• 4-8 жҳҜдёҖдёӘдҪҝз”Ё `ServeMux.HandleFunc` зҡ„зӨәдҫӢзЁӢеәҸгҖӮ\n\n**жё…еҚ• 4-8.** дҪҝз”Ё\
    \ `ServeMux.HandleFunc`\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"\
