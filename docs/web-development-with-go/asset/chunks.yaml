    The `ParseFromRequest` function automatically looks at the HTTP header for the
    access token and validates the string with a corresponding verification key. By
    checking the error, you can see whether the token has expired. The `jwt-go` package
    is very helpful when you work with JWT tokens.


    #### Running and Testing the API Server


