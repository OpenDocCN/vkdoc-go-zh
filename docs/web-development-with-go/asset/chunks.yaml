    ### Putting Tests in Separate Packages


    Unit tests are usually put into the same package as the one being tested. The
    `_test.go` files are excluded from regular package builds, but are included when
    the `go test` command is run. In my opinion, it is better to move your test files
    into a separate package, which allows you to separate unit tests from the application
    code that improves the separation of concerns. (In previous examples, the application
    code and test files were written in the same package: `stringutils`.)


    LetвҖҷs move the `utils_test.go` file into a new package directory named `stringutils_test`
    and import the `stringutils` package so the functions to be tested can be accessed.


    Figure [10-3](#A978-1-4842-1052-9_10_Chapter.html#Fig3) illustrates the directory
    structure of the application.


    ![A978-1-4842-1052-9_10_Fig3_HTML.jpg](A978-1-4842-1052-9_10_Fig3_HTML.jpg)


    Figure 10-3.


    Directory structure of the stringutils and stringutils_test packages


    The `utils.go` file is put into the `stringutils` package directory, and the test
    suite file `utils_test.go` is put into the `stringutils_test` package directory.


    Listing [10-7](#A978-1-4842-1052-9_10_Chapter.html#FPar7) provides the combined
    source version of the `utils_test.go` file used in previous examples.


