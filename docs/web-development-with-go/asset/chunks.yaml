    ### Restoring an ApplicationвҖҷs Dependencies


    To restore an applicationвҖҷs dependencies on a target machine, run the following
    command:


    `godep restore`


    The `godep``restore` command installs the package versions specified in `Godeps/``Godeps.json`
    to the `$GOPATH`, which modifies the state of the packages in the `GOPATH` location.


    ## Deploying HTTP Servers with Docker


    You have completed the TaskManager application and provided dependency management
    infrastructure using the `godep` tool. It is time to provide the deployment infrastructure
    for running the RESTful API application onto production servers. You can deploy
    HTTP servers with on-premise servers and Cloud computing environments. (In [Chapter
    11](#A978-1-4842-1052-9_11_Chapter.html), you will learn how to deploy Go servers
    with Google Cloud Platform.)


    Linux containers ( [`https://linuxcontainers.org/`](https://linuxcontainers.org/)
    ) are gradually becoming a preferred approach for deploying and running applications
    regardless of on-premise servers and Cloud computing platforms. Docker is a technology
    that revolutionized the concept of using Linux containers for building, shipping,
    and running applications in a Linux container. You can use Docker for running
    applications in both on-premise servers and Cloud computing infrastructures.


    In this section, a Dockerfile will be written for the TaskManager application
    to be used with Docker to deploy the application onto both on-premise servers
    and Cloud environments. A Dockerfile is a text document that is used to build
    and run applications with Docker. Before writing the Dockerfile, letвҖҷs briefly
    discuss Docker.


