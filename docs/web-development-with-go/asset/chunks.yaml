- fmt: '# Installing the Go Tools


    It is easy to install Go on your computers. It provides binary distributions for
    the FreeBSD, Linux, Mac OS X, and Windows operating systems (OSs); and the 32-bit
    (386) and 64-bit (amd64) x86 processor architectures. The binary distributions
    are available at [`http://golang.org/dl/`](http://golang.org/dl/). (If a binary
    distribution is not available for your combination of OS and architecture, you
    can install Go from the [source](http://golang.org/doc/install/source).)


    Figure [1-1](#A978-1-4842-1052-9_1_Chapter.html#Fig1) shows the installer packages
    and archived sources for Mac, Windows, and Linux platforms, which are listed on
    the download page of the Go web site. Go provides installers for both Mac and
    Windows OSs. A package installer is available for Mac X OS that installs the Go
    distribution to `/usr/local/go` and puts the `/usr/local/go/bin` directory in
    the `PATH` environment variable.


    ![A978-1-4842-1052-9_1_Fig1_HTML.jpg](A978-1-4842-1052-9_1_Fig1_HTML.jpg)


    Figure 1-1.

    Go binary distributions for multiple OSs


    In Mac OS, you can also install Go using Homebrew ([`http://brew.sh/`](http://brew.sh/)).
    The following command installs Go on a Mac OS:


    `brew install go`


    An MSI installer is available for the Windows OS that installs Go distribution
    in `c:\Go`. The installer also puts the `c:\Go\bin` directory in the `PATH` environment
    variable. Figure [1-2](#A978-1-4842-1052-9_1_Chapter.html#Fig2) shows the package
    installer running for Mac OS.


    ![A978-1-4842-1052-9_1_Fig2_HTML.jpg](A978-1-4842-1052-9_1_Fig2_HTML.jpg)


    Figure 1-2.

    Go installer for Mac OS


    As mentioned earlier, a successful installation of Go sets up the `GOROOT` environment
    variable with the location in which the Go tools are installed: `/usr/local/go`
    (or `c:\Go` under Windows).


    You can also install Go tools in a custom location. When you do so, manually configure
    the environment variable `GOROOT` with the location in which you installed the
    Go tools on your system.


    Note: The complete instructions for downloading and installing Go tools are available
    at [`http://golang.org/doc/install`](http://golang.org/doc/install).


    ### Checking the Installation


    You can test the Go installation by typing some Go commands in the terminal window.
    To verify the installation of Go tools, open the terminal and type the following
    command:


    `go version`


    Here is the result that shows in a Mac X system:


    `go version go1.4.1 darwin/amd64`


    Here is the result that shows in a Windows system:


    `go version go1.4.1 windows/amd64`


    The following command provides help for Go tools:


    `go help`


    ## Setting up a Work Environment


    Go follows some conventions that organize code in a specific way and help to compile,
    install, and share Go code more easily. This section discusses how to organize
    Go code as packages in a workspace.


    ### Go Workspace


    Go programs must be kept in a directory hierarchy called a workspace, which is
    simply a root directory of the Go programs.


    A workspace contains three subdirectories at its root:


    - `src`: This directory contains Go source files organized into packages.

    - `pkg`: This directory contains Go package objects.

    - `bin`: This directory contains executable commands (executable programs).


    When you start working with Go, the initial step is to set up a workspace in which
    Go programs reside. You must create a directory with three subdirectories for
    setting up the Go workspace. A Go developer writes Go programs as packages into
    the `src` directory. Go source files are organized into directories called packages,
    in which a single directory is used for a single package. You can write two types
    of packages in Go:


    - Packages resulting in executable programs

    - Packages resulting in a shared library


    The Go tool builds Go packages and installs the resulting binaries into the `pkg`
    directory if it is a shared library, and into the `bin` directory if it is an
    executable program. So the `pkg` and `bin` directories are used for storing the
    output of the packages based on the package type. Keep in mind that you can have
    multiple workspaces for your Go programs (Go developers typically use a single
    workspace for their Go programs).


    ### `GOPATH` Environment Variable


    You write Go programs in the workspace, which you should manually specify so that
    Go runtime knows the workspace location. You can set the workspace location by
    using the `GOPATH` environment variable. To get started working with Go, create
    a workspace and set the `GOPATH` environment variable.


    ### Code Organization Paths


    You write Go programs as packages into the `GOPATH src` directory. A single directory
    is used for a single package. Go is designed to easily work with remote repositories
    such as GitHub and Google Code. When you maintain your programs in a remote source
    repository, use the root of that source repository as your base path.


    For example, if you have a GitHub account at `github.com/user`, it should be your
    base path. LetвҖҷs say you write a package named `"mypackage"` at `github.com/user`;
    your code organization path will be at `%GOPATH%/src/github.com/user/mypackage`.
    When you import this package to other programs, the path for importing the package
    will be `github.com/user/mypackage`. If you maintain the source in your local
    system, you can directly write programs under the `GOPATH src` directory. Suppose
    that you write a package named `mypackage` on a local system; your code organization
    path will be at `%GOPATH%/src/mypackage`, and the path for importing the package
    will be `mypackage`.


    ## Writing Go Programs


    Once you create a workspace and set the `GOPATH` environment variable, you can
    start working with Go. LetвҖҷs write few simple programs in Go to get started.'
