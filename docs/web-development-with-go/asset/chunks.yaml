    В В В В `mysql.Get() //calling method of package "lib/mysql/db"`


    `}`


    Two packages are imported with the same name, `db`, but they are referenced with
    different aliases, and their exported identifiers are accessed using an alias
    name.


    ### Function init


    When you write packages, you may need to provide some initialization logic for
