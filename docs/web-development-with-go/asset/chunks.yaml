    ## Testing Web Applications


    The primary focus of this book is web development in Go, and this section takes
    a look at how to test web applications. The standard library package `net/http/httptest`
    provides the utilities for testing HTTP applications. The `httptest` package provides
    the following struct types that help test HTTP applications:


    *   `ResponseRecorder`

