    `"token":"eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VySW5mbyI6eyJOYW1lIjoic2hpanVAZ21haWwuY29tIiwiUm9sZSI6Im1lbWJlciJ9LCJleHAiOjE0MzgyNTI5MzgsImlzcyI6ImFkbWluIn0.WtdM55KE0cNlj5c2VYwtIUQS8L6UI_ViLiwe0wH_0cpDj0dKkMTMtZ6LSHoIxtZyt92z19WX5gQCi3z-7Mly4kPe5Yvp3IXuDNdgJvBkQvEd_xg0-Vx9bhm_ztf0Hb2CInsVgux49EIxgjFoinwdzrxmM9ZbY7msBYSKutcRKLU"}`


    `}`


    From the JSON response, users can take the JWT from the JSON field `"token"`,
    which can be used for authorizing the HTTP requests to access protected resources
    of the RESTful API.


    JWT has three parts, separated by a `.` (period):


    *   `Header`

    *   `Payload`

    *   `Signature`


    JWT is a JSON-based security encoding that can be decoded to get JSON representation
    of these parts.


    Figure [9-5](#A978-1-4842-1052-9_9_Chapter.html#Fig5) shows the decoded representation
    of the `Header` and `Payload` sections.


    ![A978-1-4842-1052-9_9_Fig5_HTML.jpg](A978-1-4842-1052-9_9_Fig5_HTML.jpg)


    Figure 9-5.


    Decoded JSON representation of JWT


    The `Header` section contains the algorithm used for generating the token, which
    is RS256, and the type, which is JWT. `Payload` carries the JWT claims in which
    you can provide user information, expiration, and other information about the
    JWT.'
  trans: "\n# `common` еҢ…дёӯзҡ„еҲқе§ӢеҢ–йҖ»иҫ‘\n\n`common` еҢ…дёӯзҡ„ `bootstrapper.go` жәҗж–Үд»¶жҸҗдҫӣдәҶдёҖдёӘ `StartUp()`\
    \ еҮҪж•°пјҢз”ЁдәҺеңЁ HTTP жңҚеҠЎеҷЁеҗҜеҠЁеүҚи°ғз”Ёеҝ…иҰҒзҡ„еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮ`main.go` дјҡи°ғз”Ё `common` еҢ…дёӯзҡ„ `StartUp()` еҮҪж•°гҖӮ\n\n\
    жё…еҚ• 9-10 з»ҷеҮәдәҶ `StartUp()` еҮҪж•°зҡ„е®һзҺ°пјҢиҜҘеҮҪж•°дјҡеңЁиҝҗиЎҢ HTTP жңҚеҠЎеҷЁд№ӢеүҚи°ғз”ЁжүҖйңҖзҡ„еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮ\n\n**жё…еҚ• 9-10.** `bootstrapper.go`\
    \ дёӯзҡ„ `StartUp()` еҮҪж•°\n\n```go\npackage common\n\nfunc StartUp() {\n    // еҲқе§ӢеҢ– AppConfig\
    \ еҸҳйҮҸ\n    initConfig()\n    // еҲқе§ӢеҢ–з”ЁдәҺ JWT и®ӨиҜҒзҡ„з§Ғй’Ҙ/е…¬й’Ҙ\n    initKeys()\n    // еҗҜеҠЁдёҖдёӘ\
    \ MongoDB дјҡиҜқ\n    createDbSession()\n    // еҗ‘ MongoDB ж·»еҠ зҙўеј•\n    addIndexes()\n\
    }\n```\n\n# еҗҜеҠЁ HTTP жңҚеҠЎеҷЁ\n\nHTTP жңҚеҠЎеҷЁеңЁ `main.go` дёӯеҲӣе»әгҖӮ\n\nжё…еҚ• 9-11 з»ҷеҮәдәҶ `main.go` зҡ„е®һзҺ°гҖӮ\n\
    \n**жё…еҚ• 9-11.** `main.go` дёӯзҡ„зЁӢеәҸе…ҘеҸЈзӮ№\n\n```go\npackage main\n\nimport (\n    \"log\"\
    \n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
    \n    \"github.com/shijuvar/go-web/taskmanager/routers\"\n)\n\n// зЁӢеәҸе…ҘеҸЈзӮ№\nfunc\
    \ main() {\n    // и°ғз”ЁеҗҜеҠЁйҖ»иҫ‘\n    common.StartUp()\n    // иҺ·еҸ– mux и·Ҝз”ұеҷЁеҜ№иұЎ\n    router\
    \ := routers.InitRoutes()\n    // еҲӣе»әдёҖдёӘ negroni е®һдҫӢ\n    n := negroni.Classic()\n\
    \    n.UseHandler(router)\n    server := &http.Server{\n        Addr:    common.AppConfig.Server,\n\
    \        Handler: n,\n    }\n    log.Println(\"жӯЈеңЁзӣ‘еҗ¬...\")\n    server.ListenAndServe()\n\
    }\n```\n\nHTTP жңҚеҠЎеҷЁеңЁ `main.go` дёӯеҲӣе»әпјҢе…¶дёӯи°ғз”ЁдәҶ `common` еҢ…зҡ„ `StartUp()` еҮҪж•°жқҘжү§иЎҢ RESTful\
    \ API еә”з”Ёзҡ„еҲқе§ӢеҢ–йҖ»иҫ‘гҖӮжҺҘзқҖи°ғз”Ё `routers` еҢ…зҡ„ `InitRoutes()` еҮҪж•°жқҘиҺ·еҸ– `*mux.Router`пјҢз”ЁдәҺеҲӣе»ә `Negroni`\
    \ еӨ„зҗҶеҷЁгҖӮйҖҡиҝҮжҸҗдҫӣ `Negroni` еӨ„зҗҶеҷЁжқҘеҲӣе»ә `http.Server` еҜ№иұЎпјҢжңҖеҗҺеҗҜеҠЁ HTTP жңҚеҠЎеҷЁгҖӮHTTP жңҚеҠЎеҷЁзҡ„дё»жңә URI д»Һ `common.AppConfig`\
    \ дёӯиҜ»еҸ–гҖӮ\n\n## и®ӨиҜҒ\n\nд»ҘдёӢжҳҜеә”з”Ёдёӯе®ҡд№үзҡ„и®ӨиҜҒе·ҘдҪңжөҒзЁӢпјҡ\n\n- з”ЁжҲ·йҖҡиҝҮеҗ‘иө„жәҗ `\"/users/register\"` еҸ‘йҖҒ HTTP\
    \ иҜ·жұӮжқҘжіЁеҶҢеҲ°зі»з»ҹгҖӮ\n- е·ІжіЁеҶҢз”ЁжҲ·еҸҜд»ҘйҖҡиҝҮеҗ‘иө„жәҗ `\"/users/login\"` еҸ‘йҖҒ HTTP иҜ·жұӮжқҘзҷ»еҪ•зі»з»ҹгҖӮ\n- жңҚеҠЎеҷЁйӘҢиҜҒзҷ»еҪ•еҮӯиҜҒпјҢе№¶з”ҹжҲҗдёҖдёӘ\
    \ JWT дҪңдёәи®ҝй—®д»ӨзүҢпјҢз”ЁдәҺи®ҝй—® RESTful API жңҚеҠЎеҷЁзҡ„еҸ—дҝқжҠӨиө„жәҗгҖӮ\n- з”ЁжҲ·еҸҜд»ҘдҪҝз”ЁиҜҘ JWT жқҘи®ҝй—® RESTful API зҡ„еҸ—дҝқжҠӨиө„жәҗгҖӮз”ЁжҲ·еҝ…йЎ»е°ҶжӯӨд»ӨзүҢдҪңдёә\
    \ Bearer д»ӨзүҢпјҢйҖҡиҝҮ HTTP еӨҙ `\"Authorization\"` еҸ‘йҖҒгҖӮ\n\nи®ӨиҜҒе·ҘдҪңжөҒзЁӢе°ҶеңЁеҗҺз»ӯз« иҠӮдёӯжӣҙиҜҰз»Ҷең°жҸҸиҝ°гҖӮ\n\n### з”ҹжҲҗе’ҢйӘҢиҜҒ\
    \ JWT\n\nJWT з”ЁдәҺжҺҲжқғ HTTP иҜ·жұӮд»Ҙи®ҝй—® RESTful API иө„жәҗгҖӮз¬¬дёүж–№еҢ… `jwt-go` з”ЁдәҺеӨ„зҗҶ JWTпјҲеҸӮи§Ғз¬¬ 7 з« пјүгҖӮ`common`\
    \ еҢ…дёӯзҡ„ `auth.go` жәҗж–Үд»¶жҸҗдҫӣдәҶз”ҹжҲҗ JWT д»ҘеҸҠдҪҝз”Ёдёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°йӘҢиҜҒд»ӨзүҢзҡ„еҠҹиғҪгҖӮз¬¬дёүж–№еҢ… `jwt-go` з”ЁдәҺз”ҹжҲҗе’ҢйӘҢиҜҒ JWTпјҢе№¶дҪҝз”Ёз§Ғй’ҘеҜ№\
    \ JWT иҝӣиЎҢзӯҫеҗҚгҖӮеҰӮжһңзҷ»еҪ•з”ЁжҲ·еңЁзі»з»ҹдёӯжҲҗеҠҹйҖҡиҝҮиә«д»ҪйӘҢиҜҒпјҢе°ҶеңЁеӨ„зҗҶиҜ·жұӮ `\"/users/login\"` зҡ„еә”з”ЁеӨ„зҗҶеҮҪж•°дёӯи°ғз”Ёе®ғгҖӮ\n\nжё…еҚ• 9-12\
    \ еұ•зӨәдәҶеңЁ HTTP дёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°дёӯз”ҹжҲҗе’ҢйӘҢиҜҒ JWT зҡ„иҫ…еҠ©еҮҪж•°гҖӮ\n\n**жё…еҚ• 9-12.** `auth.go` дёӯз”ЁдәҺ JWT и®ӨиҜҒзҡ„иҫ…еҠ©еҮҪж•°\n\
    \n```go\npackage common\n\nimport (\n    \"io/ioutil\"\n    \"log\"\n    \"net/http\"\
    \n    \"time\"\n    jwt \"github.com/dgrijalva/jwt-go\"\n)\n\n// дҪҝз”ЁйқһеҜ№з§°еҠ еҜҶ/RSA еҜҶй’Ҙ\n\
    // з§Ғй’Ҙ/е…¬й’Ҙж–Үд»¶дҪҚзҪ®\nconst (\n    // openssl genrsa -out app.rsa 1024\n    privKeyPath\
    \ = \"keys/app.rsa\"\n    // openssl rsa -in app.rsa -pubout > app.rsa.pub\n \
    \   pubKeyPath  = \"keys/app.rsa.pub\"\n)\n\n// з”ЁдәҺзӯҫеҗҚзҡ„з§Ғй’Ҙе’Ңз”ЁдәҺйӘҢиҜҒзҡ„е…¬й’Ҙ\nvar (\n    verifyKey,\
    \ signKey []byte\n)\n\n// еңЁеҗҜеҠЁ http еӨ„зҗҶеҮҪж•°д№ӢеүҚиҜ»еҸ–еҜҶй’Ҙж–Үд»¶\nfunc initKeys() {\n    var err\
    \ error\n    signKey, err = ioutil.ReadFile(privKeyPath)\n    if err != nil {\n\
    \        log.Fatalf(\"[initKeys]: %s\\n\", err)\n    }\n    verifyKey, err = ioutil.ReadFile(pubKeyPath)\n\
    \    if err != nil {\n        log.Fatalf(\"[initKeys]: %s\\n\", err)\n       \
    \ panic(err)\n    }\n}\n\n// з”ҹжҲҗ JWT д»ӨзүҢ\nfunc GenerateJWT(name, role string) (string,\
    \ error) {\n    // дёә rsa 256 еҲӣе»әдёҖдёӘзӯҫеҗҚеҷЁ\n    t := jwt.New(jwt.GetSigningMethod(\"\
    RS256\"))\n    // и®ҫзҪ® JWT д»ӨзүҢзҡ„еЈ°жҳҺпјҲclaimsпјү\n    t.Claims[\"iss\"] = \"admin\"\n  \
    \  t.Claims[\"UserInfo\"] = struct {\n        Name string\n        Role string\n\
    \    }{name, role}\n    // и®ҫзҪ® JWT д»ӨзүҢзҡ„иҝҮжңҹж—¶й—ҙ\n    t.Claims[\"exp\"] = time.Now().Add(time.Minute\
    \ * 20).Unix()\n    tokenString, err := t.SignedString(signKey)\n    if err !=\
    \ nil {\n        return \"\", err\n    }\n    return tokenString, nil\n}\n\n//\
    \ з”ЁдәҺйӘҢиҜҒ JWT д»ӨзүҢзҡ„дёӯй—ҙд»¶\nfunc Authorize(w http.ResponseWriter, r *http.Request, next\
    \ http.HandlerFunc) {\n    // йӘҢиҜҒд»ӨзүҢ\n    token, err := jwt.ParseFromRequest(r,\
    \ func(token *jwt.Token) (interface{}, error) {\n        // дҪҝз”Ёе…¬й’ҘйӘҢиҜҒд»ӨзүҢпјҢе…¬й’ҘжҳҜз§Ғй’Ҙзҡ„еҜ№еә”йғЁеҲҶ\n\
    \        return verifyKey, nil\n    })\n    if err != nil {\n        switch err.(type)\
    \ {\n        case *jwt.ValidationError: // JWT йӘҢиҜҒй”ҷиҜҜ\n            vErr := err.(*jwt.ValidationError)\n\
    \            switch vErr.Errors {\n            case jwt.ValidationErrorExpired:\
    \ // JWT е·ІиҝҮжңҹ\n                DisplayAppError(\n                    w,\n     \
    \               err,\n                    \"и®ҝй—®д»ӨзүҢе·ІиҝҮжңҹпјҢиҜ·иҺ·еҸ–ж–°д»ӨзүҢ\",\n              \
    \      401,\n                )\n                return\n            default:\n\
    \                DisplayAppError(w,\n                    err,\n              \
    \      \"и§Јжһҗи®ҝй—®д»ӨзүҢж—¶еҮәй”ҷпјҒ\",\n                    500,\n                )\n        \
    \        return\n            }\n        default:\n            DisplayAppError(w,\n\
    \                err,\n                \"и§Јжһҗи®ҝй—®д»ӨзүҢж—¶еҮәй”ҷпјҒ\",\n                500)\n\
    \            return\n        }\n    }\n    if token.Valid {\n        next(w, r)\n\
    \    } else {\n        DisplayAppError(w,\n            err,\n            \"ж— ж•Ҳзҡ„и®ҝй—®д»ӨзүҢ\"\
    ,\n            401,\n        )\n    }\n}\n```\n\n#### з”ҹжҲҗ JWT\n\n`GenerateJWT()`\
    \ еҮҪж•°дҪҝз”Ёз§Ғй’Ҙз”ҹжҲҗ JWTгҖӮеңЁ JWT дёҠи®ҫзҪ®дәҶеҗ„з§ҚеЈ°жҳҺпјҲclaimsпјүпјҢеҢ…жӢ¬д»ӨзүҢзҡ„иҝҮжңҹдҝЎжҒҜгҖӮ`go-jwt` еҢ…з”ЁдәҺеҜ№зј–з ҒеҗҺзҡ„е®үе…Ёд»ӨзүҢиҝӣиЎҢзӯҫеҗҚгҖӮеҪ“зҷ»еҪ•иҝҮзЁӢжҲҗеҠҹж—¶пјҢеңЁеӨ„зҗҶиҜ·жұӮ\
    \ `\"/users/login\"` зҡ„еә”з”ЁеӨ„зҗҶеҮҪж•°дёӯдјҡи°ғз”Ё `GenerateJWT()` еҮҪж•°гҖӮ\n\nеҪ“з”ЁжҲ·зҷ»еҪ•зі»з»ҹж—¶пјҢжңҚеҠЎеҷЁдјҡиҝ”еӣһдёҖдёӘеҰӮдёӢзҡ„ JSON\
    \ е“Қеә”пјҡ\n\n```json\n{\"data\":\n    {\"user\":{\"id\":\"55b9f7e13f06221910000001\"\
    ,\"firstname\":\"Shiju\",\"lastname\":\"Varghese\",\"email\":\"shijuvar@gmail.com\"\
    },\n    \"token\":\"eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VySW5mbyI6eyJOYW1lIjoic2hpanVAZ21haWwuY29tIiwiUm9sZSI6Im1lbWJlciJ9LCJleHAiOjE0MzgyNTI5MzgsImlzcyI6ImFkbWluIn0.WtdM55KE0cNlj5c2VYwtIUQS8L6UI_ViLiwe0wH_0cpDj0dKkMTMtZ6LSHoIxtZyt92z19WX5gQCi3z-7Mly4kPe5Yvp3IXuDNdgJvBkQvEd_xg0-Vx9bhm_ztf0Hb2CInsVgux49EIxgjFoinwdzrxmM9ZbY7msBYSKutcRKLU\"\
    }\n}\n```\n\nз”ЁжҲ·еҸҜд»Ҙд»ҺиҝҷдёӘ JSON е“Қеә”дёӯиҺ·еҸ– JSON еӯ—ж®ө `\"token\"` дёӯзҡ„ JWTпјҢиҜҘд»ӨзүҢеҸҜз”ЁдәҺжҺҲжқғ HTTP иҜ·жұӮд»Ҙи®ҝй—®\
    \ RESTful API зҡ„еҸ—дҝқжҠӨиө„жәҗгҖӮ\n\nJWT з”ұдёүйғЁеҲҶз»„жҲҗпјҢз”Ё `.`пјҲеҸҘзӮ№пјүеҲҶйҡ”пјҡ\n- `еӨҙйғЁпјҲHeaderпјү`\n- `иҪҪиҚ·пјҲPayloadпјү`\n\
    - `зӯҫеҗҚпјҲSignatureпјү`\n\nJWT жҳҜдёҖз§ҚеҹәдәҺ JSON зҡ„е®үе…Ёзј–з ҒпјҢеҸҜд»Ҙи§Јз Ғд»ҘиҺ·еҸ–иҝҷдәӣйғЁеҲҶзҡ„ JSON иЎЁзӨәгҖӮ\n\nеӣҫ 9-5 жҳҫзӨәдәҶ`еӨҙйғЁ`е’Ң`иҪҪиҚ·`йғЁеҲҶзҡ„и§Јз ҒиЎЁзӨәгҖӮ\n\
    \n![A978-1-4842-1052-9_9_Fig5_HTML.jpg](img/A978-1-4842-1052-9_9_Fig5_HTML.jpg)\n\
    \n**еӣҫ 9-5.** и§Јз ҒеҗҺзҡ„ JWT JSON иЎЁзӨә\n\n`еӨҙйғЁ`йғЁеҲҶеҢ…еҗ«з”ҹжҲҗд»ӨзүҢжүҖдҪҝз”Ёзҡ„з®—жі•пјҲиҝҷйҮҢжҳҜ RS256пјүд»ҘеҸҠзұ»еһӢпјҲJWTпјүгҖӮ`иҪҪиҚ·`йғЁеҲҶжҗәеёҰ\
    \ JWT зҡ„еЈ°жҳҺпјҲclaimsпјүпјҢжӮЁеҸҜд»ҘеңЁе…¶дёӯжҸҗдҫӣз”ЁжҲ·дҝЎжҒҜгҖҒиҝҮжңҹж—¶й—ҙд»ҘеҸҠе…¶д»–е…ідәҺ JWT зҡ„дҝЎжҒҜгҖӮ\n"
- fmt: "#### Sending JWT to the Server\n\nWhen users successfully log in to the system,\
    \ they provide a JWT as the access token to authorize the subsequent HTTP requests\
    \ to the API server. So whenever HTTP requests are sent to access protected resources,\
    \ the JWT must be provided in the HTTP request to get authorization to the API\
    \ server. Once the login process is successfully completed, the returned token\
    \ string can be put into any kind of client storage to be easily accessed whenever\
    \ HTTP requests are sent to access the resources of the RESTful API.\n\nIn front-end\
    \ web applications, you can use HTML5 Web Storage (`localStorage/sessionStorage`)\
    \ or web cookies to persist the JWT. But you should consider the security aspects\
    \ when you put JWT into various kinds of client application storage.\n\nWhen you\
    \ send HTTP requests to access RESTful API resources, you must provide a bearer\
    \ token in the HTTP request header `\"Authorization\"`.\n\nHere is the format\
    \ for sending a JWT string with the `\"Authorization\"` header:\n\n`\"Authorization\"\
    : \"Bearer token_string\"`\n\nHere is an example that provides a JWT as a bearer\
    \ token with the `\"Authorization\"` header:\n\n`\"Authorization\":\"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWV9.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ\"\
    `\n\n#### Authorizing JWT\n\nThe `Authorize` middleware handler function authorizes\
    \ HTTP requests, which validate whether the HTTP request has a valid JWT in the\
    \ `\"Authorization\"` header as a bearer token. The `ParseFromRequest` helper\
    \ function of the `go-jwt` package is used to verify the token with a public key.\
    \ In this application, one private key is used to sign the tokens, so its public\
    \ counterpart is also used to verify the token:\n\n```\ntoken, err := jwt.ParseFromRequest(r,\
    \ func(token *jwt.Token) (interface{}, error) {\n    return verifyKey, nil\n})\n\
    ```\n\nIf the request has a valid token, the middleware function calls the next\
    \ handler in the middleware stack. If the token is invalid, the `DisplayAppError`\
    \ helper function is called to display HTTP errors in JSON format. When the `DisplayAppError`\
    \ function is called, the error value is provided a custom message for the error\
    \ and an HTTP status code. The HTTP status code 401 represents the HTTP status\
    \ `\"Unauthorized\"`:\n\n```\nif token.Valid {\n    next(w, r)\n} else {\n   \
    \ w.WriteHeader(http.StatusUnauthorized)\n    DisplayAppError(\n        w,\n \
    \       err,\n        \"Invalid Access Token\",\n        401,\n    )\n}\n```\n\
    \nWhen `next(w, r)` is called, it calls the next handler function. The `Negroni`\
    \ package is called for the middleware stack and uses the signature `func (http.ResponseWriter,\
