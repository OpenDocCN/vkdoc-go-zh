    \ package returns the route variables for the current request. With a route value\
    \ of `id`, the `Note` object is retrieved from the `noteStore` map, and the value\
    \ of `CreatedOn` is copied to the `Note` object.\n\nHere the existing `Note` object\
    \ is removed and added into the `noteStore` map for the sake of update functionality.\
    \ Everything else is implemented the same way as the `HTTP Post` operation:\n\n\
    ```go\n//HTTP Put - /api/notes/{id}\n\nfunc PutNoteHandler(w http.ResponseWriter,\
    \ r *http.Request) {\n\n    var err error\n\n    vars := mux.Vars(r)\n\n    k\
    \ := vars[\"id\"]\n\n    var noteToUpd Note\n\n    // Decode the incoming Note\
    \ json\n\n    err = json.NewDecoder(r.Body).Decode(&noteToUpd)\n\n    if err !=\
    \ nil {\n\n        panic(err)\n\n    }\n\n    if note, ok := noteStore[k]; ok\
    \ {\n\n        noteToUpd.CreatedOn = note.CreatedOn\n\n        //delete existing\
    \ item and add the updated item\n\n        delete(noteStore, k)\n\n        noteStore[k]\
    \ = noteToUpd\n\n    } else {\n\n        log.Printf(\"Could not find key of Note\
    \ %s to delete\", k)\n\n    }\n\n    w.WriteHeader(http.StatusNoContent)\n\n}\n\
    ```\n\nSimilar to the `HTTP Put` operation for the `Note` resource, the route\
    \ value of `id` is taken and the `Note` object is removed from the `noteStore`\
    \ map by using the key value from the route variable `id`:\n\n```go\n//HTTP Delete\
    \ - /api/notes/{id}\n\nfunc DeleteNoteHandler(w http.ResponseWriter, r *http.Request)\
    \ {\n\n    vars := mux.Vars(r)\n\n    k := vars[\"id\"]\n\n    // Remove from\
    \ Store\n\n    if _, ok := noteStore[k]; ok {\n\n        //delete existing item\n\
    \n        delete(noteStore, k)\n\n    } else {\n\n        log.Printf(\"Could not\
    \ find key of Note %s to delete\", k)\n\n    }\n\n    w.WriteHeader(http.StatusNoContent)\n\
    \n}\n```\n\nThis example application demonstrated the fundamental concepts for\
