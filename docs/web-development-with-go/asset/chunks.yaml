    В В В В `"html/template"`


    В В В В `"log"`


    В В В В `"os"`


    `)`


    `func main() {`


    В В В В ``t, err := template.New("test").Parse(`{{define "T"}}Hello, {{.}}!{{end}}`)``


    В В В В `err = t.ExecuteTemplate(os.Stdout, "T", "<script>alert(вҖҷXSS InjectionвҖҷ)</script>")`


    В В В В `if err != nil {`


    В В В В В В В В `log.Fatal("Execute: ", err)`


    В В В В `}`


    `}`


    You should get the following output:


    `Hello,` `&` `lt;script` `&` `gt;alert(` `&` `#39;XSS Injection` `&` `#39;)` `&`
    `lt;/script` `&` `gt;!`


    The template securely encodes the output where it replaces the script blocks with
    corresponding text.


