    `func NewServeMux() *ServeMux { return &ServeMux{m: make(map[string]muxEntry)}
    }`


    The `http` package provides a couple of shortcut methods for working with `DefaultServeMux`:
    `http.Handle` and `http.HandleFunc`. The `http.Handle` function registers the
    handler for the given pattern in `DefaultServeMux`, and `http.HandleFunc` registers
