- fmt: "## Introduction to HTTP Middleware\n\nWhen you build web applications, you\
    \ might need some shared functionality to be executed for some or all HTTP request\
    \ handlers. For example, letвҖҷs say that you want to log all HTTP requests into\
    \ a web server; implementing logic for logging for every HTTP request handler\
    \ would be a tedious job. It would be great to use special kinds of handlers to\
    \ implement shared behaviors and to be applied to some or all of the application\
    \ handlers. By using HTTP middleware, you can implement this kind of functionality\
    \ into your web applications. Using HTTP middleware handlers is a great way to\
    \ implement shared behaviors into your applications.\n\nMiddleware is a pluggable\
    \ and self-contained piece of code that wraps a web application. It can be used\
    \ to implement shared behaviors into HTTP request handlers. The middleware components\
    \ can be plugged into applications to work as another layer in the request-handling\
    \ cycle, which can execute some logic before or after HTTP request handlers. For\
    \ example, to log all HTTP requests, you can write logging middleware that can\
    \ decorate into the request handlers, in which it does apply the logging functionality\
    \ for each HTTP request to the web server. It doesnвҖҷt affect your application\
    \ logic because it is an independent piece of code. You can decorate the middleware\
    \ components into HTTP request handlers whenever you need to, and you can remove\
