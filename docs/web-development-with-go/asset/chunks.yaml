    \ client applications need to send data in JSON format, and the server sends the\
    \ responses in JSON as well. To work with JSON API standards (`http://jsonapi.org`),\
    \ resource models are defined for sending and receiving data in formatted JSON.\
    \ `\"data\"` is defined as the root element for all JSON representations.\n\n\
    Listing [9-15](#A978-1-4842-1052-9_9_Chapter.html#FPar16) shows the resource models\
    \ to be used with the `Users` resource.\n\n**Listing 9-15.** JSON Resources for\
    \ Working with `/users` in `resources.go`\n\n```\npackage controllers\n\nimport\
    \ (\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\n)\n\ntype (\n\t//For\
    \ Post - /user/register\n\tUserResource struct {\n\t\tData models.User `json:\"\
    data\"`\n\t}\n\n\t//For Post - /user/login\n\tLoginResource struct {\n\t\tData\
    \ LoginModel `json:\"data\"`\n\t}\n\n\t// Response for authorized user Post -\
    \ /user/login\n\tAuthUserResource struct {\n\t\tData AuthUserModel `json:\"data\"\
    `\n\t}\n\n\t//Model for authentication\n\tLoginModel struct {\n\t\tEmail    string\
    \ `json:\"email\"`\n\t\tPassword string `json:\"password\"`\n\t}\n\n\t//Model\
    \ for authorized user with access token\n\tAuthUserModel struct {\n\t\tUser  models.User\
    \ `json:\"user\"`\n\t\tToken string      `json:\"token\"`\n\t}\n)\n```\n\n###\
    \ Handlers for the Users Resource\n\nApplication handler functions for the `Users`\
    \ resource are written in the `userController.go` source file, which is organized\
    \ in the `controllers` package.\n\nListing [9-16](#A978-1-4842-1052-9_9_Chapter.html#FPar17)\
    \ provides the implementation of handler functions for the `Users` resource.\n\
    \n**Listing 9-16.** Application Handler Functions in `userController.go`\n\n```\n\
    package controllers\n\nimport (\n\t\"encoding/json\"\n\t\"net/http\"\n\t\"github.com/shijuvar/go-web/taskmanager/common\"\
    \n\t\"github.com/shijuvar/go-web/taskmanager/data\"\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\
    \n)\n\n// Handler for HTTP Post - \"/users/register\"\n// Add a new User document\n\
    func Register(w http.ResponseWriter, r *http.Request) {\n\tvar dataResource UserResource\n\
    \t// Decode the incoming User json\n\terr := json.NewDecoder(r.Body).Decode(&dataResource)\n\
    \tif err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"\
    Invalid User data\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\tuser := &dataResource.Data\n\
    \tcontext := NewContext()\n\tdefer context.Close()\n\tc := context.DbCollection(\"\
    users\")\n\trepo := &data.UserRepository{c}\n\t// Insert User document\n\trepo.CreateUser(user)\n\
    \t// Clean-up the hashpassword to eliminate it from response\n\tuser.HashPassword\
    \ = nil\n\tif j, err := json.Marshal(UserResource{Data: *user}); err != nil {\n\
    \t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"An unexpected error\
    \ has occurred\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t} else {\n\t\tw.Header().Set(\"\
    Content-Type\", \"application/json\")\n\t\tw.WriteHeader(http.StatusCreated)\n\
    \t\tw.Write(j)\n\t}\n}\n\n// Handler for HTTP Post - \"/users/login\"\n// Authenticate\
    \ with username and apssword\nfunc Login(w http.ResponseWriter, r *http.Request)\
    \ {\n\tvar dataResource LoginResource\n\tvar token string\n\t// Decode the incoming\
