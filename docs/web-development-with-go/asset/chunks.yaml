    `Go`пјҢйҖҡеёёиў«з§°дёә`Golang`пјҢжҳҜдёҖз§ҚйҖҡз”Ёзј–зЁӢиҜӯиЁҖпјҢз”ұи°·жӯҢдәҺ 2009 е№ҙ 11 жңҲејҖеҸ‘гҖӮ


    жңүеӨҡз§Қзј–зЁӢиҜӯиЁҖеҸҜз”ЁдәҺзј–еҶҷдёҚеҗҢзұ»еһӢзҡ„иҪҜд»¶зі»з»ҹпјҢе…¶дёӯдёҖдәӣиҜӯиЁҖе·Із»ҸеӯҳеңЁдәҶеҮ еҚҒе№ҙгҖӮдёҖдәӣдё»жөҒзј–зЁӢиҜӯиЁҖйҖҡиҝҮеңЁе…¶ж–°зүҲжң¬дёӯж·»еҠ ж–°зү№жҖ§иҖҢдёҚж–ӯжј”иҝӣпјҢжҜҸдёӘзүҲжң¬йғҪдјҡеҸ‘еёғи®ёеӨҡж–°еҠҹиғҪгҖӮ`C#`е’Ң`Java`йғҪеңЁе…¶иҜӯиЁҖи§„иҢғдёӯжҸҗдҫӣдәҶиҝҮеӨҡзҡ„зү№жҖ§гҖӮ


    дёҺжӯӨеҗҢж—¶пјҢи®Ўз®—жңәзЎ¬д»¶е’Ң IT еҹәзЎҖи®ҫж–Ҫд№ҹеңЁдёҚж–ӯеҲӣж–°е’ҢеҸ‘еұ•гҖӮиҪҜд»¶зі»з»ҹдҪҝз”ЁеҠҹиғҪдё°еҜҢзҡ„зј–зЁӢиҜӯиЁҖзј–еҶҷпјҢдҪҶеҖҹеҠ©е®ғд»¬пјҢжҲ‘д»¬ж— жі•е……еҲҶеҲ©з”ЁзҺ°д»Ји®Ўз®—жңәе’Ң IT еҹәзЎҖи®ҫж–Ҫзҡ„иғҪеҠӣгҖӮжҲ‘д»¬дҪҝз”Ёзҡ„зј–зЁӢиҜӯиЁҖиҜһз”ҹдәҺеҚ•ж ёжңәеҷЁж—¶д»ЈпјҢиҖҢзҺ°еңЁжҲ‘д»¬дҪҝз”ЁиҝҷдәӣиҜӯиЁҖдёәеӨҡж ёжңәеҷЁзј–еҶҷеә”з”ЁзЁӢеәҸгҖӮ


    дёҺе…¶д»–дәӢзү©дёҖж ·пјҢи®Ўз®—жңәзј–зЁӢиҜӯиЁҖд№ҹеңЁдёҚж–ӯеҸ‘еұ•гҖӮ`Go`жҳҜдёҖз§ҚиҝӣеҢ–еһӢиҜӯиЁҖпјҢе®ғдҪҝз”Ёз®ҖжҙҒе®һз”Ёзҡ„зј–зЁӢиҜӯиЁҖпјҢдёәзҺ°д»Ји®Ўз®—жңәе’Ң IT еҹәзЎҖи®ҫж–Ҫзј–еҶҷиҪҜд»¶зі»з»ҹгҖӮеңЁ`Go`е®ҳзҪ‘[`https://golang.org/`](https://golang.org/)дёҠпјҢ`Go`иў«е®ҡд№үдёәпјҡвҖң`Go`жҳҜдёҖз§ҚејҖжәҗзј–зЁӢиҜӯиЁҖпјҢеҸҜд»ҘиҪ»жқҫжһ„е»әз®ҖеҚ•гҖҒеҸҜйқ дё”й«ҳж•Ҳзҡ„иҪҜд»¶гҖӮвҖқ


    `Go`ж—ЁеңЁи§ЈеҶіе®һйҷ…й—®йўҳпјҢиҖҢйқһеӯҰжңҜзҗҶи®әжҲ–жҷәеҠӣжҖқиҫЁгҖӮ`Go`жҳҜдёҖз§Қе®һз”Ёзҡ„зј–зЁӢиҜӯиЁҖпјҢе®ғеҝҪз•ҘдәҶеңЁиҝҮеҺ»дёүеҚҒе№ҙдёӯеҸ‘еұ•иө·жқҘзҡ„зј–зЁӢиҜӯиЁҖзҗҶи®әпјҲ`PLT`пјүпјӣе®ғжҸҗдҫӣдәҶдёҖз§Қз®ҖеҚ•зҡ„зј–зЁӢжЁЎеһӢпјҢз”ЁдәҺжһ„е»әй«ҳж•Ҳзҡ„иҪҜд»¶зі»з»ҹпјҢе№¶еҶ…зҪ®дәҶеҜ№е№¶еҸ‘зҡ„дёҖзӯүж”ҜжҢҒгҖӮ`Go`еҶ…зҪ®зҡ„е№¶еҸ‘зү№жҖ§дёәдҪ жҸҗдҫӣдәҶд»Өдәәе…ҙеҘӢзҡ„зј–зЁӢдҪ“йӘҢпјҢдҪҝдҪ иғҪеӨҹеҲ©з”Ёе№¶еҸ‘зј–еҶҷеҮәй«ҳж•Ҳзҡ„иҪҜд»¶зі»з»ҹгҖӮжҜҸз§Қзј–зЁӢиҜӯиЁҖйғҪжңүе…¶и®ҫи®Ўзӣ®ж ҮгҖӮ`Go`иў«и®ҫи®ЎжҲҗдёҖз§Қз®ҖеҚ•зҡ„зј–зЁӢиҜӯиЁҖпјҢе№¶дё”е®ғдҪңдёәдёҖз§Қз®ҖеҚ•е®һз”Ёзҡ„иҜӯиЁҖиЎЁзҺ°еҮәиүІгҖӮ


    `Go`жҳҜжһ„е»әдј—еӨҡеҲӣж–°иҪҜд»¶зі»з»ҹзҡ„йҰ–йҖүиҜӯиЁҖпјҢеҢ…жӢ¬`Docker`гҖҒ`Kubernetes`зӯүгҖӮи®ёеӨҡзҺ°жңүзі»з»ҹпјҲдҫӢеҰӮ Facebook зҡ„`Parse MBaaS`пјүжӯЈеңЁз”Ё`Go`иҝӣиЎҢйҮҚжһ„гҖӮжҲ‘жӣҫеҚҸеҠ©еӨҡе®¶з»„з»ҮжҲҗеҠҹйҮҮз”Ё`Go`пјҢз”ұдәҺ`Go`зҡ„з®ҖжҙҒжҖ§е’Ңе®һз”ЁжҖ§пјҢйҮҮз”ЁиҝҮзЁӢйқһеёёйЎәеҲ©гҖӮжҲ‘зӣёдҝЎпјҢеҪ“дҪ ејҖеҸ‘зңҹе®һзҡ„иҪҜд»¶зі»з»ҹж—¶пјҢдҪ дјҡеҜ№`Go`ж„ҹеҲ°е…ҙеҘӢгҖӮ


    `Go`жҳҜдёҖз§ҚйҖҡз”Ёзј–зЁӢиҜӯиЁҖпјҢеҸҜз”ЁдәҺжһ„е»әеҗ„з§ҚиҪҜд»¶зі»з»ҹпјҢеҢ…жӢ¬зҪ‘з»ңжңҚеҠЎеҷЁгҖҒзі»з»ҹзә§еә”з”ЁзЁӢеәҸгҖҒеҹәзЎҖи®ҫж–Ҫе·Ҙе…·гҖҒ`DevOps`гҖҒеҺҹз”ҹз§»еҠЁеә”з”ЁгҖҒеӣҫеҪўеӨ„зҗҶгҖҒзү©иҒ”зҪ‘пјҲ`IoT`пјүд»ҘеҸҠжңәеҷЁеӯҰд№ гҖӮ`Go`иҝҳеҸҜз”ЁдәҺжһ„е»әеҺҹз”ҹз§»еҠЁеә”з”ЁзЁӢеәҸпјҢжҲ‘йў„жөӢеңЁдёҚд№…зҡ„е°ҶжқҘпјҢ`Go`е°ҶжҲҗдёәжһ„е»әеҺҹз”ҹе®үеҚ“еә”з”Ёзҡ„з»қдҪійҖүжӢ©гҖӮ


    `Go`жҳҜжһ„е»ә Web еә”з”ЁзЁӢеәҸе’ҢеҗҺз«Ҝ`API`зҡ„з»қдҪіиҜӯиЁҖйҖүжӢ©гҖӮжҲ‘ејәзғҲжҺЁиҚҗдҪҝз”Ё`Go`жһ„е»әеҸҜеӨ§и§„жЁЎжү©еұ•зҡ„еҗҺз«Ҝ`RESTful API`гҖӮжҲ‘йў„жөӢпјҢеңЁдјҒдёҡдёӯпјҢ`Go`е°ҶжҲҗдёәжһ„е»әеҗҺз«Ҝ`RESTful
    API`зҡ„йҰ–йҖүиҜӯиЁҖпјҢиҖҢ`RESTful API`жҳҜжһ„е»әзҺ°д»ЈдёҡеҠЎеә”з”ЁзЁӢеәҸзҡ„йӘЁе№ІпјҢе°Өе…¶жҳҜеңЁиҝҷдёӘз§»еҠЁж—¶д»ЈгҖӮ


    еңЁжң¬д№ҰдёӯпјҢжҲ‘еҒҮи®ҫдҪ иҮіе°‘жҺҢжҸЎдёҖз§Қзј–зЁӢиҜӯиЁҖпјҢе№¶е…·еӨҮдёҖе®ҡзҡ„ Web зј–зЁӢз»ҸйӘҢгҖӮеҰӮжһңдҪ еҜ№`Go`жңүеҲқжӯҘдәҶи§ЈпјҢе°ҶжңүеҠ©дәҺдҪ йҳ…иҜ»жң¬д№ҰгҖӮеҰӮжһңдҪ е®Ңе…ЁжҳҜ`Go`ж–°жүӢпјҢжҲ‘е»әи®®дҪ еңЁејҖе§Ӣйҳ…иҜ»жң¬д№Ұд№ӢеүҚе…ҲеӯҰд№ д»ҘдёӢж•ҷзЁӢпјҡ[`http://tour.golang.org/welcome/1`](http://tour.golang.org/welcome/1)гҖӮ


    еңЁеӯҰд№ иҜӯиЁҖеҹәзЎҖж—¶пјҢжҲ‘е»әи®®дҪ жҹҘйҳ…`Go`ж–ҮжЎЈзҡ„д»ҘдёӢйғЁеҲҶпјҡ[`https://golang.org/doc/effective_go.html`](https://golang.org/doc/effective_go.html)гҖӮ


    жң¬д№Ұзҡ„дё»иҰҒйҮҚзӮ№жҳҜдҪҝз”Ё`Go`зј–зЁӢиҜӯиЁҖиҝӣиЎҢ Web ејҖеҸ‘гҖӮеңЁж·ұе…ҘжҺўи®Ё Web ејҖеҸ‘д№ӢеүҚпјҢжң¬д№Ұдјҡеҝ«йҖҹд»Ӣз»ҚиҜӯиЁҖеҹәзЎҖе’Ңе№¶еҸ‘зү№жҖ§пјҢдҪҶдёҚдјҡж·ұе…ҘжҺўи®ЁпјҢе°Өе…¶жҳҜеңЁе№¶еҸ‘ж–№йқўгҖӮеҰӮжһңдҪ жғіеңЁе®һйҷ…еә”з”Ёдёӯжңүж•ҲеҲ©з”Ёе№¶еҸ‘пјҢдҪ еә”иҜҘиҠұдәӣж—¶й—ҙж·ұе…ҘжҺўзҙўгҖӮжҲ‘жҺЁиҚҗд»ҘдёӢиө„жәҗжқҘеӯҰд№ жӣҙеӨҡе…ідәҺе№¶еҸ‘дёҺе№¶иЎҢзҡ„зҹҘиҜҶпјҡ[`http://blog.golang.org/concurrency-is-not-parallelism`](http://blog.golang.org/concurrency-is-not-parallelism)гҖӮ


    жң¬д№ҰжҺўи®ЁдәҶ`Go` Web зј–зЁӢзҡ„еҗ„дёӘж–№йқўпјҢе№¶йҮҚзӮ№жҸҗдҫӣдәҶе®һз”Ёд»Јз ҒгҖӮ[з¬¬ 9 з« ](#A978-1-4842-1052-9_9_Chapter.html)вҖңжһ„е»ә
    RESTful жңҚеҠЎвҖқеҸҜд»Ҙеё®еҠ©дҪ ејҖе§ӢдҪҝз”Ё`Go`ејҖеҸ‘зңҹе®һзҡ„`API`гҖӮ


    жҲ‘дёәжң¬д№ҰеҲӣе»әдәҶдёҖдёӘ`GitHub`д»“еә“пјҢең°еқҖдёә[`https://github.com/shijuvar/go-web`](https://github.com/shijuvar/go-web)гҖӮиҜҘд»“еә“жҸҗдҫӣдәҶжң¬д№Ұзҡ„зӨәдҫӢд»Јз ҒпјҢе№¶еңЁдёҚд№…зҡ„е°ҶжқҘдјҡжҸҗдҫӣдёҖдәӣзӨәдҫӢеә”з”ЁзЁӢеәҸпјҢд»Ҙеё®еҠ©дҪ жһ„е»әзңҹе®һзҡ„
    Web еә”з”ЁзЁӢеәҸгҖӮ'
  raw: 'Go, often referred to as Golang, is a general-purpose programming language
    that was developed at Google in November 2009.


    Several programming languages are available for writing different kinds of software
    systems, and some languages have existed for decades. Some mainstream programming
    languages are evolving by adding new features in their newer versions, which are
    released with many new features in each version. Both C# and Java provide too
    many features in their language specification.


    At the same time, lots of innovations and evolutions are happening for the computer
    hardware and IT infrastructure. Software systems are written with feature-rich
    programming languages, but we canвҖҷt leverage the power of modern computers and
    IT infrastructures by using them. We are using programming languages that were
    created in the era of single-core machines, and now we write applications for
    multicore machines using these languages.


    Just like everything else, computer programming languages are evolving. Go is
    an evolutionary language for writing software systems for modern computers and
    IT infrastructures using a simple and pragmatic programming language. On the Go
    web site at [`https://golang.org/`](https://golang.org/) , Go is defined as follows:
    вҖңGo is an open source programming language that makes it easy to build simple,
    reliable, and efficient software.вҖқ


    Go is designed for solving real-world problems instead of academic theories and
    intellectual thoughts. Go is a pragmatic programming language that ignores the
    programming language theory (PLT) that has evolved in the last three decades;
    it provides a simple programming model for building efficient software systems
    with first-class support for concurrency. GoвҖҷs built-in Concurrency feature gives
    you an exciting programming experience for writing highly efficient software systems
    by leveraging concurrency. For every programming language, there is a design goal.
    Go is designed to be a simple programming language, and it excels as a simple
    and pragmatic language.


    Go is the language of choice for building many innovative software systems, including
    Docker, Kubernetes, and others. Like Parse MBaaS by Facebook, many existing systems
    are re-engineering to Go. I have assisted several organizations to successfully
    adopt Go, and the adoption process was extremely easy thanks to GoвҖҷs simplicity
    and pragmatism. I am sure that you will be excited about Go when you develop real-world
    software systems.


    Go is a general-purpose programming language that can be used to build a variety
    of software systems, including networked servers, system-level applications, infrastructure
    tools, DevOps, native mobile applications, graphics, the Internet of Things (IoT),
    and machine learning. Go can be used for building native mobile applications,
    and I predict that Go will be a great choice for building native Android applications
    in the near future.


    Go is a great choice of language for building web applications and back-end APIs.
    I highly recommend Go for building massively scalable back-end RESTful APIs. I
    predict that Go will be the language of choice in the enterprises for building
    back-end RESTful APIs, the backbone for building modern business applications
    in this mobility era.


    In this book, I assume that you have knowledge of at least one programming language
    and have some experience in web programming. If you have prior knowledge of Go,
    it will help you follow along in this book. If you are completely new to Go, I
    recommend the following tutorial before you start reading the book: [`http://tour.golang.org/welcome/1`](http://tour.golang.org/welcome/1)
    .


    When you go through the language fundamentals, I recommend accessing the following
    section of the Go documentation: [`https://golang.org/doc/effective_go.html`](https://golang.org/doc/effective_go.html)
    .


    The primary focus of this book is web development using the Go programming language.
    Before diving into web development, the book quickly goes through language fundamentals
    and concurrency, but doesnвҖҷt delve too deeply, especially regarding concurrency.
    You should spend some time exploring concurrency if you want to effectively leverage
    it for your real-world applications. I recommend the following resource for learning
    more about concurrency and parallelism: [`http://blog.golang.org/concurrency-is-not-parallelism`](http://blog.golang.org/concurrency-is-not-parallelism)
    .


    This book explores various aspects of Go web programming, with a focus on providing
    practical code. [Chapter 9](#A978-1-4842-1052-9_9_Chapter.html), вҖңBuilding RESTful
    Services,вҖқ can help you to start developing real-world APIs in Go.


    I have created a GitHub repository for this book at [`https://github.com/shijuvar/go-web`](https://github.com/shijuvar/go-web)
    . The repository provides example code for the book and a few example applications
    in the near future to help you build real-world web applications.'
