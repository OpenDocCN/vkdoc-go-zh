    \nFigure 10-4. Directory structure of the refactored application from Listing\
    \ [10-8](#A978-1-4842-1052-9_10_Chapter.html#FPar8)\n\nListing [10-8](#A978-1-4842-1052-9_10_Chapter.html#FPar8)\
    \ implemented everything in a single source file: `main.go` in the `main` package.\
    \ In the refactored application, code is implemented in two packages: `lib` and\
    \ `main`. The `main` package contains the `main.go` file that provides the entry\
    \ point of the application, and all application logic is moved into the `lib`\
    \ package.\n\nThe `lib` package contains the following source files:\n\n- `handlers.go`\
    \ contains the HTTP handlers and provides the implementation for setting up routes\
    \ with `Gorilla mux`.\n- `repository.go` contains the persistence logic and persistence\
    \ store.\n\nOther source files in the `lib` directory provide implementation for\
    \ automated tests for BDD, but they are put in the `lib_test` package. (This topic\
    \ is discussed later in the chapter.)\n\nListing [10-11](#A978-1-4842-1052-9_10_Chapter.html#FPar11)\
    \ provides the `handlers.go` code in the `lib` package.\n\nListing 10-11. `handlers.go`\
    \ in the `lib` Package\n\n```\npackage lib\n\nimport (\n\t\"encoding/json\"\n\t\
    \"net/http\"\n\t\"github.com/gorilla/mux\"\n)\n\nfunc GetUsers(repo UserRepository)\
    \ http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)\
    \ {\n\t\tuserStore := repo.GetAll()\n\t\tusers, err := json.Marshal(userStore)\n\
    \t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\
    \treturn\n\t\t}\n\t\tw.Header().Set(\"Content-Type\", \"application/json\")\n\t\
    \tw.WriteHeader(http.StatusOK)\n\t\tw.Write(users)\n\t})\n}\n\nfunc CreateUser(repo\
    \ UserRepository) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter,\
    \ r *http.Request) {\n\t\tvar user User\n\t\terr := json.NewDecoder(r.Body).Decode(&user)\n\
    \t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\
    \treturn\n\t\t}\n\t\terr = repo.Create(user)\n\t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusBadRequest)\n\
    \t\t\treturn\n\t\t}\n\t\tw.WriteHeader(http.StatusCreated)\n\t})\n}\n\nfunc SetUserRoutes()\
    \ *mux.Router {\n\tuserRepository := NewInMemoryUserRepo()\n\tr := mux.NewRouter()\n\
    \tr.Handle(\"/users\", CreateUser(userRepository)).Methods(\"POST\")\n\tr.Handle(\"\
    /users\", GetUsers(userRepository)).Methods(\"GET\")\n\treturn r\n}\n```\n\nThe\
    \ HTTP handler functions are refactored to obtain a parameter value that implements\
    \ the persistence logic. The handler functions return an `http.Handler` by calling\
    \ `http.HandlerFunc`. The handler functions have a parameter of `UserRepository`\
    \ type, which is an interface defined in the `repository.go` file. Because it\
    \ is an interface, you can provide any concrete implementation for this type.\
    \ For example, you can provide implementations of the `UserRepository` type for\
    \ application code and for automated tests separately, which provides better code\
    \ testability. For application code, you can provide an implementation of the\
    \ `UserRepository` interface to implement the persistence logic on a real database.\
    \ But when you call handler functions from automated tests, you can provide a\
    \ fake implementation of the `UserRepository` interface to mimic the functionality\
    \ when you donвҖҷt need to hit the real database. When you write tests, you may\
    \ need to mock the interfaces in many places like this one.\n\nListing [10-12](#A978-1-4842-1052-9_10_Chapter.html#FPar12)\
    \ provides the source code of `repository.go` in the `lib` package.\n\nListing\
    \ 10-12. `repository.go` in the `lib` Package\n\n```\npackage lib\n\nimport (\n\
    \t\"errors\"\n)\n\ntype User struct {\n\tFirstName string `json:\"firstname\"\
    `\n\tLastName  string `json:\"lastname\"`\n\tEmail     string `json:\"email\"\
    `\n}\n\ntype UserRepository interface {\n\tGetAll() []User\n\tCreate(User) error\n\
    \tValidate(User) error\n}\n\ntype InMemoryUserRepository struct {\n\tDataStore\
    \ []User\n}\n\nfunc (repo *InMemoryUserRepository) GetAll() []User {\n\treturn\
    \ repo.DataStore\n}\n```"
