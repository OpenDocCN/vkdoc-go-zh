    `taskRouter.HandleFunc("/tasks/users/{id}", controllers.GetTasksByUser).Methods("GET")`


    `taskRouter.HandleFunc("/tasks/{id}", controllers.DeleteTask).Methods("DELETE")`


    `router.PathPrefix("/tasks").Handler(negroni.New(`


    `negroni.HandlerFunc(common.Authorize),`


    `negroni.Wrap(taskRouter),`


    `))`


    The requests to the URL path `"/tasks"` are decorated with an authorization middleware
    handler named `Authorize`, which is provided by the `Negroni` stack. Authenticated
    users can create `Tasks` by providing the JWT in the HTTP requests as an access
    token to the Server.


