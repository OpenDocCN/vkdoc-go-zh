    You should see the following output:


    `Key: cs Value: CSharp`


    `Key: rb Value: Ruby`


    `Key: py Value: Python`


    `Key: js Value: JavaScript`


    `Key: go Value: Golang`


    Note


    The data order will vary every time because a map is an unordered collection.


    You can access the value of an element from a map by providing the key (see Listing
    [2-27](#A978-1-4842-1052-9_2_Chapter.html#FPar30)):


    Listing 2-27.В В Accessing the Value of an Element from a Map


