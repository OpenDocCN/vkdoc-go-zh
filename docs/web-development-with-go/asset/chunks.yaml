    ејҖеҸ‘еҸҜйқ зҡ„иҪҜд»¶зі»з»ҹе№¶й•ҝжңҹз»ҙжҠӨе№¶йқһжҳ“дәӢгҖӮеңЁејҖеҸ‘еә”з”Ёж—¶пјҢдҪ еҝ…йЎ»зЎ®дҝқе®ғд»¬жҜҸж¬ЎйғҪиғҪжҢүйў„жңҹе·ҘдҪңгҖӮдёҖдёӘеҘҪзҡ„иҪҜд»¶зі»з»ҹеә”иҜҘжҳҜеҸҜз»ҙжҠӨзҡ„пјҢд»ҘдҫҝдҪ иғҪйҡҸж—¶дҝ®ж”№еә”з”Ёзҡ„еҠҹиғҪиҖҢдёҚдјҡз ҙеқҸеә”з”Ёзҡ„д»»дҪ•йғЁеҲҶгҖӮеҪ“дҪ дҝ®ж”№еә”з”Ёзҡ„жҹҗдәӣйғЁеҲҶж—¶пјҢдёҚеә”з ҙеқҸе…¶д»–йғЁеҲҶзҡ„еҠҹиғҪгҖӮеӣ жӯӨпјҢдҪ йңҖиҰҒйҮҮз”ЁиүҜеҘҪзҡ„иҪҜд»¶е·ҘзЁӢе®һи·өжқҘзЎ®дҝқеә”з”ЁиҙЁйҮҸгҖӮеҚ•е…ғжөӢиҜ•жҳҜдёҖз§ҚйҮҚиҰҒзҡ„иҪҜд»¶ејҖеҸ‘е®һи·өпјҢеҸҜз”ЁдәҺзЎ®дҝқиҝҷз§ҚиҙЁйҮҸгҖӮ


    еҚ•е…ғжөӢиҜ•жҳҜдёҖз§ҚиҮӘеҠЁеҢ–жөӢиҜ•иҝҮзЁӢпјҢе…¶дёӯе°Ҷеә”з”ЁдёӯеҸҜжөӢиҜ•зҡ„жңҖе°ҸиҪҜд»¶еҚ•е…ғпјҲз§°дёәеҚ•е…ғпјүеҚ•зӢ¬дё”зӢ¬з«Ӣең°иҝӣиЎҢжөӢиҜ•пјҢд»ҘзЎ®е®ҡе®ғд»¬жҳҜеҗҰе®Ңе…ЁжҢүз…§и®ҫи®ЎиҝҗиЎҢгҖӮзј–еҶҷеҚ•е…ғжөӢиҜ•ж—¶пјҢе°ҶеҚ•е…ғпјҲжңҖе°Ҹзҡ„еҸҜжөӢиҜ•йғЁеҲҶпјүдёҺд»Јз Ғзҡ„е…¶д»–йғЁеҲҶйҡ”зҰ»ејҖжқҘпјҢд»ҘзӢ¬з«Ӣең°жөӢиҜ•еә”з”Ёд»Јз ҒйқһеёёйҮҚиҰҒгҖӮзј–еҶҷеҚ•е…ғжөӢиҜ•ж—¶пјҢдҪ еә”иҜҘзЎ®е®ҡиҰҒжөӢиҜ•зҡ„еҚ•е…ғгҖӮ


    еңЁйқўеҗ‘еҜ№иұЎзј–зЁӢдёӯпјҢжңҖе°Ҹзҡ„еҚ•е…ғеҸҜиғҪжҳҜдёҖдёӘеұһдәҺзұ»зҡ„ж–№жі•гҖӮеңЁиҝҮзЁӢејҸзј–зЁӢдёӯпјҢжңҖе°Ҹзҡ„еҚ•е…ғеҸҜиғҪжҳҜдёҖдёӘеҚ•дёҖеҮҪж•°гҖӮеңЁ Go зЁӢеәҸдёӯпјҢеҮҪж•°жҲ–ж–№жі•еҸҜиў«и§ҶдёәдёҖдёӘеҚ•е…ғгҖӮдҪҶиҝҷе№¶дёҚдёҖе®ҡж„Ҹе‘ізқҖдёҖдёӘеҮҪж•°е°ұеҝ…з„¶жҳҜдёҖдёӘеҚ•е…ғпјҢеӣ дёәе…·дҪ“жғ…еҶөдёӯпјҢеә”з”ЁеҠҹиғҪзҡ„дёҠдёӢж–Үе’ҢиҪҜд»¶и®ҫи®Ўе°ҶеҶіе®ҡе“ӘйғЁеҲҶеҸҜд»Ҙиў«и§ҶдёәдёҖдёӘеҚ•е…ғгҖӮ


    ## жөӢиҜ•й©ұеҠЁејҖеҸ‘пјҲTDDпјү


    жөӢиҜ•й©ұеҠЁејҖеҸ‘пјҲTDDпјүжҳҜдёҖз§ҚйҒөеҫӘвҖңжөӢиҜ•дјҳе…ҲвҖқејҖеҸ‘еҺҹеҲҷзҡ„иҪҜд»¶ејҖеҸ‘иҝҮзЁӢпјҢеҚіеңЁз”ҹдә§д»Јз Ғд№ӢеүҚзј–еҶҷеҚ•е…ғжөӢиҜ•гҖӮTDD жҳҜдёҖз§Қи®ҫи®Ўж–№жі•пјҢйј“еҠұејҖеҸ‘иҖ…еңЁзј–еҶҷд»Јз ҒеүҚжҖқиҖғд»–д»¬зҡ„е®һзҺ°пјҢиҝҷдёҺејҖеҸ‘з”ЁжҲ·з•ҢйқўеҺҹеһӢзұ»дјјгҖӮеҺҹеһӢи®ҫи®ЎеҸҜд»Ҙи®©дҪ дәҶи§Је°Ҷдёәеә”з”ЁејҖеҸ‘д»Җд№Ҳж ·зҡ„з”ЁжҲ·з•ҢйқўгҖӮ

