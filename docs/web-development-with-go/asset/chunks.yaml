    ## Building HTML Views Using html/template


    When you build web applications, you have to render the view (UI) templates with
    the application data. The standard library package `html/template` lets you build
    user interfaces of dynamic web applications in Go. When you build web applications,
    you can define view templates by combining Go template syntax with HTML, CSS,
    and JavaScript, which can be rendered as web pages at runtime by providing the
    application data using various data structures.


    The `html/template` package provides the same interface as `text/template`, but
    the output of the template definitions is HTML. `html/template` not only generates
    HTML but also guards against certain code injections while rendering the HTML
    pages. When you render HTML views for your web applications, you must use `html/template`
    instead of `text/template`.


    The greatest advantage of using `html/template` is that it does the HTML encoding
    safely with a proper security model. Listing [5-7](#A978-1-4842-1052-9_5_Chapter.html#FPar7)
    shows a program that protects against a script injection.


    Listing 5-7.В В html/template Protecting Against Script Injection


