    that assigns values for a specific location.


    Listing 2-15.В В Initializing Values for Specific Elements


    `package main`


    `import "fmt"`


    `func main() {`


    В В В В `x := [5]int{2: 10, 4: 40}`


    В В В В `fmt.Println(x)`


    `}`


    You should see the following output:


    `[0 0 10 0 40]`


    In Listing [2-15](#A978-1-4842-1052-9_2_Chapter.html#FPar17), a value of `10`
    is assigned to the third element (index 2) and a value of `40` is assigned to
    the fifth element (index 4).


    ### Slices


    A slice is a data structure that is very similar to an array, but has no specified
    length. It is an abstraction built on top of an array type that provides a more
    convenient way of working with collections. Unlike regular arrays, slices are
    dynamic arrays in which the length of the slices can be changed at a later stage
    as data increases or shrinks. Slices are very useful data structures when the
    number of elements to be stored into a collection canвҖҷt be predicted.


    When you develop applications in Go, you often see slices in the code. If you
    want to read a database table and put data into a collection type, use slices
    instead of arrays because you canвҖҷt predict the length of the collection. Slices
    provide a built-in function called `append`, which can append elements to a slice
    quickly.


    Listing [2-16](#A978-1-4842-1052-9_2_Chapter.html#FPar18) is a code block that
    declares a nil slice.


    Listing 2-16.В В Declaring a Nil Slice


    `var x []int`


    A slice x is declared without specifying the length. It will create a nil slice
    of integers with a length of zero. Because slices are dynamic arrays, you can
    modify their length later on.


    There are several ways to create and initialize slices in Go: you can use the
    built-in function `make` or a slice literal.


    #### Creating a Slice with the make Function


    When you declare a slice with the `make` function, you can explicitly specify
    the length and capacity of a slice.


    Listing [2-17](#A978-1-4842-1052-9_2_Chapter.html#FPar19) is a code block that
    declares a slice with a length of 5 and a capacity of 10.


    Listing 2-17.В В Specifying Length and Capacity in a Slice with the make Function


    `x := make([]int, 5,10)`


    If the slice capacity is not specified, the capacity is the same as the length.


    Listing [2-18](#A978-1-4842-1052-9_2_Chapter.html#FPar20) is a code block that
    declares a slice without specifying capacity.


    Listing 2-18.В В Specifying Length in a Slice with the make Function


    `x := make([]int, 5)`


    `ryry`


    #### Creating a Slice with Slice Literal


    One common approach for creating and initializing a slice is to use a slice literal,
    which doesnвҖҷt require specifying length within the `[]` operator. The initial
    length and capacity are taken from the number of elements that are initialized.


    Listing [2-19](#A978-1-4842-1052-9_2_Chapter.html#FPar21) is a code block that
    declares and initializes a slice by using a slice literal.


    Listing 2-19.В В Initializing a Slice with a Slice Literal


    `x:= []int{10, 20, 30, 40, 50}`


    This code creates and initializes a slice with a length of 5 and a capacity of
    5.


    When you create a slice with a slice literal, you can also initialize a slice
    for a specific length without providing all the elements, as shown in Listing
    [2-20](#A978-1-4842-1052-9_2_Chapter.html#FPar22).


    Listing 2-20.В В A Slice Initializes for a Specific Length Without Providing Elements


    `x := []int{4: 0}`


    This code creates a slice with a length of 5 and a capacity of 5\. There is a
    zero value provided for the index `4`.


    You can create empty slices with a slice literal, as shown in Listing [2-21](#A978-1-4842-1052-9_2_Chapter.html#FPar23).


    Listing 2-21.В В Creating an Empty Slice


    `x:= []int{}`


    This code creates an empty slice with zero elements of value. Empty slices are
    useful when you want to return empty collections from functions.


    #### Slice Functions


    Go provides two built-in functions to easily work with slices: `append` and `copy`.
    The `append` function creates a new slice by taking an existing slice and appending
    all the following elements into it.


    Listing [2-22](#A978-1-4842-1052-9_2_Chapter.html#FPar24) shows an example of
    `append`.


    Listing 2-22.В В Slice with the append Function


    `package main`


    `import "fmt"`


    `func main() {`


    В В В В `x := []int{10,20,30}`


    В В В В `y := append(x, 40, 50)`


    В В В В `fmt.Println(x, y)`


    `}`


    You should see the following output:


    `[10 20 30] [10 20 30 40 50]`


    The `copy` function creates a new slice by copying elements from an existing slice
    into another slice.


    Listing [2-23](#A978-1-4842-1052-9_2_Chapter.html#FPar25) shows an example of
    the `copy` function.


    Listing 2-23.В В Slice with the copy Function


    `package main`


    `import "fmt"`


    `func main() {`


    В В В В `x := []int{10, 20, 30}`


    В В В В `y := make([]int, 2)`


    В В В В `copy(y, x)`


    В В В В `fmt.Println(x, y)`


    `}`


    You should see the following output:


    `[10 20 30] [10 20]`


    After running this program, slice `x` has `[10, 20, 30]`, and slice `y` has `[10,
    20]`. Because the length of slice `y` is 2, it copies the first two elements from
    slice `x`. If you specify the length of slice `y` as 3, it will copy all three
    elements from slice `x`.'
