    # 10. Testing Go Applications


    Automated testing is an important practice in software engineering that ensures
    the quality of your applications. If you are concerned about application quality,
    you should write automated tests to verify the behavior of the components of your
    applications. In your Go applications, automated tests can ensure that the Go
    packages behave the way they were designed to work. Go provides the fundamental
    testing capabilities through its standard library packages and tooling support.
    In this chapter, you will learn how to write unit tests using standard library
    packages and third-party packages.


    ## Unit Testing


    It isnвҖҷt easy to develop reliable software systems and maintain them long term.
    When you develop applications, you must ensure that they work as intended every
    time. A good software system should be maintainable so you can modify the functionality
    of the applications at any time without breaking any parts of the application.
    When you modify some parts of an application, it should not destroy the functionality
    of other parts. So you need to adopt good software engineering practices to ensure
    the quality of your applications. Unit testing is an important software development
    practice that can be used for ensuring this quality.


    Unit testing is a kind of automated testing process in which the smallest pieces
    of testable software in the application, called units, are individually and independently
    tested to determine whether they behave exactly as designed. When you write unit
    tests, it is important to isolate the units (the smallest testable parts) from
    the remaining parts of the code to individually and independently test the application
    code. When you write unit tests, you should identify the units to be tested.


    In OOP, the smallest unit might be a method that belongs to a class. In procedural
    programming, the smallest unit might be a single function. In Go programs, a function
    or a method might be considered a unit. But it doesnвҖҷt necessarily make a function
    as a unit because it is a situation in which the context of the application functionality
    and the software design will decide which part can be treated as a unit.


    ## Test-Driven Development (TDD)


    Test-driven development (TDD) is a software development process that follows test-first
    development in which unit tests are written before the production code. TDD is
    a design approach that encourages developers to think about their implementation
    before writing the code, which is similar to developing mock-up user interfaces.
    The mock-up design lets you learn what user interface you will develop for your
    application.'
  raw: 'Containerized applications running on containers are referred as jailed services
    running in a jail. This kind of virtualization isolates containers from each other.
    But when you build real-world applications, you have to compose multiple containers
    to make them an application. In this case, you need to compose the containers
    from the HTTP server and MongoDB database.


    In this scenario, you can use Docker Compose ( [`https://docs.docker.com/compose/`](https://docs.docker.com/compose/)
    ) to define and run multicontainer applications on the Docker platform. The design
    philosophy of Docker is to build independently deployable microservices into containers
    and compose these services to build larger applications.


    ## Go Web Frameworks


    In this chapter, you learned how to develop a RESTful API application from scratch
    without leveraging a Go web framework. In the Go web development stack, using
    a full-fledged web framework is not very popular within the Go developer community.
    Go developers prefer to use Go standard library packages as the foundation for
    building their web applications and web APIs. On top of standard library packages,
    developers do use a few third-party library packages for extending the functionality
    of standard library packages and getting some utility functions to speed up web
    development.


    This chapter used the same approach: developing a full-fledged application using
    the `net/http` standard library package and a few third-party packages. In my
    opinion, a web framework is not necessary for developing RESTful APIs. You can
    build highly scalable RESTful APIs in Go without using any web framework. Having
    said that, using a web framework might be helpful in some contexts, especially
    when you develop conventional web applications.


    Here are some Go web frameworks to use if you want a full-fledged web framework:


    *   Beego ( [`http://beego.me/`](http://beego.me/) ): A full-featured MVC framework
    that includes a built-in ORM

    *   Martini ( [`https://github.com/go-martini/martini`](https://github.com/go-martini/martini)
    ): A web framework inspired from Sinatra (a Ruby web framework)

    *   Revel ( [`https://revel.github.io/`](https://revel.github.io/) ): A full-stack
    web framework focused on high productivity

    *   Goji ( [`https://goji.io/`](https://goji.io/) ): A lightweight and minimalist
    web framework

    *   Gin ( [`https://github.com/gin-gonic/gin`](https://github.com/gin-gonic/gin)
    ): A web framework with Martini-like API that promises better performance


    ## Summary


    In this chapter, you learned how to build a production-ready RESTful API with
    Go. You used MongoDB as the data store for the RESTful API application, in which
    you organized the application logic into multiple packages to easily maintain
    the application. (Some business validations and best practices were ignored in
    the application due to the constraints of a book chapter, but a few best practices
    were included in the application.)


    `Negroni` was used to handle the middleware stack, and middleware was added to
    specific routes. A struct type for holding the values during the lifecycle of
    an HTTP request was created. A MongoDB `Session` object was created before the
    HTTP server was started, and a copied version of the MongoDB `Session` object
    was taken and closed for each HTTP request after executing the application handler.
    Go is a great technology stack for building highly scalable RESTful APIs and is
    a perfect technology stack for developing applications with the Microservice architecture
    pattern.


    Go doesnвҖҷt provide a centralized repository for managing third-party packages,
    so managing external dependencies is bit difficult. The `godep` third-party tool
    was used to manage dependencies of the RESTful API application. It allows you
    to restore the dependencies into the `GOPATH` system location.


    Docker is a revolutionary ecosystem for containerizing applications that enables
    developers and SAs to develop, ship, and run applications in the container virtualization
    environment. An application container is a lightweight Linux environment. A Dockerfile
    was created for the RESTful API application to automate the build process of the
    application with Docker.


    You can build web-based, scalable back-end systems in Go without using any web
    framework. In this chapter, a production-ready RESTful API application was created
    by using the standard library package `net/http` and a few third-party libraries.
    When you build RESTful APIs, you might not need a web framework, but when you
    develop conventional web applications, using one might be helpful. Beego is a
    fully featured web framework that provides everything, including an ORM.


