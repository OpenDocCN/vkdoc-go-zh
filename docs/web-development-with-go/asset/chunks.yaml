    ```go\n//HTTP Delete - /api/notes/{id}\n\nfunc DeleteNoteHandler(w http.ResponseWriter,\
    \ r *http.Request) {\n\n    vars := mux.Vars(r)\n\n    k := vars[\"id\"]\n\n \
