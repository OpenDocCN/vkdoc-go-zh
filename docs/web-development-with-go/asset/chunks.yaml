  raw: '#### Working with Alice


    To work with the `Alice` package, `github.com/justinas/alice` must be added to
    the import list:


    `import "github.com/ justinas/alice"`


    LetвҖҷs rewrite the program shown in Listing [6-6](#A978-1-4842-1052-9_6_Chapter.html#FPar6)
    with the `Alice` package (see Listing [6-7](#A978-1-4842-1052-9_6_Chapter.html#FPar7)).


    Listing 6-7.В В Chaining Middleware Functions with the Alice Package


    `package` `main`


    `import (`


    `"io"`


    `"log"`


    `"net/http"`


    `"os"`


    `"github.com/gorilla/handlers"`


    `"github.com/justinas/alice"`


    `)`


    `func loggingHandler(next http.Handler) http.Handler {`


    `logFile, err := os.OpenFile("server.log", os.O_WRONLY|os.O_CREATE|os.O_APPEND,
    0777)`


    `if err != nil {`


    `panic(err)`


    `}`


    `return handlers.LoggingHandler(logFile, next)`


    `}`


    `func index(w http.ResponseWriter, r *http.Request) {`


    `w.Header().Set(`


    `"Content-Type",`


    `"text/html",`


    `)`


    `io.WriteString(`


    `w,`


    `` `<doctype html> ``


    `<html>`


    `<head>`


    `<title>Index</title>`


    `</head>`


    `<body>`


    `Hello Gopher!`


    `</body>`


    ``</html>`,``


    `)`


    `}`


    `func about(w http.ResponseWriter, r *http.Request) {`


    `w.Header().Set(`


    `"Content-Type",`


    `"text/html",`


    `)`


    `io.WriteString(`


    `w,`


    `` `<doctype html> ``


    `<html>`


    `<head>`


    `<title>About</title>`


    `</head>`


    `<body>`


    `Go Web development with HTTP Middleware`


    `</body>`


    ``</html>`,``


    `)`


    `}`


    `func iconHandler(w http.ResponseWriter, r *http.Request) {`


    `http.ServeFile(w, r, "./favicon.ico")`


    `}`


    `func main() {`


    `http.HandleFunc("/favicon.ico", iconHandler)`


    `indexHandler := http.HandlerFunc(index)`


    `aboutHandler := http.HandlerFunc(about)`


    `commonHandlers := alice.New(loggingHandler, handlers.CompressHandler)`


    `http.Handle("/", commonHandlers.ThenFunc(indexHandler))`


    `http.Handle("/about", commonHandlers.ThenFunc(aboutHandler))`


    `server := &http.Server{`


    `Addr: ":8080",`


    `}`


    `log.Println("Listening...")`


    `server.ListenAndServe()`


    `}`


    In this program, two Gorilla handlers are used for logging requests and compressing
    responses: `LoggingHandler` and `CompressHandler`. The HTML string is provided
    in the responses to verify the compression impact of the HTTP responses. Run the
    program, make requests to `"/"` and `"/about"`, and watch the log file and HTTP
    responses.


    Figure [6-1](#A978-1-4842-1052-9_6_Chapter.html#Fig1) shows the screenshot in
    Fiddler: an HTTP debugging tool showing that the web responses are compressing
    with gzip encoding.


    ![A978-1-4842-1052-9_6_Fig1_HTML.jpg](A978-1-4842-1052-9_6_Fig1_HTML.jpg)


    Figure 6-1.


    Compressing HTTP responses with a Gorilla handler


    Chaining middleware functions can be done in an elegant way using the `Alice`
    package, which makes it easy to understand code blocks. GorillaвҖҷs `LoggingHandler`
    does not have the signature `func (http.Handler) http.Handler`, and it takes a
    log file as a function parameter along with the `http.Handler`. So by working
    properly with the `Alice` package and using this handler in multiple places, you
    can write a middleware function for logging, in which the Gorilla `LoggingHandler`
    is called by providing the log file as the parameter. This is a good approach
    whenever a middleware function is needed with multiple function parameters:


    `func loggingHandler(next http.Handler) http.Handler {`


    `logFile, err := os.OpenFile("server.log", os.O_WRONLY|os.O_CREATE|os.O_APPEND,
    0777)`


    `if err != nil {`


    `panic(err)`


    `}`


    `return handlers.LoggingHandler(logFile, next)`


    `}`


    The `loggingHandler` middleware function can be used with `Alice`, which calls
    the Gorilla `LoggingHandler` function with necessary arguments. When you use middleware
    handlers, you might need to decorate multiple middleware handlers into several
    application handlers. In this context, you can create common handlers with `Alice`
    by combining with multiple middleware handlers, and it can apply to multiple application
    handlers.


    Here `commonHandlers` is defined as the common handlers for use with multiple
    application handlers:


    `indexHandler := http.HandlerFunc(index)`


    `aboutHandler := http.HandlerFunc(about)`


    `commonHandlers := alice.New(loggingHandler, handlers.CompressHandler)`


    `http.Handle("/", commonHandlers.ThenFunc(indexHandler))`


    `http.Handle("/about", commonHandlers.ThenFunc(aboutHandler))`


    The `Alice` package provides a fluent API for working with middleware functions
    that allows you to chain middleware functions in an elegant way. The `Alice` package
    is a very lightweight library that has fewer than 100 lines of code.


    ## Using Middleware with the Negroni Package


    When you work directly with the `net/http` package to build web applications,
    the `Negroni` third-party library is a great companion for you. `Negroni` is a
    library that is designed to be compatible with the `net/http` package. `Negroni`
    provides an idiomatic approach to using HTTP middleware in Go. It encourages you
    to use `net/http` handlers while providing a way to handle HTTP middleware functions.


    The previous section discussed the `Alice` package, which is great for chaining
    middleware handlers. `Negroni` provides a different approach for handling HTTP
    middleware functions in a simple and nonintrusive way. If you prefer to use `Alice`
    for handling middleware functions, you can stick with it because both `Alice`
    and `Negroni` solve the same problems in a slightly different way. Negroni provides
    a full-fledged library for working with middleware functions, which also comes
    with some common middleware functions for logging requests and compressing responses,
    providing static file server and recovery from panics.


    `Negroni` allows you to configure middleware functions at a global level to be
    used with all application handlers. You can also configure middleware functions
    for working with specific handlers. When you use middleware functions with all
    application handlers, you donвҖҷt need to configure it for every application handler.
    Instead, you can just configure the middleware function with `Negroni`, which
    will wrap the configured middleware functions into all application handlers. You
    can also configure some middleware functions to be executed with some specific
    application handlers.


    ### Getting Started with Negroni


    `Negroni` provides a simple programming model for working with middleware handlers.
    When you work with it, you can also use its default middleware functions. LetвҖҷs
    install and write a simple program to get started with the `Negroni` package.'
  trans: "\n## дҪҝз”Ё Alice еҢ…\n\nиҰҒдҪҝз”Ё `Alice` еҢ…пјҢйңҖиҰҒе°Ҷ `github.com/justinas/alice` ж·»еҠ еҲ°еҜје…ҘеҲ—иЎЁдёӯпјҡ\n\
