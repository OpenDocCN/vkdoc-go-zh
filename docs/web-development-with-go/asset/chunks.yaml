    `Use "go help [topic]" for more information about that topic.`


    For documentation on any specific command type:


    `go help [` `command` `]`


    Here is the command for getting documentation for the `install` command:


    `go help install`


    Here is the documentation for the `install` command:


    `usage: go install [build flags] [packages]`


    `Install compiles and installs the packages named by the import paths,`


    `along with their dependencies.`


    `For more about the build flags, see вҖҷgo help buildвҖҷ.`


    `For more about specifying packages, see вҖҷgo help packagesвҖҷ.`


    `See also: go build, go get, go clean.`


    ### Formatting Go Code


    The Go tool provides the `fmt` command to format Go code. It is a good practice
    to format Go programs before committing source files into version control systems.
    The `go fmt` command applies predefined styles to the source code for format source
    files, which ensures the right placement of curly brackets, ensures the proper
    usage of tabs and spaces, and alphabetically sorts package imports. The `go fmt`
    command can be applied at the package level or on a specific source file.


    Listing [2-8](#A978-1-4842-1052-9_2_Chapter.html#FPar9) shows the `import` block
    before applying `go fmt`.


    Listing 2-8.В В import Package Block Before go fmt


    `import (`


    В В В В В В В В `"log"`


    В В В В В В В В `"net/http"`


    В В В В В В В В `"encoding/json"`


    `)`


    Listing [2-9](#A978-1-4842-1052-9_2_Chapter.html#FPar10) shows the `import` block
    after applying `go fmt`:


    Listing 2-9.В В import Package Block After go fmt


    `import (`


    В В В В В В В В `"encoding/json"`


    В В В В В В В В `"log"`


    В В В В В В В В `"net/http"`


    `)`


    The `import` package block rearranges in an alphabetical order after the `go fmt`
    command executes.


    Note


    The idiomatic way of writing the `import` block is to start with standard library
    packages in alphabetical order and follow with custom packages in alphabetical
    order by using one line space between standard library packages and custom packages.


    ### Go Documentation


    Documentation is a huge part of making software accessible and maintainable. It
    must be well-written and accurate, of course, but it must also be easy to write
    and maintain. Ideally, the documentation should be coupled to the code so it evolves
    along with the code. The easier it is for programmers to produce good documentation,
    the better the situation for everyone.


    Go provides the godoc tool, which provides documentation for Go packages. It parses
    Go source code, including comments, and generates documentation as HTML or plain
    text. In short, the godoc tool generates the documentation from the comments included
    in the source files. If you want to access the documentation from the command
    prompt, type:


    `godoc [` `package` `]`


    For example, if you want to get documentation for the `fmt` package, type the
    following command in the terminal:


    `godoc fmt`


    This command displays the `fmt` package documentation onto the terminal.


    The godoc tool also provides browsable documentation on a web interface. To access
    the documentation through a web-based interface, start the web server provided
    by the godoc tool. Type the following command in the terminal:


    `godoc -http=:3000`


    This command starts a web server at port 3000, which allows you to access the
    documentation on the web browser. You can then easily navigate to the package
    documentation from both the standard library and the `GOPATH` location. See Figure
    [2-1](#A978-1-4842-1052-9_2_Chapter.html#Fig1).


    ![A978-1-4842-1052-9_2_Fig1_HTML.jpg](A978-1-4842-1052-9_2_Fig1_HTML.jpg)


    Figure 2-1.


    Accessing godoc documentation from a web browser


    ## Working with Collections


    When you work with real-world applications, you have to leverage various data
    structures to manage application data. When you persist application data into
    database systems, you might be using the values of data structure objects that
    hold the application data. When you read data from databases, you might be putting
    the data into various forms of data structures for other uses, such as rendering
    the user interface. Collections are the data structures that can hold collections
    of data structures that include built-in and user-defined types. Go provides three
    types of data structures to manage data collections: arrays, slices, and maps.'
