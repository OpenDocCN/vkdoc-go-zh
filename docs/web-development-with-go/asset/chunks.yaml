    \ еҮҪж•°йҖҡиҝҮжҸҗдҫӣз»“жһ„дҪ“е®һдҫӢе’Ңе®һдҪ“й”®еҗҚзҡ„й”®пјҢеңЁ Datastore дёӯеҲӣе»әж–°е®һдҪ“гҖӮ`Task` з»“жһ„дҪ“зұ»еһӢе®һдҫӢиў«жҸҗдҫӣд»ҘдҝқеӯҳеҲ° DatastoreгҖӮ\n\nжҸҗдҫӣй”®еҗҚжңүеӨҡз§ҚйҖүжӢ©гҖӮдҫӢеҰӮпјҢеҸҜд»ҘйҖҡиҝҮеҗ‘\
    \ `datastore.NewKey` еҮҪж•°дј йҖ’дёҖдёӘйқһз©әеӯ—з¬ҰдёІ ID жқҘжҸҗдҫӣй”®еҗҚпјҢеҰӮдёӢжүҖзӨәпјҡ\n\n```go\nc := appengine.NewContext(r)\n\
    key := datastore.NewKey(c, \"tasks\", \"taskgae\", 0, nil)\n_, err := datastore.Put(c,\
    \ key, &task)\n```\n\nдҪ д№ҹеҸҜд»ҘжҸҗдҫӣдёҖдёӘз©әй”®еҗҚпјҢжҲ–дҪҝз”Ё `datastore.NewIncompleteKey` еҮҪж•°дј йҖ’дёҖдёӘж–°зҡ„дёҚе®Ңж•ҙй”®гҖӮ`NewIncompleteKey`\
    \ еҮҪж•°еҲӣе»әдәҶдёҖдёӘж–°зҡ„дёҚе®Ңж•ҙй”®гҖӮDatastore дјҡиҮӘеҠЁдёәе®һдҪ“й”®з”ҹжҲҗе”ҜдёҖзҡ„ж•°еӯ— IDгҖӮ\n\nеңЁзӨәдҫӢзЁӢеәҸдёӯпјҢдҪҝз”ЁдёҚе®Ңж•ҙй”®е°Ҷи®°еҪ•жҸ’е…ҘеҲ° `\"tasks\"\
    ` е®һдҪ“дёӯпјҡ\n\n```go\nc := appengine.NewContext(r)\nkey := datastore.NewIncompleteKey(c,\
    \ \"tasks\", nil)\n_, err := datastore.Put(c, key, &task)\n```\n\n`datastore.Put`\
    \ еҮҪж•°иҝ”еӣһдёҖдёӘ `datastore.PendingKey`пјҢеҸҜд»ҘйҖҡиҝҮдҪҝз”ЁжҲҗеҠҹдәӢеҠЎжҸҗдәӨзҡ„иҝ”еӣһеҖје°Ҷе…¶и§Јжһҗдёә `datastore.Key` еҖјгҖӮеҰӮжһңй”®жҳҜдёҚе®Ңж•ҙй”®пјҢиҝ”еӣһзҡ„\
    \ `PendingKey` е°Ҷи§Јжһҗдёәж•°жҚ®еӯҳеӮЁз”ҹжҲҗзҡ„е”ҜдёҖй”®гҖӮ`PendingKey` иЎЁзӨәж–°жҸ’е…Ҙе®һдҪ“зҡ„й”®гҖӮеҸҜд»ҘйҖҡиҝҮи°ғз”Ё `Commit` зҡ„ `Key` ж–№жі•е°Ҷе…¶и§Јжһҗдёә\
    \ `datastore.Key`гҖӮ\n\nдҪ д№ҹеҸҜд»ҘдҪҝз”Ё `datastore.Put` еҮҪж•°жӣҙж–°зҺ°жңүе®һдҪ“гҖӮеҪ“жӣҙж–°зҺ°жңүе®һдҪ“ж—¶пјҢдҝ®ж”№з»“жһ„дҪ“зҡ„еӯ—ж®өпјҢз„¶еҗҺи°ғз”Ё `datastore.Put`\
    \ еҮҪж•°жӣҙж–°еҖјгҖӮиҝҷе°ҶиҰҶзӣ–зҺ°жңүе®һдҪ“гҖӮ\n\n## жҹҘиҜў Datastore\n\nGo Datastore API жҸҗдҫӣдәҶ Go иҜӯиЁҖжғҜз”Ёзҡ„ж–№ејҸжқҘжҹҘиҜў Datastore\
    \ дёӯзҡ„ж•°жҚ®гҖӮе®ғжҸҗдҫӣдәҶдёҖдёӘ `datastore.Query` зұ»еһӢпјҢз”ЁдәҺеҮҶеӨҮе’Ңжү§иЎҢжҹҘиҜўд»Ҙд»Һ App Engine Datastore жЈҖзҙўе®һдҪ“гҖӮ`NewQuery`\
    \ еҮҪж•°еҮҶеӨҮдәҶдёҖдёӘжҹҘиҜўеҜ№иұЎпјҡ\n\n```go\nq := datastore.NewQuery(\"tasks\").\n    Order(\"-CreatedOn\"\
    )\n```\n\nDatastore жҹҘиҜўеҢ…жӢ¬д»ҘдёӢеҶ…е®№пјҡ\n\n-   жҹҘиҜўжүҖй’ҲеҜ№зҡ„дёҖдёӘе®һдҪ“пјҲ[е®һдҪ“з§Қзұ»](https://cloud.google.com/appengine/docs/go/datastore/entities#Go_Kinds_and_identifiers)пјү\n\
    -   еҹәдәҺе®һдҪ“еұһжҖ§еҖјгҖҒй”®е’ҢзҘ–е…Ҳзҡ„йӣ¶дёӘжҲ–еӨҡдёӘзӯӣйҖүеҷЁ\n-   з”ЁдәҺеҜ№з»“жһңиҝӣиЎҢжҺ’еәҸзҡ„йӣ¶дёӘжҲ–еӨҡдёӘжҺ’еәҸйЎәеәҸ\n"
