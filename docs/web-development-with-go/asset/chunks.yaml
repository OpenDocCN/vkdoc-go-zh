- fmt: "### Calling Struct Methods\n\nLetвҖҷs create an instance of a `Person` type\
    \ and call the methods provided by the type (see Listing [3-7](#A978-1-4842-1052-9_3_Chapter.html#FPar7)).\n\
    \n```\nListing 3-7.  Calling Struct Methods\n\np := Person{\n        \"Shiju\"\
    ,\n        \"Varghese\",\n        time.Date(1979, time.February, 17, 0, 0, 0,\
    \ 0, time.UTC),\n        \"shiju@email.com\",\n        \"Kochi\",\n}\n\np.PrintName()\n\
    p.PrintDetails()\n```\n\nYou should see the following output:\n\n```\nShiju Varghese\n\
    [Date of Birth: 1979-02-17 00:00:00 +0000 UTC, Email: shiju@email.com, Location:\
    \ Kochi ]\n```\n\n### Pointer Method Receivers\n\nIn Go, you can define methods\
    \ using both pointer and nonpointer method receivers. Listing [3-7](#A978-1-4842-1052-9_3_Chapter.html#FPar7)\
    \ used nonpointer receivers for the methods `PrintName` and `PrintDetails`. If\
    \ you want to modify the data of a receiver from the method, the receiver must\
    \ be a pointer, as shown in Listing [3-8](#A978-1-4842-1052-9_3_Chapter.html#FPar8).\n\
    \n```\nListing 3-8.  Receiver Method with Pointer\n\n//A person method with pointer\
    \ receiver\nfunc (p *Person) ChangeLocation(newLocation string) {\n    p.Location\
    \ = newLocation\n}\n```\n\nA `ChangeLocation` function is attached to a pointer\
    \ receiver. Here the location from the method itself is modified. Suppose that\
    \ you add this new method to the `Person` struct listed in Listing [3-7](#A978-1-4842-1052-9_3_Chapter.html#FPar7).\
    \ LetвҖҷs create a `Person` type instance and call its methods (see Listing [3-9](#A978-1-4842-1052-9_3_Chapter.html#FPar9)).\n\
    \n```\nListing 3-9.  Calling Methods of a Pointer Receiver\n\np := &Person{\n\
    \                \"Shiju\",\n                \"Varghese\",\n                time.Date(1979,\
    \ time.February, 17, 0, 0, 0, 0, time.UTC),\n                \"shiju@email.com\"\
    ,\n                \"Kochi\",\n        }\n\n        p.ChangeLocation(\"Santa Clara\"\
    )\n        p.PrintName()\n        p.PrintDetails()\n```\n\nYou should see the\
    \ following output:\n\n```\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00\
    \ +0000 UTC, Email: shiju@email.com, Location: Santa Clara ]\n```\n\nBecause you\
    \ want to call a pointer receiver method, you can create the `Person` type instance\
    \ by providing the ampersand (`&`) operator. When you call the `ChangeLocation`\
    \ method, it changes the value of the `Location` field, so when calling the `PrintDetails`\
    \ method, you get the modified value. The value of the `Location` field would\
    \ not have changed if the `ChangeLocation` method were a nonpointer method.\n\n\
    When you call a pointer receiver method, you pass by reference as opposed to passing\
    \ by value (used with a nonpointer receiver). This makes sense when you want to\
    \ modify the state (value of the fields) of the receiver within the methods. If\
    \ the struct has a pointer receiver on some its methods, it is better to use it\
    \ for the rest of the methods because it enables better consistency and predictability\
    \ for the struct behaviors.\n\nLetвҖҷs modify the program to define all methods\
    \ of the `Person` struct with a pointer receiver to keep consistency among all\
    \ its methods (see Listing [3-10](#A978-1-4842-1052-9_3_Chapter.html#FPar10)).\n\
    \n```\nListing 3-10.  Person Struct with Pointer Receiver Methods\n\npackage main\n\
    \nimport (\n        \"fmt\"\n        \"time\"\n)\n\nfunc main() {\n        p :=\
    \ &Person{\n                \"Shiju\",\n                \"Varghese\",\n      \
    \          time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n       \
    \         \"shiju@email.com\",\n                \"Kochi\",\n        }\n\n    \
    \    p.ChangeLocation(\"Santa Clara\")\n        p.PrintName()\n        p.PrintDetails()\n\
    }\n\ntype Person struct {\n        FirstName, LastName string\n        Dob   \
    \              time.Time\n        Email, Location     string\n}\n\n//A person\
    \ method with pointer receiver\nfunc (p *Person) PrintName() {\n        fmt.Printf(\"\
    \\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//A person method with pointer receiver\n\
    func (p *Person) PrintDetails() {\n        fmt.Printf(\"[Date of Birth: %s, Email:\
    \ %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n}\n\n//A person\
    \ method with pointer receiver\nfunc (p *Person) ChangeLocation(newLocation string)\
    \ {\n        p.Location = newLocation\n}\n```"
