    reusability in Go is very easy with packages. You have created your first library
    package. LetвҖҷs reuse the package code from another executable program (see Listing
    [1-3](#A978-1-4842-1052-9_1_Chapter.html#FPar7)).


    **Listing 1-3.** Reusing the calc Package in a Go Program


    ```

