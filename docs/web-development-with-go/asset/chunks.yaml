    В В В В В В В В `toolВ В В В В В В В run specified go tool`


    В В В В В В В В `versionВ В В В В print Go version`


    В В В В В В В В `vetВ В В В В В В В В run go tool vet on packages`


    `Use "go help [command]" for more information about a command.`


    `Additional help topics:`


    В В В В В В В В `cВ В В В В В В В В В В calling between Go and C`


    В В В В В В В В `buildmodeВ В В description of build modes`


    В В В В В В В В `filetypeВ В В В file types`


    В В В В В В В В `gopathВ В В В В В GOPATH environment variable`


    В В В В В В В В `environment environment variables`


    В В В В В В В В `importpathВ В import path syntax`


