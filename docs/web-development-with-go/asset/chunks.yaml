    \ {{.Email}}</p>\n<p>NickName: {{.NickName}}</p>\n<p>Location: {{.Location}}</p>\n\
    <p>AvatarURL: {{.AvatarURL}} <img src=\"{{.AvatarURL}}\"></p>\n<p>Description:\
    \ {{.Description}}</p>\n<p>UserID: {{.UserID}}</p>\n<p>AccessToken: {{.AccessToken}}</p>\n\
    `\n```\n\nеӣҫ 7-5 жҳҫзӨәдәҶд»Һ Twitter иҺ·еҸ–зҡ„з”ЁжҲ·дҝЎжҒҜгҖӮ\n\n![A978-1-4842-1052-9_7_Fig5_HTML.jpg](img/A978-1-4842-1052-9_7_Fig5_HTML.jpg)\n\
    \n**еӣҫ 7-5.** д»Һ Twitter иҺ·еҸ–зҡ„з”ЁжҲ·дҝЎжҒҜйЎөйқў\n\n## дҪҝз”Ё JSON Web Token иҝӣиЎҢиә«д»ҪйӘҢиҜҒ\n\nз¬¬ 7.2.2 иҠӮи®Ёи®әдәҶдёҖз§ҚеҹәдәҺд»ӨзүҢзҡ„и®ӨиҜҒж–№жі•пјҢе…¶дёӯдҪҝз”ЁдёҚи®°еҗҚд»ӨзүҢжқҘи®ҝй—®\
    \ Web жңҚеҠЎеҷЁзҡ„еҸ—дҝқжҠӨиө„жәҗгҖӮJSON Web TokenпјҲJWTпјүжҳҜдёҖз§Қз”ЁдәҺз”ҹжҲҗе’ҢдҪҝз”ЁдёҚи®°еҗҚд»ӨзүҢиҝӣиЎҢдёӨж–№и®ӨиҜҒзҡ„ејҖж”ҫж ҮеҮҶгҖӮJWT жҳҜдёҖз§Қзҙ§еҮ‘гҖҒURL е®үе…Ёзҡ„ж–№ејҸпјҢз”ЁдәҺиЎЁзӨәиҰҒеңЁдёӨж–№д№Ӣй—ҙдј иҫ“зҡ„еЈ°жҳҺгҖӮJWT\
    \ дёӯзҡ„еЈ°жҳҺиў«зј–з Ғдёә JSON еҜ№иұЎпјҢе№¶дҪҝз”Ё JSON Web зӯҫеҗҚпјҲJWSпјүиҝӣиЎҢж•°еӯ—зӯҫеҗҚгҖӮдёҺ OAuth 2 дёҖж ·пјҢJWT жҳҜеҹәдәҺд»ӨзүҢи®ӨиҜҒзҡ„ејҖж”ҫж ҮеҮҶгҖӮпјҲJWT\
    \ зҡ„еҸ‘йҹідёҺиӢұж–ҮеҚ•иҜҚвҖңjotвҖқзӣёеҗҢгҖӮпјү\n\nJWT жҳҜдёҖдёӘзӯҫеҗҚзҡ„ JSON еҜ№иұЎпјҢеҸҜд»ҘеңЁ OAuth 2 дёӯз”ЁдҪңдёҚи®°еҗҚд»ӨзүҢиҝӣиЎҢиә«д»ҪйӘҢиҜҒгҖӮJWT д»ӨзүҢз”ұдёүйғЁеҲҶз»„жҲҗпјҢз”Ё`.`пјҲеҸҘзӮ№пјүеҲҶйҡ”гҖӮз¬¬дёҖйғЁеҲҶз§°дёә`Header`пјҢе®ғжҳҜдёҖдёӘз»ҸиҝҮ\
    \ base64url зј–з Ғзҡ„ JSON еҜ№иұЎгҖӮз¬¬дәҢйғЁеҲҶз§°дёә`Claims`пјҢд№ҹжҳҜдёҖдёӘ JSON еҜ№иұЎпјҢеҢ…еҗ« JWT жүҖжүҝиҪҪзҡ„еЈ°жҳҺгҖӮжңҖеҗҺдёҖйғЁеҲҶз§°дёә`Signature`пјҢдҪҝз”Ё`Header`жҸҗдҫӣзҡ„дҝЎжҒҜиҝӣиЎҢйӘҢиҜҒгҖӮ\n\
    \n**жіЁж„Ҹ**\n\nJWT и§„иҢғзҡ„иҚүжЎҲеҸҜеңЁжӯӨеӨ„иҺ·еҸ–пјҡ[`http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html`](http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html)\n"
- fmt: "# Working with JWT Using the `jwt-go` Package\n\nThe third-party Go package\
    \ `jwt-go` provides various utility functions for working with JWT. It provides\
    \ the following utilities:\n\n- Generates and signs JWT tokens\n- Parses and verifies\
    \ JWT tokens\n\nThe `jwt-go` library supports the signing algorithms of RSA256\
    \ and HMAC SHA256.\n\nTo install the `jwt-go` package, enter the following command\
    \ in the terminal:\n\n```\ngo get github.com/dgrijalva/jwt-go\n```\n\nTo work\
    \ with the `jwt-go` package, you must add `github.com/dgrijalva/jwt-go` to the\
    \ import list:\n\n```\nimport \"github.com/dgrijalva/jwt-go\"\n```\n\nLetвҖҷs write\
    \ an example API to work with JWT tokens using the `jwt-go` package. Steps of\
    \ the authentication flow in the example program are the following:\n\nThe API\
    \ server validates the user credentials (username and password) provided by the\
    \ client application. If the login credentials are valid, the API server generates\
    \ a JWT token and sends it to the client application as an access token. The client\
    \ applications can store the JWT token in client storage. HTML 5 local storage\
    \ is generally used for storing JWT tokens. To obtain access to protected resources\
    \ of the API server, the client application sends an access token as a bearer\
    \ token in the HTTP header `Authorization (Authorization: Bearer \"Access_Token\"\
    )` on every HTTP request.\n\nBefore starting the example program, letвҖҷs generate\
    \ RSA keys for the application to use to sign the tokens. The RSA keys can be\
    \ generated by using the `openssl` command-line tool.\n\nRun the following commands:\n\
    \n```\nopenssl genrsa -out app.rsa 1024\n```\n\n```\nopenssl rsa -in app.rsa -pubout\
    \ > app.rsa.pub\n```\n\nThese commands generate a private and public key. `1024`\
    \ is the size of the key that was generated.\n\nListing [7-2](#A978-1-4842-1052-9_7_Chapter.html#FPar4)\
    \ shows the example program.\n\n## Listing 7-2. JWT Token-based Authentication\
    \ with the `jwt-go` Package\n\n```\npackage main\n\nimport (\n\t\"encoding/json\"\
    \n\t\"fmt\"\n\t\"io/ioutil\"\n\t\"log\"\n\t\"net/http\"\n\t\"time\"\n\n\tjwt \"\
    github.com/dgrijalva/jwt-go\"\n\t\"github.com/gorilla/mux\"\n)\n\n// using asymmetric\
    \ crypto/RSA keys\n// location of the files used for signing and verification\n\
    const (\n\tprivKeyPath = \"keys/app.rsa\"     // openssl genrsa -out app.rsa 1024\n\
    \tpubKeyPath  = \"keys/app.rsa.pub\" // openssl rsa -in app.rsa -pubout > app.rsa.pub\n\
    )\n\n// verify key and sign key\nvar (\n\tverifyKey, signKey []byte\n)\n\n//struct\
    \ User for parsing login credentials\ntype User struct {\n\tUserName string `json:\"\
    username\"`\n\tPassword string `json:\"password\"`\n}\n\n// read the key files\
    \ before starting http handlers\nfunc init() {\n\tvar err error\n\tsignKey, err\
    \ = ioutil.ReadFile(privKeyPath)\n\tif err != nil {\n\t\tlog.Fatal(\"Error reading\
    \ private key\")\n\t\treturn\n\t}\n\tverifyKey, err = ioutil.ReadFile(pubKeyPath)\n\
    \tif err != nil {\n\t\tlog.Fatal(\"Error reading private key\")\n\t\treturn\n\t\
    }\n}\n\n// reads the login credentials, checks them and creates JWT the token\n\
    func loginHandler(w http.ResponseWriter, r *http.Request) {\n\tvar user User\n\
    \t//decode into User struct\n\terr := json.NewDecoder(r.Body).Decode(&user)\n\t\
    if err != nil {\n\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\tfmt.Fprintln(w,\
    \ \"Error in request body\")\n\t\treturn\n\t}\n\t// validate user credentials\n\
    \tif user.UserName != \"shijuvar\" && user.Password != \"pass\" {\n\t\tw.WriteHeader(http.StatusForbidden)\n\
    \t\tfmt.Fprintln(w, \"Wrong info\")\n\t\treturn\n\t}\n\t// create a signer for\
    \ rsa 256\n\tt := jwt.New(jwt.GetSigningMethod(\"RS256\"))\n\t// set our claims\n\
    \tt.Claims[\"iss\"] = \"admin\"\n\tt.Claims[\"CustomUserInfo\"] = struct {\n\t\
    \tName string\n\t\tRole string\n\t}{user.UserName, \"Member\"}\n\t// set the expire\
    \ time\n\tt.Claims[\"exp\"] = time.Now().Add(time.Minute * 20).Unix()\n\ttokenString,\
    \ err := t.SignedString(signKey)\n\tif err != nil {\n\t\tw.WriteHeader(http.StatusInternalServerError)\n\
    \t\tfmt.Fprintln(w, \"Sorry, error while Signing Token!\")\n\t\tlog.Printf(\"\
    Token Signing error: %v\\n\", err)\n\t\treturn\n\t}\n\tresponse := Token{tokenString}\n\
    \tjsonResponse(response, w)\n}\n\n// only accessible with a valid token\nfunc\
    \ authHandler(w http.ResponseWriter, r *http.Request) {\n\t// validate the token\n\
    \ttoken, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{}, error)\
    \ {\n\t\t// since we only use one private key to sign the tokens,\n\t\t// we also\
    \ only use its public counter part to verify\n\t\treturn verifyKey, nil\n\t})\n\
    \tif err != nil {\n\t\tswitch err.(type) {\n\t\tcase *jwt.ValidationError: //\
    \ something was wrong during the validation\n\t\t\tvErr := err.(*jwt.ValidationError)\n\
    \t\t\tswitch vErr.Errors {\n\t\t\tcase jwt.ValidationErrorExpired:\n\t\t\t\tw.WriteHeader(http.StatusUnauthorized)\n\
    \t\t\t\tfmt.Fprintln(w, \"Token Expired, get a new one.\")\n\t\t\t\treturn\n\t\
    \t\tdefault:\n\t\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\t\t\
    fmt.Fprintln(w, \"Error while Parsing Token!\")\n\t\t\t\tlog.Printf(\"ValidationError\
    \ error: %+v\\n\", vErr.Errors)\n\t\t\t\treturn\n\t\t\t}\n\t\tdefault: // something\
    \ else went wrong\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\t\
    fmt.Fprintln(w, \"Error while Parsing Token!\")\n\t\t\tlog.Printf(\"Token parse\
    \ error: %v\\n\", err)\n\t\t\treturn\n\t\t}\n\t}\n\tif token.Valid {\n\t\tresponse\
    \ := Response{\"Authorized to the system\"}\n\t\tjsonResponse(response, w)\n\t\
    } else {\n\t\tresponse := Response{\"Invalid token\"}\n\t\tjsonResponse(response,\
    \ w)\n\t}\n}\n\ntype Response struct {\n\tText string `json:\"text\"`\n}\n\ntype\
    \ Token struct {\n\tToken string `json:\"token\"`\n}\n\nfunc jsonResponse(response\
    \ interface{}, w http.ResponseWriter) {\n\tjson, err := json.Marshal(response)\n\
    \tif err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
    \t\treturn\n\t}\n\tw.WriteHeader(http.StatusOK)\n\tw.Header().Set(\"Content-Type\"\
    , \"application/json\")\n\tw.Write(json)\n}\n\n//Entry point of the program\n\
    func main() {\n\tr := mux.NewRouter()\n\tr.HandleFunc(\"/login\", loginHandler).Methods(\"\
    POST\")\n\tr.HandleFunc(\"/auth\", authHandler).Methods(\"POST\")\n\tserver :=\
    \ &http.Server{\n\t\tAddr:    \":8080\",\n\t\tHandler: r,\n\t}\n\tlog.Println(\"\
    Listening...\")\n\tserver.ListenAndServe()\n}\n```\n\n### Generating the JWT Token\n\
    \nIf the login is successful, the API server generates the JWT token by using\
    \ the `jwt-go` library:\n\n```\n// create a signer for rsa 256\nt := jwt.New(jwt.GetSigningMethod(\"\
    RS256\"))\n// set our claims\nt.Claims[\"iss\"] = \"admin\"\nt.Claims[\"CustomUserInfo\"\
    ] = struct {\n\tName string\n\tRole string\n}{user.UserName, \"Member\"}\n// set\
    \ the expire time\nt.Claims[\"exp\"] = time.Now().Add(time.Minute * 20).Unix()\n\
    tokenString, err := t.SignedString(signKey)\n```\n\nIn the code block, a signer\
    \ with `\"RS256\"` was created. Claims were set, including an expiration (with\
    \ the predefined claim `\"exp\"`) for the JWT token. Finally, a JWT token was\
    \ created using the RSA key (private key) that was generated in the beginning\
    \ step. The `tokenString` variable contains the JWT token that is sent to the\
    \ client applications."
  raw: '### Working with JWT Using the jwt-go Package


    The third-party Go package `jwt-go` provides various utility functions for working
    with JWT. It provides the following utilities:


    *   Generates and signs JWT tokens

    *   Parses and verifies JWT tokens


    The `jwt-go` library supports the signing algorithms of RSA256 and HMAC SHA256.


    To install the `jwt-go` package, enter the following command in the terminal:


    `go get github.com/dgrijalva/jwt-go`


    To work with the `jwt-go` package, you must add `github.com/dgrijalva/jwt-go`
    to the import list:


    `import "github.com/dgrijalva/jwt-go"`


    LetвҖҷs write an example API to work with JWT tokens using the `jwt-go` package.
    Steps of the authentication flow in the example program are the following:


    The API server validates the user credentials (username and password) provided
    by the client application. В  If the login credentials are valid, the API server
    generates a JWT token and sends it to the client application as an access token.
    В  The client applications can store the JWT token in client storage. HTML 5 local
    storage is generally used for storing JWT tokens. В  To obtain access to protected
    resources of the API server, the client application sends an access token as a
    bearer token in the HTTP header `Authorization (Authorization: Bearer "Access_Token")`
    on every HTTP request.


    Before starting the example program, letвҖҷs generate RSA keys for the application
    to use to sign the tokens. The RSA keys can be generated by using the `openssl`
    command-line tool.


    Run the following commands:


    `openssl genrsa -out app.rsa 1024`


    `openssl rsa -in app.rsa -pubout > app.rsa.pub`


    These commands generate a private and public key. `1024` is the size of the key
    that was generated.


    Listing [7-2](#A978-1-4842-1052-9_7_Chapter.html#FPar4) shows the example program.


    Listing 7-2.В В JWT Token-based Authentication with the jwt-go Package


    `package` `main`


    `import (`


    `"encoding/json"`


    `"fmt"`


    `"io/ioutil"`


    `"log"`


    `"net/http"`


    `"time"`


    `jwt "github.com/dgrijalva/jwt-go"`


    `"github.com/gorilla/mux"`


    `)`


    `// using asymmetric crypto/RSA keys`


    `// location of the files used for signing and verification`


    `const (`


    `privKeyPath = "keys/app.rsa"В В В В В // openssl genrsa -out app.rsa 1024`


    `pubKeyPathВ В = "keys/app.rsa.pub" // openssl rsa -in app.rsa -pubout > app.rsa.pub`


    `)`


    `// verify key and sign key`


    `var (`


    `verifyKey, signKey []byte`


    `)`


    `//struct User for parsing login credentials`


    `type User struct {`


    `` UserName string `json:"username"` ``


    `` Password string `json:"password"` ``


    `}`


    `// read the key files before starting http handlers`


    `func init() {`


    `var err error`


    `signKey, err = ioutil.ReadFile(privKeyPath)`


    `if err != nil {`


    `log.Fatal("Error reading private key")`


    `return`


    `}`


    `verifyKey, err = ioutil.ReadFile(pubKeyPath)`


    `if err != nil {`


    `log.Fatal("Error reading private key")`


    `return`


    `}`


    `}`


    `// reads the login credentials, checks them and creates JWT the token`


    `func loginHandler(w http.ResponseWriter, r *http.Request) {`


    `var user User`


    `//decode into User struct`


    `err := json.NewDecoder(r.Body).Decode(&user)`


    `if err != nil {`


    `w.WriteHeader(http.StatusInternalServerError)`


    `fmt.Fprintln(w, "Error in request body")`


    `return`


    `}`


    `// validate user credentials`


    `if user.UserName != "shijuvar" && user.Password != "pass" {`


    `w.WriteHeader(http.StatusForbidden)`


    `fmt.Fprintln(w, "Wrong info")`


    `return`


    `}`


    `// create a signer for rsa 256`


    `t := jwt.New(jwt.GetSigningMethod("RS256"))`


    `// set our claims`


    `t.Claims["iss"] = "admin"`


    `t.Claims["CustomUserInfo"] = struct {`


    `Name string`


    `Role string`


    `}{user.UserName, "Member"}`


    `// set the expire time`


    `t.Claims["exp"] = time.Now().Add(time.Minute * 20).Unix()`


    `tokenString, err := t.SignedString(signKey)`


    `if err != nil {`


    `w.WriteHeader(http.StatusInternalServerError)`


    `fmt.Fprintln(w, "Sorry, error while Signing Token!")`


    `log.Printf("Token Signing error: %v\n", err)`


    `return`


    `}`


    `response := Token{tokenString}`


    `jsonResponse(response, w)`


    `}`


    `// only accessible with a valid token`


    `func authHandler(w http.ResponseWriter, r *http.Request) {`


    `// validate the token`


    `token, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{}, error)
    {`


    `// since we only use one private key to sign the tokens,`


    `// we also only use its public counter part to verify`


    `return verifyKey, nil`


    `})`


    `if err != nil {`


    `switch err.(type) {`


    `case *jwt.ValidationError: // something was wrong during the validation`


    `vErr := err.(*jwt.ValidationError)`


    `switch vErr.Errors {`


    `case jwt.ValidationErrorExpired:`


    `w.WriteHeader(http.StatusUnauthorized)`


    `fmt.Fprintln(w, "Token Expired, get a new one.")`


    `return`


    `default:`


    `w.WriteHeader(http.StatusInternalServerError)`


    `fmt.Fprintln(w, "Error while Parsing Token!")`


    `log.Printf("ValidationError error: %+v\n", vErr.Errors)`


    `return`


    `}`


    `default: // something else went wrong`


    `w.WriteHeader(http.StatusInternalServerError)`


    `fmt.Fprintln(w, "Error while Parsing Token!")`


    `log.Printf("Token parse error: %v\n", err)`


    `return`


    `}`


    `}`


    `if token.Valid {`


    `response := Response{"Authorized to the system"}`


    `jsonResponse(response, w)`


    `} else {`


    `response := Response{"Invalid token"}`


    `jsonResponse(response, w)`


    `}`


    `}`


    `type Response struct {`


    `` Text string `json:"text"` ``


    `}`


    `type Token struct {`


    `` Token string `json:"token"` ``


    `}`


    `func jsonResponse(response interface{}, w http.ResponseWriter) {`


    `json, err := json.Marshal(response)`


    `if err != nil {`


    `http.Error(w, err.Error(), http.StatusInternalServerError)`


    `return`


    `}`


    `w.WriteHeader(http.StatusOK)`


    `w.Header().Set("Content-Type", "application/json")`


    `w.Write(json)`


    `}`


    `//Entry point of the program`


    `func main() {`


    `r := mux.NewRouter()`


    `r.HandleFunc("/login", loginHandler).Methods("POST")`


    `r.HandleFunc("/auth", authHandler).Methods("POST")`


    `server := &http.Server{`


    `Addr:В В В В ":8080",`


    `Handler: r,`


    `}`


    `log.Println("Listening...")`


    `server.ListenAndServe()`


    `}`


    #### Generating the JWT Token


    If the login is successful, the API server generates the JWT token by using the
    `jwt-go` library:


    `// create a signer for rsa 256`


    В В В В `t := jwt.New(jwt.GetSigningMethod("RS256"))`


    В В В В `// set our claims`


    В В В В `t.Claims["iss"] = "admin"`


    В В В В `t.Claims["CustomUserInfo"] = struct {`


    В В В В В В В В `Name string`


    В В В В В В В В `Role string`


    В В В В `}{user.UserName, "Member"}`


    В В В В `// set the expire time`


    В В В В `t.Claims["exp"] = time.Now().Add(time.Minute * 20).Unix()`


    В В В В `tokenString, err := t.SignedString(signKey)`


    In the code block, a signer with `"RS256"` was created. Claims were set, including
    an expiration (with the predefined claim `"exp"`) for the JWT token. Finally,
    a JWT token was created using the RSA key (private key) that was generated in
    the beginning step. The `tokenString` variable contains the JWT token that is
    sent to the client applications.'
  trans: "\n# дҪҝз”Ё `jwt-go` еҢ…еӨ„зҗҶ JWT\n\nз¬¬дёүж–№ Go иҜӯиЁҖеҢ… `jwt-go` жҸҗдҫӣдәҶеӨҡз§Қз”ЁдәҺеӨ„зҗҶ JWT зҡ„е®һз”ЁеҮҪж•°гҖӮе®ғжҸҗдҫӣд»ҘдёӢе®һз”ЁеҠҹиғҪпјҡ\n\
    \n- з”ҹжҲҗе’ҢзӯҫзҪІ JWT д»ӨзүҢ\n- и§Јжһҗе’ҢйӘҢиҜҒ JWT д»ӨзүҢ\n\n`jwt-go` еә“ж”ҜжҢҒ RSA256 е’Ң HMAC SHA256 зӯҫеҗҚз®—жі•гҖӮ\n\n\
    иҰҒе®үиЈ… `jwt-go` еҢ…пјҢиҜ·еңЁз»Ҳз«Ҝдёӯиҫ“е…Ҙд»ҘдёӢе‘Ҫд»Өпјҡ\n\n```\ngo get github.com/dgrijalva/jwt-go\n```\n\n\
    иҰҒдҪҝз”Ё `jwt-go` еҢ…пјҢеҝ…йЎ»е°Ҷ `github.com/dgrijalva/jwt-go` ж·»еҠ еҲ°еҜје…ҘеҲ—иЎЁдёӯпјҡ\n\n```\nimport \"github.com/dgrijalva/jwt-go\"\
