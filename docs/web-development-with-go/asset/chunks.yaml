- fmt: "### Rendering the Edit Page\n\nThe Edit page is used to edit an existing `Note`\
    \ object. `edit.html` is used to provide the contents for the `head` and `body`\
    \ sections (see Listing 5-19).\n\n**Listing 5-19.** Template Definitions in `edit.html`\n\
    \n```\n{{define \"head\"}}<title>Edit Note</title>{{end}}\n{{define \"body\"}}\n\
    <h1>Edit Note</h1>\n<form action=\"/notes/update/{{.Id}}\" method=\"post\">\n\
    <p>Title:<br> <input type=\"text\" value=\"{{.Note.Title}}\" name=\"title\"></p>\n\
    <p>Description:<br> <textarea rows=\"4\" cols=\"50\" name=\"description\">{{.Note.Description}}</textarea>\
    \ </p>\n<p><input type=\"submit\" value=\"submit\"/></p>\n</form>\n{{end}}\n```\n\
    \nIn `edit.html`, the data elements of the `Note` object are mapped with HTML\
    \ form field values to edit an existing item. This template definition maps with\
    \ the data object of the `EditNote` struct that contains an `id` for the item\
    \ to be edited, along with the `Note` object for editing the fields of the `Note`\
    \ object. When the template for rendering the Edit page is executed, an instance\
    \ of the `EditNote` struct is provided as the data object (see Listing 5-20).\n\
    \n**Listing 5-20.** Data Model for Editing an Item\n\n```\n//View Model for edit\n\
    type EditNote struct {\n    Note\n    Id string\n}\n```\n\nWhen the HTTP server\
    \ gets the request for the `\"/notes/edit/{id}\"` route, it calls the `editNote`\
    \ handler function (see Listing 5-21).\n\n**Listing 5-21.** Handler Function for\
    \ `\"/notes/edit/{id}\"` in `main.go`\n\n```\n//Handler for \"/notes/edit/{id}\"\
    \ to edit an existing item\nfunc editNote(w http.ResponseWriter, r *http.Request)\
    \ {\n    var viewModel EditNote\n    //Read value from route variable\n    vars\
    \ := mux.Vars(r)\n    k := vars[\"id\"]\n    if note, ok := noteStore[k]; ok {\n\
