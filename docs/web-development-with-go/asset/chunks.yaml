- fmt: "### Configuring the Multiplexer\n\nYou can use a `mux` package as the multiplexer\
    \ and configure it with corresponding handler functions. Use `\"/api/notes\"`\
    \ as the base endpoint for representing the `Notes` resources. Because `mux` provides\
    \ support for mapping with HTTP methods, you can easily represent resources in\
    \ a RESTful way:\n\n```go\n//Entry point of the program\n\nfunc main() {\n\n \
    \   r := mux.NewRouter().StrictSlash(false)\n\n    r.HandleFunc(\"/api/notes\"\
    , GetNoteHandler).Methods(\"GET\")\n\n    r.HandleFunc(\"/api/notes\", PostNoteHandler).Methods(\"\
    POST\")\n\n    r.HandleFunc(\"/api/notes/{id}\", PutNoteHandler).Methods(\"PUT\"\
    )\n\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"DELETE\"\
    )\n\n    server := &http.Server{\n\n        Addr:    \":8080\",\n\n        Handler:\
    \ r,\n\n    }\n\n    log.Println(\"Listening...\")\n\n    server.ListenAndServe()\n\
    \n}\n```\n\nTable [4-1](#A978-1-4842-1052-9_4_Chapter.html#Tab1) shows the configurations\
    \ used with the multiplexer. The multiplexer calls corresponding handler functions\
    \ if the URI and HTTP methods match with a predefined list of configurations.\n\
    \n**Table 4-1.** Multiplexer Configurations\n\n| URI | HTTP Method | Handler Function\
    \ |\n| --- | --- | --- |\n| `/api/notes` | `Get` | `GetNoteHandler` |\n| `/api/notes`\
    \ | `Post` | `PostNoteHandler` |\n| `/api/notes/{id}` | `Put` | `PutNoteHandler`\
    \ |\n| `/api/notes/{id}` | `Delete` | `DeleteNoteHandler` |\n\n### Handler Functions\
    \ for CRUD Operations\n\nLetвҖҷs have a look at the handler function for `HTTP Get`\
    \ to get `Note` resource values:\n\n```go\n//HTTP Get - /api/notes\n\nfunc GetNoteHandler(w\
    \ http.ResponseWriter, r *http.Request) {\n\n    var notes []Note\n\n    for _,\
    \ v := range noteStore {\n\n        notes = append(notes, v)\n\n    }\n\n    w.Header().Set(\"\
    Content-Type\", \"application/json\")\n\n    j, err := json.Marshal(notes)\n\n\
    \    if err != nil {\n\n        panic(err)\n\n    }\n\n    w.WriteHeader(http.StatusOK)\n\
    \n    w.Write(j)\n\n}\n```\n\nHere you iterate through the `noteStore` map, and\
    \ the values are appended into a `Note` slice. By using the `Marshal` function\
    \ of the `json` package, the `Note` slice is encoded as JSON.\n\n`ResponseWriter`\
    \ is used for writing response headers and bodies. Here the header is written\
    \ using the `WriteHeader` method of `ResponseWriter`, and the response body is\
    \ written using the `Write` method of `ResponseWriter`. When you call the API\
    \ endpoint `\"/api/notes\"` with the `HTTP Get` method, you see the output in\
    \ the format shown in Figure [4-4](#A978-1-4842-1052-9_4_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1052-9_4_Fig4_HTML.jpg](A978-1-4842-1052-9_4_Fig4_HTML.jpg)\n\n\
    **Figure 4-4.** HTTP Get for the Notes resource\n\nIn Figure [4-4](#A978-1-4842-1052-9_4_Chapter.html#Fig4),\
    \ you get the `Note` collection as JSON. Here the Postman REST API client tool\
    \ is used to test the REST API example. Postman is a Chrome app that allows you\
    \ to test your APIs. (Because it is a Chrome app, it runs only on the Chrome browser,\
    \ however). With Postman, you can quickly construct HTTP requests to an API server,\
    \ save them for later use, and analyze the responses sent by the API server. Postman\
    \ is a very useful tool that can be used to test REST APIs without building a\
    \ client application. To get more details, visit the Postman web site at [`www.getpostman.com`](http://www.getpostman.com/).\n\
    \nLetвҖҷs have a look at the handler function for `HTTP Post` for creating a new\
    \ `Note` resource:\n\n```go\n//HTTP Post - /api/notes\n\nfunc PostNoteHandler(w\
    \ http.ResponseWriter, r *http.Request) {\n\n    var note Note\n\n    // Decode\
    \ the incoming Note json\n\n    err := json.NewDecoder(r.Body).Decode(&note)\n\
    \n    if err != nil {\n\n        panic(err)\n\n    }\n\n    note.CreatedOn = time.Now()\n\
    \n    id++\n\n    k := strconv.Itoa(id)\n\n    noteStore[k] = note\n\n    j, err\
    \ := json.Marshal(note)\n\n    if err != nil {\n\n        panic(err)\n\n    }\n\
    \n    w.Header().Set(\"Content-Type\", \"application/json\")\n\n    w.WriteHeader(http.StatusCreated)\n\
    \n    w.Write(j)\n\n}\n```\n\nA pointer to the `http.Request` object is used to\
    \ get information about `HTTP Request`. Here the incoming JSON data is accessed\
    \ from `Request.Body` and decoded into the `Note` resource using the `json` package.\
    \ The `NewDecoder` function creates a `Decoder` object, and its `Decode` method\
    \ decodes the JSON string into the given type (the `Note` type in this example).\
