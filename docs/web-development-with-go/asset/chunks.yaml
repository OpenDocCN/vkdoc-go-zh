    the Share button provides a sharable URL for sharing your code with others.


    ## Using Go Mobile


    You already know that Go can be used as a general-purpose programming language
    for building a variety of applications. It can also be used for building native
    mobile applications for both Android and iOS. The Go Mobile project provides tools
    and libraries for building native mobile applications. It includes a command-line
    tool called gomobile to help you build these applications.


    You can follow two development strategies to include Go into your mobile stack:


    *   Develop native mobile applications entirely written in Go

    *   Develop SDK applications by generating bindings from a Go package and invoking
    them from Java (on Android) and Objective-C (on iOS).


    The first strategy is to use Go everywhere in your mobile project by using the
    packages and tools provided by Go Mobile. Here you can use Go to develop both
    Android and iOS applications. In the second strategy, you can reuse a Go library
    package from a mobile application without making significant changes to your existing
    application. In this strategy, you can share a common code base for both Android
    and iOS applications. You can write the common functionality once in Go as a library
    package and put it to the platform-specific code by invoking the Go package through
    bindings.


    Note


    You can find out more about the Go Mobile project at [`https://github.com/golang/mobile`](https://github.com/golang/mobile)
    .


    ## Go as a Language for Web and Microservices


    The primary focus of this book is web development using Go. In modern computing,
    a digital transformation is happening, in which HTTP APIs (often RESTful APIs)
    are becoming the backbone for web applications, mobile applications, Big Data
    solutions, and the Internet of Things (IoT). These web-based APIs, which are powering
    the back ends for many modern applications, enable developers to integrate among
    various applications.


    There has recently been a monolithic architecture approach for developing larger
    applications, in which a single application includes all the logical components
    for running the application. These applications are very hard to maintain and
    scale due to tight coupling among various logical components. To solve various
    problems found in monolithic application architecture, developers prefer a microservices
    architectural style, in which a monolithic application is broken into a suite
    of small services (microservices), each running as an independent unit. The independent
    service pieces communicate by using either RESTful APIs or message brokers. Go
    is gradually becoming a preferred language for building RESTful APIs and microservices.


    Go may not be the language choice for building traditional web applications in
    which application logic and UI rendering logic reside in a server-side application.
    It is, however, the language choice for building modern web applications in which
    an API, often a RESTful API, is developed as the server-side implementation. By
    consuming these back-end services, you can build your front-end web applications.
    A Single Page Application (SPA) architecture has been widely used for building
    these web applications. The back-end services can also be used for building mobile
    applications.


    Go provides an `HTTP` package that allows you to build high-performance web applications
    and RESTful services by leveraging the built-in concurrency mechanism provided
    by Go. In Go, you can quickly build an HTTP server with fewer lines of code and
    start listening at a given HTTP port. By default, each HTTP request to the web
    server will be processed concurrently using a goroutine, which is a mechanism
    in Go to concurrently run functions independently of other functions. You can
    run millions of goroutines in a single server that enables you to build massively
    scalable web applications and web APIs in Go.


    The simplicity of Go is also reflected in Go web programming that enables lots
    of developer productivity. When you build web-based systems in other programming
    languages, you may have to use a full-fledged web framework such as Rails for
    Ruby, Django for Python, or ASP.NET MVC for C#. In Go, lots of web frameworks
    are available as third-party packages. But without using a full-fledged web framework,
    you can build highly scalable web systems by simply using built-in Go packages
    and a few lightweight libraries available as third-party packages.


    Note


    In [Chapter 9](#A978-1-4842-1052-9_9_Chapter.html), you will learn how to build
    a scalable web API in Go without using a web framework.


    Microservices architecture, in which independently running services have been
    widely used to communicate over RESTful APIs, was previously discussed. Go is
    a great choice for building these RESTful services and is also becoming the language
    of choice for building independent services (microservices) in the microservices
    architecture because of the simplicity of its language, concurrency capability,
    performance, and capability to develop distributed applications.'
  trans: "\n# жөӢиҜ• Go д»Јз Ғ\n\nGo з”ҹжҖҒзі»з»ҹжҸҗдҫӣдәҶејҖеҸ‘ Go еә”з”ЁжүҖйңҖзҡ„жүҖжңүеҹәжң¬е·Ҙе…·пјҢеҢ…жӢ¬ж— йңҖеҖҹеҠ©д»»дҪ•еӨ–йғЁеә“жҲ–е·Ҙе…·еҚіеҸҜжөӢиҜ• Go д»Јз Ғзҡ„иғҪеҠӣгҖӮж ҮеҮҶеә“дёӯзҡ„\
    \ `testing` еҢ…жҸҗдҫӣдәҶзј–еҶҷиҮӘеҠЁеҢ–жөӢиҜ•зҡ„еҠҹиғҪпјҢиҖҢ Go е·Ҙе…·еҲҷжҸҗдҫӣдәҶиҝҗиЎҢиҮӘеҠЁеҢ–жөӢиҜ•зҡ„ж”ҜжҢҒгҖӮеңЁејҖеҸ‘иҪҜд»¶зі»з»ҹж—¶пјҢдёәеә”з”ЁзЁӢеәҸд»Јз Ғзј–еҶҷиҮӘеҠЁеҢ–жөӢиҜ•жҳҜзЎ®дҝқиҙЁйҮҸе№¶жҸҗй«ҳеҸҜз»ҙжҠӨжҖ§зҡ„йҮҚиҰҒе®һи·өгҖӮеҰӮжһңдҪ зҡ„д»Јз ҒжңүжөӢиҜ•иҰҶзӣ–пјҢдҪ е°ұеҸҜд»ҘжҜ«ж— йЎҫиҷ‘ең°йҮҚжһ„еә”з”ЁзЁӢеәҸд»Јз ҒгҖӮ\n\
    \nи®©жҲ‘д»¬дёәдёҠдёҖиҠӮеҲӣе»әзҡ„ `calc` еҢ…зј–еҶҷдёҖдәӣжөӢиҜ•гҖӮдҪ йңҖиҰҒеҲӣе»әдёҖдёӘд»Ҙ `_test.go` з»“е°ҫзҡ„жәҗж–Үд»¶пјҢе№¶еңЁе…¶дёӯйҖҡиҝҮж·»еҠ д»Ҙ `\"Test\"` ејҖеӨҙгҖҒдё”д»…жҺҘеҸ—дёҖдёӘзұ»еһӢдёә\
    \ `*testing.T` еҸӮж•°зҡ„еҮҪж•°жқҘзј–еҶҷжөӢиҜ•гҖӮ\n\nеңЁ `calc` еҢ…зӣ®еҪ•дёӢпјҢеҲӣе»әдёҖдёӘеҗҚдёә `calc_test.go` зҡ„ж–°жәҗж–Үд»¶пјҢе…¶дёӯеҢ…еҗ«жё…еҚ•\
    \ 1-4 жүҖзӨәзҡ„д»Јз ҒгҖӮ\n\n**жё…еҚ• 1-4.** жөӢиҜ• `calc` еҢ…\n\n```go\npackage calc\n\nimport \"testing\"\
    \n\nfunc TestAdd(t *testing.T) {\n    var result int\n    result = Add(15,10)\n\
    \    if result != 25 {\n        t.Error(\"Expected 25, got \", result)\n    }\n\
    }\nfunc TestSubtract(t *testing.T) {\n    var result int\n    result = Subtract(15,10)\n\
    \    if result != 5 {\n        t.Error(\"Expected 5, got \", result)\n    }\n\
    }\n```\n\n- **з¬¬ 1 иЎҢпјҡ** жҢҮе®ҡеҢ…еҗҚдёә `calc`гҖӮ\n- **з¬¬ 3 иЎҢпјҡ** д»Һж ҮеҮҶеә“еҜје…Ҙ `\"testing\"` еҢ…пјҢиҜҘеҢ…жҸҗдҫӣдәҶзј–еҶҷжөӢиҜ•зҡ„еҹәжң¬еҠҹиғҪпјҢе№¶дёҺ\
    \ `Go test` е‘Ҫд»ӨеҚҸеҗҢе·ҘдҪңгҖӮ\n- **з¬¬ 5 иЎҢпјҡ** ж·»еҠ дёҖдёӘеҗҚдёә `\"TestAdd\"` зҡ„жөӢиҜ•пјҢе…¶зӯҫеҗҚдёә `func (t *testing.T)`пјҢз”ЁдәҺйӘҢиҜҒ\
    \ `calc` еҢ…дёӯ `Add` еҮҪж•°зҡ„еҠҹиғҪгҖӮ\n- **з¬¬ 12 иЎҢпјҡ** ж·»еҠ дёҖдёӘеҗҚдёә `\"TestSubtract\"` зҡ„жөӢиҜ•пјҢе…¶зӯҫеҗҚдёә `func\
    \ (t *testing.T)`пјҢз”ЁдәҺйӘҢиҜҒ `calc` еҢ…дёӯ `Subtract` еҮҪж•°зҡ„еҠҹиғҪгҖӮ\n\nиҰҒдҪҝз”Ё Go е·Ҙе…·иҝҗиЎҢиҝҷдәӣжөӢиҜ•пјҢиҜ·еңЁеҢ…зӣ®еҪ•дёӢиҫ“е…Ҙд»ҘдёӢе‘Ҫд»Өпјҡ\n\
    \n```bash\ngo test\n```\n\n`go test` е‘Ҫд»Өдјҡж №жҚ®жөӢиҜ•жүҖз”Ёзҡ„зәҰе®ҡпјҢиҜҶеҲ«е№¶жү§иЎҢеҢ…ж–Үд»¶дёӯзҡ„жөӢиҜ•гҖӮе®ғе°ҶжҳҫзӨәд»ҘдёӢз»“жһңпјҡ\n\n```\n\
    PASS\nok      github.com/shijuvar/go-web-book/chapter1/calc   0.310s\n```\n\n\
    ## дҪҝз”Ё Go Playground\n\nGo Playground жҳҜдёҖдёӘе…Ғи®ёдҪ еңЁ Web жөҸи§ҲеҷЁдёӯзј–еҶҷе’ҢиҝҗиЎҢ Go зЁӢеәҸзҡ„е·Ҙе…·пјҲеҸӮи§Ғеӣҫ 1-4пјүгҖӮйҖҡиҝҮдҪҝз”ЁжӯӨе·Ҙе…·пјҢдҪ ж— йңҖеңЁзі»з»ҹдёҠе®үиЈ…\
    \ Go еҚіеҸҜзј–еҶҷе’ҢиҝҗиЎҢ Go зЁӢеәҸгҖӮ\n\n![A978-1-4842-1052-9_1_Fig4_HTML.jpg](img/A978-1-4842-1052-9_1_Fig4_HTML.jpg)\n\
    \n**еӣҫ 1-4.** Go Playground\n\n> **жіЁпјҡ** еҹәдәҺжөҸи§ҲеҷЁзҡ„ Go Playground е·Ҙе…·еҸҜйҖҡиҝҮ [`https://play.golang.org/`](https://play.golang.org/)\
    \ и®ҝй—®гҖӮ\n\nGo Playground иҝҳеҸҜз”ЁдәҺдёҺе…¶д»–ејҖеҸ‘иҖ…е…ұдә« Go д»Јз ҒгҖӮзӮ№еҮ» **Share** жҢүй’®дјҡз”ҹжҲҗдёҖдёӘеҸҜе…ұдә«зҡ„ URLпјҢз”ЁдәҺдёҺд»–дәәеҲҶдә«дҪ зҡ„д»Јз ҒгҖӮ\n\
    \n## дҪҝз”Ё Go Mobile\n\nдҪ е·Із»ҸзҹҘйҒ“пјҢGo дҪңдёәдёҖз§ҚйҖҡз”Ёзј–зЁӢиҜӯиЁҖпјҢеҸҜз”ЁдәҺжһ„е»әеӨҡз§Қзұ»еһӢзҡ„еә”з”ЁзЁӢеәҸгҖӮе®ғд№ҹеҸҜз”ЁдәҺдёә Android е’Ң iOS жһ„е»әеҺҹз”ҹз§»еҠЁеә”з”ЁзЁӢеәҸгҖӮGo\
    \ Mobile йЎ№зӣ®дёәжһ„е»әеҺҹз”ҹз§»еҠЁеә”з”ЁзЁӢеәҸжҸҗдҫӣдәҶе·Ҙе…·е’Ңеә“гҖӮе®ғеҢ…еҗ«дёҖдёӘеҗҚдёә `gomobile` зҡ„е‘Ҫд»ӨиЎҢе·Ҙе…·пјҢеҸҜеё®еҠ©дҪ жһ„е»әиҝҷдәӣеә”з”ЁзЁӢеәҸгҖӮ\n\nдҪ еҸҜд»ҘйҮҮз”Ёд»ҘдёӢдёӨз§ҚејҖеҸ‘зӯ–з•Ҙе°Ҷ\
    \ Go йӣҶжҲҗеҲ°дҪ зҡ„з§»еҠЁжҠҖжңҜж Ҳдёӯпјҡ\n\n- е®Ңе…Ёз”Ё Go ејҖеҸ‘еҺҹз”ҹз§»еҠЁеә”з”ЁзЁӢеәҸ\n- йҖҡиҝҮд»Һ Go еҢ…з”ҹжҲҗз»‘е®ҡпјҢе№¶д»Һ JavaпјҲе®үеҚ“з«Ҝпјүе’Ң Objective-CпјҲiOS\
    \ з«Ҝпјүи°ғз”Ёе®ғд»¬пјҢжқҘејҖеҸ‘ SDK еә”з”ЁзЁӢеәҸ\n\nз¬¬дёҖз§Қзӯ–з•ҘжҳҜдҪҝз”Ё Go Mobile жҸҗдҫӣзҡ„еҢ…е’Ңе·Ҙе…·пјҢеңЁдҪ зҡ„з§»еҠЁйЎ№зӣ®дёӯе…ЁйқўдҪҝз”Ё GoгҖӮеңЁжӯӨпјҢдҪ еҸҜд»ҘдҪҝз”Ё Go\
    \ ејҖеҸ‘е®үеҚ“е’Ң iOS еә”з”ЁзЁӢеәҸгҖӮеңЁз¬¬дәҢз§Қзӯ–з•ҘдёӯпјҢдҪ еҸҜд»Ҙд»Һз§»еҠЁеә”з”ЁзЁӢеәҸдёӯйҮҚз”Ё Go еә“еҢ…пјҢиҖҢж— йңҖеҜ№зҺ°жңүеә”з”ЁзЁӢеәҸиҝӣиЎҢйҮҚеӨ§жӣҙж”№гҖӮйҖҡиҝҮжӯӨзӯ–з•ҘпјҢдҪ еҸҜд»Ҙдёә Android\
    \ е’Ң iOS еә”з”ЁзЁӢеәҸе…ұдә«дёҖдёӘйҖҡз”Ёзҡ„д»Јз Ғеә“гҖӮдҪ еҸҜд»Ҙз”Ё Go е°ҶйҖҡз”ЁеҠҹиғҪдёҖж¬ЎжҖ§зј–еҶҷдёәеә“еҢ…пјҢз„¶еҗҺйҖҡиҝҮз»‘е®ҡи°ғз”Ё Go еҢ…пјҢе°Ҷе…¶йӣҶжҲҗеҲ°е№іеҸ°зү№е®ҡд»Јз ҒдёӯгҖӮ\n\n>\
    \ **жіЁпјҡ** дҪ еҸҜд»ҘеңЁ [`https://github.com/golang/mobile`](https://github.com/golang/mobile)\
    \ жүҫеҲ°е…ідәҺ Go Mobile йЎ№зӣ®зҡ„жӣҙеӨҡдҝЎжҒҜгҖӮ\n\n## Go дҪңдёә Web е’Ңеҫ®жңҚеҠЎиҜӯиЁҖ\n\nжң¬д№Ұзҡ„дё»иҰҒйҮҚзӮ№жҳҜдҪҝз”Ё Go иҝӣиЎҢ Web ејҖеҸ‘гҖӮеңЁзҺ°д»Ји®Ўз®—йўҶеҹҹпјҢдёҖеңәж•°еӯ—еҢ–иҪ¬еһӢжӯЈеңЁиҝӣиЎҢдёӯпјҢHTTP\
    \ APIпјҲйҖҡеёёжҳҜ RESTful APIпјүжӯЈжҲҗдёә Web еә”з”ЁгҖҒз§»еҠЁеә”з”ЁгҖҒеӨ§ж•°жҚ®и§ЈеҶіж–№жЎҲе’Ңзү©иҒ”зҪ‘пјҲIoTпјүзҡ„ж”ҜжҹұгҖӮиҝҷдәӣеҹәдәҺ Web зҡ„ API дёәи®ёеӨҡзҺ°д»Јеә”з”ЁжҸҗдҫӣеҗҺз«Ҝж”ҜжҢҒпјҢдҪҝејҖеҸ‘иҖ…иғҪеӨҹйӣҶжҲҗеҗ„з§Қеә”з”ЁзЁӢеәҸгҖӮ\n\
    \nиҝҮеҺ»пјҢејҖеҸ‘еӨ§еһӢеә”з”ЁдёҖзӣҙйҮҮз”ЁеҚ•дҪ“жһ¶жһ„ж–№жі•пјҢеҚіеҚ•дёӘеә”з”ЁеҢ…еҗ«иҝҗиЎҢжүҖйңҖзҡ„жүҖжңүйҖ»иҫ‘з»„д»¶гҖӮз”ұдәҺеҗ„з§ҚйҖ»иҫ‘з»„д»¶д№Ӣй—ҙзҡ„зҙ§иҖҰеҗҲпјҢиҝҷдәӣеә”з”Ёйқһеёёйҡҫд»Ҙз»ҙжҠӨе’Ңжү©еұ•гҖӮдёәдәҶи§ЈеҶіеҚ•дҪ“еә”з”Ёжһ¶жһ„дёӯеҸ‘зҺ°зҡ„еҗ„зұ»й—®йўҳпјҢејҖеҸ‘иҖ…еҖҫеҗ‘дәҺйҮҮз”Ёеҫ®жңҚеҠЎжһ¶жһ„йЈҺж јпјҢе°ҶеҚ•дҪ“еә”з”ЁеҲҶи§ЈдёәдёҖз»„е°ҸеһӢжңҚеҠЎпјҲеҫ®жңҚеҠЎпјүпјҢжҜҸдёӘжңҚеҠЎдҪңдёәдёҖдёӘзӢ¬з«ӢеҚ•е…ғиҝҗиЎҢгҖӮиҝҷдәӣзӢ¬з«Ӣзҡ„жңҚеҠЎйҖҡиҝҮ\
    \ RESTful API жҲ–ж¶ҲжҒҜд»ЈзҗҶиҝӣиЎҢйҖҡдҝЎгҖӮGo жӯЈйҖҗжёҗжҲҗдёәжһ„е»ә RESTful API е’Ңеҫ®жңҚеҠЎзҡ„йҰ–йҖүиҜӯиЁҖгҖӮ\n\nеҜ№дәҺеә”з”ЁйҖ»иҫ‘е’Ң UI жёІжҹ“йҖ»иҫ‘йғҪй©»з•ҷеңЁжңҚеҠЎеҷЁз«Ҝеә”з”ЁзЁӢеәҸдёӯзҡ„дј з»ҹ\
    \ Web еә”з”ЁпјҢGo еҸҜиғҪдёҚжҳҜиҜӯиЁҖйҰ–йҖүгҖӮз„¶иҖҢпјҢеҜ№дәҺжһ„е»әзҺ°д»Ј Web еә”з”ЁпјҲе…¶дёӯ APIпјҢйҖҡеёёжҳҜ RESTful APIпјҢдҪңдёәжңҚеҠЎеҷЁз«Ҝе®һзҺ°жқҘејҖеҸ‘пјүжқҘиҜҙпјҢGo\
    \ жҳҜиҜӯиЁҖйҰ–йҖүгҖӮйҖҡиҝҮдҪҝз”ЁиҝҷдәӣеҗҺз«ҜжңҚеҠЎпјҢдҪ еҸҜд»Ҙжһ„е»әеүҚз«Ҝ Web еә”з”ЁгҖӮеҚ•йЎөеә”з”ЁпјҲSPAпјүжһ¶жһ„е·Іиў«е№ҝжіӣз”ЁдәҺжһ„е»әиҝҷдәӣ Web еә”з”ЁгҖӮиҝҷдәӣеҗҺз«ҜжңҚеҠЎд№ҹеҸҜз”ЁдәҺжһ„е»әз§»еҠЁеә”з”ЁзЁӢеәҸгҖӮ\n\
    \nGo жҸҗдҫӣдәҶ `HTTP` еҢ…пјҢе…Ғи®ёдҪ йҖҡиҝҮеҲ©з”Ё Go еҶ…зҪ®зҡ„е№¶еҸ‘жңәеҲ¶жқҘжһ„е»әй«ҳжҖ§иғҪзҡ„ Web еә”з”Ёе’Ң RESTful жңҚеҠЎгҖӮеңЁ Go дёӯпјҢдҪ еҸҜд»Ҙз”Ёжӣҙе°‘зҡ„д»Јз ҒиЎҢеҝ«йҖҹжһ„е»әдёҖдёӘ\
    \ HTTP жңҚеҠЎеҷЁпјҢе№¶ејҖе§Ӣзӣ‘еҗ¬жҢҮе®ҡзҡ„ HTTP з«ҜеҸЈгҖӮй»ҳи®Өжғ…еҶөдёӢпјҢеҜ№ Web жңҚеҠЎеҷЁзҡ„жҜҸдёӘ HTTP иҜ·жұӮйғҪе°ҶдҪҝз”Ё goroutine е№¶еҸ‘еӨ„зҗҶпјҢиҝҷжҳҜ Go\
    \ дёӯдёҖз§ҚзӢ¬з«ӢдәҺе…¶д»–еҮҪж•°е№¶еҸ‘иҝҗиЎҢеҮҪж•°зҡ„жңәеҲ¶гҖӮдҪ еҸҜд»ҘеңЁеҚ•еҸ°жңҚеҠЎеҷЁдёҠиҝҗиЎҢж•°зҷҫдёҮдёӘ goroutineпјҢиҝҷдҪҝдҪ иғҪеӨҹдҪҝз”Ё Go жһ„е»әеӨ§и§„жЁЎеҸҜжү©еұ•зҡ„ Web еә”з”Ёе’Ң\
    \ Web APIгҖӮ\n\nGo зҡ„з®ҖжҙҒжҖ§д№ҹдҪ“зҺ°еңЁ Go Web зј–зЁӢдёӯпјҢиҝҷеӨ§еӨ§жҸҗй«ҳдәҶејҖеҸ‘иҖ…зҡ„з”ҹдә§еҠӣгҖӮеҪ“дҪ з”Ёе…¶д»–зј–зЁӢиҜӯиЁҖжһ„е»әеҹәдәҺ Web зҡ„зі»з»ҹж—¶пјҢеҸҜиғҪйңҖиҰҒдҪҝз”ЁдёҖдёӘеҠҹиғҪе®ҢеӨҮзҡ„\
    \ Web жЎҶжһ¶пјҢдҫӢеҰӮ Ruby зҡ„ RailsгҖҒPython зҡ„ Django жҲ– C# зҡ„ ASP.NET MVCгҖӮеңЁ Go дёӯпјҢи®ёеӨҡ Web жЎҶжһ¶йғҪжҳҜдҪңдёәз¬¬дёүж–№еҢ…жҸҗдҫӣзҡ„гҖӮдҪҶеҚідҪҝдёҚдҪҝз”ЁеҠҹиғҪе®ҢеӨҮзҡ„\
    \ Web жЎҶжһ¶пјҢдҪ д№ҹеҸҜд»Ҙд»…йҖҡиҝҮдҪҝз”Ё Go еҶ…зҪ®еҢ…е’ҢдёҖдәӣиҪ»йҮҸзә§зҡ„з¬¬дёүж–№еә“жқҘжһ„е»әй«ҳеәҰеҸҜжү©еұ•зҡ„ Web зі»з»ҹгҖӮ\n\n> **жіЁпјҡ** еңЁз¬¬ 9 з« дёӯпјҢдҪ е°ҶеӯҰд№ еҰӮдҪ•еңЁдёҚдҪҝз”Ё\
    \ Web жЎҶжһ¶зҡ„жғ…еҶөдёӢпјҢз”Ё Go жһ„е»әдёҖдёӘеҸҜжү©еұ•зҡ„ Web APIгҖӮ\n\nеүҚйқўи®Ёи®әиҝҮеҫ®жңҚеҠЎжһ¶жһ„пјҢе…¶дёӯзӢ¬з«ӢиҝҗиЎҢзҡ„жңҚеҠЎиў«е№ҝжіӣз”ЁдәҺйҖҡиҝҮ RESTful API\
    \ иҝӣиЎҢйҖҡдҝЎгҖӮGo жҳҜжһ„е»әиҝҷдәӣ RESTful жңҚеҠЎзҡ„з»қдҪійҖүжӢ©пјҢе№¶дё”з”ұдәҺе…¶иҜӯиЁҖзҡ„з®ҖжҙҒжҖ§гҖҒе№¶еҸ‘иғҪеҠӣгҖҒжҖ§иғҪд»ҘеҸҠејҖеҸ‘еҲҶеёғејҸеә”з”Ёзҡ„иғҪеҠӣпјҢе®ғжӯЈжҲҗдёәеҫ®жңҚеҠЎжһ¶жһ„дёӯжһ„е»әзӢ¬з«ӢжңҚеҠЎпјҲеҫ®жңҚеҠЎпјүзҡ„йҰ–йҖүиҜӯиЁҖгҖӮ\n"
- fmt: "# Microservices Architecture with Go\n\nMicroservices architecture is a distributed\
    \ application architecture, and Go is a great choice for building distributed\
    \ systems. Some technologies such as `Node.js` are great for building lightweight\
    \ RESTful APIs, but simply fail when they are used to build distributed applications.\
    \ Go is the perfect language of choice for applications with microservices architecture,\
    \ in which Go can be used for all components of the application architecture,\
    \ including small services running as independent units, RESTful services to communicate\
    \ among independent services, and message brokers to communicate among independent\
    \ services using asynchronous protocols such as AMQP.\n\n## Summary\n\nGo is a\
    \ modern, statically typed, natively compiled, garbage-collected programming language\
    \ that allows you to write high-performance applications while enabling a greater\
    \ level of productivity with its simple syntax and pragmatic design. In Go, concurrency\
    \ is a built-in feature at the core language level that allows you to write highly\
    \ efficient software systems for modern computers. The Go ecosystem includes the\
    \ language, libraries, and tools that provide all the essential features for developing\
    \ a wide variety of applications. The Go Mobile project includes packages and\
    \ tools for building native mobile applications for Android and iOS. Go is a great\
    \ programming language for building scalable, web-based, back-end systems and\
    \ microservices.\n\n# Go Fundamentals\n\n[Chapter 1](#A978-1-4842-1052-9_1_Chapter.html)\
    \ furnished an overview of the Go programming language and discussed how it is\
    \ different from other programming languages. In this chapter, you will learn\
    \ Go fundamentals for writing reusable code using packages and how to work with\
    \ arrays and collections. You will also learn Go language fundamentals such as\
    \ `defer`, `panic`, and `recover`, and about GoвҖҷs unique error-handling capabilities.\n\
    \n## Packages\n\nFor a Go developer, the design philosophy for developing applications\
    \ is to develop reusable pieces of smaller software components and build applications\
    \ by composing these components. Go provides modularity, composability, and code\
    \ reusability through its package ecosystem. Go encourages you to write maintainable\
    \ and reusable pieces of code through packages that enable you to compose your\
    \ applications with these smaller packages. Go packages are a vital concept that\
    \ allow you to achieve many of the Go design principles. Like other features of\
    \ Go, packages are designed with simplicity and pragmatism.\n\nGo source files\
    \ are organized into directories called packages, and the name of the package\
    \ must be the name of the directory containing the Go source files. You organize\
    \ Go source files with the `.go` extension into directories in which the package\
    \ name will be same for the source files that belong to a directory. Packages\
    \ from the standard library belong to the `GOROOT` directory, which is the Go\
    \ installation directory. You write Go programs in the `GOPATH` directory as packages\
    \ that are easily reusable from other packages.\n\n**Note:** The documentation\
    \ on standard library packages is available at [`http://golang.org/pkg/`](http://golang.org/pkg/).\
    \ Visit [`http://godoc.org/`](http://godoc.org/) for documentation on packages\
    \ of both standard library and third-party libraries.\n\n### Package main\n\n\
    In Go, you can write two types of programs: executable programs and a shared library.\
    \ When you write executable programs, you must give `main` as the package name\
    \ to make the package an executable program: the package `main` tells the Go compiler\
    \ that the package should compile as an executable program. The executable programs\
    \ in Go are often referred to as commands in the official Go documentation. The\
    \ entry point of the executable program is the `main` function of the `main` package;\
    \ the `main` function in the `package` main is the entry point of the executable\
    \ program. When you write packages as shared libraries, there are no `main` packages\
    \ or `main` functions in the package.\n\nListing [2-1](#A978-1-4842-1052-9_2_Chapter.html#FPar2)\
    \ is the code block for package `main`.\n\n**Listing 2-1.** Package main with\
    \ the main Function\n\n```\npackage main\n\nimport (\n    \"fmt\"\n)\n\nfunc main()\
    \ {\n    fmt.Println(\"Hello World!\")\n}\n```\n\nWhen you build the preceding\
    \ program using the Go tool, the Go compiler generates an executable binary as\
    \ the output. As mentioned earlier, if you want to build executable programs in\
    \ Go, you must write a package `main` with a function `main` as the entry point\
    \ for your programs.\n\n### Package Alias\n\nWhen you write Go packages, you donвҖҷt\
    \ have to worry about package ambiguity; you can even use the same package names\
    \ as those of the standard library. When you import your own packages from the\
    \ `GOPATH` location, you refer the full path of the package location to avoid\
    \ package name ambiguity. You can use two packages with the same name from two\
    \ different locations, but you should avoid name ambiguity when referencing from\
    \ your programs. The package alias helps you avoid name ambiguity when you reference\
    \ multiple packages with the same name.\n\nListing [2-2](#A978-1-4842-1052-9_2_Chapter.html#FPar3)\
    \ is an example program that uses the package alias to reference packages.\n\n\
    **Listing 2-2.** Using the Package Alias to Avoid Name Ambiguity\n\n```\npackage\
    \ main\n\nimport (\n      mongo \"lib/mongodb/db\"\n      mysql \"lib/mysql/db\"\
    \n)\n\nfunc main() {\n    mongo.Get() //calling method of package \"lib/mongodb/db\"\
    \n    mysql.Get() //calling method of package \"lib/mysql/db\"\n}\n```\n\nTwo\
    \ packages are imported with the same name, `db`, but they are referenced with\
    \ different aliases, and their exported identifiers are accessed using an alias\
    \ name.\n\n### Function init\n\nWhen you write packages, you may need to provide\
    \ some initialization logic for the packages, such as initializing package variables,\
    \ initializing database objects, and providing some bootstrapping logic for the\
    \ packages. The `init` function, which helps provide initialization logic into\
    \ packages, is executed at the beginning of the execution.\n\nListing [2-3](#A978-1-4842-1052-9_2_Chapter.html#FPar4)\
    \ is an example program that uses the `init` function to initialize a database\
    \ session object.\n\n**Listing 2-3.** Using the init Function\n\n```\npackage\
    \ db\n\nimport (\n    \"gopkg.in/mgo.v2\"\n)\n\nvar Session *mgo.Session //Database\
    \ Session object\n\nfunc init() {\n    // initialization code here\n    Session,\
    \ err := mgo.Dial(\"localhost\")\n}\n\nfunc get() {\n        //logic for get that\
    \ uses Session object\n}\n\nfunc add() {\n        //logic for add that uses Session\
    \ object\n}\n\nfunc update() {\n        //logic for update that uses Session object\n\
    }\n\nfunc delete() {\n        //logic for delete that uses Session object\n}\n\
    ```\n\nIn this code block, a MongoDB session object is created in the `init` function.\
    \ When you import the package `db` into other packages, the function `init` will\
    \ be invoked at the beginning of the execution in which the initialization logic\
    \ for the package is included. Suppose that you reference the package `db` from\
    \ a `main` package; the `init` function will be invoked before the `main` function\
    \ executes."
