    \ - Before Handler`\n- `2015/04/30 14:46:00 Authorized to the system`\n- `2015/04/30\
    \ 14:46:00 Executing message Handler`\n- `2015/04/30 14:46:00 MiddlewareSecond\
    \ - After Handler`\n- `2015/04/30 14:46:00 MiddlewareFirst - After Handler`\n\
    - `[negroni] Completed 200 OK in 1.0071ms`\n\nйҖҡиҝҮжҹҘзңӢиҝҷдәӣж—Ҙеҝ—дҝЎжҒҜпјҢдҪ еҸҜд»ҘеҫҲе®№жҳ“ең°зҗҶи§ЈеӨ„зҗҶеҮҪж•°зҡ„жҺ§еҲ¶жөҒгҖӮ\n\n\
    иҰҒйҮҚеҶҷзҺ°жңүзЁӢеәҸд»ҘйҖӮй…Қ `Negroni`пјҢдёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°еҝ…йЎ»дҝ®ж”№дёәдёҺ `negroni.Handler` жҺҘеҸЈе…је®№пјҡ\n\n```\nfunc middlewareFirst(w\
    \ http.ResponseWriter, r *http.Request, next http.HandlerFunc) {\n    //дёӢдёҖдёӘеӨ„зҗҶеҷЁд№ӢеүҚзҡ„йҖ»иҫ‘\n\
    \    next(w, r)\n    //дёӢдёҖдёӘеӨ„зҗҶеҷЁд№ӢеҗҺзҡ„йҖ»иҫ‘\n}\n\nfunc middlewareSecond(w http.ResponseWriter,\
    \ r *http.Request, next http.HandlerFunc) {\n    //дёӢдёҖдёӘеӨ„зҗҶеҷЁд№ӢеүҚзҡ„йҖ»иҫ‘\n    next(w, r)\n\
    \    //дёӢдёҖдёӘеӨ„зҗҶеҷЁд№ӢеҗҺзҡ„йҖ»иҫ‘\n}\n```\n\nеҪ“дёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°е…је®№ `negroni.Handler` жҺҘеҸЈеҗҺпјҢйңҖиҰҒдҪҝз”Ё `Negroni`\
    \ е®һдҫӢзҡ„ `Use` еҮҪж•°е°Ҷе®ғд»¬ж·»еҠ еҲ° `Negroni` дёӯй—ҙд»¶ж ҲдёӯгҖӮеӨ„зҗҶеҮҪж•°жҢүз…§ж·»еҠ еҲ° `Negroni` дёӯй—ҙд»¶ж Ҳзҡ„йЎәеәҸиў«и°ғз”Ёпјҡ\n\n```\n\
    n := negroni.Classic()\nn.Use(negroni.HandlerFunc(middlewareFirst))\nn.Use(negroni.HandlerFunc(middlewareSecond))\n\
    ```\n\nз”ұдәҺ `Negroni` е®һдҫӢжҳҜйҖҡиҝҮ `Classic` еҮҪж•°еҲӣе»әзҡ„пјҢдёӯй—ҙд»¶ж ҲдёӯдјҡеҢ…еҗ«д»ҘдёӢеҶ…зҪ®дёӯй—ҙд»¶еҮҪж•°пјҡ\n\n- `negroni.Recovery`\n\
    - `negroni.Logging`\n- `negroni.Static`\n\nдҪ д№ҹеҸҜд»ҘеңЁйҖҡиҝҮ `New` еҮҪж•°еҲӣе»ә `Negroni` е®һдҫӢж—¶ж·»еҠ дёӯй—ҙд»¶еҮҪж•°пјҡ\n\
    \n```\nn := negroni.New(\n    negroni.NewRecovery(),\n    negroni.HandlerFunc(middlewareFirst),\n\
    \    negroni.HandlerFunc(middlewareSecond),\n    negroni.NewLogger(),\n    negroni.NewStatic(http.Dir(\"\
    public\")),\n)\n```\n\n`Negroni` жҸҗдҫӣдәҶдёҖдёӘйқһеёёз®ҖеҚ•дё”дјҳйӣ…зҡ„еә“жқҘеӨ„зҗҶ HTTP дёӯй—ҙд»¶еҮҪж•°гҖӮиҝҷжҳҜдёҖдёӘйқһеёёе°Ҹе·§зҡ„еә“пјҢдҪҶеңЁз”Ё Go\
    \ жһ„е»әзңҹе®һдё–з•Ңзҡ„ Web еә”з”Ёе’Ң RESTful жңҚеҠЎж—¶йқһеёёжңүз”ЁгҖӮ`Negroni` зҡ„дё»иҰҒдјҳеҠҝд№ӢдёҖжҳҜе®ғдёҺ `net/http` еә“е®Ңе…Ёе…је®№гҖӮеҰӮжһңдҪ дёҚе–ңж¬ўдҪҝз”Ёе…ЁеҠҹиғҪзҡ„\
    \ Web ејҖеҸ‘жЎҶжһ¶еңЁ Go дёӯжһ„е»ә Web еә”з”ЁпјҢйӮЈд№ҲдҪҝз”Ё `Negroni` еҲ¶дҪңе’ҢдҪҝз”Ё HTTP дёӯй—ҙд»¶жҳҜжһ„е»әй«ҳж•Ҳ Web еә”з”Ёзҡ„дёҖдёӘеҘҪйҖүжӢ©пјҢе®ғжңүеҠ©дәҺе®һзҺ°жӣҙеҘҪзҡ„еҸҜйҮҚз”ЁжҖ§е’ҢеҸҜз»ҙжҠӨжҖ§гҖӮ\n\
    \n## еңЁдёӯй—ҙд»¶д№Ӣй—ҙе…ұдә«еҖј\n\nеңЁеүҚйқўзҡ„з« иҠӮдёӯпјҢдҪ еӯҰд№ дәҶеҰӮдҪ•еңЁ Go дёӯеҲ¶дҪңе’ҢдҪҝз”Ё HTTP дёӯй—ҙд»¶гҖӮзӨәдҫӢдёӯй—ҙд»¶жҳҜзӢ¬з«ӢиҝҗиЎҢзҡ„пјҢдёҚдҫқиө–жқҘиҮӘе…¶д»–дёӯй—ҙд»¶еӨ„зҗҶеҷЁе’Ңеә”з”ЁеӨ„зҗҶеҷЁзҡ„д»»дҪ•ж•°жҚ®гҖӮз„¶иҖҢпјҢеңЁжҹҗдәӣжғ…еҶөдёӢпјҢдҪ еҸҜиғҪйңҖиҰҒеҗ‘дёӢдёҖдёӘдёӯй—ҙд»¶жҸҗдҫӣеҖјпјҢжҲ–иҖ…еңЁдёӯй—ҙд»¶еӨ„зҗҶеҷЁе’Ңеә”з”ЁеӨ„зҗҶеҷЁд№Ӣй—ҙе…ұдә«еҖјгҖӮдҫӢеҰӮпјҢеҪ“дҪ йҖҡиҝҮдёӯй—ҙд»¶еӨ„зҗҶеҮҪж•°жҺҲжқғеә”з”Ёж—¶пјҢе®ғеҸҜиғҪйңҖиҰҒеңЁиҜ·жұӮеӨ„зҗҶе‘Ёжңҹдёӯеҗ‘дёӢдёҖдёӘеӨ„зҗҶеҷЁжҸҗдҫӣдёҖдәӣзү№е®ҡдәҺз”ЁжҲ·зҡ„еҖјгҖӮ\n\
    \n### дҪҝз”Ё Gorilla context\n\nжңүи®ёеӨҡз¬¬дёүж–№еҢ…еҸҜз”ЁдәҺеӯҳеӮЁеңЁиҜ·жұӮз”ҹе‘Ҫе‘ЁжңҹеҶ…е…ұдә«зҡ„еҖјгҖӮGorilla Web е·Ҙе…·еҢ…дёӯзҡ„ `context`\
    \ еҢ…жҳҜдёҖдёӘеҫҲеҘҪзҡ„йҖүжӢ©пјҢеҸҜз”ЁдәҺеңЁиҜ·жұӮз”ҹе‘Ҫе‘ЁжңҹеҶ…е…ұдә«еҖјгҖӮ\n\nиҰҒе®үиЈ… `context`пјҢеңЁз»Ҳз«ҜдёӯиҝҗиЎҢд»ҘдёӢе‘Ҫд»Өпјҡ\n\n```\n$ go get github.com/gorilla/context\n\
    ```\n\nиҰҒдҪҝз”Ё `context` еҢ…пјҢеҝ…йЎ»е°Ҷ `github.com/gorilla/context` еҢ…ж·»еҠ еҲ°еҜје…ҘеҲ—иЎЁдёӯпјҡ\n\n```\nimport\
    \ \"github.com/gorilla/context\"\n```\n"
- fmt: "### Setting and Getting Values with Gorilla context\n\nTo set values to a\
    \ `context` object, use the `Set` function (see Listing [6-15](#A978-1-4842-1052-9_6_Chapter.html#FPar15)).\n\
    \nListing 6-15. Setting Values in Gorilla context\n\n```\ncontext.Set(r, \"user\"\
    , \"shijuvar\")\n```\n\nHere `r` is the `*http.Request` object in your handler\
    \ functions. To get values from the `context` object, use `Get` or the `GetOk`\
    \ function (see Listing [6-16](#A978-1-4842-1052-9_6_Chapter.html#FPar16)).\n\n\
    Listing 6-16. Getting Values from Gorilla context\n\n```\n// val is \"shijuvar\"\
    \nval := context.Get(r, \"user\")\n\n// returns (\"shijuvar\", true)\nval, ok\
    \ := context.GetOk(r, foo.MyKey)\n```\n\nListing [6-17](#A978-1-4842-1052-9_6_Chapter.html#FPar17)\
    \ is an example program in which a value from a middleware handler function is\
    \ passed to an application handler.\n\nListing 6-17. Middleware Function Passing\
    \ a Value to an App Handler\n\n```\npackage main\n\nimport (\n    \"fmt\"\n  \
    \  \"log\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\n    \"github.com/gorilla/context\"\
    \n)\n\nfunc Authorize(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)\
    \ {\n    token := r.Header.Get(\"X-AppToken\")\n    if token == \"bXlVc2VybmFtZTpteVBhc3N3b3Jk\"\
    \ {\n        log.Printf(\"Authorized to the system\")\n        context.Set(r,\
    \ \"user\", \"Shiju Varghese\")\n        next(w, r)\n    } else {\n        http.Error(w,\
    \ \"Not Authorized\", 401)\n    }\n}\n\nfunc index(w http.ResponseWriter, r *http.Request)\
    \ {\n    user := context.Get(r, \"user\")\n    fmt.Fprintf(w, \"Welcome %s!\"\
    , user)\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n    mux.HandleFunc(\"\
    /\", index)\n    n := negroni.Classic()\n    n.Use(negroni.HandlerFunc(Authorize))\n\
    \    n.UseHandler(mux)\n    n.Run(\":8080\")\n}\n```\n\nA middleware handler function\
    \ is created to authorize HTTP requests. The HTTP header value `\"X-AppToken\"\
    ` is read from the `request` object and validates the security token. This is\
    \ one of the ways to validate RESTful APIs in which HTTP clients must send the\
    \ security token through an HTTP header. Some APIs validate the token and provide\
    \ an access token to access the application for a specific session.\n\nIn this\
    \ program, you want to pass the username into the next handler: the application\
    \ handler. So you set the user value to the `context` object from the authorized\
    \ middleware handler, which will be accessible in the HTTP request lifecycle.\
    \ Here the value of the `context` object is accessed from the index application\
    \ handler.\n\nBy leveraging the Gorilla `context` package to share values between\
    \ middleware handlers, or share values with middleware handlers and application\
    \ handlers, you can build useful middleware handler functions to build real-world\
    \ applications.\n\n## Summary\n\nUsing HTTP middleware is an important practical\
    \ approach for building real-world applications in Go. Middleware is a pluggable\
    \ and self-contained piece of code that wraps application handlers, which can\
    \ be used for implementing shared behaviors into across-the-application handlers\
    \ or into some specific application handlers.\n\nHTTP middleware allows you to\
    \ build applications with pluggable logic that obtains a greater level of reusability\
    \ and maintainability. Using HTTP middleware, you can execute some logic before\
    \ or after HTTP request handlers. Because HTTP middleware are pluggable components,\
    \ you can add or remove them at any time.\n\nThe `Alice` third-party package allows\
    \ you to implement chaining of middleware handlers with an elegant syntax using\
    \ its fluent interface. The `Negroni` third-party package is a great library for\
    \ handling middleware functions, which also come with some default middleware\
    \ functions. `Negroni` provides an idiomatic approach to using HTTP middleware\
    \ in Go.\n\nWhen you build real-world applications, you may need to share values\
    \ among various middleware handlers and application handlers. The third-party\
    \ `context` package from the Gorilla web toolkit can be used for sharing values\
    \ during a request lifetime. It is a great web development stack in Go to use\
    \ `net/http` as the fundamental programming block for web development, `Negroni`\
    \ as the handler for working with HTTP middleware, Gorilla `mux` as the router,\
    \ and Gorilla `context` as the mechanism for sharing values during the request\
    \ lifetime. With this web development stack, you donвҖҷt need a full-fledged web\
    \ development framework.\n\n# 7. Authentication to Web Apps\n\nSecurity is one\
    \ of the most important factors to consider when building a successful web application\
    \ or web API. If you canвҖҷt protect your applications from unauthorized access,\
    \ the entire application wonвҖҷt make any sense, regardless of its functionality.\
    \ You might have developed a brilliant user experience for your applications,\
    \ but all your implementations will fail if you canвҖҷt secure your applications.\
    \ Authentication and authorization enable applications to be protected from unauthorized\
    \ access to their protected resources.\n\nThis chapter shows you how to protect\
    \ web-based systems using various authentication approaches. It focuses more on\
    \ modern authentication approaches for securing applications, which are useful\
    \ when you build web applications and mobile applications by using a web API as\
    \ the server-side implementation.\n\n## Authentication and Authorization\n\nAuthentication\
    \ is the process of identifying clients of applications and services that will\
    \ gain access to protected resources. These clients will be end users or other\
    \ applications and services. Typically, a database stores user credentials such\
    \ as usernames and passwords, and end users enter valid usernames and passwords\
    \ to gain access to applications.\n\nAuthorization is the process of granting\
    \ permission to do certain actions or access resources, which is permitted for\
    \ authenticated clients. Authorization works with the authentication process,\
    \ in which you can attach authorization roles with user credentials. When you\
    \ store user credentials in a database, you can associate authorization roles\
    \ and permissions along with the user information. When you build applications,\
    \ you can differentiate access permissions by defining multiple authorization\
    \ roles. For example, if you want to provide administrator functionalities to\
    \ certain authenticated users, you can define an authorization role for administrator\
    \ users along with the access permissions, so you can differentiate the access\
    \ permissions from other authenticated users. Some applications may not have any\
    \ authorization roles because all authenticated users will have the same privileges\
    \ to the applications.\n\nA proper strategy for authentication and authorization\
    \ is the most important factor when you design web applications. If you design\
    \ your applications with proper authentication and authorization, you avoid lots\
    \ of security challenges, which are very critical for a successful application."
