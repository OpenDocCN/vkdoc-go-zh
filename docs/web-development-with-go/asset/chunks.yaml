  trans: "\n### JSON иө„жәҗжЁЎеһӢ\n\nRESTful API жҳҜдёҖз§ҚеҹәдәҺ JSON зҡ„ APIпјҢе®ўжҲ·з«Ҝеә”з”ЁйңҖиҰҒд»Ҙ JSON ж јејҸеҸ‘йҖҒж•°жҚ®пјҢжңҚеҠЎеҷЁд№ҹеҗҢж ·д»Ҙ\
    \ JSON ж јејҸиҝ”еӣһе“Қеә”гҖӮдёәдәҶйҒөеҫӘ JSON API ж ҮеҮҶпјҲ`http://jsonapi.org`пјүпјҢжҲ‘д»¬е®ҡд№үдәҶиө„жәҗжЁЎеһӢпјҢз”ЁдәҺд»Ҙж јејҸеҢ– JSON еҸ‘йҖҒе’ҢжҺҘж”¶ж•°жҚ®гҖӮ`\"\
    data\"` иў«е®ҡд№үдёәжүҖжңү JSON иЎЁзӨәеҪўејҸзҡ„ж №е…ғзҙ гҖӮ\n\nеҲ—иЎЁ 9-15 еұ•зӨәдәҶе°ҶдёҺ `Users` иө„жәҗй…ҚеҗҲдҪҝз”Ёзҡ„иө„жәҗжЁЎеһӢгҖӮ\n\n**еҲ—иЎЁ 9-15.**\
    \ еңЁ `resources.go` дёӯеӨ„зҗҶ `/users` зҡ„ JSON иө„жәҗ\n\n```\npackage controllers\n\nimport\
    \ (\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\n)\n\ntype (\n\t//For\
    \ Post - /user/register\n\tUserResource struct {\n\t\tData models.User `json:\"\
    data\"`\n\t}\n\n\t//For Post - /user/login\n\tLoginResource struct {\n\t\tData\
    \ LoginModel `json:\"data\"`\n\t}\n\n\t// Response for authorized user Post -\
    \ /user/login\n\tAuthUserResource struct {\n\t\tData AuthUserModel `json:\"data\"\
    `\n\t}\n\n\t//Model for authentication\n\tLoginModel struct {\n\t\tEmail    string\
    \ `json:\"email\"`\n\t\tPassword string `json:\"password\"`\n\t}\n\n\t//Model\
    \ for authorized user with access token\n\tAuthUserModel struct {\n\t\tUser  models.User\
    \ `json:\"user\"`\n\t\tToken string      `json:\"token\"`\n\t}\n)\n```\n\n###\
    \ з”ЁжҲ·иө„жәҗзҡ„еӨ„зҗҶеҮҪж•°\n\n`Users` иө„жәҗзҡ„еә”з”ЁеӨ„зҗҶеҮҪж•°зј–еҶҷеңЁ `userController.go` жәҗж–Үд»¶дёӯпјҢиҜҘж–Үд»¶еҪ’еұһдәҺ `controllers`\
    \ еҢ…гҖӮ\n\nеҲ—иЎЁ 9-16 жҸҗдҫӣдәҶ `Users` иө„жәҗеӨ„зҗҶеҮҪж•°зҡ„е®һзҺ°гҖӮ\n\n**еҲ—иЎЁ 9-16.** `userController.go` дёӯзҡ„еә”з”ЁеӨ„зҗҶеҮҪж•°\n\
    \n```\npackage controllers\n\nimport (\n\t\"encoding/json\"\n\t\"net/http\"\n\t\
    \"github.com/shijuvar/go-web/taskmanager/common\"\n\t\"github.com/shijuvar/go-web/taskmanager/data\"\
    \n\t\"github.com/shijuvar/go-web/taskmanager/models\"\n)\n\n// Handler for HTTP\
    \ Post - \"/users/register\"\n// Add a new User document\nfunc Register(w http.ResponseWriter,\
    \ r *http.Request) {\n\tvar dataResource UserResource\n\t// Decode the incoming\
    \ User json\n\terr := json.NewDecoder(r.Body).Decode(&dataResource)\n\tif err\
    \ != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid\
    \ User data\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\tuser := &dataResource.Data\n\
    \tcontext := NewContext()\n\tdefer context.Close()\n\tc := context.DbCollection(\"\
    users\")\n\trepo := &data.UserRepository{c}\n\t// Insert User document\n\trepo.CreateUser(user)\n\
    \t// Clean-up the hashpassword to eliminate it from response\n\tuser.HashPassword\
    \ = nil\n\tif j, err := json.Marshal(UserResource{Data: *user}); err != nil {\n\
    \t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"An unexpected error\
    \ has occurred\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t} else {\n\t\tw.Header().Set(\"\
    Content-Type\", \"application/json\")\n\t\tw.WriteHeader(http.StatusCreated)\n\
    \t\tw.Write(j)\n\t}\n}\n\n// Handler for HTTP Post - \"/users/login\"\n// Authenticate\
    \ with username and apssword\nfunc Login(w http.ResponseWriter, r *http.Request)\
    \ {\n\tvar dataResource LoginResource\n\tvar token string\n\t// Decode the incoming\
    \ Login json\n\terr := json.NewDecoder(r.Body).Decode(&dataResource)\n\tif err\
    \ != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid\
    \ Login data\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\tloginModel := dataResource.Data\n\
    \tloginUser := models.User{\n\t\tEmail:    loginModel.Email,\n\t\tPassword: loginModel.Password,\n\
    \t}\n\tcontext := NewContext()\n\tdefer context.Close()\n\tc := context.DbCollection(\"\
    users\")\n\trepo := &data.UserRepository{c}\n\t// Authenticate the login user\n\
    \tif user, err := repo.Login(loginUser); err != nil {\n\t\tcommon.DisplayAppError(\n\
    \t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid login credentials\",\n\t\t\t401,\n\t\t)\n\
    \t\treturn\n\t} else { //if login is successful\n\t\t// Generate JWT token\n\t\
    \ttoken, err = common.GenerateJWT(user.Email, \"member\")\n\t\tif err != nil {\n\
    \t\t\tcommon.DisplayAppError(\n\t\t\t\tw,\n\t\t\t\terr,\n\t\t\t\t\"Eror while\
    \ generating the access token\",\n\t\t\t\t500,\n\t\t\t)\n\t\t\treturn\n\t\t}\n\
    \t\tw.Header().Set(\"Content-Type\", \"application/json\")\n\t\tuser.HashPassword\
    \ = nil\n\t\tauthUser := AuthUserModel{\n\t\t\tUser:  user,\n\t\t\tToken: token,\n\
    \t\t}\n\t\tj, err := json.Marshal(AuthUserResource{Data: authUser})\n\t\tif err\
    \ != nil {\n```\n"
- fmt: "### Registering New Users\n\nTo register a new user, the client application\
    \ should send an HTTP `Post` to the URI `\"/users/register\"`. In the `Register`\
    \ handler function, the incoming JSON string is decoded into the type `UserResource`\
    \ and creates an instance of the `models.User` struct by accessing the `Data`\
    \ property of the `UserResource` object.\n\nThe `Context` type is used to access\
    \ the MongoDB `Session` object (`mgo.Session`) in application handlers. So an\
    \ instance of `Context` type and the MongoDB `Collection` object (`mgo.Collection`)\
    \ are created by calling the `DbCollection` method:\n\n```\ncontext := NewContext()\n\
    defer context.Close()\nc := context.DbCollection(\"users\")\n```\n\nThe `Close`\
    \ method of the `Context` type is added into the `defer` function to close the\
    \ MongoDB `Session` object, which is a copied version of the `Session` object.\
    \ In all HTTP handler functions, a copied version of the MongoDB `Session` object\
    \ is created and will use the same instance in a single HTTP request lifecycle\
    \ and release the resources using the `defer` function.\n\nIn the `Register` handler\
    \ function, an instance of `UserRepository` is created by providing the MongoDB\
    \ `Collection` object. The `CreateUser` method of the `UserRepository` struct\
    \ is created to persist the `User` object into the MongoDB database. All data\
    \ persistence logic is written in the `data` package:\n\n```\nrepo := &data.UserRepository{c}\n\
    // Insert User document\nrepo.CreateUser(user)\n```\n\n`UserRepository` provides\
    \ all CRUD operations against the `User` entity. (This topic is discussed in the\
    \ next section of the chapter.) The `Register` handler function sends back a response\
    \ as a JSON representation of the newly created `User` entity.\n\nLetвҖҷs test the\
    \ functionality of the `Users` resource by using a RESTful API client tool `\"\
    Postman\"` ( [`www.getpostman.com/`](http://www.getpostman.com/) ), which allows\
    \ you to test your APIs (also very useful for testing RESTful APIs).\n\nFigure\
    \ [9-8](#A978-1-4842-1052-9_9_Chapter.html#Fig8) shows the HTTP `Post` request\
    \ sent to the URI endpoint `\"users/register\"` using the RESTful API client tool\
    \ `\"Postman\"`.\n\n![A978-1-4842-1052-9_9_Fig8_HTML.jpg](A978-1-4842-1052-9_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8. HTTP Post to вҖң/users/registerвҖқ\n\nFigure [9-9](#A978-1-4842-1052-9_9_Chapter.html#Fig9)\
    \ shows the response from the RESTful API server, indicating that a new resource\
    \ has been created.\n\n![A978-1-4842-1052-9_9_Fig9_HTML.jpg](A978-1-4842-1052-9_9_Fig9_HTML.jpg)\n\
    \nFigure 9-9. HTTP response from вҖң/users/registerвҖқ\n\n### Logging in to the System\n\
    \nUsers of client applications must obtain a JWT to access the protected resources\
    \ of the RESTful API. To get the token, a user must log in to the system with\
    \ a username and password. If the user is getting authenticated, the server sends\
    \ back a JWT that can be used for accessing the RESTful API resources.\n\nThe\
    \ application handler `Login` is used for serving HTTP requests to the login resource.\
    \ If the login is successful, the `GenerateJWT` function of the `common` package\
    \ is called to generate JWT. The generated JWT is included in the JSON response:\n\
    \n```go\nif user, err := repo.Login(loginUser); err != nil {\n\tcommon.DisplayAppError(\n\
    \t\tw,\n\t\terr,\n\t\t\"Invalid login credentials\",\n\t\t401,\n\t)\n\treturn\n\
    } else { //if login is successful\n\t// Generate JWT token\n\ttoken, err = common.GenerateJWT(user.Email,\
    \ \"member\")\n\tif err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\t\
    err,\n\t\t\t\"Eror while generating the access token\",\n\t\t\t500,\n\t\t)\n\t\
    \treturn\n\t}\n\n\tw.Header().Set(\"Content-Type\", \"application/json\")\n\t\
    user.HashPassword = nil\n\tauthUser := AuthUserModel{\n\t\tUser:  user,\n\t\t\
    Token: token,\n\t}\n\n\tj, err := json.Marshal(AuthUserResource{Data: authUser})\n\
    \tif err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"\
    An unexpected error has occurred\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\n\t\
    w.WriteHeader(http.StatusOK)\n\tw.Write(j)\n}\n```"
