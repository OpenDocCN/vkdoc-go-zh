    ## Go Dependencies Using Godep


    In previous sections, you completed the RESTful API application named TaskManager
    that uses a few third-party packages. Now letвҖҷs focus on managing the dependencies
    of the application to reduce external build dependencies for productivity when
    building the application.


    When you work on Go applications using many third-party packages, the dependency
    management is always a painful experience. Most software development teams work
    with version control systems to manage and distribute their source code. A proper
    dependency management tool is an essential component for speeding up the development
    process and build process.


    Many technology stacks such as Ruby and Node.js provide a package management system
    with better dependency management. Those environments provide a centralized repository
    system to get external packages, so it is extremely easy to provide a dependency
    management system for those technology stacks. Go doesnвҖҷt provide a centralized
    system for its package ecosystem, which is designed for simplicity like most of
    the Go features. This has some limitations for managing external dependencies
    while enabling simplicity for exposing and using third-party packages. By default,
    Go doesnвҖҷt provide any mechanism for managing external dependencies.


    The `godep` tool helps you build packages reproducibly by fixing their dependencies.
    This tool ensures a better experience for doing repeatable builds.


    ### Installing the godep Tool


    To install the `godep` tool, run the following command:


    `go get github.com/tools/godep`


    ### Using godep with TaskManager


    LetвҖҷs use `godep` with the RESTful API application to manage external dependencies.
    Run the following command:


    `godep save -r`


    The `save` command saves a list of the applicationвҖҷs dependencies to the file
    `Godeps.json` inside the `Godeps` directory. The `Godeps.json` file contains the
    JSON representation of the applicationвҖҷs dependencies and the Go version. It also
    copies the source code of the dependencies into the `Godeps/_workspace` directory,
    reflecting the structure of `GOPATH`.


    Figure [9-18](#A978-1-4842-1052-9_9_Chapter.html#Fig18) illustrates the structure
    created by the `godep save` command to manage the applicationвҖҷs dependencies.


