- fmt: "# Writing an HTTP Server\n\nLetвҖҷs write an example web application server\
    \ to explore the App Engine platform for Go.\n\nListing [11-1](#A978-1-4842-1052-9_11_Chapter.html#FPar1)\
    \ provides an HTTP server on the App Engine platform.\n\n**Listing 11-1.** Web\
    \ Application Server for App Engine\n\n```go\npackage task\n\nimport (\n    \"\
    fmt\"\n    \"html/template\"\n    \"net/http\"\n)\n\ntype Task struct {\n    Name\
    \        string\n    Description string\n}\n\nconst taskForm = `\n<html>\n<body>\n\
    <form action=\"/task\" method=\"post\">\n<p>Task Name: <input type=\"text\" name=\"\
    taskname\" ></p>\n<p> Description: <input type=\"text\" name=\"description\" ></p>\n\
    <p><input type=\"submit\" value=\"Submit\"></p>\n</form>\n</body>\n</html>\n`\n\
    \nconst taskTemplateHTML = `\n<html>\n<body>\n<p>New Task has been created:</p>\n\
    <div>Task: {{.Name}}</div>\n<div>Description: {{.Description}}</div>\n</body>\n\
    </html>\n`\n\nvar taskTemplate = template.Must(template.New(\"task\").Parse(taskTemplateHTML))\n\
    \nfunc init() {\n    http.HandleFunc(\"/\", index)\n    http.HandleFunc(\"/task\"\
    , task)\n}\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprint(w,\
    \ taskForm)\n}\n\nfunc task(w http.ResponseWriter, r *http.Request) {\n    task\
    \ := Task{\n        Name:        r.FormValue(\"taskname\"),\n        Description:\
    \ r.FormValue(\"description\"),\n    }\n    err := taskTemplate.Execute(w, task)\n\
    \    if err != nil {\n        http.Error(w, err.Error(), http.StatusInternalServerError)\n\
    \    }\n}\n```\n\nAn example web application is written with several HTML pages.\
    \ The HTTP handler code is written inside the `init` function of the `task` package\
    \ because the App Engine runtime provides a special `main` package that you canвҖҷt\
