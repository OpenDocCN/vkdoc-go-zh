    ### Middleware Chaining with the Alice Package


    The third-party `Alice` library package ( [`https://github.com/justinas/alice`](https://github.com/justinas/alice)
    ) provides a convenient way to chain HTTP middleware functions and the application
    handler. The program shown in Listing [6-5](#A978-1-4842-1052-9_6_Chapter.html#FPar5)
    chained HTTP middleware functions as follows:


    `http.Handle("/", middlewareFirst(middlewareSecond(http.HandlerFunc(index))))`


    By using the `Alice` package, you can transform the preceding handler chains to
    the following:


    `http.Handle("/",alice.New(middlewareFirst, middlewareSecond).ThenFunc(http.HandlerFunc(index)))`


    This process is an elegant way to chain middleware functions and decorate them
    with application handlers.


    #### Installing Alice


    To install `Alice`, run the following command in the terminal:


    `$ go get github.com/justinas/alice`'
