    you call the `Find` method, you can provide a document to filter the collection
    data. The `Find` method prepares a query using the provided document. To provide
    the document for querying the collection, you can provide a map or a struct value
    capable of being marshalled with BSON. You can use a generic map such as `bson.M`
    to provide the document for querying the data. To query all documents in the collection,
    you can use `nil` as the argument that is equivalent to an empty document such
    as `bson.M{}`. The `Find` method returns the value of the `mgo.Query` type, in
    which you can retrieve results using methods such as `One`, `For`, `Iter`, or
    `Tail`.


    #### Retrieving All Records


    Listing [8-9](#A978-1-4842-1052-9_8_Chapter.html#FPar11) retrieves all documents
    in a collection by providing `nil` as the parameter value for the `Find` method.
    This query executes against the data model defined in Listing [8-8](#A978-1-4842-1052-9_8_Chapter.html#FPar10).


    Listing 8-9.В В Querying All Documents in a Collection


    `iter :=` `c.Find(nil).Iter()`


    В В В В `result := Category{}`


    В В В В `for iter.Next(&result) {`


    В В В В В В В В `fmt.Printf("Category:%s, Description:%s\n", result.Name, result.Description)`


    В В В В В В В В `tasks := result.Tasks`


    В В В В В В В В `for _, v := range tasks {`


    В В В В В В В В В В В В `fmt.Printf("Task:%s Due:%v\n", v.Description, v.Due)`


    В В В В В В В В `}`


    В В В В `}`


    `if err = iter.Close(); err != nil {`


    В В В В В В В В `log.Fatal(err)`


    В В В В `}`


    The `Iter` method of the `Query` object is used to iterate over the documents.
    `Iter` executes the query and returns an iterator capable of iterating over all
    the results. When you use embedded documents to define a parent-child relationship,
    you can obtain the associated documents in a single query.


    #### Sorting Records


    Documents can be sorted using the `Sort` method provided by the `Query` type.
    The `Sort` method prepares the query to order returned documents according to
    the provided field names.


    Listing [8-10](#A978-1-4842-1052-9_8_Chapter.html#FPar12) sorts the collection
    documents.


    Listing 8-10.В В Ordering Documents Using the Sort Method


    `iter := c.Find(nil).Sort("name").Iter()`


    В В В В `result := Category{}`


    В В В В `for iter.Next(&result) {`


    В В В В В В В В `fmt.Printf("Category:%s, Description:%s\n", result.Name, result.Description)`


    В В В В В В В В `tasks := result.Tasks`


    В В В В В В В В `for _, v := range tasks {`


    В В В В В В В В В В В В `fmt.Printf("Task:%s Due:%v\n", v.Description, v.Due)`


    В В В В В В В В `}`


    В В В В `}`


    В В В В `if err = iter.Close(); err != nil {`


    В В В В В В В В `log.Fatal(err)`


    В В В В `}`


    You can sort the value in reverse order by providing a field name prefixed by
    a `вҖ“` (minus sign), as shown in Listing [8-11](#A978-1-4842-1052-9_8_Chapter.html#FPar13).


    Listing 8-11.В В Sorting Documents in Reverse Order


    `iter := c.Find(nil).Sort("-name").Iter()`


    #### Retrieving a Single Record


    Listing [8-12](#A978-1-4842-1052-9_8_Chapter.html#FPar14) retrieves a single record
    from a collection by providing a map object to make the query.


    Listing 8-12.В В Querying a Single Record from a Collection


    `result := Category{}`


    `err := c.Find(bson.M{"name": "Open-Source"}).One(&result)`


    `if err != nil {`


    В В В В `log.Fatal(err)`


    `}`


    `fmt.Printf("Category:%s, Description:%s\n", result.Name, result.Description)`


    `tasks := result.Tasks`


    `for _, v := range tasks {`


    В В В В `fmt.Printf("Task:%s Due:%v\n", v.Description, v.Due)`


    `}`


    The `bson.M` map type is provided to query the data. Here, it queries the collection
    with the value provided for the `Name` field. The `One` method of the `Query`
    type executes the query and unmarshals the first obtained document into the result
    argument.


    The `Collection` type provides the method `FindId` that is a convenience helper
    equivalent to the following:


    `query := c.Find(bson.M{"_id": id})`


    The `FindId` method allows you to query the collection with a document `_id` field.


    Listing [8-13](#A978-1-4842-1052-9_8_Chapter.html#FPar15) queries the collection
    with the `FindId` method.


    Listing 8-13.В В Querying a Single Record Using FindId


