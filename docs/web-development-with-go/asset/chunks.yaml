    \t\tw.Header().Set(\"Content-Type\", \"application/json\")\n\t\tuser.HashPassword\
    \ = nil\n\t\tauthUser := AuthUserModel{\n\t\t\tUser:  user,\n\t\t\tToken: token,\n\
    \t\t}\n\t\tj, err := json.Marshal(AuthUserResource{Data: authUser})\n\t\tif err\
    \ != nil {\n```"
