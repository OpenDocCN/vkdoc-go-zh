    ,\n\t\tHandler: r,\n\t}\n\n\tlog.Println(\"Listening...\")\n\tserver.ListenAndServe()\n\
    }\n\n//View templates\nvar indexTemplate = `\n<p><a href=\"/auth/twitter\">Log\
    \ in with Twitter</a></p>\n<p><a href=\"/auth/facebook\">Log in with Facebook</a></p>\n\
    `\n\nvar userTemplate = `\n<p>Name: {{.Name}}</p>\n<p>Email: {{.Email}}</p>\n\
