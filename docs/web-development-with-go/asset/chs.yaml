  \ 函数。\n\n##### 验证示例代码\n\n除了提供编写测试来验证行为和编写基准测试的支持外，`testing` 包还提供了运行和验证示例代码的支持。可以利用此功能为包、函数、类型和方法提供示例代码。\n\
