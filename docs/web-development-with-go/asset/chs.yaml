  ` 资源实现 API 操作。\n\n> **注**  \n> TaskManager 应用的完整源代码可在 `github.com/shijuvar/go-web/tree/master/taskmanager`\
  \ 获取。\n\n---\n\n### 使用 `godep` 管理 Go 依赖\n\n在前面的章节中，你完成了一个名为 TaskManager 的 RESTful\
  \ API 应用，该应用使用了一些第三方包。现在，让我们专注于管理应用的依赖关系，以减少构建应用时的外部构建依赖，从而提高工作效率。\n\n当你使用大量第三方包开发\
  \ Go 应用时，依赖管理往往是一件令人头疼的事情。大多数软件开发团队使用版本控制系统来管理和分发源代码。一个合适的依赖管理工具是加速开发和构建过程的重要组成部分。\n\
  \n许多技术栈，如 Ruby 和 Node.js，都提供了具有更好依赖管理功能的包管理系统。这些环境提供了集中式仓库系统来获取外部包，因此为这些技术栈提供依赖管理系统非常容易。Go\
  \ 没有为其包生态系统提供集中式系统，这是为了像 Go 的大多数特性一样保持简单而设计的。这在简化外部包的使用和分发的同时，也带来了管理外部依赖的一些局限性。默认情况下，Go\
  \ 不提供任何管理外部依赖的机制。\n\n`godep` 工具通过固定依赖关系，帮助你以可重现的方式构建包。该工具能确保你获得更好的可重复构建体验。\n\n####\
  \ 安装 `godep` 工具\n\n要安装 `godep` 工具，请运行以下命令：\n\n`go get github.com/tools/godep`\n\n\
  #### 在 TaskManager 中使用 `godep`\n\n让我们将 `godep` 用于 RESTful API 应用，以管理外部依赖。运行以下命令：\n\
  \n`godep save -r`\n\n`save` 命令会将应用的依赖关系列表保存到 `Godeps` 目录下的 `Godeps.json` 文件中。`Godeps.json`\
  \ 文件包含了应用依赖关系和 Go 版本的 JSON 表示。它还会将依赖关系的源代码复制到 `Godeps/_workspace` 目录中，该目录反映了 `GOPATH`\
  \ 的结构。\n\n图 9-18 展示了 `godep save` 命令为管理应用依赖关系所创建的结构。\n\n![A978-1-4842-1052-9_9_Fig18_HTML.jpg](img/A978-1-4842-1052-9_9_Fig18_HTML.jpg)\n\
