- "# 1. 开始使用 Go\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1052-9_1](http://dx.doi.org/10.1007/978-1-4842-1052-9_1))\
  \ 包含补充材料，仅供授权用户使用。\n\n世间万物皆在演化，计算机与计算机编程语言也不例外。基于过往经验，构建应用程序的思路与方法也在不断演进。尽管高度演化的现代计算机已拥有众多\
  \ CPU 核心（32、64、128 乃至更多），但我们仍无法通过现有的大多数编程语言和工具，充分发挥现代计算机硬件的全部潜力。即便是在配备多核 CPU 的高性能服务器上，我们的程序运行依然缓慢。\n\
  \n在过去十年间，许多现有编程语言都伴随着众多新特性不断演进。语言设计者基于编程语言理论（PLT）及其他学术思想不断添加这些特性，这使得语言本身变得更为复杂。在当今的计算环境中，许多人更倾向于用简约务实的方式来编写应用程序。\n\
  \n人们会选用在某些特定领域表现出色的编程语言。有些编程语言非常适合快速应用开发，但在编写高性能应用方面表现不佳；另一些编程语言在编写高性能应用时效率极高，却难以高效地开发应用程序。倘若存在一种通用语言，能够以更高的效率、性能、生产力及更快的编译时间来开发各类应用，那将是再好不过了。Go\
  \ 语言恰好满足这些标准。\n\n本章将向你展示为何 Go 是解决现代编程挑战的绝佳编程语言，并帮助你了解将 Go 应用于下一个项目时的用例。\n\n### 认识\
  \ Go\n\nGo，亦被称为 Golang，是一种通用编程语言，由 Google 的一支团队以及开源社区的众多[贡献者](http://golang.org/CONTRIBUTORS)（[`http://golang.org/contributors`](http://golang.org/contributors)）共同开发。该语言于\
  \ 2009 年 11 月宣布，首个版本于 2012 年 12 月发布。Go 是一个开源项目，采用 BSD 风格许可证进行分发。Go 项目的官方网站是 [`http://golang.org/`](http://golang.org/)。它是一种静态类型、原生编译、带垃圾回收的并发编程语言，在基本语法上主要归属于\
  \ C 语言家族。接下来，让我们看看 Go 的一些特性，以理解其设计原则。\n\n#### 简约务实的设计语言\n\nGo 编程语言可以简单地用三个词来描述：简洁、简约、务实。如果你深入研究\
  \ Go 的语言设计，就会发现它采取了一种简约而务实的设计思路。这种简洁性可以从 Go 的所有语言特性中体现出来，包括其类型系统。如今，许多编程语言提供了过多的特性，使得应用程序对开发者而言变得更为复杂。Go\
  \ 的设计目标是成为一种简洁、简约的语言，提供开发高效软件系统所需的一切必要特性。\n\n尽管 Go 的语言特性较少，但其务实的设计并未对生产力造成影响。新的\
  \ Go 程序员能快速学会该语言，并轻松开始开发具有生产质量的应用。Go 简单地将过去三十年间的许多语言特性弃之不用，专注于实际实践而非学术理论和编程语言理论（PLT）。\n\
  \n从实践的角度来看，你可能会说 Go 是一种面向对象编程（OOP）语言。但 Go 的面向对象方式与 C++、Java 和 C# 等编程语言不同。从学术角度看，Go\
  \ 并非一种完全的面向对象语言。与许多现有的 OOP 语言不同，Go 不支持继承，甚至连 `class` 关键字都没有。它通过其简单的类型系统，以组合优于继承的方式来实现功能。与其他面向对象编程语言相比，Go\
  \ 的接口类型设计展现了其独特性。\n\n那么 Go 是一种面向对象语言吗？答案既是也不是。Go 语言包含了以面向对象方式编写应用所需的全部“电池”（即基础组件），但它并非一种完全的\
  \ OOP 语言，因为它缺少一些传统的 OOP 特性。\n\n**注意**  \n编程语言理论（PLT）是计算机科学的一个分支，涉及编程语言及其各自特性的设计、实现、分析、表征和分类。\n\
  \n#### 兼具高生产力的静态类型语言\n\nGo 是一种静态类型编程语言，其语法大致源自 C 语言。与 C 和 C++ 类似，它原生编译为机器码，因此无需即时（JIT）编译即可运行程序。（Java\
  \ 和 C# 等编程语言使用 JIT 编译来运行应用程序。）\n\n在编写应用程序时，动态类型语言提供了巨大的生产力和表现力，因为你无需担心所使用变量的数据类型。在动态类型语言中，表达式的类型仅在运行时才能确定，这使得语法层面具有更高水平的生产力和表现力，能够快速构建应用，尤其是\
  \ Web 应用。但在使用动态类型语言时，应用的性能与可维护性会受到影响。有时，用动态类型语言编写的应用，其调试体验会因缺乏类型安全而变得非常困难。即便在今天，开发者仍会使用静态类型语言为其动态类型语言生成代码。例如，JavaScript\
  \ 开发者会使用微软 TypeScript 这样的静态类型语言来确保类型安全，最终再编译为 JavaScript 代码。\n\n尽管静态类型语言能提供类型安全和性能，但使用它们可能会影响应用开发的生产力，并且编译大型程序可能耗时很长。如果能有一种语言，兼具静态类型语言和动态类型语言的优势，将静态类型语言的性能与类型安全同动态类型语言的生产力融为一体，那将是再好不过了。\n\
  \nGo 正是这样一种完美的融合：它兼具静态类型语言的强大能力与动态类型语言的高生产力。Go 可以被称作一种现代 C 语言，它不仅编译速度比 C 更快，还兼具了动态类型语言的高生产力。\n\
  \n\n\n#### 并发是语言层面的内置特性\n\n计算机硬件已发展到拥有众多 CPU 核心和更强大的性能，但现代计算机的潜力无法通过当前使用的编程语言和工具来充分发挥。当生产级应用在高性能服务器上运行时，即使\
  \ CPU 利用率很低，也会出现性能问题。在某些编程环境中，虽然提供了并发和并行能力以实现更高的效率和性能，但这些特性通常以独立的库和框架形式存在，而非语言层面的内置特性，这增加了编写并发应用的复杂性。\n\
  \n在 Go 语言中，并发是语言的内置功能，专为在现代计算机上编写高性能并发应用而设计。并发是 Go 语言的独特特性之一，被认为是其主要的卖点。Go 的并发通过两个独特特性实现：goroutine\
  \ 和通道。`goroutine` 是一个可以与其他 goroutine 并发执行的函数。它是一种轻量级的执行线程，许多 goroutine 可以在单个线程中执行，从而提升程序的性能和效率。`goroutine`\
  \ 最重要的特性是由 Go 运行时管理并执行。许多编程语言都支持编写并发程序，但它们仅限于已执行线程间的通信和同步。而且，大多数现有语言通过框架提供对并发的支持，而非语言内置特性，因此使用这些语言实现并发时会受到限制。\n\
  \nGo 提供了通道，使 goroutine 之间能够进行通信并同步其执行。通过通道，你可以将数据从一个 goroutine 发送到另一个。通道还提供了更高层次的\
  \ goroutine 同步级别，确保两个 goroutine 在已知状态下运行。并发是使用 Go 语言构建更高效、性能更卓越的软件系统的主要原因。\n\n####\
  \ Go 编译程序速度快\n\n编写 C 和 C++ 应用面临的挑战之一是编译程序所需的时间，这对开发大型 C 和 C++ 应用的开发者来说非常痛苦。Go 语言旨在解决现有编程环境中的编程挑战。其编译器效率极高，能够快速编译程序；一个大型\
  \ Go 应用可以在几秒内完成编译，这对许多转向 Go 编程环境的 C 和 C++ 开发者极具吸引力。\n\n#### Go 是一种通用语言\n\n不同的编程语言用于开发不同类型的应用。C\
  \ 和 C++ 被广泛用于系统编程和性能要求极高的系统。同时，使用 C 和 C++ 也会影响应用开发的效率。其他一些编程语言，如 Ruby 和 Python，提供了快速应用开发能力，从而带来更高的生产力。尽管服务器端\
  \ JavaScript 平台 `Node.js` 适合构建轻量级的 JSON API 和实时应用，但在执行 CPU 密集型编程任务时则会失效。另一类编程语言用于构建原生移动应用，例如\
  \ Objective C 和 Swift，它们仅限于移动应用开发。多种编程语言被用于各种用例，如系统编程、分布式计算、Web 应用开发、企业应用和移动应用开发。\n\
  \n使用 Go 最大的实际好处是，它可以用于构建各种应用，包括需要高性能的系统，也适用于快速应用开发场景。尽管 Go 最初是作为系统编程语言设计的，但它也用于开发企业级业务应用和强大的后端服务器。Go\
  \ 提供了高性能，同时保持了应用开发的高生产力，这要归功于其简约而务实的设计。Go 生态系统（包括 Go 工具链、Go 标准库和 Go 第三方库）提供了构建各种\
  \ Go 应用所需的基本工具和库。Go Mobile 项目增加了对 Android 和 iOS 平台原生移动应用构建的支持，为 Go 带来了更多可能性。\n\n\
  在云计算时代，Go 是一种现代编程语言，可用于构建系统级应用、分布式应用、网络程序、游戏、Web 应用、RESTful 服务、后端服务器、原生移动应用以及针对云优化的下一代应用。Go\
  \ 是许多革命性创新系统的选择，例如 Docker 和 Kubernetes。软件容器化生态系统中的大多数工具都是用 Go 编写的。\n\n> **注意**：Docker\
  \ 是一个革命性的软件容器平台，而 Kubernetes 是一个容器集群管理器。两者都是用 Go 编写的。\n\n#### Go 生态系统\n\nGo 不仅仅是一种简单的编程语言；它还是一个生态系统，提供了编写各种高效软件系统所需的基本工具和特性。Go\
  \ 生态系统包含以下组件：\n\n- Go 语言\n- Go 库\n- Go 工具链\n\nGo 语言提供了基本的语法和特性，让你能够编写程序。这些程序利用库来实现可复用的功能模块，并借助工具链进行代码格式化、编译、运行测试、安装程序以及创建文档。\n\
  \n库在 Go 生态系统中扮演着关键角色，因为 Go 被设计为一种模块化的编程语言，用于编写高度可维护和可组合的应用。库以包的形式提供可复用的功能模块。你可以使用\
  \ Go 包以模块化和可复用的方式编写软件组件，从而在 Go 程序间共享，并轻松维护你的应用。Go 应用的设计理念是通过包编写小的软件组件，然后用这些较小的包组合成\
  \ Go 应用。库可以从标准库和第三方库中获得。当你从标准库安装 Go 包时，它们会被安装到 Go 的安装目录中。当你安装 Go 时，环境变量 `GOROOT`\
  \ 会自动添加到你的系统中，用于指定 Go 的安装目录。标准库包含大量包，提供了编写真实世界应用所需的广泛功能。例如，标准库中的 `\"net/http\"`\
  \ 包可用于编写强大的 Web 应用和 RESTful 服务。\n\n> **注意**：有关标准库包的文档，请访问 [`golang.org/pkg/`](http://golang.org/pkg/)。\n\
  \n如果你需要 Go 标准库未提供的额外功能，可以借助 Go 开发者社区提供的第三方库，这个社区非常热衷于开发并提供许多有用的第三方 Go 包。例如，如果你想使用\
  \ MongoDB 数据库，你可以利用一个名为 `\"mgo\"` 的第三方包。\n\nGo 工具链是 Go 生态系统的重要组成部分，它提供了多种工具支持服务：构建、测试和安装\
  \ Go 程序；格式化 Go 代码；创建文档；获取和安装 Go 包等等。\n\n\n\n### 安装 Go 工具\n\n在你的电脑上安装 Go 非常简单。它为\
  \ FreeBSD、Linux、Mac OS X 和 Windows 操作系统提供了二进制发行版；并支持 32 位（386）和 64 位（amd64）x86 处理器架构。这些二进制发行版可以在\
  \ [`http://golang.org/dl/`](http://golang.org/dl/) 获取。（如果你的操作系统和架构组合没有对应的二进制发行版，你可以通过[源码](http://golang.org/doc/install/source)安装\
  \ Go。）\n\n图 1-1 展示了 Mac、Windows 和 Linux 平台的安装程序包和归档源码，这些都在 Go 网站下载页面上列出。Go 为 Mac\
  \ 和 Windows 操作系统都提供了安装程序。Mac OS X 提供了一个包安装程序，它可以将 Go 发行版安装到 `/usr/local/go`，并将 `/usr/local/go/bin`\
  \ 目录添加到 `PATH` 环境变量中。\n\n![A978-1-4842-1052-9_1_Fig1_HTML.jpg](img/A978-1-4842-1052-9_1_Fig1_HTML.jpg)\n\
  \n图 1-1.\n适用于多个操作系统的 Go 二进制发行版\n\n在 Mac OS 上，你也可以使用 Homebrew ([`http://brew.sh/`](http://brew.sh/))\
  \ 来安装 Go。以下命令可以在 Mac OS 上安装 Go：\n\n`brew install go`\n\nWindows 操作系统提供了一个 MSI 安装程序，它可以将\
  \ Go 发行版安装到 `c:\\Go` 目录。该安装程序还会将 `c:\\Go\\bin` 目录添加到 `PATH` 环境变量中。图 1-2 展示了在 Mac\
  \ OS 上运行的包安装程序。\n\n![A978-1-4842-1052-9_1_Fig2_HTML.jpg](img/A978-1-4842-1052-9_1_Fig2_HTML.jpg)\n\
  \n图 1-2.\nMac OS 的 Go 安装程序\n\n如前所述，成功安装 Go 后，系统会设置 `GOROOT` 环境变量，其值为 Go 工具安装的位置：`/usr/local/go`（或在\
  \ Windows 下为 `c:\\Go`）。\n\n你也可以将 Go 工具安装到自定义位置。如果这样做，你需要手动配置 `GOROOT` 环境变量，将其设置为你系统中\
  \ Go 工具的安装位置。\n\n注意：关于下载和安装 Go 工具的完整说明，请访问 [`http://golang.org/doc/install`](http://golang.org/doc/install)。\n\
  \n#### 检查安装\n\n你可以在终端窗口中输入一些 Go 命令来测试 Go 的安装。要验证 Go 工具的安装，请打开终端并输入以下命令：\n\n`go version`\n\
  \n以下是在 Mac X 系统上显示的结果：\n\n`go version go1.4.1 darwin/amd64`\n\n以下是在 Windows 系统上显示的结果：\n\
  \n`go version go1.4.1 windows/amd64`\n\n以下命令可以提供 Go 工具的帮助信息：\n\n`go help`\n\n###\
  \ 设置工作环境\n\nGo 遵循一些约定，这些约定以特定方式组织代码，有助于更轻松地编译、安装和共享 Go 代码。本节将讨论如何在工作区中将 Go 代码组织为包。\n\
  \n#### Go 工作区\n\nGo 程序必须保存在一个称为工作区的目录层次结构中，它本质上是 Go 程序的根目录。\n\n一个工作区在其根目录下包含三个子目录：\n\
  \n- `src`：此目录包含按包组织的 Go 源文件。\n- `pkg`：此目录包含 Go 包对象。\n- `bin`：此目录包含可执行命令（可执行程序）。\n\
  \n当你开始使用 Go 时，第一步是设置一个存放 Go 程序的工作区。你必须创建一个包含三个子目录的目录来设置 Go 工作区。Go 开发者将 Go 程序作为包写入\
  \ `src` 目录。Go 源文件按称为包（package）的目录进行组织，其中单个目录用于单个包。你可以在 Go 中编写两种类型的包：\n\n- 生成可执行程序的包\n\
  - 生成共享库的包\n\nGo 工具会构建 Go 包，如果是共享库，则将生成的二进制文件安装到 `pkg` 目录；如果是可执行程序，则安装到 `bin` 目录。因此，`pkg`\
  \ 和 `bin` 目录用于根据包的类型存储包输出。请记住，你可以为你的 Go 程序设置多个工作区（Go 开发者通常为他们的 Go 程序使用单个工作区）。\n\n\
  #### `GOPATH` 环境变量\n\n你在工作区中编写 Go 程序，需要手动指定该工作区，以便 Go 运行时知道其位置。你可以通过设置 `GOPATH`\
  \ 环境变量来指定工作区的位置。要开始使用 Go，请创建一个工作区并设置 `GOPATH` 环境变量。\n\n#### 代码组织路径\n\n你将 Go 程序作为包写入\
  \ `GOPATH src` 目录。单个目录用于单个包。Go 的设计初衷是为了能轻松地与 GitHub 和 Google Code 等远程仓库协同工作。当你在远程源码仓库中维护你的程序时，请使用该源码仓库的根目录作为你的基础路径。\n\
  \n例如，如果你在 `github.com/user` 有一个 GitHub 帐户，它就应该作为你的基础路径。假设你在 `github.com/user` 下编写了一个名为\
  \ `\"mypackage\"` 的包；你的代码组织路径将是 `%GOPATH%/src/github.com/user/mypackage`。当你将这个包导入到其他程序时，导入包的路径将是\
  \ `github.com/user/mypackage`。如果你在本地系统中维护源码，你可以直接在 `GOPATH src` 目录下编写程序。假设你在本地系统上编写了一个名为\
  \ `mypackage` 的包；你的代码组织路径将是 `%GOPATH%/src/mypackage`，导入包的路径将是 `mypackage`。\n\n###\
  \ 编写 Go 程序\n\n一旦你创建了工作区并设置了 `GOPATH` 环境变量，你就可以开始使用 Go 了。让我们编写几个简单的 Go 程序来入门。\n\n\
  \n\n#### 编写 Hello World 程序\n\n让我们从编写一个 Hello World 程序开始，如代码清单 1-1 所示。\n\n**代码清单\
  \ 1-1.** Go 语言版本的 Hello World 程序\n\n```\n1 package main\n2 import \"fmt\"\n3 func\
  \ main() {\n4       fmt.Println(\"Hello, world\")\n5 }\n```\n\n**第 1 行：** Go 程序以包（package）的形式组织，这里将包名指定为\
  \ `main`。如果你将包命名为 `main`，它在 Go 中具有特殊含义：生成的二进制文件将是一个可执行程序。\n\n**第 2 行：** `\"fmt\"\
  ` 包提供了格式化与打印数据的功能，该包从标准库中导入。关键字 `import` 用于导入包。\n\n**第 3 行：** 关键字 `func` 用于定义一个函数。`main`\
  \ 函数是可执行程序的入口点，将在应用程序运行时被执行。`main` 包中会包含一个 `main` 函数。\n\n**第 4 行：** `Println` 函数由\
  \ `fmt` 包提供，用于打印数据。请注意，`Println` 函数名以大写字母开头。在 Go 中，所有以大写字母开头的标识符都会被导出到其他包，从而可以在其他包中调用。\n\
  \n让我们使用 Go 工具来编译并运行这个示例程序。导航到包目录，然后输入 `run` 命令来运行程序。假设包目录的位置是 `github.com/user/hello`：\n\
  \n```\ncd $GOPATH/src/github.com/user/hello\ngo run main.go\n```\n\n上述命令会简单地打印出“Hello,\
  \ world”这一短语。`run` 命令会编译源码并运行程序。你也可以将 `build` 和 `install` 命令与 Go 工具一起使用，来构建和安装 Go\
  \ 程序，生成可供之后运行的二进制可执行文件。\n\n`build` 命令会编译包，并将生成的二进制文件放入包文件夹中：\n\n```\ncd $GOPATH/src/github.com/user/hello\n\
  go build\n```\n\n生成的二进制文件名与目录名相同。如果你将此程序写在一个名为 `hello` 的目录中，那么生成的二进制文件将名为 `hello`（在\
  \ Windows 下为 `hello.exe`）。使用 `build` 命令编译源码后，你可以通过输入二进制文件名来运行程序。\n\n`install` 命令会编译包，并将生成的二进制文件安装到\
  \ `GOPATH` 的 `bin` 目录中：\n\n```\ncd $GOPATH/src/github.com/user/hello\ngo install\n\
  ```\n\n你可以在系统上的任何位置运行此命令：\n\n```\ngo install github.com/user/hello\n```\n\n生成的二进制文件名与目录名相同。现在，你可以通过输入位于\
  \ `GOPATH` 的 `bin` 目录下的二进制文件名来运行程序：\n\n```\n$GOPATH/bin/hello\n```\n\n如果你已经将 `$GOPATH/bin`\
  \ 添加到了 `PATH` 环境变量中，那么只需在系统上的任何位置输入二进制文件名即可：\n\n```\nhello\n```\n\n#### 编写一个库\n\n\
  在 Go 中，你可以编写两种类型的程序：可执行程序和可重用的库。之前的示例程序是可执行程序。现在让我们编写一个共享库，为其他程序提供可重用的代码片段。在 `$GOPATH/src/github.com/shijuvar/go-web-book/chapter1/calc`\
  \ 位置创建一个包目录。\n\n代码清单 1-2 展示了一个简单的包，它提供了两个数值相加和相减的功能。\n\n**代码清单 1-2.** Go 语言版本的共享库程序\n\
  \n```\n1 package calc\n2\n3 func Add(x, y int) int {\n4       return x + y\n5 }\n\
  6 func Subtract(x, y int) int {\n7       return x - y\n8 }\n```\n\n**第 1 行：** 包名指定为\
  \ `calc`。包名和包目录名必须相同。\n\n**第 3 行：** 使用关键字 `func` 定义了一个名为 `Add` 的函数。此函数名以大写字母开头，因此\
  \ `Add` 函数将被导出到其他包。如果函数名以小写字母开头，则不会导出到其他包，其访问权限将仅限于同一个包内。与使用 C++、Java 和 C# 编程不同，你无需使用\
  \ `private` 和 `public` 关键字来指定标识符的访问权限。你可以从整个语言特性中看到 Go 语言的简洁性。`Add` 方法接受两个整数参数并返回一个整数值。\n\
  \n**第 6 行：** `Subtract` 函数与 `Add` 函数类似，但用于计算两个整数类型之间的差值。\n\n让我们构建并安装这个包。在终端窗口中导航到包目录，并输入以下命令：\n\
  \n```\ngo install\n```\n\n`install` 命令会编译源码，并将生成的二进制文件安装到 `GOPATH` 的 `pkg` 文件夹中（参见图\
  \ 1-3）。在 `pkg` 目录中，`calc` 包将安装在特定于平台的目录下的 `github.com/shijuvar/go-web-book/chapter1/calc`\
  \ 位置。\n\n![A978-1-4842-1052-9_1_Fig3_HTML.jpg](img/A978-1-4842-1052-9_1_Fig3_HTML.jpg)\n\
  \n**图 1-3.** install 命令将 calc 包安装到 pkg 文件夹\n\n`install` 命令的行为根据你创建的是可执行程序还是可重用库而略有不同。当你对可执行程序运行\
  \ `install` 时，生成的二进制文件会被安装到 `GOPATH` 的 `bin` 目录中；而对于库，则会安装到 `GOPATH` 的 `pkg` 目录中。\n\
  \n现在，你可以从位于 `GOPATH` 中的任何程序重用这个包。在 Go 中，通过包来实现代码重用非常容易。你已经创建了第一个库包。让我们从另一个可执行程序中重用该包的代码（参见代码清单\
  \ 1-3）。\n\n**代码清单 1-3.** 在 Go 程序中重用 calc 包\n\n```\n1 package main\n2\n3 import (\n\
  4       \"fmt\"\n5       \"github.com/shijuvar/go-web-book/chapter1/calc\"\n6 )\n\
  7\n8 func main() {\n9       var x, y int = 10, 5\n10      fmt.Println(calc.Add(x,\
  \ y))\n11      fmt.Println(calc.Subtract(x, y))\n12 }\n```\n\n**第 1 行：** 创建一个可执行程序。\n\
  \n**第 3 至 6 行：** 这些行导入了标准库中的 `\"fmt\"` 包和你自己的库中的 `\"calc\"` 包。你可以使用单个 `import` 语句来导入多个包。来自标准库的包使用短路径，例如\
  \ `\"fmt\"` 包。对于你自己的包，在导入时必须指定完整路径。对外部包使用完整路径可以避免包名冲突，并且你可以对多个路径不同的外部包使用相同的名称。\n\
  \n**第 8 行：** `main` 函数，是 `main` 包的入口点。\n\n**第 9 行：** 声明了两个变量 `x` 和 `y`，数据类型为 `int`。Go\
  \ 使用 `var` 关键字声明变量，你可以在单个语句中声明多个变量。如果你在声明变量的同时为变量赋值，可以使用更简短的语句：\n\n```\nx, y :=\
  \ 10, 5\n```\n\n当你使用 Go 的更简短变量声明语句时，无需指定变量类型，因为 Go 编译器可以根据你赋给变量的值推断出类型。Go 在保持其为静态类型语言的同时，提供了动态类型语言的生产力。Go\
  \ 编译器也可以使用 `var` 语句进行类型推断：\n\n```\nvar x, y = 10, 5\n```\n\n**第 10 至 11 行：** 你调用了\
  \ `calc` 包的导出函数，重用了库提供的功能。\n\n要运行该程序，请在程序目录中输入以下命令：\n\n```\ngo run main.go\n```\n\
  \n\n\n### 测试 Go 代码\n\nGo 生态系统提供了开发 Go 应用所需的所有基本工具，包括无需借助任何外部库或工具即可测试 Go 代码的能力。标准库中的\
  \ `testing` 包提供了编写自动化测试的功能，而 Go 工具则提供了运行自动化测试的支持。在开发软件系统时，为应用程序代码编写自动化测试是确保质量并提高可维护性的重要实践。如果你的代码有测试覆盖，你就可以毫无顾虑地重构应用程序代码。\n\
  \n让我们为上一节创建的 `calc` 包编写一些测试。你需要创建一个以 `_test.go` 结尾的源文件，并在其中通过添加以 `\"Test\"` 开头、且仅接受一个类型为\
  \ `*testing.T` 参数的函数来编写测试。\n\n在 `calc` 包目录下，创建一个名为 `calc_test.go` 的新源文件，其中包含清单 1-4\
  \ 所示的代码。\n\n**清单 1-4.** 测试 `calc` 包\n\n```go\npackage calc\n\nimport \"testing\"\
  \n\nfunc TestAdd(t *testing.T) {\n    var result int\n    result = Add(15,10)\n\
  \    if result != 25 {\n        t.Error(\"Expected 25, got \", result)\n    }\n\
  }\nfunc TestSubtract(t *testing.T) {\n    var result int\n    result = Subtract(15,10)\n\
  \    if result != 5 {\n        t.Error(\"Expected 5, got \", result)\n    }\n}\n\
  ```\n\n- **第 1 行：** 指定包名为 `calc`。\n- **第 3 行：** 从标准库导入 `\"testing\"` 包，该包提供了编写测试的基本功能，并与\
  \ `Go test` 命令协同工作。\n- **第 5 行：** 添加一个名为 `\"TestAdd\"` 的测试，其签名为 `func (t *testing.T)`，用于验证\
  \ `calc` 包中 `Add` 函数的功能。\n- **第 12 行：** 添加一个名为 `\"TestSubtract\"` 的测试，其签名为 `func\
  \ (t *testing.T)`，用于验证 `calc` 包中 `Subtract` 函数的功能。\n\n要使用 Go 工具运行这些测试，请在包目录下输入以下命令：\n\
  \n```bash\ngo test\n```\n\n`go test` 命令会根据测试所用的约定，识别并执行包文件中的测试。它将显示以下结果：\n\n```\n\
  PASS\nok      github.com/shijuvar/go-web-book/chapter1/calc   0.310s\n```\n\n###\
  \ 使用 Go Playground\n\nGo Playground 是一个允许你在 Web 浏览器中编写和运行 Go 程序的工具（参见图 1-4）。通过使用此工具，你无需在系统上安装\
  \ Go 即可编写和运行 Go 程序。\n\n![A978-1-4842-1052-9_1_Fig4_HTML.jpg](img/A978-1-4842-1052-9_1_Fig4_HTML.jpg)\n\
  \n**图 1-4.** Go Playground\n\n> **注：** 基于浏览器的 Go Playground 工具可通过 [`https://play.golang.org/`](https://play.golang.org/)\
  \ 访问。\n\nGo Playground 还可用于与其他开发者共享 Go 代码。点击 **Share** 按钮会生成一个可共享的 URL，用于与他人分享你的代码。\n\
  \n### 使用 Go Mobile\n\n你已经知道，Go 作为一种通用编程语言，可用于构建多种类型的应用程序。它也可用于为 Android 和 iOS 构建原生移动应用程序。Go\
  \ Mobile 项目为构建原生移动应用程序提供了工具和库。它包含一个名为 `gomobile` 的命令行工具，可帮助你构建这些应用程序。\n\n你可以采用以下两种开发策略将\
  \ Go 集成到你的移动技术栈中：\n\n- 完全用 Go 开发原生移动应用程序\n- 通过从 Go 包生成绑定，并从 Java（安卓端）和 Objective-C（iOS\
  \ 端）调用它们，来开发 SDK 应用程序\n\n第一种策略是使用 Go Mobile 提供的包和工具，在你的移动项目中全面使用 Go。在此，你可以使用 Go\
  \ 开发安卓和 iOS 应用程序。在第二种策略中，你可以从移动应用程序中重用 Go 库包，而无需对现有应用程序进行重大更改。通过此策略，你可以为 Android\
  \ 和 iOS 应用程序共享一个通用的代码库。你可以用 Go 将通用功能一次性编写为库包，然后通过绑定调用 Go 包，将其集成到平台特定代码中。\n\n> **注：**\
  \ 你可以在 [`https://github.com/golang/mobile`](https://github.com/golang/mobile) 找到关于\
  \ Go Mobile 项目的更多信息。\n\n### Go 作为 Web 和微服务语言\n\n本书的主要重点是使用 Go 进行 Web 开发。在现代计算领域，一场数字化转型正在进行中，HTTP\
  \ API（通常是 RESTful API）正成为 Web 应用、移动应用、大数据解决方案和物联网（IoT）的支柱。这些基于 Web 的 API 为许多现代应用提供后端支持，使开发者能够集成各种应用程序。\n\
  \n过去，开发大型应用一直采用单体架构方法，即单个应用包含运行所需的所有逻辑组件。由于各种逻辑组件之间的紧耦合，这些应用非常难以维护和扩展。为了解决单体应用架构中发现的各类问题，开发者倾向于采用微服务架构风格，将单体应用分解为一组小型服务（微服务），每个服务作为一个独立单元运行。这些独立的服务通过\
  \ RESTful API 或消息代理进行通信。Go 正逐渐成为构建 RESTful API 和微服务的首选语言。\n\n对于应用逻辑和 UI 渲染逻辑都驻留在服务器端应用程序中的传统\
  \ Web 应用，Go 可能不是语言首选。然而，对于构建现代 Web 应用（其中 API，通常是 RESTful API，作为服务器端实现来开发）来说，Go 是语言首选。通过使用这些后端服务，你可以构建前端\
  \ Web 应用。单页应用（SPA）架构已被广泛用于构建这些 Web 应用。这些后端服务也可用于构建移动应用程序。\n\nGo 提供了 `HTTP` 包，允许你通过利用\
  \ Go 内置的并发机制来构建高性能的 Web 应用和 RESTful 服务。在 Go 中，你可以用更少的代码行快速构建一个 HTTP 服务器，并开始监听指定的\
  \ HTTP 端口。默认情况下，对 Web 服务器的每个 HTTP 请求都将使用 goroutine 并发处理，这是 Go 中一种独立于其他函数并发运行函数的机制。你可以在单台服务器上运行数百万个\
  \ goroutine，这使你能够使用 Go 构建大规模可扩展的 Web 应用和 Web API。\n\nGo 的简洁性也体现在 Go Web 编程中，这大大提高了开发者的生产力。当你用其他编程语言构建基于\
  \ Web 的系统时，可能需要使用一个功能完备的 Web 框架，例如 Ruby 的 Rails、Python 的 Django 或 C# 的 ASP.NET MVC。在\
  \ Go 中，许多 Web 框架都是作为第三方包提供的。但即使不使用功能完备的 Web 框架，你也可以仅通过使用 Go 内置包和一些轻量级的第三方库来构建高度可扩展的\
  \ Web 系统。\n\n> **注：** 在第 9 章中，你将学习如何在不使用 Web 框架的情况下，用 Go 构建一个可扩展的 Web API。\n\n前面讨论过微服务架构，其中独立运行的服务被广泛用于通过\
  \ RESTful API 进行通信。Go 是构建这些 RESTful 服务的绝佳选择，并且由于其语言的简洁性、并发能力、性能以及开发分布式应用的能力，它正成为微服务架构中构建独立服务（微服务）的首选语言。\n\
  \n\n\n### 使用 Go 语言的微服务架构\n\n微服务架构是一种分布式应用程序架构，而 Go 语言是构建分布式系统的绝佳选择。诸如 `Node.js`\
  \ 这类技术虽擅长构建轻量级 RESTful API，但在构建分布式应用时往往会力不从心。Go 是微服务架构应用的首选语言，它可用于应用架构的所有组件，包括作为独立单元运行的小型服务、用于独立服务间通信的\
  \ RESTful 服务，以及通过 AMQP 等异步协议实现独立服务间通信的消息代理。\n\n### 本章摘要\n\nGo 是一种现代、静态类型、原生编译、垃圾回收的编程语言，它既能让你编写高性能的应用，又因其简洁的语法和实用的设计而提升了开发效率。在\
  \ Go 中，并发是核心语言层的内置特性，让你能为现代计算机编写高效的软件系统。Go 生态系统包含了语言、库和工具，为开发各类应用提供了所有必需功能。Go Mobile\
  \ 项目提供了用于构建 Android 和 iOS 平台原生移动应用的包和工具。Go 是构建可扩展、基于 Web 的后端系统和微服务的优秀编程语言。\n\n"
- "# Go 语言基础\n\n第 1 章 概述了 Go 编程语言，并讨论了它与其他编程语言的不同之处。在本章中，你将学习使用包编写可复用代码的 Go 基础，以及如何处理数组和集合。你还将学习\
  \ Go 语言的基础知识，例如 `defer`、`panic` 和 `recover`，并了解 Go 独特的错误处理能力。\n\n#### 包\n\n对于 Go\
  \ 开发者而言，开发应用的设计理念是开发可复用的、较小的软件组件片段，然后通过组合这些组件来构建应用。Go 通过其包生态系统提供了模块化、可组合性和代码复用性。Go\
  \ 鼓励你通过包编写可维护且可复用的代码片段，使你能够用这些较小的包来组合应用。Go 包是一个至关重要的概念，它让你能够实现许多 Go 的设计原则。与 Go 的其他特性一样，包的设计也注重简洁性和实用性。\n\
  \nGo 源文件被组织到称为包的目录中，并且包名必须与包含 Go 源文件的目录名相同。你将扩展名为 `.go` 的 Go 源文件组织到目录中，同一目录下的源文件包名相同。标准库中的包位于\
  \ `GOROOT` 目录，即 Go 的安装目录。你在 `GOPATH` 目录中编写 Go 程序作为包，这些包易于被其他包复用。\n\n**注意：** 标准库包的文档可在\
  \ [`http://golang.org/pkg/`](http://golang.org/pkg/) 找到。访问 [`http://godoc.org/`](http://godoc.org/)\
  \ 可获取标准库和第三方库的包文档。\n\n#### 包 main\n\n在 Go 中，你可以编写两种类型的程序：可执行程序和共享库。当编写可执行程序时，必须将\
  \ `main` 作为包名，以使该包成为可执行程序：包 `main` 告诉 Go 编译器该包应编译为可执行程序。在官方 Go 文档中，可执行程序通常被称为命令（commands）。可执行程序的入口点是\
  \ `main` 包中的 `main` 函数；`main` 包中的 `main` 函数是可执行程序的入口点。当你编写作为共享库的包时，包中不应包含 `main`\
  \ 包或 `main` 函数。\n\n清单 2-1 是包 `main` 的代码块。\n\n**清单 2-1.** 包含 main 函数的包 main\n\n```\n\
  package main\n\nimport (\n    \"fmt\"\n)\n\nfunc main() {\n    fmt.Println(\"Hello\
  \ World!\")\n}\n```\n\n当你使用 Go 工具构建上述程序时，Go 编译器会生成一个可执行二进制文件作为输出。如前所述，如果你想要在 Go\
  \ 中构建可执行程序，你必须编写一个包含 `main` 函数作为程序入口点的 `main` 包。\n\n#### 包别名\n\n在编写 Go 包时，你无需担心包名歧义；你甚至可以使用与标准库相同的包名。当你从\
  \ `GOPATH` 位置导入自己的包时，你需要引用包位置的完整路径以避免包名歧义。你可以从两个不同的位置使用同名的两个包，但在程序中引用时应避免名称歧义。包别名帮助你解决引用多个同名包时的名称歧义问题。\n\
  \n清单 2-2 是一个使用包别名来引用包的示例程序。\n\n**清单 2-2.** 使用包别名避免名称歧义\n\n```\npackage main\n\n\
  import (\n      mongo \"lib/mongodb/db\"\n      mysql \"lib/mysql/db\"\n)\n\nfunc\
  \ main() {\n    mongo.Get() //调用包 \"lib/mongodb/db\" 的方法\n    mysql.Get() //调用包\
  \ \"lib/mysql/db\" 的方法\n}\n```\n\n这里导入了两个同名为 `db` 的包，但它们使用不同的别名进行引用，并且通过别名来访问其导出的标识符。\n\
  \n#### 函数 init\n\n当编写包时，你可能需要为包提供一些初始化逻辑，例如初始化包变量、初始化数据库对象，以及为包提供一些引导逻辑。`init` 函数有助于向包中提供初始化逻辑，它会在程序执行开始时被执行。\n\
  \n清单 2-3 是一个使用 `init` 函数初始化数据库会话对象的示例程序。\n\n**清单 2-3.** 使用 init 函数\n\n```\npackage\
  \ db\n\nimport (\n    \"gopkg.in/mgo.v2\"\n)\n\nvar Session *mgo.Session //数据库会话对象\n\
  \nfunc init() {\n    // 初始化代码在此\n    Session, err := mgo.Dial(\"localhost\")\n}\n\
  \nfunc get() {\n        //使用 Session 对象的 get 逻辑\n}\n\nfunc add() {\n        //使用\
  \ Session 对象的 add 逻辑\n}\n\nfunc update() {\n        //使用 Session 对象的 update 逻辑\n\
  }\n\nfunc delete() {\n        //使用 Session 对象的 delete 逻辑\n}\n```\n\n在这段代码中，一个 MongoDB\
  \ 会话对象在 `init` 函数中被创建。当你将包 `db` 导入其他包时，`init` 函数将在程序执行开始时被调用，其中包含了包的初始化逻辑。假设你从 `main`\
  \ 包中引用了包 `db`，那么 `init` 函数将在 `main` 函数执行之前被调用。\n\n\n\n#### 使用空白标识符\n\n在某些场景下，你可能需要引用一个包，仅仅是为了调用它的\
  \ `init` 方法，以执行被引用包中的初始化逻辑，而不使用其他标识符。假设你希望从 `main` 包中调用 `db` 包的 `init` 函数（参见列表 2-3），但不使用其他函数。你在\
  \ `main` 包中引用了 `db` 包，以便调用 `init` 函数来初始化数据库会话对象。如果你导入了一个包，但没有引用该包中的任何标识符，Go 编译器会报错。请记住，你无法通过显式引用来直接调用\
  \ `init` 函数；它会在你引用包时自动被调用。当你引用包时，这些包的 `init` 函数会在程序执行的开始阶段被调用。\n\n如果你只想引用一个包来调用其\
  \ `init` 方法，你可以使用空白标识符（`_`）作为包的别名。编译器会忽略未使用包标识符的错误，但仍然会调用 `init` 函数，如列表 2-4 所示。\n\
  \n列表 2-4. 使用空白标识符 ( _ ) 仅调用 init 方法\n\n```\npackage main\n\nimport (\n    \"fmt\"\
  \n    _ \"lib/mongodb/db\"\n)\n\nfunc main() {\n    // 在此处实现代码\n}\n```\n\n在列表 2-4\
  \ 中，`db` 包被导入时使用了空白标识符（`_`）作为包别名。此处你希望调用 `db` 包的 `init` 函数，但不想使用其他包标识符。\n\n####\
  \ 导入包\n\nGo 源文件按目录组织成包，包提供了代码的可重用性，供其他包使用。如果你想在其他共享库和可执行程序中重用包代码，必须将这些包导入到你的程序中。你可以使用关键字\
  \ `import` 将包导入到你的 Go 程序中。`import` 语句告诉 Go 编译器，你想要引用该特定包提供的代码。当你将包导入到程序中时，你可以重用被引用包中所有导出的标识符。如果你希望导出变量、常量以及函数供其他程序使用，标识符的名称必须以大写字母开头。参见列表\
  \ 2-5。\n\n列表 2-5. 导入包的 import 语句\n\n```\nimport (\n    \"bytes\"\n    \"fmt\"\n\
  \    \"unicode\"\n)\n```\n\n在此列表中，导入了 `bytes`、`fmt` 和 `unicode` 包。在 Go 中导入多个包的惯用方式是将\
  \ `import` 语句写在一个 `import` 块中，如这里所示。\n\n当导入一个包时，Go 编译器会先搜索 `GOROOT` 目录，如果在该目录中找不到包，则再查找\
  \ `GOPATH` 目录。如果 Go 编译器在 `GOROOT` 或 `GOPATH` 位置都找不到该包，当你尝试构建程序时，它将生成一个错误。\n\n####\
  \ 安装第三方包\n\nGo 开发者社区非常热情，通过 `github.com` 和 `code.google.com` 等代码分享网站提供了许多有用的第三方包。你可以使用\
  \ Go 工具导入并重用这些第三方包。`go get` 命令从远程仓库获取包。\n\n以下 `go get` 命令获取第三方包 `negroni` 并将其安装到\
  \ `GOPATH` 位置：\n\n```\ngo get github.com/codegangsta/negroni\n```\n\n`go get` 命令会递归地从仓库位置获取该包及其依赖包。一旦包被获取到\
  \ `GOPATH` 中，你就可以从所有位于 `GOPATH` 位置的程序中导入并重用这些包。在许多其他开发者生态系统中，你需要在项目级别导入这些包；你必须为每个单独的项目分别安装包。而在\
  \ Go 中导入包时，你实际上是从一个公共位置导入：`GOPATH/pkg` 目录，因此你可以体会到 Go 许多特性（包括包生态系统）的简洁性和实用性。\n\n\
  #### 编写包\n\n让我们编写一个示例包，以供其他程序重用。列表 2-6 是一个简单的包，用于交换字符的大小写状态。\n\n列表 2-6. 库包\n\n```\n\
  package strcon\n\nimport (\n    \"bytes\"\n    \"unicode\"\n)\n\n// SwapCase 交换字符的大小写状态。\n\
  func SwapCase(str string) string {\n    buf := &bytes.Buffer{}\n    for _, r :=\
  \ range str {\n        if unicode.IsUpper(r) {\n            buf.WriteRune(unicode.ToLower(r))\n\
  \        } else {\n            buf.WriteRune(unicode.ToUpper(r))\n        }\n  \
  \  }\n    return buf.String()\n}\n```\n\n该包名为 `strcon`。提供包名的惯用方式是使用简短、简单的小写名称，不要使用下划线或混合大小写字母。标准库的包名是命名包时很好的参考。\n\
  \n让我们构建并安装 `strcon` 包，以便其他程序使用。该包提供了一个名为 `SwapCase` 的方法，用于交换字符串中字符的大小写状态。它重用了标准库中的\
  \ `bytes` 和 `unicode` 包来实现字符大小写的交换。由于 `SwapCase` 方法名以大写字母开头，当此包被引用时，它将被导出给其他程序。`SwapCase`\
  \ 方法遍历一个字符串并改变每个字符的大小写：\n\n```\nfor _, r := range str {\n    if unicode.IsUpper(r)\
  \ {\n        buf.WriteRune(unicode.ToLower(r))\n    } else {\n        buf.WriteRune(unicode.ToUpper(r))\n\
  \    }\n}\n```\n\n关键字 `range` 允许你遍历数组和集合。通过遍历字符串值，你可以提取每个字符作为值并交换其大小写。在 `range`\
  \ 块的左侧，你可以提供两个变量来获取集合中每个项的 `key` 和 `value`。在此代码块中，使用了用于获取字符值的 `value`，但程序中未使用 `key`。在这种情况下，你可以使用空白标识符（`_`）来避免编译器错误。每当你想要忽略左侧的\
  \ `key` 或 `value` 变量声明时，在 `range` 中使用空白标识符是一种常见做法。\n\n在包目录位置执行以下命令，构建包并将其安装到 `GOPATH`\
  \ 的 `pkg` 子目录下：\n\n```\ngo install\n```\n\n让我们编写一个示例程序来重用 `strcon` 包的代码（参见列表 2-7）。\n\
  \n列表 2-7. 在 main.go 中重用 strcon 包\n\n```\npackage main\n\nimport (\n    \"fmt\"\n\
  \    \"strcon\"\n)\n\nfunc main() {\n    s := strcon.SwapCase(\"Gopher\")\n    fmt.Println(\"\
  转换后的字符串是:\", s)\n}\n```\n\n我们导入 `strcon` 包来重用其中交换字符串字符大小写的代码。在包目录的终端中键入以下命令来运行程序：\n\
  \n```\ngo run main.go\n```\n\n运行程序后，你应该会看到以下结果：\n\n```\ngOPHER\n```\n\n由于列表 2-7\
  \ 中的程序编写在 `main` 包下，`go build` 命令会在包目录中生成一个可执行二进制文件。`go install` 命令会构建包并将生成的二进制文件安装到\
  \ `GOPATH/bin` 子目录中。\n\n\n\n#### Go 工具\n\nGo 工具是 Go 生态系统中非常重要的组成部分。在前面的章节中，你已使用\
  \ Go 工具来构建和运行 Go 程序。在终端中，输入不带任何参数的 `go` 命令即可获取 Go 工具所提供命令的文档。\n\n以下是 Go 命令的文档：\n\
  \n`Go 是一个用于管理 Go 源代码的工具。`\n\n`用法：`\n`go 命令 [参数]`\n\n`这些命令包括：`\n`build       编译包及其依赖`\n\
  `clean       删除目标文件`\n`doc         显示包或符号的文档`\n`env         打印 Go 环境信息`\n`fix  \
  \       在包上运行 go tool fix`\n`fmt         在包源文件上运行 gofmt`\n`generate    通过处理源文件生成\
  \ Go 文件`\n`get         下载并安装包及其依赖`\n`install     编译并安装包及其依赖`\n`list        列出包`\n\
  `run         编译并运行 Go 程序`\n`test        测试包`\n`tool        运行指定的 go 工具`\n`version\
  \     打印 Go 版本`\n`vet         在包上运行 go tool vet`\n\n`使用 \"go help [命令]\" 获取关于某个命令的更多信息。`\n\
  \n`其他帮助主题：`\n`c           Go 与 C 之间的调用`\n`buildmode   构建模式说明`\n`filetype    文件类型`\n\
  `gopath      GOPATH 环境变量`\n`environment 环境变量`\n`importpath  导入路径语法`\n`packages \
  \   包列表说明`\n`testflag    测试标志说明`\n`testfunc    测试函数说明`\n\n`使用 \"go help [主题]\" 获取关于该主题的更多信息。`\n\
  \n要获取任何特定命令的文档，请输入：\n\n`go help [命令]`\n\n以下是获取 `install` 命令文档的命令：\n\n`go help install`\n\
  \n以下是 `install` 命令的文档：\n\n`用法：go install [构建标志] [包]`\n`Install 编译并安装由导入路径指定的包及其依赖。`\n\
  `关于构建标志的更多信息，请参见 'go help build'。`\n`关于指定包的更多信息，请参见 'go help packages'。`\n`另请参阅：go\
  \ build, go get, go clean。`\n\n#### 格式化 Go 代码\n\nGo 工具提供了 `fmt` 命令来格式化 Go 代码。在将源文件提交到版本控制系统之前，格式化\
  \ Go 程序是一种良好的实践。`go fmt` 命令会为源代码应用预定义的样式以格式化源文件，从而确保花括号的正确放置，确保制表符和空格的使用规范，并按字母顺序对包导入进行排序。`go\
  \ fmt` 命令可以应用于包级别或特定的源文件。\n\n列表 2-8 展示了应用 `go fmt` 之前的 `import` 块。\n\n列表 2-8. 应用\
  \ `go fmt` 之前的导入包块\n\n```\nimport (\n    \"log\"\n    \"net/http\"\n    \"encoding/json\"\
  \n)\n```\n\n列表 2-9 展示了应用 `go fmt` 之后的 `import` 块：\n\n列表 2-9. 应用 `go fmt` 之后的导入包块\n\
  \n```\nimport (\n    \"encoding/json\"\n    \"log\"\n    \"net/http\"\n)\n```\n\n\
  执行 `go fmt` 命令后，`import` 包块会按字母顺序重新排列。\n\n注意\n\n编写 `import` 块的惯用方式是以按字母顺序排列的标准库包开头，接着是按字母顺序排列的自定义包，并在标准库包和自定义包之间留一个空行。\n\
  \n#### Go 文档\n\n文档是使软件易于访问和维护的重要组成部分。它当然必须写得清晰准确，同时也必须易于编写和维护。理想情况下，文档应与代码耦合，这样它就能随代码一起演变。程序员越容易生成良好的文档，对所有人来说情况就越好。\n\
  \nGo 提供了 `godoc` 工具，用于提供 Go 包的文档。它会解析 Go 源代码（包括注释），并生成 HTML 或纯文本格式的文档。简而言之，`godoc`\
  \ 工具从源文件中的注释生成文档。如果你想从命令提示符访问文档，请输入：\n\n`godoc [包]`\n\n例如，如果你想获取 `fmt` 包的文档，请在终端中输入以下命令：\n\
  \n`godoc fmt`\n\n该命令会将 `fmt` 包的文档显示在终端上。\n\n`godoc` 工具还提供可通过 Web 界面浏览的文档。要通过基于 Web\
  \ 的界面访问文档，请启动由 `godoc` 工具提供的 Web 服务器。在终端中输入以下命令：\n\n`godoc -http=:3000`\n\n该命令会在端口\
  \ 3000 启动一个 Web 服务器，使你能够在 Web 浏览器中访问文档。然后，你可以轻松导航到标准库和 `GOPATH` 位置的包文档。参见图 2-1。\n\
  \n![A978-1-4842-1052-9_2_Fig1_HTML.jpg](img/A978-1-4842-1052-9_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 从 Web 浏览器访问 godoc 文档\n\n### 处理集合\n\n在处理实际应用程序时，你必须利用多种数据结构来管理应用数据。当你将应用数据持久化到数据库系统时，可能会使用保存应用数据的数据结构对象的值。当从数据库读取数据时，你可能需要将数据放入各种形式的数据结构中以供其他用途，例如渲染用户界面。集合是可以容纳数据结构的集合的数据结构，这些数据结构包括内置类型和用户自定义类型。Go\
  \ 提供了三种数据结构来管理数据集合：数组、切片和映射。\n\n\n\n#### 数组\n\n数组是一种固定长度的数据类型，包含单一类型元素的序列。通过指定数据类型和长度来声明数组。\n\
  \n清单 2-10 是一个声明数组的代码块。\n\n**清单 2-10.** 声明一个包含五个元素的整数数组\n\n```\nvar x [5]int\n```\n\
  \n声明了一个数组 `x`，用于存储五个 `int` 类型的元素，因此数组 `x` 将由五个整数元素组成。\n\n清单 2-11 是一个声明数组并赋值的示例程序。\n\
  \n**清单 2-11.** 声明数组并赋值\n\n```\npackage main\n\nimport (\n    \"fmt\"\n)\n\nfunc\
  \ main() {\n    var x [5]int\n    x[0] = 10\n    x[1] = 20\n    x[2] = 30\n    x[3]\
  \ = 40\n    x[4] = 50\n    fmt.Println(x)\n}\n```\n\n你应该会看到以下输出：\n\n```\n[10 20\
  \ 30 40 50]\n```\n\n你可以使用数组字面量来声明并初始化数组，如清单 2-12 所示。\n\n**清单 2-12.** 使用数组字面量初始化数组\n\
  \n```\nx := [5]int{10, 20, 30, 40, 50}\n```\n\n你也可以使用多行语句来初始化数组（见清单 2-13）。\n\n**清单\
  \ 2-13.** 使用多行语句声明数组\n\n```\nx := [5]int{\n  10,\n  20,\n  30,\n  40,\n  50,\n}\n\
  ```\n\n注意，即使在最后一个元素后面也添加了一个逗号，因为这是 Go 语言的要求。这样做便于使用，例如可以轻松地移除初始化块中的一个元素或将其注释掉，而无需移除注释。\n\
  \n当你使用数组字面量声明数组时，可以使用 `...` 来替代指定长度。Go 编译器可以根据你在数组声明中指定的元素识别数组的长度。\n\n清单 2-14 是一个使用\
  \ `...` 声明并初始化数组的代码块。\n\n**清单 2-14.** 使用 `...` 初始化数组\n\n```\nx := [...]int{10, 20,\
  \ 30, 40, 50}\n```\n\n当使用数组字面量初始化数组时，你可以为特定元素初始化值。\n\n清单 2-15 是一个为特定位置赋值的示例程序。\n\
  \n**清单 2-15.** 为特定元素初始化值\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main() {\n\
  \    x := [5]int{2: 10, 4: 40}\n    fmt.Println(x)\n}\n```\n\n你应该会看到以下输出：\n\n```\n\
  [0 0 10 0 40]\n```\n\n在清单 2-15 中，值 `10` 被分配给第三个元素（索引 2），值 `40` 被分配给第五个元素（索引 4）。\n\
  \n#### 切片\n\n切片是一种与数组非常相似的数据结构，但没有指定长度。它是在数组类型之上构建的一种抽象，提供了一种更方便的方式来处理集合。与常规数组不同，切片是动态数组，其长度可以在后续阶段随着数据的增加或减少而改变。当要存储在集合中的元素数量无法预测时，切片是非常有用的数据结构。\n\
  \n在用 Go 开发应用程序时，你经常会在代码中看到切片。如果你想读取数据库表并将数据放入集合类型中，请使用切片而不是数组，因为你无法预测集合的长度。切片提供了一个名为\
  \ `append` 的内置函数，可以快速地将元素追加到切片中。\n\n清单 2-16 是一个声明空切片（nil slice）的代码块。\n\n**清单 2-16.**\
  \ 声明空切片\n\n```\nvar x []int\n```\n\n声明了一个切片 `x`，没有指定长度。这将创建一个长度为零的整数空切片。由于切片是动态数组，你可以在稍后修改它们的长度。\n\
  \n在 Go 中，有几种创建和初始化切片的方法：你可以使用内置函数 `make` 或切片字面量。\n\n#### 使用 `make` 函数创建切片\n\n当你使用\
  \ `make` 函数声明切片时，可以显式指定切片的长度和容量。\n\n清单 2-17 是一个声明长度为 5、容量为 10 的切片的代码块。\n\n**清单 2-17.**\
  \ 使用 `make` 函数指定切片中的长度和容量\n\n```\nx := make([]int, 5, 10)\n```\n\n如果未指定切片容量，则容量与长度相同。\n\
  \n清单 2-18 是一个声明切片时未指定容量的代码块。\n\n**清单 2-18.** 使用 `make` 函数指定切片中的长度\n\n```\nx := make([]int,\
  \ 5)\n```\n\n#### 使用切片字面量创建切片\n\n创建和初始化切片的一种常见方法是使用切片字面量，它不需要在 `[]` 运算符中指定长度。初始长度和容量由初始化的元素数量决定。\n\
  \n清单 2-19 是一个通过切片字面量声明并初始化切片的代码块。\n\n**清单 2-19.** 使用切片字面量初始化切片\n\n```\nx := []int{10,\
  \ 20, 30, 40, 50}\n```\n\n此代码创建并初始化了一个长度为 5、容量为 5 的切片。\n\n当你使用切片字面量创建切片时，你也可以为特定长度初始化一个切片，而不必提供所有元素，如清单\
  \ 2-20 所示。\n\n**清单 2-20.** 为特定长度初始化切片而不提供元素\n\n```\nx := []int{4: 0}\n```\n\n此代码创建了一个长度为\
  \ 5、容量为 5 的切片。索引 `4` 处提供了一个零值。\n\n你可以使用切片字面量创建空切片，如清单 2-21 所示。\n\n**清单 2-21.** 创建空切片\n\
  \n```\nx := []int{}\n```\n\n此代码创建了一个没有值元素的空切片。当你想从函数返回空集合时，空切片非常有用。\n\n#### 切片函数\n\
  \nGo 提供了两个内置函数来方便地操作切片：`append` 和 `copy`。`append` 函数通过获取现有切片并将所有后续元素追加到其中来创建一个新切片。\n\
  \n清单 2-22 展示了 `append` 的一个示例。\n\n**清单 2-22.** 使用 `append` 函数的切片\n\n```\npackage\
  \ main\n\nimport \"fmt\"\n\nfunc main() {\n    x := []int{10, 20, 30}\n    y :=\
  \ append(x, 40, 50)\n    fmt.Println(x, y)\n}\n```\n\n你应该会看到以下输出：\n\n```\n[10 20\
  \ 30] [10 20 30 40 50]\n```\n\n`copy` 函数通过将现有切片中的元素复制到另一个切片中来创建一个新切片。\n\n清单 2-23\
  \ 展示了 `copy` 函数的一个示例。\n\n**清单 2-23.** 使用 `copy` 函数的切片\n\n```\npackage main\n\nimport\
  \ \"fmt\"\n\nfunc main() {\n    x := []int{10, 20, 30}\n    y := make([]int, 2)\n\
  \    copy(y, x)\n    fmt.Println(x, y)\n}\n```\n\n你应该会看到以下输出：\n\n```\n[10 20 30]\
  \ [10 20]\n```\n\n运行此程序后，切片 `x` 为 `[10, 20, 30]`，切片 `y` 为 `[10, 20]`。由于切片 `y` 的长度为\
  \ 2，它从切片 `x` 复制了前两个元素。如果你将切片 `y` 的长度指定为 3，它将从切片 `x` 复制所有三个元素。\n\n\n\n#### 长度与容量\n\
  \n如前几节所述，切片在声明时可指定其长度和容量。切片的长度是指切片引用的元素数量；容量是指底层数组中的元素数量。切片不能保存超出其容量的值；如果你尝试添加更多元素，将会发生运行时错误。切片可以通过\
  \ `append` 函数来增长。当使用 `append` 函数添加元素时，它会检查容量是否足够，若不足，则自动增加容量。你可以通过 `len` 函数获取长度值，通过\
  \ `cap` 函数获取容量值。\n\n清单 2-24 展示了长度与容量的概念。\n\n**清单 2-24.** 切片长度与容量\n\n```\npackage\
  \ main\n\nimport \"fmt\"\n\nfunc main() {\n\n        x := make([]int, 2, 5)\n\n\
  \        x[0] = 10\n\n        x[1] = 20\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
  Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n       \
  \ x = append(x, 30, 40, 50)\n\n        fmt.Println(x)\n\n        fmt.Println(\"\
  Length is\", len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n       \
  \ fmt.Println(x)\n\n        x = append(x, 60)\n\n        fmt.Println(\"Length is\"\
  , len(x))\n\n        fmt.Println(\"Capacity is\", cap(x))\n\n        fmt.Println(x)\n\
  \n}\n```\n\n在这段代码中，声明了一个长度为 `2`、容量为 `5` 的切片 `x`。随后向切片 `x` 追加了两个元素。此时，容量对切片 `x` 而言是足够的；但当你尝试再向切片\
  \ `x` 追加一个元素时，切片会自动扩容，容量随之增大。\n\n运行该程序，你将看到如下输出：\n\n```\n[10 20]\n\nLength is 2\n\
  \nCapacity is 5\n\n[10 20 30 40 50]\n\nLength is 5\n\nCapacity is 5\n\n[10 20 30\
  \ 40 50]\n\nLength is 6\n\nCapacity is 12\n\n[10 20 30 40 50 60]\n```\n\n从输出中可以看出，当第二次使用\
  \ `append` 函数时，切片的容量增加到了 12。\n\n#### 遍历切片\n\nGo 提供了一个 `range` 关键字，可用于遍历集合。`range`\
  \ 关键字会遍历一个元素集合，每次迭代返回两个值：第一个值是元素的索引位置，第二个值是该索引位置包含的值的副本。\n\n清单 2-25 展示了使用 `range`\
  \ 遍历切片的示例。\n\n**清单 2-25.** 遍历切片\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main()\
  \ {\n\n    x := []int{10, 20, 30, 40, 50}\n\n    for k, v := range x {\n\n     \
  \   fmt.Printf(\"Index: %d Value: %d\\n\", k, v)\n\n    }\n\n}\n```\n\n你将看到如下输出：\n\
  \n```\nIndex: 0 Value: 10\n\nIndex: 1 Value: 20\n\nIndex: 2 Value: 30\n\nIndex:\
  \ 3 Value: 40\n\nIndex: 4 Value: 50\n```\n\n### 映射\n\n映射（map）是一种数据结构，提供键值对的无序集合。（在其他编程语言中，类似于映射的数据结构称为哈希表或字典。）请记住，映射是无序的集合，因此在遍历时无法预测数据的顺序。\n\
  \n在 Go 中，有多种创建和初始化映射的方法。与切片类似，可以使用内置函数 `make` 或映射字面量来创建和初始化映射。\n\n清单 2-26 是一个示例程序，演示了如何创建并初始化一个映射，以及如何遍历该集合。\n\
  \n**清单 2-26.** 创建映射并遍历集合\n\n```\npackage main\n\nimport \"fmt\"\n\nfunc main() {\n\
  \n    dict := make(map[string]string)\n\n    dict[\"go\"] = \"Golang\"\n\n    dict[\"\
  cs\"] = \"CSharp\"\n\n    dict[\"rb\"] = \"Ruby\"\n\n    dict[\"py\"] = \"Python\"\
  \n\n    dict[\"js\"] = \"JavaScript\"\n\n    for k, v := range dict {\n\n      \
  \  fmt.Printf(\"Key: %s Value: %s\\n\", k, v)\n\n    }\n\n}\n```\n\n声明了一个名为 `dict`\
  \ 的映射，其中键（`[]` 运算符内的类型）和值都被指定为字符串类型：\n\n```\ndict := make(map[string]string)\n```\n\
  \n通过给定的键（此处键 `\"go\"` 对应值 `\"Golang\"`）为映射赋值：\n\n```\ndict[\"go\"] = \"Golang\"\n\
  ```\n\n最后，使用 `range` 遍历集合，并打印集合中每个元素的键和值：\n\n```\nfor k, v := range dict {\n\n \
  \   fmt.Printf(\"Key: %s Value: %s\\n\", k, v)\n\n}\n```\n\n你将看到如下输出：\n\n```\nKey:\
  \ cs Value: CSharp\n\nKey: rb Value: Ruby\n\nKey: py Value: Python\n\nKey: js Value:\
  \ JavaScript\n\nKey: go Value: Golang\n```\n\n**注意：** 由于映射是无序的集合，因此每次运行时的数据顺序都会不同。\n\
  \n你可以通过提供键来访问映射中元素的值（见清单 2-27）：\n\n**清单 2-27.** 从映射中访问元素的值\n\n```\nlan, ok := dict[\"\
  go\"]\n```\n\n当通过键访问元素时，会返回两个值：第一个值是结果（元素的值）；第二个值是布尔值，指示查找是否成功。Go 提供了一种便捷的写法，如清单\
  \ 2-28 所示。\n\n**清单 2-28.** 以惯用方式从映射中访问元素的值\n\n```\nif lan, ok := dict[\"go\"]; ok\
  \ {\n\n    fmt.Println(lan, ok)\n\n}\n```\n\n### Defer、Panic 和 Recover\n\nGo 是一种极简主义编程语言，提供了开发应用程序所需的核心功能。尽管极简，但\
  \ Go 具备开发高可靠性应用程序所需的所有能力。例如，语言特性 `defer`、`panic` 和 `recover` 允许你通过显式引发 panic 然后从中恢复，从而妥善清理对象。\n\
  \n#### Defer\n\n如果你曾在 C# 和 Java 等编程语言中使用过 `try/catch/finally` 块，可能会使用 `finally`\
  \ 块来释放在 `try` 块中分配的资源。当执行流程离开 `try` 语句时，`finally` 块中的语句会运行。即使控制流因处理异常而进入 `catch`\
  \ 块，这个 `finally` 块也仍会被调用。使用 `defer`，你可以在 Go 中实现清理代码，这比其他语言中使用 `finally` 块更为高效。虽然\
  \ `defer` 主要用于实现清理代码，但它的用途不止于此。例如，通过与 `recover` 结合使用，你可以从一个引发 panic 的函数中重新获得控制权。\n\
  \n`defer` 语句会将一个函数调用（或一条代码语句）推入一个列表。这个保存的“函数调用”列表会在外围函数返回后执行。后添加的函数会先从延迟函数列表中被调用。假设你先将函数\
  \ `f1`、然后是 `f2`、最后是 `f3` 添加到延迟列表中，则执行顺序将是 `f3`、`f2`、然后 `f1`。\n\n清单 2-29 是一个使用 `defer`\
  \ 清理数据库会话对象的代码块。\n\n**清单 2-29.** 用于清理资源的 Defer 语句\n\n```\nsession, err := mgo.Dial(\"\
  localhost\") //MongoDB 会话对象\n\ndefer session.Close()\n\nc := session.DB(\"taskdb\"\
  ).C(\"categories\")\n\n//使用 session 对象的代码语句\n```\n\n此代码块创建了一个 MongoDB 数据库的会话对象。在下一行，代码语句\
  \ `session.Close()` 被添加到延迟列表中，以便在外围函数返回后清理数据库会话对象的资源。你可以将任意数量的代码语句和函数添加到延迟列表中。\n\
  \n\n\n#### Panic\n\n`panic`函数是一个内置函数，可让您停止正常的控制流程并使函数崩溃。当您从函数中调用`panic`时，它会停止函数的执行，所有延迟函数都会被执行，并且调用者（`caller`）函数会得到一个正在崩溃的函数。请记住，所有延迟函数在执行停止前都会正常执行。在开发应用程序时，您很少会调用`panic`函数，因为您的职责是提供适当的错误消息，而不是停止正常的控制流程。但在某些场景下，如果没有继续正常控制流程的可能性，您可能需要调用`panic`函数。例如，如果您无法连接到数据库服务器，继续执行应用程序就没有任何意义。\n\
  \n清单 2-30 是一个代码块，如果连接数据库时出现错误，它会调用`panic`。\n\n**清单 2-30.** 使用`panic`函数使函数崩溃\n\n\
  ```\nsession, err := mgo.Dial(\"localhost\") // Create MongoDB Session object\n\
  if err != nil {\n        panic(err)\n}\ndefer session.Close()\n```\n\n此代码块尝试建立与\
  \ MongoDB 数据库的连接并创建一个`session`对象。如果在建立数据库连接时出现错误，您会调用`panic`。它会停止执行，并且调用者函数会得到一个正在崩溃的函数。\n\
  \n#### Recover\n\n`recover`函数是一个内置函数，通常用在延迟函数内部，用于重新获得对正在崩溃的函数的控制权。`recover`函数仅在延迟函数内部有用，因为延迟语句是在函数崩溃时唯一可以执行某些操作的方式。\n\
  \n清单 2-31 是一个演示 panic 恢复的示例程序。\n\n**清单 2-31.** 使用`recover`从崩溃函数中恢复\n\n```\npackage\
  \ main\nimport \"fmt\"\nfunc doPanic() {\n        defer func() {\n             \
  \   if e := recover(); e != nil {\n                   fmt.Println(\"Recover with:\
  \ \", e)\n                }\n        }()\n        panic(\"Just panicking for the\
  \ sake of demo\")\n        fmt.Println(\"This will never be called\")\n}\nfunc main()\
  \ {\n        fmt.Println(\"Starting to panic\")\n        doPanic()\n        fmt.Println(\"\
  Program regains control after panic recover\")\n}\n```\n\n在前面的程序中，从`main`函数调用了`doPanic`函数。在`doPanic`函数内部，一个匿名函数被添加到了延迟列表中，在该匿名函数中调用`recover`来从崩溃函数中重新获得控制权。出于演示目的，通过提供一个字符串值来调用`panic`函数。当一个函数崩溃时，所有延迟函数都会被执行。因为`recover`函数在延迟函数内部被调用，所以程序执行的控制权被重新获得。当调用`recover`时，会接收到由`panic`函数提供的值。\n\
  \n**注意**\n\n在`doPanic`函数中`panic`调用之后提供的语句不会执行，但在`main`函数中对`doPanic`函数调用之后的语句会执行，因为控制权已从崩溃的函数中重新获得。\n\
  \n您应该会看到以下输出：\n\n```\nStarting to panic\nRecover with:  Just panicking for the sake\
  \ of demo\nProgram regains control after panic recover\n```\n\n#### 错误处理\n\nGo 中的错误处理与其他编程语言不同。大多数编程语言使用`try/catch`块来处理异常；在\
  \ Go 中，一个函数可以返回多个值。通过利用这个特性，Go 函数通常会返回一个内置`error`类型的值，以及函数返回的其他值。返回错误值的惯用方式是在其他返回值之后提供该值。当您查看标准库包时，可以看到许多函数返回一个`error`值。因此，当您调用标准库包的函数时，可以检查`error`值是否为`nil`。如果返回了非`nil`的`error`值，您可以识别出遇到了异常。您可以将相同的方法用于\
  \ Go 函数，这些函数可以从函数中返回多个值，包括一个`error`值。\n\n清单 2-32 是一个代码块，通过调用标准库函数演示了错误处理。\n\n**清单\
  \ 2-32.** Go 中的错误处理\n\n```\nf, err := os.Open(\"readme.ext\")\nif err != nil {\n\
  \    log.Fatal(err)\n}\n```\n\n在这个代码块中，调用了`os`包的`Open`函数来打开一个文件。`Open`函数返回两个值：`File`对象和`error`值。如果函数返回一个非`nil`的`error`值，则存在错误，并且文件将无法打开。这里，如果发生错误，会记录该`error`值。\n\
  \n清单 2-33 是一个自定义函数，它返回多个值，包括一个`error`值。\n\n**清单 2-33.** 定义带有错误值的函数\n\n```\nfunc\
  \ GetById(id string) (models.Task, error) {\n    var task models.Task\n   // Implementation\
  \ here\n    return task,nil // multiple return values\n}\n```\n\n当您编写提供`error`值的函数时，如果没有发生错误，可以返回`nil`值。调用者（`caller`）函数可以检查`error`值是否为`nil`；如果`error`值不是`nil`，则函数收到一个错误。\n\
  \n清单 2-34 是一个代码块，演示了如何调用一个提供`error`值的函数。\n\n**清单 2-34.** 调用者函数检查错误值\n\n```\ntask,\
  \ err:= GetById (\"105\")\nif err != nil {\n    log.Fatal(err)\n}\n//Implementation\
  \ here if error is nill\n```\n\n### 总结\n\n本章讨论了 Go 包，这是 Go 生态系统中的重要特性。Go 通过其包生态系统提供了模块化、可组合性和代码可重用性。Go\
  \ 源文件被组织到称为包的目录中。在 Go 中，您可以编写两种类型的包：包`main`（生成可执行程序，在 Go 文档中通常称为命令）和共享库包（用于与其他包重用代码）。您可以给包起别名，以避免在引用同名包时出现名称歧义。包的`init`函数可用于初始化包变量以及执行其他初始化逻辑。您不需要显式调用`init`函数；它会在执行开始时自动执行。\n\
  \nGo 工具是一个命令行工具，提供了各种命令，用于编译、格式化、测试和运行 Go 代码等功能。\n\nGo 提供了三种数据结构来管理数据集合：数组、切片和映射。数组是一种固定长度的数据类型，包含单一类型元素的序列。切片是一种动态数组，可以随着数据的增加或缩减而增长。Go\
  \ 提供了两个用于操作切片的内置函数：`append`和`copy`。映射是一种提供无序键值对集合的数据结构。\n\nGo 提供了`defer`关键字用于清理资源。`defer`语句将一个函数调用推入到一个延迟函数列表中，该列表在包围函数返回后执行。`panic`函数允许您停止正常的控制流程并使函数崩溃。`recover`函数可以重新获得对崩溃函数的控制权，它仅在延迟函数内部有用。\n\
  \nGo 中的错误处理与大多数其他编程语言不同。由于 Go 函数可以返回多个值，因此可以从函数返回一个错误值。因此，从调用者函数中，您可以轻松检查函数是否返回了错误值，并相应地提供代码实现。\n\
  \n\n\n"
- "# 3. 用户定义类型与并发\n\n类型系统是编程语言最重要的特性之一；类型允许您组织并存储应用程序数据。在选择编程语言时，必须考虑其类型系统。`Go` 在整个语言设计中贯彻了简洁性原则。\n\
  \n`Go` 是一种静态类型语言，您可以使用内置类型和用户定义类型来存储应用程序数据。`Go` 提供了多种内置类型，例如 `int`、`float64`、`string`\
  \ 和 `bool`。第 2 章 讨论了数组、切片和映射，这些是由其他类型（包括内置类型和用户定义类型）组成的复合类型。例如，复合类型 `map[string]float64`\
  \ 表示一个 `float64` 值的集合，其中每个 `float64` 类型的值都可以通过一个 `string` 类型的键添加到集合中，并可通过相应的键值来检索值。除了内置类型之外，您还可以通过组合一个或多个内置类型或用户定义类型来创建自己的类型。`Go`\
  \ 在其类型系统中提供了一种接口类型，使您能够开发出具有更高可扩展性的程序。\n\n### 使用结构体定义用户定义类型\n\n`Go` 的类型系统在设计时考虑了简洁性和实用性，这避免了在设计应用程序数据结构时出现许多复杂性。`Go`\
  \ 的面向对象方法与其他编程语言完全不同。如果您来自 `C++`、`Java` 和 `C#` 等编程语言，您会发现 `Go` 的面向对象方法是不同且独特的，尽管您可能会怀念这些语言的某些特性。当您审视\
  \ `Go` 的类型系统及其用户定义类型时，您应该以全新的眼光看待这门语言，从而能够欣赏并利用其简洁性和强大功能来解决实际问题。\n\n`Go` 的类型系统中没有提供类（classes）；它有结构体（structs），它类似于类。结构体可以被视为类的轻量级版本，但其设计是独特的，因为它专注于实际应用。`Go`\
  \ 中的结构体让您可以创建用户定义的具体类型；它们是字段或属性的集合，可用于存储复杂数据。您可以使用结构体来存储应用程序领域模型。\n\n#### 创建结构体类型\n\
  \n让我们创建一个用于表示人员信息的结构体类型（参见清单 3-1）。\n\n**清单 3-1. 声明一个带有字段集合的结构体**\n\n```\ntype Person\
  \ struct {\n        FirstName, LastName string\n        Dob                 time.Time\n\
  \        Email, Location     string\n}\n```\n\n使用关键字 `struct` 创建一个用户定义类型：\n\n```\n\
  type Person struct\n```\n\n因为类型标识符以大写字母开头，所以 `Person` 类型将被导出到其他包中。您在 `Person` 类型的主体中指定结构体字段。由于\
  \ `FirstName` 和 `LastName` 字段使用相同的数据类型，您可以在一条语句中声明这两个变量：\n\n```\nFirstName, LastName\
  \ string\n```\n\n#### 创建结构体类型的实例\n\n我们已经定义了一个名为 `Person` 的结构体类型。让我们创建一个 `Person`\
  \ 类型的实例，并为字段赋值（参见清单 3-2）。\n\n**清单 3-2. 创建结构体实例**\n\n```\nvar p Person\np.FirstName=\"\
  Shiju\"\np.LastName=\"Varghese\"\np.Dob= time.Date(1979, time.February, 17, 0, 0,\
  \ 0, 0, time.UTC)\np.Email= \"shiju@email.com\"\np.Location=\"Kochi\"\n```\n\n创建了一个\
  \ `Person` 类型的实例，并逐个为字段赋值。您也可以使用结构体字面量来创建结构体类型实例（参见清单 3-3）。\n\n**清单 3-3. 使用结构体字面量创建结构体实例**\n\
  \n```\np:= Person {\n    FirstName : \"Shiju\",\n    LastName : \"Varghese\",\n\
  \    Dob : time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n    Email\
  \ : \"shiju@email.com\",\n    Location : \"Kochi\",\n}\n```\n\n您可以通过使用结构体字面量来创建\
  \ `Person` 类型实例。当使用结构体字面量创建结构体类型实例时，您可以将结构体字段的赋值拆分到多行，这增强了代码块的可读性。当您以这种方式创建结构体实例时，必须在最后一个赋值语句末尾加上额外的逗号，这使得您可以轻松地重新排列结构体字段的赋值顺序，而无需担心移除最后一个赋值语句的逗号，并为所有其他字段添加逗号。现在，您必须为每个结构体类型字段插入逗号，无论它是否是最后一个字段。\n\
  \n如果您知道结构体字段的顺序，您可以用更高效的方式创建结构体实例（参见清单 3-4）。\n\n**清单 3-4. 使用结构体字面量创建结构体实例**\n\n\
  ```\np:= Person {\n    \"Shiju\",\n    \"Varghese\",\n     time.Date(1979, time.February,\
  \ 17, 0, 0, 0, 0, time.UTC),\n    \"shiju@email.com\",\n    \"Kochi\",\n}\n```\n\
  \n如果您知道结构体类型字段的顺序，这是一种非常方便的创建结构体类型实例的方式。您还可以使用单行语句创建结构体实例。\n\n清单 3-5 展示了一个示例，通过使用结构体字面量指定部分字段，并在之后分配其余字段来创建结构体实例。\n\
  \n**清单 3-5. 通过指定部分字段创建结构体实例**\n\n```\np:= Person { FirstName :\"Shiju\", LastName\
  \ : \"Varghese\" }\np.Dob= time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC)\n\
  p.Email= \"shiju@email.com\"\np.Location=\"Kochi\"\n```\n\n#### 向结构体类型添加行为\n\n`Go`\
  \ 的类型系统允许您向结构体类型添加行为。与其他面向对象语言的类一样，`Go` 中的结构体允许您定义字段以及操作。让我们向 `Person` 类型添加几个行为（参见清单\
  \ 3-6）。\n\n**清单 3-6. 带有行为的结构体类型**\n\n```\ntype Person struct {\n    FirstName, LastName\
  \ string\n    Dob                 time.Time\n    Email, Location     string\n}\n\
  \n//一个人物方法\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName,\
  \ p.LastName)\n}\n\n//一个人物方法\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"\
  [Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n\
  }\n```\n\n已经为 `Person` 类型添加了两个方法：`PrintName` 和 `PrintDetails`。`Go` 中的方法是一个带有接收器的函数。尽管方法看起来像普通函数，但它有一个接收器。您可以在\
  \ `func` 关键字和函数名之间指定方法接收器。在清单 3-6 中，`Person` 结构体作为接收器被添加到了函数 `PrintName` 和 `PrintDetails`\
  \ 中。完成此操作后，函数就附加到了 `Person` 类型上，可以作为方法来调用。这使得您可以从结构体类型实例中使用点（`.`）运算符来调用这些函数，就像在传统面向对象语言中调用类的实例方法一样。\n\
  \n这里声明了带有 `Person` 接收器类型的方法：\n\n```\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\
  \\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//一个人物方法\nfunc (p Person) PrintDetails()\
  \ {\n    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(),\
  \ p.Email, p.Location)\n}\n```\n\n\n\n#### 调用结构体方法\n\n让我们创建一个 `Person` 类型的实例，并调用该类型提供的方法（见代码清单\
  \ 3-7）。\n\n```\n代码清单 3-7.  调用结构体方法\n\np := Person{\n        \"Shiju\",\n       \
  \ \"Varghese\",\n        time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n\
  \        \"shiju@email.com\",\n        \"Kochi\",\n}\n\np.PrintName()\np.PrintDetails()\n\
  ```\n\n你将看到以下输出：\n\n```\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000\
  \ UTC, Email: shiju@email.com, Location: Kochi ]\n```\n\n#### 指针方法接收器\n\n在 Go 语言中，你可以使用指针和非指针方法接收器来定义方法。代码清单\
  \ 3-7 中的 `PrintName` 和 `PrintDetails` 方法使用了非指针接收器。如果你想在方法内部修改接收器的数据，那么接收器必须是指针类型，如代码清单\
  \ 3-8 所示。\n\n```\n代码清单 3-8.  使用指针的接收器方法\n\n//一个使用指针接收器的 person 方法\nfunc (p *Person)\
  \ ChangeLocation(newLocation string) {\n    p.Location = newLocation\n}\n```\n\n\
  `ChangeLocation` 函数绑定到了一个指针接收器上。这里直接修改了方法内的 Location 字段。假设你将这个新方法添加到代码清单 3-7 中定义的\
  \ `Person` 结构体中。让我们创建一个 `Person` 类型实例并调用其方法（见代码清单 3-9）。\n\n```\n代码清单 3-9.  调用指针接收器的方法\n\
  \np := &Person{\n                \"Shiju\",\n                \"Varghese\",\n   \
  \             time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n      \
  \          \"shiju@email.com\",\n                \"Kochi\",\n        }\n\n     \
  \   p.ChangeLocation(\"Santa Clara\")\n        p.PrintName()\n        p.PrintDetails()\n\
  ```\n\n你将看到以下输出：\n\n```\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000\
  \ UTC, Email: shiju@email.com, Location: Santa Clara ]\n```\n\n因为需要调用指针接收器方法，所以创建\
  \ `Person` 类型实例时使用了取地址符 (`&`)。调用 `ChangeLocation` 方法会修改 `Location` 字段的值，因此当调用 `PrintDetails`\
  \ 方法时，你将得到修改后的值。如果 `ChangeLocation` 方法是非指针方法，`Location` 字段的值就不会被改变。\n\n当你调用指针接收器方法时，传递的是引用，而非值传递（非指针接收器使用值传递）。当你想在方法内部修改接收器的状态（字段的值）时，这非常合理。如果结构体的某些方法使用了指针接收器，那么最好在其所有方法中都使用指针接收器，因为这能使结构体的行为具有更好的一致性和可预测性。\n\
  \n让我们修改程序，将 `Person` 结构体的所有方法都定义为使用指针接收器，以保持其所有方法的一致性（见代码清单 3-10）。\n\n```\n代码清单\
  \ 3-10.  使用指针接收器方法的 Person 结构体\n\npackage main\n\nimport (\n        \"fmt\"\n  \
  \      \"time\"\n)\n\nfunc main() {\n        p := &Person{\n                \"Shiju\"\
  ,\n                \"Varghese\",\n                time.Date(1979, time.February,\
  \ 17, 0, 0, 0, 0, time.UTC),\n                \"shiju@email.com\",\n           \
  \     \"Kochi\",\n        }\n\n        p.ChangeLocation(\"Santa Clara\")\n     \
  \   p.PrintName()\n        p.PrintDetails()\n}\n\ntype Person struct {\n       \
  \ FirstName, LastName string\n        Dob                 time.Time\n        Email,\
  \ Location     string\n}\n\n//一个使用指针接收器的 person 方法\nfunc (p *Person) PrintName()\
  \ {\n        fmt.Printf(\"\\n%s %s\\n\", p.FirstName, p.LastName)\n}\n\n//一个使用指针接收器的\
  \ person 方法\nfunc (p *Person) PrintDetails() {\n        fmt.Printf(\"[Date of Birth:\
  \ %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n}\n\n\
  //一个使用指针接收器的 person 方法\nfunc (p *Person) ChangeLocation(newLocation string) {\n\
  \        p.Location = newLocation\n}\n```\n\n\n\n#### 类型组合\n\nGo 的设计理念是成为一门专注于实际应用的简单语言；为了保持其极简特性，它忽略了许多学术观点。你在前面的章节中已经看到了\
  \ Go 类型系统的简洁性。其类型系统的一个主要决策是，虽然它不支持继承，但通过类型嵌入（type embedding）支持组合。Go 鼓励你使用组合而非继承。\n\
  \n**注意**：组合是一种设计理念，即将较小的组件组合成较大的组件。\n\n前一节定义了 `Person` 类型。你可以通过嵌入 `Person` 类型来创建更大、更具体的类型。在代码清单\
  \ 3-11 中，通过嵌入 `Person` 类型创建了另外两种类型。\n\n**代码清单 3-11. 用于组合的类型嵌入**\n\n```\ntype Admin\
  \ struct {\n    Person //用于组合的类型嵌入\n    Roles  []string\n}\n\ntype Member struct\
  \ {\n    Person //用于组合的类型嵌入\n    Skills []string\n}\n```\n\n`Person` 类型被嵌入到 `Admin`\
  \ 和 `Member` 类型中，因此 `Person` 的所有字段和方法都将在这两种新类型中可用。\n\n让我们创建一个示例程序来理解类型嵌入的功能（参见代码清单\
  \ 3-12）。\n\n**代码清单 3-12. 类型组合的示例程序**\n\n```\npackage main\n\nimport (\n    \"fmt\"\
  \n    \"time\"\n)\n\ntype Person struct {\n    FirstName, LastName string\n    Dob\
  \                 time.Time\n    Email, Location     string\n}\n\n//Person 的一个方法\n\
  func (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName, p.LastName)\n\
  }\n\n//Person 的一个方法\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"[Date of\
  \ Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n\
  }\n\ntype Admin struct {\n    Person //用于组合的类型嵌入\n    Roles  []string\n}\n\ntype\
  \ Member struct {\n    Person //用于组合的类型嵌入\n    Skills []string\n}\n\nfunc main()\
  \ {\n    alex := Admin{\n        Person{\n            \"Alex\",\n            \"\
  John\",\n            time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n\
  \            \"alex@email.com\",\n            \"New York\"},\n        []string{\"\
  Manage Team\", \"Manage Tasks\"},\n    }\n\n    shiju := Member{\n        Person{\n\
  \            \"Shiju\",\n            \"Varghese\",\n            time.Date(1979,\
  \ time.February, 17, 0, 0, 0, 0, time.UTC),\n            \"shiju@email.com\",\n\
  \            \"Kochi\"},\n        []string{\"Go\", \"Docker\", \"Kubernetes\"},\n\
  \    }\n\n    //为 alex 调用方法\n    alex.PrintName()\n    alex.PrintDetails()\n\n \
  \   //为 shiju 调用方法\n    shiju.PrintName()\n    shiju.PrintDetails()\n}\n```\n\n\
  创建了一个带有几个字段和两个方法的 `Person` 类型。然后通过嵌入 `Person` 类型创建了另外两种类型：`Admin` 和 `Member`。这些新类型拥有\
  \ `Person` 类型提供的所有属性和方法。可以像这样通过简单地嵌入 `Person` 类型来创建 `Admin` 和 `Member` 类型的实例：\n\n\
  ```\nalex := Admin{\n    Person{\n        \"Alex\",\n        \"John\",\n       \
  \ time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\"\
  ,\n        \"New York\"},\n    []string{\"Manage Team\", \"Manage Tasks\"},\n}\n\
  \nshiju := Member{\n    Person{\n        \"Shiju\",\n        \"Varghese\",\n   \
  \     time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n        \"shiju@email.com\"\
  ,\n        \"Kochi\"},\n    []string{\"Go\", \"Docker\", \"Kubernetes\"},\n}\n```\n\
  \n因为 `Person` 类型的所有方法对 `Admin` 和 `Member` 类型都是可用的，你可以像如下代码所示调用这些方法：\n\n```\n//为\
  \ alex 调用方法\nalex.PrintName()\nalex.PrintDetails()\n\n//为 shiju 调用方法\nshiju.PrintName()\n\
  shiju.PrintDetails()\n```\n\n你应该会看到以下输出：\n\n```\nAlex John\n[Date of Birth: 1970-01-10\
  \ 00:00:00 +0000 UTC, Email: alex@email.com, Location: New York ]\nShiju Varghese\n\
  [Date of Birth: 1979-02-17 00:00:00 +0000 UTC, Email: shiju@email.com, Location:\
  \ Kochi ]\n```\n\n通过类型嵌入实现的类型组合既提供了使用继承的实际好处，又具有更好的可维护性。\n\n### 覆盖嵌入类型的方法\n\n在代码清单\
  \ 3-11 中，`Person` 类型被嵌入到 `Admin` 和 `Member` 类型中，并调用了 `Person` 类型提供的方法。假设你想在 `Admin`\
  \ 和 `Member` 中覆盖 `PrintDetails` 方法，因为这些类型有额外的字段：`Roles` 和 `Skills`。嵌入类型的方法可以被覆盖，如代码清单\
  \ 3-13 所示。\n\n**代码清单 3-13. 覆盖嵌入类型的方法**\n\n```\ntype Admin struct {\n    Person //用于组合的类型嵌入\n\
  \    Roles  []string\n}\n\n//覆盖 PrintDetails\nfunc (a Admin) PrintDetails() {\n\
  \    //调用 Person 的 PrintDetails\n    a.Person.PrintDetails()\n    fmt.Println(\"\
  Admin Roles:\")\n    for _, v := range a.Roles {\n        fmt.Println(v)\n    }\n\
  }\n\ntype Member struct {\n    Person //用于组合的类型嵌入\n    Skills []string\n}\n\n//覆盖\
  \ PrintDetails\nfunc (m Member) PrintDetails() {\n    //调用 Person 的 PrintDetails\n\
  \    m.Person.PrintDetails()\n    fmt.Println(\"Skills:\")\n    for _, v := range\
  \ m.Skills {\n        fmt.Println(v)\n    }\n}\n```\n\n`PrintDetails` 方法被覆盖以包含每个类型持有的额外信息。当此方法被覆盖时，你可以调用嵌入类型的\
  \ `PrintDetails` 方法来获取嵌入类型提供的基本信息，然后提供这些类型持有的额外信息：\n\n```\nfunc (m Member) PrintDetails()\
  \ {\n    //调用 Person 的 PrintDetails\n    m.Person.PrintDetails()\n    fmt.Println(\"\
  Skills:\")\n    for _, v := range m.Skills {\n        fmt.Println(v)\n    }\n}\n\
  ```\n\n语句 `m.Person.PrintDetails()` 调用了 `Person` 类型的 `PrintDetails` 方法。\n\n让我们运行这个修改后的程序，其代码如代码清单\
  \ 3-14 所示。\n\n**代码清单 3-14. 运行包含方法覆盖的程序**\n\n```\nalex := Admin{\n    Person{\n \
  \       \"Alex\",\n        \"John\",\n        time.Date(1970, time.January, 10,\
  \ 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\",\n        \"New York\"},\n\
  \    []string{\"Manage Team\", \"Manage Tasks\"},\n}\n\nshiju := Member{\n    Person{\n\
  \        \"Shiju\",\n        \"Varghese\",\n        time.Date(1979, time.February,\
  \ 17, 0, 0, 0, 0, time.UTC),\n        \"shiju@email.com\",\n        \"Kochi\"},\n\
  \    []string{\"Go\", \"Docker\", \"Kubernetes\"},\n}\n\n//为 alex 调用方法\nalex.PrintName()\n\
  alex.PrintDetails()\n\n//为 shiju 调用方法\nshiju.PrintName()\nshiju.PrintDetails()\n\
  ```\n\n你应该会看到以下输出：\n\n```\nAlex John\n[Date of Birth: 1970-01-10 00:00:00 +0000\
  \ UTC, Email: alex@email.com, Location: New York ]\nAdmin Roles:\nManage Team\n\
  Manage Tasks\nShiju Varghese\n[Date of Birth: 1979-02-17 00:00:00 +0000 UTC, Email:\
  \ shiju@email.com, Location: Kochi ]\nSkills:\nGo\nDocker\nKubernetes\n```\n\n\n\
  \n### 使用接口\n\n在 Go 语言的类型系统中，你可以创建具体类型和接口类型。（具体类型已在本章前几节讨论过。）接口是 Go 语言最强大的特性之一，因为它为用户自定义的具体类型提供了契约，从而允许你为对象定义行为。接下来，让我们创建一个接口类型来为\
  \ `Person` 对象指定行为（参见清单 3-15）。\n\n**清单 3-15.** 定义接口类型\n\n```go\ntype User interface\
  \ {\n    PrintName()\n    PrintDetails()\n}\n```\n\n上述代码定义了一个名为 `User` 的接口类型，包含两个行为：`PrintName`\
  \ 和 `PrintDetails`。现在来看看 `Person` 类型：\n\n```go\ntype Person struct {\n    FirstName,\
  \ LastName string\n    Dob                 time.Time\n    Email, Location     string\n\
  }\n\n// Person 的方法\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\"\
  , p.FirstName, p.LastName)\n}\n\n// Person 的方法\nfunc (p Person) PrintDetails() {\n\
  \    fmt.Printf(\"[Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(),\
  \ p.Email, p.Location)\n}\n```\n\n关于接口最令人惊讶的一点是：你无需在具体类型中显式实现接口，只需根据接口类型的规范在具体类型中定义方法即可。`Person`\
  \ 类型已经实现了 `User` 接口。它实现了在 `User` 接口类型中定义的 `PrintName` 和 `PrintDetails` 方法。在 C# 和\
  \ Java 等编程语言中，你必须显式地将接口类型实现到具体类型中。Go 语言在保持自身为静态类型语言的同时，提供了很高的开发效率。\n\n**清单 3-16**\
  \ 展示了一个示例程序，描述了接口及其具体类型：\n\n**清单 3-16.** 包含接口的示例程序\n\n```go\npackage main\n\nimport\
  \ (\n    \"fmt\"\n    \"time\"\n)\n\ntype User interface {\n    PrintName()\n  \
  \  PrintDetails()\n}\n\ntype Person struct {\n    FirstName, LastName string\n \
  \   Dob                 time.Time\n    Email, Location     string\n}\n\n// Person\
  \ 的方法\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\", p.FirstName,\
  \ p.LastName)\n}\n\n// Person 的方法\nfunc (p Person) PrintDetails() {\n    fmt.Printf(\"\
  [Date of Birth: %s, Email: %s, Location: %s ]\\n\", p.Dob.String(), p.Email, p.Location)\n\
  }\n\nfunc main() {\n    alex := Person{\n        \"Alex\",\n        \"John\",\n\
  \        time.Date(1970, time.January, 10, 0, 0, 0, 0, time.UTC),\n        \"alex@email.com\"\
  ,\n        \"New York\",\n    }\n\n    shiju := Person{\n        \"Shiju\",\n  \
  \      \"Varghese\",\n        time.Date(1979, time.February, 17, 0, 0, 0, 0, time.UTC),\n\
  \        \"shiju@email.com\",\n        \"Kochi\",\n    }\n\n    users := []User{alex,\
  \ shiju}\n\n    for _, v := range users {\n        v.printName()\n        v.PrintDetails()\n\
  \    }\n}\n```\n\n基于接口类型定义的行为，创建了一个接口类型和一个具体类型。在 `main` 函数中，创建了两个 `Person` 对象，然后创建了一个包含这两个\
  \ `Person` 对象的用户接口类型切片。最后，遍历该集合并调用了接口类型中定义的方法：`PrintName` 和 `PrintDetails`。\n\n\
  你应该会看到以下输出：\n\n```\nAlex John\n[Date of Birth: 1970-01-10 00:00:00 +0000 UTC, Email:\
  \ alex@email.com, Location: New York ]\nShiju Varghese\n[Date of Birth: 1979-02-17\
  \ 00:00:00 +0000 UTC, Email: shiju@email.com, Location: Kochi ]\n```\n\n接下来，通过编写\
  \ **清单 3-17** 中的示例程序，我们将本章讨论的用户自定义类型的不同特性结合起来。\n\n**清单 3-17.** 包含接口、组合和方法重写的示例程序\n\
  \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"time\"\n)\n\ntype User interface\
  \ {\n    PrintName()\n    PrintDetails()\n}\n\ntype Person struct {\n    FirstName,\
  \ LastName string\n    Dob                 time.Time\n    Email, Location     string\n\
  }\n\n// Person 的方法\nfunc (p Person) PrintName() {\n    fmt.Printf(\"\\n%s %s\\n\"\
  , p.FirstName, p.LastName)\n}\n\n// Person 的方法\nfunc (p Person) PrintDetails() {\n\
  ```\n\n\n```go\nfmt.Printf(\"[出生日期: %s, 邮箱: %s, 位置: %s ]\\n\", p.Dob.String(), p.Email,\
  \ p.Location)\n```\n\n```go\n}\n```\n\n```go\ntype Admin struct {\n    Person //通过类型嵌入实现组合\n\
