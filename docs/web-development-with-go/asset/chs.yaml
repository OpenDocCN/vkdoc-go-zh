  if j, err := json.Marshal(task); err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\
  \tw,\n\t\t\terr,\n\t\t\t\"发生了意外的错误\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t} else {\n\
