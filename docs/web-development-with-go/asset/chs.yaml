  \ {\n\t// 从传入的 url 中获取 id\n\tvars := mux.Vars(r)\n```\n\n\n\n`id := bson.ObjectIdHex(vars[\"\
  id\"])`\n\n`var dataResource TaskResource`\n\n`// 解码传入的 Task JSON`\n\n`err := json.NewDecoder(r.Body).Decode(&dataResource)`\n\
  \n`if err != nil {`\n\n`common.DisplayAppError(`\n\n`w,`\n\n`err,`\n\n`\"无效的任务数据\"\
  ,`\n\n`500,`\n\n`)`\n\n`return`\n\n`}`\n\n`task := &dataResource.Data`\n\n`task.Id\
  \ = id`\n\n`context := NewContext()`\n\n`defer context.Close()`\n\n`c := context.DbCollection(\"\
  tasks\")`\n\n`repo := &data.TaskRepository{c}`\n\n`// 更新一个现有的 Task 文档`\n\n`if err\
  \ := repo.Update(task); err != nil {`\n\n`common.DisplayAppError(`\n\n`w,`\n\n`err,`\n\
  \n`\"发生意外错误\",`\n\n`500,`\n\n`)`\n\n`return`\n\n`} else {`\n\n`w.WriteHeader(http.StatusNoContent)`\n\
  \n`}`\n\n`}`\n\n`// HTTP Delete 的处理函数 - \"/tasks/{id}\"`\n\n`// 删除一个现有的 Task 文档`\n\
  \n`func DeleteTask(w http.ResponseWriter, r *http.Request) {`\n\n`vars := mux.Vars(r)`\n\
  \n`id := vars[\"id\"]`\n\n`context := NewContext()`\n\n`defer context.Close()`\n\
  \n`c := context.DbCollection(\"tasks\")`\n\n`repo := &data.TaskRepository{c}`\n\n\
  `// 删除一个现有的 Task 文档`\n\n`err := repo.Delete(id)`\n\n`if err != nil {`\n\n`common.DisplayAppError(`\n\
  \n`w,`\n\n`err,`\n\n`\"发生意外错误\",`\n\n`500,`\n\n`)`\n\n`return`\n\n`}`\n\n`w.WriteHeader(http.StatusNoContent)`\n\
  \n`}`\n\n`taskController.go` 中的处理函数使用 `\"data\"` 包对数据模型 `Task` 执行 CRUD 操作，该操作在 `taskRepository`\
  \ 结构体中实现。\n\n清单 9-20 展示了 `taskRepository.go` 中编写的数据持久化逻辑。\n\n清单 9-20. `taskRepository.go`\
  \ 中 Task 实体的数据持久化逻辑\n\n```\npackage data\n\nimport (\n\t\"time\"\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\
  \n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n)\n\ntype TaskRepository struct\
  \ {\n\tC *mgo.Collection\n}\n\nfunc (r *TaskRepository) Create(task *models.Task)\
  \ error {\n\tobj_id := bson.NewObjectId()\n\ttask.Id = obj_id\n\ttask.CreatedOn\
  \ = time.Now()\n\ttask.Status = \"Created\"\n\terr := r.C.Insert(&task)\n\treturn\
  \ err\n}\n\nfunc (r *TaskRepository) Update(task *models.Task) error {\n\t// 对 MogoDB\
  \ 进行部分更新\n\terr := r.C.Update(bson.M{\"_id\": task.Id},\n\t\tbson.M{\"$set\": bson.M{\n\
  \t\t\t\"name\":        task.Name,\n\t\t\t\"description\": task.Description,\n\t\t\
  \t\"due\":         task.Due,\n\t\t\t\"status\":      task.Status,\n\t\t\t\"tags\"\
  :        task.Tags,\n\t\t}})\n\treturn err\n}\n\nfunc (r *TaskRepository) Delete(id\
  \ string) error {\n\terr := r.C.Remove(bson.M{\"_id\": bson.ObjectIdHex(id)})\n\t\
  return err\n}\n\nfunc (r *TaskRepository) GetAll() []models.Task {\n\tvar tasks\
  \ []models.Task\n\titer := r.C.Find(nil).Iter()\n\tresult := models.Task{}\n\tfor\
  \ iter.Next(&result) {\n\t\ttasks = append(tasks, result)\n\t}\n\treturn tasks\n\
  }\n\nfunc (r *TaskRepository) GetById(id string) (task models.Task, err error) {\n\
  \terr = r.C.FindId(bson.ObjectIdHex(id)).One(&task)\n\treturn\n}\n\nfunc (r *TaskRepository)\
  \ GetByUser(user string) []models.Task {\n\tvar tasks []models.Task\n\titer := r.C.Find(bson.M{\"\
  createdby\": user}).Iter()\n\tresult := models.Task{}\n\tfor iter.Next(&result)\
  \ {\n\t\ttasks = append(tasks, result)\n\t}\n\treturn tasks\n}\n```\n\n##### 测试\
