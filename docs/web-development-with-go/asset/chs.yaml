  `，用于检查返回的 HTTP 响应状态码是否为 `200`。通过创建 `FakeUserRepository` 实例定义了三个用户（`Users`）的模拟数据，以便返回的\
  \ HTTP 响应显示包含三个用户。\n- 对于 `\"新增用户\"` 行为，定义了两种场景：`\"提供有效的用户数据\"` 和 `\"提供包含重复电子邮箱的用户数据\"\
  `。这映射了在 `\"/users\"` 端点上执行 HTTP `POST` 操作的功能。如果提供有效的用户数据，应能创建新用户。如果提供了包含重复电子邮箱的用户数据，则会引发错误。这些规格说明在\
  \ `It` 块中有详细描述。\n- `FakeUserRepository` 实例是 `UserRepository` 接口的一个实现，它作为参数值传递给 HTTP\
  \ 处理函数。\n- 使用 `Ginkgo` 首选的匹配器库 `Gomega` 进行断言。`Gomega` 提供了多种用于编写断言语句的函数。`Expect`\
  \ 函数也用于断言。\n\n###### 运行规格说明\n\n你可以使用 `go test` 或 `ginkgo` 命令来运行测试套件。\n\n让我们使用 `go\
  \ test` 命令运行套件：\n\n`go test -v`\n\n`go test` 命令生成的输出如图 10-5 所示。\n\n![A978-1-4842-1052-9_10_Fig5_HTML.jpg](img/A978-1-4842-1052-9_10_Fig5_HTML.jpg)\n\
  \n**图 10-5.** 使用 `go test` 命令运行规格说明的输出\n\n让我们使用 `ginkgo` 命令运行套件：\n\n`ginkgo -v`\n\
  \n`ginkgo` 命令生成的输出如图 10-6 所示。\n\n![A978-1-4842-1052-9_10_Fig6_HTML.jpg](img/A978-1-4842-1052-9_10_Fig6_HTML.jpg)\n\
  \n**图 10-6.** 使用 `ginkgo` 命令运行规格说明的输出\n\n### 总结\n\n自动化测试是软件工程中确保应用程序质量的一项重要实践。单元测试是一种自动化测试过程，其中应用程序中最小可测试的软件单元（称为单元）会被单独且独立地进行测试，以确定它们的行为是否完全符合设计预期。\n\
  \n测试驱动开发（TDD）是一种遵循测试优先开发方法的软件开发过程，即在编写生产代码之前先编写单元测试。TDD 是一种设计方法，它鼓励开发人员在编写代码之前先思考其实现方案。\n\
  \nGo 通过其 `testing` 标准库包提供了编写自动化单元测试的核心功能。`testing` 包提供了编写自动化测试所需的所有基本功能，并附带工具支持。它旨在与\
  \ `go test` 命令一起使用。除了 `testing` 包，Go 标准库还提供了另外两个包：`httptest` 提供了用于 HTTP 测试的实用程序，`quick`\
  \ 提供了有助于进行黑盒测试的实用函数。\n\n编写测试套件时使用以下命名约定和模式：\n- 创建一个名称以 `_test.go` 结尾的源文件。\n- 在测试套件（源文件以\
  \ `_test.go` 结尾）中，编写签名为 `func TestXxx(*testing.T)` 的函数。\n\n当使用 `go test` 命令运行测试时，测试函数会顺序执行。除了支持代码测试行为外，`testing`\
  \ 包还可用于基准测试和测试示例代码。\n\n你可以使用 `httptest` 包测试 HTTP 应用程序。在测试 HTTP 应用程序时，可以使用 `httptest`\
  \ 包提供的 `ResponseRecorder` 和 `Server` 结构体类型。`ResponseRecorder` 记录返回的 HTTP 响应，以便进行检查。`Server`\
  \ 是一个用于测试的 HTTP 服务器，可以执行端到端的 HTTP 测试。\n\n本章向你展示了用于测试的第三方包 `Ginkgo` 和 `Gomega`。`Ginkgo`\
  \ 是一个行为驱动开发（BDD）风格的测试框架，它允许你在 Go 中编写富有表现力的测试来指定应用程序的行为。BDD 是 TDD 的扩展，它强调行为而非测试本身。在\
  \ BDD 中，你在自动化测试中以富有表现力的方式指定行为，然后根据这些行为编写代码。\n\n# 11. 在谷歌云上构建 Go Web 应用程序\n\n云计算正在改变可扩展应用程序的开发和运行方式。云计算允许你完全专注于应用程序工程，而无需管理\
  \ IT 基础设施。在云基础设施上开发 Go 应用程序是一个绝佳的选择，因为 Go 是为在现代计算机硬件和下一代 IT 基础设施平台上运行而设计的语言。Go 旨在解决大规模计算问题，并且正成为构建云基础设施技术（如\
  \ Docker 和 Kubernetes）的首选语言。本章将向你展示如何通过利用谷歌云平台，使用 Go 构建云原生应用程序。\n\n### 云计算简介\n\n\
  云计算正逐渐成为部署应用程序的主要选择。云计算允许你将 IT 基础设施和应用程序迁移到基于订阅的计算模式，在该模式中，软件通过互联网访问，而无需管理和维护本地计算资源。这使得你可以专注于应用程序工程，而不是管理\
  \ IT 基础设施，因此开发人员可以构建具有更高敏捷性的高度可扩展应用程序。\n\n\n\n云计算是一种“按需付费”的计算模型，其中 IT 基础设施和软件开发平台以基于服务的使用模式提供。云计算最大的优势在于开发应用程序时获得的操作敏捷性。云模型支持按需扩展，这意味着您可以在需要时增加计算资源，并根据需要使用任意时长，然后在不再需要时缩减计算资源。大多数云计算平台都为其云平台提供自动扩展功能，允许您根据配置自动扩展和缩减计算资源的数量。\n\
  \n在云计算中，有多种选项可用于托管和运行应用程序。这些选项提供了不同的灵活性模型来托管、运行和扩展您的应用程序，可用于适当的计算场景。\n\n以下是云计算平台中可用于托管和运行应用程序的不同选项：\n\
  \n*   基础设施即服务（`IaaS`）\n*   平台即服务（`PaaS`）\n*   容器即服务（`CaaS`）\n\n### 基础设施即服务（`IaaS`）\n\
  \n基础设施即服务（`IaaS`）模型通过互联网以服务形式提供虚拟化的计算资源。您可以从云平台获取虚拟机（`VM`）以实现按需扩展。在此模型中，您必须在自己的环境中设置好一切来托管和运行应用程序。例如，如果要在\
  \ Go 中运行一个 `HTTP` 服务器，您必须手动设置 Go 运行时环境，并打开 `HTTP` 端口以接收传入的网络请求。关于 `IaaS` 模型最重要的是，您可以完全控制在云上获取的虚拟机。\n\
  \n### 平台即服务（`PaaS`）\n\n平台即服务（`PaaS`）模型提供一个由云平台供应商管理的平台，用于部署和运行应用程序。此模型提供了专门的语言环境、工具和软件开发工具包（`SDK`），以便在云上开发和运行应用程序。`PaaS`\
  \ 模型比 `IaaS` 模型提供了更高的操作敏捷性，因为它是一种由云平台提供的托管服务，您可以使用平台提供的 `SDK` 和工具来开发、测试、部署和运行应用程序。\n\
  \n例如，如果您想利用 Google Cloud 提供的 `PaaS` 平台来开发 Go 应用程序，可以下载用于 Go 的 Google Cloud `PaaS`\
  \ 平台 `SDK`，它允许您在 Google Cloud 上快速构建、测试和运行 Go 应用程序。使用此云计算模型，无需手动干预即可轻松实现自动扩展。您可能只需要配置关键绩效指标（`KPI`）的参数即可执行自动扩展。在此模型中，您无需像\
  \ `IaaS` 模型那样管理和维护虚拟机。此模型在开发过程中实现了卓越的操作敏捷性，因为开发者从许多 IT 基础设施管理操作中解放出来。\n\n### 容器即服务（`CaaS`）\n\
  \n容器即服务（`CaaS`）是一种从 `IaaS` 和 `PaaS` 演变而来的计算模型。这是一个相对较新的模型，为您带来了 `IaaS` 和 `PaaS`\
  \ 的最佳特性。此模型允许您通过使用诸如 `Docker` 和 `Kubernetes` 等流行的容器技术，在云平台上运行软件容器。由于其诸多优势，应用容器正逐渐成为部署和运行应用程序的标准。当您在云平台上运行应用容器时，此模型提供了许多能力。Google\
  \ Container Engine 是 Google Cloud 提供的一个 `CaaS` 平台。\n\n### Google Cloud 简介\n\nGoogle\
  \ Cloud 是 Google 提供的一个公有云平台，使开发者能够在 Google 高度可扩展且可靠的基础设施上构建、测试、部署和运行应用程序。Google\
  \ Cloud 平台提供了一套模块化的基于云的服务，允许您构建从 Web 应用程序到大型大数据解决方案的各种应用程序，具有按需扩展能力和更高水平的操作敏捷性。\n\
  \nGoogle Cloud 提供了三种类型的计算服务：\n\n*   Google App Engine（`GAE`）是一项 `PaaS` 服务。\n*  \
  \ Google Compute Engine（`GCE`）是一项 `IaaS` 服务。\n*   Google Container Engine（`GKE`）是一项\
  \ `CaaS` 服务。\n\n图 11-1 展示了 Google Cloud 平台提供的各种服务的信息图。\n\n![A978-1-4842-1052-9_11_Fig1_HTML.jpg](img/A978-1-4842-1052-9_11_Fig1_HTML.jpg)\n\
  \n图 11-1. Google Cloud 平台服务信息图\n\n本章主要关注 Google Cloud 平台中作为 `PaaS` 的 Google App\
  \ Engine。\n\n## Google App Engine（`GAE`）\n\nGoogle App Engine 是 Google Cloud 平台提供的\
  \ `PaaS` 产品，允许您构建高度可扩展的 Web 应用程序和后端 `API`。App Engine 应用程序支持自动扩展，可以在流量激增时自动增加计算实例，并在不再需要时自动缩减计算实例。与\
  \ `IaaS` 不同，您无需通过运维（`Ops`）团队来配置和维护虚拟机。使用 App Engine，您只需使用 App Engine 提供的工具上传源代码，然后在云上运行应用程序，即可获得负载均衡和自动扩展能力。与\
  \ `IaaS` 模型相比，App Engine 为开发和管理应用程序提供了极大的操作敏捷性，因为您无需花费时间管理用于运行应用程序的虚拟机。\n\nApp Engine\
  \ 支持以下语言环境：\n\n*   `Python`\n*   `Java`\n*   `PHP`\n*   `Go`\n\n#### App Engine\
  \ 的云服务\n\n当您在 App Engine 上开发 Go 应用程序时，可以利用 Google Cloud 平台提供的各种云服务。Google Cloud\
  \ 提供了用于从 App Engine 应用程序访问这些服务的 `API`。请记住，这些服务不仅限于 App Engine；您也可以将它们与 Google Compute\
  \ Engine 和 Google Container Engine 一起使用。\n\n以下部分描述了一些可用于 App Engine 应用程序的云服务。\n\n\
  ##### 用户身份验证\n\n您可以使用用户身份验证服务，让用户通过 Google 帐户或 `OpenID` 登录。\n\n##### Cloud Datastore\n\
  \n`Cloud Datastore` 是一个无模式的 `NoSQL` 数据库，可用于持久化 App Engine 应用程序的数据。\n\n##### Cloud\
  \ Bigtable\n\n`Cloud Bigtable` 是一个快速、完全托管、大规模可扩展的 `NoSQL` 数据库，非常适合用于处理大量数据的大规模 Web、移动、大数据和物联网应用程序的数据存储。如果\
  \ App Engine 应用程序需要一个高性能的大规模可扩展数据存储，`Cloud Bigtable` 比 `Cloud Datastore` 是更好的选择。\n\
  \n#### Google Cloud SQL\n\n`Google Cloud SQL` 是 Google Cloud 平台中一个兼容 `MySQL` 的关系型数据库，作为托管服务提供。如果\
  \ App Engine 应用程序需要关系模型来进行数据持久化，您可以使用 `Google Cloud SQL`。\n\n##### Memcache\n\n\
  在开发高性能应用程序时，缓存应用程序数据是提高应用程序性能的重要策略。`Memcache` 是一个分布式的内存数据缓存，可用于缓存应用程序数据，以提高 App\
  \ Engine 应用程序的性能。\n\n##### 搜索\n\n搜索服务允许您对结构化数据（例如纯文本、`HTML`、`Atom` 摘要、数字、日期和地理位置）执行类似\
  \ Google 的搜索。\n\n##### 流量分配\n\n流量分配服务允许您将传入请求路由到不同的应用程序版本，运行 `A/B` 测试，并进行增量特性发布。\n\
  \n\n\n#### 日志记录\n\n日志记录服务允许 App Engine 应用程序收集和存储日志。\n\n#### 任务队列\n\n任务队列服务通过使用稍后执行的小型离散任务，使\
  \ App Engine 应用程序能够在用户请求之外执行工作。\n\n#### 安全扫描\n\n安全扫描服务用于扫描应用程序的安全漏洞，例如 XSS 攻击。\n\
  \n### 适用于 Go 语言的 Google App Engine\n\nApp Engine 提供了一个 Go 运行时环境，用于在云端运行原生编译的 Go\
  \ 代码，使您能够在 Google Cloud 基础设施上构建高度可扩展的 Web 应用程序。使用 App Engine，Go 应用程序运行在一个受保护的“沙盒”环境中，该环境允许\
  \ App Engine 环境将 Web 请求分发到多个服务器，并根据需求扩展服务器以实现按需伸缩。当您在 App Engine 的沙盒环境中开发应用程序时，无需配置服务器或花时间管理基础设施。App\
  \ Engine 提供了一个部署工具，允许您将 Go 应用程序上传到云端。\n\n### Go 开发环境\n\n您可以使用适用于 Go 的 App Engine\
  \ SDK 在 App Engine 上开发、测试和部署 Go 应用程序，该 SDK 提供了在 Google Cloud 上开发、测试和运行应用程序所需的工具和\
  \ API。App Engine Go SDK 包含一个开发 Web 服务器，允许您在本地计算机上运行 App Engine 应用程序，以便在上传到云端之前测试\
  \ Go 应用程序。\n\n该开发 Web 服务器在开发环境中模拟了许多云服务，以便您可以在本地计算机上测试 App Engine 应用程序。这非常有用，因为在开发周期中，您无需在每次想要测试\
  \ App Engine 应用程序时都将其部署到云端。您可以在本地测试 App Engine 应用程序，而当您想要将应用程序部署到云平台的生产环境时，可以使用\
  \ App Engine 提供的工具来完成。此开发服务器应用程序模拟 App Engine 环境，包括 Google 账户数据存储的本地版本，并允许使用 App\
  \ Engine API 直接从本地计算机获取 URL 和发送电子邮件。\n\nGo SDK 使用了 Python SDK 开发工具的修改版本，并可在安装了 Python\
  \ 2.7 的 Mac OS X、Linux 和 Windows 计算机上运行。因此，您可以从 Python 网站下载并安装适用于您平台的 Python 2.7。大多数\
  \ Mac OS X 用户已经安装了 Python 2.7。要在 App Engine 上开发 Go 应用程序，请下载并安装适用于您操作系统的 App Engine\
  \ Go SDK。\n\n`App Engine SDK for Go` 提供了一个名为 `goapp` 的命令行工具，该工具提供以下命令：\n\n- `goapp\
  \ serve`：`goapp serve` 命令在本地开发服务器上运行 Go 应用程序。\n- `goapp deploy`：`goapp deploy` 命令用于将\
  \ Go 应用程序上传到 App Engine 生产环境。\n\n您可以在 `App Engine SDK for Go` 的 zip 压缩包中的 `go_appengine`\
  \ 目录下找到 `goapp` 工具。要从命令行调用 `goapp` 工具，请将 `go_appengine` 目录添加到 `PATH` 环境变量中。以下命令将\
  \ `go_appengine` 目录添加到 `PATH` 环境变量中：\n\n```\nexport PATH=$HOME/go_appengine:$PATH\n\
  ```\n\n### 构建 App Engine 应用程序\n\n一旦设置好 `App Engine SDK for Go`，您就可以开始在 App Engine\
  \ 平台上开发 Web 应用程序了。尽管 App Engine 应用程序与独立的 Go Web 应用程序非常相似，但它们之间存在一些根本性的差异。主要区别在于\
  \ Go App Engine 运行时提供了一个特殊的 `main` 包，因此您不应将 `main` 包用于您的 App Engine 应用程序。相反，您可以将\
  \ HTTP 处理程序代码放在您选择的包中。Go 的 `http` 标准库包已针对 App Engine 运行时环境进行了轻微修改，以便在 `sandbox`\
  \ 环境中运行 App Engine 应用程序。\n\n\n\n#### 编写 HTTP 服务器\n\n让我们编写一个示例 Web 应用服务器，以探索 Go 语言的\
  \ App Engine 平台。\n\n清单 11-1 提供了在 App Engine 平台上的 HTTP 服务器。\n\n**清单 11-1.** App Engine\
  \ 的 Web 应用服务器\n\n```go\npackage task\n\nimport (\n    \"fmt\"\n    \"html/template\"\
  \n    \"net/http\"\n)\n\ntype Task struct {\n    Name        string\n    Description\
  \ string\n}\n\nconst taskForm = `\n<html>\n<body>\n<form action=\"/task\" method=\"\
  post\">\n<p>Task Name: <input type=\"text\" name=\"taskname\" ></p>\n<p> Description:\
  \ <input type=\"text\" name=\"description\" ></p>\n<p><input type=\"submit\" value=\"\
  Submit\"></p>\n</form>\n</body>\n</html>\n`\n\nconst taskTemplateHTML = `\n<html>\n\
  <body>\n<p>New Task has been created:</p>\n<div>Task: {{.Name}}</div>\n<div>Description:\
  \ {{.Description}}</div>\n</body>\n</html>\n`\n\nvar taskTemplate = template.Must(template.New(\"\
  task\").Parse(taskTemplateHTML))\n\nfunc init() {\n    http.HandleFunc(\"/\", index)\n\
  \    http.HandleFunc(\"/task\", task)\n}\n\nfunc index(w http.ResponseWriter, r\
  \ *http.Request) {\n    fmt.Fprint(w, taskForm)\n}\n\nfunc task(w http.ResponseWriter,\
  \ r *http.Request) {\n    task := Task{\n        Name:        r.FormValue(\"taskname\"\
  ),\n        Description: r.FormValue(\"description\"),\n    }\n    err := taskTemplate.Execute(w,\
  \ task)\n    if err != nil {\n        http.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \    }\n}\n```\n\n一个示例 Web 应用由多个 HTML 页面编写而成。HTTP 处理程序代码写在 `task` 包的 `init` 函数中，因为\
  \ App Engine 运行时提供了一个特殊的 `main` 包，你无法在应用代码中使用它。\n\n#### 创建配置文件\n\n要运行 App Engine\
  \ 应用，你必须编写一个名为 `app.yaml` 的配置文件，该文件指定了运行应用所需的各种信息，包括应用标识符、运行时，以及应由 Go Web 应用处理的\
  \ URL。\n\n让我们为 App Engine 应用编写一个配置文件（参见清单 11-2）。\n\n**清单 11-2.** `app.yaml` 中的 App\
  \ Engine 配置文件\n\n```yaml\napplication: gae-demo\nversion: 1\nruntime: go\napi_version:\
  \ go1\nhandlers:\n- url: /.*\n  script: _go_app\n```\n\n`app.yaml` 配置文件说明了关于 App\
  \ Engine 应用的以下信息：\n\n- 应用标识符是 `gae-demo`。当将应用部署到 App Engine 时，你必须指定一个唯一的标识符作为应用标识符。在开发服务器上运行应用时，你可以设置任意值作为应用标识符。这里，在开发服务器上运行期间，它被设置为\
  \ `gae-demo`。\n- 应用代码的 `版本号` 是 1。如果在向 App Engine 上传新版本应用之前正确更新了版本，你可以使用管理控制台回滚到之前的版本。\n\
  - 此 Go 程序在 API 版本为 `go1` 的 Go `运行时` 环境中运行。\n- 对路径匹配正则表达式 `/.*`（所有 URL）的 URL 的每个请求都应由\
  \ Go 程序处理。`_go_app` 值由开发 Web 服务器识别，并被生产环境 App Engine 服务器忽略。\n\n#### 在开发服务器中测试应用\n\
  \n在前面的步骤中，已经创建了一个 App Engine 应用和一个配置文件。现在该应用已准备好，可以在 App Engine SDK 提供的开发 Web 服务器上运行。开发\
  \ Web 服务器允许你在开发环境中测试 App Engine 应用。\n\n图 11-2 展示了 App Engine 应用的目录结构。\n\n![A978-1-4842-1052-9_11_Fig2_HTML.jpg](img/A978-1-4842-1052-9_11_Fig2_HTML.jpg)\n\
  \n**图 11-2.** 应用目录结构\n\n让我们通过运行 `goapp` 工具，在开发 Web 服务器上运行示例 Web 应用：\n\n```shell\n\
  goapp serve gae-server/\n```\n\n通过提供 `gae-server` 目录的路径来运行开发 Web 服务器。如果你从应用目录运行\
  \ `goapp` 工具，则可以省略应用路径：\n\n```shell\ngoapp serve\n```\n\n图 11-3 显示 Web 开发服务器已启动，正在监听端口\
  \ 8080 上的请求，并为管理服务器监听端口 8000 上的请求。\n\n![A978-1-4842-1052-9_11_Fig3_HTML.jpg](img/A978-1-4842-1052-9_11_Fig3_HTML.jpg)\n\
  \n**图 11-3.** 运行开发 Web 服务器\n\n通过在 Web 浏览器中访问以下 URL 来运行和测试 App Engine 应用：`http://localhost:8080/`。\n\
  \n图 11-4 显示该应用正在开发服务器上的 `http://localhost:8080/` 运行。\n\n![A978-1-4842-1052-9_11_Fig4_HTML.jpg](img/A978-1-4842-1052-9_11_Fig4_HTML.jpg)\n\
  \n**图 11-4.** 开发 Web 服务器监听端口 8080\n\n> **注意：** 你可以在此处获取有关管理 Web 服务器上 App Engine\
  \ 实例的信息：`http://localhost:8000/`。\n\n图 11-5 显示管理 Web 服务器正在提供有关在开发 Web 服务器中运行的 App\
  \ Engine 实例的信息。\n\n![A978-1-4842-1052-9_11_Fig5_HTML.jpg](img/A978-1-4842-1052-9_11_Fig5_HTML.jpg)\n\
  \n**图 11-5.** 管理服务器监听端口 8000\n\n#### 将 App Engine 应用部署到云端\n\n要将 App Engine 应用部署到云端，你必须在\
  \ Google Cloud 平台上为 App Engine 实例创建一个项目。你还必须提供一个唯一的项目 ID，该 ID 将用于将应用部署到云端。在 `app.yaml`\
  \ 文件中将应用指定为 `项目 ID`。\n\n你通过使用 Google Developers 控制台（参见 [`https://console.developers.google.com/`](https://console.developers.google.com/)）来创建和管理\
  \ App Engine 应用。你可以使用自己的 Google 帐户登录 Google Developers 控制台（Google Cloud 提供 60 天免费试用帐户）。\n\
  \n让我们在 Google Developers 控制台中创建一个 App Engine 项目。首先，点击 **创建项目** 按钮。然后你可以指定项目名称、项目\
  \ ID 和 App Engine 位置。\n\n图 11-6 显示了 **新项目** 窗口，其中展示了 Google Developers 控制台中的新项目。\n\
  \n![A978-1-4842-1052-9_11_Fig6_HTML.jpg](img/A978-1-4842-1052-9_11_Fig6_HTML.jpg)\n\
  \n**图 11-6.** 创建新的 App Engine 项目\n\n你在 Google Developers 控制台中创建一个具有唯一项目 ID 的 App\
  \ Engine 项目（参见图 11-6）。项目 ID 是 `gae-demo-1073`，在部署应用之前，它将用于在 `app.yaml` 中指定应用标识符。\n\
  \n图 11-7 显示了 Google Developers 控制台中新建项目的详细信息。\n\n![A978-1-4842-1052-9_11_Fig7_HTML.jpg](img/A978-1-4842-1052-9_11_Fig7_HTML.jpg)\n\
  \n**图 11-7.** App Engine 项目的详细信息\n\n让我们修改 `app.yaml` 配置文件中的应用标识符，以将应用部署到云环境中。\n\n\
  清单 11-3 提供了用于部署到 App Engine 生产环境的 `app.yaml` 文件。\n\n**清单 11-3.** `app.yaml` 中作为应用的项目\
  \ ID\n\n```yaml\napplication: gae-demo-1073\nversion: 1\nruntime: go\napi_version:\
  \ go1\nhandlers:\n- url: /.*\n  script: _go_app\n```\n\n现在你可以通过从应用的 `根` 目录运行 `goapp`\
  \ 工具，将 App Engine 应用部署到 Google Cloud 环境中：\n\n```shell\ngoapp deploy\n```\n\n\n\n\
  `goapp deploy`命令通过读取`app.yaml`中的配置，将 App Engine 应用部署到 Google Cloud 环境中。该命令从`app.yaml`中获取应用标识符，并将编译后的\
  \ Go 程序上传到关联的 App Engine 项目。部署应用时，系统会要求您提供 Google 账户凭证，以访问您在 Google Developer Console\
  \ 中创建的 App Engine 应用。在 App Engine 生产环境中，会提供一个格式为`https://{project ID}.appspot.com`的\
  \ URL。您将收到如下 App Engine 应用的 URL：[`https://gae-demo-1073.appspot.com/`](https://gae-demo-1073.appspot.com/)。\n\
  \n您可以通过访问生产环境的 URL 来验证应用在 Cloud 环境中的运行情况。图 11-8 和 11-9 展示了 App Engine 应用成功运行于 Google\
  \ App Engine 生产环境中的状态。\n\n![A978-1-4842-1052-9_11_Fig9_HTML.jpg](img/A978-1-4842-1052-9_11_Fig9_HTML.jpg)\n\
  \n图 11-9. App Engine 应用中 Task 表单的响应页面\n\n![A978-1-4842-1052-9_11_Fig8_HTML.jpg](img/A978-1-4842-1052-9_11_Fig8_HTML.jpg)\n\
  \n图 11-8. App Engine 应用中的 Task 表单\n\n### 创建混合型独立/App Engine 应用\n\nApp Engine 应用与独立应用之间的根本区别非常少。App\
  \ Engine 环境提供了一个特殊的`main`包，因此您无法为 App Engine 应用使用它。您可以在为 App Engine 应用选择的 Go 包的`init`函数中编写处理逻辑。当开发独立应用时，您需要编写`main`包。\n\
  \n在某些场景下，编写能够在独立环境和 App Engine 环境中运行的混合应用会非常有帮助。假设您想要编写一个 Go Web 应用，该应用需要同时在本地服务器和\
  \ Google Cloud 上进行测试和部署。编写一个能在两种环境中运行的混合应用，对于在无需每次部署前修改源代码的情况下，在多个环境中测试和部署应用来说，是非常有用的。您可以通过使用构建约束（build\
  \ constraints）来开发适用于独立环境和 App Engine 环境的混合应用。\n\n注意\n\n构建约束（也称为构建标签）指定了文件应被包含在包中的条件。构建约束必须作为行注释出现在源文件顶部附近，并以`//\
  \ +build`开头。构建约束可以出现在任何类型的源文件中，不限于 Go 源文件。\n\nApp Engine SDK 提供了一个新的构建约束`appengine`，在编译源代码时，可以用它来区分独立环境和\
  \ App Engine 环境中的源代码。通过使用`appengine`构建约束，您可以根据构建环境在构建过程中排除某些源文件。例如，当您使用 App Engine\
  \ SDK 构建应用源代码时，可以忽略写在`main`包中的源代码。\n\n如果您想让 Go 工具忽略使用 App Engine SDK 构建的源文件，请在源文件顶部添加以下内容：\n\
  \n`// +build appengine`\n\n以下构建约束指定您希望使用 Go 工具进行构建，因此这些源文件将不会在 App Engine SDK 中被编译：\n\
  \n`// +build !appengine`\n\n让我们重写列表 11-1 中的 Web 应用，使其成为一个既适用于 App Engine 环境也适用于独立环境的混合应用。在此混合实现中，您将创建独立的源文件来处理\
  \ HTTP 处理逻辑，这些文件使用构建约束来区分 App Engine 应用和独立应用，并将公共逻辑放在一个共享库中。\n\n图 11-10 展示了混合应用的目录结构。\n\
  \n![A978-1-4842-1052-9_11_Fig10_HTML.jpg](img/A978-1-4842-1052-9_11_Fig10_HTML.jpg)\n\
  \n图 11-10. 混合应用的目录结构\n\n`main.go`将由 Go 工具构建，而`appengine.go`将由 App Engine SDK 构建。公共逻辑被放置在一个名为`hybridapplib`的共享库中。\n\
  \n列表 11-4 提供了`hybridapplib`的实现，该库用于处理公共逻辑。\n\n列表 11-4. hybridapplib 中 handler.go\
  \ 的共享逻辑\n\n```\npackage hybridapplib\n\nimport (\n\t\"fmt\"\n\t\"html/template\"\
  \n\t\"net/http\"\n)\n\ntype Task struct {\n\tName        string\n\tDescription string\n\
  }\n\nconst taskForm = `\n<html>\n<body>\n<form action=\"/task\" method=\"post\"\
  >\n<p>Task Name: <input type=\"text\" name=\"taskname\" ></p>\n<p> Description:\
  \ <input type=\"text\" name=\"description\" ></p>\n<p><input type=\"submit\" value=\"\
  Submit\"></p>\n</form>\n</body>\n</html>\n`\n\nconst taskTemplateHTML = `\n<html>\n\
  <body>\n<p>New Task has been created:</p>\n<div>Task: {{.Name}}</div>\n<div>Description:\
  \ {{.Description}}</div>\n</body>\n</html>\n`\n\nvar taskTemplate = template.Must(template.New(\"\
  task\").Parse(taskTemplateHTML))\n\nfunc init() {\n\thttp.HandleFunc(\"/\", index)\n\
  \thttp.HandleFunc(\"/task\", task)\n}\n\nfunc index(w http.ResponseWriter, r *http.Request)\
  \ {\n\tfmt.Fprint(w, taskForm)\n}\n\nfunc task(w http.ResponseWriter, r *http.Request)\
  \ {\n\ttask := Task{\n\t\tName:        r.FormValue(\"taskname\"),\n\t\tDescription:\
  \ r.FormValue(\"description\"),\n\t}\n\terr := taskTemplate.Execute(w, task)\n\t\
  if err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \t}\n}\n```\n\nHTTP 处理逻辑被放置在`handler.go`的`init`函数中。`handler.go`源文件中的代码对于独立应用和 App\
  \ Engine 应用是通用的。\n\n列表 11-5 提供了`main`包中的`main.go`源文件，该文件提供了`main`函数。它由 Go 工具构建。\n\
  \n列表 11-5. main 包中的 main.go\n\n```\n// +build !appengine\n\npackage main\n\nimport\
  \ (\n\t\"net/http\"\n\t_ \"github.com/shijuvar/go-web/chapter-11/hybridapplib\"\n\
  )\n\nfunc main() {\n\thttp.ListenAndServe(\"localhost:8080\", nil)\n}\n```\n\n在`main.go`文件中使用了构建约束`!appengine`，以便在使用\
  \ Go 工具构建应用时包含该文件。当使用 Go 工具构建应用时，`main.go`文件被视为`main`包的一部分。在`main`函数中，调用了`http`包的`ListenAndServe`函数来在本地服务器上启动\
  \ HTTP 服务器。空白标识符（`_`）被用作`hybridapplib`包的别名，以便在不引用程序中的包标识符的情况下调用其`init`函数。\n\n当您在\
  \ App Engine 上运行应用时，不能使用`main`包。列表 11-6 提供了在 App Engine 环境中构建应用的实现，其中调用了`hybridapplib`包的`init`函数。\n\
  \n列表 11-6. task 包中的 appengine.go\n\n```\n// +build appengine\n\npackage task\n\n\
  import (\n\t_ \"github.com/shijuvar/go-web/chapter-11/hybridapplib\"\n)\n\nfunc\
  \ init() {\n}\n```\n\n在`appengine.go`文件中使用了构建约束`appengine`，以便在使用 App Engine SDK\
  \ 构建应用时包含该文件。`appengine.go`文件被视为`task`包的一部分。由于 HTTP 处理代码已在`hybridapplib`包中实现，此源文件保持无任何实现。\n\
  \n当您使用 Go 工具构建应用时，`main.go`源文件会被包含以编译 Go 包，而`appengine.go`源文件则会被排除在编译之外。当使用 App\
  \ Engine SDK 构建应用时，通过从包的`init`函数中获取处理逻辑，HTTP 服务器在 App Engine 环境中运行，并且`main.go`文件会被忽略。\n\
  \n\n\n当您使用各种云服务开发 App Engine 应用时，这种混合方法可能并不实用。例如，假设您想为您的 App Engine 应用使用 Cloud `Datastore`\
  \ 服务。您可以在本地计算机上测试该应用，因为 App Engine 网络开发服务器会模拟 Datastore，但您无法在本地环境中运行此应用。\n\n###\
  \ 使用云原生数据库\n\nApp Engine 作为 Google Cloud 平台的平台即服务，允许您构建大规模可扩展的网络应用，而无需担心 IT 基础设施的设置。如前面章节所述，Go\
  \ 开发者可以通过使用 Go 语言的 App Engine SDK 在 App Engine 上开发、测试和部署网络应用，并且这些应用支持自动扩缩容。当您开发可扩展应用时，将数据持久化到可扩展的存储机制中对于实现可扩展性和高可用性至关重要。\n\
  \n当您为 Google Cloud 平台开发应用时，您可以使用任意类型的数据库。第 8 章和第 9 章讨论了 MongoDB，一种 NoSQL 数据存储。您可以设置一个类似\
  \ MongoDB 的数据库，它可以与在 Google Cloud 平台上运行的网络应用配合使用。要在 Google Cloud 上使用诸如 MongoDB 之类的数据库，您需要获取一台虚拟机作为\
  \ Google Compute Engine (GCE) 服务，该服务是 Google Cloud 中的 IaaS 平台。然后，您需要在该虚拟机实例上设置数据库。这需要\
  \ IaaS 实例；管理和扩缩这些数据库可能需要大量的人工干预。\n\nGoogle Cloud 提供了不同的托管型数据存储服务，这些服务可以与网络应用一起使用，而无需担心设置和管理\
  \ IaaS 实例。因此，您不需要为在云上运行的数据库配备运维人员，这为您的 Google Cloud 应用提供了极大的运营灵活性。\n\n在 Google Cloud\
  \ Platform 中，您可以使用以下数据库来持久化结构化数据：\n\n*   **Google Cloud SQL**：一个兼容 MySQL 的关系型数据库，适用于云端规模。\n\
  *   **Google Cloud Datastore**：一个提供可扩展存储的 NoSQL 数据存储。\n*   **Google Cloud Bigtable**：一个可扩展到数十亿行和数千列、支持\
  \ PB 级数据的 NoSQL 数据库。它是大数据解决方案的理想数据存储。\n\nGoogle Cloud 既提供 NoSQL 数据库，也提供关系型数据库。Google\
  \ Cloud 为 NoSQL 提供了两种选择：**Google Cloud Datastore** 和 **Google Cloud Bigtable**。Datastore\
  \ 和 Bigtable 都旨在提供大规模可扩展的数据存储。\n\n尽管两者都旨在实现大规模可扩展，但在处理 TB 级数据时，Bigtable 是更好的选择。Bigtable\
  \ 专为与 HBase 兼容而设计，并且可以通过 HBase 1.0 API 的扩展进行访问，因此它与大数据生态系统兼容。在大数据解决方案中，您可以将海量数据存储在\
  \ Bigtable 中，并使用 Hadoop 生态系统中的分析工具对其进行分析。\n\nCloud Datastore 构建在 Bigtable 之上。Datastore\
  \ 通过复制和数据同步提供高可用性；而 Bigtable 不复制数据，并且在单个数据中心区域内运行。Datastore 支持 ACID 事务和使用 GQL（一种用于从\
  \ Datastore 检索实体的类似 SQL 的语言）进行类似 SQL 的查询。对于 App Engine 网络应用来说，Cloud Datastore 是一个绝佳的数据存储选择。\n\
  \n以下部分描述了如何将 Google Cloud Datastore 与 App Engine 应用一起使用。\n\n#### Google Cloud Datastore\
  \ 简介\n\nGoogle Cloud Datastore 是一个无模式的 NoSQL 数据存储，为应用提供健壮、可扩展的存储。它具有以下特性：\n\n* \
  \  无计划停机\n*   原子事务\n*   读写操作的高可用性\n*   读取和祖先查询的强一致性\n*   所有其他查询的最终一致性\n\n\n\n#####\
  \ 数据存储最重要的事\n\n`Datastore` 最重要的特性是它能在多个数据中心区域间复制数据，从而为读写操作提供高可用性。在将`Datastore`与`Bigtable`进行比较时，请注意`Bigtable`运行在单个数据中心上。\n\
  \n##### 实体\n\n`Cloud Datastore` 保存称为实体的数据对象。`Go` 结构体的值会被持久化到实体中，这些实体包含一个或多个属性。`Go`\
  \ 结构体的字段会成为实体的属性。属性值的类型取自结构体字段。\n\n与许多`NoSQL`数据库一样，`Cloud Datastore` 是一种无模式数据库，这意味着同一实体的数据对象可以拥有不同的属性，且同名属性可以拥有不同的值类型。\n\
  \n`Cloud Datastore` 是一种演进型`NoSQL`数据库，相比传统`NoSQL`数据库具有许多优势。`Cloud Datastore` 允许您使用树状结构的祖先路径来存储分层数据。\n\
  \n##### 祖先与后代\n\n在`Datastore`中创建实体时，您可以选择性地指定另一个实体作为其父实体。通过指定父实体，您可以关联分层结构的数据。如果不指定任何父实体，则该实体被指定为根实体。实体的父级、父级的父级等递归关系构成了其祖先。实体的子级、子级的子级等递归关系构成了其后代。根实体及其所有后代属于同一个实体组。理解实体组的概念有助于您高效地执行查询。\n\
  \n#### 使用 Cloud Datastore\n\n当您使用`App Engine`在`Google Cloud`平台上开发高度可扩展的`云原生`应用时，`Google\
  \ Cloud Datastore` 是一个绝佳的数据存储选择。`App Engine` 和 `Cloud Datastore` 都能为应用程序提供巨大的可扩展性，而开发人员无需管理基础设施或处理运维工作。当您在`App\
  \ Engine`应用中使用`Datastore`时，无需进行任何配置即可使用。您只需使用`Cloud Datastore`的`Go`包，即可向`Datastore`持久化数据和查询数据。\n\
  \n让我们创建一个以`Cloud Datastore`作为数据库的示例`App Engine` Web 应用。此示例应用使用简单数据模型，不涉及祖先和后代。\n\
  \n以下`Go`包用于该`App Engine`应用：\n\n- `google.golang.org/appengine`：`appengine`包提供`Google\
  \ App Engine`的基本功能。\n- `google.golang.org/appengine/datastore`：`datastore`包为`App\
  \ Engine`的数据存储服务提供客户端。\n\n您可以使用`goapp`工具安装这些包：\n\n```\ngoapp get google.golang.org/appengine\n\
  goapp get google.golang.org/appengine/datastore\n```\n\n该示例应用程序提供以下功能：\n\n- 应用程序首页显示任务列表。\n\
  - 用户可以通过选择`创建任务`选项来创建新任务，该选项会显示一个用于创建新任务的表单。\n\n清单 11-7 提供了一个使用`Cloud Datastore`的`App\
  \ Engine`应用示例。\n\n## 清单 11-7. 使用 Cloud Datastore 的 App Engine 应用\n\n```go\npackage\
  \ task\n\nimport (\n    \"fmt\"\n    \"html/template\"\n    \"net/http\"\n    \"\
  time\"\n\n    \"google.golang.org/appengine\"\n    \"google.golang.org/appengine/datastore\"\
  \n)\n\ntype Task struct {\n    Name        string\n    Description string\n    CreatedOn\
  \   time.Time\n}\n\nconst taskForm = `\n<html>\n<body>\n<form action=\"/save\" method=\"\
  post\">\n<p>Task Name: <input type=\"text\" name=\"taskname\" ></p>\n<p> Description:\
  \ <input type=\"text\" name=\"description\" ></p>\n<p><input type=\"submit\" value=\"\
  Submit\"></p>\n</form>\n</body>\n</html>\n`\n\nconst taskListTmplHTML = `\n<html>\n\
  <body>\n<p>Task List</p>\n{{range .}}\n<p>{{.Name}} - {{.Description}}</p>\n{{end}}\n\
  <p><a href=\"/create\">Create task</a> </p>\n</body>\n</html>\n`\n\nvar taskListTemplate\
  \ = template.Must(template.New(\"taskList\").Parse(taskListTmplHTML))\n\nfunc init()\
  \ {\n```\n\n\n\n```go\nhttp.HandleFunc(\"/\", index)\nhttp.HandleFunc(\"/create\"\
  , create)\nhttp.HandleFunc(\"/save\", save)\n}\n\nfunc index(w http.ResponseWriter,\
  \ r *http.Request) {\n\tc := appengine.NewContext(r)\n\tq := datastore.NewQuery(\"\
  tasks\").\n\t\tOrder(\"-CreatedOn\")\n\tvar tasks []Task\n\t_, err := q.GetAll(c,\
  \ &tasks)\n\tif err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \t}\n\tif err := taskListTemplate.Execute(w, tasks); err != nil {\n\t\thttp.Error(w,\
  \ err.Error(), http.StatusInternalServerError)\n\t}\n}\n\nfunc create(w http.ResponseWriter,\
  \ r *http.Request) {\n\tfmt.Fprint(w, taskForm)\n}\n\nfunc save(w http.ResponseWriter,\
  \ r *http.Request) {\n\ttask := Task{\n\t\tName:        r.FormValue(\"taskname\"\
  ),\n\t\tDescription: r.FormValue(\"description\"),\n\t\tCreatedOn:   time.Now(),\n\
  \t}\n\tc := appengine.NewContext(r)\n\t_, err := datastore.Put(c, datastore.NewIncompleteKey(c,\
  \ \"tasks\", nil), &task)\n\tif err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \t\treturn\n\t}\n\thttp.Redirect(w, r, \"/\", http.StatusMovedPermanently)\n}\n\
  ```\n\n以下包被导入以配合 App Engine 应用程序使用：\n\n- `google.golang.org/appengine`\n- `google.golang.org/appengine/datastore`\n\
  \n声明了一个 `Task struct`，用于将值持久化到 Datastore 实体中。\n\n##### 创建新实体\n\n`Save` 应用处理器创建一个新的\
  \ `Task` 对象，并将值持久化到名为 `\"tasks\"` 的 Datastore 实体中。调用了 `appengine` 包中的 `NewContext`\
  \ 函数，该函数返回一个用于处理进行中 HTTP 请求的上下文。你必须提供一个上下文对象来与 Datastore 交互。\n\n`datastore.Put`\
  \ 函数通过提供结构体实例和实体键名的键，在 Datastore 中创建新实体。`Task` 结构体类型实例被提供以保存到 Datastore。\n\n提供键名有多种选择。例如，可以通过向\
  \ `datastore.NewKey` 函数传递一个非空字符串 ID 来提供键名，如下所示：\n\n```go\nc := appengine.NewContext(r)\n\
  key := datastore.NewKey(c, \"tasks\", \"taskgae\", 0, nil)\n_, err := datastore.Put(c,\
  \ key, &task)\n```\n\n你也可以提供一个空键名，或使用 `datastore.NewIncompleteKey` 函数传递一个新的不完整键。`NewIncompleteKey`\
  \ 函数创建了一个新的不完整键。Datastore 会自动为实体键生成唯一的数字 ID。\n\n在示例程序中，使用不完整键将记录插入到 `\"tasks\"`\
  \ 实体中：\n\n```go\nc := appengine.NewContext(r)\nkey := datastore.NewIncompleteKey(c,\
  \ \"tasks\", nil)\n_, err := datastore.Put(c, key, &task)\n```\n\n`datastore.Put`\
  \ 函数返回一个 `datastore.PendingKey`，可以通过使用成功事务提交的返回值将其解析为 `datastore.Key` 值。如果键是不完整键，返回的\
  \ `PendingKey` 将解析为数据存储生成的唯一键。`PendingKey` 表示新插入实体的键。可以通过调用 `Commit` 的 `Key` 方法将其解析为\
  \ `datastore.Key`。\n\n你也可以使用 `datastore.Put` 函数更新现有实体。当更新现有实体时，修改结构体的字段，然后调用 `datastore.Put`\
  \ 函数更新值。这将覆盖现有实体。\n\n##### 查询 Datastore\n\nGo Datastore API 提供了 Go 语言惯用的方式来查询 Datastore\
  \ 中的数据。它提供了一个 `datastore.Query` 类型，用于准备和执行查询以从 App Engine Datastore 检索实体。`NewQuery`\
  \ 函数准备了一个查询对象：\n\n```go\nq := datastore.NewQuery(\"tasks\").\n    Order(\"-CreatedOn\"\
  )\n```\n\nDatastore 查询包括以下内容：\n\n-   查询所针对的一个实体（[实体种类](https://cloud.google.com/appengine/docs/go/datastore/entities#Go_Kinds_and_identifiers)）\n\
  -   基于实体属性值、键和祖先的零个或多个筛选器\n-   用于对结果进行排序的零个或多个排序顺序\n\n\n\n##### 运行应用程序\n\n让我们使用\
  \ `goapp` 工具将 App Engine 应用程序部署到 Google Cloud 中，并运行该应用程序。\n\n图 11-11 展示了应用程序的索引页面。在此页面中，App\
  \ Engine 应用程序查询 `\"tasks\"` 实体并显示数据。该页面显示了通过用于创建新任务的表单插入两个任务后的任务列表。\n\n![A978-1-4842-1052-9_11_Fig11_HTML.jpg](img/A978-1-4842-1052-9_11_Fig11_HTML.jpg)\n\
  \n*图 11-11. 任务列表页面*\n\n当你选择“创建任务”链接时，会看到一个允许你创建任务的页面（见图 11-12）。\n\n![A978-1-4842-1052-9_11_Fig12_HTML.jpg](img/A978-1-4842-1052-9_11_Fig12_HTML.jpg)\n\
  \n*图 11-12. 创建任务表单*\n\n你可以通过 Google Developers Console 的 Web 界面查询 Datastore 数据。图\
  \ 11-13 展示了 Google Developers Console 中 `\"tasks\"` 实体的数据。\n\n![A978-1-4842-1052-9_11_Fig13_HTML.jpg](img/A978-1-4842-1052-9_11_Fig13_HTML.jpg)\n\
  \n*图 11-13. 来自 Google Developers Console 的数据*\n\n可以看到，当数据对象放入实体时，会分配一个唯一 ID 作为实体键。\n\
  \n### 使用 Cloud Endpoints 构建后端 API\n\n在 Google Cloud 中，App Engine 平台允许 Go 开发者在 App\
  \ Engine 的沙盒环境中构建后端 API 和 Web 应用程序，该沙盒环境支持自动扩缩。使用 App Engine，你可以利用 Google Cloud\
  \ 平台提供的工具和 SDK，在 Google 的基础设施上构建大规模可扩展的云原生应用程序。Google Cloud Endpoints 是一项 App Engine\
  \ 服务，可让你轻松为 Web 客户端和移动客户端创建后端 API。\n\nGoogle Cloud Endpoints 提供了工具、库和服务，用于从 App\
  \ Engine 应用程序快速生成 API 和客户端库。Cloud Endpoints 是一个在 App Engine 环境中运行的应用程序，但它为构建 API\
  \ 后端提供了额外功能，其客户端库在构建移动后端系统时提高了开发者的生产力。\n\n你可以在不借助 Cloud Endpoints 的情况下，直接在 App Engine\
  \ 平台上创建后端 API。不过，虽然可以使用普通的 App Engine 应用程序创建后端 API，但 Cloud Endpoints 通过提供额外功能简化了开发过程。Cloud\
  \ Endpoints 允许你为 iOS、Android、JavaScript 和 Dart 生成本地客户端库。由于各种客户端应用程序都可使用原生生成的库，因此你可以快速构建客户端应用程序，而无需编写原生包装器来与后端\
  \ API 通信。对于后端开发者而言，这消除了开发 RESTful API 过程中的一些复杂性。\n\n当你使用 Cloud Endpoints 构建 API\
  \ 时，无需编写任何关于 HTTP `Request` 和 `Response` 对象的内容。你可以像编写普通 Go 函数一样编写 API 方法，无需使用这些对象，并通过使用\
  \ Cloud Endpoints 提供的库将其转换为 HTTP API。\n\n图 11-14 展示了 Cloud Endpoints 应用程序的基本架构。\n\
  \n\n\n![A978-1-4842-1052-9_11_Fig14_HTML.jpg](img/A978-1-4842-1052-9_11_Fig14_HTML.jpg)\n\
  \n**图 11-14.** Cloud Endpoints 应用程序的基本架构\n\n图 11-14 展示了运行在 App Engine 实例上的后端 API，这些实例作为移动客户端和\
  \ JavaScript Web 客户端的后端运行。后端应用的操作通过端点（endpoints）开放给客户端应用，这些端点暴露了一个 API，客户端可以使用 Cloud\
  \ Endpoints 生成的原生库来调用该 API。Cloud Endpoints 能够提高后端 API 开发者和客户端应用开发者的开发效率。\n\n在第 9\
  \ 章中，我们开发了一个 RESTful API 作为客户端应用的后端。通过使用 Cloud Endpoints，在 Google Cloud 平台上构建 RESTful\
  \ API 时，你可以提高开发效率。\n\n#### 适用于 Go 的 Cloud Endpoints\n\n借助 App Engine 及其 SDK 和 Go\
  \ 工具，你可以使用 Go 构建 Cloud Endpoints 后端 API。你可以使用 Google Cloud 平台提供的 `endpoints` 包，用\
  \ Go 语言创建 Cloud Endpoints 后端。\n\n##### 安装 endpoints 包\n\n要安装 `endpoints` 包，请使用 Google\
  \ App Engine SDK for Go 提供的 `goapp` 工具：\n\n```\ngoapp get github.com/GoogleCloudPlatform/go-endpoints/endpoints\n\
  ```\n\n要在 Go 程序中使用 `endpoints` 包，必须在导入列表中包含该包：\n\n```\nimport (\n    \"github.com/GoogleCloudPlatform/go-endpoints/endpoints\"\
  \n)\n```\n\n通过使用 `endpoints` 包，你可以快速使用 Go 编写后端 API。\n\n#### 使用 Go 的 Cloud Endpoints\
  \ 后端 API\n\n在本节中，你将通过一个示例来了解如何使用 Cloud Endpoints 和 Go 编写后端 API。像普通的 App Engine 应用程序一样，你的\
  \ Cloud Endpoints 应用程序也可以利用 Google Cloud 提供的各种云服务。在这个示例应用程序中，我们使用 Cloud Datastore\
  \ 作为持久化存储。\n\n我们来声明一个结构体，用于描述应用程序的数据模型。代码清单 11-8 提供了一个结构体类型，用作 Datastore 实体。\n\n\
  **代码清单 11-8.** 应用程序数据模型\n\n```\n// Task 是一个数据存储实体\ntype Task struct {\n    Key \
  \        *datastore.Key `json:\"id\" datastore:\"-\"`\n    Name        string  \
  \       `json:\"name\" endpoints:\"req\"`\n    Description string         `json:\"\
  description\" datastore:\",noindex\" endpoints:\"req\"`\n    CreatedOn   time.Time\
  \      `json:\"createdon,omitempty\"`\n}\n```\n\n创建了一个名为 `Task` 的结构体类型，用于描述 Cloud\
  \ Endpoints 应用程序的应用数据。`Task` 结构体的值会持久化到 Datastore 中，并为 `Task` 结构体的字段提供了必要的标签，以便与\
  \ JSON 编码和 Datastore 配合使用。\n\n示例应用程序提供了两个 API 方法：`List` 方法从 Datastore 返回 `Task`\
  \ 数据列表，`Add` 方法允许你向 Datastore 中创建一个新的 `Task` 实体。我们通过一个稍后可以注册到 Endpoints 的结构体类型来编写这些方法。\n\
  \n代码清单 11-9 提供了包含结构体类型和 API 方法的 Go 源文件，这些方法将作为 Cloud Endpoints 提供的 API 的方法暴露出来。\n\
  \n**代码清单 11-9.** 暴露 API 方法的 TaskService\n\n```\npackage cloudendpoint\n\nimport\
  \ (\n    \"time\"\n    \"golang.org/x/net/context\"\n    \"google.golang.org/appengine/datastore\"\
  \n)\n\n// Task 是一个数据存储实体\ntype Task struct {\n    Key         *datastore.Key `json:\"\
  id\" datastore:\"-\"`\n    Name        string         `json:\"name\" endpoints:\"\
  req\"`\n    Description string         `json:\"description\" datastore:\",noindex\"\
  \ endpoints:\"req\"`\n    CreatedOn   time.Time      `json:\"createdon,omitempty\"\
  `\n}\n\n// Tasks 是 TaskService.List 方法的响应类型\ntype Tasks struct {\n    Tasks []Task\
  \ `json:\"tasks\"`\n}\n\n// 结构体用于添加 API 方法\ntype TaskService struct {\n}\n```\n\n\
  \n```go\n// List 从 Datastore 返回所有现有任务的列表。\nfunc (ts *TaskService) List(c context.Context)\
  \ (*Tasks, error) {\n    tasks := []Task{}\n    keys, err := datastore.NewQuery(\"\
  tasks\").Order(\"-CreatedOn\").GetAll(c, &tasks)\n    if err != nil {\n        return\
  \ nil, err\n    }\n    for i, k := range keys {\n        tasks[i].Key = k\n    }\n\
  \    return &Tasks{tasks}, nil\n}\n\n// Add 向 Datastore 插入一个新的 Task\nfunc (ts *TaskService)\
  \ Add(c context.Context, t *Task) error {\n    t.CreatedOn = time.Now()\n    key\
  \ := datastore.NewIncompleteKey(c, \"tasks\", nil)\n    _, err := datastore.Put(c,\
  \ key, t)\n    return err\n}\n```\n\n编写了一个名为 `TaskService` 的结构类型，并添加了两个方法：`List`\
  \ 和 `Add`。这些方法后续将通过 `endpoints` 包以后端 API 操作的形式对外暴露。尽管这两个方法将作为 HTTP API 的操作暴露，但它们均未直接使用\
  \ HTTP 的 `Request` 和 `Response` 对象。\n\n`context` 包用于承载请求作用域的值。`List` 方法从 `\"tasks\"\
  ` 数据存储实体中查询数据。`GetAll` 方法执行查询并返回所有匹配的键。返回的键集合用于为 `Task` 结构体的 `Key` 字段赋值。\n\n`Add`\
  \ 方法向 `\"tasks\"` 数据存储实体中添加新的 `Task`。在常规的 HTTP API 应用程序中，会读取来自 HTTP 请求主体的传入消息，并将\
  \ JSON（或 XML）值解码为结构类型。在 `Add` 方法中，提供了一个 `Task` 类型的参数，以便从 HTTP 请求主体中获取值并填充到该参数中。在这里，你不需要编写任何逻辑或将传入的值解析为结构类型；而是提供了一个用于从\
  \ HTTP 请求中绑定值的参数。当你使用 **Cloud Endpoints** 构建后端 API 时，可以提高开发者的生产力，因为 Cloud Endpoints\
  \ 允许你避免编写编写 RESTful API 所需的样板代码。\n\n目前，`List` 和 `Add` 方法还是普通的函数。你需要使用 Cloud Endpoints\
  \ 将它们变为 HTTP API 的操作。清单 11-10 提供了将 `TaskService` 的方法注册到 Endpoints 的实现，以便这些方法可以作为\
  \ HTTP API 的操作暴露出来。\n\n**清单 11-10.** 将 TaskService 注册到 HTTP 服务器\n\n```go\npackage\
  \ cloudendpoint\n\nimport (\n    \"log\"\n    \"github.com/GoogleCloudPlatform/go-endpoints/endpoints\"\
  \n)\n\n// 注册 API 端点\nfunc init() {\n    taskService := &TaskService{}\n    // 将\
  \ TaskService 添加到服务器。\n    api, err := endpoints.RegisterService(\n        taskService,\n\
  \        \"tasks\",\n        \"v1\",\n        \"Tasks API\",\n        true,\n  \
  \  )\n    if err != nil {\n        log.Fatalf(\"Register service: %v\", err)\n \
  \   }\n\n    // 获取 List 方法的 ServiceMethod 的 MethodInfo\n    info := api.MethodByName(\"\
  List\").Info()\n    // 为 MethodInfo 提供值 - 名称、HTTP 方法和路径。\n    info.Name, info.HTTPMethod,\
  \ info.Path = \"listTasks\", \"GET\", \"tasks\"\n\n    // 获取 Add 方法的 ServiceMethod\
  \ 的 MethodInfo\n    info = api.MethodByName(\"Add\").Info()\n    info.Name, info.HTTPMethod,\
  \ info.Path = \"addTask\", \"POST\", \"tasks\"\n\n    // 使用默认的 serve mux 调用 DefaultServer\
  \ 的 HandleHttp 方法\n    endpoints.HandleHTTP()\n}\n```\n\n在 `init` 函数中，使用 `endpoints`\
  \ 包的 `RegisterService` 函数将 `TaskService` 的方法注册到 HTTP 服务器。`RegisterService` 函数使用\
  \ `DefaultServer`（默认的 RPC 服务器）将新服务添加到服务器。`\"tasks\"` 作为服务名称提供，`\"v1\"` 作为 HTTP 服务的\
  \ API 版本：\n\n```go\napi, err := endpoints.RegisterService(\n    taskService,\n \
  \   \"tasks\",\n    \"v1\",\n    \"Tasks API\",\n    true,\n)\n```\n\n为 HTTP 服务的方法提供了信息。这些信息用于为后端\
  \ API 提供发现文档：\n\n```go\n// 获取 List 方法的 ServiceMethod 的 MethodInfo\ninfo := api.MethodByName(\"\
  List\").Info()\n// 为 MethodInfo 提供值 - 名称、HTTP 方法和路径。\ninfo.Name, info.HTTPMethod,\
  \ info.Path = \"listTasks\", \"GET\", \"List Tasks\"\n```\n\n\n// 获取 ServiceMethod\
  \ 中 Add 方法的 MethodInfo\n`info = api.MethodByName(\"Add\").Info()`\n`info.Name, info.HTTPMethod,\
  \ info.Path = \"addTask\", \"POST\", \"Add a new Task\"`\n\n最后，调用了 `endpoints` 包中的\
  \ `HandleHTTP` 函数，该函数使用默认的 `http.ServeMux` 调用了 `DefaultServer HandleHttp` 方法：\n\n\
  // 使用默认的 serve mux 调用 DefaultServer 的 HandleHttp 方法\n`endpoints.HandleHTTP()`\n\n\
  现在，`TaskService` 的方法已作为 RESTful API 的 HTTP 端点提供，可用于构建 Web 和移动客户端应用程序。由于 Cloud Endpoints\
  \ 应用是一个 App Engine 应用，让我们添加一个 `app.yaml` 文件，供 `goapp` 工具使用，并作为 App Engine 应用的配置。\n\
  \n清单 11-11 提供了用于 App Engine 应用的 `app.yaml` 文件。\n\n**清单 11-11.** 用于 App Engine 应用的\
  \ `app.yaml` 文件\n\n`application: go-endpoints`\n`version: v1`\n`threadsafe: true`\n\
  `runtime: go`\n`api_version: go1`\n`handlers:`\n`- url: /.*`\n`script: _go_app`\n\
  `# 重要！尽管上面有一个全能匹配的路由，`\n`# 但没有这两行，它将无法工作。`\n`# 请确保你有这个：`\n`- url: /_ah/spi/.*`\n\
  `script: _go_app`\n\nCloud Endpoints 应用现已准备好，可在开发 Web 服务器和 App Engine 生产环境中运行。\n\
  \n#### 运行 Cloud Endpoints 后端 API\n\nApp Engine Cloud Endpoints 应用已完成。让我们在本地开发服务器中使用\
  \ `goapp` 工具运行该应用。从应用的 `root` 目录运行 `goapp` 工具：\n\n`goapp serve`\n\n该应用在本地 Web 开发服务器中运行。API\
  \ 的发现文档可在 `http://localhost:8080/_ah/api/discovery/v1/apis/tasks/v1/rest` 获取。\n\n\
  API 资源管理器可在 `http://localhost:8080/_ah/api/explorer` 获取。\n\n让我们在浏览器窗口中导航到 API 资源管理器。图\
  \ 11-15 展示了显示 API 服务的 API 资源管理器。\n\n![A978-1-4842-1052-9_11_Fig15_HTML.jpg](img/A978-1-4842-1052-9_11_Fig15_HTML.jpg)\n\
  \n**图 11-15.** 在浏览器窗口中运行的 API 资源管理器\n\n当你点击任何可用的 API 服务时，你会导航到一个窗口，在其中可以查看该服务的可用操作。图\
  \ 11-16 展示了 tasks API 的操作。\n\n![A978-1-4842-1052-9_11_Fig16_HTML.jpg](img/A978-1-4842-1052-9_11_Fig16_HTML.jpg)\n\
  \n**图 11-16.** tasks API 的操作\n\n当你点击任何操作时，你会导航到一个窗口，在其中可以通过在输入窗口中提供请求数据并点击“执行”按钮来测试\
  \ API 操作。\n\n图 11-17 展示了用于测试 `addTask` 操作的输入窗口。\n\n![A978-1-4842-1052-9_11_Fig17_HTML.jpg](img/A978-1-4842-1052-9_11_Fig17_HTML.jpg)\n\
  \n**图 11-17.** `addTask` 操作的输入窗口\n\n图 11-18 展示了 `addTask` 操作的 HTTP `Request` 和 `Response`。\n\
  \n![A978-1-4842-1052-9_11_Fig18_HTML.jpg](img/A978-1-4842-1052-9_11_Fig18_HTML.jpg)\n\
  \n**图 11-18.** `addTask` 操作的 HTTP `Request` 和 `Response`\n\n`addTask` 操作是一个对 URI\
  \ 端点 `http://localhost:8080/_ah/api/tasks/v1/tasks` 的 HTTP `Post` 请求。\n\n图 11-19\
  \ 展示了 `listTasks` 操作的 HTTP `Request` 和 `Response`。在 `addTask` 操作执行三次后，再执行 `listTasks`\
