  \n清单 10-7 提供了前面示例中使用的`utils_test.go`文件的合并源代码版本。\n\n**清单 10-7.** 测试套件文件`utils_test.go`的源代码\n\
  \n```\npackage stringutils_test\n\nimport (\n\"fmt\"\n\"testing\"\n\"time\"\n\n\
  . \"github.com/shijuvar/go-web/chapter-10/stringutils\"\n)\n\n// Test case for the\
  \ SwapCase function to execute in parallel\nfunc TestSwapCaseInParallel(t *testing.T)\
  \ {\nt.Parallel()\n// Delaying 1 second for the sake of demonstration\ntime.Sleep(1\
  \ * time.Second)\n\ninput, expected := \"Hello, World\", \"hELLO, wORLD\"\nresult\
  \ := SwapCase(input)\nif result != expected {\nt.Errorf(\"SwapCase(%q) == %q, expected\
  \ %q\", input, result, expected)\n}\n}\n```\n\n\n\n```go\n// Reverse 函数的并行测试用例\n\
  func TestReverseInParallel(t *testing.T) {\n    t.Parallel()\n    // 为演示目的延迟 2 秒\n\
  \    time.Sleep(2 * time.Second)\n    input, expected := \"Hello, World\", \"dlroW\
  \ ,olleH\"\n    result := Reverse(input)\n    if result != expected {\n        t.Errorf(\"\
  Reverse(%q) == %q, expected %q\", input, result, expected)\n    }\n}\n\n// SwapCase\
  \ 函数的测试用例\nfunc TestSwapCase(t *testing.T) {\n    input, expected := \"Hello, World\"\
  , \"hELLO, wORLD\"\n    result := SwapCase(input)\n    if result != expected {\n\
  \        t.Errorf(\"SwapCase(%q) == %q, expected %q\", input, result, expected)\n\
  \    }\n}\n\n// Reverse 函数的测试用例\nfunc TestReverse(t *testing.T) {\n    input, expected\
  \ := \"Hello, World\", \"dlroW ,olleH\"\n    result := Reverse(input)\n    if result\
  \ != expected {\n        t.Errorf(\"Reverse(%q) == %q, expected %q\", input, result,\
  \ expected)\n    }\n}\n\n// SwapCase 函数的基准测试\nfunc BenchmarkSwapCase(b *testing.B)\
  \ {\n    for i := 0; i < b.N; i++ {\n        SwapCase(\"Hello, World\")\n    }\n\
  }\n\n// Reverse 函数的基准测试\nfunc BenchmarkReverse(b *testing.B) {\n    for i := 0;\
  \ i < b.N; i++ {\n        Reverse(\"Hello, World\")\n    }\n}\n\n// Reverse 函数的示例代码\n\
  func ExampleReverse() {\n    fmt.Println(Reverse(\"Hello, World\"))\n    // Output:\
  \ dlroW ,olleH\n}\n\n// SwapCase 函数的示例代码\nfunc ExampleSwapCase() {\n    fmt.Println(SwapCase(\"\
  Hello, World\"))\n    // Output: hELLO, wORLD\n}\n\nfunc TestLongRun(t *testing.T)\
  \ {\n    // 检查是否提供了短标志\n    if testing.Short() {\n        t.Skip(\"Skipping test\
  \ in short mode\")\n    }\n    // 长时间运行的实现部分位于此处\n    time.Sleep(5 * time.Second)\n\
  }\n```\n\n在 imports 包中，导入了 `stringutils` 包：\n\n```\n. \"github.com/shijuvar/go-web/chapter-10/stringutils\"\
  \n```\n\n导入 `stringutils` 包时，使用点（`.`）`import`，这允许你在不引用包名的情况下调用导出的标识符：\n\n```\nresult\
  \ := SwapCase(input)\n```\n\n让我们使用 `go test` 命令运行单元测试：\n\n```\ngo test –v –cover\
  \ –short –parallel 2\n```\n\n你应该会看到类似如下的输出：\n\n```\n=== RUN   TestSwapCaseInParallel\n\
  === RUN   TestReverseInParallel\n=== RUN   TestSwapCase\n--- PASS: TestSwapCase\
  \ (0.00s)\n=== RUN   TestReverse\n--- PASS: TestReverse (0.00s)\n=== RUN   TestLongRun\n\
  --- SKIP: TestLongRun (0.00s)\n    utils_test.go:93: Skipping test in short mode\n\
  --- PASS: TestSwapCaseInParallel (1.00s)\n--- PASS: TestReverseInParallel (2.00s)\n\
  === RUN   ExampleReverse\n--- PASS: ExampleReverse (0.00s)\n=== RUN   ExampleSwapCase\n\
  --- PASS: ExampleSwapCase (0.00s)\nPASS\ncoverage: 0.0% of statements\nok      github.com/shijuvar/go-web/chapter-10/stringutils_test\
  \  2.573s\n```\n\n尽管单元测试是从与被测试包不同的包中运行的，但 `go test` 命令给出了正确的输出。这里，唯一的区别是测试覆盖率为 0%：\n\
  \n```\ncoverage: 0.0% of statements\n```\n\n如果你不关心从 `go test` 命令获得的测试覆盖率百分比，那么将单元测试放在单独的包中是一种推荐的做法。\n\
  \n### 测试 Web 应用程序\n\n本书的主要焦点是 Go 语言的 Web 开发，本节将介绍如何测试 Web 应用程序。标准库包 `net/http/httptest`\
  \ 提供了用于测试 HTTP 应用程序的实用工具。`httptest` 包提供了以下有助于测试 HTTP 应用程序的结构体类型：\n\n*   `ResponseRecorder`\n\
  *   `Server`\n\n`ResponseRecorder` 是 `http.ResponseWriter` 的一个实现，可用于记录返回的 HTTP 响应，以便在单元测试中检查响应。你可以通过调用\
  \ `httptest` 包的 `NewRecorder` 函数来创建 `ResponseRecorder` 实例。当执行 HTTP 请求处理器时，会传递 `ResponseRecorder`\
  \ 对象；可以通过测试包含返回响应的 `ResponseRecorder` 对象来检查响应。\n\n\n```markdown\n`Server`是一个 HTTP\
  \ 服务器，用于通过测试服务器测试 HTTP 应用程序。你可以通过调用`httptest`包的`NewServer`函数并传入`http.Handler`实例来创建测试\
  \ HTTP 服务器，该函数会通过调用`http.Server`的`Serve`方法启动一个 HTTP 服务器。通过使用`httptest.Server`，你可以使用测试服务器（HTTP\
  \ 服务器）测试 HTTP 应用程序。因此，你可以通过从 HTTP 客户端向服务器发送 HTTP 请求来执行端到端 HTTP 测试。\n\n### 使用`ResponseRecorder`进行测试\n\
  \n让我们看看如何利用`ResponseRecorder`类型编写单元测试来检查 HTTP 响应。首先，我们编写一个示例 HTTP API 服务器，其端点如表\
  \ 10-1 所示。\n\n表 10-1. HTTP API 服务器示例\n\n| HTTP 动词 | 路径 | 功能 |\n| --- | --- | ---\
  \ |\n| `GET` | `/users` | 以 JSON 格式列出所有用户 |\n| `POST` | `/users` | 创建一个用户 |\n\n\
  清单 10-8 提供了一个示例 HTTP 服务器的实现。\n\n清单 10-8. main.go 中的 HTTP API 服务器示例\n\n```go\npackage\
  \ main\n\nimport (\n    \"encoding/json\"\n    \"errors\"\n    \"net/http\"\n  \
  \  \"github.com/gorilla/mux\"\n)\n\ntype User struct {\n    FirstName string `json:\"\
  firstname\"`\n    LastName  string `json:\"lastname\"`\n    Email     string `json:\"\
  email\"`\n}\n\nvar userStore = []User{}\n\nfunc getUsers(w http.ResponseWriter,\
  \ r *http.Request) {\n    users, err := json.Marshal(userStore)\n    if err != nil\
  \ {\n        w.WriteHeader(http.StatusInternalServerError)\n        return\n   \
  \ }\n    w.Header().Set(\"Content-Type\", \"application/json\")\n    w.WriteHeader(http.StatusOK)\n\
  \    w.Write(users)\n}\n\nfunc createUser(w http.ResponseWriter, r *http.Request)\
  \ {\n    var user User\n    // 解码传入的 User json\n    err := json.NewDecoder(r.Body).Decode(&user)\n\
  \    if err != nil {\n        w.WriteHeader(http.StatusInternalServerError)\n  \
  \      return\n    }\n    // 验证 User 实体\n    err = validate(user)\n    if err !=\
  \ nil {\n        w.WriteHeader(http.StatusBadRequest)\n        return\n    }\n \
  \   // 将 User 实体插入到 User 存储中\n    userStore = append(userStore, user)\n    w.WriteHeader(http.StatusCreated)\n\
  }\n\n// 验证 User 实体\nfunc validate(user User) error {\n    for _, u := range userStore\
  \ {\n        if u.Email == user.Email {\n            return errors.New(\"该电子邮件已存在\"\
  )\n        }\n    }\n    return nil\n}\n\nfunc SetUserRoutes() *mux.Router {\n \
  \   r := mux.NewRouter()\n    r.HandleFunc(\"/users\", createUser).Methods(\"POST\"\
  )\n    r.HandleFunc(\"/users\", getUsers).Methods(\"GET\")\n    return r\n}\n\n\
  func main() {\n    http.ListenAndServe(\":8080\", SetUserRoutes())\n}\n```\n\n编写了两个\
  \ HTTP 端点：HTTP `Post`（路径为`\"/users\"`）和 HTTP `Get`（路径为`\"/users\"`）。使用了`Gorilla\
  \ mux`来配置请求多路复用器。当创建新的`User`实体时，会验证`e-mail` ID 是否已存在。出于示例演示目的，`User`对象被持久化到名为`userStore`的切片中。\n\
  \n在 TDD 中，开发人员通过根据已识别的需求编写单元测试来开始开发周期。开发人员通常会编写用户故事来编写单元测试。尽管本书不遵循测试优先方法或最纯粹的 TDD\
  \ 形式，但让我们编写用于编写单元测试的用户故事：\n\n- 用户应该能够查看`User`实体列表。\n- 用户应该能够创建新的`User`实体。\n- `User`实体的电子邮件\
  \ ID 应该是唯一的。\n\n清单 10-9 提供了 HTTP 服务器应用程序的单元测试（参见清单 10-8）。这些测试基于前面定义的用户故事。\n\n清单\
  \ 10-9. 使用 ResponseRecorder 为 HTTP API 服务器编写单元测试，文件为 main_test.go\n\n```go\npackage\
  \ main\n\nimport (\n    \"fmt\"\n    \"net/http\"\n    \"net/http/httptest\"\n \
  \   \"strings\"\n    \"testing\"\n    \"github.com/gorilla/mux\"\n)\n\n// 用户故事 -\
  \ 用户应该能够查看 User 实体列表\nfunc TestGetUsers(t *testing.T) {\n    r := mux.NewRouter()\n\
  \    r.HandleFunc(\"/users\", getUsers).Methods(\"GET\")\n```\n\n```go\nreq, err\
  \ := http.NewRequest(\"GET\", \"/users\", nil)\n\nif err != nil {\n    t.Error(err)\n\
  }\n\nw := httptest.NewRecorder()\nr.ServeHTTP(w, req)\n\nif w.Code != 200 {\n  \
  \  t.Errorf(\"HTTP Status expected: 200, got: %d\", w.Code)\n}\n```\n\n```go\n//\
  \ 用户故事 - 用户应该能够创建一个 User 实体\nfunc TestCreateUser(t *testing.T) {\n    r := mux.NewRouter()\n\
  \    r.HandleFunc(\"/users\", createUser).Methods(\"POST\")\n\n    userJson := `{\"\
  firstname\": \"shiju\", \"lastname\": \"Varghese\", \"email\": \"shiju@xyz.com\"\
  }`\n\n    req, err := http.NewRequest(\n        \"POST\",\n        \"/users\",\n\
  \        strings.NewReader(userJson),\n    )\n    if err != nil {\n        t.Error(err)\n\
  \    }\n\n    w := httptest.NewRecorder()\n    r.ServeHTTP(w, req)\n\n    if w.Code\
  \ != 201 {\n        t.Errorf(\"HTTP Status expected: 201, got: %d\", w.Code)\n \
  \   }\n}\n```\n\n```go\n//用户故事 - User 实体的 Email Id 必须是唯一的\nfunc TestUniqueEmail(t\
  \ *testing.T) {\n    r := mux.NewRouter()\n    r.HandleFunc(\"/users\", createUser).Methods(\"\
  POST\")\n\n    userJson := `{\"firstname\": \"shiju\", \"lastname\": \"Varghese\"\
  , \"email\": \"shiju@xyz.com\"}`\n\n    req, err := http.NewRequest(\n        \"\
  POST\",\n        \"/users\",\n        strings.NewReader(userJson),\n    )\n    if\
  \ err != nil {\n        t.Error(err)\n    }\n\n    w := httptest.NewRecorder()\n\
  \    r.ServeHTTP(w, req)\n\n    if w.Code != 400 {\n        t.Error(\"Bad Request\
  \ expected, got: %d\", w.Code)\n    }\n}\n```\n\n```go\nfunc TestGetUsersClient(t\
  \ *testing.T) {\n    r := mux.NewRouter()\n    r.HandleFunc(\"/users\", getUsers).Methods(\"\
  GET\")\n    server := httptest.NewServer(r)\n    defer server.Close()\n\n    usersUrl\
  \ := fmt.Sprintf(\"%s/users\", server.URL)\n    request, err := http.NewRequest(\"\
  GET\", usersUrl, nil)\n\n    res, err := http.DefaultClient.Do(request)\n    if\
  \ err != nil {\n        t.Error(err)\n    }\n\n    if res.StatusCode != 200 {\n\
  \        t.Errorf(\"HTTP Status expected: 200, got: %d\", res.StatusCode)\n    }\n\
  }\n```\n\n```go\nfunc TestCreateUserClient(t *testing.T) {\n    r := mux.NewRouter()\n\
  \    r.HandleFunc(\"/users\", createUser).Methods(\"POST\")\n    server := httptest.NewServer(r)\n\
  \    defer server.Close()\n\n    usersUrl := fmt.Sprintf(\"%s/users\", server.URL)\n\
  \    fmt.Println(usersUrl)\n\n    userJson := `{\"firstname\": \"Rosmi\", \"lastname\"\
  : \"Shiju\", \"email\": \"rose@xyz.com\"}`\n\n    request, err := http.NewRequest(\"\
  POST\", usersUrl, strings.NewReader(userJson))\n\n    res, err := http.DefaultClient.Do(request)\n\
  \    if err != nil {\n        t.Error(err)\n    }\n\n    if res.StatusCode != 201\
  \ {\n        t.Errorf(\"HTTP Status expected: 201, got: %d\", res.StatusCode)\n\
  \    }\n}\n```\n\n针对这些用户故事编写了三个测试用例。请按照以下步骤编写每个测试用例：\n\n-   使用 `Gorilla mux` 包创建一个路由器实例，并配置多路复用器。\n\
  -   使用 `http.NewRequest` 函数创建一个 HTTP 请求。\n-   使用 `httptest.NewRecorder` 函数创建一个 `ResponseRecorder`\
  \ 对象。\n-   通过调用 `ServeHTTP` 方法，将 `ResponseRecorder` 对象和 `Request` 对象发送给多路复用器。\n\
  -   检查 `ResponseRecorder` 对象，以检查返回的 HTTP 响应。\n\n让我们来探索测试函数 `TestGetUsers` 的代码：\n\
  \n配置多路复用器以对 `\"/users\"` 执行 HTTP `Get` 请求：\n\n```go\nr := mux.NewRouter()\nr.HandleFunc(\"\
  /users\", getUsers).Methods(\"GET\")\n```\n\n使用 `http.NewRequest` 创建 HTTP 请求对象，以便将此对象发送给多路复用器：\n\
  \n```go\nreq, err := http.NewRequest(\"GET\", \"/users\", nil)\nif err != nil {\n\
  \    t.Error(err)\n}\n```\n\n使用 `httptest.NewRecorder` 函数创建一个 `ResponseRecorder`\
  \ 对象，用于记录返回的 HTTP 响应：\n\n```go\nw := httptest.NewRecorder()\n```\n\n通过提供 `ResponseRecorder`\
  \ 和 `Request` 对象，调用多路复用器的 `ServeHTTP` 方法，以对 `\"/users\"` 发起 HTTP `Get` 请求，该请求将调用\
  \ `getUsers` 处理函数：\n\n```go\nr.ServeHTTP(w, req)\n```\n\n`ResponseRecorder` 对象记录返回的响应，以便验证\
  \ HTTP 响应的行为。此处验证返回的 HTTP 响应状态码是否为 `200`：\n\n```go\nif w.Code != 200 {\n    t.Errorf(\"\
  HTTP Status expected: 200, got: %d\", w.Code)\n}\n```\n\n在测试函数 `TestCreateUser`\
  \ 中，提供了 JSON 数据用于创建一个 `User` 实体。此处验证返回的 HTTP 响应状态码是否为 `201`：\n\n```go\nif w.Code\
  \ != 201 {\n```\n\n\n`t.Errorf(\"HTTP Status expected: 201, got: %d\", w.Code)`\n\
  \n`}`\n\n测试函数 `TestUniqueEmail` 用于验证用户实体的电子邮件 ID 具有唯一性。为了测试这一行为，提供了与 `TestCreateUser`\
  \ 函数相同的 JSON 数据。由于测试用例按顺序执行，`TestUniqueEmail` 函数会在 `TestCreateUser` 函数执行之后运行。因为提供了重复的电子邮件，所以应返回状态码\
  \ `400`：\n\n`if w.Code != 400 {`\n\n`t.Error(\"Bad Request expected, got: %d\",\
  \ w.Code)`\n\n`}`\n\n### 使用服务器进行测试\n\n在上一节中，我们编写了使用 `ResponseRecorder` 结构体类型的单元测试，该类型足以测试\
  \ HTTP 响应。`httptest` 包还提供了一个 `Server` 结构体类型，允许你创建 HTTP 服务器，用于执行端到端的 HTTP 测试，你可以通过\
  \ HTTP 客户端向该服务器发送 HTTP 请求。清单 10-9 测试了 HTTP 响应的行为，但并未创建 HTTP 服务器。相反，它将 HTTP `请求`和`ResponseRecorder`\
  \ 对象发送给了多路复用器。使用 `httptest.Server`，可以创建一个 HTTP 服务器，然后通过从 HTTP 客户端发送请求来测试其行为。\n\n\
  让我们使用 `httptest.Server` 类型编写单元测试，以测试清单 10-8 中编写的示例 HTTP 应用程序。在这些示例单元测试中，我们编写了测试用例，以验证对\
  \ `\"/users\"` 的 HTTP `Get` 操作和对 `\"/users\"` 的 HTTP `Post` 操作的行为。这些单元测试编写在 `main_test.go`\
  \ 测试套件文件中，该文件中已包含使用 `ResponseRecorder` 编写的单元测试。\n\n清单 10-10 提供了使用 `httptest.Server`\
  \ 的单元测试。\n\n**清单 10-10.** 在 main_test.go 中使用 Server 对 HTTP API 服务器进行单元测试\n\n```\n\
  func TestGetUsersClient(t *testing.T) {\n\n\tr := mux.NewRouter()\n\n\tr.HandleFunc(\"\
  /users\", getUsers).Methods(\"GET\")\n\n\tserver := httptest.NewServer(r)\n\n\t\
  defer server.Close()\n\n\tusersUrl := fmt.Sprintf(\"%s/users\", server.URL)\n\n\t\
  request, err := http.NewRequest(\"GET\", usersUrl, nil)\n\n\tres, err := http.DefaultClient.Do(request)\n\
  \n\tif err != nil {\n\n\t\tt.Error(err)\n\n\t}\n\n\tif res.StatusCode != 200 {\n\
  \n\t\tt.Errorf(\"HTTP Status expected: 200, got: %d\", res.StatusCode)\n\n\t}\n\n\
  }\n\nfunc TestCreateUserClient(t *testing.T) {\n\n\tr := mux.NewRouter()\n\n\tr.HandleFunc(\"\
  /users\", createUser).Methods(\"POST\")\n\n\tserver := httptest.NewServer(r)\n\n\
  \tdefer server.Close()\n\n\tusersUrl := fmt.Sprintf(\"%s/users\", server.URL)\n\n\
  \tuserJson := `{\"firstname\": \"Rosmi\", \"lastname\": \"Shiju\", \"email\": \"\
  rose@xyz.com\"}`\n\n\trequest, err := http.NewRequest(\"POST\", usersUrl, strings.NewReader(userJson))\n\
  \n\tres, err := http.DefaultClient.Do(request)\n\n\tif err != nil {\n\n\t\tt.Error(err)\n\
  \n\t}\n\n\tif res.StatusCode != 201 {\n\n\t\tt.Errorf(\"HTTP Status expected: 201,\
  \ got: %d\", res.StatusCode)\n\n\t}\n\n}\n```\n\n使用 `httptest.Server`，我们编写了两个测试函数：`TestGetUsersClient`\
  \ 和 `TestCreateUserClient`。在这些测试用例中，创建了一个 HTTP 服务器，并通过从 HTTP 客户端向其发送 HTTP 请求来测试其行为。\n\
  \n请按照以下步骤编写每个测试用例：\n\n1.  使用 `Gorilla mux` 包创建一个路由器实例，并配置多路复用器。\n2.  使用 `httptest.NewServer`\
  \ 函数创建一个 HTTP 服务器。\n3.  使用 `http.NewRequest` 函数创建一个 `Request` 对象。\n4.  使用 `http.Client`\
  \ 对象的 `Do` 方法向服务器发送 HTTP 请求。\n5.  检查 `Response` 对象以查看返回的 HTTP 响应。\n\n让我们来分析测试函数\
  \ `TestGetUsersClient`。首先，配置多路复用器以对 `\"/users\"` 执行 HTTP `Get` 请求：\n\n```\nr :=\
  \ mux.NewRouter()\nr.HandleFunc(\"/users\", getUsers).Methods(\"GET\")\n```\n\n\
  使用 `httptest.NewServer` 函数创建一个 HTTP 服务器。`NewServer` 函数会启动并返回一个新的 HTTP 服务器。`Server`\
  \ 对象的 `Close` 方法被添加到延迟函数列表中。\n\n\n\n`server := httptest.NewServer(r)`\n\n`defer\
  \ server.Close()`\n\n通过 `http.NewRequest` 函数创建一个 HTTP 请求，并使用 `http.Client` 对象的 `Do`\
  \ 方法发送 HTTP 请求。`http.Client` 对象通过 `http.DefaultClient` 创建。调用 `Do` 方法，该方法发送 HTTP\
  \ 请求并返回 HTTP 响应：\n\n`usersUrl := fmt.Sprintf(\"%s/users\", server.URL)`\n\n`request,\
  \ err := http.NewRequest(\"GET\", usersUrl, nil)`\n\n`res, err := http.DefaultClient.Do(request)`\n\
  \n此处，向 `NewRequest` 函数提供了 `nil` 作为请求参数，因为这是一个 HTTP `Get` 请求。\n\n最后，验证 HTTP 服务器返回的\
  \ HTTP 响应的行为：\n\n```\nif res.StatusCode != 200 {\n    t.Errorf(\"HTTP Status expected:\
  \ 200, got: %d\", res.StatusCode)\n}\n```\n\n`TestCreateUserClient` 用于测试 `\"/users\"\
  ` 上的 HTTP `Post` 请求。由于这是一个 HTTP `Post` 请求，必须向服务器发送数据以创建 `User` 实体。当调用 `http.NewRequest`\
  \ 函数创建 HTTP 请求时，JSON 数据作为请求参数提供。\n\n以下是用于在 `\"/users\"` 上向服务器提供 JSON 数据以执行 HTTP\
  \ `Post` 请求的代码块：\n\n`usersUrl := fmt.Sprintf(\"%s/users\", server.URL)`\n\n`userJson\
  \ := `{\"firstname\": \"Rosmi\", \"lastname\": \"Shiju\", \"email\": \"rose@xyz.com\"\
  }` `\n\n`request, err := http.NewRequest(\"POST\", usersUrl, strings.NewReader(userJson))`\n\
  \n如果对 `\"/users\"` 的请求成功，应返回 HTTP 状态码 `201`。验证过程如下：\n\n```\nif res.StatusCode !=\
  \ 201 {\n    t.Errorf(\"HTTP Status expected: 201, got: %d\", res.StatusCode)\n\
  }\n```\n\n### Go 语言中的 BDD 测试\n\nGo 语言的 `testing` 和 `httptest` 标准库包为编写自动化单元测试提供了坚实基础。这些包的优势在于提供了许多扩展点，因此你可以轻松地将它们与其他自定义包结合使用。\n\
  \n本节讨论两个第三方包：`Ginkgo` 和 `Gomega`。`Ginkgo` 是一个基于行为驱动开发 (BDD) 的测试框架，它允许你用 Go 编写富有表达力的测试来指定应用程序的行为。如果你在软件开发过程中实践\
  \ BDD，`Ginkgo` 是一个绝佳的包选择。`Gomega` 是一个匹配器库，与 `Ginkgo` 包搭配使用效果最佳。虽然 `Gomega` 是 `Ginkgo`\
  \ 的首选匹配库，但其设计是匹配器无关的。\n\n#### 行为驱动开发 (BDD)\n\nBDD 是一种源于 TDD 和其他敏捷实践的软件开发过程。BDD 旨在为敏捷软件交付打造一种有效的软件开发实践。它是从许多敏捷实践（主要来自\
  \ TDD）中演化而来的实践方法。TDD 中的“测试”一词在那些于软件开发过程中实践 TDD 的开发人员群体中曾引发过混淆。\n\n尽管 TDD 是一种软件开发过程和设计理念，但许多开发者误以为它只关乎测试。然而，TDD\
  \ 的理念是通过编写单元测试来设计代码。它本质上是关于应用行为的描述和验证。BDD 是 TDD 的延伸，其重点从“测试”转向了“行为”。在 BDD 中，你通过自动化测试来指定行为，并基于行为编写代码。\n\
  \n#### 使用 Ginkgo 进行行为驱动开发\n\n如果你对自动化测试有基本了解，就能轻松采用 BDD 风格的测试。在 BDD 中，使用术语“行为”而非“测试”。让我们看看如何使用\
  \ `Ginkgo` 及其首选的匹配器库 `Gomega` 来编写 BDD 风格的测试。\n\n##### 重构 HTTP API\n\n让我们为清单 10-8\
  \ 中编写的示例 HTTP 服务器编写 BDD 风格的测试。编写自动化单元测试时，你必须通过应用松耦合设计使代码具备可测试性，从而轻松编写测试。让我们重构清单\
  \ 10-8 中的 HTTP 服务器。\n\n\n\n图 10-4 展示了重构后应用程序的目录结构。\n\n![A978-1-4842-1052-9_10_Fig4_HTML.jpg](img/A978-1-4842-1052-9_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 列表 10-8 中重构后应用程序的目录结构\n\n列表 10-8 将所有内容实现在一个源文件中：`main` 包中的 `main.go`。在重构后的应用程序中，代码被实现在两个包中：`lib`\
  \ 和 `main`。`main` 包包含提供应用程序入口点的 `main.go` 文件，而所有应用程序逻辑都被移入了 `lib` 包。\n\n`lib` 包包含以下源文件：\n\
  \n- `handlers.go` 包含 HTTP 处理程序，并提供了使用 `Gorilla mux` 设置路由的实现。\n- `repository.go`\
  \ 包含持久化逻辑和持久化存储。\n\n`lib` 目录中的其他源文件提供了用于 BDD 自动化测试的实现，但它们被放在 `lib_test` 包中。（此主题将在本章后面讨论。）\n\
  \n列表 10-11 提供了 `lib` 包中的 `handlers.go` 代码。\n\n列表 10-11. `lib` 包中的 `handlers.go`\n\
  \n```\npackage lib\n\nimport (\n\t\"encoding/json\"\n\t\"net/http\"\n\t\"github.com/gorilla/mux\"\
  \n)\n\nfunc GetUsers(repo UserRepository) http.Handler {\n\treturn http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\n\t\tuserStore := repo.GetAll()\n\t\t\
  users, err := json.Marshal(userStore)\n\t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\
  \t\t\treturn\n\t\t}\n\t\tw.Header().Set(\"Content-Type\", \"application/json\")\n\
  \t\tw.WriteHeader(http.StatusOK)\n\t\tw.Write(users)\n\t})\n}\n\nfunc CreateUser(repo\
  \ UserRepository) http.Handler {\n\treturn http.HandlerFunc(func(w http.ResponseWriter,\
  \ r *http.Request) {\n\t\tvar user User\n\t\terr := json.NewDecoder(r.Body).Decode(&user)\n\
  \t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\t\
  return\n\t\t}\n\t\terr = repo.Create(user)\n\t\tif err != nil {\n\t\t\tw.WriteHeader(http.StatusBadRequest)\n\
  \t\t\treturn\n\t\t}\n\t\tw.WriteHeader(http.StatusCreated)\n\t})\n}\n\nfunc SetUserRoutes()\
  \ *mux.Router {\n\tuserRepository := NewInMemoryUserRepo()\n\tr := mux.NewRouter()\n\
  \tr.Handle(\"/users\", CreateUser(userRepository)).Methods(\"POST\")\n\tr.Handle(\"\
  /users\", GetUsers(userRepository)).Methods(\"GET\")\n\treturn r\n}\n```\n\nHTTP\
  \ 处理程序函数被重构，以获取一个实现持久化逻辑的参数值。处理程序函数通过调用 `http.HandlerFunc` 返回一个 `http.Handler`。这些处理程序函数有一个\
  \ `UserRepository` 类型的参数，该类型是在 `repository.go` 文件中定义的接口。由于它是一个接口，你可以为此类型提供任何具体的实现。例如，你可以分别为应用程序代码和自动化测试提供\
  \ `UserRepository` 类型的实现，这能提供更好的代码可测试性。对于应用程序代码，你可以提供一个 `UserRepository` 接口的实现，以在真实数据库上实现持久化逻辑。但在从自动化测试调用处理程序函数时，你可以提供一个\
  \ `UserRepository` 接口的伪造实现，以在无需访问真实数据库时模拟其功能。当你编写测试时，可能需要在许多地方像这样模拟接口。\n\n列表 10-12\
  \ 提供了 `lib` 包中 `repository.go` 的源代码。\n\n列表 10-12. `lib` 包中的 `repository.go`\n\n\
  ```\npackage lib\n\nimport (\n\t\"errors\"\n)\n\ntype User struct {\n\tFirstName\
  \ string `json:\"firstname\"`\n\tLastName  string `json:\"lastname\"`\n\tEmail \
  \    string `json:\"email\"`\n}\n\ntype UserRepository interface {\n\tGetAll() []User\n\
  \tCreate(User) error\n\tValidate(User) error\n}\n\ntype InMemoryUserRepository struct\
  \ {\n\tDataStore []User\n}\n\nfunc (repo *InMemoryUserRepository) GetAll() []User\
  \ {\n\treturn repo.DataStore\n}\n```\n\n\n```go\nfunc (repo *InMemoryUserRepository)\
  \ Create(user User) error {\n    err := repo.Validate(user)\n    if err != nil {\n\
  \        return err\n    }\n    repo.DataStore = append(repo.DataStore, user)\n\
  \    return nil\n}\n\nfunc (repo *InMemoryUserRepository) Validate(user User) error\
  \ {\n    for _, u := range repo.DataStore {\n        if u.Email == user.Email {\n\
  \            return errors.New(\"The Email is already exists\")\n        }\n   \
  \ }\n    return nil\n}\n\nfunc NewInMemoryUserRepo() *InMemoryUserRepository {\n\
  \    return &InMemoryUserRepository{DataStore: []User{}}\n}\n```\n\n在源文件`repository.go`中，定义了一个名为`UserRepository`的接口，该接口为模型实体`User`提供了持久化逻辑。`Validate`函数用于验证`User`实体是否具有重复的电子邮件\
  \ ID，并在给定电子邮件 ID 已存在时返回错误：\n\n```go\ntype UserRepository interface {\n    GetAll()\
  \ []User\n    Create(User) error\n    Validate(User) error\n}\n```\n\n提供了`UserRepository`的一个实现，即`InMemoryUserRepository`，它将`User`对象持久化到切片中。（在此示例中使用切片作为数据存储；在实际实现中，它可能是诸如\
  \ MongoDB 之类的数据库。）\n\n在文件`main.go`中启动了一个 HTTP 服务器。列表 10-13 提供了`main`包中的`main.go`的源代码。\n\
  \n**列表 10-13. `main`包中的`main.go`**\n\n```go\npackage main\n\nimport (\n    \"net/http\"\
  \n    \"github.com/shijuvar/go-web/chapter-10/httptestbdd/lib\"\n)\n\nfunc main()\
  \ {\n    routers := lib.SetUserRoutes()\n    http.ListenAndServe(\":8080\", routers)\n\
  }\n```\n\n`main`包中的`main`函数会启动 HTTP 服务器。\n\n##### 编写 BDD 风格的测试\n\nHTTP API 应用程序已经重构，使其更易于测试，这样您就可以轻松编写自动化测试。现在，让我们专注于根据\
  \ BDD 方法论编写测试。与 TDD 类似，在编写代码之前，先定义用户故事并将其转化为测试用例。BDD 的主要目标是在编写生产代码之前，以更具表现力的方式定义行为，以便您可以轻松地基于定义明确的行为来开发应用程序。由于本书并非主要关注敏捷实践和\
  \ BDD，因此并未遵循 BDD 的确切开发过程，而是侧重于如何使用 Go 第三方库编写 BDD 风格的测试。\n\n`Ginkgo`包与其首选的匹配器库`Gomega`配合使用，用于在测试用例中指定行为。\n\
  \n###### 安装 Ginkgo 和 Gomega\n\n要安装`Ginkgo`和`Gomega`，请在命令行窗口中运行以下命令：\n\n```shell\n\
  go get github.com/onsi/ginkgo/ginkgo\ngo get github.com/onsi/gomega\n```\n\n`Ginkgo`包还提供了一个名为`ginkgo`的可执行程序，可用于引导测试套件文件和运行测试。当安装`ginkgo`包时，它还会在`$GOPATH/bin`下安装`ginkgo`可执行文件。\n\
  \n要使用`Ginkgo`和`Gomega`，您必须将这些包添加到导入列表中：\n\n```go\nimport (\n    \"github.com/onsi/ginkgo\"\
  \n    \"github.com/onsi/gomega\"\n)\n```\n\n###### 引导测试套件\n\n要为某个包编写使用`Ginkgo`的测试，您必须首先通过在命令行窗口中运行以下命令来创建一个测试套件文件：\n\
  \n```shell\nginkgo bootstrap\n```\n\n让我们导航到`lib`目录，然后运行`ginkgo bootstrap`命令。它会生成一个名为`lib_suite_test.go`的文件，其中包含如列表\
  \ 10-14 所示的代码。\n\n**列表 10-14. `lib_test`包中的测试套件文件`lib_suite_test.go`**\n\n```go\n\
  package lib_test\n\nimport (\n    . \"github.com/onsi/ginkgo\"\n    . \"github.com/onsi/gomega\"\
  \n    \"testing\"\n)\n\nfunc TestLib(t *testing.T) {\n    RegisterFailHandler(Fail)\n\
  \    RunSpecs(t, \"Lib Suite\")\n}\n```\n\n生成的源文件将被放置到名为`lib_test`的包中，该包将测试与位于`lib`包中的应用程序代码隔离开来。Go\
  \ 允许您直接将`lib_test`包放在`lib`包目录内。对于测试套件文件和测试，您也可以将包名更改为`lib`。\n\n\n# 排版结果\n\n`lib_suite_test.go`的源代码显示，**Ginkgo**\
  \ 利用了 Go 现有的测试基础设施。你可以通过在命令行窗口中运行`\"go test\"`或`\"ginkgo\"`命令来运行测试套件。\n\n让我们来探索这个套件文件：\n\
  \n*   `ginkgo`和`gomega`包使用了点导入（`.`），这允许你在调用`ginkgo`和`gomega`包的导出标识符时无需使用限定符。\n*\
  \   `RegisterFailHandler(Fail)`语句连接了**Ginkgo**和**Gomega**。**Gomega**被用作**Ginkgo**的匹配器库。\n\
  *   `RunSpecs(t, \"Lib Suite\")`语句告诉**Ginkgo**启动测试套件。如果任何一个规格测试失败，**Ginkgo**会自动使`testing.T`测试失败。\n\
  \n###### 向套件中添加规格测试\n\n虽然创建了一个名为`lib_suite_test.go`的测试套件文件，但要运行测试套件，需要添加测试文件来向套件中添加规格。让我们在命令行窗口中使用`ginkgo\
  \ generate`命令生成一个测试文件：\n\n`ginkgo generate users`\n\n此命令将生成一个名为`users_test.go`的测试文件，其内容如代码清单\
  \ 10-15 所示。如前所述，测试被编写在`lib`目录下的`lib_test`包中，Go 允许这样做。如果你希望使用`lib`包进行测试，也可以这么做。\n\
  \n**代码清单 10-15.** `ginkgo`生成的测试文件`users_test.go`\n\n```\npackage lib_test\n\nimport\
  \ (\n    . \"lib\"\n    . \"github.com/onsi/ginkgo\"\n    . \"github.com/onsi/gomega\"\
  \n)\n\nvar _ = Describe(\"Users\", func() {\n})\n```\n\n生成的测试文件包含了使用点导入（`.`）导入`ginkgo`和`gomega`包的代码。因为测试文件是编写在`lib_test`包中的，所以必须导入`lib`包。由于对包使用了点导入（`.`），所以可以直接调用这些包的导出标识符，无需使用限定符。\n\
  \n在 BDD 风格的测试中，通过编写规格来定义代码的行为。使用**Ginkgo**时，规格是在顶层的`Describe`容器内，通过`Ginkgo Describe`函数编写的。**Ginkgo**使用了`\"\
  var _ =\"`的技巧来在顶层评估`Describe`函数，而无需`init`函数。\n\n###### 使用容器组织规格测试\n\n现在，已经创建了一个基本的测试文件来为应用程序代码编写规格。让我们使用`Ginkgo`包提供的函数来组织这些规格。\n\
  \n**代码清单 10-16** 提供了`Users`规格的高级结构。\n\n**代码清单 10-16.** `Users`规格的高级结构\n\n```\nvar\
  \ _ = Describe(\"Users\", func() {\n    BeforeEach(func() {\n    })\n\n    Describe(\"\
  获取用户\", func() {\n        Context(\"获取所有用户\", func() {\n            It(\"应获取用户列表\"\
  , func() {\n            })\n        })\n    })\n\n    Describe(\"创建新用户\", func()\
  \ {\n        Context(\"提供有效的用户数据\", func() {\n            It(\"应创建新用户并获得 HTTP 状态码:\
  \ 201\", func() {\n            })\n        })\n\n        Context(\"提供包含重复邮箱 id 的用户数据\"\
  , func() {\n            It(\"应获得 HTTP 状态码: 400\", func() {\n            })\n   \
  \     })\n    })\n})\n```\n\n`Describe`块用于描述代码的各个独立行为。在`Describe`容器内部，可以编写`Context`块和`It`块。`Context`块用于指定某个独立行为下的不同上下文。你可以在一个`Describe`块内编写多个`Context`块。而在`Describe`或`Context`容器内的`It`块中编写具体的规格。\n\
  \n`BeforeEach`块在每个`It`块之前运行，可用于在运行每个规格之前编写逻辑。\n\n###### 在测试文件中编写规格\n\n在上一节中，我们指定了高级规格。在本节中，我们将通过在`It`块中编写具体实现来完成测试文件。在测试中，我们通过向多路复用器发送请求来调用\
  \ HTTP 处理函数。\n\n让我们探讨一下在代码清单 10-11 中编写的一个 HTTP 处理函数：\n\n```\nfunc GetUsers(repo\
  \ UserRepository) http.Handler {\n```\n\n\n```go\nreturn http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\n\n\tuserStore := repo.GetAll()\n\n\t\
  users, err := json.Marshal(userStore)\n\n\tif err != nil {\n\n\t\tw.WriteHeader(http.StatusInternalServerError)\n\
  \n\t\treturn\n\n\t}\n\n\tw.Header().Set(\"Content-Type\", \"application/json\")\n\
  \n\tw.WriteHeader(http.StatusOK)\n\n\tw.Write(users)\n\n\t})\n\n}\n```\n\n`GetUsers`函数有一个类型为`UserRepository`的参数，该参数是一个接口：\n\
  \n```go\ntype UserRepository interface {\n\n\tGetAll() []User\n\n\tCreate(User)\
  \ error\n\n\tValidate(User) error\n\n}\n```\n\n在应用程序代码中，为`UserRepository`接口提供了一个具体实现（`InMemoryUserRepository`），该实现将持久化操作应用于内存中的集合数据。当你开发实际应用时，可能会将应用数据持久化到数据库中。在编写测试时，你可能希望提供模拟实现来避免持久化到数据库。由于处理函数期望将`UserRepository`的具体实现作为参数值，你可以在测试中提供`UserRepository`的一个独立版本来调用处理函数。\n\
  \n清单 10-17 提供了用于测试的`UserRepository`接口的具体实现。\n\n**清单 10-17. users_tests.go 中 UserRepository\
  \ 的实现**\n\n```go\ntype FakeUserRepository struct {\n\n\tDataStore []User\n\n}\n\n\
  func (repo *FakeUserRepository) GetAll() []User {\n\n\treturn repo.DataStore\n\n\
  }\n\nfunc (repo *FakeUserRepository) Create(user User) error {\n\n\terr := repo.Validate(user)\n\
  \n\tif err != nil {\n\n\t\treturn err\n\n\t}\n\n\trepo.DataStore = append(repo.DataStore,\
  \ user)\n\n\treturn nil\n\n}\n\nfunc (repo *FakeUserRepository) Validate(user User)\
  \ error {\n\n\tfor _, u := range repo.DataStore {\n\n\t\tif u.Email == user.Email\
  \ {\n\n\t\t\treturn errors.New(\"The Email is already exists\")\n\n\t\t}\n\n\t}\n\
  \n\treturn nil\n\n}\n\nfunc NewFakeUserRepo() *FakeUserRepository {\n\n\treturn\
  \ &FakeUserRepository{\n\n\t\tDataStore: []User{\n\n\t\t\tUser{\"Shiju\", \"Varghese\"\
  , \"shiju@xyz.com\"},\n\n\t\t\tUser{\"Rosmi\", \"Shiju\", \"rose@xyz.com\"},\n\n\
  \t\t\tUser{\"Irene\", \"Rose\", \"irene@xyz.com\"},\n\n\t\t},\n\n\t}\n\n}\n```\n\
  \n`FakeUserRepository`提供了为测试编写的`UserRepository`接口的实现。你可以通过调用`NewFakeUserRepo`函数来创建`FakeUserRepository`的实例，该函数还提供了三个`User`对象的模拟数据。`FakeUserRepository`类型是一种测试替身（test\
  \ double），这是单元测试中用于描述任何为了测试目的而替换生产对象的通用术语。在这里，`InMemoryUserRepository`被替换为`FakeUserRepository`以进行测试。\n\
  \n清单 10-18 提供了`users_test.go`的完整版本，其中实现了所有规格。\n\n**清单 10-18. lib_test 包中 users_tests.go\
  \ 的完整版本**\n\n```go\npackage lib_test\n\nimport (\n\n\t\"encoding/json\"\n\n\t\"\
  errors\"\n\n\t\"net/http\"\n\n\t\"net/http/httptest\"\n\n\t\"strings\"\n\n\t\"github.com/gorilla/mux\"\
  \n\n\t. \"github.com/onsi/ginkgo\"\n\n\t. \"github.com/onsi/gomega\"\n\n\t. \"github.com/shijuvar/go-web/chapter-10/httptestbdd/lib\"\
  \n\n)\n\nvar _ = Describe(\"Users\", func() {\n\n\tuserRepository := NewFakeUserRepo()\n\
  \n\tvar r *mux.Router\n\n\tvar w *httptest.ResponseRecorder\n\n\tBeforeEach(func()\
  \ {\n\n\t\tr = mux.NewRouter()\n\n\t})\n\n\tDescribe(\"Get Users\", func() {\n\n\
  \t\tContext(\"Get all Users\", func() {\n\n\t\t\t//providing mocked data of 3 users\n\
  \t\t\tIt(\"should get list of Users\", func() {\n\n\t\t\t\tr.Handle(\"/users\",\
  \ GetUsers(userRepository)).Methods(\"GET\")\n\n\t\t\t\treq, err := http.NewRequest(\"\
  GET\", \"/users\", nil)\n\n\t\t\t\tExpect(err).NotTo(HaveOccurred())\n\n\t\t\t\t\
  w = httptest.NewRecorder()\n\n\t\t\t\tr.ServeHTTP(w, req)\n\n\t\t\t\tExpect(w.Code).To(Equal(200))\n\
  \n\t\t\t\tvar users []User\n\n\t\t\t\tjson.Unmarshal(w.Body.Bytes(), &users)\n\n\
  \t\t\t\t//Verifying mocked data of 3 users\n\t\t\t\tExpect(len(users)).To(Equal(3))\n\
