  '
- "# 10. 测试 Go 应用\n\n自动化测试是软件工程中一项确保应用质量的重要实践。如果你关心应用质量，就应该编写自动化测试来验证应用组件的行为。在 Go\
  \ 应用中，自动化测试可以确保 Go 包按照设计的方式工作。Go 通过其标准库包和工具支持提供了基础的测试能力。在本章中，你将学习如何使用标准库包和第三方包编写单元测试。\n\
  \n#### 单元测试\n\n开发可靠的软件系统并长期维护并非易事。在开发应用时，你必须确保它们每次都能按预期工作。一个好的软件系统应该是可维护的，以便你能随时修改应用的功能而不会破坏应用的任何部分。当你修改应用的某些部分时，不应破坏其他部分的功能。因此，你需要采用良好的软件工程实践来确保应用质量。单元测试是一种重要的软件开发实践，可用于确保这种质量。\n\
  \n单元测试是一种自动化测试过程，其中将应用中可测试的最小软件单元（称为单元）单独且独立地进行测试，以确定它们是否完全按照设计运行。编写单元测试时，将单元（最小的可测试部分）与代码的其他部分隔离开来，以独立地测试应用代码非常重要。编写单元测试时，你应该确定要测试的单元。\n\
  \n在面向对象编程中，最小的单元可能是一个属于类的方法。在过程式编程中，最小的单元可能是一个单一函数。在 Go 程序中，函数或方法可被视为一个单元。但这并不一定意味着一个函数就必然是一个单元，因为具体情况中，应用功能的上下文和软件设计将决定哪部分可以被视为一个单元。\n\
  \n### 测试驱动开发（TDD）\n\n测试驱动开发（TDD）是一种遵循“测试优先”开发原则的软件开发过程，即在生产代码之前编写单元测试。TDD 是一种设计方法，鼓励开发者在编写代码前思考他们的实现，这与开发用户界面原型类似。原型设计可以让你了解将为应用开发什么样的用户界面。\n\
  \n\n\n在 TDD 中，你首先编写一个单元测试，该测试在生产代码之前定义了一个新识别的需求或期望的改进，这让你对将要开发的内容有所了解。你针对新识别的功能需求编写一个单元测试，开发过程从新添加的单元测试开始。开发人员必须清楚地理解功能需求才能编写新的单元测试。在纯粹的\
  \ TDD 方法中，你在编写实现之前运行所有单元测试以及新添加的测试，并看到新测试失败。编写单元测试后，你编写足够的代码来通过测试。一旦测试成功，你可以毫无畏惧地重构应用程序代码，因为它已经被单元测试覆盖。\n\
  \nTDD 方法受到那些在软件交付中使用敏捷开发方法的人的高度推荐。敏捷方法论强调基于演进式方法开发软件，而不是遵循预先设计。当你基于演进式设计方法开发软件时，TDD\
  \ 会带来很多价值，因为你不断地为新识别的需求或期望的改进重构应用程序代码。由于你的应用程序代码被单元测试覆盖，你可以随时运行整套单元测试，以确保你的应用程序按设计工作。单元测试定义了你的应用程序设计。\n\
  \n以下是 TDD 中涉及的步骤：\n\n-   添加一个单元测试来定义一个新的功能需求。\n-   运行所有测试，看看新的单元测试是否失败。\n-   编写一些代码来通过测试。\n\
  -   运行测试。\n-   重构代码。\n\n这些步骤将在软件开发生命周期的整个演进过程中持续进行。\n\n本章的示例不采用测试优先的方法或 TDD 作为设计方法。它更侧重于编写自动化单元测试。TDD\
  \ 是使用自动化单元测试的高级技术，因此如果你知道如何编写自动化单元测试，就可以轻松实践 TDD。\n\n### 使用 Go 进行单元测试\n\nGo 通过其\
  \ `testing` 标准库包提供了编写自动化单元测试的核心功能。`testing` 包提供了编写自动化单元测试所需的所有基本功能，旨在与 `go test`\
  \ 命令一起使用。因此，你可以使用 `testing` 包编写单元测试，然后通过 `go test` 命令运行这些单元测试。就像提供 Web 编程基础模块并具有可扩展性的\
  \ `net/http` 包一样，`testing` 包在单元测试方面也发挥着同样的作用。\n\n`testing` 包缺少一些编写单元测试所需的高级功能，但有许多基于该包构建的第三方包提供了编写高级场景自动化单元测试所需的额外功能。除了\
  \ `testing` 包，Go 标准库还提供了另外两个包：`httptest`（`net/http/httptest`）提供 HTTP 测试的实用工具，以及\
  \ `quick`（`testing/quick`）提供帮助进行黑盒测试的实用函数。\n\n`testing` 包旨在与 `go test` 命令一起使用。为了执行它，用于编写与此命令一起使用的测试函数有一些命名约定和模式。\n\
  \n`go test` 命令查找以下约定来识别测试函数：\n\n`func TestXxx(*testing.T)`\n\n这里，`Xxx` 可以是任何以大写字母开头的字母数字字符串。\n\
  \n以下约定用于编写新的测试套件：\n\n-   创建一个以 `_test.go` 结尾的源文件。\n-   在测试套件内（源文件以 `_test.go` 结尾），编写签名为\
  \ `func TestXxx(*testing.T)` 的函数。\n\n你可以将测试套件文件放在与被测试的包相同的包中。当你构建包时，这些测试文件会被排除，但在运行\
  \ `go test` 命令时会被包含在内，该命令会重新编译每个包以及所有名称与文件模式 `\"*_test.go\"` 匹配的文件。\n\n要获取 `go test`\
  \ 的帮助，请运行以下命令：\n\n`go help test`\n\n要获取 `go test` 命令使用的各种标志的帮助，请运行以下命令：\n\n`go help\
  \ testflag`\n\n#### 编写单元测试\n\n让我们使用 `testing` 包编写一些单元测试（本章不关注测试优先的开发过程）。首先，让我们编写几个字符串实用函数来演示单元测试。\n\
  \n列表 [10-1] 提供了几个字符串实用函数，用于转换字符串参数的大小写并反转字符串参数。\n\n**列表 10-1.**  `utils.go` 中的字符串实用函数\n\
  \n```\npackage stringutils\n\nimport (\n    \"bytes\"\n    \"unicode\"\n)\n\n//\
  \ SwapCase 转换字符串参数的大小写\nfunc SwapCase(str string) string {\n    buf := &bytes.Buffer{}\n\
  \    for _, r := range str {\n        if unicode.IsUpper(r) {\n            buf.WriteRune(unicode.ToLower(r))\n\
  \        } else {\n            buf.WriteRune(unicode.ToUpper(r))\n        }\n  \
  \  }\n    return buf.String()\n}\n\n// Reverse 反转字符串参数\nfunc Reverse(s string) string\
  \ {\n    r := []rune(s)\n    for i, j := 0, len(r)-1; i < len(r)/2; i, j = i+1,\
  \ j-1 {\n        r[i], r[j] = r[j], r[i]\n    }\n    return string(r)\n}\n```\n\n\
  这里有两个函数需要测试：`SwapCase` 和 `Reverse`。`SwapCase` 函数转换字符串参数的大小写；`Reverse` 函数反转字符串参数。\n\
  \n让我们编写测试 `SwapCase` 和 `Reverse` 函数的测试用例。\n\n列表 [10-2] 在源文件 `utils_test.go` 中提供了测试。\n\
  \n**列表 10-2.**  `utils_test.go` 中 `stringutils` 包的单元测试\n\n```\npackage stringutils\n\
  \nimport (\n    \"testing\"\n)\n\n// TestSwapCase 函数 SwapCase 的测试用例\nfunc TestSwapCase(t\
  \ *testing.T) {\n    input, expected := \"Hello, World\", \"hELLO, wORLD\"\n   \
  \ result := SwapCase(input)\n    if result != expected {\n        t.Errorf(\"SwapCase(%q)\
  \ == %q, expected %q\", input, result, expected)\n    }\n}\n\n// TestReverse 函数\
  \ Reverse 的测试用例\nfunc TestReverse(t *testing.T) {\n    input, expected := \"Hello,\
  \ World\", \"dlroW ,olleH\"\n    result := Reverse(input)\n    if result != expected\
  \ {\n        t.Errorf(\"Reverse(%q) == %q, expected %q\", input, result, expected)\n\
  \    }\n}\n```\n\n测试套件文件 `utils_test.go` 创建在 `stringutils` 包目录中。在 `utils_test.go`\
  \ 文件中，编写了两个模式为 `func TestXxx(*testing.T)` 的测试函数。`TestSwapCase` 函数用于验证 `SwapCase`\
  \ 函数的行为，`TestReverse` 用于验证 `Reverse` 函数。\n\n如果测试结果与预期结果不匹配，可以调用 `Error`、`Fail` 或相关函数来指示测试用例失败。`Error`\
  \ 和 `Fail` 函数指示测试用例失败，但会继续执行其余的测试用例。如果你想在任何测试用例失败时停止执行，可以调用 `FailNow` 或 `Fatal`\
  \ 函数。`FailNow` 函数调用 `Fail` 函数并停止执行。`Fatal` 相当于 `Log` 后跟 `FailNow`。在这些测试用例中，调用 `Errorf`\
  \ 函数来指示失败：\n\n```\nif result != expected {\n    t.Errorf(\"SwapCase(%q) == %q, expected\
  \ %q\", input, result, expected)\n}\n```\n\n让我们运行测试用例。导航到 `stringutils` 包目录，然后在命令行窗口运行以下命令：\n\
