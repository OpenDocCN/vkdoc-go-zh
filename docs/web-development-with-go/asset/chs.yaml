  \n**图 11-19.** `listTasks` 操作的 HTTP `Request` 和 `Response`\n\n`listTasks` 操作是一个对\
  \ URI 端点 `http://localhost:8080/_ah/api/tasks/v1/tasks` 的 HTTP `Get` 请求。\n\n该应用已在由\
  \ Google App Engine SDK for Go 提供的本地 Web 开发服务器中进行了测试。你可以使用 `goapp` 工具将 Cloud Endpoints\
  \ 应用部署到 App Engine 的生产环境中。将 Cloud Endpoints 应用部署到生产环境的过程与普通 App Engine 应用完全相同。你必须在\
  \ `app.yaml` 文件中提供应用程序 ID 才能部署该应用。第 11.4.4 节提供了在 Google Developer Console 中创建项目和获取应用程序\
  \ ID 的说明。要将应用部署到生产环境，请从应用的 `root` 目录运行 `goapp` 工具：\n\n`goapp deploy`\n\n此命令将 Cloud\
  \ Endpoints 应用部署到由 Google Cloud 平台驱动的 App Engine 生产环境中。\n\n#### 生成客户端库\n\nCloud\
  \ Endpoints 应用不仅支持编写后端 API，还为客户端应用提供了有用的功能。Cloud Endpoints 允许你生成用于从客户端应用程序访问 API\
  \ 的客户端库，并为 iOS、Android、Dart 和 JavaScript 生成本地库。\n\n要为 iOS 生成 tasks API 的客户端库，请在终端窗口中运行以下命令：\n\
  \n```\n"
- "# 在 URL 中使用 rpc 后缀：\n$ URL='https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rpc'\n\
  $ curl -s $URL > tasks.rpc.discovery\n```\n\n此处，`\"app-id\"` 是 App Engine 应用的应用程序\
  \ ID。\n\n要为 Android 生成 tasks API 的客户端库，请在终端窗口中运行以下命令：\n\n```\n##### 在 URL 中使用 rest\
  \ 后缀\n$ URL='https://app-id.appspot.com/_ah/api/discovery/v1/apis/tasks/v1/rest'\n\
  $ curl -s $URL > tasks.rest.discovery\n$ endpointscfg.py gen_client_lib java tasks.rest.discovery\n\
  ```\n\n`endpointscfg.py` 工具从 `go_appengine` 目录（Google App Engine SDK for Go 的目录）运行，以生成用于\
  \ Android 应用程序的 Java 库。它应生成一个名为 `tasks.rest.zip` 的 zip 文件。\n\n### 总结\n\nGo 是一种为适配现代硬件和\
  \ IT 基础设施而设计的编程语言，用于构建大规模可扩展的应用。在云计算时代，Go 是构建可扩展应用的理想编程语言选择。借助 Google Cloud 平台，Go\
  \ 开发人员可以通过利用 Google Cloud 平台提供的工具和 API，轻松地在云上构建大规模可扩展的应用。\n\nGoogle Cloud 提供了 App\
  \ Engine，这是一种平台即服务（PaaS）产品，允许 Go 开发人员使用 App Engine SDK for Go 和用于各种云服务的 Go API 构建高度可扩展且可靠的\
  \ Web 应用。当你构建 App Engine 应用时，无需花时间管理 IT 基础设施。相反，你可以完全专注于构建应用，该应用可在需要增加计算资源时自动扩展。借助\
  \ App Engine，开发人员无需再处理系统管理、负载均衡、扩展和服务器维护等问题。\n\nApp Engine SDK for Go 提供了 `goapp`\
  \ 工具，允许你在开发 Web 服务器中测试 App Engine 应用。`goapp` 工具还可用于将 App Engine Web 应用部署到在 App Engine\
  \ 沙箱环境中运行的 Google Cloud 生产环境。\n\nApp Engine 环境提供了一个 `main` 包，因此你不能使用名为 `main` 的包。相反，你可以在你选择的包中编写\
  \ HTTP 处理程序逻辑。App Engine 应用可以轻松访问 Google Cloud 平台提供的许多云服务。当你在 App Engine 应用中利用这些云服务时，无需配置这些服务以与\
  \ App Engine 一起使用，因为你可以通过使用相应的 Go API 直接从应用中访问它们。\n\n\n\nGoogle Cloud 平台提供了多种托管服务用于持久化存储结构化数据，包括\
  \ `Google Cloud SQL`、`Google Cloud Datastore` 和 `Google Bigtable`。当构建需要处理大量数据的 `App\
  \ Engine` 应用时，`Google Cloud Datastore` 是最佳的数据库选择。你可以使用 `App Engine` 和 `Cloud Datastore`\
  \ 构建具有大规模扩展能力的 Web 应用，而无需花费时间管理 IT 基础设施。\n\n`Google Cloud Endpoints` 是一项 `App Engine`\
  \ 服务，用于为移动客户端应用和 Web 客户端应用构建后端 API。它提供了快速构建后端 API 所需的工具、库和功能，并能从 `App Engine` 应用中生成原生客户端库。虽然你可以使用常规的\
  \ `App Engine` 应用创建后端 API，但 `Cloud Endpoints` 通过提供额外功能简化了开发过程。`Cloud Endpoints`\
  \ 允许你为 iOS、Android、JavaScript 和 Dart 生成原生客户端库，从而使客户端应用开发者无需编写用于访问后端 API 的包装器。\n\n\
