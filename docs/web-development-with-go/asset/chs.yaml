  \n接口是一个契约，它为程序增加了可扩展性和可维护性，允许你根据抽象而非具体实现来编写程序。在示例程序中，`Users` 字段被定义为用户接口类型的切片，这样你就可以提供任何类型的对象来实现用户接口中定义的契约。如果你将\
  \ `Users` 属性的类型定义为 `Member` 类型的切片，那么为 `Users` 字段提供的值将仅限于 `Member` 类型的对象。\n\n####\
  \ 并发\n\n在开发大型应用程序时，可能需要完成多个任务才能执行程序。其他程序则由许多较小的子程序组成。当开发这类应用程序时，如果能够并发地执行这些任务和子程序，就可以提升性能。假设你正在开发一个基于\
  \ Web 的后端 API，许多并发用户正在访问该 API。如果你能在 Web 服务器上并发地处理这些并发的 Web 请求，就可以显著提高系统的性能和效率。\n\
  \n在开发 Web 应用程序和 Web API 时，管理大量并发用户确实是一个挑战。Go 语言旨在解决现代编程和大型系统面临的挑战。它在核心语言层面提供了对并发的支持，并将并发直接实现在其语言和运行时中。这有助于你轻松构建高性能系统。\n\
  \n许多编程环境通过额外的库来提供并发支持，但并发并非核心语言的内置特性。并发性是 Go 语言的主要卖点之一，与其简洁性和实用性齐名。在 Go 中，并发是通过使用两个独特的功能实现的：goroutine\
  \ 和 channel。\n\n\n### Goroutine（协程）\n\n在 Go 语言中，goroutine 是实现程序并发运行的主要机制。Goroutine\
  \ 允许你将函数与其他函数并发执行，通过将函数作为 goroutine 调用即可访问 Go 的并发能力。当你将一个函数创建为 goroutine 时，它会作为一个独立的任务单元，与其他\
  \ goroutine 并发运行。简而言之，goroutine 是由 Go 运行时管理的轻量级线程。\n\nGo 并发最强大的能力在于，所有与并发相关的内容完全由\
  \ Go 运行时管理，而非操作系统资源。Go 运行时拥有一个名为调度器的强大软件组件，它控制并管理所有与 goroutine 调度和运行相关的操作。由于 Go\
  \ 运行时完全控制着使用 goroutine 运行的并发任务，因此当你利用 Go 的并发能力时，它可以实现高性能并对应用程序提供更好的控制。\n\n要调用一个函数作为\
  \ goroutine，请使用关键字 `go`：\n\n```\ngo function()\n```\n\n由于 goroutine 被视为独立并发运行的单元，请确保所有\
  \ goroutine 在主程序终止前都得到执行。你可以通过使用 `sync` 标准库包提供的 `WaitGroup` 类型来实现这一点。\n\n清单 [3-18]\
  \ 是一个示例程序，其中启动了两个 goroutine，并在程序终止前执行它们。\n\n**清单 3-18.** 使用 Goroutine 实现并发\n\n```\n\
  // 此示例程序演示如何创建 goroutine\n\npackage main\n\nimport (\n    \"fmt\"\n    \"math/rand\"\
  \n    \"sync\"\n    \"time\"\n)\n\n// wg 用于等待程序完成 goroutine 的执行。\nvar wg sync.WaitGroup\n\
  \nfunc main() {\n    // 添加计数 2，每个 goroutine 对应一个。\n    wg.Add(2)\n    fmt.Println(\"\
  启动 Goroutines\")\n    // 启动一个标签为 \"A\" 的 goroutine\n    go printCounts(\"A\")\n\
  \    // 启动一个标签为 \"B\" 的 goroutine\n    go printCounts(\"B\")\n    // 等待 goroutine\
  \ 完成。\n    fmt.Println(\"等待完成\")\n    wg.Wait()\n    fmt.Println(\"\\n 终止程序\")\n\
  }\n\nfunc printCounts(label string) {\n    // 安排调用 WaitGroup 的 Done 方法以告知执行完毕。\n\
  \    defer wg.Done()\n    // 随机等待\n    for count := 1; count <= 10; count++ {\n\
  \        sleep := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) * time.Millisecond)\n\
  \        fmt.Printf(\"计数: %d 来自 %s\\n\", count, label)\n    }\n}\n```\n\n运行程序时，你会看到以下输出。由于程序执行过程中的随机等待，每次输出都会有所不同：\n\
  \n```\n启动 Goroutines\n等待完成\n计数: 1 来自 A\n计数: 1 来自 B\n计数: 2 来自 B\n计数: 2 来自 A\n计数:\
  \ 3 来自 B\n计数: 3 来自 A\n计数: 4 来自 A\n计数: 5 来自 A\n计数: 4 来自 B\n计数: 6 来自 A\n计数: 5 来自 B\n\
  计数: 7 来自 A\n计数: 6 来自 B\n计数: 7 来自 B\n计数: 8 来自 A\n计数: 8 来自 B\n计数: 9 来自 B\n计数: 9 来自\
  \ A\n计数: 10 来自 A\n计数: 10 来自 B\n终止程序\n```\n\n创建了一个名为 `printCounts` 的函数，该函数被作为 goroutine\
  \ 调用两次：\n\n```\n// 启动一个标签为 \"A\" 的 goroutine\ngo printCounts(\"A\")\n// 启动一个标签为\
  \ \"B\" 的 goroutine\ngo printCounts(\"B\")\n```\n\n为了确保所有 goroutine 在程序终止前都得到执行，使用了由\
  \ `sync` 包提供的 `WaitGroup`：\n\n```\nvar wg sync.WaitGroup\n```\n\n在 `main` 函数中，为两个\
  \ goroutine 向 `WaitGroup` 添加计数 `2`：\n\n```\nwg.Add(2)\n```\n\n使用关键字 `go` 启动两个 goroutine：\n\
  \n```\n// 启动一个标签为 \"A\" 的 goroutine\ngo printCounts(\"A\")\n// 启动一个标签为 \"B\" 的 goroutine\n\
  go printCounts(\"B\")\n```\n\n在 `printCounts` 函数中，打印了从 1 到 10 的值。为了演示效果，执行过程被随机延迟。\n\
  \n```\nfunc printCounts(label string) {\n    // 安排调用 WaitGroup 的 Done 方法以告知执行完毕。\n\
  \    defer wg.Done()\n    // 随机等待\n    for count := 1; count <= 10; count++ {\n\
  \        sleep := rand.Int63n(1000)\n        time.Sleep(time.Duration(sleep) * time.Millisecond)\n\
  \        fmt.Printf(\"计数: %d 来自 %s\\n\", count, label)\n    }\n}\n```\n\n在 `printCounts`\
  \ 函数的开头，安排了调用 `WaitGroup` 类型的 `Done` 方法，以告知 `main` 程序该 goroutine 已执行完毕。`WaitGroup`\
  \ 类型的 `Done` 方法通过使用关键字 `defer`（如[第 2 章]所述）来安排调用。这个关键字允许你在函数返回时安排其他函数被调用。在此示例中，当\
  \ goroutine 执行完毕时会调用 `Done` 方法，这会确保 `WaitGroup` 的值递减，以便 `main` 函数可以检查是否有 goroutine\
  \ 尚未执行。在 `main` 函数中，调用了 `WaitGroup` 的 `Wait` 方法，该方法会检查 `WaitGroup` 的计数，并阻塞程序直到计数变为零。当调用\
  \ `WaitGroup` 的 `Done` 方法时，计数会减一。在程序执行开始时，计数被设置为 2。当调用 `Wait` 时，它会等待计数变为零，从而确保两个\
  \ goroutine 在程序终止前都得到执行。当计数变为零时，程序终止：\n\n```\nwg.Wait()\n```\n\n### GOMAXPROCS 与并行性\n\
  \nGo 运行时调度器通过利用操作系统线程的数量来尝试同时执行 goroutine，从而管理 goroutine 的执行。操作系统线程的值取自 `GOMAXPROCS`\
  \ 环境变量。在 Go 1.5 之前，`GOMAXPROCS` 的默认设置为 1，这意味着 goroutine 默认在单个操作系统线程上运行。（请记住，Go 运行时可以在单个操作系统线程上执行数千个\
  \ goroutine。）从 Go 1.5 开始，`GOMAXPROCS` 的默认设置改为可用 CPU 的数量，由 `runtime` 包提供的 `NumCPU`\
  \ 函数确定。此默认行为让 Go 程序能够利用所有可用的 CPU 核心来并行运行 goroutine。`GOMAXPROCS` 的值可以通过显式设置 `GOMAXPROCS`\
  \ 环境变量或从程序中调用 `runtime.GOMAXPROCS` 来设定。\n\n通过提高 `GOMAXPROCS` 设置可以实现 goroutine 的同时执行。这种行为就是并行性。并发不是并行性；Go\
  \ 中的并发是指通过将程序分解为可以独立执行（利用可用资源）的 goroutine（作为子程序或任务）来设计程序。并行性则是关于一次完成大量计算。在并行性中，会利用更多的\
  \ CPU 核心来尽可能实现 goroutine 的同时执行。\n\n在许多情况下，并行性可以提供更好的性能，因为 Go 运行时可以利用计算机所有可用的计算资源来并行运行\
  \ goroutine。请记住，并行运行 goroutine 并不总能带来更好的性能，因为这取决于你的程序上下文。有时并发性可以胜过并行性，因为并行性可能会给操作系统资源带来更大压力。\n\
  \n你可以根据应用程序的上下文在程序中控制 `GOMAXPROCS` 设置。清单 [3-19] 是一个将 `GOMAXPROCS` 从其默认设置修改为 1 的代码块：\n\
  \n**清单 3-19.** 显式设置 GOMAXPROCS 设置\n\n```\nimport \"runtime\"\n\n// 设置 GOMAXPROCS\
  \ 的值。\nruntime.GOMAXPROCS(1)\n```\n\n**注：** 请查阅 Rob Pike 的精彩演讲 “Concurrency Is Not\
  \ Parallelism” 以了解并发与并行的区别：[`www.youtube.com/watch?v=cN_DpYBzKso`](http://www.youtube.com/watch?v=cN_DpYBzKso)\n\
  \n\n\n### 通道\n\n清单 `3-18` 创建了两个独立运行、无需相互通信的 goroutine。然而，有时 goroutine 之间需要通信来发送和接收数据，因此需要在\
  \ goroutine 之间进行同步。在许多编程环境中，并发程序之间的通信要么很复杂，要么功能有限。Go 允许你通过通道在 goroutine 之间进行通信，从而能够同步\
  \ goroutine 的执行。\n\n使用内置的 `make` 函数并借助关键字 `chan` 来声明通道，其后跟随类型，用于指定你要交换的数据类型：\n\n\
  `count := make(chan int)`\n\n这里声明了一个整数 `类型` 的通道，因此整数值将被传入通道。有两种类型的通道可用于 goroutine\
  \ 的同步：\n\n- 有缓冲通道\n- 无缓冲通道\n\n清单 `3-20` 是声明无缓冲通道和有缓冲通道的代码块。\n\n**清单 3-20.** 声明无缓冲通道和有缓冲通道\n\
  \n```\n// 无缓冲整数通道。\ncount := make(chan int)\n\n// 有缓冲整数通道，最多缓冲 10 个值。\ncount :=\
  \ make(chan int, 10)\n```\n\n当声明有缓冲通道时，必须指定通道容纳数据的容量。如果你尝试发送超过其容量的数据，将会收到错误提示。\n\
  \n#### 无缓冲通道\n\n无缓冲通道提供 goroutine 之间的同步通信，从而确保消息在它们之间传递。对于无缓冲通道，只有当存在相应的接收者准备好接收消息时，才允许发送消息。在这种情况下，通道的双方都必须等待，直到另一方准备好发送和接收消息。而对于有缓冲通道，即使没有对应的并发接收者来接收消息，也可以向通道中发送有限数量的消息。消息被发送到有缓冲通道后，再从通道中接收这些消息。与无缓冲通道不同，有缓冲通道无法保证消息的传递。\n\
  \n`<-` 运算符用于向通道发送值（见清单 `3-21`）。\n\n**清单 3-21.** 向通道发送值\n\n```\n// 有缓冲字符串通道。\nmessages\
  \ := make(chan string, 2)\n\n// 向通道发送一条消息。\nmessages <- \"Golang\"\n```\n\n要从通道接收消息，`<-`\
  \ 运算符被用作一元运算符（见清单 `3-22`）。\n\n**清单 3-22.** 从通道接收值\n\n```\n// 从通道接收一个字符串值。\nvalue\
  \ := <-messages\n```\n\n清单 `3-23` 是一个示例程序，演示了如何使用无缓冲通道在 goroutine 之间通信和同步数据。\n\n\
  **清单 3-23.** 使用无缓冲通道的示例程序\n\n```\npackage main\n\nimport (\n\t\"fmt\"\n\t\"sync\"\
  \n)\n\n// wg 用于等待程序结束。\nvar wg sync.WaitGroup\n\nfunc main() {\n\tcount := make(chan\
  \ int)\n\t// 添加计数 2，每个 goroutine 对应一个。\n\twg.Add(2)\n\tfmt.Println(\"启动 Goroutines\"\
  )\n\t//启动一个标签为 \"A\" 的 goroutine\n\tgo printCounts(\"A\", count)\n\t//启动一个标签为 \"\
  B\" 的 goroutine\n\tgo printCounts(\"B\", count)\n\tfmt.Println(\"通道开始\")\n\tcount\
  \ <- 1\n\t// 等待 goroutines 完成。\n\tfmt.Println(\"等待完成\")\n\twg.Wait()\n\tfmt.Println(\"\
  \\n 终止程序\")\n}\n\nfunc printCounts(label string, count chan int) {\n\t// 安排调用 WaitGroup\
  \ 的 Done 来告知我们已完成。\n\tdefer wg.Done()\n\tfor {\n\t\t//从通道接收消息\n\t\tval, ok := <-count\n\
  \t\tif !ok {\n\t\t\tfmt.Println(\"通道已关闭\")\n\t\t\treturn\n\t\t}\n\t\tfmt.Printf(\"\
  计数: %d 从 %s 接收 \\n\", val, label)\n\t\tif val == 10 {\n\t\t\tfmt.Printf(\"通道从 %s\
  \ 关闭 \\n\", label)\n\t\t\t// 关闭通道\n\t\t\tclose(count)\n\t\t\treturn\n\t\t}\n\t\t\
  val++\n\t\t// 将计数发回给另一个 goroutine。\n\t\tcount <- val\n\t}\n}\n```\n\n运行该程序时，输出可能会有所不同。你应该会看到类似于以下的输出：\n\
  \n```\n启动 Goroutines\n通道开始\n计数: 1 从 A 接收\n计数: 2 从 B 接收\n等待完成\n计数: 3 从 A 接收\n计数:\
  \ 4 从 B 接收\n计数: 5 从 A 接收\n计数: 6 从 B 接收\n计数: 7 从 A 接收\n计数: 8 从 B 接收\n计数: 9 从 A 接收\n\
  计数: 10 从 B 接收\n通道从 B 关闭\n通道已关闭\n终止程序\n```\n\n在这个程序中，两个 goroutine 使用无缓冲通道进行同步和通信。这里使用了一个整数类型的通道用于\
  \ goroutine 之间的数据交换。在 `main` 函数中，声明了无缓冲通道 `count` 用于两个 goroutine 之间的消息交换。为两个 goroutine\
  \ 在 `WaitGroup` 中添加了一个计数 2。然后通过传递该通道启动了两个 goroutine：\n\n```\ncount := make(chan\
  \ int)\n\n// 添加计数 2，每个 goroutine 对应一个。\nwg.Add(2)\n\n//启动一个标签为 \"A\" 的 goroutine\n\
  go printCounts(\"A\", count)\n\n//启动一个标签为 \"B\" 的 goroutine\ngo printCounts(\"B\"\
  , count)\n```\n\n在 `printCounts` 函数内部，使用了一个无限 `for` 循环，当从通道接收到值 `10` 时，从函数中返回。启动两个\
  \ goroutine 后，通过发送值 `1` 来启动通道，该值将由某个 goroutine 接收。无缓冲通道会阻塞接收者，直到通道中有消息可用。\n\n`printCounts`\
  \ 函数中的以下代码块会阻塞，直到值被发送到通道中：\n\n```\n//从通道接收消息\nval, ok := <-count\n```\n\n当从通道接收值时，可以使用赋值左侧的两个变量：一个是从通道接收的数据，另一个是表示通道是否可用的布尔值。如果通道已关闭，我们就从函数返回。\n\
  \n```\nif !ok {\n\tfmt.Println(\"通道已关闭\")\n\treturn\n}\n```\n\n当从通道接收到值 `10` 时，通道被关闭。如果接收到的通道值小于\
  \ `10`，则对该值进行自增，并将新值发送到通道中。这个过程会阻塞发送者，直到某个接收者从通道中接收到该值。\n\n```\nif val == 10 {\n\
  \tfmt.Printf(\"通道从 %s 关闭 \\n\", label)\n\t// 关闭通道\n\tclose(count)\n\treturn\n}\n\
  val++\n// 将计数发回给另一个 goroutine。\ncount <- val\n```\n\n关于无缓冲通道最重要的是：对通道的接收操作会阻塞 goroutine，直到通道获取到数据；对通道的发送操作会阻塞\
  \ goroutine，直到有接收者接收到数据，从而确保了 goroutine 之间的消息传递。如果你查看程序输出，就能清楚地理解通道的功能。\n\n\n\n\
  #### 缓冲通道\n\n无缓冲通道在 Goroutine 之间提供了一种同步的数据通信方式，能够确保消息的可靠投递。缓冲通道则与此不同。与无缓冲通道不同，缓冲通道在创建时会指定其可容纳的值的数量。缓冲通道在收到值之前，可以接受指定数量的值。\n\
  \n清单 3-24 是一个演示缓冲通道的基础示例程序。\n\n**清单 3-24.** 使用缓冲通道的示例程序\n\n```\npackage main\n\n\
  import \"fmt\"\n\nfunc main() {\n\n        messages := make(chan string, 2)\n\n\
  \        messages <- \"Golang\"\n        messages <- \"Gopher\"\n\n        //从缓冲通道接收值\n\
  \        fmt.Println(<-messages)\n        fmt.Println(<-messages)\n\n}\n```\n\n\
  你应该会看到以下输出：\n\n```\nGolang\nGopher\n```\n\n清单 3-24 是一个简单的示例程序，演示了无需任何 Goroutine\
  \ 就能使用的缓冲通道。它创建了一个 `messages` 通道，用于缓冲最多两个字符串值。值被发送到通道中，直到达到其容量（两个）。由于这个通道是缓冲的，值的发送无需依赖接收方来接收它们。如果你尝试添加超过其容量的值，将会遇到错误。一旦值被发送到缓冲通道中，就可以从通道中接收它们。\n\
  \n### 总结\n\nGo 的类型系统包含两种基本类型：具体类型和接口类型。你可以使用内置类型（如 `bool`、`int`、`string` 和 `float64`）来创建具体类型。你还可以创建复合类型，如数组、切片、映射和通道，以及自定义的用户定义类型。\n\
  \n在 Go 中，结构体用于创建用户定义类型。结构体类似于经典面向对象语言中的类，但与其他语言相比，其设计是独特的。结构体是类的轻量级版本。Go 的类型系统不支持继承。相反，你可以通过类型嵌入来组合类型。\n\
  \n接口类型是一个强大的特性；它允许你在构建软件系统时提供极大的扩展性和组合性。接口为用户定义的具体类型提供契约。在 Go 中，你无需显式地将接口实现到具体类型中；你只需根据接口类型中定义的方法，在你的具体类型中提供方法的实现，即可将接口实现到具体类型中。\n\
  \nGo 中的并发性是函数与其他函数同时运行的能力。并发性是 Go 语言的内置特性，Go 运行时使用调度器来管理并发函数的执行。Go 中的并发性通过两个特性来实现：Goroutine\
  \ 和通道。Goroutine 是可以与其他函数并发运行的函数，作为一个独立的单元工作。通道用于同步 Goroutine 以发送和接收消息。在 Go 中，你可以创建两种类型的通道：缓冲通道和无缓冲通道。无缓冲通道会阻塞\
  \ Goroutine 的接收者，直到通道上有可用的数据；同时也会阻塞 Goroutine 的发送者，直到有接收者可用。缓冲通道仅在缓冲区已满时阻塞发送者。\n\
  \n在第 2 章和第 3 章中，你已经学习了 Go 编程语言的基础知识。从第 4 章开始，你将学习 Go 中的 Web 编程以及如何开发 Web 应用和 RESTful\
  \ 服务。\n\n"
- "# 4. Web 开发入门\n\n前三章讨论了 Go 编程语言和 Go 生态系统的基础知识。由于本书的主要重点是探索 Go 中的 Web 开发，因此其余章节将从实践角度探讨\
  \ Go 中的 Web 开发。\n\nGo 是一个出色的技术栈，可用于为移动和 Web 应用构建可扩展的、基于 Web 的后端系统，但它可能不是构建传统 Web\
  \ 应用的最佳选择，因为传统 Web 应用的所有处理和视图模板渲染都在服务器端执行。这并不意味着 Go 不适用于开发传统 Web 应用，但对于构建 SPA 和移动应用的后端系统而言，它是一个理想的选择，因为你可以使用\
  \ Go 在服务器端构建 API。在移动 API 时代，RESTful API 正成为现代应用的支柱，而服务器端 Web 开发也在向 REST API 演进。Go\
  \ 是构建此类 API 以为 Web 和移动应用提供后端支持的绝佳环境选择。过去，我使用 C# 和 Node.js 来构建移动应用的后端 API，但现在我强烈推荐使用\
  \ Go 来开发 Web API。\n\n本章将探讨在 Go 中构建 Web 应用的基础知识。对于 Web 开发者来说，Go 标准库提供了开发 Web 系统所需的一切。只需利用标准库，你就可以在\
  \ Go 中构建高度可扩展的 Web 应用和 Web API。\n\n## net/http 包\n\n当你考虑在 Go 中构建 Web 应用和 Web API，或者仅仅是构建\
  \ HTTP 服务器时，最重要的包是 `net/http`，它来自 Go 标准库，并提供了开发完整 Web 应用所需的所有基本功能。Go 的设计理念是通过组合小型的组件模块来开发更大的程序。`net/http`\
  \ 包提供了高度的组合性和可扩展性，因此你可以轻松地用自己的包或第三方包替换或扩展标准库的功能。在 Ruby 等其他编程环境中，你会使用像 Rails 这样的完整\
  \ Web 应用框架来开发 Web 应用。在 Go 中，你可以找到许多完整的 Web 应用框架，例如 Beego、Revel 和 Martini。但是，在 Go\
  \ 中开发 Web 应用的惯用方式是使用标准库包作为编程块的基本组成部分，并结合其他与 `http` 包兼容的库（而非框架）。对于 Web 开发，`net/http`\
  \ 和 `html/template` 是标准库提供的主要包。仅使用这两个包，你就可以构建功能完整的 Web 应用，而无需借助任何第三方包。\n\n**注意：**\
  \ 你应该先从标准库包开始 Web 开发，然后再涉足第三方包和框架，以便理解 Go 的 Web 开发生态系统。如果你直接从第三方包和框架开始 Web 开发，你将错过许多核心基础知识，因为这些框架提供了大量“填鸭式”的功能和语法糖。\n\
  \n`http` 包提供了 HTTP 客户端和服务器的实现，包括用于客户端和服务器实现的各种结构体和函数。本章将探讨 `http` 包的各种功能。\n\n\n\n\
  ### 处理 HTTP 请求\n\nWeb 基于请求-响应范式。在该模型（见图 4-1）中，HTTP 客户端向 Web 服务器发送数据请求，经服务器处理后，再将响应返回给\
  \ HTTP 客户端。\n\n![A978-1-4842-1052-9_4_Fig1_HTML.jpg](img/A978-1-4842-1052-9_4_Fig1_HTML.jpg)\n\
  \n图 4-1. HTTP 请求-响应范式\n\n这种通信模型最关键的一点在于，HTTP 是一个无状态层，这意味着每次向 HTTP 服务器发出的请求都被视为独立的事务，它不会记住任何之前的请求，也无法在请求之间持久保存数据。因此，通信由独立的请求和响应对组成。如果你正在构建\
  \ Web API，Web 服务器会处理 HTTP 请求，并以 XML 或 JSON 格式发送响应。如果你正在构建 Web 应用程序，Web 服务器会处理 HTTP\
  \ 请求，并以 HTML 网页的形式发送响应，这些网页将在 Web 浏览器中渲染。\n\n`net/http` 库有两个用于处理 HTTP 请求的主要组件（将在以下章节中讨论）：\n\
  \n*   `ServeMux`\n*   `Handler`\n\n### ServeMux\n\n`ServeMux` 是一个多路复用器（或者简称为 HTTP\
  \ 请求路由器），它将传入的 HTTP 请求与预定义的 URI 资源列表进行匹配，然后为 HTTP 客户端请求的资源调用相应的处理器。\n\n### Handler\n\
  \n`ServeMux` 提供一个多路复用器，并为 HTTP 请求调用相应的处理器。处理器负责写入响应头和响应体。在 Go 中，任何对象都可以成为处理器，这归功于\
  \ Go 类型系统提供的出色接口实现。如果任何对象满足 `http.Handler` 接口的实现，它就可以成为处理 HTTP 请求的处理器。\n\n代码清单 4-1\
  \ 展示了 `http.Handler` 接口的定义。\n\n代码清单 4-1. `http.Handler` 接口\n\n```\ntype Handler\
  \ interface {\n   ServeHTTP(ResponseWriter, *Request)\n}\n```\n\n`ServeHTTP` 方法有两个参数：一个\
  \ `http.ResponseWriter` 接口和一个指向 `http.Request` 结构体的指针。`ResponseWriter` 接口用于将响应头和响应体写入\
  \ HTTP 响应中。你可以使用 `Request` 从传入的 HTTP 请求中提取信息。例如，如果你想读取查询字符串的值，请使用 `Request` 对象。\n\
  \n`http` 包提供了多个实现了 `http.Handler` 接口的函数，它们被用作通用处理器：\n\n*   `FileServer`\n*   `NotFoundHandler`\n\
  *   `RedirectHandler`\n*   `StripPrefix`\n*   `TimeoutHandler`\n\n### 构建静态 Web 服务器\n\
  \n让我们使用通用处理器函数 `FileServer` 在 Go 中构建一个静态 Web 服务器，该函数返回一个可用于构建静态 Web 服务器的处理器对象。\n\
  \n图 4-2 展示了一个静态网站的文件夹结构。\n\n![A978-1-4842-1052-9_4_Fig2_HTML.jpg](img/A978-1-4842-1052-9_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 静态网站的文件夹结构\n\n一个静态网站应用程序在 `GOPATH` 位置创建，其文件夹结构如图 4-2 所示。静态 Web 服务器的实现在\
  \ `main.go` 源文件中编写，静态内容放置在 `public` 文件夹中，该文件夹为静态网站提供内容。\n\n代码清单 4-2 展示了 `main.go`\
  \ 中的实现，它通过提供 `public` 文件夹的内容来构建一个静态 Web 服务器。\n\n代码清单 4-2. 使用 `FileServer` 函数构建的静态\
  \ Web 服务器\n\n```\npackage main\n\nimport (\n    \"net/http\"\n)\n\nfunc main() {\n\
  \    mux := http.NewServeMux()\n    fs := http.FileServer(http.Dir(\"public\"))\n\
  \    mux.Handle(\"/\", fs)\n    http.ListenAndServe(\":8080\", mux)\n}\n```\n\n\
  在 `main` 函数中，调用了 `http.NewServeMux` 函数来创建一个空的 `ServeMux` 对象。然后调用了 `http.FileServer`\
  \ 函数来创建一个新的处理器，用于提供网站 `public` 文件夹中的静态内容。接着调用了 `ServeMux.Handle` 函数，将 URL 路径 `\"\
  /\"` 注册到通过 `http.FileServer` 函数创建的处理器上。最后，调用了 `http.ListenAndServe` 函数来创建一个 HTTP\
  \ 服务器，该服务器开始监听 `:8080` 端口上的传入请求。地址和 `ServeMux` 对象被传递给了 `ListenAndServe` 函数。\n\n\
  代码清单 4-3 展示了 `ListenAndServe` 函数的签名。\n\n代码清单 4-3. `ListenAndServe` 签名\n\n```\nfunc\
  \ ListenAndServe(addr string, handler Handler) error\n```\n\n`ListenAndServe` 函数在\
  \ TCP 网络地址上监听，然后调用带有 `http.Handler` 的 `Serve` 函数来处理传入连接上的请求。`ListenAndServe` 函数的第二个参数是一个\
  \ `http.Handler`，但此处传入的是一个 `ServeMux` 对象。`ServeMux` 类型也具有 `ServeHTTP` 方法，这意味着它满足了\
  \ `http.Handler` 接口，因此可以将 `ServeMux` 对象作为 `ListenAndServe` 函数的第二个参数传入。请记住，`ServeMux`\
  \ 的实例是 `http.Handler` 接口的一个实现。如果你将 `nil` 作为 `ListenAndServe` 的第二个参数传入，则将使用 `DefaultServeMux`\
  \ 作为 `http.Handler`。`DefaultServeMux` 是 `ServeMux` 的一个实例，因此它也是一个处理器。\n\n当你运行该程序时，可以通过导航到\
  \ `http://localhost:8080/about.html`（见图 4-3）来访问静态网页 `about.html`。`about.html` 页面被放置在\
  \ `public` 文件夹中，以作为静态内容提供。\n\n![A978-1-4842-1052-9_4_Fig3_HTML.jpg](img/A978-1-4842-1052-9_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 访问静态网站\n\n\n\n### 创建自定义处理器\n\n在 Go 语言中，只要任何对象能提供签名形式为 `ServeHTTP(http.ResponseWriter,\
  \ *http.Request)` 的方法，它就可以成为 `http.Handler` 的实现。\n\n清单 4-4 通过实现 `http.Handler` 接口创建了一个自定义处理器。\n\
  \n清单 4-4. 创建自定义处理器\n\n```\ntype messageHandler struct {\n    message string\n}\n\
  \nfunc (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request) {\n\
  \    fmt.Fprintf(w, m.message)\n}\n```\n\n创建了一个名为 `messageHandler` 的结构体。为了让该类型实现\
  \ `Handler` 接口，实现了一个签名形式为 `ServeHTTP(http.ResponseWriter, *http.Request)` 的方法。如第\
  \ 3 章所述，你无需指定关键字来让某个类型实现接口；只需根据接口定义的方法签名提供相应的方法，就可以将接口类型实现到具体类型中。将 `receiver` 方法作为\
  \ `messageHandler` 类型添加到 `ServeHTTP` 函数中，使其成为 `messageHandler` 结构体的方法。在 `ServeHTTP`\
  \ 方法中，从结构体字段 `message` 获取数据，并返回一条字符串消息作为 HTTP 响应。\n\n让我们编写一个程序来使用这个自定义处理器（见清单 4-5）。\n\
  \n清单 4-5. 使用自定义处理器类型\n\n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n\
  \    \"net/http\"\n)\n\ntype messageHandler struct {\n    message string\n}\n\n\
  func (m *messageHandler) ServeHTTP(w http.ResponseWriter, r *http.Request) {\n \
  \   fmt.Fprintf(w, m.message)\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
  \    mh1 := &messageHandler{\"Welcome to Go Web Development\"}\n    mux.Handle(\"\
  /welcome\", mh1)\n    mh2 := &messageHandler{\"net/http is awesome\"}\n    mux.Handle(\"\
  /message\", mh2)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\"\
  :8080\", mux)\n}\n```\n\n在 `main` 函数中，创建了 `messageHandler` 结构体的实例（使用 `&` 符号获取指针），然后调用\
  \ `ServeMux.Handle` 来将处理器注册到 `messageHandler` 结构体的实例上。如果存在对 URL 路径 `\"/welcome\"\
  ` 和 `\"/message\"` 的请求，`messageHandler` 的 `ServeHTTP` 方法将在服务器端完成所有处理。你还可以重复使用自定义处理器。在该示例中，`messageHandler`\
  \ 被用作两个 URL 路径的处理器。\n\n### 使用函数作为处理器\n\n清单 4-5 创建了一个结构体类型，并通过实现签名正确的 `ServeHTTP`\
  \ 方法使其成为一个处理器。这个自定义处理器甚至可以被多个 URL 路径重复使用。尽管这种方式在某些场景下可行，但这样创建处理器的代码略显冗长，因为你必须定义结构体，然后再为\
  \ `ServeHTTP` 方法提供实现。而且在许多情况下，你可能希望使用普通函数作为处理器。\n\n#### `http.HandlerFunc` 类型\n\n\
  除了通过实现 `http.Handler` 接口来创建自定义处理器类型，你还可以使用 `http.HandlerFunc` 类型来充当 HTTP 处理器。只要某个函数的签名是\
  \ `func(http.ResponseWriter, *http.Request)`，你就可以将该函数转换为 `HandlerFunc` 类型。`HandlerFunc`\
  \ 类型就像一个适配器，允许你将普通函数用作 HTTP 处理器。`HandlerFunc` 类型内置了 `ServeHTTP(http.ResponseWriter,\
  \ *http.Request)` 方法，因此它也满足了 `http.Handler` 接口，可以充当 HTTP 处理器。\n\n清单 4-6 是一个使用 `HandlerFunc`\
  \ 类型创建 HTTP 处理器的示例程序。\n\n清单 4-6. 使用 `HandlerFunc` 类型将普通函数作为处理器\n\n```\npackage main\n\
  \nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n)\n\nfunc messageHandler(w\
  \ http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w, \"Welcome to Go Web\
  \ Development\")\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n    // 将 messageHandler\
  \ 函数转换为 HandlerFunc 类型\n    mh := http.HandlerFunc(messageHandler)\n    mux.Handle(\"\
  /welcome\", mh)\n    log.Println(\"Listening...\")\n    http.ListenAndServe(\":8080\"\
  , mux)\n}\n```\n\n运行程序后，导航到 `http://localhost:8080/welcome` 查看输出。\n\n在 `main` 函数中，通过转换\
  \ `messageHandler` 函数创建了一个 `HandlerFunc` 实例，然后将其添加到 `ServeMux.Handle` 中，以处理对 `\"\
  /welcome\"` URL 路径的请求。使用 `HandlerFunc` 类型，你可以轻松地将普通函数用作 HTTP 处理器。\n\n在清单 4-5 中，自定义处理器可以被多个\
  \ URL 路径重复使用，因为它提供了一个可重用的 `\"message\"` 字段，为处理器提供了字符串值。清单 4-6 无法为 `\"message\"`\
  \ 提供值，因此消息字符串的值必须是硬编码的。在许多场景下，你需要为处理器函数提供一些值。\n\n假设你想将一个数据库连接对象传递给处理器函数，以便在函数内部重复使用它。你可以编写一个带有参数（用于接收某些值）的函数，然后在该函数内部定义并返回另一个作为\
  \ `http.Handler` 的函数。在 Go 中，你可以在函数内部创建函数，并且它也支持**闭包**。处理器逻辑可以在闭包中实现。\n\n清单 4-7 是一个使用闭包编写处理器逻辑的示例程序。\n\
  \n清单 4-7. 将处理器逻辑写入闭包\n\n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n\
  \    \"net/http\"\n)\n\n// 将处理器逻辑写入闭包\nfunc messageHandler(message string) http.Handler\
  \ {\n    return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\
  \        fmt.Fprintf(w, message)\n    })\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n\
  \    mux.Handle(\"/welcome\", messageHandler(\"Welcome to Go Web Development\"))\n\
  \    mux.Handle(\"/message\", messageHandler(\"net/http is awesome\"))\n    log.Println(\"\
  Listening...\")\n    http.ListenAndServe(\":8080\", mux)\n}\n```\n\n该程序的工作方式与清单\
  \ 4-5 相同。`messageHandler` 函数返回一个 `http.Handler`。在 `messageHandler` 函数内部，通过调用一个签名形式为\
  \ `func(http.ResponseWriter, *http.Request)` 的匿名函数返回了 `http.HandlerFunc`，这使得它满足了\
  \ `http.Handler` 接口，因此 `messageHandler` 函数可以返回 `http.Handler`。如前文所述，`http.HandlerFunc`\
  \ 类型是 `http.Handler` 的一个实现。此处，利用变量 `\"message\"` 形成了一个闭包，并且这个函数被放置在 `messageHandler`\
  \ 函数内部。当你在处理实际应用程序时，这种方法非常有用；你可以使用此方法将应用上下文级别的类型值传递给处理器函数。\n\n\n\n#### ServeMux.HandleFunc\
  \ 函数\n\n在上一节中，一个普通函数被转换为 `HandlerFunc` 类型，并通过注册到 `ServeMux.Handle` 来用作 HTTP 处理器。由于普通函数经常以这种方式用作\
  \ HTTP 处理器，`http` 包提供了一个快捷方法：`ServeMux.HandleFunc`。`HandleFunc` 会为给定的模式注册处理函数。（这只是一个为了方便您使用的快捷方法。）它在内部（在\
  \ `http` 包内部）会将其转换为 `HandlerFunc` 类型，并将该处理程序注册到 `ServeMux` 中。\n\n清单 4-8 是一个使用 `ServeMux.HandleFunc`\
  \ 的示例程序。\n\n**清单 4-8.** 使用 `ServeMux.HandleFunc`\n\n```go\npackage main\n\nimport\
  \ (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n)\n\nfunc messageHandler(w http.ResponseWriter,\
  \ r *http.Request) {\n    fmt.Fprintf(w, \"Welcome to Go Web Development\")\n}\n\
  \nfunc main() {\n    mux := http.NewServeMux()\n    // 使用快捷方法 ServeMux.HandleFunc\n\
  \    mux.HandleFunc(\"/welcome\", messageHandler)\n    log.Println(\"监听中...\")\n\
  \    http.ListenAndServe(\":8080\", mux)\n}\n```\n\n运行该程序，导航至 `http://localhost:8080/welcome`\
  \ 即可查看输出。\n\n#### DefaultServeMux\n\n在本章的示例程序中，通过调用 `http.NewServeMux` 函数创建了 `ServeMux`\
  \ 对象。`DefaultServeMux` 与此前程序中的 `ServeMux` 对象相同。`DefaultServeMux` 是 `Serve` 方法使用的默认\
  \ `ServeMux`，并且当使用 `http` 包时，该 `ServeMux` 对象会被实例化。\n\n以下是来自 Go 源码的代码声明：\n\n```go\n\
  var DefaultServeMux = newServeMux()\n```\n\n清单 4-9 展示了来自 Go 源码的 `NewServeMux` 函数。\n\
  \n**清单 4-9.** 来自 Go 源码的 `NewServeMux` 函数\n\n```go\n// NewServeMux 分配并返回一个新的 ServeMux。\n\
  func NewServeMux() *ServeMux { return &ServeMux{m: make(map[string]muxEntry)} }\n\
  ```\n\n`http` 包提供了几个用于操作 `DefaultServeMux` 的快捷方法：`http.Handle` 和 `http.HandleFunc`。`http.Handle`\
  \ 函数为 `DefaultServeMux` 中的给定模式注册处理程序，而 `http.HandleFunc` 则为 `DefaultServeMux` 中的给定模式注册处理函数。因此，这些函数只是用于在\
  \ `DefaultServeMux` 中使用 `ServeMux.Handle` 和 `ServeMux.HandleFunc` 的快捷方式。如果第二个参数设置为\
  \ `nil` 而非提供 `http.Handler` 对象，`ListenAndServe` 函数将使用 `DefaultServeMux`。\n\n让我们重写清单\
  \ 4-8 中的程序，以便与 `DefaultServeMux` 一起使用（参见清单 4-10）。\n\n**清单 4-10.** 使用 `DefaultServeMux`\n\
  \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
  )\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request) {\n    fmt.Fprintf(w,\
  \ \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n    http.HandleFunc(\"\
  /welcome\", messageHandler)\n    log.Println(\"监听中...\")\n    http.ListenAndServe(\"\
  :8080\", nil)\n}\n```\n\n运行该程序，导航至 `http://localhost:8080/welcome` 即可查看输出。当您使用 `http.Handle`\
  \ 和 `http.HandleFunc` 函数时，可以将 `nil` 值作为第二个参数传递给 `ListenAndServe`，因为处理程序和处理函数会通过\
  \ `http.Handle` 和 `http.HandleFunc` 函数注册到 `DefaultServeMux` 中。\n\n### http.Server\
  \ 结构体\n\n在之前的示例中，通过调用 `http.ListenAndServe` 来运行 HTTP 服务器，这种方法不允许您自定义 HTTP 服务器配置。`http`\
  \ 包提供了一个名为 `Server` 的结构体，它使您能够指定 HTTP 服务器配置。\n\n清单 4-11 展示了 `Server` 结构体。\n\n**清单\
  \ 4-11.** `http.Server` 结构体\n\n```go\ntype Server struct {\n    Addr           string\n\
  \    Handler        Handler\n    ReadTimeout    time.Duration\n    WriteTimeout\
  \   time.Duration\n    MaxHeaderBytes int\n    TLSConfig      *tls.Config\n    TLSNextProto\
  \   map[string]func(*Server, *tls.Conn, Handler)\n    ConnState      func(net.Conn,\
  \ ConnState)\n    ErrorLog       *log.Logger\n}\n```\n\n该结构体允许您配置许多值，包括服务器的错误日志记录器、读取请求超时的最大持续时间、写入响应超时的最大持续时间以及请求头的最大大小。\n\
  \n清单 4-12 是一个使用 `Server` 结构体自定义服务器行为的示例程序。\n\n**清单 4-12.** 使用 `http.Server` 结构体\n\
  \n```go\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n\
  \    \"time\"\n)\n\nfunc messageHandler(w http.ResponseWriter, r *http.Request)\
  \ {\n    fmt.Fprintf(w, \"Welcome to Go Web Development\")\n}\n\nfunc main() {\n\
  \    http.HandleFunc(\"/welcome\", messageHandler)\n    server := &http.Server{\n\
  \        Addr:           \":8080\",\n        ReadTimeout:    10 * time.Second,\n\
  \        WriteTimeout:   10 * time.Second,\n        MaxHeaderBytes: 1 << 20,\n \
  \   }\n    log.Println(\"监听中...\")\n    server.ListenAndServe()\n}\n```\n\n通过创建一个\
  \ `Server` 类型对象并调用 `Server.ListenAndServe` 方法来自定义服务器行为。在之前的示例中，使用 `http.ListenAndServe`\
  \ 函数来启动 HTTP 服务器。当调用 `http.ListenAndServe` 函数时，它会在内部创建一个 `Server` 类型实例并调用 `ListenAndServe`\
  \ 方法。\n\n清单 4-13 是来自 Go 源码的 `http.ListenAndServe` 实现。\n\n**清单 4-13.** `http.ListenAndServe`\
  \ 的实现\n\n```go\nfunc ListenAndServe(addr string, handler Handler) error {\n    \
  \    server := &Server{Addr: addr, Handler: handler}\n        return server.ListenAndServe()\n\
  }\n```\n\n\n### Gorilla Mux\n\n`http.ServeMux`是一个 HTTP 请求多路复用器，在大多数常见场景下都能很好地工作。在前面的示例程序中，它被用作请求多路复用器。如果你需要为请求多路复用器提供更强大的功能，可以考虑使用与标准`http.ServeMux`兼容的第三方路由包。例如，当你想要使用适当的\
  \ HTTP 端点和 HTTP 方法来指定 RESTful 资源时，使用标准`http.ServeMux`会比较困难。\n\n来自 Gorilla Web 工具包（`github.com/gorilla/mux`）的`mux`包是一个强大的请求路由器，允许你以自定义的方式配置多路复用器。这个包在构建\
  \ RESTful 服务时非常有用，它实现了`http.Handler`接口，因此与标准`http.ServeMux`兼容。使用`mux`包，可以根据 URL\
  \ 主机、路径、路径前缀、协议、标头和查询值以及 HTTP 方法来匹配请求。你还可以使用自定义匹配器，并将路由作为子路由器与`this`包一起使用。\n\n要安装`mux`包，在终端中运行以下命令：\n\
  \n`go get github.com/gorilla/mux`\n\n让我们使用`mux`包来配置路由（参见清单 4-14）。\n\n**清单 4-14.\
  \ 使用`mux`包进行路由**\n\n```\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n\
  \    r.HandleFunc(\"/api/notes\", GetNoteHandler).Methods(\"GET\")\n    r.HandleFunc(\"\
  /api/notes\", PostNoteHandler).Methods(\"POST\")\n    r.HandleFunc(\"/api/notes/{id}\"\
  , PutNoteHandler).Methods(\"PUT\")\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"\
  DELETE\")\n    server := &http.Server{\n        Addr:    \":8080\",\n        Handler:\
  \ r,\n    }\n    server.ListenAndServe()\n}\n```\n\n这里通过调用`NewRouter`函数创建了一个`mux.Router`对象，然后为资源指定路由。在指定\
  \ URI 模式时，可以匹配 HTTP 方法，这在构建 RESTful 应用程序时非常有用。由于`mux`包实现了`http.Handler`接口，你可以轻松地使用标准`http`包。它提供了大量的可扩展性，使你能够用自己的包和第三方包轻松替换或扩展其许多功能。\n\
  \n与其他 Web 编程生态系统不同，Go 中 Web 开发的惯用方式是使用标准库包，并在需要时使用第三方包来扩展现有功能的能力。在选择第三方包时，选择那些与标准库包兼容的非常重要。`mux`包是这种方法的一个很好的例子，它与`http`包兼容，因为它提供了`http.Handler`接口。\n\
  \n#### 构建 RESTful API\n\n本章讨论了 Go 中 Web 开发的基础知识，包括用于处理和提供 HTTP 请求的`http.ServeMux`和`http.Handler`。你还学习了第三方包`mux`，它可以作为`http.ServeMux`的替代品，并且与`http`包兼容。现在，让我们使用`mux`包作为请求多路复用器来构建一个简单的基于\
  \ JSON 的 REST API，这将帮助你理解在 Go 中构建 Web 系统的许多实际做法（参见清单 4-15）。\n\n> **注意**\n> 表述性状态转移（REST）：如果你想了解更多关于\
  \ REST 的知识，我推荐你阅读 Martin Fowler 的文章《Richardson 成熟度模型：迈向 REST 荣耀的步骤》。访问地址：[`http://martinfowler.com/articles/richardsonMaturityModel.html`](http://martinfowler.com/articles/richardsonMaturityModel.html)\n\
  \n**清单 4-15. 基于 JSON 的 RESTful API**\n\n```\npackage main\n\nimport (\n    \"encoding/json\"\
  \n    \"log\"\n    \"net/http\"\n    \"strconv\"\n    \"time\"\n    \"github.com/gorilla/mux\"\
  \n)\n\ntype Note struct {\n     Title       string    `json:\"title\"`\n     Description\
  \ string    `json:\"description\"`\n     CreatedOn   time.Time `json:\"createdon\"\
  `\n}\n\n//Store for the Notes collection\nvar noteStore = make(map[string]Note)\n\
  \n//Variable to generate key for the collection\nvar id int = 0\n\n//HTTP Post -\
  \ /api/notes\nfunc PostNoteHandler(w http.ResponseWriter, r *http.Request) {\n \
  \   var note Note\n    // Decode the incoming Note json\n    err := json.NewDecoder(r.Body).Decode(&note)\n\
  \    if err != nil {\n        panic(err)\n    }\n    note.CreatedOn = time.Now()\n\
  \    id++\n    k := strconv.Itoa(id)\n    noteStore[k] = note\n    j, err := json.Marshal(note)\n\
  \    if err != nil {\n        panic(err)\n    }\n    w.Header().Set(\"Content-Type\"\
  , \"application/json\")\n    w.WriteHeader(http.StatusCreated)\n    w.Write(j)\n\
  }\n\n//HTTP Get - /api/notes\nfunc GetNoteHandler(w http.ResponseWriter, r *http.Request)\
  \ {\n    var notes []Note\n    for _, v := range noteStore {\n        notes = append(notes,\
  \ v)\n    }\n    w.Header().Set(\"Content-Type\", \"application/json\")\n    j,\
  \ err := json.Marshal(notes)\n    if err != nil {\n        panic(err)\n    }\n \
  \   w.WriteHeader(http.StatusOK)\n    w.Write(j)\n}\n\n//HTTP Put - /api/notes/{id}\n\
  func PutNoteHandler(w http.ResponseWriter, r *http.Request) {\n    var err error\n\
  \    vars := mux.Vars(r)\n    k := vars[\"id\"]\n    var noteToUpd Note\n    //\
  \ Decode the incoming Note json\n    err = json.NewDecoder(r.Body).Decode(&noteToUpd)\n\
  \    if err != nil {\n        panic(err)\n    }\n    if note, ok := noteStore[k];\
  \ ok {\n        noteToUpd.CreatedOn = note.CreatedOn\n        //delete existing\
  \ item and add the updated item\n        delete(noteStore, k)\n        noteStore[k]\
  \ = noteToUpd\n    } else {\n        log.Printf(\"Could not find key of Note %s\
  \ to delete\", k)\n    }\n    w.WriteHeader(http.StatusNoContent)\n}\n\n//HTTP Delete\
  \ - /api/notes/{id}\nfunc DeleteNoteHandler(w http.ResponseWriter, r *http.Request)\
  \ {\n    vars := mux.Vars(r)\n    k := vars[\"id\"]\n    // Remove from Store\n\
  \    if _, ok := noteStore[k]; ok {\n        //delete existing item\n        delete(noteStore,\
  \ k)\n    } else {\n        log.Printf(\"Could not find key of Note %s to delete\"\
  , k)\n    }\n    w.WriteHeader(http.StatusNoContent)\n}\n\n//Entry point of the\
  \ program\nfunc main() {\n    r := mux.NewRouter().StrictSlash(false)\n    r.HandleFunc(\"\
  /api/notes\", GetNoteHandler).Methods(\"GET\")\n    r.HandleFunc(\"/api/notes\"\
  , PostNoteHandler).Methods(\"POST\")\n    r.HandleFunc(\"/api/notes/{id}\", PutNoteHandler).Methods(\"\
  PUT\")\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"DELETE\"\
  )\n    server := &http.Server{\n        Addr:    \":8080\",\n        Handler: r,\n\
  \    }\n    log.Println(\"Listening...\")\n    server.ListenAndServe()\n}\n```\n\
  \n#### 数据模型与数据存储\n\n清单 4-15 构建了一个简单的 REST API，针对数据模型`Note`结构体实现了基本的 CRUD 操作：\n\n\
  ```\ntype Note struct {\n     Title       string    `json:\"title\"`\n     Description\
  \ string    `json:\"description\"`\n     CreatedOn   time.Time `json:\"createdon\"\
  `\n}\n```\n\n对于基于 JSON 的 API，结构体字段会被编码为 JSON，作为对 HTTP 客户端的响应。你可以通过使用标准库包`encoding/json`轻松地将结构体编码为\
  \ JSON，以及将 JSON 解码为结构体。如果你需要 JSON 元素与结构体字段不同的表示方式，可以将结构体字段映射为你想要的 JSON 编码元素：\n\n\
  ```\n Title       string    `json:\"title\"`\n Description string    `json:\"description\"\
  `\nCreatedOn   time.Time `json:\"createdon\"`\n```\n\n这里结构体字段使用大写字母表示；在 JSON 表示中将这些字段编码为小写字母。\n\
  \n本示例没有使用任何数据库存储，因此为了演示目的，使用了一个映射作为持久化存储。使用整数变量`id`为映射生成键：\n\n```\n//Store for the\
  \ Notes collection\nvar noteStore = make(map[string]Note)\n\n//Variable to generate\
  \ key for the map\nvar id int = 0\n```\n\n\n\n#### 配置复用器\n\n您可以使用 `mux` 包作为复用器，并为其配置相应的处理函数。使用\
  \ `\"/api/notes\"` 作为表示 `Notes` 资源的基础端点。由于 `mux` 支持与 HTTP 方法进行映射，您可以轻松地以 RESTful\
  \ 方式表示资源：\n\n```go\n//Entry point of the program\n\nfunc main() {\n\n    r := mux.NewRouter().StrictSlash(false)\n\
  \n    r.HandleFunc(\"/api/notes\", GetNoteHandler).Methods(\"GET\")\n\n    r.HandleFunc(\"\
  /api/notes\", PostNoteHandler).Methods(\"POST\")\n\n    r.HandleFunc(\"/api/notes/{id}\"\
  , PutNoteHandler).Methods(\"PUT\")\n\n    r.HandleFunc(\"/api/notes/{id}\", DeleteNoteHandler).Methods(\"\
  DELETE\")\n\n    server := &http.Server{\n\n        Addr:    \":8080\",\n\n    \
  \    Handler: r,\n\n    }\n\n    log.Println(\"Listening...\")\n\n    server.ListenAndServe()\n\
  \n}\n```\n\n表 4-1 展示了与复用器一起使用的配置。如果 URI 和 HTTP 方法与预定义的配置列表匹配，复用器将调用相应的处理函数。\n\n\
  **表 4-1.** 复用器配置\n\n| URI | HTTP 方法 | 处理函数 |\n| --- | --- | --- |\n| `/api/notes`\
  \ | `Get` | `GetNoteHandler` |\n| `/api/notes` | `Post` | `PostNoteHandler` |\n\
  | `/api/notes/{id}` | `Put` | `PutNoteHandler` |\n| `/api/notes/{id}` | `Delete`\
  \ | `DeleteNoteHandler` |\n\n#### 用于 CRUD 操作的处理函数\n\n让我们看看用于 `HTTP Get` 获取 `Note`\
  \ 资源值的处理函数：\n\n```go\n//HTTP Get - /api/notes\n\nfunc GetNoteHandler(w http.ResponseWriter,\
  \ r *http.Request) {\n\n    var notes []Note\n\n    for _, v := range noteStore\
  \ {\n\n        notes = append(notes, v)\n\n    }\n\n    w.Header().Set(\"Content-Type\"\
  , \"application/json\")\n\n    j, err := json.Marshal(notes)\n\n    if err != nil\
  \ {\n\n        panic(err)\n\n    }\n\n    w.WriteHeader(http.StatusOK)\n\n    w.Write(j)\n\
  \n}\n```\n\n这里遍历了 `noteStore` 映射，并将这些值追加到一个 `Note` 切片中。通过使用 `json` 包的 `Marshal`\
  \ 函数，`Note` 切片被编码为 JSON。\n\n`ResponseWriter` 用于写入响应头和响应体。此处使用 `ResponseWriter` 的\
  \ `WriteHeader` 方法写入响应头，并使用 `ResponseWriter` 的 `Write` 方法写入响应体。当您使用 `HTTP Get` 方法调用\
  \ API 端点 `\"/api/notes\"` 时，将看到如图 4-4 所示格式的输出。\n\n![A978-1-4842-1052-9_4_Fig4_HTML.jpg](img/A978-1-4842-1052-9_4_Fig4_HTML.jpg)\n\
  \n**图 4-4.** Notes 资源的 HTTP Get\n\n在图 4-4 中，您将获取到 JSON 格式的 `Note` 集合。这里使用了 Postman\
  \ REST API 客户端工具来测试 REST API 示例。Postman 是一个 Chrome 应用，允许您测试 API。（不过，由于它是 Chrome\
  \ 应用，因此只能在 Chrome 浏览器上运行）。使用 Postman，您可以快速向 API 服务器构建 HTTP 请求，将它们保存以供将来使用，并分析 API\
  \ 服务器发送的响应。Postman 是一个非常实用的工具，无需构建客户端应用程序即可用于测试 REST API。要获取更多详细信息，请访问 Postman 网站\
  \ [`www.getpostman.com`](http://www.getpostman.com/)。\n\n让我们看看用于 `HTTP Post` 创建新\
  \ `Note` 资源的处理函数：\n\n```go\n//HTTP Post - /api/notes\n\nfunc PostNoteHandler(w http.ResponseWriter,\
  \ r *http.Request) {\n\n    var note Note\n\n    // Decode the incoming Note json\n\
  \n    err := json.NewDecoder(r.Body).Decode(&note)\n\n    if err != nil {\n\n  \
  \      panic(err)\n\n    }\n\n    note.CreatedOn = time.Now()\n\n    id++\n\n  \
  \  k := strconv.Itoa(id)\n\n    noteStore[k] = note\n\n    j, err := json.Marshal(note)\n\
  \n    if err != nil {\n\n        panic(err)\n\n    }\n\n    w.Header().Set(\"Content-Type\"\
  , \"application/json\")\n\n    w.WriteHeader(http.StatusCreated)\n\n    w.Write(j)\n\
  \n}\n```\n\n指向 `http.Request` 对象的指针用于获取关于 `HTTP 请求` 的信息。此处从 `Request.Body` 访问传入的\
  \ JSON 数据，并使用 `json` 包将其解码为 `Note` 资源。`NewDecoder` 函数创建了一个 `Decoder` 对象，其 `Decode`\
  \ 方法将 JSON 字符串解码为给定的类型（在此例中为 `Note` 类型）。`id` 变量递增，以为 `noteStore` 映射生成键值。`string`\
  \ 类型被用作 `noteStore` 映射的键，因此使用 `strconv.Itoa` 函数将 `int` 类型转换为 `string` 类型。新的 `Note`\
  \ 资源被添加到 `noteStore` 映射中，其键由 `id` 变量创建。最后，将响应作为新创建的 `Note` 资源的 JSON 数据，并附上适当的响应头发送回\
  \ HTTP 客户端。使用 `json.Marshal` 将 `Note` 对象转换为 JSON 数据。\n\n图 4-5 展示了针对资源 `\"/api/nodes\"\
  ` 的 `HTTP Post` 测试。您将在响应体中看到新创建的资源，并带有 HTTP 状态码 `201`，该状态码表示 HTTP 状态 `\"Created\"\
  `。\n\n![A978-1-4842-1052-9_4_Fig5_HTML.jpg](img/A978-1-4842-1052-9_4_Fig5_HTML.jpg)\n\
  \n**图 4-5.** Notes 资源的 HTTP Post\n\n端点 `\"/api/notes/{id}\"` 用于 `Note` 资源的 `HTTP\
  \ Put` 和 `HTTP Delete` 操作。在此示例中，`id` 的值被用作 `noteStore` 映射的键。为了从请求对象中检索此值，调用了 `mux.Vars()`：\n\
  \n```go\nvars := mux.Vars(r)\n\nk := vars[\"id\"]\n```\n\n`mux` 包的 `Vars` 函数返回当前请求的路由变量。使用路由值\
  \ `id`，从 `noteStore` 映射中检索 `Note` 对象，并将 `CreatedOn` 的值复制到 `Note` 对象中。\n\n此处，为了更新功能的实现，现有\
  \ `Note` 对象被移除并重新添加到 `noteStore` 映射中。其余所有实现方式与 `HTTP Post` 操作相同：\n\n```go\n//HTTP\
  \ Put - /api/notes/{id}\n\nfunc PutNoteHandler(w http.ResponseWriter, r *http.Request)\
  \ {\n\n    var err error\n\n    vars := mux.Vars(r)\n\n    k := vars[\"id\"]\n\n\
  \    var noteToUpd Note\n\n    // Decode the incoming Note json\n\n    err = json.NewDecoder(r.Body).Decode(&noteToUpd)\n\
  \n    if err != nil {\n\n        panic(err)\n\n    }\n\n    if note, ok := noteStore[k];\
  \ ok {\n\n        noteToUpd.CreatedOn = note.CreatedOn\n\n        //delete existing\
  \ item and add the updated item\n\n        delete(noteStore, k)\n\n        noteStore[k]\
  \ = noteToUpd\n\n    } else {\n\n        log.Printf(\"Could not find key of Note\
  \ %s to delete\", k)\n\n    }\n\n    w.WriteHeader(http.StatusNoContent)\n\n}\n\
  ```\n\n与 `Note` 资源的 `HTTP Put` 操作类似，获取路由值 `id`，并通过使用来自路由变量 `id` 的键值，从 `noteStore`\
  \ 映射中移除 `Note` 对象：\n\n```go\n//HTTP Delete - /api/notes/{id}\n\nfunc DeleteNoteHandler(w\
  \ http.ResponseWriter, r *http.Request) {\n\n    vars := mux.Vars(r)\n\n    k :=\
  \ vars[\"id\"]\n\n    // Remove from Store\n\n    if _, ok := noteStore[k]; ok {\n\
  \n        //delete existing item\n\n        delete(noteStore, k)\n\n    } else {\n\
  \n        log.Printf(\"Could not find key of Note %s to delete\", k)\n\n    }\n\n\
  \    w.WriteHeader(http.StatusNoContent)\n\n}\n```\n\n此示例应用程序演示了通过使用 Go 的标准库包 `net/http`\
  \ 和第三方包 `mux` 构建 RESTful API 的基本概念。\n\n\n\n### 摘要\n\nGo 是构建基于 Web 的后端系统的优秀技术栈，尤其擅长构建\
  \ RESTful API。标准库中的 `net/http` 包为在 Go 中构建 Web 应用提供了基础模块。Go 的哲学不鼓励使用大型框架来构建 Web 应用，而是提倡以\
  \ `net/http` 包为基础模块，结合第三方包和自定义包来扩展 `net/http` 包提供的功能。\n\n`http` 包包含两个处理 HTTP 请求的主要组件：`http.ServeMux`\
  \ 和 `http.Handler`。`http.ServeMux` 是一个请求多路复用器，它将传入的 HTTP 请求与预定义的 URI 资源列表进行匹配，并调用与\
  \ HTTP 客户端请求的资源相关联的处理程序。处理程序负责编写响应头和响应体。通过使用诸如 `mux` 之类的第三方包，可以扩展 `http.ServeMux`\
  \ 的能力。\n\n本章最后一节通过展示如何开发一个基于 JSON 的 RESTful API，探讨了 Go Web 开发的基础知识。\n\n"
- "# 5. 使用 Go 模板\n\n第 4 章讨论了使用标准库包 `net/http` 在 Go 中进行 Web 开发的基础知识。通过使用标准库包 `net/http`\
  \ 作为主要 Web 编程模块，以及第三方包 Gorilla `mux` 作为 HTTP 请求多路复用器，创建了一个基于 JSON 的 Web API。本章将向您展示如何在\
  \ Go 中开发 Web 应用程序；标准库包 `html/template` 用于渲染网页。\n\n本章从 Go 模板的基础知识开始，并介绍如何通过利用 `html/template`\
  \ 包来开发功能完备的 Web 应用程序。\n\n#### `text/template` 包\n\n使用模板是构建动态内容的好方法；您在运行时提供数据，以预定义的格式生成动态内容。Go\
  \ 标准库包 `html/template` 允许您通过将静态内容与动态内容相结合来构建动态 HTML 页面，它会在运行时解析模板以及所提供的数据结构。\n\n\
  在深入研究 `html/template` 包之前，您将先了解标准库包 `text/template`。`html/template` 包提供了与 `text/template`\
  \ 包相同的接口；两者之间的唯一区别在于，`html/template` 包解析模板并以 HTML 格式生成输出，而 `text/template` 包则以文本格式生成输出。您可以从\
  \ `text/template` 包开始，以了解 Go 模板的语法，然后可以轻松地使用 `html/template`，而无需处理任何语法差异。`text/template`\
  \ 包允许您构建数据驱动的模板，以生成文本输出。\n\n#### 使用 `text/template`\n\n模板会针对运行时提供的数据结构进行解析。模板中的命令引用数据结构的元素。例如，结构体字段可以与模板命令进行映射。模板中的命令由\
  \ `{{` 和 `}}` 分隔。\n\n要使用 `text/template`，请将其添加到导入列表中：\n\n```go\nimport (\n    \"\
  text/template\"\n)\n```\n\n清单 5-1 是一个示例程序，它使用结构体对象字段生成文本输出。\n\n**清单 5-1. 将结构体字段应用于模板**\n\
  \n```go\npackage main\n\nimport (\n    \"log\"\n    \"os\"\n    \"text/template\"\
  \n)\n\ntype Note struct {\n    Title       string\n    Description string\n}\n\n\
  const tmpl = `Note - Title: {{.Title}}, Description: {{.Description}}`\n\nfunc main()\
  \ {\n    // Create an instance of Note struct\n    note := Note{\"text/templates\"\
  , \"Template generates textual output\"}\n    // create a new template with a name\n\
  \    t := template.New(\"note\")\n    // parse some content and generate a template\n\
  \    t, err := t.Parse(tmpl)\n    if err != nil {\n        log.Fatal(\"Parse: \"\
  , err)\n        return\n    }\n    // Applies a parsed template to the data of Note\
  \ object\n    if err := t.Execute(os.Stdout, note); err != nil {\n        log.Fatal(\"\
  Execute: \", err)\n        return\n    }\n}\n```\n\n您应该会看到以下输出：\n\n```\nNote - Title:\
  \ text/templates, Description: Template generates textual output\n```\n\n在上一个清单中，声明了一个名为\
  \ `Note` 的结构体，并将一个模板声明为字符串常量：\n\n```go\nconst tmpl = `Note - Title: {{.Title}},\
  \ Description: {{.Description}}`\n```\n\n在模板中，`Note` 结构体的 `Title` 和 `Description`\
  \ 字段已被映射，因此当模板执行时，可以渲染包含 `Note` 对象值的文本输出。模板块 `{{ . }}` 是一个上下文感知块，将根据执行上下文执行。这里在模板执行时提供了\
  \ `Note` 对象，因此点号 (`.`) 后面的名称映射了 `Note` 对象的字段名。\n\n创建了一个名为 `\"note\"` 的新模板。`New`\
  \ 函数返回类型 `*Template`：\n\n```go\nt := template.New(\"note\")\n```\n\n`Parse` 方法将一个字符串解析为模板：\n\
  \n```go\nt, err := t.Parse(tmpl)\n```\n\n这里模板是从一个用常量变量声明的字符串解析的。要从模板文件解析模板，请使用 `*Template`\
  \ 的 `ParseFiles` 方法：\n\n```go\nfunc (t *Template) ParseFiles(filenames ...string)\
  \ (*Template, error)\n```\n\n`ParseGlob` 方法解析由模式标识的文件中的模板定义。以下是一个示例，用于解析文件夹中所有扩展名为\
  \ `.tmpl` 的模板定义文件：\n\n```go\nt, err := template.ParseGlob(\"templates/*.tmpl\")\n\
  ```\n\n上述代码块解析了 `templates` 文件夹中所有文件扩展名为 `.tmpl` 的模板定义。\n\n`Execute` 方法将解析后的模板应用于指定的数据对象（此处为\
  \ `Note` 对象），并将输出写入输出写入器。如果在模板执行期间或写入其输出时发生错误，则执行停止，但部分结果可能已经写入输出写入器：\n\n```go\n\
  err1 := t.Execute(os.Stdout, note)\n```\n\n以下是使用 `text/template` 生成文本输出的步骤总结：\n\n\
  1. 声明一个模板，用于与数据对象映射。\n2. 通过调用 `template.New` 函数创建一个模板（`*Template`）。\n3. 通过调用 `Parse`\
  \ 方法将字符串解析为模板。\n4. 使用指定的数据对象执行解析后的模板，以使用数据对象的值渲染文本内容。\n\n在前面的程序中，将一个简单的结构体对象应用于模板以生成输出。让我们看看如何将对象集合应用于模板以生成文本输出。\n\
  \n清单 5-2 是一个示例程序，它使用集合对象渲染文本模板。\n\n**清单 5-2. 将对象切片应用于模板**\n\n```go\npackage main\n\
  \nimport (\n    \"log\"\n    \"os\"\n    \"text/template\"\n)\n\ntype Note struct\
  \ {\n```\n\n\n\n`Title` `string`\n\n`Description` `string`\n\n`}`\n\n```go\nconst\
  \ tmpl = `Notes are:\n{{range .}}\nTitle: {{.Title}}, Description: {{.Description}}\n\
  {{end}}\n`\n```\n\n```go\nfunc main() {\n    //创建 Note 对象的切片\n    notes := []Note{\n\
  \        {\"text/template\", \"模板生成文本输出\"},\n        {\"html/template\", \"模板生成\
  \ HTML 输出\"},\n    }\n    //创建一个带名称的新模板\n    t := template.New(\"note\")\n    //解析一些内容并生成一个模板\n\
  \    t, err := t.Parse(tmpl)\n    if err != nil {\n        log.Fatal(\"Parse: \"\
  , err)\n        return\n    }\n    //将解析后的模板应用于 Note 对象的切片\n    if err := t.Execute(os.Stdout,\
  \ notes); err!=nil {\n        log.Fatal(\"Execute: \", err)\n        return\n  \
  \  }\n}\n```\n\n您应该会得到如下输出：\n\n```\nNotes are:\nTitle: text/templates, Description:\
  \ Template generates textual output\nTitle: html/templates, Description: Template\
  \ generates HTML output\n```\n\n模板定义被声明为一个字符串常量：\n\n```go\nconst tmpl = `Notes are:\n\
  {{range .}}\nTitle: {{.Title}}, Description: {{.Description}}\n{{end}}\n`\n```\n\
  \n在此列表中，提供了 `Note` 结构体的切片作为数据对象。这里的模板定义块 `{{.}}` 代表集合对象，我们可以通过 `{{range .}}` 动作遍历该集合。所有控制结构（`if`、`with`\
  \ 或 `range`）的定义必须以 `{{end}}` 结束。\n\n#### 定义命名模板\n\n模板定义可以通过 `define` 和 `end` 动作来定义。`define`\
  \ 动作通过提供一个字符串常量来命名正在创建的模板，这在处理嵌套模板定义时会非常有用。（后续在构建 Web 应用时，将使用嵌套模板。）示例 5-3 是一个示例程序。\n\
  \n**示例 5-3.** 定义一个模板定义\n\n```go\npackage main\n\nimport (\n    \"log\"\n    \"os\"\
  \n    \"text/template\"\n)\n\nfunc main() {\n    t, err := template.New(\"test\"\
  ).Parse(`{{define \"T\"}}你好, {{.}}!{{end}}`)\n    err = t.ExecuteTemplate(os.Stdout,\
  \ \"T\", \"世界\")\n    if err != nil {\n        log.Fatal(\"Execute: \", err)\n \
  \   }\n}\n```\n\n您应该会得到如下输出：\n\n```\n你好 世界!\n```\n\n在前面的程序中，模板定义被定义了一个名为 `\"T\"\
  ` 的名称。`ExecuteTemplate` 方法用于执行名为 `\"T\"` 的模板，它应用字符串数据 `\"World\"`（即“世界”），该数据会映射到模板定义块\
  \ `{{.}}` 中。请记住，`define` 动作必须以 `end` 动作闭合，您可以在 `define` 和 `end` 动作之间提供模板定义。\n\n\
  #### 声明变量\n\n可以在模板定义中声明变量，这些变量可以在模板定义中被引用以供后续使用。要声明变量，请在 `{{ }}` 块中使用 `$variable`。示例\
  \ 5-4 是一个示例。\n\n**示例 5-4.** 声明一个变量并随后引用它\n\n```go\n{{ $note := \"样本备忘\"}}\n{{ $note\
  \ }}\n```\n\n这里声明了一个 `$note` 变量，并通过简单地指定变量名来随后引用它。`{{ $note }}` 命令打印 `$note` 变量的值。\n\
  \n当您使用 `range` 动作声明变量时，变量值将是每次迭代中的连续元素。`range` 动作可以为键和值元素声明两个变量，用逗号分隔（参见 示例 5-5）。\n\
  \n**示例 5-5.** 使用 `range` 动作声明变量\n\n```go\n{{range $key,$value := . }}\n```\n\n如果您将\
  \ `range` 动作与映射一起使用，则 `$key` 变量是映射的存储键，而 `$value` 变量是每次迭代中的存储值元素。\n\n#### 使用管道\n\
  \n当您使用 Go 模板时，您可以通过管道一个接一个地执行动作：每个管道的输出成为下一个管道的输入。示例 5-6 展示了一个示例。\n\n**示例 5-6.**\
  \ 在模板中使用管道\n\n```go\n{{ eq $a $b | if }} a 和 b 相等{{ end }}\n```\n\n这里，如果变量 `$a`\
  \ 和 `$b` 的值相等，则打印一个输出值。\n\n### 使用 `html/template` 构建 HTML 视图\n\n当您构建 Web 应用时，您必须使用应用数据来渲染视图（UI）模板。标准库包\
  \ `html/template` 让您可以在 Go 中构建动态 Web 应用的用户界面。当您构建 Web 应用时，您可以通过将 Go 模板语法与 HTML、CSS\
  \ 和 JavaScript 结合来定义视图模板，这些模板可以在运行时通过使用各种数据结构提供应用数据来渲染为网页。\n\n`html/template` 包提供与\
  \ `text/template` 相同的接口，但模板定义的输出是 HTML。`html/template` 不仅生成 HTML，而且在渲染 HTML 页面时还能防止某些代码注入。当您为\
  \ Web 应用渲染 HTML 视图时，必须使用 `html/template` 而不是 `text/template`。\n\n使用 `html/template`\
  \ 的最大优势在于它能通过适当的安全模型安全地进行 HTML 编码。示例 5-7 展示了一个防范脚本注入的程序。\n\n**示例 5-7.** `html/template`\
  \ 防范脚本注入\n\n```go\npackage main\n\nimport (\n    \"html/template\"\n    \"log\"\n\
  \    \"os\"\n)\n\nfunc main() {\n    t, err := template.New(\"test\").Parse(`{{define\
  \ \"T\"}}你好, {{.}}!{{end}}`)\n    err = t.ExecuteTemplate(os.Stdout, \"T\", \"<script>alert('XSS\
  \ 注入')</script>\")\n    if err != nil {\n        log.Fatal(\"Execute: \", err)\n\
  \    }\n}\n```\n\n您应该会得到如下输出：\n\n```\n你好, &lt;script&gt;alert(&#39;XSS 注入&#39;)&lt;/script&gt;!\n\
  ```\n\n该模板安全地对输出进行了编码，将脚本块替换为相应的文本。\n\n#### 构建一个 Web 应用\n\n在本节中，您将通过构建一个简单的 Web\
  \ 应用来学习如何使用 `html/template` 构建 HTML 视图。\n\n图 5-1 展示了您将在下一节中构建的 Web 应用的文件夹结构。您将在\
  \ `GOPATH` 位置编写应用。所有模板定义文件都放入 `templates` 文件夹，静态文件（如 CSS 和 JS 文件）则放入 `public` 文件夹。\n\
  \n![A978-1-4842-1052-9_5_Fig1_HTML.jpg](img/A978-1-4842-1052-9_5_Fig1_HTML.jpg)\n\
  \n**图 5-1.** 示例 Web 应用的文件夹结构\n\n`html/template` 必须首先添加到导入列表中（参见 示例 5-8）。\n\n**示例\
  \ 5-8.** `main.go` 中的导入列表\n\n```go\nimport (\n        \"html/template\"\n      \
  \  \"log\"\n        \"net/http\"\n        \"strconv\"\n        \"time\"\n      \
  \  \"github.com/gorilla/mux\"\n)\n```\n\n#### 数据结构与数据存储\n\n在 示例 5-9 所示的示例 Web 应用中，使用结构体类型作为数据结构，并针对该结构体类型执行\
  \ CRUD 操作。使用映射类型作为存储，以持久化带有键的映射类型对象。该键将通过递增变量 `id` 来生成。\n\n**示例 5-9.** `main.go`\
  \ 中的数据结构与数据存储\n\n```go\ntype Note struct {\n    Title       string\n    Description\
  \ string\n    CreatedOn   time.Time\n}\n\n//Notes 集合的存储\nvar noteStore = make(map[string]Note)\n\
  \n//用于生成集合键的变量\nvar id int = 0\n```\n\n\n\n#### main 函数\n\n清单 5-10 展示了程序的入口点，其中配置了\
  \ HTTP 请求多路复用器并启动了 HTTP 服务器。\n\n清单 5-10. `main.go` 中的程序入口点\n\n```\n//程序入口点\nfunc\
  \ main() {\n    r := mux.NewRouter().StrictSlash(false)\n    fs := http.FileServer(http.Dir(\"\
  public\"))\n    r.Handle(\"/public/\", fs)\n    r.HandleFunc(\"/\", getNotes)\n\
  \    r.HandleFunc(\"/notes/add\", addNote)\n    r.HandleFunc(\"/notes/save\", saveNote)\n\
  \    r.HandleFunc(\"/notes/edit/{id}\", editNote)\n    r.HandleFunc(\"/notes/update/{id}\"\
  , updateNote)\n    r.HandleFunc(\"/notes/delete/{id}\", deleteNote)\n    server\
  \ := &http.Server{\n        Addr:    \":8080\",\n        Handler: r,\n    }\n  \
  \  log.Println(\"Listening...\")\n    server.ListenAndServe()\n}\n```\n\n#### 视图与模板定义文件\n\
  \n该 Web 应用提供以下 HTML 页面：\n\n-   `Index` 页面显示 `Note` 对象的列表。\n-   `Add` 页面用于创建新的 `Note`。\n\
  -   `Edit` 页面用于编辑已有的 `Note` 对象。\n\n创建了四个模板定义文件来渲染 HTML 视图：\n\n-   `index.html`：用于生成\
  \ `Index` 页面内容的模板定义文件。\n-   `add.html`：用于生成 `Add` 页面内容的模板定义文件。\n-   `edit.html`：用于生成\
  \ `Edit` 页面内容的模板定义文件。\n-   `base.html`：一个嵌套的模板定义文件，用于生成 Web 应用的所有页面。你需要提供合适的内容页面来渲染每个网页。\n\
  \n清单 5-11 是 `base.html` 的模板定义文件。\n\n清单 5-11. `base.html` 中的模板定义\n\n```\n{{define\
  \ \"base\"}}\n<html>\n  <head>{{template \"head\" .}}</head>\n  <body>{{template\
  \ \"body\" .}}</body>\n</html>\n{{end}}\n```\n\n这里定义了一个名为 `base` 的模板，其中嵌入了两个模板。为了渲染网页，每次都会调用\
  \ `base` 模板，同时从内容页面提供名为 `head` 和 `body` 的模板。例如，当渲染 `Index` 页面时，会解析来自 `base.html`\
  \ 和 `index.html` 的模板定义文件，然后执行在 `base.html` 中定义的嵌套模板 `base`，并从 `index.html` 中获取 `head`\
  \ 和 `body` 的内容。\n\n#### 初始化视图模板\n\n模板定义文件必须在模板执行之前进行解析。解析模板定义文件是一次性操作，不需要每次执行模板时都解析这些文件。这里解析了这些文件，并将它们放入一个映射中，其中每个元素代表渲染特定页面的模板文件。需要生成三个\
  \ HTML 页面，因此映射中放入了三个元素。模板定义文件在 `init` 函数中解析，并使用 `Must` 辅助函数进行解析。`Must` 是一个辅助函数，它包装了对返回\
  \ `(*Template, error)` 的函数的调用，并在返回非 `nil` 错误时触发 `panic`。\n\n清单 5-12 使用 `Must` 辅助函数解析模板文件并将其放入映射中。\n\
  \n清单 5-12. 在 `main.go` 的 `init` 函数中编译视图模板文件\n\n```\nvar templates map[string]*template.Template\n\
  \n//编译视图模板\nfunc init() {\n    if templates == nil {\n        templates = make(map[string]*template.Template)\n\
  \    }\n    templates[\"index\"] = template.Must(template.ParseFiles(\"templates/index.html\"\
  , \"templates/base.html\"))\n    templates[\"add\"] = template.Must(template.ParseFiles(\"\
  templates/add.html\", \"templates/base.html\"))\n    templates[\"edit\"] = template.Must(template.ParseFiles(\"\
  templates/edit.html\", \"templates/base.html\"))\n}\n```\n\n对于每个内容页面，相应的内容文件会与 `base.html`\
  \ 一起被解析。\n\n清单 5-13 是一个渲染单个网页的辅助函数。\n\n清单 5-13. 在 `main.go` 中渲染模板的辅助函数\n\n```\n\
  //根据给定的名称、模板定义和数据对象渲染模板\nfunc renderTemplate(w http.ResponseWriter, name string,\
  \ template string, viewModel interface{}) {\n    // 确保模板在映射中存在。\n    tmpl, ok :=\
  \ templates[name]\n    if !ok {\n        http.Error(w, \"The template does not exist.\"\
  , http.StatusInternalServerError)\n    }\n    err := tmpl.ExecuteTemplate(w, template,\
  \ viewModel)\n    if err != nil {\n        http.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \    }\n}\n```\n\n这里参数 `name` 用作从映射中检索模板文件的键，而参数 `template` 则用于在执行模板时提供模板名称。`renderTemplate`\
  \ 函数使用 `interface{}` 类型作为数据对象的类型，因此你可以传递任何类型的数据对象以应用到模板中。`interface{}` 类型被称为“空接口”，它可以容纳任何类型的值。当你运行时不知道传递给函数参数的类型，或者希望提供任意类型的值时，这种类型非常有用。\n\
  \n\n\n#### 渲染索引页面\n\n让我们渲染 `Index` 页面，以显示 `Note` 对象的列表。清单 5-14 是 `index.html` 中的模板定义。\n\
  \n**清单 5-14.** `index.html` 中的模板定义\n\n```html\n{{define \"head\"}}<title>Index</title>{{end}}\n\
  \n{{define \"body\"}}\n<h1>Notes List</h1>\n<p>\n<a href=\"/notes/add\" >Add Note</a>\n\
  </p>\n<div>\n<table border=\"1\">\n    <tr>\n        <th>Title</th>\n        <th>Description</th>\n\
  \        <th>Created On</th>\n        <th>Actions</th>\n    </tr>\n    {{range $key,$value\
  \ := . }}\n    <tr>\n        <td> {{$value.Title}}</td>\n        <td>{{$value.Description}}</td>\n\
  \        <td>{{$value.CreatedOn}}</td>\n        <td>\n            <a href=\"/notes/edit/{{$key}}\"\
  \ >Edit</a> |\n            <a href=\"/notes/delete/{{$key}}\" >Delete</a>\n    \
  \    </td>\n    </tr>\n{{end}}\n</table>\n</div>\n{{end}}\n```\n\n定义了两个模板的命名定义：`head`\
  \ 和 `body`。两者都将被 `base.html` 中定义的 `base` 模板使用。当执行 `Index` 页面时，会传递一个映射对象，该对象每个元素都包含\
  \ `Note` 结构体的对象。`range` 动作用于遍历该映射对象。在 `range` 动作中，声明了两个变量，分别用于键和值元素，这些元素在 `range`\
  \ 动作内部被引用。`range` 动作必须以 `end` 动作结束。\n\n当用户请求路由 `\"/\"` 时，`Index` 页面通过调用 `main.go`\
  \ 中的 `getNotes` 请求处理器来渲染。清单 5-15 展示了 `getNotes` 函数。\n\n**清单 5-15.** `main.go` 中路由\
  \ `\"/\"` 的处理器函数\n\n```go\nfunc getNotes(w http.ResponseWriter, r *http.Request)\
  \ {\n    renderTemplate(w, \"index\", \"base\", noteStore)\n}\n```\n\n在 `getNotes`\
  \ 处理器函数中，调用了 `renderTemplate` 辅助函数来渲染 `Index` 页面。调用 `renderTemplate` 时，提供了 `http.ResponseWriter`\
  \ 对象作为 `io.Writer`，提供了 `index` 以获取解析后的模板来执行 `Index` 页面，提供了 `base` 以指定要执行的模板定义，并提供了映射对象作为应用于模板定义的数据对象。\n\
  \n当调用 `templates[\"index\"]` 时，您会得到通过使用模板定义文件 `index.html` 和 `base.html` 解析后编译好的模板。最终，从解析后的模板中执行\
  \ `base` 模板定义，该模板是一个嵌套模板，它从 `index.html` 文件中定义的 `head` 和 `page` 模板定义中获取内容。\n\n图\
  \ 5-2 显示了带有 `Note` 对象列表的 `Index` 页面。\n\n![A978-1-4842-1052-9_5_Fig2_HTML.jpg](img/A978-1-4842-1052-9_5_Fig2_HTML.jpg)\n\
  \n**图 5-2.** 索引页面\n\n请注意，图 5-2 显示了在为示例 Web 应用程序实现所有处理器函数后的最终结果。出于演示目的，已向 `noteStore`\
  \ 对象中添加了几个值。\n\n#### 渲染添加页面\n\n添加页面用于添加新的 `Note` 对象。`add.html` 用于提供 `head` 和 `body`\
  \ 部分的内容（参见清单 5-16）。\n\n**清单 5-16.** `add.html` 中的模板定义\n\n```html\n{{define \"head\"\
  }}<title>Add Note</title>{{end}}\n\n{{define \"body\"}}\n<h1>Add Note</h1>\n<form\
  \ action=\"/notes/save\" method=\"post\">\n    <p>Title:<br> <input type=\"text\"\
  \ name=\"title\"></p>\n    <p>Description:<br> <textarea rows=\"4\" cols=\"50\"\
  \ name=\"description\"></textarea> </p>\n    <p><input type=\"submit\" value=\"\
  submit\"/> </p>\n</form>\n{{end}}\n```\n\n当 HTTP 服务器收到对 `\"/notes/add\"` 路由的请求时，它会调用\
  \ `addNote` 处理器函数（参见清单 5-17）。\n\n**清单 5-17.** `main.go` 中 `\"/notes/add\"` 的处理器函数\n\
  \n```go\nfunc addNote(w http.ResponseWriter, r *http.Request) {\n    renderTemplate(w,\
  \ \"add\", \"base\", nil)\n}\n```\n\n当您不需要向模板定义提供任何数据对象时，`Add` 页面用于添加新的 `Note` 对象。因此，传递\
  \ `nil` 作为数据对象。提供字符串 `\"add\"` 作为映射对象的键，以获取已解析的模板（该模板通过使用模板定义文件 `add.html` 和 `base.html`\
  \ 解析得到），用于渲染添加页面。\n\n图 5-3 显示了添加页面，它提供了用于创建新 `Note` 的用户界面。\n\n![A978-1-4842-1052-9_5_Fig3_HTML.jpg](img/A978-1-4842-1052-9_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** 添加页面\n\n当用户提交 HTML 表单时，会向服务器发送一个 HTTP `POST` 请求，请求的 URL 为 `\"/notes/save\"\
  `，该请求将由清单 5-18 中所示的处理器函数处理。\n\n**清单 5-18.** 在 `main.go` 中保存新 Note 对象的处理器函数\n\n```go\n\
  //Handler for \"/notes/save\" for save a new item into the data store\nfunc saveNote(w\
  \ http.ResponseWriter, r *http.Request) {\n    r.ParseForm()\n    title := r.PostFormValue(\"\
  title\")\n    desc := r.PostFormValue(\"description\")\n    note := Note{title,\
  \ desc, time.Now()}\n    //increment the value of id for generating key for the\
  \ map\n    id++\n    //convert id value to string\n    k := strconv.Itoa(id)\n \
  \   noteStore[k] = note\n    http.Redirect(w, r, \"/\", 302)\n}\n```\n\n`saveHandler`\
  \ 函数通过调用 `ParseForm` 方法从 `*http.Request` 对象解析表单值；然后通过调用 `PostFormValue(\"element_name\"\
  )` 读取表单字段值。在清单 5-18 中，从 HTML 表单元素 `title` 和 `description` 中读取值。`id` 的值递增，以便为 `noteStore`\
  \ 映射对象生成一个键，最后将新添加的 `Note` 对象使用生成的键添加到 `noteStore` 映射对象中。请求被重定向到 `\"/\"` 以跳转到 `Index`\
  \ 页面，在其中可以看到新添加的数据。\n\n\n\n#### 渲染编辑页面\n\n编辑页面用于修改已有的`Note`对象。`edit.html`被用来提供`head`和`body`部分的内容（参见代码清单\
  \ 5-19）。\n\n**代码清单 5-19.** `edit.html` 中的模板定义\n\n```\n{{define \"head\"}}<title>编辑笔记</title>{{end}}\n\
  {{define \"body\"}}\n<h1>编辑笔记</h1>\n<form action=\"/notes/update/{{.Id}}\" method=\"\
  post\">\n<p>标题：<br> <input type=\"text\" value=\"{{.Note.Title}}\" name=\"title\"\
  ></p>\n<p>描述：<br> <textarea rows=\"4\" cols=\"50\" name=\"description\">{{.Note.Description}}</textarea>\
  \ </p>\n<p><input type=\"submit\" value=\"提交\"/></p>\n</form>\n{{end}}\n```\n\n\
  在`edit.html`中，`Note`对象的数据元素与 HTML 表单字段值进行映射，以编辑已有的条目。该模板定义与`EditNote`结构体的数据对象相对应，该结构体包含一个待编辑条目的`id`，以及用于编辑`Note`对象字段的`Note`对象。当执行渲染编辑页面的模板时，会提供一个`EditNote`结构体的实例作为数据对象（参见代码清单\
  \ 5-20）。\n\n**代码清单 5-20.** 编辑条目的数据模型\n\n```\n//编辑的视图模型\ntype EditNote struct {\n\
  \    Note\n    Id string\n}\n```\n\n当 HTTP 服务器收到对`\"/notes/edit/{id}\"`路由的请求时，会调用`editNote`处理函数（参见代码清单\
  \ 5-21）。\n\n**代码清单 5-21.** `main.go` 中 `\"/notes/edit/{id}\"` 的处理函数\n\n```\n//处理\
  \ \"/notes/edit/{id}\" 以编辑已有条目\nfunc editNote(w http.ResponseWriter, r *http.Request)\
  \ {\n    var viewModel EditNote\n    //从路由变量中读取值\n    vars := mux.Vars(r)\n    k\
  \ := vars[\"id\"]\n    if note, ok := noteStore[k]; ok {\n        viewModel = EditNote{note,\
  \ k}\n    } else {\n        http.Error(w, \"找不到要编辑的资源。\", http.StatusBadRequest)\n\
  \    }\n    renderTemplate(w, \"edit\", \"base\", viewModel)\n}\n```\n\n一个`EditNote`结构体实例作为数据对象提供给模板定义。字符串`\"\
  edit\"`作为映射对象的键，用于获取已解析的模板（该模板通过模板定义文件`edit.html`和`base.html`解析得到），以渲染编辑页面。\n\n\
  图 5-4 展示了编辑页面的界面，它为用户提供了编辑已有`Note`的界面。\n\n![A978-1-4842-1052-9_5_Fig4_HTML.jpg](img/A978-1-4842-1052-9_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 编辑页面\n\n当用户编辑完`Note`对象的值并提交 HTML 表单后，会向服务器发送一个针对 URL `\"/notes/update/{id}\"\
  ` 的 HTTP `POST` 请求，该请求将由代码清单 5-22 所示的处理函数处理。\n\n**代码清单 5-22.** `main.go` 中 `\"/notes/update/{id}\"\
  ` 的处理函数（用于更新已有条目）\n\n```\n//处理 \"/notes/update/{id}\" 以更新数据存储中的条目\nfunc updateNote(w\
  \ http.ResponseWriter, r *http.Request) {\n    //从路由变量中读取值\n    vars := mux.Vars(r)\n\
  \    k := vars[\"id\"]\n    var noteToUpd Note\n    if note, ok := noteStore[k];\
  \ ok {\n        r.ParseForm()\n        noteToUpd.Title = r.PostFormValue(\"title\"\
  )\n        noteToUpd.Description = r.PostFormValue(\"description\")\n        noteToUpd.CreatedOn\
  \ = note.CreatedOn\n        //删除已有条目并添加更新后的条目\n        delete(noteStore, k)\n  \
  \      noteStore[k] = noteToUpd\n    } else {\n        http.Error(w, \"找不到要更新的资源。\"\
  , http.StatusBadRequest)\n    }\n    http.Redirect(w, r, \"/\", 302)\n}\n```\n\n\
  与代码清单 5-18 中添加新`Note`对象类似，会解析来自`*http.Request`对象的表单字段值，并更新`Note`对象的值。随后请求被重定向到`\"\
  /\"`，即跳转到首页，在首页中可以看到更新后的值。\n\n`main.go`的完整源代码在代码清单 5-23 中给出。\n\n**代码清单 5-23.** `main.go`\n\
  \n```\npackage main\n\nimport (\n    \"html/template\"\n    \"log\"\n    \"net/http\"\
  \n    \"strconv\"\n)\n```\n\n\n\n```go\n\"time\"\n\"github.com/gorilla/mux\"\n```\n\
  \n```go\ntype Note struct {\n    Title       string\n    Description string\n  \
  \  CreatedOn   time.Time\n}\n\n// 用于编辑的视图模型\ntype EditNote struct {\n    Note\n\
  \    Id string\n}\n\n// 笔记集合的存储\nvar noteStore = make(map[string]Note)\n\n// 用于生成集合键值的变量\n\
  var id int = 0\nvar templates map[string]*template.Template\n\n// 编译视图模板\nfunc init()\
  \ {\n    if templates == nil {\n        templates = make(map[string]*template.Template)\n\
  \    }\n    templates[\"index\"] = template.Must(template.ParseFiles(\"templates/index.html\"\
  , \"templates/base.html\"))\n    templates[\"add\"] = template.Must(template.ParseFiles(\"\
  templates/add.html\", \"templates/base.html\"))\n    templates[\"edit\"] = template.Must(template.ParseFiles(\"\
  templates/edit.html\", \"templates/base.html\"))\n}\n\n// 根据给定的名称、模板定义和数据对象渲染模板\n\
  func renderTemplate(w http.ResponseWriter, name string, template string, viewModel\
  \ interface{}) {\n    // 确保模板存在于模板映射中\n    tmpl, ok := templates[name]\n    if !ok\
  \ {\n        http.Error(w, \"模板不存在。\", http.StatusInternalServerError)\n    }\n\
  \    err := tmpl.ExecuteTemplate(w, template, viewModel)\n    if err != nil {\n\
  \        http.Error(w, err.Error(), http.StatusInternalServerError)\n    }\n}\n\n\
  // 处理 \"/notes/save\" 路由，将新条目保存到数据存储中\nfunc saveNote(w http.ResponseWriter, r *http.Request)\
  \ {\n    r.ParseForm()\n    title := r.PostFormValue(\"title\")\n    desc := r.PostFormValue(\"\
  description\")\n    note := Note{title, desc, time.Now()}\n    // 增加 id 值，为映射生成键值\n\
  \    id++\n    // 将 id 值转换为字符串\n    k := strconv.Itoa(id)\n    noteStore[k] = note\n\
  \    http.Redirect(w, r, \"/\", 302)\n}\n\n// 处理 \"/notes/add\" 路由，添加新条目\nfunc addNote(w\
  \ http.ResponseWriter, r *http.Request) {\n    renderTemplate(w, \"add\", \"base\"\
  , nil)\n}\n\n// 处理 \"/notes/edit/{id}\" 路由，编辑现有条目\nfunc editNote(w http.ResponseWriter,\
  \ r *http.Request) {\n    var viewModel EditNote\n    // 从路由变量中读取值\n    vars :=\
  \ mux.Vars(r)\n    k := vars[\"id\"]\n    if note, ok := noteStore[k]; ok {\n  \
  \      viewModel = EditNote{note, k}\n    } else {\n        http.Error(w, \"找不到要编辑的资源。\"\
  , http.StatusBadRequest)\n    }\n    renderTemplate(w, \"edit\", \"base\", viewModel)\n\
  }\n\n// 处理 \"/notes/update/{id}\" 路由，更新数据存储中的条目\nfunc updateNote(w http.ResponseWriter,\
  \ r *http.Request) {\n    // 从路由变量中读取值\n    vars := mux.Vars(r)\n    k := vars[\"\
  id\"]\n    var noteToUpd Note\n    if note, ok := noteStore[k]; ok {\n        r.ParseForm()\n\
  \        noteToUpd.Title = r.PostFormValue(\"title\")\n        noteToUpd.Description\
  \ = r.PostFormValue(\"description\")\n        noteToUpd.CreatedOn = note.CreatedOn\n\
  \        // 删除现有条目并添加更新后的条目\n        delete(noteStore, k)\n        noteStore[k]\
  \ = noteToUpd\n    } else {\n        http.Error(w, \"找不到要更新的资源。\", http.StatusBadRequest)\n\
  \    }\n    http.Redirect(w, r, \"/\", 302)\n}\n\n// 处理 \"/notes/delete/{id}\" 路由，从存储中删除条目\n\
  func deleteNote(w http.ResponseWriter, r *http.Request) {\n    // 从路由变量中读取值\n  \
  \  vars := mux.Vars(r)\n    k := vars[\"id\"]\n    // 从存储中移除\n    if _, ok := noteStore[k];\
  \ ok {\n        // 删除现有条目\n        delete(noteStore, k)\n    } else {\n        http.Error(w,\
  \ \"找不到要删除的资源。\", http.StatusBadRequest)\n    }\n    http.Redirect(w, r, \"/\",\
  \ 302)\n}\n\n// 处理 \"/\" 路由，渲染主页\nfunc getNotes(w http.ResponseWriter, r *http.Request)\
  \ {\n    renderTemplate(w, \"index\", \"base\", noteStore)\n}\n\n// 程序入口点\nfunc\
  \ main() {\n    r := mux.NewRouter().StrictSlash(false)\n    fs := http.FileServer(http.Dir(\"\
  public\"))\n    r.Handle(\"/public/\", fs)\n    r.HandleFunc(\"/\", getNotes)\n\
  \    r.HandleFunc(\"/notes/add\", addNote)\n    r.HandleFunc(\"/notes/save\", saveNote)\n\
  \    r.HandleFunc(\"/notes/edit/{id}\", editNote)\n    r.HandleFunc(\"/notes/update/{id}\"\
  , updateNote)\n    r.HandleFunc(\"/notes/delete/{id}\", deleteNote)\n    server\
  \ := &http.Server{\n        Addr:    \":8080\",\n        Handler: r,\n    }\n  \
  \  log.Println(\"正在监听...\")\n    server.ListenAndServe()\n}\n```\n\n在这个例子中，通过利用标准库包\
  \ `html/template` 来渲染包含动态数据的用户界面，在 Go 中完成了一个完整的 Web 应用程序。模板定义文件被解析并放入一个映射对象中，这样你就可以在需要执行模板时轻松获取解析后的模板文件。这种方法避免了每次执行模板时都重新解析模板文件，从而提高了\
  \ Web 应用程序的性能。通过利用示例应用程序中展示的各种技术，你可以构建真实的 Web 应用程序。\n\n### 总结\n\n本章通过开发一个 Web 应用程序，展示了如何使用\
  \ Go 模板。在处理数据驱动的 Web 应用程序时，你必须利用模板来渲染 HTML 页面，在这些页面中，你可以通过将数据对象应用于模板，将静态内容与动态内容结合起来。\n\
  \n`html/template` 包用于渲染 HTML 页面。它在渲染 HTML 输出时还提供了针对各种代码注入的安全机制。`html/template` 和\
  \ `text/template` 为模板作者提供了相同的接口，其中 `html/template` 生成 HTML 输出，而 `text/template`\
  \ 生成文本输出。通过利用标准库包 `net/http` 和 `html/template`，你可以在 Go 中构建功能完备的 Web 应用程序。\n\n"
- "# 6. HTTP 中间件\n\n最后两章探讨了构建 Web 应用程序和 Web API 的各个方面。本章将介绍 HTTP 中间件，它在构建真实世界的 Web\
  \ 应用程序时可以简化开发工作。Go 开发者社区在构建 Web 应用程序时，对于采用完整的 Web 应用程序框架的兴趣并不浓厚。相反，他们更倾向于使用诸如基础构建块之类的标准库包，以及一些必要的第三方库，例如\
  \ Gorilla `mux`。编写和使用 HTTP 中间件是坚持这种策略的一种基本方法。你可以将许多横切关注点，例如安全性、HTTP 请求和响应日志记录、压缩\
  \ HTTP 响应以及缓存，实现为中间件组件；并且这些中间件组件可以应用于许多应用程序处理器或跨应用程序的处理器。\n\n\n\n### HTTP 中间件简介\n\
  \n在构建 Web 应用程序时，您可能需要为部分或所有 HTTP 请求处理程序执行一些共享功能。例如，假设您想将所有 HTTP 请求记录到 Web 服务器；为每个\
  \ HTTP 请求处理程序实现日志记录逻辑将是一项繁琐的工作。最好使用特殊类型的处理程序来实现共享行为，并将其应用于部分或所有应用程序处理程序。通过使用 HTTP\
  \ 中间件，您可以在 Web 应用程序中实现此类功能。使用 HTTP 中间件处理程序是在应用程序中实现共享行为的一种绝佳方式。\n\n中间件是一段可插拔且自包含的代码，它包装一个\
  \ Web 应用程序。它可以用来在 HTTP 请求处理程序中实现共享行为。中间件组件可以插入到应用程序中，作为请求处理周期中的另一个层，它可以在 HTTP 请求处理程序之前或之后执行某些逻辑。例如，要记录所有\
  \ HTTP 请求，您可以编写日志记录中间件，将其装饰到请求处理程序中，从而为每个发往 Web 服务器的 HTTP 请求应用日志记录功能。由于中间件是独立的代码段，它不会影响您的应用程序逻辑。您可以在需要时将中间件组件装饰到\
  \ HTTP 请求处理程序中，也可以在不需要时将其移除。\n\n以下是您可以使用中间件的一些示例场景：\n\n- 记录 HTTP 请求和响应\n- 压缩 HTTP\
  \ 响应\n- 编写通用的响应头\n- 创建数据库会话对象\n- 实现安全性和验证身份凭证\n\n### 编写 HTTP 中间件\n\nGo 标准库包 `net/http`\
  \ 提供了诸如 `StripPrefix` 和 `TimeoutHandler` 之类的函数，它们类似于中间件：它们包装请求处理程序，并在请求处理周期中提供额外的实现。`StripPrefix`\
  \ 和 `TimeoutHandler` 都将 `http.Handler` 以及其他参数作为参数，并返回一个 `http.Handler`，以便您可以轻松地将其包装到正常的处理程序中，以执行一些额外的逻辑。`StripPrefix`\
  \ 函数接受一个字符串前缀和一个 `http.Handler` 作为参数，并返回一个处理程序，该处理程序通过从请求 URL 的路径中移除给定前缀来服务 HTTP\
  \ 请求（参见列表 6-1）。\n\n列表 6-1. 使用 `StripPrefix` 包装 `http.FileServer` 处理程序\n\n```\npackage\
  \ main\n\nimport (\n    \"net/http\"\n)\n\nfunc main() {\n    // 要以备选 URL 路径 (/public/)\
  \ 提供磁盘目录 (/public) 中的服务，\n    // 请使用 StripPrefix 在 FileServer 看到请求 URL\n    // 的路径之前修改它：\n\
  \    fs := http.FileServer(http.Dir(\"public\"))\n    http.Handle(\"/public/\",\
  \ http.StripPrefix(\"/public/\", fs))\n}\n```\n\n`StripPrefix` 函数包装了 `http.FileServer`\
  \ 处理程序，并提供了额外的功能，因为它通过从请求 URL 的路径中移除给定前缀并调用给定的处理程序对象来修改请求 URL 的路径。\n\n列表 6-2 是 `StripPrefix`\
  \ 函数的 Go 源代码。\n\n列表 6-2. 来自 `net/http` 库的 `StripPrefix` 源码\n\n```\nfunc StripPrefix(prefix\
  \ string, h Handler) Handler {\n    if prefix == \"\" {\n        return h\n    }\n\
  \    return HandlerFunc(func(w ResponseWriter, r *Request) {\n        if p := strings.TrimPrefix(r.URL.Path,\
  \ prefix); len(p) < len(r.URL.Path) {\n            r.URL.Path = p\n            h.ServeHTTP(w,\
  \ r)\n        } else {\n            NotFound(w, r)\n        }\n    })\n}\n```\n\n\
  `StripPrefix` 函数通过将一个签名如 `func(w ResponseWriter, r *Request)` 的匿名函数转换为 `HandlerFunc`\
  \ 类型，来返回一个 `http.Handler` 对象。当您编写包装处理程序函数时，您可以在正常处理程序函数之前或之后执行额外的逻辑。在 `StripPrefix`\
  \ 函数中，`http` 库在执行正常处理程序之前执行逻辑。该函数通过调用 `ServeHTTP` 方法来调用给定的处理程序（应用程序处理程序或另一个包装处理程序）：\n\
  \n```\nif p := strings.TrimPrefix(r.URL.Path, prefix); len(p) < len(r.URL.Path)\
  \ {\n    r.URL.Path = p\n    h.ServeHTTP(w, r)\n} else {\n    NotFound(w, r)\n}\n\
  ```\n\n您可以像 `http` 包实现包装处理程序函数一样轻松地编写 HTTP 中间件。您可以通过实现签名如 `func(http.Handler) http.Handler`\
  \ 的函数来编写中间件函数。如果您想向中间件函数传递任何值，您可以像 `http` 包中的 `StripPrefix` 函数那样，将它们作为函数参数与 `http.Handler`\
  \ 一起提供。\n\n#### 如何编写 HTTP 中间件\n\n编写 HTTP 中间件的基本步骤如下：\n\n- 编写一个函数，以 `http.Handler`\
  \ 作为函数参数，这样您就可以将其他中间件处理程序以及正常的应用程序处理程序作为函数参数传入。您可以通过在中间件函数内调用 `ServeHTTP` 方法来调用这些处理程序函数。\n\
  - 从中间件函数返回 `http.Handler`，以便与其他中间件处理程序链接，并与正常的应用程序处理程序一起包装。由于中间件函数返回 `http.Handler`，您可以将其注册到\
  \ `ServeMux` 对象中。\n\n列表 6-3 展示了编写 HTTP 中间件的模式。\n\n列表 6-3. 编写中间件的模式\n\n```\nfunc\
  \ middlewareHandler(next http.Handler) http.Handler {\n  return http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\n    // 在执行应用程序处理程序之前，在此处放置中间件逻辑\n   \
  \ next.ServeHTTP(w, r)\n    // 在执行应用程序处理程序之后，在此处放置中间件逻辑\n  })\n}\n```\n\n\n\n####\
  \ 编写日志记录中间件\n\n让我们编写一个 HTTP 中间件来记录所有 HTTP 请求，这样该行为就可以应用于多个应用程序处理器。\n\n清单 6-4 是一个日志记录中间件的示例。\n\
  \n**清单 6-4.** 日志记录中间件\n\n```\npackage main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\t\
  \"net/http\"\n\t\"time\"\n)\n\nfunc loggingHandler(next http.Handler) http.Handler\
  \ {\n\treturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {\n\t\
  \tstart := time.Now()\n\t\tlog.Printf(\"Started %s %s\", r.Method, r.URL.Path)\n\
  \t\tnext.ServeHTTP(w, r)\n\t\tlog.Printf(\"Completed %s in %v\", r.URL.Path, time.Since(start))\n\
  \t})\n}\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n\tlog.Println(\"\
  Executing index handler\")\n\tfmt.Fprintf(w, \"Welcome!\")\n}\n\nfunc about(w http.ResponseWriter,\
  \ r *http.Request) {\n\tlog.Println(\"Executing about handler\")\n\tfmt.Fprintf(w,\
  \ \"Go Middleware\")\n}\n\nfunc iconHandler(w http.ResponseWriter, r *http.Request)\
  \ {\n}\n\nfunc main() {\n\thttp.HandleFunc(\"/favicon.ico\", iconHandler)\n\tindexHandler\
  \ := http.HandlerFunc(index)\n\taboutHandler := http.HandlerFunc(about)\n\thttp.Handle(\"\
  /\", loggingHandler(indexHandler))\n\thttp.Handle(\"/about\", loggingHandler(aboutHandler))\n\
  \tserver := &http.Server{\n\t\tAddr: \":8080\",\n\t}\n\tlog.Println(\"Listening...\"\
  )\n\tserver.ListenAndServe()\n}\n```\n\n运行这个程序，并向`\"/\"`和`\"/about\"`发起请求。你应该会得到类似如下的日志输出：\n\
  \n```\n2015/04/25 19:40:10 Started GET /\n2015/04/25 19:40:10 Executing index handler\n\
  2015/04/25 19:40:10 Completed / in 0\n2015/04/25 19:40:18 Started GET /about\n2015/04/25\
  \ 19:40:18 Executing about handler\n2015/04/25 19:40:18 Completed /about in 1.0005ms\n\
  ```\n\n在前面的程序中，`loggingHandler`是 HTTP 中间件，它装饰了`\"/\"`和`\"/about\"`路由对应的应用程序处理器。中间件允许你将共享的行为功能复用到多个处理器上。在日志记录中间件处理器中，日志消息会在执行应用程序处理器之前和之后写入。该中间件函数在调用应用程序处理器之前记录请求的\
  \ HTTP 方法和 URL 路径，并在执行应用程序处理器之后记录执行所花费的时间。通过调用`next.ServeHTTP(w, r)`，中间件函数可以执行应用程序处理器函数：\n\
  \n```\nfunc loggingHandler(next http.Handler) http.Handler {\n\treturn http.HandlerFunc(func(w\
  \ http.ResponseWriter, r *http.Request) {\n\t\tstart := time.Now()\n\t\tlog.Printf(\"\
  Started %s %s\", r.Method, r.URL.Path)\n\t\tnext.ServeHTTP(w, r)\n\t\tlog.Printf(\"\
  Completed %s in %v\", r.URL.Path, time.Since(start))\n\t})\n}\n```\n\n应用程序处理器函数被转换为`HandlerFunc`函数类型，并传递给日志记录中间件处理器函数：\n\
  \n```\nindexHandler := http.HandlerFunc(index)\naboutHandler := http.HandlerFunc(about)\n\
  \nhttp.Handle(\"/\", loggingHandler(indexHandler))\nhttp.Handle(\"/about\", loggingHandler(aboutHandler))\n\
  ```\n\n#### 控制 HTTP 中间件的执行流\n\n由于 HTTP 中间件处理器函数将`http.Handler`作为函数参数并返回一个`http.Handler`，你可以轻松地与其他中间件处理器链式调用，并最终调用应用程序处理器。当你与其他中间件处理器链式调用时，理解中间件处理器的控制流至关重要。让我们编写几个中间件处理器，并将它们封装到应用程序处理器中。\n\
  \n清单 6-5 展示了中间件处理器的控制流。\n\n**清单 6-5.** 中间件处理器的控制流\n\n```\npackage main\n\nimport\
  \ (\n\"fmt\"\n\"log\"\n\"net/http\"\n)\n\nfunc middlewareFirst(next http.Handler)\
  \ http.Handler {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)\
  \ {\nlog.Println(\"MiddlewareFirst - Before Handler\")\nnext.ServeHTTP(w, r)\nlog.Println(\"\
  MiddlewareFirst - After Handler\")\n})\n}\n\nfunc middlewareSecond(next http.Handler)\
  \ http.Handler {\nreturn http.HandlerFunc(func(w http.ResponseWriter, r *http.Request)\
  \ {\nlog.Println(\"MiddlewareSecond - Before Handler\")\nif r.URL.Path == \"/message\"\
  \ {\nif r.URL.Query().Get(\"password\") == \"pass123\" {\nlog.Println(\"Authorized\
  \ to the system\")\nnext.ServeHTTP(w, r)\n} else {\nlog.Println(\"Failed to authorize\
  \ to the system\")\nreturn\n}\n} else {\nnext.ServeHTTP(w, r)\n}\nlog.Println(\"\
  MiddlewareSecond - After Handler\")\n})\n}\n\nfunc index(w http.ResponseWriter,\
  \ r *http.Request) {\nlog.Println(\"Executing index Handler\")\nfmt.Fprintf(w, \"\
  Welcome\")\n}\n\nfunc message(w http.ResponseWriter, r *http.Request) {\nlog.Println(\"\
  Executing message Handler\")\nfmt.Fprintf(w, \"HTTP Middleware is awesome\")\n}\n\
  \nfunc iconHandler(w http.ResponseWriter, r *http.Request) {\n}\n\nfunc main() {\n\
  http.HandleFunc(\"/favicon.ico\", iconHandler)\nhttp.Handle(\"/\", middlewareFirst(middlewareSecond(http.HandlerFunc(index))))\n\
  http.Handle(\"/message\", middlewareFirst(middlewareSecond(http.HandlerFunc(message))))\n\
  server := &http.Server{\nAddr: \":8080\",\n}\nlog.Println(\"Listening...\")\nserver.ListenAndServe()\n\
  }\n```\n\n运行这个程序，并向`\"http://localhost:8080/\"`发起请求。你应该会得到以下输出：\n\n- `2015/04/30\
  \ 11:10:53 MiddlewareFirst - Before Handler`\n- `2015/04/30 11:10:53 MiddlewareSecond\
  \ - Before Handler`\n- `2015/04/30 11:10:53 Executing index Handler`\n- `2015/04/30\
  \ 11:10:53 MiddlewareSecond - After Handler`\n- `2015/04/30 11:10:53 MiddlewareFirst\
  \ - After Handler`\n\n当你向`\"http://localhost:8080/message\"`发起请求，但提供了错误的查询字符串变量`password`值（比如提供`\"\
  http://localhost:8080/message?password=wrongpass\"`），你应该会得到以下输出：\n\n- `2015/04/30\
  \ 11:11:06 MiddlewareFirst - Before Handler`\n- `2015/04/30 11:11:06 MiddlewareSecond\
  \ - Before Handler`\n- `2015/04/30 11:11:06 Failed to authorize to the system`\n\
  - `2015/04/30 11:11:06 MiddlewareFirst - After Handler`\n\n当你向`\"http://localhost:8080/message\"\
  `发起请求，并提供了正确的查询字符串变量`password`值（`\"http://localhost:8080/message?password=pass123\"\
  `），你应该会得到以下输出：\n\n- `2015/04/30 11:11:35 MiddlewareFirst - Before Handler`\n- `2015/04/30\
  \ 11:11:35 MiddlewareSecond - Before Handler`\n- `2015/04/30 11:11:35 Authorized\
  \ to the system`\n- `2015/04/30 11:11:35 Executing message Handler`\n- `2015/04/30\
  \ 11:11:35 MiddlewareSecond - After Handler`\n- `2015/04/30 11:11:35 MiddlewareFirst\
  \ - After Handler`\n\n通过查看程序生成的日志消息，你可以轻松理解中间件处理器的控制流。这里，`middlewareFirst`和`middlewareSecond`被调用作为包装处理器；你可以将其应用于应用程序处理器。在中间件函数`middlewareSecond`中，如果请求的\
  \ URL 路径是`\"/message\"`，则会验证查询字符串变量`password`的值。\n\n\n\n以下是程序运行并处理对 `\"/\"` 和 `\"\
  /message\"` 路由的请求时的控制流程：\n\n控制流向首先进入 `middlewareFirst` 中间件函数。当 `middlewareFirst`\
  \ 函数中输出一条日志（在调用下一个处理器之前）后，控制流便进入 `middlewareSecond` 中间件函数，并调用 `next.ServeHTTP(w,\
  \ r)`。当 `middlewareSecond` 函数中又输出一条日志（在调用下一个处理器之前）后，控制流再次调用 `next.ServeHTTP(w, r)`\
  \ 进入应用处理器：如果请求的 URL 路径是 `\"/\"`，则直接调用索引应用处理器，无需任何授权。如果请求的 URL 路径是 `\"/message\"\
  `，则中间件函数会使用查询字符串变量 `password` 来验证请求。如果你没有为查询字符串变量 `password` 提供值 `\"pass123\"`，控制流会从中间件函数返回，回到\
  \ `middlewareFirst` 函数，执行 `next.ServeHTTP(w, r)` 代码块之后的逻辑，然后结束请求处理周期，而不会执行应用处理器。如果请求验证通过，控制流会调用\
  \ `next.ServeHTTP(w, r)` 进入应用处理器 `message`。从 `middlewareSecond` 函数调用应用处理器（如果请求验证通过）后，控制流会回到\
  \ `middlewareSecond` 函数，并执行 `next.ServeHTTP(w, r)` 代码块之后的逻辑。从 `middlewareSecond`\
  \ 处理器返回后，控制流会回到 `middlewareFirst` 函数，并执行 `next.ServeHTTP(w, r)` 代码块之后的逻辑。\n\n你可以随时从中间件处理器链中退出，就像\
  \ `middlewareSecond` 处理器在请求无效时所做的那样。在这种情况下，如果请求处理周期中存在任何处理器，控制流会回到上一个处理器。当请求 `\"\
  /message\"` 而未提供任何有效的查询字符串值时，你从中间件处理器返回，应用处理器将不会被调用。最重要的是，你可以在调用中间件处理器函数之前或之后执行某些逻辑。\n\
  \n### 使用第三方中间件\n\n使用中间件是在多个应用间实现可复用代码片段的一个绝佳方式。许多第三方库提供了各种可复用的中间件组件，可用于实现身份验证、日志记录、压缩响应等常见功能。在用\
  \ Go 开发 Web 应用时，你可以利用这些第三方库将许多通用功能集成到你的应用程序中。\n\n##### 使用 Gorilla Handlers\n\nGorilla\
  \ Web 工具包（[`www.gorillatoolkit.org/`](http://www.gorillatoolkit.org/)）提供了与 Go 的\
  \ `net/http` 包一起使用的一系列处理器。让我们编写一个程序来使用 Gorilla 的 `LoggingHandler` 和 `CompressHandler`\
  \ 来记录 HTTP 请求和压缩 HTTP 响应。\n\n##### 安装 Gorilla Handlers\n\n要安装 Gorilla handlers，请在终端中运行以下命令：\n\
  \n`$ go get github.com/gorilla/handlers`\n\n##### 使用 Gorilla Handlers\n\n要使用 Gorilla\
  \ handlers，你必须将 `github.com/gorilla/handlers` 添加到导入列表中：\n\n`import \"github.com/gorilla/handlers\"\
  `\n\n清单 6-6 展示了 Gorilla 的日志记录和压缩处理器。\n\n**清单 6-6. 使用 Gorilla 的日志记录和压缩处理器**\n\n```\n\
  package main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n    \"os\"\
  \n    \"github.com/gorilla/handlers\"\n)\n\nfunc index(w http.ResponseWriter, r\
  \ *http.Request) {\n    log.Println(\"Executing index handler\")\n    fmt.Fprintf(w,\
  \ \"Welcome!\")\n}\n\nfunc about(w http.ResponseWriter, r *http.Request) {\n   \
  \ log.Println(\"Executing about handler\")\n    fmt.Fprintf(w, \"Go Middleware\"\
  )\n}\n\nfunc iconHandler(w http.ResponseWriter, r *http.Request) {\n}\n\nfunc main()\
  \ {\n    http.HandleFunc(\"/favicon.ico\", iconHandler)\n    indexHandler := http.HandlerFunc(index)\n\
  \    aboutHandler := http.HandlerFunc(about)\n    logFile, err := os.OpenFile(\"\
  server.log\", os.O_WRONLY|os.O_CREATE|os.O_APPEND, 0666)\n    if err != nil {\n\
  \        panic(err)\n    }\n    http.Handle(\"/\", handlers.LoggingHandler(logFile,\
  \ handlers.CompressHandler(indexHandler)))\n    http.Handle(\"/about\", handlers.LoggingHandler(logFile,\
  \ handlers.CompressHandler(aboutHandler)))\n    server := &http.Server{\n      \
  \  Addr: \":8080\",\n    }\n    log.Println(\"Listening...\")\n    server.ListenAndServe()\n\
  }\n```\n\n与清单 6-5 类似，处理器链由 `LoggingHandler` 和 `CompressHandler` 构成，然后封装到应用处理器中。该程序负责记录请求日志，并使用\
  \ gzip 或 Deflate 压缩响应。日志文件指定为 `\"server.log\"`，因此你可以在此文件中查看日志。运行程序并向 `\"/\"` 和 `\"\
  /about\"` 发送请求。你应该会在 `\"server.log\"` 文件中看到以下日志：\n\n* `::1 - - [26/Apr/2015:16:42:41\
  \ +0530] \"GET / HTTP/1.1\" 200 32`\n* `::1 - - [26/Apr/2015:16:42:45 +0530] \"\
  GET /about HTTP/1.1\" 200 37`\n\n你可以看到日志信息还包含了 HTTP 状态码。\n\n#### 使用 Alice 包进行中间件链式调用\n\
  \n第三方 `Alice` 库包（[`https://github.com/justinas/alice`](https://github.com/justinas/alice)）提供了一种便捷的方式来链式调用\
  \ HTTP 中间件函数和应用处理器。清单 6-5 中的程序如下链式调用 HTTP 中间件函数：\n\n`http.Handle(\"/\", middlewareFirst(middlewareSecond(http.HandlerFunc(index))))`\n\
  \n通过使用 `Alice` 包，你可以将上述处理器链转换为以下形式：\n\n`http.Handle(\"/\",alice.New(middlewareFirst,\
  \ middlewareSecond).ThenFunc(http.HandlerFunc(index)))`\n\n这是一种优雅的链式调用中间件函数并将其与应用处理器封装在一起的方法。\n\
  \n##### 安装 Alice\n\n要安装 `Alice`，请在终端中运行以下命令：\n\n`$ go get github.com/justinas/alice`\n\
  \n\n\n## 使用 Alice 包\n\n要使用 `Alice` 包，需要将 `github.com/justinas/alice` 添加到导入列表中：\n\
  \n```\nimport \"github.com/justinas/alice\"\n```\n\n下面我们用 `Alice` 包重写清单 6-6 中的程序（见清单\
  \ 6-7）。\n\n**清单 6-7.** 使用 Alice 包链接中间件函数\n\n```\npackage main\n\nimport (\n    \"\
  io\"\n    \"log\"\n    \"net/http\"\n    \"os\"\n    \"github.com/gorilla/handlers\"\
  \n    \"github.com/justinas/alice\"\n)\n\nfunc loggingHandler(next http.Handler)\
  \ http.Handler {\n    logFile, err := os.OpenFile(\"server.log\", os.O_WRONLY|os.O_CREATE|os.O_APPEND,\
  \ 0777)\n    if err != nil {\n        panic(err)\n    }\n    return handlers.LoggingHandler(logFile,\
  \ next)\n}\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n    w.Header().Set(\n\
  \        \"Content-Type\",\n        \"text/html\",\n    )\n    io.WriteString(\n\
  \        w,\n        `<doctype html>\n<html>\n<head>\n<title>Index</title>\n</head>\n\
  <body>\nHello Gopher!\n</body>\n</html>`,\n    )\n}\n\nfunc about(w http.ResponseWriter,\
  \ r *http.Request) {\n    w.Header().Set(\n        \"Content-Type\",\n        \"\
  text/html\",\n    )\n    io.WriteString(\n        w,\n        `<doctype html>\n\
  <html>\n<head>\n<title>About</title>\n</head>\n<body>\nGo Web development with HTTP\
  \ Middleware\n</body>\n</html>`,\n    )\n}\n\nfunc iconHandler(w http.ResponseWriter,\
  \ r *http.Request) {\n    http.ServeFile(w, r, \"./favicon.ico\")\n}\n\nfunc main()\
  \ {\n    http.HandleFunc(\"/favicon.ico\", iconHandler)\n    indexHandler := http.HandlerFunc(index)\n\
  \    aboutHandler := http.HandlerFunc(about)\n    commonHandlers := alice.New(loggingHandler,\
  \ handlers.CompressHandler)\n    http.Handle(\"/\", commonHandlers.ThenFunc(indexHandler))\n\
  \    http.Handle(\"/about\", commonHandlers.ThenFunc(aboutHandler))\n    server\
  \ := &http.Server{\n        Addr: \":8080\",\n    }\n    log.Println(\"Listening...\"\
  )\n    server.ListenAndServe()\n}\n```\n\n在这个程序中，使用了两个 Gorilla 处理器来记录请求和压缩响应：`LoggingHandler`\
  \ 和 `CompressHandler`。响应中包含了 HTML 字符串，用于验证 HTTP 响应的压缩效果。运行程序，向 `\"/\"` 和 `\"/about\"\
  ` 发送请求，并查看日志文件和 HTTP 响应。\n\n图 6-1 展示了 Fiddler（一个 HTTP 调试工具）中的截图，显示 Web 响应正在使用 gzip\
  \ 编码进行压缩。\n\n![A978-1-4842-1052-9_6_Fig1_HTML.jpg](img/A978-1-4842-1052-9_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 使用 Gorilla 处理器压缩 HTTP 响应\n\n使用 `Alice` 包可以优雅地链接中间件函数，使代码块易于理解。Gorilla\
  \ 的 `LoggingHandler` 并不具有 `func (http.Handler) http.Handler` 签名，它除了 `http.Handler`\
  \ 之外，还接受一个日志文件作为函数参数。因此，通过正确使用 `Alice` 包并在多个地方使用该处理器，你可以编写一个用于日志记录的中间件函数，在该函数中通过提供日志文件作为参数来调用\
  \ Gorilla 的 `LoggingHandler`。当需要一个带有多个函数参数的中间件函数时，这是一种很好的方法：\n\n```\nfunc loggingHandler(next\
  \ http.Handler) http.Handler {\n    logFile, err := os.OpenFile(\"server.log\",\
  \ os.O_WRONLY|os.O_CREATE|os.O_APPEND, 0777)\n    if err != nil {\n        panic(err)\n\
  \    }\n    return handlers.LoggingHandler(logFile, next)\n}\n```\n\n`loggingHandler`\
  \ 中间件函数可以与 `Alice` 一起使用，它会用必要的参数调用 Gorilla 的 `LoggingHandler` 函数。当使用中间件处理器时，你可能需要将多个中间件处理器装饰到多个应用程序处理器中。在这种情况下，你可以通过组合多个中间件处理器，使用\
  \ `Alice` 创建共同的处理器，并将其应用于多个应用程序处理器。\n\n这里将 `commonHandlers` 定义为用于多个应用程序处理器的共同处理器：\n\
  \n```\nindexHandler := http.HandlerFunc(index)\naboutHandler := http.HandlerFunc(about)\n\
  commonHandlers := alice.New(loggingHandler, handlers.CompressHandler)\nhttp.Handle(\"\
  /\", commonHandlers.ThenFunc(indexHandler))\nhttp.Handle(\"/about\", commonHandlers.ThenFunc(aboutHandler))\n\
  ```\n\n`Alice` 包提供了一个流畅的 API 来处理中间件函数，使你可以优雅地链接中间件函数。`Alice` 包是一个非常轻量级的库，代码量不足 100\
  \ 行。\n\n### 使用 Negroni 包处理中间件\n\n当你直接使用 `net/http` 包构建 Web 应用程序时，第三方库 `Negroni`\
  \ 是一个很好的伴侣。`Negroni` 是一个设计为与 `net/http` 包兼容的库。它提供了一种在 Go 中使用 HTTP 中间件的惯用方法。它鼓励你使用\
  \ `net/http` 处理器，同时提供了一种处理 HTTP 中间件函数的方式。\n\n上一节讨论了 `Alice` 包，它非常适合链接中间件处理器。`Negroni`\
  \ 提供了一种不同的方法，以简单且非侵入的方式处理 HTTP 中间件函数。如果你更喜欢使用 `Alice` 来处理中间件函数，可以继续使用它，因为 `Alice`\
  \ 和 `Negroni` 都用略有不同的方式解决了相同的问题。`Negroni` 提供了一个功能完备的库来处理中间件函数，其中还附带了一些常见的中间件函数，用于记录请求、压缩响应、提供静态文件服务器以及从恐慌中恢复。\n\
  \n`Negroni` 允许你在全局级别配置中间件函数，以便与所有应用程序处理器一起使用。你也可以配置中间件函数以用于特定的处理器。当你对所有应用程序处理器使用中间件函数时，无需为每个应用程序处理器单独配置。相反，你只需使用\
  \ `Negroni` 配置该中间件函数，`Negroni` 会将配置的中间件函数包装到所有应用程序处理器中。你也可以配置一些中间件函数，使其仅与某些特定的应用程序处理器一起执行。\n\
  \n#### Negroni 入门\n\n`Negroni` 为使用中间件处理器提供了一个简单的编程模型。当你使用它时，还可以使用其默认的中间件函数。让我们安装并编写一个简单的程序，开始使用\
  \ `Negroni` 包。\n\n\n\n#### 安装 Negroni\n\n要安装 `Negroni`，请在终端中执行以下命令：\n\n`$ go get\
  \ github.com/codegangsta/negroni`\n\n若要使用 `Negroni` 包，需要将 `github.com/codegangsta/negroni`\
  \ 包添加到导入列表中：\n\n`import \"github.com/codegangsta/negroni\"`\n\n清单 6-8 是一个使用 `Negroni`\
  \ 的示例程序：\n\n**清单 6-8.** 使用 Negroni 的简单 HTTP 服务器\n\n```\npackage main\n\nimport (\n\
  \    \"fmt\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\n)\n\nfunc\
  \ index(w http.ResponseWriter, req *http.Request) {\n    fmt.Fprintf(w, \"Welcome!\"\
  )\n}\n\nfunc main() {\n    mux := http.NewServeMux()\n    mux.HandleFunc(\"/\",\
  \ index)\n    n := negroni.Classic()\n    n.UseHandler(mux)\n    n.Run(\":8080\"\
  )\n}\n```\n\n在这个程序中，你没有使用自己的中间件函数；你只是用 `Negroni` 的默认中间件函数运行了一个 HTTP 服务器。通过调用 `negroni.Classic`\
  \ 函数来创建一个 `Negroni` 实例。\n\n当使用 `Classic` 函数创建 `Negroni` 实例时，它会提供以下内置中间件函数，这些函数对于大多数\
  \ Web 应用程序非常有用：\n\n*   `negroni.Recovery`：恐慌恢复中间件\n*   `negroni.Logging`：请求/响应日志记录中间件\n\
  *   `negroni.Static`：在 `\"public\"` 目录下提供静态文件服务\n\n`Negroni` 实例也可以通过调用 `negroni.New`\
  \ 函数来创建，该函数会返回一个没有预配置任何中间件的新的 `Negroni` 实例：\n\n`n := negroni.New()`\n\n`Negroni`\
  \ 实例的 `Run` 方法是一个便捷函数，它将 `Negroni` 堆栈作为 HTTP 服务器运行。地址字符串的格式与 `http.ListenAndServe`\
  \ 相同：\n\n`n.Run(\":8080\")`\n\n#### 使用 Negroni 进行路由\n\n`Negroni` 实例的 `UseHandler`\
  \ 方法允许你将自定义的 `http.Handler` 放入中间件堆栈中。\n\n清单 6-9 是一个示例程序，它使用 Gorilla `mux` 作为与 `Negroni`\
  \ 包一起使用的请求多路复用器。\n\n**清单 6-9.** 使用 Negroni 和 Gorilla mux 的简单 HTTP 服务器\n\n```\npackage\
  \ main\n\nimport (\n    \"fmt\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
  \n    \"github.com/gorilla/mux\"\n)\n\nfunc index(w http.ResponseWriter, req *http.Request)\
  \ {\n    fmt.Fprintf(w, \"Welcome!\")\n}\n\nfunc main() {\n    router := mux.NewRouter()\n\
  \    router.HandleFunc(\"/\", index)\n    n := negroni.Classic()\n    n.UseHandler(router)\n\
  \    n.Run(\":8080\")\n}\n```\n\nGorilla 的 `mux.Router` 对象作为与 `Negroni` 一起使用的处理器。你可以将任何实现了\
  \ `http.Handler` 接口的对象传递给 `Negroni` 实例的 `UseHandler` 方法。\n\n#### 注册中间件\n\n`Negroni`\
  \ 通过 `negroni.Handler` 接口管理中间件流程。\n\n清单 6-10 展示了 `negroni.Handler` 接口的定义：\n\n**清单\
  \ 6-10.** `negroni.Handler` 接口\n\n```\ntype Handler interface {\n  ServeHTTP(rw\
  \ http.ResponseWriter, r *http.Request, next http.HandlerFunc)\n}\n```\n\n清单 6-11\
  \ 提供了为 `Negroni` 编写中间件处理函数以配合 `negroni.Handler` 接口使用的模式。\n\n**清单 6-11.** `negroni.Handler`\
  \ 接口\n\n```\nfunc myMiddleware(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)\
  \ {\n  // 执行下一个处理函数之前的逻辑\n  next(w, r)\n  // 执行下一个处理函数之后的逻辑\n}\n```\n\n与 `Negroni`\
  \ 兼容的中间件函数的函数签名与前面章节中编写的函数不同。Negroni 中间件堆栈使用以下签名来编写中间件函数：\n\n`func myMiddleware(w\
  \ http.ResponseWriter, r *http.Request, next http.HandlerFunc)`\n\n在这里，你可以通过传递 `http.ResponseWriter`\
  \ 对象和 `*http.Request` 对象的值来调用 `http.HandlerFunc` 对象，从而调用中间件堆栈中的下一个处理函数：\n\n```\n\
  // 执行下一个处理函数之前的逻辑\n  next(w, r)\n  // 执行下一个处理函数之后的逻辑\n```\n\n你可以使用 `Use` 函数将中间件函数映射到\
  \ `Negroni` 处理链中，该函数接受一个 `negroni.Handler` 类型的参数。`Use` 函数将一个 `negroni.Handler` 添加到中间件堆栈中（参见清单\
  \ 6-12）。处理函数按照它们添加到 `Negroni` 实例的顺序被调用。\n\n**清单 6-12.** 使用 Negroni 注册中间件函数\n\n```\n\
  n := negroni.New()\nn.Use(negroni.HandlerFunc(myMiddleware))\n```\n\n中间件函数被转换为 `negroni.HandlerFunc`\
  \ 类型，并添加到 `Negroni` 中间件堆栈中。`HandlerFunc` 是一个适配器，它允许普通函数被用作 `Negroni` 处理函数。\n\n####\
  \ 为特定路由注册中间件\n\n当使用诸如日志记录之类的中间件函数时，它们可能会被装饰成跨应用程序的处理函数。但是你可能需要为某些特定路由使用中间件函数；例如，你可能希望应用一些中间件函数，使其与某些特定于管理员用户账户的应用程序处理函数一起执行。在这种情况下，你可以创建一个新的\
  \ `Negroni` 实例，并将其用作你的路由处理函数。\n\n清单 6-13 是将中间件函数应用于某些特定路由的代码块。\n\n**清单 6-13.** 为特定路由注册中间件处理函数\n\
  \n```\nrouter := mux.NewRouter()\nadminRoutes := mux.NewRouter()\n\n// 在此处添加管理员路由\n\
  \n// 为管理员中间件创建一个新的 negroni\nrouter.Handle(\"/admin\", negroni.New(\n  Middleware1,\n\
  \  Middleware2,\n  negroni.Wrap(adminRoutes),\n))\n```\n\n\n\n#### 使用 Negroni 中间件栈\n\
  \n清单 6-5 展示了中间件函数的控制流，其中两个中间件函数被装饰到应用处理器中。让我们重写该程序，演示如何用 `Negroni` 编写自定义中间件函数（见清单\
  \ 6-14）。\n\n**清单 6-14.** 用 Negroni 演示中间件控制流\n\n```\npackage main\n\nimport (\n \
  \   \"fmt\"\n    \"log\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\
  \n)\n\nfunc middlewareFirst(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)\
  \ {\n    log.Println(\"MiddlewareFirst - Before Handler\")\n    next(w, r)\n   \
  \ log.Println(\"MiddlewareFirst - After Handler\")\n}\n\nfunc middlewareSecond(w\
  \ http.ResponseWriter, r *http.Request, next http.HandlerFunc) {\n    log.Println(\"\
  MiddlewareSecond - Before Handler\")\n    if r.URL.Path == \"/message\" {\n    \
  \    if r.URL.Query().Get(\"password\") == \"pass123\" {\n            log.Println(\"\
  Authorized to the system\")\n            next(w, r)\n        } else {\n        \
  \    log.Println(\"Failed to authorize to the system\")\n            return\n  \
  \      }\n    } else {\n        next(w, r)\n    }\n    log.Println(\"MiddlewareSecond\
  \ - After Handler\")\n}\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n\
  \    log.Println(\"Executing index Handler\")\n    fmt.Fprintf(w, \"Welcome\")\n\
  }\n\nfunc message(w http.ResponseWriter, r *http.Request) {\n    log.Println(\"\
  Executing message Handler\")\n    fmt.Fprintf(w, \"HTTP Middleware is awesome\"\
  )\n}\n\nfunc iconHandler(w http.ResponseWriter, r *http.Request) {\n}\n\nfunc main()\
  \ {\n    mux := http.NewServeMux()\n    mux.HandleFunc(\"/favicon.ico\", iconHandler)\n\
  \    mux.HandleFunc(\"/\", index)\n    mux.HandleFunc(\"/message\", message)\n \
  \   n := negroni.Classic()\n    n.Use(negroni.HandlerFunc(middlewareFirst))\n  \
  \  n.Use(negroni.HandlerFunc(middlewareSecond))\n    n.UseHandler(mux)\n    n.Run(\"\
  :8080\")\n}\n```\n\n运行程序，分别向 `\"/\"` 发出请求，以及向 `\"/message\"` 发出请求（分别提供错误的查询字符串变量\
  \ `password` 值和正确的值 `\"pass123\"`）。你应该会看到类似以下的日志信息：\n\n- `[negroni] listening on\
  \ :8080`\n- `[negroni] Started GET /`\n- `2015/04/30 14:45:44 MiddlewareFirst -\
  \ Before Handler`\n- `2015/04/30 14:45:44 MiddlewareSecond - Before Handler`\n-\
  \ `2015/04/30 14:45:44 Executing index Handler`\n- `2015/04/30 14:45:44 MiddlewareSecond\
  \ - After Handler`\n- `2015/04/30 14:45:44 MiddlewareFirst - After Handler`\n- `[negroni]\
  \ Completed 200 OK in 1.0008ms`\n- `[negroni] Started GET /message`\n- `2015/04/30\
  \ 14:45:52 MiddlewareFirst - Before Handler`\n- `2015/04/30 14:45:52 MiddlewareSecond\
  \ - Before Handler`\n- `2015/04/30 14:45:52 Failed to authorize to the system`\n\
  - `2015/04/30 14:45:52 MiddlewareFirst - After Handler`\n- `[negroni] Completed\
  \ 0 in 1.0008ms`\n- `[negroni] Started GET /message`\n- `2015/04/30 14:46:00 MiddlewareFirst\
  \ - Before Handler`\n- `2015/04/30 14:46:00 MiddlewareSecond - Before Handler`\n\
  - `2015/04/30 14:46:00 Authorized to the system`\n- `2015/04/30 14:46:00 Executing\
  \ message Handler`\n- `2015/04/30 14:46:00 MiddlewareSecond - After Handler`\n-\
  \ `2015/04/30 14:46:00 MiddlewareFirst - After Handler`\n- `[negroni] Completed\
  \ 200 OK in 1.0071ms`\n\n通过查看这些日志信息，你可以很容易地理解处理函数的控制流。\n\n要重写现有程序以适配 `Negroni`，中间件处理函数必须修改为与\
  \ `negroni.Handler` 接口兼容：\n\n```\nfunc middlewareFirst(w http.ResponseWriter, r\
  \ *http.Request, next http.HandlerFunc) {\n    //下一个处理器之前的逻辑\n    next(w, r)\n \
  \   //下一个处理器之后的逻辑\n}\n\nfunc middlewareSecond(w http.ResponseWriter, r *http.Request,\
  \ next http.HandlerFunc) {\n    //下一个处理器之前的逻辑\n    next(w, r)\n    //下一个处理器之后的逻辑\n\
  }\n```\n\n当中间件处理函数兼容 `negroni.Handler` 接口后，需要使用 `Negroni` 实例的 `Use` 函数将它们添加到 `Negroni`\
  \ 中间件栈中。处理函数按照添加到 `Negroni` 中间件栈的顺序被调用：\n\n```\nn := negroni.Classic()\nn.Use(negroni.HandlerFunc(middlewareFirst))\n\
  n.Use(negroni.HandlerFunc(middlewareSecond))\n```\n\n由于 `Negroni` 实例是通过 `Classic`\
  \ 函数创建的，中间件栈中会包含以下内置中间件函数：\n\n- `negroni.Recovery`\n- `negroni.Logging`\n- `negroni.Static`\n\
  \n你也可以在通过 `New` 函数创建 `Negroni` 实例时添加中间件函数：\n\n```\nn := negroni.New(\n    negroni.NewRecovery(),\n\
  \    negroni.HandlerFunc(middlewareFirst),\n    negroni.HandlerFunc(middlewareSecond),\n\
  \    negroni.NewLogger(),\n    negroni.NewStatic(http.Dir(\"public\")),\n)\n```\n\
  \n`Negroni` 提供了一个非常简单且优雅的库来处理 HTTP 中间件函数。这是一个非常小巧的库，但在用 Go 构建真实世界的 Web 应用和 RESTful\
  \ 服务时非常有用。`Negroni` 的主要优势之一是它与 `net/http` 库完全兼容。如果你不喜欢使用全功能的 Web 开发框架在 Go 中构建 Web\
  \ 应用，那么使用 `Negroni` 制作和使用 HTTP 中间件是构建高效 Web 应用的一个好选择，它有助于实现更好的可重用性和可维护性。\n\n###\
  \ 在中间件之间共享值\n\n在前面的章节中，你学习了如何在 Go 中制作和使用 HTTP 中间件。示例中间件是独立运行的，不依赖来自其他中间件处理器和应用处理器的任何数据。然而，在某些情况下，你可能需要向下一个中间件提供值，或者在中间件处理器和应用处理器之间共享值。例如，当你通过中间件处理函数授权应用时，它可能需要在请求处理周期中向下一个处理器提供一些特定于用户的值。\n\
  \n### 使用 Gorilla context\n\n有许多第三方包可用于存储在请求生命周期内共享的值。Gorilla Web 工具包中的 `context`\
  \ 包是一个很好的选择，可用于在请求生命周期内共享值。\n\n要安装 `context`，在终端中运行以下命令：\n\n```\n$ go get github.com/gorilla/context\n\
  ```\n\n要使用 `context` 包，必须将 `github.com/gorilla/context` 包添加到导入列表中：\n\n```\nimport\
  \ \"github.com/gorilla/context\"\n```\n\n\n\n### 使用 Gorilla context 设置和获取值\n\n要向\
  \ `context` 对象设置值，请使用 `Set` 函数（参见清单 6-15）。\n\n**清单 6-15. 在 Gorilla context 中设置值**\n\
  \n```\ncontext.Set(r, \"user\", \"shijuvar\")\n```\n\n这里的 `r` 是处理函数中的 `*http.Request`\
  \ 对象。要从 `context` 对象获取值，请使用 `Get` 或 `GetOk` 函数（参见清单 6-16）。\n\n**清单 6-16. 从 Gorilla\
  \ context 获取值**\n\n```\n// val 的值为 \"shijuvar\"\nval := context.Get(r, \"user\"\
  )\n\n// 返回 (\"shijuvar\", true)\nval, ok := context.GetOk(r, foo.MyKey)\n```\n\n\
  清单 6-17 是一个示例程序，其中来自中间件处理函数的值被传递给了应用程序处理函数。\n\n**清单 6-17. 中间件函数将值传递给应用程序处理函数**\n\
  \n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"net/http\"\n  \
  \  \"github.com/codegangsta/negroni\"\n    \"github.com/gorilla/context\"\n)\n\n\
  func Authorize(w http.ResponseWriter, r *http.Request, next http.HandlerFunc) {\n\
  \    token := r.Header.Get(\"X-AppToken\")\n    if token == \"bXlVc2VybmFtZTpteVBhc3N3b3Jk\"\
  \ {\n        log.Printf(\"已授权进入系统\")\n        context.Set(r, \"user\", \"Shiju Varghese\"\
  )\n        next(w, r)\n    } else {\n        http.Error(w, \"未授权\", 401)\n    }\n\
  }\n\nfunc index(w http.ResponseWriter, r *http.Request) {\n    user := context.Get(r,\
  \ \"user\")\n    fmt.Fprintf(w, \"欢迎 %s!\", user)\n}\n\nfunc main() {\n    mux :=\
  \ http.NewServeMux()\n    mux.HandleFunc(\"/\", index)\n    n := negroni.Classic()\n\
  \    n.Use(negroni.HandlerFunc(Authorize))\n    n.UseHandler(mux)\n    n.Run(\"\
  :8080\")\n}\n```\n\n我们创建了一个中间件处理函数来授权 HTTP 请求。从 `request` 对象中读取 HTTP 头部值 `\"X-AppToken\"\
  `，并验证安全令牌。这是验证 RESTful API 的一种方式，即 HTTP 客户端必须通过 HTTP 头部发送安全令牌。某些 API 会验证令牌并提供一个访问令牌，以便在特定会话中访问应用程序。\n\
  \n在这个程序中，你想将用户名传递给下一个处理函数：应用程序处理函数。因此，你在已授权的中间件处理函数中将用户值设置到 `context` 对象中，该值在 HTTP\
  \ 请求的生命周期内都是可访问的。这里，`context` 对象的值从 index 应用程序处理函数中被访问。\n\n通过利用 Gorilla `context`\
  \ 包在中间件处理函数之间共享值，或者在中间件处理函数和应用程序处理函数之间共享值，你可以构建有用的中间件处理函数，从而开发实际应用程序。\n\n### 总结\n\
  \n使用 HTTP 中间件是在 Go 中构建实际应用程序的一种重要且实用的方法。中间件是一段可插拔且独立的代码，它包装了应用程序处理函数，可用于将共享行为实现到整个应用程序的处理函数或某些特定应用程序的处理函数中。\n\
  \nHTTP 中间件允许你使用可插拔的逻辑构建应用程序，从而实现更高水平的可重用性和可维护性。使用 HTTP 中间件，你可以在 HTTP 请求处理函数之前或之后执行某些逻辑。由于\
  \ HTTP 中间件是可插拔组件，你可以随时添加或移除它们。\n\n第三方包 `Alice` 允许你使用其流式接口（fluent interface）以优雅的语法实现中间件处理函数的链式调用。第三方包\
  \ `Negroni` 是一个处理中间件函数的优秀库，它本身也附带了一些默认的中间件函数。`Negroni` 提供了一种在 Go 中使用 HTTP 中间件的惯用方法。\n\
  \n当你构建实际应用程序时，可能需要在各种中间件处理函数和应用程序处理函数之间共享值。来自 Gorilla Web 工具包的第三方 `context` 包可用于在请求生命周期内共享值。在\
  \ Go 中，一个出色的 Web 开发栈是：使用 `net/http` 作为 Web 开发的基本编程模块，使用 `Negroni` 作为处理 HTTP 中间件的处理器，使用\
  \ Gorilla `mux` 作为路由器，并使用 Gorilla `context` 作为在请求生命周期内共享值的机制。有了这个 Web 开发栈，你就不再需要一个全功能的\
  \ Web 开发框架。\n\n"
- "# 7. 为 Web 应用添加身份验证\n\n安全性是构建成功的 Web 应用或 Web API 时需要考虑的最重要因素之一。如果你无法保护应用程序免受未授权访问，那么无论其功能如何，整个应用都将毫无意义。你可能为应用程序开发了出色的用户体验，但如果你无法确保应用安全，那么所有实现都将功亏一篑。身份验证和授权使得应用程序能够保护其受保护的资源免受未授权访问。\n\
  \n本章将向你展示如何使用各种身份验证方法来保护基于 Web 的系统。它将重点介绍用于保护应用程序的现代身份验证方法，当你使用 Web API 作为服务器端实现来构建\
  \ Web 应用和移动应用时，这些方法非常有用。\n\n### 身份验证与授权\n\n身份验证是识别能够访问受保护资源的应用程序和服务的客户端的过程。这些客户端可以是最终用户，也可以是其他应用程序和服务。通常，数据库存储用户凭据，例如用户名和密码，最终用户通过输入有效的用户名和密码来获得对应用程序的访问权限。\n\
  \n授权是授予执行特定操作或访问资源权限的过程，该权限仅授予经过身份验证的客户端。授权与身份验证过程协同工作，你可以将授权角色附加到用户凭据上。当你在数据库中存储用户凭据时，你可以将授权角色和权限与用户信息关联起来。当你构建应用程序时，可以通过定义多个授权角色来区分访问权限。例如，如果你想为特定的已认证用户提供管理员功能，你可以为管理员用户定义一个授权角色及其访问权限，从而区分他们与其他已认证用户的访问权限。某些应用程序可能没有任何授权角色，因为所有已认证用户对应用程序拥有相同的权限。\n\
  \n当你设计 Web 应用程序时，适当的身份验证和授权策略是最重要的因素。如果你设计的应用程序具有适当的身份验证和授权机制，就能避免许多安全挑战，而这些挑战对于一个成功的应用程序来说至关重要。\n\
  \n\n\n### 身份验证方法\n\n在应用程序中实现身份验证有多种可用方法。通常，用户凭证会存储在应用程序的数据库中。Web 服务器通过 HTML 表单获取用户名和密码，然后将这些凭证与数据库中存储的凭证进行验证。但在现代应用程序中，人们也使用诸如\
  \ Facebook、Twitter、LinkedIn 和 Google 等社交身份提供商作为社交身份进行身份验证，这有助于应用程序避免为每个单独的应用维护独立的用户身份系统。最终用户无需记住每个应用的用户\
  \ ID 和密码，他们可以使用现有的社交身份来验证登录应用程序。\n\n在这个移动化时代，现代 Web 开发正朝着基于 API 的方向发展，这些 API 同时被移动客户端和\
  \ Web 客户端所使用。必须为现代 Web 应用程序提供更可靠的安全系统。API 是基于无状态设计开发的，在设计 API 的身份验证系统时应考虑到这一点。因此，您不能将对传统\
  \ Web 应用程序使用的方法直接应用于 API。\n\n一旦用户登录系统，他们就必须能够在后续的 HTTP 请求中访问 Web 服务器资源，而无需为每个 HTTP\
  \ 请求提供用户凭证。有两种方法可以将用户保持为后续 HTTP 请求的\"已登录\"状态。传统方法是使用 HTTP 会话和 Cookie，而现代方法是使用 Web\
  \ 服务器生成的访问令牌。基于令牌的方法对于 Web API 来说是一种便捷的解决方案；HTTP 会话和 Cookie 则适用于传统 Web 应用程序。\n\n\
  #### 基于 Cookie 的身份验证\n\n基于 Cookie 的方法是实现 Web 应用程序身份验证最广泛使用的方式。在这种方法中，用户使用凭证登录系统后，每个\
  \ HTTP 请求都通过 HTTP Cookie 进行身份验证。\n\n图 7-1 展示了基于 Cookie 的身份验证工作流程。\n\n![A978-1-4842-1052-9_7_Fig1_HTML.jpg](img/A978-1-4842-1052-9_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 基于 Cookie 的身份验证工作流程\n\n在基于 Cookie 的身份验证中，Web 服务器首先验证通过 HTML 表单发送的用户名和密码。一旦用户凭证与数据库中存储的凭证验证通过，HTTP\
  \ 服务器就会设置一个会话 Cookie，通常包含用户信息。对于每个后续 HTTP 请求，Web 服务器可以根据 Cookie 中包含的值来验证 HTTP 请求。一些服务器端技术为实施此类身份验证提供了非常丰富的基础设施，您只需调用其\
  \ API 方法即可轻松实现基于 Cookie 的身份验证。在其他服务器端技术和框架中，您可以手动编写一些代码来写入 Cookie 并将值存储到会话存储中，以实现身份验证。\n\
  \n结合会话的基于 Cookie 的方法非常适合传统 Web 应用程序，在这些应用程序中，所有内容（包括 UI 渲染逻辑）都在服务器端实现。Web 应用程序通过常规桌面浏览器访问。\n\
  \n在 Go 语言中，您可以使用诸如 `sessions` ([www.gorillatoolkit.org/pkg/sessions](http://www.gorillatoolkit.org/pkg/sessions))\
  \ 之类的包（由 Gorilla Web 工具包提供），通过基于 Cookie 的会话来实施身份验证。\n\n由于多种原因，使用基于 Cookie 的方法为 Web\
  \ API 实施身份验证并非良策。当您构建 API 时，无状态设计是理想的设计选择。如果使用基于 Cookie 的方法，您需要为 API 维护一个会话存储，这违反了无状态\
  \ API 的设计原则。此外，当从不同域访问 Web 服务器资源时，由于跨域资源共享（CORS）的限制，基于 Cookie 的方法也无法很好地工作。\n\n####\
  \ 基于令牌的身份验证\n\n过去几年中，开发 Web 应用程序的方法已经发生变化。移动应用开发的时代也改变了基于 Web 的系统的开发方式。现代 Web 开发正朝着\
  \ API 驱动的方式发展，即在服务器端提供 Web API（通常是 RESTful API），而 Web 应用程序和移动应用程序则通过使用该 Web API\
  \ 来构建。\n\n基于令牌的方法是为 Web 应用程序和 Web API 实施身份验证的现代方法。在基于令牌的方法中（见图 7-2），每个 HTTP 请求都使用访问令牌\
  \ ID 进行身份验证。在这种方法中，您也可以使用用户名和密码登录系统。如果用户获得系统访问权限，身份验证系统会生成一个访问令牌，用于后续的 HTTP 请求，以便在\
  \ Web 服务器上进行身份验证。这些访问令牌是经过安全签名的字符串，可用于每个 HTTP 请求访问 HTTP 资源。通常，访问令牌作为 Bearer 令牌通过\
  \ HTTP `Authorization` 头发送，可以在 Web 服务器端进行验证。\n\n![A978-1-4842-1052-9_7_Fig2_HTML.jpg](img/A978-1-4842-1052-9_7_Fig2_HTML.jpg)\n\
  \n图 7-2. 基于令牌的身份验证工作流程\n\n有时，您可以使用第三方身份提供商或第三方 API 进行身份验证。在这种情况下，使用客户端 ID 和密钥（而非用户名和密码）来登录身份验证系统。\n\
  \n以下是基于令牌的身份验证过程：\n\n- 通过提供用户名和密码，或提供客户端 ID 和密钥来验证登录系统。\n- 如果身份验证请求成功，身份验证系统会生成一个经过安全签名的字符串作为访问令牌，用于后续的\
  \ HTTP 请求。\n- 客户端应用程序从 Web 服务器接收令牌，并使用它来访问 Web 服务器资源。\n- 客户端应用程序在每个发往 Web 服务器的 HTTP\
  \ 请求中提供访问令牌。使用 HTTP 标头将访问令牌传输到 Web 服务器。\n- Web 服务器验证客户端应用程序提供的访问令牌，如果访问令牌有效，则提供\
  \ Web 服务器资源。\n\n当您构建无需在客户端利用 Cookie 的移动应用时，基于令牌的方法非常方便。当您使用 API 作为服务器端实现时，无需维护会话存储，这使您能够在服务器端构建无状态\
  \ API，并且这些 API 可以被各种客户端应用轻松使用而毫无障碍。使用基于令牌的方法的另一个好处是，您可以轻松地向任何 Web 服务器发起 AJAX 调用，无论其域如何，因为您使用\
  \ HTTP 标头发起 HTTP 请求。\n\n基于令牌的方法是为 RESTful API 提供安全性的理想解决方案。在 Web 技术领域，Go 主要用于构建后端\
  \ API（通常是 RESTful API），因此本章的重点主要放在基于令牌的方法上。\n\n### 使用 OAuth 2 进行身份验证\n\n基于令牌的方法实际上源于\
  \ OAuth 规范，该规范旨在解决身份验证问题，使应用程序能够通过开放的身份验证模型访问彼此的数据。在深入探讨使用 OAuth 2 服务提供商的示例身份验证程序之前，让我们先简要了解一下\
  \ OAuth。\n\n\n\n#### 理解 OAuth 2\n\n`OAuth 2` 是一个开放的身份验证规范。`OAuth 2.0` 授权框架使第三方应用程序能够获得对\
  \ Facebook、Twitter、GitHub 和 Google 等 HTTP 服务的有限访问权限。最重要的是，`OAuth 2` 是一种用于身份验证流程的规范。\n\
  \n`OAuth 2` 为 Web 应用程序、桌面应用程序和移动应用程序提供了授权流程。在构建应用程序时，您可以将用户身份验证委托给 Facebook、Twitter、GitHub\
  \ 和 Google 等社交身份提供商。您可以在身份提供商处注册您的应用程序，以授权该应用程序访问用户账户。当您在身份提供商处注册应用程序时，通常会获得一个 `client\
  \ ID` 和一个 `client secret key`，以便访问身份提供商的用户账户。一旦您使用 `client ID` 和 `client secret\
  \ key` 登录，身份验证服务器便会为您提供一个 `access token`，该令牌可用于访问 Web 服务器的受保护资源。\n\n第 7.2.2 节讨论了基于令牌的身份验证工作流程。使用\
  \ Bearer Token 是在 `OAuth 2` 授权框架中定义的一种规范，它定义了如何在 HTTP 请求中使用 Bearer Token 来访问 `OAuth\
  \ 2` 中的受保护资源。\n\n有多个 `OAuth 2` 服务提供商可用于身份验证。由于 `OAuth 2` 是一个开放的授权标准，您可以将这些标准实现到您的\
  \ Web API 中，作为各种客户端应用程序（包括移动应用程序和 Web 应用程序）的身份验证机制。\n\n注意\n\n`OAuth 2.0` 是 OAuth\
  \ 协议的下一代演进版本，该协议最初于 2006 年创建。`OAuth 2.0` 专注于客户端开发者的简便性，同时为 Web 应用程序、桌面应用程序和移动应用程序提供特定的授权流程。`OAuth\
  \ 2` 规范的最终版本可在 [`http://tools.ietf.org/html/rfc6749`](http://tools.ietf.org/html/rfc6749)\
  \ 找到。\n\n#### 使用 Goth 包通过 OAuth 2 进行身份验证\n\nGo 生态系统中提供了多种用于处理 `OAuth 2` 身份验证协议的包。`Goth`\
  \ 第三方包及其子包 `Gothic` 允许您与 `OAuth 2` 提供商进行交互。`Goth` 支持 LinkedIn、Facebook、Twitter、Google\
  \ 和 GitHub 等 `OAuth 2` 服务提供商。`Goth` 包提供了多种用于与每个服务提供商交互的 provider。例如，它提供了 `github.com/markbates/goth/providers/twitter`\
  \ 包用于与 Twitter 身份提供商交互。\n\n要安装 `Goth` 包，请在终端中运行以下命令：\n\n`go get github.com/markbates/goth`\n\
  \n要使用 `Goth` 包，您必须将 `github.com/markbates/goth` 添加到导入列表中：\n\n`import \"github.com/markbates/goth\"\
  `\n\n清单 7-1 是一个示例程序，它使用 Twitter 和 Facebook 作为身份提供商。在该程序中，Twitter 和 Facebook 登录凭据用于认证进入一个示例应用程序。\n\
  \n清单 7-1. 使用 `OAuth 2` 服务提供商进行身份验证\n\n```\npackage main\n\nimport (\n\t\"encoding/json\"\
  \n\t\"fmt\"\n\t\"html/template\"\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n\n\t\"github.com/gorilla/pat\"\
  \n\t\"github.com/markbates/goth\"\n\t\"github.com/markbates/goth/gothic\"\n\t\"\
  github.com/markbates/goth/providers/facebook\"\n\t\"github.com/markbates/goth/providers/twitter\"\
  \n)\n\n//解析 JSON 配置的结构体\ntype Configuration struct {\n\tTwitterKey     string\n\t\
  TwitterSecret  string\n\tFacebookKey    string\n\tFacebookSecret string\n}\n\nvar\
  \ config Configuration\n\n//从 config.json 读取配置值\nfunc init() {\n\tfile, _ := os.Open(\"\
  config.json\")\n\tdecoder := json.NewDecoder(file)\n\tconfig = Configuration{}\n\
  \terr := decoder.Decode(&config)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n}\n\
  \nfunc callbackAuthHandler(res http.ResponseWriter, req *http.Request) {\n\tuser,\
  \ err := gothic.CompleteUserAuth(res, req)\n\tif err != nil {\n\t\tfmt.Fprintln(res,\
  \ err)\n\t\treturn\n\t}\n\tt, _ := template.New(\"userinfo\").Parse(userTemplate)\n\
  \tt.Execute(res, user)\n}\n\nfunc indexHandler(res http.ResponseWriter, req *http.Request)\
  \ {\n\tt, _ := template.New(\"index\").Parse(indexTemplate)\n\tt.Execute(res, nil)\n\
  }\n\nfunc main() {\n\t//向 Goth 注册提供商\n\tgoth.UseProviders(\n\t\ttwitter.New(config.TwitterKey,\
  \ config.TwitterSecret, \"http://localhost:8080/auth/twitter/callback\"),\n\t\t\
  facebook.New(config.FacebookKey, config.FacebookSecret, \"http://localhost:8080/auth/facebook/callback\"\
  ),\n\t)\n\n\t//使用 Pat 包进行路由\n\tr := pat.New()\n\tr.Get(\"/auth/{provider}/callback\"\
  , callbackAuthHandler)\n\tr.Get(\"/auth/{provider}\", gothic.BeginAuthHandler)\n\
  \tr.Get(\"/\", indexHandler)\n\n\tserver := &http.Server{\n\t\tAddr:    \":8080\"\
  ,\n\t\tHandler: r,\n\t}\n\n\tlog.Println(\"正在监听...\")\n\tserver.ListenAndServe()\n\
  }\n\n//视图模板\nvar indexTemplate = `\n<p><a href=\"/auth/twitter\">使用 Twitter 登录</a></p>\n\
  <p><a href=\"/auth/facebook\">使用 Facebook 登录</a></p>\n`\n\nvar userTemplate = `\n\
  <p>姓名: {{.Name}}</p>\n<p>邮箱: {{.Email}}</p>\n<p>昵称: {{.NickName}}</p>\n<p>位置: {{.Location}}</p>\n\
  <p>头像 URL: {{.AvatarURL}} <img src=\"{{.AvatarURL}}\"></p>\n<p>描述: {{.Description}}</p>\n\
  <p>用户 ID: {{.UserID}}</p>\n<p>访问令牌: {{.AccessToken}}</p>\n`\n```\n\nTwitter 和 Facebook\
  \ 被用于登录示例应用程序。为此，您需要在相应的身份提供商处注册该应用程序。当您在身份提供商处注册应用程序时，您会获得一个 `client ID` 和 `secret\
  \ key`。通过提供 `client ID`、`client secret key` 和 `callback URL`，即可在 `Goth` 包中注册 Twitter\
  \ 和 Facebook 提供商。\n\n成功通过 `OAuth2` 服务提供商登录后，服务器会重定向到回调 URL：\n\n```\n//向 Goth 注册\
  \ OAuth2 提供商\ngoth.UseProviders(\n\ttwitter.New(config.TwitterKey, config.TwitterSecret,\
  \ \"http://localhost:8080/auth/twitter/callback\"),\n```\n\n\n```go\nfacebook.New(config.FacebookKey,\
  \ config.FacebookSecret, \"http://localhost:8080/auth/facebook/callback\"),\n```\n\
  \n客户端 ID 和客户端密钥在`init`函数中从配置文件读取。\n\n运行程序并导航到`http://localhost:8080/`。图 7-3 显示了应用程序的主页，该页面提供了\
  \ Twitter 和 Facebook 的身份验证功能。\n\n![A978-1-4842-1052-9_7_Fig3_HTML.jpg](img/A978-1-4842-1052-9_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 示例程序的首页\n\n让我们选择 Twitter 来获取身份提供者的访问权限。系统会要求使用 Twitter 账户凭证授权该应用程序，如图\
  \ 7-4 所示。\n\n![A978-1-4842-1052-9_7_Fig4_HTML.jpg](img/A978-1-4842-1052-9_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 使用 Twitter 凭证登录\n\n成功通过社交身份提供者登录后，应用程序被授权访问认证服务器，并将用户信息（包括访问令牌）提供给应用程序，同时重定向到注册社交身份提供者时提供的回调\
  \ URL（使用`Goth`包）。\n\n以下是回调 URL 的应用程序处理函数：\n\n```go\nfunc callbackAuthHandler(res\
  \ http.ResponseWriter, req *http.Request) {\n\n    user, err := gothic.CompleteUserAuth(res,\
  \ req)\n\n    if err != nil {\n        fmt.Fprintln(res, err)\n        return\n\
  \    }\n\n    t, _ := template.New(\"userinfo\").Parse(userTemplate)\n    t.Execute(res,\
  \ user)\n}\n```\n\n当调用`Goth`包的`CompleteUserAuth`函数时，它会返回`Goth`包的一个`User`结构体。该`User`结构体包含大多数\
  \ OAuth 和 OAuth2 提供者通用的信息。来自提供者的所有“原始”数据都可以在`RawData`字段中找到。\n\n以下是`Goth`包源码中`User`结构体的定义：\n\
  \n```go\ntype User struct {\n    RawData           map[string]interface{}\n    Email\
  \             string\n    Name              string\n    NickName          string\n\
  \    Description       string\n    UserID            string\n    AvatarURL     \
  \    string\n    Location          string\n    AccessToken       string\n    AccessTokenSecret\
  \ string\n}\n```\n\n最后，通过提供`User`结构体来渲染视图模板。以下是用于渲染显示用户信息的 UI 的视图模板：\n\n```html\n\
  var userTemplate = `\n<p>Name: {{.Name}}</p>\n<p>Email: {{.Email}}</p>\n<p>NickName:\
  \ {{.NickName}}</p>\n<p>Location: {{.Location}}</p>\n<p>AvatarURL: {{.AvatarURL}}\
  \ <img src=\"{{.AvatarURL}}\"></p>\n<p>Description: {{.Description}}</p>\n<p>UserID:\
  \ {{.UserID}}</p>\n<p>AccessToken: {{.AccessToken}}</p>\n`\n```\n\n图 7-5 显示了从 Twitter\
  \ 获取的用户信息。\n\n![A978-1-4842-1052-9_7_Fig5_HTML.jpg](img/A978-1-4842-1052-9_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** 从 Twitter 获取的用户信息页面\n\n### 使用 JSON Web Token 进行身份验证\n\n第 7.2.2 节讨论了一种基于令牌的认证方法，其中使用不记名令牌来访问\
  \ Web 服务器的受保护资源。JSON Web Token（JWT）是一种用于生成和使用不记名令牌进行两方认证的开放标准。JWT 是一种紧凑、URL 安全的方式，用于表示要在两方之间传输的声明。JWT\
  \ 中的声明被编码为 JSON 对象，并使用 JSON Web 签名（JWS）进行数字签名。与 OAuth 2 一样，JWT 是基于令牌认证的开放标准。（JWT\
  \ 的发音与英文单词“jot”相同。）\n\nJWT 是一个签名的 JSON 对象，可以在 OAuth 2 中用作不记名令牌进行身份验证。JWT 令牌由三部分组成，用`.`（句点）分隔。第一部分称为`Header`，它是一个经过\
  \ base64url 编码的 JSON 对象。第二部分称为`Claims`，也是一个 JSON 对象，包含 JWT 所承载的声明。最后一部分称为`Signature`，使用`Header`提供的信息进行验证。\n\
  \n**注意**\n\nJWT 规范的草案可在此处获取：[`http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html`](http://self-issued.info/docs/draft-ietf-oauth-json-web-token.html)\n\
  \n\n\n### 使用 `jwt-go` 包处理 JWT\n\n第三方 Go 语言包 `jwt-go` 提供了多种用于处理 JWT 的实用函数。它提供以下实用功能：\n\
  \n- 生成和签署 JWT 令牌\n- 解析和验证 JWT 令牌\n\n`jwt-go` 库支持 RSA256 和 HMAC SHA256 签名算法。\n\n\
  要安装 `jwt-go` 包，请在终端中输入以下命令：\n\n```\ngo get github.com/dgrijalva/jwt-go\n```\n\n\
  要使用 `jwt-go` 包，必须将 `github.com/dgrijalva/jwt-go` 添加到导入列表中：\n\n```\nimport \"github.com/dgrijalva/jwt-go\"\
  \n```\n\n让我们编写一个示例 API，使用 `jwt-go` 包处理 JWT 令牌。示例程序中认证流程的步骤如下：\n\nAPI 服务器验证客户端应用程序提供的用户凭据（用户名和密码）。如果登录凭据有效，API\
  \ 服务器会生成一个 JWT 令牌，并将其作为访问令牌发送给客户端应用程序。客户端应用程序可以将 JWT 令牌存储在客户端存储中。HTML 5 本地存储通常用于存储\
  \ JWT 令牌。为了访问 API 服务器的受保护资源，客户端应用程序在每个 HTTP 请求中，都会将访问令牌作为 Bearer 令牌放入 HTTP 头 `Authorization\
  \ (Authorization: Bearer \"Access_Token\")` 中。\n\n在开始示例程序之前，让我们为应用程序生成用于签署令牌的 RSA\
  \ 密钥。可以使用 `openssl` 命令行工具生成 RSA 密钥。\n\n运行以下命令：\n\n```\nopenssl genrsa -out app.rsa\
  \ 1024\n```\n\n```\nopenssl rsa -in app.rsa -pubout > app.rsa.pub\n```\n\n这些命令会生成一个私钥和一个公钥。`1024`\
  \ 是所生成密钥的大小。\n\n清单 7-2 展示了示例程序。\n\n## 清单 7-2. 使用 `jwt-go` 包进行基于 JWT 令牌的认证\n\n```\n\
  package main\n\nimport (\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"io/ioutil\"\n\t\"\
  log\"\n\t\"net/http\"\n\t\"time\"\n\n\tjwt \"github.com/dgrijalva/jwt-go\"\n\t\"\
  github.com/gorilla/mux\"\n)\n\n// 使用非对称加密/RSA 密钥\n// 用于签名和验证的密钥文件位置\nconst (\n\t\
  privKeyPath = \"keys/app.rsa\"     // openssl genrsa -out app.rsa 1024\n\tpubKeyPath\
  \  = \"keys/app.rsa.pub\" // openssl rsa -in app.rsa -pubout > app.rsa.pub\n)\n\n\
  // 验证密钥和签名密钥\nvar (\n\tverifyKey, signKey []byte\n)\n\n// 用于解析登录凭据的 User 结构体\ntype\
  \ User struct {\n\tUserName string `json:\"username\"`\n\tPassword string `json:\"\
  password\"`\n}\n\n// 在启动 HTTP 处理程序之前读取密钥文件\nfunc init() {\n\tvar err error\n\tsignKey,\
  \ err = ioutil.ReadFile(privKeyPath)\n\tif err != nil {\n\t\tlog.Fatal(\"读取私钥时出错\"\
  )\n\t\treturn\n\t}\n\tverifyKey, err = ioutil.ReadFile(pubKeyPath)\n\tif err !=\
  \ nil {\n\t\tlog.Fatal(\"读取私钥时出错\")\n\t\treturn\n\t}\n}\n\n// 读取登录凭据，检查凭据并创建 JWT\
  \ 令牌\nfunc loginHandler(w http.ResponseWriter, r *http.Request) {\n\tvar user User\n\
  \t// 解码到 User 结构体\n\terr := json.NewDecoder(r.Body).Decode(&user)\n\tif err != nil\
  \ {\n\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\tfmt.Fprintln(w, \"请求体中有错误\"\
  )\n\t\treturn\n\t}\n\t// 验证用户凭据\n\tif user.UserName != \"shijuvar\" && user.Password\
  \ != \"pass\" {\n\t\tw.WriteHeader(http.StatusForbidden)\n\t\tfmt.Fprintln(w, \"\
  信息错误\")\n\t\treturn\n\t}\n\t// 为 rsa 256 创建签名器\n\tt := jwt.New(jwt.GetSigningMethod(\"\
  RS256\"))\n\t// 设置我们的声明\n\tt.Claims[\"iss\"] = \"admin\"\n\tt.Claims[\"CustomUserInfo\"\
  ] = struct {\n\t\tName string\n\t\tRole string\n\t}{user.UserName, \"Member\"}\n\
  \t// 设置过期时间\n\tt.Claims[\"exp\"] = time.Now().Add(time.Minute * 20).Unix()\n\ttokenString,\
  \ err := t.SignedString(signKey)\n\tif err != nil {\n\t\tw.WriteHeader(http.StatusInternalServerError)\n\
  \t\tfmt.Fprintln(w, \"抱歉，签名令牌时出错！\")\n\t\tlog.Printf(\"令牌签名错误: %v\\n\", err)\n\t\
  \treturn\n\t}\n\tresponse := Token{tokenString}\n\tjsonResponse(response, w)\n}\n\
  \n// 只有拥有有效令牌才能访问\nfunc authHandler(w http.ResponseWriter, r *http.Request) {\n\t\
  // 验证令牌\n\ttoken, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{},\
  \ error) {\n\t\t// 由于我们只使用一个私钥来签署令牌，\n\t\t// 所以我们也只使用其对应的公钥进行验证\n\t\treturn verifyKey,\
  \ nil\n\t})\n\tif err != nil {\n\t\tswitch err.(type) {\n\t\tcase *jwt.ValidationError:\
  \ // 验证过程中出现问题\n\t\t\tvErr := err.(*jwt.ValidationError)\n\t\t\tswitch vErr.Errors\
  \ {\n\t\t\tcase jwt.ValidationErrorExpired:\n\t\t\t\tw.WriteHeader(http.StatusUnauthorized)\n\
  \t\t\t\tfmt.Fprintln(w, \"令牌已过期，请获取一个新令牌。\")\n\t\t\t\treturn\n\t\t\tdefault:\n\t\
  \t\t\tw.WriteHeader(http.StatusInternalServerError)\n\t\t\t\tfmt.Fprintln(w, \"\
  解析令牌时出错！\")\n\t\t\t\tlog.Printf(\"ValidationError 错误: %+v\\n\", vErr.Errors)\n\t\
  \t\t\treturn\n\t\t\t}\n\t\tdefault: // 发生其他错误\n\t\t\tw.WriteHeader(http.StatusInternalServerError)\n\
  \t\t\tfmt.Fprintln(w, \"解析令牌时出错！\")\n\t\t\tlog.Printf(\"令牌解析错误: %v\\n\", err)\n\t\
  \t\treturn\n\t\t}\n\t}\n\tif token.Valid {\n\t\tresponse := Response{\"已授权访问系统\"\
  }\n\t\tjsonResponse(response, w)\n\t} else {\n\t\tresponse := Response{\"无效令牌\"\
  }\n\t\tjsonResponse(response, w)\n\t}\n}\n\ntype Response struct {\n\tText string\
  \ `json:\"text\"`\n}\n\ntype Token struct {\n\tToken string `json:\"token\"`\n}\n\
  \nfunc jsonResponse(response interface{}, w http.ResponseWriter) {\n\tjson, err\
  \ := json.Marshal(response)\n\tif err != nil {\n\t\thttp.Error(w, err.Error(), http.StatusInternalServerError)\n\
  \t\treturn\n\t}\n\tw.WriteHeader(http.StatusOK)\n\tw.Header().Set(\"Content-Type\"\
  , \"application/json\")\n\tw.Write(json)\n}\n\n// 程序的入口点\nfunc main() {\n\tr :=\
  \ mux.NewRouter()\n\tr.HandleFunc(\"/login\", loginHandler).Methods(\"POST\")\n\t\
  r.HandleFunc(\"/auth\", authHandler).Methods(\"POST\")\n\tserver := &http.Server{\n\
  \t\tAddr:    \":8080\",\n\t\tHandler: r,\n\t}\n\tlog.Println(\"监听中...\")\n\tserver.ListenAndServe()\n\
  }\n```\n\n#### 生成 JWT 令牌\n\n如果登录成功，API 服务器会使用 `jwt-go` 库生成 JWT 令牌：\n\n```\n// 为\
  \ rsa 256 创建签名器\nt := jwt.New(jwt.GetSigningMethod(\"RS256\"))\n// 设置我们的声明\nt.Claims[\"\
  iss\"] = \"admin\"\nt.Claims[\"CustomUserInfo\"] = struct {\n\tName string\n\tRole\
  \ string\n}{user.UserName, \"Member\"}\n// 设置过期时间\nt.Claims[\"exp\"] = time.Now().Add(time.Minute\
  \ * 20).Unix()\ntokenString, err := t.SignedString(signKey)\n```\n\n在代码块中，创建了一个使用\
  \ `\"RS256\"` 的签名器。设置了声明，包括 JWT 令牌的过期时间（使用预定义声明 `\"exp\"`）。最后，使用最开始步骤生成的 RSA 密钥（私钥）创建了一个\
  \ JWT 令牌。`tokenString` 变量包含了发送给客户端应用程序的 JWT 令牌。\n\n\n\n#### 验证 JWT 令牌\n\n由于只有一个私钥\
  \ (`\"app.rsa\"`) 用于签署令牌，因此只使用其对应的公钥 (`\"app.rsa.pub\"`) 来验证访问令牌。\n\n以下是验证访问令牌的身份验证处理程序。它会自动检查\
  \ HTTP 请求对象中的 HTTP `Authorization` 首部中的 `Bearer` 令牌。\n\n```\nfunc authHandler(w\
  \ http.ResponseWriter, r *http.Request) {\n\n    // 验证令牌\n    token, err := jwt.ParseFromRequest(r,\
  \ func(token *jwt.Token) (interface{}, error) {\n        // 因为我们只用一个私钥来签署令牌，\n \
  \       // 所以也只使用其对应的公钥进行验证\n        return verifyKey, nil\n    })\n\n    if err\
  \ != nil {\n        switch err.(type) {\n        case *jwt.ValidationError: // 验证过程中出现问题\n\
  \            vErr := err.(*jwt.ValidationError)\n            switch vErr.Errors\
  \ {\n            case jwt.ValidationErrorExpired:\n                w.WriteHeader(http.StatusUnauthorized)\n\
  \                fmt.Fprintln(w, \"令牌已过期，请获取新令牌。\")\n                return\n  \
  \          default:\n                w.WriteHeader(http.StatusInternalServerError)\n\
  \                fmt.Fprintln(w, \"解析令牌时出错！\")\n                log.Printf(\"ValidationError\
  \ 错误: %+v\\n\", vErr.Errors)\n                return\n            }\n        default:\
  \ // 其他问题\n            w.WriteHeader(http.StatusInternalServerError)\n         \
  \   fmt.Fprintln(w, \"解析令牌时出错！\")\n            log.Printf(\"令牌解析错误: %v\\n\", err)\n\
  \            return\n        }\n    }\n\n    if token.Valid {\n        response\
  \ := Response{\"已授权访问系统\"}\n        jsonResponse(response, w)\n    } else {\n  \
  \      response := Response{\"令牌无效\"}\n        jsonResponse(response, w)\n    }\n\
  }\n```\n\n`ParseFromRequest` 函数会自动检查 HTTP 首部中的访问令牌，并使用相应的验证密钥验证该字符串。通过检查错误，您可以查看令牌是否已过期。`jwt-go`\
  \ 包在处理 JWT 令牌时非常有用。\n\n#### 运行与测试 API 服务器\n\n让我们运行程序并使用 REST 客户端工具调用 API 端点。要登录到\
  \ API 服务器，请通过提供用户名和密码向 `\"/login\"` 发送 HTTP `Post` 请求，如图 7-6 所示。\n\n![A978-1-4842-1052-9_7_Fig6_HTML.jpg](img/A978-1-4842-1052-9_7_Fig6_HTML.jpg)\n\
  \n图 7-6.\n向 “/login” 发送 HTTP Post 请求\n\n图 7-7 显示了向 “/login” 发送 HTTP Post 请求的响应。\n\
  \n![A978-1-4842-1052-9_7_Fig7_HTML.jpg](img/A978-1-4842-1052-9_7_Fig7_HTML.jpg)\n\
  \n图 7-7.\nAPI 服务器发送 JWT 访问令牌作为响应\n\n如果登录有效，API 服务器会向客户端发送一个 JWT 令牌，作为后续 HTTP 请求的访问令牌。\n\
  \n让我们使用从 HTTP `Post` 到 `\"/login\"` 接收到的访问令牌授权进入 API 服务器。\n\n让我们向 `\"/auth\"` 发送请求，在\
  \ HTTP `Authorization` 首部中提供访问令牌，格式如下（参见图 7-8）：\n\n`Authorization: Bearer \"JWT\
  \ 访问令牌\"`\n\n![A978-1-4842-1052-9_7_Fig8_HTML.jpg](img/A978-1-4842-1052-9_7_Fig8_HTML.jpg)\n\
  \n图 7-8.\n使用 JWT 访问令牌向 API 服务器进行身份验证\n\n图 7-9 显示成功向系统进行身份验证的响应。\n\n![A978-1-4842-1052-9_7_Fig9_HTML.jpg](img/A978-1-4842-1052-9_7_Fig9_HTML.jpg)\n\
  \n图 7-9.\n成功向 API 服务器进行身份验证\n\n当您为移动应用和 Web 应用构建后端 Web API 时，如果您提供自己的身份验证和授权基础架构，基于令牌的方法是首选解决方案。这种方法适用于移动客户端和单页应用消费\
  \ API 资源。使用用户名和密码登录系统后，客户端应用程序可以获取访问令牌，以便在后续的 HTTP 请求中访问受保护的资源。一旦客户端应用程序从 API 服务器获取了访问令牌（JWT\
  \ 令牌），该令牌可以持久化存储在客户端应用程序的本地存储中。每当发送 HTTP 请求以访问 API 服务器的受保护资源时，就可以从本地存储中获取这些令牌。\n\
  \n#### 使用 HTTP 中间件验证 JWT 令牌\n\n当您使用 JWT 令牌作为访问服务器受保护资源的身份验证模型时，必须对每个 HTTP 请求验证令牌。在每个\
  \ HTTP 请求中实现验证逻辑将是一项繁琐的工作，因此 HTTP 中间件是一种在 Web 应用中实现身份验证和授权逻辑的好方法，您可以将身份验证中间件装饰到需要身份验证的路由中。您在一个地方编写身份验证逻辑，然后可以将其应用于您想要实现授权以访问其受保护资源的多个路由。\n\
  \n清单 7-3 是一个身份验证中间件，可以用于装饰多个应用程序处理器以执行授权。\n\n**清单 7-3.** 用于验证 JWT 令牌的身份验证中间件\n\n\
  ```\nfunc authMiddleware(w http.ResponseWriter, r *http.Request, next http.HandlerFunc)\
  \ {\n    // 验证令牌\n    token, err := jwt.ParseFromRequest(r, func(token *jwt.Token)\
  \ (interface{}, error) {\n        return verifyKey, nil\n    })\n\n    if(err==nil\
  \ && token.Valid) {\n        next(w,r)\n    } else {\n        w.WriteHeader(http.StatusUnauthorized)\n\
  \        fmt.Fprint(w, \"身份验证失败\")\n    }\n}\n```\n\n如果令牌有效，则会调用中间件栈中的下一个处理器。\n\n\
  以下是将身份验证中间件装饰到受保护资源的应用处理器的代码块：\n\n```\nr.HandleFunc(\"/login\", loginHandler).Methods(\"\
  POST\")\nr.Handle(\"/admin\", negroni.New(\n                negroni.HandlerFunc(authMiddleware),\n\
  \                negroni.Wrap(http.HandlerFunc(adminHandler)),\n        ))\n```\n\
  \n这里使用了用于中间件栈的 `Negroni` 包。对于受保护的资源 `\"/admin\"`，`authMiddleware` 中间件处理器被装饰到了 `adminHandler`\
  \ 应用程序处理器上。\n\n\n\n### 摘要\n\n在构建 Web 应用和 RESTful API 时，安全性是决定应用成功与否的最关键因素之一。如果你无法保护应用免遭未授权访问，那么即便提供了出色的用户体验，整个应用也毫无意义。\n\
  \n通常使用两种身份验证模型来授权 HTTP 请求访问服务器的受保护资源：基于 Cookie 的身份验证和基于令牌的身份验证。基于 Cookie 的身份验证是一种传统方法，适用于传统的、独立的\
  \ Web 应用，这些应用的后端实现提供了包括 UI 渲染在内的一切功能。\n\n基于令牌的方法非常适合为 RESTful API 添加身份验证功能，这些 API\
  \ 可以轻松地被各种客户端应用（包括移动应用和 Web 应用）访问。对于移动应用来说，基于令牌的方法是一种非常便捷的模型，因为令牌可以通过 HTTP 头部作为持有者令牌（Bearer\
  \ Token）发送。使用基于令牌的方法时，Ajax 请求可以发送到任何 API 服务器，不受域限制，从而避免了跨域资源共享（CORS）问题。\n\n`OAuth\
  \ 2` 是一种开放的身份验证标准，它允许应用将身份验证委托给各种 `OAuth 2` 服务提供商，例如 LinkedIn、GitHub、Twitter、Facebook\
  \ 和 Google。许多 `OAuth 2` 服务提供商都可以作为身份提供者使用。Go 的第三方包 `Goth` 允许你通过多种 `OAuth 2` 服务提供商实现身份验证。在\
  \ `OAuth 2` 身份验证流程中，访问令牌用于获取对受保护资源的访问权限。\n\nJSON Web 令牌（`JWT`）是一种开放标准，用于生成和使用持有者令牌，以供双方进行身份验证。`JWT`\
  \ 是一种紧凑且 URL 安全的方式，用来表示要在双方之间传输的声明。Go 的第三方包 `jwt-go` 提供了多种用于处理 `JWT` 令牌的实用函数。它允许你轻松生成\
  \ `JWT` 令牌并验证令牌以进行身份验证。当你使用基于令牌的身份验证时，可能需要在多个应用处理器中应用身份验证逻辑。在这种情况下，你可以使用 HTTP 中间件来实现身份验证逻辑，该逻辑可以装饰到多个应用处理器中。\n\
  \n"
- "# 8. 使用 MongoDB 进行持久化\n\n在构建 Web 应用时，应用数据的持久化非常重要。你可以使用结构体（structs）定义 Go 应用的数据模型，并针对这些结构体进行编程以处理应用数据，但你需要为应用数据提供持久化存储。\n\
  \n本章将向你展示如何将应用数据持久化到 MongoDB 中，MongoDB 是一种流行的 NoSQL 数据库。\n\n本章涵盖以下内容：\n\n- MongoDB\
  \ 简介\n- `mgo` 包\n- 使用 `mgo` 处理 MongoDB\n- 使用 MongoDB 进行持久化\n\n### MongoDB 简介\n\n\
  MongoDB 是一种流行的 NoSQL 数据库，已被广泛应用于现代 Web 应用。MongoDB 是一个开源文档数据库，提供高性能、高可用性和自动扩展。MongoDB\
  \ 是一种非关系型数据库，它将数据以文档形式存储在一种称为 BSON（Binary JSON）的二进制表示中。简而言之，MongoDB 是 BSON 文档的数据存储。Go\
  \ 的结构体可以轻松地序列化为 BSON 文档。\n\n有关 MongoDB 的更多详细信息以及下载和安装说明，请查看 MongoDB 网站：[www.mongodb.org/](http://www.mongodb.org/)。\n\
  \n注意：NoSQL（通常被解释为“不仅仅是 SQL”）数据库提供了一种数据存储和检索机制。它为关系数据库中用于设计数据模型的表格关系提供了一种替代方法。NoSQL\
  \ 数据库旨在应对现代应用开发中的挑战，例如处理海量数据、易于扩展和高性能。与关系数据库相比，NoSQL 数据库可以提供更高的性能、更好的可扩展性和更低的存储成本。NoSQL\
  \ 数据库有多种类型：文档数据库、图数据库、键值存储和宽列存储。MongoDB 是一种流行的文档数据库。\n\n一个 MongoDB 数据库包含一组集合，集合由文档组成。一个文档由一个或多个字段组成，你可以在其中将数据存储为一组键值对。在\
  \ MongoDB 中，你将文档持久化到集合中，这类似于关系数据库中的表。文档类似于行，文档中的字段类似于列。\n\n与关系数据库不同，MongoDB 为文档的\
  \ Schema（模式）提供了更高程度的灵活性，使你能够在数据模型演变时更改文档 Schema。当你使用 Go 处理 MongoDB 时，你的 Go 结构体可以成为文档的\
  \ Schema；只要你希望改变应用数据的结构，就可以随时更改 Schema。一个集合中的文档不必具有相同的字段集或 Schema，并且集合文档中的公共字段可以保存不同类型的数据。当你在多个开发迭代中以演进的方式构建应用时，这种动态\
  \ Schema 特性非常有用。\n\n### MongoDB 入门\n\n安装 MongoDB 后，你可以使用 Go 的 MongoDB 驱动程序从 Go 应用开始使用它。（请记住，在运行应用之前，必须启动\
  \ MongoDB 进程。）你可以通过命令行输入 `mongod` 命令并附带相应的命令行选项来启动 MongoDB。\n\n在本章中，你将学习如何使用第三方包\
  \ `mgo`（一个流行的 Go MongoDB 驱动程序）将数据持久化到 MongoDB 并进行处理。\n\n#### MongoDB 的 `mgo` 驱动程序简介\n\
  \n`mgo`（发音为 mango）是一个用于 Go 的 MongoDB 驱动程序，支持 MongoDB 的主要功能。`mgo` 包允许你使用其遵循 Go 习惯用法的简单\
  \ API，从 Go 应用轻松地处理 MongoDB。`mgo` 是一个成熟的包，创建于 2010 年，自 2011 年起由 MongoDB Inc. 赞助。它是一个经过实战检验的库，用于大规模生产场景，例如\
  \ Facebook 的 Parse.com，这是一个使用 Go 编写的流行的移动后端即服务平台。\n\n##### 安装 `mgo`\n\n要安装 `mgo`\
  \ 包，请在终端中运行以下命令：\n\n```\ngo get gopkg.in/mgo.v2\n```\n\n要使用 `mgo`，你必须将 `gopkg.in/mgo.v2`\
  \ 及其子包 `gopkg.in/mgo.v2/bson` 添加到导入列表中：\n\n```\nimport (\n   \"gopkg.in/mgo.v2\"\
  \n   \"gopkg.in/mgo.v2/bson\"\n)\n```\n\n\n\n#### 连接到 MongoDB\n\n要开始使用 MongoDB，你必须使用\
  \ `Dial` 函数获取一个 MongoDB `Session`（参见代码清单 8-1）。`Dial` 函数会建立与 `url` 参数所指定的 MongoDB\
  \ 服务器的连接。\n\n代码清单 8-1. 连接到 MongoDB 服务器并获取会话\n\n```\nsession, err := mgo.Dial(\"\
  localhost\")\n```\n\n`Dial` 函数也可以用于连接服务器集群（参见代码清单 8-2）。当将 MongoDB 数据库扩展为服务器集群时，这个功能非常有用。\n\
  \n代码清单 8-2. 连接 MongoDB 服务器集群并获取会话\n\n```\nsession, err := mgo.Dial(\"server1.mongolab.com,server2.mongolab.com\"\
  )\n```\n\n你也可以使用 `DialWithInfo` 函数来建立与单台服务器或服务器集群的连接（参见代码清单 8-3）。与 `Dial` 函数的区别在于，你可以通过使用\
  \ `DialInfo` 类型的值向集群提供额外信息。`DialWithInfo` 会建立一个指向由 `DialInfo` 类型定义的 MongoDB 服务器集群的新\
  \ `Session`。`DialWithInfo` 函数允许你在建立服务器连接时自定义一些值。当你使用 `Dial` 函数建立连接时，默认超时值为 10 秒，因此如果\
  \ `Dial` 无法连接到服务器，它将在 10 秒后超时。当你使用 `DialWithInfo` 函数建立连接时，你可以指定 `Timeout` 属性的值。\n\
  \n代码清单 8-3. 使用 `DialWithInfo` 连接 MongoDB 服务器集群\n\n```\nmongoDialInfo := &mgo.DialInfo{\n\
  \    Addrs:    []string{\"localhost\"},\n    Timeout:  60 * time.Second,\n    Database:\
  \ \"taskdb\",\n    Username: \"shijuvar\",\n    Password: \"password@123\",\n}\n\
  \nsession, err := mgo.DialWithInfo(mongoDialInfo)\n```\n\n`mgo.Session` 对象管理着一个到\
  \ MongoDB 的连接池。一旦你获取了一个 `Session` 对象，就可以对 MongoDB 执行读写操作。MongoDB 服务器会依据多种一致性规则进行查询。`Session`\
  \ 对象的 `SetMode` 会更改该会话的一致性模式。有三种可用的**一致性模式**：Eventual、Monotonic 和 Strong。\n\n代码清单\
  \ 8-4 建立了一个 `Session` 对象并设置了一致性模式。\n\n代码清单 8-4. 建立一个会话对象并设置一致性模式\n\n```\nsession,\
  \ err := mgo.Dial(\"localhost\")\nif err != nil {\n    panic(err)\n}\ndefer session.Close()\n\
  \n// 将会话切换到单调（monotonic）行为。\nsession.SetMode(mgo.Monotonic, true)\n```\n\n在其生命周期结束时，通过调用\
  \ `Close` 方法来关闭 `Session` 对象非常重要。在上一个代码清单中，是通过使用 `defer` 函数来调用 `Close` 方法的。\n\n\
  #### 访问集合\n\n为了对 MongoDB 执行 CRUD 操作，需要创建一个 `*mgo.Collection` 对象，该对象代表 MongoDB 的集合。你可以通过调用\
  \ `*mgo.Database` 的 `C` 方法来创建 `*mgo.Collection` 对象。`mgo.Database` 类型代表命名数据库，可以通过调用\
  \ `*mgo.Session` 的 `DB` 方法来创建它。\n\n代码清单 8-5 访问了名为 `\"categories\"` 的 MongoDB 集合。\n\
  \n代码清单 8-5. 访问一个 MongoDB 集合\n\n```\nc := session.DB(\"taskdb\").C(\"categories\"\
  )\n```\n\n`DB` 方法返回一个代表名为 `taskdb` 数据库的值，该值获取了一个类型为 `Database` 的实例。类型 `Database`\
  \ 的方法 `C` 返回一个代表名为 `\"categories\"` 的集合的值。`Collection` 对象可用于执行 CRUD 操作。\n\n### MongoDB\
  \ 的 CRUD 操作\n\n你现在已经知道如何使用 `Dial` 和 `DialWithInfo` 函数来建立一个 MongoDB `Session` 对象。接下来让我们看看如何使用\
  \ `mgo` 包对 MongoDB 数据库执行 CRUD 操作。在 Go 中，你可以将结构体、映射和切片作为 BSON 文档持久化到 MongoDB 数据库中。当你以\
  \ Go 类型（如结构体、映射和切片）持久化数据时，`mgo` 驱动会自动将其序列化为 BSON 文档。\n\n#### 插入文档\n\n你可以使用 `mgo.Collection`\
  \ 的 `Insert` 方法向 MongoDB 插入文档。`Insert` 方法将一个或多个文档插入到集合中。使用该方法，你可以插入结构体、映射和文档切片的值。\n\
  \n\n\n##### 插入结构体值\n\n在定义 Go 应用程序的数据模型时，结构体类型应是你的首选。因此，在使用 MongoDB 时，你主要通过提供结构体类型的值来将\
  \ BSON 文档插入到 MongoDB 集合中。当使用 `Insert` 方法时，MongoDB 的 `mgo` 驱动会自动将结构体值序列化为 BSON 文档。\n\
  \n清单 8-6 向 MongoDB 集合中插入了三个文档。\n\n**清单 8-6.** 将结构体值插入 MongoDB\n\n```\npackage main\n\
  \nimport (\n\t\"fmt\"\n\t\"log\"\n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\
  \n)\n\ntype Category struct {\n\tId          bson.ObjectId `bson:\"_id,omitempty\"\
  `\n\tName        string\n\tDescription string\n}\n\nfunc main() {\n\tsession, err\
  \ := mgo.Dial(\"localhost\")\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tdefer session.Close()\n\
  \n\t// 可选。将会话切换为单调行为。\n\t// 读取可能不是完全最新的，但它们始终能看到向前推进的变更历史，\n\t// 在同一会话的连续查询中读取的数据将保持一致，\n\
  \t// 并且会话内所做的修改将在后续查询中被观察到（读你所写）。\n\t// http://godoc.org/labix.org/v2/mgo#Session.SetMode\n\
  \tsession.SetMode(mgo.Monotonic, true)\n\n\t//获取集合\n\tc := session.DB(\"taskdb\"\
  ).C(\"categories\")\n\n\tdoc := Category{\n\t\tbson.NewObjectId(),\n\t\t\"Open Source\"\
  ,\n\t\t\"Tasks for open-source projects\",\n\t}\n\t//插入一个类别对象\n\terr = c.Insert(&doc)\n\
  \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\t//插入两个类别对象\n\terr = c.Insert(&Category{bson.NewObjectId(),\
  \ \"R & D\", \"R & D Tasks\"},\n\t\t&Category{bson.NewObjectId(), \"Project\", \"\
  Project Tasks\"})\n\n\tvar count int\n\tcount, err = c.Count()\n\tif err != nil\
  \ {\n\t\tlog.Fatal(err)\n\t} else {\n\t\tfmt.Printf(\"%d records inserted\", count)\n\
  \t}\n}\n```\n\n创建了一个名为 `Category` 的结构体来定义数据模型，并将结构体值持久化到 MongoDB 数据库中。你可以将 `_id`\
  \ 字段的类型指定为 `bson.ObjectId`。`ObjectId` 是一个 12 字节的 BSON 类型，用于保存唯一标识的值。存储在 MongoDB\
  \ 集合中的 BSON 文档需要一个唯一的 `_id` 字段作为主键。\n\n当你插入新文档时，请提供一个包含唯一 `ObjectId` 的 `_id` 字段。如果未提供\
  \ `_id` 字段，MongoDB 将添加一个包含 `ObjectId` 的 `_id` 字段。当向 MongoDB 集合插入记录时，你可以调用 `bson.NewObjectId()`\
  \ 为 `bson.ObjectId` 生成一个唯一值。请标记 `_id` 字段，以便当 `mgo` 驱动将值序列化为 BSON 文档时将其序列化为 `_id`，并且指定\
  \ `omitempty` 标签，以便在序列化为 BSON 时如果值为空则忽略该值。\n\n`mgo.Collection` 的 `Insert` 方法用于将值持久化到\
  \ MongoDB。通过指定名称 `\"categories\"` 创建 `Collection` 对象，并通过调用 `Insert` 方法将值插入到 `\"\
  categories\"` 集合中。`Insert` 方法将一个或多个文档插入集合。首先插入一个包含 `Category` 结构体值的文档，然后插入两个文档到集合中。`mgo`\
  \ 驱动会自动将结构体值序列化为 BSON 表示形式并插入集合。\n\n在这个示例程序中，插入了三个文档。调用 `Collection` 对象的 `Count`\
  \ 方法来获取集合中的记录数，并最终打印计数。\n\n当你第一次运行该程序时，应得到以下输出：\n\n```\n3 records inserted\n```\n\
  \n插入 `Map` 和 `文档切片` 使用 Go 结构体是定义数据模型并将数据持久化到 MongoDB 的惯用方式。但在某些上下文中，你可能需要从映射和切片中持久化值。\n\
  \n清单 8-7 展示了如何持久化映射对象和文档切片（`bson.D`）的值。\n\n**清单 8-7.** 从映射和文档切片（bson.D）插入值\n\n```\n\
  package main\n\nimport (\n\t\"log\"\n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\
  \n)\n\nfunc main() {\n\tsession, err := mgo.Dial(\"localhost\")\n\tif err != nil\
  \ {\n\t\tpanic(err)\n\t}\n\tdefer session.Close()\n\n\tsession.SetMode(mgo.Monotonic,\
  \ true)\n\n\t//获取集合\n\tc := session.DB(\"taskdb\").C(\"categories\")\n\n\tdocM :=\
  \ map[string]string{\n\t\t\"name\":        \"Open Source\",\n\t\t\"description\"\
  : \"Tasks for open-source projects\",\n\t}\n\n\t//插入一个映射对象\n\terr = c.Insert(docM)\n\
  \tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\n\tdocD := bson.D{\n\t\t{\"name\",\
  \ \"Project\"},\n\t\t{\"description\", \"Project Tasks\"},\n\t}\n\n\t//插入一个文档切片\n\
  \terr = c.Insert(docD)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n}\n```\n\n通过使用映射对象和文档切片（`bson.D`）插入了一个文档。`bson.D`\
  \ 类型表示包含有序元素的 BSON 文档。因为 `Insert` 方法期望参数值为 `interface{}` 类型，所以可以提供结构体、映射和文档切片。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n##### 插入嵌入式文档\n\n关系型数据库与文档型数据库的主要区别在于，后者不支持用于建模领域模型的关系型方法。如果要在关系型数据库中建立一对多关系，可以创建一个父表和一个子表，父表中的每条记录都可以与子表中的多条记录相关联。为了在这种关系模型中保证数据完整性，可以在子表中定义一个外键约束，指向父表的主键。\n\
  \nMongoDB 集合具有灵活的 schema，因此可以通过不同的方式定义数据模型来实现相同的目标。您可以根据应用程序的上下文，选择合适的策略来定义数据模型。为了在相关的数据之间建立关系，您可以将相关文档嵌入到主文档中，或者在两个文档之间建立引用。在建立相关数据之间的关系时，第一种策略（嵌入文档）在某些场景中表现良好；后一种策略则适用于不同的场景。\n\
  \n> **注意**  \n> 在第 9 章中，你将学习如何使用文档间的引用来建立关系。有关数据模型概念的更多信息，请查阅 MongoDB 文档： [`docs.mongodb.org/manual/data-modeling/`](https://docs.mongodb.org/manual/data-modeling/)\n\
  \n清单 8-8 是一个示例，展示了一个使用嵌入式文档来描述相关数据之间关系的数据模型。在 `Category` 和 `Tasks` 数据之间的一对多关系中，`Category`\
  \ 拥有多个 `Task` 实体。\n\n**清单 8-8.** 插入包含嵌入式文档的文档\n\n```go\npackage main\n\nimport (\n\
  \    \"log\"\n    \"time\"\n    \"gopkg.in/mgo.v2\"\n    \"gopkg.in/mgo.v2/bson\"\
  \n)\n\ntype Task struct {\n    Description string\n    Due         time.Time\n}\n\
  \ntype Category struct {\n    Id          bson.ObjectId `bson:\"_id,omitempty\"\
  `\n    Name        string\n    Description string\n    Tasks       []Task\n}\n\n\
  func main() {\n    session, err := mgo.Dial(\"localhost\")\n    if err != nil {\n\
  \        panic(err)\n    }\n    defer session.Close()\n    session.SetMode(mgo.Monotonic,\
  \ true)\n\n    //获取集合\n    c := session.DB(\"taskdb\").C(\"categories\")\n\n   \
  \ //嵌入子集合\n    doc := Category{\n        bson.NewObjectId(),\n        \"Open-Source\"\
  ,\n        \"Tasks for open-source projects\",\n        []Task{\n            Task{\"\
  Create project in mgo\", time.Date(2015, time.August, 10, 0, 0, 0, 0, time.UTC)},\n\
  \            Task{\"Create REST API\", time.Date(2015, time.August, 20, 0, 0, 0,\
  \ 0, time.UTC)},\n        },\n    }\n\n    //插入一个嵌入了 Tasks 的 Category 对象\n    err\
  \ = c.Insert(&doc)\n    if err != nil {\n        log.Fatal(err)\n    }\n}\n```\n\
  \n这里创建了一个 `Category` 结构体，其中为 `Tasks` 字段指定了一个 `Task` 结构体切片，用于嵌入子集合。嵌入文档使你能够通过一次查询就获取到父文档及其关联的子文档（你无需再执行另一个查询来获取子文档的详细信息）。\n\
  \n#### 读取文档\n\n`Collection` 的 `Find` 方法允许你查询 MongoDB 集合。当调用 `Find` 方法时，你可以提供一个文档来过滤集合数据。`Find`\
  \ 方法使用提供的文档来准备一个查询。为了提供查询集合的文档，你可以提供一个 map 或一个能够被编组为 BSON 的结构体值。你可以使用通用 map，例如 `bson.M`，来提供用于查询数据的文档。要查询集合中的所有文档，你可以使用\
  \ `nil` 作为参数，这等同于一个空文档，例如 `bson.M{}`。`Find` 方法返回 `mgo.Query` 类型的值，你可以通过 `One`、`For`、`Iter`\
  \ 或 `Tail` 等方法来检索结果。\n\n##### 检索所有记录\n\n清单 8-9 通过为 `Find` 方法提供 `nil` 作为参数值，来检索集合中的所有文档。该查询针对清单\
  \ 8-8 中定义的数据模型执行。\n\n**清单 8-9.** 查询集合中的所有文档\n\n```go\niter := c.Find(nil).Iter()\n\
  \    result := Category{}\n    for iter.Next(&result) {\n        fmt.Printf(\"Category:%s,\
  \ Description:%s\\n\", result.Name, result.Description)\n        tasks := result.Tasks\n\
  \        for _, v := range tasks {\n            fmt.Printf(\"Task:%s Due:%v\\n\"\
  , v.Description, v.Due)\n        }\n    }\n\nif err = iter.Close(); err != nil {\n\
  \        log.Fatal(err)\n    }\n```\n\n`Query` 对象的 `Iter` 方法用于遍历文档。`Iter` 执行查询并返回一个可以遍历所有结果的迭代器。当你使用嵌入式文档定义父子关系时，可以在一次查询中获取到相关的文档。\n\
  \n##### 排序记录\n\n文档可以使用 `Query` 类型提供的 `Sort` 方法进行排序。`Sort` 方法准备查询，以便根据提供的字段名对返回的文档进行排序。\n\
  \n清单 8-10 对集合中的文档进行排序。\n\n**清单 8-10.** 使用 `Sort` 方法对文档排序\n\n```go\niter := c.Find(nil).Sort(\"\
  name\").Iter()\n    result := Category{}\n    for iter.Next(&result) {\n       \
  \ fmt.Printf(\"Category:%s, Description:%s\\n\", result.Name, result.Description)\n\
  \        tasks := result.Tasks\n        for _, v := range tasks {\n            fmt.Printf(\"\
  Task:%s Due:%v\\n\", v.Description, v.Due)\n        }\n    }\n\n    if err = iter.Close();\
  \ err != nil {\n        log.Fatal(err)\n    }\n```\n\n你可以通过提供一个以 `–`（减号）为前缀的字段名，以相反顺序对值进行排序，如清单\
  \ 8-11 所示。\n\n**清单 8-11.** 反向排序文档\n\n```go\niter := c.Find(nil).Sort(\"-name\").Iter()\n\
  ```\n\n##### 检索单条记录\n\n清单 8-12 通过提供一个 map 对象来执行查询，从而从集合中检索单条记录。\n\n**清单 8-12.**\
  \ 从集合中查询单条记录\n\n```go\nresult := Category{}\nerr := c.Find(bson.M{\"name\": \"Open-Source\"\
  }).One(&result)\nif err != nil {\n    log.Fatal(err)\n}\n\nfmt.Printf(\"Category:%s,\
  \ Description:%s\\n\", result.Name, result.Description)\ntasks := result.Tasks\n\
  for _, v := range tasks {\n    fmt.Printf(\"Task:%s Due:%v\\n\", v.Description,\
  \ v.Due)\n}\n```\n\n这里提供了 `bson.M` map 类型来查询数据。它使用为 `Name` 字段提供的值来查询集合。`Query` 类型的\
  \ `One` 方法执行查询并将获取到的第一个文档解组到结果参数中。\n\n`Collection` 类型提供了 `FindId` 方法，这是一个便捷辅助方法，等同于以下代码：\n\
  \n```go\nquery := c.Find(bson.M{\"_id\": id})\n```\n\n`FindId` 方法允许你使用文档的 `_id`\
  \ 字段来查询集合。\n\n清单 8-13 使用 `FindId` 方法查询集合。\n\n**清单 8-13.** 使用 `FindId` 查询单条记录\n\n\
  ```go\nresult = Category{}\nerr = c.FindId(obj_id).One(&result)\n```\n\n\n\n####\
  \ 更新文档\n\n`Collection`类型的`Update`方法允许你更新现有文档。\n\n以下是`Update`方法的方法签名：\n\n```\nfunc\
  \ (c *Collection) Update(selector interface{}, update interface{}) error\n```\n\n\
  `Update`方法从集合中查找单个文档，将其与所提供的选择器文档进行匹配，并根据所提供的更新文档对其进行修改。通过在更新文档中使用关键字`\"$set\"`，可以执行部分更新。\n\
  \n清单 8-14 更新了一个现有文档。\n\n**清单 8-14.** 更新文档\n\n```\nerr := c.Update(bson.M{\"_id\"\
  : id},\n        bson.M{\"$set\": bson.M{\n            \"description\": \"创建开源项目\"\
  ,\n            \"tasks\": []Task{\n                Task{\"评估 Negroni 项目\", time.Date(2015,\
  \ time.August, 15, 0, 0, 0, 0, time.UTC)},\n                Task{\"探索 mgo 项目\",\
  \ time.Date(2015, time.August, 10, 0, 0, 0, 0, time.UTC)},\n                Task{\"\
  探索 Gorilla Toolkit\", time.Date(2015, time.August, 10, 0, 0, 0, 0, time.UTC)},\n\
  \            },\n        }})\n```\n\n对`descriptions`和`tasks`字段执行了部分更新。`Update`方法查找具有给定`_id`值的文档，并根据所提供的文档修改这些字段。\n\
  \n#### 删除文档\n\n`Collection`类型的`Remove`方法允许你删除单个文档。\n\n以下是`Remove`方法的方法签名：\n\n```\n\
  func (c *Collection) Remove(selector interface{}) error\n```\n\n`Remove`从集合中查找单个文档，将其与所提供的选择器文档进行匹配，并将其从数据库中删除。\n\
  \n清单 8-15 从集合中删除了单个文档。\n\n**清单 8-15.** 删除单个文档\n\n```\nerr := c.Remove(bson.M{\"\
  _id\": id})\n```\n\n匹配`_id`字段的单个文档被删除。\n\n`Collection`类型的`RemoveAll`方法允许你删除多个文档。\n\
  \n以下是`RemoveAll`方法的方法签名：\n\n```\nfunc (c *Collection) RemoveAll(selector interface{})\
  \ (info *ChangeInfo, err error)\n```\n\n`RemoveAll`从集合中查找所有文档，匹配所提供的选择器文档，并从数据库中删除所有文档。如果要删除集合中的所有文档，请将选择器文档作为`nil`值传递。\n\
  \n清单 8-16 删除了集合中的所有文档。\n\n**清单 8-16.** 删除集合中的所有文档\n\n```\nc.RemoveAll(nil)\n```\n\
  \n### MongoDB 中的索引\n\n与关系型数据库相比，MongoDB 数据库可以在读操作上提供高性能。除了 MongoDB 的默认性能行为之外，你还可以通过向\
  \ MongoDB 集合添加索引来进一步提高性能。集合中的索引可为频繁使用的查询提供高性能的读取操作。MongoDB 在[集合](http://docs.mongodb.org/manual/reference/glossary/#term-collection)级别定义索引，并支持对\
  \ MongoDB 集合中文档的任何字段或子字段建立索引。\n\n所有 MongoDB 集合默认都有一个针对`_id`字段的索引。如果你不提供`_id`字段，MongoDB\
  \ 进程（`mongod`）会创建一个具有唯一`ObjectId`值的`_id`字段。`_id`索引是唯一的（你可以将其视为主键）。除了`_id`字段上的默认索引外，你还可以向任何字段添加索引。\n\
  \n如果你经常通过特定字段进行过滤来查询集合，则应应用索引以确保更好的读操作性能。`mgo`驱动通过使用`Collection`的`EnsureIndex`方法支持创建索引，在该方法中，你可以添加`mgo.Index`类型作为参数。\n\
  \n清单 8-17 对`name`字段应用了一个唯一索引，之后使用`Name`字段进行查询。\n\n**清单 8-17.** 在 MongoDB 集合中创建索引\n\
  \n```\npackage main\n\nimport (\n    \"fmt\"\n    \"log\"\n    \"gopkg.in/mgo.v2\"\
  \n    \"gopkg.in/mgo.v2/bson\"\n)\n\ntype Category struct {\n    Id          bson.ObjectId\
  \ `bson:\"_id,omitempty\"`\n    Name        string\n    Description string\n}\n\n\
  func main() {\n    session, err := mgo.Dial(\"localhost\")\n    if err != nil {\n\
  \        panic(err)\n    }\n    defer session.Close()\n    session.SetMode(mgo.Monotonic,\
  \ true)\n    c := session.DB(\"taskdb\").C(\"categories\")\n    c.RemoveAll(nil)\n\
  \n    // 索引\n    index := mgo.Index{\n        Key:        []string{\"name\"},\n\
  \        Unique:     true,\n        DropDups:   true,\n        Background: true,\n\
  \        Sparse:     true,\n    }\n\n    // 创建索引\n    err = c.EnsureIndex(index)\n\
  \    if err != nil {\n        panic(err)\n    }\n\n    // 插入三个分类对象\n    err = c.Insert(\n\
  \        &Category{bson.NewObjectId(), \"开源\", \"开源项目任务\"},\n        &Category{bson.NewObjectId(),\
  \ \"研发\", \"研发任务\"},\n        &Category{bson.NewObjectId(), \"项目\", \"项目任务\"},\n\
  \    )\n    if err != nil {\n        panic(err)\n    }\n\n    result := Category{}\n\
  \    err = c.Find(bson.M{\"name\": \"开源\"}).One(&result)\n    if err != nil {\n\
  \        log.Fatal(err)\n    } else {\n        fmt.Println(\"描述:\", result.Description)\n\
  \    }\n}\n```\n\n创建了一个`mgo.Index`类型的实例，并通过提供一个`Index`类型实例作为参数来调用`EnsureIndex`函数：\n\
  \n```\nindex := mgo.Index{\n    Key:        []string{\"name\"},\n    Unique:   \
  \  true,\n    DropDups:   true,\n    Background: true,\n    Sparse:     true,\n\
  }\nerr = c.EnsureIndex(index)\nif err != nil {\n    panic(err)\n}\n```\n\n`Index`类型的`Key`属性允许你指定要应用为集合索引的字段名切片。这里，字段`name`被指定为索引。由于字段名是以切片形式提供的，你可以在单个`Index`类型实例中提供多个字段。`Index`类型的`Unique`属性可防止两个文档具有相同的索引键。\n\
  \n默认情况下，索引是升序排列的。要创建降序索引，字段名应以短划线前缀（`-`）指定，如下所示：\n\n```\nKey:   []string{\"-name\"\
  }\n```\n\n\n\n### 管理会话\n\n`mgo` 包的 `Dial` 方法用于建立与 MongoDB 服务器集群的连接，并返回一个 `mgo.Session`\
  \ 对象。你可以使用 `Session` 对象管理所有 CRUD 操作，该对象也管理着与 MongoDB 服务器的连接池。连接池是数据库连接的缓存，当需要与数据库建立新连接时，可以复用已有连接。在开发\
  \ Web 应用时，为所有 CRUD 操作使用单一的全局 `Session` 对象是一种非常糟糕的做法。\n\n以下是 Web 应用中管理 `Session`\
  \ 对象的推荐流程：\n\n- 使用 `Dial` 方法获取一个 `Session` 对象。\n- 在单个 HTTP 请求的生命周期内，通过对 `Dial` 方法返回的\
  \ `Session` 对象调用 `New`、`Copy` 或 `Clone` 方法来创建一个新的 `Session` 对象。这种方法能让 `Session`\
  \ 对象恰当地使用连接池。\n- 使用新获取的 `Session` 对象在 HTTP 请求的生命周期内执行所有 CRUD 操作。\n\n`New` 方法会创建一个与原始\
  \ `Session` 具有相同参数的新 `Session`。`Copy` 方法的工作方式与 `New` 类似，但复制的 `Session` 会保留原始 `Session`\
  \ 的精确认证信息。`Clone` 方法的工作方式与 `Copy` 类似，但它还会复用与原始 `Session` 相同的套接字（即与服务器的连接）。\n\n清单\
  \ 8-18 是一个示例 HTTP 服务器，它在 HTTP 请求的生命周期内使用复制的 `Session` 对象。在此示例中，创建了一个结构体类型来持有 `Session`\
  \ 对象，以便于从应用程序处理程序管理数据库操作。\n\n**清单 8-18.** 为每个 HTTP 请求使用新 Session 的 HTTP 服务器\n\n\
  ```\npackage main\n\nimport (\n\t\"encoding/json\"\n\t\"log\"\n\t\"net/http\"\n\t\
  \"github.com/gorilla/mux\"\n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n\
  )\n\nvar session *mgo.Session\n\ntype (\n\tCategory struct {\n\t\tId          bson.ObjectId\
  \ `bson:\"_id,omitempty\"`\n\t\tName        string\n\t\tDescription string\n\t}\n\
  \tDataStore struct {\n\t\tsession *mgo.Session\n\t}\n)\n\n//Close mgo.Session\n\
  func (d *DataStore) Close() {\n\td.session.Close()\n}\n\n//Returns a collection\
  \ from the database.\nfunc (d *DataStore) C(name string) *mgo.Collection {\n\treturn\
  \ d.session.DB(\"taskdb\").C(name)\n}\n\n//Create a new DataStore object for each\
  \ HTTP request\nfunc NewDataStore() *DataStore {\n\tds := &DataStore{\n\t\tsession:\
  \ session.Copy(),\n\t}\n\treturn ds\n}\n\n//Insert a record\nfunc PostCategory(w\
  \ http.ResponseWriter, r *http.Request) {\n\tvar category Category\n\t// Decode\
  \ the incoming Category json\n\terr := json.NewDecoder(r.Body).Decode(&category)\n\
  \tif err != nil {\n\t\tpanic(err)\n\t}\n\tds := NewDataStore()\n\tdefer ds.Close()\n\
  \t//Getting the mgo.Collection\n\tc := ds.C(\"categories\")\n\t//Insert record\n\
  \terr = c.Insert(&category)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tw.WriteHeader(http.StatusCreated)\n\
  }\n\n//Read all records\nfunc GetCategories(w http.ResponseWriter, r *http.Request)\
  \ {\n\tvar categories []Category\n\tds := NewDataStore()\n\tdefer ds.Close()\n\t\
  //Getting the mgo.Collection\n\tc := ds.C(\"categories\")\n\titer := c.Find(nil).Iter()\n\
  \tresult := Category{}\n\tfor iter.Next(&result) {\n\t\tcategories = append(categories,\
  \ result)\n\t}\n\tw.Header().Set(\"Content-Type\", \"application/json\")\n\tj, err\
  \ := json.Marshal(categories)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tw.WriteHeader(http.StatusOK)\n\
  \tw.Write(j)\n}\n\nfunc main() {\n\tvar err error\n\tsession, err = mgo.Dial(\"\
  localhost\")\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tr := mux.NewRouter()\n\t\
  r.HandleFunc(\"/api/categories\", GetCategories).Methods(\"GET\")\n\tr.HandleFunc(\"\
  /api/categories\", PostCategory).Methods(\"POST\")\n\tserver := &http.Server{\n\t\
  \tAddr:    \":8080\",\n\t\tHandler: r,\n\t}\n\tlog.Println(\"Listening...\")\n\t\
  server.ListenAndServe()\n}\n```\n\n定义了一个 `DataStore` 结构体类型来简化 `mgo.Session` 的管理。为\
  \ `DataStore` 类型添加了两个方法：`Close` 和 `C`。`Close` 方法通过调用 `Session` 对象的 `Close` 方法来释放新创建的\
  \ `Session` 对象的资源。该方法在 HTTP 请求生命周期结束后，通过 `defer` 函数调用。`C` 方法返回指定名称的 `Collection`\
  \ 对象：\n\n```\ntype DataStore struct {\n\tsession *mgo.Session\n}\n\n//Close mgo.Session\n\
  func (d *DataStore) Close() {\n\td.session.Close()\n}\n\n//Returns a collection\
  \ from the database.\nfunc (d *DataStore) C(name string) *mgo.Collection {\n\treturn\
  \ d.session.DB(\"taskdb\").C(name)\n}\n```\n\n`NewDataStore` 函数通过使用 `Dial` 方法获取的\
  \ `Session` 的 `Copy` 方法来提供一个新 `Session` 对象，进而创建一个新的 `DataStore` 对象：\n\n```\nfunc\
  \ NewDataStore() *DataStore {\n\tds := &DataStore{\n\t\tsession: session.Copy(),\n\
  \t}\n\treturn ds\n}\n```\n\n调用 `NewDataStore` 函数来创建一个 `DataStore` 对象，以便为 HTTP 请求的生命周期提供复制的\
  \ `Session` 对象。对于每个路由的处理程序，都通过 `DataStore` 类型使用一个新的 `Session` 对象。简而言之，使用全局 `Session`\
  \ 对象并非良好实践；推荐做法是为每个 HTTP 请求的生命周期使用一个复制的 `Session` 对象。这种方法允许你在需要时拥有多个 `Session` 对象。\n\
  \n### 总结\n\n在开发 Web 应用时，将应用数据持久化到持久化存储中非常重要。在本章中，你学习了如何使用 `mgo` 包（一个 Go 语言的 MongoDB\
  \ 驱动程序）将数据持久化到 MongoDB 中。\n\nMongoDB 是一个开源文档数据库，提供高性能、高可用性和自动扩展能力。MongoDB 是最流行的\
  \ NoSQL 数据库，已被现代 Web 应用广泛使用。`mgo` 驱动程序提供了一个遵循 Go 语言习惯的简单 API。\n\n你可以为 MongoDB 集合的字段添加索引，从而为读操作提供高性能。在\
  \ Go 语言中开发 Web 应用时，使用全局 `mgo.Session` 对象并非良好实践。管理 `Session` 的正确方法是，对通过 `mgo` 包的\
  \ `Dial` 方法获取的 `Session` 对象调用 `Copy`、`Clone` 或 `New` 来创建一个新的 `Session` 对象。\n\n下一章将进一步展示如何使用\
  \ `mgo` 包操作 MongoDB 数据库。\n\n"
- "# 构建 RESTful 服务\n\n前几章讨论了构建基于 Web 的系统涉及的各个方面，包括使用 `http` 包的 Go Web 编程基础、用于渲染 UI\
  \ 的 `html/template` 包、各种身份验证方法、HTTP 中间件以及使用 MongoDB 进行数据持久化。\n\n本章将利用前几章讨论的概念，实现一个功能完整的\
  \ RESTful API 应用程序，名为 TaskManager。该应用程序还将包含一些新特性，例如管理外部包依赖的能力以及使用 Docker 部署 HTTP\
  \ 服务器。\n\n\n\n### RESTful API：数字化转型的基石\n\n表述性状态转移（REST）是一种用于构建可扩展 Web 服务的架构风格。RESTful\
  \ 系统通常通过使用 HTTP 动词，在超文本传输协议（HTTP）上进行通信。REST 架构风格由罗伊·菲尔丁在其博士论文中首次描述，其中他列出了应用于 REST\
  \ 架构的六项约束。\n\n以下是罗伊·菲尔丁描述的六项约束：\n\n*   统一接口\n*   无状态\n*   可缓存\n*   客户端-服务器\n*  \
  \ 分层系统\n*   按需代码（可选）\n\n注意\n\n为了更好地理解 REST 架构风格，请阅读罗伊·菲尔丁的博士论文，地址为 [`http://www.ics.uci.edu/∼fielding/pubs/dissertation/rest_arch_style.htm`](http://www.ics.uci.edu/%E2%88%BCfielding/pubs/dissertation/rest_arch_style.htm)。\n\
  \nREST 架构最大的优势在于它使用了 Web 编程的基本组件。如果你具备 HTTP 编程的基础知识，就能轻松地将 REST 架构风格应用于你的应用程序。它使用\
  \ HTTP 作为传输系统与远程服务器通信。你可以使用 XML 和 JSON 作为客户端与服务器之间的数据交换格式。资源是 RESTful 系统中的关键概念，正如菲尔丁在其论文中所描述的那样：\n\
  \n> REST 中信息的关键抽象是资源。任何可以被命名的信息都可以成为一个资源：一份文档或图像、一项时效性服务（例如“洛杉矶今天的天气”）、一个其他资源的集合、一个非虚拟对象（例如一个人），等等。换句话说，任何可能成为作者超文本引用目标的概念，都必须符合资源的定义。资源是一组实体的概念映射，而不是在任何一个特定时间点与该映射相对应的实体。\n\
  \n通过使用统一资源标识符（URI）和 HTTP 动词，你可以对资源执行操作。假设你定义了资源 `\"/api/employees\"`。现在，你可以使用 HTTP\
  \ 动词 `Get` 来检索员工资源的信息，使用 `Post` 来创建新的员工资源，使用 `Put` 来更新现有员工资源，以及使用 `Delete` 来删除员工资源。\n\
  \n遵循 REST 架构风格的 Web 服务 API 被称为 RESTful API。当构建 RESTful API 时，你会使用 XML 和 JSON 作为客户端应用程序与\
  \ API 服务器之间交换数据的格式。一些 API 同时支持 XML 和 JSON 两种格式；其他 API 则只支持一种数据格式：要么 XML，要么 JSON。在为移动应用程序构建\
  \ API 时，最常用的数据格式是 JSON，因为它比 XML 更轻量，也更容易使用。在本章中，你将构建一个基于 JSON 的 RESTful API。\n\n\
  #### 使用 RESTful API 进行 API 驱动开发\n\nAPI（通常是 RESTful API）通过在企业的数字化转型过程中提供支持，正逐渐成为现代应用的基石。RESTful\
  \ API 能够实现应用之间更好的集成，无论其技术、平台和设备如何。它们在许多应用开发场景中都是非常重要的组件，包括大数据、物联网（IoT）、微服务架构、Web\
  \ 应用和移动应用。\n\n在移动化时代，基于 API 的开发的重要性大大提升。在构建移动应用时，RESTful API 既可以用作后端，也可以用于构建 Web\
  \ 前端应用。在企业移动化中，最大的挑战并非构建移动前端应用，而是将企业数据暴露给移动设备。这些数据可能跨越多个系统、技术和平台。RESTful API 使您能够将企业数据暴露给移动设备。在大多数企业移动化场景中，RESTful\
  \ 服务层是实施的重要组成部分。\n\n过去，Web 应用的开发方式是在服务器端实现所有功能，包括使用服务器端模板的用户界面渲染逻辑。如今，API 正成为 Web\
  \ 应用和移动应用的核心：开发人员在服务器端构建 RESTful 服务，然后利用这些 RESTful 服务作为后端，为 Web 和移动端构建前端应用。\n\n\
  ### Go：构建 RESTful 服务的绝佳技术栈\n\n我相信，对于构建包含所有功能（包括 UI 渲染）都在服务器端实现的传统 Web 应用来说，Go 可能不是一个绝佳的选择。我并非说\
  \ Go 不适合构建传统 Web 应用；你可以直接使用 Go 标准库包来构建传统 Web 应用。像 Beego 和 Revel 这样的 Go Web 开发框架也适合构建\
  \ Web 应用，但我坚信，对于构建高度可扩展的 RESTful API 系统来为现代应用提供后端支持，Go 是一个绝佳的选择。在可用于构建 RESTful API\
  \ 的技术栈中，我强烈推荐 Go，它在构建可扩展的后端系统方面提供了高性能、更强的并发支持以及简洁性。Go 的简洁性和丰富的包生态系统非常适合编写松耦合、易于维护的\
  \ RESTful 服务。\n\n标准库包 `http` 为构建可扩展的 Web 系统提供了坚实的基础。它内置了并发支持，将每个 HTTP 请求放在一个独立的\
  \ `goroutine` 中执行。`http` 包具有大量的可扩展点，能够很好地与第三方包生态系统协作。如果你想扩展或替换 `http` 包的某些功能，可以轻松构建自己的包，而不会破坏该包的设计目标。有多个有用的第三方包扩展了\
  \ `http` 包的功能，使你能够使用 Go 构建高度可扩展的 Web 应用和 RESTful API。\n\n在构建基于 Web 的系统时，生态系统非常重要，而\
  \ Go 拥有许多成熟的数据库驱动程序包。第 8 章 讨论了如何使用 `mgo` 包与 MongoDB 协同工作。主要的**关系型数据库**和**NoSQL 数据库**都有可用的数据库驱动程序包。如果你的后端系统需要与中间件消息系统协同工作，可以找到相应的客户端库包。NSQ，一个实时分布式消息平台，就是用\
  \ Go 构建的。简而言之，Go 生态系统（包括第三方包和工具）提供了使用 Go 构建可扩展的 RESTful API 以及其他基于 Web 的后端系统所需的一切。\n\
  \n\n\n#### Go：微服务架构的伟大技术栈\n\n软件开发实践不断演进，以应对新的挑战。作为一种编程语言，Go 是解决当今构建大型应用难题的优秀范例。软件架构同样在演进。微服务架构是软件架构领域最热门的概念，它是构建大型分布式应用的软件开发方式的一次根本性转变。\n\
  \n过去，许多应用采用单体架构模式，即应用的所有组件（包括表示层组件、业务逻辑、数据库访问逻辑和应用集成逻辑）都被打包成一个可部署单元。随着这些应用的范围和功能不断演进，它们通过添加新功能和软件组件，始终作为一个单一应用单元进行维护。由于将所有内容作为一个可部署单元进行维护的复杂性，扩展和维护单体应用始终是一个巨大的挑战。微服务架构是一种替代性的架构模式，它解决了单体架构的局限性和挑战。\n\
  \n微服务架构是软件开发的一种范式转变，其核心是构建可独立部署的单个软件模块。与开发大型单体应用不同，微服务架构建议构建松散耦合、小型的软件服务，这些服务可以独立于其他服务进行部署。与单体架构不同，微服务架构中的每个服务都是独立开发与部署的，因此你可以轻松地扩展开发和部署。你甚至可以使用不同的技术栈来开发单个服务，因为它们独立于其他服务进行部署和更新。\n\
  \n##### 微服务架构中的 RESTful 服务\n\n在微服务架构中，开发的是松散耦合的软件服务，通过组合这些服务来构建应用。在这种架构方法中，每个微服务都需要与其他微服务通信；RESTful\
  \ API 可用于这些微服务之间的通信。RESTful API 是微服务架构中非常重要的组件。\n\nGo 是使用微服务模式构建应用的绝佳技术栈，其设计理念与微服务架构模式相得益彰。Go\
  \ 编程的惯用方法是开发小型的软件组件作为包（packages），然后通过组合这些包来构建应用。\n\n#### 构建 RESTful API\n\n让我们利用从前几章获得的知识，构建一个简单的\
  \ RESTful API 应用。这个 RESTful API 应用为构建一个简单的“TaskManager”应用提供后端支持，该应用可用于管理任务，并提供每个任务的更新和备注。该应用的数据将持久化到\
  \ MongoDB 数据库中。这个 TaskManager RESTful API 将是一个基于 JSON 的 API，使用 JSON 数据格式在客户端应用和\
  \ RESTful API 服务器之间发送和接收消息。\n\n##### 第三方包\n\n构建 TaskManager 应用将使用以下第三方包：\n\n- `gopkg.in/mgo.v2`：`mgo`\
  \ 包为 Go 语言提供了一个 MongoDB 驱动。\n- `gopkg.in/mgo.v2/bson`：`mgo` 的子包，为 Go 语言提供了 BSON\
  \ 规范的实现。\n- `github.com/gorilla/mux`：`mux` 包实现了一个请求路由器和分发器。\n- `github.com/dgrijalva/jwt-go`：`jwt-go`\
  \ 包实现了用于处理 JSON Web 令牌（JWT）的辅助函数。\n- `github.com/codegangsta/negroni`：`Negroni`\
  \ 包为 HTTP 中间件提供了一种惯用的方法。\n\n##### 应用结构\n\n图 9-1 展示了 RESTful API 应用的高级文件夹结构。\n\n\
  ![A978-1-4842-1052-9_9_Fig1_HTML.jpg](img/A978-1-4842-1052-9_9_Fig1_HTML.jpg)\n\n\
  图 9-1. 应用文件夹结构\n\n图 9-2 展示了 RESTful API 应用完整版本的文件夹结构及相关文件。\n\n![A978-1-4842-1052-9_9_Fig2_HTML.jpg](img/A978-1-4842-1052-9_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 完整应用的文件夹及相关文件\n\n除了 `keys` 和 `Godeps` 文件夹，所有其他文件夹都代表 Go 包。`keys` 文件夹包含用于签署\
  \ JWT 并进行验证的密钥，用于通过 JWT 对 API 进行身份验证。`Godeps` 文件夹用于使用 `godep` 第三方工具管理应用的外部依赖。\n\n\
  RESTful API 应用被划分为以下包：\n\n- `common`：实现一些工具函数，并提供应用的初始化逻辑\n- `controllers`：实现应用的应用处理器\n\
  - `data`：实现与 MongoDB 数据库的持久化逻辑\n- `models`：描述应用的数据模型\n- `routers`：为 RESTful API\
  \ 实现 HTTP 请求路由\n\n\n\n##### 数据模型\n\n该应用提供用于管理任务的 API。用户可以添加任务，并针对单个任务提供更新和备注。让我们为这个应用定义数据模型，以便与\
  \ `MongoDB` 数据库一起使用。\n\n清单 9-1 定义了 RESTful API 应用的数据模型。\n\n**清单 9-1.** `models.go`\
  \ 中的应用数据模型\n\n```go\npackage models\n\nimport (\n    \"time\"\n    \"gopkg.in/mgo.v2/bson\"\
  \n)\n\ntype (\n    User struct {\n        Id           bson.ObjectId `bson:\"_id,omitempty\"\
  \ json:\"id\"`\n        FirstName    string        `json:\"firstname\"`\n      \
  \  LastName     string        `json:\"lastname\"`\n        Email        string \
  \       `json:\"email\"`\n        Password     string        `json:\"password,omitempty\"\
  `\n        HashPassword []byte        `json:\"hashpassword,omitempty\"`\n    }\n\
  \n    Task struct {\n        Id          bson.ObjectId `bson:\"_id,omitempty\" json:\"\
  id\"`\n        CreatedBy   string        `json:\"createdby\"`\n        Name    \
  \    string        `json:\"name\"`\n        Description string        `json:\"description\"\
  `\n        CreatedOn   time.Time     `json:\"createdon,omitempty\"`\n        Due\
  \         time.Time     `json:\"due,omitempty\"`\n        Status      string   \
  \     `json:\"status,omitempty\"`\n        Tags        []string      `json:\"tags,omitempty\"\
  `\n    }\n\n    TaskNote struct {\n        Id          bson.ObjectId `bson:\"_id,omitempty\"\
  \ json:\"id\"`\n        TaskId      bson.ObjectId `json:\"taskid\"`\n        Description\
  \ string        `json:\"description\"`\n        CreatedOn   time.Time     `json:\"\
  createdon,omitempty\"`\n    }\n)\n```\n\n创建了三个结构体：`User`、`Task` 和 `TaskNote`。`User`\
  \ 结构体代表应用的用户。用户需要在应用上注册才能创建任务。经过身份验证的用户可以添加任务，这些任务将由 `Task` 结构体表示。用户可以针对每个任务添加备注，这些备注将由\
  \ `TaskNote` 结构体表示。`TaskNote` 实体保存其父实体 `Task` 的子细节。\n\n第 8 章展示了如何通过将子文档嵌入到父文档中来建立父子关系。这种方法适用于某些场景，但在其他上下文中，文档引用也同样适用。在这里，父子关系是通过文档引用建立的。每当创建一个\
  \ `TaskNote` 对象时，通过在该对象中指定 `TaskId`，便会建立对父 `Task` 文档的引用。使用这种方法，你需要对 `MongoDB` 数据库执行单独的查询，才能获取\
  \ `Task` 对象和 `TaskNote` 对象的文档。当你采用嵌入文档的方式建立一对多关系时，只需执行单个查询就能获取父实体和子实体的信息，因为子文档是嵌入在父实体中的。\n\
  \n##### RESTful API 的资源建模\n\n在设计与 RESTful API 时，资源建模是一个非常关键的概念；它是设计 RESTful API\
  \ 的基础层。让我们利用 URI 作为资源标识符和 HTTP 动词来定义 RESTful API 的资源。\n\n表 9-1 展示了为 RESTful API\
  \ 确定的资源。\n\n**表 9-1.** 为 RESTful API 确定的资源\n\n| URI | HTTP 动词 | 功能 |\n| --- | ---\
  \ | --- |\n| `/users/register` | `Post` | 创建新用户。 |\n| `/users/login` | `Post` |\
  \ 用户登录系统，登录成功则返回 JWT。 |\n| `/tasks` | `Post` | 创建新任务。 |\n| `/tasks/{id}` | `Put`\
  \ | 更新现有任务。 |\n| `/tasks` | `Get` | 获取所有任务。 |\n| `/tasks/{id}` | `Get` | 根据给定 ID\
  \ 获取单个任务。ID 值来自路由参数。 |\n| `/tasks/users/{id}` | `Get` | 获取与某个用户关联的所有任务。用户 ID 值来自路由参数。\
  \ |\n| `/tasks/{id}` | `Delete` | 根据给定 ID 删除现有任务。ID 值来自路由参数。 |\n| `/notes` | `Post`\
  \ | 针对现有任务创建新备注。 |\n| `/notes/{id}` | `Put` | 更新现有的任务备注。 |\n| `/notes` | `Get` |\
  \ 获取所有任务备注。 |\n| `/notes/{id}` | `Get` | 根据给定 ID 获取单个备注。ID 值来自路由参数。 |\n| `/notes/tasks/{id}`\
  \ | `Get` | 根据给定任务 ID 获取所有任务备注。ID 值来自路由参数。 |\n| `/notes/{id}` | `Delete` | 根据给定\
  \ ID 删除现有备注。ID 值来自路由参数。 |\n\n###### 将资源映射到应用路由\n\n你需要将资源标识符映射到 HTTP 服务器的应用路由，以便为发往\
  \ RESTful API 资源的 HTTP 请求执行相应的应用处理器。所有路由都组织在 `routers` 包中，其中为每个资源路径分别编写了 Go 源文件来指定路由。在这个\
  \ RESTful API 应用中，使用了三个实体：`User`、`Task` 和 `TaskNote`。这些实体映射到三个资源：`\"/users\"`、`\"\
  /tasks\"` 和 `\"/notes\"`。\n\n图 9-3 展示了 `routers` 包目录的结构：\n\n![A978-1-4842-1052-9_9_Fig3_HTML.jpg](img/A978-1-4842-1052-9_9_Fig3_HTML.jpg)\n\
  \n**图 9-3.** `routers` 包的结构\n\n###### 用户资源的路由\n\n让我们定义用户资源的路由（见清单 9-2）。\n\n**清单\
  \ 9-2.** `user.go` 中用户资源的路由\n\n```go\npackage routers\n\nimport (\n    \"github.com/gorilla/mux\"\
  \n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\n)\n\nfunc SetUserRoutes(router\
  \ *mux.Router) *mux.Router {\n    router.HandleFunc(\"/users/register\", controllers.Register).Methods(\"\
  POST\")\n    router.HandleFunc(\"/users/login\", controllers.Login).Methods(\"POST\"\
  )\n    return router\n}\n```\n\n`SetUserRoutes` 函数接收一个指向 Gorilla `mux` 路由器对象 (`mux.Router`)\
  \ 的指针作为参数，并返回 `mux.Router` 对象的指针。这里指定了两条路由：一条用于注册新用户，另一条用于用户登录系统。应用处理器函数从 `controllers`\
  \ 包中调用，该包将在本章后面讨论。\n\n\n###### 任务资源的路由\n\n用户必须登录系统才能访问`Task`和`TaskNote`的资源。当用户使用用户名和密码登录时，系统会颁发一个\
  \ JWT，该 JWT 可作为访问`Task`和`TaskNote`实体资源的授权凭证。服务器通过一个 HTTP 中间件来验证`Task`和`TaskNote`资源\
  \ HTTP 请求中的 JWT，该中间件封装了应用程序处理器，并确保 HTTP 请求包含有效的 JWT 承载令牌。\n\n第三方包`Negroni`用于处理 HTTP\
  \ 中间件（参考第 6 章）。`common`包中有一个名为`Authorize`的中间件处理函数，用于通过 JWT 授权 HTTP 请求。在 RESTful\
  \ API 应用中，无需在所有路由上使用授权中间件；当访问`User – Register and Login`资源时，不应调用此中间件函数。身份验证中间件函数应用于`Task`和`TaskNote`实体。在此，`Task`实体的资源映射到\
  \ URI`\"/tasks\"`，因此需要添加授权中间件来处理`\"/tasks\"`URL 路径。`Negroni`包允许您为特定 URL 路径的路由添加中间件。\n\
  \n清单 9-3 展示了为`Tasks`资源指定的路由。\n\n**清单 9-3.** `task.go`中任务资源的路由\n\n```go\npackage\
  \ routers\n\nimport (\n    \"github.com/codegangsta/negroni\"\n    \"github.com/gorilla/mux\"\
  \n    \"github.com/shijuvar/go-web/taskmanager/common\"\n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\
  \n)\n\nfunc SetTaskRoutes(router *mux.Router) *mux.Router {\n    taskRouter := mux.NewRouter()\n\
  \    taskRouter.HandleFunc(\"/tasks\", controllers.CreateTask).Methods(\"POST\"\
  )\n    taskRouter.HandleFunc(\"/tasks/{id}\", controllers.UpdateTask).Methods(\"\
  PUT\")\n    taskRouter.HandleFunc(\"/tasks\", controllers.GetTasks).Methods(\"GET\"\
  )\n    taskRouter.HandleFunc(\"/tasks/{id}\", controllers.GetTaskById).Methods(\"\
  GET\")\n    taskRouter.HandleFunc(\"/tasks/users/{id}\", controllers.GetTasksByUser).Methods(\"\
  GET\")\n    taskRouter.HandleFunc(\"/tasks/{id}\", controllers.DeleteTask).Methods(\"\
  DELETE\")\n    router.PathPrefix(\"/tasks\").Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n\
  \        negroni.Wrap(taskRouter),\n    ))\n    return router\n}\n```\n\n##### 添加路由特定中间件\n\
  \n您可以向路由路径`\"/tasks\"`添加授权中间件，以限制只有经过身份验证的用户才能访问。在`SetTaskRoutes`函数中，创建了一个新的`mux\
  \ router`路由器实例，指定了`\"/tasks\"`资源的路由，并将授权中间件包装到路由路径`\"/tasks\"`的处理函数中：\n\n```go\n\
  router.PathPrefix(\"/tasks\").Handler(negroni.New(\n    negroni.HandlerFunc(common.Authorize),\n\
  \    negroni.Wrap(taskRouter),\n))\n```\n\n###### TaskNote 资源的路由\n\n`TaskNote`实体映射到\
  \ URI`\"/notes\"`。与`\"/tasks\"`资源类似，需要为`\"/notes\"`资源添加授权中间件。\n\n清单 9-4 展示了为`TaskNote`资源指定的路由。\n\
  \n**清单 9-4.** `note.go`中 TaskNote 资源的路由\n\n```go\npackage routers\n\nimport (\n\
  \    \"github.com/codegangsta/negroni\"\n    \"github.com/gorilla/mux\"\n    \"\
  github.com/shijuvar/go-web/taskmanager/common\"\n    \"github.com/shijuvar/go-web/taskmanager/controllers\"\
  \n)\n\nfunc SetNoteRoutes(router *mux.Router) *mux.Router {\n    noteRouter := mux.NewRouter()\n\
  \    noteRouter.HandleFunc(\"/notes\", controllers.CreateNote).Methods(\"POST\"\
  )\n    noteRouter.HandleFunc(\"/notes/{id}\", controllers.UpdateNote).Methods(\"\
  PUT\")\n    noteRouter.HandleFunc(\"/notes/{id}\", controllers.GetNoteById).Methods(\"\
  GET\")\n    noteRouter.HandleFunc(\"/notes\", controllers.GetNotes).Methods(\"GET\"\
  )\n    noteRouter.HandleFunc(\"/notes/tasks/{id}\", controllers.GetNotesByTask).Methods(\"\
  GET\")\n    noteRouter.HandleFunc(\"/notes/{id}\", controllers.DeleteNote).Methods(\"\
  DELETE\")\n    router.PathPrefix(\"/notes\").Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n\
  \        negroni.Wrap(noteRouter),\n    ))\n    return router\n}\n```\n\n######\
  \ 初始化 RESTful API 的路由\n\n现在已为 RESTful API 应用指定了所有路由。我们来编写代码，初始化前面步骤中指定的所有路由。\n\n\
  清单 9-5 初始化了 RESTful API 的所有路由。\n\n**清单 9-5.** 在`router.go`中初始化路由\n\n```go\npackage\
  \ routers\n\nimport (\n    \"github.com/gorilla/mux\"\n)\n\nfunc InitRoutes() *mux.Router\
  \ {\n    router := mux.NewRouter().StrictSlash(false)\n    // Routes for the User\
  \ entity\n    router = SetUserRoutes(router)\n    // Routes for the Task entity\n\
  \    router = SetTaskRoutes(router)\n    // Routes for the TaskNote entity\n   \
  \ router = SetNoteRoutes(router)\n    return router\n}\n```\n\n当 HTTP 服务器启动时，会调用`main.go`中的`InitRoutes`函数，本章稍后将讨论这一点。\n\
  \n##### 设置 RESTful API 应用\n\nRESTful API 应用的资源建模已完成。本节重点介绍如何设置应用，并在执行一些必要的初始化逻辑后启动\
  \ HTTP 服务器。\n\n在启动 HTTP 服务器之前，请执行以下步骤：\n\n- 通过从`config.json`读取配置值，初始化`common`包的`AppConfig`标识符。`AppConfig`标识符提供配置值，例如\
  \ HTTP 服务器和 MongoDB 的主机 URI、MongoDB 数据库名称以及访问 MongoDB 数据库的身份验证凭据。\n- 初始化用于签署 JWT\
  \ 和验证令牌的非对称加密密钥。\n- 使用`mgo`包创建 MongoDB `Session`对象。\n- 向 MongoDB 集合添加索引。\n\n这些是在启动\
  \ HTTP 服务器之前调用的一次性活动。这些功能在`common`包中实现。我们来看看`common`包中实现的自举逻辑（将在以下各节中讨论）。\n\n图 9-4\
  \ 展示了`common`包中包含的源文件。\n\n![A978-1-4842-1052-9_9_Fig4_HTML.jpg](img/A978-1-4842-1052-9_9_Fig4_HTML.jpg)\n\
  \n**图 9-4.** common 包的源文件\n\n\n###### 初始化配置值\n\n配置值存放于名为 `config.json` 的文件中，该文件存储了诸如\
  \ HTTP 服务器和 MongoDB 服务器的主机 URI、连接 MongoDB 的身份验证凭据等值。这样有助于避免在应用中使用硬编码字符串。`config.json`\
  \ 文件被读取后，会将 JSON 值解码到变量 `AppConfig` 中。配置值从此包变量中读取，用于启动 HTTP 服务器和连接 MongoDB 数据库。\n\
  \n清单 9-6 将 `config.json` 中的 JSON 字符串解码，并将值放入 `AppConfig` 中。\n\n**清单 9-6.**  在 `utils.go`\
  \ 中初始化 `AppConfig`\n\n```go\npackage common\n\nimport (\n        \"encoding/json\"\
  \n        \"log\"\n        \"os\"\n)\n\ntype configuration struct {\n        Server,\
  \ MongoDBHost, DBUser, DBPwd, Database string\n}\n\n// AppConfig 保存来自 config.json\
  \ 文件的配置值\nvar AppConfig configuration\n\n// Initialize AppConfig\nfunc initConfig()\
  \ {\n        loadAppConfig()\n}\n\n// 读取 config.json 并解码到 AppConfig 中\nfunc loadAppConfig()\
  \ {\n        file, err := os.Open(\"common/config.json\")\n        defer file.Close()\n\
  \        if err != nil {\n                log.Fatalf(\"[loadConfig]: %s\\n\", err)\n\
  \        }\n\n        decoder := json.NewDecoder(file)\n        AppConfig = configuration{}\n\
  \        err = decoder.Decode(&AppConfig)\n        if err != nil {\n           \
  \     log.Fatalf(\"[loadAppConfig]: %s\\n\", err)\n        }\n}\n```\n\n###### 加载私钥/公钥\
  \ RSA 密钥\n\nRSA 密钥被加载到两个变量中，用于表示私钥和公钥，这些密钥用于应用的授权基础设施。私钥/公钥用于生成 JWT 和验证 HTTP 请求中的令牌，以授权对应用受保护资源的访问。私钥/公钥在\
  \ HTTP 服务器启动前被加载到两个变量中，以便它们可以用于登录处理程序以及授权中间件中对 HTTP 请求的授权。\n\n使用命令行工具 `OpenSSL`\
  \ 生成密钥。要生成私钥，请在命令行窗口中运行以下命令：\n\n```\nopenssl genrsa -out app.rsa 1024\n```\n\n此命令生成一个名为\
  \ `app.rsa` 的 1024 位密钥。要为私钥生成对应的公钥，请在命令行窗口中运行以下命令：\n\n```\nopenssl rsa -in app.rsa\
  \ -pubout > app.rsa.pub\n```\n\n此代码生成一个名为 `app.rsa.pub` 的对应公钥。RSA 密钥存储在 `keys` 目录中。\n\
  \n清单 9-7 从 `keys` 文件夹加载私钥/公钥 RSA 密钥，并将它们存储到两个变量中。\n\n**清单 9-7.**  在 `auth.go` 中初始化私钥/公钥\n\
  \n```go\npackage common\n\nimport (\n        \"io/ioutil\"\n)\n\n// 使用非对称加密 RSA\
  \ 密钥\nconst (\n    // openssl genrsa -out app.rsa 1024\n    privKeyPath = \"keys/app.rsa\"\
  \n    // openssl rsa -in app.rsa -pubout > app.rsa.pub\n    pubKeyPath  = \"keys/app.rsa.pub\"\
  \n)\n\n// 用于签名的私钥和用于验证的公钥\nvar (\n    verifyKey, signKey []byte\n)\n\n// 在启动 HTTP\
  \ 处理程序之前读取密钥文件\nfunc initKeys() {\n        var err error\n        signKey, err =\
  \ ioutil.ReadFile(privKeyPath)\n        if err != nil {\n                log.Fatalf(\"\
  [initKeys]: %s\\n\", err)\n        }\n\n        verifyKey, err = ioutil.ReadFile(pubKeyPath)\n\
  \        if err != nil {\n                log.Fatalf(\"[initKeys]: %s\\n\", err)\n\
  \                panic(err)\n        }\n}\n```\n\n私钥用于签署 JWT；公钥用于验证 HTTP 请求中的 JWT，以访问\
  \ RESTful API 的资源。你可以使用 `OpenSSL` 工具生成 RSA 密钥。\n\n###### 创建 MongoDB 会话对象\n\nMongoDB\
  \ `Session` 对象在 HTTP 服务器启动前创建。`mongoUtils.go` 中的 `createDbSession` 函数通过调用 `mgo`\
  \ 包的 `DialWithInfo` 函数来创建一个 `mgo.Session` 对象。`DialWithInfo` 函数会建立一个到由 `DialInfo`\
  \ 类型实例提供的 MongoDB 服务器集群的新 `Session`。MongoDB 的 URI 从 `AppConfig` 变量中读取。`Session`\
  \ 对象将通过 `GetSession` 函数访问。每当执行 CRUD 操作时，都会调用 `GetSession` 函数，并且 `Session` 对象会使用\
  \ `mgo.Session` 的 `Copy` 方法进行复制。一个复制的 `Session` 对象将用于所有 CRUD 操作。\n\n清单 9-8 提供了 `createDbSession`\
  \ 和 `GetSession` 的实现，以便与 `Session` 对象一起使用。\n\n**清单 9-8.**  `mongoUtils.go` 中的 MongoDB\
  \ 会话\n\n```go\npackage common\n\nimport (\n    \"gopkg.in/mgo.v2\"\n)\n\nvar session\
  \ *mgo.Session\n\nfunc GetSession() *mgo.Session {\n        if session == nil {\n\
  \                var err error\n                session, err = mgo.DialWithInfo(&mgo.DialInfo{\n\
  \                        Addrs:    []string{AppConfig.MongoDBHost},\n          \
  \              Username: AppConfig.DBUser,\n                        Password: AppConfig.DBPwd,\n\
  \                        Timeout:  60 * time.Second,\n                })\n     \
  \           if err != nil {\n                        log.Fatalf(\"[GetSession]:\
  \ %s\\n\", err)\n                }\n        }\n        return session\n}\n\nfunc\
  \ createDbSession() {\n        var err error\n        session, err = mgo.DialWithInfo(&mgo.DialInfo{\n\
  \                Addrs:    []string{AppConfig.MongoDBHost},\n                Username:\
  \ AppConfig.DBUser,\n                Password: AppConfig.DBPwd,\n              \
  \  Timeout:  60 * time.Second,\n        })\n        if err != nil {\n          \
  \      log.Fatalf(\"[createDbSession]: %s\\n\", err)\n        }\n}\n```\n\n######\
  \ 向 MongoDB 添加索引\n\n索引可以提高在 MongoDB 中执行查询的性能。由于 `User` 集合经常使用 `email` 字段进行查询，`Task`\
  \ 集合使用 `createdby` 字段，而 `TaskNote` 集合使用 `taskid` 字段，因此为这些字段添加了索引。`addIndexes` 函数将索引添加到\
  \ MongoDB 集合中。\n\n清单 9-9 在 MongoDB 中添加索引。\n\n**清单 9-9.**  在 `mongoUtils.go` 中向 MongoDB\
  \ 添加索引\n\n```go\n// 向 MongoDB 添加索引\nfunc addIndexes() {\n    var err error\n   \
  \ userIndex := mgo.Index{\n        Key:        []string{\"email\"},\n        Unique:\
  \     true,\n        Background: true,\n        Sparse:     true,\n    }\n    taskIndex\
  \ := mgo.Index{\n        Key:        []string{\"createdby\"},\n        Unique: \
  \    false,\n        Background: true,\n        Sparse:     true,\n    }\n    noteIndex\
  \ := mgo.Index{\n        Key:        []string{\"taskid\"},\n        Unique:    \
  \ false,\n        Background: true,\n        Sparse:     true,\n    }\n\n    //\
  \ 向 MongoDB 添加索引\n    session := GetSession().Copy()\n    defer session.Close()\n\
  \n    userCol := session.DB(AppConfig.Database).C(\"users\")\n    taskCol := session.DB(AppConfig.Database).C(\"\
  tasks\")\n    noteCol := session.DB(AppConfig.Database).C(\"notes\")\n\n    err\
  \ = userCol.EnsureIndex(userIndex)\n    if err != nil {\n        log.Fatalf(\"[addIndexes]:\
  \ %s\\n\", err)\n    }\n\n    err = taskCol.EnsureIndex(taskIndex)\n    if err !=\
  \ nil {\n        log.Fatalf(\"[addIndexes]: %s\\n\", err)\n    }\n\n    err = noteCol.EnsureIndex(noteIndex)\n\
  \    if err != nil {\n        log.Fatalf(\"[addIndexes]: %s\\n\", err)\n    }\n\
  }\n```\n\n\n\n##### `common` 包中的初始化逻辑\n\n`common` 包中的 `bootstrapper.go` 源文件提供了一个\
  \ `StartUp()` 函数，用于在 HTTP 服务器启动前调用必要的初始化逻辑。`main.go` 会调用 `common` 包中的 `StartUp()`\
  \ 函数。\n\n清单 9-10 给出了 `StartUp()` 函数的实现，该函数会在运行 HTTP 服务器之前调用所需的初始化逻辑。\n\n**清单 9-10.**\
  \ `bootstrapper.go` 中的 `StartUp()` 函数\n\n```go\npackage common\n\nfunc StartUp()\
  \ {\n    // 初始化 AppConfig 变量\n    initConfig()\n    // 初始化用于 JWT 认证的私钥/公钥\n    initKeys()\n\
  \    // 启动一个 MongoDB 会话\n    createDbSession()\n    // 向 MongoDB 添加索引\n    addIndexes()\n\
  }\n```\n\n##### 启动 HTTP 服务器\n\nHTTP 服务器在 `main.go` 中创建。\n\n清单 9-11 给出了 `main.go`\
  \ 的实现。\n\n**清单 9-11.** `main.go` 中的程序入口点\n\n```go\npackage main\n\nimport (\n  \
  \  \"log\"\n    \"net/http\"\n    \"github.com/codegangsta/negroni\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
  \n    \"github.com/shijuvar/go-web/taskmanager/routers\"\n)\n\n// 程序入口点\nfunc main()\
  \ {\n    // 调用启动逻辑\n    common.StartUp()\n    // 获取 mux 路由器对象\n    router := routers.InitRoutes()\n\
  \    // 创建一个 negroni 实例\n    n := negroni.Classic()\n    n.UseHandler(router)\n\
  \    server := &http.Server{\n        Addr:    common.AppConfig.Server,\n      \
  \  Handler: n,\n    }\n    log.Println(\"正在监听...\")\n    server.ListenAndServe()\n\
  }\n```\n\nHTTP 服务器在 `main.go` 中创建，其中调用了 `common` 包的 `StartUp()` 函数来执行 RESTful API\
  \ 应用的初始化逻辑。接着调用 `routers` 包的 `InitRoutes()` 函数来获取 `*mux.Router`，用于创建 `Negroni` 处理器。通过提供\
  \ `Negroni` 处理器来创建 `http.Server` 对象，最后启动 HTTP 服务器。HTTP 服务器的主机 URI 从 `common.AppConfig`\
  \ 中读取。\n\n### 认证\n\n以下是应用中定义的认证工作流程：\n\n- 用户通过向资源 `\"/users/register\"` 发送 HTTP\
  \ 请求来注册到系统。\n- 已注册用户可以通过向资源 `\"/users/login\"` 发送 HTTP 请求来登录系统。\n- 服务器验证登录凭证，并生成一个\
  \ JWT 作为访问令牌，用于访问 RESTful API 服务器的受保护资源。\n- 用户可以使用该 JWT 来访问 RESTful API 的受保护资源。用户必须将此令牌作为\
  \ Bearer 令牌，通过 HTTP 头 `\"Authorization\"` 发送。\n\n认证工作流程将在后续章节中更详细地描述。\n\n#### 生成和验证\
  \ JWT\n\nJWT 用于授权 HTTP 请求以访问 RESTful API 资源。第三方包 `jwt-go` 用于处理 JWT（参见第 7 章）。`common`\
  \ 包中的 `auth.go` 源文件提供了生成 JWT 以及使用中间件处理函数验证令牌的功能。第三方包 `jwt-go` 用于生成和验证 JWT，并使用私钥对\
  \ JWT 进行签名。如果登录用户在系统中成功通过身份验证，将在处理请求 `\"/users/login\"` 的应用处理函数中调用它。\n\n清单 9-12\
  \ 展示了在 HTTP 中间件处理函数中生成和验证 JWT 的辅助函数。\n\n**清单 9-12.** `auth.go` 中用于 JWT 认证的辅助函数\n\
  \n```go\npackage common\n\nimport (\n    \"io/ioutil\"\n    \"log\"\n    \"net/http\"\
  \n    \"time\"\n    jwt \"github.com/dgrijalva/jwt-go\"\n)\n\n// 使用非对称加密/RSA 密钥\n\
  // 私钥/公钥文件位置\nconst (\n    // openssl genrsa -out app.rsa 1024\n    privKeyPath\
  \ = \"keys/app.rsa\"\n    // openssl rsa -in app.rsa -pubout > app.rsa.pub\n   \
  \ pubKeyPath  = \"keys/app.rsa.pub\"\n)\n\n// 用于签名的私钥和用于验证的公钥\nvar (\n    verifyKey,\
  \ signKey []byte\n)\n\n// 在启动 http 处理函数之前读取密钥文件\nfunc initKeys() {\n    var err\
  \ error\n    signKey, err = ioutil.ReadFile(privKeyPath)\n    if err != nil {\n\
  \        log.Fatalf(\"[initKeys]: %s\\n\", err)\n    }\n    verifyKey, err = ioutil.ReadFile(pubKeyPath)\n\
  \    if err != nil {\n        log.Fatalf(\"[initKeys]: %s\\n\", err)\n        panic(err)\n\
  \    }\n}\n\n// 生成 JWT 令牌\nfunc GenerateJWT(name, role string) (string, error) {\n\
  \    // 为 rsa 256 创建一个签名器\n    t := jwt.New(jwt.GetSigningMethod(\"RS256\"))\n \
  \   // 设置 JWT 令牌的声明（claims）\n    t.Claims[\"iss\"] = \"admin\"\n    t.Claims[\"\
  UserInfo\"] = struct {\n        Name string\n        Role string\n    }{name, role}\n\
  \    // 设置 JWT 令牌的过期时间\n    t.Claims[\"exp\"] = time.Now().Add(time.Minute * 20).Unix()\n\
  \    tokenString, err := t.SignedString(signKey)\n    if err != nil {\n        return\
  \ \"\", err\n    }\n    return tokenString, nil\n}\n\n// 用于验证 JWT 令牌的中间件\nfunc Authorize(w\
  \ http.ResponseWriter, r *http.Request, next http.HandlerFunc) {\n    // 验证令牌\n\
  \    token, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{},\
  \ error) {\n        // 使用公钥验证令牌，公钥是私钥的对应部分\n        return verifyKey, nil\n    })\n\
  \    if err != nil {\n        switch err.(type) {\n        case *jwt.ValidationError:\
  \ // JWT 验证错误\n            vErr := err.(*jwt.ValidationError)\n            switch\
  \ vErr.Errors {\n            case jwt.ValidationErrorExpired: // JWT 已过期\n     \
  \           DisplayAppError(\n                    w,\n                    err,\n\
  \                    \"访问令牌已过期，请获取新令牌\",\n                    401,\n           \
  \     )\n                return\n            default:\n                DisplayAppError(w,\n\
  \                    err,\n                    \"解析访问令牌时出错！\",\n               \
  \     500,\n                )\n                return\n            }\n        default:\n\
  \            DisplayAppError(w,\n                err,\n                \"解析访问令牌时出错！\"\
  ,\n                500)\n            return\n        }\n    }\n    if token.Valid\
  \ {\n        next(w, r)\n    } else {\n        DisplayAppError(w,\n            err,\n\
  \            \"无效的访问令牌\",\n            401,\n        )\n    }\n}\n```\n\n##### 生成\
  \ JWT\n\n`GenerateJWT()` 函数使用私钥生成 JWT。在 JWT 上设置了各种声明（claims），包括令牌的过期信息。`go-jwt`\
  \ 包用于对编码后的安全令牌进行签名。当登录过程成功时，在处理请求 `\"/users/login\"` 的应用处理函数中会调用 `GenerateJWT()`\
  \ 函数。\n\n当用户登录系统时，服务器会返回一个如下的 JSON 响应：\n\n```json\n{\"data\":\n    {\"user\":{\"\
  id\":\"55b9f7e13f06221910000001\",\"firstname\":\"Shiju\",\"lastname\":\"Varghese\"\
  ,\"email\":\"shijuvar@gmail.com\"},\n    \"token\":\"eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.eyJVc2VySW5mbyI6eyJOYW1lIjoic2hpanVAZ21haWwuY29tIiwiUm9sZSI6Im1lbWJlciJ9LCJleHAiOjE0MzgyNTI5MzgsImlzcyI6ImFkbWluIn0.WtdM55KE0cNlj5c2VYwtIUQS8L6UI_ViLiwe0wH_0cpDj0dKkMTMtZ6LSHoIxtZyt92z19WX5gQCi3z-7Mly4kPe5Yvp3IXuDNdgJvBkQvEd_xg0-Vx9bhm_ztf0Hb2CInsVgux49EIxgjFoinwdzrxmM9ZbY7msBYSKutcRKLU\"\
  }\n}\n```\n\n用户可以从这个 JSON 响应中获取 JSON 字段 `\"token\"` 中的 JWT，该令牌可用于授权 HTTP 请求以访问 RESTful\
  \ API 的受保护资源。\n\nJWT 由三部分组成，用 `.`（句点）分隔：\n- `头部（Header）`\n- `载荷（Payload）`\n- `签名（Signature）`\n\
  \nJWT 是一种基于 JSON 的安全编码，可以解码以获取这些部分的 JSON 表示。\n\n图 9-5 显示了`头部`和`载荷`部分的解码表示。\n\n![A978-1-4842-1052-9_9_Fig5_HTML.jpg](img/A978-1-4842-1052-9_9_Fig5_HTML.jpg)\n\
  \n**图 9-5.** 解码后的 JWT JSON 表示\n\n`头部`部分包含生成令牌所使用的算法（这里是 RS256）以及类型（JWT）。`载荷`部分携带\
  \ JWT 的声明（claims），您可以在其中提供用户信息、过期时间以及其他关于 JWT 的信息。\n\n\n\n##### 向服务器发送 JWT\n\n当用户成功登录系统后，他们会提供一个\
  \ JWT 作为访问令牌，用于授权后续对 API 服务器的 HTTP 请求。因此，每当发送 HTTP 请求访问受保护资源时，必须在 HTTP 请求中携带 JWT\
  \ 才能获得 API 服务器的授权。登录流程成功完成后，返回的令牌字符串可以存入任意类型的客户端存储中，以便在发送 HTTP 请求访问 RESTful API\
  \ 资源时轻松获取。\n\n在前端 Web 应用中，你可以使用 HTML5 Web 存储（`localStorage/sessionStorage`）或 Web\
  \ Cookie 来持久化存储 JWT。但将 JWT 存入各种客户端应用存储时，需要考虑安全性问题。\n\n当发送 HTTP 请求访问 RESTful API\
  \ 资源时，必须在 HTTP 请求头`\"Authorization\"`中提供 Bearer 令牌。\n\n以下是通过`\"Authorization\"`请求头发送\
  \ JWT 字符串的格式：\n\n`\"Authorization\": \"Bearer token_string\"\"\n\n下面是一个示例，演示如何通过`\"\
  Authorization\"`请求头将 JWT 作为 Bearer 令牌提供：\n\n`\"Authorization\":\"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWV9.TJVA95OrM7E2cBab30RMHrHDcEfxjoYZgeFONFh7HgQ\"\
  `\n\n##### 授权 JWT\n\n`Authorize`中间件处理函数负责授权 HTTP 请求，它会验证 HTTP 请求的`\"Authorization\"\
  `请求头中是否包含有效的 JWT 作为 Bearer 令牌。`go-jwt`包的`ParseFromRequest`辅助函数用于使用公钥验证令牌。在本应用中，使用一个私钥对令牌进行签名，因此其对应的公钥也用于验证令牌：\n\
  \n```\ntoken, err := jwt.ParseFromRequest(r, func(token *jwt.Token) (interface{},\
  \ error) {\n    return verifyKey, nil\n})\n```\n\n如果请求包含有效的令牌，中间件函数会调用中间件堆栈中的下一个处理函数。如果令牌无效，则会调用`DisplayAppError`辅助函数，以\
  \ JSON 格式显示 HTTP 错误。调用`DisplayAppError`函数时，会为错误提供自定义错误消息和 HTTP 状态码。HTTP 状态码 401\
  \ 表示 HTTP 状态`\"Unauthorized\"`：\n\n```\nif token.Valid {\n    next(w, r)\n} else\
  \ {\n    w.WriteHeader(http.StatusUnauthorized)\n    DisplayAppError(\n        w,\n\
  \        err,\n        \"Invalid Access Token\",\n        401,\n    )\n}\n```\n\n\
  当调用`next(w, r)`时，它会调用下一个处理函数。使用`Negroni`包来组织中间件堆栈，其签名格式为`func (http.ResponseWriter,\
  \ *http.Request, http.HandlerFunc)`，用于编写与`Negroni`配合使用的中间件处理函数。所有对 URL 路径`\"/tasks\"\
  `和`\"/notes\"`的 HTTP 请求都必须通过有效的访问令牌进行授权。因此，`Authorize`中间件函数被添加到`Negroni`中间件堆栈中。\n\
  \n以下是`routers`包中`task.go`文件里的代码块，用于向`\"/tasks\"`路径添加身份验证中间件函数：\n\n```\nfunc SetTaskRoutes(router\
  \ *mux.Router) *mux.Router {\n    taskRouter := mux.NewRouter()\n    taskRouter.HandleFunc(\"\
  /tasks\", controllers.CreateTask).Methods(\"POST\")\n    taskRouter.HandleFunc(\"\
  /tasks/{id}\", controllers.UpdateTask).Methods(\"PUT\")\n    taskRouter.HandleFunc(\"\
  /tasks\", controllers.GetTasks).Methods(\"GET\")\n    taskRouter.HandleFunc(\"/tasks/{id}\"\
  , controllers.GetTaskById).Methods(\"GET\")\n    taskRouter.HandleFunc(\"/tasks/users/{id}\"\
  , controllers.GetTasksByUser).Methods(\"GET\")\n    taskRouter.HandleFunc(\"/tasks/{id}\"\
  , controllers.DeleteTask).Methods(\"DELETE\")\n    router.PathPrefix(\"/tasks\"\
  ).Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n       \
  \ negroni.Wrap(taskRouter),\n    ))\n    return router\n}\n```\n\n你可以通过`router`实例的`PathPrefix`函数，向特定路由添加中间件函数。\n\
  \n以下是`routers`包中`note.go`文件里的代码块，用于向`\"/notes\"`路径添加身份验证中间件函数：\n\n```\nfunc SetNoteRoutes(router\
  \ *mux.Router) *mux.Router {\n    noteRouter := mux.NewRouter()\n    noteRouter.HandleFunc(\"\
  /notes\", controllers.CreateNote).Methods(\"POST\")\n    noteRouter.HandleFunc(\"\
  /notes/{id}\", controllers.UpdateNote).Methods(\"PUT\")\n    noteRouter.HandleFunc(\"\
  /notes/{id}\", controllers.GetNoteById).Methods(\"GET\")\n    noteRouter.HandleFunc(\"\
  /notes\", controllers.GetNotes).Methods(\"GET\")\n    noteRouter.HandleFunc(\"/notes/tasks/{id}\"\
  , controllers.GetNotesByTask).Methods(\"GET\")\n    noteRouter.HandleFunc(\"/notes/{id}\"\
  , controllers.DeleteNote).Methods(\"DELETE\")\n    router.PathPrefix(\"/notes\"\
  ).Handler(negroni.New(\n        negroni.HandlerFunc(common.Authorize),\n       \
  \ negroni.Wrap(noteRouter),\n    ))\n    return router\n}\n```\n\n中间件函数非常适合在应用程序处理程序之间实现共享功能。中间件函数也可以应用于特定路由，就像对\
  \ URL 路径`\"/tasks\"`和`\"/notes\"`做的那样。\n\n#### 应用程序处理程序\n\n前面章节介绍了应用程序数据模型、RESTful\
  \ API 资源建模及其与应用程序 HTTP 路由的映射、使用基本初始化逻辑设置 HTTP 服务器，以及 RESTful API 的身份验证。现在，让我们来看看为每个路由处理\
  \ HTTP 请求的应用程序处理程序。\n\n应用程序处理程序组织在`controllers`包中。图 9-6 显示了`controllers`包中包含的源文件。\n\
  \n![A978-1-4842-1052-9_9_Fig6_HTML.jpg](img/A978-1-4842-1052-9_9_Fig6_HTML.jpg)\n\
  \n**图 9-6.** `controllers`包的源文件\n\n\n\n##### 用于显示 HTTP 错误的辅助函数\n\nGo 语言中的错误处理与大多数主流编程语言不同，因为它提供了一种简单且极简的方法来处理异常，即使用内置的`error`类型。`error`类型的值用于指示应用程序中的异常状态。当你查看标准库包时，会发现大多数函数都返回多个值，其中包括一个`error`类型的值，用于指示异常状态。\n\
  \n你可以检查`error`类型的值，以查看函数执行期间是否发生了任何异常：\n\n```\nfile, err := os.Open(\"common/config.json\"\
  )\nif err != nil {\n    log.Fatalf(\"[loadConfig]: %s\\n\", err)\n}\n```\n\n如果错误变量包含任何值，则会调用`log`包的`Fatalf`函数。`Fatalf`函数在写入日志消息后终止程序。在\
  \ RESTful API 应用程序的 HTTP 处理程序中，程序不会因任何类型的异常状态而终止。相反，会以 JSON 响应作为 HTTP 响应返回，并附带适当的\
  \ HTTP 状态码。在`common`包中编写了一个辅助函数，用于以 JSON 格式显示 HTTP 错误，以便客户端应用程序能够理解其 HTTP 请求中的任何问题。\n\
  \n清单 9-13 提供了一个辅助函数，用于以 JSON 格式显示 HTTP 错误，该函数在错误响应中包含适当的 HTTP 状态码。\n\n**清单 9-13.**\
  \ `utils.go` 中用于显示错误的辅助函数\n\n```\npackage common\n\nimport (\n    \"encoding/json\"\
  \n    \"log\"\n    \"net/http\"\n)\n\ntype (\n    appError struct {\n        Error\
  \      string `json:\"error\"`\n        Message    string `json:\"message\"`\n \
  \       HttpStatus int    `json:\"status\"`\n    }\n    errorResource struct {\n\
  \        Data appError `json:\"data\"`\n    }\n)\n\nfunc DisplayAppError(w http.ResponseWriter,\
  \ handlerError error, message string, code int) {\n    errObj := appError{\n   \
  \     Error:      handlerError.Error(),\n        Message:    message,\n        HttpStatus:\
  \ code,\n    }\n    log.Printf(\"AppError]: %s\\n\", handlerError)\n    w.Header().Set(\"\
  Content-Type\", \"application/json; charset=utf-8\")\n    w.WriteHeader(code)\n\
  \    if j, err := json.Marshal(errorResource{Data: errObj}); err == nil {\n    \
  \    w.Write(j)\n    }\n}\n```\n\n编写了一个名为 `DisplayAppError` 的辅助函数，用于以 JSON 格式提供错误消息作为\
  \ HTTP 响应。客户端应用程序可以检查 HTTP 状态码，以验证 HTTP 请求是否成功。使用名为 `appError` 的结构体类型创建用于提供错误消息的模型对象。在\
  \ `appError` 类型中，`Error` 属性用于保存错误对象的字符串值，`Message` 属性用于保存关于错误的自定义消息，`HttpStatus`\
  \ 属性用于保存 HTTP 状态码。通过提供 `appError` 的值来创建 `errorResource` 类型的实例，以将响应编码为 JSON。\n\n\
  图 9-7 展示了一个包含过期访问令牌的无效 HTTP 请求的错误响应。\n\n![A978-1-4842-1052-9_9_Fig7_HTML.jpg](img/A978-1-4842-1052-9_9_Fig7_HTML.jpg)\n\
  \n**图 9-7.** 用于 JSON 错误消息的 HTTP 响应\n\n`DisplayAppError` 函数是一个简单的辅助函数，用于提供 HTTP 错误。你也可以在\
  \ HTTP 中间件中编写错误处理逻辑，该逻辑可用于包装应用程序处理程序，这是在 Go Web 应用程序中实现错误处理的更优雅方法。如果在应用程序处理程序中发生任何错误，你可以返回一个用于保存错误数据的模型对象，并且在中间件函数中，你可以检查错误模型是否包含任何值。如果发生错误，你还可以提供\
  \ HTTP 错误响应。本章不讨论这种方法，但你可以在构建自己的 Web 应用程序时尝试使用。\n\n##### 处理 HTTP 请求生命周期中的数据\n\n\
  让我们定义一个用于在 HTTP 请求生命周期内处理数据的类型。这里定义了一个`Context`结构体类型，将 MongoDB 的`Session`对象作为其属性，并暴露了`DbCollection`方法用于获取\
  \ MongoDB 的`Collection`对象，以及`Close`方法用于关闭 MongoDB 的`Session`对象。\n\n清单 9-14 提供了`Context`结构体类型的代码块，该类型将与\
  \ HTTP 处理函数一起使用，以在 HTTP 请求生命周期内保存数据。\n\n**清单 9-14.** `context.go` 中的 `Context` 结构体\n\
  \n```\npackage controllers\n\nimport (\n    \"gopkg.in/mgo.v2\"\n    \"github.com/shijuvar/go-web/taskmanager/common\"\
  \n)\n\n// Struct used for maintaining HTTP Request Context\ntype Context struct\
  \ {\n    MongoSession *mgo.Session\n}\n\n// Close mgo.Session\nfunc (c *Context)\
  \ Close() {\n    c.MongoSession.Close()\n}\n\n// Returns mgo.collection for the\
  \ given name\nfunc (c *Context) DbCollection(name string) *mgo.Collection {\n  \
  \  return c.MongoSession.DB(common.AppConfig.Database).C(name)\n}\n\n// Create a\
  \ new Context object for each HTTP request\nfunc NewContext() *Context {\n    session\
  \ := common.GetSession().Copy()\n    context := &Context{\n        MongoSession:\
  \ session,\n    }\n    return context\n}\n```\n\n这个源文件提供了一个`NewContext`函数，该函数通过提供\
  \ MongoDB `Session`对象的副本，返回一个`Context`类型的实例。调用`common`包的`GetSession`函数来获取`Session`对象，并从中创建一个副本。在应用程序处理程序中，调用`NewContext`函数来获取`Context`类型的实例，该实例中的`Context`类型的\
  \ MongoDB `Session`对象用于对 MongoDB 数据库执行 CRUD 操作。\n\n在`Context`类型中，你只是存储了 MongoDB\
  \ 的`Session`对象，但你可以在`Context`类型中使用任何类型的数据，以便与 HTTP 请求的生命周期一起使用。在许多用例中，你可能需要在各种中间件处理函数和应用程序处理函数之间共享这些数据。简而言之，你需要在不同的处理函数之间共享数据。\n\
  \n在这种情况下，你可以使用一种机制来存储对象，以便在 HTTP 请求上下文中工作。来自 Gorilla Web 工具包（www.gorillatoolkit.org/pkg/context）的`context`包提供了将数据放入\
  \ HTTP `Context`对象的功能，以便在 HTTP 请求的生命周期内保存数据。你可以将一个处理程序中的数据放入 HTTP 上下文中，该数据可以被其他处理程序访问。在\
  \ RESTful API 示例中，你在应用程序处理程序中使用这些数据，并且不需要在处理程序之间共享数据。因此，你没有将`Context`结构体放入 HTTP\
  \ `Context`对象中。\n\n#### 用户资源的处理程序\n\n以下是为用户资源指定的路由：\n\n```\nrouter.HandleFunc(\"\
  /users/register\", controllers.Register).Methods(\"POST\")\nrouter.HandleFunc(\"\
  /users/login\", controllers.Login).Methods(\"POST\")\n```\n\n为用户资源指定了两条路由。资源`/users/register`用于将用户注册到系统中，`/users/login`用于登录系统以获取访问令牌，该令牌用于授权访问\
  \ RESTful API 资源的 HTTP 请求。\n\n\n\n##### JSON 资源模型\n\nRESTful API 是一种基于 JSON 的 API，客户端应用需要以\
  \ JSON 格式发送数据，服务器也同样以 JSON 格式返回响应。为了遵循 JSON API 标准（`http://jsonapi.org`），我们定义了资源模型，用于以格式化\
  \ JSON 发送和接收数据。`\"data\"` 被定义为所有 JSON 表示形式的根元素。\n\n列表 9-15 展示了将与 `Users` 资源配合使用的资源模型。\n\
  \n**列表 9-15.** 在 `resources.go` 中处理 `/users` 的 JSON 资源\n\n```\npackage controllers\n\
  \nimport (\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\n)\n\ntype (\n\t\
  //For Post - /user/register\n\tUserResource struct {\n\t\tData models.User `json:\"\
  data\"`\n\t}\n\n\t//For Post - /user/login\n\tLoginResource struct {\n\t\tData LoginModel\
  \ `json:\"data\"`\n\t}\n\n\t// Response for authorized user Post - /user/login\n\
  \tAuthUserResource struct {\n\t\tData AuthUserModel `json:\"data\"`\n\t}\n\n\t//Model\
  \ for authentication\n\tLoginModel struct {\n\t\tEmail    string `json:\"email\"\
  `\n\t\tPassword string `json:\"password\"`\n\t}\n\n\t//Model for authorized user\
  \ with access token\n\tAuthUserModel struct {\n\t\tUser  models.User `json:\"user\"\
  `\n\t\tToken string      `json:\"token\"`\n\t}\n)\n```\n\n##### 用户资源的处理函数\n\n`Users`\
  \ 资源的应用处理函数编写在 `userController.go` 源文件中，该文件归属于 `controllers` 包。\n\n列表 9-16 提供了 `Users`\
  \ 资源处理函数的实现。\n\n**列表 9-16.** `userController.go` 中的应用处理函数\n\n```\npackage controllers\n\
  \nimport (\n\t\"encoding/json\"\n\t\"net/http\"\n\t\"github.com/shijuvar/go-web/taskmanager/common\"\
  \n\t\"github.com/shijuvar/go-web/taskmanager/data\"\n\t\"github.com/shijuvar/go-web/taskmanager/models\"\
  \n)\n\n// Handler for HTTP Post - \"/users/register\"\n// Add a new User document\n\
  func Register(w http.ResponseWriter, r *http.Request) {\n\tvar dataResource UserResource\n\
  \t// Decode the incoming User json\n\terr := json.NewDecoder(r.Body).Decode(&dataResource)\n\
  \tif err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid\
  \ User data\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\tuser := &dataResource.Data\n\
  \tcontext := NewContext()\n\tdefer context.Close()\n\tc := context.DbCollection(\"\
  users\")\n\trepo := &data.UserRepository{c}\n\t// Insert User document\n\trepo.CreateUser(user)\n\
  \t// Clean-up the hashpassword to eliminate it from response\n\tuser.HashPassword\
  \ = nil\n\tif j, err := json.Marshal(UserResource{Data: *user}); err != nil {\n\t\
  \tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"An unexpected error has\
  \ occurred\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t} else {\n\t\tw.Header().Set(\"\
  Content-Type\", \"application/json\")\n\t\tw.WriteHeader(http.StatusCreated)\n\t\
  \tw.Write(j)\n\t}\n}\n\n// Handler for HTTP Post - \"/users/login\"\n// Authenticate\
  \ with username and apssword\nfunc Login(w http.ResponseWriter, r *http.Request)\
  \ {\n\tvar dataResource LoginResource\n\tvar token string\n\t// Decode the incoming\
  \ Login json\n\terr := json.NewDecoder(r.Body).Decode(&dataResource)\n\tif err !=\
  \ nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid Login\
  \ data\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\tloginModel := dataResource.Data\n\
  \tloginUser := models.User{\n\t\tEmail:    loginModel.Email,\n\t\tPassword: loginModel.Password,\n\
  \t}\n\tcontext := NewContext()\n\tdefer context.Close()\n\tc := context.DbCollection(\"\
  users\")\n\trepo := &data.UserRepository{c}\n\t// Authenticate the login user\n\t\
  if user, err := repo.Login(loginUser); err != nil {\n\t\tcommon.DisplayAppError(\n\
  \t\t\tw,\n\t\t\terr,\n\t\t\t\"Invalid login credentials\",\n\t\t\t401,\n\t\t)\n\t\
  \treturn\n\t} else { //if login is successful\n\t\t// Generate JWT token\n\t\ttoken,\
  \ err = common.GenerateJWT(user.Email, \"member\")\n\t\tif err != nil {\n\t\t\t\
  common.DisplayAppError(\n\t\t\t\tw,\n\t\t\t\terr,\n\t\t\t\t\"Eror while generating\
  \ the access token\",\n\t\t\t\t500,\n\t\t\t)\n\t\t\treturn\n\t\t}\n\t\tw.Header().Set(\"\
  Content-Type\", \"application/json\")\n\t\tuser.HashPassword = nil\n\t\tauthUser\
  \ := AuthUserModel{\n\t\t\tUser:  user,\n\t\t\tToken: token,\n\t\t}\n\t\tj, err\
  \ := json.Marshal(AuthUserResource{Data: authUser})\n\t\tif err != nil {\n```\n\n\
  \n\n##### 注册新用户\n\n要注册新用户，客户端应用程序应向 URI `\"/users/register\"` 发送 HTTP `Post` 请求。在\
  \ `Register` 处理函数中，传入的 JSON 字符串被解码为 `UserResource` 类型，并通过访问 `UserResource` 对象的 `Data`\
  \ 属性来创建 `models.User` 结构体的实例。\n\n`Context` 类型用于在应用程序处理函数中访问 MongoDB 的 `Session`\
  \ 对象（`mgo.Session`）。因此，通过调用 `DbCollection` 方法来创建 `Context` 类型的实例和 MongoDB 的 `Collection`\
  \ 对象（`mgo.Collection`）：\n\n```\ncontext := NewContext()\ndefer context.Close()\n\
  c := context.DbCollection(\"users\")\n```\n\n`Context` 类型的 `Close` 方法被添加到 `defer`\
  \ 函数中，以关闭 MongoDB 的 `Session` 对象，这是该 `Session` 对象的一个副本。在所有 HTTP 处理函数中，都会创建 MongoDB\
  \ `Session` 对象的一个副本，并在单个 HTTP 请求生命周期内使用同一个实例，最后通过 `defer` 函数释放资源。\n\n在 `Register`\
  \ 处理函数中，通过提供 MongoDB 的 `Collection` 对象来创建 `UserRepository` 的实例。`UserRepository`\
  \ 结构体的 `CreateUser` 方法用于将 `User` 对象持久化到 MongoDB 数据库中。所有数据持久化逻辑都编写在 `data` 包中：\n\n\
  ```\nrepo := &data.UserRepository{c}\n// Insert User document\nrepo.CreateUser(user)\n\
  ```\n\n`UserRepository` 提供了针对 `User` 实体的所有 CRUD 操作。（本章下一节将讨论此主题。）`Register` 处理函数将新创建的\
  \ `User` 实体的 JSON 表示形式作为响应发送回去。\n\n现在，让我们使用 RESTful API 客户端工具 `\"Postman\"`（[`www.getpostman.com/`](http://www.getpostman.com/)）来测试\
  \ `Users` 资源的功能。该工具允许你测试你的 API（对于测试 RESTful API 也非常有用）。\n\n图 9-8 展示了使用 RESTful API\
  \ 客户端工具 `\"Postman\"` 发送到 URI 端点 `\"users/register\"` 的 HTTP `Post` 请求。\n\n![A978-1-4842-1052-9_9_Fig8_HTML.jpg](img/A978-1-4842-1052-9_9_Fig8_HTML.jpg)\n\
  \n图 9-8. HTTP Post 到 “/users/register”\n\n图 9-9 展示了来自 RESTful API 服务器的响应，表明已创建新资源。\n\
  \n![A978-1-4842-1052-9_9_Fig9_HTML.jpg](img/A978-1-4842-1052-9_9_Fig9_HTML.jpg)\n\
  \n图 9-9. 来自 “/users/register” 的 HTTP 响应\n\n##### 登录系统\n\n客户端应用程序的用户必须获取 JWT 才能访问\
  \ RESTful API 的受保护资源。要获取令牌，用户必须使用用户名和密码登录系统。如果用户通过身份验证，服务器将发回一个可用于访问 RESTful API\
  \ 资源的 JWT。\n\n应用程序处理函数 `Login` 用于处理对登录资源的 HTTP 请求。如果登录成功，则调用 `common` 包的 `GenerateJWT`\
  \ 函数来生成 JWT。生成的 JWT 包含在 JSON 响应中：\n\n```go\nif user, err := repo.Login(loginUser);\
  \ err != nil {\n\tcommon.DisplayAppError(\n\t\tw,\n\t\terr,\n\t\t\"Invalid login\
  \ credentials\",\n\t\t401,\n\t)\n\treturn\n} else { //if login is successful\n\t\
  // Generate JWT token\n\ttoken, err = common.GenerateJWT(user.Email, \"member\"\
  )\n\tif err != nil {\n\t\tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"\
  Eror while generating the access token\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\n\
  \tw.Header().Set(\"Content-Type\", \"application/json\")\n\tuser.HashPassword =\
  \ nil\n\tauthUser := AuthUserModel{\n\t\tUser:  user,\n\t\tToken: token,\n\t}\n\n\
  \tj, err := json.Marshal(AuthUserResource{Data: authUser})\n\tif err != nil {\n\t\
  \tcommon.DisplayAppError(\n\t\t\tw,\n\t\t\terr,\n\t\t\t\"An unexpected error has\
  \ occurred\",\n\t\t\t500,\n\t\t)\n\t\treturn\n\t}\n\n\tw.WriteHeader(http.StatusOK)\n\
  \tw.Write(j)\n}\n```\n\n\n\n图 9-10 展示了通过向 URI 端点 `\"users/register\"` 发送 HTTP `Post`\
  \ 请求，将登录凭据发送至系统以获取 JWT 的过程。\n\n![A978-1-4842-1052-9_9_Fig10_HTML.jpg](img/A978-1-4842-1052-9_9_Fig10_HTML.jpg)\n\
  \n图 9-10. 向 `/users/login` 发送 HTTP Post 请求\n\n图 9-11 展示了成功登录系统后，RESTful API 服务器返回的\
  \ HTTP 响应。\n\n![A978-1-4842-1052-9_9_Fig11_HTML.jpg](img/A978-1-4842-1052-9_9_Fig11_HTML.jpg)\n\
  \n图 9-11. 来自 `/users/login` 的 HTTP 响应\n\n服务器会将包含用户信息和 JWT 的响应发回给客户端应用。\n\n#####\
  \ 使用 MongoDB 实现数据持久化\n\n第 8 章 讨论了如何使用 MongoDB 执行 CRUD 操作。在 RESTful API 应用程序中，数据持久化的逻辑被组织在\
  \ `data` 包中。其中包含独立的结构体类型，用于针对应用程序的每个数据模型执行 CRUD 操作。\n\n图 9-12 展示了 `data` 包中包含的源文件。\n\
  \n![A978-1-4842-1052-9_9_Fig12_HTML.jpg](img/A978-1-4842-1052-9_9_Fig12_HTML.jpg)\n\
  \n图 9-12. data 包中的源文件\n\n代码清单 9-17 提供了 `userRepository.go` 的源代码，该文件实现了插入新用户及使用用户凭据登录的功能。\n\
  \n代码清单 9-17. `userRepository.go` 中的用户实体数据持久化逻辑\n\n```\npackage data\n\nimport (\n\
  \t\"github.com/shijuvar/go-web/taskmanager/models\"\n\t\"golang.org/x/crypto/bcrypt\"\
  \n\t\"gopkg.in/mgo.v2\"\n\t\"gopkg.in/mgo.v2/bson\"\n)\n\ntype UserRepository struct\
  \ {\n\tC *mgo.Collection\n}\n\nfunc (r *UserRepository) CreateUser(user *models.User)\
  \ error {\n\tobj_id := bson.NewObjectId()\n\tuser.Id = obj_id\n\thpass, err := bcrypt.GenerateFromPassword([]byte(user.Password),\
  \ bcrypt.DefaultCost)\n\tif err != nil {\n\t\tpanic(err)\n\t}\n\tuser.HashPassword\
  \ = hpass\n\t//清除传入的文本密码\n\tuser.Password = \"\"\n\terr = r.C.Insert(&user)\n\t\
  return err\n}\n\nfunc (r *UserRepository) Login(user models.User) (u models.User,\
  \ err error) {\n\terr = r.C.Find(bson.M{\"email\": user.Email}).One(&u)\n\tif err\
  \ != nil {\n\t\treturn\n\t}\n\t// 验证密码\n\terr = bcrypt.CompareHashAndPassword(u.HashPassword,\
  \ []byte(user.Password))\n\tif err != nil {\n\t\tu = models.User{}\n\t}\n\treturn\n\
  }\n```\n\n`UserRepository` 结构体有一个类型为 `*mgo.Collection` 的属性 `C`。`UserRepository`\
  \ 结构体的实例是通过 `userController.go` 源文件创建的，它需要提供一个 `mgo.Collection` 对象，而该对象将由 `Context`\
  \ 类型创建。`bcrypt` 包用于通过哈希算法加密密码，并使用 `CompareHashAndPassword` 方法验证密码。\n\n#### Tasks\
  \ 资源的处理器\n\n以下是针对 `Tasks` 资源配置的路由：\n\n```\ntaskRouter := mux.NewRouter()\ntaskRouter.HandleFunc(\"\
  /tasks\", controllers.CreateTask).Methods(\"POST\")\ntaskRouter.HandleFunc(\"/tasks/{id}\"\
  , controllers.UpdateTask).Methods(\"PUT\")\ntaskRouter.HandleFunc(\"/tasks\", controllers.GetTasks).Methods(\"\
  GET\")\ntaskRouter.HandleFunc(\"/tasks/{id}\", controllers.GetTaskById).Methods(\"\
  GET\")\ntaskRouter.HandleFunc(\"/tasks/users/{id}\", controllers.GetTasksByUser).Methods(\"\
  GET\")\ntaskRouter.HandleFunc(\"/tasks/{id}\", controllers.DeleteTask).Methods(\"\
  DELETE\")\n\nrouter.PathPrefix(\"/tasks\").Handler(negroni.New(\n\tnegroni.HandlerFunc(common.Authorize),\n\
  \tnegroni.Wrap(taskRouter),\n))\n```\n\n对 URL 路径 `\"/tasks\"` 的请求会被一个名为 `Authorize`\
  \ 的授权中间件处理器修饰，该处理器由 `Negroni` 栈提供。已认证的用户可以通过在 HTTP 请求中提供 JWT 作为访问令牌发送至服务器，从而创建 `Tasks`。\n\
  \n##### JSON 资源模型\n\n对 `\"/tasks\"` 资源的操作使用名为 `Task` 的数据模型来持久化数据对象的值。\n\n\n\n列表\
  \ 9-18 提供了用于表示 JSON 数据的资源模型，这些模型用于通过 `Tasks` 资源发送和接收消息。\n\n**列表 9-18.** `resources.go`\
  \ 中用于处理 “/tasks” 的 `JSON` 资源\n\n```\n// JSON 资源的模型\ntype (\n\t// 用于 Post/Put - /tasks\n\
  \t// 用于 Get - /tasks/id\n\tTaskResource struct {\n\t\tData models.Task `json:\"\
  data\"`\n\t}\n\n\t// 用于 Get - /tasks\n\tTasksResource struct {\n\t\tData []models.Task\
  \ `json:\"data\"`\n\t}\n)\n```\n\n##### Tasks 资源的处理函数\n\n`Tasks` 资源的应用程序处理函数被写在\
