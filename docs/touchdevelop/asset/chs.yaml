  Number)` | 在指定位置写入另一张图片。不透明度范围从 0（透明）到 1（不透明）。 |

  | `blend svg(markup : String, left : Number, top : Number, width : Number, height
  : Number, angle : Number)` | 在指定位置写入一份可缩放矢量图形（SVG）文档。默认情况下，当宽度或高度为负数时，此操作使用 SVG
  文档中提供的视口大小。 |

  | `brightness(factor : Number)` | 改变图片的亮度。系数在 [-1, 1] 范围内。 |

  | `clear(color : Color)` | 将图片清除为指定颜色 |

  | `clone : Picture` | 返回图像的副本 |

  | `colorize(background : Color, foreground : Color, threshold : Number)` | 基于介于
  0.0 和 1.0 之间的颜色阈值，使用背景色和前景色重新着色图片 |

  | `contrast(factor : Number)` | 改变图片的对比度。系数在 [-1, 1] 范围内。 |

  | `crop(left : Number, top : Number, width : Number, height : Number)` | 裁剪出一个子图像
  |

  | `desaturate` | 使图片变为灰色 |

  | `draw ellipse(left : Number, top : Number, width : Number, height : Number, angle
  : Number, c : Color, thickness : Number)` | 使用给定颜色绘制椭圆边框 |

  | `draw line(x1 : Number, y1 : Number, x2 : Number, y2 : Number, color : Color,
  thickness : Number)` | 在两点之间绘制一条线 |

  | `draw rect(left : Number, top : Number, width : Number, height : Number, angle
  : Number, c : Color, thickness : Number)` | 使用给定颜色绘制矩形边框 |

  | `draw text(left : Number, top : Number, text : String, font size : Number, angle
  : Number, color : Color)` | 使用给定颜色和字体大小绘制一些文本边框 |

  | `fill ellipse(left : Number, top : Number, width : Number, height : Number, angle
  : Number, color : Color)` | 使用给定颜色填充椭圆 |

  | `fill rect(left : Number, top : Number, width : Number, height : Number, angle
  : Number, color : Color)` | 使用给定颜色填充矩形 |

  | `flip horizontal` | 水平翻转图片 |

  | `flip vertical` | 垂直翻转图片 |

  | `invert` | 反转红色、蓝色和绿色通道 |

  | `is invalid : Boolean` | 如果当前实例无效则返回 true |

  | `is panorama : Boolean` | 指示图片宽度是否大于其高度 |

  | `post to wall` | 将图像显示到墙上；如果希望更改生效，之后需要调用 `update on wall` |

  | `resize(width : Number, height : Number)` | 将图片调整为指定像素尺寸 |

  | `save to library : String` | 将图片保存到“已保存图片”相册。返回文件名。 |

  | `set pixel(left : Number, top : Number, color : Color)` | 设置给定像素处的像素颜色 |

  | `share(where : String, message : String)` | 分享此消息（传入空字符串 '''' 将从列表中选择） |

  | `tint(color : Color)` | 将每个像素转换为灰色，并用给定颜色为其着色。 |

