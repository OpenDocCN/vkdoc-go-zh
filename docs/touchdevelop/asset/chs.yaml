  \ 许可，该许可允许以任何媒介或格式进行任何非商业性使用、共享、分发和复制，前提是您对原始作者和来源给予适当的署名，提供指向知识共享许可协议的链接，并指明您是否修改了许可材料。根据本许可，您无权分享源自本章或其部分的改编材料。除非在材料的署名行中另有说明，否则本章中的图像或其他第三方材料均包含在本章的知识共享许可协议中。如果材料未包含在本章的知识共享许可协议中，并且您的预期用途不被法定法规允许或超出允许范围，您将需要直接获得版权持有人的许可。\n\
