  TouchDevelop 团队


  ![A978-1-4302-6137-7_BookFrontmatter_Fig1_HTML.jpg](img/Image00002.jpg)


  托马斯（汤姆）·鲍尔是微软研究院（雷德蒙德）的首席研究员和研究经理，因在程序性能分析、软件模型检查、程序测试和实证软件工程方面的贡献而广为人知。鲍尔因“对软件分析和缺陷检测的贡献”而被授予
  2011 年 ACM Fellow 称号。自从在微软担任经理以来，他培育并扩展了自动定理证明、程序测试与验证以及实证软件工程等研究领域。他拥有康奈尔大学计算机科学学士学位，以及威斯康星大学麦迪逊分校的硕士和博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig2_HTML.jpg](img/Image00003.jpg)


  朱迪斯·毕晓普是美国雷德蒙德微软研究院计算机科学总监。她的职责是通过鼓励项目、支持会议和直接参与研究，在微软的研究团队与全球大学之间建立强有力的联系。她的专长是编程语言和分布式系统，具有强烈的实践导向，并对编译器和设计模式感兴趣。她是
  17 本编程语言书籍的作者或编辑。她拥有英国南安普顿大学的计算机科学博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig3_HTML.jpg](img/Image00004.jpg)


  塞巴斯蒂安·伯克哈特是微软研究院的研究员。他在瑞士巴塞尔出生并长大。他的研究兴趣主要围绕如何方便、高效、正确地编写并发、并行和分布式程序这一普遍问题。更具体的兴趣包括一致性模型、并发测试、自适应计算和并发修订编程模型。在
  IBM 拥有几年行业经验后，他在宾夕法尼亚大学获得了计算机科学博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig4_HTML.jpg](img/Image00005.jpg)


  陈娟是微软研究院雷德蒙德分院 RiSE 小组的研究员。她的主要研究领域包括编译器、程序验证和类型系统。她曾致力于面向对象语言的验证编译器，以及用于指定和验证程序属性的函数式编程语言的设计与实现。她拥有普林斯顿大学计算机科学博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig5_HTML.jpg](img/Image00006.jpg)


  乔纳森·“佩利”·德哈勒是微软研究院软件工程研究小组的软件工程师。佩利还在当地高中志愿教授移动计算机科学课程。从 2004 年到 2006 年，他在公共语言运行时（CLR）团队担任软件设计工程师（测试），负责即时编译器。他拥有比利时鲁汶天主教大学的应用数学博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig6_HTML.jpg](img/Image00007.jpg)




  Manuel Fähndrich 是微软雷德蒙德研究院 `RiSE` 组的高级研究员。他致力于编程语言设计、静态类型系统、程序分析与验证，以及运行时技术与优化等领域。他过去和现在参与的项目包括
  `Singularity` 操作系统与 `Sing#` 语言、`.NET` 的 `CodeContracts`，以及 `TouchDevelop`。他拥有加州大学伯克利分校的博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig7_HTML.jpg](img/Image00008.jpg)


  Nigel Horspool 是维多利亚大学的计算机科学教授。他的研究与教学重点一直是编程语言和编译器，尽管他最主要的名望来自于一种字符串搜索算法。他是三本书的作者或合著者，内容涵盖
  `C` 语言、`Unix` 和 `C#` 语言。他目前是《`Software: Practice and Experience`》期刊的联合编辑。他拥有加拿大多伦多大学的计算机科学博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig8_HTML.jpg](img/Image00009.jpg)


  Michał Moskal 是雷德蒙德的研究员。他在 `RiSE` 组从事软件验证、自动定理证明和编程语言方面的工作。他致力于一个名为 `VCC` 的并发 `C`
  程序形式化验证器，同时还参与了其他项目，包括 `Boogie` 中间验证语言、`SPUR` 追踪 `JIT` 及 `DKAL` 授权引擎。他拥有波兰弗罗茨瓦夫大学的博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig8_HTML.jpg](img/Image00009.jpg)


  Michał Moskal 是雷德蒙德的研究员。他在 `RiSE` 组从事软件验证、自动定理证明和编程语言方面的工作。他致力于一个名为 `VCC` 的并发 `C`
  程序形式化验证器，同时还参与了其他项目，包括 `Boogie` 中间验证语言、`SPUR` 追踪 `JIT` 及 `DKAL` 授权引擎。他拥有波兰弗罗茨瓦夫大学的博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig9_HTML.jpg](img/Image00010.jpg)


  Arjmand Samuel 与学术界合作，促进设备和服务于研究领域的研究与协作。他领导微软研究院（`Project Hawaii` 和 `TouchDevelop`）的移动和云计算研究及外联工作。他近期的研究兴趣在于各种形态和形式设备（`TouchDevelop`
  和 `HomeOS`）的软件架构和编程范式。他在安全、隐私、位置感知访问控制以及移动技术的创新应用等多个主题上发表了各类出版物。Samuel 拥有普渡大学的信息安全博士学位。


  ![A978-1-4302-6137-7_BookFrontmatter_Fig10_HTML.jpg](img/Image00011.jpg)


  Nikolai Tillmann 是微软研究院的首席研究软件设计工程师。他的主要研究领域包括移动设备上的程序编写、程序分析、测试、优化和验证。他发起了 `TouchDevelop`
  项目，该项目使终端用户能够在移动设备上为移动设备编写程序。他还领导 `Pex` 项目，在该项目中他与 `Peli de Halleux` 共同开发了一个基于参数化单元测试和动态符号执行的
  `.NET` 运行时验证与自动测试用例生成框架。Nikolai 拥有德国柏林工业大学的计算机科学 `Dipl. Inf.` 学位。


  ## 致谢


  随着 `TouchDevelop` 社区的发展，我们发现自己正从每一位参与该项目的人身上学习——无论是黑客马拉松上的学生、撰写论文的学者，还是集市上那些令人惊叹的应用的开发者们。感谢大家。




