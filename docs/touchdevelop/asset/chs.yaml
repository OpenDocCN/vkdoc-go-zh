  ### C.43 精灵


  精灵是一个图形对象，可以显示在 `Board` 实例上。 `Sprite` 类型的方法列表已分为获取方法（返回单个属性）、设置方法（分配或更新属性）和其他方法。


  | `Sprite` 类型的获取方法 |

