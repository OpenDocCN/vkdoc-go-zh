    ## B.14 传感器


    摄像头、定位、麦克风及其他传感器。


    | `acceleration quick`：`Vector3` | 获取经过滤波的加速度计数据，采用每轴低通与阈值触发高通组合滤波，消除传感器大部分低振幅噪声，同时能快速跟踪大幅偏移（此时信号并非完全平滑），延迟极低。适合需要快速响应的
    UI 更新。 |

    | `acceleration smooth`：`Vector3` | 获取经过滤波的加速度计数据，采用每轴 1Hz 一阶低通滤波，消除主要传感器噪声，延迟适中。可用于需要平滑信号的中等响应
    UI 更新。 |

    | `acceleration stable`：`Vector3` | 获取经过滤波和时间平均的加速度计数据，采用最近 25 个“最优滤波”样本的算术平均（每轴
    50Hz 下超过 500ms），几乎消除大多数传感器噪声。该数值非常稳定，但延迟很高，不适用于快速响应的 UI。 |

    | `battery level`：`Number` | 获取电池电量，范围为 0（耗尽）到 1（充满）。若信息不可用则返回无效值。 |

    | `camera`：`Camera` | 获取主摄像头 |

    | `current location`：`Location` | 获取当前手机位置。手机会根据功耗、性能和其他成本因素优化定位精度。 |

    | `current location accurate`：`Location` | 以最高精度获取当前手机位置。这可能涉及使用收费服务，或消耗更高的电量或网络带宽。
    |

    | `front camera`：`Camera` | 获取前置摄像头 |

    | `has gyroscope`：`Boolean` | 指示设备是否支持陀螺仪 |

    | `heading`：`Number` | 获取指南针航向，单位为度，从地球地理北极顺时针测量。 |

    | `is device stable`：`Boolean` | 指示设备是否处于"稳定"状态（约 0.5 秒无移动） |

    | `motion`：`Motion` | 获取当前手机运动数据，综合了加速度计、指南针和陀螺仪的数据。 |

    | `orientation`：`Vector3` | 获取当前方向（若可用），单位为度。(x,y,z) 也称为 (pitch, roll, yaw) 或
    (alpha, beta, gamma)。 |

    | `record microphone`：`Sound` | 使用麦克风录制音频 |

    | `rotation speed`：`Vector3` | 获取陀螺仪围绕设备各轴的旋转速度，单位为度/秒。 |

    | `take camera picture`：`Picture` | 拍照并返回图片。此图片不包含 GPS 位置信息。 |


    ## B.15 社交


    电子邮件、短信、联系人和日历服务。


    | `choose contact`：`Contact` | 从联系人列表中选择一个联系人 |

    | `choose email`：`Link` | 从联系人列表中选择一个电子邮件 |

    | `create contact(nickname : String)`：`Contact` | 创建一个新联系人 |

    | `create message(message : String)`：`Message` | 创建一条要分享的消息 |

    | `create place(name : String, location : Location)`：`Place` | 创建一个地点 |

    | `link email(email address : String)`：`Link` | 从电子邮件创建一个链接 |

    | `link phone number(phone number : String)`：`Link` | 从电话号码创建一个链接 |

    | `save contact(contact : Contact)` | 保存一个新联系人 |

    | `save email(email address : String)` | 允许用户保存电子邮件地址 |

    | `search(network : String, terms : String)`：`Message Collection` | 在社交网络（推特、脸书）中搜索最近的帖子
    |

    | `search appointments(start : DateTime, end : DateTime)`：`Appointment Collection`
    | 在指定时间范围内搜索约会事项 |

    | `search contacts(prefix : String)`：`Contact Collection` | 按名称搜索联系人 |

    | `search places nearby(network : String, terms : String, location : Location,
    distance : Number)`：`Place Collection` | 搜索附近的地点。距离单位为米。 |

    | `send email(to : String, subject : String, body : String)` | 打开邮件客户端 |

    | `send sms(to : String, body : String)` | 打开短信客户端（收件人、正文） |


    ## B.16 标签


    二维条码、二维码和 NFC 标签。


    | `send nfc(value : String, type : String)` | 使用 NFC 发送网址或文本 |

    | `tag text(text : String, size : Number, bw : Boolean)`：`Picture` | 使用微软标签生成指向文本的二维条码。文本长度必须小于
    1000 字符，尺寸必须在 0.75 到 5 英寸之间。 |

    | `tag url(url : String, size : Number, bw : Boolean)`：`Picture` | 使用微软标签生成指向网址的二维条码。网址长度必须小于
    1000 字符，尺寸必须在 0.75 到 5 英寸之间。 |


    ## B.17 磁贴


    Windows 8 和 Windows Phone 在开始屏幕上显示磁贴，点击后可启动应用程序。通过此服务可将磁贴与 TouchDevelop 脚本关联。注意：本资源替代了不再支持的`Tile`数据类型。


    | `pin default` | 提示用户是否应将磁贴固定到开始屏幕 |

    | `set default counter( n : Number )` | 设置显示在磁贴上的计数器（数字）；仅显示 1 到 99 之间的值；其余值隐藏
    |

    | `set default text( title: String, text : String)` | 在磁贴上显示短标题和较长文本 |


    ## B.18 时间


    时间和日期操作。


    | `create(year : Number, month : Number, day : Number, hour : Number, minute :
    Number, second : Number)`：`DateTime` | 创建一个新的日期实例 |

    | `fail if not(condition : Boolean)` | 如果条件为假，则中止执行。 |

    | `log(message : String)` | 将此消息追加到调试日志中。脚本发布后不执行任何操作。 |

    | `now`：`DateTime` | 获取当前时间 |

    | `sleep(seconds : Number)` | 等待指定的秒数 |

    | `stop` | 停止执行并停留在墙（指 TouchDevelop 的 Wall 界面）上。 |

    | `today`：`DateTime` | 获取今天的日期（不含时间） |

    | `tomorrow`：`DateTime` | 获取明天的日期（不含时间） |

    '
- fmt: '### B.19 wall


    Ask for or display values on the wall.


    | `add button(icon : String, text : String) : Page Button` | Add a new button.
    `icon` must be the name of a built-in icon, `text` must be non-empty. |

    | `ask boolean(text : String, caption : String) : Boolean` | Prompts the user
    with `ok` and `cancel` buttons |

    | `ask number(text : String) : Number` | Prompts the user to input a number |

    | `ask string(text : String) : String` | Prompts the user to input a string |

    | `button icon names : String Collection` | Gets the list of available page button
    names. |

    | `clear` | Clears the background, buttons and entries |

    | `clear background` | Clears the background color, picture and camera |

    | `clear buttons` | Clears the application bar buttons and hides the bar |

    | `create text box(text : String, font size : Number) : TextBox` | Creates an
    updatable text box |

    | `current page : Page` | Gets the current page displayed on the wall |

    | `display search(on : Boolean)` | Indicates whether to show or hide the search
    icon |

    | `pages : Page Collection` | Returns the current back stack of pages, starting
    from the current page to the bottom page. |

    | `pick date(text : String, caption : String) : DateTime` | Prompts the user to
    pick a date. Returns a datetime whose date is set, the time is 12:00:00. |

    | `pick string(text : String, caption : String, values : String Collection) :
    Number` | Prompts the user to pick a string from a list. Returns the selected
    index. |

    | `pick time(text : String, caption : String) : DateTime` | Prompts the user to
    pick a time. Returns a datetime whose time is set, the date is undefined. |

    | `pop page : Boolean` | Pops the current page and restores the previous wall
    page. Returns `false` if already on the default page. |

    | `prompt(text : String)` | Prompts the user with an `ok` button |

    | `push new page : Page` | Pushes an empty page on the wall |

    | `screenshot : Picture` | Takes a screenshot of the wall |

    | `set background(color : Color)` | Sets the wall background color |

    | `wall→set background camera( camera : Camera)` | Sets the wall background camera
    |

    | `set background picture(picture : Picture)` | Sets the wall background picture.
    The picture will be resized and clipped to the screen background as needed |

    | `set foreground(color : Color)` | Sets the wall foreground color of elements
    |

    | `set reversed(bottom : Boolean)` | Reverses the elements on the wall and inserts
    new ones at the bottom. |

    | `set subtitle(title : String)` | Sets the subtitle of the wall |

    | `set title(title : String)` | Sets the title of the wall |

    | `set transform matrix(m11 : Number, m12 : Number, m21 : Number, m22 : Number,
    offsetx : Number, offsety : Number)` | Sets the 3x3 affine matrix transformation
    applied to the wall |


    ### B.20 web


    Search and browse the web.


    | `base64 decode(text : String) : String` | Decodes a string that has been base64-encoded
    |

    | `base64 encode(text : String) : String` | Converts a string into an base64-encoded
    string |

    | `browse(url : String)` | Opens a web browser to a url |

    | `connection name : String` | Gets a name of the currently connected network
    servicing Internet requests |

    | `connection type : String` | Gets the type of the network servicing Internet
    requests (unknown, none, ethernet, wifi, mobile) |

    | `create form builder : Form Builder` | Create a form builder |

    | `create json builder : Json Builder` | Creates a json builder |

    | `create request(url : String) : Web Request` | Creates a web request |

    | `csv(text : String, delimiter : String) : Json Object` | Parses a Command Separated
    Values document into a `JsonObject` where the headers is a string array of column
    names; records is an array of rows where each row is itself an array of strings.
    The delimiter is inferred if not specified. |

    | `download(url : String) : String` | Downloads the content of an internet page
    (http get) |

    | `download json(url : String) : Json Object` | Downloads a web service response
    as a JSON data structure (http get) |

    | `download picture(url : String) : Picture` | Downloads a picture from internet
    |

    | `download song(url : String, name : String) : Song` | Create a streamed song
    file from internet (download happens when playing) |

    | `download sound(url : String) : Sound` | Downloads a WAV sound file from internet
    |

    | `feed(value : String) : Message Collection` | Parses the newsfeed string (RSS
    2.0 or Atom 1.0) into a message collection |

    | `html decode(html : String) : String` | Decodes a string that has been HTML-encoded
    |

    | `html encode(text : String) : String` | Converts a text string into an HTML-encoded
    string |

    | `is connected : Boolean` | Indicates whether any network connection is available
    |

    | `json(value : String) : Json Object` | Parses the string as a json object |

    | `json array : Json Object` | Returns an empty json array |

    | `json object : Json Object` | Returns an empty json object |

    | `link image(url : String) : Link` | Creates a link to an internet image |

    | `link media(url : String) : Link` | Creates a link to an internet audio/video
    |

    | `link url(name : String, url : String) : Link` | Creates a link to an internet
    page |

    | `oauth v2(oauth url : String) : OAuth Response` | Authenticate with OAuth 2.0
    and receive the access token or error. (See `oauthv2` for more information on
    which Redirect URI to choose.) |

    | `open connection settings(page : String)` | Opens a connection settings page
    (airplanemode, bluetooth, wiki, cellular) |

    | `play media(url : String)` | Plays an internet audio/video in full screen |

    | `search(terms : String) : Link Collection` | Search the web using Bing |

    | `search images(terms : String) : Link Collection` | Search for images using
    Bing |

    | `search images nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | Search for images near a location using Bing. Distance in
    meters, negative to ignore. |

    | `search nearby(terms : String, location : Location, distance : Number) : Link
    Collection` | Searching the web near a location using Bing. Distance in meters,
    negative to ignore. |

    | `search news(terms : String) : Link Collection` | Search for news using Bing
    |

    | `search news nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | Search for news near a location using Bing. Distance in meters,
    negative to ignore. |

    | `upload(url : String, body : String) : String` | Uploads text to an internet
    page (http post) |

    | `upload picture(url : String, pic : Picture) : String` | Uploads a picture to
    an internet page (http post) |

    | `url decode(url : String) : String` | Decodes a string that has been url-encoded
    |

    | `url encode(text : String) : String` | Converts a text string into an url-encoded
    string |

    | `xml(value : String) : Xml Object` | Parses the string as a xml element |


