    \    // 获取温度单位\n    var units := cw → child(\"temp_unit\") → to string\n    (\"\
    今天的温度是 \" || temp || units) → post to wall\n```\n\n与 JSON 类似，仅通过查看 XML 数据的示例就能相当容易地弄清楚如何提取所需信息。然而，XML\
    \ 的结构几乎总是由 DTD（文档类型定义）严格定义，该定义规定了要使用的标签名称以及它们如何允许在其他带标签的部分内嵌套。在开发处理 XML 的脚本时，最好参考\
    \ DTD。\n\n## 4.4 REST 指南与 Web 请求\n\n许多 Web 服务在实现其服务时遵循称为 REST 的指南。它是表述性状态传递的缩写。这样的\
    \ Web 服务通常被描述为 RESTful。关于 REST 指南的阅读起点由维基百科提供，网址为：[`http://en.wikipedia.org/wiki/REST`](http://en.wikipedia.org/wiki/REST)。\n\
    \n特别是，HTTP GET 和 POST 请求被用于访问 RESTful Web 服务的许多功能，并且提供的用于从 Web 上传和下载的 API 调用可能是足够的。HTTP\
    \ PUT 和 DELETE 请求在 Windows Phone 平台上不受支持，因此无法由 TouchDevelop 脚本生成。许多 RESTful Web\
    \ 服务提供了 PUT 和 DELETE 请求的替代方案。\n\nAPI 方法 `web→create request` 可用于构造一个通用的 HTTP 请求。该请求被构造为\
    \ `Web Request` 数据类型的一个实例。当请求发送到 Web 服务时，结果以 `Web Response` 类型的实例返回。这两种数据类型的方法总结于表\
    \ 4-4 和表 4-5 中。（所有数据类型共有的方法已从这两个表中省略。）\n\n**表 4-4 Web Request 数据类型的方法**\n\n| 方法\
    \ | 描述 |\n| --- | --- |\n| `header(name : String) : String` | 获取由名称标识的标头的值 |\n\
    | `header names : String Collection` | 获取所有标头的名称 |\n| `method : String` | 返回 HTML\
    \ 方法：\"get\" 或 \"post\" |\n| `send : Web Response` | 发送请求并等待响应 |\n| `set compress(value\
    \ : Boolean) : Nothing` | 如果参数为 true，则请求内容使用 gzip 压缩（并更新标头）。 |\n| `set content(content\
    \ : String) : Nothing` | 设置 POST 请求的内容 |\n| `set content as json(json : Json Object)\
    \ : Nothing` | 将 POST 请求的内容设置为 JSON 数据结构 |\n| `set content as picture(picture\
    \ : Picture, quality : Number) : Nothing` | 将 POST 请求的内容设置为 JPEG 图像；质量参数范围从 0（低质量，最大压缩）到\
    \ 1（最佳质量）。 |\n| `set content as xml(xml : Xml Object): Nothing` | 将 POST 请求的内容设置为\
    \ XML 数据结构 |\n| `set credentials(name : String,password : String): Nothing` |\
    \ 当网站需要身份验证时设置用户名和密码；请求的 URL 必须指定 HTTPS 协议。 |\n| `set header( name : String, value\
    \ : String): Nothing` | 设置 HTML 标头值。 |\n| `set method( method : String) : Nothing`\
    \ | 设置方法；必须为 \"get\" 或 \"post\"。 |\n| `set url(url : String) : Nothing` | 设置 URL。\
    \ |\n| `url : String` | 返回此请求中使用的 URL |\n\n脚本 `cosm services` (`/ybnr`) 提供了构造\
    \ Web 请求并使用响应的示例。\n\n**表 4-5 Web Response 数据类型的方法**\n\n| 方法 | 描述 |\n| --- | ---\
    \ |\n| `content : String` | 将响应正文的内容作为字符串获取 |\n| `content as json : Json Object`\
    \ | 将响应正文的内容作为 JSON 数据结构获取 |\n| `content as picture : Picture` | 将响应正文的内容作为图片获取\
    \ |\n| `content as sound : Sound` | 将响应正文的内容作为 WAV 格式的声音获取 |\n| `content as xml\
    \ : Xml Object` | 将响应正文的内容作为 XML 结构获取 |\n| `header(name : String) : String` |\
    \ 获取给定名称的 HTML 标头的值 |\n| `header names : String Collection` | 获取标头的名称 |\n| `request\
    \ : Web Request` | 获取所使用的 Web 请求 |\n| `status code : Number` | 获取与请求关联的 HTTP 状态码\
    \ |\n\n![知识共享许可协议](https://creativecommons.org/licenses/by-nc-nd/4.0) 开放获取 本章根据知识共享署名-非商业性使用-禁止演绎\
    \ 4.0 国际许可协议 ([`creativecommons.org/licenses/by-nc-nd/4.0/`](http://creativecommons.org/licenses/by-nc-nd/4.0/))\
    \ 的条款进行许可，允许以任何媒介或格式进行任何非商业性使用、共享、分发和复制，前提是您给予原始作者和来源适当的署名，提供指向知识共享许可协议的链接，并指明您是否修改了许可材料。根据本许可协议，您无权分享从本章或其部分内容改编的材料。本章中的图像或其他第三方材料包含在本章的知识共享许可协议中，除非在材料的来源说明中另有指明。如果材料未包含在本章的知识共享许可协议中，并且您的预期使用不被法定法规允许或超出了允许的使用范围，您将需要直接从版权所有者处获得许可。\n"
- fmt: '# 5. Audio


    [5.1 Music](#text00005.html#Sec1) [5.2 Sounds](#text00005.html#Sec6) [5.3 Microphone](#text00005.html#Sec7)


    A smartphone or tablet can double as a portable music player. It can play music
    held as MP3 files on the device. It can play audio streamed over the internet,
    it can record sound using its microphone … and more.


    ## 5.1 Music


    Music files can be copied onto your device by a variety of means. Music can also
    be purchased and downloaded onto your device from a variety of on-line services.
    The supported formats for music files are listed in Table [5-1](#text00005.html#Tab1).
    If your file is in another format, there are programs available to convert it
    to a supported format. The names used in the ‘container’ column of the table are
    likely to be the same as the filename extensions used in the filenames on the
    computer (e.g. “track1.mp3”), but this is not guaranteed to be the case.


    Table 5-1


    Supported music formats


    | Codec | Container | Notes |

    | --- | --- | --- |

    | `AAC` | `M4A` | Only unprotected (DRM-free) files are supported |

    | `MP3` | `MP3` | Layer III of MPEG-1 to be precise |

    | `WMA` | `WMA` | Zune converts lossless WMA to another format |


    The TouchDevelop API provides the `media` resource. However due to security restrictions,
    many methods of this resource are available only for use on the Windows Phone
    and on Android devices. On other devices, it is not possible to access song albums
    or the entire collection of songs held on the device.


    On the Windows phone and Android devices, the `media` resource has methods for
    retrieving collections of all the songs, all the song albums, and all the playlists
    held on the phone. TouchDevelop does not provide any mechanism for changing any
    of these three collections. They are immutable. It is therefore impossible for
    a mistake in a TouchDevelop script to cause any music file on the phone to be
    accidentally deleted. The three media methods are listed in Table [5-2](#text00005.html#Tab2).


    Table 5-2


    Accessing media resources (WP8 and Android only)


    | Method | Description |

    | --- | --- |

    | `media→songs : Songs` | Gets a collection of all the songs on the phone |

    | `media→song albums : Song Albums` | Gets a collection of all the song albums
    on the phone |

    | `media→playlists : Playlists` | Gets a collection of all the playlists on the
    phone |


    ### 5.1.1 Working with collections of songs


    Although the TouchDevelop documentation and this book use the words ‘music’ and
    ‘song’, the API calls are of course not restricted to working with music. They
    will work equally well with recordings made in any of the audio formats listed
    in Table [5-1](#text00005.html#Tab1).


    Note that the TouchDevelop API also provides methods for working with audio recordings
    in the WAV format but these recordings are not usually used for music, they are
    short in duration, and they are represented in the TouchDevelop API by the `Sound`
    datatype. The `Sound` type is covered later in this chapter.


    The methods for using songs, song albums, and playlists are listed in Table [5-3](#text00005.html#Tab3).
    The `is invalid` and `post to wall` methods (available for all datatypes) are
    omitted from the table.


    Table 5-3


    Using songs and song albums (WP8 and Android only)


    | Method of `Playlist` Datatype | Description |

    | --- | --- |

    | `duration : Number` | Returns total duration of all songs in the playlist in
    seconds |

    | `name : String` | Returns name of the playlist |

    | `play : Nothing` | Plays all the songs in the playlist |

    | `songs : Songs` | Gets all the songs in the playlist as a collection |

    | Method of `Song Album` | Description |

    | `art : Picture` | Gets the album cover art |

    | `artist : String` | Gets the album artist’s name |

    | `duration : Number` | Gets the total duration of all songs on the album in seconds
    |

    | `genre : String` | Gets the music genre |

    | `has art : Boolean` | Returns true if cover art is available |

    | `name : String` | Returns the name of the album |

    | `play : Nothing` | Plays all the songs on the album |

    | `songs : Songs` | Returns a collection of all songs on the album |

    | `thumbnail : Picture` | Gets a thumbnail picture of the cover art |

    | `album : Song Album` | Gets the album in which the song appears |

    | `artist : String` | Gets the song artist’s name |

    | `duration : Number` | Gets the song duration in seconds |

    | `genre : String` | Gets the song’s music genre |

    | `name : String` | Gets the name of the song |

    | `play : Nothing` | Plays the song |

    | `play count : Number` | Gets the number of times song has been played |

    | Method of `Song` Datatype | Description |

    | `protected : Boolean` | Returns true if the song is DRM protected |

    | `rating : Number` | Gets a rating set by the user; -1 if not rated |

    | `track: Number` | Gets the track number of song on the album |


    TouchDevelop also provides one event related to songs. This is the active song
    changed event which is triggered at the moments that its name suggests. For example,
    an album or a playlist may be in the process of being played, and the event will
    be triggered whenever the phone advances to the next song in the list.


    ### 5.1.2 Obtaining an individual song, available on all devices


    It is possible to import an individual music track into a TouchDevelop script,
    no matter which platform the script is running on.


    One possibility is to download a music file from the web. The action


    ```

    var song := web → download song(url)

    ```


    will load the music into the variable `song` (with type `Song`), where `url` is
    a string giving a URL for the location of the file.


    Alternatively, the script can open a choose file dialog where the user can navigate
    to the music file on their computer or tablet. The usage is as below.


    ```

    var song := media → choose song

    ```'
