    Michał Moskal 是雷德蒙德的研究员。他在 `RiSE` 组从事软件验证、自动定理证明和编程语言方面的工作。他致力于一个名为 `VCC` 的并发
    `C` 程序形式化验证器，同时还参与了其他项目，包括 `Boogie` 中间验证语言、`SPUR` 追踪 `JIT` 及 `DKAL` 授权引擎。他拥有波兰弗罗茨瓦夫大学的博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig9_HTML.jpg](img/Image00010.jpg)


    Arjmand Samuel 与学术界合作，促进设备和服务于研究领域的研究与协作。他领导微软研究院（`Project Hawaii` 和 `TouchDevelop`）的移动和云计算研究及外联工作。他近期的研究兴趣在于各种形态和形式设备（`TouchDevelop`
    和 `HomeOS`）的软件架构和编程范式。他在安全、隐私、位置感知访问控制以及移动技术的创新应用等多个主题上发表了各类出版物。Samuel 拥有普渡大学的信息安全博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig10_HTML.jpg](img/Image00011.jpg)


    Nikolai Tillmann 是微软研究院的首席研究软件设计工程师。他的主要研究领域包括移动设备上的程序编写、程序分析、测试、优化和验证。他发起了 `TouchDevelop`
    项目，该项目使终端用户能够在移动设备上为移动设备编写程序。他还领导 `Pex` 项目，在该项目中他与 `Peli de Halleux` 共同开发了一个基于参数化单元测试和动态符号执行的
    `.NET` 运行时验证与自动测试用例生成框架。Nikolai 拥有德国柏林工业大学的计算机科学 `Dipl. Inf.` 学位。


    ## 致谢


    随着 `TouchDevelop` 社区的发展，我们发现自己正从每一位参与该项目的人身上学习——无论是黑客马拉松上的学生、撰写论文的学者，还是集市上那些令人惊叹的应用的开发者们。感谢大家。

