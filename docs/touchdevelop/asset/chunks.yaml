    | `pictures : Pictures` | Returns a collection of all the pictures held in the
    album. |

    | Methods of Pictures Datatype | Description |

    | `find(name : String) : Number` | Returns the index of a picture in the collection
    which has the given name; the result is -1 if the picture cannot be found. |

    | `random : Picture` | Returns a random picture. |

    | `thumbnail(index : Number) : Picture` | Returns a thumbnail of the picture at
    the given index position in the collection. |


    ### 6.2.2 Access to pictures on other devices


    In the Web App version of TouchDevelop, a single picture can be selected from
    the device’s hard drive using the method `media` → `choose picture` . A picture
    can also be downloaded from the web via the call


                   `Var pic := web` →  `choose picture`


    or added to a script as an Art resource.


    ### 6.2.3 Manipulating a picture


    Display of an image uses the `post to wall` method, as in this example.


                   `var` `pic1 := media` → `choose picture`


                   `pic1` → `post to wall`


    An alternative way to display a picture is to set the wall’s background image,
    as follows.


                   `var` `pic1 := media` → `choose picture`


                   `wall` → `set background picture(pic1)`


    The general-purpose methods of the `Picture` type are listed in Table [6-4](#text00006.html#Tab4)
    .


    Table 6-4


    General Picture methods


    | Methods of Picture Datatype | Description |

    | --- | --- |

    | at(index: Number): Color | Returns the color of the pixel at the given index
    in the picture |

    | clone : Picture | Returns a copy of the Picture |

    | count : Number | Returns number of pixels |

    | crop(left : Number, top : Number, width : Number, height : Number) | Crops the
    picture to a rectangular portion of the original. |

    | date : DateTime | Returns a date associated with the picture (if there is one)
    |

    | flip horizontal | flips the picture left to right |

    | flip vertical | flips the picture top to bottom |

    | height : Number | Returns height of picture in pixels |

    | is panorama : Boolean | Returns true if width > height |

    | location : Location | Returns a location associated with the picture (if there
    is one) |

    | pixel(left : Number, top : Number) : Color | Gets the pixel color at the specified
    x,y position |

    | post to wall | Displays the picture |

    | resize(width : Number, height : Number) | Scales the picture to have a new width
    and height |

    | save to library : String | Stores the picture in the Saved Pictures album and
    returns the filename |

    | set pixel(left : Number, top : Number, color : Color) | Sets the pixel color
    at the specified x,y position |

    | update on wall | If this picture has been displayed and then changed, this method
    replaces the displayed image with the new one |

    | width : Number | Returns width of picture in pixels |


    The table omits methods which change the colors or the brightness, or methods
    which overlay shapes etc. on top of the picture. All such methods are covered
    in the following subsections of this chapter.


    #### Care in Using the at, pixel and set pixel methods


    Table [6-4](#text00006.html#Tab4) includes the `at` , `pixel` and `set pixel`
    methods. Before any of these methods is used in a script, some thought should
    be given to how large the picture is.


    Any TouchDevelop script which accesses every pixel of a picture can be exceedingly
    slow to run, as well as draining the battery of a portable device. The implication
    is that the Picture type’s `at` , `pixel` and `set pixel` methods should be used
    only on pictures containing a modest number of pixels. Pictures taken by the camera
    contain as many pixels as the camera’s resolution. For example, it is not uncommon
    for phone cameras to have 6 megapixel resolution or higher. Pictures downloaded
    from the internet or transferred from your computer may contain even more pixels.


    Although a picture shown on the screen is scaled to fit within the screen’s size,
    the picture retains its original number of pixels in the device’s memory. Unless
    the picture is intended to be copied to another device, it would usually be appropriate
    to reduce the picture’s resolution to match the screen resolution. Note that any
    method which processes all the pixels in a single call, such as `resize` , is
    reasonably fast.


    The `at` method is useful for determining various aggregate properties of a picture,
    such as its average brightness. In more sophisticated scripts, the `pixel` method
    could for example be used for analyzing a picture and extracting details such
    as edges or, when `set pixel` is used too, for sharpening edges.


    An example script which computes a picture’s average brightness is shown in Figure
    [6-2](#text00006.html#Fig2) . Each pixel in the picture has a color value composed
    from red (R), green (G) and blue (B) components whose values range from zero intensity
    or 0.0 up to the maximum intensity which is 1.0\. From the R,G,B values of a pixel,
    its luminosity can be calculated. (See, for example, the explanation of the YUV
    color space and the conversion formula for computing YUV values in Wikipedia.)
    The luminosity is a measure of the brightness of that pixel.


    ![A978-1-4302-6137-7_6_Fig2_HTML.jpg](Image00038.jpg)


    Figure 6-2


    Computing brightness


    The `at` and `pixel` methods are similar because they both retrieve the color
    of a particular pixel. Generally speaking, the `at` method should be used when
    it does not matter where the pixel is located within the picture, as is the case
    for the brightness calculation in Figure [6-2](#text00006.html#Fig2) . It provides
    more efficient access because only one for loop to access all the pixels is needed.
    The `pixel` and `set pixel` methods would normally be placed inside two nested
    for loops, one to run through the rows and the other through the columns. The
    equivalence between the two ways to access a particular pixel is as follows.


                           `pic1` → `pixel(x,y)    ≡   pic1` → `at( y*pic1` → `width
    + x )`


    Note that y coordinate values are measured from the top edge of the picture down.
    It is the opposite convention to that used in geometry.'
  trans: '

    ### 6.2.1 图片集与图片集合（Windows Phone 和 Android）


    智能手机通常包含各种图片集。在 Windows Phone 上，这些图片集有诸如“相机胶卷”和“已收藏的收藏夹”之类的名称。


    `TouchDevelop` 提供了访问 Windows Phone 上这些图片集的途径，并且很快也将支持访问 Android 设备上的图片集。不幸的是，由于安全限制，在
    PC、Mac、Linux、iPad、iPhone 和 iPod Touch 平台上无法访问。


    在支持这些功能的平台上，API 调用


    `phone` -> `picture albums`


    会检索手机上当前维护的所有图片集，而两个方法调用


    `phone` -> `pictures`


    `phone` -> `saved pictures`


    分别返回所有图片的集合，以及名为“已保存的图片”的图片集中所包含的图片。用于处理 `Picture Album`、`Picture Albums` 和 `Pictures`（一个
    `Picture` 集合）数据类型的方法列于表 6-3 中。


    一旦获得了 `Picture` 值（可能是通过从集合中检索，或使用相机获取），在将其显示到屏幕之前，有许多方法可用于操作该图片。这些内容将在本章后续部分介绍。


    **表 6-3** `Picture Album` 和 `Pictures` 数据类型的方法（WP8 和 Android）


    | `Picture Album` 数据类型的方法 | 描述 |

    | --- | --- |

    | `albums : Picture Albums` | 返回此图片集中包含的所有嵌套图片集的集合。 |

    | `name : String` | 获取图片集的名称。 |

    | `pictures : Pictures` | 返回图片集中包含的所有图片的集合。 |

    | `Pictures` 数据类型的方法 | 描述 |

    | `find(name : String) : Number` | 返回集合中具有给定名称的图片的索引；如果找不到该图片，结果为 -1。 |

    | `random : Picture` | 返回一张随机图片。 |

    | `thumbnail(index : Number) : Picture` | 返回集合中给定索引位置图片的缩略图。 |


    ### 6.2.2 在其他设备上访问图片


    在 `TouchDevelop` 的 Web 应用版本中，可以使用方法 `media` -> `choose picture` 从设备硬盘中选择一张图片。也可以通过调用以下方式从网络下载图片：


    `Var pic := web` -> `choose picture`


    或者将其作为艺术资源添加到脚本中。


    ### 6.2.3 操作图片


    图片的显示使用 `post to wall` 方法，如下例所示。


    ```

    var pic1 := media → choose picture

    pic1 → post to wall

    ```


    另一种显示图片的方法是设置墙纸的背景图像，如下所示。


    ```

    var pic1 := media → choose picture

    wall → set background picture(pic1)

    ```


    `Picture` 类型的通用方法列于表 6-4 中。


    **表 6-4** 通用 `Picture` 方法


    | `Picture` 数据类型的方法 | 描述 |

    | --- | --- |

    | `at(index: Number): Color` | 返回图片中给定索引处像素的颜色 |

    | `clone : Picture` | 返回该 `Picture` 的一个副本 |

    | `count : Number` | 返回像素数量 |

    | `crop(left : Number, top : Number, width : Number, height : Number)` | 将图片裁剪为原始图片的矩形部分。
    |

    | `date : DateTime` | 返回与该图片关联的日期（如果有的话） |

    | `flip horizontal` | 将图片左右翻转 |

    | `flip vertical` | 将图片上下翻转 |

    | `height : Number` | 返回图片的高度（像素） |

    | `is panorama : Boolean` | 如果宽度 > 高度，则返回 true |

    | `location : Location` | 返回与该图片关联的位置（如果有的话） |

    | `pixel(left : Number, top : Number) : Color` | 获取指定 x,y 位置的像素颜色 |

    | `post to wall` | 显示图片 |

    | `resize(width : Number, height : Number)` | 缩放图片至新的宽度和高度 |

    | `save to library : String` | 将图片存储在“已保存的图片”图片集中，并返回文件名 |

    | `set pixel(left : Number, top : Number, color : Color)` | 设置指定 x,y 位置的像素颜色 |

    | `update on wall` | 如果此图片已显示后被修改，此方法会用新图像替换已显示的图像 |

    | `width : Number` | 返回图片的宽度（像素） |


    该表省略了用于改变颜色或亮度的方法，以及在图片上叠加形状等方法。所有这些方法都将在本章的以下小节中介绍。


    #### 使用 `at`、`pixel` 和 `set pixel` 方法的注意事项


    表 6-4 中包含了 `at`、`pixel` 和 `set pixel` 方法。在脚本中使用这些方法之前，应考虑图片的大小。


    任何访问图片中每个像素的 `TouchDevelop` 脚本都可能运行得极其缓慢，同时还会消耗便携设备的电池。这意味着 `Picture` 类型的 `at`、`pixel`
    和 `set pixel` 方法应仅用于包含适中数量像素的图片。相机拍摄的图片包含与相机分辨率同样多的像素。例如，手机相机拥有 600 万像素或更高分辨率的情况并不罕见。从互联网下载或从电脑传输的图片可能包含更多像素。


    尽管屏幕上显示的图片会缩放以适应屏幕尺寸，但图片在设备内存中仍保留其原始像素数量。除非打算将图片复制到另一台设备，否则通常适合降低图片分辨率以匹配屏幕分辨率。请注意，任何在单次调用中处理所有像素的方法（例如
    `resize`）都相当快。


    `at` 方法可用于确定图片的各种聚合属性，例如其平均亮度。在更复杂的脚本中，`pixel` 方法可用于分析图片并提取边缘等细节，或者当同时使用 `set
    pixel` 时，可用于锐化边缘。


    图 6-2 显示了一个计算图片平均亮度的示例脚本。图片中的每个像素都有一个由红色 (R)、绿色 (G) 和蓝色 (B) 分量组成的颜色值，其取值范围从零强度（0.0）到最大强度（1.0）。根据像素的
    R、G、B 值，可以计算出其亮度（参见 Wikipedia 上关于 YUV 色彩空间的解释以及计算 YUV 值的转换公式）。亮度是衡量该像素明亮程度的指标。


    ![A978-1-4302-6137-7_6_Fig2_HTML.jpg](img/Image00038.jpg)


    **图 6-2** 计算亮度


    `at` 和 `pixel` 方法类似，因为它们都检索特定像素的颜色。一般来说，当像素在图片中的位置无关紧要时（如图 6-2 中的亮度计算），应使用 `at`
    方法。它提供了更高效的访问方式，因为只需要一个 for 循环来访问所有像素。而 `pixel` 和 `set pixel` 方法通常放在两个嵌套的 for
    循环中，一个循环遍历行，另一个循环遍历列。访问特定像素的两种方式之间的等效性如下：


    ```

    pic1 → pixel(x,y)    ≡   pic1 → at( y * pic1 → width + x )

    ```


    请注意，y 坐标值是从图片顶部向下测量的。这与几何学中使用的惯例相反。

    '
- fmt: "#### Picture colorizing effects\n\nThe colors, the contrast and the brightness\
    \ of a picture can all be modified using more methods of the `Picture` type which\
    \ are listed in Table [6-5](#text00006.html#Tab5).\n\nThe `brightness` method\
    \ can be used to increase or decrease the luminosities of all the pixels in the\
    \ image in unison, so that the picture appears brighter or darker. The `contrast`\
    \ method can be used to increase or decrease the range of luminosities, so that\
    \ there is greater or smaller contrast between light and dark regions.\n\nThe\
    \ `colorize` method is intended for creating a two color image from a greyscale\
    \ image. All pixels darker than a specified threshold value (a number in the range\
    \ 0.0 to 1.0) are replaced by the background color, while all those brighter are\
    \ replaced by the foreground color. The method can also be applied to color images,\
    \ but that image is converted to grayscale before the colorization is applied.\n\
    \n**Table 6-5**  \nColorizing/intensity picture effects\n\n| Methods of `Picture`\
    \ | Description |\n| --- | --- |\n| `brightness(factor : Number) : Nothing` |\
    \ Increases of decreases the brightness of the picture. The parameter ranges from\
    \ -1 to +1. |\n| `colorize(background : Color, foreground : Color, threshold :\
    \ Number) : Nothing` | Changes the picture to a two color scheme. Pixels darker\
    \ than threshold become the background color, those brighter become the foreground\
    \ color. |\n| `contrast(factor : Number) : Nothing` | Increases or decreases contrast\
    \ level of the picture. The parameter ranges from -1 to +1. |\n| `desaturate :\
    \ Nothing` | Converts the picture to grayscale. |\n| `invert : Nothing` | Inverts\
    \ the intensity of each of the R, G, B color components |\n| `tint(color : Color)\
    \ : Nothing` | Converts the picture to grayscale, and then tints with the supplied\
    \ color |\n\nThe final picture will no longer have any variations in intensity.\
    \ All pixels of the foreground color have the same intensity, as do all those\
    \ with the background color.\n\nThe `invert` method produces a result similar\
    \ to a color negative, as would be observed with a 35mm camera using chemically\
    \ developed color film. (This is a type of camera which is becoming rare.)\n\n\
    #### Picture overlaying\n\nThe next section in this chapter, section 6.3, is all\
    \ about drawing text, lines and various shapes on top of a picture. What about\
    \ superimposing another picture on top of a picture? That facility is provided\
    \ by the `blend` method. It is called blend as opposed to ‘superimpose’ say, because\
    \ one of the method’s parameters chooses the opacity of the overlaid image. By\
    \ choosing a low degree of opacity, the image at the bottom can be seen through\
    \ the image on the top – achieving a blending of the two images.\n\nThe following\
    \ few lines of code illustrate the concept.\n\n```\nvar pic1 := media → choose\
    \ picture\nvar w := pic1 → width\nvar h := pic1 → height\nvar pic2 := media →\
    \ choose picture\npic2 → resize( w*0.5, h*0.5 )\npic1 → blend( pic2, w*0.3, h*0.2,\
    \ 30, 0.7 )\npic1 → post to wall\n```\n\nThe relationship of the two pictures\
    \ to each other is illustrated in Figure [6-3](#text00006.html#Fig3).\n\n![A978-1-4302-6137-7_6_Fig3_HTML.jpg](Image00039.jpg)\n\
    \n**Figure 6-3**  \nBlending two pictures\n\nThe top left corner of `pic2` is\
    \ located at the x,y coordinates given by the second and third arguments to `blend`.\
    \ This picture is rotated clockwise by the number of degrees given by the fourth\
    \ argument. The opacity of the picture has been set at 0.7, which means that in\
    \ the overlaid region, each pixel is a blend of 70% from `pic2` and 30% from `pic1`.\
    \ Finally, the bottom right of `pic2` has been clipped to fit within `pic1`.\n\
    \n## 6.3 Static graphics drawing and display\n\nA picture can be a photograph,\
    \ a drawing, or a combination of the two. The methods provided by the `Picture`\
    \ datatype for drawing lines and shapes are listed in Table [6-6](#text00006.html#Tab6).\n\
    \n**Table 6-6**  \nDrawing methods of the `Picture` datatype\n\n| Methods of `Picture`\
    \ | Description |\n| --- | --- |\n| `clear(color : Color)` | Sets all pixels to\
    \ the given color |\n| `draw ellipse(left: Number, top: Number, width: Number,\
    \ height : Number, angle : Number, c: Color, thickness: Number)` | Draws an ellipse;\
    \ its bounding rectangle has the given width and height and is located at the\
    \ specified position; its orientation is rotated clockwise by the angle given;\
    \ the line has the color and thickness specified. |\n| `draw line(x1: Number,\
    \ y1: Number, x2: Number, y2: Number, color: Color, thickness : Number)` | Draws\
    \ a line from x1,y1 to x2,y2; the line has the color and thickness specified.\
    \ |\n| `draw rect(left : Number, top : Number, width : Number, height : Number,\
    \ angle : Number, c : Color, thickness : Number)` | Draws a rectangle which has\
    \ the width and height provided and is located at the specified position; its\
    \ orientation is rotated clockwise by the angle given; the line has the color\
    \ and thickness specified. |\n| `draw text(left : Number, top : Number, text :\
    \ String, font size : Number, angle : Number, color : Color)` | Writes text at\
    \ the position specified, at the given font size and in the specified color; the\
    \ text is rotated clockwise by the angle given |\n| `fill ellipse(left : Number,\
    \ top : Number, width : Number, height : Number, angle : Number, color : Color)`\
    \ | Like `draw ellipse` except that it is a solid (filled) ellipse. |\n| `fill\
    \ rect(left : Number, top : Number, width : Number, height : Number, angle : Number,\
    \ color : Color)` | Like `draw rect` except that it is a solid (filled) rectangle.\
    \ |\n\nIn addition to these, there is the `set pixel` method which has already\
    \ been covered and also the `create picture` method of the `media` resource for\
    \ creating a new empty picture as illustrated below. All pixels in the new picture\
    \ are colored white.\n\n```\n// create picture 400 pixels wide, 200 pixels high\n\
    var pic := media → create picture( 400, 200 )\n```\n\nFigure [6-4](#text00006.html#Fig4)\
    \ shows how the parameters of the `draw ellipse` method control the placement\
    \ and orientation of the ellipse within a picture. An ellipse fits within a bounding\
    \ rectangle, as drawn, and it is the width and height of that rectangle which\
    \ are specified as arguments of the method.\n\n![A978-1-4302-6137-7_6_Fig4_HTML.jpg](Image00040.jpg)\n\
    \n**Figure 6-4**  \nUsing the `draw ellipse` method\n\nThe left and top parameters\
    \ provide the x, y coordinates of the top left corner of that bounding rectangle.\
    \ Note that y coordinate values are measured downwards from the top of the picture.\n\
    \nA circle is a special case of an ellipse. Most graphics drawing software would\
    \ draw a circle of a given radius and with its center at a specified position.\
    \ To use the `draw ellipse` method, some extra arithmetic is needed. An action\
    \ which accepts radius and the position of the center would be programmed as follows.\n\
    \n```\n// Draws a circle with radius r and center at x, y.\naction Draw Circle(\
    \ pic: Picture, r: Number, x: Number, y: Number,\n     thickness: Number, color:\
    \ Color )\n  pic → draw ellipse( x-r, y-r, r*2, r*2, 0, color, thickness )\n```\n\
    \nDrawing rectangles and filled versions of ellipses and rectangles is handled\
    \ similarly; further explanation should not be needed."
  raw: '#### Picture colorizing effects


    The colors, the contrast and the brightness of a picture can all be modified using
    more methods of the `Picture` type which are listed in Table [6-5](#text00006.html#Tab5)
    .


    The `brightness` method can be used to increase or decrease the luminosities of
    all the pixels in the image in unison, so that the picture appears brighter or
    darker. The `contrast` method can be used to increase or decrease the range of
    luminosities, so that there is greater or smaller contrast between light and dark
    regions.


    The `colorize` method is intended for creating a two color image from a greyscale
    image. All pixels darker than a specified threshold value (a number in the range
    0.0 to 1.0) are replaced by the background color, while all those brighter are
    replaced by the foreground color. The method can also be applied to color images,
    but that image is converted to grayscale before the colorization is applied.


    Table 6-5


    Colorizing/intensity picture effects


    | Methods of Picture | Description |

    | --- | --- |

    | `brightness(factor : Number) : Nothing` | Increases of decreases the brightness
    of the picture. The parameter ranges from -1 to +1. |

    | `colorize(background : Color, foreground : Color, threshold : Number) : Nothing`
    | Changes the picture to a two color scheme. Pixels darker than threshold become
    the background color, those brighter become the foreground color. |

    | `contrast(factor : Number) : Nothing` | Increases or decreases contrast level
    of the picture. The parameter ranges from -1 to +1. |

    | `desaturate : Nothing` | Converts the picture to grayscale. |

    | `invert : Nothing` | Inverts the intensity of each of the R, G, B color components
    |

    | `tint(color : Color) : Nothing` | Converts the picture to grayscale, and then
    tints with the supplied color |


    The final picture will no longer have any variations in intensity. All pixels
    of the foreground color have the same intensity, as do all those with the background
    color.


    The `invert` method produces a result similar to a color negative, as would be
    observed with a 35mm camera using chemically developed color film. (This is a
    type of camera which is becoming rare.)


    #### Picture overlaying


    The next section in this chapter, section 6.3, is all about drawing text, lines
    and various shapes on top of a picture. What about superimposing another picture
    on top of a picture? That facility is provided by the `blend` method. It is called
    blend as opposed to ‘superimpose’ say, because one of the method’s parameters
    chooses the opacity of the overlaid image. By choosing a low degree of opacity,
    the image at the bottom can be seen through the image on the top – achieving a
    blending of the two images.


    The following few lines of code illustrate the concept.


                   `var` `pic1 := media` → `choose picture`


                   `var` `w := pic1` → `width`


                   `var` `h := pic1` → `height`


                   `var` `pic2 := media` → `choose picture`


                   `pic2` → `resize( w*0.5, h*0.5 )`


                   `pic1` → `blend( pic2, w*0.3, h*0.2, 30, 0.7 )`


                   `pic1` → `post to wall`


    The relationship of the two pictures to each other is illustrated in Figure [6-3](#text00006.html#Fig3)
    .


    ![A978-1-4302-6137-7_6_Fig3_HTML.jpg](Image00039.jpg)


    Figure 6-3


    Blending two pictures


    The top left corner of `pic2` is located at the x,y coordinates given by the second
    and third arguments to `blend` . This picture is rotated clockwise by the number
    of degrees given by the fourth argument. The opacity of the picture has been set
    at 0.7, which means that in the overlaid region, each pixel is a blend of 70%
    from `pic2` and 30% from `pic1` . Finally, the bottom right of `pic2` has been
    clipped to fit within `pic1` .


    ## 6.3 Static graphics drawing and display


    A picture can be a photograph, a drawing, or a combination of the two. The methods
    provided by the `Picture` datatype for drawing lines and shapes are listed in
    Table [6-6](#text00006.html#Tab6) .


    Table 6-6


    Drawing methods of the Picture datatype


    | Methods of Picture | Description |

    | --- | --- |

    | clear(color : Color) | Sets all pixels to the given color |

    | draw ellipse(left: Number, top: Number, width: Number, height : Number, angle
    : Number, c: Color, thickness: Number) | Draws an ellipse; its bounding rectangle
    has the given width and height and is located at the specified position; its orientation
    is rotated clockwise by the angle given; the line has the color and thickness
    specified. |

    | draw line(x1: Number, y1: Number, x2: Number, y2: Number, color: Color, thickness
    : Number) | Draws a line from x1,y1 to x2,y2; the line has the color and thickness
    specified. |

    | draw rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, c : Color, thickness : Number) | Draws a rectangle which has the width
    and height provided and is located at the specified position; its orientation
    is rotated clockwise by the angle given; the line has the color and thickness
    specified. |

    | draw text(left : Number, top : Number, text : String, font size : Number, angle
    : Number, color : Color) | Writes text at the position specified, at the given
    font size and in the specified color; the text is rotated clockwise by the angle
    given |

    | fill ellipse(left : Number, top : Number, width : Number, height : Number, angle
    : Number, color : Color) | Like draw ellipse except that it is a solid (filled)
    ellipse. |

    | fill rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, color : Color) | Like draw rect except that it is a solid (filled) rectangle.
    |


    In addition to these, there is the `set pixel` method which has already been covered
    and also the `create picture` method of the `media` resource for creating a new
    empty picture as illustrated below. All pixels in the new picture are colored
    white.


                   `// create picture 400 pixels wide, 200 pixels high`


                   `var` `pic := media` → `create picture( 400, 200 )`


    Figure [6-4](#text00006.html#Fig4) shows how the parameters of the `draw ellipse`
    method control the placement and orientation of the ellipse within a picture.
    An ellipse fits within a bounding rectangle, as drawn, and it is the width and
    height of that rectangle which are specified as arguments of the method.


    ![A978-1-4302-6137-7_6_Fig4_HTML.jpg](Image00040.jpg)


    Figure 6-4


    Using the draw ellipse method


    The left and top parameters provide the x, y coordinates of the top left corner
    of that bounding rectangle. Note that y coordinate values are measured downwards
    from the top of the picture.


    A circle is a special case of an ellipse. Most graphics drawing software would
    draw a circle of a given radius and with its center at a specified position. To
    use the `draw ellipse` method, some extra arithmetic is needed. An action which
    accepts radius and the position of the center would be programmed as follows.


                   `// Draws a circle with radius r and center at x, y.`


                   `action` `Draw Circle( pic: Picture, r: Number, x: Number, y: Number,`


                        `thickness: Number, color: Color )`


                      `pic` → `draw ellipse( x-r, y-r, r*2, r*2, 0, color, thickness
    )`


    Drawing rectangles and filled versions of ellipses and rectangles is handled similarly;
    further explanation should not be needed.'
  trans: "\n#### 图片着色效果\n\n通过使用 `Picture` 类型的更多方法，可以修改图片的颜色、对比度和亮度，具体方法见表 6-5。\n\n\
    `brightness` 方法可用于统一增加或减少图像中所有像素的亮度，从而使图片看起来更亮或更暗。`contrast` 方法可用于增加或减少亮度范围，从而使明亮区域与黑暗区域之间的对比度更大或更小。\n\
    \n`colorize` 方法旨在从灰度图像创建双色图像。所有像素暗于指定阈值（范围为 0.0 到 1.0 之间的数字）的像素将被背景色替换，而所有像素亮于阈值的像素则被前景色替换。该方法也可应用于彩色图像，但在应用着色效果之前，该图像会被转换为灰度图像。\n\
    \n**表 6-5**  \n着色/强度图像效果\n\n| `Picture` 的方法 | 描述 |\n| --- | --- |\n| `brightness(factor\
    \ : Number) : Nothing` | 增加或减少图片的亮度。参数范围从 -1 到 +1。 |\n| `colorize(background :\
    \ Color, foreground : Color, threshold : Number) : Nothing` | 将图片更改为双色方案。像素暗于阈值的变为背景色，亮于阈值的变为前景色。\
    \ |\n| `contrast(factor : Number) : Nothing` | 增加或减少图片的对比度级别。参数范围从 -1 到 +1。 |\n\
    | `desaturate : Nothing` | 将图片转换为灰度。 |\n| `invert : Nothing` | 反转每个 R、G、B 颜色分量的强度。\
    \ |\n| `tint(color : Color) : Nothing` | 将图片转换为灰度，然后用提供的颜色着色。 |\n\n最终图片将不再有任何强度变化。所有前景色像素具有相同的强度，所有背景色像素也同样具有相同的强度。\n\
    \n`invert` 方法会产生类似于彩色负片的效果，就像使用 35 毫米相机搭配化学显影彩色胶卷所观察到的那样。（这是一种正变得罕见的相机类型。）\n\n\
    #### 图片叠加\n\n本章下一节，即第 6.3 节，将重点介绍在图片上绘制文本、线条和各种形状。那么在一张图片上叠加另一张图片呢？该功能由 `blend`\
    \ 方法提供。之所以称之为 blend 而不是“superimpose”，是因为该方法的一个参数可以控制叠加图像的不透明度。通过选择较低的不透明度程度，可以透过顶部图像看到底部图像——从而实现两幅图像的混合。\n\
    \n下面几行代码说明了这一概念。\n\n```\nvar pic1 := media → choose picture\nvar w := pic1 → width\n\
    var h := pic1 → height\nvar pic2 := media → choose picture\npic2 → resize( w*0.5,\
    \ h*0.5 )\npic1 → blend( pic2, w*0.3, h*0.2, 30, 0.7 )\npic1 → post to wall\n\
    ```\n\n两幅图片之间的相互关系如图 6-3 所示。\n\n![A978-1-4302-6137-7_6_Fig3_HTML.jpg](img/Image00039.jpg)\n\
    \n**图 6-3**  \n混合两幅图片\n\n`pic2` 的左上角位于 `blend` 方法第二和第三个参数给定的 x、y 坐标处。该图片按第四个参数给定的角度顺时针旋转。图片的不透明度设置为\
    \ 0.7，这意味着在叠加区域，每个像素是 70% 来自 `pic2` 和 30% 来自 `pic1` 的混合。最后，`pic2` 的右下角被裁剪以适应 `pic1`\
    \ 的范围。\n\n## 6.3 静态图形绘制与显示\n\n图片可以是照片、绘图或两者的结合。`Picture` 数据类型提供的用于绘制线条和形状的方法列于表\
    \ 6-6 中。\n\n**表 6-6**  \n`Picture` 数据类型的绘制方法\n\n| `Picture` 的方法 | 描述 |\n| ---\
    \ | --- |\n| `clear(color : Color)` | 将所有像素设置为指定颜色。 |\n| `draw ellipse(left: Number,\
    \ top: Number, width: Number, height : Number, angle : Number, c: Color, thickness:\
    \ Number)` | 绘制一个椭圆；其边界矩形具有给定的宽度和高度，并位于指定位置；其方向按给定角度顺时针旋转；线条具有指定的颜色和粗细。 |\n| `draw\
    \ line(x1: Number, y1: Number, x2: Number, y2: Number, color: Color, thickness\
    \ : Number)` | 从 x1,y1 到 x2,y2 绘制一条线；线条具有指定的颜色和粗细。 |\n| `draw rect(left : Number,\
    \ top : Number, width : Number, height : Number, angle : Number, c : Color, thickness\
    \ : Number)` | 绘制一个矩形，该矩形具有提供的宽度和高度，并位于指定位置；其方向按给定角度顺时针旋转；线条具有指定的颜色和粗细。 |\n| `draw\
    \ text(left : Number, top : Number, text : String, font size : Number, angle :\
    \ Number, color : Color)` | 在指定位置写入文本，使用给定的字号和指定的颜色；文本按给定角度顺时针旋转。 |\n| `fill ellipse(left\
    \ : Number, top : Number, width : Number, height : Number, angle : Number, color\
    \ : Color)` | 类似于 `draw ellipse`，但这是一个实心（填充）椭圆。 |\n| `fill rect(left : Number,\
    \ top : Number, width : Number, height : Number, angle : Number, color : Color)`\
    \ | 类似于 `draw rect`，但这是一个实心（填充）矩形。 |\n\n除了这些方法之外，还有已介绍过的 `set pixel` 方法，以及 `media`\
    \ 资源的 `create picture` 方法，用于创建一个新的空白图片，如下所示。新图片中的所有像素均为白色。\n\n```\n// 创建一个宽度为\
    \ 400 像素、高度为 200 像素的图片\nvar pic := media → create picture( 400, 200 )\n```\n\n\
    图 6-4 展示了 `draw ellipse` 方法的参数如何控制椭圆在图片中的放置和方向。椭圆适合在一个边界矩形内，如上图所示，该矩形的宽度和高度正是作为该方法参数指定的值。\n\
    \n![A978-1-4302-6137-7_6_Fig4_HTML.jpg](img/Image00040.jpg)\n\n**图 6-4**  \n使用\
    \ `draw ellipse` 方法\n\nleft 和 top 参数提供了该边界矩形左上角的 x、y 坐标。请注意，y 坐标值是从图片顶部向下测量的。\n\
    \n圆形是椭圆的一种特殊情况。大多数图形绘制软件会绘制一个给定半径、圆心在指定位置的圆。要使用 `draw ellipse` 方法，需要一些额外的算术运算。一个接受半径和圆心位置的操作可以按如下方式编程。\n\
    \n```\n// 绘制一个半径为 r、圆心在 x, y 的圆。\naction Draw Circle( pic: Picture, r: Number,\
    \ x: Number, y: Number,\n     thickness: Number, color: Color )\n  pic → draw\
    \ ellipse( x-r, y-r, r*2, r*2, 0, color, thickness )\n```\n\n绘制矩形以及椭圆和矩形的填充版本的处理方式类似，无需进一步解释。\n"
- fmt: "# 6.4 Playing videos from the internet\n\nVideo files tend to be very large.\
    \ You should think before storing one on a device with limited memory, such as\
    \ a phone. Videos held on the phone can be created by using the phone’s camera\
    \ or by being copied from a PC when the phone is synchronized.\n\n`TouchDevelop`\
    \ does not provide access to video files held on a smartphone. Nor can a script\
    \ download a video file to the phone. However a script can access and play videos\
    \ which are streamed from the internet.\n\nGiven the URL of a video file which\
    \ is in a format that the device can play, a `TouchDevelop` script can open and\
    \ play that file. The supported video formats can depend on the particular model\
    \ of device in use. However most video files with the filename suffix `'.mp4'`\
    \ should work. (An H.264 encoded MP4 file is the format which works on every Windows\
    \ phone, for example.)\n\nGiven the URL, a direct way to play the video is as\
    \ follows.\n\n```\n// url is a String variable holding the URL of the file\nweb\
    \ → play media( url )\n```\n\nIt displays the video using the entire window. The\
    \ back button can be used to stop the video.\n\nAn alternative means of playing\
    \ the video is to create a `Link` value. Some sample code is as follows.\n\n```\n\
    // url is a String variable holding the URL of the file\nvar lnk := web → link\
    \ media( url )\n…\nif not lnk → is invalid then\n    lnk → post to wall\n    “Tap\
    \ video link to play it” → post to wall\nelse\n    (“Could not access url “ ||\
    \ url) → post to wall\n```\n\nThe second approach shown above allows a script\
    \ to show a list of links on the screen, allowing the user to select which one\
    \ to play.\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
