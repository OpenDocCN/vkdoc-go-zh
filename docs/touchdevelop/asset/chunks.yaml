    # 11. Authenticating Web Services


    [11.1 Registering your app](#text00011.html#Sec1) [11.2 Authenticating](#text00011.html#Sec2)
    [11.3 Libraries](#text00011.html#Sec3) [11.4 Advanced topics](#text00011.html#Sec4)


    There are many web services on the internet which allow client applications to
    query and store all kinds of structured information. Some web services require
    the user to authenticate in order to use protected resources.


    ## 11.1 Registering your app


    A common source of web service calls is to Facebook’s Graph API[¹](#text00011.html#Fn1)
    . With this API, you can query and submit pictures, status updates, comments,
    and more. All interactions are done on behalf of a particular Facebook user. The
    user has to give permission to the application to access any part of the user’s
    information.


    OAuth v2.0 is a common authentication mechanism for web services supported by
    Microsoft, Facebook, Google, and other companies. TouchDevelop supports the OAuth
    2.0 Implicit Grant flow protocol as defined in section 4.2 of the specification
    ([http://​tools.​ietf.​org/​html/​rfc6749](http://tools.ietf.org/html/rfc6749)
    ). Other protocols are not currently supported. After having negotiated an access
    token for a protected web services, TouchDevelop offers the ability to process
    and create structured data in formats such as JSON and XML.


    Before you can use the OAuth mechanism to access a web service, you need to register
    the app you are working on with the provider of the web service. Every web service
    has its own registration mechanism; you must find and follow the instructions
    provided by the service you want to use.


    Somewhere during the registration process you will be asked for a “redirect URI”.
    You MUST enter the following redirect URI precisely.


       [`https://www.touchdevelop.com/[userid]/oauth`](https://www.touchdevelop.com/%5buserid%5d/oauth)


    where `[userid]` is your TouchDevelop user id. This is a short letter combination
    such as `pboj` which happens to be the userid for the TouchDevelop Samples user.
    Point your browser at [https://​www.​touchdevelop.​com/​me](https://www.touchdevelop.com/me)
    to find out your user id. You will be redirected to a new URL, possibly after
    being asked to log in. The new URL has the form [https://​www.​touchdevelop.​com/​[userid](https://www.touchdevelop.com/%5buserid)
    ].


    Only TouchDevelop scripts published under your account will be able to use this
    redirect URI. See the later section on unique redirect URIs for instructions on
    how to handle the situation where the OAuth provider you want to use requires
    unique URIs for each application.'
