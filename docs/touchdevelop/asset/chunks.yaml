    \ structured data](#text00004.html#Sec11) [4.4 REST guidelines and web requests](#text00004.html#Sec14)\n\
    \nKeywords: Text File, Document Type Definition, Window, Phone, Additional Script,\
    \ Delete Request\n\nMost mobile devices can be connected to the internet, either\
