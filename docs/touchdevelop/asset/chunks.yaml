  trans: "\n# 11.2 身份验证\n\nOAuth 2.0 身份验证通过 `web` → `oauth v2` 动作处理。该动作接收 OAuth URL，其中包含\
    \ `client_id` 以及可选的 scope 或其他参数。请**不要**包含 `state` 和 `redirect_uri` 参数；它们由 TouchDevelop\
    \ 自动添加。\n\n```\nvar oauth res := web → oauth v2(url)\n```\n\n响应中包含访问令牌或错误详情（如有）。然后，您可以根据服务要求，使用该访问令牌对每个请求进行签名。\n\
    \n```\nvar access token := oauth res → access token\nvar call := \"http://....?access_token=\"\
    \ ∥ web → url encode(access token)\n```\n\n您可以使用 `is expiring` 动作轻松测试访问令牌是否缺失或（即将过期）。\n\
    \n```\nif oauth res → is expiring(100) then\n     // 糟糕，最好请求一个新令牌。\nelse do nothing\n\
    ```\n\n**表 11-2**  \nOAuth 响应类型的属性\n\n| 方法 | 描述 |\n| --- | --- |\n| `access token\
    \ : String` | 授权服务器颁发的访问令牌。 |\n| `error : String` | 单个 ASCII [USASCII] 错误代码。 |\n\
    | `error description : String` | （可选）一个人可读的错误代码。 |\n| `error uri : String` | （可选）一个\
    \ URI，用于标识包含错误信息的人可读网页，用于向客户端开发者提供有关错误的附加信息。 |\n| `expires in : Number` | （可选）访问令牌的生命周期（秒）。\
    \ |\n| `is error : Boolean` | 指示此响应是否为错误。 |\n| `is expiring(lookup : Number) :\
    \ Boolean` | （可选）指示令牌是否可能在接下来的若干秒内过期。 |\n| `is invalid : Boolean` | 如果当前实例无用，则返回\
    \ true。 |\n| `others : String Map` | （可选）OAuth 2.0 规范未涵盖的其他键值对。 |\n| `post to\
    \ wall` | 显示该响应。 |\n| `action scope : String` | （可选）如果与客户端请求的 scope 相同，则为可选；否则，为访问令牌的\
    \ scope，如 OAuth 2.0 规范第 3.3 节所述。 |\n\n**表 11-1**  \n与 OAuth 2.0 相关的通用方法\n\n| 方法\
    \ | 描述 |\n| --- | --- |\n| `web → oauth v2(oauth url : String) : OAuth Response`\
    \ | 使用 OAuth 2.0 进行身份验证，并接收访问令牌或错误。 |\n\n图 11-1 展示了如何使用 TouchDevelop 提供的 OAuth\
    \ 功能来向 Facebook 发布消息：\n\n1.  它构建一个 URL，该 URL 将针对特定的“scope”（定义了您的应用请求何种权限）触发您应用的\
    \ Facebook 身份验证过程。\n2.  然后，它发送包含待发布文本的实际消息。请注意，不仅消息文本被编码在 URL 中，而且先前的身份验证调用所获得的\
    \ `access_token` 也被编码在 URL 中。\n\n如果您使用不同的网络服务，或想要发布其他类型的信息，可能需要将 `access_token`\
    \ 传递到网络请求的头部字段中，并且可能必须将有效负载作为 POST 网络请求的主体发送。请查阅您要使用的网络服务的文档。\n\n![A978-1-4302-6137-7_11_Fig1_HTML.jpg](img/Image00057.jpg)\n\
    \n**图 11-1**  \n使用 OAuth 向 Facebook 发布消息\n\n# 11.3 库\n\n以下 TouchDevelop 库已经为多个\
    \ API 实现了 OAuth 2.0 身份验证。每个库都包含关于如何注册应用程序以便使用它们的详细说明。只需在“添加库引用”对话框中搜索库的名称即可。\n\
    \n- Microsoft Live\n- Facebook\n- Google\n- Yammer\n- FourSquare\n- Instagram\n\
    - Meetup\n\n图 11-2 展示了如何使用 TouchDevelop 提供的 Facebook 库在 Facebook 上发布消息。在使用 `♻\
    \ facebook` 表达式之前，您必须在脚本中添加对 Facebook 库的引用。\n\n![A978-1-4302-6137-7_11_Fig2_HTML.jpg](img/Image00058.jpg)\n\
    \n**图 11-2**  \n使用 Facebook 库\n\n# 11.4 高级主题\n\n## 11.4.1 唯一重定向 URI\n\n某些 OAuth\
    \ 提供商（例如 Microsoft Live）要求每个应用程序使用具有唯一域名的唯一重定向 URI。在这种情况下，仅特定于您用户 ID 的基本重定向 URI\
    \ 将不起作用。相反，您可以使用以下重定向 URI 方案：\n\n```\nhttps://[rdid]-[userid].users.touchdevelop.com/oauth\n\
    ```\n\n其中，`[rdid]` 是您可以为应用选择的唯一标识符（“重定向域名 ID”，少于 64 个小写字母数字 ASCII 字符），而 `[userid]`\
    \ 和以前一样是您的 TouchDevelop 用户 ID。\n\n```\noauth res := web → oauth v2(url ∥ \"&tdredirectdomainid=[rdid]\"\
    )\n```\n\n将身份验证 URL 传递给 `web` → `oauth v2` 时，请添加一个 `tdredirectdomainid` 查询参数来指定您的\
    \ `[rdid]`。\n\n## 11.4.2 重定向 URI 中的状态变量\n\n某些 OAuth 提供商无法在重定向 URI 中传递 `state`\
    \ 参数，这会破坏 TouchDevelop 的 OAuth 支持。在这种情况下，请向身份验证 URL 添加一个 `tdstateinredirecturi=true`\
    \ 查询参数。\n\n```\noauth res := web → oauth v2(url ∥ \"&tdstateinredirecturi=true\"\
    )\n```\n\n![知识共享许可协议](https://creativecommons.org/licenses/by-nc-nd/4.0) 开放获取\
    \ 本章根据知识共享署名-非商业性使用-禁止演绎 4.0 国际许可协议 ([`creativecommons.org/licenses/by-nc-nd/4.0/`](http://creativecommons.org/licenses/by-nc-nd/4.0/))\
    \ 的条款进行许可，该许可允许任何非商业用途，只要您给予原作者和出处适当的署名，提供知识共享许可协议的链接，并指明是否修改了许可材料，即可在任何媒介或格式中共享、分发和复制。您没有在本许可下分享源自本章或其部分内容的改编材料的权限。本章中的图片或其他第三方材料已包含在本章的知识共享许可协议中，除非在材料的署名行中另有说明。如果材料未包含在本章的知识共享许可协议中，且您的预期使用不受法定法规允许或超出允许范围，您将需要直接向版权所有者获取许可。脚注\
    \ 1\n\n[`developers.facebook.com/docs/reference/api/`](http://developers.facebook.com/docs/reference/api/)\n\
    \n# 编辑 TouchDevelop 脚本\n\nA.1 起始点  \nA.2 编辑步骤  \nA.3 额外步骤  \nA.4 更多高级编辑功能  \n\
    关键词：主要动作、插入点、编辑动作、浏览器窗口、脚本编辑器\n\n本附录提供了一个使用在浏览器内运行的编辑器创建 TouchDevelop 脚本的实际示例。它无法涵盖编辑器的所有功能。建议进行一些尝试以熟悉该编辑器。要输入的脚本如图\
    \ A-1 所示。它以名称 rotor 和代码名称 `/gtbd` 发布。\n\n![A978-1-4302-6137-7_12_Fig1_HTML.jpg](img/Image00059.jpg)\n\
    \n**图 A-1**  \nrotor 程序 `/gtbd`\n"
- fmt: "## A.1 The starting point\n\nOnce you have signed into the TouchDevelop website,\
    \ your current webpage is a page with the URL [`https://www.touchdevelop.com/app/`](https://www.touchdevelop.com/app/)\
    \ `#`. This webpage is known as the hub.\n\nIn the top left of the hub, there\
    \ should be a collection of tiles under the heading my scripts. If you have previously\
    \ created or downloaded some scripts, there will be tiles for the more recent\
    \ ones. If you wish to edit one of these scripts, just tap its tile and then tap\
    \ the large orange tile labeled edit. If you don’t see a tile for your previously\
    \ created or downloaded script, tap the tile labeled See More and the browser\
    \ will display a webpage which contains tiles for many more scripts, plus a button\
    \ at the end of the list which reads load more. Tapping that button performs as\
    \ advertised, extending the list with more tiles plus a new load more button at\
    \ the end.\n\nFor our example, we are creating a completely new script so we tap\
    \ the tile labeled Create Script. This causes the browser to display a scrollable\
    \ list of script templates. The top portion of the list is shown in Figure [A-2](#text00012.html#Fig2).\
    \ We should look through the list to see if there is a template for the kind of\
    \ script we wish to create. For our example, we tap the template named blank because\
    \ none of the other templates seems to be appropriate.\n\nThe browser now displays\
    \ a textbox into which we should enter a name for the new script. A default name\
    \ reading something like ‘my script 5’ has been provided in the textbox, but we\
    \ will change it to read ‘rotor’. Having entered that text, we tap the button\
    \ labeled create.\n\nThe browser now displays the webpage for the TouchDevelop\
    \ script editor. As seen in the screenshot shown in Figure [A-3](#text00012.html#Fig3),\
    \ the webpage is divided into three columns.\n\n*   A narrow left column contains\
    \ buttons labeled my scripts, run and undo. That undo button is very useful because\
    \ it undoes the effect of any editing action performed by mistake.\n*   A wider\
    \ second column has a tile for the new script itself, tapping that tile brings\
    \ up a script properties page where the name of the script can be changed, along\
    \ with many other properties which are not needed until the script is finished.\n\
    \nThere are several headings below the initial tile, one for each possible section\
    \ of a script. Underneath heading, there would be a tile for every action, every\
    \ page, every event … which has been added to the script. At this point, there\
    \ is only a tile for an action named main.\n\n![A978-1-4302-6137-7_12_Fig3_HTML.jpg](Image00061.jpg)\n\
    \nFigure A-3 The editor webpage\n\n![A978-1-4302-6137-7_12_Fig2_HTML.jpg](Image00060.jpg)\n\
    \nFigure A-2 The first few script templates\n\n*   The remainder of the browser\
    \ window is devoted to the third column which is the editing window. When we start,\
    \ that window holds the code for the main action. A minimal version of the action\
    \ which does nothing has been provided in the template.\n\n## A.2 The editing\
    \ steps\n\nThe screen contents change many times as the editing steps detailed\
    \ below are followed. For space reasons, only a selection of the screenshots can\
    \ be included in this appendix.\n\n### Getting started – providing an input parameter\n\
    \nThe script for the main action will modified to have a parameter. Its code will\
    \ then be as follows.\n\n```\naction main( speed : Number )\ndo\n// do nothing\n\
    ```\n\n1.  If the code for the main action is not displayed, tap on the tile for\
    \ the main action underneath the code heading in the second column of the main\
    \ editor webpage (as in Figure [A-3](#text00012.html#Fig3)). \n2.  Our script\
    \ needs an input parameter for its main action, so tap anywhere on the first line\
    \ of the code for main – on the line which reads “`action main()`”. That changes\
    \ the second column of the webpage. \n3.  In the second column, there is a large\
    \ gray plus symbol and the words “add input parameter”. Tap that plus symbol.\
    \ The code for main shown in the third hand column instantly changes to show an\
    \ input parameter named `p` with type `Number`. \n4.  We do not want to keep the\
    \ name `p` for that parameter, so tap anywhere in the line of code where `p: Number`\
    \ appears. The webpage changes so that the second column displays details of parameter\
    \ p and the third column indicates which part of the script we are focused on.\
    \ \n5.  In the second column, the parameter’s name `p` appears in a textbox whose\
    \ contents can be edited. Select that name `p` using the mouse or a finger on\
    \ a touchscreen, and enter the replacement name: speed. (The editor guessed the\
    \ correct type for the parameter, so it does not need to be changed. If we had\
    \ wanted a different type, tapping the tile for the Number type would allow us\
    \ to select an alternative.) Tap anywhere in the third column, and the code is\
    \ redisplayed showing the new parameter name.\n\n### Adding the first statement\
    \ to the action\n\nThe first statement to be inserted is `◳rate := speed`\n\n\
    ![A978-1-4302-6137-7_12_Fig5_HTML.jpg](Image00063.jpg)\n\nFigure A-5 The right\
    \ keypad\n\n![A978-1-4302-6137-7_12_Fig4_HTML.jpg](Image00062.jpg)\n\nFigure A-4\
    \ The left keypad\n\n1.  Tap anywhere in the comment which reads do nothing. This\
    \ causes the comment to disappear and be replaced with a vertical bar which indicates\
    \ the insertion point for subsequent editing actions. More importantly, two keypads\
    \ appear side-by-side at the bottom of the browser window. The two keypads are\
    \ shown in Figure [A-4](#text00012.html#Fig4) and Figure [A-5](#text00012.html#Fig5).\
    \ The left keypad is used for entering or editing constants (numbers, strings\
    \ and Booleans). The right keypad is used for entering statements and expressions.\
    \ \n2.  The top row of the right-hand keypad shows different kinds of statements.\
    \ We wish to insert an assignment to a new variable, so tap on the tile labeled\
    \ var. The code changes to show an assignment to a new variable named x where\
    \ the right-hand side is empty. The red bar is on the right side, indicating where\
    \ the editor will insert new items. See Figure [A-6](#text00012.html#Fig6). The\
    \ right keypad at the bottom of the window also changed; it now shows only items\
    \ which can appear at the current insertion point in the code. \n3.  One of the\
    \ tiles in the keypad is labeled speed. Tap that tile. The identifier speed gets\
    \ inserted into right side of the assignment. \n4.  The right side is complete,\
    \ but the left side is not the variable we wanted. Select the left side of the\
    \ assignment. This causes the insertion bar to appear just to the right of the\
    \ name x. In addition, the right keypad at the bottom of the screen has changed\
    \ again. There is a tile labeled rename. Tap it. \n5.  Enter the desired name\
    \ rate on the keyboard. And then tap anywhere below on the screen. The code for\
    \ the action is redisplayed showing the statement as `var rate := speed`. \n6.\
    \  We did not want rate to be a local variable, so tap anywhere in that statement\
    \ and then tap the left hand side. The insertion bar appears alongside the name\
    \ rate and the right keypad re-appears. \n7.  Tap the tile labeled promote to\
    \ `▯data`. This causes the code to be redisplayed, with the assignment now reading\
    \ `◳rate := speed`. The second column in the window has also changed; a global\
    \ variable named rate has appeared in the data section of the script."
