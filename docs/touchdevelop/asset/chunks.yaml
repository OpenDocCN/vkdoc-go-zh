    \ 图片 类型 字符串 变量 窗口 手机 摄像头 图片\n\n智能手机、平板电脑和笔记本电脑常用于显示照片和视频。TouchDevelop 脚本提供了下载、创建、修改和显示照片的新方式。脚本可用于通过设备的摄像头录制视频，并播放这些视频以及从其他地方获取的视频。\n\
    \n## 6.1 摄像头\n\n智能手机、平板电脑和大多数笔记本电脑至少配备一个能够拍摄高质量图片或视频的摄像头。这是主摄像头。在手机或平板电脑上，它通常位于屏幕的背面。许多此类设备在屏幕上方还配有第二个摄像头，用于捕捉用户图像，旨在用于视频通话，例如\
