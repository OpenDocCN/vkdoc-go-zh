  trans: '

    ## A.1 起点


    登录 TouchDevelop 网站后，你当前所在的网页是 URL 为 [`https://www.touchdevelop.com/app/`](https://www.touchdevelop.com/app/)
    `#` 的页面。此网页被称为中心页面。


    在中心页面的左上方，**我的脚本**标题下应该有一组磁贴。如果你之前创建或下载过一些脚本，这里会显示最近使用过的脚本的磁贴。如果你想要编辑其中某个脚本，只需点击其磁贴，然后点击标有
    **编辑** 的大型橙色磁贴。如果你没有看到之前创建或下载的脚本的磁贴，请点击标有 **查看更多** 的磁贴，浏览器将显示一个包含更多脚本磁贴的网页，列表末尾还有一个标有
    **加载更多** 的按钮。点击该按钮会按预期执行操作，用更多磁贴扩展列表，并在末尾添加一个新的 **加载更多** 按钮。


    在我们的示例中，我们将创建一个全新的脚本，因此点击标有 **创建脚本** 的磁贴。这会让浏览器显示一个可滚动的脚本模板列表。列表的顶部区域如图 A-2 所示。我们应该浏览列表，看看是否有我们想要创建的脚本类型的模板。在我们的示例中，我们点击名为
    **空白** 的模板，因为其他模板似乎都不合适。


    浏览器现在显示了一个文本框，我们需要在其中输入新脚本的名称。文本框中已提供了一个默认名称，类似于"我的脚本 5"，但我们将把它改为"rotor"。输入该文本后，我们点击标有
    **创建** 的按钮。


    浏览器现在显示 TouchDevelop 脚本编辑器的网页。如图 A-3 的截图所示，该网页分为三栏。


    *   较窄的左栏包含标有 **我的脚本**、**运行** 和 **撤销** 的按钮。**撤销** 按钮非常有用，因为它可以撤销任何误操作导致的编辑效果。

    *   较宽的第二栏有一个新脚本本身的磁贴，点击该磁贴会弹出一个脚本属性页面，可以在其中更改脚本的名称，以及许多其他属性，这些属性在脚本完成前暂时不需要用到。


    在初始磁贴下方有几个标题，分别对应脚本的每个可能部分。每个标题下，都会有一个磁贴代表已添加到脚本中的每个操作、每个页面、每个事件……等。目前，只有一个名为
    **main** 的操作的磁贴。


    ![A978-1-4302-6137-7_12_Fig3_HTML.jpg](img/Image00061.jpg)


    图 A-3 编辑器网页


    ![A978-1-4302-6137-7_12_Fig2_HTML.jpg](img/Image00060.jpg)


    图 A-2 最初的几个脚本模板


    *   浏览器窗口的其余部分专用于第三栏，即编辑窗口。开始时，该窗口包含主操作（main action）的代码。模板中提供了一个什么也不做的最小化版本的操作。


    ## A.2 编辑步骤


    在按照下面详述的编辑步骤操作时，屏幕内容会多次变化。出于篇幅考虑，本附录中只收录了部分截图。


    ### 开始操作 – 提供一个输入参数


    主操作（main action）的脚本将被修改，使其拥有一个参数。其代码将如下所示。


    ```

    action main( speed : Number )

    do

    // 什么都不做

    ```


    1.  如果主操作的代码没有显示，请点击主编辑器网页第二栏中 **代码** 标题下的主操作磁贴（如图 A-3 所示）。

    2.  我们的脚本需要为其主操作（main action）提供一个输入参数，因此请点击主操作代码第一行的任意位置——即写着 "`action main()`"
    的那一行。这将改变网页的第二栏。

    3.  在第二栏中，有一个大的灰色加号符号和文字"添加输入参数"。点击该加号符号。第三栏中显示的 main 代码会立即发生变化，显示一个名为 `p`、类型为
    `Number` 的输入参数。

    4.  我们不想保留参数的名称 `p`，因此请点击显示 `p: Number` 的代码行的任意位置。网页会随之变化，第二栏显示参数 p 的详细信息，第三栏则指示我们当前聚焦于脚本的哪个部分。

    5.  在第二栏中，参数的名称 `p` 显示在一个可编辑内容的文本框中。使用鼠标或触摸屏上的手指选中名称 `p`，并输入替换名称：speed。（编辑器已猜出了参数的正确类型，因此无需更改。如果我们想要不同的类型，点击
    `Number` 类型的磁贴将允许我们选择其他类型。）点击第三栏的任意位置，代码将重新显示，并带有新的参数名称。


    ### 向操作中添加第一条语句


    要插入的第一条语句是 `◳rate := speed`


    ![A978-1-4302-6137-7_12_Fig5_HTML.jpg](img/Image00063.jpg)


    图 A-5 右侧键盘


    ![A978-1-4302-6137-7_12_Fig4_HTML.jpg](img/Image00062.jpg)


    图 A-4 左侧键盘


    1.  点击写着"什么都不做"的注释的任意位置。这将导致注释消失，并替换为一个竖条，指示后续编辑操作的插入点。更重要的是，浏览器窗口底部会并排出现两个键盘。这两个键盘如图
    A-4 和图 A-5 所示。左侧键盘用于输入或编辑常量（数字、字符串和布尔值）。右侧键盘用于输入语句和表达式。

    2.  右侧键盘的顶行显示了不同类型的语句。我们希望插入一个对新变量的赋值，因此点击标有 **var** 的磁贴。代码会发生变化，显示对一个名为 x 的新变量的赋值，其右侧为空。红色条位于右侧，指示编辑器将在何处插入新项目。见图
    A-6。窗口底部的右侧键盘也发生了变化；现在只显示可以出现在代码当前插入点的项目。

    3.  键盘中有一个磁贴标有 **speed**。点击该磁贴。标识符 speed 被插入到赋值的右侧。

    4.  右侧已完成，但左侧并不是我们想要的变量。选中赋值的左侧。这会导致插入条出现在名称 x 的右侧。此外，屏幕底部的右侧键盘再次发生变化。有一个标有 **重命名**
    的磁贴。点击它。

    5.  在键盘上输入所需的名称 rate。然后点击屏幕下方任意位置。操作的代码会重新显示，语句显示为 `var rate := speed`。

    6.  我们不希望 rate 是一个局部变量，因此点击该语句的任意位置，然后点击左侧。插入条会出现在名称 rate 旁边，右侧键盘也会重新出现。

    7.  点击标有 **提升到`▯data`** 的磁贴。这将导致代码重新显示，赋值现在显示为 `◳rate := speed`。窗口中的第二栏也发生了变化；脚本的
    data 部分中出现了一个名为 rate 的全局变量。

