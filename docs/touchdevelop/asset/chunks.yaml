    \ `red` in the right keypad.\n5. Select the `else` keyword as the insertion point\
    \ and similarly insert the statement `sprite → set color(colors → blue)`.\n6.\
    \ Tap on the keyword `if` so that the whole `if` statement is enclosed within\
