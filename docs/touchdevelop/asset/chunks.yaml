  trans: '

    # TouchDevelop 生态系统


    使用 TouchDevelop 编辑器开发的脚本，可通过 TouchDevelop 云基础设施（位于[`https://www.touchdevelop.com`](https://www.touchdevelop.com/)）与其他用户共享。


    图 1-1 展示了 TouchDevelop 生态系统的高层架构概览：无论用户使用的是手机客户端还是浏览器客户端，所有诸如脚本之类的信息都会被检索并存储于
    `touchdevelop.com` 云服务中。


    ![A978-1-4302-6137-7_1_Fig1_HTML.jpg](img/Image00014.jpg)


    图 1-1


    TouchDevelop 生态系统


    TouchDevelop 脚本由用户在其设备上开发，并在 TouchDevelop 运行时环境中执行。这些脚本可以与其他用户共享。TouchDevelop
    云基础设施在一个 TouchDevelop 用户社区中支持这种共享。这些脚本还可以通过 TouchDevelop 网站进行搜索、查看并安装到用户账户中。云基础设施不仅支持共享，还充当了所有由用户开发并发布的脚本的存储库。


    TouchDevelop 网站为每个脚本在 [`http://touchdevelop.com`](http://touchdevelop.com/) 上分配了一个唯一的深层链接；每个脚本由一个看似随机的字母序列来标识。例如，[`https://www.touchdevelop.com/zpco`](https://www.touchdevelop.com/zpco)
    指向的是 TouchInvaders 游戏的一个特定版本，如图 1-2 所示。该链接可用于直接打开脚本。这个链接可以分享给其他人，或者发布到社交网络上。


    ![A978-1-4302-6137-7_1_Fig2_HTML.jpg](img/Image00015.jpg)


    图 1-2


    查看脚本的元数据


    如果用户喜欢某个脚本，他或她可以通过给予一个“爱心”形式的正面评价来表达对脚本或评论的赞赏。


    在任何客户端（手机或网页浏览器）上，用户都可以编辑脚本，如图 1-3 所示。


    ![A978-1-4302-6137-7_1_Fig3_HTML.jpg](img/Image00016.jpg)


    图 1-3


    编辑脚本


    ## 历史与未来


    2011 年 4 月发布 TouchDevelop 后，最初仅面向 Windows Phone 用户，其热烈的反响令我们惊讶。自那时起，已有超过 30 万人下载了该应用。起初，TouchDevelop
    仅限于在安装它的设备上创建脚本——用户无法与他人共享脚本。


    2011 年 8 月，TouchDevelop 更新至 v2.0 版本，通过 `touchdevelop.com` 云服务实现了脚本共享。此次更新还增加了更多社交功能，例如评论脚本、撰写评论、截取屏幕截图等。自那以后，超过
    9 万人注册了在线账户，并分享了超过 2.5 万个脚本，其中大部分完全是在手机上编写的。随着时间的推移，许多功能被陆续添加，使 TouchDevelop 成为一个日益强大的开发环境和编程语言。这些功能包括对代码复用的库支持以及自定义结构化数据类型。


    为了让脚本不仅在 TouchDevelop 环境内共享，还能与那些可能不了解 TouchDevelop 的人分享，我们增加了将脚本导出为可提交至 Windows
    Phone 商店的应用的功能。该功能自 2012 年 3 月起就已存在。


    2012 年 10 月，TouchDevelop 迈出了一大步。得益于完全的重写实现，TouchDevelop 现在不仅能在 Windows Phone 上运行，还能在几乎所有现代设备的浏览器中以
    Web 应用的形式运行。支持的平台包括 PC、Mac、iPhone、iPad、iPod Touch 和 Android。新的 TouchDevelop 实现利用了
    HTML5 和 JavaScript 的强大功能，同时仍沿用之前的编程语言。代码编辑器会根据屏幕尺寸动态调整，以适应智能手机的小屏幕、平板电脑的中等屏幕以及
    PC 的大屏幕。Web 应用的用户界面再次针对触摸屏进行了优化，但如果需要且可用，也支持使用键盘和鼠标。同时，我们还增加了将脚本导出为可提交至 Windows
    商店（这与 Windows Phone 商店是分开考虑的）的应用的功能。


    在不久的将来，适用于 Windows Phone 的 TouchDevelop 应用 v3.0 更新将为 Windows Phone 8 设备带来当前驱动
    TouchDevelop Web 应用的相同编辑和执行引擎。


    TouchDevelop 编程语言即将迎来的一项重要补充是“云端状态”这一概念。只需像在 C# 中将变量标记为“static”一样，将一个变量标记为“cloud”，应用就会转变为一个具有共享状态的分布式应用。对该变量的所有更改都将自动在不同设备和用户之间同步。


    ## 平台


    Windows Phone 有多种可选传感器。“近场通信”（NFC）、前置摄像头、后置摄像头、磁力计和陀螺仪可能存在于或不存在于任何给定的设备型号中。类似地，有些浏览器选择暴露某些传感器，而有些则不然。iOS
    上的 Safari 暴露了加速度计；Android 上的 Chrome 仅部分暴露；而 Internet Explorer 10 则完全不暴露。这种多样性很可能是由于
    HTML5 标准不断演进造成的；因此，希望随着时间的推移，所有浏览器都能支持越来越多的传感器。


    根据这些限制，以及你是在 Windows Phone 上运行原生 TouchDevelop 应用，还是在浏览器中运行 Web 应用，当你编写脚本时，可用的功能集将有所不同。有关不同平台功能的完整且最新的概述，请参见
    [`https://www.touchdevelop.com/platforms`](https://www.touchdevelop.com/platforms)。


    ### 在 Windows Phone 上安装 TouchDevelop


    如果要在 Windows Phone 上首次使用 TouchDevelop，则需要先进行安装。要安装该应用，请遵循以下步骤：


    1.  点击 Windows Phone 上的“商店”磁贴。

    2.  按屏幕底部的搜索图标，并在商店搜索文本框中输入文本 `touchdevelop`。在你输入完所有字母之前，TouchDevelop 应用应该会作为一个选项出现在屏幕上。

    3.  点击该选项以选中它。

    4.  点击“安装”。


    如果你的设备运行的是 Windows Phone 7、7.5 或 7.8 操作系统，那么你将获得 TouchDevelop v2.0，它使用的用户界面略有不同，与本书中的截图不符，并且其语言是本书所讨论内容的一个子集。


    如果你的设备运行的是 Windows Phone 8，那么你将获得 TouchDevelop v3.0，它与位于 [`https://www.touchdevelop.com/app`](https://www.touchdevelop.com/app)
    的 Web 应用类似，但它暴露了手机上更多可用的传感器和数据提供程序。


    ### 在其他平台上运行 TouchDevelop


    在所有其他平台上，TouchDevelop 并非作为应用商店中的应用出现，而是作为一个 Web 应用。你可以从网页浏览器中运行它：


    1.  转到 [`https://www.touchdevelop.com/`](https://www.touchdevelop.com/)

    2.  登录。你会被带到 Web 应用。

