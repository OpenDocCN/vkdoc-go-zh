  trans: '

    ## 8.4 电话呼叫


    脚本可以通过设置号码并将控制权移交给手机的通话软件，来准备发起一次电话呼叫。此功能由 API 中的 `phone` 资源提供。API 中相关的方法调用列于表
    8-6。


    表 8-6


    处理电话呼叫的方法


    | 方法 | 描述 |

    | --- | --- |

    | `phone → choose phone number: Link` | 打开手机的联系人列表，以便选择电话号码 |

    | `phone → dial phone number(number : String) : Nothing` | 使用提供的号码设置一个电话呼叫，但不会拨出该号码
    |

    | `phone → save phone number(phone number : String) : Nothing` | 打开手机的联系人列表，允许将该号码添加到现有联系人条目或新条目中
    |


    以下是一些示例代码，用于设置一个电话呼叫，以备发起连接：


    ```

    var link := phone → choose phone number

    phone → dial phone number( link → address)

    ```


    无法编写脚本来接听来电或录制通话中的音频片段。


    ## 8.5 二维条码


    TouchDevelop 提供了对 Microsoft Tag 服务的访问，该服务可为文本消息和 URL 生成二维条码。这些条码是正方形的图像，可以打印在文档或宣传材料上。大多数智能手机（无论是否为
    Windows 手机）都拥有扫描软件，使用户能够用手机摄像头对准条码，并自动显示文本或访问网页。


    条码生成方法由 `tags` 资源提供。其两个方法列于表 8-7。


    表 8-7


    条码生成方法


    | 方法 | 描述 |

    | --- | --- |

    | `tags → tag text(text : String, size : Number, bw : Boolean) : Picture` | 为文本（最多
    1000 个字符）生成条码；`size` 是图片的宽度和高度（以英寸为单位），必须在 0.75 到 5.0 范围内；如果 `bw` 为真，则生成黑白图像，否则为彩色图像。
    |

    | `tags → tag url(url : String, size : Number, bw : Boolean) : Picture` | 生成指向所提供
    URL 的条码；`size` 和 `bw` 的含义同上。 |


    以下示例代码生成并显示一个条码：


    ```

    var pic := tags → tag text(“TouchDevelop is cool!”, 1.0, false)

    pic → post to wall

    ```


    运行这两条语句的结果如图 8-1 左侧所示。当第三个参数改为 `true` 时的结果显示在右侧。两种版本的条码均可用于扫描软件。


    ![A978-1-4302-6137-7_8_Fig1_HTML.jpg](img/Image00047.jpg)


    图 8-1


    二维条码示例


    ## 8.6 短信消息（仅限 WP8）


    SMS 是短消息服务（Short Message Service）的缩写。它是由电话公司提供的一种文本消息服务。通常用于将消息从一部手机发送到另一部手机，尽管一些电话公司可能提供发送或接收消息的额外方法。SMS
    的原始标准将消息正文限制为最多 140 字节。（Twitter 社交网络服务也有相同的限制。）较长的消息会自动被分割成一系列短消息。


    TouchDevelop API 允许脚本生成一条准备发送的 SMS 消息，但不会实际发送它。用户必须执行一个额外的操作。


    以下是一些生成并准备发送 SMS 消息的脚本代码：


    ```

    var msg := “Come right now, the pizza has arrived”

    var recipient := “202 555 1234”

    social → send sms( recipient, msg )

    ```


    如果执行该脚本，手机的消息软件将被激活，并显示用于发送 SMS 消息的标准对话框，如图 8-2 所示。


    ![A978-1-4302-6137-7_8_Fig2_HTML.jpg](img/Image00048.jpg)


    图 8-2


    发送 SMS 消息


    ## 8.7 日历与约会（仅限 WP8）


    Windows 手机提供了一个日历，用于记录每一天的日程安排，其中包括各种会议或约会。


    手机的日历可能与一个或多个外部日历同步，例如 Windows Outlook 日历或社交网络网站上的事件日历。


    TouchDevelop 脚本对手机日历具有只读访问权限，可以检索特定时间范围内的所有约会。以下是一个小示例，其中的语句将检索并显示明天的约会。


    ```

    var start time := time → tomorrow

    var end time := start time → add hours(24)

    var appts := social → search appointments (start time, end time)

    appts → post to wall

    ```


    请注意，`social → search appointments` 是访问日历的唯一机制。从日历中获取的每个约会都有多个相关属性。可以使用表 8-8 中列出的方法来访问它们。（表中省略了
    `invalid` 和 `post to wall` 这两个方法。）


    表 8-8


    约会数据类型的方法


    | 约会方法 | 描述 |

    | --- | --- |

    | `attendees: Contact Collection` | 获取约会的参与者列表 |

    | `details: String` | 获取约会的详细信息（正文） |

    | `end time: DateTime` | 获取结束时间（如果可用） |

    | `is all day event: Boolean` | 如果约会标记为全天事件，则返回真 |

    | `is private: Boolean` | 如果日历条目标记为私有，则返回真 |

    | `location: String` | 返回与约会关联的地点 |

    | `organizer: Contact` | 返回约会的组织者（如果可用） |

    | `source: String` | 返回约会的来源，即它来自哪个日历或社交网络网站 |

    | `start time: DateTime` | 获取开始时间（如果可用） |

    | `status: String` | 返回用户对此约会的状态（空闲、暂定、忙碌或外出） |

    | `subject: String` | 返回约会的主题（如果可用） |

    '
- fmt: "## 8.8 Contacts (WP8 and Android only)\n\nEach contact contains several fields.\
    \ All fields except for the name are optional. The values of these fields may\
    \ be retrieved by using the access methods listed in first table given in Section\
    \ C.7 of Appendix C. The values of nearly all these fields may be changed by using\
    \ the methods listed in second table of that section.\n\nWhen some part of the\
    \ contact’s information has been changed, the updated contact may be saved back\
    \ to the phone’s contact list by using the `social` → `save contact` method.\n\
    \nTable 8-9 Methods for accessing and creating contacts\n\n| Method | Description\
    \ |\n| --- | --- |\n| `social→ choose contact : Contact` | Allows user to select\
    \ a contact from the phone’s contact list |\n| `social→ choose email : Link` |\
    \ Allows user to select a contact’s email from the phone’s contact list |\n| `social→\
    \ create contact ( nickname : String) : Contact` | Creates a new contact with\
    \ only the nickname field specified |\n| `social→ save contact ( contact : Contact):\
    \ Nothing` | Saves a new contact in the phone’s contact list |\n| `social→ search\
    \ contacts ( prefix : String) : Contact Collection` | Searches for contacts whose\
    \ names begin with the supplied prefix |\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
    \ Open Access This chapter is licensed under the terms of the Creative Commons\
    \ Attribution-NonCommercial-NoDerivatives 4.0 International License ([http://creativecommons.org/licenses/by-nc-nd/4.0/](http://creativecommons.org/licenses/by-nc-nd/4.0/)),\
    \ which permits any noncommercial use, sharing, distribution and reproduction\
    \ in any medium or format, as long as you give appropriate credit to the original\
    \ author(s) and the source, provide a link to the Creative Commons licence and\
    \ indicate if you modified the licensed material. You do not have permission under\
    \ this licence to share adapted material derived from this chapter or parts of\
    \ it. The images or other third party material in this chapter are included in\
    \ the chapter’s Creative Commons licence, unless indicated otherwise in a credit\
    \ line to the material. If material is not included in the chapter’s Creative\
    \ Commons licence and your intended use is not permitted by statutory regulation\
    \ or exceeds the permitted use, you will need to obtain permission directly from\
    \ the copyright holder.\n\n# 9. Game Board\n\n[9.1 Introduction](#text00009.html#Sec1)\
    \ [9.2 The Board datatype](#text00009.html#Sec5) [9.3 The Sprite datatype](#text00009.html#Sec11)\
    \ [9.4 The Sprite Collection datatype](#text00009.html#Sec16) [9.5 Touching and\
    \ board events](#text00009.html#Sec17) [9.6 Debugging games](#text00009.html#Sec26)\n\
    \nTouchDevelop includes a “game board” API for writing simple sprite-based games.\
    \ The API includes a primitive physics engine to simplify common game loops where\
    \ objects are moving while they experience gravity and friction. Game board elements\
    \ can be orchestrated using events based on touch and regular timing intervals.\n\
    \n## 9.1 Introduction\n\n### 9.1.1 What is a sprite?\n\nIn TouchDevelop, sprites\
    \ are 2D bitmaps that are drawn directly to the screen. Sprites are commonly used\
    \ to display information such as health bars, number of lives, or text such as\
    \ scores. Some games, especially older games, are composed entirely of sprites.\
    \ TouchDevelop allows creation and use of several types of sprite, such as ellipse,\
    \ rectangle, text and picture. More details about a sprite’s capabilities can\
    \ be obtained from [http://msdn.microsoft.com/en-us/library/bb203919.aspx](http://msdn.microsoft.com/en-us/library/bb203919.aspx)\n\
    \n### 9.1.2 Coordinates and units\n\nPositions in the game board API are based\
    \ on pixels. The origin of the grid is the top left corner when holding the device\
    \ upright, the x-axis is horizontal, the y-axis vertical. Sprite positions refer\
    \ to the center of the sprite, i.e., the halfway point of its width and height\
    \ before any rotation is applied. The reasoning behind this choice is so that\
    \ sprites can rotate around their center. Future versions of TouchDevelop may\
    \ provide more control for offsetting sprites from their position. Speed and acceleration\
    \ are measured in pixels/second and pixels/second².\n\n### 9.1.3 Game program\
    \ structure\n\nThe code for a typical game has an underlying structure like the\
    \ following.\n\n```\naction main( )\n    ◳board := media → create board(640)\n\
    \    // … create sprites, add color and features to the board\n    ◳board → post\
    \ to wall\n\nevent gameloop( )\n    // … move objects around …\n    ◳board → update\
    \ on wall\n```\n\nThe `gameloop` event is triggered approximately every 50 milliseconds,\
    \ i.e. about 20 times per second.\n\n## 9.2 The Board datatype\n\nThe `media`\
    \ resource has two methods for creating a game board; they are listed in Table\
    \ [9-1](#text00009.html#Tab1). The maximum height supported by TouchDevelop for\
    \ a board is 640 pixels. A board created by `media` → `create board` is 456 pixels\
    \ wide; a board created by `media` → `create portrait board` is 480 pixels wide.\
    \ A board remains invisible until it is posted to the wall.\n\nOnce posted, updates\
    \ to the board state and the sprites on the board become visible only when calling\
    \ `board` → `update on wall`.\n\nThe methods of the `Board` datatype concerned\
    \ with the board’s dimensions and general appearance are listed in Table [9-2](#text00009.html#Tab2).\
    \ The board has a background color and a background picture that can be set separately.\
    \ The default background color is transparent, and no background picture is provided\
    \ by default. An additional possibility is to copy the images captured by the\
    \ device’s primary camera and use those images as an ever changing background\
    \ for the board. Only one of these background possibilities can be active at a\
    \ time.\n\nTable 9-1 Methods to create a board\n\n| Methods | Description |\n\
    | --- | --- |\n| `media→create board( height : Number) : Board` | Creates a new\
    \ board with the specified height in pixels |\n| `media→create portrait board\
    \ : Board` | Creates a new board that fills the entire screen when displayed and\
    \ assumes the device is held in portrait mode. |\n| `media→create landscape board\
    \ : Board` | Creates a new board that fills the entire screen when displayed and\
    \ assumes the device is held in landscape mode. |"
  raw: '## 8.8 Contacts (WP8 and Android only)


