    # 10. UI with Boxes and Pages


    [10.1 Page Overview](#text00010.html#Sec1) [10.2 Box Overview](#text00010.html#Sec2)
    [10.3 Examples of Boxes and Pages](#text00010.html#Sec3) [10.4 Working with Pages](#text00010.html#Sec7)
    [10.5 Live Editing of the User Interface](#text00010.html#Sec10) [10.6 API Support
    for Boxes and Pages](#text00010.html#Sec11) Keywords Global Variable Font Size
    Graphical Element Current Page Entire Page


    A well-designed user interface that takes full advantage of the screen is essential
    for giving a professional look and feel to a program. The page and boxed constructs
    in TouchDevelop provide a powerful means of laying out information on the screen.
    A unique feature to assist script developers is that a running script can be suspended
    while the format of information currently displayed on the screen is changed,
    and then the script’s execution can be resumed.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式要求，将给定英文文本翻译成中文。\n\n\n### 9.5.3 `tap board`\
    \ 事件\n\n当用户点击（tap）面板上除了精灵所在位置之外的任何地方时，会触发 `tap board` 事件。点击是指用户手指在屏幕上抬起的位置大致与其最初触摸的位置相同。否则，软件会将其报告为滑动（swipe）事件。该事件在手指抬起时触发。\n\
    \n例如，下面的代码会在面板上每次点击的位置创建一个新的球体。\n\n```\nevent tap board: board(x,y)\n    var sprite\
    \ := ◳board → create ellipse(10,10)\n    sprite → set pos(x,y)\n```\n\n`tap board`\
    \ 事件有两个参数 `x` 和 `y`，用于提供点击发生的位置。\n\n### 9.5.4 `swipe board` 事件\n\n`swipe board`\
    \ 事件与之类似，不同之处在于事件代码会传递四个参数。前两个参数表示滑动起始位置，后两个参数表示滑动在 `x` 和 `y` 方向上的幅度。\n\n例如，下面的代码会创建一个新的精灵，并赋予其一个与滑动幅度相对应的初始速度。\n\
    \n```\nevent swipe board: board(x, y, delta x, delta y)\n    var sprite := ◳board\
    \ → create ellipse(10,10)\n    sprite → set pos(x,y)\n    sprite → set speed(delta\
    \ x, delta y)\n```\n\n### 9.5.5 `tap sprite in XXX` 事件\n\n可以为存储在不同精灵集合中的精灵提供点击事件。这使得为飞船（例如）编程一种动作，而为点击小行星（例如）编程另一种不同动作变得更加容易。\n\
    \n例如，如果存在一个类型为 `Sprite Set` 的全局数据变量 `spaceships`，那么就可以提供一个名为 `tap sprite in asteroids`\
    \ 的事件。该事件会传递四个参数：被点击的精灵、该精灵在精灵集合中的索引，以及该精灵在面板上的坐标。\n\n以下是一个使用该事件的代码示例：\n\n```\n\
    action main( )\n    …\n    ◳asteroids := ◳board → create sprite set\n    // populate\
    \ the board with spaceships and asteroids\n    …\nevent tap sprite in asteroids(sprite,\
    \ index, x, y)\n    // change the asteroid’s color\n    sprite → set color(colors\
    \ → red)\n```\n\n### 9.5.6 `swipe sprite in XXX` 事件\n\n`swipe sprite` 事件与 `tap\
    \ sprite` 事件类似，不同之处在于用户手指在屏幕上滑动，并且滑动的幅度会作为两个额外的参数传递。例如，以下代码将导致被滑动的精灵开始沿着滑动方向移动。\n\
    \n```\nevent swipe sprite in asteroids(sprite, index, x, y, delta x, delta y)\n\
    \    sprite → set speed(delta x, delta y)\n```\n\n### 9.5.7 `drag sprite in XXX`\
    \ 事件\n\n与点击和滑动事件不同，拖动事件不会等待手指从屏幕上抬起。它在手指仍停留在屏幕上时触发。当手指在屏幕上移动时，它会反复触发。传递给该事件的参数与\
    \ `swipe sprite` 事件非常相似，只是最后两个参数提供了（到目前为止）拖动运动的幅度。\n\n此事件可用于临时将拖动精灵的速度设置为 0，并将其显示在当前拖动位置。这样，精灵看起来就像是停留在手指位置一样。\n\
    \n以下是使用小行星的示例代码：\n\n```\nevent drag sprite in asteroids(sprite, index, x, y, delta\
    \ x, delta y)\n    sprite → set speed(0, 0)\n    sprite → set pos(x, y)\n```\n\
    \n当手指在运动结束时抬起，会触发一个 `swipe sprite` 事件（如果已为该动作提供了事件代码）。\n\n### 9.5.8 `tap sprite\
    \ SSS`、`swipe sprite SSS`、`drag sprite SSS`\n\n除了让事件与精灵集合关联之外，还可以让事件与单个精灵关联。为此，必须将该精灵提升为全局数据变量（在脚本的数据部分）。\n\
    \n如果该数据变量命名为 `SSS`，则相应的事件名称为 `tap sprite SSS`、`swipe sprite SSS` 和 `drag sprite\
    \ SSS`。\n\n## 9.6 调试游戏\n\n为了更简单地调试脚本中与精灵位置和速度相关的问题，可以启用面板的调试模式。\n\n```\n◳board→set\
    \ debug mode(true)\n```\n\n如果调试模式开启，面板将在精灵内容旁边显示其位置和速度。此外，还会显示一个包围精灵的方框，表示其宽度和高度。同时，在调试模式下，即使是不可见的精灵也会被显示出来。这对于查找被遗忘的精灵或锚点的放置位置非常有用。\n\
    \n![知识共享许可协议](https://creativecommons.org/licenses/by-nc-nd/4.0) 开放获取 本章采用知识共享署名-非商业性使用-禁止演绎\
    \ 4.0 国际许可协议 ([`​creativecommons.​org/​licenses/​by-nc-nd/​4.​0/​`](http://creativecommons.org/licenses/by-nc-nd/4.0/)\
    \ ) 进行许可。只要您给予原作者和来源适当的署名，提供指向知识共享许可协议的链接，并标明您是否修改了许可材料，您就可以以任何媒介或格式进行任何非商业性的使用、分享、分发和复制。根据本许可协议，您无权分享由本章或其部分内容改编的材料。本章中的图片或其他第三方材料已包含在本章的知识共享许可协议中，除非在材料的署名行中另有说明。如果材料未包含在本章的知识共享许可协议中，并且您的预期使用不受法定法规允许或超出允许范围，您将需要直接获得版权持有人的许可。\n\
    \n# 10. 使用框和页面的用户界面\n\n10.1 页面概述 10.2 框概述 10.3 框和页面示例 10.4 使用页面 10.5 用户界面的实时编辑\
    \ 10.6 框和页面的 API 支持 关键词 全局变量 字体大小 图形元素 当前页面 整个页面\n\n一个充分利用屏幕空间、设计精良的用户界面，对于赋予程序专业的外观和感觉至关重要。TouchDevelop\
    \ 中的页面（page）和框（box）结构为在屏幕上布局信息提供了强大的手段。一个有助于脚本开发者的独特功能是：可以在更改当前屏幕上显示信息的格式时暂停正在运行的脚本，然后可以恢复脚本的执行。\n"
- fmt: "# 10.1 Page Overview\n\nA `page` is invoked in a similar manner to an action.\
    \ However, when it is invoked, it takes over the whole screen. Everything displayed\
    \ on the screen is created by the code belonging to that screen (or by actions\
    \ invoked by the page).\n\nPages are managed in a stack-like manner. When the\
    \ code in page A causes page B to be displayed, B takes over the screen. However,\
    \ when B is finished or when the user taps the back button, the screen reverts\
    \ to show what had been displayed by A just before B. Similarly, page B could\
    \ have caused page C to be displayed, and when C is finished, the screen returns\
    \ to show page B again.\n\nThe code for a page is divided into two main parts:\
    \ an initialize section and a display section. When the page is invoked, the screen\
    \ is cleared to be blank and then the code in the initialize section is executed.\
    \ This code can execute all kinds of statements in the scripting language except\
    \ that it cannot display anything on the screen. If it attempts to change anything\
    \ on this blank screen, the script stops execution with an error report. The purpose\
    \ of the initialize section is to initialize global variables, especially global\
    \ variables which will be used in the display section of the page.\n\nThe display\
    \ section of a page is responsible for rendering the images and text on the screen.\
    \ The `box` construct, explained below, is used to manage the placement of information\
    \ on the screen. There is a major restriction on what the code in the display\
    \ section is allowed to do. The display section cannot make assignments to any\
    \ global variables. If the code in the display section attempts to execute such\
    \ an assignment, or calls an action which attempts such an assignment, the script\
    \ stops execution with an error report.\n\nThe restrictions on the contents of\
    \ the initialize section and display section impose a certain style of programming\
    \ on the script developer. However these restrictions also provide a significant\
    \ benefit. They permit the script’s developer to modify the layout and contents\
    \ of the screen while the script execution is suspended and then resume execution\
    \ with the new screen layout in effect. A developer can therefore correct and/or\
    \ improve the script’s user interface without having to stop and restart the script\
    \ from the beginning.\n\n## 10.2 Box Overview\n\nThe display section of a page\
    \ is responsible for rendering visual elements on the screen. Within that screen\
    \ area, any value which can be displayed on the wall can be displayed here too.\n\
    \nThere is, however, a special feature available for use only within the display\
    \ section of a page. The new feature is called a `box`, and it is introduced in\
    \ a script with the keyword `boxed`. Any collection of graphical elements can\
    \ be boxed, which means that the collection can be treated as a single unit known\
    \ as a box. That box becomes a graphical element in its own right.\n\nA box represents\
    \ a rectangular region of the screen. The size of the rectangle will normally\
    \ default to whatever is needed to enclose its contents. Alternatively, either\
    \ or both dimensions can be specified or constrained to be within desired ranges.\
    \ Scroll bars can be added to a box if desired.\n\nAn important part of a graphical\
    \ user interface is the ability to input information. Code can be attached to\
    \ a box which is executed when the box is tapped (or clicked with a mouse). A\
    \ box containing text can be marked as editable, and code can be attached to that\
    \ box which is executed whenever the text contents are changed. The attached code\
    \ must take the form of a change handler. For a click event, the change handler\
    \ is a parameterless action. For the action of changing text, it is an action\
    \ which takes a single `String` parameter; that string is a copy of the new text.\n\
    \n## 10.3 Examples of Boxes and Pages\n\nA page can be displayed either by making\
    \ it into the first action executed when the script is started, or by using a\
    \ `push` statement. The first of these choices is automatic if you select the\
    \ script template named `pages` when starting to create the script. The first\
    \ example discussed here was created in this way.\n\n### 10.3.1 Page Example 1\
    \ (`/bvhugenw`)\n\nFigure [10-1](#text00010.html#Fig1) is very similar to the\
    \ scripts template. However some changes have been made to illustrate a couple\
    \ of important points.\n\nThe `boxed` keyword creates a new box. It is a container\
    \ box, because it is intended to hold graphical elements drawn on the screen.\
    \ The contents and the formatting of that box are specified by the indented code\
    \ underneath. In this example, two lines of text are written to the wall, which\
    \ means that they are written as the contents of the box. After the script is\
    \ run, the screen has the contents shown in Figure [10-2(a)](#text00010.html#Fig2).\n\
    \nThe lines of text are written one below the other and are left-justified within\
    \ the box. A vertical layout of graphical elements with left justification is\
    \ the default. Both of these defaults can be overridden.\n\n![A978-1-4302-6137-7_10_Fig1_HTML.jpg](Image00050.jpg)\n\
    \nFigure 10-1  \nPage Example 1 (`/bvhugenw`)\n\nThe surprise of the example is\
    \ that the sizes and colors of the two lines of text are exactly the same. The\
    \ reason is that the graphical elements defined inside the box, which are the\
    \ two textual strings in this example, are not rendered until all the statements\
    \ inside the box have been executed. It is only the last change to the foreground\
    \ color and the last change to the font size which has any effect.\n\nThe two\
    \ lines of text are themselves boxes, but they are known as leaf boxes because\
    \ they do not contain any boxes at a lower level. It is possible to see the extents\
    \ of all the boxes on the screen by tapping the pause button in the top right-hand\
    \ corner of the screen. Figure [10-2(b)](#text00010.html#Fig2) shows the browser\
    \ window after pausing the script. Thin blue lines surround the two lines of text\
    \ separately. The two leaf boxes taken together comprise the entire contents of\
    \ the container box, and correspond to the code inside the `boxed` construct.\
    \ That is why the background color of box boxes is yellow. The pink region surrounding\
    \ the container box corresponds to the entire page – it is the frame within which\
    \ the boxes have been drawn. The statement `box` → `set margins(2, 2, 2, 2)` affects\
    \ the placement of the container box inside that enclosing frame.\n\nAs the code\
    \ of Page Example 1 shows, it is possible to specify some kinds of formatting\
    \ for the frame by using the `box` variable immediately inside the display section\
    \ of the code.\n\nLeaf boxes are created in various ways which include posting\
    \ text on the wall, or posting images from the art section of the script onto\
    \ the wall. The formatting of text in a leaf box is inherited from its enclosing\
    \ container box.\n\n![A978-1-4302-6137-7_10_Fig2_HTML.jpg](Image00051.jpg)\n\n\
    Figure 10-2  \n(a) Result from Page Example 1"
  raw: '## 10.1 Page Overview


    A page is invoked in a similar manner to an action. However, when it is invoked,
    it takes over the whole screen. Everything displayed on the screen is created
    by the code belonging to that screen (or by actions invoked by the page).


    Pages are managed in a stack-like manner. When the code in page A causes page
    B to be displayed, B takes over the screen. However, when B is finished or when
    the user taps the back button, the screen reverts to show what had been displayed
    by A just before B. Similarly, page B could have caused page C to be displayed,
    and when C is finished, the screen returns to show page B again.


    The code for a page is divided into two main parts: an initialize section and
    a display section. When the page is invoked, the screen is cleared to be blank
    and then the code in the initialize section is executed. This code can execute
    all kinds of statements in the scripting language except that it cannot display
    anything on the screen . If it attempts to change anything on this blank screen,
    the script stops execution with an error report. The purpose of the initialize
    section is to initialize global variables, especially global variables which will
    be used in the display section of the page.


    The display section of a page is responsible for rendering the images and text
    on the screen. The box construct, explained below, is used to manage the placement
    of information on the screen. There is a major restriction on what the code in
    the display section is allowed to do. The display section cannot make assignments
    to any global variables . If the code in the display section attempts to execute
    such an assignment, or calls an action which attempts such an assignment, the
    script stops execution with an error report.


    The restrictions on the contents of the initialize section and display section
    impose a certain style of programming on the script developer. However these restrictions
    also provide a significant benefit. They permit the script’s developer to modify
    the layout and contents of the screen while the script execution is suspended
    and then resume execution with the new screen layout in effect. A developer can
    therefore correct and/or improve the script’s user interface without having to
    stop and restart the script from the beginning.


    ## 10.2 Box Overview


    The display section of a page is responsible for rendering visual elements on
    the screen. Within that screen area, any value which can be displayed on the wall
    can be displayed here too.


    There is, however, a special feature available for use only within the display
    section of a page. The new feature is called a box , and it is introduced in a
    script with the keyword boxed . Any collection of graphical elements can be boxed,
    which means that the collection can be treated as a single unit known as a box.
    That box becomes a graphical element in its own right.


    A box represents a rectangular region of the screen. The size of the rectangle
    will normally default to whatever is needed to enclose its contents. Alternatively,
    either or both dimensions can be specified or constrained to be within desired
    ranges. Scroll bars can be added to a box if desired.


    An important part of a graphical user interface is the ability to input information.
    Code can be attached to a box which is executed when the box is tapped (or clicked
    with a mouse). A box containing text can be marked as editable, and code can be
    attached to that box which is executed whenever the text contents are changed.
    The attached code must take the form of a change handler . For a click event,
    the change handler is a parameterless action. For the action of changing text,
    it is an action which takes a single String parameter; that string is a copy of
    the new text.


    ## 10.3 Examples of Boxes and Pages


    A page can be displayed either by making it into the first action executed when
    the script is started, or by using a push statement. The first of these choices
    is automatic if you select the script template named pages when starting to create
    the script. The first example discussed here was created in this way.


    ### 10.3.1 Page Example 1 (/bvhugenw)


    Figure [10-1](#text00010.html#Fig1) is very similar to the scripts template. However
    some changes have been made to illustrate a couple of important points.


    The boxed keyword creates a new box. It is a container box , because it is intended
    to hold graphical elements drawn on the screen. The contents and the formatting
    of that box are specified by the indented code underneath. In this example, two
    lines of text are written to the wall, which means that they are written as the
    contents of the box. After the script is run, the screen has the contents shown
    in Figure [10-2(a)](#text00010.html#Fig2) .


    The lines of text are written one below the other and are left-justified within
    the box. A vertical layout of graphical elements with left justification is the
    default. Both of these defaults can be overridden.


    ![A978-1-4302-6137-7_10_Fig1_HTML.jpg](Image00050.jpg)


    Figure 10-1


    Page Example 1 (/bvhugenw)


    The surprise of the example is that the sizes and colors of the two lines of text
    are exactly the same. The reason is that the graphical elements defined inside
    the box, which are the two textual strings in this example, are not rendered until
    all the statements inside the box have been executed. It is only the last change
    to the foreground color and the last change to the font size which has any effect.


    The two lines of text are themselves boxes, but they are known as leaf boxes because
    they do not contain any boxes at a lower level. It is possible to see the extents
    of all the boxes on the screen by tapping the pause button in the top right-hand
    corner of the screen. Figure [10-2(b)](#text00010.html#Fig2) shows the browser
    window after pausing the script. Thin blue lines surround the two lines of text
    separately. The two leaf boxes taken together comprise the entire contents of
    the container box, and correspond to the code inside the boxed construct. That
    is why the background color of box boxes is yellow. The pink region surrounding
    the container box corresponds to the entire page – it is the frame within which
    the boxes have been drawn. The statement `box`  → `set margins(2, 2, 2, 2)` affects
    the placement of the container box inside that enclosing frame.


    As the code of Page Example 1 shows, it is possible to specify some kinds of formatting
    for the frame by using the `box` variable immediately inside the display section
    of the code.


    Leaf boxes are created in various ways which include posting text on the wall,
    or posting images from the art section of the script onto the wall. The formatting
    of text in a leaf box is inherited from its enclosing container box.


    ![A978-1-4302-6137-7_10_Fig2_HTML.jpg](Image00051.jpg)


    Figure 10-2


    (a) Result from Page Example 1'
  trans: "\n# 10.1 页面概述\n\n`页面`的调用方式与操作类似。然而，当它被调用时，它将占据整个屏幕。屏幕上显示的所有内容都由该屏幕所属的代码（或由该页面调用的操作）创建。\n\
    \n页面以类似栈的方式管理。当页面 A 中的代码导致页面 B 被显示时，B 便接管屏幕。但是，当 B 结束或用户点击返回按钮时，屏幕会恢复显示 B 出现之前\
    \ A 所显示的内容。类似地，页面 B 也可能导致页面 C 被显示，而当 C 结束时，屏幕会再次回到显示页面 B。\n\n页面的代码分为两个主要部分：初始化部分和显示部分。当页面被调用时，屏幕会被清空，然后执行初始化部分中的代码。这部分代码可以执行脚本语言中的所有语句，但不能在屏幕上显示任何内容。如果它试图在此空白屏幕上更改任何内容，脚本将停止执行并报错。初始化部分的目的是初始化全局变量，特别是那些将在页面显示部分使用的全局变量。\n\
    \n页面的显示部分负责在屏幕上渲染图像和文本。下面的`box`构造用于管理屏幕上信息的布局。显示部分中的代码有一个主要限制：它不能对任何全局变量进行赋值。如果显示部分的代码试图执行此类赋值，或调用试图执行此类赋值的操作，脚本将停止执行并报错。\n\
    \n对初始化部分和显示部分内容的限制，给脚本开发者带来了一定的编程风格要求。然而，这些限制也提供了一个显著的好处：它们允许脚本开发者在脚本执行暂停期间修改屏幕的布局和内容，然后以新的屏幕布局生效来恢复执行。因此，开发者可以纠正和/或改进脚本的用户界面，而无需停止脚本并从头开始重新运行。\n\
    \n## 10.2 盒子概述\n\n页面的显示部分负责在屏幕上渲染视觉元素。在该屏幕区域内，任何可以在墙上显示的值都可以在这里显示。\n\n不过，有一个特殊功能仅可在页面的显示部分中使用。这个新功能叫作`盒子`，它在脚本中通过关键字`boxed`引入。任何图形元素集合都可以被“盒子化”，这意味着该集合可以被视为一个称为盒子的单一单元。这个盒子本身便成为一个图形元素。\n\
    \n一个盒子代表屏幕上的一个矩形区域。矩形的大小通常会默认为恰好包裹其内容所需的大小。或者，可以指定一个或两个维度的尺寸，或将其约束在所需的范围内。如果需要，还可以为盒子添加滚动条。\n\
    \n图形用户界面的一个重要部分是信息输入功能。可以将代码附加到盒子上，当盒子被点击（或用鼠标单击）时执行这些代码。包含文本的盒子可以被标记为可编辑的，并且可以附加代码到该盒子，每当文本内容被更改时执行这些代码。附加的代码必须采用变更处理器的形式。对于点击事件，变更处理器是一个无参数的操作。对于文本更改操作，它是一个接受单个`字符串`参数的操作；该字符串是更新后文本的一个副本。\n\
    \n## 10.3 盒子和页面的示例\n\n页面可以通过使其成为脚本启动时执行的第一个操作来显示，也可以通过使用`push`语句来显示。如果在开始创建脚本时选择了名为`pages`的脚本模板，则会自动选择第一种方式。这里讨论的第一个示例就是通过这种方式创建的。\n\
    \n### 10.3.1 页面示例 1 (`/bvhugenw`)\n\n图 10-1 与脚本模板非常相似。但为了说明几个要点，进行了一些修改。\n\n`boxed`关键字创建了一个新的盒子。它是一个容器盒子，因为它旨在容纳绘制在屏幕上的图形元素。该盒子的内容和格式由其下方缩进的代码指定。在此示例中，有两行文本被写入墙，这意味着它们被写入作为盒子的内容。脚本运行后，屏幕会显示如图\
    \ 10-2(a) 所示的内容。\n\n文本行一个接一个地上下排列，并在盒子内左对齐。图形元素的垂直布局并左对齐是默认设置。这两个默认值都可以被覆盖。\n\n\
    ![A978-1-4302-6137-7_10_Fig1_HTML.jpg](img/Image00050.jpg)\n\n图 10-1  \n页面示例 1\
    \ (`/bvhugenw`)\n\n该示例的意外之处在于，两行文本的大小和颜色完全相同。原因在于，盒子内部定义的图形元素（本例中为两个文本字符串）在盒子内的所有语句执行完毕之前不会被渲染。只有对前景色的最后一次更改和对字体大小的最后一次更改才会生效。\n\
    \n这两行文本本身也是盒子，但它们被称为叶子盒子，因为它们不包含任何更低层级的盒子。通过点击屏幕右上角的暂停按钮，可以查看屏幕上所有盒子的范围。图 10-2(b)\
    \ 显示了暂停脚本后的浏览器窗口。细蓝线分别包围了两行文本。这两个叶子盒子合起来构成了容器盒子的全部内容，并对应于`boxed`构造内部的代码。这就是为什么容器盒子的背景颜色是黄色的。容器盒子周围的粉色区域对应整个页面——它是绘制盒子的框架。语句\
    \ `box` → `set margins(2, 2, 2, 2)` 影响了容器盒子在该外部框架内的位置。\n\n正如页面示例 1 的代码所示，通过在显示部分的代码中直接使用`box`变量，可以为框架指定某些类型的格式。\n\
    \n叶子盒子可以通过多种方式创建，包括在墙上张贴文本，或从脚本的图库部分将图像张贴到墙上。叶子盒子中文本的格式继承自其外层的容器盒子。\n\n![A978-1-4302-6137-7_10_Fig2_HTML.jpg](img/Image00051.jpg)\n\
    \n图 10-2  \n(a) 页面示例 1 的运行结果\n"
- fmt: "### 10.3.2 Page Example 2 (`/hnimxaiw`)\n\nThe second example introduces events\
    \ which are executed when a box is clicked and demonstrates the need for the initialize\
    \ section in a page (Figure [10-3](#text00010.html#Fig3)).\n\nThe display section\
    \ of the page defines three boxes. Because the display section makes the method\
    \ call `box → use horizontal layout`, the three boxes are drawn from left to right\
    \ across the screen. Furthermore, the boxes are vertically aligned so that their\
    \ middle points are in a straight line.\n\nThe first box contains text copied\
    \ from the global variable `s`, and draws it with a font whose size is specified\
    \ by the global variable `size`. The code also sets attributes of the box so that\
    \ the text will wrap onto multiple lines if it does not fit, and solid lines are\
    \ drawn around the box.\n\nThe second and third boxes are both intended to be\
    \ clickable. They are drawn to have the same size and use the same colors. Therefore,\
    \ rather than duplicating the code for the two boxes, the code to set each box’s\
    \ attributes has been defined inside the action named `create button`. Whenever\
    \ the identifier `box` is used inside that action, it refers to the current box\
    \ which is being defined.\n\nAfter calling the `create button` action for each\
    \ box, the `on tapped` method is invoked to attach a change handler to the box.\
    \ For a tapping action, the change handler takes the form of an action with no\
    \ parameters, and that action has to be defined at this point in the script using\
    \ a where clause.\n\nThe code inside a change handler can do anything allowed\
    \ in a TouchDevelop script except assign values to local variables, change any\
    \ attributes of the current box or directly change what is being displayed. If\
    \ the action of tapping the box is to have any effect on the current page, the\
    \ change handler must communicate the changes via global variables.\n\nThe change\
    \ handler for the box which displays the text “Click Here” increments a global\
    \ variable named `cnt` and then uses the new value of `cnt` to construct a string\
    \ value stored in the global variable `s`. It should be noted that `s` was used\
    \ to provide the contents displayed inside the first box drawn on the page.\n\n\
    Along similar lines, the change handler for the box which displays the text “Make\
    \ Larger” increments a global variable which specifies the font size used for\
    \ text displayed in the first box on the page.\n\nWhen the script is run, the\
    \ first box is initially empty. However, when the “Click Here” box is tapped,\
    \ the first box changes to display the string “It was clicked 1 times”. Each subsequent\
    \ tapping action changes that 1 to 2, then to 3 and so on. The change to the box\
    \ contents on the screen occurs because the entire page is redrawn any time something\
    \ happens which may affect the page. The reasons for redrawing the page include:\n\
    \n![A978-1-4302-6137-7_10_Fig3_HTML.jpg](Image00052.jpg)\n\nFigure 10-3 Page Example\
    \ 2 (`/hnimxaiw`)\n\n- executing a change handler on the page,\n- clicking the\
    \ suspend button at the top right of the screen and then resuming the script,\n\
    - displaying another page and then returning to this page,\n- any global variables\
    \ or records have been modified.\n\nThe screen after tapping the “Click Here”\
    \ and “Make Larger” buttons a few times each is shown in Figure [10-4](#text00010.html#Fig4).\
    \ Note that the text wrapping attribute of the first box was set, and when the\
    \ font size was increased, the string wrapped onto two lines of text. No height\
    \ was specified for the box, so it simply grows taller to accommodate the two\
    \ lines of text.\n\n![A978-1-4302-6137-7_10_Fig4_HTML.jpg](Image00053.jpg)\n\n\
    Figure 10-4 Result of Running Page Example 2\n\n### 10.3.3 Page Example 3 (`/wrsonnwh`)\n\
    \nThe third example script shows the use of a change handler to process editable\
    \ text and the nesting of boxes to achieve a desired layout for the graphical\
    \ elements.\n\nThe script shown in Figure [10-5](#text00010.html#Fig5) allows\
    \ the user to enter English language text into the left-hand box. Every time the\
    \ user pauses, the change handler is invoked. Its input parameter is a copy of\
    \ the current version of the text. That input parameter is normally assigned,\
    \ unchanged, to the global variable associated with this box. (The editor ensures\
    \ that there is always such a variable and it will have the `String` type.) However\
    \ additional actions can be added to the change handler. In this example, that\
    \ additional action is to invoke the Bing language translation service and translate\
    \ the English language input into French, The French version of the text is displayed\
    \ in the right-hand box.\n\nA snapshot of the screen after the script has been\
    \ used to translate one sentence is shown in Figure [10-6](#text00010.html#Fig6).\n\
    \n![A978-1-4302-6137-7_10_Fig5_HTML.jpg](Image00054.jpg)\n\nFigure 10-5 Page Example\
    \ 3 (`/wrsonnwh`)\n\nA production version of this script might allow the user\
    \ to select both the source language and the destination language for the translation.\
    \ This nicer version of the script would presumably use the full names of the\
    \ languages rather than two letter abbreviations. It would likely also perform\
    \ the translation only when the user clicks on the arrow between the two boxes.\
    \ It can be disconcerting to have partial translations popping up and changing\
    \ as one is typing text into the left-hand box. Also, an internet connection is\
    \ made every time the text is translated and this can be undesirable for a tablet\
    \ device communicating via a cellphone connection. These enhancements are left\
    \ as an exercise for the reader.\n\n![A978-1-4302-6137-7_10_Fig6_HTML.jpg](Image00055.jpg)\n\
    \nFigure 10-6 Translation produced by Page Example 3\n\n## 10.4 Working with Pages\n\
    \nThe display section of a page works with the entire window of the browser running\
    \ the script. This window is effectively the current box for any code executed\
    \ immediately inside the display section; that is, code which is not nested inside\
    \ a boxed construct.\n\n### 10.4.1 Entering and Leaving a Page\n\nA page is simply\
    \ a special kind of action. It can be invoked as an entry point of the script\
    \ if it is public and does not have any parameters. It can also be invoked as\
    \ though it were an action. If, for example, the script defines a page named `show`\
    \ then the page can be displayed by executing the call `▷ show`. When code for\
    \ the script is displayed on the screen, the call statement appears as push `▷\
    \ show` to indicate that the TouchDevelop run-time is maintaining a stack of pages.\n\
    \nA page which is not used as the entry point of a script can accept input parameters.\
    \ It cannot have any output parameters.\n\nA page can be exited (terminated) by\
    \ clicking the back arrow which appears in the top left corner of the webpage.\
    \ On a Windows phone, the back button achieves the same effect. The page can also\
    \ be exited by executing the statement `wall → pop page`. This statement would\
    \ normally be used inside a change handler. An example appears below.\n\n```\n\
    boxed\n    “Click here when done” → post to wall\n    box → on tapped(handler)\n\
    \        where   handler( ) is\n            wall → pop page\n```"
  raw: '### 10.3.2 Page Example 2 (/hnimxaiw)


    The second example introduces events which are executed when a box is clicked
    and demonstrates the need for the initialize section in a page (Figure [10-3](#text00010.html#Fig3)
    ).


    The display section of the page defines three boxes. Because the display section
    makes the method call `box`  → `use horizontal layout` , the three boxes are drawn
    from left to right across the screen. Furthermore, the boxes are vertically aligned
    so that their middle points are in a straight line.


    The first box contains text copied from the global variable `s` , and draws it
    with a font whose size is specified by the global variable, `size` . The code
    also sets attributes of the box so that the text will wrap onto multiple lines
    if it does not fit, and solid lines are drawn around the box.


    The second and third boxes are both intended to be clickable. They are drawn to
    have the same size and use the same colors. Therefore, rather than duplicating
    the code for the two boxes, the code to set each box’s attributes has been defined
    inside the action named `create button` . Whenever the identifier `box` is used
    inside that action, it refers to the current box which is being defined.


    After calling the `create button` action for each box, the `on tapped` method
    is invoked to attach a change handler to the box. For a tapping action, the change
    handler takes the form of an action with no parameters, and that action has to
    be defined at this point in the script using a where clause.


    The code inside a change handler can do anything allowed in a TouchDevelop script
    except assign values to local variables, change any attributes of the current
    box or directly change what is being displayed. If the action of tapping the box
    is to have any effect on the current page, the change handler must communicate
    the changes via global variables.


    The change handler for the box which displays the text “Click Here” increments
    a global variable named `cnt` and then uses the new value of `cnt` to construct
    a string value stored in the global variable `s` . It should be noted that `s`
    was used to provide the contents displayed inside the first box drawn on the page.


    Along similar lines, the change handler for the box which displays the text “Make
    Larger” increments a global variable which specifies the font size used for text
    displayed in the first box on the page.


    When the script is run, the first box is initially empty. However, when the “Click
    Here” box is tapped, the first box changes to display the string “It was clicked
    1 times”. Each subsequent tapping action changes that 1 to 2, then to 3 and so
    on. The change to the box contents on the screen occurs because the entire page
    is redrawn any time something happens which may affect the page. The reasons for
    redrawing the page include:


    ![A978-1-4302-6137-7_10_Fig3_HTML.jpg](Image00052.jpg)


    Figure 10-3


    Page Example 2 (/hnimxaiw)


    *   executing a change handler on the page,

    *   clicking the suspend button at the top right of the screen and then resuming
    the script,

    *   displaying another page and then returning to this page,

    *   any global variables or records have been modified.


    The screen after tapping the “Click Here” and “Make Larger” buttons a few times
    each is shown in Figure [10-4](#text00010.html#Fig4) . Note that the text wrapping
    attribute of the first box was set, and when the font size was increased, the
    string wrapped onto two lines of text. No height was specified for the box, so
    it simply grows taller to accommodate the two lines of text.


    ![A978-1-4302-6137-7_10_Fig4_HTML.jpg](Image00053.jpg)


    Figure 10-4


    Result of Running Page Example 2


    ### 10.3.3 Page Example 3 (/wrsonnwh)


    The third example script shows the use of a change handler to process editable
    text and the nesting of boxes to achieve a desired layout for the graphical elements.


    The script shown in Figure [10-5](#text00010.html#Fig5) allows the user to enter
    English language text into the left-hand box. Every time the user pauses, the
    change handler is invoked. Its input parameter is a copy of the current version
    of the text. That input parameter is normally assigned, unchanged, to the global
    variable associated with this box. (The editor ensures that there is always such
    a variable and it will have the `String` type.) However additional actions can
    be added to the change handler. In this example, that additional action is to
    invoke the Bing language translation service and translate the English language
    input into French, The French version of the text is displayed in the right-hand
    box.


    A snapshot of the screen after the script has been used to translate one sentence
    is shown in Figure [10-6](#text00010.html#Fig6) .


    ![A978-1-4302-6137-7_10_Fig5_HTML.jpg](Image00054.jpg)


    Figure 10-5


    Page Example 3 (/wrsonnwh)


    A production version of this script might allow the user to select both the source
    language and the destination language for the translation. This nicer version
    of the script would presumably use the full names of the languages rather than
    two letter abbreviations. It would likely also perform the translation only when
    the user clicks on the arrow between the two boxes. It can be disconcerting to
    have partial translations popping up and changing as one is typing text into the
    left-hand box. Also, an internet connection is made every time the text is translated
    and this can be undesirable for a tablet device communicating via a cellphone
    connection. These enhancements are left as an exercise for the reader.


    ![A978-1-4302-6137-7_10_Fig6_HTML.jpg](Image00055.jpg)


    Figure 10-6


    Translation produced by Page Example 3


    ## 10.4 Working with Pages


    The display section of a page works with the entire window of the browser running
    the script. This window is effectively the current box for any code executed immediately
    inside the display section; that is, code which is not nested inside a boxed construct.


    ### 10.4.1 Entering and Leaving a Page


    A page is simply a special kind of action. It can be invoked as an entry point
    of the script if it is public and does not have any parameters. It can also be
    invoked as though it were an action. If, for example, the script defines a page
    named show then the page can be displayed by executing the call ▷ `show` . When
    code for the script is displayed on the screen, the call statement appears as
    push ▷ show to indicate that the TouchDevelop run-time is maintaining a stack
    of pages.


    A page which is not used as the entry point of a script can accept input parameters.
    It cannot have any output parameters.


    A page can be exited (terminated) by clicking the back arrow which appears in
    the top left corner of the webpage. On a Windows phone, the back button achieves
    the same effect. The page can also be exited by executing the statement `wall`
    → `pop page` . This statement would normally be used inside a change handler.
    An example appears below.


           `boxed`


                  `“Click here when done” → post to wall`


                  `box → on tapped(handler)`


                         `where`   `handler( )` `is`


                                `wall → pop page`'
  trans: "\n### 10.3.2 页面示例 2 (`/hnimxaiw`)\n\n第二个示例介绍了点击框时执行的事件，并展示了页面中初始化部分的必要性（图\
    \ 10-3）。\n\n页面的显示部分定义了三个框。由于显示部分调用了方法 `box → use horizontal layout`，这三个框在屏幕上从左到右绘制。此外，这些框垂直对齐，使它们的中心点位于一条直线上。\n\
    \n第一个框包含从全局变量 `s` 复制的文本，并使用由全局变量 `size` 指定大小的字体进行绘制。代码还设置了该框的属性，以便在文本容纳不下时自动换行，并在框周围绘制实线。\n\
    \n第二个和第三个框都设计为可点击。它们被绘制成相同大小并使用相同颜色。因此，为了避免重复编写两个框的代码，设置每个框属性的代码被定义在名为 `create\
    \ button` 的操作内部。每当在该操作内部使用标识符 `box` 时，它都指向当前正在定义的框。\n\n在为每个框调用 `create button`\
    \ 操作后，会调用 `on tapped` 方法为框附加一个变更处理程序。对于点击操作，变更处理程序采用无参数操作的形式，并且该操作必须在脚本中使用 `where`\
    \ 子句在此处定义。\n\n变更处理程序内部的代码可以执行 TouchDevelop 脚本允许的任何操作，但以下情况除外：为局部变量赋值、更改当前框的任何属性或直接更改正在显示的内容。如果点击框的操作要对当前页面产生任何影响，变更处理程序必须通过全局变量来传递更改。\n\
    \n显示“Click Here”文本的框的变更处理程序会递增一个名为 `cnt` 的全局变量，然后使用 `cnt` 的新值来构造一个存储在全局变量 `s`\
    \ 中的字符串值。需要注意的是，`s` 被用于提供在页面中绘制的第一个框内显示的内容。\n\n类似地，显示“Make Larger”文本的框的变更处理程序会递增一个全局变量，该变量指定了页面上第一个框中显示文本所使用的字号。\n\
    \n运行脚本时，第一个框最初是空的。然而，当点击“Click Here”框时，第一个框会变为显示字符串“It was clicked 1 times”。随后每次点击操作都会将该数字从\
    \ 1 变为 2，再变为 3，以此类推。屏幕上框内容的改变之所以发生，是因为每当发生可能影响页面的事件时，整个页面都会被重新绘制。重新绘制页面的原因包括：\n\
    \n![A978-1-4302-6137-7_10_Fig3_HTML.jpg](img/Image00052.jpg)\n\n**图 10-3** 页面示例\
    \ 2 (`/hnimxaiw`)\n\n-   在页面上执行变更处理程序，\n-   点击屏幕右上角的挂起按钮，然后恢复脚本，\n-   显示另一个页面然后返回此页面，\n\
    -   任何全局变量或记录被修改。\n\n在分别点击“Click Here”和“Make Larger”按钮几次后的屏幕如图 10-4 所示。请注意，第一个框的文本换行属性已设置，并且当字号增大时，字符串会被换行成两行文本。由于没有指定框的高度，它会自动增高以容纳这两行文本。\n\
    \n![A978-1-4302-6137-7_10_Fig4_HTML.jpg](img/Image00053.jpg)\n\n**图 10-4** 运行页面示例\
    \ 2 的结果\n\n### 10.3.3 页面示例 3 (`/wrsonnwh`)\n\n第三个示例脚本展示了如何使用变更处理程序处理可编辑文本以及如何嵌套框来实现图形元素的期望布局。\n\
    \n图 10-5 中显示的脚本允许用户在左侧框中输入英文文本。每当用户暂停输入时，就会调用变更处理程序。它的输入参数是当前文本版本的一份副本。该输入参数通常被原样分配给与该框关联的全局变量。（编辑器确保总是存在这样一个变量，并且它是\
    \ `String` 类型。）然而，可以向变更处理程序添加额外的操作。在本例中，这个额外操作是调用必应语言翻译服务，将英文输入翻译成法语，法语版本的文本会显示在右侧框中。\n\
    \n使用该脚本翻译一个句子后的屏幕截图如图 10-6 所示。\n\n![A978-1-4302-6137-7_10_Fig5_HTML.jpg](img/Image00054.jpg)\n\
    \n**图 10-5** 页面示例 3 (`/wrsonnwh`)\n\n此脚本的生产版本可能会允许用户选择翻译的源语言和目标语言。这个更好的版本可能会使用语言的全称，而不是两个字母的缩写。它可能只会在用户点击两个框之间的箭头时执行翻译。当用户在左侧框中输入文本时，部分翻译结果不断弹出和变化可能会令人不安。此外，每次翻译文本时都会进行网络连接，对于通过手机网络通信的平板设备来说，这可能是不希望的。这些增强功能留待读者作为练习。\n\
    \n![A978-1-4302-6137-7_10_Fig6_HTML.jpg](img/Image00055.jpg)\n\n**图 10-6** 页面示例\
    \ 3 生成的翻译\n\n## 10.4 使用页面\n\n页面的显示部分处理的是运行脚本的浏览器的整个窗口。该窗口实际上就是显示部分内部立即执行的任何代码（即未嵌套在框结构内的代码）的当前框。\n\
    \n### 10.4.1 进入和离开页面\n\n页面只是一种特殊的操作。如果它是公共的且没有任何参数，它可以作为脚本的入口点被调用。它也可以像普通操作一样被调用。例如，如果脚本定义了一个名为\
    \ `show` 的页面，那么可以通过执行调用 `▷ show` 来显示该页面。当脚本代码显示在屏幕上时，调用语句显示为 push `▷ show`，表明\
    \ TouchDevelop 运行时维护着一个页面栈。\n\n不用作脚本入口点的页面可以接受输入参数，但不能有任何输出参数。\n\n可以通过点击网页左上角出现的返回箭头来退出（终止）页面。在\
    \ Windows 手机上，按下返回键可以达到同样的效果。也可以通过执行语句 `wall → pop page` 来退出页面。该语句通常用在变更处理程序内部。下面是一个示例。\n\
    \n```\nboxed\n    “Click here when done” → post to wall\n    box → on tapped(handler)\n\
    \        where   handler( ) is\n            wall → pop page\n```\n"
- fmt: '### 10.4.2 Coding Restrictions


    The initialization section of a page cannot draw any items on the page. It can
    declare and use local variables but these variables are not accessible from inside
    the display section of the page. (They are out of scope.) Normally, the initialization
    section is used to initialize global variables used in the display section.


    The display section of a page can use but not assign to global variables. (Even
    though change handlers are defined within the display section, they are not considered
    to be part of the display section.) The display section can use local variables
    as normal. It can use normal control structures such as loops and if-statements.
    Its main purpose is to render graphical elements on the current page.


    Change handlers attached to boxes on the current page can use and assign to global
    variables. They can use but they cannot assign to local variables in the display
    section of the page, provided that they are visible. (Normal scope rules apply.)
    They cannot draw any items on the screen nor can they set any attributes of the
    current box.


    All the statements in the display section of the page are re-executed and the
    entire page is re-drawn after control returns from a change handler or when the
    page becomes the current page again after another page exits or when a global
    variable or record is changed. In contrast, the code in the initialization section
    is only executed when a new instance of the page is created and pushed onto the
    stack of pages.


    The identifier `box` refers to the current box and can be used in any context
    where there is an active current box. If `box` is referenced inside an action,
    then there may or may not be a current box depending on how control reached that
    action. A run-time error occurs if there is no current box. There is always a
    current box if control is inside the display section of a page or inside an action
    called from a page or inside a change handler attached to a box. There is no current
    box when the initialization section of a page is being executed.


    Even though there may be a current box, access may be limited to read only (such
    as obtaining the current value of `box` → `pixels per em`). Invoking a method
    which sets attributes of the current box is permitted only within the display
    section of a page or within an action invoked from the display section.


    ## 10.5 Live Editing of the User Interface


    Pages are easy to debug and modify while a script is executing. There is no need
    to stop the script and re-start it from the beginning each time that the script
    developer makes a small change. When the script is running in a browser, a pause
    button is displayed in the top right corner of the browser''s window. The pause
    button is shown in Figure [10-7](#text00010.html#Fig7).


    ![A978-1-4302-6137-7_10_Fig7_HTML.jpg](Image00056.jpg)


    Figure 10-7


    Icons for User Interface Editing


    Tapping that button causes a very thin blue line to be drawn around each box which
    is currently displayed on the screen, and the pause button is replaced with a
    resume button, also shown in Figure [10-7](#text00010.html#Fig7).


    The script is no longer running at this point. Clicking inside one of the rectangles
    composed of thin blue lines causes the rectangle to be augmented with a thicker
    dotted red rectangle, and causes a button labeled as "edit" to appear on the screen.
    The edit button is shown in Figure [10-7](#text00010.html#Fig7). That dotted red
    rectangle indicates which box has been selected. Double clicking causes an outer
    enclosing box to be selected instead. Triple clicking, etc., works similarly when
    the boxed constructs are nested sufficiently deeply.


    Clicking the edit button causes the script editor to be invoked on exactly the
    code for the selected box. On a display monitor which is wide enough, the browser''s
    window is split so that the left-hand side contains the currently displayed page
    and the right-hand side shows the code for the selected box. (If the view of the
    page takes up too much screen real estate, it can be removed by clicking the dismiss
    button in its top left corner.)


    The code for the script can now be edited. Changes can be small or they can be
    major. There is no restriction on which code in the entire script can be changed.
    When the changes are complete and it is time to see if they had the desired effect,
    the view of the current page should be dismissed (if that has not been done already)
    and the resume button, which is now on the left-hand side of the screen, can be
    tapped.


    Resuming the script causes the display section of the current page to be re-executed
    and the page is re-drawn, reflecting any changes made to the code. The run-suspend-edit-resume
    cycle can be repeated as many times as desired until the user interface is perfect.


    It should be noted that if major changes to the code are made, such as changes
    to actions called from other places in the script, then the script may need to
    be restarted from the beginning to see their full effect.'
