- fmt: '# B.10 `math`


    Mathematical constants, operators, and functions such as `cos`, `sin` etc.


    | `∞- : Number` | Returns negative infinity |

    | `∞+ : Number` | Returns positive infinity |

    | `abs(x : Number) : Number` | Returns the absolute value of a number |

    | `acos(x : Number) : Number` | Returns the angle whose cosine is the specified
    number |

    | `asin(x : Number) : Number` | Returns the angle whose sine is the specified
    number |

    | `atan(x : Number) : Number` | Returns the angle whose tangent is the specified
    number |

    | `atan2(y : Number, x : Number) : Number` | Returns the angle whose tangent is
    the quotient of two specified numbers |

    | `ceiling(x : Number) : Number` | Returns the smallest integral value greater
    than or equal to the specified number |

    | `cos(angle : Number) : Number` | Returns the cosine of the specified angle |

    | `cosh(angle : Number) : Number` | Returns the hyperbolic cosine of the specified
    angle |

    | `create matrix(rows : Number, columns : Number) : Matrix` | Creates a matrix
    of zeros of a given size |

    | `create vector3(x : Number, y : Number, z : Number) : Vector3` | Creates a 3D
    vector |

    | `deg to rad(degrees : Number) : Number` | Converts degrees into radians |

    | `e : Number` | Returns the natural logarithmic base, specified by the constant,
    e |

    | `ε : Number` | Returns the machine epsilon, the smallest positive number greater
    than zero |

    | `exp(x : Number) : Number` | Returns e raised to the specified power |

    | `floor(x : Number) : Number` | Returns the largest integer less than or equal
    to the specified number |

    | `gravity : Number` | Returns the value of standard gravity (9.80665) in meters/sec²
    |

    | `ieee remainder(x : Number, y : Number) : Number` | Returns the remainder resulting
    from the division of a specified number by another specified number |

    | `is ∞(x : Number) : Boolean` | Indicates whether number evaluates to negative
    or positive infinity |

    | `is ∞-(x : Number) : Boolean` | Indicates whether number evaluates to negative
    infinity |

    | `is ∞+(x : Number) : Boolean` | Indicates whether number evaluates to positive
    infinity |

    | `is nan(x : Number) : Boolean` | Indicates that value cannot be represented
    as a number, i.e. Not-a-Number. This usually happens when the number is the result
    of a division by zero. |

    | `log(x : Number, base : Number) : Number` | Returns the logarithm of a specified
    number in a specified base |

    | `log10(x : Number) : Number` | Returns the base 10 logarithm of a specified
    number |

    | `loge(x : Number) : Number` | Returns the natural (base e) logarithm of a specified
    number |

    | `max(x : Number, y : Number) : Number` | Returns the larger of two numbers |

    | `min(x : Number, y : Number) : Number` | Returns the smaller of two numbers
    |

    | `mod(x : Number, y : Number) : Number` | Returns the modulus resulting from
    the division of one number by another number |

    | `π : Number` | Returns the constant pi |

    | `pow(x : Number, y : Number) : Number` | Returns a specified number raised to
    the specified power |

    | `rad to deg(radians : Number) : Number` | Converts rad into degrees |

    | `random(max : Number) : Number` | Returns a random integral number x: 0 ≤ x
    < max |

    | `random normalized : Number` | Returns a random floating-point number x: 0 ≤
    x < 1 |

    | `round(x : Number) : Number` | Rounds a number to the nearest integral value
    |

    | `round with precision(x : Number, digits : Number) : Number` | Rounds a number
    to a specified number of fractional digits. |

    | `sign(x : Number) : Number` | Returns a value indicating the sign of a number
    |

    | `sin(angle : Number) : Number` | Returns the sine of the specified angle |

    | `sinh(angle : Number) : Number` | Returns the hyperbolic sine of the specified
    angle |

    | `sqrt(x : Number) : Number` | Returns the square root of a specified number
    |

    | `tan(angle : Number) : Number` | Returns the tangent of the specified angle
    |

    | `tanh(angle : Number) : Number` | Returns the hyperbolic tangent of the specified
    angle |


    # B.11 `media`


    Pictures and music.


    | `choose picture : Picture` | Chooses a picture from the media library |

    | `choose song : Song` | Chooses a song from the media library (planned addition
    to the API) |

    | `create board(height : Number) : Board` | Creates a new game board |

    | `create landscape board(width: Number, height : Number) : Board` | Creates a
    new game board in landscape mode. On rotatable devices it will take the entire
    screen when posted. |

    | `create picture(width : Number, height : Number) : Picture` | Creates a new
    picture of the given size |

    | `create portrait board(width: Number, height : Number) : Board` | Creates a
    new game board in portrait mode. On rotatable devices it will take the entire
    screen when posted. |

    | `picture albums : Picture Albums` | Gets the picture albums |

    | `pictures : Pictures` | Gets the pictures on the phone |

    | `playlists : Playlists` | Gets the playlists on the phone |

    | `saved pictures : Pictures` | Gets the saved pictures on the phone |

    | `search marketplace(terms : String, type : String)` | Searches the Windows Phone
    Marketplace (type in applications or music) |

    | `song albums : Song Albums` | Gets the song albums on the phone |

    | `songs : Songs` | Gets the songs on the phone |


    # B.12 `phone`


    Phone numbers, vibrate, etc.


    | `choose address : Link` | Chooses an address from the contacts |

    | `choose phone number : Link` | Chooses a phone number from the contact list
    |

    | `dial phone number(number : String)` | Starts a phone call |

    | `power source : String` | Indicates if the phone is on ''battery'' or ''external''
    power source. |

    | `save phone number(phone number : String)` | Allows the user to save the phone
    number |

    | `vibrate(seconds : Number)` | Vibrates the phone for a number of seconds (0.02
    minimum) |


    # B.13 `player`


    Play, stop or resume songs


    | `active song : Song` | Gets the active song if any |

    | `is muted : Boolean` | Indicates if the player is muted |

    | `is paused : Boolean` | Indicates if the player is paused |

    | `is playing : Boolean` | Indicates if the player is playing a song |

    | `is repeating : Boolean` | Indicates if the player is repeating |

    | `is shuffled : Boolean` | Indicates if the player is shuffled |

    | `is stopped : Boolean` | Indicates if the player is stopped |

    | `next` | Moves to the next song in the queue of playing songs |

    | `pause` | Pauses the currently playing song |

    | `play(song : Song)` | Plays a Song |

    | `play home media(media : Media Link)` | Plays an audio/video file from the home
    network |

    | `play many(songs : Songs)` | Plays a collection of songs |

    | `play position : Number` | Gets the position in seconds within the active song
    |

    | `previous` | Moves to the previous song in the queue of playing songs |

    | `resume` | Resumes a paused song |

    | `set repeating(repeating : Boolean)` | Sets the repeating on and off |

    | `set shuffled(shuffled : Boolean)` | Sets the shuffling on and off |

    | `set sound volume(x : Number)` | Sets the sound volume level from 0 (silent)
    to 1 (current volume) |

    | `sound volume : Number` | Gets the sound volume for sounds from 0 (silent) to
    1 (current volume) |

    | `stop` | Stops playing a song |'
