  trans: '#### 重力与摩擦力


    可以对板上的所有精灵施加均匀的力。例如，可以存在一个力将物体拉向屏幕底部，模拟重力。然而，这个重力并不需要保持恒定。如果设备配备了必要的传感器，脚本可以利用设备陀螺仪确定的方向或加速度计读数，反复调整游戏中物体所承受的重力大小和方向。


    **表 9-4** `Board` 数据类型的方法：障碍物/边界


    | Board 方法 | 描述 |

    | --- | --- |

    | `create boundary(distance : Number) : Nothing` | 在板边缘指定距离处创建完全反射的墙壁 |

    | `create obstacle(x : Number, y : Number, xsegment : Number, ysegment : Number,
    elasticity : Number) : Nothing` | 创建一条实心障碍物线段，起点为 (x, y)，在 x 和 y 方向上分别延伸 xsegment
    和 ysegment；弹性系数取值范围为 0（粘性）到 1（完全反射） |


    一旦精灵获得了速度，或者重力被设置为非零值，板引擎就会更新精灵的位置。要在一个时间步长内更新所有精灵的位置，应调用 `board` → `evolve` 方法。时间步长的持续时间即为自上次调用
    `board` → `evolve` 或自板创建以来经过的时间。


    图 9-1 展示了一个使用障碍物和重力的简单脚本。


    ![A978-1-4302-6137-7_9_Fig1_HTML.jpg](img/Image00049.jpg)


    **图 9-1** 示例脚本：移动的球（`/nyuc`）


    该脚本创建了一个板，并在整个板周围添加了反射墙。然后创建了一段小障碍物墙和一个球形的精灵。在游戏循环中，使用加速度计设置游戏板上的重力。为了使球移动得更快，加速度被放大了
    1000 倍。


    默认情况下，精灵会持续移动而不会减速。只有当它朝与重力相反的方向移动，或者在与弹性系数小于 1 的障碍物碰撞中损失能量时，速度才会降低。如果需要让精灵自行减速，可以为板或每个精灵单独设置默认的摩擦系数。


    每个精灵可以有自己的摩擦设置，但若未设置，则每个精灵会承受板默认的摩擦。摩擦系数定义为正向速度中作为反向力所感受到的部分。摩擦系数为 0 表示无摩擦，摩擦系数为
    1 意味着精灵将完全无法移动。


    用于驱动板动画并对精灵施加力的方法总结于表 9-5。


    **表 9-5** `Board` 数据类型的方法：力/动画


    | Board 方法 | 描述 |

    | --- | --- |

    | `create spring(sprite1 : Sprite, sprite2 : Sprite, stiffness : Number) : Nothing`
    | 在两个精灵之间创建吸引力；stiffness（刚度）决定了力的强度 |

    | `evolve : Nothing` | 更新板上所有精灵的位置 |

    | `set friction(friction : Number) : Nothing` | 为所有未设置自身摩擦属性的精灵设置默认摩擦系数；取值范围为
    0（不减速）到 1（完全减速） |

    | `set gravity(x : Number, y : Number) : Nothing` | 为板上所有精灵设置统一的加速度向量 (x, y) |


    #### 弹簧与锚点


    可以在两个精灵之间添加一个弹簧，使它们相互加速靠近。弹簧通过表 9-5 中列出的 `create spring` 方法创建。弹簧的力与两个精灵之间的距离成正比。它们相距越远，力就越大。比例常数由
    `create spring` 方法的 stiffness 参数决定。该值越大，吸引力越强。


    如果没有摩擦力随时间消耗能量，由弹簧连接的精灵将无限期地振荡。有了摩擦力，它们最终会收敛到同一个点。一种常见的情况是固定板上两个弹簧连接精灵中的一个（使其不可移动）。


    生成不可移动精灵的一种方法是将它的摩擦系数设置为 1。另一种可能性是使用一个不可见的锚点精灵。`create anchor` 方法会创建一个不可见的精灵，并将其摩擦系数设置为
    1.0。因此，通过弹簧连接到锚点的精灵会围绕锚点振荡。给精灵一个垂直于弹簧方向的初始速度向量，会使精灵绕锚点做圆周运动。通过多个锚点和弹簧的组合，可以产生一些有趣的振荡路径。


    ## 9.3 `Sprite` 数据类型


    精灵是可移动的对象，在视觉上代表游戏的一部分，例如宇宙飞船和小行星。新的精灵通过 `Board` 数据类型的方法创建。一旦创建了精灵，就可以使用 `Sprite`
    数据类型的方法设置其位置、速度、质量、颜色等属性。


    ### 视觉属性


    精灵的视觉属性（如颜色和大小）可通过表 9-6 中列出的方法进行访问。


    **表 9-6** `Sprite` 数据类型的方法：视觉属性


    | Board 方法 | 描述 |

    | --- | --- |

    | `color : Color` | 返回精灵的颜色 |

    | `height : Number` | 返回精灵的高度（以像素为单位） |

    | `hide : Nothing` | 隐藏精灵（使其不可见） |

    | `is visible : Boolean` | 如果精灵未被隐藏，则返回 true |

    | `move clip(x : Number, y : Number) : Nothing` | 调整围绕由图片创建的精灵的裁剪区域 |

    | `opacity : Number` | 返回精灵的不透明度；0 为透明，1 为不透明 |

    | `picture : Picture` | 返回图片精灵的图片 |

    | `set clip(left : Number, top : Number, width : Number, height : Number) : Nothing`
    | 为由图片创建的精灵（图像精灵）设置裁剪区域 |

    | `set color(color : Color) : Nothing` | 设置精灵的颜色（如果是图片精灵则忽略） |

    | `set height(height : Number) : Nothing` | 设置精灵的高度（以像素为单位） |

    | `set opacity(opacity : Number) : Nothing` | 设置精灵的不透明度；0 为透明，1 为不透明 |

    | `set picture(pic : Picture) : Nothing` | 替换由图片创建的精灵的图片（对于非图片精灵则忽略） |

    | `set text(text : String) : Nothing` | 替换由文本字符串创建的精灵的文本（对于非文本精灵则忽略） |

    | `set width(width : Number) : Nothing` | 设置精灵的宽度（以像素为单位） |

    | `set z index(zindex : Number) : Nothing` | 设置精灵的 z-index |

    | `show : Nothing` | 显示精灵（与 hide 相反） |

    | `text : String` | 获取文本精灵的文本 |

    | `width : Number` | 获取精灵的宽度（以像素为单位） |

    | `z index : Number` | 获取精灵的 z-index |


    通过 `set z index` 和 `z index` 方法访问的 z-index 用于控制精灵在屏幕上渲染的顺序。如果两个精灵重叠，后渲染的精灵将会显示在第一个精灵的上面。


    渲染顺序可以通过 z-index 值来控制。当提供了这些值时，精灵将按照其 z-index 从小到大的顺序进行渲染。


    ### 位置与运动


    精灵有一个当前位置和一个当前角度朝向。两者都以由精灵的速度和角速度决定的速率变化。精灵的这些属性可以通过使用表 9-8 中列出的方法进行访问或更改。'
- fmt: '# Accelerations, forces and bounces


    In the absence of gravity, springs and friction, a sprite will keep moving across
    the board at a constant velocity until it hits a barrier of some kind. However,
    in the presence of these effects, the sprite’s velocity does change.


    Springs are created using the `create spring` method of the board. They have been
    covered already. The acceleration induced on a sprite by a spring’s force is inversely
    proportional to the sprite’s mass.


    Table 9-7


    Methods of `Sprite` datatype: position / velocity


    | Board Method | Description |

    | --- | --- |

    | `angle : Number` | Gets the sprite’s angle in degrees |

    | `angular speed : Number` | Gets the angular velocity in degrees/sec |

    | `move(deltax : Number, deltay : Number) : Nothing` | Adjusts the sprite’s position
    by `deltax` and `deltay` in the x,y dimensions |

    | `move towards(other : Sprite, fraction : Number) : Nothing` | Moves this sprite
    towards other sprite by specified fraction of the distance |

    | `set angle(angle: Number) : Nothing` | Sets the angle of the sprite in degrees
    |

    | `set angular speed(speed : Number) : Nothing` | Sets angular velocity in degrees/sec
    |

    | `set pos(x : Number, y : Number) : Nothing` | Sets the position of the sprite
    to new x and y coordinates |

    | `set speed(vx : Number, vy : Number) : Nothing` | Sets the x and y speed components
    of the sprite, `vx` and `vy` are in pixels/sec |

    | `set speed x(vx : Number) : Nothing` | Sets just the x component of the speed,
    in pixels/sec |

    | `set speed y(vy : Number) : Nothing` | Sets just the y component of the speed,
    in pixels/sec |

    | `set x(x : Number) : Nothing` | Sets the x coordinate of the sprite |

    | `set y(y : Number) : Nothing` | Sets the y coordinate of the sprite |

    | `speed towards(other : Sprite, magnitude : Number) : Nothing` | Sets the speed
    of this sprite to move towards another sprite; the speed is in pixels/sec |

    | `speed x : Number` | Gets the x component of the sprite’s speed in pixels/sec
    |

    | `speed y : Number` | Gets the y component of the sprite’s speed in pixels/sec
    |

    | `x : Number` | Gets the x coordinate of the position |

    | `y : Number` | Gets the y coordinate of the position |


    The heavier the sprite, the longer it will take for a spring to have its full
    effect. Each sprite has a default mass which is simply the product of the sprite’s
    width and height. However, that default can be overridden by the sprite’s `set
    mass` method. A mass cannot be made zero or negative.


    A gravitational force can be specified for the board and this applies a force
    to every sprite, excluding any anchor sprites. The size of the force is proportional
    to the sprite’s mass. However, the effect of the force on a sprite’s speed is
    inversely proportional to the mass, so the acceleration induced by gravity is
    independent of the sprite’s mass.


    An additional force which works to slow down a moving sprite is friction. A friction
    value can be specified for the board using its `set friction` method. This becomes
    the default friction value for all sprites on the board. However, friction can
    also be set for individual sprites using the `set friction` method of the `Sprite`
    instance.


    All these forces listed above combine to produce the net force on a sprite and
    cause a sprite to move. If the combined forces do not produce the desired effect,
    there is one more adjustment which can be made. This adjustment is produced by
    the `set acceleration` method, covered in the next subsection of this chapter.


    When a sprite hits an obstacle, the sprite rebounds with a new velocity in a new
    direction. The magnitude of that new velocity is determined by the product of
    the elasticities of the sprite and the obstacle. If both elasticities are 1, it
    is a perfect bounce which loses no energy. The sprite loses no speed. If the product
    is 0, the sprite stops and stays stuck to the obstacle.


    The current implementation of the game board does not detect collisions between
    sprites. It requires too much computation, especially if there are many sprites.
    One sprite will simply appear to pass through another sprite.


    The methods for accessing friction, mass and elasticity settings for a sprite
    are listed in Table [9-8](#text00009.html#Tab8).'
