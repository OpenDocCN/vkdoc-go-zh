- fmt: "# 1. Introduction to TouchDevelop\n\nComputers want to be programmed  \nWhat\
    \ is TouchDevelop?  \nThe TouchDevelop ecosystem  \nHistory and Future  \nPlatforms\
    \  \nThe scripting language  \nKeywords Mobile Device Cloud Service Near Field\
    \ Communication Window Phone Missile Defense\n\nTouchDevelop is a complete app\
    \ creation ecosystem designed for touch, cloud connected, mobile devices. This\
    \ chapter provides a brief introduction to the world of TouchDevelop scripting\
    \ and the devices that support it.\n\n## Computers want to be programmed\n\nComputers\
    \ are everywhere, and they take on many different forms: TVs, smart phones, fridges\
    \ with apps, etc. Despite this abundance of form and function, until recently,\
    \ most people thought of desktop PCs and then laptops when they were asked about\
    \ computers. This perception is shifting, as smartphones and tablets are quickly\
    \ becoming the main computers for an increasing number of people. As a matter\
    \ of fact, smartphone sales have surpassed PC sales even faster than some analysts\
    \ anticipated.\n\nNew smartphone and tablet models are getting more powerful and\
    \ becoming suitable for many tasks that used to require PCs. Mobile devices have\
    \ become well established tools for reading and composing emails, browsing the\
    \ web, and playing games. These devices are even being used to annotate documents.\
    \ And yet, the one task that can be seen as the defining moment of any computing\
    \ platform is not yet widely performed on smartphones and tablets: writing code,\
    \ or even creating entire applications.\n\nThe previous generation of people who\
    \ grew up with full featured PCs always had the option to program them. While\
    \ most people chose not to do that, they at least had the option. Decades of programming\
    \ language and development environment research produced powerful tools suitable\
    \ for PCs. It is through exploring this opportunity that many young people became\
    \ interested in computer science.\n\nUnfortunately, in the new world of apps and\
    \ app marketplaces with a focus on existing curated content, it seems that the\
    \ creative outlet of programming that encouraged aspiring programmers in the past\
    \ is no longer easily accessible. The ability to program on the very device one\
    \ owns and uses all the time is not a prominent option anymore.\n\nGranted, smartphones\
    \ and tablets pose new challenges for programming tasks. These devices have no\
    \ physical keyboard, the screen tends to be rather small, and data tends to not\
    \ be stored locally but is dynamically fetched from the cloud. A group at Microsoft\
    \ Research asked the question: “Is it possible to create interesting apps directly\
    \ on a smartphone, without using a separate PC or a keyboard?” It is in the attempt\
    \ to answer this question that TouchDevelop was born.\n\nThe TouchDevelop team\
    \ took on the challenge of rethinking computer programming from the ground up,\
    \ trying to understand how a modern mobile touch-screen device should be programmed\
    \ in its own right. TouchDevelop was created with a goal to ignore the legacy\
    \ of programming languages optimized for linear text input via a keyboard, often\
    \ having a verbosity that assumes big screens.\n\nWe believe that as more people\
    \ adopt mobile devices as their primary, or possibly only, computing devices,\
    \ it will become more important to not just enable users to consume content but\
    \ to also empower them to produce content. We particularly believe in empowering\
    \ users to produce new applications.\n\n## What is TouchDevelop?\n\nTouchDevelop\
    \ is a novel application development environment that allows anyone to script\
    \ their mobile devices anywhere. It does not need a separate PC and can be used\
    \ by students, hobbyists, power users, and developers. Through TouchDevelop, users\
    \ can create scripts (i.e., apps written using TouchDevelop) to access data, media,\
    \ and sensors on a smart phone, tablet or PC. The scripts can also interact with\
    \ the cloud services for storage, computing, and social networks. TouchDevelop\
    \ applications can serve many purposes and are typically written for fun, for\
    \ personalizing the phone, and for creating productivity tools.\n\nTouchDevelop\
    \ brings the excitement of the first programmable personal computers to the now\
    \ ubiquitous mobile devices. Scripts developed using TouchDevelop allow users\
    \ to show and manipulate music and pictures stored on their own mobile devices,\
    \ to use the device’s sensors, and to interact with friends in their social networks.\n\
    \nTouchDevelop can be used to develop games such as “missile defense”, which is\
    \ a full featured game where cities must be defended against incoming missiles\
    \ ( [`https://www.touchdevelop.com/zvpj`](https://www.touchdevelop.com/zvpj) ).\
    \ The script for this sample game can be downloaded to the TouchDevelop application\
    \ installed on a Windows Phone or directly from the TouchDevelop web application.\
    \ The user has full access to the script and can modify the game in any way imaginable.\
    \ If someone has made improvements to the game, the improved game can be shared\
    \ with others. It is as simple as tapping a button to upload the changed script\
    \ back to the website. The script will be assigned a different identification\
    \ tag (replacing the `/zvpj` letters at the end of the URL). If the author of\
    \ missile defense publishes an update, TouchDevelop will automatically redirect\
    \ the user to the latest version of that game.\n\nAn example of a TouchDevelop\
    \ script being used for productivity is the “my online meetings” script, which\
    \ finds active online meetings. If there is one, it can be joined through the\
    \ Microsoft Lync application installed on the phone ( [`https://www.touchdevelop.com/mpuj`](https://www.touchdevelop.com/mpuj)\
    \ ).\n\nThe TouchDevelop website provides a variety of scripts that can be used\
    \ for learning or as examples. Sample scripts meant to illustrate how to use the\
    \ built-in APIs can be found at the URL [`https://www.touchdevelop.com/pboj`](https://www.touchdevelop.com/pboj)\
    \ . Scripts written by other users can be found by going to the TouchDevelop URL\
    \ [`https://www.touchdevelop.com/search`](https://www.touchdevelop.com/search)\
    \ and entering a term like ‘game’ into the search box. Alternatively one can explore\
    \ the on-line API manual at [`https://www.touchdevelop.com/doc/api`](https://www.touchdevelop.com/doc/api)\
    \ ."
  raw: '# 1. Introduction to TouchDevelop


    [Computers want to be programmed](#text00001.html#Sec1) [What is TouchDevelop?](#text00001.html#Sec2)
    [The TouchDevelop ecosystem](#text00001.html#Sec3) [History and Future](#text00001.html#Sec4)
    [Platforms](#text00001.html#Sec5) [The scripting language](#text00001.html#Sec8)
    Keywords Mobile Device Cloud Service Near Field Communication Window Phone Missile
    Defense


    TouchDevelop is a complete app creation ecosystem designed for touch, cloud connected,
    mobile devices. This chapter provides a brief introduction to the world of TouchDevelop
    scripting and the devices that support it.


    ## Computers want to be programmed


    Computers are everywhere, and they take on many different forms: TVs, smart phones,
    fridges with apps, etc. Despite this abundance of form and function, until recently,
    most people thought of desktop PCs and then laptops when they were asked about
    computers. This perception is shifting, as smartphones and tablets are quickly
    becoming the main computers for an increasing number of people. As a matter of
    fact, smartphone sales have surpassed PC sales even faster than some analysts
    anticipated.


    New smartphone and tablet models are getting more powerful and becoming suitable
    for many tasks that used to require PCs. Mobile devices have become well established
    tools for reading and composing emails, browsing the web, and playing games. These
    devices are even being used to annotate documents. And yet, the one task that
    can be seen as the defining moment of any computing platform is not yet widely
    performed on smartphones and tablets: writing code, or even creating entire applications.


    The previous generation of people who grew up with full featured PCs always had
    the option to program them. While most people chose not to do that, they at least
    had the option. Decades of programming language and development environment research
    produced powerful tools suitable for PCs. It is through exploring this opportunity
    that many young people became interested in computer science.


    Unfortunately, in the new world of apps and app marketplaces with a focus on existing
    curated content, it seems that the creative outlet of programming that encouraged
    aspiring programmers in the past is no longer easily accessible. The ability to
    program on the very device one owns and uses all the time is not a prominent option
    anymore.


    Granted, smartphones and tablets pose new challenges for programming tasks. These
    devices have no physical keyboard, the screen tends to be rather small, and data
    tends to not be stored locally but is dynamically fetched from the cloud. A group
    at Microsoft Research asked the question: “Is it possible to create interesting
    apps directly on a smartphone, without using a separate PC or a keyboard?” It
    is in the attempt to answer this question that TouchDevelop was born.


    The TouchDevelop team took on the challenge of rethinking computer programming
    from the ground up, trying to understand how a modern mobile touch-screen device
    should be programmed in its own right. TouchDevelop was created with a goal to
    ignore the legacy of programming languages optimized for linear text input via
    a keyboard, often having a verbosity that assumes big screens.


    We believe that as more people adopt mobile devices as their primary, or possibly
    only, computing devices, it will become more important to not just enable users
    to consume content but to also empower them to produce content. We particularly
    believe in empowering users to produce new applications.


    ## What is TouchDevelop?


    TouchDevelop is a novel application development environment that allows anyone
    to script their mobile devices anywhere. It does not need a separate PC and can
    be used by students, hobbyists, power users, and developers. Through TouchDevelop,
    users can create scripts (i.e., apps written using TouchDevelop) to access data,
    media, and sensors on a smart phone, tablet or PC. The scripts can also interact
    with the cloud services for storage, computing, and social networks. TouchDevelop
    applications can serve many purposes and are typically written for fun, for personalizing
    the phone, and for creating productivity tools.


    TouchDevelop brings the excitement of the first programmable personal computers
    to the now ubiquitous mobile devices. Scripts developed using TouchDevelop allow
    users to show and manipulate music and pictures stored on their own mobile devices,
    to use the device’s sensors, and to interact with friends in their social networks.


    TouchDevelop can be used to develop games such as “missile defense”, which is
    a full featured game where cities must be defended against incoming missiles (
    [`https://www.touchdevelop.com/zvpj`](https://www.touchdevelop.com/zvpj) ). The
    script for this sample game can be downloaded to the TouchDevelop application
    installed on a Windows Phone or directly from the TouchDevelop web application.
    The user has full access to the script and can modify the game in any way imaginable.
    If someone has made improvements to the game, the improved game can be shared
    with others. It is as simple as tapping a button to upload the changed script
    back to the website. The script will be assigned a different identification tag
    (replacing the `/zvpj` letters at the end of the URL). If the author of missile
    defense publishes an update, TouchDevelop will automatically redirect the user
    to the latest version of that game.


    An example of a TouchDevelop script being used for productivity is the “my online
    meetings” script, which finds active online meetings. If there is one, it can
    be joined through the Microsoft Lync application installed on the phone ( [`https://www.touchdevelop.com/mpuj`](https://www.touchdevelop.com/mpuj)
    ).


    The TouchDevelop website provides a variety of scripts that can be used for learning
    or as examples. Sample scripts meant to illustrate how to use the built-in APIs
    can be found at the URL [`https://www.touchdevelop.com/pboj`](https://www.touchdevelop.com/pboj)
    . Scripts written by other users can be found by going to the TouchDevelop URL
    [`https://www.touchdevelop.com/search`](https://www.touchdevelop.com/search) and
    entering a term like ‘game’ into the search box. Alternatively one can explore
    the on-line API manual at [`https://www.touchdevelop.com/doc/api`](https://www.touchdevelop.com/doc/api)
    .'
  trans: "\n# 1. TouchDevelop 简介\n\n电脑渴望被编程  \n什么是 TouchDevelop？  \nTouchDevelop 生态系统\
    \  \n历史与未来  \n平台  \n脚本语言  \n关键词：移动设备 云服务 近场通信 窗口手机 导弹防御\n\nTouchDevelop 是一个完整的应用创建生态系统，专为触控、云端互联的移动设备而设计。本章将简要介绍\
    \ TouchDevelop 脚本世界及其支持的设备。\n\n## 电脑渴望被编程\n\n电脑无处不在，且形态各异：电视、智能手机、带应用程序的冰箱等。尽管形式和功能如此丰富，直到最近，大多数人被问及电脑时，首先想到的仍是台式电脑，然后才是笔记本电脑。这种认知正在转变，因为智能手机和平板电脑正迅速成为越来越多人的主要计算设备。事实上，智能手机的销量甚至比某些分析师预期的更快地超过了个人电脑。\n\
    \n新型智能手机和平板电脑性能日益强大，足以胜任许多原本需要个人电脑才能完成的任务。移动设备已成为阅读和撰写电子邮件、浏览网页和玩游戏等用途的成熟工具。这些设备甚至被用于批注文档。然而，有一项可被视为任何计算平台决定性时刻的任务，至今尚未在智能手机和平板电脑上广泛普及：编写代码，甚至创建完整的应用程序。\n\
    \n上一代人是伴随着功能齐全的个人电脑成长的，他们总有机会对这些电脑进行编程。尽管大多数人选择不这样做，但他们至少拥有这个选项。数十年的编程语言和开发环境研究，为个人电脑打造了功能强大的工具。正是通过探索这一机会，许多年轻人对计算机科学产生了兴趣。\n\
    \n不幸的是，在这个以现有精选内容为核心的应用程序和应用程序市场的新世界里，过去曾激励有抱负程序员的那种编程创作途径似乎已不再容易触及。人们在自己拥有且日常使用的设备上进行编程的能力，已不再是显著的选项。\n\
    \n诚然，智能手机和平板电脑为编程任务带来了新的挑战。这些设备没有物理键盘，屏幕通常较小，数据通常不存储在本地，而是从云端动态获取。微软研究院的一个团队提出了一个问题：“是否有可能直接在智能手机上创建有趣的应用程序，而无需使用单独的个人电脑或键盘？”正是为了尝试回答这个问题，TouchDevelop\
    \ 应运而生。\n\nTouchDevelop 团队接受了从头开始重新思考计算机编程的挑战，试图理解现代移动触屏设备应如何以其自身方式被编程。TouchDevelop\
    \ 的创建目标是摒弃那些针对通过键盘输入线性文本而优化、且通常因假设大屏幕而显得冗长的编程语言的遗留问题。\n\n我们相信，随着越来越多的人将移动设备作为其主要（甚至可能是唯一）的计算设备，不仅让用户能够消费内容，而且赋予他们生产内容的能力将变得更加重要。我们尤其相信要赋予用户创建新应用程序的能力。\n\
    \n## 什么是 TouchDevelop？\n\nTouchDevelop 是一种新颖的应用程序开发环境，允许任何人在任何地方为其移动设备编写脚本。它不需要单独的个人电脑，可供学生、爱好者、高级用户和开发人员使用。通过\
    \ TouchDevelop，用户可以创建脚本（即使用 TouchDevelop 编写的应用），以访问智能手机、平板电脑或个人电脑上的数据、媒体和传感器。这些脚本还可以与用于存储、计算和社交网络的云服务进行交互。TouchDevelop\
    \ 应用程序用途广泛，通常是为了娱乐、个性化手机以及创建生产力工具而编写的。\n\nTouchDevelop 将第一代可编程个人电脑的兴奋感带到了如今无处不在的移动设备上。使用\
    \ TouchDevelop 开发的脚本，用户可以展示和操作存储在自己移动设备上的音乐和图片，使用设备的传感器，并与社交网络中的朋友互动。\n\nTouchDevelop\
    \ 可用于开发诸如“导弹防御”之类的游戏，这是一款功能完备的游戏，玩家必须保卫城市抵御来袭导弹（ [`https://www.touchdevelop.com/zvpj`](https://www.touchdevelop.com/zvpj)\
    \ ）。这个示例游戏的脚本可以下载到安装在 Windows Phone 上的 TouchDevelop 应用程序中，或直接从 TouchDevelop 网络应用程序下载。用户可以完全访问脚本，并以任何可以想象的方式修改游戏。如果有人对游戏进行了改进，改进后的游戏可以与其他人分享。只需轻点按钮，即可将修改后的脚本上传回网站。该脚本将被分配一个不同的标识标签（替换\
    \ URL 末尾的 `/zvpj` 字符）。如果“导弹防御”的作者发布了更新，TouchDevelop 会自动将用户重定向到该游戏的最新版本。\n\n一个用于提高生产力的\
    \ TouchDevelop 脚本示例是“我的在线会议”脚本，该脚本可查找正在进行的在线会议。如果存在此类会议，可以通过手机上安装的 Microsoft Lync\
    \ 应用程序加入（ [`https://www.touchdevelop.com/mpuj`](https://www.touchdevelop.com/mpuj)\
    \ ）。\n\nTouchDevelop 网站提供了各种脚本，可用于学习或作为示例。旨在说明如何使用内置 API 的示例脚本可在 URL [`https://www.touchdevelop.com/pboj`](https://www.touchdevelop.com/pboj)\
    \ 找到。通过访问 TouchDevelop 网址 [`https://www.touchdevelop.com/search`](https://www.touchdevelop.com/search)\
    \ 并在搜索框中输入诸如“game”之类的术语，可以找到其他用户编写的脚本。此外，也可在 [`https://www.touchdevelop.com/doc/api`](https://www.touchdevelop.com/doc/api)\
    \ 探索在线 API 手册。\n"
- fmt: '# The TouchDevelop ecosystem


    A script developed using the TouchDevelop editor can be shared with other users
    by using the TouchDevelop cloud infrastructure at [`https://www.touchdevelop.com`](https://www.touchdevelop.com/).


    Figure [1-1](#text00001.html#Fig1) gives a high level architectural overview of
    the TouchDevelop ecosystem: regardless of whether a phone or browser client is
    used, all information such as scripts is retrieved and stored in the `touchdevelop.com`
    cloud service.


    ![A978-1-4302-6137-7_1_Fig1_HTML.jpg](Image00014.jpg)


    Figure 1-1


    The TouchDevelop ecosystem


    TouchDevelop scripts are developed by users on their devices and executed within
    the TouchDevelop run time environment. These scripts can be shared with other
    users. The TouchDevelop cloud infrastructure supports this sharing amongst a community
    of TouchDevelop users. These scripts can also be searched, viewed, and installed
    into a user’s account using the TouchDevelop website. The cloud infrastructure
    enables sharing, and, acts as a repository of all scripts developed and published
    by users.


    The TouchDevelop website allocates a unique deep link for each script on [`http://touchdevelop.com`](http://touchdevelop.com/);
    where each script is identified by a seemingly random letter sequence. For example,
    [`https://www.touchdevelop.com/zpco`](https://www.touchdevelop.com/zpco) refers
    to a particular version of the TouchInvaders game, as in Figure [1-2](#text00001.html#Fig2).
    It can be used to open the script directly. This link can be shared with other
    people or on social networks.


    ![A978-1-4302-6137-7_1_Fig2_HTML.jpg](Image00015.jpg)


    Figure 1-2


    Viewing metadata of a script


    If a user likes this script, he or she can show their appreciation of a script
    or a comment by giving it a positive review in the form of a “heart”.


    On any client, a phone or a web browser, the user can edit a script as shown in
    Figure [1-3](#text00001.html#Fig3).


    ![A978-1-4302-6137-7_1_Fig3_HTML.jpg](Image00016.jpg)


    Figure 1-3


    Editing a script


    ## History and Future


    After releasing TouchDevelop in April of 2011, first exclusively available for
    Windows Phone, the overwhelming response surprised us. Since then, more than 300,000
    people downloaded the app. At first, TouchDevelop was limited to creating scripts
    on the device where it was installed – there was no way to share scripts with
    other people.


    In August 2011, the update to v2.0 of TouchDevelop brought sharing of scripts
    via the `touchdevelop.com` cloud service. The update also enabled many more social
    features such as reviewing scripts, writing comments, taking screenshots, etc.
    Since then, more than 90,000 people registered online and shared more than 25,000
    scripts, most of them written entirely on phones. Many features were added over
    time, making TouchDevelop an increasingly powerful development environment and
    language. The features include support for libraries for code reuse and custom
    structured data types.


    In order to share scripts not only within the TouchDevelop environment, but also
    with other people who might not be aware of TouchDevelop, we added the ability
    to export scripts as apps that can be submitted to the Windows Phone Store. This
    capability has existed since March of 2012.


    In October 2012, TouchDevelop took a giant step forward. Thanks to a complete
    re-implementation, TouchDevelop could now run not just on Windows Phones, but
    on virtually any modern device in a browser as a Web App. The supported platforms
    include PC, Mac, iPhone, iPad, iPod Touch, and Android. The new TouchDevelop implementation
    harnesses the power of HTML5 and JavaScript, while still using the same programming
    language as before. The code editor dynamically adjusts to the screen size to
    accommodate small screens on smartphones, medium-sized screens on tablets, and
    large screens on PCs. The user interface of the Web App has again been optimized
    for touchscreens, but a keyboard and a mouse can also be used if desired and available.
    At the same time, we also added the ability to export scripts as apps that can
    be submitted to the Windows Store (which is a separate concern from the Windows
    Phone Store).


    In the near future, the update v3.0 of the TouchDevelop app for Windows Phone
    will bring the same editing and execution engine that currently powers the TouchDevelop
    Web App to Windows Phone 8 devices.


    A significant upcoming addition to the TouchDevelop programming language will
    be the concept of “cloud state.” By just tagging a variable as “cloud”, similar
    to how one marks a variable as “static” in C#, an app is turned into a distributed
    app with shared state. All changes to that variable will get automatically synchronized
    between different devices and users.


    ## Platforms


    There are a number of optional sensors for Windows Phones. “Near field communication”
    (NFC), front camera, rear camera, magnetometer and gyroscope may or may not be
    present in any given device model. Similarly, some browsers choose to expose certain
    sensors while others don’t. Safari on iOS exposes the accelerometer; Chrome on
    Android only partially, and Internet Explorer 10 not at all. This variety is most
    likely an artifact of the continuously evolving HTML5 standard; so, hopefully,
    more and more sensors will be supported by all browsers as time goes by.


    Depending on these constraints, and depending on whether you are running the native
    TouchDevelop app on Windows Phone or the Web App in the browser, different feature
    sets are available to you when you write your scripts. See [`https://www.touchdevelop.com/platforms`](https://www.touchdevelop.com/platforms)
    for a complete and up-to-date overview of the different platform capabilities.


    ### Installing TouchDevelop on a Windows phone


    If TouchDevelop is to be used for the first time on a Windows Phone, it will need
    to be installed. To install the app, follow these steps:


    1.  Tap the Store tile on the Windows phone.

    2.  Press the search icon at the bottom of the screen, and type the text `touchdevelop`
    into the Store Search text box. Before you finish typing all the letters, the
    TouchDevelop app should appear as a choice on the screen.

    3.  Tap that choice to select it.

    4.  Tap Install.


    If your device is running a Windows Phone 7 or 7.5 or 7.8 operating system, then
    you will get TouchDevelop v2.0, which uses a slightly different user interface
    that does not match the screenshots in this book, and its language is a subset
    what is discussed in this book.


    If your device is running Windows Phone 8, then you will get TouchDevelop v3.0,
    which resembles the Web App at [`https://www.touchdevelop.com/app`](https://www.touchdevelop.com/app),
    but it exposes many more sensors and data providers available on the phone.


    ### Running TouchDevelop on other platforms


    On all other platforms, TouchDevelop does not come as an app in a marketplace,
    but instead as a Web App. You can run it from your web browser:


    1.  Go to [`https://www.touchdevelop.com/`](https://www.touchdevelop.com/)

    2.  Log in. You will be taken to the Web App.'
