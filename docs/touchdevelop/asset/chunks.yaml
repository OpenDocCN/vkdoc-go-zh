    to be a global data variable (in the data section of a script).


    If the data variable is named SSS, then the corresponding event names are `tap
    sprite SSS` , `swipe sprite SSS` and `drag sprite SSS` .


    ## 9.6 Debugging games


    To make it a bit simpler to debug sprite position and speed related problems in
    scripts, the debug mode for the board can be enabled.


            `◳board→set debug mode(true)`


    If debug mode is on, the board will display the position and speed of a sprite
    next to the sprite content. Additionally, the width and height is displayed as
    a box around the sprite. Also, in debug mode, even invisible sprites are displayed.
    This can be useful for finding forgotten sprites or where anchors are placed.


