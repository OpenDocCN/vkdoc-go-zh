- fmt: "### A sample program (`/okzc`)\n\nThis sample program is shown in Figure [2-1](#text00002.html#Fig1).\
    \ It uses several features provided by the API. They will be explained only briefly.\
    \ More complete explanations are provided in later chapters. Note that this script\
    \ runs only on a Windows Phone.\n\nThe script comprises two actions and two events.\
    \ The action named `main` is the entry point for the script. The action named\
    \ `display song` is called by `main`. It has one input parameter named `song`\
    \ (with type `Song`) and has one result parameter named `result` (with type `Number`).\n\
    \nThe `main` action defines and initializes a local variable named `found`. No\
    \ datatype is provided in that definition; it is inferred from the value used\
    \ for initialization which has type `Number`. The local variable named `songs`\
    \ is, by using the API, initialized with a collection of all songs held on the\
    \ phone.\n\nTable 2-1\n\nSpecial symbols used in scripts\n\n| Symbol | Unicode\
    \ Value | Description |\n| --- | --- | --- |\n| → | U+2192 | Select a method or\
    \ field belonging to the value provided on the left |\n| ▷ | U+25B7 | Call the\
    \ action named on the right and defined in the current script |\n| ◳ | U+25F3\
    \ | Access a global persistent variable defined in the data section of the script\
    \ |\n| ♻ | U+267B | Call a function defined in another script, which has been\
    \ published as a library |\n| ⌹ | U+2339 | Access a datatype or item declared\
    \ in the record section of the script |\n| ✿ | U+273F | Access a value in the\
    \ art section of the script |\n\nA for-each loop steps through every value in\
    \ the collection, assigning the next variable to a new local variable named `song`.\
    \ The first statement inside the loop calls an action using the notation ▷`display\
    \ song(song)`. It passes a reference to the local variable `song` and receives\
    \ a number back as the result, adding that to the `found` variable.\n\nThe second\
    \ statement inside the loop takes a string constant and concatenates the value\
    \ of the global data item named `played`. The preceding symbol `◳` indicates that\
    \ the variable has global scope and is persistent. The string concatenation operator\
    \ is `||` and is the only operator in TouchDevelop which is overloaded – meaning\
    \ that it accepts operands with any datatypes and those operand values are converted\
    \ to strings.\n\nThe resulting string value constructed by the concatenation appears\
    \ to the left of the arrow operator →. It indicates that the value is to be transmitted\
    \ to the method shown on the right, whose name is `post to wall`. Almost every\
    \ datatype has a `post to wall` method; it causes a representation of the value\
    \ to be displayed on the screen.\n\nThe sample script contains two events. An\
    \ event is an action which is executed whenever the specified event occurs. The\
    \ `shake` event is caused by physically shaking the phone. When shaking is detected\
    \ by the phone’s sensors, the code provided for the `shake` event is executed.\
    \ Events do not interrupt each other; they are executed in first-come first-served\
    \ order.\n\n![A978-1-4302-6137-7_2_Fig1_HTML.jpg](Image00017.jpg)\n\nFigure 2-1\n\
    \nThe ‘new songs’ script (`/okzc`)\n\nIf a script contains one or more events,\
    \ the main program does not terminate. It waits for events to occur. In this case,\
    \ the script terminates only if halted by the user (e.g. tapping the phone’s back\
    \ button) or if it executes a call to a method in the API for that purpose (`time`\
    \ → `stop`).\n\n## Datatypes and variables\n\nEach type (except the special type\
    \ `Nothing`) belongs to one of two categories: Value Types or Reference Types.\
    \ If a variable has a value type, then storage for an instance of that type is\
    \ held inside the variable itself. For example, a variable with type `Number`\
    \ is allocated storage which is used to hold number values. However, if a variable\
    \ has a reference type, then storage for its value is allocated on the heap and\
    \ the variable holds a reference to that heap storage.\n\n### 2.2.1 The `Invalid`\
    \ value\n\nEvery datatype (except the special type `Nothing`) has a special value\
    \ `Invalid` in addition to all its normal values. This special value is normally\
    \ used to indicate that a global data variable has not been initialized or that\
    \ a method in the API was unable to return a value. TouchDevelop provides a method\
    \ for testing a value of any datatype (except `Nothing`) to test whether it is\
    \ the `Invalid` value. There are also API methods for obtaining the `Invalid`\
    \ value for any desired type.\n\nIf a data structure (such as a tree or linked\
    \ list) is constructed using `Object` types declared in the `Records` section\
    \ of a script, the `Invalid` value would usually be used to play the role of a\
    \ `null` reference value.\n\nSome code to demonstrate the use of `Invalid` values\
    \ appears below.\n\n```\nvar numUsers := 0\n…\nif connection failure detected\
    \ then\n    numUsers := invalid → number\nelse\n…\nif numUsers → is invalid then\n\
    \    “Script is terminating” → post to wall\nElse\n```"
  raw: '### A sample program (/okzc)


    This sample program is shown in Figure [2-1](#text00002.html#Fig1) . It uses several
    features provided by the API. They will be explained only briefly. More complete
    explanations are provided in later chapters. Note that this script runs only on
    a Windows Phone.


    The script comprises two actions and two events. The action named `main` is the
    entry point for the script. The action named `display song` is called by `main`
    . It has one input parameter named `song` (with type `Song` ) and has one result
    parameter named `result` (with type `Number` ).


    The main action defines and initializes a local variable named `found` . No datatype
    is provided in that definition; it is inferred from the value used for initialization
    which has type `Number` . The local variable named `songs` is, by using the API,
    initialized with a collection of all songs held on the phone.


    Table 2-1


    Special symbols used in scripts


    | Symbol | Unicode Value | Description |

    | --- | --- | --- |

    | → | U+2192 | Select a method or field belonging to the value provided on the
    left |

    | ▷ | U+25B7 | Call the action named on the right and defined in the current script
    |

    | ◳ | U+25F3 | Access a global persistent variable defined in the data section
    of the script |

    | ♻ | U+267B | Call a function defined in another script, which has been published
    as a library |

    | ⌹ | U+2339 | Access a datatype or item declared in the record section of the
    script |

    | ✿ | U+273F | Access a value in the art section of the script |


    A for-each loop steps through every value in the collection, assigning the next
    variable to a new local variable named `song` . The first statement inside the
    loop calls an action using the notation ▷`display song(song)` . It passes a reference
    to the local variable `song` and receives a number back as the result, adding
    that to the `found` variable.


    The second statement inside the loop takes a string constant and concatenates
    the value of the global data item named played. The preceding symbol `◳` indicates
    that the variable has global scope and is persistent. The string concatenation
    operator is `||` and is the only operator in TouchDevelop which is overloaded
    – meaning that it accepts operands with any datatypes and those operand values
    are converted to strings.


    The resulting string value constructed by the concatenation appears to the left
    of the arrow operator →. It indicates that the value is to be transmitted to the
    method shown on the right, whose name is `post to wall` . Almost every datatype
    has a `post to wall` method; it causes a representation of the value to be displayed
    on the screen.


    The sample script contains two events. An event is an action which is executed
    whenever the specified event occurs. The `shake` event is caused by physically
    shaking the phone. When shaking is detected by the phone’s sensors, the code provided
    for the `shake` event is executed. Events do not interrupt each other; they are
    executed in first-come first-served order.


    ![A978-1-4302-6137-7_2_Fig1_HTML.jpg](Image00017.jpg)


    Figure 2-1


    The ‘new songs’ script (/okzc)


    If a script contains one or more events, the main program does not terminate.
    It waits for events to occur. In this case, the script terminates only if halted
    by the user (e.g. tapping the phone’s back button) or if it executes a call to
    a method in the API for that purpose (`time` →`stop` ).


    ## Datatypes and variables


    Each type (except the special type `Nothing` ) belongs to one of two categories:
    Value Types or Reference Types . If a variable has a value type, then storage
    for an instance of that type is held inside the variable itself. For example,
    a variable with type Number is allocated storage which is used to hold number
    values. However, if a variable has a reference type, then storage for its value
    is allocated on the heap and the variable holds a reference to that heap storage.


    ### 2.2.1 The Invalid value


    Every datatype (except the special type `Nothing` ) has a special value `Invalid`
    in addition to all its normal values. This special value is normally used to indicate
    that a global data variable has not been initialized or that a method in the API
    was unable to return a value. TouchDevelop provides a method for testing a value
    of any datatype (except `Nothing` ) to test whether it is the `Invalid` value.
    There are also API methods for obtaining the Invalid value for any desired type.


    If a data structure (such as a tree or linked list) is constructed using `Object`
    types declared in the `Records` section of a script, the `Invalid` value would
    usually be used to play the role of a `null` reference value.


    Some code to demonstrate the use of `Invalid` values appears below.


        `var` `numUsers := 0`


        `…`


        `if` `connection failure detected` `then`


            `numUsers := invalid → number`


        `else`


        `…`


        `if` `numUsers → is invalid` `then`


            `“Script is terminating” → post to wall`


        `Else`'
  trans: "\n### 示例程序（`/okzc`）\n\n该示例程序如图 2-1 所示。它使用了 API 提供的若干特性，此处仅作简要说明，更完整的解释将在后续章节中给出。请注意，该脚本仅在\
    \ Windows Phone 上运行。\n\n该脚本包含两个动作和两个事件。名为 `main` 的动作是脚本的入口点。名为 `display song`\
    \ 的动作由 `main` 调用。它有一个名为 `song`（类型为 `Song`）的输入参数，以及一个名为 `result`（类型为 `Number`）的结果参数。\n\
    \n`main` 动作定义并初始化了一个名为 `found` 的局部变量。该定义中未提供数据类型；它是根据用于初始化的值推断而来，该值类型为 `Number`。名为\
    \ `songs` 的局部变量通过使用 API，被初始化为手机中所有歌曲的集合。\n\n表 2-1\n\n脚本中使用的特殊符号\n\n| 符号 | Unicode\
    \ 值 | 描述 |\n| --- | --- | --- |\n| → | U+2192 | 选择左侧值所属的方法或字段 |\n| ▷ | U+25B7\
    \ | 调用右侧命名且在当脚本中定义的动作 |\n| ◳ | U+25F3 | 访问脚本数据部分中定义的全局持久变量 |\n| ♻ | U+267B | 调用另一个脚本中定义的、已作为库发布的函数\
    \ |\n| ⌹ | U+2339 | 访问脚本记录部分中声明的数据类型或项 |\n| ✿ | U+273F | 访问脚本艺术部分中的值 |\n\n一个 for-each\
    \ 循环遍历集合中的每一个值，将下一个变量赋值给一个名为 `song` 的新局部变量。循环内的第一条语句使用符号 ▷`display song(song)`\
    \ 调用一个动作。它传递了对局部变量 `song` 的引用，并接收一个数字作为结果，将其添加到 `found` 变量中。\n\n循环内的第二条语句获取一个字符串常量，并连接名为\
    \ `played` 的全局数据项的值。前面的符号 `◳` 表示该变量具有全局作用域且是持久的。字符串连接运算符是 `||`，它是 TouchDevelop\
    \ 中唯一重载的运算符——这意味着它接受任何数据类型的操作数，并且这些操作数的值会被转换为字符串。\n\n由连接操作构建的结果字符串值出现在箭头运算符 →\
    \ 的左侧。它表示该值将被传输到右侧显示的方法，其名称为 `post to wall`。几乎每种数据类型都有一个 `post to wall` 方法；它会导致该值的表示形式显示在屏幕上。\n\
    \n该示例脚本包含两个事件。事件是在指定事件发生时执行的动作。`shake` 事件由物理摇晃手机触发。当手机传感器检测到摇晃时，为 `shake` 事件提供的代码将被执行。事件不会相互中断；它们按照先到先服务的顺序执行。\n\
    \n![A978-1-4302-6137-7_2_Fig1_HTML.jpg](img/Image00017.jpg)\n\n图 2-1\n\n“新歌曲”脚本（`/okzc`）\n\
    \n如果脚本包含一个或多个事件，则主程序不会终止。它会等待事件发生。在这种情况下，脚本仅在用户停止（例如，点击手机的后退按钮）或执行对 API 中相应方法的调用（`time`\
    \ → `stop`）时才会终止。\n\n## 数据类型和变量\n\n每种类型（特殊类型 `Nothing` 除外）都属于以下两类之一：值类型或引用类型。如果变量是值类型，则该类型实例的存储空间直接保存在变量内部。例如，类型为\
    \ `Number` 的变量会被分配用于存储数字值的存储空间。然而，如果变量是引用类型，则其值的存储空间会在堆上分配，变量持有对该堆存储空间的引用。\n\n\
    ### 2.2.1 `Invalid` 值\n\n每种数据类型（特殊类型 `Nothing` 除外）除了其所有正常值外，还有一个特殊值 `Invalid`。此特殊值通常用于指示全局数据变量尚未初始化，或\
    \ API 中的方法无法返回值。TouchDevelop 提供了一种方法，用于测试任何数据类型（`Nothing` 除外）的值是否为 `Invalid` 值。还有\
    \ API 方法用于获取任何所需类型的 `Invalid` 值。\n\n如果使用脚本的 `Records` 部分中声明的 `Object` 类型构建数据结构（如树或链表），则通常使用\
    \ `Invalid` 值来扮演 `null` 引用值的角色。\n\n下面是一些演示 `Invalid` 值用法的代码。\n\n```\nvar numUsers\
    \ := 0\n…\nif 检测到连接失败 then\n    numUsers := invalid → number\nelse\n…\nif numUsers\
    \ → is invalid then\n    “脚本正在终止” → post to wall\nElse\n```\n"
- fmt: "### The `Nothing` type\n\nA method or an operation which does not return a\
    \ usable result, but which otherwise succeeded, actually returns a value of type\
    \ `Nothing`. For example, the `post to wall` method which is provided for every\
    \ datatype returns a result of type `Nothing`. In some languages, such as F#,\
    \ the `Unit` type is the equivalent of the `Nothing` type in TouchDevelop. There\
    \ is a single value with type `Nothing`. No operations at all are provided for\
    \ this type; it is similar to the `void` type in languages like C/C++ and Java.\n\
    \n### Value types\n\nThe basic types or elementary types provided in the TouchDevelop\
    \ scripting language are `Number`, `Boolean`, and `String`. These are all Value\
    \ Types. There are also several composite types which are value types. All the\
    \ value types are listed in Table [2-2](#text00002.html#Tab2). Here are some further\
    \ details about the `Number` and `String` types.\n\n#### `Number`\n\nThe `Number`\
    \ type combines the integer and floating-point types found in other languages.\
    \ Values are held in double-precision floating point format, consistent with the\
    \ IEEE 754 standard. This implies that the special values `plus infinity`, `minus\
    \ infinity` and `NaN` (not-a-number) can be computed as the result of a calculation.\n\
    \nWhen a `Number` value is used in a context where an integer is needed, such\
    \ as when selecting the k-th value in a collection, the value is rounded to the\
    \ closest integer. A value exactly half-way between is rounded up; for example,\
    \ `1.5` is rounded up to `2` while `1.49` is rounded down to `1`.\n\n**Table 2-2**\
    \  \nThe Value types\n\n| Value Type | Description | Covered in Chapter |\n| ---\
    \ | --- | --- |\n| `Number` | An integer or floating-point number | 2 |\n| `Boolean`\
    \ | The type whose constants are `true` and `false` | 2 |\n| `String` | A sequence\
    \ of zero or more Unicode characters | 2 |\n| `Color` | Used for colors displayed\
    \ on the screen. Values are compatible with 4 byte ARGB (alpha, red, green, blue)\
    \ color representations. Many standard colors are provided as constants of the\
    \ `Color` datatype. | 6 |\n| `DateTime` | Holds any date from 0001 CE (Common\
    \ Era) to 9999 CE, combined with a time of day. The time of day is recorded with\
    \ 100 nanosecond accuracy. | 8 |\n| `Location` | Holds a combination of latitude,\
    \ longitude and altitude values plus a course direction and a speed in two-dimensional\
    \ space. | 8 |\n| `Motion` | A combination of sensor readings which describe motion\
    \ of the phone in 3D space plus a time-stamp which specifies when the readings\
    \ were taken. The motion information includes speed, acceleration and angular\
    \ velocity. | 7 |\n| `Vector3` | A triple of three numbers used to hold a velocity\
    \ or acceleration in the three spatial dimensions or an angular velocity about\
    \ the three axes in 3D space. | 7 |\n\n#### `String`\n\nA string may contain zero\
    \ or more Unicode characters. When a string constant is shown as part of a TouchDevelop\
    \ script, double-quote characters are used to enclose the string and a backslash\
    \ character is used to escape a double-quote character or a special character\
    \ which appears inside the string. However, when using the editor to enter a string\
    \ constant, no backslash characters should be entered (unless a backslash character\
    \ itself is wanted inside the string constant).\n\nIt should be noted that TouchDevelop\
    \ does not provide the `char` type for working with single characters. Instead\
    \ a string of length one should be used.\n\n### Reference types\n\nStorage for\
    \ an instance of a reference type is allocated in a different place from a variable\
    \ declared with that type. A local variable with a reference type is implemented\
    \ as a pointer (a reference) to the actual value which is stored elsewhere.\n\n\
    In TouchDevelop, two kinds of reference types are provided. If the value represents\
    \ an entity which exists outside TouchDevelop, such as a song on a Windows phone,\
    \ then storage is allocated outside the TouchDevelop application. Otherwise the\
    \ storage is allocated within an area of memory controlled by TouchDevelop which\
    \ is called the `heap`. When there are no more references to a value on the heap,\
    \ the storage used by that value is automatically reclaimed. It is `garbage collected`.\
    \ The language facilities and the operations which can be performed on reference\
    \ types in a TouchDevelop script depend on whether the values are external to\
    \ the script or are internal.\n\nWhen one variable with a reference type is assigned\
    \ to another variable, both variables will become references to the same instance.\
    \ A simple example to illustrate this sharing of one instance between two variables\
    \ is provided by the following code.\n\n```\n// Set x to refer to a value of type\
    \ Contact\nvar x := social → choose contacts\nvar y := x\nx → set title(“His Excellency”)\n\
    y → title → post to wall\n```\n\nIn this example, the title displayed on the screen\
    \ by the last statement will always be ‘His Excellency’ because `x` and `y` are\
    \ both references to the same instance on the heap, in which the title field of\
    \ an instance of the `Contact` type has been set to that string.\n\n#### Reference\
    \ types provided by the API\n\nExcluding the collection types (which are covered\
    \ in the next subsection of this chapter below), Table [2-3](#text00002.html#Tab3)\
    \ lists the reference types implemented by the API and available to TouchDevelop\
    \ scripts. The table explicitly indicates whether storage for an instance of each\
    \ type is allocated on the heap or is external to the TouchDevelop script.\n\n\
    **Table 2-3**  \nReference types provided by the API\n\n| Reference Type | Description\
    \ | Storage | Covered in Chapter |\n| --- | --- | --- | --- |\n| `Appointment`\
    \ | A calendar appointment | Heap | 8 |\n| `Board` | A 2D canvas on which sprites\
    \ can be drawn and moved | Heap | 9 |\n| `Camera` | The front or back camera |\
    \ External | 6 |\n| `Contact` | Contact information and details about a person\
    \ or company | External | 8 |\n| `Form Builder` | Used to create HTML form data\
    \ | Heap | -- |\n| `Json Builder` | A JSON data structure builder | Heap | --\
    \ |\n| `Json Object` | A JSON data structure (obtained from a website) | Heap\
    \ | 4 |\n| `Link` | A link to a video, image, e-mail or phone number | Heap |\
    \ 5,6,8 |\n| `Location` | A geographic location | Heap | 7,8 |\n| `Map` | A BING\
    \ map | Heap | 8 |\n| `Matrix` | a 2-D matrix of numbers | Heap | -- |\n| `Media\
    \ Link` | A media file on the home network | External | 5,6 |\n| `Message` | A\
    \ posting on a message board | Heap | 8 |\n| `OAuth Response` | OAuth 2.0 access\
    \ token or error | Heap | 11 |\n| `Page` | A page on the wall | Heap | 3 |\n|\
    \ `Page Button` | A button on the wall which can be tapped | Heap | 3 |\n| `Picture`\
    \ | A rectangular picture containing graphics or a photograph | External | 6 |\n\
    | `Picture Album` | A named album of pictures | External | 6 |\n| `Place` | A\
    \ named location | Heap | 8 |\n| `Playlist` | A song playlist | Heap | 5 |\n|\
    \ `Song` | A song | External | 5 |\n| `Song Album` | A song album | External |\
    \ 5 |\n| `Sound` | A sound clip | Heap | 5 |\n| `Sprite` | A graphical object\
    \ which can be displayed on a `Board` instance | Heap | 9 |\n| `TextBox` | A box\
    \ used to display text on the screen | Heap | 6 |\n| `Web Request` | A HTTP web\
    \ request | Heap | 4 |\n| `Web Response` | A HTTP web response | Heap | 4 |\n\
    | `Xml Object` | A XML element or collection of elements | Heap | 4 |"
  raw: '### The Nothing type


    A method or an operation which does not return a usable result, but which otherwise
    succeeded, actually returns a value of type `Nothing` . For example, the post
    to wall method which is provided for every datatype returns a result of type `Nothing`
    . In some languages, such as F#, the `Unit` type is the equivalent of the `Nothing`
    type in TouchDevelop. There is a single value with type `Nothing` . No operations
    at all are provided for this type; it is similar to the void type in languages
    like C/C++ and Java.


    #### Value types


    The basic types or elementary types provided in the TouchDevelop scripting language
    are `Number` , `Boolean` , and `String` . These are all Value Types . There are
    also several composite types which are value types. All the value types are listed
    in Table [2-2](#text00002.html#Tab2) . Here are some further details about the
    `Number` and `String` types.


    #### Number


    The `Number` type combines the integer and floating-point types found in other
    languages. Values are held in double-precision floating point format, consistent
    with the IEEE 754 standard. This implies that the special values plus infinity
    , minus infinity and NaN (not-a-number) can be computed as the result of a calculation.


    When a `Number` value is used in a context where an integer is needed, such as
    when selecting the k- th value in a collection, the value is rounded to the closest
    integer. A value exactly half-way between is rounded up; for example, 1.5 is rounded
    up to 2 while 1.49 is rounded down to 1.


    Table 2-2


    The Value types


    | Value Type | Description | Covered in Chapter |

    | --- | --- | --- |

    | `Number` | An integer or floating-point number | 2 |

    | `Boolean` | The type whose constants are true and false | 2 |

    | `String` | A sequence of zero or more Unicode characters | 2 |

    | `Color` | Used for colors displayed on the screen. Values are compatible with
    4 byte ARGB (alpha, red, green, blue) color representations. Many standard colors
    are provided as constants of the Color datatype. | 6 |

    | `DateTime` | Holds any date from 0001 CE (Common Era) to 9999 CE, combined with
    a time of day. The time of day is recorded with 100 nanosecond accuracy. | 8 |

    | `Location` | Holds a combination of latitude, longitude and altitude values
    plus a course direction and a speed in two-dimensional space. | 8 |

    | `Motion` | A combination of sensor readings which describe motion of the phone
    in 3D space plus a time-stamp which specifies when the readings were taken. The
    motion information includes speed, acceleration and angular velocity. | 7 |

    | `Vector3` | A triple of three numbers used to hold a velocity or acceleration
    in the three spatial dimensions or an angular velocity about the three axes in
    3D space. | 7 |


    #### String


    A string may contain zero or more Unicode characters. When a string constant is
    shown as part of a TouchDevelop script, double-quote characters are used to enclose
    the string and a backslash character is used to escape a double-quote character
    or a special character which appears inside the string. However, when using the
    editor to enter a string constant, no backslash characters should be entered (unless
    a backslash character itself is wanted inside the string constant).


    It should be noted that TouchDevelop does not provide the `char` type for working
    with single characters. Instead a string of length one should be used.


    ### Reference types


    Storage for an instance of a reference type is allocated in a different place
    from a variable declared with that type. A local variable with a reference type
    is implemented as a pointer (a reference) to the actual value which is stored
    elsewhere.


    In TouchDevelop, two kinds of reference types are provided. If the value represents
    an entity which exists outside TouchDevelop, such as a song on a Windows phone,
    then storage is allocated outside the TouchDevelop application. Otherwise the
    storage is allocated within an area of memory controlled by TouchDevelop which
    is called the heap . When there are no more references to a value on the heap,
    the storage used by that value is automatically reclaimed. It is garbage collected
    . The language facilities and the operations which can be performed on reference
    types in a TouchDevelop script depend on whether the values are external to the
    script or are internal.


    When one variable with a reference type is assigned to another variable, both
    variables will become references to the same instance. A simple example to illustrate
    this sharing of one instance between two variables is provided by the following
    code.


            `// Set x to refer to a value of type Contact`


            `var` `x := social → choose contacts`


            `var` `y := x`


            `x → set title(“His Excellency”)`


            `y → title → post to wall`


    In this example, the title displayed on the screen by the last statement will
    always be ‘His Excellency’ because `x` and `y` are both references to the same
    instance on the heap, in which the title field of an instance of the `Contact`
    type has been set to that string.


    #### Reference types provided by the API


    Excluding the collection types (which are covered in the next subsection of this
    chapter below), Table [2-3](#text00002.html#Tab3) lists the reference types implemented
    by the API and available to TouchDevelop scripts. The table explicitly indicates
    whether storage for an instance of each type is allocated on the heap or is external
    to the TouchDevelop script.


    Table 2-3


    Reference types provided by the API


    | Reference Type | Description | Storage | Covered in Chapter |

    | --- | --- | --- | --- |

    | `Appointment` | A calendar appointment | Heap | 8 |

    | `Board` | A 2D canvas on which sprites can be drawn and moved | Heap | 9 |

    | `Camera` | The front or back camera | External | 6 |

    | `Contact` | Contact information and details about a person or company | External
    | 8 |

    | `Form Builder` | Used to create HTML form data | Heap | -- |

    | `Json Builder` | A JSON data structure builder | Heap | -- |

    | `Json Object` | A JSON data structure (obtained from a website) | Heap | 4 |

    | `Link` | A link to a video, image, e-mail or phone number | Heap | 5,6,8 |

    | `Location` | A geographic location | Heap | 7,8 |

    | `Map` | A BING map | Heap | 8 |

    | `Matrix` | a 2-D matrix of numbers | Heap | -- |

    | `Media Link` | A media file on the home network | External | 5,6 |

    | `Message` | A posting on a message board | Heap | 8 |

    | `OAuth Response` | OAuth 2.0 access token or error | Heap | 11 |

    | `Page` | A page on the wall | Heap | 3 |

    | `Page Button` | A button on the wall which can be tapped | Heap | 3 |

    | `Picture` | A rectangular picture containing graphics or a photograph | External
    | 6 |

    | `Picture Album` | A named album of pictures | External | 6 |

    | `Place` | A named location | Heap | 8 |

    | `Playlist` | A song playlist | Heap | 5 |

    | `Song` | A song | External | 5 |

    | `Song Album` | A song album | External | 5 |

    | `Sound` | A sound clip | Heap | 5 |

    | `Sprite` | A graphical object which can be displayed on a Board instance | Heap
    | 9 |

    | `TextBox` | A box used to display text on the screen | Heap | 6 |

    | `Web Request` | A HTTP web request | Heap | 4 |

    | `Web Response` | A HTTP web response | Heap | 4 |

    | `Xml Object` | A XML element or collection of elements | Heap | 4 |'
  trans: "\n### `Nothing` 类型\n\n一个不返回可用结果但成功执行的方法或操作，实际上会返回一个 `Nothing` 类型的值。例如，为每种数据类型提供的“发布到墙”方法返回的就是\
    \ `Nothing` 类型的结果。在某些语言（如 F#）中，`Unit` 类型等同于 TouchDevelop 中的 `Nothing` 类型。存在一个值为\
    \ `Nothing` 类型的单一值。该类型不提供任何操作；它类似于 C/C++ 和 Java 等语言中的 `void` 类型。\n\n### 值类型\n\n\
    TouchDevelop 脚本语言提供的基本类型或基础类型包括 `Number`、`Boolean` 和 `String`。这些都是值类型。此外还有几种复合类型也属于值类型。所有值类型都列在表\
    \ 2-2 中。以下是关于 `Number` 和 `String` 类型的更多细节。\n\n#### `Number`\n\n`Number` 类型结合了其他语言中的整数和浮点类型。其值以双精度浮点格式存储，符合\
    \ IEEE 754 标准。这意味着特殊值`正无穷`、`负无穷`和 `NaN`（非数值）可以作为计算结果产生。\n\n当 `Number` 值在需要整数的上下文中使用时（例如选择集合中的第\
    \ k 个值），该值会四舍五入到最接近的整数。恰好位于中间的值会向上取整；例如，`1.5` 向上取整为 `2`，而 `1.49` 向下取整为 `1`。\n\n\
    **表 2-2**  \n值类型\n\n| 值类型 | 描述 | 涵盖章节 |\n| --- | --- | --- |\n| `Number` | 整数或浮点数\
    \ | 2 |\n| `Boolean` | 常量为 `true` 和 `false` 的类型 | 2 |\n| `String` | 零个或多个 Unicode\
    \ 字符的序列 | 2 |\n| `Color` | 用于屏幕上显示的颜色。值兼容 4 字节 ARGB（Alpha、红、绿、蓝）颜色表示。`Color` 数据类型提供了许多标准颜色作为常量。\
    \ | 6 |\n| `DateTime` | 保存从公元 0001 年到公元 9999 年的任意日期，以及一天中的时间。时间精度为 100 纳秒。 | 8\
    \ |\n| `Location` | 保存纬度、经度和海拔值的组合，以及二维空间中的航向和速度。 | 8 |\n| `Motion` | 描述手机在 3D\
    \ 空间中运动的传感器读数组合，外加一个记录读数时间的时间戳。运动信息包括速度、加速度和角速度。 | 7 |\n| `Vector3` | 三个数字组成的三元组，用于保存三个空间维度上的速度或加速度，或\
    \ 3D 空间中绕三个轴的角速度。 | 7 |\n\n#### `String`\n\n字符串可以包含零个或多个 Unicode 字符。当字符串常量作为 TouchDevelop\
    \ 脚本的一部分显示时，使用双引号将字符串括起来，并使用反斜杠转义字符串内部的双引号或特殊字符。但是，在使用编辑器输入字符串常量时，不应输入任何反斜杠字符（除非需要在字符串常量中包含反斜杠字符本身）。\n\
    \n需要注意的是，TouchDevelop 不提供用于处理单个字符的 `char` 类型。应改用长度为 1 的字符串。\n\n### 引用类型\n\n引用类型的实例存储在与声明了该类型的变量不同的位置。具有引用类型的局部变量被实现为指向实际值（存储在别处）的指针（引用）。\n\
    \n在 TouchDevelop 中，提供了两种引用类型。如果值表示存在于 TouchDevelop 外部的实体（例如 Windows Phone 上的歌曲），则存储分配在\
    \ TouchDevelop 应用程序之外。否则，存储分配在 TouchDevelop 控制的内存区域中，该区域称为“`堆`”。当堆上的某个值不再有引用时，该值使用的存储空间会自动回收。这被称为“`垃圾回收`”。对\
    \ TouchDevelop 脚本中的引用类型所能执行的语言功能和操作，取决于这些值是脚本外部的还是内部的。\n\n当将一个具有引用类型的变量赋值给另一个变量时，两个变量都将成为对同一实例的引用。以下代码提供了一个简单示例来说明两个变量共享一个实例的情况。\n\
    \n```\n// 设置 x 指向一个 Contact 类型的值\nvar x := social → choose contacts\nvar y :=\
    \ x\nx → set title(“His Excellency”)\ny → title → post to wall\n```\n\n在此示例中，最后一条语句在屏幕上显示的标题始终是“His\
    \ Excellency”，这是因为 `x` 和 `y` 都是堆上同一实例的引用，并且该实例（`Contact` 类型）的 title 字段已被设置为该字符串。\n\
    \n#### API 提供的引用类型\n\n排除集合类型（将在本章下一小节中介绍），表 2-3 列出了由 API 实现并可供 TouchDevelop 脚本使用的引用类型。该表明确指出了每种类型的实例存储是分配在堆上还是\
    \ TouchDevelop 脚本外部。\n\n**表 2-3**  \nAPI 提供的引用类型\n\n| 引用类型 | 描述 | 存储位置 | 涵盖章节\
    \ |\n| --- | --- | --- | --- |\n| `Appointment` | 日历约会 | 堆 | 8 |\n| `Board` |\
    \ 可在其上绘制和移动精灵的 2D 画布 | 堆 | 9 |\n| `Camera` | 前置或后置摄像头 | 外部 | 6 |\n| `Contact`\
    \ | 关于个人或公司的联系信息与详情 | 外部 | 8 |\n| `Form Builder` | 用于创建 HTML 表单数据 | 堆 | -- |\n\
    | `Json Builder` | JSON 数据结构构建器 | 堆 | -- |\n| `Json Object` | JSON 数据结构（从网站获取）\
    \ | 堆 | 4 |\n| `Link` | 指向视频、图片、电子邮件或电话号码的链接 | 堆 | 5,6,8 |\n| `Location` | 地理位置\
    \ | 堆 | 7,8 |\n| `Map` | BING 地图 | 堆 | 8 |\n| `Matrix` | 二维数字矩阵 | 堆 | -- |\n|\
    \ `Media Link` | 家庭网络上的媒体文件 | 外部 | 5,6 |\n| `Message` | 留言板上的帖子 | 堆 | 8 |\n| `OAuth\
    \ Response` | OAuth 2.0 访问令牌或错误 | 堆 | 11 |\n| `Page` | 墙面上的页面 | 堆 | 3 |\n| `Page\
    \ Button` | 墙面上可点击的按钮 | 堆 | 3 |\n| `Picture` | 包含图形或照片的矩形图片 | 外部 | 6 |\n| `Picture\
    \ Album` | 命名的图片相册 | 外部 | 6 |\n| `Place` | 已命名的位置 | 堆 | 8 |\n| `Playlist` | 歌曲播放列表\
    \ | 堆 | 5 |\n| `Song` | 歌曲 | 外部 | 5 |\n| `Song Album` | 歌曲专辑 | 外部 | 5 |\n| `Sound`\
    \ | 声音片段 | 堆 | 5 |\n| `Sprite` | 可在 `Board` 实例上显示的图形对象 | 堆 | 9 |\n| `TextBox`\
    \ | 用于在屏幕上显示文本的框 | 堆 | 6 |\n| `Web Request` | HTTP 网络请求 | 堆 | 4 |\n| `Web Response`\
    \ | HTTP 网络响应 | 堆 | 4 |\n| `Xml Object` | XML 元素或元素集合 | 堆 | 4 |\n"
- fmt: "# Collection types\n\nThe API also provides homogeneous collections. A collection\
    \ contains zero or more elements whose type is one of the value types or one of\
    \ the reference types listed in Table [2-2](#text00002.html#Tab2). Collections\
    \ are provided for many of the possible element types. When a collection type\
    \ has not been provided, an equivalent list type can be defined instead using\
    \ an `Object` declaration (see `Objects` and `Decorators`, below).\n\nSome collections\
    \ correspond to resources provided on a Windows Phone (and therefore may not be\
    \ supported on other platforms), such as a collection of stored songs, and such\
    \ collections are immutable. Other collections are mutable, meaning that new elements\
    \ can be inserted into the collection and/or elements may be deleted.\n\nThe collection\
    \ types provided by the API are listed in Table [2-4](#text00002.html#Tab4) and\
    \ Table [2-5](#text00002.html#Tab5). Three of the collection types have been tagged\
    \ as special and are listed separately in Table [2-5](#text00002.html#Tab5). These\
    \ three collection types have some special properties not possessed by the other\
    \ collection types and need some additional explanation.\n\n## Tables and indexes\n\
    \nThe `Records` section of a TouchDevelop script can contain definitions of `Tables`.\
    \ Each `Table` type is a datatype with a single instance and is globally visible.\
    \ It corresponds to a database table which consists of rows and whose fields are\
    \ organized into columns. The `Records` section can also contain definitions for\
    \ `Index` types.\n\n## Objects\n\nThe `Records` section of a script can include\
    \ declarations for `Object` types. Each `Object` type is a new datatype which\
    \ is composed from named fields, similar to a `struct` or `class` type in other\
    \ languages. Storage for instances of `Object` types is allocated on the heap\
    \ and is garbage collected. Since it is heap allocated, every `Object` type is\
    \ a Reference type.\n\n**Table 2-5: Special collection types**\n\n| Collection\
    \ Type | Element Type | Mutable? | Covered in Chapter |\n| --- | --- | --- | ---\
    \ |\n| `Number Map` | `Number` | Yes | 2 |\n| `String Map` | `String` | Yes |\
    \ 2 |\n| `Sprite Set` | `Sprite` | Yes | 9 |\n\n**Table 2-4: Regular collection\
    \ types**\n\n| Collection Type | Element Type | Mutable? | Covered in Chapter\
    \ |\n| --- | --- | --- | --- |\n| `Appointment Collection` | `Appointment` | No\
    \ | 8 |\n| `Contact Collection` | `Contact` | No | 8 |\n| `Link Collection` |\
    \ `Link` | Yes | 8 |\n| `Location Collection` | `Location` | Yes | 7,8 |\n| `Media\
    \ Link Collection` | `Media Link` | No | 5,6 |\n| `Message Collection` | `Message`\
    \ | Yes | 8 |\n| `Number Collection` | `Number` | Yes | 2 |\n| `Page Collection`\
    \ | `Page` | No | 3 |\n| `Picture Albums` | `Picture Album` | No | 6 |\n| `Pictures`\
    \ | `Picture` | No | 6 |\n| `Place Collection` | `Place` | Yes | 8 |\n| `Playlists`\
    \ | `Playlist` | No | 5 |\n| `Song Albums` | `Song Album` | No | 5 |\n| `Songs`\
    \ | `Song` | No | 5 |\n| `String Collection` | `String` | Yes | 2 |\n\n## Decorators\n\
    \nDecorators may be declared in the `Records` section of a script. A decorator\
    \ is used to associate extra information with instances of some reference types.\
    \ The types which can be decorated are `Appointment`, `Board`, `Json Object`,\
    \ `Link`, `Map`, `Message`, `Page`, `Page Button`, `Place`, `Sound`, `Sprite`,\
    \ `TextBox`, `Tile`, `Web Request`, `Web Response`, `Xml Object` and `Sprite Set`.\
    \ User-defined objects can be decorated as well.\n\n## Global persistent data\n\
    \nThe `Data` section of a TouchDevelop script may contain declarations for global\
    \ variables. Each of these variables has a datatype which must be one of the types\
    \ provided in the language or API or one of the `Object` types declared in the\
    \ `Records` section of the script.\n\nAny global variable declared to have a simple\
    \ type or the `DateTime` type is initialized to a neutral value. The neutral values\
    \ are `0` for a `Number`, `false` for a `Boolean`, `\"\"` for a `String`, and\
    \ 1/1/0001 12:00:00 AM for a `DateTime` variable. A variable with any other type\
    \ is initialized to a special invalid value.\n\nThe `is invalid` method is provided\
    \ for every datatype and may be used to test whether a global variable has not\
    \ yet been initialized or a value was unobtainable. For example, if the `Data`\
    \ section of the script contains a declaration for the global variable `MyFriends`\
    \ with the type `String Collection`, then this script might contain statements\
    \ like the following to check whether the variable needs to be initialized.\n\n\
    ```\nif ◳MyFriends → is invalid then\n  // it’s the first use of this script,\
    \ initialize the global variable\n  ◳MyFriends := collections → create string\
    \ collection\nelse\n  // do nothing\n```\n\nThe values held by many of the global\
    \ variables persist from one execution of the script to the next because they\
    \ are held in the phone’s memory. The only ways to ‘forget’ these values are to\
    \ uninstall the script or edit the script and delete the global variables.\n\n\
    ## Art items\n\nSome scripts need to display pictures or to produce sounds. These\
    \ pictures or sounds can be added to the script as global constants and become\
    \ part of the script. Such items are held in the `Art` section of the script.\
    \ In addition, the `Art` section can contain definitions for particular colors\
    \ which will be needed by the script.\n\nThe `Art` section of the script is similar\
    \ to the `Data` section except that the items are restricted to having one of\
    \ the datatypes `Color`, `Picture` or `Sound`, and these items are initialized.\
    \ Initialization for a `Color` value is provided via an ARGB (alpha, red, green,\
    \ blue) value; initialization for `Picture` or `Sound` values is obtained by downloading\
    \ the desired value from a web site.\n\n## Expressions"
  raw: '#### Collection types


    The API also provides homogeneous collections. A collection contains zero or more
    elements whose type is one of the value types or one of the reference types listed
    in Table [2-2](#text00002.html#Tab2) . Collections are provided for many of the
    possible element types. When a collection type has not been provided, an equivalent
    list type can be defined instead using an Object declaration (see `Objects` and
    `Decorators` , below).


    Some collections correspond to resources provided on a Windows Phone (and therefore
    may not be supported on other platforms), such as a collection of stored songs,
    and such collections are immutable. Other collections are mutable, meaning that
    new elements can be inserted into the collection and/or elements may be deleted.


    The collection types provided by the API are listed in Table [2-4](#text00002.html#Tab4)
    and Table [2-5](#text00002.html#Tab5) . Three of the collection types have been
    tagged as special and are listed separately in Table [2-5](#text00002.html#Tab5)
    . These three collection types have some special properties not possessed by the
    other collection types and need some additional explanation.


    ### Tables and indexes


    The `Records` section of a TouchDevelop script can contain definitions of `Tables`
    . Each Table type is a datatype with a single instance and is globally visible.
    It corresponds to a database table which consists of rows and whose fields are
    organized into columns. The `Records` section can also contain definitions for
    `Index` types.


    ### Objects


    The `Records` section of a script can include declarations for `Object` types.
    Each `Object` type is a new datatype which is composed from named fields, similar
    to a `struct` or `class` type in other languages. Storage for instances of `Object`
    types is allocated on the heap and is garbage collected. Since it is heap allocated,
    every `Object` type is a Reference type .


    Table 2-5


    Special collection types


    | Collection Type | Element Type | Mutable? | Covered in Chapter |

    | --- | --- | --- | --- |

    | Number Map | Number | Yes | 2 |

    | String Map | String | Yes | 2 |

    | Sprite Set | Sprite | Yes | 9 |


    Table 2-4


    Regular collection types


    | Collection Type | Element Type | Mutable? | Covered in Chapter |

    | --- | --- | --- | --- |

    | `Appointment Collection` | Appointment | No | 8 |

    | `Contact Collection` | Contact | No | 8 |

    | `Link Collection` | Link | Yes | 8 |

    | `Location Collection` | Location | Yes | 7,8 |

    | `Media Link Collection` | Media Link | No | 5,6 |

    | `Message Collection` | Message | Yes | 8 |

    | `Number Collection` | Number | Yes | 2 |

    | `Page Collection` | Page | No | 3 |

    | `Picture Albums` | Picture Album | No | 6 |

    | `Pictures` | Picture | No | 6 |

    | `Place Collection` | Place | Yes | 8 |

    | `Playlists` | Playlist | No | 5 |

    | `Song Albums` | Song Album | No | 5 |

    | `Songs` | Song | No | 5 |

    | `String Collection` | String | Yes | 2 |


    ### Decorators


    Decorators may be declared in the Records section of a script. A decorator is
    used to associate extra information with instances of some reference types. The
    types which can be decorated are `Appointment` , `Board` , `Json Object` , Link,
    `Map` , `Message` , `Page` , `Page Button` , `Place` , `Sound` , `Sprite` , `TextBox`
    , `Tile` , `Web Request` , `Web Response` , `Xml Object` and `Sprite Set` . User-defined
    objects can be decorated as well.


    ### Global persistent data


    The `Data` section of a TouchDevelop script may contain declarations for global
    variables. Each of these variables has a datatype which must be one of the types
    provided in the language or API or one of the Object types declared in the `Records`
    section of the script.


    Any global variable declared to have a simple type or the `DateTime` type is initialized
    to a neutral value. The neutral values are `0` for a `Number` , `false` for a
    `Boolean` , `“”` for a `String` , and 1/1/0001 12:00:00 AM for a `DateTime` variable.
    A variable with any other type is initialized to a special invalid value .


    The `is invalid` method is provided for every datatype and may be used to test
    whether a global variable has not yet been initialized or a value was unobtainable.
    For example, if the `Data` section of the script contains a declaration for the
    global variable `MyFriends` with the type `String Collection` , then this script
    might contain statements like the following to check whether the variable needs
    to be initialized.


            `if` `◳MyFriends → is invalid` `then`


              `// it’s the first use of this script, initialize the global variable`


              `◳MyFriends := collections → create string collection`


            `else`


              `// do nothing`


    The values held by many of the global variables persist from one execution of
    the script to the next because they are held in the phone’s memory. The only ways
    to ‘forget’ these values are to uninstall the script or edit the script and delete
    the global variables.


    ### Art items


    Some scripts need to display pictures or to produce sounds. These pictures or
    sounds can be added to the script as global constants and become part of the script.
    Such items are held in the `Art` section of the script. In addition, the `Art`
    section can contain definitions for particular colors which will be needed by
    the script.


    The `Art` section of the script is similar to the `Data` section except that the
    items are restricted to having one of the datatypes `Color` , `Picture` or `Sound`
    , and these items are initialized. Initialization for a `Color` value is provided
    via an ARGB (alpha, red, green, blue) value; initialization for `Picture` or `Sound`
    values is obtained by downloading the desired value from a web site.


    ## Expressions'
  trans: "\n# 集合类型\n\n该 API 也提供同构集合。一个集合包含零个或多个元素，其类型是表 2-2 中列出的值类型或引用类型之一。针对许多可能的元素类型都提供了集合。当某集合类型未提供时，可以使用\
    \ `Object` 声明来定义一个等价的列表类型（参见下面的 `Objects` 和 `Decorators`）。\n\n某些集合对应于 Windows\
    \ Phone 上提供的资源（因此其他平台可能不支持），例如已存储歌曲的集合，此类集合是不可变的。其他集合是可变的，这意味着可以将新元素插入到集合中和/或删除元素。\n\
    \nAPI 提供的集合类型列于表 2-4 和表 2-5 中。其中三种集合类型已被标记为特殊类型，并在表 2-5 中单独列出。这三种集合类型具有其他集合类型所不具备的一些特殊属性，需要额外说明。\n\
    \n## 表与索引\n\nTouchDevelop 脚本的 `Records` 部分可以包含 `Tables` 的定义。每个 `Table` 类型是一个具有单一实例的数据类型，并且是全局可见的。它对应于一个数据库表，该表由行组成，其字段按列组织。`Records`\
    \ 部分还可以包含 `Index` 类型的定义。\n\n## 对象\n\n脚本的 `Records` 部分可以包含 `Object` 类型的声明。每个 `Object`\
    \ 类型是一种新的数据类型，由命名字段组成，类似于其他语言中的 `struct` 或 `class` 类型。`Object` 类型实例的存储空间在堆上分配，并由垃圾回收机制管理。由于是在堆上分配，每个\
    \ `Object` 类型都是引用类型。\n\n**表 2-5: 特殊集合类型**\n\n| 集合类型 | 元素类型 | 是否可变？ | 相关章节 |\n\
    | --- | --- | --- | --- |\n| `Number Map` | `Number` | 是 | 2 |\n| `String Map`\
    \ | `String` | 是 | 2 |\n| `Sprite Set` | `Sprite` | 是 | 9 |\n\n**表 2-4: 常规集合类型**\n\
    \n| 集合类型 | 元素类型 | 是否可变？ | 相关章节 |\n| --- | --- | --- | --- |\n| `Appointment Collection`\
    \ | `Appointment` | 否 | 8 |\n| `Contact Collection` | `Contact` | 否 | 8 |\n| `Link\
    \ Collection` | `Link` | 是 | 8 |\n| `Location Collection` | `Location` | 是 | 7,8\
    \ |\n| `Media Link Collection` | `Media Link` | 否 | 5,6 |\n| `Message Collection`\
    \ | `Message` | 是 | 8 |\n| `Number Collection` | `Number` | 是 | 2 |\n| `Page Collection`\
    \ | `Page` | 否 | 3 |\n| `Picture Albums` | `Picture Album` | 否 | 6 |\n| `Pictures`\
    \ | `Picture` | 否 | 6 |\n| `Place Collection` | `Place` | 是 | 8 |\n| `Playlists`\
    \ | `Playlist` | 否 | 5 |\n| `Song Albums` | `Song Album` | 否 | 5 |\n| `Songs`\
    \ | `Song` | 否 | 5 |\n| `String Collection` | `String` | 是 | 2 |\n\n## 装饰器\n\n\
    装饰器可以在脚本的 `Records` 部分中声明。装饰器用于将额外信息与某些引用类型的实例关联起来。可以装饰的类型有：`Appointment`、`Board`、`Json\
    \ Object`、`Link`、`Map`、`Message`、`Page`、`Page Button`、`Place`、`Sound`、`Sprite`、`TextBox`、`Tile`、`Web\
    \ Request`、`Web Response`、`Xml Object` 和 `Sprite Set`。用户自定义的对象也可以被装饰。\n\n## 全局持久化数据\n\
    \nTouchDevelop 脚本的 `Data` 部分可以包含全局变量的声明。这些变量中的每一个都有一个数据类型，该数据类型必须是语言或 API 中提供的类型之一，或者是脚本的\
    \ `Records` 部分中声明的 `Object` 类型之一。\n\n任何声明为简单类型或 `DateTime` 类型的全局变量都会被初始化为一个中性值。这些中性值分别是：`Number`\
    \ 类型的 `0`，`Boolean` 类型的 `false`，`String` 类型的 `\"\"`，以及 `DateTime` 变量的 1/1/0001\
    \ 12:00:00 AM。任何其他类型的变量都会被初始化为一个特殊的无效值。\n\n每种数据类型都提供了 `is invalid` 方法，可用于测试全局变量是否尚未初始化或某个值是否无法获取。例如，如果脚本的\
    \ `Data` 部分包含一个类型为 `String Collection` 的全局变量 `MyFriends` 的声明，那么该脚本可能包含如下语句来检查该变量是否需要初始化。\n\
    \n```\nif ◳MyFriends → is invalid then\n  // 这是该脚本的首次使用，初始化全局变量\n  ◳MyFriends\
    \ := collections → create string collection\nelse\n  // 什么都不做\n```\n\n许多全局变量持有的值会从一次脚本执行持久保留到下一次执行，因为它们存储在手机的内存中。“遗忘”这些值的唯一方法是卸载脚本或编辑脚本并删除这些全局变量。\n\
    \n## 艺术项目\n\n某些脚本需要显示图片或产生声音。这些图片或声音可以作为全局常量添加到脚本中，并成为脚本的一部分。此类项目保存在脚本的 `Art`\
    \ 部分。此外，`Art` 部分可以包含脚本所需的特定颜色的定义。\n\n脚本的 `Art` 部分与 `Data` 部分类似，只是这些项目被限制为具有 `Color`、`Picture`\
    \ 或 `Sound` 数据类型之一，并且这些项目是已初始化的。`Color` 值的初始化通过 ARGB（Alpha、红、绿、蓝）值提供；`Picture`\
    \ 或 `Sound` 值的初始化则是通过从网站下载所需值来获得。\n\n## 表达式\n"
- fmt: '# Constants


    Explicit constants of type `Number`, `String` and `Boolean` can be directly entered
    into scripts using the editor. Named constants with the types `Color`, `Picture`
    and `Sound` can also be incorporated into a script, but their values have to be
    specified through special mechanisms and these values are accessed through the
    use of entries in the `Art` section of a script. Finally, there is a special kind
    of constant, `invalid`, which is provided for every datatype.


    ## Explicit Constants


    `Number` constants are written in the usual formats for non-negative decimal integers
    and non-negative decimal fixed-point constants. The maximum value, minimum value
    and precision correspond to the IEEE 754 standard for 64 bit floating point numbers.
    Integers with magnitudes up to approximately 10^(14) are represented exactly.
    Larger values are subject to round-off error. These are some examples of valid
    `Number` constants.


    ```

    0  23  001  3.14159  100000.99

    ```


    Note that it is not possible to write a negative numeric constant. Thus, the parentheses
    are necessary in the following statement.


    ```

    (- 3) → post to wall

    ```


    The value being printed is an expression composed of the unary negation operator
    applied to the positive constant 3. If the parentheses are omitted, a semantic
    error is reported.


    `String` constants can be entered with the TouchDevelop editor and can directly
    contain any characters provided on the keyboard. Although strings are implemented
    as sequences of Unicode characters, no mechanism is provided for including an
    arbitrary Unicode character in a string constant. (The full complement of Unicode
    characters is available only through the `to character` method of the `Number`
    type.) Some examples of `String` constants are as follows.


    ```

    “”  “abc”  “hello there”

    ```


    The two `Boolean` constants can be entered directly using the editor. They appear
    in scripts as follows.


    ```

    true  false

    ```


    ## Named constants


    The TouchDevelop WebApp editor provides a mechanism to add named constants of
    type `Color Sound Picture String` and `Number` to the art section of a script.
    Tapping the plus symbol below the art heading in the editor window and choosing
    `Color` as the type of the new resource brings up a window to select a new color.
    Four sliders allow the alpha, red, green and blue components of the color to be
    independently varied, with the effect shown on the screen.


    Several predefined color constants can also be accessed via the `colors` resource
    in the API. For example, the name `colors` → `blue` refers to the color blue which
    has the ARGB encoding `#FF0000FF`. A complete list of the predefined colors which
    can be accessed via the `colors` resource is given in Appendix B.


    Selecting `Picture` as the type for the art resource causes a menu of choices
    to be displayed. One choice, labeled upload, allows you to select an image on
    your device and upload it to a Microsoft website where it is accessible via its
    URL. Other choices allow images already available on the web to be selected. The
    image is then added to the `Art` section of the current script.


    Selecting `Sound` as the type leads to similar choices as for an image.


    Named constants of type `Number` and `String` are equally as accessible in a script
    as global data variables with these types. However data variables require initialization
    when the script is run, and they are not protected against being modified. A named
    constant, on the other hand, is initialized when the script is created and cannot
    be modified by assignments performed in the script.


    ## The invalid value


    The resource named `invalid` provides an invalid value specific to each datatype.
    For example, the following statement assigns the invalid value of type `DateTime`
    to variable `x`.


    ```

    x := invalid → datetime

    ```


    A complete list of the possible invalid values provided by the `invalid` resource
    appears in Appendix B.


    # Variables


    A script can access and assign to local variables, global data variables and parameters
    of the current action.


    ## Local variables


    Local variables follow the usual visibility rules and lifetime rules for block
    structured languages. The name of the variable is visible from the point of declaration
    down to the end of the block in which the declaration appears. Storage for the
    variable’s value, if the type is a value type, is provided only while the block
    is active. If the type is a reference type, then storage for the reference is
    only provided while the block is active.


    A local variable must be declared and initialized before it can be used. A declaration
    statement serves both purposes. For example, the following statement declares
    and initializes a `String` variable.


    ```

    var s1 := “Hello!”

    ```


    Following that declaration and down to the end of the enclosing block, the name
    `s1` can be used to reference the local variable’s current value.


    Unlike most programming languages, the name `s1` cannot be hidden by a declaration
    for another variable named `s1` inside a nested block. The TouchDevelop editor
    simply does not permit two variables with the same name to be declared inside
    an action; it forces all the parameters and local variables in an action to have
    distinct names.


    ## Global data variables


    The data section of a script contains declarations for variables which are accessible
    by all actions within the script. Storage for these variables is permanently allocated
    in most cases, and would therefore persist between invocations of the script.
    However, variables which require significant storage and which are normally recomputed
    whenever the script is executed, such as an instance of the `Board` type, do not
    persist between uses of the script.


    A global data variable is created either by tapping the plus button underneath
    the heading for the data section of the script or by declaring a local variable
    in an action or event and then using the ‘promote to global’ feature of the TouchDevelop
    editor.


    A global data variable may be created with any datatype. If the type is `Number`,
    `Boolean`, `String` or `DateTime`, the variable has a neutral initial value. The
    value is `0, false`, `“”` or `1 January 0001 12:00 am` respectively. For any other
    datatype, the initial value is `invalid`.


    An access to a global data variable inside a script is indicated by the special
    symbol `◳`. For example, the following statement assigns a value to a global variable
    of type `Board`.


    ```

    ◳game := media → create board(480)

    ```


    A reference to a global data variable is inserted into the script by tapping the
    keypad tile labeled `◳data` and then a tile labeled with the variable’s name.


    ## Action parameters


    Parameters of an action are variables but with special properties. Zero or more
    input parameters and zero or more result parameters can be associated with the
    action by editing its properties. An input parameter can be added to an action
    by first displaying the code for the action, then tapping the first line of the
    action (where its name appears) to display information about the action. A plus
    button labeled “add input parameter” is displayed beneath that information. An
    input parameter can have any datatype except the `Nothing` type. A `result` parameter
    is similarly created by tapping the plus button labeled “add output parameter”.
    It too can have any type other than `Nothing`.


    A result parameter is special in that it has an initial value of `invalid` and
    that every execution path through the action must assign a value to it.


    Other than that special requirement, the input parameters and the output parameters
    can be used within the action as though they were local variables.'
  raw: '### Constants


    Explicit constants of type `Number` , `String` and `Boolean` can be directly entered
    into scripts using the editor. Named constants with the types `Color` , `Picture`
    and `Sound` can also be incorporated into a script, but their values have to be
    specified through special mechanisms and these values are accessed through the
    use of entries in the `Art` section of a script. Finally, there is a special kind
    of constant, `invalid` , which is provided for every datatype.


    #### Explicit Constants


    `Number` constants are written in the usual formats for non-negative decimal integers
    and non-negative decimal fixed-point constants. The maximum value, minimum value
    and precision correspond to the IEEE 754 standard for 64 bit floating point numbers.
    Integers with magnitudes up to approximately 10^(14) are represented exactly.
    Larger values are subject to round-off error. These are some examples of valid
    `Number` constants.


            `0  23  001  3.14159  100000.99`


    Note that it is not possible to write a negative numeric constant. Thus, the parentheses
    are necessary in the following statement.


            `(- 3) → post to wall`


    The value being printed is an expression composed of the unary negation operator
    applied to the positive constant 3\. If the parentheses are omitted, a semantic
    error is reported.


    `String` constants can be entered with the TouchDevelop editor and can directly
    contain any characters provided on the keyboard. Although strings are implemented
    as sequences of Unicode characters, no mechanism is provided for including an
    arbitrary Unicode character in a string constant. (The full complement of Unicode
    characters is available only through the `to character` method of the `Number`
    type.) Some examples of `String` constants are as follows.


            `“”  “abc”  “hello there”`


    The two `Boolean` constants can be entered directly using the editor. They appear
    in scripts as follows.


            `true  false`


    #### Named constants


    The TouchDevelop WebApp editor provides a mechanism to add named constants of
    type `Color Sound Picture String` and `Number` to the art section of a script.
    Tapping the plus symbol below the art heading in the editor window and choosing
    Color as the type of the new resource brings up a window to select a new color.
    Four sliders allow the alpha, red, green and blue components of the color to be
    independently varied, with the effect shown on the screen.


    Several predefined color constants can also be accessed via the `colors` resource
    in the API. For example, the name `colors` → `blue` refers to the color blue which
    has the ARGB encoding `#FF0000FF` . A complete list of the predefined colors which
    can be accessed via the `colors` resource is given in Appendix B.


    Selecting Picture as the type for the art resource causes a menu of choices to
    be displayed. One choice, labeled upload, allows you to select an image on your
    device and upload it to a Microsoft website where it is accessible via its URL.
    Other choices allow images already available on the web to be selected. The image
    is then added to the Art section of the current script.


    Selecting Sound as the type leads to similar choices as for an image.


    Named constants of type Number and String are equally as accessible in a script
    as global data variables with these types. However data variables require initialization
    when the script is run, and they are not protected against being modified. A named
    constant, on the other hand, is initialized when the script is created and cannot
    be modified by assignments performed in the script.


    #### The invalid value


    The resource named `invalid` provides an invalid value specific to each datatype.
    For example, the following statement assigns the invalid value of type `DateTime`
    to variable `x` .


            `x := invalid → datetime`


    A complete list of the possible invalid values provided by the `invalid` resource
    appears in Appendix B.


    ### Variables


    A script can access and assign to local variables, global data variables and parameters
    of the current action.


    #### Local variables


    Local variables follow the usual visibility rules and lifetime rules for block
    structured languages. The name of the variable is visible from the point of declaration
    down to the end of the block in which the declaration appears. Storage for the
    variable’s value, if the type is a value type, is provided only while the block
    is active. If the type is a reference type, then storage for the reference is
    only provided while the block is active.


    A local variable must be declared and initialized before it can be used. A declaration
    statement serves both purposes. For example, the following statement declares
    and initializes a `String` variable.


            `var` `s1 := “Hello!”`


    Following that declaration and down to the end of the enclosing block, the name
    `s1` can be used to reference the local variable’s current value.


    Unlike most programming languages, the name `s1` cannot be hidden by a declaration
    for another variable named `s1` inside a nested block. The TouchDevelop editor
    simply does not permit two variables with the same name to be declared inside
    an action; it forces all the parameters and local variables in an action to have
    distinct names.


    #### Global data variables


    The data section of a script contains declarations for variables which are accessible
    by all actions within the script. Storage for these variables is permanently allocated
    in most cases, and would therefore persist between invocations of the script.
    However, variables which require significant storage and which are normally recomputed
    whenever the script is executed, such as an instance of the Board type, do not
    persist between uses of the script.


    A global data variable is created either by tapping the plus button underneath
    the heading for the data section of the script or by declaring a local variable
    in an action or event and then using the ‘promote to global’ feature of the TouchDevelop
    editor.


    A global data variable may be created with any datatype. If the type is `Number`
    , `Boolean` , `String` or `DateTime` , the variable has a neutral initial value.
    The value is `0, false` , `“”` or `1 January 0001 12:00 am` respectively. For
    any other datatype, the initial value is `invalid` .


    An access to a global data variable inside a script is indicated by the special
    symbol `◳` . For example, the following statement assigns a value to a global
    variable of type `Board` .


            `◳game := media → create board(480)`


    A reference to a global data variable is inserted into the script by tapping the
    keypad tile labeled `◳data` and then a tile labeled with the variable’s name.


    #### Action parameters


    Parameters of an action are variables but with special properties. Zero or more
    input parameters and zero or more result parameters can be associated with the
    action by editing its properties. An input parameter can be added to an action
    by first displaying the code for the action, then tapping the first line of the
    action (where its name appears) to display information about the action. A plus
    button labeled “add input parameter” is displayed beneath that information. An
    input parameter can have any datatype except the `Nothing` type. A `result` parameter
    is similarly created by tapping the plus button labeled “add output parameter”.
    It too can have any type other than `Nothing` .


    A result parameter is special in that it has an initial value of `invalid` and
    that every execution path through the action must assign a value to it.


    Other than that special requirement, the input parameters and the output parameters
    can be used within the action as though they were local variables.'
  trans: '

    # 常量


    类型为 `Number`、`String` 和 `Boolean` 的显式常量可以直接在编辑器中输入到脚本中。类型为 `Color`、`Picture` 和
    `Sound` 的命名常量也可以合并到脚本中，但其值必须通过特殊机制指定，并且这些值通过使用脚本 `Art` 部分中的条目进行访问。最后，还有一种特殊的常量
    `invalid`，它为每种数据类型提供。


    ## 显式常量


    `Number` 常量以非负十进制整数和非负十进制定点数的常用格式编写。最大值、最小值和精度对应于 IEEE 754 标准的 64 位浮点数。大小约为 10¹⁴
    以内的整数可以精确表示。较大的值会出现舍入误差。以下是有效的 `Number` 常量的一些示例。


    ```

    0  23  001  3.14159  100000.99

    ```


    请注意，不能编写负数字常量。因此，以下语句中的括号是必需的。


    ```

    (- 3) → post to wall

    ```


    正在打印的值是一个表达式，由应用于正常量 3 的一元求反运算符组成。如果省略括号，则会报告语义错误。


    `String` 常量可以使用 TouchDevelop 编辑器输入，并且可以直接包含键盘上提供的任何字符。尽管字符串是作为 Unicode 字符序列实现的，但没有提供将任意
    Unicode 字符包含在字符串常量中的机制。（只有通过 `Number` 类型的 `to character` 方法才能获得完整的 Unicode 字符集。）以下是
    `String` 常量的一些示例。


    ```

    “”  “abc”  “hello there”

    ```


    两个 `Boolean` 常量可以直接使用编辑器输入。它们在脚本中如下所示。


    ```

    true  false

    ```


    ## 命名常量


    TouchDevelop WebApp 编辑器提供了一种机制，可以将类型为 `Color Sound Picture String` 和 `Number`
    的命名常量添加到脚本的 art 部分。点击编辑器窗口中 art 标题下方的加号，然后选择 `Color` 作为新资源的类型，会打开一个用于选择新颜色的窗口。四个滑块允许独立调整颜色的
    alpha、红色、绿色和蓝色分量，其效果会显示在屏幕上。


    也可以通过 API 中的 `colors` 资源访问几个预定义的颜色常量。例如，名称 `colors` → `blue` 指的是颜色蓝色，其 ARGB 编码为
    `#FF0000FF`。可以通过 `colors` 资源访问的预定义颜色的完整列表见附录 B。


    选择 `Picture` 作为 art 资源的类型会显示一个选项菜单。其中一个选项标记为“upload”（上传），允许您选择设备上的图像并将其上传到 Microsoft
    网站，通过其 URL 进行访问。其他选项允许选择已存在于网络上的图像。然后，该图像会被添加到当前脚本的 `Art` 部分。


    选择 `Sound` 作为类型会提供与图像类似的选项。


    类型为 `Number` 和 `String` 的命名常量在脚本中的访问方式与具有这些类型的全局数据变量相同。然而，数据变量在脚本运行时需要初始化，并且它们不受保护，可以被修改。另一方面，命名常量在脚本创建时被初始化，并且不能通过脚本中执行的赋值操作进行修改。


    ## 无效值


    名为 `invalid` 的资源为每种数据类型提供了一个特定的无效值。例如，以下语句将 `DateTime` 类型的无效值赋给变量 `x`。


    ```

    x := invalid → datetime

    ```


    由 `invalid` 资源提供的所有可能的无效值的完整列表见附录 B。


    # 变量


    脚本可以访问并赋值给局部变量、全局数据变量以及当前操作的参数。


    ## 局部变量


    局部变量遵循块结构语言通常的可见性规则和生命周期规则。变量的名称从其声明点开始可见，直到包含该声明的块结束。对于值的存储，如果类型是值类型，则仅在块活动期间提供。如果类型是引用类型，则引用的存储也仅在块活动期间提供。


    局部变量在使用前必须声明并初始化。一条声明语句可同时满足这两个目的。例如，以下语句声明并初始化了一个 `String` 变量。


    ```

    var s1 := “Hello!”

    ```


    在该声明之后，直到封闭块的末尾，名称 `s1` 可用于引用局部变量的当前值。


    与大多数编程语言不同，名称 `s1` 不能被嵌套块中另一个名为 `s1` 的变量的声明所隐藏。TouchDevelop 编辑器根本不允许在一个操作内声明两个同名的变量；它强制一个操作中的所有参数和局部变量具有不同的名称。


    ## 全局数据变量


    脚本的 data 部分包含可由脚本内所有操作访问的变量声明。在大多数情况下，这些变量的存储是永久分配的，因此会在脚本的多次调用之间持续存在。然而，需要大量存储空间并且通常在脚本每次执行时重新计算的变量（例如
    `Board` 类型的实例）不会在脚本的两次使用之间持久化。


    可以通过点击脚本 data 部分标题下方的加号按钮，或者在操作或事件中声明局部变量，然后使用 TouchDevelop 编辑器的“提升为全局”功能来创建全局数据变量。


    全局数据变量可以使用任何数据类型创建。如果类型是 `Number`、`Boolean`、`String` 或 `DateTime`，则该变量具有一个中性初始值。该值分别为
    `0`、`false`、`“”` 或 `1 January 0001 12:00 am`。对于任何其他数据类型，初始值为 `invalid`。


    脚本中对全局数据变量的访问由特殊符号 `◳` 表示。例如，以下语句将值赋给一个 `Board` 类型的全局变量。


    ```

    ◳game := media → create board(480)

    ```


    通过对标记为 `◳data` 的键盘磁贴进行操作，然后点击标记有变量名称的磁贴，可以将对全局数据变量的引用插入到脚本中。


    ## 操作参数


    操作的参数是变量，但具有特殊属性。通过编辑操作的属性，可以为其关联零个或多个输入参数以及零个或多个结果参数。可以通过首先显示操作的代码，然后点击操作的第一行（显示其名称的位置）来显示操作信息，从而向操作添加输入参数。在该信息下方会显示一个标记为“add
    input parameter”（添加输入参数）的加号按钮。输入参数可以有除 `Nothing` 类型之外的任何数据类型。通过点击标记为“add output
    parameter”（添加输出参数）的加号按钮，可以类似地创建“result”（结果）参数。它也可以有除 `Nothing` 之外的任何类型。


    结果参数的特殊之处在于它具有初始值 `invalid`，并且通过操作的每个执行路径都必须为其赋值。


    除了这个特殊要求之外，输入参数和输出参数可以在操作内部像局部变量一样使用。

    '
- fmt: "### Operators\n\nWith the exception of string concatenation, there are no\
    \ implicit conversions; and none of the operators is overloaded. Therefore, except\
    \ for string concatenation, each operator can be applied only to particular datatypes.\
    \ The operators and the associated datatypes for the operands and result are summarized\
    \ in Table [2-6](#text00002.html#Tab6).\n\n**Table 2-6 Operators**\n\n| Operator\
    \ | Operand Types | Result Type | Description |\n| --- | --- | --- | --- |\n|\
    \ `+` | Number | Number | prefix unary plus |\n| `-` | Number | Number | prefix\
    \ unary minus |\n| `+` | Number Number | Number | addition |\n| `-` | Number Number\
    \ | Number | subtraction |\n| `*` | Number Number | Number | multiplication |\n\
    | `/` | Number Number | Number | division |\n| `<` | Number Number | Boolean |\
    \ less-than comparison |\n| `≤` | Number Number | Boolean | less-than-or-equal\
    \ comparison |\n| `>` | Number Number | Boolean | greater-than comparison |\n\
    | `≥` | Number Number | Boolean | greater-than-or-equal comparison |\n| `=` |\
    \ Number Number | Boolean | equals comparison |\n| `≠` | Number Number | Boolean\
    \ | not equals comparison |\n| `not` | Boolean | Boolean | logical negation |\n\
    | `and` | Boolean Boolean | Boolean | logical and |\n| `or` | Boolean Boolean\
    \ | Boolean | logical or |\n| `||` | any any | String | string concatenation |\n\
    \nThe operands of the string concatenation operand may have almost any datatype.\
    \ The values of the two operands are converted to type `String` before concatenation\
    \ proceeds.\n\n### Calling an action\n\nAn action which has a single result parameter\
    \ can be used in any context where an expression is permitted. Actions are covered\
    \ in detail in section 2.5, below.\n\n### Calling an API method\n\nThe API provides\
    \ many methods which return single results. An invocation of any of these methods\
    \ can be used in a context where an expression is permitted. The methods may be\
    \ associated with resources, such as `media` or `languages`, or they may be methods\
    \ of datatypes defined in the API such as `Contact` or `Link Collection`.\n\n\
    ## Statements\n\n### Expression\n\nAny expression may be used as a statement.\
    \ For example, this is a valid statement:\n\n```\n“Hello “ || “ there!”\n```\n\
    \nHowever, this particular statement is useless. The value of the expression is\
    \ simply discarded. The use of an expression as a statement is only useful if\
    \ evaluation of the statement has a side-effect. For example,\n\n```\n(“Hello\
    \ “ || “ there!”) → post to wall\n```\n\nThis expression evaluates to the special\
    \ value nothing. However evaluation also has the side-effect of displaying a string\
    \ on the screen.\n\nAn invocation of any action or API method which returns results\
    \ can be used as a statement; the results are simply discarded.\n\n### Declaration\
    \ and assignment\n\nA declaration of a local variable is combined with an assignment\
    \ to initialize the variable. The datatype of the initialization expression determines\
    \ the datatype of the variable. For example, the following statement creates a\
    \ local variable whose type is `Location Collection`.\n\n```\nvar places := collections\
    \ → create location collection\n```\n\nAssignments may also assign values to existing\
    \ variables. For example, the script can replace the value of the `places` variable\
    \ declared above. A possible statement which does that is the following.\n\n```\n\
    places := invalid → location collection\n```\n\nIf an action has more than one\
    \ return parameter, an assignment statement can be used to assign all the results\
    \ simultaneously. For example, if the script contains an action named `Get Address\
    \ Info` which returns a `String` and a `Number` as its two results, the action\
    \ can be invoked with code like the following.\n\n```\nvar street name := “”\n\
    var street number := 0\nstreet name, street number := ▷Get Address Info(“Joanie”)\n\
    ```\n\nEither all the results or none of the results must be assigned. It is not\
    \ possible to assign some results and discard the other results.\n\n### If statement\n\
    \nThe TouchDevelop editor always generates the `if-then-else` form for an `if`\
    \ statement, supplying empty bodies for the `then` clause and the `else` clause.\
    \ Either or both of these clauses may subsequently be replaced with statement\
    \ lists. The expression following the keyword `if` is an expression which must\
    \ evaluate to a `Boolean` value. As usual, if the expression evaluates to `true`,\
    \ the `then` clause is executed next and the `else` clause is skipped. Otherwise\
    \ the reverse happens, the `then` clause is skipped and the `else` clause is executed.\n\
    \nFor example, the following code determines the minimum of three values `a`,\
    \ `b` and `c`.\n\n```\nif a < b then\n    if a < c then\n        min := a\n  \
    \  else\n        min := c\nelse\n    if b < c then\n        min := b\n    else\n\
    \        min := c\n```\n\n### While loop\n\nA while loop has a controlling expression\
    \ which must evaluate to a `Boolean` value. The loop body is repeatedly executed\
    \ as long as the controlling expression evaluates to `true`.\n\nFor example, the\
    \ following code searches for any song stored on a Windows phone whose duration\
    \ exceeds 10 minutes.\n\n```\nvar long song := invalid → song\nvar my music :=\
    \ media → songs\nvar num songs := my music → count\nvar i := 0\nwhile i < num\
    \ songs and long song → is invalid do\n    var sng := my music → at(i)\n    if\
    \ sng→ duration > 10*60 then\n        long song := sng\n    else\n        // do\
    \ nothing\n    i := i + 1\n```\n\n### For loop\n\nThe for loop in TouchDevelop\
    \ is similar to for loops in other programming languages, but with some added\
    \ constraints. The index variable must be a `Number`; it must be initialized to\
    \ zero for the first iteration and it must be incremented in steps of one.\n\n\
    An example for loop which sums the integers from 0 to 99 would be as follows.\n\
    \n```\nvar sum := 0\nfor 0 ≤ i < 100 do\n    sum := sum + i\n```\n\nThe index\
    \ variable, `i`, in the example is a new local variable whose visibility is restricted\
    \ to the for loop. It must be a uniquely named variable in the enclosing action.\
    \ No assignments to the index variable are permitted within the loop body; this\
    \ variable is restricted to being read-only.\n\n### For each loop\n\nA for each\
    \ loop is used for iterating through all the elements of a collection. For example,\
    \ this loop adds up the playing times of all songs stored on a Windows phone.\n\
    \n```\nvar total := 0\nfor each sng in media→songs where true do\n    total :=\
    \ total + sng → duration\n(“Total playing time = “ || total/60 || “ minutes”)\
    \ → post to wall\n```\n\nNote that there is a `where` clause which may be used\
    \ to select only some of the values in the collection. The TouchDevelop editor\
    \ supplies a default value of `true` for the `where` clause, but it can be replaced\
    \ by any expression which evaluates to a `Boolean` value.\n\nAs with a `for` loop,\
    \ the index variable is a read-only variable and it is a new local variable whose\
    \ visibility is restricted to the `for each` loop.\n\n## Actions"
  raw: '### Operators


    With the exception of string concatenation, there are no implicit conversions;
    and none of the operators is overloaded. Therefore, except for string concatenation,
    each operator can be applied only to particular datatypes. The operators and the
    associated datatypes for the operands and result are summarized in Table [2-6](#text00002.html#Tab6)
    .


    Table 2-6


    Operators


    | Operator | Operand Types | Result Type | Description |

    | --- | --- | --- | --- |

    | + | Number | Number | prefix unary plus |

    | - | Number | Number | prefix unary minus |

    | + | Number Number | Number | addition |

    | - | Number Number | Number | subtraction |

    | * | Number Number | Number | multiplication |

    | / | Number Number | Number | division |

    | < | Number Number | Boolean | less-than comparison |

    | ≤ | Number Number | Boolean | less-than-or-equal comparison |

    | > | Number Number | Boolean | greater-than comparison |

    | ≥ | Number Number | Boolean | greater-than-or-equal comparison |

    | = | Number Number | Boolean | equals comparison |

    | ≠ | Number Number | Boolean | not equals comparison |

    | not | Boolean | Boolean | logical negation |

    | and | Boolean Boolean | Boolean | logical and |

    | or | Boolean Boolean | Boolean | logical or |

    | &#124;&#124; | any any | String | string concatenation |


    The operands of the string concatenation operand may have almost any datatype.
    The values of the two operands are converted to type `String` before concatenation
    proceeds.


    ### Calling an action


    An action which has a single result parameter can be used in any context where
    an expression is permitted. Actions are covered in detail in section 2.5, below.


    ### Calling an API method


    The API provides many methods which return single results. An invocation of any
    of these methods can be used in a context where an expression is permitted. The
    methods may be associated with resources, such as `media` or `languages` , or
    they may be methods of datatypes defined in the API such as `Contact` or `Link
    Collection` .


    ## Statements


    ### Expression


    Any expression may be used as a statement. For example, this is a valid statement:


            `“Hello “ || “ there!”`


    However, this particular statement is useless. The value of the expression is
    simply discarded. The use of an expression as a statement is only useful if evaluation
    of the statement has a side-effect. For example,


            `(“Hello “ || “ there!”) → post to wall`


    This expression evaluates to the special value nothing. However evaluation also
    has the side-effect of displaying a string on the screen.


    An invocation of any action or API method which returns results can be used as
    a statement; the results are simply discarded.


    ### Declaration and assignment


    A declaration of a local variable is combined with an assignment to initialize
    the variable. The datatype of the initialization expression determines the datatype
    of the variable. For example, the following statement creates a local variable
    whose type is `Location Collection` .


            `var` `places := collections → create location collection`


    Assignments may also assign values to existing variables. For example, the script
    can replace the value of the places variable declared above. A possible statement
    which does that is the following.


            `places := invalid → location collection`


    If an action has more than one return parameter, an assignment statement can be
    used to assign all the results simultaneously. For example, if the script contains
    an action named `Get Address Info` which returns a `String` and a `Number` as
    its two results, the action can be invoked with code like the following.


            `var` `street name := “”`


            `var` `street number := 0`


            `street name, street number := ▷Get Address Info(“Joanie”)`


    Either all the results or none of the results must be assigned. It is not possible
    to assign some results and discard the other results.


    ### If statement


    The TouchDevelop editor always generates the `if-then-else` form for an `if` statement,
    supplying empty bodies for the `then` clause and the `else` clause. Either or
    both of these clauses may subsequently be replaced with statement lists. The expression
    following the keyword `if` is an expression which must evaluate to a `Boolean`
    value. As usual, if the expression evaluates to `true` , the `then` clause is
    executed next and the `else` clause is skipped. Otherwise the reverse happens,
    the `then` clause is skipped and the `else` clause is executed.


    For example, the following code determines the minimum of three values a, b and
    c.


            `if` `a < b` `then`


                    `if` `a < c` `then`


                         `min := a`


                    `else`


                         `min := c`


            `else`


                    `if` `b < c` `then`


                         `min := b`


                    `else`


                         `min := c`


    ### While loop


    A while loop has a controlling expression which must evaluate to a `Boolean` value.
    The loop body is repeatedly executed as long as the controlling expression evaluates
    to true.


    For example, the following code searches for any song stored on a Windows phone
    whose duration exceeds 10 minutes.


            `var` `long song := invalid → song`


            `var` `my music := media → songs`


            `var` `num songs := my music → count`


            `var` `i := 0`


            `while` `i < num songs` `and` `long song → is invalid` `do`


                    `var` `sng := my music → at(i)`


                    `if` `sng→ duration > 10*60` `then`


                      `long song := sng`


                    `else`


                      `// do nothing`


                    `i := i + 1`


    ### For loop


    The for loop in TouchDevelop is similar to for loops in other programming languages,
    but with some added constraints. The index variable must be a `Number` ; it must
    be initialized to zero for the first iteration and it must be incremented in steps
    of one.


    An example for loop which sums the integers from 0 to 99 would be as follows.


            `var` `sum := 0`


            `for` `0 ≤ i < 100` `do`


                    `sum := sum + i`


    The index variable, `i` , in the example is a new local variable whose visibility
    is restricted to the for loop. It must be a uniquely named variable in the enclosing
    action. No assignments to the index variable are permitted within the loop body;
    this variable is restricted to being read-only .


    ### For each loop


    A for each loop is used for iterating through all the elements of a collection.
    For example, this loop adds up the playing times of all songs stored on a Windows
    phone.


            `var` `total := 0`


            `for each` `sng` `in` `media→songs` `where` `true` `do`


                    `total := total + sng → duration`


        `(“Total playing time = “ || total/60 || “ minutes”) → post to wall`


    Note that there is a `where` clause which may be used to select only some of the
    values in the collection. The TouchDevelop editor supplies a default value of
    true for the `where` clause, but it can be replaced by any expression which evaluates
    to a `Boolean` value.


    As with a `for` loop, the index variable is a read-only variable and it is a new
    local variable whose visibility is restricted to the `for each` loop.


    ## Actions'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 运算符\n\n除了字符串拼接之外，没有隐式转换；并且所有运算符都没有重载。因此，除了字符串拼接之外，每个运算符只能应用于特定的数据类型。表\
    \ 2-6 总结了运算符以及操作数和结果的相关数据类型。\n\n**表 2-6 运算符**\n\n| 运算符 | 操作数类型 | 结果类型 | 描述 |\n\
    | --- | --- | --- | --- |\n| `+` | 数值 | 数值 | 前缀一元加 |\n| `-` | 数值 | 数值 | 前缀一元减\
    \ |\n| `+` | 数值 数值 | 数值 | 加法 |\n| `-` | 数值 数值 | 数值 | 减法 |\n| `*` | 数值 数值 | 数值\
    \ | 乘法 |\n| `/` | 数值 数值 | 数值 | 除法 |\n| `<` | 数值 数值 | 布尔 | 小于比较 |\n| `≤` | 数值 数值\
    \ | 布尔 | 小于等于比较 |\n| `>` | 数值 数值 | 布尔 | 大于比较 |\n| `≥` | 数值 数值 | 布尔 | 大于等于比较 |\n\
    | `=` | 数值 数值 | 布尔 | 等于比较 |\n| `≠` | 数值 数值 | 布尔 | 不等于比较 |\n| `not` | 布尔 | 布尔 |\
    \ 逻辑非 |\n| `and` | 布尔 布尔 | 布尔 | 逻辑与 |\n| `or` | 布尔 布尔 | 布尔 | 逻辑或 |\n| `\\|\\|`\
    \ | 任意 任意 | 字符串 | 字符串拼接 |\n\n字符串拼接运算符的操作数几乎可以是任何数据类型。在进行拼接之前，两个操作数的值将被转换为`String`类型。\n\
    \n### 调用操作\n\n具有单个结果参数的操作可以在任何允许使用表达式的上下文中使用。操作将在下面的章节 2.5 中详细介绍。\n\n### 调用 API\
    \ 方法\n\nAPI 提供了许多返回单个结果的方法。任何这些方法的调用都可以在允许使用表达式的上下文中使用。这些方法可以与资源（例如`media`或`languages`）相关联，也可以是\
    \ API 中定义的数据类型（例如`Contact`或`Link Collection`）的方法。\n\n## 语句\n\n### 表达式\n\n任何表达式都可以用作语句。例如，以下是一个有效的语句：\n\
    \n```\n“Hello “ || “ there!”\n```\n\n然而，这个特定的语句毫无用处。该表达式的值被简单地丢弃。只有当语句的求值具有副作用时，将表达式用作语句才有意义。例如，\n\
    \n```\n(“Hello “ || “ there!”) → post to wall\n```\n\n这个表达式求值为特殊值 `nothing`。但是，求值还具有在屏幕上显示字符串的副作用。\n\
    \n任何返回结果的操作或 API 方法的调用都可以用作语句；这些结果会被直接丢弃。\n\n### 声明和赋值\n\n局部变量的声明与赋值相结合以初始化该变量。初始化表达式的数据类型决定了变量的数据类型。例如，以下语句创建了一个类型为`Location\
    \ Collection`的局部变量。\n\n```\nvar places := collections → create location collection\n\
    ```\n\n赋值也可以为现有变量赋值。例如，脚本可以替换上面声明的`places`变量的值。一个实现此功能的可能语句如下所示。\n\n```\nplaces\
    \ := invalid → location collection\n```\n\n如果一个操作有多个返回参数，则可以使用赋值语句同时分配所有结果。例如，如果脚本包含一个名为`Get\
    \ Address Info`的操作，该操作返回一个`String`和一个`Number`作为其两个结果，则可以使用如下代码调用该操作。\n\n```\n\
    var street name := “”\nvar street number := 0\nstreet name, street number := ▷Get\
    \ Address Info(“Joanie”)\n```\n\n要么分配所有结果，要么不分配任何结果。不能分配部分结果而丢弃其他结果。\n\n### If\
    \ 语句\n\nTouchDevelop 编辑器总是为`if`语句生成`if-then-else`形式，为`then`子句和`else`子句提供空主体。这两个子句中的一个或两个后续都可以被替换为语句列表。关键字`if`后面的表达式必须是一个求值为`Boolean`值的表达式。通常，如果表达式求值为`true`，则接下来执行`then`子句并跳过`else`子句。否则，情况相反，跳过`then`子句并执行`else`子句。\n\
    \n例如，以下代码确定了三个值`a`、`b`和`c`中的最小值。\n\n```\nif a < b then\n    if a < c then\n  \
    \      min := a\n    else\n        min := c\nelse\n    if b < c then\n       \
    \ min := b\n    else\n        min := c\n```\n\n### While 循环\n\nWhile 循环有一个控制表达式，该表达式必须求值为一个`Boolean`值。只要控制表达式求值为`true`，就会重复执行循环体。\n\
    \n例如，以下代码搜索存储在 Windows 手机上持续时间超过 10 分钟的任何歌曲。\n\n```\nvar long song := invalid\
    \ → song\nvar my music := media → songs\nvar num songs := my music → count\nvar\
    \ i := 0\nwhile i < num songs and long song → is invalid do\n    var sng := my\
    \ music → at(i)\n    if sng→ duration > 10*60 then\n        long song := sng\n\
    \    else\n        // 什么也不做\n    i := i + 1\n```\n\n### For 循环\n\nTouchDevelop\
    \ 中的 for 循环类似于其他编程语言中的 for 循环，但增加了一些约束。索引变量必须是`Number`类型；它必须初始化为零以进行第一次迭代，并且必须以步长\
    \ 1 递增。\n\n一个求 0 到 99 整数和的 for 循环示例如下。\n\n```\nvar sum := 0\nfor 0 ≤ i < 100 do\n\
    \    sum := sum + i\n```\n\n示例中的索引变量`i`是一个新的局部变量，其可见性仅限于 for 循环。在封闭的操作中，它必须是一个唯一命名的变量。不允许在循环体内对索引变量进行赋值；此变量被限制为只读。\n\
    \n### For each 循环\n\nFor each 循环用于遍历集合中的所有元素。例如，此循环累加存储在 Windows 手机上的所有歌曲的播放时间。\n\
    \n```\nvar total := 0\nfor each sng in media→songs where true do\n    total :=\
    \ total + sng → duration\n(“Total playing time = “ || total/60 || “ minutes”)\
    \ → post to wall\n```\n\n请注意，有一个`where`子句可用于仅选择集合中的部分值。TouchDevelop 编辑器为`where`子句提供默认值`true`，但可以将其替换为任何求值为`Boolean`值的表达式。\n\
    \n与`for`循环一样，索引变量是一个只读变量，并且是一个新的局部变量，其可见性仅限于`for each`循环。\n\n## 操作\n"
- fmt: "### Defining an action\n\nAn action can have zero or more input parameters\
    \ and zero or more result parameters. When there are zero result parameters, the\
    \ action can be called only for its side effects. There is no value returned by\
    \ the call in this case. When the action has two or more result parameters, the\
    \ invocation can be used on the right-hand side of a multiple assignment statement\
    \ or the invocation can be made for its side effects only (and any returned results\
    \ are ignored). When the action has exactly one result parameter, an invocation\
    \ returns a single value as the result and that value may be used in any context\
    \ where an expression can occur.\n\nFor example, consider the action `Replicate`\
    \ defined as follows.\n```\naction Replicate( s: String, n: Number ) returns r:\
    \ String\n    r := “”\n    while n > 0 do\n        r := r || s\n        n := n\
    \ – 1\n```\nThe action can be invoked and its resulting value used in a statement\
    \ like the following.\n```\n(“The answer is “ || ▷Replicate(“NO! “, 10) || “forever!”)\
    \ → post to wall\n```\nImmediately before the statements of the `Replicate` action\
    \ are executed, the string `“NO!”` is copied into parameter `s`, 10 is copied\
    \ into parameter `n` and the result parameter `r` is initialized to `invalid`.\
    \ When the action has finished its execution, the final value of `r` is returned\
    \ as the result.\n\n#### Public versus private\n\nWhen the properties of an action\
    \ are accessed with the editor, the editor provides the ability to specify the\
    \ input parameters, the result parameters, and to change the name of the action.\
    \ There is also a checkbox which is labeled “private action”. Leaving that box\
    \ unchecked allows the action to be invoked directly. If a script has two or more\
    \ actions (or pages, as discussed in [Chapter 10](#text00010.html#Chap10)) not\
    \ tagged as private, the script has multiple entry points.\n\nAnother consequence\
    \ of leaving the checkbox unticked is that the action can be invoked from another\
    \ script when the script is published as a library. (See the subsection below\
    \ on Library Scripts.)\n\nTicking the ‘private action’ checkbox restricts the\
    \ action to being accessible only from other actions within the same script.\n\
    \n### Call and return\n\nAn invocation of an action causes any arguments to be\
    \ evaluated and copied to corresponding input parameters of the action, then the\
    \ statements of the action are executed, and finally the values of any result\
    \ parameters are copied back to the caller and made available as the value of\
    \ the action.\n\nA call to an action located in the same script is indicated by\
    \ the code symbol, `▷`.\n\n### Input parameters\n\nThe call by value parameter\
    \ passing mechanism is used for input parameters. Each argument expression supplied\
    \ by the caller is evaluated and assigned as an initial value to the corresponding\
    \ parameter. In the case where the argument and parameter have a value type, a\
    \ duplicate of the value is assigned to the parameter. When the argument and parameter\
    \ have a reference type, it is the reference which is duplicated, so that the\
    \ parameter references the same instance on the heap as supplied by the caller.\n\
    \n### Result parameters\n\nWhen an action is invoked, each result parameter is\
    \ initialized to an `invalid` value of the correct type. There must be at least\
    \ one assignment to each result parameter on every execution path which can be\
    \ taken through the action. When control reaches the end of the action, the final\
    \ values of the result parameters are returned as the results of the call.\n\n\
    ### Calling a library action\n\nIt is possible to invoke actions in a script which\
    \ has been declared as a library. Each such library script must be added to the\
    \ library section of the script. An imported script is given a name by the TouchDevelop\
    \ editor (a name which is copied from the original script but can be changed later).\n\
    \nWhen editing code in the script, the editor provides a button labeled `♻libs`.\
    \ Tapping this key inserts the symbol `♻` into the code and the editor then provides\
    \ a choice between the various names used for the imported library scripts. Once\
    \ a name has been selected, the editor allows any action in that library script,\
    \ other than those marked as private, to be called.\n\nFor example, the library\
    \ script `turtle`, published as `/sicm` on the TouchDevelop website, provides\
    \ actions for drawing colored lines using a virtual pen (a scheme known as ‘turtle\
    \ graphics’). To use this library in our own script `S`, one first adds the `turtle`\
    \ script to the library section of `S`. The editor will use the name `turtle`\
    \ for that library. Subsequently, actions and events defined in `S` can contain\
    \ code like the following.\n```\n♻turtle→initialize\n♻turtle→pen down\n♻turtle→pen\
    \ color(colors→red)\n♻turtle→forward(100)\n```\n#### Rebinding libraries\n\nIf\
    \ script `S` uses some actions in library `L1` but another library `L2` which\
    \ implements the same actions becomes available, the editor provides the possibility\
    \ to rebind `S` to use `L2` instead of `L1`. A more complicated example of rebinding\
    \ is possible if our script `S` uses library `L1` and `L1` in turns uses library\
    \ `L2`. The libraries section of `S` can be edited so that references from `L1`\
    \ to actions in `L2` can be bound instead to actions in another library `L3` or\
    \ to actions (with the correct signature) in `S` itself.\n\n#### Visibility\n\n\
    Although the non-private actions of a library script are all visible, nothing\
    \ else is visible. There is no direct access to any global data items or art items\
    \ declared in the script. If the developer of the library wishes to permit such\
    \ access, get and set actions must be provided in the library for returning or\
    \ replacing the values of these items."
  raw: '### Defining an action


    An action can have zero or more input parameters and zero or more result parameters.
    When there are zero result parameters, the action can be called only for its side
    effects. There is no value returned by the call in this case. When the action
    has two or more result parameters, the invocation can be used on the right-hand
    side of a multiple assignment statement or the invocation can be made for its
    side effects only (and any returned results are ignored). When the action has
    exactly one result parameter, an invocation returns a single value as the result
    and that value may be used in any context where an expression can occur.


    For example, consider the action `Replicate` defined as follows.


            `action` `Replicate( s: String, n: Number )` `returns` `r: String`


                    `r := “”`


                    `while` `n > 0` `do`


          `r := r || s`


                      `n := n – 1`


    The action can be invoked and its resulting value used in a statement like the
    following.


            `(“The answer is “ || ▷Replicate(“NO! “, 10) || “forever!”)       → post
    to wall`


    Immediately before the statements of the `Replicate` action are executed, the
    string `“NO!”` is copied into parameter `s` , 10 is copied into parameter `n`
    and the result parameter `r` is initialized to `invalid` . When the action has
    finished its execution, the final value of `r` is returned as the result.


    #### Public versus private


    When the properties of an action are accessed with the editor, the editor provides
    the ability to specify the input parameters, the result parameters, and to change
    the name of the action. There is also a checkbox which is labeled “private action
    ”. Leaving that box unchecked allows the action to be invoked directly. If a script
    has two or more actions (or pages , as discussed in [Chapter 10](#text00010.html#Chap10)
    ) not tagged as private, the script has multiple entry points.


    Another consequence of leaving the checkbox unticked is that the action can be
    invoked from another script when the script is published as a library. (See the
    subsection below on Library Scripts.)


    Ticking the ‘private action’ checkbox restricts the action to being accessible
    only from other actions within the same script.


    ### Call and return


    An invocation of an action causes any arguments to be evaluated and copied to
    corresponding input parameters of the action, then the statements of the action
    are executed, and finally the values of any result parameters are copied back
    to the caller and made available as the value of the action.


    A call to an action located in the same script is indicated by the code symbol,
    ▷.


    ### Input parameters


    The call by value parameter passing mechanism is used for input parameters. Each
    argument expression supplied by the caller is evaluated and assigned as an initial
    value to the corresponding parameter. In the case where the argument and parameter
    have a value type, a duplicate of the value is assigned to the parameter. When
    the argument and parameter have a reference type, it is the reference which is
    duplicated, so that the parameter references the same instance on the heap as
    supplied by the caller.


    ### Result parameters


    When an action is invoked, each result parameter is initialized to an `invalid`
    value of the correct type. There must be at least one assignment to each result
    parameter on every execution path which can be taken through the action. When
    control reaches the end of the action, the final values of the result parameters
    are returned as the results of the call.


    ### Calling a library action


    It is possible to invoke actions in a script which has been declared as a library.
    Each such library script must be added to the library section of the script. An
    imported script is given a name by the TouchDevelop editor (a name which is copied
    from the original script but can be changed later).


    When editing code in the script, the editor provides a button labeled `♻libs`
    . Tapping this key inserts the symbol `♻` into the code and the editor then provides
    a choice between the various names used for the imported library scripts. Once
    a name has been selected, the editor allows any action in that library script,
    other than those marked as private, to be called.


    For example, the library script turtle, published as `/sicm` on the TouchDevelop
    website, provides actions for drawing colored lines using a virtual pen (a scheme
    known as ‘turtle graphics’). To use this library in our own script S, one first
    adds the turtle script to the library section of S. The editor will use the name
    `turtle` for that library. Subsequently, actions and events defined in S can contain
    code like the following.


            `♻turtle→initialize`


            `♻turtle→pen down`


            `♻turtle→pen color(colors→red)`


            `♻turtle→forward(100)`


    #### Rebinding libraries


    If script S uses some actions in library L1 but another library L2 which implements
    the same actions becomes available, the editor provides the possibility to rebind
    S to use L2 instead of L1\. A more complicated example of rebinding is possible
    if our script S uses library L1 and L1 in turns uses library L2\. The libraries
    section of S can be edited so that references from L1 to actions in L2 can be
    bound instead to actions in another library L3 or to actions (with the correct
    signature) in S itself.


    #### Visibility


    Although the non-private actions of a library script are all visible, nothing
    else is visible. There is no direct access to any global data items or art items
    declared in the script. If the developer of the library wishes to permit such
    access, get and set actions must be provided in the library for returning or replacing
    the values of these items.'
  trans: "\n### 定义动作\n\n一个动作可以有零个或多个输入参数，以及零个或多个结果参数。当结果参数为零时，该动作只能因其副作用而被调用（即调用不返回任何值）。当动作有两个或更多结果参数时，调用可以用在多赋值语句的右侧，也可以仅为了其副作用而进行（任何返回的结果都将被忽略）。当动作恰好有一个结果参数时，调用会返回单个值作为结果，该值可在任何允许使用表达式的上下文中使用。\n\
    \n例如，考虑如下定义的 `Replicate` 动作：\n```\naction Replicate( s: String, n: Number ) returns\
    \ r: String\n    r := “”\n    while n > 0 do\n        r := r || s\n        n :=\
    \ n – 1\n```\n该动作可以被调用，其结果值可用于如下所示的语句中：\n```\n(“The answer is “ || ▷Replicate(“NO!\
    \ “, 10) || “forever!”) → post to wall\n```\n在 `Replicate` 动作的语句即将执行之前，字符串 `“NO!”`\
    \ 会赋值给参数 `s`，数字 10 赋值给参数 `n`，结果参数 `r` 被初始化为 `invalid`。当动作执行完毕时，`r` 的最终值将作为结果返回。\n\
    \n#### 公有与私有\n\n当使用编辑器访问动作的属性时，编辑器提供了指定输入参数、结果参数以及修改动作名称的功能。还有一个标有“私有动作”的复选框。取消选中该框允许该动作被直接调用。如果一个脚本包含两个或更多未标记为私有的动作（或页面，如第\
    \ 10 章所述），则该脚本有多个入口点。\n\n取消选中该复选框的另一个后果是，当脚本作为库发布时，可以从另一个脚本调用该动作。（请参阅下方关于库脚本的子章节。）\n\
    \n勾选“私有动作”复选框会将动作限制为仅能被同一脚本内的其他动作访问。\n\n### 调用与返回\n\n调用一个动作会导致所有参数被求值并复制到动作相应的输入参数中，然后执行动作的语句，最后将所有结果参数的值复制回调用者，并作为动作的值提供。\n\
    \n对同一脚本中的动作的调用由代码符号 `▷` 表示。\n\n### 输入参数\n\n输入参数采用“按值传递”的机制。由调用者提供的每个参数表达式会被求值，并作为初始值赋给相应的参数。如果参数和参数值是值类型，则值的副本会被赋给参数。当参数和参数值是引用类型时，复制的是引用本身，因此参数引用了调用者提供的堆上的同一个实例。\n\
    \n### 结果参数\n\n当调用一个动作时，每个结果参数都会被初始化为正确类型的 `invalid` 值。在动作的每条可执行路径上，必须至少对每个结果参数进行一次赋值。当控制流到达动作末尾时，结果参数的最终值将被作为调用的结果返回。\n\
    \n### 调用库动作\n\n可以在已声明为库的脚本中调用动作。每个此类库脚本都必须添加至目标脚本的库部分。TouchDevelop 编辑器会为导入的脚本指定一个名称（该名称复制自原始脚本，但后续可更改）。\n\
    \n当在脚本中编辑代码时，编辑器会提供一个标有 `♻libs` 的按钮。点击此键会在代码中插入符号 `♻`，然后编辑器会提供已导入库脚本的各种名称供选择。一旦选定名称，编辑器允许调用该库脚本中的任何非私有动作。\n\
    \n例如，库脚本 `turtle`（在 TouchDevelop 网站上以 `/sicm` 发布）提供了使用虚拟笔绘制彩色线条的动作（该方案称为“海龟图形”）。要在我们自己的脚本\
    \ `S` 中使用这个库，首先需要将 `turtle` 脚本添加至 `S` 的库部分。编辑器会为该库使用名称 `turtle`。随后，在 `S` 中定义的动作和事件可以包含如下代码：\n\
    ```\n♻turtle→initialize\n♻turtle→pen down\n♻turtle→pen color(colors→red)\n♻turtle→forward(100)\n\
    ```\n#### 重新绑定库\n\n如果脚本 `S` 使用了库 `L1` 中的某些动作，但另一个实现了相同动作的库 `L2` 变得可用，编辑器提供了将 `S`\
    \ 重新绑定以使用 `L2` 而非 `L1` 的可能性。更复杂的重新绑定场景是，我们的脚本 `S` 使用了库 `L1`，而 `L1` 又使用了库 `L2`。可以编辑\
    \ `S` 的库部分，使得来自 `L1` 的对 `L2` 中动作的引用，可以绑定到另一个库 `L3` 中的动作上，或绑定到 `S` 自身中具有正确签名的动作上。\n\
    \n#### 可见性\n\n虽然库脚本的非私有动作都是可见的，但其他内容均不可见。无法直接访问脚本中声明的任何全局数据项或图稿项。如果库的开发者希望允许此类访问，则必须在库中提供用于返回或替换这些项值的\
    \ get 和 set 动作。\n"
- fmt: '# Events


    In some respects, events are like actions. They contain code and some kinds of
    events take input parameters. However events cannot be called. They can only be
    invoked when something external to the script occurs. For example, shaking the
    phone is detected by the phone’s sensors and can cause the code for the shake
    event in the TouchDevelop script to be executed.


    An event interrupts the normal execution of a script. However an event will never
    interrupt the code for another event. Instead, execution of the second event will
    wait until the executing event has finished.


    If a script contains code for one or more events, the script will not terminate
    execution when it reaches the end of the action which was initially invoked. The
    script enters an internal wait loop where it waits for events to occur and to
    be executed. To force a script to stop execution, it is necessary to use one of
    the API methods `time` → `stop`, `time` → `stop` and `close` or `time` → `fail
    if not`.


    The kinds of events and brief descriptions are listed in Table [2-7](#text00002.html#Tab7).
    There are additional events, described in Table [2-8](#text00002.html#Tab8) which
    become available, if global data items of type `Board` and type `Sprite Set` have
    been declared. They are intended for use in games programs, and capture user interactions
    with the gameboard.


    Table 2-7


    Events


    | Event | Description of when invoked |

    | --- | --- |

    | `gameloop` | Invoked every 50 milliseconds. Intended for updating a game display,
    but usable for other purposes. |

    | `shake` | Device is shaken |

    | `phone face up` | Device is turned to be flat and face up |

    | `phone face down` | Device is turned to be flat and face down |

    | `phone portrait` | Device is turned upright |

    | `phone landscape left` | Device is placed on its left side |

    | `phone landscape right` | Device is placed on its right side |

    | `empty space on wall` | The user has scrolled to the bottom of the wall and/or
    space to display new output has become available |

    | `page navigated from` | The page displayed on the screen has been popped |

    | `active song changed` | The song being played by the phone has changed |

    | `player state changed` | The media player starts playing |

    | `camera button pressed` | Camera button on phone is pressed |

    | `camera button half pressed` | Camera button on phone is halfway pressed |

    | `camera button released` | Camera button on phone is released |

    | `tap wall XXX (item: XXX)` | A value of type `XXX` displayed on the wall is
    tapped; this value is received as the input parameter. There is a different tap
    wall event for various types, represented by `XXX`. |


    The `tap wall XXX` event in Table [2-7](#text00002.html#Tab7) represents many
    events, where `XXX` can be any of the types `Appointment`, `Camera`, `Color`,
    `Contact`, `Device`, `Link`, `Media Player`, `Message`, `Page Button`, `Picture`,
    `Picture Album`, `Place`, `Playlist`, `Printer`, `Song`, `Sound`, `String`, `TextBox`,
    `Tile`, `Vector3` or any object type defined in the Records section of the script.


    Table 2-8


    Gameboard events


    | Event | Description |

    | --- | --- |

    | `tap board(x: Number, y: Number)` | The gameboard has been tapped at coordinates
    x, y. |

    | `swipe board(x: Number, y: Number, delta x: Number, delta y: Number)` | The
    gameboard has been swiped, starting at coordinates x, y and continuing along the
    vector delta x, delta y. |

    | `tap sprite in sprite set(sprite: Sprite, index in set: Number, x: Number, y:
    Number)` | A sprite in the sprite set has been tapped; the first two parameters
    specify which sprite and the last two give the x, y coordinates of the sprite.
    |

    | `swipe sprite in sprite set(sprite: Sprite, index in set: Number, x: Number,
    y: Number, delta x: Number, delta y: Number)` | A sprite in the sprite set has
    been swiped; the first two parameters specify which sprite, the next two give
    the x, y coordinates of the sprite, and the last two give the vector describing
    the swipe motion. |

    | `drag sprite in sprite set(sprite: Sprite, index in set: Number, x: Number,
    y: Number, delta x: Number, delta y: Number)` | A sprite in the sprite set has
    been dragged; the first two parameters specify which sprite, the next two give
    the x, y coordinates of the sprite, and the last two give the vector describing
    the dragging motion. |


    # Pages


    Pages are a recent addition to the TouchDevelop language. They provide the script
    writer with the tools to develop sophisticated user interfaces. Pages are added
    to a script in a similar way to actions or events and, like them, contain statements
    to be executed.


    A syntactic construct boxed is used as a wrapper for statement lists inside a
    page, where those statements create the content and style of a rectangular region
    of the screen display.


    Pages and the boxed construct are covered in detail in [Chapter 10](#text00010.html#Chap10).


    # Creating library scripts


    When a script’s properties are edited, there is an opportunity to tick a box labeled
    ‘this script is a library’. This enables all actions not flagged as private to
    be callable from other scripts on your phone. Publishing the script on the TouchDevelop
    website will allow other users to access the public actions included in the script.


    ## Implementation restrictions on libraries


    A library script cannot define any entries in its Events or Records sections.
    Items in the `Data` or `Art` sections of the library script can be directly accessed
    from other scripts. If such access is desirable, then additional actions to provide
    the desired form of access must be defined.


