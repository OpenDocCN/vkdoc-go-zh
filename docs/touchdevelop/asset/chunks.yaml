    \ button to stop execution. [Figure [A-4b](#text00016.html#Fig4)]  \n4.  Tap the\
    \ phone back button again to return to the script components.\n\n## E.4 Additional\
    \ steps\n\n### Revising the script\n\nIf the script does not behave as expected\
    \ or needs improvement, it is easy to go back and edit the code. On the screen\
    \ where the script components are listed, just tap the name of the action or the\
    \ name of the event to open up the code for that action or event.\n\n![A978-1-4302-6137-7_16_Fig4_HTML.jpg](Image00074.jpg)\n\
    \nFigure A-4 Running the script\n\nAfter scrolling, if necessary, to the line\
    \ of code which is to be changed or where new code is to be inserted, tap that\
    \ line. The edit menu then provides the choices of editing that line, deleting\
    \ that line (the cut button), inserting above or inserting below.\n\nIf an existing\
    \ line of code is being edited, the part to be changed can be tapped, the part\
    \ can be deleted, and new program elements can be inserted. The edit menu choices\
    \ should be intuitive.\n\n### Publishing the script\n\nIf the code is something\
    \ that is worth sharing with others, or if it is to be saved to permanent storage\
    \ on a web server, the script can be published. Tapping the upward pointing arrow\
    \ at the bottom begins the process.\n\nA Windows Live ID or Facebook ID is needed\
    \ before the script can be published. There is a choice of keeping the script\
    \ hidden or making it visible. If it is marked as visible, then anyone searching\
    \ the TouchDevelop website for an example of a particular language feature or\
    \ script feature may be directed to this script. It can also appear in lists of\
    \ new scripts, or featured scripts. If it is marked as hidden, then it will not\
    \ show up in such searches (but anyone knowing the codename for the script can\
    \ still access it)."
