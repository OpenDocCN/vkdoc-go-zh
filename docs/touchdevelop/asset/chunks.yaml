    # 9. Game Board


    [9.1 Introduction](#text00009.html#Sec1) [9.2 The Board datatype](#text00009.html#Sec5)
    [9.3 The Sprite datatype](#text00009.html#Sec11) [9.4 The Sprite Collection datatype](#text00009.html#Sec16)
    [9.5 Touching and board events](#text00009.html#Sec17) [9.6 Debugging games](#text00009.html#Sec26)


    TouchDevelop includes a “game board” API for writing simple sprite-based games.
    The API includes a primitive physics engine to simplify common game loops where
    objects are moving while they experience gravity and friction. Game board elements
    can be orchestrated using events based on touch and regular timing intervals.


    ## 9.1 Introduction


    ### 9.1.1 What is a sprite?


    In TouchDevelop, sprites are 2D bitmaps that are drawn directly to the screen.
    Sprites are commonly used to display information such as health bars, number of
    lives, or text such as scores. Some games, especially older games, are composed
    entirely of sprites. TouchDevelop allows creation and use of several types of
    sprite, such as ellipse, rectangle, text and picture. More details about a sprite’s
    capabilities can be obtained from [http://​msdn.​microsoft.​com/​en-us/​library/​bb203919.​aspx](http://msdn.microsoft.com/en-us/library/bb203919.aspx)


    ### 9.1.2 Coordinates and units


    Positions in the game board API are based on pixels. The origin of the grid is
    the top left corner when holding the device upright, the x-axis is horizontal,
    the y-axis vertical. Sprite positions refer to the center of the sprite, i.e.,
    the halfway point of its width and height before any rotation is applied. The
    reasoning behind this choice is so that sprites can rotate around their center.
    Future versions of TouchDevelop may provide more control for offsetting sprites
    from their position. Speed and acceleration are measured in pixels/second and
    pixels/second² .


    ### 9.1.3 Game program structure


    The code for a typical game has an underlying structure like the following.


               `action` `main( )`


                   `◳board := media` → `create board(640)`


                   `// … create sprites, add color and features to the board`


                   `◳board` → `post to wall`


               `event` `gameloop( )`


                   `// … move objects around …`


                   `◳board` → `update on wall`


    The `gameloop` event is triggered approximately every 50 milliseconds, i.e. about
    20 times per second.


    ## 9.2 The Board datatype


    The media resource three two methods for creating a game board; they are listed
    in Table [9-1](#text00009.html#Tab1) . The maximum height supported by TouchDevelop
    for a board is 640 pixels. A board created by `media` →`create board` is 456 pixels
    wide; a board created by `media` →`create portrait board` is 480 pixels wide.
    A board remains invisible until it is posted to the wall.


    Once posted, updates to the board state and the sprites on the board become visible
    only when calling `board` →`update on wall` .


    The methods of the `Board` datatype concerned with the board’s dimensions and
    general appearance are listed in Table [9-2](#text00009.html#Tab2) . The board
    has a background color and a background picture that can be set separately. The
    default background color is transparent, and no background picture is provided
    by default. An additional possibility is to copy the images captured by the device’s
    primary camera and use those images as an ever changing background for the board.
    Only one of these background possibilities can be active at a time.


    Table 9-1


    Methods to create a board


    | Methods | Description |

    | --- | --- |

    | `media→create board(` `height : Number) : Board` | Creates a new board with
    the specified height in pixels |

    | `media→create portrait board : Board` | Creates a new board that fills the entire
    screen when displayed and assumes the device is held in portrait mode. |

    | `media→create landscape board : Board` | Creates a new board that fills the
    entire screen when displayed and assumes the device is held in landscape mode.
    |'
