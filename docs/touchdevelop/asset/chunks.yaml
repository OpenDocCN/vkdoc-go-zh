  trans: '

    # 脚本语言


    `TouchDevelop` 是一门用于编写移动应用的语言。`TouchDevelop Windows Phone` 应用程序及其 Web 应用同样提供了运行
    `TouchDevelop` 脚本的执行环境。


    `TouchDevelop` 语言是一种基于类型、结构化的编程语言，其核心设计理念是仅通过触控来编写代码。它内置了多种基本数据类型，方便开发者访问移动设备上丰富的传感器数据。`TouchDevelop`
    融合了命令式、面向对象和函数式语言的特点。其中命令式部分最为显著：用户可以更新局部变量以及全局对象的状态。面向对象特性是由自动补全需求所决定的——对象的属性是一种易于访问且直观的概念。然而，为了保持简洁性，该语言不提供定义新类型作为其他类型子类型的功能。


    一个 `TouchDevelop` 脚本由若干动作（函数或过程）、事件（当外部事件发生时需执行的动作）、表和记录类型的定义、全局状态（全局变量和只读数据）以及库引用（对其他脚本的引用）构成。该语言的详细介绍请参阅第
    2 章。


    `TouchDevelop` 脚本编辑器是 `TouchDevelop` 应用程序的一部分。其设计目标是仅通过触摸屏高效录入脚本。`TouchDevelop`
    脚本在 `TouchDevelop` 应用内部执行。其执行模式完全是反应式的——动作响应事件而运行。事件可以由用户输入（例如，与 UI 元素交互、改变手机方向或摇晃手机）、手机事件（例如，音乐播放器中当前歌曲的切换）或时间流逝来触发。`TouchDevelop`
    采用协作式多线程。动作和事件以单线程方式执行。


