- fmt: '## B.14 senses


    Camera, location, microphone and other sensors.


    | `acceleration quick` : `Vector3` | Gets filtered accelerometer data using a
    combination of a low-pass and threshold triggered high-pass on each axis to eliminate
    the majority of the sensor low amplitude noise while trending very quickly to
    large offsets (not perfectly smooth signal in that case), providing a very low
    latency. This is ideal for quickly reacting UI updates. |

    | `acceleration smooth` : `Vector3` | Gets filtered accelerometer data using a
    1 Hz first-order low-pass on each axis to eliminate the main sensor noise while
    providing a medium latency. This can be used for moderately reacting UI updates
    requiring a very smooth signal. |

    | `acceleration stable` : `Vector3` | Gets filtered and temporally averaged accelerometer
    data using an arithmetic mean of the last 25 ''optimally filtered'' samples, so
    over 500ms at 50Hz on each axis, to virtually eliminate most sensor noise. This
    provides a very stable reading but it has also a very high latency and cannot
    be used for rapidly reacting UI. |

    | `battery level` : `Number` | Gets the charge level of the battery between 0
    (discharged) and 1 (fully charged). Returns invalid if this information is not
    available. |

    | `camera` : `Camera` | Gets the primary camera |

    | `current location` : `Location` | Gets the current phone location. The phone
    optimizes the accuracy for power, performance, and other cost considerations.
    |

    | `current location accurate` : `Location` | Gets the current phone location with
    the most accuracy. This includes using services that might charge money, or consuming
    higher levels of battery power or connection bandwidth. |

    | `front camera` : `Camera` | Gets the front facing camera |

    | `has gyroscope` : `Boolean` | Indicates if the gyroscope is available on the
    device |

    | `heading` : `Number` | Gets the compass heading, in degrees, measured clockwise
    from the Earth’s geographic north. |

    | `is device stable` : `Boolean` | Indicates whether the device is ''stable''
    (no movement for about 0.5 seconds) |

    | `motion` : `Motion` | Gets the current phone motion that combines data from
    the accelerometer, compass and gyroscope. |

    | `orientation` : `Vector3` | Gets the current orientation in degrees if available.
    (x,y,z) is also called (pitch, roll, yaw) or (alpha, beta, gamma). |

    | `record microphone` : `Sound` | Records audio using the microphone |

    | `rotation speed` : `Vector3` | Gets the gyroscope rotational velocity around
    each axis of the device, in degrees per second. |

    | `take camera picture` : `Picture` | Takes a picture and returns it. This picture
    does not contain the gps location. |


    ## B.15 social


    Emails, sms, contacts, and calendar services.


    | `choose contact` : `Contact` | Chooses a contact from the contact list |

    | `choose email` : `Link` | Chooses an email from the contact list |

    | `create contact(nickname : String)` : `Contact` | Creates a new contact |

    | `create message(message : String)` : `Message` | Creates a message to share
    |

    | `create place(name : String, location : Location)` : `Place` | Creates a place
    |

    | `link email(email address : String)` : `Link` | Creates a link from an email
    |

    | `link phone number(phone number : String)` : `Link` | Creates a link from a
    phone number |

    | `save contact(contact : Contact)` | Saves a new contact |

    | `save email(email address : String)` | Allows the user to save the email address
    (email) |

    | `search(network : String, terms : String)` : `Message Collection` | Searches
    for recent messages in a social network (twitter, facebook) |

    | `search appointments(start : DateTime, end : DateTime)` : `Appointment Collection`
    | Searches for appointments in a given time range |

    | `search contacts(prefix : String)` : `Contact Collection` | Searches for contacts
    by name. |

    | `search places nearby(network : String, terms : String, location : Location,
    distance : Number)` : `Place Collection` | Searches for places nearby. The distance
    is in meters. |

    | `send email(to : String, subject : String, body : String)` | Opens the mail
    client |

    | `send sms(to : String, body : String)` | Opens the short message client (to,
    body) |


    ## B.16 tags


    2D barcodes, QR codes and NFC tags.


    | `send nfc(value : String, type : String)` | Sends a url or text using NFC |

    | `tag text(text : String, size : Number, bw : Boolean)` : `Picture` | Generates
    a 2D barcode pointing to the text using Microsoft Tag. text must be less than
    1000 character long and size must be between 0.75 and 5 inches. |

    | `tag url(url : String, size : Number, bw : Boolean)` : `Picture` | Generates
    a 2D barcode pointing to the url using Microsoft Tag. url must be less than 1000
    character long and size must be between 0.75 and 5 inches |


    ## B.17 tile


    Windows 8 and Windows phones have tiles displayed on the start screen which initiate
    an application program when tapped. A tile may be associated with a TouchDevelop
    script through use of this service. Note: this resource replaces the `Tile` datatype
    which is no longer supported.


    | `pin default` | prompt the user whether a tile should be pinned to the start
    screen |

    | `set default counter( n : Number )` | Set a counter (a number) which is displayed
    on the tile; only values in the range 1 to 99 are displayed; other values are
    hidden |

    | `set default text( title: String, text : String)` | Displays a short title and
    a longer piece of text on the tile |


    ## B.18 time


    Time and date operations.


    | `create(year : Number, month : Number, day : Number, hour : Number, minute :
    Number, second : Number)` : `DateTime` | Creates a new date instance |

    | `fail if not(condition : Boolean)` | Aborts the execution if the condition is
    false. |

    | `log(message : String)` | Appends this message to the debug log. Does nothing
    when the script is published. |

    | `now` : `DateTime` | Gets the current time |

    | `sleep(seconds : Number)` | Waits for a specified amount of seconds |

    | `stop` | Stops the execution and stays on the wall. |

    | `today` : `DateTime` | Gets today''s date without time |

    | `tomorrow` : `DateTime` | Gets tomorrow''s date without time |'
