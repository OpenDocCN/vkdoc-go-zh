  trans: '

    # 加速度、力与弹跳


    在没有重力、弹簧和摩擦的情况下，精灵会以恒定速度在面板上持续移动，直到撞上某种障碍物。然而，在存在这些效应的情况下，精灵的速度会发生变化。


    弹簧使用面板的`create spring`方法创建。这部分内容已介绍过。由弹簧力在精灵上产生的加速度与精灵的质量成反比。


    表 9-7


    `Sprite`数据类型的方法：位置/速度


    | 面板方法 | 描述 |

    | --- | --- |

    | `angle : Number` | 获取精灵的角度（单位：度） |

    | `angular speed : Number` | 获取角速度（单位：度/秒） |

    | `move(deltax : Number, deltay : Number) : Nothing` | 在 x、y 维度上按`deltax`和`deltay`调整精灵的位置
    |

    | `move towards(other : Sprite, fraction : Number) : Nothing` | 将当前精灵向另一个精灵移动指定比例的距离
    |

    | `set angle(angle: Number) : Nothing` | 设置精灵的角度（单位：度） |

    | `set angular speed(speed : Number) : Nothing` | 设置角速度（单位：度/秒） |

    | `set pos(x : Number, y : Number) : Nothing` | 将精灵的位置设置为新的 x 和 y 坐标 |

    | `set speed(vx : Number, vy : Number) : Nothing` | 设置精灵的速度 x 和 y 分量，`vx`和`vy`的单位为像素/秒
    |

    | `set speed x(vx : Number) : Nothing` | 仅设置速度的 x 分量，单位为像素/秒 |

    | `set speed y(vy : Number) : Nothing` | 仅设置速度的 y 分量，单位为像素/秒 |

    | `set x(x : Number) : Nothing` | 设置精灵的 x 坐标 |

    | `set y(y : Number) : Nothing` | 设置精灵的 y 坐标 |

    | `speed towards(other : Sprite, magnitude : Number) : Nothing` | 设置当前精灵移向另一个精灵的速度；速度单位为像素/秒
    |

    | `speed x : Number` | 获取精灵速度的 x 分量，单位为像素/秒 |

    | `speed y : Number` | 获取精灵速度的 y 分量，单位为像素/秒 |

    | `x : Number` | 获取位置的 x 坐标 |

    | `y : Number` | 获取位置的 y 坐标 |


    精灵越重，弹簧发挥全部效果所需的时间就越长。每个精灵都有一个默认质量，即精灵宽度和高度的乘积。然而，可以通过精灵的`set mass`方法覆盖该默认值。质量不能为零或负数。


    可以为面板指定一个重力，该重力会作用于每个精灵（不包括任何锚点精灵）。力的大小与精灵的质量成正比。然而，力对精灵速度的影响与质量成反比，因此重力产生的加速度与精灵的质量无关。


    另一种用于减慢移动精灵速度的力是摩擦力。可以使用面板的`set friction`方法为面板指定一个摩擦力值，该值将成为面板上所有精灵的默认摩擦力值。不过，也可以使用`Sprite`实例的`set
    friction`方法为单个精灵设置摩擦力。


    上述所有力共同作用，产生作用于精灵的净力，并驱动精灵运动。如果这些组合力未能产生预期效果，还可以进行一项调整。这项调整通过`set acceleration`方法实现，本章下一小节将对此进行介绍。


    当精灵撞到障碍物时，它会以新的速度向新方向反弹。新速度的大小由精灵与障碍物的弹性系数乘积决定。如果两者的弹性系数均为 1，则为完美弹跳，不损失能量，精灵速度也不会降低。如果乘积为
    0，则精灵会停止并粘在障碍物上。


    当前游戏面板的实现并未检测精灵之间的碰撞。这需要大量的计算开销，尤其是在精灵数量较多的情况下。一个精灵会直接穿过另一个精灵而毫无阻挡。


    表 9-8 列出了用于访问精灵的摩擦力、质量和弹性设置的方法。

    '
- fmt: "### 9.3.1 Managing sprites\n\nImplementing a game will usually require some\
    \ extra programming which is not provided by the features of boards and sprites\
    \ covered so far. If for example, the game requires forces of a different nature\
    \ than those provided by springs and gravity, or if collisions between sprites\
    \ need to be handled, then the additional `Sprite` methods listed in Table 9-9\
    \ should be useful.\n\n**Table 9-9**  \nMethods of `Sprite` datatype: additional\
    \ features\n\n| Sprite Method | Description |\n| --- | --- |\n| `acceleration\
    \ x : Number` | Get the x component of the sprite’s current acceleration in pixels/sec²\
    \ |\n| `acceleration y : Number` | Get the y component of the sprite’s current\
    \ acceleration in pixels/sec² |\n| `delete : Nothing` | Delete the sprite |\n\
    | `equals(other : Sprite) : Boolean` | Returns `true` if this sprite is the same\
    \ sprite as the other one |\n| `location : Location` | Gets the sprite’s geo location\
    \ (as assigned by the `set location` method) |\n| `overlap with(sprites : Sprite\
    \ Set) : Sprite Set` | Returns the subset of sprites which overlap with this sprite\
    \ |\n| `overlaps with(other : Sprite) : Boolean` | Returns `true` if the two sprites\
    \ overlap |\n| `set acceleration(vx : Number, vy : Number) : Nothing` | Set the\
    \ sprite’s acceleration in pixels/sec² |\n| `set acceleration x(vx : Number) :\
    \ Nothing` | Set the x component of the sprite’s acceleration in pixels/sec² |\n\
    | `set acceleration y(vy : Number) : Nothing` | Set the x component of the sprite’s\
    \ acceleration in pixels/sec² |\n| `set location(location : Location) : Nothing`\
    \ | Sets the sprite’s geo location |\n\n**Table 9-8**  \nMethods of `Sprite` datatype:\
    \ mass, friction, elasticity\n\n| Board Method | Description |\n| --- | --- |\n\
    | `elasticity : Number` | Get the sprite’s elasticity as a fraction of speed preservation\
    \ per bounce (0 to 1) |\n| `friction : Number` | Get the sprite’s friction measured\
    \ as a fraction of speed loss (0 to 1) |\n| `mass : Number` | Get the sprite’s\
    \ mass |\n| `set elasticity(elasticity : Number) : Nothing` | Set the sprite’s\
    \ elasticity as a fraction of speed preservation per bounce (0 to 1) |\n| `set\
    \ friction(friction : Number) : Nothing` | Set the sprite’s friction measured\
    \ as a fraction of speed loss (0 to 1) |\n| `set mass(mass : Number) : Nothing`\
    \ | Set the sprite’s mass (a value greater than zero) |\n\nFor collision detection,\
    \ the `overlap with` and `overlaps with` methods should help. Provided that the\
    \ sprites are not moving so fast or the sprites are not so small that one sprite\
    \ completely passes through another sprite during one time step, the colliding\
    \ sprites will overlap when drawn on the board. The two methods allow the collision\
    \ to be detected, and then the directions of motion of the two sprites can be\
    \ overridden to simulate the two sprites bouncing off each other.\n\nIf, for example,\
    \ the sprites represent planets revolving around a star, a spring force between\
    \ a planet and the star is a long way from being a proper implementation of gravitational\
    \ attraction. In this situation, a good approach would be to avoid using springs\
    \ altogether and to calculate the force induced on a planet by gravitational attraction.\
    \ Combining that force with the planet’s current velocity and its mass allows\
    \ the acceleration induced by gravitational attraction to be calculated. And that\
    \ acceleration can be explicitly given to the planet by the `set acceleration`\
    \ method. When an acceleration is specified, the effect of the acceleration is\
    \ in addition to any accelerations induced by springs and gravity. The acceleration\
    \ value remains in effect until changed by a new call to `set acceleration`.\n\
    \nAnother possibility is that a sprite needs to be destroyed and removed from\
    \ the board. In this case, the `delete` method should be invoked. The sprite instance\
    \ is automatically removed from the board and from all sprite collections. Any\
    \ references to the instance become invalid.\n\n## 9.4 The `Sprite Collection`\
    \ datatype\n\nWhen writing simple games with multiple objects of the same kind\
    \ (e.g., multiple shots, missiles, etc.), it quickly becomes necessary to group\
    \ related sprites into collections. The `Board` datatype provides the method `board`\
    \ → `create sprite set` which creates a new empty collection of sprites.\n\n`Sprite\
    \ Set` provides most of the methods common to the mutable collection types. These\
    \ are the methods `add`, `add many`, `at`, `count`, `is invalid`, and `post to\
    \ wall`. They were covered in Chapter 2. However, there is a major difference.\
    \ All the other collection types are lists of values. It implies that the same\
    \ value can appear in the list several times. A `Sprite Set` is, in contrast,\
    \ an ordered set. A value can appear at most once in the set. The elements of\
    \ the set are ordered by their index positions.\n\nIn addition to the standard\
    \ methods listed above, the `Sprite Set` datatype has the special methods listed\
    \ in Table 9-10. Note that the `add` method appears in the table even though it\
    \ is a standard method for mutable collections. This is because the `Sprite Set`\
    \ version of the `add` method is slightly different. It only adds an element if\
    \ it would be a new element, and it returns a `Boolean` result to indicate whether\
    \ an element was actually added.\n\n**Table 9-10**  \nAdditional or modified `Sprite\
    \ Set` methods\n\n| Sprite Method | Description |\n| --- | --- |\n| `add(sprite\
    \ : Sprite) : Boolean` | Adds `sprite` to set if not already present; the result\
    \ is `true` if it was not present already. |\n| `add from(old set : Sprite Set,\
    \ sprite : Sprite) : Boolean` | Adds the `sprite` to the new set and removes it\
    \ from the old set; the result is `true` if the sprite was in the old set. |\n\
    | `contains(sprite : Sprite) : Boolean` | Returns `true` if the sprite is in the\
    \ set |\n| `index of(sprite : Sprite) : Number` | Returns the index of the sprite\
    \ in the set; the result is `-1` if not in the set |\n| `remove first : Sprite`\
    \ | Removes the sprite which was added to the set before all the others |\n\n\
    ## 9.5 Touching and board events\n\nThe board has six specific kinds of events\
    \ which are covered in the subsections below. All but one of these events are\
    \ triggered when the user touches the screen and taps, swipes or drags a finger\
    \ across the board.\n\n### 9.5.1 Board touching actions\n\nIn addition to events,\
    \ the `Board` datatype provides five methods which provide information about how\
    \ the screen has been touched. These methods are listed in Table 9-11. However,\
    \ the tap, swipe and drag events explained later in this section are easier to\
    \ program and their use is recommended.\n\n**Table 9-11**  \nTouch methods of\
    \ the `Board` datatype\n\n| Sprite Method | Description |\n| --- | --- |\n| `touch\
    \ current : Vector3` | Returns the coordinates of the current touch point on the\
    \ board; the z component is 0. |\n| `touch end : Vector3` | Returns the coordinates\
    \ of the last touch point on the board; the z component is 0 |\n| `touch start\
    \ : Vector3` | Returns the coordinates of the latest start point for a touch gesture\
    \ on the board; the z component is 0 |\n| `touch velocity : Vector3` | Returns\
    \ the final swiping velocity after a touch has gesture; the z component is 0 |\n\
    | `touched : Boolean` | Returns `true` if the board has been touched |\n\n###\
    \ 9.5.2 `gameloop` event\n\nThe `gameloop` event contains code that needs to be\
    \ run regularly and frequently. The event is triggered about every 50ms. It is\
    \ a natural location to contain collision detection code, or to monitor the passage\
    \ of time.\n\nThe `gameloop` event code should be efficient. If it takes too long\
    \ to execute, the display may stutter and collisions may go undetected."
  raw: '### 9.3.1 Managing sprites


    Implementing a game will usually require some extra programming which is not provided
    by the features of boards and sprites covered so far. If for example, the game
    requires forces of a different nature than those provided by springs and gravity,
    or if collisions between sprites need to be handled, then the additional Sprite
    methods listed in Table [9-9](#text00009.html#Tab9) should be useful.


    Table 9-9


