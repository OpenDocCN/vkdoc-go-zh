  trans: '

    ### 10.4.2 编码限制


    页面的初始化部分不能在页面上绘制任何元素。它可以声明并使用局部变量，但这些变量无法在页面的显示部分内访问（它们属于超出作用域范围）。通常，初始化部分用于初始化显示部分所需的全局变量。


    页面的显示部分可以使用但不能赋值给全局变量。（即使变更处理程序定义在显示部分内，它们也不被视为显示部分的一部分。）显示部分可以正常使用局部变量，并可以使用循环、if
    语句等常规控制结构。其主要用途是在当前页面上渲染图形元素。


    附加到当前页面上的方框的变更处理程序可以使用并赋值给全局变量。它们可以使用但不能赋值给显示部分中的局部变量（前提是这些局部变量可见）。常规作用域规则在此适用。它们不能在屏幕上绘制任何元素，也不能设置当前方框的任何属性。


    当控制权从变更处理程序返回、或当另一个页面退出后当前页面再次成为活动页面、或当某个全局变量或记录被更改时，页面显示部分中的所有语句都会重新执行，整个页面也会被重新绘制。相比之下，初始化部分的代码仅在创建页面的新实例并将其推入页面堆栈时执行一次。


    标识符 `box` 指代当前方框，可以在任何存在活动当前方框的上下文中使用。如果在某个动作内部引用了 `box`，则根据控制权到达该动作的方式，可能存在也可能不存在当前方框。如果不存在当前方框，则会引发运行时错误。当控制权位于页面的显示部分内、或位于从页面调用的某个动作内、或位于附加到方框的变更处理程序内时，始终存在当前方框。当页面的初始化部分正在执行时，则不存在当前方框。


    即使存在当前方框，其访问权限也可能仅限于只读（例如获取 `box` → `pixels per em` 的当前值）。只有在页面的显示部分内或从显示部分调用的动作内，才允许调用设置当前方框属性的方法。


    ## 10.5 用户界面的实时编辑


    在脚本执行过程中，页面很容易调试和修改。脚本开发者无需每次做小改动时都停止脚本并从开头重新启动。当脚本在浏览器中运行时，浏览器窗口右上角会显示一个暂停按钮。暂停按钮如图
    10-7 所示。


    ![A978-1-4302-6137-7_10_Fig7_HTML.jpg](img/Image00056.jpg)


    图 10-7


    用户界面编辑图标


    点击该按钮会在当前屏幕上显示的每个方框周围绘制一条非常细的蓝线，同时暂停按钮会被替换为恢复按钮，如图 10-7 所示。


    此时脚本不再运行。点击由细蓝线构成的某个矩形内部，该矩形会附加一个更粗的红色虚线矩形，并会在屏幕上显示一个标有“编辑”的按钮。编辑按钮如图 10-7 所示。这条红色虚线矩形表示已选中的方框。双击则会改为选中外层包裹的方框。当方框结构嵌套足够深时，三击等操作也类似。


    点击编辑按钮会调用脚本编辑器，并精确定位到所选方框对应的代码上。在足够宽的显示屏幕上，浏览器窗口会被分割，左侧显示当前页面，右侧显示所选方框的代码。（如果页面视图占用了太多屏幕空间，可以点击其左上角的关闭按钮将其移除。）


    现在可以编辑脚本代码。改动可以很小，也可以很大。对于整个脚本中的哪些代码可以更改，没有任何限制。当修改完成并需要查看是否达到预期效果时，应先关闭当前页面的视图（如果尚未关闭），然后点击屏幕左侧的恢复按钮。


    恢复脚本执行会导致当前页面的显示部分被重新执行，页面会被重新绘制，以反映对代码所做的任何更改。可以按需多次重复执行“运行-暂停-编辑-恢复”这一循环，直到用户界面达到完美状态。


    需要注意的是，如果对代码进行了重大更改，例如更改了脚本中其他地方调用的动作，那么可能需要从头重新启动脚本才能看到其完整效果。'
- fmt: '# API Support for Boxes and Pages


    The `box` identifier names a service which has the `Box` datatype. There is only
    one instance of this type, it is a singleton.


    The boxed and page constructs in TouchDevelop are recent additions to the scripting
    language and are still being developed. Table [10-1](#text00010.html#Tab1), Table
    [10-2](#text00010.html#Tab2) and Table [10-3](#text00010.html#Tab3) list the methods
    provided for the `box` service at the time of writing. However additional methods
    may be provided and/or some of the current methods may be modified to work differently.
    The most reliable and up-to-date source of information about these constructs
    is the TouchDevelop website.


    ## Table 10-3: Layout Methods of `box` Service


    | Method | Description |

    | --- | --- |

    | `use horizontal layout` | Arranges boxes and other items from left to right
    horizontally |

    | `use vertical layout` | Arranges boxes and other items from top to bottom vertically
    |

    | `use overlay layout` | Arrange boxes and other displayed items inside this box
    as layers drawn on top of each other |

    | `set horizontal align(s: String)` | `s` is one of "left" "right" "center" and
    "justify" to indicate how text and other items in the box are arranged |

    | `set vertical align(s: String)` | `s` is one of "top" "bottom" "center" and
    "baseline" (for text) to indicate how text and other items in the box are arranged
    vertically |


    ## Table 10-2: Text Handling Methods of `box` Service


    | Method | Description |

    | --- | --- |

    | `set font size(n : Number)` | Sets the font size for text displayed in the box;
    `1.0` is the current default size. |

    | `set text wrapping(wrap: Boolean, min: Number)` | Specifies whether long text
    lines should be broken, and what length is too short to be split |

    | `set horizontal align(s: String)` | Specifies how to format text in the box;
    the argument is one of "left", "right", "center" or "justify" |

    | `pixels per em` | Returns the width of the letter ''m'' in pixels |

    | `edit(style: String, v: String, changehandler: Action)` | Displays text from
    the global variable `v` which can be edited. The `style` parameter is one of "textline"
    "textarea" "number" or "password". The `changehandler` is invoked each time the
    text is changed. |


    ## Table 10-1: General Methods of `box` Service


    | Method | Description |

    | --- | --- |

    | `set background(c : Color)` | Sets the background color |

    | `set foreground(c : Color)` | Sets the color of items drawn in the box |

    | `set height(h : Number)` | Sets an exact height for the box |

    | `set height range(min : Number, max : Number)` | Sets a range of heights for
    the box |

    | `set width(w : Number)` | Sets an exact width for the box |

    | `set width range(min : Number, max : Number)` | Sets a range of widths for the
    box |

    | `set border(c : Color, w : Number)` | Sets the color and width of a line drawn
    around the edge of the box |

    | `set horizontal stretch(f: Number)` | Controls how box width is computed: `f
    = 0.0` means shrink to fit content, `f = 1.0` means expand to fill the frame,
    `f = 0.5` means expand to 50% of frame''s width. |

    | `set padding(t: Number, r: Number, b: Number, l: Number)` | Specify how much
    space to leave around the box: `t`, `r`, `b` and `l` determine the top, right,
    bottom and left sides respectively. |

    | `on tapped(handler: Action)` | Associates a handler action with the box, and
    is invoked when the box is tapped |


