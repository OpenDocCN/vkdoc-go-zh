    # 7. Sensors


    [7.1 The sensors](#text00007.html#Sec1) [7.2 Sensor-driven events](#text00007.html#Sec2)
    [7.3 Accelerometer](#text00007.html#Sec4) [7.4 Compass](#text00007.html#Sec7)
    [7.5 Gyroscope](#text00007.html#Sec9) [7.6 Motion](#text00007.html#Sec10) Keywords
    Magnetic Compass Magnetic North Window Phone Small High Frequency Follow Code
    Snippet


    A typical smartphone or tablet contains sensors which track the device’s location,
    movement and orientation. Scripts can use these sensors in many ways. Sensors
    can provide input for navigation aids, they can be an integral part of a game,
    and they can provide simple input to scripts. The possibilities are endless. These
    sensors are probably absent from laptops and computers, however.


    ## 7.1 The sensors


    The full complement of sensors supported by TouchDevelop may not be available
    on your device. The possible sensors are as follows.


    *   GPS (Global Positioning System), which obtains the phone’s current location
    on the map.

    *   Accelerometer , which measures gravitational and acceleration forces experienced
    by the phone.

    *   Compass , which returns the direction of magnetic north.

    *   Gyroscope , which measures the phone’s orientation in 3D space.


    A script’s access to the sensors is provided by calls to a variety of API methods
    and by events associated with the gyroscope and accelerometer. The API methods
    are listed in Table [7-1](#text00007.html#Tab1) ; the events are listed in Table
    [7-2](#text00007.html#Tab2) .


    Table 7-1


    Sensing methods of the senses service


    | Accelerometer Methods | Description |

    | --- | --- |

    | `senses` → `acceleration quick : Vector3` | Returns an acceleration averaged
    over a short time interval |

    | `senses` → `acceleration smooth : Vector3` | Returns an acceleration averaged
    over a moderate time interval |

    | `senses` → `acceleration stable : Vector3` | Returns an acceleration averaged
    over a time interval of about 0.5 seconds |

    | `senses` → `is device stable : Boolean` | Returns true if the phone has not
    moved for about 0.5 seconds |

    | Compass Methods | Description |

    | `senses` → `heading : Number` | Returns the angle in degrees of magnetic north
    compared to the direction that the phone is facing |

    | Gyroscope Methods | Description |

    | `senses` → `has gyroscope : Boolean` | Returns true if the phone has a gyroscope
    |

    | `senses` → `orientation : Vector3` | Obtains the current orientation in degrees
    with respect to the X, Y, Z axes, if available. |

    | `senses` → `rotation speed : Vector3` | Returns the rotational speed in degrees
    per second about each of the X, Y, Z axes |

    | Motion Methods | Description |

    | `senses` → `motion : Boolean` | Returns the phone’s current motion, combining
    readings from accelerometer, compass and gyroscope |


    ## 7.2 Sensor-driven events


    If the device is shaken, the accelerometer records some rapidly changing readings.
    If the amplitude of the shaking exceeds a certain threshold, a shake event is
    triggered. A script can use the event to effect an action, such as pausing the
    playback of an audio recording.


    The device’s software may be using the gyroscope to determine the screen’s orientation,
    and so to choose between portrait mode or landscape mode for presentation of information.
    Several possibilities for the orientation can be transmitted to a TouchDevelop
    script via the event mechanism.


    The shake event and the phone orientation events are listed in Table [7-2](#text00007.html#Tab2)
    .


    Table 7-2


    Sensor events


    | Event | Description |

    | --- | --- |

    | `shake` | Triggered when the phone is shaken |

    | `phone face up` | Triggered when the device is turned so that it is face up
    |

    | `phone face down` | Triggered when the device is turned so that it is face down
    |

    | `phone portrait` | Triggered when the device is turned so the screen in portrait
    mode (such as when the device is vertical) |

    | `phone landscape left` | Triggered when the device is turned so that its left
    side is facing down |

    | `phone landscape right` | Triggered when the device is turned so that its right
    side is facing down |


    ### 7.2.1 Example script: A pedometer (/jbpv)


    If you carry your smartphone with you when jogging or walking briskly, the phone’s
    sensors should trigger a `shake` event for each step taken. A simple script can
    record how many steps are taken, from which the number of steps per minute can
    be computed. By accessing the GPS location, the average speed can be determined
    too. However the script cannot simply use the starting location and ending location
    to determine the distance traveled, because that would give only the straight
    line distance between the two points. Determining the actual distance traveled
    requires checking the GPS location more frequently and summing lots of little
    distances.


    The code for a simple Pedometer program is shown in Figure [7-1](#text00007.html#Fig1)
    . Note that you will need to enable Location Services in TouchDevelop’s settings
    for the script to work.'
  trans: "\n# 6.4 播放网络视频\n\n视频文件通常非常大。在将视频存储到内存有限的设备（如手机）上之前，你应该三思。手机上的视频可以通过手机摄像头拍摄，也可以在手机同步时从电脑复制而来。\n\
    \n`TouchDevelop` 不提供对存储在智能手机上的视频文件的访问权限。脚本也无法将视频文件下载到手机上。不过，脚本可以访问并播放来自互联网的视频流。\n\
    \n只要提供一个设备能够播放格式的视频文件 URL，`TouchDevelop` 脚本就可以打开并播放该文件。支持的视频格式取决于所使用的具体设备型号。但大多数文件名后缀为\
    \ `'.mp4'` 的视频文件应该都能播放。（例如，H.264 编码的 MP4 文件是在所有 Windows 手机上都能播放的格式。）\n\n给定 URL\
    \ 后，一种直接播放视频的方法如下所示。\n\n```\n// url 是存储文件 URL 的字符串变量\nweb → play media( url )\n\
    ```\n\n该操作会使用整个窗口来显示视频。可以使用返回按钮来停止视频。\n\n另一种播放视频的方法是创建一个 `Link` 值。示例代码如下所示。\n\n\
    ```\n// url 是存储文件 URL 的字符串变量\nvar lnk := web → link media( url )\n…\nif not lnk\
    \ → is invalid then\n    lnk → post to wall\n    “点击视频链接进行播放” → post to wall\n\
    else\n    (“无法访问 url “ || url) → post to wall\n```\n\n上面显示的第二种方法允许脚本在屏幕上显示一个链接列表，让用户选择要播放哪一个。\n\
    \n![知识共享许可协议](https://creativecommons.org/licenses/by-nc-nd/4.0) 开放获取 本章采用知识共享署名-非商业性使用-禁止演绎\
    \ 4.0 国际许可协议 ([`​creativecommons.​org/​licenses/​by-nc-nd/​4.​0/​`](http://creativecommons.org/licenses/by-nc-nd/4.0/))\
    \ 进行许可。只要您给予原作者和来源适当的署名，提供指向知识共享许可协议的链接，并指明您是否修改了许可材料，该协议就允许您以任何媒介或格式进行任何非商业性的使用、分享、分发和复制。根据本许可协议，您无权分享从本章或其部分内容改编的材料。除非在材料的署名行中另有说明，本章中的图片或其他第三方材料均包含在本章的知识共享许可协议中。如果材料未包含在本章的知识共享许可协议中，并且您的预期使用行为不被法定法规允许或超出允许的使用范围，您将需要直接获得版权所有者的许可。\n\
    \n# 7. 传感器\n\n7.1 传感器 7.2 传感器驱动的事件 7.3 加速度计 7.4 指南针 7.5 陀螺仪 7.6 运动 关键词 磁罗盘 磁北\
    \ 窗口手机 小 高频率 跟随 代码片段\n\n典型的智能手机或平板电脑包含跟踪设备位置、运动和方向的传感器。脚本可以以多种方式使用这些传感器。传感器可以为导航辅助提供输入，可以作为游戏的一个组成部分，也可以为脚本提供简单的输入。可能性是无限的。然而，笔记本电脑和台式电脑很可能没有这些传感器。\n\
    \n## 7.1 传感器\n\n您的设备上可能不具备 `TouchDevelop` 所支持的全部传感器。可能的传感器如下所示。\n\n*   **GPS（全球定位系统）**，用于获取手机在地图上的当前位置。\n\
    *   **加速度计**，用于测量手机所受的重力和加速度力。\n*   **指南针**，用于返回磁北方向。\n*   **陀螺仪**，用于测量手机在 3D\
    \ 空间中的方向。\n\n脚本对传感器的访问是通过调用各种 API 方法以及与陀螺仪和加速度计相关的事件来提供的。API 方法列于表 7-1 中；事件列于表\
    \ 7-2 中。\n\n**表 7-1** 感官服务的传感方法\n\n| 加速度计方法 | 描述 |\n| --- | --- |\n| `senses →\
    \ acceleration quick : Vector3` | 返回短时间间隔内平均的加速度 |\n| `senses → acceleration smooth\
    \ : Vector3` | 返回中等时间间隔内平均的加速度 |\n| `senses → acceleration stable : Vector3` |\
    \ 返回约 0.5 秒时间间隔内平均的加速度 |\n| `senses → is device stable : Boolean` | 如果手机在大约 0.5\
    \ 秒内未移动，则返回 true |\n| 指南针方法 | 描述 |\n| `senses → heading : Number` | 返回磁北方向与手机朝向之间的角度（以度为单位）\
    \ |\n| 陀螺仪方法 | 描述 |\n| `senses → has gyroscope : Boolean` | 如果手机有陀螺仪，则返回 true\
    \ |\n| `senses → orientation : Vector3` | 获取当前相对于 X、Y、Z 轴的方向（以度为单位，如果可用）。 |\n\
    | `senses → rotation speed : Vector3` | 返回绕 X、Y、Z 轴旋转的速度（度/秒） |\n| 运动方法 | 描述 |\n\
    | `senses → motion : Boolean` | 结合加速度计、指南针和陀螺仪的读数，返回手机的当前运动状态 |\n\n## 7.2 传感器驱动的事件\n\
    \n如果设备被摇晃，加速度计会记录一些快速变化的读数。如果摇晃的幅度超过某个阈值，则会触发一个摇晃事件。脚本可以使用该事件来执行一个动作，例如暂停音频播放。\n\
    \n设备的软件可能正在使用陀螺仪来确定屏幕的方向，从而在呈现信息时选择竖屏模式或横屏模式。多种可能的方向可以通过事件机制传递给 `TouchDevelop`\
    \ 脚本。\n\n摇晃事件和手机方向事件列于表 7-2 中。\n\n**表 7-2** 传感器事件\n\n| 事件 | 描述 |\n| --- | ---\
    \ |\n| `shake` | 当手机被摇晃时触发 |\n| `phone face up` | 当设备被翻转至屏幕朝上时触发 |\n| `phone face\
    \ down` | 当设备被翻转至屏幕朝下时触发 |\n| `phone portrait` | 当设备被翻转至屏幕处于竖屏模式（例如设备竖直放置）时触发\
    \ |\n| `phone landscape left` | 当设备被翻转至其左侧朝下时触发 |\n| `phone landscape right` |\
    \ 当设备被翻转至其右侧朝下时触发 |\n\n### 7.2.1 示例脚本：计步器 (/jbpv)\n\n如果你在慢跑或快走时随身携带智能手机，手机的传感器应该在每走一步时触发一个\
    \ `shake` 事件。一个简单的脚本可以记录走了多少步，并据此计算每分钟的步数。通过访问 GPS 位置，也可以确定平均速度。然而，脚本不能简单地使用起始位置和结束位置来确定行进距离，因为那样只能给出两点之间的直线距离。确定实际行进距离需要更频繁地检查\
    \ GPS 位置，并对许多小段距离求和。\n\n一个简单计步器程序的代码如图 7-1 所示。请注意，你需要先在 `TouchDevelop` 的设置中启用位置服务，脚本才能正常工作。\n"
- fmt: "# 7.3 Accelerometer\n\nMost Windows phones possess a device which measures\
    \ the forces on a small mass. When the phone is held perfectly still, the only\
    \ force will be gravity. If the phone is shaken or moved, the forces which are\
    \ measured will combine acceleration with gravity. The measuring device is therefore\
    \ known as an accelerometer.\n\nGravitational force is always down, towards the\
    \ ground. However, acceleration can be in any direction in three dimensional space.\
    \ The accelerometer therefore returns a vector to show the current force in each\
    \ of the three dimensions. In the TouchDevelop API, that vector is provided as\
    \ a value with the `Vector3` datatype.\n\n![A978-1-4302-6137-7_7_Fig1_HTML.jpg](Image00041.jpg)\n\
    \nFigure 7-1\n\nA simple pedometer program (`/jbpv`)\n\nThe senses methods which\
    \ access the accelerometer are listed in Table [7-1](#text00007.html#Tab1). Three\
    \ methods are provided for finding the phone's acceleration. They are necessary\
    \ because nothing in real life is perfectly motionless. Any sound or vibration\
    \ induces small high frequency accelerations in an object. Obtaining steady repeatable\
    \ readings requires averaging out the measurements over a period of time. Longer\
    \ periods of time will yield very consistent measurements, but the script has\
    \ to wait until that period has elapsed before a reading is available.\n\nLong\
    \ waits would be inappropriate for a game where the player is controlling the\
    \ actions by moving the phone. Note that the accelerations measured by these three\
    \ methods include gravitational force. A value of `(0.0, 0.0, 0.0)` for the acceleration\
    \ vector could only mean that the phone is in free fall.\n\n## 7.3.1 Direction\
    \ of acceleration forces\n\nThe three components of a `Vector3` value are accessed\
    \ via the three methods `x`, `y` and `z`. They correspond to the X, Y and Z dimensions,\
    \ as in Figure [7-2](#text00007.html#Fig2).\n\nAs can be seen in the figure, when\
    \ the phone is lying flat on the table, the vector has a value of the form `(0.0,\
    \ 0.0, k)` where `k` is some negative number. The value of `k` depends on what\
    \ units are used for measuring a force. The TouchDevelop API reports the force\
    \ in g (gravitational) units. Any object which is perfectly stationary is subjected\
    \ to a force of 1g in the downwards direction. In other words, the `Vector3` value\
    \ returned by the accelerometer should be exactly `(0.0, 0.0, -1.0)` when the\
    \ phone is kept still and lying flat on a table with the screen facing up.\n\n\
    When the phone is held vertically with its bottom edge on the table, the `Vector3`\
    \ value should be `(0.0, -1.0, 0.0)`. If we turn the phone upside-down so that\
    \ the top edge is on the table, the value should be `(0.0, 1.0, 0.0)`.\n\nA short\
    \ script to show the values of these components is the following.\n\n```\naction\
    \ main( )\n    var acc := senses → acceleration quick\n    (\"Z component = \"\
    \ || acc → z) → post to wall\n    (\"Y component = \" || acc → y) → post to wall\n\
    \    (\"X component = \" || acc → x) → post to wall\n```\n\n![A978-1-4302-6137-7_7_Fig2_HTML.jpg](Image00042.jpg)\n\
    \nFigure 7-2\n\nAccelerometer orientation\n\nTypical output from the script looks\
    \ similar to the following:\n\n```\nX component = 0.0092241987586021423\nY component\
    \ = -0.03411596268415451\nZ component = -0.99446910619735718\n```\n\nThe values\
    \ are close to `0.0`, `0.0` and `-1.0`. The discrepancies show that the accelerometer\
    \ may have some measuring error and that the phone is probably not located on\
    \ a perfectly horizontal surface.\n\n## 7.3.2 Example script: a light show (`/tbcb`)\n\
    \nThis script simply converts movements of the phone into colors, and these colors\
    \ are applied to the entire screen. The script is shown in Figure [7-3](#text00007.html#Fig3).\n\
    \nThe script maps the X, Y and Z components of an acceleration reading to three\
    \ color components. However it is not a simple mapping. The script needs to ensure\
    \ that the three color components are kept within the `0.0` to `1.0` range. Secondly,\
    \ the RGB components of a color do not have equal importance to the human eye.\
    \ A normal eye is much less responsive to the color blue than to red or green.\
    \ To distribute the perceived colors out a bit more evenly among the possibilities,\
    \ an alternative color representation known as HSB (short for hue, saturation\
    \ and brightness) is used.\n\nThe script takes a reading from the accelerometer\
    \ every `0.1` seconds and uses it to set the screen's color.\n\nAn equivalent\
    \ version of this script is published on the TouchDevelop website as `/wnny`.\
    \ The `/wnny` script uses the `gameloop` event to trigger a reading of the accelerometer\
    \ every `50` milliseconds, and it calls an action in a library script to convert\
    \ a `Vector3` value into a `Color` value.\n\nAnother sample script which uses\
    \ the accelerometer is the simplified airplane attitude indicator, published as\
    \ `/akgk`. The current orientation of the phone with respect to gravity is determined\
    \ by checking the result from the accelerometer. That is used to display an artificial\
    \ horizon on the screen, simulating what a pilot would see with an attitude indicator\
    \ in an airplane.\n\n![A978-1-4302-6137-7_7_Fig3_HTML.jpg](Image00043.jpg)\n\n\
    Figure 7-3\n\nAccelerometer colors simplified (script `/tbcb`)\n\n# 7.4 Compass\n\
    \nMost smartphones contain a built-in compass which reports the phone's orientation\
    \ with respect to magnetic north. The methods of the senses resource which directly\
    \ use the compass are listed in Table [7-1](#text00007.html#Tab1).\n\n## 7.4.1\
    \ Example script: a magnetic compass (`/drvu`)\n\nAs a demonstration of the usage\
    \ of the compass sensor, the script provided below simulates an old-fashioned\
    \ magnetic compass, where the compass's needle always points north.\n\nMost of\
    \ the script is concerned with displaying an arrow, which represents the needle,\
    \ on top of a solid circle which represents the dial. The important statement\
    \ in the script concerned with the sensor is the following.\n\n```\nvar angle\
    \ := senses → heading   // get heading in degrees\n```\n\nThe value returned by\
    \ `senses → heading` is, as the API documentation says, \"the compass heading,\
    \ in degrees, measured clockwise from the Earth's magnetic north\". A value of\
    \ `15`, say, means that the magnetic north should be 15 degrees to the left of\
    \ the direction in which the phone is currently pointing.\n\nThe script is shown\
    \ in Figure [7-4](#text00007.html#Fig4). Most of the code is concerned with drawing\
    \ a representation of a large arrow.\n\n# 7.5 Gyroscope\n\nMany Windows phones\
    \ also possess a gyroscope. This is a device which reports on whether the phone\
    \ is being rotated – rotated in absolutely any orientation. Rotation is measured\
    \ as an angular velocity, which is rotation speed in degrees per second about\
    \ an axis in three dimensional space. The API methods to access the gyroscope\
    \ are listed in Table [7-1](#text00007.html#Tab1).\n\nThe angular velocity is\
    \ reported by the TouchDevelop API as a `Vector3` value reporting rotation in\
    \ three dimensional space. A value of `(360, 0, 0)` indicates a rotational speed\
    \ of one revolution per second about the X axis in a clockwise direction, and\
    \ similarly for the Y and Z axes. Given a reading of `(a, b, c)`, the combined\
    \ rotational speed can be computed as `√(a² + b² + c²)` measured about some axis\
    \ in 3D space.\n\nThe value returned by the `rotation speed` method measures which\
    \ axis the phone is being rotated about, and how fast. For example, if the X and\
    \ Y components of the angular velocity are much smaller than the Z component,\
    \ then the phone is likely to be lying flat on a table and being spun around (because\
    \ the Z axis is perpendicular to the phone's screen).\n\n![A978-1-4302-6137-7_7_Fig4_HTML.jpg](Image00044.jpg)\n\
    \nFigure 7-4\n\nMagnetic compass script (script `/drvu`)"
  raw: '## 7.3 Accelerometer


    Most Windows phones possess a device which measures the forces on a small mass.
    When the phone is held perfectly still, the only force will be gravity. If the
    phone is shaken or moved, the forces which are measured will combine acceleration
    with gravity. The measuring device is therefore known as an accelerometer .


    Gravitational force is always down, towards the ground. However, acceleration
    can be in any direction in three dimensional space. The accelerometer therefore
    returns a vector to show the current force in each of the three dimensions. In
    the TouchDevelop API, that vector is provided as a value with the `Vector3` datatype.


    ![A978-1-4302-6137-7_7_Fig1_HTML.jpg](Image00041.jpg)


    Figure 7-1


    A simple pedometer program (/jbpv)


    The senses methods which access the accelerometer are listed in Table [7-1](#text00007.html#Tab1)
    . Three methods are provided for finding the phone’s acceleration. They are necessary
    because nothing in real life is perfectly motionless. Any sound or vibration induces
    small high frequency accelerations in an object. Obtaining steady repeatable readings
    requires averaging out the measurements over a period of time. Longer periods
    of time will yield very consistent measurements, but the script has to wait until
    that period has elapsed before a reading is available.


    Long waits would be inappropriate for a game where the player is controlling the
    actions by moving the phone. Note that the accelerations measured by these three
    methods include gravitational force. A value of (0.0, 0.0, 0.0) for the acceleration
    vector could only mean that the phone is in free fall.


    ### 7.3.1 Direction of acceleration forces


    The three components of a `Vector3` value are accessed via the three methods `x`
    , `y` and `z` . They correspond to the X, Y and Z dimensions, as in Figure [7-2](#text00007.html#Fig2)
    .


    As can be seen in the figure, when the phone is lying flat on the table, the vector
    has a value of the form (0.0, 0.0, k) where k is some negative number. The value
    of k depends on what units are used for measuring a force. The TouchDevelop API
    reports the force in g (gravitational) units. Any object which is perfectly stationary
    is subjected to a force of 1g in the downwards direction. In other words, the
    Vector3 value returned by the accelerometer should be exactly (0.0, 0.0, -1.0)
    when the phone is kept still and lying flat on a table with the screen facing
    up.


    When the phone is held vertically with its bottom edge on the table, the Vector3
    value should be (0.0, -1.0, 0.0). If we turn the phone upside-down so that the
    top edge is on the table, the value should be (0.0, 1.0, 0.0).


    A short script to show the values of these components is the following.


                   `action` `main( )`


                        `var` `acc := senses` → `acceleration quick`


                        `("Z component = " || acc` → `z)` → `post to wall`


                        `("Y component = " || acc` → `y)` → `post to wall`


                        `("X component = " || acc` → `x)` → `post to wall`


    ![A978-1-4302-6137-7_7_Fig2_HTML.jpg](Image00042.jpg)


    Figure 7-2


    Accelerometer orientation


    Typical output from the script looks similar to the following:


                   `X component = 0.0092241987586021423`


                   `Y component = -0.03411596268415451`


                   `Z component = -0.99446910619735718`


    The values are close to 0.0, 0.0 and -1.0\. The discrepancies show that the accelerometer
    may have some measuring error and that the phone is probably not located on a
    perfectly horizontal surface.


    ### 7.3.2 Example script: a light show (/tbcb)


    This script simply converts movements of the phone into colors, and these colors
    are applied to the entire screen. The script is shown in Figure [7-3](#text00007.html#Fig3)
    .


    The script maps the X, Y and Z components of an acceleration reading to three
    color components. However it is not a simple mapping. The script needs to ensure
    that the three color components are kept within the 0.0 to 1.0 range. Secondly,
    the RGB components of a color do not have equal importance to the human eye. A
    normal eye is much less responsive to the color blue than to red or green. To
    distribute the perceived colors out a bit more evenly among the possibilities,
    an alternative color representation known as HSB (short for hue , saturation and
    brightness ) is used.


    The script takes a reading from the accelerometer every 0.1 seconds and uses it
    to set the screen’s color.


    An equivalent version of this script is published on the TouchDevelop website
    as /wnny. The wnny script uses the gameloop event to trigger a reading of the
    accelerometer every 50 milliseconds, and it calls an action in a library script
    to convert a Vector3 value into a Color value.


    Another sample script which uses the accelerometer is the simplified airplane
    attitude indicator, published as /akgk. The current orientation of the phone with
    respect to gravity is determined by checking the result from the accelerometer.
    That is used to display an artificial horizon on the screen, simulating what a
    pilot would see with an attitude indicator in an airplane.


    ![A978-1-4302-6137-7_7_Fig3_HTML.jpg](Image00043.jpg)


    Figure 7-3


    Accelerometer colors simplified (script /tbcb)


    ## 7.4 Compass


    Most smartphones contain a built-in compass which reports the phone’s orientation
    with respect to magnetic north. The methods of the senses resource which directly
    use the compass are listed in Table [7-1](#text00007.html#Tab1) .


    ### 7.4.1 Example script: a magnetic compass (/drvu)


    As a demonstration of the usage of the compass sensor, the script provided below
    simulates an old-fashioned magnetic compass, where the compass’s needle always
    points north.


    Most of the script is concerned with displaying an arrow, which represents the
    needle, on top of a solid circle which represents the dial. The important statement
    in the script concerned with the sensor is the following.


              `var` `angle := senses` → `heading`   // get heading in degrees


    The value returned by `senses` →`heading` is, as the API documentation says, “the
    compass heading, in degrees, measured clockwise from the Earth’s magnetic north”.
    A value of 15, say, means that the magnetic north should be 15 degrees to the
    left of the direction in which the phone is currently pointing.


    The script is shown in Figure [7-4](#text00007.html#Fig4) . Most of the code is
    concerned with drawing a representation of a large arrow.


    ## 7.5 Gyroscope


    Many Windows phones also possess a gyroscope. This is a device which reports on
    whether the phone is being rotated – rotated in absolutely any orientation. Rotation
    is measured as an angular velocity, which is rotation speed in degrees per second
    about an axis in three dimensional space. The API methods to access the gyroscope
    are listed in Table [7-1](#text00007.html#Tab1) .


    The angular velocity is reported by the TouchDevelop API as a `Vector3` value
    reporting rotation in three dimensional space. A value of (360, 0, 0) indicates
    a rotational speed of one revolution per second about the X axis in a clockwise
    direction, and similarly for the Y and Z axes. Given a reading of (a , b , c ),
    the combined rotational speed can be computed as √(a ² + b ² + c ² ) measured
    about some axis in 3D space.


    The value returned by the `rotation speed` method measures which axis the phone
    is being rotated about, and how fast. For example, if the X and Y components of
    the angular velocity are much smaller than the Z component, then the phone is
    likely to be lying flat on a table and being spun around (because the Z axis is
    perpendicular to the phone’s screen).


    ![A978-1-4302-6137-7_7_Fig4_HTML.jpg](Image00044.jpg)


    Figure 7-4


    Magnetic compass script (script /drvu)'
  trans: "\n# 7.3 加速度计\n\n大多数 Windows 手机都配备了一个测量小质量块所受力的装置。当手机保持完全静止时，唯一的力就是重力。如果手机被摇晃或移动，所测量的力将是加速度与重力的合力。因此，这个测量装置被称为加速度计。\n\
    \n重力始终向下，朝向地面。然而，加速度可以在三维空间中的任意方向上。因此，加速度计会返回一个向量，以显示三个维度中每个维度上的当前力。在 TouchDevelop\
    \ API 中，该向量以`Vector3`数据类型提供。\n\n![A978-1-4302-6137-7_7_Fig1_HTML.jpg](img/Image00041.jpg)\n\
    \n图 7-1\n\n一个简单的计步器程序（`/jbpv`）\n\n访问加速度计的感知方法列于表 7-1 中。提供了三种方法来查找手机的加速度。之所以需要这三种方法，是因为现实生活中没有任何物体是完全静止的。任何声音或振动都会在物体中引起微小的、高频的加速度。要获得稳定且可重复的读数，需要在一段时间内对测量结果进行平均。更长的时间段将产生高度一致的测量值，但脚本必须等到该时间段过去后才能获得读数。\n\
    \n对于玩家通过移动手机来控制动作的游戏来说，长时间的等待是不合适的。请注意，这三种方法测量到的加速度包含重力。加速度向量的值为`(0.0, 0.0, 0.0)`仅表示手机处于自由落体状态。\n\
    \n## 7.3.1 加速度力的方向\n\n`Vector3`值的三个分量通过`x`、`y`和`z`这三个方法访问。它们对应于 X、Y 和 Z 维度，如图\
    \ 7-2 所示。\n\n如图所示，当手机平放在桌面上时，该向量的形式为`(0.0, 0.0, k)`，其中`k`是某个负数。`k`的值取决于测量力的单位。TouchDevelop\
    \ API 以 g（重力）单位报告力。任何完全静止的物体都会受到向下方向的 1g 力。换句话说，当手机保持静止并平放在桌面上（屏幕朝上）时，加速度计返回的`Vector3`值应为精确的`(0.0,\
    \ 0.0, -1.0)`。\n\n当手机垂直放置，其底边在桌面上时，`Vector3`值应为`(0.0, -1.0, 0.0)`。如果我们把手机上下颠倒，使其顶边在桌面上，则值应为`(0.0,\
    \ 1.0, 0.0)`。\n\n以下是一个简短的脚本，用于显示这些分量的值。\n\n```\naction main( )\n    var acc :=\
    \ senses → acceleration quick\n    (\"Z component = \" || acc → z) → post to wall\n\
    \    (\"Y component = \" || acc → y) → post to wall\n    (\"X component = \" ||\
    \ acc → x) → post to wall\n```\n\n![A978-1-4302-6137-7_7_Fig2_HTML.jpg](img/Image00042.jpg)\n\
    \n图 7-2\n\n加速度计方向\n\n脚本的典型输出类似于以下内容：\n\n```\nX component = 0.0092241987586021423\n\
    Y component = -0.03411596268415451\nZ component = -0.99446910619735718\n```\n\n\
    这些值接近`0.0`、`0.0`和`-1.0`。偏差表明加速度计可能存在一些测量误差，并且手机可能并未放置在完全水平的表面上。\n\n## 7.3.2 示例脚本：灯光秀（`/tbcb`）\n\
    \n该脚本简单地将手机的运动转换为颜色，并将这些颜色应用于整个屏幕。该脚本如图 7-3 所示。\n\n该脚本将加速度读数的 X、Y 和 Z 分量映射到三个颜色分量。然而，这并不是一个简单的映射。脚本需要确保三个颜色分量保持在`0.0`到`1.0`的范围内。其次，颜色的\
    \ RGB 分量对人眼的重要性并不相同。正常眼睛对蓝色的敏感度远低于红色或绿色。为了在可能的颜色中更均匀地分布感知到的颜色，使用了另一种称为 HSB（色相、饱和度和亮度）的颜色表示方法。\n\
    \n该脚本每`0.1`秒从加速度计读取一次读数，并用它来设置屏幕的颜色。\n\n该脚本的等效版本发布在 TouchDevelop 网站上，名称为`/wnny`。`/wnny`脚本使用`gameloop`事件每`50`毫秒触发一次加速度计读数，并调用库脚本中的一个操作来将`Vector3`值转换为`Color`值。\n\
    \n另一个使用加速度计的示例脚本是简化的飞机姿态指示器，发布为`/akgk`。通过检查加速度计的结果来确定手机相对于重力的当前方向。该信息用于在屏幕上显示人工地平线，模拟飞行员在飞机上通过姿态指示器所看到的情景。\n\
    \n![A978-1-4302-6137-7_7_Fig3_HTML.jpg](img/Image00043.jpg)\n\n图 7-3\n\n简化的加速度计颜色（脚本`/tbcb`）\n\
    \n# 7.4 指南针\n\n大多数智能手机都包含一个内置指南针，用于报告手机相对于磁北的方向。直接使用指南针的感知资源方法列于表 7-1 中。\n\n##\
    \ 7.4.1 示例脚本：磁罗盘（`/drvu`）\n\n作为指南针传感器使用的演示，下面提供的脚本模拟了一个老式的磁罗盘，其中罗盘的指针总是指向北。\n\n\
    该脚本的大部分内容涉及在代表表盘的实心圆上显示一个表示指针的箭头。脚本中与传感器相关的重要语句如下。\n\n```\nvar angle := senses\
    \ → heading   // 获取以度为单位的方向角\n```\n\n正如 API 文档所述，`senses → heading`返回的值是“从地球磁北顺时针测量的以度为单位的罗盘方向角”。例如，值`15`表示磁北应该位于手机当前所指方向的左侧\
    \ 15 度处。\n\n该脚本如图 7-4 所示。大部分代码涉及绘制一个大箭头的表示。\n\n# 7.5 陀螺仪\n\n许多 Windows 手机也配备有陀螺仪。这是一种报告手机是否正在旋转（以任意方向绝对旋转）的装置。旋转被测量为角速度，即围绕三维空间中某个轴每秒旋转的度数。用于访问陀螺仪的\
    \ API 方法列于表 7-1 中。\n\nTouchDevelop API 将角速度报告为一个`Vector3`值，以表示在三维空间中的旋转。值`(360,\
    \ 0, 0)`表示绕 X 轴顺时针方向每秒旋转一周的速度，Y 轴和 Z 轴同理。给定一个读数`(a, b, c)`，可以计算出围绕 3D 空间中某个轴的组合旋转速度为`√(a²\
    \ + b² + c²)`。\n\n`rotation speed`方法返回的值测量了手机绕哪个轴旋转以及旋转的速度。例如，如果角速度的 X 和 Y 分量远小于\
    \ Z 分量，那么手机很可能平放在桌面上并正在原地转动（因为 Z 轴垂直于手机屏幕）。\n\n![A978-1-4302-6137-7_7_Fig4_HTML.jpg](img/Image00044.jpg)\n\
    \n图 7-4\n\n磁罗盘脚本（脚本`/drvu`）\n"
- fmt: "# 7.6 Motion\n\nPerhaps there is a use for gyroscope readings in a game which\
    \ requires spinning the device around? However, it is much more likely that the\
    \ gyroscope is useful when used in combination with the accelerometer and compass.\
    \ The following code snippet extracts a combined reading from all three sensors.\n\
    \n```\nvar motion := senses → motion\nif motion → is invalid then\n    \"Your\
    \ device does not have motion capability!\" → post to wall\n    time → stop\n\
    else  // do nothing\n```\n\nThe value obtained in the first statement has the\
    \ `Motion` datatype. Methods associated with the `Motion` datatype allow various\
    \ component readings to be extracted. The methods provided by the `Motion` type\
    \ are summarized in Figure [7-5](#text00007.html#Fig5) (The `is invalid` and `post\
    \ to wall` methods are omitted).\n\nOne very important feature is that the software\
    \ can separate the force on the accelerometer into the force caused by gravity\
    \ and the additional force caused by acceleration. In other words, the `acceleration`\
    \ method returns a true acceleration and does not include a gravitational force\
    \ component. The force of gravity should always be equal to 1g but its direction\
    \ depends on which way the device is oriented.\n\nAnother important feature of\
    \ a `Motion` value is that an accurate value for the device's orientation can\
    \ be obtained for the time when the value was captured. The direction of the `Vector3`\
    \ value returned by `senses → acceleration quick` would usually be adequate, but\
    \ it can be disturbed by waving the device around. The true orientation of the\
    \ device is known as its attitude. The three methods named `pitch`, `roll` and\
    \ `yaw` report the phone's attitude measured in degrees, respectively relative\
    \ to three orthogonal axes. These axes are diagrammed in Figure [7-6](#text00007.html#Fig6)\
    \ if your smartphone is substituted for the plane. If the phone is held vertically\
    \ and facing magnetic north, the values for the `yaw`, `pitch` and `roll` should\
    \ all be zero. Any rotations relative to that starting position will cause the\
    \ values to become non-zero.\n\n![A978-1-4302-6137-7_7_Fig5_HTML.jpg](Image00045.jpg)\n\
    \nFigure 7-5 — Methods of the `Motion` type\n\nNote that the current orientation\
    \ of the phone can be obtained with the `senses → orientation` method.\n\n![A978-1-4302-6137-7_7_Fig6_HTML.jpg](Image00046.jpg)\n\
    \nFigure 7-6 — Yaw, pitch and roll\n\nNote: The image has been copied from the\
    \ Wikipedia Commons, a freely licensed media file repository.\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
    \ Open Access This chapter is licensed under the terms of the Creative Commons\
    \ Attribution-NonCommercial-NoDerivatives 4.0 International License ([http://creativecommons.org/licenses/by-nc-nd/4.0/](http://creativecommons.org/licenses/by-nc-nd/4.0/)),\
    \ which permits any noncommercial use, sharing, distribution and reproduction\
    \ in any medium or format, as long as you give appropriate credit to the original\
    \ author(s) and the source, provide a link to the Creative Commons licence and\
    \ indicate if you modified the licensed material. You do not have permission under\
    \ this licence to share adapted material derived from this chapter or parts of\
    \ it. The images or other third party material in this chapter are included in\
    \ the chapter's Creative Commons licence, unless indicated otherwise in a credit\
    \ line to the material. If material is not included in the chapter's Creative\
    \ Commons licence and your intended use is not permitted by statutory regulation\
    \ or exceeds the permitted use, you will need to obtain permission directly from\
    \ the copyright holder.\n\n# 8. Interactions\n\n[8.1 Social messages](#text00008.html#Sec1)\
    \ [8.2 Locations, places, maps](#text00008.html#Sec4) [8.3 Emails](#text00008.html#Sec5)\
    \ [8.4 Phone Calls](#text00008.html#Sec6) [8.5 2D barcodes](#text00008.html#Sec7)\
    \ [8.6 SMS messages (WP8 only)](#text00008.html#Sec8) [8.7 Calendar and appointments\
    \ (WP8 only)](#text00008.html#Sec9) [8.8 Contacts (WP8 and Android only)](#text00008.html#Sec10)\n\
    \nKeywords: Phone Call, Smart Phone, Instant Messaging, Audio Clip, Phone Company\n\
    \nSmart phones, tablets and computers provide calendars, e-mail, access to social\
    \ media, some forms of instant messaging, SMS and phone calls. Even a computer\
    \ might place a phone call through the use of a service like Skype. These are\
    \ all forms of interaction which are covered in this chapter.\n\n## 8.1 Social\
    \ messages\n\nSeveral websites, including Twitter and Facebook in particular,\
    \ provide the ability to post messages for other people to read. These messages\
    \ may have associated content, such as a picture or an audio clip. The TouchDevelop\
    \ API provides facilities for downloading such messages and for posting new messages.\n\
    \nThe `social` resource provides the two methods listed in Table [8-1](#text00008.html#Tab1)\
    \ for creating a new message and for retrieving messages from a website. A simple\
    \ example of obtaining messages from the two supported social networks and displaying\
    \ them might be as follows.\n\n```\nvar TD msgs := social → search(\"twitter\"\
    , \"#touchdevelop\")\nvar more msgs := social → search(\"facebook\", \"TouchDevelop\"\
    )\n// combine the two collections into one\nTD msgs → add many(more msgs)\n//\
    \ reorder and display the messages\nTD msgs → sort by date\nTD msgs → post to\
    \ wall\n```\n\nTable 8-1 — Messaging methods of the `social` service\n\n| Methods\
    \ | Description |\n| --- | --- |\n| `social → create message(message : String)\
    \ : Message` | Creates a new message with the text body provided. |\n| `social\
    \ → search(network : String, terms : String) : Message Collection` | Searches\
    \ twitter or Facebook for recent messages matching the search terms provided.\
    \ |\n\n### 8.1.1 Working with messages\n\nA `Message` value will usually have\
    \ a text component, because that is the simplest form of message. However additional\
    \ information is usually associated with that message. The TouchDevelop API supports\
    \ many methods for accessing or setting extra content attached to a message. These\
    \ are all methods of the `Message` datatype. The methods for accessing, or getting,\
    \ content are listed in the first table of section C.25 in Appendix C, those for\
    \ setting content in the second table, and some additional methods in the third\
    \ table.\n\nIt should be remembered that the extra content of a message is not\
    \ always present. After retrieving one of these optional values, such as `media\
    \ link`, the script should perform the test `is invalid` to verify that the value\
    \ was actually available.\n\nThe `share` method of a `Message` instance allows\
    \ the message to be transmitted in one of a variety of ways. Whichever choice\
    \ is provided for the where parameter, a dialog box is displayed. The message\
    \ is not sent until a selection has been picked and/or a button to send the message\
    \ has been tapped."
  raw: '## 7.6 Motion


    Perhaps there is a use for gyroscope readings in a game which requires spinning
    the device around? However, it is much more likely that the gyroscope is useful
    when used in combination with the accelerometer and compass. The following code
    snippet extracts a combined reading from all three sensors.


              `var` `motion := senses` → `motion`


              `if` `motion` → `is invalid` `then`


                        `"Your device does not have motion capability!"` → `post to
    wall`


                        `time` →`stop`


              `else`   // do nothing


    The value obtained in the first statement has the `Motion` datatype. Methods associated
    with the `Motion` datatype allow various component readingsto be extracted. The
    methods provided by the `Motion` type are summarized in Figure [7-5](#text00007.html#Fig5)
    (The `is invalid` and post to wall methods are omitted).


    One very important feature is that the software can separate the force on the
    accelerometer into the force caused by gravity and the additional force caused
    by acceleration. In other words, the acceleration method returns a true acceleration
    and does not include a gravitational force component. The force of gravity should
    always be equal to 1g but its direction depends on which way the device is oriented.


    Another important feature of a Motion value is that an accurate value for the
    device’s orientation can be obtained for the time when the value was captured.
    The direction of the `Vector3` value returned by `senses` →`acceleration quick`
    would usually be adequate, but it can be disturbed by waving the device around.
    The true orientation of the device is known as its attitude . The three methods
    named `pitch` , `roll` and `yaw` report the phone’s attitude measured in degrees,
    respectively relative to three orthogonal axes. These axes are diagrammed in Figure
    [7-6](#text00007.html#Fig6) if your smartphone is substituted for the plane. If
    the phone is held vertically and facing magnetic north, the values for the yaw,
    pitch and roll should all be zero. Any rotations relative to that starting position
    will cause the values to become non-zero.


    ![A978-1-4302-6137-7_7_Fig5_HTML.jpg](Image00045.jpg)


    Figure 7-5


    Methods of the Motion type


    Note that the current orientation of the phone can be obtained with the `senses`
    → orientation method.


    ![A978-1-4302-6137-7_7_Fig6_HTML.jpg](Image00046.jpg)


    Figure 7-6


    Yaw, pitch and roll Note


    The image has been copied from the Wikipedia Commons, a freely licensed media
    file repository.


