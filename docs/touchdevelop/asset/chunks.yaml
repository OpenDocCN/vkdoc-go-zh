    ## C.18 `Matrix`


    一个二维数字矩阵。


    | `add(b : Matrix) : Matrix` | 返回将此矩阵与 `b` 相加后得到的矩阵。两个矩阵的大小必须匹配。 |

    | `at(index : Number) : Number` | 获取指定索引处的值。元素按行顺序排列，从左上角开始。 |

    | `clear(value : Number)` | 将矩阵的所有元素设置为该值。 |

    | `clone : Matrix` | 创建矩阵的深拷贝。 |

    | `column count : Number` | 获取列数 |

    | `count : Number` | 获取元素总数 |

    | `is invalid : Boolean` | 如果当前实例无效则返回 `true` |

    | `item(row : Number, column : Number) : Number` | 获取指定位置的值。如果超出数组维度则返回无效值。 |

    | `max : Number` | 计算所有值中的最大值 |

    | `min : Number` | 计算所有值中的最小值 |

    | `multiply(b : Matrix) : Matrix` | 返回将矩阵中每个元素相乘后得到的矩阵。两个矩阵的大小必须匹配。 |

    | `negate : Matrix` | 返回取反后的矩阵。 |

    | `post to wall` | 使用必应（Bing）在墙上显示地图 |

    | `random : Number` | 获取一个随机元素。如果矩阵为空则返回无效值。 |

    | `row count : Number` | 获取行数 |

    | `scale(factor : Number) : Matrix` | 返回按 `factor` 缩放后的矩阵副本 |

    | `set at(index : Number, value : Number)` | 设置指定索引处的值。元素按行顺序排列，从左上角开始。 |

    | `set item(row : Number, column : Number, value : Number)` | 设置特定位置的值。如果该位置超出边界，矩阵将用零值扩展。
    |

    | `subtract(b : Matrix) : Matrix` | 返回从此矩阵中减去 `b` 后得到的矩阵。两个矩阵的大小必须匹配。 |

    | `to string : String` | 获取矩阵的字符串表示形式 |

    | `transpose : Matrix` | 返回转置矩阵 |


    ## C.19 `Message`


    一个 `Message` 值包含留言板上某条帖子的详细信息。方法列表分为 get 方法（获取消息的单个属性）、set 方法（设置或更新属性值）以及其他方法。


    ### `Message` 类型的 Get 方法


    | `from : String` | 获取作者 |

    | `id : String` | 获取消息标识符 |

    | `link : String` | 获取与该消息关联的链接 |

    | `location : Location` | 获取地理坐标 |

    | `media link : String` | 获取媒体的 URL |

    | `message : String` | 获取消息文本 |

    | `picture link : String` | 获取图片的 URL |

    | `source : String` | 获取此消息的来源（Facebook、Twitter 等…​） |

    | `time : DateTime` | 获取时间 |

    | `title : String` | 获取标题文本 |

    | `to : String` | 获取收件人 |

    | `values : String Map` | 获取消息中存储的附加值 |


    ### `Message` 类型的 Set 方法


    | `set from(author : String)` | 设置作者 |

    | `set id(value : String)` | 设置消息标识符 |

    | `set link(url : String)` | 设置与该消息关联的链接 |

    | `set location(location : Location)` | 设置地理坐标 |

    | `set media link(url : String)` | 设置媒体的 URL |

    | `set message(message : String)` | 设置消息文本 |

    | `set picture link(url : String)` | 设置图片的 URL |

    | `set source(source : String)` | 设置此消息的来源 |

    | `set time(time : DateTime)` | 设置时间 |

    | `set title(title : String)` | 设置标题文本 |

    | `set to(author : String) : Nothing` | 设置收件人 |


    ### `Message` 类型的其他方法


    | `is invalid : Boolean` | 如果当前实例无效则返回 `true` |

    | `post to wall` | 将消息发布到墙上 |

    | `share(where : String) : Nothing` | 共享此消息（可选参数包括 email、sms、Facebook、social 或
    '''' 以从列表中选择） |


    ## C.20 `Message Collection`


    消息列表。


    | `add(value : Message)` | 添加一条 `Message` |

    | `add many(value : Message Collection)` | 添加一个 `Message` 项集合 |

    | `at(index : Number) : Message` | 获取第 i 条 `Message` |

    | `clear` | 清空集合 |

    | `continuation : String` | 获取下一组消息的标识符 |

    | `count : Number` | 获取元素数量 |

    | `index of(item : Message, start : Number) : Number` | 获取 `item` 第一次出现时的索引。如果未找到或
    `start` 超出范围，则返回 -1。 |

    | `insert at(index : Number, item : Message)` | 在位置 `index` 处插入一个链接。如果 `index`
    超出范围，则不执行任何操作。 |

    | `is invalid : Boolean` | 如果当前实例无效则返回 `true` |

    | `post to wall` | 在墙上显示消息 |

    | `random : Message` | 从集合中获取一个随机元素。如果集合为空则返回无效值。 |

    | `remove(item : Message) : Boolean` | 移除该消息的第一次出现。如果已移除则返回 `true`。 |

    | `remove at(index : Number)` | 移除位置 `index` 处的消息 |

    | `reverse` | 反转元素的顺序 |

    | `set at(index : Number, value : Message)` | 设置第 i 条 `Message` |

    | `set continuation(value : String)` | 设置下一组消息的标识符 |

    | `sort by date` | 按从最新到最旧排序 |


    ## C.21 `Motion`


    描述设备的运动状态。


    | `acceleration : Vector3` | 获取设备的线性加速度，以重力单位计 |

    | `gravity : Vector3` | 获取与此读数相关的重力向量 |

    | `is invalid : Boolean` | 如果当前实例无效则返回 `true` |

    | `pitch : Number` | 获取姿态的俯仰角，单位为度 |

    | `post to wall` | 将运动读数显示到墙上 |

    | `roll : Number` | 获取姿态的横滚角，单位为度 |

    | `rotation speed : Vector3` | 获取设备的旋转速度，单位为度每秒 |

    | `time : DateTime` | 获取一个时间戳，指示该读数被计算的时间 |

    | `yaw : Number` | 获取姿态的偏航角，单位为度 |


    ## C.22 `Number`


    一个数字（可能为负和/或小数）


    | `-(right : Number) : Number` | 数字相减 |

    | `*(right : Number) : Number` | 数字相乘 |

    | `/(right : Number) : Number` | 数字相除 |

    | `+(right : Number) : Number` | 数字相加 |

    | `<(right : Number) : Boolean` | 比较数字是否小于 |

    | `=(right : Number) : Boolean` | 比较数字是否相等 |

    | `≠(right : Number) : Boolean` | 比较数字是否不等 |

    | `>(right : Number) : Boolean` | 比较数字是否大于 |

    | `≤(right : Number) : Boolean` | 比较数字是否小于等于 |

    | `≥(right : Number) : Boolean` | 比较数字是否大于等于 |

    | `is invalid : Boolean` | 如果当前实例无效则返回 `true` |

    | `post to wall` | 将数字打印到墙上 |

    | `to character : String` | 将数字解释为 Unicode 值并将其转换为单个字符串 |

    | `to color : Color` | 将数字解释为 ARGB（alpha、红、绿、蓝）颜色 |

    | `to json : Json Object` | 将值转换为 json 数据结构 |

    | `to string : String` | 将数字转换为字符串 |

    '
- fmt: '## C.23 `Number Collection`


    A collection of numbers.


    | `add(item : Number)` | Adds a number at the end of the collection. |

    | :--- | :--- |

    | `add many(items : Number Collection)` | Adds many numbers at once. |

    | `at(index : Number) : Number` | Gets the number at position `index`. Returns
    `invalid` if `index` is out of range. |

    | `avg : Number` | Computes the average of the values. |

    | `clear` | Clears the numbers. |

    | `contains(item : Number) : Boolean` | Indicates if the collection contains the
    `item`. |

    | `count : Number` | Gets the number of items. |

    | `index of(item : Number, start : Number) : Number` | Gets the index of the first
    occurrence of a number. Returns `-1` if not found or `start` is out of range.
    |

    | `insert at(index : Number, item : Number)` | Inserts a double at position `index`.
    Does nothing if `index` is out of range. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |

    | `max : Number` | Computes the maximum of the values. |

    | `min : Number` | Computes the minimum of the values. |

    | `post to wall` | Displays the numbers on the wall. |

    | `random : Number` | Gets a random element from the collection. Returns `invalid`
    if the collection is empty. |

    | `remove(item : Number) : Boolean` | Removes the first occurrence of a number.
    Returns `true` if removed. |

    | `remove at(index : Number)` | Removes the number at position `index`. |

    | `reverse` | Reverses the items. |

    | `set at(index : Number, item : Number)` | Sets the number at position `index`.
    Does nothing if the `index` is out of range. |

    | `sort` | Sorts the numbers in this collection. |

    | `sum : Number` | Computes the sum of the values. |


    ## C.24 `Number Map`


    A map of numbers to numbers.


    | `at(index : Number) : Number` | Gets the element at `index`. `Index` may be
    any floating-point value. |

    | :--- | :--- |

    | `avg : Number` | Computes the average of the values. |

    | `clear` | Clears the number map. |

    | `count : Number` | Gets the number of elements. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |

    | `max : Number` | Computes the maximum of the values. |

    | `min : Number` | Computes the minimum of the values. |

    | `post to wall` | Displays the map in a line chart; you need to call `''update
    on wall''` later if you want changes to be reflected. |

    | `remove(index : Number)` | Removes the value at a given `index`. |

    | `set at(index : Number, value : Number)` | Sets the element at `index`. `Index`
    may be any floating-point value. |

    | `set many(numbers : Number Map)` | Sets many elements at once. |

    | `slice(start : Number, end : Number) : Number Map` | Extracts the elements at
    indices between `start` (inclusive) and `end` (non-inclusive). |

    | `sum : Number` | Computes the sum of the values. |

    | `update on wall` | Updates any display of this map. |


    ## C.25 `OAuth Response`


    OAuth 2.0 Access Token or Error.


    | `access token : String` | The access token issued by the authorization server.
    |

    | :--- | :--- |

    | `error : String` | A single ASCII [USASCII] error code. |

    | `error description : String` | (Optional) A human readable error code. |

    | `error uri : String` | (Optional) A URI identifying a human-readable web page
    with information about the error, used to provide the client developer with additional
    information about the error. |

    | `expires in : Number` | (Optional) The lifetime in seconds of the access token.
    |

    | `is error : Boolean` | Indicates if this response is an error. |

    | `is expiring(lookup : Number) : Boolean` | (Optional) Indicates if the token
    might expire within the next `lookup` seconds. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |

    | `others : String Map` | (Optional) Additional key-value pairs not covered by
    the OAuth 2.0 specification. |

    | `post to wall` | Displays the response. |

    | `set at(index : Number, item : Number)` | Sets the number at position `index`.
    Does nothing if the `index` is out of range. |

    | `sort` | Sorts the numbers in this collection. |

    | `scope : String` | (Optional) Optional if identical to the scope requested by
    the client; otherwise, the scope of the access token as described by Section 3.3.
    |


    ## C.26 `Page`


    A page on a wall.


    | `equals(other : Page) : Boolean` | Gets a value indicating if the page is equal
    to the `other`. |

    | :--- | :--- |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |


    ## C.27 `Page Button`


    A page button on the wall.


    | `equals(page button : Page) : Boolean` | Gets a value indicating if both instances
    are equal. |

    | :--- | :--- |

    | `icon : String` | Gets the icon name. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |

    | `page : Page` | Gets the page hosting this button. |

    | `post to wall` | Pushes this button on the wall. |

    | `text : String` | Gets the text. |


    ## C.28 `Page Collection`


    A collection of pages.


    | `at(index : Number) : Page` | Gets the pages at `index`. |

    | :--- | :--- |

    | `count : Number` | Gets the number of pages. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless.
    |

    | `post to wall` | Posts the pages on the wall. |'
