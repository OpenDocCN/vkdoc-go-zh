- fmt: '## B.2 `box`


    Access current `box` element on the page.


    | `edit(style : String, value : String, changehandler : Text Action)` | Display
    editable text, with the given binding |

    | `on tapped(handler : Action)` | Set what happens when the box is tapped |

    | `page height : Number` | Get the total height of the page |

    | `page width : Number` | Get the total width of the page |

    | `pixels per em : Number` | Get the number of pixels in an em |

    | `set background( color : Color)` | Sets the background color |

    | `set border( color : Color, width : Number)` | Set the color and width of the
    border |

    | `set border widths( top : Number, right : Number, bottom : Number, left : Number)`
    | Set the width of each border |

    | `set font size(font size : Number)` | Set font size in this box |

    | `set foreground(color : Color)` | Sets the foreground color of elements |

    | `set height(height : Number)` | Set the height of this box |

    | `set height range(min width : Number, max width : Number)` | Set lower and upper
    limits on the width of this box |

    | `set horizontal align(arrange : String)` | Specify how to arrange the content
    of this box; `arrange` is `"left"` `"center"` `"right"` or `"justify"` |

    | `set horizontal stretch(elasticity : Number)` | Specify how to compute box width
    (0 = shrink to fit content, 1 = stretch to fit frame, 0.5 = stretch to half width)
    |

    | `set margins(top : Number, right : Number, bottom : Number, left : Number)`
    | Set the margins of this box (to leave space around the outside of this box)
    |

    | `set padding(top : Number, right : Number, bottom : Number, left : Number)`
    | Set the padding of this box (to leave space around the contents of this box)
    |

    | `set scrolling(horizontal scrolling : Boolean, vertical scrolling : Boolean)`
    | Specify whether to use scrollbars when box contents overflow |

    | `set text wrapping(wrap : Boolean, minimumwidth : Number)` | Set whether to
    break long lines, and specify what length is too short for breaking |

    | `set vertical align(arrange : String)` | Specify how to arrange the content
    of this box; `arrange` is `"top"` `"bottom"` `"center"` or `"baseline"` |

    | `set vertical stretch(elasticity : Number)` | Specify how to compute box height
    (0 = shrink to fit content, 1 = stretch to fit frame, 0.5 = stretch to half height)
    |

    | `set width(width : Number)` | Set the width of this box |

    | `set width range(min width : Number, max width : Number)` | Set lower and upper
    limits on the width of this box |

    | `use horizontal layout` | Arrange boxes inside this box from left to right |

    | `use overlay layout` | Arrange boxes inside this box as layers on top of each
    other |

    | `use vertical layout` | Arrange boxes inside this box from top to bottom; this
    is the default |


    ## B.3 `collections`


    Create collections of items.


    | `create link collection : Link Collection` | Creates an empty link collection
    |

    | `create location collection : Location Collection` | Creates an empty location
    collection |

    | `create message collection : Message Collection` | Creates an empty message
    collection |

    | `create number collection : Number Collection` | Creates an empty number collection
    |

    | `create number map : Number Map` | Creates an empty number map |

    | `create place collection : Place Collection` | Creates an empty place collection
    |

    | `create string collection : String Collection` | Creates an empty string collection
    |

    | `create string map : String Map` | Creates an empty string map (case and culture
    sensitive) |


    ## B.4 `colors`


    Access predefined colors or create new colors.


    | `accent : Color` | Gets the accent color in the current theme |

    | `background : Color` | Gets the background color in the current theme |

    | `black : Color` | Gets the color that has the ARGB value of `#FF000000` |

    | `blue : Color` | Gets the color that has the ARGB value of `#FF0000FF` |

    | `brown : Color` | Gets the color that has the ARGB value of `#FFA52A2A` |

    | `chrome : Color` | Gets the chrome color in the current theme (control background)
    |

    | `cyan : Color` | Gets the color that has the ARGB value of `#FF00FFFF` |

    | `dark gray : Color` | Gets the color that has the ARGB value of `#FFA9A9A9`
    |

    | `foreground : Color` | Gets the foreground color in the current theme |

    | `from ahsb(alpha : Number, hue : Number, saturation : Number, brightness : Number)
    : Color` | Creates a color from the alpha, hue, saturation, brightness channels
    (0.0-1.0 range) |

    | `from argb(alpha : Number, red : Number, green : Number, blue : Number) : Color`
    | Creates a color from the alpha, red, green, blue channels (0.0-1.0 range) |

    | `from hsb(hue : Number, saturation : Number, brightness : Number) : Color` |
    Creates a color from the hue, saturation, brightness channels (0.0-1.0 range)
    |

    | `from rgb(red : Number, green : Number, blue : Number) : Color` | Creates a
    color from the red, green, blue channels (0.0-1.0 range) |

    | `gray : Color` | Gets the color that has the ARGB value of `#FF808080` |

    | `green : Color` | Gets the color that has the ARGB value of `#FF008000` |

    | `is light theme : Boolean` | Indicates if the user is using a light theme in
    his phone |

    | `light gray : Color` | Gets the color that has the ARGB value of `#FFD3D3D3`
    |

    | `linear gradient(c1 : Color, c2 : Color, alpha : Number) : Color` | Computes
    an intermediate color |

    | `magenta : Color` | Gets the color that has the ARGB value of `#FFFF00FF` |

    | `orange : Color` | Gets the color that has the ARGB value of `#FFFFA500` |

    | `purple : Color` | Gets the color that has the ARGB value of `#FF800080` |

    | `random : Color` | Picks a random color |

    | `red : Color` | Gets the color that has the ARGB value of `#FFFF0000` |

    | `sepia : Color` | Gets the color that has the ARGB value of `#FF704214` |

    | `subtle : Color` | Gets the subtle color in the current theme (light gray) |

    | `transparent : Color` | Gets the color that has the ARGB value of `#00FFFFFF`
    |

    | `white : Color` | Gets the color that has the ARGB value of `#FFFFFFFF` |

    | `yellow : Color` | Gets the color that has the ARGB value of `#FFFFFF00` |


    ## B.5 `contract`


    Statements that test whether correctness requirements are satisfied.


    | `assert(condition : Boolean, message : String)` | Checks for a condition; if
    the condition is false, execution fails. Does nothing for published scripts. |

    | `requires(condition : Boolean, message : String)` | Specifies a precondition
    contract for the action; if the condition is false, execution fails. Does nothing
    for published scripts. |


    ## B.6 `invalid`


    Create an invalid value for any datatype.'
