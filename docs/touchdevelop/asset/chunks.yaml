    # 认证 Web 服务


    11.1 注册您的应用 11.2 身份认证 11.3 库 11.4 高级主题


    互联网上有很多 Web 服务允许客户端应用程序查询和存储各种结构化的信息。某些 Web 服务要求用户进行身份认证才能使用受保护的资源。


    ## 注册您的应用


    一个常见的 Web 服务调用来源是 Facebook 的图形 API¹。通过此 API，您可以查询和提交图片、状态更新、评论等。所有交互都是以特定 Facebook
    用户的名义进行的。该用户必须授权应用程序访问其信息的任何部分。


    OAuth v2.0 是一种由微软、Facebook、谷歌等公司支持的通用 Web 服务认证机制。TouchDevelop 支持规范第 4.2 节中定义的
    OAuth 2.0 隐式授权流程协议 ([`​tools.​ietf.​org/​html/​rfc6749`](http://tools.ietf.org/html/rfc6749))。目前不支持其他协议。在为受保护的
    Web 服务协商访问令牌后，TouchDevelop 提供处理并创建 JSON 和 XML 等格式的结构化数据的能力。


    在您使用 OAuth 机制访问 Web 服务之前，您需要向 Web 服务的提供商注册您正在开发的应用。每个 Web 服务都有其自己的注册机制；您必须查找并遵循您要使用的服务提供的说明。


    在注册过程中的某个时刻，系统会要求您提供“重定向 URI”。您必须精确地输入以下重定向 URI。


    `https://www.touchdevelop.com/[userid]/oauth`


    其中 `[userid]` 是您的 TouchDevelop 用户 ID。这是一个简短的字符合，例如 `pboj`，这恰好是 TouchDevelop Samples
    用户的用户 ID。请将浏览器指向 [`​www.​touchdevelop.​com/​me`](https://www.touchdevelop.com/me)
    来查找您的用户 ID。您将被重定向到一个新的 URL，可能会在要求登录之后。新的 URL 格式为 `https://www.touchdevelop.com/[userid]`。


    只有您在账户下发布的 TouchDevelop 脚本才能使用此重定向 URI。有关如何处理您要使用的 OAuth 提供者要求每个应用具有唯一重定向 URI
    的情况的说明，请参阅后面关于唯一重定向 URI 的章节。'
- fmt: "# 11.2 Authenticating\n\nThe OAuth 2.0 authentication is handled through the\
    \ `web` → `oauth v2` action. The action takes the OAuth URL including the `client_id`\
    \ and optional scope or other arguments. Do NOT include the `state` and `redirect_uri`\
    \ arguments; they are automatically added by TouchDevelop.\n\n```\nvar oauth res\
    \ := web → oauth v2(url)\n```\n\nThe response contains the access token or the\
    \ details about the error, if any. You can then use the access token to sign each\
    \ request as specified by the service.\n\n```\nvar access token := oauth res →\
    \ access token\nvar call := \"http://....?access_token=\" ∥ web → url encode(access\
    \ token)\n```\n\nYou can use the `is expiring` action to easily test if an access\
    \ token is missing or (almost expired).\n\n```\nif oauth res → is expiring(100)\
    \ then\n     // Oops, better ask for a new token.\nelse do nothing\n```\n\n**Table\
    \ 11-2**  \nProperties of the OAuth Response type\n\n| Method | Description |\n\
    | --- | --- |\n| `access token : String` | The access token issued by the authorization\
    \ server. |\n| `error : String` | A single ASCII [USASCII] error code. |\n| `error\
    \ description : String` | (Optional) A human readable error code. |\n| `error\
    \ uri : String` | (Optional) A URI identifying a human-readable web page with\
    \ information about the error, used to provide the client developer with additional\
    \ information about the error. |\n| `expires in : Number` | (Optional) The lifetime\
    \ in seconds of the access token. |\n| `is error : Boolean` | Indicates if this\
    \ response is an error. |\n| `is expiring(lookup : Number) : Boolean` | (Optional)\
    \ Indicates if the token might expire within the next seconds. |\n| `is invalid\
    \ : Boolean` | Returns true if the current instance is useless |\n| `others :\
    \ String Map` | (Optional) Additional key-value pairs not covered by the OAuth\
    \ 2.0 specification. |\n| `post to wall` | Displays the response. |\n| `action\
    \ scope : String` | (Optional) Optional if identical to the scope requested by\
    \ the client; otherwise, the scope of the access token as described by Section\
    \ 3.3 of the OAuth 2.0 specification. |\n\n**Table 11-1**  \nGeneral methods related\
    \ to OAuth 2.0\n\n| Method | Description |\n| --- | --- |\n| `web → oauth v2(oauth\
    \ url : String) : OAuth Response` | Authenticate with OAuth 2.0 and receive the\
    \ access token or error. |\n\nFigure [11-1](#text00011.html#Fig1) shows how to\
    \ use the OAuth functionality provided by TouchDevelop in order to post a message\
    \ to Facebook:\n\n1. It builds a URL that will trigger the Facebook authentication\
    \ process for your app, for a particular \"scope\" which defines what kind of\
    \ permissions your app is requesting.\n2. Then it sends the actual message with\
    \ the text to post. Note how not only the message text is encoded in a URL, but\
    \ also the `access_token` that was obtained by the earlier authentication call.\n\
    \nIf you use a different web service, or want to post other kind of information,\
    \ it might be the case that you need to pass the `access_token` in a header field\
    \ of the web request, and you might have to send the payload in the body of a\
    \ POST web request. Consult the documentation of the web service you want to use.\n\
    \n![A978-1-4302-6137-7_11_Fig1_HTML.jpg](Image00057.jpg)\n\n**Figure 11-1**  \n\
    Post a message to Facebook with OAuth\n\n# 11.3 Libraries\n\nThe following TouchDevelop\
    \ libraries already implement the OAuth 2.0 authentication for a number of APIs.\
    \ Each library contains detailed instructions on how to register an application\
    \ in order to use them. Just search for the name of a library in the add-library-reference\
    \ dialog.\n\n- Microsoft Live\n- Facebook\n- Google\n- Yammer\n- FourSquare\n\
    - Instagram\n- Meetup\n\nFigure [11-2](#text00011.html#Fig2) shows how to use\
    \ the Facebook library provided by TouchDevelop in order to post a message on\
    \ Facebook. Before you can use the `♻ facebook` expression, you must add a reference\
    \ to the Facebook library in your script.\n\n![A978-1-4302-6137-7_11_Fig2_HTML.jpg](Image00058.jpg)\n\
    \n**Figure 11-2**  \nUsing Facebook Library\n\n# 11.4 Advanced topics\n\n## 11.4.1\
    \ Unique redirect URIs\n\nSome OAuth providers, such as Microsoft Live, require\
    \ unique redirect URIs with unique domain names for each application. In those\
    \ cases the basic redirect URI that is just specific to your user id does not\
    \ work. Instead, you can use the following redirect URI scheme:\n\n```\nhttps://[rdid]-[userid].users.touchdevelop.com/oauth\n\
    ```\n\nwhere `[rdid]` is a unique identifier for the app (\"redirect domain id\"\
    , fewer than 64 lower case alphanumeric ASCII characters) that you can choose,\
    \ and `[userid]` is your TouchDevelop user id as before.\n\n```\noauth res :=\
    \ web → oauth v2(url ∥ \"&tdredirectdomainid=[rdid]\")\n```\n\nWhen passing the\
    \ authentication URL to `web` → `oauth v2`, add a `tdredirectdomainid` query argument\
    \ to specify your `[rdid]`.\n\n## 11.4.2 State variable in redirect URI\n\nSome\
    \ OAuth providers fail to pass the `state` argument in the redirect URI, and this\
    \ breaks the TouchDevelop OAuth support. In such case, add a `tdstateinredirecturi=true`\
    \ query argument to the authentication URL.\n\n```\noauth res := web → oauth v2(url\
    \ ∥ \"&tdstateinredirecturi=true\")\n```\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
