    \n# Editing TouchDevelop Scripts\n\n[A.1 The starting point](#text00012.html#Sec1)\
    \  \n[A.2 The editing steps](#text00012.html#Sec2)  \n[A.3 Additional steps](#text00012.html#Sec10)\
    \  \n[A.4 More advanced editing features](#text00012.html#Sec14)  \nKeywords:\
