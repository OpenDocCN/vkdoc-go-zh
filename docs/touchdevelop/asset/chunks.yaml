  raw: '## C.29 Picture


    A Picture value is an image which can be displayed. The list of methods has been
    separated into get methods (which return a single property of a picture) and other
    methods .


    | Get Methods of Picture Type |

    | --- |

    | at(index : Number) : Color | Gets the pixel color at the given linear index
    |

    | count : Number | Gets the number of pixels |

    | date : DateTime | Gets the date and time where the picture was taken; if any
    |

    | height : Number | Gets the height in pixels |

    | location : Location | Gets the location where the picture was taken; if any.
    |

    | pixel(left : Number, top : Number) : Color | Gets the color of a pixel |

    | width : Number | Gets the width in pixels |


    | Other Methods of Picture Type |

    | --- |

    | blend(other : Picture, left : Number, top : Number, angle : Number, opacity
    : Number) | Writes another picture at a given location. The opacity ranges from
    0 (transparent) to 1 (opaque). |

    | blend svg(markup : String, left : Number, top : Number, width : Number, height
    : Number, angle : Number) | Writes a Scalable Vector Graphics (SVG) document at
    a given location. By default, this action uses the viewport size provided in the
    SVG document when width or height are negative. |

    | brightness(factor : Number) | Changes the brightness of the picture. Factor
    in [-1, 1]. |

    | clear(color : Color) | Clears the picture to a given color |

    | clone : Picture | Returns a copy of the image |

    | colorize(background : Color, foreground : Color, threshold : Number) | Recolors
    the picture with the background and foreground color, based on a color threshold
    between 0.0 and 1.0 |

    | contrast(factor : Number) | Changes the contrast of the picture. Factor in [-1,
    1]. |

    | crop(left : Number, top : Number, width : Number, height : Number) | Crops a
    sub-image |

    | desaturate | Makes the picture gray |

    | draw ellipse(left : Number, top : Number, width : Number, height : Number, angle
    : Number, c : Color, thickness : Number) | Draws an elliptic border with a given
    color |

    | draw line(x1 : Number, y1 : Number, x2 : Number, y2 : Number, color : Color,
    thickness : Number) | Draws a line between two points |

    | draw rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, c : Color, thickness : Number) | Draws a rectangle border with a given
    color |

    | draw text(left : Number, top : Number, text : String, font size : Number, angle
    : Number, color : Color) | Draws some text border with a given color and font
    size |

    | fill ellipse(left : Number, top : Number, width : Number, height : Number, angle
    : Number, color : Color) | Fills a ellipse with a given color |

    | fill rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, color : Color) | Fills a rectangle with a given color |

    | flip horizontal | Flips the picture horizontally |

    | flip vertical | Flips the picture vertically |

    | invert | Inverts the red, blue and green channels |

    | is invalid : Boolean | Returns true if the current instance is useless |

    | is panorama : Boolean | Indicates if the picture width is greater than its height
    |

    | post to wall | Displays the image to the wall; you need to call ''update on
    wall'' later if you want changes to be reflected |

    | resize(width : Number, height : Number) | Resizes the picture to the given size
    in pixels |

    | save to library : String | Saves the picture to the ''saved pictures'' album.
    Returns the file name. |

    | set pixel(left : Number, top : Number, color : Color) | Sets the pixel color
    at a given pixel |

    | share(where : String, message : String) | Shares this message ('''' to pick
    from a list) |

    | tint(color : Color) | Converts every pixel to gray and tints it with the given
    color. |

    | update on wall | Refreshes the picture on the wall |


