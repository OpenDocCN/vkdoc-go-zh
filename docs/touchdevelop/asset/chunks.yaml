    # Windows Phone 上的 TouchDevelop 编辑器


    E.1 示例程序 E.2 返回按钮、撤销与错误 E.3 编辑示例 E.4 附加步骤 E.5 将代码重构为新操作 关键词 主操作 空白 有效选择 Windows
    Phone 编辑步骤


    本附录提供了一个在 Windows Phone 上使用 `TouchDevelop` 编辑器的完整示例。它并未涵盖编辑器的所有功能。建议进行一些实验以熟悉该编辑器。


    ### E.1 示例程序


    要输入的脚本如图 A-1 所示。该脚本以名称 `rotor` 发布，代码名为 `/cqxk`。


    ### E.2 返回按钮、撤销与错误


    手机在触控屏下方有三个按钮。编辑脚本时经常使用的一个重要按钮是手机返回按钮。其主要作用是将屏幕返回到之前的状态。它通常有助于从错误中恢复。例如，如果在编辑会话中不小心触碰到
    `bing` 按钮并启动了 `bing` 搜索引擎，返回按钮将退出 `bing` 并返回编辑器。


    ![A978-1-4302-6137-7_16_Fig1a_HTML.jpg](img/Image00070.jpg)


    在编辑过程中，每个编辑菜单的顶行都提供了一个撤销按钮。当该按钮未变暗时，点击此撤销按钮将完全如其所述执行操作。


    ![A978-1-4302-6137-7_16_Fig1_HTML.jpg](img/Image00071.jpg)


    **图 A-1** rotor 程序 `/cqxk`


    ### E.3 编辑示例


    当按照下面详述的编辑步骤操作时，屏幕内容会多次更改。由于篇幅限制，本章仅能包含部分截图。

