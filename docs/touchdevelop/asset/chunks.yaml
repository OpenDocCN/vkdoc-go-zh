  trans: '

    ## C.23 `数字集合`


    数字的集合。


    | `add(item : Number)` | 在集合末尾添加一个数字。 |

    | :--- | :--- |

    | `add many(items : Number Collection)` | 一次性添加多个数字。 |

    | `at(index : Number) : Number` | 获取位置`index`处的数字。如果`index`超出范围，则返回`invalid`。
    |

    | `avg : Number` | 计算所有数值的平均值。 |

    | `clear` | 清除所有数字。 |

    | `contains(item : Number) : Boolean` | 指示集合是否包含该`item`。 |

    | `count : Number` | 获取元素的数量。 |

    | `index of(item : Number, start : Number) : Number` | 获取某个数字首次出现的索引。如果未找到或`start`超出范围，则返回`-1`。
    |

    | `insert at(index : Number, item : Number)` | 在位置`index`处插入一个浮点数。如果`index`超出范围，则不执行任何操作。
    |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |

    | `max : Number` | 计算所有数值的最大值。 |

    | `min : Number` | 计算所有数值的最小值。 |

    | `post to wall` | 在墙上显示这些数字。 |

    | `random : Number` | 从集合中获取一个随机元素。如果集合为空，则返回`invalid`。 |

    | `remove(item : Number) : Boolean` | 移除某个数字的首次出现。如果已移除，则返回`true`。 |

    | `remove at(index : Number)` | 移除位置`index`处的数字。 |

    | `reverse` | 反转元素顺序。 |

    | `set at(index : Number, item : Number)` | 在位置`index`处设置数字。如果`index`超出范围，则不执行任何操作。
    |

    | `sort` | 对该集合中的数字进行排序。 |

    | `sum : Number` | 计算所有数值的总和。 |


    ## C.24 `数字映射`


    数字到数字的映射。


    | `at(index : Number) : Number` | 获取`index`处的元素。`Index`可以是任意浮点值。 |

    | :--- | :--- |

    | `avg : Number` | 计算所有数值的平均值。 |

    | `clear` | 清除数字映射。 |

    | `count : Number` | 获取元素的数量。 |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |

    | `max : Number` | 计算所有数值的最大值。 |

    | `min : Number` | 计算所有数值的最小值。 |

    | `post to wall` | 以折线图显示该映射；如果你希望更改能反映出来，后续需调用`''update on wall''`。 |

    | `remove(index : Number)` | 移除给定`index`处的值。 |

    | `set at(index : Number, value : Number)` | 在`index`处设置元素。`Index`可以是任意浮点值。 |

    | `set many(numbers : Number Map)` | 一次性设置多个元素。 |

    | `slice(start : Number, end : Number) : Number Map` | 提取索引在`start`（包含）和`end`（不包含）之间的元素。
    |

    | `sum : Number` | 计算所有数值的总和。 |

    | `update on wall` | 更新该映射的任何显示。 |


    ## C.25 `OAuth 响应`


    OAuth 2.0 访问令牌或错误。


    | `access token : String` | 由授权服务器颁发的访问令牌。 |

    | :--- | :--- |

    | `error : String` | 一个 ASCII [USASCII] 错误代码。 |

    | `error description : String` | （可选）一个人类可读的错误描述。 |

    | `error uri : String` | （可选）一个 URI，指向包含错误信息的人类可读网页，用于向客户端开发者提供有关错误的更多信息。 |

    | `expires in : Number` | （可选）访问令牌的生命周期（以秒为单位）。 |

    | `is error : Boolean` | 指示此响应是否为错误。 |

    | `is expiring(lookup : Number) : Boolean` | （可选）指示令牌是否可能在接下来的`lookup`秒内过期。 |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |

    | `others : String Map` | （可选）OAuth 2.0 规范未涵盖的其他键值对。 |

    | `post to wall` | 显示该响应。 |

    | `set at(index : Number, item : Number)` | 在位置`index`处设置数字。如果`index`超出范围，则不执行任何操作。
    |

    | `sort` | 对该集合中的数字进行排序。 |

    | `scope : String` | （可选）如果与客户端请求的范围相同，则为可选；否则，表示第 3.3 节所述访问令牌的作用域。 |


    ## C.26 `页面`


    墙上的一个页面。


    | `equals(other : Page) : Boolean` | 获取一个值，指示该页面是否与`other`相等。 |

    | :--- | :--- |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |


    ## C.27 `页面按钮`


    墙上的一个页面按钮。


    | `equals(page button : Page) : Boolean` | 获取一个值，指示两个实例是否相等。 |

    | :--- | :--- |

    | `icon : String` | 获取图标名称。 |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |

    | `page : Page` | 获取承载此按钮的页面。 |

    | `post to wall` | 将此按钮推送到墙上。 |

    | `text : String` | 获取文本内容。 |


    ## C.28 `页面集合`


    页面的集合。


    | `at(index : Number) : Page` | 获取`index`处的页面。 |

    | :--- | :--- |

    | `count : Number` | 获取页面的数量。 |

    | `is invalid : Boolean` | 如果当前实例无效，则返回`true`。 |

    | `post to wall` | 将页面发布到墙上。 |

    '
- fmt: '### C.29 Picture


    A `Picture` value is an image which can be displayed. The list of methods has
    been separated into get methods (which return a single property of a picture)
    and other methods.


    | Get Methods of Picture Type |

    | --- |

    | `at(index : Number) : Color` | Gets the pixel color at the given linear index
    |

    | `count : Number` | Gets the number of pixels |

    | `date : DateTime` | Gets the date and time where the picture was taken; if any
    |

    | `height : Number` | Gets the height in pixels |

    | `location : Location` | Gets the location where the picture was taken; if any.
    |

    | `pixel(left : Number, top : Number) : Color` | Gets the color of a pixel |

    | `width : Number` | Gets the width in pixels |


    | Other Methods of Picture Type |

    | --- |

    | `blend(other : Picture, left : Number, top : Number, angle : Number, opacity
    : Number)` | Writes another picture at a given location. The opacity ranges from
    0 (transparent) to 1 (opaque). |

    | `blend svg(markup : String, left : Number, top : Number, width : Number, height
    : Number, angle : Number)` | Writes a Scalable Vector Graphics (SVG) document
    at a given location. By default, this action uses the viewport size provided in
    the SVG document when width or height are negative. |

    | `brightness(factor : Number)` | Changes the brightness of the picture. Factor
    in [-1, 1]. |

    | `clear(color : Color)` | Clears the picture to a given color |

    | `clone : Picture` | Returns a copy of the image |

    | `colorize(background : Color, foreground : Color, threshold : Number)` | Recolors
    the picture with the background and foreground color, based on a color threshold
    between 0.0 and 1.0 |

    | `contrast(factor : Number)` | Changes the contrast of the picture. Factor in
    [-1, 1]. |

    | `crop(left : Number, top : Number, width : Number, height : Number)` | Crops
    a sub-image |

    | `desaturate` | Makes the picture gray |

    | `draw ellipse(left : Number, top : Number, width : Number, height : Number,
    angle : Number, c : Color, thickness : Number)` | Draws an elliptic border with
    a given color |

    | `draw line(x1 : Number, y1 : Number, x2 : Number, y2 : Number, color : Color,
    thickness : Number)` | Draws a line between two points |

    | `draw rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, c : Color, thickness : Number)` | Draws a rectangle border with a given
    color |

    | `draw text(left : Number, top : Number, text : String, font size : Number, angle
    : Number, color : Color)` | Draws some text border with a given color and font
    size |

    | `fill ellipse(left : Number, top : Number, width : Number, height : Number,
    angle : Number, color : Color)` | Fills a ellipse with a given color |

    | `fill rect(left : Number, top : Number, width : Number, height : Number, angle
    : Number, color : Color)` | Fills a rectangle with a given color |

    | `flip horizontal` | Flips the picture horizontally |

    | `flip vertical` | Flips the picture vertically |

    | `invert` | Inverts the red, blue and green channels |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `is panorama : Boolean` | Indicates if the picture width is greater than its
    height |

    | `post to wall` | Displays the image to the wall; you need to call `update on
    wall` later if you want changes to be reflected |

    | `resize(width : Number, height : Number)` | Resizes the picture to the given
    size in pixels |

    | `save to library : String` | Saves the picture to the ''saved pictures'' album.
    Returns the file name. |

    | `set pixel(left : Number, top : Number, color : Color)` | Sets the pixel color
    at a given pixel |

    | `share(where : String, message : String)` | Shares this message ('''' to pick
    from a list) |

    | `tint(color : Color)` | Converts every pixel to gray and tints it with the given
    color. |

    | `update on wall` | Refreshes the picture on the wall |


    ### C.30 Picture Album


    A `Picture Album` value represents a picture album.


    | | |

    | --- | --- |

    | `albums : Picture Albums` | Gets the children albums |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `name : String` | Gets the name of the album |

    | `pictures : Pictures` | Gets the pictures |

    | `post to wall` | Displays the album to the wall |


    ### C.31 Picture Albums


    A collection of picture albums.


    | | |

    | --- | --- |

    | `at(index : Number) : Picture Album` | Gets the item at position `index`; invalid
    if index is out of bounds |

    | `count : Number` | Gets the number of elements in the collection |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall` | Displays the value to the wall |

    | `random : Picture Album` | Gets random item; invalid if collection is empty
    |


    ### C.32 Pictures


    A collection of pictures.


    | | |

    | --- | --- |

    | `at(index : Number) : Picture` | Gets the item at position `index`; invalid
    if index is out of bounds |

    | `count : Number` | Gets the number of elements in the collection |

    | `find(name : String) : Number` | Finds a picture by name and returns the index.
    Returns -1 if not found. |

    | `full(index : Number) : Picture` | Gets the full resolution version of i-th
    picture |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall` | Displays the picture thumbnails to the wall |

    | `random : Picture` | Gets a random item; invalid if collection is empty |

    | `thumbnail(index : Number) : Picture` | Gets the thumbnail of i-th picture |


    ### C.33 Place


    Attaches or uses information for a named location. The list of methods has been
    separate into three tables: get methods which access attributes of a `Place`,
    set methods which update or replace attributes, and other methods.


    | Get Methods of Place Type |

    | --- |

    | `category : String` | Gets the category of the place |

    | `id : String` | Gets the identifier of this place |

    | `link : String` | Gets the link associated to the message |

    | `location : Location` | Gets the location of the place |

    | `name : String` | Gets the name of the place |

    | `picture link : String` | Gets a url to the picture |

    | `source : String` | Gets the source of this place (Facebook, TouchDevelop) |


    | Set Methods of Place Type |

    | --- |

    | `set category(category : String)` | Sets the category of the place |

    | `set id(id : String)` | Sets the identifier of this place |

    | `set link(url : String)` | Sets the link associated with the message |

    | `set location(location : Location)` | Sets the location of the place |

    | `set name(name : String)` | Sets the name of the place |

    | `set picture link(url : String)` | Sets the url for the picture |

    | `set source(source : String)` | Sets the source of this place |


    | Other Methods of Place Type |

    | --- |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall : Nothing` | Posts the place to the wall |

    | `to string : String` | Converts to a string name, plus latitude and longitude
    |


    ### C.34 Place Collection


    A collection of places.


    | | |

    | --- | --- |

    | `add(value : Place)` | Adds a place |

    | `add many(value : Place Collection)` | Adds many places at once |

    | `at(index : Number) : Place` | Gets the i-th place |

    | `clear` | Clears the collection |

    | `continuation : String` | Gets the identifier of the next set of messages |

    | `count : Number` | Gets the number of elements |

    | `index of(item : Place, start : Number) : Number` | Gets the index of the first
    occurrence of `item`. Returns -1 if not found or `start` is out of range. |

    | `insert at(index : Number, item : Place)` | Inserts a place at position `index`.
    Does nothing if `index` is out of range. |

    | `is invalid : Boolean` | Returns `true` if the current instance is useless |

    | `post to wall` | Posts the places on the wall |

    | `random : Place` | Gets a random element from the collection. Returns invalid
    if the collection is empty. |

    | `remove(item : Place) : Boolean` | Removes the first occurrence of a place.
    Returns `true` if removed. |

    | `remove at(index : Number)` | Removes the location at position `index` |

