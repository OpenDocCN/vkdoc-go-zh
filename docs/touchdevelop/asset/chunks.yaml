    # TouchDevelop Editor on a Windows Phone


    [E.1 The sample program](#text00016.html#Sec1) [E.2 The back button, undo and
    mistakes](#text00016.html#Sec2) [E.3 The editing example](#text00016.html#Sec3)
    [E.4 Additional steps](#text00016.html#Sec13) [E.5 Refactoring code into a new
    action](#text00016.html#Sec17) Keywords Main Action White Space Valid Choice Window
    Phone Editing Step


    This appendix provides a worked example of using the `TouchDevelop` editor on
    a Windows phone. It does not cover all the editor’s features. Some experimentation
    is suggested for gaining familiarity with the editor.


    ### E.1 The sample program


    The script to be entered is shown in Figure [A-1](#text00016.html#Fig1). It is
    published under the name `rotor` with code name `/cqxk`.


    ### E.2 The back button, undo and mistakes


    The phone has three buttons below the touch sensitive screen. The important button
    used frequently in editing a script is the phone back button. Its main purpose
    is to return the screen to a previous state. It is often useful for recovering
    from a mistake. If, for example, the `bing` button is accidentally touched in
    the middle of an editing session and the `bing` search engine comes up, the back
    button will exit from `bing` and return to the editor.


    ![A978-1-4302-6137-7_16_Fig1a_HTML.jpg](Image00070.jpg)


    While editing, there is an undo button provided on the top row of every edit menu.
    When it is not dimmed, tapping that undo button will do exactly what it says.


    ![A978-1-4302-6137-7_16_Fig1_HTML.jpg](Image00071.jpg)


    **Figure A-1** The rotor program `/cqxk`


    ### E.3 The editing example


    The screen contents change many times as the editing steps detailed below are
    followed. For space reasons, only a selection of the screenshots can be included
    in this chapter.'
