    一个 `Picture Album` 值代表一个图片相册。


    | | |

    | --- | --- |

    | `albums : Picture Albums` | 获取子相册 |

    | `is invalid : Boolean` | 如果当前实例无效则返回 true |

    | `name : String` | 获取相册名称 |

    | `pictures : Pictures` | 获取图片 |

