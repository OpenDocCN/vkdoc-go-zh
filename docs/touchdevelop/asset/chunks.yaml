    \ tap the `cut` button.\n\n### Starting the if statement\n\n1.  Tap the + button\
    \ at the bottom of the screen.  \n2.  Tap the button labeled `if`.  \n3.  Tap\
    \ the button labeled `speed`.  \n4.  Tap the row 2, col 2 button (labeled + `-\
    \ …`).  \n5.  Tap the > button.  \n6.  Tap the row 2, col 1 button (labeled 1\
    \ 2 3 …), and tap 1 and tap 0 so that the number 10 is produced.\n\n### The 'then'\
    \ clause of the if statement\n\n1.  Tap in white space below the line of code\
    \ beginning with the `if` keyword; tap '`+`' (add expression).  \n2.  Tap the\
