    \n# 9. 游戏板\n\n9.1 简介 9.2 Board 数据类型 9.3 Sprite 数据类型 9.4 Sprite 集合数据类型 9.5 触摸与板事件\
    \ 9.6 游戏调试\n\nTouchDevelop 包含一个用于编写简单基于 Sprite 的游戏的“游戏板”API。该 API 包含一个基础物理引擎，用于简化常见的游戏循环，使物体在受到重力和摩擦影响时移动。游戏板元素可以通过基于触摸和固定时间间隔的事件来进行编排。\n\
    \n## 9.1 简介\n\n### 9.1.1 什么是 Sprite？\n\n在 TouchDevelop 中，Sprite 是直接绘制到屏幕上的 2D\
    \ 位图。Sprite 通常用于显示信息，例如生命条、剩余生命数或分数等文本。一些游戏，尤其是较老的游戏，完全由 Sprite 组成。TouchDevelop\
    \ 允许创建和使用多种类型的 Sprite，例如椭圆形、矩形、文本和图片。有关 Sprite 功能的更多详细信息，请访问 [`msdn.microsoft.com/en-us/library/bb203919.aspx`](http://msdn.microsoft.com/en-us/library/bb203919.aspx)。\n\
    \n### 9.1.2 坐标与单位\n\n游戏板 API 中的位置基于像素。当设备垂直握持时，网格的原点位于左上角，x 轴为水平方向，y 轴为垂直方向。Sprite\
    \ 的位置指的是其中心点，即在应用任何旋转之前其宽度和高度的中点。选择此中心位置的原因是为了让 Sprite 能够围绕其中心旋转。TouchDevelop\
    \ 的未来版本可能会提供更多控制 Sprite 偏移量的方法。速度和加速度的单位分别为像素/秒和像素/秒²。\n\n### 9.1.3 游戏程序结构\n\n\
    典型游戏的代码具有如下基本结构。\n\n```\naction main( )\n    ◳board := media → create board(640)\n\
    \    // … 创建精灵，为板添加颜色和特性\n    ◳board → post to wall\n\nevent gameloop( )\n   \
    \ // … 移动物体 …\n    ◳board → update on wall\n```\n\n`gameloop` 事件大约每 50 毫秒触发一次，即每秒约触发\
    \ 20 次。\n\n## 9.2 Board 数据类型\n\n`media` 资源提供了两种创建游戏板的方法；这些方法列在表 9-1 中。TouchDevelop\
    \ 支持的板最大高度为 640 像素。通过 `media` → `create board` 创建的板宽为 456 像素；通过 `media` → `create\
    \ portrait board` 创建的板宽为 480 像素。板在发布到墙之前保持不可见状态。\n\n一旦发布，对板状态和板上 Sprite 的更新仅在调用\
    \ `board` → `update on wall` 时才会变为可见。\n\n`Board` 数据类型中与板尺寸和外观相关的方法列在表 9-2 中。板具有可单独设置的背景色和背景图片。默认背景色为透明，且默认不提供背景图片。另一种可能性是复制设备主摄像头捕获的图像，并将这些图像用作板不断变化的背景。同一时间只能激活其中一种背景选项。\n\
    \n表 9-1 创建板的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `media→create board( height :\
    \ Number) : Board` | 创建一个指定高度（像素）的新板 |\n| `media→create portrait board : Board`\
    \ | 创建一个显示时填满整个屏幕的新板，并假定设备处于竖屏模式。 |\n| `media→create landscape board : Board`\
    \ | 创建一个显示时填满整个屏幕的新板，并假定设备处于横屏模式。 |\n"
- fmt: "### 9.2.1 Creating sprites\n\nThere are four kinds of sprite that display\
    \ different kinds of visual content. They can have the shapes of ellipses or rectangles.\
    \ They can be drawn as solid figures, or they can take the form of a piece of\
    \ updatable text, or be created from a picture. There is a fifth kind of sprite\
    \ known as an anchor sprite. It is invisible and has a special purpose, which\
    \ is explained below under the heading ‘springs and anchors’. Sprites are associated\
    \ with particular game boards and are created by methods of the `Board` type.\
    \ The methods for creating and accessing sprites are listed in Table [9-3](#text00009.html#Tab3).\n\
    \nSprites have initial positions centered on the board and no speed or angular\
    \ rotation. These properties can be set for each sprite using the methods of the\
    \ `Sprite` datatype.\n\nIn addition to the `at` method, a for each loop can be\
    \ used to access all the sprites on a board. If `board` is a variable of type\
    \ `Board`, then the loop has the following structure.\n\n```\nfor each sprite\
    \ in board where true do\n\n           // access the sprite\n```\n\n**Table 9-3**\
    \  \nMethods of `Board` datatype: creating / accessing sprites\n\n| Board Method\
    \ | Description |\n| --- | --- |\n| `at(i : Number) : Sprite` | Returns sprite\
    \ number `i` on this board instance (0 ≤ `i` < `count`) |\n| `count : Number`\
    \ | Returns the number of sprites on this board |\n| `create anchor(width : Number,\
    \ height : Number) : Sprite` | Creates an invisible unmovable anchor sprite |\n\
    | `create ellipse(width : Number, height : Number) : Sprite` | Creates a sprite\
    \ with an elliptical shape |\n| `create picture(picture : Picture) : Sprite` |\
    \ Creates a sprite with the same dimensions and image as the picture |\n| `create\
    \ rectangle(width : Number, height : Number) : Sprite` | Creates a sprite with\
    \ a rectangular shape |\n| `create sprite set : Sprite Set` | Creates an empty\
    \ collection of sprites |\n| `create text(width : Number, height : Number, fontSize\
    \ : Number, text : String) : Sprite` | Creates a sprite which is displayed on\
    \ the board as a text string |\n\n**Table 9-2**  \nMethods of `Board` datatype:\
    \ appearance\n\n| Board Method | Description |\n| --- | --- |\n| `clear background\
    \ camera : Nothing` | Removes any association of the board’s background image\
    \ with the camera |\n| `clear background picture : Nothing` | Removes any background\
    \ picture provided for the board |\n| `height : Number` | Returns the board height\
    \ in pixels |\n| `is landscape board : Boolean` | Returns `true` if the board\
    \ is designed for viewing in landscape mode |\n| `set background(color : Color)\
    \ : Nothing` | Sets the background color for the board |\n| `set background camera(camera\
    \ : Camera) : Nothing` | Sets the background for the board to be image captured\
    \ by the primary camera |\n| `set background picture(picture : Picture) : Nothing`\
    \ | Sets a background picture to display on the board |\n| `width : Number` |\
    \ Returns the board width in pixels |\n\nDuring games it is very useful to have\
    \ several collections of sprites. For example, one collection contains spacecraft,\
    \ another asteroids, and so on.\n\nA sprite collection can be created as an instance\
    \ of the `Sprite Set` datatype. The method `create sprite set` creates a new set\
    \ which can hold sprites associated with the `Board` instance. Sprites can be\
    \ added to and removed from these sets by using methods of the `Sprite Set` datatype.\n\
    \n### 9.2.2 Obstacles and boundaries\n\nObstacles are walls that can be added\
    \ to the board. Walls cannot be moved once created. Moving sprites which encounter\
    \ an obstacle will bounce back with a speed determined by the product of the obstacle’s\
    \ elasticity and the sprite’s elasticity. Elasticities of 1 for both the obstacle\
    \ and the sprite means the sprite will maintain its full speed, albeit in a different\
    \ direction. If one or both elasticities are 0, there will be full absorption\
    \ of the impulse; the sprite will stick to the wall. By default, all elasticities\
    \ are 1.\n\nBy default, the board is open, meaning it has no boundary. Sprites\
    \ moving off the visual part of the board will simply continue moving away. Since\
    \ it is common to need reflecting walls around the board, the `create boundary(distance)`\
    \ method can be used to create a reflective set of walls around the board at the\
    \ given distance from the board’s edges. The elasticity of these reflective walls\
    \ is 1, i.e. the sprite’s speed is not reduced. If the distance of the boundary\
    \ from the board’s edge is larger than the sprite’s size, a sprite can disappear\
    \ off the screen before bouncing back and re-appearing. If the distance is set\
    \ as a negative number, the boundaries are located inside the board area.\n\n\
    The methods for creating obstacles and boundaries are listed in Table [9-4](#text00009.html#Tab4).\n\
    \n### 9.2.3 Forces and animation"
  raw: '### 9.2.1 Creating sprites


    There are four kinds of sprite that display different kinds of visual content.
    They can have the shapes of ellipses or rectangles. They can be drawn as solid
    figures, or they can take the form of a piece of updatable text, or be created
    from a picture. There is a fifth kind of sprite known as an anchor sprite . It
    is invisible and has a special purpose, which is explained below under the heading
    ‘springs and anchors’. Sprites are associated with particular game boards and
    are created by methods of the `Board` type. The methods for creating and accessing
    sprites are listed in Table [9-3](#text00009.html#Tab3) .


    Sprites have initial positions centered on the board and no speed or angular rotation.
    These properties can be set for each sprite using the methods of the `Sprite`
    datatype.


    In addition to the `at` method, a for each loop can be used to access all the
    sprites on a board. If `board` is a variable of type `Board` , then the loop has
    the following structure.


        `for each` `sprite` `in` `board` `where` `true` `do`


               `// access the sprite`


    Table 9-3


    Methods of Board datatype: creating / accessing sprites


    | Board Method | Description |

    | --- | --- |

    | `at(i : Number) : Sprite` | Returns sprite number i on this board instance (0
    ≤ i < count) |

    | `count : Number` | Returns the number of sprites on this board |

    | `create anchor(width : Number, height : Number) : Sprite` | Creates an invisible
    unmovable anchor sprite |

    | `create ellipse(width : Number, height : Number) : Sprite` | Creates a sprite
    with an elliptical shape |

    | `create picture(picture : Picture) : Sprite` | Creates a sprite with the same
    dimensions and image as the picture |

    | `create rectangle(width : Number, height : Number) : Sprite` | Creates a sprite
    with a rectangular shape |

    | `create sprite set : Sprite Set` | Creates an empty collection of sprites |

    | `create text(width : Number,` `height : Number, fontSize : Number, text : String)
    : Sprite` | Creates a sprite which is displayed on the board as a text string
    |


    Table 9-2


    Methods of Board datatype: appearance


    | Board Method | Description |

    | --- | --- |

    | `clear background camera : Nothing` | Removes any association of the board’s
    background image with the camera |

    | `clear background picture : Nothing` | Removes any background picture provided
    for the board |

    | `height : Number` | Returns the board height in pixels |

    | `is landscape board : Boolean` | Returns true if the board is designed for viewing
    in landscape mode |

    | `set background(color : Color) : Nothing` | Sets the background color for the
    board |

    | `set background camera(camera : Camera) : Nothing` | Sets the background for
    the board to be image captured by the primary camera |

    | `set background picture(` `picture : Picture) : Nothing` | Sets a background
    picture to display on the board |

    | `width : Number` | Returns the board width in pixels |


    During games it is very useful to have several collections of sprites. For example,
    one collection contains spacecraft, another asteroids, and so on.


    A sprite collection can be created as an instance of the `Sprite Set` datatype.
    The method `create sprite set` creates a new set which can hold sprites associated
    with the `Board` instance. Sprites can be added to and removed from these sets
    by using methods of the `Sprite Set` datatype.


    ### 9.2.2 Obstacles and boundaries


    Obstacles are walls that can be added to the board. Walls cannot be moved once
    created. Moving sprites which encounter an obstacle will bounce back with a speed
    determined by the product of the obstacle’s elasticity and the sprite’s elasticity.
    Elasticities of 1 for both the obstacle and the sprite means the sprite will maintain
    its full speed, albeit in a different direction. If one or both elasticities are
    0, there will be full absorption of the impulse; the sprite will stick to the
    wall. By default, all elasticities are 1.


    By default, the board is open, meaning it has no boundary. Sprites moving off
    the visual part of the board will simply continue moving away. Since it is common
    to need reflecting walls around the board, the `create boundary(distance)` method
    can be used to create a reflective set of walls around the board at the given
    distance from the board’s edges. The elasticity of these reflective walls is 1,
    i.e. the sprite’s speed is not reduced. If the distance of the boundary from the
    board’s edge is larger than the sprite’s size, a sprite can disappear off the
    screen before bouncing back and re-appearing. If the distance is set as a negative
    number, the boundaries are located inside the board area.


    The methods for creating obstacles and boundaries are listed in Table [9-4](#text00009.html#Tab4)
    .


    ### 9.2.3 Forces and animation'
  trans: "\n### 9.2.1 创建精灵\n\n精灵共有四种类型，可显示不同种类的视觉内容。它们可以呈现为椭圆形或矩形，可以绘制为实心图形，也可以采用可更新文本的形式，或从图片创建而来。还有第五种称为**锚点精灵**的精灵类型，它不可见且有特殊用途，相关内容将在下方“弹簧与锚点”小节中解释。精灵与特定的游戏板相关联，并通过`Board`类型的方法创建。用于创建和访问精灵的方法详见表\
    \ 9-3。\n\n精灵的初始位置位于游戏板中央，且没有移动速度或角旋转。可使用`Sprite`数据类型的方法为每个精灵设置这些属性。\n\n除`at`方法外，还可使用`for\
    \ each`循环访问游戏板上的所有精灵。若`board`是`Board`类型的变量，则循环结构如下所示。\n\n```\nfor each sprite\
    \ in board where true do\n\n           // 访问精灵\n```\n\n**表 9-3**  \n`Board`数据类型的方法：创建/访问精灵\n\
    \n| Board 方法 | 描述 |\n| --- | --- |\n| `at(i : Number) : Sprite` | 返回此游戏板实例上编号为`i`的精灵（0\
    \ ≤ `i` < `count`） |\n| `count : Number` | 返回此游戏板上的精灵数量 |\n| `create anchor(width\
    \ : Number, height : Number) : Sprite` | 创建一个不可移动的不可见锚点精灵 |\n| `create ellipse(width\
    \ : Number, height : Number) : Sprite` | 创建一个椭圆形精灵 |\n| `create picture(picture\
    \ : Picture) : Sprite` | 创建一个尺寸和图像与指定图片相同的精灵 |\n| `create rectangle(width : Number,\
    \ height : Number) : Sprite` | 创建一个矩形精灵 |\n| `create sprite set : Sprite Set`\
    \ | 创建一个空的精灵集合 |\n| `create text(width : Number, height : Number, fontSize : Number,\
    \ text : String) : Sprite` | 创建一个在游戏板上显示为文本字符串的精灵 |\n\n**表 9-2**  \n`Board`数据类型的方法：外观\n\
    \n| Board 方法 | 描述 |\n| --- | --- |\n| `clear background camera : Nothing` | 移除游戏板背景图像与摄像头的任何关联\
    \ |\n| `clear background picture : Nothing` | 移除为游戏板设置的任何背景图片 |\n| `height : Number`\
    \ | 返回游戏板的像素高度 |\n| `is landscape board : Boolean` | 若游戏板设计为横向模式查看，则返回`true` |\n\
    | `set background(color : Color) : Nothing` | 设置游戏板的背景颜色 |\n| `set background\
    \ camera(camera : Camera) : Nothing` | 将游戏板背景设为主摄像头捕获的图像 |\n| `set background\
    \ picture(picture : Picture) : Nothing` | 设置要在游戏板上显示的背景图片 |\n| `width : Number`\
    \ | 返回游戏板的像素宽度 |\n\n在游戏过程中，拥有多个精灵集合非常有用。例如，一个集合包含宇宙飞船，另一个集合包含小行星等。\n\n精灵集合可以创建为`Sprite\
    \ Set`数据类型的实例。`create sprite set`方法可创建一个新集合，用于容纳与该`Board`实例关联的精灵。通过使用`Sprite Set`数据类型的方法，可以将精灵添加到此集合或从中移除。\n\
    \n### 9.2.2 障碍物与边界\n\n障碍物是可添加到游戏板上的墙壁。墙壁一旦创建便无法移动。遇到障碍物的移动精灵将会反弹，其速度由障碍物弹性与精灵弹性的乘积决定。若障碍物和精灵的弹性均为\
    \ 1，则精灵将保持全速，只是方向发生改变。若其中一个或两个弹性均为 0，则冲力将被完全吸收，精灵会粘在墙壁上。默认情况下，所有弹性均为 1。\n\n默认情况下，游戏板是开放的，即没有边界。移出游戏板可视区域的精灵会继续远离。由于通常需要在游戏板四周设置反射墙壁，因此可使用`create\
    \ boundary(distance)`方法，在距离游戏板边缘指定距离处创建一组反射墙壁。这些反射墙壁的弹性为 1，即精灵速度不会降低。若边界距离游戏板边缘的距离大于精灵的尺寸，精灵可能会在反弹并重新出现之前从屏幕上消失。若距离设为负数，则边界位于游戏板区域内部。\n\
    \n用于创建障碍物和边界的方法详见表 9-4。\n\n### 9.2.3 力与动画\n"
- fmt: '#### Gravity and friction


    A uniform force can be applied to all sprites on the board. For instance, there
    could be a force which pulls all objects towards the bottom of the screen, mimicking
    the force of gravity. However this gravitational force need not remain constant.
    If the device possesses the necessary sensors, the script can repeatedly use the
    device’s orientation, as determined by its gyroscope, or its accelerometer readings
    to vary the force and direction of gravity that is experienced by objects in the
    game.


    **Table 9-4** Methods of `Board` datatype: obstacles / boundaries


    | Board Method | Description |

    | --- | --- |

    | `create boundary(distance : Number) : Nothing` | Create perfectly reflective
    walls around the board at the given distance from its edges |

    | `create obstacle(x : Number, y : Number, xsegment : Number, ysegment : Number,
    elasticity : Number) : Nothing` | Create a solid obstacle in the form of a line
    starting at x, y and continuing xsegment, ysegment in the x and y directions;
    elasticity is in the range 0 (sticky) to 1 (fully reflective) |


    Once sprites are given speeds or if gravity has been made non-zero, the board
    engine can update a sprite''s position. To update all sprite positions for one
    time step, the `board` → `evolve` method should be invoked. The duration of the
    time step is simply the time since the last call to `board` → `evolve` or since
    the creation of the board.


    A simple script which uses obstacles and gravity appears in Figure [9-1](#text00009.html#Fig1).


    ![A978-1-4302-6137-7_9_Fig1_HTML.jpg](Image00049.jpg)


    **Figure 9-1** Example script: a moving ball (`/nyuc`)


    The script creates a board and adds a reflective wall around the entire board.
    It then creates a small obstacle wall and a single sprite in the shape of a ball.
    Within the game loop, the accelerometer is used to set the gravity on the game
    board. To make the ball move more quickly, the acceleration is scaled by a factor
    of 1000.


    By default, a sprite keeps on moving without slowing down. It can lose speed only
    if it moves in an opposite direction to gravity or if it loses energy in a collision
    with an obstacle whose elasticity is less than 1. If it is desirable to make sprites
    slow down by themselves, a default friction setting can be provided for the board
    or for each sprite individually.


    Each sprite can have its own friction setting but, if not set, each sprite experiences
    the default friction from the board. A friction is defined as the fraction of
    the forward speed that is experienced as a backwards force. A friction of 0 corresponds
    to no friction, and a friction of 1 means the sprite will not move at all.


    The methods for animating the board and applying forces to sprites are summarized
    in Table [9-5](#text00009.html#Tab5).


    **Table 9-5** Methods of `Board` datatype: forces / animation


    | Board Method | Description |

    | --- | --- |

    | `create spring(sprite1 : Sprite, sprite2 : Sprite, stiffness : Number) : Nothing`
    | Creates an attractive force between two sprites; stiffness determines the strength
    of the force |

    | `evolve : Nothing` | Update the positions of all sprites on the board |

    | `set friction(friction : Number) : Nothing` | Set the default friction for all
    sprites which do not have their own friction settings; friction is in the range
    0 (no loss of speed) to 1 (total loss of speed) |

    | `set gravity(x : Number, y : Number) : Nothing` | Sets a uniform acceleration
    vector x,y for all sprites on the board |


    #### Springs and anchors


    A spring can be added between two sprites to make them accelerate towards each
    other. A spring is created by the `create spring` method listed in Table [9-5](#text00009.html#Tab5).
    The force of the spring is proportional to the distance between the two sprites.
    The further they are apart, the stronger the force. The constant of proportionality
    is determined by the stiffness parameter of `create spring`. The larger its value,
    the stronger the attractive force.


    Without friction to dissipate energy over time, sprites linked by a spring will
    oscillate indefinitely. With friction, they will eventually converge on the same
    point. A common scenario is to fix one of the two spring-linked sprites on the
    board (make it unmovable).


    One way to produce an unmovable sprite is to set its friction to 1. An alternative
    possibility is to use an invisible anchor sprite. The `create anchor` method creates
    the invisible sprite with its friction set to 1.0. A sprite linked to an anchor
    via a spring therefore oscillates around the anchor. Giving the sprite an initial
    velocity vector perpendicular to the direction of the spring causes the sprite
    to circle around the anchor. With multiple anchors and springs, some interesting
    oscillation paths can be produced.


    ## 9.3 The `Sprite` datatype


    Sprites are movable objects which visually represent parts of a game, such as
    space ships and asteroids. New sprites are created with methods of the `Board`
    datatype. Once a sprite has been created, its position, speed, mass, color, etc.,
    can be set with methods of the `Sprite` datatype.


    ### Visual attributes


    Visual attributes of a sprite such as its color and size are accessed through
    the methods listed in Table [9-6](#text00009.html#Tab6).


    **Table 9-6** Methods of `Sprite` datatype: visual attributes


    | Board Method | Description |

    | --- | --- |

    | `color : Color` | Returns the sprite’s color |

    | `height : Number` | Returns the sprite’s height in pixels |

    | `hide : Nothing` | Hide the sprite (make it invisible) |

    | `is visible : Boolean` | Returns true if the sprite is not hidden |

    | `move clip(x : Number, y : Number) : Nothing` | Adjusts the clipping region
    around a sprite created from a picture |

    | `opacity : Number` | Returns the sprite’s opacity; 0 is transparent, 1 is opaque
    |

    | `picture : Picture` | Returns the picture for a picture sprite |

    | `set clip(left : Number, top : Number, width : Number, height : Number) : Nothing`
    | Sets a clipping region for a sprite created from a picture (an image sprite)
    |

    | `set color(color : Color) : Nothing` | Sets the sprite’s color (ignored if it
    is a picture sprite) |

    | `set height(height : Number) : Nothing` | Sets the sprite’s height, measured
    in pixels |

    | `set opacity(opacity : Number) : Nothing` | Sets the sprite’s opacity; 0 is
    transparent, 1 is opaque |

    | `set picture(pic : Picture) : Nothing` | Replaces the picture for sprite created
    from a picture (ignored for non-picture sprites) |

    | `set text(text : String) : Nothing` | Replaces the text for a sprite created
    from a text string (ignored for non-text sprites) |

    | `set width(width : Number) : Nothing` | Sets the sprite’s width, measured in
    pixels |

    | `set z index(zindex : Number) : Nothing` | Sets the z-index of the sprite |

    | `show : Nothing` | Show the sprite (the opposite of hide) |

    | `text : String` | Gets the text from a text sprite |

    | `width : Number` | Gets the sprite’s width, measured in pixels |

    | `z index : Number` | Gets the z-index of the sprite |


    The z-index, accessed by the methods `set z index` and `z index`, provide control
    over the order in which sprites are rendered on the screen. If two sprites overlap,
    the sprite which is rendered second will appear to be on top of the first sprite.


    The rendering order can be controlled by the z-index values. When these values
    are provided, the sprites are rendered in order of their z-indexes, from smallest
    to largest.


    ### Position and motion


    A sprite has a current position and a current angular orientation. Both of these
    change at rates determined by the sprite’s speed and its angular velocity. These
    attributes of a sprite are accessed or changed by using the methods listed in
    Table [9-8](#text00009.html#Tab8).'
