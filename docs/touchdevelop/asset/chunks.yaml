  raw: '### 4.3.2 Downloading information in XML format


    XML is short for Extensible Markup Language . It is a notation for adding markup
    to a text document so as to show its structure. It provides an alternative to
    JSON for delivering results from web services in a format which can easily be
    processed by software and which is moderately easy for a human to read.


    ![A978-1-4302-6137-7_4_Fig7_HTML.jpg](Image00034.jpg)


    Figure 4-7


    Accessing Twitter with a library


    An incomplete example of the XML produced by the weather2 service is shown in
    Figure [4-8](#text00004.html#Fig8) . The information is the same as shown in Figure
    [4-6](#text00004.html#Fig6) but, because it is rather more voluminous, only the
    first 25 lines are displayed. As seen in the example, the start of a component
    (a logical unit) in the document is flagged by an opening tag such as `<weather>`
    . The end of that component is flagged by a matching close tag such as `</weather>`
    . The components can be nested, as seen in the figure.


    An opening tag can include attributes, such as this one `<font name=”Courier”
    size=”12”>` , though this possibility does not occur in the weather data.


    Downloading XML data requires a call to `web` →`download` to fetch the data as
    a string, and then a call to `web` →`xml` to parse the string as XML, as in the
    following example.


            `var` `xobj := web→xml( web→download( "` [`http://www.myweather2.com/`](http://www.myweather2.com/)


    `developer/forecast.ashx?uac=X&output=xml&query=SW1"))`


    The result of the code is a value with the datatype `Xml Object` . This datatype
    provides methods for traversing the XML object and extracting various components.
    The methods are listed in Appendix C.


    Extracting the current temperature from XML shown in Figure [4-8](#text00004.html#Fig8)
    can be programmed as follows.


    ![A978-1-4302-6137-7_4_Fig8_HTML.jpg](Image00035.jpg)


    Figure 4-8


    Weather data in JSON format


            `// assume xobj has been read using the call previously shown`


            `if` `xobj → is invalid` `then`


                    `"unable to download XML data" → post to wall`


            `else`


                    `var` `cw := xobj → child("curren_weather")`


                    `// get temperature`


                    `var` `temp := cw → child("temp") → to string`


                    `// get temperature units`


                    `var` `units := cw → child("temp_unit") → to string`


                    `("Today’s temperature is " || temp || units) → post to wall`


    As with JSON, it is fairly easy to figure out how to extract the desired information
    just by looking at an example of the XML data. However, the structure of the XML
    is almost always rigidly defined by a DTD (Document Type Definition) which specifies
    the tag names to use and how they are allowed to nest inside other tagged sections.
    It is preferable to consult the DTD when developing scripts for processing XML.


    ## 4.4 REST guidelines and web requests


    Many web services implement those services in a manner which follows guidelines
    known as REST. It is short for REpresentational State Transfer . Such a web service
    is often described as being RESTful. A starting point for reading about the REST
    guidelines is provided by Wikipedia at this URL: [`http://en.wikipedia.org/wiki/REST`](http://en.wikipedia.org/wiki/REST)
    .


    In particular, HTTP GET and POST requests are used to access many of the facilities
    of a RESTful web service and the API calls provided for uploading and downloading
    to or from the web may be adequate. The HTTP PUT and DELETE requests are not supported
    on the Windows Phone platform and therefore cannot be generated by a TouchDevelop
    script. Many RESTful web services provide alternatives to the PUT and DELETE requests.


    The API method `web` →`create request` may be used to construct a general HTTP
    request. The request is constructed as an instance of the `Web Request` datatype.
    When the request is sent to the web service, the result comes back as an instance
    of the `Web Response` type. The methods of these two datatypes are summarized
    in Table [4-4](#text00004.html#Tab4) and Table [4-5](#text00004.html#Tab5) . (Methods
    available for all datatypes are omitted from these two tables.)


    Table 4-4


    Methods of Web Request datatype


    | Method | Description |

    | --- | --- |

    | `header(name : String) : String` | Gets the value of a header identified by
    name |

    | `header names : String Collection` | Gets the names of all the headers |

    | `method : String` | Returns the HTML method: “get” or “post” |

    | `send : Web Response` | Sends the request and waits for a response |

    | `set compress(value : Boolean) : Nothing` | If the argument is true, the request
    content is compressed with gzip (and the header is updated). |

    | `set content(content : String) : Nothing` | Sets the content of a POST request
    |

    | `set content as json(json : Json Object) : Nothing` | Sets the content of a
    POST request as a JSON data structure |

    | `set content as picture(picture : Picture, quality : Number) : Nothing` | Sets
    the content of a POST request as a JPEG image; the quality parameter ranges from
    0 for low quality (maximum compression) to 1 for best quality. |

    | `set content as xml(xml : Xml Object): Nothing` | Sets the content of a POST
    request as an XML data structure |

    | `set credentials(name : String,password : String): Nothing` | Sets the name
    and password when the website requires authentication; the URL for the request
    must specify HTTPS protocol. |

    | `set header( name : String,` `value : String): Nothing` | Sets a HTML header
    value. |

    | `set method( method : String) : Nothing` | Sets the method; it must be “get”
    or “post”. |

    | `set url(url : String) : Nothing` | Sets the URL. |

    | `url : String` | Returns the URL used in this request |


    An example of constructing a web request and using the response is provided by
    the script cosm services (`/ybnr` ).


    Table 4-5


    Methods of Web Response datatype


    | Method | Description |

    | --- | --- |

    | `content : String` | Gets the content of the response body as a string |

    | `content as json : Json Object` | Gets the content of the response body as a
    JSON data structure |

    | `content as picture : Picture` | Gets the content of the response body as a
    picture |

    | `content as sound : Sound` | Gets the content of the response body as a sound
    in WAV format |

    | `content as xml : Xml Object` | Gets the content of the response body as an
    XML structure |

    | `header(name : String) : String` | Gets value of the HTML header with the given
    name |

    | `header names : String Collection` | Gets the names of the headers |

    | `request : Web Request` | Gets the web request which was used |

    | `status code : Number` | Gets the HTTP status code associated with the request
    |


