  trans: '

    # 本书读者对象


    移动设备代表了最新的技术。此外，许多学生实际上拥有自己的智能手机。高中教师和大学讲师都喜欢利用最新技术来吸引学生的注意力。尽管他们可能是编程教学领域的专家，但许多教师在如何驾驭像`TouchDevelop`这样复杂的应用方面仍需要指导：其可视化程序编辑器专为触摸屏设计，并采用了与传统基于键盘的文本处理器不同的编辑范式。另一个机遇与挑战在于如何利用现代移动设备所提供的一些传感器。


    本书为教师以及自学编程的学生提供了丰富的内容。对于教师而言，本书详细介绍了应用的各个屏幕，并指出了`TouchDevelop`语言与其他教师可能已熟悉的编程语言之间的异同。对于学生和爱好者来说，本书可以作为一个便捷的参考手册，放在他们正在使用的设备旁边——尤其是当该设备屏幕较小时，本书显得尤为实用。本书系统地阐述了所有编程语言结构，从变量和循环等最基础的结构开始。本书还探讨了许多手机传感器和数据源，这些正是让移动应用开发如此有价值的原因。


    如果你刚接触`TouchDevelop`编程，或者你还没有在触摸屏设备上工作过，我们建议你从第 1 章开始阅读本书。如果你已经熟悉`TouchDevelop`编程环境的基本模式，那么你可以直接跳到后面涉及特定主题领域的章节。


    本书是从用户在浏览器中编写代码的角度编写的。所有截图和导航说明均指在浏览器中运行的`TouchDevelop` Web 应用，并适用于除 Windows Phone
    之外的所有平台。只有附录 E（介绍 Windows Phone 上的编辑器）使用了特定于 Windows Phone 的截图和说明。


    本书可在网上获取，同时也由 APress 出版纸质版本。请发送电子邮件至`touchdevelop@microsoft.com`提供反馈。


    ## 本书背景


    本书的这一版本是早期版本历经一年演进的成果，融合了作者在辅导课和讲座中收到的反馈。本书的第一个版本作为限量版（75 本）在 2012 年 3 月于北卡罗来纳州罗利举行的
    ACM SIGCSE 会议上制作发行。那个版本基于当时最新发布的`TouchDevelop` 2.6 版本。第二个版本（1000 本）于 2013 年 1
    月印刷，基于 2.10 版本，并通过知识共享许可协议发布，同时上架亚马逊书店和`TouchDevelop`网站。第二版中的大部分内容也适用于`TouchDevelop`的
    Web 应用版，不过所有截图仍然是手机上的。这第三版已重新定位为`TouchDevelop`的 Web 应用版。


    ## 其他学习资料


    在`TouchDevelop`网站上，你还可以找到大量的视频、教程和幻灯片，以帮助你学习和教授`TouchDevelop`。只需登录`TouchDevelop`网站后，点击“聊天与学习”标题下标注为“Docs”的大图标，即可找到这些学习资源。


    欢迎提出宝贵意见。如需联系 TouchDevelop 团队或作者，你可以：


    -   发送电子邮件至 `touchdevelop@microsoft.com`

    -   在 [`https://facebook.com/touchdevelop`](https://facebook.com/touchdevelop)
    上发帖

    -   在应用内的论坛上发帖


    重要网站


    [`https://www.touchdevelop.com`](https://www.touchdevelop.com/)


    [`https://www.facebook.com/TouchDevelop`](https://www.facebook.com/TouchDevelop)


    [`http://research.microsoft.com/touchdevelop`](http://research.microsoft.com/touchdevelop)


    TouchDevelop 团队


    ![A978-1-4302-6137-7_BookFrontmatter_Fig1_HTML.jpg](img/Image00002.jpg)


    托马斯（汤姆）·鲍尔是微软研究院（雷德蒙德）的首席研究员和研究经理，因在程序性能分析、软件模型检查、程序测试和实证软件工程方面的贡献而广为人知。鲍尔因“对软件分析和缺陷检测的贡献”而被授予
    2011 年 ACM Fellow 称号。自从在微软担任经理以来，他培育并扩展了自动定理证明、程序测试与验证以及实证软件工程等研究领域。他拥有康奈尔大学计算机科学学士学位，以及威斯康星大学麦迪逊分校的硕士和博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig2_HTML.jpg](img/Image00003.jpg)


    朱迪斯·毕晓普是美国雷德蒙德微软研究院计算机科学总监。她的职责是通过鼓励项目、支持会议和直接参与研究，在微软的研究团队与全球大学之间建立强有力的联系。她的专长是编程语言和分布式系统，具有强烈的实践导向，并对编译器和设计模式感兴趣。她是
    17 本编程语言书籍的作者或编辑。她拥有英国南安普顿大学的计算机科学博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig3_HTML.jpg](img/Image00004.jpg)


    塞巴斯蒂安·伯克哈特是微软研究院的研究员。他在瑞士巴塞尔出生并长大。他的研究兴趣主要围绕如何方便、高效、正确地编写并发、并行和分布式程序这一普遍问题。更具体的兴趣包括一致性模型、并发测试、自适应计算和并发修订编程模型。在
    IBM 拥有几年行业经验后，他在宾夕法尼亚大学获得了计算机科学博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig4_HTML.jpg](img/Image00005.jpg)


    陈娟是微软研究院雷德蒙德分院 RiSE 小组的研究员。她的主要研究领域包括编译器、程序验证和类型系统。她曾致力于面向对象语言的验证编译器，以及用于指定和验证程序属性的函数式编程语言的设计与实现。她拥有普林斯顿大学计算机科学博士学位。


    ![A978-1-4302-6137-7_BookFrontmatter_Fig5_HTML.jpg](img/Image00006.jpg)


    乔纳森·“佩利”·德哈勒是微软研究院软件工程研究小组的软件工程师。佩利还在当地高中志愿教授移动计算机科学课程。从 2004 年到 2006 年，他在公共语言运行时（CLR）团队担任软件设计工程师（测试），负责即时编译器。他拥有比利时鲁汶天主教大学的应用数学博士学位。


