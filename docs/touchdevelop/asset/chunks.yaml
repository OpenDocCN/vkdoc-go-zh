    \ 服务以易于软件处理且人类阅读相对容易的格式传递结果提供了一种 JSON 的替代方案。\n\n![A978-1-4302-6137-7_4_Fig7_HTML.jpg](img/Image00034.jpg)\n\
    \n**图 4-7** 使用库访问 Twitter\n\n图 4-8 展示了由 `weather2` 服务生成的 XML 的一个不完整示例。其信息与图 4-6\
    \ 所示相同，但由于其内容更为丰富，因此仅显示了前 25 行。如示例所示，文档中某个组件（逻辑单元）的开始由开始标签（如 `<weather>`）标记。该组件的结束则由匹配的结束标签（如\
    \ `</weather>`）标记。如图中所示，组件可以嵌套。\n\n开始标签可以包含属性，例如 `<font name=\"Courier\" size=\"\
    12\">`，不过在天气数据中未出现这种情况。\n\n下载 XML 数据需要先调用 `web→download` 将数据作为字符串获取，然后调用 `web→xml`\
    \ 将字符串解析为 XML，如下例所示。\n\n```\nvar xobj := web→xml( web→download( \"http://www.myweather2.com/developer/forecast.ashx?uac=X&output=xml&query=SW1\"\
    ))\n```\n\n这段代码的结果是一个数据类型为 `Xml Object` 的值。该数据类型提供了遍历 XML 对象并提取各种组件的方法。这些方法列于附录\
    \ C。\n\n从图 4-8 所示的 XML 中提取当前温度可以按如下方式编程。\n\n![A978-1-4302-6137-7_4_Fig8_HTML.jpg](img/Image00035.jpg)\n\
    \n**图 4-8** JSON 格式的天气数据\n\n```\n// 假设 xobj 已通过之前展示的调用读取\nif xobj → is invalid\
    \ then\n    \"无法下载 XML 数据\" → post to wall\nelse\n    var cw := xobj → child(\"\
