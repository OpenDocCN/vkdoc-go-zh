    \n## 前言\n\n智能手机的销量持续呈指数级增长。平板电脑也展现出同样惊人的普及率，并在生活的许多领域取代了笔记本电脑。我们可以想象，在不久的将来，几乎每个人都会随身携带一台以智能手机或平板电脑形式呈现的强大计算机。术语“移动设备”即用于涵盖此类设备。通常，智能手机或平板电脑的应用程序（app）必须在个人电脑上开发，然后传输到移动设备上。但情况必须如此吗？微软研究院的\
