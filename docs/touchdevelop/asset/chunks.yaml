    ### 4.2.3 Downloading sounds and music


    TouchDevelop and the Windows phone software support two kinds of audio files –
    short sound clips and longer audio tracks which would usually contain music (or
    spoken voice). In TouchDevelop, these correspond to values with type `Sound` and
    type `Song` respectively.


    If the filename or URL ends with the suffix “.wav” then the file contents are
    in the ‘Waveform Audio File’ (WAV) format and it is material that can be downloaded
    as a `Sound` value. A `Sound` value can only be created from a WAV file. If the
    suffix is `“.mp3` `”` then the material is in an audio format commonly used for
    music and the spoken word. This material can be downloaded as a `Song` value.


    Some code to download and play a sound effect is shown below. (The sound effect
    used in this example comes from the website “Partners in Rhyme” which provides
    royalty-free music and sound-effects.)


            `action` `getSound( )`


                `var` `snd := web → download sound( "` [`http://www.sound-effect.com/pirsounds/WEB_DESIGN_SOUNDS_WAV1/SOUNDFX/TOYLASER.WAV`](http://www.sound-effect.com/pirsounds/WEB_DESIGN_SOUNDS_WAV1/SOUNDFX/TOYLASER.WAV)
    `" )`


                `if` `snd → is invalid` `then`


                        `"unable to download sound" → post to wall`


                `else`


                    `// … proceed to use the sound value snd`


                    `snd → set volume(0.7)`


                    `snd → play`


                    `("Duration = " || snd → duration) → post to wall`


    Example: A script to access and play a song is available as Stream mp3 from internet
    (`/ncwo` ). The script includes some extra features to make it a bit more useful.
    These are events to suspend the playback and to stop the playback permanently.
    When the script is run, the URL can be provided as an argument. If no URL is provided,
    the last used URL is used again.


    ### 4.2.4 Uploading strings and files


    Two API methods are available for uploading material to a website. One method
    uploads a string and the other uploads a picture. Both use the HTPP POST protocol
    for the uploads. Typically, uploads will be performed when interacting with a
    website which follows the REST guidelines (as covered below).


    Here are sample statements which use the API method call for uploading a string.


            `var` `info := “name=an+other&age=37&car=Ford+Mustang”`


            `// upload key-value pairs in the info string to website specified by
    the url`


            `var` `response string := web → upload( url, info )`


    The website which receives the POST request will pass the string onto a program
    for processing and a string returned by the program comes back as the result of
    this API call.


    Uploading a picture is similar. The sample script web stuff (`/hrvg` ) is an example
    of uploading a picture of a QR code in the JPEG format to a website.'
  trans: "\n### 4.2.1 下载文本文件或 HTML\n\n网络资源最简单的格式是文本文件。如果 URL 以`\".txt\"`或`\".text\"\
    `后缀结尾，那么该网络资源几乎肯定是一个纯 ASCII（或 UTF8）文本文件。然而，URL 不一定要有这些后缀才能指向文本文件。\n\n包含 HTML 的网页也是一种文本文件；它只是包含额外命令来指定浏览器显示时网页的结构和格式的文本。如果有用，原始\
    \ HTML 可以像文本文件一样被读取。\n\nTouchDevelop 脚本可以下载文本文件或 HTML 页面，并使用类似此示例中所示的脚本行将其读入`String`变量：\n\
    \n```\naction main( )\n    var s := web →\n        download(\"http://www.smlnj.org/doc/FAQ/faq.txt\"\
    )\n    if s → is invalid then\n            \"无法读取网页\" → post to wall\n    else\n\
    \            // … 继续使用字符串 s\n            \"\" → post to wall\n            s →\
    \ substring(0,100) → post to wall\n            \"前 100 个字符是：\" → post to wall\n\
    \            (\"长度 = \" || s → count) → post to wall\n```\n\n运行此脚本时，结果如图 4-3 所示。不过，大多数情况下，你的脚本会继续对字符串进行比仅仅显示总长度和前\
    \ 100 个字符更复杂的操作。\n\n![A978-1-4302-6137-7_4_Fig3_HTML.jpg](img/Image00030.jpg)\n\
    \n图 4-3\n\n下载文本文件\n\n### 4.2.2 下载图片\n\n有多种格式用于将图片编码为计算机文件。常用的格式有 JPEG、GIF、PNG、BMP、TIFF\
    \ 和 WMP。TouchDevelop 都支持它们。如果文件名或 URL 以`\".jpg\"`、`\".jpeg\"`、`\".gif\"`、`\".png\"\
    `、`\".bmp\"`或`\".wmp\"`后缀结尾，则使用了其中一种格式，并且 TouchDevelop API 中提供的方法应该能够下载并操作该图片。\n\
    \n脚本语句与之前类似，但使用了不同的方法，以便结果以`Picture`值（而不是`String`值）的形式获取。\n\n```\naction main(\
    \ )\n        var pic := web → download picture(\n        \"http://www.touchdevelop.com/Images/title2.png\"\
    )\n        if pic → is invalid then\n                \"无法下载图片\" → post to wall\n\
    \        else\n                // … 继续以某种方式使用图片 pic\n            pic → post to\
    \ wall\n            (\"图片尺寸 = \" || pic → width || \" x \" || pic → height) →\n\
    \        post to wall\n```\n\n运行这个特定脚本会产生如图 4-4 所示的结果。\n\n![A978-1-4302-6137-7_4_Fig4_HTML.jpg](img/Image00031.jpg)\n\
    \n图 4-4\n\n图片下载\n\n### 4.2.3 下载声音和音乐\n\nTouchDevelop 和 Windows 手机软件支持两种音频文件——短音效片段和较长的音频轨道，后者通常包含音乐（或语音）。在\
    \ TouchDevelop 中，它们分别对应类型为`Sound`和`Song`的值。\n\n如果文件名或 URL 以`\".wav\"`后缀结尾，那么文件内容就是“波形音频文件”（WAV）格式，这种素材可以作为`Sound`值下载。`Sound`值只能从\
    \ WAV 文件创建。如果后缀是`\".mp3\"`，那么素材是一种常用于音乐和语音的音频格式。这种素材可以作为`Song`值下载。\n\n下面展示了一些用于下载和播放音效的代码。（此示例中使用的音效来自网站“Partners\
    \ in Rhyme”，该网站提供免版税的音乐和音效。）\n\n```\naction getSound( )\n    var snd := web →\
    \ download sound( \"http://www.sound-effect.com/pirsounds/WEB_DESIGN_SOUNDS_WAV1/SOUNDFX/TOYLASER.WAV\"\
    \ )\n    if snd → is invalid then\n            \"无法下载声音\" → post to wall\n   \
    \ else\n        // … 继续使用声音值 snd\n        snd → set volume(0.7)\n        snd →\
    \ play\n        (\"时长 = \" || snd → duration) → post to wall\n```\n\n示例：一个用于访问和播放歌曲的脚本可通过从互联网流式传输\
    \ mp3（`/ncwo`）获得。该脚本包含一些额外功能使其更有用。这些功能是暂停播放和永久停止播放的事件。运行脚本时，可以将 URL 作为参数提供。如果没有提供\
    \ URL，则会再次使用上次使用的 URL。\n\n### 4.2.4 上传字符串和文件\n\n有两个 API 方法可用于将素材上传到网站。一个方法上传字符串，另一个方法上传图片。两者都使用\
    \ HTTP POST 协议进行上传。通常，在与遵循 REST 指南（如下所述）的网站交互时会执行上传。\n\n以下是使用 API 方法调用上传字符串的示例语句。\n\
    \n```\nvar info := \"name=an+other&age=37&car=Ford+Mustang\"\n// 将 info 字符串中的键值对上传到由\
    \ url 指定的网站\nvar response string := web → upload( url, info )\n```\n\n接收 POST\
    \ 请求的网站会将字符串传递给程序进行处理，程序返回的字符串将作为此 API 调用的结果返回。\n\n上传图片类似。示例脚本 web stuff（`/hrvg`）是将\
    \ JPEG 格式的二维码图片上传到网站的一个示例。\n"
- fmt: "## 4.3 Downloading structured data\n\nThe internet makes a wealth of information\
    \ available to your script. The difficult part is in extracting the information\
    \ you need from a website. Suppose that you want your script to look up the current\
    \ temperature in some location. There are many websites you could use to find\
    \ this information, one of them is [`local.msn.com`](http://local.msn.com/). For\
    \ example, if you point your browser at the URL [`http://local.msn.com/weather.aspx?q=redmond-wa&zip=98052`](http://local.msn.com/weather.aspx?q=redmond-wa&zip=98052),\
    \ it will display a webpage containing much information about current weather\
    \ conditions in Redmond, but where only a tiny part of the page shows the temperature.\
    \ A snapshot showing just a small part of this web page is reproduced in Figure\
    \ [4-5](#text00004.html#Fig5).\n\nWe can, in principle, use the API call `web`\
    \ → `download` to fetch the HTML code for the webpage as one very long string\
    \ of characters. Then we can write some statements which search the HTML code\
    \ for the little snippet of information that we need. In this example, we need\
    \ to search the code for a sequence of characters with a structure like the following.\n\
    \n`<span class=\"curtemp\">53°F</span>`\n\nHere the two characters ‘53’ are the\
    \ data we want to extract and convert to the number 53. You have to study the\
    \ HTML code for the website to figure out what sequence of characters would be\
    \ sufficient to accomplish the task, and no two websites are going to be the same.\
    \ The script may also need to untranslate characters which have been replaced\
    \ by HTML escape sequences. For example, an ampersand character displayed on a\
    \ webpage appears in the HTML code as the five characters `“&amp;”`. The API provides\
    \ two methods for converting between special characters and their HTML escape\
    \ sequences. These are `web` → `html decode` and `web` → `html encode`.\n\n![A978-1-4302-6137-7_4_Fig5_HTML.jpg](Image00032.jpg)\n\
    \n**Figure 4-5** Snapshot of a weather webpage\n\nThe kind of programming which\
    \ analyzes webpages to extract information is known as **web scraping** (or **web\
    \ harvesting**). You should write code like this only if there is no alternative\
    \ and, even then, think twice. This is a job best left for professionals who have\
    \ access to special software, and it is a job which has to be repeated whenever\
    \ the web designers choose to change the layout of the website being accessed.\n\
    \nWhat can we do instead? The best answer is to find an internet site which serves\
    \ up the information you need in a more easily digestible format. Two formats,\
    \ widely used for delivering information in a systematic and simple manner, are\
    \ XML and JSON.\n\nBoth these formats are supported by TouchDevelop, and will\
    \ be explained with simple examples in the following sections of this chapter.\
    \ In the particular case where we need to find the current weather in some location,\
    \ there are several suitable websites. One of them is ‘The Weather Channel’ but,\
    \ unfortunately access to this service requires a monthly subscription. A free\
    \ alternative is Weather2 which supplies both JSON and XML: [`http://www.myweather2.com/developer/`](http://www.myweather2.com/developer/)\n\
    \n### 4.3.1 Downloading information in JSON format\n\nJSON is short for **JavaScript\
    \ Object Notation**. It is a text format which borrows notations and data structuring\
    \ ideas from the JavaScript scripting language. It is a format which has been\
    \ designed to be easy for processing by computer software (and therefore by TouchDevelop\
    \ scripts too), but is human-readable too.\n\nAn example of some data expressed\
    \ in JSON format appears in Figure [4-6](#text00004.html#Fig6). It is weather\
    \ data obtained from the weather2 service.\n\nThere are only a few simple rules\
    \ for what constitutes a valid JSON representation of information. A file in JSON\
    \ format contains the following elements.\n\n* Numbers and Strings\n* Boolean\
    \ values (`true` or `false`)\n* Arrays – written as a sequence of array elements\
    \ separated by commas, with the whole sequence enclosed in square brackets\n*\
    \ Objects – written as an unordered collection of key-value pairs where a colon\
    \ separates each key from the value, each pair is separated from the next by a\
    \ comma, and the whole collection is enclosed in curly braces; the keys must be\
    \ written as strings and they must be distinct from each other.\n* The special\
    \ value `null`, meaning empty.\n\nReferring back to Figure [4-6](#text00004.html#Fig6),\
    \ we can see that the figure shows an object with just one key-value pair, where\
    \ the key is `“weather”` and the associated value is another object. That object\
    \ contains two key-value pairs; one key is `“curren_weather”` and the other is\
    \ `“forecast”`. The value associated with `“curren_weather”` is an array that\
    \ contains just one element, which is an object. The value associated with `“forecast”`\
    \ is an array containing two elements, and the two elements are objects with identical\
    \ structures. (The elements do not need to have the same structure, or even have\
    \ the same types, but processing the JSON file is easier if they do.)\n\n![A978-1-4302-6137-7_4_Fig6_HTML.jpg](Image00033.jpg)\n\
    \n**Figure 4-6** Weather data in JSON format\n\n* If we have found a website which\
    \ provides results in JSON format, we can access it using the call `web` → `download\
    \ json`. Here is an example invocation.\n\n```\nvar jobj := web → download json(\n\
    \  \"http://www.myweather2.com/developer/forecast.ashx?uac=X&output=json&query=SW1\"\
    )\n```\n\nIt will download JSON data similar to that shown in Figure [4-6](#text00004.html#Fig6).\
    \ (The ‘X’ shown after `‘uac=’` in the URL must be replaced by a user access code\
    \ which is given to you only if you register with the weather2 website.)\n\nThe\
    \ value retrieved by this API call has the data type `Json Object`. The data type\
    \ provides many methods for accessing information from inside a JSON object. These\
    \ methods are listed in Appendix C. Using these methods, here is how we could\
    \ obtain today’s temperature from the JSON object shown in Figure [4-6](#text00004.html#Fig6).\
    \ The code is shown as a series of very simple steps.\n\n```\n// assume jobj has\
    \ been read using the call previously shown\nif jobj → is invalid then\n  \"unable\
    \ to download JSON data\" → post to wall\nelse\n  var w := jobj → field(\"weather\"\
    )\n  var cw := w → field(\"curren_weather\")\n  // get first element of array\n\
    \  var cw0 := cw → at(0)\n  // get temperature as a Number\n  var temp := cw0\
    \ → string(\"temp\") → to number\n  // get temperature units as a String\n  var\
    \ units := cw0 → string(\"temp_unit\")\n  (\"Today’s temperature is \" || temp\
    \ || units) → post to wall\n```\n\nAll we had to do was look at one example of\
    \ the JSON data produced by our weather query. From that example, it was easy\
    \ to figure out how to extract the information we needed. (Of course, we could\
    \ have also read the documentation provided by the service provider.)\n\nTwo popular\
    \ services which provide results in the JSON format are **Flickr** and **Twitter**.\
    \ Two scripts in the TouchDevelop Samples collections implement libraries for\
    \ using these services. A trivial script which searches for tweets containing\
    \ a particular keyword (or `#tag`) is shown in Figure [4-7](#text00004.html#Fig7).\n\
    \nThe code for the library can be found under the name `twitter search` (`/stlm`).\
    \ It extracts enough information from each tweet to format it as a message with\
    \ an author name, a picture of the author, the date when the tweet was posted,\
    \ plus the message itself."
  raw: '## 4.3 Downloading structured data


    The internet makes a wealth of information available to your script. The difficult
    part is in extracting the information you need from a website. Suppose that you
    want your script to look up the current temperature in some location. There are
    many websites you could use to find this information, one of them is [`local.msn.com`](http://local.msn.com/)
    . For example, if you point your browser at the URL [`http://local.msn.com/weather.aspx?q=redmond-wa&zip=98052`](http://local.msn.com/weather.aspx?q=redmond-wazip=98052)
    , it will display a webpage containing much information about current weather
    conditions in Redmond, but where only a tiny part of the page shows the temperature.
    A snapshot showing just a small part of this web page is reproduced in Figure
    [4-5](#text00004.html#Fig5) .


    We can, in principle, use the API call `web` →`download` to fetch the HTML code
    for the webpage as one very long string of characters. Then we can write some
    statements which search the HTML code for the little snippet of information that
    we need. In this example, we need to search the code for a sequence of characters
    with a structure like the following.


            `<span class="curtemp">53°F</span>`


    Here the two characters ‘53’ are the data we want to extract and convert to the
    number 53\. You have to study the HTML code for the website to figure out what
    sequence of characters would be sufficient to accomplish the task, and no two
    websites are going to be the same. The script may also need to untranslate characters
    which have been replaced by HTML escape sequences. For example, an ampersand character
    displayed on a webpage appears in the HTML code as the five characters `“&amp;”`
    . The API provides two methods for converting between special characters and their
    HTML escape sequences. These are `web` →`html decode` and `web` →`html encode.`


    ![A978-1-4302-6137-7_4_Fig5_HTML.jpg](Image00032.jpg)


    Figure 4-5


    Snapshot of a weather webpage


    The kind of programming which analyzes webpages to extract information is known
    as web scraping (or web harvesting ). You should write code like this only if
    there is no alternative and, even then, think twice. This is a job best left for
    professionals who have access to special software, and it is a job which has to
    be repeated whenever the web designers choose to change the layout of the website
    being accessed.


    What can we do instead? The best answer is to find an internet site which serves
    up the information you need in a more easily digestible format. Two formats, widely
    used for delivering information in a systematic and simple manner, are XML and
    JSON.


    Both these formats are supported by TouchDevelop, and will be explained with simple
    examples in the following sections of this chapter. In the particular case where
    we need to find the current weather in some location, there are several suitable
    websites. One of them is ‘The Weather Channel’ but, unfortunately access to this
    service requires a monthly subscription. A free alternative is Weather2 which
    supplies both JSON and XML: [`http://www.myweather2.com/developer/`](http://www.myweather2.com/developer/)


    ### 4.3.1 Downloading information in JSON format


    JSON is short for JavaScript Object Notation . It is a text format which borrows
    notations and data structuring ideas from the JavaScript scripting language. It
    is a format which has been designed to be easy for processing by computer software
    (and therefore by TouchDevelop scripts too), but is human-readable too.


    An example of some data expressed in JSON format appears in Figure [4-6](#text00004.html#Fig6)
    . It is weather data obtained from the weather2 service.


    There are only a few simple rules for what constitutes a valid JSON representation
    of information. A file in JSON format contains the following elements.


    *   Numbers and Strings

    *   Boolean values (true or false)

    *   Arrays – written as a sequence of array elements separated by commas, with
    the whole sequence enclose in square brackets

    *   Objects – written as an unordered collection of key-value pairs where a colon
    separates each key from the value, each pair is separated from the next by a comma,
    and the whole collection is enclosed in curly braces; the keys must be written
    as strings and they must be distinct from each other.

    *   The special value null , meaning empty.


    Referring back to Figure [4-6](#text00004.html#Fig6) , we can see that the figure
    shows an object with just one key-value pair, where the key is “weather” and the
    associated value is another object. That object contains two key-value pairs;
    one key is `“curren_weather”` and the other is `“forecast”` . The value associated
    with `“curren_weather”` is an array that contains just one element, which is an
    object. The value associated with “forecast” is an array containing two elements,
    and the two elements are objects with identical structures. (The elements do not
    need to have the same structure, or even have the same types, but processing the
    JSON file is easier if they do.)


    ![A978-1-4302-6137-7_4_Fig6_HTML.jpg](Image00033.jpg)


    Figure 4-6


    Weather data in JSON format


    *   If we have found a website which provides results in JSON format, we can access
    it using the call `web→download json` . Here is an example invocation.


    `var` `jobj := web→download json(`


    `"` [`http://www.myweather2.com/developer/forecast.ashx?uac=X`](http://www.myweather2.com/developer/forecast.ashx?uac=X)
    `&`


    `output=json&query=SW1")`


    It will download JSON data similar to that shown in Figure [4-6](#text00004.html#Fig6)
    . (The ‘X’ shown after `‘uac=’` in the URL must be replaced by a user access code
    which is given to you only if you register with the weather2 website.)


    The value retrieved by this API call has the data type `Json Object` . The data
    type provides many methods for accessing information from inside a JSON object.
    These methods are listed in Appendix C. Using these methods, here is how we could
    obtain today’s temperature from the JSON object shown in Figure [4-6](#text00004.html#Fig6)
    . The code is shown as a series of very simple steps.


    `// assume jobj has been read using the call previously shown`


    `if` `jobj → is invalid` `then`


    `"unable to download JSON data" → post to wall`


    `else`


    `var` `w := jobj → field("weather")`


    `var` `cw := w → field("curren_weather")`


    `// get first element of array`


    `var` `cw0 := cw → at(0)`


    `// get temperature as a Number`


    `var` `temp := cw0 → string("temp") → to number`


    `// get temperature units as a String`


    `var` `units := cw0 → string("temp_unit")`


    `("Today’s temperature is " || temp || units) → post to wall`


    All we had to do was look at one example of the JSON data produced by our weather
    query. From that example, it was easy to figure out how to extract the information
    we needed. (Of course, we could have also read the documentation provided by the
    service provider.)


    Two popular services which provide results in the JSON format are Flickr and Twitter
    . Two scripts in the TouchDevelop Samples collections implement libraries for
    using these services. A trivial script which searches for tweets containing a
    particular keyword (or #tag) is shown in Figure [4-7](#text00004.html#Fig7) .


    The code for the library can be found under the name twitter search (`/stlm` ).
    It extracts enough information from each tweet to format it as a message with
    an author name, a picture of the author, the date when the tweet was posted, plus
    the message itself.'
  trans: "\n## 4.3 下载结构化数据\n\n互联网为你的脚本提供了丰富的信息。难点在于如何从网站中提取你需要的信息。假设你想让脚本查询某个地点的当前温度。有许多网站可以用来查找这些信息，其中之一是\
    \ [`local.msn.com`](http://local.msn.com/)。例如，如果你在浏览器中访问 URL [`http://local.msn.com/weather.aspx?q=redmond-wa&zip=98052`](http://local.msn.com/weather.aspx?q=redmond-wa&zip=98052)，它会显示一个包含雷德蒙德当前天气状况大量信息的网页，但页面上只有极小一部分显示了温度。图\
    \ 4-5 重现了该网页的一小部分截图。\n\n原则上，我们可以使用 API 调用 `web` → `download` 将网页的 HTML 代码作为一个非常长的字符串抓取下来。然后，我们可以编写一些语句来搜索\
    \ HTML 代码，找到我们需要的那一小段信息。在这个例子中，我们需要在代码中搜索具有如下结构的字符序列。\n\n`<span class=\"curtemp\"\
    >53°F</span>`\n\n这里的两个字符“53”是我们想要提取并转换为数字 53 的数据。你必须研究网站的 HTML 代码，找出足以完成任务的字符序列，而且没有两个网站会是相同的。脚本可能还需要对已被\
    \ HTML 转义序列替换的字符进行反转义。例如，网页上显示的和号字符，在 HTML 代码中显示为五个字符 `“&amp;”`。该 API 提供了两种在特殊字符及其\
    \ HTML 转义序列之间进行转换的方法。它们是 `web` → `html decode` 和 `web` → `html encode`。\n\n![A978-1-4302-6137-7_4_Fig5_HTML.jpg](img/Image00032.jpg)\n\
    \n**图 4-5** 天气网页截图\n\n这种分析网页以提取信息的编程方式被称为 **网页抓取**（或 **网页收割**）。你只应在别无选择的情况下编写此类代码，即便如此，也应三思而后行。这项工作最好留给拥有专用软件的专业人士去做，而且每当网站设计师更改目标网站的布局时，这项工作都必须重做一遍。\n\
    \n那我们还能做什么？最好的答案是找到一个能以更易于消化的格式提供所需信息的互联网站点。XML 和 JSON 是两种被广泛用于以系统和简单的方式传递信息的格式。\n\
    \nTouchDevelop 支持这两种格式，本章后续章节将通过简单示例进行说明。就查找某个地点的当前天气这一特定需求而言，有几个合适的网站。其中之一是“天气频道”，但不幸的是，访问该服务需要每月订阅。一个免费的替代方案是\
    \ Weather2，它同时提供 JSON 和 XML 格式： [`http://www.myweather2.com/developer/`](http://www.myweather2.com/developer/)\n\
    \n### 4.3.1 以 JSON 格式下载信息\n\nJSON 是 **JavaScript 对象表示法** 的缩写。它是一种文本格式，借鉴了 JavaScript\
    \ 脚本语言的表示法和数据结构思想。这种格式被设计为易于计算机软件处理（因此也易于 TouchDevelop 脚本处理），同时也具有人类可读性。\n\n图\
    \ 4-6 展示了一个以 JSON 格式表示的数据示例。它是从 weather2 服务获取的天气数据。\n\n对于有效 JSON 信息表示，只有几个简单的规则。一个\
    \ JSON 格式的文件包含以下元素。\n\n* 数字和字符串\n* 布尔值（`true` 或 `false`）\n* 数组——写成由逗号分隔的数组元素序列，整个序列用方括号括起来\n\
    * 对象——写成键值对的无序集合，冒号分隔键和值，每对值之间用逗号分隔，整个集合用花括号括起来；键必须写成字符串，且彼此不同。\n* 特殊值 `null`，表示空。\n\
    \n参考图 4-6，我们可以看到图中显示了一个只有一对键值对的对象，其中键是 `“weather”`，关联的值是另一个对象。该对象包含两对键值对；一个键是\
    \ `“curren_weather”`，另一个是 `“forecast”`。与 `“curren_weather”` 关联的值是一个数组，其中只包含一个元素，该元素是一个对象。与\
    \ `“forecast”` 关联的值是一个包含两个元素的数组，这两个元素是具有相同结构的对象。（元素不必具有相同的结构，甚至不必具有相同的类型，但如果它们具有相同的结构，处理\
    \ JSON 文件会更简单。）\n\n![A978-1-4302-6137-7_4_Fig6_HTML.jpg](img/Image00033.jpg)\n\
    \n**图 4-6** 以 JSON 格式呈现的天气数据\n\n* 如果我们找到了一个以 JSON 格式提供结果的网站，我们可以使用调用 `web` → `download\
    \ json` 来访问它。以下是一个示例调用。\n\n```\nvar jobj := web → download json(\n  \"http://www.myweather2.com/developer/forecast.ashx?uac=X&output=json&query=SW1\"\
    )\n```\n\n它将下载类似于图 4-6 所示的 JSON 数据。（URL 中 `‘uac=’` 后面的“X”必须替换为用户访问代码，该代码仅在你于 weather2\
    \ 网站注册后才会提供。）\n\n此 API 调用检索到的值具有数据类型 `Json Object`。该数据类型提供了许多用于从 JSON 对象内部访问信息的方法。这些方法列在附录\
    \ C 中。使用这些方法，以下是我们如何从图 4-6 所示的 JSON 对象中获取今日温度的方法。代码以一系列非常简单的步骤呈现。\n\n```\n// 假设\
    \ jobj 已经通过前面所示的调用读取\nif jobj → is invalid then\n  \"无法下载 JSON 数据\" → post to\
    \ wall\nelse\n  var w := jobj → field(\"weather\")\n  var cw := w → field(\"curren_weather\"\
    )\n  // 获取数组的第一个元素\n  var cw0 := cw → at(0)\n  // 获取温度（数字格式）\n  var temp := cw0\
    \ → string(\"temp\") → to number\n  // 获取温度单位（字符串格式）\n  var units := cw0 → string(\"\
    temp_unit\")\n  (\"今天的温度是 \" || temp || units) → post to wall\n```\n\n我们所需要做的仅仅是查看一次天气查询产生的\
    \ JSON 数据示例。从这个示例中，我们很容易就找出了如何提取所需信息。（当然，我们也可以阅读服务提供商提供的文档。）\n\n两个以 JSON 格式提供结果的流行服务是\
    \ **Flickr** 和 **Twitter**。TouchDevelop 示例集合中的两个脚本实现了用于使用这些服务的库。图 4-7 展示了一个搜索包含特定关键字（或\
    \ `#标签`）的推文的简单脚本。\n\n库的代码可以在名称 `twitter search` (`/stlm`) 下找到。它从每条推文中提取足够的信息，将其格式化为一条包含作者姓名、作者头像、推文发布日期以及消息内容本身的消息。\n"
- fmt: "### 4.3.2 Downloading information in XML format\n\nXML is short for Extensible\
    \ Markup Language. It is a notation for adding markup to a text document so as\
    \ to show its structure. It provides an alternative to JSON for delivering results\
    \ from web services in a format which can easily be processed by software and\
    \ which is moderately easy for a human to read.\n\n![A978-1-4302-6137-7_4_Fig7_HTML.jpg](Image00034.jpg)\n\
    \nFigure 4-7 Accessing Twitter with a library\n\nAn incomplete example of the\
    \ XML produced by the `weather2` service is shown in Figure [4-8](#text00004.html#Fig8).\
    \ The information is the same as shown in Figure [4-6](#text00004.html#Fig6) but,\
    \ because it is rather more voluminous, only the first 25 lines are displayed.\
    \ As seen in the example, the start of a component (a logical unit) in the document\
    \ is flagged by an opening tag such as `<weather>`. The end of that component\
    \ is flagged by a matching close tag such as `</weather>`. The components can\
    \ be nested, as seen in the figure.\n\nAn opening tag can include attributes,\
    \ such as `<font name=\"Courier\" size=\"12\">`, though this possibility does\
    \ not occur in the weather data.\n\nDownloading XML data requires a call to `web→download`\
    \ to fetch the data as a string, and then a call to `web→xml` to parse the string\
    \ as XML, as in the following example.\n\n```\nvar xobj := web→xml( web→download(\
    \ \"http://www.myweather2.com/developer/forecast.ashx?uac=X&output=xml&query=SW1\"\
    ))\n```\n\nThe result of the code is a value with the datatype `Xml Object`. This\
    \ datatype provides methods for traversing the XML object and extracting various\
    \ components. The methods are listed in Appendix C.\n\nExtracting the current\
    \ temperature from XML shown in Figure [4-8](#text00004.html#Fig8) can be programmed\
    \ as follows.\n\n![A978-1-4302-6137-7_4_Fig8_HTML.jpg](Image00035.jpg)\n\nFigure\
    \ 4-8 Weather data in JSON format\n\n```\n// assume xobj has been read using the\
    \ call previously shown\nif xobj → is invalid then\n    \"unable to download XML\
    \ data\" → post to wall\nelse\n    var cw := xobj → child(\"curren_weather\")\n\
    \    // get temperature\n    var temp := cw → child(\"temp\") → to string\n  \
    \  // get temperature units\n    var units := cw → child(\"temp_unit\") → to string\n\
    \    (\"Today’s temperature is \" || temp || units) → post to wall\n```\n\nAs\
    \ with JSON, it is fairly easy to figure out how to extract the desired information\
    \ just by looking at an example of the XML data. However, the structure of the\
    \ XML is almost always rigidly defined by a DTD (Document Type Definition) which\
    \ specifies the tag names to use and how they are allowed to nest inside other\
    \ tagged sections. It is preferable to consult the DTD when developing scripts\
    \ for processing XML.\n\n## 4.4 REST guidelines and web requests\n\nMany web services\
    \ implement those services in a manner which follows guidelines known as REST.\
    \ It is short for REpresentational State Transfer. Such a web service is often\
    \ described as being RESTful. A starting point for reading about the REST guidelines\
    \ is provided by Wikipedia at this URL: [`http://en.wikipedia.org/wiki/REST`](http://en.wikipedia.org/wiki/REST).\n\
    \nIn particular, HTTP GET and POST requests are used to access many of the facilities\
    \ of a RESTful web service and the API calls provided for uploading and downloading\
    \ to or from the web may be adequate. The HTTP PUT and DELETE requests are not\
    \ supported on the Windows Phone platform and therefore cannot be generated by\
    \ a TouchDevelop script. Many RESTful web services provide alternatives to the\
    \ PUT and DELETE requests.\n\nThe API method `web→create request` may be used\
    \ to construct a general HTTP request. The request is constructed as an instance\
    \ of the `Web Request` datatype. When the request is sent to the web service,\
    \ the result comes back as an instance of the `Web Response` type. The methods\
    \ of these two datatypes are summarized in Table [4-4](#text00004.html#Tab4) and\
    \ Table [4-5](#text00004.html#Tab5). (Methods available for all datatypes are\
    \ omitted from these two tables.)\n\n**Table 4-4 Methods of Web Request datatype**\n\
    \n| Method | Description |\n| --- | --- |\n| `header(name : String) : String`\
    \ | Gets the value of a header identified by name |\n| `header names : String\
    \ Collection` | Gets the names of all the headers |\n| `method : String` | Returns\
    \ the HTML method: \"get\" or \"post\" |\n| `send : Web Response` | Sends the\
    \ request and waits for a response |\n| `set compress(value : Boolean) : Nothing`\
    \ | If the argument is true, the request content is compressed with gzip (and\
    \ the header is updated). |\n| `set content(content : String) : Nothing` | Sets\
    \ the content of a POST request |\n| `set content as json(json : Json Object)\
    \ : Nothing` | Sets the content of a POST request as a JSON data structure |\n\
    | `set content as picture(picture : Picture, quality : Number) : Nothing` | Sets\
    \ the content of a POST request as a JPEG image; the quality parameter ranges\
    \ from 0 for low quality (maximum compression) to 1 for best quality. |\n| `set\
    \ content as xml(xml : Xml Object): Nothing` | Sets the content of a POST request\
    \ as an XML data structure |\n| `set credentials(name : String,password : String):\
    \ Nothing` | Sets the name and password when the website requires authentication;\
    \ the URL for the request must specify HTTPS protocol. |\n| `set header( name\
    \ : String, value : String): Nothing` | Sets a HTML header value. |\n| `set method(\
    \ method : String) : Nothing` | Sets the method; it must be \"get\" or \"post\"\
    . |\n| `set url(url : String) : Nothing` | Sets the URL. |\n| `url : String` |\
    \ Returns the URL used in this request |\n\nAn example of constructing a web request\
    \ and using the response is provided by the script `cosm services` (`/ybnr`).\n\
    \n**Table 4-5 Methods of Web Response datatype**\n\n| Method | Description |\n\
    | --- | --- |\n| `content : String` | Gets the content of the response body as\
    \ a string |\n| `content as json : Json Object` | Gets the content of the response\
    \ body as a JSON data structure |\n| `content as picture : Picture` | Gets the\
    \ content of the response body as a picture |\n| `content as sound : Sound` |\
    \ Gets the content of the response body as a sound in WAV format |\n| `content\
    \ as xml : Xml Object` | Gets the content of the response body as an XML structure\
    \ |\n| `header(name : String) : String` | Gets value of the HTML header with the\
    \ given name |\n| `header names : String Collection` | Gets the names of the headers\
    \ |\n| `request : Web Request` | Gets the web request which was used |\n| `status\
    \ code : Number` | Gets the HTTP status code associated with the request |\n\n\
