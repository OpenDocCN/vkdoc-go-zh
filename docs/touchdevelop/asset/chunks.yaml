    \ or exceeds the permitted use, you will need to obtain permission directly from\
    \ the copyright holder.\n\n# 7. Sensors\n\n[7.1 The sensors](#text00007.html#Sec1)\
    \ [7.2 Sensor-driven events](#text00007.html#Sec2) [7.3 Accelerometer](#text00007.html#Sec4)\
    \ [7.4 Compass](#text00007.html#Sec7) [7.5 Gyroscope](#text00007.html#Sec9) [7.6\
    \ Motion](#text00007.html#Sec10) Keywords Magnetic Compass Magnetic North Window\
    \ Phone Small High Frequency Follow Code Snippet\n\nA typical smartphone or tablet\
    \ contains sensors which track the device’s location, movement and orientation.\
    \ Scripts can use these sensors in many ways. Sensors can provide input for navigation\
    \ aids, they can be an integral part of a game, and they can provide simple input\
    \ to scripts. The possibilities are endless. These sensors are probably absent\
    \ from laptops and computers, however.\n\n## 7.1 The sensors\n\nThe full complement\
    \ of sensors supported by `TouchDevelop` may not be available on your device.\
    \ The possible sensors are as follows.\n\n*   GPS (Global Positioning System),\
    \ which obtains the phone’s current location on the map.\n*   Accelerometer, which\
    \ measures gravitational and acceleration forces experienced by the phone.\n*\
    \   Compass, which returns the direction of magnetic north.\n*   Gyroscope, which\
    \ measures the phone’s orientation in 3D space.\n\nA script’s access to the sensors\
    \ is provided by calls to a variety of API methods and by events associated with\
    \ the gyroscope and accelerometer. The API methods are listed in Table [7-1](#text00007.html#Tab1)\
    \ ; the events are listed in Table [7-2](#text00007.html#Tab2) .\n\n**Table 7-1**\
    \ Sensing methods of the senses service\n\n| Accelerometer Methods | Description\
    \ |\n| --- | --- |\n| `senses → acceleration quick : Vector3` | Returns an acceleration\
    \ averaged over a short time interval |\n| `senses → acceleration smooth : Vector3`\
    \ | Returns an acceleration averaged over a moderate time interval |\n| `senses\
    \ → acceleration stable : Vector3` | Returns an acceleration averaged over a time\
    \ interval of about 0.5 seconds |\n| `senses → is device stable : Boolean` | Returns\
    \ true if the phone has not moved for about 0.5 seconds |\n| Compass Methods |\
    \ Description |\n| `senses → heading : Number` | Returns the angle in degrees\
    \ of magnetic north compared to the direction that the phone is facing |\n| Gyroscope\
    \ Methods | Description |\n| `senses → has gyroscope : Boolean` | Returns true\
    \ if the phone has a gyroscope |\n| `senses → orientation : Vector3` | Obtains\
    \ the current orientation in degrees with respect to the X, Y, Z axes, if available.\
    \ |\n| `senses → rotation speed : Vector3` | Returns the rotational speed in degrees\
    \ per second about each of the X, Y, Z axes |\n| Motion Methods | Description\
    \ |\n| `senses → motion : Boolean` | Returns the phone’s current motion, combining\
    \ readings from accelerometer, compass and gyroscope |\n\n## 7.2 Sensor-driven\
    \ events\n\nIf the device is shaken, the accelerometer records some rapidly changing\
    \ readings. If the amplitude of the shaking exceeds a certain threshold, a shake\
    \ event is triggered. A script can use the event to effect an action, such as\
    \ pausing the playback of an audio recording.\n\nThe device’s software may be\
    \ using the gyroscope to determine the screen’s orientation, and so to choose\
    \ between portrait mode or landscape mode for presentation of information. Several\
    \ possibilities for the orientation can be transmitted to a `TouchDevelop` script\
    \ via the event mechanism.\n\nThe shake event and the phone orientation events\
    \ are listed in Table [7-2](#text00007.html#Tab2) .\n\n**Table 7-2** Sensor events\n\
    \n| Event | Description |\n| --- | --- |\n| `shake` | Triggered when the phone\
    \ is shaken |\n| `phone face up` | Triggered when the device is turned so that\
    \ it is face up |\n| `phone face down` | Triggered when the device is turned so\
    \ that it is face down |\n| `phone portrait` | Triggered when the device is turned\
    \ so the screen in portrait mode (such as when the device is vertical) |\n| `phone\
    \ landscape left` | Triggered when the device is turned so that its left side\
    \ is facing down |\n| `phone landscape right` | Triggered when the device is turned\
    \ so that its right side is facing down |\n\n### 7.2.1 Example script: A pedometer\
    \ (/jbpv)\n\nIf you carry your smartphone with you when jogging or walking briskly,\
    \ the phone’s sensors should trigger a `shake` event for each step taken. A simple\
    \ script can record how many steps are taken, from which the number of steps per\
    \ minute can be computed. By accessing the GPS location, the average speed can\
    \ be determined too. However the script cannot simply use the starting location\
    \ and ending location to determine the distance traveled, because that would give\
    \ only the straight line distance between the two points. Determining the actual\
    \ distance traveled requires checking the GPS location more frequently and summing\
    \ lots of little distances.\n\nThe code for a simple Pedometer program is shown\
    \ in Figure [7-1](#text00007.html#Fig1) . Note that you will need to enable Location\
    \ Services in `TouchDevelop`’s settings for the script to work."
  raw: '## 6.4 Playing videos from the internet


    Video files tend to be very large. You should think before storing one on a device
    with limited memory, such as a phone. Videos held on the phone can be created
    by using the phone’s camera or by being copied from a PC when the phone is synchronized.


    TouchDevelop does not provide access to video files held on a smartphone. Nor
    can a script download a video file to the phone. However a script can access and
    play videos which are streamed from the internet.


    Given the URL of a video file which is in a format that the device can play, a
    TouchDevelop script can open and play that file. The supported video formats can
    depend on the particular model of device in use. However most video files with
    the filename suffix `‘.mp4’` should work. (An H.264 encoded MP4 file is the format
    which works on every Windows phone, for example.)


    Given the URL, a direct way to play the video is as follows.


                   `// url is a String variable holding the URL of the file`


                   `web` → `play media( url )`


    It displays the video using the entire window. The back button can be used to
    stop the video.


    An alternative means of playing the video is to create a `Link` value. Some sample
    code is as follows.


                   `// url is a String variable holding the URL of the file`


                   `var` `lnk := web` → `link media( url )`


                   `…`


                   `if not` `lnk` → `is invalid` `then`


                                  `lnk` → `post to wall`


                                  `“Tap video link to play it”` → `post to wall`


                   `else`


                                  `(“Could not access url “ || url)` → `post to wall`


    The second approach shown above allows a script to show a list of links on the
    screen, allowing the user to select which one to play.


