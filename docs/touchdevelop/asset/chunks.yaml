    # 4. The Web


    [4.1 URLs and webpages](#text00004.html#Sec2) [4.2 Downloading and uploading files](#text00004.html#Sec6)
    [4.3 Downloading structured data](#text00004.html#Sec11) [4.4 REST guidelines
    and web requests](#text00004.html#Sec14) Keywords Text File Document Type Definition
    Window Phone Additional Script Delete Request


    Most mobile devices can be connected to the internet, either via a Wi-Fi connection
    or by using the data services of the cellphone company. Many useful scripts already
    exist to retrieve information from websites on the internet. By using the facilities
    of TouchDevelop, you can easily construct the additional scripts which extract
    the specific information you might need. Another common use of an internet connection
    is to share information via one’s Twitter or Facebook account. TouchDevelop provides
    facilities for uploading messages to your account.


    ## 4.1 URLs and webpages


    ### 4.1.1 Working with URLs


    The TouchDevelop API provides an easy way to interact with software installed
    on your device to access the web. Most of these interactions begin with a URL.
    Here is an example of one of the simplest things we can do in a script – opening
    the web browser at a particular webpage.


            `If not` `web→is connected` `then`


                    `“Sorry, you don’t have an internet connection!” → post to wall`


                    `time → stop`


            `else`


                    `// do nothing`


            `web → browse(“` [`http://touchdevelop.com`](http://touchdevelop.com/)
    `”)`


    Most web interactions in a TouchDevelop script need a URL to specify a web address.
    Two API methods which assist in working with URLs are listed in Table [4-1](#text00004.html#Tab1)
    . Frequently, it is necessary to include some special characters in a URL.


    Table 4-1


    Converting URLs


    | Method | Description |

    | --- | --- |

    | `web→url encode(s : String) : String` | Encode special characters so that they
    can be included in a URL. |

    | `Web→url decode(url : String) : String` | Decodes a URL back to a normal string
    containing special characters. |'
