    Buttons in the form of simple icons may be displayed at the bottom of the screen.
    These are page buttons . Tapping a button triggers an event which can be captured
    in the script. The icons are predefined and have names. The names are as follows.


    `"add", "back", "cancel", "check", "close", "delete", "download",`


    `"edit", "favs.addto", "favs", "feature.camera", "feature.email",`


    `"feature.search", "feature.settings", "feature.video", "folder",`


    `"minus", "new", "next", "questionmark", "refresh", "save",`


    `"share", "stop", "sync", "transport.ff", "transport.pause",`


    `"transport.play", "transport.rew", "upload"`


    This list of names can be generated by executing the following statement.


            `wall → button icon names → post to wall`


    A possible statement to generate a button is the following.


            `wall → add button( “questionmark”, “help?” )`


    Executing that statement causes the bar at the bottom of the screen to contain
    a ‘question mark’ icon with the label “help?” as shown in Figure [3-10](#text00003.html#Fig10)
    .


    ![A978-1-4302-6137-7_3_Fig10_HTML.jpg](Image00027.jpg)


    Figure 3-10


    The ‘Question Mark’ page button


    There is space for several page buttons at the bottom of the screen. Therefore
    the event triggered when a page button is tapped has a parameter which enables
    the button to be identified, that parameter being the string used as the label.
    The following code shows how an event can distinguish between different possibilities
    for the button.


            `event` `tap wall Page Button(item: Page Button)`


                    `if` `(item → icon → equals(“help?”)` `then`


                      `▷show help info`


                    `else`


                      `if` `(item → icon → equals(“cancel”)` `then`


                        `time → stop`


                      `else`


                        `// do nothing`


    The methods provided for the `Page Button` datatype are listed in Table [3-6](#text00003.html#Tab6)
    .


    Table 3-6


    Methods of the Page Table datatype


    | Page Table Method | Description |

    | --- | --- |

    | `equals(page button : Page Button) : Boolean` | Returns true if this button
    is the same button as the one passed as a parameter |

    | `icon : String` | Gets the name of the icon |

    | `page : Page` | Gets the page to which this button is attached |

    | `text : String` | Gets the text associated with the icon |


    ## 3.8 On-demand creation of output


    Some scripts may need to generate a lot of output which the user will need to
    scroll through. It may be a waste of processing time (and perhaps battery charge)
    if all that output is generated at once. A better approach would be to create
    chunks of output only as the user scrolls to view the part of the screen where
    the output would be displayed.


    An event `empty space on wall` is triggered whenever there is space on the wall
    for displaying new output. There will be space when the user scrolls to the end
    of the displayed output.


