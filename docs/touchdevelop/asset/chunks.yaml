    | `set acceleration x(vx : Number) : Nothing` | Set the x component of the sprite’s
    acceleration in pixels/sec2 |

    | `set acceleration y(vy : Number) : Nothing` | Set the x component of the sprite’s
    acceleration in pixels/sec2 |

    | `set location(location : Location) : Nothing` | Sets the sprite’s geo location
    |


    Table 9-8


    Methods of Sprite datatype: mass, friction, elasticity


    | Board Method | Description |

    | --- | --- |

    | `elasticity : Number` | Get the sprite’s elasticity as a fraction of speed preservation
    per bounce (0 to 1) |

    | `friction : Number` | Get the sprite’s friction measured as a fraction of speed
    loss (0 to 1) |

    | `mass : Number` | Get the sprite’s mass |

    | `set elasticity(elasticity : Number) : Nothing` | Set the sprite’s elasticity
    as a fraction of speed preservation per bounce (0 to 1) |

    | `set friction(friction : Number) : Nothing` | Set the sprite’s friction measured
    as a fraction of speed loss (0 to 1) |

    | `set mass(mass : Number) : Nothing` | Set the sprite’s mass (a value greater
    than zero) |


    For collision detection, the `overlap with` and `overlaps with` methods should
    help. Provided that the sprites are not moving so fast or the sprites are not
    so small that one sprite completely passes through another sprite during one time
    step, the colliding sprites will overlap when drawn on the board. The two methods
    allow the collision to be detected, and then the directions of motion of the two
    sprites can be overridden to simulate the two sprites bouncing off each other.


    If, for example, the sprites represent planets revolving around a star, a spring
    force between a planet and the star is a long way from being a proper implementation
    of gravitational attraction. In this situation, a good approach would be to avoid
    using springs altogether and to calculate the force induced on a planet by gravitational
    attraction. Combining that force with the planet’s current velocity and its mass
    allows the acceleration induced by gravitational attraction to be calculated.
    And that acceleration can be explicitly given to the planet by the `set acceleration`
    method. When an acceleration is specified, the effect of the acceleration is in
    addition to any accelerations induced by springs and gravity. The acceleration
    value remains in effect until changed by a new call to set acceleration.


    Another possibility is that a sprite needs to be destroyed and removed from the
    board. In this case, the `delete` method should be invoked. The sprite instance
    is automatically removed from the board and from all sprite collections. Any references
    to the instance become invalid.


    ## 9.4 The Sprite Collection datatype


    When writing simple games with multiple objects of the same kind (e.g. multiple
    shots, missiles, etc .), it quickly becomes necessary to group related sprites
    into collections. The `Board` datatype provides the method `board` →`create sprite
    set` which creates a new empty collection of sprites.


    `Sprite Set` provides most of the methods common to the mutable collection types.
    These are the methods `add` , `add many` , `at` , `count` , `is invalid` , and
    `post to wall` . They were covered in [Chapter 2](#text00002.html#Chap2) . However,
    there is a major difference. All the other collection types are lists of values.
    It implies that the same value can appear in the list several times. A `Sprite
    Set` is, in contrast, an ordered set . A value can appear at most once in the
    set. The elements of the set are ordered by their index positions.


    In addition to the standard methods listed above, the `Sprite Set` datatype has
    the special methods listed in Table [9-10](#text00009.html#Tab10) . Note that
    the `add` method appears in the table even though it is a standard method for
    mutable collections. This is because the `Sprite Set` version of the `add` method
    is slightly different. It only adds an element if it would be a new element, and
    it returns a `Boolean` result to indicate whether an element was actually added.


    Table 9-10


    Additional or modified Sprite Set methods


    | Sprite Method | Description |

    | --- | --- |

    | `add(sprite : Sprite) : Boolean` | Adds sprite to set if not already present;
    the result is true if it was not present already. |

    | `add from(old set : Sprite Set,` `sprite : Sprite) : Boolean` | Adds the sprite
    to the new set and removes it from the old set; the result is true if the sprite
    was in the old set. |

    | `contains(sprite : Sprite) : Boolean` | Returns true if the sprite is in the
    set |

    | `index of(sprite : Sprite) : Number` | Returns the index of the sprite in the
    set; the result is -1 if not in the set |

    | `remove first : Sprite` | Removes the sprite which was added to the set before
    all the others |


    ## 9.5 Touching and board events


    The board has six specific kinds of events which are covered in the subsections
    below. All but one of these events are triggered when the user touches the screen
    and taps, swipes or drags a finger across the board.


    ### 9.5.1 Board touching actions


    In addition to events, the `Board` datatype provides five methods which provide
    information about how the screen has been touched. These methods are listed in
    Table [9-11](#text00009.html#Tab11) . However the tap, swipe and drag events explained
    later in this section are easier to program and their use is recommended.


    Table 9-11


    Touch methods of the Board datatype


    | Sprite Method | Description |

    | --- | --- |

    | `touch current : Vector3` | Returns the coordinates of the current touch point
    on the board; the z component is 0. |

    | `touch end : Vector3` | Returns the coordinates of the last touch point on the
    board; the z component is 0 |

    | `touch start : Vector3` | Returns the coordinates of the latest start point
    for a touch gesture on the board; the z component is 0 |

    | `touch velocity : Vector3` | Returns the final swiping velocity after a touch
    has gesture; the z component is 0 |

    | `touched : Boolean` | Returns true if the board has been touched |


    ### 9.5.2 gameloop event


    The `gameloop` event contains code that needs to be run regularly and frequently.
    The event is triggered about every 50ms. It is a natural location to contain collision
    detection code, or to monitor the passage of time.


    The `gameloop` event code should be efficient. If it takes too long to execute,
    the display may stutter and collisions may go undetected.'
  trans: "\n### 9.3.1 管理精灵\n\n实现一个游戏通常需要一些额外的编程，这些功能无法通过目前已介绍的板子和精灵特性来提供。例如，如果游戏需要与弹簧和重力所提供的力性质不同的力，或者需要处理精灵之间的碰撞，那么表\
    \ 9-9 中列出的附加`精灵`方法应该会很有用。\n\n**表 9-9**  \n`精灵`数据类型的方法：附加功能\n\n| 精灵方法 | 描述 |\n\
    | --- | --- |\n| `acceleration x : Number` | 获取精灵当前加速度的 x 分量，单位是像素/秒² |\n| `acceleration\
    \ y : Number` | 获取精灵当前加速度的 y 分量，单位是像素/秒² |\n| `delete : Nothing` | 删除该精灵 |\n|\
    \ `equals(other : Sprite) : Boolean` | 如果当前精灵与另一个精灵相同，则返回`true` |\n| `location\
    \ : Location` | 获取精灵的地理位置（由`set location`方法分配） |\n| `overlap with(sprites : Sprite\
    \ Set) : Sprite Set` | 返回与此精灵重叠的精灵子集 |\n| `overlaps with(other : Sprite) : Boolean`\
    \ | 如果两个精灵重叠，则返回`true` |\n| `set acceleration(vx : Number, vy : Number) : Nothing`\
    \ | 设置精灵的加速度，单位是像素/秒² |\n| `set acceleration x(vx : Number) : Nothing` | 设置精灵加速度的\
    \ x 分量，单位是像素/秒² |\n| `set acceleration y(vy : Number) : Nothing` | 设置精灵加速度的 y\
    \ 分量，单位是像素/秒² |\n| `set location(location : Location) : Nothing` | 设置精灵的地理位置 |\n\
    \n**表 9-8**  \n`精灵`数据类型的方法：质量、摩擦力、弹性\n\n| 板子方法 | 描述 |\n| --- | --- |\n| `elasticity\
    \ : Number` | 获取精灵的弹性，表示为每次反弹速度保留的比例（0 到 1） |\n| `friction : Number` | 获取精灵的摩擦力，以速度损失比例（0\
    \ 到 1）表示 |\n| `mass : Number` | 获取精灵的质量 |\n| `set elasticity(elasticity : Number)\
    \ : Nothing` | 设置精灵的弹性，表示为每次反弹速度保留的比例（0 到 1） |\n| `set friction(friction : Number)\
    \ : Nothing` | 设置精灵的摩擦力，以速度损失比例（0 到 1）表示 |\n| `set mass(mass : Number) : Nothing`\
    \ | 设置精灵的质量（一个大于零的值） |\n\n对于碰撞检测，`overlap with` 和 `overlaps with` 方法应该会有所帮助。只要精灵移动速度不是太快，或者精灵不是太小以至于在一个时间步内一个精灵完全穿越另一个精灵，那么发生碰撞的精灵在绘制到板子上时会重叠。这两种方法允许检测到碰撞，然后可以覆盖两个精灵的运动方向来模拟它们相互弹开。\n\
    \n例如，如果精灵代表围绕恒星运行的行星，那么行星和恒星之间的弹簧力远非万有引力的正确实现。在这种情况下，一个好的方法是完全避免使用弹簧，而是计算由万有引力作用在行星上的力。将该力与行星的当前速度和其质量相结合，可以计算出由万有引力引起的加速度。然后可以通过`set\
    \ acceleration`方法将该加速度显式地赋予行星。当指定加速度时，其效果是在弹簧和重力引起的任何加速度之外的附加效果。该加速度值将一直有效，直到通过新的\
    \ `set acceleration` 调用更改为止。\n\n另一种可能性是某个精灵需要被销毁并从板子上移除。在这种情况下，应调用`delete`方法。精灵实例会自动从板子和所有精灵集合中移除。对该实例的所有引用都将变为无效。\n\
    \n## 9.4 `精灵集合` 数据类型\n\n在编写具有多个同类型对象（例如，多个子弹、导弹等）的简单游戏时，很快就有必要将相关的精灵组合成集合。`板子`数据类型提供了\
    \ `board` → `create sprite set` 方法，该方法创建一个新的空精灵集合。\n\n`精灵集合`提供了可变集合类型的大部分通用方法。这些方法是\
    \ `add`、`add many`、`at`、`count`、`is invalid` 和 `post to wall`。这些在第二章中已经介绍过。但是，有一个主要区别。所有其他集合类型都是值的列表。这意味着同一个值可以在列表中出现多次。相比之下，`精灵集合`是一个有序集合。一个值在集合中最多只能出现一次。集合中的元素按其索引位置排序。\n\
    \n除了上面列出的标准方法外，`精灵集合`数据类型还具有表 9-10 中列出的特殊方法。请注意，`add` 方法出现在表中，尽管它是可变集合的标准方法。这是因为\
    \ `精灵集合` 版本的 `add` 方法略有不同。它仅当元素是**新**元素时才添加，并返回一个 `Boolean` 结果以指示是否实际添加了元素。\n\n\
    **表 9-10**  \n其他或修改后的`精灵集合`方法\n\n| 精灵方法 | 描述 |\n| --- | --- |\n| `add(sprite :\
    \ Sprite) : Boolean` | 如果精灵尚未存在于集合中，则将其添加；如果原先不存在，结果为 `true`。 |\n| `add from(old\
    \ set : Sprite Set, sprite : Sprite) : Boolean` | 将精灵添加到新集合中，并从旧集合中移除；如果精灵在旧集合中，结果为\
    \ `true`。 |\n| `contains(sprite : Sprite) : Boolean` | 如果精灵在集合中，则返回 `true` |\n\
    | `index of(sprite : Sprite) : Number` | 返回精灵在集合中的索引；如果不在集合中，结果为 `-1` |\n| `remove\
    \ first : Sprite` | 移除最先添加到集合中的精灵 |\n\n## 9.5 触摸与板子事件\n\n板子有六种特定类型的事件，将在以下各小节中介绍。除了一个事件之外，所有其他事件都是在用户触摸屏幕并在板子上点击、轻扫或拖动手指时触发的。\n\
    \n### 9.5.1 板子触摸操作\n\n除事件外，`板子`数据类型还提供了五个方法，用于提供关于屏幕如何被触摸的信息。这些方法如表 9-11 所示。然而，本节后面解释的点击、轻扫和拖动事件更易于编程，建议使用它们。\n\
    \n**表 9-11**  \n`板子`数据类型的触摸方法\n\n| 精灵方法 | 描述 |\n| --- | --- |\n| `touch current\
    \ : Vector3` | 返回板子上当前触摸点的坐标；z 分量为 0。 |\n| `touch end : Vector3` | 返回板子上最后一个触摸点的坐标；z\
    \ 分量为 0 |\n| `touch start : Vector3` | 返回板子上最近一次触摸手势起始点的坐标；z 分量为 0 |\n| `touch\
    \ velocity : Vector3` | 返回触摸手势结束后最终的滑动速度；z 分量为 0 |\n| `touched : Boolean` | 如果板子曾被触摸，则返回\
    \ `true` |\n\n### 9.5.2 `游戏循环` 事件\n\n`游戏循环`事件包含需要定期且频繁运行的代码。该事件大约每 50ms 触发一次。它是放置碰撞检测代码或监控时间流逝的自然位置。\n\
    \n`游戏循环`事件代码应该高效。如果执行时间过长，显示可能会卡顿，并且碰撞可能无法被检测到。\n"
- fmt: "### 9.5.3 `tap board` event\n\nThe `tap board` event fires if there is tap\
    \ anywhere on the board except on a position where a sprite is located. Tapping\
    \ means that one’s finger leaves the screen at approximately the same position\
    \ as where it first touched. Otherwise, the software will report a swipe event\
    \ instead. The event fires once the finger is lifted.\n\nAs an example, the code\
    \ below creates a new ball wherever there is a tap on the board.\n\n```\nevent\
    \ tap board: board(x,y)\n    var sprite := ◳board → create ellipse(10,10)\n  \
    \  sprite → set pos(x,y)\n```\n\nThe `tap board` event has two parameters `x`\
    \ and `y` which give the position where the tap occurred.\n\n### 9.5.4 `swipe\
    \ board` event\n\nThe `swipe board` event is similar, except that the event code\
    \ is passed four parameters. The first two show where the swipe started and the\
    \ second two show the extent of the swipe in the `x` and `y` dimensions.\n\nAs\
    \ an example, the code below creates a new sprite and gives it an initial speed\
    \ which corresponds to the extent of the swipe.\n\n```\nevent swipe board: board(x,\
    \ y, delta x, delta y)\n    var sprite := ◳board → create ellipse(10,10)\n   \
    \ sprite → set pos(x,y)\n    sprite → set speed(delta x, delta y)\n```\n\n###\
    \ 9.5.5 `tap sprite in XXX` event\n\nTap events can be provided for sprites held\
    \ in different sprite collections. This makes it easier to program one kind of\
    \ action for a spaceship, say, and a different kind of action when tapping an\
    \ asteroid, say.\n\nIf, for example, there is a global data variable named `spaceships`\
    \ with the type `Sprite Set` , then an event named `tap sprite in asteroids` can\
    \ be provided. The event is passed four parameters. These are the sprite which\
    \ was tapped, the index of the sprite in the sprite set, and the coordinates of\
    \ the sprite on the board.\n\nA sample of code which uses the event is as follows:\n\
    \n```\naction main( )\n    …\n    ◳asteroids := ◳board → create sprite set\n \
    \   // populate the board with spaceships and asteroids\n    …\nevent tap sprite\
    \ in asteroids(sprite, index, x, y)\n    // change the asteroid’s color\n    sprite\
    \ → set color(colors → red)\n```\n\n### 9.5.6 `swipe sprite in XXX` event\n\n\
    The `swipe sprite` event is similar to the `tap sprite` event, except that one’s\
    \ finger is swiped across the screen and the extent of the swipe is passed as\
    \ two additional parameters. For example, the following code will cause the sprite\
    \ which is swiped to start moving in the direction of the swipe.\n\n```\nevent\
    \ swipe sprite in asteroids(sprite, index, x, y, delta x, delta y)\n    sprite\
    \ → set speed(delta x, delta y)\n```\n\n### 9.5.7 `drag sprite in XXX` event\n\
    \nA drag event does not wait for the finger to be lifted from the screen, as with\
    \ the tap and swipe events. It fires while one’s finger is still on the screen.\
    \ It will repeatedly fire while the finger is in motion across the screen. The\
    \ event is passed very similar parameters to the `swipe sprite` event, except\
    \ that the last two parameters provide the extent of the dragging motion (so far).\n\
    \nThe event can be used to temporarily set the speed of a dragged sprite to 0\
    \ and to display it at the current drag position. In this way, it will appear\
    \ that the sprite is being held at the finger’s position.\n\nHere is example coding\
    \ with the asteroids:\n\n```\nevent drag sprite in asteroids(sprite, index, x,\
    \ y, delta x, delta y)\n    sprite → set speed(0, 0)\n    sprite → set pos(x,\
    \ y)\n```\n\nWhen the finger is lifted at the end of the motion, a `swipe sprite`\
    \ event is triggered (if event code for that action has been provided).\n\n###\
    \ 9.5.8 `tap sprite SSS`, `swipe sprite SSS`, `drag sprite SSS`\n\nInstead of\
    \ having events associated with sprite sets, it is possible to have events associated\
    \ with an individual sprite. To do this, the sprite must be promoted to be a global\
    \ data variable (in the data section of a script).\n\nIf the data variable is\
    \ named `SSS`, then the corresponding event names are `tap sprite SSS` , `swipe\
    \ sprite SSS` and `drag sprite SSS` .\n\n## 9.6 Debugging games\n\nTo make it\
    \ a bit simpler to debug sprite position and speed related problems in scripts,\
    \ the debug mode for the board can be enabled.\n\n```\n◳board→set debug mode(true)\n\
    ```\n\nIf debug mode is on, the board will display the position and speed of a\
    \ sprite next to the sprite content. Additionally, the width and height is displayed\
    \ as a box around the sprite. Also, in debug mode, even invisible sprites are\
    \ displayed. This can be useful for finding forgotten sprites or where anchors\
    \ are placed.\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
    \ Open Access This chapter is licensed under the terms of the Creative Commons\
    \ Attribution-NonCommercial-NoDerivatives 4.0 International License ([http://​creativecommons.​org/​licenses/​by-nc-nd/​4.​0/​](http://creativecommons.org/licenses/by-nc-nd/4.0/)\
    \ ), which permits any noncommercial use, sharing, distribution and reproduction\
    \ in any medium or format, as long as you give appropriate credit to the original\
    \ author(s) and the source, provide a link to the Creative Commons licence and\
    \ indicate if you modified the licensed material. You do not have permission under\
    \ this licence to share adapted material derived from this chapter or parts of\
    \ it. The images or other third party material in this chapter are included in\
    \ the chapter’s Creative Commons licence, unless indicated otherwise in a credit\
    \ line to the material. If material is not included in the chapter’s Creative\
    \ Commons licence and your intended use is not permitted by statutory regulation\
    \ or exceeds the permitted use, you will need to obtain permission directly from\
    \ the copyright holder.\n\n# 10. UI with Boxes and Pages\n\n[10.1 Page Overview](#text00010.html#Sec1)\
    \ [10.2 Box Overview](#text00010.html#Sec2) [10.3 Examples of Boxes and Pages](#text00010.html#Sec3)\
    \ [10.4 Working with Pages](#text00010.html#Sec7) [10.5 Live Editing of the User\
    \ Interface](#text00010.html#Sec10) [10.6 API Support for Boxes and Pages](#text00010.html#Sec11)\
    \ Keywords Global Variable Font Size Graphical Element Current Page Entire Page\n\
    \nA well-designed user interface that takes full advantage of the screen is essential\
    \ for giving a professional look and feel to a program. The page and boxed constructs\
    \ in TouchDevelop provide a powerful means of laying out information on the screen.\
    \ A unique feature to assist script developers is that a running script can be\
    \ suspended while the format of information currently displayed on the screen\
    \ is changed, and then the script’s execution can be resumed."
