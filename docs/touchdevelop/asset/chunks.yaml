- fmt: '# The Scripting Language


    `TouchDevelop` is a language for writing mobile apps. The `TouchDevelop Windows
    Phone` application and the web app also provide a runtime environment for executing
    `TouchDevelop` scripts.


    The `TouchDevelop` language is a typed, structured programming language built
    around the idea of only using touch to author code. It has built-in primitives
    that make it easy to access the rich sensor data available on a mobile device.
    The `TouchDevelop` language mixes imperative, object-oriented, and functional
    features. The imperative parts are the most visible: users can update local variables,
    and the states of global objects. Object-orientation is dictated by auto completion
    requirements – properties of objects are an easily accessible and intuitive concept.
    However, for the sake of simplicity, the language does not provide the ability
    to define new types which are subtypes of other types.


    A `TouchDevelop` script consists of a number of actions (functions or procedures),
    events (actions to be performed when an external event occurs), definitions of
    tables and record types, global state (global variables and read-only data) and
    library references (references to other scripts). The language is covered in some
    depth in [Chapter 2](#text00002.html#Chap2).


    The `TouchDevelop` script editor is part of the `TouchDevelop` application. It
    is designed for efficient entry of scripts using only the touchscreen. `TouchDevelop`
    scripts execute within the `TouchDevelop` application. The mode of execution is
    entirely reactive - actions are run in response to events. Events can be raised
    by user input (e.g., interacting with a UI element, changing the orientation of
    the phone, or shaking it), events from the phone (e.g., change of active song
    in the song player) or passage of time. `TouchDevelop` uses cooperative multi-threading.
    Actions and events are executed in a single-threaded manner.


