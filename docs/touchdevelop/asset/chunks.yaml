    # 2. The Scripting Language


    [Introduction – the language flavor](#text00002.html#Sec1) [Datatypes and variables](#text00002.html#Sec3)
    [Expressions](#text00002.html#Sec18) [Statements](#text00002.html#Sec30) [Actions](#text00002.html#Sec36)
