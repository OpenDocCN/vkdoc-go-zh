    # C.6 颜色


    一种 ARGB 颜色（alpha 透明度, 红色, 绿色, 蓝色）


    | `A` : `数值` | 获取 Alpha 透明度值（0.0-1.0） |

    | `B` : `数值` | 获取蓝色值（0.0-1.0） |

    | `blend(other : Color) : Color` | 使用 Alpha 混合合成一种新颜色 |

    | `brightness` : `数值` | 获取颜色的亮度分量 |

    | `darken(delta : 数值) : 颜色` | 根据介于 0 和 1 之间的 delta 值，生成一种更暗的颜色 |

    | `equals(other : 颜色) : 布尔值` | 检查颜色是否与另一种颜色相等 |

    | `G` : `数值` | 获取绿色值（0.0-1.0） |

    | `hue` : `数值` | 获取颜色的色相分量 |

    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `lighten(delta : 数值) : 颜色` | 根据介于 0 和 1 之间的 delta 值，生成一种更亮的颜色 |

    | `make transparent(alpha : 数值) : 颜色` | 通过更改 Alpha 通道创建一个新颜色，范围从 0（透明）到 1（不透明）
    |

    | `post to wall` | 将值打印到墙面 |

    | `R` : `数值` | 获取红色值（0.0-1.0） |

    | `saturation` : `数值` | 获取颜色的饱和度分量 |


    # C.7 联系人


    此类型的实例代表一个个人联系人。方法列表分为三部分：获取方法（检索联系人的单个属性）、设置方法（设置或更新单个属性）以及其他方法。


    ## 联系人类型的获取方法


    | `birthday` : `日期时间` | 获取出生日期（如果有）。 |

    | `company` : `字符串` | 获取公司名称（如果有）。 |

    | `email` : `链接` | 获取工作或个人电子邮件（如果有） |

    | `first name` : `字符串` | 获取名字（如果有）。 |

    | `home address` : `字符串` | 获取工作地址（如果有） |

    | `home phone` : `链接` | 获取家庭电话号码（如果有） |

    | `job title` : `字符串` | 获取在公司中的职位（如果有）。 |

    | `last name` : `字符串` | 获取姓氏（如果有） |

    | `middle name` : `字符串` | 获取中间名（如果有） |

    | `mobile phone` : `链接` | 获取手机号码（如果有） |

    | `name` : `字符串` | 获取显示名称（保存联系人时不使用） |

    | `nick name` : `字符串` | 获取昵称（如果有） |

    | `office` : `字符串` | 获取在公司中的办公室位置（如果有） |

    | `personal email` : `链接` | 获取个人电子邮件（如果有） |

    | `phone number` : `链接` | 获取手机、工作或家庭电话号码（如果有） |

    | `picture` : `图片` | 获取联系人的图片（如果有） |

    | `source` : `字符串` | 获取此联系人的来源（电话等…） |

    | `suffix` : `字符串` | 获取姓名后缀（如果有） |

    | `title` : `字符串` | 获取姓名称谓（如果有） |

    | `web site` : `链接` | 获取网站（如果有） |

    | `work address` : `字符串` | 获取家庭地址（如果有） |

    | `work email` : `链接` | 获取工作电子邮件（如果有） |

    | `work phone` : `链接` | 获取工作电话号码（如果有） |


    ## 联系人类型的设置方法


    | `set company(value : 字符串)` | 设置公司 |

    | `set first name(value : 字符串)` | 设置名字 |

    | `set home phone(home phone : 字符串)` | 设置家庭电话 |

    | `set job title(value : 字符串)` | 设置职位 |

    | `set last name(value : 字符串)` | 设置姓氏 |

    | `set middle name(middle name : 字符串)` | 设置中间名 |

    | `set mobile phone(value : 字符串)` | 设置手机号码 |

    | `set personal email(value : 字符串)` | 设置个人电子邮件 |

    | `set source(value : 字符串)` | 设置来源 |

    | `set suffix(value : 字符串)` | 设置后缀 |

    | `set title(value : 字符串)` | 设置称谓 |

    | `set web site(value : 字符串)` | 设置网站 |

    | `set work email(value : 字符串)` | 设置工作电子邮件 |

    | `set work phone(work phone : 字符串)` | 设置工作电话 |


    ## 联系人类型的其他方法


    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `post to wall` | 将联系人发布到墙面 |


    # C.8 联系人集合


    一个联系人的集合


    | `at(index : 数值) : 联系人` | 获取指定索引处的联系人 |

    | `count` : `数值` | 获取联系人数量 |

    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `post to wall` | 将联系人发布到墙面 |


    # C.9 日期时间


    一个 `DateTime` 值是日期和时间的组合。方法列表分为一个获取方法表（返回单个属性）和其他方法。


    ## 日期时间类型的获取方法


    | `date` : `日期时间` | 获取日期 |

    | `day` : `数值` | 获取月中的第几天 |

    | `hour` : `数值` | 获取小时 |

    | `millisecond` : `数值` | 获取毫秒 |

    | `minute` : `数值` | 获取分钟 |

    | `month` : `数值` | 获取月份 |

    | `second` : `数值` | 获取秒数 |

    | `week day` : `数值` | 获取星期几（星期日 = 0, 星期一 = 1, … 星期六 = 6） |

    | `year` : `数值` | 获取年份 |

    | `year day` : `数值` | 获取一年中的第几天，介于 1 到 366 之间 |


    ## 日期时间类型的其他方法


    | `add days(days : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的天数 |

    | `add hours(hours : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的小时数 |

    | `add milliseconds(milliseconds : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的毫秒数
    |

    | `add minutes(minutes : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的分钟数 |

    | `add months(months : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的月数 |

    | `add seconds(seconds : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的秒数 |

    | `add years(years : 数值) : 日期时间` | 返回一个新的日期，该日期在当前实例的值上增加指定的年数 |

    | `equals(other: DateTime): Boolean` | 比较日期是否相等 |

    | `greater(other: DateTime): Boolean` | 比较一个日期是否大于另一个 |

    | `greater or equal(other : DateTime) : Boolean` | 比较一个日期是否大于或等于另一个 |

    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `less(other : DateTime) : Boolean` | 比较一个日期是否小于另一个 |

    | `less or equals(other : DateTime) : Boolean` | 比较一个日期是否小于或等于另一个 |

    | `not equals(other : DateTime) : Boolean` | 比较日期是否不相等 |

    | `post to wall` | 将日期打印到墙面 |

    | `subtract(value: DateTime): Number` | 计算两个日期时间之间的差值，以秒为单位 |

    | `to local time : DateTime` | 转换为本地时间 |

    | `to json : Json 对象` | 将该值转换为一个 json 数据结构 |

    | `to local time : DateTime` | 转换为本地时间 |

    | `to string : 字符串` | 将日期转换为字符串 |

    | `to universal time : DateTime` | 转换为协调世界时 |


    # C.10 表单生成器


    用于创建 HTML 表单数据的构建器。


    | `add boolean(name : 字符串, value : 布尔值)` | 添加一个布尔值 |

    | `add number(name : 字符串, value : 数值)` | 添加一个数值 |

    | `add picture(name : 字符串, value : 图片, picture Name : 字符串)` | 添加一张图片 |

    | `add string(name : 字符串, value : 字符串)` | 添加一个字符串值 |

    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `post to wall` | 将表单发布到墙面 |


    # C.11 Json 生成器


    一个 json 数据结构构建器。


    | `add(value : Json 对象)` | 向数组添加一个值 |

    | `add null` | 向数组添加一个 null 值 |

    | `is invalid` : `布尔值` | 如果当前实例无效则返回 true |

    | `set boolean(name : 字符串, value : 布尔值)` | 设置布尔值 |

    | `set field(name : 字符串, value : Json 对象)` | 设置字段值 |

    | `set field null(name : 字符串)` | 将字段值设置为 null |

    | `set number(name : 字符串, value : 数值)` | 设置数值 |

    | `set string(name : 字符串, value : 字符串)` | 设置字符串值 |

    | `to json : Json 对象` | 将构建器转换为一个 json 数据结构并清空构建器 |

    '
- fmt: '# C.12 Json Object


    A JSON data structure


    | `at(index : Number) : Json Object` | Gets the i-th json value |

    | `boolean(key : String) : Boolean` | Gets a field value as a Boolean |

    | `contains key(key: String) : Boolean` | Indicates if the key exists |

    | `count : Number` | Gets the number of values |

    | `field(key : String) : Json Object` | Gets a value by name |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `keys : String Collection` | Gets the list of keys |

    | `kind : String` | Gets json kind (string, number, object, array, boolean) |

    | `number(key : String) : Number` | Gets a field value as a number |

    | `post to wall` | Prints the value to the wall |

    | `string(key : String) : String` | Gets a field value as a string |

    | `time(key : String) : DateTime` | Gets the field value as a time |

    | `to boolean : Boolean` | Converts to a Boolean (type must be boolean) |

    | `to number : Number` | Converts to a number (type must be number) |

    | `to string : String` | Converts to a string (type must be string) |

    | `to time : DateTime` | Converts and parses to a date time (type must be string)
    |


    # C.13 Link


    A link to a video, image, email, or a phone number.


    | `address : String` | Gets the url |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `kind : String` | Gets the kind of asset - media, image, email, phone number,
    hyperlink, deep zoom link, radio |

    | `location : Location` | Gets the location if any |

    | `name : String` | Gets the name if any |

    | `post to wall` | Displays the link on the wall |

    | `set location(location : Location)` | Sets the location |

    | `set name(name : String)` | Sets the name |

    | `share(network : String)` | Shares the link (email, sms, Facebook, social or
    '''' to pick from a list) |


    # C.14 Link Collection


    A list of links.


    | `add(value : Link)` | Adds a link |

    | `add many(value : Link Collection)` | Adds many links at once |

    | `at(index : Number) : Link` | Gets the i-th link |

    | `clear` | Clears the collection |

    | `count : Number` | Gets the number of elements |

    | `index of(item : Link, start : Number) : Number` | Gets the index of the first
    occurrence of item. Returns -1 if not found or start is out of range. |

    | `insert at(index : Number, item : Link)` | Inserts a link at position index.
    Does nothing if index is out of range. |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall` | Displays the links on the wall |

    | `random : Link` | Gets a random element from the collection. Returns invalid
    if the collection is empty. |

    | `remove(item : Link) : Boolean` | Removes the first occurrence of the link.
    Returns true if removed. |

    | `remove at(index : Number)` | Removes the link at position index. |

    | `reverse` | Reverses the order of the elements. |

    | `set at(index : Number, value : Link)` | Sets the i-th link |


    # C.15 Location


    A geo coordinate (latitude, longitude, …)


    | `altitude : Number` | Gets the altitude of the coordinate |

    | `course : Number` | Gets the course of the coordinate |

    | `distance(other : Location) : Number` | Calculates the distance in meters |

    | `equals(other : Location) : Boolean` | Indicates if this instance is equal to
    the other |

    | `hor accuracy : Number` | Gets the horizontal accuracy of the coordinate |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `latitude : Number` | Gets the latitude of the coordinate |

    | `longitude : Number` | Gets the longitude of the coordinate |

    | `post to wall` | Displays the location in a map using Bing |

    | `share(network : String, message : String)` | Shares the location (email, sms,
    Facebook, social or '''' to pick from a list) |

    | `speed : Number` | Gets the speed of the coordinate |

    | `to string : String` | Converts to a string lat,long |

    | `vert accuracy : Number` | Gets the vertical accuracy of the coordinate |


    # C.16 Location Collection


    A list of locations.


    | `add(value : Location)` | Adds a location |

    | `add many(value : Location Collection)` | Adds many locations at once |

    | `at(index : Number) : Location` | Gets the i-th geo coordinate |

    | `clear` | Clears the collection |

    | `count : Number` | Gets the number of elements |

    | `index of(item : Location, start : Number) : Number` | Gets the index of the
    first occurrence of item. Returns -1 if not found or start is out of range. |

    | `insert at(index : Number, item : Location) : Nothing` | Inserts a location
    at position index. Does nothing if index is out of range. |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall` | Displays the locations in a map using Bing |

    | `random : Location` | Gets a random element from the collection. Returns invalid
    if the collection is empty. |

    | `remove(item : Location) : Boolean` | Removes the first occurrence of the location.
    Returns true if removed. |

    | `remove at(index: Number)` | Removes the location at position index |

    | `reverse` | Reverses the order of the elements |

    | `set at(index : Number, value : Location)` | Sets the i-th geo coordinate |

    | `sort by distance(loc : Location)` | Sorts by distance to the location |


    # C.17 Map


    A Bing map.


    | `add line(locations : Location Collection, color : Color, thickness : Number)`
    | Adds a polyline that passes through various geo coordinates |

    | `add link(link : Link, background : Color, foreground : Color)` | Adds a link
    pushpin on the map (ignored if the location if not set) |

    | `add message(msg : Message, background : Color, foreground : Color)` | Adds
    a message pushpin on the map (ignored if the location is not set) |

    | `add picture(location : Location, picture : Picture, background : Color)` |
    Adds a picture pushpin on the map |

    | `add place(place : Place, background : Color, foreground : Color)` | Adds a
    place pushpin on the map (ignored if the location is not set) |

    | `add text(location : Location, text : String, background : Color, foreground
    : Color)` | Adds a text pushpin on the map |

    | `center : Location` | Gets the map center location |

    | `clear` | Clears the lines, regions and pushpins |

    | `fill region(locations : Location Collection, fill : Color, stroke : Color,
    thickness : Number)` | Fills a region with a color |

    | `is invalid : Boolean` | Returns true if the current instance is useless |

    | `post to wall` | Displays the map in the wall using Bing |

    | `set center(center : Location)` | Sets the map center location |

    | `set zoom(level : Number)` | Sets the zoom level from 1 (earth) to 21 (street)
    |

    | `view pushpins` | Changes the current zoom and center so that all the pushpins
    are visible. This method has no effect if the map is not posted on the wall yet.
    |

    | `zoom : Number` | Gets the zoom level |'
