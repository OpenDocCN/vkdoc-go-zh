    \ | Returns `true` if this is the secondary camera, `false` if this is the primary\
    \ camera. |\n| `preview : Picture` | Takes a low quality picture with the camera,\
    \ returning the picture immediately. |\n| `width : Number` | Returns the width\
    \ of the camera image in pixels. |\n\n### 6.1.1 A sample program\n\nThe script\
    \ the poor man's camcorder (`/ptxfa`) asks you to sweep the camera slowly around\
    \ while it takes 10 pictures in succession using the `preview` method of the `Camera`\
    \ type. It then plays back the 10 pictures, giving the effect of a camcorder whose\
