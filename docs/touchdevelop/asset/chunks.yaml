    \ labeled `if`. An empty `if-then-else` statement is inserted into the script.\n\
    2. With the current insertion point at the place where the conditional expression\
    \ should go, tap the key labeled `speed` in the right keypad. Then tap the key\
    \ labeled `>` and finally tap the key labeled `0` in the left keypad.\n3. Tap\
