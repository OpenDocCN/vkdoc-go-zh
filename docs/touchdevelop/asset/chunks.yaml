  raw: '## 5.3 Microphone


    Most devices have a microphone. However, the microphone cannot be accessed from
    a program running in a browser on a PC, Mac or Linux platform. It can be accessed
    on the Windows phone and the ability to access it will be supported on iPad, iPhone,
    iPod Touch and Android platforms in the near future.


    The TouchDevelop API provides a method for activating the microphone and making
    a recording.


                    `var` `snd := senses → record microphone`


                    `// snd has the datatype Sound`


    When the above statement is executed in a script, the word “Recording…” and a
    stop button are displayed on the screen. Simultaneously, the microphone begins
    recording. When the user taps the stop button, recording stops and an instance
    of the `Sound` datatype is returned.


    As noted earlier, a `Sound` value uses the WAV audio format and is not compressed.
    Therefore the microphone should not be used for long recordings.


    [![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)
