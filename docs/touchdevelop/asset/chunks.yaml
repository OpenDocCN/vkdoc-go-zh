    Type Reference Type Window Phone


    A `TouchDevelop` script appears to the user as statements in a language which
    is not unlike many other programming languages. This chapter covers the syntax
    and semantics of that language. The language is augmented by a powerful and rich
    API (Application Programming Interface), an API which significantly extends the
    programming capabilities of the `TouchDevelop` language. The API is covered in
    the chapters which follow this one.


    ## Introduction – the language flavor


    These introductory paragraphs are written for people who know some of the terminology
    used to describe programming language semantics, and will allow such readers to
    fast forward over large chunks of this chapter.


    The scripting language is statement oriented. Statements are executed in a sequential
    manner. Control flow constructs include `if`-statements, `for` and `while` loops,
    and functions (which are called actions in this language).


    The statements manipulate values. All intermediate values and variables are statically
    type checked. Only parameters of actions have explicit type declarations. The
    datatypes of all other values and variables are inferred through analysis of the
    code.


    The language is strongly typed, in that (with one exception), every operation
    requires operands of particular datatypes and there is no automatic coercion to
    the type required by an operation. The datatypes belong to one of two categories:
    value types and reference types. Value types may have storage on the stack used
    for local variables, and their storage is automatically deallocated on exit from
    an action (i.e. from a function). Reference types have their storage allocated
    on the heap.


    The heap is garbage collected. In addition to parameters and local variables,
    a script can define globally visible variables in its data section or read-only
    variables in its art section. Their storage is persistent across script executions.


    Although the language syntax shows similarities to object-oriented languages,
    the language does not support the object-oriented paradigm. For example, there
    is no equivalent of class inheritance or method overloading.


    To conserve real estate on smaller screens, several symbols are used instead of
    keywords. These symbols are all available as characters in the `Segoe UI Symbol`
    font (a font which is distributed with the Windows 7 and 8 operating systems).
    The symbols are summarized in Table [2-1](#text00002.html#Tab1).'
  raw: '## The scripting language


    TouchDevelop is a language for writing mobile apps. The TouchDevelop Windows Phone
    application and the web app also provide a runtime environment for executing TouchDevelop
    scripts.


    The TouchDevelop language is a typed, structured programming language built around
    the idea of only using touch to author code. It has built-in primitives that make
    it easy to access the rich sensor data available on a mobile device. The TouchDevelop
    language mixes imperative, object-oriented, and functional features. The imperative
    parts are the most visible: users can update local variables, and the states of
    global objects. Object-orientation is dictated by auto completion requirements
    – properties of objects are an easily accessible and intuitive concept. However,
    for the sake of simplicity, the language does not provide the ability to define
    new types which are subtypes of other types.


    A TouchDevelop script consists of a number of actions (functions or procedures),
    events (actions to be performed when an external event occurs), definitions of
    tables and record types, global state (global variables and read-only data) and
    library references (references to other scripts). The language is covered in some
    depth in [Chapter 2](#text00002.html#Chap2) .


    The TouchDevelop script editor is part of the TouchDevelop application. It is
    designed for efficient entry of scripts using only the touchscreen. TouchDevelop
    scripts execute within the TouchDevelop application. The mode of execution is
    entirely reactive - actions are run in response to events. Events can be raised
    by user input (e.g., interacting with a UI element, changing the orientation of
    the phone, or shaking it), events from the phone (e.g., change of active song
    in the song player) or passage of time. TouchDevelop uses cooperative multi-threading.
    Actions and events are executed in a single-threaded manner.


