- fmt: '### 4.1.2 Creating and using web-based links


    One use of the `Link` datatype in TouchDevelop is to save links to people in the
    form of their email addresses or their phone numbers. This usage is covered in
    [Chapter 8](#text00008.html#Chap8). Another use is to save links to materials
    found on the web, such as videos, pictures, and webpages in general. The `web`
    resource in the TouchDevelop API provides methods for creating links in the latter
    category. Some more methods will search for webpages or web resources and return
    a collection of links to the results. These methods are listed in Table [4-2](#text00004.html#Tab2).


    The `Link` datatype combines additional information with an address such as a
    URL. It can optionally have an associated name and a location (which is usually
    relevant for a photograph but is certainly not restricted to photographs). Methods
    are provided for setting and getting this additional information.


    Note that no checking on the validity of the URL is performed when the `Link`
    instance is created. The URL is simply held as a string, and can be accessed as
    a string by using the `address` method.


    Example: The script flickr search (`/atue`) provides an example of a library which
    creates a `Link Collection` instance containing references to particular kinds
    of images, and the script flickr slideshow (`/fluo`) uses that library to generate
    a slideshow of images on a theme provided by the user.


    **Table 4-2** Creating web links


    | Method | Description |

    | --- | --- |

    | `web→link image(url : String) : Link` | Create a link to a picture |

    | `web→link media(url : String) : Link` | Create a link to an audio file or a
    video |

    | `web→link url(name : String, url : String) : Link` | Create a link to a webpage
    and associate a name with this link |

    | `web→search(terms : String) : Link Collection` | Use Bing to search for webpages
    matching the search terms |

    | `web→search images(terms : String) : Link Collection` | Use Bing to search for
    images matching the search terms |

    | `web→search images nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | Use Bing to search for images matching the search terms and
    associated with a location within a given distance of a specified location |

    | `web→search nearby(terms : String, location : Location, distance : Number) :
    Link Collection` | Use Bing to search for webpages matching the search terms and
    associated with a location within a given distance of a particular location |

    | `web→search news(terms : String) : Link Collection` | Use Bing to search for
    news items matching the search terms |

    | `web→search news nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | Use Bing to search for news items matching the search terms
    and associated with a location within a given distance of a specified location
    |


    ### Using the wall with web-based links


    The wall can be used to hold links to websites in general or to various kinds
    of resources that may be downloaded. For example, to display an image when an
    instance of the `Link` type has been provided, code like the following may be
    used.


    ```

    // link (of type Link) refers to an image on a website

    var pic := web → download picture(link → address)

    wall → set background picture(pic)

    ```


    Here are some more examples. The following script lines (extracted from the script
    `/hrvg` held on the TouchDevelop Samples website) demonstrate some interesting
    possibilities.


    ```

    // 1. This creates a basic internet link which is opened in the browser

    //  when the link is tapped

    web → link url("This is a link to TouchDevelop", "http://touchdevelop.com") →
    post to wall


    // 2. This will load and display an image from the web

    //  when the link is tapped

    web → link image("http://www.touchdevelop.com/Images/title1.png") → post to wall


    // 3. You can also link to a movie or a sound file through the link

    //  media method. It will be played when the link is tapped

    web → link media(

    "http://media.ch9.ms/ch9/06b9/1669dae1-2b5f-4858-abee-9ea7018806b9/

    WP7Pex4FunPeliNikolai_ch9.wmv") → post to wall

    ```


    If the first of the examples above is run as a script, the result displayed on
    the screen looks similar to Figure [4-1](#text00004.html#Fig1). Tapping the ‘go’
    button on the right causes the webpage to be displayed.


    ![A978-1-4302-6137-7_4_Fig1_HTML.jpg](Image00028.jpg)


    **Figure 4-1** Posting a Webpage Link to the wall


    Running the second example displays the image which is downloaded from the web.
    The result of running it as a script looks similar to Figure [4-2](#text00004.html#Fig2).
    (The image looks fuzzy because the original is a small low resolution image which
    gets scaled up in size before being displayed the screen.)


    ![A978-1-4302-6137-7_4_Fig2_HTML.jpg](Image00029.jpg)


    **Figure 4-2** Posting a link to an image on the wall


    ### 4.1.3 Checking the internet connection


    Your device can usually access the internet via a Wi-Fi connection or through
    a cellphone connection. However there will be occasions when there is no internet
    connectivity. A script should test whether there is connectivity before proceeding
    to try to access web resources. The API method call


    ```

    web → is connected

    ```


    returns `true` or `false` to indicate the current situation.


    The following API method call should provide information about the kind of connection,
    if one exists. The result will be one of the strings “`unknown`”, “`none`”, “`ethernet`”,
    “`wifi`”, or “`mobile`”.


    ```

    web → connection type

    ```


    Finally, the script can discover the name of the Wi-Fi service or the cellphone
    service which is handling internet requests. The following API method call returns
    a string with the name of that service, if there is one. If no name can be found,
    the result is an empty string.


    ```

    web → connection name

    ```


    ## 4.2 Downloading and uploading files


    If a script accesses the internet, it is quite likely that information in some
    form needs to be downloaded. Sometimes information needs to be uploaded too. The
    TouchDevelop API provides several upload and download methods appropriate for
    accessing different kinds of web resources. These methods are summarized in Table
    [4-3](#text00004.html#Tab3) and then described in more detail in the following
    subsections.


    **Table 4-3** Uploading/downloading to websites


    | Method | Description |

    | --- | --- |

    | `web → download(url : String) : String` | Uses a HTTP GET request to obtain
    a HTML-encoded webpage as a string. |

    | `web → download json(url : String) : Json Object` | Uses a HTTP GET request
    to read a JSON data structure |

    | `web → download picture(url : String) : Picture` | Downloads a picture |

    | `web → download song(url : String, name : String) : Song` | Creates a streamed
    song file; the download is delayed until the song is played |

    | `web → download sound(url : String) : Sound` | Downloads a sound in WAV format
    |

    | `web → upload(url : String, body : String) : String` | Uses a HTTP POST request
    to upload string data to a website service; the result is a response string from
    that service |

    | `web → upload picture(url : String, pic : Picture): String` | Uses a HTTP POST
    request to upload a picture to a website service; the result is a response string
    |'
  raw: '### 4.1.2 Creating and using web-based links


    One use of the `Link` datatype in TouchDevelop is to save links to people in the
    form of their email addresses or their phone numbers. This usage is covered in
    [Chapter 8](#text00008.html#Chap8) . Another use is to save links to materials
    found on the web, such as videos, pictures, and webpages in general. The web resource
    in the TouchDevelop API provides methods for creating links in the latter category.
    Some more methods will search for webpages or web resources and return a collection
    of links to the results. These methods are listed in Table [4-2](#text00004.html#Tab2)
    .


    The `Link` datatype combines additional information with an address such as a
    URL. It can optionally have an associated name and a location (which is usually
    relevant for a photograph but is certainly not restricted to photographs). Methods
    are provided for setting and getting this additional information.


    Note that no checking on the validity of the URL is performed when the Link instance
    is created. The URL is simply held as a string, and can be accessed as a string
    by using the address method.


    Example: The script flickr search (`/atue` ) provides an example of a library
    which creates a `Link Collection` instance containing references to particular
    kinds of images, and the script flickr slideshow (`/fluo` ) uses that library
    to generate a slideshow of images on a theme provided by the user.


    Table 4-2


    Creating web links


    | Method | Description |

    | --- | --- |

    | `web→link image(url : String) : Link` | Create a link to a picture |

    | `web→link media(url : String) : Link` | Create a link to an audio file or a
    video |

    | `web→link url(name : String, url : String) : Link` | Create a link to a webpage
    and associate a name with this link |

    | `web` →`search(terms : String) :` `Link Collection` | Use Bing to search for
    webpages matching the search terms |

    | `web→search images(terms : String) : Link Collection` | Use Bing to search for
    images matching the search terms |

    | `web` →`search images nearby(terms : String, location : Location, distance :
    Number) :` `Link Collection` | Use Bing to search for images matching the search
    terms and associated with a location within a given distance of a specified location
    |

    | `web` →`search nearby(terms : String, location : Location, distance : Number)
    :` `Link Collection` | Use Bing to search for webpages matching the search terms
    and associated with a location within a given distance of a particular location
    |

    | `web→search news(terms : String) : Link Collection` | Use Bing to search for
    news items matching the search terms |

    | `web` →`search news nearby(terms : String, location : Location, distance : Number)
    :` `Link Collection` | Use Bing to search for news items matching the search terms
    and associated with a location within a given distance of a specified location
    |


    ### Using the wall with web-based links


    The wall can be used to hold links to websites in general or to various kinds
    of resources that may be downloaded. For example, to display an image when an
    instance of the `Link` type has been provided, code like the following may be
    used.


                `// link (of type Link) refers to an image on a website`


                `var` `pic := web → download picture(link → address)`


                `wall → set background picture(pic)`


    Here are some more examples. The following script lines (extracted from the script
    `/hrvg` held on the TouchDevelop Samples website) demonstrate some interesting
    possibilities.


    `// 1\. This creates a basic internet link which is opened in the browser`


    `//  when the link is tapped`


    `web → link url("This is a link to TouchDevelop", "` [`http://touchdevelop.com`](http://touchdevelop.com/)
    `") → post to wall`


    `// 2\. This will load and display an image from the web`


    `//  when the link is tapped`


    `web → link image("` [`http://www.touchdevelop.com/Images/title1.png`](http://www.touchdevelop.com/Images/title1.png)
    `") → post to wall`


    `// 3\. You can also link to a movie or a sound file through the link`


    `//  media method. It will be played when the link is tapped`


    `web → link media(`


    `"` [`http://media.ch9.ms/ch9/06b9/1669dae1-2b5f-4858-abee-9ea7018806b9/`](http://media.ch9.ms/ch9/06b9/1669dae1-2b5f-4858-abee-9ea7018806b9/)


    `WP7Pex4FunPeliNikolai_ch9.wmv") → post to wall`


    If the first of the examples above is run as a script, the result displayed on
    the screen looks similar to Figure [4-1](#text00004.html#Fig1) . Tapping the ‘go’
    button on the right causes the webpage to be displayed.


    ![A978-1-4302-6137-7_4_Fig1_HTML.jpg](Image00028.jpg)


    Figure 4-1


    Posting a Webpage Link to the wall


    Running the second example displays the image which is downloaded from the web.
    The result of running it as a script looks similar to Figure [4-2](#text00004.html#Fig2)
    . (The image looks fuzzy because the original is a small low resolution image
    which gets scaled up in size before being displayed the screen.)


    ![A978-1-4302-6137-7_4_Fig2_HTML.jpg](Image00029.jpg)


    Figure 4-2


    Posting a link to an image on the wall


    ### 4.1.3 Checking the internet connection


    Your device can usually access the internet via a Wi-Fi connection or through
    a cellphone connection. However there will be occasions when there is no internet
    connectivity. A script should test whether there is connectivity before proceeding
    to try to access web resources. The API method call


            `web → is connected`


    returns `true` or `false` to indicate the current situation.


    The following API method call should provide information about the kind of connection,
    if one exists. The result will be one of the strings “`unknown` ” “`none` ” “`ethernet`
    ” “`wifi` ” or “`mobile` ”.


            `web → connection type`


    Finally, the script can discover the name of the Wi-Fi service or the cellphone
    service which is handling internet requests. The following API method call returns
    a string with the name of that service, if there is one. If no name can be found,
    the result is an empty string.


            `web → connection name`


    ## 4.2 Downloading and uploading files


    If a script accesses the internet, it is quite likely that information in some
    form needs to be downloaded. Sometimes information needs to be uploaded too. The
    TouchDevelop API provides several upload and download methods appropriate for
    accessing different kinds of web resources. These methods are summarized in Table
    [4-3](#text00004.html#Tab3) and then described in more detail in the following
    subsections.


    Table 4-3


    Uploading/downloading to websites


    | Method | Description |

    | --- | --- |

    | `web → download(url : String) : String` | Uses a HTTP GET request to obtain
    a HTML-encoded webpage as a string. |

    | `web → download json(url : String) : Json Object` | Uses a HTTP GET request
    to read a JSON data structure |

    | `web → download picture(url : String) : Picture` | Downloads a picture |

    | `web → download song(url : String, name : String) : Song` | Creates a streamed
    song file; the download is delayed until the song is played |

    | `web → download sound(url : String) : Sound` | Downloads a sound in WAV format
    |

    | `web` → `upload(` `url : String, body : String) : String` | Uses a HTTP POST
    request to upload string data to a website service; the result is a response string
    from that service |

    | `web → upload picture(url : String, pic : Picture): String` | Uses a HTTP POST
    request to upload a picture to a website service; the result is a response string
    |'
  trans: '

    ### 4.1.2 创建和使用网络链接


    TouchDevelop 中 `Link` 数据类型的一个用途是保存指向联系人的链接，这些链接可能为电子邮件地址或电话号码。此用法将在第 8 章中介绍。另一个用途是保存指向在网络上发现的资源的链接，例如视频、图片以及一般的网页。TouchDevelop
    API 中的 `web` 资源提供了用于创建后一类链接的方法。此外，还有一些方法用于搜索网页或网络资源，并返回指向搜索结果的链接集合。这些方法列在表 4-2
    中。


    `Link` 数据类型将附加信息与地址（例如 URL）结合在一起。它可以选择性地包含一个关联的名称和一个位置（这通常与照片相关，但肯定不限于照片）。API
    提供了设置和获取这些附加信息的方法。


    请注意，创建 `Link` 实例时，不会对 URL 的有效性进行检查。该 URL 只是作为一个字符串保存，可以通过使用 `address` 方法将其作为字符串访问。


    示例：脚本 `flickr search`（`/atue`）提供了一个库的示例，该库创建一个包含对特定类型图片引用的 `Link Collection` 实例；而脚本
    `flickr slideshow`（`/fluo`）则使用该库根据用户提供的主题生成一个图片幻灯片。


    **表 4-2** 创建网络链接


    | 方法 | 描述 |

    | --- | --- |

    | `web→link image(url : String) : Link` | 创建一个指向图片的链接 |

    | `web→link media(url : String) : Link` | 创建一个指向音频文件或视频的链接 |

    | `web→link url(name : String, url : String) : Link` | 创建一个指向网页的链接，并为此链接关联一个名称
    |

    | `web→search(terms : String) : Link Collection` | 使用必应搜索与搜索词匹配的网页 |

    | `web→search images(terms : String) : Link Collection` | 使用必应搜索与搜索词匹配的图片 |

    | `web→search images nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | 使用必应搜索与搜索词匹配且位置在指定地点给定距离内的图片 |

    | `web→search nearby(terms : String, location : Location, distance : Number) :
    Link Collection` | 使用必应搜索与搜索词匹配且位置在特定地点给定距离内的网页 |

    | `web→search news(terms : String) : Link Collection` | 使用必应搜索与搜索词匹配的新闻条目 |

    | `web→search news nearby(terms : String, location : Location, distance : Number)
    : Link Collection` | 使用必应搜索与搜索词匹配且位置在指定地点给定距离内的新闻条目 |


    ### 在墙面上使用网络链接


    墙面可用于保存指向一般网站或各种可下载资源的链接。例如，当提供了一个 `Link` 类型的实例时，可以使用类似下面的代码来显示一张图片。


    ```

    // link（Link 类型）指向网站上的一个图片

    var pic := web → download picture(link → address)

    wall → set background picture(pic)

    ```


    以下是更多示例。以下脚本代码行（摘自 TouchDevelop 示例网站上的脚本 `/hrvg`）展示了一些有趣的可能性。


    ```

    // 1. 这创建了一个基本的互联网链接，点击该链接时

    //  会在浏览器中打开

    web → link url("这是一个指向 TouchDevelop 的链接", "http://touchdevelop.com") → post to
    wall


    // 2. 这将加载并从网络上显示一张图片

    //  当点击该链接时

    web → link image("http://www.touchdevelop.com/Images/title1.png") → post to wall


    // 3. 你也可以通过 link media 方法链接到电影或声音文件。

    //   当点击该链接时，它会开始播放

    web → link media(

    "http://media.ch9.ms/ch9/06b9/1669dae1-2b5f-4858-abee-9ea7018806b9/

    WP7Pex4FunPeliNikolai_ch9.wmv") → post to wall

    ```


    如果上面的第一个例子作为脚本运行，屏幕上显示的结果外形类似于图 4-1。点击右侧的“转到”按钮将显示该网页。


    ![A978-1-4302-6137-7_4_Fig1_HTML.jpg](img/Image00028.jpg)


    **图 4-1** 将网页链接发布到墙面


    运行第二个例子会显示从网络下载的图片。将其作为脚本运行的结果外形类似于图 4-2。（图片看起来模糊，因为原始图片是尺寸较小、分辨率低的图片，在显示到屏幕之前被放大了。）


    ![A978-1-4302-6137-7_4_Fig2_HTML.jpg](img/Image00029.jpg)


    **图 4-2** 将指向图片的链接发布到墙面


    ### 4.1.3 检查互联网连接


    您的设备通常可以通过 Wi-Fi 连接或手机连接接入互联网。但有时也会没有网络连接。脚本在尝试访问网络资源之前，应该先测试是否存在连接。API 方法调用


    ```

    web → is connected

    ```


    返回 `true` 或 `false` 来指示当前网络状况。


    如果存在连接，以下 API 方法调用应提供关于连接类型的信息。结果将是以下字符串之一：“`unknown`”、“`none`”、“`ethernet`”、“`wifi`”或“`mobile`”。


    ```

    web → connection type

    ```


    最后，脚本可以发现处理互联网请求的 Wi-Fi 服务或手机服务的名称。如果存在的话，以下 API 方法调用会返回一个包含该服务名称的字符串。如果无法找到名称，则返回一个空字符串。


    ```

    web → connection name

    ```


    ## 4.2 下载和上传文件


    如果脚本访问互联网，很可能需要以某种形式下载信息。有时也需要上传信息。TouchDevelop API 提供了多种适用于访问不同类型网络资源的上传和下载方法。这些方法在表
    4-3 中进行了总结，并在后续小节中进行了更详细的描述。


    **表 4-3** 向网站上传/从网站下载


    | 方法 | 描述 |

    | --- | --- |

    | `web → download(url : String) : String` | 使用 HTTP GET 请求获取一个 HTML 编码的网页，结果以字符串形式返回。
    |

    | `web → download json(url : String) : Json Object` | 使用 HTTP GET 请求读取一个 JSON
    数据结构 |

    | `web → download picture(url : String) : Picture` | 下载一张图片 |

    | `web → download song(url : String, name : String) : Song` | 创建一个流式歌曲文件；下载操作会延迟到歌曲播放时才开始
    |

    | `web → download sound(url : String) : Sound` | 下载一个 WAV 格式的声音文件 |

    | `web → upload(url : String, body : String) : String` | 使用 HTTP POST 请求将字符串数据上传到一个网站服务；返回值是该服务返回的响应字符串
    |

    | `web → upload picture(url : String, pic : Picture): String` | 使用 HTTP POST 请求将一张图片上传到一个网站服务；返回值是一个响应字符串
    |

    '
- fmt: "### 4.2.1 Downloading a text file or downloading HTML\n\nThe simplest format\
    \ for a web resource is a text file. If the URL ends with the suffix `\".txt\"\
    ` or `\".text\"` then the web resource is almost certainly a plain ASCII (or UTF8)\
    \ text file. However the URL does not necessarily need either of these suffixes\
    \ to refer to a text file.\n\nA webpage which contains HTML is also a text file;\
    \ it is simply text which includes extra commands to specify the structure and\
    \ the format of the webpage when displayed by a browser. If it is useful, the\
    \ raw HTML can be read as though it were a text file.\n\nA TouchDevelop script\
    \ can download a text file or a HTML page and read it into a `String` variable\
    \ using script lines similar to those shown in this example:\n\n```\naction main(\
    \ )\n    var s := web →\n        download(\"http://www.smlnj.org/doc/FAQ/faq.txt\"\
    )\n    if s → is invalid then\n            \"unable to read webpage\" → post to\
    \ wall\n    else\n            // … proceed to use the string s\n            \"\
    \" → post to wall\n            s → substring(0,100) → post to wall\n         \
    \   \"First 100 characters are:\" → post to wall\n            (\"Length = \" ||\
    \ s → count) → post to wall\n```\n\nWhen this script is run, the result looks\
    \ as shown in Figure [4-3](#text00004.html#Fig3). Most likely, though, your script\
    \ will proceed to do something more complicated with the string than just display\
    \ the total length and the first 100 characters.\n\n![A978-1-4302-6137-7_4_Fig3_HTML.jpg](Image00030.jpg)\n\
    \nFigure 4-3\n\nDownloading a text file\n\n### 4.2.2 Downloading a picture\n\n\
    A variety of formats are used for encoding pictures as computer files. The commonly\
    \ used formats are JPEG, GIF, PNG, BMP, TIFF and WMP. They are all supported by\
    \ TouchDevelop. If the filename or URL ends with the suffix `\".jpg\"`, `\".jpeg\"\
    `, `\".gif\"`, `\".png\"`, `\".bmp\"` or `\".wmp\"` then one of these formats\
    \ has been used, and the methods provided in the TouchDevelop API should be able\
    \ to download and manipulate the picture.\n\nThe script statements are similar\
    \ to before, but use a different method so that the result is obtained as a `Picture`\
    \ value (and not as a `String` value).\n\n```\naction main( )\n        var pic\
    \ := web → download picture(\n        \"http://www.touchdevelop.com/Images/title2.png\"\
    )\n        if pic → is invalid then\n                \"Unable to download picture\"\
    \ → post to wall\n        else\n                // … proceed to use the picture\
    \ pic in some way\n            pic → post to wall\n            (\"Image dimensions\
    \ = \" || pic → width || \" x \" || pic → height) →\n        post to wall\n```\n\
    \nRunning this particular script yields the result shown in Figure [4-4](#text00004.html#Fig4).\n\
    \n![A978-1-4302-6137-7_4_Fig4_HTML.jpg](Image00031.jpg)\n\nFigure 4-4\n\nPicture\
    \ download\n\n### 4.2.3 Downloading sounds and music\n\nTouchDevelop and the Windows\
    \ phone software support two kinds of audio files – short sound clips and longer\
    \ audio tracks which would usually contain music (or spoken voice). In TouchDevelop,\
    \ these correspond to values with type `Sound` and type `Song` respectively.\n\
    \nIf the filename or URL ends with the suffix `\".wav\"` then the file contents\
    \ are in the ‘Waveform Audio File’ (WAV) format and it is material that can be\
    \ downloaded as a `Sound` value. A `Sound` value can only be created from a WAV\
    \ file. If the suffix is `\".mp3\"` then the material is in an audio format commonly\
    \ used for music and the spoken word. This material can be downloaded as a `Song`\
    \ value.\n\nSome code to download and play a sound effect is shown below. (The\
    \ sound effect used in this example comes from the website “Partners in Rhyme”\
    \ which provides royalty-free music and sound-effects.)\n\n```\naction getSound(\
    \ )\n    var snd := web → download sound( \"http://www.sound-effect.com/pirsounds/WEB_DESIGN_SOUNDS_WAV1/SOUNDFX/TOYLASER.WAV\"\
    \ )\n    if snd → is invalid then\n            \"unable to download sound\" →\
    \ post to wall\n    else\n        // … proceed to use the sound value snd\n  \
    \      snd → set volume(0.7)\n        snd → play\n        (\"Duration = \" ||\
    \ snd → duration) → post to wall\n```\n\nExample: A script to access and play\
    \ a song is available as Stream mp3 from internet (`/ncwo`). The script includes\
    \ some extra features to make it a bit more useful. These are events to suspend\
    \ the playback and to stop the playback permanently. When the script is run, the\
    \ URL can be provided as an argument. If no URL is provided, the last used URL\
    \ is used again.\n\n### 4.2.4 Uploading strings and files\n\nTwo API methods are\
    \ available for uploading material to a website. One method uploads a string and\
    \ the other uploads a picture. Both use the HTTP POST protocol for the uploads.\
    \ Typically, uploads will be performed when interacting with a website which follows\
    \ the REST guidelines (as covered below).\n\nHere are sample statements which\
    \ use the API method call for uploading a string.\n\n```\nvar info := \"name=an+other&age=37&car=Ford+Mustang\"\
    \n// upload key-value pairs in the info string to website specified by the url\n\
    var response string := web → upload( url, info )\n```\n\nThe website which receives\
    \ the POST request will pass the string onto a program for processing and a string\
    \ returned by the program comes back as the result of this API call.\n\nUploading\
    \ a picture is similar. The sample script web stuff (`/hrvg`) is an example of\
    \ uploading a picture of a QR code in the JPEG format to a website."
