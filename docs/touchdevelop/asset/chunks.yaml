    to share adapted material derived from this chapter or parts of it. The images
    or other third party material in this chapter are included in the chapter’s Creative
    Commons licence, unless indicated otherwise in a credit line to the material.
    If material is not included in the chapter’s Creative Commons licence and your
    intended use is not permitted by statutory regulation or exceeds the permitted
    use, you will need to obtain permission directly from the copyright holder.


    # 6. Camera, Graphics and Video


    [6.1 Camera](#text00006.html#Sec1) [6.2 Working with pictures](#text00006.html#Sec3)
    [6.3 Static graphics drawing and display](#text00006.html#Sec10) [6.4 Playing
    videos from the internet](#text00006.html#Sec11) Keywords Video File Picture Type
    String Variable Window Phone Camera Picture


    A smartphones, tablets and laptops are commonly used for displaying photographs
    and videos. TouchDevelop scripts provide new ways to download, create, modify
    and display photographs. Scripts can be used to record videos using the device’s
    camera and to play back both those videos and videos obtained from elsewhere.


    ## 6.1 Camera


    Smartphones, tablets and most laptops have at least one camera capable of taking
    high-quality pictures or videos. This is the primary camera . On a phone or tablet,
    it would normally be located on the opposite side from the screen. Many of these
    devices have a second camera located above the screen which captures the user’s
    image and is intended for use in video calls, such as a Skype call. A camera above
    the screen is normally the only one provided on a laptop, and would be considered
    to be the primary camera by TouchDevelop.


    The TouchDevelop API provides access to the camera (or cameras) via its senses
    service. The `senses` methods relevant to using the cameras are listed in Table
    [6-1](#text00006.html#Tab1) . Two of these methods return instances of type `Camera`
    . This datatype provides methods for retrieving information about the camera and
    for taking a quick low-quality picture on a smartphone.


    Table 6-1


    Methods for using the camera(s)


    | Method | Description |

    | --- | --- |

    | senses → camera: Camera | Returns the primary camera, if there is one; otherwise
    the result is invalid. |

    | senses → front camera: Camera | Returns the secondary camera, if there is one;
    otherwise the result is invalid. |

    | senses → take camera picture: Picture | Uses the primary camera to take a picture.
    |

    | wall → set background camera( camera: Camera): Nothing | Causes images from
    the selected camera to be used as the background for the wall |


    There are two ways to take a picture with the primary camera. The two approaches
    behave differently on a phone, but will normally behave identically on a laptop
    or tablet. The two forms are


               `senses` → `take camera picture`


    and


               `senses` → `front camera`   →  `preview`


    On a Windows phone, the first form takes a high-resolution picture using the phone’s
    built-in software. This causes a preview image to appear on the screen along with
    controls for adjusting the zoom level, exposure and flash etc. Control is not
    returned to the TouchDevelop script until the button to take the picture has been
    pressed and the picture taken. The second form just returns the preview image
    without any delay. On other devices, the two forms will both take pictures almost
    immediately and with the same resolution. The user may be prompted to allow or
    deny the script access to the camera.


    All methods (except for invalid and post to wall) are listed in Table [6-2](#text00006.html#Tab2)
    .


    The user has the option of cancelling the picture capture in the high-quality
    version on a phone. Therefore the normal pattern of usage in a script might be
    code like the following. (An audible warning, such as beeps, to indicate when
    the picture is about to be snapped would be a useful addition to the script.)


                   `“You have three seconds!”` → `post to wall`


                   `// give 3 seconds for user to get ready`


                   `time` → `sleep(3)`


                   `var` `pic := senses` → `take camera picture`


                   `if not` `pic` → `is invalid` `then`


                           `// use the picture pic`


                           `…`


                   `else`


                           `// user cancelled the picture`


    To determine whether the device has a secondary camera, a script should invoke
    the senses → front camera method. (The name of this method is perhaps inappropriate
    for a laptop or PC.) If the result is the invalid value, then this camera is absent.


    Table 6-2


    Methods of the Camera datatype


    | Method | Description |

    | --- | --- |

    | height : Number | Returns the height of the camera image in pixels. |

    | is front : Boolean | Returns true if this is the secondary camera, false if
    this is the primary camera. |

    | preview : Picture | Takes a low quality picture with the camera, returning the
    picture immediately. |

    | width : Number | Returns the width of the camera image in pixels. |


    ### 6.1.1 A sample program


    The script the poor man’s camcorder (`/ptxfa` ) asks you to sweep the camera slowly
    around while it takes 10 pictures in succession using the `preview` method of
    the `Camera` type. It then plays back the 10 pictures, giving the effect of a
    camcorder whose recordings are 2 seconds long.


    A simplified and reprogrammed version of this script is presented in Figure [6-1](#text00006.html#Fig1)
    .


    This sample program also illustrates the use of an object declaration in the Records
    section of a script. It is used to create a data structure known as a cyclic list
    . It is a linked-list where every element of the list contains a reference to
    the next element, except that the last element references the first element, creating
    a cycle.


    ![A978-1-4302-6137-7_6_Fig1_HTML.jpg](Image00037.jpg)


    Figure 6-1


    A simplified camcorder script (/xbhl)


    ## 6.2 Working with pictures'
