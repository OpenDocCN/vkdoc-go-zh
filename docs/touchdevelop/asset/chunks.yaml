    # 3. The Wall – using the screen


    [3.1 Output – the writing on the wall](#text00003.html#Sec1) [3.2 Input of values
    from the touchscreen](#text00003.html#Sec8) [3.3 Updating the wall’s content](#text00003.html#Sec9)
    [3.4 Events on the touchscreen](#text00003.html#Sec12) [3.5 Pushing and popping
    pages](#text00003.html#Sec15) [3.6 Titles and subtitles](#text00003.html#Sec16)
    [3.7 Wall buttons](#text00003.html#Sec17) [3.8 On-demand creation of output](#text00003.html#Sec18)


    A TouchDevelop script usually needs to interact with the user. While input via
    a microphone and output via speakers built into, or connected to, the device are
    certainly possibilities, a touchscreen or a screen plus a mouse is almost always
    used for input and output. In TouchDevelop, the screen is known as the wall. The
    API provides many ways in which a script can access the wall.


    ## 3.1 Output – the writing on the wall'
