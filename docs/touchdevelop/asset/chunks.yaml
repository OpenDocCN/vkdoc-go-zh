    # 5. 音频


    5.1 音乐 5.2 声音 5.3 麦克风


    智能手机或平板电脑可以兼任便携式音乐播放器。它可以播放存储在设备上以 MP3 格式存在的音乐文件，可以播放通过互联网流式传输的音频，还可以使用其麦克风录制声音……以及更多功能。


    ## 5.1 音乐


    音乐文件可以通过多种方式复制到您的设备上。您也可以从多种在线服务购买并下载音乐到设备中。表 5-1 列出了支持的音乐文件格式。如果您的文件为其他格式，可以使用相关程序将其转换为支持的格式。表中“容器”一列使用的名称，很可能与计算机上文件名使用的扩展名相同（例如“track1.mp3”），但并不保证一定如此。


    表 5-1


    支持的音乐格式


    | 编解码器 | 容器 | 备注 |

    | --- | --- | --- |

    | `AAC` | `M4A` | 仅支持无保护（无 DRM）的文件 |

    | `MP3` | `MP3` | 准确来说是 MPEG-1 的 Layer III |

    | `WMA` | `WMA` | Zune 会将无损 WMA 转换为其他格式 |


    TouchDevelop API 提供了 `media` 资源。但由于安全限制，该资源的许多方法仅在 Windows Phone 和 Android 设备上可用。在其他设备上，无法访问歌曲专辑或设备上存储的全部歌曲集合。


    在 Windows Phone 和 Android 设备上，`media` 资源提供了用于获取手机上所有歌曲、所有歌曲专辑以及所有播放列表集合的方法。TouchDevelop
    不提供任何用于更改这三个集合的机制。它们是**不可变的**。因此，TouchDevelop 脚本中的错误绝不可能导致手机上的任何音乐文件被意外删除。这三个媒体方法列在表
    5-2 中。


    表 5-2


    访问媒体资源（仅限 WP8 和 Android）


    | 方法 | 描述 |

    | --- | --- |

    | `media→songs : Songs` | 获取手机上所有歌曲的集合 |

    | `media→song albums : Song Albums` | 获取手机上所有歌曲专辑的集合 |

    | `media→playlists : Playlists` | 获取手机上所有播放列表的集合 |


    ### 5.1.1 处理歌曲集合


    尽管 TouchDevelop 文档和本书使用了“音乐”和“歌曲”这两个词，但 API 调用当然不限于处理音乐。它们同样适用于以表 5-1 列出的任何音频格式录制的录音。


    请注意，TouchDevelop API 也提供了处理 WAV 格式音频录制的方法，但这些录音通常不用于音乐，它们的持续时间较短，并且在 TouchDevelop
    API 中用 `Sound` 数据类型表示。`Sound` 类型将在本章稍后介绍。


    表 5-3 列出了使用歌曲、歌曲专辑和播放列表的方法。表中省略了 `is invalid` 和 `post to wall` 方法（这些方法适用于所有数据类型）。


    表 5-3


    使用歌曲和歌曲专辑（仅限 WP8 和 Android）


    | `Playlist` 数据类型的方法 | 描述 |

    | --- | --- |

    | `duration : Number` | 返回播放列表中所有歌曲的总时长（以秒为单位） |

    | `name : String` | 返回播放列表的名称 |

    | `play : Nothing` | 播放播放列表中的所有歌曲 |

    | `songs : Songs` | 将播放列表中的所有歌曲作为集合获取 |

    | `Song Album` 的方法 | 描述 |

    | `art : Picture` | 获取专辑封面图片 |

    | `artist : String` | 获取专辑艺术家的姓名 |

    | `duration : Number` | 获取专辑中所有歌曲的总时长（以秒为单位） |

    | `genre : String` | 获取音乐流派 |

    | `has art : Boolean` | 如果有封面图片，则返回 true |

    | `name : String` | 返回专辑的名称 |

    | `play : Nothing` | 播放专辑中的所有歌曲 |

    | `songs : Songs` | 返回专辑中所有歌曲的集合 |

    | `thumbnail : Picture` | 获取封面图片的缩略图 |

    | `album : Song Album` | 获取歌曲所属的专辑 |

    | `artist : String` | 获取歌曲艺术家的姓名 |

    | `duration : Number` | 获取歌曲时长（以秒为单位） |

    | `genre : String` | 获取歌曲的音乐流派 |

    | `name : String` | 获取歌曲的名称 |

    | `play : Nothing` | 播放歌曲 |

    | `play count : Number` | 获取歌曲被播放的次数 |

    | `Song` 数据类型的方法 | 描述 |

    | `protected : Boolean` | 如果歌曲受 DRM 保护，则返回 true |

    | `rating : Number` | 获取用户设置的评分；如果未评分则为 -1 |

    | `track: Number` | 获取歌曲在专辑中的曲目编号 |


    TouchDevelop 还提供了一个与歌曲相关的事件。这就是“活动歌曲变更”事件，它在名称所暗示的时刻被触发。例如，当专辑或播放列表正在播放时，每当手机播放到列表中的下一首歌曲时，该事件就会被触发。


    ### 5.1.2 获取单首歌曲（所有设备均可用）


    无论脚本运行在哪个平台上，都可以将单首音乐曲目导入 TouchDevelop 脚本。


    一种方法是从网络下载音乐文件。操作如下：


    ```

    var song := web → download song(url)

    ```


    这会将音乐加载到变量 `song`（类型为 `Song`）中，其中 `url` 是一个字符串，提供文件位置的 URL。


    另外，脚本可以打开一个选择文件对话框，用户可以在其中导航到其计算机或平板电脑上的音乐文件。用法如下所示。


    ```

    var song := media → choose song

    ```

    '
- fmt: "### 5.1.3 Playing an individual song\n\nThe `play` method of the `Song`, `SongAlbum`\
    \ or `Playlist` types will start a song or a sequence of songs playing on the\
    \ phone. For example:\n\n```\nsong → play\n```\n\nMore precise control over the\
    \ playing of songs is provided by the player resource in the API. The methods\
    \ directly related to playing songs are listed in Table [5-4](#text00005.html#Tab4).\n\
    \n**Table 5-4**  \nMethods of player resource for songs\n\n| Method of player\
    \ resource | Description |\n| --- | --- |\n| `player→active song: Song` | Gets\
    \ the current song, if any |\n| `player→is muted : Boolean` | Reports whether\
    \ the player is muted |\n| `player→is paused : Boolean` | Reports whether current\
    \ song is paused |\n| `player→is playing : Boolean` | Reports whether a song is\
    \ playing |\n| `player→is repeating : Boolean` | Reports whether song is in repeat\
    \ mode |\n| `player→is shuffled : Boolean` | Reports whether the songs are shuffled\
    \ |\n| `player→is stopped : Boolean` | Reports if the player is stopped |\n| `player→next\
    \ : Nothing` | Stops current song and advances to next one in the queue waiting\
    \ to be played |\n| `player→pause : Nothing` | Pauses the current song |\n| `player→play(song\
    \ : Song): Nothing` | Adds a song to the queue of songs |\n| `player→play many(songs\
    \ : Songs) : Nothing` | Adds all songs in the collection to the queue |\n| `player→play\
    \ position : Number` | Gets the position in seconds within the current song |\n\
    | `player→previous : Nothing` | Stops current song and goes back to the previous\
    \ one |\n| `player→resume : Nothing` | Resumes a paused song |\n| `player→set\
    \ repeating(repeating : Boolean) : Nothing` | Sets the repeating mode for the\
    \ current song |\n| `player→set shuffled(shuffled : Boolean) : Nothing` | Sets\
    \ shuffling on or off for songs in the queue |\n| `player→set sound volume(x :\
    \ Number) : Nothing` | Sets the sound volume: 0.0 is silent, 1.0 is the volume\
    \ when TouchDevelop started |\n| `player→sound volume : Number` | Gets the sound\
    \ volume in the same 0 to 1 scale |\n| `player→stop : Nothing` | Stops playing\
    \ a song |\n| `player→volume : Number` | Gets player volume, from 0.0 (silence)\
    \ to 1.0 (full volume) |\n\nWhen an album or a playlist is sent to the player,\
    \ the player creates a queue of songs to be played. The songs will by default\
    \ be played in the order that they appear in the album or playlist. However a\
    \ random order will be used if shuffle is selected. Requesting a new song to be\
    \ played before the current song is finished causes the current song to be terminated\
    \ and the queue to be cleared (if it is not empty) before the new song starts.\n\
    \nPlaying songs occurs in the background. This means that the player is performing\
    \ its task while the device and, perhaps, the TouchDevelop script is doing other\
    \ things. When a song or collection of songs is given to the player, the player\
    \ remembers what it has to play and starts playing. Control is returned to the\
    \ script for it to carry on executing statements while the music is playing.\n\
    \nThe playing volume ranges from 0.0 to 1.0. The value of 1.0 does not correspond\
    \ to the maximum volume which the device is capable of. The value is relative\
    \ to the volume of the player as set externally to the TouchDevelop script. A\
    \ script cannot play songs louder than the device’s current setting, but it can\
    \ play at a quieter level by using a value less than 1.0 for the volume.\n\n###\
    \ 5.1.4 An example script\n\nThere are many example programs on the TouchDevelop\
    \ website which select and play music. One sample program for the Windows Phone\
    \ and Android platforms is reproduced below in Figure [5-1](#text00005.html#Fig1).\
    \ It uses several features provided by the API.\n\nThere is one feature of this\
    \ script that is not obvious when reading it. When it is run, it will display\
    \ information about each song on the phone which has never been previously played.\
    \ If the user scrolls through the list of displayed songs and taps one, it will\
    \ immediately start playing.\n\n![A978-1-4302-6137-7_5_Fig1_HTML.jpg](Image00036.jpg)\n\
    \n**Figure 5-1**  \nThe ‘new songs’ script (WP8 and Android only)\n\n## 5.2 Sounds\n\
    \nThe `Sound` datatype is used for audio recordings in the WAV format. This format\
    \ is commonly used for uncompressed audio and therefore the files tend to be large.\
    \ This format should therefore be used only for short sound clips (say 30 seconds\
    \ or less), such as ring tones, sound effects or warning noises to be played by\
    \ your script. For longer pieces, the `Song` datatype and therefore a compressed\
    \ sound format should be used, if possible.\n\nThe `Sound` datatype provides many\
    \ methods for playing the sound clip and altering its properties when played.\
    \ These are summarized in Table [5-5](#text00005.html#Tab5).\n\nPanning refers\
    \ to the ability to choose whether the sound should be played wholly through the\
    \ left earpiece or wholly through the right earpiece or through both together\
    \ in some proportion. The pan value ranges from -1.0 for fully left to 0.0 for\
    \ center (i.e. both sides equally) to 1.0 for fully right.\n\n**Table 5-5**  \n\
    Methods of `Sound` datatype\n\n| Method of Sounds | Description |\n| --- | ---\
    \ |\n| `duration : Number` | Returns the sound clip’s duration in seconds |\n\
    | `pan : Number` | Gets the pan setting: from -1 for full left to +1 for right\
    \ |\n| `play : Nothing` | Plays the sound clip |\n| `play special(volume : Number,\
    \ pitch : Number, pan : Number) : Nothing` | Plays the sound clip with values\
    \ supplied for the panning, pitch and volume |\n| `pitch : Number` | Gets the\
    \ pitch adjustment from -1 to +1 |\n| `set pan(pan : Number) : Nothing` | Sets\
    \ the pan setting: from -1 for full left to +1 for right |\n| `set pitch(pitch\
    \ : Number) : Nothing` | Sets the pitch adjustment from -1 to +1 |\n| `set volume(v\
    \ : Number) : Nothing` | Sets the volume from 0 (silent) to +1 (full volume) |\n\
    | `volume : Number` | Gets the volume, in range 0 (silent) to +1 (full volume)\
    \ |\n\nThe pitch adjustment ranges from -1.0 to 1.0. If -1.0 is selected, the\
    \ playback speed is slowed down so that the pitch is lowered by one octave. The\
    \ midpoint value 0.0 plays the sound clip at normal speed. The top value of 1.0\
    \ causes playback to speeded up so that the pitch is raised by one octave.\n\n\
    As with playing `Song` values, the volume is a value ranging from 0.0 to 1.0 where\
    \ 1.0 is the current volume setting for the speakers as set externally of the\
    \ TouchDevelop script. The script can play sounds at a quieter level than this\
    \ setting but it cannot play them louder."
  raw: '### 5.1.3 Playing an individual song


    The `play` method of the `Song` , `Song Album` or `Playlist` types will start
    a song or a sequence of songs playing on the phone. For example:


            `song → play`


    More precise control over the playing of songs is provided by the player resource
    in the API. The methods directly related to playing songs are listed in Table
    [5-4](#text00005.html#Tab4) .


    Table 5-4


    Methods of player resource for songs


    | Method of player resource | Description |

    | --- | --- |

    | `player→active song: Song` | Gets the current song, if any |

    | `player→is muted : Boolean` | Reports whether the player is muted |

    | `player→is paused : Boolean` | Reports whether current song is paused |

    | `player→is playing : Boolean` | Reports whether a song is playing |

    | `player→is repeating : Boolean` | Reports whether song is in repeat mode |

    | `player→is shuffled : Boolean` | Reports whether the songs are shuffled |

    | `player→is stopped : Boolean` | Reports if the player is stopped |

    | `player→next : Nothing` | Stops current song and advances to next one in the
    queue waiting to be played |

    | `player→pause : Nothing` | Pauses the current song |

    | `player→play(song : Song): Nothing` | Adds a song to the queue of songs |

    | `player→play many(songs : Songs) : Nothing` | Adds all songs in the collection
    to the queue |

    | `player→play position : Number` | Gets the position in seconds within the current
    song |

    | `player→previous : Nothing` | Stops current song and goes back to the previous
    one |

    | `player→resume : Nothing` | Resumes a paused song |

    | `player→set repeating(repeating : Boolean) : Nothing` | Sets the repeating mode
    for the current song |

    | `player→set shuffled(shuffled : Boolean) : Nothing` | Sets shuffling on or off
    for songs in the queue |

    | `player→set sound volume(x : Number) : Nothing` | Sets the sound volume: 0.0
    is silent, 1.0 is the volume when TouchDevelop started |

    | `player→sound volume : Number` | Gets the sound volume in the same 0 to 1 scale
    |

    | `player→stop : Nothing` | Stops playing a song |

    | `player→volume : Number` | Gets player volume, from 0.0 (silence) to 1.0 (full
    volume). |


    When an album or a playlist is sent to the player, the player creates a queue
    of songs to be played. The songs will by default be played in the order that they
    appear in the album or playlist. However a random order will be used if shuffle
    is selected. Requesting a new song to be played before the current song is finished
    causes the current song to be terminated and the queue to be cleared (if it is
    not empty) before the new song starts.


    Playing songs occurs in the background. This means that the player is performing
    its task while the device and, perhaps, the TouchDevelop script is doing other
    things. When a song or collection of songs is given to the player, the player
    remembers what it has to play and starts playing. Control is returned to the script
    for it to carry on executing statements while the music is playing.


    The playing volume ranges from 0.0 to 1.0\. The value of 1.0 does not correspond
    to the maximum volume which the device is capable of. The value is relative to
    the volume of the player as set externally to the TouchDevelop script. A script
    cannot play songs louder than the device’s current setting, but it can play at
    a quieter level by using a value less than 1.0 for the volume.


    ### 5.1.4 An example script


    There are many example programs on the TouchDevelop website which select and play
    music. One sample program for the Windows Phone and Android platforms is reproduced
    below in Figure [5-1](#text00005.html#Fig1) . It uses several features provided
    by the API.


    There is one feature of this script that is not obvious when reading it. When
    it is run, it will display information about each song on the phone which has
    never been previously played. If the user scrolls through the list of displayed
    songs and taps one, it will immediately start playing.


    ![A978-1-4302-6137-7_5_Fig1_HTML.jpg](Image00036.jpg)


    Figure 5-1


    The ‘new songs’ script (WP8 and Android only)


    ## 5.2 Sounds


    The `Sound` datatype is used for audio recordings in the WAV format. This format
    is commonly used for uncompressed audio and therefore the files tend to be large.
    This format should therefore be used only for short sound clips (say 30 seconds
    or less), such as ring tones, sound effects or warning noises to be played by
    your script. For longer pieces, the `Song` datatype and therefore a compressed
    sound format should be used, if possible.


    The `Sound` datatype provides many methods for playing the sound clip and altering
    its properties when played. These are summarized in Table [5-5](#text00005.html#Tab5)
    .


    Panning refers to the ability to choose whether the sound should be played wholly
    through the left earpiece or wholly through the right earpiece or through both
    together in some proportion. The pan value ranges from -1.0 for fully left to
    0.0 for center (i.e. both sides equally) to 1.0 for fully right.


    Table 5-5


    Methods of Sound datatype


    | Method of Sounds | Description |

    | --- | --- |

    | `duration : Number` | Returns the sound clip’s duration in seconds |

    | `pan : Number` | Gets the pan setting: from -1 for full left to +1 for right
    |

    | `play : Nothing` | Plays the sound clip |

    | `play special(volume :` `Number, pitch : Number, pan : Number) : Nothing` |
    Plays the sound clip with values supplied for the panning, pitch and volume |

    | `pitch : Number` | Gets the pitch adjustment from -1 to +1 |

    | `set pan(pan : Number) : Nothing` | Sets the pan setting: from -1 for full left
    to +1 for right |

    | `set pitch(pitch : Number) : Nothing` | Sets the pitch adjustment from -1 to
    +1 |

    | `set volume(v : Number) : Nothing` | Sets the volume from 0 (silent) to +1 (full
    volume) |

    | `volume : Number` | Gets the volume, in range 0 (silent) to +1 (full volume)
    |


    The pitch adjustment ranges from -1.0 to 1.0\. If -1.0 is selected, the playback
    speed is slowed down so that the pitch is lowered by one octave. The midpoint
    value 0.0 plays the sound clip at normal speed. The top value of 1.0 causes playback
    to speeded up so that the pitch is raised by one octave.


    As with playing `Song` values, the volume is a value ranging from 0.0 to 1.0 where
    1.0 is the current volume setting for the speakers as set externally of the TouchDevelop
    script. The script can play sounds at a quieter level than this setting but it
    cannot play them louder.'
  trans: "\n### 5.1.3 播放单首歌曲\n\n`Song`、`SongAlbum` 或 `Playlist` 类型的 `play` 方法将在手机上启动一首歌曲或一组歌曲的播放。例如：\n\
    \n```\nsong → play\n```\n\nAPI 中的播放器资源提供了对歌曲播放的更精确控制。与直接播放歌曲相关的方法列于表 5-4。\n\n\
    **表 5-4**  \n用于歌曲的播放器资源方法\n\n| 播放器资源方法 | 描述 |\n| --- | --- |\n| `player→active\
    \ song: Song` | 获取当前歌曲（如果有） |\n| `player→is muted : Boolean` | 报告播放器是否静音 |\n|\
    \ `player→is paused : Boolean` | 报告当前歌曲是否暂停 |\n| `player→is playing : Boolean`\
    \ | 报告是否正在播放歌曲 |\n| `player→is repeating : Boolean` | 报告歌曲是否处于重复模式 |\n| `player→is\
    \ shuffled : Boolean` | 报告歌曲是否随机播放 |\n| `player→is stopped : Boolean` | 报告播放器是否已停止\
    \ |\n| `player→next : Nothing` | 停止当前歌曲并前进到队列中的下一首 |\n| `player→pause : Nothing`\
    \ | 暂停当前歌曲 |\n| `player→play(song : Song): Nothing` | 将一首歌曲添加到播放队列 |\n| `player→play\
    \ many(songs : Songs) : Nothing` | 将集合中的所有歌曲添加到队列 |\n| `player→play position :\
    \ Number` | 获取当前歌曲的播放位置（以秒为单位） |\n| `player→previous : Nothing` | 停止当前歌曲并返回上一首\
    \ |\n| `player→resume : Nothing` | 恢复暂停的歌曲 |\n| `player→set repeating(repeating\
    \ : Boolean) : Nothing` | 设置当前歌曲的重复模式 |\n| `player→set shuffled(shuffled : Boolean)\
    \ : Nothing` | 设置队列中歌曲的随机播放开关 |\n| `player→set sound volume(x : Number) : Nothing`\
    \ | 设置音量：0.0 为静音，1.0 为 TouchDevelop 启动时的音量 |\n| `player→sound volume : Number`\
    \ | 获取音量（同样采用 0 到 1 的范围） |\n| `player→stop : Nothing` | 停止播放歌曲 |\n| `player→volume\
    \ : Number` | 获取播放器音量，范围从 0.0（静音）到 1.0（最大音量） |\n\n当专辑或播放列表被发送到播放器时，播放器会创建一个待播放的歌曲队列。默认情况下，歌曲将按照它们在专辑或播放列表中出现的顺序播放。但如果选择了随机播放模式，则会使用随机顺序。在当前歌曲播放结束前请求播放新歌曲，会导致当前歌曲终止，并且队列（如果不为空）会被清空，然后新歌曲才开始播放。\n\
    \n歌曲播放发生在后台。这意味着，播放器在执行其任务的同时，设备和（可能）TouchDevelop 脚本正在处理其他事情。当一首歌曲或一组歌曲被交给播放器时，播放器会记住需要播放的内容并开始播放。控制权会立即返回给脚本，以便在音乐播放的同时继续执行语句。\n\
    \n播放音量范围从 0.0 到 1.0。1.0 的值并不对应于设备所能达到的最大音量。该值是相对于 TouchDevelop 脚本外部设置的播放器音量而言的。脚本播放歌曲的音量不能超过设备当前的设置，但可以通过使用小于\
    \ 1.0 的音量值，以更低的音量播放。\n\n### 5.1.4 示例脚本\n\nTouchDevelop 网站上有许多选择和播放音乐的示例程序。下面图\
    \ 5-1 重现了一个适用于 Windows Phone 和 Android 平台的示例程序。它使用了 API 提供的若干功能。\n\n该脚本有一个在阅读时不易察觉的特性。当它运行时，会显示手机上所有从未播放过的歌曲的信息。如果用户滚动浏览显示的歌曲列表并点击其中一首，歌曲将立即开始播放。\n\
    \n![A978-1-4302-6137-7_5_Fig1_HTML.jpg](img/Image00036.jpg)\n\n**图 5-1**  \n“新歌曲”脚本（仅适用于\
    \ WP8 和 Android）\n\n## 5.2 声音\n\n`Sound` 数据类型用于 WAV 格式的音频录音。该格式通常用于未压缩的音频，因此文件往往较大。因此，此格式应仅用于简短的声音片段（例如\
    \ 30 秒或更短），例如由脚本播放的铃声、音效或警告声音。对于较长的片段，如果可能，应使用 `Song` 数据类型以及对应的压缩声音格式。\n\n`Sound`\
    \ 数据类型提供了许多用于播放声音片段和更改其播放属性的方法。这些方法总结在表 5-5 中。\n\n声像平衡指的是选择声音完全通过左声道播放、完全通过右声道播放，还是按一定比例通过两个声道同时播放的能力。声像值范围从\
    \ -1.0（完全偏左）到 0.0（居中，即左右声道均等），再到 1.0（完全偏右）。\n\n**表 5-5**  \n`Sound` 数据类型的方法\n\n\
    | 声音数据类型方法 | 描述 |\n| --- | --- |\n| `duration : Number` | 返回声音片段的时长（以秒为单位） |\n\
    | `pan : Number` | 获取声像平衡设置：从 -1（完全左声道）到 +1（完全右声道） |\n| `play : Nothing` | 播放声音片段\
    \ |\n| `play special(volume : Number, pitch : Number, pan : Number) : Nothing`\
    \ | 使用指定的声像平衡、音高和音量值播放声音片段 |\n| `pitch : Number` | 获取音高调节值，范围从 -1 到 +1 |\n| `set\
    \ pan(pan : Number) : Nothing` | 设置声像平衡：从 -1（完全左声道）到 +1（完全右声道） |\n| `set pitch(pitch\
    \ : Number) : Nothing` | 设置音高调节值，范围从 -1 到 +1 |\n| `set volume(v : Number) : Nothing`\
    \ | 设置音量，范围从 0（静音）到 +1（最大音量） |\n| `volume : Number` | 获取音量，范围从 0（静音）到 +1（最大音量）\
    \ |\n\n音高调节范围从 -1.0 到 1.0。如果选择 -1.0，播放速度会减慢，使得音高降低一个八度。中间值 0.0 以正常速度播放声音片段。最高值\
    \ 1.0 会导致播放速度加快，使得音高升高一个八度。\n\n与播放 `Song` 值类似，音量是一个从 0.0 到 1.0 的值，其中 1.0 是 TouchDevelop\
    \ 脚本外部设置的扬声器当前音量。脚本可以以低于此设置的音量播放声音，但不能超过此音量播放。\n"
- fmt: "## 5.3 Microphone\n\nMost devices have a microphone. However, the microphone\
    \ cannot be accessed from a program running in a browser on a PC, Mac or Linux\
    \ platform. It can be accessed on the Windows phone and the ability to access\
    \ it will be supported on iPad, iPhone, iPod Touch and Android platforms in the\
    \ near future.\n\nThe TouchDevelop API provides a method for activating the microphone\
    \ and making a recording.\n\n```\nvar snd := senses → record microphone\n// snd\
    \ has the datatype Sound\n```\n\nWhen the above statement is executed in a script,\
    \ the word \"Recording…\" and a stop button are displayed on the screen. Simultaneously,\
    \ the microphone begins recording. When the user taps the stop button, recording\
    \ stops and an instance of the `Sound` datatype is returned.\n\nAs noted earlier,\
    \ a `Sound` value uses the WAV audio format and is not compressed. Therefore the\
    \ microphone should not be used for long recordings.\n\n[![Creative Commons](Image00001.jpg)](https://creativecommons.org/licenses/by-nc-nd/4.0)\
    \ Open Access This chapter is licensed under the terms of the Creative Commons\
    \ Attribution-NonCommercial-NoDerivatives 4.0 International License ([http://​creativecommons.​org/​licenses/​by-nc-nd/​4.​0/​](http://creativecommons.org/licenses/by-nc-nd/4.0/)),\
    \ which permits any noncommercial use, sharing, distribution and reproduction\
    \ in any medium or format, as long as you give appropriate credit to the original\
    \ author(s) and the source, provide a link to the Creative Commons licence and\
    \ indicate if you modified the licensed material. You do not have permission under\
    \ this licence to share adapted material derived from this chapter or parts of\
    \ it. The images or other third party material in this chapter are included in\
    \ the chapter's Creative Commons licence, unless indicated otherwise in a credit\
    \ line to the material. If material is not included in the chapter's Creative\
    \ Commons licence and your intended use is not permitted by statutory regulation\
    \ or exceeds the permitted use, you will need to obtain permission directly from\
    \ the copyright holder.\n\n# 6. Camera, Graphics and Video\n\n[6.1 Camera](#text00006.html#Sec1)\
    \ [6.2 Working with pictures](#text00006.html#Sec3) [6.3 Static graphics drawing\
    \ and display](#text00006.html#Sec10) [6.4 Playing videos from the internet](#text00006.html#Sec11)\
    \ Keywords Video File Picture Type String Variable Window Phone Camera Picture\n\
    \nSmartphones, tablets and laptops are commonly used for displaying photographs\
    \ and videos. TouchDevelop scripts provide new ways to download, create, modify\
    \ and display photographs. Scripts can be used to record videos using the device's\
    \ camera and to play back both those videos and videos obtained from elsewhere.\n\
    \n## 6.1 Camera\n\nSmartphones, tablets and most laptops have at least one camera\
    \ capable of taking high-quality pictures or videos. This is the primary camera.\
    \ On a phone or tablet, it would normally be located on the opposite side from\
    \ the screen. Many of these devices have a second camera located above the screen\
    \ which captures the user's image and is intended for use in video calls, such\
    \ as a Skype call. A camera above the screen is normally the only one provided\
    \ on a laptop, and would be considered to be the primary camera by TouchDevelop.\n\
    \nThe TouchDevelop API provides access to the camera (or cameras) via its `senses`\
    \ service. The `senses` methods relevant to using the cameras are listed in Table\
    \ [6-1](#text00006.html#Tab1). Two of these methods return instances of type `Camera`.\
    \ This datatype provides methods for retrieving information about the camera and\
    \ for taking a quick low-quality picture on a smartphone.\n\n**Table 6-1** Methods\
    \ for using the camera(s)\n\n| Method | Description |\n| --- | --- |\n| `senses\
    \ → camera: Camera` | Returns the primary camera, if there is one; otherwise the\
    \ result is invalid. |\n| `senses → front camera: Camera` | Returns the secondary\
    \ camera, if there is one; otherwise the result is invalid. |\n| `senses → take\
    \ camera picture: Picture` | Uses the primary camera to take a picture. |\n| `wall\
    \ → set background camera( camera: Camera): Nothing` | Causes images from the\
    \ selected camera to be used as the background for the wall |\n\nThere are two\
    \ ways to take a picture with the primary camera. The two approaches behave differently\
    \ on a phone, but will normally behave identically on a laptop or tablet. The\
    \ two forms are\n\n```\nsenses → take camera picture\n```\n\nand\n\n```\nsenses\
    \ → front camera → preview\n```\n\nOn a Windows phone, the first form takes a\
    \ high-resolution picture using the phone's built-in software. This causes a preview\
    \ image to appear on the screen along with controls for adjusting the zoom level,\
    \ exposure and flash etc. Control is not returned to the TouchDevelop script until\
    \ the button to take the picture has been pressed and the picture taken. The second\
    \ form just returns the preview image without any delay. On other devices, the\
    \ two forms will both take pictures almost immediately and with the same resolution.\
    \ The user may be prompted to allow or deny the script access to the camera.\n\
    \nAll methods (except for invalid and post to wall) are listed in Table [6-2](#text00006.html#Tab2).\n\
    \nThe user has the option of cancelling the picture capture in the high-quality\
    \ version on a phone. Therefore the normal pattern of usage in a script might\
    \ be code like the following. (An audible warning, such as beeps, to indicate\
    \ when the picture is about to be snapped would be a useful addition to the script.)\n\
    \n```\n\"You have three seconds!\" → post to wall\n// give 3 seconds for user\
    \ to get ready\ntime → sleep(3)\nvar pic := senses → take camera picture\nif not\
    \ pic → is invalid then\n    // use the picture pic\n    ...\nelse\n    // user\
    \ cancelled the picture\n```\n\nTo determine whether the device has a secondary\
    \ camera, a script should invoke the `senses → front camera` method. (The name\
    \ of this method is perhaps inappropriate for a laptop or PC.) If the result is\
    \ the invalid value, then this camera is absent.\n\n**Table 6-2** Methods of the\
