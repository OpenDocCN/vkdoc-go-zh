    \ `bd`，并将其提升为全局变量。\n7.  在上一条语句下方插入一个新的空行。简单的方法是点击添加下方按钮，如图 A-6 所示。它是当前语句下方的加号符号。（或者，将插入点移动到语句的右端，然后按下键盘上的回车键。）\n\
    8.  使用与之前相同的技巧，插入以下语句：\n\n```\nvar sprite := ◳bd → create rectangle(360,60)\n\
    ```\n\n（要将全局变量 `◳bd` 插入右侧，请在键盘上找到标记为 `◳data` 的键；点击该键后，会出现一个标记为 `bd` 的键，每个已定义的全局变量对应一个键，应点击该键。）\n\
    \n![A978-1-4302-6137-7_12_Fig6_HTML.jpg](img/Image00064.jpg)\n\n*图 A-6 — 添加上方和添加下方按钮*\n\
    \n### 插入 `if` 语句\n\n要插入的语句如下：\n\n```\nif speed > 10 then\n  sprite → set color(colors\
    \ → red)\nelse\n  sprite → set color(colors → blue)\n◳bd → post to wall\n```\n\
    \n1.  点击输入的最后一条语句，然后点击添加下方按钮。接着点击右侧键盘顶行中标记为 `if` 的图块。一个空的 `if-then-else` 语句会被插入到脚本中。\n\
    2.  当前插入点位于应放置条件表达式的位置，点击右侧键盘中标有 `speed` 的键。然后点击标有 `>` 的键，最后点击左侧键盘中标有 `0` 的键。\n\
    3.  点击 `if` 语句的 `then` 子句中的 `do nothing` 注释，然后通过点击标有 `sprite` 和 `set color` 的键来插入下一条语句的初始版本。\n\
    4.  新语句将 `colors→random` 作为 `set color` 的参数。点击名称 `random` 将其选中。然后点击右侧键盘中标有退格键的图块，删除\
    \ `→random` 部分。最后点击右侧键盘中标有 `red` 的图块。\n5.  选中 `else` 关键字作为插入点，并类似地插入语句 `sprite\
    \ → set color(colors → blue)`。\n6.  点击关键字 `if`，使得整个 `if` 语句被添加上方和添加下方按钮包围。点击添加下方按钮，插入点变为\
    \ `if` 语句下方的新行。使用前面描述的类似步骤，插入最后一行 `◳bd→post to wall`。\n\n### 定义游戏循环事件\n\n最后几步提供了游戏循环事件的代码。代码如下所示：\n\
    \n```\nevent gameloop( )\n  var sprite := ◳bd → at(0)\n  var x := sprite → angle\
    \ + ◳rate\n  sprite → set angle(x)\n  ◳bd → update on wall\n```\n\n1.  如有必要，点击窗口中远离刚输入代码的任何位置，以便第二列显示脚本的不同组件。应该有一个标题为\
    \ `events` 的部分。点击该标题下方的加号符号。\n2.  屏幕上将显示一个可滚动的不同事件类型的列表。点击标有 `gameloop()` 的项。此新事件将作为脚本的组件之一出现在第二列中，并且游戏循环事件的代码将出现在第三列中。\n\
    3.  使用与之前覆盖的相同步骤，可以插入处理该事件的四个语句。\n\n### 尝试运行脚本\n\n至此，我们应该测试脚本。\n\n![A978-1-4302-6137-7_12_Fig7_HTML.jpg](img/Image00065.jpg)\n\
    \n*图 A-7 — 正在运行的脚本*\n\n1.  屏幕左侧列中有一个标有 `run` 的按钮。点击此按钮开始运行脚本。由于脚本需要一个输入参数，屏幕上会出现一个对话框。在文本输入字段中输入一个数字，例如\
    \ `10`，然后点击 `OK` 按钮。\n2.  运行中的脚本的显示画面如图 A-7 所示。要暂停脚本，请点击浏览器窗口右上角的 `stop` 按钮。要恢复运行脚本，请点击之前相同位置的按钮（它已变为\
    \ `run` 按钮）。\n3.  要退出脚本的执行，请点击左上角标有左箭头的按钮。这将返回到编辑器。\n\n## A.3 附加步骤\n\n### 修订脚本\n\
    \n如果脚本的行为不符合预期或需要改进，可以轻松返回并编辑代码。在列出脚本组件的屏幕上，只需点击动作名称或事件名称，即可在编辑器窗口的第三列显示其代码。\n\
    \n### 发布脚本\n\n如果代码值得与他人分享，或者仅仅是为了将其保存到云端，则可以发布该脚本。只需点击指向上方的箭头（下方标有 `publish`），该箭头出现在第二列中脚本属性图块的右侧。\n\
    \n点击 `publish` 按钮后，屏幕应显示一条消息，其下方带有按钮。一个按钮标记为 `publish`，另一个标记为 `publish as hidden`。这两个按钮提供了选择将脚本设为可见或隐藏的选项。\n\
    \n如果标记为可见，那么任何在 TouchDevelop 网站上搜索特定语言特性或脚本功能示例的人都可能被引导至此脚本。它也可能出现在新脚本列表或特色脚本列表中。如果标记为隐藏，则不会出现在此类搜索中（但任何知道脚本代码名称的人仍然可以访问它）。\n\
    \n## A.4 更多高级编辑功能\n"
- fmt: '### A.4.1 Refactoring code into a new action


    Removing a sequence of statements and making a new action from them is known as
    refactoring. The TouchDevelop editor makes this process easy. To demonstrate,
    the steps for refactoring a few statements from the main action in the rotor script
    are given below.


    1. Select the first line in the sequence. The statement which assigns to the variable
    `sprite` in the main action is shown as selected in Figure [A-8](#text00012.html#Fig8).

    2. Tap the button labeled `mark` which appears to the right of the window. The
    code listing display changes to be like that seen in Figure [A-9](#text00012.html#Fig9).
    The extent of the lines of code to be refactored is shown by the two thick red
    lines.

    3. Now drag the bottom red line downwards until it is immediately below the last
    statement to be transferred to the refactored action. The screen should be showing
    a selected group of lines similar to that shown in Figure [A-10](#text00012.html#Fig10).

    4. In the second column displayed in the browser window, there are several headings
    and several buttons. Underneath the heading which reads “extract selection into
    action”, enter a suitable name for the new action into the textbox, replacing
    the default name of `do stuff`. Figure [A-11](#text00012.html#Fig11) shows that
    textbox after entering the new name `update sprite`.

    5. Now tap that `extract` button and the new action is created. The refactored
    action is provided with whichever parameters are needed to allow it to work correctly.
    A statement is inserted into the main action, replacing the refactored code.


    It should be observed that the marked group of statements could have been selected
    by first marking the last line and then moving the top horizontal red line upwards.
    Or any line in the group can be marked and both end point lines adjusted.


    ![A978-1-4302-6137-7_12_Fig10_HTML.jpg](Image00068.jpg)


    Figure A-10 — Marking the last line to extract


    ![A978-1-4302-6137-7_12_Fig9_HTML.jpg](Image00067.jpg)


    Figure A-9 — Marking the first line to extract


    ![A978-1-4302-6137-7_12_Fig8_HTML.jpg](Image00066.jpg)


    Figure A-8 — Selecting the first line


    ![A978-1-4302-6137-7_12_Fig11_HTML.jpg](Image00069.jpg)


    Figure A-11 — Naming the extracted code


    ### A.4.2 Copying and pasting code


    If a range of lines of code has been marked, following steps similar to those
    given above, those lines can be cut and temporarily held on the editor’s clipboard.


    Next another place in the code of any action or event can be selected. A button
    labeled `paste` appears on the right hand side. Tap that button to insert the
    cut code next to the selected line.


    The pasted code appears above or below the selected line and which of the two
    places is chosen depends on various factors. To force the correct placement, always
    begin by inserting an empty line at the desired place for the pasted code. Then
    the `paste` button causes the pasted code to replace that empty line.


    ### A.4.3 Surrounding code in a higher-level construct


    Sometimes some complicated editing actions are needed. For example, an existing
    group of statements might need to become the `then` clause of a new `if` statement.
    That group of lines simply needs be marked using the same steps as previously
    described.


    In the second column of the editor’s window, there is a heading which reads “surround
    with” and underneath there are buttons labeled `if`, `for each`, `for`, `while`
    and `boxed`. Each one of these buttons performs exactly as advertised.


