- fmt: "### 3.1.1 Output of Simple Values\n\nEvery datatype in TouchDevelop provides\
    \ a method named `post to wall`. If that method is called, some representation\
    \ of the value is displayed. Here are some simple examples.\n\n```\naction main()\n\
    \    (1/3) → post to wall\n    123 → post to wall\n    (\"hello\" || \" there\"\
    ) → post to wall\n    (11>11) → post to wall\n```\n\nThe code produces a result\
    \ like that shown in Figure [3-1](#text00003.html#Fig1) on the left side. Note\
    \ that the output is apparently displayed in reverse order. That is because the\
    \ default is for each new output item to be inserted at the top of the screen,\
    \ pushing previously generated output further down. The default is a good one\
    \ if it is desired that the user can see the most recent item without having to\
    \ scroll down.\n\n![A978-1-4302-6137-7_3_Fig1_HTML.jpg](Image00018.jpg)\n\n**Figure\
    \ 3-1** — Simple output, normal and reversed order\n\nTo display a value in a\
    \ manner which stands out prominently on the screen, a `TextBox` value can be\
    \ used. The text can be displayed in any color, with any size font, against any\
    \ background color. A simple example of using a `TextBox` to display a string\
    \ is shown in Figure [3-2](#text00003.html#Fig2). The script is shown on the left\
    \ and the result of running it is shown on the right.\n\n![A978-1-4302-6137-7_3_Fig2_HTML.jpg](Image00019.jpg)\n\
    \n**Figure 3-2** — Displaying a string using a `TextBox`\n\n### 3.1.2 Direction\
    \ of Output\n\nThe default direction of output on the screen can be changed so\
    \ that items are displayed from top-to-bottom. To do so, make the method call:\n\
    \n```\nwall → set reversed(true)\n```\n\nThe following sample script should make\
    \ the effect clear.\n\n```\naction main()\n    (1/3) → post to wall\n    123 →\
    \ post to wall\n    wall → set reversed(true)\n    (\"hello\" || \" there\") →\
    \ post to wall\n    (11>11) → post to wall\n```\n\nThe result of running the script\
    \ is shown in Figure [3-1](#text00003.html#Fig1) on the right side. Comparison\
    \ of the two snapshots shows that the call affected all output on the screen –\
    \ not just the output generated after the call was made.\n\nIn summary, the effect\
    \ of making the call with an argument of `true` is to cause existing output on\
    \ the screen to be reordered if necessary, so that the oldest output is at the\
    \ top and the newest output is at the bottom. Future calls to\n\n```\npost to\
    \ wall\n```\n\ncause the new output to be added at the bottom. Making the call\n\
    \n```\nwall → set reversed(false)\n```\n\nreorders the output again so that the\
    \ oldest output is at the bottom and the newest is at the top, then subsequent\
    \ calls to `post to wall` will again cause output to be inserted at the top of\
    \ the screen.\n\n### 3.1.3 Output of Composite Values\n\nDisplaying a composite\
    \ value such as one with the `DateTime` or `Vector3` type produces an appropriately\
    \ formatted result. Displaying a collection of values produces a list of items\
    \ on the screen, each element formatted in the appropriate manner for the element’s\
    \ datatype.\n\nFigure [3-3](#text00003.html#Fig3) gives a few examples of composite\
    \ values being displayed.\n\n![A978-1-4302-6137-7_3_Fig3_HTML.jpg](Image00020.jpg)\n\
    \n**Figure 3-3** — Displaying composite values\n\n### 3.1.4 Output of Media Values\n\
    \nEach media value is displayed on the screen in a manner appropriate for the\
    \ datatype. In the case of a `Song` or a `Song Album` value, there is also a play\
    \ button displayed. Tapping that play button causes the song or the song album\
    \ to be played.\n\nA summary of what is displayed for each datatype is given in\
    \ Table [3-1](#text00003.html#Tab1).\n\n**Table 3-1** — Display of media values\n\
    \n| Datatype | What is displayed |\n| --- | --- |\n| `Picture` | The picture,\
    \ resized if necessary to fit the screen. |\n| `Board` | The board (note that\
    \ the board can be changed and redisplayed dynamically). |\n| `Song` | A play\
    \ button plus whichever of these items is available: duration, artist, name of\
    \ album from which the song was obtained, the album cover, track number. |\n|\
    \ `Sound` | The text “A sound…” and a button to play the sound. |\n| `Picture\
    \ Album` | A sequence of all pictures in the album. |\n| `Song Album` | A play\
    \ button plus whichever of these items if available: total duration, artist, name\
    \ of album, the album cover, number of tracks. |\n\n### 3.1.5 Output of Social\
    \ Values\n\nEach value managed by the social API is displayed in a manner appropriate\
    \ for the datatype. The `Contact` and `Link` values include buttons which can\
    \ be tapped to initiate a phone call or send a message.\n\nA summary of what is\
    \ displayed for each datatype is given in Table [3-2](#text00003.html#Tab2).\n\
    \n**Table 3-2** — Display of social values\n\n| Datatype | What is displayed |\n\
    | --- | --- |\n| `Appointment` | The date, time and details of the appointment.\
    \ |\n| `Contact` | The name of the contact plus buttons which can be tapped to\
    \ initiate a phone call or send a SMS message or send an email to this contact.\
    \ |\n| `Link` | The name associated with the link plus a button to initiate a\
    \ phone call, send a SMS message or send an email, depending on the kind of link.\
    \ |\n| `Location` | A scrollable Bing map which shows the location. |\n| `Message`\
    \ | The name of the sender, the time when the message was sent plus the contents\
    \ of the message. |\n| `Place` | The name associated with the place plus a thumbnail\
    \ map showing the location of the place. |\n\n### 3.1.6 Output of Web Values\n\
    \nThere are several datatypes specifically associated with web access. Values\
    \ of five of these types are displayed on the wall according to Table [3-3](#text00003.html#Tab3).\n\
    \n**Table 3-3** — Display of web values\n\n| Datatype | What is displayed |\n\
    | --- | --- |\n| `Form Builder` | The current contents of the form |\n| `Json\
    \ Object` | The string value of the JSON object. |\n| `Web Request` | Two lines\
    \ which display the accepted webpage encodings followed by a line which contains\
    \ the keyword GET followed by a URL. |\n| `Web Response` | The response |\n| `Xml\
    \ Object` | The string value of the XML object |\n\n## 3.2 Input of Values from\
    \ the Touchscreen\n\nThe wall API provides several methods which prompt the user\
    \ to enter a value or pick a value from a range of possibilities. These methods\
    \ are listed in Table [3-4](#text00003.html#Tab4). Some sample statements to illustrate\
    \ their use are shown in Figure [3-4](#text00003.html#Fig4).\n\n**Table 3-4**\
    \ — Prompting for input\n\n| Datatype | Method | Description |\n| --- | --- |\
    \ --- |\n| `Boolean` | `ask boolean` | An OK button and a Cancel button are displayed.\
    \ Tapping OK returns `true` and tapping Cancel returns `false` |\n| `Number` |\
    \ `ask number` | The user is prompted to enter a number, which is returned as\
    \ the result |\n| `String` | `ask string` | The user is prompted to enter a string\
    \ which is returned as the result |\n| `DateTime` | `pick date` | The user is\
    \ prompted to pick a date; that date combined with a time of 12 noon is returned\
    \ as the result |\n| `String` | `pick string` | A list of strings is displayed\
    \ and the user is prompted to pick one; the index of the selected string is returned\
    \ as the result |\n| `DateTime` | `pick time` | The user is prompted to pick a\
    \ time of day; that time combined is with an undefined date and returned as the\
    \ result |\n\n## 3.3 Updating the Wall’s Content\n\nEach call of `post to wall`\
    \ adds a new item on the screen. However it is frequently the case that we wish\
    \ to leave the number of items unchanged and simply alter the value of one of\
    \ them. The simplest, least sophisticated and least efficient way to achieve that\
    \ effect would be to invoke\n\n```\nwall → clear\n```\n\nand then re-display all\
    \ the items with their new values.\n\nHowever, TouchDevelop provides some alternatives\
    \ which should be preferred.\n\n![A978-1-4302-6137-7_3_Fig4_HTML.jpg](Image00021.jpg)\n\
    \n**Figure 3-4** — Prompting for input"
  raw: '### 3.1.1 Output of simple values


    Every datatype in TouchDevelop provides a method named post to wall. If that method
    is called, some representation of the value is displayed. Here are some simple
    examples.


            `action` `main()`


                `(1/3) → post to wall`


                `123 → post to wall`


                `("hello" || " there") → post to wall`


                `(11>11) → post to wall`


    The code produces a result like that shown in Figure [3-1](#text00003.html#Fig1)
    on the left side. Note that the output is apparently displayed in reverse order.
    That is because the default is for each new output item to be inserted at the
    top of the screen, pushing previously generated output further down. The default
    is a good one if it is desired that the user can see the most recent item without
    having to scroll down.


    ![A978-1-4302-6137-7_3_Fig1_HTML.jpg](Image00018.jpg)


    Figure 3-1


    Simple output, normal and reversed order


    To display a value in a manner which stands out prominently on the screen, a `TextBox`
    value can be used. The text can be displayed in any color, with any size font,
    against any background color. A simple example of using a `TextBox` to display
    a string is shown in Figure [3-2](#text00003.html#Fig2) . The script is shown
    on the left and the result of running it is shown on the right.


    ![A978-1-4302-6137-7_3_Fig2_HTML.jpg](Image00019.jpg)


    Figure 3-2


    Displaying a string using a TextBox


    ### 3.1.2 Direction of Output


    The default direction of output on the screen can be changed so that items are
    displayed from top-to-bottom. To do so, make the method call:


            `wall →set reversed(true)`


    The following sample script should make the effect clear.


             `action` `main()`


                `(1/3)→post to wall`


                `123→post to wall`


                `wall →set reversed(true)`


                `("hello" || " there") →post to wall`


                `(11>11) →post to wall`


    The result of running the script is shown in Figure [3-1](#text00003.html#Fig1)
    on the right side. Comparison of the two snapshots shows that the call affected
    all output on the screen – not just the output generated after the call was made.


    In summary, the effect of making the call with an argument of `true` is to cause
    existing output on the screen to be reordered if necessary, so that the oldest
    output is at the top and the newest output is at the bottom. Future calls to


                `post to wall`


    cause the new output to be added at the bottom. Making the call


                `wall →set reversed(false)`


    reorders the output again so that the oldest output is at the bottom and the newest
    is at the top, then subsequent calls to `post to wall` will again cause output
    to be inserted at the top of the screen.


    ### 3.1.3 Output of composite values


    Displaying a composite value such as one with the `DateTime` or `Vector3` type
    produces an appropriately formatted result. Displaying a collection of values
    produces a list of items on the screen, each element formatted in the appropriate
    manner for the element’s datatype.


    Figure [3-3](#text00003.html#Fig3) gives a few examples of composite values being
    displayed.


    ![A978-1-4302-6137-7_3_Fig3_HTML.jpg](Image00020.jpg)


    Figure 3-3


    Displaying composite values


    ### 3.1.4 Output of media values


    Each media value is displayed on the screen in a manner appropriate for the datatype.
    In the case of a `Song` or a `Song Album` value, there is also a play button displayed.
    Tapping that play button causes the song or the song album to be played.


    A summary of what is displayed for each datatype is given in Table [3-1](#text00003.html#Tab1)
    .


    Table 3-1


    Display of media values


    | Datatype | What is displayed |

    | --- | --- |

    | `Picture` | The picture, resized if necessary to fit the screen. |

    | `Board` | The board (note that the board can be changed and redisplayed dynamically).
    |

    | `Song` | A play button plus whichever of these items is available: duration,
    artist, name of album from which the song was obtained, the album cover, track
    number. |

    | `Sound` | The text “A sound…” and a button to play the sound. |

    | `Picture Album` | A sequence of all pictures in the album. |

    | `Song Album` | A play button plus whichever of these items if available: total
    duration, artist, name of album, the album cover, number of tracks. |


    ### 3.1.5 Output of social values


    Each value managed by the social API is displayed in a manner appropriate for
    the datatype. The `Contact` and `Link` values include buttons which can be tapped
    to initiate a phone call or send a message.


    A summary of what is displayed for each datatype is given in Table [3-2](#text00003.html#Tab2)
    .


    Table 3-2


    Display of social values


    | Datatype | What is displayed |

    | --- | --- |

    | `Appointment` | The date, time and details of the appointment. |

    | `Contact` | The name of the contact plus buttons which can be tapped to initiate
    a phone call or send a SMS message or send an email to this contact. |

    | `Link` | The name associated with the link plus a button to initiate a phone
    call, send a SMS message or send an email, depending on the kind of link. |

    | `Location` | A scrollable Bing map which shows the location. |

    | `Message` | The name of the sender, the time when the message was sent plus
    the contents of the message. |

    | `Place` | The name associated with the place plus a thumbnail map showing the
    location of the place. |


    ### 3.1.6 Output of web values


    There are several datatypes specifically associated with web access. Values of
    five of these types are displayed on the wall according to Table [3-3](#text00003.html#Tab3)
    .


    Table 3-3


    Display of web values


    | Datatype | What is displayed |

    | --- | --- |

    | `Form Builder` | The current contents of the form |

    | `Json Object` | The string value of the JSON object. |

    | `Web Request` | Two lines which display the accepted webpage encodings followed
    by a line which contains the keyword GET followed by a URL. |

    | `Web Response` | The response |

    | `Xml Object` | The string value of the XML object |


    ## 3.2 Input of values from the touchscreen


    The wall API provides several methods which prompt the user to enter a value or
    pick a value from a range of possibilities. These methods are listed in Table
    [3-4](#text00003.html#Tab4) . Some sample statements to illustrate their use are
    shown in Figure [3-4](#text00003.html#Fig4) .


    Table 3-4


    Prompting for input


    | Datatype | Method | Description |

    | --- | --- | --- |

    | `Boolean` | `ask boolean` | An OK button and a Cancel button are displayed.
    Tapping OK returns true and tapping Cancel returns false |

    | `Number` | `ask number` | The user is prompted to enter a number, which is returned
    as the result |

    | `String` | `ask string` | The user is prompted to enter a string which is returned
    as the result |

    | `DateTime` | `pick date` | The user is prompted to pick a date; that date combined
    with a time of 12 noon is returned as the result |

    | `String` | `pick string` | A list of strings is displayed and the user is prompted
    to pick one; the index of the selected string is returned as the result |

    | `DateTime` | `pick time` | The user is prompted to pick a time of day; that
    time combined is with an undefined date and returned as the result |


    ## 3.3 Updating the wall’s content


    Each call of `post to wall` adds a new item on the screen. However it is frequently
    the case that we wish to leave the number of items unchanged and simply alter
    the value of one of them. The simplest, least sophisticated and least efficient
    way to achieve that effect would be to invoke


            `wall → clear`


    and then re-display all the items with their new values.


    However, TouchDevelop provides some alternatives which should be preferred.


    ![A978-1-4302-6137-7_3_Fig4_HTML.jpg](Image00021.jpg)


    Figure 3-4


    Prompting for input'
  trans: "\n### 3.1.1 简单值的输出\n\nTouchDevelop 中的每种数据类型都提供了一个名为`post to wall`的方法。调用该方法后，会显示该值的某种表现形式。以下是一些简单的示例。\n\
    \n```\naction main()\n    (1/3) → post to wall\n    123 → post to wall\n    (\"\
    hello\" || \" there\") → post to wall\n    (11>11) → post to wall\n```\n\n这段代码产生的效果类似于左侧图\
    \ 3-1 所示。请注意，输出结果明显是按相反顺序显示的。这是因为默认情况下，每个新的输出项都会被插入到屏幕顶部，从而将之前生成的输出项向下推移。如果希望用户无需向下滚动就能看到最新项目，那么这个默认设置是很好的选择。\n\
    \n![A978-1-4302-6137-7_3_Fig1_HTML.jpg](img/Image00018.jpg)\n\n**图 3-1** — 简单输出，正常顺序与相反顺序\n\
    \n若要以在屏幕上突出显示的方式显示一个值，可以使用`TextBox`值。文本可以以任何颜色、任何字号显示，背景色也可任意选择。图 3-2 显示了一个使用`TextBox`显示字符串的简单示例。左侧是脚本，右侧是运行结果。\n\
    \n![A978-1-4302-6137-7_3_Fig2_HTML.jpg](img/Image00019.jpg)\n\n**图 3-2** — 使用\
    \ `TextBox` 显示字符串\n\n### 3.1.2 输出的方向\n\n屏幕上的默认输出方向是可以更改的，可以使项目从上到下显示。为此，需要调用以下方法：\n\
    \n```\nwall → set reversed(true)\n```\n\n以下示例脚本可以清楚地说明这种效果。\n\n```\naction main()\n\
    \    (1/3) → post to wall\n    123 → post to wall\n    wall → set reversed(true)\n\
    \    (\"hello\" || \" there\") → post to wall\n    (11>11) → post to wall\n```\n\
    \n运行该脚本的结果如图 3-1 右侧所示。对比这两张截图可以发现，这次调用影响了屏幕上的所有输出——而不仅仅是在调用之后生成的输出。\n\n总而言之，使用参数`true`调用该方法的效果是，如果必要，会对屏幕上现有的输出进行重新排序，使得最早的输出位于顶部，最新的输出位于底部。后续对\n\
    \n```\npost to wall\n```\n\n的调用将使新的输出添加到底部。而调用\n\n```\nwall → set reversed(false)\n\
    ```\n\n则会再次对输出进行重新排序，使得最早的输出位于底部，最新的输出位于顶部，之后对`post to wall`的调用将再次将输出插入到屏幕顶部。\n\
    \n### 3.1.3 复合值的输出\n\n显示复合值（例如`DateTime`或`Vector3`类型的值）会生成格式适当的结果。显示一组值会在屏幕上产生一个项目列表，每个元素都根据其数据类型的格式进行适当格式化。\n\
    \n图 3-3 给出了几个显示复合值的示例。\n\n![A978-1-4302-6137-7_3_Fig3_HTML.jpg](img/Image00020.jpg)\n\
    \n**图 3-3** — 显示复合值\n\n### 3.1.4 媒体值的输出\n\n每个媒体值都会以适合其数据类型的方式显示在屏幕上。对于`Song`或`Song\
    \ Album`值，还会显示一个播放按钮。点击该播放按钮会播放歌曲或歌曲专辑。\n\n表 3-1 总结了每种数据类型显示的内容。\n\n**表 3-1**\
    \ — 媒体值的显示\n\n| 数据类型 | 显示内容 |\n| --- | --- |\n| `Picture` | 图片，必要时会调整大小以适应屏幕。\
    \ |\n| `Board` | 板（注意，板可以被动态更改并重新显示）。 |\n| `Song` | 一个播放按钮，以及以下可用项：时长、艺术家、歌曲来源专辑名称、专辑封面、曲目编号。\
    \ |\n| `Sound` | 文本“一段声音…”和一个用于播放声音的按钮。 |\n| `Picture Album` | 该专辑中所有图片的序列。 |\n\
    | `Song Album` | 一个播放按钮，以及以下可用项（如果可用）：总时长、艺术家、专辑名称、专辑封面、曲目数量。 |\n\n### 3.1.5 社交值的输出\n\
    \n社交 API 管理的每个值都会以适合其数据类型的方式显示。`Contact`和`Link`值包含可点击的按钮，用于发起电话呼叫或发送消息。\n\n表 3-2\
    \ 总结了每种数据类型显示的内容。\n\n**表 3-2** — 社交值的显示\n\n| 数据类型 | 显示内容 |\n| --- | --- |\n| `Appointment`\
    \ | 约会的日期、时间和详情。 |\n| `Contact` | 联系人的姓名，以及可点击的按钮，用于发起电话呼叫、发送短信或发送电子邮件给此联系人。 |\n\
    | `Link` | 与该链接关联的名称，以及一个按钮，根据链接类型可发起电话呼叫、发送短信或发送电子邮件。 |\n| `Location` | 一个可滚动的必应地图，显示该位置。\
    \ |\n| `Message` | 发件人的姓名、消息发送时间以及消息内容。 |\n| `Place` | 与该地点关联的名称，以及一个显示该地点位置的缩略地图。\
    \ |\n\n### 3.1.6 Web 值的输出\n\n有几种数据类型专门与 Web 访问相关联。其中五种类型的值会按照表 3-3 显示在墙上。\n\n\
    **表 3-3** — Web 值的显示\n\n| 数据类型 | 显示内容 |\n| --- | --- |\n| `Form Builder` | 表单的当前内容\
    \ |\n| `Json Object` | JSON 对象的字符串值。 |\n| `Web Request` | 两行显示接受的网页编码，后跟一行包含关键字\
    \ GET 和 URL 的内容。 |\n| `Web Response` | 响应 |\n| `Xml Object` | XML 对象的字符串值 |\n\n\
    ## 3.2 从触控屏输入值\n\nwall API 提供了几种方法，提示用户输入一个值或从一系列选项中选择一个值。这些方法列在表 3-4 中。图 3-4\
    \ 显示了一些示例语句，用于说明它们的用法。\n\n**表 3-4** — 提示输入\n\n| 数据类型 | 方法 | 描述 |\n| --- | ---\
    \ | --- |\n| `Boolean` | `ask boolean` | 显示一个“确定”按钮和一个“取消”按钮。点击“确定”返回`true`，点击“取消”返回`false`\
    \ |\n| `Number` | `ask number` | 提示用户输入一个数字，并将其作为结果返回 |\n| `String` | `ask string`\
    \ | 提示用户输入一个字符串，并将其作为结果返回 |\n| `DateTime` | `pick date` | 提示用户选择一个日期；该日期与中午 12\
    \ 点的时间组合后作为结果返回 |\n| `String` | `pick string` | 显示一个字符串列表，提示用户选择一个；返回所选字符串的索引\
    \ |\n| `DateTime` | `pick time` | 提示用户选择一天中的某个时间；该时间与一个未定义的日期组合后作为结果返回 |\n\n##\
    \ 3.3 更新 Wall 的内容\n\n每次调用`post to wall`都会在屏幕上添加一个新项目。然而，我们经常希望保持项目数量不变，只更改其中某个项目的值。实现这一目的最简单、最原始且效率最低的方法是调用\n\
    \n```\nwall → clear\n```\n\n然后使用新值重新显示所有项目。\n\n但是，TouchDevelop 提供了一些更推荐使用的替代方法。\n\
    \n![A978-1-4302-6137-7_3_Fig4_HTML.jpg](img/Image00021.jpg)\n\n**图 3-4** — 提示输入\n"
- fmt: '# Updatable Textbox


    For the display of text which needs to be changed while the script is executing,
    a textbox provides an easy-to-use mechanism. Figure 3-5 shows a simple script
    which displays a line of text on the screen and then changes the text when the
    page button at the bottom is tapped.


    The call to the `set text` method of the textbox causes the string displayed on
    the screen to be updated immediately. It is also possible to change the size of
    the text and the colors used in the textbox on the fly. Note that if the same
    textbox value has been posted to the wall more than once, then the `set text`
    method will cause all of those occurrences on the wall to be updated.


    ![A978-1-4302-6137-7_3_Fig5_HTML.jpg](Image00022.jpg)


    Figure 3-5: An updatable textbox (`/censaair`)


    ## Updating a Board Display


    For updating more sophisticated displays of information on the screen, an instance
    of the `Board` datatype is normally used. Pictures, text messages and shapes can
    all be drawn on the board as sprites. Each sprite can have its position, orientation
    or content changed individually. Then a call to the `update on wall` method of
    the board causes a rendering of the board on the screen to be immediately updated.
    Although the main usage of the `Board` datatype was intended to be for implementing
    games, it is useful in any situation where information displayed on the screen
    needs to be changed.


    A re-implementation of the previous example where a board is used instead is shown
    in Figure 3-6. The use of a board and sprites provides much greater flexibility
    because the positions and orientations of the items on the screen can also be
    updated.


    ![A978-1-4302-6137-7_3_Fig6_HTML.jpg](Image00023.jpg)


    Figure 3-6: Updating text using a board (`/wkoxnasz`)


    # Events on the Touchscreen


    ## Tap Wall Events


    A script can receive input via tap events on the screen. There is one event type
    for nearly every kind of value which can be displayed on the screen. A full list
    is provided in Table 3-5.


    If one of these values is displayed on the screen, then tapping the value will
    cause the corresponding event to be executed. The tapped item is passed as a parameter
    to the event. The normal parameter passing rules are used, implying that a copy
    of the value is passed if the item is a value type and a reference to the value
    is passed if the item is a reference type. A trivial script which shows the use
    of tap events to select a string is shown in Figure 3-7.


    ![A978-1-4302-6137-7_3_Fig7_HTML.jpg](Image00024.jpg)


    Figure 3-7: Using tap wall events


    ## Tap Board Events


    Although it is easy to display values on the screen and associate `tap wall` events
    with them, there is very little control over where the values are positioned.
    To achieve full control over placement, it is necessary to display the values
    as sprites on an instance of the `Board` datatype. If the script displays the
    board with its sprites on the screen, then tapping or swiping or dragging one
    of the sprites will trigger an event that can be captured by the script.


    A trivial script which brightens or darkens the color of a solid rectangle when
    buttons are tapped is shown in Figure 3-8.


    ### Table 3-5: Tap Wall Events


    | Event | What happens |

    | --- | --- |

    | `tap wall Appointment` | Each event receives a single parameter. That parameter
    has the datatype named in the event. When any value of this type is tapped on
    the screen, the corresponding event is triggered. For value types, a copy of the
    value which was tapped is passed as the parameter. For reference types, a reference
    to the tapped value is passed as the parameter. |

    | `tap wall Camera` | |

    | `tap wall Color` | |

    | `tap wall Contact` | |

    | `tap wall Link` | |

    | `tap wall Message` | |

    | `tap wall Motion` | |

    | `tap wall Page Button` | |

    | `tap wall Picture` | |

    | `tap wall Picture Album` | |

    | `tap wall Place` | |

    | `tap wall Playlist` | |

    | `tap wall Song` | |

    | `tap wall Song Album` | |

    | `tap wall Sound` | |

    | `tap wall String` | |

    | `tap wall TextBox` | |

    | `tap wall Vector3` | |


    Simply defining a variable with a datatype of `Board` or `Sprite` or `Sprite Set`
    in the data section of the script causes new event types to be made available.
    In the case of the script shown in Figure 3-7, the data section contains three
    sprites named `rectangle`, `Lighter` and `Darker`, it contains `controls` which
    has type `Sprite Set`, and `board` which has type `Board`.


    The existence of these globally visible data variables creates 14 events with
    these names:


    ![A978-1-4302-6137-7_3_Fig8_HTML.jpg](Image00025.jpg)


    Figure 3-8: Using sprite events (`/akmcnpux`)


    - `tap sprite: rectangle`, `swipe sprite: rectangle`, `drag sprite: rectangle`

    - `tap sprite: Lighter`, `swipe sprite: Lighter`, `drag sprite: Lighter`

    - `tap sprite: Darker`, `swipe sprite: Darker`, `drag sprite: Darker`

    - `tap sprite in controls`, `swipe sprite in controls`, `drag sprite in controls`

    - `tap board: board`, `swipe board: board`


    For sprites, the event names have the pattern `tap/swipe/drag sprite: xxx` where
    `xxx` is the name of the sprite. For sprite sets, the names have the pattern `tap/swipe/drag
    sprite in YYY` where `YYY` is the name of the set. For boards, the names have
    the pattern `tap/swipe board: ZZZ` where `ZZZ` is the name of the board. Parameters
    passed to each event identify which sprite was touched (when it is a sprite set
    event), the coordinates of the sprite on the board, and the extent of a swiping
    or a dragging action.


    Note that there are yet more events associated with the `Board` datatype which
    have not been listed here, including the possibility of tapping anywhere on the
    board (not just on a sprite) and obtaining the coordinates of where the screen
    was tapped.


    # Pushing and Popping Pages


    Some scripts may need to display information temporarily and then have it disappear.
    Or, perhaps, there is a need to input some extra information from the user but
    it is undesirable to disrupt what has already been displayed on the screen. The
    solution, for situations like these, is to create a brand new wall on which information
    is displayed and input is requested, then have that wall disappear and have the
    original wall re-displayed.


    The general facility takes the form of a stack of pages. Each page corresponds
    to an instance of the wall.


    The following command creates a new empty wall.


    ```

    wall → push new page

    ```


    The script can then proceed to display information or prompt for input on this
    new wall. Afterwards, the following command


    ```

    wall → pop page

    ```


    will delete that new wall and revert to displaying the previous version.


    Some additional methods associated with the wall API are `wall → pages` which
    returns the stack of pages as a collection, and `wall → current page` which gets
    the current page.


    # Titles and Subtitles


    The output from a script can be beautified by displaying a title at the top of
    the screen. If appropriate, a subtitle may be displayed too. A few lines of code
    which illustrate the features are as follows.


    ```

    wall → set title("The wall''s title")

    wall → set subtitle("The subtitle")

    "First line of output" → post to wall

    "Second line of output" → post to wall

    ```


    The result of running this code appears in Figure 3-9. Note that the capitalization
    of the title and subtitle has been changed; they have both been converted to lowercase.


    ![A978-1-4302-6137-7_3_Fig9_HTML.jpg](Image00026.jpg)


    Figure 3-9: Title and subtitle example'
