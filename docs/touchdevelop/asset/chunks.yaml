    \ 已推出适用于个人电脑、Mac 和 Linux 平台，以及 iPad、iPhone、iPod Touch 和 Android 设备的版本。TouchDevelop\
    \ 是一个真正用于创建可移植应用的便携式开发环境。\n"
- fmt: '# Who this book is for


    Mobile devices represent the latest in technology. Furthermore, many students
    actually own their own smartphone. High school teachers and college or university
    instructors love the idea of using the latest technology to engage their students.
    While they may be experts in the field of teaching programming, many teachers
    appreciate guidance on how to navigate a complex app like `TouchDevelop`: its
    visual program editor is designed for touchscreens and uses different editing
    paradigms from a traditional keyboard-based text processor. Another opportunity
    and challenge is how to make use of some of the sensors that a modern mobile device
    has to offer.


    This book has much to offer to both both teachers and self-starting students who
    are learning how to program on their own. For teachers, it walks in detail through
    all of the screens of the app, and it points out similarities and differences
    of the `TouchDevelop` language compared to other programming languages that the
    teacher might already be familiar with. For students and enthusiasts, the book
    can serve as a handy reference which they keep next to the device they are using
    – it is particularly useful when that device has a small screen. The book systematically
    addresses all programming language constructs, starting from the very basic constructs
    such as variables and loops. The book also explores many of the phone sensors
    and data sources which make creating apps for mobile devices so rewarding.


    If you are new to programming with `TouchDevelop`, or if you have not yet worked
    on touchscreen devices, we suggest that you read the book starting from [Chapter
    1](#text00001.html#Chap1). If you are already familiar with the basic paradigm
    of the `TouchDevelop` programming environment, then feel free to jump ahead to
    the later chapters that address particular topic areas.


    This book is written from the perspective of a person developing their code using
    a browser. All screenshots and navigation instructions refer to the `TouchDevelop`
    Web App running in a browser and is applicable to all platforms except the Windows
    Phone. Only Appendix E, which covers the editor on the Windows Phone, uses screenshots
    and instructions specific to the Windows Phone.


    This book is available online as well as being publish in print form by APress.
    Please email `touchdevelop@microsoft.com` to give feedback.


    ## Background to the book


    This edition of the book is the result of the year-long evolution of earlier book
    versions, incorporating feedback from tutorials and lectures given by the authors.
    The first version of the book was produced as limited edition of 75 copies for
    the ACM SIGCSE Conference in Raleigh, NC, March, 2012. That book was based on
    the recently released Version 2.6 of `TouchDevelop`. An updated copy of the book
    with 1000 copies, based on Version 2.10, was printed in January 2013. This book
    was made available via a Creative Commons Licence and put on the Amazon Bookstore
    as well as the `TouchDevelop` website. Much of the contents of the second book
    were also applicable to the Web App version of `TouchDevelop`, though all the
    screenshots were still of a phone. This third version has been retargeted at the
    Web App version of `TouchDevelop`.


    ## Other learning materials


    On the `TouchDevelop` website, you can also find extensive videos, tutorials and
    slides to help you learn and teach `TouchDevelop`. Just tap (or click) on the
    large tile labeled “Docs” under the “Chat and Learn” heading once you have logged
    in to the `TouchDevelop` website to find these learning resources.


    Comments are very welcome. To contact the TouchDevelop team or the authors, you
    can


    -   Send email to `touchdevelop@microsoft.com`

    -   Post on [`https://facebook.com/touchdevelop`](https://facebook.com/touchdevelop)

    -   Post on the forum in the app


    Important websites


    [`https://www.touchdevelop.com`](https://www.touchdevelop.com/)


    [`https://www.facebook.com/TouchDevelop`](https://www.facebook.com/TouchDevelop)


    [`http://research.microsoft.com/touchdevelop`](http://research.microsoft.com/touchdevelop)


    The TouchDevelop Team


    ![A978-1-4302-6137-7_BookFrontmatter_Fig1_HTML.jpg](Image00002.jpg)


    Thomas (Tom) Ball is a principal researcher and research manager at Microsoft
    Research, Redmond, widely known for his work in program profiling, software model
    checking, program testing, and empirical software engineering. Ball is a 2011
    ACM Fellow for "contributions to software analysis and defect detection." Since
    becoming a manager at Microsoft, he has nurtured and grown research areas such
    as automated theorem proving, program testing and verification, and empirical
    software engineering. He holds a B.A. in Computer Science from Cornell University
    and a M.S. and Ph.D. from the University of Wisconsin-Madison.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig2_HTML.jpg](Image00003.jpg)


    Judith Bishop is Director of Computer Science at Microsoft Research, based in
    Redmond, USA. Her role is to create strong links between Microsoft’s research
    groups and universities globally, through encouraging projects, supporting conferences
    and engaging directly in research. Her expertise is in programming languages and
    distributed systems, with a strong practical bias and an interest in compilers
    and design patterns. She is the author or editor of 17 books on programming languages.
    She has a PhD from the University of Southampton, UK in Computer Science.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig3_HTML.jpg](Image00004.jpg)


    Sebastian Burckhardt is a Researcher at Microsoft Research. He was born and raised
    in Basel, Switzerland. His research interests revolve around the general problem
    of programming concurrent, parallel, and distributed systems conveniently, efficiently,
    and correctly. More specific interests include consistency models, concurrency
    testing, self-adjusting computation, and the concurrent revisions programming
    model. After a few years of industry experience at IBM, he earned his PhD in Computer
    Science at the University of Pennsylvania.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig4_HTML.jpg](Image00005.jpg)


    Juan Chen is a Researcher in the RiSE group at Microsoft Research Redmond. Her
    main research areas include compilers, programming verification, and type systems.
    She has worked on certifying compilers for object-oriented languages, and design
    and implementation of a functional programming language for specifying and verifying
    program properties. She has a PhD in Computer Science from Princeton University.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig5_HTML.jpg](Image00006.jpg)


    Jonathan ‘Peli’ de Halleux is a Software Engineer in the Research in Software
