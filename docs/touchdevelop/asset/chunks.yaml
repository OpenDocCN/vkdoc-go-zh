  raw: 'Manuel Fähndrich is a Senior Researcher in the RiSE group at Microsoft Research
    in Redmond. He works on programming language design, static type systems, program
    analysis and verification, as well as runtime techniques and optimizations. His
    past and current project involvements include the Singularity OS and Sing# language,
    CodeContracts for .NET, and TouchDevelop. He has a PhD from the University of
    California, Berkeley.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig7_HTML.jpg](Image00008.jpg)


    Nigel Horspool is a professor of computer science at the University of Victoria.
    His main focus for research and teaching has been programming languages and compilers,
    though his main claim to fame is a string searching algorithm. He is the author
    or co-author of three books, which cover the C language, Unix and the C# language.
    He is currently the co-editor of the journal ‘Software: Practice and Experience’.
    He has a PhD from the University of Toronto, Canada in Computer Science.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig8_HTML.jpg](Image00009.jpg)


    Michał Moskal is a Researcher in Redmond. He is in the RiSE group working on software
    verification, automated theorem proving, and programming languages. He works on
    a formal verifier for concurrent C programs called VCC, while also taking on other
    projects including Boogie intermediate verification language, SPUR tracing JIT,
    and DKAL authorization engine. He has a PhD from the University of Wrocław, Poland.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig9_HTML.jpg](Image00010.jpg)


    Arjmand Samuel works with the academic community to foster research and collaborations
    in the devices and services research areas. He leads the mobile and cloud computing
    research and outreach for Microsoft Research (Project Hawaii and TouchDevelop).
    His recent research interests are in software architectures and programming paradigms
    for devices of all shapes and forms (TouchDevelop and HomeOS). He has published
    in a variety of publications on topics of security, privacy, location aware access
    control, and innovative use of mobile technology. Samuel has a Ph.D. in Information
    Security from Purdue University.


    ![A978-1-4302-6137-7_BookFrontmatter_Fig10_HTML.jpg](Image00011.jpg)


    Nikolai Tillmann is a Principal Research Software Design Engineer, Microsoft Research.
    His main areas of research are program authoring on mobile devices, program analysis,
    testing, optimization, and verification. He started the TouchDevelop project,
    which enables end-users to write programs for mobile devices on mobile devices.
    He also leads the Pex project, in which he develops together with Peli de Halleux
    a framework for runtime verification and automatic test case generation for .NET
    applications based on parameterized unit testing and dynamic symbolic execution.
    Nikolai has a Dipl. Inf. in Computer Science from TU Berlin, Germany.


    Acknowledgments


    As the TouchDevelop community grows, we are finding that we are learning from
    everyone who engages in the project – students at Hackathons, academics who write
    papers, and most of all developers of the amazing apps in the bazaar. Thanks to
    all of you.'
