    ## B.7 语言


    翻译以及语音转文字服务。


    | current language: `String` | 获取当前语言代码，用于 `translate` 方法 |

    | detect language(`text`: `String`): `String` | 使用 Bing 自动检测给定文本的语言。 |

    | picture to text(`lang`: `String`, `pic`: `Picture`): `String` | 使用微软研究院的 Project
    Hawaii 提取图片中的文本。 |

    | record text: `String` | 使用微软研究院的 Project Hawaii 将麦克风口述内容转换为文本。 |

    | speak(`lang`: `String`, `text`: `String`): `Sound` | 使用 Bing 以指定语言朗读文本。 |

    | speech to text(`lang`: `String`, `speech`: `Sound`): `String` | 使用微软研究院的 Project
    Hawaii 将声音转换为文本。 |

    | translate(`source lang`: `String`, `target lang`: `String`, `text`: `String`):
    `String` | 使用 Bing 在两种语言之间翻译一些文本。源语言为空时则自动检测。 |


    ## B.8 位置


    地理坐标服务。


    | create location(`latitude`: `Number`, `longitude`: `Number`): `Location` | 创建一个新的地理坐标位置
    |

    | create location list: `Location Collection` | 创建一个空的位置列表 |

    | describe location(`location`: `Location`): `String` | 使用 Bing 查找位置附近的地址 |

    | search location(`address`: `String`, `postal code`: `String`, `city`: `String`,
    `country`: `String`): `Location` | 使用 Bing 查找地址的坐标 |


    ## B.9 地图


    地图、位置转地址和地址转位置服务。


    | create full map: `Map` | 创建一个全屏的 Bing 地图。使用 `post to wall` 显示它。 |

    | create map: `Map` | 创建一个 Bing 地图。使用 `post to wall` 显示它。 |

    | directions(`from`: `Location`, `to`: `Location`, `walking`: `Boolean`): `Location
    Collection` | 使用 Bing 计算两个坐标之间的方向。 |

    | open directions(`start search`: `String`, `start loc`: `Location`, `end search`:
    `String`, `end loc`: `Location`) | 在 Bing 地图应用中显示方向。如果提供了搜索词，则忽略位置信息。为起点和终点提供搜索词或位置。
    |

    | open map(`center`: `Location`, `search`: `String`, `zoom`: `Number`) | 打开 Bing
    地图应用。缩放介于 0（近）和 1（远）之间。 |

