    | Gyroscope | Available for iPad, iPhone, iPod. |

    | Microphone | Planned to be available for iPad, iPhone, iPod and Android. |

    | Motion | Planned to be available for iPad, iPhone, iPod and Android. |

    | Phone | Available if the device has phone call capability or if Lync or Skype
    is installed. |

    | Orientation | Planned to be available for iPad, iPhone, iPod and Android. |


    ## D.4 Support for Services/Resources


    With one exception all the resources (or services) provided by the TouchDevelop
    API and listed in Appendix B are available on the Windows Phone. That exception
    is the language translation services provided by Project Hawaii. They are temporarily
    unavailable.


    The resources listed in the table below have limited support or no support on
    the PC, Mac, iPad, iPhone, iPod Touch and Android platforms.


    | Resource | Support Status |

    | --- | --- |

    | social/calendar | No support for accessing a user’s calendar through the social
    resource |

    | social/contacts | No support for accessing contacts through the social resource
    |

    | media/songs | No support for accessing songs or song albums through the media
    resource |

    | media/pictures | No support for accessing pictures or picture albums through
    the media resource |


    ## D.5 Support for Created Apps


    A created app refers to an app which has been exported to the Windows Phone Store
    or to the Windows Store (which holds apps for the Surface tablet and PCs which
    run the Windows 8 operating system).


    ### D.5.1 Apps for Windows Phone Store


    The scripts cannot make use of boxes and pages or libraries.


    The scripts cannot make use of the language translation services provided by Project
    Hawaii.


    ### D.5.2 Apps for Windows Store


    The script cannot make use of a gyroscope or microphone or motion sensors or orientation
    sensors, but future support for these devices is planned.


