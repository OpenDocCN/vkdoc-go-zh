    # 8. Interactions


    [8.1 Social messages](#text00008.html#Sec1) [8.2 Locations, places, maps](#text00008.html#Sec4)
    [8.3 Emails](#text00008.html#Sec5) [8.4 Phone Calls](#text00008.html#Sec6) [8.5
    2D barcodes](#text00008.html#Sec7) [8.6 SMS messages (WP8 only)](#text00008.html#Sec8)
    [8.7 Calendar and appointments (WP8 only)](#text00008.html#Sec9) [8.8 Contacts
    (WP8 and Android only)](#text00008.html#Sec10) Keywords Phone Call Smart Phone
    Instant Messaging Audio Clip Phone Company


    Smart phones, tablets and computers provide calendars, e-mail, access to social
    media, some forms of instant messaging, SMS and phone calls. Even a computer might
    place a phone call through the use of a service like Skype. These are all forms
    of interaction which are covered in this chapter.


    ## 8.1 Social messages


    Several websites, including Twitter and Facebook in particular, provide the ability
    to post messages for other people to read. These messages may have associated
    content, such as a picture or an audio clip. The TouchDevelop API provides facilities
    for downloading such messages and for posting new messages.


    The `social` resource provides the two methods listed in Table [8-1](#text00008.html#Tab1)
    for creating a new message and for retrieving messages from a website. A simple
    example of obtaining messages from the two supported social networks and displaying
    them might be as follows.


                   `var` `TD msgs := social → search(“twitter”, “#touchdevelop”)`


                   `var` `more msgs := social → search(“facebook”, “TouchDevelop”)`


                   `// combine the two collections into one`


                   `TD msgs → add many(more msgs)`


                   `// reorder and display the messages`


                   `TD msgs → sort by date`


                   `TD msgs → post to wall`


    Table 8-1


    Messaging methods of the social service


    | Methods | Description |

    | --- | --- |

    | `social→create message(` `message : String) : Message` | Creates a new message
    with the text body provided. |

    | `social→search(network : String, terms : String) : Message Collection` | Searches
    twitter or Facebook for recent messages matching the search terms provided. |


    ### 8.1.1 Working with messages


    A `Message` value will usually have a text component, because that is the simplest
    form of message. However additional information is usually associated with that
    message. The TouchDevelop API supports many methods for accessing or setting extra
    content attached to a message. These are all methods of the `Message` datatype.
    The methods for accessing, or getting, content are listed in the first table of
    section C.25 in Appendix C, those for setting content in the second table, and
    some additional methods in the third table.


    It should be remembered that the extra content of a message is not always present.
    After retrieving one of these optional values, such as `media link` , the script
    should perform the test `is invalid` to verify that the value was actually available.


    The `share` method of a `Message` instance allows the message to be transmitted
    in one of a variety of ways. Whichever choice is provided for the where parameter,
    a dialog box is displayed. The message is not sent until a selection has been
    picked and/or a button to send the message has been tapped.'
  trans: "\n# 7.6 运动\n\n也许在需要旋转设备的游戏中会用到陀螺仪读数？然而，陀螺仪与加速度计和指南针结合使用时才更有可能发挥作用。以下代码片段展示了如何从所有三个传感器中提取组合读数。\n\
    \n```\nvar motion := senses → motion\nif motion → is invalid then\n    \"您的设备不具备运动功能！\"\
    \ → post to wall\n    time → stop\nelse  // 不执行任何操作\n```\n\n第一条语句获取的值具有 `Motion`\
    \ 数据类型。与该数据类型关联的方法可以提取各种组件读数。`Motion` 类型提供的方法总结在图 7-5 中（省略了 `is invalid` 和 `post\
    \ to wall` 方法）。\n\n一个非常重要的特性是，软件可以将加速度计上的力分解为重力引起的力和加速度引起的附加力。换句话说，`acceleration`\
    \ 方法返回的是真实的加速度，不包含重力分量。重力应始终等于 1g，但其方向取决于设备的朝向。\n\n`Motion` 值的另一个重要特性是，可以在捕获该值时获得设备朝向的精确数值。由\
    \ `senses → acceleration quick` 返回的 `Vector3` 值的方向通常足够使用，但可能会因晃动设备而受到干扰。设备的真实朝向被称为其姿态。名为\
    \ `pitch`、`roll` 和 `yaw` 的三个方法分别报告手机相对于三个正交轴测量的姿态角度。如果用一个智能手机代替飞机，这些轴如图 7-6 所示。如果手机垂直握持并面向磁北，`yaw`、`pitch`\
    \ 和 `roll` 的值应全部为零。任何相对于该起始位置的旋转都会导致这些值变为非零。\n\n![A978-1-4302-6137-7_7_Fig5_HTML.jpg](img/Image00045.jpg)\n\
    \n图 7-5 — `Motion` 类型的方法\n\n请注意，手机的当前朝向可以通过 `senses → orientation` 方法获取。\n\n![A978-1-4302-6137-7_7_Fig6_HTML.jpg](img/Image00046.jpg)\n\
    \n图 7-6 — 偏航角、俯仰角和横滚角\n\n注：该图像复制自维基共享资源，这是一个自由许可的多媒体文件库。\n\n![创意共享](https://creativecommons.org/licenses/by-nc-nd/4.0)\
    \ 开放获取 本章遵循知识共享署名-非商业性使用-禁止演绎 4.0 国际许可协议 ([`creativecommons.org/licenses/by-nc-nd/4.0/`](http://creativecommons.org/licenses/by-nc-nd/4.0/))\
    \ 的条款进行许可，该协议允许任何非商业性使用、共享、分发和以任何媒介或格式复制，前提是您适当注明原作者和来源，提供指向知识共享许可协议的链接，并说明您是否修改了许可材料。根据本许可协议，您无权分享源自本章或其部分的改编材料。除非在资料来源的署名行中另有说明，本章中包含的图像或其他第三方材料均包含在本章的知识共享许可协议中。如果材料未包含在本章的知识共享许可协议中，且您的预期使用未得到法定法规的许可或超出许可范围，您将需要直接获得版权所有者的许可。\n\
    \n# 8. 交互\n\n8.1 社交消息 8.2 位置、地点、地图 8.3 电子邮件 8.4 电话 8.5 二维码 8.6 短信（仅限 WP8） 8.7\
    \ 日历和约会（仅限 WP8） 8.8 联系人（仅限 WP8 和 Android）\n\n关键词：电话、智能手机、即时通讯、音频片段、电话公司\n\n智能手机、平板电脑和计算机提供日历、电子邮件、社交媒体访问、某些形式的即时通讯、短信和电话功能。甚至计算机也可以通过\
    \ Skype 等服务拨打电话。这些都属于本章涵盖的交互形式。\n\n## 8.1 社交消息\n\n包括 Twitter 和 Facebook 在内的几个网站提供发布消息供他人阅读的功能。这些消息可能附带相关内容，例如图片或音频片段。TouchDevelop\
    \ API 提供了下载此类消息和发布新消息的功能。\n\n`social` 资源提供了表 8-1 中列出的两个方法，用于创建新消息和从网站检索消息。从这两个支持的社交网络获取消息并显示它们的简单示例如下。\n\
    \n```\nvar TD msgs := social → search(\"twitter\", \"#touchdevelop\")\nvar more\
    \ msgs := social → search(\"facebook\", \"TouchDevelop\")\n// 将两个集合合并为一个\nTD msgs\
    \ → add many(more msgs)\n// 重新排序并显示消息\nTD msgs → sort by date\nTD msgs → post\
    \ to wall\n```\n\n表 8-1 — `social` 服务的消息处理方法\n\n| 方法 | 描述 |\n| --- | --- |\n|\
    \ `social → create message(message : String) : Message` | 使用提供的文本内容创建一条新消息。 |\n\
    | `social → search(network : String, terms : String) : Message Collection` | 搜索\
    \ Twitter 或 Facebook 上与提供的搜索词匹配的最近消息。 |\n\n### 8.1.1 处理消息\n\n`Message` 值通常包含文本组件，因为这是消息的最简单形式。然而，通常还会附带额外信息。TouchDevelop\
    \ API 支持多种方法来访问或设置附加到消息的额外内容。这些都是 `Message` 数据类型的方法。用于访问或获取内容的方法列在附录 C 中 C.25\
    \ 节的第一个表中，设置内容的方法在第二个表中，其他一些方法在第三个表中。\n\n应注意，消息的额外内容并非总是存在。在检索这些可选值（例如 `media\
    \ link`）之后，脚本应执行 `is invalid` 测试以验证该值是否实际可用。\n\n`Message` 实例的 `share` 方法允许以多种方式之一传输消息。无论为\
    \ where 参数提供了何种选择，都会显示一个对话框。只有在做出选择和/或点击发送消息的按钮后，消息才会被发送。\n"
- fmt: "### 8.1.2 Message collections\n\nThe `Message Collection` type is a mutable\
    \ collection of messages. An empty instance may be created with the following\
    \ call:\n\n`var msgs := collections → create message collection`\n\nThis empty\
    \ collection may then be populated using the standard methods for adding new elements\
    \ to a collection.\n\nCollections of messages may also be created by the `social\
    \ → search` and `web → feed` methods. The `web → feed` method accesses an RSS\
    \ stream or Atom feed on the internet and parses that stream into a sequence of\
    \ messages. An example script which uses the method is rmc reader (`/fiol`).\n\
    \nThe `Message Collection` type provides several methods which are common to all\
    \ mutable collection types. However there are two additional methods which are\
    \ particularly useful for managing a message collection. These are listed in Table\
    \ [8-2](#text00008.html#Tab2).\n\n**Table 8-2**  \nExtra methods of the `Message\
    \ Collection` datatype\n\n| Message Collection Method | Description |\n| --- |\
    \ --- |\n| `reverse: Nothing` | Reverses the order of the messages in the collection\
    \ |\n| `sort by date : Nothing` | Sorts the messages by their associated date\
    \ and time values, from newest to oldest |\n\n## 8.2 Locations, places, maps\n\
    \nMany messages, pictures and media resources have location information associated\
    \ with them. A location is implemented as a pair of geographical coordinates.\
    \ However, web services exist for finding a place name near to the location, for\
    \ pinpointing the location on a map, and for obtaining directions from one location\
    \ to another.\n\nA location can be created or described by using the methods of\
    \ the `locations` resource. These methods are listed in Table [8-3](#text00008.html#Tab3).\n\
    \nIn addition to the methods provided by the `locations` service, location values\
    \ can be obtained from several other sources. Here is a list of the possibilities.\n\
    \n**Table 8-3**  \nMethods of the `locations` service\n\n| Method | Description\
    \ |\n| --- | --- |\n| `locations → create location( latitude : Number, longitude\
    \ : Number) : Location` | Creates a new location from its coordinates |\n| `locations\
    \ → create location list : Location Collection` | Creates an empty list of locations\
    \ |\n| `locations → describe location( location : Location) : String` | Finds\
    \ a name or an address for a location using Bing |\n| `locations → search location(address\
    \ : String, postal code : String, city : String, country : String) : Location`\
    \ | Looks up the coordinates of an address using Bing |\n\n*   `senses → current\
    \ location`\n*   `senses → current location accurate`\n*   `maps → directions`\n\
    *   `location` method of the `Link` datatype\n*   `center` method of the `Map`\
    \ datatype\n*   `location` method of the `Message` datatype\n*   `location` method\
    \ of the `Picture` datatype\n*   `location` method of the `Place` datatype\n\n\
    Locations are closely associated with maps. The TouchDevelop API provides both\
    \ a `maps` service and a `Map` datatype. Maps are provided through use of Bing.\
    \ The methods of the `maps` service are listed in Table [8-4](#text00008.html#Tab4)\
    \ and the methods of the `Map` datatype in Table [8-5](#text00008.html#Tab5).\n\
    \nA small example of using locations and the Bing map service is provided by the\
    \ script go to picture (`/gpona`). The entire script is reproduced below.\n\n\
    ```\naction main( )\n    // Picks a picture in the library and displays\n    //\
    \ directions to the location where it was taken.\n    var pic := media → choose\
    \ picture\n    var loc := pic → location\n    if loc → is invalid then\n     \
    \   wall → prompt(\"This picture does not have location information.\")\n    else\n\
    \        maps → open directions(\"\", senses → current location, \"\", loc)\n\
    ```\n\nThe `Place` datatype provides a wrapper for a location so that additional\
    \ information can be attached to the location. There are both getter and setter\
    \ methods for the different kinds of additional information. They are listed in\
    \ the tables of Section C.37 in Appendix C. In addition to these methods, there\
    \ the usual `is invalid` and `post to wall` methods and two more. They are `check\
    \ in`, which is provided for Facebook interactions, and `to string` which creates\
    \ a string representation of a place.\n\n**Table 8-4**  \nMethods of the `maps`\
    \ service\n\n| Method | Description |\n| --- | --- |\n| `maps → create full map\
    \ : Map` | Creates a full screen Bing map |\n| `maps → create map : Map` | Creates\
    \ a Bing map |\n| `maps → directions( from : Location, to : Location, walking\
    \ : Boolean) : Location Collection` | Provides a point by point itinerary to get\
    \ from the one location to another. If `walking` is `true`, the route is suitable\
    \ for walking; otherwise a vehicle route is assumed |\n| `maps → open directions(\
    \ start search : String, start loc : Location, end search : String, end loc :\
    \ Location) : Nothing` | Opens the Bing map application to show the route from\
    \ one point to another. The two end points can be specified by either a search\
    \ term or a location. The search term should be \"\" if the location is to be\
    \ used. |\n| `maps → open map(center : Location, search : String, zoom : Number)\
    \ : Nothing` | Opens the Bing map application around a central point specified\
    \ by either a search term or a location; `zoom` is 0 (close) to 1 (far) |\n\n\
    ## 8.3 Emails\n\nA TouchDevelop script can prepare an email message ready for\
    \ transmission, but it does not actually send it. The following short script prepares\
    \ a message:\n\n```\nvar msg := social → create message(“The dinner party is tonight!”)\n\
    msg → set from(“your friendly host”)\nmsg → set to(“another@outlook.com”)\nmsg\
    \ → set title(“Invitation reminder”)\nmsg → share(“email”)\n```\n\nWhen these\
    \ commands are executed, the last one (the `share` method call) asks which mail\
    \ account should be used (if more than one has been set up on the phone) and then\
    \ invokes the phone’s email application. The message is not sent until a send\
    \ button in that application is tapped.\n\n**Table 8-5**  \nMethods of the `Map`\
    \ datatype\n\n| Map Method | Description |\n| --- | --- |\n| `add line(locations\
    \ : Location Collection, color : Color, thickness : Number) : Nothing` | Fits\
    \ a line through the list of locations, drawing the line with the given thickness\
    \ and color |\n| `add link(link : Link, background : Color, foreground : Color)\
    \ : Nothing` | Adds a link pushpin to the map at the location associated with\
    \ the link value |\n| `add message(msg : Message, background : Color, foreground\
    \ : Color) : Nothing` | Adds a message pushpin to the map at the location associated\
    \ with the message value |\n| `add picture(location : Location, picture : Picture,\
    \ background : Color) : Nothing` | Adds a picture pushpin to the map at the location\
    \ associated with the picture value |\n| `add place(place : Place, background\
    \ : Color, foreground : Color) : Nothing` | Adds a place pushpin to the map at\
    \ the location associated with the place value |\n| `add text(location : Location,\
    \ text : String, background : Color, foreground : Color) : Nothing` | Adds a text\
    \ pushpin to the map at the specified location |\n| `center : Location` | Gets\
    \ the map center location |\n| `clear : Nothing` | Removes all lines, pushpins\
    \ and regions |\n| `fill region(locations : Location Collection, fill : Color,\
    \ stroke : Color, thickness : Number) : Nothing` | Draws the edges around a region\
    \ whose vertices are specified by the list of locations, and fills the region\
    \ with a given color. |\n| `set center(center : Location) : Nothing` | Sets the\
    \ map’s center |\n| `set zoom(level : Number) : Nothing` | Sets the map’s zoom\
    \ level, ranging from 1 (whole earth displayed) to 21 (street level) |\n| `view\
    \ pushpins : Nothing` | Changes the zoom and center so that all pushpins are visible;\
    \ the map must be posted on the wall |\n| `zoom : Number` | Gets the current zoom\
    \ level |\n\nAlthough the email application can be invoked to send a message,\
    \ there is no API support for directly reading email with a TouchDevelop script."
  raw: '### 8.1.2 Message collections


    The `Message Collection` type is a mutable collection of messages. An empty instance
    may be created with the following call:


                   `var` `msgs := collections → create message collection`


    This empty collection may then be populated using the standard methods for adding
    new elements to a collection.


    Collections of messages may also be created by the `social` →`search` and `web`
    →`feed` methods. The `web` →`feed` method accesses an RSS stream or Atom feed
    on the internet and parses that stream into a sequence of messages. An example
    script which uses the method is rmc reader (`/fiol` ).


    The `Message Collection` type provides several methods which are common to all
    mutable collection types. However there are two additional methods which are particularly
    useful for managing a message collection. These are listed in Table [8-2](#text00008.html#Tab2)
    .


    Table 8-2


    Extra methods of the Message Collection datatype


    | Message Collection Method | Description |

    | --- | --- |

    | `reverse: Nothing` | Reverses the order of the messages in the collection |

    | `sort by date : Nothing` | Sorts the messages by their associated date and time
    values, from newest to oldest |


    ## 8.2 Locations, places, maps


    Many messages, pictures and media resources have location information associated
    with them. A location is implemented as a pair of geographical coordinates. However,
    web services exist for finding a place name near to the location, for pinpointing
    the location on a map, and for obtaining directions from one location to another.


    A location can be created or described by using the methods of the `locations`
    resource. These methods are listed in Table [8-3](#text00008.html#Tab3) .


    In addition to the methods provided by the locations service, location values
    can be obtained from several other sources. Here is a list of the possibilities.


    Table 8-3


    Methods of the locations service


    | Method | Description |

    | --- | --- |

    | `locations → create location(` `latitude : Number,` `longitude : Number) : Location`
    | Creates a new location from its coordinates |

    | `locations → create location list : Location Collection` | Creates an empty
    list of locations |

    | `locations → describe location(` `location : Location) : String` | Finds a name
    or an address for a location using Bing |

    | `locations → search location(address : String, postal code : String, city :
    String, country : String) : Location` | Looks up the coordinates of an address
    using Bing |


    *   senses → current location

    *   senses → current location accurate

    *   maps → directions

    *   location method of the Link datatype

    *   center method of the Map datatype

    *   location method of the Message datatype

    *   location method of the Picture datatype

    *   location method of the Place datatype


    Locations are closely associated with maps. The TouchDevelop API provides both
    a `maps` service and a `Map` datatype. Maps are provided through use of Bing.
    The methods of the `maps` service are listed in Table [8-4](#text00008.html#Tab4)
    and the methods of the Map datatype in Table [8-5](#text00008.html#Tab5) .


    A small example of using locations and the Bing map service is provided by the
    script go to picture (`/gpona` ). The entire script is reproduced below.


    `action main( )`


    `// Picks a picture in the library and displays`


    `// directions to the location where it was taken.`


    `var` `pic := media → choose picture`


    `var` `loc := pic → location`


    `if` `loc → is invalid` `then`


    `wall → prompt("This picture does not have location information.")`


    `else`


    `maps → open directions("", senses → current location, "", loc)`


    The Place datatype provides a wrapper for a location so that additional information
    can be attached to the location. There are both getter and setter methods for
    the different kinds of additional information. They are listed in the tables of
    Section C.37 in Appendix C. In addition to these methods, there the usual is invalid
    and post to wall methods and two more. They are check in, which is provided for
    Facebook interactions, and to string which creates a string representation of
    a place.


    Table 8-4


    Methods of the maps service


    | Method | Description |

    | --- | --- |

    | `maps→ create full map : Map` | Creates a full screen Bing map |

    | `maps → create map : Map` | Creates a Bing map |

    | `maps → directions(` `from : Location, to : Location,` `walking : Boolean) :`
    `Location Collection` | Provides a point by point itinerary to get from the one
    location to another. If walking is true, the route is suitable for walking; otherwise
    a vehicle route is assumed |

    | `maps → open directions(` `start search : String,` `start loc : Location,` `end
    search : String,` `end loc : Location) : Nothing` | Opens the Bing map application
    to show the route from one point to another. The two end points can be specified
    by either a search term or a location. The search term should be “” if the location
    is to be used. |

    | `maps → open map(center : Location, search : String,` `zoom : Number) : Nothing`
    | Opens the Bing map application around a central point specified by either a
    search term or a location; zoom is 0 (close) to 1 (far) |


    ## 8.3 Emails


    A TouchDevelop script can prepare an email message ready for transmission, but
    it does not actually send it. The following short script prepares a message:


                   `var` `msg := social → create message(“The dinner party is tonight!”)`


                   `msg → set from(“your friendly host”)`


                   `msg → set to(“another@outlook.com”)`


                   `msg → set title(“Invitation reminder”)`


                   `msg → share(“email”)`


    When these commands are executed, the last one (the `share` method call) asks
    which mail account should be used (if more than one has been set up on the phone)
    and then invokes the phone’s email application. The message is not sent until
    a send button in that application is tapped.


    Table 8-5


    Methods of the Map datatype


    | Map Method | Description |

    | --- | --- |

    | `add line(locations : Location Collection, color : Color, thickness : Number)
    : Nothing` | Fits a line through the list of locations, drawing the line with
    the given thickness and color |

    | `add link(link : Link, background : Color, foreground : Color) : Nothing` |
    Adds a link pushpin to the map at the location associated with the link value
    |

    | `add message(msg : Message, background : Color, foreground : Color) : Nothing`
    | Adds a message pushpin to the map at the location associated with the message
    value |

    | `add picture(location : Location, picture : Picture, background : Color) : Nothing`
    | Adds a picture pushpin to the map at the location associated with the picture
    value |

    | `add place(place : Place, background : Color, foreground : Color) : Nothing`
    | Adds a place pushpin to the map at the location associated with the place value
    |

    | `add text(location : Location, text : String, background : Color, foreground
    : Color) : Nothing` | Adds a text pushpin to the map at the specified location
    |

    | `center : Location` | Gets the map center location |

    | `clear : Nothing` | Removes all lines, pushpins and regions |

    | `fill region(locations : Location Collection, fill : Color, stroke : Color,
    thickness : Number) : Nothing` | Draws the edges around a region whose vertices
    are specified by the list of locations, and fills the region with a given color.
    |

    | `set center(center : Location) : Nothing` | Sets the map’s center |

    | `set zoom(level : Number) : Nothing` | Sets the map’s zoom level, ranging from
    1 (whole earth displayed) to 21 (street level) |

    | `view pushpins : Nothing` | Changes the zoom and center so that all pushpins
    are visible; the map must be posted on the wall |

    | `zoom : Number` | Gets the current zoom level |


    Although the email application can be invoked to send a message, there is no API
    support for directly reading email with a TouchDevelop script.'
  trans: "\n### 8.1.2 消息集合\n\n`Message Collection`（消息集合）类型是一个可变的消息集合。可以使用以下调用创建一个空实例：\n\
    \n`var msgs := collections → create message collection`\n\n然后，可以使用向集合添加新元素的标准方法来填充这个空集合。\n\
    \n消息集合也可以通过 `social → search` 和 `web → feed` 方法创建。`web → feed` 方法访问互联网上的 RSS 流或\
    \ Atom 订阅源，并将该流解析为一系列消息。使用该方法的示例脚本是 rmc 阅读器 (`/fiol`)。\n\n`Message Collection`\
    \ 类型提供了所有可变集合类型通用的几种方法。但还有两种额外的方法对于管理消息集合特别有用。这些方法列于表 8-2 中。\n\n**表 8-2**\n`Message\
    \ Collection` 数据类型的额外方法\n\n| Message Collection 方法 | 描述 |\n| --- | --- |\n| `reverse:\
    \ Nothing` | 反转集合中消息的顺序 |\n| `sort by date : Nothing` | 按消息关联的日期和时间值排序，从最新到最旧\
    \ |\n\n## 8.2 位置、地点、地图\n\n许多消息、图片和媒体资源都关联有位置信息。位置被实现为一对地理坐标。然而，存在用于查找位置附近的地名、在地图上精确定位位置以及获取从一个位置到另一个位置的导航路线的网络服务。\n\
    \n可以使用 `locations` 资源的方法来创建或描述一个位置。这些方法列于表 8-3 中。\n\n除了 `locations` 服务提供的方法之外，还可以从其他几个来源获取位置值。以下是可能来源的列表。\n\
    \n**表 8-3**\n`locations` 服务的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `locations → create\
    \ location( latitude : Number, longitude : Number) : Location` | 根据坐标创建一个新位置 |\n\
    | `locations → create location list : Location Collection` | 创建一个空的位置列表 |\n| `locations\
    \ → describe location( location : Location) : String` | 使用必应查找某个位置的名称或地址 |\n|\
    \ `locations → search location(address : String, postal code : String, city :\
    \ String, country : String) : Location` | 使用必应查找某个地址的坐标 |\n\n*   `senses → current\
    \ location`\n*   `senses → current location accurate`\n*   `maps → directions`\n\
    *   `Link` 数据类型的 `location` 方法\n*   `Map` 数据类型的 `center` 方法\n*   `Message` 数据类型的\
    \ `location` 方法\n*   `Picture` 数据类型的 `location` 方法\n*   `Place` 数据类型的 `location`\
    \ 方法\n\n位置与地图密切相关。TouchDevelop API 同时提供了 `maps` 服务和 `Map` 数据类型。通过使用必应提供地图。`maps`\
    \ 服务的方法列于表 8-4 中，`Map` 数据类型的方法列于表 8-5 中。\n\n脚本 go to picture (`/gpona`) 提供了使用位置和必应地图服务的一个小示例。整个脚本如下所示。\n\
    \n```\naction main( )\n    // 从库中选择一张照片并显示\n    // 前往拍摄地点的路线说明。\n    var pic :=\
    \ media → choose picture\n    var loc := pic → location\n    if loc → is invalid\
    \ then\n        wall → prompt(\"This picture does not have location information.\"\
    )\n    else\n        maps → open directions(\"\", senses → current location, \"\
    \", loc)\n```\n\n`Place` 数据类型为位置提供了一个包装器，以便可以将附加信息关联到该位置。针对不同类型的附加信息，既有 getter\
    \ 方法也有 setter 方法。它们列于附录 C 的 C.37 节表中。除了这些方法之外，还有常用的 `is invalid` 和 `post to wall`\
    \ 方法，以及另外两种方法。它们是 `check in`（用于 Facebook 交互）和 `to string`（创建地点的字符串表示形式）。\n\n**表\
    \ 8-4**\n`maps` 服务的方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `maps → create full map\
    \ : Map` | 创建一个全屏的必应地图 |\n| `maps → create map : Map` | 创建一个必应地图 |\n| `maps →\
    \ directions( from : Location, to : Location, walking : Boolean) : Location Collection`\
    \ | 提供从一个位置到另一个位置的逐点行程路线。如果 `walking` 为 `true`，则该路线适合步行；否则假定为车辆路线 |\n| `maps →\
    \ open directions( start search : String, start loc : Location, end search : String,\
    \ end loc : Location) : Nothing` | 打开必应地图应用程序以显示从一个点到另一个点的路线。两个端点可以通过搜索词或位置来指定。如果要使用位置，搜索词应为\
    \ \"\"。 |\n| `maps → open map(center : Location, search : String, zoom : Number)\
    \ : Nothing` | 围绕由搜索词或位置指定的中心点打开必应地图应用程序；`zoom` 值范围从 0（近）到 1（远） |\n\n## 8.3 电子邮件\n\
    \nTouchDevelop 脚本可以准备一封准备发送的电子邮件，但它实际上并不会发送。以下简短脚本准备了一条消息：\n\n```\nvar msg :=\
    \ social → create message(“The dinner party is tonight!”)\nmsg → set from(“your\
    \ friendly host”)\nmsg → set to(“another@outlook.com”)\nmsg → set title(“Invitation\
    \ reminder”)\nmsg → share(“email”)\n```\n\n当这些命令执行时，最后一个命令（`share` 方法调用）会询问应该使用哪个邮件帐户（如果在手机上设置了多个帐户），然后调用手机的电子邮件应用程序。在该应用程序中点击发送按钮之前，消息不会被发送。\n\
    \n**表 8-5**\n`Map` 数据类型的方法\n\n| Map 方法 | 描述 |\n| --- | --- |\n| `add line(locations\
    \ : Location Collection, color : Color, thickness : Number) : Nothing` | 在位置列表上拟合一条线，使用给定的线宽和颜色绘制该线\
    \ |\n| `add link(link : Link, background : Color, foreground : Color) : Nothing`\
    \ | 在与链接值关联的位置处，向地图添加一个链接图钉 |\n| `add message(msg : Message, background : Color,\
    \ foreground : Color) : Nothing` | 在与消息值关联的位置处，向地图添加一个消息图钉 |\n| `add picture(location\
    \ : Location, picture : Picture, background : Color) : Nothing` | 在与图片值关联的位置处，向地图添加一个图片图钉\
    \ |\n| `add place(place : Place, background : Color, foreground : Color) : Nothing`\
    \ | 在与地点值关联的位置处，向地图添加一个地点图钉 |\n| `add text(location : Location, text : String,\
    \ background : Color, foreground : Color) : Nothing` | 在指定位置处，向地图添加一个文本图钉 |\n\
    | `center : Location` | 获取地图中心位置 |\n| `clear : Nothing` | 移除所有线条、图钉和区域 |\n| `fill\
    \ region(locations : Location Collection, fill : Color, stroke : Color, thickness\
    \ : Number) : Nothing` | 绘制由位置列表指定顶点的区域边缘，并使用给定颜色填充该区域。 |\n| `set center(center\
    \ : Location) : Nothing` | 设置地图中心 |\n| `set zoom(level : Number) : Nothing` |\
    \ 设置地图缩放级别，范围从 1（显示整个地球）到 21（街道级别） |\n| `view pushpins : Nothing` | 更改缩放和中心，使所有图钉可见；必须将地图张贴到墙上\
    \ |\n| `zoom : Number` | 获取当前缩放级别 |\n\n虽然可以调用电子邮件应用程序来发送消息，但 TouchDevelop 脚本没有用于直接读取电子邮件的\
    \ API 支持。\n"
- fmt: '## 8.4 Phone Calls


    A script can prepare for a phone call by setting up the number and transferring
    control to the phone’s software for making the call. This facility is provided
    by the `phone` resource in the API. The relevant method calls in the API are listed
    in Table [8-6](#text00008.html#Tab6).


    Table 8-6


    Methods for handling phone calls


    | Method | Description |

    | --- | --- |

    | `phone → choose phone number: Link` | Opens the phone’s contact list so that
    a phone number can be selected |

    | `phone → dial phone number(number : String) : Nothing` | Sets up a phone call
    with the provided number, but does not dial the number |

    | `phone → save phone number(phone number : String) : Nothing` | Opens the phone’s
    contact list to allow the number to added to an existing entry or to a new entry
    |


    Some sample code to set up a phone call, ready for initiating the connection,
    is as follows:


    ```

    var link := phone → choose phone number

    phone → dial phone number( link → address)

    ```


    It is not possible to write a script which answers an incoming phone call or which
    records an audio clip from a phone call.


    ## 8.5 2D barcodes


    TouchDevelop provides access to the Microsoft Tag service which generates two-dimensional
    barcodes for text messages and for URLs. These barcodes are square images which
    can be printed onto documents or publicity material. Most smart phones, whether
    a Windows phone or not, possess scanning software which enables a user to focus
    on the barcode with the phone’s camera and automatically display the text or visit
    the webpage.


    The barcode generation methods are provided by the `tags` resource. Its two methods
    are listed in Table [8-7](#text00008.html#Tab7).


    Table 8-7


    Barcode generation methods


    | Method | Description |

    | --- | --- |

    | `tags → tag text(text : String, size : Number, bw : Boolean) : Picture` | Generates
    a barcode for the text (up to 1000 characters); `size` is the width and height
    of the picture in inches and must be in the range 0.75 to 5.0; if `bw` is true,
    the image is generated in black and white, otherwise color. |

    | `tags → tag url(url : String, size : Number, bw : Boolean) : Picture` | Generates
    a barcode which points at the supplied URL; `size` and `bw` have the same meanings
    as above. |


    This sample code generates and displays a barcode:


    ```

    var pic := tags → tag text(“TouchDevelop is cool!”, 1.0, false)

    pic → post to wall

    ```


    The result of running these two statements is shown in Figure [8-1](#text00008.html#Fig1)
    on the left. The result when the third argument is changed to `true` appears on
    the right. Both versions of the barcode work with scanning software.


    ![A978-1-4302-6137-7_8_Fig1_HTML.jpg](Image00047.jpg)


    Figure 8-1


    Examples of 2D barcodes


    ## 8.6 SMS messages (WP8 only)


    SMS is an abbreviation for Short Message Service. It is a text messaging service
    provided by the phone company. It is normally used for sending a message from
    one cellphone to another cellphone, though some phone companies may provide additional
    methods for sending or receiving the messages. The original standard for SMS limited
    message bodies to be a maximum of 140 bytes. (The twitter social networking service
    has the same limit.) Longer messages are automatically broken up into a sequence
    of short messages.


    The TouchDevelop API allows a script to generate an SMS message ready for transmission
    but it will not actually send it. The user has to perform one additional action.


    A few lines of script to generate an SMS message and prepare it for transmission
    are as follows:


    ```

    var msg := “Come right now, the pizza has arrived”

    var recipient := “202 555 1234”

    social → send sms( recipient, msg )

    ```


    If that script is executed, the phone’s messaging software is activated and the
    phone displays the standard dialog for sending a SMS message, as shown in Figure
    [8-2](#text00008.html#Fig2).


    ![A978-1-4302-6137-7_8_Fig2_HTML.jpg](Image00048.jpg)


    Figure 8-2


    Sending an SMS message


    ## 8.7 Calendar and appointments (WP8 only)


    The Windows phone provides a calendar where each day’s schedule, comprised of
    various meetings or appointments, is recorded.


    The phone’s calendar may be synchronized with one or more calendars held externally,
    such as a Windows Outlook calendar or a calendar of events on a social network
    site.


    A TouchDevelop script has read-only access to the phone’s calendar and can retrieve
    all the appointments for a specific range of times. As a small example, the following
    statements will retrieve and display tomorrow’s appointments.


    ```

    var start time := time → tomorrow

    var end time := start time → add hours(24)

    var appts := social → search appointments (start time, end time)

    appts → post to wall

    ```


    Note that `social → search appointments` is the only mechanism provided for accessing
    the calendar. Each appointment obtained from the calendar has several associated
    attributes. They may be accessed by using the methods listed in Table [8-8](#text00008.html#Tab8).
    (The two methods, `invalid` and `post to wall`, are omitted from the table.)


    Table 8-8


    Methods of the Appointment datatype


    | Appointment Method | Description |

    | --- | --- |

    | `attendees: Contact Collection` | Gets the list of attendees for the appointment
    |

    | `details: String` | Gets the details (body) of the appointment |

    | `end time: DateTime` | Gets the end time, if available |

    | `is all day event: Boolean` | Returns true if the appointment is flagged as
    being all day |

    | `is private: Boolean` | Returns true if the calendar entry is flagged as being
    private |

    | `location: String` | Returns location associated with the appointment |

    | `organizer: Contact` | Returns the organizer of the appointment, if available
    |

    | `source: String` | Returns the appointment’s source, i.e. which calendar or
    social network site it came from |

    | `start time: DateTime` | Gets the end time, if available |

    | `status: String` | Returns the user’s status for this appointment (free, tentative,
    busy or outofoffice) |

    | `subject: String` | Returns the appointment’s subject, if available |'
