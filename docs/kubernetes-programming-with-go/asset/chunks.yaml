  trans: "\n# 组-版本-资源\n\nKubernetes API 是一个 REST API，因此它管理着*资源*，而管理这些资源的路径遵循 REST\
    \ 命名约定——即使用复数名称来标识资源，并对这些资源进行分组。\n\n由于 Kubernetes API 管理着数百种资源，它们被分组在一起；又因为 API\
    \ 会不断演进，资源也有了版本。出于这些原因，每个资源都属于特定的*组*和*版本*，并且每个资源都由一个“组-版本-资源”唯一标识，通常被称为 `GVR`。\n\
    \n要查找 Kubernetes API 中的各种资源，你可以浏览 OpenAPI 规范来提取不同的路径。传统资源（例如 `pods` 或 `nodes`）在\
    \ Kubernetes API 早期就已引入，它们都属于 `core` 组和 `v1` 版本。\n\n管理集群范围传统资源的路径遵循格式 `/api/v1/<复数资源名称>`——例如，使用\
    \ `/api/v1/nodes` 来管理 `nodes`。请注意，`core` 组并未在路径中体现。要管理特定命名空间中的资源，路径格式为 `/api/v1/namespaces/<命名空间名称>/<复数资源名称>`——例如，使用\
    \ `/api/v1/namespaces/default/pods` 来管理 `default` 命名空间中的 `pods`。\n\n较新的资源可通过遵循以下格式的路径访问：`/apis/<组>/<版本>/<复数资源名称>`\
    \ 或 `/apis/<组>/<版本>/namespaces/<命名空间名称>/<复数资源名称>`。\n\n总结一下，访问资源的各种路径格式如下：\n\n\
    * `/api/v1/<复数名称>` – 用于访问非命名空间的传统资源\n\n  例如：`/api/v1/nodes` 用于访问非命名空间的 `nodes`\
    \ 资源\n\n  或者\n\n* 用于跨集群访问命名空间的传统资源\n\n  例如：`/api/v1/pods` 用于访问所有命名空间中的 `pods`\n\
    \n* `/api/v1/namespaces/<ns>/<复数名称>` – 用于访问特定命名空间中的传统命名空间资源\n\n  例如：`/api/v1/namespaces/default/pods`\
    \ 用于访问 `default` 命名空间中的 `pods`\n\n* `/apis/<组>/<版本>/<复数名称>` – 用于访问特定组和版本中的非命名空间资源\n\
    \n  例如：`/apis/storage.k8s.io/v1/storageclasses` 用于访问非命名空间的 `storageclasses`（组\
    \ `storage.k8s.io`，版本 `v1`）\n\n  或者\n\n* 用于跨集群访问命名空间资源\n\n  例如：`/apis/apps/v1/deployments`\
    \ 用于访问所有命名空间中的 `deployments`\n\n* `/apis/<组>/<版本>/namespaces/<ns>/<复数名称>` – 用于访问特定命名空间中的命名空间资源\n\
    \n  例如：`/apis/apps/v1/namespaces/default/deployments` 用于访问 `default` 命名空间中的 `deployments`（组\
    \ `apps`，版本 `v1`）\n\n## 子资源\n\n遵循 REST API 约定，资源可以拥有子资源。子资源是从属于另一个资源的资源，可以通过在资源名称后指定其名称来访问，如下所示：\n\
    \n* `/api/v1/<复数>/<资源名称>/<子资源>`\n\n  例如：`/api/v1/nodes/node1/status`\n\n* `/api/v1/namespaces/<ns>/<复数>/<资源名称>/<子资源>`\n\
    \n  例如：`/api/v1/namespaces/ns1/pods/pod1/status`\n\n* `/apis/<组>/<版本>/<复数>/<资源名称>/<子资源>`\n\
    \n  例如：`/apis/storage.k8s.io/v1/volumeattachments/volatt1/status`\n\n* `/apis/<组>/<版本>/namespaces/<ns>/<复数>/<名称>/<子资源>`\n\
    \n  例如：`/apis/apps/v1/namespaces/ns1/deployments/dep1/status`\n\n大多数 Kubernetes\
    \ 资源都有一个 `status` 子资源。在编写 operator 时，你会看到 operator 需要更新 `status` 子资源，以便能够指示 operator\
    \ 观察到的该资源的状态。可以在 `status` 子资源上执行的操作有 `get`、`patch` 和 `update`。Pod 拥有更多子资源，包括 `attach`、`binding`、`eviction`、`exec`、`log`、`portforward`\
    \ 和 `proxy`。这些子资源对于获取特定运行中 Pod 的信息，或在运行中的 Pod 上执行某些特定操作等非常有用。\n\n可以进行扩缩容的资源（例如\
    \ deployments、replicasets 等）都有一个 `scale` 子资源。可以在 `scale` 子资源上执行的操作有 `get`、`patch`\
    \ 和 `update`。\n\n## 官方 API 参考文档\n\nAPI 的官方参考文档可以在 [`https://kubernetes.io/docs/reference/kubernetes-api/`](https://kubernetes.io/docs/reference/kubernetes-api/)\
    \ 找到。API 管理的资源首先按类别（即工作负载、存储等）分组，对于每个类别，你可以获得一个资源名称列表及其简短描述（图 1-3）。\n\n注意这些类别并非\
    \ Kubernetes API 定义的一部分，而是用于该网站，以帮助新手用户在众多可用资源中找到方向。\n\n![](img/533908_1_En_1_Fig3_HTML.png)\n\
    \nKubernetes 网页的截图包含三个标签：文档、Kubernetes 博客和培训。文档标签被选中。文本显示“关于 Kubernetes API”。\n\
    \n图 1-3\n\n按类别分组的 Kubernetes 资源\n\n准确地说，显示的名称并非 REST 意义上的资源名称，而是关联的主要种类，如图 1-4\
    \ 所示。例如，在管理 *Pods* 时，REST 路径中使用的资源名称是 `pods`（即小写复数形式），而在 HTTP 请求期间用于交换 *Pods*\
    \ 信息的定义被称为 `Pod`（即大写单数形式）。请注意，其他种类也可以与同一资源关联。在本章的示例中，`PodList` 种类（用于交换 *Pod 列表*\
    \ 信息）也存在。\n\n![](img/533908_1_En_1_Fig4_HTML.png)\n\nKubernetes 网页的截图包含三个标签：文档、Kubernetes\
    \ 博客和培训。文档标签被选中。它展示了 8 个工作负载资源，包括 Pod、Pod 模板、Replication Controller 和 Deployment。\n\
    \n图 1-4\n\n特定类别的资源及其简短描述\n"
- fmt: '### The Deployment Documentation


    Let’s explore the reference page for the **Deployment** available at this address:
    [`https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/deployment-v1/`](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/deployment-v1/).
    The title of the page, **Deployment**, is the principal kind associated with the
    `deployments` resource shown in Figure [1-5](#533908_1_En_1_Chapter.xhtml#Fig5).


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig5_HTML.png)


    A screenshot of the Kubernetes web page includes 2 tabs labeled documentation
    and Kubernetes blog. Documentation is selected. It presents the deployment information
    and deployment specifications.


    Figure 1-5


    The Deployment documentation page


    The `apiVersion` indicated in the header can help you write a YAML manifest for
    a `Deployment` resource because you need to specify, for each resource in a Kubernetes
    manifest, the `apiVersion` and `kind`.


    In this case, you know the manifest for a deployment will start with the following:


    ```

    apiVersion: apps/v1

    kind: Deployment

    ```


    The next header line indicates the `import` to use when writing Go code. In Chapter
    [3](#533908_1_En_3_Chapter.xhtml), you will see how to use this import when describing
    resources in Go.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Figa_HTML.png)


    A dashed rectangle contains the text, O B J.


    After the header, a list of structure definitions is described, also accessible
    from the table of contents for the Deployment documentation page in Figure [1-6](#533908_1_En_1_Chapter.xhtml#Fig6).
    The first one is the principal kind of the resource, optionally followed by structure
    definitions that are used in fields of the first kind.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig6_HTML.jpg)


    A screenshot of the table of contents for deployment includes a list of operations.
    It highlights patch partially update the specified deployment.


    Figure 1-6


    Table of contents for the Deployment documentation page


    For example, the `Deployment` kind contains a `spec` field, of type `DeploymentSpec`,
    which is described later. Note that `DeploymentSpec` is not a structure directly
    exchanged during HTTP requests, and for that, it is not a kind and does not contain
    `kind` or `apiVersion` fields.


    Following the principal kind, and its associated definitions, other kinds associated
    with the resource are displayed. In this case, the `DeploymentList` kind.


    ### Operations Documentation


    The next subject in the API Documentation for a resource is the list of possible
    operations on this resource or its sub-resources, also accessible from the table
    of contents page (see Figure [1-6](#533908_1_En_1_Chapter.xhtml#Fig6)). By examining
    the details for the `create` operation to *Create a Deployment*, as shown in Figure
    [1-7](#533908_1_En_1_Chapter.xhtml#Fig7), you can see the HTTP Request verb and
    path to use, the parameters to pass during the request, and the possible responses.
    The HTTP verb to use for the request is `POST` and the path is `/apis/apps/v1/namespaces/{namespace}/deployments`.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig7_HTML.png)


    A screenshot of the Kubernetes web page. The right pane includes the details to
    create a deployment, H T T P request, parameters, and response. The left pane
    contains a list of options, including the workload resources.


    Figure 1-7


    Details for a “create” Deployment operation


    The `{namespace}` part of the path indicates a *path* parameter, which is to be
    replaced by the name of the namespace on which you want to create the deployment.
    You can specify the *query* parameters: `dryRun`, `fieldManager`, `fieldValidation`,
    and `pretty`. These parameters will follow the path with the format `path?dryRun=All`.


    The body of the request must be a `Deployment` kind. When using `kubectl`, you
    are writing *Kubernetes Manifests* that contain this body. In Chapter [3](#533908_1_En_3_Chapter.xhtml),
    you will see how to build the body in Go. The possible HTTP codes for the responses
    are: 200, 201, 202, and 401; and for the 2xx codes, the response body will contain
    a `Deployment` kind.


    ### The Pod Documentation


    Some structures contain many fields. For them, the Kubernetes API documentation
    categorizes the fields. An example is the documentation of the `Pod` resource.


    The [documentation page for the Pod resource](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/)
    first contains the description for the principal kind, `Pod`, followed by the
    description of the `PodSpec` structure. The `PodSpec` structure contains about
    40 fields. To help you understand the relationships between these fields and to
    simplify their exploration, they are arranged into categories. The `PodSpec` fields’
    categories are the following: *Containers*, *Volumes*, *Scheduling*, *Lifecycle*,
    and so on.


    Additionally, for fields containing nested fields, descriptions of them are generally
    displayed inline to avoid a back and forth between structure descriptions. For
    complex structures, however, the description is reported subsequently on the page,
    and a link is present next to the field name to be able to access it easily.


    This is always the case for the `Spec` and `Status` structures because they are
    very commonly found in almost all the resources. In addition, this is the case
    for some structures used in the `Pod` kind—for example, `Container`, `EphemeralContainer`,
    `LifecycleHandler`, `NodeAffinity`, and so on.


    Some structures used in several resources are placed in the *Common Definitions*
    section, and a link is present next to the field name to access it easily. In
    Figure [1-8](#533908_1_En_1_Chapter.xhtml#Fig8), you can see the *Containers*
    category inside the description of the `PodSpec` structure.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig8_HTML.png)


    A screenshot of the pod specifications depicts the containers with 3 sub-headings.
    1\. Containers. 2\. Initialization containers. 3\. Image pull secrets.


    Figure 1-8


    Extract of the `PodSpec` structure documentation


    You also can see that the fields, `containers` and `initContainers`, are of the
    same type as `Container`, which is described later on the page and is accessible
    with a link. The `imagePullSecrets` field is of type `LocalObjectReference`, which
    is described in the *Common Definitions* section and also is accessible through
    a link.


    ### One-Page Version of the Documentation


    Another version of the API Reference documentation exists and is presented on
    a single page. This version covers all the versions of the resources served by
    a Kubernretes version (not just the latest one). This version (if you want, change
    the last part of the path to navigate to another Kubernetes version) can be found
    at the following URL:


    [`https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.24/`](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.24/)


    ## Conclusion


    In this chapter, you have been able to discover the architecture of the Kubernetes
    platform, and that the API Server plays a central role. The Kubernetes API is
    an HTTP REST API, and the resources are categorized into various versioned groups.


    Kinds are specific structures used to exchange data between the API server and
    the clients. You can browse, using the official Kubernetes website, the API specifications
    in a human-readable form to discover the structure of the various resources and
    kinds, the different operations available for each resource and sub-resource,
    and their associated verbs.'
