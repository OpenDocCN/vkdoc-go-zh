    To regenerate the **DeepCopy** methods, reflecting the changes made to the structures,
    you need to run the following command:


    ```

    $ make

    ```


    To regenerate the YAML definition of the CRD with the new fields, this command
    must be executed:


    ```

    $ make manifests

    ```


    You also can edit the sample file to adapt the sample resource. The file is **config/samples/mygroup_v1alpha1_myresource.yaml**,
    and you can adapt the content with:


    ```

    $ cat > config/samples/mygroup_v1alpha1_myresource.yaml <<EOF

    apiVersion: mygroup.myid.dev/v1alpha1

    kind: MyResource

    metadata:

    labels:

    app.kubernetes.io/name: myresource

    app.kubernetes.io/instance: myresource-sample

    app.kubernetes.io/part-of: myresource-kb

    app.kuberentes.io/managed-by: kustomize

    app.kubernetes.io/created-by: myresource-kb

    name: myresource-sample

    spec:

    image: nginx

    memory: 512Mi

    EOF

    ```


    Now the CRD and sample are compatible, so you can apply the CRD to the cluster
    and update the sample resource:


    ```

    $ make install

    [...]

    bin/kustomize build config/crd | kubectl apply -f -

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.myid.dev configured

    $ kubectl apply -f

    config/samples/mygroup_v1alpha1_myresource.yaml

    myresource.mygroup.myid.dev/myresource-sample configured

    ```


    ## Implementing the Reconcile Function


    Because **kubebuilder** generates code based on the **controller-runtime** Library,
    you can reuse with very minor changes the code that was written for the **Reconcile**
    function in Chapter [11](#533908_1_En_11_Chapter.xhtml). Also, you can reuse the
    source code for testing the **Reconcile** function written in Chapter [12](#533908_1_En_12_Chapter.xhtml).


    ## Adding RBAC Annotations


    When running the Operator locally, the operator uses your **kubeconfig** file,
    with the authorizations specific to this **kubeconfig**. If you are connected
    using a **cluster-admin** account, the Operator will have all authorizations on
    the cluster and will be able to do any operations.


    When the Operator is deployed on the cluster, however, it is running with a specific
    Kubernetes Service Account and is given restricted authorizations. These authorizations
    are defined in the **ClusterRole** built and deployed by **kubebuilder**.


    To help Kubebuilder build this **ClusterRole**, annotations are present in the
    generated comments of the **Reconcile** function (line breaks have been added
    for clarity):


    ```

    //+kubebuilder:rbac:

    groups=mygroup.myid.dev,

    resources=myresources,

    verbs=get;list;watch;create;update;patch;delete

    //+kubebuilder:rbac:

    groups=mygroup.myid.dev,

    resources=myresources/status,

    verbs=get;update;patch

    //+kubebuilder:rbac:

    groups=mygroup.myid.dev,

    resources=myresources/finalizers,

    verbs=update

    ```


    These rules will give full access to the MyResource resource, but no access to
    other resources.


    The **Reconcile** function needs to have read and write access to the Deployment
    resource as soon as watching it; for this reason, you will need to add this new
    annotation (line breaks have been added):


    ```

    //+kubebuilder:rbac:

    groups=apps,

    resources=deployments,

    verbs=get;list;watch;create;update;patch;delete

    ```


    ## Deploying the Operator on the Cluster


    To be able to deploy the Operator to a cluster, you need to build the container
    image and deploy it to a container image registry (e.g., **DockerHub**, **Quay.io**,
    or many others).


    The first step is to create a new repository in your preferred container image
    registry to contain the image of the Operator container. Let’s say you have created
    a repository named **myresource** in **quay.io/myid**, the full name of the image
    will be **quay.io/myid/myresource**.


    For each build, you will need to use a different tag for the image so that the
    update of the container will be done correctly. The build the image locally, you
    need to run the following command (note the tag **v1alpha1-1**):


    ```

    $ make docker-build

    IMG=quay.io/myid/myresource:v1alpha1-1

    ```


    To deploy it to the registry, the following command must be executed:


    ```

    $ make docker-push

    IMG=quay.io/myid/myresource:v1alpha1-1

    ```


    Finally, to deploy the Operator to the cluster:


    ```

    $ make deploy

    IMG=quay.io/myid/myresource:v1alpha1-1

    ```


    This will create a new namespace, **myresource-kb-system**, containing a new deployment
    that will execute the Operator. You can examine the logs of the Operator with
    the following command:


    ```

    $ kubectl logs

    deployment/myresource-kb-controller-manager

    -n myresource-kb-system

    ```


    ## Creating a New Version of the Resource


    The Kubernetes API supports versioned resources, and a mechanism to convert resources
    between versions. The conversion between any versions must not lose any information.
    For the moment, you have created the custom resource MyResource with the version
    **v1alpha1**. The **Spec** of the resource contains **Image** and **Memory** fields.


    You want to create a **v1beta1** version, change the field **Memory**, and rename
    it to **MemoryRequest** to remove any ambiguity. You will be able to convert between
    these two versions by affecting the Memory value to the appropriate field.


    ### Defining a New Version


    To create the new version, you need to invoke the **kubebuilder create api** command
    again, with the same group and kind, but with a new version. Also, because the
    resource already exists and the Controller is already declared, you can reply
    with an **n** when asked whether you want to create a Resource and a Controller.


    ```

    $ kubebuilder create api --group mygroup --version v1beta1 --kind MyResource

    Create Resource [y/n]

    n

    Create Controller [y/n]

    n

    ```


