- fmt: '# Adding a Custom Resource to the Project


    For the moment, the Manager does not manage any Controller. Even if you can build
    and run it, you cannot do anything with it.


    The next `kubebuilder` command to execute is `kubebuilder create api` to add a
    Custom Resource and its related Controller to the project. The command will ask
    you whether you want to create the Resource and the Controller. Reply **y** to
    each question.


    * ❶ The group of the custom resource. It will be suffixed with the domain to form
    the complete GVK group

    * ❷ The version of the resource

    * ❸ The kind of the resource


    ```

    $ kubebuilder create api

    --group mygroup                   ❶

    --version v1alpha1                ❷

    --kind MyResource                 ❸

    Create Resource [y/n]

    y

    Create Controller [y/n]

    y

    ```


    You can see the changes made by the command by running the following `git` command:


    ```

    $ git status

    On branch main

    Changes not staged for commit:

    (use "git add ..." to update what will be committed)

    (use "git restore ..." to discard changes in working directory)

    modified:   PROJECT

    modified:   go.mod

    modified:   go.sum

    modified:   main.go

    Untracked files:

    (use "git add ..." to include in what will be committed)

    api/

    config/crd/

    config/rbac/myresource_editor_role.yaml

    config/rbac/myresource_viewer_role.yaml

    config/samples/

    controllers/

    no changes added to commit (use "git add" and/or "git commit -a")

    ```


    The `PROJECT` file contains the definition of the project. It originally contained
    the domain and `repo` provided as flags to the `init` command. It now also contains
    the definition of a first resource. The `main.go` file and the `controllers` directory
    define a Controller for the custom resource.


    The `api/v1alpha1` directory has been created and contains the definition of the
    custom resource using Go structures, as well as code generated by `deepcopy-gen`
    (see Chapter [8](#533908_1_En_8_Chapter.xhtml)’s "Running `deepcopy-gen`" section),
    with the help of the `controller-gen` tool. It also contains the definition of
    the `AddToScheme` function, useful for adding this new custom resource to a Scheme.


    The `config/samples` directory contains a new file, defining an instance of the
    custom resource, in YAML format. The `config/rbac` directory contains two new
    files, defining two new `ClusterRole` resources—one for viewing and one for editing
    `MyResource` instances. The `config/crd` directory contains kustomize files to
    build the CRD.


    # Building and Deploying Manifests


    The following command builds manifests to be deployed to the cluster:


    ```

    $ make manifests

    ```


    This command builds two manifests:


    * `config/rbac/role.yaml` – the `ClusterRole` that will be affected to the service
    account used by the Manager, giving access to the custom resource.

    * `config/crd/bases/mygroup.myid.dev_myresources.yaml` – the definition of the
    Custom Resource.


    The following command will deploy the manifest defining the CRD:


    ```

    $ make install

    [...]

    bin/kustomize build config/crd | kubectl apply -f -

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.myid.dev created

    ```


    # Running the Manager Locally


    This time, the Manager is handling a Controller, reconciling the `MyResource`
    instances. The `Reconcile` function generated by `kubebuilder` does nothing but
