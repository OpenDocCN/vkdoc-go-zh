- fmt: '### Adding `AddToScheme` Function


    The generated code relies on an `AddToScheme` function defined in the package
    of the resource. To stick with the convention found in the API Library, you will
    write this function in a `register.go` file, placed in the directory `pkg/apis/<group>/<version>/`.


    By getting as boilerplate, the `register.go` file from a native Kubernetes resource
    from the Kubernetes API Library, you will obtain the following file. The only
    changes are to the group name (❶), version name (❷), and the list of resources
    (❸) to register to the scheme.


    ```

    package v1alpha1

    import (

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    )

    const GroupName = "mygroup.example.com"          ❶

    var SchemeGroupVersion = schema.GroupVersion{

    Group: GroupName,

    Version: "v1alpha1",                         ❷

    }

    var (

    SchemeBuilder      = runtime.NewSchemeBuilder(addKnownTypes)

    localSchemeBuilder = &SchemeBuilder

    AddToScheme        = localSchemeBuilder.AddToScheme

    )

    func addKnownTypes(scheme *runtime.Scheme) error {

    scheme.AddKnownTypes(SchemeGroupVersion,

    &MyResource{},                         ❸

    &MyResourceList{},

    )

    metav1.AddToGroupVersion(scheme, SchemeGroupVersion)

    return nil

    }

    ```


    ### Running `client-gen`


    The `client-gen` needs a file containing the text (generally the license) added
    at the beginning of generated files. You will use the same file as with `deepcopy-gen`:
    `hack/boilerplate.go.txt`.


    You can run the `client-gen` command, which will generate files in the directory
    `pkg/clientset/clientset`:


    ```

    client-gen \

    --clientset-name clientset

    --input-base ""

    --input github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1

    --output-package github.com/myid/myresource-crd/pkg/clientset

    --output-base ../../..

    --go-header-file hack/boilerplate.go.txt

    ```


    Note the `"../../.."` as output-base. It will place the output base in the directory
    from which you created the directory for the project:


    `$ mkdir -p github.com/myid/myresource-crd`


    You will need to adapt this to the number of subdirectories you created if different
    from the three.


    Note that you will need to run this command again when you update the definition
    of your custom resource. It is recommended to place this command in a `Makefile`
    to automatically run it every time the files defining the custom resource are
    modified.


    ### Using the Generated Clientset


    Now that the Clientset is generated and the types implement the `runtime.Object`
    interface, you can work with the custom resource the same way you work with the
    native Kubernetes resources. For example, this code will use the dedicated Clientset
    to list the custom resources on the `default` namespace:


    ```

    import (

    "context"

    "fmt"

    "github.com/myid/myresource-crd/pkg/clientset/clientset"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/client-go/tools/clientcmd"

    )

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    nil,

    ).ClientConfig()

    if err != nil {

    return err

    }

    clientset, err := clientset.NewForConfig(config)

    if err != nil {

    return err

    }

    list, err := clientset.MygroupV1alpha1().

    MyResources("default").

    List(context.Background(), metav1.ListOptions{})

    if err != nil {

    return err

    }

    for _, res := range list.Items {

    fmt.Printf("%s\n", res.GetName())

    }

    ```


    ### Using the Generated *fake* Clientset


    The `client-gen` tool also generates a *fake* Clientset that you can use the same
    way you use the *fake* Clientset from the Client-go Library. For more information,
    see Chapter 7’s “Fake Clientset” section.


    ## Using the `Unstructured` Package and Dynamic Client


    The `Unstructured` and `UnstructuredList` types are defined in the `unstructured`
    package of the API Machinery Library. The `import` to use is the following:


    ```

    import (

    "k8s.io/apimachinery/pkg/apis/meta/v1/unstructured"

    )

    ```


    These types can be used to represent any Kubernetes *Kind*, either a list or a
    nonlist.


    ### The `Unstructured` Type


    The `Unstructured` type is defined as a structure containing a unique `Object`
    field:


    ```

    type Unstructured struct {

    // Object is a JSON compatible map with

    // string, float, int, bool, []interface{}, or

    // map[string]interface{}

    // children.

    Object map[string]interface{}

    }

    ```


    Using this type, it is possible to define any Kubernetes resource without having
    to use the typed structures (e.g., the `Pod` structure, found in the API Library).


    **Getters** and **Setters** methods are defined for this type to access generic
    fields from the `TypeMeta` and `ObjectMeta` fields, common to all structures representing
    Kubernetes *Kinds*.


    #### Getters and Setters to Access `TypeMeta` Fields


    The `APIVersion` and `Kind` Getters/Setters can be used to directly get and set
    the `apiVersion` and `Kind` fields of the `TypeMeta`.


    The `GroupVersionKind` Getters/Setters can be used to convert the `apiVersion`
    and kind specified in the object to and from a `GroupVersionKind` value.


    ```

    GetAPIVersion() string

    GetKind() string

    GroupVersionKind() schema.GroupVersionKind

    SetAPIVersion(version string)

    SetKind(kind string)

    SetGroupVersionKind(gvk schema.GroupVersionKind)

    ```


    #### Getters and Setters to Access `ObjectMeta` Fields


    Getters and Setters are defined for all fields of the `ObjectMeta` structure.
    The details of the structure can be found in Chapter 3’s “The `ObjectMeta` Fields”
    section.


    As an example, the getter and setter to access the `Name` field are `GetName()
    string` and `SetName(name string)`.


    #### Methods for Creating and Converting


    - `NewEmptyInstance() runtime.Unstructured` – this returns a new instance with
    only the `apiVersion` and `kind` fields copied from the receiver.

    - `MarshalJSON() ([]byte, error)` – this returns the JSON representation of the
    receiver.

    - `UnmarshalJSON(b []byte) error` – this populates the receiver with the passed
    JSON representation.

    - `UnstructuredContent() map[string]interface{}` – this returns the value of the
    `Object` field of the receiver.

    - `SetUnstructuredContent(content map[string]interface{})` – this sets the value
    of the `Object` field of the receiver.

    - `IsList() bool` – this returns true if the receiver describes a list, by checking
    if an `items` field exists, and is an array.

    - `ToList() (*UnstructuredList, error)` – this converts the receiver to an `UnstructuredList`.'
