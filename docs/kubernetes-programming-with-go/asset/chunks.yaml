    Spec: corev1.PodSpec{\nContainers: []corev1.Container{\n{\nName:  \"runtime\"\
    ,\nImage: \"nginx\",\n},\n},\n},\n}\npod.SetName(\"my-pod\")\npod.SetLabels(map[string]string{\n\
    \"app.kubernetes.io/component\": \"my-component\",\n\"app.kubernetes.io/name\"\
    :      \"a-name\",\n})\nreturn &pod\n}\nfunc serializePodObject( ➋\nserializer\
    \ runtime.Serializer,\npod *corev1.Pod,\n) (\nio.Reader,\nerror,\n) {\nvar buf\
    \ bytes.Buffer\nerr := serializer.Encode(pod, &buf)\nif err != nil {\nreturn nil,\
    \ err\n}\nreturn &buf, nil\n}\nfunc buildPostRequest( ➌\nbody io.Reader,\n) (\n\
    *http.Request,\nerror,\n) {\nreqCreate, err := http.NewRequest(\n\"POST\",\n\"\
    http://127.0.0.1:8001/api/v1/namespaces/default/pods\",\nbody,\n)\nif err != nil\
    \ {\nreturn nil, err\n}\nreqCreate.Header.Add(\n\"Accept\",\n\"application/json\"\
    ,\n)\nreqCreate.Header.Add(\n\"Content-Type\",\n\"application/json\",\n)\nreturn\
    \ reqCreate, nil\n}\nfunc deserializePodBody( ➐\nserializer runtime.Serializer,\n\
    body []byte,\n) (\n*corev1.Pod,\nerror,\n) {\nvar result corev1.Pod\n_, _, err\
    \ := serializer.Decode(body, nil, & result)\nif err != nil {\nreturn nil, err\n\
    }\nreturn &result, nil\n}\nfunc deserializeStatusBody( ➒\nserializer runtime.Serializer,\n\
    body []byte,\n) (\n*metav1.Status,\nerror,\n) {\nvar status metav1.Status\n_,\
    \ _, err := serializer.Decode(body, nil, & status)\nif err != nil {\nreturn nil,\
    \ err\n}\nreturn & status, nil\n}\nfunc getJSONSerializer() runtime.Serializer\
    \ {\nscheme := runtime.NewScheme()\nscheme.AddKnownTypes(\nschema.GroupVersion{\n\
    Group:   \"\",\nVersion: \"v1\",\n},\n&corev1.Pod{},\n&metav1.Status{},\n)\nreturn\
    \ json.NewSerializerWithOptions(\njson.SimpleMetaFactory{},\nnil,\nscheme,\njson.SerializerOptions{},\n\
    )\n}\n```\n\n## Conclusion\n\nIn this chapter, you have discovered a first library\
    \ to work with Kubernetes in Go—the API Library. It is essentially a collection\
    \ of Go structures to declare Kubernetes resources. The chapter also has explored\
    \ the definition of the metadata fields common to all resources, defined in the\
    \ API Machinery Library.\n\nAt the end of the chapter, there is an example of\
    \ a program for building a **Pod** definition using the API Library and then creating\
    \ this **Pod** in the cluster by calling the API Server using an HTTP request.\n\
    \nThe next chapters explores other fundamental libraries—the API Machinery and\
    \ the Client-go—with which you will no longer need to build HTTP requests.\n\n\
    # 4. Using Common Types\n\nThe previous chapter describes how to define a Kubernetes\
    \ resource using Go structures. Particularly, it explains the content of packages\
    \ of the Kubernetes API Library, and the common fields of every resource associated\
    \ with a Kubernetes *Kind*.\n\nThis chapter examines common types that can be\
    \ used in various places when defining Kubernetes resources.\n\n## Pointers\n\n\
    Optional values in Go structures generally are declared as a pointer to a value.\
    \ Thus, if you do not want to specify the optional value, you just need to keep\
    \ it as a nil pointer, and if you need to specify a value, you have to create\
    \ the value and pass its reference.\n\nThe **pointer** package of the **Kubernetes\
    \ Utils** library defines utility functions to declare such optional values.\n\
    \n```\nimport (\n\"k8s.io/utils/pointer\"\n)\n```"
  trans: "\n### 规范与状态\n\n在通用的 `Type` 和 `Metadata` 之后，资源定义通常由两部分组成：`Spec` 和 `Status`。\n\
    \n请注意，这并非适用于所有资源。例如，核心的 `ConfigMap` 和 `Secret` 资源（仅举两例）就不包含 `Spec` 和 `Status`\
    \ 部分。更普遍的是，包含配置数据且不受任何控制器管理的资源不包含这些字段。\n\n`Spec` 是用户定义的部分，表示用户期望的状态。`Spec` 将由管理该资源的`控制器`读取，控制器会根据\
    \ `Spec` 在集群上创建、更新或删除资源，并将其操作结果检索到资源的 `Status` 部分。控制器读取 `Spec`、应用到集群并检索 `Status`\
    \ 的此过程称为`调谐循环`。\n\n### 与编写 YAML 清单的比较\n\n当你编写一个与 `kubectl` 配合使用的 Kubernetes 清单时：\n\
    \n-   清单以 `apiVersion` 和 `kind` 开头。\n-   `metadata` 字段包含该资源的所有元数据。\n-   随后是 `Spec`\
    \ 和 `Status` 字段（或其他字段）。\n\n当你用 Go 语言编写 Kubernetes 结构体时，会发生以下情况：\n\n-   结构体的类型决定了\
    \ `apiVersion` 和 `Kind`；无需指定它们。\n-   元数据可以通过嵌入 `metav1.ObjectMeta` 结构体来定义，或者通过使用资源上的*元数据设置器*来定义。\n\
    -   随后是 `Spec` 和 `Status` 字段（或其他字段），使用它们自己的 Go 结构体或其他类型。\n\n举个例子，以下是使用 YAML 清单与\
    \ Go 语言定义 `Pod` 的方法对比。YAML 格式：\n\n```\napiVersion: v1\nkind: Pod\nmetadata:\n\
    \  name: nginx\n  labels:\n    - component: my-component,\nspec:\n  containers:\n\
    \    - image: nginx\n      name: nginx\n```\n\n在 Go 语言中，当你为元数据使用设置器时：\n\n```\n\
    pod := corev1.Pod{\n    Spec: corev1.PodSpec{\n        Containers: []corev1.Container{\n\
    \            {\n                Name:  \"runtime\",\n                Image: \"\
    nginx\",\n            },\n        },\n    },\n}\npod.SetName(\"my-pod\")\npod.SetLabels(map[string]string{\n\
    \    \"component\": \"my-component\",\n})\n```\n\n或者，在 Go 语言中，当你将 `metav1.ObjectMeta`\
    \ 结构体嵌入到 `Pod` 结构体中时：\n\n```\npod2 := corev1.Pod{\n    ObjectMeta: metav1.ObjectMeta{\n\
    \        Name: \"nginx\",\n        Labels: map[string]string{\n            \"\
    component\": \"mycomponent\",\n        },\n    },\n    Spec: corev1.PodSpec{\n\
    \        Containers: []corev1.Container{\n            {\n                Name:\
    \  \"runtime\",\n                Image: \"nginx\",\n            },\n        },\n\
    \    },\n}\n```\n\n## 完整示例\n\n这个完整示例使用截至目前学习的概念，通过 `POST` 请求在集群上创建一个 `Pod`。\n\n\
    -   ➊ 使用 Go 结构体构建一个 `Pod` 对象，如本章前面所示\n-   ➋ 使用序列化器（更多相关信息请参见第 5 章）将 `Pod` 对象序列化为\
    \ JSON\n-   ➌ 构建一个 HTTP `POST` 请求，其主体包含要创建的、已序列化为 JSON 的 `Pod`\n-   ➍ 使用构建好的请求调用\
    \ Kubernetes API\n-   ➎ 从响应中获取主体\n-   ➏ 根据响应状态码：\n\n如果请求返回 2xx 状态码：\n\n-   ➐ 将响应主体反序列化为\
    \ `Pod` Go 结构体\n-   ➑ 将创建的 `Pod` 对象以 JSON 格式显示以供参考；\n\n否则：\n\n-   ➒ 将响应主体反序列化为\
    \ `Status` Go 结构体\n-   ➓ 将 `Status` 对象以 JSON 格式显示以供参考：\n\n```\npackage main\n\n\
    import (\n    \"bytes\"\n    \"encoding/json\"\n    \"fmt\"\n    \"io\"\n    \"\
    net/http\"\n\n    corev1 \"k8s.io/api/core/v1\"\n    metav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
    \n    \"k8s.io/apimachinery/pkg/runtime\"\n    \"k8s.io/apimachinery/pkg/runtime/schema\"\
    \n    \"k8s.io/apimachinery/pkg/runtime/serializer/json\"\n)\n\nfunc createPod()\
    \ error {\n    pod := createPodObject() ➊\n    serializer := getJSONSerializer()\n\
    \    postBody, err := serializePodObject(serializer, pod) ➋\n    if err != nil\
    \ {\n        return err\n    }\n    reqCreate, err := buildPostRequest(postBody)\
    \ ➌\n    if err != nil {\n        return err\n    }\n    client := &http.Client{}\n\
    \    resp, err := client.Do(reqCreate) ➍\n    if err != nil {\n        return\
    \ err\n    }\n    defer resp.Body.Close()\n    body, err := io.ReadAll(resp.Body)\
    \ ➎\n    if err != nil {\n        return err\n    }\n    if resp.StatusCode <\
    \ 300 { ➏\n        createdPod, err := deserializePodBody(serializer, body) ➐\n\
    \        if err != nil {\n            return err\n        }\n        json, err\
    \ := json.MarshalIndent(createdPod, \"\", \"  \")\n        if err != nil {\n \
    \           return err\n        }\n        fmt.Printf(\"%s\\n\", json) ➑\n   \
    \ } else {\n        status, err := deserializeStatusBody(serializer, body) ➒\n\
    \        if err != nil {\n            return err\n        }\n        json, err\
    \ := json.MarshalIndent(status, \"\", \"  \")\n        if err != nil {\n     \
    \       return err\n        }\n        fmt.Printf(\"%s\\n\", json) ➓\n    }\n\
    \    return nil\n}\n\nfunc createPodObject() *corev1.Pod { ➊\n    pod := corev1.Pod{\n\
    \        Spec: corev1.PodSpec{\n            Containers: []corev1.Container{\n\
    \                {\n                    Name:  \"runtime\",\n                \
    \    Image: \"nginx\",\n                },\n            },\n        },\n    }\n\
    \    pod.SetName(\"my-pod\")\n    pod.SetLabels(map[string]string{\n        \"\
    app.kubernetes.io/component\": \"my-component\",\n        \"app.kubernetes.io/name\"\
    :      \"a-name\",\n    })\n    return &pod\n}\n\nfunc serializePodObject( ➋\n\
    \    serializer runtime.Serializer,\n    pod *corev1.Pod,\n) (\n    io.Reader,\n\
    \    error,\n) {\n    var buf bytes.Buffer\n    err := serializer.Encode(pod,\
    \ &buf)\n    if err != nil {\n        return nil, err\n    }\n    return &buf,\
    \ nil\n}\n\nfunc buildPostRequest( ➌\n    body io.Reader,\n) (\n    *http.Request,\n\
    \    error,\n) {\n    reqCreate, err := http.NewRequest(\n        \"POST\",\n\
    \        \"http://127.0.0.1:8001/api/v1/namespaces/default/pods\",\n        body,\n\
    \    )\n    if err != nil {\n        return nil, err\n    }\n    reqCreate.Header.Add(\n\
    \        \"Accept\",\n        \"application/json\",\n    )\n    reqCreate.Header.Add(\n\
    \        \"Content-Type\",\n        \"application/json\",\n    )\n    return reqCreate,\
    \ nil\n}\n\nfunc deserializePodBody( ➐\n    serializer runtime.Serializer,\n \
    \   body []byte,\n) (\n    *corev1.Pod,\n    error,\n) {\n    var result corev1.Pod\n\
    \    _, _, err := serializer.Decode(body, nil, &result)\n    if err != nil {\n\
    \        return nil, err\n    }\n    return &result, nil\n}\n\nfunc deserializeStatusBody(\
    \ ➒\n    serializer runtime.Serializer,\n    body []byte,\n) (\n    *metav1.Status,\n\
    \    error,\n) {\n    var status metav1.Status\n    _, _, err := serializer.Decode(body,\
    \ nil, &status)\n    if err != nil {\n        return nil, err\n    }\n    return\
    \ &status, nil\n}\n\nfunc getJSONSerializer() runtime.Serializer {\n    scheme\
    \ := runtime.NewScheme()\n    scheme.AddKnownTypes(\n        schema.GroupVersion{\n\
    \            Group:   \"\",\n            Version: \"v1\",\n        },\n      \
    \  &corev1.Pod{},\n        &metav1.Status{},\n    )\n    return json.NewSerializerWithOptions(\n\
    \        json.SimpleMetaFactory{},\n        nil,\n        scheme,\n        json.SerializerOptions{},\n\
    \    )\n}\n```\n\n## 总结\n\n在本章中，你了解了第一个用于在 Go 中操作 Kubernetes 的库——API 库。它本质上是一组用于声明\
    \ Kubernetes 资源的 Go 结构体。本章还探讨了 API Machinery 库中定义的所有资源通用的元数据字段的定义。\n\n本章末尾有一个程序示例，演示了如何使用\
    \ API 库构建 `Pod` 定义，然后通过 HTTP 请求调用 API 服务器在集群中创建此 `Pod`。\n\n接下来的章节将探讨其他基础库——API\
    \ Machinery 和 Client-go，使用它们你将不再需要手动构建 HTTP 请求。\n\n# 4. 使用通用类型\n\n上一章描述了如何使用 Go\
    \ 结构体定义 Kubernetes 资源。特别是，它解释了 Kubernetes API 库中包的内容，以及与每个 Kubernetes `Kind` 关联的每个资源的通用字段。\n\
    \n本章将介绍在定义 Kubernetes 资源时可以在各种位置使用的通用类型。\n\n## 指针\n\nGo 结构体中的可选值通常声明为指向值的指针。因此，如果你不想指定可选值，只需将其保留为\
    \ `nil` 指针；如果需要指定一个值，则必须创建该值并传递其引用。\n\n`Kubernetes Utils` 库中的 `pointer` 包定义了用于声明此类可选值的工具函数。\n\
    \n```\nimport (\n    \"k8s.io/utils/pointer\"\n)\n```\n"
- fmt: '### Getting the Reference of a Value


    The `Int`, `Int32`, `Int64`, `Bool`, `String`, `Float32`, `Float64`, and `Duration`
    functions accept a parameter of the same type and return a pointer to the value
    passed as parameter. For example, the `Int32` function is defined as follows:


    ```

    func Int32(i int32) *int32 {

    return &i

    }

    ```


    Then, you can use it this way:


    ```

    spec := appsv1.DeploymentSpec{

    Replicas: pointer.Int32(3),

    [...]

    }

    ```


    ### Dereferencing a Pointer


    The other way you can get the value referenced by the pointer, or a default value
    if the pointer is `nil`.


    The `IntDeref`, `Int32Deref`, `Int64Deref`, `BoolDeref`, `StringDeref`, `Float32Deref`,
    `Float64Deref`, and `DurationDeref` functions accept a pointer and a default value
    as a parameter of the same type, and it returns the referenced value if the pointer
    is not `nil`, or the default value otherwise. For example, the `Int32Deref` function
    is defined as follows:


    ```

    func Int32Deref(ptr *int32, def int32) int32 {

    if ptr != nil {

    return *ptr

    }

    return def

    }

    ```


    Then, you can use it this way:


    ```

    replicas := pointer.Int32Deref(spec.Replicas, 1)

    ```


    ### Comparing Two Referenced Values


    It can be useful to compare two pointer values, considering that they are equal
    if they are both `nil`, or if they reference two equal values.


    The `Int32Equal`, `Int64Equal`, `BoolEqual`, `StringEqual`, `Float32Equal`, `Float64Equal`,
    and `DurationEqual` functions accept two pointers of the same type, and return
    `true` if the two pointers are `nil`, or if they reference equal values. For example,
    the `Int32Equal` function is defined as follows:


    ```

    func Int32Equal(a, b *int32) bool {

    if (a == nil) != (b == nil) {

    return false

    }

    if a == nil {

    return true

    }

    return *a == *b

    }

    ```


    Then, you can use it this way:


    ```

    eq := pointer.Int32Equal(

    spec1.Replicas,

    spec2.Replicas,

    )

    ```


    Note that to test the equality of an optional value, also considering its default
    value, you should instead use the following:


    ```

    isOne := pointer.Int32Deref(spec.Replicas, 1) == 1

    ```


    ## Quantities


    `Quantity` is a fixed-point representation of a number and is used to define quantities
    of resources to allocate (i.e., memory, cpu, etc.). The smallest value the `Quantity`
    can represent is one nano (10^(−9)).


    Internally, a `Quantity` is represented either by an `Integer` (on 64 bits) and
    a `Scale`, or, if the `int64` is not large enough to support it, by an `inf.Dec`
    value (as defined by the package at [`https://github.com/go-inf/inf`](https://github.com/go-inf/inf)).


    ```

    import (

    "k8s.io/apimachinery/pkg/api/resource"

    )

    ```


    ### Parsing a String as Quantity


    A first way to define a `Quantity` is to parse its value from a string by using
    one of the following functions:


    - `func MustParse(str string) Quantity` – parses a quantity from the `string`,
    or panics if the string does not represent a quantity. It is to be used when you
    are applying a hard-coded value that you know is valid.


    - `func ParseQuantity(str string) (Quantity, error)` – parses a quantity from
    the `string` or return an error if the string does not represent a quantity. It
    is to be used when you are not sure the value is valid.


    The `Quantity` can be written using a sign, a digit number, and a suffix. The
    sign and suffix are optional. The suffix can be either a binary, a decimal, or
    a decimal exponent.


    The defined binary suffixes are `Ki` (2^(10)), `Mi` (2^(20)), `Gi` (2^(30)), `Ti`
    (2^(40)), `Pi` (2^(50)), and `Ei` (2^(60)). The defined decimal suffixes are `n`
    (10^(−9)), `u` (10^(−6)), `m` (10^(−3)), `"" ` (10⁰), `k` (10³), `M` (10⁶), `G`
    (10⁹), `T` (10^(12)), `P` (10^(15)), and `E` (10^(18)). The decimal exponent suffix
    is written with an `e` or `E` sign followed by the decimal exponent—for example,
    `E2` to represent 10².


    The suffix format (either binary, decimal, or exponent decimal) is saved in the
    `Quantity` and is used when serializing the quantity.


    Using these functions, the way the `Quantity` is represented internally (either
    a scaled integer or an `inf.Dec`) will be decided depending on whether the parsed
    value can be represented as a scaled integer or not.


    ### Using an inf.Dec as a Quantity


    Use the following to use an `inf.Dec` as a `Quantity`:


    - `func NewDecimalQuantity(b inf.Dec, format Format) *Quantity` – declares a `Quantity`
    by giving an `inf.Dec` value, and by indicating with which suffix format you want
    it to be serialized.


    - `func (q *Quantity) ToDec() *Quantity` – forces a `Quantity`—previously defined
    by parsing a string or using a new function to initialize it—to be stored as an
    `inf.Dec`.


    - `func (q *Quantity) AsDec() *inf.Dec` – gets a representation of the `Quantity`
    as `inf.Dec` without modifying the internal representation.


    ### Using a Scaled Integer as a Quantity


    Use the following to use a scaled integer as a `Quantity`:


    - `func NewScaledQuantity(value int64, scale Scale) *Quantity` – declares a `Quantity`
    by giving an `int64` value and a scale. The format of the suffix will be the decimal
    format.


    - `func (q *Quantity) SetScaled(value int64, scale Scale)` – overrides a `Quantity`
    value with a scaled integer. The format of the suffix will remain unchanged.


    - `func (q *Quantity) ScaledValue(scale Scale) int64` – gets a representation
    of the `Quantity` as an integer, considering the given scale, without modifying
    the internal representation.


    - `func NewQuantity(value int64, format Format) *Quantity` – declares a `Quantity`
    by giving an `int64` value, the scale being fixed to `0`, and a suffix format
    is to be used during serialization.


    - `func (q *Quantity) Set(value int64)` – overrides a `Quantity` value with an
    integer and a scale fixed to `0`. The format of the suffix will remain unchanged.


    - `func (q *Quantity) Value() int64` – gets a representation of the `Quantity`
    as an integer with a scale to `0`, without modifying the internal representation.


    - `func NewMilliQuantity(value int64, format Format) *Quantity` – declares a `Quantity`
    by giving an `int64` value, the scale being fixed to `−3` and a suffix format
    to be used during serialization.


    - `func (q *Quantity) SetMilli(value int64)` – overrides a `Quantity` value with
    an integer and a scale fixed to `−3`. The format of the suffix will remain unchanged.


    - `func (q *Quantity) MilliValue() int64` – gets a representation of the `Quantity`
    as an integer with a scale to `−3` without modifying the internal representation.


    ### Operations on Quantities


    The following are the ways to make operations on the `Quantity`:


    - `func (q *Quantity) Add(y Quantity)` – adds the `y` Quantity to the `q` Quantity.


    - `func (q *Quantity) Sub(y Quantity)` – subtracts the `y` Quantity from the `q`
    Quantity.


    - `func (q *Quantity) Cmp(y Quantity) int` – compares the `q` and `y` quantities.
    Return `0` if both quantities are equal, `1` if `q` is greater than `y`, and `−1`
    if `q` is less than `y`.


    - `func (q *Quantity) CmpInt64(y int64) int` – compares `q` Quantity with the
    `y` integer. Return `0` if both quantities are equal, `1` if `q` is greater than
    `y`, and `−1` if `q` is less than `y`.


    - `func (q *Quantity) Neg()` – makes `q` the negative value of itself.


    - `func (q Quantity) Equal(v Quantity) bool` – tests to see whether `q` and `v`
    quantities are equal.'
