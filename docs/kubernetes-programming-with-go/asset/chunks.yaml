- fmt: '### Spec and Status


    After the common `Type` and `Metadata`, resource definitions are generally composed
    of two parts: the `Spec` and the `Status`.


    Note that it is not true for all resources. For example, the core `ConfigMap`
    and `Secret` resources, to name a couple, do not contain `Spec` and `Status` parts.
    More generally, resources containing configuration data, which are not managed
    by any controller, do not contain these fields.


    The `Spec` is the part that the user will define, which indicates the desired
    state by the user. The `Spec` will be read by the `Controller` managing this resource,
    which will create, update, or delete resources on the cluster according to the
    `Spec`, and retrieve the status of its operations into the `Status` part of the
    resource. This process used by a controller to read the `Spec`, apply to the cluster
    and retrieve the `Status` is called the `Reconcile Loop`.


    ### Comparison with Writing YAML Manifests


    When you write a Kubernetes manifest to be used with `kubectl`:


    - The manifest starts with `apiVersion` and `kind`.

    - The `metadata` field contains all the metadata for the resource.

    - The `Spec` and `Status` fields (or others) follow.


    When you write a Kubernetes structure in Go, the following occur:


    - The type of the structure determines the `apiVersion` and `Kind`; there is no
    need to specify them.

    - The metadata can be defined either by embedding the `metav1.ObjectMeta` structure,
    or by using *metadata setters* on the resource.

    - The `Spec` and `Status` fields (or others) follow, using their own Go structures
    or other types.


    As an example, here are the ways to define a `Pod` with a YAML manifest vs. Go.
    In YAML:


    ```

    apiVersion: v1

    kind: Pod

    metadata:

    name: nginx

    labels:

    - component: my-component,

    spec:

    containers:

    - image: nginx

    name: nginx

    ```


    In Go, when you are using setters for metadata:


    ```

    pod := corev1.Pod{

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: "nginx",

    },

    },

    },

    }

    pod.SetName("my-pod")

    pod.SetLabels(map[string]string{

    "component": "my-component",

    })

    ```


    Or, in Go, when you are embedding the `metav1.ObjectMeta` structure into the `Pod`
    structure:


    ```

    pod2 := corev1.Pod{

    ObjectMeta: metav1.ObjectMeta{

    Name: "nginx",

    Labels: map[string]string{

    "component": "mycomponent",

    },

    },

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: "nginx",

    },

    },

    },

    }

    ```


    ## A Complete Example


    This complete example uses the concepts learned up to this point to create a `Pod`
    on the cluster using a `POST` request.


    - ➊ Build a `Pod` object using a Go structure, as has been shown earlier in this
    chapter

    - ➋ Serialize the `Pod` object in JSON using a serializer (see Chapter [5](#533908_1_En_5_Chapter.xhtml)
    for more about this)

    - ➌ Build an HTTP `POST` request with the body that contains the `Pod` to create,
    serialized in JSON

    - ➍ Call the Kubernetes API with the request built

    - ➎ Get the body from the response

    - ➏ Depending on the response status code:


    If the request returns a 2xx status code:


    - ➐ Deserialize the response body as a `Pod` Go structure

    - ➑ Display the created `Pod` object as JSON for information;


    otherwise:


    - ➒ Deserialize the response body as a `Status` Go structure

    - ➓ Display the `Status` object as JSON for information:


    ```

    package main

    import (

    "bytes"

    "encoding/json"

    "fmt"

    "io"

    "net/http"

    corev1 "k8s.io/api/core/v1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    "k8s.io/apimachinery/pkg/runtime/serializer/json"

    )

    func createPod() error {

    pod := createPodObject() ➊

    serializer := getJSONSerializer()

    postBody, err := serializePodObject(serializer, pod) ➋

    if err != nil {

    return err

    }

    reqCreate, err := buildPostRequest(postBody) ➌

    if err != nil {

    return err

    }

    client := &http.Client{}

    resp, err := client.Do(reqCreate) ➍

    if err != nil {

    return err

    }

    defer resp.Body.Close()

    body, err := io.ReadAll(resp.Body) ➎

    if err != nil {

    return err

    }

    if resp.StatusCode < 300 { ➏

    createdPod, err := deserializePodBody(serializer, body) ➐

    if err != nil {

    return err

    }

    json, err := json.MarshalIndent(createdPod, "", "  ")

    if err != nil {

    return err

    }

    fmt.Printf("%s\n", json) ➑

    } else {

    status, err := deserializeStatusBody(serializer, body) ➒

    if err != nil {

    return err

    }

    json, err := json.MarshalIndent(status, "", "  ")

    if err != nil {

    return err

    }

    fmt.Printf("%s\n", json) ➓

    }

    return nil

    }

    func createPodObject() *corev1.Pod { ➊

    pod := corev1.Pod{

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: "nginx",

    },

    },

    },

    }

    pod.SetName("my-pod")

    pod.SetLabels(map[string]string{

    "app.kubernetes.io/component": "my-component",

    "app.kubernetes.io/name":      "a-name",

    })

    return &pod

    }

    func serializePodObject( ➋

    serializer runtime.Serializer,

    pod *corev1.Pod,

    ) (

    io.Reader,

    error,

    ) {

    var buf bytes.Buffer

    err := serializer.Encode(pod, &buf)

    if err != nil {

    return nil, err

    }

    return &buf, nil

    }

    func buildPostRequest( ➌

    body io.Reader,

    ) (

    *http.Request,

    error,

    ) {

    reqCreate, err := http.NewRequest(

    "POST",

    "http://127.0.0.1:8001/api/v1/namespaces/default/pods",

    body,

    )

    if err != nil {

    return nil, err

    }

    reqCreate.Header.Add(

    "Accept",

    "application/json",

    )

    reqCreate.Header.Add(

    "Content-Type",

    "application/json",

    )

    return reqCreate, nil

    }

    func deserializePodBody( ➐

    serializer runtime.Serializer,

    body []byte,

    ) (

    *corev1.Pod,

    error,

    ) {

    var result corev1.Pod

    _, _, err := serializer.Decode(body, nil, & result)

    if err != nil {

    return nil, err

    }

    return &result, nil

    }

    func deserializeStatusBody( ➒

    serializer runtime.Serializer,

    body []byte,

    ) (

    *metav1.Status,

    error,

    ) {

    var status metav1.Status

    _, _, err := serializer.Decode(body, nil, & status)

    if err != nil {

    return nil, err

    }

    return & status, nil

    }

    func getJSONSerializer() runtime.Serializer {

    scheme := runtime.NewScheme()

    scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "",

    Version: "v1",

    },

    &corev1.Pod{},

    &metav1.Status{},

    )

    return json.NewSerializerWithOptions(

    json.SimpleMetaFactory{},

    nil,

    scheme,

    json.SerializerOptions{},

    )

    }

    ```


    ## Conclusion


    In this chapter, you have discovered a first library to work with Kubernetes in
    Go—the API Library. It is essentially a collection of Go structures to declare
    Kubernetes resources. The chapter also has explored the definition of the metadata
    fields common to all resources, defined in the API Machinery Library.


    At the end of the chapter, there is an example of a program for building a `Pod`
    definition using the API Library and then creating this `Pod` in the cluster by
    calling the API Server using an HTTP request.


    The next chapters explores other fundamental libraries—the API Machinery and the
    Client-go—with which you will no longer need to build HTTP requests.


    # 4. Using Common Types


    The previous chapter describes how to define a Kubernetes resource using Go structures.
    Particularly, it explains the content of packages of the Kubernetes API Library,
    and the common fields of every resource associated with a Kubernetes `Kind`.


    This chapter examines common types that can be used in various places when defining
    Kubernetes resources.


    ## Pointers


    Optional values in Go structures generally are declared as a pointer to a value.
    Thus, if you do not want to specify the optional value, you just need to keep
    it as a `nil` pointer, and if you need to specify a value, you have to create
    the value and pass its reference.


    The `pointer` package of the `Kubernetes Utils` library defines utility functions
    to declare such optional values.


    ```

    import (

    "k8s.io/utils/pointer"

    )

