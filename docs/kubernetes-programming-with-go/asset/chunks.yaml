- fmt: '# Working with Custom Resources


    In the previous chapter, you have seen how to declare a new custom resource to
    be served by the Kubernetes API using `CustomResourceDefinition` resources, and
    how to create new instances of this custom resource using `kubectl`. But for the
    moment, you do not have any Go library that allows you to work with instances
    of custom resources.


    This chapter explores the various possibilities to work with custom resources
    in Go:


    - Generating code for a dedicated Clientset for the custom resource.

    - Using the `unstructured` package of the API Machinery Library and the `dynamic`
    package of the Client-go Library.


    ## Generating a Clientset


    The repository [`https://github.com/kubernetes/code-generator`](https://github.com/kubernetes/code-generator)
    contains the Go code generators. Chapter [3](#533908_1_En_3_Chapter.xhtml)’s “Content
    of a Package” section contains a very quick overview of these generators, where
    the content of the API Library was explored.


    To use these generators, you will need to first write the Go structures for the
    kinds defined by the custom resource. In this example, you will write structures
    for the `MyResource` and `MyResourceList` kinds.


    To stick with the organization found in the API Library, you will write these
    types in a `types.go` file, placed in the directory `pkg/apis/<group>/<version>/`.


    Likewise, to work correctly with the generators, the root directory of your project
    must be in a directory named after the Go package after the Go package of your
    project. For example, if the package of the project is `github.com/myid/myproject`
    (defined in the first line of the project’s `go.mod` file), the root directory
    of the project must be in the directory `github.com/myid/myproject/`.


    As an example, let’s start a new project. You can execute these commands from
    the directory of your choice, generally a directory containing all your Go projects.


    ```

    $ mkdir -p github.com/myid/myresource-crd

    $ cd github.com/myid/myresource-crd

    $ go mod init github.com/myid/myresource-crd

    $ mkdir -p pkg/apis/mygroup.example.com/v1alpha1/

    $ cd pkg/apis/mygroup.example.com/v1alpha1/

    ```


    Then, in this directory, you can create the `types.go` file that contains the
    definitions of the structures for the kinds. Here are the definitions of the structures
    that match the schema defined in the CRD in the previous chapter.


    ```

    package v1alpha1

    import (

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/apimachinery/pkg/util/intstr"

    )

    type MyResource struct {

    metav1.TypeMeta   `json:",inline"`

    metav1.ObjectMeta `json:"metadata,omitempty"`

    Spec MyResourceSpec `json:"spec"`

    }

    type MyResourceSpec struct {

    Image  string             `json:"image"`

    Memory resource.Quantity `json:"memory"`

    }

    type MyResourceList struct {

    metav1.TypeMeta `json:",inline"`

    metav1.ListMeta `json:"metadata,omitempty"`

    Items []MyResource `json:"items"`

    }

    ```


    Now, you need to run two generators:


    - `deepcopy-gen` – this will generate a `DeepCopyObject()` method for each Kind
    structure, which is needed for these types to implement the `runtime.Object` interface.

    - `client-gen` – this will generate the clientset for the group/version.


    ### Using `deepcopy-gen`


    #### Installing `deepcopy-gen`


    To install the `deepcopy-gen` executable, you can use the `go install` command:


    ```

    go install k8s.io/code-generator/cmd/deepcopy-gen@v0.24.4

    ```


    You can use either the `@latest` tag to use the latest revision of the Kubernetes
    code or select a specific version.


    #### Adding Annotations


    The `deepcopy-gen` generator needs annotations to work. It first needs the `//
    +k8s:deepcopy-gen=package` annotation to be defined at the package level. This
    annotation asks `deepcopy-gen` to generate `deepcopy` methods for *all* structures
    of the package.


    For this, you can create a `doc.go` file in the directory in which `types.go`
    resides, to add this annotation:


    ```

    // pkg/apis/mygroup.example.com/v1alpha1/doc.go

    // +k8s:deepcopy-gen=package

    package v1alpha1

    ```


    By default, `deepcopy-gen` will generate the `DeepCopy()` and `DeepCopyInto()`
    methods, but no `DeepCopyObject()`. For this, you need to add another annotation
    (`// +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object`) before
    each kind structure.


    ```

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    type MyResource struct {

    [...]

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    type MyResourceList struct {

    [...]

    ```


    #### Running `deepcopy-gen`


    The generator needs a file that contains the text (generally the license) added
    at the beginning of the generated files. For this, you can create an empty file
    (or with the content you prefer, do not forget that the text should be Go comments)
    named `hack/boilerplate.go.txt`.


    You need to run `go mod tidy` for the generator to work (or `go mod vendor` if
    you prefer to vendor Go dependencies). Finally, you can run the `deepcopy-gen`
    command, which will generate a file `pkg/apis/mygroup.example.com/v1alpha1/zz_generated.deepcopy.go`:


    ```

    $ go mod tidy

    $ deepcopy-gen --input-dirs github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1

    -O zz_generated.deepcopy

    --output-base ../../..

    --go-header-file ./hack/boilerplate.go.txt

    ```


    Note the `"../../.."` as output-base. It will place the output base in the directory
    from which you created the directory for the project:


    `$ mkdir -p github.com/myid/myresource-crd`


    You will need to adapt this to the number of subdirectories you created if different
    from the three.


    At this point, you should have the following file structure for your project:


    ```

    ├── go.mod

    ├── hack

    │   └── boilerplate.go.txt

    ├── pkg

    │   └── apis

    │       └── mygroup.example.com

    │           └── v1alpha1

    │               ├── doc.go

    │               ├── types.go

    │               └── zz_generated.deepcopy.go

    ```


    ### Using `client-gen`


    #### Installing `client-go`


    To install the `client-gen` executable, you can use the `go install` command:


    ```

    go install k8s.io/code-generator/cmd/client-gen@v0.24.4

    ```


    You can use either the `@latest` tag to use the latest revision of the Kubernetes
    code or select a specific version if you want to run the command in a reproducible
    way.


    #### Adding Annotations


    You need to add annotations to the structures, defined in the `types.go` file,
    to indicate for which types you want to define a Clientset. The annotation to
    use is `// +genclient`.


    - `// +genclient` (with no option) will ask `client-gen` to generate a Clientset
    for a namespaced resource.

    - `// +genclient:nonNamespaced` will generate a Clientset for a non-namespaced
    resource.

    - `+genclient:onlyVerbs=create,get` will generate these verbs only, instead of
    generating all verbs by default.

    - `+genclient:skipVerbs=watch` will generate all verbs except these ones, instead
    of all verbs by default.

    - `+genclient:noStatus` – if a `Status` field is present in the annotated structure,
    an `updateStatus` function will be generated. With this option, you can disable
    the generation of the `updateStatus` function (note that it is not necessary if
    the `Status` field does not exist).


    The custom resource you are creating is namespaced so you can use the annotation
    without an option:


    ```

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    // +genclient

    type MyResource struct {

    [...]

    ```'
