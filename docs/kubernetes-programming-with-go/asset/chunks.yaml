    # 列出资源


    `List` 方法用于列出特定类型的资源。


    ```

    List(

    ctx context.Context,

    list ObjectList,

    opts ...ListOption,

    ) error

    ```


    `list` 参数是一个 `ObjectList` 类型的值，用于指示要列出的资源的*种类*并存储结果。默认情况下，列表操作将跨所有命名空间进行。


    `List` 方法接受零个或多个实现了 `ListOption` 接口的对象参数。支持以下这些类型：


    *   `InNamespace`，`string` 的别名，用于返回特定命名空间的资源。


    *   `MatchingLabels`，`map[string]string` 的别名，用于指定为返回资源而必须精确匹配的标签列表及其值。以下示例构建了一个
    `MatchingLabels` 结构，用于过滤带有标签 `app=myapp` 的资源。


    *   `HasLabels`，`[]string` 的别名，用于指定为返回资源而必须存在的标签列表，不考虑其值。以下示例构建了一个 `HasLabels`
    结构，用于过滤带有 `app` 和 `debug` 标签的资源。


    ```

    matchLabel := client.MatchingLabels{

    "app": "myapp",

    }

    ```


    *   `MatchingLabelsSelector`，内嵌了 `labels.Selector` 接口，用于传递更高级的标签选择器。关于如何构建 `Selector`
    的更多信息，请参阅第 6 章中的“过滤列表结果”一节。以下示例构建了一个 `MatchingLabelsSelector` 结构，该结构可作为 `List`
    的选项，用于过滤那些标签 `mykey` 不等于 `ignore` 的资源。


    ```

    hasLabels := client.HasLabels{"app", "debug"}

    ```


    *   `MatchingFields`，`fields.Set` 的别名（其本身是 `map[string]string` 的别名），用于指定要匹配的字段及其值。以下示例构建了一个
    `MatchingFields` 结构，用于过滤字段 `status.phase` 为 `Running` 的资源：


    ```

    selector := labels.NewSelector()

    require, err := labels.NewRequirement(

    "mykey",

    selection.NotEquals,

    []string{"ignore"},

    )

    // 断言 err 为 nil

    selector = selector.Add(*require)

    labSelOption := client.MatchingLabelsSelector{

    Selector: selector,

    }

    ```


    *   `MatchingFieldsSelector`，内嵌了 `fields.Selector`，用于传递更高级的字段选择器。关于如何构建 `fields.Selector`
    的更多信息，请参阅第 6 章中的“过滤列表结果”一节。以下示例构建了一个 `MatchingFieldsSelector` 结构，用于过滤字段 `status.phase`
    不等于 `Running` 的资源：


    ```

    matchFields := client.MatchingFields{

    "status.phase": "Running",

    }

    ```


    *   `Limit`，`int64` 的别名，和 `Continue`，`string` 的别名，用于对结果进行分页。这些选项在第 2 章的“对结果进行分页”一节中有详细说明。


    ```

    fieldSel := fields.OneTermNotEqualSelector(

    "status.phase",

    "Running",

    )

    fieldSelector := client.MatchingFieldsSelector{

    Selector: fieldSel,

    }

    ```


    ## 创建资源


    `Create` 方法用于在集群中创建新资源。


    ```

    Create(

    ctx context.Context,

    obj Object,

    opts ...CreateOption,

    ) error

    ```


    作为参数传递的 `obj` 定义了要创建对象的种类及其定义。以下示例将在集群中创建一个 Pod：


    ```

    podToCreate := corev1.Pod{ [...] }

    podToCreate.SetName("nginx")

    podToCreate.SetNamespace("default")

    err = a.client.Create(ctx, &podToCreate)

    ```


    以下选项可以作为 `CreateOption` 传递，以参数化 `Create` 请求。


    *   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。


    *   `FieldOwner`，`string` 的别名，表示 `Create` 操作的字段管理器名称。此信息对于服务器端应用操作的正确工作很有用。


    ## 删除资源


    `Delete` 方法用于从集群中删除资源。


    ```

    Delete(

    ctx context.Context,

    obj Object,

    opts ...DeleteOption,

    ) error

    ```


    作为参数传递的 `obj` 定义了要删除的对象的种类，以及其命名空间（如果资源是命名空间范围的）和名称。以下示例可用于删除一个 Pod。


    ```

    podToDelete := corev1.Pod{}

    podToDelete.SetName("nginx")

    podToDelete.SetNamespace("prj2")

    err = a.client.Delete(ctx, &podToDelete)

    ```


    以下选项可以作为 `DeleteOption` 传递，以参数化 `Delete` 请求。


    *   `DryRunAll` – 此值表示应执行所有操作，但将资源持久化到存储的操作除外。


    *   `GracePeriodSeconds`，`int64` 的别名 – 此值仅在删除 Pod 时有用。它表示在 Pod 被删除之前的持续时间（以秒为单位）。详见第
    6 章中的“删除资源”一节。


    *   `Preconditions`，`metav1.Preconditions` 的别名 – 它指示你期望删除哪个资源。详见第 6 章中的“删除资源”一节。


    *   `PropagationPolicy`，`metav1.DeletionPropagation` 的别名 – 它指示是否以及如何执行垃圾回收。详见第
    6 章中的“删除资源”一节。


    ## 删除资源集合


    `DeleteAllOf` 方法用于从集群中删除指定类型的所有资源。


    ```

    DeleteAllOf(

    ctx context.Context,

    obj Object,

    opts ...DeleteAllOfOption,

    ) error

    ```


    作为参数传递的 `obj` 定义了要删除对象的种类。


    `DeleteAllOf` 操作可用的 `opts` 是 `List` 操作（参见“列出资源”一节）和 `Delete` 操作（参见“删除资源”一节）的选项组合。


    例如，以下是如何删除给定命名空间中的所有部署：


    ```

    err = a.client.DeleteAllOf(

    ctx,

    &appsv1.Deployment{},

    client.InNamespace(aNamespace))

    ```


    ## 更新资源


    `Update` 方法用于更新集群中已有的资源。


    ```

    Update(

    ctx context.Context,

    obj Object,

    opts ...UpdateOption,

    ) error

    ```


    `obj` 参数用于指示要更新的资源及其新定义。如果该对象在集群中不存在，则 `Update` 操作会失败。


    以下选项可以作为 `UpdateOption` 传递，以参数化 `Update` 请求。


    *   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。


    *   `FieldOwner`，`string` 的别名，表示 `Update` 操作的字段管理器名称。此信息对于服务器端应用操作的正确工作很有用。


    ## 修补资源


    `Patch` 方法用于修补现有资源。它也可以用于运行服务器端应用操作。


    ```

    Patch(

    ctx context.Context,

    obj Object,

    patch Patch,

    opts ...PatchOption,

    ) error

    ```


    以下选项可以作为 `PatchOption` 传递，以参数化 `Patch` 请求。


    *   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。


    *   `FieldOwner`，`string` 的别名，表示 `Patch` 操作的字段管理器名称。


    *   `ForceOwnership`，`struct{}` 的别名，表示调用者将重新获取其他管理器拥有的冲突字段。此选项仅在补丁类型为 `Apply`
    时有效（参见下文）。

    '
- fmt: '### Server-side Apply


    To use a Server-side Apply operation, you need to specify a `patch` value of `client.Apply`.
    The `obj` value must be the new object definition. It must include its name, namespace
    (if the resource is namespaced), group, version, and kind.


    The name of the field manager is required and must be specified with the option
    `client.FieldOwner(name)`. As an example, here is how to Server-side Apply a Deployment:


    ```

    deployToApply := appsv1.Deployment{ [...] }

    deployToApply.SetName("nginx")

    deployToApply.SetNamespace("default")

    deployToApply.SetGroupVersionKind(

    appsv1.SchemeGroupVersion.WithKind("Deployment"),

    )

    err = a.client.Patch(

    ctx,

    &deployToApply,

    client.Apply,

    client.FieldOwner("mycontroller"),

    client.ForceOwnership,

    )

    ```


    ### Strategic Merge Patch


    You have seen in Chapter [2](#533908_1_En_2_Chapter.xhtml)''s "Using a Strategic
    Merge Patch to Update a Resource" section how patching a resource with a strategic
    merge patch works. Chapter [6](#533908_1_En_6_Chapter.xhtml)''s "Using a Strategic
    Merge Patch to Update a Resource" section has shown how to execute this operation
    using the `Client-go` Library.


    Using `Client-go`, you must first read a resource from the cluster (with a `Get`
    or `List` operation), then create a Patch using the `StrategicMergeFrom` function
    on this resource, then update the resource, and finally call the `Data` method
    on the patch to compute the JSON patch data.


    Using the `controller-runtime` client, some part of the process is done by the
    client. You still must read the resource from the cluster (with a `Get` or `List`
    operation), create a Patch using the `StrategicMergeFrom` function, then update
    the resource. At this point, you can call the `Patch` method with the updated
    object and the patch as parameters. The call to the `Data` method will be done
    internally by the client.


    Note that the `StrategicMergeFrom` function used here is the same as the one used
    with the `Client-go` Library. You can refer to Chapter [6](#533908_1_En_6_Chapter.xhtml)''s
    "Using a Strategic Merge Patch to Update a Resource" section to see the available
    options for this method.


    As an example, here is how to add an environment variable to the first container
    of a Deployment''s `Pod` template.


    - ❶ Get the deployment to patch from the cluster

    - ❷ Create a `Patch` object from a copy of this deployment

    - ❸ Modify the deployment

    - ❹ Execute `Patch`, using the modified deployment and the `Patch` object


    ```

    var deploymentRead appsv1.Deployment

    err = a.client.Get(                                                ❶

    ctx,

    key, // an ObjectKey defining the namespace and name

    &deploymentRead)

    if err != nil {

    return reconcile.Result{}, err

    }

    patch :=

    client.StrategicMergeFrom(deploymentRead.DeepCopy())      ❷

    depModified := deploymentRead.DeepCopy()

    depModified.Spec.Template.Spec.Containers[0].Env =      ❸

    append(

    depModified.Spec.Template.Spec.Containers[0].Env,

    corev1.EnvVar{

    Name:  "newName",

    Value: "newValue",

    })

    err = a.client.Patch(ctx, &depModified, patch)            ❹

    ```


    ### Merge Patch


    A Merge Patch works in a similar way to a Strategic Merge Patch, except for how
    the lists are merged. See Chapter [2](#533908_1_En_2_Chapter.xhtml)''s "Patching
    Array Fields" section for more information on how lists are merged using a Strategic
    Merge Patch. For Merge Patch, the original lists are not considered, and the new
    list is the list defined in the patch.


    Using the `controller-runtime` Library, you just need to replace the call to `client.StrategicMergeFrom`
    with a call to `client.MergeFrom` at step ❷ in the listing to indicate performance
    of a Merge Patch.


    ```

    patch := client.MergeFrom(deploymentRead.DeepCopy())      ❷

    ```


    ## Updating the Status of a Resource


    When working on an Operator, you will want to modify values into the Status part
    of the Custom Resource, to indicate the current state of it.


    ```

    Update(

    ctx context.Context,

    obj Object,

    opts ...UpdateOption,

    ) error

    ```


    Note that you do not need specific `Create`, `Get`, or `Delete` operations for
    the Status because you will create the Status as part of the Custom Resource when
    you create the Custom Resource itself. Also, the `Get` operation for a resource
    will return the Status part of the resource and deleting a resource will delete
    its status part.


    The API Server, however, forces you to use different `Update` methods for the
    Status and for the rest of the resource to protect you from modifying both parts
    at the same time by mistake.


    For the Update of the status to work, the Custom Resource Definition must declare
    the `status` field in the list of sub-resources of the Custom Resource. See Chapter
    [8](#533908_1_En_8_Chapter.xhtml)''s "Definition of the Resource Versions" section
    to understand how to declare this `status` sub-resource.


    This method works like the `Update` method for the resource itself, but to invoke
    it, you need to call the method on the object returned by `client.Status()`:


    ```

    err = client.Status().Update(ctx, obj)

    ```


    ### Patching the Status of a Resource


    As for the `Update` method, patching the status of a resource needs a dedicated
    method on the result of `client.Status()`.


    ```

    Patch(

    ctx context.Context,

    obj Object,

    patch Patch,

    opts ...PatchOption,

    ) error

    ```


    The `Patch` method for the Status works the same as the `Patch` method for the
    resource itself, except that it will patch the Status part of the resource only.


    ```

    err = client.Status().Patch(ctx, obj, patch)

    ```


    ## Logging


    The Manager leverages a logger system defined in the log package of the `controller-runtime`
    Library. The logger must be initialized with a call to `SetLogger`. Then, it is
    possible to use the `Log` variable defined into the log package.


    ```

    import (

    crlog "sigs.k8s.io/controller-runtime/pkg/log"

    "sigs.k8s.io/controller-runtime/pkg/log/zap"

    )

    func main() {

    log.SetLogger(zap.New())

    log.Log.Info("starting")

    [...]

    }

    ```


    The `Log` object, of type `logr.Logger` (from `github.com/go-logr/logr`), has
    two main methods, `Info` and `Error`.


    ```

    func (l Logger) Info(

    msg string,

    keysAndValues ...interface{},

    )

    func (l Logger) Error(

    err error,

    msg string,

    keysAndValues ...interface{},

    )

    ```


    The `Logger` is a "structured" logging system, in that logs are mostly made of
    key-value pairs rather than `printf`-style formatted strings. Whereas `printf`-style
    logs are easier to read by humans, structured logs are easier to analyze by tools.
    The predefined keys for log entries are:


    - `level`: the verbosity level of the log; see the following section for a definition
    of log verbosity

    - `ts`: timestamp of the log entry

    - `logger`: name of the logger for this entry; see the section that follows for
    a definition of the name of the logger

    - `msg`: message associated with the log entry

    - `error`: the error associated with the log entry


    The `Info` and `Error` methods accept a message and zero or more key-value pairs.
    The `Error` method also accepts an error value.


    ### Verbosity


    The Info messages can be given a Verbosity by using `log.V(n).Info(...)`. The
    larger is the `n` verbosity, the less important is the message. `log.Info(...)`
    is equivalent to `log.V(0).Info(...)`.


    ### Predefined Values


    You can build a new logger with predefined key-value pairs by using `WithValues`:


    ```

    func (l Logger) WithValues(

    keysAndValues ...interface{},

    ) Logger

    ctrlLog := log.Log.WithValues("package", "controller")

    ```


    ### Logger Name


    You can build a new logger by appending a name to the logger name by using `WithName`:


    ```

    func (l Logger) WithName(name string) Logger

    ```


    Successive calls to `WithName` will add suffixes to the logger name. For example,
    the following will set a logger name `controller.main`:


    ```

    ctrlLog := log.Log.WithName("controller")

    [...]

    ctrlMainLog = ctrlLog.Log.WithName("main")

    ```'
