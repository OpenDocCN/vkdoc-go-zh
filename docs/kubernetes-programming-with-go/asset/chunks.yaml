- fmt: "# Creating a Resource\n\nTo create a new resource in the cluster, you first\
    \ need to declare this resource in memory using the dedicated `Kind` structure,\
    \ then use the `Create` method for the resource you want to create. For example,\
    \ use the following to create a `Pod` named `nginx-pod` in the `project1` namespace:\n\
    \n```\nwantedPod := corev1.Pod{\nSpec: corev1.PodSpec{\nContainers: []corev1.Container{\n\
    {\nName:  \"nginx\",\nImage: \"nginx\",\n},\n},\n},\n}\nwantedPod.SetName(\"nginx-pod\"\
    )\ncreatedPod, err := clientset.\nCoreV1().\nPods(\"project1\").\nCreate(ctx,\
    \ &wantedPod, v1.CreateOptions{})\n```\n\nThe various options used to declare\
    \ the `CreateOptions` structure, when creating a resource, are:\n\n*   `DryRun`\
    \ – this indicates which operations on the API server-side should be executed.\
    \ The only available value is `metav1.DryRunAll`, indicating execution of all\
    \ the operations except persisting the resource to storage.\n*   Using this option,\
    \ you can get, as result of the command, the exact object that would have been\
    \ created in the cluster without really creating it, and check whether an error\
    \ would occur during this creation.\n*   `FieldManager` – this indicates the name\
    \ of the field manager for this operation. This information will be used for future\
    \ server-side Apply operations.\n*   `FieldValidation` – this indicates how the\
    \ server should react when duplicate or unknown fields are present in the structure.\
    \ The following are the possible values:\n    *   `metav1.FieldValidationIgnore`\
    \ to ignore all duplicate or unknown fields\n    *   `metav1.FieldValidationWarn`\
    \ to warn when duplicate or unknown fields are present\n    *   `metav1.FieldValidationStrict`\
    \ to fail when duplicate or unknown fields are present\n*   Note that using this\
    \ method, you will not be able to define duplicate or unknown fields because you\
    \ are using a structure to define the object.\n\nIn case of error, you can test\
    \ its type with the functions defined in the package `k8s.io/apimachinery/pkg/api/errors`.\
    \ All the possible errors are defined in section “Errors and Statuses”, and here\
    \ are the possible errors specific to the `Create` operation:\n\n*   `IsAlreadyExists`\
    \ – this function indicates whether the request failed because a resource with\
    \ the same name already exists in the cluster\n*   `IsNotFound` – this function\
    \ indicates whether the namespace you specified in the request does not exist.\n\
    *   `IsInvalid` – this function indicates whether the data passed into the structure\
    \ is invalid.\n\n```\nif errors.IsAlreadyExists(err) {\n// ...\n}\n```\n\n# Getting\
    \ Information About a Resource\n\nTo get information about a specific resource\
    \ in the cluster, you can use the `Get` method for the resource you want to get\
    \ information from. For example, to get information about the `pod` named `nginx-pod`\
    \ in the `project1` namespace:\n\n```\npod, err := clientset.\nCoreV1().\nPods(\"\
    project1\").\nGet(ctx, \"nginx-pod\", metav1.GetOptions{})\n```\n\nThe various\
    \ options to declare it into the `GetOptions` structure, when getting information\
    \ about a resource are:\n\n*   `ResourceVersion` – to request a version of the\
    \ resource not older than the specified version.\n*   If `ResourceVersion` is\
    \ “0”, indicates to return any version of the resource. You will generally receive\
    \ the latest version of the resource, but this is not guaranteed; receiving an\
    \ older version can happen on high availability clusters due to partitioning or\
    \ stale cache.\n*   If the option is not set, you are guaranteed to receive the\
    \ most recent version of the resource.\n\nThe possible error specific to the `Get`\
    \ operation is:\n\n*   `IsNotFound` – this function indicates that the namespace\
    \ you specified in the request does not exist, or that the resource with the specified\
    \ name does not exist.\n\n# Getting List of Resources\n\nTo get a list of resources\
    \ in the cluster, you can use the `List` method for the resource you want to list.\
    \ For example, use the following to list the pods in the `project1` namespace:\n\
    \n```\npodList, err := clientset.\nCoreV1().\nPods(\"project1\").\nList(ctx, metav1.ListOptions{})\n\
    ```\n\nOr, to get the list of pods in all namespaces, use:\n\n```\npodList, err\
    \ := clientset.\nCoreV1().\nPods(\"\").\nList(ctx, metav1.ListOptions{})\n```\n\
    \nThe various options to declare into the `ListOptions` structure, when listing\
    \ resources are the following:\n\n*   `LabelSelector, FieldSelector` – this is\
    \ used to filter the list by label or by field. These options are detailed in\
    \ the “Filtering the Result of a List” section.\n*   `Watch, AllowWatchBookmarks`\
    \ – this is used to run a Watch operation. These options are detailed in the “Watching\
    \ Resources” section.\n*   `ResourceVersion, ResourceVersionMatch` – this indicates\
    \ which version of the List of resources you want to obtain.\n*   Note that, when\
    \ receiving a response of a `List` operation, a `ResourceVersion` value is indicated\
    \ for the List element itself, as well as `ResourceVersion` values for each element\
    \ of the list. The `ResourceVersion` to indicate in the Options refers to the\
    \ `ResourceVersion` of the List.\n*   For a `List` operation without pagination\
    \ (you can refer to the “Paginating Results” and “Watching Resources” sections\
    \ for the behavior of these options in other circumstances):\n    *   When `ResourceVersionMatch`\
    \ is not set, the behavior is the same as for a `Get` operation:\n        *  \
    \ `ResourceVersion` indicates that you should return a list that is not older\
    \ than the specified version.\n        *   If `ResourceVersion` is “0,” this indicates\
    \ that it is necessary to return to any version of the list. You generally will\
    \ receive the latest version of it, but this is not guaranteed; receiving an older\
    \ version can happen on high-availability clusters because of a partitioning or\
    \ a stale cache.\n        *   If the option is not set, you are guaranteed to\
    \ receive the most recent version of the list.\n    *   When `ResourceVersionMatch`\
    \ is set to `metav1.ResourceVersionMatchExact`, the `ResourceVersion` value indicates\
    \ the exact version of the list you want to obtain.\n        *   Setting `ResourceVersion`\
    \ to “0,” or not defining it, is invalid.\n    *   When `ResourceVersionMatch`\
    \ is set to `metav1.ResourceVersionMatchNotOlderThan`, `ResourceVersion` indicates\
    \ you will obtain a list that is not older than the specified version.\n     \
    \   *   If `ResourceVersion` is “0,” this indicates a return any version of the\
    \ list. You generally will receive the latest version of the list, but this is\
    \ not guaranteed; receiving an older version can happen on high-availability clusters\
    \ because of a partitioning or a stale cache.\n        *   Not defining `ResourceVersion`\
    \ is invalid.\n*   `TimeoutSeconds` – this limits the duration of the request\
    \ to the indicated number of seconds.\n*   `Limit, Continue` – this is used for\
    \ paginating the result of the list. These options are detailed in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Paginating Results” section.\n\nThe following are the possible errors specific\
    \ to the `List` operation:\n\n*   `IsResourceExpired` – this function indicates\
    \ that the specified `ResourceVersion` with a `ResourceVersionMatch`, set to `metav1.ResourceVersionMatchExact`,\
    \ is expired.\n\nNote that, if you specify a nonexisting namespace for a `List`\
    \ operation, you will not receive a `NotFound` error.\n\n# Filtering the Result\
    \ of a List\n\nAs described in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s “Filtering\
    \ the Result of a List” section, it is possible to filter the result of a `List`\
    \ operation with labels selectors and field selectors. This section shows how\
    \ to use the `fields` and `labels` packages of the API Machinery Library to create\
    \ a string applicable to the `LabelSelector` and `FieldSelector` options."
