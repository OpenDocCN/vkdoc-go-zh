    quantities of resources to allocate (i.e., memory, cpu, etc.). The smallest value
    the **Quantity** can represent is one nano (10^(−9)).


    Internally, a **Quantity** is represented either by an **Integer** (on 64 bits)
    and a **Scale**, or, if the **int64** is not large enough to support it, by an
    **inf.Dec** value (as defined by the package at [`https://github.com/go-inf/inf`](https://github.com/go-inf/inf)).


    ```

    import (

    "k8s.io/apimachinery/pkg/api/resource"

    )

    ```


    ### Parsing a String as Quantity


    A first way to define a **Quantity** is to parse its value from a string by using
    one of the following functions:


    *   `func MustParse(str string) Quantity` – parses a quantity from the `string`,
    or panics if the string does not represent a quantity. It is to be used when you
    are applying a hard-coded value that you know is valid.


    *   `func ParseQuantity(str string) (Quantity, error)` – parses a quantity from
    the `string` or return an error if the string does not represent a quantity. It
    is to be used when you are not sure the value is valid.


    The **Quantity** can be written using a sign, a digit number, and a suffix. The
    sign and suffix are optional. The suffix can be either a binary, a decimal, or
    a decimal exponent.


    The defined binary suffixes are Ki (2^(10)), Mi (2^(20)), Gi (2^(30)), Ti (2^(40)),
    Pi (2^(50)), and Ei (2^(60)). The defined decimal suffixes are n (10^(−9)), u
    (10^(−6)), m (10^(−3)), "" (10⁰), k (10³), M (10⁶), G (10⁹), T(10^(12)), P(10^(15)),
    and E(10^(18)). The decimal exponent suffix is written with an **e** or **E**
    sign followed by the decimal exponent—for example, **E2** to represent 10².


    The suffix format (either binary, decimal, or exponent decimal) is saved in the
    **Quantity** and is used when serializing the quantity.


    Using these functions, the way the **Quantity** is represented internally (either
    a scaled integer or an **inf.Dec**) will be decided depending on whether the parsed
    value can be represented as a scaled integer or not.


    ### Using an inf.Dec as a Quantity


    Use the following to use an **inf.Dec** as a **Quantity**:


    *   `func NewDecimalQuantity(b inf.Dec, format Format) *Quantity` – declares a
    **Quantity** by giving an **inf.Dec** value, and by indicating with which suffix
    format you want it to be serialized.


    *   `func (q *Quantity) ToDec() *Quantity` – forces a **Quantity**—previously
    defined by parsing a string or using a new function to initialize it—to be stored
    as an **inf.Dec**.


    *   `func (q *Quantity) AsDec() *inf.Dec` – gets a representation of the **Quantity**
    as **inf.Dec** without modifying the internal representation.


    ### Using a Scaled Integer as a Quantity


    Use the following to use a scaled integer as a **Quantity**:


    *   `func NewScaledQuantity(value int64, scale Scale) *Quantity` – declares a
    **Quantity** by giving an `int64` value and a scale. The format of the suffix
    will be the decimal format.


    *   `func (q *Quantity) SetScaled(value int64, scale Scale)` – overrides a **Quantity**
    value with a scaled integer. The format of the suffix will remain unchanged.


    *   `func (q *Quantity) ScaledValue(scale Scale) int64` – gets a representation
    of the **Quantity** as an integer, considering the given scale, without modifying
    the internal representation.


    *   `func NewQuantity(value int64, format Format) *Quantity` – declares a **Quantity**
    by giving an `int64` value, the scale being fixed to **0**, and a suffix format
    is to be used during serialization.


    *   `func (q *Quantity) Set(value int64)` – overrides a **Quantity** value with
    an integer and a scale fixed to **0**. The format of the suffix will remain unchanged.


    *   `func (q *Quantity) Value() int64` – gets a representation of the **Quantity**
    as an integer with a scale to **0**, without modifying the internal representation.


    *   `func NewMilliQuantity(value int64, format Format) *Quantity` – declares a
    **Quantity** by giving an `int64` value, the scale being fixed to **−3** and a
    suffix format to be used during serialization.


    *   `func (q *Quantity) SetMilli(value int64)` – overrides a **Quantity** value
    with an integer and a scale fixed to **−3**. The format of the suffix will remain
    unchanged.


    *   `func (q *Quantity) MilliValue() int64` – gets a representation of the **Quantity**
    as an integer with a scale to **−3** without modifying the internal representation.


    ### Operations on Quantities


    The following are the ways to make operations on the **Quantity**:


    *   `func (q *Quantity) Add(y Quantity)` – adds the **y** Quantity to the **q**
    Quantity.


    *   `func (q *Quantity) Sub(y Quantity)` – subtracts the **y** Quantity from the
    **q** Quantity.


    *   `func (q *Quantity) Cmp(y Quantity) int` – compares the **q** and **y** quantities.
    Return **0** if both quantities are equal, **1** if **q** is greater than **y**,
    and **−1** if **q** is less than **y**.


    *   `func (q *Quantity) CmpInt64(y int64) int` – compares **q** Quantity with
    the **y** integer. Return **0** if both quantities are equal, **1** if **q** is
    greater than **y**, and **−1** if **q** is less than **y**.


    *   `func (q *Quantity) Neg()` – makes **q** the negative value of itself.


    *   `func (q Quantity) Equal(v Quantity) bool` – tests to see whether **q** and
    **v** quantities are equal.'
