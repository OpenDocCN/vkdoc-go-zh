  trans: "\n# 以表格形式获取结果\n\n你在第 2 章的“以表格形式获取结果”一节中已经看到，可以将`List`请求的结果以列和行的列表形式获取，从而以表格形式展示信息。为此，你需要执行一个`List`操作并指定一个特定的`Accept`头。\n\
    \n以下是使用`RESTClient`以表格形式列出`project1`命名空间下 Pod 的代码：\n\n- ➊ 获取`core/v1`组的`RESTClient`\n\
    - ➋ 指定要列出资源的命名空间（此处为`project1`）\n- ➌ 指定要列出的资源（此处为`pods`）\n- ➍ 设置所需的头信息以获取表格形式的结果\n\
    - ➎ 准备一个`metav1.Table`类型的变量来存储请求结果\n- ➏ 执行请求\n- ➐ 将结果存入`metav1.Table`对象\n- ➑ 遍历返回的列定义以显示表头\n\
    - ➒ 遍历返回的表格行以显示包含特定 Pod 信息的数据行\n- ➓ 遍历行中的单元格以显示它们\n\n```\nimport (\nmetav1 \"\
    k8s.io/apimachinery/pkg/apis/meta/v1\"\n)\nrestClient := clientset.CoreV1().RESTClient()\
    \ ➊\nreq := restClient.Get().\nNamespace(\"project1\").          ➋\nResource(\"\
    pods\").               ➌\nSetHeader(                    ➍\n\"Accept\",\nfmt.Sprintf(\n\
    \"application/json;as=Table;v=%s;g=%s\",\nmetav1.SchemeGroupVersion.Version,\n\
    metav1.GroupName\n))\nvar result metav1.Table          ➎\nerr = req.Do(ctx). \
    \              ➏\nInto(&result)               ➐\nif err != nil {\nreturn err\n\
    }\nfor _, colDef := range result.ColumnDefinitions {     ➑\n// 显示表头\n}\nfor _,\
    \ row := range result.Rows {          ➒\nfor _, cell := range row.Cells {    \
    \      ➓\n// 显示单元格\n}\n}\n```\n\n# 发现客户端\n\nKubernetes API 提供了用于发现 API 所提供的资源的端点。`kubectl`\
    \ 使用这些端点来显示 `kubectl api-resources` 命令的结果（图 6-1）。\n\n![](img/533908_1_En_6_Fig1_HTML.png)\n\
    \n一张屏幕截图展示了 kubectl API 资源列表。列标签分别为名称、短名称、API 版本、命名空间范围和种类。\n\n**图 6-1** `kubectl\
    \ api-resources`\n\n该客户端可以通过调用 `Clientset` 上的 `Discovery()` 方法获取（有关如何获取 `Clientset`\
    \ 的信息，请参见第 6 章的“获取 Clientset”小节），或使用 `discovery` 包提供的函数获取。\n\n```\nimport \"k8s.io/client-go/discovery\"\
    \n```\n\n所有这些函数都需要一个 `rest.Config` 作为参数。你可以在第 6 章的“连接到集群”小节中看到如何获取这样一个 `rest.Config`\
    \ 对象。\n\n- `NewDiscoveryClientForConfig(`  \n  `c *rest.Config,`  \n  `) (*DiscoveryClient,\
    \ error)`  \n  – 使用提供的 `rest.Config` 返回一个 `DiscoveryClient`\n- `NewDiscoveryClientForConfigOrDie(`\
    \  \n  `c *rest.Config,`  \n  `) *DiscoveryClient`  \n  – 与上一个类似，但在出错时会触发 panic，而不是返回错误。此函数可用于硬编码配置，我们希望断言其有效性。\n\
    - `NewDiscoveryClientForConfigAndClient(`  \n  `c *rest.Config,`  \n  `httpClient\
    \ *http.Client,`  \n  `) (*DiscoveryClient, error)`  \n  – 使用提供的 `rest.Config`\
    \ 和 `httpClient` 返回一个 `DiscoveryClient`。\n- 上一个函数 `NewDiscoveryClientForConfig`\
    \ 使用由 `rest.HTTPClientFor` 函数构建的默认 HTTP 客户端。如果你想在构建 `DiscoveryClient` 之前自定义 HTTP\
    \ 客户端，可以使用此函数代替。\n\n# RESTMapper\n\n你在第 5 章的“RESTMapper”一节中已经看到，API Machinery\
    \ 提供了 RESTMapper 的概念，用于在 REST 资源和 Kubernetes 种类之间进行映射。\n\nAPI Machinery 还提供了 RESTMapper\
    \ 的默认实现 `DefaultRESTMapper`，但需要手动添加组/版本/种类。\n\nClient-go 库提供了 RESTMapper 的几种实现，利用发现客户端来提供组/版本/种类和资源的列表。\n\
    \n## PriorityRESTMapper\n\n`PriorityRESTMapper` 借助发现客户端获取 Kubernetes API 提供的所有组，并处理可能属于特定组的多个版本以及每个组的首选版本，从而返回首选版本。\n\
    \n通过调用 `restmapper.NewDiscoveryRESTMapper` 函数可以获取 `restmapper.PriorityRESTMapper`\
    \ 对象：\n\n```\nimport \"k8s.io/client-go/restmapper\"\nfunc NewDiscoveryRESTMapper(\n\
    groupResources []*APIGroupResources,\n) meta.RESTMapper\n```\n\n`groupResources`\
    \ 参数可以使用 `restmapper.GetAPIGroupResources` 函数构建：\n\n```\nfunc GetAPIGroupResources(\n\
    cl discovery.DiscoveryInterface,\n) ([]*APIGroupResources, error)\n```\n\n以下是构建\
    \ `PriorityRESTMapper` 所需的代码：\n\n```\nimport \"k8s.io/client-go/restmapper\"\n\
    discoveryClient := clientset.Discovery()\napiGroupResources, err :=\nrestmapper.GetAPIGroupResources(\n\
    discoveryClient,\n)\nif err != nil {\nreturn err\n}\nrestMapper := restmapper.NewDiscoveryRESTMapper(\n\
    apiGroupResources,\n)\n```\n\n现在你可以使用第 5 章“RESTMapper”节中定义的 RESTMapper。\n\n##\
    \ DeferredDiscoveryRESTMapper\n\n`DeferredDiscoveryRESTMapper` 在内部使用 `PriorityRESTMapper`，但会等到第一个请求时才初始化\
    \ RESTMapper。\n\n```\nfunc NewDeferredDiscoveryRESTMapper(\ncl discovery.CachedDiscoveryInterface,\n\
    ) *DeferredDiscoveryRESTMapper\n```\n\n函数 `NewDeferredDiscoveryRESTMapper` 用于构建此类\
    \ RESTMapper，它接收一个实现了 `discovery.CachedDiscoveryInterface` 接口的对象，以获取缓存发现客户端。\n\
    \nClient-go 库提供了该接口的一个实现，由 `memory.NewMemCacheClient` 函数返回。\n\n```\nfunc NewMemCacheClient(\n\
    delegate discovery.DiscoveryInterface,\n) discovery.CachedDiscoveryInterface\n\
    ```\n\n以下是构建 `DeferredDiscoveryRESTMapper` 所需的代码：\n\n```\nimport \"k8s.io/client-go/restmapper\"\
    \ndiscoveryClient := clientset.Discovery()\ndefRestMapper :=\nrestmapper.NewDeferredDiscoveryRESTMapper(\n\
    memory.NewMemCacheClient(discoveryClient),\n)\n```\n\n现在你可以使用第 5 章“RESTMapper”节中定义的\
    \ RESTMapper。\n\n# 总结\n\n在本章中，你学习了如何连接到集群以及如何获取 `Clientset`。它是一个客户端集合，每个组-版本对应一个客户端，你可以使用它在资源上执行操作（获取、列出、创建等）。\n\
    \n你还学习了 REST 客户端（`Clientset` 内部使用），开发人员可以使用它来构建更具体的请求。最后，本章涵盖了发现客户端，用于以动态方式发现\
    \ Kubernetes API 提供的资源。\n\n下一章将介绍如何使用 Client-go 库提供的客户端伪造实现来测试使用该库编写的应用程序。\n"
- fmt: '# 7. Testing Applications Using Client-go


    The `Client-go` Library provides a number of clients that can act with the Kubernetes
    API.


    - The `kubernetes.Clientset` provides a set of clients, one for each group/version
    of the API, to execute Kubernetes operations on resources (Create, Update, Delete,
    etc.).

    - The `rest.RESTClient` provides a client to perform REST operations on resources
    (Get, Post, Delete, etc.).

    - The `discovery.DiscoveryClient` provides a client to discover the resources
    served by the API.


    All these clients implement interfaces that are defined by the Client-go Library:
    `kubernetes.Interface`, `rest.Interface`, and `discovery.DiscoveryInterface`.


    In addition, the Client-go Library provides *fake* implementations of these interfaces
    to help you write unit tests for your functions. These *fake* implementations
    are defined in `fake` packages, each located inside the directory of the *real*
    implementation: `kubernetes/fake`, `rest/fake`, and `discovery/fake`.


    The `testing` directory contains common tools that are used by *fake* clients—for
    example, an object tracker or a system to track invocations. You will learn about
    these tools during this chapter.


    To be able to test your functions using these clients, the functions need to define
    a parameter to pass the client implementation, and the type of the parameter must
    be the interface, not the concrete type. For example:


    ```go

    func CreatePod(

    ctx context.Context,

    clientset kubernetes.Interface,

    name string,

    namespace string,

    image string,

    ) (pod *corev1.Pod, error)

    ```


    This way, you will create the client outside of the function, and simply use any
    implementation inside the function.


    For the real code, you will create the client, as defined in Chapter 6. For the
    tests, you will substitute the client using the helper functions from the *fake*
    packages.


    ## Fake Clientset


    The following function is used to create a *fake* `Clientset`:


    ```go

    import "k8s.io/client-go/kubernetes/fake"

    func NewSimpleClientset(

    objects ...runtime.Object,

    ) *Clientset

    ```


    The *fake* `Clientset` is backed by an object tracker that processes *create*,
    *update*, and *delete* operations without any validation or mutation, and it returns
    the objects in response to *get* and *list* operations.


    You can pass as parameters a list of Kubernetes objects, which will be added to
    the Clientset''s object tracker. For example, use the following to create a *fake*
    `Clientset` and to call the `CreatePod` function defined earlier:


    ```go

    import "k8s.io/client-go/kubernetes/fake"

    clientset := fake.NewSimpleClientset()

    pod, err := CreatePod(

    context.Background(),

    clientset,

    aName,

    aNs,

    anImage,

    )

    ```


    During the test, after you call the function that is being tested (in this case,
    `CreatePod`), you have several ways to verify that the function has done what
    you expected. Let''s consider this implementation of the `CreatePod` function:


    ```go

    func CreatePod(

    ctx context.Context,

    clientset kubernetes.Interface,

    name string,

    namespace string,

    image string,

    ) (pod *corev1.Pod, err error) {

    podToCreate := corev1.Pod{

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: image,

    },

    },

    },

    }

    podToCreate.SetName(name)

    return clientset.CoreV1().

    Pods(namespace).

    Create(

    ctx,

    &podToCreate,

    metav1.CreateOptions{},

    )

    }

    ```


    ### Checking the Result of the Function


    When calling the `CreatePod` function with the *fake* `Clientset`, the actual
    Kubernetes API will not be called, the resource will not be generated in the `etcd`
    database, and no validation and mutation will be performed on the resource. Instead,
    the resource will be stored as-is in an in-memory storage, with only minimal transformation.


    In this example, the only transformation between the `podToCreate` passed to the
    `Create` function and the pod returned by the `Create` function is the namespace,
    which is passed through the call into the `Pods(namespace)` and is added to the
    returned `Pod`.


    To test that the value returned by the `CreatePod` function is what you expected,
    you can write the following test:


    ```go

    func TestCreatePod(t *testing.T) {

    var (

    name      = "a-name"

    namespace = "a-namespace"

    image     = "an-image"

    wantPod = &corev1.Pod{

    ObjectMeta: v1.ObjectMeta{

    Name:      "a-name",

    Namespace: "a-namespace",

    },

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: "an-image",

    },

    },

    },

    }

    )

    clientset := fake.NewSimpleClientset()

    gotPod, err := CreatePod(

    context.Background(),

    clientset,

    name,

    namespace,

    image,

    )

    if err != nil {

    t.Errorf("err = %v, want nil", err)

    }

    if !reflect.DeepEqual(gotPod, wantPod) {

    t.Errorf("CreatePod() = %v, want %v",

    gotPod,

    wantPod,

    )

    }

    }

    ```


    This test will assert that—given a name, a namespace, and an image—the result
    of the function will be `wantPod`, when no validation or mutation occurs in the
    `Pod`.


    It is not possible to use this test to understand what would happen with a *real*
    client because the result would be different—that is, the *real* client, and the
    underlying API, would mutate the object to add default values, and so on.'
