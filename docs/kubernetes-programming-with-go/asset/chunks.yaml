  trans: '

    ### 允许使用书签高效重启 `watch` 请求


    如前文所述，可以通过使用标签或字段选择器对资源子集执行 `watch` 会话。例如，以下请求将监视带有特定标签 `mylabel`（其值等于 `foo`）的
    Pod：


    ```

    $ curl "$HOST/api/v1/namespaces/project1/pods?labelSelector=mylabel==foo&watch=true"

    ```


    通过此请求，你将仅接收到与你选择器匹配的 Pod 的事件，而不会接收到同一命名空间中不匹配的其他 Pod 的事件。


    当重启 `watch` 请求时，你可以使用与选择器匹配的 Pod 的 `resourceVersion`；但是，在此 Pod 之后，其他 Pod 上可能发生了大量事件。在你基于此
    *旧的* `resourceVersion` 重启 `watch` 时，API 服务器必须过滤所有在此期间创建的事件。


    同样，由于 API 服务器仅在有限时间内缓存这些事件，与最新版本相比，旧的 `resourceVersion` 不可用的风险更高。


    为此，你可以使用 `allowWatchBookmarks` 参数，请求 API 服务器定期发送包含最新 `resourceVersion` 的 `BOOKMARK`
    事件；这些资源版本可能与你选择的范围无关。


    `BOOKMARK` 事件可能包含一个与你请求类型相同的对象（例如，如果你在监视 Pod，则包含 Pod 类型），但该对象仅包含 `resourceVersion`
    字段。


    ```

    {"type":"BOOKMARK",

    "object":{

    "kind":"Pod",

    "apiVersion":"v1",

    "metadata":{

    "resourceVersion":"2525115",

    "creationTimestamp":null

    },

    "spec":{

    "containers":null

    },

    "status":{}

    }

    }

    ```


    为了说明，这里有一个小实验。首先创建两个 Pod，并使用一个仅匹配第一个 Pod 的选择器来监视它们。你将收到一个匹配 Pod 的 `ADDED` 事件，稍后，你应该会收到一个
    `BOOKMARK` 事件（但无法保证）。如果在此期间命名空间的 Pod 没有任何活动，那么 `resourceVersion` 应该保持不变。


    ```

    $ kubectl run nginx1 --image nginx --labels mylabel=foo

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    $ curl "$HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo&watch=true&allowWatchBookmarks=true"

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "name":"nginx1","resourceVersion":"2520070", ...}, ...}}

    {"type":"BOOKMARK","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2520070", ...}, ...}}

    ```


    在另一个终端中，让我们使用以下命令删除不匹配的 Pod `nginx2`：


    ```

    $ kubectl delete pods nginx2

    ```


    你不应收到任何与此更改相关的事件，因为该 Pod 与请求选择器不匹配，但稍后，你应该会收到一个新的 `BOOKMARK` 事件——这次携带一个新的 `resourceVersion`：


    ```

    {"type":"BOOKMARK","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2532566", ...}, ...}}

    ```


    此时，你可以从第一个终端停止 `watch` 请求。


    接下来，你可以对命名空间中的 Pod 进行一些修改——例如，删除 `nginx1` Pod 并重新创建 `nginx2` Pod：


    ```

    $ kubectl delete pods nginx1

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    ```


    现在，你可以使用 `resourceVersion`（`2532566`）重启 `watch` 请求，从而在请求停止时继续：


    ```

    curl "$HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo&watch=true&allowWatchBookmarks=true&resourceVersion=2532566"

    ```


    结果显示，你将收到删除 `nginx1` Pod 时发送的关于其修改和删除的事件。你没有丢失任何事件，并且使用了最新的 `resourceVersion`，这对
    API 服务器来说效率更高。


    ### 分页结果


    当你执行 `list` 请求时，结果可能包含许多元素。在这种情况下，最好通过多次请求对结果进行分页，每个响应将发送有限数量的元素。


    针对这种情况，需要使用 `limit` 和 `continue` 查询参数。第一个 `list` 请求需要指定 `limit` 参数来指示返回的最大元素数量。响应将在
    `List` 结构体的元数据中包含一个 `continue` 字段，该字段包含一个不透明令牌，用于在下一个请求中获取下一个数据块。


    ```

    $ curl "$HOST/api/v1/pods?limit=1"

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2931316",

    "continue": "xxx",

    "remainingItemCount": 10

    },

    "items": [{ ... }]

    }

    $ curl "$HOST/api/v1/pods?limit=1&continue=xxx"

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2931316",

    "continue": "yyy",

    "remainingItemCount": 9

    },

    "items": [{ ... }]

    }

    ```


    请注意，你不必为每个数据块使用相同的 `limit` 值。你可以将第一个请求的 `limit` 设为 `1`，第二个请求设为 `4`，第三个请求设为 `6`。


    #### 完整列表的一致性


    请注意，在两个响应的 `List` 结构体中的 `resourceVersion` 是相同的（例如，示例中的 `"resourceVersion": "2931316"`）。当你运行第一个请求时，完整响应会在服务器上缓存，并且保证后续数据块的结果一致，无论你何时发出后续请求，以及在此期间资源是否被修改。在此期间创建、修改或删除的资源不会影响后续数据块的结果。


    尽管如此，缓存有可能在你完成所有请求之前过期。在这种情况下，你将收到一个错误响应，其中包含状态码 `410` 和一个新的 `continue` 值。因此，你有两个选择：


    1.  启动一个新的不带 `continue` 参数的 `List` 请求，从头开始完整的列表会话。

    2.  使用返回的 `continue` 值发起一个新请求，但这会导致结果不一致——即自返回第一个数据块以来被添加、修改或删除的资源将影响后续响应。


    #### 检测最后一个数据块


    从响应的元数据中可以看到，`remainingItemCount` 指示完成完整响应所剩余的元素数量。但请注意，此信息仅对不带选择器（*标签*或*字段*选择器）的请求可用。


    当执行不带选择器的分页 `List` 请求时，服务器能够知道完整列表中的元素数量，并且能够在每次请求后指示剩余元素的数量。当发送完整列表的最后元素时，服务器也能够通过回复
    `List` 结构体元数据中的空 `continue` 字段来指示这是最后一个数据块。


    当执行带选择器的分页 `List` 请求时，服务器无法预先知道完整列表中的元素数量。因此，它不会在请求后发送剩余元素的数量，并且即使下一个数据块为空，它也会发送一个非空的
    `continue` 值。


    你需要检查返回的列表是否为空，或者包含的元素是否少于 `limit` 字段中请求的数量，以便检测最后一个数据块。


    ## 以各种格式获取结果


    Kubernetes API 可以以多种格式返回数据。你可以通过在 HTTP 请求中指定 `Accept` 头来请求你希望接收的格式。

    '
- fmt: '### Getting Results as a Table


    The `kubectl` client (and other clients) displays lists of resources in a tabular
    format. When running a `List` request, you can ask the API Server to give you
    the necessary information to build this tabular representation by using the `Accept`
    header to indicate this specific format:


    ```

    $ curl $HOST/api/v1/pods

    -H ''Accept: application/json;as=Table;g=meta.k8s.io;v=v1''

    {

    "kind": "Table",

    "apiVersion": "meta.k8s.io/v1",

    "metadata": {

    "resourceVersion": "2995797"

    },

    "columnDefinitions": [ { ... }, { ... }, { ... } ],

    "rows": [ { ... }, { ... } ]

    }

    ```


    This helps clients display information in a tabular format for any resource, including
    custom resources, because a custom resource definition will contain information
    about which field of the resource to display in which column.


    The `kind` of the response will always be `Table` for any resource requested.
    A first field, `columnDefinitions`, describes each column of the table and a second
    field, `rows`, gives the column values for each resource of the result.


    #### Column Definitions


    A column definition includes the `name`, `type`, `format`, `description`, and
    `priority` fields. The `name` is intended to be the title of the column. The `type`
    is an OpenAPI type definition for this column (e.g., `integer`, `number`, `string`,
    or `boolean`).


    The optional `format` is an OpenAPI modifier for the type of the columns, giving
    more information on the formatting. Formats for `integer` type are `int32` and
    `int64`, formats for `number` type are `float` and `double`, and formats for `string`
    type are `byte`, `binary`, `data`, `date-time`, `password`, and `name`. The `name`
    format value is not part of the OpenAPI specification and is specific to the Kubernetes
    API. It indicates to the client the primary column that contains the resource
    name.


    The `priority` field is an integer indicating the importance of a column relative
    to the other ones. Columns with higher values may be omitted when space is limited.


    #### Row Data


    A row includes the `cells`, `conditions`, and `object` fields.


    The `cells` field is an array the same length of the `columnDefinitions` array
    and contains values for the resource displayed in the current row. The JSON type
    and optional format of each element of the array are inferred from the `type`
    and `format` of the corresponding column definition.


    The `conditions` field gives specific attributes for displaying the row. The only
    defined value as of Kubernetes 1.23 is `''Completed''`, indicating the resource
    displayed in the row has run to completion and can be given less visual priority.


    The `object` field contains, by default, the metadata of the resource displayed
    in this column. You can add an `includeObject` query parameter to the `List` request
    to either require no information about the object (`?includeObject=None`), or
    the complete object (`?includeObject=Object`). The default value for this query
    parameter is `Metadata`, which requires metadata of the resource only. For example,
    use the following to return no object information as part of the row data:


    ```

    $ curl $HOST/api/v1/pods?includeObject=None

    -H ''Accept: application/json;as=Table;g=meta.k8s.io;v=v1''

    ```


    ### Using the YAML Format


    Earlier in the [Creating a Resource](#533908_1_En_2_Chapter.xhtml#Sec4) section
    you saw that it is possible to use the YAML format to describe the resource to
    create using the `Content-Type: application/yaml` header. If you do not specify
    this header, you will need to describe the resource in the JSON format.


    It also is possible to obtain the response of requests in YAML format using the
    `Accept: application/yaml` header. This is valid for `Get` and `List` requests,
    but also can be used for requests creating or updating resources that return the
    new value of them. For example, to get the list of all pods in YAML format use
    this:


    ```

    $ curl $HOST/api/v1/pods -H ''Accept: application/yaml''

    kind: PodList

    metadata:

    resourceVersion: "3009983"

    items:

    [...]

    ```


    Or, to create a new Pod and get the created Pod in YAML format, use the following:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods

    -H "Content-Type: application/yaml"

    -H ''Accept: application/yaml''

    --data-binary @pod.yaml

    ```


    Note that it is not possible to get the result of a `Watch` request in the YAML
    format.


    ### Using the Protobuf Format


    The Protobuf format also can be used to send data to the API Server or to receive
    data from it. For this, you need to use the type `application/vnd.kubernetes.protobuf`
    for the `Content-Type` or `Accept`.


    The Kubernetes team [discourages](https://github.com/kubernetes/client-go/issues/76)
    the use of the Protobuf format outside of the Kubernetes control plane because
    they do not guarantee that the Protobuf messages will be as stable as the JSON
    messages.


    If you decide to use the Protobuf format, you need to know that the API Server
    does not exchange pure Protobuf data, but it adds a header to it to check the
    compatibility between Kubernetes versions.


    The [apimachinery](https://github.com/kubernetes/apimachinery) library contains
    Go code to help developers serialize data in various formats, including Protobuf.
    Chapter [5](#533908_1_En_5_Chapter.xhtml) describes how to use this library.


    ## Conclusion


    This chapter has discussed how to run `kubectl` to help understand the HTTP requests
    executed underneath it. Then, it has shown how to create, update, apply, delete,
    get, list, and watch resources in detail using various HTTP operations. To finish,
    the chapter has described how to get the results of these operations in several
    formats: JSON, YAML, and Protobuf, or as a Table.


    # 3. Working with API Resources in Go


    The first two chapters of this book have described how the Kubernetes API is designed,
    and how to access it using HTTP requests. Specifically, you have seen that resources
    managed by the API are organized into `Group-Version-Resource`s, and that objects
    exchanged between the client and the API Server are defined as `Kind`s by the
    Kubernetes API. The chapter also shows that this data can be encoded in JSON,
    YAML, or Protobuf during the exchange, depending on the HTTP headers the client
    has set.


    In the next chapters, you will see how to access this API using the Go language.
    The two important Go libraries needed to work with the Kubernetes API are the
    [apimachinery](https://github.com/kubernetes/apimachinery) and the [api](https://github.com/kubernetes/api).


    The API Machinery is a generic library that takes care of serializing data between
    Go structures and objects written in the JSON (or YAML or Protobuf) format. This
    makes it possible for developers of clients, but also API Servers, to write data
    using Go structures and transparently use these resources in JSON (or YAML or
    Protobuf) during the HTTP exchanges.


    The API Machinery Library is generic in the sense that it does not include any
    Kubernetes API resource definitions. It makes the Kubernetes API extendable and
    makes the API Machinery usable for any other API that would use the same mechanisms—that
    is, `Kind`s and `Group-Version-Resource`s.


    The API Library, for its part, is a collection of Go structures that are needed
    to work in Go with the resources defined by the Kubernetes API.'
