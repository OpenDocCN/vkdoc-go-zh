  raw: '*   – this **GetObject()** method from the *CreateAction* interface will return
    the *object* (here *pod*) passed as parameter to the **Create** method


    *   **UpdateAction interface** – defined as:


    ```

    type UpdateAction interface {

    Action

    GetObject() runtime.Object

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Updating a Resource” section,
    the signature of the method to execute the **Update** operation is (here for *Pods*):


    *   `Update(ctx context.Context, pod *v1.Pod, opts metav1.UpdateOptions)`.


    *   – this **GetObject()** method from the UpdateAction interface will return
    the *object* (here *pod*) passed as parameter to the **Update** method.


    *   **DeleteAction interface** – the code follows:


    ```

    type DeleteAction interface {

    Action

    GetName() string

    GetDeleteOptions() metav1.DeleteOptions

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Deleting a Resource” section,
    the signature of the method to execute the **Delete** operation is as follows:


    *   `Delete(ctx context.Context, name string, opts metav1.DeleteOptions)`


    *   – this **GetName()** method from the *DeleteAtion* interface will return the
    *name* passed as parameter to the **Delete** method.


    *   The **GetDeleteOptions()**


    *   – method from the *DeleteAtion* interface will return the *opts* passed as
    parameter to the **Delete** method.


    *   **DeleteCollectionAction interface** – defined as:


    *   `type ListRestrictions struct {`


    ```

    type DeleteCollectionAction interface {

    Action

    GetListRestrictions() ListRestrictions

    }

    ```


    ```

    Labels labels.Selector

    Fields fields.Selector

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Deleting a Collection
    of Resources” section, the signature of the method to execute the DeleteCollection
    operation is:


    *   `DeleteCollection(ctx context.Context, opts metav1.DeleteOptions, listOpts
    metav1.ListOptions)` – with ListOptions defined as:


    *   The **GetListRestrictions()** method from the DeleteCollectionAction interface
    will return the *LabelSelector* and *FieldSelector* passed as parameters through
    the ListOptions structure to the **DeleteCollection** method.


    *   **PatchAction interface** – defined as:


    ```

    type ListOptions struct {

    LabelSelector string

    FieldSelector string

    [...]

    }

    ```


    ```

    type PatchAction interface {

    Action

    GetName() string

    GetPatchType() types.PatchType

    GetPatch() []byte

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Using a Sstrategic Merge
    Patch to Update a Resource” and “Applying Resources Server-side” sections, the
    signature of the method to execute the **Patch** operation is:


    *   The **GetName()** method from the *PatchAction* interface will return the
    *name* passed as parameter to the **Patch** method.


    *   The **GetPatchType()** method from the *PatchAction* interface will return
    the *pt* passed as parameter to the **Patch** method.


    *   The **GetPatch()** method from the *PatchAction* interface will return the
    *data* passed as parameter to the **Patch** method.


    *   **WatchAction interface** – defined as:


    ```

    Patch(

    ctx context.Context,

    name string,

    pt types.PatchType,

    data []byte,

    opts metav1.PatchOptions,

    subresources ...string,

    )

    ```


    *   `type WatchRestrictions struct {`


    ```

    type WatchAction interface {

    Action

    GetWatchRestrictions() WatchRestrictions

    }

    ```


    *   As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Watching Resources”
    section, the signature of the method to execute the **Watch** operation is:


    *   `Watch(ctx context.Context, opts metav1.ListOptions)`


    *   – The **GetWatchRestrictions()** method from the *WatchAction* interface will
    return the *LabelSelector* and *FieldSelector* and *ResourceVersion* passed as
    parameters through the ListOptions structure to the **Watch** method.


    ```

    Labels          labels.Selector

    Fields          fields.Selector

    ResourceVersion string

    }

    ```


    As an example, here is how you can use **Action** and *CreateAction* interfaces
    and their methods to test the **CreatePod** function:


    *   ➊ Create a *fake* Clientset


    *   ➋ Call the **CreatePod** function to test


    *   ➌ Get the actions done during the execution of the function


    *   ➍ Assert the number of actions


    *   ➎ Get the first and only action done during execution


    *   ➏ Assert the *namespace* value passed during the **Action**


    *   ➐ Assert the *Verb* and *Resource* used for the **Action**


    *   ➑ Cast the **Action** to the *CreateAction* interface


    *   ➒ Assert the object value passed during the *CreateAction*


    ```

    import (

    "context"

    "reflect"

    "testing"

    corev1 "k8s.io/api/core/v1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/client-go/kubernetes/fake"

    ktesting "k8s.io/client-go/testing"

    )

    func TestCreatePodActions(t *testing.T) {

    var (

    name      = "a-name"

    namespace = "a-namespace"

    image     = "an-image"

    wantPod = &corev1.Pod{

    ObjectMeta: metav1.ObjectMeta{

    Name: "a-name",

    },

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "runtime",

    Image: "an-image",

    },

    },

    },

    }

    wantActions = 1

    )

    clientset := fake.NewSimpleClientset()          ➊

    _, _ = CreatePod(                                   ➋

    context.Background(),

    clientset,

    name,

    namespace,

    image,

    )

    actions := clientset.Actions()                    ➌

    if len(actions) != wantActions {                    ➍

    t.Errorf("# actions = %d, want %d",

    len(actions),

    wantActions,

    )

    }

    action := actions[0]                              ➎

    actionNamespace := action.GetNamespace()          ➏

    if actionNamespace != namespace {

    t.Errorf("action namespace = %s, want %s",

    actionNamespace,

    namespace,

    )

    }

    if !action.Matches("create", "pods") {          ➐

    t.Errorf("action verb = %s, want create",

    action.GetVerb(),

    )

    t.Errorf("action resource = %s, want pods",

    action.GetResource().Resource,

    )

    }

    createAction := action.(ktesting.CreateAction)     ➑

    obj := createAction.GetObject()                    ➒

    if !reflect.DeepEqual(obj, wantPod) {

    t.Errorf("create action object = %v, want %v",

    obj,

    wantPod,

    )

    }

    }

    ```'
