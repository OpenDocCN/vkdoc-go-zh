- fmt: "# Deleting a Resource\n\nTo delete a resource from the cluster, you can use\
    \ the `Delete` method for the resource you want to delete. For example, to delete\
    \ a `Pod` named `nginx-pod` from the `project1` namespace use:\n\n```\nerr = clientset.\n\
    CoreV1().\nPods(\"project1\").\nDelete(ctx, \"nginx-pod\", metav1.DeleteOptions{})\n\
    ```\n\nNote that it is not guaranteed that the resource is deleted when the operation\
    \ terminates. The `Delete` operation will not effectively delete the resource,\
    \ but mark the resource to be deleted (by setting the field `.metadata.deletionTimestamp`),\
    \ and the deletion will happen asynchronously.\n\nThe different options, to declare\
    \ into the `DeleteOptions` structure, when deleting a resource are:\n\n- `OrphanDependents`\
    \ – this field is deprecated in favor of `PropagationPolicy`. `PropagationPolicy`\
    \ – this indicates whether and how garbage collection will be performed. See also\
    \ Chapter [3](#533908_1_En_3_Chapter.xhtml)’s \"OwnerReferences\" section. The\
    \ acceptable values are:\n  - `metav1.DeletePropagationOrphan` – to indicate to\
    \ the Kubernetes API to orphan the resources owned by the resource you are deleting,\
    \ so they will not be deleted by the garbage collector.\n- `metav1.DeletePropagationBackground`\
    \ – to indicate to the Kubernetes API to return from the `Delete` operation immediately\
    \ after the owner resource is marked for deletion, not to wait for owned resources\
    \ to be deleted by the garbage collector.\n- `metav1.DeletePropagationForeground`\
    \ – to indicate to the Kubernetes API to return from the `Delete` operation after\
    \ the owner and the owned resources with `BlockOwnerDeletion` set to `true` are\
    \ deleted. The Kubernetes API will not wait for other owned resources to be deleted.\n\
    - `DryRun` – this indicates which operations on the API server-side should be\
    \ executed. The only available value is `metav1.DryRunAll`, indicating that it\
    \ is to execute all the operations except (the operation of) persisting the resource\
    \ to storage. Using this option, you can get the result of the command, without\
    \ really deleting the resource, and check whether an error would occur during\
    \ this deletion.\n- `GracePeriodSeconds` – this value is useful when deleting\
    \ pods only. This indicates the duration in seconds before the pod should be deleted.\n\
    \  - The value must be a pointer to a non-negative integer. The value zero indicates\
    \ delete immediately. If this value is nil, the default grace period for the pod\
    \ will be used, as indicated in the `TerminationGracePeriodSeconds` field of the\
    \ pod specification.\n  - You can use the `metav1.NewDeleteOptions` function to\
    \ create a `DeleteOptions` structure with the `GracePeriodSeconds` defined:\n\n\
    ```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"nginx-pod\"\
    ,\n*metav1.NewDeleteOptions(5),\n)\n```\n\n- `Preconditions` – When you delete\
    \ an object, you may want to be sure to delete the expected one. The `Preconditions`\
    \ field lets you indicate which resource you expect to delete, either by:\n  -\
    \ Indicating the UID, so if the expected resource is deleted and another resource\
    \ is created with the same name, the deletion will fail, producing a `Conflict`\
    \ error. You can use the `metav1.NewPreconditionDeleteOptions` function to create\
    \ a `DeleteOptions` structure with the UID of the `Preconditions` set:\n\n```\n\
    uid := createdPod.GetUID()\nerr = clientset.\nCoreV1().\nPods(\"project1\").\n\
    Delete(ctx,\n\"nginx-pod\",\n*metav1.NewPreconditionDeleteOptions(\nstring(uid),\n\
    ),\n)\nif errors.IsConflict(err) {\n[...]\n}\n```\n\n- Indicating the `ResourceVersion`,\
    \ so if the resource is updated in the meantime, the deletion will fail, with\
    \ a Conflict error. You can use the `metav1.NewRVDeletionPrecondition` function\
    \ to create a `DeleteOptions` structure with the `ResourceVersion` of the `Preconditions`\
    \ set:\n\n```\nrv := createdPod.GetResourceVersion()\nerr = clientset.\nCoreV1().\n\
    Pods(\"project1\").\nDelete(ctx,\n\"nginx-pod\",\n*metav1.NewRVDeletionPrecondition(\n\
    rv,\n),\n)\nif errors.IsConflict(err) {\n[...]\n}\n```\n\nThe following are the\
    \ possible errors specific to the `Delete` operation:\n\n- `IsNotFound` – this\
    \ function indicates that the resource or the namespace you specified in the request\
    \ does not exist.\n- `IsConflict` – this function indicates that the request failed\
    \ because a precondition is not respected (either UID or `ResourceVersion`).\n\
    \n# Deleting a Collection of Resources\n\nTo delete a collection of resources\
    \ from the cluster, you can use the `DeleteCollection` method for the resource\
    \ you want to delete. For example, to delete a collection of Pods from the `project1`\
    \ namespace:\n\n```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDeleteCollection(\n\
    ctx,\nmetav1.DeleteOptions{},\nmetav1.ListOptions{},\n)\n```\n\nTwo sets of options\
    \ must be provided to the function:\n\n- The `DeleteOptions`, indicating the options\
    \ for the `Delete` operation on each object, as described in the \"Deleting a\
    \ Resource\" section.\n- The `ListOptions`, refining the collection of resources\
    \ to delete, as described in the \"Getting List of Resources\" section.\n\n# Updating\
    \ a Resource\n\nTo update a resource in the cluster, you can use the `Update`\
    \ method for the resource you want to update. For example, use the following to\
    \ update a `Deployment` in the `project1` namespace:\n\n```\nupdatedDep, err :=\
    \ clientset.\nAppsV1().\nDeployments(\"project1\").\nUpdate(\nctx,\nmyDep,\nmetav1.UpdateOptions{},\n\
    )\n```\n\nThe various options, to declare into the `UpdateOptions` structure when\
    \ updating a resource, are the same as the options in `CreateOptions` described\
    \ in the \"Creating a Resource\" section.\n\nThe possible errors specific to the\
    \ `Update` operation are:\n\n- `IsInvalid` – this function indicates that the\
    \ data passed into the structure is invalid.\n- `IsConflict` – this function indicates\
    \ that the `ResourceVersion` incorporated into the structure (here `myDep`) is\
    \ a version older than the one in the cluster. More information is available in\
    \ Chapter [2](#533908_1_En_2_Chapter.xhtml)’s \"Updating a Resource Managing Conflicts\"\
    \ section."
  raw: "## Deleting a Resource\n\nTo delete a resource from the cluster, you can use\
    \ the **Delete** method for the resource you want to delete. For example, to delete\
    \ a `Pod` named **nginx-pod** from the **project1** namespace use:\n\n```\nerr\
    \ = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx, \"nginx-pod\", metav1.DeleteOptions{})\n\
    ```\n\nNote that it is not guaranteed that the resource is deleted when the operation\
    \ terminates. The **Delete** operation will not effectively delete the resource,\
    \ but mark the resource to be deleted (by setting the field **.metadata.deletionTimestamp)**,\
    \ and the deletion will happen asynchronously.\n\nThe different options, to declare\
    \ into the **DeleteOptions** structure, when deleting a resource are:\n\n*   `OrphanDependents`\
    \ – this field is deprecated in favor of **PropagationPolicy**. `PropagationPolicy`\
    \ – this indicates whether and how garbage collection will be performed. See also\
    \ Chapter [3](#533908_1_En_3_Chapter.xhtml)’s “OwnerReferences” section. The acceptable\
    \ values are:\n    *   `metav1.DeletePropagationOrphan` – to indicate to the Kubernetes\
    \ API to orphan the resources owned by the resource you are deleting, so they\
    \ will not be deleted by the garbage collector.\n\n*   `metav1.DeletePropagationBackground`\
    \ – to indicate to the Kubernetes API to return from the **Delete** operation\
    \ immediately after the owner resource is marked for deletion, not to wait for\
    \ owned resources to be deleted by the garbage collector.\n\n*   `metav1.DeletePropagationForeground`\
    \ – to indicate to the Kubernetes API to return from the **Delete** operation\
    \ after the owner and the **owned resources** with **BlockOwnerDeletion** set\
    \ to **true** are deleted. The Kubernetes API will not wait for other owned resources\
    \ to be deleted.\n\n*   `DryRun` – this indicates which operations on the API\
    \ server-side should be executed. The only available value is **metav1.DryRunAll**,\
    \ indicating that it is to execute all the operations except (the operation of)\
    \ persisting the resource to storage. Using this option, you can get the result\
    \ of the command, without really deleting the resource, and check whether an error\
    \ would occur during this deletion.\n\n*   `GracePeriodSeconds` – this value is\
    \ useful when deleting pods only. This indicates the duration in seconds before\
    \ the pod should be deleted.\n\n*   The value must be a pointer to a non-negative\
    \ integer. The value zero indicates delete immediately. If this value is nil,\
    \ the default grace period for the pod will be used, as indicated in the **TerminationGracePeriodSeconds**\
    \ field of the pod specification.\n\n*   You can use the **metav1.NewDeleteOptions**\
    \ function to create a **DeleteOptions** structure with the **GracePeriodSeconds**\
    \ defined:\n\n```\n    err = clientset.\n    CoreV1().\n    Pods(\"project1\"\
    ).\n    Delete(ctx,\n    \"nginx-pod\",\n    *metav1.NewDeleteOptions(5),\n  \
    \  )\n    ```\n\n*   `Preconditions` – When you delete an object, you may want\
    \ to be sure to delete the expected one. The **Preconditions** field lets you\
    \ indicate which resource you expect to delete, either by:\n    *   Indicating\
    \ the UID, so if the expected resource is deleted and another resource is created\
    \ with the same name, the deletion will fail, producing a **Conflict** error.\
    \ You can use the **metav1.NewPreconditionDeleteOptions** function to create a\
    \ **DeleteOptions** structure with the UID of the **Preconditions** set:\n\n```\n\
    \        uid := createdPod.GetUID()\n        err = clientset.\n        CoreV1().\n\
    \        Pods(\"project1\").\n        Delete(ctx,\n        \"nginx-pod\",\n  \
    \      *metav1.NewPreconditionDeleteOptions(\n        string(uid),\n        ),\n\
    \        )\n        if errors.IsConflict(err) {\n        [...]\n        }\n  \
    \      ```\n\n*   Indicating the **ResourceVersion**, so if the resource is updated\
    \ in the meantime, the deletion will fail, with a Conflict error. You can use\
    \ the **metav1.NewRVDeletionPrecondition** function to create a DeleteOptions\
    \ structure with the ResourceVersion of the Preconditions set:\n\n```\n    rv\
    \ := createdPod.GetResourceVersion()\n    err = clientset.\n    CoreV1().\n  \
    \  Pods(\"project1\").\n    Delete(ctx,\n    \"nginx-pod\",\n    *metav1.NewRVDeletionPrecondition(\n\
    \    rv,\n    ),\n    )\n    if errors.IsConflict(err) {\n    [...]\n    }\n \
    \   ```\n\nThe following are the possible errors specific to the **Delete** operation:\n\
    \n*   `IsNotFound` – this function indicates that the resource or the namespace\
    \ you specified in the request does not exist.\n\n*   `IsConflict` – this function\
    \ indicates that the request failed because a precondition is not respected (either\
    \ UID or **ResourceVersion**)\n\n## Deleting a Collection of Resources\n\nTo delete\
    \ a collection of resources from the cluster, you can use the **DeleteCollection**\
    \ method for the resource you want to delete. For example, to delete a collection\
    \ of Pods from the **project1** namespace:\n\n```\nerr = clientset.\nCoreV1().\n\
    Pods(\"project1\").\nDeleteCollection(\nctx,\nmetav1.DeleteOptions{},\nmetav1.ListOptions{},\n\
    )\n```\n\nTwo sets of options must be provided to the function:\n\n*   The **DeleteOptions**,\
    \ indicating the options for the **Delete** operation on each object, as described\
    \ in the “Deleting a Resource” section.\n\n*   The **ListOptions**, refining the\
    \ collection of resources to delete, as described in the “Getting List of Resources”\
    \ section.\n\n## Updating a Resource\n\nTo update a resource in the cluster, you\
    \ can use the **Update** method for the resource you want to update. For example,\
    \ use the following to update a `Deployment` in the **project1** namespace:\n\n\
    ```\nupdatedDep, err := clientset.\nAppsV1().\nDeployments(\"project1\").\nUpdate(\n\
    ctx,\nmyDep,\nmetav1.UpdateOptions{},\n)\n```\n\nThe various options, to declare\
    \ into the **UpdateOptions** structure when updating a resource, are the same\
    \ as the options in **CreateOptions** described in the “Creating a Resource” section.\n\
    \nThe possible errors specific to the **Update** operation are:\n\n*   `IsInvalid`\
    \ – this function indicates that the data passed into the structure is invalid.\n\
    \n*   `IsConflict` – this function indicates that the **ResourceVersion** incorporated\
    \ into the structure (here **myDep**) is a version older than the one in the cluster.\
    \ More information is available to in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Updating a Resource Managing Conflicts” section."
  trans: "\n# 删除资源\n\n要从集群中删除资源，可以对要删除的资源使用 `Delete` 方法。例如，要从 `project1` 命名空间中删除名为\
    \ `nginx-pod` 的 `Pod`，请使用：\n\n```\nerr = clientset.\nCoreV1().\nPods(\"project1\"\
    ).\nDelete(ctx, \"nginx-pod\", metav1.DeleteOptions{})\n```\n\n请注意，操作终止时并不能保证资源已被删除。`Delete`\
    \ 操作不会立即删除资源，而是将资源标记为待删除（通过设置 `.metadata.deletionTimestamp` 字段），删除操作将异步进行。\n\n\
    删除资源时，可在 `DeleteOptions` 结构中声明的不同选项如下：\n\n- `OrphanDependents` – 此字段已弃用，建议使用 `PropagationPolicy`。`PropagationPolicy`\
    \ – 指示是否以及如何进行垃圾回收。另请参阅第 3 章的 \"OwnerReferences\" 部分。可接受的值为：\n  - `metav1.DeletePropagationOrphan`\
    \ – 向 Kubernetes API 指示孤立正在删除的资源所拥有的资源，这样它们不会被垃圾回收器删除。\n- `metav1.DeletePropagationBackground`\
    \ – 向 Kubernetes API 指示在所有者资源被标记为删除后立即从 `Delete` 操作返回，无需等待拥有的资源被垃圾回收器删除。\n- `metav1.DeletePropagationForeground`\
    \ – 向 Kubernetes API 指示在所有者资源以及设置了 `BlockOwnerDeletion` 为 `true` 的拥有资源被删除后才从 `Delete`\
    \ 操作返回。Kubernetes API 不会等待其他拥有资源被删除。\n- `DryRun` – 指示应在 API 服务器端执行哪些操作。唯一可用的值是\
    \ `metav1.DryRunAll`，表示执行所有操作，但不包括将资源持久化到存储的操作。使用此选项，您可以获取命令结果，而无需真正删除资源，并检查在此删除过程中是否会发生错误。\n\
    - `GracePeriodSeconds` – 此值仅在删除 Pod 时有用。指示在 Pod 被删除前的持续秒数。\n  - 该值必须是一个指向非负整数的指针。值为零表示立即删除。如果此值为\
    \ nil，将使用 Pod 的默认宽限期，如 Pod 规范中的 `TerminationGracePeriodSeconds` 字段所示。\n  - 您可以使用\
    \ `metav1.NewDeleteOptions` 函数创建一个包含已定义 `GracePeriodSeconds` 的 `DeleteOptions`\
    \ 结构：\n\n```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"\
    nginx-pod\",\n*metav1.NewDeleteOptions(5),\n)\n```\n\n- `Preconditions` – 删除对象时，您可能希望确保删除的是预期对象。`Preconditions`\
    \ 字段允许您指明期望删除的资源，可以通过以下方式：\n  - 指定 UID，这样如果预期资源被删除并且另一个同名资源被创建，删除操作将失败，产生 `Conflict`\
    \ 错误。您可以使用 `metav1.NewPreconditionDeleteOptions` 函数创建一个包含设置了 UID 的 `Preconditions`\
    \ 的 `DeleteOptions` 结构：\n\n```\nuid := createdPod.GetUID()\nerr = clientset.\n\
    CoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"nginx-pod\",\n*metav1.NewPreconditionDeleteOptions(\n\
    string(uid),\n),\n)\nif errors.IsConflict(err) {\n[...]\n}\n```\n\n- 指定 `ResourceVersion`，这样如果资源在此期间被更新，删除操作将失败，并产生\
    \ Conflict 错误。您可以使用 `metav1.NewRVDeletionPrecondition` 函数创建一个包含设置了 `ResourceVersion`\
    \ 的 `Preconditions` 的 `DeleteOptions` 结构：\n\n```\nrv := createdPod.GetResourceVersion()\n\
    err = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"nginx-pod\",\n\
    *metav1.NewRVDeletionPrecondition(\nrv,\n),\n)\nif errors.IsConflict(err) {\n\
    [...]\n}\n```\n\n以下是 `Delete` 操作特有的可能错误：\n\n- `IsNotFound` – 此函数表示您在请求中指定的资源或命名空间不存在。\n\
    - `IsConflict` – 此函数表示请求失败，因为未满足前提条件（UID 或 `ResourceVersion`）。\n\n# 删除资源集合\n\n\
    要从集群中删除资源集合，可以对要删除的资源使用 `DeleteCollection` 方法。例如，从 `project1` 命名空间中删除 Pod 集合：\n\
    \n```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDeleteCollection(\nctx,\n\
    metav1.DeleteOptions{},\nmetav1.ListOptions{},\n)\n```\n\n必须向该函数提供两组选项：\n\n- `DeleteOptions`，指示对每个对象执行\
    \ `Delete` 操作的选项，如 \"删除资源\" 部分所述。\n- `ListOptions`，细化要删除的资源集合，如 \"获取资源列表\" 部分所述。\n\
    \n# 更新资源\n\n要更新集群中的资源，可以对要更新的资源使用 `Update` 方法。例如，使用以下代码更新 `project1` 命名空间中的 `Deployment`：\n\
    \n```\nupdatedDep, err := clientset.\nAppsV1().\nDeployments(\"project1\").\n\
    Update(\nctx,\nmyDep,\nmetav1.UpdateOptions{},\n)\n```\n\n更新资源时，可在 `UpdateOptions`\
    \ 结构中声明的各种选项与 \"创建资源\" 部分中 `CreateOptions` 的选项相同。\n\n`Update` 操作特有的可能错误是：\n\n\
    - `IsInvalid` – 此函数表示传递给结构的数据无效。\n- `IsConflict` – 此函数表示结构中包含的 `ResourceVersion`（此处为\
    \ `myDep`）比集群中的版本更旧。更多信息请参阅第 2 章的 \"更新资源以管理冲突\" 部分。\n"
- fmt: "## Using a Strategic Merge Patch to Update a Resource\n\nYou have seen in\
    \ Chapter [2](#533908_1_En_2_Chapter.xhtml)’s “Using a Strategic Merge Patch to\
    \ Update a Resource” section how patching a resource with a strategic merge patch\
    \ works. To sum up, you need to:\n\n- Use the `Patch` operation\n- Specify a specific\
    \ value for the `content-type` header\n- Pass into the body the only fields you\
    \ want to modify\n\nUsing the Client-go Library, you can use the `Patch` method\
    \ for the resource you want to patch.\n\n```go\nPatch(\nctx context.Context,\n\
    name string,\npt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources\
    \ ...string,\n) (result *v1.Deployment, err error)\n```\n\nThe `patch` type indicates\
    \ whether you want to use a `StrategicMerge` patch (`types.StrategicMergePatchType`)\
    \ or a merge patch (`types.MergePatchType`). These constants are defined in the\
    \ `k8s.io/apimachinery/pkg/types` package.\n\nThe `data` field contains the patch\
    \ you want to apply to the resource. You could write this patch data directly,\
    \ like was done in Chapter [2](#533908_1_En_2_Chapter.xhtml), or you can use the\
    \ following functions of the `controller-runtime library` to help you build this\
    \ patch. This library is explored in more depth in Chapter [10](#533908_1_En_10_Chapter.xhtml)).\n\
    \n```go\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\nfunc StrategicMergeFrom(\n\
    obj Object,\nopts ...MergeFromOption,\n) Patch\n```\n\nThe `StrategicMergeFrom`\
    \ function accepts a first parameter of type `Object`, representing any Kubernetes\
    \ object. You will pass by this parameter the object you want to patch, before\
    \ any change.\n\nThe function then accepts a series of options. The only accepted\
    \ option at this time is the `client.MergeFromWithOptimisticLock{}` value. This\
    \ value asks the library to add the `ResourceVersion` to the patch data, so the\
    \ server will be able to check whether the resource version you want to update\
    \ is the last one.\n\nAfter you have created a `Patch` object by using the `StrategicMergeFrom`\
    \ function, you can create a deep copy of the object you want to patch, then modify\
    \ it. Then, when you are done updating the object, you can build the data for\
    \ the patch with the dedicated `Data` method of the `Patch` object.\n\nAs an example,\
    \ to build patch data for a `Deployment`, containing the `ResourceVersion` for\
    \ optimistic lock, you can use the following code (`createdDep` is a `Deployment`\
    \ structure that reflects a `Deployment` created in the cluster):\n\n```go\npatch\
    \ := client.StrategicMergeFrom(\ncreatedDep,\npkgclient.MergeFromWithOptimisticLock{},\n\
    )\nupdatedDep := createdDep.DeepCopy()\nupdatedDep.Spec.Replicas = pointer.Int32(2)\n\
    patchData, err := patch.Data(updatedDep)\n// patchData = []byte(`{\n//   \"metadata\"\
    :{\"resourceVersion\":\"4807923\"},\n//   \"spec\":{\"replicas\":2}\n// }`)\n\
    patchedDep, err := clientset.\nAppsV1().Deployments(\"project1\").Patch(\nctx,\n\
    \"dep1\",\npatch.Type(),\npatchData,\nmetav1.PatchOptions{},\n)\n```\n\nNote that\
    \ the `MergeFrom` and `MergeFromWithOptions` functions are also available, if\
    \ you prefer to execute a *Merge Patch* instead.\n\nThe `Type` method of the `Patch`\
    \ object can be used to retrieve the patch type, instead of using the constants\
    \ in the `type` package. You can pass `PatchOptions` when calling the patch operation.\
    \ The possible options are:\n\n- `DryRun` – this indicates which operations on\
    \ the API server -side should be executed. The only available value is `metav1.DryRunAll`,\
    \ indicating execution of all the operations except persisting the resource to\
    \ storage.\n- `Force` – this option can be used only for *Apply* patch requests\
    \ and must be unset when working with `StrategicMergePatch` or `MergePatch` requests.\n\
    - `FieldManager` – this indicates the name of the field manager for this operation.\
    \ This information will be used for future server-side *Apply* operations. This\
    \ option is optional for `StrategicMergePatch` or `MergePatch` requests.\n- `FieldValidation`\
    \ – this indicates how the server should react when duplicate or unknown fields\
    \ are present in the structure. The following are the possible values:\n  - `metav1.FieldValidationIgnore`\
    \ – to ignore all duplicate or unknown fields\n  - `metav1.FieldValidationWarn`\
    \ – to warn when duplicate or unknown fields are present\n  - `metav1.FieldValidationStrict`\
    \ – to fail when duplicate or unknown fields are present\n\nNote that the `Patch`\
