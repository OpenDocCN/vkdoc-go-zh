- fmt: "# Defining a ginkgo Suite\n\nTo start the tests for the `Reconcile` function,\
    \ you can use a `go` test function to start `ginkgo` specs:\n\n```go\nimport (\n\
    \    \"testing\"\n    . \"github.com/onsi/ginkgo/v2\"\n    . \"github.com/onsi/gomega\"\
    \n)\n\nfunc TestMyReconciler_Reconcile(t *testing.T) {\n    RegisterFailHandler(Fail)\n\
    \    RunSpecs(t,\n        \"Controller Suite\",\n    )\n}\n```\n\nThen, you can\
    \ declare `BeforeSuite` and `AfterSuite` functions, which are used to start and\
    \ stop the `Environment` and the Manager.\n\nHere is an example for these functions,\
    \ which will create an environment with the CRD for `MyResource` loaded. The Manager\
    \ is started in a `Go` routine at the end of the `BeforeSuite` function, so the\
    \ tests can be executed on the main `Go` routine.\n\nNote that you are creating\
    \ a *Cancelable Context*, which is used when starting the Manager, so you can\
    \ stop the Manager by canceling the context from the `AfterSuite` function.\n\n\
    - ❶ `testEnv`, `ctx`, and `cancel` will be used in `BeforeSuite` and `AfterSuite`\n\
    - ❷ `k8sClient` will be used in tests\n- ❸ Create a cancelable context\n- ❹ Create\
    \ the `testEnv` environment\n- ❺ Start the `testEnv` environment\n- ❻ Build the\
    \ scheme to pass to the Manager\n- ❼ Build the Manager\n- ❽ Get the `k8sClient`\
    \ from the Manager to use for tests\n- ❾ Build the Controller\n- ❿ Start the Manager\
    \ from a `Go` routine\n- ⓫ Cancel the context, which will terminate the Manager\n\
    - ⓬ Terminate the `testEnv` environment\n\n```go\nimport (\n    \"context\"\n\
    \    \"path/filepath\"\n    \"testing\"\n\n    . \"github.com/onsi/ginkgo/v2\"\
    \n    . \"github.com/onsi/gomega\"\n    appsv1 \"k8s.io/api/apps/v1\"\n    \"\
    k8s.io/apimachinery/pkg/runtime\"\n    clientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/builder\"\n    \"sigs.k8s.io/controller-runtime/pkg/client\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/envtest\"\n    \"sigs.k8s.io/controller-runtime/pkg/log\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/log/zap\"\n    \"sigs.k8s.io/controller-runtime/pkg/manager\"\
    \n\n    mygroupv1alpha1 \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
    \n)\n\nvar (\n    testEnv   *envtest.Environment                    ❶\n    ctx\
    \       context.Context\n    cancel    context.CancelFunc\n    k8sClient client.Client\
    \                           ❷\n)\n\nvar _ = BeforeSuite(func() {\n    log.SetLogger(zap.New(\n\
    \        zap.WriteTo(GinkgoWriter),\n        zap.UseDevMode(true),\n    ))\n\n\
    \    ctx, cancel = context.WithCancel(                 ❸\n        context.Background(),\n\
    \    )\n\n    testEnv = &envtest.Environment{                   ❹\n        CRDDirectoryPaths:\
    \     []string{\n            filepath.Join(\"..\", \"..\", \"crd\"),\n       \
    \ },\n        ErrorIfCRDPathMissing: true,\n    }\n\n    var err error\n    //\
    \ cfg is defined in this file globally.\n    cfg, err := testEnv.Start()     \
    \                  ❺\n    Expect(err).NotTo(HaveOccurred())\n    Expect(cfg).NotTo(BeNil())\n\
    \n    scheme := runtime.NewScheme()                     ❻\n    err = clientgoscheme.AddToScheme(scheme)\n\
    \    Expect(err).NotTo(HaveOccurred())\n    err = mygroupv1alpha1.AddToScheme(scheme)\n\
    \    Expect(err).NotTo(HaveOccurred())\n\n    mgr, err := manager.New(cfg, manager.Options{\
    \     ❼\n        Scheme: scheme,\n    })\n    Expect(err).ToNot(HaveOccurred())\n\
    \n    k8sClient = mgr.GetClient()                       ❽\n\n    err = builder.\
    \                                    ❾\n        ControllerManagedBy(mgr).\n  \
    \      Named(Name).\n        For(&mygroupv1alpha1.MyResource{}).\n        Owns(&appsv1.Deployment{}).\n\
    \        Complete(&MyReconciler{})\n\n    go func() {\n        defer GinkgoRecover()\n\
    \        err = mgr.Start(ctx)                          ❿\n        Expect(err).ToNot(\n\
    \            HaveOccurred(),\n            \"failed to run manager\",\n       \
    \ )\n    }()\n})\n\nvar _ = AfterSuite(func() {\n    cancel()                \
    \                          ⓫\n    err := testEnv.Stop()                      \
    \       ⓬\n    Expect(err).NotTo(HaveOccurred())\n})\n```\n\n## Writing the Tests\n\
    \nNow that you have a suite that starts and stops the environment, you can write\
