    \ a **metav1.Time** value based on the various elements of the time (e.g., year,\
    \ month, day, hour, minutes, seconds, nanoseconds, location). It is a wrapper\
    \ around the **time.Date** function.\n\n*   `func Now() Time` – returns a **metav1.Time**\
    \ value containing the current local time. It is a wrapper around the **time.Now**\
    \ function.\n\n*   `func Unix(sec int64, nsec int64) Time` – returns a **metav1.Time**\
    \ value corresponding to the given Unix time expressed in seconds and nanoseconds.\
    \ It is a wrapper around the **time.Unix** function.\n\n### Operations on Time\n\
    \nUse the following to define the **Time** operations:\n\n*   `func (t *Time)\
    \ DeepCopyInto(out *Time)` – returns a copy of the **metav1.Time** value.\n\n\
    *   `func (t *Time) IsZero() bool` – returns true if the **metav1.Time** value\
    \ represents the `zero` time instant, January 1, year 1, 00:00:00 UTC. It is a\
    \ wrapper around the **time.IsZero** method.\n\n*   `func (t *Time) Before(u *Time)\
    \ bool` – returns true if the **metav1.Time** instant **t** is before **u**. It\
    \ is a wrapper around the **time.Before** method.\n\n*   `func (t *Time) Equal(u\
    \ *Time) bool` – returns true if the **metav1.Time** instant **t** is equal to\
    \ **u**. It is a wrapper around the **time.Equal** method.\n\n*   `func (t Time)\
    \ Rfc3339Copy() Time` – returns a copy of the **metav1.Time t** value, removing\
    \ its nanosecond precision.\n\n## Conclusion\n\nThis chapter covered common types\
    \ used when defining Kubernetes resources in Go. Pointer values are used to specify\
    \ optional values, quantities are used to specify memory and CPU quantities, the\
    \ **IntOrString** type is used for values writeable either as integers or strings\
    \ (e.g., ports that can be defined either by number or by name), and Time—a serializable\
    \ type wrapping the Go **Time** type.\n\n# 5. The API Machinery\n\nThe previous\
    \ chapters explored how the Kubernetes API works at the HTTP level. They also\
    \ explored the Kubernetes API Library, which defines the resources served by the\
    \ Kubenretes API in Go.\n\nThis chapter explores the Kubernetes API Machinery\
    \ Library, which provides utilities for working with API objects that follow the\
    \ Kubernetes API object conventions. These conventions include:\n\n*   The API\
    \ objects embed a common metadata structure, **TypeMeta**, containing two fields:\
    \ **APIVersion** and **Kind**.\n\n*   The API objects are provided in a separate\
    \ package.\n\n*   The API objects are versioned.\n\n*   Conversion functions are\
    \ provided to convert between versions.\n\nThe API Machinery will provide the\
    \ following utilities:\n\n*   A **Scheme** abstraction, used to:\n    *   Register\
    \ the API objects as Group-Version-Kinds\n\n    *   Convert between API Objects\
    \ of different versions\n\n    *   Serialize/deserialize API Objects\n\n*   A\
    \ **RESTMapper**, mapping between API Objects (based on embedded **APIVersion**\
    \ and **Kind**) and resource names (in the REST sense).\n\nThis chapter details\
    \ the functions provided by the API Machinery.\n\n## The Schema Package\n\nThe\
    \ **schema** package of the **API Machinery** Library defines useful structures\
    \ and functions to work with Group, Versions, Kinds, and Resources.\n\n```\nimport\
    \ (\n\"k8s.io/apimachinery/pkg/runtime/schema\"\n)\n```\n\nThe structures **GroupVersionResource**,\
    \ **GroupVersionKind**, **GroupVersion**, **GroupResource**, and **GroupKind**\
    \ are defined, with methods to pass from one to another.\n\nAlso, functions to\
    \ convert between **GroupVersionKind** and **(apiVersion, kind)** are provided:\
    \ **ToAPIVersionAndKind** and **FromAPIVersionAndKind**.\n\n![](images/533908_1_En_5_Chapter/533908_1_En_5_Fig1_HTML.png)\n\
    \nA model diagram depicts the A P I machinery schema. 1\\. Group version. 2\\\
    . Group resource. 3\\. Group version resource. 4\\. Group version kind. 5. Group\
    \ kind. 6\\. A P I version kind. The arrows between 1 and 3 indicate with resource\
    \ and group version. 2 and 3, with version and group resource. 1 and 4, with kind\
    \ and group version. 4 and 5, with version and group kind.\n\nFigure 5-1\n\nGVK\
    \ and GVR related structures and methods\n\n## Scheme\n\nA **Scheme** is an abstraction\
    \ used to register the API objects as **Group-Version-Kinds**, convert between\
    \ API Objects of various versions, and serialize/deserialize API Objects. The\
    \ **Scheme** is a structure provided by the API Machinery in the **runtime** package.\
    \ All the fields of this structure are unexported."
  trans: "\n# IntOrString\n\nKubernetes 资源的某些字段同时接受整数值或字符串值。例如，端口可以通过端口号或 IANA 服务名称（如\
    \ [`https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml)\
    \ 所定义）来定义。\n\n另一个例子是可以接受整数或百分比的字段。\n\n```go\nimport (\n\"k8s.io/apimachinery/pkg/util/intstr\"\
    \n)\n```\n\n`IntOrString` 结构体定义如下：\n\n```go\ntype IntOrString struct {\nType \
    \  Type\nIntVal int32\nStrVal string\n}\n```\n\n`Type` 可以是 `Int` 或 `String`。\n\
    \n由于结构体的所有字段都是公开的，你可以通过直接访问其字段来创建值或从中提取信息。为了方便，以下函数可用于创建和操作 `IntOrString` 值：\n\
    \n*   `func FromInt(val int) IntOrString` – 声明一个包含整数值的 `IntOrString`。\n*   `func\
    \ FromString(val string) IntOrString` – 声明一个包含字符串值的 `IntOrString`。\n*   `func\
    \ Parse(val string) IntOrString` – 声明一个 `IntOrString`，首先尝试从字符串中提取整数，否则将其存储为字符串。\n\
    *   `func (intstr *IntOrString) String() string` – 将 `IntOrString` 值作为字符串返回，如果值存储为整数，则使用\
    \ `Itoa` 进行转换。\n*   `func (intstr *IntOrString) IntValue() int` – 将 `IntOrString`\
    \ 值作为整数返回。如果存储为字符串，则使用 `Atoi` 返回其转换后的值，如果解析失败则返回 `0`。\n*   `func ValueOrDefault(intOrPercent\
    \ *IntOrString, defaultValue IntOrString) *IntOrString` – 如果 `intOrPercent` 不为\
    \ nil，则返回该值，否则返回 `defaultValue`。\n*   `func GetScaledValueFromIntOrPercent(intOrPercent\
    \ *IntOrString, total int, roundUp bool) (int, error)` – 此函数可用于预期包含整数或百分比的 `IntOrString`\
    \ 值。如果值是整数，则原样返回。\n\n如果值是表示百分比的字符串（数字后跟 `%` 符号），则该函数返回 `total` 值的百分比，并根据 `roundUp`\
    \ 向上或向下取整。如果字符串无法解析为百分比，则该函数返回一个错误。\n\n## Time\n\nAPI Machinery 库中定义的 `Time` 类型用于\
    \ Kubernetes 资源中声明时间的所有字段。它是 Go `time.Time` 类型的包装器，并提供了包装 `time.Time` 工厂方法的工厂函数。\n\
    \n```go\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n)\n```\n\n\
    ### 工厂方法\n\n可用的工厂方法如下：\n\n*   `func NewTime(time time.Time) Time` – 返回一个包装了所提供的\
    \ `time.Time` 值的 `metav1.Time` 值。\n*   `func Date(year int, month time.Month,\
    \ day, hour, min, sec, nsec int, loc *time.Location) Time` – 基于时间的各个元素（例如，年、月、日、时、分、秒、纳秒、时区）返回一个\
    \ `metav1.Time` 值。它是 `time.Date` 函数的包装器。\n*   `func Now() Time` – 返回一个包含当前本地时间的\
    \ `metav1.Time` 值。它是 `time.Now` 函数的包装器。\n*   `func Unix(sec int64, nsec int64)\
    \ Time` – 返回一个对应于以秒和纳秒表示的给定 Unix 时间的 `metav1.Time` 值。它是 `time.Unix` 函数的包装器。\n\n\
    ### Time 上的操作\n\n使用以下定义来定义 `Time` 操作：\n\n*   `func (t *Time) DeepCopyInto(out\
    \ *Time)` – 返回 `metav1.Time` 值的一个副本。\n*   `func (t *Time) IsZero() bool` – 如果\
    \ `metav1.Time` 值表示 `零` 时间点，即 UTC 时间 0001 年 1 月 1 日 00:00:00，则返回 true。它是 `time.IsZero`\
    \ 方法的包装器。\n*   `func (t *Time) Before(u *Time) bool` – 如果 `metav1.Time` 时刻 `t`\
    \ 在 `u` 之前，则返回 true。它是 `time.Before` 方法的包装器。\n*   `func (t *Time) Equal(u *Time)\
    \ bool` – 如果 `metav1.Time` 时刻 `t` 等于 `u`，则返回 true。它是 `time.Equal` 方法的包装器。\n* \
    \  `func (t Time) Rfc3339Copy() Time` – 返回 `metav1.Time` 值 `t` 的一个副本，移除了其纳秒精度。\n\
    \n## 总结\n\n本章介绍了在 Go 中定义 Kubernetes 资源时使用的常见类型。指针值用于指定可选值，量化值用于指定内存和 CPU 数量，`IntOrString`\
    \ 类型用于既可以写成整数也可以写成字符串的值（例如，可以通过编号或名称定义的端口），以及 `Time`——一种包装了 Go `Time` 类型的可序列化类型。\n\
    \n# 5. API Machinery\n\n前面章节探讨了 Kubernetes API 在 HTTP 层面的工作原理。它们还探讨了 Kubernetes\
    \ API 库，该库以 Go 语言定义了由 Kubernetes API 提供的资源。\n\n本章探讨 Kubernetes API Machinery 库，该库提供了用于处理遵循\
    \ Kubernetes API 对象约定的 API 对象的实用工具。这些约定包括：\n\n*   API 对象嵌入一个公共元数据结构 `TypeMeta`，包含两个字段：`APIVersion`\
    \ 和 `Kind`。\n*   API 对象在单独的包中提供。\n*   API 对象是版本化的。\n*   提供了用于在不同版本之间进行转换的转换函数。\n\
    \nAPI Machinery 将提供以下实用工具：\n\n*   一个 `Scheme` 抽象，用于：\n    *   将 API 对象注册为 GVK（Group-Version-Kinds）\n\
    \    *   在不同版本的 API 对象之间进行转换\n    *   序列化/反序列化 API 对象\n*   一个 `RESTMapper`，用于映射\
    \ API 对象（基于嵌入的 `APIVersion` 和 `Kind`）和资源名称（按 REST 含义）。\n\n本章详细介绍了 API Machinery\
    \ 提供的函数。\n\n## Schema 包\n\n`API Machinery` 库的 `schema` 包定义了用于处理组（Group）、版本（Version）、种类（Kind）和资源（Resource）的有用结构和函数。\n\
    \n```go\nimport (\n\"k8s.io/apimachinery/pkg/runtime/schema\"\n)\n```\n\n定义了 `GroupVersionResource`、`GroupVersionKind`、`GroupVersion`、`GroupResource`\
    \ 和 `GroupKind` 等结构，并提供了在它们之间转换的方法。\n\n此外，还提供了 `GroupVersionKind` 与 `(apiVersion,\
    \ kind)` 之间的转换函数：`ToAPIVersionAndKind` 和 `FromAPIVersionAndKind`。\n\n![](img/533908_1_En_5_Fig1_HTML.png)\n\
    \n一个模型图描述了 API Machinery 的 schema。1. 组版本。2. 组资源。3. 组版本资源。4. 组版本种类。5. 组种类。6. API\
    \ 版本种类。1 和 3 之间的箭头表示 with resource 和 group version。2 和 3 之间表示 with version 和 group\
    \ resource。1 和 4 之间表示 with kind 和 group version。4 和 5 之间表示 with version 和 group\
    \ kind。\n\n图 5-1\n\nGVK 和 GVR 相关结构与方法\n\n## Scheme\n\n`Scheme` 是一个抽象，用于将 API 对象注册为\
    \ `Group-Version-Kinds`，在不同版本的 API 对象之间进行转换，以及序列化/反序列化 API 对象。`Scheme` 是由 API\
    \ Machinery 在 `runtime` 包中提供的一个结构。该结构的所有字段都是未导出的。\n"
- fmt: '### Initialization


    `Scheme`结构体可以通过`NewScheme`函数初始化：


    ```go

    import (

    "k8s.io/apimachinery/pkg/runtime"

    )

    Scheme := runtime.NewScheme()

    ```


    结构体初始化后，可以通过`AddKnownTypes`方法注册新的API对象：


    ```go

    func (s *Scheme) AddKnownTypes(gv schema.GroupVersion, types ...Object)

    ```


    例如，要将`Pod`和`ConfigMap`对象注册到`core/v1`组，可以这样写：


    ```go

    import (

    corev1 "k8s.io/api/core/v1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    )

    Scheme := runtime.NewScheme()

    func init() {

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "",

    Version: "v1",

    },

    &corev1.Pod{},

    &corev1.ConfigMap{},

    )

    }

    ```


    这样做之后，API Machinery就能知道，执行与`pods`相关的请求时应使用`Group-Version-Kind`为`core-v1-Pod`的`corev1.Pod`结构体，执行与`configmaps`相关的请求时应使用`core-v1-ConfigMap`的`corev1.ConfigMap`结构体。


    如所示，API对象可以版本化。你可以为不同版本注册同一类对象。例如，使用以下代码为`Deployment`对象添加`v1`和`v1beta1`版本：


    ```go

    import (

    appsv1 "k8s.io/api/apps/v1"

    appsv1beta1 "k8s.io/api/apps/v1beta1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    )

    Scheme := runtime.NewScheme()

    func init() {

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "apps",

    Version: "v1",

    },

    &appsv1.Deployment{},

    )

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "apps",

    Version: "v1beta1",

    },

    &appsv1beta1.Deployment{},

    )

    }

    ```


    建议在程序执行的最开始就初始化`Scheme`结构体并添加已知类型——例如，使用`init`函数。


    ### Mapping


    初始化之后，你可以使用结构体上的各种方法来映射`Group-Version-Kind`和Go类型：


    - `KnownTypes(gv schema.GroupVersion) map[string]reflect.Type` —— 获取为特定`Group-Version`注册的所有Go类型。例如，对于`apps/v1`：


    - `VersionsForGroupKind(gk schema.GroupKind) []schema.GroupVersion` —— 获取为特定`Kind`注册的所有`Group-Version`。例如，对于`Deployment`：


    ```go

    types := Scheme.KnownTypes(schema.GroupVersion{

    Group:   "apps",

    Version: "v1",

    })

    // -> ["Deployment": appsv1.Deployment]

    ```


    - `ObjectKinds(obj Object) ([]schema.GroupVersionKind, bool, error)` —— 获取给定对象的所有可能的`Group-Version-Kind`。例如，对于一个`appsv1.Deployment`：


    ```go

    groupVersions := Scheme.VersionsForGroupKind(

    schema.GroupKind{

    Group: "apps",

    Kind:  "Deployment",

    })

    // -> ["apps/v1" "apps/v1beta1"]

    ```


    - `New(kind schema.GroupVersionKind) (Object, error)` —— 根据给定的`Group-Version-Kind`构建一个对象：


    ```go

    gvks, notVersioned, err := Scheme.ObjectKinds(&appsv1.Deployment{})

    // -> ["apps/v1 Deployment"]

    ```


    - 该方法返回一个`runtime.Object`类型的值，该类型是所有API对象实现的接口。值的具体类型将是映射该`Group-Version-Kind`的对象——此处为`appsv1.Deployment`。


    ```go

    obj, err := Scheme.New(schema.GroupVersionKind{

    Group:   "apps",

    Version: "v1",

    Kind:    "Deployment",

    })

    ```


    ### Conversion


    `Scheme`结构体按`Group-Version`注册`Kind`。通过向`Scheme`提供同一Group下不同Version的`Kind`之间的转换函数，就可以在同一个Group的任何`Kind`之间进行转换。


    可以定义两种层次的转换函数：*转换函数*和*生成的转换函数*。转换函数是手动编写的函数，而生成的转换函数是使用`conversion-gen`工具生成的。


    在两版本之间进行转换时，如果存在手动编写的转换函数，它将优先于生成的转换函数。


    #### Adding Conversion Functions


    以下两个方法用于添加`a`和`b`之间的转换函数，`a`和`b`是属于同一Group的两个对象类型。


    ```go

    AddConversionFunc(

    a, b interface{},

    fn conversion.ConversionFunc,

    ) error

    AddGeneratedConversionFunc(

    a, b interface{},

    fn conversion.ConversionFunc,

    ) error

    ```


    `a`和`b`的值必须是指向结构体的指针，可以是空指针。转换函数的签名定义如下：


    ```go

    type ConversionFunc func(

    a, b interface{},

    scope Scope,

    ) error

    ```


    以下是一个示例，演示如何在`apps/v1`和`apps/v1beta1`的`Deployment`之间添加转换函数：


    ```go

    Scheme.AddConversionFunc(

    (*appsv1.Deployment)(nil),

    (*appsv1beta1.Deployment)(nil),

    func(a, b interface{}, scope conversion.Scope) error{

    v1deploy := a.(*appsv1.Deployment)

    v1beta1deploy := b.(*appsv1beta1.Deployment)

    // 在此处进行转换

    return nil

    })

    ```


    关于向Scheme注册已知类型，建议也是在程序执行的最开始注册转换函数——例如，使用`init`函数。


    #### Converting


    一旦注册了转换函数，就可以使用`Convert`函数在同一`Kind`的两个版本之间进行转换。


    ```go

    Convert(in, out interface{}, context interface{}) error

    ```


    以下示例定义了一个`v1.Deployment`，然后将其转换为`v1beta1`版本：


    ```go

    v1deployment := appsv1.Deployment{

    [...]

    }

    v1deployment.SetName("myname")

    var v1beta1Deployment appsv1beta1.Deployment

    scheme.Convert(&v1deployment, &v1beta1Deployment, nil)

    ```


    ### Serialization


    API Machinery库的包提供了多种格式的序列化器：JSON、YAML和Protobuf。这些序列化器实现了`Serializer`接口，该接口嵌入了`Encoder`和`Decoder`接口。首先，你将看到如何实例化不同格式的序列化器，然后是如何使用它们来编码和解码API对象。


    #### JSON and YAML Serializer


    `json`包提供了用于JSON和YAML格式的序列化器。


    ```go

    import (

    "k8s.io/apimachinery/pkg/runtime/serializer/json"

    )

    ```


    `NewSerializerWithOptions`函数用于创建一个新的序列化器。


    ```go

    NewSerializerWithOptions(

    meta      MetaFactory,

    creater   runtime.ObjectCreater,

    typer     runtime.ObjectTyper,

    options   SerializerOptions,

    ) *Serializer

    ```


    通过`options`，可以选择使用JSON还是YAML序列化器（`Yaml`字段）、选择JSON输出的可读格式（`Pretty`字段）以及检查JSON和YAML中的重复字段（`Strict`字段）。


    ```go

    type SerializerOptions struct {

    Yaml     bool

    Pretty   bool

    Strict   bool

    }

    ```


    `Scheme`可以用作`creator`和`typer`，因为它实现了这两个接口。`SimpleMetaFactory`结构体可以用作`meta`。


    ```go

    serializer := jsonserializer.NewSerializerWithOptions(

    jsonserializer.SimpleMetaFactory{},

    Scheme,

    Scheme,

    jsonserializer.SerializerOptions{

    Yaml: false, // 或 true 表示 YAML 序列化器

    Pretty: true, // 或 false 表示单行 JSON

    Strict: false, // 或 true 检查重复字段

    },

    )

    ```


    #### Protobuf Serializer


    `protobuf`包提供了用于Protobuf格式的序列化器。


    ```go

    import (

    "k8s.io/apimachinery/pkg/runtime/serializer/protobuf"

    )

    ```


    `NewSerializer`函数用于创建一个新的序列化器。


    ```go

    NewSerializer(

    creater     runtime.ObjectCreater,

    typer     runtime.ObjectTyper,

    ) *Serializer

    ```


    `Scheme`可以用作`creator`和`typer`，因为它实现了这两个接口。


    ```go

    serializer := protobuf.NewSerializer(Scheme, Scheme)

    ```'
  raw: '### Initialization


    The **Scheme** structure can be initialized with the **NewScheme** function:


    ```

    import (

    "k8s.io/apimachinery/pkg/runtime"

    )

    Scheme := runtime.NewScheme()

    ```


    After the structure is initialized, you can register new API objects with the
    **AddKnownTypes** method as follows:


    ```

    func (s *Scheme) AddKnownTypes(gv schema.GroupVersion, types ...Object)

    ```


    For example, to register the **Pod** and **ConfigMap** objects into the **core/v1**
    group, you could use:


    ```

    import (

    corev1 "k8s.io/api/core/v1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    )

    Scheme := runtime.NewScheme()

    func init() {

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "",

    Version: "v1",

    },

    &corev1.Pod{},

    &corev1.ConfigMap{},

    )

    }

    ```


    By doing this, the API Machinery will be able to know that the **Group-Version-Kind**
    *core-v1-Pod* to be used when executing requests related to *pods* must be the
    **corev1.Pod** structure, and the *core-v1-ConfigMap* to be used when executing
    requests related to *configmaps* must be the **corev1.ConfigMap** structure.


    It has been shown that the API objects can be versioned. You can register a same
    kind for various versions this way—for example, use the following to add the **v1**
    and **v1beta1** versions of the **Deployment** object:


    ```

    import (

    appsv1 "k8s.io/api/apps/v1"

    appsv1beta1 "k8s.io/api/apps/v1beta1"

    "k8s.io/apimachinery/pkg/runtime"

    "k8s.io/apimachinery/pkg/runtime/schema"

    )

    Scheme := runtime.NewScheme()

    func init() {

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "apps",

    Version: "v1",

    },

    &appsv1.Deployment{},

    )

    Scheme.AddKnownTypes(

    schema.GroupVersion{

    Group:   "apps",

    Version: "v1beta1",

    },

    &appsv1beta1.Deployment{},

    )

    }

    ```


    It is advisable to initialize the **Scheme** structure and to add known types
    to it at the very beginning of the execution—for example, using the **init** functions.


    ### Mapping


    After initialization, you can use various methods on the structure to map between
    Goup-Version-Kinds and Go **Types**:


    *   `KnownTypes(gv schema.GroupVersion) map[string]reflect.Type` – gets all the
    Go types registered for a specific **Group-Version**—here **apps/v1**:


    *   `VersionsForGroupKind(gk schema.GroupKind) []schema.GroupVersion – g`ets all
    the **Group-Versions** registered for a specific *Kind*—here the **Deployment**:


    ```

    types := Scheme.KnownTypes(schema.GroupVersion{

    Group:   "apps",

    Version: "v1",

    })

    -> ["Deployment": appsv1.Deployment]

    ```


    *   `ObjectKinds(obj Object) ([]schema.GroupVersionKind, bool, error) – g`ets
    all the possible Group-Version-Kinds for a given object—here an **appsv1.Deployment**:


    ```

    groupVersions := Scheme.VersionsForGroupKind(

    schema.GroupKind{

    Group: "apps",

    Kind:  "Deployment",

    })

    -> ["apps/v1" "apps/v1beta1"]

    ```


    *   `New(kind schema.GroupVersionKind) (Object, error) –` builds an object, given
    a Group-Version-Kind:


    ```

    gvks, notVersioned, err := Scheme.ObjectKinds(&appsv1.Deployment{})

    -> ["apps/v1 Deployment"]

    ```


    *   This method returns a value of type **runtime.Object**, which is an interface
    implemented by all the API objects. The concrete type of the value will be the
    object mapping the Group-Version-Kind—here **appsv1.Deployment**.


    ```

    obj, err := Scheme.New(schema.GroupVersionKind{

    Group:   "apps",

    Version: "v1",

    Kind:    "Deployment",

    })

    ```


    ### Conversion


    The **Scheme** structure registers *Kind*s by Group-Version. By providing to the
    **Scheme** conversion functions between kinds of the same Group and different
    Versions, it is then possible to convert between any kinds of the same Group.


    It is possible to define conversion functions of two levels: *conversion functions*
    and *generated conversion functions*. Conversion functions are functions written
    by hand, when generated conversion functions are generated using the **conversion-gen**
    tool.


    When converting between two versions, the conversion function, if it exists, will
    take priority over the generated conversion function.


    #### Adding Conversion Functions


    These two methods add a conversion function between **a** and **b**, which are
    two objects of types belonging to the same Group.


    ```

    AddConversionFunc(

    a, b interface{},

    fn conversion.ConversionFunc,

    ) error

    AddGeneratedConversionFunc(

    a, b interface{},

    fn conversion.ConversionFunc,

    ) error

    ```


    The **a** and **b** values must be pointers to structures and can be nil pointers.
    The signature of the conversion function is defined as follows:


    ```

    type ConversionFunc func(

    a, b interface{},

    scope Scope,

    ) error

    ```


    Here is an example, to add a conversion function between **apps/v1** and **apps/v1beta1**
    deployments:


    ```

    Scheme.AddConversionFunc(

    (*appsv1.Deployment)(nil),

    (*appsv1beta1.Deployment)(nil),

    func(a, b interface{}, scope conversion.Scope) error{

    v1deploy := a.(*appsv1.Deployment)

    v1beta1deploy := b.(*appsv1beta1.Deployment)

    // make conversion here

    return nil

    })

    ```


    As for registering known types to the scheme, the recommendation is to register
    conversion functions at the very beginning of the execution—for example, using
    **init** functions.


    #### Converting


    Once conversion functions have been registered, it is possible to convert between
    two versions of the same kind with the **Convert** function.


    ```

    Convert(in, out interface{}, context interface{}) error

    ```


    This example defines a **v1.Deployment**, then converts it to the **v1beta1**
    version:


    ```

    v1deployment := appsv1.Deployment{

    [...]

    }

    v1deployment.SetName("myname")

    var v1beta1Deployment appsv1beta1.Deployment

    scheme.Convert(&v1deployment, &v1beta1Deployment, nil)

    ```


    ### Serialization


    Packages of the API Machinery Library provide serializers for various formats:
    JSON, YAML, and Protobuf. These serializers implement the **Serializer** interface,
    which embeds the **Encoder** and **Decoder** interfaces. First, you can see how
    to instantiate serializers for different formats, then how to use them to encode
    and decode API objects.


    #### JSON and YAML Serializer


    The **json** package provides a serializer for both JSON and YAML formats.


    ```

    import (

    "k8s.io/apimachinery/pkg/runtime/serializer/json"

    )

    ```


    The **NewSerializerWithOptions** function is used to create a new serializer.


    ```

    NewSerializerWithOptions(

    meta      MetaFactory,

    creater   runtime.ObjectCreater,

    typer     runtime.ObjectTyper,

    options   SerializerOptions,

    ) *Serializer

    ```


    The options give the possibility to choose between a JSON and a YAML serializer
    (**Yaml** field) to choose a human-readable output for a JSON output (**Pretty**
    field) and to check for duplicate fields in JSON and YAML (**Strict** fields).


    ```

    type SerializerOptions struct {

    Yaml     bool

    Pretty   bool

    Strict   bool

    }

    ```


    The **Scheme** can be used for **creator** and **typer** because it implements
    these two interfaces, and the **SimpleMetaFactory** structure can be used as **meta**.


    ```

    serializer := jsonserializer.NewSerializerWithOptions(

    jsonserializer.SimpleMetaFactory{},

    Scheme,

    Scheme,

    jsonserializer.SerializerOptions{

    Yaml: false, // or true for YAML serializer

    Pretty: true, // or false for one-line JSON

    Strict: false, // or true to check duplicates

    },

    )

    ```


    #### Protobuf Serializer


    The **protobuf** package provides a serializer for a Protobuf format.


    ```

    import (

    "k8s.io/apimachinery/pkg/runtime/serializer/protobuf"

    )

    ```


    The **NewSerializer** function is used to create a new serializer.


    ```

    NewSerializer(

    creater     runtime.ObjectCreater,

    typer     runtime.ObjectTyper,

    ) *Serializer

    ```


    The **Scheme** can be used for **creator** and **typer** because it implements
    these two interfaces.


    ```

    serializer := protobuf.NewSerializer(Scheme, Scheme)

    ```'
