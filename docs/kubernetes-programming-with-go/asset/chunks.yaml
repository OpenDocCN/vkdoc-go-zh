  trans: '

    # 2. Kubernetes API 操作


    前一章介绍了 Kubernetes API 遵循 REST 原则，使用户能够操作资源。


    在本章中，你将学习如何通过直接发起 HTTP 请求来执行各种操作。在日常工作中，你可能不需要直接与 HTTP 层交互，但理解 API 在这一层面的工作原理是非常重要的，这样你才能更好地理解如何使用更高级的库来调用它。


    ## 检查请求


    在开始编写自己的 HTTP 请求之前，你可以使用 `kubectl` 检查执行 `kubectl` 命令时使用了哪些请求。这可以通过在命令后添加详细输出标志
    `-v` 并将值设置为大于或等于 `6` 来实现。表 2-1 显示了每个级别展示的信息。


    例如，如果你想了解获取所有命名空间的 Pod 时调用了哪个 URL，可以使用以下命令：


    ```

    $ kubectl get pods --all-namespaces -v6

    loader.go:372] Config loaded from file:  /home/user/.kube/config

    round_trippers.go:553] GET https://192.168.1.194:6443/api/v1/pods?limit=500 200
    OK in 745 milliseconds

    ```


    在命令的输出中，你可以看到使用的路径是 `/api/v1/pods`。或者，当获取特定命名空间中的 Pod 时，你可以看到使用的路径是 `/api/v1/namespaces/default/pods`：


    ```

    $ kubectl get pods --namespace default -v6

    loader.go:372] Config loaded from file:  /home/user/.kube/config

    round_trippers.go:553] GET https://192.168.1.194:6443/api/v1/namespaces/default/pods?limit=500
    200 OK in 138 milliseconds

    ```


    表 2-1


    详细级别


    | 级别 | 方法和 URL | 请求时序 | 事件时序 | 请求头 | 响应状态 | 响应头 | Curl 命令 | 主体长度 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | `-v 6` | 是 | 是 | – | – | – | – | – | 0 |

    | `-v 7` | 是 | – | – | 是 | 是 | – | – | 0 |

    | `-v 8` | 是 | – | – | 是 | 是 | 是 | - | ≤ 1024 |

    | `-v 9` | 是 | 是 | 是 | – | – | 是 | 是 | ≤ 10240 |

    | `-v 10` | 是 | 是 | 是 | – | – | 是 | 是 | ∞ |


    ## 发起请求


    本节将探讨你可以对 Kubernetes 资源执行的所有可能操作。


    ### 使用 `kubectl` 作为代理


    你必须通过认证才能向集群的 Kubernetes API 发起请求，除非你的集群接受未经认证的请求，但这种情况不太可能。


    一种发送经过身份验证的 HTTP 请求的方法是使用 `kubectl` 作为代理来处理身份验证。为此，可以使用 `kubectl proxy` 命令：


    ```

    $ kubectl proxy

    Starting to serve on 127.0.0.1:8001

    ```


    现在，你可以在一个新的终端中运行你的 HTTP 请求，而无需任何身份验证。接下来，定义一个 `HOST` 变量来访问该代理：


    ```

    $ HOST=http://127.0.0.1:8001

    ```


    ### 创建资源


    您可以通过首先创建一个描述此资源的 Kubernetes 清单来创建新资源——例如，要创建一个 Pod，你可以编写：


    ```

    $ cat > pod.yaml <<EOF

    apiVersion: v1

    kind: Pod

    metadata:

    name: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    ```


    然后，你需要将资源描述作为 POST 请求的主体传递（注意，因为正在使用 `--data-binary` 标志，所以 `-X POST` 标志可以省略）。例如，要创建一个
    Pod 资源，请使用：


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    -H "Content-Type: application/yaml"

    --data-binary @pod.yaml

    ```


    这等同于运行以下 `kubectl` 命令：


    ```

    $ kubectl create --namespace project1 -f pod.yaml -o json

    ```


    请注意，命名空间未在 `pod.yaml` 文件中指明。如果你添加了它，则必须在 YAML 文件和路径中指定相同的命名空间，否则你会收到错误——也就是说，所提供对象的命名空间与请求中发送的命名空间不匹配。


    ### 获取资源信息


    你可以使用 GET 请求来获取特定资源的信息，并在路径中将其名称作为参数传递（如果是命名空间范围的资源，还需要传递其命名空间）。在此示例中，你将请求 `project1`
    命名空间中名为 `nginx` 的 `pod` 的信息：


    ```

    $ curl -X GET

    $HOST/api/v1/namespaces/project1/pods/nginx

    ```


    这将使用与此资源关联的类型作为结构，以 JSON 格式返回资源信息；在此示例中，它是一个 `Pod` 类型。这等同于运行以下 `kubectl` 命令：


    ```

    $ kubectl get pods --namespace project1 nginx -o json

    ```


    ### 获取资源列表


    对于命名空间范围的资源，你可以获取集群范围内或特定命名空间中的资源列表。对于非命名空间范围的资源，你可以获取资源列表。无论哪种情况，你都将使用 GET 请求。


    #### 集群范围


    要获取集群范围内（针对命名空间范围或非命名空间范围的资源）的资源列表，例如，对于 Pod 资源，请使用以下命令：


    ```

    $ curl $HOST/api/v1/pods

    ```


    这将使用 `PodList` 类型，返回所有命名空间中 Pod 列表的信息。这等同于运行以下 `kubectl` 命令：


    ```

    $ kubectl get pods --all-namespaces -o json

    ```


    #### 在特定命名空间中


    要获取特定命名空间中的资源列表，你需要在路径中指明命名空间；例如，对于 Pod 资源，请使用以下命令：


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    ```


    这将使用 `PodList` 类型，返回 `project1` 命名空间中 Pod 列表的信息。这等同于运行以下 `kubectl` 命令：


    ```

    $ kubectl get pods --namespace project1 -o json

    ```


    ### 过滤列表结果


    当执行 *list* 请求时，你会获得该类型、在指定命名空间或集群范围内的完整资源列表，具体取决于你的请求。


    你可能希望过滤结果。在 Kubernetes 中过滤资源最常用的方法是使用 *标签*。为此，资源需要定义标签；然后，在 *list* 请求期间，你可以定义一些
    *标签选择器*。还可以通过使用 *字段选择器*，基于有限的字段集来过滤资源。

    '
- fmt: '### Using Label Selectors


    All Kubernetes resources can define labels. For example, when creating pods, you
    can define some labels with `kubectl`:


    ```

    $ kubectl run nginx1 --image nginx --labels mylabel=foo

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    ```


    This results in pods with labels defined in the metadata part of the resource:


    ```

    $ kubectl get pods nginx1 -o yaml

    apiVersion: v1

    kind: Pod

    metadata:

    labels:

    mylabel: foo

    name: nginx1

    [...]

    $ kubectl get pods nginx2 -o yaml

    apiVersion: v1

    kind: Pod

    metadata:

    labels:

    mylabel: bar

    name: nginx2

    [...]

    ```


    Now, when running a *list* request, you can define some *label selectors* to filter
    these resources by using the `labelSelector` query parameter, which can contain
    a comma-separated list of selectors.


    - Select all the resources defining a specific label, no matter its value; for
    example, the `mylabel` label:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel

    ```


    - Select all resources not defining a specific label; for example, the `mylabel`
    label:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=\!mylabel

    ```


    Note the exclamation point (`!`) before the label name—the backslash character
    (`\`) is being used because the exclamation point is a special character for the
    shell.


    - Select all resources defining a label with a specific value; for example, `mylabel`
    having the value `foo`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo

    ```


    or


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel=foo

    ```


    - Select all resources defining a label with a value different from a specific
    one; for example, the label `mylabel` having a value different from `foo`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel\!=foo

    ```


    Note the exclamation point (`!`) before the equal sign (`=`)—the backslash character
    (`\`) is being used because the exclamation point is a special character for the
    shell.


    - Select all resources defining a label with a value in a set of values; for example,
    the label `mylabel` having one of the values `foo` or `baz`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel+in+(foo,baz)

    ```


    Note the plus characters (`+`) that encodes spaces in the URL. The original selector
    being: `mylabel in (foo,baz)`.


    - Select all resources defining a label with a value not in a set of values; for
    example, the label `mylabel` having a value different from `foo` or `baz`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel+notin+(foo,baz)

    ```


    Note the plus characters (`+`) that encodes spaces in the URL. The original selector
    being: `mylabel not in (foo,baz)`.


    You can combine several selectors by separating them with a comma. This will act
    as an *AND* operator. For example, to select all resources with a label `mylabel`
    defined *and* a label `otherlabel` being equal to `bar`, you can use the following
    label selector:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel,otherlabel==bar

    ```


    ### Using Field Selectors


    You can filter resources using a limited set of fields. For all resources, you
    can filter on the `metadata.name` field; and for all namespaced resources, you
    can filter on the `metadata.namespace` field.


    Here is the list of additional fields available for filtering, depending on resources,
    for Kubernetes 1.23:


    `core.event:`

    - `involvedObject.apiVersion`

    - `involvedObject.fieldPath`

    - `involvedObject.kind`

    - `involvedObject.name`

    - `involvedObject.namespace`

    - `involvedObject.resourceVersion`

    - `involvedObject.uid`

    - `reason`

    - `reportingComponent`

    - `source`

    - `type`


    `core.namespace:`

    - `status.phase`


    `core.node:`

    - `spec.unschedulable`


    `core.pod:`

    - `spec.nodeName`

    - `spec.restartPolicy`

    - `spec.schedulerName`

    - `spec.serviceAccountName`

    - `status.nominatedNodeName`

    - `status.phase`

    - `status.podIP`


    `core.replicationcontroller:`

    - `status.replicas`


    `core.secret:`

    - `type`


    `apps.replicaset:`

    - `status.replicas`


    `batch.job:`

    - `status.successful`


    `certificates.certificatesigningrequest:`

    - `spec.signerName`


    Now, when running a *list* request, you can indicate some *field selectors* to
    filter these resources by using the `fieldSelector` parameter, which can contain
    a comma-separated list of selectors.


    - Select all resources for which a field has a specific value; for example, the
    field `status.phase` having the value `Running`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase==Running

    ```


    or


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase=Running

    ```


    - Select all resources for which a field has a value different from a specific
    one; for example, the field `status.phase` having a value different from `Running`:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase\!=Running

    ```


    Note the exclamation point (`!`) before the equal sign (`=`)—the backslash character
    (`\`) is being used because the exclamation point is a special character for the
    shell.


    You can combine several selectors by separating them with a comma. This will act
    as an *AND* operator. For example, to select all pods with a *phase* being equal
    to `Running` and a *restart policy* not being `Always`, you can use this field
    selector:


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase==Running,spec.restartPolicy\!=Always

    ```


    ### Deleting a Resource


    To delete a resource, you need to specify its name (and namespace for namespaced
    resources) in the path and use a `DELETE` request. For example, to delete a pod,
    use the following:


    ```

    $ curl -X DELETE $HOST/api/v1/namespaces/project1/pods/nginx

    ```


    This will return the information about the deleted resource in the JSON format,
    using the kind associated with the resource—in this case, a `Pod` kind.


    This is equivalent to running the `kubectl` command (except that you cannot get
    information about the deleted resource, only its name with the `-o name` flag):


    ```

    $ kubectl delete pods --namespace project1 nginx

    ```


    ### Deleting a Collection of Resources


    It also is possible to delete a collection of a given resource in a specific namespace,
    using a `DELETE` request; and, for namespaced resources, indicating the namespace
    in the path:


    ```

    $ curl -X DELETE $HOST/api/v1/namespaces/project1/pods

    ```


    This will return the information about the deleted resources in the JSON format,
    using the List kind associated with the resource; in this example, the `PodList`
    kind.


    This is equivalent to running the `kubectl` command (except that you cannot get
    information about the deleted resources, only their names with the `-o name` flag):


    ```

    $ kubectl delete pods --namespace project1 --all

    ```


    Note that it is not possible to delete all resources of a specific kind from all
    namespaces in a single request the way you could do it with the `kubectl` command:
    `kubectl delete pods --all-namespaces --all`.'
