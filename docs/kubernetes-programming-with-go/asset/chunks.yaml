- fmt: '### Watching Resources


    The Kubernetes API lets you *watch* resources. This means that your request will
    not terminate immediately, but it will instead be a long-running request that
    will send a JSON stream as a response, adding JSON objects to the stream when
    the watched resources change. A JSON stream is a series of JSON objects separated
    by new lines—for example:


    ```

    { "type": "ADDED", "object": ... }

    { "type": "DELETED", "object": ... }

    ```


    The request for watching resources is like the one used to list resources with
    a `watch` parameter added as a `query` parameter. For example, to watch the pods
    of the `project1` namespace, you can send this request:


    ```

    $ curl "$HOST/api/v1/namespaces/project1/pods?watch=true"

    ```


    Each JSON object of the stream is called, in Kubernetes terminology, a *Watch
    Event*, and it will contain two fields: `type` and `object`. The value for the
    `type` can be `ADDED`, `MODIFIED`, `DELETED`, `BOOKMARK`, or `ERROR`. For each
    type, the object is as described in Table [2-2](#533908_1_En_2_Chapter.xhtml#Tab2).


    Table 2-2


    Object Description for Each Type of Watch Event


    | Type value | Object description |

    | --- | --- |

    | `ADDEDMODIFIED` | The new state of the resource, using its kind (e.g., `Pod`).
    |

    | `DELETED` | The state of the resource immediately before it is deleted, using
    its kind (e.g., `Pod`). |

    | `BOOKMARK` | The resource version, using its kind (e.g., `Pod`), with only the
    `resourceVersion` field set. Later in this chapter, you will see in which circumstances
    this type is used. |

    | `ERROR` | An object that describes the error. |


    When this request is executed, you will immediately get a series of `ADDED` JSON
    objects, describing all the resources present in the cluster at the time of the
    request; eventually, this is followed by other events when the resources are created,
    modified, or deleted in the cluster. This is equivalent to running the `kubectl`
    command, with the difference that the `type` field will not be given and the object’s
    content will be given directly:


    ```

    $ kubectl get pods --namespace project1 --watch -o json

    ```


    ### Filtering During a Watch Session


    It is possible to filter the results returned by a *watch* request by using either
    label selectors or field selectors, using the same `labelSelectors` and `fieldSelectors`
    as discussed earlier in the [Filtering the Result](#533908_1_En_2_Chapter.xhtml#Sec9)
    of a List section.


    ### Watching After Listing Resources


    Instead of getting the resources present at the time of the request as part of
    the *watch* response, you could first run a *list* request to find the list of
    present resources, then run a *watch* request to obtain the modifications on these
    resources. By doing this, there is a risk that some modifications may happen between
    the *list* request and the start of the *watch* request, and that you do not get
    informed about these modifications.


    For this scenario, you can use the `resourceVersion` value returned by the *list*
    request to indicate at which point in time you want to start your *watch* request.
    (Note: You need to get the `resourceVersion` into the *List* structure, not from
    an item.)


    As an example, you can first get the list of pods by using the command:


    ```

    $ curl $HOST/api/v1/pods

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2433789"

    },

    "items": [ ... ]

    }

    ```


    As a response to this first request, you get a `resourceVersion` and a list of
    resources present at the time of the request in the `items` field. Then, you can
    execute the *watch* request by specifying this `resourceVersion`:


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2433789"

    ```


    As a result, you will not receive data immediately in the response body that describes
    the resources present in the cluster; you will receive data only when some resources
    are modified, added, or deleted.


    ### Restarting a *Watch* Request


    The *watch* request may be interrupted, and you may want to restart it from the
    last modification received (or a previous one) during the process.


    For this, each resource part of a `DELETE`, `ADDED`, or `MODIFIED` JSON object
    in the *watch* response contains a `resourceVersion`, and you can use this to
    execute a new *watch* request starting just after the specified modification.
    For example, you can start a *watch* request that is interrupted after a few modifications:


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true"

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2435623", ...}, ...}}

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2354893", ...}, ...}}

    {"type":"MODIFIED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436655", ...}, ...}}

    {"type":"DELETED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436677", ...}, ...}}

    ```


    Then, you can restart the *watch* request by beginning at any time during the
    previous request or starting after the latest modification:


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2436677"

    ```


    Or begin after a previous modification. In this way, you will receive the latest
    modification again:


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2436655"

    {"type":"DELETED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436677", ...}, ...}}

    ```'
