    # Personalizing the Custom Resource


    The `kubebuilder create api` command has created as a template a resource with
    `Spec` and `Status` fields, the Spec containing a `Foo` field and the Status being
    empty.


    In this section, you will find out how to update this template to add the necessary
    fields.


    ## Editing the Go Structures


    You can edit the file `api/v1alpha1/myresource_types.go` to personalize the custom
    resource. In this example, you will use the `Image` and `Memory` fields for the
    `Spec`, and a `State` field for the `Status`:


    ```

    // MyResourceSpec defines the desired state of MyResource

    type MyResourceSpec struct {

    Image  string            `json:"image"`

    Memory resource.Quantity `json:"memory"`

    }

    // MyResourceStatus defines the observed state of MyResource

    type MyResourceStatus struct {

    State string `json:"state"`

    }

    ```


    ## Enabling the Status Subresource


    You can see the annotations in the comments preceding the `MyResource` structure.


    The first annotation `//+kubebuilder:object:root=true` indicates that `MyResource`
    is a *Kind*. With this annotation, `kubebuilder` will generate the `DeepCopyObject()`
    method for this structure. See Chapter [9](#533908_1_En_9_Chapter.xhtml)''s "Adding
    Annotations" section for more details.


    The second annotation `//+kubebuilder:subresource:status` indicates that the `status`
    subresource must be enabled for `MyResource`. With this annotation, `kubebuilder`
    will add the status as subresource in the YAML definition of the CRD in `config/crd/bases/`.
    See Chapter [8](#533908_1_En_8_Chapter.xhtml)''s "Definition of the Resource Versions"
    section for more details.


    The `Status` is being enabled by default, so you do not have to make any changes
    to these annotations.


    ## Defining Printer Columns


    Chapter [8](#533908_1_En_8_Chapter.xhtml)''s "Additional Printer Columns" section
    has shown how to declare printer columns for a custom resource by editing the
    YAML definition of the CRD.


    Using `kubebuilder`, the YAML definition of the CRD is autogenerated, so you cannot
    edit it directly. Instead, you can use the `+kubebuilder:printcolumn` annotation.
    Each annotation accepts `name`, `type`, and `JSONPath` values, similar to the
    `additionalPrinterColumns` entries in the YAML definition.


    As an example, adding the following annotations will define `Image`, `State`,
    and `Age` printer columns:


    ```

    // +kubebuilder:printcolumn:name="Image",type=string,

    JSONPath=`.spec.image`

    // +kubebuilder:printcolumn:name="State",type=string,

    JSONPath=`.status.state`

    // +kubebuilder:printcolumn:name="Age",type="date",

    JSONPath=".metadata.creationTimestamp"

    ```'
