- fmt: '#### Overriding kubeconfig with CLI Flags


    It has been shown that the second parameter of this function, `NewNonInteractiveDeferredLoadingClientConfig`,
    is a `ConfigOverrides` structure. This structure contains values to override some
    fields of the result of merging the `kubeconfig` files.


    You can set specific values in this structure yourself, or, if you are creating
    a CLI using the `spf13/pflag` library (i.e., [github.com/spf13/pflag](http://github.com/spf13/pflag)),
    you can use the following code to automatically declare default flags for your
    CLI and bind them to the `ConfigOverrides` structure:


    ```go

    import (

    "github.com/spf13/pflag"

    "k8s.io/client-go/tools/clientcmd"

    )

    var (

    flags pflag.FlagSet

    overrides clientcmd.ConfigOverrides

    of = clientcmd.RecommendedConfigOverrideFlags("")

    )

    clientcmd.BindOverrideFlags(&overrides, &flags, of)

    flags.Parse(os.Args[1:])

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    &overrides,

    ).ClientConfig()

    ```


    Note that you can declare a prefix for the added flags when calling the function
    `RecommendedConfigOverrideFlags`.


    ## Getting a Clientset


    The Kubernetes package provides functions to create a clientset of the type `kubernetes.Clientset`.


    - `func NewForConfig(c *rest.Config) (*Clientset, error)` – The `NewForConfig`
    function returns a `Clientset`, using the provided `rest.Config` built with one
    of the methods seen in the previous section.


    - `func NewForConfigOrDie(c *rest.Config) *Clientset` – this function is like
    the previous one, but panics in case of error, instead of returning the error.
    This function can be used with a hard-coded config for which you will want to
    assert its validity.


    - The `NewForConfigAndClient` function returns a `Clientset`, using the provided
    `rest.Config`, and the provided `http.Client`.


    - The previous function `NewForConfig` uses a default HTTP Client built with the
    function `rest.HTTPClientFor`. If you want to personalize the HTTP Client before
    building the `Clientset`, you can use this function instead.


    ```go

    NewForConfigAndClient(

    c *rest.Config,

    httpClient *http.Client,

    ) (*Clientset, error)

    ```


    ## Using the Clientset


    The `kubernetes.Clientset` type implements the interface `kubernetes.Interface`,
    defined as follows:


    ```go

    type Interface interface {

    Discovery() discovery.DiscoveryInterface

    [...]

    AppsV1()          appsv1.AppsV1Interface

    AppsV1beta1()     appsv1beta1.AppsV1beta1Interface

    AppsV1beta2()     appsv1beta2.AppsV1beta2Interface

    [...]

    CoreV1()           corev1.CoreV1Interface

    [...]

    }

    ```


    The first method `Discovery()` gives access to an interface that provides methods
    to discover the groups, versions, and resources available in the cluster, as well
    as preferred versions for resources. This interface also provides access to the
    server version and the OpenAPI v2 and v3 definitions. This is examined in detail
    in the Discovery client section.


    Apart from the `Discovery()` method, the `kubernetes.Interface` is composed of
    a series of methods, one for each Group/Version defined by the Kubernetes API.
    When you see the definition of this interface, it is possible to understand that
    the `Clientset` is a set of clients, and each client is dedicated to its own Group/Version.


    Each method returns a value that implements an interface specific to the Group/Version.
    For example, the `CoreV1()` method of `kubernetes.Interface` returns a value,
    implementing the interface `corev1.CoreV1Interface`, defined as follows:


    ```go

    type CoreV1Interface interface {

    RESTClient() rest.Interface

    ComponentStatusesGetter

    ConfigMapsGetter

    EndpointsGetter

    [...]

    }

    ```


    The first method in this `CoreV1Interface` interface is `RESTClient() rest.Interface`,
    which is a method used to get a `REST` client for the specific Group/Version.
    This low-level client will be used internally by the Group/Version client, and
    you can use this `REST` client to build requests not provided natively by the
    other methods of this interface: `CoreV1Interface`.


    The interface `rest.Interface` implemented by the `REST` client is defined as
    follows:


    ```go

    type Interface interface {

    GetRateLimiter()            flowcontrol.RateLimiter

    Verb(verb string)           *Request

    Post()                      *Request

    Put()                       *Request

    Patch(pt types.PatchType)   *Request

    Get()                       *Request

    Delete()                    *Request

    APIVersion()                schema.GroupVersion

    }

    ```


    As you can see, this interface provides a series of methods—`Verb`, `Post`, `Put`,
    `Patch`, `Get`, and `Delete`—that return a `Request` object with a specific HTTP
    `Verb`. This is examined further in the “How to Use These `Request` Objects to
    Complete Operations” section.


    The other methods in the `CoreV1Interface` are used to get specific methods for
    each Resource of the Group/Version. For example, the `ConfigMapsGetter` embedded
    interface is defined as follows:


    ```go

    type ConfigMapsGetter interface {

    ConfigMaps(namespace string) ConfigMapInterface

    }

    ```


    Then, the interface `ConfigMapInterface` is returned by the method `ConfigMaps`
    and is defined as follows:


    ```go

    type ConfigMapInterface interface {

    Create(

    ctx context.Context,

    configMap *v1.ConfigMap,

    opts metav1.CreateOptions,

    ) (*v1.ConfigMap, error)

    Update(

    ctx context.Context,

    configMap *v1.ConfigMap,

    opts metav1.UpdateOptions,

    ) (*v1.ConfigMap, error)

    Delete(

    ctx context.Context,

    name string,

    opts metav1.DeleteOptions,

    ) error

    [...]

    }

    ```


    You can see that this interface provides a series of methods, one for each *Kubernetes
    API Verb*.


    Each method related to an operation takes as a parameter an Option structure,
    named after the name of the operation: `CreateOptions`, `UpdateOptions`, `DeleteOptions`,
    and so on. These structures, and the related constants, are defined in this package:
    `k8s.io/apimachinery/pkg/apis/meta/v1`.


    Finally, to make an operation on a resource of a Group-Version, you can chain
    the calls following this pattern for namespaced resources, where `namespace` can
    be the empty string to indicate a cluster-wide operation:


    ```go

    clientset.

    GroupVersion().

    NamespacedResource(namespace).

    Operation(ctx, options)

    ```


    Then, the following is the pattern for non-namespaced resources:


    ```go

    clientset.

    GroupVersion().

    NonNamespacedResource().

    Operation(ctx, options)

    ```


    For example, use the following to *List* the *Pods* of the *core/v1* Group/Version
    in namespace `project1`:


    ```go

    podList, err := clientset.

    CoreV1().

    Pods("project1").

    List(ctx, metav1.ListOptions{})

    ```


    To get the *list* of *pods* in *all* namespaces, you need to specify an empty
    namespace name:


    ```go

    podList, err := clientset.

    CoreV1().

    Pods("").

    List(ctx, metav1.ListOptions{})

    ```


    To get the list of nodes (which are non-namespaced resources) use this:


    ```go

    nodesList, err := clientset.

    CoreV1().

    Nodes().

    List(ctx, metav1.ListOptions{})

    ```


    The following sections describe in detail the various operations using the *Pod*
    resource. You can apply the same examples by removing the namespace parameter
    when working with non-namespaced resources.


    ## Examining the Requests


    If you want to know which HTTP requests are executed when calling client-go methods,
    you can enable logging for your program. The Client-go Library uses the `klog`
    library ([https://github.com/kubernetes/klog](https://github.com/kubernetes/klog)),
    and you can enable the log flags for your command with the following code:


    ```go

    import (

    "flag"

    "k8s.io/klog/v2"

    )

    func main() {

    klog.InitFlags(nil)

    flag.Parse()

    [...]

    }

    ```


    Now, you can run your program with the flag `-v <level>`—for example, `-v 6` to
    get the URL called for every request. You can find more detail about the defined
    log levels in Table [2-1](#533908_1_En_2_Chapter.xhtml#Tab1).'
