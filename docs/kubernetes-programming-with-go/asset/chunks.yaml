- fmt: '# 10. Writing Operators with the `controller-runtime` Library


    As you have seen in Chapter [1](#533908_1_En_1_Chapter.xhtml), the *Controller
    Manager* is an important piece of the Kubernetes architecture. It embeds several
    *Controllers* and the role of each is to watch for instances of a specific high-level
    resource (Deployments, etc.) and use low-level resources (Pods, etc.) to implement
    these high-level instances.


    As an example, Kubernetes users can create a Deployment when they want to deploy
    a stateless application. This deployment defines a *Pod Template* that is used
    to create Pods in the cluster as well as several specifications. The following
    are the most important specifications:


    - *The number of replicas*: the identical Pods the controller must deploy for
    a single Deployment instance.

    - *The deployment strategy*: the way the Pods are replaced when the pod template
    is updated.

    - *The default strategy*: a *Rolling Update* can be used to update an application
    to a new version without service interruption, and it accepts various parameters.
    A simpler strategy, *Recreate*, also exists that will first stop a Pod before
    starting its replacement.


    The *Deployment Controller* will create instances of `ReplicaSet` resources, one
    for each new version of the Pod Template, and update the number of replicas of
    these `ReplicaSets` to satisfy the replicas and strategy specifications. You will
    find `ReplicaSet` with zero replicas for decommissioned versions, and a `ReplicaSet`
    with a positive number of replicas for the actual version of your application.
    During a *Rolling Update*, two `ReplicaSets` will have a positive number of replicas
    (the new one with an increasing number, and the previous one with a decreasing
    number) so as to be able to transition between the two versions without service
    interruption.


    On its side, the *ReplicaSet Controller* will be responsible for maintaining the
    requested number of Pod replicas for each `ReplicaSet` instance created by the
    *Deployment Controller*.


    Chapter [8](#533908_1_En_8_Chapter.xhtml) has shown that it is possible to define
    new Kubernetes resources to extend the Kubernetes API. Even though the native
    Controller Manager runs controllers to handle native Kubernetes resources, you
    need to write controllers to handle custom resources.


    Generally, such controllers are called *Operators* that handle third-party resources
    and reserve the name **Controller** for controllers handling native Kubernetes
    resources.


    The `Client-go` Library provides tools to write Controllers and Operators using
    the Go language, and the `controller-runtime` Library leverages these tools to
    provide abstractions around the Controller pattern to help you write Operators.
    This library can be installed with the following command:


    ```

    go get sigs.k8s.io/controller-runtime@v0.13.0

    ```


    You can obtain the available revisions from the source repository at `github.com/kubernetes-sigs/controller-runtime/releases`.


    ## The Manager


    The first important abstraction provided by the `controller-runtime` Library is
    the *Manager*, which provides shared resources to all Controllers running within
    the manager, including:


    - A Kubernetes client for reading and writing Kubernetes resources

    - A cache for reading Kubernetes resources from a local cache

    - A scheme for registering all Kubernetes native and custom resources


    To create a *Manager*, you need to use the `New` function provided, as follows:


    - ❶ Parse the command line flags, as `GetConfigOrDie` to handle the `--kubeconfig`
    flag; see the following.


    ```

    import (

    "flag"

    "sigs.k8s.io/controller-runtime/pkg/client/config"

    "sigs.k8s.io/controller-runtime/pkg/manager"

    )

    flag.Parse()                        ❶

    mgr, err := manager.New(

    config.GetConfigOrDie(),

    manager.Options{},

    )

    ```


    The first parameter is a `rest.Config` object, as seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s
    “Connecting to the Cluster” section. Note that, in this example, the `GetConfigOrDie()`
    utility function provided by the `controller-runtime` library has been chosen
    instead of using functions from the `Client-go` Library.


    The `GetConfigOrDie()` function will try to get a configuration to connect to
    the cluster:


    - By getting the value of the `--kubeconfig` flag, if defined, and reading the
    `kubeconfig` file at this path. For this, first you need to execute `flag.Parse()`

    - By getting the value of the `KUBECONFIG` environment variable, if defined, and
    reading the `kubeconfig` file at this path

    - By looking at an in-cluster configuration (see Chapter [6](#533908_1_En_6_Chapter.xhtml)’s
    “In-cluster Configuration” section), if defined

    - By reading the `$HOME/.kube/config` file


    If none of the preceding is possible, the function will make the program exit
    with a `1` code. The second argument is a structure for options.


    One important option is the `Scheme`. By default, if you do not specify any value
    for this option, the `Scheme` provided by the `Client-go` Library will be used.
    It is sufficient if the controller needs to access only native Kubernetes resources.
    If you want the controller to access a custom resource, however, you will need
    to provide a scheme that is able to resolve the custom resource.


    For example, if you want the controller to access the Custom Resource, which was
    defined in Chapter [9](#533908_1_En_9_Chapter.xhtml), you will need to run the
    following code at initialization time:


    - ❶ Create a new empty scheme

    - ❷ Add native Kubernetes resources using the `Client-go` Library

    - ❸ Add to the scheme the resources from `mygroup/v1alpha1` containing our Custom
    Resource

    - ❹ Use this scheme from this manager


    ```

    import (

    "k8s.io/apimachinery/pkg/runtime"

    clientgoscheme "k8s.io/client-go/kubernetes/scheme"

    mygroupv1alpha1 "github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    )

    scheme := runtime.NewScheme()                  ❶

    clientgoscheme.AddToScheme(scheme)             ❷

    mygroupv1alpha1.AddToScheme(scheme)            ❸

    mgr, err := manager.New(

    config.GetConfigOrDie(),

    manager.Options{

    Scheme: scheme,                    ❹

    },

    )

    ```'
