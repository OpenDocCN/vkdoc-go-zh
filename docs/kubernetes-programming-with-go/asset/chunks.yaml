  trans: '

    ### 以表格形式获取结果


    `kubectl` 客户端（以及其他客户端）会以表格格式显示资源列表。当执行 `List` 请求时，你可以要求 API 服务器通过使用 `Accept` 头信息来指定特定格式，从而提供构建此表格表示所需的信息：


    ```

    $ curl $HOST/api/v1/pods

    -H ''Accept: application/json;as=Table;g=meta.k8s.io;v=v1''

    {

    "kind": "Table",

    "apiVersion": "meta.k8s.io/v1",

    "metadata": {

    "resourceVersion": "2995797"

    },

    "columnDefinitions": [ { ... }, { ... }, { ... } ],

    "rows": [ { ... }, { ... } ]

    }

    ```


    这有助于客户端以表格形式展示任何资源（包括自定义资源）的信息，因为自定义资源定义会包含在哪个列中显示资源的哪个字段的信息。


    对于任何请求的资源，响应的 `kind` 始终是 `Table`。第一个字段 `columnDefinitions` 描述了表格的每一列，第二个字段 `rows`
    给出了结果中每个资源的列值。


    #### 列定义


    列定义包含 `name`（名称）、`type`（类型）、`format`（格式）、`description`（描述）和 `priority`（优先级）字段。`name`
    旨在作为列的标题。`type` 是该列的 OpenAPI 类型定义（例如 `integer`、`number`、`string` 或 `boolean`）。


    可选的 `format` 是列类型的 OpenAPI 修饰符，提供有关格式的更多信息。`integer` 类型的格式为 `int32` 和 `int64`，`number`
    类型的格式为 `float` 和 `double`，`string` 类型的格式为 `byte`、`binary`、`data`、`date-time`、`password`
    和 `name`。`name` 格式值不属于 OpenAPI 规范，而是 Kubernetes API 特有的。它向客户端指示包含资源名称的主列。


    `priority` 字段是一个整数，指示某列相对于其他列的重要性。当空间有限时，可以省略优先级值较高的列。


    #### 行数据


    一行包含 `cells`（单元格）、`conditions`（条件）和 `object`（对象）字段。


    `cells` 字段是一个与 `columnDefinitions` 数组长度相同的数组，包含当前行所显示资源的值。数组每个元素的 JSON 类型和可选格式由相应列定义的
    `type` 和 `format` 推断得出。


    `conditions` 字段给出了显示该行的特定属性。截至 Kubernetes 1.23，唯一定义的值是 `''Completed''`，表示该行显示的资源已运行完毕，可以在视觉上降低其优先级。


    `object` 字段默认包含此列中显示资源的元数据。你可以向 `List` 请求添加 `includeObject` 查询参数，以要求不包含对象信息（`?includeObject=None`），或包含完整的对象信息（`?includeObject=Object`）。此查询参数的默认值是
    `Metadata`，即仅需要资源的元数据。例如，使用以下命令可以在行数据中不返回对象信息：


    ```

    $ curl $HOST/api/v1/pods?includeObject=None

    -H ''Accept: application/json;as=Table;g=meta.k8s.io;v=v1''

    ```


    ### 使用 YAML 格式


    在之前的创建资源一节中，你已了解可以使用 YAML 格式，并通过 `Content-Type: application/yaml` 头信息来描述要创建的资源。如果未指定此头信息，则需要使用
    JSON 格式来描述资源。


    也可以使用 `Accept: application/yaml` 头信息以 YAML 格式获取请求的响应。这对于 `Get` 和 `List` 请求有效，也可以用于创建或更新资源并返回其新值的请求。例如，要以
    YAML 格式获取所有 Pod 的列表，请使用：


    ```

    $ curl $HOST/api/v1/pods -H ''Accept: application/yaml''

    kind: PodList

    metadata:

    resourceVersion: "3009983"

    items:

    [...]

    ```


    或者，要创建一个新的 Pod 并以 YAML 格式获取所创建的 Pod，请使用：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods

    -H "Content-Type: application/yaml"

    -H ''Accept: application/yaml''

    --data-binary @pod.yaml

    ```


    请注意，无法以 YAML 格式获取 `Watch` 请求的结果。


    ### 使用 Protobuf 格式


    Protobuf 格式也可用于向 API 服务器发送数据或从中接收数据。为此，你需要在 `Content-Type` 或 `Accept` 头中使用类型 `application/vnd.kubernetes.protobuf`。


    Kubernetes 团队[不鼓励](https://github.com/kubernetes/client-go/issues/76)在 Kubernetes
    控制平面之外使用 Protobuf 格式，因为他们不保证 Protobuf 消息能像 JSON 消息一样稳定。


    如果你决定使用 Protobuf 格式，需要知道 API 服务器不会交换纯 Protobuf 数据，而是会添加一个头部来检查 Kubernetes 版本之间的兼容性。


    [apimachinery](https://github.com/kubernetes/apimachinery) 库包含 Go 代码，可帮助开发者以各种格式（包括
    Protobuf）序列化数据。第 5 章描述了如何使用此库。


    ## 结论


    本章讨论了如何运行 `kubectl` 以帮助理解其底层执行的 HTTP 请求。然后，详细展示了如何使用各种 HTTP 操作来创建、更新、应用、删除、获取、列出和监视资源。最后，本章描述了如何以几种格式（JSON、YAML
    和 Protobuf，或表格形式）获取这些操作的结果。


    # 3. 在 Go 中使用 API 资源


    本书前两章描述了 Kubernetes API 是如何设计的，以及如何使用 HTTP 请求访问它。具体来说，你已经了解到 API 管理的资源被组织成 `Group-Version-Resource`，并且客户端和
    API 服务器之间交换的对象由 Kubernetes API 定义为 `Kind`。该章还展示了这些数据在交换过程中可以编码为 JSON、YAML 或 Protobuf
    格式，具体取决于客户端设置的 HTTP 头。


    在接下来的章节中，你将了解如何使用 Go 语言访问此 API。使用 Kubernetes API 所需的两个重要 Go 库是 [apimachinery](https://github.com/kubernetes/apimachinery)
    和 [api](https://github.com/kubernetes/api)。


    API Machinery 是一个通用库，负责在 Go 结构体与以 JSON（或 YAML 或 Protobuf）格式编写的对象之间进行数据序列化。这使得客户端以及
    API 服务器的开发者能够使用 Go 结构体编写数据，并在 HTTP 交换过程中透明地以 JSON（或 YAML 或 Protobuf）格式使用这些资源。


    API Machinery 库是通用的，因为它不包含任何 Kubernetes API 资源定义。它使得 Kubernetes API 可扩展，并使 API
    Machinery 可用于任何其他使用相同机制（即 `Kind` 和 `Group-Version-Resource`）的 API。


    而 API 库则是一个 Go 结构体的集合，用于在 Go 中处理 Kubernetes API 定义的资源。

    '
- fmt: "# API Library Sources and Import\n\nThe sources of the API Library can be\
    \ accessed from [`https://github.com/kubernetes/api`](https://github.com/kubernetes/api).\
    \ If you want to contribute to this library, note that the sources are not managed\
    \ from this repository, but from the central one, [`https://github.com/kubernetes/kubernetes`](https://github.com/kubernetes/kubernetes),\
    \ in the `staging/src/k8s.io/api` directory, and the sources are synchronized\
    \ from the `kubernetes` repository to the `api` repository.\n\nTo import packages\
    \ of the API Library into the Go sources, you will need to use the `k8s.io/api`\
    \ prefix—for example:\n\n```\nimport \"k8s.io/api/core/v1\"\n```\n\nThe packages\
    \ into the API Library follow the **Group-Version-Resource** structure of the\
    \ API. When you want to use structures for a given resource, you need to import\
    \ the package related to the *group* and *version* of the resource by using this\
    \ pattern:\n\n```\nimport \"k8s.io/api/<group>/<version>\"\n```\n\n## Content\
    \ of a Package\n\nLet's examine the files included in a package—for example, the\
    \ `k8s.io/api/apps/v1` package.\n\n### types.go\n\nThis file can be considered\
    \ the main file of the package because it defines all the *Kind* structures and\
    \ other related substructures. It also defines all the types and constants for\
    \ enumeration fields found in these structures. As an example, consider the `Deployment`\
    \ *Kind*; the `Deployment` structure is first defined as follows:\n\n```\ntype\
    \ Deployment struct {\n    metav1.TypeMeta\n    metav1.ObjectMeta\n    Spec  \
    \    DeploymentSpec\n    Status    DeploymentStatus\n}\n```\n\nThen, the related\
    \ substructures, `DeploymentSpec` and `DeploymentStatus`, are defined using this:\n\
    \n```\ntype DeploymentSpec struct {\n    Replicas      *int32\n    Selector  \
    \    *metav1.LabelSelector\n    Template      v1.PodTemplateSpec\n    Strategy\
    \      DeploymentStrategy\n    [...]\n}\ntype DeploymentStatus struct {\n    ObservedGeneration\
    \      int64\n    Replicas                int32\n    [...]\n    Conditions   \
    \           []DeploymentCondition\n}\n```\n\nThen, continue in the same way for\
    \ every structure used as a type in a previous structure.\n\nThe `DeploymentConditionType`\
    \ type, used in the `DeploymentCondition` structure (not represented here), is\
    \ defined, along with the possible values for this enumeration:\n\n```\ntype DeploymentConditionType\
    \ string\nconst (\n    DeploymentAvailable   DeploymentConditionType = \"Available\"\
    \n    DeploymentProgressing DeploymentConditionType = \"Progressing\"\n    DeploymentReplicaFailure\
    \ DeploymentConditionType = \"ReplicaFailure\"\n)\n```\n\nYou can see that every\
    \ *Kind* embeds two structures: `metav1.TypeMeta` and `metav1.ObjectMeta`. It\
    \ is mandatory for them to be recognized by the API Machinery. The `TypeMeta`\
    \ structure contains information about the GVK of the *Kind*, and the `ObjectMeta`\
    \ contains metadata for the *Kind*, like its name.\n\n### register.go\n\nThis\
    \ file defines the group and version related to this package and the list of *Kinds*\
    \ in this group and version. The public variable, `SchemeGroupVersion`, can be\
    \ used when you need to specify the group and version of a resource from this\
    \ group-version.\n\nIt also declares a function, `AddToScheme`, that can be used\
    \ to add the group, version, and *Kinds* to a *Scheme*. The *Scheme* is an abstraction\
    \ used in the API Machinery to create a mapping between Go structures and **Group-Version-Kinds**.\
    \ This will be discussed further in Chapter [5](#533908_1_En_5_Chapter.xhtml),\
    \ The API Machinery.\n\n### doc.go\n\nThis file and the following ones contain\
    \ advanced information that you will not need to comprehend to start writing your\
    \ first Kubernetes resources in Go, but they will help you understand how to declare\
    \ new resources with Custom Resource Definitions in the next chapters.\n\nThe\
    \ `doc.go` file contains the following instructions to generate files:\n\n```\n\
    // +k8s:deepcopy-gen=package\n// +k8s:protobuf-gen=package\n// +k8s:openapi-gen=true\n\
    ```\n\nThe first instruction is used by the `deepcopy-gen` generator to generate\
    \ the `zz_generated.deepcopy.go` file. The second instruction is used by the `go-to-protobuf`\
    \ generator to generate these files: `generated.pb.go` and `generated.proto`.\
    \ The third instruction is used by the `genswaggertypedocs` generator to generate\
    \ the `types_swagger_doc_generated.go` file.\n\n### generated.pb.go and generated.proto\n\
    \nThese files are generated by the `go-to-protobuf` generator. They are used by\
    \ the API Machinery when serializing the data to and from the Protobuf format.\n\
    \n### types_swagger_doc_generated.go\n\nThis file is generated by the `genswaggertypedocs`\
    \ generator. It is used during the generation of the complete `swagger` definition\
    \ of the Kubernetes API.\n\n### zz_generated.deepcopy.go\n\nThis file is generated\
    \ by the `deepcopy-gen` generator. It contains the generated definition of the\
    \ `DeepCopyObject` method for each type defined in the package. This method is\
    \ necessary for the structures to implement the `runtime.Object` interface, which\
    \ is defined in the API Machinery Library, and the API Machinery expects that\
    \ all *Kind* structures will implement this `runtime.Object` interface.\n\nThe\
    \ interface is defined in [this file](https://github.com/kubernetes/apimachinery/blob/master/pkg/runtime/interfaces.go)\
    \ as follows:\n\n```\ntype Object interface {\n    GetObjectKind() schema.ObjectKind\n\
    \    DeepCopyObject() Object\n}\n```\n\nThe other necessary method, `GetObjectKind`,\
    \ is automatically added to structures that embed the `TypeMeta` structure—this\
    \ is the case for all *Kind* structures. The `TypeMeta` structure has the method\
    \ that is defined as follows:\n\n```\nfunc (obj *TypeMeta) GetObjectKind() schema.ObjectKind\
    \ {\n    return obj\n}\n```\n\n## Specific Content in core/v1\n\nThe `core/v1`\
    \ package defines, in addition to defining the structures for the Core resources,\
    \ utility methods for specific types that can be useful when you incorporate these\
    \ types into your code.\n\n### ObjectReference\n\nAn `ObjectReference` can be\
    \ used to refer to any object in a unique way. The structure is defined as follows:\n\
    \n```\ntype ObjectReference struct {\n    APIVersion          string\n    Kind\
    \                string\n    Namespace           string\n    Name            \
    \    string\n    UID                 types.UID\n    ResourceVersion     string\n\
    \    FieldPath           string\n}\n```\n\nThree methods are defined for this\
    \ type:\n\n*   `SetGroupVersionKind(gvk schema.GroupVersionKind)` – this method\
    \ will set the fields `APIVersion` and `Kind` based on the values of the `GroupVersionKind`\
    \ value passed as a parameter.\n\n*   `GroupVersionKind() schema.GroupVersionKind`\
    \ – this method will return a `GroupVersionKind` value based on the fields `APIVersion`\
    \ and `Kind` of the `ObjectReference`.\n\n*   `GetObjectKind() schema.ObjectKind`\
    \ – this method will cast the `ObjectReference` object as an `ObjectKind`. The\
    \ two previous methods implement this `ObjectKind` interface. Because the `DeepCopyObject`\
    \ method on `ObjectReference` also is defined, the `ObjectReference` will respect\
    \ the `runtime.Object` interface."
  raw: '## API Library Sources and Import


    The sources of the API Library can be accessed from [`https://github.com/kubernetes/api`](https://github.com/kubernetes/api).
    If you want to contribute to this library, note that the sources are not managed
    from this repository, but from the central one, [`https://github.com/kubernetes/kubernetes`](https://github.com/kubernetes/kubernetes),
    in the **staging/src/k8s.io/api** directory, and the sources are synchronized
    from the **kubernetes** repository to the **api** repository.


    To import packages of the API Library into the Go sources, you will need to use
    the **k8s.io/api** prefix—for example:


    ```

    import "k8s.io/api/core/v1"

    ```


    The packages into the API Library follow the **Group-Version-Resource** structure
    of the API. When you want to use structures for a given resource, you need to
    import the package related to the *group* and *version* of the resource by using
    this pattern:


    ```

    import "k8s.io/api//"

    ```


    ## Content of a Package


    Let’s examine the files included in a package—for example, the **k8s.io/api/apps/v1**
    package.


    ### types.go


    This file can be considered the main file of the package because it defines all
    the *Kind* structures and other related substructures. It also defines all the
    types and constants for enumeration fields found in these structures. As an example,
    consider the **Deployment** *Kind*; the **Deployment** structure is first defined
    as follows:


    ```

    type Deployment struct {

    metav1.TypeMeta

    metav1.ObjectMeta

    Spec      DeploymentSpec

    Status    DeploymentStatus

    }

    ```


    Then, the related substructures, **DeploymentSpec** and **DeploymentStatus**`,`
    are defined using this:


    ```

    type DeploymentSpec struct {

    Replicas      *int32

    Selector      *metav1.LabelSelector

    Template      v1.PodTemplateSpec

    Strategy      DeploymentStrategy

    [...]

    }

    type DeploymentStatus struct {

    ObservedGeneration      int64

    Replicas                int32

    [...]

    Conditions              []DeploymentCondition

    }

    ```


    Then, continue in the same way for every structure used as a type in a previous
    structure.


    The **DeploymentConditionType** type, used in the **DeploymentCondition** structure
    (not represented here), is defined, along with the possible values for this enumeration:


    ```

    type DeploymentConditionType string

    const (

    DeploymentAvailable DeploymentConditionType = "Available"

    DeploymentProgressing DeploymentConditionType = "Progressing"

    DeploymentReplicaFailure DeploymentConditionType = "ReplicaFailure"

    )

    ```


    You can see that every *Kind* embeds two structures: **metav1.TypeMeta** and **metav1.ObjectMeta**.
    It is mandatory for them to be recognized by the API Machinery. The **TypeMeta**
    structure contains information about the GVK of the *Kind*, and the **ObjectMeta**
    contains metadata for the *Kind*, like its name.


    ### register.go


    This file defines the group and version related to this package and the list of
    *Kinds* in this group and version. The public variable, **SchemeGroupVersion**,
    can be used when you need to specify the group and version of a resource from
    this group-version.


    It also declares a function, **AddToScheme**, that can be used to add the group,
    version, and *Kinds* to a *Scheme*. The *Scheme* is an abstraction used in the
    API Machinery to create a mapping between Go structures and **Group-Version-Kinds**.
    This will be discussed further in Chapter [5](#533908_1_En_5_Chapter.xhtml), The
    API Machinery.


    ### doc.go


    This file and the following ones contain advanced information that you will not
    need to comprehend to start writing your first Kubernetes resources in Go, but
    they will help you understand how to declare new resources with Custom Resource
    Definitions in the next chapters.


    The **doc.go** file contains the following instructions to generate files:


    ```

    // +k8s:deepcopy-gen=package

    // +k8s:protobuf-gen=package

    // +k8s:openapi-gen=true

    ```


    The first instruction is used by the **deepcopy-gen** generator to generate the
    **zz_generated.deepcopy.go** file. The second instruction is used by the **go-to-protobuf**
    generator to generate these files: **generated.pb.go** and **generated.proto**.
    The third instruction is used by the **genswaggertypedocs** generator to generate
    the **types_swagger_doc_generated.go** file.


    ### generated.pb.go and generated.proto


    These files are generated by the **go-to-protobuf** generator. They are used by
    the API Machinery when serializing the data to and from the Protobuf format.


    ### types_swagger_doc_generated.go


    This file is generated by the **genswaggertypedocs** generator. It is used during
    the generation of the complete **swagger** definition of the Kubernetes API.


    ### zz_generated.deepcopy.go


    This file is generated by the **deepcopy-gen** generator. It contains the generated
    definition of the **DeepCopyObject** method for each type defined in the package.
    This method is necessary for the structures to implement the **runtime.Object**
    interface, which is defined in the API Machinery Library, and the API Machinery
    expects that all *Kind* structures will implement this **runtime.Object** interface.


    The interface is defined in [this file](https://github.com/kubernetes/apimachinery/blob/master/pkg/runtime/interfaces.go)
    as follows:


    ```

    type Object interface {

    GetObjectKind() schema.ObjectKind

    DeepCopyObject() Object

    }

    ```


    The other necessary method, **GetObjectKind**, is automatically added to structures
    that embed the **TypeMeta** structure—this is the case for all *Kind* structures.
    The **TypeMeta** structure has the method that is defined as follows:


    ```

    func (obj *TypeMeta) GetObjectKind() schema.ObjectKind {

    return obj

    }

    ```


    ## Specific Content in core/v1


    The **core/v1** package defines, in addition to defining the structures for the
    Core resources, utility methods for specific types that can be useful when you
    incorporate these types into your code.


    ### ObjectReference


    An **ObjectReference** can be used to refer to any object in a unique way. The
    structure is defined as follows:


    ```

    type ObjectReference struct {

    APIVersion          string

    Kind                string

    Namespace           string

    Name                string

    UID                 types.UID

    ResourceVersion     string

    FieldPath           string

    }

    ```


    Three methods are defined for this type:


    *   `SetGroupVersionKind(gvk schema.GroupVersionKind)` – this method will set
    the fields **APIVersion** and **Kind** based on the values of the **GroupVersionKind**
    value passed as a parameter.


    *   `GroupVersionKind() schema.GroupVersionKind` – this method will return a **GroupVersionKind**
    value based on the fields **APIVersion** and **Kind** of the **ObjectReference**.


    *   `GetObjectKind() schema.ObjectKind` – this method will cast the **ObjectReference**
    object as an **ObjectKind**. The two previous methods implement this **ObjectKind**
    interface. Because the **DeepCopyObject** method on **ObjectReference** also is
    defined, the **ObjectReference** will respect the **runtime.Object** interface.'
  trans: "# API 库源码与导入\n\nAPI 库的源码可通过 [`https://github.com/kubernetes/api`](https://github.com/kubernetes/api)\
    \ 获取。如果你想为该库做贡献，请注意源码并非由此仓库管理，而是由中央仓库 [`https://github.com/kubernetes/kubernetes`](https://github.com/kubernetes/kubernetes)\
    \ 中的 `staging/src/k8s.io/api` 目录管理，并且源码会从 `kubernetes` 仓库同步到 `api` 仓库。\n\n若要将\
    \ API 库的包导入到 Go 源码中，你需要使用 `k8s.io/api` 前缀——例如：\n\n```\nimport \"k8s.io/api/core/v1\"\
    \n```\n\nAPI 库中的包遵循 API 的 **Group-Version-Resource** 结构。当你需要使用某个资源的结构体时，需要按照以下模式导入与该资源\
    \ *组* 和 *版本* 相关的包：\n\n```\nimport \"k8s.io/api/<group>/<version>\"\n```\n\n##\
    \ 包的内容\n\n我们以 `k8s.io/api/apps/v1` 包为例，来检视其包含的文件。\n\n### types.go\n\n该文件可以被视为包的主文件，因为它定义了所有\
    \ *Kind* 结构体及其他相关的子结构体。它还定义了在这些结构体中发现的所有枚举字段的类型和常量。例如，考虑 `Deployment` *Kind*；`Deployment`\
    \ 结构体首先定义如下：\n\n```\ntype Deployment struct {\n    metav1.TypeMeta\n    metav1.ObjectMeta\n\
    \    Spec      DeploymentSpec\n    Status    DeploymentStatus\n}\n```\n\n然后，相关的子结构体\
    \ `DeploymentSpec` 和 `DeploymentStatus` 使用以下方式定义：\n\n```\ntype DeploymentSpec\
    \ struct {\n    Replicas      *int32\n    Selector      *metav1.LabelSelector\n\
    \    Template      v1.PodTemplateSpec\n    Strategy      DeploymentStrategy\n\
    \    [...]\n}\ntype DeploymentStatus struct {\n    ObservedGeneration      int64\n\
    \    Replicas                int32\n    [...]\n    Conditions              []DeploymentCondition\n\
    }\n```\n\n然后，对前一个结构体中用作类型的每个结构体都按照相同的方式继续定义。\n\n在 `DeploymentCondition` 结构体（此处未展示）中使用的\
    \ `DeploymentConditionType` 类型，以及该枚举的可能值，定义如下：\n\n```\ntype DeploymentConditionType\
    \ string\nconst (\n    DeploymentAvailable   DeploymentConditionType = \"Available\"\
    \n    DeploymentProgressing DeploymentConditionType = \"Progressing\"\n    DeploymentReplicaFailure\
    \ DeploymentConditionType = \"ReplicaFailure\"\n)\n```\n\n你可以看到每个 *Kind* 都嵌入了两个结构体：`metav1.TypeMeta`\
    \ 和 `metav1.ObjectMeta`。这是为了让它们能被 API Machinery 识别所必需的。`TypeMeta` 结构体包含该 *Kind*\
    \ 的 GVK 信息，而 `ObjectMeta` 则包含该 *Kind* 的元数据，例如其名称。\n\n### register.go\n\n该文件定义了与此包相关的组和版本，以及该组和版本中的\
    \ *Kind* 列表。当你需要指定来自该组-版本的资源的组和版本时，可以使用公共变量 `SchemeGroupVersion`。\n\n它还声明了一个函数\
    \ `AddToScheme`，可用于将组、版本和 *Kind* 添加到一个 *Scheme* 中。*Scheme* 是 API Machinery 中使用的一种抽象，用于在\
    \ Go 结构体和 **Group-Version-Kinds** 之间创建映射关系。这将在第 5 章 \"API Machinery\" 中进一步讨论。\n\
    \n### doc.go\n\n该文件及后续文件包含一些高级信息，你在着手用 Go 编写第一个 Kubernetes 资源时并不需要理解它们，但它们将帮助你理解如何在接下来的章节中使用自定义资源定义声明新的资源。\n\
    \n`doc.go` 文件包含以下用于生成文件的指令：\n\n```\n// +k8s:deepcopy-gen=package\n// +k8s:protobuf-gen=package\n\
    // +k8s:openapi-gen=true\n```\n\n第一条指令由 `deepcopy-gen` 生成器用于生成 `zz_generated.deepcopy.go`\
    \ 文件。第二条指令由 `go-to-protobuf` 生成器用于生成以下文件：`generated.pb.go` 和 `generated.proto`。第三条指令由\
    \ `genswaggertypedocs` 生成器用于生成 `types_swagger_doc_generated.go` 文件。\n\n### generated.pb.go\
    \ 和 generated.proto\n\n这些文件由 `go-to-protobuf` 生成器生成。API Machinery 在将数据序列化为 Protobuf\
    \ 格式或从 Protobuf 格式反序列化时使用它们。\n\n### types_swagger_doc_generated.go\n\n该文件由 `genswaggertypedocs`\
    \ 生成器生成。它在生成 Kubernetes API 的完整 `swagger` 定义时使用。\n\n### zz_generated.deepcopy.go\n\
    \n该文件由 `deepcopy-gen` 生成器生成。它包含为包中定义的每个类型生成的 `DeepCopyObject` 方法的定义。此方法对于结构体实现\
    \ `runtime.Object` 接口是必要的，该接口定义在 API Machinery 库中，并且 API Machinery 期望所有 *Kind*\
    \ 结构体都实现这个 `runtime.Object` 接口。\n\n该接口在[此文件](https://github.com/kubernetes/apimachinery/blob/master/pkg/runtime/interfaces.go)中定义如下：\n\
    \n```\ntype Object interface {\n    GetObjectKind() schema.ObjectKind\n    DeepCopyObject()\
    \ Object\n}\n```\n\n另一个必要的方法 `GetObjectKind` 会自动添加到嵌入了 `TypeMeta` 结构体的结构体中——所有\
    \ *Kind* 结构体都是这种情况。`TypeMeta` 结构体具有定义如下的方法：\n\n```\nfunc (obj *TypeMeta) GetObjectKind()\
    \ schema.ObjectKind {\n    return obj\n}\n```\n\n## core/v1 中的特定内容\n\n`core/v1`\
    \ 包除了定义 Core 资源的结构体外，还为特定类型定义了实用方法，这些方法在将这些类型整合到你的代码中时会很有用。\n\n### ObjectReference\n\
    \n`ObjectReference` 可用于以唯一方式引用任何对象。该结构体定义如下：\n\n```\ntype ObjectReference struct\
    \ {\n    APIVersion          string\n    Kind                string\n    Namespace\
    \           string\n    Name                string\n    UID                 types.UID\n\
    \    ResourceVersion     string\n    FieldPath           string\n}\n```\n\n为此类型定义了三个方法：\n\
    \n*   `SetGroupVersionKind(gvk schema.GroupVersionKind)` – 该方法将根据作为参数传递的 `GroupVersionKind`\
    \ 值来设置 `APIVersion` 和 `Kind` 字段。\n\n*   `GroupVersionKind() schema.GroupVersionKind`\
    \ – 该方法将基于 `ObjectReference` 的 `APIVersion` 和 `Kind` 字段返回一个 `GroupVersionKind`\
    \ 值。\n\n*   `GetObjectKind() schema.ObjectKind` – 该方法将 `ObjectReference` 对象转换为\
    \ `ObjectKind`。前面两个方法实现了这个 `ObjectKind` 接口。由于 `ObjectReference` 上的 `DeepCopyObject`\
    \ 方法也已定义，因此 `ObjectReference` 将满足 `runtime.Object` 接口。"
- fmt: "# ResourceList\n\n`ResourceList`类型被定义为一个映射（map），其键为`ResourceName`，值为`Quantity`。该类型在各类Kubernetes资源中用于定义资源的`limits`和`requests`。\n\
    \n在YAML中，其用法示例如下（为容器定义资源`requests`和`limits`）：\n\n```\napiVersion: v1\nkind: Pod\n\
    metadata:\nname: mypod\nspec:\ncontainers:\n- name: runtime\nresources:\nrequests:\n\
    memory: \"64Mi\"\ncpu: \"250m\"\nlimits:\nmemory: \"128Mi\"\ncpu: \"500m\"\n```\n\
    \n在Go语言中，可以如下编写`requests`部分：\n\n```\nrequests := corev1.ResourceList{\ncorev1.ResourceMemory:\n\
    *resource.NewQuantity(64*1024*1024, resource.BinarySI),\ncorev1.ResourceCPU:\n\
    *resource.NewMilliQuantity(250, resource.DecimalSI),\n}\n```\n\n下一章将更详细地描述如何使用`resource.Quantity`类型定义资源量。`ResourceList`类型提供以下方法：\n\
    \n*   `Cpu() *resource.Quantity` – 返回映射中CPU键对应的资源量，格式为十进制（如1, 250 m等）\n*   `Memory()\
    \ *resource.Quantity` – 返回映射中Memory键对应的资源量，格式为二进制（如512 Ki, 64 Mi等）\n*   `Storage()\
    \ *resource.Quantity` – 返回映射中Storage键对应的资源量，格式为二进制（如512 Mi, 1 Gi等）\n*   `Pods()\
    \ *resource.Quantity` – 返回映射中Pods键对应的资源量，格式为十进制（如1, 10等）\n*   `StorageEphemeral()\
    \ *resource.Quantity` – 返回映射中StorageEphemeral键对应的资源量，格式为二进制（如512 Mi, 1 Gi等）\n\n\
    对于以上每个方法，如果映射中未定义该键，则返回一个值为`Zero`的`Quantity`。\n\n还有一个内部使用的辅助方法，可用于获取非标准格式的资源量：\n\
    \n*   `Name(name ResourceName, defaultFormat resource.Format) *resource.Quantity`\
    \ – 返回指定键`Name`在`defaultFormat`格式下的资源量。\n\n`ResourceName`类型的枚举值包括：`ResourceCPU`、`ResourceMemory`、`ResourceStorage`、`ResourceEphemeralStorage`和`ResourcePods`。\n\
    \n# Taint\n\n`Taint`资源用于应用于节点（Node），确保不容忍这些污点的Pod不会被调度到这些节点上。`Taint`结构体定义如下：\n\
    \n```\ntype Taint struct {\nKey            string\nValue          string\nEffect\
    \         TaintEffect\nTimeAdded      *metav1.Time\n}\n```\n\n`TaintEffect`枚举可取以下值：\n\
    \n```\nTaintEffectNoSchedule          = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
    \    = \"PreferNoSchedule\"\nTaintEffectNoExecute           = \"NoExecute\"\n\
    ```\n\n控制平面在特殊条件下使用的已知`Taint`键，在此包中定义如下：\n\n```\nTaintNodeNotReady\n= \"node.kubernetes.io/not-ready\"\
    \nTaintNodeUnreachable\n= \"node.kubernetes.io/unreachable\"\nTaintNodeUnschedulable\n\
    = \"node.kubernetes.io/unschedulable\"\nTaintNodeMemoryPressure\n= \"node.kubernetes.io/memory-pressure\"\
    \nTaintNodeDiskPressure\n= \"node.kubernetes.io/disk-pressure\"\nTaintNodeNetworkUnavailable\n\
    = \"node.kubernetes.io/network-unavailable\"\nTaintNodePIDPressure\n= \"node.kubernetes.io/pid-pressure\"\
    \nTaintNodeOutOfService\n= \"node.kubernetes.io/out-of-service\"\n```\n\n`Taint`结构体上定义了以下两个方法：\n\
    \n*   `MatchTaint(taintToMatch *Taint) bool` – 如果两个污点的`key`和`effect`值相同，则此方法返回`true`。\n\
    *   `ToString() string` – 此方法返回`Taint`的字符串表示，格式为：`<key>=<value>:<effect>`、`<key>=<value>:`、`<key>:<effect>`或`<key>`。\n\
    \n# Toleration\n\n`Toleration`资源用于应用于Pod，使其能够容忍特定节点上的污点。`Toleration`结构体定义如下：\n\
    \n```\ntype Toleration struct {\nKey                  string\nOperator       \
    \      TolerationOperator\nValue                string\nEffect               TaintEffect\n\
    TolerationSeconds    *int64\n}\n```\n\n`TolerationOperator`枚举可取以下值：\n\n```\nTolerationOpExists\
    \    = \"Exists\"\nTolerationOpEqual     = \"Equal\"\n```\n\n`TaintEffect`枚举可取以下值：\n\
    \n```\nTaintEffectNoSchedule              = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
    \        = \"PreferNoSchedule\"\nTaintEffectNoExecute               = \"NoExecute\"\
    \n```\n\n`Toleration`结构体上定义了以下两个方法：\n\n*   `MatchToleration(tolerationToMatch\
    \ *Toleration) bool` – 如果两个容忍度的`Key`、`Operator`、`Value`和`Effect`值分别相同，则此方法返回`true`。\n\
    *   `ToleratesTaint(taint *Taint) bool` – 如果该容忍度能够容忍指定的`Taint`，则此方法返回`true`。容忍度容忍污点的规则如下：\n\
    \    *   **Effect**：如果`Toleration`的effect为空，则匹配所有Taint的effect；否则，Toleration和Taint的effect必须匹配。\n\
    \    *   **Operator**：如果`TolerationOperator`为`Exists`，则匹配所有Taint的值；否则，`TolerationOperator`为`Equal`，且Toleration和Taint的值必须匹配。\n\
    \    *   **Key**：如果Toleration的Key为空，则`TolerationOperator`必须为`Exists`，且匹配所有Taint的key（无论值是什么）；否则，Toleration和Taint的key必须匹配。\n\
    \n# Well-Known Labels\n\n控制平面会为节点添加标签；有关使用的已知键及其用法，可在`core/v1`包的`well_known_labels.go`文件中找到。以下是最广为人知的标签。\n\
    \n节点上运行的kubelet会填充以下标签：\n\n```\nLabelOSStable      = \"kubernetes.io/os\"\nLabelArchStable\
    \    = \"kubernetes.io/arch\"\nLabelHostname      = \"kubernetes.io/hostname\"\
    \n```\n\n当节点运行在云提供商上时，可设置以下标签，用于表示（虚拟）机器的实例类型、可用区（zone）和区域（region）：\n\n```\nLabelInstanceTypeStable\n\
    = \"node.kubernetes.io/instance-type\"\nLabelTopologyZone\n= \"topology.kubernetes.io/zone\"\
    \nLabelTopologyRegion\n= \"topology.kubernetes.io/region\"\n```\n\n# Writing Kubernetes\
    \ Resources in Go\n\n你将需要用Go语言编写Kubernetes资源，以便通过HTTP请求或更常用的client-go库在集群中创建或更新资源。client-go库将在后续章节中讨论；但现在，让我们专注于用Go语言编写资源。\n\
    \n要创建或更新资源，需要为与该资源关联的`Kind`创建相应的结构体。例如，要创建一个`deployment`，你需要创建`Deployment`类型；为此，需要初始化一个在API库的`apps/v1`包中定义的`Deployment`结构体。"
  raw: "### ResourceList\n\nThe **ResourceList** type is defined as a map, the keys\
    \ of which are **ResourceName**, and values are **Quantity**. This is used in\
    \ various Kubernetes resources to define the **limits** and **requests** of **resources**.\n\
    \nIn YAML, an example of usage is when you are defining the **requests** and **limits**\
    \ of **resources** for a container, as follows:\n\n```\napiVersion: v1\nkind:\
    \ Pod\nmetadata:\nname: mypod\nspec:\ncontainers:\n- name: runtime\nresources:\n\
    requests:\nmemory: \"64Mi\"\ncpu: \"250m\"\nlimits:\nmemory: \"128Mi\"\ncpu: \"\
    500m\"\n```\n\nIn Go, you can write the **requests** part as:\n\n```\nrequests\
    \ := corev1.ResourceList{\ncorev1.ResourceMemory:\n*resource.NewQuantity(64*1024*1024,\
    \ resource.BinarySI),\ncorev1.ResourceCPU:\n*resource.NewMilliQuantity(250, resource.DecimalSI),\n\
    }\n```\n\nThe next chapter describes, in more detail, how to define quantities\
    \ using the **resource.Quantity** type. The following methods exist for the **ResourceList**\
    \ type:\n\n*   `Cpu() *resource.Quantity` – returns the quantity for the CPU key\
    \ of the map, in decimal format (1, 250 m, etc.)\n\n*   `Memory() *resource.Quantity`\
    \ – returns the quantity for the **Memory** key of the map, in binary format (512\
    \ Ki, 64 Mi, etc.)\n\n*   `Storage() *resource.Quantity` – returns the quantity\
    \ for the **Storage** key of the map, in binary format (512 Mi, 1 Gi, etc.)\n\n\
    *   `Pods() *resource.Quantity` – returns the quantity for the **Pods** key of\
    \ the map, in decimal format (1, 10, etc.)\n\n*   `StorageEphemeral() *resource.Quantity`\
    \ – returns the quantity for the **StorageEphemeral** key in the map, in binary\
    \ format (512 Mi, 1 Gi, etc.)\n\nFor each of these methods, if the key is not\
    \ defined in the map, a **Quantity** with a **Zero** value will be returned.\n\
    \nAnother method, internally used by the previous ones, could be employed to get\
    \ quantities in nonstandard format:\n\n*   `Name(name ResourceName, defaultFormat\
    \ resource.Format)` `*resource.Quantity` – this returns the quantity for the *Name*\
    \ key, in *defaultFormat* format.\n\nThe defined enumeration values for the ResourceName\
    \ type are ResourceCPU, ResourceMemory, ResourceStorage, ResourceEphemeralStorage,\
    \ and ResourcePods.\n\n### Taint\n\nThe **Taint** resource is meant to be applied\
    \ to Nodes to ensure that pods that do not tolerate these taints are not scheduled\
    \ to these nodes. The **Taint** structure is defined as follows:\n\n```\ntype\
    \ Taint struct {\nKey            string\nValue          string\nEffect       \
    \  TaintEffect\nTimeAdded      *metav1.Time\n}\n```\n\nThe **TaintEffect** enumeration\
    \ can get the following values:\n\n```\nTaintEffectNoSchedule          = \"NoSchedule\"\
    \nTaintEffectPreferNoSchedule    = \"PreferNoSchedule\"\nTaintEffectNoExecute\
    \           = \"NoExecute\"\n```\n\nThe well-known **Taint** keys, used by the\
    \ control-plane under special conditions, are defined as follows in this package:\n\
    \n```\nTaintNodeNotReady\n= \"node.kubernetes.io/not-ready\"\nTaintNodeUnreachable\n\
    = \"node.kubernetes.io/unreachable\"\nTaintNodeUnschedulable\n= \"node.kubernetes.io/unschedulable\"\
    \nTaintNodeMemoryPressure\n= \"node.kubernetes.io/memory-pressure\"\nTaintNodeDiskPressure\n\
    = \"node.kubernetes.io/disk-pressure\"\nTaintNodeNetworkUnavailable\n=\"node.kubernetes.io/network-unavailable\"\
    \nTaintNodePIDPressure\n= \"node.kubernetes.io/pid-pressure\"\nTaintNodeOutOfService\n\
    = \"node.kubernetes.io/out-of-service\"\n```\n\nThe following two methods are\
    \ defined on a **Taint**:\n\n*   `MatchTaint(taintToMatch *Taint) bool` – this\
    \ method will return true if the two taints have the same **key** and **effect**\
    \ values.\n\n*   `ToString() string` – this method will return a **string** representation\
    \ of the **Taint** in this format: **<key>=<value>:<effect>**, **<key>=<value>:**,\
    \ **<key>:<effect>**, or **<key>**.\n\n### Toleration\n\nThe **Toleration** resource\
    \ is intended to be applied to Pods to make it tolerate taints in specific nodes.\
    \ The **Toleration** structure is defined as follows:\n\n```\ntype Toleration\
    \ struct {\nKey                  string\nOperator             TolerationOperator\n\
    Value                string\nEffect               TaintEffect\nTolerationSeconds\
    \    *int64\n}\n```\n\nThe **TolerationOperator** enumeration can get the following\
    \ values:\n\n```\nTolerationOpExists    = \"Exists\"\nTolerationOpEqual     =\
    \ \"Equal\"\n```\n\nThe **TaintEffect** enumeration can get these values:\n\n\
    ```\nTaintEffectNoSchedule              = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
    \        = \"PreferNoSchedule\"\nTaintEffectNoExecute               = \"NoExecute\"\
    \n```\n\nThe following two methods are defined on a **Toleration** structure:\n\
    \n*   `MatchToleration(tolerationToMatch *Toleration) bool` – this method returns\
    \ true if the two tolerations have the same values for Key, Operator, Value, and\
    \ Effect.\n\n*   `ToleratesTaint(taint *Taint) bool` – this method returns true\
    \ if the toleration tolerates the **Taint**. The rules for a toleration to tolerate\
    \ a taint are as follows:\n    *   **Effect**: For an empty **Toleration** effect,\
    \ all Taint effects will match; otherwise, Toleration and Taint effects must match.\n\
    \n    *   **Operator**: If **TolerationOperator** is **Exists**, all Taint values\
    \ will match; otherwise, **TolerationOperator** is **Equal** and Toleration and\
    \ Taint values must match.\n\n    *   **Key**: For an empty Toleration Key, **TolerationOperator**\
    \ must be **Exists**, and all Taint keys (with any value) will match; otherwise,\
    \ Toleration and Taint keys must match.\n\n### Well-Known Labels\n\nThe control-plane\
    \ adds labels on nodes; well-known keys that are used and their usage can be found\
    \ in the file **well_known_labels.go** of the **core/v1** package. The following\
    \ are the most well-known.\n\nThe kubelet running on the node populates these\
    \ labels:\n\n```\nLabelOSStable      = \"kubernetes.io/os\"\nLabelArchStable \
    \   = \"kubernetes.io/arch\"\nLabelHostname      = \"kubernetes.io/hostname\"\n\
    ```\n\nWhen the node is running on a cloud provider, these labels can be set,\
    \ representing the instance type of the (virtual) machine, its zone, and its region:\n\
    \n```\nLabelInstanceTypeStable\n= \"node.kubernetes.io/instance-type\"\nLabelTopologyZone\n\
    = \"topology.kubernetes.io/zone\"\nLabelTopologyRegion\n= \"topology.kubernetes.io/region\"\
    \n```\n\n## Writing Kubernetes Resources in Go\n\nYou will need to write Kubernetes\
    \ resources in Go to create or update resources into the cluster, either using\
    \ an HTTP request or, more generally, using the client-go library. The client-go\
    \ library is discussed in a future chapter; but for now, let’s focus on writing\
    \ the resources in Go.\n\nTo create or update a resource, you will need to create\
    \ the structure for the *Kind* associated with the resource. For example, to create\
    \ a *deployment*, you will need to create a **Deployment** kind; and for this,\
    \ initiate a **Deployment** structure, which is defined in the **apps/v1** package\
    \ of the API Library."
  trans: "\n# ResourceList\n\n`ResourceList`类型被定义为一个映射（map），其键为`ResourceName`，值为`Quantity`。该类型在各类\
    \ Kubernetes 资源中用于定义资源的`limits`和`requests`。\n\n在 YAML 中，其用法示例如下（为容器定义资源`requests`和`limits`）：\n\
    \n```\napiVersion: v1\nkind: Pod\nmetadata:\nname: mypod\nspec:\ncontainers:\n\
    - name: runtime\nresources:\nrequests:\nmemory: \"64Mi\"\ncpu: \"250m\"\nlimits:\n\
    memory: \"128Mi\"\ncpu: \"500m\"\n```\n\n在 Go 语言中，可以如下编写`requests`部分：\n\n```\n\
    requests := corev1.ResourceList{\ncorev1.ResourceMemory:\n*resource.NewQuantity(64*1024*1024,\
    \ resource.BinarySI),\ncorev1.ResourceCPU:\n*resource.NewMilliQuantity(250, resource.DecimalSI),\n\
    }\n```\n\n下一章将更详细地描述如何使用`resource.Quantity`类型定义资源量。`ResourceList`类型提供以下方法：\n\n\
    *   `Cpu() *resource.Quantity` – 返回映射中 CPU 键对应的资源量，格式为十进制（如 1, 250 m 等）\n*   `Memory()\
    \ *resource.Quantity` – 返回映射中 Memory 键对应的资源量，格式为二进制（如 512 Ki, 64 Mi 等）\n*   `Storage()\
    \ *resource.Quantity` – 返回映射中 Storage 键对应的资源量，格式为二进制（如 512 Mi, 1 Gi 等）\n*   `Pods()\
    \ *resource.Quantity` – 返回映射中 Pods 键对应的资源量，格式为十进制（如 1, 10 等）\n*   `StorageEphemeral()\
    \ *resource.Quantity` – 返回映射中 StorageEphemeral 键对应的资源量，格式为二进制（如 512 Mi, 1 Gi 等）\n\
    \n对于以上每个方法，如果映射中未定义该键，则返回一个值为`Zero`的`Quantity`。\n\n还有一个内部使用的辅助方法，可用于获取非标准格式的资源量：\n\
    \n*   `Name(name ResourceName, defaultFormat resource.Format) *resource.Quantity`\
    \ – 返回指定键`Name`在`defaultFormat`格式下的资源量。\n\n`ResourceName`类型的枚举值包括：`ResourceCPU`、`ResourceMemory`、`ResourceStorage`、`ResourceEphemeralStorage`和`ResourcePods`。\n\
    \n# Taint\n\n`Taint`资源用于应用于节点（Node），确保不容忍这些污点的 Pod 不会被调度到这些节点上。`Taint`结构体定义如下：\n\
    \n```\ntype Taint struct {\nKey            string\nValue          string\nEffect\
    \         TaintEffect\nTimeAdded      *metav1.Time\n}\n```\n\n`TaintEffect`枚举可取以下值：\n\
    \n```\nTaintEffectNoSchedule          = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
    \    = \"PreferNoSchedule\"\nTaintEffectNoExecute           = \"NoExecute\"\n\
    ```\n\n控制平面在特殊条件下使用的已知`Taint`键，在此包中定义如下：\n\n```\nTaintNodeNotReady\n= \"node.kubernetes.io/not-ready\"\
    \nTaintNodeUnreachable\n= \"node.kubernetes.io/unreachable\"\nTaintNodeUnschedulable\n\
    = \"node.kubernetes.io/unschedulable\"\nTaintNodeMemoryPressure\n= \"node.kubernetes.io/memory-pressure\"\
    \nTaintNodeDiskPressure\n= \"node.kubernetes.io/disk-pressure\"\nTaintNodeNetworkUnavailable\n\
    = \"node.kubernetes.io/network-unavailable\"\nTaintNodePIDPressure\n= \"node.kubernetes.io/pid-pressure\"\
    \nTaintNodeOutOfService\n= \"node.kubernetes.io/out-of-service\"\n```\n\n`Taint`结构体上定义了以下两个方法：\n\
    \n*   `MatchTaint(taintToMatch *Taint) bool` – 如果两个污点的`key`和`effect`值相同，则此方法返回`true`。\n\
    *   `ToString() string` – 此方法返回`Taint`的字符串表示，格式为：`<key>=<value>:<effect>`、`<key>=<value>:`、`<key>:<effect>`或`<key>`。\n\
    \n# Toleration\n\n`Toleration`资源用于应用于 Pod，使其能够容忍特定节点上的污点。`Toleration`结构体定义如下：\n\
    \n```\ntype Toleration struct {\nKey                  string\nOperator       \
    \      TolerationOperator\nValue                string\nEffect               TaintEffect\n\
    TolerationSeconds    *int64\n}\n```\n\n`TolerationOperator`枚举可取以下值：\n\n```\nTolerationOpExists\
    \    = \"Exists\"\nTolerationOpEqual     = \"Equal\"\n```\n\n`TaintEffect`枚举可取以下值：\n\
    \n```\nTaintEffectNoSchedule              = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
    \        = \"PreferNoSchedule\"\nTaintEffectNoExecute               = \"NoExecute\"\
    \n```\n\n`Toleration`结构体上定义了以下两个方法：\n\n*   `MatchToleration(tolerationToMatch\
    \ *Toleration) bool` – 如果两个容忍度的`Key`、`Operator`、`Value`和`Effect`值分别相同，则此方法返回`true`。\n\
    *   `ToleratesTaint(taint *Taint) bool` – 如果该容忍度能够容忍指定的`Taint`，则此方法返回`true`。容忍度容忍污点的规则如下：\n\
    \    *   **Effect**：如果`Toleration`的 effect 为空，则匹配所有 Taint 的 effect；否则，Toleration\
    \ 和 Taint 的 effect 必须匹配。\n    *   **Operator**：如果`TolerationOperator`为`Exists`，则匹配所有\
    \ Taint 的值；否则，`TolerationOperator`为`Equal`，且 Toleration 和 Taint 的值必须匹配。\n    *\
    \   **Key**：如果 Toleration 的 Key 为空，则`TolerationOperator`必须为`Exists`，且匹配所有 Taint\
    \ 的 key（无论值是什么）；否则，Toleration 和 Taint 的 key 必须匹配。\n\n# Well-Known Labels\n\n控制平面会为节点添加标签；有关使用的已知键及其用法，可在`core/v1`包的`well_known_labels.go`文件中找到。以下是最广为人知的标签。\n\
    \n节点上运行的 kubelet 会填充以下标签：\n\n```\nLabelOSStable      = \"kubernetes.io/os\"\n\
    LabelArchStable    = \"kubernetes.io/arch\"\nLabelHostname      = \"kubernetes.io/hostname\"\
    \n```\n\n当节点运行在云提供商上时，可设置以下标签，用于表示（虚拟）机器的实例类型、可用区（zone）和区域（region）：\n\n```\nLabelInstanceTypeStable\n\
    = \"node.kubernetes.io/instance-type\"\nLabelTopologyZone\n= \"topology.kubernetes.io/zone\"\
    \nLabelTopologyRegion\n= \"topology.kubernetes.io/region\"\n```\n\n# Writing Kubernetes\
    \ Resources in Go\n\n你将需要用 Go 语言编写 Kubernetes 资源，以便通过 HTTP 请求或更常用的 client-go 库在集群中创建或更新资源。client-go\
    \ 库将在后续章节中讨论；但现在，让我们专注于用 Go 语言编写资源。\n\n要创建或更新资源，需要为与该资源关联的`Kind`创建相应的结构体。例如，要创建一个`deployment`，你需要创建`Deployment`类型；为此，需要初始化一个在\
    \ API 库的`apps/v1`包中定义的`Deployment`结构体。\n"
- fmt: '### Importing the Package


    Before you can work with the structure, you need to import the package that defines
    this structure. As was seen at the beginning of the chapter, the pattern for the
    package name is `k8s.io/api/<group>/<version>`. The last part of the path is a
    version number, but you should not confuse it with a version number of a Go module.


    The difference is that when you are importing a specific version of a Go module
    (e.g., `k8s.io/klog/v2`), you will use the part before the version as a prefix
    to access symbols of the package, without defining any aliases. The reason is
    that in the library, the `v2` directory does not exist but represents a branch
    name, and the files going into the package start with the line `package klog`,
    not `package v2`.


    On the contrary, when working with the Kubernetes API Library, the version number
    is the real name of a package in it, and the files into this package really start
    with `package v1`.


    If you do not define an alias for the import, you would have to use the version
    name to use symbols from this package. But the version number alone is not meaningful
    when reading the code, and if you include several packages from the same file,
    you would end up with several `v1` package names, which is not possible.


    The convention is to define an alias with the group name or, if you want to work
    with several versions of a same group, or if you want to make it clearer that
    the alias refers to an API group/version, you can create an alias with the group/version:


    ```

    import (

    corev1 "k8s.io/api/core/v1"

    appsv1 "k8s.io/api/apps/v1"

    )

    ```


    You can now instantiate a `Deployment` structure:


    ```

    myDep := appsv1.Deployment{}

    ```


    To compile your program, you will need to fetch the library. For this, use:


    ```

    $ go get k8s.io/api@latest

    ```


    Or, if you want to use a specific version of the Kubernetes API (e.g., Kubernetes
    1.23) use:


    ```

    $ go get k8s.io/api@v0.23

    ```


    All structures related to *Kinds* first embed two generic structures: `TypeMeta`
    and `ObjectMeta`. Both are declared in the `/pkg/apis/meta/v1` package of the
    API machinery library.


    ### The `TypeMeta` Fields


    The `TypeMeta` structure is defined as follows:


    ```

    type TypeMeta struct {

    Kind           string

    APIVersion     string

    }

    ```


    You generally will not have to set values for these fields yourself because the
    API Machinery infers these values from the type of the structure by maintaining
    a *Scheme*—that is, a mapping between Group-Version-Kinds and Go structures. Note
    that the `APIVersion` value is another way to write the Group-Version as a single
    field that contains `<group>/<version>` (or only `v1` for the legacy core group).


    ### The `ObjectMeta` Fields


    The `ObjectMeta` structure is defined as follows (deprecated fields as well as
    internal fields have been removed):


    ```

    Type ObjectMeta {

    Name                string

    GenerateName        string

    Namespace           string

    UID                 types.UID

    ResourceVersion     string

    Generation          int64

    Labels              map[string]string

    Annotations         map[string]string

    OwnerReferences     []OwnerReference

    [...]

    }

    ```


    The package `/pkg/apis/meta/v1` of the API Machinery Library defines Getters and
    Setters for fields of this structure. As the `ObjectMeta` is embedded in the resource
    structures, you can use these methods in the resources objects themselves.


    #### Name


    The most important information of this structure is the name of the resource.
    You can either use the `Name` field to specify the exact name of the resource
    or use the `GenerateName` field to request that the Kubernetes API selects a unique
    name for you; it is built by adding a suffix to the `GenerateName` value to make
    it unique.


    You can use the methods `GetName() string` and `SetName(name string)` on a resource
    object to access the `Name` field of its embedded `ObjectMeta`, for example:


    ```

    configmap := corev1.ConfigMap{}

    configmap.SetName("config")

    ```


    #### Namespace


    Namespaced resources need to be placed into a specific namespace. You might think
    that you need to indicate this namespace in the `Namespace` field but, when you
    create or update a resource, you will define the namespace on which to place the
    resource as part of the request path. Chapter [2](#533908_1_En_2_Chapter.xhtml)
    has shown that the request to create a pod in the `project1` namespace is:


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    ```


    If you specify a namespace in the `Pod` structure different from `project1`, you
    will get an error: *“the namespace of the provided object does not match the namespace
    sent on the request.”* For these reasons, when creating a resource, it is not
    necessary to set the `Namespace` field.


    #### UID, ResourceVersion, and Generation


    The `UID` is a unique identifier across past, present and future resources in
    a cluster. It is set by the control plane and is never updated during the lifetime
    of a resource. It must be used to reference a resource, rather than its kind,
    name, and namespace, which could describe various resources across time.


    The `ResourceVersion` is an opaque value representing the version of the resource.
    The `ResourceVersion` changes every time a resource is updated.


    This `ResourceVersion` is used for Optimistic concurrency control: if you get
    a specific version of a resource from the Kubernetes API, modify it then send
    it back to the API to update it; the API will check that the `ResourceVersion`
    of the resource you are sending back is the last one. If another process modified
    the resource in the meantime, the `ResourceVersion` will have been modified, and
    your request will be rejected; in this case, it is your responsibility to read
    the new version and update it again. This is different from a Pessimist concurrency
    control where you would need to acquire a lock before reading the resource and
    release it after updating it.


    The `Generation` is a sequence number that can be used by the resource’s controller
    to indicate the version of the desired state (the `Spec`). It will be updated
    only when the `Spec` part of the resource is updated, not the other parts (labels,
    annotations, status). The controller generally uses an `ObservedGeneration` field
    in the `Status` part to indicate which generation was processed last and is reflected
    in the status.'
  raw: '### Importing the Package


    Before you can work with the structure, you need to import the package that defines
    this structure. As was seen at the beginning of the chapter, the pattern for the
    package name is **k8s.io/api/<group>/<version>**. The last part of the path is
    a version number, but you should not confuse it with a version number of a Go
    module.


    The difference is that when you are importing a specific version of a Go module
    (e.g., **k8s.io/klog/v2**), you will use the part before the version as a prefix
    to access symbols of the package, without defining any aliases. The reason is
    that in the library, the **v2** directory does not exist but represents a branch
    name, and the files going into the package start with the line **package klog**,
    not **package v2**.


    On the contrary, when working with the Kubernetes API Library, the version number
    is the real name of a package in it, and the files into this package really start
    with **package v1**.


    If you do not define an alias for the import, you would have to use the version
    name to use symbols from this package. But the version number alone is not meaningful
    when reading the code, and if you include several packages from the same file,
    you would end up with several **v1** package names, which is not possible.


    The convention is to define an alias with the group name or, if you want to work
    with several versions of a same group, or if you want to make it clearer that
    the alias refers to an API group/version, you can create an alias with the group/version:


    ```

    import (

    corev1 "k8s.io/api/core/v1"

    appsv1 "k8s.io/api/apps/v1"

    )

    ```


    You can now instantiate a **Deployment** structure:


    ```

    myDep := appsv1.Deployment{}

    ```


    To compile your program, you will need to fetch the library. For this, use:


    ```

    $ go get k8s.io/api@latest

    ```


    Or, if you want to use a specific version of the Kubernetes API (e.g., Kubernetes
    1.23) use:


    ```

    $ go get k8s.io/api@v0.23

    ```


    All structures related to *Kinds* first embed two generic structures: **TypeMeta**
    and **ObjectMeta**. Both are declared in the **/pkg/apis/meta/v1** package of
    the API machinery library.


    ### The TypeMeta Fields


    The **TypeMeta** structure is defined as follows:


    ```

    type TypeMeta struct {

    Kind           string

    APIVersion     string

    }

    ```


    You generally will not have to set values for these fields yourself because the
    API Machinery infers these values from the type of the structure by maintaining
    a *Scheme*—that is, a mapping between Group-Version-Kinds and Go structures. Note
    that the **APIVersion** value is another way to write the Group-Version as a single
    field that contains **<group>/<version>** (or only **v1** for the legacy core
    group).


    ### The ObjectMeta Fields


    The **ObjectMeta** structure is defined as follows (deprecated fields as well
    as internal fields have been removed):


    ```

    Type ObjectMeta {

    Name                string

    GenerateName        string

    Namespace           string

    UID                 types.UID

    ResourceVersion     string

    Generation          int64

    Labels              map[string]string

    Annotations         map[string]string

    OwnerReferences     []OwnerReference

    [...]

    }

    ```


    The package **/pkg/apis/meta/v1** of the API Machinery Library defines Getters
    and Setters for fields of this structure. As the **ObjectMeta** is embedded in
    the resource structures, you can use these methods in the resources objects themselves.


    #### Name


    The most important information of this structure is the name of the resource.
    You can either use the **Name** field to specify the exact name of the resource
    or use the **GenerateName** field to request that the Kubernetes API selects a
    unique name for you; it is built by adding a suffix to the **GenerateName** value
    to make it unique.


    You can use the methods **GetName() string** and **SetName(name string)** on a
    resource object to access the **Name** field of its embedded **ObjectMeta**, for
    example:


    ```

    configmap := corev1.ConfigMap{}

    configmap.SetName("config")

    ```


    #### Namespace


    Namespaced resources need to be placed into a specific namespace. You might think
    that you need to indicate this namespace in the **Namespace** field but, when
    you create or update a resource, you will define the namespace on which to place
    the resource as part of the request path. Chapter [2](#533908_1_En_2_Chapter.xhtml)
    has shown that the request to create a pod in the **project1** namespace is:


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    ```


    If you specify a namespace in the **Pod** structure different from **project1**,
    you will get an error: *“the namespace of the provided object does not match the
    namespace sent on the request.”* For these reasons, when creating a resource,
    it is not necessary to set the **Namespace** field.


    #### UID, ResourceVersion, and Generation


    The **UID** is a unique identifier across past, present and future resources in
    a cluster. It is set by the control plane and is never updated during the lifetime
    of a resource. It must be used to reference a resource, rather than its kind,
    name, and namespace, which could describe various resources across time.


    The **ResourceVersion** is an opaque value representing the version of the resource.
    The **ResourceVersion** changes every time a resource is updated.


    This **ResourceVersion** is used for Optimistic concurrency control: if you get
    a specific version of a resource from the Kubernetes API, modify it then send
    it back to the API to update it; the API will check that the **ResourceVersion**
    of the resource you are sending back is the last one. If another process modified
    the resource in the meantime, the **ResourceVersion** will have been modified,
    and your request will be rejected; in this case, it is your responsibility to
    read the new version and update it again. This is different from a Pessimist concurrency
    control where you would need to acquire a lock before reading the resource and
    release it after updating it.


    The **Generation** is a sequence number that can be used by the resource’s controller
    to indicate the version of the desired state (the **Spec**). It will be updated
    only when the **Spec** part of the resource is updated, not the other parts (labels,
    annotations, status). The controller generally uses an **ObservedGeneration**
    field in the **Status** part to indicate which generation was processed last and
    is reflected in the status.'
  trans: '

    ### 导入包


    在使用结构体之前，需要先导入定义该结构体的包。如本章开头所述，包名的模式为 `k8s.io/api/<group>/<version>`。路径的最后一部分是版本号，但不要将其与
    Go 模块的版本号混淆。


    区别在于：当你导入 Go 模块的特定版本（例如 `k8s.io/klog/v2`）时，会使用版本号前的部分作为前缀来访问包的符号，无需定义任何别名。原因在于，在该库中，`v2`
    目录并不存在，而是代表一个分支名，并且该包内的文件都以 `package klog` 开头，而不是 `package v2`。


    相反，当使用 Kubernetes API 库时，版本号是库中一个包的真实名称，且该包内的文件确实以 `package v1` 开头。


    如果不为导入定义别名，则必须使用版本名称来使用该包的符号。但仅凭版本号在阅读代码时缺乏意义；如果从同一文件导入多个包，最终会出现多个 `v1` 包名，这是不可能的。


    惯例是使用组名定义别名；或者，如果你想使用同一组的不同版本，或想更明确地表明别名指向某个 API 组/版本，可以创建组/版本别名：


    ```

    import (

    corev1 "k8s.io/api/core/v1"

    appsv1 "k8s.io/api/apps/v1"

    )

    ```


    现在，你可以实例化一个 `Deployment` 结构体：


    ```

    myDep := appsv1.Deployment{}

    ```


    要编译程序，你需要获取该库。为此，请使用：


    ```

    $ go get k8s.io/api@latest

    ```


    或者，如果你想使用特定版本的 Kubernetes API（例如 Kubernetes 1.23），请使用：


    ```

    $ go get k8s.io/api@v0.23

    ```


    所有与 *Kind* 相关的结构体首先嵌入两个通用结构体：`TypeMeta` 和 `ObjectMeta`。两者都在 API Machinery 库的 `/pkg/apis/meta/v1`
    包中声明。


    ### `TypeMeta` 字段


    `TypeMeta` 结构体定义如下：


    ```

    type TypeMeta struct {

    Kind           string

    APIVersion     string

    }

    ```


    通常你无需自己设置这些字段的值，因为 API Machinery 通过维护一个 *Scheme*（即 Group-Version-Kind 与 Go 结构体之间的映射）从结构体的类型推断出这些值。请注意，`APIVersion`
    值是另一种将 Group-Version 表示为单个字段（包含 `<group>/<version>`，对于传统核心组则仅为 `v1`）的方式。


    ### `ObjectMeta` 字段


    `ObjectMeta` 结构体定义如下（已移除已弃用字段及内部字段）：


    ```

    Type ObjectMeta {

    Name                string

    GenerateName        string

    Namespace           string

    UID                 types.UID

    ResourceVersion     string

    Generation          int64

    Labels              map[string]string

    Annotations         map[string]string

    OwnerReferences     []OwnerReference

    [...]

    }

    ```


    API Machinery 库的 `/pkg/apis/meta/v1` 包为该结构体的字段定义了 Getter 和 Setter 方法。由于 `ObjectMeta`
    嵌入在资源结构体中，因此可以在资源对象本身中使用这些方法。


    #### Name


    该结构体最重要的信息是资源的名称。你可以使用 `Name` 字段指定资源的确切名称，或者使用 `GenerateName` 字段让 Kubernetes API
    为你选择一个唯一名称；它通过在 `GenerateName` 值后添加后缀来确保唯一性。


    你可以在资源对象上使用 `GetName() string` 和 `SetName(name string)` 方法来访问其内嵌 `ObjectMeta`
    的 `Name` 字段，例如：


    ```

    configmap := corev1.ConfigMap{}

    configmap.SetName("config")

    ```


    #### Namespace


    有命名空间的资源需要放置在特定的命名空间中。你可能认为需要在 `Namespace` 字段中指定此命名空间，但在创建或更新资源时，你将在请求路径中定义放置资源的命名空间。第
    2 章已展示在 `project1` 命名空间中创建 Pod 的请求为：


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    ```


    如果你在 `Pod` 结构体中指定的命名空间与 `project1` 不同，将会收到错误：“所提供对象的命名空间与请求中发送的命名空间不匹配。”因此，在创建资源时，无需设置
    `Namespace` 字段。


    #### UID、ResourceVersion 和 Generation


    `UID` 是集群中跨过去、现在和未来资源的唯一标识符。它由控制平面设置，并且在资源的整个生命周期中从未更新。它必须用于引用资源，而不是其种类、名称和命名空间，因为这些可能随时间描述不同的资源。


    `ResourceVersion` 是一个不透明值，代表资源的版本。`ResourceVersion` 在每次资源更新时都会改变。


    该 `ResourceVersion` 用于乐观并发控制：如果你从 Kubernetes API 获取资源的特定版本，修改它，然后将其发送回 API 进行更新；API
    将检查你发送回的资源的 `ResourceVersion` 是否为最新版本。如果在此过程中另一个进程修改了该资源，`ResourceVersion` 将已更改，则你的请求将被拒绝；在这种情况下，你需要读取新版本并再次更新。这不同于悲观并发控制，后者需要在读取资源前获取锁，并在更新后释放锁。


    `Generation` 是一个序号，可由资源的控制器用来表示期望状态（`Spec`）的版本。它仅在资源的 `Spec` 部分更新时更新，而其他部分（标签、注解、状态）更新时不会改变。控制器通常使用
    `Status` 部分中的 `ObservedGeneration` 字段来指示最后处理的是哪个 generation，并在状态中反映出来。

