  trans: "\n### 客户端集操作返回的错误\n\n本章前面介绍了`Clientset`提供的各种操作，这些操作通常返回一个`error`，并且你可以使用`errors`包中的函数来检测错误的原因——例如，使用`IsAlreadyExists`函数。\n\
    \n这些错误的具体类型是`errors.StatusError`，定义如下：\n\n```\ntype StatusError struct {\nErrStatus\
    \ metav1.Status\n}\n```\n\n可以看出，该类型仅包含本章前面已探讨过的`metav1.Status`结构体。为此`StatusError`类型提供了函数，用于访问底层的`Status`。\n\
    \n*   `Is<ReasonValue>(err error) bool` – 针对本节前面枚举的每个`Reason`值都有一个对应函数，用于指示该错误是否属于特定状态。\n\
    *   `FromObject(obj runtime.Object) error` – 当你在执行`Watch`操作期间接收到`metav1.Status`时，可以使用此函数构建一个`StatusError`对象。\n\
    *   `(e *StatusError) Status() metav1.Status` – 返回底层的`Status`。\n*   `ReasonForError(err\
    \ error) metav1.StatusReason` – 返回底层`Status`的`Reason`。\n*   `HasStatusCause(err\
    \ error, name metav1.CauseType) bool` – 指示某个错误是否具有给定`CauseType`声明的特定原因。\n*   `StatusCause(err\
    \ error, name metav1.CauseType) (metav1.StatusCause, bool)` – 若存在，则返回给定`causeType`的原因，否则返回\
    \ false。\n*   `SuggestsClientDelay(err error) (int, bool)` – 指示错误是否表明`Status`中的`RetryAfterSeconds`字段有值，并返回该值本身。\n\
    \n### RESTClient\n\n前面在“使用客户端集”部分提到，你可以为 Kubernetes API 的每个组/版本获取一个`REST`客户端。例如，以下代码返回`Core/v1`组的\
    \ REST 客户端：\n\n```\nrestClient := clientset.CoreV1().RESTClient()\n```\n\n`restClient`对象实现了`rest.Interface`接口，其定义如下：\n\
    \n```\ntype Interface interface {\nGetRateLimiter()           flowcontrol.RateLimiter\n\
    Verb(verb string)          *Request\nPost()                     *Request\nPut()\
    \                      *Request\nPatch(pt types.PatchType)  *Request\nGet()  \
    \                    *Request\nDelete()                   *Request\nAPIVersion()\
    \                schema.GroupVersion\n}\n```\n\n在此接口中，你可以看到通用方法`Verb`，以及辅助方法`Post`、`Put`、`Patch`、`Get`和`Delete`，它们返回一个`Request`对象。\n\
    \n### 构建请求\n\n`Request`结构体仅包含私有字段，并提供了一些方法来个性化 Request。如第一章[#533908_1_En_1_Chapter.xhtml]所示，Kubernetes\
    \ 资源或子资源的路径形式如下（某些段可能根据操作和资源而缺失）：\n\n```\n/apis/<group>/<version>/\nnamespaces/<namespace>/<resource>/\n\
    <name>/<subresource>\n```\n\n以下方法可用于构建此路径。请注意，`<group>`和`<version>`段是固定的，因为 REST\
    \ 客户端是针对特定组和版本的。\n\n*   `Namespace(namespace string) *Request; NamespaceIfScoped(namespace\
    \ string, scoped bool) *Request` – 这些方法用于指示要查询的资源所属的命名空间。仅当请求标记为 scoped 时，`NamespaceIfScoped`才会添加命名空间部分。\n\
    *   `Resource(resource string) *Request` – 指示要查询的资源。\n*   `Name(resourceName string)\
    \ *Request` – 指示要查询的资源名称。\n*   `SubResource(subresources ...string) *Request`\
    \ – 指示要查询资源的子资源。\n*   `Prefix(segments ...string) *Request; Suffix(segments ...string)\
    \ *Request` – 在请求路径的开头或末尾添加路径段。前缀段将添加到“namespace”段之前。后缀段将添加到子资源段之后。重复调用这些方法会在现有前缀和后缀的基础上进行添加。\n\
    *   `AbsPath(segments ...string) *Request` – 使用提供的段重置前缀。\n\n以下方法通过查询参数、请求体和标头完成请求的构建：\n\
    \n*   `Param(paramName, s string) *Request` – 使用提供的名称和值添加一个查询参数。\n*   `VersionedParams(obj\
    \ runtime.Object, codec runtime.ParameterCodec) *Request` – 添加从对象`obj`中提取的一系列参数。`obj`的具体类型通常是`ListOptions`、`GetOptions`、`DeleteOptions`、`CreateOptions`、`PatchOptions`、`ApplyOptions`、`UpdateOptions`或`TableOptions`之一。`codec`通常是\
    \ client-go 库中`scheme`包提供的参数编解码器：`scheme.ParameterCodec`。\n*   `SpecificallyVersionedParams(obj\
    \ runtime.Object, codec runtime.ParameterCodec, version schema.GroupVersion) *Request`\
    \ – 与`VersionedParams`不同，该方法中对象将使用 REST 客户端的组和版本来编码。而使用`SpecificallyVersionedParams`，你可以指定特定的组和版本。\n\
    *   `SetHeader(key string, values ...string) *Request` – 为请求的指定标头设置值。如果该键对应的标头已定义，则会被覆盖。\n\
    *   `Body(obj interface{}) *Request` – 基于`obj`设置请求的请求体内容。`obj`可以是不同的类型：\n    *\
    \   `string` – 将读取指定名称的文件，并将其内容用作请求体\n    *   `[]byte` – 数据将直接用作请求体\n    *   `io.Reader`\
    \ – 从读取器中读取的数据将用作请求体\n    *   `runtime.Object` – 对象将被序列化，结果用作请求体。`Content-Type`标头将被设置为指示对象序列化的类型（json，yaml\
    \ 等）。\n\n还有其他方法可用于配置请求的技术属性：\n\n*   `BackOff(manager BackoffManager) *Request`\
    \ – 为请求设置一个退避管理器。默认的退避管理器是`rest`包提供的`rest.NoBackoff`管理器，它在请求失败后不会等待，直接执行新请求。\n\
    *   `rest`包还提供了另一个退避管理器`rest.URLBackoff`，当服务器之前回复过 5xx 错误时，它在重试新请求之前会等待一段时间。\n\
    *   你可以使用以下代码构建并使用一个`rest.URLBackoff`对象：\n\n```\n    request.BackOff(&rest.URLBackoff{\n\
    \    Backoff: flowcontrol.NewBackOffWithJitter(\n    1*time.Second,\n    30*time.Second,\n\
    \    0.1,\n    ),\n    })\n```\n"
- fmt: "- 如果持续调用`Kubernetes API`时遇到连续`5xx`错误，`RESTClient`会在请求之间增加指数级延迟：初始`1秒`，然后`2秒`、`4秒`，以此类推，延迟上限为`30秒`，并额外增加最多`10%`的抖动（jitter），直到服务器返回非`5xx`状态码。\n\
    - 若不想添加抖动，可以使用以下代码：\n```\n    request.BackOff(&rest.URLBackoff{\n    Backoff:\
    \ flowcontrol.NewBackOff(\n    1*time.Second,\n    30*time.Second,\n    ),\n \
    \   })\n```\n- 注意，除了使用此代码为每次请求声明指数退避外，还可以通过设置环境变量`KUBE_CLIENT_BACKOFF_BASE=1`和`KUBE_CLIENT_BACKOFF_DURATION=30`，在使用`client-go`库运行程序时为所有请求实现类似行为（但不添加抖动）。\n\
    - `BackOff()`接收的参数为接口，你可以通过实现`rest.BackoffManager`接口来编写自定义的退避管理器：\n```\n    type\
    \ BackoffManager interface {\n    UpdateBackoff(\n    actualUrl *url.URL,\n  \
    \  err error,\n    responseCode int,\n    )\n    CalculateBackoff(\n    actualUrl\
    \ *url.URL,\n    ) time.Duration\n    Sleep(d time.Duration)\n    }\n```\n- 例如，实现一个针对`5xx`错误的线性退避（适用于仅调用单个主机的情况）：\n\
    ```\n    type MyLinearBackOff struct {\n    next time.Duration\n    }\n    func\
    \ (o *MyLinearBackOff) UpdateBackoff(\n    actualUrl *url.URL,\n    err error,\n\
    \    responseCode int,\n    ) {\n    if responseCode > 499 {\n    o.next += 1\
    \ * time.Second\n    return\n    }\n    o.next = 0\n    }\n    func (o *MyLinearBackOff)\
    \ CalculateBackoff(\n    actualUrl *url.URL,\n    ) time.Duration {\n    return\
    \ o.next\n    }\n    func (o *MyLinearBackOff) Sleep(\n    d time.Duration,\n\
    \    ) {\n    time.Sleep(d)\n    }\n```\n- `Throttle(limiter flowcontrol.RateLimiter)\
    \ *Request` — 限流功能会限制`RESTClient`每秒可执行的请求数。\n- 默认情况下，使用**令牌桶速率限制器**（Token Bucket\
    \ Rate Limiter），其`QPS`为`5`次/秒，突发流量（Burst）为`10`。\n- 这意味着`RESTClient`每秒最多可发起`5`个请求，外加一个可随时使用的`10`个请求的额外配额（桶）。桶会以`QPS`的速率重新填充，本例中每秒填充`5`个令牌，桶的最大容量保持为`10`。\n\
    - 你可以通过以下代码构建并使用`flowcontrol.tokenBucketRateLimiter`对象：\n```\n    request.Throttle(\n\
    \    flowcontrol.NewTokenBucketRateLimiter(5.0, 10),\n    )\n```\n- 在此示例中，请求将使用速率为`5.0`次/秒（`QPS`）且突发流量为`10`的令牌桶速率限制器。\n\
    - 注意，你可以通过设置用于创建`RESTClient`的`Config`中的`QPS`和`Burst`，为所有请求获得相同的行为。\n- 请求的默认速率限制器继承自用于创建`clientset`的`Config`。你可以通过在`Config`中设置速率限制器来更改所有请求的速率限制器。\n\
    - `MaxRetries(maxRetries int) *Request` — 指定当请求收到包含 `Retry-After` 头部和 `429` 状态码（*Too\
    \ Many Requests*）的响应时，`RESTClient`将执行的重试次数。\n- 默认值为`10`，表示在返回错误之前，请求最多会被执行`11`次。\n\
    - `Timeout(d time.Duration) *Request` — 指定`RESTClient`在返回错误之前等待请求响应的秒数。请求的默认超时时间继承自用于构建`clientset`的`HTTPClient`。\n\
    - `WarningHandler(handler WarningHandler) *Request` — `API`服务器可以使用特定头部（`Warning`头部）为请求返回警告。默认情况下，警告会被记录，并且`rest`包提供了几个内置的处理器实现：\n\
    \    - `WarningLogger{}` — 记录警告（默认行为）。\n    - `NoWarning{}` — 抑制警告。\n    - `NewWarningWriter()`\
    \ — 将警告写入指定的写入器。可指定选项：\n        - `Deduplicate` — 设为`true`时，每条警告仅写入一次。\n     \
    \   - `Color` — 设为`true`时，以黄色显示警告。\n- 你可以通过实现`WarningHandler`接口来编写自定义的警告处理器：\n\
    ```\n    type WarningHandler interface {\n    HandleWarningHeader(\n    code int,\n\
    \    agent string,\n    text string,\n    )\n    }\n```\n- 注意，你可以通过调用以下全局函数，为所有客户端的所有请求设置默认的`Warning\
    \ Handler`：\n```\nrest.SetDefaultWarningHandler(l WarningHandler)\n```\n\n###\
    \ 执行请求\n\n构建好`Request`后，即可执行它。`Request`对象上的以下方法可供使用：\n\n- `Do(ctx context.Context)\
    \ Result` — 执行请求并返回`Result`对象。下一节将介绍如何利用此`Result`对象。\n- `Watch(ctx context.Context)\
    \ (watch.Interface, error)` — 对请求的地址执行**Watch**操作，并返回一个实现`watch.Interface`接口的对象，用于接收事件。可参阅本章“监控资源”部分了解如何使用返回的对象。\n\
    - `Stream(ctx context.Context) (io.ReadCloser, error)` — 执行请求并通过`ReadCloser`流式传输结果正文。\n\
    - `DoRaw(ctx context.Context) ([]byte, error)` — 执行请求并以字节数组形式返回结果。\n\n### 利用 Result\n\
    \n在`Request`上执行`Do()`方法时，该方法会返回一个`Result`对象。\n\n`Result`结构体没有公共字段。以下方法可用于获取结果信息：\n\
    \n- `Into(obj runtime.Object) error` — 如果可能，将结果正文内容解码并存储到对象中。传入参数的具体类型必须与正文中定义的类型匹配。同时返回执行请求的错误。\n\
    - `Error() error` — 返回执行请求的错误。此方法在请求不返回任何正文内容时非常有用。\n- `Get() (runtime.Object,\
    \ error)` — 解码并将结果正文内容作为对象返回。返回对象的具体类型将与正文中定义的类型匹配。同时返回执行请求的错误。\n- `Raw() ([]byte,\
    \ error)` — 以字节数组形式返回正文，以及执行请求的错误。\n- `StatusCode(statusCode *int) Result` — 将状态码存储到传入参数中，并返回`Result`，以便方法可以链式调用。\n\
    - `WasCreated(wasCreated \\*bool) Result` — 存储一个布尔值，指示请求创建的资源是否已成功创建，并返回`Result`，以便方法可以链式调用。\n\
    - `Warnings() []net.WarningHeader` — 返回`Result`中包含的警告列表。"
  raw: "*   If you get continuous 5xx errors calling the Kubernetes API, the RESTClient\
    \ will add exponential delays between the requests, here 1 second, then 2 seconds,\
    \ then 4 seconds, and so on, capping the delays to 30 seconds, and adding a jitter\
    \ of maximum 10% to delays, until the server replies with a non-5xx status.\n\n\
    *   If you do not want to add jitter:\n\n```\n    request.BackOff(&rest.URLBackoff{\n\
    \    Backoff: flowcontrol.NewBackOff(\n    1*time.Second,\n    30*time.Second,\n\
    \    ),\n    })\n    ```\n\n*   Note that, instead of using this code to declare\
    \ an exponential backoff for each requests, you can declare the environment variables\
    \ **KUBE_CLIENT_BACKOFF_BASE=1** and **KUBE_CLIENT_BACKOFF_DURATION=30** to have\
    \ a similar behavior (without adding jitter) when running programs using the client-go\
    \ library for all requests.\n\n*   The parameter accepted by **BackOff()** being\
    \ an interface, you can write your own BackOff manager, by implementing the **rest.BackoffManager**\
    \ interface:\n\n```\n    type BackoffManager interface {\n    UpdateBackoff(\n\
    \    actualUrl *url.URL,\n    err error,\n    responseCode int,\n    )\n    CalculateBackoff(\n\
    \    actualUrl *url.URL,\n    ) time.Duration\n    Sleep(d time.Duration)\n  \
    \  }\n    ```\n\n*   For example, to implement a linear backoff on 5xx errors\
    \ (working when calling only one host):\n\n```\n    type MyLinearBackOff struct\
    \ {\n    next time.Duration\n    }\n    func (o *MyLinearBackOff) UpdateBackoff(\n\
    \    actualUrl *url.URL,\n    err error,\n    responseCode int,\n    ) {\n   \
    \ if responseCode > 499 {\n    o.next += 1 * time.Second\n    return\n    }\n\
    \    o.next = 0\n    }\n    func (o *MyLinearBackOff) CalculateBackoff(\n    actualUrl\
    \ *url.URL,\n    ) time.Duration {\n    return o.next\n    }\n    func (o *MyLinearBackOff)\
    \ Sleep(\n    d time.Duration,\n    ) {\n    time.Sleep(d)\n    }\n    ```\n\n\
    *   `Throttle(limiter flowcontrol.RateLimiter) *Request` – throttling will limit\
    \ the number of requests per second the RESTClient can execute.\n\n*   By default,\
    \ a *Token Bucket Rate Limiter* is used, with a QPS of 5 queries/second and a\
    \ Burst of 10.\n\n*   This means that the RESTClient can make a maximum of 5 requests\
    \ per second, plus a bonus (bucket) of 10 requests that it can use at any time.\
    \ The bucket can be refilled at the rate of QPS, in this case the bucket is refilled\
    \ with 5 tokens per second, the maximal size of the bucket remaining 10.\n\n*\
    \   You can build and use a **flowcontrol.tokenBucketRateLimiter** object with:\n\
    \n```\n    request.Throttle(\n    flowcontrol.NewTokenBucketRateLimiter(5.0, 10),\n\
    \    )\n    ```\n\n*   In this example, a Token Bucket Rate Limiter with a rate\
    \ of 5.0 queries/second (QPS) and a burst of 10 will be used for the Request.\n\
    \n*   Note that you can obtain the same behavior for all requests by setting the\
    \ QPS and Burst of the Config used to create the RESTClient.\n\n*   The default\
    \ Rate Limiter for a Request is inherited from the Config used to create the clientset.\
    \ You can change the Rate Limiter for all the requests by setting the Rate Limiter\
    \ in the Config.\n\n*   `MaxRetries(maxRetries int) *Request` – this indicates\
    \ the number of retries the RESTClient will perform when the Request receives\
    \ a response with a **Retry-After** header and a **429** status code (*Too Many\
    \ Requests*).\n\n*   The default value is 10, meaning that the Request will be\
    \ performed a maximum of 11 times before to return with an error.\n\n*   `Timeout(d\
    \ time.Duration) *Request` – this indicates the number of seconds the RESTClient\
    \ will wait for a response to the Request before returning an error. The default\
    \ Timeout for a Request is inherited from the HTTPClient used to build the clientset.\n\
    \n*   `WarningHandler(handler WarningHandler) *Request` – the API server can return\
    \ Warnings for a Request using a specific header (the “Warning” header). By default,\
    \ the warnings with be logged, and the **rest** package provides several built-in\
    \ implementations of handlers:\n    *   **WarningLogger{}** logs warnings (the\
    \ default)\n\n*   **NoWarning{}** suppresses warnings\n\n*   **NewWarningWriter()**\
    \ writes warnings to the provided writer. Options can be specified:\n        *\
    \   **Deduplicate** – true to write a given warning only once\n\n*   **Color**\
    \ – true to write warning in Yellow color\n\n*   You can write your own implementation\
    \ of a **WarningHandler** by implementing this interface:\n\n```\n    type WarningHandler\
    \ interface {\n    HandleWarningHeader(\n    code int,\n    agent string,\n  \
    \  text string,\n    )\n    }\n    ```\n\n*   Note that you can set a default\
    \ **Warning Handler** for all the requests from all clients by calling the following\
    \ global function:\n\n```\nrest.SetDefaultWarningHandler(l WarningHandler)\n```\n\
    \n### Executing the Request\n\nOnce the Request is built, we can execute it. The\
    \ following methods on a **Request** object can be used:\n\n*   `Do(ctx context.Context)\
    \ Result` – this executes the Request and return a Result object. We will see\
    \ in the next section how to exploit this Result object.\n\n*   `Watch(ctx context.Context)\
    \ (watch.Interface, error)` – this executes a **Watch** operation on the requested\
    \ location, and returns an object implementing the interface **watch.Interface**,\
    \ used to receive events. You can see the section “Watching Resources” of this\
    \ chapter to see how to use the returned object.\n\n*   `Stream(ctx context.Context)\
    \ (io.ReadCloser, error)` – this executes the Request and Stream the result body\
    \ through a ReadCloser.\n\n*   `DoRaw(ctx context.Context) ([]byte, error)` –\
    \ this executes the Request and return the result as an array of bytes.\n\n###\
    \ Exploiting the Result\n\nWhen you execute the **Do()** method on a Request,\
    \ the method returns a Result object.\n\nThe Result structure does not have any\
    \ public field. The following methods can be used to get information about the\
    \ result:\n\n*   `Into(obj runtime.Object) error` – this decodes and stores the\
    \ content of the result body into the object, if possible. The concrete type of\
    \ the object passed as parameter must match the kind defined in the body. Also\
    \ return the error executing the request.\n\n*   `Error() error` – this returns\
    \ the error executing the request. This method is useful when executing a request\
    \ returning no body content.\n\n*   `Get() (runtime.Object, error)` – this decodes\
    \ and returns the content of the result body as an object. The concrete type of\
    \ the returned object will match the kind defined in the body. Also return the\
    \ error executing the request.\n\n*   `Raw() ([]byte, error)` – this returns the\
    \ body as an array of bytes, and the error executing the request.\n\n*   `StatusCode(statusCode\
    \ *int) Result` – this stores the status code into the passed parameter, and return\
    \ the Result, so the method can be chained.\n\n*   `WasCreated(wasCreated *bool)\
    \ Result` – this stores a value indicating if the resource requested to be created\
    \ has been created successfully, and return the Result, so the method can be chained.\n\
    \n*   `Warnings() []net.WarningHeader` – this returns the list of Warnings contained\
    \ in the Result."
