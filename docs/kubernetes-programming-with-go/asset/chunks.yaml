    \ string) *Request; NamespaceIfScoped(namespace string, scoped bool) *Request`\
    \ – these indicate the namespace of the resource to query. **NamespaceIfScoped**\
    \ will add the namespace part only if the request is marked as scoped.\n\n*  \
    \ `Resource(resource string) *Request` – this indicates the resource to query.\n\
    \n*   `Name(resourceName string) *Request` – this indicates the name of the resource\
    \ to query.\n\n*   `SubResource(subresources ...string) *Request` – this indicates\
    \ the subresource of the resource to query.\n\n*   `Prefix(segments ...string)\
