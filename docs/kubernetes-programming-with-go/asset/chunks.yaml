- fmt: '### Getting the Logger from Context


    The Manager adds a logger to the `Context` passed to the different methods, and
    especially the `Reconcile` function.


    You can extract the logger from the `Context` using the function `FromContext`.
    Optional parameters can be used to add predefined key-value pairs to the logger:


    ```go

    func FromContext(

    ctx context.Context,

    keysAndValues ...interface{},

    ) logr.Logger {

    func (a *MyReconciler) Reconcile(

    ctx context.Context,

    req reconcile.Request,

    ) (reconcile.Result, error) {

    log := log.FromContext(ctx).WithName("reconcile")

    [...]

    }

    ```


    ## Events


    The Kubernetes API provides an `Event` resource, and an `Event` instance is attached
    to a specific instance of any kind. Events are sent by controllers to inform the
    user that some event occurred related to an object. These events are displayed
    when executing `kubectl describe`. For example, you can see the events related
    to a pod executing:


    ```bash

    $ kubectl describe pods nginx

    [...]

    Events:

    Type    Reason     Age        From               Message

    ----    ------     ----       ----               -------

    Normal  Scheduled  1s         default-scheduler  Successfully assigned...

    Normal  Pulling    0s         kubelet            Pulling image "nginx"

    Normal  Pulled       kubelet            Successfully pulled...

    Normal  Created      kubelet            Created container nginx

    Normal  Started      kubelet            Started container nginx

    ```


    To send such events from the `Reconcile` function, you need to have access to
    the `EventRecorder` instance provided by the Manager. During initialization, you
    can get this instance with the `GetEventRecorderFor` method on the Manager, then
    pass this value when building the `Reconcile` structure:


    ```go

    type MyReconciler struct {

    client        client.Client

    EventRecorder record.EventRecorder

    }

    func main() {

    [...]

    eventRecorder := mgr.GetEventRecorderFor(

    "MyResource",

    )

    err = builder.

    ControllerManagedBy(mgr).

    Named(controller.Name).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&appsv1.Deployment{}).

    Complete(&controller.MyReconciler{

    EventRecorder: eventRecorder,

    })

    [...]

    }

    ```


    Then, from the `Reconcile` function, you can call the `Event`, `Eventf`, and `AnnotatedEventf`
    methods.


    ```go

    func (record.EventRecorder) Event(

    object runtime.Object,

    eventtype, reason, message string,

    )

    func (record.EventRecorder) Eventf(

    object runtime.Object,

    eventtype, reason, messageFmt string,

    args ...interface{},

    )

    func (record.EventRecorder) AnnotatedEventf(

    object runtime.Object,

    annotations map[string]string,

    eventtype, reason, messageFmt string,

    args ...interface{},

    )

    ```


    The `object` parameter indicates to which object to attach the Event. You will
    pass the custom resource being reconciled.


    The `eventtype` parameter accepts two values, `corev1.EventTypeNormal` and `corev1.EventTypeWarning`.


    The `reason` parameter is a short value in `UpperCamelCase` format. The `message`
    parameter is a human-readable text.


    The `Event` method is used to pass a static message, the `Eventf` method can create
    a message using `Sprintf`, and the `AnnotatedEventf` method also can attach annotations
    to the event.


    ## Conclusion


    In this chapter, you have worked with the `controller-runtime` library to start
    creating an operator. You have seen how to create a Manager using the appropriate
    scheme, how to create a controller and declare the `Reconcile` function, and have
    explored the various functions of the client provided by the library to access
    the resources in the cluster.


    The next chapter explores how to write a `Reconcile` function.


    # 11. Writing the Reconcile Loop


    We have seen in the previous chapter how to bootstrap a new project for writing
    an Operator, using the `controller-runtime` Library. In this chapter, we will
    focus on the implementation of the `Reconcile` function, which is an important
    part of the implementation of an operator.


    The `Reconcile` function contains all the business logic of the Operator. The
    function will work on a single resource kind—one says the Operator *reconciles*
    this resource—and can be notified when objects of other types trigger events,
    by mapping these other types to the reconciled one using *Owner References*.


    The role of the `Reconcile` function is to ensure that the state of the system
    matches what is specified in the resource to be reconciled. For this, it will
    create “low-level” resources to implement the resource to reconcile. These resources,
    in turn, will be reconciled by other controllers or operators. When the reconciliation
    of these resources is completed, their status will be updated to reflect their
    new state. In addition, the Operator will be able to detect these changes and
    to adapt the status of the reconciled resource accordingly.


    As an example, the Operator you started to implement in the previous chapter reconciles
    the Custom Resource `MyResource`. The Operator will create `Deployment` instances
    for implementing `MyResource` instances, and for this reason, the operator also
    will want to watch for Deployment resources.


    When an event is triggered for a Deployment instance, the `MyResource` instance
    for which the deployment has been created will be reconciled. For example, after
    the Pods for the Deployment are created, the status of the deployment will be
    updated to indicate that all replicas are running. At this point, the Operator
    can modify the status of the reconciled resource to indicate that it is ready.


    The *Reconcile Loop* is known as the process of watching for resources and calling
    the `Reconcile` function when resources are created, modified, or deleted, implementing
    the reconciled resource with low-level ones, watching for the status of these
    resources, and updating the status of the reconciled resource accordingly.


    ## Writing the Reconcile Function


    The `Reconcile` function receives from the queue a resource to reconcile. The
    first operation to work on is to get the information about this resource to reconcile.


    As a matter of fact, only the namespace and name of the resource are received
    (its kind is known by its design, being the kind to be reconciled by the operator),
    but you do not receive the complete definition of the resource.


    A `Get` operation is used to get the definition of the resource.


    ### Checking Whether the Resource Exists


    The resource may have been enqueued for various reasons: it has been created,
    modified, or deleted (or another owned resource has been created, modified, or
    deleted). In the first two cases (creation or modification), the `Get` operation
    will succeed and the `Reconcile` function will know the definition of the resource
    at this point. In case of deletion, the `Get` operation will fail with a `Notfound`
    error because the resource is now deleted.


    The good practice for an Operator is to add `OwnerReferences` to resources it
    creates when reconciling a resource. The primary goal is to be able to reconcile
    its owner when these created resources are modified, and a result of adding these
    `OwnerReferences` is that these owned resources will be deleted by the Kubernetes
    garbage collector when the owner resource is deleted.


    For this reason, when a reconciled object is deleted, there is nothing to do in
    the cluster because the deletion of the associated created resources will be handled
    by the cluster.'
