  trans: '

    #### 使用动态客户端


    `dynamic` 客户端实现了 `dynamic.Interface`，其定义如下：


    ```

    type Interface interface {

    Resource(resource schema.GroupVersionResource)

    NamespaceableResourceInterface

    }

    ```


    `dynamic` 客户端的唯一直接方法是 `Resource(gvr)`，它返回一个实现了 `NamespaceableResourceInterface`
    的对象。


    ```

    type NamespaceableResourceInterface interface {

    Namespace(string) ResourceInterface

    ResourceInterface

    }

    ```


    可以将对 `Resource(gvr)` 的调用与对 `Namespace(ns)` 方法的调用进行链式调用，返回一个实现了 `ResourceInterface`
    的对象。或者，如果 `Resource(gvr)` 没有与 `Namespace(ns)` 方法进行链式调用，它同样实现了 `ResourceInterface`。


    因此，在调用 `Resource(gvr)` 后，你可以根据情况选择：如果 `gvr` 描述的资源是一个命名空间资源，并且你想定义在哪个命名空间上操作，则可以链式调用
    `Namespace(ns)`；否则，如果你希望进行集群范围的操作，可以省略这个调用（针对非命名空间资源）。


    `ResourceInterface` 的定义如下（为简洁起见，省略了函数的完整签名）：


    ```

    type ResourceInterface interface {

    Create(...)

    Update(...)

    UpdateStatus(...)

    Delete(...)

    DeleteCollection(...)

    Get(...)

    List(...)

    Watch(...)

    Patch(...)

    Apply(...)          // 从 v1.25 版本开始

    ApplyStatus(...)     // 从 v1.25 版本开始

    }

    ```


    这些方法适用于 `Unstructured` 和 `UnstructuredList` 类型。例如，`Create` 方法接受一个 `Unstructured`
    对象作为输入，并返回创建后的 `Unstructured` 对象；而 `List` 方法则返回一个 `UnstructuredList` 形式的对象列表：


    ```

    Create(

    ctx context.Context,

    obj *unstructured.Unstructured,

    options metav1.CreateOptions,

    subresources ...string,

    ) (*unstructured.Unstructured, error)

    List(

    ctx context.Context,

    opts metav1.ListOptions,

    ) (*unstructured.UnstructuredList, error)

    ```


    如果将这些方法的签名与 Client-go 客户端集提供的方法进行比较，你会发现它们非常相似。以下是一些不同之处：


    *   客户端集中使用的类型化对象（例如 `corev1.Pod`）在 `dynamic` 客户端中被 `Unstructured` 所取代。

    *   动态方法中包含了一个 `subresource…` 参数，而客户端集则为子资源提供了特定的方法。


    关于各种操作行为的更多信息，你可以参考第 6 章。


    #### 示例


    以下是一个在集群中创建 `MyResource` 实例的示例代码：


    ```

    import (

    "context"

    myresourcev1alpha1 "github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/client-go/dynamic"

    )

    func CreateMyResource(

    dynamicClient dynamic.Interface,

    u *unstructured.Unstructured,

    ) (*unstructured.Unstructured, error) {

    gvr := myresourcev1alpha1.

    SchemeGroupVersion.

    WithResource("myresources")

    return dynamicClient.

    Resource(gvr).

    Namespace("default").

    Create(

    context.Background(),

    u,

    metav1.CreateOptions{},

    )

    }

    ```


    #### *模拟* 动态客户端


    正如你在第 7 章所见，Client-go 库为客户端集、发现客户端和 REST 客户端提供了 *模拟* 实现。该库还为 `dynamic` 客户端提供了一个
    *模拟* 实现。


    与其他 *模拟* 实现类似，你可以使用 `PrependReactor` 及 `dynamicClient.Fake` 对象上的类似方法来注册 reactor，并可以在测试执行后检查
    `dynamicClient.Fake` 对象的 `Actions`。


    函数 `fake.NewSimpleDynamicClient` 用于创建一个新的 *模拟* `dynamic` 客户端。


    ```

    func NewSimpleDynamicClient(

    scheme *runtime.Scheme,

    objects ...runtime.Object,

    ) *FakeDynamicClient)

    ```


    `objects` 参数表示在创建模拟集群时需要初始化的资源。以下是一个针对使用 `dynamic` 客户端的函数的测试示例。


    `NewSimpleDynamicClient` 函数被调用时，需要传入用于创建初始资源的参数。请注意，初始资源的预期类型是 `runtime.Object`，这是由
    `Unstructured` 实现的一个接口。


    ```

    func TestCreateMyResourceWhenResourceExists(t *testing.T) {

    myres, err := getResource()

    if err != nil {

    t.Error(err)

    }

    dynamicClient := fake.NewSimpleDynamicClient(

    runtime.NewScheme(),

    myres,

    )

    // 此处并未实际使用，仅作展示用途

    dynamicClient.Fake.PrependReactor(

    "create",

    "myresources",

    func(

    action ktesting.Action,

    ) (handled bool, ret runtime.Object, err error) {

    return false, nil, nil

    })

    _, err = CreateMyResource(dynamicClient, myres)

    if err == nil {

    t.Error("应该出现错误")

    }

    actions := dynamicClient.Fake.Actions()

    if len(actions) != 1 {

    t.Errorf("操作数量应为 %d，实际为 %d", 1, len(actions))

    }

    }

    ```


    ## 总结


    本章探讨了在 Go 中处理自定义资源的不同解决方案。


    第一种方案是基于自定义资源的定义生成 Go 代码，以生成专用于该特定自定义资源定义的客户端集，从而让你能够像处理原生 Kubernetes 资源一样处理自定义资源实例。


    另一种方案是使用 Client-go 库中的 `dynamic` 客户端，并依赖 `Unstructured` 类型来定义自定义资源。

