  trans: '

    ### 资源版本的定义


    到目前为止提供的所有信息对所有版本的资源均有效。


    `Versions` 字段包含版本特定信息，以定义列表的形式存在，每个版本的资源对应一个定义。`CustomResourceDefinitionVersion`
    类型的定义如下：


    ```

    type CustomResourceDefinitionVersion struct {

    Name                      string

    Served                    bool

    Storage                   bool

    Deprecated                bool

    DeprecationWarning        *string

    Schema                    *CustomResourceValidation

    Subresources              *CustomResourceSubresources

    AdditionalPrinterColumns  []CustomResourceColumnDefinition

    }

    ```


    `Name` 表示版本名称。Kubernetes 资源使用标准格式表示版本：`v<number>[(alpha|beta)<number>]`，但你可以使用任何你想要的格式。


    `Served` 布尔值指示此特定版本是否必须由 API Server 提供服务。如果不是，该版本仍然被定义并可用作存储（见下文），但用户不能以该特定版本创建或获取资源实例。


    `Storage` 布尔值指示此特定版本是否用于持久化资源。必须恰好有一个版本将此字段设置为 true。你已经在第 5 章的“转换”部分看到，同一资源的不同版本之间存在转换函数。用户可以在任何可用的版本中创建资源，API
    Server 会将其转换为 `Storage=true` 的版本，然后再将数据持久化到 `etcd` 中。


    `Deprecated` 布尔值指示此特定版本的资源是否已被弃用。如果为 true，服务器将在对此版本的响应中添加一个 Warning 头。


    `DeprecationWarning` 是当 `Deprecated` 为 true 时返回给调用者的警告消息。如果 `Deprecated` 为 true
    且此字段为 nil，则会发送一条默认警告消息。


    `Schema` 描述此资源版本的架构。该架构用于验证在创建或更新资源时发送到 API 的数据。此字段是可选的。架构将在“资源的架构”一节中更详细地讨论。


    `Subresources` 定义为该资源版本提供的子资源。此字段是可选的。此字段的类型定义如下：


    - 如果 `Status` 不为 nil，则将提供 “/status” 子资源。

    - 如果 `Scale` 不为 nil，则将提供 “/scale” 子资源。


    ```

    type CustomResourceSubresources struct {

    Status *CustomResourceSubresourceStatus

    Scale *CustomResourceSubresourceScale

    }

    ```


    `AdditionalPrinterColumns` 是当用户请求 Table 输出格式时要返回的额外列的列表。此字段是可选的。有关 Table 输出格式的更多信息，请参见第
    2 章的“获取结果为表格”一节。你将看到如何在本章的“额外打印列”一节中定义额外的打印列。


    ### 版本间转换


    `Conversion` 指示如何处理此资源版本间的转换。此字段的类型定义如下：


    ```

    type CustomResourceConversion struct {

    Strategy ConversionStrategyType

    Webhook *WebhookConversion

    }

    ```


    `Strategy` 可以取 `NoneConverter` 或 `WebhookConverter` 值。`NoneConverter` 值指示 API
    Server 在持久化之前仅更改 `APIVersion` 字段。


    `WebhookConverter` 值指示 API Server 调用外部 webhook 来进行转换。当使用此值时，`Webhook` 字段需要包含 API
    Server 调用 webhook 所需的全部信息。


    ## 资源的架构


    特定版本的资源架构是使用 OpenAPI v3 架构格式定义的。^(³) 对该格式的完整描述超出了本书的范围。以下是一个简短的介绍，可以帮助你为你的资源定义一个架构。


    自定义资源通常有一个 `Spec` 部分和一个 `Status` 部分。为此，你需要声明一个类型为 `object` 的顶层架构，并使用 `properties`
    属性声明字段。在此示例中，顶层架构将具有 `Spec` 和 `Status` 属性。然后你可以递归地描述每个属性。


    `Spec` 和 `Status` 字段也属于 `object` 类型，并且包含属性。可接受的数据类型包括：


    - `string`

    - `number`

    - `integer`

    - `boolean`

    - `array`

    - `object`


    可以为 `string` 和 `number` 类型指定特定格式：


    - `string`: date, date-time, byte, int-or-string

    - `number`: float, double, int32, int64


    在一个对象中，必需的字段使用 `required` 属性指示。


    你可以使用 `enum` 属性声明一个属性仅接受一组值。要声明一个值映射（map），你需要使用 `object` 类型并指定 `additionalProperties`
    属性。此属性可以接受一个 `true` 值（表示条目可以具有任何类型），或者通过给出一个类型作为值来定义映射中条目的类型：


    ```

    type: object

    additionalProperties:

    type: string

    ```


    或者：


    ```

    type: object

    additionalProperties:

    type: object

    properties:

    code:

    type: integer

    text:

    type: string

    ```


    当声明一个数组时，你必须定义数组项的类型：


    ```

    type: array

    items:

    type: string

    ```


    例如，这是一个自定义资源的架构，它在 `Spec` 中包含三个字段（`image`、`replicas` 和 `port`），并在 `Status` 中包含一个
    `state` 字段。


    ```

    schema:

    openAPIV3Schema:

    type: object

    properties:

    spec:

    type: object

    properties:

    image:

    type: string

    replicas:

    type: integer

    port:

    type: string

    format: int-or-string

    required: [image,replicas]

    status:

    type: object

    properties:

    state:

    type: string

    enum: [waiting,running]

    ```

    '
- fmt: '# Deploying a Custom Resource Definition


    To deploy a new resource definition to the cluster, you need to execute a `Create`
    operation on a CRD object. You can either use the `Clientset` provided by the
    `apiextensions-apiserver` Library and write the resource definition in Go using
    the structures you have seen in previous sections, or you can create a YAML file
    and "apply" it using `kubectl`.


    As an example, you will create a new resource named `myresources` in the group
    `mygroup.example.com`, and with a version `v1alpha1`, using the YAML format and
    `kubectl` to deploy it.


    - ❶ The group and version of the CRD resource

    - ❷ The kind of the CRD resource

    - ❸ The complete name of the new resource, including its group

    - ❹ The group the new resource belongs to

    - ❺ The new resource can be created in specific namespaces

    - ❻ The plural name of the new resource, used in the path to access this new resource

    - ❼ The singular name of the resource, you can use `kubectl get myresource`

    - ❽ Short names of the new resource, you can use `kubectl get my`, `kubectl get
    myres`

    - ❾ Adds the resource to the category `all`; resources of this kind will appear
    when running `kubectl get all`

    - ❿ `v1alpha1` version is the only version defined for the new resource

    - ⓫ Defines the new resource schema as an object, with no field


    ```

    apiVersion: apiextensions.k8s.io/v1        ❶

    kind: CustomResourceDefinition             ❷

    metadata:

    name: myresources.mygroup.example.com    ❸

    spec:

    group: mygroup.example.com               ❹

    scope: Namespaced                        ❺

    names:

    plural: myresources                    ❻

    singular: myresource                   ❼

    shortNames:

    - my                                   ❽

    - myres

    kind: MyResource

    categories:

    - all                                  ❾

    versions:

    - name: v1alpha1                         ❿

    served: true

    storage: true

    schema:

    openAPIV3Schema:

    type: object                       ⓫

    ```


    Now, you can "apply" this resource using `kubectl`, using the following command:


    ```

    $ kubectl apply -f myresource.yaml

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com
    created

    ```


    From there, you can work with this new resource.


    For example, you can get the list of resources cluster-wide or in a specific namespace,
    using HTTP requests (you will need to execute `kubectl proxy` from another terminal
    before running these commands):


    ```

    $ curl

    http://localhost:8001/apis/mygroup.example.com/v1alpha1/myresources

    {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186523407"}}

    $ curl

    http://localhost:8001/apis/mygroup.example.com/v1alpha1/namespaces/default/myresources

    {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186524840"}}

    ```


    Or, you can obtain these lists using `kubectl`:


    ```

    $ kubectl get myresources

    No resources found in default namespace.

    ```


    You can define a new resource using the YAML format, and "apply" it to the cluster,
    using `kubectl`:


    ```

    $ kubectl apply -f - <<EOF

    apiVersion: mygroup.example.com/v1alpha1

    kind: MyResource

    metadata:

    name: myres1

    EOF

    $ kubectl get myresources

    NAME     AGE

    myres1   10s

    ```


    ## Additional Printer Columns


    You can see in the output of the previous `kubectl get myresources` command that
    the columns displayed are the *name* and *age* of the resources.


    The `AdditionalPrinterColumns` field of the CRD spec is used to indicate which
    columns of the resource you want to be displayed in the output of `kubectl get
    <resource>`.


    When no additional printer columns are defined, the *name* and *age* are returned
    by default. If you specify columns, they will be returned in addition to the *name*.
    If you want to keep the *age* when adding columns, you will need to add it explicitly.


    For each additional column, you need to specify a name, a JSON path, and a type.
    The name will be used as a header for the column in the output, the JSON path
    is used by the API Server to get the value for this column from the resource data,
    and the type is an indication for `kubectl` to display this data.


    As an example, here is the `myresource` CRD with some fields defined in the `Spec`
    and `Status`, and additional printer columns also are defined:


    ```

    apiVersion: apiextensions.k8s.io/v1

    kind: CustomResourceDefinition

    metadata:

    name: myresources.mygroup.example.com

    spec:

    group: mygroup.example.com

    scope: Namespaced

    names:

    plural: myresources

    singular: myresource

    shortNames:

    - my

    - myres

    kind: MyResource

    categories:

    - all

    versions:

    - name: v1alpha1

    served: true

    storage: true

    subresources:

    status: {}

    schema:

    openAPIV3Schema:

    type: object

    properties:

    spec:

    type: object

    properties:

    image:

    type: string

    memory:

    x-kubernetes-int-or-string: true

    status:

    type: object

    properties:

    state:

    type: string

    additionalPrinterColumns:

    - name: image

    jsonPath: .spec.image

    type: string

    - name: memory

    jsonPath: .spec.memory

    type: string

    - name: age

    jsonPath: .metadata.creationTimestamp

    type: date

    ```


    In this CRD, the schema indicates that the data for the resources will be an object
    containing two properties, `spec` and `status`. These properties are objects themselves.
    The `spec` object contains two properties: `image` of type `string`, and `memory`
    of special type `int or string`. The `status` object contains one property `state`
    of type `string`.


    Note that you have enabled the `status` subresource by adding the `status` entry
    in the `subresources` object. You have defined for the CRD three additional printer
    columns: `image`, `memory`, and `age`. The JSON paths for `image` and `memory`
    point to the fields defined in the schema, and the JSON path for `age` points
    to a field in the standard `metadata` field.


    After applying the CRD again to the cluster, you can define a new resource with
    these fields, apply the resource definition to the cluster, and get the list of
    resources with `kubectl`:


    - ❶ The CRD is updated with the new schema and additional printer columns

    - ❷ A value is given for the field `image`

    - ❸ A value is given for the field `memory`; this is a string

    - ❹ The custom resource is updated, with the new fields defined

    - ❺ The output of `kubectl get` now displays the additional columns


    ```

    $ kubectl apply -f myresource.yaml

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com
    configured                              ❶

    $ cat > myres1.yaml <<EOF

    apiVersion: mygroup.example.com/v1alpha1

    kind: MyResource

    metadata:

    name: myres1

    spec:

    image: nginx                              ❷

    memory: 1024Mi                            ❸

    EOF

    $ kubectl apply -f myres1.yaml              ❹

    myresource.mygroup.example.com/myres1 configured

    $ kubectl get myresources

    NAME     IMAGE   MEMORY   AGE

    myres1   nginx   1024Mi   12m               ❺

    ```


    ## Conclusion


    In this chapter, you have seen that the list of resources served by the Kubernetes
    API is extendable by creating `CustomResourceDefinition` (CRD) resources in the
    cluster. You have seen the structure in Go of this CRD resource and how to manipulate
    CRD resources using the dedicated `Clientset`.


    Following that you have seen how to write a CRD in YAML and how to deploy it to
    the cluster using `kubectl`. Some fields then have been added to the CRD scheme,
    as well as some additional printer columns so as to display these fields in the
    output of `kubectl get`.


    Finally, you have seen that as soon as the CRD is created in the cluster, you
    can start working with resources of the new associated kind.


    Footnotes [1](#533908_1_En_8_Chapter.xhtml#Fn1_source)  [2](#533908_1_En_8_Chapter.xhtml#Fn2_source)  [3](#533908_1_En_8_Chapter.xhtml#Fn3_source)'
