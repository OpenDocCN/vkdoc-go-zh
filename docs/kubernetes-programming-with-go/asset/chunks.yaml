  raw: '## Defining a ginkgo Suite


    To start the tests for the **Reconcile** function, you can use a **go** test function
    to start **ginkgo** specs:


    ```

    import (

    "testing"

    . "github.com/onsi/ginkgo/v2"

    . "github.com/onsi/gomega"

    )

    func TestMyReconciler_Reconcile(t *testing.T) {

    RegisterFailHandler(Fail)

    RunSpecs(t,

    "Controller Suite",

    )

    }

    ```


    Then, you can declare **BeforeSuite** and **AfterSuite** functions, which are
    used to start and stop the **Environment** and the Manager.


    Here is an example for these functions, which will create an environment with
    the CRD for **MyResource** loaded. The Manager is started in a **Go** routine
    at the end of the **BeforeSuite** function, so the tests can be executed on the
    main **Go** routine.


    Note that you are creating a *Cancelable Context*, which is used when starting
    the Manager, so you can stop the Manager by canceling the context from the **AfterSuite**
    function.


    *   ❶ **testEnv**, **ctx**, and **cancel** will be used in **BeforeSuite** and
    **AfterSuite**


    *   ❷ **k8sClient** will be used in tests


    *   ❸ Create a cancelable context


    *   ❹ Create the **testEnv** environment


    *   ❺ Start the **testEnv** environment


    *   ❻ Build the scheme to pass to the Manager


    *   ❼ Build the Manager


    *   ❽ Get the **k8sClient** from the Manager to use for tests


    *   ❾ Build the Controller


    *   ❿ Start the Manager from a **Go** routine


    *   ⓫ Cancel the context, which will terminate the Manager


    *   ⓬ Terminate the **testEnv** environment


    ```

    import (

    "context"

    "path/filepath"

    "testing"

    . "github.com/onsi/ginkgo/v2"

    . "github.com/onsi/gomega"

    appsv1 "k8s.io/api/apps/v1"

    "k8s.io/apimachinery/pkg/runtime"

    clientgoscheme "k8s.io/client-go/kubernetes/scheme"

    "sigs.k8s.io/controller-runtime/pkg/builder"

    "sigs.k8s.io/controller-runtime/pkg/client"

    "sigs.k8s.io/controller-runtime/pkg/envtest"

    "sigs.k8s.io/controller-runtime/pkg/log"

    "sigs.k8s.io/controller-runtime/pkg/log/zap"

    "sigs.k8s.io/controller-runtime/pkg/manager"

    mygroupv1alpha1 "github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    )

    var (

    testEnv   *envtest.Environment                        ❶

    ctx       context.Context

    cancel    context.CancelFunc

    k8sClient client.Client                               ❷

    )

    var _ = BeforeSuite(func() {

    log.SetLogger(zap.New(

    zap.WriteTo(GinkgoWriter),

    zap.UseDevMode(true),

    ))

    ctx, cancel = context.WithCancel(                     ❸

    context.Background(),

    )

    testEnv = &envtest.Environment{                       ❹

    CRDDirectoryPaths:     []string{

    filepath.Join("..", "..", "crd"),

    },

    ErrorIfCRDPathMissing: true,

    }

    var err error

    // cfg is defined in this file globally.

    cfg, err := testEnv.Start()                           ❺

    Expect(err).NotTo(HaveOccurred())

    Expect(cfg).NotTo(BeNil())

    scheme := runtime.NewScheme()                         ❻

    err = clientgoscheme.AddToScheme(scheme)

    Expect(err).NotTo(HaveOccurred())

    err = mygroupv1alpha1.AddToScheme(scheme)

    Expect(err).NotTo(HaveOccurred())

    mgr, err := manager.New(cfg, manager.Options{         ❼

    Scheme: scheme,

    })

    Expect(err).ToNot(HaveOccurred())

    k8sClient = mgr.GetClient()                           ❽

    err = builder.                                        ❾

    ControllerManagedBy(mgr).

    Named(Name).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&appsv1.Deployment{}).

    Complete(&MyReconciler{})

    go func() {

    defer GinkgoRecover()

    err = mgr.Start(ctx)                             ❿

    Expect(err).ToNot(

    HaveOccurred(),

    "failed to run manager",

    )

    }()

    })

    var _ = AfterSuite(func() {

    cancel()                                              ⓫

    err := testEnv.Stop()                                 ⓬

    Expect(err).NotTo(HaveOccurred())

    })

    ```


    ## Writing the Tests


    Now that you have a suite that starts and stops the environment, you can write
    the tests. The tests will start by creating a **MyResource** instance to verify
    that the **Reconcile** function creates the expected “low-level” resources, with
    the expected definition.


    Then, when the low-level resources are created, the tests will update the status
    of the low-level resources (remember that no Controller is deployed in the cluster,
    so you have to do these changes from the tests instead) to verify that the status
    of the **MyResource** instance is updated accordingly.


    The plan for the tests will be the following. Note that each **It** test will
    be executed separately, and for each **It**, all preceding **BeforeEach** will
    be executed before the test, and all preceding **AfterEach** will be executed
    after the test.


    ```

    var _ = Describe("MyResource controller", func() {

    When("creating a MyResource instance", func() {

    BeforeEach(func() {

    // Create the MyResource instance

    })

    AfterEach(func() {

    // Delete the MyResource instance

    })

    It("should create a deployment", func() {

    // Check that the deployment

    // is eventually created

    })

    When("deployment is found", func() {

    BeforeEach(func() {

    // Wait for the deployment

    // to be eventually created

    })

    It("should be owned by the MyResource instance", func() {

    // Check ownerReference in Deployment

    // references the MyResource instance

    })

    It("should use the image specified in MyResource instance", func() {

    })

    When("deployment ReadyReplicas is 1", func() {

    BeforeEach(func() {

    // Update the Deployment status

    // to ReadyReplicas=1

    })

    It("should set status ready for MyResource instance", func() {

    // Check the status of MyResource instance

    // is eventually Ready

    })

    })

    })

    })

    })

    ```


    To clearly show the unfolding of the tests, here is how the four **It** tests
    will be executed, with the **BeforeEach** and **AfterEach** displayed.


    ### Test 1


    *   **When**: creating a MyResource instance


    *   **Before**: // Create the MyResource instance


    *   **It**: should create a deployment


    *   **After**: // Delete the MyResource instance


    ### Test 2


    *   **When**: creating a MyResource instance


    *   **Before**: // Create the MyResource instance


    *   **When**: deployment is found


    *   **Before**: // Wait deployment eventually created


    *   **It**: should be owned by the MyResource instance


    *   **After**: // Delete the MyResource instance


    ### Test 3


    *   **When**: creating a MyResource instance


    *   **Before**: // Create the MyResource instance


    *   **When**: deployment is found


    *   **Before**: // Wait deployment eventually created


    *   **It**: should use image specified in MyResource instance


    *   **After**: // Delete the MyResource instance


    ### Test 4


    *   **When**: creating a MyResource instance


    *   **Before**: // Create the MyResource instance


    *   **When**: deployment is found


    *   **Before**: // Wait deployment eventually created


    *   **When**: deployment ReadyReplicas is 1


    *   **Before**: // Update Deployment status to ReadyReplicas=1


    *   **It**: should set status ready for MyResource instance


    *   **After**: // Delete the MyResource instance


    Finally, the complete source code of the tests follows after the next paragraphs.
    Note that you are creating the MyResource instance with a random name, so the
    created resources are not in conflict between the tests.


    As a matter of fact, tests are executed one after the other, so resources remaining
    from the previous tests could interfere with the subsequent tests.


    In this implementation, you can finish the test by removing the MyResource instance,
    but because no Controller is running in the cluster, the Deployment is not deleted
