    ```

    $ source <(setup-envtest use -i -p env 1.23.5)

    $ echo $KUBEBUILDER_ASSETS

    /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64

    ```


    This will define and export the **KUBEBUILDER_ASSETS** variable with the path
    containing the binaries for Kubernetes 1.23.5.


    ### Using envtest


    The control plane will only run the API Server and **etcd**, but no controller.
    This means that when the operator you want to test will create Kubernetes resources,
    no controller will react. For example, if the operator creates a Deployment, no
    pod will be created, and the deployment status will never be updated.


    This can be surprising at first, but this will help you test your operator only,
    not the Kubernetes controllers. To create the Test Environment, you first need
    to create an instance of an **envtest.Environment** structure.


    Using default values for the **Environment** structure will start a local control
    plane using binaries in **/usr/local/kubebuilder/bin** or from the directory defined
    in the **KUBEBUILDER_ASSETS** environment variable.


    If you are writing an operator reconciling a custom resource, you will need to
    add the Custom Resource Definition (CRD) for this custom resource. For this, you
    can use the **CRDDirectoryPaths** field to pass the list of directories containing
    CRD definitions in YAML or JSON format. All these definitions will be applied
    to the local cluster when initializing the environment.


    The field **ErrorIfCRDPathMissing** is useful if you want to be altered when the
    CRD directories do not exist. As an example, here is how an **Environment** structure
    can be created, with the CRD YAML or JSON files located in the **../../crd** directory:


    ```

    import (

    "path/filepath"

    "sigs.k8s.io/controller-runtime/pkg/envtest"

    )

    testEnv = &envtest.Environment{

    CRDDirectoryPaths:     []string{

    filepath.Join("..", "..", "crd"),

    },

    ErrorIfCRDPathMissing: true,

    }

    ```


    To start the environment, you can use the **Start** method on this **Environment**:


    ```

    cfg, err := testEnv.Start()

    ```


    This method returns a **rest.Config** value, which is the **Config** value to
    be used to connect to the local cluster launched by the **Environment**. At the
    end of the test, the **Environment** can be stopped using the **Stop** method:


    ```

