- fmt: '## Fake REST Client


    A *fake* `RESTClient` structure is available in the `rest/fake` package of the
    Client-go Library. The structure is specified as follows:


    ```go

    import "k8s.io/client-go/rest/fake"

    type RESTClient struct {

    NegotiatedSerializer runtime.NegotiatedSerializer

    GroupVersion         schema.GroupVersion

    VersionedAPIPath     string

    Err error

    Req *http.Request

    Client *http.Client

    Resp *http.Response

    }

    ```


    The `NegotiatedSerializer` field accepts a Codec. You will need to use the Codec
    provided by the Client-go Library to be able to encode and decode resources from
    the Kubernetes API.


    A `RESTClient` from the Client-go Library is specific to a Group and Version.
    You can specify the Group and the Version using the `GroupVersion` field.


    `VersionedAPIPath` can be employed to specify a prefix for the API path. The other
    fields are utilized to imitate the result of the request:


    - If `Err` is not nil, this error will be returned immediately for any call using
    the `RESTClient`.

    - Else, if `Client` is not nil, this `http.Client` is used to make the HTTP request
    for any call using the `RESTClient`.

    - Else, `Resp` is returned as a response for any call using the `RESTClient`.


    With the fields `Err` and `Resp`, you can hardcode the result of calls to the
    `RESTClient`, either to return a specific error or return a specific response.


    Using the `Client` field, you can have some advanced code that will return a specific
    result depending on the request, or make some computation based on the request,
    and so on. As an example, here is a function that `getPods` from a specific namespace,
    using the `RESTClient`:


    ```go

    func getPods(

    ctx context.Context,

    restClient rest.Interface,

    ns string,

    ) ([]corev1.Pod, error) {

    result := corev1.PodList{}

    err := restClient.Get().

    Namespace(ns).

    Resource("pods").

    Do(ctx).

    Into(&result)

    if err != nil {

    return nil, err

    }

    return result.Items, nil

    }

    ```


    To call this function from your code, you want to provide a `RESTClient` from
    a Clientset—for example, using the following code:


    ```go

    restClient := clientset.CoreV1().RESTClient()

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    To evaluate how the function behaves when it returns specific values, you should
    use the *fake* `RESTClient` instead. For example, to assert the result of the
    function when the `RESTClient` call returns an error, you can create this *fake*
    `RESTClient`:


    ```go

    import (

    "context"

    "errors"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:               corev1.SchemeGroupVersion,

    NegotiatedSerializer:      scheme.Codecs,

    Err: errors.New("an error from the rest client"),

    }

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    Another example, to assert the result of the function when the call returns a
    NotFound (404) status, you can define the following *fake* `RESTClient`:


    ```go

    import (

    "net/http"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:         corev1.SchemeGroupVersion,

    NegotiatedSerializer: scheme.Codecs,

    Err: nil,

    Resp: &http.Response{

    StatusCode: http.StatusNotFound,

    },

    }

    ```


    ## FakeDiscovery Client


    A `FakeDiscovery` structure is specified in the `discovery/fake` package of the
    Client-go Library. The structure is defined as follows:


    ```go

    type FakeDiscovery struct {

    *testing.Fake

    FakedServerVersion *version.Info

    }

    ```


    An implementation of such a `FakeDiscovery` client is accessible from the *fake*
    Clientset:


    ```go

    import (

    "k8s.io/client-go/kubernetes/fake"

    fakediscovery "k8s.io/client-go/discovery/fake"

    )

    clientset := fake.NewSimpleClientset()

    discoveryClient, ok :=

    clientset.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    ```


    ### Stubbing the ServerVersion


    The `FakeDiscovery` structure provides a field `FakedServerVersion` that you can
    use to simulate the server version returned by the `ServerVersion()` method of
    the `discovery.DiscoveryInterface`. As an example, here is a function you should
    test, checking that the server version is at least a provided version:


    ```go

    func checkMinimalServerVersion(

    clientset kubernetes.Interface,

    minMinor int,

    ) (bool, error) {

    discoveryClient := clientset.Discovery()

    info, err := discoveryClient.ServerVersion()

    if err != nil {

    return false, err

    }

    major, err := strconv.Atoi(info.Major)

    if err != nil {

    return false, err

    }

    minor, err := strconv.Atoi(info.Minor)

    if err != nil {

    return false, err

    }

    return major == 1 && minor >= minMinor, nil

    }

    ```


    You can now assert the result of the function when the Discovery client returns
    a specific version, here 1.10.


    As an exercise, you can rewrite this test function by using a table-driven test
    instead so as to be able to test the result for various values of the server versions.


    ```go

    func Test_getServerVersion(t *testing.T) {

    client := fake.NewSimpleClientset()

    fakeDiscovery, ok := client.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    fakeDiscovery.FakedServerVersion = &version.Info{

    Major: "1",

    Minor: "10",

    }

    res, err := checkMinimalServerVersion(client, 20)

    if res != true && err != nil {

    t.Error(err)

    }

    }

    ```


    ### Actions


    The methods `ServerVersion`, `ServerGroups`, `ServerResourcesForGroupVersion`,
    and `ServerGroupsAndResources` of the *fake* Discovery client all use the concept
    of *Actions* used by the *fake* Clientset, as described in this chapter’s “Reacting
    to Actions” and “Checking the Actions” sections.


    To evaluate your functions’ use of these methods, you can assert the actions done
    by the Discovery client, by adding reactors or by checking the actions executed.
    Note that the Verb and Resource used for these methods are:


    - `ServerVersion` – `"get"`, `"version"`

    - `ServerGroups` – `"get"`, `"group"`

    - `ServerResourcesForGroupVersion` – `"get"`, `"resource"`

    - `ServerGroupsAndResources` – `"get"`, `"group"` and `"get"`, `"resource"`


    ### Mocking Resources


    For the real implementation, the `ServerGroups`, `ServerResourcesForGroupVersion`,
    and `ServerGroupsAndResources` methods rely on groups and resources defined by
    the API server.


    For the *fake* implementation, these methods rely on the `Resources` field of
    the `Fake` field of the *fake* Clientset. To mock the result of these methods
    with various values of groups and resources, you can fill this `Resources` field
    before calling these methods.


    ## Conclusion


    This chapter has shown how to use the *fake* implementations of the Clienset,
    REST client, and Discovery client; all are helpful to write unit tests for functions
    using the Client-go Library.


    It closes the first part of this book, which covers libraries to work with the
    native Kubernetes resources. In the following chapters, you will learn how to
    extend the Kubernetes API by creating custom resources.'
  raw: '## Fake REST Client


    A *fake* **RESTClient** structure is available in the **rest/fake** package of
    the Client-go Library. The structure is specified as follows:


    ```

    import "k8s.io/client-go/rest/fake"

    type RESTClient struct {

    NegotiatedSerializer runtime.NegotiatedSerializer

    GroupVersion         schema.GroupVersion

    VersionedAPIPath     string

    Err error

    Req *http.Request

    Client *http.Client

    Resp *http.Response

    }

    ```


    The **NegotiatedSerializer** field accepts a Codec. You will need to use the Codec
    provided by the Client-go Library to be able to encode and decode resources from
    the Kubernetes API.


    A **RESTClient** from the **Client-go** Library is specific to a **Group** and
    **Version**. You can specify the Group and the Version using the **GroupVersion**
    field.


    **VersionedAPIPath** can be employed to specify a prefix for the API path. The
    other fields are utilized to imitate the result of the request:


    *   If `Err` is not nil, this error will be returned immediately for any call
    using the **RESTClien**t.


    *   `E`lse, `if` **Client** is not nil, this *http.Client* is used to make the
    *HTTP* request for any call using the **RESTClient**.


    *   Else, `Resp` is returned as a response for any call using the **RESTClient**.


    With the fields **Err** and **Resp**, you can hardcode the result of calls to
    the **RESTClient**, either to return a specific error or return a specific response.


    Using the **Client** field, you can have some advanced code that will return a
    specific result depending on the request, or make some computation based on the
    request, and so on. As an example, here is a function that **getPods** from a
    specific namespace, using the **RESTClient**:


    ```

    func getPods(

    ctx context.Context,

    restClient rest.Interface,

    ns string,

    ) ([]corev1.Pod, error) {

    result := corev1.PodList{}

    err := restClient.Get().

    Namespace(ns).

    Resource("pods").

    Do(ctx).

    Into(&result)

    if err != nil {

    return nil, err

    }

    return result.Items, nil

    }

    ```


    To call this function from your code, you want to provide a **RESTClient** from
    a Clientset—for example, using the following code:


    ```

    restClient := clientset.CoreV1().RESTClient()

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    To evaluate how the function behaves when it returns specific values, you should
    use the *fake* **RESTClient** instead. For example, to assert the result of the
    function when the **RESTClient** call returns an error, you can create this *fake*
    **RESTClient**:


    ```

    import (

    "context"

    "errors"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:               corev1.SchemeGroupVersion,

    NegotiatedSerializer:      scheme.Codecs,

    Err: errors.New("an error from the rest client"),

    }

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    Another example, to assert the result of the function when the call returns a
    **NotFound** (404) status, you can define the following *fake* **RESTClient**:


    ```

    import (

    "net/http"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:         corev1.SchemeGroupVersion,

    NegotiatedSerializer: scheme.Codecs,

    Err: nil,

    Resp: &http.Response{

    StatusCode: http.StatusNotFound,

    },

    }

    ```


    ## FakeDiscovery Client


    A **FakeDiscovery** structure is specified in the **discovery/fake** package of
    the Client-go Library. The structure is defined as follows:


    ```

    type FakeDiscovery struct {

    *testing.Fake

    FakedServerVersion *version.Info

    }

    ```


    An implementation of such a **FakeDiscovery** client is accessible from the *fake*
    Clientset:


    ```

    import (

    "k8s.io/client-go/kubernetes/fake"

    fakediscovery "k8s.io/client-go/discovery/fake"

    )

    clientset := fake.NewSimpleClientset()

    discoveryClient, ok :=

    clientset.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    ```


    ### Stubbing the ServerVersion


    The **FakeDiscovery** structure provides a field **FakedServerVersion** that you
    can use to simulate the server version returned by the **ServerVersion()** method
    of the **discovery.DiscoveryInterface**. As an example, here is a function you
    should test, checking that the server version is at least a provided version:


    ```

    func checkMinimalServerVersion(

    clientset kubernetes.Interface,

    minMinor int,

    ) (bool, error) {

    discoveryClient := clientset.Discovery()

    info, err := discoveryClient.ServerVersion()

    if err != nil {

    return false, err

    }

    major, err := strconv.Atoi(info.Major)

    if err != nil {

    return false, err

    }

    minor, err := strconv.Atoi(info.Minor)

    if err != nil {

    return false, err

    }

    return major == 1 && minor >= minMinor, nil

    }

    ```


    You can now assert the result of the function when the **Discovery** client returns
    a specific version, here **1.10**.


    As an exercise, you can rewrite this test function by using a table-driven test
    instead so as to be able to test the result for various values of the server versions.


    ```

    func Test_getServerVersion(t *testing.T) {

    client := fake.NewSimpleClientset()

    fakeDiscovery, ok := client.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    fakeDiscovery.FakedServerVersion = &version.Info{

    Major: "1",

    Minor: "10",

    }

    res, err := checkMinimalServerVersion(client, 20)

    if res != true && err != nil {

    t.Error(err)

    }

    }

    ```


    ### Actions


    The methods **ServerVersion**, **ServerGroups**, **ServerResourcesForGroupVersion**,
    and **ServerGroupsAndResources** of the *fake* **Discovery** client all use the
    concept of *Actions* used by the *fake* Clientset, as described in this chapter’s
    “Reacting to Actions” and “Checking the Actions” sections.


    To evaluate your functions’ use of these methods, you can assert the actions done
    by the **Discovery** client, by adding reactors or by checking the actions executed.
    Note that the **Verb** and **Resource** used for these methods are:


    *   `ServerVersion` – **“get”**, **“version”**


    *   `ServerGroups` – **“get”**, **“group”**


    *   `ServerResourcesForGroupVersion` – **“get”**, **“resource”**


    *   `ServerGroupsAndResources` – **“get”**, **“group”** and **“get”**, **“resource”**


    ### Mocking Resources


    For the real implementation, the **ServerGroups**, **ServerResourcesForGroupVersion**,
    and **ServerGroupsAndResources** methods rely on groups and resources defined
    by the API server.


    For the *fake* implementation, these methods rely on the **Resources** field of
    the **Fake** field of the *fake* Clientset. To mock the result of these methods
    with various values of groups and resources, you can fill this **Resources** field
    before calling these methods.


    ## Conclusion


    This chapter has shown how to use the *fake* implementations of the Clienset,
    REST client, and Discovery client; all are helpful to write unit tests for functions
    using the Client-go Library using the Client-go Library.


    It closes the first part of this book, which covers libraries to work with the
    native Kubernetes resources. In the following chapters, you will learn how to
    extend the Kubernetes API by creating custom resources.'
  trans: '

    ## 伪造 REST 客户端


    在 Client-go 库的 `rest/fake` 包中提供了一个*伪造*的 `RESTClient` 结构体。该结构体定义如下：


    ```go

    import "k8s.io/client-go/rest/fake"

    type RESTClient struct {

    NegotiatedSerializer runtime.NegotiatedSerializer

    GroupVersion         schema.GroupVersion

    VersionedAPIPath     string

    Err error

    Req *http.Request

    Client *http.Client

    Resp *http.Response

    }

    ```


    `NegotiatedSerializer` 字段接受一个 Codec。你需要使用 Client-go 库提供的 Codec，以便能够对来自 Kubernetes
    API 的资源进行编码和解码。


    Client-go 库中的 `RESTClient` 是特定于一个组（Group）和版本（Version）的。你可以通过 `GroupVersion` 字段来指定组和版本。


    `VersionedAPIPath` 可用于指定 API 路径的前缀。其他字段则用于模拟请求的结果：


    -   如果 `Err` 不为 nil，那么对于使用该 `RESTClient` 的任何调用，都会立即返回此错误。

    -   否则，如果 `Client` 不为 nil，则会使用此 `http.Client` 为使用该 `RESTClient` 的任何调用发起 HTTP 请求。

    -   再否则，`Resp` 将作为对使用该 `RESTClient` 的任何调用的响应返回。


    通过 `Err` 和 `Resp` 字段，你可以硬编码对 `RESTClient` 的调用结果，要么返回特定的错误，要么返回特定的响应。


    使用 `Client` 字段，你可以编写一些高级代码，这些代码会根据请求返回特定的结果，或基于请求进行一些计算，等等。例如，下面是一个使用 `RESTClient`
    从特定命名空间 `getPods` 的函数：


    ```go

    func getPods(

    ctx context.Context,

    restClient rest.Interface,

    ns string,

    ) ([]corev1.Pod, error) {

    result := corev1.PodList{}

    err := restClient.Get().

    Namespace(ns).

    Resource("pods").

    Do(ctx).

    Into(&result)

    if err != nil {

    return nil, err

    }

    return result.Items, nil

    }

    ```


    要从你的代码中调用此函数，你需要从 Clientset 提供一个 `RESTClient`——例如，使用以下代码：


    ```go

    restClient := clientset.CoreV1().RESTClient()

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    为了评估函数在返回特定值时的行为，你应该改用*伪造*的 `RESTClient`。例如，要断言当 `RESTClient` 调用返回错误时函数的结果，你可以创建这个*伪造的*
    `RESTClient`：


    ```go

    import (

    "context"

    "errors"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:               corev1.SchemeGroupVersion,

    NegotiatedSerializer:      scheme.Codecs,

    Err: errors.New("an error from the rest client"),

    }

    pods, err := getPods(

    context.Background(),

    restClient,

    "default",

    )

    ```


    另一个例子，要断言当调用返回 NotFound（404）状态时函数的结果，你可以定义以下*伪造的* `RESTClient`：


    ```go

    import (

    "net/http"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/scheme"

    "k8s.io/client-go/rest/fake"

    )

    restClient := &fake.RESTClient{

    GroupVersion:         corev1.SchemeGroupVersion,

    NegotiatedSerializer: scheme.Codecs,

    Err: nil,

    Resp: &http.Response{

    StatusCode: http.StatusNotFound,

    },

    }

    ```


    ## FakeDiscovery 客户端


    在 Client-go 库的 `discovery/fake` 包中定义了一个 `FakeDiscovery` 结构体。该结构体定义如下：


    ```go

    type FakeDiscovery struct {

    *testing.Fake

    FakedServerVersion *version.Info

    }

    ```


    可以从*伪造的* Clientset 中访问此类 `FakeDiscovery` 客户端的实现：


    ```go

    import (

    "k8s.io/client-go/kubernetes/fake"

    fakediscovery "k8s.io/client-go/discovery/fake"

    )

    clientset := fake.NewSimpleClientset()

    discoveryClient, ok :=

    clientset.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    ```


    ### 存根 ServerVersion


    `FakeDiscovery` 结构体提供了一个 `FakedServerVersion` 字段，你可以用它来模拟由 `discovery.DiscoveryInterface`
    的 `ServerVersion()` 方法返回的服务器版本。例如，下面是一个你应该测试的函数，它检查服务器版本是否至少是所提供的版本：


    ```go

    func checkMinimalServerVersion(

    clientset kubernetes.Interface,

    minMinor int,

    ) (bool, error) {

    discoveryClient := clientset.Discovery()

    info, err := discoveryClient.ServerVersion()

    if err != nil {

    return false, err

    }

    major, err := strconv.Atoi(info.Major)

    if err != nil {

    return false, err

    }

    minor, err := strconv.Atoi(info.Minor)

    if err != nil {

    return false, err

    }

    return major == 1 && minor >= minMinor, nil

    }

    ```


    现在，你可以在 Discovery 客户端返回特定版本（此处为 1.10）时断言函数的结果。


    作为练习，你可以使用表驱动测试重写此测试函数，以便能够测试函数针对各种服务器版本值的结果。


    ```go

    func Test_getServerVersion(t *testing.T) {

    client := fake.NewSimpleClientset()

    fakeDiscovery, ok := client.Discovery().(*fakediscovery.FakeDiscovery)

    if !ok {

    t.Fatalf("couldn''t convert Discovery() to *FakeDiscovery")

    }

    fakeDiscovery.FakedServerVersion = &version.Info{

    Major: "1",

    Minor: "10",

    }

    res, err := checkMinimalServerVersion(client, 20)

    if res != true && err != nil {

    t.Error(err)

    }

    }

    ```


    ### 动作


    *伪造的* Discovery 客户端的方法 `ServerVersion`、`ServerGroups`、`ServerResourcesForGroupVersion`
    和 `ServerGroupsAndResources` 都使用了*伪造的* Clientset 所使用的*动作（Actions）*概念，如本章的“对动作做出反应”和“检查动作”部分所述。


    为了评估你的函数对这些方法的使用，你可以通过添加反应器或检查执行的动作，来断言 Discovery 客户端执行的动作。请注意，这些方法使用的动词（Verb）和资源（Resource）是：


    -   `ServerVersion` – `"get"`, `"version"`

    -   `ServerGroups` – `"get"`, `"group"`

    -   `ServerResourcesForGroupVersion` – `"get"`, `"resource"`

    -   `ServerGroupsAndResources` – `"get"`, `"group"` 和 `"get"`, `"resource"`


    ### 模拟资源


    对于真实实现，`ServerGroups`、`ServerResourcesForGroupVersion` 和 `ServerGroupsAndResources`
    方法依赖于 API 服务器定义的组和资源。


    对于*伪造的*实现，这些方法依赖于*伪造的* Clientset 的 `Fake` 字段中的 `Resources` 字段。要使用各种组和资源值来模拟这些方法的结果，你可以在调用这些方法之前填充此
    `Resources` 字段。


    ## 结论


    本章展示了如何使用 Clientset、REST 客户端和 Discovery 客户端的*伪造的*实现；所有这些都有助于为使用 Client-go 库的函数编写单元测试。


    这结束了本书的第一部分，该部分涵盖了用于处理原生 Kubernetes 资源的库。在接下来的章节中，你将学习如何通过创建自定义资源来扩展 Kubernetes
    API。

    '
- fmt: '# 8. Extending Kubernetes API with Custom Resources Definitions


    In the first part of this book, you learned that the Kubernetes API is organized
    in groups. The groups contain one or more resources, each of them being versioned.


    To work with the Kubernetes API in Go, there exist two fundamental libraries.
    The API Machinery Library^([¹](#fn1)) provides the tools to communicate with the
    API independently of the resources served by the API. The API Library^([²](#fn2))
    provides the definitions of the native Kubernetes resources provided with the
    Kubernetes API, to be used with the API Machinery.


    The `Client-go` Library leverages the API Machinery and the API Library to provide
    an access to the Kubernetes API.


    The Kubernetes API is extensible through its Custom Resource Definition (CRD)
    mechanism.


    A `CustomResourceDefinition` is a specific Kubernetes resource, used to define
    new Kubernetes resources served by the API, in a dynamic way.


    Defining new resources for Kubernetes is used to represent *Domain Specific Resources*,
    for example a Database, a CI/CD Job or a Certificate.


    Combined with a custom controller, these custom resources can be implemented in
    the cluster by the controller.


    Like other resources, you can get, list, create, delete, and update resources
    of this kind. The CRD resource is a non-namespaced resource.


    This CRD resource is defined in the `apiextensions.k8s.io/v1` group and version.
    The HTTP path to access the resource respects the standard format to access non-core
    and non-namespaced resources, `/apis/<group>/<version>/<plural_resource_name>`,
    and is `/apis/apiextensions.k8s.io/v1/customresourcedefinitions/`.


    The Go definition of this resource is not declared in the API Library, like for
    other native resources, but in the `apiextensions-apiserver` library. To access
    the definitions from Go sources, you will need to use the following import:


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1"

    )

    ```


    ## Performing Operations in Go


    To perform operations on CRD resources using Go, you can use a clientset, similar
    to the clientset provided by the `client-go` library but included in the `apiextensions-apiserver`
    library.


    To use this clientset, you will need to use the following import:


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    )

    ```


    You can use this CRD clientset the exact same way you use the `Client-go` Clientset.


    As an example, here is how you can list the CRDs declared into a cluster:


    ```

    import (

    "context"

    "fmt"

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    )

    // config is a standard rest.Config defined in client-go

    clientset, err := clientset.NewForConfig(config)

    if err != nil {

    return err

    }

    ctx := context.Background()

    list, err := clientset.ApiextensionsV1().

    CustomResourceDefinitions().

    List(ctx, metav1.ListOptions{})

    ```


    ## The CustomResourceDefinition in Detail


    The definition of the `CustomResourceDefinition` Go structure is:


    ```

    type CustomResourceDefinition struct {

    metav1.TypeMeta

    metav1.ObjectMeta

    Spec CustomResourceDefinitionSpec

    Status CustomResourceDefinitionStatus

    }

    ```


    Like any other Kubernetes resources, the CRD resource embeds the `TypeMeta` and
    `ObjectMeta` structures. The value of the `Name` in the `ObjectMeta` field must
    equal `<Spec.Names.Plural>` + `"."` + `<Spec.Group>`.


    Like resources being managed by a Controller or Operator, the resource contains
    a `Spec` structure to define the desired state, and a `Status` structure to contain
    the status of the resource as described by the controller or operator.


    ```

    type CustomResourceDefinitionSpec struct {

    Group           string

    Scope           ResourceScope

    Names           CustomResourceDefinitionNames

    Versions        []CustomResourceDefinitionVersion

    Conversion      *CustomResourceConversion

    PreserveUnknownFields bool

    }

    ```


    The `Group` field of the Spec indicates the name of the group in which the resource
    resides.


    The `Scope` field indicates if the resource is namespaced or non-namespaced. The
    `ResourceScope` type contains two values: `ClusterScoped` and `NamespaceScoped`.


    ### Naming the Resource


    The `Names` field indicates the diverse names for the resource and associated
    information. This information will be used by the Discovery mechanism of the Kubernetes
    API, to be able to include CRDs in the results of discovery calls. The `CustomResourceDefinitionNames`
    type is defined as:


    ```

    type CustomResourceDefinitionNames struct {

    Plural         string

    Singular       string

    ShortNames     []string

    Kind           string

    ListKind       string

    Categories     []string

    }

    ```


    `Plural` is the lowercase plural name of the resource, used in the URL to access
    the resource—for example, `pods`. This value is required.


    `Singular` is the lowercase singular name of the resource. For example, `pod`.
    This value is optional, and if not specified, the lowercase value of the `Kind`
    field is used.


    `ShortNames` is a list of lowercase short names for the resource, which can be
    used to invoke this resource in commands like `kubectl get <shortname>`. As an
    example, the `services` resource declares the `svc` shortname, so you can execute
    `kubectl get svc` instead of `kubectl get services`.


    `Kind` is the *CamelCase* and singular name for the resource, used during resource
    serialization—for example, `Pod` or `ServiceAccount`. This value is required.


    `ListKind` is the name used during the serialization of lists of this resource—for
    example, `PodList`. This value is optional, and if not specified, the `Kind` value
    suffixed with `List` is used.


    `Categories` is a list of grouped resources the resource belongs to, which can
    be used by commands like `kubectl get <category>`. The `all` category is the best
    known one, but other categories exist (`api-extensions`), and you can define your
    own category names.'
  raw: '# 8. Extending Kubernetes API with Custom Resources Definitions


    In the first part of this book, you learned that the Kubernetes API is organized
    in groups. The groups contain one or more resources, each of them being versioned.


    To work with the Kubernetes API in Go, there exist two fundamental libraries.
    The API Machinery Library^([¹](#fn1)) provides the tools to communicate with the
    API independently of the resources served by the API. The API Library^([²](#fn2))
    provides the definitions of the native Kubernetes resources provided with the
    Kubernetes API, to be used with the API Machinery.


    The Client-go Library leverages the API Machinery and the API Library to provide
    an access to the Kubernetes API.


    The Kubernetes API is extensible through its Custom Resource Definition (CRD)
    mechanism.


    A **CustomResourceDefinition** is a specific Kubernetes resource, used to define
    new Kubernetes resources served by the API, in a dynamic way.


    Defining new resources for Kubernetes is used to represent *Domain Specific Resources*,
    for example a Database, a CI/CD Job or a Certificate.


    Combined with a custom controller, these custom resources can be implemented in
    the cluster by the controller.


    Like other resources, you can get, list, create, delete, and update resources
    of this kind. The CRD resource is a non-namespaced resource.


    This CRD resource is defined in the **apiextensions.k8s.io/v1** group and version.
    The HTTP path to access the resource respects the standard format to access non-core
    and non-namespaced resources, **/apis/<group>/<version>/<plural_resource_name>**,
    and is **/apis/apiextensions.k8s.io/v1/customresourcedefinitions/**.


    The Go definition of this resource is not declared in the API Library, like for
    other native resources, but in the **apiextensions-apiserver** library. To access
    the definitions from Go sources, you will need to use the following import:


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1"

    )

    ```


    ## Performing Operations in Go


    To perform operations on CRD resources using Go, you can use a clientset, similar
    to the clientset provided by the client-go library but included in the **apiextensions-apiserver**
    library.


    To use this clientset, you will need to use the following import:


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    )

    ```


    You can use this CRD clientset the exact same way you use the Client-go Clientset.


    As an example, here is how you can list the CRDs declared into a cluster:


    ```

    import (

    "context"

    "fmt"

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    )

    // config is a standard rest.Config defined in client-go

    clientset, err := clientset.NewForConfig(config)

    if err != nil {

    return err

    }

    ctx := context.Background()

    list, err := clientset.ApiextensionsV1().

    CustomResourceDefinitions().

    List(ctx, metav1.ListOptions{})

    ```


    ## The CustomResourceDefinition in Detail


    The definition of the CustomReourceDefinition Go structure is:


    ```

    type CustomResourceDefinition struct {

    metav1.TypeMeta

    metav1.ObjectMeta

    Spec CustomResourceDefinitionSpec

    Status CustomResourceDefinitionStatus

    }

    ```


    Like any other Kubernetes resources, the CRD resource embeds the **TypeMeta**
    and **ObjectMeta** structures. The value of the **Name** in the **ObjectMeta**
    field must equal **<Spec.Names.Plural>** + **“. ”** + **<Spec.Group>**.


    Like resources being managed by a Controller or Operator, the resource contains
    a **Spec** structure to define the desired state, and a **Status** structure to
    contain the status of the resource as described by the controller or operator.


    ```

    type CustomResourceDefinitionSpec struct {

    Group           string

    Scope           ResourceScope

    Names           CustomResourceDefinitionNames

    Versions        []CustomResourceDefinitionVersion

    Conversion      *CustomResourceConversion

    PreserveUnknownFields bool

    }

    ```


    The **Group** field of the Spec indicates the name of the group in which the resource
    resides.


    The **Scope** field indicates if the resource is namespaced or non-namespaced.
    The ResourceScope type contains two values: **ClusterScoped** and **NamespaceScoped**.


    ### Naming the Resource


    The **Names** field indicates the diverse names for the resource and associated
    information. This information will be used by the Discovery mechanism of the Kubernetes
    API, to be able to include CRDs in the results of discovery calls. The **CustomResourceDefinitionNames**
    type is defined as:


    ```

    type CustomResourceDefinitionNames struct {

    Plural         string

    Singular       string

    ShortNames     []string

    Kind           string

    ListKind       string

    Categories     []string

    }

    ```


    **Plural** is the lowercase plural name of the resource, used in the URL to access
    the resource—for example, **pods**. This value is required.


    **Singular** is the lowercase singular name of the resource. For example, **pod**.
    This value is optional, and if not specified, the lowercase value of the **Kind**
    field is used.


    **ShortNames** is a list of lowercase short names for the resource, which can
    be used to invoke this resource in commands like **kubectl get <shortname>**.
    As an example, the **services** resource declares the **svc** shortname, so you
    can execute **kubectl get svc** instead of **kubectl get services**.


    **Kind** is the **CamelCase** and singular name for the resource, used during
    resource serialization—for example, **Pod** or **ServiceAccount**. This value
    is required.


    **ListKind** is the name used during the serialization of lists of this resource—for
    example, **PodList**. This value is optional, and if not specified, the Kind value
    suffixed with **List** is used.


    **Categories** is a list of grouped resources the resource belongs to, which can
    be used by commands like **kubectl get <category>**. The **all** category is the
    best known one, but other categories exist (**api-extensions**), and you can define
    your own category names.'
  trans: '

    # 8. 使用自定义资源定义扩展 Kubernetes API


    在本书的第一部分，你已经了解到 Kubernetes API 是按组来组织的。每个组包含一个或多个资源，每个资源都有不同的版本。


    为了在 Go 中操作 Kubernetes API，存在两个基础库。API 机制库^(¹) 提供了与 API 通信的工具，这些工具独立于 API 所服务的资源。API
    库^(²) 则提供了 Kubernetes API 中原生资源的定义，以便与 API 机制库配合使用。


    `Client-go` 库利用 API 机制库和 API 库，提供了访问 Kubernetes API 的途径。


    Kubernetes API 可以通过其自定义资源定义（CRD）机制进行扩展。


    `CustomResourceDefinition` 是一种特定的 Kubernetes 资源，用于以动态方式定义由 API 提供的新 Kubernetes
    资源。


    为 Kubernetes 定义新资源，用于表示*领域特定资源*，例如数据库、CI/CD 任务或证书。


    结合自定义控制器，这些自定义资源可以由控制器在集群中实现。


    与其他资源一样，你可以对这种资源执行获取、列表、创建、删除和更新操作。CRD 资源是一种非命名空间资源。


    该 CRD 资源定义在 `apiextensions.k8s.io/v1` 组和版本中。访问该资源的 HTTP 路径遵循访问非核心和非命名空间资源的标准格式：`/apis/<组>/<版本>/<资源复数名称>`，即
    `/apis/apiextensions.k8s.io/v1/customresourcedefinitions/`。


    与其他原生资源不同，此资源的 Go 定义并未声明在 API 库中，而是声明在 `apiextensions-apiserver` 库中。要从 Go 源码中访问这些定义，你需要使用以下导入语句：


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1"

    )

    ```


    ## 在 Go 中执行操作


    要使用 Go 对 CRD 资源执行操作，你可以使用 clientset，它类似于 `client-go` 库提供的 clientset，但包含在 `apiextensions-apiserver`
    库中。


    要使用此 clientset，你需要使用以下导入语句：


    ```

    import (

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    )

    ```


    你可以像使用 `Client-go` 的 Clientset 一样，以完全相同的方式使用此 CRD clientset。


    例如，下面展示了如何列出集群中声明的 CRD：


    ```

    import (

    "context"

    "fmt"

    "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    )

    // config 是 client-go 中定义的标准 rest.Config

    clientset, err := clientset.NewForConfig(config)

    if err != nil {

    return err

    }

    ctx := context.Background()

    list, err := clientset.ApiextensionsV1().

    CustomResourceDefinitions().

    List(ctx, metav1.ListOptions{})

    ```


    ## 深入了解 CustomResourceDefinition


    `CustomResourceDefinition` Go 结构的定义如下：


    ```

    type CustomResourceDefinition struct {

    metav1.TypeMeta

    metav1.ObjectMeta

    Spec CustomResourceDefinitionSpec

    Status CustomResourceDefinitionStatus

    }

    ```


    与其他任何 Kubernetes 资源一样，CRD 资源嵌入了 `TypeMeta` 和 `ObjectMeta` 结构。`ObjectMeta` 字段中的
    `Name` 值必须等于 `<Spec.Names.Plural>` + `"."` + `<Spec.Group>`。


    与由控制器或 Operator 管理的资源类似，该资源包含一个用于定义期望状态的 `Spec` 结构，以及一个用于包含由控制器或 Operator 描述的该资源状态的结构
    `Status`。


    ```

    type CustomResourceDefinitionSpec struct {

    Group           string

    Scope           ResourceScope

    Names           CustomResourceDefinitionNames

    Versions        []CustomResourceDefinitionVersion

    Conversion      *CustomResourceConversion

    PreserveUnknownFields bool

    }

    ```


    Spec 的 `Group` 字段指明了资源所在的组名。


    `Scope` 字段指明资源是否具有命名空间。`ResourceScope` 类型包含两个值：`ClusterScoped` 和 `NamespaceScoped`。


    ### 命名资源


    `Names` 字段指明了资源的各种名称及其相关信息。Kubernetes API 的发现机制会使用这些信息，以便将 CRD 包含在发现调用的结果中。`CustomResourceDefinitionNames`
    类型定义如下：


    ```

    type CustomResourceDefinitionNames struct {

    Plural         string

    Singular       string

    ShortNames     []string

    Kind           string

    ListKind       string

    Categories     []string

    }

    ```


    `Plural` 是资源的小写复数名称，用于 URL 中访问该资源，例如 `pods`。此字段为必填项。


    `Singular` 是资源的小写单数名称，例如 `pod`。此字段为可选项，如果未指定，则使用 `Kind` 字段的小写值。


    `ShortNames` 是资源的小写短名称列表，可用于在诸如 `kubectl get <短名称>` 的命令中调用该资源。例如，`services` 资源声明了短名称
    `svc`，因此你可以执行 `kubectl get svc` 来代替 `kubectl get services`。


    `Kind` 是资源的*驼峰式*单数名称，用于资源序列化，例如 `Pod` 或 `ServiceAccount`。此字段为必填项。


    `ListKind` 是用于该资源列表序列化的名称，例如 `PodList`。此字段为可选项，如果未指定，则使用 `Kind` 值加上 `List` 后缀。


    `Categories` 是该资源所属的已分组资源的列表，可供诸如 `kubectl get <类别>` 的命令使用。`all` 类别是众所周知的，但也存在其他类别（`api-extensions`），并且你可以定义自己的类别名称。

    '
- fmt: '### Definition of the Resource Versions


    All the information provided up to this point is valid for all versions of the
    resource.


    The `Versions` field contains version-specific information, as a list of definitions,
    one for each version of the resource. The type `CustomResourceDefinitionVersion`
    is defined as:


    ```

    type CustomResourceDefinitionVersion struct {

    Name                      string

    Served                    bool

    Storage                   bool

    Deprecated                bool

    DeprecationWarning        *string

    Schema                    *CustomResourceValidation

    Subresources              *CustomResourceSubresources

    AdditionalPrinterColumns  []CustomResourceColumnDefinition

    }

    ```


    `Name` indicates the version name. Kubernetes resources use a standard format
    for versions: `v<number>[(alpha|beta)<number>]`, but you can use any format you
    want.


    The `Served` boolean indicates whether this specific version must be served by
    the API Server. If not, the version is still defined and can be used as Storage
    (see the following), but the user cannot create or get resource instances in this
    specific version.


    The `Storage` boolean indicates whether this specific version is the one used
    for persisting resources. Exactly one version must define this field to be true.
    You have seen in Chapter [5](#533908_1_En_5_Chapter.xhtml)’s “Conversion” section
    that Conversion functions exist between versions of the same resource. The user
    can create resources in any available version, the API Server will convert it
    into the version with `Storage=true` before to persist the data in `etcd`.


    The `Deprecated` boolean indicates whether this specific version of the resource
    is deprecated. If true, the server will add a Warning header to responses for
    this version.


    The `DeprecationWarning` is the warning message returned to the caller when `Deprecated`
    is true. If `Deprecated` is true and this field is nil, a default warning message
    is sent.


    `Schema` describes the schema of this version of the resource. The schema is used
    to validate the data sent to the API when creating or updating resources. This
    field is optional. The schemas will be discussed in more detail in Section “Schema
    of the Resource”.


    `Subresources` defines the subresources that will be served for this version of
    the resource. This field is optional. The type of this field is defined as:


    - If `Status` is not nil, the “/status” sub-resource will be served.

    - If `Scale` is not nil, the “/scale” sub-resource will be served.


    ```

    type CustomResourceSubresources struct {

    Status *CustomResourceSubresourceStatus

    Scale *CustomResourceSubresourceScale

    }

    ```


    `AdditionalPrinterColumns` is the list of additional columns to return when the
    Table output format is requested by the user. This field is optional. More information
    about the Table output format can be found in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s,
    “Getting Result as Table” section. You will see how to define additional printer
    columns in the “Additional Printer Columns” section of this chapter.


    ### Converting Between Versions


    `Conversion` indicates how conversions between versions of this resource are handled.
    The type for this field is defined as follows:


    ```

    type CustomResourceConversion struct {

    Strategy ConversionStrategyType

    Webhook *WebhookConversion

    }

    ```


    `Strategy` can get a value of `NoneConverter` or `WebhookConverter`. A `NoneConverter`
    value indicates to the API Server to change only the `APIVersion` field before
    it persists.


    A `WebhookConverter` value indicates that the API Server is to call an external
    webhook to do the conversion. When this value is used, the `Webhook` field needs
    to contain all the information necessary for the API Server to call the webhook.


    ## Schema of the Resource


    The schema of a resource for a specific version is defined using the OpenAPI v3
    schema format.^([³](#fn3)) The complete description of this format is out of the
    scope of this book. Here is a short introduction that will help you define a schema
    for your resources.


    A Custom resource will generally have a `Spec` section and a `Status` section.
    For this, you will have to declare a top-level schema of type `object`, and declare
    the fields with the `properties` property. In this example, the top-level schema
    will have `Spec` and `Status` properties. You can then describe each property
    recursively.


    The `Spec` and `Status` fields will also be of type `object` and contain properties.
    The accepted data types are:


    - `string`

    - `number`

    - `integer`

    - `boolean`

    - `array`

    - `object`


    Specific formats can be given for `string` and `number` types:


    - `string`: date, date-time, byte, int-or-string

    - `number`: float, double, int32, int64


    In an object, the required fields are indicated using the `required` property.


    You can declare that a property accepts only a set of values, using the `enum`
    property. To declare a map of values, you need to use the `object` type and specify
    the `additionalProperties` property. This property can accept a `true` value (to
    indicate that the entries can have any type), or define the type of the entries
    of the map by giving a type as value:


    ```

    type: object

    additionalProperties:

    type: string

    ```


    Or:


    ```

    type: object

    additionalProperties:

    type: object

    properties:

    code:

    type: integer

    text:

    type: string

    ```


    When declaring an array, you must define the type of the items of the array:


    ```

    type: array

    items:

    type: string

    ```


    As an example, here is a schema for a custom resource containing three fields
    in `Spec` (`image`, `replicas`, and `port`), and a `state` field in `Status`.


    ```

    schema:

    openAPIV3Schema:

    type: object

    properties:

    spec:

    type: object

    properties:

    image:

    type: string

    replicas:

    type: integer

    port:

    type: string

    format: int-or-string

    required: [image,replicas]

    status:

    type: object

    properties:

    state:

    type: string

    enum: [waiting,running]

    ```'
