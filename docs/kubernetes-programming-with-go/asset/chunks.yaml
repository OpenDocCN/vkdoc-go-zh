- fmt: "# IntOrString\n\nSome fields of Kubernetes resources accept either an integer\
    \ value or a string value. For example, a port can be defined with the port number\
    \ or a IANA service name (as defined in [`https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml)).\n\
    \nAnother example is fields that can accept either an integer or a percentage.\n\
    \n```go\nimport (\n\"k8s.io/apimachinery/pkg/util/intstr\"\n)\n```\n\nThe `IntOrString`\
    \ structure is defined as follows:\n\n```go\ntype IntOrString struct {\nType \
    \  Type\nIntVal int32\nStrVal string\n}\n```\n\nThe `Type` can be either `Int`\
    \ or `String`.\n\nBecause all the fields of the structure are public, you can\
    \ create a value or extract information from it by accessing its fields directly.\
    \ For convenience, these functions are useful for creating and manipulating `IntOrString`\
    \ values:\n\n*   `func FromInt(val int) IntOrString` – declares an `IntOrString`\
    \ containing an integer value.\n\n*   `func FromString(val string) IntOrString`\
    \ – declares an `IntOrString` containing a string value.\n\n*   `func Parse(val\
    \ string) IntOrString` – declares an `IntOrString`, trying first to extract an\
    \ integer from the string before storing it as a string.\n\n*   `func (intstr\
    \ *IntOrString) String() string` – returns the `IntOrString` value as a string,\
    \ converting it using `Itoa` if the value is stored as an integer.\n\n*   `func\
    \ (intstr *IntOrString) IntValue() int` – returns the `IntOrString` value as an\
    \ integer. If stored as a string, return its converted value using `Atoi` or `0`\
    \ if parsing fails.\n\n*   `func ValueOrDefault(intOrPercent *IntOrString, defaultValue\
    \ IntOrString) *IntOrString` – returns the `intOrPercent` value if not nil, or\
    \ the `defaultValue`.\n\n*   `func GetScaledValueFromIntOrPercent(intOrPercent\
    \ *IntOrString, total int, roundUp bool) (int, error)` – this function can be\
    \ used for `IntOrString` values expected to contain either an integer or a percentage.\
    \ If the value is an integer, it is returned as is.\n\nIf the value is a string\
    \ representing a percentage (a number followed by a `%` sign), the function returns\
    \ the percentage of the `total` value, rounding the result up or down depending\
    \ on `roundUp`. If the string is not parseable as a percentage, the function returns\
    \ an error.\n\n## Time\n\nThe `Time` type defined in the API Machinery Library\
    \ is used for all fields of Kubernetes resources declaring a time. It is a wrapper\
    \ around the Go `time.Time` type, and it provides factories wrapping the `time.Time`\
    \ factories.\n\n```go\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
    \n)\n```\n\n### Factory Methods\n\nThe available factory methods are the following:\n\
    \n*   `func NewTime(time time.Time) Time` – returns a `metav1.Time` value wrapping\
    \ that is the provided `time.Time` value.\n\n*   `func Date(year int, month time.Month,\
    \ day, hour, min, sec, nsec int, loc *time.Location) Time` – returns a `metav1.Time`\
    \ value based on the various elements of the time (e.g., year, month, day, hour,\
    \ minutes, seconds, nanoseconds, location). It is a wrapper around the `time.Date`\
    \ function.\n\n*   `func Now() Time` – returns a `metav1.Time` value containing\
    \ the current local time. It is a wrapper around the `time.Now` function.\n\n\
    *   `func Unix(sec int64, nsec int64) Time` – returns a `metav1.Time` value corresponding\
    \ to the given Unix time expressed in seconds and nanoseconds. It is a wrapper\
    \ around the `time.Unix` function.\n\n### Operations on Time\n\nUse the following\
    \ to define the `Time` operations:\n\n*   `func (t *Time) DeepCopyInto(out *Time)`\
    \ – returns a copy of the `metav1.Time` value.\n\n*   `func (t *Time) IsZero()\
    \ bool` – returns true if the `metav1.Time` value represents the `zero` time instant,\
    \ January 1, year 1, 00:00:00 UTC. It is a wrapper around the `time.IsZero` method.\n\
    \n*   `func (t *Time) Before(u *Time) bool` – returns true if the `metav1.Time`\
    \ instant `t` is before `u`. It is a wrapper around the `time.Before` method.\n\
    \n*   `func (t *Time) Equal(u *Time) bool` – returns true if the `metav1.Time`\
    \ instant `t` is equal to `u`. It is a wrapper around the `time.Equal` method.\n\
    \n*   `func (t Time) Rfc3339Copy() Time` – returns a copy of the `metav1.Time\
    \ t` value, removing its nanosecond precision.\n\n## Conclusion\n\nThis chapter\
    \ covered common types used when defining Kubernetes resources in Go. Pointer\
    \ values are used to specify optional values, quantities are used to specify memory\
    \ and CPU quantities, the `IntOrString` type is used for values writable either\
    \ as integers or strings (e.g., ports that can be defined either by number or\
    \ by name), and Time—a serializable type wrapping the Go `Time` type.\n\n# 5.\
    \ The API Machinery\n\nThe previous chapters explored how the Kubernetes API works\
    \ at the HTTP level. They also explored the Kubernetes API Library, which defines\
    \ the resources served by the Kubernetes API in Go.\n\nThis chapter explores the\
    \ Kubernetes API Machinery Library, which provides utilities for working with\
    \ API objects that follow the Kubernetes API object conventions. These conventions\
    \ include:\n\n*   The API objects embed a common metadata structure, `TypeMeta`,\
    \ containing two fields: `APIVersion` and `Kind`.\n\n*   The API objects are provided\
    \ in a separate package.\n\n*   The API objects are versioned.\n\n*   Conversion\
    \ functions are provided to convert between versions.\n\nThe API Machinery will\
    \ provide the following utilities:\n\n*   A `Scheme` abstraction, used to:\n \
    \   *   Register the API objects as Group-Version-Kinds\n\n    *   Convert between\
    \ API Objects of different versions\n\n    *   Serialize/deserialize API Objects\n\
    \n*   A `RESTMapper`, mapping between API Objects (based on embedded `APIVersion`\
    \ and `Kind`) and resource names (in the REST sense).\n\nThis chapter details\
    \ the functions provided by the API Machinery.\n\n## The Schema Package\n\nThe\
    \ `schema` package of the `API Machinery` Library defines useful structures and\
    \ functions to work with Group, Versions, Kinds, and Resources.\n\n```go\nimport\
    \ (\n\"k8s.io/apimachinery/pkg/runtime/schema\"\n)\n```\n\nThe structures `GroupVersionResource`,\
    \ `GroupVersionKind`, `GroupVersion`, `GroupResource`, and `GroupKind` are defined,\
    \ with methods to pass from one to another.\n\nAlso, functions to convert between\
    \ `GroupVersionKind` and `(apiVersion, kind)` are provided: `ToAPIVersionAndKind`\
    \ and `FromAPIVersionAndKind`.\n\n![](images/533908_1_En_5_Chapter/533908_1_En_5_Fig1_HTML.png)\n\
    \nA model diagram depicts the API machinery schema. 1. Group version. 2. Group\
    \ resource. 3. Group version resource. 4. Group version kind. 5. Group kind. 6.\
    \ API version kind. The arrows between 1 and 3 indicate with resource and group\
    \ version. 2 and 3, with version and group resource. 1 and 4, with kind and group\
    \ version. 4 and 5, with version and group kind.\n\nFigure 5-1\n\nGVK and GVR\
    \ related structures and methods\n\n## Scheme\n\nA `Scheme` is an abstraction\
    \ used to register the API objects as `Group-Version-Kinds`, convert between API\
    \ Objects of various versions, and serialize/deserialize API Objects. The `Scheme`\
    \ is a structure provided by the API Machinery in the `runtime` package. All the\
    \ fields of this structure are unexported."
