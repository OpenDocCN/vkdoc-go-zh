    definition of the resource. You will need to update these files to declare the
    definition of the custom resource for the new version. You can copy the file **api/v1alpha1/myresource_types.go**
    into **api/v1beta1** and make the necessary changes:


    *   The name of the package at the beginning of the file, from **v1alpha1** to
    **v1beta1**


    *   The name of the Memory field, from **Memory** to **MemoryRequest**, and the
    **yaml** field name from **Memory** to **MemoryRequest**


    ```

    package v1beta1

    [...]

    // MyResourceSpec defines the desired state of MyResource

    type MyResourceSpec struct {

    Image         string            `json:"image"`

    MemoryRequest resource.Quantity `json:"memoryRequest"`

    }

    ```


    Because you now have several versions, you have to declare on which format the
    resource will be stored in **etcd**. You can choose to use the format of **v1alpha1**.
    For this, you can use the annotation **+kubebuilder:storageversion** in the comments
    preceding the definition of the **MyResource** structure in the **v1alpha1** package.


    ```

    package v1alpha1

    [...]

    // +kubebuilder:object:root=true

    // +kubebuilder:subresource:status

    // +kubebuilder:storageversion

    // MyResource is the Schema for the myresources API

    type MyResource struct {

    [...]

    }

    ```'
