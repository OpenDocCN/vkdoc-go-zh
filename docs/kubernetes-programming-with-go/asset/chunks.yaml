    import (

    "fmt"

    "math/rand"

    . "github.com/onsi/ginkgo/v2"

    . "github.com/onsi/gomega"

    appsv1 "k8s.io/api/apps/v1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/apimachinery/pkg/types"

    "sigs.k8s.io/controller-runtime/pkg/client"

    mygroupv1alpha1 "github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    )

    var _ = Describe("MyResource controller", func() {

    When("When creating a MyResource instance", func() {

    var (

    myres      mygroupv1alpha1.MyResource

    ownerref   *metav1.OwnerReference

    name       string

    namespace  = "default"

    deployName string

    image      string

    )

    BeforeEach(func() {

    // Create the MyResource instance

    image = fmt.Sprintf("myimage%d", rand.Intn(1000))

    myres = mygroupv1alpha1.MyResource{

    Spec: mygroupv1alpha1.MyResourceSpec{

    Image: image,

    },

    }

    name = fmt.Sprintf("myres%d", rand.Intn(1000))

    myres.SetName(name)

    myres.SetNamespace(namespace)

    err := k8sClient.Create(ctx, &myres)

    Expect(err).NotTo(HaveOccurred())

    ownerref = metav1.NewControllerRef(

    &myres,

    mygroupv1alpha1.SchemeGroupVersion.

    WithKind("MyResource"),

    )

    deployName = fmt.Sprintf("%s-deployment", name)

    })

    AfterEach(func() {

    // Delete the MyResource instance

    k8sClient.Delete(ctx, &myres)

    })

    It("should create a deployment", func() {

    // Check that the deployment

    // is eventually created

    var dep appsv1.Deployment

    Eventually(

    deploymentExists(deployName, namespace, &dep),

    10, 1

    ).Should(BeTrue())

    })

    When("deployment is found", func() {

    var dep appsv1.Deployment

    BeforeEach(func() {

    // Wait for the deployment

    // to be eventually created

    Eventually(

    deploymentExists(deployName, namespace, &dep),

    10, 1,

    ).Should(BeTrue())

    })

    It("should be owned by the MyResource instance", func() {

    // Check ownerReference in Deployment

    // references the MyResource instance

    Expect(dep.GetOwnerReferences()).

    To(ContainElement(*ownerref))

    })

    It("should use the image specified in MyResource instance", func() {

    Expect(

    dep.Spec.Template.Spec.Containers[0].Image,

    ).To(Equal(image))

    })

    When("deployment ReadyReplicas is 1", func() {

    BeforeEach(func() {

    // Update the Deployment status

    // to ReadyReplicas=1

    dep.Status.Replicas = 1

    dep.Status.ReadyReplicas = 1

    err := k8sClient.Status().Update(ctx, &dep)

    Expect(err).NotTo(HaveOccurred())

    })

    It("should set status ready for MyResource instance", func() {

    // Check the status of MyResource instance

    // is eventually Ready

    Eventually(

    getMyResourceState(name, namespace), 10, 1,

    ).Should(Equal("Ready"))

    })

    })

    })

    })

    })

    func deploymentExists(

    name, namespace string, dep *appsv1.Deployment,

    ) func() bool {

    return func() bool {

    err := k8sClient.Get(ctx, client.ObjectKey{

    Namespace: namespace,

    Name:      name,

    }, dep)

    return err == nil

    }

    }

    func getMyResourceState(

    name, namespace string,

    ) func() (string, error) {

    return func() (string, error) {

    myres := mygroupv1alpha1.MyResource{}

    err := k8sClient.Get(ctx, types.NamespacedName{

    Namespace: namespace,

    Name:      name,

    }, &myres)

    if err != nil {

    return "", err

    }

    return myres.Status.State, nil

    }

    }

    ```


    ## Conclusion


    This chapter concludes the presentation of the various concepts and libraries
    that can be used to write Kubernetes Operators.


    Chapter [8](#533908_1_En_8_Chapter.xhtml) introduced the Custom Resources, permitting
    extension of the Kubernetes API by adding new resources to the list of served
    resources. Chapter [9](#533908_1_En_9_Chapter.xhtml) presented various ways to
    work with Custom Resources using the Go language, either by generating a Clientset
    for this resource, or by using the **DynamicClient**.


    Chapter [10](#533908_1_En_10_Chapter.xhtml) introduced the **controller-runtime**
    Library, useful for implementing an Operator to manage a Custom Resource lifecyle.
    Chapter [11](#533908_1_En_11_Chapter.xhtml) focused on writing the business logic
    of the Operator, and Chapter [12](#533908_1_En_12_Chapter.xhtml) is used to test
    this logic.


    The next chapter describes the **kubebuilder** SDK, a framework using the tools
    introduced in the previous chapters. This framework facilitates the development
    of Operators, by generating code for new custom resource definitions and associated
    Operators, and by providing tools to build and to deploy these custom resource
    definitions and Operators to the cluster.


    # 13. Creating an Operator with Kubebuilder


    You have seen in the previous chapters how to define new resources to be served
    by the API Server using Custom Resources Definitions (CRD), and how to build Operators,
    using the controller-runtime library.


    The Kubebuilder SDK is dedicated to help you create new resources and their related
    Operators. It provides commands to bootstrap a project defining a Manager, and
    to add resources and their related controllers to the project.


    Once the source code for new custom resources and controllers is generated, you
    will need to implement the missing parts, depending on the business domain of
    the resources. The Kubebuilder SDK then provides tools to build and deploy the
    Custom Resource Definitions and the Manager to the cluster.


    ## Installing Kubebuilder


    Kubebuilder is provided as a single binary. You can download the binary from the
    Release page of the project^([⁴](#fn4)) and install it in your PATH. Binaries
    are provided for Linux and MacOS systems.


    ## Creating a Project


    The first step is to create a project. The project initially will contain:


    *   Go source code defining a Manager (without any Controller for the moment)


    *   A Dockerfile to build an image containing the manager binary to deploy to
    the cluster


    *   Kubernetes manifests to help deploy the Manager to the cluster


    *   A Makefile defining commands to help you test, build, and deploy the manager


    To create a project, first create an empty directory and **cd** into it, then
    execute the following **kubebuilder init** command:


    *   ❶ Domain name, used as a suffix to the name of the GVK groups. Custom resources
    defined in this project can belong to various groups, but all groups will belong
    to the same domain. For example, **mygroup1.myid.dev** and **mygroup2.myid.dev**


    *   ❷ Name of the Go module for the generated Go code for the Manager


    ```

    $ mkdir myresource-kb

    $ cd myresource-kb

    $ kubebuilder init

    --domain myid.dev                          ❶

    --repo github.com/myid/myresource          ❷

    ```


    You can examine the commands available from the Makefile by running the following
    command:


    ```

    $ make help

    ```


    You can build the binary for the Manager with the following command:


    ```

    $ make build

    ```


    Then, you can run the Manager locally:


    ```

    $ make run

    ```


    or


    ```

    $ ./bin/manager

    ```


    At this point, it is interesting to initiate a source control project (e.g., a
    git project), and create a first revision with the files generated. This way,
    you will be able to examine the changes made by the next executed **kubebuilder**
    commands. For example, if you use git:


    ```

    $ git init

    $ git commit -am ''kubebuilder init --domain myid.dev --repo github.com/myid/myresource''

    ```'
