- fmt: "# Group-Version-Resource\n\nThe Kubernetes API is a REST API, and as a result\
    \ of that it manages *Resources*, and the paths to manage these resources follow\
    \ the REST naming conventions—that is, by using a plural name to identify a resource\
    \ and by grouping these resources.\n\nBecause the Kubernetes API manages hundreds\
    \ of resources, they are grouped together, and because the API evolves, the resources\
    \ are versioned. For these reasons, each resource belongs to a given *Group* and\
    \ *Version*, and each resource is uniquely identified by a Group-Version-Resource,\
    \ commonly known as `GVR`.\n\nTo find the various resources in the Kubernetes\
    \ API, you can browse the OpenAPI specification to extract the distinct paths.\
    \ Legacy resources (e.g., `pods` or `nodes`) will have been introduced early in\
    \ the Kubernetes API and all belong to the group `core` and the version `v1`.\n\
    \nThe paths to manage legacy resources cluster-wide follow the format `/api/v1/<plural_resource_name>`—for\
    \ example, `/api/v1/nodes` to manage `nodes`. Note that the `core` group is not\
    \ represented in the path. To manage resources in a given namespace, the path\
    \ format is `/api/v1/namespaces/<namespace_name>/<plural_resource_name>`—for example,\
    \ `/api/v1/namespaces/default/pods` to manage `pods` in the `default` namespace.\n\
    \nNewer resources are accessible through paths following the format `/apis/<group>/<version>/<plural_resource_name>`\
    \ or `/apis/<group>/<version>/namespaces/<namespace_name>/<plural_resource_name>`.\n\
    \nTo summarize, the formats of the various paths to access resources are:\n\n\
    * `/api/v1/<plural_name>` – to access legacy non-namespaced resources\n\n  Ex:\
    \ `/api/v1/nodes` to access non-namespaced `nodes` resources\n\n  or\n\n* To access\
    \ legacy namespaced resources cluster-wide\n\n  Ex: `/api/v1/pods` to access `pods`\
    \ across all namespaces\n\n* `/api/v1/namespaces/<ns>/<plural_name>` – to access\
    \ legacy namespaced resources in a specific namespace\n\n  Ex: `/api/v1/namespaces/default/pods`\
    \ to access `pods` in the `default` namespace\n\n* `/apis/<group>/<version>/<plural_name>`\
    \ – to access non-namespaced resources in specific group and version\n\n  Ex:\
    \ `/apis/storage.k8s.io/v1/storageclasses` to access non-namespaced `storageclasses`\
    \ (group `storage.k8s.io`, version `v1`)\n\n  or\n\n* To access namespaced resources\
    \ cluster-wide\n\n  Ex: `/apis/apps/v1/deployments` to access `deployments` across\
    \ all namespaces\n\n* `/apis/<group>/<version>/namespaces/<ns>/<plural_name>`\
    \ – to access namespaced resources in a specific namespace\n\n  Ex: `/apis/apps/v1/namespaces/default/deployments`\
    \ to access `deployments` (group `apps`, version `v1`) in the `default` namespace\n\
    \n## Sub-resources\n\nFollowing the REST API convention, the resources can have\
    \ sub-resources. A sub-resource is a resource that belongs to another and can\
    \ be accessed by specifying its name after the name of the resource, as follows:\n\
    \n* `/api/v1/<plural>/<res-name>/<sub-resource>`\n\n  Ex: `/api/v1/nodes/node1/status`\n\
    \n* `/api/v1/namespaces/<ns>/<plural>/<res-name>/<sub-resource>`\n\n  Ex: `/api/v1/namespaces/ns1/pods/pod1/status`\n\
    \n* `/apis/<group>/<version>/<plural>/<res-name>/<sub-resource>`\n\n  Ex: `/apis/storage.k8s.io/v1/volumeattachments/volatt1/status`\n\
    \n* `/apis/<grp>/<v>/namespaces/<ns>/<plural>/<name>/<sub-res>`\n\n  Ex: `/apis/apps/v1/namespaces/ns1/deployments/dep1/status`\n\
    \nMost Kubernetes resources have a `status` sub-resource. You can see, when writing\
    \ operators, that the operator needs to update the `status` sub-resource to be\
    \ able to indicate the state of this resource observed by the operator. The operations\
    \ that can be executed in the `status` sub-resource are `get`, `patch`, and `update`.\
    \ The Pod has more sub-resources, including `attach`, `binding`, `eviction`, `exec`,\
    \ `log`, `portforward`, and `proxy`. These sub-resources are useful for getting\
    \ information about a specific running pod, or executing some specific operation\
    \ on a running pod, and so on.\n\nThe resources that can Scale (i.e., deployments,\
    \ replicasets, etc.) have a `scale` sub-resource. The operations that can be executed\
    \ in the `scale` sub-resource are `get`, `patch`, and `update`.\n\n## Official\
    \ API Reference Documentation\n\nThe official reference documentation of the API\
    \ can be found at [`https://kubernetes.io/docs/reference/kubernetes-api/`](https://kubernetes.io/docs/reference/kubernetes-api/).\
    \ The resources managed by the API are first grouped together by category (i.e.,\
    \ workloads, storage, etc.), and for each category, you can obtain a list of resource\
    \ names with a short description (Figure [1-3](#533908_1_En_1_Chapter.xhtml#Fig3)).\n\
    \nNote that these categories are not part of the Kubernetes API definition but\
    \ are used in this website to help inexperienced users find their way into the\
    \ multitude of available resources.\n\n![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig3_HTML.png)\n\
    \nA screenshot of the Kubernetes web page includes 3 tabs labeled documentation,\
    \ Kubernetes blog, and training. Documentation is selected. The text reads about\
    \ Kubernetes A P I.\n\nFigure 1-3\n\nThe Kubernetes resources grouped by category\n\
    \nTo be precise, the name displayed is not the resource name in the REST sense,\
    \ but the associated principal kind, as shown in Figure [1-4](#533908_1_En_1_Chapter.xhtml#Fig4).\
    \ For example, when managing *Pods*, the resource name used in the REST paths\
    \ is `pods` (i.e., lowercase and plural), and the definition used to exchange\
    \ information about *Pods* during HTTP requests is named `Pod` (i.e., uppercase\
    \ and singular). Note that other kinds can be associated with the same resource.\
    \ In the example in this chapter, the `PodList` kind (used to exchange information\
    \ about *Lists of Pods*) also exists.\n\n![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig4_HTML.png)\n\
    \nA screenshot of the Kubernetes web page includes 3 tabs labeled documentation,\
    \ Kubernetes blog, and training. Documentation is selected. It presents 8 workload\
    \ resources, including pod, pod template, replication controller, and deployment.\n\
    \nFigure 1-4\n\nThe resources for a specific category, with a short description"
