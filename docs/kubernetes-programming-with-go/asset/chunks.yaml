    \    ) {\n    time.Sleep(d)\n    }\n```\n- `Throttle(limiter flowcontrol.RateLimiter)\
    \ *Request` — 限流功能会限制`RESTClient`每秒可执行的请求数。\n- 默认情况下，使用**令牌桶速率限制器**（Token Bucket\
    \ Rate Limiter），其`QPS`为`5`次/秒，突发流量（Burst）为`10`。\n- 这意味着`RESTClient`每秒最多可发起`5`个请求，外加一个可随时使用的`10`个请求的额外配额（桶）。桶会以`QPS`的速率重新填充，本例中每秒填充`5`个令牌，桶的最大容量保持为`10`。\n\
    - 你可以通过以下代码构建并使用`flowcontrol.tokenBucketRateLimiter`对象：\n```\n    request.Throttle(\n\
    \    flowcontrol.NewTokenBucketRateLimiter(5.0, 10),\n    )\n```\n- 在此示例中，请求将使用速率为`5.0`次/秒（`QPS`）且突发流量为`10`的令牌桶速率限制器。\n\
    - 注意，你可以通过设置用于创建`RESTClient`的`Config`中的`QPS`和`Burst`，为所有请求获得相同的行为。\n- 请求的默认速率限制器继承自用于创建`clientset`的`Config`。你可以通过在`Config`中设置速率限制器来更改所有请求的速率限制器。\n\
    - `MaxRetries(maxRetries int) *Request` — 指定当请求收到包含 `Retry-After` 头部和 `429` 状态码（*Too\
    \ Many Requests*）的响应时，`RESTClient`将执行的重试次数。\n- 默认值为`10`，表示在返回错误之前，请求最多会被执行`11`次。\n\
    - `Timeout(d time.Duration) *Request` — 指定`RESTClient`在返回错误之前等待请求响应的秒数。请求的默认超时时间继承自用于构建`clientset`的`HTTPClient`。\n\
    - `WarningHandler(handler WarningHandler) *Request` — `API`服务器可以使用特定头部（`Warning`头部）为请求返回警告。默认情况下，警告会被记录，并且`rest`包提供了几个内置的处理器实现：\n\
    \    - `WarningLogger{}` — 记录警告（默认行为）。\n    - `NoWarning{}` — 抑制警告。\n    - `NewWarningWriter()`\
    \ — 将警告写入指定的写入器。可指定选项：\n        - `Deduplicate` — 设为`true`时，每条警告仅写入一次。\n     \
    \   - `Color` — 设为`true`时，以黄色显示警告。\n- 你可以通过实现`WarningHandler`接口来编写自定义的警告处理器：\n\
    ```\n    type WarningHandler interface {\n    HandleWarningHeader(\n    code int,\n\
    \    agent string,\n    text string,\n    )\n    }\n```\n- 注意，你可以通过调用以下全局函数，为所有客户端的所有请求设置默认的`Warning\
    \ Handler`：\n```\nrest.SetDefaultWarningHandler(l WarningHandler)\n```\n\n###\
    \ 执行请求\n\n构建好`Request`后，即可执行它。`Request`对象上的以下方法可供使用：\n\n- `Do(ctx context.Context)\
    \ Result` — 执行请求并返回`Result`对象。下一节将介绍如何利用此`Result`对象。\n- `Watch(ctx context.Context)\
    \ (watch.Interface, error)` — 对请求的地址执行**Watch**操作，并返回一个实现`watch.Interface`接口的对象，用于接收事件。可参阅本章“监控资源”部分了解如何使用返回的对象。\n\
    - `Stream(ctx context.Context) (io.ReadCloser, error)` — 执行请求并通过`ReadCloser`流式传输结果正文。\n\
    - `DoRaw(ctx context.Context) ([]byte, error)` — 执行请求并以字节数组形式返回结果。\n\n### 利用 Result\n\
    \n在`Request`上执行`Do()`方法时，该方法会返回一个`Result`对象。\n\n`Result`结构体没有公共字段。以下方法可用于获取结果信息：\n\
    \n- `Into(obj runtime.Object) error` — 如果可能，将结果正文内容解码并存储到对象中。传入参数的具体类型必须与正文中定义的类型匹配。同时返回执行请求的错误。\n\
    - `Error() error` — 返回执行请求的错误。此方法在请求不返回任何正文内容时非常有用。\n- `Get() (runtime.Object,\
    \ error)` — 解码并将结果正文内容作为对象返回。返回对象的具体类型将与正文中定义的类型匹配。同时返回执行请求的错误。\n- `Raw() ([]byte,\
    \ error)` — 以字节数组形式返回正文，以及执行请求的错误。\n- `StatusCode(statusCode *int) Result` — 将状态码存储到传入参数中，并返回`Result`，以便方法可以链式调用。\n\
    - `WasCreated(wasCreated \\*bool) Result` — 存储一个布尔值，指示请求创建的资源是否已成功创建，并返回`Result`，以便方法可以链式调用。\n\
    - `Warnings() []net.WarningHeader` — 返回`Result`中包含的警告列表。\n"
- fmt: "# Getting Result as a Table\n\nYou have seen in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Getting Result as a Table” section that it is possible to get the result of\
    \ a `List` request as a list of columns and rows so as to display the information\
    \ in a tabular representation. For this, you have to make a `List` operation and\
    \ specify a specific `Accept` header.\n\nHere is the code to list the pods of\
    \ the `project1` namespace, in a tabular representation, using the `RESTClient`:\n\
    \n- ➊ Get the `RESTClient` for the `core/v1` group\n- ➋ Indicate the namespace\
    \ from which to list the resources (here `project1`)\n- ➌ Indicate the resources\
    \ to list (here `pods`)\n- ➍ Set the required header to get the result as tabular\
    \ information\n- ➎ Prepare a variable of type `metav1.Table` to store the result\
    \ of the request\n- ➏ Execute the request\n- ➐ Store the result in the `metav1.Table`\
    \ object\n- ➑ Range over the definitions of the columns returned to display the\
    \ table header\n- ➒ Range over the rows of the table returned to display the row\
    \ of data containing information about a specific pod\n- ➓ Range over the cells\
    \ of the row to display them\n\n```\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
    \n)\nrestClient := clientset.CoreV1().RESTClient() ➊\nreq := restClient.Get().\n\
    Namespace(\"project1\").          ➋\nResource(\"pods\").               ➌\nSetHeader(\
    \                    ➍\n\"Accept\",\nfmt.Sprintf(\n\"application/json;as=Table;v=%s;g=%s\"\
    ,\nmetav1.SchemeGroupVersion.Version,\nmetav1.GroupName\n))\nvar result metav1.Table\
    \          ➎\nerr = req.Do(ctx).               ➏\nInto(&result)              \
    \ ➐\nif err != nil {\nreturn err\n}\nfor _, colDef := range result.ColumnDefinitions\
    \ {     ➑\n// display header\n}\nfor _, row := range result.Rows {          ➒\n\
    for _, cell := range row.Cells {          ➓\n// display cell\n}\n}\n```\n\n# Discovery\
    \ Client\n\nThe Kubernetes API provides endpoints to discover the resources served\
    \ by the API. `kubectl` is using these endpoints to display the result of the\
    \ command `kubectl api-resources` (Figure [6-1](#533908_1_En_6_Chapter.xhtml#Fig1)).\n\
    \n![](images/533908_1_En_6_Chapter/533908_1_En_6_Fig1_HTML.png)\n\nA screenshot\
    \ depicts the list of kubectl A P I resources. The columns are labeled name, short\
    \ names, A P I version, namespaced, and kind.\n\n**Figure 6-1** `kubectl api-resources`\n\
    \nThe client can be obtained either by calling the `Discovery()` method on a `Clientset`\
    \ (see how to obtain a `Clientset` in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s\
    \ “Getting a Clientset” section), or by using functions provided by the `discovery`\
    \ package.\n\n```\nimport \"k8s.io/client-go/discovery\"\n```\n\nAll these functions\
    \ expect a `rest.Config` as a parameter. You can see in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s\
    \ “Connecting to the Cluster” section how to get such a `rest.Config` object.\n\
    \n- `NewDiscoveryClientForConfig(`  \n  `c *rest.Config,`  \n  `) (*DiscoveryClient,\
    \ error)`  \n  – this returns a `DiscoveryClient`, using the provided `rest.Config`\n\
    - `NewDiscoveryClientForConfigOrDie(`  \n  `c *rest.Config,`  \n  `) *DiscoveryClient`\
    \  \n  – Similar to the previous one, but panics in case of error, instead of\
    \ returning the error. This function can be used with a hard-coded config whose\
    \ we want to assert the validity.\n- `NewDiscoveryClientForConfigAndClient(` \
    \ \n  `c *rest.Config,`  \n  `httpClient *http.Client,`  \n  `) (*DiscoveryClient,\
    \ error)`  \n  – this returns a `DiscoveryClient`, using the provided `rest.Config`,\
    \ and the provided `httpClient`.\n- The previous function `NewDiscoveryClientForConfig`\
    \ uses a default HTTP Client built with the function `rest.HTTPClientFor`. If\
    \ you want to personalize the HTTP Client before building the `DiscoveryClient`,\
    \ you can use this function instead.\n\n# RESTMapper\n\nYou have seen in Chapter\
    \ [5](#533908_1_En_5_Chapter.xhtml)’s “RESTMapper” section that the API Machinery\
    \ provides a concept of RESTMapper, used to map between REST Resources and Kubernetes\
    \ Kinds.\n\nThe API Machinery also provides a default implementation of the RESTMapper,\
    \ the `DefaultRESTMapper`, for which the group/version/kinds must be added manually.\n\
    \nThe Client-go Library provides several implementations of a RESTMapper, taking\
    \ advantage of the Discovery client to provide the list of group/version/kinds\
    \ and resources.\n\n## PriorityRESTMapper\n\nThe `PriorityRESTMapper` gets all\
    \ the groups served by the Kubernetes API, with the help of the Discovery client,\
    \ and takes care about the multiple versions that could be part of given groups\
    \ and the preferred version for each group, to return the preferred version.\n\
    \nA `restmapper.PriorityRESTMapper` object is obtained by calling the function\
    \ `restmapper.NewDiscoveryRESTMapper`:\n\n```\nimport \"k8s.io/client-go/restmapper\"\
    \nfunc NewDiscoveryRESTMapper(\ngroupResources []*APIGroupResources,\n) meta.RESTMapper\n\
    ```\n\nThe `groupResources` parameter can be built with the function `restmapper.GetAPIGroupResources`:\n\
    \n```\nfunc GetAPIGroupResources(\ncl discovery.DiscoveryInterface,\n) ([]*APIGroupResources,\
    \ error)\n```\n\nHere is the code necessary to build a `PriorityRESTMapper`:\n\
    \n```\nimport \"k8s.io/client-go/restmapper\"\ndiscoveryClient := clientset.Discovery()\n\
    apiGroupResources, err :=\nrestmapper.GetAPIGroupResources(\ndiscoveryClient,\n\
    )\nif err != nil {\nreturn err\n}\nrestMapper := restmapper.NewDiscoveryRESTMapper(\n\
    apiGroupResources,\n)\n```\n\nYou can now use the RESTMapper as defined in Chapter\
    \ [5](#533908_1_En_5_Chapter.xhtml)’s “RESTMapper” section.\n\n## DeferredDiscoveryRESTMapper\n\
    \nThe `DeferredDiscoveryRESTMapper` uses a `PriorityRESTMapper` internally, but\
    \ will wait for the first request to initialize the RESTMapper.\n\n```\nfunc NewDeferredDiscoveryRESTMapper(\n\
    cl discovery.CachedDiscoveryInterface,\n) *DeferredDiscoveryRESTMapper\n```\n\n\
    The function `NewDeferredDiscoveryRESTMapper` is used to build such a RESTMapper,\
    \ and it gets an object which implements the `discovery.CachedDiscoveryInterface`\
    \ to get a Cached Discovery Client.\n\nThe Client-go Library provides an implementation\
    \ for this interface, which is returned by the function `memory.NewMemCacheClient`.\n\
    \n```\nfunc NewMemCacheClient(\ndelegate discovery.DiscoveryInterface,\n) discovery.CachedDiscoveryInterface\n\
    ```\n\nHere is the code necessary to build a `DeferredDiscoveryRESTMapper`:\n\n\
    ```\nimport \"k8s.io/client-go/restmapper\"\ndiscoveryClient := clientset.Discovery()\n\
    defRestMapper :=\nrestmapper.NewDeferredDiscoveryRESTMapper(\nmemory.NewMemCacheClient(discoveryClient),\n\
    )\n```\n\nYou can now use the RESTMapper as defined in Chapter [5](#533908_1_En_5_Chapter.xhtml)’s\
    \ “RESTMapper” section.\n\n# Conclusion\n\nIn this chapter, you have seen how\
    \ to connect to a cluster and how to obtain a `Clientset`. It is a set of clients,\
    \ one for each Group-Version, with which you can execute operations on resources\
    \ (get, list, create, etc.).\n\nYou also have covered the REST client, internally\
    \ used by the `Clientset`, and that the developer can use to build more specific\
    \ requests. Finally, the chapter covered the Discovery client, used to discover\
    \ the resources served by the Kubernetes API in a dynamic way.\n\nThe next chapter\
    \ covers how to test applications written with the Client-go Library, using the\
    \ fake implementations of the clients provided by it."
