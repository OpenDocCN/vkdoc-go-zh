    # 向项目添加自定义资源


    目前，Manager 并未管理任何 Controller。即使您可以构建并运行它，也无法用它执行任何操作。


    接下来要执行的 `kubebuilder` 命令是 `kubebuilder create api`，用于向项目添加自定义资源及其相关的 Controller。该命令将询问您是否要创建该资源及其
    Controller。请对每个问题回复 **y**。


    *   ❶ 自定义资源的组。该组名后会自动拼接域名，以构成完整的 GVK 组。

    *   ❷ 资源的版本。

    *   ❸ 资源的类型（Kind）。


    ```

    $ kubebuilder create api

    --group mygroup                   ❶

    --version v1alpha1                ❷

    --kind MyResource                 ❸

    Create Resource [y/n]

    y

    Create Controller [y/n]

    y

    ```


    您可以通过运行以下 `git` 命令来查看该命令所做的更改：


    ```

    $ git status

    On branch main

    Changes not staged for commit:

    (use "git add ..." to update what will be committed)

    (use "git restore ..." to discard changes in working directory)

    modified:   PROJECT

    modified:   go.mod

    modified:   go.sum

    modified:   main.go

    Untracked files:

    (use "git add ..." to include in what will be committed)

    api/

    config/crd/

    config/rbac/myresource_editor_role.yaml

    config/rbac/myresource_viewer_role.yaml

    config/samples/

    controllers/

    no changes added to commit (use "git add" and/or "git commit -a")

    ```


    `PROJECT` 文件包含了项目的定义。最初它只包含作为 `init` 命令标志提供的域名和 `repo`。现在，它也包含了第一个资源的定义。`main.go`
    文件和 `controllers` 目录定义了该自定义资源的 Controller。


    `api/v1alpha1` 目录已被创建，其中包含使用 Go 结构体定义的自定义资源，以及由 `deepcopy-gen`（参见第 8 章的“运行 `deepcopy-gen`”部分）在
    `controller-gen` 工具的帮助下生成的代码。它还包含了 `AddToScheme` 函数的定义，用于将此新自定义资源添加到 Scheme 中。


    `config/samples` 目录包含一个新文件，以 YAML 格式定义了一个自定义资源实例。`config/rbac` 目录包含两个新文件，定义了新的
    `ClusterRole` 资源——一个用于查看，一个用于编辑 `MyResource` 实例。`config/crd` 目录包含用于构建 CRD 的 kustomize
    文件。


    # 构建和部署 Manifest 文件


