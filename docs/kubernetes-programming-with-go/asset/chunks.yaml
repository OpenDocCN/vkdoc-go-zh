- fmt: '# Labels and Annotations


    Labels and annotations are defined in Go as a map in which the keys and values
    are strings.


    Even if labels and annotations have very different usage, they can be populated
    the same way. We will discuss in the present section how to populate the `labels`
    field, but this is also applicable to annotations.


    If you know the keys and values you want to add as labels, the simplest way to
    write the labels’ field is to directly write the map, for example:


    ```

    mylabels := map[string]string{

    "app.kubernetes.io/component": "my-component",

    "app.kubernetes.io/name":      "a-name",

    }

    ```


    You can also add labels to an existing map, for example:


    ```

    mylabels["app.kubernetes.io/part-of"] = "my-app"

    ```


    If you need to build the labels field from dynamic values, the `labels` package
    provided in the API Machinery Library provides a `Set` type that may be helpful.


    ```

    import "k8s.io/apimachinery/pkg/labels"

    mylabels := labels.Set{}

    ```


    Functions and methods are provided to manipulate this type:


    * The function `ConvertSelectorToLabelsMap` transforms a selector string into
    a `Set`.

    * The function `Conflicts` checks that two `Set`s do not have conflicting labels.
    Conflicting labels are labels that have the same key but different values.

    * The function `Merge` will merge two `Set`s into a single `Set`. If there are
    conflicting labels between the two sets, the label in the second set will be used
    in the resulting `Set`.

    * The function `Equals` checks that the two `Set`s have the same keys and values.

    * The method `Has` indicates whether a `Set` contains a key.

    * The method `Get` returns the value for a given key in the `Set`, or an empty
    string if the key is not defined in the `Set`.


    You can instantiate a `Set` with values, and you can populate it with individual
    values the same as you do with a map:


    ```

    mySet := labels.Set{

    "app.kubernetes.io/component": "my-component",

    "app.kubernetes.io/name":      "a-name",

    }

    mySet["app.kubernetes.io/part-of"] = "my-app"

    ```


    You can use the following methods to access the labels and annotations of a resource:


    * `GetLabels() map[string]string`

    * `SetLabels(labels map[string]string)`

    * `GetAnnotations() map[string]string`

    * `SetAnnotations(annotations map[string]string)`


    ## Setting APIVersion and Kind


    Using the `Client-go` Library (Chapter [4](#533908_1_En_4_Chapter.xhtml) shows
    how to use it), the `APIVersion` and `Kind` will not be set; you will need to
    set them on the referenced object before copying it, or set it directly into the
    `ownerReference`:


    ```

    import (

    corev1 "k8s.io/api/core/v1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    )

    // Get the object to reference

    pod, err := clientset.CoreV1().Pods(myns).

    Get(context.TODO(), mypodname, metav1.GetOptions{})

    If err != nil {

    return err

    }

    // Solution 1: set the APIVersion and Kind of the Pod

    // then copy all information from the pod

    pod.SetGroupVersionKind(

    corev1.SchemeGroupVersion.WithKind("Pod"),

    )

    ownerRef := metav1.OwnerReference{

    APIVersion: pod.APIVersion,

    Kind:       pod.Kind,

    Name:       pod.GetName(),

    UID:        pod.GetUID(),

    }

    // Solution 2: Copy name and uid from pod

    // then set APIVersion and Kind on the OwnerReference

    ownerRef := metav1.OwnerReference{

    Name: pod.GetName(),

    UID:  pod.GetUID(),

    }

    ownerRef.APIVersion, ownerRef.Kind =

    corev1.SchemeGroupVersion.WithKind("Pod").

    ToAPIVersionAndKind()

    ```


    The `APIVersion` contains the same information as the `Group` and `Version`. You
    can get the information from the `SchemeGroupVersion` variable of type `schema.GroupVersion`,
    which is defined in the package of the API library related to the resource (here
    `k8s.io/api/core/v1` for the `Pod` resource). You can then add the `Kind` to create
    a `schema.GroupVersionKind`.


    For the first solution, you can use the method `SetGroupVersionKind` on the referenced
    object to set the `APIVersion` and `Kind` from the `GroupVersionKind`. For the
    second solution, use the `ToAPIVersionAndKind` method on the `GroupVersionKind`
    to get the corresponding `APIVersion` and `Kind` values before moving them to
    the `OwnerReference`.


    Chapter [5](#533908_1_En_5_Chapter.xhtml) describes the `API Machinery` Library
    and all the types and methods related to `Group`, `Version`, and `Kind`s. The
    `OwnerReference` structure also contains two optional boolean fields: `Controller`
    and `BlockOwnerDeletion`.


    ### Setting Controller


    The `Controller` field indicates whether the referenced object is the managing
    Controller (or Operator). A controller, or operator, must set this value to true
    on the owned resource to indicate that it is managing this owned resource.


    The Kubernetes API will refuse to add two `OwnerReference`s with the `Controller`
    set to true on the same resource. This way, it is not possible that a resource
    is managed by two different controllers.


    Note that this is different from being owned by various resources. A resource
    can have different owners; and in this case, the resource will be deleted when
    all its owners have been deleted, independent of which owner is the `Controller`,
    if any.


    This uniqueness of controllers is useful for those that can "adopt" resources.
    For example, a `ReplicaSet` can adopt an existing pod that matches the selectors
    of the `ReplicaSet`, but only if the `Pod` is not already controlled by another
    `ReplicaSet` or another controller.


    The value of this field is a pointer to a boolean value. You can either declare
    a boolean value and affect its address when setting the `Controller` field, or
    use the `BoolPtr` function from the `Kubernetes Utils` Library:


    ```

    // Solution 1: declare a value and use its address

    controller := true

    ownerRef.Controller = &controller

    // Solution 2: use the BoolPtr function

    import (

    "k8s.io/utils/pointer"

    )

    ownerRef.Controller = pointer.BoolPtr(true)

    ```


    ### Setting BlockOwnerDeletion


    The `OwnerReference` is useful for a controller or other process to not have to
    take care about deletion of owned resources: when the owner is deleted, the owned
    will be deleted by the Kubernetes Garbage Collector.


    This behavior is configurable. When using the `Delete` operation on a resource,
    you can use the `Propagation Policy` option:


    * **Orphan**: To indicate to the Kubernetes API to orphan the owned resources,
    so they will not be deleted by the garbage collector.

    * **Background**: To indicate to the Kubernetes API to return from the DELETE
    operation immediately after the owner resource is deleted, and not wait for owned
    resources to be deleted by the garbage collector.

    * **Foreground**: To indicate to the Kubernetes API to return from the DELETE
    operation after the owner and **the owned resources with `BlockOwnerDeletion`
    set to true** are deleted. The Kubernetes API will not wait for other owned resources
    to be deleted.


    So, if you are writing a controller or another process that needs to wait for
    all the owned resources to be deleted, the process will need to set the `BlockOwnerDeletion`
    field to true on all the owned resources and to use the Foreground propagation
    policy when deleting the owner resource.'
