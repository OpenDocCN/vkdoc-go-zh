    #### 使用 CLI 标志覆盖 kubeconfig


    如前所述，此函数的第二个参数 `NewNonInteractiveDeferredLoadingClientConfig` 是一个 `ConfigOverrides`
    结构体。该结构体包含一些值，用于覆盖合并 `kubeconfig` 文件后结果中的某些字段。


    你可以自行设置此结构体中的特定值，或者，如果你正在使用 `spf13/pflag` 库（即 [github.com/spf13/pflag](http://github.com/spf13/pflag)）创建一个
    CLI，则可以使用以下代码自动为你的 CLI 声明默认标志，并将它们绑定到 `ConfigOverrides` 结构体：


    ```go

    import (

    "github.com/spf13/pflag"

    "k8s.io/client-go/tools/clientcmd"

    )

    var (

    flags pflag.FlagSet

    overrides clientcmd.ConfigOverrides

    of = clientcmd.RecommendedConfigOverrideFlags("")

    )

    clientcmd.BindOverrideFlags(&overrides, &flags, of)

    flags.Parse(os.Args[1:])

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    &overrides,

    ).ClientConfig()

    ```


    请注意，在调用 `RecommendedConfigOverrideFlags` 函数时，你可以为添加的标志声明一个前缀。


    ## 获取 Clientset


    Kubernetes 包提供了创建 `kubernetes.Clientset` 类型 clientset 的函数。


    -   `func NewForConfig(c *rest.Config) (*Clientset, error)` – `NewForConfig` 函数使用由前面章节所述方法之一构建的
    `rest.Config`，返回一个 `Clientset`。


    -   `func NewForConfigOrDie(c *rest.Config) *Clientset` – 此函数与上一个类似，但在出错时会触发 panic，而不是返回错误。此函数可用于硬编码配置，对于这些配置，你希望断言其有效性。


    -   `NewForConfigAndClient` 函数使用提供的 `rest.Config` 和提供的 `http.Client` 返回一个 `Clientset`。


    -   之前的函数 `NewForConfig` 使用通过 `rest.HTTPClientFor` 函数构建的默认 HTTP 客户端。如果你想在构建 `Clientset`
    之前个性化 HTTP 客户端，可以使用此函数。


    ```go

    NewForConfigAndClient(

    c *rest.Config,

    httpClient *http.Client,

    ) (*Clientset, error)

    ```


    ## 使用 Clientset


    `kubernetes.Clientset` 类型实现了 `kubernetes.Interface` 接口，定义如下：


    ```go

    type Interface interface {

    Discovery() discovery.DiscoveryInterface

    [...]

    AppsV1()          appsv1.AppsV1Interface

    AppsV1beta1()     appsv1beta1.AppsV1beta1Interface

    AppsV1beta2()     appsv1beta2.AppsV1beta2Interface

    [...]

    CoreV1()           corev1.CoreV1Interface

    [...]

    }

    ```


    第一个方法 `Discovery()` 提供了一个接口，该接口提供了一些方法，用于发现集群中可用的组、版本和资源，以及资源的首选版本。此接口还提供对服务器版本以及
    OpenAPI v2 和 v3 定义的访问。这在 Discovery 客户端部分有详细说明。


    除了 `Discovery()` 方法之外，`kubernetes.Interface` 由一系列方法组成，每个方法对应 Kubernetes API 定义的一个组/版本。当你看到此接口的定义时，可以理解
    `Clientset` 是一组客户端，每个客户端专用于其自身的组/版本。


    每个方法返回一个值，该值实现特定于该组/版本的接口。例如，`kubernetes.Interface` 的 `CoreV1()` 方法返回一个值，该值实现了
    `corev1.CoreV1Interface` 接口，定义如下：


    ```go

    type CoreV1Interface interface {

    RESTClient() rest.Interface

    ComponentStatusesGetter

    ConfigMapsGetter

    EndpointsGetter

    [...]

    }

    ```


    此 `CoreV1Interface` 接口中的第一个方法是 `RESTClient() rest.Interface`，用于获取特定组/版本的 `REST`
    客户端。此底层客户端将由组/版本客户端内部使用，你可以使用此 `REST` 客户端来构建此接口的其它方法 `CoreV1Interface` 未原生提供的请求。


    由 `REST` 客户端实现的 `rest.Interface` 接口定义如下：


    ```go

    type Interface interface {

    GetRateLimiter()            flowcontrol.RateLimiter

    Verb(verb string)           *Request

    Post()                      *Request

    Put()                       *Request

    Patch(pt types.PatchType)   *Request

    Get()                       *Request

    Delete()                    *Request

    APIVersion()                schema.GroupVersion

    }

    ```


    如你所见，此接口提供了一系列方法——`Verb`、`Post`、`Put`、`Patch`、`Get` 和 `Delete`——它们返回一个带有特定 HTTP
    动词的 `Request` 对象。这在“如何使用这些 `Request` 对象完成操作”部分有进一步说明。


    `CoreV1Interface` 中的其他方法用于获取组/版本中每个资源的特定方法。例如，嵌入的 `ConfigMapsGetter` 接口定义如下：


    ```go

    type ConfigMapsGetter interface {

    ConfigMaps(namespace string) ConfigMapInterface

    }

    ```


    然后，`ConfigMapInterface` 接口由 `ConfigMaps` 方法返回，定义如下：


    ```go

    type ConfigMapInterface interface {

    Create(

    ctx context.Context,

    configMap *v1.ConfigMap,

    opts metav1.CreateOptions,

    ) (*v1.ConfigMap, error)

    Update(

    ctx context.Context,

    configMap *v1.ConfigMap,

    opts metav1.UpdateOptions,

    ) (*v1.ConfigMap, error)

    Delete(

    ctx context.Context,

    name string,

    opts metav1.DeleteOptions,

    ) error

    [...]

    }

    ```


    你可以看到，此接口提供了一系列方法，每个方法对应一个 *Kubernetes API 动词*。


    每个与操作相关的方法都将一个 Option 结构体作为参数，该结构体以操作名称命名：`CreateOptions`、`UpdateOptions`、`DeleteOptions`
    等。这些结构体及相关常量定义在包 `k8s.io/apimachinery/pkg/apis/meta/v1` 中。


    最后，要对组-版本的资源执行操作，你可以按照以下模式进行链式调用（适用于命名空间资源），其中 `namespace` 可以是空字符串以表示集群范围的操作：


    ```go

    clientset.

    GroupVersion().

    NamespacedResource(namespace).

    Operation(ctx, options)

    ```


    而对于非命名空间资源，模式如下：


    ```go

    clientset.

    GroupVersion().

    NonNamespacedResource().

    Operation(ctx, options)

    ```


    例如，使用以下代码*列出*命名空间 `project1` 中 *core/v1* 组/版本的 *Pods*：


    ```go

    podList, err := clientset.

    CoreV1().

    Pods("project1").

    List(ctx, metav1.ListOptions{})

    ```


    要获取*所有*命名空间中的 *pods* *列表*，你需要指定一个空的命名空间名称：


    ```go

    podList, err := clientset.

    CoreV1().

    Pods("").

    List(ctx, metav1.ListOptions{})

    ```


    要获取节点列表（节点是非命名空间资源），请使用以下代码：


    ```go

    nodesList, err := clientset.

    CoreV1().

    Nodes().

    List(ctx, metav1.ListOptions{})

    ```


    以下部分将使用 *Pod* 资源详细描述各种操作。在处理非命名空间资源时，你可以应用相同的示例，只需移除命名空间参数即可。


    ## 检查请求


    如果你想知道调用 client-go 方法时执行了哪些 HTTP 请求，可以为你的程序启用日志记录。Client-go 库使用 `klog` 库（[`github.com/kubernetes/klog`](https://github.com/kubernetes/klog)），你可以使用以下代码为你的命令启用日志标志：


    ```go

    import (

    "flag"

    "k8s.io/klog/v2"

    )

    func main() {

    klog.InitFlags(nil)

    flag.Parse()

    [...]

    }

    ```


    现在，你可以使用 `-v <level>` 标志运行你的程序——例如，`-v 6` 获取每个请求所调用的 URL。关于定义的日志级别的更多细节，请参见表 2-1。

