  trans: '

    ### 更新资源


    你可以使用 `PUT` 请求来替换特定资源的全部信息，只需在请求路径中指定资源名称（对于命名空间资源还需指定命名空间），并在请求体中提供新的资源信息。


    举例说明，你可以先使用以下命令定义一个新的 Deployment：


    ```

    $ cat > deploy.yaml <<EOF

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    ```


    然后，可以使用以下命令在集群中创建这个 Deployment：


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy.yaml

    ```


    接下来，你可以为该 Deployment 创建一个更新后的清单文件；例如，使用以下命令更新容器的镜像（这将把镜像名称 `nginx` 替换为 `nginx:latest`）：


    ```

    $ cat deploy.yaml | sed ''s/image: nginx/image: nginx:latest/'' > deploy2.yaml

    ```


    最后，你可以使用以下请求将更新后的 Deployment 应用到集群中：


    ```

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    ```


    这相当于执行 `kubectl` 命令：


    ```

    $ kubectl replace --namespace project1 -f deploy2.yaml -o json

    ```


    ### 管理更新资源时的冲突


    如果使用上述技术更新资源时，在您创建资源到更新资源之间，有其他参与者对该资源进行了修改，那么您更新时，其他参与者的修改将会丢失。


    为避免这种冲突风险，您可以先读取资源信息（使用 `GET` 请求）找到资源元数据中 `resourceVersion` 字段的值，然后在您要更新的资源规格中指明这个
    `resourceVersion`。


    通过使用这个 `resourceVersion` 发送 `PUT` 请求，API 服务器会比较接收到的资源与当前资源的 `resourceVersion`
    值。如果值不同（因为在此期间有其他参与者修改了资源），API 服务器将回复一个错误：`Operation cannot be fulfilled on [...]:
    the object has been modified; please apply your changes to the latest version
    and try again`。


    举例说明，我们先创建这个 Deployment（如果之前小节已创建，请务必先将其删除）：


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy.yaml

    ```


    您会收到一个响应，其中包含了您所创建资源的 `resourceVersion`；在本例中，它为 `668867`：


    ```

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "668867",

    "generation": 1,

    [...]

    }

    ```


    等待几秒后，您可以执行一个 `GET` 请求来获取最新版本，并将收到如下响应：


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments/nginx

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "668908",

    "generation": 1,

    [...]

    }

    ```


    您可以看到 `resourceVersion` 已经自增，现在为 `668908`。这是因为 Deployment 控制器自行更新了资源。


    现在，如果您将第一次收到的版本号添加到您的 YAML 清单中并尝试更新该 Deployment，您将收到一个错误，指示检测到冲突：


    ```

    $ cat > deploy2.yaml <<EOF

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    resourceVersion: "668867"

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    {

    "kind": "Status",

    "apiVersion": "v1",

    "metadata": {

    },

    "status": "Failure",

    "message": "Operation cannot be fulfilled on deployments.apps \"nginx\": the object
    has been modified; please apply your changes to the latest version and try again",

    "reason": "Conflict",

    "details": {

    "name": "nginx",

    "group": "apps",

    "kind": "deployments"

    },

    "code": 409

    }

    ```


    现在，如果您使用以下命令将 YAML 清单更新为最新的 `resourceVersion`，并再次运行 `PUT` 命令，操作将成功：


    ```

    $ sed -i ''s/668867/668908/'' deploy2.yaml

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "671623",

    "generation": 2,

    [...]

    }

    ```


    ### 使用策略合并补丁更新资源


    修改资源时，可以不发送其完整描述，而是通过使用 *补丁* 仅发送您想要修改的部分。


    这可以通过 `PATCH` 请求实现，请求内容类型为 `application/strategic-merge-patch+json`，并在请求路径中指定资源名称（对于命名空间资源还需指定命名空间），在请求体中提供补丁信息。


    补丁信息是 YAML 清单的一个片段，仅包含您想要更新的字段。这样做时，您在路径中指定的字段将被更新，而未在补丁中指定的字段将保持不变。


    举例说明，您可以先使用以下命令创建一个包含补丁信息的文件：


    ```

    $ cat > deploy-patch.json <<EOF

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "image":"nginx:alpine"

    }]

    }}}}

    EOF

    ```


    然后，您可以使用以下请求将此补丁应用到资源：


    注意要使用特定的 `Content-Type` 头部——`application/strategic-merge-patch+json`。


    ```

    $ curl -X PATCH $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/strategic-merge-patch+json" \

    --data-binary @deploy-patch.json

    ```


    这相当于执行 `kubectl` 命令：


    ```

    $ kubectl patch deployment nginx --namespace project1 \

    --patch-file deploy-patch.json \

    --type=strategic \

    -o json

    ```


    当一个字段是单值（可以是像字符串这样的简单值，也可以是包含多个字段的对象）时，补丁中的值会替换现有的值。


    请注意，如果补丁中不包含某个字段，原始值不会被删除，而是保持不变。您可以为某个字段指定 `null` 值，以将其从结果中删除。

    '
- fmt: '# 修补数组字段


    当字段包含值数组时，其行为与单值不同。


    默认行为取决于Kubernetes API 规范中为该字段定义的*修补策略*。例如，您可以在图 [2-1](#533908_1_En_2_Chapter.xhtml#Fig1)
    中看到，`container`结构的`env`字段在键`name`上具有`Merge`的修补策略。修补策略的另一个可能值是`Replace`。


    ![图 2-1 容器中 env 字段的修补策略](images/533908_1_En_2_Chapter/533908_1_En_2_Fig1_HTML.png)


    *图 2-1* 容器中`env`字段的修补策略


    当字段的修补策略为`Replace`时，生成的数组是补丁中包含的数组，原始数组中的值将不被考虑。


    当字段的修补策略在特定键上为`Merge`时，原始数组和补丁数组将被合并。补丁数组中包含但原始数组中不存在的元素将被添加到结果中，而同时存在于原始数组和补丁数组中的元素将采用补丁元素的值（如果元素的*键*具有相同的值，则它们在原始数组和补丁中是相同的）。


    请注意，存在于原始数组中但补丁中不存在的元素将保持不变。


    为了说明，考虑一个现有的部署，其容器定义了以下环境变量，以及一个定义了这些值的补丁：


    ```

    Original              Patch

    env:                  env:

    - name: key1        - name: key1

    value: value1       value: value1bis

    - name: key2        - name: key3

    value: value2       value: value3

    ```


    将此补丁应用到现有部署后，生成的环境变量列表将如下所示：


    ```

    Result for Merge strategy

    env:

    - name: key1

    value: value1bis

    - name: key2

    value: value2

    - name: key3

    value: value3

    ```


    # 特殊指令


    可以通过在补丁信息中使用特殊*指令*来覆盖这些默认行为。


    ## `replace` 指令


    可以对对象或数组使用`replace`指令。当与对象一起使用时，原始对象将被补丁对象替换。这意味着本次结果中将不包含补丁中未出现的字段；并且该对象的数组将完全与补丁中的数组相同，不会发生合并操作。


    要为对象声明此指令，您需要向该对象添加一个值为`replace`的`$patch`字段。例如，以下补丁将用仅包含`runAsNonRoot`字段的`securityContext`替换`nginx`容器的`securityContext`：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "replace",

    "runAsNonRoot": false

    }}]}}}}

    ```


    当与数组一起使用时，原始数组将被补丁数组替换。


    要为数组声明此指令，您需要向该数组添加一个对象，该对象包含一个值为`replace`的`$patch`字段。例如，以下补丁会将容器`nginx`的环境变量设置为单个变量`key1`，无论之前定义了多少个变量。


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "env": [

    { "$patch": "replace"},

    { "name": "key1", "value": "value1" }

    ]

    }]}}}}

    ```


    ## `delete` 指令


    可以对对象或数组中的对象元素使用`delete`指令。对对象使用此指令类似于将该对象的值声明为`null`。例如，此补丁将从容器`nginx`中删除`securityContext`字段：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "delete"

    }

    }]}}}}

    ```


    要从列表中删除一个元素，您需要将指令添加到要*删除*的元素上。您需要指明键字段（为`Merge`修补策略指定的键）。例如，您可以使用以下补丁删除名为`key1`的环境变量：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "env": [{

    "name": "key1",

    "$patch": "delete"

    }]

    }]}}}}

    ```


    ## `deleteFromPrimitiveList` 指令


    `delete`指令仅可用于从数组中删除对象。您可以使用`deleteFromPrimitiveList`指令，通过将包含数组的字段名加上前缀`$deleteFromPrimitiveList/`来从数组中删除原始（基本）类型的元素。例如，要从`nginx`容器的`args`列表中删除`--debug`参数，您可以使用以下补丁：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "$deleteFromPrimitiveList/args": [

    "--debug"

    ]

    }]}}}}

    ```


    请注意，此指令在 Kubernetes 1.24 及更早版本中无法正常工作，因为它保留的是指定的值，而不是仅保留其他值。


    ## `setElementOrder` 指令


    `setElementOrder`指令可用于通过将包含要排序数组的字段名加上前缀`$setElementOrder/`来将数组元素按不同顺序排序。例如，要重新排序部署的`initContainers`，您可以使用此补丁：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "$setElementOrder/initContainers":[

    { "name": "init2"},

    { "name": "init1"}

    ]}}}}

    ```'
  raw: '#### Patching Array Fields


    When a field contains an array of values, the behavior is different from the one
    for single values.


    The default behavior depends on the *Patch strategy* defined for this field in
    the Kubernetes API specification. For example, you can see in Figure [2-1](#533908_1_En_2_Chapter.xhtml#Fig1)
    that the **env** field of a **container** structure has a Patch strategy of *Merge*
    on the key **name**. Another possible value for the Patch strategy is *Replace*.


    ![](images/533908_1_En_2_Chapter/533908_1_En_2_Fig1_HTML.png)


    A text with three headings. 1\. Environment variable. The text includes patch
    strategy, merge on key. Env var represents an environment variable present in
    a container. 2\. Environment name. 3\. Environment value.


    Figure 2-1


    Patch strategy of env field in a container


    When the Patch strategy of a field is *Replace*, the resulting array is the one
    contained in the patch, and the values present in the original array are not considered.


    When the Patch strategy of a field is *Merge* on a specific key, the original
    array and the patch array will be merged. The elements contained in the patch
    array, but not present in the original array, will be added to the result, and
    the elements present in both the original and patch arrays will pick up the value
    of the patch element (elements are the same in both the original and the patch
    if their *key* has the same value).


    Note that the elements present in the original array, but not present in the patch,
    will remain untouched.


    To illustrate, consider an existing deployment with a container that defines these
    environment variables, and a patch defining these values:


    ```

    Original              Patch

    env:                  env:

    - name: key1        - name: key1

    value: value1       value: value1bis

    - name: key2        - name: key3

    value: value2       value: value3

    ```


    By applying the patch to the existing deployment, the resulting list of environment
    variables will be the following:


    ```

    Result for Merge strategy

    env:

    - name: key1

    value: value1bis

    - name: key2

    value: value2

    - name: key3

    value: value3

    ```


    #### Special Directives


    It is possible to override these default behaviors by using special *Directives*
    in the patch information.


    ##### **replace** Directive


    You can use a **replace** directive either for an object or for an array. When
    used with an object, the original object will be replaced with the patch object.
    This means that the fields not in the patch will not be, this time, present in
    the result; and the arrays of this object will be the exact same arrays of the
    patch, for which no merge operation will occur.


    To declare this directive for an object, you need to add a field **$patch** with
    the value **replace** to the object. For example, the following patch will replace
    the **securityContext** for the **nginx** container with a **securityContext**
    containing only the field **runAsNonRoot**:


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "replace",

    "runAsNonRoot": false

    }}]}}}}

    ```


    When used with an array, the original array will be replaced by the patch array.


    To declare this directive for an array, you need to add an object to this array
    with a single field **$patch** of value **replace**. For example, the following
    patch will set the environment variables for the container **nginx** to the single
    variable, **key1**, regardless of the number of variables defined previously.


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "env": [

    { "$patch": "replace"},

    { "name": "key1", "value": "value1" }

    ]

    }]}}}}

    ```


    ##### **delete** Directive


    You can use a **delete** directive either for an object or for an object element
    of an array. Using this directive for an object is like declaring the value of
    this object to **null**. For example, this patch will delete the field **securityContext**
    from the container **nginx**:


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "delete"

    }

    }]}}}}

    ```


    To delete an element from a list, you need to add the directive to the element
    you want to **delete**. You will need to indicate the key field (the key indicated
    for the **Merge** patch strategy). For example, you can use this patch to delete
    the environment variable named **key1**:


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "env": [{

    "name": "key1",

    "$patch": "delete"

    }]

    }]}}}}

    ```


    ##### deleteFromPrimitiveList Directive


    The **delete** directive is only usable for deleting objects from an array. You
    can use the **deleteFromPrimitiveList** directive to delete primitive elements
    from an array by prefixing the field name containing the array with **$deleteFromPrimitiveList/**.
    For example, to delete the **--debug** argument from a list of the **args** for
    the **nginx** container, you can use the following patch:


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "$deleteFromPrimitiveList/args": [

    "--debug"

    ]

    }]}}}}

    ```


    Note that this directive does not work correctly for Kubernetes 1.24 and earlier
    versions because it keeps the specified values only, instead keeping the other
    values only.


    ##### setElementOrder Directive


    The **setElementOrder** directive can be used to sort elements of an array into
    a different order by prefixing the field name containing the array to sort with
    **$setElementOrder/**. For example, to reorder **initContainers** of a deployment,
    you can use this patch:


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "$setElementOrder/initContainers":[

    { "name": "init2"},

    { "name": "init1"}

    ]}}}}

    ```'
  trans: '

    # 修补数组字段


    当字段包含值数组时，其行为与单值字段不同。


    默认行为取决于 Kubernetes API 规范中为该字段定义的*修补策略*。例如，您可以在图 2-1 中看到，`container`结构的`env`字段在键`name`上具有`Merge`的修补策略。修补策略的另一个可能值是`Replace`。


    ![图 2-1 容器中 env 字段的修补策略](img/533908_1_En_2_Fig1_HTML.png)


    *图 2-1* 容器中`env`字段的修补策略


    当字段的修补策略为`Replace`时，生成的数组就是补丁中包含的数组，原始数组中的值将不被考虑。


    当字段的修补策略在特定键上为`Merge`时，原始数组和补丁数组将被合并。补丁数组中包含但原始数组中不存在的元素将被添加到结果中，而同时存在于原始数组和补丁数组中的元素将采用补丁元素的值（如果元素的*键*具有相同的值，则它们在原始数组和补丁中被视为相同）。


    请注意，存在于原始数组中但补丁中不存在的元素将保持不变。


    为了说明，考虑一个现有的部署，其容器定义了以下环境变量，以及一个定义了这些值的补丁：


    ```

    Original              Patch

    env:                  env:

    - name: key1        - name: key1

    value: value1       value: value1bis

    - name: key2        - name: key3

    value: value2       value: value3

    ```


    将此补丁应用到现有部署后，生成的环境变量列表将如下所示：


    ```

    Result for Merge strategy

    env:

    - name: key1

    value: value1bis

    - name: key2

    value: value2

    - name: key3

    value: value3

    ```


    # 特殊指令


    可以通过在补丁信息中使用特殊*指令*来覆盖这些默认行为。


    ## `replace` 指令


    可以对对象或数组使用`replace`指令。当与对象一起使用时，原始对象将被补丁对象替换。这意味着本次结果中将不包含补丁中未出现的字段；并且该对象的数组将完全与补丁中的数组相同，不会发生合并操作。


    要为对象声明此指令，您需要向该对象添加一个值为`replace`的`$patch`字段。例如，以下补丁将用仅包含`runAsNonRoot`字段的`securityContext`替换`nginx`容器的`securityContext`：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "replace",

    "runAsNonRoot": false

    }}]}}}}

    ```


    当与数组一起使用时，原始数组将被补丁数组替换。


    要为数组声明此指令，您需要向该数组添加一个对象，该对象包含一个值为`replace`的`$patch`字段。例如，以下补丁会将容器`nginx`的环境变量设置为单个变量`key1`，无论之前定义了多少个变量。


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "env": [

    { "$patch": "replace"},

    { "name": "key1", "value": "value1" }

    ]

    }]}}}}

    ```


    ## `delete` 指令


    可以对对象或数组中的对象元素使用`delete`指令。对对象使用此指令类似于将该对象的值声明为`null`。例如，此补丁将从容器`nginx`中删除`securityContext`字段：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "securityContext": {

    "$patch": "delete"

    }

    }]}}}}

    ```


    要从列表中删除一个元素，您需要将指令添加到要*删除*的元素上。您需要指明键字段（为`Merge`修补策略指定的键）。例如，您可以使用以下补丁删除名为`key1`的环境变量：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "env": [{

    "name": "key1",

    "$patch": "delete"

    }]

    }]}}}}

    ```


    ## `deleteFromPrimitiveList` 指令


    `delete`指令仅可用于从数组中删除对象。您可以使用`deleteFromPrimitiveList`指令，通过将包含数组的字段名加上前缀`$deleteFromPrimitiveList/`来从数组中删除原始（基本）类型的元素。例如，要从`nginx`容器的`args`列表中删除`--debug`参数，您可以使用以下补丁：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[

    {

    "name":"nginx",

    "$deleteFromPrimitiveList/args": [

    "--debug"

    ]

    }]}}}}

    ```


    请注意，此指令在 Kubernetes 1.24 及更早版本中无法正常工作，因为它保留的是指定的值，而不是仅保留其他值。


    ## `setElementOrder` 指令


    `setElementOrder`指令可用于通过将包含要排序数组的字段名加上前缀`$setElementOrder/`来将数组元素按不同顺序排序。例如，要重新排序部署的`initContainers`，您可以使用此补丁：


    ```

    {

    "spec":{

    "template":{

    "spec":{

    "$setElementOrder/initContainers":[

    { "name": "init2"},

    { "name": "init1"}

    ]}}}}

    ```

    '
- fmt: '### Applying Resources Server-side


    As you have seen in the previous sections, you can update resources, but in case
    of conflicts, you need to write specific directives to indicate how to resolve
    conflicts. The Kubernetes API has introduced the Server-side Apply as a Beta feature
    in Kubernetes 1.16, and it has been a stable feature since Kubernetes 1.22.


    The Server-side Apply operation is like the `Update` command, with the difference
    that you can use this command even if the resource does not exist in the cluster,
    and you must provide a *field manager* when executing the command.


    The Server-side Apply operation can be executed using a PATCH request with an
    `application/apply-patch+yaml` content-type and specifying the name (and namespace
    for namespaced resources) in the path and the patch information in the body of
    the request.


    On its side, the Kubernetes API will save in a dedicated field (`.metadata.managedFields`)
    of the resource the list of Apply operations accomplished in this resource.


    For each Apply operation saved, each field set by it is marked as "owned" by the
    field manager provided during the operation. If an Apply operation updates a field
    that is owned by another field manager, because of a previous Apply operation
    covering this field, a *conflict* is raised.


    It is possible to *force* an Apply operation so that the conflicting fields are
    established with the new value and the ownership is transferred to the new field
    manager for them. The ownership is set in objects or primitive elements, as well
    as in the elements of arrays.


    For example, a field manager can define a set of environment variables for a container,
    and another field manager can define a distinct set of environment variables for
    the same container of a Pod. Each field manager owns its environment variables.
    If the first field manager runs a new Apply operation by removing some of its
    environment variables, these will be removed from the total list, but environment
    variables of the other field manager will not be affected.


    To illustrate this example, you can create the following YAML manifest for a Deployment
    that defines three environment variables for the Pod''s container:


    ```

    # deploy.yaml

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    env:

    - name: key1

    value: value1

    - name: key2

    value: value2

    - name: key3

    value: value3

    ```


    Then, you can apply this manifest by using the Server-side Apply operation (note
    the content-type header is set to `application/apply-patch+yaml` and the query
    parameter `fieldManager` is set to `manager1`):


    ```

    $ curl -X PATCH

    $HOST/apis/apps/v1/namespaces/project1/deployments/nginx?fieldManager=manager1

    -H

    "Content-Type: application/apply-patch+yaml"

    --data-binary @deploy.yaml

    ```


    This command will create the Deployment. You can examine the `.metadata.managedFields`
    of the Deployment resource created with this command (`jq` is used to get an indented
    form of the JSON):


    ```

    $ kubectl get deploy nginx -o jsonpath={.metadata.managedFields} | jq

    [{

    "apiVersion": "apps/v1",

    "fieldsType": "FieldsV1",

    "fieldsV1": {

    "f:spec": {

    "f:template": {

    "f:spec": {

    "f:containers": {

    "k:{\"name\":\"nginx\"}": {

    ".": {},       ➊

    "f:image": {}, ➋

    "f:name": {}   ➌

    "f:env": {

    "k:{\"name\":\"key1\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➍

    },

    "k:{\"name\":\"key2\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➎

    },

    "k:{\"name\":\"key3\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➏

    }}}}}}}},

    "manager": "manager1",  ➐

    "operation": "Apply",   ➑

    "time": "2022-07-14T16:46:48Z"

    },

    {

    "apiVersion": "apps/v1",

    "fieldsType": "FieldsV1",

    "fieldsV1": {

    "f:status": {

    "f:availableReplicas": {},

    "f:observedGeneration": {},

    "f:readyReplicas": {},

    "f:replicas": {},

    "f:updatedReplicas": {}

    }

    },

    "manager": "kube-controller-manager", ➒

    "operation": "Update",                ➓

    "subresource": "status",

    "time": "2022-07-14T16:46:52Z"

    }]

    ```


    You can see in the `managedFields` (abbreviated for clarity) that your operation
    has been saved as an `Apply` operation, ➑, by the manager, `manager1` ➐; and that
    this manager owns the element of `container` with the name `nginx` ➊—the fields
    `image` ➋, `name` ➌, and the elements of `env` with name `key1` ➍, `key2` ➎, and
    `key3` ➏.


    A *Manager* is any program used to edit a resource; for example, `kubectl` when
    used with an edit or apply command, or a controller or operator managing these
    resources. You also can see that a second operation of type Update ➓ has been
    saved and is owned by the `kube-controller-manager` ➒ because the Deployment controller
    set some values in the status of the Deployment resource when you created it.


    Now, a second manager, `manager2`, would like to update the environment variable,
    `key2`. It can do so by creating the following and running the command (note that
    the `force` query parameter is set to `true`):


    ```

    -- patch.yaml

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    template:

    spec:

    containers:

    - name: nginx

    env:

    - name: key2

    value: value2bis

    $ curl -X PATCH

    "$HOST/apis/apps/v1/namespaces/project1/deployments/nginx?fieldManager=manager2&force=true"

    -H "Content-Type: application/apply-patch+yaml"

    --data-binary @patch.yaml

    ```


    With this operation, `manager2` ➌ now owns the `nginx` element of `container`
    ➊ and the `key2` element of `env` ➋.


    ```

    {

    "apiVersion": "apps/v1",

    "fieldsType": "FieldsV1",

    "fieldsV1": {

    "f:spec": {

    "f:template": {

    "f:spec": {

    "f:containers": {

    "k:{\"name\":\"nginx\"}": {

    ".": {}, ➊

    "f:env": {

    "k:{\"name\":\"key2\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➋

    }

    },

    "f:name": {}

    }}}}}},

    "manager": "manager2", ➌

    "operation": "Apply",

    "time": "2022-06-15T17:21:16Z"

    },

    ```


    Finally, the first manager, `manager1`, decides to keep only the `key1` environment
    variable, removing the environment variables `key2` and `key3` from the initial
    manifest. For this, it will create the following patch and run the command (note
    that the `force` query parameter is not specified):


    ```

    -- patch2.yaml

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    env:

    - name: key1

    value: value1

    $ curl -X PATCH

    "$HOST/apis/apps/v1/namespaces/project1/deployments/nginx?fieldManager=manager1"

    -H "Content-Type: application/apply-patch+yaml"

    --data-binary @patch2.yaml

    ```


    You can see in the resulting deployment that the following is true:


    * The `key2` is still present because it is owned by `manager2`.

    * The `key3` is not present anymore because it was owned by `manager1`.


    ```

    $ kubectl get deployments.apps nginx -o yaml

    [...]

    spec:

    containers:

    - env:

    - name: key1

    value: value1

    - name: key2

    value: value2bis

    image: nginx

    name: nginx

    [...]

    ```'
