    \ patch a subresource of the resource on which the `Patch` method is applied.\
    \ For example, to patch the Status of a Deployment, you can use the value `\"\
    status\"` for the subresources parameter.\n\nThe possible errors specific to the\
    \ `MergePatch` operation are:\n\n- `IsInvalid` – this function indicates whether\
    \ the data passed as a patch is invalid.\n- `IsConflict` – this function indicates\
    \ whether the `ResourceVersion` incorporated into the patch (if you are using\
    \ the Optimistic lock when building the patch data) is a version older than the\
    \ one in the cluster. More information is available in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Updating a Resource Managing Conflicts” section."
  raw: "## Using a Strategic Merge Patch to Update a Resource\n\nYou have seen in\
    \ Chapter [2](#533908_1_En_2_Chapter.xhtml)’s “Using a Strategic Merge Patch to\
    \ Update a Resource” section how patching a resource with a strategic merge patch\
    \ works. To sum up, you need to:\n\n*   Use the **Patch** operation\n\n*   Specify\
    \ a specific value for the content-type header\n\n*   Pass into the body the only\
    \ fields you want to modify\n\nUsing the Client-go Library, you can use the **Patch**\
    \ method for the resource you want to patch.\n\n```\nPatch(\nctx context.Context,\n\
    name string,\npt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources\
    \ ...string,\n) (result *v1.Deployment, err error)\n```\n\nThe **patch** type\
    \ indicates whether you want to use a **StrategicMerge** patch (**types.StrategicMergePatchType**)\
    \ or a merge patch (**types.MergePatchType**). These constants are defined in\
    \ the **k8s.io/apimachinery/pkg/types** package.\n\nThe data field contains the\
    \ patch you want to apply to the resource. You could write this patch data directly,\
    \ like was done in Chapter [2](#533908_1_En_2_Chapter.xhtml), or you can use the\
    \ following functions of the *controller-runtime library* to help you build this\
    \ patch. This library is explored in more depth in Chapter [10](#533908_1_En_10_Chapter.xhtml)).\n\
    \n```\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\nfunc StrategicMergeFrom(\n\
    obj Object,\nopts ...MergeFromOption,\n) Patch\n```\n\nThe **StrategicMergeFrom**\
    \ function accepts a first parameter of **type Object**, representing any Kubernetes\
    \ object. You will pass by this parameter the object you want to patch, before\
    \ any change.\n\nThe function then accepts a series of options. The only accepted\
    \ option at this time is the **client.MergeFromWithOptimisticLock{}** value. This\
    \ value asks the library to add the **ResourceVersion** to the patch data, so\
    \ the server will be able to check whether the resource version you want to update\
    \ is the last one.\n\nAfter you have created a **Patch** object by using the **StrategicMergeFrom**\
    \ function, you can create a deep copy of the object you want to patch, then modify\
    \ it. Then, when you are done updating the object, you can build the data for\
    \ the patch with the dedicated **Data** method of the **Patch** object.\n\nAs\
    \ an example, to build patch data for a `Deployment`, containing the **ResourceVersion**\
    \ for optimistic lock, you can use the following code (**createdDep** is a **Deployment**\
    \ structure that reflects a `Deployment` created in the cluster):\n\n```\npatch\
    \ := client.StrategicMergeFrom(\ncreatedDep,\npkgclient.MergeFromWithOptimisticLock{},\n\
    )\nupdatedDep := createdDep.DeepCopy()\nupdatedDep.Spec.Replicas = pointer.Int32(2)\n\
    patchData, err := patch.Data(updatedDep)\n// patchData = []byte(`{\n//   \"metadata\"\
    :{\"resourceVersion\":\"4807923\"},\n//   \"spec\":{\"replicas\":2}\n// }`)\n\
    patchedDep, err := clientset.\nAppsV1().Deployments(\"project1\").Patch(\nctx,\n\
    \"dep1\",\npatch.Type(),\npatchData,\nmetav1.PatchOptions{},\n)\n```\n\nNote that\
    \ the **MergeFrom** and **MergeFromWithOptions** functions are also available,\
    \ if you prefer to execute a *Merge Patch* instead.\n\nThe **Type** method of\
    \ the **Patch** object can be used to retrieve the patch type, instead of using\
    \ the constants in the **type** package. You can pass **PatchOptions** when calling\
    \ the patch operation. The possible options are:\n\n*   `DryRun` – this indicates\
    \ which operations on the API server -side should be executed. The only available\
    \ value is **metav1.DryRunAll**, indicating execution of all the operations except\
    \ persisting the resource to storage.\n\n*   `Force` – this option can be used\
    \ only for *Apply* patch requests and must be unset when working with *StrategicMergePatch*\
    \ or *MergePatch* requests.\n\n*   `FieldManager` – this indicates the name of\
    \ the field manager for this operation. This information will be used for future\
    \ server-side *Apply* operations. This option is optional for *StrategicMergePatch*\
    \ or *MergePatch* requests.\n\n*   `FieldValidation` – this indicates how the\
    \ server should react when duplicate or unknown fields are present in the structure.\
    \ The following are the possible values:\n    *   `metav1.FieldValidationIgnore`\
    \ – to ignore all duplicate or unknown fields\n\n*   `metav1.FieldValidationWarn`\
    \ – to warn when duplicate or unknown fields are present\n\n*   `metav1.FieldValidationStrict`\
    \ – to fail when duplicate or unknown fields are present\n\nNote that the **Patch**\
    \ operation accepts a **subresources** parameter. This parameter can be used to\
    \ patch a subresource of the resource on which the **Patch** method is applied.\
    \ For example, to patch the Status of a Deployment, you can use the value **“status”**\
    \ for the subresources parameter.\n\nThe possible errors specific to the **MergePatch**\
    \ operation are:\n\n*   `IsInvalid` – this function indicates whether the data\
    \ passed as a patch is invalid.\n\n*   `IsConflict` – this function indicates\
    \ whether the **ResourceVersion** incorporated into the patch (if you are using\
    \ the Optimistic lock when building the patch data) is a version older than the\
    \ one in the cluster. More information is available in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Updating a Resource Managing Conflicts” section."
  trans: "\n## 使用战略性合并补丁更新资源\n\n你在第 2 章的“使用战略性合并补丁更新资源”部分已经了解了如何使用战略性合并补丁来修补资源。总而言之，你需要：\n\
    \n- 使用 `Patch` 操作\n- 为 `content-type` 请求头指定一个特定值\n- 在请求体中仅传入你想要修改的字段\n\n使用 Client-go\
    \ 库，你可以对你想要修补的资源调用 `Patch` 方法。\n\n```go\nPatch(\nctx context.Context,\nname string,\n\
    pt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources ...string,\n\
    ) (result *v1.Deployment, err error)\n```\n\n`patch` 类型指示你是想使用 `StrategicMerge`\
    \ 补丁（`types.StrategicMergePatchType`）还是合并补丁（`types.MergePatchType`）。这些常量定义在 `k8s.io/apimachinery/pkg/types`\
    \ 包中。\n\n`data` 字段包含你想要应用到资源上的补丁数据。你可以像第 2 章那样直接编写这些补丁数据，或者使用 `controller-runtime\
    \ library` 中的以下函数来帮助你构建此补丁。该库将在第 10 章进行更深入的探讨。\n\n```go\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\
    \nfunc StrategicMergeFrom(\nobj Object,\nopts ...MergeFromOption,\n) Patch\n```\n\
    \n`StrategicMergeFrom` 函数接受一个类型为 `Object` 的第一个参数，该参数代表任意 Kubernetes 对象。你需要通过此参数传入你想要修补的对象，*在*任何更改之前。\n\
    \n该函数随后接受一系列选项。目前唯一可接受的选项是 `client.MergeFromWithOptimisticLock{}` 值。该值要求库将 `ResourceVersion`\
    \ 添加到补丁数据中，这样服务器就能检查你想要更新的资源版本是否是最新的。\n\n使用 `StrategicMergeFrom` 函数创建 `Patch`\
    \ 对象后，你可以创建要修补对象的深拷贝，然后对其进行修改。当完成对象更新后，你可以使用 `Patch` 对象专用的 `Data` 方法来构建补丁数据。\n\
    \n例如，要为包含乐观锁 `ResourceVersion` 的 `Deployment` 构建补丁数据，你可以使用以下代码（`createdDep` 是一个反映已创建\
    \ `Deployment` 的 `Deployment` 结构体）：\n\n```go\npatch := client.StrategicMergeFrom(\n\
    createdDep,\npkgclient.MergeFromWithOptimisticLock{},\n)\nupdatedDep := createdDep.DeepCopy()\n\
    updatedDep.Spec.Replicas = pointer.Int32(2)\npatchData, err := patch.Data(updatedDep)\n\
    // patchData = []byte(`{\n//   \"metadata\":{\"resourceVersion\":\"4807923\"},\n\
    //   \"spec\":{\"replicas\":2}\n// }`)\npatchedDep, err := clientset.\nAppsV1().Deployments(\"\
    project1\").Patch(\nctx,\n\"dep1\",\npatch.Type(),\npatchData,\nmetav1.PatchOptions{},\n\
    )\n```\n\n请注意，如果你更倾向于执行*合并补丁*，也可以使用 `MergeFrom` 和 `MergeFromWithOptions` 函数。\n\
    \n`Patch` 对象的 `Type` 方法可用于获取补丁类型，而不必使用 `type` 包中的常量。你可以在调用修补操作时传递 `PatchOptions`。可能的选项包括：\n\
    \n- `DryRun` – 指示应在 API 服务器端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行所有操作，但不会将资源持久化到存储中。\n\
    - `Force` – 此选项仅可用于 *Apply* 补丁请求，并且在处理 `StrategicMergePatch` 或 `MergePatch` 请求时必须取消设置。\n\
    - `FieldManager` – 指示此操作的字段管理器名称。此信息将用于将来的服务器端 *Apply* 操作。对于 `StrategicMergePatch`\
    \ 或 `MergePatch` 请求，此选项是可选的。\n- `FieldValidation` – 指示当结构体中出现重复或未知字段时服务器应如何反应。以下是可能的值：\n\
    \  - `metav1.FieldValidationIgnore` – 忽略所有重复或未知字段\n  - `metav1.FieldValidationWarn`\
    \ – 出现重复或未知字段时发出警告\n  - `metav1.FieldValidationStrict` – 出现重复或未知字段时操作失败\n\n请注意，`Patch`\
    \ 操作接受一个 `subresources` 参数。此参数可用于修补 `Patch` 方法所作用资源的子资源。例如，要修补 Deployment 的状态，你可以使用值\
    \ `\"status\"` 作为 subresources 参数。\n\n特定于 `MergePatch` 操作的可能错误包括：\n\n- `IsInvalid`\
    \ – 此函数指示作为补丁传入的数据是否无效。\n- `IsConflict` – 此函数指示合并到补丁中的 `ResourceVersion`（如果在构建补丁数据时使用了乐观锁）是否是比集群中更旧的版本。更多信息请参见第\
    \ 2 章的“更新资源并管理冲突”部分。\n"
- fmt: "# Applying Resources Server-side with Patch\n\nChapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Applying Resources Server-side” section described how a Server-side Apply patch\
    \ works. To sum up, we need to:\n\n- Use the `Patch` operation\n- Specify a specific\
    \ value for the content-type header\n- Pass into the body the only fields you\
    \ want to modify\n- Provide a `fieldManager` name\n\nUsing the Client-go Library,\
    \ you can use the `Patch` method for the resource you want to patch. Note that\
    \ you also can use the `Apply` method; see the next section, “Applying Resources\
    \ Server-side with Apply.”\n\n```\nPatch(\nctx context.Context,\nname string,\n\
    pt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources ...string,\n\
    ) (result *v1.Deployment, err error)\n```\n\nThe `Patch` type indicates the type\
    \ of patch, `types.ApplyPatchType` in this case, defined in the `k8s.io/apimachinery/pkg/types`\
    \ package.\n\nThe `data` field contains the patch you want to apply to the resource.\
    \ You can use the `client.Apply` value to build this data. This value implements\
    \ the `client.Patch` interface, providing the `Type` and `Data` methods.\n\nNote\
    \ that you need to set the `APIVersion` and `Kind` fields in the structure of\
    \ the resource you want to patch. Also note that this `Apply` operation also can\
    \ be used to create the resource.\n\nThe `Patch` operation accepts a `subresources`\
    \ parameter. This parameter can be used to patch a subresource of the resource\
    \ on which the `Patch` method is applied. For example, to patch the `Status` of\
    \ a `Deployment`, you can use the value `\"status\"` for the subresources parameter.\n\
    \n```\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\nwantedDep := appsv1.Deployment{\n\
    Spec: appsv1.DeploymentSpec{\nReplicas: pointer.Int32(1),\n[...]\n}\nwantedDep.SetName(\"\
    dep1\")\nwantedDep.APIVersion, wantedDep.Kind =\nappsv1.SchemeGroupVersion.\n\
    WithKind(\"Deployment\").\nToAPIVersionAndKind()\npatch := client.Apply\npatchData,\
    \ err := patch.Data(&wantedDep)\npatchedDep, err := clientset.\nAppsV1().Deployments(\"\
    project1\").Patch(\nctx,\n\"dep1\",\npatch.Type(),\npatchData,\nmetav1.PatchOptions{\n\
    FieldManager: \"my-program\",\n},\n)\n```\n\nYou can pass `PatchOptions` when\
    \ calling the `Patch` operation. The following are the possible options:\n\n-\
    \ `DryRun` – this indicates which operations on the API Server-side should be\
    \ executed. The only available value is `metav1.DryRunAll`, indicating the execution\
    \ of all the operations except persisting the resource to storage.\n- `Force`\
    \ – this option indicates *force Apply* requests. It means the field manager for\
    \ this request will acquire conflicting fields owned by other field managers.\n\
    - `FieldManager` – this indicates the name of the field manager for this operation.\
    \ This option is mandatory for *Apply Patch* requests.\n- `FieldValidation` –\
    \ this indicates how the server should react when duplicate or unknown fields\
    \ are present in the structure. The possible values are:\n    - `metav1.FieldValidationIgnore`\
    \ – to ignore all duplicate or unknown fields\n    - `metav1.FieldValidationWarn`\
    \ – to warn when duplicate or unknown fields are present\n    - `metav1.FieldValidationStrict`\
    \ – to fail when duplicate or unknown fields are present\n\nThe following are\
    \ the possible errors specific to the `ApplyPatch` operation:\n\n- `IsInvalid`\
    \ – this function indicates whether the data passed as a patch is invalid.\n-\
    \ `IsConflict` – this function indicates whether some fields modified by the patch\
    \ are in conflict because they are owned by another field manager. To resolve\
    \ this conflict, you can use the `Force` option so that these fields will be acquired\
    \ by the field manager of this operation.\n\n## Server-side Apply Using Apply\
    \ Configurations\n\nThe previous section has shown how to execute a server-side\
    \ *Apply* operation by using the `Patch` method. The disadvantage is that the\
    \ data must be passed in JSON format, which can be error-prone.\n\nStarting with\
    \ Version 1.21, the Client-go `Clientset` provides an `Apply` method to execute\
    \ the server-side *Apply* operation using typed structures. The following is the\
    \ signature for the `Apply` method:\n\n```\nApply(\nctx context.Context,\ndeployment\
    \ *acappsv1.DeploymentApplyConfiguration,\nopts metav1.ApplyOptions,\n) (result\
    \ *v1.Deployment, err error)\n```\n\nThe `ApplyOptions` structure defines the\
    \ following options:\n\n- `DryRun` – this indicates which operations on the API\
    \ Server-side should be executed. The only available value is `metav1.DryRunAll`,\
    \ indicating execution of all the operations except persisting the resource to\
    \ storage.\n- `Force` – this caller will reacquire the conflicting fields owned\
    \ by other managers.\n- `FieldManager` – this is the name of the *manager* making\
    \ the `Apply` operation. This value is required.\n\nThis signature of `Apply`\
    \ is like the signatures of the `Create` or `Update` operations, except that a\
    \ `DeploymentApplyConfiguration` object is expected, instead of a `Deployment`\
    \ object.\n\nAs seen in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s “Applying\
    \ Resources Server-side” section, the `Apply` operation permits several *managers*\
    \ to work on the same resource, each manager owning a set of values in the resource\
    \ specification.\n\nFor this reason, the data passed for the operation will not\
    \ define all the fields, but only the fields the *manager* is *responsible for*.\
    \ Some of the fields are required in the structures of resource definitions; it\
    \ is not possible to use these structures for the `Apply` operation.\n\nThe Client-go\
    \ Library introduces new structures, named *Apply Configurations*, in the `applyconfigurations`\
    \ directory of the library, with all fields being optional, using pointers. This\
    \ directory contains generated source code for all native resources of the Kubernetes\
    \ API, with the same structure of it. For example, to access the structures needed\
    \ to define the data for applying a `Deployment` from the `apps/v1` group, you\
    \ need to import the following package:\n\n```\nimport (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\
    \n)\n```\n\nNote that, for the same reason as you want to define an alias for\
    \ packages imported from the Kubernetes API Library (because most packages are\
    \ named `v1`), you will want to use aliases when importing these packages. This\
    \ book uses the same system as the API Library, prefixing the alias with `ac`\
    \ to indicate it comes from the `applyconfigurations` directory.\n\nTwo possibilities\
    \ are offered by the Client-go to build an `ApplyConfiguration`: from scratch\
    \ or from an existing resource."
