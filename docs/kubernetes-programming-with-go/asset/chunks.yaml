    Using the following code to create the **rest.Config** structure, your program
    will have the same behavior as **kubectl**, as previously described:


    ```

    import (

    "k8s.io/client-go/tools/clientcmd"

    )

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    nil,

    ).ClientConfig()

    ```'
