  trans: "\n# 创建资源\n\n要在集群中创建一个新资源，首先需要使用专用的 `Kind` 结构在内存中声明该资源，然后使用对应资源的 `Create`\
    \ 方法。例如，使用以下代码在 `project1` 命名空间中创建一个名为 `nginx-pod` 的 `Pod`：\n\n```\nwantedPod\
    \ := corev1.Pod{\nSpec: corev1.PodSpec{\nContainers: []corev1.Container{\n{\n\
    Name:  \"nginx\",\nImage: \"nginx\",\n},\n},\n},\n}\nwantedPod.SetName(\"nginx-pod\"\
    )\ncreatedPod, err := clientset.\nCoreV1().\nPods(\"project1\").\nCreate(ctx,\
    \ &wantedPod, v1.CreateOptions{})\n```\n\n声明 `CreateOptions` 结构时，用于创建资源的各种选项如下：\n\
    \n*   `DryRun` – 指示应在 API 服务器端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n\
    *   使用此选项，你可以通过命令获取本应在集群中创建的确切对象（而无需真正创建它），并检查在此创建过程中是否会发生错误。\n*   `FieldManager`\
    \ – 指示此操作字段管理器的名称。此信息将用于后续的服务器端 Apply 操作。\n*   `FieldValidation` – 指示当结构中存在重复或未知字段时，服务器应如何响应。以下是可能的值：\n\
    \    *   `metav1.FieldValidationIgnore` 忽略所有重复或未知字段\n    *   `metav1.FieldValidationWarn`\
    \ 当存在重复或未知字段时发出警告\n    *   `metav1.FieldValidationStrict` 当存在重复或未知字段时操作失败\n* \
    \  请注意，使用此方法将无法定义重复或未知字段，因为你正在使用结构来定义对象。\n\n如果发生错误，你可以使用 `k8s.io/apimachinery/pkg/api/errors`\
    \ 包中定义的函数来测试其类型。所有可能的错误在“错误与状态”部分有定义，以下是 `Create` 操作特有的可能错误：\n\n*   `IsAlreadyExists`\
    \ – 此函数指示请求是否因为集群中已存在同名资源而失败\n*   `IsNotFound` – 此函数指示你请求中指定的命名空间是否不存在\n*   `IsInvalid`\
    \ – 此函数指示传入结构的数据是否无效\n\n```\nif errors.IsAlreadyExists(err) {\n// ...\n}\n```\n\
    \n# 获取资源信息\n\n要获取集群中特定资源的信息，可以使用要获取信息资源的 `Get` 方法。例如，要获取 `project1` 命名空间中名为 `nginx-pod`\
    \ 的 `pod` 的信息：\n\n```\npod, err := clientset.\nCoreV1().\nPods(\"project1\").\n\
    Get(ctx, \"nginx-pod\", metav1.GetOptions{})\n```\n\n在获取资源信息时，用于声明 `GetOptions`\
    \ 结构的各种选项如下：\n\n*   `ResourceVersion` – 请求一个不早于指定版本的资源版本。\n*   如果 `ResourceVersion`\
    \ 为 “0”，表示返回资源的任何版本。通常你会收到资源的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n*   如果未设置该选项，则保证你会收到资源的最新版本。\n\
    \n`Get` 操作特有的可能错误是：\n\n*   `IsNotFound` – 此函数指示你请求中指定的命名空间不存在，或者具有指定名称的资源不存在。\n\
    \n# 获取资源列表\n\n要获取集群中的资源列表，可以使用要列出资源的 `List` 方法。例如，使用以下代码列出 `project1` 命名空间中的 Pod：\n\
    \n```\npodList, err := clientset.\nCoreV1().\nPods(\"project1\").\nList(ctx, metav1.ListOptions{})\n\
    ```\n\n或者，要获取所有命名空间中的 Pod 列表，使用：\n\n```\npodList, err := clientset.\nCoreV1().\n\
    Pods(\"\").\nList(ctx, metav1.ListOptions{})\n```\n\n在列出资源时，用于声明 `ListOptions`\
    \ 结构的各种选项如下：\n\n*   `LabelSelector, FieldSelector` – 用于按标签或字段过滤列表。这些选项在“过滤列表结果”部分有详细说明。\n\
    *   `Watch, AllowWatchBookmarks` – 用于运行 Watch 操作。这些选项在“监视资源”部分有详细说明。\n*   `ResourceVersion,\
    \ ResourceVersionMatch` – 指示你想要获取的资源列表的版本。\n*   请注意，当收到 `List` 操作的响应时，列表元素本身会指示一个\
    \ `ResourceVersion` 值，列表中的每个元素也都有各自的 `ResourceVersion` 值。在选项中指定的 `ResourceVersion`\
    \ 指的是列表的 `ResourceVersion`。\n*   对于不带分页的 `List` 操作（有关其他情况下这些选项的行为，请参考“分页结果”和“监视资源”部分）：\n\
    \    *   当未设置 `ResourceVersionMatch` 时，行为与 `Get` 操作相同：\n        *   `ResourceVersion`\
    \ 表示应返回一个不早于指定版本的列表。\n        *   如果 `ResourceVersion` 为 “0”，则表示需要返回列表的任何版本。通常你会收到列表的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n\
    \        *   如果未设置该选项，则保证你会收到列表的最新版本。\n    *   当 `ResourceVersionMatch` 设置为 `metav1.ResourceVersionMatchExact`\
    \ 时，`ResourceVersion` 值指示你想要获取的列表的确切版本。\n        *   将 `ResourceVersion` 设置为 “0”\
    \ 或未定义它是无效的。\n    *   当 `ResourceVersionMatch` 设置为 `metav1.ResourceVersionMatchNotOlderThan`\
    \ 时，`ResourceVersion` 指示你将获得一个不早于指定版本的列表。\n        *   如果 `ResourceVersion` 为\
    \ “0”，则表示返回列表的任何版本。通常你会收到列表的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n     \
    \   *   未定义 `ResourceVersion` 是无效的。\n*   `TimeoutSeconds` – 将请求的持续时间限制为指定的秒数。\n\
    *   `Limit, Continue` – 用于对列表结果进行分页。这些选项在第 2 章的“分页结果”部分有详细说明。\n\n以下是 `List` 操作特有的可能错误：\n\
    \n*   `IsResourceExpired` – 此函数指示指定的 `ResourceVersion` 和设置为 `metav1.ResourceVersionMatchExact`\
    \ 的 `ResourceVersionMatch` 已过期。\n\n请注意，如果你为 `List` 操作指定了一个不存在的命名空间，你将不会收到 `NotFound`\
    \ 错误。\n\n# 过滤列表结果\n\n如第 2 章的“过滤列表结果”部分所述，可以使用标签选择器和字段选择器来过滤 `List` 操作的结果。本节展示如何使用\
    \ API Machinery 库中的 `fields` 和 `labels` 包来创建一个适用于 `LabelSelector` 和 `FieldSelector`\
    \ 选项的字符串。\n"
- fmt: '# Setting LabelSelector Using the Labels Package


    Here is the necessary import information to use the `labels` package from the
    API Machinery Library.


    ```go

    import (

    "k8s.io/apimachinery/pkg/labels"

    )

    ```


    The package provides several methods for building and validating a `LabelsSelector`
    string: using Requirements, parsing a `labelSelector` string, or using a set of
    key-value pairs.


    ## Using Requirements


    You first need to create a `labels.Selector` object using the following code:


    ```go

    labelsSelector := labels.NewSelector()

    ```


    Then, you can create `Requirement` objects using the `labels.NewRequirement` function:


    ```go

    func NewRequirement(

    key string,

    op selection.Operator,

    vals []string,

    opts ...field.PathOption,

    ) (*Requirement, error)

    ```


    Constants for the possible values of `op` are defined in the `selection` package
    (i.e., `k8s.io/apimachinery/pkg/selection`). The number of values in the `vals`
    array of strings depends on the operation:


    * `selection.In` / `selection.NotIn` – the value attached to `key` must equal
    one of (In) / must not equal one of (NotIn) the values defined in `vals`.

    * `vals` must be non-empty.


    * `selection.Equals` / `selection.DoubleEquals` / `selection.NotEquals` – the
    value attached to `key` must equal (`Equals`, `DoubleEquals`) or must not equal
    (`NotEquals`) the value defined in `vals`.

    * `vals` must contain a single value.


    * `selection.Exists` / `selection.DoesNotExist` – the `key` must be defined (`Exists`)
    or must not be defined (`DoesNotExist`).

    * `vals` must be empty.


    * `selection.Gt` / `selection.Lt` – the value attached to a `key` must be greater
    than (`Gt`) or less than (`Lt`) the value defined in `vals`.

    * `vals` must contain a single value, representing an integer.


    For example, to require that the value of the key `mykey` equals `value1`, you
    can declare a `Requirement` with:


    ```go

    req1, err := labels.NewRequirement(

    "mykey",

    selection.Equals,

    []string{"value1"},

    )

    ```


    After defining the `Requirement`, you can add the requirements to the selector
    using the `Add` method on the selector:


    ```go

    labelsSelector = labelsSelector.Add(*req1, *req2)

    ```


    Finally, you can obtain the `String` to be passed for the `LabelSelector` option
    with:


    ```go

    s := labelsSelector.String()

    ```


    ## Parsing a LabelSelector String


    If you already have a string describing the label selector, you can check its
    validity with the `Parse` function. The `Parse` function will validate the string
    and return a `LabelSelector` object. You can use the `String` method on this `LabelSelector`
    object to obtain the string as validated by the `Parse` function.


    As an example, the following code will parse, validate, and return the canonical
    form of the label selector, `"mykey = value1, count < 5"`:


    ```go

    selector, err := labels.Parse(

    "mykey = value1, count < 5",

    )

    if err != nil {

    return err

    }

    s := selector.String()

    // s = "mykey=value1,count<5"

    ```


    ## Using a Set of Key-value Pairs


    The function `ValidatedSelectorFromSet` can be used when you only want to use
    the `Equal` operation, for one or several requirements:


    ```go

    func ValidatedSelectorFromSet(

    ls Set

    ) (Selector, error)

    ```


    In this case, the `Set` will define the set of key-value pairs you want to check
    for equality.


    As an example, the following code will declare a label selector that requires
    the key `key1` to equal `value1` and the key `key2` to equal `value2`:


    ```go

    set := labels.Set{

    "key1": "value1",

    "key2": "value2",

    }

    selector, err = labels.ValidatedSelectorFromSet(set)

    s = selector.String()

    // s = "key1=value1,key2=value2"

    ```


    # Setting Fieldselector Using the Fields Package


    Here is the necessary code to use to import the `fields` package from the API
    Machinery Library.


    ```go

    import (

    "k8s.io/apimachinery/pkg/fields"

    )

    ```


    The package provides several methods for building and validating a `FieldSelector`
    string: assembling one term selectors, parsing a `fieldSelector` string, or using
    a set of key-value pairs.


    ## Assembling One Term Selectors


    You can create one term selectors with the functions `OneTermEqualSelector` and
    `OneTermNotEqualSelector`, then assemble the selectors to build a complete field
    selector with the function `AndSelectors`.


    ```go

    func OneTermEqualSelector(

    k, v string,

    ) Selector

    func OneTermNotEqualSelector(

    k, v string,

    ) Selector

    func AndSelectors(

    selectors ...Selector,

    ) Selector

    ```


    For example, this code builds a field selector with an `Equal` condition on the
    field `status.Phase` and a `NotEqual` condition on the field `spec.restartPolicy`:


    ```go

    fselector = fields.AndSelectors(

    fields.OneTermEqualSelector(

    "status.Phase",

    "Running",

    ),

    fields.OneTermNotEqualSelector(

    "spec.restartPolicy",

    "Always",

    ),

    )

    fs = fselector.String()

    ```


    ## Parsing a FieldSelector String


    If you already have a string describing the field selector, you can check its
    validity with the `ParseSelector` or `ParseSelectorOrDie` functions. The `ParseSelector`
    function will validate the string and return a `fields.Selector` object. You can
    use the `String` method on this `fields.Selector` object to obtain the string,
    as validated by the `ParseSelector` function.


    As an example, this code will parse, validate, and return the canonical form of
    the field selector `"status.Phase = Running, spec.restartPolicy != Always"`:


    ```go

    selector, err := fields.ParseSelector(

    "status.Phase=Running, spec.restartPolicy!=Always",

    )

    if err != nil {

    return err

    }

    s := selector.String()

    // s = "spec.restartPolicy!=Always,status.Phase=Running"

    ```


    ## Using a Set of Key-Value Pairs


    The function `SelectorFromSet` can be used when you want to use only the `Equal`
    operation, for one or several single selectors.


    ```go

    func SelectorFromSet(ls Set) Selector

    ```


    In this case, the `Set` will define the set of key-value pairs you want to check
    for equality.


    As an example, the following code will declare a field selector that requires
    the key `key1` to equal `value1` and the key `key2` to equal `value2`:


    ```go

    set := fields.Set{

    "field1": "value1",

    "field2": "value2",

    }

    selector = fields.SelectorFromSet(set)

    s = selector.String()

    // s = "key1=value1,key2=value2"

    ```'
