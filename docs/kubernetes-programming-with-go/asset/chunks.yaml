- fmt: '# Kubernetes Platform at a Glance


    On one side of the chain, the user declares the high-level resources to build
    applications to deploy: `Deployments`, `Ingresses`, and so on.


    In the middle, controllers are activated to transform these resources into low-level
    resources ( `Pods` ), and the scheduler distributes these resources into nodes.
    On the other side of the chain, the node agents deploy the low-level resources
    onto nodes.


    The main elements of the Kubernetes platform (commonly called the control-plane)
    are highlighted in Figure [1-1](#533908_1_En_1_Chapter.xhtml#Fig1) and described
    in the following:


    1.  The API server – this is the central point on the control-plane; the user
    and the various pieces of the control-plane contact this API to create, get, delete,
    update, and watch resources.


    2.  The `etcd` database – this is only accessible by the API Server, is used to
    persist the data relative to resources.


    3.  The Controller manager – this runs the controllers that transform high-level
    resources declared by the user into low-level resources to be deployed on nodes.
    The controllers are connected to the API Server, watching for high-level resources
    and creating, deleting, and updating low-level resources to satisfy the specifications
    declared in high-level resources.


    4.  Scheduler – this distributes the low-level resources on the various nodes.
    The Scheduler is connected to the API Server to watch for unaffected resources
    and connect them to nodes.


    5.  Kubelet – this is an agent running on all nodes of the cluster, and each agent
    manages the workloads affected to its node. The `kubelet` is connected to the
    API Server to watch for Pods resources affected to its node and to deploy the
    associated containers using the local container runtime.


    6.  Kube proxy – this is an agent running on all nodes of the cluster, and each
    agent manages the network configurations affected to its node. The `kube proxy`
    is connected to the API Server to watch for Service resources and to configure
    associated network rules on its node.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig1_HTML.png)


    A flow diagram of Kubernetes Architecture. The control plane includes an API server
    that bidirectionally connects to controllers and scheduler. It has a single connection
    with `etcd` in the control plane and Kubelet and Kube-proxy in the nodes.


    **Figure 1-1** The architecture of Kubernetes


    ## OpenAPI Specification


    The Kubernetes API is an HTTP REST API. The Kubernetes team provides a specification
    for this API in the OpenAPI format, either in v2 format at `https://github.com/kubernetes/kubernetes/tree/master/api/openapi-spec`
    or in Kubernetes v1.24, in v3 format, at `https://github.com/kubernetes/kubernetes/tree/master/api/openapi-spec/v3`.


    These specifications also are accessible from the API Server at these paths: `/openapi/v2`
    and `/openapi/v3`.


    An OpenAPI specification is made up of various parts and, among these, are a list
    of paths and a list of definitions. The paths are the URLs you use to request
    this API, and for each path, the specification gives the distinct operations such
    as `get`, `delete`, or `post`. Then for each operation, the specification indicates
    what are the parameters and body format for the request, and what are the possible
    response codes and associated body format for the response.


    The parameters and bodies for requests and responses can be either simple types
    or, more generally, structures containing data. The list of definitions includes
    data structures that help build the parameters and bodies for the operations''
    requests and responses.


    Figure [1-2](#533908_1_En_1_Chapter.xhtml#Fig2) is a simplified view of a specification
    for a User API. This API can accept two different paths: `/user/{userId}` and
    `/user`. The first path, `/user/{userId}`, can accept two operations, `get` and
    `delete`, respectively, to receive information about a specific user, given its
    user ID; and to delete information about a specific user, given its user ID. The
    second path, `/user`, can accept a single operation, `post`, to add a new user,
    given its information.


    In this API, a definition of a structure `User` is given, describing the information
    for a user: its ID, first name, and last name. This data structure is used in
    the response body of the `get` operation on the first path, and in the request
    body of the `post` operation on the second path.


    ![](images/533908_1_En_1_Chapter/533908_1_En_1_Fig2_HTML.png)


    A pseudocode. The sub-heading paths include get, delete, and post operations.
    The second sub-heading definition indicates the user ID, first name, and last
    name.


    **Figure 1-2** A simplified user API specification


    ## Verbs and Kinds


    The Kubernetes API adds two concepts to this specification: the **Kubernetes API
    Verbs** and the **Kubernetes Kinds**.


    The Kubernetes API Verbs are mapped directly to the operations in the OpenAPI
    specification. The defined verbs are `get`, `create`, `update`, `patch`, `delete`,
    `list`, `watch`, and `deletecollection`. The correspondence with the HTTP verbs
    can be found in Table [1-1](#533908_1_En_1_Chapter.xhtml#Tab1).


    **Table 1-1** Correspondence Between Kubernetes API Verbs and HTTP Verbs


    | Kubernetes API Verb | HTTP Verb |

    | --- | --- |

    | `get` | GET |

    | `create` | POST |

    | `update` | PUT |

    | `patch` | PATCH |

    | `delete` | DELETE |

    | `list` | GET |

    | `watch` | GET |

    | `deletecollection` | DELETE |


    The Kubernetes Kinds are a subset of the definitions in the OpenAPI specification.
    When requests are made to the Kubernetes API, data structures are exchanged through
    the bodies of requests and responses. These structures share common fields, `apiVersion`
    and `kind`, to help the participants of the request recognize these structures.


    If you wanted to make your User API manage this Kind concept, the `User` structure
    would contain two additional fields, `apiVersion` and `kind`—for example, with
    values `v1` and `User`. To determine whether a definition in the Kubernetes OpenAPI
    specification is a Kubernetes Kind, you can look at the `x-kubernetes-group-version-kind`
    field of the definition. If this field is defined, the definition is a kind, and
    it gives you the values of the `apiVersion` and `kind` fields.'
