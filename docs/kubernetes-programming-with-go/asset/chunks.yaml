  trans: '

    # 部署自定义资源定义


    要在集群中部署新的资源定义，需要对 CRD 对象执行 `Create` 操作。你可以使用 `apiextensions-apiserver` 库提供的 `Clientset`，并利用前面章节介绍的结构体在
    Go 中编写资源定义；或者，也可以创建一个 YAML 文件，并使用 `kubectl` 进行“应用”。


    作为示例，你将使用 YAML 格式和 `kubectl` 在 `mygroup.example.com` 组中创建一个名为 `myresources` 的新资源，其版本为
    `v1alpha1`。


    - ❶ CRD 资源的组和版本

    - ❷ CRD 资源的 `kind`

    - ❸ 新资源的完整名称，包括其所属组

    - ❹ 新资源所属的组

    - ❺ 新资源可以在特定命名空间内创建

    - ❻ 新资源的复数名称，用于访问此新资源的路径

    - ❼ 资源的单数名称，可以使用 `kubectl get myresource`

    - ❽ 新资源的短名称，可以使用 `kubectl get my`、`kubectl get myres`

    - ❾ 将资源添加到 `all` 类别中；运行 `kubectl get all` 时，将显示此 kind 的资源

    - ❿ `v1alpha1` 版本是为新资源定义的唯一版本

    - ⓫ 将新资源的模式(schema)定义为对象，且不包含任何字段


    ```

    apiVersion: apiextensions.k8s.io/v1        ❶

    kind: CustomResourceDefinition             ❷

    metadata:

    name: myresources.mygroup.example.com    ❸

    spec:

    group: mygroup.example.com               ❹

    scope: Namespaced                        ❺

    names:

    plural: myresources                    ❻

    singular: myresource                   ❼

    shortNames:

    - my                                   ❽

    - myres

    kind: MyResource

    categories:

    - all                                  ❾

    versions:

    - name: v1alpha1                         ❿

    served: true

    storage: true

    schema:

    openAPIV3Schema:

    type: object                       ⓫

    ```


    现在，你可以使用 `kubectl` 通过以下命令“应用”此资源：


    ```

    $ kubectl apply -f myresource.yaml

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com
    created

    ```


    从此以后，你就可以操作这个新资源了。


    例如，你可以使用 HTTP 请求获取集群范围或特定命名空间内的资源列表（在运行这些命令之前，需要在另一个终端执行 `kubectl proxy`）：


    ```

    $ curl

    http://localhost:8001/apis/mygroup.example.com/v1alpha1/myresources

    {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186523407"}}

    $ curl

    http://localhost:8001/apis/mygroup.example.com/v1alpha1/namespaces/default/myresources

    {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186524840"}}

    ```


    或者，你也可以使用 `kubectl` 获取这些列表：


    ```

    $ kubectl get myresources

    No resources found in default namespace.

    ```


    你可以使用 YAML 格式定义一个新资源，并使用 `kubectl` 将其“应用”到集群：


    ```

    $ kubectl apply -f - <<EOF

    apiVersion: mygroup.example.com/v1alpha1

    kind: MyResource

    metadata:

    name: myres1

    EOF

    $ kubectl get myresources

    NAME     AGE

    myres1   10s

    ```


    ## 附加打印列(Additional Printer Columns)


    从之前的 `kubectl get myresources` 命令输出中可以看到，显示的列是资源的*名称*和*年龄*。


    CRD 规约中的 `AdditionalPrinterColumns` 字段用于指定在 `kubectl get <resource>` 的输出中希望显示资源的哪些列。


    当未定义附加打印列时，默认返回*名称*和*年龄*。如果你指定了列，它们将与*名称*一起返回。如果希望在添加列时保留*年龄*，则需要显式地添加它。


    对于每个附加列，你需要指定名称(name)、JSON 路径(JSON path)和类型(type)。名称将用作输出中该列的标题，JSON 路径用于 API
    服务器从资源数据中获取该列的值，类型则指示 `kubectl` 如何显示此数据。


    下面是一个示例，展示了在 `Spec` 和 `Status` 中定义了一些字段的 `myresource` CRD，同时定义了附加打印列：


    ```

    apiVersion: apiextensions.k8s.io/v1

    kind: CustomResourceDefinition

    metadata:

    name: myresources.mygroup.example.com

    spec:

    group: mygroup.example.com

    scope: Namespaced

    names:

    plural: myresources

    singular: myresource

    shortNames:

    - my

    - myres

    kind: MyResource

    categories:

    - all

    versions:

    - name: v1alpha1

    served: true

    storage: true

    subresources:

    status: {}

    schema:

    openAPIV3Schema:

    type: object

    properties:

    spec:

    type: object

    properties:

    image:

    type: string

    memory:

    x-kubernetes-int-or-string: true

    status:

    type: object

    properties:

    state:

    type: string

    additionalPrinterColumns:

    - name: image

    jsonPath: .spec.image

    type: string

    - name: memory

    jsonPath: .spec.memory

    type: string

    - name: age

    jsonPath: .metadata.creationTimestamp

    type: date

    ```


    在此 CRD 中，模式(schema)表明资源的数据将是一个包含两个属性 `spec` 和 `status` 的对象。这些属性本身也是对象。`spec` 对象包含两个属性：类型为
    `string` 的 `image`，以及特殊类型 `int or string` 的 `memory`。`status` 对象包含一个类型为 `string`
    的属性 `state`。


    请注意，你通过在 `subresources` 对象中添加 `status` 条目启用了 `status` 子资源。你为此 CRD 定义了三个附加打印列：`image`、`memory`
    和 `age`。`image` 和 `memory` 的 JSON 路径指向模式中定义的字段，而 `age` 的 JSON 路径指向标准 `metadata`
    字段中的一个字段。


    再次将 CRD 应用到集群后，你可以使用这些字段定义一个新资源，将资源定义应用到集群，并使用 `kubectl` 获取资源列表：


    - ❶ CRD 更新了新的模式和附加打印列

    - ❷ 为 `image` 字段提供了一个值

    - ❸ 为 `memory` 字段提供了一个值；这是一个字符串

    - ❹ 自定义资源已更新，包含了定义的新字段

    - ❺ `kubectl get` 的输出现在显示了附加列


    ```

    $ kubectl apply -f myresource.yaml

    customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com
    configured                              ❶

    $ cat > myres1.yaml <<EOF

    apiVersion: mygroup.example.com/v1alpha1

    kind: MyResource

    metadata:

    name: myres1

    spec:

    image: nginx                              ❷

    memory: 1024Mi                            ❸

    EOF

    $ kubectl apply -f myres1.yaml              ❹

    myresource.mygroup.example.com/myres1 configured

    $ kubectl get myresources

    NAME     IMAGE   MEMORY   AGE

    myres1   nginx   1024Mi   12m               ❺

    ```


    ## 结论


    在本章中，你了解了通过在集群中创建 `CustomResourceDefinition` (CRD) 资源可以扩展 Kubernetes API 提供的资源列表。你了解了此
    CRD 资源在 Go 中的结构，以及如何使用专用的 `Clientset` 操作 CRD 资源。


    随后，你了解了如何用 YAML 编写 CRD 以及如何使用 `kubectl` 将其部署到集群。然后向 CRD 模式中添加了一些字段，以及一些附加打印列，以便在
    `kubectl get` 的输出中显示这些字段。


    最后，你了解到只要在集群中创建了 CRD，就可以开始操作新关联 kind 的资源。


