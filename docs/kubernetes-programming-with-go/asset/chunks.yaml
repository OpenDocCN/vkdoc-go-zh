  trans: '

    ### 监听资源


    Kubernetes API 允许你*监听*资源。这意味着你的请求不会立即终止，而是成为一个长时间运行的请求，它会发送一个 JSON 流作为响应，并在监听到的资源发生变化时向该流中添加
    JSON 对象。JSON 流是由换行符分隔的一系列 JSON 对象，例如：


    ```

    { "type": "ADDED", "object": ... }

    { "type": "DELETED", "object": ... }

    ```


    用于监听资源的请求与列出资源的请求类似，只是添加了一个 `watch` 参数作为 `query` 参数。例如，要监听 `project1` 命名空间的 Pod，你可以发送以下请求：


    ```

    $ curl "$HOST/api/v1/namespaces/project1/pods?watch=true"

    ```


    流的每个 JSON 对象在 Kubernetes 术语中被称为一个*Watch Event*，它包含两个字段：`type` 和 `object`。`type`
    的值可以是 `ADDED`、`MODIFIED`、`DELETED`、`BOOKMARK` 或 `ERROR`。每种类型对应的对象描述如表 2-2 所示。


    表 2-2


    每种 Watch Event 类型的对象描述


    | 类型值 | 对象描述 |

    | --- | --- |

    | `ADDEDMODIFIED` | 资源的新状态，使用其种类（例如 `Pod`）。 |

    | `DELETED` | 资源被删除前的状态，使用其种类（例如 `Pod`）。 |

    | `BOOKMARK` | 资源版本，使用其种类（例如 `Pod`），仅设置 `resourceVersion` 字段。本章稍后将说明此类型的使用场景。
    |

    | `ERROR` | 描述错误的对象。 |


    执行此请求后，你会立即收到一系列 `ADDED` 类型的 JSON 对象，描述请求时集群中存在的所有资源；随后，当集群中的资源被创建、修改或删除时，会收到其他事件。这相当于运行
    `kubectl` 命令，区别在于不会给出 `type` 字段，而是直接给出对象内容：


    ```

    $ kubectl get pods --namespace project1 --watch -o json

    ```


    ### 在监听会话期间进行过滤


    通过使用标签选择器或字段选择器，可以过滤 *监听* 请求返回的结果，使用与前面 过滤列表结果 一节中讨论的相同的 `labelSelectors` 和 `fieldSelectors`。


    ### 列出资源后进行监听


    你可以先运行一个 *列表* 请求以获取当前存在的资源列表，然后再运行一个 *监听* 请求来获取这些资源的修改，而不是在 *监听* 响应中获取请求时存在的资源。这样做存在一个风险：在
    *列表* 请求和 *监听* 请求开始之间可能会发生一些修改，而你可能不会收到关于这些修改的通知。


    针对这种情况，你可以使用 *列表* 请求返回的 `resourceVersion` 值来指定要从哪个时间点开始你的 *监听* 请求。（注意：你需要从 *List*
    结构中获取 `resourceVersion`，而不是从某个条目中获取）。


    例如，你可以先使用以下命令获取 Pod 列表：


    ```

    $ curl $HOST/api/v1/pods

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2433789"

    },

    "items": [ ... ]

    }

    ```


    作为对这个首次请求的响应，你会得到一个 `resourceVersion` 和请求时 `items` 字段中存在的资源列表。然后，你可以通过指定这个 `resourceVersion`
    来执行 *监听* 请求：


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2433789"

    ```


    结果，你不会立即在响应体中收到描述集群中现有资源的数据；只有当某些资源被修改、添加或删除时，你才会收到数据。


    ### 重启 *监听* 请求


    *监听* 请求可能会中断，你可能希望从处理过程中收到的最后一次修改（或之前的某次修改）处重新开始。


    为此，*监听* 响应中 `DELETE`、`ADDED` 或 `MODIFIED` 类型的 JSON 对象所包含的每个资源都带有一个 `resourceVersion`，你可以使用它来执行一个新的
    *监听* 请求，从指定修改之后开始。例如，你可以启动一个在几次修改后中断的 *监听* 请求：


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true"

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2435623", ...}, ...}}

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2354893", ...}, ...}}

    {"type":"MODIFIED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436655", ...}, ...}}

    {"type":"DELETED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436677", ...}, ...}}

    ```


    然后，你可以从之前请求中的任意时间点开始，或在最新修改之后开始，来重启 *监听* 请求：


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2436677"

    ```


    或者从之前的某次修改之后开始。这样，你会再次收到最新的修改：


    ```

    $ curl "$HOST/api/v1/namespaces/default/pods?watch=true&resourceVersion=2436655"

    {"type":"DELETED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2436677", ...}, ...}}

    ```'
- fmt: '### Allowing Bookmarks to Efficiently Restart a `watch` Request


    As a previous section has shown, it is possible to execute a `watch` session on
    a subset of resources by using label or field selectors. For example, this request
    will watch pods with a specific label, `mylabel`, being equal to `foo`:


    ```

    $ curl "$HOST/api/v1/namespaces/project1/pods?labelSelector=mylabel==foo&watch=true"

    ```


    With this request, you will get events for pods matching your selectors only,
    not for other pods of the same namespace that do not match your request.


    When restarting a `watch` request, you will be able to use the `resourceVersion`
    of a pod that matches the selectors; however, lots of events on other pods could
    have happened after this one. The API server will have to execute the filtering
    of all pods’ events that have been created in the meantime at the point where
    you restart the `watch` on this *old* `resourceVersion`.


    Likewise, because the API server is caching these events for a limited time, there
    is more risk that the old `resourceVersion` is no longer available, compared to
    the most recent.


    For this, you can use the `allowWatchBookmarks` parameter to ask the API server
    to send `BOOKMARK` events regularly that contain the latest `resourceVersion`;
    these may be resource versions that are separate from your selection.


    The `BOOKMARK` event may contain an object of the kind of your request (e.g.,
    a Pod kind if you are watching for pods), but that includes only the `resourceVersion`
    field.


    ```

    {"type":"BOOKMARK",

    "object":{

    "kind":"Pod",

    "apiVersion":"v1",

    "metadata":{

    "resourceVersion":"2525115",

    "creationTimestamp":null

    },

    "spec":{

    "containers":null

    },

    "status":{}

    }

    }

    ```


    To illustrate, here is a little experiment. First create two (2) pods and watch
    pods with a selector that will only match the first one. You will get an `ADDED`
    event for the matching pod, and, after a while, you should get a `BOOKMARK` event
    (but it is not guaranteed). If, in the meantime, there was no activity on the
    pods of the namespace, the `resourceVersion` should be the same.


    ```

    $ kubectl run nginx1 --image nginx --labels mylabel=foo

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    $ curl "$HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo&watch=true&allowWatchBookmarks=true"

    {"type":"ADDED","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "name":"nginx1","resourceVersion":"2520070", ...}, ...}}

    {"type":"BOOKMARK","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2520070", ...}, ...}}

    ```


    From another terminal, let’s delete the nonmatching pod, `nginx2`, with the command:


    ```

    $ kubectl delete pods nginx2

    ```


    You should not receive any event for this change because the pod does not match
    the request selector, but after a while, you should receive a new `BOOKMARK` event—this
    time with a new `resourceVersion`:


    ```

    {"type":"BOOKMARK","object":{

    "kind":"Pod","apiVersion":"v1","metadata":{

    "resourceVersion":"2532566", ...}, ...}}

    ```


    At this point, you can stop the `watch` request from your first terminal.


    Next, you can make some modifications on the pods of the namespace—for example,
    by deleting the `nginx1` pod and recreating the `nginx2` pod:


    ```

    $ kubectl delete pods nginx1

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    ```


    Now, you can restart the `watch` request using the `resourceVersion`, `2532566`,
    to restart the request when it has stopped:


    ```

    curl "$HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo&watch=true&allowWatchBookmarks=true&resourceVersion=2532566"

    ```


    As a result, you can see that you are getting events for the modifications and
    deletion of `nginx1` sent when you deleted this pod. You have not lost any event,
    and you have used a most recent `resourceVersion`, which is more efficient for
    the API Server.


    ### Paginating Results


    When you execute a `list` request, it is possible that the result will contain
    many elements. In this case, it is preferable to paginate the result by making
    several requests, and each response will send a limited number of elements.


    For this case, the `limit` and `continue` query parameters are used. The first
    `list` request needs to specify the `limit` parameter to indicate the maximum
    number of elements to return. The response will contain a `continue` field in
    the metadata of the `List` structure that contains an opaque token to use in the
    next request to obtain the next chunk of elements.


    ```

    $ curl "$HOST/api/v1/pods?limit=1"

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2931316",

    "continue": "xxx",

    "remainingItemCount": 10

    },

    "items": [{ ... }]

    }

    $ curl "$HOST/api/v1/pods?limit=1&continue=xxx"

    {

    "kind": "PodList",

    "apiVersion": "v1",

    "metadata": {

    "resourceVersion": "2931316",

    "continue": "yyy",

    "remainingItemCount": 9

    },

    "items": [{ ... }]

    }

    ```


    Note that you do not need to use the same `limit` value for each chunk. You could
    make the first request with a limit of `1`, the second one with a limit of `4`,
    and the third one with a limit of `6`.


    #### Consistency of the Full List


    Note that the `resourceVersion` in the `List` structures in both responses are
    the same (i.e., `"resourceVersion": "2931316"` in the example). When you run the
    first request, the full response is cached on the server, and you are guaranteed
    to get a consistent result for the next chunks, independent of the time you get
    to make the following requests, as well as the modifications made on the resources
    in the meantime. The resources created, modified, or deleted in the period in-between
    will not affect the results of the next chunks.


    Nevertheless, it is possible that the cache will expire before you can run all
    the requests. In this case, you will receive an error response with a code `410`
    and a new `continue` value. Thus, you have two choices:


    1.  Start a new `List` request without the `continue` parameter to restart the
    complete list session from the beginning.


    2.  Make a new request with the returned `continue` value, but in an inconsistent
    way—that is, the resources added, modified, or deleted since the time the first
    chunk was returned will influence the responses.


    #### Detecting the Last Chunk


    You can see from the metadata of the response that the `remainingItemCount` indicates
    the number of elements remaining to complete the full response. Note, however,
    that this information is available only for requests without selectors (either
    *labels* or *fields* selectors).


    When running a paginated `List` request without selectors, the server can know
    the number of elements in the full list and is able to indicate the number of
    remaining elements after each request. The server also is able to indicate, when
    sending the last elements of the full list, that this is the last chunk, by replying
    with an empty `continue` field in the metadata of the `List` structure.


    When running a paginated `List` request with selectors, the server is unable to
    know in advance the number of elements in the full list. For this reason, it does
    not send the number of remaining elements after a request, and it sends a `continue`
    nonempty value even if it happens that the next chunk is empty.


    You will need to check whether the returned list is empty or contains less elements
    than requested in the `limit` field so that you can detect the last chunk.


    ## Getting Results in Various Formats


    The Kubernetes API can return the data in various formats. You can ask which format
    you wish to receive by specifying the `Accept` header in the HTTP request.'
