  trans: '

    ### 使用标签选择器


    所有 Kubernetes 资源都可以定义标签。例如，在创建 Pod 时，你可以通过 `kubectl` 定义一些标签：


    ```

    $ kubectl run nginx1 --image nginx --labels mylabel=foo

    $ kubectl run nginx2 --image nginx --labels mylabel=bar

    ```


    这会产生在资源元数据部分定义了标签的 Pod：


    ```

    $ kubectl get pods nginx1 -o yaml

    apiVersion: v1

    kind: Pod

    metadata:

    labels:

    mylabel: foo

    name: nginx1

    [...]

    $ kubectl get pods nginx2 -o yaml

    apiVersion: v1

    kind: Pod

    metadata:

    labels:

    mylabel: bar

    name: nginx2

    [...]

    ```


    现在，当执行 *列表* 请求时，你可以通过 `labelSelector` 查询参数定义一些 *标签选择器* 来过滤这些资源，该参数可以包含一个逗号分隔的选择器列表。


    -   选择所有定义了特定标签的资源，无论其值如何；例如，`mylabel` 标签：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel

    ```


    -   选择所有未定义特定标签的资源；例如，`mylabel` 标签：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=\!mylabel

    ```


    注意标签名称前的感叹号 (`!`)——这里使用了反斜杠字符 (`\`)，因为感叹号是 shell 的特殊字符。


    -   选择所有定义了标签并具有特定值的资源；例如，`mylabel` 的值为 `foo`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel==foo

    ```


    或


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel=foo

    ```


    -   选择所有定义了标签但值不同于某个特定值的资源；例如，标签 `mylabel` 的值不等于 `foo`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel\!=foo

    ```


    注意等号 (`=`) 之前的感叹号 (`!`)——这里使用了反斜杠字符 (`\`)，因为感叹号是 shell 的特殊字符。


    -   选择所有定义了标签且其值属于某个值集合的资源；例如，标签 `mylabel` 的值为 `foo` 或 `baz`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel+in+(foo,baz)

    ```


    注意 URL 中用于编码空格的加号 (`+`)。原始选择器为：`mylabel in (foo,baz)`。


    -   选择所有定义了标签且其值不属于某个值集合的资源；例如，标签 `mylabel` 的值不是 `foo` 或 `baz`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel+notin+(foo,baz)

    ```


    注意 URL 中用于编码空格的加号 (`+`)。原始选择器为：`mylabel not in (foo,baz)`。


    你可以通过逗号分隔多个选择器来组合它们。这将充当 *AND* 运算符。例如，要选择所有定义了 `mylabel` 标签 *并且* `otherlabel`
    标签等于 `bar` 的资源，你可以使用以下标签选择器：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?labelSelector=mylabel,otherlabel==bar

    ```


    ### 使用字段选择器


    你可以使用一组有限的字段来过滤资源。对于所有资源，你可以按 `metadata.name` 字段过滤；对于所有命名空间资源，你可以按 `metadata.namespace`
    字段过滤。


    以下是 Kubernetes 1.23 中可用于过滤的额外字段列表，具体取决于资源：


    `core.event:`

    - `involvedObject.apiVersion`

    - `involvedObject.fieldPath`

    - `involvedObject.kind`

    - `involvedObject.name`

    - `involvedObject.namespace`

    - `involvedObject.resourceVersion`

    - `involvedObject.uid`

    - `reason`

    - `reportingComponent`

    - `source`

    - `type`


    `core.namespace:`

    - `status.phase`


    `core.node:`

    - `spec.unschedulable`


    `core.pod:`

    - `spec.nodeName`

    - `spec.restartPolicy`

    - `spec.schedulerName`

    - `spec.serviceAccountName`

    - `status.nominatedNodeName`

    - `status.phase`

    - `status.podIP`


    `core.replicationcontroller:`

    - `status.replicas`


    `core.secret:`

    - `type`


    `apps.replicaset:`

    - `status.replicas`


    `batch.job:`

    - `status.successful`


    `certificates.certificatesigningrequest:`

    - `spec.signerName`


    现在，当执行 *列表* 请求时，你可以通过 `fieldSelector` 参数指示一些 *字段选择器* 来过滤这些资源，该参数可以包含一个逗号分隔的选择器列表。


    -   选择所有某个字段具有特定值的资源；例如，字段 `status.phase` 的值为 `Running`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase==Running

    ```


    或


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase=Running

    ```


    -   选择所有某个字段的值不同于某个特定值的资源；例如，字段 `status.phase` 的值不是 `Running`：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase\!=Running

    ```


    注意等号 (`=`) 之前的感叹号 (`!`)——这里使用了反斜杠字符 (`\`)，因为感叹号是 shell 的特殊字符。


    你可以通过逗号分隔多个选择器来组合它们。这将充当 *AND* 运算符。例如，要选择所有 *phase* 等于 `Running` 并且 *重启策略* 不是
    `Always` 的 Pod，你可以使用这个字段选择器：


    ```

    $ curl $HOST/api/v1/namespaces/default/pods?fieldSelector=status.phase==Running,spec.restartPolicy\!=Always

    ```


    ### 删除资源


    要删除一个资源，你需要在路径中指定其名称（以及命名空间资源的命名空间），并使用 `DELETE` 请求。例如，要删除一个 Pod，使用以下命令：


    ```

    $ curl -X DELETE $HOST/api/v1/namespaces/project1/pods/nginx

    ```


    这将返回已删除资源的 JSON 格式信息，并使用与该资源关联的 kind——在本例中，是 `Pod` kind。


    这等同于运行 `kubectl` 命令（不同之处在于你无法获取已删除资源的信息，只能通过 `-o name` 标志获取其名称）：


    ```

    $ kubectl delete pods --namespace project1 nginx

    ```


    ### 删除资源集合


    也可以使用 `DELETE` 请求删除特定命名空间中给定资源的一个集合；对于命名空间资源，需要在路径中指明命名空间：


    ```

    $ curl -X DELETE $HOST/api/v1/namespaces/project1/pods

    ```


    这将返回已删除资源的 JSON 格式信息，并使用与该资源关联的 List kind；在这个例子中，是 `PodList` kind。


    这等同于运行 `kubectl` 命令（不同之处在于你无法获取已删除资源的信息，只能通过 `-o name` 标志获取其名称）：


    ```

    $ kubectl delete pods --namespace project1 --all

    ```


    请注意，无法像使用 `kubectl` 命令那样，通过单个请求删除所有命名空间中某一种特定 kind 的所有资源：`kubectl delete pods
    --all-namespaces --all`。

    '
- fmt: '### Updating a Resource


    It is possible to replace the complete information about a specific resource by
    using a `PUT` request and specifying the name (and namespace for namespaced resources)
    in the path and the new resource information in the body of the request.


    To illustrate, you can first define a new deployment, with the following command:


    ```

    $ cat > deploy.yaml <<EOF

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    ```


    Then, you can create this deployment in the cluster using the following:


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy.yaml

    ```


    Next, you can create an updated manifest for the deployment; for example, by updating
    the image of the container with the following command (this will replace the image
    name `nginx` with `nginx:latest`):


    ```

    $ cat deploy.yaml | sed ''s/image: nginx/image: nginx:latest/'' > deploy2.yaml

    ```


    Finally, you can use the following request to update the deployment into the cluster:


    ```

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    ```


    This is equivalent to running the `kubectl` command:


    ```

    $ kubectl replace --namespace project1 -f deploy2.yaml -o json

    ```


    ### Managing Conflicts When Updating a Resource


    When updating a resource with the previous technique, if another participant makes
    a modification on the resource between the time you create it and the time you
    update it, then the modifications made by the other participant will be lost when
    you update the resource.


    To avoid this risk of conflict, you can first read the resource information (using
    a `GET` request) to find the value of the `resourceVersion` field in the metadata
    of the resource, then indicate this `resourceVersion` in the specifications of
    the resource you want to update.


    By sending the `PUT` request with this `resourceVersion`, the API server will
    compare the `resourceVersion` values of the received resource and the current
    one. If the values differ (because another participant has modified the resource
    in the meantime), the API server will reply with an error: `Operation cannot be
    fulfilled on [...]: the object has been modified; please apply your changes to
    the latest version and try again`.


    To illustrate, let’s create the deployment (be sure to delete it before doing
    this if you have created it from the previous section):


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy.yaml

    ```


    You will receive a response, indicating the `resourceVersion` of the resource
    you have created; in this example, it is `668867`:


    ```

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "668867",

    "generation": 1,

    [...]

    }

    ```


    After waiting a few seconds, you can execute a `GET` request to find the latest
    version, and you will receive the following response:


    ```

    $ curl $HOST/apis/apps/v1/namespaces/project1/deployments/nginx

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "668908",

    "generation": 1,

    [...]

    }

    ```


    You can see that the `resourceVersion` has been incremented and is now `668908`.
    This happens because the Deployment controller has updated the resource on its
    own.


    Now, if you add the first received version to your YAML manifest and try to update
    the deployment, you get an error indicating that a conflict has been detected:


    ```

    $ cat > deploy2.yaml <<EOF

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    resourceVersion: "668867"

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    {

    "kind": "Status",

    "apiVersion": "v1",

    "metadata": {

    },

    "status": "Failure",

    "message": "Operation cannot be fulfilled on deployments.apps \"nginx\": the object
    has been modified; please apply your changes to the latest version and try again",

    "reason": "Conflict",

    "details": {

    "name": "nginx",

    "group": "apps",

    "kind": "deployments"

    },

    "code": 409

    }

    ```


    Now, if you update the YAML manifest with the latest `resourceVersion` by using
    the following command and running the `PUT` command again, the operation will
    succeed:


    ```

    $ sed -i ''s/668867/668908/'' deploy2.yaml

    $ curl -X PUT $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/yaml" \

    --data-binary @deploy2.yaml

    {

    "kind": "Deployment",

    "apiVersion": "apps/v1",

    "metadata": {

    "name": "nginx",

    "namespace": "project1",

    "uid": "99d3a1eb-176c-40de-89ec-74313169fe60",

    "resourceVersion": "671623",

    "generation": 2,

    [...]

    }

    ```


    ### Using a Strategic Merge Patch to Update a Resource


    When modifying a resource, instead of sending the complete description of it,
    it is possible to send only the parts that you want to modify by using a *Patch*.


    This is possible using a `PATCH` request with an `application/strategic-merge-patch+json`
    content-type and specifying the name (and namespace for namespaced resources)
    in the path and the patch information in the body of the request.


    A patch information is an extract of a YAML manifest, which contains only the
    fields that you want to update. Doing this, the fields you specified in the path
    will be updated, and the fields not specified in the patch will remain untouched.


    To illustrate, you can first create a file containing the patch information using
    the following:


    ```

    $ cat > deploy-patch.json <<EOF

    {

    "spec":{

    "template":{

    "spec":{

    "containers":[{

    "name":"nginx",

    "image":"nginx:alpine"

    }]

    }}}}

    EOF

    ```


    Then, you can apply this patch to the resource with the following request:


    Note the specific `Content-Type` header to use—`application/strategic-merge-patch+json`.


    ```

    $ curl -X PATCH $HOST/apis/apps/v1/namespaces/project1/deployments/nginx \

    -H "Content-Type: application/strategic-merge-patch+json" \

    --data-binary @deploy-patch.json

    ```


    This is equivalent to running the `kubectl` command:


    ```

    $ kubectl patch deployment nginx --namespace project1 \

    --patch-file deploy-patch.json \

    --type=strategic \

    -o json

    ```


    When a field is a single value (either a simple value like a string, or an object
    with several fields), the value of the patch replaces the existing value.


    Note that if a field is not present in the patch, the original value will not
    be deleted but will remain untouched. You can specify a value of `null` for a
    field to delete it from the result.'
