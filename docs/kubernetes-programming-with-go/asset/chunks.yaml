    \nIf you want to get the result in the `v1alpha1` format, you can specify it when\
    \ invoking `kubectl get`:\n\n```shell\n$ kubectl get myresources.v1alpha1.mygroup.myid.dev\
    \ -o yaml\n```\n\nThis command will return the resources using the `Memory` field.\n\
    \n## Conclusion\n\nThis chapter has used the Kubebuilder SDK to help write and\
    \ deploy Operators more easily than if you had to write the code and the Kubernetes\
    \ manifests yourselves.\n\nNote that the Operator SDK^([⁶](#fn6)) is another framework\
    \ to build operators. Operator SDK can manage Go, Helm, and Ansible projects.\
    \ For the Go projects, Operator SDK makes use of `kubebuilder` to generate the\
    \ code and the Kubernetes manifests.\n\nOperator SDK provides more functionalities\
    \ on top of `kubebuilder` to integrate the built operator with the Operator Lifecycle\
    \ Manager^([⁷](#fn7)) and Operator Hub.^([⁸](#fn8))\n\nAs these extra functionalities\
    \ are out of the scope of this book, Operator SDK will not be covered here. But\
    \ you can run through this chapter again by replacing the command `kubebuilder`\
    \ with `operator-sdk` to build your Operator with this framework instead."
  raw: '### Implementing Hub and Convertible


    A *Conversion* system is provided by the **controller-runtime** Library. This
    system relies on two interfaces:


    *   The **Hub** interface to mark the version used for the storage


    *   The **Convertible** interface to provide converters to and from the storage
    version


    ```

    type Hub interface {

    runtime.Object

    Hub()

    }

    type Convertible interface {

    runtime.Object

    ConvertTo(dst Hub) error

    ConvertFrom(src Hub) error

    }

    ```


    You have chosen the version **v1alpha1** for the storage and need to make **v1alpha1.MyResource**
    implement the **Hub** interface:


    ```

    package v1alpha1

    // Hub marks this type as a conversion hub.

    func (*MyResource) Hub() {}

    ```


    All other types, in this case, the **v1beta1.MyResource** must implement the **Convertible**
    interface and provide code to convert to and from the **Hub** version:


    ```

    package v1beta1

    import (

    "github.com/myid/myresource/api/v1alpha1"

    "sigs.k8s.io/controller-runtime/pkg/conversion"

    )

    func (src *MyResource) ConvertTo(

    dstRaw conversion.Hub,

    ) error {

    dst := dstRaw.(*v1alpha1.MyResource)

    dst.Spec.Memory = src.Spec.MemoryRequest

    // Copy other fields

    dst.ObjectMeta = src.ObjectMeta

    dst.Spec.Image = src.Spec.Image

    dst.Status.State = src.Status.State

    return nil

    }

    func (dst *MyResource) ConvertFrom(

    srcRaw conversion.Hub,

    ) error {

    src := srcRaw.(*v1alpha1.MyResource)

    dst.Spec.MemoryRequest = src.Spec.Memory

    // Copy other fields

    dst.ObjectMeta = src.ObjectMeta

    dst.Spec.Image = src.Spec.Image

    dst.Status.State = src.Status.State

    return nil

    }

    ```


    ### Setting Up the webhook


    The **kubebuilder create** **webhook** command is used to set up webhooks. Several
    webhook types are supported:


    *   *Conversion Webhook* to help convert between resource versions (flag **--conversion**)


    *   *Mutating Admission Webhook* to help set default values on new objects (flag
    **--defaulting**)


    *   *Validating Admission Webhook* to help validate the created or updated objects
    (flag **--programmatic-validation**)


    In this example, you will create a **Conversion** webhook for **MyResource** in
    version **v1beta1** (the version that needs to be converted):


    ```

    $ kubebuilder create webhook

    --group mygroup

    --version v1beta1

    --kind MyResource

    --conversion

    ```


    This will add code to the **main** function to set up the Conversion webhook:


    ```

    (&mygroupv1beta1.MyResource{}).

    SetupWebhookWithManager(mgr)

    ```


    Then, create new code in the **v1beta1** package, to be called from **main**:


    ```

    package v1beta1

    func (r *MyResource) SetupWebhookWithManager(

    mgr ctrl.Manager,

    ) error {

    return ctrl.NewWebhookManagedBy(mgr).

    For(r).

    Complete()

    }

    ```


    ### Updating kustomization Files


    You need to enable the **webhook** in the deployment manifests by uncommenting
    sections related to **[WEBHOOK]** and **[CERTMANAGER]** in the files **config/default/kustomization.yaml**
    and **config/crd/kustomization.yaml**.


    If you are not using any other webhooks (i.e., conversion or mutating), you also
    will need to comment on the lines:


    *   “- manifests.yaml” in the file config/webhook/kustomization.yaml


    *   “- webhookcainjection_patch.yaml” in the file **config/default/kustomization.yaml**


    You also will need to install cert-manager^([⁵](#fn5)) to generate certificates
    based on annotations added by **kubebuilder** to the CRD.


    ### Using Various Versions


    After deploying the new version, as described in the “Deploying the Operator on
    the Cluster” section, you can create MyResource instances in version **v1alpha1**
    or **v1beta1**. As an example, you can create two sample resources in the **config/sample**
    directory:


    *   **config/samples/mygroup_v1alpha1_myresource.yaml**:


    *   **config/samples/mygroup_v1beta1_myresource.yaml**:


    ```

    apiVersion: mygroup.myid.dev/v1alpha1

    kind: MyResource

    metadata:

    name: myresource-sample-alpha

    spec:

    image: nginx

    memory: 512Mi

    ```


    ```

    apiVersion: mygroup.myid.dev/v1beta1

    kind: MyResource

    metadata:

    name: myresource-sample-beta

    spec:

    image: nginx

    memoryRequest: 256Mi

    ```


    Then, you can create the resources in the cluster using **kubectl**:


    ```

    $ kubectl apply

    -f config/samples/mygroup_v1alpha1_myresource.yaml

    $ kubectl apply

    -f config/samples/mygroup_v1beta1_myresource.yaml

    ```


    Finally, when listing the resources, you will get the definition in the **v1beta1**
    format, using the **memoryRequest** field:


    ```

    $ kubectl get myresources.mygroup.myid.dev -o yaml

    apiVersion: v1

    kind: List

    items:

    - apiVersion: mygroup.myid.dev/v1beta1

    kind: MyResource

    metadata:

    name: myresource-sample-alpha

    spec:

    image: nginx

    memoryRequest: 512Mi

    status:

    state: Ready

    - apiVersion: mygroup.myid.dev/v1beta1

    kind: MyResource

    metadata:

    name: myresource-sample-beta

    spec:

    image: nginx

    memoryRequest: 256Mi

    status:

    state: Ready

    ```


    Note that you get the definition in **v1beta1** because **kubectl** returns you
    to the preferred version (the most recent one) of the requested resource.


    If you want to get the result in the **v1alpha1** format, you can specify it when
    invoking **kubectl get**:


    ```

    $ kubectl get myresources.v1alpha1.mygroup.myid.dev

    -o yaml

    ```


    This command will return the resources using the **Memory** field.


    ## Conclusion


    This chapter has used the Kubebuilder SDK to help write and deploy Operators more
    easily than if you had to write the code and the Kubernetes manifests yourselves.


    Note that the Operator SDK^([⁶](#fn6)) is another framework to build operators.
    Operator SDK can manage Go, Helm, and Ansible projects. For the Go projects, Operator
    SDK makes use of **kubebuilder** to generate the code and the Kubernetes manifests.


    Operator SDK provides more functionalities on top of **kubebuilder** to integrate
    the built operator with the Operator Lifecycle Manager^([⁷](#fn7)) and Operator
    Hub.^([⁸](#fn8))


    As these extra functionalities are out of the scope of this book, Operator SDK
    will not be covered here. But you can run through this chapter again by replacing
    the command **kubebuilder** with **operator-sdk** to build your Operator with
    this framework instead.'
  trans: "\n### 实现 Hub 和 Convertible\n\n`controller-runtime` 库提供了一个*转换*系统。该系统依赖两个接口：\n\
    \n- `Hub` 接口：标记用于存储的版本\n- `Convertible` 接口：提供与存储版本之间的转换器\n\n```go\ntype Hub interface\
    \ {\n    runtime.Object\n    Hub()\n}\ntype Convertible interface {\n    runtime.Object\n\
    \    ConvertTo(dst Hub) error\n    ConvertFrom(src Hub) error\n}\n```\n\n你已选择\
    \ `v1alpha1` 版本作为存储版本，需要让 `v1alpha1.MyResource` 实现 `Hub` 接口：\n\n```go\npackage\
    \ v1alpha1\n// Hub 将此类型标记为转换中心。\nfunc (*MyResource) Hub() {}\n```\n\n所有其他类型，在本例中即\
    \ `v1beta1.MyResource`，必须实现 `Convertible` 接口，并提供与 `Hub` 版本进行相互转换的代码：\n\n```go\n\
    package v1beta1\nimport (\n    \"github.com/myid/myresource/api/v1alpha1\"\n \
    \   \"sigs.k8s.io/controller-runtime/pkg/conversion\"\n)\nfunc (src *MyResource)\
    \ ConvertTo(dstRaw conversion.Hub) error {\n    dst := dstRaw.(*v1alpha1.MyResource)\n\
    \    dst.Spec.Memory = src.Spec.MemoryRequest\n    // 复制其他字段\n    dst.ObjectMeta\
    \ = src.ObjectMeta\n    dst.Spec.Image = src.Spec.Image\n    dst.Status.State\
    \ = src.Status.State\n    return nil\n}\nfunc (dst *MyResource) ConvertFrom(srcRaw\
    \ conversion.Hub) error {\n    src := srcRaw.(*v1alpha1.MyResource)\n    dst.Spec.MemoryRequest\
    \ = src.Spec.Memory\n    // 复制其他字段\n    dst.ObjectMeta = src.ObjectMeta\n    dst.Spec.Image\
    \ = src.Spec.Image\n    dst.Status.State = src.Status.State\n    return nil\n\
    }\n```\n\n### 设置 Webhook\n\n`kubebuilder create webhook` 命令用于设置 webhook。支持以下几种\
    \ webhook 类型：\n\n- *转换 Webhook*：用于帮助在资源版本之间进行转换（标志 `--conversion`）\n- *变更准入 Webhook*：用于帮助在新对象上设置默认值（标志\
    \ `--defaulting`）\n- *验证准入 Webhook*：用于帮助验证已创建或更新的对象（标志 `--programmatic-validation`）\n\
    \n在此示例中，你将为一个版本为 `v1beta1`（需要被转换的版本）的 `MyResource` 创建一个*转换* webhook：\n\n```shell\n\
    $ kubebuilder create webhook --group mygroup --version v1beta1 --kind MyResource\
    \ --conversion\n```\n\n这将在 `main` 函数中添加代码来设置转换 webhook：\n\n```go\n(&mygroupv1beta1.MyResource{}).SetupWebhookWithManager(mgr)\n\
    ```\n\n然后，在 `v1beta1` 包中创建新代码，供 `main` 调用：\n\n```go\npackage v1beta1\nfunc (r\
    \ *MyResource) SetupWebhookWithManager(mgr ctrl.Manager) error {\n    return ctrl.NewWebhookManagedBy(mgr).For(r).Complete()\n\
    }\n```\n\n### 更新 Kustomization 文件\n\n你需要在部署清单中启用 `webhook`，方法是取消 `config/default/kustomization.yaml`\
    \ 和 `config/crd/kustomization.yaml` 文件中与 `[WEBHOOK]` 和 `[CERTMANAGER]` 相关部分的注释。\n\
    \n如果你没有使用任何其他 webhook（即转换或变更），你还需要注释掉以下行：\n\n- 文件 `config/webhook/kustomization.yaml`\
    \ 中的 `- manifests.yaml`\n- 文件 `config/default/kustomization.yaml` 中的 `- webhookcainjection_patch.yaml`\n\
    \n你还需要安装 cert-manager^(⁵)，以基于 `kubebuilder` 添加到 CRD 的注解生成证书。\n\n### 使用不同版本\n\n\
    按照“在集群上部署 Operator”一节所述部署新版本后，你可以创建版本为 `v1alpha1` 或 `v1beta1` 的 `MyResource` 实例。例如，你可以在\
    \ `config/sample` 目录中创建两个示例资源：\n\n- `config/samples/mygroup_v1alpha1_myresource.yaml`：\n\
    \n```yaml\napiVersion: mygroup.myid.dev/v1alpha1\nkind: MyResource\nmetadata:\n\
    \  name: myresource-sample-alpha\nspec:\n  image: nginx\n  memory: 512Mi\n```\n\
    \n- `config/samples/mygroup_v1beta1_myresource.yaml`：\n\n```yaml\napiVersion:\
    \ mygroup.myid.dev/v1beta1\nkind: MyResource\nmetadata:\n  name: myresource-sample-beta\n\
    spec:\n  image: nginx\n  memoryRequest: 256Mi\n```\n\n然后，你可以使用 `kubectl` 在集群中创建资源：\n\
    \n```shell\n$ kubectl apply -f config/samples/mygroup_v1alpha1_myresource.yaml\n\
    $ kubectl apply -f config/samples/mygroup_v1beta1_myresource.yaml\n```\n\n最后，当你列出资源时，将获得\
    \ `v1beta1` 格式的定义，其中包含 `memoryRequest` 字段：\n\n```yaml\n$ kubectl get myresources.mygroup.myid.dev\
    \ -o yaml\napiVersion: v1\nkind: List\nitems:\n- apiVersion: mygroup.myid.dev/v1beta1\n\
    \  kind: MyResource\n  metadata:\n    name: myresource-sample-alpha\n  spec:\n\
    \    image: nginx\n    memoryRequest: 512Mi\n  status:\n    state: Ready\n- apiVersion:\
    \ mygroup.myid.dev/v1beta1\n  kind: MyResource\n  metadata:\n    name: myresource-sample-beta\n\
    \  spec:\n    image: nginx\n    memoryRequest: 256Mi\n  status:\n    state: Ready\n\
    ```\n\n请注意，你得到的是 `v1beta1` 定义，因为 `kubectl` 会返回请求资源的首选版本（最新版本）。\n\n如果你想以 `v1alpha1`\
    \ 格式获取结果，可以在调用 `kubectl get` 时指定：\n\n```shell\n$ kubectl get myresources.v1alpha1.mygroup.myid.dev\
    \ -o yaml\n```\n\n该命令将返回使用 `Memory` 字段的资源。\n\n## 结论\n\n本章使用 Kubebuilder SDK，帮助你比自行编写代码和\
    \ Kubernetes 清单更轻松地编写和部署 Operator。\n\n请注意，Operator SDK^(⁶) 是构建 Operator 的另一个框架。Operator\
    \ SDK 可以管理 Go、Helm 和 Ansible 项目。对于 Go 项目，Operator SDK 使用 `kubebuilder` 来生成代码和\
    \ Kubernetes 清单。\n\nOperator SDK 在 `kubebuilder` 之上提供了更多功能，用于将构建的 Operator 与 Operator\
    \ Lifecycle Manager^(⁷) 和 Operator Hub^(⁸) 集成。\n\n由于这些额外功能超出了本书的范围，因此此处不涉及 Operator\
    \ SDK。但你可以重新学习本章，将命令 `kubebuilder` 替换为 `operator-sdk`，以使用此框架构建你的 Operator。\n"
