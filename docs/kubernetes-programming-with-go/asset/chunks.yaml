    # Kubernetes 平台概览


    在流程的一端，用户声明用于构建应用部署的高级资源：`Deployments`、`Ingresses` 等。


    在中间，控制器被激活，将这些资源转化为低级资源（`Pods`），而调度器则将这些资源分配到各个节点。在流程的另一端，节点代理负责将低级资源部署到节点上。


    Kubernetes 平台（通常称为控制平面）的主要元素在图 1-1 中高亮显示，并在下文进行描述：


    1.  **API 服务器** – 这是控制平面的核心点；用户及控制平面的各个组件通过此 API 进行创建、获取、删除、更新和监视资源等操作。

    2.  **`etcd` 数据库** – 仅可由 API 服务器访问，用于持久化存储与资源相关的数据。

    3.  **控制器管理器** – 运行各类控制器，将用户声明的高级资源转换为待部署到节点上的低级资源。控制器连接到 API 服务器，监视高级资源，并创建、删除和更新低级资源，以满足高级资源中声明的规范。

    4.  **调度器** – 将低级资源分配到各个节点上。调度器连接到 API 服务器，以监视未分配的资源，并将它们关联到相应节点。

    5.  **Kubelet** – 这是一个运行在集群所有节点上的代理，每个代理管理分配到其所在节点的工作负载。`kubelet` 连接到 API 服务器，以监视分配到其节点上的
    Pods 资源，并使用本地容器运行时部署相关联的容器。

    6.  **Kube proxy** – 这是一个运行在集群所有节点上的代理，每个代理管理分配到其所在节点的网络配置。`kube proxy` 连接到 API
    服务器，以监视 Service 资源，并在其节点上配置相关的网络规则。


    ![](img/533908_1_En_1_Fig1_HTML.png)


    Kubernetes 架构的流程图。控制平面包含一个 API 服务器，它与控制器和调度器双向连接。它在控制平面内与 `etcd` 有一条单独连接，并与节点上的
    Kubelet 和 Kube-proxy 连接。


    **图 1-1** Kubernetes 架构


    ## OpenAPI 规范


    Kubernetes API 是一个 HTTP REST API。Kubernetes 团队以 OpenAPI 格式提供了该 API 的规范，v2 格式位于
    `https://github.com/kubernetes/kubernetes/tree/master/api/openapi-spec`，或在 Kubernetes
    v1.24 中，v3 格式位于 `https://github.com/kubernetes/kubernetes/tree/master/api/openapi-spec/v3`。


    这些规范也可以通过 API 服务器在路径 `/openapi/v2` 和 `/openapi/v3` 上进行访问。


    OpenAPI 规范由多个部分组成，其中主要包括路径列表和定义列表。路径是您请求此 API 时使用的 URL，针对每个路径，规范会给出不同的操作，例如 `get`、`delete`
    或 `post`。然后，对于每个操作，规范会指明请求的参数和体格式，以及可能的响应码和相应的响应体格式。


    请求和响应的参数及体可以是简单类型，或者更常见的是包含数据的结构。定义列表包含了用于构建操作请求和响应参数及体的数据结构。


    图 1-2 是一个用户 API 规范的简化视图。该 API 可以接受两个不同的路径：`/user/{userId}` 和 `/user`。第一个路径 `/user/{userId}`
    可以接受两个操作，分别是 `get` 和 `delete`，用于根据用户 ID 获取特定用户的信息；以及根据用户 ID 删除特定用户的信息。第二个路径 `/user`
    可以接受一个操作 `post`，用于根据提供的信息添加新用户。


    在此 API 中，给出了一个 `User` 结构的定义，描述了用户的信息：其 ID、名字和姓氏。此数据结构用于第一个路径上 `get` 操作的响应体，以及第二个路径上
    `post` 操作的请求体中。


    ![](img/533908_1_En_1_Fig2_HTML.png)


    一段伪代码。子标题路径包括 get、delete 和 post 操作。第二个子标题定义指示了用户 ID、名字和姓氏。


    **图 1-2** 简化的用户 API 规范


    ## 动词与种类


    Kubernetes API 在此规范的基础上增加了两个概念：**Kubernetes API 动词** 和 **Kubernetes 种类**。


    Kubernetes API 动词直接映射到 OpenAPI 规范中的操作。定义的动词包括 `get`、`create`、`update`、`patch`、`delete`、`list`、`watch`
    和 `deletecollection`。它们与 HTTP 动词的对应关系见表 1-1。


    **表 1-1** Kubernetes API 动词与 HTTP 动词的对应关系


    | Kubernetes API 动词 | HTTP 动词 |

    | --- | --- |

    | `get` | GET |

    | `create` | POST |

    | `update` | PUT |

    | `patch` | PATCH |

    | `delete` | DELETE |

    | `list` | GET |

    | `watch` | GET |

    | `deletecollection` | DELETE |


    Kubernetes 种类是 OpenAPI 规范中定义的一个子集。当向 Kubernetes API 发起请求时，数据结构会通过请求和响应的体进行交换。这些结构共享公共字段
    `apiVersion` 和 `kind`，以帮助请求的参与者识别这些结构。


    如果您想让您的用户 API 管理这个种类概念，`User` 结构将包含两个额外字段 `apiVersion` 和 `kind`——例如，值分别为 `v1`
    和 `User`。要判断 Kubernetes OpenAPI 规范中的某个定义是否为一个 Kubernetes 种类，您可以查看该定义的 `x-kubernetes-group-version-kind`
    字段。如果此字段已定义，则该定义就是一个种类，并且它会提供 `apiVersion` 和 `kind` 字段的值。

