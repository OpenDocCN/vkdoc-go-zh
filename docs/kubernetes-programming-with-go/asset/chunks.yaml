  trans: '

    # 使用自定义资源


    在上一章中，你已经了解了如何使用 `CustomResourceDefinition` 资源声明一个新的自定义资源，使 Kubernetes API 能够提供服务，以及如何使用
    `kubectl` 创建该自定义资源的新实例。但到目前为止，你还没有任何 Go 库可以让你处理自定义资源的实例。


    本章将探究在 Go 中处理自定义资源的各种可能性：


    - 为自定义资源生成专用的 Clientset 代码。

    - 使用 API Machinery 库的 `unstructured` 包和 Client-go 库的 `dynamic` 包。


    ## 生成 Clientset


    代码仓库 [`https://github.com/kubernetes/code-generator`](https://github.com/kubernetes/code-generator)
    包含了 Go 代码生成器。第三章中“包的内容”一节对这些生成器进行了非常简要的概述，其中探讨了 API 库的内容。


    要使用这些生成器，你首先需要为自定义资源定义的类别编写 Go 结构体。在本例中，你将编写 `MyResource` 和 `MyResourceList` 类别的结构体。


    为了与 API 库中的组织方式保持一致，你将把这些类型写在一个 `types.go` 文件中，该文件位于 `pkg/apis/<group>/<version>/`
    目录下。


    同样，为了与生成器正确配合，你项目的根目录必须位于一个以你的项目的 Go 包命名的目录中。例如，如果项目的包是 `github.com/myid/myproject`（在项目的
    `go.mod` 文件的第一行定义），那么项目的根目录必须位于 `github.com/myid/myproject/` 目录下。


    举个例子，让我们开始一个新项目。你可以在你选择的目录（通常是包含你所有 Go 项目的目录）中执行以下命令。


    ```

    $ mkdir -p github.com/myid/myresource-crd

    $ cd github.com/myid/myresource-crd

    $ go mod init github.com/myid/myresource-crd

    $ mkdir -p pkg/apis/mygroup.example.com/v1alpha1/

    $ cd pkg/apis/mygroup.example.com/v1alpha1/

    ```


    然后，在这个目录中，你可以创建包含这些类别结构体定义的 `types.go` 文件。以下是匹配上一章中 CRD 架构的结构体定义。


    ```

    package v1alpha1

    import (

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/apimachinery/pkg/util/intstr"

    )

    type MyResource struct {

    metav1.TypeMeta   `json:",inline"`

    metav1.ObjectMeta `json:"metadata,omitempty"`

    Spec MyResourceSpec `json:"spec"`

    }

    type MyResourceSpec struct {

    Image  string             `json:"image"`

    Memory resource.Quantity `json:"memory"`

    }

    type MyResourceList struct {

    metav1.TypeMeta `json:",inline"`

    metav1.ListMeta `json:"metadata,omitempty"`

    Items []MyResource `json:"items"`

    }

    ```


    现在，你需要运行两个生成器：


    - `deepcopy-gen` – 这将为每个类别结构体生成一个 `DeepCopyObject()` 方法，这些类型需要实现 `runtime.Object`
    接口。

    - `client-gen` – 这将为组/版本生成 clientset。


    ### 使用 `deepcopy-gen`


    #### 安装 `deepcopy-gen`


    要安装 `deepcopy-gen` 可执行文件，你可以使用 `go install` 命令：


    ```

    go install k8s.io/code-generator/cmd/deepcopy-gen@v0.24.4

    ```


    你可以使用 `@latest` 标签来使用 Kubernetes 代码的最新版本，也可以选择一个特定版本。


    #### 添加注解


    `deepcopy-gen` 生成器需要注解才能工作。它首先需要在包级别定义 `// +k8s:deepcopy-gen=package` 注解。该注解要求
    `deepcopy-gen` 为包中*所有*结构体生成 `deepcopy` 方法。


    为此，你可以在 `types.go` 所在的目录中创建一个 `doc.go` 文件，以添加此注解：


    ```

    // pkg/apis/mygroup.example.com/v1alpha1/doc.go

    // +k8s:deepcopy-gen=package

    package v1alpha1

    ```


    默认情况下，`deepcopy-gen` 将生成 `DeepCopy()` 和 `DeepCopyInto()` 方法，但不会生成 `DeepCopyObject()`。为此，你需要在每个类别结构体之前添加另一个注解（`//
    +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object`）。


    ```

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    type MyResource struct {

    [...]

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    type MyResourceList struct {

    [...]

    ```


    #### 运行 `deepcopy-gen`


    生成器需要一个包含文本（通常是许可证）的文件，该文本将被添加到生成文件的开头。为此，你可以创建一个名为 `hack/boilerplate.go.txt`
    的空文件（或者包含你偏好的内容，别忘了文本应该是 Go 注释）。


    你需要运行 `go mod tidy` 以使生成器正常工作（或者如果你更喜欢将 Go 依赖项进行 vendor，则运行 `go mod vendor`）。最后，你可以运行
    `deepcopy-gen` 命令，它将生成一个文件 `pkg/apis/mygroup.example.com/v1alpha1/zz_generated.deepcopy.go`：


    ```

    $ go mod tidy

    $ deepcopy-gen --input-dirs github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1

    -O zz_generated.deepcopy

    --output-base ../../..

    --go-header-file ./hack/boilerplate.go.txt

    ```


    注意 `"../../.."` 作为输出基础目录。它会将输出基础目录放在你创建项目目录的目录中：


    `$ mkdir -p github.com/myid/myresource-crd`


    如果与你创建的目录数量不同（三个之外），你需要根据你创建的子目录数量进行调整。


    此时，你的项目应具有以下文件结构：


    ```

    ├── go.mod

    ├── hack

    │   └── boilerplate.go.txt

    ├── pkg

    │   └── apis

    │       └── mygroup.example.com

    │           └── v1alpha1

    │               ├── doc.go

    │               ├── types.go

    │               └── zz_generated.deepcopy.go

    ```


    ### 使用 `client-gen`


    #### 安装 `client-go`


    要安装 `client-gen` 可执行文件，你可以使用 `go install` 命令：


    ```

    go install k8s.io/code-generator/cmd/client-gen@v0.24.4

    ```


    你可以使用 `@latest` 标签来使用 Kubernetes 代码的最新版本，也可以选择一个特定版本，如果你想以可重复的方式运行该命令。


    #### 添加注解


    你需要向 `types.go` 文件中定义的结构体添加注解，以指示要为哪些类型定义 Clientset。要使用的注解是 `// +genclient`。


    - `// +genclient`（不带选项）将要求 `client-gen` 为命名空间的资源生成 Clientset。

    - `// +genclient:nonNamespaced` 将为非命名空间的资源生成 Clientset。

    - `+genclient:onlyVerbs=create,get` 将仅生成这些动词，而不是默认生成所有动词。

    - `+genclient:skipVerbs=watch` 将生成除这些动词之外的所有动词，而不是默认生成所有动词。

    - `+genclient:noStatus` – 如果带注解的结构体中存在 `Status` 字段，则会生成一个 `updateStatus` 函数。使用此选项，你可以禁用到
    `updateStatus` 函数的生成（请注意，如果 `Status` 字段不存在，则不需要此选项）。


    你正在创建的自定义资源是命名空间的，因此你可以使用不带选项的注解：


    ```

    // +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object

    // +genclient

    type MyResource struct {

    [...]

    ```

