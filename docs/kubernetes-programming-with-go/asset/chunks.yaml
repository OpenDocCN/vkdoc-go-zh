    \n*   `LabelSelector, FieldSelector` – this is used to filter the elements watched\
    \ by label or by field. These options are detailed in the “Filtering the Result\
    \ of a List” section.\n\n*   `Watch, AllowWatchBookmarks` – the **Watch** option\
    \ indicates that a *Watch* operation is running. This option is set automatically\
    \ when executing the **Watch** method; you do not have to set it explicitly.\n\
    \n*   The **AllowWatchBookmarks** option asks the server to return *Bookmarks*\
    \ regularly. The use of bookmarks is described in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s,\
    \ “Allowing Bookmarks to Efficiently Restart a *Watch* Request” section.\n\n*\
    \   `ResourceVersion, ResourceVersionMatch` – this indicates at which version\
    \ of the **List** of resources you want to start the **Watch** operation.\n\n\
    *   Note that, when receiving a response of a **List** operation, a **ResourceVersion**\
    \ value is indicated for the list element itself, as well as *ResourceVersion*\
    \ values for each element of the list. The **ResourceVersion** to indicate in\
    \ the Options refers to the **ResourceVersion** of the list.\n\n*   The **ResourceVersionMatch**\
    \ option is not used for **Watch** operations. For a **Watch** operations do the\
    \ following:\n    *   When **ResourceVersion** is not set, the API will start\
    \ the **Watch** operation at the most recent list of resources. The channel first\
    \ receives ADDED events to declare the initial state of the resource, followed\
    \ by other events when changes occur on the cluster."
  trans: "\n### 从头构建 ApplyConfiguration\n\n构建 `ApplyConfiguration` 的第一种方法是从头开始构建。你首先需要使用必填字段初始化该结构：`kind`、`apiVersion`、`name`\
    \ 以及 `namespace`（如果资源是命名空间级别的）；这可以通过相关包提供的辅助函数来完成。例如，对于一个 `Deployment` 资源：\n\n\
    ```\ndeploy1Config := acappsv1.Deployment(\n\"deploy1\",\n\"default\",\n)\n```\n\
    \n此函数的实现使用了以下代码：\n\n```\nfunc Deployment(\nname string,\nnamespace string,\n)\
    \ *DeploymentApplyConfiguration {\nb := &DeploymentApplyConfiguration{}\nb.WithName(name)\n\
    b.WithNamespace(namespace)\nb.WithKind(\"Deployment\")\nb.WithAPIVersion(\"apps/v1\"\
    )\nreturn b\n}\n```\n\n然后，你可以指定你想要管理的字段。提供了 `With*Field*()` 形式的辅助函数来设置特定字段。例如，如果你的程序只负责设置\
    \ deployment 的副本数量，代码将如下所示：\n\n```\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    deploy1Config.Spec.WithReplicas(2)\n```\n\n最后，你可以调用 `Apply` 方法。完整代码如下：\n\n```\n\
    import (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\n)\ndeploy1Config\
    \ := acappsv1.Deployment(\n\"deploy1\",\n\"default\",\n)\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    deploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
    default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
    my-manager\",\nForce:        true,\n},\n)\n```\n\n### 从现有资源构建 ApplyConfiguration\n\
    \n构建 `ApplyConfiguration` 的第二种方法是从集群中的现有资源开始。有时程序无法在一个地方构建完整的 `ApplyConfiguration`。例如，设想你的程序在一个地方负责为一个\
    \ `Deployment` 定义一个具有特定镜像的容器，而在另一个地方负责设置副本数量。\n\n如果程序首先定义了容器及其镜像，它将被标记为容器及其镜像的所有者。然后，如果程序构建一个\
    \ `ApplyConfiguration` 并仅设置副本数量，而不指定容器及其镜像，则服务器端的 `Apply` 操作将尝试删除该容器。这是因为程序指定了此容器的所有者，但它在\
    \ `ApplyConfiguration` 中不再指定该容器。\n\n一种可能性是为程序的不同部分使用不同的管理器名称。但是，如果你想保持单一的管理器名称，`applyconfigurations`\
    \ 目录中的包提供了一个 `Extract*Resource()` 辅助函数来帮助你解决这种情况。\n\n这些函数将获取从集群中读取的资源（通过 `Get`\
    \ 或 `List` 操作）作为参数，并构建一个仅包含由指定 `fieldManager` 所拥有字段的 `ApplyConfiguration`。例如，`ExtractDeployment`\
    \ 辅助函数的签名是：\n\n```\nExtractDeployment(\ndeployment *apiappsv1.Deployment,\nfieldManager\
    \ string,\n) (*DeploymentApplyConfiguration, error)\n```\n\n首先是从集群中读取 deployment，然后从中提取\
    \ `ApplyConfiguration`。此时，它将包含程序管理的所有字段（容器及其镜像和副本）。然后，你可以指定唯一想要修改的字段——在此示例中为副本：\n\
    \n```\ngotDeploy1, err := clientset.AppsV1().\nDeployments(\"default\").Get(\n\
    ctx,\n\"deploy1\",\nmetav1.GetOptions{},\n)\nif err != nil {\nreturn err\n}\n\
    deploy1Config, err := acappsv1.ExtractDeployment(\ngotDeploy1,\n\"my-manager\"\
    ,\n)\nif err != nil {\nreturn err\n}\nif deploy1Config.Spec == nil {\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    }\ndeploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
    default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
    my-manager\",\nForce:        true,\n},\n)\n```\n\n## 监控资源\n\n第 2 章的“监控资源”部分描述了\
    \ Kubernetes API 如何*监控*资源。使用 Client-go 库，你可以为你想要监控的资源使用 `Watch` 方法。\n\n```\nWatch(\n\
    ctx context.Context,\nopts metav1.ListOptions,\n) (watch.Interface, error)\n```\n\
    \n此 `Watch` 方法返回一个实现 `watch.Interface` 接口的对象，并提供以下方法：\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\
    \ntype Interface interface {\nResultChan() <-chan Event\nStop()\n}\n```\n\n`ResultChan`\
    \ 方法返回一个 Go 通道（你只能读取），你将能够通过它接收所有事件。\n\n`Stop` 方法将停止 `Watch` 操作并关闭通过 `ResultChan`\
    \ 接收到的通道。\n\n通过通道接收到的 `watch.Event` 对象定义如下：\n\n```\ntype Event struct {\nType\
    \ EventType\nObject runtime.Object\n}\n```\n\n`Type` 字段可以取第 2 章表 2-2 中描述的值，并且你可以在\
    \ `watch` 包中找到这些不同值的常量：`watch.Added`、`watch.Modified`、`watch.Deleted`、`watch.Bookmark`\
    \ 和 `watch.Error`。\n\n`Object` 字段实现了 `runtime.Object` 接口，其具体类型可以根据 `Type` 的值而有所不同。\n\
    \n对于除 `Error` 之外的 `Type`，`Object` 的具体类型将是你正在监控的资源类型（例如，如果你正在监控 *deployments*，则为\
    \ `Deployment` 类型）。\n\n对于 `Error` 类型，具体类型通常是 `metav1.Status`，但根据你正在监控的资源，它可能是其他任何类型。以下是一个监控\
    \ Deployments 的代码示例：\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\nwatcher,\
    \ err := clientset.AppsV1().\nDeployments(\"project1\").\nWatch(\nctx,\nmetav1.ListOptions{},\n\
    )\nif err != nil {\nreturn err\n}\nfor ev := range watcher.ResultChan() {\nswitch\
    \ v := ev.Object.(type) {\ncase *appsv1.Deployment:\nfmt.Printf(\"%s %s\\n\",\
    \ ev.Type, v.GetName())\ncase *metav1.Status:\nfmt.Printf(\"%s\\n\", v.Status)\n\
    watcher.Stop()\n}\n}\n```\n\n在监控资源时，需要在 `ListOptions` 结构中声明的各种选项如下：\n\n- `LabelSelector`、`FieldSelector`\
    \ —— 用于按标签或字段过滤被监控的元素。这些选项在“过滤列表结果”部分有详细说明。\n- `Watch`、`AllowWatchBookmarks` ——\
    \ `Watch` 选项表示正在运行一个 *Watch* 操作。在执行 `Watch` 方法时会自动设置此选项；你无需显式设置。\n- `AllowWatchBookmarks`\
    \ 选项要求服务器定期返回 *书签*。书签的使用在第 2 章的“允许书签以高效重启 *Watch* 请求”部分有描述。\n- `ResourceVersion`、`ResourceVersionMatch`\
    \ —— 这表示你想要从哪个版本的资源 `List` 开始 `Watch` 操作。\n- 请注意，当收到 `List` 操作的响应时，列表元素本身会指示一个\
    \ `ResourceVersion` 值，列表中每个元素也会有自己的 *ResourceVersion* 值。在 Options 中指示的 `ResourceVersion`\
    \ 指的是列表的 `ResourceVersion`。\n- `ResourceVersionMatch` 选项不用于 `Watch` 操作。对于 `Watch`\
    \ 操作，执行以下操作：\n  - 当未设置 `ResourceVersion` 时，API 将从最新的资源列表开始 `Watch` 操作。通道首先接收 `ADDED`\
    \ 事件以声明资源的初始状态，然后当集群中发生更改时，会接收其他事件。\n"
- fmt: "* 当 `ResourceVersion` 设置为特定版本时，API 将从资源列表的指定版本开始 `Watch` 操作。通道**不会**接收 `ADDED`\
    \ 事件来声明资源的初始状态，而只会在该版本之后集群发生更改时接收事件（这些事件可能发生在指定版本与您运行 `Watch` 操作的时间之间）。\n\n* \
    \  一个用例是监视特定资源的删除。为此，您可以：\n    1.  列出资源，包括您要删除的资源，并保存收到的 `List` 的 `ResourceVersion`。\n\
    \    2.  对资源执行 `Delete` 操作（删除是异步的，因此操作终止时资源可能不会被删除）。\n    3.  通过指定在步骤 1 中收到的 `ResourceVersion`\
    \ 启动 `Watch` 操作。即使删除发生在步骤 2 和步骤 3 之间，您也保证会收到 `DELETED` 事件。\n\n*   当 `ResourceVersion`\
    \ 设置为 `“0”` 时，API 将从**任意**资源列表开始 `Watch` 操作。通道首先接收 `ADDED` 事件以声明资源的初始状态，随后在该初始状态之后集群发生更改时接收其他事件。\n\
    \n*   使用此语义时需特别小心，因为 `Watch` 操作通常将从最新版本开始；但也可以从较旧的版本开始。\n\n*   `TimeoutSeconds`\
    \ – 这会将请求的持续时间限制在指定的秒数内。\n\n*   `Limit`、`Continue` – 这用于对 `List` 操作的结果进行分页。`Watch`\
    \ 操作不支持这些选项。\n\n请注意，如果您为 `Watch` 操作指定一个不存在的命名空间，您将不会收到 `NotFound` 错误。\n\n还需注意，如果您指定了一个过期的\
    \ `ResourceVersion`，在调用 `Watch` 方法时不会收到错误，但会收到一个 `ERROR` 事件，其中包含一个 `metav1.Status`\
    \ 对象，该对象指示值为 `metav1.StatusReasonExpired` 的 `Reason`。\n\n`metav1.Status` 是用于构建通过使用\
    \ `Clientset` 的调用返回的错误的基础对象。您将在“错误和状态”部分中了解更多信息。\n\n## 错误和状态\n\n正如第 1 章所示，Kubernetes\
    \ API 定义了用于与调用者交换数据的 `Kinds`。目前，您应认为 `Kinds` 与资源相关，要么是资源单数名称的 `Kind`（例如 `Pod`），要么是资源列表的\
    \ `Kind`（例如 `PodList`）。当 API 操作既不返回资源也不返回资源列表时，它会使用一个通用的 `Kind`（`metav1.Status`）来指示操作的状态。\n\
    \n### `metav1.Status` 结构的定义\n\n`metav1.Status` 结构定义如下：\n\n*   `Status` – 这指示操作的状态，可以是\
    \ `metav1.StatusSuccess` 或 `metav1.StatusFailure`。\n*   `Message` – 这是对操作状态的人类可读的自由格式描述。\n\
    *   `Code` – 这指示操作为其返回的 HTTP 状态码。\n*   `Reason` – 这指示操作处于 `Failure` 状态的原因。`Reason`\
    \ 与给定的 HTTP 状态码相关。定义的 `Reasons` 有：\n    *   `StatusReasonBadRequest` (400) – 此请求本身无效。这与\
    \ `StatusReasonInvalid` 不同，后者表示 API 调用可能成功，但数据无效。回复 `StatusReasonBadRequest` 的请求永远无法成功，无论数据如何。\n\
    \    *   `StatusReasonUnauthorized` (401) – 授权凭据缺失、不完整或无效。\n    *   `StatusReasonForbidden`\
    \ (403) – 授权凭据有效，但对该资源的操作被这些凭据禁止。\n    *   `StatusReasonNotFound` (404) – 找不到请求的资源。\n\
    \    *   `StatusReasonMethodNotAllowed` (405) – 在资源上请求的操作不被允许，因为它未实现。回复 `StatusReasonMethodNotAllowed`\
    \ 的请求永远无法成功，无论数据如何。\n    *   `StatusReasonNotAcceptable` (406) – 客户端在 `Accept`\
    \ 头中指示的任何 `Accept` 类型均不可用。回复 `StatusReasonNotAcceptable` 的请求永远无法成功，无论数据如何。\n \
    \   *   `StatusReasonAlreadyExists` (409) – 正在创建的资源已存在。\n    *   `StatusReasonConflict`\
    \ (409) – 由于冲突（例如，操作尝试使用较旧的资源版本来更新资源，或 `Delete` 操作中的前提条件未得到满足），请求无法完成。\n    *\
    \   `StatusReasonGone` (410) – 项目不再可用。\n    *   `StatusReasonExpired` (410) –\
    \ 内容已过期且不再可用——例如，使用过期的资源版本执行 `List` 或 `Watch` 操作时。\n    *   `StatusReasonRequestEntityTooLarge`\
    \ (413) – 请求实体太大。\n    *   `StatusReasonUnsupportedMediaType` (415) – 不支持此资源在\
    \ `Content-Type` 头中指示的内容类型。回复 `StatusReasonUnsupportedMediaType` 的请求永远无法成功，无论数据如何。\n\
    \    *   `StatusReasonInvalid` (422) – 为 `Create` 或 `Update` 操作发送的数据无效。`Causes`\
    \ 字段列举了数据中的无效字段。\n    *   `StatusReasonTooManyRequests` (429) – 客户端应至少等待 `Details`\
    \ 字段中的 `RetryAfterSeconds` 字段指定的秒数，然后再执行操作。\n    *   `StatusReasonUnknown` (500)\
    \ – 服务器未指示任何失败原因。\n    *   `StatusReasonServerTimeout` (500) – 服务器可达且能理解请求，但无法在合理时间内完成操作。客户端应在\
    \ `Details` 字段中的 `RetryAfterSeconds` 字段指定的秒数后重试请求。\n    *   `StatusReasonInternalError`\
    \ (500) – 发生内部错误；这是意料之外的，调用的结果未知。\n    *   `StatusReasonServiceUnavailable` (503)\
    \ – 请求有效，但所请求的服务当前不可用。一段时间后重试请求可能会成功。\n    *   `StatusReasonTimeout` (504) – 无法在请求中指定的超时时间内完成操作。如果指定了\
    \ `Details` 字段中的 `RetryAfterSeconds` 字段，客户端应等待该秒数后再执行操作。\n*   `Details` – 根据 `Reason`\
    \ 字段，这可能包含有关原因的更多详细信息。\n*   `Details` 字段的类型 `StatusDetails` 定义如下：\n\n```go\ntype\
    \ Status struct {\n  Status      string\n  Message     string\n  Reason      StatusReason\n\
    \  Details     *StatusDetails\n  Code        int32\n}\n```\n\n*   `Name`、`Group`、`Kind`\
    \ 和 `UID` 字段指示（如果指定）哪个资源受到了失败的影响。\n*   `RetryAfterSeconds` 字段（如果指定）指示客户端在再次执行操作之前应等待多少秒。\n\
    *   `Causes` 字段列举了失败的原因。当执行 `Create` 或 `Update` 操作导致失败且原因为 `StatusReasonInvalid`\
    \ 时，`Causes` 字段会列举无效字段以及每个字段的错误类型。\n*   `Causes` 字段的 `StatusCause` 类型定义如下：\n\n\
    ```go\ntype StatusDetails struct {\n  Name              string\n  Group      \
    \       string\n  Kind              string\n  UID               types.UID\n  Causes\
    \            []StatusCause\n  RetryAfterSeconds int32\n}\n```\n\n```go\ntype StatusCause\
    \ struct {\n  Type       CauseType\n  Message    string\n  Field      string\n\
    }\n```"
  raw: "*   When **ResourceVersion** is set to a specific version, the API will start\
    \ the **Watch** operation at the specified version of the list of resources. The\
    \ channel will **not** receive ADDED events to declare the initial state of the\
    \ resource, but only events when changes occur on the cluster after this version\
    \ (which can be events that occurred between the specified version and the time\
    \ you run the **Watch** operation).\n\n*   A use case is to watch for the deletion\
    \ of a specific resource. For this, you can:\n\n1. List the resources, including\
    \ the one you want to delete, and save the **ResourceVersion** of the received\
    \ List.\n\n2. Execute a **Delete** operation on the resource (the deletion being\
    \ asynchronous, the resource probably will not be deleted when the operation terminates).\n\
    \n3. Start a **Watch** operation by specifying the **ResourceVersion** received\
    \ in Step 1\\. Even if the deletion occurs between Steps 2 and 3, you are guaranteed\
    \ to receive the **DELETED** event.\n\n*   When ResourceVersion is set to “0,”\
    \ the API will start the **Watch** operation at **any** list of resources. The\
    \ channel first receives ADDED events to declare the initial state of the resource,\
    \ followed by other events when changes occur on the cluster after this initial\
    \ state.\n\n*   You have to take special care when using this semantic because\
    \ the **Watch** operation will generally start with the most recent version; however,\
    \ starting with an older version is possible.\n\n*   `TimeoutSeconds` – this limits\
    \ the duration of the request to the indicated number of seconds.\n\n*   `Limit,\
    \ Continue` – this is used for paginating the result of a **List** operation.\
    \ These options are not supported for a **Watch** operation.\n\nNote that, if\
    \ you specify a nonexisting namespace for a **Watch** operation, you will not\
    \ receive a *NotFound* error.\n\nAlso note that, if you specify an expired **ResourceVersion**,\
    \ you will not receive an error when calling the **Watch** method, but will get\
    \ an ERROR event containing a **metav1.Status** object indicating a **Reason**\
    \ with a value **metav1.StatusReasonExpired**.\n\nThe **metav1.Status** is the\
    \ base object used to build the errors returned by calls using the Clientset.\
    \ You will be able to learn more in the “Errors and Statuses” section.\n\n## Errors\
    \ and Statuses\n\nAs Chapter [1](#533908_1_En_1_Chapter.xhtml) has shown, the\
    \ Kubernetes API defines *Kinds* for exchanging data with the caller. For the\
    \ moment, you should consider that *Kinds* are related to the resources, either\
    \ the *Kind* having the singular name of the resource (e.g., **Pod**), or the\
    \ *Kind* for a list of resources (e.g., **PodList**). When an API operation returns\
    \ neither a resource nor a list or resources, it uses a common *Kind*, **metav1.Status**,\
    \ to indicate the status of the operation.\n\n### Definition of the metav1.Status\
    \ Structure\n\nThe **metav1.Status** structure is defined as follows:\n\n*   `Status`\
    \ – this indicates the status of the operation and is either **metav1.StatusSuccess**\
    \ or **metav1.StatusFailure**.\n\n*   `Message` – this is a free form human-readable\
    \ description of the status of the operation.\n\n*   `Code` – this indicates the\
    \ HTTP status code returned for the operation.\n\n*   `Reason` – this indicates\
    \ why the operation is in the **Failure** status. A **Reason** is related to a\
    \ given HTTP status code. The defined **Reasons** are:\n    *   `StatusReasonBadRequest`\
    \ (400) – this request itself is invalid. This is different from **StatusReasonInvalid**,\
    \ which indicates that the API call could possibly succeed, but the data was invalid.\
    \ A request replying **StatusReasonBadRequest** can never succeed, whatever the\
    \ data.\n\n*   `StatusReasonUnauthorized` (401) – the authorization credentials\
    \ are missing, incomplete, or invalid.\n\n*   `StatusReasonForbidden` (403) –\
    \ the authorization credentials are valid, but the operation on the resource is\
    \ forbidden for these credentials.\n\n*   `StatusReasonNotFound` (404) – the requested\
    \ resource or resources cannot be found.\n\n*   `StatusReasonMethodNotAllowed`\
    \ (405) – the operation requested in the resource is not allowed because it id\
    \ not implemented. A request replying **StatusReasonMethodNotAllowed** can never\
    \ succeed, whatever the data.\n\n*   `StatusReasonNotAcceptable` (406) – none\
    \ of the Accept types indicated in the Accept header by the client is possible.\
    \ A request replying **StatusReasonNotAcceptable** can never succeed, whatever\
    \ the data.\n\n*   `StatusReasonAlreadyExists` (409) – the resource being created\
    \ already exists.\n\n*   `StatusReasonConflict` (409) – the request cannot be\
    \ completed because of a conflict—for example, because the operation tries to\
    \ update a resource with an older resource version, or because a precondition\
    \ in a **Delete** operation is not respected.\n\n*   `StatusReasonGone` (410)\
    \ – an item is no longer available.\n\n*   `StatusReasonExpired` (410) – the content\
    \ has expired and is no longer available—for example, when executing a **List**\
    \ or **Watch** operation with an expired resource version.\n\n*   `StatusReasonRequestEntityTooLarge`\
    \ (413) – the request entity is too large.\n\n*   `StatusReasonUnsupportedMediaType`\
    \ (415) – the content type indicated in the Content-Type header is not supported\
    \ for this resource. A request replying **StatusReasonUnsupportedMediaType** can\
    \ never succeed, whatever the data.\n\n*   `StatusReasonInvalid` (422) – the data\
    \ sent for a **Create** or **Update** operation is invalid. The **Causes** field\
    \ enumerates the invalid fields of the data.\n\n*   `StatusReasonTooManyRequests`\
    \ (429) – the client should wait at least the number of seconds specified in the\
    \ field **RetryAfterSeconds** of the **Details** field before performing an action\
    \ again.\n\n*   `StatusReasonUnknown` (500) – the server did not indicate any\
    \ reason for the failure.\n\n*   `StatusReasonServerTimeout` (500) – the server\
    \ can be reached and understand the request, but cannot complete the action in\
    \ a reasonable time. The client should retry the request after the number of seconds\
    \ specified in the field **RetryAfterSeconds** of the **Details** field.\n\n*\
    \   `StatusReasonInternalError` (500) – an internal error occurred; it is unexpected\
    \ and the outcome of the call is unknown.\n\n*   `StatusReasonServiceUnavailable`\
    \ (503) – the request was valid, but the requested service is unavailable at this\
    \ time. Retrying the request after some time might succeed.\n\n*   `StatusReasonTimeout`\
    \ (504) – the operation cannot be completed within the time specified by the timeout\
    \ in the request. If the field **RetryAfterSeconds** of the **Details** field\
    \ is specified, the client should wait this number of seconds before performing\
    \ the action again.\n\n*   `Details` – these can contain more details about the\
    \ reason, depending on the **Reason** field.\n\n*   The type **StatusDetails**\
    \ of the **Details** field is defined as follows:\n\n```\ntype Status struct {\n\
    Status      string\nMessage     string\nReason      StatusReason\nDetails    \
    \ *StatusDetails\nCode        int32\n}\n```\n\n*   The **Name**, **Group**, **Kind**,\
    \ and **UID** fields indicate, if specified, which resource is impacted by the\
    \ failure.\n\n*   The **RetryAfterSeconds** field, if specified, indicates how\
    \ many seconds the client should wait before performing an operation again.\n\n\
    *   The **Causes** field enumerates the causes of the failure. When performing\
    \ a **Create** or **Update** operation resulting in a failure with a **StatusReasonInvalid**\
    \ reason, the **Causes** field enumerates the invalid fields and the type of error\
    \ for each field.\n\n*   The **StatusCause** type of the **Causes** field is defined\
    \ as follows:\n\n```\ntype StatusDetails struct {\nName string\nGroup string\n\
    Kind string\nUID types.UID\nCauses []StatusCause\nRetryAfterSeconds int32\n}\n\
    ```\n\n```\ntype StatusCause struct {\nType       CauseType\nMessage    string\n\
    Field      string\n}\n```"
  trans: "\n*   当 `ResourceVersion` 设置为特定版本时，API 将从资源列表的指定版本开始 `Watch` 操作。通道**不会**接收\
    \ `ADDED` 事件来声明资源的初始状态，而只会在该版本之后集群发生更改时接收事件（这些事件可能发生在指定版本与您运行 `Watch` 操作的时间之间）。\n\
    \n*   一个用例是监视特定资源的删除。为此，您可以：\n    1.  列出资源，包括您要删除的资源，并保存收到的 `List` 的 `ResourceVersion`。\n\
    \    2.  对资源执行 `Delete` 操作（删除是异步的，因此操作终止时资源可能不会被删除）。\n    3.  通过指定在步骤 1 中收到的 `ResourceVersion`\
    \ 启动 `Watch` 操作。即使删除发生在步骤 2 和步骤 3 之间，您也保证会收到 `DELETED` 事件。\n\n*   当 `ResourceVersion`\
    \ 设置为 `“0”` 时，API 将从**任意**资源列表开始 `Watch` 操作。通道首先接收 `ADDED` 事件以声明资源的初始状态，随后在该初始状态之后集群发生更改时接收其他事件。\n\
    \n*   使用此语义时需特别小心，因为 `Watch` 操作通常将从最新版本开始；但也可以从较旧的版本开始。\n\n*   `TimeoutSeconds`\
    \ – 这会将请求的持续时间限制在指定的秒数内。\n\n*   `Limit`、`Continue` – 这用于对 `List` 操作的结果进行分页。`Watch`\
    \ 操作不支持这些选项。\n\n请注意，如果您为 `Watch` 操作指定一个不存在的命名空间，您将不会收到 `NotFound` 错误。\n\n还需注意，如果您指定了一个过期的\
    \ `ResourceVersion`，在调用 `Watch` 方法时不会收到错误，但会收到一个 `ERROR` 事件，其中包含一个 `metav1.Status`\
    \ 对象，该对象指示值为 `metav1.StatusReasonExpired` 的 `Reason`。\n\n`metav1.Status` 是用于构建通过使用\
    \ `Clientset` 的调用返回的错误的基础对象。您将在“错误和状态”部分中了解更多信息。\n\n## 错误和状态\n\n正如第 1 章所示，Kubernetes\
    \ API 定义了用于与调用者交换数据的 `Kinds`。目前，您应认为 `Kinds` 与资源相关，要么是资源单数名称的 `Kind`（例如 `Pod`），要么是资源列表的\
    \ `Kind`（例如 `PodList`）。当 API 操作既不返回资源也不返回资源列表时，它会使用一个通用的 `Kind`（`metav1.Status`）来指示操作的状态。\n\
    \n### `metav1.Status` 结构的定义\n\n`metav1.Status` 结构定义如下：\n\n*   `Status` – 这指示操作的状态，可以是\
    \ `metav1.StatusSuccess` 或 `metav1.StatusFailure`。\n*   `Message` – 这是对操作状态的人类可读的自由格式描述。\n\
    *   `Code` – 这指示操作为其返回的 HTTP 状态码。\n*   `Reason` – 这指示操作处于 `Failure` 状态的原因。`Reason`\
    \ 与给定的 HTTP 状态码相关。定义的 `Reasons` 有：\n    *   `StatusReasonBadRequest` (400) – 此请求本身无效。这与\
    \ `StatusReasonInvalid` 不同，后者表示 API 调用可能成功，但数据无效。回复 `StatusReasonBadRequest` 的请求永远无法成功，无论数据如何。\n\
    \    *   `StatusReasonUnauthorized` (401) – 授权凭据缺失、不完整或无效。\n    *   `StatusReasonForbidden`\
    \ (403) – 授权凭据有效，但对该资源的操作被这些凭据禁止。\n    *   `StatusReasonNotFound` (404) – 找不到请求的资源。\n\
    \    *   `StatusReasonMethodNotAllowed` (405) – 在资源上请求的操作不被允许，因为它未实现。回复 `StatusReasonMethodNotAllowed`\
    \ 的请求永远无法成功，无论数据如何。\n    *   `StatusReasonNotAcceptable` (406) – 客户端在 `Accept`\
    \ 头中指示的任何 `Accept` 类型均不可用。回复 `StatusReasonNotAcceptable` 的请求永远无法成功，无论数据如何。\n \
    \   *   `StatusReasonAlreadyExists` (409) – 正在创建的资源已存在。\n    *   `StatusReasonConflict`\
    \ (409) – 由于冲突（例如，操作尝试使用较旧的资源版本来更新资源，或 `Delete` 操作中的前提条件未得到满足），请求无法完成。\n    *\
    \   `StatusReasonGone` (410) – 项目不再可用。\n    *   `StatusReasonExpired` (410) –\
    \ 内容已过期且不再可用——例如，使用过期的资源版本执行 `List` 或 `Watch` 操作时。\n    *   `StatusReasonRequestEntityTooLarge`\
    \ (413) – 请求实体太大。\n    *   `StatusReasonUnsupportedMediaType` (415) – 不支持此资源在\
    \ `Content-Type` 头中指示的内容类型。回复 `StatusReasonUnsupportedMediaType` 的请求永远无法成功，无论数据如何。\n\
    \    *   `StatusReasonInvalid` (422) – 为 `Create` 或 `Update` 操作发送的数据无效。`Causes`\
    \ 字段列举了数据中的无效字段。\n    *   `StatusReasonTooManyRequests` (429) – 客户端应至少等待 `Details`\
    \ 字段中的 `RetryAfterSeconds` 字段指定的秒数，然后再执行操作。\n    *   `StatusReasonUnknown` (500)\
    \ – 服务器未指示任何失败原因。\n    *   `StatusReasonServerTimeout` (500) – 服务器可达且能理解请求，但无法在合理时间内完成操作。客户端应在\
    \ `Details` 字段中的 `RetryAfterSeconds` 字段指定的秒数后重试请求。\n    *   `StatusReasonInternalError`\
    \ (500) – 发生内部错误；这是意料之外的，调用的结果未知。\n    *   `StatusReasonServiceUnavailable` (503)\
    \ – 请求有效，但所请求的服务当前不可用。一段时间后重试请求可能会成功。\n    *   `StatusReasonTimeout` (504) – 无法在请求中指定的超时时间内完成操作。如果指定了\
    \ `Details` 字段中的 `RetryAfterSeconds` 字段，客户端应等待该秒数后再执行操作。\n*   `Details` – 根据 `Reason`\
    \ 字段，这可能包含有关原因的更多详细信息。\n*   `Details` 字段的类型 `StatusDetails` 定义如下：\n\n```go\ntype\
    \ Status struct {\n  Status      string\n  Message     string\n  Reason      StatusReason\n\
    \  Details     *StatusDetails\n  Code        int32\n}\n```\n\n*   `Name`、`Group`、`Kind`\
    \ 和 `UID` 字段指示（如果指定）哪个资源受到了失败的影响。\n*   `RetryAfterSeconds` 字段（如果指定）指示客户端在再次执行操作之前应等待多少秒。\n\
    *   `Causes` 字段列举了失败的原因。当执行 `Create` 或 `Update` 操作导致失败且原因为 `StatusReasonInvalid`\
    \ 时，`Causes` 字段会列举无效字段以及每个字段的错误类型。\n*   `Causes` 字段的 `StatusCause` 类型定义如下：\n\n\
    ```go\ntype StatusDetails struct {\n  Name              string\n  Group      \
    \       string\n  Kind              string\n  UID               types.UID\n  Causes\
    \            []StatusCause\n  RetryAfterSeconds int32\n}\n```\n\n```go\ntype StatusCause\
    \ struct {\n  Type       CauseType\n  Message    string\n  Field      string\n\
    }\n```\n"
- fmt: "### Error Returned by Clientset Operations\n\nThis chapter earlier contained\
    \ a description of the various operations provided by the `Clientset` that the\
    \ operations generally return an `error`, and that you can use functions from\
    \ the `errors` package to test the cause of the error—for example, with the function\
    \ `IsAlreadyExists`.\n\nThe concrete type of these errors is `errors.StatusError`,\
    \ defined as:\n\n```\ntype StatusError struct {\nErrStatus metav1.Status\n}\n\
    ```\n\nIt can be seen that this type includes only the `metav1.Status` structure\
    \ that has been explored earlier in this section. Functions are provided for this\
    \ `StatusError` type to access the underlying `Status`.\n\n*   `Is<ReasonValue>(err\
    \ error) bool` – one for each `Reason` value enumerated earlier in this section,\
    \ indicating whether the error is of a particular status.\n*   `FromObject(obj\
    \ runtime.Object) error` – When you are receiving a `metav1.Status` during a `Watch`\
    \ operation, you can build a `StatusError` object using this function.\n*   `(e\
    \ *StatusError) Status() metav1.Status` – returns the underlying `Status`.\n*\
    \   `ReasonForError(err error) metav1.StatusReason` – returns the `Reason` of\
    \ the underlying `Status`.\n*   `HasStatusCause(err error, name metav1.CauseType)\
    \ bool` – this indicates whether an error declares a specific cause with the given\
    \ `CauseType`.\n*   `StatusCause(err error, name metav1.CauseType) (metav1.StatusCause,\
    \ bool)` – returns the cause for the given `causeType` if it exists, or false\
    \ otherwise.\n*   `SuggestsClientDelay(err error) (int, bool)` – this indicates\
    \ whether the error indicates a value in the `RetryAfterSeconds` field of the\
    \ `Status` and the value itself.\n\n### RESTClient\n\nEarlier in this chapter\
    \ in the “Using the Clientset” section, you can get a `REST` client for each group/version\
    \ of the Kubernetes API. For example, the following code returns the REST client\
    \ for the `Core/v1` group:\n\n```\nrestClient := clientset.CoreV1().RESTClient()\n\
    ```\n\nThe `restClient` object implements the interface `rest.Interface`, defined\
    \ as:\n\n```\ntype Interface interface {\nGetRateLimiter()           flowcontrol.RateLimiter\n\
    Verb(verb string)          *Request\nPost()                     *Request\nPut()\
    \                      *Request\nPatch(pt types.PatchType)  *Request\nGet()  \
    \                    *Request\nDelete()                   *Request\nAPIVersion()\
    \                schema.GroupVersion\n}\n```\n\nIn this interface, you can see\
    \ the generic method, `Verb`, and the helper methods `Post`, `Put`, `Patch`, `Get`,\
    \ and `Delete` returning a `Request` object.\n\n### Building the Request\n\nThe\
    \ `Request` structure contains only private fields, and it provides methods to\
    \ personalize the Request. As shown in Chapter [1](#533908_1_En_1_Chapter.xhtml),\
    \ the form of the path for a Kubernetes resource or subresource (some segments\
    \ may be absent depending on the operation and resource) is the following:\n\n\
    ```\n/apis/<group>/<version>/\nnamespaces/<namespace>/<resource>/\n<name>/<subresource>\n\
    ```\n\nThe following methods can be used to build this path. Note that the `<group>`\
    \ and `<version>` segments are fixed, as the REST client is specific to a group\
    \ and version.\n\n*   `Namespace(namespace string) *Request; NamespaceIfScoped(namespace\
    \ string, scoped bool) *Request` – these indicate the namespace of the resource\
    \ to query. `NamespaceIfScoped` will add the namespace part only if the request\
    \ is marked as scoped.\n*   `Resource(resource string) *Request` – this indicates\
    \ the resource to query.\n*   `Name(resourceName string) *Request` – this indicates\
    \ the name of the resource to query.\n*   `SubResource(subresources ...string)\
    \ *Request` – this indicates the subresource of the resource to query.\n*   `Prefix(segments\
    \ ...string) *Request; Suffix(segments ...string) *Request` – add segments to\
    \ the beginning or end of the request path. The prefix segments will be added\
    \ before the “namespace” segment. The suffix segments will be added after the\
    \ subresource segment. New calls to these methods will add prefixes and suffixes\
    \ to the existing ones.\n*   `AbsPath(segments ...string) *Request` – resets the\
    \ prefix with the provided segments.\n\nThe following methods complete the request\
    \ with query parameters, body, and headers:\n\n*   `Param(paramName, s string)\
    \ *Request` – adds a query parameter with the provided name and value.\n*   `VersionedParams(obj\
    \ runtime.Object, codec runtime.ParameterCodec) *Request` – adds a series of parameters,\
    \ extracted from the object `obj`. The concrete type of `obj` is generally one\
    \ of the structures `ListOptions`, `GetOptions`, `DeleteOptions`, `CreateOptions`,\
    \ `PatchOptions`, `ApplyOptions`, `UpdateOptions`, or `TableOptions`. The `codec`\
    \ is generally the parameter codec provided by the `scheme` package of the client-go\
    \ library: `scheme.ParameterCodec`.\n*   `SpecificallyVersionedParams(obj runtime.Object,\
    \ codec runtime.ParameterCodec, version schema.GroupVersion) *Request` – with\
    \ `VersionedParams`, the object will be encoded using the group and version of\
    \ the REST Client. With `SpecificallyVersionedParams`, you can indicate a specific\
    \ group and version.\n*   `SetHeader(key string, values ...string) *Request` –\
    \ sets values for the specified header for the request. If the header with this\
    \ key is already defined, it will be overwritten.\n*   `Body(obj interface{})\
    \ *Request` – sets the body content of the request, based on `obj`. The `obj`\
    \ can be of different type:\n    *   `string` – the file with the given name will\
    \ be read and its content used as body\n    *   `[]byte` – the data will be used\
    \ for the body\n    *   `io.Reader` – the data read from the reader will be used\
    \ for the body\n    *   `runtime.Object` – the object will be marshaled and the\
    \ result used for the body. The `Content-Type` header will be set to indicate\
    \ in which type the object is marshaled (json, yaml, etc.).\n\nOther methods can\
    \ be used to configure the technical properties of the request:\n\n*   `BackOff(manager\
    \ BackoffManager) *Request` – sets a Backoff manager for the request. The default\
    \ backoff manager is a `rest.NoBackoff` manager provided by the `rest` package,\
    \ which won’t wait before to execute a new request after a failing request.\n\
    *   The `rest` package provides another backoff manager, `rest.URLBackoff`, which\
    \ will wait before to retry a new request on a server which replied previously\
    \ with a 5xx error.\n*   You can build and use a `rest.URLBackoff` object with:\n\
    \n```\n    request.BackOff(&rest.URLBackoff{\n    Backoff: flowcontrol.NewBackOffWithJitter(\n\
    \    1*time.Second,\n    30*time.Second,\n    0.1,\n    ),\n    })\n```"
