  trans: '

    ### 检查 Actions


    如果你正在使用 Go 团队提供的 `mock` 系统（[github.com/golang/mock](https://github.com/golang/mock)），你可能想以类似的方式
    `mock` 对 `Client-go` 库的调用。`mock` 系统帮助你验证测试代码执行期间，是否以特定参数调用了特定函数，并返回了特定值。


    遵循这一原则，要评估 `CreatePod` 函数，你可能需要检查 `Clientset` 的 `Create` 函数是否以特定参数被调用。为此，`fake`
    Clientset 会记录在其上执行的所有 `Actions`，你可以访问这些 `Actions` 来检查它们是否符合你的预期。


    在执行待评估的代码后，你可以通过以下调用访问 `Actions`：


    ```

    actions := clientset.Actions()

    ```


    该调用返回一个对象列表，这些对象实现了以下 `Action` 接口：


    ```

    type Action interface {

    GetNamespace() string

    GetVerb() string

    GetResource() schema.GroupVersionResource

    Matches(verb, resource string) bool

    [...]

    }

    ```


    在第 6 章的“使用 Clientset”部分，你了解了在资源上执行操作的模式（对于非命名空间资源，省略命名空间）如下：


    - `GetNamespace()` – `Action` 上的此方法返回调用中指定的 `namespace`。

    - `GetVerb()` – `Action` 上的此方法返回调用中使用的 `Operation`。

    - `GetResource()` – `Action` 上的此方法返回一个 `GVR`，由调用中使用的 `GroupVersion` 和 `Resource`
    构建。

    - `Matches(verb, resource string)` – 检查 `verb` 和 `resource` 是否与调用中使用的 `Operation`
    和 `Resource` 匹配。


    ```

    clientset.

    GroupVersion().

    Resource(namespace).

    Operation(ctx, options)

    ```


    使用这四个方法，你可以检查在 `Clientset` 上执行的操作是否符合你的预期。


    在检查 `Action` 的 Verb 之后，你可以将其转换为与 `Verb` 相关的接口之一：`GetAction`、`ListAction`、`CreateAction`、`UpdateAction`、`DeleteAction`、`DeleteCollectionAction`、`PatchAction`、`WatchAction`、`ProxyGetAction`
    和 `GenericAction`。


    这些接口提供了更多方法来获取特定于 `Operation` 的信息。


    - **GetAction 接口** – 定义如下：


    ```

    type GetAction interface {

    Action

    GetName() string

    }

    ```


    如第 6 章的“获取资源信息”部分所示，执行 `Get` 操作的方法签名是：


    - `Get(ctx context.Context, name string, opts metav1.GetOptions)` – `GetAction`
    接口中的 `GetName()` 方法将返回作为参数传递给 `Get` 方法的 `name`。


    - **ListAction 接口** – 定义如下：


    ```

    type ListRestrictions struct {

    Labels labels.Selector

    Fields fields.Selector

    }


    type ListAction interface {

    Action

    GetListRestrictions() ListRestrictions

    }

    ```


    如第 6 章的“获取资源列表”部分所示，执行 `List` 操作的方法签名是：


    - `List(ctx context.Context, opts metav1.ListOptions)` – 其中 `ListOptions` 定义如下：


    ```

    type ListOptions struct {

    LabelSelector string

    FieldSelector string

    [...]

    }

    ```


    `ListAction` 接口中的 `GetListRestrictions()` 方法将返回通过 `ListOptions` 结构体作为参数传递给 `List`
    方法的 `LabelSelector` 和 `FieldSelector`。


    - **CreateAction 接口** – 定义如下：


    ```

    type CreateAction interface {

    Action

    GetObject() runtime.Object

    }

    ```


    如第 6 章的“创建资源”部分所示，执行 `Create` 操作的方法签名如下（此处以 `Pods` 为例）：


    - `Create(ctx context.Context, pod *v1.Pod, opts metav1.CreateOptions)`

    '
- fmt: "- `GetObject()`方法来自`CreateAction`接口，会返回作为参数传递给`Create`方法的对象（这里是`pod`）\n\n\
    - **`UpdateAction`接口** – 定义如下：\n\n```go\ntype UpdateAction interface {\n    Action\n\
    \    GetObject() runtime.Object\n}\n```\n\n如第[6](#533908_1_En_6_Chapter.xhtml)章“更新资源”部分所示，执行`Update`操作的方法签名（这里是针对`Pods`）：\n\
    \n- `Update(ctx context.Context, pod *v1.Pod, opts metav1.UpdateOptions)`\n\n\
    - `GetObject()`方法来自`UpdateAction`接口，会返回作为参数传递给`Update`方法的对象（这里是`pod`）\n\n- **`DeleteAction`接口**\
    \ – 代码如下：\n\n```go\ntype DeleteAction interface {\n    Action\n    GetName() string\n\
    \    GetDeleteOptions() metav1.DeleteOptions\n}\n```\n\n如第[6](#533908_1_En_6_Chapter.xhtml)章“删除资源”部分所示，执行`Delete`操作的方法签名如下：\n\
    \n- `Delete(ctx context.Context, name string, opts metav1.DeleteOptions)`\n\n\
