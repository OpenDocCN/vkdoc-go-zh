    as owner. Because of this, if you execute all the tests with the same MyResource
    instance name, the Deployment from the first test would be used for the tests
    that follow.'
  trans: "\n# 定义 Ginkgo 测试套件\n\n要开始测试 `Reconcile` 函数，可以使用一个 `go` 测试函数来启动 `ginkgo`\
    \ 的规格说明：\n\n```go\nimport (\n    \"testing\"\n    . \"github.com/onsi/ginkgo/v2\"\
    \n    . \"github.com/onsi/gomega\"\n)\n\nfunc TestMyReconciler_Reconcile(t *testing.T)\
    \ {\n    RegisterFailHandler(Fail)\n    RunSpecs(t,\n        \"Controller Suite\"\
    ,\n    )\n}\n```\n\n然后，你可以声明 `BeforeSuite` 和 `AfterSuite` 函数，用于启动和停止环境（`Environment`）以及管理器（Manager）。\n\
    \n以下是这些函数的示例，它将创建一个加载了 `MyResource` 的 CRD 的环境。管理器在 `BeforeSuite` 函数的末尾通过 `Go`\
    \ 协程启动，因此测试可以在主 `Go` 协程上执行。\n\n请注意，你将创建一个*可取消的上下文（Cancelable Context）*，它会在启动管理器时使用，因此你可以通过从\
    \ `AfterSuite` 函数中取消该上下文来停止管理器。\n\n- ❶ `testEnv`、`ctx` 和 `cancel` 将在 `BeforeSuite`\
    \ 和 `AfterSuite` 中使用\n- ❷ `k8sClient` 将在测试中使用\n- ❸ 创建一个可取消的上下文\n- ❹ 创建 `testEnv`\
    \ 环境\n- ❺ 启动 `testEnv` 环境\n- ❻ 构建传递给管理器的方案（Scheme）\n- ❼ 构建管理器\n- ❽ 从管理器中获取 `k8sClient`\
    \ 以供测试使用\n- ❾ 构建控制器\n- ❿ 通过 `Go` 协程启动管理器\n- ⓫ 取消上下文，这将终止管理器\n- ⓬ 终止 `testEnv`\
    \ 环境\n\n```go\nimport (\n    \"context\"\n    \"path/filepath\"\n    \"testing\"\
    \n\n    . \"github.com/onsi/ginkgo/v2\"\n    . \"github.com/onsi/gomega\"\n  \
    \  appsv1 \"k8s.io/api/apps/v1\"\n    \"k8s.io/apimachinery/pkg/runtime\"\n  \
    \  clientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\n    \"sigs.k8s.io/controller-runtime/pkg/builder\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/client\"\n    \"sigs.k8s.io/controller-runtime/pkg/envtest\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/log\"\n    \"sigs.k8s.io/controller-runtime/pkg/log/zap\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/manager\"\n\n    mygroupv1alpha1 \"\
    github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\n)\n\n\
    var (\n    testEnv   *envtest.Environment                    ❶\n    ctx      \
    \ context.Context\n    cancel    context.CancelFunc\n    k8sClient client.Client\
    \                           ❷\n)\n\nvar _ = BeforeSuite(func() {\n    log.SetLogger(zap.New(\n\
    \        zap.WriteTo(GinkgoWriter),\n        zap.UseDevMode(true),\n    ))\n\n\
    \    ctx, cancel = context.WithCancel(                 ❸\n        context.Background(),\n\
    \    )\n\n    testEnv = &envtest.Environment{                   ❹\n        CRDDirectoryPaths:\
    \     []string{\n            filepath.Join(\"..\", \"..\", \"crd\"),\n       \
    \ },\n        ErrorIfCRDPathMissing: true,\n    }\n\n    var err error\n    //\
    \ cfg 在此文件中全局定义。\n    cfg, err := testEnv.Start()                       ❺\n  \
    \  Expect(err).NotTo(HaveOccurred())\n    Expect(cfg).NotTo(BeNil())\n\n    scheme\
    \ := runtime.NewScheme()                     ❻\n    err = clientgoscheme.AddToScheme(scheme)\n\
    \    Expect(err).NotTo(HaveOccurred())\n    err = mygroupv1alpha1.AddToScheme(scheme)\n\
    \    Expect(err).NotTo(HaveOccurred())\n\n    mgr, err := manager.New(cfg, manager.Options{\
    \     ❼\n        Scheme: scheme,\n    })\n    Expect(err).ToNot(HaveOccurred())\n\
    \n    k8sClient = mgr.GetClient()                       ❽\n\n    err = builder.\
    \                                    ❾\n        ControllerManagedBy(mgr).\n  \
    \      Named(Name).\n        For(&mygroupv1alpha1.MyResource{}).\n        Owns(&appsv1.Deployment{}).\n\
    \        Complete(&MyReconciler{})\n\n    go func() {\n        defer GinkgoRecover()\n\
    \        err = mgr.Start(ctx)                          ❿\n        Expect(err).ToNot(\n\
    \            HaveOccurred(),\n            \"failed to run manager\",\n       \
    \ )\n    }()\n})\n\nvar _ = AfterSuite(func() {\n    cancel()                \
    \                          ⓫\n    err := testEnv.Stop()                      \
    \       ⓬\n    Expect(err).NotTo(HaveOccurred())\n})\n```\n\n## 编写测试\n\n现在你已经有了一个可以启动和停止环境的测试套件，可以开始编写测试了。测试将首先创建一个\
    \ `MyResource` 实例，以验证 `Reconcile` 函数是否按照预期定义创建了预期的“底层”资源。\n\n然后，当底层资源被创建后，测试将更新底层资源的状态（请记住集群中没有部署任何控制器，因此你需要从测试中执行这些更改），以验证\
    \ `MyResource` 实例的状态是否相应地更新。\n\n测试计划如下。请注意，每个 `It` 测试将单独执行，并且对于每个 `It`，所有前置的 `BeforeEach`\
    \ 将在测试之前执行，所有前置的 `AfterEach` 将在测试之后执行。\n\n```go\nvar _ = Describe(\"MyResource\
    \ controller\", func() {\n    When(\"creating a MyResource instance\", func()\
    \ {\n        BeforeEach(func() {\n            // 创建 MyResource 实例\n        })\n\
    \        AfterEach(func() {\n            // 删除 MyResource 实例\n        })\n\n \
    \       It(\"should create a deployment\", func() {\n            // 检查 deployment\
    \ 是否最终被创建\n        })\n\n        When(\"deployment is found\", func() {\n    \
    \        BeforeEach(func() {\n                // 等待 deployment 最终被创建\n       \
    \     })\n\n            It(\"should be owned by the MyResource instance\", func()\
    \ {\n                // 检查 Deployment 中的 ownerReference\n                // 是否引用了\
    \ MyResource 实例\n            })\n\n            It(\"should use the image specified\
    \ in MyResource instance\", func() {\n            })\n\n            When(\"deployment\
    \ ReadyReplicas is 1\", func() {\n                BeforeEach(func() {\n      \
    \              // 更新 Deployment 状态为 ReadyReplicas=1\n                })\n\n  \
    \              It(\"should set status ready for MyResource instance\", func()\
    \ {\n                    // 检查 MyResource 实例的状态\n                    // 是否最终变为\
    \ Ready\n                })\n            })\n        })\n    })\n})\n```\n\n为了清晰展示测试的执行过程，以下是四个\
    \ `It` 测试将如何执行的流程，以及 `BeforeEach` 和 `AfterEach` 的展示。\n\n### 测试 1\n\n- **When**：创建一个\
    \ MyResource 实例\n- **Before**：// 创建 MyResource 实例\n- **It**：会创建一个 deployment\n\
    - **After**：// 删除 MyResource 实例\n\n### 测试 2\n\n- **When**：创建一个 MyResource 实例\n\
    - **Before**：// 创建 MyResource 实例\n- **When**：deployment 被找到\n- **Before**：// 等待\
    \ deployment 最终被创建\n- **It**：应由 MyResource 实例拥有\n- **After**：// 删除 MyResource\
    \ 实例\n\n### 测试 3\n\n- **When**：创建一个 MyResource 实例\n- **Before**：// 创建 MyResource\
    \ 实例\n- **When**：deployment 被找到\n- **Before**：// 等待 deployment 最终被创建\n- **It**：应使用\
    \ MyResource 实例中指定的镜像\n- **After**：// 删除 MyResource 实例\n\n### 测试 4\n\n- **When**：创建一个\
    \ MyResource 实例\n- **Before**：// 创建 MyResource 实例\n- **When**：deployment 被找到\n\
    - **Before**：// 等待 deployment 最终被创建\n- **When**：deployment 的 ReadyReplicas 为 1\n\
    - **Before**：// 更新 Deployment 状态为 ReadyReplicas=1\n- **It**：应为 MyResource 实例设置状态为就绪（Ready）\n\
    - **After**：// 删除 MyResource 实例\n\n最后，完整的测试源代码在接下来的段落之后。请注意，你正在使用一个随机名称创建 `MyResource`\
    \ 实例，这样创建的资源就不会在测试之间冲突。\n\n事实上，测试是一个接一个执行的，因此前一个测试遗留的资源可能会干扰后续测试。\n\n在这种实现中，你可以通过删除\
    \ `MyResource` 实例来结束测试，但是因为集群中没有运行控制器，所以 Deployment 不会被垃圾回收器删除，尽管它引用了已删除的 `MyResource`\
    \ 实例作为所有者。因此，如果你使用相同的 `MyResource` 实例名称执行所有测试，第一个测试中的 Deployment 将被用于后续的测试。\n"
