    此命令会构建两个 Manifest 文件：


    *   `config/rbac/role.yaml` – 将被分配给 Manager 使用的服务账户的 `ClusterRole`，授予对自定义资源的访问权限。

    *   `config/crd/bases/mygroup.myid.dev_myresources.yaml` – 自定义资源的定义。


    以下命令将部署定义 CRD 的 Manifest 文件：


    ```

