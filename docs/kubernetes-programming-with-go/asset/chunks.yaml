    Note that this is different from being owned by various resources. A resource
    can have different owners; and in this case, the resource will be deleted when
    all its owners have been deleted, independent of which owner is the **Controller**,
    if any.


    This uniqueness of controllers is useful for those that can “adopt” resources.
    For example, a **ReplicaSet** can adopt an existing pod that matches the selectors
    of the **ReplicaSet**, but only if the **Pod** is not already controlled by another
    **ReplicaSet** or another controller.


    The value of this field is a pointer to a boolean value. You can either declare
    a boolean value and affect its address when setting the **Controller** field,
    or use the **BoolPtr** function from the **Kubernetes Utils** Library:


    ```

    // Solution 1: declare a value and use its address

    controller := true

    ownerRef.Controller = &controller

    // Solution 2: use the BoolPtr function

    import (

    "k8s.io/utils/pointer"

    )

    ownerRef.Controller = pointer.BoolPtr(true)

    ```


    ##### Setting BlockOwnerDeletion


    The **OwnerReference** is useful for a controller or other process to not have
    to take care about deletion of owned resources: when the owner is deleted, the
    owned will be deleted by the Kubernetes Garbage Collector.


    This behavior is configurable. When using the **Delete** operation on a resource,
    you can use the **Propagation Policy** option:


    *   **Orphan**: To indicate to the Kubernetes API to orphan the owned resources,
    so they will not be deleted by the garbage collector.


    *   **Background**: To indicate to the Kubernetes API to return from the DELETE
    operation immediately after the owner resource is deleted, and not wait for owned
    resources to be deleted by the garbage collector.


    *   **Foreground**: To indicate to the Kubernetes API to return from the DELETE
    operation after the owner and **the owned resources with** **BlockOwnerDeletion**
    **set to true** are deleted. The Kubernetes API will not wait for other owned
    resources to be deleted.


    So, if you are writing a controller or another process that needs to wait for
    all the owned resources to be deleted, the process will need to set the **BlockOwnerDeletion**
    field to **true** on all the owned resources and to use the Foreground propagation
    policy when deleting the owner resource.'
