    package v1alpha1\n// Hub marks this type as a conversion hub.\nfunc (*MyResource)\
    \ Hub() {}\n```\n\nAll other types, in this case, the `v1beta1.MyResource` must\
    \ implement the `Convertible` interface and provide code to convert to and from\
    \ the `Hub` version:\n\n```go\npackage v1beta1\nimport (\n    \"github.com/myid/myresource/api/v1alpha1\"\
    \n    \"sigs.k8s.io/controller-runtime/pkg/conversion\"\n)\nfunc (src *MyResource)\
    \ ConvertTo(dstRaw conversion.Hub) error {\n    dst := dstRaw.(*v1alpha1.MyResource)\n\
    \    dst.Spec.Memory = src.Spec.MemoryRequest\n    // Copy other fields\n    dst.ObjectMeta\
    \ = src.ObjectMeta\n    dst.Spec.Image = src.Spec.Image\n    dst.Status.State\
    \ = src.Status.State\n    return nil\n}\nfunc (dst *MyResource) ConvertFrom(srcRaw\
    \ conversion.Hub) error {\n    src := srcRaw.(*v1alpha1.MyResource)\n    dst.Spec.MemoryRequest\
    \ = src.Spec.Memory\n    // Copy other fields\n    dst.ObjectMeta = src.ObjectMeta\n\
    \    dst.Spec.Image = src.Spec.Image\n    dst.Status.State = src.Status.State\n\
    \    return nil\n}\n```\n\n### Setting Up the webhook\n\nThe `kubebuilder create\
    \ webhook` command is used to set up webhooks. Several webhook types are supported:\n\
    \n- *Conversion Webhook* to help convert between resource versions (flag `--conversion`)\n\
    - *Mutating Admission Webhook* to help set default values on new objects (flag\
    \ `--defaulting`)\n- *Validating Admission Webhook* to help validate the created\
    \ or updated objects (flag `--programmatic-validation`)\n\nIn this example, you\
    \ will create a `Conversion` webhook for `MyResource` in version `v1beta1` (the\
    \ version that needs to be converted):\n\n```shell\n$ kubebuilder create webhook\
    \ --group mygroup --version v1beta1 --kind MyResource --conversion\n```\n\nThis\
    \ will add code to the `main` function to set up the Conversion webhook:\n\n```go\n\
    (&mygroupv1beta1.MyResource{}).SetupWebhookWithManager(mgr)\n```\n\nThen, create\
    \ new code in the `v1beta1` package, to be called from `main`:\n\n```go\npackage\
    \ v1beta1\nfunc (r *MyResource) SetupWebhookWithManager(mgr ctrl.Manager) error\
    \ {\n    return ctrl.NewWebhookManagedBy(mgr).For(r).Complete()\n}\n```\n\n###\
    \ Updating kustomization Files\n\nYou need to enable the `webhook` in the deployment\
    \ manifests by uncommenting sections related to `[WEBHOOK]` and `[CERTMANAGER]`\
    \ in the files `config/default/kustomization.yaml` and `config/crd/kustomization.yaml`.\n\
    \nIf you are not using any other webhooks (i.e., conversion or mutating), you\
    \ also will need to comment on the lines:\n\n- `- manifests.yaml` in the file\
    \ `config/webhook/kustomization.yaml`\n- `- webhookcainjection_patch.yaml` in\
    \ the file `config/default/kustomization.yaml`\n\nYou also will need to install\
    \ cert-manager^([⁵](#fn5)) to generate certificates based on annotations added\
    \ by `kubebuilder` to the CRD.\n\n### Using Various Versions\n\nAfter deploying\
    \ the new version, as described in the “Deploying the Operator on the Cluster”\
    \ section, you can create `MyResource` instances in version `v1alpha1` or `v1beta1`.\
    \ As an example, you can create two sample resources in the `config/sample` directory:\n\
    \n- `config/samples/mygroup_v1alpha1_myresource.yaml`:\n\n```yaml\napiVersion:\
    \ mygroup.myid.dev/v1alpha1\nkind: MyResource\nmetadata:\n  name: myresource-sample-alpha\n\
    spec:\n  image: nginx\n  memory: 512Mi\n```\n\n- `config/samples/mygroup_v1beta1_myresource.yaml`:\n\
    \n```yaml\napiVersion: mygroup.myid.dev/v1beta1\nkind: MyResource\nmetadata:\n\
    \  name: myresource-sample-beta\nspec:\n  image: nginx\n  memoryRequest: 256Mi\n\
    ```\n\nThen, you can create the resources in the cluster using `kubectl`:\n\n\
    ```shell\n$ kubectl apply -f config/samples/mygroup_v1alpha1_myresource.yaml\n\
    $ kubectl apply -f config/samples/mygroup_v1beta1_myresource.yaml\n```\n\nFinally,\
    \ when listing the resources, you will get the definition in the `v1beta1` format,\
    \ using the `memoryRequest` field:\n\n```yaml\n$ kubectl get myresources.mygroup.myid.dev\
    \ -o yaml\napiVersion: v1\nkind: List\nitems:\n- apiVersion: mygroup.myid.dev/v1beta1\n\
    \  kind: MyResource\n  metadata:\n    name: myresource-sample-alpha\n  spec:\n\
    \    image: nginx\n    memoryRequest: 512Mi\n  status:\n    state: Ready\n- apiVersion:\
    \ mygroup.myid.dev/v1beta1\n  kind: MyResource\n  metadata:\n    name: myresource-sample-beta\n\
    \  spec:\n    image: nginx\n    memoryRequest: 256Mi\n  status:\n    state: Ready\n\
    ```\n\nNote that you get the definition in `v1beta1` because `kubectl` returns\
