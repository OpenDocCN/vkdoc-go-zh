- fmt: '### Implementing the Reconciled Resource


    If the resource to reconcile has been found in the cluster, the operator’s next
    step is to create “low-level” resources to implement this resource to reconcile.


    Because Kubernetes is a declarative platform, a good way of creating these resources
    is to declare what the low-level resources should be, independent of what exists,
    or not, in the cluster, and to rely on the Kubernetes controllers to take over
    and reconcile these low-level resources.


    For this reason, it is not possible to use the `Create` method blindly because
    we are not sure whether the resources exist or not, and the operation would fail
    if the resources already exist.


    You could check whether resources exist, and create them if they do not, or modify
    them if they exist. As has been shown in the previous chapters, the Server-side
    Apply method is perfect for this situation: when running an Apply operation, if
    the resource does not exist, it is created; and if the resource exists, it is
    patched, taking care of conflicts in case the resource has been modified by another
    participant.


    Using the Server-side Apply method, the Operator does not need to check whether
    the resources exist or not, or whether they have been modified by another participant.
    The Operator only needs to run the Server-side Apply operation with the definitions
    of the resources from the Operator’s point of view.


    After the low-level resources are applied, two possibilities should be considered.


    * **Case 1:** If the low-level resources already exist and have not been modified
    by the Apply, no MODIFIED event will be triggered for these resources, and the
    `Reconcile` function will not be called again (at least for this Apply operation).


    * **Case 2:** If the low-level resources have been created or modified, this will
    trigger CREATED or MODIFIED events for these resources, and the `Reconcile` function
    will be called again because of these events. This new execution of the function
    will again Apply the low-level resources and, if nothing has updated these resources
    in the meantime, the Operator will fall on Case 1.


    The new low-level resources will be handled eventually by their respective operators
    or controllers. In turn, they will reconcile these resources, and update their
    status to announce their current state.


    As soon as the statuses of these low-level resources are updated, MODIFIED events
    will be triggered for these resources, and the `Reconcile` function will be called
    again. Once more, the Operator will Apply the resources, and Cases 1 and 2 have
    to be considered.


    The Operator needs, at some point, to read the Statuses of the low-level resources
    it has created so as to compute the status of the reconciled resource. In simple
    cases, it can be done just after executing the Server-side Apply of the low-level
    resources.


    ### Simple Implementation Example


    To illustrate, here is a complete `Reconcile` function for an operator that creates
    a Deployment with the `Image` and `Memory` information provided in a `MyResource`
    instance.


    * ❶ Get the definition of the resource to reconcile


    * ❷ If resource does not exist, return immediately


    * ❸ Build the `ownerReference` pointing to the resource to reconcile


    * ❹ Use Server-side Apply for the “low-level” deployment


    * ❺ Compute the status of the resource based on the “low-level” deployment


    * ❻ Update the status of the resource to reconcile


    ```go

    func (a *MyReconciler) Reconcile(

    ctx context.Context,

    req reconcile.Request,

    ) (reconcile.Result, error) {

    log := log.FromContext(ctx)

    log.Info("getting myresource instance")

    myresource := mygroupv1alpha1.MyResource{}

    err := a.client.Get(                                        ❶

    ctx,

    req.NamespacedName,

    &myresource,

    &client.GetOptions{},

    )

    if err != nil {

    if errors.IsNotFound(err) {                              ❷

    log.Info("resource is not found")

    return reconcile.Result{}, nil

    }

    return reconcile.Result{}, err

    }

    ownerReference := metav1.NewControllerRef(               ❸

    &myresource,

    mygroupv1alpha1.SchemeGroupVersion.

    WithKind("MyResource"),

    )

    err = a.applyDeployment(                                   ❹

    ctx,

    &myresource,

    ownerReference,

    )

    if err != nil {

    return reconcile.Result{}, err

    }

    status, err := a.computeStatus(ctx, &myresource)          ❺

    if err != nil {

    return reconcile.Result{}, err

    }

    myresource.Status = *status

    log.Info("updating status", "state", status.State)

    err = a.client.Status().Update(ctx, &myresource)          ❻

    if err != nil {

    return reconcile.Result{}, err

    }

    return reconcile.Result{}, nil

    }

    ```


    Here is an example of an implementation of the Server-side Apply operation for
    the deployment created by the operator:


    * ❼ Use the `Patch` method to execute the Server-side Apply operation


    * ❽ Use the `Image` defined in the resource to reconcile


    * ❾ Use the `Memory` defined in the resource to reconcile


    * ❿ Set the `OwnerReference` to point to the resource to reconcile


    ```go

    func (a *MyReconciler) applyDeployment(

    ctx context.Context,

    myres *mygroupv1alpha1.MyResource,

    ownerref *metav1.OwnerReference,

    ) error {

    deploy := createDeployment(myres, ownerref)

    err := a.client.Patch(                                   ❼

    ctx,

    deploy,

    client.Apply,

    client.FieldOwner(Name),

    client.ForceOwnership,

    )

    return err

    }

    func createDeployment(

    myres *mygroupv1alpha1.MyResource,

    ownerref *metav1.OwnerReference,

    ) *appsv1.Deployment {

    deploy := &appsv1.Deployment{

    ObjectMeta: metav1.ObjectMeta{

    Labels: map[string]string{

    "myresource": myres.GetName(),

    },

    },

    Spec: appsv1.DeploymentSpec{

    Selector: &metav1.LabelSelector{

    MatchLabels: map[string]string{

    "myresource": myres.GetName(),

    },

    },

    Template: corev1.PodTemplateSpec{

    ObjectMeta: metav1.ObjectMeta{

    Labels: map[string]string{

    "myresource": myres.GetName(),

    },

    },

    Spec: corev1.PodSpec{

    Containers: []corev1.Container{

    {

    Name:  "main",

    Image: myres.Spec.Image,                    ❽

    Resources: corev1.ResourceRequirements{

    Requests: corev1.ResourceList{

    corev1.ResourceMemory:      myres.Spec.Memory,          ❾

    },

    },

    },

    },

    },

    },

    },

    }

    deploy.SetName(myres.GetName() + "-deployment")

    deploy.SetNamespace(myres.GetNamespace())

    deploy.SetGroupVersionKind(

    appsv1.SchemeGroupVersion.WithKind("Deployment"),

    )

    deploy.SetOwnerReferences([]metav1.OwnerReference{     ❿

    *ownerref,

    })

    return deploy

    }

    ```


    Then, here is an example of how the computation and update of the Status can be
    implemented:


    * ⓫ Get the deployment created for this resource to reconcile


    * ⓬ Get the status of the unique Deployment found


    * ⓭ When replicas is `1`, set status `Ready` for the reconciled resource


    ```go

    const (

    _buildingState = "Building"

    _readyState    = "Ready"

    )

    func (a *MyReconciler) computeStatus(

    ctx context.Context,

    myres *mygroupv1alpha1.MyResource,

    ) (*mygroupv1alpha1.MyResourceStatus, error) {

    logger := log.FromContext(ctx)

    result := mygroupv1alpha1.MyResourceStatus{

    State: _buildingState,

    }

    deployList := appsv1.DeploymentList{}

    err := a.client.List(                                        ⓫

    ctx,

    &deployList,

    client.InNamespace(myres.GetNamespace()),

    client.MatchingLabels{

    "myresource": myres.GetName(),

    },

    )

    if err != nil {

    return nil, err

    }

    if len(deployList.Items) == 0 {

    logger.Info("no deployment found")

    return &result, nil

    }

    if len(deployList.Items) > 1 {

    logger.Info(

    "too many deployments found", "count",

    len(deployList.Items),

    )

    return nil, fmt.Errorf(

    "%d deployment found, expected 1",

    len(deployList.Items),

    )

    }

    status := deployList.Items[0].Status                    ⓬

    logger.Info(

    "got deployment status",

    "status", status,

    )

    if status.ReadyReplicas == 1 {

    result.State = _readyState                              ⓭

    }

    return &result, nil

    }

    ```'
