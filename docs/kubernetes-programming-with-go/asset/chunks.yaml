    ".": {}, "f:name": {}, "f:value": {} ➍

    },

    "k:{\"name\":\"key2\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➎

    },

    "k:{\"name\":\"key3\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➏

    }}}}}}}},

    "manager": "manager1",  ➐

    "operation": "Apply",   ➑

    "time": "2022-07-14T16:46:48Z"

    },

    {

    "apiVersion": "apps/v1",

    "fieldsType": "FieldsV1",

    "fieldsV1": {

    "f:status": {

    "f:availableReplicas": {},

    "f:observedGeneration": {},

    "f:readyReplicas": {},

    "f:replicas": {},

    "f:updatedReplicas": {}

    }

    },

    "manager": "kube-controller-manager", ➒

    "operation": "Update",                ➓

    "subresource": "status",

    "time": "2022-07-14T16:46:52Z"

    }]

    ```


    You can see in the **managedFields** (abbreviated for clarity) that your operation
    has been saved as an **Apply** operation, ➑, by the manager, **manager1** ➐; and
    that this manager owns the element of **container** with the name **nginx** ➊—the
    fields **image** ➋, **name** ➌, and the elements of **env** with name **key1**
    ➍, **key2** ➎, and **key3** ➏.


    A *Manager* is any program used to edit a resource; for example, **kubectl** when
    used with an edit or apply command, or a controller or operator managing these
    resources. You also can see that a second operation of type Update ➓ has been
    saved and is owned by the **kube-controller-manager** ➒ because the Deployment
    controller set some values in the status of the Deployment resource when you created
    it.


    Now, a second manager, **manager2**, would like to update the environment variable,
    **key2**. It can do so by creating the following and running the command (note
    that the **force** query parameter is set to **true**):


    ```

    -- patch.yaml

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    template:

    spec:

    containers:

    - name: nginx

    env:

    - name: key2

    value: value2bis

    $ curl -X PATCH

    "$HOST/apis/apps/v1/namespaces/project1/deployments/nginx?fieldManager=manager2&force=true"

    -H "Content-Type: application/apply-patch+yaml"

    --data-binary @patch.yaml

    ```


    With this operation, **manager2** ➌ now owns the **nginx** element of **container**
    ➊ and the **key2** element of **env** ➋.


    ```

    {

    "apiVersion": "apps/v1",

    "fieldsType": "FieldsV1",

    "fieldsV1": {

    "f:spec": {

    "f:template": {

    "f:spec": {

    "f:containers": {

    "k:{\"name\":\"nginx\"}": {

    ".": {}, ➊

    "f:env": {

    "k:{\"name\":\"key2\"}": {

    ".": {}, "f:name": {}, "f:value": {} ➋

    }

    },

    "f:name": {}

    }}}}}},

    "manager": "manager2", ➌

    "operation": "Apply",

    "time": "2022-06-15T17:21:16Z"

    },

    ```


    Finally, the first manager, **manager1**, decides to keep only the **key1** environment
    variable, removing the environment variables **key2** and **key3** from the initial
    manifest. For this, it will create the following patch and run the command (note
    that the **force** query parameter is not specified):


    ```

    -- patch2.yaml

    apiVersion: apps/v1

    kind: Deployment

    metadata:

    name: nginx

    spec:

    selector:

    matchLabels:

    app: nginx

    template:

    metadata:

    labels:

    app: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    env:

    - name: key1

    value: value1

    $ curl -X PATCH

    "$HOST/apis/apps/v1/namespaces/project1/deployments/nginx?fieldManager=manager1"

    -H "Content-Type: application/apply-patch+yaml"

    --data-binary @patch2.yaml

    ```


    You can see in the resulting deployment that the following is true:


    *   The **key2** is still present because it is owned by **manager2**.


    *   The **key3** is not present anymore because it was owned by **manager1**.


    ```

    $ kubectl get deployments.apps nginx -o yaml

    [...]

    spec:

    containers:

    - env:

    - name: key1

    value: value1

    - name: key2

    value: value2bis

    image: nginx

    name: nginx

    [...]

    ```'
