- fmt: "## The Controller\n\nThe second important abstraction is the `Controller`.\
    \ The Controller is responsible for implementing the specifications (Spec) given\
    \ by the instances of a specific Kubernetes resource. (In the Operator case, the\
    \ Custom Resource is handled by the Operator.)\n\nFor this, the Controller watches\
    \ for specific resources (at least the associated Custom Resource, which is called\
    \ the “primary resource” in this section), and receives `Watch` events (i.e.,\
    \ Create, Update, Delete) for these resources. When events happen on resources,\
    \ the Controller populates a Queue with a `Request` containing the name and namespace\
    \ of the “primary resource” instance affected by the event.\n\nNote that the objects\
    \ enqueued are only instances of the primary resource watched by the Operator.\
    \ If the event is received by an instance of another resource, the primary resource\
    \ is found by following `ownerReference`. For example, the Deployment controller\
    \ watches Deployment resources and `ReplicaSet` resources. All `ReplicaSet` instances\
    \ contain an `ownerReference` to a Deployment instance.\n\n- When a Deployment\
    \ is created, a `Create` event is received by the controller, and the Deployment\
    \ instance just created is enqueued.\n- When a `ReplicaSet` is modified (e.g.,\
    \ by some user), an `Update` event is received for this `ReplicaSet`, and the\
    \ Controller finds the Deployment referenced by the updated `ReplicaSet`, using\
    \ the `ownerReference` contained in the `ReplicaSet`. Then, the referenced Deployment\
    \ instance is enqueued.\n\nThe `Controller` implements a `Reconcile` method, which\
    \ will be called every time a Request is available in the queue. This `Reconcile`\
    \ method receives as a parameter the `Request`, containing the name and namespace\
    \ of the primary resource to reconcile.\n\nNote that the event that triggered\
    \ the request is not part of the request and thus, the `Reconcile` method cannot\
    \ rely on this information. Further, in case the event happens for an owned resource,\
    \ only the primary resource is enqueued, and the `Reconcile` method cannot rely\
    \ on which owned resource triggered the event.\n\nAlso, because multiple events\
    \ can occur in a short time related to the same primary resource, Requests can\
    \ be batched together to limit the number of Requests enqueued.\n\n### Creating\
    \ a Controller\n\nTo create a Controller, you need to use the `New` function provided:\n\
    \n```\nimport (\n    \"sigs.k8s.io/controller-runtime/pkg/controller\"\n)\ncontroller,\
    \ err = controller.New(\n    \"my-operator\", mgr,\n    controller.Options{\n\
    \        Reconciler: myReconciler,\n    })\n```\n\nThe `Reconciler` option is\
    \ required, and its value is an object that must implement the `Reconciler` interface,\
    \ defined as:\n\n```\ntype Reconciler interface {\n    Reconcile(context.Context,\
    \ Request) (Result, error)\n}\n```\n\nAs a facility, the `reconcile.Func` type\
    \ is provided, which implements the `Reconciler` interface, and is the same type\
    \ as a function with the same signature as the `Reconcile` method.\n\n```\ntype\
    \ Func func(context.Context, Request) (Result, error)\nfunc (r Func) Reconcile(ctx\
    \ context.Context, o Request) (Result, error) { return r(ctx, o) }\n```\n\nThanks\
    \ to this `reconcile.Func` type, you can cast a function with the Reconcile signature\
    \ and assign it to the `Reconciler` option. For example:\n\n```\ncontroller, err\
    \ = controller.New(\n    \"my-operator\", mgr,\n    controller.Options{\n    \
    \    Reconciler: reconcile.Func(reconcileFunction),\n    })\nfunc reconcileFunction(\n\
    \    ctx context.Context,\n    r reconcile.Request,\n) (reconcile.Result, error)\
    \ {\n    [...]\n    return reconcile.Result{}, nil\n}\n```\n\n### Watching Resources\n\
    \nAfter the controller is created, you need to indicate to the container which\
    \ resources to watch, and whether these are the primary resource or owned resources.\n\
    \nThe method `Watch` on the controller is used to add a Watch. The method is defined\
    \ as follows:\n\n```\nWatch(\n    src source.Source,\n    eventhandler handler.EventHandler,\n\
    \    predicates ...predicate.Predicate,\n) error\n```\n\nThe first parameter indicates\
    \ what is the source of the events to watch, and its type is the `source.Source`\
    \ interface. Two implementations are provided for the `Source` interface by the\
    \ `controller-runtime` Library:\n\n- The `Kind` source is used to watch for events\
    \ on Kubernetes objects of a specific kind. The `Type` field of the `Kind` structure\
    \ is required, and its value is an object of the wanted kind. For example, if\
    \ we want to watch for Deployment, the value of `src` parameter would be:\n\n\
    ```\ncontroller.Watch(\n    &source.Kind{\n        Type: &appsv1.Deployment{},\n\
    \    },\n    ...\n```\n\n- The `Channel` source is used to watch for events originating\
    \ from outside the cluster. The `Source` field of the `Channel` structure is required,\
    \ and its value is a channel emitting objects of type `event.GenericEvent`.\n\n\
    The second parameter is an event handler, and its type is the `handler.EventHandler`\
    \ interface. Two implementations are provided for the `EventHandler` interface\
    \ by the `controller-runtime` Library:\n\n- The `EnqueueRequestForObject` event\
    \ handler is used for the primary resource handled by the controller. In this\
    \ case, the controller will place into the queue the object attached to the event.\
    \ For example, if the controller is an operator handling the custom resource created\
    \ in Chapter 9, you will write:\n\n```\ncontroller.Watch(\n    &source.Kind{\n\
    \        Type: &mygroupv1alpha1.MyResource{},\n    },\n    &handler.EnqueueRequestForObject{},\n\
    )\n```\n\n- The `EnqueueRequestForOwner` event handler is used for resources owned\
    \ by the primary resource. One field of the `EnqueueRequestForOwner` is required:\
    \ `OwnerType`. The value for this field is an object of the type of the primary\
    \ resource; the controller will follow the ownerReferences until it finds an object\
    \ of this type, and it places this object into the queue.\n\n- For example, if\
    \ the Controller handles the `MyResource` primary resource and is creating `Pods`\
    \ to implement `MyResource`, it will want to Watch for `Pod` resources using this\
    \ event handler and specify a `MyResource` object as `OwnerType`.\n\n- If the\
    \ field `IsController` is set to true, the Controller will consider only the ownerReferences\
    \ with `Controller: true`.\n\n```\ncontroller.Watch(\n    &source.Kind{\n    \
    \    Type: &corev1.Pod{},\n    },\n    &handler.EnqueueRequestForOwner{\n    \
    \    OwnerType: &mygroupv1alpha1.MyResource{},\n        IsController: true,\n\
    \    },\n)\n```\n\nThe third parameter is an optional list of predicates, and\
    \ its type is `predicate.Predicate`. Several implementations are provided for\
    \ the `Predicate` interface from the `controller-runtime` Library:\n\n- `Funcs`\
    \ is the most generic implementation. The `Funcs` structure is defined as follows:\n\
    \n- You can pass an instance of this structure to the `Watch` method, as a Predicate.\n\
    - Nondefined fields will indicate that events of the matching type should be processed.\n\
    - For non-nil fields, the function matching the event will be called (note that\
    \ the `GenericFunc` will be called when the source is a Channel; see preceding),\
    \ and the event will be processed if the function returns true.\n- Using this\
    \ implementation of `Predicate`, you can define a specific function for each event\
    \ type.\n\n- `func NewPredicateFuncs(`"
  raw: '## The Controller


    The second important abstraction is the *Controller*. The Controller is responsible
    for implementing the specifications (Spec) given by the instances of a specific
    Kubernetes resource. (In the Operator case, the Custom Resource is handled by
    the Operator.)


    For this, the Controller watches for specific resources (at least the associated
    Custom Resource, which is called the “primary resource” in this section), and
    receives **Watch** events (i.e., Create, Update, Delete) for these resources.
    When events happen on resources, the Controller populates a Queue with a *Request*
    containing the name and namespace of the “primary resource” instance affected
    by the event.


    Note that the objects enqueued are only instances of the primary resource watched
    by the Operator. If the event is received by an instance of another resource,
    the primary resource is found by following **ownerReference**. For example, the
    Deployment controller watches Deployment resources and **ReplicaSet** resources.
    All **ReplicaSet** instances contain an **ownerReference** to a Deployment instance.


    *   When a Deployment is created, a **Create** event is received by the controller,
    and the Deployment instance just created is enqueued,


    *   When a **ReplicaSet** is modified (e.g., by some user), an **Update** event
    is received for this **ReplicaSet**, and the Controller finds the Deployment referenced
    by the updated **ReplicaSet**, using the **ownerReference** contained in the **ReplicaSet**.
    Then, the referenced Deployment instance is enqueued.


    The *Controller* implements a **Reconcile** method, which will be called every
    time a Request is available in the queue. This **Reconcile** method receives as
    a parameter the **Request**, containing the name and namespace of the primary
    resource to *reconcile*.


    Note that the event that triggered the request is not part of the request and
    thus, the **Reconcile** method cannot rely on this information. Further, in case
    the event happens for an owned resource, only the primary resource is enqueued,
    and the **Reconcile** method cannot rely on which owned resource triggered the
    event.


    Also, because multiple events can occur in a short time related to the same primary
    resource, Requests can be batched together to limit the number of Requests enqueued.


    ### Creating a Controller


    To create a Controller, you need to use the **New** function provided:


    ```

    import (

    "sigs.k8s.io/controller-runtime/pkg/controller"

    )

    controller, err = controller.New(

    "my-operator", mgr,

    controller.Options{

    Reconciler: myReconciler,

    })

    ```


    The **Reconciler** option is required, and its value is an object that must implement
    the **Reconciler** interface, defined as:


    ```

    type Reconciler interface {

    Reconcile(context.Context, Request) (Result, error)

    }

    ```


    As a facility, the **reconcile.Func** type is provided, which implements the **Reconciler**
    interface, and is the same type as a function with the same signature as the **Reconcile**
    method.


    ```

    type Func func(context.Context, Request) (Result, error)

    func (r Func) Reconcile(ctx context.Context, o Request) (Result, error) { return
    r(ctx, o) }

    ```


    Thanks to this **reconcile.Func** type, you can cast a function with the Reconcile
    signature and assign it to the **Reconciler** option. For example:


    ```

    controller, err = controller.New(

    "my-operator", mgr,

    controller.Options{

    Reconciler: reconcile.Func(reconcileFunction),

    })

    func reconcileFunction(

    ctx context.Context,

    r reconcile.Request,

    ) (reconcile.Result, error) {

    [...]

    return reconcile.Result{}, nil

    }

    ```


    ### Watching Resources


    After the controller is created, you need to indicate to the container which resources
    to watch, and whether these are the *primary* resource or *owned* resources.


    The method **Watch** on the controller is used to add a Watch. The method is defined
    as follows:


    ```

    Watch(

    src source.Source,

    eventhandler handler.EventHandler,

    predicates ...predicate.Predicate,

    ) error

    ```


    The first parameter indicates what is the source of the events to watch, and its
    type is the **source.Source** interface. Two implementations are provided for
    the **Source** interface by the **controller-runtime** Library:


    *   The **Kind** source is used to watch for events on Kubernetes objects of a
    specific kind. The **Type** field of the **Kind** structure is required, and its
    value is an object of the wanted kind. For example, if we want to watch for Deployment,
    the value of **src** parameter would be:


    *   The **Channel** source is used to watch for events originating from outside
    the cluster. The **Source** field of the **Channel** structure is required, and
    its value is a channel emitting objects of type **event.GenericEvent**.


    ```

    controller.Watch(

    &source.Kind{

    Type: &appsv1.Deployment{},

    },

    ...

    ```


    The second parameter is an event handler, and its type is the **handler.EventHandler**
    interface. Two implementations are provided for the **EventHandler** interface
    by the **controller-runtime** Library:


    *   The **EnqueueRequestForObject** event handler is used for the primary resource
    handled by the controller. In this case, the controller will place into the queue
    the object attached to the event. For example, if the controller is an operator
    handling the custom resource created in Chapter [9](#533908_1_En_9_Chapter.xhtml),
    you will write:


    *   The **EnqueueRequestForOwner** event handler is used for resources owned by
    the primary resource. One field of the **EnqueueRequestForOwner** is required:
    **OwnerType**. The value for this field is an object of the type of the primary
    resource; the controller will follow the ownerReferences until it finds an object
    of this type, and it places this object into the queue.


    *   For example, if the Controller handles the **MyResource** primary resource
    and is creating **Pods** to implement **MyResource**, it will want to Watch for
    **Pod** resources using this event handler and specify a **MyResource** object
    as **OwnerType**.


    *   If the field **IsController** is set to true, the Controller will consider
    only the ownerReferences with **Controller: true**.


    ```

    controller.Watch(

    &source.Kind{

    Type: &mygroupv1alpha1.MyResource{},

    },

    &handler.EnqueueRequestForObject{},

    )

    ```


    ```

    controller.Watch(

    &source.Kind{

    Type: &corev1.Pod{},

    },

    &handler.EnqueueRequestForOwner{

    OwnerType: &mygroupv1alpha1.MyResource{},

    IsController: true,

    },

    )

    ```


    The third parameter is an optional list of *predicates*, and its type is **predicate.Predicate**.
    Several implementations are provided for the **Predicate** interface from the
    **controller-runtime** Library:


    *   **Funcs** is the most generic implementation. The **Funcs** structure is defined
    as follows:


    *   You can pass an instance of this structure to the **Watch** method, as a Predicate.


    *   Nondefined fields will indicate that events of the matching type should be
    processed.


    *   For non-nil fields, the function matching the event will be called (note that
    the **GenericFunc** will be called when the source is a Channel; see preceding),
    and the event will be processed if the function returns true.


    *   Using this implementation of **Predicate**, you can define a specific function
    for each event type.


    *   **func NewPredicateFuncs(**'
