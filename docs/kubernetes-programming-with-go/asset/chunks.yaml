    \ `Watch` 事件（即创建、更新、删除）。当资源上发生事件时，控制器会将包含受事件影响的“主资源”实例的名称和命名空间的 `Request` 放入队列。\n\
    \n请注意，入队的对象仅限于 Operator 所监视的主资源实例。如果事件是由其他资源的实例接收的，则通过跟踪 `ownerReference` 来查找主资源。例如，Deployment\
    \ 控制器会监视 Deployment 资源和 `ReplicaSet` 资源。所有 `ReplicaSet` 实例都包含指向某个 Deployment 实例的\
    \ `ownerReference`。\n\n-   当创建 Deployment 时，控制器会收到一个 `Create` 事件，并且刚创建的 Deployment\
    \ 实例会被入队。\n-   当 `ReplicaSet` 被修改时（例如被某个用户），此 `ReplicaSet` 会收到一个 `Update` 事件，控制器会使用该\
    \ `ReplicaSet` 中包含的 `ownerReference` 查找被更新的 `ReplicaSet` 所引用的 Deployment。然后，该引用的\
    \ Deployment 实例会被入队。\n\n`Controller` 实现了一个 `Reconcile` 方法，每当队列中有可用的 Request 时，就会调用此方法。此\
    \ `Reconcile` 方法接收 `Request` 作为参数，其中包含待协调的主资源的名称和命名空间。\n\n请注意，触发该请求的事件并不属于请求的一部分，因此\
    \ `Reconcile` 方法不能依赖此信息。此外，如果事件发生在被拥有的资源上，只有主资源会被入队，`Reconcile` 方法不能依赖是哪个被拥有的资源触发了该事件。\n\
    \n同时，由于同一主资源在短时间内可能发生多个事件，因此请求可以被批量处理，以限制入队的请求数量。\n\n### 创建控制器\n\n要创建一个控制器，你需要使用提供的\
    \ `New` 函数：\n\n```\nimport (\n    \"sigs.k8s.io/controller-runtime/pkg/controller\"\
    \n)\ncontroller, err = controller.New(\n    \"my-operator\", mgr,\n    controller.Options{\n\
    \        Reconciler: myReconciler,\n    })\n```\n\n`Reconciler` 选项是必需的，其值是一个必须实现\
    \ `Reconciler` 接口的对象，该接口定义如下：\n\n```\ntype Reconciler interface {\n    Reconcile(context.Context,\
    \ Request) (Result, error)\n}\n```\n\n为了方便起见，提供了 `reconcile.Func` 类型，它实现了 `Reconciler`\
    \ 接口，并且与具有与 `Reconcile` 方法相同签名的函数类型相同。\n\n```\ntype Func func(context.Context,\
    \ Request) (Result, error)\nfunc (r Func) Reconcile(ctx context.Context, o Request)\
    \ (Result, error) { return r(ctx, o) }\n```\n\n借助这个 `reconcile.Func` 类型，你可以将一个具有\
    \ Reconcile 签名的函数进行类型转换，并将其赋值给 `Reconciler` 选项。例如：\n\n```\ncontroller, err = controller.New(\n\
    \    \"my-operator\", mgr,\n    controller.Options{\n        Reconciler: reconcile.Func(reconcileFunction),\n\
    \    })\nfunc reconcileFunction(\n    ctx context.Context,\n    r reconcile.Request,\n\
    ) (reconcile.Result, error) {\n    [...]\n    return reconcile.Result{}, nil\n\
    }\n```\n\n### 监视资源\n\n创建控制器后，你需要向该容器指明要监视哪些资源，以及这些资源是主资源还是被拥有的资源。\n\n使用控制器的 `Watch`\
    \ 方法来添加一个监视。该方法的定义如下：\n\n```\nWatch(\n    src source.Source,\n    eventhandler\
    \ handler.EventHandler,\n    predicates ...predicate.Predicate,\n) error\n```\n\
    \n第一个参数指明要监视的事件的来源，其类型是 `source.Source` 接口。`controller-runtime` 库为 `Source` 接口提供了两种实现：\n\
    \n-   `Kind` 来源用于监视特定类型 Kubernetes 对象的事件。`Kind` 结构体的 `Type` 字段是必需的，其值是一个所需类型的对象。例如，如果我们想监视\
    \ Deployment，则 `src` 参数的值应为：\n\n```\ncontroller.Watch(\n    &source.Kind{\n  \
    \      Type: &appsv1.Deployment{},\n    },\n    ...\n```\n\n-   `Channel` 来源用于监视源自集群外部的事件。`Channel`\
    \ 结构体的 `Source` 字段是必需的，其值是一个发射 `event.GenericEvent` 类型对象的通道。\n\n第二个参数是事件处理器，其类型是\
    \ `handler.EventHandler` 接口。`controller-runtime` 库为 `EventHandler` 接口提供了两种实现：\n\
    \n-   `EnqueueRequestForObject` 事件处理器用于控制器处理的主资源。在这种情况下，控制器会将事件所附带的那个对象放入队列。例如，如果控制器是一个处理第\
    \ 9 章中创建的自定义资源的 operator，你可以这样写：\n\n```\ncontroller.Watch(\n    &source.Kind{\n\
    \        Type: &mygroupv1alpha1.MyResource{},\n    },\n    &handler.EnqueueRequestForObject{},\n\
    )\n```\n\n-   `EnqueueRequestForOwner` 事件处理器用于被主资源拥有的资源。`EnqueueRequestForOwner`\
    \ 的一个字段是必需的：`OwnerType`。此字段的值是主资源类型的对象；控制器会追踪 ownerReferences，直到找到此类型的对象，并将此对象放入队列。\n\
    \n-   例如，如果控制器处理 `MyResource` 主资源并创建 `Pods` 来实现 `MyResource`，它将希望使用此事件处理器监视 `Pod`\
    \ 资源，并指定一个 `MyResource` 对象作为 `OwnerType`。\n\n-   如果 `IsController` 字段设置为 true，控制器将只考虑\
    \ `Controller: true` 的 ownerReferences。\n\n```\ncontroller.Watch(\n    &source.Kind{\n\
    \        Type: &corev1.Pod{},\n    },\n    &handler.EnqueueRequestForOwner{\n\
    \        OwnerType: &mygroupv1alpha1.MyResource{},\n        IsController: true,\n\
    \    },\n)\n```\n\n第三个参数是可选的谓语列表，其类型是 `predicate.Predicate`。`controller-runtime`\
    \ 库为 `Predicate` 接口提供了几种实现：\n\n-   `Funcs` 是最通用的实现。`Funcs` 结构体定义如下：\n\n-   你可以将\
    \ `Funcs` 结构体的实例作为 Predicate 传递给 `Watch` 方法。\n-   未定义的字段表示应处理匹配类型的事件。\n-   对于非\
    \ nil 的字段，将调用与事件匹配的函数（注意，当 source 为 Channel 时，将调用 `GenericFunc`；见前述），如果该函数返回 true，则该事件将被处理。\n\
    -   使用 `Predicate` 的这个实现，你可以为每种事件类型定义特定的函数。\n\n-   `func NewPredicateFuncs(`\n"
- fmt: "```go\ntype Funcs struct {\n\t// Create returns true if the Create event\n\
    \t// should be processed\n\tCreateFunc func(event.CreateEvent) bool\n\t// Delete\
    \ returns true if the Delete event\n\t// should be processed\n\tDeleteFunc func(event.DeleteEvent)\
    \ bool\n\t// Update returns true if the Update event\n\t// should be processed\n\
    \tUpdateFunc func(event.UpdateEvent) bool\n\t// Generic returns true if the Generic\
