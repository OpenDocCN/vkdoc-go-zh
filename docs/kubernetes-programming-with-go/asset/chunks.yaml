- fmt: '# Conclusion


    This chapter has shown how to implement the `Reconcile` function for a simple
    operator that creates a Deployment using information from the Custom Resource.


    Real operators generally will be more complex than this simple example by creating
    several resources having more complex lifecycle, but it demonstrates the main
    points to know when starting to write an operator: The declarative nature of the
    `Reconcile` loop, the use of Owner References, the use of Server-side Apply, and
    how the status is updated.


    The next chapter will show how to test the `Reconcile` loop.


    # 12. Testing the Reconcile Loop


    The previous chapter described how to implement a simple, but complete, `Reconcile`
    function for an Operator reconciling a Custom Resource.


    To test the `Reconcile` function you have written in the previous chapter, you
    will use `ginkgo`, which is a Testing Framework for Go; and the `envtest` package
    from the `controller-runtime` Library, which provides a Kubernetes environment
    for testing.


    ## The envtest Package


    The `controller-runtime` Library provides an `envtest` package. This package provides
    a Kubernetes environment by starting a simple local control plane.


    By default, the package uses local binaries for `etcd` and `kube-apiserver` located
    in `/usr/local/kubebuilder/bin`, and you can provide your own path to find these
    binaries. You can install `setup-envtest` to obtain these binaries for various
    Kubernetes versions.


    ### Installing envtest Binaries


    The `setup-envtest` tool can be used to install binaries used by `envtest`. To
    install the tool, you must run:


    ```

    $ go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

    ```


    Then, you can install the binaries for a specific Kubernetes version using the
    following command:


    ```

    $ setup-envtest use 1.23

    Version: 1.23.5

    OS/Arch: linux/amd64

    Path: /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64

    ```


    The output of the command will inform you in which directory the binaries have
    been installed. If you want to use these binaries from the default directory,
    `/usr/local/kubebuilder/bin`, you can create a symbolic link to access them from
    there:


    ```

    $ sudo mkdir /usr/local/kubebuilder

    $ sudo ln -s /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64 /usr/local/kubebuilder/bin

    ```


    Or, if you prefer to use the `KUBEBUILDER_ASSETS` environment variable to define
    the directory containing the binaries, you can execute:


    ```

    $ source <(setup-envtest use -i -p env 1.23.5)

    $ echo $KUBEBUILDER_ASSETS

    /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64

    ```


    This will define and export the `KUBEBUILDER_ASSETS` variable with the path containing
    the binaries for Kubernetes 1.23.5.


    ### Using envtest


    The control plane will only run the API Server and `etcd`, but no controller.
    This means that when the operator you want to test will create Kubernetes resources,
    no controller will react. For example, if the operator creates a Deployment, no
    pod will be created, and the deployment status will never be updated.


    This can be surprising at first, but this will help you test your operator only,
    not the Kubernetes controllers. To create the Test Environment, you first need
    to create an instance of an `envtest.Environment` structure.


    Using default values for the `Environment` structure will start a local control
    plane using binaries in `/usr/local/kubebuilder/bin` or from the directory defined
    in the `KUBEBUILDER_ASSETS` environment variable.


    If you are writing an operator reconciling a custom resource, you will need to
    add the Custom Resource Definition (CRD) for this custom resource. For this, you
    can use the `CRDDirectoryPaths` field to pass the list of directories containing
    CRD definitions in YAML or JSON format. All these definitions will be applied
    to the local cluster when initializing the environment.


    The field `ErrorIfCRDPathMissing` is useful if you want to be alerted when the
    CRD directories do not exist. As an example, here is how an `Environment` structure
    can be created, with the CRD YAML or JSON files located in the `../../crd` directory:


    ```

    import (

    "path/filepath"

    "sigs.k8s.io/controller-runtime/pkg/envtest"

    )

    testEnv = &envtest.Environment{

    CRDDirectoryPaths:     []string{

    filepath.Join("..", "..", "crd"),

    },

    ErrorIfCRDPathMissing: true,

    }

    ```


    To start the environment, you can use the `Start` method on this `Environment`:


    ```

    cfg, err := testEnv.Start()

    ```


    This method returns a `rest.Config` value, which is the `Config` value to be used
    to connect to the local cluster launched by the `Environment`. At the end of the
    test, the `Environment` can be stopped using the `Stop` method:


    ```

    err := testEnv.Stop()

    ```


    Once the environment is started and you have a `Config`, you can create the Manager
    and the Controller and start the Manager, as described in Chapter 10.'
