    \ *acappsv1.DeploymentApplyConfiguration,\nopts metav1.ApplyOptions,\n) (result\
    \ *v1.Deployment, err error)\n```\n\nThe **ApplyOptions** structure defines the\
    \ following options:\n\n*   `DryRun` – this indicates which operations on the\
    \ API Server-side should be executed. The only available value is **metav1.DryRunAll**,\
    \ indicating execution of all the operations except persisting the resource to\
    \ storage.\n\n*   `Force` – this caller will reacquire the conflicting fields\
    \ owned by other managers.\n\n*   `FieldManager` – this is the name of the *manager*\
    \ making the **Apply** operation. This value is required.\n\nThis signature of\
    \ **Apply** is like the signatures of the **Create** or **Update** operations,\
    \ except that a **DeploymentApplyConfiguration** object is expected, instead of\
    \ a **Deployment** object.\n\nAs seen in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ “Applying Resources Server-side” section, the **Apply** operation permits several\
    \ *managers* to work on the same resource, each manager owning a set of values\
    \ in the resource specification.\n\nFor this reason, the data passed for the operation\
    \ will not define all the fields, but only the fields the *manager* is *responsible\
    \ for*. Some of the fields are required in the structures of resource definitions;\
    \ it is not possible to use these structures for the **Apply** operation.\n\n\
    The Client-go Library introduces new structures, named *Apply Configurations*,\
    \ in the **applyconfigurations** directory of the library, with all fields being\
    \ optional, using pointers. This directory contains generated source code for\
    \ all native resources of the Kubernetes API, with the same structure of it. For\
    \ example, to access the structures needed to define the data for applying a **Deployment**\
    \ from the **apps/v1** group, you need to import the following package:\n\n```\n\
    import (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\n)\n```\n\n\
    Note that, for the same reason as you want to define an alias for packages imported\
    \ from the Kubernetes API Library (because most packages are named **v1**), you\
    \ will want to use aliases when importing these packages. This book uses the same\
    \ system as the API Library, prefixing the alias with **ac** to indicate it comes\
    \ from the **applyconfigurations** directory.\n\nTwo possibilities are offered\
    \ by the Client-go to build an **ApplyConfiguration**: from scratch or from an\
    \ existing resource."
  trans: "\n# 使用 Patch 进行服务端应用\n\n第 2 章的“服务端应用资源”部分描述了服务端应用 Patch 的工作原理。概括来说，我们需要：\n\
    \n-   使用 `Patch` 操作\n-   为 `content-type` 头部指定一个特定值\n-   在请求体中仅传入你想要修改的字段\n- \
    \  提供一个 `fieldManager` 名称\n\n使用客户端库，你可以对要补丁的资源使用 `Patch` 方法。请注意，你也可以使用 `Apply`\
    \ 方法；请参考下一节“使用 Apply 进行服务端应用”。\n\n```\nPatch(\nctx context.Context,\nname string,\n\
    pt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources ...string,\n\
    ) (result *v1.Deployment, err error)\n```\n\n`Patch` 类型指示了补丁的类型，在这种情况下是 `types.ApplyPatchType`，定义在\
    \ `k8s.io/apimachinery/pkg/types` 包中。\n\n`data` 字段包含你要应用于资源的补丁。你可以使用 `client.Apply`\
    \ 值来构建此数据。该值实现了 `client.Patch` 接口，提供了 `Type` 和 `Data` 方法。\n\n请注意，你需要在你想要补丁的资源结构中设置\
    \ `APIVersion` 和 `Kind` 字段。同时请注意，此 `Apply` 操作也可用于创建资源。\n\n`Patch` 操作接受一个 `subresources`\
    \ 参数。此参数可用于补丁应用了 `Patch` 方法的资源的子资源。例如，要补丁一个 `Deployment` 的 `Status`，你可以对子资源参数使用值\
    \ `\"status\"`。\n\n```\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\n\
    wantedDep := appsv1.Deployment{\nSpec: appsv1.DeploymentSpec{\nReplicas: pointer.Int32(1),\n\
    [...]\n}\nwantedDep.SetName(\"dep1\")\nwantedDep.APIVersion, wantedDep.Kind =\n\
    appsv1.SchemeGroupVersion.\nWithKind(\"Deployment\").\nToAPIVersionAndKind()\n\
    patch := client.Apply\npatchData, err := patch.Data(&wantedDep)\npatchedDep, err\
    \ := clientset.\nAppsV1().Deployments(\"project1\").Patch(\nctx,\n\"dep1\",\n\
    patch.Type(),\npatchData,\nmetav1.PatchOptions{\nFieldManager: \"my-program\"\
    ,\n},\n)\n```\n\n你可以在调用 `Patch` 操作时传入 `PatchOptions`。以下为可能的选项：\n\n-   `DryRun`\
    \ – 指示应在 API 服务端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n-  \
    \ `Force` – 此选项指示*强制应用*请求。这意味着此请求的字段管理器将获取由其他字段管理器拥有的冲突字段。\n-   `FieldManager`\
    \ – 指示此操作的字段管理器的名称。此选项对于*应用 Patch* 请求是强制性的。\n-   `FieldValidation` – 指示当结构中存在重复或未知字段时，服务器应如何响应。可能的值有：\n\
    \    -   `metav1.FieldValidationIgnore` – 忽略所有重复或未知字段\n    -   `metav1.FieldValidationWarn`\
    \ – 当存在重复或未知字段时发出警告\n    -   `metav1.FieldValidationStrict` – 当存在重复或未知字段时操作失败\n\
    \n以下是特定于 `ApplyPatch` 操作的可能错误：\n\n-   `IsInvalid` – 此函数指示作为补丁传入的数据是否无效。\n-   `IsConflict`\
    \ – 此函数指示补丁修改的某些字段是否因为被另一个字段管理器拥有而发生冲突。要解决此冲突，你可以使用 `Force` 选项，以便这些字段将由本次操作的字段管理器获取。\n\
    \n## 使用应用配置进行服务端应用\n\n上一节展示了如何通过使用 `Patch` 方法来执行服务端*应用*操作。其缺点在于数据必须以 JSON 格式传递，这容易出错。\n\
    \n从 1.21 版本开始，客户端库 `Clientset` 提供了一种 `Apply` 方法，可以使用类型化的结构来执行服务端*应用*操作。以下是 `Apply`\
    \ 方法的签名：\n\n```\nApply(\nctx context.Context,\ndeployment *acappsv1.DeploymentApplyConfiguration,\n\
    opts metav1.ApplyOptions,\n) (result *v1.Deployment, err error)\n```\n\n`ApplyOptions`\
    \ 结构定义了以下选项：\n\n-   `DryRun` – 指示应在 API 服务端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n\
    -   `Force` – 此调用方将重新获取由其他管理器拥有的冲突字段。\n-   `FieldManager` – 这是执行 `Apply` 操作的*管理器*的名称。此值是必需的。\n\
    \n`Apply` 的这个签名与 `Create` 或 `Update` 操作的签名类似，不同之处在于它期望一个 `DeploymentApplyConfiguration`\
    \ 对象，而不是 `Deployment` 对象。\n\n如第 2 章的“服务端应用资源”部分所述，`Apply` 操作允许多个*管理器*在同一个资源上工作，每个管理器拥有资源规范中的一组值。\n\
    \n因此，为此操作传入的数据不会定义所有字段，而只定义该*管理器*所*负责*的字段。有些字段在资源定义的结构中是必需的；无法将这些结构用于 `Apply`\
    \ 操作。\n\n客户端库在 `applyconfigurations` 目录中引入了名为*应用配置*的新结构，所有字段都是可选的，使用指针。此目录包含 Kubernetes\
    \ API 所有原生资源的生成源代码，其结构与 API 相同。例如，要访问定义用于应用 `apps/v1` 组的 `Deployment` 的数据所需的结构，你需要导入以下包：\n\
    \n```\nimport (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\n)\n\
    ```\n\n请注意，出于与你想为从 Kubernetes API 库导入的包定义别名相同的原因（因为大多数包都命名为 `v1`），在导入这些包时，你也将希望使用别名。本书使用与\
    \ API 库相同的系统，在别名前加上前缀 `ac` 以指示其来自 `applyconfigurations` 目录。\n\n客户端库提供了两种构建 `ApplyConfiguration`\
    \ 的方式：从零开始，或从现有资源构建。\n"
- fmt: "### Building an ApplyConfiguration from Scratch\n\nThe first way to build\
    \ an `ApplyConfiguration` is to build it from scratch. You first need to initialize\
    \ the structure with the mandatory fields: `kind`, `apiVersion`, `name`, and `namespace`\
    \ (if the resource is namespaced); this is done with a helper function that is\
    \ provided by the related package. For example, for a `Deployment` resource:\n\
    \n```\ndeploy1Config := acappsv1.Deployment(\n\"deploy1\",\n\"default\",\n)\n\
    ```\n\nThe implementation of this function uses the following:\n\n```\nfunc Deployment(\n\
    name string,\nnamespace string,\n) *DeploymentApplyConfiguration {\nb := &DeploymentApplyConfiguration{}\n\
    b.WithName(name)\nb.WithNamespace(namespace)\nb.WithKind(\"Deployment\")\nb.WithAPIVersion(\"\
    apps/v1\")\nreturn b\n}\n```\n\nThen, you can specify the fields you want to manage.\
    \ Helper functions in the form `With*Field*()` are provided to establish specific\
    \ fields. For example, if your program is responsible only for setting the number\
    \ of replicas for the deployment, the code will be:\n\n```\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    deploy1Config.Spec.WithReplicas(2)\n```\n\nFinally, you can call the `Apply` method.\
    \ The complete code is the following:\n\n```\nimport (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\
    \n)\ndeploy1Config := acappsv1.Deployment(\n\"deploy1\",\n\"default\",\n)\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    deploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
    default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
    my-manager\",\nForce:        true,\n},\n)\n```\n\n### Building an ApplyConfiguration\
    \ from an Existing Resource\n\nThe second way to build an `ApplyConfiguration`\
    \ is to start from an existing resource in the cluster. Sometimes a program is\
    \ not able to build the entire `ApplyConfiguration` in one place. For example,\
    \ imagine your program is responsible for defining a container with a specific\
    \ image for a `Deployment` in one place and also is responsible for setting the\
    \ number of replicas in another place.\n\nIf the program defines the container\
    \ and its image first, it will be marked as the owner of the container and its\
    \ image. Then, if the program builds an `ApplyConfiguration` and sets only the\
    \ number of replicas, without specifying the container and its image, the server-side\
    \ `Apply` operation will try to delete the container. This is because the program\
    \ designated the owner of this container, but it does not specify it anymore in\
    \ the `ApplyConfiguration`.\n\nA possibility would be to use diverse manager names\
    \ for the various parts of the program. If you want to keep a single manager name,\
    \ however, the packages in the `applyconfigurations` directory provide an `Extract*Resource()`\
    \ helper function to assist you in this case.\n\nThese functions will get as parameter\
    \ a resource read from the cluster (with a `Get` or a `List` operation) and will\
    \ build an `ApplyConfiguration` containing only the fields owned by the specified\
    \ `fieldManager`. For example, the signature for the `ExtractDeployment` helper\
    \ function is:\n\n```\nExtractDeployment(\ndeployment *apiappsv1.Deployment,\n\
    fieldManager string,\n) (*DeploymentApplyConfiguration, error)\n```\n\nThe first\
    \ steps are to read the deployment from the cluster, then extract the `ApplyConfiguration`\
    \ from it. At this point, it will contain all the fields managed by the program\
    \ (container and its image and the replicas). Then, you can specify the only fields\
    \ you want to modify—that is, the replicas for in this example:\n\n```\ngotDeploy1,\
    \ err := clientset.AppsV1().\nDeployments(\"default\").Get(\nctx,\n\"deploy1\"\
    ,\nmetav1.GetOptions{},\n)\nif err != nil {\nreturn err\n}\ndeploy1Config, err\
    \ := acappsv1.ExtractDeployment(\ngotDeploy1,\n\"my-manager\",\n)\nif err != nil\
    \ {\nreturn err\n}\nIf deploy1Config.Spec == nil {\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
    }\ndeploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
    default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
    my-manager\",\nForce:        true,\n},\n)\n```\n\n## Watching Resources\n\nChapter\
    \ [2](#533908_1_En_2_Chapter.xhtml)’s “Watching Resources” section describes how\
    \ the Kubernetes API can *watch* resources. Using the Client-go Library, you can\
    \ use the `Watch` method for the resource you want to watch.\n\n```\nWatch(\n\
    ctx context.Context,\nopts metav1.ListOptions,\n) (watch.Interface, error)\n```\n\
    \nThis `Watch` method returns an object that implements the interface `watch.Interface`\
    \ and providing the following methods:\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\
    \ntype Interface interface {\nResultChan() <-chan Event\nStop()\n}\n```\n\nThe\
    \ `ResultChan` method returns a Go channel (which you can only read) on which\
    \ you will be able to receive all the events.\n\nThe `Stop` method will stop the\
    \ `Watch` operation and close the channel that was received using `ResultChan`.\n\
    \nThe `watch.Event` object, received using the channel, is defined as follows:\n\
    \n```\ntype Event struct {\nType EventType\nObject runtime.Object\n}\n```\n\n\
    The `Type` field can get the values described earlier in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s\
    \ Table 2-2, and you can find constants for these various values in the `watch`\
    \ package: `watch.Added`, `watch.Modified`, `watch.Deleted`, `watch.Bookmark`,\
    \ and `watch.Error`.\n\nThe `Object` field implements the `runtime.Object` interface,\
    \ and its concrete type can be different depending on the value of the `Type`.\n\
    \nFor a `Type`, other than `Error`, the concrete type of the `Object` will be\
    \ the type of the resource you are watching (e.g., the `Deployment` type if you\
    \ are watching for *deployments*).\n\nFor the `Error` type, the concrete type\
    \ generally will be `metav1.Status`, but it could be any other type, depending\
    \ on the resource you are watching. As an example, here is a code for watching\
    \ Deployments:\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\nwatcher, err\
    \ := clientset.AppsV1().\nDeployments(\"project1\").\nWatch(\nctx,\nmetav1.ListOptions{},\n\
    )\nif err != nil {\nreturn err\n}\nfor ev := range watcher.ResultChan() {\nswitch\
    \ v := ev.Object.(type) {\ncase *appsv1.Deployment:\nfmt.Printf(\"%s %s\\n\",\
    \ ev.Type, v.GetName())\ncase *metav1.Status:\nfmt.Printf(\"%s\\n\", v.Status)\n\
    watcher.Stop()\n}\n}\n```\n\nThe various options to be declared into the `ListOptions`\
    \ structure, when watching resources, are the following:\n\n- `LabelSelector`,\
    \ `FieldSelector` – this is used to filter the elements watched by label or by\
    \ field. These options are detailed in the “Filtering the Result of a List” section.\n\
    - `Watch`, `AllowWatchBookmarks` – the `Watch` option indicates that a *Watch*\
    \ operation is running. This option is set automatically when executing the `Watch`\
    \ method; you do not have to set it explicitly.\n- The `AllowWatchBookmarks` option\
    \ asks the server to return *Bookmarks* regularly. The use of bookmarks is described\
    \ in Chapter [2](#533908_1_En_2_Chapter.xhtml)’s, “Allowing Bookmarks to Efficiently\
    \ Restart a *Watch* Request” section.\n- `ResourceVersion`, `ResourceVersionMatch`\
    \ – this indicates at which version of the `List` of resources you want to start\
    \ the `Watch` operation.\n- Note that, when receiving a response of a `List` operation,\
    \ a `ResourceVersion` value is indicated for the list element itself, as well\
    \ as *ResourceVersion* values for each element of the list. The `ResourceVersion`\
    \ to indicate in the Options refers to the `ResourceVersion` of the list.\n- The\
    \ `ResourceVersionMatch` option is not used for `Watch` operations. For a `Watch`\
    \ operations do the following:\n  - When `ResourceVersion` is not set, the API\
    \ will start the `Watch` operation at the most recent list of resources. The channel\
    \ first receives `ADDED` events to declare the initial state of the resource,\
    \ followed by other events when changes occur on the cluster."
