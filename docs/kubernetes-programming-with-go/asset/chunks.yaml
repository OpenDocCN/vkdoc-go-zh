    Once the environment is started and you have a **Config**, you can create the
    Manager and the Controller and start the Manager, as described in Chapter [10](#533908_1_En_10_Chapter.xhtml).'
  trans: '

    # 结论


    本章展示了如何为一个简单的 Operator 实现 `Reconcile` 函数，该 Operator 利用自定义资源中的信息创建了一个 Deployment。


    真实的 Operator 通常比这个简单示例更复杂，可能会创建多个具有更复杂生命周期的资源，但本章演示了开始编写 Operator 时需要了解的几个要点：`Reconcile`
    循环的声明式特性、**所有者引用**的使用、**服务端应用**的使用，以及状态更新方式。


    下一章将展示如何测试 `Reconcile` 循环。


    # 12. 测试调谐循环


    前一章描述了如何为调谐自定义资源的 Operator 实现一个简单但完整的 `Reconcile` 函数。


    为了测试你在前一章编写的 `Reconcile` 函数，你将使用 `ginkgo`（一个用于 Go 的测试框架）以及 `controller-runtime`
    库中的 `envtest` 包，后者提供了一个用于测试的 Kubernetes 环境。


    ## envtest 包


    `controller-runtime` 库提供了一个 `envtest` 包。该包通过启动一个简单的本地控制平面来提供 Kubernetes 环境。


    默认情况下，该包使用位于 `/usr/local/kubebuilder/bin` 的 `etcd` 和 `kube-apiserver` 本地二进制文件，你也可以提供自己的路径来查找这些二进制文件。你可以安装
    `setup-envtest` 来获取不同 Kubernetes 版本的这些二进制文件。


    ### 安装 envtest 二进制文件


    `setup-envtest` 工具可用于安装 `envtest` 使用的二进制文件。要安装该工具，你必须运行：


    ```

    $ go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest

    ```


    然后，你可以使用以下命令安装特定 Kubernetes 版本的二进制文件：


    ```

    $ setup-envtest use 1.23

    Version: 1.23.5

    OS/Arch: linux/amd64

    Path: /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64

    ```


    命令的输出将告知你二进制文件安装的目录。如果你想从默认目录 `/usr/local/kubebuilder/bin` 使用这些二进制文件，可以创建一个符号链接来访问它们：


    ```

    $ sudo mkdir /usr/local/kubebuilder

    $ sudo ln -s /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64 /usr/local/kubebuilder/bin

    ```


    或者，如果你更倾向于使用 `KUBEBUILDER_ASSETS` 环境变量来定义包含二进制文件的目录，可以执行：


    ```

    $ source <(setup-envtest use -i -p env 1.23.5)

    $ echo $KUBEBUILDER_ASSETS

    /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64

    ```


    这将定义并导出 `KUBEBUILDER_ASSETS` 变量，其值指向包含 Kubernetes 1.23.5 二进制文件的路径。


    ### 使用 envtest


    控制平面只会运行 API Server 和 `etcd`，但不会运行任何控制器。这意味着当你想要测试的 Operator 创建 Kubernetes 资源时，不会有任何控制器做出响应。例如，如果
    Operator 创建了一个 Deployment，不会有 Pod 被创建，且 Deployment 的状态永远不会更新。


    这起初可能会让人感到惊讶，但这将有助于你只测试自己的 Operator，而不测试 Kubernetes 控制器。要创建测试环境，你首先需要创建一个 `envtest.Environment`
    结构体的实例。


    使用 `Environment` 结构体的默认值将启动一个本地控制平面，该控制平面会使用 `/usr/local/kubebuilder/bin` 或 `KUBEBUILDER_ASSETS`
    环境变量所定义目录中的二进制文件。


    如果你正在编写一个调谐自定义资源的 Operator，则需要为该自定义资源添加自定义资源定义 (CRD)。为此，你可以使用 `CRDDirectoryPaths`
    字段来传递包含 YAML 或 JSON 格式 CRD 定义的目录列表。在初始化环境时，所有这些定义都将被应用到本地集群中。


    `ErrorIfCRDPathMissing` 字段在你希望在 CRD 目录不存在时收到警告时非常有用。以下是一个示例，展示了如何创建 `Environment`
    结构体，其中 CRD 的 YAML 或 JSON 文件位于 `../../crd` 目录中：


    ```

    import (

    "path/filepath"

    "sigs.k8s.io/controller-runtime/pkg/envtest"

    )

    testEnv = &envtest.Environment{

    CRDDirectoryPaths:     []string{

    filepath.Join("..", "..", "crd"),

    },

    ErrorIfCRDPathMissing: true,

    }

    ```


    要启动环境，你可以使用此 `Environment` 上的 `Start` 方法：


    ```

    cfg, err := testEnv.Start()

    ```


    该方法返回一个 `rest.Config` 值，该 `Config` 值用于连接到由 `Environment` 启动的本地集群。在测试结束时，可以使用 `Stop`
    方法停止 `Environment`：


    ```

    err := testEnv.Stop()

    ```


    一旦环境启动并且你有了一个 `Config`，你就可以创建 Manager 和 Controller 并启动 Manager，如第 10 章所述。

