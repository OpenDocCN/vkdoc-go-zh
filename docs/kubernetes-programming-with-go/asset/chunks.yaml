- fmt: '# Reacting to Actions


    The *fake* `Clientset` stores the resources as-is without any validation or mutation.
    During the tests, you may want to simulate the changes done to resources by the
    various controllers. For this, the *fake* `clientset` provides methods to add
    *Reactors*. *Reactors* are functions that are executed when specific operations
    are done on specific resources.


    The type of Reactor function for all operations, except `Watch` and `Proxy`, is
    defined as follows:


    ```

    type ReactionFunc func(

    action Action,

    ) (handled bool, ret runtime.Object, err error)

    ```


    The type of Reactor function for the `Watch` operation is defined as follows:


    ```

    type WatchReactionFunc func(

    action Action,

    ) (handled bool, ret watch.Interface, err error)

    ```


    The type of Reactor function for the `Proxy` operation is defined as follows:


    ```

    type ProxyReactionFunc func(

    action Action,

    ) (

    handled bool,

    ret restclient.ResponseWrapper,

    err error

    )

    ```


    The `Fake` field of the *fake* `Clientset` maintains several lists of `Reaction`
    functions: `ReactionChain`, `WatchReactionChain`, and `ProxyReactionChain`.


    Every time an operation on a resource is invoked, the reactors are executed in
    chain-like fashion. The first reactor returning a *true* `handled` value will
    terminate the chain immediately, and the following reactors will not be called.


    You can register new `Reaction` functions by calling the following methods on
    the `Fake` field of the *fake* `Clientset`:


    - `AddReactor(verb, resource string, reaction ReactionFunc)`

    - `PrependReactor(verb, resource string, reaction ReactionFunc)`

    - `AddWatchReactor(resource string, reaction WatchReactionFunc)`

    - `PrependWatchReactor(resource string, reaction WatchReactionFunc)`

    - `AddProxyReactor(resource string, reaction ProxyReactionFunc)`

    - `PrependProxyReactor(resource string, reaction ProxyReactionFunc)`


    The `verb` and `resource` values are used to indicate the operations for which
    the reactor will be invoked.


    You can specify a value of `"*"` for both parameters, to indicate that the reactor
    must be executed for the operations of any `verb` and/or on any `resource`. Note
    that the `Reactor` function gets the `action` as a parameter; it is possible for
    the `Reactor` to do additional filtering on the invoked operation using this `action`
    parameter.


    When the *fake* `Clientset` is created, a `Reactor` is added for both chains:
    `ReactionChain` and `WatchReactionChain`. These reactors contain the code for
    the *fake* `Clientset` to use the object tracker, which was discussed earlier.
    As a result of these reactors, for example, when you invoke a `Create` operation
    using the *fake* `Clientset`, the resource will be attached to an in-memory database,
    and a subsequent invocation of a `Get` operation on this resource will return
    the previously saved resource.


    If you do not want to use this default behavior, you can redefine the chains,
    `ReactionChain` and/or `WatchReactionChain`, to be empty chains. Note that these
    default reactors always return a *true* `handled` value; if you add reactors using
    `AddReactor` or `AddWatchReactor` when the default reactor is still at the beginning
    of the list of reactors, they will never be requested.


    If you want to get some validation or some mutation on the passed resource, you
    can precede reactors using `PrependReactor` or `PrependWatchReactor`, so they
    can:


    - Return early with a *true* `handled` value and a specific value for the object
    to be returned (and the default `Reactor` will not be called).

    - Mutate the object to return and return a *false* `handled` value. The mutated
    object will be the source object for the next reactors.


    As an example, use the following code to mutate the created pods to add them a
    value for their `NodeName` field:


    ```

    import (

    "context"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/fake"

    "k8s.io/apimachinery/pkg/runtime"

    ktesting "k8s.io/client-go/testing"

    )

    clientset := fake.NewSimpleClientset()

    clientset.Fake.PrependReactor("create", "pods", func(

    action ktesting.Action,

    ) (handled bool, ret runtime.Object, err error) {

    act := action.(ktesting.CreateAction)

    ret = act.GetObject()

    pod := ret.(*corev1.Pod)

    pod.Spec.NodeName = "node1"

    return false, pod, nil

    })

    pod, _ := CreatePod(

    context.Background(),

    clientset,

    name,

    namespace,

    image,

    )

    ```'
  raw: '### Reacting to Actions


    The *fake* Clientset stores the resources as-is without any validation or mutation.
    During the tests, you may want to simulate the changes done to resources by the
    various controllers. For this, the fake *clientset* provides methods to add *Reactors*.
    *Reactors* are functions that are executed when specific operations are done on
    specific resources.


    The type of Reactor function for all operations, except **Watch and Proxy**, is
    defined as follows:


    ```

    type ReactionFunc func(

    action Action,

    ) (handled bool, ret runtime.Object, err error)

    ```


    The type of Reactor function for the **Watch** operation is defined as follows:


    ```

    type WatchReactionFunc func(

    action Action,

    ) (handled bool, ret watch.Interface, err error)

    ```


    The type of Reactor function for the **Proxy** operation is defined as follows:


    ```

    type ProxyReactionFunc func(

    action Action,

    ) (

    handled bool,

    ret restclient.ResponseWrapper,

    err error

    )

    ```


    The **Fake** field of the *fake* Clientset maintains several lists of **Reaction**
    functions: **ReactionChain**, **WatchReactionChain**, and **ProxyReactionChain**.


    Every time an operation on a resource is invoked, the reactors are executed in
    chain-like fashion. The first reactor returning a *true* **handled** value will
    terminate the chain immediately, and the following reactors will not be called.


    You can register new **Reaction** functions by calling the following methods on
    the **Fake** field of the *fake* Clientset:


    *   `AddReactor(`


    `verb, resource string,`


    `reaction ReactionFunc,`


    `)`


    *   `PrependReactor(`


    `verb, resource string,`


    `reaction ReactionFunc,`


    `)`


    *   `AddWatchReactor(`


    `resource string,`


    `reaction WatchReactionFunc,`


    `)`


    *   `PrependWatchReactor(`


    `resource string,`


    `reaction WatchReactionFunc,`


    `)`


    *   `AddProxyReactor(`


    `resource string,`


    `reaction ProxyReactionFunc,`


    `)`


    *   `PrependProxyReactor(`


    `resource string,`


    `reaction ProxyReactionFunc,`


    `)`


    The **verb** and **resource** values are used to indicate the operations for which
    the reactor will be invoked.


    You can specify a value of **"*"** for both parameters, to indicate that the reactor
    must be executed for the operations of any **verb** and/or on any **resource**.
    Note that the **Reactor** function gets the **action** as a parameter; it is possible
    for the **Reactor** to do additional filtering on the invoked operation using
    this **action** parameter.


    When the *fake* Clientset is created, a **Reactor** is added for both chains:
    **ReactionChain** and **WatchReactionChain**. These reactors contain the code
    for the *fake* Clientset to use the object tracker, which was discussed earlier.
    As a result of these reactors, for example, when you invoke a **Create** operation
    using the *fake* Clientset, the resource will be attached to an in-memory database,
    and a subsequent invocation of a **Get** operation on this resource will return
    the previously saved resource.


    If you do not want to use this default behavior, you can redefine the chains,
    **ReactionChain** and/or **WatchReactionChain**, to be empty chains. Note that
    these default reactors always return a *true* **handled** value; if you add reactors
    using **AddReactor** or **AddWatchReactor** when the default reactor is still
    at the beginning of the list of reactors, they will never be requested.


    If you want to get some validation or some mutation on the passed resource, you
    can precede reactors using **PrependReactor** or **PrependWatchReactor**, so they
    can:


    *   Return early with a *true* **handled** value and a specific value for the
    object to be returned (and the default **Reactor** will not be called).


    *   Mutate the object to return and return a *false* **handled** value. The mutated
    object will be the source object for the next reactors.


    As an example, use the following code to mutate the created pods to add them a
    value for their **NodeName** field:


    ```

    import (

    "context"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/fake"

    "k8s.io/apimachinery/pkg/runtime"

    ktesting "k8s.io/client-go/testing"

    )

    clientset := fake.NewSimpleClientset()

    clientset.Fake.PrependReactor("create", "pods", func(

    action ktesting.Action,

    ) (handled bool, ret runtime.Object, err error) {

    act := action.(ktesting.CreateAction)

    ret = act.GetObject()

    pod := ret.(*corev1.Pod)

    pod.Spec.NodeName = "node1"

    return false, pod, nil

    })

    pod, _ := CreatePod(

    context.Background(),

    clientset,

    name,

    namespace,

    image,

    )

    ```'
  trans: '

    # 对操作作出反应


    *伪造的* `Clientset` 会原样存储资源，不进行任何验证或变更。在测试过程中，你可能希望模拟各种控制器对资源所做的更改。为此，*伪造的* `clientset`
    提供了添加*反应器*的方法。*反应器*是在对特定资源执行特定操作时执行的函数。


    除 `Watch` 和 `Proxy` 外，所有操作的反应器函数类型定义如下：


    ```

    type ReactionFunc func(

    action Action,

    ) (handled bool, ret runtime.Object, err error)

    ```


    `Watch` 操作的反应器函数类型定义如下：


    ```

    type WatchReactionFunc func(

    action Action,

    ) (handled bool, ret watch.Interface, err error)

    ```


    `Proxy` 操作的反应器函数类型定义如下：


    ```

    type ProxyReactionFunc func(

    action Action,

    ) (

    handled bool,

    ret restclient.ResponseWrapper,

    err error

    )

    ```


    *伪造的* `Clientset` 的 `Fake` 字段维护了几个 `Reaction` 函数的列表：`ReactionChain`、`WatchReactionChain`
    和 `ProxyReactionChain`。


    每次调用对资源的操作时，反应器都会以链式方式执行。第一个返回 *true* 值 `handled` 的反应器将立即终止该链，后续的反应器将不会被调用。


    你可以通过调用 *伪造的* `Clientset` 的 `Fake` 字段上的以下方法来注册新的 `Reaction` 函数：


    - `AddReactor(verb, resource string, reaction ReactionFunc)`

    - `PrependReactor(verb, resource string, reaction ReactionFunc)`

    - `AddWatchReactor(resource string, reaction WatchReactionFunc)`

    - `PrependWatchReactor(resource string, reaction WatchReactionFunc)`

    - `AddProxyReactor(resource string, reaction ProxyReactionFunc)`

    - `PrependProxyReactor(resource string, reaction ProxyReactionFunc)`


    `verb` 和 `resource` 值用于指示将调用反应器的操作。


    你可以为这两个参数指定 `"*"` 值，以指示该反应器必须针对任何 `verb` 和/或任何 `resource` 的操作执行。请注意，`Reactor`
    函数会将 `action` 作为参数；`Reactor` 可以使用此 `action` 参数对调用的操作进行额外的过滤。


    当创建*伪造的* `Clientset` 时，会为两个链添加一个 `Reactor`：`ReactionChain` 和 `WatchReactionChain`。这些反应器包含*伪造的*
    `Clientset` 使用前文讨论过的对象跟踪器的代码。由于这些反应器的存在，例如，当你使用*伪造的* `Clientset` 调用 `Create` 操作时，该资源将被附加到一个内存数据库中，随后对该资源调用
    `Get` 操作将返回先前保存的资源。


    如果你不想使用此默认行为，可以将这些链 `ReactionChain` 和/或 `WatchReactionChain` 重新定义为空链。请注意，这些默认反应器始终返回一个
    *true* 值 `handled`；如果在默认反应器仍位于反应器列表开头时使用 `AddReactor` 或 `AddWatchReactor` 添加反应器，则这些新添加的反应器将永远不会被请求。


    如果你希望对传入的资源进行一些验证或变更，你可以使用 `PrependReactor` 或 `PrependWatchReactor` 在反应器前添加，这样它们可以：


    - 提前返回一个 *true* 值 `handled` 和一个要返回的特定对象值（并且默认的 `Reactor` 将不会被调用）。

    - 更改要返回的对象并返回一个 *false* 值 `handled`。被更改的对象将成为下一个反应器的源对象。


    例如，使用以下代码来更改已创建的 Pod，为其 `NodeName` 字段添加一个值：


    ```

    import (

    "context"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/client-go/kubernetes/fake"

    "k8s.io/apimachinery/pkg/runtime"

    ktesting "k8s.io/client-go/testing"

    )

    clientset := fake.NewSimpleClientset()

    clientset.Fake.PrependReactor("create", "pods", func(

    action ktesting.Action,

    ) (handled bool, ret runtime.Object, err error) {

    act := action.(ktesting.CreateAction)

    ret = act.GetObject()

    pod := ret.(*corev1.Pod)

    pod.Spec.NodeName = "node1"

    return false, pod, nil

    })

    pod, _ := CreatePod(

    context.Background(),

    clientset,

    name,

    namespace,

    image,

    )

    ```

    '
- fmt: '### Checking the Actions


    If you are using the `mock` system provided by the Go team ([github.com/golang/mock](https://github.com/golang/mock)),
    you may want to `mock` the calls to the `Client-go` Library in a similar way.
    The `mock` system helps you verify that specific functions were called during
    the execution of the tested code, with specific parameters and returning specific
    values.


    Following this principle, to assess the `CreatePod` function, you may want to
    check that the `Create` function of the `Clientset` was called, with specific
    parameters. For this, the `fake` Clientset registers all the `Actions` done on
    it, and you can access these `Actions` to check they match what you expected.


    After executing the code to assess, you can access the `Actions` with the following
    call:


    ```

    actions := clientset.Actions()

    ```


    This call returns a list of objects that implements the following `Action` interface:


    ```

    type Action interface {

    GetNamespace() string

    GetVerb() string

    GetResource() schema.GroupVersionResource

    Matches(verb, resource string) bool

    [...]

    }

    ```


    In Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Using the Clientset” section,
    you saw that the pattern to execute an action on a resource is (the namespace
    is omitted for non-namespaced resources) the following:


    - `GetNamespace()` – this method on the `Action` returns the `namespace` specified
    in the call.

    - `GetVerb()` – this method on the `Action` returns the `Operation` used in the
    call.

    - `GetResource()` – this method on the `Action` returns a `GVR` built from the
    `GroupVersion` and `Resource` used in the call.

    - `Matches(verb, resource string)` – this checks that the `verb` and `resource`
    match the `Operation` and `Resource` used in the call.


    ```

    clientset.

    GroupVersion().

    Resource(namespace).

    Operation(ctx, options)

    ```


    Using these four methods, you can check that the actions made on the `Clientset`
    are what you expected.


    After you have checked the Verb of the `Action`, you can cast it to one of the
    interfaces related to the `Verb`: `GetAction`, `ListAction`, `CreateAction`, `UpdateAction`,
    `DeleteAction`, `DeleteCollectionAction`, `PatchAction`, `WatchAction`, `ProxyGetAction`,
    and `GenericAction`.


    These interfaces provide more methods to get information specific to the `Operation`.


    - **GetAction interface** – defined as:


    ```

    type GetAction interface {

    Action

    GetName() string

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Getting Information About
    a Resource” section, the signature of the method to execute the `Get` operation
    is:


    - `Get(ctx context.Context, name string, opts metav1.GetOptions)` – this `GetName()`
    method from the `GetAction` interface will return the `name` passed as parameter
    to the `Get` method.


    - **ListAction interface** – defined as:


    ```

    type ListRestrictions struct {

    Labels labels.Selector

    Fields fields.Selector

    }


    type ListAction interface {

    Action

    GetListRestrictions() ListRestrictions

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Getting List of Resources”
    section, the signature of the method to execute the `List` operation is:


    - `List(ctx context.Context, opts metav1.ListOptions)` – With `ListOptions` defined
    as:


    ```

    type ListOptions struct {

    LabelSelector string

    FieldSelector string

    [...]

    }

    ```


    The `GetListRestrictions()` method from the `ListAction` interface will return
    the `LabelSelector` and `FieldSelector` passed as parameters through the `ListOptions`
    structure to the `List` method.


    - **CreateAction interface** – defined as:


    ```

    type CreateAction interface {

    Action

    GetObject() runtime.Object

    }

    ```


    As seen in Chapter [6](#533908_1_En_6_Chapter.xhtml)’s “Creating a Resource” section,
    the signature of the method to execute the `Create` operation is (here for `Pods`)
    the following:


    - `Create(ctx context.Context, pod *v1.Pod, opts metav1.CreateOptions)`'
