    (singular string, err error)\n}\n```\n\n### Kind to Resource\n\nThe **RESTMapping**\
    \ and **RESTMappings** methods return an element or an array of **RESTMapping**\
    \ structures as a result, given a **Group** and **Kind**. An optional list of\
    \ versions indicates the preferred versions.\n\nThe **RESTMappings** method returns\
    \ all matches, the **RESTMapping** method returns a single match or an error if\
    \ there are multiple matches. The resulting **RESTMapping** elements will contain\
    \ the fully qualified **Kind** (including the version) and the fully qualified\
    \ **Resource**.\n\nTo sum up, these methods are used to map a **Kind** to a **Resource**.\n\
    \n### Resource to Kind\n\nThe **KindFor** and **KindsFor** methods return an element\
    \ or an array of **GroupVersionKind**, given a *partial* Group-Version-Resource.\
    \ Partial means that you can omit the group, the version, or both. The resource\
    \ name can be the singular or the plural name of the resource.\n\nThe **KindsFor**\
    \ method returns all matches, the **KindFor** method returns a single match or\
    \ an error if there are multiple matches.\n\nTo sum up, these methods are used\
    \ to map a **Resource** to a **Kind**.\n\n### Finding Resources\n\nThe **ResourceFor**\
    \ and **ResourcesFor** methods return an element or an array of **GroupVersionResource**,\
    \ given a *partial* Group-Version-Resource. Partial means that you can omit the\
    \ group, the version, or both. The resource name can be the singular or the plural\
    \ name of the resource.\n\nThe **ResourcesFor** method returns all matches, the\
    \ **ResourceFor** method returns a single match or an error if there are multiple\
    \ matches.\n\nTo sum up, these methods are used to find fully qualified resources\
    \ based on a singular or plural resource name.\n\n### The DefaultRESTMapper Implementation\n\
    \nThe API Machinery provides a default implementation of a **RESTMapper**.\n\n\
    *   `NewDefaultRESTMapper(`\n\n*   - this factory method is used to build a new\
    \ **DefaultRESTMapper**, and accepts a list of default Group-Versions, which will\
    \ be used to find Resources or Kinds when the provided GVR is partial.\n\n*  \
    \ `Add(kind schema.GroupVersionKind, scope RESTScope) –` this method is used to\
    \ add a mapping between a **Kind** and a **Resource**. The resource name will\
    \ be guessed from the Kind, by getting the lowercase word, and by pluralizing\
    \ it (adding “es” to words ending with “s,” replacing terminal “y” with “ies”\
    \ to words ending with “y,” and adding “s” to other words).\n\n*   `AddSpecific(`\n\
    \n    ```\n    kind schema.GroupVersionKind,\n    plural, singular schema.GroupVersionResource,\n\
    \    scope RESTScope)\n    ```\n\n    - this method is used to add a mapping between\
    \ a **Kind** and a **Resource**, by giving the singular and plural names explicitly.\n\
    \n```\ndefaultGroupVersions []schema.GroupVersion,\n) *DefaultRESTMapper\n```\n\
    \nAfter creating a **DefaultRESTMapper** instance, you can use it as a **RESTMapper**\
    \ by calling the methods defined in the interface of the same name.\n\n## Conclusion\n\
    \nThis chapter has explored the API Machinery, introducing the **Scheme** abstraction\
    \ used to serialize resources between Go and JSON or YAML, and to convert resources\
    \ between several versions. The chapter also covered the **RESTMapper** interface\
    \ to help map between resources and kinds.\n\nThe next chapter covers the Client-go\
    \ Library, a high-level one used by developers to call the Kubernetes API without\
    \ needing to work with HTTP calls."
  trans: "\n# 编码与解码\n\n各种序列化器实现了`Serializer`接口，该接口嵌入了`Decoder`和`Encoder`接口，并定义了`Encode`和`Decode`方法。\n\
    \n- `Encode(obj Object, w io.Writer) error` – `Encode`函数接收一个 API 对象作为参数，对该对象进行编码，并使用写入器输出结果。\n\
    - `Decode(data []byte, defaults *schema.GroupVersionKind, into Object) (Object,\
    \ *schema.GroupVersionKind, error)` – 此函数接收一个字节数组作为参数，并尝试解码其内容。如需解码的内容未指定`apiVersion`和`Kind`，则将使用默认的`GroupVersionKind`\
    \ (GVK)。\n- 如果`into`对象不为空，且其具体类型与内容 GVK（无论是初始的，还是`defaults`中的）匹配，则结果将被放入该`into`对象。无论如何，结果都将作为`Object`返回，应用于它的\
    \ GVK 将作为`GroupVersionKind`结构返回。\n\n```go\nfunc Decode(\n    data []byte,\n  \
    \  defaults *schema.GroupVersionKind,\n    into Object,\n) (\n    Object,\n  \
    \  *schema.GroupVersionKind,\n    error,\n)\n```\n\n## RESTMapper\n\nAPI Machinery\
    \ 提供了`RESTMapper`的概念，用于映射 REST 资源和`Kind`之间的关系。\n\n```go\nimport (\n    \"k8s.io/apimachinery/pkg/api/meta\"\
    \n)\n```\n\n`RESTMapping`类型提供了使用`RESTMapper`进行映射的结果：\n\n```go\ntype RESTMapping\
    \ struct {\n    Resource            schema.GroupVersionResource\n    GroupVersionKind\
    \    schema.GroupVersionKind\n    Scope               RESTScope\n}\n```\n\n如第\
    \ 1 章所述，GVR（Group-Version-Resource，或简称为`Resource`）用于构建发送请求的路径。例如，要获取所有命名空间中的部署列表，你将使用路径`/apis/apps/v1/deployments`，其中`apps`是\
    \ Group，`v1`是 Version，`deployments`是（复数形式的）`Resource`名称。因此，由 API 管理的资源可以通过其 GVR\
    \ 唯一标识。\n\n在向此路径发起请求时，通常需要交换数据，无论是创建或更新资源的请求，还是获取或列出资源的响应。这种交换数据的格式称为与该资源关联的`Kind`（或`GroupVersionKind`）。\n\
    \n`RESTMapping`结构将`Resource`及其关联的`GroupVersionKind`联系起来。API Machinery 提供了`RESTMapper`接口，以及一个默认实现`DefaultRESTMapper`。\n\
    \n```go\ntype RESTMapper interface {\n    RESTMapping(gk schema.GroupKind, versions\
    \ ...string) (*RESTMapping, error)\n    RESTMappings(gk schema.GroupKind, versions\
    \ ...string) ([]*RESTMapping, error)\n    KindFor(resource schema.GroupVersionResource)\
    \ (schema.GroupVersionKind, error)\n    KindsFor(resource schema.GroupVersionResource)\
    \ ([]schema.GroupVersionKind, error)\n    ResourceFor(input schema.GroupVersionResource)\
    \ (schema.GroupVersionResource, error)\n    ResourcesFor(input schema.GroupVersionResource)\
    \ ([]schema.GroupVersionResource, error)\n    ResourceSingularizer(resource string)\
    \ (singular string, err error)\n}\n```\n\n### Kind 到 Resource 的映射\n\n`RESTMapping`和`RESTMappings`方法根据给定的`Group`和`Kind`，返回一个`RESTMapping`结构元素或数组。一个可选的版本列表用于指示首选版本。\n\
    \n`RESTMappings`方法返回所有匹配项，`RESTMapping`方法返回单个匹配项，如有多个匹配项则返回错误。返回的`RESTMapping`元素将包含完整的`Kind`（包括版本）和完整的`Resource`。\n\
    \n总而言之，这些方法用于将`Kind`映射到`Resource`。\n\n### Resource 到 Kind 的映射\n\n`KindFor`和`KindsFor`方法根据一个*部分*的\
    \ Group-Version-Resource，返回一个`GroupVersionKind`元素或数组。部分意味着你可以省略 group、version，或两者都省略。资源名称可以是资源的单数或复数形式。\n\
    \n`KindsFor`方法返回所有匹配项，`KindFor`方法返回单个匹配项，如有多个匹配项则返回错误。\n\n总而言之，这些方法用于将`Resource`映射到`Kind`。\n\
    \n### 查找资源\n\n`ResourceFor`和`ResourcesFor`方法根据一个*部分*的 Group-Version-Resource，返回一个`GroupVersionResource`元素或数组。部分意味着你可以省略\
    \ group、version，或两者都省略。资源名称可以是资源的单数或复数形式。\n\n`ResourcesFor`方法返回所有匹配项，`ResourceFor`方法返回单个匹配项，如有多个匹配项则返回错误。\n\
    \n总而言之，这些方法用于根据单数或复数资源名称查找完整的资源。\n\n### DefaultRESTMapper 实现\n\nAPI Machinery\
    \ 提供了一个`RESTMapper`的默认实现。\n\n- `NewDefaultRESTMapper(defaultGroupVersions []schema.GroupVersion)\
    \ *DefaultRESTMapper` – 此工厂方法用于构建一个新的`DefaultRESTMapper`，它接受一个默认 Group-Version\
    \ 列表，当提供的 GVR 不完整时，将使用该列表查找 Resource 或 Kind。\n- `Add(kind schema.GroupVersionKind,\
    \ scope RESTScope)` – 此方法用于添加`Kind`和`Resource`之间的映射。资源名称将根据 Kind 通过获取小写单词并使其复数化来推断（对于以“s”结尾的单词添加“es”，对于以“y”结尾的单词将末尾“y”替换为“ies”，对于其他单词添加“s”）。\n\
    - `AddSpecific(kind schema.GroupVersionKind, plural, singular schema.GroupVersionResource,\
    \ scope RESTScope)` – 此方法用于通过显式指定单数和复数名称来添加`Kind`和`Resource`之间的映射。\n\n创建`DefaultRESTMapper`实例后，你可以通过调用同名接口中定义的方法，将其用作`RESTMapper`。\n\
    \n## 总结\n\n本章探讨了 API Machinery，介绍了用于在 Go 语言和 JSON 或 YAML 之间序列化资源，以及在多个版本之间转换资源的`Scheme`抽象。本章还涵盖了`RESTMapper`接口，以帮助在资源和种类之间进行映射。\n\
    \n下一章将介绍 Client-go 库，这是一个高级库，开发者可以用它来调用 Kubernetes API，而无需处理 HTTP 调用。\n"
- fmt: '# 6. The `Client-go` Library


    The previous chapters explored the *Kubernetes API Library*, a collection of Go
    structures to work with the objects of the Kubernetes API, and the *API Machinery
    Library*, which provides utilities for working with the API objects that follow
    the Kubernetes API object conventions. Specifically, you have seen that the API
    Machinery provides `Scheme` and `RESTMapper` abstractions.


    This chapter explores the `Client-go` Library, which is a high-level library that
    can be used by developers to interact with the Kubernetes API using the Go language.
    The `Client-go` Library brings together the Kubernetes API and the API Machinery
    libraries, providing a `Scheme` preconfigured with Kubernetes API’s objects and
    a `RESTMapper` implementation for the Kubernetes API. It also provides a set of
    clients to use to execute operations on the resources of the Kubernetes API in
    a simple way.


    To use this library, you will need to import packages from it with the prefix
    `k8s.io/client-go`. For example, to use the package `kubernetes`, let’s use the
    following:


    ```go

    import (

    "k8s.io/client-go/kubernetes"

    )

    ```


    You also need to download a version of the `Client-go` Library. For this you can
    employ the `go get` command to obtain the version you want to use:


    ```bash

    $ go get k8s.io/client-go@v0.24.4

    ```


    The version of the `Client-go` Library is aligned with the version of Kubernetes—version
    0.24.4 corresponds to version 1.24.4 of the server.


    Kubernetes is backward-compatible so you can use older versions of `Client-go`
    with newer versions of clusters, but you may well want to get a recent version
    to be able to use a current feature, because only bug fixes are backported to
    previous client-go releases, not new features.


    ## Connecting to the Cluster


    The first step before connecting to the Kubernetes API Server is to have the configuration
    connect to it—that is, the address of the server, its credentials, the connection
    parameters, and so on.


    The `rest` package provides a `rest.Config` structure, which contains all the
    configuration information necessary for an application to connect to a *REST*
    API Server.


    ### In-cluster Configuration


    By default, a container running on a Kubernetes Pod contains all the information
    needed to connect to the API Server:


    - A *token* and the *root certificate*, provided by the `ServiceAccount` used
    for the Pod, are available in this directory: `/var/run/secrets/kubernetes.io/serviceaccount/`.

    - Note that it is possible to disable this behavior by setting `automountServiceAccountToken:
    false` in the `ServiceAccount` used by the Pod, or in the specifications of the
    Pod directly.

    - The environment variables, `KUBERNETES_SERVICE_HOST` and `KUBERNETES_SERVICE_PORT`,
    defined in the container environment, added by `kubelet`, define the host and
    port to which to contact the API Server.


    When an application is dedicated to run inside a Pod’s container, you can use
    the following function to create an appropriate `rest.Config` structure, leveraging
    the information just described:


    ```go

    import "k8s.io/client-go/rest"

    func InClusterConfig() (*Config, error)

    ```


    ### Out-of-Cluster Configuration


    Kubernetes tools generally rely on the `kubeconfig` file—that is, a file that
    contains connection configuration for one or several Kubernetes clusters.


    You can build a `rest.Config` structure based on the content of this `kubeconfig`
    file by using one of the following functions from the `clientcmd` package.


    #### From kubeconfig in Memory


    The `RESTConfigFromKubeConfig` function can be used to build a `rest.Config` structure
    from the content of a `kubeconfig` file as an array of bytes.


    ```go

    func RESTConfigFromKubeConfig(

    configBytes []byte,

    ) (*rest.Config, error)

    ```


    If the `kubeconfig` file contains several *contexts*, the current context will
    be used, and the other contexts will be ignored. For example, you can read the
    content of a `kubeconfig` file first, then use the following function:


    ```go

    import "k8s.io/client-go/tools/clientcmd"

    configBytes, err := os.ReadFile(

    "/home/user/.kube/config",

    )

    if err != nil {

    return err

    }

    config, err := clientcmd.RESTConfigFromKubeConfig(

    configBytes,

    )

    if err != nil {

    return err

    }

    ```


    #### From a kubeconfig on Disk


    The `BuildConfigFromFlags` function can be used to build a `rest.Config` structure
    either from the URL of the API Server, or based on a `kubeconfig` file given its
    path, or both.


    ```go

    func BuildConfigFromFlags(

    masterUrl,

    kubeconfigPath string,

    ) (*rest.Config, error)

    ```


    The following code allows you to get a `rest.Config` structure:


    ```go

    import "k8s.io/client-go/tools/clientcmd"

    config, err := clientcmd.BuildConfigFromFlags(

    "",

    "/home/user/.kube/config",

    )

    ```


    The following code gets the configuration from the `kubeconfig`, and overrides
    the URL of the API Server:


    ```go

    config, err := clientcmd.BuildConfigFromFlags(

    "https://192.168.1.10:6443",

    "/home/user/.kube/config",

    )

    ```


    #### From a Personalized kubeconfig


    The previous functions use an `api.Config` structure internally, representing
    the data in the `kubeconfig` file (not to be confused with the `rest.Config` structure
    that contains the parameters for the *REST* HTTP connection).


    If you need to manipulate this intermediary data, you can use the `BuildConfigFromKubeconfigGetter`
    function accepting a `kubeconfigGetter` function as an argument, which itself
    will return an `api.Config` structure.


    ```go

    BuildConfigFromKubeconfigGetter(

    masterUrl string,

    kubeconfigGetter KubeconfigGetter,

    ) (*rest.Config, error)

    type KubeconfigGetter

    func() (*api.Config, error)

    ```


    For example, the following code will load the `kubeconfig` file with the `clientcmd.Load`
    or `clientcmd.LoadFromFile` functions from the `kubeconfigGetter` function:


    ```go

    import (

    "k8s.io/client-go/tools/clientcmd"

    "k8s.io/client-go/tools/clientcmd/api"

    )

    config, err :=

    clientcmd.BuildConfigFromKubeconfigGetter(

    "",

    func() (*api.Config, error) {

    apiConfig, err := clientcmd.LoadFromFile(

    "/home/user/.kube/config",

    )

    if err != nil {

    return nil, nil

    }

    // TODO: manipulate apiConfig

    return apiConfig, nil

    },

    )

    ```


    #### From Several kubeconfig Files


    The `kubectl` tool uses by default the `$HOME/.kube/config kubeconfig` file, and
    you can specify another `kubeconfig` file path using the `KUBECONFIG` environment
    variable.


    More than that, you can specify a list of `kubeconfig` file paths in this environment
    variable, and the `kubeconfig` files will be *merged* into just one before being
    used. You can obtain the same behavior with this function: `NewNonInteractiveDeferredLoadingClientConfig`.


    ```go

    func NewNonInteractiveDeferredLoadingClientConfig(

    loader ClientConfigLoader,

    overrides *ConfigOverrides,

    ) ClientConfig

    ```


    The type `clientcmd.ClientConfigLoadingRules` implements the `ClientConfigLoader`
    interface, and you can get a value for this type using the following function:


    ```go

    func NewDefaultClientConfigLoadingRules()

    *ClientConfigLoadingRules

    ```


    This function will get the value of the `KUBECONFIG` environment variable, if
    it exists, to obtain the list of `kubeconfig` files to merge, or will fallback
    on using the default `kubeconfig` file located in `$HOME/.kube/config`.


    Using the following code to create the `rest.Config` structure, your program will
    have the same behavior as `kubectl`, as previously described:


    ```go

    import (

    "k8s.io/client-go/tools/clientcmd"

    )

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    nil,

    ).ClientConfig()

    ```'
