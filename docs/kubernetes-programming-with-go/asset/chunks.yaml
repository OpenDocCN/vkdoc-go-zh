    ## Logging


    The Manager leverages a logger system defined in the log package of the **controller-runtime**
    Library. The logger must be initialized with a call to **SetLogger**. Then, it
    is possible to use the **Log** variable defined into the log package.


    ```

    import (

    crlog "sigs.k8s.io/controller-runtime/pkg/log"

    "sigs.k8s.io/controller-runtime/pkg/log/zap"

    )

    func main() {

    log.SetLogger(zap.New())

    log.Log.Info("starting")

    [...]

    }

    ```


    The **Log** object, of type **logr.Logger** (from **github.com/go-logr/logr**),
    has two main methods, **Info** and **Error**.


    ```

    func (l Logger) Info(

    msg string,

    keysAndValues ...interface{},

    )

    func (l Logger) Error(

    err error,

    msg string,

    keysAndValues ...interface{},

    )

    ```


    The **Logger** is a “structured” logging system, in that logs are mostly made
    of key-value pairs rather than printf-style formatted strings. Whereas printf-style
    logs are easier to read by humans, structured logs are easier to analyze by tools.
    The predefined keys for log entries are:


    *   **level**: the verbosity level of the log; see the following section for a
    definition of log verbosity


    *   **ts**: timestamp of the log entry


    *   **logger**: name of the logger for this entry; see the section that follows
    for a definition of the name of the logger


    *   **msg**: message associated with the log entry


    *   **error**: the error associated with the log entry


    The **Info** and **Error** methods accept a message and zero or more key-value
    pairs. The **Error** method also accepts an error value.


    ### Verbosity


    The Info messages can be given a *Verbosity* by using **log.V(*****n*****).Info(...)**.
    The larger is the *n* verbosity, the less important is the message. **log.Info(...)**
    is equivalent to **log.V(0).Info(...)**.


    ### Predefined Values


    You can build a new logger with predefined key-value pairs by using **WithValues**:


    ```

    func (l Logger) WithValues(

    keysAndValues ...interface{},

    ) Logger

    ctrlLog := log.Log.WithValues("package”, “controller”)

    ```


    ### Logger Name


    You can build a new logger by appending a name to the logger name by using **WithName**:


    ```

    func (l Logger) WithName(name string) Logger

    ```


    Successive calls to **WithName** will add suffixes to the logger name. For example,
