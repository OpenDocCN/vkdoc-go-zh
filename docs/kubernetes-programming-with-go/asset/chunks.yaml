    # 个性化自定义资源


    `kubebuilder create api` 命令创建了一个包含 `Spec` 和 `Status` 字段的资源模板，其中 Spec 包含一个 `Foo`
    字段，Status 为空。


    在本节中，您将了解如何更新此模板以添加必要的字段。


    ## 编辑 Go 结构体


    您可以编辑 `api/v1alpha1/myresource_types.go` 文件来个性化自定义资源。在此示例中，您将使用 `Image` 和 `Memory`
    字段作为 `Spec`，并使用 `State` 字段作为 `Status`：


    ```

    // MyResourceSpec defines the desired state of MyResource

    type MyResourceSpec struct {

    Image  string            `json:"image"`

    Memory resource.Quantity `json:"memory"`

    }

    // MyResourceStatus defines the observed state of MyResource

    type MyResourceStatus struct {

    State string `json:"state"`

    }

    ```


    ## 启用 Status 子资源


    您可以看到 `MyResource` 结构体前的注释中的注解。


    第一个注解 `//+kubebuilder:object:root=true` 表明 `MyResource` 是一个 *Kind*。有了这个注解，`kubebuilder`
    将为此结构体生成 `DeepCopyObject()` 方法。更多详情请参见第 9 章的“添加注解”部分。


    第二个注解 `//+kubebuilder:subresource:status` 表明必须为 `MyResource` 启用 `status` 子资源。有了这个注解，`kubebuilder`
    会将 status 作为子资源添加到 `config/crd/bases/` 中 CRD 的 YAML 定义中。更多详情请参见第 8 章的“资源版本定义”部分。


    `Status` 默认已启用，因此您无需对这些注解进行任何更改。


    ## 定义打印机列


    第 8 章的“附加打印机列”部分展示了如何通过编辑 CRD 的 YAML 定义来为自定义资源声明打印机列。


    使用 `kubebuilder` 时，CRD 的 YAML 定义是自动生成的，因此您不能直接编辑它。取而代之的是，您可以使用 `+kubebuilder:printcolumn`
    注解。每个注解都接受 `name`、`type` 和 `JSONPath` 值，这与 YAML 定义中的 `additionalPrinterColumns`
    条目类似。


    例如，添加以下注解将定义 `Image`、`State` 和 `Age` 打印机列：


    ```

    // +kubebuilder:printcolumn:name="Image",type=string,

    JSONPath=`.spec.image`

    // +kubebuilder:printcolumn:name="State",type=string,

    JSONPath=`.status.state`

    // +kubebuilder:printcolumn:name="Age",type="date",

    JSONPath=".metadata.creationTimestamp"

    ```

