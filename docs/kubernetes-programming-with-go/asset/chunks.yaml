  trans: "\n```go\ntype Funcs struct {\n\t// Create 返回 true 表示应处理 Create 事件\n\tCreateFunc\
    \ func(event.CreateEvent) bool\n\t// Delete 返回 true 表示应处理 Delete 事件\n\tDeleteFunc\
    \ func(event.DeleteEvent) bool\n\t// Update 返回 true 表示应处理 Update 事件\n\tUpdateFunc\
    \ func(event.UpdateEvent) bool\n\t// Generic 返回 true 表示应处理 Generic 事件\n\tGenericFunc\
    \ func(event.GenericEvent) bool\n}\n```\n\n`filter func(object client.Object)\
    \ bool,` `) Funcs`\n\n- 此函数接受一个`filter`函数，并返回一个`Funcs`结构体，该过滤器将应用于所有事件。使用此函数，您可以定义一个适用于所有事件类型的单一过滤器。\n\
    - `ResourceVersionChangedPredicate`结构体仅会为`UpdateEvent`定义一个过滤器。\n- 使用此谓词，所有`Create`、`Delete`和`Generic`事件将在无过滤的情况下被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.resourceVersion`变更的更新。\n\
    - `metadata.resourceVersion`字段在每次保存资源的新版本时都会更新，无论资源发生了何种更改。\n- `GenerationChangedPredicate`结构体仅会为`Update`事件定义一个过滤器。\n\
    - 使用此谓词，所有`Create`、`Delete`和`Generic`事件将在无过滤的情况下被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.Generation`递增的更新。\n\
    - `metadata.Generation`由 API 服务器在每次资源`Spec`部分发生更新时顺序递增。\n- 请注意，某些资源并不遵循此假设。例如，`Deployment`的`Generation`在`Annotations`字段更新时也会递增。\n\
    - 对于自定义资源，仅当启用了`Status`子资源时，`Generation`才会递增。\n- `AnnotationChangedPredicate`结构体仅会为`Update`事件定义一个过滤器。\n\
    - 使用此谓词，所有`Create`、`Delete`和`Generic`事件将被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.Annotations`变更的更新。\n\
    \n## 第一个示例\n\n在第一个示例中，您将创建一个管理器和一个控制器。该控制器将管理一个名为`MyResource`的主要自定义资源，并监听此资源以及`Pod`资源。\n\
    \n`Reconcile`函数将仅显示需要调和的`MyResource`实例的命名空间和名称。\n\n- ➊ 创建一个包含原生资源和自定义资源`MyResource`的`Scheme`。\n\
    - ➋ 使用刚创建的`Scheme`创建一个管理器。\n- ➌ 创建一个附加到管理器的控制器，并传入一个`Reconciler`实现。\n- ➍ 开始将`MyResource`实例作为主要资源进行监听。\n\
    - ➎ 开始将`Pod`实例作为附属资源进行监听。\n- ➏ 启动管理器。此函数是长时间运行的，仅当发生错误时才会返回。\n- ➐ 一个实现了`Reconciler`接口的类型。\n\
    - ➑ 实现了`Reconcile`方法。该方法将显示需要调和的实例的命名空间和名称。\n\n```go\npackage main\n\nimport (\n\
    \t\"context\"\n\t\"fmt\"\n\n\tcorev1 \"k8s.io/api/core/v1\"\n\t\"k8s.io/apimachinery/pkg/runtime\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/client/config\"\n\t\"sigs.k8s.io/controller-runtime/pkg/controller\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/handler\"\n\t\"sigs.k8s.io/controller-runtime/pkg/manager\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/reconcile\"\n\t\"sigs.k8s.io/controller-runtime/pkg/source\"\
    \n\tclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\n\tmygroupv1alpha1 \"\
    github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\n)\n\n\
    func main() {\n\tscheme := runtime.NewScheme() // ❶\n\tclientgoscheme.AddToScheme(scheme)\n\
    \tmygroupv1alpha1.AddToScheme(scheme)\n\n\tmgr, err := manager.New( // ❷\n\t\t\
    config.GetConfigOrDie(),\n\t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\
    \t)\n\tpanicIf(err)\n\n\tcontroller, err := controller.New( // ❸\n\t\t\"my-operator\"\
    , mgr,\n\t\tcontroller.Options{\n\t\t\tReconciler: &MyReconciler{},\n\t\t})\n\t\
    panicIf(err)\n\n\terr = controller.Watch( // ❹\n\t\t&source.Kind{\n\t\t\tType:\
    \ &mygroupv1alpha1.MyResource{},\n\t\t},\n\t\t&handler.EnqueueRequestForObject{},\n\
    \t)\n\tpanicIf(err)\n\n\terr = controller.Watch( // ❺\n\t\t&source.Kind{\n\t\t\
    \tType: &corev1.Pod{},\n\t\t},\n\t\t&handler.EnqueueRequestForOwner{\n\t\t\tOwnerType:\
    \    &corev1.Pod{},\n\t\t\tIsController: true,\n\t\t},\n\t)\n\tpanicIf(err)\n\n\
    \terr = mgr.Start(context.Background()) // ❻\n\tpanicIf(err)\n}\n\ntype MyReconciler\
    \ struct{} // ➐\n\nfunc (o *MyReconciler) Reconcile( // ➑\n\tctx context.Context,\n\
    \tr reconcile.Request,\n) (reconcile.Result, error) {\n\tfmt.Printf(\"reconcile\
    \ %v\\n\", r)\n\treturn reconcile.Result{}, nil\n}\n\n// panicIf panic if err\
    \ is not nil\n// Please call from main only!\nfunc panicIf(err error) {\n\tif\
    \ err != nil {\n\t\tpanic(err)\n\t}\n}\n```\n\n## 使用控制器构建器\n\n`controller-runtime`库提供了一个*控制器构建器*，以使控制器的创建更加简洁。\n\
    \n```go\nimport (\n\t\"sigs.k8s.io/controller-runtime/pkg/builder\"\n)\n\nfunc\
    \ ControllerManagedBy(m manager.Manager) *Builder\n```\n\n`ControllerManagedBy`函数用于初始化一个新的`ControllerBuilder`。构建的控制器将被添加到`m`管理器中。一个流式接口有助于配置构建过程：\n\
    \n- `For(object client.Object, opts ...ForOption) *Builder` – 此方法用于指示控制器处理的主要资源。它只能被调用一次，因为一个控制器只能有一个主要资源。这将在内部调用`Watch`函数，并传入事件处理器`EnqueueRequestForObject`。\n\
    \  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`ForOption`接口。\n- `Owns(object\
    \ client.Object, opts ...OwnsOption) *Builder` – 此方法用于指示控制器拥有的资源。这将在内部调用`Watch`函数，并传入事件处理器`EnqueueRequestForOwner`。\n\
    \  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`OwnsOption`接口。\n- `Watches(src\
    \ source.Source, eventhandler handler.EventHandler, opts ...WatchesOption) *Builder`\
    \ – 此方法可用于添加`For`或`Owns`方法未涵盖的更多监听器——例如，使用`Channel`源的监听器。\n  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`WatchesOption`接口。\n\
    - `WithEventFilter(p predicate.Predicate) *Builder` – 此方法可用于为所有通过`For`、`Owns`和`Watch`方法创建的监听器添加公共谓词。\n\
    - `WithOptions(options controller.Options) *Builder` – 此方法设置将内部传递给`controller.New`函数的选项。\n\
    - `WithLogConstructor(` `func(*reconcile.Request) logr.Logger,` `) *Builder` –\
    \ 此方法设置`logConstructor`选项。\n- `Named(name string) *Builder` – 此方法设置构造器的名称。它应该只使用下划线和字母数字字符。默认情况下，它是主要资源类型的全小写版本。\n\
    - `Build(` `r reconcile.Reconciler,` `) (controller.Controller, error)` – 此方法构建并返回控制器。\n\
    - `Complete(r reconcile.Reconciler) error` – 此方法构建控制器。您通常不需要直接访问控制器，因此可以使用此方法（不返回控制器值）来代替`Build`。\n"
- fmt: "### A Second Example Using the `ControllerBuilder`\n\nIn this example, you\
    \ will build the controller using the `ControllerBuilder`, instead of using the\
    \ `controller.New` function and the `Watch` method on the `Controller`.\n\n```go\n\
    package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\tcorev1 \"k8s.io/api/core/v1\"\
    \n\t\"k8s.io/apimachinery/pkg/runtime\"\n\tclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/builder\"\n\t\"sigs.k8s.io/controller-runtime/pkg/client\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/client/config\"\n\t\"sigs.k8s.io/controller-runtime/pkg/manager\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/reconcile\"\n\tmygroupv1alpha1 \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
    \n)\n\nfunc main() {\n\tscheme := runtime.NewScheme()\n\tclientgoscheme.AddToScheme(scheme)\n\
    \tmygroupv1alpha1.AddToScheme(scheme)\n\tmgr, err := manager.New(\n\t\tconfig.GetConfigOrDie(),\n\
    \t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t)\n\tpanicIf(err)\n\n\t\
    err = builder.\n\t\tControllerManagedBy(mgr).\n\t\tFor(&mygroupv1alpha1.MyResource{}).\n\
    \t\tOwns(&corev1.Pod{}).\n\t\tComplete(&MyReconciler{})\n\tpanicIf(err)\n\n\t\
    err = mgr.Start(context.Background())\n\tpanicIf(err)\n}\n\ntype MyReconciler\
    \ struct{}\n\nfunc (a *MyReconciler) Reconcile(\n\tctx context.Context,\n\treq\
    \ reconcile.Request,\n) (reconcile.Result, error) {\n\tfmt.Printf(\"reconcile\
    \ %v\\n\", req)\n\treturn reconcile.Result{}, nil\n}\n\nfunc panicIf(err error)\
    \ {\n\tif err != nil {\n\t\tpanic(err)\n\t}\n}\n```\n\n### Injecting Manager Resources\
    \ into the Reconciler\n\nThe `Manager` provides shared resources for the controllers,\
    \ including a client to read and write Kubernetes resources, a cache to read resources\
    \ from a local cache, and a scheme to resolve resources. The `Reconcile` function\
    \ needs access to these shared resources. There are two ways to share them:\n\n\
    #### Passing the Values When Creating the Reconciler Structure\n\nWhen the controller\
    \ is created, you are passing an instance of a `Reconcile` structure, implementing\
    \ the `Reconciler` interface:\n\n```go\ntype MyReconciler struct{}\n\nerr = builder.\n\
    \tControllerManagedBy(mgr).\n\tFor(&mygroupv1alpha1.MyResource{}).\n\tOwns(&corev1.Pod{}).\n\
    \tComplete(&MyReconciler{})\n```\n\nThe manager has been created before this,\
    \ and you can have access to the shared resources using `Getters` on the manager.\n\
    \nAs an example, here is how to get the client, cache, and scheme from the newly\
    \ created manager:\n\n```go\nmgr, err := manager.New(\n\tconfig.GetConfigOrDie(),\n\
    \tmanager.Options{\n\t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t},\n\
    )\n// handle err\nmgrClient := mgr.GetClient()\nmgrCache := mgr.GetCache()\nmgrScheme\
    \ := mgr.GetScheme()\n```\n\nYou can add fields to the `Reconciler` structure\
    \ to pass these values:\n\n```go\ntype MyReconciler struct {\n\tclient client.Client\n\
    \tcache  cache.Cache\n\tscheme *runtime.Scheme\n}\n```\n\nFinally, you can pass\
    \ the values during the creation of the Controller:\n\n```go\nerr = builder.\n\
    \tControllerManagedBy(mgr).\n\tFor(&mygroupv1alpha1.MyResource{}).\n\tOwns(&corev1.Pod{}).\n\
    \tComplete(&MyReconciler{\n\t\tclient: mgr.GetClient(),\n\t\tcache:  mgr.GetCache(),\n\
    \t\tscheme: mgr.GetScheme(),\n\t})\n```\n\n#### Using Injectors\n\nThe `controller-runtime`\
    \ Library provides a system of *Injectors* to inject shared resources into the\
    \ `Reconcilers`, and other structures like your own implementations of `Sources`,\
    \ `EventHandlers`, and `Predicates`.\n\nThe `Reconciler` implementations need\
    \ to implement the specific injector interfaces from the `inject` package: `inject.Client`,\
    \ `inject.Cache`, `inject.Scheme`, and so on.\n\nThese methods will be called\
    \ at initialization time, when you call `controller.New` or `builder.Complete`.\
    \ For this, one method needs to be created for each interface, for example:\n\n\
    ```go\ntype MyReconciler struct {\n\tclient client.Client\n\tcache  cache.Cache\n\
    \tscheme *runtime.Scheme\n}\n\nfunc (a *MyReconciler) InjectClient(\n\tc client.Client,\n\
    ) error {\n\ta.client = c\n\treturn nil\n}\n\nfunc (a *MyReconciler) InjectCache(\n\
    \tc cache.Cache,\n) error {\n\ta.cache = c\n\treturn nil\n}\n\nfunc (a *MyReconciler)\
    \ InjectScheme(\n\ts *runtime.Scheme,\n) error {\n\ta.scheme = s\n\treturn nil\n\
    }\n```\n\n## Using the Client\n\nThe client can be used to read and write resources\
    \ on the cluster and to update the statuses of resources.\n\nThe `Read` methods\
    \ internally use a Cache system, based on *Informers* and *Listers*, to limit\
    \ the read access to the API Server. Using this cache, all controllers of the\
    \ same manager have read access to the resources while limiting the requests to\
    \ the API Server.\n\nYou must note that objects returned by Read operations are\
    \ pointers to values into the Cache. You must **never** modify these objects directly.\
    \ Instead, you must create a deep copy of the returned objects before modifying\
    \ them.\n\nThe methods of the client are generic: they work with any Kubernetes\
    \ resource, either native or custom if they are known by the Scheme passed to\
    \ the manager.\n\nAll methods return an error, which are of the same type as the\
    \ errors returned by the `Client-go` Clientset methods. You can refer to Chapter\
    \ [6](#533908_1_En_6_Chapter.xhtml)'s \"Errors and Statuses\" section for more\
    \ information.\n\n### Getting Information About a Resource\n\nThe `Get` method\
    \ is used to get information about a resource.\n\n```go\nGet(\n\tctx context.Context,\n\
    \tkey ObjectKey,\n\tobj Object,\n\topts ...GetOption,\n) error\n```\n\nIt gets\
    \ as a parameter an `ObjectKey` value to indicate the namespace and name of the\
    \ resource, and an `Object` to indicate the *Kind* of the resource to get and\
    \ to store the result. The `Object` must be a pointer to a typed resource—for\
    \ example, a `Pod` or a `MyResource` structure. The `ObjectKey` type is an alias\
    \ for `types.NamespacedName`, defined in the API Machinery Library.\n\n`NamespacedName`\
    \ is also the type of the object embedded in the `Request` passed as parameter\
    \ to the `Reconcile` function. You can directly pass `req.NamespacedName` as `ObjectKey`\
    \ to get the resource to reconcile. For example, use the following to get the\
    \ resource to reconcile:\n\n```go\nmyresource := mygroupv1alpha1.MyResource{}\n\
    err := a.client.Get(\n\tctx,\n\treq.NamespacedName,\n\t&myresource,\n)\n```\n\n\
    It is possible to pass a specific `resourceVersion` value to the `Get` request,\
    \ passing a `client.GetOptions` structure instance as the last parameter.\n\n\
    The `GetOptions` structure implements the `GetOption` interface and contains a\
    \ single `Raw` field having a `metav1.GetOptions` value. For example, to specify\
    \ a `resourceVersion` with a value \"0\" to get any version of the resource:\n\
    \n```go\nerr := a.client.Get(\n\tctx,\n\treq.NamespacedName,\n\t&myresource,\n\
    \t&client.GetOptions{\n\t\tRaw: &metav1.GetOptions{\n\t\t\tResourceVersion: \"\
    0\",\n\t\t},\n\t},\n)\n```"
  raw: '### A Second Example Using the ControllerBuilder


    In this example, you will build the controller using the **ControllerBuilder**,
    instead of using the **controller.New** function and the **Watch** method on the
    Controller.


    ```

    package main

    import (

    "context"

    "fmt"

    corev1 "k8s.io/api/core/v1"

    "k8s.io/apimachinery/pkg/runtime"

    clientgoscheme "k8s.io/client-go/kubernetes/scheme"

    "sigs.k8s.io/controller-runtime/pkg/builder"

    "sigs.k8s.io/controller-runtime/pkg/client"

    "sigs.k8s.io/controller-runtime/pkg/client/config"

    "sigs.k8s.io/controller-runtime/pkg/manager"

    "sigs.k8s.io/controller-runtime/pkg/reconcile"

    mygroupv1alpha1 "github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    )

    func main() {

    scheme := runtime.NewScheme()

    clientgoscheme.AddToScheme(scheme)

    mygroupv1alpha1.AddToScheme(scheme)

    mgr, err := manager.New(

    config.GetConfigOrDie(),

    manager.Options{

    Scheme: scheme,

    },

    )

    panicIf(err)

    err = builder.

    ControllerManagedBy(mgr).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&corev1.Pod{}).

    Complete(&MyReconciler{})

    panicIf(err)

    err = mgr.Start(context.Background())

    panicIf(err)

    }

    type MyReconciler struct {}

    func (a *MyReconciler) Reconcile(

    ctx context.Context,

    req reconcile.Request,

    ) (reconcile.Result, error) {

    fmt.Printf("reconcile %v\n", req)

    return reconcile.Result{}, nil

    }

    func panicIf(err error) {

    if err != nil {

    panic(err)

    }

    }

    ```


    ### Injecting Manager Resources into the Reconciler


    The Manager provides shared resources for the controllers, including a client
    to read and write Kubernetes resources, a cache to read resources from a local
    cache, and a scheme to resolve resources. The **Reconcile** function needs access
    to these shared resources. There are two ways to share them:


    #### Passing the Values When Creating the Reconciler Structure


    When the controller is created, you are passing an instance of a **Reconcile**
    structure, implementing the **Reconciler** interface:


    ```

    type MyReconciler struct {}

    err = builder.

    ControllerManagedBy(mgr).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&corev1.Pod{}).

    Complete(&MyReconciler{})

    ```


    The manager has been created before this, and you can have access to the shared
    resources using **Getters** on the manager.


    As an example, here is how to get the client, cache, and scheme from the newly
    created manager:


    ```

    mgr, err := manager.New(

    config.GetConfigOrDie(),

    manager.Options{

    manager.Options{

    Scheme: scheme,

    },

    },

    )

    // handle err

    mgrClient := mgr.GetClient()

    mgrCache := mgr.GetCache()

    mgrScheme := mgr.GetScheme()

    ```


    You can add fields to the **Reconciler** structure to pass these values:


    ```

    type MyReconciler struct {

    client client.Client

    cache cache.Cache

    scheme *runtime.Scheme

    }

    ```


    Finally, you can pass the values during the creation of the Controller:


    ```

    err = builder.

    ControllerManagedBy(mgr).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&corev1.Pod{}).

    Complete(&MyReconciler{

    client: mgr.GetClient(),

    cache: mgr.GetCache(),

    scheme: mgr.GetScheme(),

    })

    ```


    #### Using Injectors


    The **controller-runtime** Library provides a system of *Injectors* to inject
    shared resources into the **Reconcilers**, and other structures like your own
    implementations of **Sources**, **EventHandlers**, and **Predicates**.


    The **Reconciler** implementations need to implement the specific injector interfaces
    from the **inject** package: **inject.Client**, **inject.Cache**, **inject.Scheme**,
    and so on.


    These methods will be called at initialization time, when you call **controller.New**
    or **builder.Complete**. For this, one method needs to be created for each interface,
    for example:


    ```

    type MyReconciler struct {

    client client.Client

    cache cache.Cache

    scheme *runtime.Scheme

    }

    func (a *MyReconciler) InjectClient(

    c client.Client,

    ) error {

    a.client = c

    return nil

    }

    func (a *MyReconciler) InjectCache(

    c cache.Cache,

    ) error {

    a.cache = c

    return nil

    }

    func (a *MyReconciler) InjectScheme(

    s *runtime.Scheme,

    ) error {

    a.scheme = s

    return nil

    }

    ```


    ## Using the Client


    The client can be used to read and write resources on the cluster and to update
    the statuses of resources.


    The **Read** methods internally use a Cache system, based on *Informers* and *Listers*,
    to limit the read access to the API Server. Using this cache, all controllers
    of the same manager have read access to the resources while limiting the requests
    to the API Server.


    You must note that objects returned by Read operations are pointers to values
    into the Cache. You must **never** modify these objects directly. Instead, you
    must create a deep copy of the returned objects before modifying them.


    The methods of the client are generic: they work with any Kubernetes resource,
    either native or custom if they are known by the Scheme passed to the manager.


    All methods return an error, which are of the same type as the errors returned
    by the **Client-go** Clientset methods. You can refer to Chapter [6](#533908_1_En_6_Chapter.xhtml)’s
    “Errors and Statuses” section for more information.


    ### Getting Information About a Resource


    The **Get** method is used to get information about a resource.


    ```

    Get(

    ctx context.Context,

    key ObjectKey,

    obj Object,

    opts ...GetOption,

    ) error

    ```


    It gets as a parameter an **ObjectKey** value to indicate the namespace and name
    of the resource, and an **Object** to indicate the *Kind* of the resource to get
    and to store the result. The **Object** must be a pointer to a typed resource—for
    example, a **Pod** or a **MyResource** structure. The **ObjectKey** type is an
    alias for **types.NamespacedName**, defined in the API Machinery Library.


    **NamespacedName** is also the type of the object embedded in the **Request**
    passed as parameter to the **Reconcile** function. You can directly pass **req.NamespacedName**
    as **ObjectKey** to get the resource to reconcile. For example, use the following
    to get the resource to reconcile:


    ```

    myresource := mygroupv1alpha1.MyResource{}

    err := a.client.Get(

    ctx,

    req.NamespacedName,

    &myresource,

    )

    ```


    It is possible to pass a specific **resourceVersion** value to the **Get** request,
    passing a **client.GetOptions** structure instance as the last parameter.


    The **GetOptions** structure implements the **GetOption** interface and contains
    a single **Raw** field having a **metav1.GetOptions** value. For example, to specify
    a **resourceVersion** with a value “0” to get any version of the resource:


    ```

    err := a.client.Get(

    ctx,

    req.NamespacedName,

    &myresource,

    &client.GetOptions{

    Raw: &metav1.GetOptions{

    ResourceVersion: "0",

    },

    },

    )

    ```'
  trans: "\n### 使用 `ControllerBuilder` 的第二个示例\n\n在此示例中，你将使用 `ControllerBuilder` 构建控制器，而不是使用\
    \ `controller.New` 函数和 `Controller` 上的 `Watch` 方法。\n\n```go\npackage main\n\n\
    import (\n\t\"context\"\n\t\"fmt\"\n\tcorev1 \"k8s.io/api/core/v1\"\n\t\"k8s.io/apimachinery/pkg/runtime\"\
    \n\tclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\n\t\"sigs.k8s.io/controller-runtime/pkg/builder\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/client\"\n\t\"sigs.k8s.io/controller-runtime/pkg/client/config\"\
    \n\t\"sigs.k8s.io/controller-runtime/pkg/manager\"\n\t\"sigs.k8s.io/controller-runtime/pkg/reconcile\"\
    \n\tmygroupv1alpha1 \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
    \n)\n\nfunc main() {\n\tscheme := runtime.NewScheme()\n\tclientgoscheme.AddToScheme(scheme)\n\
    \tmygroupv1alpha1.AddToScheme(scheme)\n\tmgr, err := manager.New(\n\t\tconfig.GetConfigOrDie(),\n\
    \t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t)\n\tpanicIf(err)\n\n\t\
    err = builder.\n\t\tControllerManagedBy(mgr).\n\t\tFor(&mygroupv1alpha1.MyResource{}).\n\
    \t\tOwns(&corev1.Pod{}).\n\t\tComplete(&MyReconciler{})\n\tpanicIf(err)\n\n\t\
    err = mgr.Start(context.Background())\n\tpanicIf(err)\n}\n\ntype MyReconciler\
    \ struct{}\n\nfunc (a *MyReconciler) Reconcile(\n\tctx context.Context,\n\treq\
    \ reconcile.Request,\n) (reconcile.Result, error) {\n\tfmt.Printf(\"reconcile\
    \ %v\\n\", req)\n\treturn reconcile.Result{}, nil\n}\n\nfunc panicIf(err error)\
    \ {\n\tif err != nil {\n\t\tpanic(err)\n\t}\n}\n```\n\n### 向 Reconciler 注入 Manager\
    \ 资源\n\n`Manager` 为控制器提供共享资源，包括用于读写 Kubernetes 资源的客户端（client）、用于从本地缓存读取资源的缓存（cache）以及用于解析资源的\
    \ Scheme（scheme）。`Reconcile` 函数需要访问这些共享资源。有两种方式可以实现共享：\n\n#### 在创建 Reconciler\
    \ 结构体时传递值\n\n创建控制器时，你会传入一个实现了 `Reconciler` 接口的 `Reconcile` 结构体实例：\n\n```go\ntype\
    \ MyReconciler struct{}\n\nerr = builder.\n\tControllerManagedBy(mgr).\n\tFor(&mygroupv1alpha1.MyResource{}).\n\
    \tOwns(&corev1.Pod{}).\n\tComplete(&MyReconciler{})\n```\n\nManager 在此之前已经创建，你可以通过\
    \ Manager 上的 `Getter` 方法访问共享资源。\n\n例如，以下是如何从新创建的 Manager 中获取客户端、缓存和 Scheme：\n\n\
    ```go\nmgr, err := manager.New(\n\tconfig.GetConfigOrDie(),\n\tmanager.Options{\n\
    \t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t},\n)\n// 处理错误\nmgrClient\
    \ := mgr.GetClient()\nmgrCache := mgr.GetCache()\nmgrScheme := mgr.GetScheme()\n\
    ```\n\n你可以向 `Reconciler` 结构体添加字段来传递这些值：\n\n```go\ntype MyReconciler struct {\n\
    \tclient client.Client\n\tcache  cache.Cache\n\tscheme *runtime.Scheme\n}\n```\n\
    \n最后，在创建控制器时传递这些值：\n\n```go\nerr = builder.\n\tControllerManagedBy(mgr).\n\tFor(&mygroupv1alpha1.MyResource{}).\n\
    \tOwns(&corev1.Pod{}).\n\tComplete(&MyReconciler{\n\t\tclient: mgr.GetClient(),\n\
    \t\tcache:  mgr.GetCache(),\n\t\tscheme: mgr.GetScheme(),\n\t})\n```\n\n#### 使用注入器\n\
    \n`controller-runtime` 库提供了一套 *Injectors*（注入器）系统，用于将共享资源注入到 `Reconciler` 中，以及其他结构体（如你自定义的\
    \ `Sources`、`EventHandlers` 和 `Predicates` 实现）中。\n\n`Reconciler` 的实现需要实现 `inject`\
    \ 包中特定的注入器接口：`inject.Client`、`inject.Cache`、`inject.Scheme` 等。\n\n这些方法将在初始化时（即调用\
    \ `controller.New` 或 `builder.Complete` 时）被调用。因此需要为每个接口创建一个方法，例如：\n\n```go\ntype\
    \ MyReconciler struct {\n\tclient client.Client\n\tcache  cache.Cache\n\tscheme\
    \ *runtime.Scheme\n}\n\nfunc (a *MyReconciler) InjectClient(\n\tc client.Client,\n\
    ) error {\n\ta.client = c\n\treturn nil\n}\n\nfunc (a *MyReconciler) InjectCache(\n\
    \tc cache.Cache,\n) error {\n\ta.cache = c\n\treturn nil\n}\n\nfunc (a *MyReconciler)\
    \ InjectScheme(\n\ts *runtime.Scheme,\n) error {\n\ta.scheme = s\n\treturn nil\n\
    }\n```\n\n## 使用客户端（Client）\n\n客户端可用于读写集群上的资源，以及更新资源的状态。\n\n`Read` 方法内部使用基于 *Informers*\
    \ 和 *Listers* 的缓存系统，以限制对 API Server 的读取访问。通过使用此缓存，同一 Manager 下的所有控制器都可以访问资源，同时限制对\
    \ API Server 的请求。\n\n你必须注意，读取操作返回的对象是指向缓存中值的指针。**切勿**直接修改这些对象。相反，在修改之前，你必须创建返回对象的深度副本。\n\
    \n客户端的方法是通用的：它们可以处理任何 Kubernetes 资源，无论是原生资源还是自定义资源，只要这些资源在传递给 Manager 的 Scheme\
    \ 中已注册。\n\n所有方法都会返回一个错误，其类型与 `Client-go` 的 ClientSet 方法返回的错误类型相同。更多信息请参考第 6 章的“错误和状态”部分。\n\
    \n### 获取资源信息\n\n`Get` 方法用于获取资源的信息。\n\n```go\nGet(\n\tctx context.Context,\n\t\
    key ObjectKey,\n\tobj Object,\n\topts ...GetOption,\n) error\n```\n\n它接受一个 `ObjectKey`\
    \ 值作为参数，用于指定资源的命名空间和名称；以及一个 `Object` 参数，用于指示要获取资源的 *Kind*（种类）并存储结果。`Object` 必须是指向类型化资源的指针——例如\
    \ `Pod` 或 `MyResource` 结构体。`ObjectKey` 类型是 `types.NamespacedName` 的别名，定义于 API\
    \ Machinery 库中。\n\n`NamespacedName` 也是作为参数传递给 `Reconcile` 函数的 `Request` 中嵌入的对象类型。你可以直接使用\
    \ `req.NamespacedName` 作为 `ObjectKey` 来获取需要调协的资源。例如，使用以下代码获取需要调协的资源：\n\n```go\n\
    myresource := mygroupv1alpha1.MyResource{}\nerr := a.client.Get(\n\tctx,\n\treq.NamespacedName,\n\
    \t&myresource,\n)\n```\n\n可以在 `Get` 请求中传递特定的 `resourceVersion` 值，只需将 `client.GetOptions`\
    \ 结构体实例作为最后一个参数传入。\n\n`GetOptions` 结构体实现了 `GetOption` 接口，包含一个单独的 `Raw` 字段，其值为\
    \ `metav1.GetOptions`。例如，指定 `resourceVersion` 为 \"0\" 以获取资源的任何版本：\n\n```go\nerr\
    \ := a.client.Get(\n\tctx,\n\treq.NamespacedName,\n\t&myresource,\n\t&client.GetOptions{\n\
    \t\tRaw: &metav1.GetOptions{\n\t\t\tResourceVersion: \"0\",\n\t\t},\n\t},\n)\n\
    ```\n"
- fmt: '# Listing Resources


    The `List` method is used to list resources of a specific kind.


    ```

    List(

    ctx context.Context,

    list ObjectList,

    opts ...ListOption,

    ) error

    ```


    The `list` parameter is an `ObjectList` value indicating the *Kind* of the resource
    to list and to store the result. By default, the list is performed across all
    namespaces.


    The `List` method accepts zero or more parameters of objects implementing the
    `ListOption` interface. These types are supported by the following:


    *   `InNamespace`, alias to `string`, is used to return the resources of a specific
    namespace.


    *   `MatchingLabels`, alias to `map[string]string`, is used to indicate the list
    of labels and their exact value that must be defined for a resource to be returned.
    The following example builds a `MatchingLabels` structure to filter resources
    with a label `app=myapp`.


    *   `HasLabels`, alias to `[]string`, is used to indicate the list of labels,
    independently of their value, that must be defined for a resource to be returned.
    The following example builds a `HasLabels` structure to filter resources with
    `app` and `debug` labels.


    ```

    matchLabel := client.MatchingLabels{

    "app": "myapp",

    }

    ```


    *   `MatchingLabelsSelector`, embedding a `labels.Selector` interface, is used
    to pass more advanced label selectors. See Chapter [6](#533908_1_En_6_Chapter.xhtml)''s
    "Filtering the Result of a List" section for more information on how to build
    a `Selector`. The following example builds a `MatchingLabelsSelector` structure
    that can be used as an option for `List` to filter resources with a label `mykey`
    different from `ignore`.


    ```

    hasLabels := client.HasLabels{"app", "debug"}

    ```


    *   `MatchingFields`, alias to `fields.Set`, itself an alias to `map[string]string`,
    is used to indicate the fields and their value to match. The following example
    builds a `MatchingFields` structure to filter resources with the field `status.phase`
    that is `Running`:


    ```

    selector := labels.NewSelector()

    require, err := labels.NewRequirement(

    "mykey",

    selection.NotEquals,

    []string{"ignore"},

    )

    // assert err is nil

    selector = selector.Add(*require)

    labSelOption := client.MatchingLabelsSelector{

    Selector: selector,

    }

    ```


    *   `MatchingFieldsSelector`, embedding a `fields.Selector`, is used to pass more
    advanced field selectors. See Chapter [6](#533908_1_En_6_Chapter.xhtml)''s "Filtering
    the Result of a List" section for more information on how to build a `fields.Selector`.
    The following example builds a `MatchingFieldsSelector` structure to filter resources
    with a field `status.phase` different from `Running`:


    ```

    matchFields := client.MatchingFields{

    "status.phase": "Running",

    }

    ```


    *   `Limit`, alias to `int64` and `Continue`, alias to `string`, is used to paginate
    the result. These options are detailed in Chapter [2](#533908_1_En_2_Chapter.xhtml)''s
    "Paginating Results" section.


    ```

    fieldSel := fields.OneTermNotEqualSelector(

    "status.phase",

    "Running",

    )

    fieldSelector := client.MatchingFieldsSelector{

    Selector: fieldSel,

    }

    ```


    ## Creating a Resource


    The `Create` method is used to create a new resource in the cluster.


    ```

    Create(

    ctx context.Context,

    obj Object,

    opts ...CreateOption,

    ) error

    ```


    The `obj` passed as a parameter defines the kind of object to create, as well
    as its definition. The following example will create a Pod in the cluster:


    ```

    podToCreate := corev1.Pod{ [...] }

    podToCreate.SetName("nginx")

    podToCreate.SetNamespace("default")

    err = a.client.Create(ctx, &podToCreate)

    ```


    The following options can be passed as `CreateOption` to parameterize the `Create`
    request.


    *   `DryRunAll` value indicates that all the operations should be executed except
    those persisting the resource to storage.


    *   `FieldOwner`, alias to `string`, indicates the name of the field manager for
    the `Create` operation. This information is useful for Server-side Apply operations
    to work correctly.


    ## Deleting a Resource


    The `Delete` method is used to delete a resource from the cluster.


    ```

    Delete(

    ctx context.Context,

    obj Object,

    opts ...DeleteOption,

    ) error

    ```


    The `obj` passed as a parameter defines the kind of object to delete, as well
    as its namespace (if the resource is namespaced) and its name. The following example
    can be used to delete a Pod.


    ```

    podToDelete := corev1.Pod{}

    podToDelete.SetName("nginx")

    podToDelete.SetNamespace("prj2")

    err = a.client.Delete(ctx, &podToDelete)

    ```


    The following options can be passed as `DeleteOption` to parameterize the `Delete`
    request.


    *   `DryRunAll` – this value indicates that all the operations should be executed
    except those persisting the resource to storage.


    *   `GracePeriodSeconds`, alias to `int64` – this value is useful when deleting
    pods only. This indicates the duration in seconds before the pod should be deleted.
    See Chapter [6](#533908_1_En_6_Chapter.xhtml)''s, "Deleting a Resource" section
    for more details.


    *   `Preconditions`, alias to `metav1.Preconditions` – this indicates which resource
    you expect to delete. See Chapter [6](#533908_1_En_6_Chapter.xhtml)''s, "Deleting
    a Resource" section for more details.


    *   `PropagationPolicy`, alias to `metav1.DeletionPropagation` – this indicates
    whether and how garbage collection will be performed. See Chapter [6](#533908_1_En_6_Chapter.xhtml)''s,
    "Deleting a Resource" section for more details.


    ## Deleting a Collection of Resources


    The `DeleteAllOf` method is used to delete all resources of a given type from
    the cluster.


    ```

    DeleteAllOf(

    ctx context.Context,

    obj Object,

    opts ...DeleteAllOfOption,

    ) error

    ```


    The `obj` passed as a parameter defines the kind of object to delete.


    The `opts` available for the `DeleteAllOf` operation is the combination of the
    options for the `List` operation (see "Listing Resources" section) and the `Delete`
    operation (see "Deleting a Resource" section).


    As an example, here is how to delete all deployments from a given namespace:


    ```

    err = a.client.DeleteAllOf(

    ctx,

    &appsv1.Deployment{},

    client.InNamespace(aNamespace))

    ```


    ## Updating a Resource


    The `Update` method is used to update an existing resource in the cluster.


    ```

    Update(

    ctx context.Context,

    obj Object,

    opts ...UpdateOption,

    ) error

    ```


    The `obj` parameter is used to indicate which resource to update, and its new
    definition. If the object does not exist in the cluster, the `Update` operation
    fails.


    The following options can be passed as `UpdateOption` to parameterize the `Update`
    request.


    *   `DryRunAll` value indicates that all the operations should be executed except
    those persisting the resource to storage.


    *   `FieldOwner`, alias to `string`, indicates the name of the field manager for
    the `Update` operation. This information is useful for Server-side Apply operations
    to work correctly.


    ## Patching a Resource


    The `Patch` method is used to patch an existing resource. It can also be used
    to run a Server-Side Apply operation.


    ```

    Patch(

    ctx context.Context,

    obj Object,

    patch Patch,

    opts ...PatchOption,

    ) error

    ```


    The following options can be passed as `PatchOption` to parameterize the `Patch`
    request.


    *   `DryRunAll` value indicates to execute all the operations except persisting
    the resource to storage.


    *   `FieldOwner`, alias to `string`, indicates the name of the field manager for
    the `Patch` operation.


    *   `ForceOwnership`, alias to `struct{}`, indicates that the caller will reacquire
    the conflicting fields owned by other managers. This option is valid only when
    the patch type is `Apply` (see the following).'
