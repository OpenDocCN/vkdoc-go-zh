    # 6. `Client-go` 库


    前几章探讨了 *Kubernetes API 库*（一组用于操作 Kubernetes API 对象的 Go 结构体）和 *API Machinery 库*（提供了用于处理遵循
    Kubernetes API 对象约定的 API 对象的工具）。具体来说，你已经看到 API Machinery 提供了 `Scheme` 和 `RESTMapper`
    抽象。


    本章将探讨 `Client-go` 库，它是一个高级库，开发人员可以使用它通过 Go 语言与 Kubernetes API 进行交互。`Client-go`
    库汇集了 Kubernetes API 和 API Machinery 库，提供了一个预配置了 Kubernetes API 对象的 `Scheme` 和一个用于
    Kubernetes API 的 `RESTMapper` 实现。它还提供了一组客户端，用于以简单的方式对 Kubernetes API 的资源执行操作。


    要使用此库，你需要从其中导入以 `k8s.io/client-go` 为前缀的包。例如，要使用 `kubernetes` 包，请使用以下代码：


    ```go

    import (

    "k8s.io/client-go/kubernetes"

    )

    ```


    你还需要下载一个版本的 `Client-go` 库。为此，你可以使用 `go get` 命令来获取你想要使用的版本：


    ```bash

    $ go get k8s.io/client-go@v0.24.4

    ```


    `Client-go` 库的版本与 Kubernetes 的版本保持一致——版本 0.24.4 对应于服务器的版本 1.24.4。


    Kubernetes 是向后兼容的，因此你可以将旧版本的 `Client-go` 与新版本的集群一起使用，但你很可能希望获取一个新版本，以便能够使用当前的功能，因为只有错误修复会被移植到以前的
    client-go 版本中，新功能则不会。


    ## 连接到集群


    在连接到 Kubernetes API 服务器之前，第一步是要拥有连接所需的配置——即服务器的地址、其凭据、连接参数等。


    `rest` 包提供了一个 `rest.Config` 结构体，其中包含了应用程序连接到 *REST* API 服务器所需的所有配置信息。


    ### 集群内配置


    默认情况下，运行在 Kubernetes Pod 上的容器包含了连接到 API 服务器所需的所有信息：


    -   Pod 使用的 `ServiceAccount` 提供的*令牌*和*根证书*位于此目录中：`/var/run/secrets/kubernetes.io/serviceaccount/`。

    -   注意，可以通过在 Pod 使用的 `ServiceAccount` 中设置 `automountServiceAccountToken: false`，或直接在
    Pod 的规格说明中设置，来禁用此行为。

    -   `kubelet` 在容器环境中定义的环境变量 `KUBERNETES_SERVICE_HOST` 和 `KUBERNETES_SERVICE_PORT`，指定了联系
    API 服务器的主机和端口。


    当应用程序专门设计为在 Pod 的容器内运行时，你可以利用上述信息，使用以下函数来创建一个合适的 `rest.Config` 结构体：


    ```go

    import "k8s.io/client-go/rest"

    func InClusterConfig() (*Config, error)

    ```


    ### 集群外配置


    Kubernetes 工具通常依赖于 `kubeconfig` 文件——即包含一个或多个 Kubernetes 集群的连接配置的文件。


    你可以通过使用 `clientcmd` 包中的以下函数之一，基于此 `kubeconfig` 文件的内容来构建一个 `rest.Config` 结构体。


    #### 从内存中的 Kubeconfig 文件构建


    `RESTConfigFromKubeConfig` 函数可用于从 `kubeconfig` 文件的内容（作为字节数组）构建一个 `rest.Config`
    结构体。


    ```go

    func RESTConfigFromKubeConfig(

    configBytes []byte,

    ) (*rest.Config, error)

    ```


    如果 `kubeconfig` 文件包含多个*上下文*，则会使用当前上下文，而忽略其他上下文。例如，你可以先读取 `kubeconfig` 文件的内容，然后使用以下函数：


    ```go

    import "k8s.io/client-go/tools/clientcmd"

    configBytes, err := os.ReadFile(

    "/home/user/.kube/config",

    )

    if err != nil {

    return err

    }

    config, err := clientcmd.RESTConfigFromKubeConfig(

    configBytes,

    )

    if err != nil {

    return err

    }

    ```


    #### 从磁盘上的 Kubeconfig 文件构建


    `BuildConfigFromFlags` 函数可用于从 API 服务器的 URL、基于 `kubeconfig` 文件的路径（两者皆可）来构建一个 `rest.Config`
    结构体。


    ```go

    func BuildConfigFromFlags(

    masterUrl,

    kubeconfigPath string,

    ) (*rest.Config, error)

    ```


    以下代码允许你获取一个 `rest.Config` 结构体：


    ```go

    import "k8s.io/client-go/tools/clientcmd"

    config, err := clientcmd.BuildConfigFromFlags(

    "",

    "/home/user/.kube/config",

    )

    ```


    以下代码从 `kubeconfig` 获取配置，并覆盖 API 服务器的 URL：


    ```go

    config, err := clientcmd.BuildConfigFromFlags(

    "https://192.168.1.10:6443",

    "/home/user/.kube/config",

    )

    ```


    #### 从个性化的 Kubeconfig 文件构建


    前面的函数在内部使用了一个 `api.Config` 结构体，该结构体表示 `kubeconfig` 文件中的数据（不要与包含 *REST* HTTP 连接参数的
    `rest.Config` 结构体混淆）。


    如果你需要操作这个中间数据，可以使用 `BuildConfigFromKubeconfigGetter` 函数，它接受一个 `kubeconfigGetter`
    函数作为参数，该函数本身会返回一个 `api.Config` 结构体。


    ```go

    BuildConfigFromKubeconfigGetter(

    masterUrl string,

    kubeconfigGetter KubeconfigGetter,

    ) (*rest.Config, error)

    type KubeconfigGetter

    func() (*api.Config, error)

    ```


    例如，以下代码将从 `kubeconfigGetter` 函数中使用 `clientcmd.Load` 或 `clientcmd.LoadFromFile`
    函数来加载 `kubeconfig` 文件：


    ```go

    import (

    "k8s.io/client-go/tools/clientcmd"

    "k8s.io/client-go/tools/clientcmd/api"

    )

    config, err :=

    clientcmd.BuildConfigFromKubeconfigGetter(

    "",

    func() (*api.Config, error) {

    apiConfig, err := clientcmd.LoadFromFile(

    "/home/user/.kube/config",

    )

    if err != nil {

    return nil, nil

    }

    // TODO: 操作 apiConfig

    return apiConfig, nil

    },

    )

    ```


    #### 从多个 Kubeconfig 文件构建


    `kubectl` 工具默认使用 `$HOME/.kube/config kubeconfig` 文件，并且你可以使用 `KUBECONFIG` 环境变量指定另一个
    `kubeconfig` 文件的路径。


    不仅如此，你可以在此环境变量中指定一个 `kubeconfig` 文件路径列表，这些 `kubeconfig` 文件将在使用前被*合并*为一个。你可以通过以下函数获得相同的行为：`NewNonInteractiveDeferredLoadingClientConfig`。


    ```go

    func NewNonInteractiveDeferredLoadingClientConfig(

    loader ClientConfigLoader,

    overrides *ConfigOverrides,

    ) ClientConfig

    ```


    `clientcmd.ClientConfigLoadingRules` 类型实现了 `ClientConfigLoader` 接口，你可以使用以下函数获取此类型的值：


    ```go

    func NewDefaultClientConfigLoadingRules()

    *ClientConfigLoadingRules

    ```


    如果存在 `KUBECONFIG` 环境变量，此函数将获取其值以获取要合并的 `kubeconfig` 文件列表，否则将回退使用位于 `$HOME/.kube/config`
    的默认 `kubeconfig` 文件。


    使用以下代码创建 `rest.Config` 结构体，你的程序将具有与之前描述的 `kubectl` 相同的行为：


    ```go

    import (

    "k8s.io/client-go/tools/clientcmd"

    )

    config, err :=

    clientcmd.NewNonInteractiveDeferredLoadingClientConfig(

    clientcmd.NewDefaultClientConfigLoadingRules(),

    nil,

    ).ClientConfig()

    ```

