  trans: '

    # 使用 Labels 包设置 LabelSelector


    以下是使用 API Machinery 库中 `labels` 包所需的导入信息。


    ```go

    import (

    "k8s.io/apimachinery/pkg/labels"

    )

    ```


    该包提供了多种构建和验证 `LabelsSelector` 字符串的方法：使用 Requirements（需求条件）、解析 `labelSelector`
    字符串，或使用一组键值对。


    ## 使用 Requirements


    首先，你需要使用以下代码创建一个 `labels.Selector` 对象：


    ```go

    labelsSelector := labels.NewSelector()

    ```


    然后，你可以使用 `labels.NewRequirement` 函数创建 `Requirement` 对象：


    ```go

    func NewRequirement(

    key string,

    op selection.Operator,

    vals []string,

    opts ...field.PathOption,

    ) (*Requirement, error)

    ```


    `op` 可能取值的常量定义在 `selection` 包中（即 `k8s.io/apimachinery/pkg/selection`）。`vals` 字符串数组中的值数量取决于操作类型：


    *   `selection.In` / `selection.NotIn` – 与 `key` 关联的值必须等于 (`In`) / 必须不等于 (`NotIn`)
    `vals` 中定义的某个值。

    *   `vals` 必须非空。


    *   `selection.Equals` / `selection.DoubleEquals` / `selection.NotEquals` – 与
    `key` 关联的值必须等于 (`Equals`, `DoubleEquals`) 或必须不等于 (`NotEquals`) `vals` 中定义的值。

    *   `vals` 必须包含一个单一值。


    *   `selection.Exists` / `selection.DoesNotExist` – `key` 必须已定义 (`Exists`) 或必须未定义
    (`DoesNotExist`)。

    *   `vals` 必须为空。


    *   `selection.Gt` / `selection.Lt` – 与 `key` 关联的值必须大于 (`Gt`) 或小于 (`Lt`) `vals`
    中定义的值。

    *   `vals` 必须包含一个代表整数的单一值。


    例如，要要求键 `mykey` 的值等于 `value1`，你可以用以下方式声明一个 `Requirement`：


    ```go

    req1, err := labels.NewRequirement(

    "mykey",

    selection.Equals,

    []string{"value1"},

    )

    ```


    定义好 `Requirement` 之后，你可以使用选择器上的 `Add` 方法将需求条件添加到选择器中：


    ```go

    labelsSelector = labelsSelector.Add(*req1, *req2)

    ```


    最后，你可以通过以下方式获取要传递给 `LabelSelector` 选项的 `String`：


    ```go

    s := labelsSelector.String()

    ```


    ## 解析 LabelSelector 字符串


    如果你已经有了一个描述标签选择器的字符串，你可以使用 `Parse` 函数检查其有效性。`Parse` 函数会验证该字符串并返回一个 `LabelSelector`
    对象。你可以使用此 `LabelSelector` 对象的 `String` 方法来获取经 `Parse` 函数验证过的字符串。


    例如，以下代码将解析、验证并返回标签选择器 `"mykey = value1, count < 5"` 的规范形式：


    ```go

    selector, err := labels.Parse(

    "mykey = value1, count < 5",

    )

    if err != nil {

    return err

    }

    s := selector.String()

    // s = "mykey=value1,count<5"

    ```


    ## 使用一组键值对


    当你只想对一个或多个需求条件使用 `Equal` 操作时，可以使用 `ValidatedSelectorFromSet` 函数：


    ```go

    func ValidatedSelectorFromSet(

    ls Set

    ) (Selector, error)

    ```


    在这种情况下，`Set` 将定义你想要检查相等性的键值对集合。


    例如，以下代码将声明一个标签选择器，要求键 `key1` 等于 `value1`，键 `key2` 等于 `value2`：


    ```go

    set := labels.Set{

    "key1": "value1",

    "key2": "value2",

    }

    selector, err = labels.ValidatedSelectorFromSet(set)

    s = selector.String()

    // s = "key1=value1,key2=value2"

    ```


    # 使用 Fields 包设置 FieldSelector


    以下是使用 API Machinery 库中 `fields` 包所需的代码。


    ```go

    import (

    "k8s.io/apimachinery/pkg/fields"

    )

    ```


    该包提供了多种构建和验证 `FieldSelector` 字符串的方法：组合单项选择器、解析 `fieldSelector` 字符串，或使用一组键值对。


    ## 组合单项选择器


    你可以使用 `OneTermEqualSelector` 和 `OneTermNotEqualSelector` 函数创建单项选择器，然后使用 `AndSelectors`
    函数组合这些选择器以构建一个完整的字段选择器。


    ```go

    func OneTermEqualSelector(

    k, v string,

    ) Selector

    func OneTermNotEqualSelector(

    k, v string,

    ) Selector

    func AndSelectors(

    selectors ...Selector,

    ) Selector

    ```


    例如，以下代码构建了一个字段选择器，其中包含对字段 `status.Phase` 的 `Equal` 条件和对字段 `spec.restartPolicy`
    的 `NotEqual` 条件：


    ```go

    fselector = fields.AndSelectors(

    fields.OneTermEqualSelector(

    "status.Phase",

    "Running",

    ),

    fields.OneTermNotEqualSelector(

    "spec.restartPolicy",

    "Always",

    ),

    )

    fs = fselector.String()

    ```


    ## 解析 FieldSelector 字符串


    如果你已经有了一个描述字段选择器的字符串，你可以使用 `ParseSelector` 或 `ParseSelectorOrDie` 函数检查其有效性。`ParseSelector`
    函数会验证该字符串并返回一个 `fields.Selector` 对象。你可以使用此 `fields.Selector` 对象的 `String` 方法来获取经
    `ParseSelector` 函数验证过的字符串。


    例如，以下代码将解析、验证并返回字段选择器 `"status.Phase = Running, spec.restartPolicy != Always"`
    的规范形式：


    ```go

    selector, err := fields.ParseSelector(

    "status.Phase=Running, spec.restartPolicy!=Always",

    )

    if err != nil {

    return err

    }

    s := selector.String()

    // s = "spec.restartPolicy!=Always,status.Phase=Running"

    ```


    ## 使用一组键值对


    当你只想对一个或多个单项选择器使用 `Equal` 操作时，可以使用 `SelectorFromSet` 函数。


    ```go

    func SelectorFromSet(ls Set) Selector

    ```


    在这种情况下，`Set` 将定义你想要检查相等性的键值对集合。


    例如，以下代码将声明一个字段选择器，要求键 `key1` 等于 `value1`，键 `key2` 等于 `value2`：


    ```go

    set := fields.Set{

    "field1": "value1",

    "field2": "value2",

    }

    selector = fields.SelectorFromSet(set)

    s = selector.String()

    // s = "key1=value1,key2=value2"

    ```

