    \n- `GetName()`方法来自`PatchAction`接口，会返回作为参数传递给`Patch`方法的名称（`name`）\n\n- `GetPatchType()`方法来自`PatchAction`接口，会返回作为参数传递给`Patch`方法的`pt`\n\
