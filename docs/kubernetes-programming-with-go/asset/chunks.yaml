    ### 从上下文中获取日志记录器


    管理器会将一个日志记录器添加到传递给不同方法（特别是 `Reconcile` 函数）的 `Context` 中。


    你可以使用 `FromContext` 函数从 `Context` 中提取日志记录器。可选的参数可用于向日志记录器中添加预定义的键值对：


    ```go

    func FromContext(

    ctx context.Context,

    keysAndValues ...interface{},

    ) logr.Logger {

    func (a *MyReconciler) Reconcile(

    ctx context.Context,

    req reconcile.Request,

    ) (reconcile.Result, error) {

    log := log.FromContext(ctx).WithName("reconcile")

    [...]

    }

    ```


    ## 事件


    Kubernetes API 提供了一个 `Event` 资源，`Event` 实例会附加到任何特定类型的实例上。事件由控制器发送，用于通知用户某个与对象相关的事件已发生。这些事件在执行
    `kubectl describe` 时会显示出来。例如，你可以看到与 Pod 执行相关的事件：


    ```bash

    $ kubectl describe pods nginx

    [...]

    Events:

    Type    Reason     Age        From               Message

    ----    ------     ----       ----               -------

    Normal  Scheduled  1s         default-scheduler  Successfully assigned...

    Normal  Pulling    0s         kubelet            Pulling image "nginx"

    Normal  Pulled       kubelet            Successfully pulled...

    Normal  Created      kubelet            Created container nginx

    Normal  Started      kubelet            Started container nginx

    ```


    要从 `Reconcile` 函数发送此类事件，你需要能够访问由管理器提供的 `EventRecorder` 实例。在初始化期间，你可以通过管理器的 `GetEventRecorderFor`
    方法获取此实例，然后在构建 `Reconcile` 结构体时传递这个值：


    ```go

    type MyReconciler struct {

    client        client.Client

    EventRecorder record.EventRecorder

    }

    func main() {

    [...]

    eventRecorder := mgr.GetEventRecorderFor(

    "MyResource",

    )

    err = builder.

    ControllerManagedBy(mgr).

    Named(controller.Name).

    For(&mygroupv1alpha1.MyResource{}).

    Owns(&appsv1.Deployment{}).

    Complete(&controller.MyReconciler{

    EventRecorder: eventRecorder,

    })

    [...]

    }

    ```


    然后，在 `Reconcile` 函数中，你可以调用 `Event`、`Eventf` 和 `AnnotatedEventf` 方法。


    ```go

    func (record.EventRecorder) Event(

    object runtime.Object,

    eventtype, reason, message string,

    )

    func (record.EventRecorder) Eventf(

    object runtime.Object,

    eventtype, reason, messageFmt string,

    args ...interface{},

    )

    func (record.EventRecorder) AnnotatedEventf(

    object runtime.Object,

    annotations map[string]string,

    eventtype, reason, messageFmt string,

    args ...interface{},

    )

    ```


    `object` 参数指明事件要附加到哪个对象上。你需要传递正在被调和的**自定义资源**。


    `eventtype` 参数接受两个值，`corev1.EventTypeNormal` 和 `corev1.EventTypeWarning`。


    `reason` 参数是一个采用 `UpperCamelCase` 格式的短值。`message` 参数是一个人类可读的文本。


    `Event` 方法用于传递静态消息，`Eventf` 方法可以使用 `Sprintf` 创建消息，而 `AnnotatedEventf` 方法还可以向事件附加注解。


    ## 结论


    在本章中，你使用了 `controller-runtime` 库来开始创建一个运算符。你已经了解了如何使用适当的方案创建管理器，如何创建控制器并声明 `Reconcile`
    函数，并且探索了该库提供的客户端用于访问集群中资源的各种功能。


    下一章将探讨如何编写 `Reconcile` 函数。


    # 11. 编写调谐循环


    在上一章中，我们已经了解了如何使用 `controller-runtime` 库来引导一个新项目以编写一个运算符。在本章中，我们将重点实现 `Reconcile`
    函数，这是实现运算符的重要部分。


    `Reconcile` 函数包含了运算符的所有业务逻辑。该函数将作用于单一的资源类型——可以说这个运算符*调谐*这种资源——并且当其他类型的对象触发事件时，可以通过使用*属主引用*将这些其他类型映射到被调谐的资源类型上，从而得到通知。


    `Reconcile` 函数的作用是确保系统的状态与被调谐资源中指定的状态相匹配。为此，它将创建“底层”资源来实现要调谐的资源。这些资源依次由其他控制器或运算符进行调谐。当这些资源的调谐完成时，它们的状态会被更新以反映其新状态。此外，运算符将能够检测到这些变化并相应地调整被调谐资源的状态。


    例如，你在上一章开始实现的运算符调谐了自定义资源 `MyResource`。该运算符将创建 `Deployment` 实例来实现 `MyResource`
    实例，并且因此，该运算符也将希望监视 Deployment 资源。


    当 Deployment 实例触发一个事件时，为其创建了 Deployment 的 `MyResource` 实例将被调谐。例如，在 Deployment
    的 Pod 被创建后，Deployment 的状态将被更新以指示所有副本正在运行。此时，运算符可以修改被调谐资源的状态以指示其已就绪。


    *调谐循环* 是一个过程，包括监视资源，在资源被创建、修改或删除时调用 `Reconcile` 函数，使用底层资源实现被调谐的资源，监视这些资源的状态，并相应更新被调谐资源的状态。


    ## 编写 Reconcile 函数


    `Reconcile` 函数从队列中接收一个要调谐的资源。首先要进行的操作是获取关于这个要调谐的资源的信息。


    事实上，只会接收到资源的命名空间和名称（其类型通过设计已知为运算符要调谐的类型），但你不会接收到资源的完整定义。


    使用 `Get` 操作来获取资源的定义。


    ### 检查资源是否存在


    资源可能因各种原因被加入队列：它已被创建、修改或删除（或者另一个拥有的资源已被创建、修改或删除）。在前两种情况（创建或修改）下，`Get` 操作将成功，并且
    `Reconcile` 函数此时将知道资源的定义。在删除的情况下，`Get` 操作将失败并返回 `Notfound` 错误，因为该资源已被删除。


    运算符的良好实践是在调谐资源时，为其创建的资源添加 `OwnerReferences`。主要目标是当这些创建的资源被修改时，能够调谐其属主，添加这些 `OwnerReferences`
    的一个结果是，当属主资源被删除时，这些拥有的资源将由 Kubernetes 垃圾收集器删除。


    因此，当被调谐的对象被删除时，在集群中无需执行任何操作，因为关联的已创建资源的删除将由集群处理。

