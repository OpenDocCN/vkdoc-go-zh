- fmt: "### Helpers to Access Non-meta Fields\n\nThe following helpers can be used\
    \ to get and set the value of specific fields in the `Object` field of an `Unstructured`\
    \ instance.\n\nNote that these helpers are functions, and not methods on the `Unstructured`\
    \ type.\n\nThey all accept:\n\n- A first parameter `obj` of type `map[string]interface{}`\
    \ used to pass the `Object` field of the `Unstructured` instance,\n- A last parameter\
    \ `fields` of type `...string` used to pass the keys to navigate into the object.\
    \ Note that no array/slice syntax is supported.\n\nThe `Setters` accept a second\
    \ parameter giving the value to set for the specific field in the given object.\
    \ The `Getters` return three values:\n\n- The value of the requested field, if\
    \ possible\n- A boolean indicating if the requested field has been found\n- An\
    \ error if the field has been found but is not of the requested type\n\nThe names\
    \ of the helper functions are:\n\n- `RemoveNestedField` – this removes the requested\
    \ field\n- `NestedFieldCopy`, `NestedFieldNoCopy` – this returns a copy or the\
    \ original value of the requested field\n- `NestedBool`, `NestedFloat64`, `NestedInt64`,\
    \ `NestedString`, `SetNestedField` – this gets and sets bool / float64 / int64\
    \ / string field\n- `NestedMap`, `SetNestedMap` – this gets and sets fields of\
    \ type `map[string]interface{}`\n- `NestedSlice`, `SetNestedSlice` – this gets\
    \ and sets fields of type `[]interface{}`\n- `NestedStringMap`, `SetNestedStringMap`\
    \ – this gets and sets fields of type `map[string]string`\n- `NestedStringSlice`,\
    \ `SetNestedStringSlice` – this gets and sets fields of type `[]string`\n\n####\
    \ Example\n\nAs an example, here is some code that defines a `MyResource` instance:\n\
    \n```go\nimport (\n    myresourcev1alpha1 \"github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
    \n    \"k8s.io/apimachinery/pkg/apis/meta/v1/unstructured\"\n)\n\nfunc getResource()\
    \ (*unstructured.Unstructured, error) {\n    myres := unstructured.Unstructured{}\n\
    \    myres.SetGroupVersionKind(\n        myresourcev1alpha1.SchemeGroupVersion.\n\
    \            WithKind(\"MyResource\"))\n    myres.SetName(\"myres1\")\n    myres.SetNamespace(\"\
    default\")\n    err := unstructured.SetNestedField(\n        myres.Object,\n \
    \       \"nginx\",\n        \"spec\", \"image\",\n    )\n    if err != nil {\n\
    \        return err\n    }\n    // Use int64\n    err = unstructured.SetNestedField(\n\
    \        myres.Object,\n        int64(1024*1024*1024),\n        \"spec\", \"memory\"\
    ,\n    )\n    if err != nil {\n        return err\n    }\n    // or use string\n\
    \    err = unstructured.SetNestedField(\n        myres.Object,\n        \"1024Mo\"\
    ,\n        \"spec\", \"memory\",\n    )\n    if err != nil {\n        return err\n\
    \    }\n    return &myres, nil\n}\n```\n\n### The `UnstructuredList` Type\n\n\
    The `UnstructuredList` type is defined as a structure containing an `Object` field\
    \ and a slice of `Unstructured` instances as items:\n\n```go\ntype UnstructuredList\
    \ struct {\n    Object map[string]interface{}\n    // Items is a list of unstructured\
    \ objects.\n    Items []Unstructured\n}\n```\n\n#### Getters and Setters to Access\
    \ `TypeMeta` Fields\n\nThe `APIVersion` and `Kind` Getters/Setters can be used\
    \ to directly get and set the `apiVersion` and `kind` fields of the `TypeMeta`.\n\
    \nThe `GroupVersionKind` Getters/Setters can be used to convert the `apiVersion`\
    \ and `kind` specified in the object to and from a `GroupVersionKind` value.\n\
    \n```\nGetAPIVersion() string\nGetKind() string\nGroupVersionKind() schema.GroupVersionKind\n\
    SetAPIVersion(version string)\nSetKind(kind string)\nSetGroupVersionKind(gvk schema.GroupVersionKind)\n\
    ```\n\n#### Getters and Setters to Access `ListMeta` Fields\n\nThese getters and\
    \ setters are used to get and set values related to the result of `List` operations,\
    \ in the `ListMeta` field of the List.\n\n```\nGetResourceVersion() string\nGetContinue()\
    \ string\nGetRemainingItemCount() *int64\nSetResourceVersion(version string)\n\
    SetContinue(c string)\nSetRemainingItemCount(c *int64)\n```\n\n#### Methods for\
    \ Creating and Converting\n\n- `NewEmptyInstance() runtime.Unstructured` – this\
    \ creates a new instance of an Unstructured object, using the `apiVersion` and\
    \ `kind` copied from the List receiver.\n- `MarshalJSON() ([]byte, error)` – this\
    \ returns the JSON representation of the receiver.\n- `UnmarshalJSON(b []byte)\
    \ error` – this populates the receiver with the passed JSON representation.\n\
    - `UnstructuredContent() map[string]interface{}`, `SetUnstructuredContent(content\
    \ map[string]interface{})` – this gets the value of the `Object` field of the\
    \ receiver.\n- `EachListItem(fn func(runtime.Object) error) error` – this executes\
    \ the `fn` function for each item of the list.\n\n### Converting Between Typed\
    \ and Unstructured Objects\n\nThe `runtime` package of the API Machinery Library\
    \ provides utilities to convert between typed objects and unstructured objects,\
    \ objects being either a resource or a list.\n\n- ❶ Get the converter\n- ❷ Convert\
    \ an unstructured object (defining a Pod) to a typed Pod\n- ❸ Convert a typed\
    \ Pod to an unstructured object\n\n```go\nimport (\n    \"k8s.io/apimachinery/pkg/runtime\"\
    \n)\n\nconverter := runtime.DefaultUnstructuredConverter          ❶\nvar pod corev1.Pod\n\
    converter.FromUnstructured(                                   ❷\n    u.UnstructuredContent(),\
    \ &pod,\n)\nvar u unstructured.Unstructured\nu.Object = converter.ToUnstructured(&pod)\
    \                    ❸\n```\n\n### The Dynamic Client\n\nAs you have seen in Chapter\
    \ [6](#533908_1_En_6_Chapter.xhtml), the Client-go provides clients with the ability\
    \ to work with the Kubernetes API: the Clientset to access typed resources, the\
    \ REST client to make low-level REST calls to the API, and the Discovery client\
    \ to get information about the resources served by the API.\n\nIt provides another\
    \ client, the `dynamic` client, to work with untyped resources, described with\
    \ the `Unstructured` type.\n\n#### Getting the Dynamic Client\n\nThe `dynamic`\
    \ package provides functions to create a dynamic client of the type `dynamic.Interface`.\n\
    \n- `func NewForConfig(c *rest.Config) (Interface, error)` – this function returns\
    \ a dynamic client, using the provided `rest.Config` built with one of the methods\
    \ seen in chapter [6](#533908_1_En_6_Chapter.xhtml), section \"Connecting to the\
    \ cluster\".\n- `func NewForConfigOrDie(c *rest.Config) Interface` – this function\
    \ is like the previous one, but panics in case of error, instead of returning\
    \ the error. This function can be used with a hard-coded configuration, for which\
    \ you want to assert the validity.\n- `NewForConfigAndClient(c *rest.Config, httpClient\
    \ *http.Client) (Interface, error)` – this function returns a `dynamic` client,\
    \ using the provided `rest.Config`, and the provided `httpClient`. The previous\
    \ function `NewForConfig` uses a default HTTP Client built with the function `rest.HTTPClientFor`.\
    \ If you want to personalize the HTTP Client before building the `dynamic` client,\
    \ you can use this function instead."
