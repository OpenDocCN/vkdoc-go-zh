    *To Mélina and Elsa, my constant source of truth*


    Introduction


    Back in 2017, I was working for a company building video streaming software. At
    the end of that year, a small team, including me, got assigned a new job to work
    on deploying the Video CDN developed by the company on Kubernetes. We decided
    to explore the concept of Custom Resources and Operators to deploy this CDN.


    The current Kubernetes release was 1.9, the concept of Custom Resource Definition
    had just been released in 1.7, and the sample-controller repository was the only
    documentation we knew of to help build an Operator. The Kubernetes ecosystem,
    being especially lively, had tools appearing in the following months, specifically
    the Kubebuilder SDK. Thus, our project was launched.


    From that moment on, I spent numerous days exploring how to build Operators and
    other programs interacting with the Kubernetes API. But the damage was done: I
    had started to learn Kubernetes programming from specific to general, and it took
    me a long time to fully understand the innards of the Kubernetes API.


    I have written this book in the hope that it can teach new Kubernetes developers
    how to program, from general to specific, with the Kubernetes API in Go.


    ## Chapters at a Glance


    The target reader for this book has some experience working with REST APIs, accessing
    them either by HTTP or using clients for specific languages; and has some knowledge
    of the Kubernetes platform, essentially as a user—for example, some experience
    deploying such APIs or frontend applications with the help of YAML manifests.


    *   Chapter [1](#533908_1_En_1_Chapter.xhtml) of the book explores the Kubernetes
    API and how it implements the principles of REST. It especially focuses on the
    Group-Version-Resource organization and the Kind concept proposed by the API.


    *   Chapter [2](#533908_1_En_2_Chapter.xhtml) continues by covering the operations
    proposed by the API and the details of each operation, using the HTTP protocol.


    *   Chapters [3](#533908_1_En_3_Chapter.xhtml) to [5](#533908_1_En_5_Chapter.xhtml)
    describe the common and “low-level” Go libraries to work with the Kubernetes API:
    the API and API Machinery Libraries.


    *   Chapters [6](#533908_1_En_6_Chapter.xhtml) and [7](#533908_1_En_7_Chapter.xhtml)
    cover the Client-go Library—the high-level library to work with the Kubernetes
    API in Go—and how to unit test code using this library.


    At this point in the book, the reader should be comfortable with building Go applications
    working with native resources of the Kubernetes API.


    *   Chapters [8](#533908_1_En_8_Chapter.xhtml) and [9](#533908_1_En_9_Chapter.xhtml)
    introduce the concept of Custom Resources and how to work with them in Go.


    *   Chapters [10](#533908_1_En_10_Chapter.xhtml) to [12](#533908_1_En_12_Chapter.xhtml)
    cover the implementation of Kubernetes Operators using the **controller-runtime**
    library.


    *   Chapter [13](#533908_1_En_13_Chapter.xhtml) explores the Kubebuilder SDK,
    a tool to help develop and deploy Kubernetes Operators.


    By the end of the book, the reader should be able to start building Kubernetes
    operators in Go and have a very good understanding of what happens behind the
    scenes.


    Acknowledgments


    I would like to thank the whole Anevia “CDN” team who started working with me
    on Kubernetes back in 2018: David, Ansou, Hossam, Yassine, Étienne, Jason, and
    Michaël. Special thanks to Damien Lucas for initiating this project and for having
    trusted us with this challenge.


    My discovery of Kubernetes has been much easier and pleasant thanks to the TGIK
    channel and its numerous episodes, hosted by Joe Beda, Kris Nova, and many others.
    Plus, thanks to all the Kubernetes community for such a great ecosystem!


    About the Author About the Technical Reviewers


    # 1. Kubernetes API Introduction


    Kubernetes is a platform to orchestrate containers operating in the declarative
    mode. There are one-thousand-and-one ways to describe how the Kubernetes platform
    is constructed. This book focuses on programming with the platform.


    The entry point of the Kubernetes platform is the API. This chapter explores the
    Kubernetes architecture by highlighting the central role of the Kubernetes API.
    It then focuses on the HTTP REST nature of the Kubernetes API, and on the extensions
    added to organize the many resources managed by it.


    Finally, you will learn how to navigate the reference documentation effectively
    to be able to extract the maximum quantity of useful information daily.'
