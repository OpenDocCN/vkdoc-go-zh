  trans: "\n### 访问非元字段的辅助函数\n\n以下辅助函数可用于获取和设置 `Unstructured` 实例中 `Object` 字段特定字段的值。\n\
    \n请注意，这些辅助函数是函数，而不是 `Unstructured` 类型的方法。\n\n它们都接受：\n\n- 第一个参数 `obj`，类型为 `map[string]interface{}`，用于传递\
    \ `Unstructured` 实例的 `Object` 字段，\n- 最后一个参数 `fields`，类型为 `...string`，用于传递导航到对象内各层级所需的键。请注意，不支持数组/切片语法。\n\
    \n`Setter` 函数接受第二个参数，用于设置给定对象中特定字段的值。`Getter` 函数返回三个值：\n\n- 所请求字段的值（如果可能）\n- 一个布尔值，指示是否找到了所请求的字段\n\
    - 一个错误，如果找到了该字段但其类型与请求的类型不符\n\n辅助函数的名称如下：\n\n- `RemoveNestedField` – 用于移除所请求的字段\n\
    - `NestedFieldCopy`, `NestedFieldNoCopy` – 返回所请求字段的副本或原始值\n- `NestedBool`, `NestedFloat64`,\
    \ `NestedInt64`, `NestedString`, `SetNestedField` – 用于获取和设置 bool / float64 / int64\
    \ / string 类型的字段\n- `NestedMap`, `SetNestedMap` – 用于获取和设置 `map[string]interface{}`\
    \ 类型的字段\n- `NestedSlice`, `SetNestedSlice` – 用于获取和设置 `[]interface{}` 类型的字段\n-\
    \ `NestedStringMap`, `SetNestedStringMap` – 用于获取和设置 `map[string]string` 类型的字段\n\
    - `NestedStringSlice`, `SetNestedStringSlice` – 用于获取和设置 `[]string` 类型的字段\n\n####\
    \ 示例\n\n作为示例，以下是一些定义 `MyResource` 实例的代码：\n\n```go\nimport (\n    myresourcev1alpha1\
    \ \"github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\n \
    \   \"k8s.io/apimachinery/pkg/apis/meta/v1/unstructured\"\n)\n\nfunc getResource()\
    \ (*unstructured.Unstructured, error) {\n    myres := unstructured.Unstructured{}\n\
    \    myres.SetGroupVersionKind(\n        myresourcev1alpha1.SchemeGroupVersion.\n\
    \            WithKind(\"MyResource\"))\n    myres.SetName(\"myres1\")\n    myres.SetNamespace(\"\
    default\")\n    err := unstructured.SetNestedField(\n        myres.Object,\n \
    \       \"nginx\",\n        \"spec\", \"image\",\n    )\n    if err != nil {\n\
    \        return err\n    }\n    // 使用 int64\n    err = unstructured.SetNestedField(\n\
    \        myres.Object,\n        int64(1024*1024*1024),\n        \"spec\", \"memory\"\
    ,\n    )\n    if err != nil {\n        return err\n    }\n    // 或使用 string\n\
    \    err = unstructured.SetNestedField(\n        myres.Object,\n        \"1024Mo\"\
    ,\n        \"spec\", \"memory\",\n    )\n    if err != nil {\n        return err\n\
    \    }\n    return &myres, nil\n}\n```\n\n### `UnstructuredList` 类型\n\n`UnstructuredList`\
    \ 类型被定义为一个结构体，包含一个 `Object` 字段和一个由 `Unstructured` 实例组成的切片作为列表项：\n\n```go\ntype\
    \ UnstructuredList struct {\n    Object map[string]interface{}\n    // Items 是一个非结构化对象列表。\n\
    \    Items []Unstructured\n}\n```\n\n#### 访问 `TypeMeta` 字段的 Getter 和 Setter\n\n\
    可以使用 `APIVersion` 和 `Kind` 的 Getter/Setter 来直接获取和设置 `TypeMeta` 的 `apiVersion`\
    \ 和 `kind` 字段。\n\n可以使用 `GroupVersionKind` 的 Getter/Setter 来将对象中指定的 `apiVersion`\
    \ 和 `kind` 与 `GroupVersionKind` 值相互转换。\n\n```\nGetAPIVersion() string\nGetKind()\
    \ string\nGroupVersionKind() schema.GroupVersionKind\nSetAPIVersion(version string)\n\
    SetKind(kind string)\nSetGroupVersionKind(gvk schema.GroupVersionKind)\n```\n\n\
    #### 访问 `ListMeta` 字段的 Getter 和 Setter\n\n这些 getter 和 setter 用于获取和设置与 `List` 操作结果相关的值，这些值位于列表的\
    \ `ListMeta` 字段中。\n\n```\nGetResourceVersion() string\nGetContinue() string\n\
    GetRemainingItemCount() *int64\nSetResourceVersion(version string)\nSetContinue(c\
    \ string)\nSetRemainingItemCount(c *int64)\n```\n\n#### 用于创建和转换的方法\n\n- `NewEmptyInstance()\
    \ runtime.Unstructured` – 创建一个新的非结构化对象实例，使用从列表接收器复制的 `apiVersion` 和 `kind`。\n\
    - `MarshalJSON() ([]byte, error)` – 返回接收器的 JSON 表示形式。\n- `UnmarshalJSON(b []byte)\
    \ error` – 用传入的 JSON 表示形式填充接收器。\n- `UnstructuredContent() map[string]interface{}`,\
    \ `SetUnstructuredContent(content map[string]interface{})` – 获取接收器的 `Object` 字段的值。\n\
    - `EachListItem(fn func(runtime.Object) error) error` – 对列表中的每个列表项执行 `fn` 函数。\n\
    \n### 在类型化对象与非结构化对象之间转换\n\nAPI Machinery 库的 `runtime` 包提供了在类型化对象和非结构化对象之间进行转换的工具，这些对象可以是资源或列表。\n\
    \n- ❶ 获取转换器\n- ❷ 将一个非结构化对象（定义一个 Pod）转换为类型化的 Pod\n- ❸ 将一个类型化的 Pod 转换为非结构化对象\n\n\
    ```go\nimport (\n    \"k8s.io/apimachinery/pkg/runtime\"\n)\n\nconverter := runtime.DefaultUnstructuredConverter\
    \          ❶\nvar pod corev1.Pod\nconverter.FromUnstructured(                \
    \                   ❷\n    u.UnstructuredContent(), &pod,\n)\nvar u unstructured.Unstructured\n\
    u.Object = converter.ToUnstructured(&pod)                    ❸\n```\n\n### 动态客户端\n\
    \n正如你在 第 6 章 中所见，Client-go 提供了能够与 Kubernetes API 交互的客户端：用于访问类型化资源的 Clientset，用于向\
    \ API 进行底层 REST 调用的 REST 客户端，以及用于获取 API 提供的资源信息的 Discovery 客户端。\n\n它还提供了另一个客户端，即\
    \ `dynamic` 客户端，用于处理通过 `Unstructured` 类型描述的非类型化资源。\n\n#### 获取动态客户端\n\n`dynamic`\
    \ 包提供了用于创建类型为 `dynamic.Interface` 的动态客户端的函数。\n\n- `func NewForConfig(c *rest.Config)\
    \ (Interface, error)` – 此函数返回一个动态客户端，使用通过第 6 章“连接到集群”一节中所述方法之一构建的 `rest.Config`。\n\
    - `func NewForConfigOrDie(c *rest.Config) Interface` – 此函数与前一个类似，但在发生错误时会触发 panic，而不是返回错误。此函数可用于硬编码配置，你希望断言其有效性。\n\
    - `NewForConfigAndClient(c *rest.Config, httpClient *http.Client) (Interface,\
    \ error)` – 此函数返回一个 `dynamic` 客户端，使用提供的 `rest.Config` 和提供的 `httpClient`。前面的函数\
    \ `NewForConfig` 使用通过函数 `rest.HTTPClientFor` 构建的默认 HTTP 客户端。如果你想在构建 `dynamic`\
    \ 客户端之前自定义 HTTP 客户端，可以使用此函数。\n"
- fmt: '#### Working with the dynamic Client


    The `dynamic` client implements the `dynamic.Interface`, defined as follows:


    ```

    type Interface interface {

    Resource(resource schema.GroupVersionResource)

    NamespaceableResourceInterface

    }

    ```


    The only direct method for the `dynamic` client is `Resource(gvr)`, returning
    an object implementing `NamespaceableResourceInterface`.


    ```

    type NamespaceableResourceInterface interface {

    Namespace(string) ResourceInterface

    ResourceInterface

    }

    ```


    It is possible to chain the call to `Resource(gvr)` with a call to the method
    `Namespace(ns)`, returning an object implementing the `ResourceInterface`. Or,
    if `Resource(gvr)` is not chained with the `Namespace(ns)` method, it also implements
    the `ResourceInterface`.


    Thanks to this, after calling `Resource(gvr)`, you can either chain with `Namespace(ns)`,
    if the resource described by `gvr` is a namespaced resource, and you want to define
    on which namespace to work, or else you can omit this call for non-namespaced
    resources if you want to make a cluster-wide operation.


    The `ResourceInterface` is defined as (the complete signature of functions is
    omitted for conciseness) follows:


    ```

    type ResourceInterface interface {

    Create(...)

    Update(...)

    UpdateStatus(...)

    Delete(...)

    DeleteCollection(...)

    Get(...)

    List(...)

    Watch(...)

    Patch(...)

    Apply(...)          // starting at v1.25

    ApplyStatus(...)     // starting at v1.25

    }

    ```


    These methods work with `Unstructured` and `UnstructuredList` types. For example,
    the `Create` method accepts an `Unstructured` object as input, and returns the
    created object as `Unstructured`, and the `List` method returns the list of objects
    as an `UnstructuredList`:


    ```

    Create(

    ctx context.Context,

    obj *unstructured.Unstructured,

    options metav1.CreateOptions,

    subresources ...string,

    ) (*unstructured.Unstructured, error)

    List(

    ctx context.Context,

    opts metav1.ListOptions,

    ) (*unstructured.UnstructuredList, error)

    ```


    If we compare the signatures of these methods with the methods provided by the
    Client-go Clientset, you can see that they are very similar. The following are
    the changes:


    * Typed objects (e.g., `corev1.Pod`) for Clientset are replaced by `Unstructured`
    for the `dynamic` client.

    * A `subresource…` parameter is present for dynamic methods, whereas Clientset
    provides specific methods for subresources.


    You can refer to Chapter [6](#533908_1_En_6_Chapter.xhtml) for more about the
    behavior of the various operations.


    #### Example


    As an example, here is some code that creates a `MyResource` instance in the cluster:


    ```

    import (

    "context"

    myresourcev1alpha1 "github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1"

    metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

    "k8s.io/client-go/dynamic"

    )

    func CreateMyResource(

    dynamicClient dynamic.Interface,

    u *unstructured.Unstructured,

    ) (*unstructured.Unstructured, error) {

    gvr := myresourcev1alpha1.

    SchemeGroupVersion.

    WithResource("myresources")

    return dynamicClient.

    Resource(gvr).

    Namespace("default").

    Create(

    context.Background(),

    u,

    metav1.CreateOptions{},

    )

    }

    ```


    #### The *fake* dynamic Client


    As you have seen in Chapter [7](#533908_1_En_7_Chapter.xhtml), the Client-go Library
    provides *fake* implementations for the Clientset, the discovery client, and the
    REST client. The library also provides a *fake* implementation for the `dynamic`
    client.


    Like other *fake* implementations, you can register reactors using `PrependReactor`
    and similar methods on the `dynamicClient.Fake` object, and you can inspect `Actions`
    of the `dynamicClient.Fake` object after the test is executed.


    The function `fake.NewSimpleDynamicClient` is used to create a new *fake* `dynamic`
    client.


    ```

    func NewSimpleDynamicClient(

    scheme *runtime.Scheme,

    objects ...runtime.Object,

    ) *FakeDynamicClient)

    ```


    The `objects` parameter indicates the resources to create in the *fake* cluster
    when creating the *fake* client. As an example, here is a test for a function
    using the `dynamic` client.


    The `NewSimpleDynamicClient` function is called with the resource to create an
    initial resource. Note that the expected type for initial resources is `runtime.Object`,
    which is an interface implemented by `Unstructured`.


    ```

    func TestCreateMyResourceWhenResourceExists(t *testing.T) {

    myres, err := getResource()

    if err != nil {

    t.Error(err)

    }

    dynamicClient := fake.NewSimpleDynamicClient(

    runtime.NewScheme(),

    myres,

    )

    // Not really used, just to show how to use it

    dynamicClient.Fake.PrependReactor(

    "create",

    "myresources",

    func(

    action ktesting.Action,

    ) (handled bool, ret runtime.Object, err error) {

    return false, nil, nil

    })

    _, err = CreateMyResource(dynamicClient, myres)

    if err == nil {

    t.Error("Error should happen")

    }

    actions := dynamicClient.Fake.Actions()

    if len(actions) != 1 {

    t.Errorf("# of actions should be %d but is %d", 1, len(actions))

    }

    }

    ```


    ## Conclusion


    This chapter has explored various solutions to work with custom resources in Go.


    A first solution is to generate Go code based on the definition of a custom resource,
    to generate a Clientset dedicated to this specific custom resource definition,
    so you can work with custom resource instances the same as you have been working
    with for native Kubernetes resources.


    Another solution is to work with the `dynamic` client from the Client-go Library
    and to rely on the `Unstructured` type to define the custom resources.'
