  trans: '

    ### 部署文档


    我们来探索一下**Deployment**的参考页面，地址为：[`https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/deployment-v1/`](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/deployment-v1/)。该页面的标题**Deployment**是与图
    1-5 中所示的 `deployments` 资源相关的主要种类（kind）。


    ![](img/533908_1_En_1_Fig5_HTML.png)


    一张 Kubernetes 网页的截图，包含两个标签页，分别标记为文档和 Kubernetes 博客。文档标签页被选中。它展示了部署信息和部署规范。


    图 1-5


    Deployment 文档页面


    页眉中指示的 `apiVersion` 可以帮助你编写 `Deployment` 资源的 YAML 清单，因为你需要为 Kubernetes 清单中的每个资源指定
    `apiVersion` 和 `kind`。


    在这种情况下，你知道部署清单将以如下内容开头：


    ```

    apiVersion: apps/v1

    kind: Deployment

    ```


    下一行页眉指示了编写 Go 代码时要使用的 `import`。在第 3 章中，你将看到如何在 Go 中描述资源时使用此导入。


    ![](img/533908_1_En_1_Figa_HTML.png)


    一个虚线矩形包含文本 O B J。


    在页眉之后，描述了一个结构定义列表，也可以从图 1-6 中 Deployment 文档页面的目录中访问。第一个是资源的主要种类（kind），其后可选地跟随一些结构定义，这些结构定义用于第一个种类的字段中。


    ![](img/533908_1_En_1_Fig6_HTML.jpg)


    一张部署目录的截图，包含一个操作列表。它高亮显示了“patch：部分更新指定的部署”。


    图 1-6


    Deployment 文档页面的目录


    例如，`Deployment` 种类包含一个类型为 `DeploymentSpec` 的 `spec` 字段，该字段将在后文描述。请注意，`DeploymentSpec`
    不是一个在 HTTP 请求期间直接交换的结构，因此，它不是一个种类（kind），并且不包含 `kind` 或 `apiVersion` 字段。


    在主要种类及其相关定义之后，会显示与该资源相关的其他种类。在此例中，是 `DeploymentList` 种类。


    ### 操作文档


    API 文档中关于资源的下一项内容是可能对该资源或其子资源执行的操作列表，这些内容也可以从目录页面访问（见图 1-6）。通过检查用于“创建 Deployment”的
    `create` 操作的详细信息，如图 1-7 所示，你可以看到要使用的 HTTP 请求动词和路径、请求期间要传递的参数以及可能的响应。用于该请求的 HTTP
    动词是 `POST`，路径是 `/apis/apps/v1/namespaces/{namespace}/deployments`。


    ![](img/533908_1_En_1_Fig7_HTML.png)


    一张 Kubernetes 网页的截图。右侧窗格包含创建部署的详细信息：HTTP 请求、参数和响应。左侧窗格包含一个选项列表，其中包括工作负载资源。


    图 1-7


    “创建” Deployment 操作的详细信息


    路径中的 `{namespace}` 部分表示一个*路径*参数，需要将其替换为你想要在其中创建部署的命名空间名称。你可以指定*查询*参数：`dryRun`、`fieldManager`、`fieldValidation`
    和 `pretty`。这些参数将按照 `path?dryRun=All` 格式跟在路径之后。


    请求体必须是一个 `Deployment` 种类。当你使用 `kubectl` 时，你编写的*Kubernetes 清单*就包含了这个请求体。在第 3 章中，你将看到如何在
    Go 中构建这个请求体。可能的 HTTP 响应状态码有：200、201、202 和 401；对于 2xx 状态码，响应体将包含一个 `Deployment`
    种类。


    ### Pod 文档


    某些结构包含许多字段。对于它们，Kubernetes API 文档会对字段进行分类。一个例子是 `Pod` 资源的文档。


    [Pod 资源的文档页面](https://kubernetes.io/docs/reference/kubernetes-api/workload-resources/pod-v1/)
    首先包含主要种类 `Pod` 的描述，接着是 `PodSpec` 结构的描述。`PodSpec` 结构包含大约 40 个字段。为了帮助你理解这些字段之间的关系并简化探索，它们被分门别类。`PodSpec`
    字段的类别如下：*Containers*、*Volumes*、*Scheduling*、*Lifecycle* 等。


    此外，对于包含嵌套字段的字段，其描述通常以内联方式显示，以避免在结构描述之间来回跳转。然而，对于复杂结构，其描述会在页面后续部分给出，并且在字段名称旁边会有一个链接以便轻松访问。


    对于 `Spec` 和 `Status` 结构，情况总是如此，因为它们几乎在所有资源中都非常常见。此外，对于 `Pod` 种类中使用的一些结构也是如此——例如
    `Container`、`EphemeralContainer`、`LifecycleHandler`、`NodeAffinity` 等。


    某些在多个资源中使用的结构会被放置在*通用定义*部分，并且在字段名称旁边会有一个链接以便轻松访问。在图 1-8 中，你可以看到 `PodSpec` 结构描述中的
    *Containers* 类别。


    ![](img/533908_1_En_1_Fig8_HTML.png)


    一张 Pod 规范的截图，描绘了包含 3 个子标题的容器：1. 容器。2. 初始化容器。3. 镜像拉取密钥。


    图 1-8


    `PodSpec` 结构文档的摘录


    你还可以看到，`containers` 和 `initContainers` 字段与 `Container` 类型相同，后者将在页面稍后部分描述，并且可以通过链接访问。`imagePullSecrets`
    字段的类型是 `LocalObjectReference`，它在*通用定义*部分中描述，并且也可以通过链接访问。


    ### 文档的单页版本


    API 参考文档还有另一个版本，它呈现在单个页面上。此版本涵盖了由某个 Kubernetes 版本提供的所有资源版本（而不仅仅是最新版本）。此版本（如果你愿意，可以更改路径的最后部分以导航到其他
    Kubernetes 版本）可以在以下 URL 找到：


    [`https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.24/`](https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.24/)


    ## 总结


    在本章中，你已经能够发现 Kubernetes 平台的架构，并且了解到 API 服务器扮演着核心角色。Kubernetes API 是一个 HTTP REST
    API，其资源被分类到各种带版本号的组中。


    种类（Kinds）是用于在 API 服务器和客户端之间交换数据的特定结构。你可以使用 Kubernetes 官方网站，以人类可读的形式浏览 API 规范，从而发现各种资源和种类的结构、每个资源和子资源可用的不同操作及其关联的动词。

    '
- fmt: '# 2. Kubernetes API Operations


    The previous chapter described that the Kubernetes API follows REST principles
    and enables users to manipulate resources.


    In this chapter, you will learn how to perform various operations by making HTTP
    requests directly. During your daily work, you probably will not have to interact
    directly with the HTTP layer, but it is important to understand how the API works
    at this level so that you can understand how to use more easily it with a higher-level
    library.


    ## Examining Requests


    Before starting to write your own HTTP requests, you can examine with `kubectl`
    which requests are used when executing `kubectl` commands. This can be achieved
    by using the verbose flag, `-v`, with a value greater than or equal to `6`. Table
    [2-1](#533908_1_En_2_Chapter.xhtml#Tab1) shows which information is displayed
    at each level.


    For example, if you want to know the URL that is called when getting pods for
    all namespaces, you can use the following command:


    ```

    $ kubectl get pods --all-namespaces -v6

    loader.go:372] Config loaded from file:  /home/user/.kube/config

    round_trippers.go:553] GET https://192.168.1.194:6443/api/v1/pods?limit=500 200
    OK in 745 milliseconds

    ```


    In the output of the command, you can see that the path used is `/api/v1/pods`.
    Or, when getting pods in a specific namespace, you can see that the path used
    is `/api/v1/namespaces/default/pods`:


    ```

    $ kubectl get pods --namespace default -v6

    loader.go:372] Config loaded from file:  /home/user/.kube/config

    round_trippers.go:553] GET https://192.168.1.194:6443/api/v1/namespaces/default/pods?limit=500
    200 OK in 138 milliseconds

    ```


    Table 2-1


    Verbosity Levels


    | Level | Method and URL | Request timing | Events timing | Request headers |
    Response status | Response headers | Curl cmd | Body length |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | `-v 6` | yes | yes | – | – | – | – | – | 0 |

    | `-v 7` | yes | – | – | yes | yes | – | – | 0 |

    | `-v 8` | yes | – | – | yes | yes | yes | - | ≤ 1024 |

    | `-v 9` | yes | yes | yes | – | – | yes | yes | ≤ 10240 |

    | `-v 10` | yes | yes | yes | – | – | yes | yes | ∞ |


    ## Making Requests


    This section examines all the possible operations you can do with Kubernetes resources.


    ### Using `kubectl` as a Proxy


    You must be authenticated to make requests to the Kubernetes API of a cluster,
    unless your cluster accepts unauthentified requests, which is unlikely.


    A way to run authenticated HTTP requests is to use `kubectl` as a proxy to make
    it deal with the authentication. For this, the `kubectl proxy` command can be
    used:


    ```

    $ kubectl proxy

    Starting to serve on 127.0.0.1:8001

    ```


    On a new terminal, you can now run your HTTP requests without any authentication.
    Next, a `HOST` variable to access the proxy is defined:


    ```

    $ HOST=http://127.0.0.1:8001

    ```


    ### Creating a Resource


    You can create a new resource by first creating a Kubernetes manifest describing
    this resource—for example, to create a Pod, you can write:


    ```

    $ cat > pod.yaml <<EOF

    apiVersion: v1

    kind: Pod

    metadata:

    name: nginx

    spec:

    containers:

    - image: nginx

    name: nginx

    EOF

    ```


    You then need to pass the resource description into the body of a POST request
    (note that the `-X POST` flag can be omitted because the `--data-binary` flag
    is being used). For example, to create a pod resource use:


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    -H "Content-Type: application/yaml"

    --data-binary @pod.yaml

    ```


    This is equivalent to running the `kubectl` command:


    ```

    $ kubectl create --namespace project1 -f pod.yaml -o json

    ```


    Note that the namespace is not indicated in the `pod.yaml` file. If you add it,
    you must specify the same namespace in the YAML file and in the path, or you will
    get an error—that is, the namespace of the provided object does not match the
    namespace sent on the request.


    ### Getting Information About a Resource


    You can obtain information about a specific resource using a GET request and passing
    its name as a parameter (and its namespace if it is a namespaced resource) in
    the path. In this example, you will request the information for the `pod` named
    `nginx` in the `project1` namespace:


    ```

    $ curl -X GET

    $HOST/api/v1/namespaces/project1/pods/nginx

    ```


    This will return information about the resource in the JSON format, using the
    kind associated with this resource as a structure; in this example, it is a `Pod`
    kind. This is equivalent to running the `kubectl` command:


    ```

    $ kubectl get pods --namespace project1 nginx -o json

    ```


    ### Getting the List of Resources


    For namespaced resources, you can get the list of resources either cluster-wide
    or in a specific namespace. For non-namespaced resources, you can get the list
    of resources. In any case, you will use a GET request.


    #### Cluster-wide


    To get the list of resources cluster-wide, for namespaced or non-namespaced resources;
    for example, for the pod resource, use the following:


    ```

    $ curl $HOST/api/v1/pods

    ```


    This will return information about the list of pods in all namespaces, using a
    `PodList` kind. This is equivalent to running the `kubectl` command:


    ```

    $ kubectl get pods --all-namespaces -o json

    ```


    #### In a Specific namespace


    To get the list of resources in a specific namespace, you need to indicate the
    namespace in the path; for example, for the pod resource, use this:


    ```

    $ curl $HOST/api/v1/namespaces/project1/pods

    ```


    This will return information about the list of pods in the `project1` namespace,
    using a `PodList` kind. This is equivalent to running the `kubectl` command:


    ```

    $ kubectl get pods --namespace project1 -o json

    ```


    ### Filtering the Result of a List


    When running a *list* request, you get as a result the complete list of resources
    of this kind, in the specified namespace or cluster-wide, depending on your request.


    You may want to filter the result. The most common way to filter resources in
    Kubernetes is to use *labels*. For this, resources need to have defined labels;
    then, during a *list* request, you can define some *label selectors*. It also
    is possible to filter resources based on a limited set of fields by using *field
    selectors*.'
