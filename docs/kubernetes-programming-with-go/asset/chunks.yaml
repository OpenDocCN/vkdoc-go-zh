- fmt: "# Encoding and Decoding\n\nThe various serializers implement the `Serializer`\
    \ interface, which embeds the `Decoder` and `Encoder` interfaces, defining the\
    \ `Encode` and `Decode` methods.\n\n- `Encode(obj Object, w io.Writer) error`\
    \ – the `Encode` function takes an API object as a parameter, encodes the object,\
    \ and writes the result using the writer.\n- `Decode(data []byte, defaults *schema.GroupVersionKind,\
    \ into Object) (Object, *schema.GroupVersionKind, error)` – this function takes\
    \ an array of bytes as a parameter and tries to decode its content. If the content\
    \ to decode does not specify `apiVersion` and `Kind`, the default `GroupVersionKind`\
    \ (GVK) will be used.\n- The result will be placed in the `into` object if not\
    \ nil and if the concrete type of `into` matches the content GVK (either the initial\
    \ one, or the `defaults` one). In any case, the result will be returned as an\
    \ `Object`, and the GVK applied to it will be returned as a `GroupVersionKind`\
    \ structure.\n\n```go\nfunc Decode(\n    data []byte,\n    defaults *schema.GroupVersionKind,\n\
    \    into Object,\n) (\n    Object,\n    *schema.GroupVersionKind,\n    error,\n\
    )\n```\n\n## RESTMapper\n\nThe API Machinery provides a concept of `RESTMapper`,\
    \ used to map between REST resources and `Kind`s.\n\n```go\nimport (\n    \"k8s.io/apimachinery/pkg/api/meta\"\
    \n)\n```\n\nThe `RESTMapping` type provides the result of a mapping using the\
    \ `RESTMapper`:\n\n```go\ntype RESTMapping struct {\n    Resource            schema.GroupVersionResource\n\
    \    GroupVersionKind    schema.GroupVersionKind\n    Scope               RESTScope\n\
    }\n```\n\nAs Chapter [1](#533908_1_En_1_Chapter.xhtml) discussed, a GVR (Group-Version-Resource,\
    \ or `Resource` for short) is used to build the path to which to make a request.\
    \ For example, to get the list of deployments in all namespaces, you will use\
    \ the path `/apis/apps/v1/deployments`, where `apps` is the Group, `v1` is the\
    \ Version, and `deployments` is the (plural) `Resource` name. So, a resource managed\
    \ by an API can be uniquely identified by its GVR.\n\nWhen making requests to\
    \ this path, generally you want to exchange data, either in the request to create\
    \ or update a resource, or in the response to get or list resources. The format\
    \ of this exchanged data is called the `Kind` (or `GroupVersionKind`), associated\
    \ with the resource.\n\nThe `RESTMapping` structure brings together a `Resource`\
    \ and its associated `GroupVersionKind`. The API machinery provides a `RESTMapper`\
    \ interface, and a default implementation, `DefaultRESTMapper`.\n\n```go\ntype\
    \ RESTMapper interface {\n    RESTMapping(gk schema.GroupKind, versions ...string)\
    \ (*RESTMapping, error)\n    RESTMappings(gk schema.GroupKind, versions ...string)\
    \ ([]*RESTMapping, error)\n    KindFor(resource schema.GroupVersionResource) (schema.GroupVersionKind,\
    \ error)\n    KindsFor(resource schema.GroupVersionResource) ([]schema.GroupVersionKind,\
    \ error)\n    ResourceFor(input schema.GroupVersionResource) (schema.GroupVersionResource,\
    \ error)\n    ResourcesFor(input schema.GroupVersionResource) ([]schema.GroupVersionResource,\
    \ error)\n    ResourceSingularizer(resource string) (singular string, err error)\n\
    }\n```\n\n### Kind to Resource\n\nThe `RESTMapping` and `RESTMappings` methods\
    \ return an element or an array of `RESTMapping` structures as a result, given\
    \ a `Group` and `Kind`. An optional list of versions indicates the preferred versions.\n\
    \nThe `RESTMappings` method returns all matches, the `RESTMapping` method returns\
    \ a single match or an error if there are multiple matches. The resulting `RESTMapping`\
    \ elements will contain the fully qualified `Kind` (including the version) and\
    \ the fully qualified `Resource`.\n\nTo sum up, these methods are used to map\
    \ a `Kind` to a `Resource`.\n\n### Resource to Kind\n\nThe `KindFor` and `KindsFor`\
    \ methods return an element or an array of `GroupVersionKind`, given a *partial*\
    \ Group-Version-Resource. Partial means that you can omit the group, the version,\
    \ or both. The resource name can be the singular or the plural name of the resource.\n\
    \nThe `KindsFor` method returns all matches, the `KindFor` method returns a single\
    \ match or an error if there are multiple matches.\n\nTo sum up, these methods\
    \ are used to map a `Resource` to a `Kind`.\n\n### Finding Resources\n\nThe `ResourceFor`\
    \ and `ResourcesFor` methods return an element or an array of `GroupVersionResource`,\
    \ given a *partial* Group-Version-Resource. Partial means that you can omit the\
    \ group, the version, or both. The resource name can be the singular or the plural\
    \ name of the resource.\n\nThe `ResourcesFor` method returns all matches, the\
    \ `ResourceFor` method returns a single match or an error if there are multiple\
    \ matches.\n\nTo sum up, these methods are used to find fully qualified resources\
    \ based on a singular or plural resource name.\n\n### The DefaultRESTMapper Implementation\n\
    \nThe API Machinery provides a default implementation of a `RESTMapper`.\n\n-\
    \ `NewDefaultRESTMapper(defaultGroupVersions []schema.GroupVersion) *DefaultRESTMapper`\
    \ – this factory method is used to build a new `DefaultRESTMapper`, and accepts\
    \ a list of default Group-Versions, which will be used to find Resources or Kinds\
    \ when the provided GVR is partial.\n- `Add(kind schema.GroupVersionKind, scope\
    \ RESTScope)` – this method is used to add a mapping between a `Kind` and a `Resource`.\
    \ The resource name will be guessed from the Kind, by getting the lowercase word,\
    \ and by pluralizing it (adding “es” to words ending with “s,” replacing terminal\
    \ “y” with “ies” to words ending with “y,” and adding “s” to other words).\n-\
    \ `AddSpecific(kind schema.GroupVersionKind, plural, singular schema.GroupVersionResource,\
    \ scope RESTScope)` – this method is used to add a mapping between a `Kind` and\
    \ a `Resource`, by giving the singular and plural names explicitly.\n\nAfter creating\
    \ a `DefaultRESTMapper` instance, you can use it as a `RESTMapper` by calling\
    \ the methods defined in the interface of the same name.\n\n## Conclusion\n\n\
    This chapter has explored the API Machinery, introducing the `Scheme` abstraction\
    \ used to serialize resources between Go and JSON or YAML, and to convert resources\
    \ between several versions. The chapter also covered the `RESTMapper` interface\
    \ to help map between resources and kinds.\n\nThe next chapter covers the Client-go\
    \ Library, a high-level one used by developers to call the Kubernetes API without\
    \ needing to work with HTTP calls."
