  \    cfg, err := testEnv.Start()                       ❺\n    Expect(err).NotTo(HaveOccurred())\n\
  \    Expect(cfg).NotTo(BeNil())\n\n    scheme := runtime.NewScheme()           \
  \          ❻\n    err = clientgoscheme.AddToScheme(scheme)\n    Expect(err).NotTo(HaveOccurred())\n\
  \    err = mygroupv1alpha1.AddToScheme(scheme)\n    Expect(err).NotTo(HaveOccurred())\n\
  \n    mgr, err := manager.New(cfg, manager.Options{     ❼\n        Scheme: scheme,\n\
  \    })\n    Expect(err).ToNot(HaveOccurred())\n\n    k8sClient = mgr.GetClient()\
  \                       ❽\n\n    err = builder.                                \
  \    ❾\n        ControllerManagedBy(mgr).\n        Named(Name).\n        For(&mygroupv1alpha1.MyResource{}).\n\
  \        Owns(&appsv1.Deployment{}).\n        Complete(&MyReconciler{})\n\n    go\
  \ func() {\n        defer GinkgoRecover()\n        err = mgr.Start(ctx)        \
  \                  ❿\n        Expect(err).ToNot(\n            HaveOccurred(),\n\
  \            \"failed to run manager\",\n        )\n    }()\n})\n\nvar _ = AfterSuite(func()\
  \ {\n    cancel()                                          ⓫\n    err := testEnv.Stop()\
  \                             ⓬\n    Expect(err).NotTo(HaveOccurred())\n})\n```\n\
  \n## 编写测试\n\n现在你已经有了一个可以启动和停止环境的测试套件，可以开始编写测试了。测试将首先创建一个 `MyResource` 实例，以验证 `Reconcile`\
  \ 函数是否按照预期定义创建了预期的“底层”资源。\n\n然后，当底层资源被创建后，测试将更新底层资源的状态（请记住集群中没有部署任何控制器，因此你需要从测试中执行这些更改），以验证\
  \ `MyResource` 实例的状态是否相应地更新。\n\n测试计划如下。请注意，每个 `It` 测试将单独执行，并且对于每个 `It`，所有前置的 `BeforeEach`\
  \ 将在测试之前执行，所有前置的 `AfterEach` 将在测试之后执行。\n\n```go\nvar _ = Describe(\"MyResource controller\"\
  , func() {\n    When(\"creating a MyResource instance\", func() {\n        BeforeEach(func()\
  \ {\n            // 创建 MyResource 实例\n        })\n        AfterEach(func() {\n \
  \           // 删除 MyResource 实例\n        })\n\n        It(\"should create a deployment\"\
  , func() {\n            // 检查 deployment 是否最终被创建\n        })\n\n        When(\"\
  deployment is found\", func() {\n            BeforeEach(func() {\n             \
  \   // 等待 deployment 最终被创建\n            })\n\n            It(\"should be owned by\
  \ the MyResource instance\", func() {\n                // 检查 Deployment 中的 ownerReference\n\
  \                // 是否引用了 MyResource 实例\n            })\n\n            It(\"should\
  \ use the image specified in MyResource instance\", func() {\n            })\n\n\
  \            When(\"deployment ReadyReplicas is 1\", func() {\n                BeforeEach(func()\
  \ {\n                    // 更新 Deployment 状态为 ReadyReplicas=1\n                })\n\
  \n                It(\"should set status ready for MyResource instance\", func()\
  \ {\n                    // 检查 MyResource 实例的状态\n                    // 是否最终变为 Ready\n\
  \                })\n            })\n        })\n    })\n})\n```\n\n为了清晰展示测试的执行过程，以下是四个\
  \ `It` 测试将如何执行的流程，以及 `BeforeEach` 和 `AfterEach` 的展示。\n\n### 测试 1\n\n- **When**：创建一个\
  \ MyResource 实例\n- **Before**：// 创建 MyResource 实例\n- **It**：会创建一个 deployment\n-\
  \ **After**：// 删除 MyResource 实例\n\n### 测试 2\n\n- **When**：创建一个 MyResource 实例\n-\
  \ **Before**：// 创建 MyResource 实例\n- **When**：deployment 被找到\n- **Before**：// 等待\
  \ deployment 最终被创建\n- **It**：应由 MyResource 实例拥有\n- **After**：// 删除 MyResource 实例\n\
  \n### 测试 3\n\n- **When**：创建一个 MyResource 实例\n- **Before**：// 创建 MyResource 实例\n\
  - **When**：deployment 被找到\n- **Before**：// 等待 deployment 最终被创建\n- **It**：应使用 MyResource\
  \ 实例中指定的镜像\n- **After**：// 删除 MyResource 实例\n\n### 测试 4\n\n- **When**：创建一个 MyResource\
  \ 实例\n- **Before**：// 创建 MyResource 实例\n- **When**：deployment 被找到\n- **Before**：//\
  \ 等待 deployment 最终被创建\n- **When**：deployment 的 ReadyReplicas 为 1\n- **Before**：//\
  \ 更新 Deployment 状态为 ReadyReplicas=1\n- **It**：应为 MyResource 实例设置状态为就绪（Ready）\n-\
  \ **After**：// 删除 MyResource 实例\n\n最后，完整的测试源代码在接下来的段落之后。请注意，你正在使用一个随机名称创建 `MyResource`\
  \ 实例，这样创建的资源就不会在测试之间冲突。\n\n事实上，测试是一个接一个执行的，因此前一个测试遗留的资源可能会干扰后续测试。\n\n在这种实现中，你可以通过删除\
  \ `MyResource` 实例来结束测试，但是因为集群中没有运行控制器，所以 Deployment 不会被垃圾回收器删除，尽管它引用了已删除的 `MyResource`\
  \ 实例作为所有者。因此，如果你使用相同的 `MyResource` 实例名称执行所有测试，第一个测试中的 Deployment 将被用于后续的测试。\n\n\n\
  ```go\nimport (\n    \"fmt\"\n    \"math/rand\"\n    . \"github.com/onsi/ginkgo/v2\"\
  \n    . \"github.com/onsi/gomega\"\n    appsv1 \"k8s.io/api/apps/v1\"\n    metav1\
  \ \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n    \"k8s.io/apimachinery/pkg/types\"\
  \n    \"sigs.k8s.io/controller-runtime/pkg/client\"\n    mygroupv1alpha1 \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
  \n)\n\nvar _ = Describe(\"MyResource 控制器\", func() {\n    When(\"当创建一个 MyResource\
  \ 实例时\", func() {\n        var (\n            myres      mygroupv1alpha1.MyResource\n\
  \            ownerref   *metav1.OwnerReference\n            name       string\n\
  \            namespace  = \"default\"\n            deployName string\n         \
  \   image      string\n        )\n\n        BeforeEach(func() {\n            image\
  \ = fmt.Sprintf(\"myimage%d\", rand.Intn(1000))\n            myres = mygroupv1alpha1.MyResource{\n\
  \                Spec: mygroupv1alpha1.MyResourceSpec{\n                    Image:\
  \ image,\n                },\n            }\n            name = fmt.Sprintf(\"myres%d\"\
  , rand.Intn(1000))\n            myres.SetName(name)\n            myres.SetNamespace(namespace)\n\
  \            err := k8sClient.Create(ctx, &myres)\n            Expect(err).NotTo(HaveOccurred())\n\
  \            ownerref = metav1.NewControllerRef(\n                &myres,\n    \
  \            mygroupv1alpha1.SchemeGroupVersion.\n                    WithKind(\"\
  MyResource\"),\n            )\n            deployName = fmt.Sprintf(\"%s-deployment\"\
  , name)\n        })\n\n        AfterEach(func() {\n            k8sClient.Delete(ctx,\
  \ &myres)\n        })\n\n        It(\"应该创建一个 deployment\", func() {\n          \
  \  var dep appsv1.Deployment\n            Eventually(\n                deploymentExists(deployName,\
  \ namespace, &dep),\n                10, 1,\n            ).Should(BeTrue())\n  \
  \      })\n\n        When(\"当 deployment 被找到时\", func() {\n            var dep appsv1.Deployment\n\
  \            BeforeEach(func() {\n                Eventually(\n                \
  \    deploymentExists(deployName, namespace, &dep),\n                    10, 1,\n\
  \                ).Should(BeTrue())\n            })\n\n            It(\"应该由 MyResource\
  \ 实例所拥有\", func() {\n                Expect(dep.GetOwnerReferences()).\n       \
  \             To(ContainElement(*ownerref))\n            })\n\n            It(\"\
  应该使用 MyResource 实例中指定的镜像\", func() {\n                Expect(\n                \
  \    dep.Spec.Template.Spec.Containers[0].Image,\n                ).To(Equal(image))\n\
  \            })\n\n            When(\"当 deployment 的 ReadyReplicas 为 1 时\", func()\
  \ {\n                BeforeEach(func() {\n                    dep.Status.Replicas\
  \ = 1\n                    dep.Status.ReadyReplicas = 1\n                    err\
  \ := k8sClient.Status().Update(ctx, &dep)\n                    Expect(err).NotTo(HaveOccurred())\n\
  \                })\n\n                It(\"应该为 MyResource 实例设置状态为 ready\", func()\
  \ {\n                    Eventually(\n                        getMyResourceState(name,\
  \ namespace), 10, 1,\n                    ).Should(Equal(\"Ready\"))\n         \
  \       })\n            })\n        })\n    })\n})\n\nfunc deploymentExists(\n \
  \   name, namespace string, dep *appsv1.Deployment,\n) func() bool {\n    return\
  \ func() bool {\n        err := k8sClient.Get(ctx, client.ObjectKey{\n         \
  \   Namespace: namespace,\n            Name:      name,\n        }, dep)\n     \
  \   return err == nil\n    }\n}\n\nfunc getMyResourceState(\n    name, namespace\
  \ string,\n) func() (string, error) {\n    return func() (string, error) {\n   \
  \     myres := mygroupv1alpha1.MyResource{}\n        err := k8sClient.Get(ctx, types.NamespacedName{\n\
  \            Namespace: namespace,\n            Name:      name,\n        }, &myres)\n\
  \        if err != nil {\n            return \"\", err\n        }\n        return\
  \ myres.Status.State, nil\n    }\n}\n```\n\n## 总结\n\n本章节总结了可用于编写 Kubernetes Operator\
  \ 的各种概念和库的介绍。\n\n第 8 章介绍了**自定义资源**，通过向所提供的资源列表中添加新资源来扩展 Kubernetes API。第 9 章介绍了使用\
  \ Go 语言处理自定义资源的各种方式，包括为此资源生成`Clientset`，或使用`DynamicClient`。\n\n第 10 章介绍了`controller-runtime`库，该库对于实现管理自定义资源生命周期的\
  \ Operator 非常有用。第 11 章专注于编写 Operator 的业务逻辑，第 12 章则用于测试该逻辑。\n\n下一章将介绍`kubebuilder`\
  \ SDK，它是一个使用前几章介绍的工具的框架。该框架通过为新自定义资源定义和关联的 Operator 生成代码，并提供构建和部署这些自定义资源定义及 Operator\
  \ 到集群的工具，从而简化了 Operator 的开发。\n\n"
- "# 13. 使用 Kubebuilder 创建 Operator\n\n在前面的章节中，你已经学习了如何使用**自定义资源定义**（CRD）定义由 API 服务器提供的新资源，以及如何使用`controller-runtime`库构建\
  \ Operator。\n\n`kubebuilder` SDK 专门用于帮助你创建新资源及其相关的 Operator。它提供了用于引导项目（定义 Manager）以及向项目添加资源及其相关控制器的命令。\n\
  \n生成了新自定义资源和控制器的源代码后，你需要根据资源的业务领域实现缺失的部分。`kubebuilder` SDK 随后会提供工具，用于构建自定义资源定义和\
  \ Manager，并将其部署到集群。\n\n### 安装 Kubebuilder\n\n`kubebuilder` 以单个二进制文件的形式提供。你可以从项目的发布页面^(⁴)下载该二进制文件，并将其安装到你的`PATH`中。该二进制文件适用于\
  \ Linux 和 MacOS 系统。\n\n### 创建项目\n\n第一步是创建项目。项目最初将包含：\n\n*   定义 Manager 的 Go 源代码（目前没有任何控制器）\n\
  *   一个`Dockerfile`，用于构建包含 Manager 二进制文件的镜像，以便部署到集群\n*   用于帮助将 Manager 部署到集群的 Kubernetes\
  \ 清单文件\n*   一个`Makefile`，其中定义了用于测试、构建和部署 Manager 的命令\n\n要创建项目，首先创建一个空目录并`cd`进入该目录，然后执行以下`kubebuilder\
  \ init`命令：\n\n*   ❶ **域名**，用作 GVK 组名称的后缀。此项目中定义的自定义资源可以属于多个组，但所有组都将属于同一个域。例如，`mygroup1.myid.dev`和`mygroup2.myid.dev`\n\
  *   ❷ **Go 模块名称**，用于所生成的 Manager Go 代码\n\n```bash\n$ mkdir myresource-kb\n$ cd myresource-kb\n\
  $ kubebuilder init \\\n    --domain myid.dev \\\n    --repo github.com/myid/myresource\n\
  ```\n\n你可以通过运行以下命令来查看`Makefile`中可用的命令：\n\n```bash\n$ make help\n```\n\n你可以使用以下命令构建\
  \ Manager 的二进制文件：\n\n```bash\n$ make build\n```\n\n然后，你可以本地运行 Manager：\n\n```bash\n\
  $ make run\n```\n\n或者\n\n```bash\n$ ./bin/manager\n```\n\n此时，最好初始化一个源码控制项目（例如，一个\
  \ git 项目），并用生成的这些文件创建第一个修订版本。这样，你将能够检查后续执行的`kubebuilder`命令所做的更改。例如，如果你使用 git：\n\n\
  ```bash\n$ git init\n$ git commit -am 'kubebuilder init --domain myid.dev --repo\
  \ github.com/myid/myresource'\n```\n\n\n## 向项目添加自定义资源\n\n目前，Manager 并未管理任何 Controller。即使您可以构建并运行它，也无法用它执行任何操作。\n\
  \n接下来要执行的 `kubebuilder` 命令是 `kubebuilder create api`，用于向项目添加自定义资源及其相关的 Controller。该命令将询问您是否要创建该资源及其\
  \ Controller。请对每个问题回复 **y**。\n\n*   ❶ 自定义资源的组。该组名后会自动拼接域名，以构成完整的 GVK 组。\n*   ❷ 资源的版本。\n\
  *   ❸ 资源的类型（Kind）。\n\n```\n$ kubebuilder create api\n--group mygroup           \
  \        ❶\n--version v1alpha1                ❷\n--kind MyResource             \
  \    ❸\nCreate Resource [y/n]\ny\nCreate Controller [y/n]\ny\n```\n\n您可以通过运行以下 `git`\
  \ 命令来查看该命令所做的更改：\n\n```\n$ git status\nOn branch main\nChanges not staged for commit:\n\
  (use \"git add ...\" to update what will be committed)\n(use \"git restore ...\"\
  \ to discard changes in working directory)\nmodified:   PROJECT\nmodified:   go.mod\n\
  modified:   go.sum\nmodified:   main.go\nUntracked files:\n(use \"git add ...\"\
  \ to include in what will be committed)\napi/\nconfig/crd/\nconfig/rbac/myresource_editor_role.yaml\n\
  config/rbac/myresource_viewer_role.yaml\nconfig/samples/\ncontrollers/\nno changes\
  \ added to commit (use \"git add\" and/or \"git commit -a\")\n```\n\n`PROJECT` 文件包含了项目的定义。最初它只包含作为\
  \ `init` 命令标志提供的域名和 `repo`。现在，它也包含了第一个资源的定义。`main.go` 文件和 `controllers` 目录定义了该自定义资源的\
  \ Controller。\n\n`api/v1alpha1` 目录已被创建，其中包含使用 Go 结构体定义的自定义资源，以及由 `deepcopy-gen`（参见第\
  \ 8 章的“运行 `deepcopy-gen`”部分）在 `controller-gen` 工具的帮助下生成的代码。它还包含了 `AddToScheme` 函数的定义，用于将此新自定义资源添加到\
  \ Scheme 中。\n\n`config/samples` 目录包含一个新文件，以 YAML 格式定义了一个自定义资源实例。`config/rbac` 目录包含两个新文件，定义了新的\
  \ `ClusterRole` 资源——一个用于查看，一个用于编辑 `MyResource` 实例。`config/crd` 目录包含用于构建 CRD 的 kustomize\
  \ 文件。\n\n## 构建和部署 Manifest 文件\n\n以下命令构建要部署到集群的 Manifest 文件：\n\n```\n$ make manifests\n\
  ```\n\n此命令会构建两个 Manifest 文件：\n\n*   `config/rbac/role.yaml` – 将被分配给 Manager 使用的服务账户的\
  \ `ClusterRole`，授予对自定义资源的访问权限。\n*   `config/crd/bases/mygroup.myid.dev_myresources.yaml`\
  \ – 自定义资源的定义。\n\n以下命令将部署定义 CRD 的 Manifest 文件：\n\n```\n$ make install\n[...]\nbin/kustomize\
  \ build config/crd | kubectl apply -f -\ncustomresourcedefinition.apiextensions.k8s.io/myresources.mygroup.myid.dev\
  \ created\n```\n\n## 本地运行 Manager\n\n这次，Manager 在管理一个 Controller，负责协调 `MyResource`\
  \ 实例。由 `kubebuilder` 生成的 `Reconcile` 函数目前不执行任何操作，直接返回且不报错：\n\n```\nfunc (r *MyResourceReconciler)\
  \ Reconcile(ctx context.Context, req ctrl.Request) (ctrl.Result, error) {\n_ = log.FromContext(ctx)\n\
  // TODO(user): your logic here\nreturn ctrl.Result{}, nil\n}\n```\n\n当 `Reconcile`\
  \ 函数被调用时，让我们添加一条日志：\n\n```\n-     _ = log.FromContext(ctx)\n+     log := log.FromContext(ctx)\n\
  +     log.Info(\"reconcile\")\n```\n\n以下命令将在本地执行 Manager。它将使用您的 `kubeconfig` 文件以及关联的权限连接到集群：\n\
  \n```\n$ make run\n[...]\nINFO     setup     starting manager\nINFO     Starting\
  \ server     [...]\nINFO     Starting server     [...]\nINFO     Starting EventSource\
  \     [...]\nINFO     Starting Controller     [...]\nINFO     Starting workers \
  \    [...]\n```\n\n在另一个终端中，您可以使用提供的示例来创建一个 `MyResource` 实例：\n\n```\n$ kubectl apply\
  \ -f config/samples/mygroup_v1alpha1_myresource.yaml\n```\n\n在第一个终端中，应该会出现一条新日志，表明\
  \ `Reconcile` 函数已被调用：\n\n```\n$ make run\n[...]\nINFO     reconcile          [...]\n\
  ```\n\n## 个性化自定义资源\n\n`kubebuilder create api` 命令创建了一个包含 `Spec` 和 `Status` 字段的资源模板，其中\
  \ Spec 包含一个 `Foo` 字段，Status 为空。\n\n在本节中，您将了解如何更新此模板以添加必要的字段。\n\n### 编辑 Go 结构体\n\n\
  您可以编辑 `api/v1alpha1/myresource_types.go` 文件来个性化自定义资源。在此示例中，您将使用 `Image` 和 `Memory`\
  \ 字段作为 `Spec`，并使用 `State` 字段作为 `Status`：\n\n```\n// MyResourceSpec defines the desired\
  \ state of MyResource\ntype MyResourceSpec struct {\nImage  string            `json:\"\
  image\"`\nMemory resource.Quantity `json:\"memory\"`\n}\n// MyResourceStatus defines\
  \ the observed state of MyResource\ntype MyResourceStatus struct {\nState string\
  \ `json:\"state\"`\n}\n```\n\n### 启用 Status 子资源\n\n您可以看到 `MyResource` 结构体前的注释中的注解。\n\
  \n第一个注解 `//+kubebuilder:object:root=true` 表明 `MyResource` 是一个 *Kind*。有了这个注解，`kubebuilder`\
  \ 将为此结构体生成 `DeepCopyObject()` 方法。更多详情请参见第 9 章的“添加注解”部分。\n\n第二个注解 `//+kubebuilder:subresource:status`\
  \ 表明必须为 `MyResource` 启用 `status` 子资源。有了这个注解，`kubebuilder` 会将 status 作为子资源添加到 `config/crd/bases/`\
  \ 中 CRD 的 YAML 定义中。更多详情请参见第 8 章的“资源版本定义”部分。\n\n`Status` 默认已启用，因此您无需对这些注解进行任何更改。\n\
  \n### 定义打印机列\n\n第 8 章的“附加打印机列”部分展示了如何通过编辑 CRD 的 YAML 定义来为自定义资源声明打印机列。\n\n使用 `kubebuilder`\
  \ 时，CRD 的 YAML 定义是自动生成的，因此您不能直接编辑它。取而代之的是，您可以使用 `+kubebuilder:printcolumn` 注解。每个注解都接受\
  \ `name`、`type` 和 `JSONPath` 值，这与 YAML 定义中的 `additionalPrinterColumns` 条目类似。\n\n\
  例如，添加以下注解将定义 `Image`、`State` 和 `Age` 打印机列：\n\n```\n// +kubebuilder:printcolumn:name=\"\
  Image\",type=string,\nJSONPath=`.spec.image`\n// +kubebuilder:printcolumn:name=\"\
  State\",type=string,\nJSONPath=`.status.state`\n// +kubebuilder:printcolumn:name=\"\
  Age\",type=\"date\",\nJSONPath=\".metadata.creationTimestamp\"\n```\n\n\n\n### 重新生成文件\n\
  \n要重新生成 `DeepCopy` 方法以反映对结构体所做的更改，你需要运行以下命令：\n\n```\n$ make\n```\n\n要使用新字段重新生成 CRD\
  \ 的 YAML 定义，必须执行此命令：\n\n```\n$ make manifests\n```\n\n你还可以编辑示例文件来调整示例资源。该文件是 `config/samples/mygroup_v1alpha1_myresource.yaml`，你可以通过以下方式调整其内容：\n\
  \n```\n$ cat > config/samples/mygroup_v1alpha1_myresource.yaml <<EOF\napiVersion:\
  \ mygroup.myid.dev/v1alpha1\nkind: MyResource\nmetadata:\nlabels:\napp.kubernetes.io/name:\
  \ myresource\napp.kubernetes.io/instance: myresource-sample\napp.kubernetes.io/part-of:\
  \ myresource-kb\napp.kuberentes.io/managed-by: kustomize\napp.kubernetes.io/created-by:\
  \ myresource-kb\nname: myresource-sample\nspec:\nimage: nginx\nmemory: 512Mi\nEOF\n\
  ```\n\n现在，CRD 和示例已经兼容，因此你可以将 CRD 应用到集群并更新示例资源：\n\n```\n$ make install\n[...]\nbin/kustomize\
  \ build config/crd | kubectl apply -f -\ncustomresourcedefinition.apiextensions.k8s.io/myresources.mygroup.myid.dev\
  \ configured\n$ kubectl apply -f\nconfig/samples/mygroup_v1alpha1_myresource.yaml\n\
  myresource.mygroup.myid.dev/myresource-sample configured\n```\n\n### 实现 Reconcile\
  \ 函数\n\n由于 `kubebuilder` 基于 `controller-runtime` 库生成代码，你可以几乎不做修改地重用为第 11 章中 `Reconcile`\
  \ 函数编写的代码。此外，你还可以重用第 12 章中为测试 `Reconcile` 函数而编写的源代码。\n\n### 添加 RBAC 注解\n\n当本地运行\
  \ Operator 时，Operator 会使用你的 `kubeconfig` 文件，该文件具有该 `kubeconfig` 特定的授权。如果你使用 `cluster-admin`\
  \ 账户连接，Operator 将拥有集群上的所有授权，并能执行任何操作。\n\n然而，当 Operator 部署在集群上时，它会使用特定的 Kubernetes\
  \ Service Account 运行，并被授予受限的授权。这些授权在由 `kubebuilder` 构建和部署的 `ClusterRole` 中定义。\n\n\
  为了帮助 Kubebuilder 构建此 `ClusterRole`，在 `Reconcile` 函数生成的注释中存在注解（为清晰起见，添加了换行符）：\n\n\
  ```\n//+kubebuilder:rbac:\ngroups=mygroup.myid.dev,\nresources=myresources,\nverbs=get;list;watch;create;update;patch;delete\n\
  //+kubebuilder:rbac:\ngroups=mygroup.myid.dev,\nresources=myresources/status,\n\
  verbs=get;update;patch\n//+kubebuilder:rbac:\ngroups=mygroup.myid.dev,\nresources=myresources/finalizers,\n\
  verbs=update\n```\n\n这些规则将授予对 MyResource 资源的完全访问权限，但不授予对其他资源的访问权限。\n\n一旦开始监听 Deployment\
  \ 资源，`Reconcile` 函数就需要对其具有读写权限；因此，你需要添加这个新的注解（已添加换行符）：\n\n```\n//+kubebuilder:rbac:\n\
  groups=apps,\nresources=deployments,\nverbs=get;list;watch;create;update;patch;delete\n\
  ```\n\n### 在集群上部署 Operator\n\n要将 Operator 部署到集群，你需要构建容器镜像并将其部署到容器镜像仓库（例如，`DockerHub`、`Quay.io`\
  \ 或许多其他仓库）。\n\n第一步是在你偏好的容器镜像仓库中创建一个新的仓库，用于存放 Operator 容器的镜像。假设你在 `quay.io/myid`\
  \ 下创建了一个名为 `myresource` 的仓库，那么镜像的全名将是 `quay.io/myid/myresource`。\n\n对于每次构建，你需要为镜像使用不同的标签，以便正确更新容器。要在本地构建镜像，你需要运行以下命令（注意标签\
  \ `v1alpha1-1`）：\n\n```\n$ make docker-build\nIMG=quay.io/myid/myresource:v1alpha1-1\n\
  ```\n\n要将其部署到镜像仓库，必须执行以下命令：\n\n```\n$ make docker-push\nIMG=quay.io/myid/myresource:v1alpha1-1\n\
  ```\n\n最后，将 Operator 部署到集群：\n\n```\n$ make deploy\nIMG=quay.io/myid/myresource:v1alpha1-1\n\
  ```\n\n这将创建一个新的命名空间 `myresource-kb-system`，其中包含一个将执行 Operator 的新部署。你可以使用以下命令检查 Operator\
  \ 的日志：\n\n```\n$ kubectl logs\ndeployment/myresource-kb-controller-manager\n-n myresource-kb-system\n\
  ```\n\n### 创建资源的新版本\n\nKubernetes API 支持版本化的资源，以及一种在不同版本之间转换资源的机制。任何版本之间的转换都不能丢失任何信息。目前，你已使用\
  \ `v1alpha1` 版本创建了自定义资源 MyResource。该资源的 `Spec` 包含 `Image` 和 `Memory` 字段。\n\n你想要创建一个\
  \ `v1beta1` 版本，修改 `Memory` 字段，并将其重命名为 `MemoryRequest` 以消除歧义。通过将 Memory 值赋值给适当的字段，你将能够在两个版本之间进行转换。\n\
  \n#### 定义新版本\n\n要创建新版本，你需要再次调用 `kubebuilder create api` 命令，使用相同的 group 和 kind，但使用新版本。此外，由于资源已经存在并且\
  \ Controller 已经声明，当被问到是否要创建 Resource 和 Controller 时，你可以回答 `n`。\n\n```\n$ kubebuilder\
  \ create api --group mygroup --version v1beta1 --kind MyResource\nCreate Resource\
  \ [y/n]\nn\nCreate Controller [y/n]\nn\n```\n\n此命令创建了一个新目录 `api/v1beta1`，其中包含资源的默认定义。你需要更新这些文件，为新版本声明自定义资源的定义。你可以将文件\
  \ `api/v1alpha1/myresource_types.go` 复制到 `api/v1beta1` 并做必要的修改：\n\n- 文件开头的包名，从 `v1alpha1`\
  \ 改为 `v1beta1`\n- Memory 字段的名称，从 `Memory` 改为 `MemoryRequest`，以及 `yaml` 字段名从 `memory`\
  \ 改为 `memoryRequest`\n\n```\npackage v1beta1\n[...]\n// MyResourceSpec 定义了 MyResource\
  \ 的期望状态\ntype MyResourceSpec struct {\nImage         string            `json:\"\
  image\"`\nMemoryRequest resource.Quantity `json:\"memoryRequest\"`\n}\n```\n\n因为现在有多个版本，所以必须声明资源将以哪种格式存储在\
  \ `etcd` 中。你可以选择使用 `v1alpha1` 的格式。为此，可以在 `v1alpha1` 包中 `MyResource` 结构体定义前的注释中使用注解\
  \ `+kubebuilder:storageversion`。\n\n```\npackage v1alpha1\n[...]\n// +kubebuilder:object:root=true\n\
  // +kubebuilder:subresource:status\n// +kubebuilder:storageversion\n// MyResource\
  \ 是 myresources API 的模式\ntype MyResource struct {\n[...]\n}\n```\n\n\n\n### 实现 Hub\
  \ 和 Convertible\n\n`controller-runtime` 库提供了一个*转换*系统。该系统依赖两个接口：\n\n- `Hub` 接口：标记用于存储的版本\n\
  - `Convertible` 接口：提供与存储版本之间的转换器\n\n```go\ntype Hub interface {\n    runtime.Object\n\
  \    Hub()\n}\ntype Convertible interface {\n    runtime.Object\n    ConvertTo(dst\
  \ Hub) error\n    ConvertFrom(src Hub) error\n}\n```\n\n你已选择 `v1alpha1` 版本作为存储版本，需要让\
  \ `v1alpha1.MyResource` 实现 `Hub` 接口：\n\n```go\npackage v1alpha1\n// Hub 将此类型标记为转换中心。\n\
  func (*MyResource) Hub() {}\n```\n\n所有其他类型，在本例中即 `v1beta1.MyResource`，必须实现 `Convertible`\
  \ 接口，并提供与 `Hub` 版本进行相互转换的代码：\n\n```go\npackage v1beta1\nimport (\n    \"github.com/myid/myresource/api/v1alpha1\"\
  \n    \"sigs.k8s.io/controller-runtime/pkg/conversion\"\n)\nfunc (src *MyResource)\
  \ ConvertTo(dstRaw conversion.Hub) error {\n    dst := dstRaw.(*v1alpha1.MyResource)\n\
  \    dst.Spec.Memory = src.Spec.MemoryRequest\n    // 复制其他字段\n    dst.ObjectMeta\
  \ = src.ObjectMeta\n    dst.Spec.Image = src.Spec.Image\n    dst.Status.State =\
  \ src.Status.State\n    return nil\n}\nfunc (dst *MyResource) ConvertFrom(srcRaw\
  \ conversion.Hub) error {\n    src := srcRaw.(*v1alpha1.MyResource)\n    dst.Spec.MemoryRequest\
  \ = src.Spec.Memory\n    // 复制其他字段\n    dst.ObjectMeta = src.ObjectMeta\n    dst.Spec.Image\
  \ = src.Spec.Image\n    dst.Status.State = src.Status.State\n    return nil\n}\n\
  ```\n\n### 设置 Webhook\n\n`kubebuilder create webhook` 命令用于设置 webhook。支持以下几种 webhook\
  \ 类型：\n\n- *转换 Webhook*：用于帮助在资源版本之间进行转换（标志 `--conversion`）\n- *变更准入 Webhook*：用于帮助在新对象上设置默认值（标志\
  \ `--defaulting`）\n- *验证准入 Webhook*：用于帮助验证已创建或更新的对象（标志 `--programmatic-validation`）\n\
  \n在此示例中，你将为一个版本为 `v1beta1`（需要被转换的版本）的 `MyResource` 创建一个*转换* webhook：\n\n```shell\n\
  $ kubebuilder create webhook --group mygroup --version v1beta1 --kind MyResource\
  \ --conversion\n```\n\n这将在 `main` 函数中添加代码来设置转换 webhook：\n\n```go\n(&mygroupv1beta1.MyResource{}).SetupWebhookWithManager(mgr)\n\
  ```\n\n然后，在 `v1beta1` 包中创建新代码，供 `main` 调用：\n\n```go\npackage v1beta1\nfunc (r *MyResource)\
  \ SetupWebhookWithManager(mgr ctrl.Manager) error {\n    return ctrl.NewWebhookManagedBy(mgr).For(r).Complete()\n\
  }\n```\n\n### 更新 Kustomization 文件\n\n你需要在部署清单中启用 `webhook`，方法是取消 `config/default/kustomization.yaml`\
  \ 和 `config/crd/kustomization.yaml` 文件中与 `[WEBHOOK]` 和 `[CERTMANAGER]` 相关部分的注释。\n\
  \n如果你没有使用任何其他 webhook（即转换或变更），你还需要注释掉以下行：\n\n- 文件 `config/webhook/kustomization.yaml`\
  \ 中的 `- manifests.yaml`\n- 文件 `config/default/kustomization.yaml` 中的 `- webhookcainjection_patch.yaml`\n\
  \n你还需要安装 cert-manager^(⁵)，以基于 `kubebuilder` 添加到 CRD 的注解生成证书。\n\n### 使用不同版本\n\n按照“在集群上部署\
  \ Operator”一节所述部署新版本后，你可以创建版本为 `v1alpha1` 或 `v1beta1` 的 `MyResource` 实例。例如，你可以在\
  \ `config/sample` 目录中创建两个示例资源：\n\n- `config/samples/mygroup_v1alpha1_myresource.yaml`：\n\
  \n```yaml\napiVersion: mygroup.myid.dev/v1alpha1\nkind: MyResource\nmetadata:\n\
  \  name: myresource-sample-alpha\nspec:\n  image: nginx\n  memory: 512Mi\n```\n\n\
  - `config/samples/mygroup_v1beta1_myresource.yaml`：\n\n```yaml\napiVersion: mygroup.myid.dev/v1beta1\n\
  kind: MyResource\nmetadata:\n  name: myresource-sample-beta\nspec:\n  image: nginx\n\
  \  memoryRequest: 256Mi\n```\n\n然后，你可以使用 `kubectl` 在集群中创建资源：\n\n```shell\n$ kubectl\
  \ apply -f config/samples/mygroup_v1alpha1_myresource.yaml\n$ kubectl apply -f config/samples/mygroup_v1beta1_myresource.yaml\n\
  ```\n\n最后，当你列出资源时，将获得 `v1beta1` 格式的定义，其中包含 `memoryRequest` 字段：\n\n```yaml\n$ kubectl\
  \ get myresources.mygroup.myid.dev -o yaml\napiVersion: v1\nkind: List\nitems:\n\
  - apiVersion: mygroup.myid.dev/v1beta1\n  kind: MyResource\n  metadata:\n    name:\
  \ myresource-sample-alpha\n  spec:\n    image: nginx\n    memoryRequest: 512Mi\n\
  \  status:\n    state: Ready\n- apiVersion: mygroup.myid.dev/v1beta1\n  kind: MyResource\n\
  \  metadata:\n    name: myresource-sample-beta\n  spec:\n    image: nginx\n    memoryRequest:\
  \ 256Mi\n  status:\n    state: Ready\n```\n\n请注意，你得到的是 `v1beta1` 定义，因为 `kubectl`\
  \ 会返回请求资源的首选版本（最新版本）。\n\n如果你想以 `v1alpha1` 格式获取结果，可以在调用 `kubectl get` 时指定：\n\n```shell\n\
  $ kubectl get myresources.v1alpha1.mygroup.myid.dev -o yaml\n```\n\n该命令将返回使用 `Memory`\
  \ 字段的资源。\n\n## 结论\n\n本章使用 Kubebuilder SDK，帮助你比自行编写代码和 Kubernetes 清单更轻松地编写和部署 Operator。\n\
  \n请注意，Operator SDK^(⁶) 是构建 Operator 的另一个框架。Operator SDK 可以管理 Go、Helm 和 Ansible 项目。对于\
  \ Go 项目，Operator SDK 使用 `kubebuilder` 来生成代码和 Kubernetes 清单。\n\nOperator SDK 在 `kubebuilder`\
  \ 之上提供了更多功能，用于将构建的 Operator 与 Operator Lifecycle Manager^(⁷) 和 Operator Hub^(⁸)\
  \ 集成。\n\n由于这些额外功能超出了本书的范围，因此此处不涉及 Operator SDK。但你可以重新学习本章，将命令 `kubebuilder` 替换为\
  \ `operator-sdk`，以使用此框架构建你的 Operator。\n\n\n\n脚注\n1   2   3   4   5\n\n"
