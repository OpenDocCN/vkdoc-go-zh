  \ *Kind* 添加到一个 *Scheme* 中。*Scheme* 是 API Machinery 中使用的一种抽象，用于在 Go 结构体和 **Group-Version-Kinds**\
  \ 之间创建映射关系。这将在第 5 章 \"API Machinery\" 中进一步讨论。\n\n### doc.go\n\n该文件及后续文件包含一些高级信息，你在着手用\
  \ Go 编写第一个 Kubernetes 资源时并不需要理解它们，但它们将帮助你理解如何在接下来的章节中使用自定义资源定义声明新的资源。\n\n`doc.go`\
  \ 文件包含以下用于生成文件的指令：\n\n```\n// +k8s:deepcopy-gen=package\n// +k8s:protobuf-gen=package\n\
  // +k8s:openapi-gen=true\n```\n\n第一条指令由 `deepcopy-gen` 生成器用于生成 `zz_generated.deepcopy.go`\
  \ 文件。第二条指令由 `go-to-protobuf` 生成器用于生成以下文件：`generated.pb.go` 和 `generated.proto`。第三条指令由\
  \ `genswaggertypedocs` 生成器用于生成 `types_swagger_doc_generated.go` 文件。\n\n### generated.pb.go\
  \ 和 generated.proto\n\n这些文件由 `go-to-protobuf` 生成器生成。API Machinery 在将数据序列化为 Protobuf\
  \ 格式或从 Protobuf 格式反序列化时使用它们。\n\n### types_swagger_doc_generated.go\n\n该文件由 `genswaggertypedocs`\
  \ 生成器生成。它在生成 Kubernetes API 的完整 `swagger` 定义时使用。\n\n### zz_generated.deepcopy.go\n\
  \n该文件由 `deepcopy-gen` 生成器生成。它包含为包中定义的每个类型生成的 `DeepCopyObject` 方法的定义。此方法对于结构体实现 `runtime.Object`\
  \ 接口是必要的，该接口定义在 API Machinery 库中，并且 API Machinery 期望所有 *Kind* 结构体都实现这个 `runtime.Object`\
  \ 接口。\n\n该接口在[此文件](https://github.com/kubernetes/apimachinery/blob/master/pkg/runtime/interfaces.go)中定义如下：\n\
  \n```\ntype Object interface {\n    GetObjectKind() schema.ObjectKind\n    DeepCopyObject()\
  \ Object\n}\n```\n\n另一个必要的方法 `GetObjectKind` 会自动添加到嵌入了 `TypeMeta` 结构体的结构体中——所有 *Kind*\
  \ 结构体都是这种情况。`TypeMeta` 结构体具有定义如下的方法：\n\n```\nfunc (obj *TypeMeta) GetObjectKind()\
  \ schema.ObjectKind {\n    return obj\n}\n```\n\n## core/v1 中的特定内容\n\n`core/v1`\
  \ 包除了定义 Core 资源的结构体外，还为特定类型定义了实用方法，这些方法在将这些类型整合到你的代码中时会很有用。\n\n### ObjectReference\n\
  \n`ObjectReference` 可用于以唯一方式引用任何对象。该结构体定义如下：\n\n```\ntype ObjectReference struct\
  \ {\n    APIVersion          string\n    Kind                string\n    Namespace\
  \           string\n    Name                string\n    UID                 types.UID\n\
  \    ResourceVersion     string\n    FieldPath           string\n}\n```\n\n为此类型定义了三个方法：\n\
  \n*   `SetGroupVersionKind(gvk schema.GroupVersionKind)` – 该方法将根据作为参数传递的 `GroupVersionKind`\
  \ 值来设置 `APIVersion` 和 `Kind` 字段。\n\n*   `GroupVersionKind() schema.GroupVersionKind`\
  \ – 该方法将基于 `ObjectReference` 的 `APIVersion` 和 `Kind` 字段返回一个 `GroupVersionKind` 值。\n\
  \n*   `GetObjectKind() schema.ObjectKind` – 该方法将 `ObjectReference` 对象转换为 `ObjectKind`。前面两个方法实现了这个\
  \ `ObjectKind` 接口。由于 `ObjectReference` 上的 `DeepCopyObject` 方法也已定义，因此 `ObjectReference`\
  \ 将满足 `runtime.Object` 接口。\n\n\n### ResourceList\n\n`ResourceList`类型被定义为一个映射（map），其键为`ResourceName`，值为`Quantity`。该类型在各类\
  \ Kubernetes 资源中用于定义资源的`limits`和`requests`。\n\n在 YAML 中，其用法示例如下（为容器定义资源`requests`和`limits`）：\n\
  \n```\napiVersion: v1\nkind: Pod\nmetadata:\nname: mypod\nspec:\ncontainers:\n-\
  \ name: runtime\nresources:\nrequests:\nmemory: \"64Mi\"\ncpu: \"250m\"\nlimits:\n\
  memory: \"128Mi\"\ncpu: \"500m\"\n```\n\n在 Go 语言中，可以如下编写`requests`部分：\n\n```\nrequests\
  \ := corev1.ResourceList{\ncorev1.ResourceMemory:\n*resource.NewQuantity(64*1024*1024,\
  \ resource.BinarySI),\ncorev1.ResourceCPU:\n*resource.NewMilliQuantity(250, resource.DecimalSI),\n\
  }\n```\n\n下一章将更详细地描述如何使用`resource.Quantity`类型定义资源量。`ResourceList`类型提供以下方法：\n\n*\
  \   `Cpu() *resource.Quantity` – 返回映射中 CPU 键对应的资源量，格式为十进制（如 1, 250 m 等）\n*   `Memory()\
  \ *resource.Quantity` – 返回映射中 Memory 键对应的资源量，格式为二进制（如 512 Ki, 64 Mi 等）\n*   `Storage()\
  \ *resource.Quantity` – 返回映射中 Storage 键对应的资源量，格式为二进制（如 512 Mi, 1 Gi 等）\n*   `Pods()\
  \ *resource.Quantity` – 返回映射中 Pods 键对应的资源量，格式为十进制（如 1, 10 等）\n*   `StorageEphemeral()\
  \ *resource.Quantity` – 返回映射中 StorageEphemeral 键对应的资源量，格式为二进制（如 512 Mi, 1 Gi 等）\n\
  \n对于以上每个方法，如果映射中未定义该键，则返回一个值为`Zero`的`Quantity`。\n\n还有一个内部使用的辅助方法，可用于获取非标准格式的资源量：\n\
  \n*   `Name(name ResourceName, defaultFormat resource.Format) *resource.Quantity`\
  \ – 返回指定键`Name`在`defaultFormat`格式下的资源量。\n\n`ResourceName`类型的枚举值包括：`ResourceCPU`、`ResourceMemory`、`ResourceStorage`、`ResourceEphemeralStorage`和`ResourcePods`。\n\
  \n### Taint\n\n`Taint`资源用于应用于节点（Node），确保不容忍这些污点的 Pod 不会被调度到这些节点上。`Taint`结构体定义如下：\n\
  \n```\ntype Taint struct {\nKey            string\nValue          string\nEffect\
  \         TaintEffect\nTimeAdded      *metav1.Time\n}\n```\n\n`TaintEffect`枚举可取以下值：\n\
  \n```\nTaintEffectNoSchedule          = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
  \    = \"PreferNoSchedule\"\nTaintEffectNoExecute           = \"NoExecute\"\n```\n\
  \n控制平面在特殊条件下使用的已知`Taint`键，在此包中定义如下：\n\n```\nTaintNodeNotReady\n= \"node.kubernetes.io/not-ready\"\
  \nTaintNodeUnreachable\n= \"node.kubernetes.io/unreachable\"\nTaintNodeUnschedulable\n\
  = \"node.kubernetes.io/unschedulable\"\nTaintNodeMemoryPressure\n= \"node.kubernetes.io/memory-pressure\"\
  \nTaintNodeDiskPressure\n= \"node.kubernetes.io/disk-pressure\"\nTaintNodeNetworkUnavailable\n\
  = \"node.kubernetes.io/network-unavailable\"\nTaintNodePIDPressure\n= \"node.kubernetes.io/pid-pressure\"\
  \nTaintNodeOutOfService\n= \"node.kubernetes.io/out-of-service\"\n```\n\n`Taint`结构体上定义了以下两个方法：\n\
  \n*   `MatchTaint(taintToMatch *Taint) bool` – 如果两个污点的`key`和`effect`值相同，则此方法返回`true`。\n\
  *   `ToString() string` – 此方法返回`Taint`的字符串表示，格式为：`<key>=<value>:<effect>`、`<key>=<value>:`、`<key>:<effect>`或`<key>`。\n\
  \n### Toleration\n\n`Toleration`资源用于应用于 Pod，使其能够容忍特定节点上的污点。`Toleration`结构体定义如下：\n\
  \n```\ntype Toleration struct {\nKey                  string\nOperator         \
  \    TolerationOperator\nValue                string\nEffect               TaintEffect\n\
  TolerationSeconds    *int64\n}\n```\n\n`TolerationOperator`枚举可取以下值：\n\n```\nTolerationOpExists\
  \    = \"Exists\"\nTolerationOpEqual     = \"Equal\"\n```\n\n`TaintEffect`枚举可取以下值：\n\
  \n```\nTaintEffectNoSchedule              = \"NoSchedule\"\nTaintEffectPreferNoSchedule\
  \        = \"PreferNoSchedule\"\nTaintEffectNoExecute               = \"NoExecute\"\
  \n```\n\n`Toleration`结构体上定义了以下两个方法：\n\n*   `MatchToleration(tolerationToMatch *Toleration)\
  \ bool` – 如果两个容忍度的`Key`、`Operator`、`Value`和`Effect`值分别相同，则此方法返回`true`。\n*   `ToleratesTaint(taint\
  \ *Taint) bool` – 如果该容忍度能够容忍指定的`Taint`，则此方法返回`true`。容忍度容忍污点的规则如下：\n    *   **Effect**：如果`Toleration`的\
  \ effect 为空，则匹配所有 Taint 的 effect；否则，Toleration 和 Taint 的 effect 必须匹配。\n    *   **Operator**：如果`TolerationOperator`为`Exists`，则匹配所有\
  \ Taint 的值；否则，`TolerationOperator`为`Equal`，且 Toleration 和 Taint 的值必须匹配。\n    * \
  \  **Key**：如果 Toleration 的 Key 为空，则`TolerationOperator`必须为`Exists`，且匹配所有 Taint 的\
  \ key（无论值是什么）；否则，Toleration 和 Taint 的 key 必须匹配。\n\n### Well-Known Labels\n\n控制平面会为节点添加标签；有关使用的已知键及其用法，可在`core/v1`包的`well_known_labels.go`文件中找到。以下是最广为人知的标签。\n\
  \n节点上运行的 kubelet 会填充以下标签：\n\n```\nLabelOSStable      = \"kubernetes.io/os\"\nLabelArchStable\
  \    = \"kubernetes.io/arch\"\nLabelHostname      = \"kubernetes.io/hostname\"\n\
  ```\n\n当节点运行在云提供商上时，可设置以下标签，用于表示（虚拟）机器的实例类型、可用区（zone）和区域（region）：\n\n```\nLabelInstanceTypeStable\n\
  = \"node.kubernetes.io/instance-type\"\nLabelTopologyZone\n= \"topology.kubernetes.io/zone\"\
  \nLabelTopologyRegion\n= \"topology.kubernetes.io/region\"\n```\n\n## Writing Kubernetes\
  \ Resources in Go\n\n你将需要用 Go 语言编写 Kubernetes 资源，以便通过 HTTP 请求或更常用的 client-go 库在集群中创建或更新资源。client-go\
  \ 库将在后续章节中讨论；但现在，让我们专注于用 Go 语言编写资源。\n\n要创建或更新资源，需要为与该资源关联的`Kind`创建相应的结构体。例如，要创建一个`deployment`，你需要创建`Deployment`类型；为此，需要初始化一个在\
  \ API 库的`apps/v1`包中定义的`Deployment`结构体。\n\n\n\n### 导入包\n\n在使用结构体之前，需要先导入定义该结构体的包。如本章开头所述，包名的模式为\
  \ `k8s.io/api/<group>/<version>`。路径的最后一部分是版本号，但不要将其与 Go 模块的版本号混淆。\n\n区别在于：当你导入 Go\
  \ 模块的特定版本（例如 `k8s.io/klog/v2`）时，会使用版本号前的部分作为前缀来访问包的符号，无需定义任何别名。原因在于，在该库中，`v2` 目录并不存在，而是代表一个分支名，并且该包内的文件都以\
  \ `package klog` 开头，而不是 `package v2`。\n\n相反，当使用 Kubernetes API 库时，版本号是库中一个包的真实名称，且该包内的文件确实以\
  \ `package v1` 开头。\n\n如果不为导入定义别名，则必须使用版本名称来使用该包的符号。但仅凭版本号在阅读代码时缺乏意义；如果从同一文件导入多个包，最终会出现多个\
  \ `v1` 包名，这是不可能的。\n\n惯例是使用组名定义别名；或者，如果你想使用同一组的不同版本，或想更明确地表明别名指向某个 API 组/版本，可以创建组/版本别名：\n\
  \n```\nimport (\ncorev1 \"k8s.io/api/core/v1\"\nappsv1 \"k8s.io/api/apps/v1\"\n\
  )\n```\n\n现在，你可以实例化一个 `Deployment` 结构体：\n\n```\nmyDep := appsv1.Deployment{}\n```\n\
  \n要编译程序，你需要获取该库。为此，请使用：\n\n```\n$ go get k8s.io/api@latest\n```\n\n或者，如果你想使用特定版本的\
  \ Kubernetes API（例如 Kubernetes 1.23），请使用：\n\n```\n$ go get k8s.io/api@v0.23\n```\n\
  \n所有与 *Kind* 相关的结构体首先嵌入两个通用结构体：`TypeMeta` 和 `ObjectMeta`。两者都在 API Machinery 库的 `/pkg/apis/meta/v1`\
  \ 包中声明。\n\n### `TypeMeta` 字段\n\n`TypeMeta` 结构体定义如下：\n\n```\ntype TypeMeta struct\
  \ {\nKind           string\nAPIVersion     string\n}\n```\n\n通常你无需自己设置这些字段的值，因为\
  \ API Machinery 通过维护一个 *Scheme*（即 Group-Version-Kind 与 Go 结构体之间的映射）从结构体的类型推断出这些值。请注意，`APIVersion`\
  \ 值是另一种将 Group-Version 表示为单个字段（包含 `<group>/<version>`，对于传统核心组则仅为 `v1`）的方式。\n\n###\
  \ `ObjectMeta` 字段\n\n`ObjectMeta` 结构体定义如下（已移除已弃用字段及内部字段）：\n\n```\nType ObjectMeta\
  \ {\nName                string\nGenerateName        string\nNamespace         \
  \  string\nUID                 types.UID\nResourceVersion     string\nGeneration\
  \          int64\nLabels              map[string]string\nAnnotations         map[string]string\n\
  OwnerReferences     []OwnerReference\n[...]\n}\n```\n\nAPI Machinery 库的 `/pkg/apis/meta/v1`\
  \ 包为该结构体的字段定义了 Getter 和 Setter 方法。由于 `ObjectMeta` 嵌入在资源结构体中，因此可以在资源对象本身中使用这些方法。\n\
  \n#### Name\n\n该结构体最重要的信息是资源的名称。你可以使用 `Name` 字段指定资源的确切名称，或者使用 `GenerateName` 字段让\
  \ Kubernetes API 为你选择一个唯一名称；它通过在 `GenerateName` 值后添加后缀来确保唯一性。\n\n你可以在资源对象上使用 `GetName()\
  \ string` 和 `SetName(name string)` 方法来访问其内嵌 `ObjectMeta` 的 `Name` 字段，例如：\n\n```\n\
  configmap := corev1.ConfigMap{}\nconfigmap.SetName(\"config\")\n```\n\n#### Namespace\n\
  \n有命名空间的资源需要放置在特定的命名空间中。你可能认为需要在 `Namespace` 字段中指定此命名空间，但在创建或更新资源时，你将在请求路径中定义放置资源的命名空间。第\
  \ 2 章已展示在 `project1` 命名空间中创建 Pod 的请求为：\n\n```\n$ curl $HOST/api/v1/namespaces/project1/pods\n\
  ```\n\n如果你在 `Pod` 结构体中指定的命名空间与 `project1` 不同，将会收到错误：“所提供对象的命名空间与请求中发送的命名空间不匹配。”因此，在创建资源时，无需设置\
  \ `Namespace` 字段。\n\n#### UID、ResourceVersion 和 Generation\n\n`UID` 是集群中跨过去、现在和未来资源的唯一标识符。它由控制平面设置，并且在资源的整个生命周期中从未更新。它必须用于引用资源，而不是其种类、名称和命名空间，因为这些可能随时间描述不同的资源。\n\
  \n`ResourceVersion` 是一个不透明值，代表资源的版本。`ResourceVersion` 在每次资源更新时都会改变。\n\n该 `ResourceVersion`\
  \ 用于乐观并发控制：如果你从 Kubernetes API 获取资源的特定版本，修改它，然后将其发送回 API 进行更新；API 将检查你发送回的资源的 `ResourceVersion`\
  \ 是否为最新版本。如果在此过程中另一个进程修改了该资源，`ResourceVersion` 将已更改，则你的请求将被拒绝；在这种情况下，你需要读取新版本并再次更新。这不同于悲观并发控制，后者需要在读取资源前获取锁，并在更新后释放锁。\n\
  \n`Generation` 是一个序号，可由资源的控制器用来表示期望状态（`Spec`）的版本。它仅在资源的 `Spec` 部分更新时更新，而其他部分（标签、注解、状态）更新时不会改变。控制器通常使用\
  \ `Status` 部分中的 `ObservedGeneration` 字段来指示最后处理的是哪个 generation，并在状态中反映出来。\n\n\n\n\
  #### 标签与注解\n\n标签和注解在 Go 中定义为映射（map），其键和值均为字符串。\n\n尽管标签和注解的用途大相径庭，但它们的赋值方式却相同。本节将讨论如何填充\
  \ `labels` 字段，但该方法同样适用于注解。\n\n如果你已知要添加为标签的键和值，编写标签字段最简单的方式是直接编写映射，例如：\n\n```\nmylabels\
  \ := map[string]string{\n\"app.kubernetes.io/component\": \"my-component\",\n\"\
  app.kubernetes.io/name\":      \"a-name\",\n}\n```\n\n你也可以向现有映射添加标签，例如：\n\n```\n\
  mylabels[\"app.kubernetes.io/part-of\"] = \"my-app\"\n```\n\n如果需要基于动态值构建标签字段，API\
  \ Machinery 库中提供的 `labels` 包包含一个 `Set` 类型，可能会有所帮助。\n\n```\nimport \"k8s.io/apimachinery/pkg/labels\"\
  \nmylabels := labels.Set{}\n```\n\n该类型提供了以下函数和方法进行操作：\n\n* `ConvertSelectorToLabelsMap`\
  \ 函数：将选择器字符串转换为 `Set`。\n* `Conflicts` 函数：检查两个 `Set` 是否存在冲突标签。冲突标签是指具有相同键但不同值的标签。\n\
  * `Merge` 函数：将两个 `Set` 合并为一个 `Set`。如果两个集合之间存在冲突标签，则结果 `Set` 中将使用第二个集合中的标签。\n* `Equals`\
  \ 函数：检查两个 `Set` 是否具有相同的键和值。\n* `Has` 方法：指示 `Set` 是否包含某个键。\n* `Get` 方法：返回 `Set` 中给定键的值，如果该键未在\
  \ `Set` 中定义，则返回空字符串。\n\n你可以用值实例化一个 `Set`，并像操作映射（map）一样为其填充单个值：\n\n```\nmySet :=\
  \ labels.Set{\n\"app.kubernetes.io/component\": \"my-component\",\n\"app.kubernetes.io/name\"\
  :      \"a-name\",\n}\nmySet[\"app.kubernetes.io/part-of\"] = \"my-app\"\n```\n\n\
  你可以使用以下方法来访问资源的标签和注解：\n\n* `GetLabels() map[string]string`\n* `SetLabels(labels\
  \ map[string]string)`\n* `GetAnnotations() map[string]string`\n* `SetAnnotations(annotations\
  \ map[string]string)`\n\n### 设置 APIVersion 和 Kind\n\n使用 `Client-go` 库时（第 4 章将展示如何使用），`APIVersion`\
  \ 和 `Kind` 不会被自动设置；你需要在复制对象之前，在被引用的对象上设置它们，或者直接将其设置到 `ownerReference` 中：\n\n```\n\
  import (\ncorev1 \"k8s.io/api/core/v1\"\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
  \n)\n// 获取要引用的对象\npod, err := clientset.CoreV1().Pods(myns).\nGet(context.TODO(),\
  \ mypodname, metav1.GetOptions{})\nIf err != nil {\nreturn err\n}\n// 方案 1：设置 Pod\
  \ 的 APIVersion 和 Kind\n// 然后复制 Pod 中的所有信息\npod.SetGroupVersionKind(\ncorev1.SchemeGroupVersion.WithKind(\"\
  Pod\"),\n)\nownerRef := metav1.OwnerReference{\nAPIVersion: pod.APIVersion,\nKind:\
  \       pod.Kind,\nName:       pod.GetName(),\nUID:        pod.GetUID(),\n}\n//\
  \ 方案 2：从 Pod 复制 Name 和 UID\n// 然后在 OwnerReference 上设置 APIVersion 和 Kind\nownerRef\
  \ := metav1.OwnerReference{\nName: pod.GetName(),\nUID:  pod.GetUID(),\n}\nownerRef.APIVersion,\
  \ ownerRef.Kind =\ncorev1.SchemeGroupVersion.WithKind(\"Pod\").\nToAPIVersionAndKind()\n\
  ```\n\n`APIVersion` 包含与 `Group` 和 `Version` 相同的信息。你可以从 `SchemeGroupVersion` 变量（类型为\
  \ `schema.GroupVersion`）中获取这些信息，该变量定义在与资源相关的 API 库的包中（此处 `Pod` 资源对应的包是 `k8s.io/api/core/v1`）。然后，你可以添加\
  \ `Kind` 来创建一个 `schema.GroupVersionKind`。\n\n对于第一种方案，你可以在被引用的对象上使用 `SetGroupVersionKind`\
  \ 方法，根据 `GroupVersionKind` 设置 `APIVersion` 和 `Kind`。对于第二种方案，使用 `GroupVersionKind`\
  \ 上的 `ToAPIVersionAndKind` 方法获取相应的 `APIVersion` 和 `Kind` 值，然后将它们赋值给 `OwnerReference`。\n\
  \n第 5 章将描述 `API Machinery` 库以及与 `Group`、`Version` 和 `Kind` 相关的所有类型和方法。`OwnerReference`\
  \ 结构体还包含两个可选的布尔字段：`Controller` 和 `BlockOwnerDeletion`。\n\n#### 设置 Controller\n\n\
  `Controller` 字段指示被引用的对象是否是管理型控制器（或 Operator）。控制器或 Operator 必须在其拥有（owned）的资源上将此值设置为\
  \ true，以表明它正在管理该资源。\n\nKubernetes API 将拒绝在同一资源上添加两个 `Controller` 字段值为 true 的 `OwnerReference`。这样一来，一个资源就不可能被两个不同的控制器管理。\n\
  \n请注意，这与被多个资源拥有是不同的。一个资源可以有不同的所有者；在这种情况下，当所有所有者都被删除时，该资源将被删除，无论哪个所有者是 `Controller`（如果有的话）。\n\
  \n控制器的这种唯一性对于那些可以“采用（adopt）”资源的控制器很有用。例如，`ReplicaSet` 可以采用一个与 `ReplicaSet` 选择器匹配的现有\
  \ Pod，但仅当该 `Pod` 尚未被另一个 `ReplicaSet` 或其他控制器控制时才可以。\n\n此字段的值是一个指向布尔值的指针。你可以在设置 `Controller`\
  \ 字段时声明一个布尔值并使用其地址，或者使用 `Kubernetes Utils` 库中的 `BoolPtr` 函数：\n\n```\n// 方案 1：声明一个值并使用其地址\n\
  controller := true\nownerRef.Controller = &controller\n// 方案 2：使用 BoolPtr 函数\nimport\
  \ (\n\"k8s.io/utils/pointer\"\n)\nownerRef.Controller = pointer.BoolPtr(true)\n\
  ```\n\n#### 设置 BlockOwnerDeletion\n\n`OwnerReference` 有助于控制器或其他进程无需处理拥有资源的删除事宜：当所有者被删除时，由\
  \ Kubernetes 垃圾收集器负责删除被拥有的资源。\n\n此行为是可配置的。在对资源执行 `Delete` 操作时，你可以使用 `Propagation\
  \ Policy`（传播策略选项）：\n\n* **Orphan（孤儿）**：指示 Kubernetes API 孤立被拥有的资源，使其不被垃圾收集器删除。\n\
  * **Background（后台）**：指示 Kubernetes API 在所有者资源被删除后立即从 DELETE 操作返回，而无需等待垃圾收集器删除拥有资源。\n\
  * **Foreground（前台）**：指示 Kubernetes API 在所有者和**`BlockOwnerDeletion` 设置为 true 的拥有资源**被删除后才从\
  \ DELETE 操作返回。Kubernetes API 不会等待其他拥有资源被删除。\n\n因此，如果你正在编写一个需要等待所有拥有资源被删除的控制器或其他进程，该进程将需要将所有拥有资源上的\
  \ `BlockOwnerDeletion` 字段设置为 true，并在删除所有者资源时使用 Foreground（前台）传播策略。\n\n\n\n### 规范与状态\n\
  \n在通用的 `Type` 和 `Metadata` 之后，资源定义通常由两部分组成：`Spec` 和 `Status`。\n\n请注意，这并非适用于所有资源。例如，核心的\
  \ `ConfigMap` 和 `Secret` 资源（仅举两例）就不包含 `Spec` 和 `Status` 部分。更普遍的是，包含配置数据且不受任何控制器管理的资源不包含这些字段。\n\
  \n`Spec` 是用户定义的部分，表示用户期望的状态。`Spec` 将由管理该资源的`控制器`读取，控制器会根据 `Spec` 在集群上创建、更新或删除资源，并将其操作结果检索到资源的\
  \ `Status` 部分。控制器读取 `Spec`、应用到集群并检索 `Status` 的此过程称为`调谐循环`。\n\n### 与编写 YAML 清单的比较\n\
  \n当你编写一个与 `kubectl` 配合使用的 Kubernetes 清单时：\n\n-   清单以 `apiVersion` 和 `kind` 开头。\n\
  -   `metadata` 字段包含该资源的所有元数据。\n-   随后是 `Spec` 和 `Status` 字段（或其他字段）。\n\n当你用 Go 语言编写\
  \ Kubernetes 结构体时，会发生以下情况：\n\n-   结构体的类型决定了 `apiVersion` 和 `Kind`；无需指定它们。\n-   元数据可以通过嵌入\
  \ `metav1.ObjectMeta` 结构体来定义，或者通过使用资源上的*元数据设置器*来定义。\n-   随后是 `Spec` 和 `Status` 字段（或其他字段），使用它们自己的\
  \ Go 结构体或其他类型。\n\n举个例子，以下是使用 YAML 清单与 Go 语言定义 `Pod` 的方法对比。YAML 格式：\n\n```\napiVersion:\
  \ v1\nkind: Pod\nmetadata:\n  name: nginx\n  labels:\n    - component: my-component,\n\
  spec:\n  containers:\n    - image: nginx\n      name: nginx\n```\n\n在 Go 语言中，当你为元数据使用设置器时：\n\
  \n```\npod := corev1.Pod{\n    Spec: corev1.PodSpec{\n        Containers: []corev1.Container{\n\
  \            {\n                Name:  \"runtime\",\n                Image: \"nginx\"\
  ,\n            },\n        },\n    },\n}\npod.SetName(\"my-pod\")\npod.SetLabels(map[string]string{\n\
  \    \"component\": \"my-component\",\n})\n```\n\n或者，在 Go 语言中，当你将 `metav1.ObjectMeta`\
  \ 结构体嵌入到 `Pod` 结构体中时：\n\n```\npod2 := corev1.Pod{\n    ObjectMeta: metav1.ObjectMeta{\n\
  \        Name: \"nginx\",\n        Labels: map[string]string{\n            \"component\"\
  : \"mycomponent\",\n        },\n    },\n    Spec: corev1.PodSpec{\n        Containers:\
  \ []corev1.Container{\n            {\n                Name:  \"runtime\",\n    \
  \            Image: \"nginx\",\n            },\n        },\n    },\n}\n```\n\n##\
  \ 完整示例\n\n这个完整示例使用截至目前学习的概念，通过 `POST` 请求在集群上创建一个 `Pod`。\n\n-   ➊ 使用 Go 结构体构建一个 `Pod`\
  \ 对象，如本章前面所示\n-   ➋ 使用序列化器（更多相关信息请参见第 5 章）将 `Pod` 对象序列化为 JSON\n-   ➌ 构建一个 HTTP `POST`\
  \ 请求，其主体包含要创建的、已序列化为 JSON 的 `Pod`\n-   ➍ 使用构建好的请求调用 Kubernetes API\n-   ➎ 从响应中获取主体\n\
  -   ➏ 根据响应状态码：\n\n如果请求返回 2xx 状态码：\n\n-   ➐ 将响应主体反序列化为 `Pod` Go 结构体\n-   ➑ 将创建的 `Pod`\
  \ 对象以 JSON 格式显示以供参考；\n\n否则：\n\n-   ➒ 将响应主体反序列化为 `Status` Go 结构体\n-   ➓ 将 `Status`\
  \ 对象以 JSON 格式显示以供参考：\n\n```\npackage main\n\nimport (\n    \"bytes\"\n    \"encoding/json\"\
  \n    \"fmt\"\n    \"io\"\n    \"net/http\"\n\n    corev1 \"k8s.io/api/core/v1\"\
  \n    metav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n    \"k8s.io/apimachinery/pkg/runtime\"\
  \n    \"k8s.io/apimachinery/pkg/runtime/schema\"\n    \"k8s.io/apimachinery/pkg/runtime/serializer/json\"\
  \n)\n\nfunc createPod() error {\n    pod := createPodObject() ➊\n    serializer\
  \ := getJSONSerializer()\n    postBody, err := serializePodObject(serializer, pod)\
  \ ➋\n    if err != nil {\n        return err\n    }\n    reqCreate, err := buildPostRequest(postBody)\
  \ ➌\n    if err != nil {\n        return err\n    }\n    client := &http.Client{}\n\
  \    resp, err := client.Do(reqCreate) ➍\n    if err != nil {\n        return err\n\
  \    }\n    defer resp.Body.Close()\n    body, err := io.ReadAll(resp.Body) ➎\n\
  \    if err != nil {\n        return err\n    }\n    if resp.StatusCode < 300 {\
  \ ➏\n        createdPod, err := deserializePodBody(serializer, body) ➐\n       \
  \ if err != nil {\n            return err\n        }\n        json, err := json.MarshalIndent(createdPod,\
  \ \"\", \"  \")\n        if err != nil {\n            return err\n        }\n  \
  \      fmt.Printf(\"%s\\n\", json) ➑\n    } else {\n        status, err := deserializeStatusBody(serializer,\
  \ body) ➒\n        if err != nil {\n            return err\n        }\n        json,\
  \ err := json.MarshalIndent(status, \"\", \"  \")\n        if err != nil {\n   \
  \         return err\n        }\n        fmt.Printf(\"%s\\n\", json) ➓\n    }\n\
  \    return nil\n}\n\nfunc createPodObject() *corev1.Pod { ➊\n    pod := corev1.Pod{\n\
  \        Spec: corev1.PodSpec{\n            Containers: []corev1.Container{\n  \
  \              {\n                    Name:  \"runtime\",\n                    Image:\
  \ \"nginx\",\n                },\n            },\n        },\n    }\n    pod.SetName(\"\
  my-pod\")\n    pod.SetLabels(map[string]string{\n        \"app.kubernetes.io/component\"\
  : \"my-component\",\n        \"app.kubernetes.io/name\":      \"a-name\",\n    })\n\
  \    return &pod\n}\n\nfunc serializePodObject( ➋\n    serializer runtime.Serializer,\n\
  \    pod *corev1.Pod,\n) (\n    io.Reader,\n    error,\n) {\n    var buf bytes.Buffer\n\
  \    err := serializer.Encode(pod, &buf)\n    if err != nil {\n        return nil,\
  \ err\n    }\n    return &buf, nil\n}\n\nfunc buildPostRequest( ➌\n    body io.Reader,\n\
  ) (\n    *http.Request,\n    error,\n) {\n    reqCreate, err := http.NewRequest(\n\
  \        \"POST\",\n        \"http://127.0.0.1:8001/api/v1/namespaces/default/pods\"\
  ,\n        body,\n    )\n    if err != nil {\n        return nil, err\n    }\n \
  \   reqCreate.Header.Add(\n        \"Accept\",\n        \"application/json\",\n\
  \    )\n    reqCreate.Header.Add(\n        \"Content-Type\",\n        \"application/json\"\
  ,\n    )\n    return reqCreate, nil\n}\n\nfunc deserializePodBody( ➐\n    serializer\
  \ runtime.Serializer,\n    body []byte,\n) (\n    *corev1.Pod,\n    error,\n) {\n\
  \    var result corev1.Pod\n    _, _, err := serializer.Decode(body, nil, &result)\n\
  \    if err != nil {\n        return nil, err\n    }\n    return &result, nil\n\
  }\n\nfunc deserializeStatusBody( ➒\n    serializer runtime.Serializer,\n    body\
  \ []byte,\n) (\n    *metav1.Status,\n    error,\n) {\n    var status metav1.Status\n\
  \    _, _, err := serializer.Decode(body, nil, &status)\n    if err != nil {\n \
  \       return nil, err\n    }\n    return &status, nil\n}\n\nfunc getJSONSerializer()\
  \ runtime.Serializer {\n    scheme := runtime.NewScheme()\n    scheme.AddKnownTypes(\n\
  \        schema.GroupVersion{\n            Group:   \"\",\n            Version:\
  \ \"v1\",\n        },\n        &corev1.Pod{},\n        &metav1.Status{},\n    )\n\
  \    return json.NewSerializerWithOptions(\n        json.SimpleMetaFactory{},\n\
  \        nil,\n        scheme,\n        json.SerializerOptions{},\n    )\n}\n```\n\
  \n## 总结\n\n在本章中，你了解了第一个用于在 Go 中操作 Kubernetes 的库——API 库。它本质上是一组用于声明 Kubernetes 资源的\
  \ Go 结构体。本章还探讨了 API Machinery 库中定义的所有资源通用的元数据字段的定义。\n\n本章末尾有一个程序示例，演示了如何使用 API 库构建\
  \ `Pod` 定义，然后通过 HTTP 请求调用 API 服务器在集群中创建此 `Pod`。\n\n接下来的章节将探讨其他基础库——API Machinery\
  \ 和 Client-go，使用它们你将不再需要手动构建 HTTP 请求。\n\n"
- "# 4. 使用通用类型\n\n上一章描述了如何使用 Go 结构体定义 Kubernetes 资源。特别是，它解释了 Kubernetes API 库中包的内容，以及与每个\
  \ Kubernetes `Kind` 关联的每个资源的通用字段。\n\n本章将介绍在定义 Kubernetes 资源时可以在各种位置使用的通用类型。\n\n\
  ## 指针\n\nGo 结构体中的可选值通常声明为指向值的指针。因此，如果你不想指定可选值，只需将其保留为 `nil` 指针；如果需要指定一个值，则必须创建该值并传递其引用。\n\
  \n`Kubernetes Utils` 库中的 `pointer` 包定义了用于声明此类可选值的工具函数。\n\n```\nimport (\n    \"\
  k8s.io/utils/pointer\"\n)\n```\n\n\n\n### 获取值的引用\n\n`Int`、`Int32`、`Int64`、`Bool`、`String`、`Float32`、`Float64`\
  \ 和 `Duration` 函数接受一个同类型的参数，并返回一个指向该传入值的指针。例如，`Int32` 函数的定义如下：\n\n```\nfunc Int32(i\
  \ int32) *int32 {\nreturn &i\n}\n```\n\n然后，你可以这样使用它：\n\n```\nspec := appsv1.DeploymentSpec{\n\
  Replicas: pointer.Int32(3),\n[...]\n}\n```\n\n### 解引用指针\n\n另一种方式是获取指针所引用的值，如果指针为\
  \ `nil`，则返回一个默认值。\n\n`IntDeref`、`Int32Deref`、`Int64Deref`、`BoolDeref`、`StringDeref`、`Float32Deref`、`Float64Deref`\
  \ 和 `DurationDeref` 函数接受一个指针和一个同类型的默认值作为参数，如果指针不为 `nil`，则返回它所引用的值，否则返回默认值。例如，`Int32Deref`\
  \ 函数的定义如下：\n\n```\nfunc Int32Deref(ptr *int32, def int32) int32 {\nif ptr != nil\
  \ {\nreturn *ptr\n}\nreturn def\n}\n```\n\n然后，你可以这样使用它：\n\n```\nreplicas := pointer.Int32Deref(spec.Replicas,\
  \ 1)\n```\n\n### 比较两个引用的值\n\n比较两个指针值可能会很有用，当它们都为 `nil`，或者它们引用了两个相等的值时，认为它们是相等的。\n\
  \n`Int32Equal`、`Int64Equal`、`BoolEqual`、`StringEqual`、`Float32Equal`、`Float64Equal`\
  \ 和 `DurationEqual` 函数接受两个同类型的指针，如果两个指针都为 `nil`，或者它们引用了相等的值，则返回 `true`。例如，`Int32Equal`\
  \ 函数的定义如下：\n\n```\nfunc Int32Equal(a, b *int32) bool {\nif (a == nil) != (b == nil)\
  \ {\nreturn false\n}\nif a == nil {\nreturn true\n}\nreturn *a == *b\n}\n```\n\n\
  然后，你可以这样使用它：\n\n```\neq := pointer.Int32Equal(\nspec1.Replicas,\nspec2.Replicas,\n\
  )\n```\n\n请注意，要测试一个可选值（同时考虑其默认值）是否相等，你应该改用以下方式：\n\n```\nisOne := pointer.Int32Deref(spec.Replicas,\
  \ 1) == 1\n```\n\n## 数量\n\n`Quantity` 是一种数字的定点表示法，用于定义要分配的资源数量（例如，内存、CPU 等）。`Quantity`\
  \ 能够表示的最小值是 1 纳（10^(−9)）。\n\n在内部，`Quantity` 要么由 `Integer`（64 位）和 `Scale` 表示，要么，如果\
  \ `int64` 不够大而无法支持它，则由一个 `inf.Dec` 值表示（由 [`https://github.com/go-inf/inf`](https://github.com/go-inf/inf)\
  \ 的包定义）。\n\n```\nimport (\n\"k8s.io/apimachinery/pkg/api/resource\"\n)\n```\n\n\
  ### 将字符串解析为数量\n\n定义 `Quantity` 的第一种方法是使用以下函数之一，从字符串解析其值：\n\n- `func MustParse(str\
  \ string) Quantity` – 从 `string` 解析一个数量，如果该字符串不代表一个有效数量，则引发 panic。此函数适用于当你应用一个已知有效的硬编码值时。\n\
  \n- `func ParseQuantity(str string) (Quantity, error)` – 从 `string` 解析一个数量，如果该字符串不代表一个有效数量，则返回一个错误。此函数适用于当你不确定该值是否有效时。\n\
  \n`Quantity` 可以使用符号、数字和后缀来书写。符号和后缀是可选的。后缀可以是二进制、十进制或十进制指数。\n\n定义的二进制后缀有 `Ki` (2¹⁰)、`Mi`\
  \ (2²⁰)、`Gi` (2³⁰)、`Ti` (2⁴⁰)、`Pi` (2⁵⁰) 和 `Ei` (2⁶⁰)。定义的十进制后缀有 `n` (10^(−9))、`u`\
  \ (10^(−6))、`m` (10^(−3))、`\"\" ` (10⁰)、`k` (10³)、`M` (10⁶)、`G` (10⁹)、`T` (10¹²)、`P`\
  \ (10¹⁵) 和 `E` (10¹⁸)。十进制指数后缀以 `e` 或 `E` 符号后跟十进制指数形式书写——例如，`E2` 代表 10²。\n\n后缀格式（二进制、十进制或指数十进制）会保存在\
  \ `Quantity` 中，并在序列化该数量时使用。\n\n使用这些函数，`Quantity` 在内部的表现形式（缩放整数或 `inf.Dec`）将根据解析后的值是否可以被表示为缩放整数来决定。\n\
  \n### 使用 inf.Dec 作为数量\n\n使用以下方法将 `inf.Dec` 用作 `Quantity`：\n\n- `func NewDecimalQuantity(b\
  \ inf.Dec, format Format) *Quantity` – 通过提供一个 `inf.Dec` 值来声明一个 `Quantity`，并指定序列化时你想要使用的后缀格式。\n\
  \n- `func (q *Quantity) ToDec() *Quantity` – 强制一个 `Quantity`（之前通过解析字符串或使用新函数初始化得来）以\
  \ `inf.Dec` 形式存储。\n\n- `func (q *Quantity) AsDec() *inf.Dec` – 获取 `Quantity` 的 `inf.Dec`\
  \ 表示，而不修改其内部表示形式。\n\n### 使用缩放整数作为数量\n\n使用以下方法将缩放整数用作 `Quantity`：\n\n- `func NewScaledQuantity(value\
  \ int64, scale Scale) *Quantity` – 通过提供一个 `int64` 值和一个缩放比例来声明一个 `Quantity`。后缀格式将为十进制格式。\n\
  \n- `func (q *Quantity) SetScaled(value int64, scale Scale)` – 用缩放整数覆盖 `Quantity`\
  \ 的值。后缀格式将保持不变。\n\n- `func (q *Quantity) ScaledValue(scale Scale) int64` – 考虑给定的缩放比例，获取\
  \ `Quantity` 的整数表示，而不修改其内部表示形式。\n\n- `func NewQuantity(value int64, format Format)\
  \ *Quantity` – 通过提供一个 `int64` 值来声明一个 `Quantity`，缩放比例固定为 `0`，并指定序列化时要使用的后缀格式。\n\n\
  - `func (q *Quantity) Set(value int64)` – 用整数覆盖 `Quantity` 的值，缩放比例固定为 `0`。后缀格式将保持不变。\n\
  \n- `func (q *Quantity) Value() int64` – 获取 `Quantity` 的整数表示，缩放比例为 `0`，而不修改其内部表示形式。\n\
  \n- `func NewMilliQuantity(value int64, format Format) *Quantity` – 通过提供一个 `int64`\
  \ 值来声明一个 `Quantity`，缩放比例固定为 `−3`，并指定序列化时要使用的后缀格式。\n\n- `func (q *Quantity) SetMilli(value\
  \ int64)` – 用整数覆盖 `Quantity` 的值，缩放比例固定为 `−3`。后缀格式将保持不变。\n\n- `func (q *Quantity)\
  \ MilliValue() int64` – 获取 `Quantity` 的整数表示，缩放比例为 `−3`，而不修改其内部表示形式。\n\n### 数量的运算\n\
  \n以下是对 `Quantity` 进行运算的方法：\n\n- `func (q *Quantity) Add(y Quantity)` – 将 `y` 数量加到\
  \ `q` 数量上。\n\n- `func (q *Quantity) Sub(y Quantity)` – 从 `q` 数量中减去 `y` 数量。\n\n-\
  \ `func (q *Quantity) Cmp(y Quantity) int` – 比较 `q` 和 `y` 两个数量。如果两个数量相等，则返回 `0`；如果\
  \ `q` 大于 `y`，则返回 `1`；如果 `q` 小于 `y`，则返回 `−1`。\n\n- `func (q *Quantity) CmpInt64(y\
  \ int64) int` – 比较 `q` 数量与 `y` 整数。如果两者相等，则返回 `0`；如果 `q` 大于 `y`，则返回 `1`；如果 `q` 小于\
  \ `y`，则返回 `−1`。\n\n- `func (q *Quantity) Neg()` – 使 `q` 成为其自身的相反数。\n\n- `func (q\
  \ Quantity) Equal(v Quantity) bool` – 测试 `q` 和 `v` 两个数量是否相等。\n\n\n\n## IntOrString\n\
  \nKubernetes 资源的某些字段同时接受整数值或字符串值。例如，端口可以通过端口号或 IANA 服务名称（如 [`https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml`](https://www.iana.org/assignments/service-names-port-numbers/service-names-port-numbers.xhtml)\
  \ 所定义）来定义。\n\n另一个例子是可以接受整数或百分比的字段。\n\n```go\nimport (\n\"k8s.io/apimachinery/pkg/util/intstr\"\
  \n)\n```\n\n`IntOrString` 结构体定义如下：\n\n```go\ntype IntOrString struct {\nType   Type\n\
  IntVal int32\nStrVal string\n}\n```\n\n`Type` 可以是 `Int` 或 `String`。\n\n由于结构体的所有字段都是公开的，你可以通过直接访问其字段来创建值或从中提取信息。为了方便，以下函数可用于创建和操作\
  \ `IntOrString` 值：\n\n*   `func FromInt(val int) IntOrString` – 声明一个包含整数值的 `IntOrString`。\n\
  *   `func FromString(val string) IntOrString` – 声明一个包含字符串值的 `IntOrString`。\n*  \
  \ `func Parse(val string) IntOrString` – 声明一个 `IntOrString`，首先尝试从字符串中提取整数，否则将其存储为字符串。\n\
  *   `func (intstr *IntOrString) String() string` – 将 `IntOrString` 值作为字符串返回，如果值存储为整数，则使用\
  \ `Itoa` 进行转换。\n*   `func (intstr *IntOrString) IntValue() int` – 将 `IntOrString`\
  \ 值作为整数返回。如果存储为字符串，则使用 `Atoi` 返回其转换后的值，如果解析失败则返回 `0`。\n*   `func ValueOrDefault(intOrPercent\
  \ *IntOrString, defaultValue IntOrString) *IntOrString` – 如果 `intOrPercent` 不为 nil，则返回该值，否则返回\
  \ `defaultValue`。\n*   `func GetScaledValueFromIntOrPercent(intOrPercent *IntOrString,\
  \ total int, roundUp bool) (int, error)` – 此函数可用于预期包含整数或百分比的 `IntOrString` 值。如果值是整数，则原样返回。\n\
  \n如果值是表示百分比的字符串（数字后跟 `%` 符号），则该函数返回 `total` 值的百分比，并根据 `roundUp` 向上或向下取整。如果字符串无法解析为百分比，则该函数返回一个错误。\n\
  \n## Time\n\nAPI Machinery 库中定义的 `Time` 类型用于 Kubernetes 资源中声明时间的所有字段。它是 Go `time.Time`\
  \ 类型的包装器，并提供了包装 `time.Time` 工厂方法的工厂函数。\n\n```go\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
  \n)\n```\n\n### 工厂方法\n\n可用的工厂方法如下：\n\n*   `func NewTime(time time.Time) Time` –\
  \ 返回一个包装了所提供的 `time.Time` 值的 `metav1.Time` 值。\n*   `func Date(year int, month time.Month,\
  \ day, hour, min, sec, nsec int, loc *time.Location) Time` – 基于时间的各个元素（例如，年、月、日、时、分、秒、纳秒、时区）返回一个\
  \ `metav1.Time` 值。它是 `time.Date` 函数的包装器。\n*   `func Now() Time` – 返回一个包含当前本地时间的\
  \ `metav1.Time` 值。它是 `time.Now` 函数的包装器。\n*   `func Unix(sec int64, nsec int64) Time`\
  \ – 返回一个对应于以秒和纳秒表示的给定 Unix 时间的 `metav1.Time` 值。它是 `time.Unix` 函数的包装器。\n\n### Time\
  \ 上的操作\n\n使用以下定义来定义 `Time` 操作：\n\n*   `func (t *Time) DeepCopyInto(out *Time)` –\
  \ 返回 `metav1.Time` 值的一个副本。\n*   `func (t *Time) IsZero() bool` – 如果 `metav1.Time`\
  \ 值表示 `零` 时间点，即 UTC 时间 0001 年 1 月 1 日 00:00:00，则返回 true。它是 `time.IsZero` 方法的包装器。\n\
  *   `func (t *Time) Before(u *Time) bool` – 如果 `metav1.Time` 时刻 `t` 在 `u` 之前，则返回\
  \ true。它是 `time.Before` 方法的包装器。\n*   `func (t *Time) Equal(u *Time) bool` – 如果 `metav1.Time`\
  \ 时刻 `t` 等于 `u`，则返回 true。它是 `time.Equal` 方法的包装器。\n*   `func (t Time) Rfc3339Copy()\
  \ Time` – 返回 `metav1.Time` 值 `t` 的一个副本，移除了其纳秒精度。\n\n## 总结\n\n本章介绍了在 Go 中定义 Kubernetes\
  \ 资源时使用的常见类型。指针值用于指定可选值，量化值用于指定内存和 CPU 数量，`IntOrString` 类型用于既可以写成整数也可以写成字符串的值（例如，可以通过编号或名称定义的端口），以及\
  \ `Time`——一种包装了 Go `Time` 类型的可序列化类型。\n\n"
- "# 5. API Machinery\n\n前面章节探讨了 Kubernetes API 在 HTTP 层面的工作原理。它们还探讨了 Kubernetes API\
  \ 库，该库以 Go 语言定义了由 Kubernetes API 提供的资源。\n\n本章探讨 Kubernetes API Machinery 库，该库提供了用于处理遵循\
  \ Kubernetes API 对象约定的 API 对象的实用工具。这些约定包括：\n\n*   API 对象嵌入一个公共元数据结构 `TypeMeta`，包含两个字段：`APIVersion`\
  \ 和 `Kind`。\n*   API 对象在单独的包中提供。\n*   API 对象是版本化的。\n*   提供了用于在不同版本之间进行转换的转换函数。\n\
  \nAPI Machinery 将提供以下实用工具：\n\n*   一个 `Scheme` 抽象，用于：\n    *   将 API 对象注册为 GVK（Group-Version-Kinds）\n\
  \    *   在不同版本的 API 对象之间进行转换\n    *   序列化/反序列化 API 对象\n*   一个 `RESTMapper`，用于映射\
  \ API 对象（基于嵌入的 `APIVersion` 和 `Kind`）和资源名称（按 REST 含义）。\n\n本章详细介绍了 API Machinery\
  \ 提供的函数。\n\n## Schema 包\n\n`API Machinery` 库的 `schema` 包定义了用于处理组（Group）、版本（Version）、种类（Kind）和资源（Resource）的有用结构和函数。\n\
  \n```go\nimport (\n\"k8s.io/apimachinery/pkg/runtime/schema\"\n)\n```\n\n定义了 `GroupVersionResource`、`GroupVersionKind`、`GroupVersion`、`GroupResource`\
  \ 和 `GroupKind` 等结构，并提供了在它们之间转换的方法。\n\n此外，还提供了 `GroupVersionKind` 与 `(apiVersion,\
  \ kind)` 之间的转换函数：`ToAPIVersionAndKind` 和 `FromAPIVersionAndKind`。\n\n![](img/533908_1_En_5_Fig1_HTML.png)\n\
  \n一个模型图描述了 API Machinery 的 schema。1. 组版本。2. 组资源。3. 组版本资源。4. 组版本种类。5. 组种类。6. API\
  \ 版本种类。1 和 3 之间的箭头表示 with resource 和 group version。2 和 3 之间表示 with version 和 group\
  \ resource。1 和 4 之间表示 with kind 和 group version。4 和 5 之间表示 with version 和 group\
  \ kind。\n\n图 5-1\n\nGVK 和 GVR 相关结构与方法\n\n## Scheme\n\n`Scheme` 是一个抽象，用于将 API 对象注册为\
  \ `Group-Version-Kinds`，在不同版本的 API 对象之间进行转换，以及序列化/反序列化 API 对象。`Scheme` 是由 API Machinery\
  \ 在 `runtime` 包中提供的一个结构。该结构的所有字段都是未导出的。\n\n\n\n### 初始化\n\n`Scheme`结构体可以通过`NewScheme`函数初始化：\n\
  \n```go\nimport (\n\"k8s.io/apimachinery/pkg/runtime\"\n)\nScheme := runtime.NewScheme()\n\
  ```\n\n结构体初始化后，可以通过`AddKnownTypes`方法注册新的 API 对象：\n\n```go\nfunc (s *Scheme) AddKnownTypes(gv\
  \ schema.GroupVersion, types ...Object)\n```\n\n例如，要将`Pod`和`ConfigMap`对象注册到`core/v1`组，可以这样写：\n\
  \n```go\nimport (\ncorev1 \"k8s.io/api/core/v1\"\n\"k8s.io/apimachinery/pkg/runtime\"\
  \n\"k8s.io/apimachinery/pkg/runtime/schema\"\n)\nScheme := runtime.NewScheme()\n\
  func init() {\nScheme.AddKnownTypes(\nschema.GroupVersion{\nGroup:   \"\",\nVersion:\
  \ \"v1\",\n},\n&corev1.Pod{},\n&corev1.ConfigMap{},\n)\n}\n```\n\n这样做之后，API Machinery\
  \ 就能知道，执行与`pods`相关的请求时应使用`Group-Version-Kind`为`core-v1-Pod`的`corev1.Pod`结构体，执行与`configmaps`相关的请求时应使用`core-v1-ConfigMap`的`corev1.ConfigMap`结构体。\n\
  \n如所示，API 对象可以版本化。你可以为不同版本注册同一类对象。例如，使用以下代码为`Deployment`对象添加`v1`和`v1beta1`版本：\n\n\
  ```go\nimport (\nappsv1 \"k8s.io/api/apps/v1\"\nappsv1beta1 \"k8s.io/api/apps/v1beta1\"\
  \n\"k8s.io/apimachinery/pkg/runtime\"\n\"k8s.io/apimachinery/pkg/runtime/schema\"\
  \n)\nScheme := runtime.NewScheme()\nfunc init() {\nScheme.AddKnownTypes(\nschema.GroupVersion{\n\
  Group:   \"apps\",\nVersion: \"v1\",\n},\n&appsv1.Deployment{},\n)\nScheme.AddKnownTypes(\n\
  schema.GroupVersion{\nGroup:   \"apps\",\nVersion: \"v1beta1\",\n},\n&appsv1beta1.Deployment{},\n\
  )\n}\n```\n\n建议在程序执行的最开始就初始化`Scheme`结构体并添加已知类型——例如，使用`init`函数。\n\n### 映射\n\n初始化之后，你可以使用结构体上的各种方法来映射`Group-Version-Kind`和\
  \ Go 类型：\n\n- `KnownTypes(gv schema.GroupVersion) map[string]reflect.Type` —— 获取为特定`Group-Version`注册的所有\
  \ Go 类型。例如，对于`apps/v1`：\n\n- `VersionsForGroupKind(gk schema.GroupKind) []schema.GroupVersion`\
  \ —— 获取为特定`Kind`注册的所有`Group-Version`。例如，对于`Deployment`：\n\n```go\ntypes := Scheme.KnownTypes(schema.GroupVersion{\n\
  Group:   \"apps\",\nVersion: \"v1\",\n})\n// -> [\"Deployment\": appsv1.Deployment]\n\
  ```\n\n- `ObjectKinds(obj Object) ([]schema.GroupVersionKind, bool, error)` —— 获取给定对象的所有可能的`Group-Version-Kind`。例如，对于一个`appsv1.Deployment`：\n\
  \n```go\ngroupVersions := Scheme.VersionsForGroupKind(\nschema.GroupKind{\nGroup:\
  \ \"apps\",\nKind:  \"Deployment\",\n})\n// -> [\"apps/v1\" \"apps/v1beta1\"]\n\
  ```\n\n- `New(kind schema.GroupVersionKind) (Object, error)` —— 根据给定的`Group-Version-Kind`构建一个对象：\n\
  \n```go\ngvks, notVersioned, err := Scheme.ObjectKinds(&appsv1.Deployment{})\n//\
  \ -> [\"apps/v1 Deployment\"]\n```\n\n- 该方法返回一个`runtime.Object`类型的值，该类型是所有 API 对象实现的接口。值的具体类型将是映射该`Group-Version-Kind`的对象——此处为`appsv1.Deployment`。\n\
  \n```go\nobj, err := Scheme.New(schema.GroupVersionKind{\nGroup:   \"apps\",\nVersion:\
  \ \"v1\",\nKind:    \"Deployment\",\n})\n```\n\n### 转换\n\n`Scheme`结构体按`Group-Version`注册`Kind`。通过向`Scheme`提供同一\
  \ Group 下不同 Version 的`Kind`之间的转换函数，就可以在同一个 Group 的任何`Kind`之间进行转换。\n\n可以定义两种层次的转换函数：*转换函数*和*生成的转换函数*。转换函数是手动编写的函数，而生成的转换函数是使用`conversion-gen`工具生成的。\n\
  \n在两版本之间进行转换时，如果存在手动编写的转换函数，它将优先于生成的转换函数。\n\n#### 添加转换函数\n\n以下两个方法用于添加`a`和`b`之间的转换函数，`a`和`b`是属于同一\
  \ Group 的两个对象类型。\n\n```go\nAddConversionFunc(\na, b interface{},\nfn conversion.ConversionFunc,\n\
  ) error\nAddGeneratedConversionFunc(\na, b interface{},\nfn conversion.ConversionFunc,\n\
  ) error\n```\n\n`a`和`b`的值必须是指向结构体的指针，可以是空指针。转换函数的签名定义如下：\n\n```go\ntype ConversionFunc\
  \ func(\na, b interface{},\nscope Scope,\n) error\n```\n\n以下是一个示例，演示如何在`apps/v1`和`apps/v1beta1`的`Deployment`之间添加转换函数：\n\
  \n```go\nScheme.AddConversionFunc(\n(*appsv1.Deployment)(nil),\n(*appsv1beta1.Deployment)(nil),\n\
  func(a, b interface{}, scope conversion.Scope) error{\nv1deploy := a.(*appsv1.Deployment)\n\
  v1beta1deploy := b.(*appsv1beta1.Deployment)\n// 在此处进行转换\nreturn nil\n})\n```\n\n\
  关于向 Scheme 注册已知类型，建议也是在程序执行的最开始注册转换函数——例如，使用`init`函数。\n\n#### 执行转换\n\n一旦注册了转换函数，就可以使用`Convert`函数在同一`Kind`的两个版本之间进行转换。\n\
  \n```go\nConvert(in, out interface{}, context interface{}) error\n```\n\n以下示例定义了一个`v1.Deployment`，然后将其转换为`v1beta1`版本：\n\
  \n```go\nv1deployment := appsv1.Deployment{\n[...]\n}\nv1deployment.SetName(\"myname\"\
  )\nvar v1beta1Deployment appsv1beta1.Deployment\nscheme.Convert(&v1deployment, &v1beta1Deployment,\
  \ nil)\n```\n\n### 序列化\n\nAPI Machinery 库的包提供了多种格式的序列化器：JSON、YAML 和 Protobuf。这些序列化器实现了`Serializer`接口，该接口嵌入了`Encoder`和`Decoder`接口。首先，你将看到如何实例化不同格式的序列化器，然后是如何使用它们来编码和解码\
  \ API 对象。\n\n#### JSON 和 YAML 序列化器\n\n`json`包提供了用于 JSON 和 YAML 格式的序列化器。\n\n```go\n\
  import (\n\"k8s.io/apimachinery/pkg/runtime/serializer/json\"\n)\n```\n\n`NewSerializerWithOptions`函数用于创建一个新的序列化器。\n\
  \n```go\nNewSerializerWithOptions(\nmeta      MetaFactory,\ncreater   runtime.ObjectCreater,\n\
  typer     runtime.ObjectTyper,\noptions   SerializerOptions,\n) *Serializer\n```\n\
  \n通过`options`，可以选择使用 JSON 还是 YAML 序列化器（`Yaml`字段）、选择 JSON 输出的可读格式（`Pretty`字段）以及检查\
  \ JSON 和 YAML 中的重复字段（`Strict`字段）。\n\n```go\ntype SerializerOptions struct {\nYaml\
  \     bool\nPretty   bool\nStrict   bool\n}\n```\n\n`Scheme`可以用作`creator`和`typer`，因为它实现了这两个接口。`SimpleMetaFactory`结构体可以用作`meta`。\n\
  \n```go\nserializer := jsonserializer.NewSerializerWithOptions(\njsonserializer.SimpleMetaFactory{},\n\
  Scheme,\nScheme,\njsonserializer.SerializerOptions{\nYaml: false, // 或 true 表示 YAML\
  \ 序列化器\nPretty: true, // 或 false 表示单行 JSON\nStrict: false, // 或 true 检查重复字段\n},\n\
  )\n```\n\n#### Protobuf 序列化器\n\n`protobuf`包提供了用于 Protobuf 格式的序列化器。\n\n```go\nimport\
  \ (\n\"k8s.io/apimachinery/pkg/runtime/serializer/protobuf\"\n)\n```\n\n`NewSerializer`函数用于创建一个新的序列化器。\n\
  \n```go\nNewSerializer(\ncreater     runtime.ObjectCreater,\ntyper     runtime.ObjectTyper,\n\
  ) *Serializer\n```\n\n`Scheme`可以用作`creator`和`typer`，因为它实现了这两个接口。\n\n```go\nserializer\
  \ := protobuf.NewSerializer(Scheme, Scheme)\n```\n\n\n\n### 编码与解码\n\n各种序列化器实现了`Serializer`接口，该接口嵌入了`Decoder`和`Encoder`接口，并定义了`Encode`和`Decode`方法。\n\
  \n- `Encode(obj Object, w io.Writer) error` – `Encode`函数接收一个 API 对象作为参数，对该对象进行编码，并使用写入器输出结果。\n\
  - `Decode(data []byte, defaults *schema.GroupVersionKind, into Object) (Object,\
  \ *schema.GroupVersionKind, error)` – 此函数接收一个字节数组作为参数，并尝试解码其内容。如需解码的内容未指定`apiVersion`和`Kind`，则将使用默认的`GroupVersionKind`\
  \ (GVK)。\n- 如果`into`对象不为空，且其具体类型与内容 GVK（无论是初始的，还是`defaults`中的）匹配，则结果将被放入该`into`对象。无论如何，结果都将作为`Object`返回，应用于它的\
  \ GVK 将作为`GroupVersionKind`结构返回。\n\n```go\nfunc Decode(\n    data []byte,\n    defaults\
  \ *schema.GroupVersionKind,\n    into Object,\n) (\n    Object,\n    *schema.GroupVersionKind,\n\
  \    error,\n)\n```\n\n## RESTMapper\n\nAPI Machinery 提供了`RESTMapper`的概念，用于映射 REST\
  \ 资源和`Kind`之间的关系。\n\n```go\nimport (\n    \"k8s.io/apimachinery/pkg/api/meta\"\n\
  )\n```\n\n`RESTMapping`类型提供了使用`RESTMapper`进行映射的结果：\n\n```go\ntype RESTMapping struct\
  \ {\n    Resource            schema.GroupVersionResource\n    GroupVersionKind \
  \   schema.GroupVersionKind\n    Scope               RESTScope\n}\n```\n\n如第 1 章所述，GVR（Group-Version-Resource，或简称为`Resource`）用于构建发送请求的路径。例如，要获取所有命名空间中的部署列表，你将使用路径`/apis/apps/v1/deployments`，其中`apps`是\
  \ Group，`v1`是 Version，`deployments`是（复数形式的）`Resource`名称。因此，由 API 管理的资源可以通过其 GVR\
  \ 唯一标识。\n\n在向此路径发起请求时，通常需要交换数据，无论是创建或更新资源的请求，还是获取或列出资源的响应。这种交换数据的格式称为与该资源关联的`Kind`（或`GroupVersionKind`）。\n\
  \n`RESTMapping`结构将`Resource`及其关联的`GroupVersionKind`联系起来。API Machinery 提供了`RESTMapper`接口，以及一个默认实现`DefaultRESTMapper`。\n\
  \n```go\ntype RESTMapper interface {\n    RESTMapping(gk schema.GroupKind, versions\
  \ ...string) (*RESTMapping, error)\n    RESTMappings(gk schema.GroupKind, versions\
  \ ...string) ([]*RESTMapping, error)\n    KindFor(resource schema.GroupVersionResource)\
  \ (schema.GroupVersionKind, error)\n    KindsFor(resource schema.GroupVersionResource)\
  \ ([]schema.GroupVersionKind, error)\n    ResourceFor(input schema.GroupVersionResource)\
  \ (schema.GroupVersionResource, error)\n    ResourcesFor(input schema.GroupVersionResource)\
  \ ([]schema.GroupVersionResource, error)\n    ResourceSingularizer(resource string)\
  \ (singular string, err error)\n}\n```\n\n### Kind 到 Resource 的映射\n\n`RESTMapping`和`RESTMappings`方法根据给定的`Group`和`Kind`，返回一个`RESTMapping`结构元素或数组。一个可选的版本列表用于指示首选版本。\n\
  \n`RESTMappings`方法返回所有匹配项，`RESTMapping`方法返回单个匹配项，如有多个匹配项则返回错误。返回的`RESTMapping`元素将包含完整的`Kind`（包括版本）和完整的`Resource`。\n\
  \n总而言之，这些方法用于将`Kind`映射到`Resource`。\n\n### Resource 到 Kind 的映射\n\n`KindFor`和`KindsFor`方法根据一个*部分*的\
  \ Group-Version-Resource，返回一个`GroupVersionKind`元素或数组。部分意味着你可以省略 group、version，或两者都省略。资源名称可以是资源的单数或复数形式。\n\
  \n`KindsFor`方法返回所有匹配项，`KindFor`方法返回单个匹配项，如有多个匹配项则返回错误。\n\n总而言之，这些方法用于将`Resource`映射到`Kind`。\n\
  \n### 查找资源\n\n`ResourceFor`和`ResourcesFor`方法根据一个*部分*的 Group-Version-Resource，返回一个`GroupVersionResource`元素或数组。部分意味着你可以省略\
  \ group、version，或两者都省略。资源名称可以是资源的单数或复数形式。\n\n`ResourcesFor`方法返回所有匹配项，`ResourceFor`方法返回单个匹配项，如有多个匹配项则返回错误。\n\
  \n总而言之，这些方法用于根据单数或复数资源名称查找完整的资源。\n\n### DefaultRESTMapper 实现\n\nAPI Machinery 提供了一个`RESTMapper`的默认实现。\n\
  \n- `NewDefaultRESTMapper(defaultGroupVersions []schema.GroupVersion) *DefaultRESTMapper`\
  \ – 此工厂方法用于构建一个新的`DefaultRESTMapper`，它接受一个默认 Group-Version 列表，当提供的 GVR 不完整时，将使用该列表查找\
  \ Resource 或 Kind。\n- `Add(kind schema.GroupVersionKind, scope RESTScope)` – 此方法用于添加`Kind`和`Resource`之间的映射。资源名称将根据\
  \ Kind 通过获取小写单词并使其复数化来推断（对于以“s”结尾的单词添加“es”，对于以“y”结尾的单词将末尾“y”替换为“ies”，对于其他单词添加“s”）。\n\
  - `AddSpecific(kind schema.GroupVersionKind, plural, singular schema.GroupVersionResource,\
  \ scope RESTScope)` – 此方法用于通过显式指定单数和复数名称来添加`Kind`和`Resource`之间的映射。\n\n创建`DefaultRESTMapper`实例后，你可以通过调用同名接口中定义的方法，将其用作`RESTMapper`。\n\
  \n## 总结\n\n本章探讨了 API Machinery，介绍了用于在 Go 语言和 JSON 或 YAML 之间序列化资源，以及在多个版本之间转换资源的`Scheme`抽象。本章还涵盖了`RESTMapper`接口，以帮助在资源和种类之间进行映射。\n\
  \n下一章将介绍 Client-go 库，这是一个高级库，开发者可以用它来调用 Kubernetes API，而无需处理 HTTP 调用。\n\n\n\n"
- "# 6. `Client-go` 库\n\n前几章探讨了 *Kubernetes API 库*（一组用于操作 Kubernetes API 对象的 Go 结构体）和\
  \ *API Machinery 库*（提供了用于处理遵循 Kubernetes API 对象约定的 API 对象的工具）。具体来说，你已经看到 API Machinery\
  \ 提供了 `Scheme` 和 `RESTMapper` 抽象。\n\n本章将探讨 `Client-go` 库，它是一个高级库，开发人员可以使用它通过 Go\
  \ 语言与 Kubernetes API 进行交互。`Client-go` 库汇集了 Kubernetes API 和 API Machinery 库，提供了一个预配置了\
  \ Kubernetes API 对象的 `Scheme` 和一个用于 Kubernetes API 的 `RESTMapper` 实现。它还提供了一组客户端，用于以简单的方式对\
  \ Kubernetes API 的资源执行操作。\n\n要使用此库，你需要从其中导入以 `k8s.io/client-go` 为前缀的包。例如，要使用 `kubernetes`\
  \ 包，请使用以下代码：\n\n```go\nimport (\n\"k8s.io/client-go/kubernetes\"\n)\n```\n\n你还需要下载一个版本的\
  \ `Client-go` 库。为此，你可以使用 `go get` 命令来获取你想要使用的版本：\n\n```bash\n$ go get k8s.io/client-go@v0.24.4\n\
  ```\n\n`Client-go` 库的版本与 Kubernetes 的版本保持一致——版本 0.24.4 对应于服务器的版本 1.24.4。\n\nKubernetes\
  \ 是向后兼容的，因此你可以将旧版本的 `Client-go` 与新版本的集群一起使用，但你很可能希望获取一个新版本，以便能够使用当前的功能，因为只有错误修复会被移植到以前的\
  \ client-go 版本中，新功能则不会。\n\n## 连接到集群\n\n在连接到 Kubernetes API 服务器之前，第一步是要拥有连接所需的配置——即服务器的地址、其凭据、连接参数等。\n\
  \n`rest` 包提供了一个 `rest.Config` 结构体，其中包含了应用程序连接到 *REST* API 服务器所需的所有配置信息。\n\n### 集群内配置\n\
  \n默认情况下，运行在 Kubernetes Pod 上的容器包含了连接到 API 服务器所需的所有信息：\n\n-   Pod 使用的 `ServiceAccount`\
  \ 提供的*令牌*和*根证书*位于此目录中：`/var/run/secrets/kubernetes.io/serviceaccount/`。\n-   注意，可以通过在\
  \ Pod 使用的 `ServiceAccount` 中设置 `automountServiceAccountToken: false`，或直接在 Pod 的规格说明中设置，来禁用此行为。\n\
  -   `kubelet` 在容器环境中定义的环境变量 `KUBERNETES_SERVICE_HOST` 和 `KUBERNETES_SERVICE_PORT`，指定了联系\
  \ API 服务器的主机和端口。\n\n当应用程序专门设计为在 Pod 的容器内运行时，你可以利用上述信息，使用以下函数来创建一个合适的 `rest.Config`\
  \ 结构体：\n\n```go\nimport \"k8s.io/client-go/rest\"\nfunc InClusterConfig() (*Config,\
  \ error)\n```\n\n### 集群外配置\n\nKubernetes 工具通常依赖于 `kubeconfig` 文件——即包含一个或多个 Kubernetes\
  \ 集群的连接配置的文件。\n\n你可以通过使用 `clientcmd` 包中的以下函数之一，基于此 `kubeconfig` 文件的内容来构建一个 `rest.Config`\
  \ 结构体。\n\n#### 从内存中的 Kubeconfig 文件构建\n\n`RESTConfigFromKubeConfig` 函数可用于从 `kubeconfig`\
  \ 文件的内容（作为字节数组）构建一个 `rest.Config` 结构体。\n\n```go\nfunc RESTConfigFromKubeConfig(\n\
  configBytes []byte,\n) (*rest.Config, error)\n```\n\n如果 `kubeconfig` 文件包含多个*上下文*，则会使用当前上下文，而忽略其他上下文。例如，你可以先读取\
  \ `kubeconfig` 文件的内容，然后使用以下函数：\n\n```go\nimport \"k8s.io/client-go/tools/clientcmd\"\
  \nconfigBytes, err := os.ReadFile(\n\"/home/user/.kube/config\",\n)\nif err != nil\
  \ {\nreturn err\n}\nconfig, err := clientcmd.RESTConfigFromKubeConfig(\nconfigBytes,\n\
  )\nif err != nil {\nreturn err\n}\n```\n\n#### 从磁盘上的 Kubeconfig 文件构建\n\n`BuildConfigFromFlags`\
  \ 函数可用于从 API 服务器的 URL、基于 `kubeconfig` 文件的路径（两者皆可）来构建一个 `rest.Config` 结构体。\n\n```go\n\
  func BuildConfigFromFlags(\nmasterUrl,\nkubeconfigPath string,\n) (*rest.Config,\
  \ error)\n```\n\n以下代码允许你获取一个 `rest.Config` 结构体：\n\n```go\nimport \"k8s.io/client-go/tools/clientcmd\"\
  \nconfig, err := clientcmd.BuildConfigFromFlags(\n\"\",\n\"/home/user/.kube/config\"\
  ,\n)\n```\n\n以下代码从 `kubeconfig` 获取配置，并覆盖 API 服务器的 URL：\n\n```go\nconfig, err :=\
  \ clientcmd.BuildConfigFromFlags(\n\"https://192.168.1.10:6443\",\n\"/home/user/.kube/config\"\
  ,\n)\n```\n\n#### 从个性化的 Kubeconfig 文件构建\n\n前面的函数在内部使用了一个 `api.Config` 结构体，该结构体表示\
  \ `kubeconfig` 文件中的数据（不要与包含 *REST* HTTP 连接参数的 `rest.Config` 结构体混淆）。\n\n如果你需要操作这个中间数据，可以使用\
  \ `BuildConfigFromKubeconfigGetter` 函数，它接受一个 `kubeconfigGetter` 函数作为参数，该函数本身会返回一个\
  \ `api.Config` 结构体。\n\n```go\nBuildConfigFromKubeconfigGetter(\nmasterUrl string,\n\
  kubeconfigGetter KubeconfigGetter,\n) (*rest.Config, error)\ntype KubeconfigGetter\n\
  func() (*api.Config, error)\n```\n\n例如，以下代码将从 `kubeconfigGetter` 函数中使用 `clientcmd.Load`\
  \ 或 `clientcmd.LoadFromFile` 函数来加载 `kubeconfig` 文件：\n\n```go\nimport (\n\"k8s.io/client-go/tools/clientcmd\"\
  \n\"k8s.io/client-go/tools/clientcmd/api\"\n)\nconfig, err :=\nclientcmd.BuildConfigFromKubeconfigGetter(\n\
  \"\",\nfunc() (*api.Config, error) {\napiConfig, err := clientcmd.LoadFromFile(\n\
  \"/home/user/.kube/config\",\n)\nif err != nil {\nreturn nil, nil\n}\n// TODO: 操作\
  \ apiConfig\nreturn apiConfig, nil\n},\n)\n```\n\n#### 从多个 Kubeconfig 文件构建\n\n`kubectl`\
  \ 工具默认使用 `$HOME/.kube/config kubeconfig` 文件，并且你可以使用 `KUBECONFIG` 环境变量指定另一个 `kubeconfig`\
  \ 文件的路径。\n\n不仅如此，你可以在此环境变量中指定一个 `kubeconfig` 文件路径列表，这些 `kubeconfig` 文件将在使用前被*合并*为一个。你可以通过以下函数获得相同的行为：`NewNonInteractiveDeferredLoadingClientConfig`。\n\
  \n```go\nfunc NewNonInteractiveDeferredLoadingClientConfig(\nloader ClientConfigLoader,\n\
  overrides *ConfigOverrides,\n) ClientConfig\n```\n\n`clientcmd.ClientConfigLoadingRules`\
  \ 类型实现了 `ClientConfigLoader` 接口，你可以使用以下函数获取此类型的值：\n\n```go\nfunc NewDefaultClientConfigLoadingRules()\n\
  *ClientConfigLoadingRules\n```\n\n如果存在 `KUBECONFIG` 环境变量，此函数将获取其值以获取要合并的 `kubeconfig`\
  \ 文件列表，否则将回退使用位于 `$HOME/.kube/config` 的默认 `kubeconfig` 文件。\n\n使用以下代码创建 `rest.Config`\
  \ 结构体，你的程序将具有与之前描述的 `kubectl` 相同的行为：\n\n```go\nimport (\n\"k8s.io/client-go/tools/clientcmd\"\
  \n)\nconfig, err :=\nclientcmd.NewNonInteractiveDeferredLoadingClientConfig(\nclientcmd.NewDefaultClientConfigLoadingRules(),\n\
  nil,\n).ClientConfig()\n```\n\n\n\n#### 使用 CLI 标志覆盖 kubeconfig\n\n如前所述，此函数的第二个参数\
  \ `NewNonInteractiveDeferredLoadingClientConfig` 是一个 `ConfigOverrides` 结构体。该结构体包含一些值，用于覆盖合并\
  \ `kubeconfig` 文件后结果中的某些字段。\n\n你可以自行设置此结构体中的特定值，或者，如果你正在使用 `spf13/pflag` 库（即 [github.com/spf13/pflag](http://github.com/spf13/pflag)）创建一个\
  \ CLI，则可以使用以下代码自动为你的 CLI 声明默认标志，并将它们绑定到 `ConfigOverrides` 结构体：\n\n```go\nimport\
  \ (\n\"github.com/spf13/pflag\"\n\"k8s.io/client-go/tools/clientcmd\"\n)\nvar (\n\
  flags pflag.FlagSet\noverrides clientcmd.ConfigOverrides\nof = clientcmd.RecommendedConfigOverrideFlags(\"\
  \")\n)\nclientcmd.BindOverrideFlags(&overrides, &flags, of)\nflags.Parse(os.Args[1:])\n\
  config, err :=\nclientcmd.NewNonInteractiveDeferredLoadingClientConfig(\nclientcmd.NewDefaultClientConfigLoadingRules(),\n\
  &overrides,\n).ClientConfig()\n```\n\n请注意，在调用 `RecommendedConfigOverrideFlags` 函数时，你可以为添加的标志声明一个前缀。\n\
  \n## 获取 Clientset\n\nKubernetes 包提供了创建 `kubernetes.Clientset` 类型 clientset 的函数。\n\
  \n-   `func NewForConfig(c *rest.Config) (*Clientset, error)` – `NewForConfig` 函数使用由前面章节所述方法之一构建的\
  \ `rest.Config`，返回一个 `Clientset`。\n\n-   `func NewForConfigOrDie(c *rest.Config)\
  \ *Clientset` – 此函数与上一个类似，但在出错时会触发 panic，而不是返回错误。此函数可用于硬编码配置，对于这些配置，你希望断言其有效性。\n\
  \n-   `NewForConfigAndClient` 函数使用提供的 `rest.Config` 和提供的 `http.Client` 返回一个 `Clientset`。\n\
  \n-   之前的函数 `NewForConfig` 使用通过 `rest.HTTPClientFor` 函数构建的默认 HTTP 客户端。如果你想在构建 `Clientset`\
  \ 之前个性化 HTTP 客户端，可以使用此函数。\n\n```go\nNewForConfigAndClient(\nc *rest.Config,\nhttpClient\
  \ *http.Client,\n) (*Clientset, error)\n```\n\n## 使用 Clientset\n\n`kubernetes.Clientset`\
  \ 类型实现了 `kubernetes.Interface` 接口，定义如下：\n\n```go\ntype Interface interface {\nDiscovery()\
  \ discovery.DiscoveryInterface\n[...]\nAppsV1()          appsv1.AppsV1Interface\n\
  AppsV1beta1()     appsv1beta1.AppsV1beta1Interface\nAppsV1beta2()     appsv1beta2.AppsV1beta2Interface\n\
  [...]\nCoreV1()           corev1.CoreV1Interface\n[...]\n}\n```\n\n第一个方法 `Discovery()`\
  \ 提供了一个接口，该接口提供了一些方法，用于发现集群中可用的组、版本和资源，以及资源的首选版本。此接口还提供对服务器版本以及 OpenAPI v2 和 v3\
  \ 定义的访问。这在 Discovery 客户端部分有详细说明。\n\n除了 `Discovery()` 方法之外，`kubernetes.Interface`\
  \ 由一系列方法组成，每个方法对应 Kubernetes API 定义的一个组/版本。当你看到此接口的定义时，可以理解 `Clientset` 是一组客户端，每个客户端专用于其自身的组/版本。\n\
  \n每个方法返回一个值，该值实现特定于该组/版本的接口。例如，`kubernetes.Interface` 的 `CoreV1()` 方法返回一个值，该值实现了\
  \ `corev1.CoreV1Interface` 接口，定义如下：\n\n```go\ntype CoreV1Interface interface {\n\
  RESTClient() rest.Interface\nComponentStatusesGetter\nConfigMapsGetter\nEndpointsGetter\n\
  [...]\n}\n```\n\n此 `CoreV1Interface` 接口中的第一个方法是 `RESTClient() rest.Interface`，用于获取特定组/版本的\
  \ `REST` 客户端。此底层客户端将由组/版本客户端内部使用，你可以使用此 `REST` 客户端来构建此接口的其它方法 `CoreV1Interface`\
  \ 未原生提供的请求。\n\n由 `REST` 客户端实现的 `rest.Interface` 接口定义如下：\n\n```go\ntype Interface\
  \ interface {\nGetRateLimiter()            flowcontrol.RateLimiter\nVerb(verb string)\
  \           *Request\nPost()                      *Request\nPut()              \
  \         *Request\nPatch(pt types.PatchType)   *Request\nGet()                \
  \       *Request\nDelete()                    *Request\nAPIVersion()           \
  \     schema.GroupVersion\n}\n```\n\n如你所见，此接口提供了一系列方法——`Verb`、`Post`、`Put`、`Patch`、`Get`\
  \ 和 `Delete`——它们返回一个带有特定 HTTP 动词的 `Request` 对象。这在“如何使用这些 `Request` 对象完成操作”部分有进一步说明。\n\
  \n`CoreV1Interface` 中的其他方法用于获取组/版本中每个资源的特定方法。例如，嵌入的 `ConfigMapsGetter` 接口定义如下：\n\
  \n```go\ntype ConfigMapsGetter interface {\nConfigMaps(namespace string) ConfigMapInterface\n\
  }\n```\n\n然后，`ConfigMapInterface` 接口由 `ConfigMaps` 方法返回，定义如下：\n\n```go\ntype ConfigMapInterface\
  \ interface {\nCreate(\nctx context.Context,\nconfigMap *v1.ConfigMap,\nopts metav1.CreateOptions,\n\
  ) (*v1.ConfigMap, error)\nUpdate(\nctx context.Context,\nconfigMap *v1.ConfigMap,\n\
  opts metav1.UpdateOptions,\n) (*v1.ConfigMap, error)\nDelete(\nctx context.Context,\n\
  name string,\nopts metav1.DeleteOptions,\n) error\n[...]\n}\n```\n\n你可以看到，此接口提供了一系列方法，每个方法对应一个\
  \ *Kubernetes API 动词*。\n\n每个与操作相关的方法都将一个 Option 结构体作为参数，该结构体以操作名称命名：`CreateOptions`、`UpdateOptions`、`DeleteOptions`\
  \ 等。这些结构体及相关常量定义在包 `k8s.io/apimachinery/pkg/apis/meta/v1` 中。\n\n最后，要对组-版本的资源执行操作，你可以按照以下模式进行链式调用（适用于命名空间资源），其中\
  \ `namespace` 可以是空字符串以表示集群范围的操作：\n\n```go\nclientset.\nGroupVersion().\nNamespacedResource(namespace).\n\
  Operation(ctx, options)\n```\n\n而对于非命名空间资源，模式如下：\n\n```go\nclientset.\nGroupVersion().\n\
  NonNamespacedResource().\nOperation(ctx, options)\n```\n\n例如，使用以下代码*列出*命名空间 `project1`\
  \ 中 *core/v1* 组/版本的 *Pods*：\n\n```go\npodList, err := clientset.\nCoreV1().\nPods(\"\
  project1\").\nList(ctx, metav1.ListOptions{})\n```\n\n要获取*所有*命名空间中的 *pods* *列表*，你需要指定一个空的命名空间名称：\n\
  \n```go\npodList, err := clientset.\nCoreV1().\nPods(\"\").\nList(ctx, metav1.ListOptions{})\n\
  ```\n\n要获取节点列表（节点是非命名空间资源），请使用以下代码：\n\n```go\nnodesList, err := clientset.\nCoreV1().\n\
  Nodes().\nList(ctx, metav1.ListOptions{})\n```\n\n以下部分将使用 *Pod* 资源详细描述各种操作。在处理非命名空间资源时，你可以应用相同的示例，只需移除命名空间参数即可。\n\
  \n## 检查请求\n\n如果你想知道调用 client-go 方法时执行了哪些 HTTP 请求，可以为你的程序启用日志记录。Client-go 库使用 `klog`\
  \ 库（[`github.com/kubernetes/klog`](https://github.com/kubernetes/klog)），你可以使用以下代码为你的命令启用日志标志：\n\
  \n```go\nimport (\n\"flag\"\n\"k8s.io/klog/v2\"\n)\nfunc main() {\nklog.InitFlags(nil)\n\
  flag.Parse()\n[...]\n}\n```\n\n现在，你可以使用 `-v <level>` 标志运行你的程序——例如，`-v 6` 获取每个请求所调用的\
  \ URL。关于定义的日志级别的更多细节，请参见表 2-1。\n\n\n\n## 创建资源\n\n要在集群中创建一个新资源，首先需要使用专用的 `Kind` 结构在内存中声明该资源，然后使用对应资源的\
  \ `Create` 方法。例如，使用以下代码在 `project1` 命名空间中创建一个名为 `nginx-pod` 的 `Pod`：\n\n```\nwantedPod\
  \ := corev1.Pod{\nSpec: corev1.PodSpec{\nContainers: []corev1.Container{\n{\nName:\
  \  \"nginx\",\nImage: \"nginx\",\n},\n},\n},\n}\nwantedPod.SetName(\"nginx-pod\"\
  )\ncreatedPod, err := clientset.\nCoreV1().\nPods(\"project1\").\nCreate(ctx, &wantedPod,\
  \ v1.CreateOptions{})\n```\n\n声明 `CreateOptions` 结构时，用于创建资源的各种选项如下：\n\n*   `DryRun`\
  \ – 指示应在 API 服务器端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n*   使用此选项，你可以通过命令获取本应在集群中创建的确切对象（而无需真正创建它），并检查在此创建过程中是否会发生错误。\n\
  *   `FieldManager` – 指示此操作字段管理器的名称。此信息将用于后续的服务器端 Apply 操作。\n*   `FieldValidation`\
  \ – 指示当结构中存在重复或未知字段时，服务器应如何响应。以下是可能的值：\n    *   `metav1.FieldValidationIgnore` 忽略所有重复或未知字段\n\
  \    *   `metav1.FieldValidationWarn` 当存在重复或未知字段时发出警告\n    *   `metav1.FieldValidationStrict`\
  \ 当存在重复或未知字段时操作失败\n*   请注意，使用此方法将无法定义重复或未知字段，因为你正在使用结构来定义对象。\n\n如果发生错误，你可以使用 `k8s.io/apimachinery/pkg/api/errors`\
  \ 包中定义的函数来测试其类型。所有可能的错误在“错误与状态”部分有定义，以下是 `Create` 操作特有的可能错误：\n\n*   `IsAlreadyExists`\
  \ – 此函数指示请求是否因为集群中已存在同名资源而失败\n*   `IsNotFound` – 此函数指示你请求中指定的命名空间是否不存在\n*   `IsInvalid`\
  \ – 此函数指示传入结构的数据是否无效\n\n```\nif errors.IsAlreadyExists(err) {\n// ...\n}\n```\n\n\
  ### 获取资源信息\n\n要获取集群中特定资源的信息，可以使用要获取信息资源的 `Get` 方法。例如，要获取 `project1` 命名空间中名为 `nginx-pod`\
  \ 的 `pod` 的信息：\n\n```\npod, err := clientset.\nCoreV1().\nPods(\"project1\").\n\
  Get(ctx, \"nginx-pod\", metav1.GetOptions{})\n```\n\n在获取资源信息时，用于声明 `GetOptions`\
  \ 结构的各种选项如下：\n\n*   `ResourceVersion` – 请求一个不早于指定版本的资源版本。\n*   如果 `ResourceVersion`\
  \ 为 “0”，表示返回资源的任何版本。通常你会收到资源的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n*   如果未设置该选项，则保证你会收到资源的最新版本。\n\
  \n`Get` 操作特有的可能错误是：\n\n*   `IsNotFound` – 此函数指示你请求中指定的命名空间不存在，或者具有指定名称的资源不存在。\n\n\
  ## 获取资源列表\n\n要获取集群中的资源列表，可以使用要列出资源的 `List` 方法。例如，使用以下代码列出 `project1` 命名空间中的 Pod：\n\
  \n```\npodList, err := clientset.\nCoreV1().\nPods(\"project1\").\nList(ctx, metav1.ListOptions{})\n\
  ```\n\n或者，要获取所有命名空间中的 Pod 列表，使用：\n\n```\npodList, err := clientset.\nCoreV1().\n\
  Pods(\"\").\nList(ctx, metav1.ListOptions{})\n```\n\n在列出资源时，用于声明 `ListOptions` 结构的各种选项如下：\n\
  \n*   `LabelSelector, FieldSelector` – 用于按标签或字段过滤列表。这些选项在“过滤列表结果”部分有详细说明。\n*   `Watch,\
  \ AllowWatchBookmarks` – 用于运行 Watch 操作。这些选项在“监视资源”部分有详细说明。\n*   `ResourceVersion,\
  \ ResourceVersionMatch` – 指示你想要获取的资源列表的版本。\n*   请注意，当收到 `List` 操作的响应时，列表元素本身会指示一个\
  \ `ResourceVersion` 值，列表中的每个元素也都有各自的 `ResourceVersion` 值。在选项中指定的 `ResourceVersion`\
  \ 指的是列表的 `ResourceVersion`。\n*   对于不带分页的 `List` 操作（有关其他情况下这些选项的行为，请参考“分页结果”和“监视资源”部分）：\n\
  \    *   当未设置 `ResourceVersionMatch` 时，行为与 `Get` 操作相同：\n        *   `ResourceVersion`\
  \ 表示应返回一个不早于指定版本的列表。\n        *   如果 `ResourceVersion` 为 “0”，则表示需要返回列表的任何版本。通常你会收到列表的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n\
  \        *   如果未设置该选项，则保证你会收到列表的最新版本。\n    *   当 `ResourceVersionMatch` 设置为 `metav1.ResourceVersionMatchExact`\
  \ 时，`ResourceVersion` 值指示你想要获取的列表的确切版本。\n        *   将 `ResourceVersion` 设置为 “0”\
  \ 或未定义它是无效的。\n    *   当 `ResourceVersionMatch` 设置为 `metav1.ResourceVersionMatchNotOlderThan`\
  \ 时，`ResourceVersion` 指示你将获得一个不早于指定版本的列表。\n        *   如果 `ResourceVersion` 为 “0”，则表示返回列表的任何版本。通常你会收到列表的最新版本，但这并不保证；由于分区或缓存过期，在*高可用*集群上可能会收到较旧的版本。\n\
  \        *   未定义 `ResourceVersion` 是无效的。\n*   `TimeoutSeconds` – 将请求的持续时间限制为指定的秒数。\n\
  *   `Limit, Continue` – 用于对列表结果进行分页。这些选项在第 2 章的“分页结果”部分有详细说明。\n\n以下是 `List` 操作特有的可能错误：\n\
  \n*   `IsResourceExpired` – 此函数指示指定的 `ResourceVersion` 和设置为 `metav1.ResourceVersionMatchExact`\
  \ 的 `ResourceVersionMatch` 已过期。\n\n请注意，如果你为 `List` 操作指定了一个不存在的命名空间，你将不会收到 `NotFound`\
  \ 错误。\n\n## 过滤列表结果\n\n如第 2 章的“过滤列表结果”部分所述，可以使用标签选择器和字段选择器来过滤 `List` 操作的结果。本节展示如何使用\
  \ API Machinery 库中的 `fields` 和 `labels` 包来创建一个适用于 `LabelSelector` 和 `FieldSelector`\
  \ 选项的字符串。\n\n\n\n### 使用 Labels 包设置 LabelSelector\n\n以下是使用 API Machinery 库中 `labels`\
  \ 包所需的导入信息。\n\n```go\nimport (\n\"k8s.io/apimachinery/pkg/labels\"\n)\n```\n\n该包提供了多种构建和验证\
  \ `LabelsSelector` 字符串的方法：使用 Requirements（需求条件）、解析 `labelSelector` 字符串，或使用一组键值对。\n\
  \n#### 使用 Requirements\n\n首先，你需要使用以下代码创建一个 `labels.Selector` 对象：\n\n```go\nlabelsSelector\
  \ := labels.NewSelector()\n```\n\n然后，你可以使用 `labels.NewRequirement` 函数创建 `Requirement`\
  \ 对象：\n\n```go\nfunc NewRequirement(\nkey string,\nop selection.Operator,\nvals\
  \ []string,\nopts ...field.PathOption,\n) (*Requirement, error)\n```\n\n`op` 可能取值的常量定义在\
  \ `selection` 包中（即 `k8s.io/apimachinery/pkg/selection`）。`vals` 字符串数组中的值数量取决于操作类型：\n\
  \n*   `selection.In` / `selection.NotIn` – 与 `key` 关联的值必须等于 (`In`) / 必须不等于 (`NotIn`)\
  \ `vals` 中定义的某个值。\n*   `vals` 必须非空。\n\n*   `selection.Equals` / `selection.DoubleEquals`\
  \ / `selection.NotEquals` – 与 `key` 关联的值必须等于 (`Equals`, `DoubleEquals`) 或必须不等于 (`NotEquals`)\
  \ `vals` 中定义的值。\n*   `vals` 必须包含一个单一值。\n\n*   `selection.Exists` / `selection.DoesNotExist`\
  \ – `key` 必须已定义 (`Exists`) 或必须未定义 (`DoesNotExist`)。\n*   `vals` 必须为空。\n\n*   `selection.Gt`\
  \ / `selection.Lt` – 与 `key` 关联的值必须大于 (`Gt`) 或小于 (`Lt`) `vals` 中定义的值。\n*   `vals`\
  \ 必须包含一个代表整数的单一值。\n\n例如，要要求键 `mykey` 的值等于 `value1`，你可以用以下方式声明一个 `Requirement`：\n\
  \n```go\nreq1, err := labels.NewRequirement(\n\"mykey\",\nselection.Equals,\n[]string{\"\
  value1\"},\n)\n```\n\n定义好 `Requirement` 之后，你可以使用选择器上的 `Add` 方法将需求条件添加到选择器中：\n\n\
  ```go\nlabelsSelector = labelsSelector.Add(*req1, *req2)\n```\n\n最后，你可以通过以下方式获取要传递给\
  \ `LabelSelector` 选项的 `String`：\n\n```go\ns := labelsSelector.String()\n```\n\n\
  #### 解析 LabelSelector 字符串\n\n如果你已经有了一个描述标签选择器的字符串，你可以使用 `Parse` 函数检查其有效性。`Parse`\
  \ 函数会验证该字符串并返回一个 `LabelSelector` 对象。你可以使用此 `LabelSelector` 对象的 `String` 方法来获取经 `Parse`\
  \ 函数验证过的字符串。\n\n例如，以下代码将解析、验证并返回标签选择器 `\"mykey = value1, count < 5\"` 的规范形式：\n\n\
  ```go\nselector, err := labels.Parse(\n\"mykey = value1, count < 5\",\n)\nif err\
  \ != nil {\nreturn err\n}\ns := selector.String()\n// s = \"mykey=value1,count<5\"\
  \n```\n\n#### 使用一组键值对\n\n当你只想对一个或多个需求条件使用 `Equal` 操作时，可以使用 `ValidatedSelectorFromSet`\
  \ 函数：\n\n```go\nfunc ValidatedSelectorFromSet(\nls Set\n) (Selector, error)\n```\n\
  \n在这种情况下，`Set` 将定义你想要检查相等性的键值对集合。\n\n例如，以下代码将声明一个标签选择器，要求键 `key1` 等于 `value1`，键\
  \ `key2` 等于 `value2`：\n\n```go\nset := labels.Set{\n\"key1\": \"value1\",\n\"key2\"\
  : \"value2\",\n}\nselector, err = labels.ValidatedSelectorFromSet(set)\ns = selector.String()\n\
  // s = \"key1=value1,key2=value2\"\n```\n\n### 使用 Fields 包设置 FieldSelector\n\n以下是使用\
  \ API Machinery 库中 `fields` 包所需的代码。\n\n```go\nimport (\n\"k8s.io/apimachinery/pkg/fields\"\
  \n)\n```\n\n该包提供了多种构建和验证 `FieldSelector` 字符串的方法：组合单项选择器、解析 `fieldSelector` 字符串，或使用一组键值对。\n\
  \n#### 组合单项选择器\n\n你可以使用 `OneTermEqualSelector` 和 `OneTermNotEqualSelector` 函数创建单项选择器，然后使用\
  \ `AndSelectors` 函数组合这些选择器以构建一个完整的字段选择器。\n\n```go\nfunc OneTermEqualSelector(\n\
  k, v string,\n) Selector\nfunc OneTermNotEqualSelector(\nk, v string,\n) Selector\n\
  func AndSelectors(\nselectors ...Selector,\n) Selector\n```\n\n例如，以下代码构建了一个字段选择器，其中包含对字段\
  \ `status.Phase` 的 `Equal` 条件和对字段 `spec.restartPolicy` 的 `NotEqual` 条件：\n\n```go\n\
  fselector = fields.AndSelectors(\nfields.OneTermEqualSelector(\n\"status.Phase\"\
  ,\n\"Running\",\n),\nfields.OneTermNotEqualSelector(\n\"spec.restartPolicy\",\n\"\
  Always\",\n),\n)\nfs = fselector.String()\n```\n\n#### 解析 FieldSelector 字符串\n\n\
  如果你已经有了一个描述字段选择器的字符串，你可以使用 `ParseSelector` 或 `ParseSelectorOrDie` 函数检查其有效性。`ParseSelector`\
  \ 函数会验证该字符串并返回一个 `fields.Selector` 对象。你可以使用此 `fields.Selector` 对象的 `String` 方法来获取经\
  \ `ParseSelector` 函数验证过的字符串。\n\n例如，以下代码将解析、验证并返回字段选择器 `\"status.Phase = Running,\
  \ spec.restartPolicy != Always\"` 的规范形式：\n\n```go\nselector, err := fields.ParseSelector(\n\
  \"status.Phase=Running, spec.restartPolicy!=Always\",\n)\nif err != nil {\nreturn\
  \ err\n}\ns := selector.String()\n// s = \"spec.restartPolicy!=Always,status.Phase=Running\"\
  \n```\n\n#### 使用一组键值对\n\n当你只想对一个或多个单项选择器使用 `Equal` 操作时，可以使用 `SelectorFromSet` 函数。\n\
  \n```go\nfunc SelectorFromSet(ls Set) Selector\n```\n\n在这种情况下，`Set` 将定义你想要检查相等性的键值对集合。\n\
  \n例如，以下代码将声明一个字段选择器，要求键 `key1` 等于 `value1`，键 `key2` 等于 `value2`：\n\n```go\nset :=\
  \ fields.Set{\n\"field1\": \"value1\",\n\"field2\": \"value2\",\n}\nselector = fields.SelectorFromSet(set)\n\
  s = selector.String()\n// s = \"key1=value1,key2=value2\"\n```\n\n\n\n## 删除资源\n\n\
  要从集群中删除资源，可以对要删除的资源使用 `Delete` 方法。例如，要从 `project1` 命名空间中删除名为 `nginx-pod` 的 `Pod`，请使用：\n\
  \n```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx, \"nginx-pod\"\
  , metav1.DeleteOptions{})\n```\n\n请注意，操作终止时并不能保证资源已被删除。`Delete` 操作不会立即删除资源，而是将资源标记为待删除（通过设置\
  \ `.metadata.deletionTimestamp` 字段），删除操作将异步进行。\n\n删除资源时，可在 `DeleteOptions` 结构中声明的不同选项如下：\n\
  \n- `OrphanDependents` – 此字段已弃用，建议使用 `PropagationPolicy`。`PropagationPolicy` – 指示是否以及如何进行垃圾回收。另请参阅第\
  \ 3 章的 \"OwnerReferences\" 部分。可接受的值为：\n  - `metav1.DeletePropagationOrphan` – 向\
  \ Kubernetes API 指示孤立正在删除的资源所拥有的资源，这样它们不会被垃圾回收器删除。\n- `metav1.DeletePropagationBackground`\
  \ – 向 Kubernetes API 指示在所有者资源被标记为删除后立即从 `Delete` 操作返回，无需等待拥有的资源被垃圾回收器删除。\n- `metav1.DeletePropagationForeground`\
  \ – 向 Kubernetes API 指示在所有者资源以及设置了 `BlockOwnerDeletion` 为 `true` 的拥有资源被删除后才从 `Delete`\
  \ 操作返回。Kubernetes API 不会等待其他拥有资源被删除。\n- `DryRun` – 指示应在 API 服务器端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行所有操作，但不包括将资源持久化到存储的操作。使用此选项，您可以获取命令结果，而无需真正删除资源，并检查在此删除过程中是否会发生错误。\n\
  - `GracePeriodSeconds` – 此值仅在删除 Pod 时有用。指示在 Pod 被删除前的持续秒数。\n  - 该值必须是一个指向非负整数的指针。值为零表示立即删除。如果此值为\
  \ nil，将使用 Pod 的默认宽限期，如 Pod 规范中的 `TerminationGracePeriodSeconds` 字段所示。\n  - 您可以使用\
  \ `metav1.NewDeleteOptions` 函数创建一个包含已定义 `GracePeriodSeconds` 的 `DeleteOptions` 结构：\n\
  \n```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"nginx-pod\"\
  ,\n*metav1.NewDeleteOptions(5),\n)\n```\n\n- `Preconditions` – 删除对象时，您可能希望确保删除的是预期对象。`Preconditions`\
  \ 字段允许您指明期望删除的资源，可以通过以下方式：\n  - 指定 UID，这样如果预期资源被删除并且另一个同名资源被创建，删除操作将失败，产生 `Conflict`\
  \ 错误。您可以使用 `metav1.NewPreconditionDeleteOptions` 函数创建一个包含设置了 UID 的 `Preconditions`\
  \ 的 `DeleteOptions` 结构：\n\n```\nuid := createdPod.GetUID()\nerr = clientset.\nCoreV1().\n\
  Pods(\"project1\").\nDelete(ctx,\n\"nginx-pod\",\n*metav1.NewPreconditionDeleteOptions(\n\
  string(uid),\n),\n)\nif errors.IsConflict(err) {\n[...]\n}\n```\n\n- 指定 `ResourceVersion`，这样如果资源在此期间被更新，删除操作将失败，并产生\
  \ Conflict 错误。您可以使用 `metav1.NewRVDeletionPrecondition` 函数创建一个包含设置了 `ResourceVersion`\
  \ 的 `Preconditions` 的 `DeleteOptions` 结构：\n\n```\nrv := createdPod.GetResourceVersion()\n\
  err = clientset.\nCoreV1().\nPods(\"project1\").\nDelete(ctx,\n\"nginx-pod\",\n\
  *metav1.NewRVDeletionPrecondition(\nrv,\n),\n)\nif errors.IsConflict(err) {\n[...]\n\
  }\n```\n\n以下是 `Delete` 操作特有的可能错误：\n\n- `IsNotFound` – 此函数表示您在请求中指定的资源或命名空间不存在。\n\
  - `IsConflict` – 此函数表示请求失败，因为未满足前提条件（UID 或 `ResourceVersion`）。\n\n## 删除资源集合\n\n\
  要从集群中删除资源集合，可以对要删除的资源使用 `DeleteCollection` 方法。例如，从 `project1` 命名空间中删除 Pod 集合：\n\n\
  ```\nerr = clientset.\nCoreV1().\nPods(\"project1\").\nDeleteCollection(\nctx,\n\
  metav1.DeleteOptions{},\nmetav1.ListOptions{},\n)\n```\n\n必须向该函数提供两组选项：\n\n- `DeleteOptions`，指示对每个对象执行\
  \ `Delete` 操作的选项，如 \"删除资源\" 部分所述。\n- `ListOptions`，细化要删除的资源集合，如 \"获取资源列表\" 部分所述。\n\
  \n## 更新资源\n\n要更新集群中的资源，可以对要更新的资源使用 `Update` 方法。例如，使用以下代码更新 `project1` 命名空间中的 `Deployment`：\n\
  \n```\nupdatedDep, err := clientset.\nAppsV1().\nDeployments(\"project1\").\nUpdate(\n\
  ctx,\nmyDep,\nmetav1.UpdateOptions{},\n)\n```\n\n更新资源时，可在 `UpdateOptions` 结构中声明的各种选项与\
  \ \"创建资源\" 部分中 `CreateOptions` 的选项相同。\n\n`Update` 操作特有的可能错误是：\n\n- `IsInvalid` –\
  \ 此函数表示传递给结构的数据无效。\n- `IsConflict` – 此函数表示结构中包含的 `ResourceVersion`（此处为 `myDep`）比集群中的版本更旧。更多信息请参阅第\
  \ 2 章的 \"更新资源以管理冲突\" 部分。\n\n\n\n### 使用战略性合并补丁更新资源\n\n你在第 2 章的“使用战略性合并补丁更新资源”部分已经了解了如何使用战略性合并补丁来修补资源。总而言之，你需要：\n\
  \n- 使用 `Patch` 操作\n- 为 `content-type` 请求头指定一个特定值\n- 在请求体中仅传入你想要修改的字段\n\n使用 Client-go\
  \ 库，你可以对你想要修补的资源调用 `Patch` 方法。\n\n```go\nPatch(\nctx context.Context,\nname string,\n\
  pt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources ...string,\n\
  ) (result *v1.Deployment, err error)\n```\n\n`patch` 类型指示你是想使用 `StrategicMerge`\
  \ 补丁（`types.StrategicMergePatchType`）还是合并补丁（`types.MergePatchType`）。这些常量定义在 `k8s.io/apimachinery/pkg/types`\
  \ 包中。\n\n`data` 字段包含你想要应用到资源上的补丁数据。你可以像第 2 章那样直接编写这些补丁数据，或者使用 `controller-runtime\
  \ library` 中的以下函数来帮助你构建此补丁。该库将在第 10 章进行更深入的探讨。\n\n```go\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\
  \nfunc StrategicMergeFrom(\nobj Object,\nopts ...MergeFromOption,\n) Patch\n```\n\
  \n`StrategicMergeFrom` 函数接受一个类型为 `Object` 的第一个参数，该参数代表任意 Kubernetes 对象。你需要通过此参数传入你想要修补的对象，*在*任何更改之前。\n\
  \n该函数随后接受一系列选项。目前唯一可接受的选项是 `client.MergeFromWithOptimisticLock{}` 值。该值要求库将 `ResourceVersion`\
  \ 添加到补丁数据中，这样服务器就能检查你想要更新的资源版本是否是最新的。\n\n使用 `StrategicMergeFrom` 函数创建 `Patch` 对象后，你可以创建要修补对象的深拷贝，然后对其进行修改。当完成对象更新后，你可以使用\
  \ `Patch` 对象专用的 `Data` 方法来构建补丁数据。\n\n例如，要为包含乐观锁 `ResourceVersion` 的 `Deployment`\
  \ 构建补丁数据，你可以使用以下代码（`createdDep` 是一个反映已创建 `Deployment` 的 `Deployment` 结构体）：\n\n```go\n\
  patch := client.StrategicMergeFrom(\ncreatedDep,\npkgclient.MergeFromWithOptimisticLock{},\n\
  )\nupdatedDep := createdDep.DeepCopy()\nupdatedDep.Spec.Replicas = pointer.Int32(2)\n\
  patchData, err := patch.Data(updatedDep)\n// patchData = []byte(`{\n//   \"metadata\"\
  :{\"resourceVersion\":\"4807923\"},\n//   \"spec\":{\"replicas\":2}\n// }`)\npatchedDep,\
  \ err := clientset.\nAppsV1().Deployments(\"project1\").Patch(\nctx,\n\"dep1\",\n\
  patch.Type(),\npatchData,\nmetav1.PatchOptions{},\n)\n```\n\n请注意，如果你更倾向于执行*合并补丁*，也可以使用\
  \ `MergeFrom` 和 `MergeFromWithOptions` 函数。\n\n`Patch` 对象的 `Type` 方法可用于获取补丁类型，而不必使用\
  \ `type` 包中的常量。你可以在调用修补操作时传递 `PatchOptions`。可能的选项包括：\n\n- `DryRun` – 指示应在 API 服务器端执行哪些操作。唯一可用的值是\
  \ `metav1.DryRunAll`，表示执行所有操作，但不会将资源持久化到存储中。\n- `Force` – 此选项仅可用于 *Apply* 补丁请求，并且在处理\
  \ `StrategicMergePatch` 或 `MergePatch` 请求时必须取消设置。\n- `FieldManager` – 指示此操作的字段管理器名称。此信息将用于将来的服务器端\
  \ *Apply* 操作。对于 `StrategicMergePatch` 或 `MergePatch` 请求，此选项是可选的。\n- `FieldValidation`\
  \ – 指示当结构体中出现重复或未知字段时服务器应如何反应。以下是可能的值：\n  - `metav1.FieldValidationIgnore` – 忽略所有重复或未知字段\n\
  \  - `metav1.FieldValidationWarn` – 出现重复或未知字段时发出警告\n  - `metav1.FieldValidationStrict`\
  \ – 出现重复或未知字段时操作失败\n\n请注意，`Patch` 操作接受一个 `subresources` 参数。此参数可用于修补 `Patch` 方法所作用资源的子资源。例如，要修补\
  \ Deployment 的状态，你可以使用值 `\"status\"` 作为 subresources 参数。\n\n特定于 `MergePatch` 操作的可能错误包括：\n\
  \n- `IsInvalid` – 此函数指示作为补丁传入的数据是否无效。\n- `IsConflict` – 此函数指示合并到补丁中的 `ResourceVersion`（如果在构建补丁数据时使用了乐观锁）是否是比集群中更旧的版本。更多信息请参见第\
  \ 2 章的“更新资源并管理冲突”部分。\n\n\n\n## 使用 Patch 进行服务端应用\n\n第 2 章的“服务端应用资源”部分描述了服务端应用 Patch\
  \ 的工作原理。概括来说，我们需要：\n\n-   使用 `Patch` 操作\n-   为 `content-type` 头部指定一个特定值\n-   在请求体中仅传入你想要修改的字段\n\
  -   提供一个 `fieldManager` 名称\n\n使用客户端库，你可以对要补丁的资源使用 `Patch` 方法。请注意，你也可以使用 `Apply`\
  \ 方法；请参考下一节“使用 Apply 进行服务端应用”。\n\n```\nPatch(\nctx context.Context,\nname string,\n\
  pt types.PatchType,\ndata []byte,\nopts metav1.PatchOptions,\nsubresources ...string,\n\
  ) (result *v1.Deployment, err error)\n```\n\n`Patch` 类型指示了补丁的类型，在这种情况下是 `types.ApplyPatchType`，定义在\
  \ `k8s.io/apimachinery/pkg/types` 包中。\n\n`data` 字段包含你要应用于资源的补丁。你可以使用 `client.Apply`\
  \ 值来构建此数据。该值实现了 `client.Patch` 接口，提供了 `Type` 和 `Data` 方法。\n\n请注意，你需要在你想要补丁的资源结构中设置\
  \ `APIVersion` 和 `Kind` 字段。同时请注意，此 `Apply` 操作也可用于创建资源。\n\n`Patch` 操作接受一个 `subresources`\
  \ 参数。此参数可用于补丁应用了 `Patch` 方法的资源的子资源。例如，要补丁一个 `Deployment` 的 `Status`，你可以对子资源参数使用值\
  \ `\"status\"`。\n\n```\nimport \"sigs.k8s.io/controller-runtime/pkg/client\"\nwantedDep\
  \ := appsv1.Deployment{\nSpec: appsv1.DeploymentSpec{\nReplicas: pointer.Int32(1),\n\
  [...]\n}\nwantedDep.SetName(\"dep1\")\nwantedDep.APIVersion, wantedDep.Kind =\n\
  appsv1.SchemeGroupVersion.\nWithKind(\"Deployment\").\nToAPIVersionAndKind()\npatch\
  \ := client.Apply\npatchData, err := patch.Data(&wantedDep)\npatchedDep, err :=\
  \ clientset.\nAppsV1().Deployments(\"project1\").Patch(\nctx,\n\"dep1\",\npatch.Type(),\n\
  patchData,\nmetav1.PatchOptions{\nFieldManager: \"my-program\",\n},\n)\n```\n\n\
  你可以在调用 `Patch` 操作时传入 `PatchOptions`。以下为可能的选项：\n\n-   `DryRun` – 指示应在 API 服务端执行哪些操作。唯一可用的值是\
  \ `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n-   `Force` – 此选项指示*强制应用*请求。这意味着此请求的字段管理器将获取由其他字段管理器拥有的冲突字段。\n\
  -   `FieldManager` – 指示此操作的字段管理器的名称。此选项对于*应用 Patch* 请求是强制性的。\n-   `FieldValidation`\
  \ – 指示当结构中存在重复或未知字段时，服务器应如何响应。可能的值有：\n    -   `metav1.FieldValidationIgnore` – 忽略所有重复或未知字段\n\
  \    -   `metav1.FieldValidationWarn` – 当存在重复或未知字段时发出警告\n    -   `metav1.FieldValidationStrict`\
  \ – 当存在重复或未知字段时操作失败\n\n以下是特定于 `ApplyPatch` 操作的可能错误：\n\n-   `IsInvalid` – 此函数指示作为补丁传入的数据是否无效。\n\
  -   `IsConflict` – 此函数指示补丁修改的某些字段是否因为被另一个字段管理器拥有而发生冲突。要解决此冲突，你可以使用 `Force` 选项，以便这些字段将由本次操作的字段管理器获取。\n\
  \n### 使用应用配置进行服务端应用\n\n上一节展示了如何通过使用 `Patch` 方法来执行服务端*应用*操作。其缺点在于数据必须以 JSON 格式传递，这容易出错。\n\
  \n从 1.21 版本开始，客户端库 `Clientset` 提供了一种 `Apply` 方法，可以使用类型化的结构来执行服务端*应用*操作。以下是 `Apply`\
  \ 方法的签名：\n\n```\nApply(\nctx context.Context,\ndeployment *acappsv1.DeploymentApplyConfiguration,\n\
  opts metav1.ApplyOptions,\n) (result *v1.Deployment, err error)\n```\n\n`ApplyOptions`\
  \ 结构定义了以下选项：\n\n-   `DryRun` – 指示应在 API 服务端执行哪些操作。唯一可用的值是 `metav1.DryRunAll`，表示执行除将资源持久化到存储之外的所有操作。\n\
  -   `Force` – 此调用方将重新获取由其他管理器拥有的冲突字段。\n-   `FieldManager` – 这是执行 `Apply` 操作的*管理器*的名称。此值是必需的。\n\
  \n`Apply` 的这个签名与 `Create` 或 `Update` 操作的签名类似，不同之处在于它期望一个 `DeploymentApplyConfiguration`\
  \ 对象，而不是 `Deployment` 对象。\n\n如第 2 章的“服务端应用资源”部分所述，`Apply` 操作允许多个*管理器*在同一个资源上工作，每个管理器拥有资源规范中的一组值。\n\
  \n因此，为此操作传入的数据不会定义所有字段，而只定义该*管理器*所*负责*的字段。有些字段在资源定义的结构中是必需的；无法将这些结构用于 `Apply` 操作。\n\
  \n客户端库在 `applyconfigurations` 目录中引入了名为*应用配置*的新结构，所有字段都是可选的，使用指针。此目录包含 Kubernetes\
  \ API 所有原生资源的生成源代码，其结构与 API 相同。例如，要访问定义用于应用 `apps/v1` 组的 `Deployment` 的数据所需的结构，你需要导入以下包：\n\
  \n```\nimport (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\n)\n\
  ```\n\n请注意，出于与你想为从 Kubernetes API 库导入的包定义别名相同的原因（因为大多数包都命名为 `v1`），在导入这些包时，你也将希望使用别名。本书使用与\
  \ API 库相同的系统，在别名前加上前缀 `ac` 以指示其来自 `applyconfigurations` 目录。\n\n客户端库提供了两种构建 `ApplyConfiguration`\
  \ 的方式：从零开始，或从现有资源构建。\n\n\n\n#### 从头构建 ApplyConfiguration\n\n构建 `ApplyConfiguration`\
  \ 的第一种方法是从头开始构建。你首先需要使用必填字段初始化该结构：`kind`、`apiVersion`、`name` 以及 `namespace`（如果资源是命名空间级别的）；这可以通过相关包提供的辅助函数来完成。例如，对于一个\
  \ `Deployment` 资源：\n\n```\ndeploy1Config := acappsv1.Deployment(\n\"deploy1\",\n\
  \"default\",\n)\n```\n\n此函数的实现使用了以下代码：\n\n```\nfunc Deployment(\nname string,\n\
  namespace string,\n) *DeploymentApplyConfiguration {\nb := &DeploymentApplyConfiguration{}\n\
  b.WithName(name)\nb.WithNamespace(namespace)\nb.WithKind(\"Deployment\")\nb.WithAPIVersion(\"\
  apps/v1\")\nreturn b\n}\n```\n\n然后，你可以指定你想要管理的字段。提供了 `With*Field*()` 形式的辅助函数来设置特定字段。例如，如果你的程序只负责设置\
  \ deployment 的副本数量，代码将如下所示：\n\n```\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
  deploy1Config.Spec.WithReplicas(2)\n```\n\n最后，你可以调用 `Apply` 方法。完整代码如下：\n\n```\n\
  import (\nacappsv1 \"k8s.io/client-go/applyconfigurations/apps/v1\"\n)\ndeploy1Config\
  \ := acappsv1.Deployment(\n\"deploy1\",\n\"default\",\n)\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
  deploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
  default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
  my-manager\",\nForce:        true,\n},\n)\n```\n\n#### 从现有资源构建 ApplyConfiguration\n\
  \n构建 `ApplyConfiguration` 的第二种方法是从集群中的现有资源开始。有时程序无法在一个地方构建完整的 `ApplyConfiguration`。例如，设想你的程序在一个地方负责为一个\
  \ `Deployment` 定义一个具有特定镜像的容器，而在另一个地方负责设置副本数量。\n\n如果程序首先定义了容器及其镜像，它将被标记为容器及其镜像的所有者。然后，如果程序构建一个\
  \ `ApplyConfiguration` 并仅设置副本数量，而不指定容器及其镜像，则服务器端的 `Apply` 操作将尝试删除该容器。这是因为程序指定了此容器的所有者，但它在\
  \ `ApplyConfiguration` 中不再指定该容器。\n\n一种可能性是为程序的不同部分使用不同的管理器名称。但是，如果你想保持单一的管理器名称，`applyconfigurations`\
  \ 目录中的包提供了一个 `Extract*Resource()` 辅助函数来帮助你解决这种情况。\n\n这些函数将获取从集群中读取的资源（通过 `Get` 或\
  \ `List` 操作）作为参数，并构建一个仅包含由指定 `fieldManager` 所拥有字段的 `ApplyConfiguration`。例如，`ExtractDeployment`\
  \ 辅助函数的签名是：\n\n```\nExtractDeployment(\ndeployment *apiappsv1.Deployment,\nfieldManager\
  \ string,\n) (*DeploymentApplyConfiguration, error)\n```\n\n首先是从集群中读取 deployment，然后从中提取\
  \ `ApplyConfiguration`。此时，它将包含程序管理的所有字段（容器及其镜像和副本）。然后，你可以指定唯一想要修改的字段——在此示例中为副本：\n\
  \n```\ngotDeploy1, err := clientset.AppsV1().\nDeployments(\"default\").Get(\nctx,\n\
  \"deploy1\",\nmetav1.GetOptions{},\n)\nif err != nil {\nreturn err\n}\ndeploy1Config,\
  \ err := acappsv1.ExtractDeployment(\ngotDeploy1,\n\"my-manager\",\n)\nif err !=\
  \ nil {\nreturn err\n}\nif deploy1Config.Spec == nil {\ndeploy1Config.WithSpec(acappsv1.DeploymentSpec())\n\
  }\ndeploy1Config.Spec.WithReplicas(2)\nresult, err := clientset.AppsV1().\nDeployments(\"\
  default\").Apply(\nctx,\ndeploy1Config,\nmetav1.ApplyOptions{\nFieldManager: \"\
  my-manager\",\nForce:        true,\n},\n)\n```\n\n## 监控资源\n\n第 2 章的“监控资源”部分描述了 Kubernetes\
  \ API 如何*监控*资源。使用 Client-go 库，你可以为你想要监控的资源使用 `Watch` 方法。\n\n```\nWatch(\nctx context.Context,\n\
  opts metav1.ListOptions,\n) (watch.Interface, error)\n```\n\n此 `Watch` 方法返回一个实现\
  \ `watch.Interface` 接口的对象，并提供以下方法：\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\
  \ntype Interface interface {\nResultChan() <-chan Event\nStop()\n}\n```\n\n`ResultChan`\
  \ 方法返回一个 Go 通道（你只能读取），你将能够通过它接收所有事件。\n\n`Stop` 方法将停止 `Watch` 操作并关闭通过 `ResultChan`\
  \ 接收到的通道。\n\n通过通道接收到的 `watch.Event` 对象定义如下：\n\n```\ntype Event struct {\nType EventType\n\
  Object runtime.Object\n}\n```\n\n`Type` 字段可以取第 2 章表 2-2 中描述的值，并且你可以在 `watch` 包中找到这些不同值的常量：`watch.Added`、`watch.Modified`、`watch.Deleted`、`watch.Bookmark`\
  \ 和 `watch.Error`。\n\n`Object` 字段实现了 `runtime.Object` 接口，其具体类型可以根据 `Type` 的值而有所不同。\n\
  \n对于除 `Error` 之外的 `Type`，`Object` 的具体类型将是你正在监控的资源类型（例如，如果你正在监控 *deployments*，则为\
  \ `Deployment` 类型）。\n\n对于 `Error` 类型，具体类型通常是 `metav1.Status`，但根据你正在监控的资源，它可能是其他任何类型。以下是一个监控\
  \ Deployments 的代码示例：\n\n```\nimport \"k8s.io/apimachinery/pkg/watch\"\nwatcher,\
  \ err := clientset.AppsV1().\nDeployments(\"project1\").\nWatch(\nctx,\nmetav1.ListOptions{},\n\
  )\nif err != nil {\nreturn err\n}\nfor ev := range watcher.ResultChan() {\nswitch\
  \ v := ev.Object.(type) {\ncase *appsv1.Deployment:\nfmt.Printf(\"%s %s\\n\", ev.Type,\
  \ v.GetName())\ncase *metav1.Status:\nfmt.Printf(\"%s\\n\", v.Status)\nwatcher.Stop()\n\
  }\n}\n```\n\n在监控资源时，需要在 `ListOptions` 结构中声明的各种选项如下：\n\n- `LabelSelector`、`FieldSelector`\
  \ —— 用于按标签或字段过滤被监控的元素。这些选项在“过滤列表结果”部分有详细说明。\n- `Watch`、`AllowWatchBookmarks` ——\
  \ `Watch` 选项表示正在运行一个 *Watch* 操作。在执行 `Watch` 方法时会自动设置此选项；你无需显式设置。\n- `AllowWatchBookmarks`\
  \ 选项要求服务器定期返回 *书签*。书签的使用在第 2 章的“允许书签以高效重启 *Watch* 请求”部分有描述。\n- `ResourceVersion`、`ResourceVersionMatch`\
  \ —— 这表示你想要从哪个版本的资源 `List` 开始 `Watch` 操作。\n- 请注意，当收到 `List` 操作的响应时，列表元素本身会指示一个 `ResourceVersion`\
  \ 值，列表中每个元素也会有自己的 *ResourceVersion* 值。在 Options 中指示的 `ResourceVersion` 指的是列表的 `ResourceVersion`。\n\
  - `ResourceVersionMatch` 选项不用于 `Watch` 操作。对于 `Watch` 操作，执行以下操作：\n  - 当未设置 `ResourceVersion`\
  \ 时，API 将从最新的资源列表开始 `Watch` 操作。通道首先接收 `ADDED` 事件以声明资源的初始状态，然后当集群中发生更改时，会接收其他事件。\n\
  \n\n\n*   当 `ResourceVersion` 设置为特定版本时，API 将从资源列表的指定版本开始 `Watch` 操作。通道**不会**接收 `ADDED`\
  \ 事件来声明资源的初始状态，而只会在该版本之后集群发生更改时接收事件（这些事件可能发生在指定版本与您运行 `Watch` 操作的时间之间）。\n\n*   一个用例是监视特定资源的删除。为此，您可以：\n\
  \    1.  列出资源，包括您要删除的资源，并保存收到的 `List` 的 `ResourceVersion`。\n    2.  对资源执行 `Delete`\
  \ 操作（删除是异步的，因此操作终止时资源可能不会被删除）。\n    3.  通过指定在步骤 1 中收到的 `ResourceVersion` 启动 `Watch`\
  \ 操作。即使删除发生在步骤 2 和步骤 3 之间，您也保证会收到 `DELETED` 事件。\n\n*   当 `ResourceVersion` 设置为 `“0”`\
  \ 时，API 将从**任意**资源列表开始 `Watch` 操作。通道首先接收 `ADDED` 事件以声明资源的初始状态，随后在该初始状态之后集群发生更改时接收其他事件。\n\
  \n*   使用此语义时需特别小心，因为 `Watch` 操作通常将从最新版本开始；但也可以从较旧的版本开始。\n\n*   `TimeoutSeconds`\
  \ – 这会将请求的持续时间限制在指定的秒数内。\n\n*   `Limit`、`Continue` – 这用于对 `List` 操作的结果进行分页。`Watch`\
  \ 操作不支持这些选项。\n\n请注意，如果您为 `Watch` 操作指定一个不存在的命名空间，您将不会收到 `NotFound` 错误。\n\n还需注意，如果您指定了一个过期的\
  \ `ResourceVersion`，在调用 `Watch` 方法时不会收到错误，但会收到一个 `ERROR` 事件，其中包含一个 `metav1.Status`\
  \ 对象，该对象指示值为 `metav1.StatusReasonExpired` 的 `Reason`。\n\n`metav1.Status` 是用于构建通过使用\
  \ `Clientset` 的调用返回的错误的基础对象。您将在“错误和状态”部分中了解更多信息。\n\n## 错误和状态\n\n正如第 1 章所示，Kubernetes\
  \ API 定义了用于与调用者交换数据的 `Kinds`。目前，您应认为 `Kinds` 与资源相关，要么是资源单数名称的 `Kind`（例如 `Pod`），要么是资源列表的\
  \ `Kind`（例如 `PodList`）。当 API 操作既不返回资源也不返回资源列表时，它会使用一个通用的 `Kind`（`metav1.Status`）来指示操作的状态。\n\
  \n### `metav1.Status` 结构的定义\n\n`metav1.Status` 结构定义如下：\n\n*   `Status` – 这指示操作的状态，可以是\
  \ `metav1.StatusSuccess` 或 `metav1.StatusFailure`。\n*   `Message` – 这是对操作状态的人类可读的自由格式描述。\n\
  *   `Code` – 这指示操作为其返回的 HTTP 状态码。\n*   `Reason` – 这指示操作处于 `Failure` 状态的原因。`Reason`\
  \ 与给定的 HTTP 状态码相关。定义的 `Reasons` 有：\n    *   `StatusReasonBadRequest` (400) – 此请求本身无效。这与\
  \ `StatusReasonInvalid` 不同，后者表示 API 调用可能成功，但数据无效。回复 `StatusReasonBadRequest` 的请求永远无法成功，无论数据如何。\n\
  \    *   `StatusReasonUnauthorized` (401) – 授权凭据缺失、不完整或无效。\n    *   `StatusReasonForbidden`\
  \ (403) – 授权凭据有效，但对该资源的操作被这些凭据禁止。\n    *   `StatusReasonNotFound` (404) – 找不到请求的资源。\n\
  \    *   `StatusReasonMethodNotAllowed` (405) – 在资源上请求的操作不被允许，因为它未实现。回复 `StatusReasonMethodNotAllowed`\
  \ 的请求永远无法成功，无论数据如何。\n    *   `StatusReasonNotAcceptable` (406) – 客户端在 `Accept` 头中指示的任何\
  \ `Accept` 类型均不可用。回复 `StatusReasonNotAcceptable` 的请求永远无法成功，无论数据如何。\n    *   `StatusReasonAlreadyExists`\
  \ (409) – 正在创建的资源已存在。\n    *   `StatusReasonConflict` (409) – 由于冲突（例如，操作尝试使用较旧的资源版本来更新资源，或\
  \ `Delete` 操作中的前提条件未得到满足），请求无法完成。\n    *   `StatusReasonGone` (410) – 项目不再可用。\n\
  \    *   `StatusReasonExpired` (410) – 内容已过期且不再可用——例如，使用过期的资源版本执行 `List` 或 `Watch`\
  \ 操作时。\n    *   `StatusReasonRequestEntityTooLarge` (413) – 请求实体太大。\n    *   `StatusReasonUnsupportedMediaType`\
  \ (415) – 不支持此资源在 `Content-Type` 头中指示的内容类型。回复 `StatusReasonUnsupportedMediaType`\
  \ 的请求永远无法成功，无论数据如何。\n    *   `StatusReasonInvalid` (422) – 为 `Create` 或 `Update`\
  \ 操作发送的数据无效。`Causes` 字段列举了数据中的无效字段。\n    *   `StatusReasonTooManyRequests` (429)\
  \ – 客户端应至少等待 `Details` 字段中的 `RetryAfterSeconds` 字段指定的秒数，然后再执行操作。\n    *   `StatusReasonUnknown`\
  \ (500) – 服务器未指示任何失败原因。\n    *   `StatusReasonServerTimeout` (500) – 服务器可达且能理解请求，但无法在合理时间内完成操作。客户端应在\
  \ `Details` 字段中的 `RetryAfterSeconds` 字段指定的秒数后重试请求。\n    *   `StatusReasonInternalError`\
  \ (500) – 发生内部错误；这是意料之外的，调用的结果未知。\n    *   `StatusReasonServiceUnavailable` (503)\
  \ – 请求有效，但所请求的服务当前不可用。一段时间后重试请求可能会成功。\n    *   `StatusReasonTimeout` (504) – 无法在请求中指定的超时时间内完成操作。如果指定了\
  \ `Details` 字段中的 `RetryAfterSeconds` 字段，客户端应等待该秒数后再执行操作。\n*   `Details` – 根据 `Reason`\
  \ 字段，这可能包含有关原因的更多详细信息。\n*   `Details` 字段的类型 `StatusDetails` 定义如下：\n\n```go\ntype\
  \ Status struct {\n  Status      string\n  Message     string\n  Reason      StatusReason\n\
  \  Details     *StatusDetails\n  Code        int32\n}\n```\n\n*   `Name`、`Group`、`Kind`\
  \ 和 `UID` 字段指示（如果指定）哪个资源受到了失败的影响。\n*   `RetryAfterSeconds` 字段（如果指定）指示客户端在再次执行操作之前应等待多少秒。\n\
  *   `Causes` 字段列举了失败的原因。当执行 `Create` 或 `Update` 操作导致失败且原因为 `StatusReasonInvalid`\
  \ 时，`Causes` 字段会列举无效字段以及每个字段的错误类型。\n*   `Causes` 字段的 `StatusCause` 类型定义如下：\n\n```go\n\
  type StatusDetails struct {\n  Name              string\n  Group             string\n\
  \  Kind              string\n  UID               types.UID\n  Causes           \
  \ []StatusCause\n  RetryAfterSeconds int32\n}\n```\n\n```go\ntype StatusCause struct\
  \ {\n  Type       CauseType\n  Message    string\n  Field      string\n}\n```\n\n\
  \n\n### 客户端集操作返回的错误\n\n本章前面介绍了`Clientset`提供的各种操作，这些操作通常返回一个`error`，并且你可以使用`errors`包中的函数来检测错误的原因——例如，使用`IsAlreadyExists`函数。\n\
  \n这些错误的具体类型是`errors.StatusError`，定义如下：\n\n```\ntype StatusError struct {\nErrStatus\
  \ metav1.Status\n}\n```\n\n可以看出，该类型仅包含本章前面已探讨过的`metav1.Status`结构体。为此`StatusError`类型提供了函数，用于访问底层的`Status`。\n\
  \n*   `Is<ReasonValue>(err error) bool` – 针对本节前面枚举的每个`Reason`值都有一个对应函数，用于指示该错误是否属于特定状态。\n\
  *   `FromObject(obj runtime.Object) error` – 当你在执行`Watch`操作期间接收到`metav1.Status`时，可以使用此函数构建一个`StatusError`对象。\n\
  *   `(e *StatusError) Status() metav1.Status` – 返回底层的`Status`。\n*   `ReasonForError(err\
  \ error) metav1.StatusReason` – 返回底层`Status`的`Reason`。\n*   `HasStatusCause(err\
  \ error, name metav1.CauseType) bool` – 指示某个错误是否具有给定`CauseType`声明的特定原因。\n*   `StatusCause(err\
  \ error, name metav1.CauseType) (metav1.StatusCause, bool)` – 若存在，则返回给定`causeType`的原因，否则返回\
  \ false。\n*   `SuggestsClientDelay(err error) (int, bool)` – 指示错误是否表明`Status`中的`RetryAfterSeconds`字段有值，并返回该值本身。\n\
  \n### RESTClient\n\n前面在“使用客户端集”部分提到，你可以为 Kubernetes API 的每个组/版本获取一个`REST`客户端。例如，以下代码返回`Core/v1`组的\
  \ REST 客户端：\n\n```\nrestClient := clientset.CoreV1().RESTClient()\n```\n\n`restClient`对象实现了`rest.Interface`接口，其定义如下：\n\
  \n```\ntype Interface interface {\nGetRateLimiter()           flowcontrol.RateLimiter\n\
  Verb(verb string)          *Request\nPost()                     *Request\nPut()\
  \                      *Request\nPatch(pt types.PatchType)  *Request\nGet()    \
  \                  *Request\nDelete()                   *Request\nAPIVersion() \
  \               schema.GroupVersion\n}\n```\n\n在此接口中，你可以看到通用方法`Verb`，以及辅助方法`Post`、`Put`、`Patch`、`Get`和`Delete`，它们返回一个`Request`对象。\n\
  \n### 构建请求\n\n`Request`结构体仅包含私有字段，并提供了一些方法来个性化 Request。如第一章[#533908_1_En_1_Chapter.xhtml]所示，Kubernetes\
  \ 资源或子资源的路径形式如下（某些段可能根据操作和资源而缺失）：\n\n```\n/apis/<group>/<version>/\nnamespaces/<namespace>/<resource>/\n\
  <name>/<subresource>\n```\n\n以下方法可用于构建此路径。请注意，`<group>`和`<version>`段是固定的，因为 REST\
  \ 客户端是针对特定组和版本的。\n\n*   `Namespace(namespace string) *Request; NamespaceIfScoped(namespace\
  \ string, scoped bool) *Request` – 这些方法用于指示要查询的资源所属的命名空间。仅当请求标记为 scoped 时，`NamespaceIfScoped`才会添加命名空间部分。\n\
  *   `Resource(resource string) *Request` – 指示要查询的资源。\n*   `Name(resourceName string)\
  \ *Request` – 指示要查询的资源名称。\n*   `SubResource(subresources ...string) *Request` –\
  \ 指示要查询资源的子资源。\n*   `Prefix(segments ...string) *Request; Suffix(segments ...string)\
  \ *Request` – 在请求路径的开头或末尾添加路径段。前缀段将添加到“namespace”段之前。后缀段将添加到子资源段之后。重复调用这些方法会在现有前缀和后缀的基础上进行添加。\n\
  *   `AbsPath(segments ...string) *Request` – 使用提供的段重置前缀。\n\n以下方法通过查询参数、请求体和标头完成请求的构建：\n\
  \n*   `Param(paramName, s string) *Request` – 使用提供的名称和值添加一个查询参数。\n*   `VersionedParams(obj\
  \ runtime.Object, codec runtime.ParameterCodec) *Request` – 添加从对象`obj`中提取的一系列参数。`obj`的具体类型通常是`ListOptions`、`GetOptions`、`DeleteOptions`、`CreateOptions`、`PatchOptions`、`ApplyOptions`、`UpdateOptions`或`TableOptions`之一。`codec`通常是\
  \ client-go 库中`scheme`包提供的参数编解码器：`scheme.ParameterCodec`。\n*   `SpecificallyVersionedParams(obj\
  \ runtime.Object, codec runtime.ParameterCodec, version schema.GroupVersion) *Request`\
  \ – 与`VersionedParams`不同，该方法中对象将使用 REST 客户端的组和版本来编码。而使用`SpecificallyVersionedParams`，你可以指定特定的组和版本。\n\
  *   `SetHeader(key string, values ...string) *Request` – 为请求的指定标头设置值。如果该键对应的标头已定义，则会被覆盖。\n\
  *   `Body(obj interface{}) *Request` – 基于`obj`设置请求的请求体内容。`obj`可以是不同的类型：\n    * \
  \  `string` – 将读取指定名称的文件，并将其内容用作请求体\n    *   `[]byte` – 数据将直接用作请求体\n    *   `io.Reader`\
  \ – 从读取器中读取的数据将用作请求体\n    *   `runtime.Object` – 对象将被序列化，结果用作请求体。`Content-Type`标头将被设置为指示对象序列化的类型（json，yaml\
  \ 等）。\n\n还有其他方法可用于配置请求的技术属性：\n\n*   `BackOff(manager BackoffManager) *Request` –\
  \ 为请求设置一个退避管理器。默认的退避管理器是`rest`包提供的`rest.NoBackoff`管理器，它在请求失败后不会等待，直接执行新请求。\n*  \
  \ `rest`包还提供了另一个退避管理器`rest.URLBackoff`，当服务器之前回复过 5xx 错误时，它在重试新请求之前会等待一段时间。\n*  \
  \ 你可以使用以下代码构建并使用一个`rest.URLBackoff`对象：\n\n```\n    request.BackOff(&rest.URLBackoff{\n\
  \    Backoff: flowcontrol.NewBackOffWithJitter(\n    1*time.Second,\n    30*time.Second,\n\
  \    0.1,\n    ),\n    })\n```\n\n\n\n- 如果持续调用`Kubernetes API`时遇到连续`5xx`错误，`RESTClient`会在请求之间增加指数级延迟：初始`1\
  \ 秒`，然后`2 秒`、`4 秒`，以此类推，延迟上限为`30 秒`，并额外增加最多`10%`的抖动（jitter），直到服务器返回非`5xx`状态码。\n\
  - 若不想添加抖动，可以使用以下代码：\n```\n    request.BackOff(&rest.URLBackoff{\n    Backoff: flowcontrol.NewBackOff(\n\
  \    1*time.Second,\n    30*time.Second,\n    ),\n    })\n```\n- 注意，除了使用此代码为每次请求声明指数退避外，还可以通过设置环境变量`KUBE_CLIENT_BACKOFF_BASE=1`和`KUBE_CLIENT_BACKOFF_DURATION=30`，在使用`client-go`库运行程序时为所有请求实现类似行为（但不添加抖动）。\n\
  - `BackOff()`接收的参数为接口，你可以通过实现`rest.BackoffManager`接口来编写自定义的退避管理器：\n```\n    type\
  \ BackoffManager interface {\n    UpdateBackoff(\n    actualUrl *url.URL,\n    err\
  \ error,\n    responseCode int,\n    )\n    CalculateBackoff(\n    actualUrl *url.URL,\n\
  \    ) time.Duration\n    Sleep(d time.Duration)\n    }\n```\n- 例如，实现一个针对`5xx`错误的线性退避（适用于仅调用单个主机的情况）：\n\
  ```\n    type MyLinearBackOff struct {\n    next time.Duration\n    }\n    func\
  \ (o *MyLinearBackOff) UpdateBackoff(\n    actualUrl *url.URL,\n    err error,\n\
  \    responseCode int,\n    ) {\n    if responseCode > 499 {\n    o.next += 1 *\
  \ time.Second\n    return\n    }\n    o.next = 0\n    }\n    func (o *MyLinearBackOff)\
  \ CalculateBackoff(\n    actualUrl *url.URL,\n    ) time.Duration {\n    return\
  \ o.next\n    }\n    func (o *MyLinearBackOff) Sleep(\n    d time.Duration,\n  \
  \  ) {\n    time.Sleep(d)\n    }\n```\n- `Throttle(limiter flowcontrol.RateLimiter)\
  \ *Request` — 限流功能会限制`RESTClient`每秒可执行的请求数。\n- 默认情况下，使用**令牌桶速率限制器**（Token Bucket\
  \ Rate Limiter），其`QPS`为`5`次/秒，突发流量（Burst）为`10`。\n- 这意味着`RESTClient`每秒最多可发起`5`个请求，外加一个可随时使用的`10`个请求的额外配额（桶）。桶会以`QPS`的速率重新填充，本例中每秒填充`5`个令牌，桶的最大容量保持为`10`。\n\
  - 你可以通过以下代码构建并使用`flowcontrol.tokenBucketRateLimiter`对象：\n```\n    request.Throttle(\n\
  \    flowcontrol.NewTokenBucketRateLimiter(5.0, 10),\n    )\n```\n- 在此示例中，请求将使用速率为`5.0`次/秒（`QPS`）且突发流量为`10`的令牌桶速率限制器。\n\
  - 注意，你可以通过设置用于创建`RESTClient`的`Config`中的`QPS`和`Burst`，为所有请求获得相同的行为。\n- 请求的默认速率限制器继承自用于创建`clientset`的`Config`。你可以通过在`Config`中设置速率限制器来更改所有请求的速率限制器。\n\
  - `MaxRetries(maxRetries int) *Request` — 指定当请求收到包含 `Retry-After` 头部和 `429` 状态码（*Too\
  \ Many Requests*）的响应时，`RESTClient`将执行的重试次数。\n- 默认值为`10`，表示在返回错误之前，请求最多会被执行`11`次。\n\
  - `Timeout(d time.Duration) *Request` — 指定`RESTClient`在返回错误之前等待请求响应的秒数。请求的默认超时时间继承自用于构建`clientset`的`HTTPClient`。\n\
  - `WarningHandler(handler WarningHandler) *Request` — `API`服务器可以使用特定头部（`Warning`头部）为请求返回警告。默认情况下，警告会被记录，并且`rest`包提供了几个内置的处理器实现：\n\
  \    - `WarningLogger{}` — 记录警告（默认行为）。\n    - `NoWarning{}` — 抑制警告。\n    - `NewWarningWriter()`\
  \ — 将警告写入指定的写入器。可指定选项：\n        - `Deduplicate` — 设为`true`时，每条警告仅写入一次。\n       \
  \ - `Color` — 设为`true`时，以黄色显示警告。\n- 你可以通过实现`WarningHandler`接口来编写自定义的警告处理器：\n```\n\
  \    type WarningHandler interface {\n    HandleWarningHeader(\n    code int,\n\
  \    agent string,\n    text string,\n    )\n    }\n```\n- 注意，你可以通过调用以下全局函数，为所有客户端的所有请求设置默认的`Warning\
  \ Handler`：\n```\nrest.SetDefaultWarningHandler(l WarningHandler)\n```\n\n### 执行请求\n\
  \n构建好`Request`后，即可执行它。`Request`对象上的以下方法可供使用：\n\n- `Do(ctx context.Context) Result`\
  \ — 执行请求并返回`Result`对象。下一节将介绍如何利用此`Result`对象。\n- `Watch(ctx context.Context) (watch.Interface,\
  \ error)` — 对请求的地址执行**Watch**操作，并返回一个实现`watch.Interface`接口的对象，用于接收事件。可参阅本章“监控资源”部分了解如何使用返回的对象。\n\
  - `Stream(ctx context.Context) (io.ReadCloser, error)` — 执行请求并通过`ReadCloser`流式传输结果正文。\n\
  - `DoRaw(ctx context.Context) ([]byte, error)` — 执行请求并以字节数组形式返回结果。\n\n### 利用 Result\n\
  \n在`Request`上执行`Do()`方法时，该方法会返回一个`Result`对象。\n\n`Result`结构体没有公共字段。以下方法可用于获取结果信息：\n\
  \n- `Into(obj runtime.Object) error` — 如果可能，将结果正文内容解码并存储到对象中。传入参数的具体类型必须与正文中定义的类型匹配。同时返回执行请求的错误。\n\
  - `Error() error` — 返回执行请求的错误。此方法在请求不返回任何正文内容时非常有用。\n- `Get() (runtime.Object, error)`\
  \ — 解码并将结果正文内容作为对象返回。返回对象的具体类型将与正文中定义的类型匹配。同时返回执行请求的错误。\n- `Raw() ([]byte, error)`\
  \ — 以字节数组形式返回正文，以及执行请求的错误。\n- `StatusCode(statusCode *int) Result` — 将状态码存储到传入参数中，并返回`Result`，以便方法可以链式调用。\n\
  - `WasCreated(wasCreated \\*bool) Result` — 存储一个布尔值，指示请求创建的资源是否已成功创建，并返回`Result`，以便方法可以链式调用。\n\
  - `Warnings() []net.WarningHeader` — 返回`Result`中包含的警告列表。\n\n\n\n### 以表格形式获取结果\n\n\
  你在第 2 章的“以表格形式获取结果”一节中已经看到，可以将`List`请求的结果以列和行的列表形式获取，从而以表格形式展示信息。为此，你需要执行一个`List`操作并指定一个特定的`Accept`头。\n\
  \n以下是使用`RESTClient`以表格形式列出`project1`命名空间下 Pod 的代码：\n\n- ➊ 获取`core/v1`组的`RESTClient`\n\
  - ➋ 指定要列出资源的命名空间（此处为`project1`）\n- ➌ 指定要列出的资源（此处为`pods`）\n- ➍ 设置所需的头信息以获取表格形式的结果\n\
  - ➎ 准备一个`metav1.Table`类型的变量来存储请求结果\n- ➏ 执行请求\n- ➐ 将结果存入`metav1.Table`对象\n- ➑ 遍历返回的列定义以显示表头\n\
  - ➒ 遍历返回的表格行以显示包含特定 Pod 信息的数据行\n- ➓ 遍历行中的单元格以显示它们\n\n```\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
  \n)\nrestClient := clientset.CoreV1().RESTClient() ➊\nreq := restClient.Get().\n\
  Namespace(\"project1\").          ➋\nResource(\"pods\").               ➌\nSetHeader(\
  \                    ➍\n\"Accept\",\nfmt.Sprintf(\n\"application/json;as=Table;v=%s;g=%s\"\
  ,\nmetav1.SchemeGroupVersion.Version,\nmetav1.GroupName\n))\nvar result metav1.Table\
  \          ➎\nerr = req.Do(ctx).               ➏\nInto(&result)               ➐\n\
  if err != nil {\nreturn err\n}\nfor _, colDef := range result.ColumnDefinitions\
  \ {     ➑\n// 显示表头\n}\nfor _, row := range result.Rows {          ➒\nfor _, cell\
  \ := range row.Cells {          ➓\n// 显示单元格\n}\n}\n```\n\n## 发现客户端\n\nKubernetes\
  \ API 提供了用于发现 API 所提供的资源的端点。`kubectl` 使用这些端点来显示 `kubectl api-resources` 命令的结果（图\
  \ 6-1）。\n\n![](img/533908_1_En_6_Fig1_HTML.png)\n\n一张屏幕截图展示了 kubectl API 资源列表。列标签分别为名称、短名称、API\
  \ 版本、命名空间范围和种类。\n\n**图 6-1** `kubectl api-resources`\n\n该客户端可以通过调用 `Clientset` 上的\
  \ `Discovery()` 方法获取（有关如何获取 `Clientset` 的信息，请参见第 6 章的“获取 Clientset”小节），或使用 `discovery`\
  \ 包提供的函数获取。\n\n```\nimport \"k8s.io/client-go/discovery\"\n```\n\n所有这些函数都需要一个 `rest.Config`\
  \ 作为参数。你可以在第 6 章的“连接到集群”小节中看到如何获取这样一个 `rest.Config` 对象。\n\n- `NewDiscoveryClientForConfig(`\
  \  \n  `c *rest.Config,`  \n  `) (*DiscoveryClient, error)`  \n  – 使用提供的 `rest.Config`\
  \ 返回一个 `DiscoveryClient`\n- `NewDiscoveryClientForConfigOrDie(`  \n  `c *rest.Config,`\
  \  \n  `) *DiscoveryClient`  \n  – 与上一个类似，但在出错时会触发 panic，而不是返回错误。此函数可用于硬编码配置，我们希望断言其有效性。\n\
  - `NewDiscoveryClientForConfigAndClient(`  \n  `c *rest.Config,`  \n  `httpClient\
  \ *http.Client,`  \n  `) (*DiscoveryClient, error)`  \n  – 使用提供的 `rest.Config` 和\
  \ `httpClient` 返回一个 `DiscoveryClient`。\n- 上一个函数 `NewDiscoveryClientForConfig` 使用由\
  \ `rest.HTTPClientFor` 函数构建的默认 HTTP 客户端。如果你想在构建 `DiscoveryClient` 之前自定义 HTTP 客户端，可以使用此函数代替。\n\
  \n## RESTMapper\n\n你在第 5 章的“RESTMapper”一节中已经看到，API Machinery 提供了 RESTMapper 的概念，用于在\
  \ REST 资源和 Kubernetes 种类之间进行映射。\n\nAPI Machinery 还提供了 RESTMapper 的默认实现 `DefaultRESTMapper`，但需要手动添加组/版本/种类。\n\
  \nClient-go 库提供了 RESTMapper 的几种实现，利用发现客户端来提供组/版本/种类和资源的列表。\n\n### PriorityRESTMapper\n\
  \n`PriorityRESTMapper` 借助发现客户端获取 Kubernetes API 提供的所有组，并处理可能属于特定组的多个版本以及每个组的首选版本，从而返回首选版本。\n\
  \n通过调用 `restmapper.NewDiscoveryRESTMapper` 函数可以获取 `restmapper.PriorityRESTMapper`\
  \ 对象：\n\n```\nimport \"k8s.io/client-go/restmapper\"\nfunc NewDiscoveryRESTMapper(\n\
  groupResources []*APIGroupResources,\n) meta.RESTMapper\n```\n\n`groupResources`\
  \ 参数可以使用 `restmapper.GetAPIGroupResources` 函数构建：\n\n```\nfunc GetAPIGroupResources(\n\
  cl discovery.DiscoveryInterface,\n) ([]*APIGroupResources, error)\n```\n\n以下是构建\
  \ `PriorityRESTMapper` 所需的代码：\n\n```\nimport \"k8s.io/client-go/restmapper\"\ndiscoveryClient\
  \ := clientset.Discovery()\napiGroupResources, err :=\nrestmapper.GetAPIGroupResources(\n\
  discoveryClient,\n)\nif err != nil {\nreturn err\n}\nrestMapper := restmapper.NewDiscoveryRESTMapper(\n\
  apiGroupResources,\n)\n```\n\n现在你可以使用第 5 章“RESTMapper”节中定义的 RESTMapper。\n\n### DeferredDiscoveryRESTMapper\n\
  \n`DeferredDiscoveryRESTMapper` 在内部使用 `PriorityRESTMapper`，但会等到第一个请求时才初始化 RESTMapper。\n\
  \n```\nfunc NewDeferredDiscoveryRESTMapper(\ncl discovery.CachedDiscoveryInterface,\n\
  ) *DeferredDiscoveryRESTMapper\n```\n\n函数 `NewDeferredDiscoveryRESTMapper` 用于构建此类\
  \ RESTMapper，它接收一个实现了 `discovery.CachedDiscoveryInterface` 接口的对象，以获取缓存发现客户端。\n\n\
  Client-go 库提供了该接口的一个实现，由 `memory.NewMemCacheClient` 函数返回。\n\n```\nfunc NewMemCacheClient(\n\
  delegate discovery.DiscoveryInterface,\n) discovery.CachedDiscoveryInterface\n```\n\
  \n以下是构建 `DeferredDiscoveryRESTMapper` 所需的代码：\n\n```\nimport \"k8s.io/client-go/restmapper\"\
  \ndiscoveryClient := clientset.Discovery()\ndefRestMapper :=\nrestmapper.NewDeferredDiscoveryRESTMapper(\n\
  memory.NewMemCacheClient(discoveryClient),\n)\n```\n\n现在你可以使用第 5 章“RESTMapper”节中定义的\
  \ RESTMapper。\n\n## 总结\n\n在本章中，你学习了如何连接到集群以及如何获取 `Clientset`。它是一个客户端集合，每个组-版本对应一个客户端，你可以使用它在资源上执行操作（获取、列出、创建等）。\n\
  \n你还学习了 REST 客户端（`Clientset` 内部使用），开发人员可以使用它来构建更具体的请求。最后，本章涵盖了发现客户端，用于以动态方式发现 Kubernetes\
  \ API 提供的资源。\n\n下一章将介绍如何使用 Client-go 库提供的客户端伪造实现来测试使用该库编写的应用程序。\n\n\n\n"
- "# 7. 使用 Client-go 测试应用程序\n\n`Client-go` 库提供了多个可与 Kubernetes API 交互的客户端。\n\n- `kubernetes.Clientset`\
  \ 提供了一组客户端，每个客户端对应 API 的一个组/版本，用于对资源执行 Kubernetes 操作（如创建、更新、删除等）。\n- `rest.RESTClient`\
  \ 提供一个用于对资源执行 REST 操作的客户端（如获取、发布、删除等）。\n- `discovery.DiscoveryClient` 提供一个用于发现 API\
  \ 所提供资源的客户端。\n\n所有这些客户端都实现了由 Client-go 库定义的接口：`kubernetes.Interface`、`rest.Interface`\
  \ 和 `discovery.DiscoveryInterface`。\n\n此外，Client-go 库还提供了这些接口的*模拟*实现，以帮助你为函数编写单元测试。这些*模拟*实现定义在\
  \ `fake` 包中，每个包都位于*真实*实现的目录内：`kubernetes/fake`、`rest/fake` 和 `discovery/fake`。\n\
  \n`testing` 目录包含*模拟*客户端常用的通用工具——例如，对象追踪器或调用追踪系统。在本章中，你将了解到这些工具。\n\n为了能够使用这些客户端测试你的函数，函数需要定义一个参数来传递客户端实现，且该参数的类型必须是接口，而非具体类型。例如：\n\
  \n```go\nfunc CreatePod(\nctx context.Context,\nclientset kubernetes.Interface,\n\
  name string,\nnamespace string,\nimage string,\n) (pod *corev1.Pod, error)\n```\n\
  \n通过这种方式，你将在函数外部创建客户端，并在函数内部简单地使用任何实现。\n\n对于实际代码，你将按照第 6 章所述创建客户端。对于测试，你将使用 *fake*\
  \ 包中的辅助函数来替换客户端。\n\n## Fake Clientset\n\n以下函数用于创建一个*模拟*的 `Clientset`：\n\n```go\n\
  import \"k8s.io/client-go/kubernetes/fake\"\nfunc NewSimpleClientset(\nobjects ...runtime.Object,\n\
  ) *Clientset\n```\n\n*模拟* `Clientset` 由一个对象追踪器支持，该追踪器处理*创建*、*更新*和*删除*操作时不进行任何验证或变更，并在响应*获取*和*列出*操作时返回对象。\n\
  \n你可以将一组 Kubernetes 对象作为参数传递，这些对象将被添加到 Clientset 的对象追踪器中。例如，使用以下代码创建一个*模拟* `Clientset`\
  \ 并调用前面定义的 `CreatePod` 函数：\n\n```go\nimport \"k8s.io/client-go/kubernetes/fake\"\
  \nclientset := fake.NewSimpleClientset()\npod, err := CreatePod(\ncontext.Background(),\n\
  clientset,\naName,\naNs,\nanImage,\n)\n```\n\n在测试期间，调用被测函数（此处为 `CreatePod`）后，你有多种方法可以验证该函数是否按预期执行。让我们考虑一下\
  \ `CreatePod` 函数的这个实现：\n\n```go\nfunc CreatePod(\nctx context.Context,\nclientset\
  \ kubernetes.Interface,\nname string,\nnamespace string,\nimage string,\n) (pod\
  \ *corev1.Pod, err error) {\npodToCreate := corev1.Pod{\nSpec: corev1.PodSpec{\n\
  Containers: []corev1.Container{\n{\nName:  \"runtime\",\nImage: image,\n},\n},\n\
  },\n}\npodToCreate.SetName(name)\nreturn clientset.CoreV1().\nPods(namespace).\n\
  Create(\nctx,\n&podToCreate,\nmetav1.CreateOptions{},\n)\n}\n```\n\n### 检查函数结果\n\
  \n当使用*模拟* `Clientset` 调用 `CreatePod` 函数时，不会调用实际的 Kubernetes API，资源也不会在 `etcd` 数据库中生成，并且不会对资源执行任何验证或变更。相反，资源将以其原始状态存储在内存存储中，仅进行极少的转换。\n\
  \n在此示例中，传递给 `Create` 函数的 `podToCreate` 与 `Create` 函数返回的 Pod 之间唯一的转换是命名空间，该命名空间通过调用\
  \ `Pods(namespace)` 传递，并被添加到返回的 `Pod` 中。\n\n要测试 `CreatePod` 函数返回的值是否符合预期，你可以编写以下测试代码：\n\
  \n```go\nfunc TestCreatePod(t *testing.T) {\nvar (\nname      = \"a-name\"\nnamespace\
  \ = \"a-namespace\"\nimage     = \"an-image\"\nwantPod = &corev1.Pod{\nObjectMeta:\
  \ v1.ObjectMeta{\nName:      \"a-name\",\nNamespace: \"a-namespace\",\n},\nSpec:\
  \ corev1.PodSpec{\nContainers: []corev1.Container{\n{\nName:  \"runtime\",\nImage:\
  \ \"an-image\",\n},\n},\n},\n}\n)\nclientset := fake.NewSimpleClientset()\ngotPod,\
  \ err := CreatePod(\ncontext.Background(),\nclientset,\nname,\nnamespace,\nimage,\n\
  )\nif err != nil {\nt.Errorf(\"err = %v, want nil\", err)\n}\nif !reflect.DeepEqual(gotPod,\
  \ wantPod) {\nt.Errorf(\"CreatePod() = %v, want %v\",\ngotPod,\nwantPod,\n)\n}\n\
  }\n```\n\n此测试将断言：给定名称、命名空间和镜像，当 `Pod` 中未发生验证或变更时，函数的结果将是 `wantPod`。\n\n无法使用此测试来了解使用*真实*客户端时会发生什么，因为结果会不同——也就是说，*真实*客户端及其底层\
  \ API 会变更对象以添加默认值等。\n\n\n\n### 对操作作出反应\n\n*伪造的* `Clientset` 会原样存储资源，不进行任何验证或变更。在测试过程中，你可能希望模拟各种控制器对资源所做的更改。为此，*伪造的*\
  \ `clientset` 提供了添加*反应器*的方法。*反应器*是在对特定资源执行特定操作时执行的函数。\n\n除 `Watch` 和 `Proxy` 外，所有操作的反应器函数类型定义如下：\n\
  \n```\ntype ReactionFunc func(\naction Action,\n) (handled bool, ret runtime.Object,\
  \ err error)\n```\n\n`Watch` 操作的反应器函数类型定义如下：\n\n```\ntype WatchReactionFunc func(\n\
  action Action,\n) (handled bool, ret watch.Interface, err error)\n```\n\n`Proxy`\
  \ 操作的反应器函数类型定义如下：\n\n```\ntype ProxyReactionFunc func(\naction Action,\n) (\nhandled\
  \ bool,\nret restclient.ResponseWrapper,\nerr error\n)\n```\n\n*伪造的* `Clientset`\
  \ 的 `Fake` 字段维护了几个 `Reaction` 函数的列表：`ReactionChain`、`WatchReactionChain` 和 `ProxyReactionChain`。\n\
  \n每次调用对资源的操作时，反应器都会以链式方式执行。第一个返回 *true* 值 `handled` 的反应器将立即终止该链，后续的反应器将不会被调用。\n\n\
  你可以通过调用 *伪造的* `Clientset` 的 `Fake` 字段上的以下方法来注册新的 `Reaction` 函数：\n\n- `AddReactor(verb,\
  \ resource string, reaction ReactionFunc)`\n- `PrependReactor(verb, resource string,\
  \ reaction ReactionFunc)`\n- `AddWatchReactor(resource string, reaction WatchReactionFunc)`\n\
  - `PrependWatchReactor(resource string, reaction WatchReactionFunc)`\n- `AddProxyReactor(resource\
  \ string, reaction ProxyReactionFunc)`\n- `PrependProxyReactor(resource string,\
  \ reaction ProxyReactionFunc)`\n\n`verb` 和 `resource` 值用于指示将调用反应器的操作。\n\n你可以为这两个参数指定\
  \ `\"*\"` 值，以指示该反应器必须针对任何 `verb` 和/或任何 `resource` 的操作执行。请注意，`Reactor` 函数会将 `action`\
  \ 作为参数；`Reactor` 可以使用此 `action` 参数对调用的操作进行额外的过滤。\n\n当创建*伪造的* `Clientset` 时，会为两个链添加一个\
  \ `Reactor`：`ReactionChain` 和 `WatchReactionChain`。这些反应器包含*伪造的* `Clientset` 使用前文讨论过的对象跟踪器的代码。由于这些反应器的存在，例如，当你使用*伪造的*\
  \ `Clientset` 调用 `Create` 操作时，该资源将被附加到一个内存数据库中，随后对该资源调用 `Get` 操作将返回先前保存的资源。\n\n\
  如果你不想使用此默认行为，可以将这些链 `ReactionChain` 和/或 `WatchReactionChain` 重新定义为空链。请注意，这些默认反应器始终返回一个\
  \ *true* 值 `handled`；如果在默认反应器仍位于反应器列表开头时使用 `AddReactor` 或 `AddWatchReactor` 添加反应器，则这些新添加的反应器将永远不会被请求。\n\
  \n如果你希望对传入的资源进行一些验证或变更，你可以使用 `PrependReactor` 或 `PrependWatchReactor` 在反应器前添加，这样它们可以：\n\
  \n- 提前返回一个 *true* 值 `handled` 和一个要返回的特定对象值（并且默认的 `Reactor` 将不会被调用）。\n- 更改要返回的对象并返回一个\
  \ *false* 值 `handled`。被更改的对象将成为下一个反应器的源对象。\n\n例如，使用以下代码来更改已创建的 Pod，为其 `NodeName`\
  \ 字段添加一个值：\n\n```\nimport (\n\"context\"\ncorev1 \"k8s.io/api/core/v1\"\n\"k8s.io/client-go/kubernetes/fake\"\
  \n\"k8s.io/apimachinery/pkg/runtime\"\nktesting \"k8s.io/client-go/testing\"\n)\n\
  clientset := fake.NewSimpleClientset()\nclientset.Fake.PrependReactor(\"create\"\
  , \"pods\", func(\naction ktesting.Action,\n) (handled bool, ret runtime.Object,\
  \ err error) {\nact := action.(ktesting.CreateAction)\nret = act.GetObject()\npod\
  \ := ret.(*corev1.Pod)\npod.Spec.NodeName = \"node1\"\nreturn false, pod, nil\n\
  })\npod, _ := CreatePod(\ncontext.Background(),\nclientset,\nname,\nnamespace,\n\
  image,\n)\n```\n\n\n\n### 检查 Actions\n\n如果你正在使用 Go 团队提供的 `mock` 系统（[github.com/golang/mock](https://github.com/golang/mock)），你可能想以类似的方式\
  \ `mock` 对 `Client-go` 库的调用。`mock` 系统帮助你验证测试代码执行期间，是否以特定参数调用了特定函数，并返回了特定值。\n\n遵循这一原则，要评估\
  \ `CreatePod` 函数，你可能需要检查 `Clientset` 的 `Create` 函数是否以特定参数被调用。为此，`fake` Clientset\
  \ 会记录在其上执行的所有 `Actions`，你可以访问这些 `Actions` 来检查它们是否符合你的预期。\n\n在执行待评估的代码后，你可以通过以下调用访问\
  \ `Actions`：\n\n```\nactions := clientset.Actions()\n```\n\n该调用返回一个对象列表，这些对象实现了以下\
  \ `Action` 接口：\n\n```\ntype Action interface {\nGetNamespace() string\nGetVerb()\
  \ string\nGetResource() schema.GroupVersionResource\nMatches(verb, resource string)\
  \ bool\n[...]\n}\n```\n\n在第 6 章的“使用 Clientset”部分，你了解了在资源上执行操作的模式（对于非命名空间资源，省略命名空间）如下：\n\
  \n- `GetNamespace()` – `Action` 上的此方法返回调用中指定的 `namespace`。\n- `GetVerb()` – `Action`\
  \ 上的此方法返回调用中使用的 `Operation`。\n- `GetResource()` – `Action` 上的此方法返回一个 `GVR`，由调用中使用的\
  \ `GroupVersion` 和 `Resource` 构建。\n- `Matches(verb, resource string)` – 检查 `verb`\
  \ 和 `resource` 是否与调用中使用的 `Operation` 和 `Resource` 匹配。\n\n```\nclientset.\nGroupVersion().\n\
  Resource(namespace).\nOperation(ctx, options)\n```\n\n使用这四个方法，你可以检查在 `Clientset`\
  \ 上执行的操作是否符合你的预期。\n\n在检查 `Action` 的 Verb 之后，你可以将其转换为与 `Verb` 相关的接口之一：`GetAction`、`ListAction`、`CreateAction`、`UpdateAction`、`DeleteAction`、`DeleteCollectionAction`、`PatchAction`、`WatchAction`、`ProxyGetAction`\
  \ 和 `GenericAction`。\n\n这些接口提供了更多方法来获取特定于 `Operation` 的信息。\n\n- **GetAction 接口**\
  \ – 定义如下：\n\n```\ntype GetAction interface {\nAction\nGetName() string\n}\n```\n\
  \n如第 6 章的“获取资源信息”部分所示，执行 `Get` 操作的方法签名是：\n\n- `Get(ctx context.Context, name string,\
  \ opts metav1.GetOptions)` – `GetAction` 接口中的 `GetName()` 方法将返回作为参数传递给 `Get` 方法的\
  \ `name`。\n\n- **ListAction 接口** – 定义如下：\n\n```\ntype ListRestrictions struct {\n\
  Labels labels.Selector\nFields fields.Selector\n}\n\ntype ListAction interface {\n\
  Action\nGetListRestrictions() ListRestrictions\n}\n```\n\n如第 6 章的“获取资源列表”部分所示，执行\
  \ `List` 操作的方法签名是：\n\n- `List(ctx context.Context, opts metav1.ListOptions)` – 其中\
  \ `ListOptions` 定义如下：\n\n```\ntype ListOptions struct {\nLabelSelector string\n\
  FieldSelector string\n[...]\n}\n```\n\n`ListAction` 接口中的 `GetListRestrictions()`\
  \ 方法将返回通过 `ListOptions` 结构体作为参数传递给 `List` 方法的 `LabelSelector` 和 `FieldSelector`。\n\
  \n- **CreateAction 接口** – 定义如下：\n\n```\ntype CreateAction interface {\nAction\n\
  GetObject() runtime.Object\n}\n```\n\n如第 6 章的“创建资源”部分所示，执行 `Create` 操作的方法签名如下（此处以\
  \ `Pods` 为例）：\n\n- `Create(ctx context.Context, pod *v1.Pod, opts metav1.CreateOptions)`\n\
  \n\n\n- `GetObject()`方法来自`CreateAction`接口，会返回作为参数传递给`Create`方法的对象（这里是`pod`）\n\n\
  - **`UpdateAction`接口** – 定义如下：\n\n```go\ntype UpdateAction interface {\n    Action\n\
  \    GetObject() runtime.Object\n}\n```\n\n如第 6 章“更新资源”部分所示，执行`Update`操作的方法签名（这里是针对`Pods`）：\n\
  \n- `Update(ctx context.Context, pod *v1.Pod, opts metav1.UpdateOptions)`\n\n- `GetObject()`方法来自`UpdateAction`接口，会返回作为参数传递给`Update`方法的对象（这里是`pod`）\n\
  \n- **`DeleteAction`接口** – 代码如下：\n\n```go\ntype DeleteAction interface {\n    Action\n\
  \    GetName() string\n    GetDeleteOptions() metav1.DeleteOptions\n}\n```\n\n如第\
  \ 6 章“删除资源”部分所示，执行`Delete`操作的方法签名如下：\n\n- `Delete(ctx context.Context, name string,\
  \ opts metav1.DeleteOptions)`\n\n- `GetName()`方法来自`DeleteAction`接口，会返回作为参数传递给`Delete`方法的名称（`name`）\n\
  \n- `GetDeleteOptions()`\n\n- 方法来自`DeleteAction`接口，会返回作为参数传递给`Delete`方法的`opts`\n\
  \n- **`DeleteCollectionAction`接口** – 定义如下：\n\n- `type ListRestrictions struct {`\n\
  \n```go\ntype DeleteCollectionAction interface {\n    Action\n    GetListRestrictions()\
  \ ListRestrictions\n}\n```\n\n```go\nLabels  labels.Selector\nFields  fields.Selector\n\
  }\n```\n\n如第 6 章“删除资源集合”部分所示，执行`DeleteCollection`操作的方法签名是：\n\n- `DeleteCollection(ctx\
  \ context.Context, opts metav1.DeleteOptions, listOpts metav1.ListOptions)` – 其中`ListOptions`定义如下：\n\
  \n- `GetListRestrictions()`方法来自`DeleteCollectionAction`接口，会返回通过`ListOptions`结构传递给`DeleteCollection`方法的`LabelSelector`和`FieldSelector`\n\
  \n- **`PatchAction`接口** – 定义如下：\n\n```go\ntype ListOptions struct {\n    LabelSelector\
  \ string\n    FieldSelector string\n    [...]\n}\n```\n\n```go\ntype PatchAction\
  \ interface {\n    Action\n    GetName() string\n    GetPatchType() types.PatchType\n\
  \    GetPatch() []byte\n}\n```\n\n如第 6 章“使用策略合并补丁更新资源”和“在服务端应用资源”部分所示，执行`Patch`操作的方法签名是：\n\
  \n- `GetName()`方法来自`PatchAction`接口，会返回作为参数传递给`Patch`方法的名称（`name`）\n\n- `GetPatchType()`方法来自`PatchAction`接口，会返回作为参数传递给`Patch`方法的`pt`\n\
  \n- `GetPatch()`方法来自`PatchAction`接口，会返回作为参数传递给`Patch`方法的`data`\n\n- **`WatchAction`接口**\
  \ – 定义如下：\n\n```go\nPatch(\n    ctx context.Context,\n    name string,\n    pt types.PatchType,\n\
  \    data []byte,\n    opts metav1.PatchOptions,\n    subresources ...string,\n\
  )\n```\n\n- `type WatchRestrictions struct {`\n\n```go\ntype WatchAction interface\
  \ {\n    Action\n    GetWatchRestrictions() WatchRestrictions\n}\n```\n\n- 如第 6\
  \ 章“监控资源”部分所示，执行`Watch`操作的方法签名是：\n\n- `Watch(ctx context.Context, opts metav1.ListOptions)`\n\
  \n- `GetWatchRestrictions()`方法来自`WatchAction`接口，会返回通过`ListOptions`结构传递给`Watch`方法的`LabelSelector`、`FieldSelector`和`ResourceVersion`\n\
  \n```go\nLabels          labels.Selector\nFields          fields.Selector\nResourceVersion\
  \ string\n}\n```\n\n以下示例展示了如何使用`Action`和`CreateAction`接口及其方法来测试`CreatePod`函数：\n\n\
  - ➊ 创建一个`fake` `Clientset`\n- ➋ 调用`CreatePod`函数进行测试\n- ➌ 获取函数执行期间执行的操作\n- ➍ 断言操作数量\n\
  - ➎ 获取执行期间执行的第一个且唯一的操作\n- ➏ 断言操作中传递的命名空间（`namespace`）值\n- ➐ 断言操作中使用的动词（`Verb`）和资源（`Resource`）\n\
  - ➑ 将`Action`转换为`CreateAction`接口\n- ➒ 断言`CreateAction`中传递的对象值\n\n```go\nimport (\n\
  \    \"context\"\n    \"reflect\"\n    \"testing\"\n    corev1 \"k8s.io/api/core/v1\"\
  \n    metav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n    \"k8s.io/client-go/kubernetes/fake\"\
  \n    ktesting \"k8s.io/client-go/testing\"\n)\nfunc TestCreatePodActions(t *testing.T)\
  \ {\n    var (\n        name      = \"a-name\"\n        namespace = \"a-namespace\"\
  \n        image     = \"an-image\"\n        wantPod = &corev1.Pod{\n           \
  \ ObjectMeta: metav1.ObjectMeta{\n                Name: \"a-name\",\n          \
  \  },\n            Spec: corev1.PodSpec{\n                Containers: []corev1.Container{\n\
  \                    {\n                        Name:  \"runtime\",\n          \
  \              Image: \"an-image\",\n                    },\n                },\n\
  \            },\n        }\n        wantActions = 1\n    )\n    clientset := fake.NewSimpleClientset()\
  \           // ➊\n    _, _ = CreatePod(                                    // ➋\n\
  \        context.Background(),\n        clientset,\n        name,\n        namespace,\n\
  \        image,\n    )\n    actions := clientset.Actions()                     //\
  \ ➌\n    if len(actions) != wantActions {                     // ➍\n        t.Errorf(\"\
  # actions = %d, want %d\",\n            len(actions),\n            wantActions,\n\
  \        )\n    }\n    action := actions[0]                               // ➎\n\
  \    actionNamespace := action.GetNamespace()          // ➏\n    if actionNamespace\
  \ != namespace {\n        t.Errorf(\"action namespace = %s, want %s\",\n       \
  \     actionNamespace,\n            namespace,\n        )\n    }\n    if !action.Matches(\"\
  create\", \"pods\") {          // ➐\n        t.Errorf(\"action verb = %s, want create\"\
  ,\n            action.GetVerb(),\n        )\n        t.Errorf(\"action resource\
  \ = %s, want pods\",\n            action.GetResource().Resource,\n        )\n  \
  \  }\n    createAction := action.(ktesting.CreateAction)     // ➑\n    obj := createAction.GetObject()\
  \                     // ➒\n    if !reflect.DeepEqual(obj, wantPod) {\n        t.Errorf(\"\
  create action object = %v, want %v\",\n            obj,\n            wantPod,\n\
  \        )\n    }\n}\n```\n\n\n\n## 伪造 REST 客户端\n\n在 Client-go 库的 `rest/fake` 包中提供了一个*伪造*的\
  \ `RESTClient` 结构体。该结构体定义如下：\n\n```go\nimport \"k8s.io/client-go/rest/fake\"\ntype\
  \ RESTClient struct {\nNegotiatedSerializer runtime.NegotiatedSerializer\nGroupVersion\
  \         schema.GroupVersion\nVersionedAPIPath     string\nErr error\nReq *http.Request\n\
  Client *http.Client\nResp *http.Response\n}\n```\n\n`NegotiatedSerializer` 字段接受一个\
  \ Codec。你需要使用 Client-go 库提供的 Codec，以便能够对来自 Kubernetes API 的资源进行编码和解码。\n\nClient-go\
  \ 库中的 `RESTClient` 是特定于一个组（Group）和版本（Version）的。你可以通过 `GroupVersion` 字段来指定组和版本。\n\
  \n`VersionedAPIPath` 可用于指定 API 路径的前缀。其他字段则用于模拟请求的结果：\n\n-   如果 `Err` 不为 nil，那么对于使用该\
  \ `RESTClient` 的任何调用，都会立即返回此错误。\n-   否则，如果 `Client` 不为 nil，则会使用此 `http.Client` 为使用该\
  \ `RESTClient` 的任何调用发起 HTTP 请求。\n-   再否则，`Resp` 将作为对使用该 `RESTClient` 的任何调用的响应返回。\n\
  \n通过 `Err` 和 `Resp` 字段，你可以硬编码对 `RESTClient` 的调用结果，要么返回特定的错误，要么返回特定的响应。\n\n使用 `Client`\
  \ 字段，你可以编写一些高级代码，这些代码会根据请求返回特定的结果，或基于请求进行一些计算，等等。例如，下面是一个使用 `RESTClient` 从特定命名空间\
  \ `getPods` 的函数：\n\n```go\nfunc getPods(\nctx context.Context,\nrestClient rest.Interface,\n\
  ns string,\n) ([]corev1.Pod, error) {\nresult := corev1.PodList{}\nerr := restClient.Get().\n\
  Namespace(ns).\nResource(\"pods\").\nDo(ctx).\nInto(&result)\nif err != nil {\n\
  return nil, err\n}\nreturn result.Items, nil\n}\n```\n\n要从你的代码中调用此函数，你需要从 Clientset\
  \ 提供一个 `RESTClient`——例如，使用以下代码：\n\n```go\nrestClient := clientset.CoreV1().RESTClient()\n\
  pods, err := getPods(\ncontext.Background(),\nrestClient,\n\"default\",\n)\n```\n\
  \n为了评估函数在返回特定值时的行为，你应该改用*伪造*的 `RESTClient`。例如，要断言当 `RESTClient` 调用返回错误时函数的结果，你可以创建这个*伪造的*\
  \ `RESTClient`：\n\n```go\nimport (\n\"context\"\n\"errors\"\ncorev1 \"k8s.io/api/core/v1\"\
  \n\"k8s.io/client-go/kubernetes/scheme\"\n\"k8s.io/client-go/rest/fake\"\n)\nrestClient\
  \ := &fake.RESTClient{\nGroupVersion:               corev1.SchemeGroupVersion,\n\
  NegotiatedSerializer:      scheme.Codecs,\nErr: errors.New(\"an error from the rest\
  \ client\"),\n}\npods, err := getPods(\ncontext.Background(),\nrestClient,\n\"default\"\
  ,\n)\n```\n\n另一个例子，要断言当调用返回 NotFound（404）状态时函数的结果，你可以定义以下*伪造的* `RESTClient`：\n\n\
  ```go\nimport (\n\"net/http\"\ncorev1 \"k8s.io/api/core/v1\"\n\"k8s.io/client-go/kubernetes/scheme\"\
  \n\"k8s.io/client-go/rest/fake\"\n)\nrestClient := &fake.RESTClient{\nGroupVersion:\
  \         corev1.SchemeGroupVersion,\nNegotiatedSerializer: scheme.Codecs,\nErr:\
  \ nil,\nResp: &http.Response{\nStatusCode: http.StatusNotFound,\n},\n}\n```\n\n\
  ## FakeDiscovery 客户端\n\n在 Client-go 库的 `discovery/fake` 包中定义了一个 `FakeDiscovery`\
  \ 结构体。该结构体定义如下：\n\n```go\ntype FakeDiscovery struct {\n*testing.Fake\nFakedServerVersion\
  \ *version.Info\n}\n```\n\n可以从*伪造的* Clientset 中访问此类 `FakeDiscovery` 客户端的实现：\n\n\
  ```go\nimport (\n\"k8s.io/client-go/kubernetes/fake\"\nfakediscovery \"k8s.io/client-go/discovery/fake\"\
  \n)\nclientset := fake.NewSimpleClientset()\ndiscoveryClient, ok :=\nclientset.Discovery().(*fakediscovery.FakeDiscovery)\n\
  if !ok {\nt.Fatalf(\"couldn't convert Discovery() to *FakeDiscovery\")\n}\n```\n\
  \n### 存根 ServerVersion\n\n`FakeDiscovery` 结构体提供了一个 `FakedServerVersion` 字段，你可以用它来模拟由\
  \ `discovery.DiscoveryInterface` 的 `ServerVersion()` 方法返回的服务器版本。例如，下面是一个你应该测试的函数，它检查服务器版本是否至少是所提供的版本：\n\
  \n```go\nfunc checkMinimalServerVersion(\nclientset kubernetes.Interface,\nminMinor\
  \ int,\n) (bool, error) {\ndiscoveryClient := clientset.Discovery()\ninfo, err :=\
  \ discoveryClient.ServerVersion()\nif err != nil {\nreturn false, err\n}\nmajor,\
  \ err := strconv.Atoi(info.Major)\nif err != nil {\nreturn false, err\n}\nminor,\
  \ err := strconv.Atoi(info.Minor)\nif err != nil {\nreturn false, err\n}\nreturn\
  \ major == 1 && minor >= minMinor, nil\n}\n```\n\n现在，你可以在 Discovery 客户端返回特定版本（此处为\
  \ 1.10）时断言函数的结果。\n\n作为练习，你可以使用表驱动测试重写此测试函数，以便能够测试函数针对各种服务器版本值的结果。\n\n```go\nfunc\
  \ Test_getServerVersion(t *testing.T) {\nclient := fake.NewSimpleClientset()\nfakeDiscovery,\
  \ ok := client.Discovery().(*fakediscovery.FakeDiscovery)\nif !ok {\nt.Fatalf(\"\
  couldn't convert Discovery() to *FakeDiscovery\")\n}\nfakeDiscovery.FakedServerVersion\
  \ = &version.Info{\nMajor: \"1\",\nMinor: \"10\",\n}\nres, err := checkMinimalServerVersion(client,\
  \ 20)\nif res != true && err != nil {\nt.Error(err)\n}\n}\n```\n\n### 动作\n\n*伪造的*\
  \ Discovery 客户端的方法 `ServerVersion`、`ServerGroups`、`ServerResourcesForGroupVersion`\
  \ 和 `ServerGroupsAndResources` 都使用了*伪造的* Clientset 所使用的*动作（Actions）*概念，如本章的“对动作做出反应”和“检查动作”部分所述。\n\
  \n为了评估你的函数对这些方法的使用，你可以通过添加反应器或检查执行的动作，来断言 Discovery 客户端执行的动作。请注意，这些方法使用的动词（Verb）和资源（Resource）是：\n\
  \n-   `ServerVersion` – `\"get\"`, `\"version\"`\n-   `ServerGroups` – `\"get\"\
  `, `\"group\"`\n-   `ServerResourcesForGroupVersion` – `\"get\"`, `\"resource\"\
  `\n-   `ServerGroupsAndResources` – `\"get\"`, `\"group\"` 和 `\"get\"`, `\"resource\"\
  `\n\n### 模拟资源\n\n对于真实实现，`ServerGroups`、`ServerResourcesForGroupVersion` 和 `ServerGroupsAndResources`\
  \ 方法依赖于 API 服务器定义的组和资源。\n\n对于*伪造的*实现，这些方法依赖于*伪造的* Clientset 的 `Fake` 字段中的 `Resources`\
  \ 字段。要使用各种组和资源值来模拟这些方法的结果，你可以在调用这些方法之前填充此 `Resources` 字段。\n\n## 结论\n\n本章展示了如何使用\
  \ Clientset、REST 客户端和 Discovery 客户端的*伪造的*实现；所有这些都有助于为使用 Client-go 库的函数编写单元测试。\n\n\
  这结束了本书的第一部分，该部分涵盖了用于处理原生 Kubernetes 资源的库。在接下来的章节中，你将学习如何通过创建自定义资源来扩展 Kubernetes\
  \ API。\n\n\n\n"
- '# 8. 使用自定义资源定义扩展 Kubernetes API


  在本书的第一部分，你已经了解到 Kubernetes API 是按组来组织的。每个组包含一个或多个资源，每个资源都有不同的版本。


  为了在 Go 中操作 Kubernetes API，存在两个基础库。API 机制库^(¹) 提供了与 API 通信的工具，这些工具独立于 API 所服务的资源。API
  库^(²) 则提供了 Kubernetes API 中原生资源的定义，以便与 API 机制库配合使用。


  `Client-go` 库利用 API 机制库和 API 库，提供了访问 Kubernetes API 的途径。


  Kubernetes API 可以通过其自定义资源定义（CRD）机制进行扩展。


  `CustomResourceDefinition` 是一种特定的 Kubernetes 资源，用于以动态方式定义由 API 提供的新 Kubernetes 资源。


  为 Kubernetes 定义新资源，用于表示*领域特定资源*，例如数据库、CI/CD 任务或证书。


  结合自定义控制器，这些自定义资源可以由控制器在集群中实现。


  与其他资源一样，你可以对这种资源执行获取、列表、创建、删除和更新操作。CRD 资源是一种非命名空间资源。


  该 CRD 资源定义在 `apiextensions.k8s.io/v1` 组和版本中。访问该资源的 HTTP 路径遵循访问非核心和非命名空间资源的标准格式：`/apis/<组>/<版本>/<资源复数名称>`，即
  `/apis/apiextensions.k8s.io/v1/customresourcedefinitions/`。


  与其他原生资源不同，此资源的 Go 定义并未声明在 API 库中，而是声明在 `apiextensions-apiserver` 库中。要从 Go 源码中访问这些定义，你需要使用以下导入语句：


  ```

  import (

  "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1"

  )

  ```


  ## 在 Go 中执行操作


  要使用 Go 对 CRD 资源执行操作，你可以使用 clientset，它类似于 `client-go` 库提供的 clientset，但包含在 `apiextensions-apiserver`
  库中。


  要使用此 clientset，你需要使用以下导入语句：


  ```

  import (

  "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

  )

  ```


  你可以像使用 `Client-go` 的 Clientset 一样，以完全相同的方式使用此 CRD clientset。


  例如，下面展示了如何列出集群中声明的 CRD：


  ```

  import (

  "context"

  "fmt"

  "k8s.io/apiextensions-apiserver/pkg/client/clientset/clientset"

  metav1 "k8s.io/apimachinery/pkg/apis/meta/v1"

  )

  // config 是 client-go 中定义的标准 rest.Config

  clientset, err := clientset.NewForConfig(config)

  if err != nil {

  return err

  }

  ctx := context.Background()

  list, err := clientset.ApiextensionsV1().

  CustomResourceDefinitions().

  List(ctx, metav1.ListOptions{})

  ```


  ## 深入了解 CustomResourceDefinition


  `CustomResourceDefinition` Go 结构的定义如下：


  ```

  type CustomResourceDefinition struct {

  metav1.TypeMeta

  metav1.ObjectMeta

  Spec CustomResourceDefinitionSpec

  Status CustomResourceDefinitionStatus

  }

  ```


  与其他任何 Kubernetes 资源一样，CRD 资源嵌入了 `TypeMeta` 和 `ObjectMeta` 结构。`ObjectMeta` 字段中的 `Name`
  值必须等于 `<Spec.Names.Plural>` + `"."` + `<Spec.Group>`。


  与由控制器或 Operator 管理的资源类似，该资源包含一个用于定义期望状态的 `Spec` 结构，以及一个用于包含由控制器或 Operator 描述的该资源状态的结构
  `Status`。


  ```

  type CustomResourceDefinitionSpec struct {

  Group           string

  Scope           ResourceScope

  Names           CustomResourceDefinitionNames

  Versions        []CustomResourceDefinitionVersion

  Conversion      *CustomResourceConversion

  PreserveUnknownFields bool

  }

  ```


  Spec 的 `Group` 字段指明了资源所在的组名。


  `Scope` 字段指明资源是否具有命名空间。`ResourceScope` 类型包含两个值：`ClusterScoped` 和 `NamespaceScoped`。


  ### 命名资源


  `Names` 字段指明了资源的各种名称及其相关信息。Kubernetes API 的发现机制会使用这些信息，以便将 CRD 包含在发现调用的结果中。`CustomResourceDefinitionNames`
  类型定义如下：


  ```

  type CustomResourceDefinitionNames struct {

  Plural         string

  Singular       string

  ShortNames     []string

  Kind           string

  ListKind       string

  Categories     []string

  }

  ```


  `Plural` 是资源的小写复数名称，用于 URL 中访问该资源，例如 `pods`。此字段为必填项。


  `Singular` 是资源的小写单数名称，例如 `pod`。此字段为可选项，如果未指定，则使用 `Kind` 字段的小写值。


  `ShortNames` 是资源的小写短名称列表，可用于在诸如 `kubectl get <短名称>` 的命令中调用该资源。例如，`services` 资源声明了短名称
  `svc`，因此你可以执行 `kubectl get svc` 来代替 `kubectl get services`。


  `Kind` 是资源的*驼峰式*单数名称，用于资源序列化，例如 `Pod` 或 `ServiceAccount`。此字段为必填项。


  `ListKind` 是用于该资源列表序列化的名称，例如 `PodList`。此字段为可选项，如果未指定，则使用 `Kind` 值加上 `List` 后缀。


  `Categories` 是该资源所属的已分组资源的列表，可供诸如 `kubectl get <类别>` 的命令使用。`all` 类别是众所周知的，但也存在其他类别（`api-extensions`），并且你可以定义自己的类别名称。




  ### 资源版本的定义


  到目前为止提供的所有信息对所有版本的资源均有效。


  `Versions` 字段包含版本特定信息，以定义列表的形式存在，每个版本的资源对应一个定义。`CustomResourceDefinitionVersion`
  类型的定义如下：


  ```

  type CustomResourceDefinitionVersion struct {

  Name                      string

  Served                    bool

  Storage                   bool

  Deprecated                bool

  DeprecationWarning        *string

  Schema                    *CustomResourceValidation

  Subresources              *CustomResourceSubresources

  AdditionalPrinterColumns  []CustomResourceColumnDefinition

  }

  ```


  `Name` 表示版本名称。Kubernetes 资源使用标准格式表示版本：`v<number>[(alpha|beta)<number>]`，但你可以使用任何你想要的格式。


  `Served` 布尔值指示此特定版本是否必须由 API Server 提供服务。如果不是，该版本仍然被定义并可用作存储（见下文），但用户不能以该特定版本创建或获取资源实例。


  `Storage` 布尔值指示此特定版本是否用于持久化资源。必须恰好有一个版本将此字段设置为 true。你已经在第 5 章的“转换”部分看到，同一资源的不同版本之间存在转换函数。用户可以在任何可用的版本中创建资源，API
  Server 会将其转换为 `Storage=true` 的版本，然后再将数据持久化到 `etcd` 中。


  `Deprecated` 布尔值指示此特定版本的资源是否已被弃用。如果为 true，服务器将在对此版本的响应中添加一个 Warning 头。


  `DeprecationWarning` 是当 `Deprecated` 为 true 时返回给调用者的警告消息。如果 `Deprecated` 为 true
  且此字段为 nil，则会发送一条默认警告消息。


  `Schema` 描述此资源版本的架构。该架构用于验证在创建或更新资源时发送到 API 的数据。此字段是可选的。架构将在“资源的架构”一节中更详细地讨论。


  `Subresources` 定义为该资源版本提供的子资源。此字段是可选的。此字段的类型定义如下：


  - 如果 `Status` 不为 nil，则将提供 “/status” 子资源。

  - 如果 `Scale` 不为 nil，则将提供 “/scale” 子资源。


  ```

  type CustomResourceSubresources struct {

  Status *CustomResourceSubresourceStatus

  Scale *CustomResourceSubresourceScale

  }

  ```


  `AdditionalPrinterColumns` 是当用户请求 Table 输出格式时要返回的额外列的列表。此字段是可选的。有关 Table 输出格式的更多信息，请参见第
  2 章的“获取结果为表格”一节。你将看到如何在本章的“额外打印列”一节中定义额外的打印列。


  ### 版本间转换


  `Conversion` 指示如何处理此资源版本间的转换。此字段的类型定义如下：


  ```

  type CustomResourceConversion struct {

  Strategy ConversionStrategyType

  Webhook *WebhookConversion

  }

  ```


  `Strategy` 可以取 `NoneConverter` 或 `WebhookConverter` 值。`NoneConverter` 值指示 API Server
  在持久化之前仅更改 `APIVersion` 字段。


  `WebhookConverter` 值指示 API Server 调用外部 webhook 来进行转换。当使用此值时，`Webhook` 字段需要包含 API
  Server 调用 webhook 所需的全部信息。


  ## 资源的架构


  特定版本的资源架构是使用 OpenAPI v3 架构格式定义的。^(³) 对该格式的完整描述超出了本书的范围。以下是一个简短的介绍，可以帮助你为你的资源定义一个架构。


  自定义资源通常有一个 `Spec` 部分和一个 `Status` 部分。为此，你需要声明一个类型为 `object` 的顶层架构，并使用 `properties`
  属性声明字段。在此示例中，顶层架构将具有 `Spec` 和 `Status` 属性。然后你可以递归地描述每个属性。


  `Spec` 和 `Status` 字段也属于 `object` 类型，并且包含属性。可接受的数据类型包括：


  - `string`

  - `number`

  - `integer`

  - `boolean`

  - `array`

  - `object`


  可以为 `string` 和 `number` 类型指定特定格式：


  - `string`: date, date-time, byte, int-or-string

  - `number`: float, double, int32, int64


  在一个对象中，必需的字段使用 `required` 属性指示。


  你可以使用 `enum` 属性声明一个属性仅接受一组值。要声明一个值映射（map），你需要使用 `object` 类型并指定 `additionalProperties`
  属性。此属性可以接受一个 `true` 值（表示条目可以具有任何类型），或者通过给出一个类型作为值来定义映射中条目的类型：


  ```

  type: object

  additionalProperties:

  type: string

  ```


  或者：


  ```

  type: object

  additionalProperties:

  type: object

  properties:

  code:

  type: integer

  text:

  type: string

  ```


  当声明一个数组时，你必须定义数组项的类型：


  ```

  type: array

  items:

  type: string

  ```


  例如，这是一个自定义资源的架构，它在 `Spec` 中包含三个字段（`image`、`replicas` 和 `port`），并在 `Status` 中包含一个
  `state` 字段。


  ```

  schema:

  openAPIV3Schema:

  type: object

  properties:

  spec:

  type: object

  properties:

  image:

  type: string

  replicas:

  type: integer

  port:

  type: string

  format: int-or-string

  required: [image,replicas]

  status:

  type: object

  properties:

  state:

  type: string

  enum: [waiting,running]

  ```




  ### 部署自定义资源定义


  要在集群中部署新的资源定义，需要对 CRD 对象执行 `Create` 操作。你可以使用 `apiextensions-apiserver` 库提供的 `Clientset`，并利用前面章节介绍的结构体在
  Go 中编写资源定义；或者，也可以创建一个 YAML 文件，并使用 `kubectl` 进行“应用”。


  作为示例，你将使用 YAML 格式和 `kubectl` 在 `mygroup.example.com` 组中创建一个名为 `myresources` 的新资源，其版本为
  `v1alpha1`。


  - ❶ CRD 资源的组和版本

  - ❷ CRD 资源的 `kind`

  - ❸ 新资源的完整名称，包括其所属组

  - ❹ 新资源所属的组

  - ❺ 新资源可以在特定命名空间内创建

  - ❻ 新资源的复数名称，用于访问此新资源的路径

  - ❼ 资源的单数名称，可以使用 `kubectl get myresource`

  - ❽ 新资源的短名称，可以使用 `kubectl get my`、`kubectl get myres`

  - ❾ 将资源添加到 `all` 类别中；运行 `kubectl get all` 时，将显示此 kind 的资源

  - ❿ `v1alpha1` 版本是为新资源定义的唯一版本

  - ⓫ 将新资源的模式(schema)定义为对象，且不包含任何字段


  ```

  apiVersion: apiextensions.k8s.io/v1        ❶

  kind: CustomResourceDefinition             ❷

  metadata:

  name: myresources.mygroup.example.com    ❸

  spec:

  group: mygroup.example.com               ❹

  scope: Namespaced                        ❺

  names:

  plural: myresources                    ❻

  singular: myresource                   ❼

  shortNames:

  - my                                   ❽

  - myres

  kind: MyResource

  categories:

  - all                                  ❾

  versions:

  - name: v1alpha1                         ❿

  served: true

  storage: true

  schema:

  openAPIV3Schema:

  type: object                       ⓫

  ```


  现在，你可以使用 `kubectl` 通过以下命令“应用”此资源：


  ```

  $ kubectl apply -f myresource.yaml

  customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com created

  ```


  从此以后，你就可以操作这个新资源了。


  例如，你可以使用 HTTP 请求获取集群范围或特定命名空间内的资源列表（在运行这些命令之前，需要在另一个终端执行 `kubectl proxy`）：


  ```

  $ curl

  http://localhost:8001/apis/mygroup.example.com/v1alpha1/myresources

  {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186523407"}}

  $ curl

  http://localhost:8001/apis/mygroup.example.com/v1alpha1/namespaces/default/myresources

  {"apiVersion":"mygroup.example.com/v1alpha1","items":[],"kind":"MyResourceList","metadata":{"continue":"","resourceVersion":"186524840"}}

  ```


  或者，你也可以使用 `kubectl` 获取这些列表：


  ```

  $ kubectl get myresources

  No resources found in default namespace.

  ```


  你可以使用 YAML 格式定义一个新资源，并使用 `kubectl` 将其“应用”到集群：


  ```

  $ kubectl apply -f - <<EOF

  apiVersion: mygroup.example.com/v1alpha1

  kind: MyResource

  metadata:

  name: myres1

  EOF

  $ kubectl get myresources

  NAME     AGE

  myres1   10s

  ```


  ## 附加打印列(Additional Printer Columns)


  从之前的 `kubectl get myresources` 命令输出中可以看到，显示的列是资源的*名称*和*年龄*。


  CRD 规约中的 `AdditionalPrinterColumns` 字段用于指定在 `kubectl get <resource>` 的输出中希望显示资源的哪些列。


  当未定义附加打印列时，默认返回*名称*和*年龄*。如果你指定了列，它们将与*名称*一起返回。如果希望在添加列时保留*年龄*，则需要显式地添加它。


  对于每个附加列，你需要指定名称(name)、JSON 路径(JSON path)和类型(type)。名称将用作输出中该列的标题，JSON 路径用于 API 服务器从资源数据中获取该列的值，类型则指示
  `kubectl` 如何显示此数据。


  下面是一个示例，展示了在 `Spec` 和 `Status` 中定义了一些字段的 `myresource` CRD，同时定义了附加打印列：


  ```

  apiVersion: apiextensions.k8s.io/v1

  kind: CustomResourceDefinition

  metadata:

  name: myresources.mygroup.example.com

  spec:

  group: mygroup.example.com

  scope: Namespaced

  names:

  plural: myresources

  singular: myresource

  shortNames:

  - my

  - myres

  kind: MyResource

  categories:

  - all

  versions:

  - name: v1alpha1

  served: true

  storage: true

  subresources:

  status: {}

  schema:

  openAPIV3Schema:

  type: object

  properties:

  spec:

  type: object

  properties:

  image:

  type: string

  memory:

  x-kubernetes-int-or-string: true

  status:

  type: object

  properties:

  state:

  type: string

  additionalPrinterColumns:

  - name: image

  jsonPath: .spec.image

  type: string

  - name: memory

  jsonPath: .spec.memory

  type: string

  - name: age

  jsonPath: .metadata.creationTimestamp

  type: date

  ```


  在此 CRD 中，模式(schema)表明资源的数据将是一个包含两个属性 `spec` 和 `status` 的对象。这些属性本身也是对象。`spec` 对象包含两个属性：类型为
  `string` 的 `image`，以及特殊类型 `int or string` 的 `memory`。`status` 对象包含一个类型为 `string`
  的属性 `state`。


  请注意，你通过在 `subresources` 对象中添加 `status` 条目启用了 `status` 子资源。你为此 CRD 定义了三个附加打印列：`image`、`memory`
  和 `age`。`image` 和 `memory` 的 JSON 路径指向模式中定义的字段，而 `age` 的 JSON 路径指向标准 `metadata`
  字段中的一个字段。


  再次将 CRD 应用到集群后，你可以使用这些字段定义一个新资源，将资源定义应用到集群，并使用 `kubectl` 获取资源列表：


  - ❶ CRD 更新了新的模式和附加打印列

  - ❷ 为 `image` 字段提供了一个值

  - ❸ 为 `memory` 字段提供了一个值；这是一个字符串

  - ❹ 自定义资源已更新，包含了定义的新字段

  - ❺ `kubectl get` 的输出现在显示了附加列


  ```

  $ kubectl apply -f myresource.yaml

  customresourcedefinition.apiextensions.k8s.io/myresources.mygroup.example.com configured                              ❶

  $ cat > myres1.yaml <<EOF

  apiVersion: mygroup.example.com/v1alpha1

  kind: MyResource

  metadata:

  name: myres1

  spec:

  image: nginx                              ❷

  memory: 1024Mi                            ❸

  EOF

  $ kubectl apply -f myres1.yaml              ❹

  myresource.mygroup.example.com/myres1 configured

  $ kubectl get myresources

  NAME     IMAGE   MEMORY   AGE

  myres1   nginx   1024Mi   12m               ❺

  ```


  ## 结论


  在本章中，你了解了通过在集群中创建 `CustomResourceDefinition` (CRD) 资源可以扩展 Kubernetes API 提供的资源列表。你了解了此
  CRD 资源在 Go 中的结构，以及如何使用专用的 `Clientset` 操作 CRD 资源。


  随后，你了解了如何用 YAML 编写 CRD 以及如何使用 `kubectl` 将其部署到集群。然后向 CRD 模式中添加了一些字段，以及一些附加打印列，以便在
  `kubectl get` 的输出中显示这些字段。


  最后，你了解到只要在集群中创建了 CRD，就可以开始操作新关联 kind 的资源。


