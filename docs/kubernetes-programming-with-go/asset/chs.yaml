  \ 和 `etcd`，但不会运行任何控制器。这意味着当你想要测试的 Operator 创建 Kubernetes 资源时，不会有任何控制器做出响应。例如，如果\
  \ Operator 创建了一个 Deployment，不会有 Pod 被创建，且 Deployment 的状态永远不会更新。\n\n这起初可能会让人感到惊讶，但这将有助于你只测试自己的\
  \ Operator，而不测试 Kubernetes 控制器。要创建测试环境，你首先需要创建一个 `envtest.Environment` 结构体的实例。\n\
  \n使用 `Environment` 结构体的默认值将启动一个本地控制平面，该控制平面会使用 `/usr/local/kubebuilder/bin` 或 `KUBEBUILDER_ASSETS`\
  \ 环境变量所定义目录中的二进制文件。\n\n如果你正在编写一个调谐自定义资源的 Operator，则需要为该自定义资源添加自定义资源定义 (CRD)。为此，你可以使用\
