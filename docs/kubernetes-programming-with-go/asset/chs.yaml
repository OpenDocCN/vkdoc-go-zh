- "# 12. 测试调谐循环\n\n前一章描述了如何为调谐自定义资源的 Operator 实现一个简单但完整的 `Reconcile` 函数。\n\n为了测试你在前一章编写的\
  \ `Reconcile` 函数，你将使用 `ginkgo`（一个用于 Go 的测试框架）以及 `controller-runtime` 库中的 `envtest`\
  \ 包，后者提供了一个用于测试的 Kubernetes 环境。\n\n## envtest 包\n\n`controller-runtime` 库提供了一个 `envtest`\
  \ 包。该包通过启动一个简单的本地控制平面来提供 Kubernetes 环境。\n\n默认情况下，该包使用位于 `/usr/local/kubebuilder/bin`\
  \ 的 `etcd` 和 `kube-apiserver` 本地二进制文件，你也可以提供自己的路径来查找这些二进制文件。你可以安装 `setup-envtest`\
  \ 来获取不同 Kubernetes 版本的这些二进制文件。\n\n### 安装 envtest 二进制文件\n\n`setup-envtest` 工具可用于安装\
  \ `envtest` 使用的二进制文件。要安装该工具，你必须运行：\n\n```\n$ go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest\n\
  ```\n\n然后，你可以使用以下命令安装特定 Kubernetes 版本的二进制文件：\n\n```\n$ setup-envtest use 1.23\n\
  Version: 1.23.5\nOS/Arch: linux/amd64\nPath: /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64\n\
  ```\n\n命令的输出将告知你二进制文件安装的目录。如果你想从默认目录 `/usr/local/kubebuilder/bin` 使用这些二进制文件，可以创建一个符号链接来访问它们：\n\
  \n```\n$ sudo mkdir /usr/local/kubebuilder\n$ sudo ln -s /path/to/kubebuilder-envtest/k8s/1.23.5-linux-amd64\
  \ /usr/local/kubebuilder/bin\n```\n\n或者，如果你更倾向于使用 `KUBEBUILDER_ASSETS` 环境变量来定义包含二进制文件的目录，可以执行：\n\
  \n```\n$ source <(setup-envtest use -i -p env 1.23.5)\n$ echo $KUBEBUILDER_ASSETS\n\
