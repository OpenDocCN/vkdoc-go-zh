  '
- "# 使用自定义资源\n\n在上一章中，你已经了解了如何使用 `CustomResourceDefinition` 资源声明一个新的自定义资源，使 Kubernetes\
  \ API 能够提供服务，以及如何使用 `kubectl` 创建该自定义资源的新实例。但到目前为止，你还没有任何 Go 库可以让你处理自定义资源的实例。\n\n\
  本章将探究在 Go 中处理自定义资源的各种可能性：\n\n- 为自定义资源生成专用的 Clientset 代码。\n- 使用 API Machinery 库的\
  \ `unstructured` 包和 Client-go 库的 `dynamic` 包。\n\n## 生成 Clientset\n\n代码仓库 [`https://github.com/kubernetes/code-generator`](https://github.com/kubernetes/code-generator)\
  \ 包含了 Go 代码生成器。第三章中“包的内容”一节对这些生成器进行了非常简要的概述，其中探讨了 API 库的内容。\n\n要使用这些生成器，你首先需要为自定义资源定义的类别编写\
  \ Go 结构体。在本例中，你将编写 `MyResource` 和 `MyResourceList` 类别的结构体。\n\n为了与 API 库中的组织方式保持一致，你将把这些类型写在一个\
  \ `types.go` 文件中，该文件位于 `pkg/apis/<group>/<version>/` 目录下。\n\n同样，为了与生成器正确配合，你项目的根目录必须位于一个以你的项目的\
  \ Go 包命名的目录中。例如，如果项目的包是 `github.com/myid/myproject`（在项目的 `go.mod` 文件的第一行定义），那么项目的根目录必须位于\
  \ `github.com/myid/myproject/` 目录下。\n\n举个例子，让我们开始一个新项目。你可以在你选择的目录（通常是包含你所有 Go 项目的目录）中执行以下命令。\n\
  \n```\n$ mkdir -p github.com/myid/myresource-crd\n$ cd github.com/myid/myresource-crd\n\
  $ go mod init github.com/myid/myresource-crd\n$ mkdir -p pkg/apis/mygroup.example.com/v1alpha1/\n\
  $ cd pkg/apis/mygroup.example.com/v1alpha1/\n```\n\n然后，在这个目录中，你可以创建包含这些类别结构体定义的\
  \ `types.go` 文件。以下是匹配上一章中 CRD 架构的结构体定义。\n\n```\npackage v1alpha1\nimport (\nmetav1\
  \ \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n\"k8s.io/apimachinery/pkg/util/intstr\"\
  \n)\ntype MyResource struct {\nmetav1.TypeMeta   `json:\",inline\"`\nmetav1.ObjectMeta\
  \ `json:\"metadata,omitempty\"`\nSpec MyResourceSpec `json:\"spec\"`\n}\ntype MyResourceSpec\
  \ struct {\nImage  string             `json:\"image\"`\nMemory resource.Quantity\
  \ `json:\"memory\"`\n}\ntype MyResourceList struct {\nmetav1.TypeMeta `json:\",inline\"\
  `\nmetav1.ListMeta `json:\"metadata,omitempty\"`\nItems []MyResource `json:\"items\"\
  `\n}\n```\n\n现在，你需要运行两个生成器：\n\n- `deepcopy-gen` – 这将为每个类别结构体生成一个 `DeepCopyObject()`\
  \ 方法，这些类型需要实现 `runtime.Object` 接口。\n- `client-gen` – 这将为组/版本生成 clientset。\n\n###\
  \ 使用 `deepcopy-gen`\n\n#### 安装 `deepcopy-gen`\n\n要安装 `deepcopy-gen` 可执行文件，你可以使用\
  \ `go install` 命令：\n\n```\ngo install k8s.io/code-generator/cmd/deepcopy-gen@v0.24.4\n\
  ```\n\n你可以使用 `@latest` 标签来使用 Kubernetes 代码的最新版本，也可以选择一个特定版本。\n\n#### 添加注解\n\n`deepcopy-gen`\
  \ 生成器需要注解才能工作。它首先需要在包级别定义 `// +k8s:deepcopy-gen=package` 注解。该注解要求 `deepcopy-gen`\
  \ 为包中*所有*结构体生成 `deepcopy` 方法。\n\n为此，你可以在 `types.go` 所在的目录中创建一个 `doc.go` 文件，以添加此注解：\n\
  \n```\n// pkg/apis/mygroup.example.com/v1alpha1/doc.go\n// +k8s:deepcopy-gen=package\n\
  package v1alpha1\n```\n\n默认情况下，`deepcopy-gen` 将生成 `DeepCopy()` 和 `DeepCopyInto()`\
  \ 方法，但不会生成 `DeepCopyObject()`。为此，你需要在每个类别结构体之前添加另一个注解（`// +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object`）。\n\
  \n```\n// +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object\n\
  type MyResource struct {\n[...]\n// +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object\n\
  type MyResourceList struct {\n[...]\n```\n\n#### 运行 `deepcopy-gen`\n\n生成器需要一个包含文本（通常是许可证）的文件，该文本将被添加到生成文件的开头。为此，你可以创建一个名为\
  \ `hack/boilerplate.go.txt` 的空文件（或者包含你偏好的内容，别忘了文本应该是 Go 注释）。\n\n你需要运行 `go mod tidy`\
  \ 以使生成器正常工作（或者如果你更喜欢将 Go 依赖项进行 vendor，则运行 `go mod vendor`）。最后，你可以运行 `deepcopy-gen`\
  \ 命令，它将生成一个文件 `pkg/apis/mygroup.example.com/v1alpha1/zz_generated.deepcopy.go`：\n\
  \n```\n$ go mod tidy\n$ deepcopy-gen --input-dirs github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\n\
  -O zz_generated.deepcopy\n--output-base ../../..\n--go-header-file ./hack/boilerplate.go.txt\n\
  ```\n\n注意 `\"../../..\"` 作为输出基础目录。它会将输出基础目录放在你创建项目目录的目录中：\n\n`$ mkdir -p github.com/myid/myresource-crd`\n\
  \n如果与你创建的目录数量不同（三个之外），你需要根据你创建的子目录数量进行调整。\n\n此时，你的项目应具有以下文件结构：\n\n```\n├── go.mod\n\
  ├── hack\n│   └── boilerplate.go.txt\n├── pkg\n│   └── apis\n│       └── mygroup.example.com\n\
  │           └── v1alpha1\n│               ├── doc.go\n│               ├── types.go\n\
  │               └── zz_generated.deepcopy.go\n```\n\n### 使用 `client-gen`\n\n####\
  \ 安装 `client-go`\n\n要安装 `client-gen` 可执行文件，你可以使用 `go install` 命令：\n\n```\ngo install\
  \ k8s.io/code-generator/cmd/client-gen@v0.24.4\n```\n\n你可以使用 `@latest` 标签来使用 Kubernetes\
  \ 代码的最新版本，也可以选择一个特定版本，如果你想以可重复的方式运行该命令。\n\n#### 添加注解\n\n你需要向 `types.go` 文件中定义的结构体添加注解，以指示要为哪些类型定义\
  \ Clientset。要使用的注解是 `// +genclient`。\n\n- `// +genclient`（不带选项）将要求 `client-gen`\
  \ 为命名空间的资源生成 Clientset。\n- `// +genclient:nonNamespaced` 将为非命名空间的资源生成 Clientset。\n\
  - `+genclient:onlyVerbs=create,get` 将仅生成这些动词，而不是默认生成所有动词。\n- `+genclient:skipVerbs=watch`\
  \ 将生成除这些动词之外的所有动词，而不是默认生成所有动词。\n- `+genclient:noStatus` – 如果带注解的结构体中存在 `Status`\
  \ 字段，则会生成一个 `updateStatus` 函数。使用此选项，你可以禁用到 `updateStatus` 函数的生成（请注意，如果 `Status`\
  \ 字段不存在，则不需要此选项）。\n\n你正在创建的自定义资源是命名空间的，因此你可以使用不带选项的注解：\n\n```\n// +k8s:deepcopy-gen:interfaces=k8s.io/apimachinery/pkg/runtime.Object\n\
  // +genclient\ntype MyResource struct {\n[...]\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 添加 `AddToScheme` 函数\n\n生成的代码依赖于资源包中定义的 `AddToScheme` 函数。为了遵循 API 库中的约定，您需要将此函数写入一个\
  \ `register.go` 文件中，该文件位于目录 `pkg/apis/<group>/<version>/` 下。\n\n通过将 Kubernetes API\
  \ 库中本地 Kubernetes 资源的 `register.go` 文件作为样板，您将获得如下所示文件。唯一的改动是组名（❶）、版本名（❷）以及要注册到 scheme\
  \ 中的资源列表（❸）。\n\n```\npackage v1alpha1\nimport (\nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\
  \n\"k8s.io/apimachinery/pkg/runtime\"\n\"k8s.io/apimachinery/pkg/runtime/schema\"\
  \n)\nconst GroupName = \"mygroup.example.com\"          ❶\nvar SchemeGroupVersion\
  \ = schema.GroupVersion{\nGroup: GroupName,\nVersion: \"v1alpha1\",            \
  \             ❷\n}\nvar (\nSchemeBuilder      = runtime.NewSchemeBuilder(addKnownTypes)\n\
  localSchemeBuilder = &SchemeBuilder\nAddToScheme        = localSchemeBuilder.AddToScheme\n\
  )\nfunc addKnownTypes(scheme *runtime.Scheme) error {\nscheme.AddKnownTypes(SchemeGroupVersion,\n\
  &MyResource{},                         ❸\n&MyResourceList{},\n)\nmetav1.AddToGroupVersion(scheme,\
  \ SchemeGroupVersion)\nreturn nil\n}\n```\n\n### 运行 `client-gen`\n\n`client-gen`\
  \ 需要一个文件，其中包含要添加到生成文件开头的文本（通常是许可证）。您将使用与 `deepcopy-gen` 相同的文件：`hack/boilerplate.go.txt`。\n\
  \n您可以运行 `client-gen` 命令，该命令会在 `pkg/clientset/clientset` 目录下生成文件：\n\n```\nclient-gen\
  \ \\\n--clientset-name clientset\n--input-base \"\"\n--input github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\n\
  --output-package github.com/myid/myresource-crd/pkg/clientset\n--output-base ../../..\n\
  --go-header-file hack/boilerplate.go.txt\n```\n\n请注意 `\"../../..\"` 作为输出基目录。它会将输出基目录放在您为项目创建目录的目录下：\n\
  \n`$ mkdir -p github.com/myid/myresource-crd`\n\n如果您创建的目录层级与此处的三个子目录不同，则需要对此进行调整。\n\
  \n请注意，当您更新自定义资源的定义时，需要再次运行此命令。建议将此命令放在 `Makefile` 中，以便每次修改定义自定义资源的文件时自动运行它。\n\n\
  ### 使用生成的客户端集\n\n现在，客户端集已经生成，并且类型实现了 `runtime.Object` 接口，您可以像使用本地 Kubernetes 资源一样使用自定义资源。例如，以下代码将使用专用的客户端集列出\
  \ `default` 命名空间上的自定义资源：\n\n```\nimport (\n\"context\"\n\"fmt\"\n\"github.com/myid/myresource-crd/pkg/clientset/clientset\"\
  \nmetav1 \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n\"k8s.io/client-go/tools/clientcmd\"\
  \n)\nconfig, err :=\nclientcmd.NewNonInteractiveDeferredLoadingClientConfig(\nclientcmd.NewDefaultClientConfigLoadingRules(),\n\
  nil,\n).ClientConfig()\nif err != nil {\nreturn err\n}\nclientset, err := clientset.NewForConfig(config)\n\
  if err != nil {\nreturn err\n}\nlist, err := clientset.MygroupV1alpha1().\nMyResources(\"\
  default\").\nList(context.Background(), metav1.ListOptions{})\nif err != nil {\n\
  return err\n}\nfor _, res := range list.Items {\nfmt.Printf(\"%s\\n\", res.GetName())\n\
  }\n```\n\n### 使用生成的 *fake* 客户端集\n\n`client-gen` 工具也会生成一个 *fake* 客户端集，您可以像使用 Client-go\
  \ 库中的 *fake* 客户端集一样使用它。更多信息，请参见第 7 章的“Fake 客户端集”一节。\n\n## 使用 `Unstructured` 包和动态客户端\n\
  \n`Unstructured` 和 `UnstructuredList` 类型定义在 API Machinery 库的 `unstructured` 包中。要使用的\
  \ `import` 如下：\n\n```\nimport (\n\"k8s.io/apimachinery/pkg/apis/meta/v1/unstructured\"\
  \n)\n```\n\n这些类型可用于表示任何 Kubernetes *种类*，无论是列表还是非列表。\n\n### `Unstructured` 类型\n\n\
  `Unstructured` 类型被定义为一个包含唯一 `Object` 字段的结构体：\n\n```\ntype Unstructured struct {\n\
  // Object 是一个与 JSON 兼容的映射，\n// 其子元素可以是 string、float、int、bool、[]interface{}\n// 或\
  \ map[string]interface{}。\nObject map[string]interface{}\n}\n```\n\n使用此类型，可以定义任何\
  \ Kubernetes 资源，而无需使用类型化的结构体（例如，在 API 库中定义的 `Pod` 结构体）。\n\n为此类型定义了**获取方法**和**设置方法**，用于访问所有表示\
  \ Kubernetes *种类* 的结构体所共有的 `TypeMeta` 和 `ObjectMeta` 字段中的通用字段。\n\n#### 访问 `TypeMeta`\
  \ 字段的获取方法和设置方法\n\n`APIVersion` 和 `Kind` 的获取方法/设置方法可用于直接获取和设置 `TypeMeta` 的 `apiVersion`\
  \ 和 `Kind` 字段。\n\n`GroupVersionKind` 的获取方法/设置方法可用于将对象中指定的 `apiVersion` 和 kind 与\
  \ `GroupVersionKind` 值进行相互转换。\n\n```\nGetAPIVersion() string\nGetKind() string\n\
  GroupVersionKind() schema.GroupVersionKind\nSetAPIVersion(version string)\nSetKind(kind\
  \ string)\nSetGroupVersionKind(gvk schema.GroupVersionKind)\n```\n\n#### 访问 `ObjectMeta`\
  \ 字段的获取方法和设置方法\n\n为 `ObjectMeta` 结构体的所有字段定义了获取方法和设置方法。该结构体的详细信息可在第 3 章的“`ObjectMeta`\
  \ 字段”一节中找到。\n\n例如，访问 `Name` 字段的获取方法和设置方法是 `GetName() string` 和 `SetName(name string)`。\n\
  \n#### 用于创建和转换的方法\n\n- `NewEmptyInstance() runtime.Unstructured` – 返回一个新的实例，该实例仅从接收者复制了\
  \ `apiVersion` 和 `kind` 字段。\n- `MarshalJSON() ([]byte, error)` – 返回接收者的 JSON 表示形式。\n\
  - `UnmarshalJSON(b []byte) error` – 使用传入的 JSON 表示形式填充接收者。\n- `UnstructuredContent()\
  \ map[string]interface{}` – 返回接收者的 `Object` 字段的值。\n- `SetUnstructuredContent(content\
  \ map[string]interface{})` – 设置接收者的 `Object` 字段的值。\n- `IsList() bool` – 通过检查是否存在\
  \ `items` 字段且其为数组，返回 true 如果接收者描述的是一个列表。\n- `ToList() (*UnstructuredList, error)`\
  \ – 将接收者转换为 `UnstructuredList`。\n\n\n\n### 访问非元字段的辅助函数\n\n以下辅助函数可用于获取和设置 `Unstructured`\
  \ 实例中 `Object` 字段特定字段的值。\n\n请注意，这些辅助函数是函数，而不是 `Unstructured` 类型的方法。\n\n它们都接受：\n\n\
  - 第一个参数 `obj`，类型为 `map[string]interface{}`，用于传递 `Unstructured` 实例的 `Object` 字段，\n\
  - 最后一个参数 `fields`，类型为 `...string`，用于传递导航到对象内各层级所需的键。请注意，不支持数组/切片语法。\n\n`Setter`\
  \ 函数接受第二个参数，用于设置给定对象中特定字段的值。`Getter` 函数返回三个值：\n\n- 所请求字段的值（如果可能）\n- 一个布尔值，指示是否找到了所请求的字段\n\
  - 一个错误，如果找到了该字段但其类型与请求的类型不符\n\n辅助函数的名称如下：\n\n- `RemoveNestedField` – 用于移除所请求的字段\n\
  - `NestedFieldCopy`, `NestedFieldNoCopy` – 返回所请求字段的副本或原始值\n- `NestedBool`, `NestedFloat64`,\
  \ `NestedInt64`, `NestedString`, `SetNestedField` – 用于获取和设置 bool / float64 / int64\
  \ / string 类型的字段\n- `NestedMap`, `SetNestedMap` – 用于获取和设置 `map[string]interface{}`\
  \ 类型的字段\n- `NestedSlice`, `SetNestedSlice` – 用于获取和设置 `[]interface{}` 类型的字段\n- `NestedStringMap`,\
  \ `SetNestedStringMap` – 用于获取和设置 `map[string]string` 类型的字段\n- `NestedStringSlice`,\
  \ `SetNestedStringSlice` – 用于获取和设置 `[]string` 类型的字段\n\n#### 示例\n\n作为示例，以下是一些定义 `MyResource`\
  \ 实例的代码：\n\n```go\nimport (\n    myresourcev1alpha1 \"github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
  \n    \"k8s.io/apimachinery/pkg/apis/meta/v1/unstructured\"\n)\n\nfunc getResource()\
  \ (*unstructured.Unstructured, error) {\n    myres := unstructured.Unstructured{}\n\
  \    myres.SetGroupVersionKind(\n        myresourcev1alpha1.SchemeGroupVersion.\n\
  \            WithKind(\"MyResource\"))\n    myres.SetName(\"myres1\")\n    myres.SetNamespace(\"\
  default\")\n    err := unstructured.SetNestedField(\n        myres.Object,\n   \
  \     \"nginx\",\n        \"spec\", \"image\",\n    )\n    if err != nil {\n   \
  \     return err\n    }\n    // 使用 int64\n    err = unstructured.SetNestedField(\n\
  \        myres.Object,\n        int64(1024*1024*1024),\n        \"spec\", \"memory\"\
  ,\n    )\n    if err != nil {\n        return err\n    }\n    // 或使用 string\n  \
  \  err = unstructured.SetNestedField(\n        myres.Object,\n        \"1024Mo\"\
  ,\n        \"spec\", \"memory\",\n    )\n    if err != nil {\n        return err\n\
  \    }\n    return &myres, nil\n}\n```\n\n### `UnstructuredList` 类型\n\n`UnstructuredList`\
  \ 类型被定义为一个结构体，包含一个 `Object` 字段和一个由 `Unstructured` 实例组成的切片作为列表项：\n\n```go\ntype UnstructuredList\
  \ struct {\n    Object map[string]interface{}\n    // Items 是一个非结构化对象列表。\n    Items\
  \ []Unstructured\n}\n```\n\n#### 访问 `TypeMeta` 字段的 Getter 和 Setter\n\n可以使用 `APIVersion`\
  \ 和 `Kind` 的 Getter/Setter 来直接获取和设置 `TypeMeta` 的 `apiVersion` 和 `kind` 字段。\n\n可以使用\
  \ `GroupVersionKind` 的 Getter/Setter 来将对象中指定的 `apiVersion` 和 `kind` 与 `GroupVersionKind`\
  \ 值相互转换。\n\n```\nGetAPIVersion() string\nGetKind() string\nGroupVersionKind() schema.GroupVersionKind\n\
  SetAPIVersion(version string)\nSetKind(kind string)\nSetGroupVersionKind(gvk schema.GroupVersionKind)\n\
  ```\n\n#### 访问 `ListMeta` 字段的 Getter 和 Setter\n\n这些 getter 和 setter 用于获取和设置与 `List`\
  \ 操作结果相关的值，这些值位于列表的 `ListMeta` 字段中。\n\n```\nGetResourceVersion() string\nGetContinue()\
  \ string\nGetRemainingItemCount() *int64\nSetResourceVersion(version string)\nSetContinue(c\
  \ string)\nSetRemainingItemCount(c *int64)\n```\n\n#### 用于创建和转换的方法\n\n- `NewEmptyInstance()\
  \ runtime.Unstructured` – 创建一个新的非结构化对象实例，使用从列表接收器复制的 `apiVersion` 和 `kind`。\n- `MarshalJSON()\
  \ ([]byte, error)` – 返回接收器的 JSON 表示形式。\n- `UnmarshalJSON(b []byte) error` – 用传入的\
  \ JSON 表示形式填充接收器。\n- `UnstructuredContent() map[string]interface{}`, `SetUnstructuredContent(content\
  \ map[string]interface{})` – 获取接收器的 `Object` 字段的值。\n- `EachListItem(fn func(runtime.Object)\
  \ error) error` – 对列表中的每个列表项执行 `fn` 函数。\n\n### 在类型化对象与非结构化对象之间转换\n\nAPI Machinery\
  \ 库的 `runtime` 包提供了在类型化对象和非结构化对象之间进行转换的工具，这些对象可以是资源或列表。\n\n- ❶ 获取转换器\n- ❷ 将一个非结构化对象（定义一个\
  \ Pod）转换为类型化的 Pod\n- ❸ 将一个类型化的 Pod 转换为非结构化对象\n\n```go\nimport (\n    \"k8s.io/apimachinery/pkg/runtime\"\
  \n)\n\nconverter := runtime.DefaultUnstructuredConverter          ❶\nvar pod corev1.Pod\n\
  converter.FromUnstructured(                                   ❷\n    u.UnstructuredContent(),\
  \ &pod,\n)\nvar u unstructured.Unstructured\nu.Object = converter.ToUnstructured(&pod)\
  \                    ❸\n```\n\n### 动态客户端\n\n正如你在 第 6 章 中所见，Client-go 提供了能够与 Kubernetes\
  \ API 交互的客户端：用于访问类型化资源的 Clientset，用于向 API 进行底层 REST 调用的 REST 客户端，以及用于获取 API 提供的资源信息的\
  \ Discovery 客户端。\n\n它还提供了另一个客户端，即 `dynamic` 客户端，用于处理通过 `Unstructured` 类型描述的非类型化资源。\n\
  \n#### 获取动态客户端\n\n`dynamic` 包提供了用于创建类型为 `dynamic.Interface` 的动态客户端的函数。\n\n- `func\
  \ NewForConfig(c *rest.Config) (Interface, error)` – 此函数返回一个动态客户端，使用通过第 6 章“连接到集群”一节中所述方法之一构建的\
  \ `rest.Config`。\n- `func NewForConfigOrDie(c *rest.Config) Interface` – 此函数与前一个类似，但在发生错误时会触发\
  \ panic，而不是返回错误。此函数可用于硬编码配置，你希望断言其有效性。\n- `NewForConfigAndClient(c *rest.Config,\
  \ httpClient *http.Client) (Interface, error)` – 此函数返回一个 `dynamic` 客户端，使用提供的 `rest.Config`\
  \ 和提供的 `httpClient`。前面的函数 `NewForConfig` 使用通过函数 `rest.HTTPClientFor` 构建的默认 HTTP\
  \ 客户端。如果你想在构建 `dynamic` 客户端之前自定义 HTTP 客户端，可以使用此函数。\n\n\n\n#### 使用动态客户端\n\n`dynamic`\
  \ 客户端实现了 `dynamic.Interface`，其定义如下：\n\n```\ntype Interface interface {\nResource(resource\
  \ schema.GroupVersionResource)\nNamespaceableResourceInterface\n}\n```\n\n`dynamic`\
  \ 客户端的唯一直接方法是 `Resource(gvr)`，它返回一个实现了 `NamespaceableResourceInterface` 的对象。\n\n\
  ```\ntype NamespaceableResourceInterface interface {\nNamespace(string) ResourceInterface\n\
  ResourceInterface\n}\n```\n\n可以将对 `Resource(gvr)` 的调用与对 `Namespace(ns)` 方法的调用进行链式调用，返回一个实现了\
  \ `ResourceInterface` 的对象。或者，如果 `Resource(gvr)` 没有与 `Namespace(ns)` 方法进行链式调用，它同样实现了\
  \ `ResourceInterface`。\n\n因此，在调用 `Resource(gvr)` 后，你可以根据情况选择：如果 `gvr` 描述的资源是一个命名空间资源，并且你想定义在哪个命名空间上操作，则可以链式调用\
  \ `Namespace(ns)`；否则，如果你希望进行集群范围的操作，可以省略这个调用（针对非命名空间资源）。\n\n`ResourceInterface`\
  \ 的定义如下（为简洁起见，省略了函数的完整签名）：\n\n```\ntype ResourceInterface interface {\nCreate(...)\n\
  Update(...)\nUpdateStatus(...)\nDelete(...)\nDeleteCollection(...)\nGet(...)\nList(...)\n\
  Watch(...)\nPatch(...)\nApply(...)          // 从 v1.25 版本开始\nApplyStatus(...)  \
  \   // 从 v1.25 版本开始\n}\n```\n\n这些方法适用于 `Unstructured` 和 `UnstructuredList` 类型。例如，`Create`\
  \ 方法接受一个 `Unstructured` 对象作为输入，并返回创建后的 `Unstructured` 对象；而 `List` 方法则返回一个 `UnstructuredList`\
  \ 形式的对象列表：\n\n```\nCreate(\nctx context.Context,\nobj *unstructured.Unstructured,\n\
  options metav1.CreateOptions,\nsubresources ...string,\n) (*unstructured.Unstructured,\
  \ error)\nList(\nctx context.Context,\nopts metav1.ListOptions,\n) (*unstructured.UnstructuredList,\
  \ error)\n```\n\n如果将这些方法的签名与 Client-go 客户端集提供的方法进行比较，你会发现它们非常相似。以下是一些不同之处：\n\n*\
  \   客户端集中使用的类型化对象（例如 `corev1.Pod`）在 `dynamic` 客户端中被 `Unstructured` 所取代。\n*   动态方法中包含了一个\
  \ `subresource…` 参数，而客户端集则为子资源提供了特定的方法。\n\n关于各种操作行为的更多信息，你可以参考第 6 章。\n\n#### 示例\n\
  \n以下是一个在集群中创建 `MyResource` 实例的示例代码：\n\n```\nimport (\n\"context\"\nmyresourcev1alpha1\
  \ \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\nmetav1\
  \ \"k8s.io/apimachinery/pkg/apis/meta/v1\"\n\"k8s.io/client-go/dynamic\"\n)\nfunc\
  \ CreateMyResource(\ndynamicClient dynamic.Interface,\nu *unstructured.Unstructured,\n\
  ) (*unstructured.Unstructured, error) {\ngvr := myresourcev1alpha1.\nSchemeGroupVersion.\n\
  WithResource(\"myresources\")\nreturn dynamicClient.\nResource(gvr).\nNamespace(\"\
  default\").\nCreate(\ncontext.Background(),\nu,\nmetav1.CreateOptions{},\n)\n}\n\
  ```\n\n#### *模拟* 动态客户端\n\n正如你在第 7 章所见，Client-go 库为客户端集、发现客户端和 REST 客户端提供了 *模拟* 实现。该库还为\
  \ `dynamic` 客户端提供了一个 *模拟* 实现。\n\n与其他 *模拟* 实现类似，你可以使用 `PrependReactor` 及 `dynamicClient.Fake`\
  \ 对象上的类似方法来注册 reactor，并可以在测试执行后检查 `dynamicClient.Fake` 对象的 `Actions`。\n\n函数 `fake.NewSimpleDynamicClient`\
  \ 用于创建一个新的 *模拟* `dynamic` 客户端。\n\n```\nfunc NewSimpleDynamicClient(\nscheme *runtime.Scheme,\n\
  objects ...runtime.Object,\n) *FakeDynamicClient)\n```\n\n`objects` 参数表示在创建模拟集群时需要初始化的资源。以下是一个针对使用\
  \ `dynamic` 客户端的函数的测试示例。\n\n`NewSimpleDynamicClient` 函数被调用时，需要传入用于创建初始资源的参数。请注意，初始资源的预期类型是\
  \ `runtime.Object`，这是由 `Unstructured` 实现的一个接口。\n\n```\nfunc TestCreateMyResourceWhenResourceExists(t\
  \ *testing.T) {\nmyres, err := getResource()\nif err != nil {\nt.Error(err)\n}\n\
  dynamicClient := fake.NewSimpleDynamicClient(\nruntime.NewScheme(),\nmyres,\n)\n\
  // 此处并未实际使用，仅作展示用途\ndynamicClient.Fake.PrependReactor(\n\"create\",\n\"myresources\"\
  ,\nfunc(\naction ktesting.Action,\n) (handled bool, ret runtime.Object, err error)\
  \ {\nreturn false, nil, nil\n})\n_, err = CreateMyResource(dynamicClient, myres)\n\
  if err == nil {\nt.Error(\"应该出现错误\")\n}\nactions := dynamicClient.Fake.Actions()\n\
  if len(actions) != 1 {\nt.Errorf(\"操作数量应为 %d，实际为 %d\", 1, len(actions))\n}\n}\n\
  ```\n\n## 总结\n\n本章探讨了在 Go 中处理自定义资源的不同解决方案。\n\n第一种方案是基于自定义资源的定义生成 Go 代码，以生成专用于该特定自定义资源定义的客户端集，从而让你能够像处理原生\
  \ Kubernetes 资源一样处理自定义资源实例。\n\n另一种方案是使用 Client-go 库中的 `dynamic` 客户端，并依赖 `Unstructured`\
  \ 类型来定义自定义资源。\n\n\n\n"
- "# 10. 使用 `controller-runtime` 库编写操作器\n\n正如你在第 1 章所见，*控制器管理器* 是 Kubernetes 架构的重要组成部分。它嵌入了多个*控制器*，每个控制器的职责是监视特定高层资源（如\
  \ Deployment）的实例，并使用低层资源（如 Pod）来实现这些高层实例。\n\n例如，Kubernetes 用户在部署无状态应用时可以创建 Deployment。该\
  \ Deployment 定义了一个用于在集群中创建 Pod 的*Pod 模板*及若干规范。以下是最重要的规范：\n\n- *副本数*：控制器必须为单个 Deployment\
  \ 实例部署的相同 Pod 数量。\n- *部署策略*：当 Pod 模板更新时，替换 Pod 的方式。\n- *默认策略*：*滚动更新*可以在不中断服务的情况下将应用更新到新版本，并支持多种参数。还有一种更简单的策略*重建*，会先停止当前\
  \ Pod，再启动替代 Pod。\n\n*Deployment 控制器*将为每个 Pod 模板新版本创建 `ReplicaSet` 资源实例，并更新这些 `ReplicaSet`\
  \ 的副本数，以满足副本数和策略规范。你会看到已退役版本对应的 `ReplicaSet` 副本数为零，而当前应用版本对应的 `ReplicaSet` 有正数副本。在*滚动更新*期间，两个\
  \ `ReplicaSet` 都会拥有正数副本（新版本副本数递增，旧版本副本数递减），从而实现在两个版本间无缝过渡，而不中断服务。\n\n另一方面，*ReplicaSet\
  \ 控制器*负责维护由*Deployment 控制器*创建的每个 `ReplicaSet` 实例所需的 Pod 副本数量。\n\n第 8 章已经展示了如何定义新的\
  \ Kubernetes 资源来扩展 Kubernetes API。尽管原生控制器管理器运行着处理原生 Kubernetes 资源的控制器，但你仍需编写控制器来处理自定义资源。\n\
  \n通常，这类控制器被称为*操作器*，用于处理第三方资源，而将**控制器**这一名称保留给处理原生 Kubernetes 资源的控制器。\n\n`Client-go`\
  \ 库提供了使用 Go 语言编写控制器和操作器的工具，而 `controller-runtime` 库则基于这些工具，围绕控制器模式提供了抽象层，帮助你编写操作器。你可以通过以下命令安装该库：\n\
  \n```\ngo get sigs.k8s.io/controller-runtime@v0.13.0\n```\n\n你可以从源码仓库 `github.com/kubernetes-sigs/controller-runtime/releases`\
  \ 获取可用版本。\n\n## 管理器\n\n`controller-runtime` 库提供的第一个重要抽象是*管理器*，它为管理器内运行的所有控制器提供共享资源，包括：\n\
  \n- 用于读写 Kubernetes 资源的 Kubernetes 客户端\n- 用于从本地缓存读取 Kubernetes 资源的缓存\n- 用于注册所有 Kubernetes\
  \ 原生和自定义资源的 Scheme\n\n要创建*管理器*，你需要使用提供的 `New` 函数，如下所示：\n\n- ❶ 解析命令行标志，例如使用 `GetConfigOrDie`\
  \ 处理 `--kubeconfig` 标志；参见下文。\n\n```\nimport (\n\"flag\"\n\"sigs.k8s.io/controller-runtime/pkg/client/config\"\
  \n\"sigs.k8s.io/controller-runtime/pkg/manager\"\n)\nflag.Parse()              \
  \          ❶\nmgr, err := manager.New(\nconfig.GetConfigOrDie(),\nmanager.Options{},\n\
  )\n```\n\n第一个参数是 `rest.Config` 对象，如第 6 章“连接到集群”部分所述。请注意，此示例选择了 `controller-runtime`\
  \ 库提供的 `GetConfigOrDie()` 工具函数，而非使用 `Client-go` 库中的函数。\n\n`GetConfigOrDie()` 函数会尝试获取连接到集群的配置：\n\
  \n- 如果定义了 `--kubeconfig` 标志，则获取其值并读取该路径下的 `kubeconfig` 文件。为此，首先需要执行 `flag.Parse()`\n\
  - 如果定义了 `KUBECONFIG` 环境变量，则获取其值并读取该路径下的 `kubeconfig` 文件\n- 如果定义了集群内配置（参见第 6 章的“集群内配置”部分），则使用该配置\n\
  - 读取 `$HOME/.kube/config` 文件\n\n如果上述方法均不可行，该函数将使程序以代码 `1` 退出。第二个参数是一个选项结构体。\n\n\
  一个重要的选项是 `Scheme`。默认情况下，如果你未为此选项指定任何值，将使用 `Client-go` 库提供的 `Scheme`。如果控制器只需访问原生\
  \ Kubernetes 资源，这已经足够。然而，如果你希望控制器访问自定义资源，则需要提供一个能解析该自定义资源的 Scheme。\n\n例如，如果你希望控制器访问第\
  \ 9 章中定义的自定义资源，则需要在初始化时执行以下代码：\n\n- ❶ 创建一个新的空 Scheme\n- ❷ 使用 `Client-go` 库添加原生 Kubernetes\
  \ 资源\n- ❸ 将 `mygroup/v1alpha1` 中包含自定义资源的资源添加到 Scheme\n- ❹ 在此管理器中使用的 Scheme\n\n```\n\
  import (\n\"k8s.io/apimachinery/pkg/runtime\"\nclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\
  \nmygroupv1alpha1 \"github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
  \n)\nscheme := runtime.NewScheme()                  ❶\nclientgoscheme.AddToScheme(scheme)\
  \             ❷\nmygroupv1alpha1.AddToScheme(scheme)            ❸\nmgr, err := manager.New(\n\
  config.GetConfigOrDie(),\nmanager.Options{\nScheme: scheme,                    ❹\n\
  },\n)\n```\n\n\n\n## 控制器\n\n第二个重要的抽象是 `Controller`。控制器负责实现特定 Kubernetes 资源实例所给定的规范（Spec）。（在\
  \ Operator 场景下，自定义资源由 Operator 处理。）\n\n为此，控制器会监视特定资源（至少是关联的自定义资源，本节中称之为“主资源”），并接收这些资源的\
  \ `Watch` 事件（即创建、更新、删除）。当资源上发生事件时，控制器会将包含受事件影响的“主资源”实例的名称和命名空间的 `Request` 放入队列。\n\
  \n请注意，入队的对象仅限于 Operator 所监视的主资源实例。如果事件是由其他资源的实例接收的，则通过跟踪 `ownerReference` 来查找主资源。例如，Deployment\
  \ 控制器会监视 Deployment 资源和 `ReplicaSet` 资源。所有 `ReplicaSet` 实例都包含指向某个 Deployment 实例的\
  \ `ownerReference`。\n\n-   当创建 Deployment 时，控制器会收到一个 `Create` 事件，并且刚创建的 Deployment\
  \ 实例会被入队。\n-   当 `ReplicaSet` 被修改时（例如被某个用户），此 `ReplicaSet` 会收到一个 `Update` 事件，控制器会使用该\
  \ `ReplicaSet` 中包含的 `ownerReference` 查找被更新的 `ReplicaSet` 所引用的 Deployment。然后，该引用的\
  \ Deployment 实例会被入队。\n\n`Controller` 实现了一个 `Reconcile` 方法，每当队列中有可用的 Request 时，就会调用此方法。此\
  \ `Reconcile` 方法接收 `Request` 作为参数，其中包含待协调的主资源的名称和命名空间。\n\n请注意，触发该请求的事件并不属于请求的一部分，因此\
  \ `Reconcile` 方法不能依赖此信息。此外，如果事件发生在被拥有的资源上，只有主资源会被入队，`Reconcile` 方法不能依赖是哪个被拥有的资源触发了该事件。\n\
  \n同时，由于同一主资源在短时间内可能发生多个事件，因此请求可以被批量处理，以限制入队的请求数量。\n\n### 创建控制器\n\n要创建一个控制器，你需要使用提供的\
  \ `New` 函数：\n\n```\nimport (\n    \"sigs.k8s.io/controller-runtime/pkg/controller\"\
  \n)\ncontroller, err = controller.New(\n    \"my-operator\", mgr,\n    controller.Options{\n\
  \        Reconciler: myReconciler,\n    })\n```\n\n`Reconciler` 选项是必需的，其值是一个必须实现\
  \ `Reconciler` 接口的对象，该接口定义如下：\n\n```\ntype Reconciler interface {\n    Reconcile(context.Context,\
  \ Request) (Result, error)\n}\n```\n\n为了方便起见，提供了 `reconcile.Func` 类型，它实现了 `Reconciler`\
  \ 接口，并且与具有与 `Reconcile` 方法相同签名的函数类型相同。\n\n```\ntype Func func(context.Context, Request)\
  \ (Result, error)\nfunc (r Func) Reconcile(ctx context.Context, o Request) (Result,\
  \ error) { return r(ctx, o) }\n```\n\n借助这个 `reconcile.Func` 类型，你可以将一个具有 Reconcile\
  \ 签名的函数进行类型转换，并将其赋值给 `Reconciler` 选项。例如：\n\n```\ncontroller, err = controller.New(\n\
  \    \"my-operator\", mgr,\n    controller.Options{\n        Reconciler: reconcile.Func(reconcileFunction),\n\
  \    })\nfunc reconcileFunction(\n    ctx context.Context,\n    r reconcile.Request,\n\
  ) (reconcile.Result, error) {\n    [...]\n    return reconcile.Result{}, nil\n}\n\
  ```\n\n### 监视资源\n\n创建控制器后，你需要向该容器指明要监视哪些资源，以及这些资源是主资源还是被拥有的资源。\n\n使用控制器的 `Watch`\
  \ 方法来添加一个监视。该方法的定义如下：\n\n```\nWatch(\n    src source.Source,\n    eventhandler handler.EventHandler,\n\
  \    predicates ...predicate.Predicate,\n) error\n```\n\n第一个参数指明要监视的事件的来源，其类型是 `source.Source`\
  \ 接口。`controller-runtime` 库为 `Source` 接口提供了两种实现：\n\n-   `Kind` 来源用于监视特定类型 Kubernetes\
  \ 对象的事件。`Kind` 结构体的 `Type` 字段是必需的，其值是一个所需类型的对象。例如，如果我们想监视 Deployment，则 `src` 参数的值应为：\n\
  \n```\ncontroller.Watch(\n    &source.Kind{\n        Type: &appsv1.Deployment{},\n\
  \    },\n    ...\n```\n\n-   `Channel` 来源用于监视源自集群外部的事件。`Channel` 结构体的 `Source` 字段是必需的，其值是一个发射\
  \ `event.GenericEvent` 类型对象的通道。\n\n第二个参数是事件处理器，其类型是 `handler.EventHandler` 接口。`controller-runtime`\
  \ 库为 `EventHandler` 接口提供了两种实现：\n\n-   `EnqueueRequestForObject` 事件处理器用于控制器处理的主资源。在这种情况下，控制器会将事件所附带的那个对象放入队列。例如，如果控制器是一个处理第\
  \ 9 章中创建的自定义资源的 operator，你可以这样写：\n\n```\ncontroller.Watch(\n    &source.Kind{\n\
  \        Type: &mygroupv1alpha1.MyResource{},\n    },\n    &handler.EnqueueRequestForObject{},\n\
  )\n```\n\n-   `EnqueueRequestForOwner` 事件处理器用于被主资源拥有的资源。`EnqueueRequestForOwner`\
  \ 的一个字段是必需的：`OwnerType`。此字段的值是主资源类型的对象；控制器会追踪 ownerReferences，直到找到此类型的对象，并将此对象放入队列。\n\
  \n-   例如，如果控制器处理 `MyResource` 主资源并创建 `Pods` 来实现 `MyResource`，它将希望使用此事件处理器监视 `Pod`\
  \ 资源，并指定一个 `MyResource` 对象作为 `OwnerType`。\n\n-   如果 `IsController` 字段设置为 true，控制器将只考虑\
  \ `Controller: true` 的 ownerReferences。\n\n```\ncontroller.Watch(\n    &source.Kind{\n\
  \        Type: &corev1.Pod{},\n    },\n    &handler.EnqueueRequestForOwner{\n  \
  \      OwnerType: &mygroupv1alpha1.MyResource{},\n        IsController: true,\n\
  \    },\n)\n```\n\n第三个参数是可选的谓语列表，其类型是 `predicate.Predicate`。`controller-runtime`\
  \ 库为 `Predicate` 接口提供了几种实现：\n\n-   `Funcs` 是最通用的实现。`Funcs` 结构体定义如下：\n\n-   你可以将\
  \ `Funcs` 结构体的实例作为 Predicate 传递给 `Watch` 方法。\n-   未定义的字段表示应处理匹配类型的事件。\n-   对于非 nil\
  \ 的字段，将调用与事件匹配的函数（注意，当 source 为 Channel 时，将调用 `GenericFunc`；见前述），如果该函数返回 true，则该事件将被处理。\n\
  -   使用 `Predicate` 的这个实现，你可以为每种事件类型定义特定的函数。\n\n-   `func NewPredicateFuncs(`\n\n\
  \n\n```go\ntype Funcs struct {\n\t// Create 返回 true 表示应处理 Create 事件\n\tCreateFunc\
  \ func(event.CreateEvent) bool\n\t// Delete 返回 true 表示应处理 Delete 事件\n\tDeleteFunc\
  \ func(event.DeleteEvent) bool\n\t// Update 返回 true 表示应处理 Update 事件\n\tUpdateFunc\
  \ func(event.UpdateEvent) bool\n\t// Generic 返回 true 表示应处理 Generic 事件\n\tGenericFunc\
  \ func(event.GenericEvent) bool\n}\n```\n\n`filter func(object client.Object) bool,`\
  \ `) Funcs`\n\n- 此函数接受一个`filter`函数，并返回一个`Funcs`结构体，该过滤器将应用于所有事件。使用此函数，您可以定义一个适用于所有事件类型的单一过滤器。\n\
  - `ResourceVersionChangedPredicate`结构体仅会为`UpdateEvent`定义一个过滤器。\n- 使用此谓词，所有`Create`、`Delete`和`Generic`事件将在无过滤的情况下被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.resourceVersion`变更的更新。\n\
  - `metadata.resourceVersion`字段在每次保存资源的新版本时都会更新，无论资源发生了何种更改。\n- `GenerationChangedPredicate`结构体仅会为`Update`事件定义一个过滤器。\n\
  - 使用此谓词，所有`Create`、`Delete`和`Generic`事件将在无过滤的情况下被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.Generation`递增的更新。\n\
  - `metadata.Generation`由 API 服务器在每次资源`Spec`部分发生更新时顺序递增。\n- 请注意，某些资源并不遵循此假设。例如，`Deployment`的`Generation`在`Annotations`字段更新时也会递增。\n\
  - 对于自定义资源，仅当启用了`Status`子资源时，`Generation`才会递增。\n- `AnnotationChangedPredicate`结构体仅会为`Update`事件定义一个过滤器。\n\
  - 使用此谓词，所有`Create`、`Delete`和`Generic`事件将被处理，而`Update`事件将被过滤，仅处理那些带有`metadata.Annotations`变更的更新。\n\
  \n## 第一个示例\n\n在第一个示例中，您将创建一个管理器和一个控制器。该控制器将管理一个名为`MyResource`的主要自定义资源，并监听此资源以及`Pod`资源。\n\
  \n`Reconcile`函数将仅显示需要调和的`MyResource`实例的命名空间和名称。\n\n- ➊ 创建一个包含原生资源和自定义资源`MyResource`的`Scheme`。\n\
  - ➋ 使用刚创建的`Scheme`创建一个管理器。\n- ➌ 创建一个附加到管理器的控制器，并传入一个`Reconciler`实现。\n- ➍ 开始将`MyResource`实例作为主要资源进行监听。\n\
  - ➎ 开始将`Pod`实例作为附属资源进行监听。\n- ➏ 启动管理器。此函数是长时间运行的，仅当发生错误时才会返回。\n- ➐ 一个实现了`Reconciler`接口的类型。\n\
  - ➑ 实现了`Reconcile`方法。该方法将显示需要调和的实例的命名空间和名称。\n\n```go\npackage main\n\nimport (\n\
  \t\"context\"\n\t\"fmt\"\n\n\tcorev1 \"k8s.io/api/core/v1\"\n\t\"k8s.io/apimachinery/pkg/runtime\"\
  \n\t\"sigs.k8s.io/controller-runtime/pkg/client/config\"\n\t\"sigs.k8s.io/controller-runtime/pkg/controller\"\
  \n\t\"sigs.k8s.io/controller-runtime/pkg/handler\"\n\t\"sigs.k8s.io/controller-runtime/pkg/manager\"\
  \n\t\"sigs.k8s.io/controller-runtime/pkg/reconcile\"\n\t\"sigs.k8s.io/controller-runtime/pkg/source\"\
  \n\tclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\n\tmygroupv1alpha1 \"\
  github.com/myid/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\n)\n\nfunc\
  \ main() {\n\tscheme := runtime.NewScheme() // ❶\n\tclientgoscheme.AddToScheme(scheme)\n\
  \tmygroupv1alpha1.AddToScheme(scheme)\n\n\tmgr, err := manager.New( // ❷\n\t\tconfig.GetConfigOrDie(),\n\
  \t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t)\n\tpanicIf(err)\n\n\tcontroller,\
  \ err := controller.New( // ❸\n\t\t\"my-operator\", mgr,\n\t\tcontroller.Options{\n\
  \t\t\tReconciler: &MyReconciler{},\n\t\t})\n\tpanicIf(err)\n\n\terr = controller.Watch(\
  \ // ❹\n\t\t&source.Kind{\n\t\t\tType: &mygroupv1alpha1.MyResource{},\n\t\t},\n\t\
  \t&handler.EnqueueRequestForObject{},\n\t)\n\tpanicIf(err)\n\n\terr = controller.Watch(\
  \ // ❺\n\t\t&source.Kind{\n\t\t\tType: &corev1.Pod{},\n\t\t},\n\t\t&handler.EnqueueRequestForOwner{\n\
  \t\t\tOwnerType:    &corev1.Pod{},\n\t\t\tIsController: true,\n\t\t},\n\t)\n\tpanicIf(err)\n\
  \n\terr = mgr.Start(context.Background()) // ❻\n\tpanicIf(err)\n}\n\ntype MyReconciler\
  \ struct{} // ➐\n\nfunc (o *MyReconciler) Reconcile( // ➑\n\tctx context.Context,\n\
  \tr reconcile.Request,\n) (reconcile.Result, error) {\n\tfmt.Printf(\"reconcile\
  \ %v\\n\", r)\n\treturn reconcile.Result{}, nil\n}\n\n// panicIf panic if err is\
  \ not nil\n// Please call from main only!\nfunc panicIf(err error) {\n\tif err !=\
  \ nil {\n\t\tpanic(err)\n\t}\n}\n```\n\n## 使用控制器构建器\n\n`controller-runtime`库提供了一个*控制器构建器*，以使控制器的创建更加简洁。\n\
  \n```go\nimport (\n\t\"sigs.k8s.io/controller-runtime/pkg/builder\"\n)\n\nfunc ControllerManagedBy(m\
  \ manager.Manager) *Builder\n```\n\n`ControllerManagedBy`函数用于初始化一个新的`ControllerBuilder`。构建的控制器将被添加到`m`管理器中。一个流式接口有助于配置构建过程：\n\
  \n- `For(object client.Object, opts ...ForOption) *Builder` – 此方法用于指示控制器处理的主要资源。它只能被调用一次，因为一个控制器只能有一个主要资源。这将在内部调用`Watch`函数，并传入事件处理器`EnqueueRequestForObject`。\n\
  \  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`ForOption`接口。\n- `Owns(object client.Object,\
  \ opts ...OwnsOption) *Builder` – 此方法用于指示控制器拥有的资源。这将在内部调用`Watch`函数，并传入事件处理器`EnqueueRequestForOwner`。\n\
  \  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`OwnsOption`接口。\n- `Watches(src source.Source,\
  \ eventhandler handler.EventHandler, opts ...WatchesOption) *Builder` – 此方法可用于添加`For`或`Owns`方法未涵盖的更多监听器——例如，使用`Channel`源的监听器。\n\
  \  - 可以通过`WithPredicates`函数为此监听添加谓词，该函数返回的结果实现了`WatchesOption`接口。\n- `WithEventFilter(p\
  \ predicate.Predicate) *Builder` – 此方法可用于为所有通过`For`、`Owns`和`Watch`方法创建的监听器添加公共谓词。\n\
  - `WithOptions(options controller.Options) *Builder` – 此方法设置将内部传递给`controller.New`函数的选项。\n\
  - `WithLogConstructor(` `func(*reconcile.Request) logr.Logger,` `) *Builder` – 此方法设置`logConstructor`选项。\n\
  - `Named(name string) *Builder` – 此方法设置构造器的名称。它应该只使用下划线和字母数字字符。默认情况下，它是主要资源类型的全小写版本。\n\
  - `Build(` `r reconcile.Reconciler,` `) (controller.Controller, error)` – 此方法构建并返回控制器。\n\
  - `Complete(r reconcile.Reconciler) error` – 此方法构建控制器。您通常不需要直接访问控制器，因此可以使用此方法（不返回控制器值）来代替`Build`。\n\
  \n\n\n### 使用 `ControllerBuilder` 的第二个示例\n\n在此示例中，你将使用 `ControllerBuilder` 构建控制器，而不是使用\
  \ `controller.New` 函数和 `Controller` 上的 `Watch` 方法。\n\n```go\npackage main\n\nimport\
  \ (\n\t\"context\"\n\t\"fmt\"\n\tcorev1 \"k8s.io/api/core/v1\"\n\t\"k8s.io/apimachinery/pkg/runtime\"\
  \n\tclientgoscheme \"k8s.io/client-go/kubernetes/scheme\"\n\t\"sigs.k8s.io/controller-runtime/pkg/builder\"\
  \n\t\"sigs.k8s.io/controller-runtime/pkg/client\"\n\t\"sigs.k8s.io/controller-runtime/pkg/client/config\"\
  \n\t\"sigs.k8s.io/controller-runtime/pkg/manager\"\n\t\"sigs.k8s.io/controller-runtime/pkg/reconcile\"\
  \n\tmygroupv1alpha1 \"github.com/feloy/myresource-crd/pkg/apis/mygroup.example.com/v1alpha1\"\
  \n)\n\nfunc main() {\n\tscheme := runtime.NewScheme()\n\tclientgoscheme.AddToScheme(scheme)\n\
  \tmygroupv1alpha1.AddToScheme(scheme)\n\tmgr, err := manager.New(\n\t\tconfig.GetConfigOrDie(),\n\
  \t\tmanager.Options{\n\t\t\tScheme: scheme,\n\t\t},\n\t)\n\tpanicIf(err)\n\n\terr\
  \ = builder.\n\t\tControllerManagedBy(mgr).\n\t\tFor(&mygroupv1alpha1.MyResource{}).\n\
  \t\tOwns(&corev1.Pod{}).\n\t\tComplete(&MyReconciler{})\n\tpanicIf(err)\n\n\terr\
  \ = mgr.Start(context.Background())\n\tpanicIf(err)\n}\n\ntype MyReconciler struct{}\n\
  \nfunc (a *MyReconciler) Reconcile(\n\tctx context.Context,\n\treq reconcile.Request,\n\
  ) (reconcile.Result, error) {\n\tfmt.Printf(\"reconcile %v\\n\", req)\n\treturn\
  \ reconcile.Result{}, nil\n}\n\nfunc panicIf(err error) {\n\tif err != nil {\n\t\
  \tpanic(err)\n\t}\n}\n```\n\n### 向 Reconciler 注入 Manager 资源\n\n`Manager` 为控制器提供共享资源，包括用于读写\
  \ Kubernetes 资源的客户端（client）、用于从本地缓存读取资源的缓存（cache）以及用于解析资源的 Scheme（scheme）。`Reconcile`\
  \ 函数需要访问这些共享资源。有两种方式可以实现共享：\n\n#### 在创建 Reconciler 结构体时传递值\n\n创建控制器时，你会传入一个实现了 `Reconciler`\
  \ 接口的 `Reconcile` 结构体实例：\n\n```go\ntype MyReconciler struct{}\n\nerr = builder.\n\
  \tControllerManagedBy(mgr).\n\tFor(&mygroupv1alpha1.MyResource{}).\n\tOwns(&corev1.Pod{}).\n\
  \tComplete(&MyReconciler{})\n```\n\nManager 在此之前已经创建，你可以通过 Manager 上的 `Getter` 方法访问共享资源。\n\
  \n例如，以下是如何从新创建的 Manager 中获取客户端、缓存和 Scheme：\n\n```go\nmgr, err := manager.New(\n\t\
  config.GetConfigOrDie(),\n\tmanager.Options{\n\t\tmanager.Options{\n\t\t\tScheme:\
  \ scheme,\n\t\t},\n\t},\n)\n// 处理错误\nmgrClient := mgr.GetClient()\nmgrCache := mgr.GetCache()\n\
  mgrScheme := mgr.GetScheme()\n```\n\n你可以向 `Reconciler` 结构体添加字段来传递这些值：\n\n```go\n\
  type MyReconciler struct {\n\tclient client.Client\n\tcache  cache.Cache\n\tscheme\
  \ *runtime.Scheme\n}\n```\n\n最后，在创建控制器时传递这些值：\n\n```go\nerr = builder.\n\tControllerManagedBy(mgr).\n\
  \tFor(&mygroupv1alpha1.MyResource{}).\n\tOwns(&corev1.Pod{}).\n\tComplete(&MyReconciler{\n\
  \t\tclient: mgr.GetClient(),\n\t\tcache:  mgr.GetCache(),\n\t\tscheme: mgr.GetScheme(),\n\
  \t})\n```\n\n#### 使用注入器\n\n`controller-runtime` 库提供了一套 *Injectors*（注入器）系统，用于将共享资源注入到\
  \ `Reconciler` 中，以及其他结构体（如你自定义的 `Sources`、`EventHandlers` 和 `Predicates` 实现）中。\n\
  \n`Reconciler` 的实现需要实现 `inject` 包中特定的注入器接口：`inject.Client`、`inject.Cache`、`inject.Scheme`\
  \ 等。\n\n这些方法将在初始化时（即调用 `controller.New` 或 `builder.Complete` 时）被调用。因此需要为每个接口创建一个方法，例如：\n\
  \n```go\ntype MyReconciler struct {\n\tclient client.Client\n\tcache  cache.Cache\n\
  \tscheme *runtime.Scheme\n}\n\nfunc (a *MyReconciler) InjectClient(\n\tc client.Client,\n\
  ) error {\n\ta.client = c\n\treturn nil\n}\n\nfunc (a *MyReconciler) InjectCache(\n\
  \tc cache.Cache,\n) error {\n\ta.cache = c\n\treturn nil\n}\n\nfunc (a *MyReconciler)\
  \ InjectScheme(\n\ts *runtime.Scheme,\n) error {\n\ta.scheme = s\n\treturn nil\n\
  }\n```\n\n## 使用客户端（Client）\n\n客户端可用于读写集群上的资源，以及更新资源的状态。\n\n`Read` 方法内部使用基于 *Informers*\
  \ 和 *Listers* 的缓存系统，以限制对 API Server 的读取访问。通过使用此缓存，同一 Manager 下的所有控制器都可以访问资源，同时限制对\
  \ API Server 的请求。\n\n你必须注意，读取操作返回的对象是指向缓存中值的指针。**切勿**直接修改这些对象。相反，在修改之前，你必须创建返回对象的深度副本。\n\
  \n客户端的方法是通用的：它们可以处理任何 Kubernetes 资源，无论是原生资源还是自定义资源，只要这些资源在传递给 Manager 的 Scheme 中已注册。\n\
  \n所有方法都会返回一个错误，其类型与 `Client-go` 的 ClientSet 方法返回的错误类型相同。更多信息请参考第 6 章的“错误和状态”部分。\n\
  \n### 获取资源信息\n\n`Get` 方法用于获取资源的信息。\n\n```go\nGet(\n\tctx context.Context,\n\tkey\
  \ ObjectKey,\n\tobj Object,\n\topts ...GetOption,\n) error\n```\n\n它接受一个 `ObjectKey`\
  \ 值作为参数，用于指定资源的命名空间和名称；以及一个 `Object` 参数，用于指示要获取资源的 *Kind*（种类）并存储结果。`Object` 必须是指向类型化资源的指针——例如\
  \ `Pod` 或 `MyResource` 结构体。`ObjectKey` 类型是 `types.NamespacedName` 的别名，定义于 API Machinery\
  \ 库中。\n\n`NamespacedName` 也是作为参数传递给 `Reconcile` 函数的 `Request` 中嵌入的对象类型。你可以直接使用 `req.NamespacedName`\
  \ 作为 `ObjectKey` 来获取需要调协的资源。例如，使用以下代码获取需要调协的资源：\n\n```go\nmyresource := mygroupv1alpha1.MyResource{}\n\
  err := a.client.Get(\n\tctx,\n\treq.NamespacedName,\n\t&myresource,\n)\n```\n\n\
  可以在 `Get` 请求中传递特定的 `resourceVersion` 值，只需将 `client.GetOptions` 结构体实例作为最后一个参数传入。\n\
  \n`GetOptions` 结构体实现了 `GetOption` 接口，包含一个单独的 `Raw` 字段，其值为 `metav1.GetOptions`。例如，指定\
  \ `resourceVersion` 为 \"0\" 以获取资源的任何版本：\n\n```go\nerr := a.client.Get(\n\tctx,\n\
  \treq.NamespacedName,\n\t&myresource,\n\t&client.GetOptions{\n\t\tRaw: &metav1.GetOptions{\n\
  \t\t\tResourceVersion: \"0\",\n\t\t},\n\t},\n)\n```\n\n\n\n### 列出资源\n\n`List` 方法用于列出特定类型的资源。\n\
  \n```\nList(\nctx context.Context,\nlist ObjectList,\nopts ...ListOption,\n) error\n\
  ```\n\n`list` 参数是一个 `ObjectList` 类型的值，用于指示要列出的资源的*种类*并存储结果。默认情况下，列表操作将跨所有命名空间进行。\n\
  \n`List` 方法接受零个或多个实现了 `ListOption` 接口的对象参数。支持以下这些类型：\n\n*   `InNamespace`，`string`\
  \ 的别名，用于返回特定命名空间的资源。\n\n*   `MatchingLabels`，`map[string]string` 的别名，用于指定为返回资源而必须精确匹配的标签列表及其值。以下示例构建了一个\
  \ `MatchingLabels` 结构，用于过滤带有标签 `app=myapp` 的资源。\n\n*   `HasLabels`，`[]string` 的别名，用于指定为返回资源而必须存在的标签列表，不考虑其值。以下示例构建了一个\
  \ `HasLabels` 结构，用于过滤带有 `app` 和 `debug` 标签的资源。\n\n```\nmatchLabel := client.MatchingLabels{\n\
  \"app\": \"myapp\",\n}\n```\n\n*   `MatchingLabelsSelector`，内嵌了 `labels.Selector`\
  \ 接口，用于传递更高级的标签选择器。关于如何构建 `Selector` 的更多信息，请参阅第 6 章中的“过滤列表结果”一节。以下示例构建了一个 `MatchingLabelsSelector`\
  \ 结构，该结构可作为 `List` 的选项，用于过滤那些标签 `mykey` 不等于 `ignore` 的资源。\n\n```\nhasLabels := client.HasLabels{\"\
  app\", \"debug\"}\n```\n\n*   `MatchingFields`，`fields.Set` 的别名（其本身是 `map[string]string`\
  \ 的别名），用于指定要匹配的字段及其值。以下示例构建了一个 `MatchingFields` 结构，用于过滤字段 `status.phase` 为 `Running`\
  \ 的资源：\n\n```\nselector := labels.NewSelector()\nrequire, err := labels.NewRequirement(\n\
  \"mykey\",\nselection.NotEquals,\n[]string{\"ignore\"},\n)\n// 断言 err 为 nil\nselector\
  \ = selector.Add(*require)\nlabSelOption := client.MatchingLabelsSelector{\nSelector:\
  \ selector,\n}\n```\n\n*   `MatchingFieldsSelector`，内嵌了 `fields.Selector`，用于传递更高级的字段选择器。关于如何构建\
  \ `fields.Selector` 的更多信息，请参阅第 6 章中的“过滤列表结果”一节。以下示例构建了一个 `MatchingFieldsSelector`\
  \ 结构，用于过滤字段 `status.phase` 不等于 `Running` 的资源：\n\n```\nmatchFields := client.MatchingFields{\n\
  \"status.phase\": \"Running\",\n}\n```\n\n*   `Limit`，`int64` 的别名，和 `Continue`，`string`\
  \ 的别名，用于对结果进行分页。这些选项在第 2 章的“对结果进行分页”一节中有详细说明。\n\n```\nfieldSel := fields.OneTermNotEqualSelector(\n\
  \"status.phase\",\n\"Running\",\n)\nfieldSelector := client.MatchingFieldsSelector{\n\
  Selector: fieldSel,\n}\n```\n\n## 创建资源\n\n`Create` 方法用于在集群中创建新资源。\n\n```\nCreate(\n\
  ctx context.Context,\nobj Object,\nopts ...CreateOption,\n) error\n```\n\n作为参数传递的\
  \ `obj` 定义了要创建对象的种类及其定义。以下示例将在集群中创建一个 Pod：\n\n```\npodToCreate := corev1.Pod{ [...]\
  \ }\npodToCreate.SetName(\"nginx\")\npodToCreate.SetNamespace(\"default\")\nerr\
  \ = a.client.Create(ctx, &podToCreate)\n```\n\n以下选项可以作为 `CreateOption` 传递，以参数化 `Create`\
  \ 请求。\n\n*   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。\n\n*   `FieldOwner`，`string`\
  \ 的别名，表示 `Create` 操作的字段管理器名称。此信息对于服务器端应用操作的正确工作很有用。\n\n## 删除资源\n\n`Delete` 方法用于从集群中删除资源。\n\
  \n```\nDelete(\nctx context.Context,\nobj Object,\nopts ...DeleteOption,\n) error\n\
  ```\n\n作为参数传递的 `obj` 定义了要删除的对象的种类，以及其命名空间（如果资源是命名空间范围的）和名称。以下示例可用于删除一个 Pod。\n\n\
  ```\npodToDelete := corev1.Pod{}\npodToDelete.SetName(\"nginx\")\npodToDelete.SetNamespace(\"\
  prj2\")\nerr = a.client.Delete(ctx, &podToDelete)\n```\n\n以下选项可以作为 `DeleteOption`\
  \ 传递，以参数化 `Delete` 请求。\n\n*   `DryRunAll` – 此值表示应执行所有操作，但将资源持久化到存储的操作除外。\n\n*  \
  \ `GracePeriodSeconds`，`int64` 的别名 – 此值仅在删除 Pod 时有用。它表示在 Pod 被删除之前的持续时间（以秒为单位）。详见第\
  \ 6 章中的“删除资源”一节。\n\n*   `Preconditions`，`metav1.Preconditions` 的别名 – 它指示你期望删除哪个资源。详见第\
  \ 6 章中的“删除资源”一节。\n\n*   `PropagationPolicy`，`metav1.DeletionPropagation` 的别名 – 它指示是否以及如何执行垃圾回收。详见第\
  \ 6 章中的“删除资源”一节。\n\n## 删除资源集合\n\n`DeleteAllOf` 方法用于从集群中删除指定类型的所有资源。\n\n```\nDeleteAllOf(\n\
  ctx context.Context,\nobj Object,\nopts ...DeleteAllOfOption,\n) error\n```\n\n\
  作为参数传递的 `obj` 定义了要删除对象的种类。\n\n`DeleteAllOf` 操作可用的 `opts` 是 `List` 操作（参见“列出资源”一节）和\
  \ `Delete` 操作（参见“删除资源”一节）的选项组合。\n\n例如，以下是如何删除给定命名空间中的所有部署：\n\n```\nerr = a.client.DeleteAllOf(\n\
  ctx,\n&appsv1.Deployment{},\nclient.InNamespace(aNamespace))\n```\n\n## 更新资源\n\n\
  `Update` 方法用于更新集群中已有的资源。\n\n```\nUpdate(\nctx context.Context,\nobj Object,\nopts\
  \ ...UpdateOption,\n) error\n```\n\n`obj` 参数用于指示要更新的资源及其新定义。如果该对象在集群中不存在，则 `Update`\
  \ 操作会失败。\n\n以下选项可以作为 `UpdateOption` 传递，以参数化 `Update` 请求。\n\n*   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。\n\
  \n*   `FieldOwner`，`string` 的别名，表示 `Update` 操作的字段管理器名称。此信息对于服务器端应用操作的正确工作很有用。\n\n\
  ## 修补资源\n\n`Patch` 方法用于修补现有资源。它也可以用于运行服务器端应用操作。\n\n```\nPatch(\nctx context.Context,\n\
  obj Object,\npatch Patch,\nopts ...PatchOption,\n) error\n```\n\n以下选项可以作为 `PatchOption`\
  \ 传递，以参数化 `Patch` 请求。\n\n*   `DryRunAll` 值表示应执行所有操作，但将资源持久化到存储的操作除外。\n\n*   `FieldOwner`，`string`\
  \ 的别名，表示 `Patch` 操作的字段管理器名称。\n\n*   `ForceOwnership`，`struct{}` 的别名，表示调用者将重新获取其他管理器拥有的冲突字段。此选项仅在补丁类型为\
  \ `Apply` 时有效（参见下文）。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式要求和注意事项，将给定的英文文本翻译成中文。\n\
  \n\n### 服务端应用（Server-side Apply）\n\n要使用服务端应用操作，你需要指定一个值为 `client.Apply` 的 `patch`。`obj`\
  \ 值必须是新的对象定义。它必须包含对象的名称、命名空间（如果资源是按命名空间划分的）、组、版本和类型。\n\n字段管理器的名称是必需的，必须通过选项 `client.FieldOwner(name)`\
  \ 来指定。例如，以下是服务端应用一个 Deployment 的方法：\n\n```\ndeployToApply := appsv1.Deployment{\
  \ [...] }\ndeployToApply.SetName(\"nginx\")\ndeployToApply.SetNamespace(\"default\"\
  )\ndeployToApply.SetGroupVersionKind(\nappsv1.SchemeGroupVersion.WithKind(\"Deployment\"\
  ),\n)\nerr = a.client.Patch(\nctx,\n&deployToApply,\nclient.Apply,\nclient.FieldOwner(\"\
  mycontroller\"),\nclient.ForceOwnership,\n)\n```\n\n### 策略合并补丁（Strategic Merge Patch）\n\
  \n你在第 2 章的“使用策略合并补丁更新资源”一节中已经了解了如何使用策略合并补丁来修补资源。第 6 章的“使用策略合并补丁更新资源”一节展示了如何使用 `Client-go`\
  \ 库执行此操作。\n\n使用 `Client-go` 时，你必须首先从集群中读取一个资源（通过 `Get` 或 `List` 操作），然后使用此资源上的 `StrategicMergeFrom`\
  \ 函数创建一个补丁，接着更新资源，最后调用补丁上的 `Data` 方法来计算 JSON 补丁数据。\n\n使用 `controller-runtime` 客户端时，部分处理过程由客户端完成。你仍然需要从集群中读取资源（通过\
  \ `Get` 或 `List` 操作），使用 `StrategicMergeFrom` 函数创建一个补丁，然后更新资源。此时，你可以调用 `Patch` 方法，将更新后的对象和补丁作为参数传入。对\
  \ `Data` 方法的调用将在客户端内部完成。\n\n请注意，此处使用的 `StrategicMergeFrom` 函数与 `Client-go` 库中使用的函数相同。你可以参考第\
  \ 6 章的“使用策略合并补丁更新资源”一节，了解此方法的可用选项。\n\n例如，以下是向 Deployment 的 `Pod` 模板的第一个容器添加一个环境变量的方法。\n\
  \n- ❶ 从集群中获取要修补的 Deployment\n- ❷ 从该 Deployment 的一个副本创建一个 `Patch` 对象\n- ❸ 修改 Deployment\n\
  - ❹ 使用修改后的 Deployment 和 `Patch` 对象执行 `Patch` 操作\n\n```\nvar deploymentRead appsv1.Deployment\n\
  err = a.client.Get(                                                ❶\nctx,\nkey,\
  \ // 一个用于定义命名空间和名称的 ObjectKey\n&deploymentRead)\nif err != nil {\nreturn reconcile.Result{},\
  \ err\n}\npatch :=\nclient.StrategicMergeFrom(deploymentRead.DeepCopy())      ❷\n\
  depModified := deploymentRead.DeepCopy()\ndepModified.Spec.Template.Spec.Containers[0].Env\
  \ =      ❸\nappend(\ndepModified.Spec.Template.Spec.Containers[0].Env,\ncorev1.EnvVar{\n\
  Name:  \"newName\",\nValue: \"newValue\",\n})\nerr = a.client.Patch(ctx, &depModified,\
  \ patch)            ❹\n```\n\n### 合并补丁（Merge Patch）\n\n合并补丁的工作方式与策略合并补丁类似，区别在于列表的合并方式。有关策略合并补丁如何合并列表的更多信息，请参见第\
  \ 2 章的“修补数组字段”一节。对于合并补丁，不会考虑原始列表，新列表就是补丁中定义的列表。\n\n使用 `controller-runtime` 库时，你只需在代码清单的步骤\
  \ ❷ 中将调用 `client.StrategicMergeFrom` 替换为调用 `client.MergeFrom`，即可指示执行合并补丁。\n\n```\n\
  patch := client.MergeFrom(deploymentRead.DeepCopy())      ❷\n```\n\n## 更新资源的状态（Status）\n\
  \n在开发 Operator 时，你可能需要修改自定义资源（Custom Resource）的 Status 部分的值，以指示其当前状态。\n\n```\nUpdate(\n\
  ctx context.Context,\nobj Object,\nopts ...UpdateOption,\n) error\n```\n\n请注意，你不需要为\
  \ Status 执行特定的 `Create`、`Get` 或 `Delete` 操作，因为当你创建自定义资源本身时，Status 会作为自定义资源的一部分一起创建。此外，对资源的\
  \ `Get` 操作会返回资源的 Status 部分，而删除资源也会删除其 Status 部分。\n\n然而，API 服务器强制你为 Status 和资源的其余部分使用不同的\
  \ `Update` 方法，以防止你误操作同时修改这两个部分。\n\n要使 Status 的更新生效，自定义资源定义（Custom Resource Definition）必须在其子资源列表中声明\
  \ `status` 字段。请参阅第 8 章的“资源版本定义”一节，了解如何声明此 `status` 子资源。\n\n此方法的工作方式与资源本身的 `Update`\
  \ 方法类似，但要调用它，你需要在 `client.Status()` 返回的对象上调用该方法：\n\n```\nerr = client.Status().Update(ctx,\
  \ obj)\n```\n\n### 修补资源的状态\n\n与 `Update` 方法一样，修补资源的状态需要在 `client.Status()` 的结果上调用一个专用方法。\n\
  \n```\nPatch(\nctx context.Context,\nobj Object,\npatch Patch,\nopts ...PatchOption,\n\
  ) error\n```\n\n用于 Status 的 `Patch` 方法与资源本身的 `Patch` 方法工作方式相同，区别在于它只会修补资源的 Status\
  \ 部分。\n\n```\nerr = client.Status().Patch(ctx, obj, patch)\n```\n\n## 日志记录（Logging）\n\
  \nManager 利用 `controller-runtime` 库的 `log` 包中定义的日志系统。必须通过调用 `SetLogger` 来初始化日志记录器。之后，就可以使用\
  \ `log` 包中定义的 `Log` 变量。\n\n```\nimport (\ncrlog \"sigs.k8s.io/controller-runtime/pkg/log\"\
  \n\"sigs.k8s.io/controller-runtime/pkg/log/zap\"\n)\nfunc main() {\nlog.SetLogger(zap.New())\n\
  log.Log.Info(\"starting\")\n[...]\n}\n```\n\n`Log` 对象的类型是 `logr.Logger`（来自 `github.com/go-logr/logr`），它有两个主要方法：`Info`\
  \ 和 `Error`。\n\n```\nfunc (l Logger) Info(\nmsg string,\nkeysAndValues ...interface{},\n\
  )\nfunc (l Logger) Error(\nerr error,\nmsg string,\nkeysAndValues ...interface{},\n\
  )\n```\n\n`Logger` 是一个“结构化”的日志系统，其日志主要由键值对组成，而不是 `printf` 风格的格式化字符串。`printf` 风格的日志更易于人类阅读，而结构化日志更易于工具分析。日志条目的预定义键如下：\n\
  \n-   `level`：日志的详细程度级别；请参阅下一节了解日志详细程度的定义\n-   `ts`：日志条目的时间戳\n-   `logger`：此条目的日志记录器名称；请参阅后续部分了解日志记录器名称的定义\n\
  -   `msg`：与日志条目关联的消息\n-   `error`：与日志条目关联的错误\n\n`Info` 和 `Error` 方法接受一条消息以及零个或多个键值对。`Error`\
  \ 方法还接受一个错误值。\n\n### 详细程度（Verbosity）\n\n可以通过使用 `log.V(n).Info(...)` 为 Info 消息指定详细程度。`n`\
  \ 的详细程度值越大，消息的重要性越低。`log.Info(...)` 等同于 `log.V(0).Info(...)`。\n\n### 预定义值（Predefined\
  \ Values）\n\n你可以通过使用 `WithValues` 构建一个带有预定义键值对的新日志记录器：\n\n```\nfunc (l Logger) WithValues(\n\
  keysAndValues ...interface{},\n) Logger\nctrlLog := log.Log.WithValues(\"package\"\
  , \"controller\")\n```\n\n### 日志记录器名称（Logger Name）\n\n你可以通过使用 `WithName` 为日志记录器名称追加一个名称来构建一个新的日志记录器：\n\
  \n```\nfunc (l Logger) WithName(name string) Logger\n```\n\n连续调用 `WithName` 会向日志记录器名称添加后缀。例如，以下代码将设置日志记录器名称为\
  \ `controller.main`：\n\n```\nctrlLog := log.Log.WithName(\"controller\")\n[...]\n\
  ctrlMainLog = ctrlLog.Log.WithName(\"main\")\n```\n\n\n\n### 从上下文中获取日志记录器\n\n管理器会将一个日志记录器添加到传递给不同方法（特别是\
  \ `Reconcile` 函数）的 `Context` 中。\n\n你可以使用 `FromContext` 函数从 `Context` 中提取日志记录器。可选的参数可用于向日志记录器中添加预定义的键值对：\n\
  \n```go\nfunc FromContext(\nctx context.Context,\nkeysAndValues ...interface{},\n\
  ) logr.Logger {\nfunc (a *MyReconciler) Reconcile(\nctx context.Context,\nreq reconcile.Request,\n\
  ) (reconcile.Result, error) {\nlog := log.FromContext(ctx).WithName(\"reconcile\"\
  )\n[...]\n}\n```\n\n## 事件\n\nKubernetes API 提供了一个 `Event` 资源，`Event` 实例会附加到任何特定类型的实例上。事件由控制器发送，用于通知用户某个与对象相关的事件已发生。这些事件在执行\
  \ `kubectl describe` 时会显示出来。例如，你可以看到与 Pod 执行相关的事件：\n\n```bash\n$ kubectl describe\
  \ pods nginx\n[...]\nEvents:\nType    Reason     Age        From               Message\n\
  ----    ------     ----       ----               -------\nNormal  Scheduled  1s\
  \         default-scheduler  Successfully assigned...\nNormal  Pulling    0s   \
  \      kubelet            Pulling image \"nginx\"\nNormal  Pulled       kubelet\
  \            Successfully pulled...\nNormal  Created      kubelet            Created\
  \ container nginx\nNormal  Started      kubelet            Started container nginx\n\
  ```\n\n要从 `Reconcile` 函数发送此类事件，你需要能够访问由管理器提供的 `EventRecorder` 实例。在初始化期间，你可以通过管理器的\
  \ `GetEventRecorderFor` 方法获取此实例，然后在构建 `Reconcile` 结构体时传递这个值：\n\n```go\ntype MyReconciler\
  \ struct {\nclient        client.Client\nEventRecorder record.EventRecorder\n}\n\
  func main() {\n[...]\neventRecorder := mgr.GetEventRecorderFor(\n\"MyResource\"\
  ,\n)\nerr = builder.\nControllerManagedBy(mgr).\nNamed(controller.Name).\nFor(&mygroupv1alpha1.MyResource{}).\n\
  Owns(&appsv1.Deployment{}).\nComplete(&controller.MyReconciler{\nEventRecorder:\
  \ eventRecorder,\n})\n[...]\n}\n```\n\n然后，在 `Reconcile` 函数中，你可以调用 `Event`、`Eventf`\
  \ 和 `AnnotatedEventf` 方法。\n\n```go\nfunc (record.EventRecorder) Event(\nobject runtime.Object,\n\
  eventtype, reason, message string,\n)\nfunc (record.EventRecorder) Eventf(\nobject\
  \ runtime.Object,\neventtype, reason, messageFmt string,\nargs ...interface{},\n\
  )\nfunc (record.EventRecorder) AnnotatedEventf(\nobject runtime.Object,\nannotations\
  \ map[string]string,\neventtype, reason, messageFmt string,\nargs ...interface{},\n\
  )\n```\n\n`object` 参数指明事件要附加到哪个对象上。你需要传递正在被调和的**自定义资源**。\n\n`eventtype` 参数接受两个值，`corev1.EventTypeNormal`\
  \ 和 `corev1.EventTypeWarning`。\n\n`reason` 参数是一个采用 `UpperCamelCase` 格式的短值。`message`\
  \ 参数是一个人类可读的文本。\n\n`Event` 方法用于传递静态消息，`Eventf` 方法可以使用 `Sprintf` 创建消息，而 `AnnotatedEventf`\
  \ 方法还可以向事件附加注解。\n\n## 结论\n\n在本章中，你使用了 `controller-runtime` 库来开始创建一个运算符。你已经了解了如何使用适当的方案创建管理器，如何创建控制器并声明\
  \ `Reconcile` 函数，并且探索了该库提供的客户端用于访问集群中资源的各种功能。\n\n下一章将探讨如何编写 `Reconcile` 函数。\n\n"
- '# 11. 编写调谐循环


  在上一章中，我们已经了解了如何使用 `controller-runtime` 库来引导一个新项目以编写一个运算符。在本章中，我们将重点实现 `Reconcile`
  函数，这是实现运算符的重要部分。


  `Reconcile` 函数包含了运算符的所有业务逻辑。该函数将作用于单一的资源类型——可以说这个运算符*调谐*这种资源——并且当其他类型的对象触发事件时，可以通过使用*属主引用*将这些其他类型映射到被调谐的资源类型上，从而得到通知。


  `Reconcile` 函数的作用是确保系统的状态与被调谐资源中指定的状态相匹配。为此，它将创建“底层”资源来实现要调谐的资源。这些资源依次由其他控制器或运算符进行调谐。当这些资源的调谐完成时，它们的状态会被更新以反映其新状态。此外，运算符将能够检测到这些变化并相应地调整被调谐资源的状态。


  例如，你在上一章开始实现的运算符调谐了自定义资源 `MyResource`。该运算符将创建 `Deployment` 实例来实现 `MyResource` 实例，并且因此，该运算符也将希望监视
  Deployment 资源。


  当 Deployment 实例触发一个事件时，为其创建了 Deployment 的 `MyResource` 实例将被调谐。例如，在 Deployment 的
  Pod 被创建后，Deployment 的状态将被更新以指示所有副本正在运行。此时，运算符可以修改被调谐资源的状态以指示其已就绪。


  *调谐循环* 是一个过程，包括监视资源，在资源被创建、修改或删除时调用 `Reconcile` 函数，使用底层资源实现被调谐的资源，监视这些资源的状态，并相应更新被调谐资源的状态。


  ## 编写 Reconcile 函数


  `Reconcile` 函数从队列中接收一个要调谐的资源。首先要进行的操作是获取关于这个要调谐的资源的信息。


  事实上，只会接收到资源的命名空间和名称（其类型通过设计已知为运算符要调谐的类型），但你不会接收到资源的完整定义。


  使用 `Get` 操作来获取资源的定义。


  ### 检查资源是否存在


  资源可能因各种原因被加入队列：它已被创建、修改或删除（或者另一个拥有的资源已被创建、修改或删除）。在前两种情况（创建或修改）下，`Get` 操作将成功，并且 `Reconcile`
  函数此时将知道资源的定义。在删除的情况下，`Get` 操作将失败并返回 `Notfound` 错误，因为该资源已被删除。


  运算符的良好实践是在调谐资源时，为其创建的资源添加 `OwnerReferences`。主要目标是当这些创建的资源被修改时，能够调谐其属主，添加这些 `OwnerReferences`
  的一个结果是，当属主资源被删除时，这些拥有的资源将由 Kubernetes 垃圾收集器删除。


  因此，当被调谐的对象被删除时，在集群中无需执行任何操作，因为关联的已创建资源的删除将由集群处理。




  ### 实现已调和资源


  如果在集群中找到了需要调和的资源，Operator 的下一步是创建“底层”资源来实现此调和资源。


  由于 Kubernetes 是一个声明式平台，创建这些资源的一个好方法是声明底层资源应该是什么，而不依赖于它们在集群中是否存在，并依靠 Kubernetes 控制器接管并调和这些底层资源。


  因此，不能盲目使用 `Create` 方法，因为我们不确定资源是否存在，如果资源已存在，操作将会失败。


  你可以检查资源是否存在：如果不存在则创建，如果存在则修改。如之前章节所示，服务器端应用（Server-side Apply）方法在这种情况下非常完美：执行 Apply
  操作时，如果资源不存在，则创建它；如果资源存在，则修补它，并处理可能因其他参与者修改资源而产生的冲突。


  使用服务器端应用方法，Operator 无需检查资源是否存在，也无需检查资源是否被其他参与者修改。Operator 只需要从自己的角度使用资源的定义来执行服务器端应用操作。


  应用底层资源后，应考虑两种可能性。


  * **情况 1：** 如果底层资源已存在且未被 Apply 操作修改，则不会为这些资源触发 MODIFIED 事件，并且 `Reconcile` 函数将不会被再次调用（至少对于这次
  Apply 操作来说）。


  * **情况 2：** 如果底层资源被创建或修改，这将为这些资源触发 CREATED 或 MODIFIED 事件，并且由于这些事件，`Reconcile` 函数将被再次调用。函数的新执行将再次
  Apply 底层资源，如果在此期间没有更新这些资源，Operator 将进入情况 1。


  新的底层资源最终将由它们各自的 Operator 或控制器处理。反过来，它们将调和这些资源，并更新其状态以宣布当前状态。


  一旦这些底层资源的状态被更新，将触发 MODIFIED 事件，并且 `Reconcile` 函数将被再次调用。Operator 将再次 Apply 资源，并且必须考虑情况
  1 和情况 2。


  Operator 需要在某个时刻读取它创建的底层资源的状态，以便计算已调和资源的状态。在简单的情况下，可以在执行底层资源的服务器端应用之后立即执行此操作。


  ### 简单实现示例


  为了说明，这里是一个完整的 `Reconcile` 函数，用于一个 Operator，该 Operator 使用 `MyResource` 实例中提供的 `Image`
  和 `Memory` 信息创建一个 Deployment。


  * ❶ 获取要调和的资源的定义


  * ❷ 如果资源不存在，立即返回


  * ❸ 构建指向要调和资源的 `ownerReference`


  * ❹ 为“底层” Deployment 使用服务器端应用


  * ❺ 基于“底层” Deployment 计算资源状态


  * ❻ 更新要调和资源的状态


  ```go

  func (a *MyReconciler) Reconcile(

  ctx context.Context,

  req reconcile.Request,

  ) (reconcile.Result, error) {

  log := log.FromContext(ctx)

  log.Info("获取 myresource 实例")

  myresource := mygroupv1alpha1.MyResource{}

  err := a.client.Get(                                        ❶

  ctx,

  req.NamespacedName,

  &myresource,

  &client.GetOptions{},

  )

  if err != nil {

  if errors.IsNotFound(err) {                              ❷

  log.Info("资源未找到")

  return reconcile.Result{}, nil

  }

  return reconcile.Result{}, err

  }

  ownerReference := metav1.NewControllerRef(               ❸

  &myresource,

  mygroupv1alpha1.SchemeGroupVersion.

  WithKind("MyResource"),

  )

  err = a.applyDeployment(                                   ❹

  ctx,

  &myresource,

  ownerReference,

  )

  if err != nil {

  return reconcile.Result{}, err

  }

  status, err := a.computeStatus(ctx, &myresource)          ❺

  if err != nil {

  return reconcile.Result{}, err

  }

  myresource.Status = *status

  log.Info("更新状态", "state", status.State)

  err = a.client.Status().Update(ctx, &myresource)          ❻

  if err != nil {

  return reconcile.Result{}, err

  }

  return reconcile.Result{}, nil

  }

  ```


  以下是 Operator 创建的 Deployment 的服务器端应用操作的实现示例：


  * ❼ 使用 `Patch` 方法执行服务器端应用操作


  * ❽ 使用待调和资源中定义的 `Image`


  * ❾ 使用待调和资源中定义的 `Memory`


  * ❿ 设置 `OwnerReference` 以指向待调和资源


  ```go

  func (a *MyReconciler) applyDeployment(

  ctx context.Context,

  myres *mygroupv1alpha1.MyResource,

  ownerref *metav1.OwnerReference,

  ) error {

  deploy := createDeployment(myres, ownerref)

  err := a.client.Patch(                                   ❼

  ctx,

  deploy,

  client.Apply,

  client.FieldOwner(Name),

  client.ForceOwnership,

  )

  return err

  }

  func createDeployment(

  myres *mygroupv1alpha1.MyResource,

  ownerref *metav1.OwnerReference,

  ) *appsv1.Deployment {

  deploy := &appsv1.Deployment{

  ObjectMeta: metav1.ObjectMeta{

  Labels: map[string]string{

  "myresource": myres.GetName(),

  },

  },

  Spec: appsv1.DeploymentSpec{

  Selector: &metav1.LabelSelector{

  MatchLabels: map[string]string{

  "myresource": myres.GetName(),

  },

  },

  Template: corev1.PodTemplateSpec{

  ObjectMeta: metav1.ObjectMeta{

  Labels: map[string]string{

  "myresource": myres.GetName(),

  },

  },

  Spec: corev1.PodSpec{

  Containers: []corev1.Container{

  {

  Name:  "main",

  Image: myres.Spec.Image,                    ❽

  Resources: corev1.ResourceRequirements{

  Requests: corev1.ResourceList{

  corev1.ResourceMemory:      myres.Spec.Memory,          ❾

  },

  },

  },

  },

  },

  },

  },

  }

  deploy.SetName(myres.GetName() + "-deployment")

  deploy.SetNamespace(myres.GetNamespace())

  deploy.SetGroupVersionKind(

  appsv1.SchemeGroupVersion.WithKind("Deployment"),

  )

  deploy.SetOwnerReferences([]metav1.OwnerReference{     ❿

  *ownerref,

  })

  return deploy

  }

  ```


  然后，这是一个如何实现状态计算和更新的示例：


  * ⓫ 获取为此调和资源创建的 Deployment


  * ⓬ 获取找到的唯一 Deployment 的状态


  * ⓭ 当副本数为 `1` 时，为已调和资源设置状态为 `Ready`


  ```go

  const (

  _buildingState = "Building"

  _readyState    = "Ready"

  )

  func (a *MyReconciler) computeStatus(

  ctx context.Context,

  myres *mygroupv1alpha1.MyResource,

  ) (*mygroupv1alpha1.MyResourceStatus, error) {

  logger := log.FromContext(ctx)

  result := mygroupv1alpha1.MyResourceStatus{

  State: _buildingState,

  }

  deployList := appsv1.DeploymentList{}

  err := a.client.List(                                        ⓫

  ctx,

  &deployList,

  client.InNamespace(myres.GetNamespace()),

  client.MatchingLabels{

  "myresource": myres.GetName(),

  },

  )

  if err != nil {

  return nil, err

  }

  if len(deployList.Items) == 0 {

  logger.Info("未找到 Deployment")

  return &result, nil

  }

  if len(deployList.Items) > 1 {

  logger.Info(

  "找到过多 Deployment", "count",

  len(deployList.Items),

  )

  return nil, fmt.Errorf(

  "找到 %d 个 Deployment，预期为 1",

  len(deployList.Items),

  )

  }

  status := deployList.Items[0].Status                    ⓬

  logger.Info(

  "获取 Deployment 状态",

  "status", status,

  )

  if status.ReadyReplicas == 1 {

  result.State = _readyState                              ⓭

  }

  return &result, nil

  }

  ```




  ## 结论


  本章展示了如何为一个简单的 Operator 实现 `Reconcile` 函数，该 Operator 利用自定义资源中的信息创建了一个 Deployment。


  真实的 Operator 通常比这个简单示例更复杂，可能会创建多个具有更复杂生命周期的资源，但本章演示了开始编写 Operator 时需要了解的几个要点：`Reconcile`
  循环的声明式特性、**所有者引用**的使用、**服务端应用**的使用，以及状态更新方式。


  下一章将展示如何测试 `Reconcile` 循环。


