    \ required group of ***Len***, ***Less***, and ***Swap***.\n\n```\n// Group of\
    \ functions that ensure that SortType can be sorted\ntype SortType[T any] struct\
    \ {\nslice []T\ncompare func(T, T) bool\n}\nfunc (s SortType[T]) Len() int {\n\
    return len(s.slice)\n}\nfunc (s SortType[T]) Less(i, j int) bool {\nreturn s.compare(s.slice[i],\
    \ s.slice[j])\n}\nfunc (s SortType[T]) Swap(i, j int) {\ns.slice[i], s.slice[j]\
    \ = s.slice[j], s.slice[i]\n}\n// end of group for SortType\n```\n\nFinally, we\
    \ define a function, ***PerformSort***, that uses ***SortType*** as follows:\n\
    \n```\nfunc PerformSort[T any](slice []T, compare func(T, T) bool) {\nsort.Sort(SortType[T]{slice,\
    \ compare})\n}\n```\n\nThe user of ***PerformSort*** must supply a function for\
    \ comparing two elements of type T.\n\nListing [1-6](#527841_1_En_1_Chapter.xhtml#PC10)\
    \ integrates this functionality into the code that implements the generic ***addStudent***\
    \ function to allow us to use the imported **sort** package and its function **Sort**.\n\
    \n```\npackage main\nimport (\n\"fmt\"\n\"sort\"\n)\ntype Ordered interface {\n\
    ~int | ~float64 | ~string\n}\ntype Student struct {\nName string\nID int\nAge\
    \ float64\n}\nfunc addStudent[T any](students []T, student T) []T {\nreturn append(students,\
    \ student)\n}\n// Group of functions that ensure that an OrderedSlice can be sorted\n\
    type OrderedSlice[T Ordered] []T // T must implement \nfunc (s OrderedSlice[T])\
    \ Len() int {\nreturn len(s)\n}\nfunc (s OrderedSlice[T]) Less(i, j int) bool\
    \ {\nreturn s[i] < s[j]\n}\nfunc (s OrderedSlice[T]) Swap(i, j int) {\ns[i], s[j]\
