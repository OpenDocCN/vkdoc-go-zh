- fmt: '### Efficient Strategy for Maze Path Using a Stack


    Using a `stack`, we can develop an efficient strategy, which is outlined as follows.


    At any location along the maze path, the next move can be chosen from among the
    eight adjacent locations (north, northeast, east, southeast, south, southwest,
    west, and northwest) providing that the given location has value `0` (is open).
    We let the program make a random choice among the open adjacent locations. The
    program will possibly produce different viable paths each time it is run.


    Since a path cannot visit the same location more than once, we set the value along
    each cell in the path from `0` to `1`.


    After each move, we push the current position along with the direction of the
    move to be made onto the path stack. If the path hits a dead end as many typically
    will, we can backtrack and access the last safe position and continue from there.


    More formally, our maze algorithm uses a stack as its central control mechanism
    and is the following:


    1. Load the maze file, number of rows, number of columns, and the starting and
    ending locations.

    2. Initialize a path stack that holds path objects. We use a generic stack with
    the base type `T` of type `Path`.

    3. A `path` object contains a coordinate within the maze, a current move direction,
    and a list of available move directions.

    4. Choose an initial move direction from among the open neighboring locations.

    5. As each move direction is attempted, delete it from the list of eight possible
    move directions.

    6. Construct a new path object from the starting point, an initial move direction,
    and a list of remaining move directions.

    7. Push the initial path object onto the stack.

    8. While the stack is not empty, get the path object at the top of the stack by
    popping the stack.

    9. Start a loop: While the current path object has more available moves, choose
    one of the available locations randomly and set its value from `0` to `1`. Construct
    a new path object and push it onto the stack. While the stack is not empty, get
    the path object at the top of the stack by popping the stack.


    ### Building Infrastructure for Maze Application


    Before we plunge into the maze implementation, we build some infrastructure by
    defining some relevant types and their operations – some abstract data types.


    Listing [5-10](#527841_1_En_5_Chapter.xhtml#PC22) introduces the basic types needed
    for the maze application.


    ```

    package main

    import (

    "fmt"

    "math/rand"

    "time"

    )

    // Direction abstraction

    type Direction int

    const (

    N int = 0

    NE = 1

    E = 2

    SE = 3

    S = 4

    SW = 5

    W = 6

    NW = 7

    NotAvailable = 8

    )

    func (d Direction) String() string {

    switch d {

    case 0:

    return "north"

    case NE:

    return "north-east"

    case E:

    return "east"

    case SE:

    return "south-east"

    case S:

    return "south"

    case SW:

    return "south-west"

    case W:

    return "west"

    case NW:

    return "north-west"

    case NotAvailable:

    return "not available"

    }

    return "unknown"

    }

    func (d Direction) PrintDirection() {

    fmt.Println("direction: ", d)

    }

    // Point abstraction

    type Point struct {

    x, y int

    }

    func (p Point) Equals(other Point) bool {

    return p.x == other.x && p.y == other.y

    }

    func (p Point) PrintPoint() {

    fmt.Printf("\n", p.x, p.y)

    }

    // Path abstraction

    type Path struct {

    point Point

    move Direction

    movesAvailable []Direction

    }

    func NewPath(point Point) Path {

    path := Path{point, Direction(NotAvailable),

    []Direction{}}

    path.move = NotAvailable

    // Initially all directions available

    path.movesAvailable = []Direction{0, NE, E, SE, S, SW, W, NW}

    return path

    }

    func (path *Path) RandomMove() Direction {

    // Returns value of move and changes the receiver

    indicesAvailable := []int{}

    for index := 0; index  0 {

    randomIndex := rand.Intn(count)

    path.move =

    path.movesAvailable[indicesAvailable[randomIndex]]

    path.movesAvailable[indicesAvailable[randomIndex]]

    = NotAvailable

    return path.move

    } else {

    return NotAvailable

    }

    }

    func main() {

    rand.Seed(time.Now().UnixNano())

    myDirection := Direction(6)

    myDirection.PrintDirection()

    myPoint := Point{3, 4}

    myPoint.PrintPoint()

    result := myPoint.Equals(Point{3, 4})

    fmt.Println(result)

    myPath := NewPath(Point{3, 4})

    randomMove := myPath.RandomMove()

    fmt.Println(randomMove)

    fmt.Println(myPath)

    }

    /* Output

    direction:  west


    true

    south

    {{3 4} 4 [0 1 2 3 8 5 6 7]}

    */

    Listing 5-10

    Type infrastructure for maze application

    ```


    The method `RandomMove` changes the receiver and returns the direction of the
    move.


    Go does not support enum types, so we simulate an enum type by defining


    `type Direction int`


    Creating this new type allows us to protect entities of this type from being manipulated
    and possibly corrupted like they were ordinary integers.


    We define a set of constants representing the nine directions that are possible
    (if we consider `NotAvailable` to be one of these).


    Function `main` does nothing useful but is there to illustrate how variables of
    each type can be created and used.


    Now we are ready to introduce the `Maze` abstraction and write this application.
    Since we will need a stack (we will use a `slicestack` for this application although
    a `nodestack` would do just as well), we will create a separate subdirectory for
    the `Maze` functionality (the code in package `main`) and import the `slicestack`.
    We will create a `go.mod` file in the subdirectory `mainmaze` that contains the
    `main` package. The `go.mod` file is


    ```

    module example.com/main

    go 1.18

    replace example.com/slicestack => ../slicestack

    require example.com/slicestack v0.0.0-00010101000000-000000000000

    ```


    The `Maze` type is defined as follows:


    ```

    type Maze struct {

    rows, cols int

    start, end Point

    mazefile   string

    barriers   [][]bool

    current    Path

    moveCount  int

    pathStack  slicestack.Stack[Path]

    gameOver   bool

    }

    ```


    The field `barriers`, which defines the locations that are either blocked or open,
    is a two-dimensional slice of bool. A rune of `"1"` in the `mazefile` indicates
    a blocked location, and a rune of `"0"` indicates an open location.


    The field `pathStack` is a `slicestack.Stack` with `Path` as its generic type.'
