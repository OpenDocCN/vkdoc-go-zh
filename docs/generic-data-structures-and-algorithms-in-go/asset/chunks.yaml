    ## 16.7 总结


    在本章中，我们介绍了图结构及其一些应用。我们展示了几个如何表示图的示例，并研究了一些与图遍历相关的**基本算法**。


    下一章将介绍著名的**旅行商问题（TSP）**。所有已知的此问题的精确解在计算上都难以处理。我们将介绍一种这样的精确解，并在一个较小规模的问题上进行测试。我们还将展示如何绘制与
    TSP 解相关的路径图。


    # 17. 旅行商问题


    上一章介绍了图数据结构。我们展示了一个通用的实现。几个经典的图算法也已被实现和讨论。


    本章是探讨经典旅行商问题解决方案的系列章节中的第一章。该问题的精确解在计算上是难以处理的。在本章中，我们将介绍并实现一个获取该问题精确解的算法。


    在下一节中，我们将介绍这个经典问题。


    ## 17.1 旅行商问题及其历史


    旅行商问题（TSP）是一个有着丰富历史的经典问题。给定一组城市以及每对城市之间的距离，该问题是要求**找到访问每个城市恰好一次并返回起始城市的最短路径**。该问题于
    1930 年首次被提出，现已成为优化领域研究最深入的问题之一。


    一些历史背景：


    请参见 [`en.wikipedia.org/wiki/Travelling_salesman_problem#Exact_algorithms`](https://en.wikipedia.org/wiki/Travelling_salesman_problem%2523Exact_algorithms)。


    1.  2001 年，使用由 [George Dantzig](https://en.wikipedia.org/wiki/George_Dantzig)、[Ray
    Fulkerson](https://en.wikipedia.org/wiki/D._R._Fulkerson) 和 [Selmer M. Johnson](https://en.wikipedia.org/wiki/Selmer_M._Johnson)
    于 1954 年提出的、基于[线性规划](https://en.wikipedia.org/wiki/Linear_programming)的[割平面法](https://en.wikipedia.org/wiki/Cutting-plane_method)，找到了
    TSPLIB 中 15,112 个德国城镇的精确解。


    2.  2004 年 5 月，访问瑞典全部 24,978 个城镇的旅行商问题被解决：计算出一条长度约为 72,500 公里的路径，并证明了不存在更短的路径。


    3.  2005 年 3 月，使用 [Concorde TSP 求解器](https://en.wikipedia.org/wiki/Concorde_TSP_Solver)解决了访问电路板上全部
    33,810 个点的旅行商问题。该计算耗时约 15.7 CPU 年。


    TSP 是一类被称为 **NP-hard**（非确定性多项式时间困难）问题的成员之一。如果能为这类问题中的任何一个找到基于多项式时间的解，则可以证明可以为该组中的所有问题找到多项式时间解。迄今为止，尚未为任何
    NP-hard 问题找到这样的多项式时间解。


    在下一节中，我们将介绍一种针对此问题的蛮力解法，该方法可以产生精确解。


    ## 17.2 精确的蛮力解法


    城市将由图中的顶点表示，并编号为 0, 1, 2, …, n。城市之间的距离将指定为整数或浮点数，并显示为图中的边。


    考虑图 17-1 所示的图形。该图表示一个四城市问题。边上的值代表城市之间的距离。


    ![一个使用蛮力解法求解四城市 TSP 的图解。城市标记为 0、1、3 和 4。城市之间的距离是边，以“城市 距离”的格式表示：0 到 1, 5。0 到 2,
    3。0 到 3, 9。1 到 2, 2。1 到 3, 1。2 到 3, 6。](img/527841_1_En_17_Fig1_HTML.png)


    **图 17-1** – 四城市 TSP 图形


    蛮力解法要求我们获取所有以城市 0 开始并以城市 0 结束的路径排列。对于排列中的每条路径，我们计算其成本。我们返回成本最低的路径。


    我们考虑的路径排列如图 17-2 所示。


    ![一个使用蛮力解法展示 TSP 路径排列的图解。展示了 6 组路径排列。第一组：0 1 2 3。第二组：1 3 2。第三组：0 2 1 3。第四组：0 2
    3 1。第五组：0 3 2 1。第六组：0 3 1 2。](img/527841_1_En_17_Fig2_HTML.png)


    **图 17-2** – 路径排列


    对于每条路径排列，我们计算路径的长度。具有最小长度的路径排列是该问题的一个最优解。可能存在多个并列最优解。


    ### 寻找排列


    第一个任务是计算一个包含从 0 开始的连续整数的切片的所有排列。


    清单 17-1 执行此任务。


    ```

    package main

    import (

    "fmt"

    )

    func Permutations(data []int, operation func([]int)) {

    permute(data, operation, 0)

    }

    func permute(data []int, operation func([]int), step

    int) {

    if step > len(data) {

    operation(data)

    return

    }

    permute(data, operation, step + 1)

    for k := step + 1; k < len(data); k++ {

    data[step], data[k] = data[k], data[step]

    permute(data, operation, step + 1)

    data[step], data[k] = data[k], data[step]

    }

    }

    func main() {

    data := []int{0, 1, 2, 3}

    Permutations(data, func(a []int) {

    fmt.Println(a)

    })

    }

