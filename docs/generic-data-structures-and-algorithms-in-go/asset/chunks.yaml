- fmt: '# 15.3 DNA Subsequences


    DNA strings are a sequence of characters taken from the alphabet {A, C, G, T}.
    An example of such a string is “C**GT**T**A**C**AA**TTT**G**C**G**”.


    We define a **subsequence** of a string to be a sequence of characters taken in
    order (not necessarily contiguous order) from the characters of the original string
    as one scans from left to right in the original string.


    For the preceding string, a subsequence would be “GTAAAGG”. This sequence is taken
    from the characters shown in boldface from the original string.


    In computational genetics, an important problem is finding the longest subsequence
    that is common to two DNA strings. This is the longest subsequence problem.


    A brute-force approach would be to enumerate all the subsequences of `string1`
    and then test each one against `string2`. If `string1` has **n** characters and
    `string2` has **m** characters, it would take `O(2^(n)m)` for this brute-force
    algorithm. This is computationally intractable for a large `string1`.


    We use dynamic programming to solve this problem.


    We define `Length(j, k)` as the length of a longest string that is a subsequence
    of `X[0:j]` and `Y[0:k]`.


    There are two cases to consider. In the first, `X[j-1]` is equal to `y[k-1]`.


    It follows then that `Length(j, k) = 1 + Length(j-1, k–1)`.


    If `x[j-1]` is not equal to `y[k-1]`, we cannot have a subsequence that includes
    `x[j-1]` and `y[k-1]`.


    We then set `Length(j, k) = max{Length(j-1, k), Length(j, k – 1)}`.


    `Length(j, 0)` is `0` for `j = 0, 1, …, n` and `Length(0, k)` is `0` for `k =
    0, 1, …, m`.


    These recurrence relations give rise to a dynamic programming solution.


    We create an `(n + 1) x (m + 1)` two-dimensional slice, `L`. We initialize this
    list to `0`’s. We iteratively construct `L` until we get `L[n,m]`.


    Listing [15-3](#527841_1_En_15_Chapter.xhtml#PC8) presents a dynamic programming
    solution to the longest common subsequence problem along with a main driver program
    with two test cases.


    ```

    package main

    import (

    "fmt"

    )

    func max(value1, value2 int) int {

    if value1 >= value2 {

    return value1

    } else {

    return value2

    }

    }

    func reverse(x []rune) []rune {

    result := []rune{}

    for index := len(x) - 1; index >= 0; index-- {

    result = append(result, x[index])

    }

    return result

    }

    func longestCommonSubsequenceTable(x, y []rune) (LCS [][]int) {

    // Return matrix so that LCS[j][k] is longest

    // common sequence for x[0:j] and y[0:k]

    n := len(x)

    m := len(y)

    // Initialize LCS table of size (n + 1 x m + 1)

    LCS = make([][]int, n + 1)

    for row := 0; row = table[j][k - 1] {

    j -= 1

    k -= 1

    }

    }

    return string(reverse(result))

    }

    func main() {

    x := "CGTTACAATTTGCG"

    y := "TTTTAAACGTGCG"

    lcs := LongestCommonSequence([]rune(x), []rune(y))

    fmt.Println(lcs)

    x = "ATCGAATTCCGGTAGTCGT"

    y = "CGATAGTTCAGCCAG"

    lcs = LongestCommonSequence([]rune(x), []rune(y))

    fmt.Println(lcs)

    }

    /* Output

    TTAATGCG

    TAGC

    */

    Listing 15-3

    Longest common subsequence

    ```


    ### Discussion of Code


    In order to be able to access individual characters of the `x` and `y` input strings,
    we need to convert each to a slice of `rune`.


    The recurrence relationships described earlier form the basis for the details
    in function `longestCommonSubsequenceTable`.


    In function `LongestCommonSequence`, we start at the right of the table and work
    leftward toward the beginning of the table. Therefore, we need to reverse the
    result and convert the reversed slice of `rune` to a string.


    The computational complexity of this dynamic programming solution is `O(n x m)`.


    ## 15.4 Summary


    The algorithm design technique of dynamic programming was introduced. It was applied
    to several problems including Fibonacci numbers, 0/1 knapsack, and DNA subsequences.
    In all three problems, dynamic programming provides an efficient solution.


    In the next chapter, we turn our attention to graph structures and some classic
    algorithms that utilize graphs.


    # 16. Graph Structures


    In the previous chapter, we presented dynamic programming and three applications.


    In this chapter, we introduce graph structures and some applications. We show
    several examples of how to represent a graph, and we examine some basic algorithms
    associated with graph traversal.


    In the next section, we examine how graphs can be represented.


    ## 16.1 Representing Graphs


    **Graph** data structures provide one of the most useful and powerful frameworks
    for algorithm design. A graph (not to be confused with a pictorial representation
    of a mathematical function) can represent a huge number of systems from communication
    networks, transportation, electrical grid, online interactions, games, and pattern
    matching, to name a few.


    A graph consists of a set of nodes and edges between them: `Graph = (N, E)`, where
    `N` is the collection of nodes and `E` the collection of edges.


    In a **directed graph**, each edge has a specified direction.


    Nodes are **adjacent** if there is an edge connecting them. Nodes that are adjacent
    to a given node are **neighbors**.


    The **degree** of a node is the number of nodes incident to it.


    A **path** in a graph is a subgraph (subset of `N` and `E`) where the edges connect
    a series of nodes in a sequence without visiting any node more than once.


    A **weighted graph** has a weight associated with each edge. The length of a path
    is the sum of its edge weights.


    Consider the weighted directed graph shown in Figure [16-1](#527841_1_En_16_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_16_Chapter/527841_1_En_16_Fig1_HTML.png)


    An illustration of a weighted graph with nodes and edges, and paths with numerical
    values. Nodes are represented by alphabets. The values are depicted in the format:
    node to node, numerical number. A to B, 2\. A to C, 5\. A to D, 9\. B to D, 3\.
    C to D, 7\. C to F, 9\. D to E, 4\. E to G, 7\. G to F, 3\. E to F, 6.


    Figure 16-1


    A weighted graph


    In the next section, we discuss two methods for traversing this graph or any graph.
    We allow the node to be of generic type `OrderedStringer`. Here, the generic type
    is `String`.


    ## 16.2 Traversing Graphs


    We look at two important traversal algorithms:


    1.  Depth-first search (DFS)

    2.  Breadth-first search (BFS)


    The method `DFS` uses recursion and moves in a sequence outward from the starting
    node and continues to visit nodes in a sequence as far as possible from the starting
    node without revisiting a node and getting progressively closer to the starting
    node.


    The method `BFS` uses iteration and an internal queue to traverse the graph incrementally
    from the starting node. Nodes are visited at distances progressively further from
    the starting vertex toward the furthest vertex from the starting vertex.


    The edge values are stored in a global map variable as edges are defined.


    In the next section, we discuss and implement a depth-first traversal and a breadth-first
    traversal of a graph with generic vertex values.'
