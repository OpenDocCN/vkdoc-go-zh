  raw: '### Deletion


    The algorithm and method for removing a key from a search tree are more complicated.
    After the removal, we must be guaranteed to still have a search tree.


    There are three special cases:


    1.  The node to be removed is a leaf node.


    2.  The node to be removed has one child.


    3.  The node to be removed has two children.


    Case 1 is the simplest. We find the parent of the leaf node and set the appropriate
    link (left or right) of the parent to nil, effectively clipping the leaf node
    from the tree.


    The second case (the node to be removed has one child) is handled as a linked
    list deletion as follows:


    Assume **left** is the left child of the node being deleted, or assume **right**
    is the right child of the node being deleted.


    ```

    if node to be deleted has one child (left or right):

    if left != nil and parent.left == keyNode:

    parent.left = left

    else if left != nil and parent.right == keyNode:

    parent.right = left

    else if right != nil and parent.left == keyNode:

    parent.left = right

    else if right != nil and parent.right == keyNode:

    parent.right = right

    ```


    As an exercise, diagram out these four cases to verify that the ***keyNode***
    is unlinked from its parent and the parent reattached to its grandchild.


    The third case (the node to be removed has two children) is the most complex.
    It is a three-step process:


    1.  Find the inorder successor of ***keyNode*** (the smallest node to the right
    of ***keyNode***).


    2.  Copy the key from ***successor*** node to ***keyNode***.


    3.  Remove the ***successor*** node.


    As an exercise, show that the ***successor*** node has either zero or one child,
    so its removal is a case 1 or case 2 deletion shown previously.


    In the next section, we present a generic binary search tree implementation.


    ## 9.2 Generic Binary Search Tree


    We present a generic implementation of binary search tree. We must constrain the
    generic type, **T**, so that it satisfies two conditions:


    1.  The values of type **T** stored in the tree nodes can be compared.


    2.  The values of type **T** stored in the tree nodes can be converted to a string
    using the **String( )** function.


    ### Type OrderedStringer


    We define a constraint type ***OrderedStringer*** that satisfies the two preceding
    conditions as follows:


    ```

    type ordered interface {

    ~int | ~float64 | ~string

    }

    type OrderedStringer interface {

    ordered

    String() string

    }

    ```


    Requirement 1 is specified using the ***ordered*** type. Requirement 2 is specified
    using the signature for the ***String()*** function.


    Any instantiation of the generic binary search tree must use a value type that
    satisfies the ***OrderedStringer*** type given previously. We will present examples
    later in this section that illustrates this usage.


    ### Generic Types Needed for Binary Search Tree


    Listing [9-1](#527841_1_En_9_Chapter.xhtml#PC3) presents the generic data structures
    needed in package **binarysearchtree**.


    ```

    package binarysearchtree

    import (

    "image/color"

    "log"

    "fyne.io/fyne/v2"

    "fyne.io/fyne/v2/app"

    "fyne.io/fyne/v2/canvas"

    "fyne.io/fyne/v2/theme"

    "github.com/mitchellh/go-homedir"

    "gonum.org/v1/plot"

    "gonum.org/v1/plot/plotter"

    "gonum.org/v1/plot/vg"

    "gonum.org/v1/plot/vg/draw"

    )

    type ordered interface {

    ~int | ~float64 | ~string

    }

    type BinarySearchTree[T OrderedStringer] struct {

    Root *Node[T]

    NumNodes int

    }

    type Node[T OrderedStringer] struct {

    Value T

    Left *Node[T]

    Right *Node[T]

    }

    type OrderedStringer interface {

    ordered

    String() string

    }

    Listing 9-1

    Generic data structures in package binarysearchtree

    ```


    The type ***BinarySearchTree*** and the type ***Node*** are each defined with
    a generic parameter ***T*** of type ***OrderedStringer***. This assures us that
    we can compare node values and output the values as strings in our graphical display
    of the generic tree. If we were not using the functions for displaying our binary
    search tree, we would not need the second constraint on the generic parameter
    ***T***.


    ### Methods for Binary Search Tree


    The methods defined for type ***BinarySearchTree*** are presented in Listing [9-2](#527841_1_En_9_Chapter.xhtml#PC4).


    ```

    func (bst *BinarySearchTree[T]) Insert(newValue T) {

    if bst.Search(newValue) == false { // newValue not in existing tree

    n := &Node[T]{newValue, nil, nil}

    if bst.Root == nil { // First value in bst

    bst.Root = &Node[T]{newValue, nil, nil}

    } else {

    insertNode(bst.Root, n)

    }

    bst.NumNodes += 1

    }

    }

    func (bst *BinarySearchTree[T]) Delete(value T) {

    if bst.Search(value) == true {

    deleteNode(bst.Root, value)

    bst.NumNodes -= 1

    }

    }

    func (bst *BinarySearchTree[T]) Search(value T) bool {

    return search(bst.Root, value)

    }

    func (bst *BinarySearchTree[T]) InOrderTraverse(op func(T)) {

    inOrderTraverse(bst.Root, op)

    }

    func (bst *BinarySearchTree[T]) Min() *T {

    node := bst.Root

    if node == nil {

    return nil

    }

    for {

    if node.Left == nil {

    return &node.Value

    }

    node = node.Left

    }

    }

    func (bst *BinarySearchTree[T]) Max() (*T, int) { // second return value is

    // height

    node := bst.Root

    height := 1

    if node == nil {

    return nil, 0

    }

    for {

    if node.Right == nil {

    return &node.Value, height

    }

    height += 1

    node = node.Right

    }

    }

    Listing 9-2

    Methods for BinarySearchTree

    ```


    ### Discussion of Insert, Delete, and Inorder Traversal


    Methods ***Insert*** and ***Delete*** require that the node being inserted is
    not currently in the search tree and that the node being deleted is in the search
    tree. There is a small performance penalty imposed by this testing if the tree
    is relatively balanced.


    The generic parameter constraint is not present in any of the methods. The compiler
    can infer this constraint since it is defined in type ***BinarySearchTree***.


    The method ***InOrderTraversal*** takes a function **op** as input. This represents
    the operation to be performed when visiting each node of the binary search tree.


    ### Support Functions


    Listing [9-3](#527841_1_En_9_Chapter.xhtml#PC5) contains the support functions
    that do the actual work defined in the publicly available methods defined in Listing
    [9-2](#527841_1_En_9_Chapter.xhtml#PC4).


    ```

    func insertNode[T OrderedStringer](node, newNode *Node[T]) {

    if newNode.Value  node.Value {

    node.Right = delete(node.Right, value)

    return node

    }

    if node.Left == nil && node.Right == nil {

    node = nil

    return nil

    }

    if node.Left == nil {

    node = node.Right

    return node

    }

    if node.Right == nil {

    node = node.Left

    return node

    }

    LeftmostRightside := node.Right

    for {

    //find smallest value on the Right side

    if LeftmostRightside != nil && LeftmostRightside.Left != nil {

    LeftmostRightside = LeftmostRightside.Left

    } else {

    break

    }

    }

    node.Value = LeftmostRightside.Value

    node.Right = delete(node.Right, node.Value)

    return node

    }

    func search[T OrderedStringer](n *Node[T], value T) bool {

    if n == nil {

    return false

    }

    if value  n.Value {

    return search(n.Right, value)

    }

    return true

    }

    func inOrderTraverse[T OrderedStringer](n *Node[T], op func(T)) {

    if n != nil {

    inOrderTraverse(n.Left, op)

    op(n.Value)

    inOrderTraverse(n.Right, op)

    }

    }

    Listing 9-3

    Support functions for implementing methods

    ```


    Each of these support functions requires the explicit specification of the generic
    type constraint since the compiler cannot infer this from the function signature.


    The support functions presented in Listing [9-3](#527841_1_En_9_Chapter.xhtml#PC5)
    are relatively simple recursive functions that perform the task indicated. It
    is left as an exercise for the reader to verify this.'
  trans: "\n### 删除\n\n从搜索树中移除某个键的算法和方法较为复杂。移除后，必须保证得到的仍然是一棵搜索树。\n\n存在三种特殊情况：\n\n1.\
    \  待删除的节点是叶节点。\n2.  待删除的节点有一个子节点。\n3.  待删除的节点有两个子节点。\n\n情况 1 最简单。我们找到叶节点的父节点，并将父节点对应的链接（`left`\
    \ 或 `right`）设置为 `nil`，从而有效地将叶节点从树中剪除。\n\n第二种情况（待删除的节点有一个子节点）的处理方式类似于链表删除，如下所示：\n\
    \n假设 `left` 是被删除节点的左子节点，或假设 `right` 是被删除节点的右子节点。\n\n```go\nif node to be deleted\
    \ has one child (left or right):\nif left != nil and parent.left == keyNode:\n\
    parent.left = left\nelse if left != nil and parent.right == keyNode:\nparent.right\
    \ = left\nelse if right != nil and parent.left == keyNode:\nparent.left = right\n\
    else if right != nil and parent.right == keyNode:\nparent.right = right\n```\n\
    \n作为练习，请画出这四种情况的示意图，以验证 `keyNode` 已与其父节点断开连接，并且父节点已重新连接到其孙节点。\n\n第三种情况（待删除的节点有两个子节点）最为复杂。它包含三个步骤：\n\
    \n1.  找到 `keyNode` 的中序后继节点（`keyNode` 右侧最小的节点）。\n2.  将 `successor` 节点中的键复制到 `keyNode`。\n\
    3.  移除 `successor` 节点。\n\n作为练习，请证明 `successor` 节点有零个或一个子节点，因此它的删除属于前面展示的情况 1 或情况\
    \ 2 的删除。\n\n在下一节中，我们将介绍一个通用的二叉搜索树实现。\n\n### 9.2 通用二叉搜索树\n\n我们将介绍一个通用的二叉搜索树实现。我们必须约束泛型类型\
    \ `T`，使其满足两个条件：\n\n1.  存储在树节点中的类型 `T` 的值可以进行比较。\n2.  存储在树节点中的类型 `T` 的值可以使用 `String()`\
    \ 函数转换为字符串。\n\n#### 类型 `OrderedStringer`\n\n我们定义一个约束类型 `OrderedStringer`，使其满足上述两个条件，如下所示：\n\
    \n```go\ntype ordered interface {\n~int | ~float64 | ~string\n}\ntype OrderedStringer\
    \ interface {\nordered\nString() string\n}\n```\n\n要求 1 使用 `ordered` 类型指定。要求 2\
    \ 使用 `String()` 函数的签名指定。\n\n通用二叉搜索树的任何实例化都必须使用满足上述 `OrderedStringer` 类型的值类型。我们将在本节稍后部分提供说明此用法的示例。\n\
    \n#### 二叉搜索树所需的泛型类型\n\n清单 9-1 展示了 `binarysearchtree` 包中所需的泛型数据结构。\n\n```go\npackage\
    \ binarysearchtree\nimport (\n\"image/color\"\n\"log\"\n\"fyne.io/fyne/v2\"\n\"\
    fyne.io/fyne/v2/app\"\n\"fyne.io/fyne/v2/canvas\"\n\"fyne.io/fyne/v2/theme\"\n\
