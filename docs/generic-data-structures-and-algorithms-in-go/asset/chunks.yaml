  trans: "\n### 收敛到局部最小值而非全局最小值的问题\n\n在解决组合优化问题时，一个始终存在的挑战是解会收敛到局部最小值，而非期望的全局最小值。因此，理想的做法是允许在解空间中进行充分的探索，而不是急于演化为一个解。\n\
