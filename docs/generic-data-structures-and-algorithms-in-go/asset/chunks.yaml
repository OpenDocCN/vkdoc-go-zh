  raw: '## 6.7 Priority Queue


    Priority queues exist in many real-world situations. For example, when passengers
    line up to board a plane, many airlines associate a priority with each passenger.
    This may be based on age (children enjoy high priority), price for the ticket
    (first-class passengers get high priority), loyalty points (frequent traveler),
    disability, or other factors that determine the customer’s priority. Within each
    priority grouping, the usual FIFO queue rules apply.


    We assume here that only a bounded number of priorities can be assigned to each
    item to be inserted in the queue.


    We show one implementation in which we use a slice in which each element of the
    slice contains an ordinary queue.


    The first queue in the slice contains items assigned the highest priority. The
    second queue in the slice contains items assigned the second highest priority
    and so on.


    When an item is inserted, we access the queue corresponding to its priority and
    do an insertion in that queue.


    Using a node-based queue for each element of the slice, we define a generic ***PriorityQueue***
    and a function for creating the priority queue as follows:


    ```

    type PriorityQueue[T any] struct {

    q []nodequeue.Queue[T] // slice of queues

    size int

    }

    func NewPriorityQueue[T any](numberPriorities int) (pq PriorityQueue[T]) {

    pq.q = make([]nodequeue.Queue[T], numberPriorities)

    return pq

    }

    ```


    The ***NewPriorityQueue*** constructor function defines a slice with ***numberPriorities***
    node queues.


    Listing [6-9](#527841_1_En_6_Chapter.xhtml#PC11) defines a ***Passenger*** type
    and presents an implementation of ***PriorityQueue*** along with a **main** driver.
    In the main driver, an airline queue with ***Passenger*** as the generic type
    is defined, and a group of passengers are inserted into the queue. Several passengers
    are removed, and the head of the line is output.


    ```

    package main

    import (

    "example.com/nodequeue"

    "fmt"

    )

    type Passenger struct {

    name string

    priority int

    }

    type PriorityQueue[T any] struct {

    q []nodequeue.Queue[T]

    size int

    }

    func NewPriorityQueue[T any](numberPriorities int) (pq PriorityQueue[T]) {

    pq.q = make([]nodequeue.Queue[T], numberPriorities)

    return pq

    }

    // Methods for priority queue

    func (pq *PriorityQueue[T]) Insert(item T, priority int) {

    pq.q[priority - 1].Insert(item)

    pq.size++

    }

    func (pq *PriorityQueue[T]) Remove() T {

    pq.size--

    for i := 0; i  0 {

    return pq.q[i].Remove()

    }

    }

    var zero T

    return zero

    }

    func (pq *PriorityQueue[T]) First() T {

    for _, queue := range(pq.q) {

    if queue.Size() > 0 {

    return queue.First()

    }

    }

    var zero T

    return zero

    }

    func (pq *PriorityQueue[T]) IsEmpty() bool {

    result := true

    for _, queue := range(pq.q) {

    if queue.Size() > 0 {

    result = false

    break

    }

    }

    return result

    }

    func main() {

    airlineQueue := NewPriorityQueue[Passenger](3)

    passengers := []Passenger{ {"Erika", 3},{"Robert", 3}, {"Danielle", 3},

    {"Madison", 1}, {"Frederik", 1}, {"James", 2},

    {"Dante", 2}, {"Shelley", 3} }

    fmt.Println("Passsengers: ",passengers)

    for i := 0; i < len(passengers); i++ {

    airlineQueue.Insert(passengers[i], passengers[i].priority)

    }

    fmt.Println("First passenger in line: ", airlineQueue.First())

    airlineQueue.Remove()

    airlineQueue.Remove()

    airlineQueue.Remove()

    fmt.Println("First passenger in line: ", airlineQueue.First())

    }

    /* Output

    Passsengers: [{Erika 3} {Robert 3} {Danielle 3} {Madison 1} {Frederik 1} {James
    2} {Dante 2} {Shelley 3}]

    First passenger in line: {Madison 1}

    First passenger in line after three Removes: {Dante 2}*/

    Listing 6-9

    A slice implementation of priority queue and driver program

    ```


    The ***Remove*** method returns the zero value of ***T*** (***Passenger*** in
    this case) if all the queues in the slice are empty.


    The first three ***Remove*** invocations strip both priority 1 passengers from
    the queue and the first priority 2 passenger from the queue, making “Dante” the
    first in line.


    We see in Listing [6-9](#527841_1_En_6_Chapter.xhtml#PC11) a layering of abstractions,
    a common practice in software development. We could have used a slice queue instead
    of the node queue by changing one line of code in the imports and changing each
    occurrence of ***nodequeue.Queue*** to ***slicequeue.Queue***.


    In the next section, we present an important application of Queue – a discrete
    event simulation of a waiting line. A typical waiting line occurs when customers
    compete for service by lining up and waiting for a server to process each customer.
    An example would be the checkout process at a supermarket.


    ## 6.8 Queue Application: Discrete Event Simulation of Waiting Line


    Suppose we have a waiting line for service at a bank. Customers arrive according
    to a **Poisson** arrival process with a specified average rate of arrival. Customers
    are served with a service time specified by a uniformly distributed random service
    time between a specified lower and upper bound. Our goal is to construct a simulation
    that estimates the average wait time (time from arrival on the line to time of
    completion of service) for a customer joining the line as well as other statistics
    taken over an eight-hour day.


    ### Poisson Process


    Events modeled by a Poisson arrival process satisfy the following conditions:


    1.  Events are independent of each other. The occurrence of an event does not
    influence when another event occurs. If the events being modeled are customers
    arriving at a bank waiting line, this is probably a reasonable requirement to
    meet.


    2.  The average rate of events remains constant. Here, we shall use a minute as
    the basic unit of time, so the average rate will be in events per minute.


    It can be shown that the time between events, a random variable, can be generated
    using the function shown in the following:


    ```

    func InterArrivalInterval(arrivalRate float64) float64 {

    // Models a Poisson process and returns

    rn := rand.Float64() // random float between 0.0 and 1

    return -math.Log(1.0 - rn) / arrivalRate

    }

    ```


    This corresponds to a probability that the wait time between events greater than
    some t is


    ```

    P(Wait time > t) = e-λ * t

    ```


    where **λ** is the average arrival rate in events/minute. This is an exponential
    distribution. As t increases, the probability of the wait time exceeding **t**
    approaches 0\. When **t** equals 0, the probability is 1\. As the arrival rate
    **λ** increases (more events on average per minute), the probability of having
    the wait time for the next event to be greater than some **t** decreases.


    We model the service duration (the time that it takes to process a customer) as
    a uniform distribution between **0.5 / arrival rate** and **1.4 / arrival rate**.
    So, for example, if the arrival rate is 0.25 (an average of one customer every
    4 minutes), the service time is modeled as uniformly distributed between 2 minutes
    and 5.6 minutes or an average of 3.8 minutes. This leads to a stable queue since
    average service time is less than average time between arrivals.'
