    ### Comparing the Performance of Red-Black Tree to AVL Tree


    A benchmark test was performed to see how long it takes to construct a red-black
    tree from a sequence of 100,000 random integers. The same test was performed to
    see the time required to build an AVL tree from 100,000 random integers.


    The results are interesting and the following:


    Insertion time for red-black tree: **27.62615ms**


    Search time for red-black tree: **16.037945ms**


    Insertion time for AVL tree: **48.315163ms**


    Search time for AVL tree: **3.914522ms**


    ### Benchmark Conclusion


    The red-black tree takes about **half as long to build** but takes **four times
    as long to search** compared to the AVL tree. The AVL tree is more balanced than
    the red-black tree but requires many more rotations during construction.


    Since we typically build search trees for many fast lookups, the AVL is generally
    preferable in such cases.


