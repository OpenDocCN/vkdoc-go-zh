    # 5.4 比较节点栈与切片栈的效率


    这两种栈实现哪种效率更高？


    切片实现所需内存更少，因为节点实现需要为每个后续节点提供指针的内存开销。


    为了比较这两种栈类型在速度上的效率，我们运行一个基准测试：向栈中压入 1000 万个整数值，然后弹出所有元素直至栈为空。


    我们将这两种栈类型分别封装为`nodestack`和`slicestack`，如代码清单 5-4 和 5-5 所示。在代码清单 5-6 中，我们给出了比较这两个栈包速度的应用程序。


