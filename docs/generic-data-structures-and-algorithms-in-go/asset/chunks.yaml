    \nimport (\n    \"math/rand\"\n    \"math\"\n    \"fmt\"\n    \"time\"\n    \"\
    example.com/nodequeue\"\n)\n\nconst (\n    arrivalRate           = 0.25 // 每分钟平均到达顾客数\n\
    \    lowerBoundServiceTime = 0.5 / arrivalRate\n    upperBoundServicetime = 2.0\
    \ / arrivalRate\n    quitTime              = 480 // 8 小时工作日的分钟数\n)\n\nfunc InterArrivalInterval(arrivalRate\
    \ float64) float64 {\n    // 模拟泊松过程并返回\n    rn := rand.Float64() // 0.0 到 1.0\
    \ 之间的随机浮点数\n    return -math.Log(1.0 - rn) / arrivalRate\n}\n\nfunc ServiceTime()\
    \ float64 {\n    // 均匀分布\n    rn := rand.Float64() // rn 在 0.0 到 1.0 之间\n    return\
    \ lowerBoundServiceTime + (upperBoundServicetime - lowerBoundServiceTime) * rn\n\
    }\n\ntype Customer struct {\n    arrivalTime     float64\n    serviceDuration\
    \ float64\n}\n\n// 统计信息抽象数据类型\ntype Statistics struct {\n    waitTimes      []float64\n\
    \    queueTime      float64 // 累计时间 * 队列大小\n    longestQueue   int\n    longestWaitTime\
    \ float64\n}\n\nfunc (s *Statistics) AddWaitTime(wait float64) {\n    s.waitTimes\
    \ = append(s.waitTimes, wait)\n    if wait > s.longestWaitTime {\n        s.longestWaitTime\
    \ = wait\n    }\n}\n\nfunc (s *Statistics) AddQueueSizeTime(queueSize int, timeAtSize\
    \ float64) {\n    s.queueTime += float64(queueSize) * timeAtSize\n}\n\nfunc (s\
    \ *Statistics) AddLength(length int) {\n    if length > s.longestQueue {\n   \
    \     s.longestQueue = length\n    }\n}\n\nvar lastArrivalTime, departureTime,\
    \ lastEventTime float64\n\nfunc main() {\n    rand.Seed(time.Now().UnixNano())\n\
    \    lastEventTime := 0.0 // 一天开始\n    line := nodequeue.Queue[Customer]{}\n \
    \   statistics := Statistics{}\n\n    // 开始模拟\n    for {\n        lastArrivalTime\
    \ = lastArrivalTime + InterArrivalInterval(arrivalRate)\n        if lastArrivalTime\
    \ > quitTime {\n            break\n        }\n        if line.Size() == 0 {\n\
    \            lastEventTime = lastArrivalTime\n            // fmt.Printf(\"\\nline\
    \ no longer empty at time: %0.2f. line size is 1\", lastEventTime)\n         \
    \   serviceTime := ServiceTime()\n            customer := Customer{lastArrivalTime,\
    \ serviceTime}\n            line.Insert(customer)\n            statistics.AddLength(line.Size())\n\
    \            departureTime = lastArrivalTime + serviceTime\n        } else {\n\
    \            if lastArrivalTime < departureTime {\n                // 下一个事件是到达\n\
    \                serviceTime := ServiceTime()\n                customer := Customer{lastArrivalTime,\
    \ serviceTime}\n                line.Insert(customer)\n                statistics.AddLength(line.Size())\n\
    \                statistics.AddQueueSizeTime(line.Size()-1, lastArrivalTime-lastEventTime)\n\
    \                lastEventTime = lastArrivalTime\n            } else {\n     \
    \           // 下一个事件是离开\n                // 从队列中移除第一个顾客\n                removedCustomer\
    \ := line.Remove()\n                waitTime := departureTime - removedCustomer.arrivalTime\n\
    \                statistics.AddWaitTime(waitTime)\n                statistics.AddQueueSizeTime(line.Size()+1,\
    \ departureTime-lastEventTime)\n                lastEventTime = departureTime\n\
    \                if line.Size() > 0 {\n                    departureTime = lastEventTime\
    \ + line.First().serviceDuration\n                }\n            }\n        }\n\
    \    }\n\n    totalWaitTime := 0.0\n    for i := 0; i < len(statistics.waitTimes);\
    \ i++ {\n        totalWaitTime += statistics.waitTimes[i]\n    }\n    averageWaitTime\
    \ := totalWaitTime / float64(len(statistics.waitTimes))\n\n    fmt.Printf(\"\\\
    n 从到达至离开的平均时间: %0.2f 分钟\", averageWaitTime)\n    fmt.Printf(\"\\n 等待队列的平均大小: %0.2f\"\
    , statistics.queueTime/lastEventTime)\n    fmt.Printf(\"\\n 一天中最长的队列: %d\", statistics.longestQueue)\n\
    \    fmt.Printf(\"\\n 一天中最长的等待时间: %0.2f 分钟\", statistics.longestWaitTime)\n}\n\
    \n/* 输出示例\n从到达至离开的平均时间: 16.19 分钟\n等待队列的平均大小: 2.28\n一天中最长的队列: 8\n一天中最长的等待时间: 40.18\
    \ 分钟\n*/\n```\n\n清单 6-10 – 等待队列的离散事件模拟\n\n对模拟进行多次运行后，之前显示的输出统计信息会表现出较大的方差。\n\n\
    如果我们在代码中启用那三行被左对齐缩进的注释代码，我们将输出精确的事件序列及其发生时间。\n\n在一次典型的模拟运行中，产生的部分输出如下所示：\n\n```\n\
