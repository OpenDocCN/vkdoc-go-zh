    If the cost of this new tour is smaller than the previous tour cost, we accept
    this new tour, increment the number of downhill moves, and update other status
    values.


    Otherwise, we compute a ***metropolis*** value using the Boltzmann-like function
    to determine whether we accept an uphill move (a tour cost greater than the previous
    tour cost).


    ```

    metropolis :=

    math.Exp((status.previousCost - newCost) /

    status.temperature)

    ```


    Next, we generate a random float value between 0 and 1\. If this value is less
    than ***metropolis***, we accept an uphill move by changing the tour to the tour
    with worse cost (uphill move) and then update the appropriate status values.


    If the random float value is equal or greater than the ***metropolis*** value,
    we do not modify the current tour.


    Following this, a new potential modification to the tour occurs using the three
    operations defined earlier. This continues until we have performed the requisite
    number of modifications specified for the given temperature. Then we use the logic
    of the cooling curve to lower the temperature and start the process just described
    again.


