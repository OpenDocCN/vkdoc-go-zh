    {X: x ,Y: y},

    },

    Labels: []string{str},

    },)

    if err != nil {

    log.Fatalf("could not create labels plotter: %+v", err)

    }

    p.Add(label)

    }

    path, _ = homedir.Dir()

    path += "/Desktop/GoDS/"

    err = p.Save(1000, 600, "tree.png")

    if err != nil {

    log.Panic(err)

    }

    DrawGraph(myApp, myWindow)

    myWindow.ShowAndRun()

    }

