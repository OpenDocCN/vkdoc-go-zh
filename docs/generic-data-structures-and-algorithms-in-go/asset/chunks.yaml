    ### Binary Tree Structure


    ***BinaryTree*** is defined as a struct containing a ***Root*** field specified
    as a pointer to a ***Node*** and a field ***NumNodes***, an int.


    ***Node*** is defined as a struct with a ***Value*** field of type string (later,
    it will be a generic type) and fields ***Left*** and ***Right*** each defined
    as a pointer to ***Node***. A ***Node*** contains two recursive references to
    ***Node*** through ***Left*** and ***Right*** pointers.


    Type ***nodePair*** is defined as a struct containing fields ***Val1 and Val*****2**
    (string). Variable ***endPoints*** is defined as a slice of ***nodePair*** and
    is used to keep track of the end point values of the lines connecting nodes in
    the binary tree.


    Type ***nodePos*** is a struct containing ***Val*** (string) and ***YPos*** and
    ***XPos*** (int). Variable ***data*** is defined as a slice of ***nodePos*** and
    is used to define the position and value of each node to be graphed.


    ### Infrastructure Used to Display Binary Tree


    Listing [8-2](#527841_1_En_8_Chapter.xhtml#PC2) shows the support functions that
    set up the infrastructure to display the graphics of the binary tree.


    ```

    func prepareDrawTree(tree BinaryTree) {

    prepareToDraw(tree)

    fmt.Println(endPoints)

    fmt.Println(data)

    }

    func findXY(val string) (int, int) {

    for i := 0; i < len(data); i++ {

    if data[i].Val == val {

    return data[i].XPos, data[i].YPos

    }

    }

    return -1, -1

    }

    func findX(val string) int {

    for i := 0; i < len(data); i++ {

    if data[i].Val == val {

    return i

    }

    }

    return -1

    }

    func setXValues() {

    for index := 0; index < len(data); index++ {

    xValue := findX(data[index].Val)

    data[index].XPos = xValue

    }

    }

    func prepareToDraw(tree BinaryTree) {

    inorderLevel(tree.Root, 1)

    setXValues()

    getEndPoints(tree.Root, nil)

    }

    func inorderLevel(node *Node, level int) {

    if node != nil {

    inorderLevel(node.Left, level + 1)

    data = append(data, nodePos{node.Value, 100 - level, -1})

    inorderLevel(node.Right, level + 1)

    }

    }

    func getEndPoints(node *Node, parent *Node) {

    if node != nil {

    if parent != nil {

    endPoints = append(endPoints, nodePair{node.Value, parent.Value})

    }

    getEndPoints(node.Left, node)

    getEndPoints(node.Right, node)

    }

    }

