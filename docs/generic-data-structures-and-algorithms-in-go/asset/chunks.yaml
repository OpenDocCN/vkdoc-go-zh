    \tfor i := 0; i < ToursPerGeneration; i++ {\n\t\tpopulation[i] = make([]int, NUMCITIES)\n\
    \t}\n\tnewpopulation = make([][]int, ToursPerGeneration)\n\tfor i := 0; i < ToursPerGeneration;\
    \ i++ {\n\t\tnewpopulation[i] = make([]int, NUMCITIES)\n\t}\n\tlowestCostTour\
    \ := 1000000000.0\n\tCreateInitialPopulation()\n\tfor {\n\t\tif generation ==\
    \ NumberGenerations {\n\t\t\tbreak\n\t\t}\n\t\tsort.Slice(population, func(i,\
    \ j int) bool {\n\t\t\treturn Cost(population[i]) < Cost(population[j])\n\t\t\
    })\n\t\tbestCost := Cost(population[0])\n\t\tif bestCost < lowestCostTour {\n\t\
    \t\tlowestCostTour = bestCost\n\t\t\tfmt.Printf(\"\\nLowest cost tour at generation\
    \ %d = %0.2f\", generation, lowestCostTour)\n\t\t}\n\t\tFormNextGeneration()\n\
    \t\tgeneration++\n\t}\n}\n\nfunc main() {\n\trand.Seed(time.Now().UnixNano())\n\
    \tcities := []Point{}\n\tpt1 := Point{1150.0, 1760.0}\n\tcities = append(cities,\
    \ pt1)\n\tpt2 := Point{630.0, 1660.0}\n\tcities = append(cities, pt2)\n\tpt3 :=\
    \ Point{40.0, 2090.0}\n\tcities = append(cities, pt3)\n\tpt4 := Point{750.0, 1100.0}\n\
    \tcities = append(cities, pt4)\n\tpt5 := Point{750.0, 2030.0}\n\tcities = append(cities,\
    \ pt5)\n\tpt6 := Point{1030.0, 2070.0}\n\tcities = append(cities, pt6)\n\tpt7\
    \ := Point{1650.0, 650.0}\n\tcities = append(cities, pt7)\n\tpt8 := Point{1490.0,\
    \ 1630.0}\n\tcities = append(cities, pt8)\n\tpt9 := Point{790.0, 2260.0}\n\tcities\
    \ = append(cities, pt9)\n\tpt10 := Point{710.0, 1310.0}\n\tcities = append(cities,\
    \ pt10)\n\tpt11 := Point{840.0, 550.0}\n\tcities = append(cities, pt11)\n\tpt12\
    \ := Point{1170.0, 2300.0}\n\tcities = append(cities, pt12)\n\tpt13 := Point{970.0,\
    \ 1340.0}\n\tcities = append(cities, pt13)\n\tpt14 := Point{510.0, 700.0}\n\t\
    cities = append(cities, pt14)\n\tpt15 := Point{750.0, 900.0}\n\tcities = append(cities,\
    \ pt15)\n\tpt16 := Point{1280.0, 1200.0}\n\tcities = append(cities, pt16)\n\t\
    pt17 := Point{230.0, 590.0}\n\tcities = append(cities, pt17)\n\tpt18 := Point{460.0,\
    \ 860.0}\n\tcities = append(cities, pt18)\n\tpt19 := Point{1040.0, 950.0}\n\t\
    cities = append(cities, pt19)\n\tpt20 := Point{590.0, 1390.0}\n\tcities = append(cities,\
    \ pt20)\n\tpt21 := Point{830.0, 1770.0}\n\tcities = append(cities, pt21)\n\tpt22\
    \ := Point{490.0, 500.0}\n\tcities = append(cities, pt22)\n\tpt23 := Point{1840.0,\
    \ 1240.0}\n\tcities = append(cities, pt23)\n\tpt24 := Point{1260.0, 1500.0}\n\t\
    cities = append(cities, pt24)\n\tpt25 := Point{1280.0, 790.0}\n\tcities = append(cities,\
    \ pt25)\n\tpt26 := Point{490.0, 2130.0}\n\tcities = append(cities, pt26)\n\tpt27\
    \ := Point{1460.0, 1420.0}\n\tcities = append(cities, pt27)\n\tpt28 := Point{1260.0,\
    \ 1910.0}\n\tcities = append(cities, pt28)\n\tpt29 := Point{360.0, 1980.0}\n\t\
    cities = append(cities, pt29)\n\n\tgraph = make([][]float64, NUMCITIES)\n\tfor\
    \ i := 0; i < NUMCITIES; i++ {\n\t\tgraph[i] = make([]float64, NUMCITIES)\n\t\
    }\n\tCreateGraph(NUMCITIES, cities, graph)\n\tGeneticAlgorithm()\n}\n/* 输出\nLowest\
    \ cost tour at generation 0 = 22019.11\nLowest cost tour at generation 1 = 20169.35\n\
    Lowest cost tour at generation 5 = 20017.31\nLowest cost tour at generation 6\
    \ = 19545.05\nLowest cost tour at generation 7 = 18447.20\nLowest cost tour at\
    \ generation 12 = 18340.78\nLowest cost tour at generation 13 = 17953.87\nLowest\
    \ cost tour at generation 15 = 17350.68\nLowest cost tour at generation 16 = 17095.07\n\
    Lowest cost tour at generation 18 = 16612.21\n...\nLowest cost tour at generation\
    \ 970 = 9362.68\nLowest cost tour at generation 1179 = 9285.43\n*/\n```\n\n该程序终止耗时不到十秒。经过十次运行后，第\
    \ 1179 代的最低成本路径为`9285`。这与已知最优解`9074`相比，误差为 2%。显然，这种解决旅行商问题（TSP）的方法十分有效。"
- fmt: '# 20.3 Summary


    In this chapter, we presented an approach to solving TSP based on genetic modeling
    and survival of the fittest. As the program moves from one generation to another
    and solutions evolve, the best tours converge to approximate the optimum solution.


    Each run of the genetic algorithm is a new experiment. The results are greatly
    dependent on the constants chosen.


    In the next chapter, we turn our attention to machine learning and neural networks.


    # 21. Neural Networks and Machine Learning


    The previous chapter presented an implementation of a generic algorithm for solving
    TSP.


    This chapter introduces neural networks and machine learning. We present an implementation
    of a neural network from scratch.


    In the next section, we present an overview of machine learning and neural networks.


    ## 21.1 Overview of Neural Networks and Machine Learning


    AI (artificial intelligence) has its roots in research done at Dartmouth in 1956.
    Its goal is to mimic human reasoning.


    Machine learning is a subfield of AI. It uses statistics, operations research,
    and neural network models to obtain insights from data. It allows the computer
    (machine) to obtain insights through an iterative process that mimics how we believe
    the human brain learns new things. It allows computers the ability to learn to
    perform complex tasks without explicitly being programmed.


    Applications of machine learning include natural language processing, including
    language translation, image classification and analysis, chatbots, medical diagnosis,
    game playing, pattern recognition, and stock price prediction.


    Machine learning starts with data, often a huge quantity of data. This data may
    be numerical time series, photos, text, repair records, bank transactions, sales
    reports, or sensor data from a multitude of sources (weather data, seismic data,
    medical data, etc.).


    Such data is used to "train" a computer model such as a neural network. After
    sufficient training, the model is used to perform classification, to predict future
    outcomes, make a move in a game, provide a translation of some text, etc., based
    on the learning achieved from the training data.


    ### Training


    Training a neural network model involves feeding forward input data through the
    network to one or more outputs, feeding back errors that are detected in the output
    to modify the network to minimize these errors. We will examine this important
    process in detail in this chapter.


    ### Neural Networks


    Neural networks are function approximators. By training such a network with many
    observed inputs and corresponding outputs, the goal is to obtain a reliable output
    when new inputs are applied.


    For example, if our goal is to have our network distinguish between a photo of
    a dog and a photo of a cat, we train the network by sending in numerous cat and
    dog images, each time informing the network whether the image (a two-dimensional
    matrix of pixel values) is a dog or cat. Then when images the network has never
    seen are sent in, the network will hopefully determine with high accuracy whether
    it is a dog or cat image.


    Such a trained neural network may be thought of as a mathematical function that
    when presented with input produces some output (a classification in this case).


    A neural network generally contains


    1. A collection of input values that comprise an input layer

    2. One or more hidden layers

    3. An output layer with output values

    4. A collection of weights and biases between layers

    5. An activation function for each layer


    ### Perceptron


    In 1943, neurophysiologist Warren McCulloch and mathematician Walter Pitts defined
    a simple model of a neuron that takes a set of inputs, multiplies them by weighted
    values and adds a bias value, and then puts them through an activation function,
    which produces an output of 0 or 1. This model is called the McCulloch-Pitts perceptron.


    A schematic of this perceptron is shown in Figure [21-1](#527841_1_En_21_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_21_Chapter/527841_1_En_21_Fig1_HTML.jpg)


    A schematic representation of perceptron neural network perception. The inputs
    are named `l`, and the subscripts are one, two, three, till `N`. The same lines
    have weights named `w`, and the subscripts are one, two, three, till `N`. All
    these are pointed to the sum of and followed by threshold `T` and output `y`.


    **Figure 21-1** Perceptron


    The output, `y`, is the sum of the input values multiplied by the set of weights,
    `W`, and a bias value `b` and followed by a threshold function that converts the
    sum to a value between zero and one.


    Next, the expected value is compared to the actual value to form an error. This
    computed error is fed back to the weights to modify the weights to reduce this
    error. After many iterations, it is hoped that the error can be made very small.


    The process of obtaining the output from the inputs and weights is called forward
    propagation. The process of modifying the weights based on the error is called
    backpropagation. By knowing the derivative of the error with respect to each weight,
    a recursive-descent algorithm that successively modifies the weights while decreasing
    the output error is achieved.


    By stacking a collection of neurons in various layers, a neural network is created.


    ### Schematics of Neural Networks


    Schematics of two such neural networks are shown in Figures [21-2](#527841_1_En_21_Chapter.xhtml#Fig2)
    and [21-3](#527841_1_En_21_Chapter.xhtml#Fig3). The first has one "hidden" layer
    containing four neurons and a single output layer.


    The second neural network has three layers containing four neurons each and is
    a deep neural network because of the many layers.


    ![](images/527841_1_En_21_Chapter/527841_1_En_21_Fig3_HTML.jpg)


    A schematic representation. There are four `x` and has subscripts of one, two,
    three, and four. Each `x` has four lines pointed to four circles such that every
    line in `x` touches all four circles. Each circle has four lines pointed to four
    different circles again same process is repeated. All circles point to a single
    circle and to `y` superscript caret.


    **Figure 21-3** Neural network with many hidden layers


    ![](images/527841_1_En_21_Chapter/527841_1_En_21_Fig2_HTML.jpg)


    A schematic representation of a neural network with one hidden layer. The three
    points are labeled `x` and have subscripts of one, two, and three. Each `x` has
    four lines pointed to four circles such that every line in `x` touches all four
    circles. Each circle points to a single circle and points to the `y` superscript
    caret.


    **Figure 21-2** Neural network with one hidden layer


    ### A Neuron


    We drill deeper and examine an individual neuron or node in a neural network.
    In Figure [21-4](#527841_1_En_21_Chapter.xhtml#Fig4), we show such a neuron.


    ![](images/527841_1_En_21_Chapter/527841_1_En_21_Fig4_HTML.png)


    A schematic representation of a neuron in a neural network. A circle with highlighted
    edges. It has 5 lines branching out from it named: `X` subscript one, `X` subscript
    two, `X` subscript three, `b`, and sigmoid is written on the line which reads
    `y`.


    **Figure 21-4** A neuron


    The output, `y`, is computed from the inputs `x[1]`, `x[2]`, and `x[3]` as follows:


    `z = w[1]x[1] + w[2]x[2] + w[3]x[3] + b`


    We follow this by taking this linear combination of inputs and bias and using
    a nonlinear activation function such as the sigmoid function as follows:


    `y = sigmoid(z) = 1 / (1 + e^(-z))`


    The use of the sigmoid activation function forces the result to be between 0 and
    1 as `z` varies from a large negative number to a large positive number.


    In the next section, we define a simple problem that we will solve.'
