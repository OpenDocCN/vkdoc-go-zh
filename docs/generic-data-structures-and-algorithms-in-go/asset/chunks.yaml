    # 18. Branch-and-Bound Solution to TSP


    The previous chapter introduced the famed Travelling Salesperson Problem (TSP).
    A brute-force solution was presented. Like all exact solutions to this problem,
    it is computationally intractable. A third-party package was presented along with
    code for graphically displaying a TSP tour.


    This chapter presents another exact solution to TSP using a powerful technique,
    branch and bound. It too is computationally intractable.


    In the next section, we introduce the technique of branch and bound and show how
    it can be applied to TSP.


    ## 18.1 Branch and Bound for TSP


    Much of this chapter is based on a paper written by this author and published
    in the *Journal of Object Technology* in 2003\. The paper is “Branch and Bound
    Implementation for the Traveling Salesperson Problem” (Richard Wiener, Journal
    of Object Technology, Vol 2\. No. 3, May`–`June 2003)*.*


    We are given a graph that contains distances connecting all cities (each city
    is connected to every other city with an edge representing the distance between
    the two cities). The nodes of the graph are the cities, numbered 0, …, n - 1\.
    A tour is a sequence of cities that starts at city 0, visits each of the other
    cities exactly once, and returns to the starting city 0.


    **In any tour, the value of an edge when leaving a city must be equal or greater
    than the value of the shortest edge leaving the city.**


    This forms the basis for a branch-and-bound solution to TSP.


    ### An Example


    Consider a TSP with the following distance matrix (cost matrix):


      0  14    4   11   20


    14    0    7     8      7


       4     7    0     7   16


    11    8    7     0     2


    20    7  16     2     0


    We build a solution tree as follows:


    At level 0, the root node represents a partial tour [0].


    At level 1, nodes representing the partial tours [0, 1], [0, 2], [0, 3], …, [0,
    n - 1] are generated.


    At level 2, nodes representing the partial tours [0, 1, 2], [0, 1, 3], [0, 1,
    4], … are generated.


    This pattern continues until at the lowest level, we have every permutation for
    all tours.


    ### Computation of Lower Bound


    For the root node of the preceding graph, with partial tour [0], the lower bound
    on the costs of leaving the five vertices is


    City 0: minimum (14, 4, 11, 20) = **4**.


    City 1: minimum (14, 7, 8, 7) = **7**.


    City 2: minimum (4, 7, 7, 16) = **4**.


    City 3: minimum (11, 8, 7, 2) = **2**.


    City 4: minimum (20, 7, 16, 2) = **2**.


    Therefore, the lower bound for the TSP solution based on the partial tour [0]
    is the sum of these values, which is **19**.


    Let us compute the lower bound for a partial tour [0, 2, 3].


    City 0: **4** (since the tour contains 0 -> 2)


    City 1: **7** (cannot touch node already on tour)


    City 2: **7** (since the tour contains 2 -> 3)


    City 3: **11** (since the tour contains 3 -> 0)


    City 4: **7** (cannot touch node already on tour)


    Therefore, the lower bound for the partial tour [0, 2, 3] is the sum, which equals
    **36**.


    The computational cost of computing the lower bound for a partial tour is low.


    At any level in the tree containing partial tours, the nodes can be ranked by
    their computed lower bounds. We can use a priority queue to hold the tree structure.


    ### Branch-and-Bound Algorithm


    *   Set an initial value for the best tour cost.


    *   Initialize a priority queue (PQ).


    *   Generate the first node with partial tour [0] and compute its lower bound.


    *   Insert this node into PQ.


    *   While the PQ is not empty, remove the first node from the PQ and assign it
    to parent.


    *   If its lower bound < best tour cost, set its level to the level of parent
    node + 1.


    *   If this level is N – 1, where N is the number of cities, add starting city
    0 to the end of the partial tour and compute the cost of the full tour.


    *   If this cost of full tour < best tour cost, update the best tour cost and
    save the best tour.


    *   If the level of the parent node + 1 is not equal to N – 1,


    *   For all i such that 1 <= i < N and i is not in the partial tour of the parent,


    *   Copy the partial tour from parent to new node and add i to the end of this
    partial tour.


    *   Compute the lower bound for this new node.


    *   If this lower bound is less than the best tour cost, insert this new node
    into the priority queue; otherwise, prune this node.


    ### The Priority Queue


    Before a node is inserted into the PQ, it is screened to determine whether its
    lower bound is less than the currently known best tour. This helps to keep the
    number of nodes in the PQ to a manageable level.


    What priority rules must the queue enforce?


    Nodes at a deeper level (higher level number) have priority over nodes at a shallower
    level in the PQ. This assures that the tree grows downward and that leaf nodes
    representing complete tours are generated as quickly as possible. In comparing
    two nodes at the same level, priority is given to the node with the smallest lower
    bound. In the event of a tie (two nodes with equal lower bound), the sum of the
    cities in the partial tour is computed. The node with the smaller sum is given
    a higher priority than the node with the larger sum (a tie cannot occur). The
    rules just stated disallow two distinct nodes from having an equal priority.


    We walk through a portion of the five-city example presented earlier to see how
    the priority queue is built.


    ### A Walk-Through Part of the Five-City Example Presented Earlier


    The initial cost is computed by finding the cost of the tour, [0, 1, …, n – 1,
    0], which is **50**. Since the lower bound (LB) of the root node was shown earlier
    to be 19, we push the partial tour [0] onto the PQ. We remove tour[0] from the
    PQ and generate nodes at level 1\. All but one of these nodes have LB < 50, so
    we push them onto the PQ. The top of the PQ is [0, 2] with LB = 19\. Next comes
    [0, 1] with LB = 39, and third comes [0, 3] with LB= 43\. We continue to generate
    nodes as specified in the algorithm and as shown in Figure [18-1](#527841_1_En_18_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_18_Chapter/527841_1_En_18_Fig1_HTML.png)


    A flow diagram depicts the main dark shaded rectangle 0 within closed brackets
    19 simplifying to four other rectangles named as 0 and 1 within closed brackets,
    39 as 0, 1, 39; 0, 2, 19; 0, 2, 1, 29; 0, 2, 1, 3, 30; 0, 2, 1, 3, 4, 41; 0, 2,
    1, 4, 38; 0, 2, 3, 36; 0, 2, 4, 56; 0, 3, 43; 0, 4, 61.


    Figure 18-1


    Part of solution tree


    The full tour [0, 2, 1, 3, 4] is the first to be generated. Since its cost is
    less than the best so far of 50, we assign the best tour to be [0, 2, 1, 3, 4]
    and its cost 41.


    The front of the PQ contains the node [0, 2, 1, 4] since it is at the deepest
    level. The algorithm backtracks to that node and then generates another full tour
