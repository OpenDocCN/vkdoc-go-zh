    case 会被执行。'
  raw: '### Goroutine


    In developing the Go language, Google introduced a lightweight process called
    a **goroutine** that requires less memory overhead than a thread. Their motivation
    was to be able to serve multiple HTML web pages made from many web browsers at
    the same time.


    Goroutines are functions that run concurrent with other functions. When a regular
    function is invoked, the code below the function gets executed after the function
    completes its work. When a goroutine function is invoked, the code directly below
    it gets executed immediately since the goroutine runs concurrently with code beneath
    it.


    We illustrate this in Listing [1-8](#527841_1_En_1_Chapter.xhtml#PC16).


    ```

    package main

    import (

    "fmt"

    "time"

    )

    func regularFunction() {

    fmt.Println("Just entered regularFunction()")

    time.Sleep(5 * time.Second)

    }

    func goroutineFunction() {

    fmt.Println("Just entered goroutineFunction()")

    time.Sleep(10 * time.Second)

    fmt.Println("goroutineFunction finished its work")

    }

    func main() {

    go goroutineFunction()

    fmt.Println("In main one line below goroutineFunction()")

    regularFunction()

    fmt.Println("In main one line below regularFunction()")

    }

    /* Output

    In main, one line below goroutineFunction()

    Just entered regularFunction()

    Just entered goroutineFunction()

    In main one line below regularFunction()

    */

    Listing 1-8

    Simple goroutine running concurrent with main

    ```


    When the ***goroutineFunction*** is launched as a goroutine using ***go goroutineFunction()***,
    it runs concurrently with the ***main*** function, which is a goroutine. The first
    line of output occurs immediately even though the ***goroutineFunction*** requires
    ten seconds to complete its work. When the ***regularFunction()*** is invoked
    next, five seconds elapses before the line of output. “In main, one line below
    regularFunction()” is emitted. Function main terminates immediately after this
    output is emitted, which ends the program before the goroutineFunction can complete
    its work. It gets interrupted and terminates when the program ends.


    If we swap the time delays so that the ***goroutineFunction*** has a time delay
    of five seconds and the ***regularFunction*** has a time delay of ten seconds,
    the output becomes


    ```

    In main one line below goroutineFunction()

    Just entered regularFunction()

    Just entered goroutineFunction()

    goroutineFunction finished its work

    In main, one line below regularFunction()

    ```


    Now the goroutine running concurrently with main completes it work before the
    ***regularFunction*** and before the ***main*** goroutine exits.


    ### WaitGroup


    Go provides a mechanism for allowing multiple goroutines to all complete their
    work before main exits while killing off unfinished goroutines.


    We introduce the sync package and the **WaitGroup** construct and illustrate its
    use in Listing [1-9](#527841_1_En_1_Chapter.xhtml#PC18).


    ```

    package main

    import (

    "fmt"

    "time"

    "math/rand"

    "sync"

    )

    var wg sync.WaitGroup

    func outputStrings() {

    defer wg.Done()

    strings := [5]string{"One", "Two", "Three", "Four", "Five"}

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(strings[i])

    }

    }

    func outputInts() {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(i)

    }

    }

    func outputFloats() {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(float64(i * i) + 0.5)

    }

    }

    func main() {

    wg.Add(3)

    go outputStrings()

    go outputInts()

    go outputFloats()

    wg.Wait()

    }

    /* Output

    One

    0.5


    Two

    1.5


    4.5


    Three

    Four


    9.5

    Five

    16.5

    */

    Listing 1-9

    The sync package and WaitGroup

    ```


    This program does nothing useful except illustrating the ***WaitGroup*** construct
    and shows three goroutines running concurrently.


    A global variable ***wg*** of type ***sync.WaitGroup*** is declared.


    In ***main***, we invoke ***wg.Add(3)***. The last line of code in main is ***wg
    .Wait()***. This causes main to pause until the value in ***wg*** is zero. This
    assures us that all three goroutines complete their work before the program terminates.


    In each of the goroutines, the first line of code, ***defer wg.Done()***, causes
    the value of the global variable ***wg*** to be decremented when the goroutine
    completes its work. When ***wg*** reaches a value of zero, the function ***main***
    is allowed to exit.


    The sequence of random numbers generated is the same each time the program is
    run, but the output sequence varies from run to run. This is because the time
    multiplexer allocates different chunks of execution time to each concurrent goroutine
    differently each time the program runs. After the second run of the program, the
    output is


    ```

    One


    0.5

    1.5

    Two


    4.5


    Three

    9.5

    16.5

    Four


    Five


    ```


    ### The Channel


    We often want to be able to synchronize the sequence of goroutines and have them
    communicate with each other. We introduce the powerful construct of the **channel**
    to accomplish this.


    Consider the goroutines in Listing [1-10](#527841_1_En_1_Chapter.xhtml#PC20).


    ```

    package main

    import (

    "fmt"

    "time"

    "sync"

    )

    var wg sync.WaitGroup

    func pingGenerator(c chan string) {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    c <- "ping"

    time.Sleep(time.Second * 1)

    }

    }

    func output(c chan string) {

    defer wg.Done()

    for {

    value := <- c

    fmt.Println(value)

    }

    }

    func main() {

    c := make(chan string)

    wg.Add(2)

    go pingGenerator(c)

    go output(c)

    wg.Wait()

    }

    /* Output

    ping

    ping

    ping

    ping

    ping

    fatal error: all goroutines are asleep - deadlock!

    */

    Listing 1-10

    Deadlock

    ```


    The first line of code in main initializes a channel, ***c***. Channels must be
    initialized with a ***make*** statement before they can be used.


    As in the previous listing, we create a ***WaitGroup*** variable, ***wg***, with
    the initial value of 2.


    We next launch the two goroutines, ***pingGenerator*** and ***output***, passing
    the channel variable ***c*** to each.


    The ***pingGenerator*** goroutine assigns the string “ping” to the channel variable
    ***c*** every second and does this five times. The left arrow from the value “ping”
    to the variable ***c*** represents the assignment of the “ping” value to ***c***.


    The channel must be empty for this assignment to be made. In the ***output***
    goroutine, the assignment to ***value***, using ***value := <- c***, gobbles up
    the channel variable ***c*** as soon as it is assigned in the ***pingGenerator***.
    This occurs every second. During the time between “ping” assignments from the
    ***pingGenerator***, the ***value*** assignment is blocked. That is execution
    is halted within the output goroutine until there is information in the channel
    assigning to value. So the two goroutines are being affected by the channel variable
    ***c***, common to both.


    There is a problem. When the ***pingGenerator*** has emitted its five “ping” assignments,
    each displayed on the console through the ***output*** goroutine, it blocks while
    waiting for a sixth channel assignment. This never occurs. The program crashes
    with the error message shown earlier. A deadlock has occurred. The program cannot
    terminate.


    ### Select Statement


    We can resolve this problem by modifying the ***output*** goroutine and using
    a **select** statement.


    ```

    func output(c chan string) {

    for {

    select {

    case value := <- c:

    fmt.Println(value)

    case <-time.After(3 * time.Second):

    fmt.Println("Program timed out.")

    wg.Done()

    }

    }

    }

    ```


    In a **select** statement, the case that occurs first gets executed. If two or
    more cases are ready to execute, the system chooses one at random. Since the channel
    ***c*** gets assigned to ***value*** every second (blocks between assignments),
    the program outputs the five “ping” assignments. Instead of deadlocking as before,
    the second case gets executed after three seconds from the time the fifth and
    final “ping” is assigned to ***value***.'
