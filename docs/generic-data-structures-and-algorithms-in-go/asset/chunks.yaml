    ## 19.4 Summary


    This chapter presented a simulated annealing heuristic algorithm for solving TSP.
    The steps of this algorithm mimic the annealing of metal beams where the goal
    is to immerse the beam in a hot liquid and cool the beam slowly until the internal
    average energy of the lattice structure is minimized. Using an artificial temperature
    variable, the simulated annealing algorithm cools the solution space slowly while
    attempting to lower the cost of a tour.


    We obtained remarkable results applying this heuristic algorithm to a 29-city
    problem.


    The next chapter presents another heuristic algorithm for tackling TSP, a genetic
    algorithm.


    # 20. Genetic Algorithm for TSP


    The previous chapter presented an implementation of simulated annealing, a powerful
    and useful heuristic algorithm for solving TSP. We saw that this heuristic algorithm
    often obtains the optimum solution to the problem with relatively little computational
    effort.


    This chapter presents another heuristic approach for TSP – genetic algorithm.


    In the next section, we introduce the basis for this heuristic algorithm


    ## 20.1 Genetic Algorithm


    A genetic algorithm is inspired by the biological maxim **survival of the fittest**.


    As species evolve, traits that resonate with the ecosystem in which the species
    exist prevail. The traits that promote the greatest ability to survive in a hostile
    environment become dominant, and the traits that promote weakness disappear over
    time. This evolutionary process assumes continual changes in the underlying genetic
    structure of the species resulting from reproduction.


    We apply this evolutionary model to TSP.


    ### High-Level Description of Genetic Algorithm


    An initial population of tours that visit each city once and return to the starting
    city is randomly generated. The fitness of each tour is the reciprocal of the
    tour cost. The smaller the tour cost, the higher the fitness.


    We define a mating process as combining two tours to produce two offspring tours
    that are formed by some combination of the parent tours.


    We define a mating pool as a collection of parent tours to be combined (mated)
    to produce the next generation of tours.


    We define a mutation of a tour as a new tour that results from some small random
    perturbation of an existing tour.


    ### More Detailed Description of Genetic Algorithm


    **Initial Generation:** We define a constant population size, say, `PopSize`.
    We generate `PopSize` random tours, each starting and ending at city 0\. These
    tours represent our initial generation.


    **Rank the Population:** We rank the tours that comprise the initial generation
    based on the fitness of each tour. The smaller the cost of the tour, the higher
    the fitness. We sort the tours by their fitness.


    **Mating Pool:** We use a tournament selection rule that works as follows: A specified
    group of tours are randomly selected from the population, and the one with the
    highest fitness in the group is chosen as the first parent. This is repeated to
    choose the second parent. We continue this process until we have created `PopSize
    / 2` mating pairs.


    **Mating:** This is the most challenging and important aspect of the genetic algorithm.
    We need to combine two tours to produce two child tours where each child retains
    a portion of its parents. We will utilize several crossover algorithms to accomplishing
    this mating.


    **Mutation:** We will use a simple swap of two randomly chosen cities in a tour
    to produce a new tour. Such a new tour may have inferior fitness compared to the
    tour being mutated. This is like an uphill move in the simulated annealing algorithm.
    It promotes diversity and helps stave off a premature descent to a local minimum
    in the solution space. We apply mutation to a randomly selected small percentage
    of a given generation.


    The steps for our genetic algorithm are the following:


    1.  Form an initial population of random tours of size `ToursPerGeneration`.


    2.  Select a small elite group of the fittest tours in the existing generation
    to be moved to the next generation.


    3.  Use tournament selection on the tours that remain to define a mating pool.


    4.  Perform mating of the parents in the mating pool to form a new generation
    of tours. This new generation contains the elite group from the previous generation
    along with the new children formed by mating.


    5.  Perform mutation on a randomly selected small fraction of the new generation.


    6.  Repeat steps 2 through 5 for a specified number of generations. Output the
    best tour to date as the tours progress from one generation to another.


    In the next section, we construct our solution, following these steps.


