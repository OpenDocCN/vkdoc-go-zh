    \   result := \"姓名：\" + person.firstName + \" \" + person.lastName + \"\\n\"\n\
    \    result += \"职位：\" + person.role + \"\\n\"\n    result += \"年薪：$\" + fmt.Sprintf(\"\
    %0.2f\", person.salary) + \"\\n\"\n    return result\n}\n\nfunc (person partTimeEmployee)\
    \ String() string {\n    result := \"姓名：\" + person.firstName + \" \" + person.lastName\
