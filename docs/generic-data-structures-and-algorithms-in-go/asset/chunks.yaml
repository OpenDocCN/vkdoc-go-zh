    ## 总结


    我们从头构建了一个相对简单的神经网络，其含有一个包含 25 个节点的隐藏层。该网络使用 150 对诊断测试结果及其对应的已知正确结果标签进行训练，训练轮次为
    1500 次。随后，用 25 个不在原始训练集中的全新测试结果对网络进行测试。测试结果令人鼓舞。均方误差随着训练的推进逐渐减小至一个很小的数值。所有 25
    个测试结果均得出了正确结论。'
