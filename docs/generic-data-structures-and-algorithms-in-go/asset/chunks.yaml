  raw: '## 16.3 Depth- and Breadth-First Search


    We start by defining important data types.


    ```

    type OrderedStringer interface {

    comparable

    String() string

    }

    type Vertex[T OrderedStringer] struct {

    Key T

    Neighbors map[T]*Vertex[T]

    }

    type Graph[T OrderedStringer] struct {

    Vertices map[T]*Vertex[T]

    }

    var visitation []string

    ```


    Our generic type is ***OrderedStringer***. Entities of this type must be comparable
    and have a string representation using the **String()** function.


    A generic ***Vertex*** contains a ***Key*** (type **T**) and a map, ***Neighbors***,
    mapping keys (type T) to pointers to other vertices.


    A generic ***Graph*** contains a map, ***Vertices***, mapping keys (type **T**)
    to pointers to vertices.


    A global ***visitation*** variable is defined. This variable is a slice of string
    representing the traversal keys.


    Several important functions and methods are shown as follows:


    ```

    func NewVertex[T OrderedStringer](key T) *Vertex[T] {

    return &Vertex[T]{

    Key: key,

    Neighbors: map[T]*Vertex[T]{},

    }

    }

    func NewGraph[T OrderedStringer]() *Graph[T] {

    return &Graph[T]{Vertices: map[T]*Vertex[T]{}}

    }

    func (g *Graph[T]) AddVertex(key T) {

    vertex := NewVertex(key)

    g.Vertices[key] = vertex

    }

    func (g *Graph[T]) AddEdge(key1, key2 T, edgeValue int) {

    vertex1 := g.Vertices[key1]

    vertex2 := g.Vertices[key2]

    if vertex1 == nil || vertex2 == nil {

    return

    }

    vertex1.Neighbors[vertex2.Key] = vertex2

    g.Vertices[vertex1.Key] = vertex1

    g.Vertices[vertex2.Key] = vertex2

    }

    ```


    The function ***NewVertex*** takes a key (of type **T**) and returns a pointer
    to a **Vertex** with an empty map, ***Neighbors***.


    The function ***NewGraph*** returns an empty graph with an empty map of ***Vertices***.


    The method ***AddVertex*** creates a new vertex and assigns ***Vertices[key]***
    to the new vertex.


    The method ***AddEdge*** takes the two keys, assigns these to the ***Vertices***
    field of graph, and assigns the ***Neighbors*** field of ***vertex1*** to ***vertex2***.


    ### Depth-First Search


    The first traversal method we examine is depth-first search. This method moves
    outward from the starting vertex and moves directly to the furthest vertex not
    yet visited.


    It is implemented as follows:


    ```

    func (g *Graph[T]) DepthFirstSearch(start *Vertex[T],

    visited map[T]bool) {

    if start == nil {

    return

    }

    visited[start.Key] = true

    visitation = append(visitation, start.Key.String())

    // for each of the adjacent vertices, call the

    // function recursively if it hasn''t yet been

    // visited

    for _, v := range start.Neighbors {

    // The sequence of v may change from run to run

    if visited[v.Key] {

    continue

    }

    g.DepthFirstSearch(v, visited)

    }

    }

    ```


    The parameter, ***visited***, passed in must be initialized to an empty map before
    invoking the method.


    The sequence of recursive calls causes the traversal to move away from the starting
    vertex until it is furthest away before backtracking and finding other vertices
    far away from the starting vertex.


    ### Breadth-First Search


    The second traversal method we examine is breadth-first search. This method visits
    vertices close to the starting vertex slowly moving outward and away from the
    starting vertex. There is no recursion used here. A queue is used to store vertices
    that neighbor visited vertices. These neighboring vertices are traversed first.
    So as the name of this method implies, this traversal moves to adjacent vertices
    slowly getting further from the starting vertex. It is implemented as follows:


    ```

    type Queue[T any] struct {

    items []T

    }

    // Methods

    func (queue *Queue[T]) Insert(item T) {

    // item is added to the right-most position in the

    // slice

    queue.items = append(queue.items, item)

    }

    func (queue *Queue[T]) Remove() T {

    returnValue := queue.items[0]

    queue.items = queue.items[1:]

    return returnValue

    }

    func (g *Graph[T]) BreadthFirstSearch(start *Vertex[T],

    visited map[T]bool) {

    if start == nil {

    return

    }

    queue := Queue[*Vertex[T]]{} // Queue hold pointers

    // to Vertex

    current := start

    for {

    if !visited[current.Key] {

    visitation = append(visitation,

    current.Key.String())

    }

    visited[current.Key] = true

    // Insert each neighboring vertex not visited

    // onto the queue

    for _, v := range current.Neighbors {

    if !visited[v.Key] {

    queue.Insert(v)

    }

    }

    // Grab first vertex in the queue and remove it

    if len(queue.items) > 0 {

    current = queue.Remove()

    } else {

    break

    }

    }

    }

    ```


    The ***queue*** plays a central role in the implementation of this method. It
    forces all nearby vertices to be visited early in contrast to depth-first search.
    Like the latter method, this method requires the parameter ***visited*** to be
    initialized to an empty map before invoking the method.


    Listing [16-1](#527841_1_En_16_Chapter.xhtml#PC5) presents all the details of
    defining and traversing a graph. The graph shown in Section 16.1 is constructed
    in the main driver program.'
