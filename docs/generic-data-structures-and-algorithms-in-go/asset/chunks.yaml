  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将以下英文文本翻译成中文。\n\n---\n\n\n# 14.3 设计\n\n构建一个全局的位置对象网格。每个位置对象包含一个\
    \ `x` 和 `y` 坐标，以及一个生物。这个生物可以是鲨鱼、金枪鱼或鲭鱼。每当一个生物移动时，全局位置网格（一个二维数组）都会被更新。\n\n每个生物的运动由一个独立的\
    \ goroutine 控制，该 goroutine 在生物（通过繁殖或初始种群）诞生时生成。当生物因被吃掉（鲭鱼或金枪鱼）、饿死（金枪鱼或鲨鱼）或衰老（鲭鱼、金枪鱼或鲨鱼）而死亡时，必须停止其\
    \ goroutine，以防止进一步移动并控制计算机资源。随着海洋单元格被生物占据，可能会有数千个 goroutine 同时运行，每个都代表一个正在移动的生物。\n\
    \n为了实现每个生物的持续移动，在生物的 goroutine 内部构建了一个循环，并带有半秒到一秒的随机休眠延迟。当模拟结束或生物死亡时，此循环必须终止。终止（跳出）循环将结束该生物的\
    \ goroutine。\n\n构建一个独立的输出 goroutine，放在一个带有 1 秒休眠延迟的循环中。因此，每秒钟会计算一次生物的数量普查，并使用彩色矩形显示所有生物的位置。在此输出过程中，显示包含生物位置的全局矩阵。\n\
    \n使用互斥锁，当生物移动或海洋被显示时，必须冻结全局位置矩阵，以防止出现竞态条件。\n\n## 14.4 实现\n\n在展示完整实现（超过 400 行代码）之前，我们将展示并讨论各个部分。\n\
    \n### 每个物种的数据模型\n\n我们首先检查每个物种的数据模型，最重要的是全局位置矩阵。\n\n```go\ntype Location struct\
    \ {\n    x       int\n    y       int\n    critter MarineLife\n}\ntype MarineLife\
    \ interface {\n    Move()\n    Reproduce(l Location)\n    Starve() bool\n    LifeOver()\
    \ bool\n}\ntype Tuna struct {\n    repro int\n    starv int\n    life  int\n \
    \   x, y int  // 如果死亡，设 x 为 -1, y = -1\n}\ntype Shark struct {\n    repro int\n\
    \    starv int\n    life  int\n    x, y int  // 如果死亡，设 x 为 -1, y = -1\n}\ntype\
    \ Mackerel struct {\n    repro int\n    starv int\n    life  int\n    x, y int\
    \  // 如果死亡，设 x 为 -1, y = -1\n}\nvar locations [numRows][numCols]Location\n```\n\
    \n### 代码讨论\n\n类型 `Location` 将 `critter` 指定为 `MarineLife` 类型。为此，每个具体的生物类型（鲨鱼、金枪鱼和鲭鱼）都必须实现\
    \ `MarineLife` 接口。这意味着每个具体类型都必须实现 `Move()`、`Reproduce()`、`Starve()` 和 `LifeOver()`\
    \ 方法。\n\n每种生物类型都由一个包含 `repro`、`starv`、`life`、`x` 和 `y` 字段的结构体定义。\n\n全局的 `locations`\
    \ 二维数组被定义为包含 `Location` 对象。\n\n### 支持函数\n\n定义了实现 `MarineLife` 接口方法所需的几个支持函数。如下所示：\n\
    \n```go\nfunc init() {\n    rand.Seed(time.Now().UTC().UnixNano())\n}\nfunc distanceOfOne(x1,\
    \ y1, x2, y2 float64) bool {\n    return (math.Abs(x2-x1) == 0 &&\n        math.Abs(y2-y1)\
    \ == 1) ||\n        (math.Abs(x2-x1) == 1 && math.Abs(y2-y1) == 0)\n        ||\
    \ (math.Abs(x2-x1) == 1 &&\n            math.Abs(y2-y1) == 1)\n}\nfunc initializeLocations()\
    \ {\n    for row := 0; row < numRows; row++ {\n        for col := 0; col < numCols;\
    \ col++ {\n            locations[row][col] =\n                Location{col, row,\
    \ nil}\n        }\n    }\n}\nfunc findRandomCritter(x int, y int,\n    critter\
    \ MarineLife) (bool, Location) {\n    // 传入 nil 作为生物参数以获取随机空位置\n    result :=\
    \ []Location{}\n    for r := 0; r < numRows; r++ {\n        for c := 0; c < numCols;\
    \ c++ {\n            d := distanceOfOne(float64(x), float64(y),\n            \
    \    float64(c), float64(r))\n            if d == true &&\n                reflect.TypeOf(locations[c][r].critter)\
    \ ==\n                    reflect.TypeOf(critter) {\n                result =\
    \ append(result, Location{r, c,\n                    critter})\n            }\n\
    \        }\n    }\n    if len(result) == 0 {\n        return false, Location{}\n\
    \    } else {\n        return true, result[rand.Intn(len(result))]\n    }\n}\n\
    ```\n\n### 代码讨论\n\n我们在函数 `findRandomCritter` 中使用 `reflect.TypeOf` 方法来创建一个包含输入到此函数的生物的\
    \ `Location` 对象切片。此函数返回两个输出，允许调用者判断是否找到了目标位置。\n\n函数 `init()` 使用当前时钟时间为随机数生成器播种，确保每次运行模拟时都会产生不同的结果。\n\
    \n函数 `initializeLocations` 为每个单元格分配 `x` 和 `y` 坐标，并将每个单元格的 critter 值设为 `nil`。\n\
    \n### 使鲭鱼符合 `MarineLife` 类型所需的方法\n\n```go\nfunc (mackerel *Mackerel) Move() {\n\
    \    for ; quit == false ; {\n        if mackerel.x == -1 { // 鲭鱼已被杀死\n      \
    \      break\n        }\n        mutex.Lock()\n        mackerel.repro -= 1\n \
    \       mackerel.starv -= 1\n        mackerel.life -= 1\n        if mackerel.LifeOver()\
    \ || mackerel.Starve() {\n            locations[mackerel.y][mackerel.x].critter\n\
    \                = nil\n            mackerel.x = -1\n            mackerel.y =\
    \ -1\n            mutex.Unlock()\n            break\n        }\n        // 寻找没有生物的随机邻居\n\
    \        found, newLoc := findRandomCritter(mackerel.x,\n            mackerel.y,\
    \ nil)\n        if found == true {\n            fmt.Printf(\"\\n 鲭鱼从 (%d,%d) 移动到\
    \ (%d,%d)\",\n                mackerel.x,\n                mackerel.y, newLoc.x,\
    \ newLoc.y)\n            mackerel.Reproduce(newLoc)\n        }\n        mutex.Unlock()\n\
    \        time.Sleep(time.Duration(rand.Intn(500) + 500)\n            * time.Millisecond)\n\
    \    }\n}\nfunc (mackerel Mackerel) Starve() bool {\n    return mackerel.starv\
    \ <= 0\n}\nfunc (mackerel Mackerel) LifeOver() bool {\n    return mackerel.life\
    \ <= 0\n}\nfunc (mackerel *Mackerel) Reproduce(l Location) {\n    if mackerel.x\
    \ == -1 {\n        return\n    }\n    if mackerel.repro <= 0 {\n        newMackerel\
    \ := new(Mackerel)\n        newMackerel.repro = MACKERELREPRO\n        newMackerel.starv\
    \ = MACKERELSTARVE\n        newMackerel.life = MACKERELLIFE\n        newMackerel.x\
    \ = mackerel.x\n        newMackerel.y = mackerel.y\n        locations[mackerel.y][mackerel.x].critter\
    \ =\n            newMackerel\n        go newMackerel.Move()\n    } else {\n  \
    \      locations[mackerel.y][mackerel.x].critter = nil\n    }\n    mackerel.x\
    \ = l.x // 将鲭鱼分配到新位置\n    mackerel.y = l.y\n    // 将鲭鱼添加到新位置\n    locations[l.y][l.x].critter\
    \ = mackerel\n}\n```\n\n### 代码讨论\n\n鲭鱼的 `Move` 方法将指向 `Mackerel` 的指针作为方法的接收者。这是必需的，因为\
    \ `mackerel` 接收者的内部数据可能会被修改。\n\n在定义连续移动的 for 循环中，如果 `mackerel` 对象的 `x` 坐标为 -1，我们跳出循环，从而终止该方法。此方法将在其他地方被定义为一个\
    \ goroutine。\n\n我们锁定互斥锁，以防止在此 goroutine 之外更改全局的 `locations` 矩阵。我们递减 `repro`、`starv`\
    \ 和 `life` 三个字段。\n\n如果 `Starve()` 或 `LifeOver()` 中的任何一个为真，我们将该鲭鱼对象从海洋中清除（在相应的\
    \ `location[mackerel.y][mackerel.x]` 处将其 `critter` 值设为 `nil`）。通过将该死亡鲭鱼对象的 `x`\
    \ 和 `y` 值设为 -1 来终止其 goroutine。我们解锁互斥锁。\n\n如果找到了一个空的目标位置，我们将移动信息输出到控制台，并将 `newLoc`\
    \ 传递给 `Reproduce` 方法。我们解锁互斥锁。我们使用随机休眠间隔暂停 goroutine 循环。\n\n`Reproduce` 方法使用指针接收者，因为接收者的内部数据可能会被修改。\n\
    \n如果 `repro` 值小于或等于零，我们使用定义初始字段值 `repro`、`starv` 和 `life` 的全局常量创建一个新的鲭鱼对象。我们将新的鲭鱼对象分配给\
    \ `Location` 的 `critter` 字段，并将其 `x` 和 `y` 值设置为繁殖鲭鱼腾出的位置。\n\n如果 `repro` 值大于 1，我们将腾出的位置的\
    \ critter 值设为 `nil`。\n\n最后，我们将鲭鱼的 `x` 和 `y` 坐标设置为新位置。\n"
