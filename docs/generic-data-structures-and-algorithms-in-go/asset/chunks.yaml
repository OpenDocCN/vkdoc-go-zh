    \ 的封装性\nfmt.Println(myCounter.GetCount())\nfor i := 1; i <= 10; i++ {\nmyCounter.Increment()\n\
    }\nmyCounter.Decrement()\n// myCounter.count -= 6 // 破坏了 Counter 的封装性\nfmt.Println(myCounter.GetCount())\n\
    }\n/*\n\n*/\n清单 3-1\nCounter ADT 的首次实现\n```\n\n这个首次实现存在一个问题。如果取消注释下面两行代码：\n\n\
    ```\nmyCounter.count = 100\nmyCounter.count -= 6\n```\n\n那么维护 ADT 完整性的封装就会被破坏。创建和实现\
    \ ADT 的全部意义在于强制实施抽象。在这个案例中，这意味着不允许一次性将 `count` 值改变超过 1，也不允许随意赋值。\n\n我们修复了这个问题并强制实施了抽象，如清单\
    \ 3-2 所示。我们定义了一个 `Counter` 接口（使用大写字母 C）来正式定义该 ADT。\n\n```\n// 创建 ADT Counter\n\
    package main\nimport (\n\"fmt\"\n)\n// 该类型隐式地实现了 Counter ADT\ntype counter struct\
    \ {\ncount int\n}\n// 接口用于暴露 counter 的公有特性\n// 属性 count 是私有的\ntype Counter interface\
    \ {\nincrement()\ndecrement()\nreset()\ngetCount() int\n}\nfunc (c *counter) increment()\
    \  {\nc.count += 1\n}\nfunc (c *counter) decrement()  {\nif c.count > 0 {\nc.count\
    \ -= 1\n}\n}\nfunc (c *counter) reset() {\nc.count = 0\n}\nfunc (c counter) getCount()\
    \ int {\nreturn c.count\n}\nfunc main() {\nmyCounter := Counter(&counter{})\n\
    // 可以对我这个计数器执行的操作\n// 仅限定于 Counter 接口中指定的那些\nmyCounter.increment()\nmyCounter.increment()\n\
    myCounter.reset()\nmyCounter.increment()\nmyCounter.increment()\nmyCounter.increment()\n\
    myCounter.increment()\nmyCounter.decrement()\ncountValue := myCounter.getCount()\n\
    fmt.Println(countValue)\n}\n// 3\n清单 3-2\nCounter ADT 的第二次实现\n```\n\n`Counter`\
    \ 接口指定了可对 ADT `Counter` 执行的四个操作的签名。\n\n方法 `increment()`、`decrement()`、`reset()`\
    \ 和 `getCount()` 都定义在 `counter` 类型上，它们**隐式地**使得 `counter` 实现了 ADT `Counter`。\n\
    \n如果我们注释掉 `reset()` 方法，并注释掉 `main` 函数中的 `myCounter.reset()`，将会得到以下编译器错误信息：\n\n\
    `./counter2.go:41:26: cannot convert &counter{} (value of type *counter) to type\
    \ Counter:`  \n`counter does not implement Counter (missing reset method)`\n\n\
    如果 `counter` 类型上没有定义 `reset()` 方法，那么 `counter` 类型就不再被视为 `Counter` 类型，编译器会检测到这个错误。\n\
    \n在 Go 语言中，抽象数据类型总是通过定义一个接口来**隐式定义**，该接口指定了与 ADT 相关联的操作，然后在底层类型上实现与接口规范中签名完全一致的方法。\n\
    \n借助清单 3-2 中完成的工作，就无法再像清单 3-1 中那样违反 ADT 的封装性了。\n\n### 创建 counter 包\n\n保护 `count`\
    \ 并维护 `counter` 抽象封装性的另一种方法是创建一个 `counter` 包，并导出 `Counter`，但不导出 `count`。\n\n```\n\
    package counter\n// 字段 count 因为是小写字母开头而被封装为私有\ntype Counter struct {\ncount int\
    \ // 私有字段\n}\nfunc (c *Counter) Increment() {\nc.count += 1\n}\nfunc (c *Counter)\
    \ Decrement() {\nif c.count > 0 {\nc.count -= 1\n}\n}\nfunc (c *Counter) Reset()\
    \ {\nc.count = 0\n}\nfunc (c Counter) GetCount() int {\nreturn c.count\n}\n```\n\
    \n在 `counter` 包中，我们通过使用小写字符作为 `count` 的首字符，来保护 `Counter` 的 `count` 字段不被包外赋值。\n\
    \n### 创建包的机制\n\n为了在你选择的子目录中定义一个包，我们必须遵循下面概述的一系列步骤。这里，我们希望将定义 `counter` 包的 `counter.go`\
    \ 文件放在某个工作目录下的子目录 `counter` 中。一个主驱动程序 `main.go` 定义在另一个子目录 `maincounter` 中。\n\n\
    创建 `counter` 包所需的步骤如下：\n\n1.  在你的工作目录中创建一个子目录 `counter`。\n2.  将包含 `package counter`\
    \ 的 `counter.go` 文件（参见上文）保存到此子目录中。\n3.  在你的工作目录中创建一个子目录 `maincounter`。\n4.  将\
    \ `maincounter.go` 文件保存到此子目录中。\n5.  打开一个终端窗口，切换到 `counter` 目录。\n6.  输入以下命令：`go\
    \ mod init example.com/counter`\n7.  输入以下命令：`go mod tidy`\n8.  打开一个终端窗口，切换到 `maincounter`\
    \ 目录。\n9.  输入以下命令：`go mod init example.com/maincounter`\n10. 编辑 `go.mod` 文件，使其内容如下：\n\
    \n    ```\n    module example.com/maincounter\n    go 1.18\n    replace example.com/counter\
    \ => ../counter\n    ```\n\n11. 输入以下命令：`go mod tidy`\n\n清单 3-3 展示了 `Counter` ADT\
    \ 的第三次实现。\n\n```\n// 在子目录 counter 中\npackage counter\ntype Counter struct {\n\
    count int\n}\nfunc (c *Counter) Increment()  {\nc.count += 1\n}\nfunc (c *Counter)\
    \ Decrement()  {\nif c.count > 0 {\nc.count -= 1\n}\n}\nfunc (c *Counter) Reset()\
    \ {\nc.count = 0\n}\nfunc (c Counter) GetCount() int {\nreturn c.count\n}\n//\
    \ 在子目录 maincounter 中\npackage main\nimport (\n\"fmt\"\n\"example.com/counter\"\
    \n)\nfunc main() {\nmyCounter := counter.Counter{}\nmyCounter.Increment()\nmyCounter.Increment()\n\
    myCounter.Reset()\nmyCounter.Increment()\nmyCounter.Increment()\nmyCounter.Increment()\n\
    myCounter.Increment()\nmyCounter.Decrement()\ncountValue := myCounter.GetCount()\n\
    fmt.Println(countValue)\n}\n// 3\n清单 3-3\n使用 counter 包的 Counter ADT 的第三次实现\n```\n\
    \n导出的标识符（即可以在包外访问的标识符）必须以大写字母开头。这包括类型名称（如 `Counter`）和方法名称。`Counter` 结构体中的字段 `count`\
    \ 特意使用了小写字母，这样它的值就不能在包外被访问。改变 `count` 的唯一方式是通过操作 `Counter` 的方法。\n\n在清单 3-2 和 3-3\
    \ 给出的两种方法中，实现 ADT `Counter` 应该使用哪一种？\n\n如果一个 ADT 要被两个或更多应用程序使用，那么首选清单 3-3 中为 ADT\
    \ 定义包的方案。如果一个 ADT 是一次性的，只在一个特定的应用程序中使用，那么使用接口类型的方案更简单。\n"
- fmt: "# Another Example of Implementing an ADT\n\nWe look at another example with\
    \ more complexity to illustrate how Go implements abstract data types without\
    \ the use of classes.\n\nConsider the ADT `Employee`.\n\n| Attributes |\n| ---\
    \ |\n| `LastName` string |\n| `FirstName` string |\n| `Role` string |\n| `Salary`\
    \ float64 |\n| Methods |\n| `Get LastName` (read-only) |\n| `Get FirstName` (read-only)\
    \ |\n| `Set/Get Role` |\n| `Set/Get Salary` |\n| `String()` string – Represents\
    \ the instance as a string |\n\nWe have specified `LastName` and `FirstName` as\
    \ read-only. Once their values have been assigned, they cannot be changed.\n\n\
    Also consider the ADT `PartTimeEmployee` that is an `Employee` with an additional\
    \ feature.\n\n| Attributes |\n| --- |\n| `Employee` |\n| `HourlyWage` float64\
    \ |\n| Methods |\n| `Set/Get HourlyWage` |\n| `String()` string – Represents the\
    \ instance as a string |\n\nWe deploy the struct and interface definitions shown\
    \ in the following to establish the ADT:\n\n```go\ntype employee struct {\n  \
    \  lastName string\n    firstName string\n    role string\n    salary float64\n\
    }\n\ntype Employee interface {\n    SetLastName(lName string)\n    SetFirstName(fName\
    \ string)\n    SetRole(r string)\n    GetRole() string\n    SetSalary(s float64)\n\
    \    GetSalary() float64\n    String() string\n}\n\ntype partTimeEmployee struct\
    \ {\n    employee\n    hourlyWage float64\n}\n\ntype PartTimeEmployee interface\
    \ {\n    Employee\n    SetHourlyWage(hourly float64)\n    GetHourlyWage() float64\n\
    }\n```\n\n## Using Composition\n\nEach of the struct types, `employee` and `partTimeEmployee`,\
    \ is accompanied by interface types. These define the operations required on their\
    \ respective struct types to implicitly make the struct types implement the interfaces\
    \ given.\n\nWe use embedding when we define the first field of `partTimeEmployee`\
    \ to be `employee`.\n\nIn software design, this is called **composition**. The\
    \ abstraction for a part time employee is composed of an employee and an hourly\
    \ wage.\n\nThe `PartTimeEmployee` interface also uses embedding by including the\
    \ interface `Employee` first. This requires that all the methods of `Employee`\
    \ be implemented along with the two new methods, `Set`/`Get` hourly wage.\n\n\
    Listing [3-4](#527841_1_En_3_Chapter.xhtml#PC10) fleshes out the ADTs defined\
    \ previously and presents a short main driver program.\n\n```go\npackage main\n\
    \nimport (\n    \"fmt\"\n)\n\ntype employee struct {\n    lastName string\n  \
    \  firstName string\n    role string\n    salary float64\n}\n\ntype Employee interface\
    \ {\n    SetLastName(lName string)\n    SetFirstName(fName string)\n    SetRole(r\
    \ string)\n    GetRole() string\n    SetSalary(s float64)\n    GetSalary() float64\n\
    \    String() string\n}\n\ntype partTimeEmployee struct {\n    employee\n    hourlyWage\
    \ float64\n}\n\ntype PartTimeEmployee interface {\n    Employee\n    SetHourlyWage(hourly\
    \ float64)\n    GetHourlyWage() float64\n}\n\n// Methods\nfunc (person *employee)\
    \ SetSalary(yearly float64) {\n    person.salary = yearly\n}\n\nfunc (person employee)\
    \ GetSalary() float64 {\n    return person.salary\n}\n\nfunc (person *employee)\
    \ SetFirstName(firstN string) {\n    person.firstName = firstN\n}\n\nfunc (person\
    \ employee) GetFirstName() string {\n    return person.firstName\n}\n\nfunc (person\
    \ *employee) SetLastName(lastN string) {\n    person.lastName = lastN\n}\n\nfunc\
    \ (person *employee) SetRole(r string) {\n    person.role = r\n}\n\nfunc (person\
    \ employee) GetRole() string {\n    return person.role\n}\n\nfunc (person employee)\
    \ String() string {\n    result := \"Name: \" + person.firstName + \" \" + person.lastName\
    \ + \"\\n\"\n    result += \"Role: \" + person.role + \"\\n\"\n    result += \"\
    Annual salary: $\" + fmt.Sprintf(\"%0.2f\", person.salary) + \"\\n\"\n    return\
    \ result\n}\n\nfunc (person partTimeEmployee) String() string {\n    result :=\
    \ \"Name: \" + person.firstName + \" \" + person.lastName + \"\\n\"\n    result\
    \ += \"Role: \" + person.role + \"\\n\"\n    result += \"HourlyWage: $\" + fmt.Sprintf(\"\
    %0.2f\", person.hourlyWage) + \"\\n\"\n    return result\n}\n\nfunc (person *partTimeEmployee)\
    \ SetHourlyWage(amt float64) {\n    person.hourlyWage = amt\n}\n\nfunc (person\
    \ partTimeEmployee) GetHourlyWage() float64 {\n    return person.hourlyWage\n\
    }\n\nfunc main() {\n    person := new(employee) // Returns the address of an employee\n\
    \    person.SetFirstName(\"Helen\")\n    person.SetLastName(\"Rose\")\n    person.SetRole(\"\
    Technical Lead\")\n    person.SetSalary(125_644.0)\n    fmt.Println(person.String())\n\
    \n    hourlyWorker := new(partTimeEmployee) // Returns address\n    hourlyWorker.SetFirstName(\"\
    Mark\")\n    hourlyWorker.SetLastName(\"Smith\")\n    hourlyWorker.SetRole(\"\
    Software Developer\")\n    hourlyWorker.SetHourlyWage(85.00)\n    fmt.Println(hourlyWorker.String())\n\
    }\n\n/*\nName: Helen Rose\nRole: Technical Lead\nAnnual salary: $125644.00\n\n\
    Name: Mark Smith\nRole: Software Developer\nHourlyWage: $85.00\n*/\n```\n\nListing\
    \ 3-4 — `Employee` and `PartTimeEmployee` ADTs in action\n\nVariables `person`\
    \ and `hourlyWorker` act like objects (instances of a class) in traditional object-oriented\
    \ programming (OOP) languages. Methods are invoked on these variables as one would\
    \ do in traditional OOP languages.\n\nIn the next section, we discuss polymorphism\
    \ in Go. This is another fundamental pillar of object-oriented programming.\n\n\
    # 3.3 Polymorphism\n\nPolymorphism is a basic pillar of object-oriented programming.\
    \ It allows actions to be taken on objects **at runtime**, where the action is\
    \ based on the **type of object** that receives the action.\n\nIn traditional\
    \ strongly typed object-oriented languages like C#, Java, and Swift, if the action\
    \ is declared on a formal type and the actual type is an instance of a descendant\
    \ class, the runtime system chooses the method belonging to the actual type receiving\
    \ the message.\n\nThis cannot happen in Go since descendant classes (inheritance)\
    \ do not exist.\n\n## Using Interfaces to Achieve Polymorphism\n\nWe can achieve\
    \ polymorphic behavior using interfaces as the next example in Listing [3-5](#527841_1_En_3_Chapter.xhtml#PC11)\
    \ illustrates.\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n)\n\ntype FixedPriceJob\
    \ struct {\n    description string\n    fixedPrice float64\n}\n\ntype HourlyJob\
    \ struct {\n    description string\n    hourlyRate float64\n    numberHours int\n\
    }\n\ntype JobInterface interface {\n    Cost() float64\n    GetDescription() string\n\
    }\n\n// Implicitly defines FixedPriceJob as implementing the JobInterface\nfunc\
    \ (job FixedPriceJob) Cost() float64 {\n    return job.fixedPrice\n}\n\nfunc (job\
    \ FixedPriceJob) GetDescription() string {\n    return job.description\n}\n\n\
    // Implicitly defines HourlyJob as implementing the JobInterface\nfunc (hourlyJob\
    \ HourlyJob) Cost() float64 {\n    return hourlyJob.hourlyRate * float64(hourlyJob.numberHours)\n\
    }\n\nfunc (hourlyJob HourlyJob) GetDescription() string {\n    return hourlyJob.description\n\
    }\n\nfunc TotalJobCost(jobs []JobInterface) float64 {\n    result := 0.0\n   \
    \ for _, job := range jobs {\n        result += job.Cost()\n    }\n    return\
    \ result\n}\n\nfunc main() {\n    job1 := FixedPriceJob{\"Stucco House\", 34760.0}\n\
    \    job2 := HourlyJob{\"Landscaping\", 40.0, 50}\n    jobs := []JobInterface{job1,\
    \ job2}\n    totalCost := TotalJobCost(jobs)\n    fmt.Printf(\"Total job cost:\
    \ $%0.2f\", totalCost)\n}\n\n// Total job cost: $36760.00\n```\n\nListing 3-5\
    \ — Polymorphism in action\n\nAny type that defines methods with the signatures\
    \ given in `JobInterface` implicitly implements this interface. That is what we\
    \ do in Listing [3-5](#527841_1_En_3_Chapter.xhtml#PC11). We define `Cost()` and\
    \ `GetDescription()` methods on both `FixedPriceJob` and `HourlyJob`.\n\nIn function\
    \ `TotalJobCost`, we input a slice of type `JobInterface`. We iterate over the\
    \ range of input jobs and accumulate the total cost by invoking the `Cost()` method\
    \ on each job. The runtime system binds the correct `Cost()` method based on the\
    \ type of job receiving this method (whether the job is a `FixedPriceJob` or `HourlyJob`\
    \ in this example). That is polymorphism in action.\n\nIn the next section, we\
    \ present an object-oriented programming (OOP) application. A simple Blackjack\
    \ card game is developed."
  raw: '### Another Example of Implementing an ADT


    We look at another example with more complexity to illustrate how Go implements
    abstract data types without the use of classes.


    Consider the ADT **Employee**.


    | Attributes |

    | LastName string |

    | FirstName string |

    | Role string |

    | Salary float64 |

    | Methods |

    | Get LastName (read-only) |

    | Get FirstName (read-only) |

    | Set/Get Role |

    | Set/Get Salary |

    | String() string – Represents the instance as a string |


    We have specified **LastName** and **FirstName** as read-only. Once their values
    have been assigned, they cannot be changed.


    Also consider the ADT **PartTimeEmployee** that is an **Employee** with an additional
    feature.


    | Attributes |

    | Employee |

    | HourlyWage float64 |

    | Methods |

    | Set/Get HourlyWage |

    | String() string – Represents the instance as a string |


    We deploy the struct and interface definitions shown in the following to establish
    the ADT:


    ```

    type employee struct {

    lastName string

    firstName string

    role string

    salary float64

    }

    type Employee interface {

    SetLastName(lName string)

    SetFirstName(fName string)

    SetRole(r string)

    GetRole() string

    SetSalary(s float64)

    GetSalary() float64

    String() string

    }

    type partTimeEmployee struct {

    employee

    hourlyWage float64

    }

    type PartTimeEmployee interface {

    Employee

    SetHourlyWage(hourly float64)

    GetHourlyWage() float64

    }

    ```


    ### Using Composition


    Each of the struct types, ***employee*** and ***partTimeEmployee***, is accompanied
    by interface types. These define the operations required on their respective struct
    types to implicitly make the struct types implement the interfaces given.


    We use embedding when we define the first field of ***partTimeEmployee*** to be
    ***employee***.


    In software design, this is called **composition**. The abstraction for a part
    time employee is composed of an employee and an hourly wage.


    The ***PartTimeEmployee*** interface also uses embedding by including the interface
    ***Employee*** first. This requires that all the methods of ***Employee*** be
    implemented along with the two new methods, Set/Get hourly wage.


    Listing [3-4](#527841_1_En_3_Chapter.xhtml#PC10) fleshes out the ADTs defined
    previously and presents a short main driver program.


    ```

    package main

    import (

    "fmt"

    )

    type employee struct {

    lastName string

    firstName string

    role string

    salary float64

    }

    type Employee interface {

    SetLastName(lName string)

    SetFirstName(fName string)

    SetRole(r string)

    GetRole() string

    SetSalary(s float64)

    GetSalary() float64

    String() string

    }

    type partTimeEmployee struct {

    employee

    hourlyWage float64

    }

    type PartTimeEmployee interface {

    Employee

    SetHourlyWage(hourly float64)

    GetHourlyWage() float64

    }

    // Methods

    func (person *employee) SetSalary(yearly float64) {

    person.salary = yearly

    }

    func (person employee) GetSalary() float64 {

    return person.salary

    }

    func (person *employee) SetFirstName(firstN string) {

    person.firstName= firstN

    }

    func (person employee) GetFirstName() string {

    return person.firstName

    }

    func (person *employee) SetLastName(lastN string) {

    person.lastName = lastN

    }

    func (person *employee) SetRole(r string) {

    person.role = r

    }

    func (person employee) GetRole() string {

    return person.role

    }

    func (person employee) String() string {

    result := "Name: " + person.firstName + " " + person.lastName + "\n"

    result += "Role: " + person.role + "\n"

    result += "Annual salary: $" + fmt.Sprintf("%0.2f", person.salary) + "\n"

    return result

    }

    func (person partTimeEmployee) String() string {

    result := "Name: " + person.firstName + " " + person.lastName + "\n"

    result += "Role: " + person.role + "\n"

    result += "HourlyWage: $" + fmt.Sprintf("%0.2f", person.hourlyWage) + "\n"

    return result

    }

    func (person *partTimeEmployee) SetHourlyWage(amt float64) {

    person.hourlyWage = amt

    }

    func (person partTimeEmployee) GetHourlyWage() float64 {

    return person.hourlyWage

    }

    func main() {

    person := new(employee) // Returns the address of an employee

    person.SetFirstName("Helen")

    person.SetLastName("Rose")

    person.SetRole("Technical Lead")

    person.SetSalary(125_644.0)

    fmt.Println(person.String())

    hourlyWorker := new(partTimeEmployee) // Returns address

    hourlyWorker.SetFirstName("Mark")

    hourlyWorker.SetLastName("Smith")

    hourlyWorker.SetRole("Software Developer")

    hourlyWorker.SetHourlyWage(85.00)

    fmt.Println(hourlyWorker.String())

    }

    /*

    Name: Helen Rose

    Role: Technical Lead

    Annual salary: $125644.00

    Name: Mark Smith

    Role: Software Developer

    HourlyWage: $85.00

    */

    Listing 3-4

    Employee and PartTimeEmployee ADTs in action

    ```


    Variables ***person*** and ***hourlyWorker*** act like objects (instances of a
    class) in traditional object-oriented programming (OOP) languages. Methods are
    invoked on these variables as one would do in traditional OOP languages.


    In the next section, we discuss polymorphism in Go. This is another fundamental
    pillar of object-oriented programming.


    ## 3.3 Polymorphism


    Polymorphism is a basic pillar of object-oriented programming. It allows actions
    to be taken on objects **at runtime**, where the action is based on the **type
    of object** that receives the action.


    In traditional strongly typed object-oriented languages like C#, Java, and Swift,
    if the action is declared on a formal type and the actual type is an instance
    of a descendant class, the runtime system chooses the method belonging to the
    actual type receiving the message.


    This cannot happen in Go since descendant classes (inheritance) do not exist.


    ### Using Interfaces to Achieve Polymorphism


    We can achieve polymorphic behavior using interfaces as the next example in Listing
    [3-5](#527841_1_En_3_Chapter.xhtml#PC11) illustrates.


    ```

    package main

    import (

    "fmt"

    )

    type FixedPriceJob struct {

    description string

    fixedPrice float64

    }

    type HourlyJob struct {

    description string

    hourlyRate float64

    numberHours int

    }

    type JobInterface interface {

    Cost() float64

    GetDescription() string

    }

    // Implicitly defines FixedPriceJob as implementing the JobInterface

    func (job FixedPriceJob) Cost() float64 {

    return job.fixedPrice

    }

    func (job FixedPriceJob) GetDescription() string {

    return job.description

    }

    // Implicitly defines HourlyJob as implementing the JobInterface

    func (hourlyJob HourlyJob) Cost() float64 {

    return hourlyJob.hourlyRate * float64(hourlyJob.numberHours)

    }

    func (hourlyJob HourlyJob) GetDescription() string {

    return hourlyJob.description

    }

    func TotalJobCost(jobs []JobInterface) float64 {

    result := 0.0

    for _, job := range jobs {

    result += job.Cost()

    }

    return result

    }

    func main() {

    job1 := FixedPriceJob{"Stucco House", 34760.0}

    job2 := HourlyJob{"Landscaping", 40.0, 50}

    jobs := []JobInterface{job1, job2}

    totalCost := TotalJobCost(jobs)

    fmt.Printf("Total job cost: $%0.2f", totalCost)

    }

    // Total job cost: $36760.00

    Listing 3-5

    Polymorphism in action

    ```


    Any type that defines methods with the signatures given in ***JobInterface***
    implicitly implements this interface. That is what we do in Listing [3-5](#527841_1_En_3_Chapter.xhtml#PC11).
    We define ***Cost()*** and ***GetDescription()*** methods on both ***FixedPriceJob***
    and ***HourlyJob***.


    In function ***TotalJobCost***, we input a slice of type ***JobInterface***. We
    iterate over the range of input jobs and accumulate the total cost by invoking
    the ***Cost()*** method on each job. The runtime system binds the correct ***Cost()***
    method based on the type of job receiving this method (whether the job is a **FixedPriceJob**
    or **HourlyJob** in this example). That is polymorphism in action.


    In the next section, we present an object-oriented programming (OOP) application.
    A simple Blackjack card game is developed.'
  trans: "\n# 实现抽象数据类型的另一个示例\n\n我们来看一个更复杂的例子，以说明 Go 如何在**不使用类**的情况下实现抽象数据类型（ADT）。\n\
    \n考虑 ADT `Employee`（雇员）。\n\n| 属性 |\n| --- |\n| `LastName`（姓氏）字符串 |\n| `FirstName`（名字）字符串\
    \ |\n| `Role`（职位）字符串 |\n| `Salary`（薪资）浮点数 |\n| 方法 |\n| `Get LastName`（获取姓氏，只读）\
    \ |\n| `Get FirstName`（获取名字，只读） |\n| `Set/Get Role`（设置/获取职位） |\n| `Set/Get Salary`（设置/获取薪资）\
    \ |\n| `String()` 字符串 – 将实例表示为字符串 |\n\n我们指定了`LastName`和`FirstName`为只读属性。一旦它们的值被赋值，就不能被更改。\n\
    \n同时考虑 ADT `PartTimeEmployee`（兼职雇员），它是一个`Employee`，带有一个额外特性。\n\n| 属性 |\n| ---\
    \ |\n| `Employee` |\n| `HourlyWage`（时薪）浮点数 |\n| 方法 |\n| `Set/Get HourlyWage`（设置/获取时薪）\
    \ |\n| `String()` 字符串 – 将实例表示为字符串 |\n\n我们使用下面展示的结构体（struct）和接口（interface）定义来建立该\
    \ ADT：\n\n```go\ntype employee struct {\n    lastName string\n    firstName string\n\
    \    role string\n    salary float64\n}\n\ntype Employee interface {\n    SetLastName(lName\
    \ string)\n    SetFirstName(fName string)\n    SetRole(r string)\n    GetRole()\
    \ string\n    SetSalary(s float64)\n    GetSalary() float64\n    String() string\n\
    }\n\ntype partTimeEmployee struct {\n    employee\n    hourlyWage float64\n}\n\
    \ntype PartTimeEmployee interface {\n    Employee\n    SetHourlyWage(hourly float64)\n\
    \    GetHourlyWage() float64\n}\n```\n\n## 使用组合（Composition）\n\n每个结构体类型`employee`和`partTimeEmployee`都伴随有接口类型。这些接口定义了在其各自结构体类型上所需的操作，从而隐式地使结构体类型实现给定的接口。\n\
    \n我们在定义`partTimeEmployee`的第一个字段为`employee`时使用了嵌入（embedding）。\n\n在软件设计中，这被称为**组合（composition）**。兼职雇员的抽象是由一个雇员和一个时薪组合而成的。\n\
    \n`PartTimeEmployee`接口也使用了嵌入，它首先包含了`Employee`接口。这要求`Employee`的所有方法以及两个新方法（设置/获取时薪）都必须被实现。\n\
    \n清单 3-4 充实了先前定义的 ADT，并展示了一个简短的 main 驱动程序。\n\n```go\npackage main\n\nimport (\n\
