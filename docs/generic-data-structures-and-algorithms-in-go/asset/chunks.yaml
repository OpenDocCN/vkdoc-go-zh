- fmt: '# 18.3 Summary


    我们提出了一种分支定界算法，该算法为 TSP 提供了精确解。问题在于，这是一个计算上难以处理的问题。如果允许其运行足够长的时间，它将找到该问题的精确解。


    使用一个优先队列来保存一系列节点，每个节点包含一个旅程（可能是部分旅程）、一个下界和一个层级。队列中的节点按层级、下界以及（在平局情况下）旅程中城市值的总和进行排序。


    尝试了一个 33 城市的问题。经过两个小时的计算，获得的最佳旅程比已知的最优旅程高出约 6%。这个迄今为止的最佳旅程在 16 小时后保持不变。


    这为接下来的两章奠定了基础，在其中我们将介绍 TSP 的启发式解法。这些启发式解法在几秒钟内执行，并生成精确解或误差很小的解。


    下一章介绍一种启发式算法：模拟退火。


    # 19. 模拟退火法解决 TSP 的启发式解法


    前一章介绍了一种用于生成 TSP 精确解的分支定界算法。像所有已知的精确解法一样，它在计算上是难以处理的。


    本章介绍解决 TSP 的强大启发式解法：模拟退火。


    在下一节中，我们将介绍组合优化问题，并为我们介绍解决 TSP 的启发式算法奠定基础。


    ## 19.1 组合优化


    组合优化问题在计算上是困难的。随着这些问题规模的增大，精确解的计算时间会变得不可行——需要数年或数个世纪的计算时间和无法实现的内存需求。


    其中一个著名且有趣的问题是前一章介绍的“旅行商问题”（TSP）。这个问题很容易陈述和理解。给定 `n` 个城市，以及城市之间的指定距离，找到从给定城市（例如城市
    0）出发，访问其余 `n-1` 个城市，并返回起始城市的最短旅程。换句话说，找到访问城市的顺序，使得总行驶距离最小。


    通常，我们会得到 `n` 个城市的位置，从中我们可以计算它们之间的距离。我们假设在一个全连接图中，城市之间存在双向连接（每个城市与所有其他城市都有连接）。


    正如我们在第 17 章中看到的，枚举所有可能的旅程组合并选择总行驶距离最小的旅程的暴力解法，其复杂度为 `(n – 1)!`。例如，对于标记为 1、2、3
    和 4 的四个城市，从城市 1 出发并返回的可能的旅程是：


    ```

    1 -> 2 -> 3 -> 4

    1 -> 2 -> 4 -> 3

    1 -> 3 -> 2 -> 4

    1 -> 3 -> 4 -> 2

    1 -> 4 -> 2 -> 3

    1 -> 4 -> 3 -> 2

    ```


    正如预测的那样，共有 `(4 – 1)!` 或 `3! = 6` 种可能的旅程。


    对于一个 29 城市的问题，可能的旅程数量是 `28! = 3.0488834e+29`。如果我们能以每秒 1000 万次旅程的速度评估这些旅程，完成这个计算大约需要
    317,000,000,000,000 年。


    因此，即使对于像 29 城市这样规模不大的问题，获得 TSP 的精确解在计算上也是难以处理的。


    ### 启发式解法


    由于 TSP 有许多重要的“现实世界”应用（例如，印刷电路板、交通运输），研究人员已经设计了许多解决 TSP 的启发式算法。启发式解法是一种不保证最优但在计算上可处理（多项式复杂度）并且有望产生接近最优解的解法。通常，启发式算法能够生成问题的最优解。


    解决 TSP 的这两类近似解法的两大框架是：


    1.  模拟退火

    2.  遗传编程


    上述两大框架之所以如此有趣，是因为它们各自源自与 TSP 并不直接相关的过程和系统。它们可以部署在广泛的组合优化问题上。还有其他用于获得 TSP 启发式解法的框架。


    这些启发式框架中的第一个利用了热力学模型，第二个利用了遗传学和适者生存模型。


    在下一节中，我们将研究这些启发式框架中的第一个：模拟退火。


    ## 19.2 模拟退火


    导致这一用于解决组合优化问题框架的开创性工作于 1953 年由 [Nicholas Constantine Metropolis] 发表。后来，他和同事 W.
    K. Hastings 发表了构成模拟退火基础的 Metropolis-Hastings 算法。


    模拟退火是一种蒙特卡洛算法。这类算法依赖于对系统的重复统计抽样。在计算系统感兴趣属性的同时，生成系统的许多随机配置，并根据实验结果改进抽样。


    模拟退火依赖于模仿金属分子晶格结构在加热并缓慢冷却以产生刚性强晶格结构时的热力学特性。冶金学家称此过程为“退火”。其目的是通过创建具有最小内能的晶格结构，来最小化钢制承重梁中的微观变形。在退火过程（梁的缓慢冷却）中，此类梁的平均能量由玻尔兹曼因子
    `e`^(-`E`/`kT`) 给出，其中 `E` 是梁的平均能量，`T` 是温度，`k` 是玻尔兹曼常数。


    金属梁物理退火过程中极其重要的一部分是缓慢降低温度。这增加了梁内部晶格结构能量最小且强度最大的概率。


    ### 模拟退火步骤


    模拟退火算法的概要如下：


    1.  选择一个初始旅程并计算其成本。

    2.  为人工温度变量选择一个较高的初始温度 `T`。

    3.  通过对现有旅程进行更改来修改旅程（例如，修改旅程中两个城市的顺序，或稍后出现的其他修改方式）。

    4.  如果新旅程成本小于旧旅程成本，则接受这个新旅程（下坡移动）。

    5.  如果新旅程成本高于旧旅程成本，则以玻尔兹曼因子 `e`^(-`E`/`kT`) 给出的概率接受这个上坡移动。

    6.  在高温下，接受这种“上坡移动”的概率接近于 1。这使得模拟能够探索解空间中的许多区域，而不会陷入旅程成本与温度空间中的局部谷底。

    7.  根据冷却曲线降低温度。该冷却曲线可以通过观察旅程成本随温度下降的速率来凭经验获得，并在该下降速率高时减缓温度的降低。

    8.  重复步骤 3 到 7。

    9.  随着温度降低，接受上坡移动的概率减小。这允许算法下降，希望达到接近全局最小值的能量最低状态（最低旅程成本）。


    这个算法的特别之处在于，随着温度变量缓慢降低，它会从统计上演化出越来越好、越来越好的旅程。这是基于冶金退火物理学对解空间进行的一次有引导的随机游走。


    该算法相对容易实现，并且正如我们将要展示的那样，它能生成高质量的解，要么是最优解，要么接近最优解。'
  raw: '## 18.3 Summary


    We presented a branch-and-bound algorithm that provides an exact solution to the
    TSP. The problem is that this is a computationally intractable problem. If allowed
    to run long enough, it will find an exact solution to the problem.


    A priority queue is used to hold a sequence of nodes, where each node contains
    a tour (may be a partial tour), a lower bound, and a level. The nodes are sorted
    in the queue by level, lower bound, and, in the case of a tie, sum of city values
    in the tour.


    A 33-city problem is attempted. After two hours of computation, the best tour
    obtained is about 6 percent higher than the known optimum tour. This best tour
    so far remains the same after 16 hours.


    This sets the stage for the next two chapters in which we present heuristic solutions
    to the TSP. These heuristic solutions execute in a matter of seconds and produce
    solutions that are either exact or have small error.


    The next chapter presents a heuristic algorithm, simulated annealing.


    # 19. Simulated Annealing Heuristic Solution to TSP


    The previous chapter presented a branch-and-bound algorithm for producing an exact
    solution to TSP. Like all known exact solutions, it is computationally intractable.


    This chapter presents the powerful simulated annealing heuristic solution to the
    TSP.


    In the next section, we introduce combinatorial optimization problems and set
    the stage for our presentation of heuristic algorithms for solving TSP.


    ## 19.1 Combinatorial Optimization


    Combinatorial optimization problems are computationally hard. As the size of these
    problems increases, the computation time for an exact solution becomes infeasible
    `–` years or centuries of computation time and memory requirements that are not
    realizable.


    One such famous and interesting problem is the ***Travelling Salesperson Problem***
    (TSP), introduced in the previous chapter. The problem is easy to state and understand.
    Given n cities, with specified distances between the cities, find the shortest
    tour that starts at a given city, say, city 0; visits the remaining n – 1 cities;
    and returns to the starting city. In other words, find the sequence of cities
    visited so that the total distance travelled is minimum.


    Often, we are given the location of the n cities from which we can compute distances
    between them. We shall assume bidirectional links between cities in a fully connected
    graph (every city has a link to every other city).


    As we saw in Chapter [17](#527841_1_En_17_Chapter.xhtml), a brute-force solution
    that enumerates all possible combinations of tours and chooses the tour of lowest
    distance travelled is of complexity (n – 1)! For example, for four cities labelled
    1,2 3, and 4, the possible tours starting and returning to city 1 are


    1 -> 2 -> 3 -> 4


    1 -> 2 -> 4 -> 3


    1 -> 3 -> 2 -> 4


    1 -> 3 -> 4 -> 2


    1 -> 4 -> 2 -> 3


    1 -> 4 -> 3 -> 2


    As predicted, there are (4 – 1)! or 3! = 6 possible tours.


    For a 29-city problem, the number of possible tours is 28! = 3.0488834e+29\. If
    we could evaluate the tours at a rate of 10 million tours per second, it would
    take about 317,000,000,000,000 years to complete this computation.


    So getting an exact solution to TSP is computationally intractable for problems
    even of modest size such as a 29-city problem.


    ### Heuristic Solutions


    Since there are many important “real-world” applications of TSP (e.g., printed
    circuit boards, transportation), researchers have devised many heuristic solutions
    to TSP. A heuristic solution is one that is not guaranteed to be optimum but is
    computationally tractable (polynomial complexity) and hopefully produces a solution
    near optimal. Often. a heuristic algorithm will produce the optimum solution to
    the problem.


    Two major frameworks for such approximate solutions to the TSP are


    1.  Simulated annealing


    2.  Genetic programming


    What makes the two major frameworks given previously so interesting is that they
    are each taken from processes and systems unrelated to TSP specifically. They
    can be deployed on a wide range of combinatorial optimizations problems. There
    are other such frameworks that are used to obtain heuristic solutions to TSP.


    The first of these heuristic frameworks utilizes models from thermodynamics and
    the second from genetics and survival of the fittest.


    In the next section, we examine the first of these heuristic frameworks, simulated
    annealing.


    ## 19.2 Simulated Annealing


    The seminal work that has led to this framework for solving combinatorial optimization
    problems was published in 1953 by [Nicholas Constantine Metropolis.​ Later, he
    and a colleague, W.​K.​ Hastings, published the Metropolis-Hastings algorithm,
    which forms the basis of simulated annealing.​](https://en.wikipedia.org/wiki/Nicholas_Metropolis)


    Simulated annealing is a Monte Carlo algorithm. Such algorithms rely on repeated
    statistical sampling of a system. Many random configurations of the system are
    generated while computing properties of interest and refining the sampling based
    on experimental results.


    Simulated annealing relies on mimicking the thermodynamic properties of the molecular
    lattice structure of metal as it is heated and slowly cooled to produce a rigid
    and strong lattice structure. This process when done by metallurgists is called
    “annealing.” It is done to minimize microscopic deformities in steel load-bearing
    beams by creating a lattice structure of minimum internal energy. The average
    energy in such beams during the annealing process (slow cooling of the beam) is
    given by the Boltzmann factor, **e**^(**-E/kT**), where E is the average energy
    of the beam, T is the temperature, and k is the Boltzmann constant.


    A critically important part of the physical annealing process of metallic beams
    is to lower the temperature slowly. This increases the probability that the internal
    lattice structure of the beam has minimum energy and is strongest.


    ### Simulated Annealing Steps


    An outline of the simulated-annealing algorithm is the following:


    1.  Choose an initial tour and find its cost.


    2.  Choose a high initial temperature T for an artificial temperature variable.


    3.  Modify the tour by making a change to the existing tour (e.g., modifying the
    order of two cities in the tour or other modifications to be seen shortly).


    4.  If the new tour cost is smaller than the old tour cost, accept this new tour
    (downhill move).


    5.  If the new tour cost is higher than the old tour cost, accept this uphill
    move with probability given by the Boltzmann factor, **e**^(**-E/kT**).


    6.  At high temperature, the probability of accepting such an “uphill move” is
    close to 1\. This allows the simulation to explore many regions in the solution
    space and not be driven into a local valley in the tour-cost vs. temperature space.


    7.  Lower the temperature based on a cooling curve. This cooling curve can be
    obtained empirically by observing the rate of decline in tour cost as a function
    of temperature and slowing down the reduction in temperature when this rate of
    decline is high.


    8.  Repeat steps 3 to 7.


    9.  As the temperature gets lower, the probability of accepting uphill moves decreases.
    This allows a descent hopefully to a lowest energy state (lowest tour cost) close
    to the global minimum.


    What is so special about this algorithm is that it evolves statistically to better
    and better tours as the temperature variable is slowly lowered. It is a guided
    random walk of the solution space based on the physics of metallurgy annealing.


    It is relatively easy to implement and, as we will demonstrate, produces high-quality
    solutions, either optimum or close to optimum.'
  trans: '

    # 18.3 总结


    我们提出了一种分支定界算法，该算法为 TSP 提供了精确解。问题在于，这是一个计算上难以处理的问题。如果允许其运行足够长的时间，它将找到该问题的精确解。


    使用一个优先队列来保存一系列节点，每个节点包含一个旅程（可能是部分旅程）、一个下界和一个层级。队列中的节点按层级、下界以及（在平局情况下）旅程中城市值的总和进行排序。


    尝试了一个 33 城市的问题。经过两个小时的计算，获得的最佳旅程比已知的最优旅程高出约 6%。这个迄今为止的最佳旅程在 16 小时后保持不变。


    这为接下来的两章奠定了基础，在其中我们将介绍 TSP 的启发式解法。这些启发式解法在几秒钟内执行，并生成精确解或误差很小的解。


    下一章介绍一种启发式算法：模拟退火。


    # 19. 模拟退火：一种解决 TSP 的启发式解法


    前一章介绍了一种用于生成 TSP 精确解的分支定界算法。像所有已知的精确解法一样，它在计算上是难以处理的。


    本章介绍解决 TSP 的强大启发式解法：模拟退火。


    在下一节中，我们将介绍组合优化问题，并为我们介绍解决 TSP 的启发式算法奠定基础。


    ## 19.1 组合优化


    组合优化问题在计算上是困难的。随着这些问题规模的增大，精确解的计算时间会变得不可行——需要数年或数个世纪的计算时间和无法实现的内存需求。


    其中一个著名且有趣的问题是前一章介绍的“旅行商问题”（TSP）。这个问题很容易陈述和理解。给定 `n` 个城市，以及城市之间的指定距离，找到从给定城市（例如城市
    0）出发，访问其余 `n-1` 个城市，并返回起始城市的最短旅程。换句话说，找到访问城市的顺序，使得总行驶距离最小。


    通常，我们会得到 `n` 个城市的位置，从中我们可以计算它们之间的距离。我们假设在一个全连接图中，城市之间存在双向连接（每个城市与所有其他城市都有连接）。


    正如我们在第 17 章中看到的，枚举所有可能的旅程组合并选择总行驶距离最小的旅程的暴力解法，其复杂度为 `(n – 1)!`。例如，对于标记为 1、2、3
    和 4 的四个城市，从城市 1 出发并返回的可能的旅程是：


    ```

    1 -> 2 -> 3 -> 4

    1 -> 2 -> 4 -> 3

    1 -> 3 -> 2 -> 4

    1 -> 3 -> 4 -> 2

    1 -> 4 -> 2 -> 3

    1 -> 4 -> 3 -> 2

    ```


    正如预测的那样，共有 `(4 – 1)!` 或 `3! = 6` 种可能的旅程。


    对于一个 29 城市的问题，可能的旅程数量是 `28! = 3.0488834e+29`。如果我们能以每秒 1000 万次旅程的速度评估这些旅程，完成这个计算大约需要
    317,000,000,000,000 年。


    因此，即使对于像 29 城市这样规模不大的问题，获得 TSP 的精确解在计算上也是难以处理的。


    ### 启发式解法


    由于 TSP 有许多重要的“现实世界”应用（例如，印刷电路板、交通运输），研究人员已经设计了许多解决 TSP 的启发式算法。启发式解法是一种不保证最优但在计算上可处理（多项式复杂度）并且有望产生接近最优解的解法。通常，启发式算法能够生成问题的最优解。


    解决 TSP 的这两类近似解法的两大框架是：


    1.  模拟退火

    2.  遗传编程


    上述两大框架之所以如此有趣，是因为它们各自源自与 TSP 并不直接相关的过程和系统。它们可以部署在广泛的组合优化问题上。还有其他用于获得 TSP 启发式解法的框架。


    这些启发式框架中的第一个利用了热力学模型，第二个利用了遗传学和适者生存模型。


    在下一节中，我们将研究这些启发式框架中的第一个：模拟退火。


    ## 19.2 模拟退火


    导致这一用于解决组合优化问题框架的开创性工作于 1953 年由 [Nicholas Constantine Metropolis] 发表。后来，他和同事 W.
    K. Hastings 发表了构成模拟退火基础的 Metropolis-Hastings 算法。


    模拟退火是一种蒙特卡洛算法。这类算法依赖于对系统的重复统计抽样。在计算系统感兴趣属性的同时，生成系统的许多随机配置，并根据实验结果改进抽样。


    模拟退火依赖于模仿金属分子晶格结构在加热并缓慢冷却以产生刚性强晶格结构时的热力学特性。冶金学家称此过程为“退火”。其目的是通过创建具有最小内能的晶格结构，来最小化钢制承重梁中的微观变形。在退火过程（梁的缓慢冷却）中，此类梁的平均能量由玻尔兹曼因子
    `e`^(-`E`/`kT`) 给出，其中 `E` 是梁的平均能量，`T` 是温度，`k` 是玻尔兹曼常数。


    金属梁物理退火过程中极其重要的一部分是缓慢降低温度。这增加了梁内部晶格结构能量最小且强度最大的概率。


    ### 模拟退火步骤


    模拟退火算法的概要如下：


    1.  选择一个初始旅程并计算其成本。

    2.  为人工温度变量选择一个较高的初始温度 `T`。

    3.  通过对现有旅程进行更改来修改旅程（例如，修改旅程中两个城市的顺序，或稍后出现的其他修改方式）。

    4.  如果新旅程成本小于旧旅程成本，则接受这个新旅程（下坡移动）。

    5.  如果新旅程成本高于旧旅程成本，则以玻尔兹曼因子 `e`^(-`E`/`kT`) 给出的概率接受这个上坡移动。

    6.  在高温下，接受这种“上坡移动”的概率接近于 1。这使得模拟能够探索解空间中的许多区域，而不会陷入旅程成本与温度空间中的局部谷底。

    7.  根据冷却曲线降低温度。该冷却曲线可以通过观察旅程成本随温度下降的速率来凭经验获得，并在该下降速率高时减缓温度的降低。

    8.  重复步骤 3 到 7。

    9.  随着温度降低，接受上坡移动的概率减小。这允许算法下降，希望达到接近全局最小值的能量最低状态（最低旅程成本）。


    这个算法的特别之处在于，随着温度变量缓慢降低，它会从统计上演化出越来越好、越来越好的旅程。这是基于冶金退火物理学对解空间进行的一次有引导的随机游走。


    该算法相对容易实现，并且正如我们将要展示的那样，它能生成高质量的解，要么是最优解，要么接近最优解。

