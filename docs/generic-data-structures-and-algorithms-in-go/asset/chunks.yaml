    \ tuple defined as:\n\n```go\ntype tuple struct {\n    node   rune\n    weight\
    \ int\n}\ntype edges = map[rune]int\n```\n\nA `Graph` is defined as:\n\n```go\n\
    type Graph map[rune]edges\n```\n\nIn a graph, each node, with key of type `rune`,\
    \ such as “A”, is mapped to another map, `edges`, from `rune` to `int`. This layering\
    \ of abstractions is needed to represent a structure as complicated as a graph.\n\
    \nA priority queue plays a central role in implementing a solution to the problem.\
    \ Here, we implement `PriorityQueue` with generic type `T` by importing package\
    \ `\"github.com/jiaxwu/container/heap\"`.\n\nWe define a `Less` function that\
    \ compares the `int` field of the tuples to order them from smallest to largest.\n\
    \nWe initialize the queue using:\n\n```go\nheapQueue := New[tuple](Less)\n```\n\
    \nHere, we see another example whereby having a generic structure, `PriorityQueue`,\
    \ makes it easy to create an instance with base-type `tuple`, useful in this application.\n\
    \nWe define a slice, `distances`, as containing tuples of node (type `rune`) and\
    \ an `int` that represents the best distance so far. We initialize `distances`\
    \ to have very large initial value.\n\nWe set `distances[0]` to `tuple{'A', 0}`.\n\
    \nWe push this tuple onto the heap queue. This heap queue is set up to ensure\
    \ that the tuple with the smallest distance is at the head of the line, the first\
    \ tuple that can be removed.\n\nIn a loop that terminates when the queue becomes\
    \ empty, we remove the head of the queue and assign current distance to its `weight`\
    \ field. If this value is greater than the second field of the tuple removed from\
