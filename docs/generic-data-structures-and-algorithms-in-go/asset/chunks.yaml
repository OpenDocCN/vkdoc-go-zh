    5, whereas the depth of the right subtree is 8.


    The second binary search tree, with base type ***Number***, is constructed by
    inserting 100,000 integers in sequential order. Essentially, this is a linked
    list. It took 35.6 seconds to build this completely unbalanced search tree.


