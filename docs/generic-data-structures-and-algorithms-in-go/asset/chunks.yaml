  raw: '### Using the Standard map Data Structure


    We will take a different approach. As we scan an entire file of words, we construct
    a **map** with **key-value** pairs as follows:


    **key:** Alphabetized word (all the letters of the given word rearranged from
    smallest letter to largest letter). For example, alphabetized(“camp”) = “acmp”,
    alphabetized(“balloon”) = “abllnoo”


    **value:** A collection of dictionary words that can be reduced to the same alphabetized
    word


    As we process each word in a **words.txt** file, we compute the key by alphabetizing
    the word and then check to see whether the key is already present in our map.
    If it is, we add the word we are processing to the value collection associated
    with this key. If not, we create a new collection and add the <alphabetized(word),
    new collection> key-value pair to our map.


    When the map is done, we find the permutations of a specified word by computing
    its key and then getting the collection associated with this key from our map.


    We start by defining a global variable ***dictionary***.


    ```

    var dictionary map[string][]string

    ```


    Next, we define a function, ***alphabetize***.


    ```

    func alphabetize(word string) string {

    s := strings.Split(word, "")

    sort.Strings(s)

    return strings.Join(s, "")

    }

    ```


    The first line creates an array of characters. The next line sorts this array
    in place. The third line joins the sorted array forming the resulting string.


    The function, ***buildDictionary***, creates a map with each key representing
    a sorted alphabetized word and each value being a slice of words that alphabetize
    to the key.


    This function is shown next.


    ```

    func buildDictionary() {

    dictionary = make(map[string][]string)

    file, err := os.Open("words.txt")

    if err != nil {

    log.Fatalf("failed opening file: %s", err)

    }

    scanner := bufio.NewScanner(file)

    scanner.Split(bufio.ScanLines)

    var txtwords []string

    for scanner.Scan() {

    txtwords = append(txtwords, scanner.Text())

    }

    file.Close()

    for _, word := range txtwords {

    alphabetized := alphabetize(word)

    var lst []string

    if len(dictionary) > 0 && len(dictionary[alphabetized]) > 0 {

    lst = dictionary[alphabetized]

    } else {

    lst = []string{}

    }

    lst = append(lst, word)

    dictionary[alphabetized] = lst

    }

    }

    ```


    The file handling portion of ***buildDictionary*** is the most complex.


    ```

    file, err := os.Open("words.txt")

    if err != nil {

    log.Fatalf("failed opening file: %s", err)

    }

    scanner := bufio.NewScanner(file)

    scanner.Split(bufio.ScanLines)

    var txtwords []string

    for scanner.Scan() {

    txtwords = append(txtwords, scanner.Text())

    }

    file.Close()

    ```


    Using the imported package, ***os***, a text file of words is opened. A ***scanner***
    is defined by using ***NewScanner*** on the ***bufio*** package that is imported.
    Using ***scanner.Scan()***, the slice of words contained in the **words.txt**
    file is generated.


    Each word in this slice is alphabetized and either added to the existing map for
    that key or a new key is created and the first value in the slice of words associated
    with the key is inserted.


    Listing [3-7](#527841_1_En_3_Chapter.xhtml#PC20) presents the full source code
    for this application.


    ```

    package main

    import (

    "fmt"

    "sort"

    "strings"

    "bufio"

    "log"

    "os"

    )

    func init() {

    buildDictionary()

    }

    var dictionary map[string][]string

    func alphabetize(word string) string {

    s := strings.Split(word, "")

    sort.Strings(s)

    return strings.Join(s, "")

    }

    func buildDictionary() {

    dictionary = make(map[string][]string)

    file, err := os.Open("words.txt")

    if err != nil {

    log.Fatalf("failed opening file: %s", err)

    }

    scanner := bufio.NewScanner(file)

    scanner.Split(bufio.ScanLines)

    var txtwords []string

    for scanner.Scan() {

    txtwords = append(txtwords, scanner.Text())

    }

    file.Close()

    for _, word := range txtwords {

    alphabetized := alphabetize(word)

    var lst []string

    if len(dictionary) > 0 && len(dictionary[alphabetized]) > 0 {

    lst = dictionary[alphabetized]

    } else {

    lst = []string{}

    }

    lst = append(lst, word)

    dictionary[alphabetized] = lst

    }

    }

    func output(word string) {

    wd := alphabetize(word)

    fmt.Printf("Permutation group of %s is %s", word, dictionary[wd])

    }

    func main() {

    output("parties")

    }

    // Permutation group of parties is [parties pastier piaster piastre pirates //
    raspite spirate tapiser traipse]

    Listing 3-7

    Permutation Group of Words

    ```


    ## 3.6 Summary


    We focused on the implementation of abstract data types in this chapter. Two approaches
    were shown to accomplish this. The first uses an interface to define the required
    operations given by the ADT. The second uses a package to expose the public features
    required by the ADT while hiding internal features. We introduced the important
    concept of polymorphism. This allows the runtime system to determine which particular
    method to bind to an object receiving the method assuming that the object is of
    a type implementing the interface. We presented several examples of object-oriented
    programming.


    In the next chapter, we present a larger example of object-oriented programming
    by showing an implementation of the Game of Life. We utilize a third-party graphical
    user interface (GUI) package.


    # 4. ADT in Action: Game of Life


    In the previous chapter, we showed how abstract data types can be implemented
    and how object-oriented programming can be performed in Go. In this chapter, we
    continue to explore object-oriented programming in Go. We implement the classic
    Game of Life. We introduce and utilize a third-party GUI package as part of our
    implementation.


    In the next section, we specify the Game of Life.


    ## 4.1 Game


    To illustrate the central role that ADTs can play in software design, we explore
    the Game of Life, invented by John Conway and published in 1970 by *Scientific
    American*. This game is a cellular automaton and interesting to design, implement,
    and observe.


    In addition to showcasing the central role of an ADT in the design of this game,
    we introduce the **fyne** graphical user interface (GUI) framework in Go.


    We start with an empty grid with R rows and C columns. Clusters of live cells
    are created at random locations. Then the internal rules of grid evolution take
    over, and the user can observe each successive grid evolution at one-second intervals.'
