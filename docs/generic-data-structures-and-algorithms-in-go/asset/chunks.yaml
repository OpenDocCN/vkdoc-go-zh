  raw: '### Determining Whether a Slice of Numbers Is Sorted


    One approach to solving this problem is to use the **Sort** function in package
    **sort** and then compare the resultant array slice with the array slice we wish
    to test. This is an approach that I have seen many less experienced programmers
    take.


    A function that performs this is given as follows:


    ```

    func isSorted1(data []float64) bool {

    var data1 []float64

    data1 = make([]float64, len(data)) // Creates a slice of len(data)

    copy(data1, data) // Copies data into data1

    sort.Float64s(data1)

    // Compare data and data1

    for i := 0; i < size; i++ {

    if data[i] != data1[i] {

    return false

    }

    }

    return true

    }

    ```


    We allocate storage for the ***data1*** slice and copy the input ***data*** into
    ***data1***. We sort ***data1*** using ***sort.Float64s(data1)***. Finally, we
    compare each element of ***data1*** with ***data*** and return false if there
    is a mismatch.


    It is known that the asymptotic complexity of the **Sort** algorithm is **O(nlog**[**2**]**n)**.


    Now consider as an alternative approach function ***isSorted2***, given as follows:


    ```

    func isSorted2(data []float64) bool {

    for i := 1; i < len(data); i++ {

    if data[i] < data[i - 1] {

    return false

    }

    }

    return true

    }

    ```


    This function compares all consecutive pairs of ***data***. If an instance of
    **data[i]** is less than **data[i – 1]**, the function immediately returns false.
    If no returns of false occur, the function returns true.


    This function has an asymptotic complexity of **O(n)**. For large n, ***isSorted2***
    should be much faster than ***isSorted1***.


    Listing [2-1](#527841_1_En_2_Chapter.xhtml#PC3) does a benchmark comparison between
    the two **isSorted** functions.


    ```

    package main

    import (

    "fmt"

    "math/rand"

    "time"

    "sort"

    )

    const size = 100_000_000

    var data []float64

    func isSorted1(data []float64) bool {

    var data1 []float64

    data1 = make([]float64, len(data))

    copy(data1, data) // Copies data into data1

    sort.Float64s(data1)

    // Compare data and data1

    for i := 0; i < size; i++ {

    if data[i] != data1[i] {

    return false

    }

    }

    return true

    }

    func isSorted2(data []float64) bool {

    for i := 1; i < len(data); i++ {

    if data[i] < data[i - 1] {

    return false

    }

    }

    return true

    }

    func main() {

    data = make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = 100.0 * rand.Float64()

    }

    start := time.Now()

    result := isSorted1(data)

    elapsed := time.Since(start)

    fmt.Println("Sorted: ", result)

    fmt.Println("elapsed  using sorted1:", elapsed)

    data2 := make([]float64, size)

    for i := 0; i < size; i++ {

    data2[i] = float64(2 * i)

    }

    start = time.Now()

    result = isSorted1(data2)

    elapsed = time.Since(start)

    fmt.Println("Sorted: ", result)

    fmt.Println("elapsed using sorted1:", elapsed)

    start = time.Now()

    result = isSorted2(data)

    elapsed = time.Since(start)

    fmt.Println("\nSorted: ", result)

    fmt.Println("elapsed using sorted2", elapsed)

    start = time.Now()

    result = isSorted2(data2)

    elapsed = time.Since(start)

    fmt.Println("Sorted: ", result)

    fmt.Println("elapsed using sorted2:", elapsed)

    }

    /* Output

    Sorted:  false

    elapsed  using sorted1: 20.554518978s

    Sorted:  true

    elapsed using sorted1: 7.328819941s

    Sorted:  false

    elapsed using sorted2 291ns

    Sorted:  true

    elapsed using sorted2: 76.644396ms

    */

    Listing 2-1

    Comparing two isSorted functions

    ```


    Each function is invoked with an array, ***data1***, of random **float64** values.
    Next, each function is invoked with an array that is already sorted, ***data2***.


    As evident in the output, ***isSorted2*** is over 100 times faster than ***isSorted1***,
    confirming the analysis with big O.


    ### Using Concurrency


    Can we do better by using concurrency? Consider function ***isSorted3*** as follows:


    ```

    func isSegmentSorted(data []float64, a, b int, ch chan<- bool) {

    // Generates boolean value put into ch

    for i := a + 1; i < b; i++ {

    if data[i] < data[i - 1] {

    ch <- false

    }

    }

    ch <- true

    }

    func isSorted3(data []float64) bool {

    ch := make(chan bool)

    numSegments := runtime.NumCPU()

    segmentSize := int(float64(len(data)) / float64(numSegments))

    // Launch numSegments goroutines

    for index := 0; index < numSegments; index++ {

    go isSegmentSorted(data, index * segmentSize,

    index * segmentSize + segmentSize, ch)

    }

    num := 0 // completed goroutines

    for {

    select {

    case value := <- ch:  // Blocks until a goroutine puts a bool into the

    // channel

    if value == false {

    return false

    }

    num += 1

    if num == numSegments { // All goroutiines have completed

    return true

    }

    }

    }

    return true

    }

    ```


    In function ***isSorted3***, we subdivide the data into ***numberSegments*** given
    by the number of CPUs on the computer. In a for-loop, we launch ***numSegments***
    goroutines, passing the starting and ending indices, ***a*** and ***b***, along
    with a channel variable, ***ch***, of type **bool**.


    Each goroutine uses the same logic as in function ***isSorted2*** over a much
    smaller interval and concurrent with the other goroutines. Each goroutine assigns
    its result to the channel variable ***ch***.


    In a for-loop in function ***isSorted3***, a **select** statement reads a Boolean
    value from the channel ***ch*** and blocks program execution until another goroutine
    has completed its work. If a value of **false** is received, ***isSorted3*** immediately
    returns **false**. If not, the value of ***num***, which counts the goroutines
    that have completed their work, is incremented by one. If ***num*** reaches ***numberSegments***,
    ***isSorted3*** returns true since all segments have reported true.


    In Listing [2-2](#527841_1_En_2_Chapter.xhtml#PC5), we extend the benchmark test
    to include the concurrent ***isSorted3***.


    ```

    package main

    import (

    "fmt"

    "math/rand"

    "time"

    "sort"

    "runtime"

    )

    const size = 1_000_000_000

    var data []float64

    // Snip

    func isSorted3(data []float64) bool {

    ch := make(chan bool)

    numSegments := runtime.NumCPU()

    segmentSize := int(float64(len(data)) / float64(numSegments))

    // Launch numSegments goroutines

    for index := 0; index < numSegments; index++ {

    go isSegmentSorted(data, index * segmentSize,

    index * segmentSize + segmentSize, ch)

    }

    num := 0 // Completed goroutines

    for {

    select {

    case value := <- ch:

    if value == false {

    return false

    }

    num += 1

    if num == numSegments { // All goroutiines have completed

    return true

    }

    }

    }

    return true

    }

    func main() {

    data = make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = 100.0 * rand.Float64()

    }

    data2 := make([]float64, size)

    // Create a sorted sequence of numbers

    for i := 0; i < size; i++ {

    data2[i] = float64(2 * i)

    }

    start := time.Now()

    result := isSorted2(data)

    elapsed := time.Since(start)

    fmt.Println("\nSorted: ", result)

    fmt.Println("elapsed using sorted2", elapsed)

    start = time.Now()

    result = isSorted2(data2)

    elapsed = time.Since(start)

    fmt.Println("Sorted: ", result)

    fmt.Println("elapsed using sorted2:", elapsed)

    start = time.Now()

    result = isSorted3(data)

    elapsed = time.Since(start)

    fmt.Println("\nSorted: ", result)

    fmt.Println("elapsed using concurrent sorted3", elapsed)

    start = time.Now()

    result = isSorted3(data2)

    elapsed = time.Since(start)

    fmt.Println("Sorted: ", result)

    fmt.Println("elapsed using concurrent sorted3:", elapsed)

    }

    /* Output

    Sorted:  false

    elapsed using sorted2 594ns

    Sorted:  true

    elapsed using sorted2: 845.586082ms

    Sorted:  false

    elapsed using concurrent sorted3 61.863μs

    Sorted:  true

    elapsed using concurrent sorted3: 132.375156ms

    */

    Listing 2-2

    Concurrent implementation and timing of isSorted

    ```


    The size of the array to test for ***isSorted*** has been increased to a billion
    floating-point numbers.


    The results are dramatic. The concurrent ***isSorted*** solution is over six times
    faster than the noncurrent solution. Both solutions are of **O(n)**. Improving
    performance by a constant factor does not change the big O complexity of the algorithm.


    In the next section, we present several classic sorting algorithms and their complexity.'
