- fmt: "### ADT `Counter`\n\nThe ADT `Counter` must restrict the operations that can\
    \ be performed on an instance of `Counter`. Specifically, we cannot assign an\
    \ arbitrary value to a counter. We cannot change the value of a counter by more\
    \ than one. Without these restrictions, there would be no value in defining this\
    \ abstract data type. We could use a simple `int` type instead.\n\nListing [3-1](#527841_1_En_3_Chapter.xhtml#PC3)\
    \ shows our first implementation of the `Counter` abstract data type (ADT). As\
    \ we will see shortly, this implementation is faulty. After defining `Counter`\
    \ as a struct with the field `count`, we define a series of methods that operate\
    \ on instances, `c`, of `Counter` or pointer to `Counter`.\n\n```\npackage main\n\
    import (\n\"fmt\"\n)\ntype Counter struct {\ncount int\n}\n// Methods\nfunc (c\
    \ *Counter) Increment() {\nc.count++\n}\nfunc (c *Counter) Decrement() {\nc.count--\n\
    }\nfunc (c *Counter) Reset() {\nc.count = 0\n}\nfunc (c Counter) GetCount() int\
    \ {\nreturn c.count\n}\nfunc main() {\nmyCounter := new(Counter)\n// myCounter.count\
    \ = 100 // Defeats the encapsulatiom of Counter\nfmt.Println(myCounter.GetCount())\n\
    for i := 1; i <= 10; i++ {\nmyCounter.Increment()\n}\nmyCounter.Decrement()\n\
    // myCounter.count -= 6 // Defeats the encapsulation of Counter\nfmt.Println(myCounter.GetCount())\n\
    }\n/*\n\n*/\nListing 3-1\nFirst implementation of Counter ADT\n```\n\nThere is\
    \ a problem with this first implementation. If one were to uncomment the two commented\
    \ lines of code:\n\n```\nmyCounter.count = 100\nmyCounter.count -= 6\n```\n\n\
    the encapsulation that preserves the integrity of the ADT would be broken. The\
    \ whole point of creating and implementing an ADT is to enforce the abstraction.\
    \ In this case, that means not allowing the `count` value to be changed by more\
    \ than one and not allowing the `count` value to be arbitrarily assigned.\n\n\
    We repair the problem and enforce the abstraction, as shown in Listing [3-2](#527841_1_En_3_Chapter.xhtml#PC5).\
    \ We define a `Counter` interface (using an uppercase C) to formally define the\
    \ ADT.\n\n```\n// Creating ADT Counter\npackage main\nimport (\n\"fmt\"\n)\n//\
    \ This type implicitly implements Counter ADT\ntype counter struct {\ncount int\n\
    }\n// Interface serves to expose public features of counter\n// The attribute\
    \ count is private\ntype Counter interface {\nincrement()\ndecrement()\nreset()\n\
    getCount() int\n}\nfunc (c *counter) increment()  {\nc.count += 1\n}\nfunc (c\
    \ *counter) decrement()  {\nif c.count > 0 {\nc.count -= 1\n}\n}\nfunc (c *counter)\
    \ reset() {\nc.count = 0\n}\nfunc (c counter) getCount() int {\nreturn c.count\n\
    }\nfunc main() {\nmyCounter := Counter(&counter{})\n// The only operations that\
    \ can be performed on myCounter\n// are specified in the Counter interface\nmyCounter.increment()\n\
    myCounter.increment()\nmyCounter.reset()\nmyCounter.increment()\nmyCounter.increment()\n\
    myCounter.increment()\nmyCounter.increment()\nmyCounter.decrement()\ncountValue\
    \ := myCounter.getCount()\nfmt.Println(countValue)\n}\n// 3\nListing 3-2\nSecond\
    \ implementation of Counter ADT\n```\n\nThe `Counter` interface specifies the\
    \ signature of the four operations that can be performed on an ADT `Counter`.\n\
    \nThe methods `increment()`, `decrement()`, `reset()`, and `getCount()`, each\
    \ defined on a `counter` type, **implicitly** make `counter` implement the ADT\
    \ `Counter`.\n\nIf we were to comment out the `reset()` method and comment out\
    \ the `myCounter.reset()` in function `main`, we would get the following compiler\
    \ error message:\n\n`./counter2.go:41:26: cannot convert &counter{} (value of\
    \ type *counter) to type Counter:`  \n`counter does not implement Counter (missing\
    \ reset method)`\n\nWithout the `reset()` method defined on `counter`, the type\
    \ `counter` no longer can be considered to be of type `Counter`, and the compiler\
    \ detects this error.\n\nAbstract data types in Go are always **implicitly defined**\
    \ by defining an interface that specifies the operations associated with the ADT\
    \ and then implementing methods on the underlying type that have the exact signatures\
    \ given in the interface specification.\n\nWith this accomplished in Listing [3-2](#527841_1_En_3_Chapter.xhtml#PC5),\
    \ there is no way to violate the ADT encapsulation as was evident in Listing [3-1](#527841_1_En_3_Chapter.xhtml#PC3).\n\
    \n### Creating a counter Package\n\nAnother way to protect `count` and preserve\
    \ the encapsulation of the `counter` abstraction is to create a `counter` package\
    \ and export `Counter` but not `count`.\n\n```\npackage counter\n// Field count\
    \ is encapsulated as private because it is lowercase\ntype Counter struct {\n\
    count int // private field\n}\nfunc (c *Counter) Increment() {\nc.count += 1\n\
    }\nfunc (c *Counter) Decrement() {\nif c.count > 0 {\nc.count -= 1\n}\n}\nfunc\
    \ (c *Counter) Reset() {\nc.count = 0\n}\nfunc (c Counter) GetCount() int {\n\
    return c.count\n}\n```\n\nIn package `counter`, we protect the `count` field of\
    \ `Counter` from being assigned to outside the package by using a lowercase character\
    \ as the first character in `count`.\n\n### Mechanics of Creating a Package\n\n\
    In order to define a package in a subdirectory of your own choosing, we must follow\
    \ a set of steps that are outlined in the following. Here, we desire to include\
    \ the `counter.go` file that defines the `counter` package in a subdirectory `counter`\
    \ in some work directory. A main driver program, `main.go`, is defined in another\
    \ subdirectory, `maincounter`.\n\nThe steps needed to create package `counter`\
    \ are the following:\n\n1.  Create a subdirectory `counter` in your work directory.\n\
    2.  Save the `counter.go` file that contains `package counter` (see the preceding\
    \ text) in this subdirectory.\n3.  Create a subdirectory `maincounter` in your\
    \ work directory.\n4.  Save the `maincounter.go` file in this subdirectory.\n\
    5.  Open a terminal window to the `counter` directory.\n6.  Type the following\
    \ command: `go mod init example.com/counter`\n7.  Type the following command:\
    \ `go mod tidy`\n8.  Open a terminal window to the `maincounter` directory.\n\
    9.  Type the following command: `go mod init example.com/maincounter`\n10. Edit\
    \ the `go.mod` file to be\n\n    ```\n    module example.com/maincounter\n   \
    \ go 1.18\n    replace example.com/counter => ../counter\n    ```\n\n11.  Type\
    \ the following command: `go mod tidy`\n\nListing [3-3](#527841_1_En_3_Chapter.xhtml#PC8)\
    \ shows the third implementation of `Counter` ADT.\n\n```\n// In subdirectory\
    \ counter\npackage counter\ntype Counter struct {\ncount int\n}\nfunc (c *Counter)\
    \ Increment()  {\nc.count += 1\n}\nfunc (c *Counter) Decrement()  {\nif c.count\
    \ > 0 {\nc.count -= 1\n}\n}\nfunc (c *Counter) Reset() {\nc.count = 0\n}\nfunc\
    \ (c Counter) GetCount() int {\nreturn c.count\n}\n// In subdirectory maincounter\n\
    package main\nimport (\n\"fmt\"\n\"example.com/counter\"\n)\nfunc main() {\nmyCounter\
    \ := counter.Counter{}\nmyCounter.Increment()\nmyCounter.Increment()\nmyCounter.Reset()\n\
    myCounter.Increment()\nmyCounter.Increment()\nmyCounter.Increment()\nmyCounter.Increment()\n\
    myCounter.Decrement()\ncountValue := myCounter.GetCount()\nfmt.Println(countValue)\n\
    }\n// 3\nListing 3-3\nThird implementation of Counter ADT using package counter\n\
    ```\n\nIdentifiers that are exported and therefore available outside of a package\
    \ must start with an uppercase character. This includes type names such as `Counter`\
    \ and method names. The field `count` in the `Counter` struct purposely uses a\
    \ lowercase letter so that its value cannot be accessed outside the package. The\
    \ only way to change the `count` is through the methods that operate on `Counter`.\n\
    \nWhich of the two approaches, given in Listings [3-2](#527841_1_En_3_Chapter.xhtml#PC5)\
    \ and [3-3](#527841_1_En_3_Chapter.xhtml#PC8), should one use in implementing\
    \ the ADT `Counter`?\n\nIf an ADT is to be used in two or more applications, the\
    \ solution in Listing [3-3](#527841_1_En_3_Chapter.xhtml#PC8) that defines a package\
    \ for the ADT is preferred. If an ADT is a one-off, needed only in a specialized\
    \ application, then the solution using the interface type is easier."
