    ## 13.4 Summary


    In this chapter, we implemented and discussed the details of building and evaluating
    an expression tree. We showed the modification needed for graphing an expression
    tree.


    In the next chapter, we present a larger application that features concurrency.


    # 14. Ecological Simulation with Concurrency


    The previous chapter introduced expression trees. We showed how we can represent
    and evaluate simple mathematical expressions using such trees.


    In this chapter, we switch gears. We present a concurrent implementation of an
    ecological simulation.


    In the next section, we present an overview of the simulation.'
