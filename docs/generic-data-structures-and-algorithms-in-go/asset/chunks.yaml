  raw: '### Problem of Convergence to Local Minimum Rather Than Global Minimum


    An ever-present challenge in solving combinatorial optimization problems is having
    a solution converge to a local minimum rather than the desired global minimum.
    For this reason, it is desirable to allow the solution space to be explored and
    not to be in a great rush to evolve to a solution.


    In the simulated annealing algorithm, we achieve this by allowing “uphill moves.”
    These are moves in the solution space that produce tours that are greater than
    the best-known tour to date. The goal is to be able to climb out of local valleys
    in the solution space while finding deeper valleys that hopefully contain the
    global minimum.


    In the next section, we present an implementation of simulated annealing that
    follows the steps just presented.


    ## 19.3 Implementation of Simulated Annealing


    We create a type ***Status***, which encapsulates the relevant state information
    about the system.


    ```

    type Status struct {

    tour           []int

    bestTour       []int

    bestCostToDate float64

    previousCost   float64

    temperature    float64

    downhillMoves  int

    uphillMoves    int

    rejectedMoves  int

    inverseOps     int

    swapOps        int

    insertOps      int

    }

    var status Status

    ```


    There are three separate operations that we use to perturb a tour in the solution
    space:


    *   **Inverse Operation** – We reverse the tour within two index values chosen
    randomly.


    *   **Swap** – We swap two cities, chosen randomly, in a given tour.


    *   **Insert** – Move city in random position second to random position first.


    The details of this simulated annealing implementation along with extensive comments
    and program output are presented in Listing [19-1](#527841_1_En_19_Chapter.xhtml#PC2).


