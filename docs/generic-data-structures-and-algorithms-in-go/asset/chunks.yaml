    \        j := i - 1\n        for j >= 0 && data[j] > value {\n            data[j+1]\
    \ = data[j]\n            j--\n        }\n        data[j+1] = value\n    }\n}\n\
    \nfunc MergeT Ordered []T {\n    result := make([]T, len(left)+len(right))\n \
    \   i, j, k := 0, 0, 0\n    for i < len(left) && j < len(right) {\n        if\
    \ left[i] <= right[j] {\n            result[k] = left[i]\n            i++\n  \
    \      } else {\n            result[k] = right[j]\n            j++\n        }\n\
    \        k++\n    }\n    for i < len(left) {\n        result[k] = left[i]\n  \
    \      i++\n        k++\n    }\n    for j < len(right) {\n        result[k] =\
    \ right[j]\n        j++\n        k++\n    }\n    return result\n}\n\nfunc MergeSortT\
    \ Ordered []T {\n    if len(data) > 100 {\n        middle := len(data) / 2\n \
