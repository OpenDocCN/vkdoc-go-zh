    ## 8.4 Summary


    We introduced the binary tree structure. We showed three mechanisms for visiting
    each tree node exactly once. We presented a nongeneric implementation of a binary
    tree and a suite of functions for graphically displaying a binary tree using the
    resources in the third-party **fyne** package.


    In the next chapter, we continue our exploration of trees and examine binary search
    trees.


    # 9. Binary Search Tree


    In the previous chapter, we introduced and implemented binary trees and explained
    the code for traversing and displaying such trees graphically.


    In this chapter, we explore an important specialized binary tree, the binary search
    tree. The goal of a search tree is to organize data to support rapid access to
    the information stored in the tree. Search trees that are relatively balanced
    have a logarithmic relationship between the maximum depth of the tree and the
    number of nodes in the tree and therefore the number of operations required to
    search the tree for a particular item stored in the tree.


    Tree search algorithms with complexity limited by maximum depth are highly efficient.


    In the next section, we present an overview of search trees.


    ## 9.1 Overview


    There are many types of search trees.


    The first type of search tree we examine is the binary search tree. In later chapters,
    we explore other types of search trees.


    A binary search tree (BST) is a special type of binary tree in which every node
    contains a search key and


    1.  All keys smaller than the key in node X are stored in the left subtree of
    X


    2.  All keys greater than the key in node X are stored in the right subtree of
    X


    This implies that in a search tree, we must be able to compare the **Value** fields
    of each node.


    As an example, consider the BST shown in Figure [9-1](#527841_1_En_9_Chapter.xhtml#Fig1).
    This tree is not balanced, but conditions 1 and 2 stated previously hold for every
    node in the tree.


    ![](images/527841_1_En_9_Chapter/527841_1_En_9_Fig1_HTML.jpg)


    An illustration of a 9-node binary search tree. A node 80 is divided into nodes
    15 and 95\. Node 15 leads to node 10\. Node 10 is divided into nodes 5 and 14\.
    The node 14 leads to node 12\. The node 95 is divided into nodes 90 and 98.


    Figure 9-1


    Binary search tree


    ### Searching


    Searching a binary search tree uses a simple algorithm. Compare the key you are
    searching for with the key in the root node. If the search key is smaller, descend
    to the left; if larger, descend to the right. Continue this pattern recursively
    until the bottom of the tree is reached or a node is found with a value that equals
    the search key.


    As an example, if we were to search for node 12 in the tree shown previously,
    we would descend left (to node 15), descend left (to mode 10), descend right (to
    node 14), and descend left to our target, node 12\. This would require five comparison
    operations, which is the depth of this tree.


    ### Insertion


    To insert a node into a search tree, we search for the node we wish to insert.
    This takes us to the bottom of the tree since we will not allow nodes with duplicate
    values in a search tree. We then insert the new node where it would have been
    found if initially present in the tree.


    For the tree given earlier, if we were to insert node 13, it would be inserted
    as the right child of node 12 since that is where it would have been found if
    initially present in the tree.


    ### Ordered Output


    An inorder traversal of this search tree, and all search trees, produces a sequence
    of visitation from smallest value to largest value, ordered output. Try this out
    for the tree given in Figure [9-2](#527841_1_En_9_Chapter.xhtml#Fig2) and verify
    this fact.


    ![](images/527841_1_En_9_Chapter/527841_1_En_9_Fig2_HTML.jpg)


    An illustration of an 11-node binary search tree. A node 80 is divided into nodes
    15 and 95\. Node 15 leads to node 10\. Node 10 is divided into nodes 5 and 14\.
    The node 14 leads to node 12\. Node 12 leads to node 13\. The node 95 is divided
    into nodes 90 and 98\. Node 98 leads to node 96.


    Figure 9-2


    Binary search tree for inorder traversal'
