    fmt.Printf("\nTime to test the presence of all numbers in Set: %s",

    elapsed)

    avlSet := floatset.AVLTree{nil, 0}

    // Time construction of avlSet

    start = time.Now()

    for i := 0; i < size; i++ {

    avlSet.Insert(dataSet[i])

    }

