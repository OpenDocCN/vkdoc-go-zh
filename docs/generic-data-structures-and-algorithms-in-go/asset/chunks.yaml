    A heap provides a natural model for a priority queue. Each item is assumed to
    encapsulate a priority. For example, if we insert string values into the priority
    queue, we assume that the larger the string in a lexical sense, the higher its
    priority. So the string `"Zachary"` has a higher priority than the string `"Robert"`.


