    ### Select 语句


    我们可以通过修改 `output` goroutine 并使用 **select** 语句来解决这个问题。


    ```go

    func output(c chan string) {

    for {

    select {

    case value := <- c:

    fmt.Println(value)

    case <-time.After(3 * time.Second):

    fmt.Println("Program timed out.")

    wg.Done()

    }

    }

    }

    ```


    在 **select** 语句中，首先发生的 case 会被执行。如果两个或多个 case 都准备就绪，系统会随机选择一个。由于 channel `c` 每秒都会被赋值给
