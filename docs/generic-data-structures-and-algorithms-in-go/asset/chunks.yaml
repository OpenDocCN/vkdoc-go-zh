    ### Discussion of binarysearchtree Package and Main Driver


    The code for displaying a binary search tree in Listing [9-5](#527841_1_En_9_Chapter.xhtml#PC7)
    uses **.String()** in multiple places since the type ***T*** is not known. This
    invocation of **String()** is boldfaced in that listing.


    There are two binary search trees used in the main driver. The generic types used
    are ***Number*** and ***Float***. Both of these types are implicitly of type ***OrderedStringer***
    since they have a **String()** function defined.


    A binary search tree of base type **float64** is constructed with 30 nodes. Each
    invocation produces a different tree. One such tree is shown in Figure [9-3](#527841_1_En_9_Chapter.xhtml#Fig3).


    ![](images/527841_1_En_9_Chapter/527841_1_En_9_Fig3_HTML.png)


    An illustration of a binary search tree with 30 nodes with two subtrees. Left
    subtree. Depth 1 to 5: 12.5; 12.2 and 15.4; 8.7, 13.2, and 26.7; 20.5; and 20.4\.
    Right subtree. Depth 1 to 8: 82.8; 43.7, and 88.6; 35.3, 48.1, 86.7, and 93.0;
    28.4, 38.2, 63.3, 88.1, and 97.2; 31.2, 56.7, and 72.0; 62.5, 63.6, and 79.7;
    70.5, and 78.9; and 64.9.


