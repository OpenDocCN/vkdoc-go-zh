    ## 6.6 Deque Application


    Given an array and an integer `k`, find the maximum value for every contiguous
    subarray of size `k`.


    As an example, consider the following problem:


    Input array: `input := []int{9, 1, 1, 0, 0, 0, 1, 0, 6, 8}` with `k = 3`


    - Max of `9, 1, 1` is `9`.

    - Max of `1, 1, 0` is `1`.

    - Max of `1, 0, 0` is `1`.

    - Max of `0, 0, 0` is `0`.

    - Max of `0, 0, 1` is `1`.

    - …


    So the output is `[9 1 1 0 1 1 6 8]`.


    Listing [6-7](#527841_1_En_6_Chapter.xhtml#PC7) presents a simple brute-force
    solution to this problem.


    ```go

    package main

    import (

    "fmt"

    )

    func MaxSubarray(input []int, k int) (output []int) {

    for first := 0; first < len(input)-k+1; first++ {

    max := input[first]

    for second := 1; second < k; second++ {

    if input[first+second] > max {

    max = input[first+second]

    }

    }

    output = append(output, max)

    }

    return output

    }

    func main() {

    input := []int{3, 1, 6, 4, 2, 10, 5, 9}

    output := MaxSubarray(input, 3)

    fmt.Println("Output = ", output)

    }

    /* Output

    Output =  [6 6 6 10 10 10]

    */

    Listing 6-7

    Brute-force solution to the maximum contiguous array problem

    ```


    Because of the nested loops, the computational complexity of this solution is
    `O(n * k)`, where `n` is the size of the input slice.


    Can we do better? This would be useful if `n` and `k` were large. We can do much
    better using the services of a `Deque`.


    Consider function `MaxSubarrayUsingDeque` as follows:


    ```go

    func MaxSubarrayUsingDeque(input []int, k int) (output []int) {

    deque := deque.Deque[int]{}

    var index int

    // First window

    for index = 0; index < k; index++ {

    for {

    if deque.Empty() || input[index] < input[deque.Last()] {

    break

    }

    deque.RemoveLast()

    }

    deque.InsertBack(index)

    }

    output = append(output, input[deque.First()])

    // Remaining windows

    for ; index < len(input); index++ {

    // Remove indices out of window

    for {

    if deque.Empty() || deque.First() > index-k {

    break

    }

    deque.RemoveFirst()

    }

    // Remove values smaller than the element currently being added

    for {

    if deque.Empty() || input[index] < input[deque.Last()] {

    break

    }

    deque.RemoveLast()

    }

    deque.InsertBack(index)

    output = append(output, input[deque.First()])

    }

    return output

    }

    ```


    Let us walk through the function for a portion of the example before.


    A `deque` with generic type `int` is initialized to empty.


    Since `deque` is empty, we break out of the inner for-loop and insert index 0
    into the deque and then advance `index` from 0 to 1.


    Since `input[1]` is less than `input[0]`, we again break out of the inner for-loop
    and insert index 1 into the back of the deque so the deque contains `[0 1]`. We
    advance index to 2.


    Since `input[2]` is not less than `input[1]`, we remove the last element, 1, from
    the deque, leaving the deque as `[0]`. Since `input[2]` is less than `input[0]`,
    we break out of the inner loop and insert index 2 to the back of the deque producing
    `[0 2]`. The outer for-loop is done. We are assured that the first element in
    the deque is the largest in the deque.


    In the second outer for-loop, we append `input[deque.First()]` to the `output`,
    namely, the value of 9.


    The logic of the second outer for-loop mirrors the first outer for-loop. First,
    the deque is purged of values out of the index window of the deque, which gets
    shifted by one to the right after each iteration. Then the deque is filled with
    the next k values, and the values are rotated so that the first value in the deque
    is largest.


    The computational complexity of this algorithm is `O(n)`.


    Listing [6-8](#527841_1_En_6_Chapter.xhtml#PC9) compares the performance of the
    brute-force algorithm with the deque-based algorithm.


    ```go

    package main

    import (

    "fmt"

    "example.com/deque"

    "time"

    "math/rand"

    )

    const size = 1_000_000

    func MaxSubarrayBruteForce(input []int, k int) (output []int) {

    for first := 0; first < len(input)-k+1; first++ {

    max := input[first]

    for second := 1; second < k; second++ {

    if input[first+second] > max {

    max = input[first+second]

    }

    }

    output = append(output, max)

    }

    return output

    }

    func MaxSubarrayUsingDeque(input []int, k int) (output []int) {

    deque := deque.Deque[int]{}

    var index int

    // First window

    for index = 0; index < k; index++ {

    for {

    if deque.Empty() || input[index] < input[deque.Last()] {

    break

    }

    deque.RemoveLast()

    }

    deque.InsertBack(index)

    }

    output = append(output, input[deque.First()])

    // Remaining windows

    for ; index < len(input); index++ {

    // Remove indices out of window

    for {

    if deque.Empty() || deque.First() > index-k {

    break

    }

    deque.RemoveFirst()

    }

    // Remove values smaller than the element currently being added

    for {

    if deque.Empty() || input[index] < input[deque.Last()] {

    break

    }

    deque.RemoveLast()

    }

    deque.InsertBack(index)

    output = append(output, input[deque.First()])

    }

    return output

    }

    func main() {

    input := []int{9, 1, 1, 0, 0, 0, 1, 0, 6, 8}

    output1 := MaxSubarrayBruteForce(input, 3)

    fmt.Println("Output = ", output1)

    output2 := MaxSubarrayUsingDeque(input, 3)

    fmt.Println("Output = ", output2)

    // Benchmark performance of two algorithms

    input = []int{}

    for i := 0; i < size; i++ {

    input = append(input, rand.Intn(1000))

    }

    start := time.Now()

    MaxSubarrayUsingDeque(input, 10000)

    elapsed := time.Since(start)

    fmt.Println("Using Deque: ", elapsed)

    start = time.Now()

    MaxSubarrayBruteForce(input, 10000)

    elapsed = time.Since(start)

    fmt.Println("Using Brute Force: ", elapsed)

    }

    /* Output

    Output = [9 1 1 0 1 1 6 8]

    Output = [9 1 1 0 1 1 6 8]

    Using Deque: 21.873658ms

    Using Brute Force: 6.042102028s

    */

    Listing 6-8

    Comparing the performance of the brute-force algorithm with the deque-based algorithm

    ```


    The results are dramatic: `21.87ms` for the deque-based algorithm and `6.04` seconds
    for the brute-force algorithm.


    In the next section, we introduce and implement a priority queue.'
