    Fibonacci numbers using a goroutine

    ```


    The first parameter, `c`, in function `fibonacci` puts information into the channel,
    and the second parameter, `quit`, takes information out of the channel.


    The goroutine is launched within `main` as an internal function. The `Println(<-c)`
    statement blocks until the `fibonacci` function puts the value `x` into the integer
    channel `c`.


    The `select` statement in function `fibonacci` either takes the next value of
    `x` into channel `c` or ends the program as soon as `quit` becomes true. The actual
    `fibonacci` sequence is computed as the second line within the `case c <-x` statement.


    In the next section, we examine the possible performance improvements that are
    attainable by using concurrency.


    ## 1.4 Benchmarking Concurrent Applications


    The goal in using concurrency is to speed up program execution. There is overhead
    in deploying goroutines, so sometimes, using concurrency is counterproductive.
    Because debugging concurrent code is challenging and dealing with deadlocks and
    race conditions is sometimes tricky, one needs to be careful when crafting concurrent
    solutions to a problem. Testing a concurrent application and comparing its performance
    with a nonconcurrent solution is useful.


    In this section, we present several applications in which we compare the performance
    of a concurrent solution with a nonconcurrent solution. Since the result of a
    benchmark test is dependent on the processor and memory used, the ambient workload
    of the machine (how many processes are running in the background), and the machine
    architecture, one must be careful in generalizing and possibly drawing incorrect
    conclusions from a benchmark result.


    Consider the program in Listing 1-17. Here, we compare the time required to construct
    and sum 100 million floating-point numbers into a slice with and without concurrency.


    ```go

    package main

    import "fmt"

    import "time"

    import "sync"

    var output1 float64

    var output2 float64

    var output3 float64

    var output4 float64

    var wg sync.WaitGroup

    func worker1() {

    defer wg.Done()

    var output []float64

    sum := 0.0

    for index := 0; index < 100_000_000; index++ {

    output = append(output, 89.6)

    sum += 89.6

    }

    output1 = sum

    }

    func worker2() {

    defer wg.Done()

    var output []float64

    sum := 0.0

    for index := 0; index < 100_000_000; index++ {

    output = append(output, 64.8)

    sum += 64.8

    }

    output2 = sum

    }

    func worker3() {

    defer wg.Done()

    var output []float64

    sum := 0.0

    for index := 0; index < 100_000_000; index++ {

    output = append(output, 956.8)

    sum += 956.8

    }

    output3 = sum

    }

    func worker4() {

    defer wg.Done()

    var output []float64

    sum := 0.0

    for index := 0; index < 100_000_000; index++ {

    output = append(output, 1235.8)

    sum += 1235.8

    }

    output4 = sum

    }

    func main() {

    wg.Add(8)

    // Compute time with no concurrent processing

    start := time.Now()

    worker1()

    worker2()

    worker3()

    worker4()

    elapsed := time.Since(start)

    fmt.Println("\nTime for 4 workers in series: ", elapsed)

    fmt.Printf("Output1: %f \nOutput2: %f  \nOutput3: %f  \nOutput4: %f\n",

    output1, output2, output3, output4)

    // Compute time with concurrent processing

    start = time.Now()

    go worker1()

    go worker2()

    go worker3()

    go worker4()

    wg.Wait()

    elapsed = time.Since(start)

    fmt.Println("\nTime for 4 workers in parallel: ", elapsed)

    fmt.Printf("Output1: %f \nOutput2: %f  \nOutput3: %f  \nOutput4: %f",

    output1, output2, output3, output4)

    }

    /* Output on a Macbook Pro with M1 Max chip with 10-core CPU, 32-core GPU, and
    16-core Neural Engine

    Time for 4 workers in series:  1.133640541s

    Output1: 8960000016.634367

    Output2: 6480000011.637030

    Output3: 95680000176.244049

    Output4: 123580000205.352280

    Time for 4 workers in parallel:  756.305958ms

    Output1: 8960000016.634367

    Output2: 6480000011.637030

    Output3: 95680000176.244049

    Output4: 123580000205.352280

    */

    Listing 1-17

    Computing Sum With and Without Concurrency

    ```


    Each worker function appends a `float64` value to construct an output slice of
    100 million values while computing the sum in the slice.


    In `main`, we compute and output the computation time if the worker functions
    are executed sequentially. Then we execute the four worker functions concurrently
    using goroutines. We compare the computation time and verify the correctness of
    the results by outputting the sums with and without concurrency.


    The computation time running the four worker functions concurrently is 67 percent
    the time running the four functions sequentially. As expected, the sums computed
    are the same.


    Suppose we wish to speed up the computation of summing a sequence of numbers by
    using concurrency. Listing 1-18 demonstrates this.


    ```go

    package main

    import (

    "fmt"

    "time"

    )

    const (

    NumbersToSum = 10_000_000

    )

    func sum(s []float64, c chan<- float64) {

    // A generator that puts data into channel

    sum := 0.0

    for _, v := range s {

    sum += float64(v)

    }

    c <- sum // blocks until c is taken out of the channel

    }

    func plainSum(s []float64) float64 {

    sum := 0.0

    for _, v := range s {

    sum += float64(v)

    }

    return sum

    }

    func main() {

    s := []float64{}

    for i := 0; i < NumbersToSum; i++ {

    s = append(s, 1.0)

    }

    c := make(chan float64)

    start := time.Now()

    go sum(s[:len(s) / 2], c)

    go sum(s[len(s) / 2 :], c)

    first, second := <-c, <-c // receive from each c

    elapsed := time.Since(start)

    fmt.Printf("first: %f  second: %f elapsed time: %v", first, second,

    elapsed)

    start = time.Now()

    answer := plainSum(s)

    elapsed = time.Since(start)

    fmt.Printf("\nplain sum: %f elapsed time: %v", answer, elapsed)

    }

    /*

    first: 5000000.000000  second: 5000000.000000 elapsed time: 5.864275ms

    plain sum: 10000000.000000 elapsed time: 11.601511ms

    */

    Listing 1-18

    Using concurrency to speed up the computation of sum

    ```


    By summing half the numbers in each of two goroutines, a substantial improvement
    in execution time occurs as is evident in the program output.


    The two goroutines perform their computation in a for-loop concurrently and return
    their values by assigning to the channel variable `c`. In `main`, the assignment
    of the two sums to `first` and `second` is blocked until both values are assigned
    to the channel.


    ### Generating Prime Numbers Using Concurrency


    Next, we turn to the generation of prime numbers. The classic algorithm for doing
    this is the Sieve of Eratosthenes. This is an extremely fast nonconcurrent algorithm.


    The goal is to find all the prime numbers up to a specified number, say, ten million.
    A prime number is an integer that is only divisible by 1 or itself. The first
    several prime numbers are 2, 3, 5, 7, 11, 13, 17, 19, 23. With the exception of
    2, all other prime numbers are odd numbers.'
