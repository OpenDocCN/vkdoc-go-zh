    \    // myTree.Delete(20)\n    avl.ShowTreeGraph(myTree)\n}\nListing 10-2\nMain\
    \ driver code\n```\n\nThis produces the tree display shown in Figure [10-2](#527841_1_En_10_Chapter.xhtml#Fig2).\n\
