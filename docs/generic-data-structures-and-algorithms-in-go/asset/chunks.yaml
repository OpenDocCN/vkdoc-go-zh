    \ 3}]\n队列头部乘客: {Madison 1}\n经过三次移除后的队列头部乘客: {Dante 2}*/\n```\n\n*列表 6-9*  \n*优先队列的切片实现及驱动程序*\n\
    \n如果切片中所有队列均为空，`Remove` 方法将返回 `T`（此处为 `Passenger`）的零值。\n\n前三次 `Remove` 调用移除了队列中全部两个优先级为\
    \ 1 的乘客以及第一个优先级为 2 的乘客，使得“Dante”成为队列头部。\n\n在列表 6-9 中，我们看到了抽象层次的分层，这是软件开发中的常见做法。我们也可以使用切片队列代替节点队列，只需改动导入语句中的一行代码，并将所有\
    \ `nodequeue.Queue` 替换为 `slicequeue.Queue` 即可。\n\n下一节将介绍队列的一个重要应用——等待线的离散事件模拟。典型的等待线场景是客户排队竞争服务，等待服务器处理每位客户。例如超市的结账流程。\n\
    \n## 6.8 队列应用：等待线的离散事件模拟\n\n假设我们在银行有一个服务等待线。客户按照**泊松**到达过程到达，并具有指定的平均到达率。客户获得服务的时间由在指定下限和上限之间均匀分布的随机服务时间决定。我们的目标是构建一个模拟程序，用于估算加入等待线的客户的平均等待时间（从到达等待线到服务完成的时间），以及八小时工作日内其他统计数据。\n\
    \n### 泊松过程\n\n由泊松到达过程建模的事件需满足以下条件：\n\n1. 事件相互独立。一个事件的发生不会影响另一个事件的发生时间。如果建模的事件是客户到达银行等待线，这很可能是一个合理的要求。\n\
    \n2. 事件的平均发生率保持恒定。这里我们以分钟为基本时间单位，因此平均发生率以每分钟事件数表示。\n\n可以证明，事件之间的时间（一个随机变量）可通过以下函数生成：\n\
    \n```\nfunc InterArrivalInterval(arrivalRate float64) float64 {\n\t// 模拟泊松过程并返回\n\
    \trn := rand.Float64() // 0.0 到 1 之间的随机浮点数\n\treturn -math.Log(1.0 - rn) / arrivalRate\n\
    }\n```\n\n这对应于事件间等待时间大于某个 `t` 的概率为：\n\n```\nP(等待时间 > t) = e^-λ * t\n```\n\n其中\
    \ **λ** 是以事件/分钟为单位的平均到达率。这是一个指数分布。随着 `t` 增加，等待时间超过 `t` 的概率趋近于 0。当 `t` 等于 0 时，概率为\
    \ 1。随着到达率 **λ** 增加（平均每分钟事件数更多），下一个事件的等待时间大于某个 `t` 的概率会降低。\n\n我们将服务时长（处理一位客户所需的时间）建模为介于\
    \ `0.5 / 到达率` 和 `1.4 / 到达率` 之间的均匀分布。例如，如果到达率为 `0.25`（平均每 4 分钟一位客户），则服务时间被建模为在\
    \ 2 分钟到 5.6 分钟之间均匀分布，平均为 3.8 分钟。由于平均服务时间小于平均到达间隔时间，这将形成一个稳定的队列。\n"
- fmt: "### Simulation Logic\n\nLet us examine a typical sequence of events to set\
    \ the stage for our simulation logic. The `a`’s represent customer arrival times.\
    \ The `d`’s represent customer departure times. The line forms from left to right,\
    \ so the leftmost customer is at the head of the line and is next to depart.\n\
    \n```\nt1\n0    a1                                       line: c1\nt2\n0    a1\
    \    a2                                 line: c1, c2\nt3\n0    a1    a2      \
    \       d1                  line: c2\n|  |\nt4\n0    a1    a2            d1  \
    \ a3              line: c2, c3\nt5\n0    a1    a2            d1     a3 d2    \
    \     line: c3\nt6\n0    a1    a2            d1     a3 d2    d3   line: empty\n\
    ```\n\nThe variable `t` (time) advances in discrete steps based on the next event\
    \ – either an arrival or a departure – thus the name discrete-event simulation.\n\
    \nFor the sequence of events shown, the wait times for customers 1, 2, and 3 are\
    \ the following:\n\n- Customer 1: (`d1 – a1`)\n- Customer 2: (`d2 – a2`)\n- Customer\
    \ 3: (`d3 – a3`)\n\nThe queue time is as follows:\n(`t2 – t1`) * 1 + (`t3 – t2`)\
    \ * 2 + (`t4 – t3`) * 1 + (`t5 – t4`) * 2 + (`t6 – t5`) * 1\n\nAverage queue size:\
    \ `queueTime / t6`.\n\nAfter each event (arrival or departure), the queue time\
    \ is updated by taking the new event time – the last event time multiplied by\
    \ the size of the queue. If the next event is a departure, the first customer\
    \ on the queue is removed; its `departureTime – arrivalTime` is added to the wait\
    \ times. If the next event is an arrival, the customer is inserted into the queue.\n\
    \nThe next arrival time is the previous arrival time + interval between arrivals.\
    \ The next departure time is computed as the time when the customer becomes the\
    \ first in the line + service time for the customer.\n\n### Implementation of\
    \ System\n\nWith these observations in hand, we present Listing [6-10](#527841_1_En_6_Chapter.xhtml#PC15),\
    \ which implements this system.\n\n```go\n// Discrete event simulation of waiting\
    \ line\npackage main\n\nimport (\n    \"math/rand\"\n    \"math\"\n    \"fmt\"\
    \n    \"time\"\n    \"example.com/nodequeue\"\n)\n\nconst (\n    arrivalRate \
    \          = 0.25 // average customer arrivals per minute\n    lowerBoundServiceTime\
    \ = 0.5 / arrivalRate\n    upperBoundServicetime = 2.0 / arrivalRate\n    quitTime\
    \              = 480 // Minutes in an 8 hour day\n)\n\nfunc InterArrivalInterval(arrivalRate\
    \ float64) float64 {\n    // Models a Poisson process and returns\n    rn := rand.Float64()\
    \ // random float between 0.0 and 1\n    return -math.Log(1.0 - rn) / arrivalRate\n\
    }\n\nfunc ServiceTime() float64 {\n    // Uniform distribution\n    rn := rand.Float64()\
    \ // rn between 0.0 and 1.0\n    return lowerBoundServiceTime + (upperBoundServicetime\
    \ - lowerBoundServiceTime) * rn\n}\n\ntype Customer struct {\n    arrivalTime\
    \     float64\n    serviceDuration float64\n}\n\n// ADT for Statistics\ntype Statistics\
    \ struct {\n    waitTimes      []float64\n    queueTime      float64 // Accumulated\
    \ time * queue size\n    longestQueue   int\n    longestWaitTime float64\n}\n\n\
    func (s *Statistics) AddWaitTime(wait float64) {\n    s.waitTimes = append(s.waitTimes,\
    \ wait)\n    if wait > s.longestWaitTime {\n        s.longestWaitTime = wait\n\
    \    }\n}\n\nfunc (s *Statistics) AddQueueSizeTime(queueSize int, timeAtSize float64)\
    \ {\n    s.queueTime += float64(queueSize) * timeAtSize\n}\n\nfunc (s *Statistics)\
    \ AddLength(length int) {\n    if length > s.longestQueue {\n        s.longestQueue\
    \ = length\n    }\n}\n\nvar lastArrivalTime, departureTime, lastEventTime float64\n\
    \nfunc main() {\n    rand.Seed(time.Now().UnixNano())\n    lastEventTime := 0.0\
    \ // beginning of day\n    line := nodequeue.Queue[Customer]{}\n    statistics\
    \ := Statistics{}\n\n    // Start simulation\n    for {\n        lastArrivalTime\
    \ = lastArrivalTime + InterArrivalInterval(arrivalRate)\n        if lastArrivalTime\
    \ > quitTime {\n            break\n        }\n        if line.Size() == 0 {\n\
    \            lastEventTime = lastArrivalTime\n            // fmt.Printf(\"\\nline\
    \ no longer empty at time: %0.2f. line size is 1\", lastEventTime)\n         \
    \   serviceTime := ServiceTime()\n            customer := Customer{lastArrivalTime,\
    \ serviceTime}\n            line.Insert(customer)\n            statistics.AddLength(line.Size())\n\
    \            departureTime = lastArrivalTime + serviceTime\n        } else {\n\
    \            if lastArrivalTime < departureTime {\n                // next event\
    \ is arrival\n                serviceTime := ServiceTime()\n                customer\
    \ := Customer{lastArrivalTime, serviceTime}\n                line.Insert(customer)\n\
    \                statistics.AddLength(line.Size())\n                statistics.AddQueueSizeTime(line.Size()-1,\
    \ lastArrivalTime-lastEventTime)\n                lastEventTime = lastArrivalTime\n\
    \            } else {\n                // next event is departure\n          \
    \      // remove first customer from line\n                removedCustomer :=\
    \ line.Remove()\n                waitTime := departureTime - removedCustomer.arrivalTime\n\
    \                statistics.AddWaitTime(waitTime)\n                statistics.AddQueueSizeTime(line.Size()+1,\
    \ departureTime-lastEventTime)\n                lastEventTime = departureTime\n\
    \                if line.Size() > 0 {\n                    departureTime = lastEventTime\
    \ + line.First().serviceDuration\n                }\n            }\n        }\n\
    \    }\n\n    totalWaitTime := 0.0\n    for i := 0; i < len(statistics.waitTimes);\
    \ i++ {\n        totalWaitTime += statistics.waitTimes[i]\n    }\n    averageWaitTime\
    \ := totalWaitTime / float64(len(statistics.waitTimes))\n\n    fmt.Printf(\"\\\
    nAverage Time from Arrival to Departure: %0.2f minutes\", averageWaitTime)\n \
    \   fmt.Printf(\"\\nAverage size of waiting line: %0.2f\", statistics.queueTime/lastEventTime)\n\
    \    fmt.Printf(\"\\nLongest queue during the day: %d\", statistics.longestQueue)\n\
    \    fmt.Printf(\"\\nLongest wait time during the day: %0.2f minutes\", statistics.longestWaitTime)\n\
    }\n\n/* An output\nAverage Time from Arrival to Departure: 16.19 minutes\nAverage\
    \ size of waiting line: 2.28\nLongest queue during the day: 8\nLongest wait time\
    \ during the day: 40.18 minutes\n*/\n```\n\nListing 6-10 – Discrete event simulation\
    \ of waiting line\n\nMultiple runs of the simulation exhibit a relatively large\
    \ variance in the output statistics shown previously.\n\nIf we instrument the\
    \ code with the three commented lines of code indented flush left, we output the\
    \ exact sequence of events along with their event times.\n\nA portion of the output\
    \ produced during a typical run of the simulation is shown here:\n\n```\nline\
    \ no longer empty at time: 0.81\\. line size is 1\nDeparture event at 6.23 - line\
    \ size is: 0:\nline no longer empty at time: 7.82\\. line size is 1\nDeparture\
    \ event at 12.91 - line size is: 0:\nline no longer empty at time: 28.79\\. line\
    \ size is 1\nArrival event at 29.87 - line size is: 2:\nDeparture event at 33.56\
    \ - line size is: 1:\nDeparture event at 41.07 - line size is: 0:\nline no longer\
    \ empty at time: 53.59\\. line size is 1\nArrival event at 55.22 - line size is:\
    \ 2:\nDeparture event at 58.17 - line size is: 1:\nDeparture event at 61.30 -\
    \ line size is: 0:\nline no longer empty at time: 62.79\\. line size is 1\nArrival\
    \ event at 67.35 - line size is: 2:\nDeparture event at 70.29 - line size is:\
    \ 1:\nArrival event at 71.87 - line size is: 2:\nDeparture event at 77.07 - line\
    \ size is: 1:\nDeparture event at 81.35 - line size is: 0:\nline no longer empty\
    \ at time: 85.97\\. line size is 1\nArrival event at 89.44 - line size is: 2:\n\
    Departure event at 90.97 - line size is: 1:\nDeparture event at 93.27 - line size\
    \ is: 0:\nline no longer empty at time: 95.92\\. line size is 1\nDeparture event\
    \ at 99.66 - line size is: 0:\nline no longer empty at time: 105.60\\. line size\
    \ is 1\nArrival event at 105.96 - line size is: 2:\nArrival event at 108.51 -\
