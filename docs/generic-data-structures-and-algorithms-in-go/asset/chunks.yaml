- fmt: '### Binary Searches


    If the data in the slice to be searched is sorted, a binary search algorithm could
    be used. This algorithm is `O(log[2]n)` since the search space is halved during
    each iteration.


    Listing [2-11](#527841_1_En_2_Chapter.xhtml#PC19) presents the details of this
    binary search on sorted data.


    ```

    package main

    import (

    "fmt"

    "time"

    )

    const size = 100_000_000

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    func binarySearch[T Ordered](slice []T, target T) bool {

    low := 0

    high := len(slice) - 1

    for low <= high {

    median := (low + high) / 2

    if slice[median] < target {

    low = median + 1

    } else {

    high = median - 1

    }

    }

    if low == len(slice) || slice[low] != target {

    return false

    }

    return true

    }

    func main() {

    data := make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = float64(i) // is sorted

    }

    start := time.Now()

    result := binarySearch[float64](data, -10.0)

    elapsed := time.Since(start)

    fmt.Println("Time to search slice of 100_000_000 floats using binarySearch = ",
    elapsed)

    fmt.Println("Result of search is ", result)

    start = time.Now()

    result = binarySearch[float64](data, float64(size / 2))

    elapsed = time.Since(start)

    fmt.Println("Time to search slice of 100_000_000 floats using binarySearch = ",
    elapsed)

    fmt.Println("Result of search is ", result)

    }

    /* Output

    Time to search slice of 100_000_000 floats using binarySearch = 1.375μs

    Result of search is false

    Time to search slice of 100_000_000 floats using binarySearch = 334ns

    Result of search is true

    */

    Listing 2-11

    Binary search on sorted data

    ```


    The search time here is significantly smaller than the search times on random
    data achieved earlier. That is because the data is sorted.


    The fastest sorting algorithm has complexity `O(nlog[2]n)`. If one needed to perform
    many independent searches within the slice, it might pay to sort the data first
    and then conduct the many searches using a binary search.


    It would not be beneficial to sort the slice before performing a single search
    of the slice because of the overhead of sorting.


    ## 2.4 Summary


    Big O notation describes the asymptotic efficiency of an algorithm. We examined
    several classic sorting and searching algorithms in this chapter and characterized
    them by their big O property. We presented concurrent solutions for each of the
    sorting algorithms and observed significant improvements in their performance.


    In the next chapter, we discuss object-oriented programming in Go without classes.


    # 3. Abstract Data Types: OOP Without Classes in Go


    In the previous chapter, we discussed algorithm complexity and presented examples
    with and without the use of concurrency.


    In this chapter, we show how object-oriented programming can be done without the
    `class` construct. We review the fundamental concept of abstract data types and
    illustrate their use with many examples.


    ## 3.1 Abstract Data Type Using Classes


    In 1980, the `Smalltalk` language, developed at Xerox PARC, was released. This
    seminal language set the stage for a new paradigm of programming: object-oriented
    programming. The centerpiece of `Smalltalk` and newer object-oriented languages
    that followed is the `class` construct. Some of the major object-oriented languages
    that followed `Smalltalk` include Eiffel, C++ (a hybrid language that includes
    the `class` construct), Java, Swift, Python, and C#. Each uses the `class` as
    the central construct for defining abstract data types and describing the behavior
    of objects that are instances of a class.


    The `class` construct implements some older well-established ideas about how software
    is constructed. Specifically, classes implement **abstract data types**.


    An **abstract data type** is characterized by a set of operations that can be
    performed on the underlying type. Consider the following simple example.


    We define the `Counter` abstract data type as follows:


    | Attributes |

    | `count int` – The internal data of each `Counter` object (instance) |

    | Methods |

    | `Increment()` – Adds one to the current value of the attribute `count` |

    | `Decrement()` – Subtracts one from the current value of the attribute `count`
    only if `count > 0` |

    | `Reset()` – Sets the value of `count` to zero |

    | `GetCount()` – Returns the current value of `count` |


    If `myCounter` is defined as being of type `Counter` (an instance of some class
    `Counter`), the following operations would be legal:


    ```

    myCounter.Increment()

    myCounter.Decrement()

    myCounter.Reset()

    countValue = myCounter.GetCount()

    ```


    In the preceding example, `myCounter` is referred to as an object (an instance
    of class `Counter`), and the method calls connected to each object with the dot
    operator are the legal operations that could be performed on each object, thus
    the name **object-oriented programming**.


    Object-oriented languages supporting the `class` construct provide a mechanism
    for extending the operation set defined in a parent class using inheritance. Languages
    like C++ and Eiffel allows a subclass to inherit operations from two or more parent
    classes, while languages such as Java and C# allow inheritance from only one parent
    class.


    Much has been written about inheritance in object-oriented languages. Inheritance
    has fallen out of favor in recent years because of the complexity it can introduce
    and the dependencies that may be created in a class hierarchy.


    Two recent languages that have abandoned inheritance and in fact have abandoned
    classes are Go and Rust. But Go and Rust have not abandoned object-oriented programming
    (OOP) but have changed how this paradigm is used.


    Before we delve into the details of OOP in Go, let us examine how we might implement
    the `Counter` abstract data type in Python.


    ```

    class Counter:

    def __init__(self):

    self.count  = 0

    def increment(self):

    self.count += 1

    def decrement(self):

    self.count -= 1

    def reset():

    self,count = 0

    def get_count(self) -> int:

    return self.count

    if __name__ == "__main__":

    my_counter = Counter()

    for index in range(10):

    my_counter.increment()

    my_counter.decrement()

    current_count = my_counter.get_count()

    print(current_count)

    '''''' Output


    ''''''

    ```


    The keyword `self` is used as a reference to any instance of class `Counter`.
    The attribute `count`, defined in the `__init__` method, is stored in each instance
    (object) of class `Counter`.


    One obvious appeal of the `class` construct is that all the operations on the
    underlying attribute(s) are encapsulated in this single construct.


    What about Go? In the next section, we look at defining abstract data types in
    Go without the use of classes.


    ## 3.2 Abstract Data Types in Go


    Go does not include the `class` construct. This is a major departure from recent
    object-oriented languages. Since there is no `class` construct in Go, there is
    no inheritance.'
