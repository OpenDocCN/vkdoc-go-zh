    Q     = uint64(10 ^ 9 + 9)

    )

    func Hash(s string, Length int) uint64 {

    // Horner''s method

    h := uint64(0)

    for i := 0; i < Length; i++ {

    h = (h*Radix + uint64(s[i])) % Q

    }

    return h

    }

    ```


    This is Horner’s method for evaluating a polynomial. We use **uint64** for the
    integer values to avoid overflow.


    ### Rabin-Karp Algorithm


    The ***Search*** method uses the Rabin-Karp algorithm outlined earlier and is
    shown here:


    ```

    func Search(txt, pattern string) (bool, int) {

    strings.ToLower(txt)

    strings.ToLower(pattern)

    n := len(txt)

    m := len(pattern)

    patternHash := Hash(pattern, m)

    textHash := Hash(txt, m)

    if textHash == patternHash {

    return true, 0

    }

    PM := uint64(1)

    for i := 1; i <= m-1; i++ {

    PM = (Radix * PM) % Q

    }

    for i := m; i < n; i++ {

    textHash = (textHash + Q - PM*uint64(txt[i-m])%Q) % Q

    textHash = (textHash*Radix + uint64(txt[i])) % Q

    if (patternHash == textHash) && pattern == txt[(i-m+1):(i+1)] {

    return true, i - m + 1

    }

    }

    return false, -1

    }

    ```


    Since the equality of **patternHash** and **textHash** does not guarantee that
    the pattern has been found, we test the pattern against the segment of text to
    be sure.


    ```

    package main

    import (

    "fmt"

    "strings"

    "time"

    )

    const (

    Radix = uint64(10)

    Q     = uint64(10 ^ 9 + 9)

    )

    func BruteForceSearch(txt, pattern string) (bool, int) {

    patternLength := len(pattern)

    for outer := 0; outer < len(txt)-patternLength; outer++ {

    if txt[(outer):(outer+patternLength)] == pattern {

    return true, outer

    }

    }

    return false, -1

    }

    func Hash(s string, Length int) uint64 {

    // Horner''s method

    h := uint64(0)

    for i := 0; i < Length; i++ {

    h = (h*Radix + uint64(s[i])) % Q

    }

    return h

    }

    func Search(txt, pattern string) (bool, int) {

    strings.ToLower(txt)

    strings.ToLower(pattern)

    n := len(txt)

    m := len(pattern)

    patternHash := Hash(pattern, m)

    textHash := Hash(txt, m)

    if textHash == patternHash {

    return true, 0

    }

    PM := uint64(1)

    for i := 1; i <= m-1; i++ {

    PM = (Radix * PM) % Q

    }

    for i := m; i < n; i++ {

    textHash = (textHash + Q - PM*uint64(txt[i-m])%Q) % Q

    textHash = (textHash*Radix + uint64(txt[i])) % Q

    if (patternHash == textHash) && pattern == txt[(i-m+1):(i+1)] {

    return true, i - m + 1

    }

    }

    return false, -1

    }

    func main() {

    text :="3141592653589793238462643383279502884197169399375105820974944592307816406

    2862089986280348253421170679"

    pattern := "816406286208998628034825342"

    start := time.Now()

    _, _ = BruteForceSearch(text, pattern)

    elapsed := time.Since(start)

    fmt.Println("Computation time using BruteForceSearch: ", elapsed)

    start = time.Now()

    _, _ = Search(text, pattern)

    elapsed = time.Since(start)

    fmt.Println("Computation time using Search: ", elapsed)

    fmt.Println(BruteForceSearch(text, pattern))

    fmt.Println(Search(text, pattern))

    }

    /* Output with Macbook Pro using M1 Max

    Computation time using BruteForceSearch: 10.083μs

    Computation time using Search:  1.375μs

    true 67

    true 67

    Using iMac with 3.2 GHz 8-Core Intel Xeon W

    Computation time using BruteForceSearch: 354ns

    Computation time using Search: 1.161μs

    */

    Listing 7-5

    Comparing Rabin-Karp to brute-force search

    ```


    The program was run on two computers, and the results are surprising. On the MacBook
    Pro with M1 Max processor and 32G of combined RAM, the Rabin-Karp search is over
    seven times faster in searching the first 100 digits of Pi, not surprising. On
    the iMac with a 3.2-GHz 8-core Xeon W processor, the opposite occurs. The brute-force
    algorithm returns a time that is over three times faster than the Rabin-Karp algorithm.


    These contradictory benchmarks again highlight the fact that the hardware and
    instruction set of a particular machine can greatly influence the outcome of such
    a benchmark.


    In the next section, we use hashing to implement a generic **Set**.'
