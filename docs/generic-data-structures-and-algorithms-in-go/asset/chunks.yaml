- fmt: '# 6.11 Singly Linked List


    A data structure for a generic singly linked list is given as follows:


    ```

    package singlylinkedlist

    import (

    "fmt"

    )

    type Ordered interface {

    ~string | ~int | ~float64

    }

    type Node[T Ordered] struct {

    Item T

    next *Node[T]

    }

    type List[T Ordered] struct {

    first       *Node[T]

    numberItems int

    }

    ```


    Type `Node` contains an `Item` (uppercase so it can be accessed outside the package)
    and a pointer to the next node in the list.


    Type `List` contains a pointer, `first`, to the head node of the list and an integer
    `numberItems`.


    Let us discuss in some detail two of the methods that can be invoked on `List`.


    Method `Append` creates a new node and adds it to the end of the list as follows:


    ```

    func (list *List[T]) Append(item T) {

    // Adds item to a new node at the end of the list

    newNode := Node[T]{item, nil}

    if list.first == nil {

    list.first = &newNode

    } else {

    last := list.first

    for {

    if last.next == nil {

    break

    }

    last = last.next

    }

    last.next = &newNode

    }

    list.numberItems += 1

    }

    ```


    A `newNode` with generic type `T` is defined with `item` and pointing to nil.


    If the list the method is invoked on is empty, `list.first` is assigned to the
    address of `newNode`.


    Otherwise, a for-loop is executed, advancing the pointer `last` until `last.next`
    is nil. Then `last.next` is assigned to the address of `newNode`.


    Method `InsertAt` creates a new node and adds it at location `index` as follows:


    ```

    func (list *List[T]) InsertAt(index int, item T) error {

    // Adds item to a new node at position index in the list

    if index < 0 || index > list.numberItems {

    return fmt.Errorf("Index out of bounds error")

    }

    newNode := Node[T]{item, nil}

    if index == 0 {

    newNode.next = list.first

    list.first = &newNode

    list.numberItems += 1

    return nil // No error

    }

    node := list.first

    count := 0

    previous := node

    for count < index {

    previous = node

    count++

    node = node.next

    }

    newNode.next = node

    previous.next = &newNode

    list.numberItems += 1

    return nil // no error

    }

    ```


    A test is first performed on the value of `index` and an error returned if `index`
    is less than 0 or greater than the number of existing items in the list.


    As before, a new node is created with `item` and pointing to nil. If `index` is
    zero, new node is set to point to `list.first`. Then `list.first` is assigned
    to the address of new node.


    If index is not zero, a for-loop moves pointer `node` (initially assigned to `list.first`)
    to the next node location with a trailing node, `previous`, `index – 1` times.


    Then two link assignments are made. The new node is linked to `node`, and the
    `previous` node is assigned to the address of new node.


    Listing [6-12](#527841_1_En_6_Chapter.xhtml#PC22) presents the entire package
    `singlylinkedlist`, and Listing [6-13](#527841_1_En_6_Chapter.xhtml#PC23) shows
    a driver program that exercises all the methods defined in Listing [6-12](#527841_1_En_6_Chapter.xhtml#PC22).


    ```

    package main

    import (

    "fmt"

    "example.com/singlylinkedlist"

    )

    func main() {

    cars := singlylinkedlist.List[string]{}

    cars.Append("Honda")

    cars.InsertAt(0, "Nissan")

    cars.InsertAt(0, "Chevy")

    cars.InsertAt(1, "Ford")

    cars.InsertAt(1, "Tesla")

    cars.InsertAt(0, "Audi")

    cars.InsertAt(2, "Volkswagon")

    cars.Append("Volvo")

    fmt.Println(cars.Items())

    fmt.Println("Index of Tesla: ", cars.IndexOf("Tesla"))

    cars.RemoveAt(0)

    car, _ := cars.RemoveAt(3)

    fmt.Println("car removed is: ", car)

    fmt.Println(cars.Items())

    cars.RemoveAt(cars.Size() - 1)

    fmt.Println(cars.Items())

    cars.Append("Lexus")

    fmt.Println(cars.Items())

    fmt.Println("First car in the list is: ", cars.First().Item)

    fmt.Println("Last car in the list is: ", cars.Items()[cars.Size() - 1])

    }

    /* Output

    [Audi Chevy Volkswagon Tesla Ford Nissan Honda Volvo]

    Index of Tesla:  3

    car removed is:  Ford

    [Chevy Volkswagon Tesla Nissan Honda Volvo]

    [Chevy Volkswagon Tesla Nissan Honda]

    [Chevy Volkswagon Tesla Nissan Honda Lexus]

    First car in the list is:  Chevy

    Last car in the list is:  Lexus

    */

    Listing 6-13

    Main driver program for singlylinkedlist

    ```


    ```

    package singlylinkedlist

    import (

    "fmt"

    )

    type Ordered interface {

    ~string | ~int | ~float64

    }

    type Node[T Ordered] struct {

    Item T

    next *Node[T]

    }

    type List[T Ordered] struct {

    first       *Node[T]

    numberItems int

    }

    // Methods

    func (list *List[T]) Append(item T) {

    // Adds item to a new node at the end of the list

    newNode := Node[T]{item, nil}

    if list.first == nil {

    list.first = &newNode

    } else {

    last := list.first

    for {

    if last.next == nil {

    break

    }

    last = last.next

    }

    last.next = &newNode

    }

    list.numberItems += 1

    }

    func (list *List[T]) InsertAt(index int, item T) error {

    // Adds item to a new node at position index in the list

    if index < 0 || index > list.numberItems {

    return fmt.Errorf("Index out of bounds error")

    }

    newNode := Node[T]{item, nil}

    if index == 0 {

    newNode.next = list.first

    list.first = &newNode

    list.numberItems += 1

    return nil // No error

    }

    node := list.first

    count := 0

    previous := node

    for count < index {

    previous = node

    count++

    node = node.next

    }

    newNode.next = node

    previous.next = &newNode

    list.numberItems += 1

    return nil // no error

    }

    func (list *List[T]) RemoveAt(index int) (T, error) {

    // Removes item at position index in the list

    if index < 0 || index > list.numberItems {

    var zero T

    return zero, fmt.Errorf("Index out of bounds error")

    }

    node := list.first

    if index == 0 {

    toRemove := node

    list.first = toRemove.next

    list.numberItems -= 1

    return toRemove.Item, nil

    }

    count := 0

    previous := node

    for count < index {

    previous = node

    count++

    node = node.next

    }

    toRemove := node

    previous.next = toRemove.next

    list.numberItems -= 1

    return toRemove.Item, nil

    }

    func (list *List[T]) IndexOf(item T) int {

    node := list.first

    count := 0

    for {

    if node.Item == item {

    return count

    }

    if node.next == nil {

    return -1

    }

    node = node.next

    count += 1

    }

    }

    func (list *List[T]) ItemAfter(item T) T {

    // Scan list for the first occurence of item

    node := list.first

    for {

    if node == nil { // item not found

    var zero T

    return zero

    }

    if node.Item == item {

    break

    }

    node = node.next

    }

    return node.next.Item

    }

    func (list *List[T]) Items() []T {

    result := []T{}

    node := list.first

    for i := 0; i < list.numberItems; i++ {

    result = append(result, node.Item)

    node = node.next

    }

    return result

    }

    func (list *List[T]) First() *Node[T] {

    return list.first

    }

    func (list *List[T]) Size() int {

    return list.numberItems

    }

