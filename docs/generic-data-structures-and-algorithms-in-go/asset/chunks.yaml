    ## 11.6 Summary


    In this chapter, we defined a heap structure and presented an implementation.
    Building a heap from a slice of items guarantees that the largest item is in the
    root node. Every item in a heap is larger than its left and right child items.
    We used a heap to implement an efficient sorting algorithm. We also used a heap
    to implement a priority queue.


    In the next chapter, we introduce and implement red-black trees.


    # 12. Red-Black Trees


    In the previous chapter, we presented heap trees. These are close to fully balanced
    trees in which the largest item is always found in the root node and each node
    has a value greater than its children.


    In this chapter, we present another balanced tree structure, the red-black tree.
    Like the AVL tree presented in Chapter [10](#527841_1_En_10_Chapter.xhtml), the
    red-black tree data structure is aimed at efficient insertion, deletion, and searching
    of items stored in the tree.


    In the next section, we introduce red-black trees.


    ## 12.1 Red-Black Trees


    An interesting and important balanced binary search tree is the red-black tree.
    Rudolf Bayer invented this tree structure in 1972, ten years after the AVL tree
    was invented.


    Red-black trees, like AVL trees, are self-balancing. After an insertion or deletion,
    the resulting tree is a red-black tree. Like AVL trees, the computational complexity
    for insertion, deletion, or search is `O(log2 n)`.


    Insertion and deletion for red-black trees generally involve fewer rotational
    corrections, but the resulting tree is less balanced than an AVL tree. In applications
    that expect many insertions and deletions and fewer searches, red-black trees
    may be preferable to AVL trees.


    Because of the complexity of red-black trees, we limit ourselves in this chapter
    to implementing insertion into a red-black tree. The interested reader will find
    an implementation for deletion in Chapter [13](#527841_1_En_13_Chapter.xhtml)
    (page 545) of my book, *Modern Software Development Using C#.Net*, Thompson, 2006.


    ### Definition of Red-Black Tree


    A binary search tree is a red-black tree if


    1.  Every node is assigned a color of red or black.

    2.  The root node is always black.

    3.  The children of a red node are black.

    4.  Every path from the root node to a leaf node contains the same number of black
    nodes.


    ### Example of Red-Black Tree


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Figa_HTML.jpg)


    An illustration of binary tree structure, with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 130, dark, has 2 subtrees
    83 light and 175, light. Node 83 has 2 child 10, dark and 125, dark. Node 10 has
    a child 65, light. Node 175 has 2 child 150, dark and 250, dark. Node 250 has
    2 child 217, light and 270, light.


    In this ten-node red-black tree, every path from the root to a leaf node contains
    exactly two black nodes.


    Some terminologies we will use include **parent**, **grandparent**, and **uncle**.


    As an example, the parent of node 217 is 250. The uncle of 217 is 150 (sibling
    of parent). The grandparent of 217 is 175.


    In the next section, we discuss the logic of inserting an item into a red-black
    tree. We “walk” through an example in detail to illustrate the process.'
