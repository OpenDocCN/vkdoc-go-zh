    \n在处理 `words.txt` 文件中的每个单词时，我们通过按字母顺序排列该单词来计算键，然后检查该键是否已存在于我们的 map 中。如果存在，我们将正在处理的单词添加到与该键关联的值集合中。如果不存在，我们创建一个新的集合，并将\
    \ `<alphabetized(word), new collection>` 键-值对添加到我们的 map 中。\n\nmap 构建完成后，我们通过计算指定单词的键，然后从\
    \ map 中获取与该键关联的集合，来找到该单词的排列组合。\n\n我们首先定义一个全局变量 `dictionary`。\n\n```\nvar dictionary\
    \ map[string][]string\n```\n\n接下来，我们定义一个函数 `alphabetize`。\n\n```\nfunc alphabetize(word\
    \ string) string {\n    s := strings.Split(word, \"\")\n    sort.Strings(s)\n\
    \    return strings.Join(s, \"\")\n}\n```\n\n第一行创建一个字符数组。下一行对该数组进行原地排序。第三行将排序后的数组合并，形成最终的字符串。\n\
    \n函数 `buildDictionary` 创建一个 map，其中每个键代表一个按字母顺序排列的单词，每个值是能够按字母顺序排列为该键的单词切片。\n\n\
    该函数如下所示。\n\n```\nfunc buildDictionary() {\n    dictionary = make(map[string][]string)\n\
    \    file, err := os.Open(\"words.txt\")\n    if err != nil {\n        log.Fatalf(\"\
    failed opening file: %s\", err)\n    }\n    scanner := bufio.NewScanner(file)\n\
    \    scanner.Split(bufio.ScanLines)\n    var txtwords []string\n    for scanner.Scan()\
    \ {\n        txtwords = append(txtwords, scanner.Text())\n    }\n    file.Close()\n\
    \    for _, word := range txtwords {\n        alphabetized := alphabetize(word)\n\
    \        var lst []string\n        if len(dictionary) > 0 && len(dictionary[alphabetized])\
    \ > 0 {\n            lst = dictionary[alphabetized]\n        } else {\n      \
    \      lst = []string{}\n        }\n        lst = append(lst, word)\n        dictionary[alphabetized]\
    \ = lst\n    }\n}\n```\n\n`buildDictionary` 中处理文件的部分最为复杂。\n\n```\nfile, err :=\
    \ os.Open(\"words.txt\")\nif err != nil {\n    log.Fatalf(\"failed opening file:\
    \ %s\", err)\n}\nscanner := bufio.NewScanner(file)\nscanner.Split(bufio.ScanLines)\n\
    var txtwords []string\nfor scanner.Scan() {\n    txtwords = append(txtwords, scanner.Text())\n\
    }\nfile.Close()\n```\n\n使用导入的 `os` 包，打开一个包含单词的文本文件。通过在导入的 `bufio` 包上使用 `NewScanner`\
    \ 来定义一个 `scanner`。使用 `scanner.Scan()`，生成包含在 `words.txt` 文件中的单词切片。\n\n对该切片中的每个单词按字母顺序排列，然后将其添加到该键的现有\
    \ map 中，或者创建一个新键，并插入与该键关联的单词切片中的第一个值。\n\n清单 3-7 展示了该应用程序的完整源代码。\n\n```\npackage\
    \ main\n\nimport (\n    \"fmt\"\n    \"sort\"\n    \"strings\"\n    \"bufio\"\n\
    \    \"log\"\n    \"os\"\n)\n\nfunc init() {\n    buildDictionary()\n}\n\nvar\
    \ dictionary map[string][]string\n\nfunc alphabetize(word string) string {\n \
    \   s := strings.Split(word, \"\")\n    sort.Strings(s)\n    return strings.Join(s,\
    \ \"\")\n}\n\nfunc buildDictionary() {\n    dictionary = make(map[string][]string)\n\
    \    file, err := os.Open(\"words.txt\")\n    if err != nil {\n        log.Fatalf(\"\
    failed opening file: %s\", err)\n    }\n    scanner := bufio.NewScanner(file)\n\
    \    scanner.Split(bufio.ScanLines)\n    var txtwords []string\n    for scanner.Scan()\
    \ {\n        txtwords = append(txtwords, scanner.Text())\n    }\n    file.Close()\n\
    \    for _, word := range txtwords {\n        alphabetized := alphabetize(word)\n\
    \        var lst []string\n        if len(dictionary) > 0 && len(dictionary[alphabetized])\
    \ > 0 {\n            lst = dictionary[alphabetized]\n        } else {\n      \
    \      lst = []string{}\n        }\n        lst = append(lst, word)\n        dictionary[alphabetized]\
    \ = lst\n    }\n}\n\nfunc output(word string) {\n    wd := alphabetize(word)\n\
    \    fmt.Printf(\"Permutation group of %s is %s\", word, dictionary[wd])\n}\n\n\
    func main() {\n    output(\"parties\")\n}\n\n// Permutation group of parties is\
    \ [parties pastier piaster piastre pirates // raspite spirate tapiser traipse]\n\
    清单 3-7\n单词的排列组\n```\n\n## 3.6 总结\n\n本章我们重点讨论了抽象数据类型的实现。展示了实现此目标的两种方法。第一种方法使用接口来定义\
    \ ADT 所需的操作。第二种方法使用包来公开 ADT 所需的公共特性，同时隐藏内部特性。我们介绍了多态性这一重要概念。这允许运行时系统确定将哪个特定方法绑定到接收该方法的对象上，前提是该对象是实现了接口的类型。我们给出了几个面向对象编程的示例。\n\
    \n在下一章中，我们将通过展示“生命游戏”的实现，给出一个更大的面向对象编程示例。我们将使用一个第三方图形用户界面（GUI）包。\n\n# 4. ADT 实战：生命游戏\n\
    \n在上一章中，我们展示了如何实现抽象数据类型，以及如何在 Go 中进行面向对象编程。在本章中，我们将继续探索 Go 中的面向对象编程。我们将实现经典的“生命游戏”。我们将在实现中引入并使用一个第三方\
    \ GUI 包。\n\n在下一节中，我们将详细介绍“生命游戏”。\n\n## 4.1 游戏\n\n为了说明 ADT 在软件设计中可以发挥的核心作用，我们将探索由约翰·康威发明、并于\
    \ 1970 年由《科学美国人》杂志发表的“生命游戏”。该游戏是一个细胞自动机，设计、实现和观察都很有趣。\n\n除了展示 ADT 在该游戏设计中的核心作用外，我们还将介绍\
    \ Go 中的 `fyne` 图形用户界面（GUI）框架。\n\n我们从具有 R 行和 C 列的空网格开始。在随机位置创建活细胞簇。然后，网格演化的内部规则开始生效，用户可以每隔一秒观察一次连续网格的演化过程。\n"
- fmt: '### Rules of Grid Cell Evolution


    The rules of grid cell evolution to produce the next generation of grid cells
    are the following:


    1.  Any live cell that has zero or one neighbor dies (disappears from the grid
    in the next generation).

    2.  Any live cell with four or more neighboring live cells dies (disappears from
    the grid in the next generation).

    3.  Any live cell with two or three neighboring live cells survives to the next
    generation.

    4.  Any empty cell with exactly three live neighbors becomes a live cell in the
    next generation.


    Let us consider the evolution of the game starting with Figure [4-1](#527841_1_En_4_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig1_HTML.jpg)


    *A diagram of the initial configuration shows a square grid made up of 7 rows
    of 7 squares, each. Three squares in the third column are shaded starting from
    the second row. One square in the fifth column of the fourth row is shaded.*


    **Figure 4-1** Initial configuration


    The next iteration evolves into Figure [4-2](#527841_1_En_4_Chapter.xhtml#Fig2).


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig2_HTML.jpg)


    *A diagram of the first iteration shows a square grid made up of 5 rows of 6 squares,
    each. Two squares in the second row are shaded starting from the second column.
    One square in the fourth column of the third row is shaded.*


    **Figure 4-2** First iteration


    Here, two cells are brought to life (rightmost cell and leftmost cell), and one
    cell survives (second rightmost cell). The other cells die.


    Then the next iteration evolves into Figure [4-3](#527841_1_En_4_Chapter.xhtml#Fig3).


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig3_HTML.jpg)


    *A diagram of the second iteration shows a square grid made up of 5 rows of 5
    squares, each. Two squares in the third column are shaded starting from the second
    row.*


    **Figure 4-3** Second iteration


    And finally on the last iteration, the configuration evolves into Figure [4-4](#527841_1_En_4_Chapter.xhtml#Fig4).


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig4_HTML.jpg)


    *A diagram of the final iteration shows a square grid made up of 6 rows of 6 squares,
    each.*


    **Figure 4-4** Final iteration


    Very interesting patterns emerge as the Game of Life evolves. Sometimes, oscillations
    occur forever. Figures [4-5](#527841_1_En_4_Chapter.xhtml#Fig5) and [4-6](#527841_1_En_4_Chapter.xhtml#Fig6)
    provide an example.


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig6_HTML.jpg)


    *A diagram of the final configuration for oscillation shows a square grid made
    up of 13 rows of 13 squares, each. 3 squares are shaded in the 6th, 7th, and 8th
    columns of the third row. 3 squares are shaded in the 6th, 7th, and 8th columns
    of the ninth row. 3 squares are shaded in the 5th, 6th, and 7th rows of the fourth
    row. 3 squares are shaded in the 5th, 6th, and 7th rows of the tenth row.*


    **Figure 4-6** Final configuration for oscillation


    ![](images/527841_1_En_4_Chapter/527841_1_En_4_Fig5_HTML.jpg)


    *A diagram of the initial configuration for oscillation shows a square grid made
    up of 15 rows of 13 squares, each. Six squares in the seventh column are shaded
    starting from the fourth row to the sixth row and from the tenth row to the twelfth
    row. Six squares in the eighth row are shaded starting from the third column to
    the fifth column and from the ninth column to the eleventh column.*


    **Figure 4-5** Initial configuration for oscillation


    The pattern jumps back and forth from the first pattern to the second pattern
    as the game evolves.


    In the next section, we define an abstract data type (ADT) for grid.


    ## 4.2 ADT for Grid


    There are five operations that define the **Grid** ADT. These are given as follows:


    | The underlying grid has dimensions **<rows, cols>**. |

    | --- |

    | **Operations** |

    | `initializeGrid(rows, cols)` – Allocates storage for a grid with given rows
    and cols |

    | `bringAlive(row, col)` – Brings cell <row, col> to life |

    | `kill(row, col)` – Removes the cell <row, col> from the grid and makes it an
    empty cell |

    | `numberLiveNeighbors(row, col)` – Returns the number of live neighbors from
    grid position <row, col> |

    | `evolveGrid()` – Obtains the next grid based on the four rules of evolution
    |


    In the next section, we present a console-based implementation of the game.'
