    We utilize the `Shuffle` function from package `rand` by producing a random sequence
    of integers from 1 to `NUMCITIES`. We initialize the global `population` variable
    at each row with value 0 and then append the random sequence to this initial value.


    When we are done, each row of the population matrix contains a sequence of cities,
    each starting with city 0. When we compute the cost of each tour, we add the cost
    of going from the last city in the sequence back to city 0.


    The `Cost` function for a given tour (row of the population matrix) is the following:


    ```go

    func Cost(graph [][]float64, tour []int) float64 {

    result := 0.0

    for index := 0; index < len(tour) - 2; index++ {

    result += graph[tour[index]][tour[index+1]]

    }

    result += graph[tour[NUMCITIES - 1]][tour[0]]

    return result

    }

