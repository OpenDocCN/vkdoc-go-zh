    \ AVL 树。确定之后，该函数将返回在正确的树编号上调用 `Search` 方法的结果。\n\n### 比较三种集合实现\n\n清单 10-6 是一个驱动程序，用于执行比较集合构建时间以及（最重要的）判断值是否存在的耗时实验。为此，我们会访问数据集中的每一个元素，并判断它是否存在于我们正在计时的集合类型中。\n\
    \n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"math/rand\"\n\t\"time\"\n\t\"\
    example.com/floatset\"\n)\n\nconst (\n\tsize = 1_000_000\n)\n\nvar dataSet []float64\n\
    \nfunc main() {\n\tmySet := floatset.NewSet()\n\tdataSet = make([]float64, size)\n\
    \tfor i := 0; i < size; i++ {\n\t\tdataSet[i] = 100.0 * rand.Float64()\n\t}\n\n\
    \t// 计时 Set 的构建\n\tstart := time.Now()\n\tfor i := 0; i < size; i++ {\n\t\tmySet.Add(dataSet[i])\n\
    \t}\n\telapsed := time.Since(start)\n\tfmt.Printf(\"\\n 使用 %d 个元素构建 Set 耗时: %s\"\
    , size, elapsed)\n\n\t// 计时测试 dataSet 中所有元素是否存在\n\tstart = time.Now()\n\tfor i\
    \ := 0; i < len(dataSet); i++ {\n\t\tif !mySet.IsPresent(dataSet[i]) {\n\t\t\t\
    fmt.Println(\"%f 不存在\", dataSet[i])\n\t\t}\n\t}\n\telapsed = time.Since(start)\n\
    \tfmt.Printf(\"\\n 测试 Set 中所有元素是否存在耗时: %s\",\n\t\telapsed)\n\n\tavlSet := floatset.AVLTree{nil,\
    \ 0}\n\t// 计时 avlSet 的构建\n\tstart = time.Now()\n\tfor i := 0; i < size; i++ {\n\
    \t\tavlSet.Insert(dataSet[i])\n\t}\n\telapsed = time.Since(start)\n\tfmt.Printf(\"\
    \\n\\n 使用 %d 个元素构建 avlSet 耗时: %s\", size, elapsed)\n\n\t// 计时测试 avlSet 中所有元素是否存在\n\
    \tstart = time.Now()\n\tfor i := 0; i < len(dataSet); i++ {\n\t\tif !mySet.IsPresent(dataSet[i])\
    \ {\n\t\t\tfmt.Println(\"%f 不存在\", dataSet[0])\n\t\t}\n\t}\n\telapsed = time.Since(start)\n\
    \tfmt.Printf(\"\\n 测试 avlSet 中所有元素是否存在耗时: %s\",\n\t\telapsed)\n\n\t// 使用并发处理来构建并发\
    \ AVL 树\n\tstart = time.Now()\n\tfloatset.BuildConcurrentSet(dataSet)\n\telapsed\
    \ = time.Since(start)\n\tfmt.Printf(\"\\n\\n 使用 %d 个元素构建并发 (%d) avlSet 耗时: %s\"\
    , floatset.Concurrent, size, elapsed)\n\n\t// 对照并发集合测试 dataSet 中的每个元素\n\tstart\
    \ = time.Now()\n\tfor i := 0; i < len(dataSet); i++ {\n\t\tif !floatset.IsPresent(dataSet[i])\
    \ {\n\t\t\tfmt.Println(\"%f 不存在\", dataSet[i])\n\t\t}\n\t}\n\telapsed = time.Since(start)\n\
    \tfmt.Printf(\"\\n 测试并发 (%d) avlSet 中所有元素是否存在耗时: %s\", floatset.Concurrent, elapsed)\n\
    }\n\n/*\n在配备 32G 内存和 3.2 GHz 8 核 Intel Xeon W 的 iMac Pro 上\n使用 1000000 个元素构建 Set\
    \ 耗时: 184.442966ms\n测试 Set 中所有元素是否存在耗时: 105.600217ms\n\n使用 1000000 个元素构建 avlSet\
    \ 耗时: 819.517251ms\n测试 avlSet 中所有元素是否存在耗时: 103.422116ms\n\n使用 1000000 个元素构建并发\
    \ (32) avlSet 耗时: 184.681628ms\n测试并发 (32) avlSet 中所有元素是否存在耗时: 66.183935ms\n\n\
    在配备 32G 内存的 Apple M1 Max 的 iMac Pro 上\n使用 1000000 个元素构建 Set 耗时: 90.186209ms\n\
    测试 Set 中所有元素是否存在耗时: 44.667542ms\n\n使用 1000000 个元素构建 avlSet 耗时: 421.970625ms\n\
    测试 avlSet 中所有元素是否存在耗时: 39.154042ms\n\n使用 1000000 个元素构建并发 (32) avlSet 耗时: 172.478583ms\n\
    测试并发 (32) avlSet 中所有元素是否存在耗时: 47.972875ms\n*/\n```\n\n*清单 10-6：比较三种集合类型的性能*\n"
- fmt: '### Discussion of Results


    The program was run on two computers, and the results are surprising.


    On a 2017 iMac Pro with 32G of RAM and a 3.2-GHz 8-Core Intel Xeon W processor,
    the `concurrentAVLSet` turns in the fastest `isPresent` performance, faster than
    a single AVL tree and over twice as fast as the map implementation of set.


    On a MacBook Pro with 32G of unified RAM and an Apple M1 Max chip with 10-core
    CPU and 32-core GPU, the `concurrentAVLSet` turns in the slowest performance,
    and the single AVL tree turns in the fastest performance.


    It must be noted that all the set implementations on the Apple M1 Max computer
    are significantly faster than their corresponding execution times on the Intel
    Xeon W computer.


    It is therefore not clear whether the use of go-routines and concurrent processing
    in populating 32 AVL trees with the input data provides a meaningful benefit since
    the results are processor dependent.


    ## 10.4 Summary


    We presented the properties of an AVL tree. The operations of `Insert` and `Delete`
    preserve the AVL properties. We outlined the logic for performing these operations.
    Then we presented a package that includes these operations and examined the performance
    associated with constructing and searching an AVL tree. Finally, we presented
    three different implementations of a Set using a map, an AVL tree, and a concurrent
    AVL tree and compared their performance.


    In the next chapter, we focus on hash functions and hash tables along with several
    important applications.


    # 11. Heap Trees


    The previous chapter presented AVL trees. These trees are extremely useful when
    many fast lookups are needed.


    In this chapter, we present another important tree structure, `Heap`. A heap tree
    is another balanced tree type with the largest item in the tree always in the
    root of the tree. We use a heap tree to implement an efficient sorting algorithm.


    In the next section, we define heap tree and illustrate heap tree construction.


    ## 11.1 Heap Tree Construction


    A heap is a complete binary tree such that **each node has a value greater than
    its two children**. The largest value in a heap tree will always be in the root
    node. A complete tree has leaf nodes filled from left to right, all at the deepest
    level in the tree.


    Consider the heap tree shown in the following. Each node has a value greater than
    its two children.


    We wish to insert a new node with the value 90. See Figure [11-1](#527841_1_En_11_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_11_Chapter/527841_1_En_11_Fig1_HTML.jpg)


    An illustration of heap tree structure, presents max heap with number 100 on top,
    with three levels. Root node 100 has 2 subtrees 60 and 80. Left subtree: Node
    60 has 2 child nodes 50 and 30. Node 50 has 2 child nodes 10 and 35. Right subtree:
    Node 80 has 2 child nodes 75 and 40. The node 30 on the left subtree is has a
    new node value 90 inserted.


    Figure 11-1


    Insertion of 90


    We fill the leaf nodes from left to right, so node 90 needs to be the left node
    of 30. But 90 is larger than its parent 30. So we exchange the two nodes. See
    Figure [11-2](#527841_1_En_11_Chapter.xhtml#Fig2).


    ![](images/527841_1_En_11_Chapter/527841_1_En_11_Fig2_HTML.jpg)


    An illustration of heap tree structure, presents max heap with number 100 on top,
    with three levels. Root node 100 has 2 subtrees 60 and 80. Left subtree: Node
    60 has 2 child nodes 50 and 90. Node 50 has 2 child nodes 10 and 35. Node 90 has
    child node 30. Right subtree: Node 80 has 2 child nodes 75 and 40.


    Figure 11-2


    Insertion continued


    But 90 is larger than its parent 60, so we do another exchange producing the new
    heap tree that contains 90. See Figure [11-3](#527841_1_En_11_Chapter.xhtml#Fig3).


    ![](images/527841_1_En_11_Chapter/527841_1_En_11_Fig3_HTML.jpg)


    An illustration of heap tree structure, presents max heap with number 100 on top,
    with three levels. Root node 100 has 2 subtrees 90 and 80. Left subtree: Node
    90 has 2 child nodes 50 and 60. Node 50 has 2 child nodes 10 and 35. Node 60 has
    child node 30. Right subtree: Node 80 has 2 child nodes 75 and 40.


    Figure 11-3


    Result after insertion


    In the next section, we show how to perform deletion from a heap tree.


    ## 11.2 Deletion from a Heap Tree


    We can only delete the value in the root node of a heap tree. To delete the root
    node value 100, we replace the value in the root node with the value in the rightmost
    node on the lowest level of the tree, 30 in this case. Then we compare the new
    root value with the values of its two children, swapping with the larger of the
    children. We continue this sift-down process until there are no further nodes
    to swap. So 30 gets swapped with 90 (the largest of the children, 90 and 80);
    then 30 gets swapped with 60 (the larger of the two children, 50 and 60). This
    leads to the new heap tree shown in Figure [11-4](#527841_1_En_11_Chapter.xhtml#Fig4).


    ![](images/527841_1_En_11_Chapter/527841_1_En_11_Fig4_HTML.jpg)


    An illustration of heap tree structure, presents max heap with number 90 on top,
    with three levels. Root node 90 has 2 subtrees 60 and 80. Left subtree: Node 60
    has 2 child nodes 50 and 30. Node 50 has 2 child nodes 10 and 35. Right subtree:
    Node 80 has 2 child nodes 75 and 40.


    Figure 11-4


    Result after deletion


    In the next section, we examine the implementation details for building a generic
    heap tree from a slice of items and inserting a new item.


    ## 11.3 Implementation of a Heap Tree


    ### Logic for Building a Heap Tree


    The logic for building and inserting items in a heap tree flows from the following
    relationship between the `index` of an item in a slice and the location of that
    item in a heap tree. Suppose we have an item at a specified `index`.


    - Its parent is at location `index / 2` if index is odd and at location `index
    / 2 – 1` if index is even.

    - Its left child is at index `2 * index + 1`.

    - Its right child is at index `2 * index + 2`.


    Consider the slice `[90, 60, 80, 50, 30, 75, 40, 10, 35]` that corresponds to
    the preceding heap tree. The slice values relate to the values in the heap tree
    by traversing the values from left to right at each succeeding level in the tree.


    Consider the node with value 50 at index 3 in the slice.


    The parent is at index 3 / 2, which equals 1. This corresponds to the node with
    value 60. The two children are at index values 2 * 3 + 1 and 2 * 3 + 2 or indices
    7 and 8. This corresponds to the nodes with values 10 and 35.'
