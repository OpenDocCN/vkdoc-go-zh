    \ event at 115.93 - line size is: 5:\nDeparture event at 117.01 - line size is:\
    \ 4:\nArrival event at 119.26 - line size is: 5:\nArrival event at 120.21 - line\
    \ size is: 6:\nDeparture event at 124.32 - line size is: 5:\nDeparture event at\
    \ 129.74 - line size is: 4:\nDeparture event at 133.90 - line size is: 3:\nDeparture\
    \ event at 137.58 - line size is: 2:\nDeparture event at 140.13 - line size is:\
    \ 1:\nDeparture event at 147.02 - line size is: 0:\nline no longer empty at time:\
    \ 170.46\\. line size is 1\nArrival event at 170.87 - line size is: 2:\nArrival\
