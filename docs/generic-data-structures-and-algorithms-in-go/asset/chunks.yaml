  trans: "\n### 模拟逻辑\n\n让我们考察一个典型的事件序列，为构建模拟逻辑打下基础。`a`代表顾客到达时间。`d`代表顾客离开时间。队伍从左向右排列，因此最左边的顾客位于队首，将是下一个离开的顾客。\n\
    \n```\nt1\n0    a1                                       line: c1\nt2\n0    a1\
    \    a2                                 line: c1, c2\nt3\n0    a1    a2      \
    \       d1                  line: c2\n|  |\nt4\n0    a1    a2            d1  \
    \ a3              line: c2, c3\nt5\n0    a1    a2            d1     a3 d2    \
    \     line: c3\nt6\n0    a1    a2            d1     a3 d2    d3   line: empty\n\
    ```\n\n变量 `t`（时间）根据下一个事件——要么是到达，要么是离开——以离散的步长前进，因此得名离散事件模拟。\n\n对于所示的事件序列，顾客 1、2、3\
    \ 的等待时间如下：\n\n- 顾客 1: (`d1 – a1`)\n- 顾客 2: (`d2 – a2`)\n- 顾客 3: (`d3 – a3`)\n\n\
    队列时间如下：\n(`t2 – t1`) * 1 + (`t3 – t2`) * 2 + (`t4 – t3`) * 1 + (`t5 – t4`) * 2\
    \ + (`t6 – t5`) * 1\n\n平均队列大小：`queueTime / t6`.\n\n在每个事件（到达或离开）之后，队列时间通过计算新事件时间与上一事件时间的差值，并乘以当前队列大小来更新。如果下一个事件是离开，则移除队首顾客；将其\
    \ `departureTime – arrivalTime` 累加到等待时间中。如果下一个事件是到达，则将顾客插入队列。\n\n下一个到达时间是前一个到达时间加上到达间隔。下一个离开时间计算为顾客成为队首的时刻加上该顾客的服务时间。\n\
