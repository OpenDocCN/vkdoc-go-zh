    \ 213 17.5} {James 111 18.75}]\n*/\nListing 1-6\nBuilding and sorting slices of\
    \ students\n```\n\n### Map Functions\n\nMap functions in Go are commonplace and\
    \ perform a transformation in a slice to produce a new slice with the transformed\
    \ results. Consider this example:\n\n```\nfunc MyMap(input []int, f func(int)\
    \ int) []int {\nresult := make([]int, len(input))\nfor index, value := range input\
    \ {\nresult[index] = f(value)\n}\nreturn result\n}\nfunc main() {\nslice := []int{1,\
    \ 5, 2, 7, 4}\nresult := MyMap(slice, func(i int) int {\nreturn i * i\n})\nfmt.Println(result)\n\
    }\n/* Output\n[1 25 4 49 16]\n*/\n```\n\nThe ***MyMap*** function produces an\
    \ output slice containing the square of the integers contained in the input slice.\
    \ After declaring ***result*** to be a slice of **len(slice)** integers, it iterates\
    \ over the range of values in ***input***, transforming each value based on the\
    \ function ***f*** passed in to ***MyMap***.\n\n### Making MyMap Generic\n\n***MyMap***\
    \ can be made generic as follows:\n\n```\nfunc GenericMap[T1, T2 any](input []T1,\
    \ f func(T1) T2) []T2 {\nresult := make([]T2, len(input))\nfor index, value :=\
    \ range input {\nresult[index] = f(value)\n}\nreturn result\n}\n```\n\nFunction\
    \ ***GenericMap*** takes two generic parameters, ***T1*** and ***T2***. Using\
    \ the function ***f*** that is passed in, it transforms the data in the ***input***\
    \ slice to type ***T2***. Here, **T1** and **T2** are not constrained. They are\
    \ of type **any**.\n\n### Filter Functions\n\nFilter functions in Go are also\
    \ commonplace and perform a filtering operation on an input slice based on a function\
    \ passed in. Consider this example:\n\n```\nfunc MyFilter(input []float64, f func(float64)\
    \ bool) []float64 {\nvar result []float64\nfor _, value := range input {\nif f(value)\
    \ == true {\nresult = append(result, value)\n}\n}\nreturn result\n}\nfunc main()\
    \ {\ninput := []float64{17.3, 11.1, 9.9, 4.3, 12.6}\nres := MyFilter(input, func(num\
    \ float64) bool {\nif num <= 10.0 {\nreturn true\n}\nreturn false\n})\nfmt.Println(res)\n\
    }\n/* Output\n[9.9 4.3]\n*/\n```\n\nHere, any value in the input slice that is\
    \ less than or equal to 10.0 is retained, and all other values are filtered out.\n\
    \n### Making MyFilter Generic\n\n**MyFilter** can be made generic as follows:\n\
    \n```\nfunc GenericFilter[T any](input []T, f func(T) bool) []T {\nvar result\
    \ []T\nfor _, val := range input {\nif f(val) {\nresult = append(result, val)\n\
    }\n}\nreturn result\n}\n```\n\nIn Listing [1-7](#527841_1_En_1_Chapter.xhtml#PC15),\
    \ we exercise the generic map and filter functions.\n\n```\npackage main\nimport\
    \ (\n\"fmt\"\n)\nfunc GenericMap[T1, T2 any](input []T1, f func(T1) T2) []T2 {\n\
    result := make([]T2, len(input))\nfor index, value := range input {\nresult[index]\
    \ = f(value)\n}\nreturn result\n}\nfunc GenericFilter[T any](input []T, f func(T)\
    \ bool) []T {\nvar result []T\nfor _, val := range input {\nif f(val) {\nresult\
    \ = append(result, val)\n}\n}\nreturn result\n}\nfunc main() {\ninput := []float64{-5.0,\
    \ -2.0, 4.0, 8.0}\nresult1 := GenericMap[float64, float64](input, func(n float64)\
    \ float64 {\nreturn n * n\n})\nfmt.Println(result1)\ngreaterThanFive := GenericFilter[int]([]int{4,\
    \ 6, 5, 2, 20, 1, 7},\nfunc(i int) bool {\nreturn i > 5\n})\nfmt.Println(greaterThanFive)\n\
    oddNumbers := GenericFilter[int]([]int{4, 6, 5, 2, 20, 1, 7},\nfunc(i int) bool\
    \ {\nreturn i % 2 == 1\n})\nfmt.Println(oddNumbers)\nlengthGreaterThan3 := GenericFilter[string]([]string{\"\
    hello\", \"or\", \"the\", \"maybe\"}, func(s string) bool {\nreturn len(s) > 3\n\
    })\nfmt.Println(lengthGreaterThan3)\n}\n/* Output\n[25 4 16 64]\n[6 20 7]\n[5\
    \ 1 7]\n[hello maybe]\n*/\nListing 1-7\nUsing generic map and filter functions\n\
    ```\n\nWe now turn our attention to the use of concurrency.\n\n## 1.3 Concurrency\n\
    \nConcurrency allows a program to process multiple tasks at the same time (parallel\
    \ processing where each task is assigned to a separate processor) or what appears\
    \ to be at the same time where tasks are multiplexed so progress is made on all\
    \ tasks over time. If the multiplexing is very fast, it appears that the concurrent\
    \ processes are running at the same time but are run in overlapping periods of\
    \ time.\n\nIn most languages that support concurrent processing, the **thread**\
    \ construct is used to support concurrency. There is memory overhead associated\
    \ with a thread, so the number of threads that can be spawned at the same time\
    \ is limited."
