    Mark\")\n    hourlyWorker.SetLastName(\"Smith\")\n    hourlyWorker.SetRole(\"\
    软件开发者\")\n    hourlyWorker.SetHourlyWage(85.00)\n    fmt.Println(hourlyWorker.String())\n\
    }\n\n/*\n姓名：Helen Rose\n职位：技术负责人\n年薪：$125644.00\n\n姓名：Mark Smith\n职位：软件开发者\n时薪：$85.00\n\
    */\n```\n\n清单 3-4 — `Employee`和`PartTimeEmployee` ADT 的实践\n\n变量`person`和`hourlyWorker`的行为类似于传统面向对象编程（OOP）语言中的对象（类的实例）。方法在这些变量上被调用，就像在传统\
    \ OOP 语言中做的那样。\n\n在下一节中，我们将讨论 Go 中的多态（polymorphism）。这是面向对象编程的另一个基本支柱。\n\n# 3.3\
    \ 多态\n\n多态是面向对象编程的一个基本支柱。它允许在**运行时**对对象执行操作，而该操作基于**接收操作的对象类型**。\n\n在如 C#、Java\
    \ 和 Swift 等传统的强类型面向对象语言中，如果操作是在一个形式类型上声明的，而实际类型是某个派生类的实例，运行时系统会选择属于接收该消息的实际类型的方法。\n\
    \n这在 Go 中不可能发生，因为派生类（继承）在 Go 中并不存在。\n\n## 使用接口实现多态\n\n我们可以使用接口实现多态行为，如下一个示例（清单\
    \ 3-5）所示。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\n)\n\ntype FixedPriceJob\
    \ struct {\n    description string\n    fixedPrice float64\n}\n\ntype HourlyJob\
    \ struct {\n    description string\n    hourlyRate float64\n    numberHours int\n\
    }\n\ntype JobInterface interface {\n    Cost() float64\n    GetDescription() string\n\
    }\n\n// 隐式地将 FixedPriceJob 定义为实现了 JobInterface\nfunc (job FixedPriceJob) Cost()\
    \ float64 {\n    return job.fixedPrice\n}\n\nfunc (job FixedPriceJob) GetDescription()\
    \ string {\n    return job.description\n}\n\n// 隐式地将 HourlyJob 定义为实现了 JobInterface\n\
    func (hourlyJob HourlyJob) Cost() float64 {\n    return hourlyJob.hourlyRate *\
    \ float64(hourlyJob.numberHours)\n}\n\nfunc (hourlyJob HourlyJob) GetDescription()\
    \ string {\n    return hourlyJob.description\n}\n\nfunc TotalJobCost(jobs []JobInterface)\
    \ float64 {\n    result := 0.0\n    for _, job := range jobs {\n        result\
    \ += job.Cost()\n    }\n    return result\n}\n\nfunc main() {\n    job1 := FixedPriceJob{\"\
    外墙抹灰\", 34760.0}\n    job2 := HourlyJob{\"景观美化\", 40.0, 50}\n    jobs := []JobInterface{job1,\
    \ job2}\n    totalCost := TotalJobCost(jobs)\n    fmt.Printf(\"总工程成本：$%0.2f\"\
    , totalCost)\n}\n\n// 总工程成本：$36760.00\n```\n\n清单 3-5 — 多态的实践\n\n任何定义了与`JobInterface`中签名相匹配的方法的类型都隐式地实现了该接口。这就是我们在清单\
    \ 3-5 中所做的。我们在`FixedPriceJob`和`HourlyJob`上都定义了`Cost()`和`GetDescription()`方法。\n\
    \n在函数`TotalJobCost`中，我们输入了一个`JobInterface`类型的切片。我们遍历输入的工程范围，并通过在每个工程上调用`Cost()`方法来累加总成本。运行时系统根据接收此方法的工程类型（在此例中是`FixedPriceJob`还是`HourlyJob`）来绑定正确的`Cost()`方法。这就是多态在实践中的应用。\n\
