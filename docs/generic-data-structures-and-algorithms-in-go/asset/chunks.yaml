    # 18. 旅行商问题的分支定界解法\n\n前一章介绍了著名的**旅行商问题**，并给出了一种暴力求解方案。与所有该问题的精确解法一样，它在计算上是难以处理的。同时，还介绍了一个第三方包以及用于图形化显示\
    \ TSP 旅行路线的代码。\n\n本章将介绍另一种使用强大技术——分支定界——求解 TSP 的精确解法。该解法同样在计算上难以处理。\n\n下一节，我们将介绍分支定界技术，并展示如何将其应用于\
    \ TSP。\n\n## 18.1 用于 TSP 的分支定界法\n\n本章内容大部分基于本文作者于 2003 年发表在 *《Journal of Object\
    \ Technology》* 上的一篇论文。论文标题为“*Branch and Bound Implementation for the Traveling\
    \ Salesperson Problem*”（Richard Wiener, Journal of Object Technology, Vol 2. No.\
    \ 3, May–June 2003）。\n\n我们给定一个包含所有城市间距离的图（每个城市都与其他每个城市相连，边代表两城之间的距离）。图的节点是城市，编号为\
    \ 0, …, n - 1。一条旅行路线是指从城市 0 出发，恰好访问每个其他城市一次，并最终返回起点城市 0 的城市序列。\n\n**在任意旅行路线中，离开某城市时，所选择的边的权值必须大于或等于离开该城市的最短边的权值。**\n\
    \n这构成了 TSP 分支定界解法的基础。\n\n### 一个示例\n\n考虑一个具有如下距离矩阵（成本矩阵）的 TSP：\n\n```\n  0   14\
    \   4   11   20\n14    0   7    8    7\n4     7   0    7   16\n11    8   7   \
    \ 0    2\n20    7  16    2    0\n```\n\n我们按如下方式构建解树：\n\n在第 0 层，根节点表示部分路线 `[0]`。\n\
    \n在第 1 层，生成表示部分路线 `[0, 1]`、`[0, 2]`、`[0, 3]`、…、`[0, n - 1]` 的节点。\n\n在第 2 层，生成表示部分路线\
    \ `[0, 1, 2]`、`[0, 1, 3]`、`[0, 1, 4]`、… 的节点。\n\n依此类推，直到最底层，我们得到所有可能旅行路线的全部排列。\n\
    \n### 下界计算\n\n对于上述图中部分路线为 `[0]` 的根节点，离开五个顶点的成本下界为：\n\n城市 0：最小值 (14, 4, 11, 20)\
    \ = `4`。\n\n城市 1：最小值 (14, 7, 8, 7) = `7`。\n\n城市 2：最小值 (4, 7, 7, 16) = `4`。\n\n\
    城市 3：最小值 (11, 8, 7, 2) = `2`。\n\n城市 4：最小值 (20, 7, 16, 2) = `2`。\n\n因此，基于部分路线 `[0]`\
    \ 的 TSP 解的下界是这些值的和，即 `19`。\n\n现在，我们来计算部分路线 `[0, 2, 3]` 的下界。\n\n城市 0：`4`（因为路线包含\
    \ 0 -> 2）\n\n城市 1：`7`（不能触碰已存在于路线中的节点）\n\n城市 2：`7`（因为路线包含 2 -> 3）\n\n城市 3：`11`（因为路线包含\
    \ 3 -> 0）\n\n城市 4：`7`（不能触碰已存在于路线中的节点）\n\n因此，部分路线 `[0, 2, 3]` 的下界是这些值的和，等于 `36`。\n\
    \n计算部分路线下界的计算成本很低。\n\n在包含部分路线的树的任何一层中，节点都可以根据其计算出的下界进行排序。我们可以使用优先队列来维护树结构。\n\n\
    ### 分支定界算法\n\n- 为最佳旅行路线成本设置一个初始值。\n- 初始化一个优先队列（PQ）。\n- 生成第一个节点，其部分路线为 `[0]`，并计算其下界。\n\
    - 将此节点插入到 PQ 中。\n- 当 PQ 非空时，从 PQ 中取出第一个节点，并将其赋给父节点。\n- 如果它的下界 < 最佳旅行路线成本，则将其层级设置为父节点的层级\
    \ + 1。\n- 如果此层级为 N – 1（N 为城市数量），则将起始城市 0 添加到部分路线的末尾，并计算完整路线的成本。\n- 如果此完整路线的成本\
    \ < 最佳旅行路线成本，则更新最佳旅行路线成本，并保存最佳旅行路线。\n- 如果父节点的层级 + 1 不等于 N – 1，\n    - 对于所有满足 `1\
    \ <= i < N` 且 `i` 不在父节点部分路线中的 `i`，\n        - 将父节点的部分路线复制到新节点，并将 `i` 添加到该部分路线的末尾。\n\
    \        - 计算此新节点的下界。\n        - 如果此下界小于当前最佳旅行路线成本，则将此新节点插入优先队列；否则，剪掉此节点。\n\n\
    ### 优先队列\n\n在将节点插入 PQ 之前，会对其进行筛选，以确定其下界是否小于当前已知的最佳旅行路线成本。这有助于将 PQ 中的节点数控制在可管理的水平。\n\
    \n队列必须执行哪些优先级规则？\n\n在 PQ 中，处于更深层级（层级编号更高）的节点比处于更浅层级的节点具有更高的优先级。这确保了树向下生长，并且代表完整路线的叶节点能够尽快生成。在比较同一层级的两个节点时，优先考虑具有最小下界的节点。如果出现平局（两个节点具有相等的下界），则计算部分路线中城市编号的总和。总和较小的节点比总和较大的节点具有更高的优先级（平局不可能发生）。刚刚陈述的规则禁止两个不同的节点具有相等的优先级。\n\
    \n我们将遍历前面提到的五城示例的一部分，以了解优先队列是如何构建的。\n\n### 遍历前面提到的五城示例的一部分\n\n初始成本通过计算路线 `[0,\
    \ 1, …, n – 1, 0]` 的成本得到，其值为 `50`。由于前面显示根节点的下界为 19，因此我们将部分路线 `[0]` 推入 PQ。我们从 PQ\
    \ 中取出路线 `[0]`，并生成第 1 层的节点。除了一个节点外，所有节点的下界都小于 50，因此我们将它们推入 PQ。PQ 顶部是 `[0, 2]`，其下界为\
    \ 19。接下来是 `[0, 1]`，下界为 39，第三个是 `[0, 3]`，下界为 43。我们按照算法中的规定继续生成节点，如图 18-1 所示。\n\n\
    ![](img/527841_1_En_18_Fig1_HTML.png)\n\n图 18-1 部分解树\n\n完整路线 `[0, 2, 1, 3, 4]`\
    \ 是第一个被生成的。由于其成本小于当前最佳值 50，我们设定最佳路线为 `[0, 2, 1, 3, 4]`，其成本为 41。\n\nPQ 的前端包含节点\
    \ `[0, 2, 1, 4]`，因为它处于最深层。算法回溯到该节点，然后生成另一条完整路线 `[0, 2, 1, 4, 3]`，其成本也是 41。这使得一些节点在从\
    \ PQ 中取出时可以被剪掉，因为它们的下界大于 `41`。\n\n您可能希望继续处理这个示例的其余过程。\n\n下一节，我们将探讨该算法的实现。\n\n"
- fmt: '# 18.2 Branch-and-Bound Implementation


    One of the most important functions needed to support this branch-and-bound algorithm
    is the computation of a lower bound for a given tour. This function is as follows:


    ```

    func LowerBound(tour []int) float64 {

    edges := make([]float64, 0)

    sum := 0.0

    n := len(tour)

    for city := 0; city < n; city++ {

    pos := 0

    found := false

    for index := 0; index < n; index++ {

    if city == tour[index] {

    found = true

    pos = index

    break

    }

    }

    if n > 1 && found {

    if pos == n-1 {

    edges = append(edges,

    graph[city][0])

    } else {

    edges = append(edges,

    graph[city][tour[pos+1]])

    }

    break

    }

    found, _ = In(index, tour)

    if n == 1 || !found {

    // Don''t allow an index already in

    // tour

    edges = append(edges,

    graph[city][index])

    }

    }

    sum += Minimum(edges)

    edges = make([]float64, 0)

    }

    return sum

    }

    ```


    The function works exactly as specified in the outline of the algorithm presented
    in Section 18.1.


    A key support function is `In` given as follows:


    ```

    func In(value int, values []int) (bool, int) {

    // Returns true if value in values

    // Returns index of location or -1 if not found

    for index := 0; index < len(values); index++ {

    if values[index] == value {

    return true, index

    }

    }

    return false, -1

    }

    ```


    ## Implementation of Priority Queue


    The priority queue plays a central role in this algorithm. It stores nodes, each
    containing a tour, a lower bound, and a level with priorities defined as specified
    in Section 18.1 and repeated here for your convenience:


    - Nodes at a deeper level (higher level number) have priority over nodes at a
    shallower level in the PQ.

    - Priority is given to the node with the smallest lower bound if the nodes are
    at the same level.

    - If two nodes at the same level have the same lower bound, we add up the cities
    in the node’s tour, and the node with the higher sum has a higher priority.


    The code that supports the implementation of the priority queue is given as follows:


    ```

    type Node struct {

    tour       []int

    lowerBound float64

    level      int

    }

    type Nodes []Node

    // Allow nodes to be sorted

    func (nodes Nodes) Len() int {

    return len(nodes)

    }

    func (nodes Nodes) Swap(i, j int) {

    nodes[i], nodes[j] = nodes[j], nodes[i]

    }

    func (nodes Nodes) Less(i, j int) bool {

    if nodes[i].level > nodes[j].level {

    return true

    }

    if nodes[i].level == nodes[j].level &&

    nodes[i].lowerBound == nodes[j].lowerBound {

    // Return the smaller sum of cities

    tour1 := nodes[i].tour

    sum1 := 0

    for i := 0; i < len(tour1); i++ {

    sum1 += tour1[i]

    }

    tour2 := nodes[j].tour

    sum2 := 0

    for i := 0; i < len(tour2); i++ {

    sum2 += tour2[i]

    }

    return sum1 < sum2

    }

    if nodes[i].level == nodes[j].level &&

    nodes[i].lowerBound != nodes[j].lowerBound {

    return nodes[i].lowerBound <

    nodes[j].lowerBound

    }

    return false

    }

    type PriorityQueue struct {

    items Nodes

    }

    func NewPriorityQueue() PriorityQueue {

    return PriorityQueue{}

    }

    func (pq *PriorityQueue) Insert(node Node) {

    tourToInsert := DeepCopy(node.tour)

    nodeToInsert := Node{tourToInsert, node.lowerBound,

    node.level}

    pq.items = append(pq.items, nodeToInsert)

    sort.Sort(pq.items)

    }

    func (pq *PriorityQueue) Remove() Node {

    result := pq.items[0]

    pq.items = pq.items[1:]

    return result

    }

    ```


    The priority queue (PQ) holds entities of type `Node`. Each time we insert a new
    node into the queue, we sort the queue to ensure that the node with the highest
    priority is at the front of the queue.


    To enable the sorting of nodes in the PQ, we need to implement the interface to
    the `Sort` method from package `sort`.


    This is accomplished with the functions `Len`, `Swap`, and `Less` as given earlier.
    Each of the three priority rules is implemented in the function `Less`.


    The `Insert` function sorts the items (slice of `Node`) after appending the node
    being inserted.


    ## Generating Branch-and-Bound Solution


    The function that generates nodes according to the outline from Section 18.1,
    inserts them into the priority queue, finds best new tours, and backtracks while
    pruning nodes whose lower bound exceeds the known best tour to date is given as
    follows in function `TSP`:


    ```

    func TSP() {

    var elapsed time.Duration

    start := time.Now()

    bestTour := []int{}

    for i := 0; i < NUMCITIES; i++ {

    bestTour = append(bestTour, i)

    }

    pq := NewPriorityQueue()

    bestCost := LowerBound(bestTour)

    tour := []int{0}

    lowerBound := LowerBound(tour)

    node := Node{tour, lowerBound, 0}

    nodesGenerated += 1

    pq.Insert(node)

    for {

    if len(pq.items) == 0 {

    break

    }

    top := pq.Remove()

    topLevel := top.level

    topTour := top.tour

    // Generate nodes at topLevel + 1

    for i := 0; i < NUMCITIES; i++ {

    tour := DeepCopy(topTour)

    found, _ := In(i, topTour)

    if !found {

    tour = append(tour, i)

    nodesGenerated += 1

    if nodesGenerated %

    10_000_000 == 0 {

    fmt.Println("\nNodes generated (in

    millions): ", nodesGenerated /

    1_000_000)

    fmt.Printf("\n\nOptimum tour cost:

    %0.2f  \nBest tour: %v", bestCost,

    bestTour)

    elapsed = time.Since(start)

    seconds := elapsed / 1_000_000_000

    rate := float64(nodesGenerated) /

    float64(seconds)

    fmt.Printf("\nNodes generated per

    second: %0.0f  Length of PQ: %d

    Time elapsed: %v", rate,

    len(pq.items), elapsed)

    }

    if len(tour) == NUMCITIES {

    // A complete tour is obtained

    tourCost := LowerBound(tour)

    if tourCost < bestCost {

    bestTour = tour

    bestCost = tourCost

    fmt.Println("\n\nBest cost of

    tour so far: ", bestCost)

    }

    } else {

    tourCost := LowerBound(tour)

    if tourCost < bestCost {

    node := Node{tour, tourCost,

    topLevel + 1}

    pq.Insert(node)

    }

    }

    }

    }

    }

    fmt.Printf("\n\nOptimum tour cost: %0.2f  \nBest

    tour: %v  \nNodes generated: %d", bestCost,

    bestTour, nodesGenerated)

    }

    ```


