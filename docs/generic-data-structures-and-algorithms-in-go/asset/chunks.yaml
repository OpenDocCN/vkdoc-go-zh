    if data[index].Red == true {

    str += "(RED)"

    } else {

    str += "(BLACK)"

    }

    label, err :=

    plotter.NewLabels(plotter.XYLabels {

    XYs: []plotter.XY {

    {X: x ,Y: y},

    },

    Labels: []string{str},

    },)

    if err != nil {

    log.Fatalf("could not creates labels

    plotter: %+v", err)

    }

    p.Add(label)

    }

    path, _ = homedir.Dir()

    path += "/Desktop/GoDS/"

    err = p.Save(1000, 600, "tree.png")

    if err != nil {

    log.Panic(err)

    }

    DrawGraph(myApp, myWindow)

