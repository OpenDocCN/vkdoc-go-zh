  raw: 'So far, we have examined how the inputs to the network (a matrix of 150 test
    results, each test having two real numbers) produce 150 outputs.


    The magic of neural networks is the process of training the network. This means
    making modifications to the weight’s matrices (***weights1*** and ***weights2***
    in this case) and to lower the mean-squared average error between the computed
    output and the correct results (the **cost**).


    The process for achieving this is called **backpropagation**.


    The mathematics related to **backpropagation** is complex. See, for example, [`https://hmkcode.com/ai/backpropagation-step-by-step/`](https://hmkcode.com/ai/backpropagation-step-by-step/).


    Backpropagation involves taking partial derivatives of the cost with respect to
    each of the many weights. Each of these partial derivatives characterizes how
    the **cost** would be increased or decreased if a small change in a particular
    weight were made. If we knew the partial derivative for each of the weights, we
    could modify each weight with the goal of lowering the mean-squared error (the
    cost). The partial derivative would specify the direction and magnitude of the
    needed weight modification.


    Since this chapter aims at introducing the mechanics of neural networks, we will
    bypass the mathematics by estimating the partial derivatives empirically. The
    price we pay for this is performance. At each iteration of backpropagation, we
    need to evaluate the effect of changing each weight on the overall cost of the
    network output.


    ### Estimating the Partial Derivatives of Cost with Respect to Each Weight


    For each weight in ***weights1*** and ***weights2***, we add 0.01 or any other
    small amount to the weight. We compute the output of the network and its cost
    after making this change. The partial derivative of cost with respect to this
    weight is the ratio of the change in cost resulting from the tweak in the weight
    to the change in weight. If this ratio is positive, we save this positive partial
    derivative in a separate matrix with the same dimensions as the weight matrix.
    If the ratio is negative, we change the sign of the ratio and save it in the separate
    partial derivative matrix.


    After we have estimated and saved all the partial derivatives, we modify the entire
    ***weights1*** and ***weights2*** matrices by the partial derivative amounts.
    This represents the first iteration of training in the network.


    The function ***ComputeDerivatives***, shown in the following, performs the estimation
    of partial derivatives:


    ```

    func ComputeDerivatives() {

    // Estimates the partial derivative of the cost

    // with respect to each weight

    for row := 0; row < Inputs; row++ {

    for col := 0; col < HiddenLayer; col++ {

    output1 := FeedForward()

    c1 := cost(output1)

    weights1[row][col] += .01

    output2 := FeedForward()

    c2 := cost(output2)

    weights1[row][col] -= .01

    derivatives1[row][col] = (c2 - c1) / .01

    weights2[col][0] += .01

    output3 := FeedForward()

    c3 := cost(output3)

    weights2[col][0] -= .01

    derivatives2[col][0] = (c3 - c1) / .01

    }

    }

    }

    ```


    The function ***BackPropagate*** changes each weight, as shown, based on the values
    in the derivatives matrix.


    ```

    func BackPropagate() {

    ComputeDerivatives()

    // Modifiy weights1 and weights2

    for row := 0; row < Inputs; row++ {

    for col := 0; col < HiddenLayer; col++ {

    weights1[row][col] -=

    derivatives1[row][col]

    }

    }

    for row := 0; row < HiddenLayer; row++ {

    for col := 0; col < 1; col++ {

    weights2[row][col] -=

    derivatives2[row][col]

    }

    }

    }

    ```


    Finally, the function ***Train()*** iteratively modifies the weights with the
    goal of lowering the cost.


    ```

    func Train() {

    for epoch := 1; epoch < 1500; epoch++ {

    output := FeedForward()

    fmt.Println("cost = ", cost(output))

    BackPropagate()

    }

    }

    ```


