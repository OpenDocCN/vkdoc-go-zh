- fmt: '### Goroutine


    在开发 Go 语言时，Google 引入了一种名为 **goroutine** 的轻量级进程，它比线程所需的内存开销更少。其动机是能够同时处理来自多个网络浏览器的大量
    HTML 网页。


    Goroutine 是与其他函数并发运行的函数。当调用一个普通函数时，该函数完成其工作后，其下方的代码才会执行。当调用一个 goroutine 函数时，由于其与下方的代码并发运行，因此紧接其下的代码会立即执行。


    我们在清单[1-8](#527841_1_En_1_Chapter.xhtml#PC16)中对此进行了说明。


    ```go

    package main

    import (

    "fmt"

    "time"

    )

    func regularFunction() {

    fmt.Println("Just entered regularFunction()")

    time.Sleep(5 * time.Second)

    }

    func goroutineFunction() {

    fmt.Println("Just entered goroutineFunction()")

    time.Sleep(10 * time.Second)

    fmt.Println("goroutineFunction finished its work")

    }

    func main() {

    go goroutineFunction()

    fmt.Println("In main one line below goroutineFunction()")

    regularFunction()

    fmt.Println("In main one line below regularFunction()")

    }

    /* Output

    In main, one line below goroutineFunction()

    Just entered regularFunction()

    Just entered goroutineFunction()

    In main one line below regularFunction()

    */

    Listing 1-8

    Simple goroutine running concurrent with main

    ```


    当 `goroutineFunction` 通过 `go goroutineFunction()` 作为 goroutine 启动时，它会与 `main`
    函数（本身也是一个 goroutine）并发运行。第一行输出会立即出现，即使 `goroutineFunction` 需要十秒才能完成其工作。当接下来调用
    `regularFunction()` 时，需要经过五秒才会输出“In main, one line below regularFunction()”。`main`
    函数在输出此行后立即终止，导致程序在 `goroutineFunction` 完成其工作前结束。当程序结束时，`goroutineFunction` 会被中断并终止。


    如果将时间延迟互换，使得 `goroutineFunction` 有五秒延迟，而 `regularFunction` 有十秒延迟，输出将变为：


    ```

    In main one line below goroutineFunction()

    Just entered regularFunction()

    Just entered goroutineFunction()

    goroutineFunction finished its work

    In main, one line below regularFunction()

    ```


    现在，与 `main` 并发运行的 goroutine 在 `regularFunction` 和 `main` goroutine 退出前就完成了其工作。


    ### WaitGroup


    Go 提供了一种机制，允许在 `main` 退出之前，让多个 goroutine 全部完成其工作，同时终止未完成的 goroutine。


    我们引入 `sync` 包和 `WaitGroup` 结构，并在清单[1-9](#527841_1_En_1_Chapter.xhtml#PC18)中说明其用法。


    ```go

    package main

    import (

    "fmt"

    "time"

    "math/rand"

    "sync"

    )

    var wg sync.WaitGroup

    func outputStrings() {

    defer wg.Done()

    strings := [5]string{"One", "Two", "Three", "Four", "Five"}

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(strings[i])

    }

    }

    func outputInts() {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(i)

    }

    }

    func outputFloats() {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    delay := 1 + rand.Intn(3)

    time.Sleep(time.Duration(delay) * time.Second)

    fmt.Println(float64(i * i) + 0.5)

    }

    }

    func main() {

    wg.Add(3)

    go outputStrings()

    go outputInts()

    go outputFloats()

    wg.Wait()

    }

    /* Output

    One

    0.5


    Two

    1.5


    4.5


    Three

    Four


    9.5

    Five

    16.5

    */

    Listing 1-9

    The sync package and WaitGroup

    ```


    这个程序除了说明 `WaitGroup` 结构并展示三个 goroutine 并发运行外，没有做任何有用的事情。


    声明了一个类型为 `sync.WaitGroup` 的全局变量 `wg`。


    在 `main` 中，我们调用 `wg.Add(3)`。`main` 中的最后一行代码是 `wg.Wait()`。这会导致 `main` 暂停，直到 `wg`
    的值变为零。这确保所有三个 goroutine 在程序终止前完成其工作。


    在每个 goroutine 中，第一行代码 `defer wg.Done()` 会在 goroutine 完成其工作时，使全局变量 `wg` 的值递减。当
    `wg` 的值达到零时，`main` 函数才被允许退出。


    每次运行程序时生成的随机数序列是相同的，但输出序列每次运行都会变化。这是因为时间多路复用器每次运行程序时，都会为每个并发 goroutine 分配不同的执行时间片。程序第二次运行后的输出是：


    ```

    One


    0.5

    1.5

    Two


    4.5


    Three

    9.5

    16.5

    Four


    Five


    ```


    ### Channel


    我们经常希望能够同步 goroutine 的执行顺序，并让它们相互通信。我们引入强大的 **channel** 结构来实现这一点。


    考虑清单[1-10](#527841_1_En_1_Chapter.xhtml#PC20)中的 goroutine。


    ```go

    package main

    import (

    "fmt"

    "time"

    "sync"

    )

    var wg sync.WaitGroup

    func pingGenerator(c chan string) {

    defer wg.Done()

    for i := 0; i < 5; i++ {

    c <- "ping"

    time.Sleep(time.Second * 1)

    }

    }

    func output(c chan string) {

    defer wg.Done()

    for {

    value := <- c

    fmt.Println(value)

    }

    }

    func main() {

    c := make(chan string)

    wg.Add(2)

    go pingGenerator(c)

    go output(c)

    wg.Wait()

    }

    /* Output

    ping

    ping

    ping

    ping

    ping

    fatal error: all goroutines are asleep - deadlock!

    */

    Listing 1-10

    Deadlock

    ```


    `main` 中的第一行代码初始化了一个 channel `c`。Channel 必须使用 `make` 语句进行初始化后才能使用。


    与上一个清单类似，我们创建了一个初始值为 2 的 `WaitGroup` 变量 `wg`。


    接下来，我们启动两个 goroutine，`pingGenerator` 和 `output`，并将 channel 变量 `c` 传递给它们。


    `pingGenerator` goroutine 每秒将字符串“ping”分配给 channel 变量 `c`，共执行五次。从值“ping”到变量 `c`
    的左箭头表示将“ping”值分配给 `c`。


    要完成此分配，channel 必须为空。在 `output` goroutine 中，使用 `value := <- c` 对 `value` 进行赋值，只要
    `pingGenerator` 中一赋值给 channel 变量 `c`，`output` 就会立即取走它。这每秒发生一次。在 `pingGenerator`
    两次分配“ping”之间的时间内，`value` 的赋值会被阻塞。也就是说，在 `output` goroutine 中，执行会暂停，直到 channel
    中有信息可供赋值给 `value`。因此，两个 goroutine 都受到它们共有的 channel 变量 `c` 的影响。


    这里有一个问题。当 `pingGenerator` 发出其五个“ping”赋值（每个赋值都通过 `output` goroutine 显示在控制台上）后，它会一直阻塞，等待第六次
