    James\", 111, 18.75} )\nresult2 = addStudent(result2,  Student{\"Marsha\", 110,\
    \ 16.25} )\nPerformSort[Student](result2, func(s1, s2 Student) bool {\nreturn\
    \ s1.Age < s2.Age // comparing two Student values\n})\nfmt.Println(result2)\n\
