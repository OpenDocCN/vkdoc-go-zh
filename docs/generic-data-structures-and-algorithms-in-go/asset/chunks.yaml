    ## 2.1 Describing the Speed Efficiency of an Algorithm


    The normal practice in determining the efficiency of an algorithm is to estimate
    its performance as a function of problem size, asymptotically. That is, we are
    concerned with the speed of computation as the size of the problem becomes significant.
    In this section, we’ll introduce Big O notation and its application in algorithm
    design.


    ### Working with Big O


    **Big O** notation characterizes how the execution time of an algorithm grows
    as a function of problem size as the problem size becomes large. It is based on
    an analysis of how many basic operations such as assignment, swapping, and accessing
    a value are required to perform the task. Because of the requirement that the
    problem size must become large, big O is an asymptotic performance indicator.


    For example, suppose we were able to characterize the runtime of some algorithm
    as a function of problem size `n` as follows: `execution-time(n) = 12n² + 117n
    +25`.


    When `n` is large, the first term in the preceding expression dominates. We ignore
    the constant 12 and focus on the `n²`. This leads us to characterize the algorithm
    as `O(n²)`. For large `n`, if we were to double the value of `n`, the execution
    time would quadruple. This would not hold if `n` were small.


    Big O provides an asymptotic upper bound. The actual performance for large `n`
    (problem size) is bounded by the function inside the O notation. So `O(n)` implies
    that for large `n`, the algorithm’s execution time is bounded by `n` or is linear
    with respect to `n`.


    Algorithms with `O(2ⁿ)`, exponential complexity, are intractable. Likewise, algorithms
    of `O(n!)` are intractable. As the size of the problem, `n`, becomes large, the
    computation time becomes too great to provide any reasonable completion. We examine
    and tackle computationally intractable problems later in this book.


    We return to computationally tractable problems now and consider the following
    example. We wish to determine whether an array slice of floating-point numbers
    is sorted from smallest to largest.'
