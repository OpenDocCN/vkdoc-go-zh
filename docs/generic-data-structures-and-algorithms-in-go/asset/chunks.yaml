    to be within the table size using


    ```

    index := hash(word) % tableSize // Between 0 and tableSize - 1

    ```


    ### Load Factor


    The **load factor** of the table is the number of words in the table divided by
    the table size. Even if the load factor is less than 1, collisions may still occur
    because the hash function does not produce unique values for all input words.
    A table with many string slices (collision chains) at various index locations
    takes longer to access.


    ### Determining Whether a Key Is Present


    We next consider function ***IsPresent*** given as follows:


    ```

    func (table HashTable) IsPresent(word string) bool {

    index := hash(word) % tableSize // Between 0 and tableSize - 1

    // Search table[index] for word

    if table[index].word == word {

    return true

    }

    if len(table[index].list) > 0 {

    for i := 0; i < len(table[index].list); i++ {

    if table[index].list[i] == word {

    return true

    }

    }

    }

    return false

    }

    ```


    This function returns true if the input word is at location ***index*** or in
    a non-empty list rooted at ***index***.


