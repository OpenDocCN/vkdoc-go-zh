- fmt: '# 8.1 Binary Trees


    A binary tree is a specialized type of tree in which:


    - Every node has at most two children

    - The children are called `left` and `right`


    A binary tree with 7 nodes of height 5 with 3 leaf nodes is shown in Figure [8-1](#527841_1_En_8_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_8_Chapter/527841_1_En_8_Fig1_HTML.png)


    An illustration of a binary tree with 7 nodes and 5 levels. The root node A at
    level 1 is divided into nodes B and C at level 2. Node B at level 2 is further
    divided into node D which leads to node E at level 3. The node E at level 3 is
    further divided into nodes F and G at level 5.


    Figure 8-1


    Binary tree


    In contrast with trees in nature, the root of a binary tree is at the top of the
    structure, and the tree grows downward as more nodes are added. Leaf nodes have
    no children.


    In the next section, we look at three methods for traversing a binary tree.


    ## 8.2 Tree Traversal


    A tree traversal visits each node once operating on the data stored in each node.
    There are three traversals that we shall consider for binary trees: `inorder`,
    `preorder`, and `postorder`. Each of these traversals is defined recursively.
    We illustrate with the tree shown previously.


    ### Inorder Traversal


    Starting at the root, we descend left from A to B. We descend again left arriving
    at D. Then left again to E and finally again to F. No output has occurred yet.
    From F, we descend left only to find no left child. Then we backtrack and visit
    F. A visit could simply output the data stored in F or perform some operation
    on this data. We descend to the right of F again finding no right child. Having
    gone to F''s left and outputting F and F''s right, we backtrack to E. Having already
    gone to E''s left, we visit node E. We then descend to E''s right. We go left
    from G; then we visit G. We backtrack to D. We visit D. We backtrack to B. We
    visit B. We backtrack to A. Having gone to A''s left, we visit A. We descend to
    the right to node C. We go left. We visit C. We go right. We backtrack to A, and
    we are done.


    The sequence of visitation is therefore `F, E, G, D, B, A, C`.


    ### Preorder Traversal


    For this traversal, we visit node A first. A visit could simply output the data
    stored in A or perform some operation on this data. After visiting A, we descend
    to the left reaching node B. We visit node B. Then we descend to the left and
    visit node D. Then we descend to the left and visit node E. Then we descend to
    the left and visit node F. Since node F does not have a left child, and having
    visited node F, we descend to the right and visit node G. We backtrack up the
    tree to node A. Having already visited A, we descend to the right and visit node
    C. The sequence of visitation is therefore `A B D E F G C`.


    ### Postorder Traversal


    Here, the recursive sequence of operations is descend left, descend right, and
    then visit. See whether you agree that this produces the sequence of visitation
    `F G E D B C A` for the tree shown previously.


    In the next section, we implement a graphical depiction of a binary tree using
    the support of the third-party Fyne package.


    ## 8.3 Draw Tree


    We wish to be able to draw a binary tree using graphics from the `fyne` graphical
    user interface package. Such a drawing must show all tree nodes with their key
    values and lines connecting parent and child nodes with the level of each node
    respected in the drawing.


    Figure [8-2](#527841_1_En_8_Chapter.xhtml#Fig2) shows a screenshot of the tree
    constructed from the code that we present in this section. The base type assumed
    for the data in each node is a single-character string.


    ![](images/527841_1_En_8_Chapter/527841_1_En_8_Fig2_HTML.png)


    An illustration of a binary tree. Root node A is divided into B and C. Node B
    leads to D. Node D leads to E and H. Node E leads to F and G. Node C leads to
    I and J. Node I leads to K. Node K leads to L. Node L leads to M and N. Node M
    leads to R. Node N leads to O. Node O leads to P and Q.


    Figure 8-2


    Screenshot of a binary tree


    We simplify the explanation of the fairly complex draw-tree algorithm by first
    presenting a nongeneric version that uses `string` as the base type. In the next
    chapter, we present a generic version. Listing [8-1](#527841_1_En_8_Chapter.xhtml#PC1)
    presents the core data structures for drawing a binary tree.


    ```

    package main

    type BinaryTree struct {

    Root *Node

    NumNodes int

    }

    type Node struct {

    Value string

    Left *Node

    Right *Node

    }

    type nodePair struct {

    Val1, Val2 string

    }

    type nodePos struct {

    Val string

    YPos int

    XPos int

    }

    var data []nodePos         // Used to get node positions (Val, XPos, YPos)

    var endPoints []nodePair    // Used to plot lines

    Listing 8-1

    Core data structures for drawing a binary tree

    ```


    ### Binary Tree Structure


    `BinaryTree` is defined as a struct containing a `Root` field specified as a pointer
    to a `Node` and a field `NumNodes`, an `int`.


    `Node` is defined as a struct with a `Value` field of type `string` (later, it
    will be a generic type) and fields `Left` and `Right` each defined as a pointer
    to `Node`. A `Node` contains two recursive references to `Node` through `Left`
    and `Right` pointers.


    Type `nodePair` is defined as a struct containing fields `Val1` and `Val2` (`string`).
    Variable `endPoints` is defined as a slice of `nodePair` and is used to keep track
    of the end point values of the lines connecting nodes in the binary tree.


    Type `nodePos` is a struct containing `Val` (`string`) and `YPos` and `XPos` (`int`).
    Variable `data` is defined as a slice of `nodePos` and is used to define the position
    and value of each node to be graphed.


    ### Infrastructure Used to Display Binary Tree


    Listing [8-2](#527841_1_En_8_Chapter.xhtml#PC2) shows the support functions that
    set up the infrastructure to display the graphics of the binary tree.


    ```

    func prepareDrawTree(tree BinaryTree) {

    prepareToDraw(tree)

    fmt.Println(endPoints)

    fmt.Println(data)

    }

    func findXY(val string) (int, int) {

    for i := 0; i < len(data); i++ {

    if data[i].Val == val {

    return data[i].XPos, data[i].YPos

    }

    }

    return -1, -1

    }

    func findX(val string) int {

    for i := 0; i < len(data); i++ {

    if data[i].Val == val {

    return i

    }

    }

    return -1

    }

    func setXValues() {

    for index := 0; index < len(data); index++ {

    xValue := findX(data[index].Val)

    data[index].XPos = xValue

    }

    }

    func prepareToDraw(tree BinaryTree) {

    inorderLevel(tree.Root, 1)

    setXValues()

    getEndPoints(tree.Root, nil)

    }

    func inorderLevel(node *Node, level int) {

    if node != nil {

    inorderLevel(node.Left, level + 1)

    data = append(data, nodePos{node.Value, 100 - level, -1})

    inorderLevel(node.Right, level + 1)

    }

    }

    func getEndPoints(node *Node, parent *Node) {

    if node != nil {

    if parent != nil {

    endPoints = append(endPoints, nodePair{node.Value, parent.Value})

    }

    getEndPoints(node.Left, node)

    getEndPoints(node.Right, node)

    }

    }

