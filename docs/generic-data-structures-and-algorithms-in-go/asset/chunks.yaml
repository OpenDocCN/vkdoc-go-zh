  raw: '### Why T Is Declared As Ordered


    If you are wondering why we require **T** to be **Ordered**, rather than **any**,
    consider the statement ***if item != getZero[T]()*** in method ***Push***. The
    generic type, **T**, must be **Ordered** for this statement to be valid. That
    is, we need to be assured that two variables of type **T** can be compared. This
    is an unfortunate requirement fostered by this implementation since there is nothing
    intrinsic about the stack abstraction that requires the data being held to be
    ordered.


    When we create a stack of integers, the third value we push, value 0, is blocked
    from insertion onto the stack because it happens to be the “zero value” of type
    **int**.


    So this first implementation of generic stack using a slice to hold the data is
    seriously flawed.


    We examine a second implementation in Listing [5-2](#527841_1_En_5_Chapter.xhtml#PC2).


    ```

    package main

    import (

    "fmt"

    )

    type Stack[T any] struct {

    items []T

    }

    // Methods

    func (stack *Stack[T]) Push(item T) {

    // item is added to the right-most position in the

    // slice

    stack.items = append(stack.items, item)

    }

    func (stack *Stack[T]) Pop() T {

    length := len(stack.items)

    returnValue := stack.items[length - 1]

    stack.items = stack.items[:(length - 1)]

    return returnValue

    }

    func (stack Stack[T]) Top() T {

    length := len(stack.items)

    return stack.items[length - 1]

    }

    func (stack Stack[T]) IsEmpty() bool {

    return len(stack.items) == 0

    }

    func main() {

    // Create a stack of names

    nameStack := Stack[string]{}

    nameStack.Push("Zachary")

    nameStack.Push("Adolf")

    if !nameStack.IsEmpty() {

    topOfStack := nameStack.Top()

    fmt.Printf("\nTop of stack is %s", topOfStack)

    }

    if !nameStack.IsEmpty() {

    poppedFromStack := nameStack.Pop()

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    if !nameStack.IsEmpty() {

    poppedFromStack := nameStack.Pop()

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    if !nameStack.IsEmpty() {

    poppedFromStack := nameStack.Pop()

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    if !nameStack.IsEmpty() {

    poppedFromStack := nameStack.Pop()

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    // Create a stack of integers

    intStack := Stack[int]{}

    intStack.Push(5)

    intStack.Push(10)

    intStack.Push(0)

    if !intStack.IsEmpty() {

    top := intStack.Top()

    fmt.Printf("\nValue on top of intStack is %d", top)

    }

    if !intStack.IsEmpty() {

    popFromStack := intStack.Pop()

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    if !intStack.IsEmpty() {

    popFromStack := intStack.Pop()

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    if !intStack.IsEmpty() {

    popFromStack := intStack.Pop()

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    }

    /* Output

    Top of stack is Adolf

    Value popped from stack is Adolf

    Value popped from stack is Zachary

    Value on top of intStack is 0

    Value popped from intStack is 0

    Value popped from intStack is 10

    Value popped from intStack is 5

    */

    Listing 5-2

    Another slice implementation of generic stack

    ```


    In this second implementation, the parameter **T** is of type **any**, as it should
    be. The methods ***Top()*** and ***Pop()*** produce a fatal index violation error
    if an attempt is made to exercise either of these methods on an empty stack.


    The main driver illustrates the proper way to avoid this problem. Before invoking
    either of these methods, the stack is tested to see whether it is empty.


    Here, the stack was implemented in package **main**. Ordinarily, we would create
    a package **stack**, separate from the **main** package. We did it this way to
    keep things simple.


    In the next section, we present a **Node** implementation of a generic stack.


    ## 5.3 Node Implementation of a Generic Stack


    Listing [5-3](#527841_1_En_5_Chapter.xhtml#PC3) presents an alternative implementation
    of stack.


