- fmt: '# 7.5 Generic Set


    The Go language does not provide a `Set` data structure. In this section, we implement
    a generic `Set` data structure. A set stores unique values with ordering of the
    values.


    The operations that define a `Set` are the following:


    | `Insert(item)` – Adds `item` to the existing set if not already present |

    | `Delete(item)` – Removes `item` from the existing set if present |

    | `In(item)` – Returns `true` if `item` is in the existing set, otherwise returns
    `false` |

    | `Items()` – Returns a slice of items from the existing set |

    | `Size()` – Returns the number of items in the existing set |

    | `Union(set2)` – Returns all the unique items in the existing set and `set2`
    |

    | `Intersection(set2)` – Returns all the items in both the existing set and `set2`
    |

    | `Difference(set2)` – Returns the items in the existing set, not in `set2` |

    | `Subset(set2)` – Returns `true` if all the items in `set2` are in `set1`, otherwise
    `false` |


    In our package `set`, we define generic type `Set` as follows:


    ```

    package set

    type Ordered interface {

    ~string | ~int | ~float64

    }

    type Set[T Ordered] struct {

    items map[T]bool

    }

    ```


    Here, we define the `items` field of `Set` as a `map` with generic parameter `T`
    of type `Ordered`.


    The `map` structure in Go requires that the key value type be ordered.


    The `Insert` method is implemented as follows:


    ```

    // Add item to set

    func (set *Set[T]) Insert(item T) {

    if set.items == nil {

    set.items = make(map[T]bool)

    }

    // Prevent duplicate entry

    _, present := set.items[item]

    if !present {

    set.items[item] = true

    }

    }

    ```


    We first determine whether the `set` is empty, in which case `set.items` would
    be `nil`. In this case, we initialize the `map` using `make`.


    To prevent a duplicate entry, which is not legal in a set, we test to see whether
    `item` is already in the `set`. If not, we assign `item` to the `set.items` map.


    The `Delete` method is implemented as follows:


    ```

    // Remove item from set

    func (set *Set[T]) Delete(item T) {

    _, present := set.items[item]

    if present {

    delete(set.items, item)

    }

    }

    ```


    If the `item` is present, we delete it from the `set.items` map.


    The `In` method is implemented as follows:


    ```

    // Return true if item is in set, otherwise false

    func (set *Set[T]) In(item T) bool {

    _, present := set.items[item]

    return present

    }

    ```


    We return `true` if `item` is in the `set.items` map, otherwise `false`.


    The `Items` method is implemented as follows:


    ```

    // Return a slice of all the items in set

    func (set *Set[T]) Items() []T {

    items := []T{}

    for item := range set.items {

    items = append(items, item)

    }

    return items

    }

    ```


    We initialize an empty slice of type `T`. We iterate through the range of the
    `set.items` map and append each `item` to `items` which we return.


    The complete package `set` is presented in Listing [7-6](#527841_1_En_7_Chapter.xhtml#PC20).
    The other methods are equally straightforward.


    ```

    package set

    type Ordered interface {

    ~string | ~int | ~float64

    }

    type Set[T Ordered] struct {

    items map[T]bool

    }

    // Methods

    // Add item to set

    func (set *Set[T]) Insert(item T) {

    if set.items == nil {

    set.items = make(map[T]bool)

    }

    // Prevent duplicate entry

    _, present := set.items[item]

    if !present {

    set.items[item] = true

    }

    }

    // Remove item from set

    func (set *Set[T]) Delete(item T) {

    _, present := set.items[item]

    if present {

    delete(set.items, item)

    }

    }

    // Return true if item is in set, otherwise false

    func (set *Set[T]) In(item T) bool {

    _, present := set.items[item]

    return present

    }

    // Return a slice of all the items in set

    func (set *Set[T]) Items() []T {

    items := []T{}

    for item := range set.items {

    items = append(items, item)

    }

    return items

    }

    // Return the number of items in set

    func (set *Set[T]) Size() int {

    return len(set.items)

    }

    // Return a new set containing all the unique items of set and set2

    func (set *Set[T]) Union(set2 Set[T]) *Set[T] {

    result := Set[T]{}

    result.items = make(map[T]bool)

    for index := range set.items {

    result.items[index] = true

    }

    for j := range set2.items {

    _, present := result.items[j]

    if !present {

    result.items[j] = true

    }

    }

    return &result

    }

    // Return a new set containing the items found in both set and set2

    func (set *Set[T]) Intersection(set2 Set[T]) *Set[T] {

    result := Set[T]{}

    result.items = make(map[T]bool)

    for i := range set2.items {

    _, present := set.items[i]

    if present {

    result.items[i] = true

    }

    }

    return &result

    }

    // Return a new set of items in set not found in set2

    func (set *Set[T]) Difference(set2 Set[T]) *Set[T] {

    result := Set[T]{}

    result.items = make(map[T]bool)

    for i := range set.items {

    _, present := set2.items[i]

    if !present {

    result.items[i] = true

    }

    }

    return &result

    }

    // Return true if all items of set2 are in set

    func (set *Set[T]) Subset(set2 Set[T]) bool {

    for i := range set.items {

    _, present := set2.items[i]

    if !present {

    return false

    }

    }

    return true

    }

    Listing 7-6

    Package set

    ```


    Listing [7-7](#527841_1_En_7_Chapter.xhtml#PC21) presents a main driver test program
    that exercises the methods of package `set`.


    ```

    package main

    import (

    "example.com/set"

    "fmt"

    )

    func main() {

    set1 := set.Set[int]{}

    set1.Insert(3)

    set1.Insert(5)

    set1.Insert(7)

    set1.Insert(9)

    set2 := set.Set[int]{}

    set2.Insert(3)

    set2.Insert(6)

    set2.Insert(8)

    set2.Insert(9)

    set2.Insert(11)

    set2.Delete(11)

    fmt.Println("Items in set2: ", set2.Items())

    fmt.Println("5 in set1: ", set1.In(5))

    fmt.Println("5 in set2: ", set2.In(5))

    fmt.Println("Union of set1 and set2: ", set1.Union(set2).Items())

    fmt.Println("Intersection of set1 and set2: ",

    set1.Intersection(set2).Items())

    fmt.Println("Difference of set2 with respect to set1: ",

    set2.Difference(set1).Items())

    fmt.Println("Size of this difference: ", set1.Intersection(set2).Size())

    }

    /* Output

    Items in set2: [6 8 9 3]

    5 in set1:  true

    5 in set2:  false

    Union of set1 and set2: [9 3 5 7 6 8]

    Intersection of set1 and set2: [3 9]

    Difference of set2 with respect to set1: [6 8]

    Size of this difference:  2

    */

    Listing 7-7

    Main driver to exercise set package

    ```


    ## 7.6 Summary


    We examined hash functions and hash tables in this chapter. We saw that hash tables
    using the standard `map` data structure are extremely efficient in searching an
    unordered collection. We looked at the classic Rabin-Karp for efficiently searching
    a string for a pattern. This algorithm uses a rolling hash function. Finally,
    we implemented a `Set` using a hash map.


    In the next chapter, we turn our attention to Tree data structures. This is the
    first of several chapters that focus on binary trees.


    # 8. Binary Trees


    In the previous chapter, we examined hash functions and hash tables and looked
    at several applications including string searching and the implementation of a
    `Set` that utilizes hashing.


    In this chapter, we turn our attention to `Tree` structures. This is the first
    of several chapters that focus on trees. We introduce binary trees in this chapter.
    We look at mechanisms for traversing a binary tree. We tackle the challenging
    problem of graphically displaying a binary tree. To do this, we again use the
    third-party Fyne package to obtain the resources needed for such graphics.


    In the next section, we define a binary tree.'
