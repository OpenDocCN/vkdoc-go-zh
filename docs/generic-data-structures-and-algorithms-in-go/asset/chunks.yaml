- fmt: '# Use a `quit` Channel to Avoid Using `WaitGroup`


    We can use a `quit` channel to block `main` from exiting and avoid the use of
    `WaitGroup` as shown in Listing 1-11.


    ```

    package main

    import (

    "fmt"

    "time"

    )

    var quit chan bool

    func pingGenerator(c chan string) {

    for i := 0; i < 5; i++ {

    c <- "ping"

    time.Sleep(time.Second * 1)

    }

    }

    func output(c chan string) {

    for {

    select {

    case value := <- c:

    fmt.Println(value)

    case <-time.After(3 * time.Second):

    fmt.Println("Program timed out.")

    quit <- true

    }

    }

    }

    func main() {

    quit = make(chan bool)

    c := make(chan string)

    go pingGenerator(c)

    go output(c)

    <- quit

    }

    /* Output

    ping

    ping

    ping

    ping

    ping

    Program timed out.

    */

    Listing 1-11

    Using a quit channel instead of WaitGroup

    ```


    The `quit` channel is initialized as the first line of code in `main`. The last
    line of code in `main`, `<- quit`, blocks `main` from ending until a Boolean value
    is assigned to `quit`. This occurs in the second case statement in goroutine `output`.


    This mechanism for controlling the end of the program is simpler and less encumbered
    than using `WaitGroup`.


    We add the inevitable `pongGenerator` to this program.


    ## Channel Direction


    Channel direction can be added to a goroutine signature as shown in Listing 1-12.
    An arrow pointing to the `chan` from the right, as shown in the signatures to
    `pingGenerator` and `pongGenerator`, requires the goroutine to assign to the channel
    (a generator). An arrow to the left of `chan` and pointing to the channel variable
    requires the goroutine to only consume values in the channel.


    If an attempt is made to send information to the channel when it is specified
    as a consumer, or if an attempt is made to access information from the channel
    in the case that it is specified as a generator, a compiler error will occur.


    ```

    package main

    import (

    "fmt"

    "time"

    )

    var quit chan bool

    func pingGenerator(c chan<- string) {

    // The channel can only be sent to - a generator

    for i := 0; i < 5; i++ {

    c <- "ping"

    }

    }

    func pongGenerator(c chan<- string) {

    // Information can only be sent to the channel - a generator

    for i := 0; i < 5; i++ {

    c <- "pong"

    }

    }

    func output(c <- chan string) {

    // Information can only be received from the channel - a consumer

    for {

    time.Sleep(time.Second * 1)

    select {

    case value := <- c:

    fmt.Println(value)

    case <-time.After(3 * time.Second):

    fmt.Println("Program timed out.")

    quit <- true

    }

    }

    }

    func main() {

    quit = make(chan bool)

    c := make(chan string)

    go pingGenerator(c)

    go pongGenerator(c)

    go output(c)

    <- quit

    }

    /* Output

    ping

    pong

    ping

    pong

    ping

    pong

    ping

    pong

    ping

    pong

    Program timed out.

    */

    Listing 1-12

    Ping pong using direction channels in goroutine signatures

    ```


    We have moved the one-second time delay into the `output` goroutine. This allows
    the ping and pong generators to alternate since each assignment to the channel
    blocks alternately until the channel is read by the consuming `output` goroutine.


    ## Race Condition


    A pervasive problem using concurrency is race condition. This problem occurs when
    two or more goroutines modify the same shared data.


    A simple example is presented in Listing 1-13.


    ```

    package main

    import (

    "fmt"

    "sync"

    )

    const (

    number = 1000

    )

    var countValue int

    func main() {

    var wg sync.WaitGroup

    wg.Add(number)

    for i := 0; i < number; i++ {

    go func() {

    countValue++

