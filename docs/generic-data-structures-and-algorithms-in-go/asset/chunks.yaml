  trans: '

    ### 网格细胞演化规则


    生成下一代网格细胞的演化规则如下：


    1.  任何拥有零个或一个邻居的活细胞都会死亡（在下一代中从网格中消失）。

    2.  任何拥有四个或更多活邻居的活细胞都会死亡（在下一代中从网格中消失）。

    3.  任何拥有两个或三个活邻居的活细胞都会存活到下一代。

    4.  任何恰好拥有三个活邻居的空细胞都会在下一代变为活细胞。


    让我们从图 4-1 开始考虑游戏的演化。


    ![](img/527841_1_En_4_Fig1_HTML.jpg)


    *初始配置示意图显示了一个由 7 行 7 列方格组成的正方形网格。从第二行开始的第三列中有三个方格被着色。第四行第五列中有一个方格被着色。*


    **图 4-1** 初始配置


    下一代演化成图 4-2。


    ![](img/527841_1_En_4_Fig2_HTML.jpg)


    *第一次迭代示意图显示了一个由 5 行 6 列方格组成的正方形网格。从第二列开始的第二行中有两个方格被着色。第三行第四列中有一个方格被着色。*


    **图 4-2** 第一次迭代


    在此，两个细胞被激活（最右边的细胞和最左边的细胞），一个细胞存活下来（右起第二个细胞）。其他细胞则死亡。


    然后，下一代演化成图 4-3。


    ![](img/527841_1_En_4_Fig3_HTML.jpg)


    *第二次迭代示意图显示了一个由 5 行 5 列方格组成的正方形网格。从第二行开始的第三列中有两个方格被着色。*


    **图 4-3** 第二次迭代


    最后，在最后一次迭代中，配置演化成图 4-4。


    ![](img/527841_1_En_4_Fig4_HTML.jpg)


    *最终迭代示意图显示了一个由 6 行 6 列方格组成的正方形网格。*


    **图 4-4** 最终迭代


    随着生命游戏的演化，会出现非常有趣的模式。有时，振荡会永远持续下去。图 4-5 和图 4-6 提供了一个示例。


    ![](img/527841_1_En_4_Fig6_HTML.jpg)


    *振荡最终配置示意图显示了一个由 13 行 13 列方格组成的正方形网格。第三行的第 6、7、8 列中有 3 个方格被着色。第九行的第 6、7、8 列中有
    3 个方格被着色。第四行的第 5、6、7 行中有 3 个方格被着色。第十行的第 5、6、7 行中有 3 个方格被着色。*


    **图 4-6** 振荡的最终配置


    ![](img/527841_1_En_4_Fig5_HTML.jpg)


    *振荡初始配置示意图显示了一个由 15 行 13 列方格组成的正方形网格。从第四行到第六行以及从第十行到第十二行的第七列中有六个方格被着色。从第三列到第五列以及从第九列到第十一列的第八行中有六个方格被着色。*


    **图 4-5** 振荡的初始配置


    随着游戏的演化，该模式会在第一个图案和第二个图案之间来回跳变。


    下一节，我们将为网格定义一个抽象数据类型（ADT）。


    ## 4.2 网格的 ADT


    定义**网格** ADT 需要五个操作。具体如下：


    | 底层网格的维度为 **<行数, 列数>**。 |

    | --- |

    | **操作** |

    | `initializeGrid(rows, cols)` – 为给定行数和列数的网格分配存储空间 |

    | `bringAlive(row, col)` – 激活指定 <行, 列> 位置的细胞 |

    | `kill(row, col)` – 从网格中移除指定 <行, 列> 位置的细胞，使其变为空细胞 |

    | `numberLiveNeighbors(row, col)` – 返回网格中 <行, 列> 位置的活邻居数量 |

    | `evolveGrid()` – 基于四条演化规则获取下一个网格 |


    下一节，我们将介绍该游戏的基于控制台的实现。

    '
- fmt: '# 4.3 Console Implementation of the Game


    In this section, we implement the ADT defined in Section 4.2 and enable a stepwise
    console output.


    The ADT defined is implemented using the following methods with `g` of type `Grid`,
    the receiver:


    ```

    type Grid [][]bool

    func (g *Grid) initializeGrid(r, c int)

    func (g Grid) bringAlive(row, col int)

    func (g Grid) kill(row, col int)

    func (g Grid) numberLiveNeighbors(row, col int) int

    func (g Grid) evolveGrid()

    ```


    The method `initializeGrid` is implemented as follows:


    ```

    func (g *Grid) initializeGrid(r, c int) {

    rows = r

    cols = c

    *g = make([][]bool, rows)

    for row := 0; row < rows; row++ {

    (*g)[row] = make([]bool, cols)

    }

    }

    ```


    The global variables `rows` and `cols` are assigned to the input parameters `r`
    and `c`. Storage is allocated to hold `rows` of data. For each `row`, storage
    is allocated to hold `cols` of data.


    Because the receiver is a pointer to `Grid`, the receiver, `grid`, is initialized
    in place.


    The function `numberLiveNeighbors` is implemented in the following. Although the
    details are somewhat tedious, they are straightforward.


    ```

    func (g Grid) numberLiveNeighbors(row, col int) int {

    result := 0

    if row > 0 && g[row - 1][col] == true {

    result++

    }

    if row > 0 && col < len(g[row]) - 1 && g[row - 1][col + 1] == true {

    result++

    }

    if col < len(g[row]) - 1 && g[row][col + 1] == true {

    result++

    }

    if row < len(g) - 1 && col < len(g[row]) - 1 && g[row + 1][col + 1] == true {

    result++

    }

    if row < len(g) - 1 && g[row + 1][col] == true {

    result++

    }

    if row < len(g) - 1 && col > 0 && g[row + 1][col - 1] == true {

    result += 1

    }

    if col > 0 && g[row][col - 1] == true {

    result += 1

    }

    if row > 0 && col > 0 && g[row - 1][col - 1] == true {

    result += 1

    }

    return result

    }

    ```


    The method `evolveGrid` implements the business logic – the four rules that specify
    how the game evolves. This method is implemented as follows:


    ```

    func (g Grid) evolveGrid() {

    Copy(newGrid, g)

    for row := 0; row < rows; row++ {

    for col := 0; col < cols; col++ {

    liveN := g.numberLiveNeighbors(row, col)

    // Rule 1 & 3

    if g[row][col] == true && (liveN < 2 || liveN > 3) {

    newGrid[row][col] = false

    }

    // Rule 2

    if g[row][col] == true && (liveN == 2 || liveN == 3) {

    newGrid[row][col] = true

    }

    // Additional rule for underpopulation/overcrowding

    if g[row][col] == true && (liveN < 2 || liveN >= 4) {

    newGrid[row][col] = false

    }

    // Rule 4

    if g[row][col] == false && liveN == 3 {

    newGrid[row][col] = true

    }

    }

    }

    Copy(g, newGrid)

    }

    ```


    A locally created `newGrid` is used and initialized to the receiver, `g`. The
    number of live neighbors is computed, and in the next two `if` clauses, the rules
    for a live cell being killed or an empty cell coming alive are exercised.


    At the end, the locally created `newGrid` is copied back to the receiver, `g`.


    Listing [4-1](#527841_1_En_4_Chapter.xhtml#PC5) puts the pieces together along
    with a main driver and shows the output for a specified input.


    ```

    package main

    import (

    "fmt"

    "time"

    )

    var (

    rows int

    cols int

    )

    type Grid [][]bool

    var grid Grid

    var newGrid Grid

    func (g *Grid) initializeGrid(r, c int) {

    rows = r

    cols = c

    *g = make([][]bool, rows)

    for row := 0; row < rows; row++ {

    (*g)[row] = make([]bool, cols)

    }

    }

    func (g Grid) bringAlive(row, col int) {

    g[row][col] = true

    }

    func (g Grid) kill(row, col int) {

    g[row][col] = false

    }

    func (g Grid) numberLiveNeighbors(row, col int) int {

    result := 0

    if row > 0 && g[row - 1][col] == true {

    result++

    }

    if row > 0 && col < len(g[row]) - 1 && g[row - 1][col + 1] == true {

    result++

    }

    if col < len(g[row]) - 1 && g[row][col + 1] == true {

    result++

    }

    if row < len(g) - 1 && col < len(g[row]) - 1 && g[row + 1][col + 1] == true {

    result++

    }

    if row < len(g) - 1 && g[row + 1][col] == true {

    result++

    }

    if row < len(g) - 1 && col > 0 && g[row + 1][col - 1] == true {

    result += 1

    }

    if col > 0 && g[row][col - 1] == true {

    result += 1

    }

    if row > 0 && col > 0 && g[row - 1][col - 1] == true {

    result += 1

    }

    return result

    }

    func (g Grid) evolveGrid() {

    Copy(newGrid, g)

    for row := 0; row < rows; row++ {

    for col := 0; col < cols; col++ {

    liveN := g.numberLiveNeighbors(row, col)

    if g[row][col] == true && (liveN < 2 || liveN > 3) {

    newGrid[row][col] = false

    }

    if g[row][col] == true && (liveN == 2 || liveN == 3) {

    newGrid[row][col] = true

    }

    if g[row][col] == true && (liveN < 2 || liveN >= 4) {

    newGrid[row][col] = false

    }

    if g[row][col] == false && liveN == 3 {

    newGrid[row][col] = true

    }

    }

    }

    Copy(g, newGrid)

    }

    func consoleOutput() {

    for row := 0; row < rows; row++ {

    for col := 0; col < cols; col++ {

    if grid[row][col] == true {

    fmt.Print("$ ")

    } else {

    fmt.Print("# ")

    }

    }

    fmt.Print("\n")

    }

    fmt.Println("-----")

    }

    func main() {

    grid.initializeGrid(3, 3)

    newGrid.initializeGrid(3, 3)

    grid.bringAlive(0, 0)

    grid.bringAlive(0, 2)

    grid.bringAlive(1, 0)

    grid.bringAlive(1, 1)

    grid.bringAlive(2, 2)

    consoleOutput()

    for iteration := 1; iteration < 5; iteration++ {

    time.Sleep(1 * time.Second)

    grid.evolveGrid()

    consoleOutput()

    }

    }

