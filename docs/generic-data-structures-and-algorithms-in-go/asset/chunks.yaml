  trans: "好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\n\n# 10\\. AVL 树\n\n\
    在上一章中，我们介绍了二叉搜索树。在这种树中，每个节点包含一个关键字，该关键字大于其左子树中的所有关键字，且小于其右子树中的所有关键字。不允许有重复的关键字。\n\
    \n在构建二叉搜索树时，其平衡性取决于关键字插入的顺序。例如，如果关键字按升序插入，那么搜索树就会类似于一个链表，所有节点都在根节点的右侧。\n\n1962\
    \ 年，两位俄罗斯数学家 Adelson Velsky 和 Landis 定义了一种关于搜索树平衡性的有用定义（后来为纪念他们而被称为 AVL 平衡），并描述了能够保持\
    \ AVL 平衡的 `insert` 和 `remove` 算法。他们的工作已成为数据结构领域经典的组成部分。\n\n在下一节中，我们将概述 AVL 树。\n\
    \n## 10.1 概述：Adelson Velsky 与 Landis\n\n在本章中，我们将探索并实现一个通用的 AVL 树。\n\n对于任何二叉搜索树，`Insert`、`Delete`\
    \ 和 `Search` 操作的效率都取决于搜索树的平衡程度。如果树中有 `n` 个节点，且树是平衡的，那么每个操作大约需要 `log2 n` 次操作。\n\
    \n如果一个二叉搜索树满足以下条件，则将其定义为 AVL 树：**对于树中的每个节点，其左子树的最大深度减去右子树的最大深度，其绝对值小于等于 1**。也就是说，每个节点的\
    \ AVL 平衡值（由左子树深度减去右子树深度得到）只能是 -1、0 或 1。\n\n在下面的树中，显示了每个节点的 AVL 平衡值（此处简称为平衡值）。平衡值为\
    \ 0 的节点未显示。由于节点 A 的存在，这棵树不是 AVL 树。\n\n![](img/527841_1_En_10_Figa_HTML.png)\n\n\
    一棵二叉树的示意图，其中值为-2 的节点 A 有两个子节点 B 和 C，值为-1 的节点 C 有两个子节点 D 和 E。值为-1 的节点 E 有一个右子节点\
    \ F。\n\n请验证以下搜索树是一棵 AVL 树。\n\n![](img/527841_1_En_10_Figb_HTML.png)\n\n一棵二叉树的示意图，其中根节点\
    \ 10 有两个子树。左子树的父节点 5 有两个子节点 3 和 6。节点 3 有两个子节点 2 和 4，节点 2 有一个值为 1 的左子节点。右子节点 6\
    \ 有一个值为 8 的右子节点。右子树的节点 15 有两个子节点 13 和 20，左节点 13 有一个值为 12 的左子节点。\n\nAVL 的插入和删除算法涉及树的旋转。我们用上面的树来演示。\n\
    \n### 树的旋转\n\n对节点 10 执行右旋得到：\n\n![](img/527841_1_En_10_Figc_HTML.png)\n\n一棵二叉树的示意图，其中节点\
    \ 5 有两个子树。左子树的父节点 3 有两个子节点 2 和 4。节点 2 有一个值为 1 的左子节点。右子树的节点 10 有两个子节点 6 和 15，节点\
    \ 6 有一个值为 8 的右子节点，右节点 15 有两个子节点 13 和 20，节点 13 有一个值为 12 的左子节点。\n\n当 10 向右旋转时，5\
    \ 的右子节点变为节点 10。这使得 6 和 8 成为孤儿节点。由于它们都大于 5 且小于 10，因此它们被放置在 10 的左子树和 5 的右子树中，如上图所示。\n\
    \n对节点 10 执行左旋得到：\n\n![](img/527841_1_En_10_Figd_HTML.png)\n\n一棵二叉树的示意图，其中节点 5\
    \ 有两个子树。左侧文字为“左子树不变”。右子树的父节点 15 有两个子节点 10 和 20，左节点 10 有两个子节点 6 和 13，其中节点 6 有一个值为\
    \ 8 的右子节点，节点 13 有一个值为 12 的左子节点。\n\n孤儿节点 13 和 12 大于 10 且小于 15，它们被放置在上图所示的位置。\n\n\
    执行树旋转涉及的计算工作量非常少。整个树中只需要修改两个链接。无论树的大小如何，这一点都成立。\n\nAVL 算法的精妙之处在于 `Insert` 和 `Delete`\
    \ 方法。这两个方法都需要在操作后产生一棵 AVL 树。\n\n### 插入\n\n我们首先考虑 AVL 插入。包含四个步骤。\n\n1.  在 AVL 树上执行一次普通的二叉搜索树插入。如果树仍然是\
    \ AVL 树，则停止。\n2.  从插入的节点（始终位于叶节点位置）开始，沿着搜索路径回溯到根节点。如果发现一个节点组合，其中父节点的平衡值绝对值为 2，其子节点的平衡值绝对值为\
    \ 1，且符号相同（例如，-2 和 -1 或 2 和 1），则存在 **类型 1** 的配置。如果符号相反（例如，-2 和 1 或 2 和 -1），则存在\
    \ **类型 2** 的配置。\n3.  如果配置是类型 1，则对父节点执行一次单一旋转，以恢复平衡。\n4.  如果配置是类型 2，则执行两次旋转。第一次旋转在子节点上进行，方向与恢复平衡的方向一致。然后，对父节点执行第二次旋转，方向与第一次旋转相反。\n\
    \n这些步骤保证能生成一棵保持 AVL 属性的搜索树。其证明超出了本书的范围。\n\n### 删除\n\nAVL 删除的步骤如下：\n\n1.  执行一次普通的二叉搜索树删除。如果树是\
    \ AVL 树，则停止。\n2.  如果经过普通删除后树不再是 AVL 树，则从被删除的节点开始，沿着搜索路径遍历到根节点。当出现以下平衡值组合之一时停止：\n\
    \    a. 父节点的平衡值绝对值为 2，子节点的平衡值绝对值为 1。按照与插入相同的方式判断配置类型，并执行相同类型的单一旋转或两次旋转序列。\n  \
    \  b. 父节点的平衡值为 2 或 -2，而子节点的平衡值为 0。将此视为类型 1 配置，并对父节点执行适当的单一旋转。\n    c. 重新评估父节点上方节点的平衡值。由于步骤\
    \ a 或 b 中执行的旋转操作，可能会出现另一个需要处理的类型 1 或类型 2 配置。继续执行步骤 c，直到到达根节点且无需进一步的旋转修正。\n\n图\
    \ 10-1 展示了一棵需要执行步骤 c 的树。\n\n![](img/527841_1_En_10_Fig1_HTML.jpg)\n\n一棵二叉树的示意图，其中节点\
    \ 10 有两个子树。左子树的父节点 5 有两个子节点 3 和 6。节点 3 有两个子节点 2 和 4，节点 2 有一个值为 1 的左子节点。右子节点 6\
    \ 有一个值为 8 的右子节点。右子树的节点 15 有两个子节点 13 和 20，左节点 13 有一个值为 12 的左子节点。\n\n**图 10-1**\
    \ — 用于说明 AVL 删除的树\n\n我们想要删除节点 20。在普通删除 20 后，节点 15 的平衡值变为 2。这促使我们对节点 15 执行一次右旋。节点\
    \ 13 向上移动，成为根节点 10 的右子节点。\n\n但现在，根节点 10 的平衡值也变成了 2，因为它的左子树高度为 4，右子树高度为 2（在第一次旋转中，右子树丢失了一层高度）。我们通过对节点\
    \ 10 执行一次右旋来修正这个情况。作为练习，请画出结果树的草图。\n\n作为练习，请画出在步骤 c 之后得到的 AVL 树的草图。\n"
- fmt: "### Facts About AVL Trees\n\nThe following are some interesting facts about\
    \ AVL trees:\n\n- When inserting into AVL trees, approximately 50 percent of insertions\
    \ require no rotational correction. Among the remaining 50 percent, about half\
    \ require a type 1 single rotational correction, and half require the type 2 rotational\
    \ corrections.\n- When deleting from an AVL tree, about 80 percent require no\
    \ rotational corrections. Among the remaining 20 percent, about half are type\
    \ 1 and half type 2. Only rarely are multiple rotational corrections required\
    \ up the search tree.\n\nIn the next section, we present an implementation of\
    \ a generic AVL tree.\n\n## Implementation of a Generic AVL Tree\n\nWe present\
    \ an entire `avl` package in Listing 10-1. Like the binary search tree, we include\
    \ the supporting code for displaying the AVL tree.\n\n```\npackage avl\n\nimport\
    \ (\n\t\"image/color\"\n\t\"log\"\n\t\"fyne.io/fyne/v2\"\n\t\"fyne.io/fyne/v2/app\"\
    \n\t\"fyne.io/fyne/v2/canvas\"\n\t\"fyne.io/fyne/v2/theme\"\n\t\"github.com/mitchellh/go-homedir\"\
    \n\t\"gonum.org/v1/plot\"\n\t\"gonum.org/v1/plot/plotter\"\n\t\"gonum.org/v1/plot/vg\"\
    \n\t\"gonum.org/v1/plot/vg/draw\"\n)\n\ntype ordered interface {\n\t~int | ~float64\
    \ | ~string\n}\n\ntype AVLTree[T OrderedStringer] struct {\n\tRoot     *Node[T]\n\
    \tNumNodes int\n}\n\ntype Node[T OrderedStringer] struct {\n\tValue T\n\tLeft\
    \  *Node[T]\n\tRight *Node[T]\n\tHt    int\n}\n\ntype OrderedStringer interface\
    \ {\n\tordered\n\tString() string\n}\n\n// Methods\nfunc (avl *AVLTree[T]) Insert(newValue\
    \ T) {\n\tif avl.Search(newValue) == false { // newValue is not in existing tree\n\
    \t\tavl.Root = insertNode(avl.Root, newValue)\n\t\tavl.NumNodes += 1\n\t}\n}\n\
    \nfunc (avl *AVLTree[T]) Delete(value T) {\n\tif avl.Search(value) == true {\n\
    \t\tavl.Root = deleteNode(avl.Root, value)\n\t\tavl.NumNodes -= 1\n\t}\n}\n\n\
    func (avl *AVLTree[T]) Search(value T) bool {\n\treturn search(avl.Root, value)\n\
    }\n\nfunc (avl *AVLTree[T]) Height() int {\n\treturn avl.Root.Height()\n}\n\n\
    func (avl *AVLTree[T]) InOrderTraverse(f func(T)) {\n\tinOrderTraverse(avl.Root,\
    \ f)\n}\n\nfunc (avl *AVLTree[T]) Min() *T {\n\tnode := avl.Root\n\tif node ==\
    \ nil {\n\t\treturn nil\n\t}\n\tfor {\n\t\tif node.Left == nil {\n\t\t\treturn\
    \ &node.Value\n\t\t}\n\t\tnode = node.Left\n\t}\n}\n\nfunc (avl *AVLTree[T]) Max()\
    \ *T {\n\tnode := avl.Root\n\tif node == nil {\n\t\treturn nil\n\t}\n\tfor {\n\
    \t\tif node.Right == nil {\n\t\t\treturn &node.Value\n\t\t}\n\t\tnode = node.Right\n\
    \t}\n}\n\nfunc (n *Node[T]) balanceFactor() int {\n\tif n == nil {\n\t\treturn\
    \ 0\n\t}\n\treturn n.Left.Height() - n.Right.Height()\n}\n\nfunc (n *Node[T])\
    \ Height() int {\n\tif n == nil {\n\t\treturn 0\n\t} else {\n\t\treturn n.Ht\n\
    \t}\n}\n\nfunc (n *Node[T]) updateHeight() {\n\tmax := func(a, b int) int {\n\t\
    \tif a > b {\n\t\t\treturn a\n\t\t}\n\t\treturn b\n\t}\n\tn.Ht = max(n.Left.Height(),\
    \ n.Right.Height()) + 1\n}\n\n// Support functions\nfunc newNode[T OrderedStringer](val\
    \ T) *Node[T] {\n\treturn &Node[T]{\n\t\tValue: val,\n\t\tLeft:  nil,\n\t\tRight:\
    \ nil,\n\t\tHt:    1,\n\t}\n}\n\nfunc search[T OrderedStringer](n *Node[T], value\
    \ T) bool {\n\tif n == nil {\n\t\treturn false\n\t}\n\tif value < n.Value {\n\t\
    \treturn search(n.Left, value)\n\t} else if value > n.Value {\n\t\treturn search(n.Right,\
    \ value)\n\t}\n\treturn true\n}\n\nfunc insertNode[T OrderedStringer](node *Node[T],\
    \ val T) *Node[T] {\n\t// if there's no node, create one\n\tif node == nil {\n\
    \t\treturn newNode(val)\n\t}\n\t// if value is greater than current node's value,\
    \ insert to the right\n\tif val > node.Value {\n\t\tright := insertNode(node.Right,\
    \ val)\n\t\tnode.Right = right\n\t}\n\t// if value is less than current node's\
    \ value, insert to the left\n\tif val < node.Value {\n\t\tleft := insertNode(node.Left,\
    \ val)\n\t\tnode.Left = left\n\t}\n\treturn rotateInsert(node, val)\n}\n\nfunc\
    \ rotateInsert[T OrderedStringer](node *Node[T], val T) *Node[T] {\n\tnode.updateHeight()\n\
    \tbFactor := node.balanceFactor()\n\tif bFactor > 1 && val < node.Left.Value {\n\
    \t\treturn rightRotate(node)\n\t}\n\tif bFactor < -1 && val > node.Right.Value\
    \ {\n\t\treturn leftRotate(node)\n\t}\n\tif bFactor > 1 && val > node.Left.Value\
    \ {\n\t\tnode.Left = leftRotate(node.Left)\n\t\treturn rightRotate(node)\n\t}\n\
    \tif bFactor < -1 && val < node.Right.Value {\n\t\tnode.Right = rightRotate(node.Right)\n\
    \t\treturn leftRotate(node)\n\t}\n\treturn node\n}\n\nfunc rightRotate[T OrderedStringer](y\
    \ *Node[T]) *Node[T] {\n\tx := y.Left\n\tt2 := x.Right\n\tx.Right = y\n\ty.Left\
    \ = t2\n\ty.updateHeight()\n\tx.updateHeight()\n\treturn x\n}\n\nfunc leftRotate[T\
    \ OrderedStringer](x *Node[T]) *Node[T] {\n\ty := x.Right\n\tt2 := y.Left\n\t\
    y.Left = x\n\tx.Right = t2\n\tx.updateHeight()\n\ty.updateHeight()\n\treturn y\n\
    }\n\nfunc rotateDelete[T OrderedStringer](node *Node[T]) *Node[T] {\n\tnode.updateHeight()\n\
    \tbFactor := node.balanceFactor()\n\tif bFactor > 1 && node.Left.balanceFactor()\
    \ >= 0 {\n\t\treturn rightRotate(node)\n\t}\n\tif bFactor > 1 && node.Left.balanceFactor()\
    \ < 0 {\n\t\tnode.Left = leftRotate(node.Left)\n\t\treturn rightRotate(node)\n\
    \t}\n\tif bFactor < -1 && node.Right.balanceFactor() <= 0 {\n\t\treturn leftRotate(node)\n\
    \t}\n\tif bFactor < -1 && node.Right.balanceFactor() > 0 {\n\t\tnode.Right = rightRotate(node.Right)\n\
    \t\treturn leftRotate(node)\n\t}\n\treturn node\n}\n\nfunc deleteNode[T OrderedStringer](node\
    \ *Node[T], val T) *Node[T] {\n\tif node == nil {\n\t\treturn nil\n\t}\n\tif val\
    \ > node.Value {\n\t\tright := deleteNode(node.Right, val)\n\t\tnode.Right = right\n\
    \t} else if val < node.Value {\n\t\tleft := deleteNode(node.Left, val)\n\t\tnode.Left\
    \ = left\n\t} else {\n\t\tif node.Left != nil && node.Right != nil {\n\t\t\t//\
    \ has 2 children, find the successor\n\t\t\tsuccessor := largest(node.Left)\n\t\
    \t\tvalue := successor.Value\n\t\t\t// remove the successor\n\t\t\tleft := deleteNode(node.Left,\
    \ value)\n\t\t\tnode.Left = left\n\t\t\t// copy the successor value to the current\
    \ node\n\t\t\tnode.Value = value\n\t\t} else if node.Left != nil || node.Right\
    \ != nil {\n\t\t\t// has 1 child\n\t\t\t// move the child position to the current\
    \ node\n\t\t\tif node.Left != nil {\n\t\t\t\tnode = node.Left\n\t\t\t} else {\n\
    \t\t\t\tnode = node.Right\n\t\t\t}\n\t\t} else if node.Left == nil && node.Right\
    \ == nil {\n\t\t\t// has no child\n\t\t\t// simply remove the node\n\t\t\tnode\
    \ = nil\n\t\t}\n\t\tif node == nil {\n\t\t\treturn nil\n\t\t}\n\t\treturn rotateDelete(node)\n\
    \t}\n\treturn node\n}\n\nfunc largest[T OrderedStringer](node *Node[T]) *Node[T]\
    \ {\n\tif node == nil || node.Right == nil {\n\t\treturn node\n\t}\n\treturn largest(node.Right)\n\
    }\n\nfunc inOrderTraverse[T OrderedStringer](node *Node[T], f func(T)) {\n\tif\
    \ node != nil {\n\t\tinOrderTraverse(node.Left, f)\n\t\tf(node.Value)\n\t\tinOrderTraverse(node.Right,\
    \ f)\n\t}\n}\n\n// Logic for drawing tree\ntype NodePair struct {\n\tVal1, Val2\
    \ string\n}\n\ntype NodePos struct {\n\tVal  string\n\tYPos int\n\tXPos int\n\
    }\n\nvar data []NodePos\nvar endPoints []NodePair\n\nfunc PrepareDrawTree[T OrderedStringer](tree\
    \ AVLTree[T]) {\n\tprepareToDraw(tree)\n}\n\nfunc FindXY(val interface{}) (int,\
    \ int) {\n\tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val == val {\n\t\t\
    \treturn data[i].XPos, data[i].YPos\n\t\t}\n\t}\n\treturn -1, -1\n}\n\nfunc FindX(val\
    \ interface{}) int {\n\tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val ==\
    \ val {\n\t\t\treturn i\n\t\t}\n\t}\n\treturn -1\n}\n\nfunc SetXValues() {\n\t\
    for index := 0; index < len(data); index++ {\n\t\txValue := FindX(data[index].Val)\n\
    \t\tdata[index].XPos = xValue\n\t}\n}\n\nfunc prepareToDraw[T OrderedStringer](tree\
    \ AVLTree[T]) {\n\tinorderLevel(tree.Root, 1)\n\tSetXValues()\n\tgetEndPoints(tree.Root,\
    \ nil)\n}\n\nfunc inorderLevel[T OrderedStringer](node *Node[T], level int) {\n\
    \tif node != nil {\n\t\tinorderLevel(node.Left, level+1)\n\t\tdata = append(data,\
    \ NodePos{node.Value.String(), 100 - level, -1})\n\t\tinorderLevel(node.Right,\
    \ level+1)\n\t}\n}\n\nfunc getEndPoints[T OrderedStringer](node *Node[T], parent\
    \ *Node[T]) {\n\tif node != nil {\n\t\tif parent != nil {\n\t\t\tendPoints = append(endPoints,\
    \ NodePair{node.Value.String(), parent.Value.String()})\n\t\t}\n\t\tgetEndPoints(node.Left,\
    \ node)\n\t\tgetEndPoints(node.Right, node)\n\t}\n}\n\nvar path string\n\nfunc\
    \ DrawGraph(a fyne.App, w fyne.Window) {\n\timage := canvas.NewImageFromResource(theme.FyneLogo())\n\
    \timage = canvas.NewImageFromFile(path + \"tree.png\")\n\timage.FillMode = canvas.ImageFillOriginal\n\
    \tw.SetContent(image)\n\tw.Close()\n\tw.Show()\n}\n\nfunc ShowTreeGraph[T OrderedStringer](myTree\
    \ AVLTree[T]) {\n\tPrepareDrawTree(myTree)\n\tmyApp := app.New()\n\tmyWindow :=\
    \ myApp.NewWindow(\"Tree\")\n\tmyWindow.Resize(fyne.NewSize(1000, 600))\n\tpath,\
    \ _ = homedir.Dir()\n\tpath += \"/Desktop/\"\n\tnodePts := make(plotter.XYs, myTree.NumNodes)\n\
    \tfor i := 0; i < len(data); i++ {\n\t\tnodePts[i].Y = float64(data[i].YPos)\n\
    \t\tnodePts[i].X = float64(data[i].XPos)\n\t}\n\tnodePtsData := nodePts\n\tp :=\
    \ plot.New()\n\tp.Add(plotter.NewGrid())\n\tnodePoints, err := plotter.NewScatter(nodePtsData)\n\
    \tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tnodePoints.Shape = draw.CircleGlyph{}\n\
    \tnodePoints.Color = color.RGBA{G: 255, A: 255}\n\tnodePoints.Radius = vg.Points(12)\n\
    \n\t// Plot lines\n\tfor index := 0; index < len(endPoints); index++ {\n\t\tval1\
    \ := endPoints[index].Val1\n\t\tx1, y1 := FindXY(val1)\n\t\tval2 := endPoints[index].Val2\n\
    \t\tx2, y2 := FindXY(val2)\n\t\tpts := plotter.XYs{{X: float64(x1), Y: float64(y1)},\
    \ {X: float64(x2), Y: float64(y2)}}\n\t\tline, err := plotter.NewLine(pts)\n\t\
    \tif err != nil {\n\t\t\tlog.Panic(err)\n\t\t}\n\t\tscatter, err := plotter.NewScatter(pts)\n\
    \t\tif err != nil {\n\t\t\tlog.Panic(err)\n\t\t}\n\t\tp.Add(line, scatter)\n\t\
    }\n\tp.Add(nodePoints)\n\n\t// Add Labels\n\tfor index := 0; index < len(data);\
    \ index++ {\n\t\tx := float64(data[index].XPos) - 0.2\n\t\ty := float64(data[index].YPos)\
    \ - 0.02\n\t\tstr := data[index].Val\n\t\tlabel, err := plotter.NewLabels(plotter.XYLabels{\n\
    \t\t\tXYs: []plotter.XY{\n\t\t\t\t{X: x, Y: y},\n\t\t\t},\n\t\t\tLabels: []string{str},\n\
    \t\t})\n\t\tif err != nil {\n\t\t\tlog.Fatalf(\"could not creates labels plotter:\
    \ %+v\", err)\n\t\t}\n\t\tp.Add(label)\n\t}\n\n\tpath, _ = homedir.Dir()\n\tpath\
    \ += \"/Desktop/GoDS/\"\n\terr = p.Save(1000, 600, \"tree.png\")\n\tif err !=\
    \ nil {\n\t\tlog.Panic(err)\n\t}\n\tDrawGraph(myApp, myWindow)\n\tmyWindow.ShowAndRun()\n\
    }\n```\n\n*Listing 10-1: Package avl*"
  raw: '### Facts About AVL Trees


    The following are some interesting facts about AVL trees:


    *   When inserting into AVL trees, approximately 50 percent of insertions require
    no rotational correction. Among the remaining 50 percent, about half require a
    type 1 single rotational correction, and half require the type 2 rotational corrections.


    *   When deleting from an AVL tree, about 80 percent require no rotational corrections.
    Among the remaining 20 percent, about half are type 1 and half type 2\. Only rarely
    are multiple rotational corrections required up the search tree.


    In the next section, we present an implementation of a generic AVL tree.


    ## 10.2 Implementation of a Generic AVL Tree


    We present an entire **avl** package in Listing [10-1](#527841_1_En_10_Chapter.xhtml#PC1).
    Like the binary search tree, we include the supporting code for displaying the
    AVL tree.


    ```

    package avl

    import (

    "image/color"

    "log"

    "fyne.io/fyne/v2"

    "fyne.io/fyne/v2/app"

    "fyne.io/fyne/v2/canvas"

    "fyne.io/fyne/v2/theme"

    "github.com/mitchellh/go-homedir"

    "gonum.org/v1/plot"

    "gonum.org/v1/plot/plotter"

    "gonum.org/v1/plot/vg"

    "gonum.org/v1/plot/vg/draw"

    )

    type ordered interface {

    ~int | ~float64 | ~string

    }

    type AVLTree[T OrderedStringer] struct {

    Root *Node[T]

    NumNodes int

    }

    type Node[T OrderedStringer] struct {

    Value T

    Left *Node[T]

    Right *Node[T]

    Ht int

    }

    type OrderedStringer interface {

    ordered

    String() string

    }

    // Methods

    func (avl *AVLTree[T]) Insert(newValue T) {

    if avl.Search(newValue) == false { // newValue is not in existing tree

    avl.Root = insertNode(avl.Root, newValue)

    avl.NumNodes += 1

    }

    }

    func (avl *AVLTree[T]) Delete(value T) {

    if avl.Search(value) == true {

    avl.Root = deleteNode(avl.Root, value)

    avl.NumNodes -= 1

    }

    }

    func (avl *AVLTree[T]) Search(value T) bool {

    return search(avl.Root, value)

    }

    func (avl *AVLTree[T]) Height() int {

    return avl.Root.Height()

    }

    func (avl *AVLTree[T]) InOrderTraverse(f func(T)) {

    inOrderTraverse(avl.Root, f)

    }

    func (avl *AVLTree[T]) Min() *T {

    node := avl.Root

    if node == nil {

    return nil

    }

    for {

    if node.Left == nil {

    return &node.Value

    }

    node = node.Left

    }

    }

    func (avl *AVLTree[T]) Max() *T {

    node := avl.Root

    if node == nil {

    return nil

    }

    for {

    if node.Right == nil {

    return &node.Value

    }

    node = node.Right

    }

    }

    func (n *Node[T]) balanceFactor() int {

    if n == nil {

    return 0

    }

    return n.Left.Height() - n.Right.Height()

    }

    func (n *Node[T]) Height() int {

    if n == nil {

    return 0

    } else {

    return n.Ht

    }

    }

    func (n *Node[T]) updateHeight() {

    max := func (a, b int) int {

    if a > b {

    return a

    }

    return b

    }

    n.Ht = max(n.Left.Height(), n.Right.Height()) + 1

    }

    // Support functions

    func newNode[T OrderedStringer](val T) *Node[T] {

    return &Node[T] {

    Value:  val,

    Left:   nil,

    Right:  nil,

    Ht: 1,

    }

    }

    func search[T OrderedStringer](n *Node[T], value T) bool {

    if n == nil {

    return false

    }

    if value  n.Value {

    return search(n.Right, value)

    }

    return true

    }

    func insertNode[T OrderedStringer](node *Node[T], val T) *Node[T] {

    // if there''s no node, create one

    if node == nil {

    return newNode(val)

    }

    // if value is greater than current node''s value, insert to the right

    if val > node.Value {

    right := insertNode(node.Right, val)

    node.Right = right

    }

    // if value is less than current node''s value, insert to the left

    if val  1 && val  node.Right.Value {

    return leftRotate(node)

    }

    if bFactor > 1 && val > node.Left.Value {

    node.Left = leftRotate(node.Left)

    return rightRotate(node)

    }

    if bFactor  1 && node.Left.balanceFactor() >= 0 {

    return rightRotate(node)

    }

    if bFactor > 1 && node.Left.balanceFactor()  0 {

    node.Right = rightRotate(node.Right)

    return leftRotate(node)

    }

    return node

    }

    func deleteNode[T OrderedStringer](node *Node[T], val T) *Node[T] {

    if node == nil {

    return nil

    }

    if val > node.Value {

    right  := deleteNode(node.Right, val)

    node.Right = right

    } else if val < node.Value {

    left := deleteNode(node.Left, val)

    node.Left = left

    } else {

    if node.Left != nil && node.Right != nil {

    // has 2 children, find the successor

    successor := largest(node.Left)

    value := successor.Value

    // remove the successor

    left := deleteNode(node.Left, value)

    node.Left = left

    // copy the successor value to the current node

    node.Value = value

    } else if node.Left != nil || node.Right != nil {

    // has 1 child

    // move the child position to the current node

    if node.Left != nil {

    node = node.Left

    } else {

    node = node.Right

    }

    } else if node.Left == nil && node.Right == nil {

    // has no child

    // simply remove the node

    node = nil

    }

    if node == nil {

    return nil

    }

    return rotateDelete(node)

    }

