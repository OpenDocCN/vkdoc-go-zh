    ```

    package heap

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    type Heap[T Ordered] struct {

    Items []T

    }

    // Methods

    func (heap *Heap[T]) Swap(index1, index2 int) {

    heap.Items[index1], heap.Items[index2] =

    heap.Items[index2], heap.Items[index1]

    }

    func NewHeap[T Ordered](input []T) *Heap[T] {

    heap := &Heap[T]{}

    for i := 0; i < len(input); i++ {

    heap.Insert(input[i])

    }

    return heap

    }

    func (heap *Heap[T]) Insert(value T) {

    heap.Items = append(heap.Items, value)

    heap.buildHeap(len(heap.Items) - 1)

    }

    func (heap *Heap[T]) buildHeap(index int) {

    var parent int

    if index > 0 {

    parent = (index - 1) / 2

    if heap.Items[index] > heap.Items[parent] {

    heap.Swap(index, parent)

    }

    heap.buildHeap(parent)

    }

    }

    func (heap *Heap[T]) rebuildHeap(index int) {

    length := len(heap.Items)

    if (2 * index + 1) < length {

    left := 2*index + 1

    right := left + 1

    largest := index

    if right < length && heap.Items[right] > heap.Items[left] {

    if heap.Items[index] < heap.Items[right] {

    largest = right

    }

    } else if heap.Items[index] < heap.Items[left] {

    largest = left

    }

    if index != largest {

    heap.Swap(index, largest)

    heap.rebuildHeap(largest)

    }

    }

    }

    Listing 11-1

    Package heap

    ```


    ### Explanation of Package heap


    The generic `Heap` structure is given by a struct containing a slice of generic
    ordered type `T`.


    ```

    type Heap[T Ordered] struct {

    Items []T

    }

    ```


    We focus on the function `NewHeap` and on the methods `Insert` and `Remove`. The
    other methods are much simpler and do not need explanation.


    To build a heap from a slice of some ordered type `T`, we perform


    ```

    func NewHeap[T Ordered](input []T) *Heap[T] {

    heap := &Heap[T]{}

    for i := 0; i < len(input); i++ {

    heap.Insert(input[i])

    }

    return heap

    }

    ```


    The first line of code defines a `heap` as the address (since we are returning
    a pointer to a `Heap`) of `Heap` with an empty slice of `Items`.


    A for-loop follows that invokes the `Insert` method on each item in the `input`
    slice.


    The `Insert` method, given as


    ```

    func (heap *Heap[T]) Insert(value T) {

    heap.Items = append(heap.Items, value)

    heap.buildHeap(len(heap.Items) - 1)

    }

    ```


    appends the input `value` to `the heap.Items` slice. It then invokes the private
    method `buildHeap`.


    This private method `buildHeap` directly follows the example shown in Section
    11.1 and works upward from the bottom of the tree doing swaps when necessary to
    produce a heap.


    The `Remove` method, given as


    ```

    func (heap *Heap[T]) Remove() {

    // Can only remove Items[0], the largest value

    heap.Items[0] = heap.Items[len(heap.Items)-1]

    heap.Items = heap.Items[:(len(heap.Items) - 1)]

    heap.rebuildHeap(0)

    }

    ```


    assigns the item in the lowest rightmost position to index 0 in the `heap.Items`
    slice. It then reassigns this slice to exclude this rightmost item. The heap structure
    is temporarily broken by placing the deepest, rightmost value in the root. A private
    method `rebuildHeap` is invoked, which restores the heap property.


    The method `rebuildHeap` is closely reasoned and requires care in understanding
    how it works. At each level of recursion, the item at `index` is initially assumed
    to be the largest. The values at index `left` and index `right` (or just `left`
    if `right` is out of range) are compared. If the value at `index` is less than
    the larger of the children, `largest` is set to the index of the larger child.
    Then a swap of values between value at `index` and `largest` is made, and a recursive
    call to `rebuildHeap` is made with parameter `largest` sent into `rebuildHeap`.
    Upon the completion of this method, the heap structure is restored.


    Since a heap is close to perfectly balanced, its height is related to the number
    of nodes with a logarithmic relationship, `height = log[2]n`, where n is the number
    of nodes. Therefore, the methods `buildHeap` and `rebuildHeap` have complexity
    `O(log[2]n)`.


    In the main driver program, a second heap, `heap2`, is constructed using the same
    input integers but arranged in a different order. The resulting tree is indeed
    a heap but with a slightly different sequence of values in the slice.


    In the next section, we examine an important application of a heap tree – a sorting
    algorithm, heap sort.


    ## 11.4 Heap Sort


    The heap tree provides the basis for a sorting algorithm. It works as follows:


    Build a heap from the initial list to be sorted. Extract the largest from the
    root and append it to the result list (initialized to empty). Apply the `Remove`
    method to the heap. Continue this process until the heap is shrunk to empty.


    This process will produce a slice sorted from largest to smallest. We can produce
    output in ascending order by reversing the sequence in the slice produced previously.


    The details of heap sort are presented in Listing [11-3](#527841_1_En_11_Chapter.xhtml#PC7).


    ```

    package main

    import (

    "example.com/heap"

    "fmt"

    "math/rand"

    "time"

    )

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    func heapSort[T Ordered](input []T) []T {

    heap1 := heap.NewHeap[T](input)

    descending := []T{}

    for {

    if len(heap1.Items) > 0 {

    descending = append(descending, heap1.Largest())

    heap1.Remove()

    } else {

    break

    }

    }

    ascending := []T{}

    for i := len(descending) - 1; i >= 0; i-- {

    ascending = append(ascending, descending[i])

    }

    return ascending

    }

    const size = 50_000_000

    func IsSorted[T Ordered](data []T) bool {

    for i := 1; i < len(data); i++ {

    if data[i] < data[i-1] {

    return false

    }

    }

    return true

    }

    func main() {

    slice := []float64{0.0, 2.7, -3.3, 9.6, -13.8, 26.0, 4.9, 2.6, 5.1, 1.1}

    sorted := heapSort[float64](slice)

    fmt.Println("After heapSort on slice: ", sorted)

    data := make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = 100.0 * rand.Float64()

    }

    start := time.Now()

    largeSorted := heapSort[float64](data)

    elapsed := time.Since(start)

    fmt.Println("Time for heapSort of 50 million floats: ", elapsed)

    if !IsSorted[float64](largeSorted) {

    fmt.Println("largeSorted is not sorted.")

    }

    }

    /* Output

    Elapsed time for regular quicksort = 5.382400384s  (from Chapter 1)

    Elapsed time for concurrent quicksort = 710.431619ms (from Chapter 1)

    After heapSort on slice:  [-13.8 -3.3 0 1.1 2.6 2.7 4.9 5.1 9.6 26]

    Time for heapSort of 50 million floats:  23.978801647s

    */

    Listing 11-3

    Heap sort

    ```


    ### Discussion of heapsort Results


    The complexity of heapsort is `O(nlog[2]n)` since the complexity of `buildHeap`
    and `rebuildHeap` is `log[2]n`, and we do this n times.


    Comparing the time to sort 50 million floating-point numbers with quicksort or
    concurrent quicksort, we see that heapSort is about four times slower than quicksort.


    In the next section, we examine another application of Heap, a priority queue.'
