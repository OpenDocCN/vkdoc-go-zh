    # 13. Expression Trees


    In the previous chapter, we presented red-black trees. These binary search trees
    provide faster insertion performance compared to AVL trees but slower search time.


    In this chapter, we introduce and implement expression trees. These are used to
    represent and evaluate some mathematical expressions.


    In the next section, we introduce expression trees.


    ## 13.1 Expression Trees


    Expression trees are used to represent and evaluate mathematical expressions.
    Here, we limit such expressions to have operands given by a single character between
    “a” and “z” and operators that include `"+"`, `"-"`, `"*"`, and `"/"`.


    Consider the expression `"((a + b) + (c - d) / (f + g) + h)) + y / (x - z)"`.


    An expression tree representing this mathematical expression is shown in Figure
    [13-1](#527841_1_En_13_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_13_Chapter/527841_1_En_13_Fig1_HTML.jpg)


    An illustration of an expression tree. The root node is plus. It has two subtree
    plus and division. Subtree plus has child 2 pluses. Left plus has child a and
    b. Right plus has child division and h. Division has child minus and plus. Minus
    has child c and d. Plus has child f and g. Subtree division has child y and minus.
    Minus has child x and z.


    Figure 13-1


    Expression tree for mathematical expression


    The operands are contained in the leaf nodes and the operators in the interior
    nodes.


    We interpret and obtain the mathematical expression represented by this tree by
    starting at the various leaf nodes and working upward toward the root node.


    Starting with the leftmost leaf nodes, we have `(a + b) + ...`.


    Moving to the middle section leaf nodes, we have


    `(c – d) / (f + g) + h`


    From the rightmost leaf nodes, we have


    `y / (x – z) + ...`


    Putting the three sections together gives us the original expression.


    In the next section, we present and discuss the construction of an expression
    tree.


    ## 13.2 Construction of an Expression Tree


    The construction of an expression tree requires a layering of abstractions. We
    need a `Stack` to assist in the construction process.


    We define two types, `Node` and `ExpressionTree`, as follows:


    ```

    type Node struct {

    ch string

    left *Node

    right *Node

    }

    type ExpressionTree struct {

    postfix string

    root *Node

    }

    ```


    Type `Node` is the familiar binary tree node with a string, `ch`, stored in each
    node. This string will be either an operand or operator.


    Type `ExpressionTree` contains two fields. Field `postfix` is the postfix string
    representation of the mathematical expression we input to build the expression
    tree. Field `root` is a pointer to `Node`.


    ### Building a New Expression Tree


    Function `NewTree`, presented in the following, is used to build our expression
    tree.


    ```

    func NewTree(infix string) (tree *ExpressionTree) {

    infix = strings.ToLower(infix)

    tree = &ExpressionTree{"", nil}

    tree.postfix = infixpostfix(infix)

    stack := nodestack.Stack[*Node]{} // Create stack

    // of Node

    str := strings.Split(tree.postfix, "")

    for index := 0; index = string(''a'') &&

    str[index] <= string(''z'') {

    node := &Node{str[index], nil, nil}

    stack.Push(node)

    } else if (str[index] == "+") ||

    (str[index] == "-") ||

    (str[index] == "*") ||

    (str[index] == "/") {

    right := stack.Top()

    stack.Pop()

    left := stack.Top()

    stack.Pop()

    node := &Node{str[index], nil, nil}

    node.left = left

    node.right = right

    stack.Push(node)

    }

    }

    tree.root = stack.Top()

    return tree

    }

    ```


    ### Explanation of Function `NewTree`


    The first four lines of code create an empty tree (the `tree` variable is used
    as the return variable) and an empty `Stack` of base type pointer to `Node`.


    This is another example of how useful generic data structures are. Instead of
    having to duplicate a new stack implementation with `*Node` as a base type, we
    can simply use the generic stack package and specify the base type as `*Node`.


    In a `for`-loop that accesses each character of the postfix string, if the character
    is an operand, we create a node with the character and push the node onto the
    stack.


    If the character is one of the four possible operators, we grab the top two characters
    from the stack, create a node containing the operator character, and set its left
    and right child to the two nodes popped from the stack. Finally, we push this
    new node onto the stack. This is equivalent to moving upward from the leaf nodes
    to the root of the tree that we described in the previous section.


    ### Function Evaluation Using Expression Tree


    Method `Evaluate`, presented in the following, takes the root of an expression
    tree as its first parameter and a map of operand values as its second parameter
    and returns the value of the function (`float64`).


    ```

    func (tree *ExpressionTree) Evaluate(node *Node,

    operandValues map[string]float64) float64 {

    if node == nil {

    return 0.0

    }

    if node.left == nil && node.right == nil {

    value := operandValues[node.ch]

    return value

    }

    leftValue := tree.Evaluate(node.left, operandValues)

    rightValue := tree.Evaluate(node.right, operandValues)

    if node.ch == "+" {

    return leftValue + rightValue

    } else if node.ch == "-" {

    return leftValue - rightValue

    } else if node.ch == "*" {

    return leftValue * rightValue

    } else {

    return leftValue / rightValue

    }

    }

    ```'
