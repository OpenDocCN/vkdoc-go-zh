  raw: '## 6.2 Implementation of Slice Queue


    Listing [6-1](#527841_1_En_6_Chapter.xhtml#PC1) presents a generic slice implementation
    of **Queue** in package ***slicequeue***.


    The ***Queue*** struct contains a field, ***items***, a slice of generic type
    ***T***.


    ```

    package slicequeue

    type Queue[T any] struct {

    items []T

    }

    type Iterator[T any] struct {

    next int // index in items

    items []T

    }

    // Queue Methods

    func (queue *Queue[T]) Insert(item T) {

    // item is added to the right-most position in the slice

    queue.items = append(queue.items, item)

    }

    func (queue *Queue[T]) Remove() T {

    returnValue := queue.items[0]

    queue.items = queue.items[1:]

    return returnValue

    }

    func (queue Queue[T]) First() T {

    return queue.items[0]

    }

    func (queue Queue[T]) Size() int {

    return len(queue.items)

    }

    func (queue *Queue[T]) Range() Iterator[T] {

    return Iterator[T]{0, queue.items}

    }

    // Iterator Methods

    func (iterator *Iterator[T]) Empty() bool {

    return iterator.next == len(iterator.items)

    }

    func (iterator *Iterator[T]) Next() T {

    returnValue := iterator.items[iterator.next]

    iterator.next++

    return returnValue

    }

    Listing 6-1

    Generic slice implementation of Queue

    ```


    The FIFO protocol of **Queue** is achieved by inserting new items in the rightmost
    position of the ***items*** slice and removing items from the leftmost position,
    index 0, in the ***items*** slice.


    ### Iterator


    An ***Iterator*** type is a struct containing an index ***next*** and the ***items***
    slice.


    The ***Empty*** method on ***Iterator*** is true if the iterator field ***next***
    equals the length of the ***items*** slice.


    The ***Next*** method on ***Iterator*** returns the value ***T*** in index ***next***
    of the ***items*** slice.


    The ***Range*** method on **Queue** returns an **Iterator.**


    Listing [6-2](#527841_1_En_6_Chapter.xhtml#PC2) shows a simple main driver program
    that exercises a generic queue.


    ```

    package main

    import (

    "fmt"

    "example.com/slicequeue"

    )

    func main() {

    myQueue := slicequeue.Queue[int]{}

    myQueue.Insert(15)

    myQueue.Insert(20)

    myQueue.Insert(30)

    myQueue.Remove()

    fmt.Println(myQueue.First())

    queue := slicequeue.Queue[float64]{}

    for i := 0; i < 10; i++ {

    queue.Insert(float64(i))

    }

    iterator := queue.Range()

    for {

    if iterator.Empty() {

    break

    }

    fmt.Println(iterator.Next())

    }

    fmt.Println("queue.First() = ", queue.First())

    }

    /* Output


    queue.First() =  0

    */

    Listing 6-2

    Driver Program for Generic Queue

    ```


    The package ***slicequeue*** is imported. A queue with type **int** and another
    queue with type **float64** are defined and exercised. It is noted that when the
    **float64** queue is constructed and the values are displayed using an iterator,
    the state of the queue is not changed.


    In the next section, we present the implementation of a node-based **Queue**.


    ## 6.3 Implementation of Node Queue


    Listing [6-3](#527841_1_En_6_Chapter.xhtml#PC3) presents a node implementation
    of **Queue**.


    ```

    package nodequeue

    type Node[T any] struct {

    item T

    next *Node[T]

    }

    type Queue[T any] struct {

    first, last *Node[T]

    length int

    }

    type Iterator[T any] struct {

    next *Node[T]

    }

    // Methods

    func (queue *Queue[T]) Insert(item T) {

    newNode := &Node[T]{item, nil}

    if queue.first == nil {

    queue.first = newNode

    queue.last = queue.first

    } else {

    queue.last.next = newNode

    queue.last = newNode

    }

    queue.length +=1

    }

    func (queue *Queue[T]) Remove() T {

    returnValue := queue.first.item

    queue.first = queue.first.next

    if queue.first == nil {

    queue.last = nil

    }

    return returnValue

    }

    func (queue Queue[T]) First() T {

    return queue.first.item

    }

    func (queue Queue[T]) Size() int {

    return queue.length

    }

    func (queue *Queue[T]) Range() Iterator[T] {

    return Iterator[T]{queue.first}

    }

    func (iterator *Iterator[T]) Empty() bool {

    return iterator.next == nil

    }

    func (iterator *Iterator[T]) Next() T {

    returnValue := iterator.next.item

    if iterator.next != nil {

    iterator.next = iterator.next.next

    }

    return returnValue

    }

    Listing 6-3

    Generic node implementation of queue

    ```


    A generic ***Node*** type is defined containing an ***item*** field of type ***T***
    and a ***next*** field, a pointer to ***Node***. This recursive structure is similar
    to what we did in defining a node in ***nodestack***.


    The ***Queue*** type is a struct containing two pointers to ***Node***, ***first***
    and ***last***. They point to the beginning and end of the queue.


    The ***Insert*** method creates a ***first*** value if the queue is empty and
    sets ***last*** to equal ***first***. If the queue already has a non-nil ***first***
    value, it links the current ***last*** value to the new node and replaces ***last***
    with a pointer to this new node. The ***first*** value is unaffected.


    The ***Remove*** method returns the ***item*** in the ***first*** Node and resets
    ***first*** to its ***first.next*** link. If ***first*** becomes nil, then the
    ***last*** field is also set to nil; otherwise, it is unaffected.


    The ***Iterator*** is a struct with a ***next*** field that points to a ***Node***.


    The ***Range*** method returns an ***Iterator*** that contains a ***next*** field
    pointing to the ***first*** item in the queue.


    The ***Empty*** method on ***Iterator*** returns true if the ***next*** field
    points to nil; otherwise, it returns false.


    Finally, the ***Next*** method on ***Iterator*** returns the value in the ***next***
    Node and advances the field **iterator.*****next*** to the ***iterator.next.next***
    link.


    A main driver program that exercises the ***queuenode*** is the same as in Listing
    [6-2](#527841_1_En_6_Chapter.xhtml#PC2) except the package “example.com/nodequeue”
    is used.


    In the next section, we compare the performance of a slice-based **Queue** with
    a node-based **Queue**.


    ## 6.4 Comparing the Performance of Slice and Node Queue


    Listing [6-4](#527841_1_En_6_Chapter.xhtml#PC4) presents a program that compares
    the execution time of inserting and removing items from a ***slicequeue*** and
    a ***nodequeue***.


    ```

    // We compare the performance of slicequeue and nodequeue

    package main

    import (

    "fmt"

    "example.com/nodequeue"

    "example.com/slicequeue"

    "time"

    )

    const size = 1_000_000

    func main() {

    sliceQueue := slicequeue.Queue[int]{}

    nodeQueue := nodequeue.Queue[int]{}

    start := time.Now()

    for i := 0; i < size; i++ {

    sliceQueue.Insert(i)

    }

    elapsed := time.Since(start)

    fmt.Println("Time for inserting 1 million ints in sliceQueue is", elapsed)

    start = time.Now()

    for i := 0; i < size; i++ {

    nodeQueue.Insert(i)

    }

    elapsed = time.Since(start)

    fmt.Println("Time for inserting 1 million ints in nodeQueue is", elapsed)

    start = time.Now()

    for i := 0; i < size; i++ {

    sliceQueue.Remove()

    }

    elapsed = time.Since(start)

    fmt.Println("Time for removing 1 million ints from sliceQueue is", elapsed)

    start = time.Now()

    for i := 0; i < size; i++ {

    nodeQueue.Remove()

    }

    elapsed = time.Since(start)

    fmt.Println("Time for removing 1 million ints from nodeQueue is", elapsed)

    }

    /* Output

    Time for inserting 1 million ints in sliceQueue is 18.841914ms

    Time for inserting 1 million ints in nodeQueue is 30.275662ms

    Time for removing 1 million ints from sliceQueue is 1.413447ms

    Time for removing 1 million ints from nodeQueue is 2.818313ms

    */

    Listing 6-4

    Benchmarking the performance of slicequeue and nodequeue

    ```


    As expected, the slice queue is significantly faster than the node queue because
    of the overhead associated with pointer access in the node-based queue.


    In the next section, we introduce and implement the **Deque** data structure.'
  trans: "\n# 6.2 切片队列的实现\n\n代码清单 6-1 展示了 `slicequeue` 包中 `Queue` 的通用切片实现。\n\n`Queue`\
    \ 结构体包含一个字段 `items`，它是一个泛型类型 `T` 的切片。\n\n```go\npackage slicequeue\n\ntype Queue[T\
    \ any] struct {\n    items []T\n}\n\ntype Iterator[T any] struct {\n    next \
    \ int // items 中的索引\n    items []T\n}\n\n// Queue 方法\nfunc (queue *Queue[T]) Insert(item\
    \ T) {\n    // 将 item 添加到切片的最右侧位置\n    queue.items = append(queue.items, item)\n\
    }\n\nfunc (queue *Queue[T]) Remove() T {\n    returnValue := queue.items[0]\n\
    \    queue.items = queue.items[1:]\n    return returnValue\n}\n\nfunc (queue Queue[T])\
    \ First() T {\n    return queue.items[0]\n}\n\nfunc (queue Queue[T]) Size() int\
    \ {\n    return len(queue.items)\n}\n\nfunc (queue *Queue[T]) Range() Iterator[T]\
    \ {\n    return Iterator[T]{0, queue.items}\n}\n\n// Iterator 方法\nfunc (iterator\
    \ *Iterator[T]) Empty() bool {\n    return iterator.next == len(iterator.items)\n\
    }\n\nfunc (iterator *Iterator[T]) Next() T {\n    returnValue := iterator.items[iterator.next]\n\
    \    iterator.next++\n    return returnValue\n}\n代码清单 6-1\nQueue 的通用切片实现\n```\n\
    \n`Queue` 的 FIFO（先进先出）协议通过将新项插入到 `items` 切片的最右侧位置，并从 `items` 切片的最左侧位置（索引 0）移除项来实现。\n\
    \n## 迭代器\n\n`Iterator` 类型是一个包含索引 `next` 和 `items` 切片的结构体。\n\n如果迭代器字段 `next` 等于\
    \ `items` 切片的长度，则 `Iterator` 上的 `Empty` 方法返回 `true`。\n\n`Iterator` 上的 `Next` 方法返回\
    \ `items` 切片中索引 `next` 处的值 `T`。\n\n`Queue` 上的 `Range` 方法返回一个 `Iterator`。\n\n代码清单\
    \ 6-2 展示了一个简单的主驱动程序，它对一个泛型队列进行了操作。\n\n```go\npackage main\n\nimport (\n    \"\
    fmt\"\n    \"example.com/slicequeue\"\n)\n\nfunc main() {\n    myQueue := slicequeue.Queue[int]{}\n\
    \    myQueue.Insert(15)\n    myQueue.Insert(20)\n    myQueue.Insert(30)\n    myQueue.Remove()\n\
    \    fmt.Println(myQueue.First())\n\n    queue := slicequeue.Queue[float64]{}\n\
    \    for i := 0; i < 10; i++ {\n        queue.Insert(float64(i))\n    }\n    iterator\
    \ := queue.Range()\n    for {\n        if iterator.Empty() {\n            break\n\
    \        }\n        fmt.Println(iterator.Next())\n    }\n    fmt.Println(\"queue.First()\
    \ = \", queue.First())\n}\n\n/* 输出\n\nqueue.First() =  0\n*/\n代码清单 6-2\n泛型队列的驱动程序\n\
    ```\n\n导入了 `slicequeue` 包。定义并操作了一个类型为 `int` 的队列和另一个类型为 `float64` 的队列。需要注意的是，当构造\
    \ `float64` 队列并使用迭代器显示其值时，队列的状态并未改变。\n\n在下一节中，我们将介绍基于节点的 `Queue` 实现。\n\n## 6.3\
    \ 节点队列的实现\n\n代码清单 6-3 展示了 `Queue` 的节点实现。\n\n```go\npackage nodequeue\n\ntype Node[T\
    \ any] struct {\n    item T\n    next *Node[T]\n}\n\ntype Queue[T any] struct\
    \ {\n    first, last *Node[T]\n    length      int\n}\n\ntype Iterator[T any]\
    \ struct {\n    next *Node[T]\n}\n\n// 方法\nfunc (queue *Queue[T]) Insert(item\
    \ T) {\n    newNode := &Node[T]{item, nil}\n    if queue.first == nil {\n    \
    \    queue.first = newNode\n        queue.last = queue.first\n    } else {\n \
    \       queue.last.next = newNode\n        queue.last = newNode\n    }\n    queue.length\
    \ += 1\n}\n\nfunc (queue *Queue[T]) Remove() T {\n    returnValue := queue.first.item\n\
    \    queue.first = queue.first.next\n    if queue.first == nil {\n        queue.last\
    \ = nil\n    }\n    return returnValue\n}\n\nfunc (queue Queue[T]) First() T {\n\
    \    return queue.first.item\n}\n\nfunc (queue Queue[T]) Size() int {\n    return\
    \ queue.length\n}\n\nfunc (queue *Queue[T]) Range() Iterator[T] {\n    return\
    \ Iterator[T]{queue.first}\n}\n\nfunc (iterator *Iterator[T]) Empty() bool {\n\
    \    return iterator.next == nil\n}\n\nfunc (iterator *Iterator[T]) Next() T {\n\
    \    returnValue := iterator.next.item\n    if iterator.next != nil {\n      \
    \  iterator.next = iterator.next.next\n    }\n    return returnValue\n}\n代码清单\
    \ 6-3\nQueue 的通用节点实现\n```\n\n定义了一个泛型 `Node` 类型，其中包含一个类型为 `T` 的 `item` 字段和一个指向\
    \ `Node` 的指针 `next` 字段。这种递归结构与我们在 `nodestack` 中定义节点时所做的类似。\n\n`Queue` 类型是一个包含两个指向\
    \ `Node` 的指针 `first` 和 `last` 的结构体。它们分别指向队列的开头和结尾。\n\n`Insert` 方法会在队列为空时创建一个 `first`\
    \ 值，并将 `last` 设置为等于 `first`。如果队列已有一个非空（非 nil）的 `first` 值，则会将当前的 `last` 值链接到新节点，并用指向这个新节点的指针替换\
    \ `last`。`first` 值不受影响。\n\n`Remove` 方法返回 `first` 节点中的 `item`，并将 `first` 重置为它的\
    \ `first.next` 链接。如果 `first` 变为 nil，那么 `last` 字段也会被设置为 nil；否则，它不受影响。\n\n`Iterator`\
    \ 是一个包含 `next` 字段的结构体，该字段指向一个 `Node`。\n\n`Range` 方法返回一个 `Iterator`，其包含的 `next`\
    \ 字段指向队列中的第一个项（`first`）。\n\n如果 `next` 字段指向 nil，则 `Iterator` 上的 `Empty` 方法返回 `true`；否则返回\
    \ `false`。\n\n最后，`Iterator` 上的 `Next` 方法返回 `next` 节点中的值，并将字段 `iterator.next` 前进到\
    \ `iterator.next.next` 链接。\n\n一个用于操作 `queuenode` 的主驱动程序和代码清单 6-2 中的程序相同，只是使用的包是\
    \ `example.com/nodequeue`。\n\n在下一节中，我们将比较基于切片的 `Queue` 和基于节点的 `Queue` 的性能。\n\n\
    ## 6.4 比较切片队列和节点队列的性能\n\n代码清单 6-4 展示了一个程序，用于比较从 `slicequeue` 和 `nodequeue` 中插入和移除项的执行时间。\n\
    \n```go\n// 我们比较 slicequeue 和 nodequeue 的性能\npackage main\n\nimport (\n    \"\
    fmt\"\n    \"example.com/nodequeue\"\n    \"example.com/slicequeue\"\n    \"time\"\
    \n)\n\nconst size = 1_000_000\n\nfunc main() {\n    sliceQueue := slicequeue.Queue[int]{}\n\
    \    nodeQueue := nodequeue.Queue[int]{}\n\n    start := time.Now()\n    for i\
    \ := 0; i < size; i++ {\n        sliceQueue.Insert(i)\n    }\n    elapsed := time.Since(start)\n\
    \    fmt.Println(\"在 sliceQueue 中插入 100 万个整型数的时间为\", elapsed)\n\n    start = time.Now()\n\
    \    for i := 0; i < size; i++ {\n        nodeQueue.Insert(i)\n    }\n    elapsed\
    \ = time.Since(start)\n    fmt.Println(\"在 nodeQueue 中插入 100 万个整型数的时间为\", elapsed)\n\
    \n    start = time.Now()\n    for i := 0; i < size; i++ {\n        sliceQueue.Remove()\n\
    \    }\n    elapsed = time.Since(start)\n    fmt.Println(\"从 sliceQueue 中移除 100\
    \ 万个整型数的时间为\", elapsed)\n\n    start = time.Now()\n    for i := 0; i < size; i++\
    \ {\n        nodeQueue.Remove()\n    }\n    elapsed = time.Since(start)\n    fmt.Println(\"\
    从 nodeQueue 中移除 100 万个整型数的时间为\", elapsed)\n}\n\n/* 输出\n在 sliceQueue 中插入 100 万个整型数的时间为\
