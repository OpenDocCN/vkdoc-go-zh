- fmt: '## 7.3 Building a Hash Table


    Commercial-grade hash tables (maps) are complex and, as the previous section demonstrated,
    extremely efficient.


    The details of how the Go map function is constructed are given in [`https://github.com/golang/go/blob/master/src/runtime/map.go`](https://github.com/golang/go/blob/master/src/runtime/map.go).


    In this section, we construct a relatively inefficient hash table from scratch
    so that we can briefly explore the issues related to hash-table construction.


    Consider the following code segment:


    ```

    package main

    import (

    "hash/fnv" // Fowler–Noll–Vo algorithm

    // Other details not shown yet

    )

    const tableSize = 100_000

    func hash(s string) uint32 {

    h := fnv.New32a() // Fowler-Noll-Vo algorithm

    h.Write([]byte(s))

    return h.Sum32()

    }

    type WordType struct {

    word string

    list []string

    }

    // At every index there is a word and slice of words

    type HashTable [tableSize]WordType

    ```


    The function `hash` uses the Fowler-Noll-Vo algorithm to map a string to an unsigned
    32-bit integer. The interested reader may wish to research the details of this
    algorithm.


    We define a `WordType` as a struct with fields `word` and `list`.


    Next, consider the function `NewTable` that creates and returns a `Hashtable`.


    ### Create an Empty Hash Table


    ```

    func NewTable() HashTable {

    var table HashTable

    for i := 0; i < tableSize; i++ {

    table[i] = WordType{"", []string{}}

    }

    return table

    }

    ```


    At every location in the `HashTable` array (fixed size `tableSize`), a variable
    of `WordType` is assigned with empty `word` and empty string slice, `[]string{}`.


    ### Insertion into Hash Table


    Now consider method `Insert` as follows:


    ```

    func (table *HashTable) Insert(word string) {

    index := hash(word) % tableSize // Between 0 and tableSize - 1

    // Search table[index] for word

    if table[index].word == word {

    return // duplicates not allowed

    }

    if len(table[index].list) > 0 {

    for i := 0; i < len(table[index].list); i++ {

    if table[index].list[i] == word {

    return // duplicates not allowed

    }

    }

    }

    if table[index].word == "" {

    table[index].word = word

    } else {

    table[index].list = append(table[index].list, word)

    }

    length += 1

    }

    ```


    We "map" the input parameter, `word` (a string), to an index using the `hash`
    function displayed earlier.


    A hash table cannot contain duplicate keys, so we test to see whether `word` already
    exists at `index`. If so, we return without changing the table.


    We further test for a duplicate entry by scanning the `list`, if non-empty, for
    `word` and again return without changing the table if a duplicate is found.


    Assuming the input word is not already in the table, we assign `word` to `table`
    at `index`. If there is already a word at the table of index, we append the input
    word to the string slice at location index.


    ### Collisions and Collison Resolution


    For a string slice at some index location to grow, there must be a collision.
    That is, the index assigned to the input word must collide with an existing word
    already at that location. Such collisions are inevitable since we compress `index`
    to be within the table size using:


    ```

    index := hash(word) % tableSize // Between 0 and tableSize - 1

    ```


    ### Load Factor


    The **load factor** of the table is the number of words in the table divided by
    the table size. Even if the load factor is less than 1, collisions may still occur
    because the hash function does not produce unique values for all input words.
    A table with many string slices (collision chains) at various index locations
    takes longer to access.


    ### Determining Whether a Key Is Present


    We next consider function `IsPresent` given as follows:


    ```

    func (table HashTable) IsPresent(word string) bool {

    index := hash(word) % tableSize // Between 0 and tableSize - 1

    // Search table[index] for word

    if table[index].word == word {

    return true

    }

    if len(table[index].list) > 0 {

    for i := 0; i < len(table[index].list); i++ {

    if table[index].list[i] == word {

    return true

    }

    }

    }

    return false

    }

    ```


    This function returns true if the input word is at location `index` or in a non-empty
    list rooted at `index`.


    ### Comparing the Performance of Hash Table with Standard Map


    Listing [7-4](#527841_1_En_7_Chapter.xhtml#PC9) puts the pieces discussed earlier
    together and compares the execution time of the hash table with the standard map.


    ```

    // Hash table construction

    package main

    import (

    "fmt"

    "hash/fnv" // Fowler–Noll–Vo algorithm

    "strconv"

    "time"

    )

    const tableSize = 100_000

    var length int

    func hash(s string) uint32 {

    h := fnv.New32a()

    h.Write([]byte(s))

    return h.Sum32()

    }

    type WordType struct {

    word string

    list []string

    }

    // At every index there is a slice of words

    type HashTable [tableSize]WordType

    func NewTable() HashTable {

    var table HashTable

    for i := 0; i < tableSize; i++ {

    table[i] = WordType{"", []string{}}

    }

    return table

    }

    func (table *HashTable) Insert(word string) {

    index := hash(word) % tableSize

    if table[index].word == word {

    return

    }

    if len(table[index].list) > 0 {

    for i := 0; i < len(table[index].list); i++ {

    if table[index].list[i] == word {

    return

    }

    }

    }

    if table[index].word == "" {

    table[index].word = word

    } else {

    table[index].list = append(table[index].list, word)

    }

    length++

    }

    func (table HashTable) IsPresent(word string) bool {

    index := hash(word) % tableSize

    if table[index].word == word {

    return true

    }

    if len(table[index].list) > 0 {

    for i := 0; i < len(table[index].list); i++ {

    if table[index].list[i] == word {

    return true

    }

    }

    }

    return false

    }

    func main() {

    myTable := NewTable()

    mapCollection := make(map[string]string)

    words := []string{}

    for i := 0; i < 500_000; i++ {

    word := strconv.Itoa(i)

    words = append(words, word)

    myTable.Insert(word)

    mapCollection[word] = ""

    }

    fmt.Println("Benchmark test begins to test words: ", length)

    start := time.Now()

    for i := 0; i < length; i++ {

    if myTable.IsPresent(words[i]) == false {

    fmt.Println("Word not found in table: ", words[i])

    }

    }

    elapsed := time.Since(start)

    fmt.Println("Time to test all words in myTable: ", elapsed)

    start = time.Now()

    for i := 0; i < len(mapCollection); i++ {

    _, present := mapCollection[words[i]]

    if !present {

    fmt.Println("Word not found in mapCollection: ", words[i])

    }

    }

    elapsed = time.Since(start)

    fmt.Println("Time to test words in mapCollection: ", elapsed)

    }

    /* Output

    Benchmark test begins to test words: 500000

    Time to test all words in myTable: 1m17.880336666s

    Time to test words in mapCollection: 24.405583ms

    */

    Listing 7-4

    Comparing hash table to map

    ```


    A half-million words are generated by converting the integer index in a loop to
    a string and using the resulting strings as inputs to the table and to the map.
    The table takes almost 138 seconds to search for all the words that are entered
    compared to less than 25 milliseconds for the map. Quite a dramatic difference!


    In the next section, we delve into the important application area of string searching.
    We present a classic string search algorithm that uses hashing as its basis.


    ## 7.4 Hash Application: String Search


    We explore a classic and important string search application in this section.
    The **Rabin-Karp** algorithm features hashing and attempts to reduce the complexity
    of searching from `O(n*m)` to `O(n)`, where n is the length of the string to be
    searched and m is the length of the pattern we are searching for.


    A function that accomplishes a string search using brute force is given as follows:


    ```

    func BruteForceSearch(txt, pattern string) (bool, int) {

    patternLength := len(pattern)

    for outer := 0; outer < len(txt)-patternLength; outer++ {

    if txt[(outer):(outer+patternLength)] == pattern {

    return true, outer

    }

    }

    return false, -1

    }

    ```


    As an outer loop ranges from `0` to `len(txt) – patternLength`, we compare the
    string bounded by `txt[(outer):(outer+patternLength)]` to `pattern`. If the two
    strings are equal, we return true and the outer position. Since the string comparison
    is of `O(patternLength)` and we perform this operation n times, we have an `O(n
    * m)` algorithm, where m is the pattern length.


    At this moment, you may rightfully be asking "what does this have to do with hashing?"


    Suppose we replace the test for string equality, performed `n – m` times with
    a comparison of their hash values. That is, we compare `hash(txt[(outer):(outer+patternLength)])`
    with `hash(pattern)` and do this `n – m` times, returning true if their hash values
    are the same.'
