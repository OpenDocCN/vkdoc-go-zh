    # 8.1 二叉树


    二叉树是一种特殊类型的树，其特点如下：


    - 每个节点最多有两个子节点

    - 子节点分别称为`左子节点`和`右子节点`


    图 8-1 展示了一棵具有 7 个节点、高度为 5、包含 3 个叶子节点的二叉树。


    ![](img/527841_1_En_8_Fig1_HTML.png)


    一幅展示有 7 个节点、5 层结构的二叉树示意图。第 1 层的根节点 A 分为第 2 层的节点 B 和 C。第 2 层的节点 B 进一步分为节点 D，并引向第
    3 层的节点 E。第 3 层的节点 E 再分为第 5 层的节点 F 和 G。


    图 8-1


    二叉树


    与自然界中的树不同，二叉树的根位于结构顶部，随着更多节点的添加，树向下生长。叶子节点没有子节点。


    下一节，我们将介绍遍历二叉树的三种方法。


    ## 8.2 树的遍历


    树的遍历是指访问每个节点一次，并对节点中存储的数据进行操作。对于二叉树，我们将讨论三种遍历方式：`中序`、`前序`和`后序`。每种遍历都是通过递归定义的。我们以上图所示的树为例进行说明。


    ### 中序遍历


    从根节点开始，我们从 A 向左下降到 B。再次向左下降，到达 D。然后向左到 E，最后再到 F。此时尚未产生任何输出。从 F 向左下降，发现没有左子节点。然后回溯并访问
    F。访问可以是输出 F 中存储的数据，或对该数据执行某种操作。再到 F 的右侧，发现也没有右子节点。处理完 F 的左、访问 F 以及 F 的右之后，回溯到
    E。由于已经处理过 E 的左，接下来访问节点 E。然后下降到 E 的右。从 G 向左，然后访问 G。回溯到 D。访问 D。回溯到 B。访问 B。回溯到 A。处理完
    A 的左，访问 A。下降到右侧到节点 C。向左走。访问 C。向右走。回溯到 A，完成遍历。


    因此，访问顺序为 `F, E, G, D, B, A, C`。


    ### 前序遍历


    对于这种遍历，我们首先访问节点 A。访问可以是将 A 中存储的数据输出，或对其执行某种操作。访问 A 后，向左下降到节点 B。访问节点 B。然后向左下降并访问节点
    D。接着向左下降并访问节点 E。再向左下降并访问节点 F。由于节点 F 没有左子节点，并且已经访问过节点 F，我们向右下降并访问节点 G。回溯到节点 A。由于已经访问过
    A，我们向右下降并访问节点 C。因此，访问顺序为 `A B D E F G C`。


    ### 后序遍历


    在这里，递归的操作顺序是：先向左下降，再向右下降，最后访问节点。请对照前文的树，看是否同意这种遍历产生的结果序列为 `F G E D B C A`。


    下一节，我们将借助第三方 Fyne 包来实现二叉树的图形化绘制。


    ## 8.3 绘制树


    我们希望能够使用`fyne`图形用户界面包中的图形函数来绘制二叉树。绘制的图形必须显示所有树节点及其键值，以及连接父节点与子节点的线条，并在绘图中体现每个节点的层级。


    图 8-2 展示了由本节代码构建的树的屏幕截图。每个节点中数据的基类型假定为单字符字符串。


    ![](img/527841_1_En_8_Fig2_HTML.png)


    一幅二叉树的示意图。根节点 A 分为 B 和 C。节点 B 引向 D。节点 D 引向 E 和 H。节点 E 引向 F 和 G。节点 C 引向 I 和 J。节点
    I 引向 K。节点 K 引向 L。节点 L 引向 M 和 N。节点 M 引向 R。节点 N 引向 O。节点 O 引向 P 和 Q。


    图 8-2


    二叉树的屏幕截图


    为了简化对相当复杂的绘制树算法的解释，我们首先给出一个非泛型版本，该版本使用 `string` 作为基类型。下一章将介绍泛型版本。代码清单 8-1 展示了绘制二叉树的核心数据结构。


