    输出量很大。`Train`函数执行1500个周期，每个周期涉及一次前向计算和一次反向计算来训练网络。并且每次迭代都会输出当前的均方误差`cost`。观察这些`cost`的演变，并看到它们如何随着网络的训练而减少，这既有趣又重要。


