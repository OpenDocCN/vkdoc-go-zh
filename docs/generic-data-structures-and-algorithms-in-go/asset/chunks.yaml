    for _, suit := range suits {

    for _, rank := range ranks {

    deck.Cards = append(deck.Cards, Card{rank, string(suit)})

    }

    }

    deck.shuffle()

    return *deck

    }

    func (deck Deck) display() {

    for _, card := range deck.Cards {

    fmt.Print(card.Rank + card.Suit + " ")

    }

    }

    ```


