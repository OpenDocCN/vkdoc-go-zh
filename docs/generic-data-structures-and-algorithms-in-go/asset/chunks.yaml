    \ 213 17.5} {James 111 18.75}]\n*/\nListing 1-6\nBuilding and sorting slices of\
    \ students\n```\n\n### Map Functions\n\nGo语言中的Map函数很常见，它对切片执行转换，生成一个包含转换结果的新切片。考虑以下示例：\n\
    \n```\nfunc MyMap(input []int, f func(int) int) []int {\nresult := make([]int,\
    \ len(input))\nfor index, value := range input {\nresult[index] = f(value)\n}\n\
    return result\n}\nfunc main() {\nslice := []int{1, 5, 2, 7, 4}\nresult := MyMap(slice,\
    \ func(i int) int {\nreturn i * i\n})\nfmt.Println(result)\n}\n/* Output\n[1 25\
    \ 4 49 16]\n*/\n```\n\n`MyMap`函数生成一个输出切片，其中包含输入切片中整数的平方。在将`result`声明为长度为`len(slice)`的整数切片后，它遍历`input`中的值范围，根据传递给`MyMap`的函数`f`转换每个值。\n\
    \n### 使 MyMap 成为泛型\n\n`MyMap`可以按如下方式泛型化：\n\n```\nfunc GenericMap[T1, T2 any](input\
    \ []T1, f func(T1) T2) []T2 {\nresult := make([]T2, len(input))\nfor index, value\
    \ := range input {\nresult[index] = f(value)\n}\nreturn result\n}\n```\n\n函数`GenericMap`接受两个泛型参数`T1`和`T2`。使用传入的函数`f`，它将`input`切片中的数据转换为类型`T2`。这里，`T1`和`T2`不受约束，它们都属于`any`类型。\n\
    \n### Filter Functions\n\nGo语言中的Filter函数也很常见，它基于传入的函数对输入切片执行过滤操作。考虑以下示例：\n\n```\n\
    func MyFilter(input []float64, f func(float64) bool) []float64 {\nvar result []float64\n\
    for _, value := range input {\nif f(value) == true {\nresult = append(result,\
    \ value)\n}\n}\nreturn result\n}\nfunc main() {\ninput := []float64{17.3, 11.1,\
    \ 9.9, 4.3, 12.6}\nres := MyFilter(input, func(num float64) bool {\nif num <=\
    \ 10.0 {\nreturn true\n}\nreturn false\n})\nfmt.Println(res)\n}\n/* Output\n[9.9\
    \ 4.3]\n*/\n```\n\n在这里，输入切片中小于或等于`10.0`的任何值都会被保留，而所有其他值则被过滤掉。\n\n### 使 MyFilter\
    \ 成为泛型\n\n`MyFilter`可以按如下方式泛型化：\n\n```\nfunc GenericFilter[T any](input []T, f\
    \ func(T) bool) []T {\nvar result []T\nfor _, val := range input {\nif f(val)\
    \ {\nresult = append(result, val)\n}\n}\nreturn result\n}\n```\n\n在清单[1-7](#527841_1_En_1_Chapter.xhtml#PC15)中，我们演练了泛型map和filter函数。\n\
    \n```\npackage main\nimport (\n\"fmt\"\n)\nfunc GenericMap[T1, T2 any](input []T1,\
    \ f func(T1) T2) []T2 {\nresult := make([]T2, len(input))\nfor index, value :=\
    \ range input {\nresult[index] = f(value)\n}\nreturn result\n}\nfunc GenericFilter[T\
    \ any](input []T, f func(T) bool) []T {\nvar result []T\nfor _, val := range input\
    \ {\nif f(val) {\nresult = append(result, val)\n}\n}\nreturn result\n}\nfunc main()\
    \ {\ninput := []float64{-5.0, -2.0, 4.0, 8.0}\nresult1 := GenericMap[float64,\
    \ float64](input, func(n float64) float64 {\nreturn n * n\n})\nfmt.Println(result1)\n\
    greaterThanFive := GenericFilter[int]([]int{4, 6, 5, 2, 20, 1, 7},\nfunc(i int)\
    \ bool {\nreturn i > 5\n})\nfmt.Println(greaterThanFive)\noddNumbers := GenericFilter[int]([]int{4,\
    \ 6, 5, 2, 20, 1, 7},\nfunc(i int) bool {\nreturn i % 2 == 1\n})\nfmt.Println(oddNumbers)\n\
    lengthGreaterThan3 := GenericFilter[string]([]string{\"hello\", \"or\", \"the\"\
