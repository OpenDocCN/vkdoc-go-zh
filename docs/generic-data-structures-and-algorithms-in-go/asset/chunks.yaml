    ## 13.3 `ShowTreeGraph` 的实现


    如果我们使用第 8 章中用于绘制二叉树的代码，并将其原封不动地应用于表达式树，对于清单 13-1 中生成的树，我们会得到如图 13-2 所示的图形。


    ![](img/527841_1_En_13_Fig2_HTML.png)


    一张图。竖线标记从 94 到 98，横线标记从 0 到 16。第 99 行有加号。第 98 行有加号和除号。第 97 行有加号、减号、y。第 96 行有 a、b、除号、h、x、y。第
    95 行有加号、减号。第 94 行有 c、d、f、g。所有元素都排列在不同的水平点上，其中一些由线条连接。


    **图 13-2** 使用第 8 章代码生成的表达式树


    为什么失败了？表达式树是一棵二叉树，因此人们会期望第 8 章的代码在这里能够工作。


    用于图形化显示二叉树的那套代码假定每个节点都有一个唯一的 `value` 字段。


    表达式树不满足这个要求，因为存在具有相同值的节点。例如，有多少个节点的值是“+”？很多！


    为了解决这个问题，以便我们可以部署代码来绘制表达式树，我们将一个唯一的数字标签（作为字符串）连接到每个节点的 `ch` 字段。然后，在创建标签时，我们只从
    `node.ch` 中提取第一个字符。通过这种方式，我们在构建树时强制每个节点都拥有一个唯一的字符串表示。


    清单 13-2 展示了用于绘制表达式树的函数套件的修改部分。新增的四行代码以粗体显示。


    变量 `c` 被定义为函数 `inorderLevel` 的全局变量。每次调用此函数时，`c` 增加 1，并且 `node.ch` 会被修改以附加这个唯一的标签。


    在函数 `ShowTreeGraph` 中添加标签时，只使用 `node.ch` 的第一个字符，从而屏蔽掉唯一的标签。


    ```

    var c  = 0

    func inorderLevel(node *Node, level int) {

    if node != nil {

    inorderLevel(node.left, level + 1)

    c += 1

    node.ch += string(c)

    data = append(data, NodePos{node.ch, 100 -

    level, -1})

    inorderLevel(node.right, level + 1)

    }

    }

    // 添加标签

    for index := 0; index < len(data); index++ {

    x := float64(data[index].XPos) - 0.1

    y := float64(data[index].YPos) - 0.02

    str := data[index].Val

    label, err := plotter.NewLabels(plotter.XYLabels {

    XYs: []plotter.XY {

    {X: x ,Y: y},

    },

    Labels: []string{string(str[0])},

    },)

    if err != nil {

    log.Fatalf("could not creates labels

    plotter: %+v", err)

    }

    p.Add(label)

    }

    清单 13-2

    用于绘制表达式树的代码

    ```


    当将修改后的树绘制函数套件添加到清单 13-2 的代码中时，生成的树形图如图 13-3 所示。


    ![](img/527841_1_En_13_Fig3_HTML.png)


    一张图。竖线标记从 94 到 98，横线标记从 0 到 16。垂直点。第 99 行有加号。第 98 行有加号和除号。第 97 行有加号、减号、y。第 96
    行有 a、b、除号、h、x、y。第 95 行有加号、减号。第 94 行有 c、d、f、g。所有元素都排列在不同的水平点上，并由线条连接形成一棵树。


    **图 13-3** 使用修改后的绘图代码生成的表达式树


    ## 13.4 总结


    在本章中，我们实现并讨论了构建和求值表达式树的细节。我们展示了绘制表达式树所需的修改。


    在下一章中，我们将介绍一个涉及并发的更大规模的应用。


    # 14. 使用并发进行生态模拟


    前一章介绍了表达式树。我们展示了如何使用此类树来表示和求值简单的数学表达式。


    在本章中，我们换个方向。我们将介绍一种生态模拟的并发实现。


    在下一节中，我们将概述这个模拟。'
- fmt: '# 14.1 Overview


    This chapter presents an interesting emergent computation using a predator/prey
    model of a simple ecological system that simulates population dynamics. The design
    uses concurrency.


    Many important concepts and techniques from previous chapters are used in this
    example. These include a graphical framework, extensive use of goroutines, object-oriented
    programming, type assertions (introduced in this chapter), implementing interfaces,
    and protecting shared data, to name a few.


    We simulate the dynamics of three simplified marine-life species coexisting in
    an ocean with positions at any instant defined in a 50 × 50 grid of locations.
    At any moment, each of the 2500 locations contains nothing or a **shark** or a
    **tuna** or a **mackerel**.


    In this simple food chain, **shark** is the top of the chain because **shark**
    can eat **tuna**. **Tuna** is second in the food chain because **tuna** can eat
    **mackerel**. **Mackerel** are at the bottom of the food chain. They are strictly
    a prey (can be eaten by **tuna**). **Tuna** is both a predator (can eat **mackerel**)
    and a prey (can be eaten by **shark**).


    Each of the three species can reproduce according to rules to be specified. The
    two species that are predators (**shark** and **tuna**) can die of starvation.
    **Tuna** can also die because they are eaten by **shark**. All three species can
    die of old age. Since **shark** cannot be eaten, their population declines because
    of starvation (failure to eat **tuna** within a specified interval of time) or
    old age. Tuna also can reproduce and can die of starvation or old age. **Mackerel**
    can reproduce, die of old age, or die because they are eaten.


    The rules of movement within the 50 × 50 grid of locations allow each critter
    (**shark**, **tuna**, or **mackerel**) to move concurrently once they are created.
    When they die (from starvation, old age, or being eaten), their movement stops,
    and they are purged from the ocean. Snapshots of the entire ocean are taken periodically
    to display the location of all the species along with empty locations.


    We color-code each species, so the simulation output is most interesting as it
    shows the migration and population dynamics of the three species as a function
    of time. There is no communication between the critters. Each critter is an independent
    agent moving concurrently with all the other critters.


    ## 14.2 Specifications


    We specify the rules that govern each of the three species.


    ### Mackerel


    A mackerel moves to an empty location in its immediate neighborhood (the collection
    of up to eight cells from the mackerel''s current location, fewer if the mackerel
    is at one of the boundaries of the ocean (row 0, row 49, col 0, col 49)). If more
    than one empty location is found, it chooses one randomly and moves to this empty
    location, vacating its previous location. All mackerel, when created, are assigned
    a reproduction value. Each time it moves, its reproduction value is decremented
    by one. When its reproduction value becomes equal or less than zero, and the mackerel
    has been able to move to a neighboring empty location, it reproduces by creating
    a new mackerel and placing it in the location just vacated. This new mackerel
    takes on a life of its own and moves concurrently with the rest of the sea critters.
    If the mackerel was able to reproduce, its reproduction value is reset to its
    initial value. If the reproduction value is equal or less than zero but the mackerel
    was blocked from movement (no empty locations in its immediate neighborhood),
    it cannot reproduce on that move and must wait for a future move. Reproduction
    can occur only when the mackerel has moved, to allow the newly created mackerel
    to occupy the cell vacated by the mackerel that is reproducing.


    If a mackerel is eaten by some tuna, it must be blocked from further moves because
    a dead mackerel cannot move or reproduce.


    A mackerel is also assigned an age value when created. On each move, its age value
    is decremented by one. When the age value reaches 0, the mackerel dies. The dead
    mackerel must be blocked from further movement and purged from the ocean.


    ### Tuna


    The behavior of a tuna is only slightly different than a mackerel. On each move,
    its reproduction value, starvation value, and age value are decremented by one.
    If its starvation value or age value is zero, it dies and cannot move again and
    is purged from the ocean.


    The tuna first attempts to move to a neighboring location containing a mackerel.
    If there is more than one mackerel found, it chooses one at random and moves to
    its location. The dead mackerel can no longer move and is purged from the ocean.
    The tuna''s starvation value is reset to its original state. If there are no mackerel
    in the immediate neighborhood of the tuna, it attempts to move to a neighboring
    empty location, choosing a random empty cell if there is more than one. When its
    reproduction value is equal or less than 0, it reproduces using the same mechanism
    described for the mackerel. It cannot reproduce unless it has moved.


    If some tuna is eaten by a shark, it cannot move again and must be purged from
    the ocean.


    ### Shark


    The behavior of a shark is like a tuna except that it cannot be eaten. When it
    moves, it first attempts to find and eat some tuna in one of its neighboring cells.
    Failing that, it moves to a neighboring empty location if one exists, choosing
    one randomly if more than one exists. Its rules for reproduction are identical
    to tuna and mackerel.


    In summary, the population of mackerel increases because of reproduction. Its
    population decreases because of being eaten or old age.


    The population of tuna increases because of reproduction. Its population decreases
    because of being eaten, starvation, or old age.


    The population of shark increases because of reproduction. Its population decreases
    because of starvation or old age.


    ### Output


    Each critter is represented by a colored rectangle in the 50 × 50 grid of cells.
    Red rectangles represent shark. Blue rectangles represent tuna, and green rectangles
    represent mackerel. Empty cells are colored gray.


    A census is conducted periodically, and the current positions of each critter
    and empty cells in the 50 × 50 grid are displayed graphically. This enables the
    migration pattern of each species to be dramatically displayed as the critters
    move concurrently.


    A screenshot of the simulation in action is shown in Figure [14-1](#527841_1_En_14_Chapter.xhtml#Fig1).


    ![](images/527841_1_En_14_Chapter/527841_1_En_14_Fig1_HTML.png)


    A screenshot of an ecological simulation. The simulation is a 50 by 50 grid and
    illustrated using differently shaded squares is the population of Shark, Tuna,
    and Mackerel. The mackerel population is incredibly high, covering most of the
    grid. The number of Tuna has decreased to 103. There are only 13 Sharks. Light-colored
    shades are empty cells.


    Figure 14-1: Simulation in action


    Here, the population of mackerel has exploded outward, the population of tuna
    is about to encroach on the mackerel, and the sharks are waiting for the tuna
    to increase so they can feed on the tuna.'
