- fmt: '## 2.2 Sorting Algorithms


    Sorting collections of data such as a slice in Go has always been a fundamental
    part of learning computer science. In this section, we look at two well-known
    sorting algorithms and examine their complexity using a big O analysis.


    ### Bubblesort Algorithm


    Listing [2-3](#527841_1_En_2_Chapter.xhtml#PC6) implements a generic bubblesort
    algorithm assuming an ordered slice of data (base type where each element can
    be compared with respect to greater than or less than).


    ```

    package main

    import(

    "fmt"

    )

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    func bubblesort[T Ordered](data []T) {

    n := len(data)

    for i:= 0; i < n - 1; i++ {

    for j := 0; j < n - 1 - i; j++ {

    if data[j] > data[j + 1] {

    data[j], data[j + 1] = data[j + 1], data[j]

    }

    }

    }

    }

    func main() {

    numbers := []float64{3.5, -2.4, 12.8, 9.1}

    names := []string{"Zachary", "John", "Moe", "Jim", "Robert"}

    bubblesort[float64](numbers)

    fmt.Println(numbers)

    bubblesort[string](names)

    fmt.Println(names)

    }

    /* Output

    [-2.4 3.5 9.1 12.8]

    [Jim John Moe Robert Zachary]

    */

    Listing 2-3

    Generic bubble sort

    ```


    The type `Ordered` can have many more basic types included. The tilde symbol in
    front of each of the basic types means that any user-defined type that uses the
    given base type is considered `Ordered`.


    Bubblesort has earned its popularity in CS 1 courses because of its relative simplicity.
    Elements are compared sequentially and interchanged if out of order. On each iteration
    of the outer loop, the largest value “bubbles” to the rightmost position in the
    slice. This position is not considered during the next iteration of the inner
    loop because of


    ```

    j < n – 1 – i.

    ```


    The nested for-loops, shown in boldface, make this an `O(n^2)` algorithm. In general,
    k nested loops produce an algorithm of `O(n^k)`.


    Bubblesort is most efficient when the slice being sorted is already sorted and
    slowest when the slice is in reverse order.


    Next, we examine one of the most widely used sorting algorithms, the classic quicksort.


    ### Quicksort Algorithm


    As the name implies, this algorithm is reputed to perform very fast sorts.


    Listing [2-4](#527841_1_En_2_Chapter.xhtml#PC8) shows the implementation of a
    generic quicksort.


    ```

    package main

    import(

    "fmt"

    )

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    func quicksort[T Ordered](data []T, low, high int) {

    if low < high {

    pivot := partition(data, low, high)

    quicksort(data, low, pivot - 1)

    quicksort(data, pivot + 1, high)

    }

    }

    func partition[T Ordered](data []T, low, high int) int {

    pivot := data[low]

    i := low

    j := high + 1

    for {

    i++

    j--

    for data[i] < pivot && i < high {

    i++

    }

    for data[j] > pivot && j > low {

    j--

    }

    if i >= j {

    break

    }

    data[i], data[j] = data[j], data[i]

    }

    data[low] = data[j]

    data[j] = pivot

    return j

    }

    func main() {

    numbers := []float64{3.5, -2.4, 12.8, 9.1}

    names := []string{"Zachary", "John", "Moe", "Jim", "Robert"}

    quicksort[float64](numbers, 0, len(numbers) - 1)

    fmt.Println(numbers)

    quicksort[string](names, 0, len(names) - 1)

    fmt.Println(names)

    }

    /* Output

    [-2.4 3.5 9.1 12.8]

    [Jim John Moe Robert Zachary]

    */

    Listing 2-4

    Generic quicksort

    ```


    The quicksort algorithm is an example of a divide-and-conquer algorithm. We partition
    the original slice into two smaller slices and sort each of these by continuing
    to partition each into two more until eventually we get slices of two elements
    that we compare with each other.


    If the original slice has n elements, we can perform the divide-and-conquer `log[2]n`
    times (the number of times we can divide n by 2 to get down to two elements).


    This assumes that we partition the slices by cutting them in half each time. A
    close examination of the `partition` function reveals that this is not always
    the case.


    The partition function uses its leftmost element as the pivot element. It then
    moves data around the slice to ensure that elements to the left of the pivot element
    are smaller and elements to the right of the pivot are larger.


    ### Big O Analysis


    We “walk” through an example to illustrate, in detail, how partition does its
    work.


    Suppose our array slice that we wish to partition is


    ```

    [6, 2, 3, 9, 8, 17, 4]

    ```


    We choose the pivot element to be 6 (the leftmost element).


    We increment the index `i` until we find an element larger than the pivot element
    6. That is element 9 in position 3.


    Now starting with index `j` in position 6 (the rightmost position), we decrement
    `j` until we find an element whose value is less than the pivot element. That
    is element 4 in position 6. We interchange the elements in positions 3 and 6 producing


    ```

    [6, 2, 3, 4, 8, 17, 9]

    ```


    Starting at index 3, we again increment `i` until we find an element greater than
    6, which is 8 in position 4. We decrement `j` (in position 6) until we find an
    element less than the pivot element 6. That is element 4 in position 3. We don’t
    interchange the elements in positions 3 and 4 since `i` is not less than `j`.


    Since `i` is no longer less than `j`, we exit the outer for-loop.


    We perform the final interchange of the pivot element with position `j` to get


    ```

    [4, 2, 3, 6, 8, 17, 9]

    ```


    All the elements to the left of the pivot element 6 are less than 6, and those
    to the right of 6 are greater than 6.


    ### Worst Case for Quicksort


    If the original array were sorted, so the pivot element was the smallest, this
    would be worst case. We would have to interchange n – 1 elements on the first
    pass, n – 2 elements on the second pass, etc., giving us an `O(n^2)` algorithm.
    This is one of the ironies of quicksort. The closer the data is to initially sorted,
    the worse quicksort performs.


    A useful filter to impose in front of quicksort would be to test the input to
    see whether it is already sorted. If so, bail out and don’t perform any sorting.


    Since the `partition` function is `O(n)`, the quicksort algorithm is `O(n log[2]
    n)` when the data being sorted is not already sorted or close to sorted.


    ### Comparing Bubblesort to Quicksort


    In Listing [2-5](#527841_1_En_2_Chapter.xhtml#PC12), we compare bubblesort with
    quicksort using sine wave data for our array slice.


    ```

    package main

    import(

    "fmt"

    "math"

    "time"

    )

    const size = 100_000

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    // Snip – See Listings 2.3 and 2.4

    func main() {

    data := make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = math.Sin(float64(i * i))

    }

    start := time.Now()

    quicksort[float64](data, 0, len(data) - 1)

    elapsed := time.Since(start)

    fmt.Println("Elapsed sort time for sine wave using quicksort: ", elapsed)

    data = make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = math.Sin(float64(i * i))

    }

    start = time.Now()

    bubblesort[float64](data)

    elapsed = time.Since(start)

    fmt.Println("Elapsed sort time for sine wave using bubblesort: ", elapsed)

    }

    /*Output

    lapsed sort time for sine wave using quicksort:  7.808522ms

    Elapsed sort time for sine wave using bubblesort:  12.26859692s

    */

    Listing 2-5

    Comparing bubblesort with quicksort

    ```


    The `O(n log[2] n)` quicksort performs almost 1600 times faster than the `O(n^2)`
    bubblesort.'
