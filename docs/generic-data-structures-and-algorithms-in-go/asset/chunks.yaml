    If we use the code from Chapter [8](#527841_1_En_8_Chapter.xhtml) for graphing
    a binary tree and apply it, as is, to an expression tree, we get the graph shown
    in Figure [13-2](#527841_1_En_13_Chapter.xhtml#Fig2) for the tree produced in
