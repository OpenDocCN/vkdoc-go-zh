    \ + 500)\n* time.Millisecond)\n}\n}\n```\n\n### Discussion of Code\n\nMost of\
    \ the implementation details of **Move** for **Shark** are the same as for **Mackerel**.\
    \ The only change is that the shark first looks for a neighboring tuna to eat.\n\
    \nHere, we encounter a **type assertion**. Let’s look closely at this.\n\nWe invoke\
    \ the ***findRandomCritter*** method as follows passing ***new(Tuna)*** as the\
    \ third parameter:\n\n```\nfound, newLoc := findRandomCritter(shark.x, shark.y,\n\
    new(Tuna))\n```\n\nIf found is true, we set the ***starv*** value back to its\
    \ ***SHARKSTARVE*** initial value. Then we assign the variable ***eatenTuna***\
    \ as follows:\n\n```\n// Type assertion\neatenTuna := locations[newLoc.y][newLoc.x].critter.(*Tuna)\n\
    ```\n\nThis type assertion asserts that **locations[[newLoc.y][newLoc.x]** is\
    \ of type ***Tuna**.\n\nSince this assertion is true, we can treat ***eatenTuna***\
    \ as if it had been defined to be of type ***Tuna**.\n\nBy setting the ***x***\
    \ and ***y*** values of ***eatenTuna*** to -1, we effectively terminate the goroutine\
    \ for the eaten **Tuna** object.\n\nType assertions of this kind are useful when\
    \ it is necessary to act on the actual type of an object whose formal type is\
    \ an interface.\n\nIt is essential that the **Tuna** type implement the ***MarineLife***\
    \ interface for this to work. It does!\n\nThe other three methods that implement\
    \ the ***MarineLife*** interface for type **Shark** are the same.\n\n### Move\
    \ Method for Tuna\n\nThe ***Move*** method for class **Tuna** is essentially the\
    \ same as the ***Move*** method just described for type **Shark**.\n\n```\nfunc\
    \ (tuna *Tuna) Move() {\nfor ; quit == false ; {\nif tuna.x == -1 { // Tuna no\
    \ longer alive\nbreak\n}\nmutex.Lock()\ntuna.repro -= 1\ntuna.starv -= 1\ntuna.life\
    \ -= 1\nif tuna.LifeOver() || tuna.Starve() {\nlocations[tuna.y][tuna.x].critter\
    \ = nil\ntuna.x = -1\ntuna.y = -1\nmutex.Unlock()\nbreak\n}\n// Find random neighbor\
    \ that is a Mackerel\nfound, newLoc := findRandomCritter(tuna.x,\ntuna.y, new(Mackerel))\n\
    if found == true {\nfmt.Printf(\"\\nTuna Move from  to\n\", tuna.x, tuna.y, newLoc.x,\n\
    newLoc.y)\ntuna.starv = TUNASTARVE\n// Must stop go routine for mackerel that\n\
    // was eaten\n// Type assertion\neatenMackerel:=         locations[newLoc.y][newLoc.x].critter.(*Mackerel)\n\
    eatenMackerel.x = -1\neatenMackerel.y = -1\nfmt.Printf(\"\\nEaten mackerel = %v\"\
    ,\neatenMackerel)\ntuna.Reproduce(newLoc)\n}\nfound, newLoc = findRandomCritter(tuna.x,\n\
    tuna.y, nil)\nif found == true {\nfmt.Printf(\"\\nTuna Move from  to\n\", tuna.x,\
    \ tuna.y, newLoc.x,\nnewLoc.y)\ntuna.Reproduce(newLoc)\n}\nmutex.Unlock()\ntime.Sleep(time.Duration(rand.Intn(500)\
    \ + 500)\n* time.Millisecond)\n}\n}\n```\n\nA similar **type assertion** is used\
    \ to enable the killing of the eaten mackerel.\n\n### Output Function for the\
    \ Graphical Display of Critters\n\nThe ***output*** function that produces a graphical\
    \ display of the critters is given as follows:\n\n```\nfunc output() *fyne.Container\
    \ {\nfor col := 0; col < numCols; col++ {\nfor row := 0; row < numRows; row++\
    \ {\nif locations[col][row].critter == nil {\nrect =\ncanvas.NewRectangle(&color.RGBA{B:\n\
    200, R: 200, G: 200, A: 255})\n} else if\nreflect.TypeOf(locations[col][row].critter)\
    \ ==\nreflect.TypeOf(new(Tuna)) {\nrect =\ncanvas.NewRectangle(&color.RGBA{B:\n\
    255, R: 0, G: 0, A: 255})\n} else if\nreflect.TypeOf(locations[col][row].critter)\
    \ ==\nreflect.TypeOf(new(Shark)) {\nrect =\ncanvas.NewRectangle(&color.RGBA{B:\n\
    0, R: 255, G: 0, A: 255})\n} else if\nreflect.TypeOf(locations[col][row].critter)\
    \ ==\nreflect.TypeOf(new(Mackerel)) {\nrect =\ncanvas.NewRectangle(&color.RGBA{B:\n\
    0, R: 0, G: 255, A: 255})\n}\nrect.Resize(fyne.NewSize(10, 10))\nrect.Move(fyne.NewPos(float32(col\
    \ * 11),\nfloat32(row * 11)))\nsegments[col + numCols * row] = rect\n}\n}\nreturn\
    \ container.NewWithoutLayout(segments...)\n}\n```\n\nIt is supported by the following\
    \ global declarations:\n\n```\nconst (\nnumRows int = 50\nnumCols int = 50\nMAKERELREPRO\
    \ int = 4\nMAKERELSTARVE int = 10000000\nMAKERELLIFE int = 30\nTUNAREPRO int =\
    \ 8\nTUNASTARVE int = 11\nTUNALIFE int = 18\nSHARKREPRO int = 15\nSHARKSTARVE\
    \ int = 25\nSHARKLIFE int = 30\n)\nvar (\nquit       bool\ncontain    *fyne.Container\n\
    rect       *canvas.Rectangle\nmutex = &sync.Mutex{}\n// Holds rectangle objects\n\
    segments  = make([]fyne.CanvasObject, numRows *\nnumCols)\n)\n```\n\nThe ***output***\
    \ function is contained within the following goroutine in function **main**:\n\
    \n```\ngo func() {\nfor ; ; {\nmutex.Lock()\ncontain := output()\nmutex.Unlock()\n\
    w.SetContent(contain)\ntime.Sleep(1000 * time.Millisecond)\n}\n}()\n```\n\n###\
    \ Discussion of Code\n\nIn a loop that queries every location object, a rectangle,\
    \ ***rect***, is defined with its color based on the type of critter occupying\
    \ the location. These rectangles are assigned to the segments array that allows\
    \ ***w.SetContent*** to display the rectangles.\n\n### Full Implementation of\
    \ Simulation\n\nThe implementation of the ecological simulation is presented in\
    \ Listing [14-1](#527841_1_En_14_Chapter.xhtml#PC11). Functions presented and\
    \ discussed previously are snipped out in the interest of space. You can download\
    \ the full source code from the website specified in the Preface and run the simulation."
  trans: "\n### 鲨鱼的移动方法\n\n接下来我们展示 `Shark` 的 `Move` 方法的实现。\n\n```go\nfunc (shark *Shark)\
    \ Move() {\n\tfor ; quit == false; {\n\t\tif shark.x == -1 { // 鲨鱼已死亡\n\t\t\t\
    break\n\t\t}\n\t\tmutex.Lock()\n\t\tshark.repro -= 1\n\t\tshark.starv -= 1\n\t\
    \tshark.life -= 1\n\t\tif shark.LifeOver() || shark.Starve() {\n\t\t\tlocations[shark.y][shark.x].critter\
    \ = nil\n\t\t\tshark.x = -1\n\t\t\tshark.y = -1\n\t\t\tmutex.Unlock()\n\t\t\t\
    break\n\t\t}\n\t\t// 寻找相邻的金枪鱼\n\t\tfound, newLoc := findRandomCritter(shark.x,\n\
    \t\t\tshark.y, new(Tuna))\n\t\tif found == true {\n\t\t\tfmt.Printf(\"\\nShark\
    \ Move from  to\n\", shark.x, shark.y, newLoc.x,\n\t\t\t\tnewLoc.y)\n\t\t\tshark.starv\
    \ = SHARKSTARVE\n\t\t\t// 类型断言\n\t\t\teatenTuna := locations[newLoc.y][newLoc.x].critter.(*Tuna)\n\
    \t\t\t// 必须停止被吃金枪鱼的 goroutine\n\t\t\teatenTuna.x = -1\n\t\t\teatenTuna.y = -1\n\
    \t\t\tfmt.Printf(\"\\nEaten tuna = %v\", eatenTuna)\n\t\t\tshark.Reproduce(newLoc)\n\
    \t\t} else {\n\t\t\tfound, newLoc = findRandomCritter(shark.x,\n\t\t\t\tshark.y,\
    \ nil)\n\t\t\tif found == true {\n\t\t\t\tfmt.Printf(\"\\nShark Move from \nto\
    \ \", shark.x,\n\t\t\t\t\tshark.y, newLoc.x, newLoc.y)\n\t\t\t\tshark.Reproduce(newLoc)\n\
    \t\t\t}\n\t\t}\n\t\tmutex.Unlock()\n\t\ttime.Sleep(time.Duration(rand.Intn(500)+500)\
    \ *\n\t\t\ttime.Millisecond)\n\t}\n}\n```\n\n### 代码讨论\n\n`Shark` 的 `Move` 方法大部分实现细节与\
    \ `Mackerel` 相同。唯一的区别在于鲨鱼会首先寻找相邻的金枪鱼作为食物。\n\n这里我们遇到了**类型断言**。让我们仔细看看。\n\n我们调用\
    \ `findRandomCritter` 方法如下，将 `new(Tuna)` 作为第三个参数传递：\n\n```go\nfound, newLoc :=\
    \ findRandomCritter(shark.x, shark.y,\n\tnew(Tuna))\n```\n\n如果 `found` 为 true，我们将\
    \ `starv` 值重置为初始值 `SHARKSTARVE`。然后按如下方式赋值变量 `eatenTuna`：\n\n```go\n// 类型断言\neatenTuna\
    \ := locations[newLoc.y][newLoc.x].critter.(*Tuna)\n```\n\n这个类型断言断言了 `locations[newLoc.y][newLoc.x]`\
    \ 的类型是 `Tuna`。\n\n由于断言成立，我们可以将 `eatenTuna` 视为已被定义为 `Tuna` 类型。\n\n通过将 `eatenTuna`\
    \ 的 `x` 和 `y` 值设为 -1，我们有效地终止了被吃掉的 `Tuna` 对象的 goroutine。\n\n当我们需要依据一个形式类型为接口的对象的实际类型进行相应操作时，这类类型断言非常有用。\n\
    \n要使此操作生效，`Tuna` 类型必须实现 `MarineLife` 接口。它确实实现了！\n\n`Shark` 类型实现的 `MarineLife`\
    \ 接口的其他三个方法与此相同。\n\n### 金枪鱼的移动方法\n\n`Tuna` 类的 `Move` 方法与上面描述的 `Shark` 的 `Move`\
    \ 方法本质上是相同的。\n\n```go\nfunc (tuna *Tuna) Move() {\n\tfor ; quit == false; {\n\t\
    \tif tuna.x == -1 { // 金枪鱼已死亡\n\t\t\tbreak\n\t\t}\n\t\tmutex.Lock()\n\t\ttuna.repro\
    \ -= 1\n\t\ttuna.starv -= 1\n\t\ttuna.life -= 1\n\t\tif tuna.LifeOver() || tuna.Starve()\
    \ {\n\t\t\tlocations[tuna.y][tuna.x].critter = nil\n\t\t\ttuna.x = -1\n\t\t\t\
