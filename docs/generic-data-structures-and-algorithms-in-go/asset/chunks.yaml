    # 17. Travelling Salesperson Problem


    The previous chapter introduced the graph data structure. A generic implementation
    was shown. Several classic graph algorithms were implemented and discussed.


    This chapter is the first of several chapters that examine solutions to the classic
    Travelling Salesperson Problem. An exact solution to this problem is computationally
    intractable. In this chapter, we present and implement an algorithm for obtaining
    an exact solution to this problem.


    In the next section, we introduce this classic problem.


    ## 17.1 Travelling Salesperson Problem and Its History


    The Travelling Salesperson Problem (TSP) is a classic problem with a rich history.
    Given a set of cities and the distance between every pair of cities, the problem
    is to **find the shortest tour that visits every city exactly once and returns
    to the starting city**. The problem was first formulated in 1930. It has become
    one of the most intensively studied problems in optimization.


    Some history:


    See [https://en.wikipedia.org/wiki/Travelling_salesman_problem#Exact_algorithms](https://en.wikipedia.org/wiki/Travelling_salesman_problem%2523Exact_algorithms).


    1. An exact solution for 15,112 German towns from TSPLIB was found in 2001 using
    the [cutting-plane method](https://en.wikipedia.org/wiki/Cutting-plane_method)
    proposed by [George Dantzig](https://en.wikipedia.org/wiki/George_Dantzig), [Ray
    Fulkerson](https://en.wikipedia.org/wiki/D._R._Fulkerson), and [Selmer M. Johnson](https://en.wikipedia.org/wiki/Selmer_M._Johnson)
    in 1954, based on [linear programming](https://en.wikipedia.org/wiki/Linear_programming).


    2. In May 2004, the Travelling Salesman Problem of visiting all 24,978 towns in
    Sweden was solved: a tour of length approximately 72,500 kilometers was computed,
    and it was proven that no shorter tour exists.


    3. In March 2005, the Travelling Salesman Problem of visiting all 33,810 points
    in a circuit board was solved using [Concorde TSP Solver](https://en.wikipedia.org/wiki/Concorde_TSP_Solver).
    The computation took approximately 15.7 CPU-years.


    TSP is a member of a group of problems that are **NP-hard** (nondeterministic
    polynomial time hard). If a polynomial-time-based solution could be found for
    any problem in this group, it can be proven that a polynomial-time solution for
    all the problems in this group could be found. To date, no such polynomial-time
    solutions have been found for any NP-hard problem.


    In the next section, we present a brute-force solution to this problem that produces
    an exact solution.


    ## 17.2 An Exact Brute-Force Solution


    Cities will be represented by vertices in a graph and numbered 0, 1, 2, …, n.
    The distance between cities will be specified as either integer or floating-point
    numbers and shown as the edges in the graph.


    Consider the graph shown in Figure [17-1](#527841_1_En_17_Chapter.xhtml#Fig1).
    This graph represents a four-city problem. The edge values represent the distance
    between cities.


    ![An illustration of a graph, of four city T S P, with the help of Brute Force
    solution. Cities are labeled 0, 1, 3, and 4. Distance between cities are edges,
    depicted in the format: City, distance. 0 to 1, 5. 0 to 2, 3. 0 to 3, 9. 1 to
    2, 2. 1 to 3, 1. 2 to 3, 6.](images/527841_1_En_17_Chapter/527841_1_En_17_Fig1_HTML.png)


    **Figure 17-1** – Graph of a four-city TSP


    The brute-force solution requires that we obtain all permutations of tours that
    start with city 0 and end with city 0. For each tour in the permutation, we compute
    its cost. We return the tour with the lowest cost.


    The tour permutations that we consider are shown in Figure [17-2](#527841_1_En_17_Chapter.xhtml#Fig2).


    ![An illustration of tour permutations of T S P, with the help of Brute Force
    solution. There are 6 sets of tour permutations presented. First set: 0 1 2 3.
    Second set: 1 3 2. Third set: 0 2 1 3. Fourth set: 0 2 3 1. Fifth set: 0 3 2 1.
    Sixth set: 0 3 1 2.](images/527841_1_En_17_Chapter/527841_1_En_17_Fig2_HTML.png)


    **Figure 17-2** – Tour permutations


    For each tour permutation, we compute the length of the tour. The tour permutation
    with the smallest length is an optimum solution to the problem. There may be ties.


    ### Finding Permutations


    The first task is to compute all the permutations of a slice containing consecutive
    integers starting at 0.


    Listing [17-1](#527841_1_En_17_Chapter.xhtml#PC1) performs this task.


    ```

    package main

    import (

    "fmt"

    )

    func Permutations(data []int, operation func([]int)) {

    permute(data, operation, 0)

    }

    func permute(data []int, operation func([]int), step

    int) {

    if step > len(data) {

    operation(data)

    return

    }

    permute(data, operation, step + 1)

    for k := step + 1; k < len(data); k++ {

    data[step], data[k] = data[k], data[step]

    permute(data, operation, step + 1)

    data[step], data[k] = data[k], data[step]

    }

    }

    func main() {

    data := []int{0, 1, 2, 3}

    Permutations(data, func(a []int) {

    fmt.Println(a)

    })

    }

    /* Output

    [0 1 2 3]

    [0 1 3 2]

    [0 2 1 3]

    [0 2 3 1]

    [0 3 2 1]

    [0 3 1 2]

    [1 0 2 3]

    [1 0 3 2]

    [1 2 0 3]

    [1 2 3 0]

    [1 3 2 0]

    [1 3 0 2]

    [2 1 0 3]

    [2 1 3 0]

    [2 0 1 3]

    [2 0 3 1]

    [2 3 0 1]

    [2 3 1 0]

    [3 1 2 0]

    [3 1 0 2]

    [3 2 1 0]

    [3 2 0 1]

    [3 0 2 1]

    [3 0 1 2]

    */

    ```


    **Listing 17-1** – Permutations of slice


    We leave it to the reader to walk through the code for a small problem and verify
    that it produces the desired permutation.


    The second parameter in the `Permutations` function is an operation that must
    be performed on each slice. In the example presented in Listing [17-1](#527841_1_En_17_Chapter.xhtml#PC1),
    the operation is to output the slice. This is shown in `main` in boldface.'
