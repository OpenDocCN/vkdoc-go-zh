    \ plot.New()\n\tp.Add(plotter.NewGrid())\n\tnodePoints, err := plotter.NewScatter(nodePtsData)\n\
    \tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tnodePoints.Shape = draw.CircleGlyph{}\n\
    \tnodePoints.Color = color.RGBA{G: 255, A: 255}\n\tnodePoints.Radius = vg.Points(12)\n\
    \t// 绘制线条\n\tfor index := 0; index < len(endPoints); index++ {\n\t\tval1 := endPoints[index].Val1\n\
    \t\tx1, y1 := FindXY(val1)\n\t\tval2 := endPoints[index].Val2\n\t\tx2, y2 := FindXY(val2)\n\
    \t\tpts := plotter.XYs{{X: float64(x1), Y: float64(y1)}, {X: float64(x2), Y: float64(y2)}}\n\
    \t\tline, err := plotter.NewLine(pts)\n\t\tif err != nil {\n\t\t\tlog.Panic(err)\n\
    \t\t}\n\t\tscatter, err := plotter.NewScatter(pts)\n\t\tif err != nil {\n\t\t\t\
    log.Panic(err)\n\t\t}\n\t\tp.Add(line, scatter)\n\t}\n\tp.Add(nodePoints)\n\t\
    // 添加标签\n\tfor index := 0; index < len(data); index++ {\n\t\tx := float64(data[index].XPos)\
    \ - 0.2 // 原值为 .05\n\t\ty := float64(data[index].YPos) - 0.02\n\t\tstr := data[index].Val\n\
    \t\tlabel, err := plotter.NewLabels(plotter.XYLabels{\n\t\t\tXYs: []plotter.XY{\n\
    \t\t\t\t{X: x, Y: y},\n\t\t\t},\n\t\t\tLabels: []string{str},\n\t\t})\n\t\tif\
    \ err != nil {\n\t\t\tlog.Fatalf(\"无法创建标签绘图器: %+v\", err)\n\t\t}\n\t\tp.Add(label)\n\
    \t}\n\tpath, _ = homedir.Dir()\n\tpath += \"/Desktop/GoDS/\"\n\terr = p.Save(1000,\
    \ 600, \"tree.png\")\n\tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tDrawGraph(myApp,\
    \ myWindow)\n\tmyWindow.ShowAndRun()\n}\n```\n\n**清单 9-5** 包 `binarysearchtree`\n\
    \n### 对 `binarysearchtree` 包和主驱动程序的讨论\n\n清单 9-5 中用于显示二叉搜索树的代码在多个地方使用了`.String()`，因为类型`T`是未知的。该清单中以**粗体**标出了对`String()`的调用。\n\
    \n主驱动程序中使用了两棵二叉搜索树。使用的泛型类型是`Number`和`Float`。由于这两种类型都定义了`String()`函数，因此它们都隐式地属于`OrderedStringer`类型。\n\
    \n构造了一棵基础类型为`float64`的二叉搜索树，包含 30 个节点。每次调用都会生成一棵不同的树。图 9-3 展示了其中一棵树。\n\n![](img/527841_1_En_9_Fig3_HTML.png)\n\
    \n**图 9-3** 一棵 30 节点的二叉搜索树\n\n这棵随机生成的二叉搜索树是不平衡的。左子树的深度为 5，而右子树的深度为 8。\n\n第二棵二叉搜索树的基础类型为`Number`，通过按顺序插入\
    \ 100,000 个整数构建而成。本质上，这是一条链表。构建这棵完全不平衡的搜索树花费了 35.6 秒。\n\n## 9.3 总结\n\n在本章中，我们实现了一个泛型二叉搜索树。我们对绘制树的逻辑进行了轻微修改，以便能够输出基础类型`T`。\n\
    \n在下一章中，我们将介绍最重要的二叉搜索树之一——AVL 树。当新节点添加到树中时，这棵树会保持其平衡。\n"
- fmt: "# 10\\. AVL Trees\n\nIn the previous chapter, we introduced the binary search\
    \ tree. In such a tree, each node contains a key that is larger than all the keys\
    \ in its left subtree and smaller than all the keys in its right subtree. Duplicate\
    \ keys are not allowed.\n\nIn building a binary search tree, the balance is dependent\
    \ on the order in which keys are inserted. For example, if the keys are inserted\
    \ in ascending order, the search tree resembles a linked list with its nodes to\
    \ the right of the root node.\n\nIn 1962, two Russian mathematicians, Adelson\
    \ Velsky and Landis, defined a useful definition of search tree balance (later\
    \ called AVL balance in their honor) and described algorithms for `insert` and\
    \ `remove` that preserve AVL balance. Their work has become a classic part of\
    \ data structure legacy.\n\nIn the next section, we present an overview of AVL\
    \ trees.\n\n## 10.1 Overview: Adelson Velsky and Landis\n\nIn this chapter, we\
    \ explore and implement a generic AVL tree.\n\nFor any binary search tree, the\
    \ efficiency of `Insert`, `Delete`, and `Search` is dependent on how balanced\
    \ the search is. Each of these operations requires approximately `log2 n` operations,\
    \ if `n` is the number of nodes in the tree and the tree is balanced.\n\nA binary\
    \ search tree is defined as an AVL tree if **for every node in the tree, the maximum\
    \ depth of the left subtree minus the maximum depth of the right subtree is equal\
    \ or less than 1 in magnitude**. That is the AVL balance of every node is either\
    \ -1, 0, or 1 and is given by the depth of the left subtree minus the depth of\
    \ the right subtree.\n\nIn the following tree, the AVL balance (hereby called\
    \ balance) of each node is shown. Balance 0 is not shown. This is not an AVL tree\
    \ because of node A.\n\n![](images/527841_1_En_10_Chapter/527841_1_En_10_Figa_HTML.png)\n\
    \nAn illustration of a binary tree, in which a node A of value negative 2, has\
    \ two child nodes B and C, Node C of value negative 1 has two child nodes D and\
    \ E. Node E of value negative 1 has 1 right child node F.\n\nPlease verify that\
    \ the following search tree is an AVL tree.\n\n![](images/527841_1_En_10_Chapter/527841_1_En_10_Figb_HTML.png)\n\
    \nAn illustration of a binary tree, in which the root node 10 has two sub trees.\
    \ Left sub tree parent 5 has two children 3 and 6\\. Node 3 has 2 children 2 and\
    \ 4, node 2 has 1 left child of value 1\\. Right node 6 has a right child of value\
    \ 8\\. Right sub tree node 15 has 2 children, 13 and 20, and left node 13 has\
    \ a left child of value 12.\n\nThe AVL algorithms for insert and delete involve\
    \ tree rotations. We illustrate with the previous tree.\n\n### Tree Rotations\n\
    \nA right rotate on node 10 yields\n\n![](images/527841_1_En_10_Chapter/527841_1_En_10_Figc_HTML.png)\n\
    \nAn illustration of a binary tree, in which node 5 has two sub trees. Left sub\
    \ tree parent 3 has two children 2 and 4\\. Node 2 has a left child of value 1\\\
    . Right sub tree node 10 has 2 children, 6 and 15, node 6 has a right child of\
    \ value 8, Right node 15 has two children 13 and 20, and node 13 has a left child\
    \ of value 12.\n\nWhen 10 is rotated to the right, 5’s right child becomes node\
    \ 10. This makes 6 and 8 orphans. Since they are both greater than 5 and less\
    \ than 10, they are placed into the left subtree of 10 and the right subtree of\
    \ 5 as shown previously.\n\nA left rotate on node 10 produces\n\n![](images/527841_1_En_10_Chapter/527841_1_En_10_Figd_HTML.png)\n\
    \nAn illustration of a binary tree, in which node 5 has two sub trees. On the\
    \ left side, the text reads left sub tree unchanged. The right sub tree parent\
    \ 15 has two children 10 and 20, left node 10 has two children 6 and 13, in which\
    \ node 6 has a right child of value 8 and node 13 has a left child of value 12.\n\
    \nThe orphan nodes 13 and 12 are larger than 10 and smaller than 15 and are placed\
    \ as shown previously.\n\nThere is very little computational work involved in\
    \ performing tree rotation. Only two links in the entire tree must be modified.\
    \ This is true regardless of tree size.\n\nThe brilliance of the AVL algorithms\
    \ is in the `Insert` and `Delete` methods. Both these methods are required to\
    \ yield an AVL tree after either of these operations.\n\n### Insertion\n\nWe consider\
    \ AVL insertion first. There are four steps.\n\n1. Perform an ordinary binary\
    \ search tree insertion into the AVL tree. If the tree is still an AVL tree, stop.\n\
    \n2. Starting at the node inserted (always at a leaf position), backtrack up the\
    \ search path toward the root node. If a combination of nodes is found in which\
    \ the parent has a balance whose absolute value is 2 and its child has a balance\
    \ whose magnitude is 1, if the signs are the same (e.g., -2 and -1 or 2 and 1),\
    \ a **type 1** configuration exists. If the signs are opposite (e.g., -2 and 1\
    \ or 2 and -1), a **type 2** configuration exists.\n\n3. If the configuration\
    \ is of type 1, perform a single rotation on the parent node in a direction to\
    \ restore balance.\n\n4. If the configuration is of type 2, perform a sequence\
    \ of two rotations. The first rotation is on the child in a direction to restore\
    \ balance. Then perform a second rotation in a direction opposite the first rotation\
    \ on the parent.\n\nThese steps are guaranteed to produce a search tree with the\
    \ AVL property intact. The proof of this is beyond the scope of this book.\n\n\
    ### Deletion\n\nThe steps for AVL deletion are given as follows:\n\n1. Perform\
    \ an ordinary binary search tree deletion. If the tree is an AVL tree, stop.\n\
    \n2. If the tree is not an AVL tree after the ordinary deletion, traverse up the\
    \ search path from the node being deleted to the root node. Stop when one of the\
    \ following combinations of balance occurs:\n   a. Parent with balance whose absolute\
    \ value is 2 and child with balance whose absolute value is 1\\. Determine the\
    \ type of configuration as with insertion and perform the same type of either\
    \ single rotation or sequence of two rotations.\n   b. The parent has a balance\
    \ of 2 or -2, and the child has a balance of 0\\. Consider this a type 1 configuration\
    \ and perform the appropriate single rotation on the parent node.\n   c. Reevaluate\
    \ the balance of nodes above the parent. There is a possibility that because of\
    \ the rotation(s) performed in step a or b, another configuration of type 1 or\
    \ 2 needs to be dealt with. Continue step c until the root node is reached and\
    \ no further rotational corrections are needed.\n\nA tree that demonstrates the\
    \ need for step c is shown in Figure [10-1](#527841_1_En_10_Chapter.xhtml#Fig1).\n\
    \n![](images/527841_1_En_10_Chapter/527841_1_En_10_Fig1_HTML.jpg)\n\nAn illustration\
    \ of a binary tree, in which node 10 has two sub trees. Left sub tree parent 5\
    \ has two children 3 and 6\\. Node 3 has 2 children 2 and 4, node 2 has a left\
    \ child of value 1\\. Right child node 6 has a right child of value 8\\. Right\
    \ sub tree node 15 has 2 children 13 and 20 and left node 13 has a left child\
    \ of value 12.\n\n**Figure 10-1** — A tree illustrating AVL deletion\n\nWe wish\
    \ to remove node 20\\. After the ordinary deletion of 20, node 15 has a balance\
    \ of 2\\. This causes us to perform a right rotation on node 15\\. Node 13 moves\
    \ upward and becomes the right child of the root node 10.\n\nBut now the root\
    \ node 10 also has a balance of 2 since its left subtree is level 4 and its right\
    \ subtree is level 2 (we lost a level in the right subtree during the first rotation).\
    \ We correct this with a right rotation on node 10\\. As an exercise, sketch the\
    \ resulting tree.\n\nAs an exercise, sketch the AVL tree resulting from step c."
