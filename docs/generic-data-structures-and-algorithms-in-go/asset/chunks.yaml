    to ***previous***, and incrementing ***list.numberItems***.


    ### Benefit of Double Linking


    What, you may be thinking, is the benefit of double linking considering the extra
    complexity required to construct and maintain a doubly linked list?


    The most important benefit is the ability to traverse the list in reverse, from
    end to beginning. Although this is possible using a singly linked list, it would
    be computationally expensive.


    ## 6.13 Summary


    In this chapter, we presented several important and useful generic data structures
    including **Queue**, **Deque**, **PriorityQueue**, and singly and doubly linked
    lists. We presented several applications that utilize these generic data structures.


    In the next chapter, we present the hash table structure and some applications
    that use this structure.


    # 7. Hash Tables


    In the previous chapter, we introduced queues and lists. We presented several
    specialized types of queues and their applications.


    A map is a function that converts (maps) some **key** to a **value** in a **key-value**
    pair. The key and value may be of any type. A hash table is an unordered collection
    of key-value pairs where each key is distinct (no duplicate keys). Values are
    not required to be distinct, so two or more keys may map to the same value. Hash
    tables support very fast access to information accessed through keys. Fast table
    lookup is achieved by computing the hash value of a key and obtaining the location
    in the table containing the value.


