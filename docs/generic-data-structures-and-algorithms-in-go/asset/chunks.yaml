    ## 14.5 Summary


    A concurrent implementation of an ecological simulation is presented in this chapter.
    Type assertions are introduced and used in the implementation.


    Many important concepts and techniques from previous chapters are used in this
    example. These include a graphical framework, extensive use of goroutines, object-oriented
    programming, type assertions, implementing interfaces, and protecting shared data.


    In the next chapter, we introduce an important technique of algorithm design,
    dynamic programming.


    # 15. Dynamic Programming


    The previous chapter presented a concurrent implementation of an ecological simulation.
    It used many of the techniques presented earlier in this book.


    This chapter changes focus from data structures to algorithm design.


    We introduce an algorithmic technique for solving optimization problems, dynamic
    programming, and apply this technique to several problems.


    As you will see in this chapter, “if you cannot remember the past, you are destined
    to repeat it.”


    In the next section, we present a simple example of dynamic programming, the computation
    of the nth Fibonacci number. We explore two dynamic programming approaches.


    ## 15.1 Example of Dynamic Programming: nth Fibonacci Number


    The central mechanism of dynamic programming is representing the solution to a
    problem in terms of smaller subproblems, each of which has optimal solutions.
    Each subproblem is a smaller version of the original problem. By storing the results
    to the smaller problems, we can efficiently obtain the results to the larger problem.


    A simple example involves the computation of the nth Fibonacci number.


    **Fib(n) = Fib(n-1) + Fib(n-2), for n > 1**


    The first two numbers in the sequence are 0 and 1.


    The initial sequence of Fibonacci numbers is


    [0, 1, 1, 2, 3, 5, 8, 13, 21, …]


    We examine three alternative algorithms for computing the nth Fibonacci number.
    The first two involve dynamic programming, and the third involves recursion.


    ### Top-Down Dynamic Programming


    Consider the function ***FibonacciTopDown*** and its support function ***computeFromCache***
    given as follows:


    ```

    func FibonacciTopDown(n int) int64 {

    firstTwoCases := map[int]int64{

    0: 0,

    1: 1,

    }

    return computeFromCache(n, firstTwoCases)

    }

    func computeFromCache(n int, cache map[int]int64) int64 {

    // If answer already found for n, return it

    if val, found := cache[n]; found {

    return val

    }

    cache[n] = computeFromCache(n - 1, cache) +

    computeFromCache(n - 2, cache)

    return cache[n]

    }

    ```


    A **map** is used in ***computeFromCache*** to return a solution if it has already
    been calculated.


    The variable ***cache*** holds the key-value pairs (n and the nth Fibonacci number).


    This is dynamic programming because a problem of size n is computed in terms of
    problems of size n – 1 and n – 2.


    The computational complexity of this top-down approach is **O(n)**. The space
    complexity is also O(n) because of the map that holds previous computations.


    ### Bottom-Up Dynamic Programming


    Consider the function ***FibonacciBottomUp*** presented as follows:


    ```

    func FibonacciBottomUp(n int) int64 {

    table := []int64{0, 1}

    for i := 2; i <= n; i++ {

    table = append(table, table[i - 1] +

    table[i - 2])

    }

    return table[n]

    }

    ```


    We construct the variable ***table*** from **0** to **n**, bottom-up.


    The computational complexity of this solution is also **O(n)**. The space complexity
    is **O(1)**.'
