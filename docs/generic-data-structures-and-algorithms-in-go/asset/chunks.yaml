    ## 7.2 How Fast Is a `Map`?


    Suppose we examine the speed of accessing a large collection of dictionary words.


    Specifically, we construct a `slice` of 466,551 English words taken from a text
    file. We next construct a `map` containing the same 466,551 words from the same
    text file. Then we compare the time it takes to look up every word in the `slice`
    vs. the `map`.


