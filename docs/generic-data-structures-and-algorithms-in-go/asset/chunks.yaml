  raw: '## 12.2 Insertion Process


    We discuss the logic of insertion with a series of examples.


    The first step for insertion is to do an ordinary search-tree insertion.


    The new node added to the tree is always colored red. Our goal is to keep the
    number of black nodes between root and all leaf nodes constant.


    If the new inserted node has a red parent, this violates condition 3 in the preceding
    text, which requires the child of a red node to be black. We then must take corrective
    action.


    The first case we consider is when the **parent of the node inserted is red**
    and **the uncle of the node inserted exists and is red**. Consider the following
    tree after inserting 25\. The uncle of 25 is 150 and is red.


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Figb_HTML.jpg)


    An illustration of a binary tree structure with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 100, dark, has 2 children,
    50, light, and 150, light. Node 50, light has a child node 25, light.


    We perform a correction by modifying the color of the **parent** (change red to
    black) and **uncle** (change red to black) and **grandparent** if it is not the
    root (which it is in this case). The corrected tree is shown in the following.
    If 100 was not the root, we might have to continue the search for violations up
    the tree after changing node 100 to red.


    The result of performing color modification is shown as follows:


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Figc_HTML.jpg)


    An illustration of a binary tree structure with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 100, dark, has 2 children,
    50, dark, and 150, dark. Node 50, dark has a child node 25, light.


    The next case we consider is when the **parent of the node inserted is red** and
    **the uncle is black** **or does not exist**. There are four cases to consider.


    In the first case, we insert 25\. Parent is red and uncle does not exist.


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Figd_HTML.jpg)


    An illustration of a binary tree structure with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 100, dark, has a child, 50,
    light. Node 50, light has a left child node 25, light.


    In the second case, we again insert 25\. Parent is red and uncle does not exist.


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Fige_HTML.jpg)


    An illustration of a binary tree structure with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 100, dark, has a child, 25,
    light. Node 50, light has a right child node 50, light.


    The other two cases are symmetric with respect to the root node (are on the right
    side of the root).


    The corrective action we take involves tree rotations as follows:


    We take an inorder traversal of the subtree starting at the grandparent and label
    the nodes **first**, **second**, and **third** in the traversal; then the second
    node will always be the new root of the subtree and its left child the **first**
    and right child the **third**.


    In case 1, the traversal produces **first = 25**, **second = 50**, and **third
    = 100.**


    In case 2, the traversal produces **first = 25**, **second = 50**, and **third
    = 100**.


    We recolor the new subroot black, and its two children remain red.


    This produces the corrected tree.


    ![](images/527841_1_En_12_Chapter/527841_1_En_12_Figf_HTML.jpg)


    An illustration of a binary tree structure with 2 types of shades. The node is
    depicted in the format: node value, shade. Root node 50, dark, has 2 child nodes,
    25, light, and 100, light.


    In case 1, we perform a **right rotate** **on node 100**. In case 2, we perform
    a **left rotate on node 25** (producing case 1) and then a **right rotate on node
    100**. Cases 3 and 4 follow a symmetric pattern.


