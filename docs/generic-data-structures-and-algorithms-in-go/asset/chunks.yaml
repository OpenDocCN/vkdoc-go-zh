    ## 7.4 Hash Application: String Search


    We explore a classic and important string search application in this section.
    The **Rabin-Karp** algorithm features hashing and attempts to reduce the complexity
    of searching from **O(n*m)** to **O(n)**, where n is the length of the string
    to be searched and m is the length of the pattern we are searching for.


    A function that accomplishes a string search using brute force is given as follows:


    ```

    func BruteForceSearch(txt, pattern string) (bool, int) {

    patternLength := len(pattern)

    for outer := 0; outer < len(txt)-patternLength; outer++ {

    if txt[(outer):(outer+patternLength)] == pattern {

    return true, outer

    }

    }

    return false, -1

    }

    ```


    As an outer loop ranges from **0** to **len(txt) – patternLength**, we compare
    the string bounded by **txt[(outer):(outer+patternLength)]** to **pattern.** If
    the two strings are equal, we return true and the outer position. Since the string
    comparison is of **O(patternLength)** and we perform this operation n times, we
    have an **O(n * m)** algorithm, where m is the pattern length.


    At this moment, you may rightfully be asking “what does this have to do with hashing?”


    Suppose we replace the test for string equality, performed **n – m** times with
    a comparison of their hash values. That is, we compare **hash**(**txt[(outer):(outer+patternLength)]**
    with **hash(pattern)** and do this **n – m** times, returning true if their hash
    values are the same.'
