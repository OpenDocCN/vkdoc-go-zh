- fmt: '# 21.2 A Concrete Example


    Suppose we wish to construct and train a neural network to determine whether a
    diagnostic test indicates that a patient has a particular disease. There are two
    numbers from the test, `x` and `y`, each between 0.0 and 1.0. If `x`^2 `< y`,
    the test is negative; otherwise, it is positive. We will represent a negative
    test by the numerical label `0` and a positive test with the numerical label `1`.


    The neural network will receive 150 test results (each result a pair of numbers,
    each between 0.0 and 1.0). The output of the neural network contains 150 computed
    scores, each between 0.0 and 1.0, as well as 150 correct labels, each between
    0.0 and 1.0, based on the.


    This example allows us to introduce the methodology of neural network modeling
    and computation and see how the important pieces fit together.


    In the next section, we will build a neural network from scratch to solve this
    problem.


    # 21.3 Constructing a Neural Network


    We will construct a simple neural network, from scratch, that solves the problem
    presented in Section 21.2.


    We define a weight matrix. Each column of this weight matrix shows the weights
    from all neurons in the previous layer to a particular neuron in the current layer.


    So, for example, the values `w[0][2]`, `w[1][2]`, `w[2][2]`, ..., `w[n – 1][2]`
    (the third column of the weight matrix) represent the weights from the `n` neurons
    in the previous level to neuron 3 in the current level.


    The neural network that we will build contains 150 nodes for the input layer (one
    node for each test result containing two numbers), 25 nodes for the hidden layer,
    and 150 nodes for the output layer.


    ## Matrices That Represent Network


    The input matrix is of dimension `150 × 2`. Each row of this matrix contains the
    test result numbers `x` and `y`.


    The weight matrix that connects the input layer to the hidden layer is of dimension
    `2 × 25`.


    The weight matrix that connects the hidden layer to the output layer is of dimension
    `25 × 1`.


    The output of the neural network is of dimension `150 × 1`.


    We will set the biases to zero for this example.


    Some sample input and output would be:


    Input 1: `<0.42, 0.1>` (positive test since `0.42`^2 `> 0.1`)


    Input 2: `<0.6, 0.8>` (negative test since `0.6`^2 `< 0.8`)


    We will generate the test results by generating random `x` and `y` values for
    each test, each between 0.0 and 1.0.


    We use the 150 test results to train the network. We then generate 25 more fresh
    test results randomly, as before. We then use the fully trained network to predict
    whether each of the 25 new tests is positive or negative and tabulate our errors.


    In the next section, we present and explain the implementation of a neural network
    that classifies the results of the diagnostic tests.


    # 21.4 Neural Network Implementation


    We begin the implementation by defining some global variables and initializing
    all weights with random values from 0 to 1.


    ```go

    package main

    import (

    "fmt"

    "math"

    "math/rand"

    "time"

    )

    var (

    InputLayer  = 150

    HiddenLayer = 25

    OutputLayer = InputLayer

    Inputs      = 2 // x and y values

    )

    var weights1 [][]float64

    var derivatives1 [][]float64

    var weights2 [][]float64

    var derivatives2 [][]float64

    var input [][]float64

    func InitializeWeights1() {

    weights1 = make([][]float64, Inputs)

    derivatives1 = make([][]float64, Inputs)

    for row := 0; row < Inputs; row++ {

    weights1[row] = make([]float64, HiddenLayer)

    derivatives1[row] = make([]float64,

    HiddenLayer)

    }

    for row := 0; row < Inputs; row++ {

    for col := 0; col < HiddenLayer; col++ {

    weights1[row][col] = rand.Float64()

    }

    }

    }

    func InitializeWeights2() {

    weights2 = make([][]float64, HiddenLayer)

    derivatives2 = make([][]float64, HiddenLayer)

    for row := 0; row < HiddenLayer; row++ {

    weights2[row] = make([]float64, 1)

    derivatives2[row] = make([]float64,

    OutputLayer)

    }

    for row := 0; row < HiddenLayer; row++ {

    for col := 0; col < 1; col++ {

    weights2[row][col] = rand.Float64()

    }

    }

    }

    ```


    The `derivatives1` and `derivatives2` matrices will be explained later.


    Next, we look at two functions: `trueOutput` and `cost`.


    The `trueOutput` function evaluates `a[0]`, representing `x`, and `a[1]`, representing
    `y`, and returns 0 for a negative test result and 1 for a positive test result.


    The `cost` function compares the values in column zero (the only column) of the
    neural network `output` with the correct values, squares each error, adds the
    errors, and divides by the number of errors.


    ```go

    func trueOutput(a []float64) float64 {

    if a[0] * a[0] <= a[1] {

    return 0.0

    } else {

    return 1.0

    }

    }

    func cost(output [][]float64) float64 {

    result := 0.0

    for i := 0; i < InputLayer; i++ {

    correctAnswer := trueOutput(input[i])

    result += (output[i][0] - correctAnswer) * (output[i][0] - correctAnswer)

    }

    return result / float64(InputLayer)

    }

    ```


    The functions `dot`, `DotProduct`, and `Sigmoid` are support functions that support
    the neural network matrix operations that are needed.


    ```go

    func dot(vector1 []float64, vector2 []float64) float64 {

    if len(vector1) != len(vector2) {

    panic("Illegal vector dimensions for dot product.")

    }

    result := 0.0

    for i := 0; i < len(vector1); i++ {

    result += vector1[i] * vector2[i]

    }

    return result

    }

    func DotProduct(matrix1, matrix2 [][]float64) (result [][]float64) {

    rows1 := len(matrix1)

    cols1 := len(matrix1[0])

    rows2 := len(matrix2)

    cols2 := len(matrix2[0])

    if cols1 != rows2 {

    panic("Cannot take dot product")

    }

    result = make([][]float64, rows1)

    for row := 0; row < rows1; row++ {

    result[row] = make([]float64, cols2)

    }

    for row := 0; row < rows1; row++ {

    for col := 0; col < cols2; col++ {

    column := []float64{}

    for r := 0; r < cols1; r++ {

    column = append(column,

    matrix2[r][col])

    }

    result[row][col] = dot(matrix1[row],

    column)

    }

    }

    return result

    }

    func Sigmoid(matrix [][]float64) (result [][]float64) {

    rows := len(matrix)

    cols := len(matrix[0])

    result = make([][]float64, rows)

    for row := 0; row < rows; row++ {

    result[row] = make([]float64, cols)

    }

    for row := 0; row < rows; row++ {

    for col := 0; col < cols; col++ {

    result[row][col] = 1.0 / (1.0 + math.Exp(-

    matrix[row][col]))

    }

    }

    return result

    }

    ```


    These functions are needed in the `FeedForward` function that transforms the neural
    network input to its output.


    ```go

    func FeedForward() [][]float64 {

    hidden := Sigmoid(DotProduct(input, weights1))

    output := Sigmoid(DotProduct(hidden, weights2))

    return output

    }

    ```


    We see that by taking the dot product of the `input` matrix with the `weights1`
    matrix and following this by the dot product of the resulting `hidden` matrix
    with the `weights2` matrix, we get the output matrix.


    The `Sigmoid` activation function ensures that all the values are scaled to be
    between 0 and 1.'
