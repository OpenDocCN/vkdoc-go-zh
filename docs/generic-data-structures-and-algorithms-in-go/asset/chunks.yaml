    \ newLoc := findRandomCritter(tuna.x,\n\t\t\ttuna.y, new(Mackerel))\n\t\tif found\
    \ == true {\n\t\t\tfmt.Printf(\"\\nTuna Move from  to\n\", tuna.x, tuna.y, newLoc.x,\n\
    \t\t\t\tnewLoc.y)\n\t\t\ttuna.starv = TUNASTARVE\n\t\t\t// 必须停止被吃鲭鱼的 goroutine\n\
    \t\t\t// 类型断言\n\t\t\teatenMackerel := locations[newLoc.y][newLoc.x].critter.(*Mackerel)\n\
    \t\t\teatenMackerel.x = -1\n\t\t\teatenMackerel.y = -1\n\t\t\tfmt.Printf(\"\\\
    nEaten mackerel = %v\",\n\t\t\t\teatenMackerel)\n\t\t\ttuna.Reproduce(newLoc)\n\
    \t\t}\n\t\tfound, newLoc = findRandomCritter(tuna.x,\n\t\t\ttuna.y, nil)\n\t\t\
    if found == true {\n\t\t\tfmt.Printf(\"\\nTuna Move from  to\n\", tuna.x, tuna.y,\
    \ newLoc.x,\n\t\t\t\tnewLoc.y)\n\t\t\ttuna.Reproduce(newLoc)\n\t\t}\n\t\tmutex.Unlock()\n\
    \t\ttime.Sleep(time.Duration(rand.Intn(500)+500) *\n\t\t\ttime.Millisecond)\n\t\
    }\n}\n```\n\n类似的**类型断言**被用于处理被吃鲭鱼的终止。\n\n### 生物图形化显示的输出函数\n\n用于生成生物图形化显示的 `output`\
    \ 函数如下：\n\n```go\nfunc output() *fyne.Container {\n\tfor col := 0; col < numCols;\
    \ col++ {\n\t\tfor row := 0; row < numRows; row++ {\n\t\t\tif locations[col][row].critter\
    \ == nil {\n\t\t\t\trect =\n\t\t\t\t\tcanvas.NewRectangle(&color.RGBA{B:\n\t\t\
    \t\t\t\t200, R: 200, G: 200, A: 255})\n\t\t\t} else if\n\t\t\treflect.TypeOf(locations[col][row].critter)\
    \ ==\n\t\t\t\treflect.TypeOf(new(Tuna)) {\n\t\t\t\trect =\n\t\t\t\t\tcanvas.NewRectangle(&color.RGBA{B:\n\
    \t\t\t\t\t\t255, R: 0, G: 0, A: 255})\n\t\t\t} else if\n\t\t\treflect.TypeOf(locations[col][row].critter)\
    \ ==\n\t\t\t\treflect.TypeOf(new(Shark)) {\n\t\t\t\trect =\n\t\t\t\t\tcanvas.NewRectangle(&color.RGBA{B:\n\
    \t\t\t\t\t\t0, R: 255, G: 0, A: 255})\n\t\t\t} else if\n\t\t\treflect.TypeOf(locations[col][row].critter)\
    \ ==\n\t\t\t\treflect.TypeOf(new(Mackerel)) {\n\t\t\t\trect =\n\t\t\t\t\tcanvas.NewRectangle(&color.RGBA{B:\n\
    \t\t\t\t\t\t0, R: 0, G: 255, A: 255})\n\t\t\t}\n\t\t\trect.Resize(fyne.NewSize(10,\
    \ 10))\n\t\t\trect.Move(fyne.NewPos(float32(col*11),\n\t\t\t\tfloat32(row*11)))\n\
    \t\t\tsegments[col+numCols*row] = rect\n\t\t}\n\t}\n\treturn container.NewWithoutLayout(segments...)\n\
    }\n```\n\n该函数由以下全局声明支持：\n\n```go\nconst (\n\tnumRows         int = 50\n\tnumCols\
    \         int = 50\n\tMAKERELREPRO    int = 4\n\tMAKERELSTARVE   int = 10000000\n\
    \tMAKERELLIFE     int = 30\n\tTUNAREPRO       int = 8\n\tTUNASTARVE      int =\
    \ 11\n\tTUNALIFE        int = 18\n\tSHARKREPRO      int = 15\n\tSHARKSTARVE  \
    \   int = 25\n\tSHARKLIFE       int = 30\n)\nvar (\n\tquit       bool\n\tcontain\
    \    *fyne.Container\n\trect       *canvas.Rectangle\n\tmutex = &sync.Mutex{}\n\
    \t// 保存矩形对象\n\tsegments = make([]fyne.CanvasObject, numRows*\n\t\tnumCols)\n)\n\
    ```\n\n`output` 函数包含在 `main` 函数中的以下 goroutine 内：\n\n```go\ngo func() {\n\tfor\
    \ ; ; {\n\t\tmutex.Lock()\n\t\tcontain := output()\n\t\tmutex.Unlock()\n\t\tw.SetContent(contain)\n\
    \t\ttime.Sleep(1000 * time.Millisecond)\n\t}\n}()\n```\n\n### 代码讨论\n\n在一个遍历每个位置对象的循环中，定义了一个矩形\
    \ `rect`，其颜色根据占据该位置的生物类型而定。这些矩形被分配至 `segments` 数组，从而使 `w.SetContent` 能够显示这些矩形。\n\
    \n### 模拟的完整实现\n\n该生态模拟的实现在清单 14-1 中给出。为节省篇幅，之前展示和讨论的函数已被精简。你可以从前言中指定的网站下载完整源代码并运行这个模拟。\n"
