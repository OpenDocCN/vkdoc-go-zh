  trans: "\n## 17.4 小结\n\n本章介绍了著名的**旅行商问题**，并给出了一种暴力求解方案。与所有已知的精确解法一样，该方案在计算上难以处理，其大\
    \ O 复杂度为 `O(n!)`。\n\n文中展示了一段用于显示具有指定坐标位置的旅行路线代码，并通过一个简单示例进行了说明。\n\n下一章将介绍另一种求解\
