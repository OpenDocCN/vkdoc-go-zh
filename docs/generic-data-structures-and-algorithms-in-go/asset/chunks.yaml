    ### 形成下一代


    我们定义一个全局变量 `newpopulation`，它从全局变量 `population` 创建而来。


    新种群包含来自 `population` 的精英路线、从已配对的父母中产生的子代，以及对 `newpopulation` 中每条路线按指定概率执行的变异。这些变异涉及交换路线中随机选择的两个城市。


    实现此功能的函数如下所示。


    ```

    func FormNextGeneration() {

    elite := ChooseEliteGroup()

    // 将精英路线移入 newpopulation

    row := 0 // newpopulation 的索引

    for ; row < EliteNumber; row++ {

    newpopulation[row] = DeepCopy(elite[row])

    }

    // 从 population 中移除前 EliteNumber 行

    population = population[EliteNumber:]

    // 初始化 group1 和 group2

    group1 := make([][]int, TournamentNumber)

    for i := 0; i < TournamentNumber; i++ {

    group1[i] = make([]int, NUMCITIES)

    }

    group2 := make([][]int, TournamentNumber)

    for i := 0; i < TournamentNumber; i++ {

    group2[i] = make([]int, NUMCITIES)

    }

    MatingPoolSize := (ToursPerGeneration -

    EliteNumber) / 2

    for index := 0; index < MatingPoolSize; index++ {

    // 获取第一组

    indicesChosen := []int{}

    rowsChosen := 0;

    for {

    randomRow := rand.Intn(TournamentNumber)

    found, _ := In(randomRow, indicesChosen)

    if !found {

    indicesChosen = append(indicesChosen,

    randomRow)

    group1[rowsChosen] =

    DeepCopy(population[randomRow])

    rowsChosen += 1

    }

    if rowsChosen == TournamentNumber {

    break

    }

    }

    // 获取第二组

    indicesChosen = []int{}

    rowsChosen = 0;

    for {

    randomRow := rand.Intn(TournamentNumber)

    found, _ := In(randomRow, indicesChosen)

    if !found {

    indicesChosen = append(indicesChosen,

    randomRow)

    group2[rowsChosen] =

    DeepCopy(population[randomRow])

    rowsChosen += 1

    }

    if rowsChosen == TournamentNumber {

    break

    }

    }

    // 对 group1 和 group2 进行排序

    sort.Slice(group1, func(i, j int) bool {

    return Cost(group1[i]) < Cost(group1[j])

    })

    sort.Slice(group2, func(i, j int) bool {

    return Cost(group2[i]) < Cost(group2[j])

    })

    parent1 := group1[0] // 组 1 中的最优路线

    parent2 := group2[0] // 组 2 中的最优路线

    child1, child2 := OrderedCrossOver(parent1,

    parent2)

    newpopulation[row] = child1

    row += 1

    newpopulation[row] = child2

    row += 1

    }

    // 执行变异

    for row := 0; row < ToursPerGeneration; row++ {

    r := rand.Float64()

    if r <= ProbMutation {

    SwapMutation(newpopulation[row])

    }

    }

    population = make([][]int, ToursPerGeneration)

    for i := 0; i < NUMCITIES; i++ {

    population[i] = make([]int, NUMCITIES)

    }

    // 将 newpopulation 复制到 population

    for row := 0; row < ToursPerGeneration; row++ {

    for col := 0; col < NUMCITIES; col++ {

    population[row][col] =

    newpopulation[row][col]

    }

    }

    }

    ```


    代码中包含大量注释，应该很容易理解。


    排序是通过 `sort` 包中的 `Slice` 函数完成的。


    ```

    sort.Slice(group1, func(i, j int) bool {

    return Cost(group1[i]) < Cost(group1[j])

    })

    ```


    这里指定了以路线的成本作为排序依据，成本较低的路线排在成本较高的路线之前。


    ### 整合所有模块


    在清单 20-1 中，我们展示了使用启发式遗传编程算法解决 TSP 问题的完整程序。我们包含了一个主驱动程序，该程序加载了第 19 章中（使用模拟退火方法解决）的同一个
    29 城市问题。我们展示并比较了这两种获得 TSP 启发式解的方法的结果。

    '
- fmt: "```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"math\"\n\t\"math/rand\"\n\t\
    \"sort\"\n\t\"time\"\n)\n\nconst (\n\tNUMCITIES          = 29\n\tEliteNumber \
    \       = 2\n\tToursPerGeneration = 100\n\tNumberGenerations  = 50000\n\tTournamentNumber\
    \   = 4\n\tProbMutation       = 0.25\n)\n\ntype Point struct {\n\tx float64\n\t\
    y float64\n}\n\nvar population [][]int\nvar newpopulation [][]int\nvar graph [][]float64\n\
    \nfunc (pt Point) distance(other Point) float64 {\n\tdx := pt.x - other.x\n\t\
    dy := pt.y - other.y\n\treturn math.Sqrt(dx*dx + dy*dy)\n}\n\nfunc CreateGraph(numCities\
    \ int, cities []Point, graph [][]float64) {\n\tfor row := 0; row < numCities;\
    \ row++ {\n\t\tfor col := 0; col < numCities; col++ {\n\t\t\tgraph[row][col] =\
    \ cities[row].distance(cities[col])\n\t\t}\n\t}\n}\n\nfunc In(city int, tour []int)\
    \ (bool, int) {\n\tfor i, v := range tour {\n\t\tif v == city {\n\t\t\treturn\
    \ true, i\n\t\t}\n\t}\n\treturn false, -1\n}\n\nfunc Cost(tour []int) float64\
    \ {\n\tcost := graph[tour[len(tour)-1]][tour[0]]\n\tfor i := 0; i < len(tour)-1;\
    \ i++ {\n\t\tcost += graph[tour[i]][tour[i+1]]\n\t}\n\treturn cost\n}\n\nfunc\
    \ CreateInitialPopulation() {\n\tfor i := 0; i < ToursPerGeneration; i++ {\n\t\
    \tpopulation[i][0] = 0\n\t\tfor j := 1; j < NUMCITIES; j++ {\n\t\t\tpopulation[i][j]\
    \ = j\n\t\t}\n\t\tfor j := 1; j < NUMCITIES; j++ {\n\t\t\tindex := 1 + rand.Intn(NUMCITIES-1)\n\
    \t\t\tpopulation[i][j], population[i][index] = population[i][index], population[i][j]\n\
    \t\t}\n\t}\n}\n\nfunc Mutation(tour []int, probMutation float64) {\n\tn := len(tour)\n\
    \tfor i := 1; i < n; i++ {\n\t\tif rand.Float64() < probMutation {\n\t\t\tindex\
    \ := 1 + rand.Intn(n-1)\n\t\t\ttour[i], tour[index] = tour[index], tour[i]\n\t\
    \t}\n\t}\n}\n\nfunc TournamentSelection(population [][]int, tournamentNumber int)\
    \ []int {\n\tn := len(population)\n\tbest := population[rand.Intn(n)]\n\tfor i\
    \ := 1; i < tournamentNumber; i++ {\n\t\tnext := population[rand.Intn(n)]\n\t\t\
    if Cost(next) < Cost(best) {\n\t\t\tbest = next\n\t\t}\n\t}\n\treturn best\n}\n\
    \nfunc FormNextGeneration() {\n\tfor i := 0; i < EliteNumber; i++ {\n\t\tnewpopulation[i]\
    \ = population[i]\n\t}\n\tfor i := EliteNumber; i < ToursPerGeneration; i += 2\
    \ {\n\t\tparent1 := TournamentSelection(population, TournamentNumber)\n\t\tparent2\
    \ := TournamentSelection(population, TournamentNumber)\n\t\tchild1, child2 :=\
    \ OrderedCrossOver(parent1, parent2)\n\t\tMutation(child1, ProbMutation)\n\t\t\
    Mutation(child2, ProbMutation)\n\t\tnewpopulation[i] = child1\n\t\tif i+1 < ToursPerGeneration\
    \ {\n\t\t\tnewpopulation[i+1] = child2\n\t\t}\n\t}\n\tfor i := 0; i < ToursPerGeneration;\
    \ i++ {\n\t\tpopulation[i] = newpopulation[i]\n\t}\n}\n\nfunc Permutation(index1,\
    \ index2 int, tour []int) {\n\tif index1 > index2 {\n\t\tindex1, index2 = index2,\
    \ index1\n\t}\n\ttour[index1], tour[index2] = tour[index2], tour[index1]\n}\n\n\
    func OrderedCrossOver(parent1, parent2 []int) (child1, child2 []int) {\n\tvar\
    \ index1, index2 int\n\tn := len(parent1)\n\tfor {\n\t\tindex1 = 1 + rand.Intn(len(parent1)-1)\n\
    \t\tindex2 = 1 + rand.Intn(len(parent1)-1)\n\t\tif index1 != index2 {\n\t\t\t\
    break\n\t\t}\n\t}\n\tif index1 > index2 {\n\t\tindex1, index2 = index2, index1\n\
    \t}\n\n\tchild1 = make([]int, len(parent1))\n\tchild2 = make([]int, len(parent1))\n\
    \tfor i := 0; i < len(parent1); i++ {\n\t\tchild1[i] = -1\n\t\tchild2[i] = -1\n\
    \t}\n\n\tfor i := index1; i <= index2; i++ {\n\t\tchild1[i] = parent1[i]\n\t}\n\
    \tk := index2 + 1\n\tfor i := index2 + 1; i < len(parent1); i++ {\n\t\tfound,\
    \ _ := In(parent2[i], child1)\n\t\tif !found {\n\t\t\tchild1[k%n] = parent2[i]\n\
