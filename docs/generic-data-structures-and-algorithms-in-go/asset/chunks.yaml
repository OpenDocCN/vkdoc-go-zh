- fmt: '### Explanation of Code


    The function `prepareDrawTree` invokes `prepareToDraw`, each taking a parameter
    `tree` (`BinaryTree`).


    Function `prepareToDraw` invokes `inorderLevel` passing the root node of the tree
    and the level 1. This inorder traversal tests if the node is not nil and, if so,
    recursively calls itself passing the parameters `node.Left` and `level + 1`.


    The second line of code is the visitation, which appends to the global `data`
    slice a `nodePos` with `node.Value` and `YPos` equal to 100 – level and an `XPos`
    of -1 (just a temporary place holder). Since trees are built from the root downward,
    the higher the level, the lower the `YPos`, thus the 100 – level for `YPos`.


    The third line of code is the recursive call to `node.Right` and `level + 1`.


    The second line of code in `prepareToDraw` is an invocation of the `setXValues()`
    function. This function uses `findX` to locate the index in the `data` slice that
    contains the value of every `nodePos` in `data`. This index is used as the `XValue`
    in the `nodePos` as we iterate through the `data` slice. The first `nodePos` in
    data will be the node furthest to the left (node F in the tree shown earlier)
    and will have an `XPos` of 0. The second `nodePos` in data will be node E in that
    tree. The slice `data` needs to be computed (except for `XPos`) before the `setXY()`
    function can do its work.


    Upon the completion of `setXY()`, the preorder recursive function `getEndPoints`
    is invoked.


    As each node is visited, the slice of `nodePair` is built using the node visited
    and its parent. This information will be used to draw the edges connecting the
    tree nodes.


    We illustrate the construction of `data` and `endPoints` using a simple tree containing
    four nodes.


    Listing [8-3](#527841_1_En_8_Chapter.xhtml#PC3) shows a simple `main` function
    and the resulting `data` and `endPoints` slices displayed in the console.


    ```

    package main

    func main() {

    root := Node{"A", nil, nil}

    nodeB := Node{"B",nil, nil}

    nodeC := Node{"C", nil, nil}

    nodeD := Node{"D", nil, nil}

    root.Left = &nodeB

    root.Right = &nodeC

    nodeC.Right = &nodeD

    myTree := BinaryTree{&root, 4}

    ShowTreeGraph(myTree)

    }

    Listing 8-3

    Main function with four nodes

    ```


    The console output is:


    `slice of endPoints: [{B A} {C A} {D C}]`


    `slice of data: [{B 98 0} {A 99 1} {C 98 2} {D 97 3}]`


    The `data` slice reveals that node B has an `XPos` of 0 (leftmost node); node
    A, an `XPos` of 1; node C, an `XPos` of 2; and node D, an `XPos` of 3. This sequence
    results from the inorder traversal shown previously.


    The end points of the three lines that must be drawn are shown in the slice of
    `endPoints` (a line from B to A, from C to A, and from D to C).


    The tree that is constructed using the `fyne` GUI package is shown in Figure [8-3](#527841_1_En_8_Chapter.xhtml#Fig3).


    ![](images/527841_1_En_8_Chapter/527841_1_En_8_Fig3_HTML.png)


    An illustration of a binary tree with 4 nodes. The root node A is divided into
    nodes B and C. Node C leads to node D.


    **Figure 8-3** Another binary tree screenshot


    ### Implementation of ShowTreeGraph


    With the computation of the global variables `data` and `endPoints`, we are ready
    to plot the graph representing the binary tree.


    Listing [8-4](#527841_1_En_8_Chapter.xhtml#PC4) presents the details of plotting
    the tree graph.


    ```

    func drawGraph(a fyne.App, w fyne.Window) {

    image := canvas.NewImageFromResource(theme.FyneLogo())

    image = canvas.NewImageFromFile(path + "tree.png")

    image.FillMode = canvas.ImageFillOriginal

    w.SetContent(image)

    w.Show()

    }

    func ShowTreeGraph(myTree BinaryTree) {

    prepareDrawTree(myTree)

    myApp := app.New()

    myWindow := myApp.NewWindow("Binary Tree")

    myWindow.Resize(fyne.NewSize(1000, 600))

    path, _ := homedir.Dir()

    path += "/Desktop//"

    nodePts := make(plotter.XYs, myTree.NumNodes)

    for i := 0; i < len(data); i++ {

    nodePts[i].Y = float64(data[i].YPos)

    nodePts[i].X = float64(data[i].XPos)

    }

    nodePtsData := nodePts

    p := plot.New()

    p.Add(plotter.NewGrid())

    nodePoints, err := plotter.NewScatter(nodePtsData)

    if err != nil {

    log.Panic(err)

    }

    nodePoints.Shape = draw.CircleGlyph{}

    nodePoints.Color = color.RGBA{G: 255, A: 255}

    nodePoints.Radius = vg.Points(12)

    // Plot lines

    for index := 0; index < len(endPoints); index++ {

    val1 := endPoints[index].Val1

    x1, y1 := findXY(val1)

    val2 := endPoints[index].Val2

    x2, y2 := findXY(val2)

    pts := plotter.XYs{{X: float64(x1), Y: float64(y1)}, {X: float64(x2),

    Y: float64(y2)}}

    line, err := plotter.NewLine(pts)

    if err != nil {

    log.Panic(err)

    }

    scatter, err := plotter.NewScatter(pts)

    if err != nil {

    log.Panic(err)

    }

    p.Add(line, scatter)

    }

    p.Add(nodePoints)

    // Add Labels

    for index := 0; index < len(data); index++ {

    x := float64(data[index].XPos) - 0.05

    y := float64(data[index].YPos) - 0.02

    str := data[index].Val

    label, err := plotter.NewLabels(plotter.XYLabels {

    XYs: []plotter.XY {

    {X: x ,Y: y},

    },

    Labels: []string{str},

    },)

    if err != nil {

    log.Fatalf("Could not creates labels plotter: %+v", err)

    }

    p.Add(label)

    }

    path, _ = homedir.Dir()

    path += "/Desktop/GoDS/"

    err = p.Save(1000, 600, "tree.png")

    if err != nil {

    log.Panic(err)

    }

    drawGraph(myApp, myWindow)

    myWindow.ShowAndRun()

    }

    Listing 8-4

    Plotting the graph of the binary tree

    ```


    The first line of code in `ShowTreeGraph` is `prepareDrawTree`. This populates
    `data` with a slice of `nodePos`, with each `nodePos` containing the key value
    stored in a node as well as its `XPos` and `YPos` in the graph.


    A new `fyne.Window`, `myWindow`, is created with the title “Binary Tree: and width
    1000 and height 600 pixels”.


    A new plotter, `nodePts`, is created. The X and Y coordinates of the plotter are
    assigned from the `XPos` and `YPos` in the `data` slice.


    A new `plot` is created and populated with the information in `plotter`. A scatter
    plot, `nodePoints`, is created from `plotter` using `nodePtsData`.


    The `Shape`, `Color`, and `Radius` of each node point are assigned.


    The same approach is taken in drawing the lines and creating the labels on each
    node.


    Finally, a file “tree.png” is saved to the main directory.


    The support function `drawGraph` is invoked with the `fyne.App` (`myApp`) and
    `fyne.Window` (`myWindow`) passed as parameters.


    Function `drawGraph` loads and displays the “tree.png” image.


    Many packages from the `fyne` framework need to be imported for the code to work.
    These imports are shown in Listing [8-5](#527841_1_En_8_Chapter.xhtml#PC5), which
    presents the complete `binarytree` package.'
