- fmt: '# 5.4 Compare the Efficiency of Node and Slice Stacks


    Which of the two Stack implementations is more efficient?


    The slice implementation requires less memory because the node implementation
    requires the memory overhead of pointers to each succeeding node.


    To compare the speed efficiency of these two Stack types, we run a benchmark that
    pushes 10 million int values onto the stack and then pops the stack until it is
    empty.


    We package the two stack types as `nodestack` and `slicestack` as shown in Listings
    [5-4](#527841_1_En_5_Chapter.xhtml#PC4) and [5-5](#527841_1_En_5_Chapter.xhtml#PC5).
    In Listing [5-6](#527841_1_En_5_Chapter.xhtml#PC6), we present the application
    that compares the speed of these two stack packages.


    ```

    package main

    import (

    "example.com/nodestack"

    "example.com/slicestack"

    "time"

    "fmt"

    )

    const size = 10_000_000

    func main() {

    nodeStack := nodestack.Stack[int]{}

    sliceStack := slicestack.Stack[int]{}

    // Benchmark nodeStack

    start := time.Now()

    for i := 0; i < size; i++ {

    nodeStack.Push(i)

    }

    elapsed := time.Since(start)

    fmt.Println("\nTime for 10 million Push() operations on nodeStack: ", elapsed)

    start = time.Now()

    for i := 0; i < size; i++ {

    nodeStack.Pop()

    }

    elapsed = time.Since(start)

    fmt.Println("\nTime for 10 million Pop() operations on nodeStack: ",   elapsed)

    // Benchmark sliceStack

    start = time.Now()

    for i := 0; i < size; i++ {

    sliceStack.Push(i)

    }

    elapsed = time.Since(start)

    fmt.Println("\nTime for 10 million Push()

    operations on sliceStack: ", elapsed)

    start = time.Now()

    for i := 0; i < size; i++ {

    sliceStack.Pop()

    }

    elapsed = time.Since(start)

    fmt.Println("\nTime for 10 million Pop() operations

    on sliceStack: ", elapsed)

    }

    /* Output

    Time for 10 million Push() operations on nodeStack:  616.365084ms

    Time for 10 million Pop() operations on nodeStack:  29.104829ms

    Time for 10 million Push() operations on sliceStack:  148.623915ms

    Time for 10 million Pop() operations on sliceStack:  11.485335ms

    */

    Listing 5-6

    Speed comparison of nodestack and slicestack

    ```


    ```

    package slicestack

    type Stack[T any] struct {

    items []T

    }

    // Methods

    func (stack *Stack[T]) Push(item T) {

    // item is added to the right-most position in the

    // slice

    stack.items = append(stack.items, item)

    }

    func (stack *Stack[T]) Pop() T {

    length := len(stack.items)

    returnValue := stack.items[length - 1]

    stack.items = stack.items[:(length - 1)]

    return returnValue

    }

    func (stack Stack[T]) Top() T {

    length := len(stack.items)

    return stack.items[length - 1]

    }

    func (stack Stack[T]) IsEmpty() bool {

    return len(stack.items) == 0

    }

    Listing 5-5

    Package slicestack

    ```


    ```

    package nodestack

    type Node[T any] struct {

    value T

    next *Node[T]

    }

    type Stack[T any] struct {

    first *Node[T]

    }

    // Methods

    func (stack *Stack[T]) Push(item T) {

    newNode := Node[T]{item, nil}

    // newNode.value = item

    newNode.next = stack.first

    stack.first = &newNode

    }

    func (stack *Stack[T]) Top() T {

    return stack.first.value

    }

    func (stack *Stack[T]) Pop() T {

    result := stack.first.value

    stack.first = stack.first.next

    return result

    }

    func (stack Stack[T]) IsEmpty() bool {

    return stack.first == nil

    }

    Listing 5-4

    Package nodestack

    ```


    The `slicestack` is significantly faster than the `nodestack`. As always, benchmark
    results are affected by the processor, the amount of RAM, clock speed, and other
    factors that vary from machine to machine.


    In the next section, we present an application of the stack.


    ## 5.5 Stack Application: Function Evaluation


    We wish to build a function that takes as input a string representing a mathematical
    expression with operand symbols from a to z and operators from the set “+”, “-”,
    “*”, “/”, “(”, “)”.


    For example, the input to the function might be `“(a + (b - c) / (d * e)”`. After
    assigning each operand value a float number, the function must evaluate the expression.


    As we will soon see, the stack plays a critical role in designing and implementing
    this application although this is not at all obvious.


    ### Postfix Evaluation


    If one were to perform this computation on a Hewlett-Packard (HP) calculator,
    the sequence of steps would be the following:


    1. Enter the quantity `a`.

    2. Enter the quantity `b`.

    3. Enter the quantity `c`.

    4. Push the subtract button.

    5. Enter the quantity `d`.

    6. Enter the quantity `e`.

    7. Push the multiply button.

    8. Push the divide button.

    9. Push the add button.


    Symbolically, this sequence of operations could be written as follows: `abc-de*/+`.


    There are no parentheses in the preceding expression. The precedence of operations
    is encapsulated in the expression. We call the expression a **postfix** representation
    of the original expression.


    To clarify further, suppose `a` were assigned the value 2, `b` the value 3, `c`
    the value 1, `d` the value 5, and `e` the value 2; the postfix evaluation would
    be performed as follows:


    The operator – (the fourth character in the infix expression) would operate on
    the previous two operands, `b` and `c`. That would produce `b – c`, which is 2.
    The next operator, `*`, would operate on its previous two operands producing `d
    * e`, which is 10. The next operator, `/`, would divide its two previous operands,
    which are 2 and 10, to produce 0.2. Finally, the last operator, `+`, would add
    its two previous operands, which are `a` and 0.2, producing the answer 2.2.


    Following this approach to expression evaluation, we divide the problem into two
    subproblems. The first subproblem is converting the input expression into a postfix
    expression. The second subproblem is evaluating this postfix expression.


    Each of these subproblems utilizes a stack to accomplish their work.


    Function `infixpostfix` in Listing [5-7](#527841_1_En_5_Chapter.xhtml#PC7) converts
    the infix expression to a postfix form.


    ```

    package main

    import (

    "fmt"

    "example.com/nodestack"

    )

    func precedence(symbol1, symbol2 string) bool {

    // Returns true if symbol1 has a higher precedence

    // than symbol2

    if (symbol1 == "+" || symbol1 == "-") && (symbol2

    == "(" || symbol2 == "/") {

    return false

    } else if (symbol1 == "(" && symbol2 != ")") ||

    symbol2 == "(" {

    return false

    } else {

    return true

    }

    }

    func isPresent(symbol string, operators []string) bool {

    for i := 0; i = "a" && newSymbol <= "z" {

    postfix += newSymbol

    }

    if isPresent(newSymbol, operators) {

    if !nodeStack.IsEmpty() {

    topSymbol := nodeStack.Top()

    if precedence(topSymbol, newSymbol) ==

    true {

    if topSymbol != "(" {

    postfix += topSymbol

    }

    nodeStack.Pop()

    }

    }

    if newSymbol != ")" {

    nodeStack.Push(newSymbol)

    } else { // Pop nodeStack down to first

    // left parenthesis

    for {

    if nodeStack.IsEmpty() == true {

    break

    }

    ch := nodeStack.Top()

    if ch != "(" {

    postfix += ch

    nodeStack.Pop()

    } else {

    nodeStack.Pop()

    break

    }

    }

    }

    }

    }

    for {

    if nodeStack.IsEmpty() == true {

    break

    }

    if nodeStack.Top() != "(" {

    postfix += nodeStack.Top()

    nodeStack.Pop()

    }

    }

    return postfix

    }

    func main() {

    postfix := infixpostfix("a + (b - c) / (d * e)")

    fmt.Println(postfix)

    }

    // Output: abc-de*/+

    Listing 5-7

    Conversion from infix to postfix

    ```


    The `nodeStack` is the centerpiece of this algorithm.'
