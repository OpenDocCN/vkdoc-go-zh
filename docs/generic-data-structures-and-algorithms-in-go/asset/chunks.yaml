    对已排序数据进行二分搜索

    ```


    这里的搜索时间明显小于之前对随机数据进行搜索的时间。这是因为数据是已排序的。


    最快的排序算法复杂度为 `O(nlog[2]n)`。如果需要在切片内执行大量独立的搜索，那么先对数据进行排序，然后使用二分搜索进行多次搜索可能是值得的。


    由于排序本身的开销，在仅对切片执行一次搜索之前对其进行排序是不划算的。


    ## 2.4 小结


    大 O 表示法描述了算法的渐近效率。本章中我们研究了几种经典的排序和搜索算法，并通过它们的大 O 特性来表征它们。我们还为每种排序算法提供了并发解决方案，并观察到其性能得到了显著提升。


    在下一章中，我们将讨论 Go 语言中不使用类的面向对象编程。


    # 3. 抽象数据类型：Go 中没有类的面向对象编程


    在上一章中，我们讨论了算法复杂度，并给出了使用和不使用并发的示例。


    在本章中，我们将展示如何在没有 `class` 构造的情况下进行面向对象编程。我们回顾了抽象数据类型的基本概念，并通过多个示例说明其用法。


    ## 3.1 使用类的抽象数据类型


    1980 年，施乐帕克研究中心开发的 `Smalltalk` 语言正式发布。这门开创性的语言为一种新的编程范式——面向对象编程——奠定了基础。`Smalltalk`
    及其后续更新的面向对象语言的核心是 `class` 构造。继 `Smalltalk` 之后的一些主要面向对象语言包括 Eiffel、C++（一种包含 `class`
    构造的混合语言）、Java、Swift、Python 和 C#。这些语言都将 `class` 作为定义抽象数据类型和描述作为类实例的对象行为的核心构造。


    `class` 构造实现了一些关于如何构建软件的、由来已久的成熟思想。具体来说，类实现了**抽象数据类型**。


    一个**抽象数据类型**的特征在于可以对该底层类型执行的一组操作。考虑下面这个简单的例子。


    我们定义 `Counter` 抽象数据类型如下：


    | 属性 |

    | `count int` – 每个 `Counter` 对象（实例）的内部数据 |

    | 方法 |

    | `Increment()` – 将属性 `count` 的当前值加一 |

    | `Decrement()` – 仅当 `count > 0` 时，将属性 `count` 的当前值减一 |

    | `Reset()` – 将 `count` 的值设置为零 |

    | `GetCount()` – 返回 `count` 的当前值 |


    如果 `myCounter` 被定义为 `Counter` 类型（某个 `Counter` 类的实例），则以下操作是合法的：


    ```

    myCounter.Increment()

    myCounter.Decrement()

    myCounter.Reset()

    countValue = myCounter.GetCount()

    ```


    在前面的例子中，`myCounter` 被称为对象（`Counter` 类的实例），而通过点运算符连接到每个对象的方法调用就是可以对每个对象执行的合法操作，因此得名**面向对象编程**。


    支持 `class` 构造的面向对象语言提供了一种机制，可以通过继承来扩展父类中定义的操作集。C++ 和 Eiffel 等语言允许子类从两个或多个父类继承操作，而
    Java 和 C# 等语言只允许从一个父类继承。


    关于面向对象语言中的继承已有大量文献。近年来，由于继承可能引入的复杂性以及在类层次结构中可能产生的依赖关系，它已逐渐失宠。


    有两种近期出现的语言——Go 和 Rust——已经抛弃了继承，实际上也抛弃了类。但 Go 和 Rust 并未抛弃面向对象编程 (OOP)，而是改变了这种范式的使用方式。


    在深入探讨 Go 中面向对象编程的细节之前，让我们先看看如何用 Python 实现 `Counter` 抽象数据类型。


    ```

    class Counter:

    def __init__(self):

    self.count  = 0

    def increment(self):

    self.count += 1

    def decrement(self):

    self.count -= 1

    def reset():

    self,count = 0

    def get_count(self) -> int:

    return self.count

    if __name__ == "__main__":

    my_counter = Counter()

    for index in range(10):

    my_counter.increment()

    my_counter.decrement()

    current_count = my_counter.get_count()

    print(current_count)

    '''''' 输出


    ''''''

    ```


    关键字 `self` 被用作对 `Counter` 类任何实例的引用。定义在 `__init__` 方法中的属性 `count`，存储在每个 `Counter`
    类的实例（对象）中。


    `class` 构造的一个明显吸引力在于，所有对底层属性的操作都被封装在这个单一的构造中。


    那么 Go 语言呢？在下一节中，我们将探讨如何在 Go 语言中不使用类来定义抽象数据类型。


    ## 3.2 Go 语言中的抽象数据类型


    Go 语言不包含 `class` 构造。这与现代的面向对象语言有显著的不同。由于 Go 语言中没有 `class` 构造，因此也没有继承。

