    \   myTree.Insert(10)\n    myTree.Insert(15)\n    myTree.Insert(5)\n    myTree.Insert(3)\n\
    \    myTree.Insert(6)\n    myTree.Insert(13)\n    myTree.Insert(20)\n    myTree.Insert(2)\n\
