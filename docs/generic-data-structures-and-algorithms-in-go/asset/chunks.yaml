- fmt: "### Problem of Convergence to Local Minimum Rather Than Global Minimum\n\n\
    An ever-present challenge in solving combinatorial optimization problems is having\
    \ a solution converge to a local minimum rather than the desired global minimum.\
    \ For this reason, it is desirable to allow the solution space to be explored\
    \ and not to be in a great rush to evolve to a solution.\n\nIn the simulated annealing\
    \ algorithm, we achieve this by allowing “uphill moves.” These are moves in the\
    \ solution space that produce tours that are greater than the best-known tour\
    \ to date. The goal is to be able to climb out of local valleys in the solution\
    \ space while finding deeper valleys that hopefully contain the global minimum.\n\
    \nIn the next section, we present an implementation of simulated annealing that\
    \ follows the steps just presented.\n\n## Implementation of Simulated Annealing\n\
    \nWe create a type `Status`, which encapsulates the relevant state information\
    \ about the system.\n\n```go\ntype Status struct {\n\ttour           []int\n\t\
    bestTour       []int\n\tbestCostToDate float64\n\tpreviousCost   float64\n\ttemperature\
    \    float64\n\tdownhillMoves  int\n\tuphillMoves    int\n\trejectedMoves  int\n\
    \tinverseOps     int\n\tswapOps        int\n\tinsertOps      int\n}\nvar status\
    \ Status\n```\n\nThere are three separate operations that we use to perturb a\
    \ tour in the solution space:\n\n- **Inverse Operation** – We reverse the tour\
    \ within two index values chosen randomly.\n- **Swap** – We swap two cities, chosen\
    \ randomly, in a given tour.\n- **Insert** – Move city in random position second\
    \ to random position first.\n\nThe details of this simulated annealing implementation\
    \ along with extensive comments and program output are presented in Listing 19-1.\n\
    \n```go\npackage main\nimport (\n\t\"fmt\"\n\t\"math\"\n\t\"math/rand\"\n\t\"\
    time\"\n)\nconst (\n\tNUMCITIES = 29\n)\ntype Point struct {\n\tx float64\n\t\
    y float64\n}\nfunc init() {\n\trand.Seed(time.Now().UnixNano())\n}\nfunc (pt Point)\
    \ distance(other Point) float64 {\n\tdx := pt.x - other.x\n\tdy := pt.y - other.y\n\
    \treturn math.Sqrt(dx*dx + dy*dy)\n}\nfunc createGraph(numCities int, cities []Point,\
    \ graph [][]float64) {\n\tfor row := 0; row < numCities; row++ {\n\t\tfor col\
    \ := 0; col < numCities; col++ {\n\t\t\tgraph[row][col] = cities[row].distance(cities[col])\n\
    \t\t}\n\t}\n}\nfunc randomFrom(min int, max int) int {\n\treturn rand.Intn(max-min)\
    \ + min\n}\nfunc inverse(tour []int) []int {\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\
    \tsecondIndex := randomFrom(1, len(tour)-1)\n\tfor firstIndex == secondIndex {\n\
    \t\tfirstIndex = randomFrom(1, len(tour)-1)\n\t\tsecondIndex = randomFrom(1, len(tour)-1)\n\
    \t}\n\tif firstIndex > secondIndex {\n\t\tfirstIndex, secondIndex = secondIndex,\
    \ firstIndex\n\t}\n\tresult := deepcopy(tour[:firstIndex])\n\tfor index := 0;\
    \ index <= secondIndex-firstIndex; index++ {\n\t\tresult = append(result, tour[secondIndex-index])\n\
    \t}\n\tfor index := secondIndex + 1; index < len(tour); index++ {\n\t\tresult\
    \ = append(result, tour[index])\n\t}\n\treturn result\n}\nfunc swap(tour []int)\
    \ []int {\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\tsecondIndex := randomFrom(1,\
    \ len(tour)-1)\n\tfor firstIndex == secondIndex {\n\t\tfirstIndex = randomFrom(1,\
    \ len(tour)-1)\n\t\tsecondIndex = randomFrom(1, len(tour)-1)\n\t}\n\tif firstIndex\
    \ > secondIndex {\n\t\tfirstIndex, secondIndex = secondIndex, firstIndex\n\t}\n\
    \tresult := deepcopy(tour)\n\tresult[firstIndex], result[secondIndex] = result[secondIndex],\
    \ result[firstIndex]\n\treturn result\n}\nfunc insert(tour []int) []int {\n\t\
    /*\n\t   It means to move the city in position second to position first.\n\t \
    \  Consider tour [0, 3, 2, 1, 5, 4] and first = 1 and second = 4\n\t   The new\
    \ tour would be [0, 5, 3, 2, 1, 4]\n\t*/\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\
    \tsecondIndex := randomFrom(1, len(tour)-1)\n\tfor firstIndex == secondIndex {\n\
    \t\tfirstIndex = randomFrom(1, len(tour)-1)\n\t\tsecondIndex = randomFrom(1, len(tour)-1)\n\
    \t}\n\tif firstIndex > secondIndex {\n\t\tfirstIndex, secondIndex = secondIndex,\
    \ firstIndex\n\t}\n\tresult := []int{}\n\tfor index := 0; index < firstIndex;\
    \ index++ {\n\t\tresult = append(result, tour[index])\n\t}\n\tresult = append(result,\
    \ tour[secondIndex])\n\tfor index := firstIndex; index < secondIndex; index++\
    \ {\n\t\tresult = append(result, tour[index])\n\t}\n\tfor index := secondIndex\
    \ + 1; index <= len(tour); index++ {\n\t\tif index != firstIndex && index != secondIndex+1\
    \ {\n\t\t\tresult = append(result, tour[index-1])\n\t\t}\n\t}\n\treturn result\n\
    }\ntype Status struct {\n\ttour           []int\n\tbestTour       []int\n\tbestCostToDate\
    \ float64\n\tpreviousCost   float64\n\ttemperature    float64\n\tdownhillMoves\
    \  int\n\tuphillMoves    int\n\trejectedMoves  int\n\tinverseOps     int\n\tswapOps\
    \        int\n\tinsertOps      int\n}\nvar status Status\nfunc deepcopy(tour []int)\
    \ []int {\n\tresult := []int{}\n\tfor i := range tour {\n\t\tresult = append(result,\
    \ tour[i])\n\t}\n\treturn result\n}\nfunc simulatedAnnealing(graph [][]float64)\
    \ {\n\tfor i := 0; i < len(status.tour); i++ {\n\t\tstatus.tour[i] = i\n\t}\n\t\
    status.bestTour = deepcopy(status.tour)\n\tstatus.bestCostToDate = tourCost(status.tour,\
    \ graph)\n\tstatus.previousCost = status.bestCostToDate\n\tfor status.temperature\
    \ >= lowestTemperature {\n\t\tfor iteration := 0; iteration < numIterations; iteration++\
    \ {\n\t\t\t// Perturb the tour using three operations\n\t\t\tnewTour1 := inverse(status.tour)\n\
    \t\t\tnewTour2 := swap(status.tour)\n\t\t\tnewTour3 := insert(status.tour)\n\t\
    \t\tcost1 := tourCost(newTour1, graph)\n\t\t\tcost2 := tourCost(newTour2, graph)\n\
    \t\t\tcost3 := tourCost(newTour3, graph)\n\t\t\t// Choose the best among the three\n\
    \t\t\tvar newTour []int\n\t\t\tnewCost := 0.0\n\t\t\tif cost1 <= cost2 && cost1\
    \ <= cost3 {\n\t\t\t\tnewTour = newTour1\n\t\t\t\tnewCost = cost1\n\t\t\t} else\
    \ if cost2 <= cost1 && cost2 <= cost3 {\n\t\t\t\tnewTour = newTour2\n\t\t\t\t\
    newCost = cost2\n\t\t\t} else {\n\t\t\t\tnewTour = newTour3\n\t\t\t\tnewCost =\
    \ cost3\n\t\t\t}\n\t\t\tif newCost < status.previousCost {\n\t\t\t\tstatus.tour\
    \ = newTour\n\t\t\t\tstatus.previousCost = newCost\n\t\t\t\tstatus.downhillMoves++\n\
    \t\t\t\tif newCost < status.bestCostToDate {\n\t\t\t\t\tstatus.bestTour = deepcopy(newTour)\n\
    \t\t\t\t\tstatus.bestCostToDate = newCost\n\t\t\t\t}\n\t\t\t} else {\n\t\t\t\t\
    metropolis := math.Exp((status.previousCost - newCost) / status.temperature)\n\
    \t\t\t\trandomValue := rand.Float64()\n\t\t\t\tif randomValue < metropolis {\n\
    \t\t\t\t\tstatus.tour = newTour\n\t\t\t\t\tstatus.previousCost = newCost\n\t\t\
    \t\t\tstatus.uphillMoves++\n\t\t\t\t} else {\n\t\t\t\t\tstatus.rejectedMoves++\n\
    \t\t\t\t}\n\t\t\t}\n\t\t}\n\t\tif status.temperature >= 1000.0 {\n\t\t\tstatus.temperature\
    \ *= 0.90\n\t\t} else if status.temperature >= 500 {\n\t\t\tstatus.temperature\
    \ *= 0.94\n\t\t} else if status.temperature >= 200 {\n\t\t\tstatus.temperature\
    \ *= 0.97\n\t\t} else if status.temperature >= 50 {\n\t\t\tstatus.temperature\
