    # 5. Stacks


    The previous chapter presented an application of abstract data types, the Game
    of Life.


    In this chapter, we switch gears and begin our exploration of generic data structures.
    The first and perhaps simplest data structure we look at is the **Stack**. It
    has many practical uses in application development.


    A stack organizes data in a last-in, first-out (LIFO). Only the last item inserted
    into a stack is accessible.


    Because of LIFO, the most obvious application is to reverse a sequence of insertions.
    For example, if the items in a list are inserted onto a stack, a new list that
    is the reverse of the original list may be obtained by successively popping the
    elements of the stack.


    In the next section, we formalize the Stack abstract data type.


    ## 5.1 Stack ADT


    There are four operations that characterize a Stack ADT.


    - `Push(item)` – Adds item to the stack

    - `Pop()` item – Removes and returns the last item pushed onto the stack

    - `Top()` item – Accesses the last item pushed onto the stack without altering
    the stack

    - `IsEmpty()` bool – Returns `true` if the stack has no items, otherwise returns
    `false`


    The first implementation of a stack that we consider is presented in the next
    section where we consider a slice implementation.


    ## 5.2 Slice Implementation of Generic Stack


    The first implementation of generic stack, presented in Listing [5-1](#527841_1_En_5_Chapter.xhtml#PC1),
    uses a slice to hold the data in the stack.


    ```go

    package main

    import (

    "fmt"

    )

    type Ordered interface {

    ~float64 | ~int | ~string

    }

    type Stack[T Ordered] struct {

    items []T

    }

    func getZero[T Ordered]() T {

    var result T

    return result

    }

    // Methods

    func (stack *Stack[T]) Push(item T) {

    // item is added to the right-most position in the

    // slice

    if item != getZero[T]() { // We exclude item if it

    // is getZero[T]()

    stack.items = append(stack.items, item)

    }

    }

    func (stack *Stack[T]) Pop() T {

    length := len(stack.items)

    if length > 0 {

    returnValue := stack.items[length - 1]

    stack.items = stack.items[:(length - 1)]

    return returnValue

    } else {

    return getZero[T]()

    }

    }

    func (stack Stack[T]) Top() T {

    length := len(stack.items)

    if length > 0 {

    return stack.items[length - 1]

    } else {

    return getZero[T]()

    }

    }

    func (stack Stack[T]) IsEmpty() bool {

    return len(stack.items) == 0

    }

    func main() {

    // Create a stack of names

    nameStack := Stack[string]{}

    nameStack.Push("Zachary")

    nameStack.Push("Adolf")

    topOfStack := nameStack.Top()

    if topOfStack != getZero[string]() {

    fmt.Printf("\nTop of stack is %s", topOfStack)

    }

    poppedFromStack := nameStack.Pop()

    if poppedFromStack != getZero[string]() {

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    poppedFromStack = nameStack.Pop()

    if poppedFromStack != getZero[string]() {

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    poppedFromStack = nameStack.Pop()

    if poppedFromStack != getZero[string]() {

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    poppedFromStack = nameStack.Pop()

    if poppedFromStack != getZero[string]() {

    fmt.Printf("\nValue popped from stack is %s",

    poppedFromStack)

    }

    // Create a stack of integers

    intStack := Stack[int]{}

    intStack.Push(5)

    intStack.Push(10)

    intStack.Push(0) // Problem since 0 is the zero

    // value for int

    top := intStack.Top()

    if top != getZero[int]() {

    fmt.Printf("\nValue on top of intStack is %d", top)

    }

    popFromStack := intStack.Pop()

    if popFromStack != getZero[int]() {

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    popFromStack = intStack.Pop()

    if popFromStack != getZero[int]() {

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    popFromStack = intStack.Pop()

    if popFromStack != getZero[int]() {

    fmt.Printf("\nValue popped from intStack is

    %d", popFromStack)

    }

    }

    /* Output

    Top of stack is Adolf

    Value popped from stack is Adolf

    Value popped from stack is Zachary

    Value on top of intStack is 10

    Value popped from intStack is 10

    Value popped from intStack is 5

    */

    Listing 5-1

    Slice implementation of generic stack

    ```


    ### The Get Zero Function


    The function `getZero[T]()` returns a “zero value” associated with the generic
    parameter, `T`. This special value is returned from the functions `Pop()` and
    `Top()` if the slice, `items`, contained within the stack is empty.


    Since we are using the “zero value” as a sentinel, indicating an empty stack,
    we cannot allow this “zero value” to be pushed onto the stack.'
