    ## 3.5 Another OOP Application: Permutation Group of Words


    A permutation group of words contains a collection of words that are formed from
    the same letters and are all found in the same dictionary.


    For example, a permutation group for “persist” contains a collection of words
    that are formed from the same letters and are all found in the same dictionary.


    The permutation group for “persist” is [‘esprits’, ‘persist’, ‘priests’, ‘spriest’,
