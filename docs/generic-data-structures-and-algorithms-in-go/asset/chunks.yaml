    \ &node.Value, height\n}\nheight += 1\nnode = node.Right\n}\n}\n```\n\n*清单 9-2*\
    \  \n`BinarySearchTree` 的方法\n\n#### `Insert`、`Delete` 和中序遍历的讨论\n\n方法 `Insert`\
    \ 和 `Delete` 要求当前插入的节点不在搜索树中，并且被删除的节点在搜索树中。如果树相对平衡，这种检查会带来轻微的性能损失。\n\n泛型参数约束不出现于任何方法中。编译器可以推断此约束，因为它是在类型\
    \ `BinarySearchTree` 中定义的。\n\n方法 `InOrderTraversal` 接收一个函数 `op` 作为输入。这代表了在访问二叉搜索树的每个节点时要执行的操作。\n\
    \n#### 辅助函数\n\n清单 9-3 包含辅助函数，这些函数执行清单 9-2 中定义的公开可用方法的实际工作。\n\n```go\nfunc insertNodeT\
    \ OrderedStringer {\nif newNode.Value < node.Value {\nif node.Left == nil {\n\
    node.Left = newNode\n} else {\ninsertNode(node.Left, newNode)\n}\n} else {\nif\
    \ node.Right == nil {\nnode.Right = newNode\n} else {\ninsertNode(node.Right,\
    \ newNode)\n}\n}\n}\nfunc deleteNodeT OrderedStringer *Node[T] {\nif node == nil\
    \ {\nreturn nil\n}\nif value < node.Value {\nnode.Left = deleteNode(node.Left,\
    \ value)\nreturn node\n}\nif value > node.Value {\nnode.Right = deleteNode(node.Right,\
    \ value)\nreturn node\n}\nif node.Left == nil && node.Right == nil {\nnode = nil\n\
    return nil\n}\nif node.Left == nil {\nnode = node.Right\nreturn node\n}\nif node.Right\
    \ == nil {\nnode = node.Left\nreturn node\n}\nLeftmostRightside := node.Right\n\
    for {\n//find smallest value on the Right side\nif LeftmostRightside != nil &&\
    \ LeftmostRightside.Left != nil {\nLeftmostRightside = LeftmostRightside.Left\n\
    } else {\nbreak\n}\n}\nnode.Value = LeftmostRightside.Value\nnode.Right = deleteNode(node.Right,\
    \ node.Value)\nreturn node\n}\nfunc searchT OrderedStringer bool {\nif n == nil\
    \ {\nreturn false\n}\nif value < n.Value {\nreturn search(n.Left, value)\n}\n\
    if value > n.Value {\nreturn search(n.Right, value)\n}\nreturn true\n}\nfunc inOrderTraverseT\
    \ OrderedStringer) {\nif n != nil {\ninOrderTraverse(n.Left, op)\nop(n.Value)\n\
    inOrderTraverse(n.Right, op)\n}\n}\n```\n\n*清单 9-3*  \n用于实现方法的辅助函数\n\n这些辅助函数中的每一个都需要显式指定泛型类型约束，因为编译器无法从函数签名中推断出此约束。\n\
