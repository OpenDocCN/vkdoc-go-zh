  trans: '

    ### 结果讨论


    该程序在两台计算机上运行，结果令人惊讶。


    在一台配备 32G 内存、3.2GHz 八核 Intel Xeon W 处理器的 2017 款 iMac Pro 上，`concurrentAVLSet`
    呈现了最快的 `isPresent` 性能，比单棵 AVL 树更快，并且比基于映射（map）实现的 set 快两倍以上。


    在一台配备 32G 统一内存、10 核 CPU 和 32 核 GPU 的 Apple M1 Max 芯片的 MacBook Pro 上，`concurrentAVLSet`
    的表现最慢，而单棵 AVL 树的性能最快。


    必须指出的是，Apple M1 Max 计算机上所有 set 实现的运行速度，都显著快于它们在 Intel Xeon W 计算机上的对应执行时间。


    因此，尚不清楚在将输入数据填充到 32 棵 AVL 树的过程中使用 Go 协程和并发处理是否能带来有意义的益处，因为结果取决于处理器。


    ## 10.4 本章小结


    我们介绍了 AVL 树的特性。`Insert`（插入）和 `Delete`（删除）操作能够保持 AVL 树的特性。我们概述了执行这些操作的逻辑。接着，我们呈现了一个包含这些操作的包，并检验了构建和搜索
    AVL 树的相关性能。最后，我们展示了使用 map、AVL 树和并发 AVL 树三种不同方式实现的 Set，并比较了它们的性能。


    在下一章中，我们将重点介绍哈希函数和哈希表，以及几个重要的应用。


    # 11. 堆树


    上一章介绍了 AVL 树。当需要大量快速查找时，这些树极其有用。


    在本章中，我们将介绍另一种重要的树结构——`堆`。堆树是另一种平衡树类型，树中最大的项始终位于树的根节点。我们使用堆树来实现一种高效的排序算法。


    在下一节中，我们将定义堆树并说明堆树的构建过程。


    ## 11.1 堆树的构建


    堆是一棵完全二叉树，其特点是**每个节点的值都大于它的两个子节点**。堆树中最大的值始终位于根节点。完全二叉树的叶子节点从最深层从左到右填充。


    请看下图所示的堆树。每个节点的值都大于它的两个子节点。


    我们想要插入一个值为 90 的新节点。见图 11-1。


    ![](img/527841_1_En_11_Fig1_HTML.jpg)


    一幅堆树结构示意图，展示了以数字 100 为顶点的最大堆，共三层。根节点 100 有两个子树 60 和 80。左子树：节点 60 有两个子节点 50 和 30。节点
    50 有两个子节点 10 和 35。右子树：节点 80 有两个子节点 75 和 40。左子树中的节点 30 处插入了一个新节点，值为 90。


    图 11-1


    插入 90


    我们按从左到右的顺序填充叶子节点，因此节点 90 需要成为节点 30 的左子节点。但是 90 比它的父节点 30 大。因此我们交换这两个节点。见图 11-2。


    ![](img/527841_1_En_11_Fig2_HTML.jpg)


    一幅堆树结构示意图，展示了以数字 100 为顶点的最大堆，共三层。根节点 100 有两个子树 60 和 80。左子树：节点 60 有两个子节点 50 和 90。节点
    50 有两个子节点 10 和 35。节点 90 有一个子节点 30。右子树：节点 80 有两个子节点 75 和 40。


    图 11-2


    插入的继续


    但是 90 比它的父节点 60 大，所以我们再次进行交换，得到包含 90 的新堆树。见图 11-3。


    ![](img/527841_1_En_11_Fig3_HTML.jpg)


    一幅堆树结构示意图，展示了以数字 100 为顶点的最大堆，共三层。根节点 100 有两个子树 90 和 80。左子树：节点 90 有两个子节点 50 和 60。节点
    50 有两个子节点 10 和 35。节点 60 有一个子节点 30。右子树：节点 80 有两个子节点 75 和 40。


    图 11-3


    插入后的结果


    在下一节中，我们将展示如何从堆树中执行删除操作。


    ## 11.2 从堆树中删除


    我们只能删除堆树根节点中的值。要删除根节点的值 100，我们使用树中最低层最右侧节点的值（本例中为 30）替换根节点中的值。然后，我们将新的根节点值与其两个子节点的值进行比较，并与较大的子节点进行交换。我们继续这个下沉过程，直到没有更多节点需要交换。因此，30
    先与 90（子节点 90 和 80 中较大的那个）交换；然后 30 再与 60（子节点 50 和 60 中较大的那个）交换。这得到了图 11-4 所示的新堆树。


    ![](img/527841_1_En_11_Fig4_HTML.jpg)


    一幅堆树结构示意图，展示了以数字 90 为顶点的最大堆，共三层。根节点 90 有两个子树 60 和 80。左子树：节点 60 有两个子节点 50 和 30。节点
    50 有两个子节点 10 和 35。右子树：节点 80 有两个子节点 75 和 40。


    图 11-4


    删除后的结果


    在下一节中，我们将研究从一个切片构建通用堆树以及插入新项的实现细节。


    ## 11.3 堆树的实现


    ### 构建堆树的逻辑


    构建堆树以及在堆树中插入项的逻辑，源于切片中项的 `index`（索引）与该堆树中项的位置之间的以下关系。假设我们在指定的 `index` 处有一个项。


    - 如果索引是奇数，其父节点位于 `index / 2` 处；如果索引是偶数，则位于 `index / 2 – 1` 处。

    - 其左子节点位于索引 `2 * index + 1` 处。

    - 其右子节点位于索引 `2 * index + 2` 处。


    考虑与上述堆树对应的切片 `[90, 60, 80, 50, 30, 75, 40, 10, 35]`。通过按从左到右的顺序遍历树中每个层级的值，切片的值与堆树中的值相关联。


    考虑切片中索引为 3、值为 50 的节点。


