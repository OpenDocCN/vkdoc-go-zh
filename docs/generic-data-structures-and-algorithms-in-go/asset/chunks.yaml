    i := 1

    for i = 0 && h = 30 {

    mid := Partition(data)

    var portion[] T

    if mid  threshold) {

    wg.Add(1)

    go func(data[] T) {

    defer wg.Done()

    ConcurrentQuicksort(data, wg)

    }(portion)

    } else {

    ConcurrentQuicksort(portion, wg)

    }

    }

    InsertSort(data)

    }

    func QSort[T Ordered](data[] T) {

    var wg sync.WaitGroup

    ConcurrentQuicksort(data, &wg)

    wg.Wait()

    }

    func partition[T Ordered](data []T, low, high int) int {

    var pivot = data[low]

    var i = low

    var j = high

    for i  pivot && j > low {

    j--

    }

    if i < j {

    data[i], data[j] = data[j], data[i]

    }

    }

    data[low] = data[j]

    data[j] = pivot

    return j

    }

    func quicksort[T Ordered](data []T, low, high int) {

    if low < high {

    var pivot = partition(data, low, high)

    quicksort(data, low, pivot)

    quicksort(data, pivot + 1, high)

    }

    }

    func main() {

    data := make([]float64, size)

    for i := 0; i < size; i++ {

    data[i] = 100.0 * rand.Float64()

    }

