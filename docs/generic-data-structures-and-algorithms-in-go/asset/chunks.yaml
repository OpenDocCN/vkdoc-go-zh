    visited nodes for depth vs. breadth-first search.


    In the next section, we present and implement a solution to a classic graph problem.
    We show how to find the shortest path from a source node to every other node in
    a graph.


    ## 16.4 Single-Source Shortest Path in Graph


    Given a graph and a source node in the graph, find the shortest paths from the
    source node to all the nodes in the graph.


    The celebrated Dijkstra algorithm is presented. It was conceived by [computer
    scientist](https://en.wikipedia.org/wiki/Computer_scientist) [Edsger W.​ Dijkstra](https://en.wikipedia.org/wiki/Edsger_W._Dijkstra)
    in 1956 and published three years later.


    Consider the graph with source node `"A"` shown in Figure [16-2](#527841_1_En_16_Chapter.xhtml#Fig2).


    ![](images/527841_1_En_16_Chapter/527841_1_En_16_Fig2_HTML.png)


    An illustration of a graph for Dijkstra’s single-source shortest path. `A` is
    considered the source node. The distance is depicted in the format: path, number:
    `A B`, 4; `A H`, 1; `B H`, 11; `B C`, 1; `C I`, 2; `H I`, 7; `H G`, 1; `I G`,
    1; `C D`, 7; `C F`, 1; `G F`, 2; `D E`, 1; `D F`, 8; `F E`, 10.


    Figure 16-2 - Graph for single-source shortest path


    The Dijkstra algorithm returns the shortest distance from source node `"A"` to
    all the other nodes in the graph.


    ### Implementation


    Listing [16-2](#527841_1_En_16_Chapter.xhtml#PC6) presents an implementation of
    the Dijkstra algorithm.


    ```go

    package main

    import (

    "fmt"

    "github.com/jiaxwu/container/heap"

    )

    // PriorityQueue Priority queue

    type PriorityQueue[T any] struct {

    h *heap.Heap[T]

    }

    func New[T any](less func(e1 T, e2 T) bool) *PriorityQueue[T] {

    return &PriorityQueue[T]{

    h: heap.New(less),

    }

    }

    func (p *PriorityQueue[T]) Add(elem T) {

    p.h.Push(elem)

    }

    func (p *PriorityQueue[T]) Remove() T {

    return p.h.Pop()

    }

    func (p *PriorityQueue[T]) Len() int {

    return p.h.Len()

    }

    func (p *PriorityQueue[T]) Empty() bool {

    return p.Len() == 0

    }

    func Less(a, b tuple) bool {

    return a.weight < b.weight

    }

    type tuple struct {

    node   rune

    weight int

    }

    type edges map[rune]int

    func Dijkastra(graph map[rune]edges) map[rune]tuple {

    distances := make(map[rune]tuple)

    visited := make(map[rune]bool)

    // Initialize distances

    for node := range graph {

    distances[node] = tuple{node, 1000}

    }

    source := ''A'' // ''A'' is 65 in ASCII

    distances[source] = tuple{source, 0}

    // This implements a priority queue using the container/heap package

    heapQueue := New[*tuple](Less)

    heapQueue.Add(tuple{source, 0})

    for !heapQueue.Empty() {

    current := heapQueue.Remove()

    currentNode := current.node

    currentDistance := current.weight

    // We have already found a better path

    if currentDistance > distances[convert(currentNode)].weight {

    continue

    }

    for t, w := range graph[currentNode] {

    neighbor := t

    weight := w

    distance := currentDistance + weight

    /*

    Only consider this new path if it''s

    better than any path we''ve already

    found

    */

    if distance < distances[convert(neighbor)].weight {

    distances[convert(neighbor)] = tuple{neighbor, distance}

    heapQueue.Add(tuple{neighbor, distance})

    }

    }

    }

    return distances

    }

    func main() {

    graph := make(map[rune]edges)

    graph[''A''] = edges{''B'': 4, ''H'': 1}

    graph[''B''] = edges{''A'': 4, ''C'': 1, ''H'': 11}

    graph[''C''] = edges{''B'': 1, ''I'': 2, ''F'': 1, ''D'': 7}

    graph[''D''] = edges{''C'': 7, ''F'': 8, ''E'': 1}

    graph[''E''] = edges{''D'': 1, ''F'': 10}

    graph[''F''] = edges{''G'': 2, ''C'': 1, ''D'': 8, ''E'': 10}

    graph[''G''] = edges{''F'': 2, ''I'': 1, ''H'': 1}

    graph[''H''] = edges{''G'': 1, ''I'': 7, ''B'': 11, ''A'': 1}

    graph[''I''] = edges{''C'': 2, ''H'': 7, ''G'': 1}

    solution := Dijkastra(graph)

    for node, weight := range solution {

    fmt.Printf("%s %d ", string(node+65), weight)

    }

    }

