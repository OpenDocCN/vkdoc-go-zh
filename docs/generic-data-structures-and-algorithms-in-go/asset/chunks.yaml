    Can we improve the performance of **quicksort** using concurrency?


    As a stepping stone toward a concurrent solution, we consider another **O(n**^(**2**)**)**
    sorting algorithm, ***InsertSort***, implemented as follows:


    ```

    func InsertSort[T Ordered](data[] T) {

    i := 1

    for i = 0 && h < data[j] {

    data[j + 1] = data[j]

    j -= 1

    }

    data[j + 1] = h

    i += 1

    }

    }

    ```


    Let us “walk” through a simple example to see how this sorting algorithm works.


    Suppose the slice, ***data***, that we wish to sort is **[5, 1, 12, 9]**.


    The variable **i** is initialized to 1.


    In the for-loop, **h** is set to **data[1]**, which is 1\. The variable **j**
    is set to 0\. In a nested for-loop, **data[j + 1]** is set to **data[0]**, so
    **data[1]** is set to 5\. The inner loop terminates. Next, **data[0]** is set
    to 1\. The slice is now **[1, 5, 12, 9]**.


    After incrementing **i**, we execute the outer loop again. The variable **h**
    is set to 12, and **j** is set to 1\. The inner loop terminates since 12 is not
    less than either 1 or 5\. We increment **i** to 3. Variable **h** is set to 9\.
    In the inner loop, since 9 is less than 12, the slice becomes **[1, 5, 9, 12]**,
    and we are done.


    Because of the two nested loops, the **InsertSort** is **O(n**^(**2**)**)** for
    large n.


    For each iteration of the outer loop, the next element, not yet considered, is
    inserted to the left of the first element that is larger than it.


    In Listing [2-6](#527841_1_En_2_Chapter.xhtml#PC14), we consider a concurrent
    implementation of quicksort of 50 million numbers.


    ```

    package main

    import (

    "fmt"

    "time"

    "math/rand"

    "sync"

    )

    const size = 50_000_000

    const threshold = 5000

    type Ordered interface {

    ~float64 | ~int | ~string

    }

