    ### 代码解释


    函数 `prepareDrawTree` 调用 `prepareToDraw`，两者都接收一个参数 `tree`（`BinaryTree` 类型）。


    函数 `prepareToDraw` 调用 `inorderLevel`，传入树的根节点和层级 1。此中序遍历会检查节点是否不为 `nil`，如果非空，则递归调用自身，传入参数
    `node.Left` 和 `level + 1`。


    代码的第二行是访问操作，它会向全局 `data` 切片追加一个 `nodePos`，其中包含 `node.Value`，以及 `YPos` 等于 100 –
    level 和 `XPos` 等于 -1（仅作为临时占位符）。由于树是从根节点向下构建的，层级越高，`YPos` 值越低，因此 `YPos` 的计算公式为
    100 – level。


    代码的第三行是对 `node.Right` 和 `level + 1` 的递归调用。


    `prepareToDraw` 中的第二行代码是对 `setXValues()` 函数的调用。此函数使用 `findX` 来找到 `data` 切片中包含
    `data` 中每个 `nodePos` 值的索引。在遍历 `data` 切片时，该索引用作 `nodePos` 中的 `XValue`。`data` 中的第一个
    `nodePos` 将是最左侧的节点（在前面展示的树中为节点 F），其 `XPos` 为 0。`data` 中的第二个 `nodePos` 将是该树中的节点
    E。在 `setXY()` 函数能够工作之前，需要先计算出 `data` 切片（除了 `XPos` 之外的部分）。


    在 `setXY()` 完成后，会调用前序递归函数 `getEndPoints`。


    每访问一个节点，就会使用所访问的节点及其父节点构建 `nodePair` 切片。这些信息将用于绘制连接树节点的边。


    我们用一个包含四个节点的简单树来说明 `data` 和 `endPoints` 的构建过程。


    8-3 清单 展示了一个简单的 `main` 函数以及在控制台中显示的 `data` 和 `endPoints` 切片结果。


