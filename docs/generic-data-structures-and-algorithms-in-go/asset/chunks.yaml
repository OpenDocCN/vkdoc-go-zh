    # 6. Queues and Lists


    **Queue** is another relatively simple data type. It has many practical uses in
    application development.


    A queue organizes data in a first-in, first-out (FIFO) manner. Because of FIFO,
    the most obvious application is to model a waiting line. This could be a line
    of customers waiting for some service, a print job waiting in a print queue, a
    concurrent process waiting for CPU access, and many other applications that require
    waiting lines. New items are inserted into the back of a queue, and items are
    removed from the front of the queue. The queue maintains the order in which the
    items are inserted.


    We present two implementations of **Queue** in this chapter and compare their
    efficiency. We also present several applications of **Queue**.


    **Deque** is more general than a **Queue**. It allows insertion and deletion from
    the front as well as the back of the structure. We present an implementation of
    **Deque** and an application that uses **Deque**.


    **PriorityQueue** is a specialized type of **Queue**. We show an implementation
    of **PriorityQueue** and an application involving airline passengers.


    **List** is a more general data type than a **Queue.** Items can be inserted in
    the front, back, or anywhere in the middle. We present the implementation of a
    singly linked and doubly linked list.


    In the next section, we define the Queue abstract data type (ADT).


    ## 6.1 Queue ADT


    There are six operations that characterize a Queue ADT.


    | `Insert(item)` – Adds item to the queue |

    | `Remove()` item – Removes and returns the first item inserted in the queue |

    | `First()` item – Accesses the first item inserted in the queue without altering
    the queue |

    | `Size` int – Returns the number of items in the queue |

    | `Range()` – Returns an Iterator |

    | `Empty()` – Returns a bool, true if the Iterator it is applied to has no items
    |

    | `Next()` – Returns the next item in the Iterator |


    We present two implementations of **Queue**: slice based and node based. In the
    next section, we focus on a slice-based implementation of Queue.'
