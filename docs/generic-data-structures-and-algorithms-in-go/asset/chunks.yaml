    ![](images/527841_1_En_13_Chapter/527841_1_En_13_Fig2_HTML.png)


    A plot. The vertical line marks 94 to 98 and the horizontal line marks 0 to 16.
    Plus in line 99. Plus and division on line 98. Plus, minus, y in line 97. A, b,
    division, h, x, y, in line 96. Plus, minus in line 95. C, d, f, g, in line 94.
    All are arranged at different horizontal points, and some of them are connected
    by lines.


    **Figure 13-2** Expression tree resulting from code in Chapter [8](#527841_1_En_8_Chapter.xhtml)


    Why the failure? An expression tree is a binary tree, so one would expect the
    code of Chapter [8](#527841_1_En_8_Chapter.xhtml) to work here.


    The suite of code for graphically displaying a binary tree assumes that each node
    has a unique value field.


    An expression tree fails this requirement because there are nodes with identical
    values. For example, how many nodes contain a “+” for their value? Many!


    To fix the problem so that we can deploy the code to graph an expression tree,
    we concatenate a unique numerical tag, as a string, to each node’s `ch` field.
    Then when we create labels; we extract only the first character from `node.ch`.
    In this way, we have forced each node to have a unique string representation while
    we build the tree.


    Listing [13-2](#527841_1_En_13_Chapter.xhtml#PC5) presents the revised portion
    of the suite of functions for graphing an expression tree. The four lines of code
    that are added are shown in boldface.


    A variable `c` is defined global to function `inorderLevel`. Each time this function
    is invoked, `c` is incremented by one, and `node.ch` is modified with this additional
    unique tag.


    When adding labels in function `ShowTreeGraph`, only the first character of `node.ch`
    is used, blocking out the unique tag.


    ```

