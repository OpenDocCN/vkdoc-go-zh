- fmt: "# 14.3 The Design\n\nA global grid of location objects is constructed. Each\
    \ location object contains an `x` and `y` position and a critter. This critter\
    \ is either a shark, tuna, or mackerel. As each critter moves, the global location\
    \ grid (a two-dimensional array) is updated.\n\nThe movement of each critter is\
    \ controlled by an independent goroutine spawned when the critter is born (from\
    \ reproduction or from the initial population). When the critter dies either from\
    \ being eaten (mackerel or tuna) or starvation (tuna or shark) or old age (mackerel,\
    \ tuna, or shark), its goroutine must be halted to prevent further movement and\
    \ to control computer resources. As the ocean cells become occupied with critters,\
    \ there could be thousands of goroutines running concurrently, each representing\
    \ a critter that is moving.\n\nTo achieve continual movement of each critter,\
    \ a loop is constructed within the goroutine of the critter, with a random sleep\
    \ delay of between a half second and one second. This loop must be terminated\
    \ when the simulation ends or when the critter dies. Terminating (breaking out\
    \ of) the loop ends the goroutine for that critter.\n\nA separate output goroutine\
    \ is constructed in a loop with a sleep delay of one second. So every second,\
    \ the census of critters is computed, and the positions of all the critters are\
    \ displayed with colored rectangles. During this output, the global matrix of\
    \ locations containing critters is displayed.\n\nUsing a mutex, the global locations\
    \ matrix must be frozen when a critter moves or when the ocean is displayed to\
    \ prevent a race condition.\n\n## 14.4 The Implementation\n\nBefore presenting\
    \ the entire implementation (over 400 lines of code), we show and discuss various\
    \ pieces.\n\n### Data Model for Each Species\n\nWe start by examining the data\
    \ model of each species and most importantly the global location matrix.\n\n```go\n\
    type Location struct {\n    x       int\n    y       int\n    critter MarineLife\n\
    }\ntype MarineLife interface {\n    Move()\n    Reproduce(l Location)\n    Starve()\
    \ bool\n    LifeOver() bool\n}\ntype Tuna struct {\n    repro int\n    starv int\n\
    \    life  int\n    x, y int  // Set x to -1, y = -1 if dead\n}\ntype Shark struct\
    \ {\n    repro int\n    starv int\n    life  int\n    x, y int  // Set x to -1,\
    \ y = -1 if dead\n}\ntype Mackerel struct {\n    repro int\n    starv int\n  \
    \  life  int\n    x, y int  // Set x to -1, y = -1 if dead\n}\nvar locations [numRows][numCols]Location\n\
    ```\n\n### Discussion of Code\n\nType `Location` specifies `critter` as type `MarineLife`.\
    \ For this to work, each of the concrete critter types (shark, tuna, and mackerel)\
    \ must implement the `MarineLife` interface. This means that each of the concrete\
    \ types must implement methods `Move()`, `Reproduce()`, `Starve()`, and `LifeOver()`.\n\
    \nEach of the critter types is defined by a struct containing the fields `repro`,\
    \ `starv`, `life`, `x`, and `y`.\n\nThe global `locations` two-dimensional array\
    \ is defined as containing `Location` objects.\n\n### Support Functions\n\nSeveral\
    \ support functions are defined that are needed to implement the `MarineLife`\
    \ interface methods. These are shown as follows:\n\n```go\nfunc init() {\n   \
    \ rand.Seed(time.Now().UTC().UnixNano())\n}\nfunc distanceOfOne(x1, y1, x2, y2\
    \ float64) bool {\n    return (math.Abs(x2-x1) == 0 &&\n        math.Abs(y2-y1)\
    \ == 1) ||\n        (math.Abs(x2-x1) == 1 && math.Abs(y2-y1) == 0)\n        ||\
    \ (math.Abs(x2-x1) == 1 &&\n            math.Abs(y2-y1) == 1)\n}\nfunc initializeLocations()\
    \ {\n    for row := 0; row < numRows; row++ {\n        for col := 0; col < numCols;\
    \ col++ {\n            locations[row][col] =\n                Location{col, row,\
    \ nil}\n        }\n    }\n}\nfunc findRandomCritter(x int, y int,\n    critter\
    \ MarineLife) (bool, Location) {\n    // Send in nil for critter to get random\
    \ empty\n    // location\n    result := []Location{}\n    for r := 0; r < numRows;\
    \ r++ {\n        for c := 0; c < numCols; c++ {\n            d := distanceOfOne(float64(x),\
    \ float64(y),\n                float64(c), float64(r))\n            if d == true\
    \ &&\n                reflect.TypeOf(locations[c][r].critter) ==\n           \
    \         reflect.TypeOf(critter) {\n                result = append(result, Location{r,\
    \ c,\n                    critter})\n            }\n        }\n    }\n    if len(result)\
    \ == 0 {\n        return false, Location{}\n    } else {\n        return true,\
    \ result[rand.Intn(len(result))]\n    }\n}\n```\n\n### Discussion of Code\n\n\
    We use the `reflect.TypeOf` method in function `findRandomCritter` to create a\
    \ slice of `Location` objects containing the critter that is input to this function.\
    \ This function returns two outputs and allows the caller to determine whether\
    \ a target location has been found.\n\nFunction `init()` seeds the random number\
    \ generator with the current clock time that assures different results each time\
    \ the simulation is run.\n\nFunction `initializeLocations` assigns an `x` and\
    \ `y` coordinate to each cell and assigns each cell with a `nil` critter.\n\n\
    ### Required Methods for Mackerel to Be of Type MarineLife\n\n```go\nfunc (mackerel\
    \ *Mackerel) Move() {\n    for ; quit == false ; {\n        if mackerel.x == -1\
    \ { // mackerel has been\n            // killed\n            break\n        }\n\
    \        mutex.Lock()\n        mackerel.repro -= 1\n        mackerel.starv -=\
    \ 1\n        mackerel.life -= 1\n        if mackerel.LifeOver() || mackerel.Starve()\
    \ {\n            locations[mackerel.y][mackerel.x].critter\n                =\
    \ nil\n            mackerel.x = -1\n            mackerel.y = -1\n            mutex.Unlock()\n\
    \            break\n        }\n        // Find random neighbor that has no critter\n\
    \        found, newLoc := findRandomCritter(mackerel.x,\n            mackerel.y,\
    \ nil)\n        if found == true {\n            fmt.Printf(\"\\nMackerel Move\
    \ from \n                to \", mackerel.x,\n                mackerel.y, newLoc.x,\
    \ newLoc.y)\n            mackerel.Reproduce(newLoc)\n        }\n        mutex.Unlock()\n\
    \        time.Sleep(time.Duration(rand.Intn(500) + 500)\n            * time.Millisecond)\n\
    \    }\n}\nfunc (mackerel Mackerel) Starve() bool {\n    return mackerel.starv\
    \ <= 0\n}\nfunc (mackerel Mackerel) LifeOver() bool {\n    return mackerel.life\
    \ <= 0\n}\nfunc (mackerel *Mackerel) Reproduce(l Location) {\n    if mackerel.x\
    \ == -1 {\n        return\n    }\n    if mackerel.repro <= 0 {\n        newMackerel\
    \ := new(Mackerel)\n        newMackerel.repro = MACKERELREPRO\n        newMackerel.starv\
    \ = MACKERELSTARVE\n        newMackerel.life = MACKERELLIFE\n        newMackerel.x\
    \ = mackerel.x\n        newMackerel.y = mackerel.y\n        locations[mackerel.y][mackerel.x].critter\
    \ =\n            newMackerel\n        go newMackerel.Move()\n    } else {\n  \
    \      locations[mackerel.y][mackerel.x].critter = nil\n    }\n    mackerel.x\
    \ = l.x // assign mackerel to new location\n    mackerel.y = l.y\n    // add mackerel\
    \ to new location\n    locations[l.y][l.x].critter = mackerel\n}\n```\n\n### Discussion\
    \ of Code\n\nThe `Move` method for mackerel takes a pointer to a `Mackerel` as\
    \ receiver of the method. This is needed since the `mackerel` receiver may have\
    \ its internal data modified.\n\nIn the for-loop that defines successive moves,\
    \ if the `x` coordinate of the mackerel object is negative 1, we break out of\
    \ the loop, which terminates the method. This method will be defined elsewhere\
    \ as a goroutine.\n\nWe lock the mutex to prevent the global `locations` matrix\
    \ from being changed outside of this goroutine. We decrement the three fields\
    \ `repro`, `starv`, and `life`.\n\nIf either `Starve()` or `LifeOver()` is true,\
    \ we purge the mackerel object from the ocean (setting its critter value to `nil`\
    \ at the appropriate `location[mackerel.y][mackerel.x]`). We terminate the goroutine\
    \ of the dead mackerel object by setting its `x` and `y` values to -1. We unlock\
    \ the mutex.\n\nIf an empty target location is found, we output the move to the\
    \ console and pass the `newLoc` to the `Reproduce` method. We unlock the mutex.\
    \ We pause the goroutine loop using a random sleep interval.\n\nThe `Reproduce`\
    \ method uses a pointer receiver since the receiver's internal data may be changed.\n\
    \nIf the `repro` value is equal or less than zero, we create a new mackerel object\
    \ using global constants that define the initial field values `repro`, `starv`,\
    \ and `life`. We assign the new mackerel object to the `critter` field of `Location`\
    \ and its `x` and `y` values to the location vacated by the reproducing mackerel.\n\
    \nIf the `repro` value is greater than one, we set the vacated location to a critter\
    \ value of `nil`.\n\nFinally, we set the `x` and `y` coordinates of the mackerel\
    \ to the new location."
