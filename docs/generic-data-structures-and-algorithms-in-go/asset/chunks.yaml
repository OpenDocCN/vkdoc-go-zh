- fmt: '这是一个二叉树的示意图，带有两种着色。根节点`17`有子树`10`和`40`。节点`10`有子节点`4`和`15`。节点`40`有子节点`35`和`60`。节点`35`有子节点`19`和`38`。节点`19`有子节点`18`和`25`。节点`25`有子节点`20`和`30`。节点`60`有子节点`50`和`70`。节点`50`有子节点`45`。除节点`40`、`19`、`20`、`30`和`45`外，所有节点均为深色。


    仔细检查这棵树可以发现，从根节点`17`到每个叶节点的黑色节点数量恰好为`3`。每个红色节点只有黑色子节点。


    这棵树显然不如AVL树平衡（根的右侧最大深度为`5`，左侧最大深度为`2`）。


    在下一节中，我们将介绍向红黑树中执行**插入**操作的实现。由于存在许多特殊情况，其细节相当复杂。


    ## 12.3 红黑树的实现


    向红黑树中插入元素的实现细节令人望而生畏。这是因为根据第12.2节讨论和说明的逻辑，可能存在大量潜在的旋转或颜色校正操作。


    理解清单[12-1](#527841_1_En_12_Chapter.xhtml#PC1)中实现逻辑的最佳策略是，逐步“遍历”第12.2节中给出的示例，尽可能地深入。


    为了绘制红黑树，对第8.3节中定义和讨论的`display tree`函数进行了一些小的修改。实现中这一部分的更改以粗体显示。


    清单[12-1](#527841_1_En_12_Chapter.xhtml#PC1)展示了红黑树的实现，包括绘制树的逻辑，但仅包含`Insert`方法。该树的实现与一个简短的驱动程序`main`结合在一起，没有为树创建单独的包。'
  raw: 'An illustration of binary tree structure with 2 shade. Root node 17 has subtrees
    10 and 40\. Node 10 has child 4 and 15\. Node 40 has child 35 and 60\. Node 35
    has child 19 and 38\. Node 19 has child 18 and 25\. Node 25 has child 20 and 30\.
    Node 60 has child 50 and 70\. Node 50 has child 45\. Except nodes 40, 19, 20,
    30, and 45, all nodes are dark shade.


    A careful inspection of this tree shows that the number of black nodes from root
    17 to every leaf is exactly 3\. Every red node has only black children.


    This tree is clearly less balanced than an AVL tree (the maximum depth on the
    right side of the root is 5 and the maximum depth on the left side of the root
    is 2).


    In the next section, we present an implementation of **Insertion** into a red-black
    tree. The details are complex because of the many special cases.


    ## 12.3 Implementation of Red-Black Tree


    The implementation details for insertion into a red-black tree are daunting. This
    is because of the number of possible rotational or color corrections that are
    potentially possible based on the logic discussed and illustrated in Section 12.2.


    The best strategy for unraveling the logic in the implementation presented in
    Listing [12-1](#527841_1_En_12_Chapter.xhtml#PC1) is to “walk” as far as you can,
    step by step, through the example presented in Section 12.2.


    A few small changes to the display tree function, defined and discussed in Section
    8.3, were made for drawing a red-black tree. The changes in this portion of the
    implementation are shown in boldface.


    Listing [12-1](#527841_1_En_12_Chapter.xhtml#PC1) presents the implementation
    of a red-black tree, including logic for drawing the tree, but only including
    the ***Insert*** method. The tree implementation is combined with a short driver
    program, ***main***, without creating a separate package for the tree.'
