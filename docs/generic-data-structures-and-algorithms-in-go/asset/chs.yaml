  \ 函数的数据\n\n图是根据从 Rand McNally Atlas 中获取的 33 个美国城市的数据构建的，并指定了它们之间的距离。\n\n由于篇幅限制，此处省略了\
  \ `main` 函数中的细节。请从出版商网站下载完整清单。\n\n该问题的已知解是一个最优旅程，长度为 **10,861** 英里。\n\n### 结果\n\n\
  在运行分支定界程序 **18 小时** 42 分钟、以约 **每秒 70,000 个节点** 的速度生成 **46 亿个节点** 后，迄今生成的最佳旅程是\n\n\
