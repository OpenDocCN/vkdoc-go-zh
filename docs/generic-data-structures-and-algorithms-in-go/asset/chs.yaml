  }\n```\n\n*清单 9-4*\n*绘制二叉搜索树的代码*\n\n该代码遵循第 8 章中展示二叉树的逻辑。\n\n清单 9-5 和 9-6 展示了 `binarysearchtree`\
  \ 包的完整代码，以及一个用于测试该树功能的主驱动程序。\n\n```go\npackage main\n\nimport (\n\tbst\"example.com/binarysearchtree\"\
  \n\t\"math/rand\"\n\t\"time\"\n\t\"fmt\"\n)\n\n// Satisfies OrderedStringer because\
  \ of ~int\n// Also satisfies OrderedStringer because of String() method below\n\
  type Number int\nfunc (num Number) String() string {\n\treturn fmt.Sprintf(\"%d\"\
  , num)\n}\n\ntype Float float64\nfunc (num Float) String() string {\n\treturn fmt.Sprintf(\"\
  %0.1f\", num)\n}\n\nfunc inorderOperator(val Float) {\n\tfmt.Println(val.String())\n\
  }\n\nfunc main() {\n\trand.Seed(time.Now().UnixNano())\n\t// Generate a random search\
  \ tree\n\trandomSearchTree := bst.BinarySearchTree[Float]{nil, 0}\n\tfor i := 0;\
  \ i < 30; i++ {\n\t\trn := 1.0 + 99.0 * rand.Float64()\n\t\trandomSearchTree.Insert(Float(rn))\n\
  \t}\n\ttime.Sleep(3 * time.Second)\n\tbst.ShowTreeGraph(randomSearchTree)\n\trandomSearchTree.InOrderTraverse(inorderOperator)\n\
  \tmin := randomSearchTree.Min()\n\tmax, _ := randomSearchTree.Max()\n\tfmt.Printf(\"\
  \\nMinimum value in random search tree is %0.1f  \\nMaximum\nvalue in random search\
  \ tree is %0.1f\", *min, *max)\n\tstart := time.Now()\n\ttree := bst.BinarySearchTree[Number]{nil,\
  \ 0}\n\tfor val := 0; val < 100_000; val++ {\n\t\ttree.Insert(Number(val))\n\t}\n\
  \telapsed := time.Since(start)\n\t_, ht := tree.Max()\n\tfmt.Printf(\"\\nTime to\
