  \ 个。\n\n按平均每秒 71,874 个节点的速率，生成该树中的所有叶节点大约需要 1.39 × 10³⁰ 秒，即大约 4.41 × 10²² 年。\n\n\
  \n\n## 18.3 总结\n\n我们提出了一种分支定界算法，该算法为 TSP 提供了精确解。问题在于，这是一个计算上难以处理的问题。如果允许其运行足够长的时间，它将找到该问题的精确解。\n\
  \n使用一个优先队列来保存一系列节点，每个节点包含一个旅程（可能是部分旅程）、一个下界和一个层级。队列中的节点按层级、下界以及（在平局情况下）旅程中城市值的总和进行排序。\n\
  \n尝试了一个 33 城市的问题。经过两个小时的计算，获得的最佳旅程比已知的最优旅程高出约 6%。这个迄今为止的最佳旅程在 16 小时后保持不变。\n\n这为接下来的两章奠定了基础，在其中我们将介绍\
  \ TSP 的启发式解法。这些启发式解法在几秒钟内执行，并生成精确解或误差很小的解。\n\n下一章介绍一种启发式算法：模拟退火。\n\n"
- "# 19. 模拟退火：一种解决 TSP 的启发式解法\n\n前一章介绍了一种用于生成 TSP 精确解的分支定界算法。像所有已知的精确解法一样，它在计算上是难以处理的。\n\
  \n本章介绍解决 TSP 的强大启发式解法：模拟退火。\n\n在下一节中，我们将介绍组合优化问题，并为我们介绍解决 TSP 的启发式算法奠定基础。\n\n##\
  \ 19.1 组合优化\n\n组合优化问题在计算上是困难的。随着这些问题规模的增大，精确解的计算时间会变得不可行——需要数年或数个世纪的计算时间和无法实现的内存需求。\n\
  \n其中一个著名且有趣的问题是前一章介绍的“旅行商问题”（TSP）。这个问题很容易陈述和理解。给定 `n` 个城市，以及城市之间的指定距离，找到从给定城市（例如城市\
  \ 0）出发，访问其余 `n-1` 个城市，并返回起始城市的最短旅程。换句话说，找到访问城市的顺序，使得总行驶距离最小。\n\n通常，我们会得到 `n` 个城市的位置，从中我们可以计算它们之间的距离。我们假设在一个全连接图中，城市之间存在双向连接（每个城市与所有其他城市都有连接）。\n\
  \n正如我们在第 17 章中看到的，枚举所有可能的旅程组合并选择总行驶距离最小的旅程的暴力解法，其复杂度为 `(n – 1)!`。例如，对于标记为 1、2、3\
  \ 和 4 的四个城市，从城市 1 出发并返回的可能的旅程是：\n\n```\n1 -> 2 -> 3 -> 4\n1 -> 2 -> 4 -> 3\n1 ->\
  \ 3 -> 2 -> 4\n1 -> 3 -> 4 -> 2\n1 -> 4 -> 2 -> 3\n1 -> 4 -> 3 -> 2\n```\n\n正如预测的那样，共有\
  \ `(4 – 1)!` 或 `3! = 6` 种可能的旅程。\n\n对于一个 29 城市的问题，可能的旅程数量是 `28! = 3.0488834e+29`。如果我们能以每秒\
  \ 1000 万次旅程的速度评估这些旅程，完成这个计算大约需要 317,000,000,000,000 年。\n\n因此，即使对于像 29 城市这样规模不大的问题，获得\
  \ TSP 的精确解在计算上也是难以处理的。\n\n### 启发式解法\n\n由于 TSP 有许多重要的“现实世界”应用（例如，印刷电路板、交通运输），研究人员已经设计了许多解决\
  \ TSP 的启发式算法。启发式解法是一种不保证最优但在计算上可处理（多项式复杂度）并且有望产生接近最优解的解法。通常，启发式算法能够生成问题的最优解。\n\n\
  解决 TSP 的这两类近似解法的两大框架是：\n\n1.  模拟退火\n2.  遗传编程\n\n上述两大框架之所以如此有趣，是因为它们各自源自与 TSP 并不直接相关的过程和系统。它们可以部署在广泛的组合优化问题上。还有其他用于获得\
  \ TSP 启发式解法的框架。\n\n这些启发式框架中的第一个利用了热力学模型，第二个利用了遗传学和适者生存模型。\n\n在下一节中，我们将研究这些启发式框架中的第一个：模拟退火。\n\
  \n## 19.2 模拟退火\n\n导致这一用于解决组合优化问题框架的开创性工作于 1953 年由 [Nicholas Constantine Metropolis]\
  \ 发表。后来，他和同事 W. K. Hastings 发表了构成模拟退火基础的 Metropolis-Hastings 算法。\n\n模拟退火是一种蒙特卡洛算法。这类算法依赖于对系统的重复统计抽样。在计算系统感兴趣属性的同时，生成系统的许多随机配置，并根据实验结果改进抽样。\n\
  \n模拟退火依赖于模仿金属分子晶格结构在加热并缓慢冷却以产生刚性强晶格结构时的热力学特性。冶金学家称此过程为“退火”。其目的是通过创建具有最小内能的晶格结构，来最小化钢制承重梁中的微观变形。在退火过程（梁的缓慢冷却）中，此类梁的平均能量由玻尔兹曼因子\
  \ `e`^(-`E`/`kT`) 给出，其中 `E` 是梁的平均能量，`T` 是温度，`k` 是玻尔兹曼常数。\n\n金属梁物理退火过程中极其重要的一部分是缓慢降低温度。这增加了梁内部晶格结构能量最小且强度最大的概率。\n\
  \n### 模拟退火步骤\n\n模拟退火算法的概要如下：\n\n1.  选择一个初始旅程并计算其成本。\n2.  为人工温度变量选择一个较高的初始温度 `T`。\n\
  3.  通过对现有旅程进行更改来修改旅程（例如，修改旅程中两个城市的顺序，或稍后出现的其他修改方式）。\n4.  如果新旅程成本小于旧旅程成本，则接受这个新旅程（下坡移动）。\n\
  5.  如果新旅程成本高于旧旅程成本，则以玻尔兹曼因子 `e`^(-`E`/`kT`) 给出的概率接受这个上坡移动。\n6.  在高温下，接受这种“上坡移动”的概率接近于\
  \ 1。这使得模拟能够探索解空间中的许多区域，而不会陷入旅程成本与温度空间中的局部谷底。\n7.  根据冷却曲线降低温度。该冷却曲线可以通过观察旅程成本随温度下降的速率来凭经验获得，并在该下降速率高时减缓温度的降低。\n\
  8.  重复步骤 3 到 7。\n9.  随着温度降低，接受上坡移动的概率减小。这允许算法下降，希望达到接近全局最小值的能量最低状态（最低旅程成本）。\n\n\
  这个算法的特别之处在于，随着温度变量缓慢降低，它会从统计上演化出越来越好、越来越好的旅程。这是基于冶金退火物理学对解空间进行的一次有引导的随机游走。\n\n该算法相对容易实现，并且正如我们将要展示的那样，它能生成高质量的解，要么是最优解，要么接近最优解。\n\
  \n\n\n### 收敛到局部最小值而非全局最小值的问题\n\n在解决组合优化问题时，一个始终存在的挑战是解会收敛到局部最小值，而非期望的全局最小值。因此，理想的做法是允许在解空间中进行充分的探索，而不是急于演化为一个解。\n\
  \n在模拟退火算法中，我们通过允许\"上坡移动\"来实现这一点。这些是在解空间中产生的路径长度大于当前已知最优路径的移动。其目标是能够跳出解空间中的局部低谷，同时找到可能包含全局最小值的更深低谷。\n\
  \n在下一节中，我们将按照刚才介绍的步骤，给出模拟退火算法的实现。\n\n## 模拟退火算法的实现\n\n我们创建一个 `Status` 类型，用于封装系统中相关的状态信息。\n\
  \n```go\ntype Status struct {\n\ttour           []int\n\tbestTour       []int\n\t\
  bestCostToDate float64\n\tpreviousCost   float64\n\ttemperature    float64\n\tdownhillMoves\
  \  int\n\tuphillMoves    int\n\trejectedMoves  int\n\tinverseOps     int\n\tswapOps\
  \        int\n\tinsertOps      int\n}\nvar status Status\n```\n\n我们使用三种独立的操作来扰动解空间中的一条路径：\n\
  \n- **逆序操作** – 我们在两个随机选择的索引值之间将路径反向。\n- **交换** – 我们在给定路径中随机选择两个城市并进行交换。\n- **插入**\
  \ – 将位于随机位置的第二个城市移动到第一个随机位置。\n\n此模拟退火实现的详细信息，以及大量的注释和程序输出，都展示在代码清单 19-1 中。\n\n```go\n\
  package main\nimport (\n\t\"fmt\"\n\t\"math\"\n\t\"math/rand\"\n\t\"time\"\n)\n\
  const (\n\tNUMCITIES = 29\n)\ntype Point struct {\n\tx float64\n\ty float64\n}\n\
  func init() {\n\trand.Seed(time.Now().UnixNano())\n}\nfunc (pt Point) distance(other\
  \ Point) float64 {\n\tdx := pt.x - other.x\n\tdy := pt.y - other.y\n\treturn math.Sqrt(dx*dx\
  \ + dy*dy)\n}\nfunc createGraph(numCities int, cities []Point, graph [][]float64)\
  \ {\n\tfor row := 0; row < numCities; row++ {\n\t\tfor col := 0; col < numCities;\
  \ col++ {\n\t\t\tgraph[row][col] = cities[row].distance(cities[col])\n\t\t}\n\t\
  }\n}\nfunc randomFrom(min int, max int) int {\n\treturn rand.Intn(max-min) + min\n\
  }\nfunc inverse(tour []int) []int {\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\
  \tsecondIndex := randomFrom(1, len(tour)-1)\n\tfor firstIndex == secondIndex {\n\
  \t\tfirstIndex = randomFrom(1, len(tour)-1)\n\t\tsecondIndex = randomFrom(1, len(tour)-1)\n\
  \t}\n\tif firstIndex > secondIndex {\n\t\tfirstIndex, secondIndex = secondIndex,\
  \ firstIndex\n\t}\n\tresult := deepcopy(tour[:firstIndex])\n\tfor index := 0; index\
