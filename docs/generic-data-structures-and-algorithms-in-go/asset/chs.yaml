  \t// fmt.Println(endPoints)\n\t// fmt.Println(data)\n}\nfunc FindXY(val interface{})\
  \ (int, int) {\n\tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val == val {\n\
  \t\t\treturn data[i].XPos, data[i].YPos\n\t\t}\n\t}\n\treturn -1, -1\n}\nfunc FindX(val\
  \ interface{}) int {\n\tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val ==\
