  \ 中可用。\n\n## 8.4 总结\n\n我们介绍了二叉树结构。展示了三种恰好访问每个树节点一次的机制。我们给出了一个非泛型的二叉树实现，以及一组使用第三方包\
  \ `fyne` 的资源图形化显示二叉树的函数。\n\n在下一章中，我们将继续探索树，并研究二叉搜索树。\n\n"
- "# 9. 二叉搜索树\n\n在上一章中，我们介绍并实现了二叉树，并讲解了遍历和以图形方式显示此类树的代码。\n\n在本章中，我们将探索一种重要的专用二叉树：二叉搜索树。搜索树的目标是组织数据，以支持快速访问存储在树中的信息。相对平衡的搜索树，其最大深度与树中节点数量之间呈对数关系，因此，在树中搜索某个特定项所需的操作次数也与树的最大深度呈对数关系。\n\
  \n复杂度受限于最大深度的树搜索算法是非常高效的。\n\n在下一节中，我们将概述搜索树。\n\n## 9.1 概述\n\n搜索树有很多种类型。\n\n我们首先研究的搜索树类型是二叉搜索树。在后面的章节中，我们将探索其他类型的搜索树。\n\
  \n二叉搜索树（BST）是一种特殊类型的二叉树，其中每个节点都包含一个搜索键，并且：\n\n1.  节点 X 中所有小于其键值的键都存储在 X 的左子树中。\n\
  2.  节点 X 中所有大于其键值的键都存储在 X 的右子树中。\n\n这意味着，在搜索树中，我们必须能够比较每个节点的 `Value` 字段。\n\n例如，考虑图\
  \ 9-1 所示的二叉搜索树。这棵树并不平衡，但前面陈述的条件 1 和条件 2 对于树中的每个节点都成立。\n\n![一个 9 节点二叉搜索树的示意图。节点 80\
  \ 分为节点 15 和 95。节点 15 指向节点 10。节点 10 分为节点 5 和 14。节点 14 指向节点 12。节点 95 分为节点 90 和 98。](img/527841_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** 二叉搜索树\n\n### 搜索\n\n搜索二叉搜索树使用一个简单的算法。将要搜索的键与根节点中的键进行比较。如果搜索键较小，则向左下降；如果较大，则向右下降。递归地继续这种模式，直到到达树底，或者找到一个值等于搜索键的节点。\n\
  \n例如，如果我们要在之前展示的树中搜索节点 12，我们将向左下降（到节点 15），再向左下降（到节点 10），再向右下降（到节点 14），最后向左下降到达我们的目标节点\
  \ 12。这需要进行五次比较操作，也就是这棵树的深度。\n\n### 插入\n\n要向搜索树中插入一个节点，我们首先搜索要插入的节点。由于搜索树中不允许存在重复值的节点，因此这会将我们带到树的底部。然后，我们将新节点插入到它原本存在时应该被发现的位置。\n\
  \n对于前面给出的树，如果要插入节点 13，它将被插入为节点 12 的右子节点，因为如果它原本就在树中，它就会在这个位置被发现。\n\n### 有序输出\n\n\
  对此搜索树（以及所有搜索树）进行中序遍历，会产生一个从最小值到最大值的访问序列，即有序输出。尝试对图 9-2 中的树进行此操作，并验证这一事实。\n\n![一个\
  \ 11 节点二叉搜索树的示意图。节点 80 分为节点 15 和 95。节点 15 指向节点 10。节点 10 分为节点 5 和 14。节点 14 指向节点 12。节点\
  \ 12 指向节点 13。节点 95 分为节点 90 和 98。节点 98 指向节点 96。](img/527841_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** 用于中序遍历的二叉搜索树\n\n\n\n### 删除\n\n从搜索树中移除某个键的算法和方法较为复杂。移除后，必须保证得到的仍然是一棵搜索树。\n\
  \n存在三种特殊情况：\n\n1.  待删除的节点是叶节点。\n2.  待删除的节点有一个子节点。\n3.  待删除的节点有两个子节点。\n\n情况 1 最简单。我们找到叶节点的父节点，并将父节点对应的链接（`left`\
  \ 或 `right`）设置为 `nil`，从而有效地将叶节点从树中剪除。\n\n第二种情况（待删除的节点有一个子节点）的处理方式类似于链表删除，如下所示：\n\
  \n假设 `left` 是被删除节点的左子节点，或假设 `right` 是被删除节点的右子节点。\n\n```go\nif node to be deleted\
  \ has one child (left or right):\nif left != nil and parent.left == keyNode:\nparent.left\
  \ = left\nelse if left != nil and parent.right == keyNode:\nparent.right = left\n\
  else if right != nil and parent.left == keyNode:\nparent.left = right\nelse if right\
  \ != nil and parent.right == keyNode:\nparent.right = right\n```\n\n作为练习，请画出这四种情况的示意图，以验证\
  \ `keyNode` 已与其父节点断开连接，并且父节点已重新连接到其孙节点。\n\n第三种情况（待删除的节点有两个子节点）最为复杂。它包含三个步骤：\n\n\
  1.  找到 `keyNode` 的中序后继节点（`keyNode` 右侧最小的节点）。\n2.  将 `successor` 节点中的键复制到 `keyNode`。\n\
  3.  移除 `successor` 节点。\n\n作为练习，请证明 `successor` 节点有零个或一个子节点，因此它的删除属于前面展示的情况 1 或情况\
  \ 2 的删除。\n\n在下一节中，我们将介绍一个通用的二叉搜索树实现。\n\n## 9.2 通用二叉搜索树\n\n我们将介绍一个通用的二叉搜索树实现。我们必须约束泛型类型\
  \ `T`，使其满足两个条件：\n\n1.  存储在树节点中的类型 `T` 的值可以进行比较。\n2.  存储在树节点中的类型 `T` 的值可以使用 `String()`\
  \ 函数转换为字符串。\n\n#### 类型 `OrderedStringer`\n\n我们定义一个约束类型 `OrderedStringer`，使其满足上述两个条件，如下所示：\n\
  \n```go\ntype ordered interface {\n~int | ~float64 | ~string\n}\ntype OrderedStringer\
  \ interface {\nordered\nString() string\n}\n```\n\n要求 1 使用 `ordered` 类型指定。要求 2 使用\
  \ `String()` 函数的签名指定。\n\n通用二叉搜索树的任何实例化都必须使用满足上述 `OrderedStringer` 类型的值类型。我们将在本节稍后部分提供说明此用法的示例。\n\
  \n#### 二叉搜索树所需的泛型类型\n\n清单 9-1 展示了 `binarysearchtree` 包中所需的泛型数据结构。\n\n```go\npackage\
  \ binarysearchtree\nimport (\n\"image/color\"\n\"log\"\n\"fyne.io/fyne/v2\"\n\"\
  fyne.io/fyne/v2/app\"\n\"fyne.io/fyne/v2/canvas\"\n\"fyne.io/fyne/v2/theme\"\n\"\
  github.com/mitchellh/go-homedir\"\n\"gonum.org/v1/plot\"\n\"gonum.org/v1/plot/plotter\"\
  \n\"gonum.org/v1/plot/vg\"\n\"gonum.org/v1/plot/vg/draw\"\n)\ntype ordered interface\
  \ {\n~int | ~float64 | ~string\n}\ntype BinarySearchTree[T OrderedStringer] struct\
  \ {\nRoot *Node[T]\nNumNodes int\n}\ntype Node[T OrderedStringer] struct {\nValue\
  \ T\nLeft *Node[T]\nRight *Node[T]\n}\ntype OrderedStringer interface {\nordered\n\
  String() string\n}\n```\n\n*清单 9-1*  \n`binarysearchtree` 包中的泛型数据结构\n\n类型 `BinarySearchTree`\
  \ 和类型 `Node` 都使用类型为 `OrderedStringer` 的泛型参数 `T` 进行定义。这确保我们能够比较节点值，并在通用树的图形显示中将值输出为字符串。如果我们不使用显示二叉搜索树的函数，则不需要对泛型参数\
  \ `T` 的第二个约束。\n\n#### 二叉搜索树的方法\n\n为类型 `BinarySearchTree` 定义的方法如清单 9-2 所示。\n\n```go\n\
  func (bst *BinarySearchTree[T]) Insert(newValue T) {\nif bst.Search(newValue) ==\
  \ false { // newValue not in existing tree\nn := &Node[T]{newValue, nil, nil}\n\
  if bst.Root == nil { // First value in bst\nbst.Root = &Node[T]{newValue, nil, nil}\n\
  } else {\ninsertNode(bst.Root, n)\n}\nbst.NumNodes += 1\n}\n}\nfunc (bst *BinarySearchTree[T])\
  \ Delete(value T) {\nif bst.Search(value) == true {\ndeleteNode(bst.Root, value)\n\
  bst.NumNodes -= 1\n}\n}\nfunc (bst *BinarySearchTree[T]) Search(value T) bool {\n\
  return search(bst.Root, value)\n}\nfunc (bst *BinarySearchTree[T]) InOrderTraverse(op\
  \ func(T)) {\ninOrderTraverse(bst.Root, op)\n}\nfunc (bst *BinarySearchTree[T])\
  \ Min() *T {\nnode := bst.Root\nif node == nil {\nreturn nil\n}\nfor {\nif node.Left\
  \ == nil {\nreturn &node.Value\n}\nnode = node.Left\n}\n}\nfunc (bst *BinarySearchTree[T])\
  \ Max() (*T, int) { // second return value is height\nnode := bst.Root\nheight :=\
  \ 1\nif node == nil {\nreturn nil, 0\n}\nfor {\nif node.Right == nil {\nreturn &node.Value,\
  \ height\n}\nheight += 1\nnode = node.Right\n}\n}\n```\n\n*清单 9-2*  \n`BinarySearchTree`\
  \ 的方法\n\n#### `Insert`、`Delete` 和中序遍历的讨论\n\n方法 `Insert` 和 `Delete` 要求当前插入的节点不在搜索树中，并且被删除的节点在搜索树中。如果树相对平衡，这种检查会带来轻微的性能损失。\n\
  \n泛型参数约束不出现于任何方法中。编译器可以推断此约束，因为它是在类型 `BinarySearchTree` 中定义的。\n\n方法 `InOrderTraversal`\
  \ 接收一个函数 `op` 作为输入。这代表了在访问二叉搜索树的每个节点时要执行的操作。\n\n#### 辅助函数\n\n清单 9-3 包含辅助函数，这些函数执行清单\
  \ 9-2 中定义的公开可用方法的实际工作。\n\n```go\nfunc insertNodeT OrderedStringer {\nif newNode.Value\
  \ < node.Value {\nif node.Left == nil {\nnode.Left = newNode\n} else {\ninsertNode(node.Left,\
  \ newNode)\n}\n} else {\nif node.Right == nil {\nnode.Right = newNode\n} else {\n\
  insertNode(node.Right, newNode)\n}\n}\n}\nfunc deleteNodeT OrderedStringer *Node[T]\
  \ {\nif node == nil {\nreturn nil\n}\nif value < node.Value {\nnode.Left = deleteNode(node.Left,\
  \ value)\nreturn node\n}\nif value > node.Value {\nnode.Right = deleteNode(node.Right,\
  \ value)\nreturn node\n}\nif node.Left == nil && node.Right == nil {\nnode = nil\n\
  return nil\n}\nif node.Left == nil {\nnode = node.Right\nreturn node\n}\nif node.Right\
  \ == nil {\nnode = node.Left\nreturn node\n}\nLeftmostRightside := node.Right\n\
  for {\n//find smallest value on the Right side\nif LeftmostRightside != nil && LeftmostRightside.Left\
  \ != nil {\nLeftmostRightside = LeftmostRightside.Left\n} else {\nbreak\n}\n}\n\
  node.Value = LeftmostRightside.Value\nnode.Right = deleteNode(node.Right, node.Value)\n\
  return node\n}\nfunc searchT OrderedStringer bool {\nif n == nil {\nreturn false\n\
  }\nif value < n.Value {\nreturn search(n.Left, value)\n}\nif value > n.Value {\n\
  return search(n.Right, value)\n}\nreturn true\n}\nfunc inOrderTraverseT OrderedStringer)\
  \ {\nif n != nil {\ninOrderTraverse(n.Left, op)\nop(n.Value)\ninOrderTraverse(n.Right,\
  \ op)\n}\n}\n```\n\n*清单 9-3*  \n用于实现方法的辅助函数\n\n这些辅助函数中的每一个都需要显式指定泛型类型约束，因为编译器无法从函数签名中推断出此约束。\n\
  \n清单 9-3 中展示的辅助函数是相对简单的递归函数，它们执行指示的任务。验证此点留作读者的练习。\n\n\n\n\n### 树形图实现\n\n清单 9-4\
  \ 展示了显示二叉搜索树所需的代码。\n\n```go\ntype NodePair struct {\n\tVal1, Val2 string\n}\ntype\
  \ NodePos struct {\n\tVal  string\n\tYPos int\n\tXPos int\n}\nvar data []NodePos\n\
