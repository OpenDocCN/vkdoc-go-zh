  \        time.Sleep(time.Duration(rand.Intn(500) + 500)\n            * time.Millisecond)\n\
  \    }\n}\nfunc (mackerel Mackerel) Starve() bool {\n    return mackerel.starv <=\
  \ 0\n}\nfunc (mackerel Mackerel) LifeOver() bool {\n    return mackerel.life <=\
  \ 0\n}\nfunc (mackerel *Mackerel) Reproduce(l Location) {\n    if mackerel.x ==\
  \ -1 {\n        return\n    }\n    if mackerel.repro <= 0 {\n        newMackerel\
  \ := new(Mackerel)\n        newMackerel.repro = MACKERELREPRO\n        newMackerel.starv\
  \ = MACKERELSTARVE\n        newMackerel.life = MACKERELLIFE\n        newMackerel.x\
  \ = mackerel.x\n        newMackerel.y = mackerel.y\n        locations[mackerel.y][mackerel.x].critter\
  \ =\n            newMackerel\n        go newMackerel.Move()\n    } else {\n    \
  \    locations[mackerel.y][mackerel.x].critter = nil\n    }\n    mackerel.x = l.x\
  \ // 将鲭鱼分配到新位置\n    mackerel.y = l.y\n    // 将鲭鱼添加到新位置\n    locations[l.y][l.x].critter\
  \ = mackerel\n}\n```\n\n### 代码讨论\n\n鲭鱼的 `Move` 方法将指向 `Mackerel` 的指针作为方法的接收者。这是必需的，因为\
  \ `mackerel` 接收者的内部数据可能会被修改。\n\n在定义连续移动的 for 循环中，如果 `mackerel` 对象的 `x` 坐标为 -1，我们跳出循环，从而终止该方法。此方法将在其他地方被定义为一个\
  \ goroutine。\n\n我们锁定互斥锁，以防止在此 goroutine 之外更改全局的 `locations` 矩阵。我们递减 `repro`、`starv`\
  \ 和 `life` 三个字段。\n\n如果 `Starve()` 或 `LifeOver()` 中的任何一个为真，我们将该鲭鱼对象从海洋中清除（在相应的 `location[mackerel.y][mackerel.x]`\
  \ 处将其 `critter` 值设为 `nil`）。通过将该死亡鲭鱼对象的 `x` 和 `y` 值设为 -1 来终止其 goroutine。我们解锁互斥锁。\n\
  \n如果找到了一个空的目标位置，我们将移动信息输出到控制台，并将 `newLoc` 传递给 `Reproduce` 方法。我们解锁互斥锁。我们使用随机休眠间隔暂停\
  \ goroutine 循环。\n\n`Reproduce` 方法使用指针接收者，因为接收者的内部数据可能会被修改。\n\n如果 `repro` 值小于或等于零，我们使用定义初始字段值\
  \ `repro`、`starv` 和 `life` 的全局常量创建一个新的鲭鱼对象。我们将新的鲭鱼对象分配给 `Location` 的 `critter` 字段，并将其\
  \ `x` 和 `y` 值设置为繁殖鲭鱼腾出的位置。\n\n如果 `repro` 值大于 1，我们将腾出的位置的 critter 值设为 `nil`。\n\n\
  最后，我们将鲭鱼的 `x` 和 `y` 坐标设置为新位置。\n\n\n\n### 鲨鱼的移动方法\n\n接下来我们展示 `Shark` 的 `Move` 方法的实现。\n\
  \n```go\nfunc (shark *Shark) Move() {\n\tfor ; quit == false; {\n\t\tif shark.x\
  \ == -1 { // 鲨鱼已死亡\n\t\t\tbreak\n\t\t}\n\t\tmutex.Lock()\n\t\tshark.repro -= 1\n\
  \t\tshark.starv -= 1\n\t\tshark.life -= 1\n\t\tif shark.LifeOver() || shark.Starve()\
  \ {\n\t\t\tlocations[shark.y][shark.x].critter = nil\n\t\t\tshark.x = -1\n\t\t\t\
  shark.y = -1\n\t\t\tmutex.Unlock()\n\t\t\tbreak\n\t\t}\n\t\t// 寻找相邻的金枪鱼\n\t\tfound,\
  \ newLoc := findRandomCritter(shark.x,\n\t\t\tshark.y, new(Tuna))\n\t\tif found\
  \ == true {\n\t\t\tfmt.Printf(\"\\nShark Move from  to\n\", shark.x, shark.y, newLoc.x,\n\
  \t\t\t\tnewLoc.y)\n\t\t\tshark.starv = SHARKSTARVE\n\t\t\t// 类型断言\n\t\t\teatenTuna\
  \ := locations[newLoc.y][newLoc.x].critter.(*Tuna)\n\t\t\t// 必须停止被吃金枪鱼的 goroutine\n\
  \t\t\teatenTuna.x = -1\n\t\t\teatenTuna.y = -1\n\t\t\tfmt.Printf(\"\\nEaten tuna\
  \ = %v\", eatenTuna)\n\t\t\tshark.Reproduce(newLoc)\n\t\t} else {\n\t\t\tfound,\
  \ newLoc = findRandomCritter(shark.x,\n\t\t\t\tshark.y, nil)\n\t\t\tif found ==\
  \ true {\n\t\t\t\tfmt.Printf(\"\\nShark Move from \nto \", shark.x,\n\t\t\t\t\t\
  shark.y, newLoc.x, newLoc.y)\n\t\t\t\tshark.Reproduce(newLoc)\n\t\t\t}\n\t\t}\n\t\
  \tmutex.Unlock()\n\t\ttime.Sleep(time.Duration(rand.Intn(500)+500) *\n\t\t\ttime.Millisecond)\n\
  \t}\n}\n```\n\n### 代码讨论\n\n`Shark` 的 `Move` 方法大部分实现细节与 `Mackerel` 相同。唯一的区别在于鲨鱼会首先寻找相邻的金枪鱼作为食物。\n\
  \n这里我们遇到了**类型断言**。让我们仔细看看。\n\n我们调用 `findRandomCritter` 方法如下，将 `new(Tuna)` 作为第三个参数传递：\n\
  \n```go\nfound, newLoc := findRandomCritter(shark.x, shark.y,\n\tnew(Tuna))\n```\n\
  \n如果 `found` 为 true，我们将 `starv` 值重置为初始值 `SHARKSTARVE`。然后按如下方式赋值变量 `eatenTuna`：\n\
  \n```go\n// 类型断言\neatenTuna := locations[newLoc.y][newLoc.x].critter.(*Tuna)\n```\n\
  \n这个类型断言断言了 `locations[newLoc.y][newLoc.x]` 的类型是 `Tuna`。\n\n由于断言成立，我们可以将 `eatenTuna`\
  \ 视为已被定义为 `Tuna` 类型。\n\n通过将 `eatenTuna` 的 `x` 和 `y` 值设为 -1，我们有效地终止了被吃掉的 `Tuna` 对象的\
  \ goroutine。\n\n当我们需要依据一个形式类型为接口的对象的实际类型进行相应操作时，这类类型断言非常有用。\n\n要使此操作生效，`Tuna` 类型必须实现\
  \ `MarineLife` 接口。它确实实现了！\n\n`Shark` 类型实现的 `MarineLife` 接口的其他三个方法与此相同。\n\n### 金枪鱼的移动方法\n\
  \n`Tuna` 类的 `Move` 方法与上面描述的 `Shark` 的 `Move` 方法本质上是相同的。\n\n```go\nfunc (tuna *Tuna)\
