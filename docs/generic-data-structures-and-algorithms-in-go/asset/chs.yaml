  \n在下一节中，我们将概述这个模拟。\n\n\n## 14.1 概述\n\n本章通过一个捕食者/猎物模型来呈现一种有趣的涌现计算，该模型模拟了一个简单生态系统的种群动态。其设计运用了并发机制。\n\
