  var endPoints []nodePair    // 用于绘制线条\n代码清单 8-1\n绘制二叉树的核心数据结构\n```\n\n### 二叉树结构\n\
  \n`BinaryTree` 被定义为一个结构体，包含一个指向 `Node` 的指针类型字段 `Root`，以及一个 `int` 类型字段 `NumNodes`。\n\
