  \n## 2.1 描述算法的速度效率\n\n确定算法效率的常规做法是以渐进方式估算其性能与问题规模的函数关系。也就是说，我们关注的是当问题规模变大时的计算速度。本节将介绍大\
  \ O 表示法及其在算法设计中的应用。\n\n### 理解大 O\n\n**大 O** 表示法描述了当问题规模变大时，算法执行时间随问题规模增长的特征。它基于对执行任务所需的基本操作数量（如赋值、交换和访问值）的分析。由于问题规模必须足够大这一要求，大\
  \ O 是一种渐进性能指标。\n\n例如，假设我们能够将某个算法的运行时间描述为问题规模 `n` 的函数：`execution-time(n) = 12n² +\
  \ 117n +25`。\n\n当 `n` 较大时，上述表达式中的第一项占主导地位。我们忽略常数 12，重点关注 `n²`。这使我们将该算法描述为 `O(n²)`。对于较大的\
  \ `n`，如果将 `n` 的值加倍，执行时间将变为原来的四倍。如果 `n` 较小，这一关系则不成立。\n\n大 O 提供的是一个渐进上界。对于较大的 `n`（问题规模），实际性能受限于\
  \ O 表示法内的函数。因此，`O(n)` 意味着对于较大的 `n`，算法的执行时间受限于 `n`，即与 `n` 呈线性关系。\n\n具有 `O(2ⁿ)`（指数复杂度）的算法是难以处理的。同样，`O(n!)`\
  \ 的算法也是难以处理的。随着问题规模 `n` 变大，计算时间将变得过大，无法在合理时间内完成。本书后续将探讨并处理计算上难以处理的问题。\n\n现在我们回到计算上可行的问题，考虑以下示例：我们希望判断一个浮点数数组切片是否按从小到大的顺序排列。\n\
  \n\n\n### 判断数字切片是否已排序\n\n解决这个问题的一种方法是使用`sort`包中的`Sort`函数，然后将结果数组切片与我们想要测试的数组切片进行比较。这是我见过许多经验不足的程序员采用的方法。\n\
  \n执行此操作的函数如下所示：\n\n```\nfunc isSorted1(data []float64) bool {\n    var data1 []float64\n\
  \    data1 = make([]float64, len(data)) // 创建一个长度为 len(data) 的切片\n    copy(data1,\
