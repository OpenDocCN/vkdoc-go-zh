  \t   这意味着将第二个位置上的城市移动到第一个位置。\n\t   考虑路径 [0, 3, 2, 1, 5, 4] 且 first = 1 和 second\
  \ = 4\n\t   新路径将为 [0, 5, 3, 2, 1, 4]\n\t*/\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\
  \tsecondIndex := randomFrom(1, len(tour)-1)\n\tfor firstIndex == secondIndex {\n\
