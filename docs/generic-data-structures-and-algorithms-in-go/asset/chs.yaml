  }\n```\n\n代码清单 6-14 – `doublylinkedlist` 包\n\n如果将这个双向链表的实现细节与之前单向链表的细节进行比较，我们会看到多个赋值语句，这些语句将正在添加的节点链接到它前面的节点。当链表只包含一个节点时，`first`\
  \ 和 `last` 指针是相同的。\n\n我们详细考察 `InsertAt` 方法。这是所有方法中最复杂的一个。其他方法的工作方式类似。\n\n```\nfunc\
  \ (list *List[T]) InsertAt(index int, item T) error {\n    // 将元素添加到链表中指定索引位置的新节点\n\
  \    if index < 0 || index > list.numberItems {\n        return fmt.Errorf(\"Index\
  \ out of bounds error\")\n    }\n    newNode := Node[T]{item, nil, nil}\n    if\
  \ index == 0 {\n        newNode.next = list.first\n        if list.first != nil\
  \ {\n            list.first.prev = &newNode\n        }\n        list.first = &newNode\n\
  \        list.numberItems += 1\n        if list.numberItems == 1 {\n           \
  \ list.last = list.first\n        }\n        return nil // 无错误\n    }\n    node\
  \ := list.first\n    count := 0\n    previous := node\n    for count < index {\n\
  \        previous = node\n        count++\n        node = node.next\n    }\n   \
  \ newNode.next = node\n    previous.next = &newNode\n    node.prev = &newNode\n\
  \    newNode.prev = previous\n    list.numberItems += 1\n    return nil // 无错误\n\
  }\n```\n\n在验证传入的索引值未超出范围后，我们创建一个包含元素且前后指针均指向 nil 的 `newNode`。\n\n我们首先考虑索引为 0 的情况。这种情况下，我们将\
  \ `newNode.next` 链接到现有的 `list.first`，即使它为 nil（空链表）。然后我们将 `list.first` 设置为 `newNode`\
  \ 并递增 `list.numberItems`。如果元素数量为 1，我们将 `list.last` 赋值为 `list.first`，因为它们此时指向同一个节点。我们返回\
  \ nil 表示无错误。\n\n当 `index` 不为 0 时，我们将局部变量 `node` 赋值为 `list.first`，局部变量 `count` 赋值为\
  \ 0，局部变量 `previous` 赋值为 `node`。\n\n在一个运行到 `count` 等于 `index` 的 for 循环中，我们将 `previous`\
  \ 设置为 `node`，递增 `count`，并将 `node` 前进为 `node.next`。\n\n在循环下方，找到了插入 `newNode` 的位置后，我们执行插入操作：将\
  \ `newNode.next` 设置为 `node`，将 `previous.next` 设置为 `&newNode`，将 `node.prev` 设置为 `&newNode`，将\
  \ `newNode.prev` 设置为 `previous`，并递增 `list.numberItems`。\n\n### 双向链接的优势\n\n你可能会想，考虑到构建和维护双向链表所需的额外复杂性，双向链接的优势到底是什么？\n\
  \n最重要的优势是能够反向遍历链表，即从尾部到头部。虽然使用单向链表也可以实现这一点，但计算代价会很高。\n\n## 总结\n\n在本章中，我们介绍了几种重要且实用的通用数据结构，包括\
  \ `Queue`、`Deque`、`PriorityQueue`，以及单向链表和双向链表。我们还展示了一些利用这些通用数据结构的应用。\n\n在下一章中，我们将介绍哈希表结构以及一些使用该结构的应用。\n\
