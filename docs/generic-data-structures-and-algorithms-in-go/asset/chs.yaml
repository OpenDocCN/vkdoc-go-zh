  \ 树和并发 AVL 树实现集合\n\n集合通常使用**map**来实现。清单 10-4 展示了一个集合的几个重要方法。\n\n```go\nfunc NewSet()\
  \ *Set {\n\treturn &Set{\n\t\tcontainer: make(map[float64]struct{}),\n\t}\n}\n\n\
  type Set struct {\n\tcontainer map[float64]struct{}\n}\n\nfunc (c *Set) IsPresent(key\
  \ float64) bool {\n\t_, present := c.container[key]\n\treturn present\n}\n\nfunc\
  \ (c *Set) Add(key float64) {\n\tc.container[key] = struct{}{}\n}\n\nfunc (c *Set)\
  \ Remove(key float64) error {\n\t_, present := c.container[key]\n\tif !present {\n\
  \t\treturn fmt.Errorf(\"Remove Error: Item doesn't exist in set\")\n\t}\n\tdelete(c.container,\
  \ key)\n\treturn nil\n}\n\nfunc (c *Set) Size() int {\n\treturn len(c.container)\n\
  }\n```\n\n*清单 10-4：使用 map 实现的集合*\n\n在清单 10-4 中，我们假设集合元素的基类型是 `float64`。map 结构将一个空的\
  \ `struct{}` 与每个 `float64` 键值关联起来。这里，我们只关心 map 中键值对的键。\n\n众所周知，**map** 对其成员的访问速度很快。我们希望将此\
  \ map 实现的集合与 AVL 树的性能进行比较。接着，我们定义一个并发 AVL 集合，它会并发地构建多个 AVL 树，并将其性能与 map 和单 AVL 树实现进行比较。\n\
  \n### 使用 Map、AVL 树和并发 AVL 树实现集合\n\n清单 10-5 展示了一个 `floatset` 包，其中包含了集合的 map、AVL 树和并发\
  \ AVL 树实现。为了节省篇幅，我们跳过了 AVL 树的实现细节，因为前面已经介绍过了。\n\n```go\npackage floatset\n\nimport\
  \ (\n\t\"fmt\"\n\t\"sort\"\n\t\"sync\"\n)\n\nconst (\n\tConcurrent = 32\n)\n\nvar\
  \ max [Concurrent]float64 // 存储每棵 AVL 树中的最大值\n\nfunc NewSet() *Set { // 创建一个新的 Set\n\
  \treturn &Set{\n\t\tcontainer: make(map[float64]struct{}),\n\t}\n}\n\ntype Set struct\
  \ {\n\tcontainer map[float64]struct{}\n}\n\nfunc (c *Set) IsPresent(key float64)\
  \ bool {\n\t_, present := c.container[key]\n\treturn present\n}\n\nfunc (c *Set)\
  \ Add(key float64) {\n\tc.container[key] = struct{}{}\n}\n\nfunc (c *Set) Remove(key\
  \ float64) error {\n\t_, present := c.container[key]\n\tif !present {\n\t\treturn\
  \ fmt.Errorf(\"Remove Error: Item doesn't exist in set\")\n\t}\n\tdelete(c.container,\
  \ key)\n\treturn nil\n}\n\nfunc (c *Set) Size() int {\n\treturn len(c.container)\n\
  }\n\n// 跳过 AVL 树细节\n\nvar concurrrentSet [Concurrent]AVLTree // AVL 树切片\n\nfunc\
  \ BuildConcurrentSet(dataSet []float64) {\n\t// 使用并发处理来构建并发 AVL 树\n\tvar wg sync.WaitGroup\n\
  \tsort.Float64s(dataSet)\n\tsegment := len(dataSet) / Concurrent\n\tfor treeNumber\
  \ := 0; treeNumber < Concurrent; treeNumber++ {\n\t\twg.Add(1)\n\t\tgo func(num\
  \ int) {\n\t\t\tdefer wg.Done()\n\t\t\tstartVal := segment * num\n\t\t\tfor j :=\
  \ startVal; j < startVal+segment; j++ {\n\t\t\t\tconcurrrentSet[num].Insert(dataSet[j])\n\
  \t\t\t}\n\t\t\tmax[num] = dataSet[startVal+segment-1]\n\t\t}(treeNumber)\n\t}\n\t\
  wg.Wait()\n}\n\nfunc IsPresent(val float64) bool {\n\t// 确定 val 属于哪一棵 AVL 树\n\t\
  treeNumber := 0\n\tfor ; treeNumber < len(max); treeNumber++ {\n\t\tif val <= max[treeNumber]\
  \ {\n\t\t\tbreak\n\t\t}\n\t}\n\treturn concurrrentSet[treeNumber].Search(val)\n\
  }\n```\n\n*清单 10-5：`floatset` 包*\n\n### 并发 AVL 集合的解释\n\n常量 `Concurrent`（本例中为 32）定义了并发构建的\
  \ AVL 树的数量。`concurrentSet` 变量存储了一个 `AVLTree` 数组。\n\n首先，我们对传入的 `dataSet` 切片进行排序。然后通过将\
  \ `dataSet` 的长度除以并发树的数量，计算出每棵 AVL 树中的节点数 `segment`。\n\n在遍历树编号的循环中，我们调用多个 goroutine，每个\
  \ goroutine 从传入的 `dataSet` 切片中插入已排序的值。通过等待组（WaitGroup）确保在退出此函数之前，每棵并发构建的 AVL 树都已经完成。\n\
  \n全局 `max` 数组存储了每棵 AVL 树中的最大值。由于 `max` 数组中的索引对每个 goroutine（传入的树编号）是唯一的，因此 goroutine\
  \ 在赋值给 `max` 时不会发生冲突。\n\n函数 `IsPresent` 首先通过将传入的 `val` 与 `max` 数组中存储的每棵 AVL 树的最大值进行比较，来确定该值属于哪棵\
  \ AVL 树。确定之后，该函数将返回在正确的树编号上调用 `Search` 方法的结果。\n\n### 比较三种集合实现\n\n清单 10-6 是一个驱动程序，用于执行比较集合构建时间以及（最重要的）判断值是否存在的耗时实验。为此，我们会访问数据集中的每一个元素，并判断它是否存在于我们正在计时的集合类型中。\n\
