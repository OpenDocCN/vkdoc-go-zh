  ## 5.8 本章小结\n\n在本章中，我们展示了泛型栈的两种实现。接着，我们介绍了几种栈的应用，包括代数函数求值、十进制转二进制以及寻找穿过迷宫的路径。\n\n\
  在下一章，我们将重点讨论队列和列表数据结构。\n\n"
- "# 6. 队列与列表\n\n**队列**是另一种相对简单的数据类型。它在应用开发中有许多实际用途。\n\n队列以先进先出（FIFO）的方式组织数据。由于 FIFO\
  \ 的特性，其最明显的应用是模拟等待队列。这可以是等待服务的顾客队列、在打印队列中等待的打印作业、等待 CPU 访问权的并发进程，以及其他许多需要排队等待的应用。新项目被插入到队列的尾部，项目则从队列的头部移除。队列维护了项目插入的顺序。\n\
  \n在本章中，我们介绍**队列**的两种实现，并比较它们的效率。我们还介绍**队列**的几种应用。\n\n**双端队列**比**队列**更通用。它允许在结构的前部以及后部进行插入和删除操作。我们介绍**双端队列**的一种实现以及使用**双端队列**的一个应用。\n\
  \n**优先队列**是**队列**的一个特殊类型。我们展示了**优先队列**的一种实现以及一个涉及航空公司乘客的应用。\n\n**列表**是一种比**队列**更通用的数据类型。项目可以插入到列表的前部、尾部或中间任何位置。我们介绍了单向链表和双向链表的实现。\n\
  \n在下一节中，我们将定义队列抽象数据类型（ADT）。\n\n## 6.1 队列 ADT\n\n队列 ADT 由以下六种操作定义。\n\n| `Insert(item)`\
  \ – 向队列添加项目 |\n| `Remove()` item – 移除并返回队列中第一个插入的项目 |\n| `First()` item – 访问队列中第一个插入的项目，不修改队列\
  \ |\n| `Size` int – 返回队列中的项目数量 |\n| `Range()` – 返回一个迭代器 |\n| `Empty()` – 返回一个布尔值，如果其应用的迭代器没有项目则返回\
  \ true |\n| `Next()` – 返回迭代器中的下一个项目 |\n\n我们介绍**队列**的两种实现：基于切片和基于节点。在下一节中，我们将重点介绍基于切片的队列实现。\n\
  \n\n\n## 6.2 切片队列的实现\n\n代码清单 6-1 展示了 `slicequeue` 包中 `Queue` 的通用切片实现。\n\n`Queue`\
  \ 结构体包含一个字段 `items`，它是一个泛型类型 `T` 的切片。\n\n```go\npackage slicequeue\n\ntype Queue[T\
  \ any] struct {\n    items []T\n}\n\ntype Iterator[T any] struct {\n    next  int\
  \ // items 中的索引\n    items []T\n}\n\n// Queue 方法\nfunc (queue *Queue[T]) Insert(item\
  \ T) {\n    // 将 item 添加到切片的最右侧位置\n    queue.items = append(queue.items, item)\n\
  }\n\nfunc (queue *Queue[T]) Remove() T {\n    returnValue := queue.items[0]\n  \
  \  queue.items = queue.items[1:]\n    return returnValue\n}\n\nfunc (queue Queue[T])\
  \ First() T {\n    return queue.items[0]\n}\n\nfunc (queue Queue[T]) Size() int\
  \ {\n    return len(queue.items)\n}\n\nfunc (queue *Queue[T]) Range() Iterator[T]\
  \ {\n    return Iterator[T]{0, queue.items}\n}\n\n// Iterator 方法\nfunc (iterator\
  \ *Iterator[T]) Empty() bool {\n    return iterator.next == len(iterator.items)\n\
  }\n\nfunc (iterator *Iterator[T]) Next() T {\n    returnValue := iterator.items[iterator.next]\n\
  \    iterator.next++\n    return returnValue\n}\n代码清单 6-1\nQueue 的通用切片实现\n```\n\n\
  `Queue` 的 FIFO（先进先出）协议通过将新项插入到 `items` 切片的最右侧位置，并从 `items` 切片的最左侧位置（索引 0）移除项来实现。\n\
  \n### 迭代器\n\n`Iterator` 类型是一个包含索引 `next` 和 `items` 切片的结构体。\n\n如果迭代器字段 `next` 等于\
  \ `items` 切片的长度，则 `Iterator` 上的 `Empty` 方法返回 `true`。\n\n`Iterator` 上的 `Next` 方法返回\
  \ `items` 切片中索引 `next` 处的值 `T`。\n\n`Queue` 上的 `Range` 方法返回一个 `Iterator`。\n\n代码清单\
  \ 6-2 展示了一个简单的主驱动程序，它对一个泛型队列进行了操作。\n\n```go\npackage main\n\nimport (\n    \"fmt\"\
  \n    \"example.com/slicequeue\"\n)\n\nfunc main() {\n    myQueue := slicequeue.Queue[int]{}\n\
  \    myQueue.Insert(15)\n    myQueue.Insert(20)\n    myQueue.Insert(30)\n    myQueue.Remove()\n\
  \    fmt.Println(myQueue.First())\n\n    queue := slicequeue.Queue[float64]{}\n\
  \    for i := 0; i < 10; i++ {\n        queue.Insert(float64(i))\n    }\n    iterator\
  \ := queue.Range()\n    for {\n        if iterator.Empty() {\n            break\n\
  \        }\n        fmt.Println(iterator.Next())\n    }\n    fmt.Println(\"queue.First()\
  \ = \", queue.First())\n}\n\n/* 输出\n\nqueue.First() =  0\n*/\n代码清单 6-2\n泛型队列的驱动程序\n\
  ```\n\n导入了 `slicequeue` 包。定义并操作了一个类型为 `int` 的队列和另一个类型为 `float64` 的队列。需要注意的是，当构造\
  \ `float64` 队列并使用迭代器显示其值时，队列的状态并未改变。\n\n在下一节中，我们将介绍基于节点的 `Queue` 实现。\n\n## 6.3 节点队列的实现\n\
  \n代码清单 6-3 展示了 `Queue` 的节点实现。\n\n```go\npackage nodequeue\n\ntype Node[T any] struct\
  \ {\n    item T\n    next *Node[T]\n}\n\ntype Queue[T any] struct {\n    first,\
  \ last *Node[T]\n    length      int\n}\n\ntype Iterator[T any] struct {\n    next\
  \ *Node[T]\n}\n\n// 方法\nfunc (queue *Queue[T]) Insert(item T) {\n    newNode :=\
  \ &Node[T]{item, nil}\n    if queue.first == nil {\n        queue.first = newNode\n\
  \        queue.last = queue.first\n    } else {\n        queue.last.next = newNode\n\
  \        queue.last = newNode\n    }\n    queue.length += 1\n}\n\nfunc (queue *Queue[T])\
  \ Remove() T {\n    returnValue := queue.first.item\n    queue.first = queue.first.next\n\
  \    if queue.first == nil {\n        queue.last = nil\n    }\n    return returnValue\n\
  }\n\nfunc (queue Queue[T]) First() T {\n    return queue.first.item\n}\n\nfunc (queue\
  \ Queue[T]) Size() int {\n    return queue.length\n}\n\nfunc (queue *Queue[T]) Range()\
  \ Iterator[T] {\n    return Iterator[T]{queue.first}\n}\n\nfunc (iterator *Iterator[T])\
  \ Empty() bool {\n    return iterator.next == nil\n}\n\nfunc (iterator *Iterator[T])\
  \ Next() T {\n    returnValue := iterator.next.item\n    if iterator.next != nil\
  \ {\n        iterator.next = iterator.next.next\n    }\n    return returnValue\n\
  }\n代码清单 6-3\nQueue 的通用节点实现\n```\n\n定义了一个泛型 `Node` 类型，其中包含一个类型为 `T` 的 `item` 字段和一个指向\
  \ `Node` 的指针 `next` 字段。这种递归结构与我们在 `nodestack` 中定义节点时所做的类似。\n\n`Queue` 类型是一个包含两个指向\
  \ `Node` 的指针 `first` 和 `last` 的结构体。它们分别指向队列的开头和结尾。\n\n`Insert` 方法会在队列为空时创建一个 `first`\
  \ 值，并将 `last` 设置为等于 `first`。如果队列已有一个非空（非 nil）的 `first` 值，则会将当前的 `last` 值链接到新节点，并用指向这个新节点的指针替换\
  \ `last`。`first` 值不受影响。\n\n`Remove` 方法返回 `first` 节点中的 `item`，并将 `first` 重置为它的 `first.next`\
  \ 链接。如果 `first` 变为 nil，那么 `last` 字段也会被设置为 nil；否则，它不受影响。\n\n`Iterator` 是一个包含 `next`\
  \ 字段的结构体，该字段指向一个 `Node`。\n\n`Range` 方法返回一个 `Iterator`，其包含的 `next` 字段指向队列中的第一个项（`first`）。\n\
  \n如果 `next` 字段指向 nil，则 `Iterator` 上的 `Empty` 方法返回 `true`；否则返回 `false`。\n\n最后，`Iterator`\
  \ 上的 `Next` 方法返回 `next` 节点中的值，并将字段 `iterator.next` 前进到 `iterator.next.next` 链接。\n\
  \n一个用于操作 `queuenode` 的主驱动程序和代码清单 6-2 中的程序相同，只是使用的包是 `example.com/nodequeue`。\n\n\
  在下一节中，我们将比较基于切片的 `Queue` 和基于节点的 `Queue` 的性能。\n\n## 6.4 比较切片队列和节点队列的性能\n\n代码清单 6-4\
  \ 展示了一个程序，用于比较从 `slicequeue` 和 `nodequeue` 中插入和移除项的执行时间。\n\n```go\n// 我们比较 slicequeue\
  \ 和 nodequeue 的性能\npackage main\n\nimport (\n    \"fmt\"\n    \"example.com/nodequeue\"\
  \n    \"example.com/slicequeue\"\n    \"time\"\n)\n\nconst size = 1_000_000\n\n\
  func main() {\n    sliceQueue := slicequeue.Queue[int]{}\n    nodeQueue := nodequeue.Queue[int]{}\n\
  \n    start := time.Now()\n    for i := 0; i < size; i++ {\n        sliceQueue.Insert(i)\n\
  \    }\n    elapsed := time.Since(start)\n    fmt.Println(\"在 sliceQueue 中插入 100\
  \ 万个整型数的时间为\", elapsed)\n\n    start = time.Now()\n    for i := 0; i < size; i++\
  \ {\n        nodeQueue.Insert(i)\n    }\n    elapsed = time.Since(start)\n    fmt.Println(\"\
  在 nodeQueue 中插入 100 万个整型数的时间为\", elapsed)\n\n    start = time.Now()\n    for i :=\
  \ 0; i < size; i++ {\n        sliceQueue.Remove()\n    }\n    elapsed = time.Since(start)\n\
  \    fmt.Println(\"从 sliceQueue 中移除 100 万个整型数的时间为\", elapsed)\n\n    start = time.Now()\n\
  \    for i := 0; i < size; i++ {\n        nodeQueue.Remove()\n    }\n    elapsed\
  \ = time.Since(start)\n    fmt.Println(\"从 nodeQueue 中移除 100 万个整型数的时间为\", elapsed)\n\
  }\n\n/* 输出\n在 sliceQueue 中插入 100 万个整型数的时间为 18.841914ms\n在 nodeQueue 中插入 100 万个整型数的时间为\
  \ 30.275662ms\n从 sliceQueue 中移除 100 万个整型数的时间为 1.413447ms\n从 nodeQueue 中移除 100 万个整型数的时间为\
  \ 2.818313ms\n*/\n代码清单 6-4\n对 slicequeue 和 nodequeue 进行性能基准测试\n```\n\n正如预期，切片队列明显比节点队列快，这是因为基于节点的队列中存在与指针访问相关的开销。\n\
  \n在下一节中，我们将介绍并实现 `Deque` 数据结构。\n\n\n\n## 6.5 双端队列\n\n`Deque`（双端队列）是一种允许在结构的前端或后端插入或删除元素的队列。\n\
  \n代码清单 6-5 展示了泛型 `Deque` 的一个切片实现。\n\n```go\npackage deque\ntype Deque[T any] struct\
  \ {\nitems []T\n}\nfunc (deque *Deque[T]) InsertFront(item T) {\ndeque.items = append(deque.items,\
  \ item) // 扩展 deque.items\nfor i := len(deque.items) - 1; i > 0 ; i-- {\ndeque.items[i]\
  \ = deque.items[i - 1]\n}\ndeque.items[0] = item\n}\nfunc (deque *Deque[T]) InsertBack(item\
  \ T) {\ndeque.items = append(deque.items, item)\n}\nfunc (deque *Deque[T]) First()\
  \ T {\nreturn deque.items[0]\n}\nfunc (deque *Deque[T]) RemoveFirst() T {\nreturnValue\
  \ := deque.items[0]\ndeque.items = deque.items[1:]\nreturn returnValue\n}\nfunc\
  \ (deque *Deque[T]) Last() T {\nreturn deque.items[len(deque.items) - 1]\n}\nfunc\
  \ (deque *Deque[T]) RemoveLast() T {\nlength := len(deque.items)\nreturnValue :=\
  \ deque.items[length - 1]\ndeque.items = deque.items[:(length - 1)]\nreturn returnValue\n\
  }\nfunc (deque *Deque[T]) Empty() bool {\nreturn len(deque.items) == 0\n}\n代码清单\
  \ 6-5\nDeque 的泛型切片实现\n```\n\n代码清单 6-6 展示了一个使用 `Deque` 的简单驱动程序。\n\n```go\npackage\
  \ main\nimport (\n\"fmt\"\n\"example.com/deque\"\n)\nfunc main() {\nmyDeque := deque.Deque[int]{}\n\
  myDeque.InsertFront(5)\nmyDeque.InsertBack(10)\nmyDeque.InsertFront(2)\nmyDeque.InsertBack(12)\
  \ // 2 5 10 12\nfmt.Println(\"myDeque.First() = \", myDeque.First())\nfmt.Println(\"\
  myDeque.Last() = \", myDeque.Last())\nmyDeque.RemoveLast()\nmyDeque.RemoveFirst()\n\
  fmt.Println(\"myDeque.First() = \", myDeque.First())\nfmt.Println(\"myDeque.Last()\
  \ = \", myDeque.Last())\n}\n/* 输出\nmyDeque.First() =  2\nmyDeque.Last() =  12\n\
  myDeque.First() =  5\nmyDeque.Last() =  10\n*/\n代码清单 6-6\n操作 Deque\n```\n\n在下一节中，我们将介绍一个使用\
  \ `Deque` 的应用程序。\n\n## 6.6 Deque 应用\n\n给定一个数组和一个整数 `k`，找出每个大小为 `k` 的连续子数组中的最大值。\n\
  \n例如，考虑以下问题：\n\n输入数组：`input := []int{9, 1, 1, 0, 0, 0, 1, 0, 6, 8}`，其中 `k = 3`\n\
  \n- `9, 1, 1` 的最大值是 `9`。\n- `1, 1, 0` 的最大值是 `1`。\n- `1, 0, 0` 的最大值是 `1`。\n- `0,\
  \ 0, 0` 的最大值是 `0`。\n- `0, 0, 1` 的最大值是 `1`。\n- …\n\n因此输出为 `[9 1 1 0 1 1 6 8]`。\n\n\
  代码清单 6-7 展示了该问题的一个简单暴力求解方案。\n\n```go\npackage main\nimport (\n\"fmt\"\n)\nfunc MaxSubarray(input\
  \ []int, k int) (output []int) {\nfor first := 0; first < len(input)-k+1; first++\
  \ {\nmax := input[first]\nfor second := 1; second < k; second++ {\nif input[first+second]\
  \ > max {\nmax = input[first+second]\n}\n}\noutput = append(output, max)\n}\nreturn\
  \ output\n}\nfunc main() {\ninput := []int{3, 1, 6, 4, 2, 10, 5, 9}\noutput := MaxSubarray(input,\
  \ 3)\nfmt.Println(\"Output = \", output)\n}\n/* 输出\nOutput =  [6 6 6 10 10 10]\n\
  */\n代码清单 6-7\n最大连续子数组问题的暴力求解方案\n```\n\n由于存在嵌套循环，该解决方案的计算复杂度为 `O(n * k)`，其中 `n` 是输入切片的长度。\n\
  \n我们能做得更好吗？当 `n` 和 `k` 很大时，这将会非常有用。利用 `Deque` 的服务，我们可以做得更好。\n\n考虑如下所示的 `MaxSubarrayUsingDeque`\
  \ 函数：\n\n```go\nfunc MaxSubarrayUsingDeque(input []int, k int) (output []int) {\n\
  deque := deque.Deque[int]{}\nvar index int\n// 第一个窗口\nfor index = 0; index < k;\
  \ index++ {\nfor {\nif deque.Empty() || input[index] < input[deque.Last()] {\nbreak\n\
  }\ndeque.RemoveLast()\n}\ndeque.InsertBack(index)\n}\noutput = append(output, input[deque.First()])\n\
  // 剩余窗口\nfor ; index < len(input); index++ {\n// 移除窗口外的索引\nfor {\nif deque.Empty()\
  \ || deque.First() > index-k {\nbreak\n}\ndeque.RemoveFirst()\n}\n// 移除小于当前添加元素的值\n\
  for {\nif deque.Empty() || input[index] < input[deque.Last()] {\nbreak\n}\ndeque.RemoveLast()\n\
  }\ndeque.InsertBack(index)\noutput = append(output, input[deque.First()])\n}\nreturn\
  \ output\n}\n```\n\n让我们以前面例子的一部分来逐步分析该函数。\n\n一个泛型类型为 `int` 的 `deque` 被初始化为空。\n\n\
  由于 `deque` 为空，我们跳出内部 for 循环，将索引 0 插入 deque，然后将 `index` 从 0 推进到 1。\n\n由于 `input[1]`\
  \ 小于 `input[0]`，我们再次跳出内部 for 循环，将索引 1 插入 deque 的后端，因此 deque 包含 `[0 1]`。我们将索引推进到\
  \ 2。\n\n由于 `input[2]` 不小于 `input[1]`，我们从 deque 中移除最后一个元素 1，deque 变为 `[0]`。由于 `input[2]`\
  \ 小于 `input[0]`，我们跳出内部循环，将索引 2 插入 deque 的后端，产生 `[0 2]`。外部 for 循环执行完毕。我们确保 deque\
  \ 中的第一个元素是 deque 中的最大值。\n\n在第二个外部 for 循环中，我们将 `input[deque.First()]` 追加到 `output`\
  \ 中，即值 9。\n\n第二个外部 for 循环的逻辑与第一个外部 for 循环相同。首先，清除 deque 中超出索引窗口范围的值，该窗口每次迭代后向右移动一位。然后，将接下来的\
  \ k 个值填充到 deque 中，并对这些值进行旋转，使得 deque 中的第一个值最大。\n\n该算法的计算复杂度为 `O(n)`。\n\n代码清单 6-8\
  \ 比较了暴力算法与基于 deque 的算法的性能。\n\n```go\npackage main\nimport (\n\"fmt\"\n\"example.com/deque\"\
  \n\"time\"\n\"math/rand\"\n)\nconst size = 1_000_000\nfunc MaxSubarrayBruteForce(input\
  \ []int, k int) (output []int) {\nfor first := 0; first < len(input)-k+1; first++\
  \ {\nmax := input[first]\nfor second := 1; second < k; second++ {\nif input[first+second]\
  \ > max {\nmax = input[first+second]\n}\n}\noutput = append(output, max)\n}\nreturn\
  \ output\n}\nfunc MaxSubarrayUsingDeque(input []int, k int) (output []int) {\ndeque\
  \ := deque.Deque[int]{}\nvar index int\n// 第一个窗口\nfor index = 0; index < k; index++\
  \ {\nfor {\nif deque.Empty() || input[index] < input[deque.Last()] {\nbreak\n}\n\
  deque.RemoveLast()\n}\ndeque.InsertBack(index)\n}\noutput = append(output, input[deque.First()])\n\
  // 剩余窗口\nfor ; index < len(input); index++ {\n// 移除窗口外的索引\nfor {\nif deque.Empty()\
  \ || deque.First() > index-k {\nbreak\n}\ndeque.RemoveFirst()\n}\n// 移除小于当前添加元素的值\n\
  for {\nif deque.Empty() || input[index] < input[deque.Last()] {\nbreak\n}\ndeque.RemoveLast()\n\
  }\ndeque.InsertBack(index)\noutput = append(output, input[deque.First()])\n}\nreturn\
  \ output\n}\nfunc main() {\ninput := []int{9, 1, 1, 0, 0, 0, 1, 0, 6, 8}\noutput1\
  \ := MaxSubarrayBruteForce(input, 3)\nfmt.Println(\"Output = \", output1)\noutput2\
  \ := MaxSubarrayUsingDeque(input, 3)\nfmt.Println(\"Output = \", output2)\n// 对两种算法进行性能基准测试\n\
  input = []int{}\nfor i := 0; i < size; i++ {\ninput = append(input, rand.Intn(1000))\n\
  }\nstart := time.Now()\nMaxSubarrayUsingDeque(input, 10000)\nelapsed := time.Since(start)\n\
  fmt.Println(\"使用 Deque: \", elapsed)\nstart = time.Now()\nMaxSubarrayBruteForce(input,\
  \ 10000)\nelapsed = time.Since(start)\nfmt.Println(\"使用暴力算法: \", elapsed)\n}\n/*\
  \ 输出\nOutput = [9 1 1 0 1 1 6 8]\nOutput = [9 1 1 0 1 1 6 8]\n使用 Deque: 21.873658ms\n\
  使用暴力算法: 6.042102028s\n*/\n代码清单 6-8\n比较暴力算法与基于 deque 的算法的性能\n```\n\n结果对比显著：基于 deque\
  \ 的算法耗时 `21.87ms`，而暴力算法耗时 `6.04` 秒。\n\n在下一节中，我们将介绍并实现一个优先队列。\n\n\n\n## 6.7 优先队列\n\
  \n优先队列在现实世界中广泛存在。例如，当乘客排队登机时，许多航空公司会根据乘客的优先级进行排序。这种优先级可能基于年龄（儿童享有高优先级）、票价（头等舱乘客获得高优先级）、忠诚度积分（常旅客）、身体状况或其他决定客户优先级的因素。在每个优先级分组内部，遵循通常的先进先出（FIFO）队列规则。\n\
  \n我们在此假设每个待插入队列的项目只能被分配有限数量的优先级。\n\n我们将展示一种实现方式：使用一个切片（slice），其中每个元素都包含一个普通队列。\n\
  \n切片中的第一个队列存放最高优先级的项目，第二个队列存放第二高优先级的项目，以此类推。\n\n当插入一个项目时，我们访问与其优先级对应的队列，并在该队列中执行插入操作。\n\
  \n通过为切片的每个元素使用基于节点的队列，我们定义了一个泛型 `PriorityQueue` 和创建优先队列的函数，具体如下：\n\n```\ntype PriorityQueue[T\
  \ any] struct {\n\tq []nodequeue.Queue[T] // 队列切片\n\tsize int\n}\n\nfunc NewPriorityQueueT\
  \ any (pq PriorityQueue[T]) {\n\tpq.q = make([]nodequeue.Queue[T], numberPriorities)\n\
  \treturn pq\n}\n```\n\n`NewPriorityQueue` 构造函数定义了一个包含 `numberPriorities` 个节点队列的切片。\n\
  \n列表 6-9 定义了 `Passenger` 类型，并展示了 `PriorityQueue` 的实现及 `main` 驱动函数。在该驱动函数中，定义了一个以\
  \ `Passenger` 为泛型类型的航空队列，并向其中插入了一组乘客。随后移除若干乘客，并输出了队列头部的元素。\n\n```\npackage main\n\
  \nimport (\n\t\"example.com/nodequeue\"\n\t\"fmt\"\n)\n\ntype Passenger struct {\n\
  \tname     string\n\tpriority int\n}\n\ntype PriorityQueue[T any] struct {\n\tq\
  \    []nodequeue.Queue[T]\n\tsize int\n}\n\nfunc NewPriorityQueueT any (pq PriorityQueue[T])\
  \ {\n\tpq.q = make([]nodequeue.Queue[T], numberPriorities)\n\treturn pq\n}\n\n//\
  \ 优先队列的方法\nfunc (pq *PriorityQueue[T]) Insert(item T, priority int) {\n\tpq.q[priority-1].Insert(item)\n\
  \tpq.size++\n}\n\nfunc (pq *PriorityQueue[T]) Remove() T {\n\tpq.size--\n\tfor i\
  \ := 0; i < len(pq.q); i++ {\n\t\tif pq.q[i].Size() > 0 {\n\t\t\treturn pq.q[i].Remove()\n\
  \t\t}\n\t}\n\tvar zero T\n\treturn zero\n}\n\nfunc (pq *PriorityQueue[T]) First()\
  \ T {\n\tfor _, queue := range pq.q {\n\t\tif queue.Size() > 0 {\n\t\t\treturn queue.First()\n\
  \t\t}\n\t}\n\tvar zero T\n\treturn zero\n}\n\nfunc (pq *PriorityQueue[T]) IsEmpty()\
  \ bool {\n\tresult := true\n\tfor _, queue := range pq.q {\n\t\tif queue.Size()\
  \ > 0 {\n\t\t\tresult = false\n\t\t\tbreak\n\t\t}\n\t}\n\treturn result\n}\n\nfunc\
  \ main() {\n\tairlineQueue := NewPriorityQueuePassenger\n\tpassengers := []Passenger{\n\
  \t\t{\"Erika\", 3}, {\"Robert\", 3}, {\"Danielle\", 3},\n\t\t{\"Madison\", 1}, {\"\
  Frederik\", 1}, {\"James\", 2},\n\t\t{\"Dante\", 2}, {\"Shelley\", 3},\n\t}\n\t\
  fmt.Println(\"乘客列表: \", passengers)\n\tfor i := 0; i < len(passengers); i++ {\n\t\
  \tairlineQueue.Insert(passengers[i], passengers[i].priority)\n\t}\n\tfmt.Println(\"\
  队列头部乘客: \", airlineQueue.First())\n\tairlineQueue.Remove()\n\tairlineQueue.Remove()\n\
  \tairlineQueue.Remove()\n\tfmt.Println(\"队列头部乘客: \", airlineQueue.First())\n}\n\n\
  /* 输出\n乘客列表: [{Erika 3} {Robert 3} {Danielle 3} {Madison 1} {Frederik 1} {James\
  \ 2} {Dante 2} {Shelley 3}]\n队列头部乘客: {Madison 1}\n经过三次移除后的队列头部乘客: {Dante 2}*/\n\
  ```\n\n*列表 6-9*  \n*优先队列的切片实现及驱动程序*\n\n如果切片中所有队列均为空，`Remove` 方法将返回 `T`（此处为 `Passenger`）的零值。\n\
  \n前三次 `Remove` 调用移除了队列中全部两个优先级为 1 的乘客以及第一个优先级为 2 的乘客，使得“Dante”成为队列头部。\n\n在列表 6-9\
  \ 中，我们看到了抽象层次的分层，这是软件开发中的常见做法。我们也可以使用切片队列代替节点队列，只需改动导入语句中的一行代码，并将所有 `nodequeue.Queue`\
  \ 替换为 `slicequeue.Queue` 即可。\n\n下一节将介绍队列的一个重要应用——等待线的离散事件模拟。典型的等待线场景是客户排队竞争服务，等待服务器处理每位客户。例如超市的结账流程。\n\
  \n## 6.8 队列应用：等待线的离散事件模拟\n\n假设我们在银行有一个服务等待线。客户按照**泊松**到达过程到达，并具有指定的平均到达率。客户获得服务的时间由在指定下限和上限之间均匀分布的随机服务时间决定。我们的目标是构建一个模拟程序，用于估算加入等待线的客户的平均等待时间（从到达等待线到服务完成的时间），以及八小时工作日内其他统计数据。\n\
  \n### 泊松过程\n\n由泊松到达过程建模的事件需满足以下条件：\n\n1. 事件相互独立。一个事件的发生不会影响另一个事件的发生时间。如果建模的事件是客户到达银行等待线，这很可能是一个合理的要求。\n\
  \n2. 事件的平均发生率保持恒定。这里我们以分钟为基本时间单位，因此平均发生率以每分钟事件数表示。\n\n可以证明，事件之间的时间（一个随机变量）可通过以下函数生成：\n\
  \n```\nfunc InterArrivalInterval(arrivalRate float64) float64 {\n\t// 模拟泊松过程并返回\n\
  \trn := rand.Float64() // 0.0 到 1 之间的随机浮点数\n\treturn -math.Log(1.0 - rn) / arrivalRate\n\
  }\n```\n\n这对应于事件间等待时间大于某个 `t` 的概率为：\n\n```\nP(等待时间 > t) = e^-λ * t\n```\n\n其中 **λ**\
  \ 是以事件/分钟为单位的平均到达率。这是一个指数分布。随着 `t` 增加，等待时间超过 `t` 的概率趋近于 0。当 `t` 等于 0 时，概率为 1。随着到达率\
  \ **λ** 增加（平均每分钟事件数更多），下一个事件的等待时间大于某个 `t` 的概率会降低。\n\n我们将服务时长（处理一位客户所需的时间）建模为介于 `0.5\
  \ / 到达率` 和 `1.4 / 到达率` 之间的均匀分布。例如，如果到达率为 `0.25`（平均每 4 分钟一位客户），则服务时间被建模为在 2 分钟到 5.6\
  \ 分钟之间均匀分布，平均为 3.8 分钟。由于平均服务时间小于平均到达间隔时间，这将形成一个稳定的队列。\n\n\n\n### 模拟逻辑\n\n让我们考察一个典型的事件序列，为构建模拟逻辑打下基础。`a`代表顾客到达时间。`d`代表顾客离开时间。队伍从左向右排列，因此最左边的顾客位于队首，将是下一个离开的顾客。\n\
  \n```\nt1\n0    a1                                       line: c1\nt2\n0    a1 \
  \   a2                                 line: c1, c2\nt3\n0    a1    a2         \
  \    d1                  line: c2\n|  |\nt4\n0    a1    a2            d1   a3  \
  \            line: c2, c3\nt5\n0    a1    a2            d1     a3 d2         line:\
  \ c3\nt6\n0    a1    a2            d1     a3 d2    d3   line: empty\n```\n\n变量 `t`（时间）根据下一个事件——要么是到达，要么是离开——以离散的步长前进，因此得名离散事件模拟。\n\
  \n对于所示的事件序列，顾客 1、2、3 的等待时间如下：\n\n- 顾客 1: (`d1 – a1`)\n- 顾客 2: (`d2 – a2`)\n- 顾客\
  \ 3: (`d3 – a3`)\n\n队列时间如下：\n(`t2 – t1`) * 1 + (`t3 – t2`) * 2 + (`t4 – t3`) * 1\
  \ + (`t5 – t4`) * 2 + (`t6 – t5`) * 1\n\n平均队列大小：`queueTime / t6`.\n\n在每个事件（到达或离开）之后，队列时间通过计算新事件时间与上一事件时间的差值，并乘以当前队列大小来更新。如果下一个事件是离开，则移除队首顾客；将其\
  \ `departureTime – arrivalTime` 累加到等待时间中。如果下一个事件是到达，则将顾客插入队列。\n\n下一个到达时间是前一个到达时间加上到达间隔。下一个离开时间计算为顾客成为队首的时刻加上该顾客的服务时间。\n\
  \n### 系统实现\n\n基于上述观察，我们给出清单 6-10，它实现了这个系统。\n\n```go\n// 等待队列的离散事件模拟\npackage main\n\
  \nimport (\n    \"math/rand\"\n    \"math\"\n    \"fmt\"\n    \"time\"\n    \"example.com/nodequeue\"\
  \n)\n\nconst (\n    arrivalRate           = 0.25 // 每分钟平均到达顾客数\n    lowerBoundServiceTime\
  \ = 0.5 / arrivalRate\n    upperBoundServicetime = 2.0 / arrivalRate\n    quitTime\
  \              = 480 // 8 小时工作日的分钟数\n)\n\nfunc InterArrivalInterval(arrivalRate\
  \ float64) float64 {\n    // 模拟泊松过程并返回\n    rn := rand.Float64() // 0.0 到 1.0 之间的随机浮点数\n\
  \    return -math.Log(1.0 - rn) / arrivalRate\n}\n\nfunc ServiceTime() float64 {\n\
  \    // 均匀分布\n    rn := rand.Float64() // rn 在 0.0 到 1.0 之间\n    return lowerBoundServiceTime\
  \ + (upperBoundServicetime - lowerBoundServiceTime) * rn\n}\n\ntype Customer struct\
  \ {\n    arrivalTime     float64\n    serviceDuration float64\n}\n\n// 统计信息抽象数据类型\n\
  type Statistics struct {\n    waitTimes      []float64\n    queueTime      float64\
  \ // 累计时间 * 队列大小\n    longestQueue   int\n    longestWaitTime float64\n}\n\nfunc\
  \ (s *Statistics) AddWaitTime(wait float64) {\n    s.waitTimes = append(s.waitTimes,\
  \ wait)\n    if wait > s.longestWaitTime {\n        s.longestWaitTime = wait\n \
  \   }\n}\n\nfunc (s *Statistics) AddQueueSizeTime(queueSize int, timeAtSize float64)\
  \ {\n    s.queueTime += float64(queueSize) * timeAtSize\n}\n\nfunc (s *Statistics)\
  \ AddLength(length int) {\n    if length > s.longestQueue {\n        s.longestQueue\
  \ = length\n    }\n}\n\nvar lastArrivalTime, departureTime, lastEventTime float64\n\
  \nfunc main() {\n    rand.Seed(time.Now().UnixNano())\n    lastEventTime := 0.0\
  \ // 一天开始\n    line := nodequeue.Queue[Customer]{}\n    statistics := Statistics{}\n\
  \n    // 开始模拟\n    for {\n        lastArrivalTime = lastArrivalTime + InterArrivalInterval(arrivalRate)\n\
  \        if lastArrivalTime > quitTime {\n            break\n        }\n       \
  \ if line.Size() == 0 {\n            lastEventTime = lastArrivalTime\n         \
  \   // fmt.Printf(\"\\nline no longer empty at time: %0.2f. line size is 1\", lastEventTime)\n\
  \            serviceTime := ServiceTime()\n            customer := Customer{lastArrivalTime,\
  \ serviceTime}\n            line.Insert(customer)\n            statistics.AddLength(line.Size())\n\
  \            departureTime = lastArrivalTime + serviceTime\n        } else {\n \
  \           if lastArrivalTime < departureTime {\n                // 下一个事件是到达\n\
  \                serviceTime := ServiceTime()\n                customer := Customer{lastArrivalTime,\
  \ serviceTime}\n                line.Insert(customer)\n                statistics.AddLength(line.Size())\n\
  \                statistics.AddQueueSizeTime(line.Size()-1, lastArrivalTime-lastEventTime)\n\
  \                lastEventTime = lastArrivalTime\n            } else {\n       \
  \         // 下一个事件是离开\n                // 从队列中移除第一个顾客\n                removedCustomer\
  \ := line.Remove()\n                waitTime := departureTime - removedCustomer.arrivalTime\n\
  \                statistics.AddWaitTime(waitTime)\n                statistics.AddQueueSizeTime(line.Size()+1,\
  \ departureTime-lastEventTime)\n                lastEventTime = departureTime\n\
  \                if line.Size() > 0 {\n                    departureTime = lastEventTime\
  \ + line.First().serviceDuration\n                }\n            }\n        }\n\
  \    }\n\n    totalWaitTime := 0.0\n    for i := 0; i < len(statistics.waitTimes);\
  \ i++ {\n        totalWaitTime += statistics.waitTimes[i]\n    }\n    averageWaitTime\
  \ := totalWaitTime / float64(len(statistics.waitTimes))\n\n    fmt.Printf(\"\\n\
  \ 从到达至离开的平均时间: %0.2f 分钟\", averageWaitTime)\n    fmt.Printf(\"\\n 等待队列的平均大小: %0.2f\"\
  , statistics.queueTime/lastEventTime)\n    fmt.Printf(\"\\n 一天中最长的队列: %d\", statistics.longestQueue)\n\
  \    fmt.Printf(\"\\n 一天中最长的等待时间: %0.2f 分钟\", statistics.longestWaitTime)\n}\n\n\
  /* 输出示例\n从到达至离开的平均时间: 16.19 分钟\n等待队列的平均大小: 2.28\n一天中最长的队列: 8\n一天中最长的等待时间: 40.18\
  \ 分钟\n*/\n```\n\n清单 6-10 – 等待队列的离散事件模拟\n\n对模拟进行多次运行后，之前显示的输出统计信息会表现出较大的方差。\n\n如果我们在代码中启用那三行被左对齐缩进的注释代码，我们将输出精确的事件序列及其发生时间。\n\
  \n在一次典型的模拟运行中，产生的部分输出如下所示：\n\n```\nline no longer empty at time: 0.81\\. line size\
  \ is 1\nDeparture event at 6.23 - line size is: 0:\nline no longer empty at time:\
  \ 7.82\\. line size is 1\nDeparture event at 12.91 - line size is: 0:\nline no longer\
  \ empty at time: 28.79\\. line size is 1\nArrival event at 29.87 - line size is:\
  \ 2:\nDeparture event at 33.56 - line size is: 1:\nDeparture event at 41.07 - line\
