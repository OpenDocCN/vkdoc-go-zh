  \ := Point{460.0, 860.0}\n\tcities = append(cities, pt18)\n\tpt19 := Point{1040.0,\
  \ 950.0}\n\tcities = append(cities, pt19)\n\tpt20 := Point{590.0, 1390.0}\n\tcities\
  \ = append(cities, pt20)\n\tpt21 := Point{830.0, 1770.0}\n\tcities = append(cities,\
