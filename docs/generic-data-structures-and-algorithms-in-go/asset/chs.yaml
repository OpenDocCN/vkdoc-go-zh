  \n**图 10-4** 一个三十节点的 AVL 树\n\nAVL 树是一种有序集合。`Search` 方法允许我们确定数据结构中是否存在某个键值。这是任何集合的核心要求。它还允许我们执行中序遍历，从小到大访问节点。\n\
  \n在下一节中，我们首先使用 AVL 树，然后使用并发 AVL 树来实现一个**集合**。我们假设该集合包含浮点数值。在下一章中，我们将介绍一个更完整的泛型集合实现。\n\
