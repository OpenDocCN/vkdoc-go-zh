  \    for i := 0; i < size; i++ {\n        if data[i] != data1[i] {\n           \
  \ return false\n        }\n    }\n    return true\n}\n```\n\n我们为`data1`切片分配存储空间，并将输入的`data`复制到`data1`中。我们使用`sort.Float64s(data1)`对`data1`进行排序。最后，我们将`data1`的每个元素与`data`进行比较，如果不匹配则返回`false`。\n\
