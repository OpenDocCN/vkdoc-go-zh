  \n\n\n## 7.3 构建哈希表\n\n商业级哈希表（映射）结构复杂，且如前文所述，效率极高。\n\n关于 Go 语言 map 函数的具体构建细节，可参见\
  \ [`https://github.com/golang/go/blob/master/src/runtime/map.go`](https://github.com/golang/go/blob/master/src/runtime/map.go)。\n\
  \n在本节中，我们将从头构建一个效率相对较低的哈希表，以便简要探讨与哈希表构建相关的问题。\n\n考虑以下代码片段：\n\n```\npackage main\n\
  import (\n\"hash/fnv\" // Fowler–Noll–Vo 算法\n// 其他细节暂未展示\n)\nconst tableSize = 100_000\n\
  func hash(s string) uint32 {\nh := fnv.New32a() // Fowler-Noll-Vo 算法\nh.Write([]byte(s))\n\
  return h.Sum32()\n}\ntype WordType struct {\nword string\nlist []string\n}\n// 每个索引位置包含一个单词和一个字符串切片\n\
  type HashTable [tableSize]WordType\n```\n\n`hash` 函数使用 Fowler-Noll-Vo 算法将字符串映射为一个无符号\
  \ 32 位整数。感兴趣的读者可以自行研究该算法的细节。\n\n我们定义了一个 `WordType` 结构体，包含字段 `word` 和 `list`。\n\n\
  接下来，考虑创建并返回一个 `Hashtable` 的 `NewTable` 函数。\n\n### 创建一个空的哈希表\n\n```\nfunc NewTable()\
  \ HashTable {\nvar table HashTable\nfor i := 0; i < tableSize; i++ {\ntable[i] =\
  \ WordType{\"\", []string{}}\n}\nreturn table\n}\n```\n\n在 `HashTable` 数组（固定大小为\
  \ `tableSize`）的每个位置上，都分配了一个 `WordType` 变量，其 `word` 为空，字符串切片 `list` 也为空，即 `[]string{}`。\n\
  \n### 向哈希表插入数据\n\n现在来看 `Insert` 方法，如下所示：\n\n```\nfunc (table *HashTable) Insert(word\
  \ string) {\nindex := hash(word) % tableSize // 范围在 0 到 tableSize - 1 之间\n// 在 table[index]\
  \ 中查找 word\nif table[index].word == word {\nreturn // 不允许重复\n}\nif len(table[index].list)\
  \ > 0 {\nfor i := 0; i < len(table[index].list); i++ {\nif table[index].list[i]\
  \ == word {\nreturn // 不允许重复\n}\n}\n}\nif table[index].word == \"\" {\ntable[index].word\
  \ = word\n} else {\ntable[index].list = append(table[index].list, word)\n}\nlength\
  \ += 1\n}\n```\n\n我们使用前面展示的 `hash` 函数，将输入参数 `word`（一个字符串）“映射”到一个索引。\n\n哈希表中不能包含重复的键，因此我们检查\
  \ `word` 是否已存在于 `index` 位置。如果存在，则直接返回，不修改表。\n\n我们进一步通过扫描 `list`（如果非空）来检查是否存在重复条目，如果发现重复，同样直接返回，不修改表。\n\
  \n假设输入的单词不在表中，我们将 `word` 赋值给 `table` 的 `index` 位置。如果该索引位置已经有一个单词，则将输入单词追加到该位置的字符串切片中。\n\
  \n### 冲突与冲突解决\n\n要使某个索引位置的字符串切片增长，必然发生了冲突。也就是说，输入单词被分配的索引与已存在于该位置的单词发生了冲突。这种冲突是不可避免的，因为我们通过以下方式将\
  \ `index` 压缩到表大小范围内：\n\n```\nindex := hash(word) % tableSize // 范围在 0 到 tableSize\
  \ - 1 之间\n```\n\n### 负载因子\n\n表的**负载因子**是表中单词数量除以表大小。即使负载因子小于 1，冲突仍然可能发生，因为哈希函数并不能为所有输入单词生成唯一的值。一个表如果在多个索引位置有很长的字符串切片（冲突链），其访问时间就会更长。\n\
  \n### 判断键是否存在\n\n接下来我们考虑 `IsPresent` 函数，如下所示：\n\n```\nfunc (table HashTable) IsPresent(word\
  \ string) bool {\nindex := hash(word) % tableSize // 范围在 0 到 tableSize - 1 之间\n\
  // 在 table[index] 中查找 word\nif table[index].word == word {\nreturn true\n}\nif len(table[index].list)\
  \ > 0 {\nfor i := 0; i < len(table[index].list); i++ {\nif table[index].list[i]\
  \ == word {\nreturn true\n}\n}\n}\nreturn false\n}\n```\n\n如果输入的单词位于 `index` 位置，或者位于以\
  \ `index` 为起点的非空列表中，该函数返回 true。\n\n### 比较哈希表与标准 Map 的性能\n\n代码清单 7-4 将前面讨论的各个部分组合在一起，并比较了哈希表与标准\
  \ map 的执行时间。\n\n```\n// 哈希表构建\npackage main\nimport (\n\"fmt\"\n\"hash/fnv\" //\
  \ Fowler–Noll–Vo 算法\n\"strconv\"\n\"time\"\n)\nconst tableSize = 100_000\nvar length\
  \ int\nfunc hash(s string) uint32 {\nh := fnv.New32a()\nh.Write([]byte(s))\nreturn\
  \ h.Sum32()\n}\ntype WordType struct {\nword string\nlist []string\n}\n// 每个索引位置包含一个字符串切片\n\
  type HashTable [tableSize]WordType\nfunc NewTable() HashTable {\nvar table HashTable\n\
  for i := 0; i < tableSize; i++ {\ntable[i] = WordType{\"\", []string{}}\n}\nreturn\
  \ table\n}\nfunc (table *HashTable) Insert(word string) {\nindex := hash(word) %\
  \ tableSize\nif table[index].word == word {\nreturn\n}\nif len(table[index].list)\
  \ > 0 {\nfor i := 0; i < len(table[index].list); i++ {\nif table[index].list[i]\
  \ == word {\nreturn\n}\n}\n}\nif table[index].word == \"\" {\ntable[index].word\
  \ = word\n} else {\ntable[index].list = append(table[index].list, word)\n}\nlength++\n\
  }\nfunc (table HashTable) IsPresent(word string) bool {\nindex := hash(word) % tableSize\n\
  if table[index].word == word {\nreturn true\n}\nif len(table[index].list) > 0 {\n\
  for i := 0; i < len(table[index].list); i++ {\nif table[index].list[i] == word {\n\
  return true\n}\n}\n}\nreturn false\n}\nfunc main() {\nmyTable := NewTable()\nmapCollection\
  \ := make(map[string]string)\nwords := []string{}\nfor i := 0; i < 500_000; i++\
  \ {\nword := strconv.Itoa(i)\nwords = append(words, word)\nmyTable.Insert(word)\n\
  mapCollection[word] = \"\"\n}\nfmt.Println(\"基准测试开始，测试单词数量：\", length)\nstart :=\
  \ time.Now()\nfor i := 0; i < length; i++ {\nif myTable.IsPresent(words[i]) == false\
  \ {\nfmt.Println(\"在 myTable 中未找到单词：\", words[i])\n}\n}\nelapsed := time.Since(start)\n\
  fmt.Println(\"在 myTable 中测试所有单词用时：\", elapsed)\nstart = time.Now()\nfor i := 0;\
  \ i < len(mapCollection); i++ {\n_, present := mapCollection[words[i]]\nif !present\
  \ {\nfmt.Println(\"在 mapCollection 中未找到单词：\", words[i])\n}\n}\nelapsed = time.Since(start)\n\
  fmt.Println(\"在 mapCollection 中测试单词用时：\", elapsed)\n}\n/* 输出\n基准测试开始，测试单词数量：500000\n\
  在 myTable 中测试所有单词用时：1m17.880336666s\n在 mapCollection 中测试单词用时：24.405583ms\n*/\n代码清单\
  \ 7-4\n比较哈希表与 map\n```\n\n通过将循环中的整数索引转换为字符串，生成五十万个单词，并将这些字符串作为输入分别存入哈希表和 map。哈希表搜索所有已存入的单词耗时近\
  \ 138 秒，而 map 的耗时不到 25 毫秒。差异非常显著！\n\n下一节，我们将深入探讨字符串搜索这一重要的应用领域。我们将介绍一个经典的字符串搜索算法，该算法以哈希为基础。\n\
  \n## 7.4 哈希应用：字符串搜索\n\n本节我们将探讨一个经典且重要的字符串搜索应用。**Rabin-Karp** 算法以哈希为特色，试图将搜索的复杂度从\
  \ `O(n*m)` 降低到 `O(n)`，其中 n 是被搜索字符串的长度，m 是我们正在搜索的模式字符串的长度。\n\n下面给出了一个使用暴力法完成字符串搜索的函数：\n\
  \n```\nfunc BruteForceSearch(txt, pattern string) (bool, int) {\npatternLength :=\
  \ len(pattern)\nfor outer := 0; outer < len(txt)-patternLength; outer++ {\nif txt[(outer):(outer+patternLength)]\
  \ == pattern {\nreturn true, outer\n}\n}\nreturn false, -1\n}\n```\n\n外层循环的范围是从\
  \ `0` 到 `len(txt) – patternLength`，我们将 `txt[(outer):(outer+patternLength)]` 限定的字符串与\
  \ `pattern` 进行比较。如果两个字符串相等，则返回 true 和外层位置。由于字符串比较的时间复杂度是 `O(patternLength)`，并且我们执行该操作\
  \ n 次，因此得到一个 `O(n * m)` 的算法，其中 m 是模式长度。\n\n此刻，你可能会合理地问：“这跟哈希有什么关系？”\n\n假设我们将执行了\
  \ `n – m` 次的字符串相等性测试，替换为对其哈希值的比较。也就是说，我们比较 `hash(txt[(outer):(outer+patternLength)])`\
  \ 与 `hash(pattern)`，并执行此操作 `n – m` 次，如果它们的哈希值相同，则返回 true。\n\n\n\n### 滚动哈希计算\n\n\
  当`外部`索引递增 1 时，能否从上一个哈希值计算出新的哈希值，从而避免从头开始重新计算哈希？这正是 Rabin-Karp 算法所做的。它使用一种“滚动”哈希函数，其中后续的哈希计算可以廉价地从前一次哈希计算中获得。\n\
  \n对于文本中从`i`到`i + m - 1`的部分（其中`m`是模式串的长度），哈希函数`H`的定义如下：\n\n`H[i] = (c[i]R^(m-1) +\
  \ c[i+1]R^(m-2) + ... + c[i+m-1]R⁰) mod Q`\n\n这里的`c`是待搜索字符串中指定位置的整数字符值，`R`是一个基数，对应每个字符可能取值的数量。`Q`是一个大质数，用于防止计算出的哈希值溢出。\n\
  \n这个函数不能保证不同字符串的哈希值唯一，但如果`Q`和`n`（字符串长度）足够大，则可以最大程度地降低冲突概率。\n\n位置`i + 1`处的哈希值可以在常数时间内从位置`i`处的哈希值计算得出，公式如下：\n\
  \n`H[i+1] = (H[i] - c[i]R^(m-1))R + c[i+m]`\n\n假设我们将字符集限定为数字“0”到“9”。我们的字符串搜索尝试判断一个由数字字符串定义的模式是否包含在一个更大的数字字符串中。\n\
  \n哈希函数如下所示：\n\n```go\nconst (\n    Radix = uint64(10)\n    Q     = uint64(10 ^ 9\
  \ + 9)\n)\nfunc Hash(s string, Length int) uint64 {\n    // Horner 方法\n    h :=\
  \ uint64(0)\n    for i := 0; i < Length; i++ {\n        h = (h*Radix + uint64(s[i]))\
  \ % Q\n    }\n    return h\n}\n```\n\n这是用于计算多项式的 Horner 方法。我们使用`uint64`类型来避免溢出。\n\
  \n### Rabin-Karp 算法\n\n`Search`方法使用了前面概述的 Rabin-Karp 算法，如下所示：\n\n```go\nfunc Search(txt,\
  \ pattern string) (bool, int) {\n    strings.ToLower(txt)\n    strings.ToLower(pattern)\n\
  \    n := len(txt)\n    m := len(pattern)\n    patternHash := Hash(pattern, m)\n\
  \    textHash := Hash(txt, m)\n    if textHash == patternHash {\n        return\
  \ true, 0\n    }\n    PM := uint64(1)\n    for i := 1; i <= m-1; i++ {\n       \
  \ PM = (Radix * PM) % Q\n    }\n    for i := m; i < n; i++ {\n        textHash =\
  \ (textHash + Q - PM*uint64(txt[i-m])%Q) % Q\n        textHash = (textHash*Radix\
  \ + uint64(txt[i])) % Q\n        if (patternHash == textHash) && pattern == txt[(i-m+1):(i+1)]\
  \ {\n            return true, i - m + 1\n        }\n    }\n    return false, -1\n\
  }\n```\n\n由于`patternHash`和`textHash`相等并不能保证已找到模式串，因此我们需要将模式串与文本段进行比对确认。\n\n```go\n\
  package main\n\nimport (\n    \"fmt\"\n    \"strings\"\n    \"time\"\n)\n\nconst\
  \ (\n    Radix = uint64(10)\n    Q     = uint64(10 ^ 9 + 9)\n)\n\nfunc BruteForceSearch(txt,\
  \ pattern string) (bool, int) {\n    patternLength := len(pattern)\n    for outer\
  \ := 0; outer < len(txt)-patternLength; outer++ {\n        if txt[(outer):(outer+patternLength)]\
  \ == pattern {\n            return true, outer\n        }\n    }\n    return false,\
  \ -1\n}\n\nfunc Hash(s string, Length int) uint64 {\n    // Horner 方法\n    h :=\
  \ uint64(0)\n    for i := 0; i < Length; i++ {\n        h = (h*Radix + uint64(s[i]))\
  \ % Q\n    }\n    return h\n}\n\nfunc Search(txt, pattern string) (bool, int) {\n\
  \    strings.ToLower(txt)\n    strings.ToLower(pattern)\n    n := len(txt)\n   \
  \ m := len(pattern)\n    patternHash := Hash(pattern, m)\n    textHash := Hash(txt,\
  \ m)\n    if textHash == patternHash {\n        return true, 0\n    }\n    PM :=\
  \ uint64(1)\n    for i := 1; i <= m-1; i++ {\n        PM = (Radix * PM) % Q\n  \
  \  }\n    for i := m; i < n; i++ {\n        textHash = (textHash + Q - PM*uint64(txt[i-m])%Q)\
  \ % Q\n        textHash = (textHash*Radix + uint64(txt[i])) % Q\n        if (patternHash\
  \ == textHash) && pattern == txt[(i-m+1):(i+1)] {\n            return true, i -\
  \ m + 1\n        }\n    }\n    return false, -1\n}\n\nfunc main() {\n    text :=\
  \ \"31415926535897932384626433832795028841971693993751058209749445923078164062862089986280348253421170679\"\
  \n    pattern := \"816406286208998628034825342\"\n    start := time.Now()\n    _,\
  \ _ = BruteForceSearch(text, pattern)\n    elapsed := time.Since(start)\n    fmt.Println(\"\
  使用 BruteForceSearch 的计算时间:\", elapsed)\n    start = time.Now()\n    _, _ = Search(text,\
  \ pattern)\n    elapsed = time.Since(start)\n    fmt.Println(\"使用 Search 的计算时间:\"\
  , elapsed)\n    fmt.Println(BruteForceSearch(text, pattern))\n    fmt.Println(Search(text,\
  \ pattern))\n}\n\n/* 使用搭载 M1 Max 的 Macbook Pro 输出\n使用 BruteForceSearch 的计算时间: 10.083μs\n\
  使用 Search 的计算时间:  1.375μs\ntrue 67\ntrue 67\n使用搭载 3.2 GHz 8 核 Intel Xeon W 的 iMac\
  \ 输出\n使用 BruteForceSearch 的计算时间: 354ns\n使用 Search 的计算时间: 1.161μs\n*/\n```\n\n*清单\
  \ 7-5 比较 Rabin-Karp 算法与暴力搜索算法*\n\n该程序在两台计算机上运行，结果令人惊讶。在配备 M1 Max 处理器和 32G 统一内存的\
  \ MacBook Pro 上，Rabin-Karp 搜索在搜索圆周率的前 100 位时速度提高了七倍以上，这并不意外。而在配备 3.2 GHz 8 核 Xeon\
  \ W 处理器的 iMac 上，结果则相反。暴力算法返回的时间比 Rabin-Karp 算法快三倍以上。\n\n这些相互矛盾的基准测试再次凸显了一个事实：特定机器的硬件和指令集会极大地影响此类基准测试的结果。\n\
  \n下一节，我们将使用哈希来实现一个通用的`Set`集合。\n\n\n\n## 7.5 泛型集合\n\nGo 语言没有直接提供 `Set` 数据结构。本节我们将实现一个泛型\
  \ `Set` 数据结构。集合存储的是唯一值，且值在集合内是有序的。\n\n`Set` 定义了以下操作：\n\n| `Insert(item)` – 若 `item`\
  \ 不存在，则将其添加到现有集合中 |\n| `Delete(item)` – 若 `item` 存在，则将其从现有集合中移除 |\n| `In(item)`\
  \ – 若 `item` 存在于现有集合中则返回 `true`，否则返回 `false` |\n| `Items()` – 返回现有集合中所有元素的一个切片 |\n\
  | `Size()` – 返回现有集合中的元素数量 |\n| `Union(set2)` – 返回现有集合与 `set2` 中所有不重复的元素 |\n| `Intersection(set2)`\
  \ – 返回同时存在于现有集合与 `set2` 中的元素 |\n| `Difference(set2)` – 返回存在于现有集合但不存在于 `set2` 中的元素\
  \ |\n| `Subset(set2)` – 如果 `set2` 中的所有元素都在 `set1` 中，则返回 `true`，否则返回 `false` |\n\n\
  在我们的 `set` 包中，我们定义泛型类型 `Set` 如下：\n\n```\npackage set\ntype Ordered interface {\n\
  ~string | ~int | ~float64\n}\ntype Set[T Ordered] struct {\nitems map[T]bool\n}\n\
  ```\n\n在这里，我们将 `Set` 的 `items` 字段定义为一个 `map`，其泛型参数 `T` 的类型为 `Ordered`。\n\nGo 语言中的\
  \ `map` 结构要求键值的类型是可比较的。\n\n`Insert` 方法的实现如下：\n\n```\n// Add item to set\nfunc (set\
  \ *Set[T]) Insert(item T) {\nif set.items == nil {\nset.items = make(map[T]bool)\n\
  }\n// Prevent duplicate entry\n_, present := set.items[item]\nif !present {\nset.items[item]\
  \ = true\n}\n}\n```\n\n我们首先判断 `set` 是否为空，如果为空，则 `set.items` 会是 `nil`。在这种情况下，我们使用\
  \ `make` 初始化 `map`。\n\n为了阻止在集合中插入重复元素（这是不被允许的），我们检查 `item` 是否已经在 `set` 中。如果不存在，我们将其赋给\
  \ `set.items` 这个 `map`。\n\n`Delete` 方法的实现如下：\n\n```\n// Remove item from set\nfunc\
  \ (set *Set[T]) Delete(item T) {\n_, present := set.items[item]\nif present {\n\
  delete(set.items, item)\n}\n}\n```\n\n如果 `item` 存在，我们将其从 `set.items` 这个 `map` 中删除。\n\
  \n`In` 方法的实现如下：\n\n```\n// Return true if item is in set, otherwise false\nfunc\
  \ (set *Set[T]) In(item T) bool {\n_, present := set.items[item]\nreturn present\n\
  }\n```\n\n如果 `item` 存在于 `set.items` 这个 `map` 中则返回 `true`，否则返回 `false`。\n\n`Items`\
  \ 方法的实现如下：\n\n```\n// Return a slice of all the items in set\nfunc (set *Set[T])\
  \ Items() []T {\nitems := []T{}\nfor item := range set.items {\nitems = append(items,\
  \ item)\n}\nreturn items\n}\n```\n\n我们初始化了一个类型为 `T` 的空切片。然后我们遍历 `set.items` 这个 `map`\
  \ 的范围，并将每个 `item` 追加到 `items` 中，最后返回 `items`。\n\n完整的 `set` 包如代码清单 7-6 所示。其他方法也同样直截了当。\n\
  \n```\npackage set\ntype Ordered interface {\n~string | ~int | ~float64\n}\ntype\
  \ Set[T Ordered] struct {\nitems map[T]bool\n}\n// Methods\n// Add item to set\n\
  func (set *Set[T]) Insert(item T) {\nif set.items == nil {\nset.items = make(map[T]bool)\n\
  }\n// Prevent duplicate entry\n_, present := set.items[item]\nif !present {\nset.items[item]\
  \ = true\n}\n}\n// Remove item from set\nfunc (set *Set[T]) Delete(item T) {\n_,\
  \ present := set.items[item]\nif present {\ndelete(set.items, item)\n}\n}\n// Return\
  \ true if item is in set, otherwise false\nfunc (set *Set[T]) In(item T) bool {\n\
  _, present := set.items[item]\nreturn present\n}\n// Return a slice of all the items\
  \ in set\nfunc (set *Set[T]) Items() []T {\nitems := []T{}\nfor item := range set.items\
  \ {\nitems = append(items, item)\n}\nreturn items\n}\n// Return the number of items\
  \ in set\nfunc (set *Set[T]) Size() int {\nreturn len(set.items)\n}\n// Return a\
  \ new set containing all the unique items of set and set2\nfunc (set *Set[T]) Union(set2\
  \ Set[T]) *Set[T] {\nresult := Set[T]{}\nresult.items = make(map[T]bool)\nfor index\
  \ := range set.items {\nresult.items[index] = true\n}\nfor j := range set2.items\
  \ {\n_, present := result.items[j]\nif !present {\nresult.items[j] = true\n}\n}\n\
  return &result\n}\n// Return a new set containing the items found in both set and\
  \ set2\nfunc (set *Set[T]) Intersection(set2 Set[T]) *Set[T] {\nresult := Set[T]{}\n\
  result.items = make(map[T]bool)\nfor i := range set2.items {\n_, present := set.items[i]\n\
  if present {\nresult.items[i] = true\n}\n}\nreturn &result\n}\n// Return a new set\
  \ of items in set not found in set2\nfunc (set *Set[T]) Difference(set2 Set[T])\
  \ *Set[T] {\nresult := Set[T]{}\nresult.items = make(map[T]bool)\nfor i := range\
  \ set.items {\n_, present := set2.items[i]\nif !present {\nresult.items[i] = true\n\
  }\n}\nreturn &result\n}\n// Return true if all items of set2 are in set\nfunc (set\
  \ *Set[T]) Subset(set2 Set[T]) bool {\nfor i := range set.items {\n_, present :=\
  \ set2.items[i]\nif !present {\nreturn false\n}\n}\nreturn true\n}\n代码清单 7-6\n包\
  \ set\n```\n\n代码清单 7-7 给出了一个主驱动测试程序，用于练习 `set` 包的方法。\n\n```\npackage main\nimport\
  \ (\n\"example.com/set\"\n\"fmt\"\n)\nfunc main() {\nset1 := set.Set[int]{}\nset1.Insert(3)\n\
  set1.Insert(5)\nset1.Insert(7)\nset1.Insert(9)\nset2 := set.Set[int]{}\nset2.Insert(3)\n\
  set2.Insert(6)\nset2.Insert(8)\nset2.Insert(9)\nset2.Insert(11)\nset2.Delete(11)\n\
  fmt.Println(\"Items in set2: \", set2.Items())\nfmt.Println(\"5 in set1: \", set1.In(5))\n\
  fmt.Println(\"5 in set2: \", set2.In(5))\nfmt.Println(\"Union of set1 and set2:\
  \ \", set1.Union(set2).Items())\nfmt.Println(\"Intersection of set1 and set2: \"\
  ,\nset1.Intersection(set2).Items())\nfmt.Println(\"Difference of set2 with respect\
  \ to set1: \",\nset2.Difference(set1).Items())\nfmt.Println(\"Size of this difference:\
  \ \", set1.Intersection(set2).Size())\n}\n/* Output\nItems in set2: [6 8 9 3]\n\
  5 in set1:  true\n5 in set2:  false\nUnion of set1 and set2: [9 3 5 7 6 8]\nIntersection\
  \ of set1 and set2: [3 9]\nDifference of set2 with respect to set1: [6 8]\nSize\
  \ of this difference:  2\n*/\n代码清单 7-7\n练习 set 包的主驱动\n```\n\n## 7.6 小结\n\n在本章中，我们研究了哈希函数和哈希表。我们看到，使用标准\
  \ `map` 数据结构的哈希表在搜索无序集合时非常高效。我们学习了经典的 Rabin-Karp 算法，用于高效地搜索字符串中的模式。该算法使用了滚动哈希函数。最后，我们使用哈希映射实现了一个\
  \ `Set`。\n\n下一章，我们将注意力转向树数据结构。这是聚焦于二叉树的若干章节中的第一章。\n\n"
- "# 8. 二叉树\n\n在上一章中，我们研究了哈希函数和哈希表，并探讨了几个应用，包括字符串搜索以及利用哈希实现的 `Set`。\n\n在本章中，我们将注意力转向\
  \ `树` 结构。这是聚焦于树的若干章节中的第一章。我们在本章介绍二叉树。我们将研究遍历二叉树的机制。我们还将解决图形化显示二叉树这一具有挑战性的问题。为此，我们将再次使用第三方\
  \ Fyne 包来获取此类图形所需的资源。\n\n在下一节中，我们定义二叉树。\n\n\n\n## 8.1 二叉树\n\n二叉树是一种特殊类型的树，其特点如下：\n\
  \n- 每个节点最多有两个子节点\n- 子节点分别称为`左子节点`和`右子节点`\n\n图 8-1 展示了一棵具有 7 个节点、高度为 5、包含 3 个叶子节点的二叉树。\n\
  \n![](img/527841_1_En_8_Fig1_HTML.png)\n\n一幅展示有 7 个节点、5 层结构的二叉树示意图。第 1 层的根节点 A 分为第\
  \ 2 层的节点 B 和 C。第 2 层的节点 B 进一步分为节点 D，并引向第 3 层的节点 E。第 3 层的节点 E 再分为第 5 层的节点 F 和 G。\n\
  \n图 8-1\n\n二叉树\n\n与自然界中的树不同，二叉树的根位于结构顶部，随着更多节点的添加，树向下生长。叶子节点没有子节点。\n\n下一节，我们将介绍遍历二叉树的三种方法。\n\
  \n## 8.2 树的遍历\n\n树的遍历是指访问每个节点一次，并对节点中存储的数据进行操作。对于二叉树，我们将讨论三种遍历方式：`中序`、`前序`和`后序`。每种遍历都是通过递归定义的。我们以上图所示的树为例进行说明。\n\
  \n### 中序遍历\n\n从根节点开始，我们从 A 向左下降到 B。再次向左下降，到达 D。然后向左到 E，最后再到 F。此时尚未产生任何输出。从 F 向左下降，发现没有左子节点。然后回溯并访问\
  \ F。访问可以是输出 F 中存储的数据，或对该数据执行某种操作。再到 F 的右侧，发现也没有右子节点。处理完 F 的左、访问 F 以及 F 的右之后，回溯到\
  \ E。由于已经处理过 E 的左，接下来访问节点 E。然后下降到 E 的右。从 G 向左，然后访问 G。回溯到 D。访问 D。回溯到 B。访问 B。回溯到 A。处理完\
  \ A 的左，访问 A。下降到右侧到节点 C。向左走。访问 C。向右走。回溯到 A，完成遍历。\n\n因此，访问顺序为 `F, E, G, D, B, A, C`。\n\
  \n### 前序遍历\n\n对于这种遍历，我们首先访问节点 A。访问可以是将 A 中存储的数据输出，或对其执行某种操作。访问 A 后，向左下降到节点 B。访问节点\
  \ B。然后向左下降并访问节点 D。接着向左下降并访问节点 E。再向左下降并访问节点 F。由于节点 F 没有左子节点，并且已经访问过节点 F，我们向右下降并访问节点\
  \ G。回溯到节点 A。由于已经访问过 A，我们向右下降并访问节点 C。因此，访问顺序为 `A B D E F G C`。\n\n### 后序遍历\n\n在这里，递归的操作顺序是：先向左下降，再向右下降，最后访问节点。请对照前文的树，看是否同意这种遍历产生的结果序列为\
  \ `F G E D B C A`。\n\n下一节，我们将借助第三方 Fyne 包来实现二叉树的图形化绘制。\n\n## 8.3 绘制树\n\n我们希望能够使用`fyne`图形用户界面包中的图形函数来绘制二叉树。绘制的图形必须显示所有树节点及其键值，以及连接父节点与子节点的线条，并在绘图中体现每个节点的层级。\n\
  \n图 8-2 展示了由本节代码构建的树的屏幕截图。每个节点中数据的基类型假定为单字符字符串。\n\n![](img/527841_1_En_8_Fig2_HTML.png)\n\
