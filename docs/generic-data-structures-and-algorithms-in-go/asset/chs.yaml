  ## 17.4 小结


  本章介绍了著名的**旅行商问题**，并给出了一种暴力求解方案。与所有已知的精确解法一样，该方案在计算上难以处理，其大 O 复杂度为 `O(n!)`。


  文中展示了一段用于显示具有指定坐标位置的旅行路线代码，并通过一个简单示例进行了说明。


  下一章将介绍另一种求解 TSP 精确解的算法。该算法运用了一种名为**分支定界**的强大技术。和所有已知的 TSP 精确解一样，这种分支定界算法在计算上同样难以处理。


  '
- "# 18. 旅行商问题的分支定界解法\n\n前一章介绍了著名的**旅行商问题**，并给出了一种暴力求解方案。与所有该问题的精确解法一样，它在计算上是难以处理的。同时，还介绍了一个第三方包以及用于图形化显示\
  \ TSP 旅行路线的代码。\n\n本章将介绍另一种使用强大技术——分支定界——求解 TSP 的精确解法。该解法同样在计算上难以处理。\n\n下一节，我们将介绍分支定界技术，并展示如何将其应用于\
  \ TSP。\n\n## 18.1 用于 TSP 的分支定界法\n\n本章内容大部分基于本文作者于 2003 年发表在 *《Journal of Object\
  \ Technology》* 上的一篇论文。论文标题为“*Branch and Bound Implementation for the Traveling Salesperson\
  \ Problem*”（Richard Wiener, Journal of Object Technology, Vol 2. No. 3, May–June\
  \ 2003）。\n\n我们给定一个包含所有城市间距离的图（每个城市都与其他每个城市相连，边代表两城之间的距离）。图的节点是城市，编号为 0, …, n - 1。一条旅行路线是指从城市\
  \ 0 出发，恰好访问每个其他城市一次，并最终返回起点城市 0 的城市序列。\n\n**在任意旅行路线中，离开某城市时，所选择的边的权值必须大于或等于离开该城市的最短边的权值。**\n\
  \n这构成了 TSP 分支定界解法的基础。\n\n### 一个示例\n\n考虑一个具有如下距离矩阵（成本矩阵）的 TSP：\n\n```\n  0   14 \
  \  4   11   20\n14    0   7    8    7\n4     7   0    7   16\n11    8   7    0 \
  \   2\n20    7  16    2    0\n```\n\n我们按如下方式构建解树：\n\n在第 0 层，根节点表示部分路线 `[0]`。\n\n\
  在第 1 层，生成表示部分路线 `[0, 1]`、`[0, 2]`、`[0, 3]`、…、`[0, n - 1]` 的节点。\n\n在第 2 层，生成表示部分路线\
  \ `[0, 1, 2]`、`[0, 1, 3]`、`[0, 1, 4]`、… 的节点。\n\n依此类推，直到最底层，我们得到所有可能旅行路线的全部排列。\n\n\
  ### 下界计算\n\n对于上述图中部分路线为 `[0]` 的根节点，离开五个顶点的成本下界为：\n\n城市 0：最小值 (14, 4, 11, 20) = `4`。\n\
  \n城市 1：最小值 (14, 7, 8, 7) = `7`。\n\n城市 2：最小值 (4, 7, 7, 16) = `4`。\n\n城市 3：最小值 (11,\
  \ 8, 7, 2) = `2`。\n\n城市 4：最小值 (20, 7, 16, 2) = `2`。\n\n因此，基于部分路线 `[0]` 的 TSP 解的下界是这些值的和，即\
  \ `19`。\n\n现在，我们来计算部分路线 `[0, 2, 3]` 的下界。\n\n城市 0：`4`（因为路线包含 0 -> 2）\n\n城市 1：`7`（不能触碰已存在于路线中的节点）\n\
  \n城市 2：`7`（因为路线包含 2 -> 3）\n\n城市 3：`11`（因为路线包含 3 -> 0）\n\n城市 4：`7`（不能触碰已存在于路线中的节点）\n\
  \n因此，部分路线 `[0, 2, 3]` 的下界是这些值的和，等于 `36`。\n\n计算部分路线下界的计算成本很低。\n\n在包含部分路线的树的任何一层中，节点都可以根据其计算出的下界进行排序。我们可以使用优先队列来维护树结构。\n\
  \n### 分支定界算法\n\n- 为最佳旅行路线成本设置一个初始值。\n- 初始化一个优先队列（PQ）。\n- 生成第一个节点，其部分路线为 `[0]`，并计算其下界。\n\
  - 将此节点插入到 PQ 中。\n- 当 PQ 非空时，从 PQ 中取出第一个节点，并将其赋给父节点。\n- 如果它的下界 < 最佳旅行路线成本，则将其层级设置为父节点的层级\
  \ + 1。\n- 如果此层级为 N – 1（N 为城市数量），则将起始城市 0 添加到部分路线的末尾，并计算完整路线的成本。\n- 如果此完整路线的成本 <\
  \ 最佳旅行路线成本，则更新最佳旅行路线成本，并保存最佳旅行路线。\n- 如果父节点的层级 + 1 不等于 N – 1，\n    - 对于所有满足 `1 <=\
  \ i < N` 且 `i` 不在父节点部分路线中的 `i`，\n        - 将父节点的部分路线复制到新节点，并将 `i` 添加到该部分路线的末尾。\n\
  \        - 计算此新节点的下界。\n        - 如果此下界小于当前最佳旅行路线成本，则将此新节点插入优先队列；否则，剪掉此节点。\n\n###\
  \ 优先队列\n\n在将节点插入 PQ 之前，会对其进行筛选，以确定其下界是否小于当前已知的最佳旅行路线成本。这有助于将 PQ 中的节点数控制在可管理的水平。\n\
  \n队列必须执行哪些优先级规则？\n\n在 PQ 中，处于更深层级（层级编号更高）的节点比处于更浅层级的节点具有更高的优先级。这确保了树向下生长，并且代表完整路线的叶节点能够尽快生成。在比较同一层级的两个节点时，优先考虑具有最小下界的节点。如果出现平局（两个节点具有相等的下界），则计算部分路线中城市编号的总和。总和较小的节点比总和较大的节点具有更高的优先级（平局不可能发生）。刚刚陈述的规则禁止两个不同的节点具有相等的优先级。\n\
  \n我们将遍历前面提到的五城示例的一部分，以了解优先队列是如何构建的。\n\n### 遍历前面提到的五城示例的一部分\n\n初始成本通过计算路线 `[0, 1,\
  \ …, n – 1, 0]` 的成本得到，其值为 `50`。由于前面显示根节点的下界为 19，因此我们将部分路线 `[0]` 推入 PQ。我们从 PQ 中取出路线\
  \ `[0]`，并生成第 1 层的节点。除了一个节点外，所有节点的下界都小于 50，因此我们将它们推入 PQ。PQ 顶部是 `[0, 2]`，其下界为 19。接下来是\
  \ `[0, 1]`，下界为 39，第三个是 `[0, 3]`，下界为 43。我们按照算法中的规定继续生成节点，如图 18-1 所示。\n\n![](img/527841_1_En_18_Fig1_HTML.png)\n\
  \n图 18-1 部分解树\n\n完整路线 `[0, 2, 1, 3, 4]` 是第一个被生成的。由于其成本小于当前最佳值 50，我们设定最佳路线为 `[0,\
  \ 2, 1, 3, 4]`，其成本为 41。\n\nPQ 的前端包含节点 `[0, 2, 1, 4]`，因为它处于最深层。算法回溯到该节点，然后生成另一条完整路线\
  \ `[0, 2, 1, 4, 3]`，其成本也是 41。这使得一些节点在从 PQ 中取出时可以被剪掉，因为它们的下界大于 `41`。\n\n您可能希望继续处理这个示例的其余过程。\n\
  \n下一节，我们将探讨该算法的实现。\n\n\n\n\n## 18.2 分支定界法的实现\n\n支持该分支定界算法所需的最重要功能之一，是计算给定旅程的下界。该函数如下所示：\n\
  \n```\nfunc LowerBound(tour []int) float64 {\nedges := make([]float64, 0)\nsum :=\
  \ 0.0\nn := len(tour)\nfor city := 0; city < n; city++ {\npos := 0\nfound := false\n\
  for index := 0; index < n; index++ {\nif city == tour[index] {\nfound = true\npos\
  \ = index\nbreak\n}\n}\nif n > 1 && found {\nif pos == n-1 {\nedges = append(edges,\n\
  graph[city][0])\n} else {\nedges = append(edges,\ngraph[city][tour[pos+1]])\n}\n\
  break\n}\nfound, _ = In(index, tour)\nif n == 1 || !found {\n// 不允许已在旅程中的索引\nedges\
  \ = append(edges,\ngraph[city][index])\n}\n}\nsum += Minimum(edges)\nedges = make([]float64,\
  \ 0)\n}\nreturn sum\n}\n```\n\n该函数的工作方式与第 18.1 节中介绍的算法大纲完全一致。\n\n一个关键的辅助函数是 `In`，如下所示：\n\
  \n```\nfunc In(value int, values []int) (bool, int) {\n// 若 value 存在于 values 中则返回\
  \ true\n// 返回位置索引，若未找到则返回 -1\nfor index := 0; index < len(values); index++ {\nif\
  \ values[index] == value {\nreturn true, index\n}\n}\nreturn false, -1\n}\n```\n\
  \n### 优先队列的实现\n\n优先队列在此算法中起着核心作用。它存储节点，每个节点包含一个旅程、一个下界和一个层级，其优先级按第 18.1 节中的规定定义，为方便起见在此重复：\n\
  \n- 在 PQ 中，层级更深（层级编号更高）的节点优先于层级较浅的节点。\n- 如果节点处于同一层级，则优先级赋予下界最小的节点。\n- 如果同一层级的两个节点具有相同的下界，则累加节点旅程中的城市，总和较大的节点具有更高优先级。\n\
  \n支持优先队列实现的代码如下：\n\n```\ntype Node struct {\ntour       []int\nlowerBound float64\n\
  level      int\n}\ntype Nodes []Node\n// 允许节点排序\nfunc (nodes Nodes) Len() int {\n\
  return len(nodes)\n}\nfunc (nodes Nodes) Swap(i, j int) {\nnodes[i], nodes[j] =\
  \ nodes[j], nodes[i]\n}\nfunc (nodes Nodes) Less(i, j int) bool {\nif nodes[i].level\
  \ > nodes[j].level {\nreturn true\n}\nif nodes[i].level == nodes[j].level &&\nnodes[i].lowerBound\
  \ == nodes[j].lowerBound {\n// 返回较小的城市总和\ntour1 := nodes[i].tour\nsum1 := 0\nfor\
  \ i := 0; i < len(tour1); i++ {\nsum1 += tour1[i]\n}\ntour2 := nodes[j].tour\nsum2\
  \ := 0\nfor i := 0; i < len(tour2); i++ {\nsum2 += tour2[i]\n}\nreturn sum1 < sum2\n\
  }\nif nodes[i].level == nodes[j].level &&\nnodes[i].lowerBound != nodes[j].lowerBound\
  \ {\nreturn nodes[i].lowerBound <\nnodes[j].lowerBound\n}\nreturn false\n}\ntype\
  \ PriorityQueue struct {\nitems Nodes\n}\nfunc NewPriorityQueue() PriorityQueue\
  \ {\nreturn PriorityQueue{}\n}\nfunc (pq *PriorityQueue) Insert(node Node) {\ntourToInsert\
  \ := DeepCopy(node.tour)\nnodeToInsert := Node{tourToInsert, node.lowerBound,\n\
  node.level}\npq.items = append(pq.items, nodeToInsert)\nsort.Sort(pq.items)\n}\n\
  func (pq *PriorityQueue) Remove() Node {\nresult := pq.items[0]\npq.items = pq.items[1:]\n\
  return result\n}\n```\n\n优先队列（PQ）持有类型为 `Node` 的实体。每次向队列中插入新节点时，我们都会对队列进行排序，以确保优先级最高的节点位于队列前面。\n\
  \n为了实现对 PQ 中节点的排序，我们需要实现 `sort` 包中 `Sort` 方法的接口。\n\n这是通过前面给出的函数 `Len`、`Swap` 和 `Less`\
  \ 完成的。三个优先级规则均在函数 `Less` 中实现。\n\n`Insert` 函数在追加正在插入的节点后对项目（`Node` 切片）进行排序。\n\n###\
  \ 生成分支定界解\n\n根据第 18.1 节大纲生成节点、将其插入优先队列、寻找最佳新旅程，并在剪除下界超过当前已知最佳旅程的节点时进行回溯的函数，如下所示为函数\
  \ `TSP`：\n\n```\nfunc TSP() {\nvar elapsed time.Duration\nstart := time.Now()\n\
  bestTour := []int{}\nfor i := 0; i < NUMCITIES; i++ {\nbestTour = append(bestTour,\
  \ i)\n}\npq := NewPriorityQueue()\nbestCost := LowerBound(bestTour)\ntour := []int{0}\n\
  lowerBound := LowerBound(tour)\nnode := Node{tour, lowerBound, 0}\nnodesGenerated\
  \ += 1\npq.Insert(node)\nfor {\nif len(pq.items) == 0 {\nbreak\n}\ntop := pq.Remove()\n\
  topLevel := top.level\ntopTour := top.tour\n// 生成 topLevel + 1 层的节点\nfor i := 0;\
  \ i < NUMCITIES; i++ {\ntour := DeepCopy(topTour)\nfound, _ := In(i, topTour)\n\
  if !found {\ntour = append(tour, i)\nnodesGenerated += 1\nif nodesGenerated %\n\
  10_000_000 == 0 {\nfmt.Println(\"\\n 生成的节点数（以百万计）: \", nodesGenerated /\n1_000_000)\n\
  fmt.Printf(\"\\n\\n 最优旅程成本:\n%0.2f  \\n 最佳旅程: %v\", bestCost,\nbestTour)\nelapsed\
  \ = time.Since(start)\nseconds := elapsed / 1_000_000_000\nrate := float64(nodesGenerated)\
  \ /\nfloat64(seconds)\nfmt.Printf(\"\\n 每秒生成的节点数: %0.0f  PQ 长度: %d\n已用时间: %v\",\
  \ rate,\nlen(pq.items), elapsed)\n}\nif len(tour) == NUMCITIES {\n// 得到一个完整的旅程\n\
  tourCost := LowerBound(tour)\nif tourCost < bestCost {\nbestTour = tour\nbestCost\
  \ = tourCost\nfmt.Println(\"\\n\\n 迄今为止的最佳旅程\n成本: \", bestCost)\n}\n} else {\ntourCost\
  \ := LowerBound(tour)\nif tourCost < bestCost {\nnode := Node{tour, tourCost,\n\
  topLevel + 1}\npq.Insert(node)\n}\n}\n}\n}\n}\nfmt.Printf(\"\\n\\n 最优旅程成本: %0.2f\
  \  \\n 最佳\n旅程: %v  \\n 生成的节点数: %d\", bestCost,\nbestTour, nodesGenerated)\n}\n```\n\
