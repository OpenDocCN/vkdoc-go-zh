  \n### 对 `binarysearchtree` 包和主驱动程序的讨论\n\n清单 9-5 中用于显示二叉搜索树的代码在多个地方使用了`.String()`，因为类型`T`是未知的。该清单中以**粗体**标出了对`String()`的调用。\n\
  \n主驱动程序中使用了两棵二叉搜索树。使用的泛型类型是`Number`和`Float`。由于这两种类型都定义了`String()`函数，因此它们都隐式地属于`OrderedStringer`类型。\n\
  \n构造了一棵基础类型为`float64`的二叉搜索树，包含 30 个节点。每次调用都会生成一棵不同的树。图 9-3 展示了其中一棵树。\n\n![](img/527841_1_En_9_Fig3_HTML.png)\n\
  \n**图 9-3** 一棵 30 节点的二叉搜索树\n\n这棵随机生成的二叉搜索树是不平衡的。左子树的深度为 5，而右子树的深度为 8。\n\n第二棵二叉搜索树的基础类型为`Number`，通过按顺序插入\
  \ 100,000 个整数构建而成。本质上，这是一条链表。构建这棵完全不平衡的搜索树花费了 35.6 秒。\n\n## 9.3 总结\n\n在本章中，我们实现了一个泛型二叉搜索树。我们对绘制树的逻辑进行了轻微修改，以便能够输出基础类型`T`。\n\
  \n在下一章中，我们将介绍最重要的二叉搜索树之一——AVL 树。当新节点添加到树中时，这棵树会保持其平衡。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\
  \n\n"
- "# 10\\. AVL 树\n\n在上一章中，我们介绍了二叉搜索树。在这种树中，每个节点包含一个关键字，该关键字大于其左子树中的所有关键字，且小于其右子树中的所有关键字。不允许有重复的关键字。\n\
  \n在构建二叉搜索树时，其平衡性取决于关键字插入的顺序。例如，如果关键字按升序插入，那么搜索树就会类似于一个链表，所有节点都在根节点的右侧。\n\n1962 年，两位俄罗斯数学家\
  \ Adelson Velsky 和 Landis 定义了一种关于搜索树平衡性的有用定义（后来为纪念他们而被称为 AVL 平衡），并描述了能够保持 AVL 平衡的\
  \ `insert` 和 `remove` 算法。他们的工作已成为数据结构领域经典的组成部分。\n\n在下一节中，我们将概述 AVL 树。\n\n## 10.1\
  \ 概述：Adelson Velsky 与 Landis\n\n在本章中，我们将探索并实现一个通用的 AVL 树。\n\n对于任何二叉搜索树，`Insert`、`Delete`\
  \ 和 `Search` 操作的效率都取决于搜索树的平衡程度。如果树中有 `n` 个节点，且树是平衡的，那么每个操作大约需要 `log2 n` 次操作。\n\n\
  如果一个二叉搜索树满足以下条件，则将其定义为 AVL 树：**对于树中的每个节点，其左子树的最大深度减去右子树的最大深度，其绝对值小于等于 1**。也就是说，每个节点的\
  \ AVL 平衡值（由左子树深度减去右子树深度得到）只能是 -1、0 或 1。\n\n在下面的树中，显示了每个节点的 AVL 平衡值（此处简称为平衡值）。平衡值为\
  \ 0 的节点未显示。由于节点 A 的存在，这棵树不是 AVL 树。\n\n![](img/527841_1_En_10_Figa_HTML.png)\n\n\
  一棵二叉树的示意图，其中值为-2 的节点 A 有两个子节点 B 和 C，值为-1 的节点 C 有两个子节点 D 和 E。值为-1 的节点 E 有一个右子节点 F。\n\
  \n请验证以下搜索树是一棵 AVL 树。\n\n![](img/527841_1_En_10_Figb_HTML.png)\n\n一棵二叉树的示意图，其中根节点\
  \ 10 有两个子树。左子树的父节点 5 有两个子节点 3 和 6。节点 3 有两个子节点 2 和 4，节点 2 有一个值为 1 的左子节点。右子节点 6 有一个值为\
  \ 8 的右子节点。右子树的节点 15 有两个子节点 13 和 20，左节点 13 有一个值为 12 的左子节点。\n\nAVL 的插入和删除算法涉及树的旋转。我们用上面的树来演示。\n\
  \n### 树的旋转\n\n对节点 10 执行右旋得到：\n\n![](img/527841_1_En_10_Figc_HTML.png)\n\n一棵二叉树的示意图，其中节点\
  \ 5 有两个子树。左子树的父节点 3 有两个子节点 2 和 4。节点 2 有一个值为 1 的左子节点。右子树的节点 10 有两个子节点 6 和 15，节点 6\
  \ 有一个值为 8 的右子节点，右节点 15 有两个子节点 13 和 20，节点 13 有一个值为 12 的左子节点。\n\n当 10 向右旋转时，5 的右子节点变为节点\
  \ 10。这使得 6 和 8 成为孤儿节点。由于它们都大于 5 且小于 10，因此它们被放置在 10 的左子树和 5 的右子树中，如上图所示。\n\n对节点 10\
  \ 执行左旋得到：\n\n![](img/527841_1_En_10_Figd_HTML.png)\n\n一棵二叉树的示意图，其中节点 5 有两个子树。左侧文字为“左子树不变”。右子树的父节点\
  \ 15 有两个子节点 10 和 20，左节点 10 有两个子节点 6 和 13，其中节点 6 有一个值为 8 的右子节点，节点 13 有一个值为 12 的左子节点。\n\
  \n孤儿节点 13 和 12 大于 10 且小于 15，它们被放置在上图所示的位置。\n\n执行树旋转涉及的计算工作量非常少。整个树中只需要修改两个链接。无论树的大小如何，这一点都成立。\n\
  \nAVL 算法的精妙之处在于 `Insert` 和 `Delete` 方法。这两个方法都需要在操作后产生一棵 AVL 树。\n\n### 插入\n\n我们首先考虑\
  \ AVL 插入。包含四个步骤。\n\n1.  在 AVL 树上执行一次普通的二叉搜索树插入。如果树仍然是 AVL 树，则停止。\n2.  从插入的节点（始终位于叶节点位置）开始，沿着搜索路径回溯到根节点。如果发现一个节点组合，其中父节点的平衡值绝对值为\
  \ 2，其子节点的平衡值绝对值为 1，且符号相同（例如，-2 和 -1 或 2 和 1），则存在 **类型 1** 的配置。如果符号相反（例如，-2 和 1 或\
  \ 2 和 -1），则存在 **类型 2** 的配置。\n3.  如果配置是类型 1，则对父节点执行一次单一旋转，以恢复平衡。\n4.  如果配置是类型 2，则执行两次旋转。第一次旋转在子节点上进行，方向与恢复平衡的方向一致。然后，对父节点执行第二次旋转，方向与第一次旋转相反。\n\
  \n这些步骤保证能生成一棵保持 AVL 属性的搜索树。其证明超出了本书的范围。\n\n### 删除\n\nAVL 删除的步骤如下：\n\n1.  执行一次普通的二叉搜索树删除。如果树是\
  \ AVL 树，则停止。\n2.  如果经过普通删除后树不再是 AVL 树，则从被删除的节点开始，沿着搜索路径遍历到根节点。当出现以下平衡值组合之一时停止：\n\
  \    a. 父节点的平衡值绝对值为 2，子节点的平衡值绝对值为 1。按照与插入相同的方式判断配置类型，并执行相同类型的单一旋转或两次旋转序列。\n    b.\
  \ 父节点的平衡值为 2 或 -2，而子节点的平衡值为 0。将此视为类型 1 配置，并对父节点执行适当的单一旋转。\n    c. 重新评估父节点上方节点的平衡值。由于步骤\
  \ a 或 b 中执行的旋转操作，可能会出现另一个需要处理的类型 1 或类型 2 配置。继续执行步骤 c，直到到达根节点且无需进一步的旋转修正。\n\n图 10-1\
  \ 展示了一棵需要执行步骤 c 的树。\n\n![](img/527841_1_En_10_Fig1_HTML.jpg)\n\n一棵二叉树的示意图，其中节点 10\
  \ 有两个子树。左子树的父节点 5 有两个子节点 3 和 6。节点 3 有两个子节点 2 和 4，节点 2 有一个值为 1 的左子节点。右子节点 6 有一个值为\
  \ 8 的右子节点。右子树的节点 15 有两个子节点 13 和 20，左节点 13 有一个值为 12 的左子节点。\n\n**图 10-1** — 用于说明 AVL\
  \ 删除的树\n\n我们想要删除节点 20。在普通删除 20 后，节点 15 的平衡值变为 2。这促使我们对节点 15 执行一次右旋。节点 13 向上移动，成为根节点\
  \ 10 的右子节点。\n\n但现在，根节点 10 的平衡值也变成了 2，因为它的左子树高度为 4，右子树高度为 2（在第一次旋转中，右子树丢失了一层高度）。我们通过对节点\
  \ 10 执行一次右旋来修正这个情况。作为练习，请画出结果树的草图。\n\n作为练习，请画出在步骤 c 之后得到的 AVL 树的草图。\n\n\n\n### 关于\
  \ AVL 树的事实\n\n以下是关于 AVL 树的一些有趣事实：\n\n- 向 AVL 树插入节点时，大约 50% 的插入操作不需要进行旋转修正。在剩下的 50%\
  \ 中，约一半需要类型 1 的单次旋转修正，另一半需要类型 2 的旋转修正。\n- 从 AVL 树删除节点时，约 80% 的情况不需要旋转修正。在剩下的 20%\
  \ 中，约一半是类型 1，一半是类型 2。在搜索树中需要多次旋转修正的情况非常罕见。\n\n下一节，我们将介绍一个通用 AVL 树的实现。\n\n## 实现一个通用\
  \ AVL 树\n\n代码清单 10-1 展示了一个完整的 `avl` 包。与二叉搜索树一样，我们包含了用于显示 AVL 树的辅助代码。\n\n```\npackage\
  \ avl\n\nimport (\n\t\"image/color\"\n\t\"log\"\n\t\"fyne.io/fyne/v2\"\n\t\"fyne.io/fyne/v2/app\"\
  \n\t\"fyne.io/fyne/v2/canvas\"\n\t\"fyne.io/fyne/v2/theme\"\n\t\"github.com/mitchellh/go-homedir\"\
  \n\t\"gonum.org/v1/plot\"\n\t\"gonum.org/v1/plot/plotter\"\n\t\"gonum.org/v1/plot/vg\"\
  \n\t\"gonum.org/v1/plot/vg/draw\"\n)\n\ntype ordered interface {\n\t~int | ~float64\
  \ | ~string\n}\n\ntype AVLTree[T OrderedStringer] struct {\n\tRoot     *Node[T]\n\
  \tNumNodes int\n}\n\ntype Node[T OrderedStringer] struct {\n\tValue T\n\tLeft  *Node[T]\n\
  \tRight *Node[T]\n\tHt    int\n}\n\ntype OrderedStringer interface {\n\tordered\n\
  \tString() string\n}\n\n// Methods\nfunc (avl *AVLTree[T]) Insert(newValue T) {\n\
  \tif avl.Search(newValue) == false { // newValue is not in existing tree\n\t\tavl.Root\
  \ = insertNode(avl.Root, newValue)\n\t\tavl.NumNodes += 1\n\t}\n}\n\nfunc (avl *AVLTree[T])\
  \ Delete(value T) {\n\tif avl.Search(value) == true {\n\t\tavl.Root = deleteNode(avl.Root,\
  \ value)\n\t\tavl.NumNodes -= 1\n\t}\n}\n\nfunc (avl *AVLTree[T]) Search(value T)\
  \ bool {\n\treturn search(avl.Root, value)\n}\n\nfunc (avl *AVLTree[T]) Height()\
  \ int {\n\treturn avl.Root.Height()\n}\n\nfunc (avl *AVLTree[T]) InOrderTraverse(f\
  \ func(T)) {\n\tinOrderTraverse(avl.Root, f)\n}\n\nfunc (avl *AVLTree[T]) Min()\
  \ *T {\n\tnode := avl.Root\n\tif node == nil {\n\t\treturn nil\n\t}\n\tfor {\n\t\
  \tif node.Left == nil {\n\t\t\treturn &node.Value\n\t\t}\n\t\tnode = node.Left\n\
  \t}\n}\n\nfunc (avl *AVLTree[T]) Max() *T {\n\tnode := avl.Root\n\tif node == nil\
  \ {\n\t\treturn nil\n\t}\n\tfor {\n\t\tif node.Right == nil {\n\t\t\treturn &node.Value\n\
  \t\t}\n\t\tnode = node.Right\n\t}\n}\n\nfunc (n *Node[T]) balanceFactor() int {\n\
  \tif n == nil {\n\t\treturn 0\n\t}\n\treturn n.Left.Height() - n.Right.Height()\n\
  }\n\nfunc (n *Node[T]) Height() int {\n\tif n == nil {\n\t\treturn 0\n\t} else {\n\
  \t\treturn n.Ht\n\t}\n}\n\nfunc (n *Node[T]) updateHeight() {\n\tmax := func(a,\
  \ b int) int {\n\t\tif a > b {\n\t\t\treturn a\n\t\t}\n\t\treturn b\n\t}\n\tn.Ht\
  \ = max(n.Left.Height(), n.Right.Height()) + 1\n}\n\n// Support functions\nfunc\
  \ newNodeT OrderedStringer *Node[T] {\n\treturn &Node[T]{\n\t\tValue: val,\n\t\t\
  Left:  nil,\n\t\tRight: nil,\n\t\tHt:    1,\n\t}\n}\n\nfunc searchT OrderedStringer\
  \ bool {\n\tif n == nil {\n\t\treturn false\n\t}\n\tif value < n.Value {\n\t\treturn\
  \ search(n.Left, value)\n\t} else if value > n.Value {\n\t\treturn search(n.Right,\
  \ value)\n\t}\n\treturn true\n}\n\nfunc insertNodeT OrderedStringer *Node[T] {\n\
  \t// if there's no node, create one\n\tif node == nil {\n\t\treturn newNode(val)\n\
  \t}\n\t// if value is greater than current node's value, insert to the right\n\t\
  if val > node.Value {\n\t\tright := insertNode(node.Right, val)\n\t\tnode.Right\
  \ = right\n\t}\n\t// if value is less than current node's value, insert to the left\n\
  \tif val < node.Value {\n\t\tleft := insertNode(node.Left, val)\n\t\tnode.Left =\
  \ left\n\t}\n\treturn rotateInsert(node, val)\n}\n\nfunc rotateInsertT OrderedStringer\
  \ *Node[T] {\n\tnode.updateHeight()\n\tbFactor := node.balanceFactor()\n\tif bFactor\
  \ > 1 && val < node.Left.Value {\n\t\treturn rightRotate(node)\n\t}\n\tif bFactor\
  \ < -1 && val > node.Right.Value {\n\t\treturn leftRotate(node)\n\t}\n\tif bFactor\
  \ > 1 && val > node.Left.Value {\n\t\tnode.Left = leftRotate(node.Left)\n\t\treturn\
  \ rightRotate(node)\n\t}\n\tif bFactor < -1 && val < node.Right.Value {\n\t\tnode.Right\
  \ = rightRotate(node.Right)\n\t\treturn leftRotate(node)\n\t}\n\treturn node\n}\n\
  \nfunc rightRotateT OrderedStringer *Node[T] {\n\tx := y.Left\n\tt2 := x.Right\n\
  \tx.Right = y\n\ty.Left = t2\n\ty.updateHeight()\n\tx.updateHeight()\n\treturn x\n\
  }\n\nfunc leftRotateT OrderedStringer *Node[T] {\n\ty := x.Right\n\tt2 := y.Left\n\
  \ty.Left = x\n\tx.Right = t2\n\tx.updateHeight()\n\ty.updateHeight()\n\treturn y\n\
  }\n\nfunc rotateDeleteT OrderedStringer *Node[T] {\n\tnode.updateHeight()\n\tbFactor\
  \ := node.balanceFactor()\n\tif bFactor > 1 && node.Left.balanceFactor() >= 0 {\n\
  \t\treturn rightRotate(node)\n\t}\n\tif bFactor > 1 && node.Left.balanceFactor()\
  \ < 0 {\n\t\tnode.Left = leftRotate(node.Left)\n\t\treturn rightRotate(node)\n\t\
  }\n\tif bFactor < -1 && node.Right.balanceFactor() <= 0 {\n\t\treturn leftRotate(node)\n\
  \t}\n\tif bFactor < -1 && node.Right.balanceFactor() > 0 {\n\t\tnode.Right = rightRotate(node.Right)\n\
  \t\treturn leftRotate(node)\n\t}\n\treturn node\n}\n\nfunc deleteNodeT OrderedStringer\
  \ *Node[T] {\n\tif node == nil {\n\t\treturn nil\n\t}\n\tif val > node.Value {\n\
  \t\tright := deleteNode(node.Right, val)\n\t\tnode.Right = right\n\t} else if val\
  \ < node.Value {\n\t\tleft := deleteNode(node.Left, val)\n\t\tnode.Left = left\n\
  \t} else {\n\t\tif node.Left != nil && node.Right != nil {\n\t\t\t// has 2 children,\
  \ find the successor\n\t\t\tsuccessor := largest(node.Left)\n\t\t\tvalue := successor.Value\n\
  \t\t\t// remove the successor\n\t\t\tleft := deleteNode(node.Left, value)\n\t\t\t\
  node.Left = left\n\t\t\t// copy the successor value to the current node\n\t\t\t\
  node.Value = value\n\t\t} else if node.Left != nil || node.Right != nil {\n\t\t\t\
  // has 1 child\n\t\t\t// move the child position to the current node\n\t\t\tif node.Left\
  \ != nil {\n\t\t\t\tnode = node.Left\n\t\t\t} else {\n\t\t\t\tnode = node.Right\n\
  \t\t\t}\n\t\t} else if node.Left == nil && node.Right == nil {\n\t\t\t// has no\
  \ child\n\t\t\t// simply remove the node\n\t\t\tnode = nil\n\t\t}\n\t\tif node ==\
  \ nil {\n\t\t\treturn nil\n\t\t}\n\t\treturn rotateDelete(node)\n\t}\n\treturn node\n\
  }\n\nfunc largestT OrderedStringer *Node[T] {\n\tif node == nil || node.Right ==\
  \ nil {\n\t\treturn node\n\t}\n\treturn largest(node.Right)\n}\n\nfunc inOrderTraverseT\
  \ OrderedStringer) {\n\tif node != nil {\n\t\tinOrderTraverse(node.Left, f)\n\t\t\
  f(node.Value)\n\t\tinOrderTraverse(node.Right, f)\n\t}\n}\n\n// Logic for drawing\
  \ tree\ntype NodePair struct {\n\tVal1, Val2 string\n}\n\ntype NodePos struct {\n\
  \tVal  string\n\tYPos int\n\tXPos int\n}\n\nvar data []NodePos\nvar endPoints []NodePair\n\
  \nfunc PrepareDrawTreeT OrderedStringer {\n\tprepareToDraw(tree)\n}\n\nfunc FindXY(val\
  \ interface{}) (int, int) {\n\tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val\
  \ == val {\n\t\t\treturn data[i].XPos, data[i].YPos\n\t\t}\n\t}\n\treturn -1, -1\n\
  }\n\nfunc FindX(val interface{}) int {\n\tfor i := 0; i < len(data); i++ {\n\t\t\
  if data[i].Val == val {\n\t\t\treturn i\n\t\t}\n\t}\n\treturn -1\n}\n\nfunc SetXValues()\
  \ {\n\tfor index := 0; index < len(data); index++ {\n\t\txValue := FindX(data[index].Val)\n\
  \t\tdata[index].XPos = xValue\n\t}\n}\n\nfunc prepareToDrawT OrderedStringer {\n\
  \tinorderLevel(tree.Root, 1)\n\tSetXValues()\n\tgetEndPoints(tree.Root, nil)\n}\n\
  \nfunc inorderLevelT OrderedStringer {\n\tif node != nil {\n\t\tinorderLevel(node.Left,\
  \ level+1)\n\t\tdata = append(data, NodePos{node.Value.String(), 100 - level, -1})\n\
  \t\tinorderLevel(node.Right, level+1)\n\t}\n}\n\nfunc getEndPointsT OrderedStringer\
  \ {\n\tif node != nil {\n\t\tif parent != nil {\n\t\t\tendPoints = append(endPoints,\
  \ NodePair{node.Value.String(), parent.Value.String()})\n\t\t}\n\t\tgetEndPoints(node.Left,\
  \ node)\n\t\tgetEndPoints(node.Right, node)\n\t}\n}\n\nvar path string\n\nfunc DrawGraph(a\
  \ fyne.App, w fyne.Window) {\n\timage := canvas.NewImageFromResource(theme.FyneLogo())\n\
  \timage = canvas.NewImageFromFile(path + \"tree.png\")\n\timage.FillMode = canvas.ImageFillOriginal\n\
  \tw.SetContent(image)\n\tw.Close()\n\tw.Show()\n}\n\nfunc ShowTreeGraphT OrderedStringer\
  \ {\n\tPrepareDrawTree(myTree)\n\tmyApp := app.New()\n\tmyWindow := myApp.NewWindow(\"\
  Tree\")\n\tmyWindow.Resize(fyne.NewSize(1000, 600))\n\tpath, _ = homedir.Dir()\n\
  \tpath += \"/Desktop/\"\n\tnodePts := make(plotter.XYs, myTree.NumNodes)\n\tfor\
  \ i := 0; i < len(data); i++ {\n\t\tnodePts[i].Y = float64(data[i].YPos)\n\t\tnodePts[i].X\
  \ = float64(data[i].XPos)\n\t}\n\tnodePtsData := nodePts\n\tp := plot.New()\n\t\
  p.Add(plotter.NewGrid())\n\tnodePoints, err := plotter.NewScatter(nodePtsData)\n\
  \tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tnodePoints.Shape = draw.CircleGlyph{}\n\
  \tnodePoints.Color = color.RGBA{G: 255, A: 255}\n\tnodePoints.Radius = vg.Points(12)\n\
  \n\t// Plot lines\n\tfor index := 0; index < len(endPoints); index++ {\n\t\tval1\
  \ := endPoints[index].Val1\n\t\tx1, y1 := FindXY(val1)\n\t\tval2 := endPoints[index].Val2\n\
  \t\tx2, y2 := FindXY(val2)\n\t\tpts := plotter.XYs{{X: float64(x1), Y: float64(y1)},\
  \ {X: float64(x2), Y: float64(y2)}}\n\t\tline, err := plotter.NewLine(pts)\n\t\t\
  if err != nil {\n\t\t\tlog.Panic(err)\n\t\t}\n\t\tscatter, err := plotter.NewScatter(pts)\n\
  \t\tif err != nil {\n\t\t\tlog.Panic(err)\n\t\t}\n\t\tp.Add(line, scatter)\n\t}\n\
  \tp.Add(nodePoints)\n\n\t// Add Labels\n\tfor index := 0; index < len(data); index++\
  \ {\n\t\tx := float64(data[index].XPos) - 0.2\n\t\ty := float64(data[index].YPos)\
  \ - 0.02\n\t\tstr := data[index].Val\n\t\tlabel, err := plotter.NewLabels(plotter.XYLabels{\n\
  \t\t\tXYs: []plotter.XY{\n\t\t\t\t{X: x, Y: y},\n\t\t\t},\n\t\t\tLabels: []string{str},\n\
  \t\t})\n\t\tif err != nil {\n\t\t\tlog.Fatalf(\"could not creates labels plotter:\
  \ %+v\", err)\n\t\t}\n\t\tp.Add(label)\n\t}\n\n\tpath, _ = homedir.Dir()\n\tpath\
  \ += \"/Desktop/GoDS/\"\n\terr = p.Save(1000, 600, \"tree.png\")\n\tif err != nil\
  \ {\n\t\tlog.Panic(err)\n\t}\n\tDrawGraph(myApp, myWindow)\n\tmyWindow.ShowAndRun()\n\
  }\n```\n\n*代码清单 10-1: avl 包*\n\n\n\n### `avl` 包说明\n\n有许多函数需要分析。最简单的方法是使用调试器。我使用了\
