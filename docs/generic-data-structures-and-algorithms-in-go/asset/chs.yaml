  ## 11.2 从堆树中删除


  我们只能删除堆树根节点中的值。要删除根节点的值 100，我们使用树中最低层最右侧节点的值（本例中为 30）替换根节点中的值。然后，我们将新的根节点值与其两个子节点的值进行比较，并与较大的子节点进行交换。我们继续这个下沉过程，直到没有更多节点需要交换。因此，30
