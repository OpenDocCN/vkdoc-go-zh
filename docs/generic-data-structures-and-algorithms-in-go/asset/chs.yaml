- "# 1. Go 语言泛型与并发初览\n\n本章介绍 Go 语言中泛型的语法和语义。通过大量代码示例，我们将展示这一强大新特性的应用，为全书后续使用泛型奠定基础。\n\
  \n本章还将回顾 Go 语言中的并发机制。通过大量代码示例与基准测试，对比使用并发算法与不使用并发算法时的性能差异，为全书后续使用并发技术打下基础。\n\n##\
  \ 1.1 Go 语言简史与概述\n\nGo 是一种相对较新的编程语言，于 2009 年底发布，由谷歌的罗伯特·格瑞史默（Robert Griesemer，瑞士计算机科学家，曾参与谷歌\
  \ V8 JavaScript 引擎的开发）、罗布·派克（Rob Pike，加拿大计算机科学家，曾是贝尔实验室 Unix 团队成员，Limbo 编程语言的创造者）以及肯·汤普逊（Ken\
  \ Thompson，Unix 操作系统和 B 编程语言的创造者）共同开发。\n\nGo 编程语言有时也被称为 Golang。为什么？因为该语言发布时 `go.org`\
  \ 域名不可用，于是便诞生了 `golang.org`（Go 与 language 的组合）。该语言的官方名称是 Go，但 Twitter 标签却是 `#golang`。别问为什么！\n\
  \n创建 Go 的主要目标之一是打造一种易读、强类型、静态类型，并具备垃圾回收、编译与执行速度快的语言，特别适合编写并发应用程序。\n\n`goroutine`\
  \ 是一种轻量级进程，比 Java 和 C# 等其他语言中常见的线程所需的内存开销更少。一个并发的 Go 程序可以生成成千上万个 goroutine，在数量少得多的线程上运行。`channel`\
  \ 结构（将在本章后面解释）允许将信息传入和传出 goroutine，并用于同步这些并发的轻量级进程。虽然并行处理并非 goroutine 的主要目标，但它们可用于在共享内存的多处理器计算机上近似实现并行处理。\n\
  \nGo 是一种跨平台语言，可在包括 MacOS 在内的各种 Unix 平台上运行，也可在 MS Windows 上运行。Go 应用程序可编译为二进制可执行文件，因此可以直接分发给客户，而无需像\
  \ Python 和其他解释型语言那样打包解释器和运行时库。\n\n与许多现代语言一样，Go 是一个公共开源项目。有许多免费工具可供下载。新包不断发布，因此该语言的许多强大功能并非来自语言本身，而是来自程序员可用的海量高质量包。从这个意义上说，Go\
  \ 与 Python 相似。\n\n可用的工具包括高质量的编辑器、调试器和 IDE。Go 要求统一的格式，因此 `gofmt` 工具通常会集成到各种代码编辑器中。拥有标准代码格式为\
  \ Go 编程团队以及检查他人代码的独立程序员提供了巨大的优势。\n\n那么 Go 缺少什么呢？它的缺点是什么？直到最新、也可能是最重要的版本 1.18 发布之前，Go\
  \ 一直缺乏泛型。随着 Go 的这个新版本的发布，这一主要缺点已不复存在。\n\n现在，你可以构建一个算法或数据结构，而无需在底层存储的数据发生变化时每次都进行修改。数据结构和算法实现可以专注于操作数据所需的核心逻辑。与泛型相关的新语法允许程序员精确描述数据必须满足哪些要求才能存储到特定的数据结构中。这进一步增强了程序员在代码本身中表达意图的能力。下一节将介绍并说明约束和非约束泛型参数的使用。\n\
  \n## 1.2 泛型参数介绍\n\n在本节中，我们将通过一系列示例来介绍和说明泛型类型参数的使用，包括非约束和约束类型。\n\n在最初的几个代码清单中，我们展示了一组向现有学生切片中添加新学生的相关问题。首先，我们仅向现有切片添加学生姓名。接着，我们向包含\
  \ ID 号的切片添加学生 ID 号。然后，我们向现有结构体切片添加包含姓名、ID 和年龄的结构体。最后，我们引入泛型，展示使用泛型类型参数所能实现的简化效果。\n\
  \n### 按姓名添加新学生\n\n考虑清单 1-1 中给出的简单 Go 应用程序。\n\n```go\npackage main\nimport(\n\"fmt\"\
  \n)\nfunc addStudent(students []string, student string) []string {\nreturn append(students,\
  \ student)\n}\nfunc main() {\nstudents := []string{} // 空切片\nresult := addStudent(students,\
  \ \"Michael\")\nresult = addStudent(result, \"Jennifer\")\nresult = addStudent(result,\
  \ \"Elaine\")\nfmt.Println(result)\n}\n/*\n输出:\n[Michael Jennifer Elaine]\n*/\n\
  清单 1-1\n一个学生姓名切片\n```\n\n函数 `addStudent` 接受一个表示当前学生集合的字符串切片作为第一个参数，以及一个表示要添加到集合中的新学生姓名的字符串作为第二个参数。使用\
  \ `append` 函数将新学生添加到现有切片中，并返回该结果。\n\n### 按 ID 号添加新学生\n\n假设我们希望使用学生的 ID 号（int 类型）而非姓名（string\
  \ 类型）来指定学生切片。\n\n我们需要修改清单 1-1，如清单 1-2 所示。\n\n```go\npackage main\nimport(\n\"fmt\"\
  \n)\nfunc addStudent(students []string, student string) []string {\nreturn append(students,\
  \ student)\n}\nfunc addStudentID(students []int, student int) []int {\nreturn append(students,\
  \ student)\n}\nfunc main() {\nstudents := []string{} // 空切片\nresult := addStudent(students,\
  \ \"Michael\")\nresult = addStudent(result, \"Jennifer\")\nresult = addStudent(result,\
  \ \"Elaine\")\nfmt.Println(result)\nstudents1 := []int{} // 空切片\nresult1 := addStudentID(students1,\
  \ 155)\nresult1 = addStudentID(result1, 112)\nresult1 = addStudentID(result1, 120)\n\
  fmt.Println(result1)\n}\n/* 输出\n[Michael Jennifer Elaine]\n[155 112 120]\n*/\n清单\
  \ 1-2\n添加学生 ID\n```\n\n函数 `addStudentID` 中的逻辑与函数 `addStudent` 中的逻辑基本相同。唯一的变化是切片的基础类型从\
  \ `string` 变为了 `int`。\n\n\n\n### 通过 `Student` 结构体添加新生\n\n为进一步推进，假设我们定义了一个 `Student`\
  \ 类型：\n\n```\ntype Student struct {\n    Name  string\n    ID    int\n    age  \
  \ float64\n}\n```\n\n并将清单 1-2 修改为清单 1-3 所示。\n\n```\npackage main\n\nimport (\n \
  \   \"fmt\"\n)\n\ntype Student struct {\n    Name  string\n    ID    int\n    age\
  \   float64\n}\n\nfunc addStudent(students []string, student string) []string {\n\
  \    return append(students, student)\n}\n\nfunc addStudentID(students []int, student\
  \ int) []int {\n    return append(students, student)\n}\n\nfunc addStudentStruct(students\
  \ []Student, student Student) []Student {\n    return append(students, student)\n\
  }\n\nfunc main() {\n    students := []string{} // 空切片\n    result := addStudent(students,\
  \ \"Michael\")\n    result = addStudent(result, \"Jennifer\")\n    result = addStudent(result,\
  \ \"Elaine\")\n    fmt.Println(result)\n\n    students1 := []int{} // 空切片\n    result1\
  \ := addStudentID(students1, 155)\n    result1 = addStudentID(result1, 112)\n  \
  \  result1 = addStudentID(result1, 120)\n    fmt.Println(result1)\n\n    students2\
  \ := []Student{} // 空切片\n    result2 := addStudentStruct(students2, Student{\"John\"\
  , 213, 17.5})\n    result2 = addStudentStruct(result2, Student{\"James\", 111, 18.75})\n\
  \    result2 = addStudentStruct(result2, Student{\"Marsha\", 110, 16.25})\n    fmt.Println(result2)\n\
  }\n\n/* 输出\n[Michael Jennifer Elaine]\n[155 112 120]\n[{John 213 17.5} {James 111\
  \ 18.75} {Marsha 110 16.25}]\n*/\n清单 1-3\n将 Student 类型加入混合\n```\n\n每当我们想要为各种学生集合添加新的底层数据类型时，都必须添加一个新函数，这很繁琐，也是\
  \ Go 早期版本的一个主要缺点。\n\n### 引入泛型\n\n进入 Go 1.18 版本，该版本引入了对泛型的支持。\n\n这个问题的泛型解决方案如清单 1-4\
  \ 所示。\n\n```\npackage main\n\nimport (\n    \"fmt\"\n)\n\ntype Stringer = interface\
  \ {\n    String() string\n}\n\ntype Integer int\n\nfunc (i Integer) String() string\
  \ {\n    return fmt.Sprintf(\"%d\", i)\n}\n\ntype String string\n\nfunc (s String)\
  \ String() string {\n    return string(s)\n}\n\ntype Student struct {\n    Name\
  \ string\n    ID   int\n    Age  float64\n}\n\nfunc (s Student) String() string\
  \ {\n    return fmt.Sprintf(\"%s %d %0.2f\", s.Name, s.ID, s.Age)\n}\n\nfunc addStudentT\
  \ Stringer []T {\n    return append(students, student)\n}\n\nfunc main() {\n   \
  \ students := []String{}\n    result := addStudentString\n    result = addStudentString\n\
  \    result = addStudentString\n    fmt.Println(result)\n\n    students1 := []Integer{}\n\
  \    result1 := addStudentInteger\n    result1 = addStudentInteger\n    result1\
  \ = addStudentInteger\n    fmt.Println(result1)\n\n    students2 := []Student{}\n\
  \    result2 := addStudentStudent\n    result2 = addStudentStudent\n    result2\
  \ = addStudent(result2, Student{\"Marsha\", 110, 16.25})\n    fmt.Println(result2)\n\
  }\n\n/* 输出\n[Michael Jennifer Elaine]\n[45 64 78]\n[John 213 17.50 James 111 18.75\
  \ Marsha 110 16.25]\n*/\n清单 1-4\n问题的泛型解决方案\n```\n\n### `Stringer` 类型\n\n`Stringer`\
  \ 类型被定义为一个包含一个方法签名的接口：\n\n`String() string`\n\n任何实现了此类型（即拥有明确定义的 `String()` 方法）的实体，都可以被转换为字符串以便输出。由于我们希望能够输出各种学生集合（切片），我们将泛型函数\
  \ `addStudent` 签名中的数据类型 `T` 约束为 `Stringer` 类型。\n\n### 受约束的泛型类型\n\n我们单个 `addStudent`\
  \ 函数的泛型签名变为：\n\n`func addStudentT Stringer []T`\n\n定义了 `Integer`、`String` 和 `Student`\
  \ 类型以及各自的 `String()` 方法定义，这样我们就可以使用这些 `Stringer` 类型来调用泛型函数 `addStudent`。\n\n###\
  \ 实现接口\n\n在 Go 中，通过实现接口定义中指定的函数来隐式实现接口。在这种情况下，任何实现了 `String()` 函数的类型都可以被认为是 `Stringer`\
  \ 类型。\n\n### 实例化泛型类型\n\n在 `main` 函数中，将 `students` 声明为 `String` 类型的空切片（而非字符串切片）后，我们调用\
  \ `addStudentString`。\n\n被约束为 `Stringer` 类型的泛型参数 `T` 被实际的实例化类型 `String` 替换，我们知道\
  \ `String` 属于 `Stringer` 类型，因为它实现了 `Stringer` 接口（该接口有具体的 `String()` 方法定义）。\n\n接下来，我们使用\
  \ `Integer` 作为 `Stringer` 类型来调用 `addStudent`。最后，我们使用 `Student` 作为 `Stringer` 类型来调用\
  \ `addStudent`。\n\n### 无约束的泛型类型 `any`\n\n如果我们用无约束类型 `any` 替换受约束的泛型类型 `[T Stringer]`，Go\
  \ 编译器可以进行类型推断。\n\n清单 1-5 展示了一个更简单、更简洁的 `addStudent` 泛型实现，以及一个驱动函数 `main`，它执行这个泛型函数。\n\
  \n```\npackage main\n\nimport (\n    \"fmt\"\n)\n\ntype Student struct {\n    Name\
  \ string\n    ID   int\n    Age  float64\n}\n\nfunc addStudentT any []T {\n    return\
  \ append(students, student)\n}\n\nfunc main() {\n    students := []string{}\n  \
  \  result := addStudentstring\n    result = addStudentstring\n    result = addStudentstring\n\
  \    fmt.Println(result)\n\n    students1 := []int{}\n    result1 := addStudentint\n\
  \    result1 = addStudentint\n    result1 = addStudentint\n    fmt.Println(result1)\n\
  \n    students2 := []Student{}\n    result2 := addStudentStudent\n    result2 =\
  \ addStudentStudent\n    result2 = addStudent(result2, Student{\"Marsha\", 110,\
  \ 16.25})\n    fmt.Println(result2)\n}\n\n/* 输出\n[Michael Jennifer Elaine]\n[45\
  \ 64 78]\n[John 213 17.50 James 111 18.75 Marsha 110 16.25]\n*/\n清单 1-5\n更简单的泛型函数\
  \ addStudent\n```\n\n利用类型推断，编译器使用 `string`、`int` 和 `Student` 的默认转换，通过将每种类型转换为字符串来允许程序输出。\n\
  \n### 泛型的优势\n\n在清单 1-5 中，泛型的优势显而易见。将新生（第二个参数）追加到现有学生集合的简单算法，其表达方式与用于表示学生的具体类型无关。\n\
  \n假设我们希望在输出每个学生集合之前对其进行排序。我们可以使用下一节讨论的 `sort` 包来实现这一点。\n\n### 使用 Go 的 sort 包\n\n\
  Go 的 `sort` 包中的 `Sort` 函数 `sort.Sort` 要求被排序切片中的类型必须实现以下三个方法：\n\n1.  `Len`\n2.  `Less`\n\
  3.  `Swap`\n\n我们演示如何对实现为切片的泛型集合进行排序。\n\n我们按如下方式定义 `OrderedSlice`，并提供所需的 `Len`、`Less`\
  \ 和 `Swap` 方法组。\n\n```\n// 确保 OrderedSlice 可以被排序的函数组\ntype OrderedSlice[T Ordered]\
  \ []T // T 必须实现\n\nfunc (s OrderedSlice[T]) Len() int {\n    return len(s)\n}\n\n\
  func (s OrderedSlice[T]) Less(i, j int) bool {\n    return s[i] < s[j]\n}\n\nfunc\
  \ (s OrderedSlice[T]) Swap(i, j int) {\n    s[i], s[j] = s[j], s[i]\n}\n// OrderedSice\
  \ 的函数组结束\n```\n\n\n\n### Sort Type\n\n我们引入另一个类型 `SortType`，以及必需的 `Len`、`Less` 和\
  \ `Swap` 函数组。\n\n```\n// Group of functions that ensure that SortType can be sorted\n\
  type SortType[T any] struct {\n\tslice   []T\n\tcompare func(T, T) bool\n}\nfunc\
  \ (s SortType[T]) Len() int {\n\treturn len(s.slice)\n}\nfunc (s SortType[T]) Less(i,\
  \ j int) bool {\n\treturn s.compare(s.slice[i], s.slice[j])\n}\nfunc (s SortType[T])\
  \ Swap(i, j int) {\n\ts.slice[i], s.slice[j] = s.slice[j], s.slice[i]\n}\n// end\
  \ of group for SortType\n```\n\n最后，我们定义一个函数 `PerformSort`，它使用 `SortType` 如下：\n\n\
  ```\nfunc PerformSortT any bool) {\n\tsort.Sort(SortType[T]{slice, compare})\n}\n\
  ```\n\n`PerformSort` 的用户必须提供一个用于比较两个类型为 `T` 的元素的函数。\n\n清单 1-6 将此功能集成到实现泛型 `addStudent`\
  \ 函数的代码中，以允许我们使用导入的 `sort` 包及其 `Sort` 函数。\n\n```\npackage main\n\nimport (\n\t\"\
  fmt\"\n\t\"sort\"\n)\n\ntype Ordered interface {\n\t~int | ~float64 | ~string\n\
  }\n\ntype Student struct {\n\tName string\n\tID   int\n\tAge  float64\n}\n\nfunc\
  \ addStudentT any []T {\n\treturn append(students, student)\n}\n\n// Group of functions\
  \ that ensure that an OrderedSlice can be sorted\ntype OrderedSlice[T Ordered] []T\
  \ // T must implement \n\nfunc (s OrderedSlice[T]) Len() int {\n\treturn len(s)\n\
  }\n\nfunc (s OrderedSlice[T]) Less(i, j int) bool {\n\treturn s[i] < s[j]\n}\n\n\
  func (s OrderedSlice[T]) Swap(i, j int) {\n\ts[i], s[j] = s[j], s[i]\n}\n// end\
  \ group for OrderedSice\n\n// Group of functions that ensure that SortType can be\
  \ sorted\ntype SortType[T any] struct {\n\tslice   []T\n\tcompare func(T, T) bool\n\
  }\n\nfunc (s SortType[T]) Len() int {\n\treturn len(s.slice)\n}\n\nfunc (s SortType[T])\
  \ Less(i, j int) bool {\n\treturn s.compare(s.slice[i], s.slice[j])\n}\n\nfunc (s\
  \ SortType[T]) Swap(i, j int) {\n\ts.slice[i], s.slice[j] = s.slice[j], s.slice[i]\n\
  }\n// end of group for SortType\n\nfunc PerformSortT any bool) {\n\tsort.Sort(SortType[T]{slice,\
  \ compare})\n}\n\nfunc main() {\n\tstudents := []string{}\n\tresult := addStudentstring\n\
  \tresult = addStudentstring\n\tresult = addStudentstring\n\tsort.Sort(OrderedSlicestring)\n\
  \tfmt.Println(result)\n\n\tstudents1 := []int{}\n\tresult1 := addStudentint\n\t\
  result1 = addStudentint\n\tresult1 = addStudentint\n\tsort.Sort(OrderedSliceint)\n\
  \tfmt.Println(result1)\n\n\tstudents2 := []Student{}\n\tresult2 := addStudentStudent\n\
  \tresult2 = addStudentStudent\n\tresult2 = addStudent(result2,  Student{\"Marsha\"\
  , 110, 16.25} )\n\tPerformSortStudent bool {\n\t\treturn s1.Age < s2.Age // comparing\
  \ two Student values\n\t})\n\tfmt.Println(result2)\n}\n/* Output\n[Elaine Jennifer\
  \ Michael]\n[45 64 78]\n[{Marsha 110 16.25} {John 213 17.5} {James 111 18.75}]\n\
  */\nListing 1-6\nBuilding and sorting slices of students\n```\n\n### Map Functions\n\
  \nGo 语言中的 Map 函数很常见，它对切片执行转换，生成一个包含转换结果的新切片。考虑以下示例：\n\n```\nfunc MyMap(input []int,\
  \ f func(int) int) []int {\n\tresult := make([]int, len(input))\n\tfor index, value\
  \ := range input {\n\t\tresult[index] = f(value)\n\t}\n\treturn result\n}\n\nfunc\
  \ main() {\n\tslice := []int{1, 5, 2, 7, 4}\n\tresult := MyMap(slice, func(i int)\
  \ int {\n\t\treturn i * i\n\t})\n\tfmt.Println(result)\n}\n/* Output\n[1 25 4 49\
  \ 16]\n*/\n```\n\n`MyMap` 函数生成一个输出切片，其中包含输入切片中整数的平方。在将 `result` 声明为长度为 `len(slice)`\
  \ 的整数切片后，它遍历 `input` 中的值范围，根据传递给 `MyMap` 的函数 `f` 转换每个值。\n\n### 使 MyMap 成为泛型\n\n\
  `MyMap` 可以按如下方式泛型化：\n\n```\nfunc GenericMapT1, T2 any T2) []T2 {\n\tresult := make([]T2,\
  \ len(input))\n\tfor index, value := range input {\n\t\tresult[index] = f(value)\n\
  \t}\n\treturn result\n}\n```\n\n函数 `GenericMap` 接受两个泛型参数 `T1` 和 `T2`。使用传入的函数 `f`，它将\
  \ `input` 切片中的数据转换为类型 `T2`。这里，`T1` 和 `T2` 不受约束，它们都属于 `any` 类型。\n\n### Filter Functions\n\
  \nGo 语言中的 Filter 函数也很常见，它基于传入的函数对输入切片执行过滤操作。考虑以下示例：\n\n```\nfunc MyFilter(input\
  \ []float64, f func(float64) bool) []float64 {\n\tvar result []float64\n\tfor _,\
  \ value := range input {\n\t\tif f(value) == true {\n\t\t\tresult = append(result,\
  \ value)\n\t\t}\n\t}\n\treturn result\n}\n\nfunc main() {\n\tinput := []float64{17.3,\
  \ 11.1, 9.9, 4.3, 12.6}\n\tres := MyFilter(input, func(num float64) bool {\n\t\t\
  if num <= 10.0 {\n\t\t\treturn true\n\t\t}\n\t\treturn false\n\t})\n\tfmt.Println(res)\n\
  }\n/* Output\n[9.9 4.3]\n*/\n```\n\n在这里，输入切片中小于或等于 `10.0` 的任何值都会被保留，而所有其他值则被过滤掉。\n\
  \n### 使 MyFilter 成为泛型\n\n`MyFilter` 可以按如下方式泛型化：\n\n```\nfunc GenericFilterT any\
  \ bool) []T {\n\tvar result []T\n\tfor _, val := range input {\n\t\tif f(val) {\n\
  \t\t\tresult = append(result, val)\n\t\t}\n\t}\n\treturn result\n}\n```\n\n在清单 1-7\
  \ 中，我们演练了泛型 map 和 filter 函数。\n\n```\npackage main\n\nimport (\n\t\"fmt\"\n)\n\n\
  func GenericMapT1, T2 any T2) []T2 {\n\tresult := make([]T2, len(input))\n\tfor\
  \ index, value := range input {\n\t\tresult[index] = f(value)\n\t}\n\treturn result\n\
  }\n\nfunc GenericFilterT any bool) []T {\n\tvar result []T\n\tfor _, val := range\
  \ input {\n\t\tif f(val) {\n\t\t\tresult = append(result, val)\n\t\t}\n\t}\n\treturn\
  \ result\n}\n\nfunc main() {\n\tinput := []float64{-5.0, -2.0, 4.0, 8.0}\n\tresult1\
  \ := GenericMapfloat64, float64 float64 {\n\t\treturn n * n\n\t})\n\tfmt.Println(result1)\n\
  \n\tgreaterThanFive := GenericFilterint bool {\n\t\t\treturn i > 5\n\t\t})\n\tfmt.Println(greaterThanFive)\n\
  \n\toddNumbers := GenericFilterint bool {\n\t\t\treturn i % 2 == 1\n\t\t})\n\tfmt.Println(oddNumbers)\n\
  \n\tlengthGreaterThan3 := GenericFilterstring bool {\n\t\treturn len(s) > 3\n\t\
  })\n\tfmt.Println(lengthGreaterThan3)\n}\n/* Output\n[25 4 16 64]\n[6 20 7]\n[5\
  \ 1 7]\n[hello maybe]\n*/\nListing 1-7\nUsing generic map and filter functions\n\
  ```\n\n我们现在将注意力转向并发性的使用。\n\n## 1.3 并发\n\n并发性允许程序同时处理多个任务（并行处理，每个任务被分配给一个单独的处理器），或者看似同时处理多个任务（任务被复用，使得所有任务随时间推进）。如果复用速度非常快，那么并发进程看起来像是在同时运行，但实际上它们是在重叠的时间段内运行的。\n\
  \n在大多数支持并发处理的语言中，使用 `thread` 结构来支持并发性。线程有相关的内存开销，因此同一时间可以生成的线程数量是有限的。\n\n\n\n###\
  \ Goroutine\n\n在开发 Go 语言时，Google 引入了一种名为 **goroutine** 的轻量级进程，它比线程所需的内存开销更少。其动机是能够同时处理来自多个网络浏览器的大量\
  \ HTML 网页。\n\nGoroutine 是与其他函数并发运行的函数。当调用一个普通函数时，该函数完成其工作后，其下方的代码才会执行。当调用一个 goroutine\
  \ 函数时，由于其与下方的代码并发运行，因此紧接其下的代码会立即执行。\n\n我们在清单 1-8 中对此进行了说明。\n\n```go\npackage main\n\
  import (\n\"fmt\"\n\"time\"\n)\nfunc regularFunction() {\nfmt.Println(\"Just entered\
  \ regularFunction()\")\ntime.Sleep(5 * time.Second)\n}\nfunc goroutineFunction()\
  \ {\nfmt.Println(\"Just entered goroutineFunction()\")\ntime.Sleep(10 * time.Second)\n\
  fmt.Println(\"goroutineFunction finished its work\")\n}\nfunc main() {\ngo goroutineFunction()\n\
  fmt.Println(\"In main one line below goroutineFunction()\")\nregularFunction()\n\
  fmt.Println(\"In main one line below regularFunction()\")\n}\n/* Output\nIn main,\
  \ one line below goroutineFunction()\nJust entered regularFunction()\nJust entered\
  \ goroutineFunction()\nIn main one line below regularFunction()\n*/\nListing 1-8\n\
  Simple goroutine running concurrent with main\n```\n\n当 `goroutineFunction` 通过 `go\
  \ goroutineFunction()` 作为 goroutine 启动时，它会与 `main` 函数（本身也是一个 goroutine）并发运行。第一行输出会立即出现，即使\
  \ `goroutineFunction` 需要十秒才能完成其工作。当接下来调用 `regularFunction()` 时，需要经过五秒才会输出“In main,\
  \ one line below regularFunction()”。`main` 函数在输出此行后立即终止，导致程序在 `goroutineFunction`\
  \ 完成其工作前结束。当程序结束时，`goroutineFunction` 会被中断并终止。\n\n如果将时间延迟互换，使得 `goroutineFunction`\
  \ 有五秒延迟，而 `regularFunction` 有十秒延迟，输出将变为：\n\n```\nIn main one line below goroutineFunction()\n\
  Just entered regularFunction()\nJust entered goroutineFunction()\ngoroutineFunction\
  \ finished its work\nIn main, one line below regularFunction()\n```\n\n现在，与 `main`\
  \ 并发运行的 goroutine 在 `regularFunction` 和 `main` goroutine 退出前就完成了其工作。\n\n### WaitGroup\n\
  \nGo 提供了一种机制，允许在 `main` 退出之前，让多个 goroutine 全部完成其工作，同时终止未完成的 goroutine。\n\n我们引入 `sync`\
  \ 包和 `WaitGroup` 结构，并在清单 1-9 中说明其用法。\n\n```go\npackage main\nimport (\n\"fmt\"\n\
  \"time\"\n\"math/rand\"\n\"sync\"\n)\nvar wg sync.WaitGroup\nfunc outputStrings()\
  \ {\ndefer wg.Done()\nstrings := [5]string{\"One\", \"Two\", \"Three\", \"Four\"\
  , \"Five\"}\nfor i := 0; i < 5; i++ {\ndelay := 1 + rand.Intn(3)\ntime.Sleep(time.Duration(delay)\
  \ * time.Second)\nfmt.Println(strings[i])\n}\n}\nfunc outputInts() {\ndefer wg.Done()\n\
  for i := 0; i < 5; i++ {\ndelay := 1 + rand.Intn(3)\ntime.Sleep(time.Duration(delay)\
  \ * time.Second)\nfmt.Println(i)\n}\n}\nfunc outputFloats() {\ndefer wg.Done()\n\
  for i := 0; i < 5; i++ {\ndelay := 1 + rand.Intn(3)\ntime.Sleep(time.Duration(delay)\
  \ * time.Second)\nfmt.Println(float64(i * i) + 0.5)\n}\n}\nfunc main() {\nwg.Add(3)\n\
  go outputStrings()\ngo outputInts()\ngo outputFloats()\nwg.Wait()\n}\n/* Output\n\
  One\n0.5\n\nTwo\n1.5\n\n4.5\n\nThree\nFour\n\n9.5\nFive\n16.5\n*/\nListing 1-9\n\
  The sync package and WaitGroup\n```\n\n这个程序除了说明 `WaitGroup` 结构并展示三个 goroutine 并发运行外，没有做任何有用的事情。\n\
  \n声明了一个类型为 `sync.WaitGroup` 的全局变量 `wg`。\n\n在 `main` 中，我们调用 `wg.Add(3)`。`main` 中的最后一行代码是\
  \ `wg.Wait()`。这会导致 `main` 暂停，直到 `wg` 的值变为零。这确保所有三个 goroutine 在程序终止前完成其工作。\n\n在每个\
  \ goroutine 中，第一行代码 `defer wg.Done()` 会在 goroutine 完成其工作时，使全局变量 `wg` 的值递减。当 `wg`\
  \ 的值达到零时，`main` 函数才被允许退出。\n\n每次运行程序时生成的随机数序列是相同的，但输出序列每次运行都会变化。这是因为时间多路复用器每次运行程序时，都会为每个并发\
  \ goroutine 分配不同的执行时间片。程序第二次运行后的输出是：\n\n```\nOne\n\n0.5\n1.5\nTwo\n\n4.5\n\nThree\n\
  9.5\n16.5\nFour\n\nFive\n\n```\n\n### Channel\n\n我们经常希望能够同步 goroutine 的执行顺序，并让它们相互通信。我们引入强大的\
  \ **channel** 结构来实现这一点。\n\n考虑清单 1-10 中的 goroutine。\n\n```go\npackage main\nimport\
  \ (\n\"fmt\"\n\"time\"\n\"sync\"\n)\nvar wg sync.WaitGroup\nfunc pingGenerator(c\
  \ chan string) {\ndefer wg.Done()\nfor i := 0; i < 5; i++ {\nc <- \"ping\"\ntime.Sleep(time.Second\
  \ * 1)\n}\n}\nfunc output(c chan string) {\ndefer wg.Done()\nfor {\nvalue := <-\
  \ c\nfmt.Println(value)\n}\n}\nfunc main() {\nc := make(chan string)\nwg.Add(2)\n\
  go pingGenerator(c)\ngo output(c)\nwg.Wait()\n}\n/* Output\nping\nping\nping\nping\n\
  ping\nfatal error: all goroutines are asleep - deadlock!\n*/\nListing 1-10\nDeadlock\n\
  ```\n\n`main` 中的第一行代码初始化了一个 channel `c`。Channel 必须使用 `make` 语句进行初始化后才能使用。\n\n与上一个清单类似，我们创建了一个初始值为\
  \ 2 的 `WaitGroup` 变量 `wg`。\n\n接下来，我们启动两个 goroutine，`pingGenerator` 和 `output`，并将\
  \ channel 变量 `c` 传递给它们。\n\n`pingGenerator` goroutine 每秒将字符串“ping”分配给 channel 变量\
  \ `c`，共执行五次。从值“ping”到变量 `c` 的左箭头表示将“ping”值分配给 `c`。\n\n要完成此分配，channel 必须为空。在 `output`\
  \ goroutine 中，使用 `value := <- c` 对 `value` 进行赋值，只要 `pingGenerator` 中一赋值给 channel\
  \ 变量 `c`，`output` 就会立即取走它。这每秒发生一次。在 `pingGenerator` 两次分配“ping”之间的时间内，`value` 的赋值会被阻塞。也就是说，在\
  \ `output` goroutine 中，执行会暂停，直到 channel 中有信息可供赋值给 `value`。因此，两个 goroutine 都受到它们共有的\
  \ channel 变量 `c` 的影响。\n\n这里有一个问题。当 `pingGenerator` 发出其五个“ping”赋值（每个赋值都通过 `output`\
  \ goroutine 显示在控制台上）后，它会一直阻塞，等待第六次 channel 赋值。但这种情况永远不会发生。程序崩溃并显示前面展示的错误信息。发生了死锁。程序无法终止。\n\
  \n### Select 语句\n\n我们可以通过修改 `output` goroutine 并使用 **select** 语句来解决这个问题。\n\n```go\n\
  func output(c chan string) {\nfor {\nselect {\ncase value := <- c:\nfmt.Println(value)\n\
  case <-time.After(3 * time.Second):\nfmt.Println(\"Program timed out.\")\nwg.Done()\n\
  }\n}\n}\n```\n\n在 **select** 语句中，首先发生的 case 会被执行。如果两个或多个 case 都准备就绪，系统会随机选择一个。由于\
  \ channel `c` 每秒都会被赋值给 `value`（赋值之间会阻塞），因此程序会输出五个“ping”赋值。与之前发生死锁不同，在第五次也是最后一次“ping”被赋值给\
  \ `value` 三秒后，第二个 case 会被执行。\n\n\n\n### 使用`quit`通道避免使用`WaitGroup`\n\n我们可以使用`quit`通道来阻止`main`函数退出，从而避免使用`WaitGroup`，如代码清单\
  \ 1-11 所示。\n\n```\npackage main\nimport (\n\"fmt\"\n\"time\"\n)\nvar quit chan bool\n\
  func pingGenerator(c chan string) {\nfor i := 0; i < 5; i++ {\nc <- \"ping\"\ntime.Sleep(time.Second\
  \ * 1)\n}\n}\nfunc output(c chan string) {\nfor {\nselect {\ncase value := <- c:\n\
  fmt.Println(value)\ncase <-time.After(3 * time.Second):\nfmt.Println(\"Program timed\
  \ out.\")\nquit <- true\n}\n}\n}\nfunc main() {\nquit = make(chan bool)\nc := make(chan\
  \ string)\ngo pingGenerator(c)\ngo output(c)\n<- quit\n}\n/* Output\nping\nping\n\
  ping\nping\nping\nProgram timed out.\n*/\n代码清单 1-11\n使用 quit 通道代替 WaitGroup\n```\n\
  \n`quit`通道在`main`函数的第一行代码中被初始化。`main`函数的最后一行代码`<- quit`会阻塞`main`函数，使其无法结束，直到一个布尔值被赋给`quit`。这个赋值操作发生在协程`output`的第二个`case`语句中。\n\
  \n这种控制程序结束的机制比使用`WaitGroup`更简单，也更少负担。\n\n我们将不可避免的`pongGenerator`添加到这个程序中。\n\n###\
  \ 通道方向\n\n可以为协程签名添加通道方向，如代码清单 1-12 所示。如`pingGenerator`和`pongGenerator`的签名所示，从右侧指向`chan`的箭头要求协程向通道赋值（即生成器）。`chan`左侧指向通道变量的箭头要求协程只能从通道中消费值。\n\
  \n如果尝试向指定为消费者的通道发送信息，或者尝试从指定为生成器的通道中读取信息，则会发生编译错误。\n\n```\npackage main\nimport\
  \ (\n\"fmt\"\n\"time\"\n)\nvar quit chan bool\nfunc pingGenerator(c chan<- string)\
  \ {\n// 通道只能被发送 - 一个生成器\nfor i := 0; i < 5; i++ {\nc <- \"ping\"\n}\n}\nfunc pongGenerator(c\
  \ chan<- string) {\n// 信息只能被发送到通道 - 一个生成器\nfor i := 0; i < 5; i++ {\nc <- \"pong\"\
  \n}\n}\nfunc output(c <- chan string) {\n// 信息只能从通道接收 - 一个消费者\nfor {\ntime.Sleep(time.Second\
  \ * 1)\nselect {\ncase value := <- c:\nfmt.Println(value)\ncase <-time.After(3 *\
  \ time.Second):\nfmt.Println(\"Program timed out.\")\nquit <- true\n}\n}\n}\nfunc\
  \ main() {\nquit = make(chan bool)\nc := make(chan string)\ngo pingGenerator(c)\n\
  go pongGenerator(c)\ngo output(c)\n<- quit\n}\n/* Output\nping\npong\nping\npong\n\
  ping\npong\nping\npong\nping\npong\nProgram timed out.\n*/\n代码清单 1-12\n在协程签名中使用方向通道实现乒乓球效果\n\
  ```\n\n我们将一秒钟的时间延迟移到了`output`协程中。这使得`ping`和`pong`生成器可以交替执行，因为每次对通道的赋值都会交替阻塞，直到通道被消费协程`output`读取。\n\
  \n### 竞态条件\n\n使用并发时的一个普遍问题是竞态条件。当两个或更多的协程修改同一份共享数据时，就会出现这个问题。\n\n代码清单 1-13 给出了一个简单的例子。\n\
  \n```\npackage main\nimport (\n\"fmt\"\n\"sync\"\n)\nconst (\nnumber = 1000\n)\n\
  var countValue int\nfunc main() {\nvar wg sync.WaitGroup\nwg.Add(number)\nfor i\
  \ := 0; i < number; i++ {\ngo func() {\ncountValue++\nwg.Done()\n}()\n}\nwg.Wait()\n\
  fmt.Printf(\"\\ncountValue = %d\", countValue)\n}\n代码清单 1-13\n竞态条件示例\n```\n\n在`main`函数的\
  \ for 循环中，生成了 1000 个协程。每个协程将`countValue`恰好增加一次。因此，人们会期望程序的输出是 1000。\n\n每次运行程序，输出都不同。这是因为多个协程试图在几乎同一时间修改全局变量`countValue`而产生了冲突。系统不会生成错误消息，但输出结果是不正确的。\n\
