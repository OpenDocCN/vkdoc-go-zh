  \ 和 `XPos`（均为 `int` 类型）。变量 `data` 被定义为 `nodePos` 类型的切片，用于定义要绘制的每个节点的位置和值。\n\n###\
  \ 用于显示二叉树的基础设施\n\n代码清单 8-2 展示了设置显示二叉树图形的基础设施的支持函数。\n\n```\nfunc prepareDrawTree(tree\
  \ BinaryTree) {\nprepareToDraw(tree)\nfmt.Println(endPoints)\nfmt.Println(data)\n\
  }\nfunc findXY(val string) (int, int) {\nfor i := 0; i < len(data); i++ {\nif data[i].Val\
  \ == val {\nreturn data[i].XPos, data[i].YPos\n}\n}\nreturn -1, -1\n}\nfunc findX(val\
  \ string) int {\nfor i := 0; i < len(data); i++ {\nif data[i].Val == val {\nreturn\
  \ i\n}\n}\nreturn -1\n}\nfunc setXValues() {\nfor index := 0; index < len(data);\
  \ index++ {\nxValue := findX(data[index].Val)\ndata[index].XPos = xValue\n}\n}\n\
  func prepareToDraw(tree BinaryTree) {\ninorderLevel(tree.Root, 1)\nsetXValues()\n\
  getEndPoints(tree.Root, nil)\n}\nfunc inorderLevel(node *Node, level int) {\nif\
  \ node != nil {\ninorderLevel(node.Left, level + 1)\ndata = append(data, nodePos{node.Value,\
  \ 100 - level, -1})\ninorderLevel(node.Right, level + 1)\n}\n}\nfunc getEndPoints(node\
  \ *Node, parent *Node) {\nif node != nil {\nif parent != nil {\nendPoints = append(endPoints,\
  \ nodePair{node.Value, parent.Value})\n}\ngetEndPoints(node.Left, node)\ngetEndPoints(node.Right,\
  \ node)\n}\n}\n代码清单 8-2\n设置二叉树显示的函数\n```\n\n\n\n### 代码解释\n\n函数 `prepareDrawTree`\
  \ 调用 `prepareToDraw`，两者都接收一个参数 `tree`（`BinaryTree` 类型）。\n\n函数 `prepareToDraw` 调用\
  \ `inorderLevel`，传入树的根节点和层级 1。此中序遍历会检查节点是否不为 `nil`，如果非空，则递归调用自身，传入参数 `node.Left`\
  \ 和 `level + 1`。\n\n代码的第二行是访问操作，它会向全局 `data` 切片追加一个 `nodePos`，其中包含 `node.Value`，以及\
  \ `YPos` 等于 100 – level 和 `XPos` 等于 -1（仅作为临时占位符）。由于树是从根节点向下构建的，层级越高，`YPos` 值越低，因此\
  \ `YPos` 的计算公式为 100 – level。\n\n代码的第三行是对 `node.Right` 和 `level + 1` 的递归调用。\n\n`prepareToDraw`\
  \ 中的第二行代码是对 `setXValues()` 函数的调用。此函数使用 `findX` 来找到 `data` 切片中包含 `data` 中每个 `nodePos`\
  \ 值的索引。在遍历 `data` 切片时，该索引用作 `nodePos` 中的 `XValue`。`data` 中的第一个 `nodePos` 将是最左侧的节点（在前面展示的树中为节点\
  \ F），其 `XPos` 为 0。`data` 中的第二个 `nodePos` 将是该树中的节点 E。在 `setXY()` 函数能够工作之前，需要先计算出\
  \ `data` 切片（除了 `XPos` 之外的部分）。\n\n在 `setXY()` 完成后，会调用前序递归函数 `getEndPoints`。\n\n每访问一个节点，就会使用所访问的节点及其父节点构建\
  \ `nodePair` 切片。这些信息将用于绘制连接树节点的边。\n\n我们用一个包含四个节点的简单树来说明 `data` 和 `endPoints` 的构建过程。\n\
  \n8-3 清单 展示了一个简单的 `main` 函数以及在控制台中显示的 `data` 和 `endPoints` 切片结果。\n\n```\npackage\
  \ main\nfunc main() {\nroot := Node{\"A\", nil, nil}\nnodeB := Node{\"B\",nil, nil}\n\
  nodeC := Node{\"C\", nil, nil}\nnodeD := Node{\"D\", nil, nil}\nroot.Left = &nodeB\n\
  root.Right = &nodeC\nnodeC.Right = &nodeD\nmyTree := BinaryTree{&root, 4}\nShowTreeGraph(myTree)\n\
  }\n清单 8-3\n包含四个节点的 Main 函数\n```\n\n控制台输出为：\n\n`slice of endPoints: [{B A} {C A}\
  \ {D C}]`\n\n`slice of data: [{B 98 0} {A 99 1} {C 98 2} {D 97 3}]`\n\n`data` 切片显示，节点\
  \ B 的 `XPos` 为 0（最左侧节点）；节点 A 的 `XPos` 为 1；节点 C 的 `XPos` 为 2；节点 D 的 `XPos` 为 3。这个顺序是前面所示的中序遍历的结果。\n\
  \n必须绘制的三条线的端点显示在 `endPoints` 切片中（从 B 到 A，从 C 到 A，以及从 D 到 C 的线）。\n\n使用 `fyne` GUI\
  \ 包构建的树如图 8-3 所示。\n\n![](img/527841_1_En_8_Fig3_HTML.png)\n\n一个包含 4 个节点的二叉树示意图。根节点\
  \ A 分为节点 B 和 C。节点 C 连接节点 D。\n\n**图 8-3** 另一个二叉树截图\n\n### ShowTreeGraph 的实现\n\n计算完全局变量\
  \ `data` 和 `endPoints` 后，我们就可以绘制表示二叉树的图形了。\n\n8-4 清单 展示了绘制树形图的详细信息。\n\n```\nfunc\
  \ drawGraph(a fyne.App, w fyne.Window) {\nimage := canvas.NewImageFromResource(theme.FyneLogo())\n\
  image = canvas.NewImageFromFile(path + \"tree.png\")\nimage.FillMode = canvas.ImageFillOriginal\n\
  w.SetContent(image)\nw.Show()\n}\nfunc ShowTreeGraph(myTree BinaryTree) {\nprepareDrawTree(myTree)\n\
  myApp := app.New()\nmyWindow := myApp.NewWindow(\"Binary Tree\")\nmyWindow.Resize(fyne.NewSize(1000,\
  \ 600))\npath, _ := homedir.Dir()\npath += \"/Desktop//\"\nnodePts := make(plotter.XYs,\
  \ myTree.NumNodes)\nfor i := 0; i < len(data); i++ {\nnodePts[i].Y = float64(data[i].YPos)\n\
  nodePts[i].X = float64(data[i].XPos)\n}\nnodePtsData := nodePts\np := plot.New()\n\
  p.Add(plotter.NewGrid())\nnodePoints, err := plotter.NewScatter(nodePtsData)\nif\
  \ err != nil {\nlog.Panic(err)\n}\nnodePoints.Shape = draw.CircleGlyph{}\nnodePoints.Color\
  \ = color.RGBA{G: 255, A: 255}\nnodePoints.Radius = vg.Points(12)\n// 绘制线条\nfor\
  \ index := 0; index < len(endPoints); index++ {\nval1 := endPoints[index].Val1\n\
  x1, y1 := findXY(val1)\nval2 := endPoints[index].Val2\nx2, y2 := findXY(val2)\n\
  pts := plotter.XYs{{X: float64(x1), Y: float64(y1)}, {X: float64(x2),\nY: float64(y2)}}\n\
  line, err := plotter.NewLine(pts)\nif err != nil {\nlog.Panic(err)\n}\nscatter,\
  \ err := plotter.NewScatter(pts)\nif err != nil {\nlog.Panic(err)\n}\np.Add(line,\
  \ scatter)\n}\np.Add(nodePoints)\n// 添加标签\nfor index := 0; index < len(data); index++\
  \ {\nx := float64(data[index].XPos) - 0.05\ny := float64(data[index].YPos) - 0.02\n\
  str := data[index].Val\nlabel, err := plotter.NewLabels(plotter.XYLabels {\nXYs:\
  \ []plotter.XY {\n{X: x ,Y: y},\n},\nLabels: []string{str},\n},)\nif err != nil\
  \ {\nlog.Fatalf(\"无法创建标签绘图器: %+v\", err)\n}\np.Add(label)\n}\npath, _ = homedir.Dir()\n\
  path += \"/Desktop/GoDS/\"\nerr = p.Save(1000, 600, \"tree.png\")\nif err != nil\
  \ {\nlog.Panic(err)\n}\ndrawGraph(myApp, myWindow)\nmyWindow.ShowAndRun()\n}\n清单\
  \ 8-4\n绘制二叉树图形\n```\n\n`ShowTreeGraph` 中的第一行代码是 `prepareDrawTree`。这会将 `data` 填充为\
  \ `nodePos` 的切片，每个 `nodePos` 包含节点中存储的键值以及其在图中的 `XPos` 和 `YPos`。\n\n创建了一个新的 `fyne.Window`\
  \ 即 `myWindow`，标题为“Binary Tree”，宽度为 1000 像素，高度为 600 像素。\n\n创建了一个新的绘图器 `nodePts`。该绘图器的\
  \ X 和 Y 坐标由 `data` 切片中的 `XPos` 和 `YPos` 赋值。\n\n创建了一个新的 `plot` 并使用 `plotter` 中的信息进行填充。使用\
  \ `nodePtsData` 从 `plotter` 创建了一个散点图 `nodePoints`。\n\n为每个节点点的 `Shape`、`Color` 和\
  \ `Radius` 进行了赋值。\n\n绘制线条和在每个节点上创建标签也采用了相同的方法。\n\n最后，一个“tree.png”文件被保存到主目录。\n\n\
  支持函数 `drawGraph` 被调用，并传入 `fyne.App` (`myApp`) 和 `fyne.Window` (`myWindow`) 作为参数。\n\
  \n函数 `drawGraph` 加载并显示“tree.png”图像。\n\n为了使代码能够运行，需要导入 `fyne` 框架中的多个包。这些导入信息如 8-5\
  \ 清单 所示，该清单展示了完整的 `binarytree` 包。\n\n\n\n```go\npackage binarytree\n\nimport (\n\
  \t\"fmt\"\n\t\"image/color\"\n\t\"log\"\n\n\t\"fyne.io/fyne/v2\"\n\t\"fyne.io/fyne/v2/app\"\
  \n\t\"fyne.io/fyne/v2/canvas\"\n\t\"fyne.io/fyne/v2/theme\"\n\t\"github.com/mitchellh/go-homedir\"\
  \n\t\"gonum.org/v1/plot\"\n\t\"gonum.org/v1/plot/plotter\"\n\t\"gonum.org/v1/plot/vg\"\
  \n\t\"gonum.org/v1/plot/vg/draw\"\n)\n\ntype BinaryTree struct {\n\tRoot     *Node\n\
  \tNumNodes int\n}\n\ntype Node struct {\n\tValue string\n\tLeft  *Node\n\tRight\
  \ *Node\n}\n\ntype nodePair struct {\n\tVal1, Val2 string\n}\n\ntype nodePos struct\
  \ {\n\tVal  string\n\tYPos int\n\tXPos int\n}\n\nvar data []nodePos   // 用于获取每个节点的（Val,\
  \ XPos, YPos）\nvar endPoints []nodePair     // 用于绘制连线\n\nfunc prepareDrawTree(tree\
  \ BinaryTree) {\n\tprepareToDraw(tree)\n\tfmt.Printf(\"\\n 连接点切片: %v\", endPoints)\n\
  \tfmt.Printf(\"\\n 数据切片: %v\", data)\n}\n\nfunc findXY(val string) (int, int) {\n\
  \tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val == val {\n\t\t\treturn data[i].XPos,\
  \ data[i].YPos\n\t\t}\n\t}\n\treturn -1, -1\n}\n\nfunc findX(val string) int {\n\
  \tfor i := 0; i < len(data); i++ {\n\t\tif data[i].Val == val {\n\t\t\treturn i\n\
  \t\t}\n\t}\n\treturn -1\n}\n\nfunc setXValues() {\n\tfor index := 0; index < len(data);\
  \ index++ {\n\t\txValue := findX(data[index].Val)\n\t\tdata[index].XPos = xValue\n\
  \t}\n}\n\nfunc prepareToDraw(tree BinaryTree) {\n\tinorderLevel(tree.Root, 1)\n\t\
  setXValues()\n\tgetEndPoints(tree.Root, nil)\n}\n\nfunc inorderLevel(node *Node,\
  \ level int) {\n\tif node != nil {\n\t\tinorderLevel(node.Left, level+1)\n\t\tdata\
  \ = append(data, nodePos{node.Value, 100 - level, -1})\n\t\tinorderLevel(node.Right,\
  \ level+1)\n\t}\n}\n\nfunc getEndPoints(node *Node, parent *Node) {\n\tif node !=\
  \ nil {\n\t\tif parent != nil {\n\t\t\tendPoints = append(endPoints, nodePair{node.Value,\
  \ parent.Value})\n\t\t}\n\t\tgetEndPoints(node.Left, node)\n\t\tgetEndPoints(node.Right,\
  \ node)\n\t}\n}\n\nvar path string\n\nfunc drawGraph(a fyne.App, w fyne.Window)\
  \ {\n\timage := canvas.NewImageFromResource(theme.FyneLogo())\n\timage = canvas.NewImageFromFile(path\
  \ + \"tree.png\")\n\timage.FillMode = canvas.ImageFillOriginal\n\tw.SetContent(image)\n\
  \tw.Show()\n}\n\nfunc ShowTreeGraph(myTree BinaryTree) {\n\tprepareDrawTree(myTree)\n\
  \tmyApp := app.New()\n\tmyWindow := myApp.NewWindow(\"二叉树\")\n\tmyWindow.Resize(fyne.NewSize(1000,\
  \ 600))\n\tpath, _ := homedir.Dir()\n\tpath += \"/Desktop//\"\n\tnodePts := make(plotter.XYs,\
  \ myTree.NumNodes)\n\tfor i := 0; i < len(data); i++ {\n\t\tnodePts[i].Y = float64(data[i].YPos)\n\
  \t\tnodePts[i].X = float64(data[i].XPos)\n\t}\n\tnodePtsData := nodePts\n\tp :=\
  \ plot.New()\n\tp.Add(plotter.NewGrid())\n\tnodePoints, err := plotter.NewScatter(nodePtsData)\n\
  \tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tnodePoints.Shape = draw.CircleGlyph{}\n\
  \tnodePoints.Color = color.RGBA{G: 255, A: 255}\n\tnodePoints.Radius = vg.Points(12)\n\
  \t// 绘制连线\n\tfor index := 0; index < len(endPoints); index++ {\n\t\tval1 := endPoints[index].Val1\n\
  \t\tx1, y1 := findXY(val1)\n\t\tval2 := endPoints[index].Val2\n\t\tx2, y2 := findXY(val2)\n\
  \t\tpts := plotter.XYs{{X: float64(x1), Y: float64(y1)},\n\t\t\t{X: float64(x2),\
  \ Y: float64(y2)}}\n\t\tline, err := plotter.NewLine(pts)\n\t\tif err != nil {\n\
  \t\t\tlog.Panic(err)\n\t\t}\n\t\tscatter, err := plotter.NewScatter(pts)\n\t\tif\
  \ err != nil {\n\t\t\tlog.Panic(err)\n\t\t}\n\t\tp.Add(line, scatter)\n\t}\n\tp.Add(nodePoints)\n\
  \t// 添加标签\n\tfor index := 0; index < len(data); index++ {\n\t\tx := float64(data[index].XPos)\
  \ - 0.05\n\t\ty := float64(data[index].YPos) - 0.02\n\t\tstr := data[index].Val\n\
  \t\tlabel, err := plotter.NewLabels(plotter.XYLabels{\n\t\t\tXYs: []plotter.XY{\n\
  \t\t\t\t{X: x, Y: y},\n\t\t\t},\n\t\t\tLabels: []string{str},\n\t\t})\n\t\tif err\
  \ != nil {\n\t\t\tlog.Fatalf(\"无法创建标签绘图器: %+v\", err)\n\t\t}\n\t\tp.Add(label)\n\
  \t}\n\tpath, _ = homedir.Dir()\n\tpath += \"/Desktop/GoDS/\"\n\terr = p.Save(1000,\
  \ 600, \"tree.png\")\n\tif err != nil {\n\t\tlog.Panic(err)\n\t}\n\tdrawGraph(myApp,\
  \ myWindow)\n\tmyWindow.ShowAndRun()\n}\n```\n\n*清单 8-5 完整的`binarytree`包*\n\n---\n\
  \n`清单 8-6`展示了一个`main`驱动程序，它使用`binarytree`包构建一个包含 18 个节点的`BinaryTree`，然后显示该树。\n\n\
  *清单 8-6 构建并显示二叉树的 main 驱动程序*\n\n```go\npackage main\n\nimport bt \"example.com/binarytree\"\
