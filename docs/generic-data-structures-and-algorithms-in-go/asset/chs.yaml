- "# 双向链表\n\n在双向链表中，每个节点既指向链表中的下一个节点，也指向上一个节点。由此，我们得到一个通用双向链表的数据结构如下：\n\n```\ntype\
  \ Ordered interface {\n    ~string | ~int | ~float64\n}\ntype Node[T Ordered] struct\
  \ {\n    Item T\n    next *Node[T]\n    prev *Node[T]\n}\ntype List[T Ordered] struct\
  \ {\n    first       *Node[T]\n    last        *Node[T]\n    numberItems int\n}\n\
  ```\n\n`List` 包含一个额外的字段 `last`，它指向链表的末尾。由于每个节点除了向前链接外还需向后链接，双向链表的方法更为复杂。这些细节展示在代码清单\
  \ 6-14 中。\n\n```\npackage doublylinkedlist\n\nimport (\n    \"fmt\"\n)\n\ntype Ordered\
  \ interface {\n    ~string | ~int | ~float64\n}\n\ntype Node[T Ordered] struct {\n\
  \    Item T\n    next *Node[T]\n    prev *Node[T]\n}\n\ntype List[T Ordered] struct\
  \ {\n    first       *Node[T]\n    last        *Node[T]\n    numberItems int\n}\n\
  \n// 方法\n\nfunc (list *List[T]) Append(item T) {\n    // 将元素添加到链表末尾的新节点中\n    newNode\
  \ := Node[T]{item, nil, nil}\n    if list.first == nil {\n        list.first = &newNode\n\
  \        list.last = list.first\n    } else {\n        list.last.next = &newNode\n\
  \        newNode.prev = list.last\n        list.last = &newNode\n    }\n    list.numberItems\
  \ += 1\n}\n\nfunc (list *List[T]) InsertAt(index int, item T) error {\n    // 将元素添加到链表中指定索引位置的新节点\n\
  \    if index < 0 || index > list.numberItems {\n        return fmt.Errorf(\"Index\
  \ out of bounds error\")\n    }\n    newNode := Node[T]{item, nil, nil}\n    if\
  \ index == 0 {\n        newNode.next = list.first\n        if list.first != nil\
  \ {\n            list.first.prev = &newNode\n        }\n        list.first = &newNode\n\
  \        list.numberItems += 1\n        if list.numberItems == 1 {\n           \
  \ list.last = list.first\n        }\n        return nil // 无错误\n    }\n    node\
  \ := list.first\n    count := 0\n    previous := node\n    for count < index {\n\
  \        previous = node\n        count++\n        node = node.next\n    }\n   \
  \ newNode.next = node\n    previous.next = &newNode\n    node.prev = &newNode\n\
  \    newNode.prev = previous\n    list.numberItems += 1\n    return nil // 无错误\n\
  }\n\nfunc (list *List[T]) RemoveAt(index int) (T, error) {\n    // 从链表中移除指定索引位置的元素\n\
  \    if index < 0 || index > list.numberItems {\n        var zero T\n        return\
  \ zero, fmt.Errorf(\"Index out of bounds error\")\n    }\n    node := list.first\n\
  \    if index == 0 {\n        toRemove := node\n        list.first = toRemove.next\n\
  \        list.numberItems -= 1\n        if list.numberItems <= 1 {\n           \
  \ list.last = list.first\n        }\n        return toRemove.Item, nil\n    }\n\
  \    count := 0\n    previous := node\n    for count < index {\n        previous\
  \ = node\n        count++\n        node = node.next\n    }\n    toRemove := node\n\
  \    previous.next = toRemove.next\n    toRemove.next.prev = previous\n    list.numberItems\
  \ -= 1\n    if list.numberItems <= 1 {\n        list.last = list.first\n    }\n\
  \    return toRemove.Item, nil\n}\n\nfunc (list *List[T]) IndexOf(item T) int {\n\
  \    node := list.first\n    count := 0\n    for {\n        if node.Item == item\
  \ {\n            return count\n        }\n        if node.next == nil {\n      \
  \      return -1\n        }\n        node = node.next\n        count += 1\n    }\n\
  }\n\nfunc (list *List[T]) ItemAfter(item T) T {\n    // 扫描链表查找第一个出现的元素\n    node\
  \ := list.first\n    for {\n        if node == nil { // 未找到元素\n            var zero\
  \ T\n            return zero\n        }\n        if node.Item == item {\n      \
  \      break\n        }\n        node = node.next\n    }\n    return node.next.Item\n\
  }\n\nfunc (list *List[T]) ItemBefore(item T) T {\n    // 扫描链表查找第一个出现的元素\n    node\
  \ := list.first\n    for {\n        if node == nil { // 未找到元素\n            var zero\
  \ T\n            return zero\n        }\n        if node.Item == item {\n      \
  \      break\n        }\n        node = node.next\n    }\n    return node.prev.Item\n\
