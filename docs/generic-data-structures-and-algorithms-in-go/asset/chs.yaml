  ## 4.5 总结


  在本章中，我们介绍了基于控制台和基于 GUI 的生命游戏实现。我们根据游戏规范中的演化规则定义了一个 ADT。我们使用了一个第三方 GUI 包来描绘网格及其细胞。


  在下一章中，我们将开始本书的数据结构部分。我们将重点介绍**栈**，并提供一些通用的栈实现以及一些使用栈的应用程序。


