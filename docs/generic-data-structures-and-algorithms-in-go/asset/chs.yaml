  \t\t\t\tnewLoc.y)\n\t\t\ttuna.Reproduce(newLoc)\n\t\t}\n\t\tmutex.Unlock()\n\t\t\
  time.Sleep(time.Duration(rand.Intn(500)+500) *\n\t\t\ttime.Millisecond)\n\t}\n}\n\
  ```\n\n类似的**类型断言**被用于处理被吃鲭鱼的终止。\n\n### 生物图形化显示的输出函数\n\n用于生成生物图形化显示的 `output` 函数如下：\n\
