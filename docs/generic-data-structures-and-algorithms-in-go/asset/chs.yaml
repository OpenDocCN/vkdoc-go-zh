  \t}\n\tfor index := secondIndex + 1; index < len(tour); index++ {\n\t\tresult =\
  \ append(result, tour[index])\n\t}\n\treturn result\n}\nfunc swap(tour []int) []int\
  \ {\n\tfirstIndex := randomFrom(1, len(tour)-1)\n\tsecondIndex := randomFrom(1,\
  \ len(tour)-1)\n\tfor firstIndex == secondIndex {\n\t\tfirstIndex = randomFrom(1,\
