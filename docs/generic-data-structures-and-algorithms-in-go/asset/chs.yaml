  \ I 引向 K。节点 K 引向 L。节点 L 引向 M 和 N。节点 M 引向 R。节点 N 引向 O。节点 O 引向 P 和 Q。\n\n图 8-2\n\n\
  二叉树的屏幕截图\n\n为了简化对相当复杂的绘制树算法的解释，我们首先给出一个非泛型版本，该版本使用 `string` 作为基类型。下一章将介绍泛型版本。代码清单\
  \ 8-1 展示了绘制二叉树的核心数据结构。\n\n```\npackage main\ntype BinaryTree struct {\nRoot *Node\n\
